body:
  text: 魏書卷十八太武五王列傳第六晉王東平王臨淮王廣陽王南安王太武皇帝十一男賀皇后生景穆皇帝越椒房生晉王伏羅舒椒房生東平王翰弗椒房生臨淮王譚伏椒房生楚王建閭左昭儀生南安王余其小兒猫兒真虎頭龍頭並闕母氏皆早薨無傳晉王伏羅真君三年封加車騎大將軍後督高平涼州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從正道恐軍聲先振必當遠遁若潛軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋慕利延衆驚奔白蘭慕利延兄子拾寅走河曲斬首五千餘級降其一萬餘落八年薨無子國除東平王翰真君三年封秦王拜侍中中軍大將軍參典都曹事忠貞雅正百僚憚之太傅高允以翰年少作諸侯箴以遺之翰覽之大悅後鎮枹罕以信惠撫衆羌戎敬服改封東平王世祖崩諸大臣等議欲立翰而中常侍宗愛與翰不協矯太后令立南安王余遂殺翰子道符襲爵中軍大將軍顯祖踐阼拜長安鎮都大將皇興元年謀反司馬段太陽討斬之傳首京師臨淮王譚真君三年封燕王拜侍中參都曹事後改封臨淮王世祖南討授中軍大將軍先是劉義隆以鄒山險固有榮胡家乃積糧為守禦之備譚率衆攻之獲米三十萬以供軍儲義隆恃淮之阻素不設備譚造筏數十潛軍而濟賊衆驚潰遂斬其將胡崇賊首萬餘級薨諡宣王子提襲為梁州刺史以貪縱削除加罰徙配北鎮久之提子員外郎穎免冠請解所居官代父邊戍高祖不許後詔提從駕南伐至洛陽參定遷都之議尋卒以預參遷都功追封長鄉縣侯世宗時贈雍州刺史諡曰懿提子昌字法顯好文學居父母喪哀號孺慕悲感行人世宗時復封臨淮王未拜而薨贈齊州刺史諡曰康王追封濟南子彧字文若紹封彧少有才學時譽甚美侍中崔光見彧退而謂人曰黑頭三公當此人也少與從兄安豐王延明中山王熙並以宗室博古文學齊名時人莫能定其優劣尚書郎范陽盧道將謂吏部清河崔休曰三人才學雖無優劣然安豐少於造次中山皂白太多未若濟南風流沉雅時人為之語曰三王楚琳琅未若濟南備圓方彧姿制閑裕吐發流靡琅邪王誦有名人也見之未嘗不心醉忘疲拜前軍將軍中書侍郎奏郊廟歌辭時稱其美除給事黃門侍郎彧本名亮字仕明時侍中穆紹與彧同署避紹父諱啟求改名詔曰仕明風神運吐常自以比荀文若可名彧以取定體相倫之美彧求復本封詔許復封臨淮寄食相州魏郡又長兼御史中尉彧以為倫得之不謝領軍于忠忿言之朝廷曰臨淮雖復風流可觀而無骨鯁之操中尉之任恐非所堪遂去威儀單車而還朝流為之歎息累遷侍中衞將軍左光祿大夫兼尚書左僕射攝選是時蕭衍遣將圍逼溫湯進彧以本官為東道行臺會尒朱榮入洛殺害元氏彧撫膺慟哭遂奔蕭衍衍遣其舍人陳建孫迎接并觀彧為人建孫還報稱彧風神閑儁衍亦先聞名深相器待見彧於樂遊園因設宴樂彧聞樂聲歔欷涕淚交下悲感傍人衍為之不樂自前後奔叛皆希旨稱魏為偽唯彧上表啟常云魏臨淮王衍體彧雅性不以為責及知莊帝踐阼彧以母老請還辭旨懇切衍惜其人才又難違其意遣其僕射徐勉私勸彧曰昔王陵在漢姜維相蜀在所成名何必本土彧曰死猶願北況於生也衍乃以禮遣彧性至孝事父母盡禮自經違離不進酒肉容貌憔悴見者傷之累除位尚書令大司馬兼錄尚書莊帝追崇武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后將遷神主於太廟以高祖為伯考彧表諫曰漢祖創業香街有太上之廟光武中興南頓立舂陵之寢元帝之於光武疏為絕服猶尚身奉子道入繼大宗高祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義斯奪及金德將興宣王受寄自茲而降世秉威權景王意存毀冕文王心規裂冠雖祭則魏主而權歸晉室昆之與季實傾曹氏且子元宣王冢胤文王成其大業故晉武繼文祖宣景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典禘祫失序著譏前經高祖德溢寰中道超無肅祖雖勳格宇宙猶曾奉贄稱臣穆皇后稟德坤元復將配享乾位此乃君臣並筵嫂叔同室歷觀墳籍未有其事時莊帝意銳朝臣無敢言者唯彧與吏部尚書李神儁並有表聞詔報曰文穆皇帝勳格四表道邁百王是用考循舊軌恭上尊號王表云漢太上於香街南頓於舂陵漢高不因瓜瓞之緒光武又無世及之德皆身受符命不由父祖別廟異寢於理何差文穆皇帝天眷人宅歷數有歸朕忝承下武遂主神器既帝業有統漢氏非倫若以昔況今不當移寢則魏太祖晉景帝雖王跡已顯皆以人臣而終豈得與餘帝別廟有闕餘序漢郡國立廟者欲尊高祖之德使饗遍天下非關太廟神主獨在外祠薦漢宣之父亦非勳德所出雖不追尊不亦可乎伯考之名自是尊卑之稱何必準古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不得同室乎且晉文景共為一代議者云世限七主無定數昭穆既同明有共室之理禮既有祔嫂叔何嫌禮士祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毀莊帝既逼諸妹之請此辭意黃門侍郎常景中書侍郎邢子才所替成也又追尊兄彭城王為孝宣皇帝彧又面諫曰陛下中興意欲憲章前古作而不法後世何觀歷尋書籍未有其事願割友于之情使名器無爽帝不從及神主入廟復敕百官悉陪從一依乘輿之式彧上表以為爰自中古迄於下葉崇尚君親褒明功懿乃有皇號終無帝名今若去帝直留皇名求之古義少有依準又不納尒朱榮死除彧司徒公尒朱世隆率部北叛詔彧防河陰及尒朱兆率衆奄至彧出東掖門為賊所獲見兆辭色不屈為羣胡所毆薨出帝贈太師太尉公雍州刺史彧美風韻善進止衣冠之下雅有容則博覽羣書不為章句所著文藻雖多亡失猶有傳於世者然居官不能清白所進舉止於親婭為識者所譏無子弟孝友少有時譽襲爵淮陽王累遷滄州刺史為政溫和好行小惠不能清白而無所侵犯百姓亦以此便之孝靜帝宴齊文襄王於華林園孝友因醉自譽又云陛下許賜臣能帝笑曰朕聞王自道清文襄曰臨淮王雅旨舍罪於是君臣俱笑而不罪孝友明於政理嘗奏表曰令制百家為黨族二十家為閭五家為比隣百家之內有帥二十五徵發皆免苦樂不均羊少狼多復有蠶食此之為弊久矣京邑諸或七八百家唯一里正二史庶事無闕而況外州乎請依舊置三正之名不改而百家為四閭閭二比計族省十二丁得十二匹貲絹略計見管之戶應二萬餘族一歲出貲絹二十四萬匹十五丁出一番兵計得一萬六千兵此富國安人之道也古諸侯娶九女士有一妻二妾晉令諸王置妾八人郡公侯妾六人官品令第一第二品有四妾第三第四有三妾第五第六有二妾第七第八有一妾所以陰教聿修繼嗣有廣廣繼嗣孝也修陰教禮也而聖朝忽棄此數由來漸久將相多尚公主王侯亦娶后族故無妾媵習以為常婦人多幸生逢今世舉朝略是無妾天下殆皆一妻設令人強志廣娶則家道離索身事迍邅內外親知共相嗤怪凡今之人通無準節父母嫁女則教之以妒姑姊逢迎必相勸以忌持制夫為婦德以能妬為女工自云不受人欺畏他笑我王公猶自一心已下何敢二意夫妬忌之心生則妻妾之禮廢妻妾之禮廢則姦淫之兆興斯臣之所以毒恨者也請以王公第一品娶八通妻以備九女稱事二品備七三品四品備五五品六品則一妻二妾限以一周悉令充數若不充數及待妾非禮使妻妒加捶撻免所居官其妻無子而不娶妾斯則自絕無以血食祖父請科不孝之罪離遣其妻臣之赤心義唯家國欲使吉凶無不合禮貴賤各有其宜省人帥以出兵丁立倉儲以豐穀食設賞格以擒姦盜行典令以示朝章庶使足食足兵人信之矣又冒申妻妾之數正欲使王侯將相功臣子弟苗胤滿朝傳祚無窮此臣之志也詔付有司議奏不同孝友又言今人生為皁隸葬擬王侯存沒異途無復節制崇壯丘壠盛飾祭儀隣里相榮稱為至孝又夫婦之始王化所先共食合瓢足以成禮而今之富者彌奢同牢之設甚於祭槃累魚成山山有林木林木之上鸞鳳斯存徒有煩勞終成委棄仰惟天意其或不然請自茲以後若婚葬過禮者以違旨論官司不加糾劾即與同罪孝友在尹積年以法自守甚著聲稱然性無骨鯁善事權勢為正直者所譏齊受禪爵例降昌弟孚字秀和少有令譽侍中游肇并州刺史高聰司徒崔光等見孚咸曰此子當準的人物恨吾徒衰暮不及見耳累遷兼尚書右丞靈太后臨朝宦者干政孚乃總括古今名妃賢后凡為四卷奏之遷左丞蠕蠕王阿那瓌既得返國其人大飢相率入塞阿那瓌上表請臺賑給詔孚為北道行臺詣彼賑恤孚陳便宜表曰皮服之人未嘗粒食宜從俗因利拯其所無昔漢建武中單于款塞時轉河東米糒二萬五千斛牛羊三萬六千頭以給之斯即前代和戎撫新柔遠之長策也乞以牸牛產羊餬其口命且畜牧繁息是其所便毛血之利惠兼衣食又尚書奏云如其仍住七州隨置之臣謂人情戀本寧肯徙內若依臣請給賑雜畜愛本重鄉必還舊土如其不然禁留益損假令逼徙事非久計何者人面獸心去留難測既易水草痾恙將多憂愁致困死亡必甚兼其餘類尚在沙磧脫出狂勃翻歸舊巢必殘掠邑里遺毒百姓亂而方塞未若杜其未萌又貿遷起於上古交易行於中世漢與胡通亦立關巿今北人阻飢命懸溝壑公給之外必求巿易彼若願求宜見聽許又云營大者不計小名圖遠者弗拘近利雖戎狄衰盛歷代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下策昔在代京為重備將帥勞止甲士疲力前世苦之計未能致今天祚大魏亂亡在彼朝廷垂天覆之恩廓大造之德鳩其散亡禮送令返宜因此時善思遠策竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓款塞漢遣董忠韓昌領邊郡士馬送出朔方因留衞助又光武時亦令中郎將段彬置安集掾史隨單于所在參察動靜斯皆守吉之元龜安邊之勝策計今朝廷成功不減曩時蠕蠕國弊亦同疇日宜準昔成謨略依舊事借其所閑地聽使田牧粗置官屬示相慰撫嚴戒邊兵以見保衞馭以仁縻以久策使親不至矯詐疏不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也又云先人有奪人之心待降如受強敵武非專外亦以防內若從處分割配諸州鎮遼遠非轉輸可到悔叛之情變起難測又居人畜業布在原野戎夷性貪見則思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州內徙復不肯從既其如此為費必大朝廷不許孚持白虎幡勞阿那瓌於柔玄懷荒二鎮間阿那瓌衆號三十萬陰有異意遂拘留孚載以轀車日給酪一升肉一段每集其衆坐孚東廂稱為行臺甚加禮敬阿那瓌遂南過至舊京後遣孚等還因上表謝罪有司以孚事下廷尉丞高謙之云孚辱命處孚流罪後拜冀州刺史孚勸課農桑境內稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八家皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力後為葛榮所陷為榮所執兄祐為防城都督兄子子禮為錄事參軍榮欲先害子禮孚請先死以贖子禮叩頭流血榮乃捨之又大集將士議其死事孚兄弟各誣己引過爭相為死又孟都潘紹等數百人皆叩頭就法請活使君榮曰此魏之誠臣義士也凡同禁五百人皆得免榮平還除冀州刺史元顥入洛授孚東道行臺彭城郡王孚封顥逆書送朝廷天子嘉之顥平封孚萬年鄉男永安末樂器殘缺莊帝命孚監儀注孚上表曰昔太和中中書監高閭太樂令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請別營造久而方就復召公卿量校合否論者沸騰莫有適從登被旨敕並見施用往歲大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前以來置宮懸四箱簨簴六架東北架編黃鍾之磬十四雖器名黃鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太蔟編於西北蕤賓列於西南並皆器象差位調律不和又有儀鍾十四虛懸架首初不叩擊今便刪廢以從正則臣今據周禮鳧氏修廣之規磬氏倨句之法吹律求聲叩鍾求音損除繁雜討論實錄依十二月為十二宮各準辰次當位懸設月聲既備隨用擊奏則會還相為宮之義又得律呂相生之體今量鍾磬之數各以十二架為定奏可于時搢紳之士咸往觀聽靡不咨嗟歎服而返太傅錄尚書長孫承業妙解聲律特復稱善後從出帝入關廣陽王建真君三年封楚王後改封廣陽王薨諡曰簡王子石侯襲薨諡曰哀王子遺興襲薨諡曰定王無子石侯弟嘉少沉敏喜慍不形於色兼有武略高祖初拜徐州刺史甚有威惠後封廣陽王以紹建後高祖南伐詔嘉斷均口嘉違失指授令賊得免帝怒責之曰叔祖定非世孫何太不上類也及將大漸遺詔以嘉為尚書左僕射與咸陽王禧等輔政遷司州牧嘉表請於京四面築坊三百二十各周一千二百步乞發三正復丁以充茲役雖有暫勞姦盜永止詔從之拜衞大將軍尚書令除儀同三司嘉好飲酒或沉醉在世宗前言笑自得無所顧忌帝以其屬尊年老常優容之與彭城北海高陽諸王每入宴集極歡彌夜數加賞賜帝亦時幸其第性好儀飾車服鮮華既居儀同又任端首出入容衞道路榮之後遷司空轉司徒嘉好立功名有益公私多所敷奏帝雅委付之愛敬人物後來才俊未為時知者侍坐之次轉加談引時人以此稱之薨遺命薄葬世宗悼惜之贈侍中太保諡曰懿烈嘉後妃宜都王穆壽孫女司空從妹也聰明婦人及為嘉妃多所匡贊光益家道子深字智遠襲爵肅宗初拜肆州刺史預行恩信胡人便之劫盜止息後為州刺史在州多所受納政以賄成私家有馬千匹者必取百匹以此為累遷殿中尚書未拜坐淫城陽王徽妃于氏為徽表訟詔付丞相高陽王雍等宗室議決其罪以王還第及沃野鎮人破六韓拔陵反叛臨淮王彧討之失利詔深為北道大都督受尚書令李崇節度時東道都督崔暹敗於白道深上書曰邊豎構逆以成紛梗其所由來非一朝也昔皇始以移防為重盛簡親賢擁麾作鎮配以高門子弟以死防遏不但不廢仕宦至乃偏得復除當時人物忻慕為之及太和在歷僕射李沖當官任事涼州土人悉免厮役豐沛舊門仍防邊戍自非得罪當世莫肯與之為伍征鎮驅使但為虞候白直一生推遷不過軍主然其往世房分留居京者得上品通官在鎮者便為清途所隔或投彼有北以御魑魅多復逃胡鄉乃峻邊兵之格鎮人浮遊在外皆聽流兵捉之於是少年不得從師長者不得遊宦獨為匪人言者流涕自定鼎伊洛邊任益輕唯底滯凡才出為鎮將轉相模習專事聚斂或有諸方姦吏犯罪配邊為之指蹤過弄官府政以賄立莫能自改咸言姦吏為此無不切齒憎怒及阿那瓌背恩縱掠竊奔命師追之十五萬衆度沙漠不日而還邊人見此援師便自意輕中國尚書令臣崇時即申聞求改鎮為州將允其願抑亦先覺朝廷未許而高闕戍主率下失和拔陵殺之敢為逆命攻城掠地所見必誅王師屢北賊黨日盛此段之舉指望銷平其崔暹隻輪不反臣崇與臣逡巡復路今者相與還次雲中馬首是瞻未便西邁將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量時不納其策東西部敕勒之叛朝議更思深言遣兼黃門侍郎酈道元為大使欲復鎮為州以順人望會六鎮盡叛不得施行深後上言今六鎮俱叛二部高車亦同惡黨以疲兵討之不必制敵請簡選兵或留守州要處更為後圖及李崇徵還深專總戎政拔陵避蠕蠕南移渡河先是別將李叔仁以拔陵來逼請求迎援深赴之前後降附二十萬人深與行臺元纂表求州北別立郡縣安置降戶隨宜賑賚息其亂心不從詔遣黃門郎楊昱分散之於冀定瀛三州就食深謂纂曰此輩復為乞活矣禍亂當由此作既而鮮于脩禮叛於定州杜洛周反於幽州其餘降戶猶在州遂欲推深為主深乃上書乞還京師令左衞將軍楊津代深為都督以深為侍中右衞將軍定州刺史時中山太守趙叔隆別駕崔融討賊失利臺使劉審考覈未訖會賊逼中山深乃令叔隆防境審馳驛還京云深擅相放縱城陽王徽與深有隙因此構之乃徵深為吏部尚書兼中領軍及深至都肅宗不欲使徽深相憾敕因宴會令相和解徽銜不已後河間王琛等為鮮于脩禮所敗乃除深儀同三司大都督章武王融為左都督裴衍為右都督並受深節度徽因奏靈太后構深曰廣陽以愛子握兵在外不可測也乃敕章武王等潛相防備融遂以敕示深深懼事無大小不敢自決靈太后聞之乃使問深意狀乃具言曰往者元叉執權移天徙日而徽託附無翼而飛今大明反政任寄唯重以徽褊心銜臣切骨臣以疏滯遠離京輦被其構阻無所不為然臣昔不在其後自此以來翻成陵谷徽遂一歲八遷位居宰相臣乃積年淹滯有功不錄自徽執政以來非但抑臣而已北征之勳皆被擁塞將士告捷終無片賞雖為表請多不蒙遂前留元標據于盛樂後被重圍析骸易子倒懸一隅嬰城二載賊散之後依階乞官徽乃盤退不允所請而徐州下邳戍主賈勳法僧叛後暫被圍逼固守之勳比之未重乃立得州即授開國天下之事其流一也功同賞異不平謂何又驃騎李崇北征之日啟募八州之人聽用關西之格及臣在後依此科賞復言北道征者不得同於關西定襄陵廟之至重平城守國之要鎮若計此而論功亦何負於秦楚但以嫉臣之故便欲望風排抑然其當途以來何直退勳而已但是隨臣征者即便為所嫉統軍袁叔和曾經省訴徽初言有理又聞北征隸臣為統應時變色復令臣兄子仲顯異端訟臣緝緝翩翩謀相誹謗言臣惡者接以恩顏稱臣善者即被嫌責甄琛曾理臣屈乃視之若仇讎徐紇頗言臣短即待之如親戚又驃騎長史祖瑩昔在軍中妄增首級矯亂戎行蠹害軍府獲罪有司避命山澤直以謗臣之故徽乃還雪其罪臣府司馬劉敬比送降人既到定州翻然背叛賊如決河豈其能擁且以臣府參僚不免身首異處徽既怒遷捨其元惡闕及胥徒從臣行者莫不悚懼頃州之人乞臣為刺史徽乃斐然言不可測及降戶結謀臣頻表啟徽乃因執言此事及向定州遠彼姦惡又復論臣將有異志翻覆如此欲相陷沒致令國朝遽賜遷代賊起之由誰使然也徽既優幸任隆一世慕勢之徒於臣何有是故餘人攝選車馬填門及臣居邊賓遊罕至臣近比為慮其為梗是以孜孜乞赴京闕屬流人舉斧元戎垂翅復從後命自安無所僶俛先驅不敢辭事及臣出都行塵未滅已聞在後復生異議言臣將兒自隨證為可疑之兆忽稱此以構亂悠悠之人復傳音響言左軍臣融右軍臣衍皆受密敕伺察臣事徽既用心如此臣將何以自安竊以天步未夷國難猶梗方伯之任於斯為急徽昔臨藩乃有人譽及居端右蔑爾無聞今求出之為州使得申其利用徽若外從所長臣無內慮之切脫蒙闕公私幸甚深以兵士頻經退散人無鬬情連營轉柵日行十里行達交津隔水而陳賊脩禮常與葛榮謀後稍信朔州人毛普賢榮常銜之普賢昔為深統軍及在交津深使人諭之普賢乃有降意又使錄事參軍元晏說賊程殺鬼果相猜貳葛榮遂殺普賢脩禮而自立榮以新得大衆上下未安遂北度瀛州深便率衆北轉榮東攻章武王融戰敗於白牛邏深遂退走趨定州聞刺史楊津疑其有異志乃止於州南佛寺停三日夜乃召都督毛諡等六七人臂肩為約危難之際期相拯恤諡疑深意異乃密告津云深謀不軌津遣諡討深深走出諡叫噪追躡深與左右行至博陵郡界逢賊遊騎乃引詣葛榮賊徒見深頗有喜者榮新自立內惡之乃害深莊帝追復王爵贈司徒公諡曰忠武子湛字士深少有風尚莊帝初襲封孝靜初累遷冀州刺史所在聚斂風政不立入為侍中後行司州牧時齊獻武王作相以湛頗有器望啟超拜太尉公薨贈假黃鉞大司馬尚書令諡曰文獻初湛名位漸重留連聲色始以婢紫光遺尚書郎中宋遊道後乃私耽出為冀州竊而攜去遊道大致紛紛乃云紫光湛父所寵湛母遺己將致公文久乃停息論者兩非之湛弟瑾尚書祠部郎後謀殺齊文襄事泄合門伏法湛子法輪紫光所生也齊王矜湛覆滅乃啟原之復其爵土南安王余真君三年封吳王後改封南安王世祖暴崩中常侍宗愛矯皇太后令迎余而立之然後發喪大赦改年為永平余自以非次而立厚賞羣下取悅於衆為長夜之飲聲樂不絕旬月之間帑藏空罄尤好弋獵出入無度邊方告難余不恤之百姓憤惋而余晏如也宗愛權恣日甚內外憚之余疑愛將謀變奪其權愛怒因余祭廟夜殺余高宗葬以王禮諡曰隱
