body:
  text: 魏書卷一百一十一刑罰志七第十六二儀既判彙品生焉五才兼用廢一不可金木水火土咸相愛惡陰陽所育稟氣呈形鼓之以雷霆潤之以雲雨春夏以生長之秋冬以殺藏之斯則德刑之設著自神道聖人處天地之間率神祇之意生民有喜怒之性哀樂之心應感而動動而逾變淳化所陶下以惇朴故異章服畫衣冠示申禁而不敢犯其流既鋭姦黠萌生是以明法令立刑賞故書曰象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑怙終賊刑眚災肆赦舜命咎繇曰五刑有服五服三就五流有宅五宅三居夏刑則大辟二百臏辟三百宮辟五百劓墨各千殷因於夏蓋有損益周禮建三典刑邦國以五聽求民情八議以申之三刺以審之左嘉石平罷民右肺石達窮民宥不識宥過失宥遺忘赦幼弱赦耄耋赦蠢愚周道既衰穆王荒耄命呂侯度作祥刑以詰四方五刑之屬增矣夫疑獄泛問與衆共之衆疑赦之必察小大之比以成之先王之愛民如此刑成而不可變故君子盡心焉逮於戰國競任威刑以相吞噬商君以法經六篇入說於秦議參夷之誅連相坐之法風俗凋薄號為虎狼及於始皇遂兼天下毀先王之典制挾書之禁法繁於秋荼網密於凝脂姦僞並生赭衣塞路獄犴淹積囹圄成市於是天下怨叛十室而九漢祖入關蠲削煩苛致三章之約文帝以仁厚斷獄四百幾致刑措孝武世以姦宄滋甚增律五十餘篇宣帝時路溫舒上書曰夫獄者天下之命書曰與其殺不辜寧失有罪今治獄吏非不慈仁也上下相毆以刻為明深者獲公名平者多後患故治獄吏皆欲人死非憎人也自安之道在人之死夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以示人吏治者利其然則指導以明之上奏畏郤則鍛練而周內之雖咎繇聽之猶以為死有餘罪何則文致之罪明也故天下之患莫深於獄宣帝善之痛乎獄吏之害也久矣故曰古之立獄所以求生今之立獄所以求殺人不可不慎也于定國為廷尉集諸法律凡九百六十卷大辟四百九十條千八百八十二事死罪決比凡三千四百七十二條諸斷罪當用者合二萬六千二百七十二條後漢二百年間律章無大增減魏武帝造甲子科條犯釱左右趾者易以斗械明帝改士民罰金之坐除婦人加笞之制晉武帝以魏制峻密又詔車騎賈充集諸儒學刪定名例為二十卷并合二千九百餘條晉室喪亂中原蕩然魏氏承百王之末屬崩散之後典刑泯棄禮俗澆薄自太祖撥亂蕩滌華夏至于太和然後吏清政平斷獄省簡所謂百年而後勝殘去殺故榷舉行事以著于篇魏初禮俗純朴刑禁疏簡宣帝南遷復置四部大人坐王庭決辭訟以言語約束刻契記事無囹圄考訊之法諸犯罪者皆臨時決遣神元因循亡所革易穆帝時劉聰石勒傾覆晉室帝將平其亂乃峻刑法每以軍令從事民乘寬政多以違命得罪死者以萬計於是國落騷駭平文承業綏集離散昭成建國二年當死者聽其家獻金馬以贖犯大逆者親族男女無少長皆斬男女不以禮交皆死民相殺者聽與死家馬牛四十九頭及送葬器物以平之無繫訊連逮之坐盜官物一備五私則備十法令明白百姓晏然太祖幼遭艱難備嘗險阻具知民之情僞及在位躬行仁厚協和民庶既定中原患前代刑網峻密乃命三公郎王德除其法之酷切於民者約定科令大崇簡易是時天下民久苦兵亂畏法樂安帝知其若此乃鎮之以玄默罰必從輕兆庶欣戴焉然於大臣持法不捨季年災異屢見太祖不豫綱紀褫頓刑罰頗為濫酷太宗即位修廢官恤民隱命南平公長孫嵩北新侯安同對理民訟庶政復有焉帝既練精庶事為吏者浸以深文避罪世祖即位以刑禁重神中詔司徒崔浩定律令除五歲四歲刑增一年刑分大辟為二科死斬死入絞大逆不道腰斬誅其同籍年十四已下腐刑女子沒縣官害其親者轘之為蠱毒者男女皆斬而焚其家巫蠱者負羖羊抱犬沉諸淵當刑者贖貧則加鞭二百畿內民富者燒炭於山貧者役於圊溷女子入舂其固疾不逮于人守苑囿王官階九品得以官爵除刑婦人當刑而孕産後百日乃決年十四已下降刑之半八十及九歲非殺人不坐拷訊不踰四十九論刑者部主具狀公車鞫辭而三都決之當死者部案奏聞以死不可復生懼監官不能平獄成皆呈帝親臨問無異辭怨言乃絶之諸州國之大辟皆先讞報乃施行闕左懸登聞鼓人有窮寃則撾鼓公車上奏其表是後民官瀆貨帝思有以肅之太延三年詔天下吏民得舉告牧守之不法於是凡庶之凶悖者專求牧宰之失迫脅在位取豪於閭閻而長吏咸降心以待之苟免而不貪暴猶自若也時輿駕數親征討及行幸四方真君五年命恭宗總百揆監國少傅游雅上疏曰殿下親覽百揆經營內外昧旦而興咨詢國老臣職忝疑承司是獻替漢武時始啓河右四郡議諸疑罪而謫徙之十數年後邊郡充實並修農戍孝宣因之以服北方此近世之事也帝王之於罪人非怒而誅之欲其徙善而懲惡謫徙之苦其懲亦深自非大逆正刑皆可從徙雖舉家投遠欣喜赴路力役終身不敢言苦且遠流分離心或思善如此姦邪可息邊垂足備恭宗善其言然未之行六年春以有司斷法不平詔諸疑獄皆付中書依古經義論決之初盜律贓四十匹致大辟民多慢政峻其法贓三匹皆死正平元年詔曰刑網大密犯者更衆朕甚愍之其詳案律令務求厥中有不便於民者增損之於是游雅與中書侍郎胡方回等改定律制盜律復舊加故縱通情止舍之法及他罪凡三百九十一條門誅四大辟一百四十五刑二百二十一條有司雖增損條章猶未能闡明刑典高宗初仍遵舊式太安四年始設酒禁是時年穀屢登士民多因酒致酗訟或議主政帝惡其若此故一切禁之釀沽飲皆斬之吉凶賓親則開禁有日程增置內外候官伺察諸曹外部州鎮至有微服雜亂於府寺間以求百官疵失其所窮治有司苦加訊惻而多相誣逮輒劾以不敬諸司官贓二丈皆斬又增律七十九章門房之誅十有三大辟三十五刑六十二和平末冀州刺史源賀上言自非大逆手殺人者請原其命謫守邊戍詔從之顯祖即位除口誤開酒禁帝勤於治功百僚內外莫不震肅及傳位高祖猶躬覽萬機刑政嚴明顯拔清節沙汰貪鄙牧守之廉潔者往往有聞焉延興四年詔自非大逆干紀者皆止其身罷門房之誅自獄付中書覆案後頗上下法遂罷之獄有大疑乃平議焉先是諸曹奏事多有疑請又口傳詔敕或致矯擅於是事無大小皆令據律正名不得疑奏合則制可失衷則彈詰之盡從中墨詔自是事咸精詳下莫敢相罔顯祖末年尤重刑罰言及常用惻愴每於獄案必令覆鞫諸有囚繫或積年不斷羣臣頗以為言帝曰獄滯雖非治體不猶愈乎倉卒而濫也夫人幽苦則思善故囹圄與福堂同居朕欲其改悔而加以輕恕耳由是囚繫雖淹滯而刑罰多得其所又以赦令屢下則狂愚多僥幸故自延興終於季年不復下赦理官鞫囚杖限五十而有司欲免之則以細捶欲陷之則先大杖民多不勝而誣引或絶命於杖下顯祖知其若此乃為之制其捶用荊平其節訊囚者其本大三分杖背者二分撻脛者一分拷悉依令皆從於輕簡也高祖馭宇留心刑法故事斬者皆裸形伏質入死者絞雖有律未之行也太和元年詔曰刑法所以禁暴息姦絶其命不在裸形其參詳舊典務從寬仁司徒元丕等奏言聖心垂仁恕之惠使受戮者免裸骸之普天感德莫不幸甚臣等謹議大逆及賊各棄市袒斬盜及吏受賕各絞刑踣諸甸師又詔曰民由化穆非嚴刑所制防之雖峻陷者彌甚今犯法至死同入斬刑去衣裸體男女媟見豈齊之以法示之以禮者也今具為之制三年下詔曰治因政寬弊由網密今候職千數姦巧弄威重罪受賕不列細過吹毛而舉其一切罷之於是更置謹直者數百人以防喧鬬於街術吏民安其職業先是以律令不具姦吏用法致有輕重詔中書令高閭集中祕官等修改舊文隨例增減又敕羣官參議厥衷經御刊定五年冬訖凡八百三十二章門房之誅十有六大辟之罪二百三十五刑三百七十七除羣行剽劫首謀門誅律重者止梟首時法官及州郡縣不能以情折獄乃為重枷大幾圍復以縋石懸於囚頸傷內至骨更使壯卒迭搏之囚率不堪因以誣服吏持此以為能帝聞而傷之乃制非大逆有明證而不款辟者不得大枷律枉法十匹義贓二百匹大辟至八年始班祿制更定義贓一匹枉法無多少皆死是秋遣使者巡行天下糾守宰之不法坐贓死者四十餘人食祿者局蹐賕謁之路殆絶帝哀矜庶獄至於奏讞率從降恕全命徙邊歲以千計京師決死獄歲竟不過五六州鎮亦簡十一年春詔曰三千之罪莫大於不孝而律不遜父母罪止髠刑於理未衷可更詳改又詔曰前命公卿論定刑典而門房之誅猶在律策違失周書父子異罪推古求情意甚無取可更議之刪除繁酷秋八月詔曰律文刑限三年便入極默坐無太半之校罪有死生之殊可詳案律條諸有此類更一刊定冬十月復詔公卿令參議之十二年詔犯死罪若父母祖父母年老更無成人子孫又無期親者仰案後列奏以待報著之令格世宗即位意在寬政正始元年冬詔曰議獄定律有國攸慎輕重損益世或不同先朝垂心典憲刊革令軌但時屬征役未之詳究施於時用猶致疑舛尚書門下可於中書外省論律令諸有疑事斟酌新舊更加思理增減上下必令周備隨有所立別以申聞庶於循變協時永作通制永平元年秋七月詔尚書檢枷杖大小違制之由科其罪失尚書令高肇尚書僕射清河王懌尚書邢巒尚書李平尚書江陽王繼等奏曰臣等聞王者繼天子物為民父母導之以德化齊之以刑法小大必以情哀矜而勿喜務於三訊五聽不以木石定獄伏惟陛下子愛蒼生恩侔天地疏網改祝仁過商后以枷杖之非度愍民命之或傷爰降慈旨廣垂昭恤雖有虞慎獄之深漢文惻隱之至亦未可共日而言矣謹案獄官令諸察獄先備五聽之理盡求情之意又驗諸證信事多疑似猶不首實者然後加以拷掠諸犯年刑已上枷鎖流徙已上增以杻械迭用不俱非大逆外叛之罪皆不大枷高杻重械又無用石之文而法官州郡因緣增加遂為法進乖五聽退違令文誠宜案劾依旨科處但踵行已久計不推坐檢杖之小大鞭之長短令有定式但枷之輕重先無成制臣等參量造大枷長一丈三尺喉下長一丈通頰木各方五寸以擬大逆外叛杻械以掌流刑已上諸臺寺州郡大枷請悉焚之枷本掌囚非拷訊所用從今斷獄皆依令盡聽訊之理量人強弱加之拷掠不聽非法拷人兼以拷石自是枷杖之制頗有定準未幾獄官肆虐稍復重大法例律五等列爵及在官品令從第五以階當刑二歲免官者三載之後聽仕降先階一等延昌二年春尚書邢巒奏竊詳王公已下或析體宸極或著勳當時咸胙土授民維城王室至於五等之爵亦以功錫雖爵秩有異而號擬河山得之至難失之永墜刑典既同名復殊絶請議所宜附為永制詔議律之制與八坐門下參論皆以為官人若罪本除名以職當刑猶有餘資復降階而叙至於五等封爵除刑若盡永即甄削便同之除名於例實爽愚謂自王公以下有封邑罪除名三年之後宜各降本爵一等王及郡公降為縣公公為侯侯為伯伯為子子為男至于縣男則降為鄉男五等爵者亦依此而降至於散男其鄉男無可降授者三年之後聽依其本品之資出身詔從之其年秋符璽郎中高賢弟員外散騎侍郎仲賢叔司徒府主簿六珍等坐弟季賢同元愈逆除名為民會赦之後被旨勿論尚書邢巒奏案季賢既受逆官為其傳檄規扇幽瀛遘茲禍亂據律準犯罪當孥戮兄叔坐法法有明典賴蒙大宥身命獲全除名還民於其為幸然反逆坐重故支屬相及體既相及事同一科豈有赦前皆從流斬之罪赦後獨除反者之身又緣坐之罪不得以職除流且貨賕小愆寇盜微戾贓狀露驗者赦猶除其名何有罪極裂冠釁均毀冕父子齊刑兄弟共罰赦前同斬從流赦後有復官之理依律則罪合孥戮準赦則例皆除名古人議無將之罪者毀其室汙其宮絶其蹤滅其類其宅猶棄而況人乎請依律處除名為民詔曰死者既在赦前又員外非在正侍之限便可悉聽復仕三年尚書李平奏冀州阜城民費羊皮母亡家貧無以葬賣七歲子與同城人張回為婢回轉賣於鄃縣民梁定之而不言良狀案盜律掠人掠賣人和賣人為奴婢者死回故買羊皮女謀以轉賣依律處絞刑詔曰律稱和賣人者謂兩人詐取他財今羊皮賣女告回稱良張回利賤知良公買誠於律俱乖而兩各非詐此女雖父賣為婢體本是良回轉賣之日應有遲疑而決從真賣於情不可更推例以為永式廷尉少卿楊鈞議曰謹詳盜律掠人掠賣人為奴婢者皆死別條賣子孫者一歲刑賣良是一而刑死懸殊者由緣情制罰則致罪有差又詳群盜強盜首從皆同和掠之罪固應不異及知人掠盜之物而故買者以隨從論然五服相賣皆有明條買者之罪律所不載竊謂同凡從法其緣服相減者宜有差買者之罪不得過於賣者之咎也但羊皮賣女為婢不言追贖張回真買謂同家財至於轉鬻之日不復疑慮緣其買之於女父便賣之於他人准其和掠此有因緣之類也又詳恐喝條注尊長與之已決恐喝幼賤求之然恐喝體同而不受恐喝之罪者以尊長與之已決故也而張回本買婢於羊皮乃真賣於定之准此條例得先有由推之因緣理頗相類即狀准條處流為允三公郎中崔鴻議曰案律賣子有一歲刑賣五服內親屬在尊長者死期親及妾與子婦流唯買者無罪文然賣者既以有罪買者不得不坐但賣者以天性難奪支屬易遺尊卑不同故罪有異買者知良故買又於彼無親若買同賣者即理不可何者賣五服內親屬在尊長者死此亦非掠從其真買暨於致罪刑死大殊明知買者之坐自應一例不得全如鈞議云買者之罪不過賣者之咎也且買者於彼無天性支屬之義何故得有差等之理又案別條知人掠盜之物而故買者以隨從論依此律文知人掠良從其宜買罪止於流然其親屬相賣坐殊凡掠至於買者亦宜不等若處同流坐於法為深準律斟降合刑五歲至如買者知是良人決便真賣不語前人得之由緒前人謂真奴婢更或轉賣因此流漂罔知所在家人追贖求訪無處永沉賤隸無復良期案其罪狀與掠無異且法嚴而姦易息政寬而民多犯水火之喻先典明文今謂買人親屬而復決賣不告前人良狀由緒處同掠罪太保高陽王雍議曰州處張回專引盜律檢回所犯本非和掠保證明然去盜遠矣今引以盜律之條處以和掠之罪原情究律實為乖當如臣鈞之議知買掠良人者本無罪文何以言之羣盜強盜無首從皆同和掠之罪故應不異明此自無正條引類以結罪臣鴻以轉賣流漂罪與掠等可謂罪人斯得案賊律云謀殺人而發覺者流從者五歲刑已傷及殺而還蘇者死從者流已殺者斬從而加功者死不加者流詳沉賤之與身死流漂之與腐骨一存一亡為害孰甚然賊律殺人有首從之科盜人賣買無唱和差等謀殺之與和掠同是良人應為準例所以不引殺人減之降從強盜之一科縱令謀殺之與強盜俱得為例而似從輕其義安在又云知人掠盜之物而故買者以隨從論此明禁暴掠之原遏姦盜之本非謂市之於親尊之手而同之於盜掠之刑竊謂五服相賣俱是良人所以容有差等之罪者明去掠盜理遠故從親疏為差級尊卑為輕重依律諸共犯罪皆以發意為首明賣買之元有由魁末之坐宜定若羊皮不云賣則回無買心則羊皮為元首張回為從坐首有沾刑之科從有極默之戾推之憲律法刑無據買者之罪宜各從賣者之坐又詳臣鴻之議有從他親屬買得良人而復真賣不語後人由狀者處同掠罪既一為婢賣與不賣俱非良人何必以不賣為可原轉賣為難恕張回之愆宜鞭一百賣子葬親孝誠可美而表賞之議未聞刑罰之科已降恐非敦風厲俗以德導民之謂請免羊皮之罪公酬賣直詔曰羊皮賣女葬母孝誠可嘉便可特原張回雖買之於父不應轉賣可刑五歲先是皇族有譴皆不持訊時有宗士元顯富犯罪須鞫宗正約以舊制尚書李平奏以帝宗磐固周布於天下其屬籍疏遠蔭官卑末無良犯憲理須推究請立限斷以為定式詔曰雲來綿遠繁衍世滋植籍宗氏而為不善量亦多矣先朝既無不訊之格而空相矯恃以長違暴諸在議請之外可悉依常法其年六月兼廷尉卿元志監王靖等上言檢除名之例依律文獄成謂處罪案成者寺謂犯罪徑彈後使覆檢鞫證定刑罪狀彰露案署分昞獄理是成若使案雖成雖已申省事下廷尉或寺以情狀未盡或邀駕撾鼓或門下立疑更付別使者可從未成之條其家人陳訴信其專辭而阻成斷便是曲遂於私有乖公體何者五詐既窮六備已立僥幸之輩更起異端進求延罪於漏刻退希不測之恩宥辨以惑正曲以亂直長民姦於下隳國法於上竊所未安大理正崔纂評楊機丞甲休律博士劉安元以為律文獄已成及決竟經所綰而疑有姦欺不直於法及訴寃枉者得攝訊覆治之檢使處罪者雖已案成御史風彈以痛誣伏或拷不承引依證而科或有私嫌強逼成罪家人訴枉辭案相背刑憲不輕理須訊鞫既為公正豈疑於私如謂規不測之澤抑絶訟端則枉滯之徒終無申理若從其案成便乖覆治之律然未判經赦及覆治理狀真僞未分承前以來如此例皆得復職愚謂經奏遇赦及已覆治得為獄成尚書李韶奏使雖結案處上廷尉解送至省及家人訴枉尚書納辭連解下鞫未檢遇宥者不得為案成之獄推之情理謂崔纂等議為允詔從之熙平中有冀州妖賊延陵王買負罪逃亡赦書斷限之後不自歸首廷尉卿裴延俊上言法例律諸逃亡赦書斷限之後不自歸首者復罪如初依賊律謀反大逆處買梟首其延陵法喅等所謂月光童子劉景暉者妖言惑衆事在赦後亦合死坐正崔纂以為景暉云能變為蛇雉此乃傍人之言雖殺暉為無理恐赦暉復惑衆是以依違不敢專執當今不諱之朝不應行無罪之戮景暉九歲小兒口尚乳臭舉動云為並不關己月光之稱不出其口皆姦吏無端橫生粉墨所謂為之者巧殺之者能若以妖言惑衆據律應死然更不破惑衆赦令之後方顯其事律令之外更求其罪赦律何以取信於天下天下焉得不疑於赦律乎書曰與殺無辜寧失有罪又案法例律八十已上八歲已下殺傷論坐者上請議者謂悼耄之罪不用此律愚以老智如尚父少惠如甘羅此非常之士可如其議景暉愚小自依凡律靈太后令曰景暉既經恩宥何得議加橫罪可謫略陽民餘如奏時司州表河東郡民李憐生行毒藥案以死坐其母訴稱一身年老更無期親例合上請檢籍不謬未及判申憐母身喪州斷三年服終後乃行決司徒法曹參軍許琰謂州判為允主簿李瑒駁曰案法例律諸犯死罪若祖父母父母年七十已上無成人子孫旁無期親者具狀上請流者鞭笞留養其親終則從流不在原赦之例檢上請之言非應府州所決毒殺人者斬妻子流計其所犯實重餘憲準之情律所虧不淺且憐既懷鴆毒之心謂不可參鄰人伍計其母在猶宜闔門投畀況今死也引以三年之禮乎且給假殯葬足示仁寬今已卒哭不合更延可依法處斬流其妻子實足誡彼氓庶肅是刑章尚書蕭寶夤奏從瑒執詔從之舊制直閣直後直齊武官隊主隊副等以比視官至於犯譴不得除罪尚書令任城王澄奏案諸州中正亦非品令所載又無祿恤先朝已來皆得當刑直閣等禁直上下有宿衛之勤理不應異靈太后令準中正神龜中蘭陵公主駙馬都尉劉輝坐與河陰縣民張智壽妹容妃陳慶和妹慧猛姦亂耽惑毆主傷胎輝懼罪逃亡門下處奏各入死刑智壽慶和並以知情不加防限處以流坐詔曰容妃慧猛恕死髠鞭付宮餘如奏尚書三公郎中崔纂執曰伏見旨募若獲劉輝者職人賞二階白民聽出身進一階厮役免役奴婢為良案輝無叛逆之罪賞同反人劉宣明之格又尋門下處奏以容妃慧猛與輝私姦兩情耽惑令輝挾忿毆主傷胎雖律無正條罪合極法並處入死其智壽等二家配敦煌為兵天慈廣被不即依決雖恕其命竊謂未可夫律令高皇帝所以治天下不為喜怒增減不由親疏改易案鬬律祖父母父母忿怒以兵刃殺子孫者五歲刑毆殺者四歲刑若心有愛憎而故殺者各加一等雖王姬下降貴殊常妻然人婦之孕不得非子又依永平四年先朝舊格諸刑流及死皆首罪判定後決從者事必因本以求支獄若以輝逃避便應懸處未有捨其首罪而成其末愆流死參差或時未允門下中禁大臣職在敷奏昔邴吉為相不存鬬斃而問牛喘豈不以司別故也案容妃等罪止於姦私若擒之穢席衆證分明即律科處不越刑坐何得同宮掖之罪齊奚官之役案智壽口訴妹適司士曹參軍羅顯貴已生二女於其夫則他家之母禮云婦人不二夫猶曰不二天若私門失度罪在於夫釁非兄弟昔魏晉未除五族之刑有免子戮母之坐何曾諍之謂在室之女從父母之刑已醮之婦從夫家之刑斯乃不刊之令軌古今之通議律期親相隱之謂凡罪況姦私之醜豈得以同氣相證論刑過其所犯語情又乖律憲案律姦罪無相緣之坐不可借輝之忿加兄弟之刑夫刑人於市與衆棄之爵人於朝與衆共之明不私於天下無欺於耳目何得以非正刑書施行四海刑名一失駟馬不追既有詔旨依即行下非律之案理宜更請尚書元修義以為昔哀姜悖禮於魯齊侯取而殺之春秋所譏又夏姬罪濫於陳國但責徵舒而不非父母明婦人外成犯禮之愆無關本屬況出適之妹釁及兄弟乎右僕射游肇奏言臣等謬參樞轄獻替是司門下出納謨明常則至於無良犯法職有司存劾罪結案本非其事容妃等姦狀罪止於刑並處極法準律未當出適之女坐及其兄推據典憲理實為猛又輝雖逃刑罪非孥戮募同大逆亦謂加重乖律之案理宜陳請乞付有司重更詳議詔曰輝悖法亂理罪不可縱厚賞懸募必望擒獲容妃慧猛與輝私亂因此耽惑主致非常此而不誅將何懲肅且已醮之女不應坐及昆弟但智壽慶和知妹姦情初不防禦招引劉輝共成淫醜敗風穢化理深其罰特敕門下結獄不拘司豈得一同常例以為通準且古有詔獄寧復一歸大理而尚書治本納言所屬弗究悖理之淺深不詳損化之多少違彼義途苟存執憲殊乖任寄深合罪責崔纂可免郎都坐尚書悉奪祿一時孝昌已後天下淆亂法令不或寬或猛及爾朱擅權輕重肆意在官者多以深酷為能至遷鄴京畿群盜頗起有司奏立嚴制諸強盜殺人者首從皆斬妻子同籍配為樂戶其不殺人及贓不滿五匹魁首斬從者死妻子亦為樂戶小盜贓滿十匹已上魁首死妻子配驛從者流侍中孫騰上言謹詳法若畫一理尚不二不可喜怒由情而致輕重案律公私劫盜罪止流刑而比執事苦違好為穿鑿律令之外更立餘條通相糾之路班捉獲之賞斯乃刑書徒設獄訟更煩法令滋彰盜賊多有非所謂不嚴而治遵守典故者矣臣以為升平之美義在省刑陵遲之弊必由峻法是以漢約三章天下歸德秦酷五刑率士瓦解禮訓君子律禁小人舉罪定名國有常辟至如眚災肆赦怙終賊刑經典垂言國朝成範隨時所用各有司存不宜巨細滋煩令民豫備恐防之彌堅攻之彌甚請諸犯盜之人悉准律令以明憲庶使刑殺折衷不得棄本從末詔從之天平後遷移草創百司多不奉法貨賄公行興和初齊文襄王入輔朝政以公平肅物大改其風至武定中法令嚴明四海知治矣
