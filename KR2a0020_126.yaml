body:
  text: 魏書卷一百一十食貨志六第十五夫為國為家者莫不以穀貨為本故洪範八政以食為首其在易曰聚人曰財周禮以九職任萬民以九賦斂財賄是以古先哲王莫不敬授民時務農重穀躬親千畝貢賦九州且一夫不耕一女不織或受其飢寒者飢寒迫身不能保其赤子攘竊而犯法以至於殺身迹其所由王政所陷也夫百畝之內勿奪其時易其田疇薄其稅斂民可使富也既飽且富而仁義禮節生焉亦所謂衣食足識榮辱也晉末天下大亂生民道盡或死於干戈或斃於飢饉其幸而自存者蓋十五焉太祖定中原接喪亂之弊兵革並起民廢農業方事雖殷然經略之先以食為本使東平公儀墾闢河北自五原至于棝陽塞外為屯田初登國六年破衛辰收其珍寶畜産名馬三十餘萬牛羊四百餘萬漸增國用既定中山分徙吏民及徒何種人工伎巧十萬餘家以充京都各給耕牛計口授田天興初制定京邑東至代郡西及善無南極陰館北盡參合為畿內之田其外四方四維置八部帥以監之勸課農耕量校收入以為殿最又躬耕籍田率先百姓自後比歲大熟匹中八十餘斛是時戎車不息雖頻有年猶未足以久贍矣太宗永興中頻有水旱詔簡宮人非所當御及非執作伎巧自餘出賜魚衆民神瑞二年又不熟京畿之內路有行饉帝以飢將遷都於鄴用博士崔浩計乃止於是分簡尤貧者就食山東敕有司勸課留農者曰前志有之人生在勤勤則不匱凡庶民之不畜者祭無牲不耕者祭無盛不樹者死無槨不蠶者衣無帛不績者喪無衰教行三農生殖九穀教行園囿育長草木教行虞衡山澤作材教行藪牧養蕃鳥獸教行百工飭成器用教行商賈阜通貨賄教行嬪婦化治絲枲教行臣妾事勤力役自是民皆力勤故歲數豐穰畜牧滋息泰常六年詔六部民羊滿百口調戎馬一匹世祖即位開拓四海以五方之民各有其性故修其教不改其俗齊其政不易其宜納其方貢以充倉釰收其貨物以實庫藏又於歲時取鳥獸之登於俎用者以牣膳府先是禁網疏闊民多逃隱天興中詔採諸漏戶令輸綸綿自後諸逃戶占為細繭羅縠者甚衆於是雜營戶帥遍於天下不隸守宰賦役不周戶口錯亂始光三年詔一切罷之以屬郡縣神二年帝親御六軍略地廣漠分命諸將窮追蠕蠕東至浣海西接張掖北度燕然山大破之虜其種落及馬牛雜畜方物萬計其後復遣成周公萬度歸西伐焉耆其王鳩尸卑那單騎奔龜茲舉國臣民負錢懷貨一時降款獲其奇寶異玩以巨萬駝馬雜畜不可勝數度歸遂入龜茲復獲其殊方瓌詭之物億萬已上是時方隅未克帝屢親戎駕而委政於恭宗真君中恭宗下令修農職之教事在帝紀此後數年之中軍國用足矣高宗時牧守之官頗為貨利太安初遣使者二十餘輩循行天下觀風俗視民所疾苦詔使者察諸州郡墾殖田畝飲食衣服閭里虛實盜賊劫掠貧富強劣而罰之自此牧守頗改前弊民以安業自太祖定中原世祖平方難收獲珍寶府藏盈積和平二年秋詔中尚方作黃金合盤十二具徑二尺二寸鏤以白銀鈿以玫瑰其銘曰九州致貢殊域來賓乃作茲器錯用具珍煆以紫金鏤以白銀範圍擬載吐耀含真纖文麗質若化若神皇王御之百福惟新其年冬詔出內庫綾綿布帛二十萬匹令內外百官分曹賭射四年春詔賜京師之民年七十已上太官食以終其身顯祖即位親行儉素率先公卿思所以賑益黎庶至天安皇興間歲頻大旱絹匹千錢劉彧淮北青冀徐兗司五州告亂請降命將率衆以援之既臨其境青冀懷二進軍圍之數年乃拔山東之民咸勤於征戍轉運帝深以為念遂因民貧富為租輸三等九品之制千里內納粟千里外納米上三品戶入京師中三品入他州要倉下三品入本州先是太安中高宗以常賦之外雜調十五頗為煩重將與除之尚書毛法仁曰此是軍國資用今頓罷之臣愚以為不可帝曰使地利無窮民力不竭百姓有餘吾孰與不足遂免之未幾復調如前至是乃終罷焉於是賦斂稍輕民復贍矣舊制民間所織絹布皆幅廣二尺二寸長四十尺為一匹六十尺為一端令任服用後乃漸至濫惡不依尺度高祖延興三年秋七月更立嚴制令一準前式違者罪各有差有司不檢察與同罪太和八年始準古班百官之祿以品第各有差先是天下戶以九品混通戶調帛二匹絮二斤絲一斤粟二十石又入帛一匹二丈委之州庫以供調外之費至是戶增帛三匹粟二石九斗以為官司之祿後增調外帛滿二匹所調各隨其土所出其司冀雍華定相泰洛豫懷兗陝徐青齊濟南豫東兗東徐十九州貢綿絹及絲幽平并肆岐涇荊涼梁汾秦安營豳夏光郢東秦司州萬年雁門上谷靈丘廣寧平涼郡懷州邵上郡之長平白水縣青州北海郡之膠東縣平昌郡之東武平昌縣高密郡之昌安高密夷安黔陬縣泰州河東之蒲坂汾陰縣東徐州東莞郡之莒諸東莞縣雍州馮翊郡之蓮祙縣咸陽郡之寧夷縣北地郡之三原雲陽銅官宜君縣華州華山郡之夏陽縣徐州北濟陰郡之離狐豐縣東海郡之贛榆襄賁縣皆以麻布充稅九年下詔均給天下民田諸男夫十五以上受露田四十畝婦人二十畝奴婢依良丁牛一頭受田三十畝限四牛所授之田率倍之三易之田再倍之以供耕作及還受之盈縮諸民年及課則受田老免及身沒則還田奴婢牛隨有無以還受諸桑田不在還受之限但通入倍田分於分雖盈沒則還田不得以充露田之數不足者以露田充倍諸初受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔榆棗奴各依良限三年種畢不畢奪其不畢之地於桑榆地分雜蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為世業身終不還從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之土男夫及課別給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉戶老小癃殘無授田者年十一已上及癃者各授以半夫田年踰七十者不還所受寡婦守志者雖免課亦授婦田諸還受民田以正月若始受田而身亡及賣買奴婢牛者皆至明年正月乃得還受諸土廣民稀之處隨力所及官借民種蒔役有土居者依法封授諸地狹之處有進丁受田而不樂遷者則以其家桑田為正田分又不足不給倍田又不足家內人別減分無桑之鄉準此為法樂遷者聽逐空荒不限異州他郡唯不聽避勞就逸其地足之處不得無故而移諸民有新居者三口給地一畝以為居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者從所近若同時俱受先貧後富再倍之田放此為法諸遠流配謫無子孫及戶絶者墟宅桑榆盡為公田以供授受授受之次給其所親未給之間亦借其所親諸宰民之官各隨地給公田刺史十五頃太守十頃治中別駕各八頃縣令郡丞六頃更代相付賣者坐如律魏初不立三長故民多蔭附蔭附者皆無官役豪強徵斂倍於公賦十年給事中李沖上言宜準古五家立一鄰長五鄰立一里長五里立一黨長長取鄉人強謹者鄰長復一夫里長二黨長三所復復征戍餘若民三載亡愆則陟用陟之一等其民調一夫一婦帛一匹粟二石民年十五以上未娶者四人出一夫一婦之調奴任耕婢任績者八口當未娶者四耕牛二十頭當奴婢八其麻布之鄉一夫一婦布一匹下至牛以此為降大率十匹為公調二匹為調外費三匹為內外百官俸此外雜調民年八十已上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長內迭養食之書奏諸官通議稱善者衆高祖從之於是遣使者行其事乃詔曰夫任土錯貢所以通有無井乘定賦所以均勞逸有無通則民財不匱勞逸均則人樂其業此自古之常道也又鄰里鄉黨之制所由來久欲使風教易周家至日見以大督小從近及遠如身之使手幹之總條然後口算平均義興訟息是以三典所同隨世汙隆二監之行從時損益故鄭僑復丘賦之術鄒人獻盍徹之規雖輕重不同而當時俱適自昔以來諸州戶口籍貫不實包藏隱漏廢公罔私富強者并兼有餘貧弱者糊口不足賦稅齊等無輕重之殊力役同科無衆寡之別雖建九品之格而豐埆之土未融雖立均輸之楷而蠶績之鄉無異致使淳化未樹民情偷薄朕每思之良懷深慨今革舊從新為里黨之法在所牧守宜以喻民使知去煩即簡之要初百姓咸以為不若循常豪富并兼者尤弗願也事施行後計省昔十有餘倍於是海內安之十一年大旱京都民飢加以牛疫公私闕乏時有以馬驢及橐駝供駕挽耕載詔聽民就豐行者十五六道路給糧稟至所在三長贍養之遣使者時省察焉留業者皆令主司審核開倉賑貸其有特不自存者悉檢集為粥於術衢以救其困然主者不明牧察郊甸間甚多餧死者時承平日久府藏盈積詔盡出御府衣服珍寶太官雜器太僕乘具內庫弓矢刀鉾十分之八外府衣物繒布絲纊諸所供國用者以其太半班齎百司下至工商皂隸逮于六鎮邊戍畿內魚衆寡孤獨貧癃者皆有差十二年詔羣臣求安民之術有司上言請析州郡常調九分之二京都度支歲用之餘各立官司豐年糴貯於倉時儉則加私之一糶之於民如此民必力田以買絹積財以取粟官年登則常積歲凶則直給又別立農官取州郡戶十分之一以為屯民相水陸之宜斷頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歲責六十斛甄其正課并征戍雜役行此二事數年之中則穀積而民足矣帝覽而善之尋施行焉自此公私豐贍雖時有水旱不為災也世祖之平統萬定秦隴以河西水草善乃以為牧地畜産滋息馬至二百餘萬匹橐駝將半之牛羊則無數高祖即位之後復以河陽為牧場置戎馬十萬匹以擬京師軍警之備每歲自河西徙牧於并州以漸南轉欲其習水土而無死傷也而河西之牧彌滋矣正光以後天下喪亂遂為羣寇所盜掠焉世宗延昌三年春有司奏長安驪山有銀礦二石得銀七兩其年秋州又上言白登山有銀礦八石得銀七兩錫三百餘斤其色潔白有踰上品詔並置銀官常令採鑄又漢中舊有金戶千餘家常於漢水沙淘金年終總輸後臨淮王彧為梁州刺史奏罷之其鑄鐵為農器兵刃在所有之然以相州牽口冶為工故常鍊鍛為刀送於武庫自魏德既廣西域東夷貢其珍物充於王府又於南垂立互市以致南貨羽毛齒革之屬無遠不至神龜正光之際府藏盈溢靈太后曾令公卿已下任力負物而取之又數賚禁內左右所費無資而不能一丐百姓也自徐揚內附之後仍世經略江淮於是轉運中州以實邊鎮百姓疲於道路乃令番戍之兵營起屯田又收內郡兵資與民和糴積為邊備有司又請於水運之次隨便置倉乃於小平石門白馬津漳涯黑水濟州陳郡大梁凡八所各立邸閣每軍國有須應機漕引自此費役微省三門都將薛欽上言計京西水次汾華二州農河北河東正平平陽五郡年常綿絹及資麻皆折公物雇車牛送京道險人弊費公損私略計華州一車官酬絹八匹三丈九尺別有私民雇價布六十匹河東一車官酬絹五匹二丈別有私民雇價布五十匹自餘州郡雖未練多少推之遠近應不減此今求車取雇絹三匹市材造船不勞採斫計船一艘舉十三車車取三匹合有三十九匹雇作手并匠及船上雜具食直足以成船計一船剩絹七十八匹布七百八十匹又租車一乘官格四十斛成載私民雇價遠者五斗布一匹近者一石布一匹準其私費一車布遠者八十匹近者四十匹造船一艘計舉七百石準其雇價應有一千四百匹今取布三百匹造船一艘并船上覆治雜事計一船有剩布一千一百匹又其造船之處皆須鋸材人功并削船茹依功多少即給當州郡門兵不假更召汾州有租調之處去汾不過百里華州去河不滿六十並令計程依舊酬價車送船所船之所運唯達陂其陸路從陂至倉庫調一車雇絹一匹租一車布五匹則於公私為便尚書度支郎中朱元旭計稱效立於公濟民為本政列於朝潤國是先故大禹疏決以通四載之宜有漢穿引受納百川之用厥績顯於當時嘉聲播於圖史今校薛欽之説雖迹驗未彰而指況甚善所云以船代車是其策之長者若以門兵造舟便為闕彼防禦無容全依宜令取雇車之物市材執作及倉庫所須悉以營辦七月之始十月初旬令州郡綱典各受租調於將所然後付之十車之中留車士四人佐其守護粟帛上船之日隨運至京將共監慎如有耗損同其陪徵河中缺失專歸運司輸京之時聽其即納不得雜合違失常體必使量上數下謹其受入自餘一如其列計底柱之難號為天險迅驚千里未易其功然既陳便利無容輒抑若效充其説則附例酬庸如其不驗徵填所損今始開創不可懸生減折具依請營立一年之後須知贏費歲遣御史校其虛實脫有乖越別更裁量尚書崔休以為刳木為舟用興上代鑿渠通運利盡中古是以漕挽河渭留侯以為偉談方舟蜀漢酈生稱為口實豈直張純之奏見美東都陳協之功事高晉世其為利益所從來久矣案欽所列實允事宜郎中之計備盡公理但舟楫所通遠近必至苟利公私不宜止在前件昔人乃遠通褒斜以利關中之漕南達交廣以增京洛之饒況乃漳洹夷路河濟平流而不均彼省煩同茲巨益且鴻溝之引宋衛史牒具存討虜之通幽冀古迹備在舟車省益理實相懸水陸難易力用不等昔忝東州親徑驗斯損益不可同年而語請諸通水運之處皆宜率同此式縱復五百三百里車運水次校計利饒猶為不少其欽所列州郡如請興造東路諸州皆先通水運今年租調悉用舟楫若船數有闕且賃假充事比之僦車交成息耗其先未通流宜遣檢行間月修治使理有可通必無壅滯如此則發召匪多為益實廣一爾暫勞久安永逸録尚書高陽王雍尚書僕射李崇等奏曰運漕之利今古攸同舟車息耗實相殊絶欽之所列關西而已若域內同行足為公私巨益謹輒參量備如前計庶徵召有減勞止小康若此請蒙遂必須溝洫通流即求開興修築或先以開治或古迹仍在舊事可因用功差易此冬間月令疏通咸訖比春水之時使運漕無滯詔從之而未能盡行也正光後四方多事加以水旱國用不足預折天下六年租調而徵之百姓怨苦民不堪命有司奏斷百官常給之酒計一歲所省合米五萬三千五十四斛九升孽穀六千九百六十斛三十萬五百九十九斤其四時郊廟百神羣祀依式供營遠蕃使客不在斷限爾後寇賊轉衆諸將出征相繼奔敗所亡器械資糧不可勝數而關西喪失尤甚帑藏益以空竭有司又奏內外百官及諸蕃客稟食及肉悉二分減一計終歲省肉百五十九萬九千八百五十六斤米五萬三千九百三十二石孝昌二年冬稅京師田租畝五升借賃公田者畝一斗又稅市入者人一錢其店舍又為五等收稅有差莊帝初承喪亂之後倉廩虛罄遂班入粟之制輸粟八千石賞散侯六千石散伯四千石散子三千石散男職人輸七百石賞一大階授以實官白民輸五百石聽依第出身一千石加一大階無第者輸五百石聽正九品出身一千石加一大階諸沙門有輸粟四千石入京倉者授本州統若無本州者授大州都若不入京倉入外州郡倉者三千石畿郡都統依州格若輸五百石入京倉者授本郡維那其無本郡者授以外郡粟入外州郡倉七百石者京倉三百石者授縣維那孝靜天平初以遷民草創資産未立詔出粟一百三十萬石以賑之三年夏又賑遷民稟各四十日其年秋并肆汾建晉泰陝東雍南汾九州霜旱民飢流散四年春詔所在開倉賑恤之而死者甚衆時諸州調絹不依舊式齊獻武王以其害民興和三年冬請班海內悉以四十尺為度天下利焉河東郡有鹽池舊立官司以收稅利是時罷之而民有富強者專擅其用貧弱者不得資益延興末復立監司量其貴賤節其賦入於是公私兼利世宗即位政存寬簡復罷其禁與百姓共之其國用所須別為條制取足而已自後豪貴之家復乘勢占奪近池之民又輒障吝強弱相陵聞於遠近神龜初太師高陽王雍太傅清河王懌等奏鹽池天藏資育羣生仰惟先朝限者亦不苟與細民競茲贏利但利起天池取用無法或豪貴封護或近者吝守卑賤遠來超然絶望是以因置主司令其裁察強弱相兼務令得所且十一之稅自古及今取輒以次所濟為廣自爾霑洽遠近齊平公私兩宜儲益不少及鼓吹主簿王後興等詞稱請供百官食鹽二萬斛之外歲求輸馬千匹牛五百頭以此而推非可稍計後中尉甄琛啓求罷禁被敕付議尚書執奏稱琛啓坐談則理高行之則事闕請依常禁為允詔依琛計乃為繞池之民尉保光等擅自固護語其障禁倍於官司取與自由貴賤任口若無大宥罪合推斷詳度二三深乖王法臣等商量請依先朝之詔禁之為便防姦息暴斷遣輕重亦準前旨所置監司一同往式於是復置監官以監檢焉其後更罷更立以至於永熙自遷鄴後於滄瀛幽青四州之境傍海鹽滄州置竈一千四百八十四瀛州置竈四百五十二幽州置竈一百八十青州置竈五百四十六又於邯鄲置竈四計終歲合收鹽二十萬九千七百二斛四升軍國所資得以周贍矣魏初至於太和錢貨無所周流高祖始詔天下用錢焉十九年冶鑄粗備文曰太和五銖詔京師及諸州鎮皆通行之內外百官祿皆準絹給錢絹匹為錢二百在所遣錢工備爐冶民有欲鑄聽就鑄之銅必精練無所和雜世宗永平三年冬又鑄五銖錢肅宗初京師及諸州鎮或鑄或否或有止用古錢不行新鑄致商貨不通貿遷頗隔熙平初尚書令任城王澄上言臣聞洪範八政貨居二焉易稱天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位成養羣生奉順天德治國安民之本也夏殷之政九州貢金以定五品周仍其舊太公立九府之法於是圜貨始行定銖兩之楷齊桓循用以霸諸侯降及秦始漢文遂有輕重之異吳濞鄧通之錢收利遍於天下河南之地猶甚多焉逮于孝武乃更造五銖其中毀鑄隨利改易故使錢有小大之品竊尋太和之錢高祖留心創制後與五銖並行此乃不刊之式但臣竊聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利於京邑之肆而不入徐揚之市土貨既殊貿鬻亦異便於荊郢之邦者則礙於兗豫之域致使貧民有重困之切王道貽隔化之訟去永平三年都座奏斷天下用錢不依準式者時被敕云不行之錢雖有常禁其先用之處權可聽行至年末悉令斷之延昌二年徐州民儉刺史啓奏求行土錢旨聽權依舊用謹尋不行之錢律有明式指謂雞眼鐶鑿更無餘禁計河南諸州今所行者悉非制限昔來繩禁愚竊惑焉又河北州鎮既無新造五銖設有舊者而復禁斷並不得行專以單絲之縑疏縷之布狹幅促度不中常式裂匹為尺以濟有無至今徒成杼軸之勞不免飢寒之苦良由分截布帛壅塞錢貨實非救恤凍餒子育黎元謹惟自古以來錢品不一前後纍代易變無常且錢之為名欲泉流不已愚意謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有大小之異並得通行貴賤之差自依鄉價庶貨環海內公私無壅其不行之錢及盜鑄毀大為小巧偽不如法者據律罪之詔曰錢行已久今東尚有事且依舊用澄又奏臣猥屬樞衡庶罄心力常願貨物均通書軌一範謹詳周禮外府掌邦布之入出布猶泉也其藏曰泉其流曰布然則錢之興也始於一品欲令世匠均同圜流無極爰暨周景降逮亡新易鑄相尋參差百品遂令接境乖商連邦隔貿臣比奏求宣下海內依式行錢登被旨敕錢行已久且可依舊謹重參量以為太和五銖乃大魏之通貨不朽之模寧可專貿於京邑不行於天下但今戎馬在郊江疆未一東南之州依舊為便至於京西京北域內州鎮未用錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五穀則有負簷之難錢之為用貫繈相屬不假斗斛之器不勞稱尺之平濟世之宜謂為深允請並下諸方州鎮其太和及新鑄五銖并古錢內外全好者不限大小悉聽行之雞眼鐶鑿依律而禁河南州鎮先用錢者既聽依舊不在斷限唯太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方之錢通用京師其聽依舊之處與太和錢及新造五銖並行若盜鑄者罪重常憲既欲均齊物品廛井斯和若不繩以嚴法無以肅茲違犯符旨一宣仍不遵用者刺史守令依律治罪詔從之而河北諸州舊少錢貨猶以他物交易錢略不入市也二年冬尚書崔亮奏農郡銅青谷有銅礦計一斗得銅五兩四銖葦池谷礦計一斗得銅五兩鸞帳山礦計一斗得銅四兩河內郡王屋山礦計一斗得銅八兩南青州苑燭山齊州商山並是往昔銅官舊迹見在謹按鑄錢方興用銅處廣既有冶利並宜開鑄詔從之自後所行之錢民多私鑄稍就小薄價用彌賤建義初重盜鑄之禁開糾賞之格至永安二年秋詔更改鑄文曰永安五銖官自立爐起自九月至三年正月而止官欲貴錢乃出藏絹分遣使人於二市賣之絹匹止錢二百而私市者猶三百利之所在盜鑄彌衆巧偽既多輕重非一四方州鎮用各不同遷鄴之後輕濫尤多武定初齊文襄王奏革其弊於是詔遣使人詣諸州鎮收銅及錢悉更改鑄其文仍舊然姦僥之徒越法趨利未幾之間漸復細薄六年文襄王以錢文五銖名須稱實宜稱錢一文重五銖者聽入市用計百錢重一斤四兩二十銖自餘皆準此為數其京邑二市天下州鎮郡縣之市各置二稱懸於市門私民所用之稱皆準市稱以定輕重凡有私鑄悉不禁斷但重五銖然後聽用若入市之錢重不五銖或雖重五銖而多雜鉛鑞並不聽用若有輒以小薄雜錢入市有人糾獲其錢悉入告者其小薄之錢若即禁斷恐人交乏絶畿內五十日外州百日為限羣官參議咸以時穀頗貴請待有年上從之而止
