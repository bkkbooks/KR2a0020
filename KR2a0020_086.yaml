body:
  text: 魏書卷八十一列傳第六十九綦儁山偉劉仁之宇文忠之綦儁字豄顯河南洛陽人也其先代人祖辰幷州刺史儁莊帝時仕累遷為滄州刺史甚為吏人畏悅尋除太僕卿及尒朱世隆等誅齊獻武王赴洛止於邙山上召文武百司下及士庶令之曰尒朱暴虐矯弄天常孤起義信都罪人斯翦今將翼戴親賢以昌魏曆誰主社稷允愜天人申令頻煩莫有應者儁乃避席曰人主之體必須度量深遠明哲仁恕廣陵王遇世艱難不言淹載以人謀察之雖為尒朱扶戴當今之聖主也獻武王欣然是之時黃門侍郎崔𡞾作色而前謂儁曰廣陵王為主不能紹宣魏網布德天下為君如此何聖之有若言其聖應待大王時高乾邕魏蘭根等固執𡞾言遂立出帝及出帝失德齊獻武王深思儁言常以為恨尋除御史中尉於路與僕射賈顯度相逢顯度恃勳貴排儁騶列倒儁忿見於色自入奏之尋加散騎常侍驃騎大將軍左光祿大夫儀同三司儁佞巧能候當塗斛斯椿賀拔勝皆與友善斛斯椿之搆間也出帝令儁奉詔晉陽齊獻武王集文武與儁申釋儁辭屈而退性多詐賀拔勝出鎮荊州過儁別因辭儁母儁故見敗弊被勝更遺之錢物後兼吏部尚書復為滄州刺史徵還兼中尉章武縣伯尋除殷州刺史薨於州贈司空公諡曰文貞子洪寔字巨正位尚書左右郎魏郡邑中正嗜酒好色無行檢卒官山偉字仲才河南洛陽人也其先代人祖強美容貌身長八尺五寸工騎射彎弓五石為奏事中散從顯祖獵方山有兩狐起於御前詔強射之百步內二狐俱獲位內行長父稚之營陵令偉隨父之縣遂師事縣人王惠涉獵文史稚之位金明太守肅宗初元匡為御史中尉以偉兼侍御史入臺五日便遇正會偉司神武門其妻從叔為羽林隊主撾直長於殿門偉即劾奏匡善之俄然奏正帖國子助教遷員外郎廷尉評時天下無事進仕路難代遷之人多不霑預及六鎮隴西二方起逆領軍元叉欲用代來寒人為傳詔以慰悅之而牧守子孫投狀求者百餘人又欲杜之因奏立勳附隊令各依資出身自是北人悉被收偉遂奏記贊叉德美叉素不識偉訪侍中安豐王延明黃門郎元順順等因是稱薦之叉令僕射元欽引偉兼尚書二千石郎後正名士郎修起居注僕射元順領選表薦為諫議大夫尒朱榮之害朝士偉時守直故免禍及莊帝入宮仍除偉給事黃門侍郎先是偉與儀曹郎袁昇屯田郎李延孝外兵郎李奐三公郎王延業方駕而行偉少居後路逢一尼望之歎曰此輩緣業同日而死謂偉曰君方近天子當作好官而昇等四人皆於河陰遇害果如其言俄領著作郎前廢帝立除安東將軍祕書監仍著作初尒朱兆之入洛官守奔散國史典書高法顯密埋史書故不遺落偉自以為功訴求爵賞偉挾附世隆遂封東阿縣伯而法顯止獲男爵偉尋進侍中孝靜初除衞大將軍中書令監起居後以本官復領著作卒官贈驃騎大將軍開府儀同三司都督幽州刺史諡曰文貞公國史自鄧淵崔琛崔浩高允李彪崔光以還諸人相繼撰錄綦儁及偉等諂說上黨王天穆及尒朱世隆以為國書正應代人修緝不宜委之餘人是以儁偉等更主大籍守舊而已初無述著故自崔鴻死後迄終偉身二十許載時事蕩然萬不記一後人執筆無所憑據史之遺闕偉之由也外示沉厚內實矯競與綦儁少甚相得晚以名位之間遂若水火與宇文忠之之徒代人為黨時賢畏惡之而愛尚文史老而彌篤偉弟少亡偉撫寡訓孤同居二十餘載恩義甚篤不營產業身亡之後賣宅營葬妻子不免飄泊士友歎愍之長子昂襲爵劉仁之字山靜河南洛陽人其先代人徙于洛父爾頭在外戚傳仁之少有操尚粗涉書史真草書迹頗號工便御史中尉元昭引為御史前廢帝時兼黃門侍郎深為尒朱世隆所信用出帝初為著作郎兼中書令既非其才在史未嘗執筆出除衞將軍西兗州刺史在州有當時之譽武定二年卒贈衞大將軍吏部尚書青州刺史諡曰敬仁之外示長者內懷矯詐其對賓客破牀弊席粗飯冷菜衣服故敗乃過逼下善候當途能為詭激每於稠人廣衆之中或撾一姦吏或縱一孤貧大言自眩示己高明矜物無知淺識皆稱其美公能之譽動過其實性又酷虐在晉陽曾營城雉仁之統監作役以小稽緩遂杖前殷州刺史裴瑗幷州刺史王綽齊獻武王大加譴責性好文字吏書失體便加鞭撻言韻微訛亦見捶楚吏民苦之而愛好文史敬重人流與齋帥馮元興交款元興死後積年仁之營視其家常出隆厚時人以此尚之字文忠之河南洛陽人也其先南單于之遠屬世據東部後入居代都祖阿生安南將軍巴西公父侃卒於治書侍御史忠之獵涉文史頗有筆札釋褐太學博士天平初除中書侍郎裴伯茂與之同省常侮忽之以忠之色黑呼為黑宇後敕修國史元象初兼通直散騎常侍副鄭伯猷使蕭衍武定初為安南將軍尚書右丞仍修史未幾以事除名忠之好榮利自為中書郎六七年矣遇尚書省選右丞預選者皆射策忠之入試焉既獲丞職大為忻滿志氣囂然有驕物之色識者笑之既失官爵怏怏發病卒子君山史臣曰綦儁遭逢受職山偉位行頗爽仁之雖內懷矯詐而交情自篤忠之雖文史足用而雅道蔑聞謂全德者其難矣哉
