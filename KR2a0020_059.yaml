body:
  text: 魏書卷五十四列傳第四十二遊雅高閭遊雅字伯度小名黃頭廣平任人也少好學有高才世祖時與勃海高允等俱知名徵拜中書博士東宮內侍長遷著作郎使劉義隆授散騎侍郎賜爵廣平子加建威將軍稍遷太子少傅領禁兵進爵為侯加建義將軍受詔與中書侍郎胡方回等改定律制出為散騎常侍平南將軍東雍州刺史假梁郡公在任廉白甚有惠政徵為祕書監委以國史之任不勤著述竟無所成詔雅為太華殿賦文多不載雅性剛戇好自矜誕陵獵人物高允重雅文學而雅輕薄允才允性柔寬不以為恨允將婚于邢氏雅勸允娶于其族允不從雅曰人貴河間邢不勝廣平遊人自棄伯度我自敬黃頭貴己賤人皆此類也允著徵士頌殊為重雅事在允傳雅因論議長短忿儒者陳奇遂陷奇至族議者深責之和平二年卒贈相州刺史諡曰宣侯子僧奴襲爵卒子雙鳳襲雅弟子曇護太和中為中散遷典寺令後慰勞仇池為賊所害贈肆州刺史高閭字閻士漁陽雍奴人五世祖原晉安北軍司上谷太守關中侯有碑在薊中祖雅少有令名州別駕父洪字季願陳留王從事中郎閭貴乃贈寧朔將軍幽州刺史固安貞子閭早孤少好學博綜經史文才俊偉下筆成章本名驢司徒崔浩見而奇之乃改為而字焉真君九年徵拜中書博士和平末遷中書侍郎高宗崩乙渾擅權內外危懼文明太后臨朝誅渾引閭與中書令高允入於禁內參決大政賜爵安樂子加南中郎將與鎮南大將軍尉元南赴徐州閭先入彭城收管籥元表閭以本官領東徐州刺史與張讜對鎮團城後還京城以功進爵為侯加昭武將軍顯祖傳位徙御崇光宮閭上表頌曰臣聞創制改物者應天之聖君齷齪順常者守文之庸主故五帝異規而化興三王殊禮而致治用能憲章萬祀垂範百王歷葉所以挹其遺風後君所以酌其軌度伏惟太上皇帝道光二儀明齊日月至德潛通武功四暢霜威南被則淮徐來同齊斧北斷則獫狁覆斃西摧三危之酋東引肅慎之貢荒遐款塞九有宅心於是從容間覽希心玄奧尚鼎湖之奇風崇巢由之高潔疇咨熙載亮采羣后爰挹大位傳祚聖人開古之高範爰萃於一朝曠葉之希事載見於今日昔唐堯禪舜前典大其成功太伯讓季孔子稱其至德苟位以聖傳臣子一也謹上至德頌一篇其詞曰茫茫太極悠悠遐古三皇創制五帝垂祜仰察璿璣俯鑒后土雍容端拱惟德是與夏殷世傳周漢纂烈道風雖邈仍誕明哲爰暨三季下凌上替九服三分禮樂四缺上靈降鑒思皇反正乃眷有魏配天承命功冠前王德侔往聖移風革俗天保載定於穆太皇克廣聖度玄化外暢惠鑒內悟遺此崇高挹彼沖素道映當今慶流後祚明明我皇承乾紹煥比誦熙周方文隆漢重光麗天晨暉疊旦六府孔修三辰貞觀功均乾造雲覆雨潤養之以仁敦之以信綏之斯和動之斯震自東徂西無思不順禎候並應福祿來格嘉穀秀町素文表石玄鳥呈皓醴泉流液黃龍蜿蜿遊鱗奕奕沖訓既布率土咸寧穆穆四門灼灼典刑勝殘豈遠期月有成翹翹東嶽庶見翠旌先民有言千載一泰昔難其運今易其會沐浴淳澤被服冠帶飲和陶潤載欣載賴文以寫意功由頌宣吉甫作歌式昭永年唐政緝熙康哉垂篇仰述徽烈被之管絃高允以閭文章富逸舉以自代遂為顯祖所知數見引接參論政治命造鹿苑頌北伐碑顯祖善之承明初為中書令加給事中委以機密文明太后甚重閭詔令書檄碑銘贊頌皆其文也太和三年出師討淮北閭表曰伏見廟算有事淮海雖成事不説猶可思量臣以愚劣本非武用至於軍旅尤所不學直以無諱之朝敢肆狂瞽區區短見竊有所疑臣聞兵者凶器不得已而用之今天下開泰四方無虞豈宜盛世干戈妄動疑一也淮北之城凡有五處難易相兼皆須攻擊然攻守難圖力懸百倍反覆思量未見其利疑二也縱使如心於國無用發兵遠入費損轉多若不置城是謂空爭疑三也脫不如意當延日月屯衆聚費于何不有疑四也伏願思此四疑時速返旆文明太后令曰六軍電發有若摧朽何慮四難也遷尚書中書監淮南王他奏求依舊斷祿文明太后令召羣臣議之閭表曰天生蒸民樹之以君明君不能獨理必須臣以作輔君使臣以禮臣事君以忠故車服有等差爵命有分秩德高者則位尊任廣者則祿重下者祿足以代耕上者俸足以行義庶民均其賦以展奉上之心君王聚其材以供事業之用君班其俸垂惠則厚臣受其祿感恩則深於是貪殘之心止竭效之誠篤兆庶無侵削之煩百辟備禮容之美斯則經世之明典為治之至術自堯舜以來逮于三季雖優劣不同而斯道弗改自中原崩否天下幅裂海內未一民戶耗減國用不充俸祿遂廢此則事出臨時之宜良非長久之道大魏應期紹祚照臨萬方九服既和八表咸謐二聖欽明文思道冠百代動遵禮式稽考舊章準百王不易之勝法述前聖利世之高軌置立鄰黨班宣俸祿事設令行於今已久苛慝不生上下無怨姦巧革慮窺覦絶心利潤之厚同於天地以斯觀之如何可改又洪波奔激則隄防宜厚姦悖充斥則禁網須嚴且飢寒切身慈母不保其子家給人足禮讓可得而生但廉清之人不必皆富豐財之士未必悉賢今給其俸則清者足以息其濫竊貪者足以感而勸善若不班祿則貪者肆其姦情清者不能自保難易之驗灼然可知如何一朝便欲去俸淮南之議不亦謬乎詔從閭議高祖又引見王公已下於皇信堂高祖曰政雖多途治歸一體朕每蒙慈訓猶自昧然誠知忠佞有損益而未識其異同懼忠貞見毀佞人便進寤寐思此如有隱憂國彥朝賢休戚所共宜辨斯真偽以釋朕懷尚書遊明根對曰忠佞之士實亦難知依古爵人先試之以官官定然後祿之三載考績然後忠佞可明閭曰竊謂袁盎徹慎夫人席是其忠譖殺朝錯是其佞若以異人言之望之為忠石顯是佞高祖曰自非聖人忠佞之行時或互有但忠功顯即謂之忠佞迹成斯謂之佞史官據成事而書於今觀之有別明矣朕所問者未然之前卿之所對已然之後閭曰佞者飾智以行事忠者發心以附道譬如玉石皎然可知高祖曰玉石同體而異名忠佞異名而同理求之於同則得其所以異尋之於異則失其所以同出處同異之間交換忠佞之境豈是皎然易明哉或有託佞以成忠或有假忠以飾佞如楚子綦後事顯忠初非佞也閭曰子綦諫楚初雖隨述終致忠言此適欲幾諫非為佞也子綦若不設初權後忠無由得顯高祖善閭對閭後上表曰臣聞為國之道其要有五一曰文德二曰武功三曰法度四曰防固五曰刑賞故遠人不服則修文德以來之荒狡放命則播武功以威之民未知戰則制法度以齊之暴敵輕侵則設防固以禦之臨事制勝則明刑賞以勸之用能闢國寧方征伐四克北狄悍愚同於禽獸所長者野戰所短者攻城若以狄之所短奪其所長則雖衆不能成患雖來不能內逼又狄散居野澤隨逐水草戰則與家産並至奔則與畜牧俱逃不齎資糧而飲食足是以古人伐北方攘其侵掠而已歷代為邊患者良以倏忽無常故也六鎮勢分倍衆不鬬互相圍逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武踵其前事此四代之君皆帝王之雄傑所以同此役者非智術之不長兵衆之不足乃防狄之要事其理宜然故也易稱天險不可升地險山川丘陵王公設險以守其國長城之謂歟今宜依故於六鎮之北築長城以禦北虜雖有暫勞之勤乃有永逸之益如其一成惠及百世即於要害往往開門造小城於其側因地却敵多有弓弩狄來有城可守其兵可捍既不攻城野掠無獲草盡則走終必懲艾宜發近州武勇四萬人及京師二萬人合六萬人為武士於苑內立征北大將軍府選忠勇有志幹者以充其選下置官屬分為三軍二萬人專習弓射二萬人專習戈盾二萬人專習騎矟修立戰場十日一習採諸葛亮八陳之法為平地禦寇之方使其解兵革之宜識旌旗之節器械精堅必堪禦寇使將有定兵兵有常主上下相信晝夜如一七月發六部兵六萬人各備戎作之具敕臺北諸屯倉庫隨近作米俱送北鎮至八月征北部率所領與六鎮之兵直至磧南揚威漠北狄若來拒與之決戰若其不來然後散分其地以築長城計六鎮東西不過千里若一夫一月之功當三步之地三百人三里三千人三十里三萬人三百里則千里之地強弱相兼計十萬人一月必就運糧一月不足為多人懷永逸勞而無怨計築長城其利有五罷遊防之苦其利一也北部放牧無抄掠之患其利二也登城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也歲常遊運永得不匱其利五也又任將之道特須委信遣之以禮恕之以情閫外之事有利輒決赦其小過要其大功足其兵力資其給用君臣相體若身之使臂然後忠勇可立制勝可果是以忠臣盡其心征將竭其力雖三敗而踰榮雖三背而彌寵詔曰覽表具卿安邊之策比當與卿面論一二高祖又引見羣臣議伐蠕蠕帝曰蠕蠕前後再擾朔邊近有投化人云敕勒渠帥興兵叛之蠕蠕主身率徒衆追至西漠今為應乘弊致討為應休兵息民左僕射穆亮對曰自古以來有國有家莫不以戎事為首蠕蠕子孫襲其凶業頻為寇擾為惡不悛自相違叛如臣愚見宜興軍討之雖不頓除巢穴且以挫其醜勢閭曰昔漢時天下一統故得窮追北狄今南有吳寇不宜懸軍深入高祖曰先朝屢興征伐者以有未賓之虜朕承太平之基何為搖動兵革夫兵者凶器聖王不得已而用之便可停也高祖又曰今欲遣蠕蠕使還應有書問以不羣臣以為宜有乃詔閭為書於時蠕蠕國有喪而書不凶事高祖曰卿為中書監職典文詞所造旨書不論彼之凶事若知而不作罪在灼然若情思不至應謝所任閭對曰昔蠕蠕主敦崇和親其子不遵父志屢犯邊境如臣愚見謂不宜弔高祖曰敬其父則子悅敬其君則臣悅卿云不合弔慰是何言歟閭遂引愆免冠謝罪高祖謂閭曰蠕蠕使牟提小心恭慎甚有使人之禮同行疾其敦厚每至陵辱恐其還北必被謗誣昔劉準使殷靈誕每禁下人不為非禮之事及其還國果被譖訴以致極刑今為旨書可明牟提忠於其國使蠕蠕主知之是年冬至高祖文明太后大饗羣官高祖親舞於太后前羣臣皆舞高祖乃歌仍率羣臣再拜上壽閭進曰臣聞大夫行孝行合一家諸侯行孝聲著一國天子行孝德被四海今陛下聖性自天敦行孝道稱觴上壽靈應無差臣等不勝慶踊謹上千萬歲壽高祖大悅賜羣臣帛人三十匹又議政於皇信堂高祖曰百揆多途萬機事猥未周之闕卿等宜有所陳閭對曰臣伏思太皇太后十八條之令及仰尋聖朝所行事周於百揆理兼於庶務孔子至聖三年有成子産治鄭歷載乃就今聖化方宣風政驟改行之積久自然致治理之必明不患事闕又為政之道終始若一民可使由之不可使知之政令既宣若有不合於民者因民之心而改之願終成其事使至教必行臣反覆三思理畢於此不知其他但使今之法度必理必明必行必久勝殘去殺可不遠而致高祖曰刑法者王道之所用何者為法何者為刑施行之日何先何後閭對曰臣聞創制立會軌物齊衆謂之法犯違制約致之於憲謂之刑然則法必先施刑必後著自鞭杖已上至於死罪皆謂之刑刑者成也成而不可改高祖曰論語稱冉子退朝孔子問曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之何者是政何者為事閭對曰臣聞政者君上之所施行合於法度經國治民之屬皆謂之政臣下奉教承旨作而行之謂之事然則天下大同風軌齊一則政出於天子王道衰則政出於諸侯君道缺則政出於大夫故詩序曰王道衰政教失則國異政家殊俗政者上之所行事者下之所奉高祖曰若君命為政子夏為莒父宰問政此應奉命而已何得稱政尚書遊明根曰子夏宰民故得稱政帝善之十四年秋閭上表曰奉癸未詔書以春夏少雨憂飢饉之方臻愍黎元之傷瘁同禹湯罪己之誠齊堯舜引咎之德虞災致懼詢及卿士令各上書極陳損益深恩被於蒼生厚惠流于后土伏惟陛下天啓聖姿利見纂極欽若昊天光格宇宙太皇太后以睿哲贊世稽合三才高明柔克道被無外七政昭宣於上九功咸序於下君人之量逾高謙光之旨彌篤修復祭儀宗廟所以致敬飾正器服禮樂所以宣和增儒官以重文德簡勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦宄置鄰黨以穆之究庶官之勤劇班俸祿以優之知勞逸之難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絶讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降鑒在下休咎之徵咸由人召故帝道昌則九疇君德衰而彝倫斁休瑞並應享以五福則康于其邦咎徵屢臻罰以六極則害于其國斯乃洪範之實徵神祇之明驗及其厄運所纏世鍾陽九數乖於天理事違於人謀時則有之矣故堯湯逢歷年之災周漢遭水旱之患然立功修行終能弭息今考治則有如此之風計運未有如彼之害而陛下殷勤引過事邁前王徙星澍雨之徵指辰可必消災滅禍之符灼然自見雖王畿之內頗為少雨關外諸方禾稼仍茂苟動之以禮綏之以和一歲不收未為大損但豫備不虞古之善政安不忘危有國常典竊以北鎮新徙家業未就思親戀本人有愁心一朝有事難以禦敵可寬其往來頗使欣慰開雲中馬城之食以賑恤之足以感德致力邊境矣明察畿甸之民飢甚者出靈丘下館之粟以救其乏可以安慰孤貧樂業保土使幽定安并四州之租隨運以溢其處開關薥禁薄賦賤糴以消其費清道路恣其東西隨豐遂食貧富相贍可以免度凶年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄凶儉之年民輕違犯可緩其使役急其禁令宜於未然之前申敕外牧又一夫幽枉王道為虧京師之獄或恐未盡可集見囚於都曹使明折庶獄者重加究察輕者即可決遣重者定狀以聞罷非急之作放無用之獸此乃救凶之常法且以見憂於百姓論語曰不患貧而患不安苟安而樂生雖遭凶年何傷於民庶也愚臣所見如此而已詔曰省表聞之當敕有司依此施行後詔閭與太常採雅樂以營金石又領廣陵王師出除鎮南將軍相州刺史以參定律令之勤賜布帛千匹粟一千斛牛馬各三閭上疏陳伐吳之策高祖納之遷都洛陽閭表諫言遷有十損必不獲已請遷於鄴高祖頗嫌之蕭鸞雍州刺史曹虎據襄陽請降詔劉昶薛真度等四道南伐車駕親幸懸瓠閭表諫曰洛陽草創虎既不遣質任必非誠心無宜輕舉高祖不納虎果虛詐諸將皆無功而還高祖攻鍾離未克將於淮南修故城而置鎮戍以撫新附之民賜閭璽書具論其狀閭表曰南土亂亡僭主屢易陛下命將親征威陵江左望風慕化克拔數城施恩布德攜民襁負可謂澤流邊方威惠普著矣然元非大舉軍興後時本為迎降戎卒實少兵法十則圍之倍則攻之所率既寡東西懸闊難以並稱伏承欲留戍淮南招撫新附昔世祖以回山倒海之威步騎數十萬南臨瓜步諸郡盡降而盱眙小城攻而弗克班師之日兵不戍一郡土不闢一廛夫豈無人以大鎮未平不可守小故也堰水先塞其源伐木必拔其本源不塞本不拔雖翦枝竭流終不可絶矣壽陽盱眙淮陰淮南之源本也三鎮不克其一而留兵守郡不可自全明矣既逼敵之大鎮隔深淮之險少置兵不足以自固多留衆糧運難可充又欲修渠通漕路必由于泗口泝淮而上須經角城淮陰大鎮舟船素畜敵因先積之資以拒始行之路若元戎旋旆兵士挫怯夏雨水長救援實難忠勇雖奮事不可濟淮陰東接山陽南通江表兼近江都海西之資西有盱眙壽陽之鎮且安土樂本人之常情若必留戍軍還之後恐為敵擒何者鎮戍新立懸在異境以勞禦逸以新擊舊而能自固者未之有也昔彭城之役既克其城戍鎮已定而思叛外向者猶過數方角城蕞爾處在淮北去淮陽十八里五固之役攻圍歷時卒不能克以今比昔事兼數倍今以向熱水雨方降兵刃既交難以恩恤降附之民及諸守令亦可徙置淮北如其不然進兵臨淮速渡士卒班師還京踵太武之成規營皇居於伊洛畜力以待敵釁布德以懷遠人使中國清穆化被遐裔淮南之鎮自效可期天安之捷指辰不遠車駕還幸石濟閭朝於行宮高祖謂閭曰朕往年之意不欲決征但兵士已集恐為幽王之失不容中止發洛之日正欲至於懸瓠以觀形勢然機不可失遂至淮南而彼諸將並列州鎮至無所獲定由晚一月日故也閭對曰人皆是其所事而非其所不事猶犬之吠非其主且古者攻戰之法倍則攻之十則圍之聖駕親戎誠應大捷所以無大獲者良由兵少故也且徙都者天下之大事今京邑甫爾庶事造創臣聞詩云惠此中國以綏四方臣願陛下從容伊優遊京洛使德被四海中國緝寧然後向化之徒自然樂附高祖曰願從容伊實亦不少但未獲耳閭曰司馬相如臨終恨不見封禪今雖江介不賓小賊未殄然中州之地略亦盡平豈可於聖明之辰而闕盛禮齊桓公霸諸侯猶欲封禪而況萬乘高祖曰由此桓公屈於管仲荊揚未一豈得如卿言也閭曰漢之名臣皆不以江南為中國且三代之境亦不能遠高祖曰淮海惟揚州荊及衡陽惟荊州此非近中國乎及車駕至鄴高祖頻幸其州館詔曰閭昔在中禁有定禮正樂之勳作藩於州有廉清公幹之美自大軍停軫庶事咸豐可謂國之老成善始令終者也每惟厥德朕甚嘉焉可賜帛五百匹粟一千斛馬一匹衣一襲以褒厥勤閭每請本州以自效詔曰閭以懸車之年方求衣錦知進忘退有塵謙德可降號平北將軍朝之老成宜遂情願徙授幽州刺史令存勸兩修恩法並舉閭以諸州罷從事依府置參軍於治體不便表宜復舊高祖不悅歲餘表求致仕優答不許徵為太常卿頻表陳遜不聽又車駕南討漢陽閭上表諫求回師高祖不納漢陽平賜閭璽書閭上表陳謝世宗踐阼閭纍表遜位詔曰閭貞幹早聞儒雅素著出內清華朝之俊老以年及致仕固求辭任宜聽解宗伯遂安車之禮特加優授崇老成之秩可光祿大夫金印紫綬使散騎常侍兼吏部尚書邢巒就家拜授及辭引見於東堂賜以肴羞訪之大政以其先朝儒舊告老永歸世宗為之流涕詔曰閭歷官六朝著勳五紀年禮致辭義光進退歸軒首路感悵兼懷安駟籝金漢世榮貺可賜安車几杖輿馬繒綵衣服布帛事從豐厚百僚餞之猶昔羣公之祖二疏也閭進陟北邙上望闕表以示戀慕之誠景明三年十月卒于家世宗遣使弔慰賵帛四百匹四年三月贈鎮北將軍幽州刺史諡曰文侯閭好為文章軍國書檄詔令碑頌銘贊百有餘篇集為三十卷其文亦高允之流後稱二高為當時所服閭強果敢直諫其在私室言裁聞耳及於朝廷廣衆之中則談論鋒起人莫能敵高祖以其文雅之美每優禮之然貪褊矜慢初在中書好詈辱諸博士博士學生百有餘人有所干求者無不受其財貨及老為二州乃更廉儉自謹有良牧之譽有三子長子元昌襲爵位至遼西博陵二郡太守子欽字希叔頗有文學莫折念生之反也欽隨元志西討志敗為賊所擒念生以為黃門郎死於秦州子穆宗襲祖爵興和中定州開府祭酒欽弟石頭小石皆早卒元昌弟定殷中壘將軍漁陽太守卒贈征虜將軍安州刺史子洪景少有名譽早卒次子宣景武定中開府司馬定殷弟幼成員外郎頗有文才性清狂為奴所害閭弟悅篤志好學有美於閭早卒史臣曰遊雅才業亦高允之亞歟至於陷族陳奇斯所以絶世而莫祀也高閭發言有章句下筆富文彩亦一代之偉人故能受遇纍朝見重高祖挂冠謝事禮備懸輿美矣
