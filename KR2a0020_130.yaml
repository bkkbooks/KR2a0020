body:
  text: 魏書卷一百一十三官氏志九第十九百姓不能以自治故立君以司牧元首不可以獨斷乃命臣以佐之然則安海內正國家非一人之力也書契已外其事蔑聞至於羲軒昊頊之間龍火鳥人之職頗可知矣唐虞六十夏商倍之周過三百是為大備而秦漢魏晉代有加減罷置盛衰隨時適務且國異政家殊俗設官命職何常之有帝王為治禮樂不相沿海內作家物色非一用其由來尚矣魏氏世君玄朔遠統臣掌事立司各有號秩及交好南夏頗亦改創昭成之即王位已命燕鳳為右長史許謙為郎中令矣餘官雜號多同於晉朝建國二年初置左右近侍之職無常員或至百數侍直禁中傳宣詔命皆取諸部大人及豪族良家子弟儀貌端嚴機辨才幹者應選又置內侍長四人主顧問拾遺應對若今之侍中散騎常侍也其諸方雜人來附者總謂之烏丸各以多少稱酋庶長分為南北部復置二部大人以統攝之時帝弟觚監北部子實君監南部分民而治若古之二伯焉太祖登國元年因而不改南北猶置大人對治二部是年置都統長又置幢將及外朝大人官其都統長領殿內之兵直王宮幢將員六人主三郎衛士直宿禁中者自侍中已下中散已上皆統之外朝大人無常員主受詔命外使出入禁中國有大喪大禮皆與參知隨所典焉皇始元年始建曹省備置百官封拜五等外職則刺史太守令長已下有未備者隨而置之天興元年十一月詔吏部郎鄧淵典官制立爵品十二月置八部大夫散騎常侍待詔等官其八部大夫於皇城四方四維面置一人以擬八座謂之八國常侍待詔侍直左右出入王命二年三月分尚書三十六曹及諸外署凡置三百六十曹令大夫主之大夫各有屬官其有文簿當曹敷奏欲以省彈駁之煩初令五經諸書各置博士國子學生員三十人三年十月置受恩蒙養長德訓士四官受恩職比特進無常員有人則置親貴器望者為之蒙養職比光祿大夫無常員取勤舊休間者長德職比中散大夫無常員訓士職比諫議大夫規諷時政匡刺非違又置仙人博士官典煮鍊百藥四年七月罷胸奴中郎將官令諸部護軍皆屬大將軍府九月罷外蘭臺御史總屬內省十二月復尚書三十六曹曹置代人令史一人譯令史一人書令史二人天賜元年八月初置六謁官準古六卿其秩五品屬官有大夫秩六品大夫屬官有元士秩七品元士屬官有署令長秩八品令長屬官有署丞秩九品九月減五等之爵始分為四曰王公侯子除伯男二號皇子及異姓元功上勳者封王宗室及始蕃王皆降為公諸公降為侯侯子亦以此為差於是封王者十人公者二十二人侯者七十九人子者一百三人王封大郡公封小郡侯封大縣子封小縣王第一品公第二品侯第三品子第四品又制散官五等五品散官比三都尉六品散官比議郎七品散官比太中中散諫議三大夫八品散官比郎中九品散官比舍人文官五品已下才能秀異者總比之造士亦有五等武官五品已下堪任將帥者亦有五等若百官有闕者則於中擢以補之初帝欲法古純質每於制定官號多不依周漢舊名或取諸身或取諸物或以民事皆擬遠古雲鳥之義諸曹走使謂之鳧鴨取飛之迅疾以伺察者為候官謂之白鷺取其延頸遠望自餘之官義皆類此咸有比況又制諸州各置都尉以領兵十一月以八國姓族難分故國立大師小師令辨其宗黨品舉人才自八國以外郡各自立師職分如八國比今之中正也宗室立宗師亦如州郡八國之儀十二月詔始賜王公侯子國臣吏大郡王二百人次郡王上郡公百人次郡公五十人侯二十五人子十二人皆立典師職比家丞總統羣隸二年二月復罷尚書三十六曹別置武歸修勤二職武歸比郎中修勤比令史分主省務二年正月置內官員二十人比侍中常侍迭直左右又制諸州置三刺史刺史用品第六者宗室一人異姓二人比古之上中下三大夫也郡置三太守用七品者縣置三令長八品者刺史令長各之州縣以太守上有刺史下有令長雖置而未臨民自前功臣為州者徵還京師以爵歸第置散騎郎獵郎諸省令史省事典籤等四年五月增置侍官侍直左右出內詔命取八國良家代郡上谷廣寧雁門四郡民中年長有器望者充之永興元年十一月置騏驎官四十人宿直殿省比常侍侍郎神瑞元年春置八大人官大人下置三屬官總理萬機故世號八公云泰常二年夏置六部大人官有天部地部東西南北部皆以諸公為之大人置三屬官始光元年正月置右民尚書神元年三月置左右僕射左右丞諸曹尚書十餘人各居別寺七月詔諸征鎮大將依品開府以置佐吏延和元年三月改代尹為萬年尹代令為萬年令後復真君五年正月侍中中書監宜都王穆壽司徒東郡公崔浩侍中廣平公張黎輔政置通事四人又選諸曹良吏給事東宮正平元年七月以諸曹吏多減其員興安二年正月置駕部尚書右士尚書太安三年五月以諸部護軍各為太守延興二年五月詔曰非功無以受爵非能無以受祿凡出外遷者皆引此奏聞求乞假品在職有效聽下附正若無殊稱隨而削之舊制諸鎮將刺史假五等爵及有所貢獻而得假爵者皆不得世襲四年二月置外牧官五年九月置監御曹太和二年五月減置候職四百人司察非違四年省二部內部幢將十一年八月置散官員一百人朝請員二百人十五年七月置司儀官十二月置侍中黃門各四人又置散騎常侍侍郎員各四人通直散騎常侍侍郎員外散騎常侍侍郎各六人又置司空主客太倉庫部都牧太樂虞曹宮輿覆育少卿官又置光爵驍遊五校中大夫散員士官又置侍官一百二十人改立諸局監羽林虎賁舊制諸以勳賜官爵者子孫世襲軍號十六年改降五等始革之止襲爵而已舊制緣邊皆置鎮都大將統兵備禦與刺史同城隍倉庫皆鎮將主之但不治故為重於刺史疑自太祖至高祖初其內外百官屢有減置或事出當時不為常目如萬騎飛鴻常忠直意將軍之徒是也舊令亡失無所依據太和中高祖詔羣僚議定百官著於令今列於左勳品流外位卑而不載矣太師太尉儀同三司太傅司徒都督中外諸軍事太保司空特進右三師右三公大司馬諸開府大將軍驃騎將軍車騎將軍二將軍加大者位在三司上衛將軍加大者次儀同三司右三將軍右第一品上右第一品中右第一品下太子太師四征加大者次衛將軍四鎮加大者次尚書令太子太傅左右光祿大夫吏部尚書太子太保尚書左僕射太常右東宮三師尚書右僕射光祿勳尚書令中書監衛尉都督府州諸軍事右三卿中軍將軍鎮軍將軍撫軍將軍右三將軍加大者秩次四征下金紫光祿大夫右從第一品上右從第一品中右從第一品下太子少師列曹尚書四安加大者秩次三少下太子少傅中書令凡將軍三品已下五品已上加大者太子少保領軍太子左右詹事右東宮三少護軍二職若侍臣帶者加中散騎常侍中侍中司州刺史都督三州諸軍事太僕廷尉大鴻臚宗正大司農少府右六卿領軍將軍軍將軍二將軍與領護不並置右第二品上右第二品中右第二品下前後左右將軍祕書監武衛將軍四平加大者秩次護軍下光祿大夫銀青者都督一州諸軍事大長秋卿將作大匠左衛將軍右衛將軍右從第二品上右從第二品中右從第二品下駙馬給事黃門侍郎通直散騎常侍諸王師太子中庶子城門校尉太子左右衛率南北東西中郎將羽林中郎將御史中尉護胸奴羌戎夷蠻越中太中大夫郎將中常侍護羌戎夷蠻越校尉征虜將軍輔國將軍龍驤將軍司衛監中尹少卿光爵代尹右第三品上右第三品中右第三品下員外散騎常侍中給事鎮遠將軍驍騎將軍射聲校尉安遠將軍太子家令越騎校尉建遠將軍太子率更令屯騎校尉建中將軍太子僕步兵校尉建節將軍太子庶子長水校尉立義將軍給事中監軍立忠將軍前後左右軍將軍立節將軍中大夫恢武將軍祕書令勇武將軍給事曜武將軍昭武將軍顯武將軍直閣將軍右從第三品上右從第三品中右從第三品下國子祭酒公府司馬諫議大夫下大夫尚書右丞祕書丞公府長史司馬別駕建武將軍尚書左丞太子中舍人振武將軍太子三校中黃門令奮武將軍散騎侍郎令揚武將軍中書侍郎內署令廣武將軍中謁者大夫都水使者廣威將軍中散大夫符節令中堅將軍通直散騎侍郎中壘將軍建威將軍寧朔將軍振威將軍揚威將軍奮威將軍右第四品上右第四品中右第四品下元士諸開府司馬諸王友公府咨議參軍司州功曹都官員外散騎侍郎諸開府長史五局司直太子門大夫尚書吏部郎中司敗協律中郎太子洗馬諸局校尉戟楯虎賁將軍武騎侍郎符璽郎中募員虎賁將軍奉車都尉高車虎賁將軍駙馬都尉左右積弩射將軍騎都尉強弩將軍羽林中郎中散庶長謁者僕射羽林郎將高車羽林郎將冗從僕射右從第四品下右從第四品中右從第四品下中軍鎮軍撫軍長史中書議郎皇宗博士鷹揚將軍諸開府從事中郎歸義侯折衝將軍公府正參軍率義侯寧遠將軍公府主簿順義侯揚烈將軍廷尉正監評朝服侯諸開府咨議參軍太子舍人太常丞祕書著作郎司州主簿治書侍御史中黃門中謁者僕射輕車將軍中黃門冗從僕射威遠將軍侍御中散虎威將軍中軍鎮軍撫軍司馬中散公府從事中郎殿中將軍尚書郎中散臣監伏波將軍太子倉令陵江將軍平漠將軍太子食官令太子中盾右第五品上右第五品中右第五品下祕書郎太子竹罒戊長附義中郎將國子博士諸局監歸義中郎將太學祭酒尚書郎率義中郎將祕書著作佐郎侍御史順義中郎將武士將軍殿中御史戟楯虎賁司馬虎賁司馬京邑市令募員虎賁司馬虎賁郎將典牧都尉高車虎賁司馬方舞郎庶長水衡都尉戟楯虎賁將宿衛軍將司鹽都尉募員虎賁將掖庭監司竹都尉高車虎賁將典客監崇虛都尉嘗藥監典儀監列卿丞中謁者協律郎詹事丞宮門司馬太祝令代尹丞宗聖士小黃門諸開府正參軍謁者諸門府主簿員外將軍辨章郎散員大夫太宰令太樂祭酒釰犧令門下録事殿中監奉乘郎翼馭郎羽林郎高車羽林郎瞻人郎方者郎右從第五品上右從第五右從第五品下公府行參軍太學博士散騎宣威將軍太史博士奉朝請明威將軍律博士武烈將軍襄武將軍禮官博士武毅將軍厲威將軍公府記室督武奮將軍公府掾屬威烈將軍太樂博士中軍撫軍鎮軍正參軍威寇將軍河隄謁者主書郎威虜將軍詹事五官威戎將軍門下主書舍人威武將軍門下通事舍人司州司事司州從事代郡功曹主簿右第六品上右第六品中右第六品下諸開府行參軍監淮海津都尉戟楯虎賁散員士諸局中校尉募員虎賁中書舍人方舞郎高車虎賁領護二衛主簿諸宮門僕治禮郎主事郎諸開府記室督獄丞詹事主簿司馬督集書舍人千人督中軍鎮軍撫軍行參軍校尉領護功曹掾領護五官散臣中校宿衛統太子常從虎賁督侍幹寺人閽人掌璽郎太子守舍人掌服郎掌筵郎虎賁郎諸開府掾屬集書校書郎祕書校書郎祕書鍾律郎右從第六品上右從第六品中右從第六品下公府舍人國子學生祕書舍人太子主書舍人討寇將軍符史郎太子主衣舍人討虜將軍蕩寇將軍都令史討難將軍蕩虜將軍主書令史討夷將軍蕩難將軍門下令史蕩逆將軍太子左右衛率主簿太廟門僕司事郎司州録事代郡通事御屬綏遠將軍綏虜將軍綏邊將軍右第七品上右第七品中右第七品下諸門府舍人祝史諸局督事祕書令史太常齋郎獄掾主書令史王家尉太學典録集書令史公主家令太史博士起居注令史太卜博士