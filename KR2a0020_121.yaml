body:
  text: 魏書卷一百八之一禮志四之一第十夫在天莫明於日月在人莫明於禮儀先王以安上治民用成風化苟或失之斯亡云及聖者因人有尊敬哀思嗜慾喜怒之情而制以上下隆殺長幼衆寡之節本於人心會於神道故使三才惟穆百姓允諧而淳澆世殊質文異設損益相仍隨時作範秦滅儒經漢承其弊三代之禮蓋如綫焉劉氏中興頗率周典魏晉之世抑有可知自永嘉擾攘神州蕪穢禮壞樂崩人神殲殄太祖南定燕趙日不暇給仍世征伐務恢疆宇雖馬上治之未遑制作至於經國軌儀互舉其大但事多粗略且兼闕遺高祖稽古率由舊則斟酌前王擇其令典朝章國範煥乎復振早年厭世叡慮未從不爾劉馬之迹夫何足數世宗優遊在上致意玄門儒業文風顧有未洽墜禮淪聲因之而往肅宗已降魏道衰羸太和之風仍世凋落以至於海內傾圮綱紀泯然嗚呼魯秉周禮國以克固齊臣撤器降人折謀治身不得以造次忘治國庸可而須臾忽也初自皇始迄於武定朝廷典禮之迹故總而錄之太祖登國元年即代王位於牛川西向設祭告天成禮天興元年定都平城即皇帝位立壇兆告祭天地祝曰皇帝臣珪敢用玄牡昭告于皇天后土之靈上天降命乃眷我祖宗世王幽都珪以不德纂戎前緒思寧黎元龔行天罰殪劉顯屠衞辰平慕容定中夏羣下勸進謂宜正位居尊以副天人之望珪以天時人謀不可久替謹命禮官擇吉日受皇帝璽綬惟神祇其丕祚於魏室永綏四方事畢詔有司定行次正服色羣臣奏以國家繼黃帝之後宜為土德故神獸如牛牛土畜又黃星顯曜其符也於是始從土德數用五服尚黃犧牲用白祀天之禮用周典以夏四月親祀于西郊徽幟有加焉二年正月帝親祀上帝于南郊以始祖神元皇帝配為壇通四陛為壝三重天位在其上南面神元西面五精帝在壇內壝內四帝各於其方一帝在未日月五星二十八宿天一太一北斗司中司命司祿司民在中壝內各因其方其餘從食者合一千餘神餟在外壝內藉用藁秸玉用四珪幣用束帛牲用黝犢器用陶匏上帝神元用犢各一五方帝共用犢一日月等共用牛一祭畢燎牲體左於壇南巳地從陽之義其瘞地壇兆制同南郊明年正月辛酉郊天癸亥瘞地於北郊以神元竇皇后配五岳名山在中壝內四瀆大川於外壝內后土神元后牲共用玄牡一玉用兩珪幣用束帛五岳等用牛一祭畢瘞牲體右於壇之北亥地從陰也乙丑赦京師畿內五歲刑以下其後冬至祭上帝于圓丘夏至祭地于方澤用牲幣之屬與二郊同冬十月平文昭成獻明廟成歲五祭用二至二分臘牲用太牢常遣宗正兼太尉率祀官侍祀置太社太稷帝社於宗廟之右為方壇四陛祀以二月八月用戊皆太牢句龍配社周棄配稷皆有司侍祀立祖神常以正月上未設藉於端門內祭牲用羊豕犬各一又立神元思帝平文昭成獻明五帝廟於宮中歲四祭用正冬臘九月牲用馬牛各一太祖親祀宮中立星神一歲一祭常以十二月用馬薦各一牛豕各二雞一太祖初有兩彗星見劉后使占者占之曰祈之則當掃定天下后從之故立其祀又立神十二歲一祭常以十一月各用牛一雞三又立王神四歲二祭常以八月十月各用羊一又置獻明以上所立天神四十所歲二祭亦以八月十月神尊者以馬次以牛小以羊皆女巫行事又於雲中及盛樂神元舊都祀神元以下七帝歲三祭正冬臘用馬牛各一祀官侍祀明年春帝始躬耕籍田祭先農用羊一祀日於東郊用騂牛一秋分祭月於西郊用白羊一天賜二年夏四月復祀天于西郊為方壇一置木主七於上東為二陛無等周垣四門門各依其方色為名牲用白犢黃駒白羊各一祭之日帝御大駕百官及賓國諸部大人畢從至郊所帝立青門內近南壇西內朝臣皆位於帝北外朝臣及大人咸位於青門之外后率六宮從黑門入列於青門內近北並西面廩犧令掌牲陳於壇前女巫執鼓立於陛之東西面選帝之十族子弟七人執酒在巫南西面北上女巫升壇搖鼓帝拜后肅拜百官內外盡拜祀訖復拜拜訖乃殺牲執酒七人西向以酒灑天神主復拜如此者七禮畢而返自是之後歲一祭太宗永興三年三月帝禱于武周車輪二山初清河王紹有寵於太祖性凶悍帝每以義責之弗從帝懼其變乃於山上祈福於天地神祇及即位壇兆後因以為常祀歲一祭牲用牛帝皆親之無常日明年立太祖廟于白登山歲一祭具太牢帝親之亦無常月兼祀皇天上帝以山神配旱則禱之多有效是歲詔郡國於太祖巡幸行宮之所各立壇祭以太牢歲一祭皆牧守侍祀又立太祖別廟於宮中歲四祭用牛馬羊各一又加置天日月之神及諸小神二十八所於宮內歲二祭各用羊一後二年於白登西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊及親行貙劉之禮別置天神等二十三於廟左右其神大者以馬小者以羊華陰公主帝姊也元紹之為逆有保護功故別立其廟於太祖廟垣後因祭薦焉又於雲中盛樂金陵三所各立太廟四時祀官侍祀泰常三年為五精帝兆於四郊遠近依五行數各為方壇四陛壝三重通四門以太皡等及諸佐隨配侑祭黃帝常以立秋前十八日餘四帝各以四立之日牲各用牛一有司主之又六宗靈星風伯雨師司民司祿先農之壇皆有別兆祭有常日牲用少牢立春之日遣有司迎春於東郊祭用酒脯棗栗無牲幣又立五岳四瀆廟於桑乾水之陰春秋遣有司祭有牲及幣四瀆唯以牲牢準古望秩云其餘山川及海若諸神在州郡者合三百二十四所每歲十月遣祀官詣州鎮遍祀有水旱災厲則牧守各隨其界內祈謁其祭皆用牲王畿內諸山川皆列祀次祭若有水旱則禱之明年八月帝嘗於白登廟將薦熟有神異焉太廟博士許鍾上言曰臣聞聖人能饗帝孝子能饗親伏惟陛下孝誠之至通於神明近嘗於太祖廟有車騎聲從北門入殷殷轞轞震動門闕執事者無不肅慄斯乃國祚永隆之兆宜告天下使咸知聖德之深遠辛未幸代至雁門關望祀岳後二年九月幸橋山遣有司祀黃帝唐堯廟明年正月南巡岳祀以太牢幸洛陽遣使以太牢祀嵩高華岳還登太行五月至自洛陽諸所過山川羣祀之後三年二月祀孔子於國學以顏淵配神二年帝將征蠕蠕省郊祀儀四月以小駕祭天神畢帝遂親戎大捷而還歸格於祖禰徧告羣神九月立密皇太后廟於鄴后之舊鄉也置祀官太常博士齋郎三十餘人侍祀歲五祭太延元年立廟於岳華岳嵩岳上各置侍祀九十人歲時祈禱水旱其春秋泮涸遣官率刺史祭以牲牢有玉幣魏先之居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔遠真君中烏洛侯國遣使朝獻云石廟如故民常祈請有神驗焉其歲遣中書侍郎李敞詣石室告祭天地以皇祖先妣配祝曰天子燾謹遣敞等用駿足一元大武敢昭告于皇天之靈自啟闢之初祐我皇祖于彼土田歷載億年聿來南遷惟祖惟父光宅中原克翦凶醜拓定四邊冲人纂業德聲弗彰豈謂幽遐稽首來王具知舊廟弗毀弗亡悠悠之懷希仰餘光王業之興起自皇祖綿綿瓜瓞時惟多祜敢以丕功配饗于天子子孫孫福祿永延敞等既祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神奉之咸謂魏國感靈祇之應也石室南距代京可四千餘里明年六月司徒崔浩奏議神祀多不經案祀典所宜祀凡五十七所餘復重及小神請皆罷之奏可十一年十一月世祖南征逕山祀以太牢浮河濟祀以少牢過岱宗祀以太牢至魯以太牢祭孔子遂臨江登瓜步而還文成皇帝即位二年正月遣有司詣華岳修廟立碑數十人在山上聞虛中若有音聲聲中稱萬歲云和平元年正月帝東巡歷橋山祀黃帝幸遼西望祀醫無閭山遂緣海西南幸冀州北至中山過岳禮其神而返明年帝南巡過石門遣使者用玉璧牲牢禮岳四月旱下詔州郡於其界內神無大小悉洒掃薦以酒脯年登之後各隨本秩祭以牲牢至是羣祀先廢者皆復之顯祖皇興二年以青徐既平遣中書令兼太常高允奉玉幣祀於東岳以太牢祀孔子高祖延興二年有司奏天地五郊社稷已下及諸神合一千七十五所歲用牲七萬五千五百顯祖深愍生命乃詔曰朕承天事神以育羣品而咸秩處廣用牲甚衆夫神聰明正直享德與信何必在牲易曰東隣殺牛不如西隣之礿祭實受其福苟誠感有著雖行潦菜羹可以致大嘏何必多殺然後獲祉福哉其命有司非郊天地宗廟社稷之祀皆無用牲於是羣祀悉用酒脯先是長安牧守常有事於周文武廟四年坎地埋牲廟玉發見四月詔東陽王丕祭文武二廟以廟玉露見若即而埋之或恐愚民將為盜竊敕近司收之府藏六月顯祖以西郊舊事歲增木主七易世則更兆其事無益於神明初革前儀定置主七立碑於郊所太和二年旱帝親祈皇天日月五星於苑中祭之夕大雨遂赦京師三年上祈於北苑又禱星於苑中六年十一月將親祀七廟詔有司依禮具儀於是羣官議曰昔有虞親虔祖考來格殷宗躬謁介福逌降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中思親祀事稽合古王禮之常典臣等謹案舊章并採漢魏故事撰祭服冠屨牲牢之具罍洗簠簋俎豆之器百官助祭位次樂官節奏之引升降進退之法別集為親拜之儀制可於是上乃親祭其後四時常祀皆親之十年四月帝初以法服御輦祀於西郊十二年閏九月帝親築圓丘於南郊十三年正月帝以大駕有事於圓丘五月庚戌車駕有事於方澤壬戌高祖臨皇信堂引見羣臣詔曰禮記祭法稱有虞氏禘黃帝大傳曰禘其祖之所自出又稱不王不禘論曰禘自既灌詩頌長發大禘爾雅曰禘大祭也夏殷四時祭礿禘烝嘗周改禘為礿祭義稱春禘秋嘗亦夏殷祭也王制稱犆礿祫禘祫嘗祫烝其禮傳之文如此鄭玄解禘天子祭圓丘曰禘祭宗廟大祭亦曰禘三年一祫五年一禘祫則合羣毀廟之主於太廟合而祭之禘則增及百官配食者審諦而祭之天子先禘祫而後時祭諸侯先時祭而後禘祫魯禮三年喪畢而祫明年而禘圓丘宗廟大祭俱稱禘祭有兩禘明也王肅解禘祫稱天子諸侯皆禘於宗廟非祭天之祭郊祀后稷不稱禘宗廟稱禘禘祫一名也合而祭之故稱祫審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉之故稱五年再殷祭不言一禘一祫斷可知矣禮文大略諸儒之說盡具於此卿等便可議其是非尚書游明根左丞郭祚中書侍郎封琳著作郎崔光等對曰鄭氏之義禘者大祭之名大祭圓丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆圓丘常合不言祫宗廟時合故言祫斯則宗廟祫禘並行圓丘一禘而已宜於宗廟俱行禘祫之禮二禮異故名殊依禮春廢犆礿於嘗於蒸則祫不於三時皆行禘祫之禮中書監高閭儀曹令李韶中書侍郎高遵等十三人對稱禘祭圓丘之禘與鄭義同其宗廟禘祫之祭與王義同與鄭義同者以為有虞禘黃帝黃帝非虞在廟之帝不在廟非圓丘而何又大傳稱祖其所自出之祖又非在廟之文論稱禘自既灌事似據爾雅稱禘大祭也頌長發大禘也殷王之祭斯皆非諸侯之禮諸侯無禘禮唯夏殷夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行圓丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名據王氏之義祫而禘祭之故言禘祫總謂再殷祭明不異也禘祫一名也其禘祫止於一時止於一時者祭不欲數數則黷一歲而三禘愚以為過數帝曰尚書中書等據二家之義論禘祫詳矣然於行事取衷猶有未允監等以禘祫為名義同王氏禘祭圓丘事與鄭同無所間然尚書等與鄭氏同兩名兩祭並存並用理有未稱俱據二義一時禘祫而闕二時之禘事有難從夫先王制禮內緣人子之情外崙頁尊卑之序故天子七廟諸侯五廟大夫三廟數盡則毀藏主於太祖之廟三年而祫祭之世盡則毀以示有終之義三年而祫以申追遠之情禘祫既是一祭分而兩之事無所據毀廟三年一祫又有不盡四時於禮為闕七廟四時常祭祫則三年一祭而又不究四時於情為簡王以禘祫為一祭王義為長鄭以圓丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫并為一名從王禘是祭圓丘大祭之名上下同用從鄭若以數則黷五年一禘改祫從禘五年一禘則四時盡禘以稱今情禘則依禮文先禘而後時祭便即施行著之於令永為世法高閭曰書稱肆類于上帝禋于六宗六宗之祀禮無明文名位壇兆歷代所疑漢魏及晉諸儒異說或稱天地四時或稱六者之間或稱易之六子或稱風雷之類或稱星辰之屬或曰世代所宗或云宗廟所尚或曰社稷五祀凡有十一家自晉已來逮于聖世以為論者雖多皆有所闕莫能評究遂相因承別立六宗之兆總為一位而祭之比敕臣等評議取衷附之祀典臣等承旨披究往說各有其理較而論之長短互有若偏用一家事或差舛衆疑則從多今惑則仍古請依先別處六宗之兆總為一祀而祭之帝曰詳定朝令祀為事首以疑從疑何所取正昔石渠虎閤之議皆準類以引義原事以證情故能通百家之要定累世之疑況今有文可據有本可推而不評而定之其致安在朕躬覽尚書之文稱肆類上帝禋於六宗文相連屬理似一事上帝稱肆而無禋六宗言禋而不別其名以此推之上帝六宗當是一時之祀非別祭之名肆類非獨祭之目焚煙非他祀之用六宗者必是天皇大帝及五帝之神明矣禋是祭帝之事故稱禋以關其他故稱六以證之然則肆類上帝禋于六宗一祭也互舉以成之今祭圓丘五帝在焉其牲幣俱禋故稱肆類上帝禋于六宗一祭而六祀備焉六祭既備無煩復別立六宗之位便可依此附令永為定法十四年八月詔曰丘澤初志配尚宜定五德相襲分有常然異同之論著於往漢未詳之說疑在今史羣官百辟可議其所應必令合衷以成萬代之式中書監高閭議以為帝王之作百代可知運代相承書傳可驗雖祚命有長短德政有優劣至於受終嚴祖殷薦上帝其致一也故敢述其前載舉其大略臣聞居尊據極允應明命者莫不以中原為正統神州為帝宅苟位當名全化迹流洽則不專以世數為與奪善惡為是非故堯舜禪揖一身異尚魏晉相代少紀運殊桀紂至虐不廢承歷之厲惠至昏不闕周晉之錄計五德之論始自漢劉一時之議三家致別故張蒼以漢為水德賈誼公孫臣以漢為土德劉向以漢為火德以為水德者正以嘗有水溢之應則不推運代相承之數矣以土德者則以亡秦繼曆相即為次不推逆順之異也以為火德者懸證赤帝斬蛇之符棄秦之暴越惡承善不以世次為正也故以承周為火德自茲厥後乃以為常魏承漢火生土故魏為土德晉承魏土生金故晉為金德趙承晉金生水故趙為水德燕承趙水生木故燕為木德秦承燕木生火故秦為火德秦之未滅皇魏未克神州秦氏既亡大魏稱制玄朔故平文之廟始稱太祖以明受命之證如周在岐之陽若繼晉晉亡已久若棄秦則中原有寄推此而言承秦之理事為明驗故以魏承秦魏為土德又五緯表驗黃星曜彩考氏定實合德軒轅承土祖未事為著矣又秦趙及燕雖非明聖各正號赤縣統有中土郊天祭地肆類咸秩明刑制禮不失舊章奄岱踰河境被淮漢非若齷齪邊方僭擬之屬遠如孫權劉備近若劉裕道成事繫蠻夷非關中夏伏惟聖朝德配天地道被四海承乾統曆功侔百王光格同於唐虞享祚流於周漢正位中境奄有萬方今若并棄三家遠承晉氏則蔑中原正次之實存之無損於此而有成於彼廢之無益於今而有傷於事臣愚以為宜從尚黃定為土德又前代之君明賢之史皆因其可褒褒之可貶貶之今議者偏據可絕之義而不錄可全之禮所論事大垂之萬葉宜並集中秘羣儒人人別議擇其所長於理為悉秘書丞臣李彪著作郎崔光等議以為尚書閭議繼近秦氏臣職掌國籍頗覽前書惜此正次慨彼非緒輙仰推帝始遠尋百王魏雖建國君民兆眹振古祖黃制朔緜迹有因然此帝業神元為首案神元晉武往來和好至于桓穆洛京破亡二帝志摧聰勒思存晉氏每助劉琨申威并冀是以晉室銜扶救之仁越石深代王之請平文太祖抗衡苻石終平燕氏大造中區則是司馬祚終於郟鄏而元氏受命於雲代蓋自周之滅及漢正號幾六十年著符尚赤後雖張賈殊議暫疑而卒從火德以繼周氏排虐嬴以比共工蔑暴項而同吳廣近蠲謬偽遠即神正若此之明也寧使白蛇徒斬雕雲空結哉自有晉傾淪暨登國肇號亦幾六十餘載物色旗幟率多從黑是又自然合應玄同漢始且秦并天下革創法度漢仍其制少所變易猶仰推五運竟踵隆姬而況劉石苻燕世業促褊綱紀弗立魏接其弊自有彝典豈可異漢之承木捨晉而為土耶夫皇統崇極承運至重必當推崙頁天緒考審王次不可雜以僭竊參之強狡神元既晉武同世桓穆與懷愍接時晉室之淪平文始大廟號太祖抑亦有由紹晉定德孰曰不可而欲次茲偽僭豈非惑乎臣所以慺慺惜之唯垂察納詔令羣官議之十五年正月侍中司空長樂王穆亮侍中尚書左僕射平原王陸叡侍中吏部尚書中山王王元孫侍中尚書駙馬都尉南平王馮誕散騎常侍都曹尚書新泰侯游明根散騎常侍南部令鄧侍祖秘書中散李愷尚書左丞郭祚右丞霸城子衞慶中書侍郎封琳中書郎泰昌子崔挺中書侍郎賈元壽等言臣等受敕共議中書監高閭秘書丞李彪等二人所議皇魏行次尚書高閭以石承晉為水德以燕承石為木德以秦承燕為火德大魏次秦為土德皆以地據中夏以為得統之徵皇魏建號事接秦末晉既滅亡天命在我故因中原有寄即而承之彪等據神元皇帝與晉武並時桓穆二帝仍修舊好始自平文逮于太祖抗衡秦趙終平慕容晉祚終於秦方大魏興於雲朔據漢棄秦承周之義以皇魏承晉為水德二家之論大略如此臣等謹共參論伏惟皇魏世王玄朔下迄魏晉趙秦二燕雖地據中華德祚微淺並獲推於理未愜又國家積德修長道光萬載彪等職主東觀詳究圖史所據之理其致難奪今欲從彪等所議宜承晉為水德詔曰越近承遠情所未安然考次推時頗亦難繼朝賢所議豈朕能有違奪便可依為水德祖申臘辰四月經始明堂改營太廟詔曰祖有功宗有德自非德厚者不得擅祖宗之名居二祧之廟仰惟先朝舊事舛駁不同難以取準今將述遵先志具詳禮典宜制祖宗之號定將來之法烈祖有創基之功世祖有開拓之德宜為祖宗百世不遷而遠祖平文功未多於昭成然廟號為太祖道武建業之勳高於平文廟號為烈祖比功校德以為未允朕今奉尊道武為太祖與顯祖為二祧餘者以次而遷平文既遷廟唯有六始今七廟一則無主唯當朕躬此事亦臣子所難言夫生必有終人之常理朕以不德忝承洪緒若宗廟之靈獲全首領以沒于地為昭穆之次心願畢矣必不可豫設可垂之文示後必令遷之司空公長樂王穆亮等奏言升平之會事在於今推功考德實如明旨但七廟之祀備行日久無宜闕一虛有所待臣等愚謂依先尊祀可垂文示後理衷如此不敢不言詔曰理或如此比有間隙當為文相示八月壬辰詔郡國有時果可薦者並送京師以供廟饗又詔曰禮云自外至者無主不立先朝以來以正月吉日於朝廷設幕中置松栢樹設五帝坐此既無可祖配揆之古典實無所取可去此祀又探策之祭既非禮典可悉罷之戊午詔曰國家自先朝以來饗祀諸神凡有一千二百餘處今欲減省羣祀務從簡約昔漢高之初所祀衆神及寢廟不少今日至于元成之際匡衡執論乃得減省後至光武之世禮儀始備饗祀有序凡祭不欲數數則黷黷則不敬神聰明正直不待煩祀也又詔曰明堂太廟並祀祖宗配祭配享於斯備矣白登崞山雞鳴山廟唯遣有司行事馮宣王誕生先后復因在官長安立廟宜異常等可敕雍州以時供祭又詔曰先有水火之神四十餘名及城北星神今圓丘之下既祭風伯雨師司中司命明堂祭門戶井竈中霤每神皆有此四十神計不須立悉可罷之甲寅集羣官詔曰近論朝日夕月皆欲以二分之日於東西郊行禮然月有餘閏行無常準若一依分日或值月出於東而行禮於西尋情即理不可施行昔秘書監薛謂等嘗論此事以為朝日以朔夕月以朏卿等意謂朔朏二分何者為是尚書游明根對曰考案舊式推校衆議宜從朏月十一月己未朔帝釋禫祭於太和廟帝衮冕與祭者朝服既而帝冠黑介幘素紗深衣拜山陵而還宮庚申帝親省齊宮冠服及郊祀俎豆癸亥冬至將祭圓丘帝衮冕劍舄侍臣朝服辭太和廟之圓丘升祭柴燎遂祀明堂大合既而還之太和廟乃入甲子帝衮冕辭太和廟臨太華殿朝羣官既而帝冠通天絳紗袍臨饗禮帝感慕樂懸而不作丁卯遷廟陳列冕服帝躬省之既而帝衮冕辭太和廟之太廟百官陪從奉神主於齋車至新廟有司升神主於太廟諸王侯牧守四海蕃附各以其職來祭十六年正月戊午詔曰夫四時享祀人子常道然祭薦之禮貴賤不同故有邑之君祭以首時無田之士薦以仲月況七廟之重而用中節者哉自頃蒸嘗之禮頗違舊義今將仰遵遠式以此孟月犆礿於太廟但朝典初改衆務殷湊無遑齋潔遂及於今又接神饗祖必須擇日今禮律未宣有司或不知此可敕太常令剋日以聞二月丁酉詔曰夫崇聖祀德遠代之通典秩中古之近規故三五至仁唯德配享夏殷私己稍用其姓且法施於民祀有明典立功垂惠祭有式斯乃異代同途弈世共軌今遠遵明令憲章舊則比於祀令已為決之其孟春應祀者頃以事殷遂及今日可令仍以仲月而饗祀焉凡在祀令者其數有五帝堯樹則天之功興巍巍之治可祀於平陽虞舜播太平之風致無為之化可祀於廣寧夏禹禦洪水之災建天下之利可祀於安邑周文公制禮作樂垂範萬葉可祀於洛陽其宣尼之廟已於中省當別敕有司饗薦之禮自文公已上可令當界牧守各隨所近攝行祀事皆用清酌尹祭也丙午詔有司剋吉亥備小駕躬臨千畝官別有敕癸丑帝臨宣文堂引儀曹尚書劉昶鴻臚卿游明根行儀曹事李韶授策孔子崇文聖之諡於是昶等就廟行事既而帝齋中書省親拜祭於廟九月甲寅朔大享於明堂祀文明太后於玄室帝親為之詞十月己亥詔曰夫先王制禮所以經綸萬代貽法後昆至乃郊天享祖莫不配祭然而有節白登廟者有為而興昭穆不次故太祖有三層之宇已降無方丈之室又常用季秋躬駕展虔祀禮或有褻慢之失嘉樂頗涉野合之譏今授衣之旦享祭明堂玄冬之始奉烝太廟若復致齋白登便為一月再駕事成褻瀆回詳二理謂宜省一白登之高未若九室之美幃次之華未如清廟之盛將欲廢彼東山之祀成此二享之敬可具敕有司但令內典神者攝行祭事獻明道武各有廟稱可具依舊式自太宗諸帝昔無殿宇因停之十八年南巡正月次殷比干墓祭以太牢三月詔罷西郊祭天十九年帝南征正月車駕濟淮命太常致祭又詔祀岱岳二月癸亥詔曰知太和廟已就神儀靈主宜時奉寧可剋三月三日己巳內奉遷於正廟其出金墉之儀一準出代都太和之式入新廟之典可依近至金墉之軌其威儀鹵簿如出代廟百官奉遷宜可省之但令朝官四品已上侍官五品已上及宗室奉迎六月相州刺史高閭表言伏惟太武皇帝發孝思之深誠同渭陽之遠感以鄴土舅氏之故鄉有歸魂之舊宅故為密皇后立廟於城內歲時祭祀置廟戶十家齋宮三十人春秋烝嘗冠服從事刺史具威儀親行薦酌升降揖讓與七廟同儀禮畢撤會而罷今廟殿虧漏門牆傾毀簠簋故敗行禮有闕臣備職司目所親覩若以七廟惟新明堂初制配饗之儀備於京邑者便應罷壞輟其常祭如以功高特立宜應新其靈宇敢陳所見伏請恩裁詔罷之十一月庚午帝幸委粟山議定圓丘己卯帝在合溫室引咸陽王禧司空公穆亮吏部尚書任城王澄及議禮之官詔曰朝集公卿欲論圓丘之禮今短晷斯極長日方至案周官祀昊天上帝於圓丘禮之大者兩漢禮有參差魏晉猶亦未一我魏氏雖上參三皇下考叔世近代都祭圓丘之禮復未考周官為不刊之法令以此祭圓丘之禮示卿等欲與諸賢考之厥衷帝曰夕牲之禮無可依準近在代都已立其議殺牲祼神誠是一日之事終無夕而殺牲待明而祭員外散騎常侍劉芳對曰臣謹案周官牧人職正有夕展牲之禮實無殺牲之事秘書令李彪曰夕不殺牲誠如聖旨未審告廟以不臣聞魯人將有事于上帝必先有事于泮宮注曰先人以此推之應有告廟帝曰卿言有理但朕先以郊配意欲廢告而卿引證有據當從卿議帝又曰圓丘之牲色無常準覽推古事乖互不一周家用騂解言是尚晉代靡知所據舜之命禹悉用堯辭復言玄牡告于后帝今我國家時用夏正至於牲色未知何準秘書令李彪曰觀古用玄似取天玄之義臣謂宜用玄至於五帝各象其方色亦有其義帝曰天何時不玄地何時不黃意欲從玄又曰我國家常聲鼓以集衆易稱二至之日商旅不行后不省方以助微陽微陰今若依舊鳴鼓得無闕寢鼓之義員外郎崔逸曰臣案周禮當祭之日靁鼓靁鼗八面而作猶不妨陽臣竊謂以鼓集衆無妨古義癸未詔三公衮冕八章太常鷩冕六章用以陪薦甲申長至祀昊天於委粟山大夫祭疑二十年立方澤於河陰仍遣使者以太牢祭漢光武及明章三帝陵
