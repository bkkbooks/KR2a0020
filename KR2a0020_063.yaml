body:
  text: 魏書卷五十八列傳第四十六楊播楊播字延慶自云農華陰人也高祖結仕慕容氏卒於中山相曾祖珍太祖時歸國卒於上谷太守祖真河內清河二郡太守父懿延興末為廣平太守有稱績高祖南巡吏人頌之加寧遠將軍賜帛三百匹徵為選部給事中有公平之譽除安南將軍洛州刺史未之任而卒贈以本官加弘農公諡曰簡播本字元休太和中高祖賜改焉母王氏文明太后之外姑播少修整奉養盡禮擢為中散纍遷給事領中起部曹以外親優賜亟加前後萬計進北部給事中詔播巡行北邊高祖親送及戶戒以軍略未幾除龍驤將軍員外常侍轉衛尉少卿常侍如故與陽平王頤等出漠北擊蠕蠕大獲而還高祖嘉其勳賜奴婢十口遷武衛將軍復擊蠕蠕至居然山而還除左將軍尋假前將軍隨車駕南討至鍾離師回詔播領步卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴陳南岸身自居後諸軍渡盡賊衆遂集於是圍播乃為圓陳以禦之身自搏擊斬殺甚多相拒再宿軍人食盡賊圍更急高祖在北而望之既無舟船不得救援水勢稍減播領精騎三百歷其舟船大呼曰今我欲渡能戰者來賊莫敢動遂擁衆而濟高祖甚壯之賜爵華陰子尋除右衛將軍後從駕討崔慧景蕭衍於鄧城破之進號平東將軍時車駕耀威沔水上巳設宴高祖與中軍彭城王協賭射左衛元遙在協朋內而播居帝曹遙射侯正中籌限已滿高祖曰左衛籌足右衛不得不解播對曰仰恃聖恩庶幾必爭於是彎弓而發其箭正中高祖笑曰養由基之妙何復過是遂舉卮酒以賜播曰古人酒以養病朕今賞卿之能可謂今古之殊也從到懸瓠除太府卿進爵為伯景明初兼侍中使州贍恤寒乏轉左衛將軍出除安北將軍并州刺史固辭乃授安西將軍華州刺史至州借民田為御史王基所劾削除官爵延昌二年卒于家子侃等停柩不葬披訴積年至熙平中乃贈鎮西將軍雍州刺史并復其爵諡曰壯侃字士業頗愛琴書尤好計畫時播一門貴滿朝廷兒姪早通而侃獨不交遊公卿罕有識者親朋勸其出仕侃曰苟有良田何憂晚歲但恨無才具耳年三十一襲爵華陰伯釋褐太尉汝南王悅騎兵參軍揚州刺史長孫稚請為録事參軍蕭衍豫州刺史裴邃治合肥城規相掩襲密購壽春郭人李瓜花袁建等令為內應邃已纂勒兵士有期日矣而慮壽春疑覺遂謬移云魏始於馬頭置戍如聞復欲修白捺舊城若爾便稍相侵逼此亦須營歐陽設交境之備今板卒已集唯聽信還佐僚咸欲以實答之云無修白捺意而侃曰白捺小城本非形勝邃好小黠今集兵遣移虛搆是言得無有別圖也稚深悟之乃云録事可造移報侃移曰彼之纂兵想別有意何為妄構白捺也他人有心豫忖度之勿謂秦無人也邃得移謂已知覺便爾散兵瓜花等以期契不會便相告發伏辜者十數家邃後竟襲壽春入羅城而退遂列營於黎漿梁城日夕鈔掠稚乃奏侃為統軍侃叔椿為雍州刺史又請為其府録事參軍帶長安令府州之務多所委決及蕭寶夤等軍敗北地功曹毛洪賓據郡引寇抄掠渭北侃啓椿自出討之遂購募戰士信宿之間得三千餘人銜枚夜進至馮翊郡西賊見大軍卒至衆情離解洪賓遂通書送質乞求自效於是擒送宿勤明達兄子賊署南平王烏過仁後雍州刺史蕭寶夤據州反尚書僕射長孫稚討之除侃鎮遠將軍諫議大夫為稚行臺左丞尋轉通直散騎常侍軍次弘農侃白稚曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類算略抗行當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所騁奇必須北取蒲坂飛棹西岸置兵死地人有鬬心華州之圍可不戰而解潼關之賊必望風潰散諸處既平長安自克愚計可録請為明公前驅稚曰薛修義已圍河東薛鳳賢又保安邑都督宗正珍孫停師虞坂久不能進雖有此計猶用為疑侃曰珍孫本行陳一夫因緣進達可為人使未可使人一旦受元帥之任處分三軍精神亂矣寧堪圍賊河東治在蒲坂西帶河湄所部之民多在東境修義驅率壯勇西圍郡邑父老妻弱尚保舊村若率衆一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彥等領騎與侃於弘農北渡所領悉是騎士習於野戰未可攻城便據石錐壁侃乃班告曰今且停軍於此以待步卒兼觀民情向背然後可行若送降名者各自還村候臺軍舉烽火各亦應之以明降款其無應烽者即是不降之村理須殄戮賞賚軍士民遂轉相告報未實降者亦詐舉烽一宿之間火光遍數百里內圍城之寇不測所以各自散歸修義亦即逃遁長安平侃頗有力建義初除冠軍將軍東雍州刺史其年州罷除中散大夫為都督鎮潼關還朝除右將軍岐州刺史屬元皓內逼詔以本官假撫軍將軍為都督率衆鎮大梁未發詔行北中郎將孝莊徙御河北執侃手曰朕停卿蕃寄移任此者正為今日但卿尊卑百口若隨朕行所纍處大卿可還洛寄之後圖侃曰此誠陛下曲恩寧可以臣微族頓廢君臣之義固求陪從至建州行從功臣自城陽王徽已下凡十人並增三階以侃河梁之誠特加四階侃固辭乞同諸人久乃見許於是除鎮軍將軍度支尚書兼給事黃門侍郎敷西縣開國公食邑一千戶及車駕南還皓令蕭衍將陳慶之守北中城自據南岸有夏州義士為皓守河中渚乃密信通款求破橋立效爾朱榮率軍赴之及橋破應接不果皆為皓所屠滅榮因悵然將為還計欲更圖後舉侃曰未審明大王發并州之日已知有夏州義士指來相應為欲廣申經略寧復帝基乎夫兵散而更合瘡愈而更戰持此收功自古不少豈可以一圖不全而衆慮頓廢今事不果乃是兩賊相殺則大王之利矣若今即還民情失望去就之心何由可保未若召發民材惟多縛筏間以舟楫沿河廣布令數百里中皆為渡勢首尾既遠皓復知防何處一旦得渡必立大功榮大笑曰黃門即奏行此計於是爾朱兆與侃等遂與馬渚諸楊南渡破皓子領軍將軍冠受擒之皓便南走車駕入都侃解尚書正黃門加征東將軍金紫光祿大夫以濟河之功進爵濟北郡開國公增邑五百戶復除其長子師沖為祕書郎時所用錢人多私鑄稍就薄小乃至風飄水浮米斗幾直一千侃奏曰昔馬援至隴西嘗上書求復五銖錢事下三府不許及援徵入為虎賁中郎親對光武申釋其趣事始施行臣頃在雍州亦表陳其事聽人與官並鑄五銖錢使人樂為而俗弊得改旨下尚書八座不許以今況昔即理不殊求取臣前表經御披析侃乃隨事剖辨孝莊從之乃鑄五銖錢如侃所奏万俟醜奴陷東秦遂圍岐州扇誘巴蜀大都督爾朱天光率衆西伐詔侃以本官使持節兼尚書僕射為關右慰勞大使還朝除侍中加衛將軍右光祿大夫莊帝將圖爾朱榮也侃與其內弟李晞城陽王徽侍中李彧等咸預密謀爾朱兆之入洛也侃時休沐遂得潛竄歸於華陰普泰初天光在關西遣侃子婦父韋義遠招慰之立盟許恕其罪侃從兄昱恐為家禍令侃出應假其食言不過一人身歿冀全百口侃往赴之秋七月為天光所害太昌初贈車騎將軍儀同三司幽州刺史子純陀襲播弟椿字延壽本字仲考太和中與播俱蒙高祖賜改性寬謹初拜中散典御曹以端慎小心專司醫藥遷內給事與兄播並侍禁闈又領蘭臺行職改授中部曹析訟公正高祖嘉之及文明太后崩高祖五日不食椿進諫曰陛下至性孝過有虞居哀五朝水漿不御羣下惶灼莫知所言陛下荷祖宗之業臨萬國之重豈可同匹夫之節以取僵仆且聖人之禮毀不滅性縱陛下欲自賢於萬代其若宗廟何高祖感其言乃一進粥轉授宮輿曹少卿加給事中出為安遠將軍豫州刺史高祖自洛向豫幸其州館信宿賜馬十匹縑千匹遷冠軍將軍濟州刺史高祖自鍾離趣鄴至碻磝幸其州館又賜馬二匹縑千五百匹坐為平原太守崔敞所訟廷尉論輒收市利費用官炭免官後降為寧朔將軍梁州刺史初武興王楊集始為楊靈珍所破降於蕭鸞至是率賊萬餘自漢中而北規復舊土椿領步騎五千出頓下辨貽書集始開以利害集始執書對使者曰楊使君此書除我心腹之疾遂領其部曲千餘人來降尋以母老解還後武都氐楊會反假椿節冠軍將軍都督西征諸軍事行梁州刺史與軍司羊祉討破之於後梁州運糧為羣氐劫奪詔椿兼征虜將軍持節招慰尋以氐叛拜光祿大夫假平西將軍督征討諸軍事以討之還兼太僕卿秦州羌呂苟兒涇州屠各陳瞻等聚衆反詔椿為別將隸安西將軍元麗討之賊入隴守蹊自固或謀伏兵山徑斷其出入待糧盡而攻之或云斬除山木縱火焚之然後進討椿曰並非計也此本規盜非有經略自王師一至無戰不摧所以深竄者正避死耳今宜勒三軍勿更侵掠賊必謂我見險不前心輕我軍然後掩其不備可一舉而平矣乃緩師不進賊果出掠乃以軍中驢馬餌之不加討逐如是多日陰簡精卒銜枚夜襲斬瞻傳首入正太僕卿加安東將軍初顯祖世有蠕蠕萬餘戶降附居於高平薄骨律二鎮太和之末叛走略盡唯有一千餘家太中大夫王通高平鎮將郎育等求徙置淮北防其叛走詔許之慮不從命乃使椿持節往徙焉椿以為徙之無益上書曰臣以古人有言裔不謀夏夷不亂華荒忽之人羈縻而已是以先朝居之於荒服之間者正欲悅近來遠招附殊俗亦以別華戎異內外也今新附者衆若舊者見徙新者必不安不安必思土思土則走叛狐死首丘其害方甚又此族類衣毛食肉樂冬便寒南土濕熱往必將盡進失歸伏之心退非藩衛之益徙在中夏而生後患愚心所見謂為不可時八座議不從遂徙於濟州緣河居之冀州元愈之難果悉浮河赴賊所在鈔掠如椿所策永平初徐州城人成景俊以宿預叛詔椿率衆四萬討之不克而返久之除都督朔州撫冥武川懷朔三鎮三道諸軍事平北將軍朔州刺史在州為廷尉奏椿前為太僕卿日招引細人盜種牧田三百四十頃依律處刑五歲尚書邢巒據正始別格奏椿罪應除名為庶人注籍盜門同籍合門不仕世宗以新律既班不宜雜用舊制詔依寺斷聽以贖論尋加撫軍將軍入除都官尚書監修白溝堤堰復以本將軍除定州刺史自太祖平中山多置軍府以相威攝凡有八軍軍各配兵五千食祿主帥軍各四十六人自中原稍定八軍之兵漸割南戍一軍兵才千餘然主帥如故費祿不少椿表罷四軍減其帥百八十四人州有宗子稻田屯兵八百戶年常發夫三千草三百車修補畦堰椿以屯兵惟輸此田課更無徭役及至間月即應修治不容復勞百姓椿亦表罷朝廷從之椿在州因治黑山道餘功伐木私造佛寺役使兵力為御史所劾除名為庶人正光五年除輔國將軍南秦州刺史時南秦州反叛路又阻塞仍停長安轉授岐州復除撫軍將軍衛尉卿轉左衛將軍又兼尚書右僕射馳驛詣并肆齎絹三萬匹募召朔流民揀充軍士不行尋加衛將軍出除都督雍南豳二州諸軍事本將軍雍州刺史又進號車騎大將軍儀同三司蕭寶夤元芝諸軍為賊所敗芝從渭北東渡椿使追之不止寶夤後至留於逍遙園內收集將士猶得萬餘由是三輔人心頗得安帖于時涇岐及豳悉已陷賊扶風以西非復國有椿乃鳩募內外得七千餘人遣兄子録事參軍侃率以防禦詔椿以本官加侍中兼尚書右僕射為行臺節度關西諸將其統內五品已下郡縣須有補用者任即擬授椿遇暴疾頻啓乞解詔許之以蕭寶夤代椿為刺史行臺椿還鄉里遇子昱將還京師因謂曰當今雍州刺史亦不賢於蕭寶夤但其上佐朝廷應遣心膂重人何得任其牒用此乃聖朝百慮之一失且寶夤不藉刺史為榮吾觀其得州喜悅不少至於賞罰云為不依常憲恐有異心關中可惜汝今赴京稱吾此意以啓二聖並白宰輔更遣長史司馬防城都督欲安關中正須三人耳如其不遣必成深憂昱還面啓肅宗及靈太后並不信納及寶夤邀害御史中尉酈道元猶上表自理稱為椿父子所謗詔復除椿都督雍岐南豳三州諸軍事本將軍開府儀同三司雍州刺史討蜀大都督椿辭以老病不行建義元年遷司徒公爾朱榮東討葛榮詔椿統衆為後軍榮擒葛榮乃止永安初進位太保侍中給後部鼓吹元皓入洛椿子征東將軍昱出鎮滎陽為皓所擒又椿弟順為冀州刺史順子仲宣正平太守兄子侃弟子遁並從駕河北為皓嫌疑以椿家世顯重恐失人望未及加罪時人助其憂怖或有勸椿攜家避禍椿曰吾內外百口何處逃竄正當坐任運耳莊帝還宮椿每辭遜不許上書頻乞歸老詔曰椿國之老成方所尊尚遽以高年願言致仕顧懷舊德是以未從但告謁頻煩辭理彌固以茲難奪又所重違今便允其雅志可服侍中朝服賜服一具衣一襲八尺床帳几杖不朝乘安車駕駟馬給扶傳詔二人仰所在郡縣時以禮存問安否方乖詢訪良用憮然椿奉詔於華林園帝下御座執椿手流淚曰公先帝舊臣實為元老今四方未寧理須咨訪但高尚其志決意不留既難相違深用悽愴椿亦歔欷欲拜莊帝親執不聽於是賜以絹布給羽林衛送羣公百僚餞於城西張方橋行路觀者莫不稱歎椿臨行誡子孫曰我家入魏之始即為上客給田宅賜奴婢馬牛羊遂成富室自爾至今二十年二千石方伯不絶祿恤甚多至於親姻知故吉凶之際必厚加贈襚來往賓僚必以酒肉飲食是故親姻朋友無憾焉國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾見翁著布衣韋帶常約敕諸父曰汝等後世脫若富貴於今日者慎勿積金一斤綵帛百匹已上用為富也又不聽治生求利又不聽與勢家作婚姻至吾兄弟不能遵奉今汝等服乘以漸華好吾是以知恭儉之德漸不如上世也又吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍別食也又願畢吾兄弟世不異居異財汝等眼見非為虛假如聞汝等兄弟時有別齊獨食者此又不如吾等一世也吾今日不為貧賤然居住舍宅不作壯麗華飾者正慮汝等後世不賢不能保守之方為勢家作奪北都時朝法嚴急太和初吾兄弟三人並居內職兄在高祖左右吾與津在文明太后左右于時口敕責諸內官十日仰密得一事不列便大瞋嫌諸人多有依敕密列者亦有太后高祖中間傳言構間者吾兄弟自相誡曰今忝二聖近臣母子間甚難宜深慎之又列人事亦何容易縱被瞋責慎勿輕言十餘年中不嘗言一人罪過當時大被嫌責答曰臣等非不聞人言正恐不審仰誤聖聽是以不敢言於後終以不言蒙賞及二聖間言語終不敢輒爾傳通太和二十一年吾從濟州來朝在清徽堂豫宴高祖謂諸王諸貴曰北京之日太后嚴明吾每得杖左右因此有是非言語和朕母子者唯楊椿兄弟遂舉賜四兄及我酒汝等脫若萬一蒙時主知遇宜深慎言語不可輕論人惡也吾自惟文武才藝門望姻援不勝他人一旦位登侍中尚書四歷九卿十為刺史光祿大夫儀同開府司徒太保津今復為司空者正由忠貞小心謹慎口不嘗論人過無貴無賤待之以禮以是故至此耳聞汝等學時俗人乃有坐而待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來高祖以下乃有七郡太守三十二州刺史內外顯職時流少比汝等若能存禮節不為奢淫驕慢假不勝人足免尤誚足成名家吾今年始七十五自惟氣力尚堪朝覲天子所以孜孜求退者正欲使汝等知天下滿足之義為一門法耳非是苟求千載之名也汝等能記吾言百年之後終無恨矣椿還華陰踰年普泰元年七月為爾朱天光所害年七十七時人莫不寃痛之太昌初贈都督冀定殷相四州諸軍事太師丞相冀州刺史子昱字元晷起家廣平王懷左常侍懷好武事數出遊獵昱每規諫正始中以京兆廣平二王國臣多有縱恣公行屬請於是詔御史中尉崔亮窮治之伏法於都市者三十餘人其不死者悉除名為民唯昱與博陵崔楷以忠諫得免後除太學博士員外散騎侍郎初尚書令王肅除揚州刺史出頓於洛陽東亭朝貴畢集詔令諸王送別昱伯父播同在餞席酒酣之後廣陽王嘉北海王詳等與播論議競理播不為之屈北海顧謂昱曰尊伯性剛不伏理大不如尊使君也昱前對曰昱父道隆則從其隆道汙則從其汙伯父剛則不吐柔亦不茹一坐歎其能言肅曰非此郎何得申二公之美也延昌三年以本官帶詹事丞于時肅宗在懷抱之中至於出入左右乳母而已不令宮僚聞知昱諫曰陛下不以臣等凡淺備位宮臣太子動止宜令翼從然自此以來輕爾出入進無二傅輔導之美退闕羣僚陪侍之式非所謂示民軌儀著君臣之義陛下若召太子必降手敕令臣下咸知為後世法於是詔曰自今已後若非朕手敕勿令兒輒出宮臣在直者從至萬歲門久之轉太尉掾兼中書舍人靈太后嘗從容謂昱曰今帝年幼朕親萬機然自薄德化不能感親姻在外不稱人心卿有所聞慎勿諱隱昱於是奏揚州刺史李崇五車載貨州刺史楊鈞造銀食器十具並餉領軍元叉靈太后召叉夫妻泣而責之叉深恨之昱第六叔舒妻武昌王和之妹和即叉之從祖父舒早喪有一男六女及終喪而元氏頻請別居昱父椿乃集親姻泣而謂曰我弟不幸早終今男未婚女未嫁何匆匆便求離居不聽遂懷憾焉神龜二年瀛州民劉宣明謀反事覺逃竄叉乃使和及元氏誣告昱藏隱宣明云父定州刺史椿叔華州刺史津並送甲仗三百具謀圖不逞叉又構成其事乃遣左右御仗五百人夜圍昱宅而收之並無所獲靈太后問其狀昱具對元氏遘釁之端言至哀切太后乃解昱縛和及元氏並處死刑而叉相左右和直免官元氏卒亦不坐及元叉之廢太后乃出昱為濟陰內史中山王熙起兵於鄴叉遣黃門盧同詣鄴刑熙並窮黨與同希叉旨就郡鎖昱赴鄴訊百日後乃還任孝昌初除征虜將軍中書侍郎遷給事黃門侍郎時北鎮饑民二十餘萬詔昱為使分散於冀定瀛三州就食後賊圍豳州詔昱兼侍中持節催西北道大都督北海王皓仍隨軍監察豳州圍解雍州蜀賊張映龍姜神達知州內空虛謀欲攻掩刺史元修義懼而請援一日一夜書移九通都督李叔仁遲疑不赴昱曰長安關中基本今大軍頓在涇豳與賊相對若使長安不守大軍自然瓦散此軍雖往有何益也遂與叔仁等俱進於陳斬神達及諸賊四百許人餘悉奔散詔以昱受旨催督而皓軍稽緩遂免昱官乃兼侍中催軍尋除征虜將軍涇州刺史未幾昱父椿出為雍州刺史徵昱還除吏部郎中武衛將軍轉北中郎將加安東將軍及蕭寶夤等敗於關中以昱兼七兵尚書持節假撫軍將軍都督防守雍州昱遇賊失利而返除度支尚書轉撫軍徐州刺史尋除鎮東將軍假車騎將軍東南道都督又加散騎常侍後太山太守羊侃據郡南叛蕭衍遣將軍王辨率衆侵寇徐州番郡人續靈珍受衍平北將軍番郡刺史擁衆一萬攻逼番城昱遣別將劉馘擊破之臨陳斬靈珍首王辨退走侃兄深時為徐州行臺府州咸欲禁深昱曰昔叔向不以鮒也見廢春秋貴之奈何以侃罪深也宜聽朝旨不許羣議還朝未幾屬元皓侵逼大梁除昱征東將軍右光祿大夫加散騎常侍使持節假車騎將軍為南道大都督鎮滎陽皓既擒濟陰王暉業乘虛徑進大兵集於城下遣其左衛劉業王道安等招昱令降昱不從皓遂攻之城陷都督元恭太守西河王悰並踰城而走俱被擒縶昱與弟息五人在門樓上須臾皓至執昱下城面責昱曰楊昱卿今死甘心否卿自負我非我負卿也昱答曰分不望生向所以不下樓者正慮亂兵耳但恨八十老父無人供養負病黃泉求乞小弟一命便死不朽也皓乃拘之明旦皓將陳慶之胡光等三百餘人伏皓帳前請曰陛下渡江三千里無遺鏃之費昨日一朝殺傷五百餘人求乞楊昱以快意皓曰我在江東嘗聞梁主言初下都日袁昂為吳郡不降稱其忠節奈何殺楊昱自此之外任卿等所請於是斬昱下統帥三十七人皆令蜀兵刳腹取心食之皓既入洛除昱名為民孝莊還宮還復前官及父椿辭老請解官從養詔不許爾朱榮之死也昱為東道行臺率衆拒爾朱仲遠會爾朱兆入洛昱還京師後歸鄉里亦為天光所害太昌初贈都督瀛定二州諸軍事驃騎大將軍司空公定州刺史子孝雍員外郎走免匿於蠻中潛結渠帥謀應齊獻武王以誅爾朱氏微服入洛參伺機會為人所告世隆收付廷尉掠殺之椿弟穎字惠哲本州別駕子叔良武定中新安太守穎弟順字延和寬裕謹厚太和中起家奉朝請纍遷直閣將軍北中郎將兼武衛將軍太僕卿預立莊帝之功封三門縣開國公食邑七百戶出為平北將軍冀州刺史尋進號撫軍將軍罷州還遇害年六十五太昌初贈都督相殷二州諸軍事太尉公録尚書事相州刺史子辨字僧達歷通直常侍平東將軍東雍州刺史辨弟仲宣有風度才學自奉朝請稍遷太尉掾中書舍人通直散騎侍郎加鎮遠將軍賜爵弘農男建義初遷通直常侍出為平西將軍正平太守進爵為伯在郡有能名就加安西將軍還京之日兄弟與父同遇害辨太昌初贈使持節都督燕二州諸軍事車騎大將軍儀同三司州刺史仲宣贈都督青光二州諸軍事車騎大將軍尚書右僕射青州刺史仲宣子玄就幼而俊拔收捕時年九歲牽挽兵人謂曰欲害諸尊乞先就死兵人以刀斫斷其臂猶請死不止遂先殺之永熙初贈汝陰太守仲宣弟測朱衣直閣亦同時見害太昌中贈都督平營二州諸軍事鎮北將軍吏部尚書平州刺史測弟稚卿太昌中為尚書右丞坐事死順弟津字羅漢本名延祚高祖賜名焉少端謹以器度見稱年十一除侍御中散于時高祖沖幼文明太后臨朝津曾久侍左右忽咳逆失聲遂吐數升藏衣袖太后聞聲閲而不見問其故具以實言遂以敬慎見知賜縑百匹遷符璽郎中津以身在禁密不外交遊至於宗族姻表罕相祗候司徒馮誕與津少結交遊而津見其貴寵每退避及相招命多辭疾不往誕以為恨而津逾遠焉人或謂之曰司徒君之少舊宜蒙進達何遽自外也津曰為勢家所厚復何容易但全吾今日亦以足矣轉振威將軍領監曹奏事令又為直寢遷太子步兵校尉高祖南征以津為都督征南府長史至懸瓠徵加直閣將軍後從駕濟淮司徒誕薨高祖以津送柩還都遷長水校尉仍直閣景明中世宗遊於北邙津時陪從太尉咸陽王禧謀反世宗馳入華林時直閣中有同禧謀皆在從限及禧平帝顧謂朝臣曰直閣半為逆黨非至忠者安能不預此謀因拜津左中郎將遷驍騎將軍仍直閣出除征虜將軍岐州刺史津巨細躬親孜孜不倦有武功民齎絹三匹去城十里為賊所劫時有使者馳驛而至被劫人因以告之使者到州以狀白津津乃下教云有人著某色衣乘某色馬在城東十里被殺不知姓名若有家人可速收視有一老母行出而哭云是己子於是遣騎追收並絹俱獲自是闔境畏服至於守令僚佐有瀆貨者未曾公言其罪常以私書切責之於是官屬感厲莫有犯法以母憂去職延昌末起為右將軍華州刺史與兄播前後皆牧本州當世榮之先是受調絹匹度尺特長在事因緣共相進退百姓苦之津乃令依公尺度其輸物尤好者賜以杯酒而出所輸少劣亦為受之但無酒以示其於是人競相勸官調更勝舊日還除北中郎將帶河內太守太后疑津二己不欲使其處河山之要轉平北將軍肆州刺史仍轉並州刺史將軍如故徵拜右衛將軍孝昌初加散騎常侍尋以本官行定州事既而近鎮擾亂侵逼舊京乃加津安北將軍假撫軍將軍北道大都督右衛尋轉左衛加撫軍將軍始津受命出據靈丘而賊帥鮮于修禮起於博陵定州危急遂回師南赴始至城下營壘未立而州軍新敗津以賊既乘勝士衆勞疲柵壘未安不可擬敵賊必夜至則萬無一全欲移軍入城更圖後舉刺史元固稱賊既逼城不可示弱閉門不內津揮刀欲斬門者軍乃得入城賊果夜至見柵空而去其後賊攻州城東面已入羅城刺史閉小城東門城中慅擾不敢出戰津欲禦賊長史許被守門不聽津手劍擊被不中被乃走津開門出戰斬賊帥一人殺賊數百賊退人心少安詔除衛尉卿征官如故以津兄衛尉卿椿代為左衛尋加鎮軍將軍討虜都督兼吏部尚書北道行臺初津兄椿得罪此州由巨鹿人趙略投書所致及津之至略舉家逃走津乃下教慰喻令其還業於是闔州愧服遠近稱之時賊帥薛修禮杜洛周殘掠州境孤城獨立在兩寇之間津貯積柴粟修理戰具更營雉堞賊每來攻機械競起又於城中去城十步掘地至泉廣作地道潛兵涌出置爐鑄鐵持以灌賊賊遂相語曰不畏利槊堅城唯畏楊公鐵星津與賊帥元洪業及與賊中督將尉靈根程殺鬼潘法顯等書曉喻之並授鐵券許以爵位令圖賊帥毛普賢洪業等感悟復書云今與諸人密議欲殺普賢願公聽之又賊欲圍城正為取北人耳城中所有北人必須盡殺公若置之恐縱敵為患矣願公察之津以城內北人雖是惡黨然掌握中物未忍便殺但收內子城防禁而已將吏無不感其仁恕朝廷初以鐵券二十枚委津分給津隨賊中首領間行送之修禮普賢頗亦由此而死既而杜洛周圍州城津盡力捍守詔加衛將軍封開國縣侯邑一千戶將士有功者任津科賞兵民給復八年葛榮以司徒說津津大怒斬其使以絶之自受攻圍經涉三稔朝廷不能拯赴乃遣長子遁突圍而出詣蠕蠕主阿那瓌令其討賊遁日夜泣論阿那瓌遣其從祖吐豆發率精騎一萬南出前鋒已達廣昌賊防塞隘口蠕蠕持疑遂還津長史李裔引賊踰城賊入轉衆津苦戰不敵遂見拘執洛周脫津衣服置地牢下數日欲將烹之諸賊還相諫止遂得免害津曾與裔相見對諸賊帥以大義責之辭淚俱發裔大慚典守者以相告洛周弗之責也及葛榮吞洛周復為榮所拘守榮破始得還洛永安初詔除津本將軍荊州刺史加散騎常侍當州都督津以前在中山陷寇詣闕固辭竟不之任二年兼吏部尚書又除車騎將軍左光祿大夫仍除吏部元皓內逼莊帝將親出討以津為中軍大都督兼領軍將軍未行皓入及皓敗津乃入宿殿中掃灑宮掖遣第二子逸封閉府庫各令防守及帝入也津迎於北邙流涕謝罪帝深嘉慰之尋以津為司空加侍中爾朱榮死也以津為都督並肆燕雲朔顯汾蔚九州諸軍事驃騎大將軍兼尚書令北道大行臺並州刺史侍中司空如故委津以討胡經略津馳至鄴手下唯羽林五百人士馬寡弱始加招募將從滏口而入值爾朱兆等便已克洛相州刺史李神等議欲與津舉城通款津不從以子逸既為光州刺史兄子昱時為東道行臺鳩率部曲在於梁沛津規欲東轉更為方略乃率輕騎望於濟州渡河而爾朱仲遠已陷東郡所圖不遂乃還京師普泰元年亦遇害於洛時年六十三太昌初贈都督秦華雍三州諸軍事大將軍太傅雍州刺史諡曰孝穆將葬本鄉詔大鴻臚持節監護喪事津有六子長子遁字山才其家貴顯諸子弱冠咸縻王爵而遁性淡退年近三十方為鎮西府主簿纍遷尚書郎莊帝北巡奉詔慰勞山東車駕入洛除尚書左丞又為光祿大夫仍左丞永安末父津受委河北兼黃門郎詣鄴參行省事尋遷征東將軍金紫光祿大夫亦被害於洛時年四十二太昌初贈車騎大將軍儀同三司幽州刺史諡曰恭定遁弟逸字遵道有當世才度起家員外散騎侍郎以功賜爵華陰男轉給事中父津在中山為賊攻逼逸請使於爾朱榮徵師赴救詔許之建義初莊帝猶在河陽逸獨往謁帝特除給事黃門侍郎領中書舍人及朝士濫禍帝益憂怖詔逸晝夜陪侍數日之內常寢宿於御床前帝曾夜中謂逸曰昨來舉目唯見異人賴得卿差以自慰尋除吏部郎中出為平西將軍南秦州刺史加散騎常侍時年二十九於時方伯之少未有先之者仍以路阻不行改除平東將軍光州刺史逸折節綏撫乃心民務或日昃不食夜分不寢至於兵人從役必親自送之或風日之中雨雪之下人不堪其勞逸曾無倦色又法令嚴明寬猛相濟於是合境肅然莫敢干犯時災儉連歲人多餓死逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為命百姓不足君孰與足假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅以下謂公儲難闕並執不許尚書令臨淮王彧以為宜貸二萬詔聽二萬逸既出粟之後其老小殘疾不能自存活者又於州門煮粥飯之將死而得濟者以萬數帝聞而善之逸為政愛人尤憎豪猾廣設耳目其兵吏出使下邑皆自持糧人或為設食者雖在暗室終不進咸言楊使君有千里眼那可欺之在州政績尤美及其家禍爾朱仲遠遣使於州害之時年三十二吏人如喪親戚城邑村落為營齊供一月之中所在不絶太昌初贈都督豫郢二州諸軍事衛將軍尚書僕射豫州刺史諡曰貞逸弟謐字遵智辟太尉行參軍歷員外散騎常侍以功賜爵弘農伯鎮軍將軍金紫光祿大夫衛將軍在晉陽為爾朱兆所害太昌初贈驃騎將軍兗州刺史謐弟遵彥武定中吏部尚書華陰縣開國侯津弟暐字延季性雅厚頗有文學起家奉朝請稍遷散騎侍郎直閣將軍本州大中正兼武衛將軍尚食典御孝昌初正武衛將軍加散騎常侍安南將軍莊帝初遇害於河陰贈衛將軍儀同三司雍州刺史子元讓武定末尚書祠部郎中播家世純厚並敦義讓昆季相事有如父子播剛毅椿津恭謙與人言自稱名字兄弟旦則聚於廳堂終日相對未曾入內有一美味不集不食廳堂間往往幃幔隔障為寢息之所時就休偃還共談笑椿年老曾他處醉歸津扶侍還室仍假寐閣前承候安否椿津年過六十並登台鼎而津嘗旦暮參問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙箸味皆先嘗椿命食然後食津為司空於時府主皆引僚佐人就津求官津曰此事須家兄裁之何為見問初津為肆州椿在京宅每有四時嘉味輒因使次附之若或未寄不先入口椿每得所寄輒對之下泣兄弟皆有孫唯椿有曾孫年十五六矣椿常欲為之早娶望見玄孫自昱已下率多學尚時人莫不欽羡焉一家之內男女百口緦服同爨庭無間言魏世以來唯有盧淵兄弟及播昆季當世莫逮焉世隆等將害椿家誣其為逆奏請收治前廢帝不許世隆復苦執不得已下詔付有司檢聞世隆遂遣步騎夜圍其宅天光亦同日收椿於華陰東西兩家無少長皆遇禍籍其家世隆後乃奏云楊家實反夜拒軍人遂盡格殺廢帝惋悵久之不言而已知世隆縱擅無如之何永熙中椿合家歸葬華陰衆咸觀而悲傷焉播族弟鈞祖暉庫部給事稍遷洛州刺史卒贈弘農公諡曰簡父恩河間太守鈞頗有幹用自廷尉正為長水校尉中壘將軍洛陽令出除中山太守入為司徒左長史又除徐州東荊州刺史還為廷尉卿拜州刺史轉懷朔鎮將所居以強濟稱後為撫軍將軍七兵尚書北道行臺卒贈使持節散騎常侍車騎大將軍左光祿大夫華州刺史長子暄卒於尚書郎暄弟穆華州別駕穆弟儉寧遠將軍頓丘太守建義初除太府少卿尋為華州中正加左將軍儉與元皓有舊及皓入洛受其位任莊帝還宮坐免後以本將軍潁州刺史尋加散騎常侍平南將軍州罷不行普泰初除征南將軍金紫光祿大夫永熙中以本將軍除北雍州刺史仍陷關西儉弟寬自宗正丞建義初為通直散騎侍郎領河南尹丞稍遷散騎常侍安東將軍永安二年除中軍將軍太府卿後為散騎常侍驃騎將軍右光祿大夫澄城縣開國伯太昌初除給事黃門侍郎尋加驃騎大將軍除華州大中正監內典書事坐事去官永熙三年兼武衛將軍又除黃門郎隨出帝入關西儉寬皆輕薄無行為人流所鄙史臣曰楊播兄弟俱以忠毅謙謹荷內外之任公卿牧守榮赫纍朝所謂門生故吏遍於天下而言色恂恂出於誠至恭德慎行為世師範漢之萬石家風陳紀門法所不過也諸子秀立青紫盈庭其積善之慶歟及胡逆擅朝淫刑肆毒以斯族而遇斯禍報施之理何相及哉
