body:
  text: 魏書卷一百六中地形志二中第六兗州後漢治山陽昌邑魏晉治廩丘劉義隆治瑕丘魏因之領郡六縣三十一戶八萬八千三十二口二十六萬六千七百九十一泰山郡漢高帝置領縣六戶二萬六千八百口九萬一千八百七十三巨平二漢晉屬治平樂城有亭亭山祠霍城陽關城巨平城祝丘防城龍山祠奉高二漢晉屬有梁父山岱嶽祠玉符山故明堂基博平二漢晉曰博屬後改有博平城防城龍山祠野首山牟山祠伍子胥廟嬴二漢晉屬有馬耳山祠汶水出焉唐阜嬴城銅治山牟漢晉屬有萊蕪城平州城牟城望石山梁父二漢晉屬有菟裘澤徂來山在北梁父城龜山羊續碑貞女山祠雲母山魯郡秦置為薛郡高后改為魯國皇興中改領縣六戶一萬五千一百六十口四萬七千三百二十九魯二漢晉屬有牛首亭五父衢尼丘山房山魯城叔梁紇廟孔子墓廟沂水泗水季武子臺顏母祠魯昭公臺伯禽冢魯文公冢魯恭王陵宰我冢兒寬碑汶陽二漢晉屬有桑杜丘新甫山嵎山春舒城汶陽城鄒二漢晉屬有叔梁紇城嶧山鄒山陽平劉駿置魏因之有滕城新陽前漢屬東海後罷劉駿復魏因之高平郡故梁國漢景帝分為山陽國武帝改為郡晉武帝更名領縣四戶一萬一千一百二十四口二萬五千八百九十六高平二漢屬山陽晉屬前漢橐也後漢章帝更名有洸水千秋城胡陸城齊城高平山承雀山伏羲廟方與二漢屬山陽晉屬有方與城金鄉後漢屬山陽晉屬有金鄉山范巨卿冢碑平陽二漢晉曰南平陽漢屬山陽晉屬有平陽城漆城白馬溝任城郡後漢孝章帝分東平為任城國晉永嘉後罷神龜元年分高平置領縣三戶八千五十口二萬一千七百八十九任城前漢屬東平後漢晉屬有任城唐陽城華陽城亢父前漢屬東平後漢晉屬有亢父城女媧冢風伯祠巨野二漢屬山陽晉屬高平後屬有巨野城武安城武平城任山祠東平郡故梁國漢景帝分為濟東國武帝改為大河郡宣帝為東平國後漢晉仍為國後改領縣七戶二萬七百五十二口六萬一千八百一十無鹽二漢晉屬有龍山無鹽城南章北章城范有淶溝須昌前漢屬東郡後漢晉屬治須昌城有濟溝壽張有郈城平陸二漢晉屬曰東平陸後改有廣武城富城二漢晉屬有富城卜城武強城左丘明冢剛前漢屬泰山後漢屬濟北晉曰剛平後改治剛城東陽平郡故東平地劉義隆置尋罷劉駿復魏因之治平陸城領縣五戶六千一百四十六口一萬八千九十四元城劉義隆置魏因之有寧陽城樂平劉義隆置魏因之有青山祠魯溝水頓丘劉駿置魏因之有乘城館陶劉義隆置魏因之有唐陽城平原劉駿置魏因之有苦城巨野澤青州後漢治臨淄司馬德宗治東陽魏因之領郡七縣三十七戶七萬九千七百五十三口二十萬六千五百八十五齊郡秦置領縣九戶三萬八百四十八口八萬二千一百臨淄二漢晉屬有公孫接冢晏嬰冢齊莊公冢營丘齊臺堯山祠昌國二漢晉屬有紀信冢益都魏置有釣室盤陽前漢屬濟南後漢晉屬有朱虛城大峴山有甑山巨平山太山祠平昌前漢屬琅邪後漢屬北海晉屬城陽延興三年屬廣饒二漢晉屬有吳頭山西安二漢晉屬有逢山八士山安平二漢晉曰東平後改前漢屬淄川後漢屬北海後屬有覆釜山廣川有牛山仲父冢黑山石硯山齊桓公冢四豪冢北海郡漢景帝置治平壽城領縣五戶一萬七千五百八十七口四萬六千五百四十九下密前漢屬膠東國後漢屬晉屬齊郡後屬劇二漢屬晉屬琅邪後屬有倉山都昌二漢屬晉屬齊郡後屬有徐偉長冢平壽二漢屬晉屬齊郡後屬有浮山有金關山膠東前漢曰膠東國後漢屬北海晉屬齊郡後屬有逢萌冢樂安郡漢高帝為千乘國後漢和帝更名樂安國晉改領縣四戶五千九百一十六口一萬三千二百三十九千乘前漢屬千乘後漢屬晉罷後復屬博昌前漢屬千乘後漢晉屬安德般勃海郡故臨淄地劉駿置魏因之領縣三戶五千二百七十九口一萬三千七百五重合修長樂有王陵冢高陽郡故樂安地劉義隆置魏因之領縣五戶六千三百二十二口一萬七千六百六十七高陽新城鄴安次安平河間郡劉義隆置魏因之領縣六戶五千八百三十口一萬四千八百一十八阜城城平武垣樂城章武有張釋之冢南皮劉駿置魏因之有望海臺樂陵郡故千乘地劉義隆置魏因之領縣五戶七千九百七十一口一萬八千五百一十五陽信有千乘城博昌城樂陵有薄姑城厭次新樂濕沃齊州治歷城劉義隆置冀州皇興三年更名領郡六縣三十五戶七萬七千三百七十八口二十六萬九千六百六十二東魏郡劉駿置魏因之治歷城後徙臺城領縣九戶一萬九千一百三十口七萬三千五百七十蠡吾劉駿置魏因之有龍山頓丘劉駿置魏因之有飛鳥峴肥鄉有平陵城巨合城聊城有臺城菅城衛國有挺城石湯水雞山博平有土鼓城逢陵城長白山安陽有魚溝東魏有嶂山出鐵有蒼浪溝時水臨邑劉駿置魏因之有刀環水鵲山隰陰城東平原郡劉裕置魏因之治梁鄒領縣六戶一萬三千九百二十九口四萬四百三平原有黃山鬲有高苑城平原城臨濟有鄒平城建新城荏平有城廣宗有胡山平郭城高唐東清河郡劉裕置魏因之治盤陽城領縣七戶六千八百一十口二萬二千五百七十四清河繹幕有隴水鄃有淳于髠冢金雀山零武城有昌國城貝丘有萊蕪城饒陽舊屬青州太和十八年分屬廣川郡劉裕置魏因之領縣三戶三千九百四十五口一萬三千四百七十二武強索盧中水有長城三總山濟南郡漢文帝為濟南國景帝為郡後漢建武中復為國晉改領縣六戶二萬一十七口六萬八千八百二十歷城二漢晉屬有黃臺華不注山華泉匡山舜山祠娥薑祠蓍二漢晉屬治蓍城平陵二漢晉屬曰東平陵後改有章丘城洛盤城平陵城女郎山祠土鼓二漢屬晉罷後復有龍盤山逢陵有於陵城朝陽二漢屬後漢曰東朝陽後改晉屬樂安後屬有朝陽城太原郡劉義隆置魏因之領縣四戶一萬三千五百六十口五萬八百二十三太原司馬德宗置魏因之治升城有靡溝垣城祝阿二漢屬平原晉屬濟南後屬有唐城陽城山荏二漢晉屬泰山後屬有咸山祗山格馬山盧前漢屬太山後漢晉屬濟北後屬有盧城平陰城孝子堂鄭州天平初置潁州治長社城武定七年改治潁陰城領郡三縣九戶六萬二千一百七十三口二十七萬四千二百四十二許昌郡天平元年分潁川置領縣四戶二萬五千三百二十七口一十萬四千四百六十三許昌二漢晉屬潁川即許都也治許昌城有西梁城扶溝前漢屬淮陽後漢晉屬陳留真君七年併長平屬焉後屬有白亭城蔡河扶溝城康溝水龍洲陂刀陵岡鄢陵二漢晉屬潁川有鄢陵城馬領城向城張揚城蔡澤陂深陂三門陂唐且冢新汲二漢晉屬潁川有新汲城長合城臨春城平侯城鴨子陂潁川郡秦置漢高改曰韓國尋復領縣三戶二萬二千四十四口一十萬五千九百九長社二漢晉屬有長葛城長平城望馬臺雞鳴城鍾皓墓白雁陵臨潁二漢晉屬真君七年併潁陰屬之有殷湯城潁陰二漢晉屬真君七年併臨潁元象二年復有荀爽墓東西二武城博望城陽翟郡領縣二戶一萬四千八百二口六萬三千八百七十黃臺興和元年分陽翟置有葛溝水黃臺岡陽翟二漢屬潁川晉屬河南尹興和元年屬有陽翟城康城禹山祠赤沙澗九山祠呂不韋墓濟州治濟北碻磝城泰常八年置領郡五縣十五戶五萬三千二百一十四口一十四萬五千二百八十四濟北郡漢和帝置領縣三戶九千四百六十七口二萬九千三百九十九臨邑二漢屬東郡晉屬有昌鄉城臨邑城吳城東阿二漢屬東郡晉屬有東阿城衛城濟城盧前漢屬泰山後漢晉屬有柳舒城鼓城盧子城平原郡漢高帝置皇始中屬冀州太和十一年分屬武泰初立南冀州永安中罷州領縣四戶二萬二千二百五十口五萬九千四百三十七聊城二漢屬東郡晉屬魏置太平鎮後罷併郡有王城郡縣治有畔城博平二漢屬東郡晉屬有博平城桑葉城濕水茌平前漢屬東郡後漢屬濟北晉屬治鼓城有茌平城陽城西聊孝昌中分聊城置治聊城東平郡泰常中置太和末罷建義中復治秦城領縣二戶八千八百九十六口二萬五千一百三范二漢屬東郡晉屬兗州東平後屬治秦城壽張前漢曰壽良屬東郡光武改後漢晉屬兗州東平後屬有梁山高陽城豐城雲城南清河郡晉泰寧中分平原置治莒城領縣三戶一萬一百三十五口一萬三千九百八十五鄃二漢晉屬清河太和中屬平原治鄃城零二漢晉屬清河太和中屬平原後屬治零城有莒城高唐二漢晉屬平原後罷景明三年復東濟北郡孝昌三年置領縣三戶二千四百六十四口六千六百七十八肥城前漢屬泰山後漢屬濟北晉罷後復屬治肥城穀城後漢屬東郡晉屬濟北後屬蛇丘前漢屬泰山後漢晉屬濟北後屬光州治掖城皇興四年分青州置延興五年改為鎮景明元年復領郡三縣十四戶四萬五千七百七十六口一十六萬九百五十東萊郡漢高帝置領縣四戶一萬九千一百九十五口六萬二千四十四掖州郡治二漢屬晉罷後復有掖山祠秀陽山斧山西曲城二漢晉曰曲城屬後改有倉石山東曲城皇興中分曲城置有昌丘日山盧鄉二漢晉屬有高君山方山長廣郡晉武帝置治膠東城領縣六戶一萬五千八百三十三口五萬一千五百六十七昌陽二漢屬東萊後罷晉惠帝復後屬有挺城望石山凡馬祠五龍廟浮遊水長廣前漢屬琅邪後屬東萊晉屬有馬山祠即墨城康王山祠金泉山昌城沽水不其前漢屬琅邪後漢屬東萊晉屬有牢山魚脊山挺前漢屬膠東後漢屬北海晉屬有樂毅城即墨郡治前漢屬膠東國後漢屬北海晉屬有三戶山膠水寧戚冢當利二漢晉屬東萊後屬有當利城東牟郡領縣四戶一萬七百四十八口四萬七千三百三十八牟平二漢屬東萊晉罷後復有之罘山成山牟城東牟城劉寵墓風山黃二漢晉屬東萊有黃城萊山祠龍溪惤二漢晉屬東萊有弦城羅山觀陽前漢屬膠東後漢屬北海後罷興和中復屬有淳于城觀陽城昌城馬賓山牛耳山梁州天平初置治大梁城領郡三縣十戶四萬三千八百一十九口一十八萬一千九百三陽夏郡孝昌四年分東郡陳留置治雍丘城領縣五戶一萬六千五百四十九口六萬三千五百五十九陽夏前漢屬淮陽後漢屬陳國晉初併梁惠帝復真君七年併扶溝太和十二年復治陽夏城有大小扶溝雍丘二漢晉屬陳留郡治有抱城廣陵城高陽城少薑城華城白楊陂濟陽二漢晉屬陳留延和二年置徐州皇興初罷有濟陽城外黃城東緡城崔城圉城二漢晉曰圉前漢屬淮陽後漢晉屬陳留後罷景明元年復後改有沙城襄邑二漢晉屬陳留後罷景明元年復有直陽城牖鄉牖倉開封郡天平元年分陳留置治開封城領縣二戶八千二百七口三萬六千六百二開封二漢屬河南晉屬滎陽真君八年併苑陵景明元年復孝昌中屬陳留有開封城陳留城孔侯城尉氏二漢晉屬陳留興安初併苑陵太安三年復治尉氏城有陵有亭陳留郡漢武帝置太和十八年罷孝昌中復領縣三戶一萬九千六百一十二口八萬二千七百四十二浚儀州郡治二漢晉屬後罷孝昌二年復有信陵君冢張耳冢董仲舒冢樊於期冢邊讓冢倉垣城渠水在大梁城東分為蔡渠聖女淵雉臺封丘二漢晉屬真君九年併酸棗景明二年復治封丘城有封丘臺白溝小黃二漢晉屬真君八年併外黃太和中復有昭靈后冢陳冢蔡雍冢小黃城豫州劉義隆置司州治懸瓠城皇興中改領郡九縣三十九戶四萬一千一百七十二口九萬六千九百一十六汝南郡漢高帝置領縣八戶一萬五千