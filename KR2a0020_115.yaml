body:
  text: 魏書卷一百五之四天象志一之四第四太和十二年十一月戊午太白犯歲又犯火喪疾之祥占曰國無兵憂則君有白衣之會丙寅火又犯木占曰內無亂政則主有喪戚之故十二月壬寅太白犯填占曰金為喪祥后妃受之十三年二月熒惑犯填占曰火主凶亂女君應之皆文明太后之謫也先是十一年六月甲子歲星晝見十二月甲戌又晝見是歲六月又如之歲而麗于大明少君象也是時孝文有仁聖之表而太后分權以干冒之及帝春秋方壯始將經緯禮俗財成國風故比年女君之謫屢見而歲星盛至于不可掩奪矣且占曰木晝見主有白衣之會是歲九月丙午有大流星自五車北入紫宮抵天極有聲如雷占曰天下大凶國有喪宮且空夫五車君之車府也天象若曰是將以喪事有千乘萬騎而舉者大有聲其事昭盛至十四年三月填星守哭泣占曰將以女君有哭泣之事四月丙申火犯鬼喪祥也六月有大流星從紫宮出西行天象又曰人主將以喪事而出其宮八月月太白皆犯軒轅九月癸丑而太皇太后崩帝哭三日不絶聲勺飲不入口者七日納菅屨徒行至陵其反亦如之哀毀骨立杖而後起雖殊俗之萌矯然知感焉自九月至于歲終凡四謁陵又荐出紫宮之驗也十四年十一月月犯填星十二月月犯軒轅十五年十月月犯填又犯軒轅八月又犯之九月月掩填星十七年正月月又犯軒轅皆女君之象也是時林貴人以故事薨及馮貴人為后而其姊譖之至二十年竟坐廢黜以憂死幽后繼立又以淫亂不終十三年十二月戊戌填星辰星合于須女女齊吳分占曰是為雍沮主令不行且有陰親者至十四年三月庚申歲星守牛占曰其君不愛親戚貴人多喪又饉祥也是歲太白三犯熒惑十月太白入氐十一月有大流星從南行入氐甲申齊邦之物也金火相鑠為兵喪為大人之謫天象若曰宿宮有兵喪之故盛大者循而殘之處其寢廟之中矣至十五年三月壬子歲犯填在虛三月癸巳木火土三星合宿于虛甲午火土相犯虛齊也占曰其國亂專政內外兵喪故立侯王九月乙丑太白犯斗第四星戊子有大流星起少微入南宮至帝坐主有盛大之臣乘賢以侮其君者且占曰大人易政至十七年正月戊辰金木合于危危亦齊也是為人君且罹兵喪之變四月戊子太白犯五諸侯占曰有擅刑以殘賊諸侯者至七月齊武帝殂西昌侯以從子干政竟殺二君而自立是為齊明帝於是高武諸子王侯數十人相次誅夷殆無遺育矣雖繼體相循實有準命之禍故天謫仍見云自十五年至十七年月行七犯建星建星為忠臣之輔經代之謀又吳之分也十五年再犯牽牛十六年至十七年又四犯南斗是謂臣干天祿且曰大人多死者又十五年七月金入太微十七年火入太微宮反臣之戒是歲月行四入太微十七年六入太微比歲凡十干之而齊君夷其宗室亦積忍酷甚也十五年四月癸亥熒惑入羽林十六年二月壬子太白入羽林占曰天下兵起三月己卯四月丙午五月甲戌十月辛卯月行皆入羽林十七年四月壬寅八月辛卯十二月辛巳又如之先是陽平王頤統十二將軍騎士七萬北討蠕蠕是歲八月上勒兵三十餘萬自將擊齊由是比歲皆有事于南方十五年三月月掩畢十一月又犯之十六年五月及七月月再入畢八月十一月又再犯之十七年八月又入畢畢為邊兵占曰貴人多死十五年六月濟陰王鬱賜死十七年南平王霄三老尉元皆死十八年安定王休死十九年司徒馮誕太師馮熙廣川王諧皆死十七年二月庚戌火土合于室室星先王所以制宮廟也熒惑天視填為司空聚而謀之其相宅之兆也且緯曰人君不失善政則火土相扶卜洛之業庶幾興矣是歲九月上罷擊齊始大議遷都冬十月詔司空穆亮將作董邇繕洛陽宮室明年而徙都之於是更服色殊徽號文物大備得南宮之應焉凡五星分野熒惑統朱鳥之宿而填以軒鼓寓之皆周鶉火之分室又并州之分是為步自并州而經始洛邑之祥也十七年二月丁丑太白犯井辛丑又犯鬼五月戊午晝見九月又如之是謂兵祥雍州也是月火木合于婁婁為徐州占曰其地有亂萬人不安八月辛巳熒惑入井占曰兵革起明年十二月詔征南將軍薛真度督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉藻出南鄭皆兩雍徐方之分後年正月平南王肅大敗齊師于義陽降者萬餘己亥上絶淮登八公山並淮而東及鍾離乃還至十九年六月庚申金木合于井七月火犯井二十一年十一月大敗齊師于沔北明年春復大破之下二十餘城於是悉定沔漢諸郡時江南僞立雍州於襄陽以總牧西土遺黎故與東井同候十八年四月甲寅熒惑入軒轅后妃之戒也是時左昭儀得幸方譖訴馮后上蠱而惑之故天若言曰夫膚受之微不可不察亦自我天視而降鑒焉至十九年三月月犯軒轅二十年七月辛巳又掩填星是月馮后竟廢尋以憂死而立左昭儀是為幽后明年追廢林貞后為庶人二十二年正月月又掩軒轅十一月又彗星起軒轅歷鬼南及天漢天又若曰是固多穢德宜其彗除矣行歷鬼又強死之徵明年幽后賜死也十九年六月壬寅熒惑出于端門占曰邦有大獄君子惡之又更紀立王之戒也明年皇太子恂坐不軌黜為庶人至二十一年十月壬午熒惑歲星合於端門之內歲為人君火主死喪之禮而陳于門庭大喪之象也二十二年二月乙丑木火合于掖門內是夕月行逮之三月丙午木火俱出掖門外再合一相犯月行逮之后妃預有咎焉明年四月宮車晏駕夫太微禮樂之庭也時帝方修禮儀正喪服以經人倫之化竟未就而崩少君嗣立其事復寢縉紳先生咸哀慟焉故天視奉而修之是以徘徊南宮蓋皇天有以著慎終歸厚之情或曰合于天庭南方有反臣之戒是時齊明帝殂比及三年而亂兵四交宮掖既而蕭衍戡之竟覆齊室云二十一年十一月有流星照地至天津而滅占曰將有樓船之攻人君以大衆行二十二年而上南伐是歲之正月有流星大如三斗瓶起貫索東北流光燭地經天棓乃滅有聲如雷天棓天子先驅也占曰國中貴人有死者且大赦至三月上南征不豫詔武衛元嵩詣洛陽賜皇后死世宗景明元年四月壬辰有大流星起軒轅左角東南流色黃赤破為三段狀如連珠相隨至翼左角后宗也占曰流星起軒轅女主後宮多讒死者翼為天庭之羽儀王室之蕃衛彭城國焉又占曰流星于翼貴人有憂繫是時彭城王忠賢且以懿親輔政借使世宗諒陰恭己而修成王之業則高祖之道庶幾興焉而阿倚母族納高肇之譖明年彭城王竟廢後數年高氏又鴆于后而以貴嬪代之由是小人道長讒亂之風作矣夫天之風戒肇于履端之始而沒身不悟以傷魏道豈不哀哉或曰軒轅主后土之養氣而庇祐下人也故左角謂之少人焉天象若曰人將喪其所以致養幾至流亡離析矣是歲北鎮及十七州大饉人多就食云是歲十二月癸未月暈太微既而有白氣長一丈許南抵七星俄而月復暈北斗大角為君以兵自衛又赦祥也且為立君之戒時蕭衍立少主於江陵改元大赦尋伐金陵以長圍逼之又二年正月月暈井參觜昴五車占曰貴人死大赦是歲廣陵王羽薨二月至秋再大赦二年正月己未金火俱在奎光芒相掩為兵喪為逆謀大人憂之野有破軍殺將奎徐方也三月丁巳有流星起五諸侯入五車至天潢散絶為三光明燭地五車所以輔衰替之君也流星自五諸侯干之諸侯且霸而修兵車之會分而為二距乏疑之君幾將並立焉魏收以為流星出五車諸侯有反者至五月咸陽王禧謀反賜死戊午填星在井犯鉞相去二寸占曰人君有戮死者時蕭衍起兵襄陽將討東昏之亂是月推南康王寶融為帝踐阼于江陵於是齊有二君矣至八月戊午金火又合于翼楚分也十一月甲寅金水俱出西方占曰東方國大敗時蕭衍已舉夏口平尋陽遂沿流而東東主之師連戰敗績於是長圍守之十二月齊將張稷斬東昏以降又戮主之徵至三年正月火犯房北星光芒相接癸巳填星逆行守井北轅西星皆大臣賊主更政立君之戒也三月金水合於須女女齊分金水合為兵誅二月丁酉有流星起東井流入紫宮至北極而滅東井雍州之分衍憑之以興且西君之分使星由之以抵辰極是為禪受之命且為大喪是月齊諸侯相次伏誅既而西君錫命衍受禪于建康是為梁武帝戊辰而少主殂自二年至三年月六掩犯斗魁七月火犯斗皆吳分也時江南北歲大饉又連兵北鄙負敗相迹又二年七月月暈婁內青外黃轢昴畢天船大陵卷舌奎船為徐魯又赦祥也且曰多死喪三月青齊徐兗餓死萬餘人七月大赦三年八月月暈外青內黃轢昴畢婁胃五車占曰貴人多死十二月月犯昴環月太傅平陽王丕薨後年正月大赦三年八月丙戌有大流星起天中北流大如二斗器占曰有天子之使出自中京以臨北方至四年九月壬戌有大流星起五車東北流占曰有兵將首于東北是歲二月辛亥三月丁未月再掩太白皆大戰之象也庚辰揚州諸將大破梁師于陰陵十一月左僕射源懷以便宜安撫北邊明年二月又大破梁師于邵陵九月蠕蠕犯邊復詔源懷擊之是歲七月月暈昴畢觜參井五車占曰旱大赦又再暈軒轅太微明年正月月暈五車東井兩河鬼填星是月大赦改元六月以亢陽詔撤樂減膳正始元年正月戊辰流星如斗起相星入紫宮抵北極而滅夫紫宮后妃之內政而由輔相干之其道悖矣且占曰其象著大有非常之變至二年六月癸丑有流星如五斗器起織女抵室而滅占曰王后憂之有女子白衣之會往反營室釁歸後庭焉三年正月己亥有大流星起天市垣西貫紫蕃入北極市垣之西又公卿外朝之理也占曰以臣犯主天下大凶明年高肇欲其家擅寵乃鴆殺于后及皇子昌而立高嬪為后先是景明四年七月太白犯軒轅大星至二年六月木犯昴占曰人君有白衣之會同上三年六月丙辰太白晝見占曰陰國之兵強八月梁師寇邊攻陷城邑秋九月安東將軍邢巒大破之宿豫斬將三十餘人捕虜數萬十月甲寅月犯太白又大戰之象明年中山王英敗績于淮南士卒死者十八九又元年正月月暈胃昴畢五車戊午又暈五車東井兩河鬼填星二月甲申又暈昴畢觜參三年正月月暈太微軒轅皆為兵赦是月皇子生大赦天下四年七月己卯有星孛于東北占曰是謂天讒大臣貴人有戮死者凡孛出東方必以晨乘日而見亂氣蔽君明之象也昔魯哀公十三年十一月有星孛于東方明年春秋之事終是謂諸夏微弱蠻夷遞霸田氏專齊三族擅晉卒以干其君明而代奪之陵夷遂為戰國天下橫流矣今孛星又見與春秋之象同天戒若曰是居太陽之側而干其明者固多穢德可彗除矣而君不悟衰替之萌將繇此始乎是歲高肇鴆后及皇子明年又譖殺諸王天下寃之肇故東夷之俘而驟更先帝之法纍構不測之禍干明孰甚焉魏氏之悖亂自此始也永平元年三月戊申熒惑在東壁月行抵之相距七寸光芒相及室壁四輔君之內宮人主所以庇衛其身也天象若曰且有重大之臣屏藩王室者將以讒賊之亂死於內宮又曰諸侯相謀五月癸未填星逆行太微在左執法西是為后黨持政大夫執綱而逆行侮法以啓蕭牆之內是月月犯畢六月又掩之占曰貴人有死者庚辰太白歲星合于柳柳為周分且占曰有內兵以賊諸侯八月京兆王愈出為冀州刺史恐不見容遂舉兵反以誅尚書令高肇為名與安樂王詮相攻于定州九月太師彭城王斃于禁中愈亦死之或曰柳豫州分所合之野謀兵有戰野拔邑事至十一月丙子流星起羽林南大如碗色赤有黑雲東南引如一匹布橫北轢星占曰禁兵起所首召之是歲豫州人白早生殺刺史司馬悅以城降梁遣尚書邢巒擊之十二月巒拔懸瓠斬早生二年三月丁未有流星徑數寸起自天紀孛于市垣光芒燭地有尾跡長丈餘凝著天天象若曰政失其紀而亂加乎人浸以萌矣是將以地震為徵地震者下土不安之應也是月火入鬼距積尸五寸積尸人之精爽而炎氣加之疫祥也四月乙丑金入鬼去積尸一寸又以兵氣干之強死之祥也踰逼者事甚鬼主驕亢之戒故金火荐災其人以警而懼之五月太白犯歲光芒相觸占曰兵大亂歲饑不出三年七月庚辰有流星起騰蛇入紫宮抵北極而滅天戒若曰彼光後王道者以馭陰陽之變矣將有水旱之沴地震之祥而後災加皇極焉明年夏四月平陽郡大疫死者幾三千人平陽鬼星之分也秋州郡二十大水冀定旱饑四年朐山之役喪師殆盡其後繁畤桑乾靈丘秀容雁門地震陷裂山崩泉涌殺八千餘人延昌三年詔曰比歲山鳴地震于今不已朕甚懼焉至正月宮車晏駕二年十一月丙戌月掩畢大星至三年八月火犯積尸占曰貴人死又饑疫祥也比年水旱災疫是月中山王略薨明年春司徒廣陽王嘉薨二年九月甲申歲星入太微距右執法五寸光明相及十二月乙酉逆行入太微奄左執法三年閏月壬申又順行犯之相去一寸保乾圖曰臣擅命歲星犯執法是時高肇方為尚書令故歲星反復由之所以示人主也天若言曰政刑之命亂矣彼居重華之位者盍將反復而觀省焉今雖厚而席之適所以為禍資耳且占曰中坐成刑遠期五年間五歲而肇誅四年四月庚午熒惑犯軒轅大星至五月入太微距右執法三寸光芒相接熒惑天視也始由軒轅而省執法之位其象若曰是居后黨而擅南宮之命君其降監焉其應與歲星同也四年正月戊戌有流星起張西南行殷殷有聲入參而滅張河南之分參為兵事占曰流星自東方來至伐而止有來兵大敗吾軍有聲者怒也先是去年十一月月犯太白是歲又犯之在胃八月辛酉又犯之胃為徐方大戰之象也十月戊寅有大流星孛于羽林南流色赤珠落下入濁氣孛然而流王師潰亂之兆先是梁朐山鎮殺其將來降詔徐州刺史盧昶援之十二月昶軍大敗於淮南淪覆十有餘萬是歲七月乙巳有流星起北斗魁前西北流入紫宮至北極而滅占曰不出期年兵起且亡君戒是歲有朐山之役間歲而帝崩四年十二月己巳歲星犯房上相相距一寸光芒相及至延昌元年三月丙申歲星在鈎餘東五寸距鍵閉三寸丙午又掩房上相天象若曰夫鈐鍵之轡君上所宜獨操非驂服所當共也先是高肇為尚書令而歲星三省執法是歲至升為司徒猶怏怏不悅而歲星又再循之所以示人主審矣間二歲而上崩肇亦誅滅或曰木與房合主喪水又元年二月月暈井鬼軒轅十月又暈井五車參畢皆水旱饑赦之祥自元年二月不雨至六月雨大水二年四月庚子出絹十五萬匹賑河南饑人是夏州郡十二大水八月減天下殊死四年四月庚午熒惑犯軒轅大星十月壬申月失行犯軒轅大星至延昌元年三月填星在氐守之九十餘日占曰有德令拜太子女主不居宮至十月立皇太子賜為父後者爵旌孝友之家至二年三月乙丑填星守房占曰女主有黜者以地震為徵地震者陰盈而失其性也四月丙申月掩填星七月戊午又如之是為后妃有相遷奪者且曰女主死之時比歲地震至三年八月太白又犯軒轅十二月月掩熒惑皆小君之謫也時高后席寵凶悍雖人主猶畏之莫敢動搖故世宗胤嗣幾絶明年上崩后廢為尼降居瑤光寺尋為胡氏所害以厭天變也延昌元年八月己未有流星起五車西南流入畢畢邊兵也占曰有兵車之事以所直名之至二年十一月戊午又有流星起五車西南流殷殷有聲憑怒者事盛也十二月己卯有流星西南流分而為二又偏師之象也至三年六月辛巳太白晝見占曰西兵大起有王者之喪十一月大將軍高肇伐蜀益州刺史傅豎眼出北巴平南羊祉出涪安西奚康生出綿竹撫軍甄琛出劍閣會帝崩旋師先是元年三月己酉木土相犯占曰人君有失地者將死之又曰先作事者敗兵起必受其殃三年九月太白掩右執法是為大將軍有罹刑辟者先是二年二月梁郁洲人徐玄明斬大將張稷來降及肇出征還亦就戮元年三月乙未有流星起太陽守歷北斗入紫宮抵北極至華蓋而滅太陽守所以弼承帝車大臣之象今使星由之以語天極之位臣執國命將由此始乎且占曰天下大凶主室其空先是去年八月至十月月再入太微是歲三月又如之十二月甲戌月犯火于太微占曰君死不出三年貴人奪權失勢二年三月辛酉熒惑又犯太微占曰天下不安有立君之戒九月丁卯入太微犯屏星明年正月而世宗崩於是王室遂卑政在公輔三年二月月暈畢昴五車太白東井占主赦是月太白失行在天關北占有關梁之兵道不通明年正月肅宗立大赦天下二月梁將任太洪帥衆寇關城四年五月庚戌九月乙丑十月癸巳月皆犯太微中歲而驟干之強臣不御執法多門之象也閏月戊午月犯軒轅又女主之謫十一月庚寅木火會于室相距一尺至甲午火徙居東北亦相距一尺室為後宮火與木合曰內亂環而營之或淫事干逼諸侯之象占曰姦臣謀大將戮若有夷族之害以赦令除之先是三年九月太白犯執法是歲八月領軍于忠擅戮僕射郭祚九月太后臨朝淫放日甚至逼幸清河王懌其後羽林千餘人焚征西將軍張彝宅辜死者百數朝廷不能討於是大赦原羽林亦營室之故也魏收以為月犯太微大臣有死者其後安定王薨月犯軒轅女主憂之其後皇太后高尼崩于瑤光寺營室又主土功也胡太后害高氏以厭天變乃以后禮葬之四年十月太白犯南斗斗為吳分占曰大兵起先是三年四月有流星起天津東南流轢虛危天津主水事且曰有大衆之行其後梁造浮山堰以害淮泗諸將攻之是歲閏月有大奔星起七星南流色正赤光明燭地尾長丈餘歷南河至東井七星河南之分也流星出之有兵起施及東井將以水禍終之又占曰所與城等疑是時鎮南崔亮攻梁師于硤石明年二月鎮東蕭寶夤大破梁淮北軍九月淮堰決梁人十餘萬口皆漂入海肅宗熙平元年三月丙子太白犯歲星十二月甲辰月犯歲星是謂強盛之陰而陵少陽之君歲又諸侯也天象若曰始由內亂干之終以威刑及之是歲正月熒惑犯房四月庚子又逆行犯之癸卯月又犯房占曰天下有喪諸侯起霸將相戮十一月大流星起織女東南流長且三丈光明照地占曰王后憂之有女子白衣之會間歲高太后殂司徒國珍薨中宮再有喪事其後僕射于忠司徒任城王澄薨既而太后幽逼清河中山王戮死或曰月太白犯歲星饉祥也火犯房陳兵滿野有饑國且大赦又元年十二月月暈井觜參五車占曰水旱有赦至二年正月大赦十月幽冀滄瀛大饑是月月再暈畢參五車占曰饑赦明年幽州大饑死者數千人自正月不雨至六月是歲四夷反叛兵大出又赦改元二年六月癸丑有大流星出河鼓東南流至牛十一月流星起河鼓色黃赤西南流長且三丈有光照地至神龜元年四月壬子有流星起河鼓西北流至北斗散滅河鼓鼓旗之應也故流星出之兵出入之兵入昔宋泰始初大流星出自河鼓西南行竟有小星百數從之既而諸侯同時作亂至是三出河鼓秦州屬國羌及南秦東益氐皆反七月河州人却鐵匆與羣盜又起自稱水池王詔行臺源子恭及諸將四出征之朝廷多事故天應屢見云神龜二年四月甲戌大流星起天市垣西東南流轢尾光明燭地天象若曰將作大衆而從后妃之事矣以所首名之是歲九月太后幸嵩高或曰市垣所以均國風尾幽州也明年詔尚書長孫稚撫巡北蕃觀省風俗二月丙辰月在參暈井觜參歲星五車占曰有死相且赦明年諸王多伏辜又大赦二年八月己亥太白犯軒轅是月月又犯之至正光元年正月月又犯軒轅大星四月庚戌金火合于井相去一尺占曰王業易君失政大臣首亂將相戮死以用師大敗五月丙午太白犯月相距三寸占曰將相相攻秦國有戰七月太白犯角角天門也是為兵及朝庭占曰有謀不成破軍斬將是月侍中元叉矯詔幽太后于北宮殺太傅清河王懌八月中山王熙起兵誅元叉不克遇害明春衛將軍奚康生謀討叉于禁中事泄又死是冬諸將伐氐官軍敗績正光元年九月辛巳有彗星光焰如火出于東方陰動爭明之異也感精符曰天下以兵相威以勢相乘至威疑亂起布衣從衡禍未庸息帝宮其空昔正始中天讒孛于東北是歲而攝提復周故天象若曰夫讒之亂萌有自來矣彗除之象今則著矣戰國之禍將由此作乎間三年而北鎮肇亂關中迹之自是姦雄鼎沸覆軍相踵其災之所及且二十餘年而猶未弭焉梁志曰九月乙亥有星晨見東方光如火占曰國皇見有內難急兵明年義州反乙亥去辛巳凡六日而北方覿之其氣蓋同矣始干其明以妖南國既又彗而布之以除魏邦二年四月甲辰火土相犯於危十一月辛亥金土又相犯于危危存亡之機太白司兵熒惑司亂而玄枵司人土下之所係命也三精洊聚羣臣叶謀以濟屯復之運焉占曰天下方亂甲兵大起王后專制有虛國徙王至四年四月己未火土又相犯于室是謂後宮內亂且占曰欲殺主天子不以壽終或曰魏氏軒轅之裔填星之物也赤靈為母白靈為子經綸建國之命所以傳撥亂之君也其受之者將在并州與有齊之國乎其後太后淫昏天下大壞上春秋方壯誅諸佞臣由是鄭儼等竦懼遂說太后鴆帝既而爾朱氏興于并州終啓齊室之運卜洛之業遂丘墟矣二年十月月掩心大星至三年正月月掩心距星四月丁丑又如之占曰亂臣在側囗囗囗囗五年間三歲而肅宗崩三年七月庚申有大流星如五斗器起王良東北流長一丈許王良主車騎且曰有軍涉河昭盛者事大是日月在昴北三寸十一月乙卯又如之是謂兵加胸奴且胡王之謫也先是蠕蠕阿那瓌失國詔北鎮師納之是歲八月蠕蠕後主來奔懷朔鎮間歲阿那瓌背約犯塞詔尚書令李崇率騎十萬討之出塞三千餘里不及而還二年九月庚戌月暈胃昴畢五車辛亥又暈之占曰饑旱有赦至三年九月月在畢暈昴畢觜參五車是歲夏大旱十二月大赦三年二月丁卯月掩太白京師不見涼州以聞占曰天下大兵起涼州獨見災在秦也三月癸卯有大流星起西北角流入紫宮破為三段光明照地角星主外朝兵政流星由之將大出師之象若曰將以兵革之故王室分崩入抵紫宮天下大凶有虛國之象四月癸酉有大奔星歷紫微入北斗東北首光明燭地殷然如雷盛怒之象也皆以所直名之至四年八月乙亥月在畢掩熒惑又邊城兵亂之戒也十月乙卯太白入斗口距第四星三寸光芒相掩占曰大兵起將戮辱又吳分也五年正月沃野鎮人破落汗拔陵反臨淮王彧征之敗績于五原六月莫折大提反於秦雍州刺史元志討之又大敗於隴東明年南方諸將頻破梁師至八月杜洛周起上谷其後鮮于修禮反定州王師比歲北征冀方大震既而葛榮承之竟陷河北五年二月月在參暈觜參五車東井熒惑八月又暈之閏月月在張翼再暈軒轅太微占曰兵起士卒多遁走一曰士卒大聚又皆赦祥也是時徵調驟起兵相蹈藉又有詔內外戒嚴將親征自二月至六月再大赦天下十月月在畢暈昴畢觜參後年春又大赦先是二年九月歲星犯左執法至三年正月癸丑又逆行犯之相去四寸光芒相及五月丙辰歲星又掩左執法是時宦者劉騰與元叉叶謀遂總百揆之任故歲星反復由之與高肇同占至四年二月騰死叉由是失援其年十一月庚戌歲星犯房上相相距二寸光芒相掩五年四月己丑歲星又逆行犯之明年皇太后反政叉遂廢黜昔高肇為尚書令而歲星三省之及升于上相歲星亦再循之至是三犯執法而騰死再干上相而叉敗曠宮之譴異代同符矣孝昌元年五月太白犯軒轅八月在張角盛大占曰有暴酷之兵張河南也十二月火入鬼又犯之占曰大賊在大人之側后以淫泆失政又秦分也二年正月癸卯金木相犯於牛十一月戊申又相犯于女歲所以建國均人女為蠶妾牛為農夫天象若曰是將罹以寇戎而喪其耕織之務矣且曰有亂兵大戰而波及齊吳是歲八月甲申月在胃掩鎮星閏月癸酉又掩之三年正月戊辰又掩之是為女君有罹兵刑之禍者洊干之事甚而衆也又占曰天下大喪無主貴人兵死國以滅亡又二年三月奔星大如斗出紫微東北流光照地占曰王師大出邦去其君六月有奔星如斗起大角入紫宮而滅棟星以肆覲羣后而敷威令于四方也今大號由之以詔天極不以逆乎且有空國徙王之戒焉十月有星入月中而滅占曰入而無光其國卒滅星反出者亡國復立是歲四月至三年九月熒惑再犯軒轅大星武泰元年正月又逆行復犯之占曰主命將失女君之象亂逆之災三月庚申月掩畢大星占曰邊兵起貴人多死者是時淫風滋甚王政盡薥自大河而北極關而西覆軍屠邑不可勝計既而蕭寶夤叛于雍州梁師驟伐淮泗連兵青土萬姓嗷嗷喪其樂生之志矣是歲二月帝竟以暴崩四月爾朱榮以大兵濟河執太后及幼主沉諸中流害王公以下二千遂專權晉陽以令天下焉三年正月癸酉月在井暈觜參兩河五車七月大赦明年少主立又大赦莊帝永安元年七月癸亥太白犯左角相距四寸光芒相掩兵及朝庭之象占曰大戰不勝貴人有來者其謀不成至二年閏月熒惑入鬼犯積尸占曰兵起西北有鈇鉞之誅是歲北海王皓以梁師陷考城執濟陽王暉業乘虛逐勝遂入洛陽至七月王師大敗之皓竟戮死有謀不成之驗明年爾朱天光擊反虜万俟醜奴及蕭寶夤于安定克之咸伏誅二年十一月熒惑自鬼入太微西掖門犯上將出東掖門犯上相東行纍日句己去來復逆行而西十二月乙丑月又掩之至三年正月癸未逆行入東掖門己丑月入太微襲熒惑辛卯月行太微中又暈之三月己卯在右執法北一尺五寸留十四日至壬辰月又掩之復順行而東四月戊午月又干太微而暈己未熒惑出端門在左執法南尺餘而東自魏興以來未有循環反復若此之荐也是時孝莊將誅權臣有興復魏室之志是以誠發於中而熒惑咨謀於上焉其占曰有權臣之戮有大兵之亂貴人以強死而天下滅亡至五月己亥太白在參晝見參為晉陽之墟天意若曰干明之釁於是乎在矣七月甲午有彗星晨見東北方在中台東一丈長六尺色正白東北行西南指丁酉距下台上星西北一尺而晨伏庚子夕見西北方長尺東南指漸移入氐至八月己未漸見癸亥滅占曰彗出太階有陰謀姦宄興凡天事為之徵形以戒告人主始滌公輔之穢而彗除之權臣將滅之象再干太陽之明而後陵奪之逆亂復興之象也三月而見者變近亟也究于內宮者反仇其上也近期在衝遠期一年先是二日壬申有大流星相隨西北尾迹不絶以千計西北直晉陽之墟而微星庶人所以載皇極也人徙而君從之是月戊戌有大奔星自極東貫紫宮而出影迹隨之遷君之應至九月上誅太原王榮上黨王天穆于明光殿是夕爾朱氏黨攻西陽門不克退屯河陰十二月洛陽失守帝崩于晉陽自是南宮版蕩劫殺之禍相踵先是永安元年七月丙子十一月丙寅十二月癸巳月皆掩畢大星至二年三月乙卯月入畢口八月乙丑又距畢左股二寸光芒相掩須臾入畢口十二月丙辰掩畢右股大星三年六月乙巳又犯畢大星八月庚申入畢口犯左股大星是月辛丑太白犯軒轅明年五月月又犯畢右股遂入之畢星所以建魏國之命也占曰天下有變其君大憂邊兵起上將戮月洊干之事甚而衆及爾朱兆作亂奉長廣王為主號年建明明年二月又廢之而立節閔六月高歡又推安定王為帝於信都復黜之後更立武帝於是三少王相次崩殂又洛陽再陷六宮汙辱有兵及軒轅之效焉永安二年十月辛亥十二月丁巳月皆在畢暈昴畢填星觜參五車普泰元年正月己丑月在角暈軫角五車亢連環暈北斗大角織女十月又暈昴畢觜參井五車是時肆赦之令歲月相踵節閔普泰元年五月辛未太白出西方與月並間容一指戰祥也先是去年十一月辛丑月在太白北不容一指占曰有破軍殺將主人不勝既而爾朱氏南侵王師敗績至是又與月合幾將復之乎十月甲寅金火歲土聚于觜參甚明大晉魏之墟也且曰兵喪並起霸君興焉是時勃海王歡起兵信都改元中興至十一月己卯奔星如斗起太微東北流光明燭地有聲如雷占曰大臣有外事以所首事命之或曰中國失君有立王遷主著而有聲者盛怒也是時爾朱氏成師伐明年三月癸巳火逆行犯氐占曰天子失其宮閏月庚申歲星入鬼犯天尸占曰有戮死之君既而爾朱兆等大敗于韓陵覆師十餘萬四月武帝即位比及歲終凡殺三廢帝孝武永熙元年九月太白經天十一月辛丑有大流星出昴北東南流轢畢貫參光明照地有聲如雷天象若曰將有髦頭之兵憑陵塞垣與大司馬合戰明年正月丁酉勃海王歡追擊兆等于赤洪嶺大破之爾朱氏殲焉二年四月太白晝見九月丁酉火木合于翼相去一寸光芒相掩占曰是謂內亂姦臣謀人主憂甲寅金火合于軫相去七寸光芒相及占曰是謂相鑠不可舉事用兵翼軫南宮之蕃又荊州也至三年三月癸巳有奔星如三斛甕起匏瓜西流入市垣有光燭地迸流如珠尾跡數丈廣且三尺凝著天狀如蒼白雲須臾屈曲蛇行匏瓜為陰謀星大如甕為發謀舉事光盛且大人貴而衆也以所首名之且為天飾王者更均封疆是時斛斯椿等方說上伐高歡荊州刺史賀拔勝預謀焉高歡知之亦以晉陽之甲來赴七月上自將十餘萬次河橋望歡軍憚之不敢戰遂西幸長安至十月勃海王更奉孝靜為主改元天平由是分為二國更均封疆之應也是月歡命侯景攻荊州拔之勝南奔是年三月庚子木逆行在左執法北一寸光芒相掩五月甲申又在執法西半寸乍見乍不見占曰強臣擅命改政更元十二月上崩由是高歡宇文泰擅權兩國又二年十一月乙丑三年八月庚午十二月庚申月皆在畢暈畢昴參五車自三年二月至明年正月東西魏凡四大赦三年五月己亥熒惑逆行掩南斗魁第二星遂入斗口先是元年十一月熒惑入斗十餘日出而逆行復入之六十日乃去斗大人之事也占曰中國大亂道路不通天下皆更元易政吳越之君絶嗣是歲東西帝割據山河遂為戰國比十月至正月梁魏三帝皆大赦改元或曰斗為壽命之養而火以亂氣干之耄荒之戒也是時梁武帝年已七十矣怠於聽政專以講學為業故皇天殷勤著戒又若言曰經遠之謀替矣將以逆亂終之而勦其天祿焉夫天懸而示之且猶不悟其後攝提復周卒有侯景之亂云三年十二月梁人立元慶和為魏王屯平瀨明年正月東南行臺元晏大破之六月豫州刺史堯雄又大破梁師於南頓十月梁攻單父徐州刺史任祥又大破之斬虜萬餘級十一月柳仲禮寇荊州諸將又大敗之時梁軍政益薥故纍有負敗之應東魏孝靜天平二年有星孛于太微歷下台及室壁而滅南宮成周之墟孝文之餘烈也孛星由之易政徙王之戒天象若曰王城為墟夏聲幾變而台階持政有代奪之漸乎且抵于營室更都之象也是後兩霸專權皆以北俗從事河南新邑遂為戰爭之郊間三歲至興和元年九月發司州卒十萬營鄴都十月新宮成天平元年閏月月掩心大星二年八月又犯之相去七寸十一月又掩心小星相臣逼主之象且占曰人臣伐主應以善事除殃時兩雄王業已定特以人臣取容而已至興和二年八月月又犯心大星後數年而禪代元象二年七月壬戌金土合于七星癸亥遂犯七星七星河南之分金而犯土將有封畿之戰且占曰其分亡地先是去年十二月癸丑太白食月是歲三月壬申太白又與月合相距一寸大戰之祥也月象強大之國而金合之秦師將勝焉十二月有流星從天市垣西流長且一丈有尾迹三年正月勃海王歡攻夏州克之十月丁丑月犯火占曰大將有鬬死者十二月大都督竇泰入潼關明年宇文泰距擊斬之十月遂及勃海王歡戰于沙苑歡軍敗績捕虜萬餘是月獨孤信拔洛陽三年十一月熒惑犯歲星占曰有內亂臣謀主至四年正月客星出于紫宮占曰國有大變二月壬申八月癸未月再掩五車東南星卜曰兵起道不通十一月太白晝見占曰軍興為不臣五年二月庚戌三月甲子填星逆順行再犯上相上相司徒也六月太白入東井占曰秦有兵大臣當之至元象元年七月太白在柳晝見柳河南也八月辛卯有大流星出房心北東南行長且三尺尾迹分為三段軍破為三之象也先是行臺侯景司徒高昂圍金墉西帝及宇文泰自將救之是月陳于河陰泰以中軍合戰大克司徒高昂死之既而左右軍不利西師由是敗績斬將二十餘人降卒六萬是月西帝太傅梁景睿據長安反關中大震尋皆伏誅天平三年正月元象元年三月月再掩軒轅大星是年西帝廢皇后乙氏立蠕蠕女為后明年五月火犯軒轅大星既而乙氏遇害其後蠕蠕后又死而乙氏為祟焉元象元年十月月犯昴暈畢胃丁未在翼暈大星軒轅左角十一月在井暈五車兩咸東西主凡三大赦興和元年二月壬子火犯井占曰秦有兵亂貴人當之四月又入鬼亦兵喪之祥也又土地之分也至二年十一月甲戌太白在氐與填星相犯氐鄭地也至四年七月壬午火木合于井相去一尺占同天平明年北豫州刺史高仲密據武牢西叛宇文泰帥衆援之戊申及勃海王戰于邙山西軍大敗虜王侯將校四百餘人獲六萬餘級元年八月月在畢暈昴畢觜五車二年正月大赦三年正月至八月又再暈之歲星在焉四年十一月月暈軒轅太微壬申又暈胃昴畢五車皆兵饑赦祥也明年東西主皆大赦後年三月高歡入朝以春冬亢旱請賑窮乏死罪已下皆宥之先是元年十月辛丑有彗星出于南斗長丈餘至十一月丙戌距太白三尺長丈餘東南指二月乙卯至婁始滅占曰彗出南斗之土皆誅其上疑又吳分始自微末終成著大而與兵星合焉天戒若曰夫劫殺之萌其事由來漸矣而人君辨之不早終以兵亂橫流不可撲滅焉婁又徐方之次亂之所自招也至二年四月己丑金木相犯于奎丙午火木又相犯于奎奎為徐方所以虞蹶防之寇也歲主建國之命而省人君之差敗火主亂金主兵三精洊而聚謀所以哀矜下土而示驅除之戒也是時梁主衰老太子賢明而不能授之以政焉由是領軍朱䌇等浸侵明福之權至武定五年侯景竊河南六州而叛又與連衡而附益之是歲十二月梁師敗績于彭城捕虜五萬餘級江淮之間始蕭然愁歎矣明年師大敗陷溺以十萬數景遂舉而濟江三吳大荒道殣流離者太半淮表二十六州咸內屬焉昔三精聚謀於危九年而高氏霸至是聚謀於奎而蕭氏亡亦天之大數云爾武定二年四月丁巳熒惑犯南宮上將戊寅又犯右執法占曰中坐成刑金火尤甚四年四月庚午金晝見六月癸巳月入畢九月壬寅太白在左執法東南三寸許是為執法事五年正月月犯畢大星貴人之謫也先是九月大丞相歡圍玉壁不克是月歡薨于晉陽辛亥侯景反僕射慕容紹宗擊之八月淮南三王謀反誅明年紹宗攻王思政于潁川竟溺四年九月月在翼暈軒轅太微帝坐五年二月暈昴畢參井五車五月在張又暈軒轅太微時兵革屢動東西帝皆比歲大赦七年九月戊午月掩歲星在斗斗為天廟帝王壽命之期月由之以干歲星是為大人有篡殺死亡之禍是歲梁武帝以憂逼殂明年而齊帝後年西主文帝及梁簡文又終天下皆有大故而江表尤甚八年三月甲午歲鎮太白在虛虛齊分是為驚立絶行改立王公熒惑又從而入之四星聚焉五月丙寅帝禪位于齊是歲西主大統十六年也是時兩主立而東帝得全魏之墟於天官為正昔宋武北伐四星聚奎及西伐秦四星聚井四星聚參而勃海始霸四星聚危而文宣受終由是言之帝王之業其有徵矣其後六年西帝禪于周室天文史失其傳也
