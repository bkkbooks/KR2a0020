body:
  text: 魏書卷九十三列傳恩倖第八十一王叡王仲興寇猛趙脩茹晧趙邕侯剛鄭儼徐紇夫令色巧言矯情飾貌邀眄睞之利射咳唾之私此蓋苟進之常也故甚者刑身瀹子其次舐痔嘗癰況乃散金秦貨輸錢漢爵又何怪哉若夫地窮尊貴嗜欲所攻聖達其猶病諸中庸固不能免男女性態其揆斯一二代之亡皆是物也據天下之圖持海內之命顧指如意高下在心此乃夏桀殷紂喪二邦秦母呂雉穢兩國也魏世王叡幸太和之初鄭儼寵孝昌之季主幼於前君稚於後乘間宣淫殆無忌畏樹列朋黨蔽塞天聰高祖明聖外彰人神繫仰御之有術宗社弗墜肅宗不言垂拱潛濟罕方六合淆然至於隕覆且承顏色竊光寵勢等秋風氣同夏日亦何世而不有哉此周旦所以誡其朋詩人是為疾羣小也太宗時王車之徒雖云幸念皆宣力夷險誠效兼存未如趙脩等出於近習趨走之地坐擅威刑勢傾都鄙得之非道君子所以賤之書其變態備禍福之由焉王叡字洛誠自云太原晉陽人也六世祖橫張軌參軍晉亂子孫因居於武威姑臧父橋字法生解天文卜筮涼州平入京家貧以術自給歷仕終於侍御中散天安初卒贈平遠將軍涼州刺史顯美侯諡曰敬叡少傳父業而姿貌偉麗恭宗之在東宮見而奇之興安初擢為太卜中散稍遷為令領太史承明元年文明太后臨朝叡因緣見幸超遷給事中俄而為散騎常侍侍中吏部尚書賜爵太原公於是內參機密外豫政事愛寵日隆朝士懾憚焉太和二年高祖及文明太后率百僚與諸方客臨虎圈有逸虎登門閣道幾至御座左右侍御皆驚靡叡獨執戟禦之虎乃退去故親任轉重三年春詔叡與東陽王丕同入八議永受復除四年遷尚書令封爵中山王加鎮東大將軍置王官二十二人中書侍郎鄭羲為傅郎中令以下皆當時名士又拜叡妻丁氏為妃及沙門法秀謀逆事發多所牽引叡曰與其殺不辜寧赦有罪宜梟斬首惡餘從疑赦不亦善乎高祖從之得免者千餘人叡出入帷幄太后密賜珍玩繒綵人莫能知率常以夜帷車載往閹官防致前後巨萬不可勝數加以田園奴婢牛馬雜畜並盡良美大臣及左右因是以受賚錫外示不私所費又以萬計及疾病高祖太后每親視疾侍官省問相望於道及疾篤上疏曰臣聞忠於事君者節義著於臨終孝於奉親者淳誠表於垂沒故孔明卒軍不忘全蜀之計曾參疾甚情存善言之益雖則庸昧敢忘景行臣荷天地覆載之恩蒙大造生成之德漸風訓於華年服道教於弱冠濯纓清朝垂周三紀受先帝非分之眷叨陛下殊常之寵遂乃齊跡功舊內侍幃幄爵列諸王位班上等從容聞道與知國政誠思竭盡力命以報所受不謂事與心違忽嬰重疾每屈輿駕親臨問之榮洽生平惠流身後犬馬之誠銜佩罔極今所病遂篤慮必不起延首闕庭鯁戀終日仰恃皇造宿眷之隆敢陳愚昧管窺之見臣聞為治之要其略有五一者慎刑罰二者任賢能三者親忠信四者遠讒佞五者行黜陟夫刑罰明則姦宄息賢能用則功績著親忠信則視聽審遠讒佞則疑間絕黜陟行則貪叨改是以欽恤惟刑載在唐典知人則哲唯帝所難周書垂好德之文漢史列防姦之論考省幽明先王大典又八表既廣遠近事殊撫荒裔宜待之以寬信綏華甸宜惠之以明簡哀恤孤獨賑施困窮錄功舊赦小罪輕徭役薄賦斂修福業禁淫祀願聽政餘暇賜垂覽察使子囊之誠重申於當世將墜之志獲用於明時尋薨時年四十八高祖文明太后親臨哀慟賜溫明祕器宕昌公王遇監護喪事贈衞大將軍太宰并州牧諡曰宣王內侍長董醜奴營墳墓將葬於城東高祖登城樓以望之京都文士為作哀詩及誄者百餘人乃詔為叡立祀於都南二十里大道右起廟以時祭薦并立碑銘置守祀五家又詔褒叡圖其捍虎狀於諸殿命高允為之讚京都士女謟稱叡美造新聲而絃歌之名曰中山王樂詔班樂府合樂奏之初叡女妻李沖兄子延賓次女又適趙國李恢子華女之將行也先入宮中其禮略如公主王女之儀太后親御太華殿寢其女於別帳叡與張祐侍坐叡所親及兩李家丈夫婦人列於東西廊下及車引太后送過中路時人竊謂天子太后嫁女叡之葬也假親姻義舊衰絰縞冠送喪者千餘人皆舉聲慟泣以要榮利時謂之義孝叡既貴乃言家本太原晉陽遂移屬焉故其兄弟封爵移以并州郡縣薨後重贈叡父橋侍中征西將軍左光祿大夫儀同三司武威王諡曰定追策叡母賈氏為妃立碑於墓左父子並葬城東相去里餘遷洛後更徙葬太原晉陽子襲字元孫年十四以父任擢為中散仍總中部叡薨高祖詔襲代領都曹為尚書令領吏部曹中部如其品職依典承襲文明太后令曰都曹尚書曹百僚之首民所具瞻襲年少智思未周其都曹尚書令可權記使閑習政事後用不晚終太后世寵念如初襲王爵例降為公太后崩後襲仍在高祖左右然禮遇稍薄不復關與時事久之出為鎮西將軍秦州刺史又轉并州刺史十七年輿駕詣洛路幸其治供帳粗辦境內清靜高祖頗嘉之而民庶多為立銘置于大路虛相稱美或曰襲所教也高祖聞而問之對不以實因是面被責讓尚書奏免其官詔唯降號二等二十年以事為中尉所糾會赦免語在常景傳景明二年卒贈平南將軍豫州刺史諡曰質子忻襲爵為太尉汝南王悅記室參軍建義初河陰遇害贈散騎常侍安北將軍肆州刺史諡曰穆子子暄襲爵武定末齊州驃騎府功曹參軍齊受禪例降忻弟誕字永安龍驤將軍正平太守亦於河陰遇害贈撫軍將軍并州刺史子希雲舉秀才早亡誕弟殖字永興司空城局參軍子祖幹司徒行參軍并州刺史殖弟永業司空參軍事襲弟椿字元壽少以父任拜祕書中散尋以父憂去職後除羽林監謁者僕射母喪解任正始初拜中散出為太原太守加鎮遠將軍坐事免椿僮僕千餘園宅華廣聲妓自適無乏於時或有勸椿仕者椿笑而不答雅有巧思凡所營製可為後法由是正光中元叉將營明堂辟雍欲徵椿為將作大匠椿聞而以疾固辭孝昌中尒朱榮既據并肆以汾州胡逆表加椿征虜將軍都督慰勞汾胡汾胡與椿比州服其聲望所在降下事寧授右將軍太原太守以預立莊帝之勞封遼陽縣開國子食邑三百戶尋轉封真定縣開國侯食邑七百戶除持節本將軍華州刺史尋轉使持節散騎常侍殷州刺史元曄立除都官尚書固辭不拜永熙中行冀州事尋除使持節散騎常侍車騎將軍瀛州刺史時有風雹之變詔書廣訪讜言椿乃上疏曰伏奉詔書以風雹厲威上動天睠訪讜辭於百辟詔輿誦於四海宸衷懇切備在絲綸祗承兢感心焉靡厝伏惟陛下啟籙應期馭育萬物承綴旒之艱運纂纖絲之危緒忘餐日昃求衣未明俾上帝下臨愍茲荼蓼永濟溝壑而滄浪降戾作害中秋上帝照臨義不虛變竊惟風為號令皇天所以示威雹者氣激陰陽有所交諍殆行令殊節舒急失中之所致也昔澍雨千里實緣教祀之誠炎精三舍寧非善言之力譴不空發徵豈謬應誰謂蓋高實符人事伏願陛下留心曲覽垂神遠察禮賢登士博舉審官擢申滯怨振窮省役使夫滋水沒川之彥畢居朝右儀表丹青之位未或虛加圜土絕五毒之民揆日息千門之費巖巖廊署無不遇之士忪忪惸獨荷酒帛之恩則物見昭蘇人知休泰徐奏薰風之曲無論鴻雁之歌豈不天人幸甚鬼神咸抃椿性嚴察下不容姦所在吏民畏之重足天平末更滿還鄉初椿於宅構起廳事極為高壯時人忽云此乃太原王宅豈是王太原宅椿往為本郡世皆呼為王太原未幾尒朱榮居椿之宅榮封太原王焉至於齊獻武王之居晉陽霸朝所在人士輻湊椿禮敬親知多所拯接後以老病遂辭疾客居趙郡之西鯉魚祠山興和二年春卒時年六十二贈使持節都督冀瀛二州軍事驃騎大將軍尚書左僕射太尉公冀州刺史諡曰文恭及葬齊獻武王親自弔送椿妻鉅鹿魏悅之次女明達有遠操多識往行前言隨夫在華州兄子建在洛遇患聞而星夜馳赴膚容虧損親類歎尚之尒朱榮妻北鄉郡長公主深所禮敬永安中詔以為南和縣君內足於財不以華飾為意撫兄子收情同己子存拯親類所在周洽椿名位終始魏有力焉元象中卒贈鉅鹿郡君椿無子以兄孫叔明為後叔明太尉參軍事儀同開府祭酒死於晉陽無子以弟子暄子為後叡弟諶字厚誠為給事中安南將軍祠部尚書賜爵上黨公加散騎常侍領太史事例降為侯遷太常卿出為持節安東將軍兗州刺史還除光祿大夫卒於官贈帛五十匹子翔字元鳳少以聰敏循良詔充內侍自太和初與李沖等奏決庶事迄于十六年賞賜前後累千萬是時政事多決於文明太后后好細察而翔恭謹慎密甚被知任遷洛兼給事黃門侍郎尚書左丞襲爵遷輔國將軍太府少卿出為濟州刺史卒贈大將軍肆州刺史子超襲超字和善奉朝請并州治中超愛好人物輕財重義性豪華能自奉養每食必窮水陸之味年三十四卒子景覽襲武定中衞將軍右光祿大夫齊受禪例降景覽弟景招開府集曹參軍超弟穆字思泰元象中上黨太守卒穆弟綽字思和員外散騎侍郎上黨王天穆以為北道行臺郎中尒朱榮代天穆為大行臺仍為吏部郎以預奉莊帝之勳封猗氏縣開國侯邑五百戶永安末除征西將軍豳州刺史不之任元曄立轉除驃騎大將軍并州刺史興和中卒綽弟爽司徒中兵參軍諶弟魏誠為東宮學生拜給事中賜爵中都侯加龍驤將軍卒贈安南將軍冀州刺史諡曰恭子靜字元安少有公幹拜中散襲爵例降為伯除員外郎羽林監兼尚書郎以明法除廷尉評轉游擊將軍加冠軍將軍岐州刺史趙郡王謐虐害城民怨叛詔靜以驛慰喻咸即降下以奉使稱旨賜帛五百匹除趙郡太守以母老固辭不拜又授征虜將軍廷尉少卿有當官之稱坐公事左遷中散大夫以母憂去職孝昌初詔兼廷尉卿尋行定州事並固辭不起二年夏除長兼廷尉卿尋行定州事至冬病卒年五十七贈撫軍將軍并州刺史諡曰貞無子以從子伯豫為後伯豫襲爵武定中冀州開府錄事參軍齊受禪例降魏誠弟亮字平誠承明初擢為中散告沙門法秀反遷冠軍將軍賜爵永寧侯加給事中出為安西將軍泰州刺史後轉陝州刺史坐事免卒於家亮子洪壽早卒子元景正光中許復先爵降為伯卒無子洪壽弟嶷字安壽除奉朝請稍遷中散大夫以疾歸鄉里遂移居上黨年七十一卒子夷字景預有文才少工詩詠知名於世未官而卒叡叔隆保冠軍將軍姑臧侯卒追贈安東將軍并州刺史鉅鹿公諡曰靖王仲興趙郡南欒人也父天德起自細微至殿中尚書仲興幼而端謹以父任早給事左右太和中殿內侍御中散武騎侍郎給事中出入禁內十餘年轉冗從僕射猶參密近為齋帥從駕征新野有功除折衝將軍屯騎校尉又命率千餘騎破賊於鄧城除振威將軍越騎校尉賜帛千匹高祖於馬圈自不豫大漸迄於崩仲興頗預侍護達魯陽世宗即位轉左中郎將仍齋帥及帝親政與趙脩並見寵任遷光祿大夫領武衞將軍仲興雖與脩並而畏慎自退不若脩之倨傲無禮咸陽王禧之出奔也當時上下微為駭震世宗於乾脯山追仲興馳入金墉城安慰後與領軍于勁共參機要因自理馬圈侍疾及入金墉之功乞同元賞遂封上黨郡開國公食邑二千戶自拜武衞及受封之日車駕每臨饗其宅世宗游幸仲興常侍從不離左右外事得徑以聞百僚亦聳體而承望焉兄可久以仲興故自散爵為徐州征虜府長史帶彭城太守仲興世居趙郡自以寒微云舊出京兆霸城故為雍州大中正尚書後以仲興開國公賞報過優北海王詳嘗面啟奏請降減事久不決可久在徐州恃仲興寵勢輕侮司馬梁郡太守李長壽遂至忿諍彭城諸沙門共相和解未幾復有所競可久乃令僮僕邀毆長壽遂折其脅州以表聞北海王詳因百僚朝集厲色大言曰徐州名藩先帝所重朝廷云何簡用上佐遂令致此紛紜以徹荒外豈不為國醜辱也衆亦莫有應者仲興是後漸疏不得徑入左右世宗乃下詔奪其封邑出除平北將軍并州刺史卒贈安東將軍青州刺史寇猛上谷人也祖父平城猛少以姿幹充虎賁稍遷羽林中郎從高祖征南陽以擊賊不進免官世宗踐位復用愛其膂力置之左右為千牛備身歷轉遂至武衞將軍出入禁中無所拘忌自以上谷寇氏得補燕州大中正而不能甄別士庶也家漸富侈宅宇高華妾隸充溢微榮弟姪然不及茹皓仲興也卒贈平北將軍燕州刺史趙脩字景業趙郡房子人父惠安後名謐都曹史積勞補陽武令脩貴追贈威烈將軍本郡太守及葬復贈龍驤將軍定州刺史脩本給事東宮為白衣左右頗有膂力世宗踐阼仍充禁侍愛遇日隆然天性闇塞不閑書疏是故不參文墨世宗親政旬月之間頻有轉授歷員外通直散騎常侍鎮東將軍光祿卿每受除設宴世宗親幸其宅諸王公卿士百僚悉從世宗親見其母脩能劇飲至於逼勸觴爵雖北海王詳廣陽王嘉等皆亦不免必致困亂每適郊廟脩常驂陪出入華林乘馬至于禁內咸陽王禧誅其家財貨多賜高肇及脩脩之葬父也百僚自王公以下無不弔祭酒犢祭奠之具填塞門街於京師為制碑銘石獸石柱皆發民車牛傳致本縣財用之費悉自公家凶吉車乘將百兩道路供給亦皆出官時將馬射世宗留脩過之帝如射宮脩又驂乘輅車旒竿觸東門而折脩恐不逮葬日驛赴窆期左右求從及特遣者數十人脩道路嬉戲殆無戚容或與賓客姦掠婦女裸觀從者噂喧譁詬詈無節莫不畏而惡之是年又為脩廣增宅舍多所并兼洞門高堂房廡周博崇麗擬於諸王其四面隣居賂入其地者侯天盛兄弟越次出補長史大郡脩起自賤伍暴致富貴奢傲無禮物情所疾因其在外左右或諷糾其罪自其葬父還也舊寵小薄初王顯祗附於脩後因忿鬩密伺其過規陷戮之而脩過短都不悛防顯積其前後愆咎列脩葬父時路中淫亂不軌又云與長安人趙僧襀謀匿玉印事高肇甄琛等構成其罪乃密以聞始琛及李憑等曲事於脩無所不至懼相連及爭共糾摘助攻治之遂乃詔曰小人難育朽棘不彫長惡不悛豈容撫養散騎常侍鎮東將軍領扈左右趙脩昔在東朝選充臺皂幼所經見長難遺之故纂業之初仍引西禁雖地微器陋非所宜採然識早念生遂陞名級自蒙洗濯兇昏日甚驟佞荐驕恩加輕慢不識人倫之體不悟深淺之方陵獵王侯輕觸卿相門賓巷士拜叩不接囂氣豪心仍懷鄙塞比聽葬父侈暴繼聞居京造宅殘虐徒旅又廣張形勢妄生矯託與雍州人趙僧襀等陰相傳納許受玉印不軌不物日月滋甚朕猶愍其宿隸每加覆護而擅威弄勢侏張不已法家耳目並求憲網雖欲捨之辟實難爽然楚履既墜江君徘徊鍾牛一聲東向改釁脩雖小人承侍在昔極辟之奏欲加未忍可鞭之一百徙敦煌為兵其家宅作徒即仰停罷所親在內者悉令出禁朕昧於處物育茲豺虎顧尋往謬有愧臣民便可時敕申沒以謝朝野是日脩詣領軍于勁第與之樗蒲籌未及畢而羽林數人相續而至稱詔呼之脩驚起隨出路中執引脩馬詣領軍府琛與顯監決其罰先具問事有力者五人更迭鞭之占令必死旨決百鞭其實三百脩素肥壯腰背博碩堪忍楚毒了不轉動鞭訖即召驛馬促之令發出城西門不自勝舉縛置鞍中急驅馳之其母妻追隨不得與語行八十里乃死初于后之入脩之力也脩死後領軍于勁猶追感舊意經恤其家自餘朝士昔相宗承者悉棄絕之示己之疏遠焉茹皓字禽奇舊吳人也父讓之本名要隨劉駿巴陵王休若為將至彭城是時南土飢亂遂寓居淮陽上黨皓年十五六為縣金曹吏有姿貌謹惠南徐州刺史沈陵見而善之自隨入洛陽舉充高祖白衣左右世宗踐祚皓侍直禁中稍被寵接世宗嘗拜山陵路中欲引與同車皓奮衣將昇黃門侍郎元匡切諫乃止及世宗親政皓眷賚日隆又以馬圈之勞當擬補員外將軍時趙脩亦被幸妬害之求出皓為外守皓亦慮見危禍不樂內官遂超授濮陽太守加厲威將軍其父因皓訟理舊勳先除兗州陽平太守賜以子爵父子剖符名邦郡境相接皓忻然於去內不以疏外為戚及趙脩等敗竟獲全免雖起微細為守乃清簡寡事世宗幸鄴講武皓啟求朝趨解郡授左中郎將領直閤寵待如前皓既官達自云本出雁門雁門人諂附者乃因薦皓於司徒請為肆州大中正府省以聞詔特依許遷驃騎將軍領華林諸作皓性微工巧多所興立為山於天淵池西採掘北邙及南山佳石徙竹汝潁羅蒔其間經構樓館列於上下樹草栽木頗有野致世宗心悅之以時臨幸遷冠軍將軍仍驍騎將軍皓貴寵日升關與政事太傅北海王詳以下咸祗憚附之皓弟年尚二十擢補員外郎皓娶僕射高肇從妹於世宗為從母迎納之日詳親詣之禮以馬物皓又為弟聘安豐王延明妹延明非舊流不許詳勸強之云欲覓官職如何不與茹皓婚姻也延明乃從焉皓頗敏慧折節下人而潛自經營陰有納受貨產盈積起宅宮西朝貴弗之及也是時世宗雖親萬務皓率常居內留宿不還傳可門下奏事未幾轉光祿少卿意殊不已方欲陳馬圈從先帝之勞更希進舉初脩皓之寵北海王詳皆附納之又直閤將軍劉冑本為詳所薦常感詳恩密相承望並共來往高肇素疾諸王常規陷害既知詳與皓等交關相昵乃構之世宗云皓等將有異謀世宗乃召中尉崔亮令奏皓冑常季賢陳掃靜四人擅勢納賄及私亂諸事即日執皓等皆詣南臺翌日奏處罪其晚就家殺之皓妻被髮出堂哭而迎皓皓徑入哭別食椒而死皓子懷朗仕至南青州刺史興和初以罪賜死子姪徙邊冑字元孫河間人始為北海王詳所舉六輔時出守本郡與皓俱赴鄴宮講武亦自乞留至洛久不用詳又為啟晚乃拜將軍直閤季賢起於主馬世宗初好騎乘因是獲寵位至殿中將軍司藥丞仍主閑與茹皓通知庶事勢望漸隆引其兄為朝請直寢娶武昌王鑒妹季賢又將娶洛州刺史元拔女並結託帝戚以為榮援云掃靜徐義恭並彭城舊營人掃靜能為世宗典櫛梳義恭善執衣服並以巧便旦夕居中愛幸相侔官不異掃靜妻義恭姊也情相遺薄室家不諧義恭忿恨之親經世宗訴其欺侮世宗以其左右兩護之二人皆承奉茹皓亦並加接眷而掃靜偏為親密與皓常在左右略不歸休皓敗掃靜亦死於家義恭小心謹慎謙退少語皓等死後彌見幸信長侍左右典掌祕密世宗不豫義恭晝夜扶侍崩于懷中靈太后臨政義恭諂附元叉又有淫宴多在其宅為嘗藥次御出為東秦州刺史建義後歷內外顯職武定初卒於驃騎大將軍左光祿大夫趙邕字令和自云南陽人潔白明髭眉曉了恭敏司空李沖之貴寵也邕以少年端謹出入其家頗給按磨奔走之役沖亦深加接念令與諸子游處人有束帶謁於沖者時託之以自通高祖太和中給事左右至殿中監世宗即位及親政猶居本任微與趙脩結為宗援然亦不甚相附也邕稍遷至殿中將軍猶帶監職邕父怡太和中歷郢州刺史停家久之以邕寵召拜太常少卿尋為荊州大中正出除征虜將軍荊州刺史怡乃致其母喪葬於宛城之南趙氏舊墟以老乞解州任遷拜光祿大夫轉金紫光祿卒贈鎮東將軍相州刺史世宗每出入郊廟脩以常侍侍中陪乘而邕兼奉車都尉執轡同載時人竊論號為二趙以趙出南陽徙屬荊邕轉給事中南陽中正以父為荊州大中正乃罷轉長兼散騎侍郎領左右直長出入禁中復為荊州大中正邕弟尚中書舍人出除南陽太守怡辭荊州也尚求解郡與父俱還未至京師逆除步兵校尉邕祖嶽舊葬代京喪自平城還葬南陽贈平遠將軍青州刺史世宗崩邕兼給事黃門俄轉太府卿出除平北將軍幽州刺史在州貪縱與范陽盧氏為婚女父早亡其叔許之而母不從母北平陽氏攜女至家藏避規免邕乃拷掠陽叔遂至於死陽氏訴寃臺遣中散大夫孫景安研檢事狀邕坐處死會赦得免猶當除名自理經年臨淮王彧時為廷尉久不斷決孝昌初卒侯剛字乾之河南洛陽人其先代人也本出寒微少以善於鼎覔進出入久之拜中散累遷冗從僕射嘗食典御世宗以其質直賜名剛焉稍遷奉車都尉右中郎將領刀劍左右加游擊將軍城門校尉遷武衞將軍仍領典御又加通直散騎常侍詔曰太和之季蟻寇侵疆先皇於不豫之中命師出討撫戎暴露觸御乖和朕屬當監國弗獲隨侍而左右服事唯藉忠勤剛於違和之中辛勤行追遠錄誠宜先推其以剛為右衞大將軍後領太子中庶子世宗崩剛與侍中崔光迎肅宗於東宮尋除衞尉卿封武陽縣開國侯邑千二百戶俄為侍中撫軍將軍州大中正遷衞將軍表讓侍中詔不許進爵為公以給侍之勞加賞散伯熙平初除左衞將軍餘官如故侍中游肇出為相州剛言於靈太后曰昔高氏擅權游肇抗衡不屈先帝所知四海同見而出牧一藩未盡其美宜還引入以輔聖主太后善之剛寵任既隆江陽王繼尚書長孫稚皆以女妻其子司空任城王澄以其起由膳宰頗竊侮之云此近為我舉食然公坐對集敬遇不虧後剛坐掠殺試射羽林為御史中尉元匡所彈廷尉處剛大辟尚書令任城王澄為之言於靈太后侯剛歷仕前朝事有可取纖芥之疵未宜便致於法靈太后乃引見廷尉卿裴延儁少卿袁翻於宣光殿問曰剛因公事掠人邂逅致死律文不坐卿處其大辟竟何所依翻對曰案律邂逅不坐者謂情理已露而隱避不引必須箠撻取其款言謂撾撻以理之類至於此人問則具首正宜依犯結案不應橫加箠扑兼剛口唱打殺撾築非理本有殺心事非邂逅處之大辟未乖憲典太后曰卿等且還當別有判於是令曰廷尉執處侯剛於法如猛剛既意在為公未宜便依所執但輕勦民命理無全捨可削封三百戶解嘗食典御剛於是頗為失意剛自太和進食遂為典御歷兩都三帝二太后將三十年至此始解未幾加散騎常侍御史中尉元匡之廢也太后訪代匡者剛為太傅清河王懌所舉遂除車騎將軍領御史中尉常侍衞尉如故及領軍元叉執政擅權樹結親黨剛長子叉之妹夫乃引剛為侍中左衞將軍還領尚食典御以為枝援俄加車騎大將軍領左右復前削之封尋加儀同復領御史中尉剛啟軍旅稍興國用不足求以封邑俸粟賑給征人肅宗許之孝昌元年除領軍餘官如故初元叉之解領軍也靈太后以叉腹心尚多恐難卒制故權以剛代之示安其意尋出為散騎常侍冀州刺史將軍儀同三司剛行在道詔曰剛因緣時會恩隆自久擢於凡品越昇顯爵往以微勤賞同利建寵靈之極超絕夷等曾無犬馬識主之誠方懷梟鏡返噬之志與權臣元叉婚姻朋黨虧違典制長直禁中一出一入迭為姦防又與劉騰共為心膂間隔二宮逼脅內外且位居繩憲糾察是司宜立格言勢同鷹隼方嚴楚撻枉服貞良專任凶威以直為曲不忠不道深暴民聽附下罔上事彰幽顯莫大之罪難從宥原封爵之科理宜貶奪可征虜將軍餘悉削黜剛終于家永安中贈司徒公剛長子詳自奉朝請稍遷通直散騎侍郎冠軍將軍主衣都統剛以上谷先有侯氏於是始家焉正光中又請以詳為燕州刺史將軍如故欲為家世之基尋進後將軍五年拜司徒左長史領嘗藥典御燕州大中正興和中驃騎將軍殷州刺史還朝久而卒鄭儼字季然滎陽人容貌壯麗初為司徒胡國珍行參軍因緣為靈太后所幸時人未之知也遷員外散騎侍郎直後靈太后廢蕭寶夤西征以儼為開府屬孝昌初太后反政儼請使還朝復見寵待拜諫議大夫中書舍人領嘗食典御晝夜禁中寵愛尤甚儼每休沐太后常遣閹童隨侍儼見其妻唯得言家事而已與徐紇俱為舍人儼以紇有智數仗為謀主紇以儼寵幸既盛傾身承接共相表𩹉勢動內外城陽王徽微與之合當時政令歸於儼等遷通直郎散騎常侍平東將軍武衞將軍華林都將右衞將軍散騎常侍中軍將軍中書令車騎將軍舍人常侍如故肅宗崩事出倉卒天下咸言儼計也尒朱榮舉兵向洛以儼紇為辭榮逼京師儼走歸鄉里儼從兄仲明先為滎陽太守至是儼與仲明欲據郡起衆尋為其部下所殺與仲明俱傳首洛陽子文寬從出帝歿關西徐紇字武伯樂安博昌人也家世寒微紇少好學有名理頗以文詞見稱察孝廉對策上第高祖拔為主書世宗初除中書舍人諂附趙脩遷通直散騎侍郎及脩誅坐黨徙枹罕雖在徒役志氣不撓故事捉逃役流兵五人流者聽免紇以此得還久之復除中書舍人太傅清河王懌又以文翰待之及領軍元叉之害懌也出為雁門太守紇稱母老解郡還鄉至家未幾尋入洛飾貌事叉大得叉意及叉父繼西鎮潼關以紇為從事中郎尋以母憂歸鄉里靈太后反政以紇曾為懌所顧待復起為中書舍人紇又曲事鄭儼是以特被信任俄遷給事黃門侍郎仍領舍人總攝中書門下之事軍國詔命莫不由之時有急速令數友執筆或行或臥人別占之造次俱成不失事理雖無雅裁亦可通情時黃門侍郎太原王遵業琅雅王誦並稱文學亦不免為紇秉筆求其指授尋加鎮南將軍金紫光祿大夫黃門舍人如故紇機辯有智數當公斷決終日不以為勞長直禁中略無休息時復與沙門講論或分宵達曙而心力無怠道俗歎服之然性浮動慕權利外似謇正內實諂諛時豪勝己必相陵駕書生貧士矯意禮之其詭態若此有識鄙薄焉紇既處腹心參斷機密勢傾一時遠近填湊與鄭儼李神軌寵任相亞時稱徐鄭焉然無經國大體好行小數說靈太后以鐵券間尒朱榮左右榮知深以為憾啟求誅之榮將入洛既克河梁紇矯詔夜開殿門取驊騮御馬十匹東走兗州紇弟獻伯為北海太守獻伯弟季彥先為青州長史紇使人告之亦將家南走羊侃時為太山太守紇往投之說侃令舉兵侃從之遂聚兵反共紇圍兗州孝莊初遣侍中于暉為行臺與齊獻武王督諸軍討之紇慮不免說侃請乞師於蕭衍侃信之遂奔衍文筆駁論數十卷多有遺落時或存於世焉史臣曰闕
