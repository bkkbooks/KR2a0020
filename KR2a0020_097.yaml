body:
  text: 魏書卷九十一列傳術藝第七十九朝崇張淵殷紹王早耿玄劉靈助江式周淡李修徐謇王顯崔彧蔣少遊蓋小道必有可觀況往聖標曆數之術先王垂卜筮之典論察有法占候相傳觸類長之其流遂廣工藝紛綸理非抑止今列於篇亦所以廣聞見也朝崇字子業遼東襄平人也家世史官崇善天文術數知名於時為慕容垂太史郎從慕容寶敗於參合獲崇後乃赦之太祖愛其伎術甚見親待從平中原拜太史令詔崇造渾儀歷象日月星辰遷中書侍郎令如故天興五年月暈左角蝕將盡崇奏曰占為角蟲將死時太祖既克姚平於柴壁以崇言之徵遂命諸軍焚車而反牛果大疫輿駕所乘巨犗數百頭亦同日斃於路側自餘首尾相繼是歲天下之牛死者十七八麋鹿亦多死崇弟懿明辨而才不及崇也以善北人語內侍左右為黃門侍郎兄弟並顯懿好矜容儀被服僭度言音類太祖左右每聞其聲莫不驚竦太祖知而惡之後其家奴告崇與懿叛又與臣王次多潛通招引姚興太祖銜之及興寇平陽車駕擊破之太祖以奴言為實還次晉陽執崇兄弟並賜死崇兄子暉太祖時給事諸曹稍遷給事中賜爵長平侯征虜將軍濟州刺史假寧東將軍穎川公劉駿鎮東平郡徙戍近境暉上表求擊之高宗不許暉乃為書以大義責之卒子林襲爵林卒子清擊事在節義傳暉從弟繼太祖時稍遷中書侍郎給事中中堅將軍賜爵襄平子除魏郡太守卒子世宗襲爵卒子元和襲卒張淵不知何許人明占候曉內外星分自云嘗事苻堅堅欲南征司馬昌明淵勸不行堅不從果敗又仕姚興父子為靈臺令姚泓滅入赫連昌昌復以淵及徐辨對為太史令世祖平統萬淵與辨俱見獲世祖以淵為太史令數見訪問神二年世祖將討蠕蠕淵與徐辨皆謂不宜行與崔浩爭於世祖前語在浩傳淵專守常占而不能鈎深致遠故不及浩後為驃騎軍謀祭酒嘗著觀象賦曰易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下然則三極雖殊妙本同一顯昧雖遐契齊影響尋其應感之符測乎冥通之數天人之際可見明矣夫機象冥緬至理幽玄豈伊管智所能究暢然歌咏之來偶同風人目閲群宿能不歌吟是時也歲次析木之津日在翼星之分閶闔晨鼓而蕭瑟流火夕暵以摧頽遊氣眇其高搴辰宿煥焉華布覩時逝懷川上之感步秋林同宋生之戚歎巨艱之未終抱殷憂而不寐遂倣徨於窮谷之𩹉杖策陟神巖之側乃仰觀太虛縱目遠覽吟嘯之頃懍然增懷不覽至理拔自近情常韻發於宵夜不任咏歌之末遂援管而為賦其辭曰陟秀峰以遐眺望靈象於九霄陟升遐遠九霄九天也覩紫宮之環周嘉帝坐之獨標紫宮垣十五星在北斗北天皇大帝一星在紫宮中天帝位尊故言獨標也瞻華蓋之蔭藹何虛中之迢迢華蓋七星杠九星合十六星在大帝上迢迢高遠之貌觀閣道之穹隆想靈駕之電飄閣道六星在王良東北天帝之所乘躡靈駕之所由從電飄疾也爾乃縱目遠覽傍極四維北鑒機衡南覩太微四維四方之維機衡謂北斗星太微宮十星在翼軫北三台皎皎以雙列皇座冏冏以垂暉三台凡六星兩兩而居起文昌極太微皇座一星在太微星中皎皎冏冏皆星光明之貌也虎賁執鋭於前階常陳屯聚於後闈三台謂之太階虎賁一星在下台南故言前階常陳七星如畢狀在皇座北皆宿衛天帝前後備非常闈門宮中之門也遂回情旋首次目文昌文昌七星在北斗魁前別一宮之名皆相位次也仰見造父爰及王良造父五星在傳舍河中造父周穆王御死精上為星王良五星在奎北王良者晉大夫善御九方湮之子良一名郵無正為趙簡子御死精託於星為天帝之馭官傅説登天而乘尾奚仲託精於津陽傅説一星在尾後傅説殷時隱於巖中殷王武丁夢得賢人圖畫其象求而得之即立為相死精上為星乘尾在龍駟之間奚仲四星在天津北近河傍太古時造車輿者死而精上為星水北曰陽在河北故曰津陽也織女朗列於河湄牽牛煥然而舒光織女三星在紀星東端牽牛六星在河鼓南世人復以河鼓為牽牛五車亭柱於畢陰兩河俠井而相望五車三柱都十四星在畢東北在宿北故謂之陰兩河南河北河六星俠東井東西遙相對故曰相望也灼灼羣位落落幽紀設官分職罔不悉置灼灼落落皆星光明希疏之貌羣位謂天設三公九卿之官皇后嬪御之位分謂分其所司而各有所典罔無悉盡言無不盡備官職亦有之也儲二副天庭延三吏儲二謂太子一星在帝座北三吏三公星在太微宮中也論道納言各有攸司論道謂三公坐而論道納言謂尚書獻可替否將相次序以衛守九卿珠連而內侍太微宮十星皆有上將上相次將次相之位九卿三星在太微庭中行列似珠之相連而內侍天街分中外之境四七列九土之異天街二星昴畢間近月星陰陽之所分中國之境界天街以西屬外國旄頭氈褐引弓之民皆屬焉天街以東屬中國縉紳之士冠帶之倫皆屬焉四七二十八宿角亢鄭國兗州氐房心陳國豫州尾箕燕國幽州斗牛吳國揚州女虛危齊國青州營室東壁衛國并州奎婁魯國徐州胃昴畢趙國冀州觜參魏國益州井鬼秦國雍州柳星張周國洛陽三河翼軫楚國荊州天有十二次日月之所經歷地有十二州王侯之所國方土所出之物各有殊異不同者左則天紀槍棓攝提大角二咸防奢七公理獄天紀九星在貫索東天槍三星在北斗杓東天棓五星在女牀東北攝提六星俠大角大角一星在攝提間二咸東咸四星在房東北西咸四星在房西北此星主防奢淫諂佞之事七公七星在招搖東接近貫索貫索為天獄刑獄失中則七公評議理其寃枉庫樓炯炯以灼明騎官騰驤而奮足庫樓十星在大角南騎官二十七星在氐南騎官典乘故曰騰驤也天市建肆於房心帝座篼落而電燭天市二十四星在房心北帝座一星在天市中心於前則老人天社清廟所居老人一星在弧南常以春秋分候之天社六星亦在弧南清廟十四星在張南明堂配帝靈臺考符明堂三星在太微西南角外靈臺三星在明堂西丈人極陽而慌忽子孫嘒嘒於參嵎丈人二星在軍市西南星在南方故稱極陽慌忽謂星細小遠邈難見老子曰忽兮慌兮其中有象慌兮忽兮其中有物子二星在丈人東嘒小貌孫二星在子東詩云嘒彼小星三五在東此之謂乎天狗接狼以吠守野雞伺晨於參墟天狗七星在狼北野雞一星在參東南天市中街主警怖故曰吠守雞能候時故曰伺晨右則少微軒轅皇后之位嬪御相次尊卑有秩少微四星在太微西南北列白衣處士之位軒轅十七星在七星北有皇后嬪御之位尊卑相次皆秩序之也御宮典儀女史執筆御宮四星在鈎陳左傍此星主典司禮儀威容步趨之事女史一星在柱下史北女史記識晝夜昏明節漏省時在勾陳右傍內平秉禮以伺邪天牢禁愆而察失內平四星在中宮南有邪媚之事以禮正之天牢六星在北斗魁下有過失則懲其愆也於後則有車府傳舍匏瓜天津車府七星在天津東傳舍五星在華蓋上匏瓜五星在麗珠北天津九星在匏瓜北扶匡照曜麗珠珮珍扶匡七星在天津東麗珠五星在須女北麗桂衣珠珮珍后夫人之盛飾其星主皇后之服也人星麗玄以間逸哭泣連屬而趨墳人星五星在車府南麗附玄天言人星近於間逸易曰日月星辰麗於天石氏經曰人星優遊人乃安寧哭二星在虛南泣三星在哭東墳墓四星在危南哭泣星行列趣向墳墓故曰連屬河鼓震雷以鈛磕騰蛇蟠縈而輪菌河鼓十二星在南斗北此星昏中南方而震雷易曰鼓之以雷霆此之謂也此星主聲音故曰鈛磕騰蛇二十二星在營室北形狀似蛇故曰輪菌於是周章高眄還旋辰極辰極北極既覿鈎陳中禁復覩天帝休息鈎陳六星在紫宮中天皇大帝之所居諸宮別館及天牀星皆是休息寢臥而遊也漸臺可升離宮可即漸臺離宮皆天宮臺之名漸臺四星在織女東足下離宮六星與營室相連言天帝或升漸臺而觀或就離宮而遊即就也禮記曰即宮于宗周也酒旗建醇醪之旌女牀列窈窕之色酒旗三星在軒轅左角天設置酒官為飲燕之事故建牙旗為標女牀三星在紀星東北端奉侍天王之女侍衛天王必有關睢窈窕之美無妬忌之心乃可侍衛天王左右故言列窈窕之色也輦道屈曲以微煥附路立于雲閣之側輦道五星在織女西足屈曲而細小故言微煥也附路一星在閣道傍言天帝出入由閣道附路豫防敗傷故言立於雲閣之側其列星之表五車之間乃有咸池鴻沼玉井天淵建樹百果竹林在焉列宿之外謂之表咸池三星在天潢東鴻沼二十三星在須女北玉井四星在參左足下天淵十星在龜星東南建樹百果星在胃南竹林二十五星在園西南江河炳著於上穹素氣霏霏其帶天江天江星天江四星在尾北言天江星乃炳然著見於天上素氣者天河白氣素白霏霏然帶著於天也神龜曜甲於清泠龍魚摛光以映連神龜龜星也有五星在尾南龜知來事故稱神在河中故言清泠魚龍謂魚一星在尾後河中尾為龍宿故言龍魚此星在河中以魚星之映水有光曜也又有南門鼓吹器府之官奏彼絲竹為帝娛歡南門鼓吹二星在庫樓南翼西南器府三十二星在軫南器府典掌絲竹之事以娛樂天帝也熊羆綿絡於天際虎豹倏煜而暉爛虎豹熊羆四星在狼星傍弧精引弓以持滿狼星搖動於霄端狼一星在參東南弧九星在狼東南星傳云天下兵起則弧弓張天其外則有燕秦齊趙列國之名外謂列宿之外復有諸國之名齊一星在九坎東趙二星在齊北鄭一星在趙北越一星在鄭北周二星在越東秦二星在周東代二星在秦南晉一星在代南韓一星在晉西魏一星在韓北楚一星在韓西燕一星在楚南諸列國之名凡有十二星也雷電霹靂雨落雲征征行也雷電六星在營室南霹靂五星在上公西南雲雨四星在霹靂南陳車策駕於氐南天駟騁步於太清陳車三星在氐南房星一名天駟園苑周回以曲列倉廩區別而殊形天園十四星在苑南天苑十六星在昴畢南天倉六星在婁南天廩四星在昴南言形象殊別不同也內則尚書大理太一天一之宮尚書五星在紫微宮門內東南維大理二星在紫微宮中太一天一各一星相近在紫宮門南柱下著術傳示無窮柱下史一星在北極東六甲候大帝之所須內進御膳於皇躬六甲在華蓋下內廚二星在紫宮西南角外天船橫漢以普濟積水候災于其中天船九星在大陵北積水一星在天船中陰德播洪施以恤不足四輔翼皇極而闡玄風陰德二星在尚書西四輔四星俠北極播布洪大玄天也陰德之官必有陽報夫陰施陽報自然之常數貧窮困死生民之極艱以至困乏死遭陰德之終故窮者不希周恤而惠與自至施者無求於報而酬答自來斯乃冥中之理大象豈虛構其曜哉四輔星既翼佐北極之樞又能闡揚天帝之風教故言闡玄風也恢恢太虛寥寥帝庭恢恢寥寥皆廣大清虛之貌老子曰天網恢恢疏而不失帝謂太微宮也五座並設爰集神靈五座謂太微宮中五帝座也黃帝靈威仰位東方赤帝赤熛怒位南方白帝白招矩位西方黑帝汁光紀位北方黃帝含樞紐位中央五帝各異並集諸神之宮與之謀國事孝經援神契曰並設神靈集謀此之謂也乃命熒惑伺彼驕盈熒惑常以十月十一月入太微受制伺無道之國故曰伺彼驕盈也執法刺舉於南端五侯議疑於水衡太微南門謂之執法刺舉者刺姦惡舉有功五侯五星在東北東井為水衡辨疑獄五侯議而評之也金火時出以成緯七宿匡衛而為經金火熒惑太白也七宿謂一方七宿天文謂五星為緯二十八宿為經故舉金火七宿為言則五星二十八宿可知也言五星出入伏見有時不常出也暐曄昱其並曜粲若三春之榮言星辰布曜若春日之榮華也覩夫天官之羅布故作則於華京言天官羅布於上王者法效於下論語曰惟天為大惟堯則之也及其災異之興出無常所言災異出無常宿隨其善惡而處之假使鄭國有事則變見角亢也歸邪繽紛飛流電舉如星非星如雲非雲謂之歸邪夾以微氣故稱繽紛飛飛星也流流星也飛星與流星各異飛星焱去而迹絶流星迹存而不滅電舉者似焱電長妖星起則殃及晉平蛇乘龍則禍連周楚春秋魯襄公十年春正月戊子妖星出於婺女見於申維婺女屬齊申為晉分梓慎見妖星出知晉侯以戊子日死蛇乘龍謂襄公二十八年歲星次天津於玄枵十五度在虛下歲星主木位在東體合房心故名龍虛在坎坎子位次玄枵龜蛇之類歲星失次行虛之外出其下故曰蛇乘龍龍位壽星宋鄭之分梓慎見蛇乘龍知飢在宋鄭然裨竈以為周王及楚子皆死二人推變不同所見各異梓慎裨竈古之良史也或取證於逢公或推變於衝午逢公齊邑薑之先言逢公死時亦有此星見梓慎推星以此方之知晉平公將死衝午謂虛宿對午午為張翼張翼周楚之分裨竈占知周王楚子死故言推變於衝午乃有欽明光被填逆水府昔堯遭洪水填星逆行入水府書曰欽明文思光被萬邦洪波滔天功隆大禹言洪水既出堯命治之而功不成乃復命禹治而平之禹有濟世之難治水之功書曰洪水滔天又曰禹錫玄圭告厥成功此則冥數之大運非治綱之失緒言先遭洪水致填星逆行之異非不德所致此乃運數應爾也蓋象外之妙不可以粗理尋重玄之內難以熒燎覩言玄理微妙不可知見也至於精靈所感迅踰駭嚮荊軻慕丹則白虹貫日而不徹昔荊軻燕太子丹之義入秦為刺客雖至精感上而事竟不捷衛生畫策則太白食昴而摛朗昔衛先生為秦畫策於長平昭王疑而不信太白有食昴之變魯陽指麾而曜靈為之回駕魯陽古之賢人以手麾日能再回也嚴陵來遊而客氣著於乾象昔光武為白衣時與嚴陵相厚善及登帝位陵來入見太史奏曰客星犯帝座光武詔曰乃嚴子陵非客斯皆至感動於神祇誠應效於既往爾乃四氣鱗次斗建辰移雖無聲言三光是知言四時代謝不常每月斗移建一辰天無聲言語止以星辰見變譴以示人也星中定於昏明影度以之不差測水旱於未然占方來之安危孟春正月昏參中旦尾中仲春之月昏弧中旦建星中季春之月昏七星中旦牽牛中孟夏之月昏翼中旦婺女中仲夏之月昏亢中旦危中季夏之月昏心中旦奎中孟秋之月昏建星中旦畢中仲秋之月昏牽牛中旦觜觿中季秋之月昏虛中旦柳中孟冬之月昏危中旦七星中仲冬之月昏東壁中旦軫中季冬之月昏婁中旦氐中冬至之日建八尺之標影長一丈三尺五寸也夏至之日影長一尺六寸也影長為水影短為旱也陰精乘箕則大飊暮鼓西南入畢則淫雨滂陰精月也東北失道入箕則多風移而西南失道入畢則多雨雨三日為淫雨詩云月麗于畢俾滂矣書曰星有好風星有好雨此之謂也譬猶晉鍾之應銅山風雲之從班螭言雲從龍風從虎同氣相求同類相應蜀山崩而晉鍾鳴也若夫冥車潛駕時乘六虬大儀回運萬象俱流六虬六龍易曰時乘六龍以御天此皆是天回運轉北斗俄其西傾羣星忽以匿幽幽暗也望舒縱轡以騁度靈輪浹旦而過周望舒月也月日行十三度十九分度之七周天凡三百六十五度四分度之一天一日一夜運轉過周一度浹匝也至旦曉而過匝故曰浹旦而過周也爾乃凝神遠矚曬目八荒察之無象視之眇茫狀若渾元之未判別又似浮海而覩滄浪幽遐迥以希夷寸眸焉能究其傍凝神精不動也言極遠傍視茫然若造化之始元氣未分似浮海遠望而不見其邊論語曰乘桴浮於海老子曰聽之不聞其聲名曰希視之不見其形名曰夷於是乎夜對山水栖心高鏡遠尋終古攸然獨詠美景星之繼晝大唐堯之德盛瑞應圖曰景星大如半月生於晦朔助月光明當堯之時有此星見故美堯之德能致之也嘉黃星之靡鋒明虞舜之不競昔舜將受禪於堯先有星見圓而無鋒芒言舜當用土德王天下星見而無芒角者示揖讓而受不以兵事爭競也疇呂尚之宵夢善登輔而翼聖昔太公未遇文王時釣魚於磻溪夜夢得北斗輔星神告尚以伐紂之意事見尚書中候篇也欽管仲之察微見虛危而知命昔管仲與鮑叔牙商賈於南陽見三星聚虛危之分知齊將有霸主遂共戮力來投齊地也歎熒惑之舍心高宋景之守政當春秋時熒惑守心景公不從史韋之言熒惑退舍而延二十年壯漢祖之入秦奇五緯之聚映昔漢祖入秦五星聚於東井秦之分爾乃歷象既周相佯巖際相佯倘佯也尚書曰歷象日月星辰尋圖籍之所記著星變乎書契覽前代之將淪咸譴告於昏世言先代之君將淪亡天必告災異之徵也桀斬諫以星孛紂鴆荒而致彗夫景星見則太平應彗孛作而禍亂興天之常也昔夏桀無道斬關龍逢而極惡孛星見湯伐之放於鳴條之野殷紂設炮烙之形彗星出武王懸之白旗也不見以周衰枉蛇行而秦滅昔魯莊公十年夏四月星不見自是以後周室衰微枉矢出蛇行而無尾自昔項羽入關有此變見漢書諒人事之有由豈妖災之虛設言天以冥應玄象為變要由人事豈妖災而已誠庸主之難悛故明君之所察言庸君暗主玄象譴告不能改行自新以答天變賢君明主則不然見天災異懼而修德也堯無為猶觀象而況德非乎先哲夫唐堯至治猶歷象璇璣窺七政況德不及古而不觀之乎先是太祖太宗時太史令王亮蘇坦世祖後破和龍得馮文通太史令閔盛高祖時太史令趙樊生並知天文後太史趙勝趙翼趙洪慶胡世榮胡法通等二族世業天官者又有容城令徐路善占候世宗時坐事繫冀州獄別駕崔隆宗就禁慰問路曰昨夜驛馬星流計赦即時應至隆宗先信之遂遣人試出城候焉俄而赦至時人重之永安中詔以州民高崇祖善天文每占吉凶有驗特除中散大夫永熙中詔通直散騎常侍孫僧化與太史令胡世榮張龍趙洪慶及中書舍人孫子良等在門下外省校比天文書集甘石二家星經及漢魏以來二十三家經占集為五十五卷後集諸家撮要前後所上雜占以類相從日月五星二十八宿中外官圖合為七十五卷僧化者東莞人識星分案天占以言災異時有所中普泰中爾朱世隆惡其多言遂繫於廷尉免官永熙中出帝召僧化與中散大夫孫安都共撰兵法未就而帝入關遂罷元象中死於晉陽時有河間信都芳字王琳好學善天文算數甚為安豐王延明所知延明家有羣書欲抄集五經算事為五經宗及古今樂事為樂書又聚渾天欹器地動銅烏漏刻候風諸巧事并圖畫為器準並令芳算之會延明南奔芳乃自撰注後隱於并州樂平之東山太守慕容保樂聞而召之芳不得已而見焉於是保樂弟紹宗薦之於齊獻武王以為中外府田曹參軍芳性清儉質朴不與物和紹宗給其騾馬不肯乘騎夜遣婢侍以試之芳忿呼毆擊不聽近己狷介自守無求於物後亦注重差勾股復撰史宗仍自注之合數十卷武定中卒殷紹長樂人也少聰敏好陰陽術數遊學諸方達九章七曜世祖時為算生博士給事東宮西曹以藝術為恭宗所知太安四年夏上四序堪輿表曰臣以姚氏之世行學伊川時遇遊遁大儒成公興從求九章要術興字廣明自云膠東人也山居隱迹希在人間興時將臣南到陽翟九崖巖沙門釋曇影間興即北還臣獨留住依止影所求請九章影復將臣向長廣東山見道人法穆法穆時共影為臣開述九章數家雜要披釋章次意況大旨又演隱審五藏六府心髓血脈商功大算端部變化玄象土圭周髀練精鋭思蘊習四年從穆所聞粗皆髣佛穆等仁矜特垂憂閔復以先師和公所注黃帝四序經文三十六卷合有三百二十四章專説天地陰陽之本其第一孟序九卷八十一章説陰陽配合之原第二仲序九卷八十一章解四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交會相生為表𩹉第四季序九卷八十一章具釋六甲刑禍福德以此等文傳授於臣山神禁嚴不得齎出尋究經年粗舉綱要山居險難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火月呂林鍾景氣鬱盛感物懷歸奉辭影等自爾至今四十五載歷觀時俗堪輿八會徑世已久傳寫謬誤吉凶禁忌不能備悉或考良日而值惡會舉吉用凶多逢殃咎又史遷郝振中古大儒亦各撰注流行於世配會大小序述陰陽依如本經猶有所闕臣前在東宮以狀奏聞奉被景穆皇帝聖詔敕臣撰録集其要最仰奉明旨謹審先所見四序經文抄撮要略當世所須吉凶舉動集成一卷上至天子下及庶人又貴賤階級尊卑差別吉凶所用罔不畢備未及內呈先帝晏駕臣時狼狽幾至不測停廢以來徑由八載思欲上聞莫能自徹加年夕齒頽餘齡旦暮每懼殂殞填仆溝壑先帝遺志不得宣行夙夜悲憤理難違匿依先撰録奏謹以上聞請付中祕通儒達士定其得失事若可施乞即班用其四序堪輿遂大行於世王早勃海南皮人也明陰陽九宮及兵法尤善風角太宗時喪亂之後多相殺害有人詣早求問勝術早為設法令各無咎由是州里稱之時有東莞鄭氏因為同縣趙氏所殺其後鄭氏執得讎人趙氏又剋明晨會宗族當就墓所刑之趙氏求救於早早為占候并授以一符曰君今且還選壯士七人令一人為主者佩此符於雞鳴時伏在仇家宅東南二里許平旦當有十人相隨向西北行中有二人乘黑牛一黑牛最在前一黑牛應第七但捉取第七者將還事必無他趙氏從之果如其言乃是鄭氏五男父也諸子並為其族所宗敬故和解二家趙氏竟免後早與客清晨立於門內遇有卒風振樹早語客曰依法當有千里外急使日中將有兩匹馬一白一赤從西南來至即取我逼我不聽與妻子別語訖便入召家人鄰里辭別語訖浴帶書囊日中出門候使如期果有二馬一白一赤從涼州而至即捉早上馬遂詣行宮時世祖圍涼州未拔故許彥薦之早彥師也及至詔問何時當得此城早對曰陛下但移據西北角三日內必克世祖從之如期而克輿駕還都時久不雨世祖問早曰何時當雨早曰今日申時必大雨比至未時猶無片雲世祖召早詰之早曰願更少時至申時雲氣四合遂大雨滂世祖甚善之而早苦以疾辭乞歸鄉里詔許之遂終於家或言許彥以其術勝恐終妨己故譎令歸耳耿玄巨鹿宋子人也善卜占坐於室內有客扣門玄已知其姓字并所齎持及來問之意其所卜筮十中八九別有林占世或傳之而性不和俗時有王公欲求其筮者玄則拒而不許每云今既貴矣更何所求而復卜也欲望意外乎代京法禁嚴切王公聞之莫不驚悚而退故玄多見憎忿不為貴勝所親官至巨鹿太守顯祖高祖時有勃海高道埏清河趙法逞並有名於世世宗肅宗時奉車都尉清河魏道虔奉車都尉周恃魏郡太守章武高月光月光弟明月任玄智雍州人潘捺並長於陰陽卜筮故玄於日者之中最為優洽冠軍將軍濮陽賈元紹章武呂肫濟北馮道安河內馮懷海東郡李文殊並工於法術而道虔月光文殊為優其餘不及浮陽孟剛饒安王領郡善銓録風角章武顏惡頭善卜筮亦用耿玄林占當時最知名范陽人劉辨亦有名於世劉靈助燕郡人師事劉辨好陰陽占卜而粗疏無賴常去來燕之界或時負販或復劫盜賣術於巿後自代至秀容因事爾朱榮榮性信卜筮靈助所占屢中遂被親待為榮府功曹參軍建義初榮於河陰王公卿士悉見屠害時奉車都尉盧道虔兄弟亦相率朝於行宮靈助以其州里衛護之由是朝士與諸盧相隨免害者數十人榮入京師超拜光祿大夫封長子縣開國伯食邑七百戶尋進爵為公增邑通前千戶後從榮討擒葛榮特除散騎常侍撫軍將軍幽州刺史又從大將軍上黨王天穆討邢杲時幽州流民盧城人最為凶捍遂令靈助兼尚書軍前慰勞之事平而元皓入洛天穆渡河靈助先會爾朱榮於太行及將攻河內令靈助筮之靈助曰未時必克時已向中士衆疲怠靈助曰時至矣榮鼓之將士騰躍即便克陷及至北中榮攻城不獲以時盛暑議欲且還以待秋涼莊帝詔靈助筮之靈助曰必當破賊詔曰何日靈助曰十八十九間果如其言車駕還宮領幽州大中正尋加征東將軍增邑五百戶進爵為燕郡公詔贈其父僧安為幽州刺史尋兼尚書左僕射慰勞幽州流民於濮陽頓丘因率民北還與都督侯淵等討葛榮餘黨韓婁滅之於薊仍釐州務加車騎將軍又為幽平營安四州行臺及爾朱榮死莊帝幽崩靈助本寒微一朝至此自謂方術堪能動衆又以爾朱有誅滅之兆靈助遂自號燕王車騎大將軍開府儀同三司大行臺為莊帝舉義兵靈助馴養大鳥稱為己瑞妄説圖讖言劉氏當王又云欲知避世入鳥村遂刻氈為人象畫桃木為符書作詭道厭祝之法民多信之於時河西人紇豆陵步藩舉兵逼晉陽爾朱兆頻戰不利故靈助唱言爾朱自然當滅不須我兵由是幽瀛滄冀之民悉從之從之者夜悉舉火為號不舉火者諸村共屠之以普泰元年三月率衆至博陵之安國城與叱列延慶侯淵爾朱羽生等戰戰敗被擒斬於定州傳首洛陽支分其體初靈助每云三月末我必入定州爾朱亦必滅及將戰靈助自筮之卦成不吉以手折蓍棄之於地云此何知也尋見擒果以三月入定州而齊獻武王以明年閏二月破四胡於韓陵山遂滅兆等永熙二年贈使持節散騎常侍都督幽瀛冀三州諸軍事驃騎大將軍尚書左僕射開府儀同三司幽州刺史諡曰恭子宗輝襲興和中開府屬齊受禪例降江式字法安陳留濟陽人六世祖瓊字孟琚晉馮翊太守善蟲篆詁訓永嘉大亂瓊棄官西投張軌子孫因居涼土世傳家業祖強字文威太延五年涼州平內徙代京上書三十餘法各有體例又獻經史諸子千餘卷由是擢拜中書博士卒贈敦煌太守父紹興高允奏為祕書郎掌國史二十餘年以謹厚稱卒於趙郡太守式少專家學數年之中常夢兩人時相教授乃寤每有記識初拜司徒長兼行參軍檢校御史尋除殄寇將軍符節令以書文昭太后尊號諡册特除奉朝請仍符節令式篆體尤工洛京宮殿諸門板題皆式書也延昌三年三月式上表曰臣聞庖羲氏作而八卦列其畫軒轅氏興而龜策彰其彩古史倉頡覽二象之爻觀鳥獸之迹別創文字以代結繩用書契以維事宣之王庭則百工以載之方册則萬品以明迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八歲入小學保氏教國子以六書一曰指事二曰象形三曰諧聲四曰會意五曰轉注六曰假借蓋是史頡之遺法也及宣王太史史籀著大篆十五篇與古文或同或異時人即謂之書至孔子定六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖別暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙高作爰歷篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附於小篆所作也以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復教以書又習八體試之課最以為尚書史吏民上書省字不正輒舉劾焉又有草書莫知誰始考其書形雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者獨張敞從之受涼州刺史杜鄴沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人説文字於未央宮中以禮為小學元士黃門侍郎揚雄採以作訓纂篇及亡新居攝自以應運制作使大司空甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰奇字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以幡信也壁中書者魯恭王壞孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好奇歎儒俗之穿鑿惋文毀於譽痛字敗於訾更詭任情變亂於世故撰説文解字十五篇首一終亥各有部屬包括六藝羣書之詁評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物奇怪珍異王制禮儀世間人事莫不畢載可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎將陳留蔡雍採李斯曹喜之法為古今雜形詔於太學立石碑刊載五經題書楷法多是雍書也後開鴻都書畫奇能莫不雲集于時諸方獻篆無出雍者魏初博士清河張揖著埤倉廣雅古今字詁究諸埤廣綴拾遺漏增長事類抑亦於文為益者然其字詁方之許慎篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博古開藝特善倉雅許氏字指八體六書精究間理有名於揖以書教諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣校之説文篆隸大同而古字少異又有京兆韋誕河東衛覬二家並號能篆當時臺觀榜題寶器之銘悉是誕書咸傳之子孫世稱其妙晉世義陽王典祠令任城呂忱表上字林六卷尋其況趣附託許慎説文而案偶章句隱別古奇惑之字文得正隸不差篆意也忱弟靜別放故左校令李登聲類之法作韻集五卷宮商角徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯隸體失真俗學鄙習復加虛巧談辨之士又以意説炫惑於時難以釐改故傳曰以衆非非行正信哉得之於斯情矣乃曰追來為歸巧言為辨小兔為王火王神蟲為蠶如斯甚衆皆不合孔氏古書史大篆許氏説文石經三字也凡所關古莫不惆悵焉嗟夫文字者六藝之宗王教之始前人所以垂今今人所以識古故曰本立而道生孔子曰必也正名乎又曰述而不作書曰豫欲觀古人之象皆言遵修舊史而不敢穿鑿也臣六世祖瓊家世陳留往晉之初與從父兄應元俱受學於衛覬古篆之法倉雅方言説文之誼當時並收善譽而祖官至太子洗馬出為馮翊郡值洛陽之亂避地河西數世傳習斯業所以不墜也世祖太延中皇威西被牧犍內附臣亡祖文威杖策歸國奉獻五世傳掌之書古篆八體之法時蒙褒録列於儒林官班文省家號世業暨臣暗短識學庸薄漸漬家風有忝無顯但逢時來恩出願外每承澤雲津厠霑漏潤驅馳文閣參預史官題篆宮禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎説文為主爰採孔氏尚書五經音注篇爾雅三倉凡將方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次類編聯文無復重糾為一部其古奇惑俗隸諸體咸使班於篆下各有區別詁訓假借之誼僉隨文而解音讀楚夏之聲並逐字而注其所不知者則闕如也脫蒙遂許冀省百氏之觀而同文字之域典書祕書所須之書乞垂敕給并學士五人嘗習文字者助臣披覽書生五人專令抄寫侍中黃門國子祭酒一月一監評議疑隱庶無紕繆所撰名目伏聽明旨詔曰可如所請并就太常冀兼教八書史也其有所須依請給之名目待書成重聞式於是撰集字書號曰古今文字凡四十卷大體依許氏説文為本上篆下隸又除宣威將軍符璽郎尋加輕車將軍正光中除驍騎將軍兼著作佐郎正史中字四年卒贈右將軍巴州刺史其書竟未能成式兄子征虜將軍順和亦工篆書先是太和中兗州人沈法會能隸書世宗之在東宮敕法會侍書已後隸迹見知於閭里者甚衆未有如崔浩之妙周淡京兆鄠人也為人多方術尤善醫藥為太醫令太宗嘗苦風頭眩淡治得愈由此見寵位至特進賜爵成德侯神瑞二年京師飢朝議將遷都於鄴淡與博士祭酒崔浩進計論不可之意太宗大然之曰唯此二人與朕意同也詔賜淡浩妾各一人御衣一襲絹五十匹綿五十斤泰常四年卒諡曰恭時有河南人陰貞家世為醫與淡並受封爵清河李潭亦以善針見知子驢駒襲傳術延興中位至散令李修字思祖本陽平館陶人父亮少學醫術未能精究世祖時奔劉義隆於彭城又就沙門僧坦研習衆方略盡其術針灸授藥莫不有效徐兗之間多所救恤四方疾苦不遠千里竟往從之亮大為廳事以舍病人停車輿於下時有死者則就而棺殯親往弔視其仁厚若此纍遷府參軍督護本郡士門宿官咸相交昵車馬金帛酬賚無資修兄元孫隨畢衆敬赴平城亦遵父業而不及以功賜爵義平子拜奉朝請修略與兄同晚入代京歷位中散令以功賜爵下蔡子遷給事中太和中常在禁內高祖文明太后時有不豫修侍針藥治多有效賞賜纍加車服第宅號為鮮麗集諸學士及工書者百餘人在東宮撰諸藥方百餘卷皆行於世先是咸陽公高允雖年且百歲而氣力尚康高祖文明太后時令修診視之一旦奏言允脈竭氣微大命無遠未幾果亡遷洛為前軍將軍領太醫令後數年卒贈威遠將軍青州刺史子天授襲汶陽令醫術又不逮父徐謇字成伯丹陽人家本東莞與兄文伯等皆善醫藥謇因至青州慕容白曜平東陽獲之表送京師顯祖欲驗其所能乃置諸病人於幕中使謇隔而脈之深得病形兼知色候遂被寵遇為中散稍遷內侍長文明太后時問治方而不及李修之見任用也謇合和藥劑攻救之驗精妙於修而性甚祕忌承奉不得其意者雖貴為王公不為措療也高祖後知其能及遷洛稍加眷幸體小不平及所寵馮昭儀有疾皆令處治又除中散大夫轉右軍將軍侍御師謇欲為高祖合金丹致延年之法乃入居嵩高採營其物歷歲無所成遂罷二十二年高祖幸懸瓠其疾大漸乃馳驛召謇令水路赴行所一日一夜行數百里至診省下治果有大驗高祖體少瘳內外稱慶九月車駕發豫州次于汝濱乃大為謇設太官珍膳因集百官特坐謇于上席遍陳肴觴于前命左右宣謇救攝危篤振濟之功宜加酬賚乃下詔曰夫神出無方形稟有礙憂喜乖適理必傷生朕覽萬機長鍾革運思芒芒而無怠身忽忽以興勞仲秋動痾心容頓竭氣體羸瘠玉几在慮侍御師右軍將軍徐成伯馳輪太室進療汝蕃方窮丹英藥盡芝石誠術兩輸忠妙俱至乃令沉勞勝愈篤瘵克痊論勤語效實宜褒録昔晉武暴疾程和應增封辛疚數朝錢爵大墜況疾深於曩辰業難於疇日得不重加陟賞乎宜順羣望錫以山河且其舊徑高秩中暫解退比雖銓用猶未囗囗準舊量今事合顯進可鴻臚卿金鄉縣開國伯食邑五百戶賜錢一萬貫又詔曰錢府未充須以雜物絹二千匹雜物一百匹四十匹出御府穀二千斛奴婢十口馬十匹一匹出驊騮牛十頭所賜雜物奴婢牛馬皆經內呈諸親王咸陽王禧等各有別賚並至千匹從行至鄴高祖猶自發動謇日夕左右明年從詣馬圈高祖疾勢遂甚戚戚不怡每加切誚又欲加之鞭捶幸而獲免高祖崩謇隨梓宮還洛謇常有藥餌及吞服道符年垂八十鬢髮不白力未多衰正始元年以老為光祿大夫加平北將軍卒延昌初贈安東將軍齊州刺史諡曰靖子踐字景升小名靈寶襲爵歷官兗州平東府長史右中郎將建興太守踐弟知遠給事中成伯孫之才孝昌初為蕭衍豫章王蕭綜北府主簿從綜鎮彭城綜降其下僚屬並奔散之才因入國武定中大將軍金紫光祿大夫昌安縣開國侯王顯字世榮陽平樂平人自言本東海郯人王朗之後也祖父延和中南奔居于魯郊又居彭城伯父安上劉義隆時板行館陶縣世祖南討安上棄縣歸命與父母俱徙平城例陽都子除廣寧太守顯父安道少與李亮同師俱學醫藥粗究其術而不及亮也安上還家樂平頗參士流顯少歷本州從事雖以醫術自通而明敏有決斷才用初文昭皇太后之懷世宗也夢為日所逐化而為龍而繞后后寤而驚悸遂成心疾文明太后敕召徐謇及顯等為后診脈謇云是微風入藏宜進湯加針顯云案三部脈非有心疾將是懷孕生男之象果如顯言久之召補侍御師尚書儀曹郎稱幹事世宗自幼有微疾久未差愈顯攝療有效因是稍蒙眄識又罷六輔之初顯為領軍于烈間通規策頗有密功纍遷遊擊將軍拜廷尉少卿仍在侍御營進御藥出入禁內乞臨本州世宗曾許之積年未授因是聲問傳于遠近顯每語人言時旨已決必為刺史遂除平北將軍相州刺史尋詔馳驛還京復掌藥又遣還州元愈作逆顯討之不利入除太府卿御史中尉顯前後歷職所在著稱糾折庶獄究其姦回出內惜慎憂國如家及領憲臺多所彈劾百僚肅然又以中尉屬官不悉稱職諷求更換詔委改選務盡才能而顯所舉或有請屬未皆得人於是衆口喧譁聲望致損後世宗詔顯撰藥方三十五卷班布天下以療諸疾東宮既建以為太子詹事委任甚厚世宗每幸東宮顯常迎侍出入禁中仍奉醫藥賞賜纍加為立館宇寵振當時延昌二年秋以營療之功封衛南伯四年正月世宗夜崩肅宗踐祚顯參奉璽策隨從臨哭微為憂懼顯既蒙任遇兼為法官恃勢使威為時所疾朝宰託以侍療無效執之禁中詔削爵位臨執呼寃直閣以刀鐶撞其腋下傷中吐血至右衛府一宿死始顯布衣為諸生有沙門相顯後當富貴誡其勿為吏官吏官必敗由是世宗時或欲令其遂攝吏部每殷勤避之及世宗崩肅宗夜即位受璽册於儀須兼太尉及吏部倉卒百官不具以顯兼吏部行事矣崔彧字文若清河東武城人父勳之字寧國位大司馬外兵郎贈通直郎彧與兄相如俱自南入國相如以才學知名早卒彧少嘗詣青州逢隱逸沙門教以素問九卷及甲乙遂善醫術中山王英子略曾病王顯等不能療彧針之抽針即愈後位冀州別駕纍遷寧遠將軍性仁恕見疾苦好與治之廣教門生令多救療其弟子清河趙約勃海郝文法之徒咸亦有名彧子景哲豪率亦以醫術知名為太中大夫司徒長史蔣少遊樂安博昌人也慕容白曜之平東陽見俘入於平城充平齊戶後配雲中為兵性機巧頗能畫刻有文思吟咏之際時有短篇遂留寄平城以傭寫書為業而名猶在鎮後被召為中書寫書生與高聰俱依高允允愛其文用遂並薦之與聰俱補中書博士自在中書庇李沖兄弟子姪之門始北方不悉青州蔣族或謂少遊本非人士又少遊微因工藝自達是以公私人望不至相重唯高允李沖曲為體練由少遊舅氏崔光與李沖從叔衍對門婚姻也高祖文明太后常因密宴謂百官曰本謂少遊作師耳高允老公乃言其人士眷識如此然猶驟被引命屑屑禁闥以規矩刻繢為務因此大蒙恩錫超等備位而亦不遷陟也及詔尚書李沖與馮誕遊明根高閭等議定衣冠於禁中少遊巧思令主其事亦訪於劉昶二意相乖時致諍競積六載乃成始班賜百官冠服之成少遊有效焉後於平城將營太廟太極殿遣少遊乘傳詣洛量準魏晉基趾後為散騎侍郎副李彪使江南高祖修船乘以其多有思力除都水使者遷前將軍兼將作大匠仍領水池湖泛戲舟楫之具及華林殿沼修舊增新改作金墉門樓皆所措意號為妍美雖有文藻而不得伸其才用以剞劂繩尺碎劇匆匆徙倚園湖城殿之側識者為之歎慨而乃坦爾為己任不告疲又兼太常少卿都水如故景明二年卒贈龍驤將軍青州刺史諡曰質有文集十卷餘少遊又為太極立模範與董爾王遇等參建之皆未成而卒初高宗時郭善明甚機巧北京宮殿多其製作高祖時青州刺史侯文和亦以巧聞為要舟水中立射滑稽多智辭説無端尤善淺俗委巷之語至可玩笑位樂陵濟南二郡太守世宗肅宗時豫州人柳儉殿中將軍關文備郭安興並機巧洛中製永寧寺九層佛圖安興為匠也高祖時有范寧兒者善圍曾與李彪使蕭賾賾令江南上品王抗與寧兒制勝而還又有浮陽高光宗善樗蒲趙國李幼序洛陽丘何奴並工握槊此蓋胡戲近入中國云胡王有弟一人遇罪將殺之弟從獄中為此戲以上之意言孤則易死也世宗以後大盛於時史臣曰陰陽卜祝之事聖哲之教存焉雖不可以專亦不可得而廢也徇於是者不能無非厚於利者必有其害詩書禮樂所失也鮮故先王重其德方術伎巧所失也深故往哲輕其藝夫能通方術而不詭於俗習伎巧而必蹈於禮者幾于大雅君子故昔之通賢所以戒乎妄作朝崇張淵王早殷紹耿玄劉靈助皆術藝之士也觀其占候卜筮推步盈虛通幽洞微近知鬼神之情狀周淡李修徐謇王顯崔彧方藥特妙各一時之美也蔣少遊以剞劂見知沒其學思藝成為下其近是乎
