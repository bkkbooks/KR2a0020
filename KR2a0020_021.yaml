body:
  text: 魏書卷十九上景穆十二王列傳第七上陽平王京兆王濟陰王汝陰王樂浪王廣平王景穆皇帝十四男恭皇后生文成皇帝袁椒房生陽平幽王新成尉椒房生京兆康王子推濟陰王小新成陽椒房生汝陰靈王天賜樂良厲王萬壽廣平殤王洛侯母並闕孟椒房生任城康王雲劉椒房生南安惠王楨城陽康王長壽慕容椒房生章武敬王太洛尉椒房生樂陵康王胡兒孟椒房生安定靖王休趙王深早薨無傳母闕魏舊太子後庭未有位號高宗即位恭宗宮人有子者並號為椒房陽平王新成太安三年封拜征西大將軍後為內都大官薨諡曰幽長子安壽襲爵高祖賜名頤纍遷懷朔鎮大將都督三道諸軍事北討詔徵赴京勗以戰伐之事對曰當仰仗廟算使呼韓同渭橋之禮帝嘆曰壯哉王言朕所望也未發遭母憂詔遣侍臣以金革敦喻既殯而發與陸睿集三道諸將議軍途所詣於是中道出黑山東道趨士盧河西道向侯延河軍過大磧大破蠕蠕頤入朝詔曰王之前言果不虛也後除朔州刺史及州刺史穆泰謀反遣使推頤為主頤密以狀聞泰等伏誅帝甚嘉之世宗景明元年薨於青州刺史諡曰莊王傳國至孫宗胤肅宗時坐殺叔父賜死爵除頤弟衍字安樂賜爵廣陵侯位梁州刺史表請假王以崇威重詔曰可謂無厭求也所請不合轉徐州刺史至州病重帝敕徐成伯乘傳療疾差成伯還帝曰卿定名醫賚絹三千匹成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千匹乎其為帝所重如此後所生母雷氏卒表請解州詔曰先君餘尊之所厭禮之明文季末陵遲斯典或廢侯既親王之子宜從餘尊之義便可大功後卒於雍州刺史諡曰康侯衍性清慎所在廉潔又不營産業歷牧四州皆有稱績亡日無斂尸具子暢暢弟融字叔融貌甚短陋驍武過人莊帝謀殺爾朱榮以融為直閣將軍及爾朱兆入洛融逃人間衍弟欽字思若位中書監尚書右僕射儀同三司欽色尤黑故時人號為黑面僕射欽淫從兄麗妻崔氏為御史中尉封回劾奏遇赦免尋除司州牧欽少好學早有令譽時人語曰皇宗略略壽安思若及晚年貴重不能有所匡益識者輕之欽曾託青州人高僧壽為子求師師至未幾逃去欽以讓僧壽僧壽性滑稽反謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去食就信實有所闕欽乃大慚於是待客稍厚後除司空公封巨平縣公於河陰遇害贈假黃鉞太師太尉公子子孝字季業早有令譽年八歲司徒崔光見而異之曰後生領袖必此人也京兆王子推太安五年封位侍中征南大將軍長安鎮都大將子推性沉雅善於綏接秦雍之人服其威惠入為中都大官察獄有稱顯祖將禪位於子推以大臣固諫乃傳高祖高祖即位拜侍中本將軍開府儀同三司青州刺史未至道薨子太興襲拜長安鎮都大將以黷貨削除官爵後除祕書監還復前爵拜統萬鎮將改封西河後改鎮為夏州仍以太興為刺史除守衛尉卿初太興遇患請諸沙門行道所有資財一時布施乞求病愈名曰散生齊及齊後僧皆四散有一沙門方云乞齊餘食太興戲之曰齊食既盡唯有酒肉沙門曰亦能食之因出酒一斗羊腳一隻食盡猶言不飽及辭出後酒肉俱在出門追之無所見太興遂佛前乞願向者之師當非俗人若此病得差即捨王爵入道未幾便愈遂請為沙門表十餘上乃見許時高祖南討在軍詔皇太子於四月八日為之下髮施帛二千匹既為沙門更名僧懿居嵩山太和二十二年終子昴字伯暉襲薨子悰字魏慶襲孝靜時纍遷太尉録尚書事司州牧青州刺史薨於州贈假黃鉞太傅司徒公諡曰文悰寬和有度量美容貌風望儼然得喪之間不見於色性清儉不營産業身死之日家無餘財昴弟仲景性嚴峭莊帝時兼御史中尉京師肅然每向臺駕赤牛時人號赤牛中尉太昌初為河南尹奉法無私時吏部尚書樊子鵠部下縱橫又為盜竊仲景密加收捕悉獲之咸即行決於是豪貴寒心出帝將西行授仲景中軍大都督留京師齊獻武王欲至洛陽仲景遂棄妻子而遁仲景弟暹字叔照莊帝初除南兗州刺史在州猛暴多所殺害元皓入洛暹據州不屈莊帝還宮封汝陽王遷秦州刺史先時秦州城人屢為反覆暹盡誅之存者十一二普泰元年除涼州刺史貪暴無極欲規府人及商胡富人財物詐一臺符誑諸豪等云欲加賞一時屠戮所有資財生口悉沒自入孝靜時位侍中録尚書事薨贈太師録尚書子沖襲無子國絶太興弟遙字太原有器望以左衛將軍從高祖南征賜爵饒陽男世宗初遭所生母憂表請解任詔以餘尊所厭不許肅宗初纍遷左光祿大夫仍領護軍遷冀州刺史遙以諸胡先無籍貫姦良莫辨悉令造籍又以諸胡設籍當欲稅之以充軍用胡人不願乃共構遙云取納金馬御史按驗事與胡同遙坐除名遙陳枉不已敕有司重究乃披雪遷右光祿大夫時冀州沙門法慶既為祅幻遂說勃海人李歸伯歸伯合家從之招率鄉人推法慶為主法慶以歸伯為十住菩薩平魔軍司定漢王自號大乘殺一人者為一住菩薩殺十人為十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害為事於是聚衆殺阜城令破勃海郡殺害吏人刺史蕭寶夤遣兼長史崔伯驎討之敗於煮棗城伯驎戰沒凶衆遂盛所在屠滅寺舍斬戮僧尼焚燒經像云新佛出世除去舊魔詔以遙為使持節都督北征諸軍事帥步騎十萬以討之法慶相率攻遙遙並擊破之遙遣輔國將軍張虯等率騎追掩討破擒法慶并其妻尼惠暉等斬之傳首京師後擒歸伯戮於都巿初遙大功昆弟皆是恭宗之孫至肅宗而本服絶故除遙等屬籍遙表曰竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去茲以往猶繫之以姓而弗別綴之以食而弗殊又律云議親者非唯當世之屬親歷謂先帝之五世謹尋斯旨將以廣帝宗重盤石先皇所以變茲事條為此別制者太和之季方有意於吳蜀經始之費慮深在初割減之起暫出當時也且臨淮王提分屬籍之始高祖賜帛三千匹所以重分離樂良王長命亦賜縑二千匹所以存慈眷此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔己者衆臣誠不欲妄親太階苟求潤屋但傷大宗一分則天子屬籍不過十數人而已在漢諸王之子不限多少皆列土而封謂之曰侯至于魏晉莫不廣胙河山稱之曰公者蓋惡其大宗之不固骨肉之恩疏矣臣去皇上雖是五世之遠於先帝便是天子之孫高祖所以國秩祿賦復給衣食后族唯給其賦不與衣食者欲以別外內限異同也今諸廟之感在心未忘行道之悲倏然已及其諸封者身亡之日三年服終然後改奪今朝廷猶在遏密之中便議此事實用未安詔付尚書博議以聞尚書令任城王澄尚書左僕射元暉奏同遙表靈太后不從卒諡曰宣公遙弟字景安粗涉書史以春秋之義為名不以山川表求改名芝歷位太常卿中書監侍中後於河陰遇害贈太傅司徒公諡曰宣穆公濟陰王小新成和平二年封頗有武略庫莫奚侵擾詔新成率衆討之新成乃多為毒酒賊既漸逼便棄營而去賊至喜而競飲聊無所備遂簡輕騎因醉縱擊俘馘甚多後位外都大官薨贈大將軍諡曰惠公子鬱字伏生襲位開府為徐州刺史以黷貨賜死國除長子弼字雍明剛正有文學位中散大夫以世嫡應襲先爵為季父尚書僕射麗因于氏親寵遂奪弼王爵撗授同母兄子誕於是弼絶棄人事託疾還私第世宗徵為侍中弼上表固讓入嵩山以穴為室布衣蔬食卒建義元年子暉業訴復王爵永安三年追贈尚書令司徒公諡曰文獻初弼嘗夢人謂之曰君身不得傳世封其紹先爵者君長子紹遠也弼覺即語暉業終如其言暉業少險薄多與寇盜交通長乃變節涉子史亦頗屬文而慷慨有志節歷位司空太尉加特進領中書監録尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲啖一日三羊三日一犢又嘗賦詩云昔居王道泰濟濟富羣英今逢世路阻狐兔鬱縱橫齊初降封美陽縣公開府儀同三司特進暉業之在晉陽也無所交通居常間暇乃撰魏藩王家世號為辨宗室録四十卷行於世暉業弟昭業頗有學尚位諫議大夫莊帝將幸洛南昭業立於閶闔門外扣馬諫帝避之而過後勞勉之位給事黃門侍郎衛將軍右光祿大夫卒諡曰文侯鬱弟偃字仲琁位太中大夫卒子誕字曇首初誕伯父鬱以貪汙賜死爵除景明三年誕訴云伯鬱前朝之封正以年長襲封以罪除爵爵由謬襲襲應歸正詔以偃正元妃息曇首濟陰王嫡孫可聽紹封以纂先緒誕既襲爵除齊州刺史在州貪暴大為人患牛馬騾驢無不逼奪家之奴隸悉迫取良人為婦有沙門為誕採藥還而見之誕曰師從外來有何消息對曰唯聞王貪願王早代誕曰齊州七萬戶吾至來一家未得三十錢何得言貪後為御史中尉元纂所糾會赦免薨諡曰靜王子撫字伯懿襲莊帝初為從兄暉業訴奪王爵偃弟麗字寶掌位兼宗正卿右衛將軍遷光祿勳宗正右衛如故時秦州屠各王法智推州主簿呂苟兒為主號建明元年置立百官攻逼州郡涇州人陳瞻亦聚衆自稱王號聖明元年詔以麗為使持節都督秦州刺史與別駕楊椿討之苟兒率衆十餘萬屯孤山列據諸險圍逼州城麗出擊大破之便進軍水洛賊徒逆戰麗夜擊走之行秦州事李韶破苟兒于孤山乘勝追奔三十里獲其父母妻子斬賊王五人其餘相繼歸降諸城之圍亦悉奔散苟兒率其王公三十餘人詣麗請罪椿又斬瞻麗因平賊之勢枉掠良善七百餘人世宗嘉其功詔有司不聽追檢拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄囚死及徒流案未申臺者一時放免遷冀州刺史入為尚書左僕射帝問曰聞公在州殺戮無理枉濫非一又大殺道人對曰臣在冀州可殺道人二百許人亦復何多帝曰一物不得其所若納諸隍況殺道人二百而言不多麗脫冠謝賜坐卒諡曰威子顯和少有節操歷司徒記室參軍司徒崔光每見之曰元參軍風流清秀容止間雅乃宰相之器除徐州安東府長史刺史元法僧叛顯和與戰被擒執手命與連坐顯和曰顯和與阿翁同源別派皆是盤石之宗一朝以地外叛若遇董狐能無慚德遂不肯坐法僧猶欲慰喻顯和曰乃可死作惡鬼不能坐為叛臣及將殺之神色自若建義初贈秦州刺史汝陰王天賜和平三年封拜鎮南大將軍虎牢鎮都大將後為內都大官高祖初殿中尚書胡莫寒簡西部敕勒豪富兼丁者為殿中武士而大納財貨簡選不平衆怒殺莫寒及高平假鎮將奚陵於是諸部敕勒悉叛詔天賜與給事中羅雲督諸軍討之前鋒敕勒詐降雲信之副將元伏曰敕勒色動恐將有變今不設備將為所圖雲不從敕勒輕騎數千襲殺雲天賜僅得自全後除征北大將軍護胸奴中郎將纍遷懷朔鎮大將坐貪殘恕死削除官爵卒高祖哭於思政觀贈本爵葬從王禮諡曰靈王子逞字萬安卒於齊州刺史諡曰威逞子慶和東豫州刺史為蕭衍將所攻舉城降之衍以為北道總督魏王至項城朝廷出師討之望風退走衍責之曰言同百舌膽若鼷鼠遂徙合浦逞弟泛字普安自元士稍遷營州刺史性貪殘人不堪命相率逐之泛走平州後除光祿大夫宗正卿封東燕縣男於河陰遇害天賜第五子修義字壽安涉獵書傳頗有文才為高祖所知自元士稍遷左將軍齊州刺史修義以齊州頻喪刺史纍表固辭詔曰修短有命吉凶由人何得過致憂憚以乖維城之寄違凶就吉時亦有之可聽更立館宇於是移理東城修義為政寬和愛人在州四歲不殺一人百姓以是追思之遷秦州刺史肅宗初表陳庶人禧庶人愈等請宥前愆賜葬陵域靈太后詔曰收葬之恩事由上旨藩嶽何得越職干陳在州多受納纍遷吏部尚書及在銓衡唯專貨賄授官大小皆有定價時中散大夫高居者有旨先時上黨郡缺居遂求之修義私已許人抑居不與居大言不遜修義命左右牽曳之居對大衆呼天唱賊人問居曰白日公庭安得有賊居指修義曰此座上者違天子明詔物多者得官京師白劫此非大賊乎修義失色居行罵而出後欲邀車駕論修義罪狀左僕射蕭寶夤諭之乃止二秦反假修義兼尚書右僕射西道行臺行秦州事為諸軍節度修義性好酒每飲連日遂遇風病神明昏喪雖至長安竟無部分之益元志敗沒賊東至黑水更遣蕭寶夤討之以修義為雍州刺史卒於州贈司空諡曰文子均位給事黃門侍郎樂浪王萬壽和平三年封拜征東大將軍鎮和龍性貪暴徵還道憂薨諡曰厲王子康王樂平襲薨子長命襲坐殺人賜死國除子忠肅宗時復前爵位太常少卿出帝泛舟天淵池命宗室諸王陪宴忠愚而無智性好衣服遂著紅羅襦繡作領碧紬袴錦為緣帝謂曰朝廷衣冠應有常式何為著百戲衣忠曰臣少來所愛情存綺羅歌衣舞服是臣所願帝曰人之無良乃至此乎廣平王洛侯和平二年封薨諡曰殤無子後以陽平幽王第五子匡後之匡字建扶性耿介有氣節高祖器之謂曰叔父必能儀形社稷匡輔朕躬今可改名為匡以成克終之美世宗即位纍遷給事黃門侍郎茹皓始有寵百僚微憚之世宗曾於山陵還詔匡陪乘又命皓登車皓褰裳將上匡諫止世宗推之令下皓恨匡失色當時壯其忠謇世宗親政除肆州刺史匡既忤皓懼為所害廉慎自修甚有聲績遷州刺史徵為大宗正卿河南邑中正匡奏親王及始藩二藩王妻悉有妃號而三藩已下皆謂之妻上不得同為妃名而下不及五品已上有命婦之號竊為疑詔曰夫貴於朝妻榮於室婦女無定升從其夫三藩既啓王封妃名亦宜同等妻者齊也理與己齊可從妃例自是三藩王妻名號始定後除度支尚書匡表引樂陵章武之例求紹洛侯封詔付尚書議尚書奏聽襲封以明興絶之義匡與尚書令高肇不平常無降下之色時世宗委政於肇朝廷傾憚唯匡與肇抗衡先自造棺置於廳事意欲輿棺詣闕論肇罪惡自殺切諫肇聞而惡之後因與太常劉芳議爭權量遂與肇聲色御史中尉王顯奏匡曰自金行失御羣僞競興禮壞樂崩彝倫攸斁大魏應期奄有四海高祖孝文皇帝以睿聖統天克復舊典乃命故中書監高閭廣旌儒林推尋樂府依据六經參諸國志以黍裁寸將均周漢舊章屬雲構中遷尚未云就高祖睿思玄深參考經記以一黍之大用成分體準之為尺宣布施行暨正始中故太樂令公孫崇輒自立意以黍十二為寸別造尺度定律刊鍾皆向成訖表求觀試時敕太常卿臣芳以崇造既成請集朝英議其得否芳疑崇尺度與先朝不同察其作者於經史復異推造鮮據非所宜行時尚書令臣肇清河王懌等以崇造乖謬與周禮不同遂奏臣芳依周禮更造成訖量校從其善者而芳以先朝尺度事合古典乃依前詔書以黍刊寸並呈朝廷用裁金石于時議者多云芳是唯黃門侍郎臣孫惠蔚與崇扶同二途參差頻經考議而尚書令臣肇以芳造崇物故之後而惠蔚亦造一尺仍云扶以比崇尺自相乖背量省二三謂芳為得而尚書臣匡表云劉孫二尺長短相傾稽考兩律所容殊異言取中黍校彼二家云並參差抑中無所自立一途請求議判當時議者或是於匡兩途舛駁未即時定肇又云權斛斗尺班行已久今者所論豈喻先旨宜仰依先朝故尺為定自爾以後而匡與肇厲言都座聲色相加高下失其常倫噂競無復彝序匡更表列據己十是云芳十非又云肇前被敕旨共芳營督規立鍾石之名希播製作之譽乃憑樞衡之尊藉舅氏之勢與奪任心臧否自己阿黨劉芳遏絶臣事望勢雷同者接以恩言依經按古者即被怒責雖未指鹿化馬移天徙日實使蘊藉之士聳氣坐端懷道之夫結舌筵次又言芳昔與崇競言自作今共臣論忽稱先朝豈不前謂可行輒欲自取後知錯謬便推先朝殊非大臣之體深失為下之義復考校勢臣之前量度偏頗之手臣必刖足內朝抱璞人外囂言肆意彰於朝野然匡職當出納獻替所在斗尺權度正是所司若己有所見能練臧否宜應首唱義端早辨諸惑何故默心隨從不關一言見芳成事方有此語計芳才學與匡殊懸所見淺深不應相匹今乃始發恐此由心借智於人規成虛譽況匡表云所據銅權形如古志明是漢作非莽別造及案權銘云黃帝始袓德布於虞虞帝始袓德布於新若莽佐漢時事寧有銘僞新之號哉又尋莽傳云莽居攝即變漢制度考校二證非漢權明矣復云芳之所造又短先朝之尺臣既比之權然相合更云芳尺與千金堰不同臣復量比因見其異二三浮濫難可據準又云共構虛端妄為疑似託以先朝云非己製臣按此欺詐乃在於匡不在於芳何以言之芳先被敕專造鍾律管籥優劣是其所裁權斛尺度本非其事比前門下索芳尺度而芳牒報云依先朝所班新尺復應下黍更不增損為造鍾律調正分寸而已檢匡造時在牒後一歲芳於爾日匡未共爭已有此牒豈為詐也計崇造寸積黍十二羣情共知而芳造寸唯止十黍亦俱先朝詔書以黍成寸首尾歷然寧有輒欲自取之理肇任居端右百僚是望言行動靜必副具瞻若恃權阿黨詐託先詔將指鹿化馬徙日移天即是魏之趙高何以宰物肇若無此匡既誣毀宰相訕謗明時豈應談議之間便有指鹿之事可否之際輕生刖足之言趙高矯惑事屬衰秦卞和抱璞時遇暴楚何宜以濟濟之朝而有斯謗者哉阻惑朝聽不敬至甚請以肇匡並禁尚書推窮其原付廷尉定罪詔曰可有司奏匡誣肇處匡死刑世宗恕死降為光祿大夫又兼宗正卿出為兗州刺史匡臨發帝引見於東堂勞勉之匡猶以尺度金石之事國之大經前雖為南臺所彈然猶許更議若議之日願聽臣暫赴世宗曰劉芳學高一時深明典故其所據者與先朝尺乃寸過一黍何得復云先朝之意也兗州既所執不經後議之日何待赴都也肅宗初入為御史中尉匡嚴於彈糾始奏于忠次彈高聰等免官靈太后並不許以違其糾惡之心又慮匡辭解欲奬安之進號安南將軍後加鎮東將軍匡屢請更權衡不已於是詔曰謹權審度自昔令典定章革歷往代良規匡宗室賢亮留心既久可令更集儒貴以時驗決必務權衡得衷令寸籥不舛又詔曰故廣平殤王洛侯體自恭宗茂年薨殞國除祀廢不祀忽諸匡親同若子私繼歲久宜樹維城永茲盤石可特襲王爵封東平郡王匡所制尺度訖請集朝士議定是非詔付門下尚書三府九列議定以聞太師高陽王雍等議曰伏惟高祖創改權量已定匡今新造微有參差且匡云所造尺度與漢志王莽權斛不殊又晉中書監荀勗云後漢至魏尺長於古四分有餘於是依周禮積黍以起度量惟古玉律及鍾遂改正之尋勗所造之尺與高祖所定毫釐略同又侍中崔光得古象尺于時亦準議令施用仰惟孝文皇帝德邁前王睿明下燭不刊之式事難變改臣等參論請停匡議永遵先皇之制詔從之匡每有奏請尚書令任城王澄時致執奪匡剛隘內遂不平先所造棺猶在僧寺乃復修事將與澄相攻澄頗知之後將赴省與匡逢遇騶卒相撾朝野駭愕澄因是奏匡罪狀三十餘條廷尉處以死刑詔付八座議特加原宥削爵除官三公郎中辛雄奏理之後特除平州刺史徙青州刺史尋為關右都督兼尚書行臺遇疾還京孝昌初卒諡曰文貞後追復本爵改封濟南王第四子獻襲齊受禪爵例降
