body:
  text: 魏書卷四上世祖紀第四上世祖太武皇帝諱燾太宗明元皇帝之長子也母曰杜貴嬪天賜五年生於東宮體貌瓌異太祖奇而悅之曰成吾業者必此子也泰常七年四月封泰平王五月為監國太宗有疾命帝總攝百揆聰明大度意豁如也八年十一月壬申即皇帝位大赦天下十有二月追尊皇妣為密皇后進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普增爵位各有差於是除禁錮釋嫌怨開倉庫賑窮乏河南流民相率內屬者甚衆始光元年春正月丙寅安定王彌薨夏四月甲辰東巡幸大寧秋七月車駕還宮八月蠕蠕率六萬騎入雲中殺掠吏民攻陷盛樂宮赭陽子尉普文率輕騎討之虜乃退走詔平陽王長孫翰等擊蠕蠕別帥破之殺數千人獲馬萬餘匹語在蠕蠕傳九月大簡輿徒治兵於東郊部分諸軍五萬騎將北討冬十有二月遣平陽王長孫翰等討蠕蠕車駕次祚山蠕蠕北遁諸軍追之大獲而還是年劉義符為其臣徐羡之等所廢殺立義符弟義隆二年春正月己卯車駕至自北伐以其雜畜班賜將士各有差二月慕容渴悉鄰反於北平攻破郡治太守與守將擊敗之三月丙辰尊保母竇氏曰保太后丁巳以北平王長孫嵩為太尉平陽王長孫翰為司徒宜城王奚斤為司空庚申營故東宮為萬壽宮起永安安樂二殿臨望觀九華堂初造新字千餘詔曰在昔帝軒創制造物乃命倉頡因鳥獸之跡以立文字自茲以降隨時改作故篆隸草楷並行於世然經歷久遠傳習多失其真故令文體錯謬會義不愜非所以示軌則於來世也孔子曰名不正則事不成此之謂矣今制定文字世所用者頒下遠近永為楷式夏四月詔龍驤將軍步堆謁者僕射胡覲使於劉義隆五月詔天下十家發大牛一頭運粟塞上秋九月永安安樂二殿成丁卯大饗以落之冬十月治兵於西郊癸卯車駕北伐平陽王長孫翰等絶漠追之蠕蠕北走事具蠕蠕傳是年赫連屈丐死子昌僭立三年春正月壬申車駕至自北伐班軍實以賜將士行留各有差乞伏熾磐遣使朝貢請討赫連昌二月起太學於城東祀孔子以顏淵配夏五月辛卯中山公元纂進爵為王南安公元素復先爵常山王六月幸雲中舊宮謁陵廟西至五原田於陰山東至和兜山秋七月築馬射臺于長川帝親登臺觀走馬王公諸國君長馳射中者賜金錦繒絮各有差八月車駕還宮劉義隆遣使朝貢帝以屈丐既死諸子相攻九月遣司空奚斤率義兵將軍封禮雍州刺史延普襲蒲坂宋兵將軍周幾率洛州刺史于栗磾襲陝城冬十月丁巳車駕西伐幸雲中臨君子津會天暴寒數日冰結十有一月戊寅帝率輕騎二萬襲赫連昌壬午至其城下徙萬餘家而還語在昌傳至祚山班所虜獲以賜將士各有差奚斤未至蒲坂昌守將赫連乙升棄城西走昌弟助興守長安乙升復與助興自長安西走安定奚斤遂入蒲坂十有二月詔斤西據長安秦雍氐羌皆叛昌詣斤降武都氐王楊玄及沮渠蒙遜等皆遣使內附四年春正月乙酉車駕至自西伐賜留臺文武生口繒帛馬牛各有差從人在道多死其能到都者才十六七己亥行幸幽州赫連昌遣其弟平原公定率衆二萬向長安帝聞之乃遣就陰山伐木大造攻具二月車駕還宮三月丙子遣高涼王禮鎮長安詔執金吾桓貸造橋於君子津丁丑廣平王連薨夏四月丁未詔員外散騎常侍步堆謁者僕射胡覲等使於劉義隆是月治兵講武分諸軍司徒長孫翰廷尉長孫道生宗正娥清三萬騎為前驅常山王素太僕兵堆將軍元太毗步兵三萬為後繼南陽王伏真執金吾桓貸將軍姚黃眉步兵三萬部攻城器械將軍賀多羅精騎三千為前候五月車駕西討赫連昌辛巳濟君子津三城胡酋鵲子相率內附帝次拔鄰山築城舍輜重以輕騎三萬先行戊戌至于黑水帝親祈天告祖宗之靈而誓衆焉六月甲辰昌引衆出城大破之事在昌傳昌將麾下數百騎西南走奔上邽諸軍乘勝追至城北死者萬餘人臨陳殺昌弟河南公滿及其兄子蒙遜會日暮昌尚書僕射問至拔城夜將昌母出走乙巳車駕入城虜昌羣弟及其諸母姊妹妻妾宮人萬數府庫珍寶車旗器物不可勝計擒昌尚書王買薛超等及司馬德宗將毛修之秦雍人士數千人獲馬三十餘萬匹牛羊數千萬以昌宮人及生口金銀珍玩布帛班賚將士各有差昌弟平原公定拒司空奚斤於長安城娥清率騎五千討之西走上邽辛酉班師留常山王素執金吾桓貸鎮統萬秋七月己卯築壇於祚嶺戲馬馳射賜射中者金錦繒絮各有差蠕蠕寇雲中聞破赫連昌懼而還走八月壬子車駕至自西伐飲至策勳告於宗廟班軍實以賜留臺百僚各有差九月丁酉安定民舉城歸降冬十有一月以氐王楊玄為都督荊梁益寧四州諸軍事假征南大將軍梁州刺史南秦王十有二月行幸中山守宰貪污免者十數人癸卯車駕還宮復所過田租之半神元年春正月以天下守令多行非法精選忠良悉代之辛未京兆王黎薨二月改元赫連昌退屯平涼司空奚斤進軍安定將軍丘堆為昌所敗監軍侍御史安頡出戰擒昌昌餘衆立昌弟定為王走還平涼三月癸酉詔侍中古弼迎赫連昌辛巳弼等以昌至于京師司空奚斤追定於平涼馬髦嶺為定所擒丘堆先守輜重在安定聞斤敗棄甲東走蒲坂帝聞大怒詔安頡斬堆夏四月赫連定遣使朝貢帝詔諭之壬子西巡戊午田于河西大赦天下南秦王楊玄遣使朝貢六月丁酉并州胡酋卜田謀反伏誅餘衆不安詔淮南公王倍斤鎮慮虒撫慰之甲寅行幸長川秋七月車駕還宮八月東幸廣寧臨觀溫泉以太牢祭黃帝堯舜廟蠕蠕大檀遣子將萬餘騎入塞事具蠕蠕傳上郡休屠胡酋金崖率部內屬九月車駕還宮上洛巴渠泉午觸等萬餘家內附冬十月甲辰北巡壬子田于牛川劉義隆淮北鎮將王仲德遣步騎二千餘入寇濟陽陳留是月車駕還宮閏月辛巳義隆又遣將王玄謨兗州刺史竺靈秀步騎二千人寇滎陽將襲虎牢豫州遣軍逆擊走之上郡屠各隗詰歸率萬餘家內屬定州丁零鮮于臺陽翟喬等二千餘家叛入西山劫掠郡縣州軍討之失利詔鎮南將軍壽光侯叔孫建擊之十有一月行幸河西大校獵十有二月甲申車駕還宮是歲皇子晃生乞伏熾磐死子暮末僭立沮渠蒙遜遣使朝貢二年春正月赫連定弟酒泉公俊自平涼來奔丁零鮮于臺陽等歸罪詔赦之二月上黨李禹聚衆殺太守自稱無上王署置將帥河內守將擊破之禹亡走入山為人執送斬之夏四月治兵于南郊劉義隆遣使朝貢庚寅車駕北伐以太尉北平王長孫嵩衛尉廣陵公樓伏連留守京師從東道與長孫翰等期會於賊庭五月丁未次于沙漠舍輜重輕騎兼馬至栗水蠕蠕震怖焚燒廬舍絶跡西走事具蠕蠕傳是月赫連定來侵統萬東至侯尼城而還秋七月車駕東轅至黑山校數軍實班賜王公將士各有差八月帝以東部高車屯巳尼陂詔左僕射安原率騎萬餘討之事具蠕蠕傳冬十月振旅凱旋于京師告於宗廟列置新民於漠南東至濡源西暨五原陰山竟三千里詔司徒平陽王長孫翰尚書令劉潔左僕射安原侍中古弼鎮撫之十有一月西巡狩田于河西至祚山而還三年春正月庚子車駕還宮壬寅大赦天下癸卯行幸廣寧臨溫泉作溫泉之歌二月丁卯司徒平陽王長孫翰薨戊辰車駕還宮三月壬寅進會稽公赫連昌為秦王癸卯雲中河西敕勒千餘家叛尚書令劉潔追滅之帝聞劉義隆將寇邊乃詔冀定相三州造船三千艘簡幽州以南戍兵集于河上以備之夏四月甲子行幸雲中敕勒萬餘落叛走詔尚書封鐵追討滅之五月戊戌詔曰夫士之為行在家必孝處朝必忠然後身榮於時名揚後世矣近遣尚書封鐵翦除亡命其所部將士有盡忠竭節以殞軀命者今皆追贈爵號或有蹈鋒履難以自效者以功次進位或有故違軍法私離幢校者以軍法行戮夫有功蒙賞有罪受誅國之常典不可暫廢自今以後不善者可以自改其宣敕內外咸使聞知六月詔平南大將軍假丹陽王太毗屯于河上以司馬楚之為安南大將軍琅邪王屯潁川秋七月己亥詔曰昔太祖撥亂制度草創太宗因循未遑改作軍國官屬至乃闕然今諸征鎮將軍王公仗節邊遠者聽開府辟召其次增置吏員庚子詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎮鄴為諸軍節度八月清河羣盜殺太守劉義隆將到彥之自清水入河泝流西行帝以河南兵少詔攝四鎮乃治兵將西討丙寅到彥之遣將渡河攻冶坂冠軍將軍安頡督諸軍擊破之斬首五千餘級投水死者甚衆甲戌行幸南宮獵于南山戊寅詔征西大將軍長孫道生屯于河上九月己丑赫連定遣弟謂以代寇鄜城平西將軍始平公隗歸等率諸軍討之擒賊將王卑殺萬餘人謂以代遁走癸卯立密皇太后廟于鄴甲辰行幸統萬遂征平涼冬十月庚申到彥之王仲德沿河置守還保東平乙亥冠軍將軍安頡濟河攻洛陽丙子拔之擒義隆將二十人斬首五千級時河北諸軍會于七女津彥之恐軍南度遣將王蟠龍泝流欲盜官船征南大將軍杜超等擊破斬之辛巳安頡平虎牢義隆司州刺史尹沖墜城死十有一月乙酉車駕至平涼先是赫連定將數萬人東禦於鄜城留其弟上谷公社于廣陽公度洛孤城守帝至平涼登北原使赫連昌招諭之社于不降詔安西將軍古弼等擊安定攻平涼定聞之棄鄜城入于安定自率步騎三萬從鶉觚原將救平涼與弼相遇弼擊之殺數千人乃還走詔諸軍四面圍之甲午壽光侯叔孫建汝陰公長孫道生濟河到彥之王仲德從清入濟東走青州義隆兗州刺史竺靈秀棄須昌南奔湖陸丁酉定乏水引衆下原詔武衛將軍丘眷擊之定衆大潰死者萬餘人定中重創單騎遁走獲定弟丹陽公烏視拔武陵公禿骨及公侯百餘人是日諸將乘勝進軍遂取安定定從兄東平公乙升棄城奔長安劫掠數千家西奔上邽戊戌叔孫建大破竺靈秀於湖陸殺獲五千餘人己亥帝幸安定獲乞伏熾磐質子及定車旗簿其生口財畜班賜將士各有差庚子帝自安定還臨平涼遂掘塹圍守之行幸紐城安慰初附赦秦雍之民賜復七年定隴西守及將士數千人來降辛丑冠軍將軍安頡率諸軍攻滑臺琅邪王司馬楚之破劉義隆將於長社沮渠蒙遜遣使朝貢壬寅封壽光侯叔孫建為丹陽王十有二月丁卯定弟社于度洛孤面縛出降平涼平收其珍寶定長安臨晉武功守將皆奔走關中平壬申車駕東還留巴東公延普等鎮安定是歲馮跋死弟文通僭立四年春正月壬午車駕次于木根山大饗羣臣賜布帛各有差丙申劉義隆將檀道濟王仲德從清水救滑臺丹陽王叔孫建汝陰公長孫道生拒之道濟等不敢進是月乞伏慕末為赫連定所滅二月辛酉安頡司馬楚之平滑臺擒義隆將朱修之李元德及東郡太守申謨癸酉車駕還宮飲至策勳告於宗廟賜留臺百官各有差戰士賜復十年丁丑行幸南宮定州民飢詔啓倉以賑之義隆將檀道濟王仲德東走諸將追之至歷城而還三月庚戌冠軍將軍安頡獻義隆俘萬餘人甲兵三萬夏五月庚寅行幸雲中六月赫連定北襲沮渠蒙遜為吐谷渾慕璝所執閏月乙未蠕蠕國遣使朝獻詔散騎侍郎周紹使于劉義隆秋七月己酉行幸河西起承華宮八月乙酉沮渠蒙遜遣子安周入侍吐谷渾慕璝遣使奉表請送赫連定己丑以慕璝為大將軍西秦王九月癸丑車駕還宮庚申加太尉長孫嵩柱國大將軍特進左光祿大夫崔浩為司徒征西大將軍長孫道生為司空癸亥詔兼太常李順持節拜河西王沮渠蒙遜為假節加侍中都督涼州及西域羌戎諸軍事行征西大將軍太傅涼州牧涼王壬申詔曰頃逆命縱逸方夏未寧戎車屢駕不遑休息今二寇摧殄士馬無為方將偃武修文遵太平之化理廢職舉逸民拔起幽窮延登俊乂昧旦思求想遇師輔雖殷宗之夢板築罔以加也訪諸有司咸稱范陽盧玄博陵崔綽趙郡李靈河間邢穎勃海高允廣平游雅太原張偉等皆賢俊之胄冠冕州邦有羽儀之用詩不云乎鶴鳴九臯聲聞于天庶得其人任之政事共臻雍熙之美易曰我有好爵吾與爾縻之如玄之比隱跡衡門不耀名譽者盡敕州郡以禮發遣遂徵玄等及州郡所遣至者數百人皆差次用冬十月戊寅詔司徒崔浩改定律令行幸漠南十一月丙辰北部敕勒莫弗庫若于率其部數萬騎驅鹿數百萬詣行在所帝因而大狩以賜從者勒石漠南以記功德宜城王奚斤坐事降爵為公十二月丁丑車駕還宮延和元年春正月丙午尊保太后為皇太后立皇后赫連氏立皇子晃為皇太子謁于太廟大赦改年己巳詔曰朕以眇身獲奉宗廟思闡洪基廓清九服遭值季運天下分崩是用屢征罔或寧息自始光至今九年之間戎車十舉羣帥文武荷戈被甲櫛風沐雨蹈履鋒刃與朕均勞賴神祇之助將士宣力用能摧折強豎克翦大憝兵不極武而二寇俱滅師不違律而遐方以寧加以時氣和洽嘉瑞並降遍於郡國不可勝紀豈朕一人獨應此祐斯亦羣后協同之所致也公卿因茲稽諸天人之會請建副二夫慶賞之行所以褒崇勳舊旌顯賢能以永無疆之休其王公將軍以下普增爵秩啓國承家修廢官舉俊逸蠲除煩苛更定科制務從輕約除故革新以正一統羣司當深思效績直道正身立功立事無或懈怠稱朕意焉二月丙子行幸南宮三月丁未追贈夫人賀氏為皇后壬申西秦王吐谷渾慕璝送赫連定於京師夏五月大簡輿徒于南郊將討馮文通劉義隆遣使朝貢六月庚寅車駕伐和龍詔尚書左僕射安原等屯于漠南以備蠕蠕辛卯兼散騎常侍鄧穎使於劉義隆秋七月己未車駕至濡水庚申遣安東將軍宜城公奚斤發幽州民及密雲丁零萬餘人運攻具出南道俱會和龍帝至遼西文通遣其侍御史崔聘奉獻牛酒己巳車駕至和龍臨其城文通石城太守李崇建德太守王融十餘郡來降發其民三萬人穿圍塹以守之是月築東宮八月甲戌文通使數萬人出城挑戰昌黎公元丘與河間公元齊擊破之死者萬餘人文通尚書高紹率萬餘家保羌胡固己卯車駕討紹辛巳斬之詔平東將軍賀多羅攻文通帶方太守慕容玄於猴固撫軍大將軍永昌王健攻建德驃騎大將軍樂平王丕攻冀陽皆拔之虜獲生口班賜將士各有差九月乙卯車駕西還徙營丘成周遼東樂浪帶方玄菟六郡民三萬家于幽州開倉以賑之冬十月癸酉車駕至濡水吐谷渾慕璝遣使朝貢十有一月乙巳車駕至自伐和龍十有二月己丑馮文通長樂公崇及其母弟朗朗弟邈以遼西內屬文通遣將封羽圍遼西先是辟召賢良而州郡多逼遣之詔曰朕除僞平暴征討纍年思得英賢緝熙治道故詔州郡搜揚隱逸進舉賢俊古之君子養志衡門德成業就才為世使或雍容雅步三命而後至或棲棲遑遑負鼎而自達雖徇尚不同濟時一也諸召人皆當以禮申諭任其進退何逼遣之有也此刺史守宰宣揚失旨豈復光益乃所以彰朕不德自今以後各令鄉閭推舉守宰但宣朕虛心求賢之意既至當待以不次之舉隨才文武任之政事其明宣敕咸使聞知是年禿髮檀子保周棄沮渠蒙遜來奔以保周為張掖公二年春正月乙卯撫軍大將軍永昌王健督諸軍救遼西丙寅以樂安王範為假節加侍中都督秦雍涇梁益五州諸軍事衛大將軍儀同三司鎮長安二月庚午詔兼鴻臚卿李繼持節假馮崇車騎大將軍遼西王承制聽置尚書已下賜崇功臣爵秩各有差征西將軍金崖與安定鎮將延普及涇州刺史狄子玉爭權構隙舉兵攻普不克退保胡空谷驅掠平民據險自固詔散騎常侍平西將軍安定鎮將陸俟討獲之壬午行幸河西詔兼散騎常侍宋宣使於劉義隆丙申馮崇母弟朗來朝三月司馬德宗驃騎將軍司馬元顯子天助來降壬子車駕還宮夏五月己亥行幸山北六月遣撫軍大將軍永昌王健尚書左僕射安原督諸軍討和龍將軍樓勃別將五千騎圍凡城文通守將封羽以城降收其民三千餘家辛巳詔樂安王範發秦雍兵一萬人築小城於長安城內秋八月遼西王馮崇上表求說降其父帝不聽九月劉義隆遣使朝貢奉馴象一戊午詔兼大鴻臚卿崔賾持節拜征虜將軍楊難當為征南大將軍儀同三司封南秦王冬十月南秦王楊難當率衆圍漢中十有一月甲寅車駕自山北還宮十有二月己巳大赦天下辛未幸陰山之北隴西休屠王弘祖率衆內屬金崖既死部人立崖從弟當川領其衆詔兼散騎常侍盧玄使於劉義隆是歲沮渠蒙遜死以其子牧犍為車騎將軍改封河西王三年春正月乙未車駕次于女水大饗羣臣班賜各有差戊戌馮文通遣其給事黃門侍郎伊臣乞和帝不許丙辰金當川反楊難當克漢中送雍州流民七千家于長安二月丁卯蠕蠕吳提奉其妹并遣其異母兄禿鹿傀及左右數百人朝貢獻馬二千匹戊寅詔曰朕承統之始羣凶縱逸四方未賓所在逆僭蠕蠕陸梁於漠北鐵弗肆虐於三秦是以旰食忘寢抵掌扼腕期在掃清逋殘寧濟萬宇故頻年屢征有事西北運輸之役百姓勤勞廢失農業遭離水旱致使生民貧富不均未得家給人足或有寒窮不能自贍者朕甚愍焉今四方順軌兵革漸寧宜寬徭賦與民休息其令州郡縣隱括貧富以為三級其富者租賦如常中者復二年下窮者復三年刺史守宰當務盡平當不得阿容以罔政治明相宣約咸使聞知辛卯車駕還宮三月甲寅行幸河西閏月甲戌秦王赫連昌叛走丙子河西候將格殺之驗其謀反羣弟皆伏誅己卯車駕還宮彭城公元栗進爵為王辛巳馮文通遣尚書高顒上表稱蕃詔徵其侍子戊子金當川率其衆圍西川侯彭文暉於陰密夏四月乙未詔征西大將軍常山王素討當川丁未行幸河西壬戌獲當川斬之于長安以徇六月甲辰車駕還宮辛亥撫軍大將軍永昌王健司空汝陰公長孫道生侍中古弼督諸軍討和龍芟其禾稼徙民而還秋七月辛巳東宮成備置屯衛三分西宮之一壬午行幸美稷遂至隰城命諸軍討山胡白龍于西河九月戊子克之斬白龍及其將帥屠其城冬十月癸巳蠕蠕國遣使朝貢甲午破白龍餘黨于五原詔山胡為白龍所逼及歸降者聽為平民諸與白龍同惡斬數千人虜其妻子班賜將士各有差十有一月車駕還宮十有二月甲辰行幸雲中太延元年春正月壬午降死刑已下各一等癸未出太祖太宗宮人令得嫁甲申大赦改年二月庚子蠕蠕焉耆車師諸國各遣使朝獻詔長安及平涼民徙在京師其孤老不能自存者聽還鄉里丁未車駕還宮三月癸亥馮文通遣大將渴燭通朝獻辭以子疾夏五月庚申進宜都公穆壽為宜都王汝陰公長孫道生為上黨王宜城公奚斤為農王廣陵公樓伏連為廣陵王本官各如故遣使者二十輩使西域甲戌行幸雲中六月甲午詔曰頃者寇逆消除方表漸晏思崇政化敷洪治道是以屢詔有司班宣恩惠綏理百揆羣公卿士師尹牧守或未盡導揚之美致令陰陽失序和氣不平去春小旱東作不茂憂勤克己祈請靈祇上下咸秩豈朕精誠有感何報應之速雲雨震灑流澤霑渥有鄙婦人持方寸玉印詣潞縣侯孫家既而亡去莫知所在玉色鮮白光照內映印有三字為龍鳥之形要妙奇巧不類人迹文曰旱疫平推尋其理蓋神靈之報應也朕用嘉焉比者已來禎瑞仍臻所在甘露流液降於殿內嘉瓜合蒂生于中山野木連理殖於魏郡在先后載誕之鄉白燕集于盛樂舊都玄鳥隨之蓋有千數嘉禾頻歲合秀於農白雉白兔並見於勃海白雉三隻又集於平陽太祖之廟天降嘉貺將何德以酬之所以內省驚震欣懼交懷其令天下大酺五日禮報百神守宰祭界內名山大川上答天意以求福祿丙午高麗鄯善國並遣使朝獻戊申詔驃騎大將軍樂平王丕等五將率騎四萬東伐文通秋七月田於棝楊己卯丕等至於和龍徙男女六千口而還八月丙戌遂幸河西粟特國遣使朝獻九月甲戌車駕還宮冬十月癸卯尚書左僕射安原謀反伏誅甲辰行幸定州次于新城宮十有一月乙丑行幸冀州己巳校獵于廣川丙子行幸鄴祀密太后廟諸所過對問高年褒禮賢俊十有二月甲申詔曰操持六柄王者所以統攝平政理訟公卿之所司存勸農平賦宰民之所專急盡力三時黔首之所克濟各修其分謂之有序今更不然何以為治越職侵局有紊綱紀上無定令民知何從自今以後亡匿避難羈旅他鄉皆當歸還舊居不問前罪民相殺害牧守依法平決不聽私輒報復敢有報者誅及宗族鄰伍相助與同罪州郡縣不得妄遣吏卒煩擾民庶若有發調縣宰集鄉邑三老計資定課裒多益寡九品混通不得縱富督貧避強侵弱太守覆檢能否核其殿最列言屬州刺史明考優劣抑退姦吏升進貞良歲盡舉課上臺牧守荷治民之任當宣揚恩化奉順憲典與國同憂直道正身肅居官次不亦善乎癸卯遣使者以太牢祀北嶽二年春正月甲寅車駕還宮二月戊子馮文通遣使朝貢求送侍子帝不許壬辰遣使者十餘輩詣高麗東夷諸國詔諭之三月丙辰劉義隆遣使朝貢辛未平東將軍娥清安西將軍古弼率精騎一萬討馮文通平州刺史元嬰又率遼西將軍會之文通迫急求救於高麗高麗使其大將葛蔓盧以步騎二萬人迎文通甲戌以闕鎮虎牢夏四月甲申皇子小兒苗兒並薨五月乙卯馮文通奔高麗戊午詔散騎常侍封撥使高麗徵送文通丁卯行幸河西赫連定之西也楊難當竊據上邽秋七月庚戌詔驃騎大將軍樂平王丕等督河西高平諸軍討之詔散騎侍郎廣平子游雅等使於劉義隆八月丁亥遣使六輩使西域帝校獵于河西詔廣平公張黎發定州七郡一萬二千人通莎泉道甲辰高車國遣使朝獻九月庚戌驃騎大將軍樂平王丕等至略陽難當奉詔攝上邽守高麗不送文通遣使奉表稱當與文通俱奉王化帝以高麗違詔議將擊之納樂平王丕計而止冬十有一月己酉行幸棝楊驅野馬於雲中置野馬苑閏月壬子車駕還宮乙丑潁川王提改封武昌王河西王沮渠牧犍遣使朝貢是歲吐谷渾慕璝死三年春正月癸未征東大將軍中山王纂薨戊子太尉北平王長孫嵩薨乙巳鎮南大將軍丹陽王叔孫建薨二月乙卯行幸幽州存恤孤老問民疾苦還幸上谷遂至代所過復田租之半高麗契丹國並遣使朝獻三月丁丑以南平王渾為鎮東大將軍儀同三司鎮和龍己卯輿駕還宮癸巳龜茲悅般焉耆車師粟特疏勒烏孫渴槃鄯善諸國各遣使朝獻丁酉劉義隆遣使朝貢夏五月己丑詔曰方今寇逆消殄天下漸晏比年以來屢詔有司班宣惠政與民寧息而內外羣官及牧守令長不能憂勤所司糾察非法廢公帶私更相隱置濁貨為官政存苟且夫法之不用自上犯之其令天下吏民得舉告守令不如法者丙申行幸雲中秋七月戊子使撫軍大將軍永昌王健司空上黨王長孫道生討山胡白龍餘黨於西河滅之八月甲辰行幸河西九月甲申車駕還宮丁酉遺使者拜西秦王慕璝弟慕利延為鎮西大將軍儀同三司改封西平王冬十月癸卯行幸雲中十有一月壬申車駕還宮甲申破洛那者舌國各遣使朝獻奉汗血馬是歲河西王沮渠牧犍世子封壇來朝四年春三月庚辰鄯善王弟素延耆來朝癸未罷沙門年五十已下江陽王根薨是月高麗殺馮文通夏五月戊寅大赦天下丙申行幸五原秋七月壬午車駕北伐事具蠕蠕傳冬十月乙丑大饗六軍十二月丁巳車駕至自北伐上洛巴泉蕇等相率內附詔兼散騎常侍高雅使劉義隆五年春正月庚寅行幸定州三月丁卯詔衛大將軍樂安王範遣雍州刺史葛那取上洛劉義隆上洛太守鐔長生棄郡走辛未車駕還宮庚寅以故南秦王世子楊保宗為征南大將軍秦州牧武都王鎮上邽夏四月丁酉鄯善龜茲疏勒焉耆諸國遣使朝獻五月丁丑治兵於西郊癸未遮逸國獻汗血馬六月甲辰車駕西討沮渠牧犍侍中宜都王穆壽輔皇太子決留臺事大將軍長樂王嵇敬輔國大將軍建寧王崇二萬人屯漠南以備蠕蠕秋七月己巳車駕至上郡屬國城大饗羣臣講武馬射壬午留輜重分部諸軍撫軍大將軍永昌王健尚書令巨鹿公劉潔督諸軍與常山王素二道並進為前鋒驃騎大將軍樂平王丕太宰陽平王杜超督平涼鄜城諸軍為後繼八月甲午永昌王健獲牧犍牛馬畜産二十餘萬牧犍遣弟董來率萬餘人拒戰於城南望塵退走丙申車駕至姑臧牧犍兄子祖踰城來降乃分軍圍之九月丙戌牧犍兄子萬年率麾下來降是日牧犍與左右文武五千人面縛軍門帝解其縛待以藩臣之禮收其城內戶口二十餘萬倉庫珍寶不可稱計進張掖公禿髮保周爵為王與龍驤將軍穆羆安遠將軍源賀分略諸郡雜人降者亦數十萬牧犍弟張掖太守宜得燒倉庫西奔酒泉樂都太守安周南奔吐谷渾遣鎮南將軍奚眷討張掖遂至酒泉牧犍弟酒泉太守無諱及宜得復奔晉昌使弋陽公元潔守酒泉鎮北將軍封沓討樂都掠數千家而還班賜將士各有差戊子蠕蠕犯塞遂至七介山京師大駭皇太子命上黨王長孫道生等拒之事具蠕蠕傳冬十月辛酉車駕東還徙涼州民三萬餘家于京師留驃騎大將軍樂平王丕征西將軍賀多羅鎮涼州癸亥遣張掖王禿髮保周諭諸部鮮卑保周因率諸部叛於張掖十有一月乙巳劉義隆遣使朝獻并獻馴象一是月高麗及粟特渴盤破洛那悉居半諸國各遣使朝獻十有二月壬午車駕至自西伐飲至策勳告於宗廟楊難當寇上邽鎮將元勿頭擊走之是歲鄯善龜茲疏勒焉耆高麗粟特渴盤破洛那悉居半等國並遣使朝貢
