body:
  text: 魏書卷八十九列傳酷吏第七十七于洛侯胡泥李洪之高遵張赦提羊祉崔暹酈道元谷楷淳風既喪姦黠萌生法令滋章刑禁多設為吏罕仁恕之誠當官以威猛為濟魏氏以戎馬定王業武功平海內治任刑罰肅厲為本猛酷之倫所以列之今史于洛侯代人也以勞舊為秦州刺史而貪酷安忍州人富熾奪民呂勝脛纏一具洛侯輒鞭富熾一百截其右腕百姓王隴客刺殺民王羌奴王愈二人依律罪死而已洛侯生拔隴客舌刺其本并刺胸腹二十餘瘡隴客不堪苦痛隨刀戰動乃立四柱磔其手足命將絕始斬其首支解四體分懸道路見之者無不傷楚闔州驚震人懷怨憤百姓王元壽等一時反叛有司糾劾高祖詔使者於州刑人處宣告兵民然後斬洛侯以謝百姓胡泥代人也歷官至司衞監賜爵永城侯泥率勒禁中不憚豪貴殿中尚書叔孫侯頭應內直而闕於一時泥以法繩之侯頭恃寵遂與口諍高祖聞而嘉焉賜泥衣服一襲出為幽州刺史假范陽公以北平陽尼碩學遂表薦之遷平東將軍定州刺史以暴虐刑罰酷濫受納貨賄徵還戮之將就法也高祖臨太華殿引見遣侍臣宣詔責之遂就家賜自盡李洪之本名文通農人少為沙門晚乃還俗真君中為狄道護軍賜爵安陽男會永昌王仁隨世祖南征得元后姊妹二人洪之以宗人潛相餉遺結為兄弟遂便如親頗得元后在南兄弟名字乃改名洪之及仁坐事誅元后入宮得幸於高宗生顯祖元后臨崩昭太后問其親因言洪之為兄與相訣經日具條列南方諸兄珍之等手以付洪之遂號為顯祖親舅太安中珍之等兄弟至都與洪之相見元后平生故事計長幼為昆季以外戚為河內太守進爵任城侯威儀一同刺史河內北連上黨南接武牢地險人悍數為劫害長吏不能禁洪之至郡嚴設科防募斬賊者便加重賞勸農務本盜賊止息誅鋤姦黨過為酷虐後為懷州刺史封汲郡公徵拜內都大官河西羌胡領部落反叛顯祖親征命洪之與侍中東郡王陸定總統諸軍輿駕至并州詔洪之為河西都將討山胡皆保險拒戰洪之築壘於石樓南白鷄原以對之諸將悉欲進攻洪之乃開以大信聽其復業胡人遂降顯祖嘉之遷拜尚書外都大官後為使持節安南將軍秦益二州刺史至治設禁姦之制有帶刃行者罪與劫同輕重品格各有條章於是大饗州中豪傑長老示之法制乃夜密遣騎分部覆諸要路有犯禁者輒捉送州宣告斬決其中枉見殺害者百數赤葩渴郎羌深居山谷雖相羈縻王人罕到洪之芟山為道廣十餘步示以軍行之勢乃興軍臨其境山人驚駭洪之將數十騎至其里閭撫其妻子問所疾苦因資遺之衆羌喜悅求編課調所入十倍於常洪之善御戎夷頗有威惠而刻害之聲聞於朝野初洪之微時妻張氏助洪之經營資產自貧至貴多所補益有男女幾十人洪之後得劉氏劉芳從妹洪之欽重而疏薄張氏為兩宅別居偏厚劉室由是二妻妬競互相訟詛兩宅母子往來如讎及莅西州以劉自隨洪之素非廉清每多受納時高祖始建祿制法禁嚴峻司察所聞無不窮糾遂鎖洪之赴京高祖臨太華庭集羣官有司奏洪之受贓狼藉又以酷暴高祖親臨數之以其大臣聽在家自裁洪之志性慷慨多所堪忍疹疾灸療艾炷圍將二寸首足十餘處一時俱下而言笑自若接賓不輟及臨自盡沐浴換衣防卒扶持將出却入遍遶家庭如是再三泣歎良久乃臥而引藥始洪之託為元后兄公私自同外戚至此罪後高祖乃稍對百官辨其誣假而諸李猶善相視恩紀如親洪之始見元后計年為兄及珍之等至洪之以元后素定長幼其呼拜坐皆如家人暮年數延攜之宴飲醉酣之後攜之時或言及本末洪之則起而加敬笑語自若富貴赫弈當舅戚之家遂棄宗專附珍之等後頗存振本屬而猶不顯然劉氏四子長子神自有傳高遵字世禮勃海艹修人父濟滄水太守遵賤出兄矯等常欺侮之及父亡不令在喪位遵遂馳赴平城歸從祖兄中書令允允乃為遵父舉哀以遵為喪主京邑無不弔集朝貴咸識之徐歸奔赴免喪允為營宦路得補樂浪王侍郎遵感成益之恩事允如諸父涉歷文史頗有筆札進中書侍郎詣長安刊燕宣王廟碑進爵安昌子及新製衣冠高祖恭薦宗廟遵形貌莊潔音氣雄暢常兼太祝令跪贊禮事為俯仰之節粗合儀矩由是高祖識待之後與游明根高閭李沖入議律令親對御坐時有陳奏以積年之勞賜粟帛牛馬出為立忠將軍齊州刺史建節歷本州宗鄉改觀而矯等彌妬毀之遵性不廉清在中書時每假歸山東必借備騾馬將從百餘屯逼民家求絲縑不滿意則詬罵不去強相徵求旬月之間縑布千數邦邑苦之遵既臨州本意未弭選召僚吏多所取納又其妻明氏家在齊州母弟舅甥共相憑屬爭求貨利嚴暴非理殺害甚多貪酷之響帝頗聞之及車駕幸鄴遵自州來朝會有赦宥遵臨還州請辭帝於行宮引見誚讓之遵自陳無負帝厲聲曰若無遷都赦必無高遵矣又卿非惟貪惏又虐於刑法謂何如濟陰王猶不免於法卿何人而為此行自今宜自謹約還州仍不悛革齊州人孟僧振至洛訟遵廷尉少卿劉述窮鞫皆如所訴先是沙門道登過遵遵以道登荷寵於高祖多奉以貨深託仗之道登屢因言次申啟救遵帝不省納遂詔述賜遵死時遵子元榮詣洛訟寃猶恃道登不時還赴道登知事決方乃遣之遵恨其妻不與訣別處沐浴引椒而死元榮學尚有文才長於几案位兼尚書右丞為西道行臺至高平鎮遇城翻被害遵弟次文雖無位官而貲產巨萬遵每責其財又結憾於遵吉凶不相往反時論責之張赦提中山安喜人也性雄武有規畫初為虎賁中郎時京畿盜魁自稱豹子虎子並善弓馬遂領逃連及諸畜牧者各為部帥於靈丘雁門間聚為劫害至乃斬人首射其口刺人臍引腸遶樹而共射之以為戲笑其為暴酷如此軍騎掩久弗能獲行者患焉赦提設防遏追窮之計宰司善之以赦提為逐賊軍將乃求驍勇追之未幾而獲虎子豹子及其黨與盡送京師斬於闕下自是清靜其靈丘羅思祖宗門豪溢家處隘險多止亡命與之為劫顯祖怒之孥戮其家而思祖家黨相率寇盜赦提應募求捕逐乃以赦提為游徼軍將前後禽獲殺之略盡因而濫有屠害尤為忍酷既資前稱又藉此功除冠軍將軍幽州刺史假安喜侯赦提克己厲約遂有清稱後頗縱妻段氏多有受納令僧尼因事通請貪虐流聞中散李真香出使幽州採訪牧守政績真香驗案其罪赦提懼死欲逃其妻姑為太尉東陽王丕妻恃丕親貴自許詣丕申訴求助謂赦提曰當為訴理幸得申雪願且寬憂不為異計赦提以此差自解慰段乃陳列真香昔嘗因假而過幽州知赦提有好牛從索不果今臺使心協前事故威逼部下拷楚過極橫以無辜證成誣罪執事恐有不盡使駕部令趙秦州重往究訊事伏如前處赦提大辟高祖詔賜死於第將就盡召妻而責之曰貪濁穢吾者卿也又安吾而不得免禍九泉之下當為仇讎矣又有華山太守趙霸酷暴非理大使崔光奏霸云不遵憲度威虐任情至乃手擊吏人僚屬奔走不可以君人字下納之軌物輒禁止在州詔免所居官羊祉字靈祐太山鉅平人晉太僕卿琇之六世孫也父規之宋任城令世祖南討至鄒山規之與魯郡太守崔邪利及其屬縣徐通愛猛之等俱降賜爵鉅平子拜雁門太守祉性剛愎好刑名為司空令輔國長史襲爵鉅平子侵盜公資私營居宅有司案之抵死高祖特恕遠徙後還景明初為將作都將加左軍將軍四年持節為梁州軍司討叛氐正始二年王師伐蜀以祉假節龍驤將軍益州刺史出劍閣而還又以本將軍為秦梁二州刺史加征虜將軍天性酷忍又不清潔坐掠人為奴婢為御史中尉王顯所彈免高肇南征祉復被起為光祿大夫假平南將軍持節領步騎三萬先驅趣涪未至世宗崩班師夜中引軍山有二徑軍人迷而失路祉便斬隊副楊明達梟首路側為中尉元昭所劾會赦免後加平北將軍未拜而卒贈安東將軍兗州刺史太常少卿元端博士劉臺龍議諡曰祉志存埋輪不避強禦及贊戎律熊武斯裁仗節撫藩邊夷識德化沾殊類襁負懷仁謹依諡法布德行剛曰景宜諡為景侍中侯剛給事黃門侍郎元纂等駁曰臣聞惟名與器弗可妄假定諡準行必當其迹案祉志性急酷所在過威布德罕聞暴聲屢發而禮官虛述諡之為景非直失於一人實毀朝則請還付外準行更量虛實靈太后令曰依駁更議元端臺龍上言竊惟諡者行之迹狀者迹之稱然尚書銓衡是司釐品庶物若狀與跡乖應抑而不受錄其實狀然後下寺依諡法準狀科上豈有捨其行迹外有所求去狀去稱將何所準檢祉以母老辭藩乃降手詔云卿綏撫有年聲實兼著安邊寧境實稱朝望及其歿也又加顯贈言祉誠著累朝效彰內外作牧岷區字萌之績驟聞詔冊褒美無替倫望然君子使人器之義無求備德有數德優劣不同剛而能克亦為德焉謹依諡法布德行剛曰景謂前議為允司徒右長史張烈主簿李瑒刺稱案祉歷宦累朝當官之稱委捍西南邊隅靖遏準行易名奬誡攸在竊謂無虧體例尚書李韶又述奏以府寺為允靈太后可其奏祉自當官不憚強禦朝廷以為剛斷時有檢覆每令出使好慕名利頗為深文所經之處人號天狗下及出將臨州並無恩潤兵民患其嚴虐焉崔暹字元欽本云清河東武城人也世家于滎陽潁川之間性猛酷少仁恕姦猾好利能事勢家初以秀才累遷南兗州刺史盜用官瓦贓污狼藉為御史中尉李平所糾免官後行豫州事尋即真坐遣子析戶分隸三縣廣占田宅藏匿官奴障吝陂葦侵盜公私為御史中尉王顯所彈免官後累遷平北將軍瀛州刺史貪暴安忍民庶患之嘗出獵州北單騎至於民村井有汲水婦人暹令飲馬因問曰崔瀛州何如婦人不知其暹也答曰百姓何罪得如此癩兒刺史暹默然而去以不稱職被解還京武川鎮反詔暹為都督隸大都督李崇討之違崇節度為賊所敗單騎潛還禁於廷尉以女妓園田貨元叉獲免建義初遇害於河陰贈司徒公冀州刺史追封武津縣公子瓚字紹珍位兼尚書左丞卒瓚妻莊帝妹也後封襄城長公主故特贈瓚冀州刺史子茂字祖昂襲祖爵酈道元字善長范陽人也青州刺史範之子太和中為尚書主客郎御史中尉李彪以道元秉法清勤引為治書侍御史累遷輔國將軍東荊州刺史威猛為治蠻民詣闕訟其刻峻坐免官久之行河南尹尋即真肅宗以沃野懷朔薄骨律武川撫冥柔玄懷荒禦夷諸鎮並改為州其郡縣戍名令準古城邑詔道元持節兼黃門侍郎與都督李崇籌宜置立裁減去留儲兵積粟以為邊備未幾除安南將軍御史中尉道元素有嚴猛之稱司州牧汝南王悅嬖近左右丘念常與臥起及選州官多由於念念匿於悅第時還其家道元收念付獄悅啟靈太后請全之敕赦之道元遂盡其命因以劾悅是時雍州刺史蕭寶夤反狀稍露悅等諷朝廷遣為關右大使遂為寶夤所害死於陰盤驛亭道元好學歷覽奇書撰注水經四十卷本志十三篇又為七聘及諸文皆行於世然兄弟不能篤穆又多嫌忌時論薄之谷楷昌黎人濮陽公渾曾孫稍遷奉車都尉時沙門法慶反於冀州雖大軍討破而妖帥尚未梟除詔楷詣冀州追捕皆擒獲之楷眇一目而性甚嚴忍前後奉使皆以酷暴為名時人號曰瞎虎尋為城門校尉卒史臣曰士之立名其途不一或以循良進或以嚴酷顯故寬猛相資德刑互設然不嚴而化君子所先于洛侯等為惡不同同歸於酷肆其毒螫多行殘忍賤人肌膚同諸木石輕人性命甚於芻狗長惡不悛鮮有不及故或身嬰罪戮或憂恚顛隕異途皆斃各其宜焉凡百君子以為有天道矣
