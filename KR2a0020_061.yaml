body:
  text: 魏書卷五十六列傳第四十四鄭羲崔辨鄭羲字幼驎滎陽開封人魏將作大匠渾之八世孫也曾祖豁慕容垂太常卿父曄不仕娶于長樂潘氏生六子粗有志氣而羲第六文學為優弱冠舉秀才尚書李孝伯以女妻之高宗末拜中書博士天安初劉彧司州刺史常珍奇據汝南來降顯祖詔殿中尚書元石為都將赴之并招慰淮汝遣羲參石軍事到上蔡珍奇率文武三百人來迎既相見議欲頓軍於汝北未即入城羲謂石曰機事尚速今珍奇雖來意未可量不如直入其城奪其管籥據有府庫雖出其非意要以全制為勝石從羲言遂策馬徑入其城城中尚有珍奇親兵數百人在珍奇宅內石既克城意益驕怠置酒嬉戲無警防之虞羲謂石曰觀珍奇甚有不平之色可嚴兵設備以待非常其夜珍奇果使人燒府廂屋欲因救火作難以石有備乃止明旦羲齎白虎幡慰郭邑衆心乃定明年春又引軍東討汝陰劉彧汝陰太守張超城守不下石率精鋭攻之不克遂退至陳項議欲還軍長社待秋擊之諸將心樂早還咸稱善計羲曰今張超驅市人負擔石蟻聚窮城命不延月宜安心守之超食已盡不降當走可翹足而待成擒物也而欲棄還長社道塗懸遠超必修城深多積薪穀將來恐難圖矣石不納遂旋師長社至冬復往攻超超果設備無功而還歷年超死楊文長代戍食盡城潰乃克之竟如羲策淮北平遷中書侍郎延興初陽武人田智度年十五妖惑動衆擾亂京索以羲河南民望為州郡所信遣羲乘傳慰諭羲到宣示禍福重加募賞旬日之間衆皆歸散智度奔潁川尋見擒斬以功賜爵平昌男加鷹揚將軍高祖初兼員外散騎常侍假寧朔將軍陽武子使於劉準中山王睿寵幸當世並置王官羲為其傅是後歷年不轉資産亦乏因請假歸遂磐桓不返及李沖貴寵與羲姻好乃就家徵為中書令文明太后為父燕宣王立廟於長安初成以羲兼太常卿假滎陽侯具官屬詣長安拜廟刊石建碑於廟門還以使功仍賜侯爵加給事中出為安東將軍西兗州刺史假南陽公羲多所受納政以賄成性又嗇吝民有禮餉者皆不與杯酒臠肉西門受羊酒東門酤賣之以李沖之親法官不之糾也酸棗令鄭伯孫鄄城令童騰別駕賈德治中申靈度並在任廉貞勤恤百姓羲皆申表稱薦時論多之文明太后為高祖納其女為嬪徵為祕書監太和十六年卒贈帛五百匹尚書奏諡曰宣詔曰蓋棺定諡先典成式激揚清濁治道明範故何曾幼孝良史不改繆醜之名賈充寵晉直士猶立荒公之稱羲雖宿有文業而治闕廉清稽古之效未光於朝策昧貨之談已形於民聽諡以善問殊乖其衷又前歲之選匪由備行充舉自荷後任勳績未昭尚書何乃情遺至公愆違明典依諡法博聞多見曰文不勤成名曰靈可贈以本官加諡文靈長子懿字景伯涉歷經史善當世事解褐中散尚書郎稍遷驃騎長史尚書吏部郎太子中庶子襲爵滎陽伯懿間雅有治才為高祖所器遇拜長兼給事黃門侍郎司徒左長史世宗初以從弟思和同咸陽王禧之逆與弟通直常侍道昭俱坐緦親出禁拜太常少卿加冠軍將軍出為征虜將軍齊州刺史尋進號平東將軍懿好勸課善斷決雖不潔清義然後取百姓猶思之永平三年卒贈本將軍兗州刺史諡曰穆子恭業襲爵武定三年坐與房子遠謀逆伏誅懿弟道昭字僖伯少而好學綜覽羣言初為中書學生遷祕書郎拜主文中散徙員外散騎侍郎祕書丞兼中書侍郎從征沔漢高祖饗侍臣於懸瓠方丈竹堂道昭與兄懿俱侍坐焉樂作酒酣高祖乃歌曰白日光天無不曜江左一隅獨未照彭城王協續歌曰願從聖明兮登衡會萬國馳誠混江外鄭懿歌曰雲雷大振兮天門闢率土來賓一正歷邢巒歌曰舜舞干戚兮天下歸文德遠被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合高祖又歌曰遵彼汝墳兮昔化貞未若今日道風明宋辨歌曰文王政教兮暉江沼寧如大化光四表高祖謂道昭曰自比遷務雖猥與諸才俊不廢詠綴遂命邢巒總集記當爾之年卿頻丁艱禍每眷文席常用慨然尋正除中書郎轉通直散騎常侍北海王詳為司徒以道昭與琅邪王秉為咨議參軍遷國子祭酒道昭表曰臣竊以為崇治之道必也須才養才之要莫先於學今國子學堂房粗置弦誦闕爾城南太學漢魏石經丘墟殘毀藜藋蕪穢遊兒牧豎為之歎息有情之輩實亦悼心況臣親司而不言露伏願天慈回神紆盻賜垂鑒察若臣微意萬一合允求重敕尚書門下考論營制之模則五雍可翹立而興毀銘可不日而就樹舊經於帝京播茂範於不朽斯有天下者之美業也不從廣平王懷為司州牧以道昭與宗正卿元匡為州都道昭又表曰臣聞唐虞啓運以文德為本殷周致治以道藝為先然則禮樂者為國之基不可斯須廢也是故周敷文教四海宅心魯秉周禮強齊歸義及至戰國紛紜干戈遞用五籍灰焚羣儒坑殄賊仁義之經貴戰爭之術遂使天下分崩黔黎荼炭數十年間民無聊生者斯之由矣爰暨漢祖於行陳之中尚優引叔孫通等光武中興於撥亂之際乃使鄭衆范升校書東觀降逮魏晉何嘗不殷勤於篇籍篤學於戎伍伏惟大魏之興也雖羣凶未殄戎馬在郊然猶招集英儒廣開學校用能闡道義於八荒布盛德於萬國教靡不懷風無不偃今者乘休平之基開無疆之祚定鼎伊惟新寶曆九服感至德之和四垠懷擊壤之慶而蠢爾閩吳阻化江湫先帝爰震武怒戎車不息而停鑾佇蹕留心典墳命故御史中尉臣李彪與吏部尚書任城王澄等妙選英儒以崇文教澄等依旨置四門博士四十人其國子博士太學博士及國子助教宿已簡置伏尋先旨意在速就但軍國多事未遑營立自爾迄今垂將一紀學官凋落四術寢廢遂使碩儒耆德卷經而不談俗學後生遺本而逐末進競之風實由於此矣伏惟陛下欽明文思玄鑒洞遠越會未款務修道以來之遐方後服敷文教而懷之垂心經素優柔墳籍將使化越軒唐德隆虞夏是故屢發中旨敦營學館房宇既修生徒未立臣學陋全經識蔽篆素然往年刪定律令謬預議筵謹依準前修尋訪舊事參定學令事訖封呈自爾迄今未蒙報判但廢學歷年經術淹滯請學令并制早敕施行使選授有依生徒可準詔曰具卿崇儒敦學之意良不可言新令尋班施行無遠可謂職思其憂無曠官矣道昭又表曰竊惟鼎遷中縣年將一紀縉紳褫業俎豆闕聞遂使濟濟明朝無觀風之美非所以光國宣風納民軌義臣自往年以來頻請學令並置生員前後纍上未蒙一報故當以臣識淺濫官無能有所感悟者也館宇既修生房粗構博士見員足可講習雖新令未班請依舊權置國子學生漸開訓業使播教有章儒風不墜後生覩徙義之機學徒崇知新之益至若孔廟既成釋奠告始揖讓之容請俟令出不報遷祕書監滎陽邑中正出為平東將軍光州刺史轉青州刺史將軍如故復入為祕書監加平南將軍熙平元年卒贈鎮北將軍相州刺史諡曰文恭道昭好為詩賦凡數十篇其在二州政務寬厚不任威刑為吏民所愛子嚴祖頗有風儀粗觀文史歷通直郎通直常侍輕躁薄行不修士業傾側勢家乾沒榮利閨門穢亂聲滿天下出帝時御史中尉綦俊劾嚴祖與宗氏從姊姦通人士咸言之而嚴祖聊無愧色孝靜初除驃騎將軍左光祿大夫鴻臚卿出為北豫州刺史仍本將軍罷州還除鴻臚卿卒贈都督豫兗潁三州諸軍事將軍司空公豫州刺史嚴祖弟敬祖性亦粗疏起家著作佐郎鄭儼之敗也為鄉人所害敬祖弟述祖武定中尚書述祖弟遵祖祕書郎卒贈輔國將軍光州刺史遵祖弟順卒於太常丞自靈太后預政淫風稍行及元叉擅權公為姦穢自此素族名家遂多亂雜法官不加糾治婚宦無貶於世有識咸以歎息矣羲五兄長白驎次小白次洞林次叔夜次連山並恃豪門多行無禮鄉黨之內疾之若讎白驎孫道慓隨郡太守小白中書博士子胤伯有當世器幹自中書博士遷侍郎轉司空長史高祖納其女為嬪出為建威將軍東徐州刺史轉廣陵王征東府長史帶齊郡內史卒於鴻臚少卿諡曰簡子希俊未官而亡子道育武定中開封太守希俊弟幼儒好學修謹時望甚優丞相高陽王雍以女妻之歷尚書郎通直郎司州別駕有當官之稱卒贈散騎常侍安東將軍兗州刺史諡景幼儒亡後妻淫蕩凶悖肆行無禮子敬道敬德並亦不才俱走於關右幼儒從兄伯猷每謂所親曰從弟人才足為令德不幸得如此婦今死復重死可為悲嘆胤伯弟平城太尉咨議廣陵王羽納其女為妃出為東平原太守性清狂使酒為政貪殘卒贈征虜將軍南青州刺史長子伯猷博學有文才早知名舉司州秀才以射策高第除幽州平北府外兵參軍轉太學博士領殿中御史與當時名勝咸申遊款肅宗釋奠詔伯猷録義安豐王延明之征徐州也引為行臺郎中事寧還都遷尚書外兵郎中典起居注以軍功賜爵陽武子稍遷散騎常侍平東將軍前廢帝初以舅氏超授征東將軍金紫光祿大夫領國子祭酒久之為車騎將軍右光祿大夫轉護軍將軍元象初以本官兼散騎常侍使於蕭衍前後使人蕭衍令其侯王於馬射之日宴對申禮伯猷之行衍令其領軍將軍臧盾與之相接議者以此貶之使還除驃騎將軍南青州刺史在州貪婪妻安豐王元延明女專為聚斂貨賄公行潤及親戚戶口逃散邑落空虛乃誣良民云欲反叛籍其資財盡以入己誅其丈夫婦女配沒百姓怨苦聲聞四方為御史糾劾死罪數十條遇赦免因以頓廢齊文襄王作相每誡厲朝士常以伯猷及崔叔仁為諭武定七年除太常卿其年卒年六十四贈驃騎大將軍中書監兗州刺史伯猷弟仲衡武定中儀同開府中郎仲衡弟輯之解褐奉朝請領侍御史以軍功賜爵城臯男稍遷黎陽太守屬元皓入洛令其舅范遵鎮守滑臺與輯之隔岸相對遵潛軍夜渡規欲掩襲輯之率厲城民拒河撀之遵遂遁走朝廷嘉之除司州別駕尋轉司空長史遷鎮南將軍金紫光祿大夫孝靜初除征南將軍東濟北太守帶肥城戍主男如故天平四年卒時年四十九贈都督北豫梁二州諸軍事驃騎將軍度支尚書北豫州刺史輯之弟懷孝武定中司徒咨議洞林子敬叔司州都官從事滎陽邑中正濮陽太守坐貪穢除名子籍字承宗徐州平東府長史籍弟瓊字祖珍有強幹之稱自太尉咨議為范陽太守治頗有聲卒贈太常少卿孝昌中弟儼寵要重贈安東將軍青州刺史瓊兄弟雍睦其諸娣姒亦咸相親愛閨門之內有無相通為時人所稱美子道雍歿關西儼事在恩幸傳敬叔弟士恭燕郡太守孝昌中因儼之勢除衛尉少卿尋遷左將軍瀛州刺史時葛榮寇竊河北州城淪陷不獲之鎮尋除征北將軍金紫光祿大夫又遷衛將軍右光祿大夫永熙中卒贈驃騎將軍冀州刺史重贈尚書左僕射諡曰貞長子子貞司空掾遷從事中郎南兗州開府司馬子貞弟子湛齊濟二州長史光祿大夫子湛弟昭伯武定中東平太守昭伯弟子嘉早卒子大護武定中司空戶曹參軍叔夜子伯夏司徒咨議東萊太守卒贈冠軍將軍太常少卿青州刺史子忠字周子右軍將軍鎮遠將軍卒贈平東將軍徐州刺史弟豪長水校尉東平原太守伯夏弟謹字仲恭琅邪太守子嵩賓歷尚書郎員外常侍稍遷至左光祿大夫卒連山性嚴暴撾撻僮僕酷過人理父子一時為奴所害斷首投馬槽下乘馬北逝其第二子思明驍勇善騎射披髮率村義馳騎追之及於河奴乘馬投水思明止將從不聽放矢乃自射之一發而中落馬隨流衆人擒執至家臠而殺之思明及弟思和並以武功自效思明至驍騎將軍直閣將軍坐弟思和同元禧逆徙邊會赦卒於家後贈冠軍將軍濟州刺史子先護少有武幹解褐員外郎轉通直郎莊帝之居藩也先護深自結託及爾朱榮稱兵向洛靈太后令先護與鄭季明等固守河梁先護聞莊帝即位於河北遂開門納榮以功封平昌縣開國侯邑七百戶轉通常侍加鎮北將軍尋除前將軍廣州刺史假平南將軍當州都督時妖賊劉舉於濮陽起逆詔先護以本官為東道都督討舉平之還鎮後元皓入洛莊帝北巡先護據州起義兵不受皓命皓遣尚書令臨淮王彧率衆討之先護出城拒戰莊帝還京嘉其誠節除使持節散騎常侍都督襄廣二州諸軍事鎮南將軍刺史如故進爵郡公增邑一千三百戶尋轉征西將軍東雍州刺史假車騎將軍當州都督常侍如故未之任又轉都督二豫東雍三州諸軍事征東將軍豫州刺史餘官如故又兼尚書右僕射二豫郢潁四州行臺尋除車騎將軍左衛將軍及爾朱榮死徐州刺史爾朱仲遠擁兵向洛前至東郡諸軍出討不能制之乃詔先護以本官假驃騎將軍大都督領所部與行臺楊昱同討之莊帝又遣都督賀拔勝討仲遠勝於陳降賊戰士離心尋聞京師不守先護部衆逃散遂竄伏於南境前廢帝初仲遠遣人招誘之既出而害焉出帝時贈持節都督青齊濟兗四州諸軍事驃騎大將軍儀同三司青州刺史開國如故思和歷太尉中兵參軍同元禧之逆伏法子康業通直郎出帝時坐事賜死子彬武定末齊王相國中兵參軍思和弟季長太學博士卒子喬歷司州治中驃騎將軍左光祿大夫羲叔父簡簡孫尚壯健有將略屢為統軍東西征討以軍功賜爵汝陽男歷位尚書郎步兵校尉驍騎將軍遷輔國將軍太尉司馬出為濟州刺史將軍如故為政寬簡百姓安之卒贈本將軍豫州刺史諡曰惠子貴賓襲解褐北海王國常侍員外散騎侍郎稍遷尚書金部郎以公坐免官久之兼太尉屬卒贈征虜將軍荊州刺史子景裕襲武定末儀同開府行參軍貴賓弟次珍卒於員外常侍贈安東將軍光州刺史貴賓異母弟大倪小倪皆粗險薄行好為劫盜侵暴鄉里百姓毒患之普泰中並為爾朱仲遠所殺尚從父兄雲字道漢歷雁門濮陽二郡貪穢狼籍肅宗時納賄劉騰得為龍驤將軍安州刺史坐選舉受財為御史所糾因暴病卒雲從父兄子敬賓自祕書郎稍遷輔國將軍中散大夫魏郡太守金紫光祿大夫子士淵司空行參軍羲從父兄德玄顯祖初自淮南內附拜滎陽太守子頴考太和中復為滎陽太守卒贈冠軍將軍豫州刺史開封侯諡曰惠子洪建太尉祭酒同元禧之逆與弟祖育同伏法永安中特追贈平東將軍齊州刺史子士機性識不周多有短失歷散騎侍郎司空從事中郎中書郎卒子道蔭武定末開府行參軍祖育太尉祭酒亦特贈平東將軍豫州刺史祖育弟仲明奉朝請稍遷太尉屬以公強當世為從弟儼所昵除滎陽太守儼慮世難欲以東道託之建義初仲明弟季明遇害河陰儼後歸之欲與起兵尋為城民所殺仲明兄洪健李沖女壻建義初莊帝以仲明舅氏之親其弟與謀扶戴仲明之死也且有奉國之意乃追封安平縣開國侯邑七百戶贈侍中車騎大將軍儀同三司尚書左僕射雍州刺史長子道門仲明初謀起義令道門說大都督李叔仁於大梁叔仁始欲同舉後聞莊帝已立叔仁子拔江乃斬道門建義中特贈立節將軍瓜州刺史道門弟孝雍襲天保初爵隨例降仲明弟季亮司徒城局參軍員外常侍卒贈散騎常侍撫軍將軍青州刺史季亮弟季明釋褐太學博士正光中譙郡太守帶渦陽戍主頻為蕭衍遣將攻圍兵糧寡少外援不接季明孤城自守卒得保全朝廷嘉之封安德縣開國伯邑七百戶纍遷平東將軍光祿少卿武泰中潛通爾朱榮謀奉莊帝及在河陽遂為亂兵所害事寧追封南潁川郡開國公食邑千五百戶贈驃騎大將軍尚書左僕射司空公定州刺史子昌襲武定末司徒城局參軍天保初爵隨例降崔辨字神通博陵安平人學涉經史風儀整峻顯祖徵拜中書博士散騎侍郎平遠將軍武邑太守政事之餘專以勸學為務年六十二卒贈安南將軍定州刺史諡曰恭長子景俊梗正有高風好古博涉以經明行修徵拜中書博士歷侍御史主文中散受敕接蕭頤使蕭琛范雲高祖賜名為逸後為員外散騎侍郎與著作郎韓興宗參定朝儀雅為高祖所知重遷國子博士每有公事逸常被詔獨進博士特命自逸始轉通直散騎常侍廷尉少卿卒朝廷悼惜之贈以本官子巨倫字孝宗幼孤及長歷涉經史有文學武藝以世宗挽郎除冀州鎮北府墨曹參軍太尉記室參軍叔楷為殷州巨倫仍為長史北道別將在州陷賊斂恤亡存為賊所義葛榮聞其才名欲用為黃門侍郎巨倫心惡之至五月五日會集官僚令巨倫賦詩巨倫乃曰五月五日時天氣已大熱狗便呀欲死牛復吐出舌以此自晦獲免未幾潛結死士數人夜中南走逢賊遊騎數百俱恐不濟巨倫曰寧南死一寸豈北生一尺也便欺賊曰吾受敕而行賊不信共爇火觀敕火未然巨倫手刃賊帥餘人因與奮擊殺傷數十人賊乃四潰得馬數匹而去夜陰失道惟看佛塔戶而行到洛朝廷嘉之授持節別將北討初楷喪之始巨倫收殯倉卒事不周固至是遂偷路改殯并竊家口以歸尋授國子博士莊帝即位假節中堅將軍東濮陽太守假征虜將軍別將時河北紛梗人士避賊多住郡界歲儉飢乏巨倫傾資贍恤務相全濟時類高之元皓入洛據郡不從莊帝還宮行西兗州事封漁陽縣開國男邑二百戶尋除光祿大夫三年卒時年四十四子武襲武定中懷州衛軍府録事參軍齊受禪爵例降初巨倫有姊明惠有才行因患眇一目內外親類莫有求者其家議欲下嫁之巨倫姑趙國李叔胤之妻高明慈篤聞而悲感曰吾兄盛德不幸早世豈令此女屈事卑族乃為子翼納之時人歎其義崔氏與翼書詩數十首辭理可觀逸弟模字叔軌身長八尺圍亦如之出後其叔雅有志度起家奉朝請歷太尉祭酒尚書金部郎中太尉主簿轉中郎遷太子家令以公事免神龜中詔復本資除冠軍將軍中散大夫出除魯陽太守正光二年襄陽民密求款附詔模為別將隸淮南王世遵率衆赴之事覺模焚襄陽邑郭而還坐不克免官及蕭寶夤討關隴引模為西征別將屢有戰功除持節光祿大夫都督別道諸軍事加安東將軍万俟醜奴遣將郝虎南侵模攻破其營擒虎以功封槐里縣開國伯邑五百戶於時將督敗歿者多模挫敵持重號為名將後假征東將軍行岐州事未幾擊賊入深沒於陳贈撫軍將軍相州刺史永熙中追録前勳又贈都督定相冀三州諸軍事驃騎大將軍儀同三司相州刺史子士護模弟楷字季則美風望性剛梗有當世幹具釋褐奉朝請員外散騎侍郎廣平王懷文學正始中以王國官非其人多被刑戮惟楷與楊昱以數諫獲免後為尚書左主客郎中伏波將軍太子中舍人左中郎將以黨附高肇為中尉所劾事在高聰傳楷性嚴烈能摧挫豪強故時人語曰莫蘝都買反楾孤楷反付崔楷於時冀定數州頻遭水害楷上疏曰臣聞有國有家者莫不以萬姓為心故矜傷軫於造次求瘼結於寢興黎民阻飢唐堯致歎衆庶斯饉帝乙罰己良以為政與農實繫民命水旱緣茲以得濟夷險用此而獲安頃東北數州頻年淫雨長河激浪洪波汨流川陸連濤原隰通望彌漫不已泛濫為災戶無擔石之儲家有藜藿之色華壤膏腴變為舄鹵菽麥禾黍化作雚蒲斯用痛心徘徊口自本然佇立也昔洪水為害四載流於夏書九土既平攸同紀自虞誥亮由君之勤恤臣用劬勞日昃忘餐宵分廢寢伏惟皇魏握圖臨宇總契裁極道敷九有德被八荒槐階棘路實維英哲虎門麟閣實曰賢明天地函和日月光曜自比定冀水潦無歲不飢幽瀛川河頻年泛溢豈是陽九厄會百六鍾期故以人事而然非為運極昔魏國鹹舄史起哂之茲地荒蕪臣實為不揆愚瞽輒敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一準古法皆循舊隄何者河決瓠子梁楚幾危宣防既建水還舊迹十數年間戶口豐衍又決屯氏兩川分流東北數郡之地僅得支存及下通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毀滅良由水大渠狹更不開瀉衆流壅塞曲直乘之所致也至若量其逶迤穿鑿涓澮分立隄堨所在疏通預決其路令無停蹙隨其高下必得地形土木參功務從便省使地有金隄之堅水有非常之備鈎連相注多置水口從河入海遠邇徑通瀉其墝潟泄此陂澤九月農罷量役計功十月昏正立匠表度縣遣能工麾畫形勢郡發明使籌察可否審地推岸辨其脈流樹板分崖練厥從往別使案檢分剖是非瞰睇川原明審通塞當境修治不勞役遠終春自罷未須久功即以高下營田因於水陸水種粳稻陸藝桑麻必使室有久儲門豐餘積其實上葉禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢汙下雲雨陰霖動彌旬月遙途遠運惟用舟艫南畝畬菑微事耒耜而衆庶未為饉色黔首罕有飢顏豈天德不均致此偏罰故是地勢異圖有茲豐餒臣既鄉居水際目覩荒殘每思鄭白屢想王李夙宵不寐言念皇家愚誠丹款實希效力有心螢爝乞暫施行使數州士女無廢耕桑之業聖世洪恩有賑飢荒之士鄴宰深笑息自一朝臣之至誠申於今日詔曰頻年水旱為患黎民阻飢靜言念之昃不遑食鑒此事條深協在慮但計畫功廣非朝夕可合宜付外量聞事遂施行楷用功未就詔還追罷久之京兆王繼為大將軍西討引楷為司馬還轉後將軍廣平太守後葛榮轉盛諸將拒擊並皆失利孝昌初加楷持節散騎常侍光祿大夫兼尚書北道行臺尋轉軍司未幾分定相二州四郡置殷州以楷為刺史加後將軍楷至州表曰竊惟殷州地實四衝居當五裂西通長山東漸臣野頃國路康寧四方有截仍聚姦宄桴鼓時鳴況今天長喪亂妖災間起定州逆虜趑趣北界鄴下凶燼蠶噬腹心兩處犬羊勢足并合城下之戰匪暮斯朝臣以不武屬此屏捍實思效力以弱敵強析骸煮弩固此忠節但基趾造創庶事茫然升儲尺刃聊自未有雖欲竭誠莫知攸濟謹列所須兵仗請垂矜許必當虎視一方遏其侵軼肅清境內保全所委詔付外量竟無所給葛榮自破章武廣陽二王之後鋒不可當初楷將之州人咸勸留家口單身述職楷曰貪人之祿憂人之事如一身獨往朝廷謂吾有進退之計將士又誰肯為人固志也遂合家赴州三年春賊勢已逼或勸減小弱以避之乃遣第四女第三兒夜出既而召僚屬共論之咸曰女郎出嫁之女郎君小未勝兵留之無益去復何損且使君在城家口尚多足固將士之意竊不足為疑楷曰國家豈不知城小力弱也置吾死地令吾死耳一朝送免兒女將謂吾心不固虧忠全愛臧獲之況吾荷國重寄也遂命追還州既新立了無禦備之具及賊來攻楷率力抗拒強弱勢懸每勒兵士撫厲之莫不爭奮咸稱崔公尚不惜百口吾等何愛一身速戰半旬死者相枕力竭城陷楷執節不屈賊遂害之時年五十一長子士元舉茂才平州録事參軍假征虜將軍防城都督隨楷之州州陷亦戰歿楷兄弟父子並死王事朝野傷歎焉贈使持節散騎常侍鎮軍將軍定州刺史永熙中又特贈侍中都督冀定相三州諸軍事驃騎大將軍儀同三司冀州刺史士元弟士謙士約並歿關西士約弟士順儀同開府行參軍士元息勵德武定中司徒城局參軍史臣曰鄭羲機識明悟為時所許懿兄弟風尚俱有可觀故能並當榮遇其濟美矣嚴祖穢薄忝其家世幼儒令問促年伯猷賄以敗業惜乎崔辨器業著聞位不遠到逸經明行高籍甚太和之日德優官薄仍世恨之模雄壯之烈楷忠貞之操殺身成義臨難如歸非大丈夫亦何能以若此
