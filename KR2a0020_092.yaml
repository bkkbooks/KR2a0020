body:
  text: 魏書卷八十六列傳孝感第七十四趙琰長孫慮乞伏保孫益德董洛生楊引閻元明吳悉達王續生李顯達張升倉跋王崇郭文恭經云孝德之本孝悌之至通於神明此蓋生人之大者淳風既遠世情雖薄孔門有以責衣錦詩人所以思素冠且生盡色養之天終極哀思之地若乃誠達泉魚感通鳥獸事匪常倫斯蓋希矣至如溫床扇席灌樹負土時或加人咸為度俗今書趙琰等以孝感為目焉趙琰字叔起天水人父溫為楊難當司馬初苻氏亂琰為乳母攜奔壽春年十四乃歸孝心色養飪熟之節必親調之皇興中京師儉婢簡粟糶之琰遇見切責敕留輕粃嘗送子應冀州娉室從者於路偶得一羊行三十里而琰知之令送於本處又過路傍主人設羊羹琰訪知盜殺卒辭不食遣人買耜刃得剩六耜即令送還刃主刃主高之義而不受琰命委之而去初為兗州司馬轉團城鎮副將還京為淮南王他府長史時禁制甚嚴不聽越關葬於舊兆琰積三十餘年不得葬二親及蒸嘗拜獻未曾不嬰慕卒事每於時節不受子孫慶賀年餘耳順而孝思彌篤慨歲月推移遷窆無期乃絶鹽粟斷諸滋味食麥而已年八十卒遷都洛陽遷都洛陽子應等乃還鄉葬焉應弟煦字賓育好音律以善歌聞於世位秦州刺史長孫慮代人也母因飲酒其父真呵叱之誤以杖擊便即致死真為縣囚執處以重坐慮列辭尚書云父母忿爭本無餘惡直以謬誤一朝橫禍今母喪未殯父命旦夕慮兄弟五人並各幼稚慮身居長今年十五有一女弟始向四歲更相鞠養不能保全父若就刑交墜溝壑乞以身代老父命使嬰弱衆孤得蒙存立尚書奏云慮於父為孝子於弟為仁兄尋究情狀特可矜感高祖詔特恕其父死罪以從遠流乞伏保高車部人也父居顯祖時為散騎常侍領牧曹尚書賜爵寧國侯以忠謹慎密常在左右出內詔命賜宮人河南宗氏亡後賜以宮人申氏宋太子左率申坦兄女也歲餘居卒申撫養伏保性嚴肅捶罵切至而伏保奉事孝謹初無恨色襲父侯爵例降為伯稍遷左中郎將每請祿賜在外公私尺丈所用無不白知出為鄯善鎮將申年餘八十伏保手製馬輿親自扶接申欣然隨之申亡伏保解官奉喪還洛復為長兼南中郎將卒孫益德樂安人也其母為人所害益德童幼為母復仇還家哭於殯以待縣官高祖文明太后以其幼而孝決又不逃罪特免之董洛生代人也居父喪過禮詔遣祕書中散溫紹伯奉璽書慰之令自抑割以全孝道又詔其宗親使相喻奬勿令有滅性之譏楊引鄉郡襄垣人也三歲喪父為叔所養母年九十三卒引年七十五哀毀過禮三年服畢恨不識父追服斬衰食粥粗服誓終身命終十三年哀慕不改為郡縣鄉閭三百餘人上狀稱美有司奏宜旌賞復其一門樹其純孝詔別敕集書標楊引至行又可假以散員之名閻元明河東安邑人也少而至孝行著鄉閭太和五年除北隨郡太守元明以違離親養興言悲慕母亦慈念泣淚喪明元明悲號上訴許歸奉養一見其母母目便開刺史呂壽恩列狀上聞詔下州郡表為孝門復其租調兵役令終母年母亡服終心喪積載每忌日悲慟傍鄰昆弟雍和尊卑諧穆安貧樂道白首同歸又猗氏縣人令狐仕兄弟四人早喪父泣慕十載奉養其母孝著鄉邑而力田積粟博施不已又河東郡人楊風等七百五十人列稱樂戶皇甫奴兄弟雖沉屈兵伍而操尚彌高奉養繼親甚著恭孝之稱又東郡小黃縣人董吐渾兄養事親至孝三世同居閨門有禮景明初畿內大使王凝奏請標異詔從之吳悉達河東聞喜人也弟兄三人年並幼小父母為人所殺四時號慕悲感鄉鄰及長報仇避地永安昆弟同居四十餘載閨門和睦讓逸競勞雖於儉年糊饘不繼賓客經過必傾所有每守宰殯喪私辦車牛送終葬所鄰人孤貧窘困者莫不解衣輟糧以相賑恤鄉閭五百餘人詣州稱頌焉刺史以悉達兄弟行著鄉里板贈悉達父勃海太守悉達後欲改葬亡失墳墓推尋弗獲號哭之聲晝夜不止叫訴神祇忽於悉達足下地陷得父銘記因遷葬曾祖已下三世九喪傾盡資業不假於人哀感毀悴有過初喪有司奏聞標閭復役以彰孝義時有齊州人崔承宗其父於宋世仕漢中母喪因殯彼後青徐歸國遂為隔絶承宗性至孝萬里投險偷路負喪還京師黃門侍郎孫惠蔚聞之曰吾於斯人見廉范之情矣於是弔贈盡禮如舊相識王續生滎陽京縣人也遭繼母憂居喪杖而後起及終禮制鬢髮盡落有司奏聞世宗詔標旌門閭甄其徭役李顯達潁川陽翟人也父喪水漿不入口七日鬢髮墮落形體枯悴六年廬於墓側哭不絶聲殆於滅性州牧高陽王雍以狀奏靈太后詔表其門閭張升滎陽人居父母喪鬢髮墜落水漿不入口吐血數升詔表門閭倉跋滎陽京縣人也喪母水漿不入口五日吐血數升居憂毀瘠見稱州里有司奏聞出帝詔標門閭王崇字乾雍陽夏雍丘人也兄弟並以孝稱身勤稼穡以養二親仕梁州鎮南府主簿母亡杖而後起鬢髮墮落未及葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至有一小鳥素質墨眸形大如雀栖於崇廬朝夕不去母喪始闋復丁父憂哀毀過禮是年陽夏風雹所過之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃竟無損落及過崇地風雹如初咸稱至行所感崇雖除服仍居墓側於其室前生草一根莖葉甚茂人莫能識至冬中復有烏巢於崇屋乳養三子毛羽成長馴而不驚守令聞之親自臨視州以聞奏標其門閭郭文恭太原平遙人也仕為太平縣令年踰七十父母喪亡文恭孝慕罔極乃居祖父墓次晨夕拜跪跣足負土培祖父二墓寒暑竭力積年不已見者莫不哀歎尚書聞奏標其門閭史臣曰塞天地而橫四海者唯孝而已矣然則始敦孝敬之方終極哀思之道厥亦多緒其心一焉蓋上智稟自然之質中庸有企及之義及其成名其美一也趙琰等或出公卿之緒籍禮教以資或出茅簷之下非奬勸所得乃有負土成墳致毀滅性雖乖先王之典制亦觀過而知仁矣
