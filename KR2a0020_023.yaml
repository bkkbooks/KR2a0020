body:
  text: 魏書卷十九下景穆十二王列傳第七下南安王城陽王章武王樂陵王安定王南安王楨皇興二年封加征南大將軍中都大官尋遷內都大官高祖即位除涼州鎮都大將尋以綏撫有能加都督西戎諸軍事征西大將軍領護西域校尉儀同三司涼州刺史徵為內都大官出為使持節侍中本將軍開府長安鎮都大將雍州刺史楨性忠謹事母以孝聞賜帛千匹以褒之徵赴講武高祖引見於皇信堂戒之曰翁孝行著於私庭令問彰於邦國每欽忠懿思一言展故因講武遠徵赴闕仰戀仁慈情在未已但長安鎮年飢民儉理須綏撫不容久留翁今還州其勤隱恤無令境內有飢餒之民翁既國之懿親終無貧賤之慮所宜慎者略有三事一者恃親驕矜違禮僭度二者傲慢貪奢不恤政事三者飲酒遊逸不擇交友三者不去患禍將生但能慎此足以全身遠害光國榮家終始之德成矣而楨不能遵奉後乃聚斂肆情文明太后高祖並臨皇信堂引見王公太后令曰汝陰王天賜南安王楨不順法度黷貨聚斂依犯論坐將至不測卿等為當存親以毀令為欲滅親以明法羣臣咸以二王託體先皇宜蒙矜恕太后不答高祖乃詔曰南安王楨以懿戚之貴作鎮關右不能潔己奉公助宣皇度方肆貪欲殖貨私庭放縱姦囚壅絶訴訟貨遺諸使邀求虛稱二三之狀皆犯刑書昔魏武翦髮以齊衆叔向戮弟以明法克己忍親以率天下夫豈不懷有為而然耳今者所犯事重疇日循古推刑實在難恕皇太后天慈寬篤恩矜國屬每一尋惟高宗孔懷之近發言哽塞悲慟于懷且以南安王孝養之名聞於內外特一原恕削除封爵以庶人歸第禁錮終身後高祖南伐楨從至洛及議遷都首從大計高祖甚悅楨母劉太妃薨高祖親幸臨慰及葬贈布帛綵五百段又以楨議定遷都復封南安王食邑一千戶出為鎮北大將軍相州刺史高祖餞楨於華林都亭詔曰從祖南安既之蕃任將曠違千里豫懷惘戀然今者之集雖曰分歧實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文人下筆高祖送楨於階下流涕而別太和二十年五月至鄴入治日暴風大雨凍死者十數人楨又以旱祈雨于羣神鄴城有石虎廟人奉祀之楨告虎神像云三日不雨當加鞭罰請雨不驗遂鞭像一百是月疽發背薨諡曰惠贈帛一千匹及葬又賜帛千匹遣黃門郎監護喪事及州刺史穆泰謀反楨知而不告雖薨猶追奪爵封國除有五子子英字虎兒性識聰敏博聞強記便弓馬解吹笛微曉醫術高祖時為平北將軍武川鎮都大將假魏公未幾遷都督梁益寧三州諸軍事安南將軍領護西戎校尉仇池鎮都大將梁州刺史高祖南伐為梁漢別道都將後大駕臨鍾離詔英率衆備寇境上英以大駕親動勢傾東南漢中有可乘之會表求進討高祖許之師次沮水蕭鸞將蕭懿遣將尹紹祖梁季羣等領衆二萬徼山立柵分為數處居高視下隔水為營英乃謀曰彼帥賤民慢莫能相服衆而無上罔知適從若選精卒并攻一營彼不相救我克必矣若克一軍四營自拔於是簡兵三面騰上果不相救既破一處四營俱潰生擒梁季羣斬三千餘級俘七百人鸞白馬戍將其夜逃潰乘勝長驅將逼南鄭漢川之民以為神也相率歸附梁州民李天幹等詣英降待以國士之禮天幹等家在南鄭之西請師迎接英遣迎之蕭懿聞而遣將姜修率衆追襲逮夜交戰頗有殺傷修後屢敗復更請軍懿遣衆赴之迎者告急英率騎一千倍道赴救未至賊已退還英恐其入城別遣統軍元拔以隨其後英徼其前合擊之盡俘其衆懿續遣軍英不虞賊至且衆力已疲軍少人懼咸欲奔走英乃緩騎徐行神色自若登高望賊東西指麾狀似處分然後整列而前賊謂有伏兵俄然賊退乘勢追殄遂圍南鄭禁止三軍一無所犯遠近皆供租運先是英未至也蕭懿遣軍主范潔領三千餘人伐獠潔聞大軍圍城欲還救援英遣統軍李平敵李鐵騎等收合巴西晉壽土人以斷其路潔以死決戰遂敗平敵之軍英候其稍近以奇兵掩之盡皆擒獲攻圍九十餘日戰無不克被敕班師英於是先遣老弱身勒精卒留後遣使與懿告別懿以為詐也英還一日猶閉門不開二日之後懿乃遣將追英英親自殿後與士卒下馬交戰賊衆莫敢逼之四日四夜然後賊退全軍而還會山氐並反斷英歸路英勒衆奮擊且戰且行為流矢所中軍人莫有知者以功遷安南大將軍賜爵廣武伯在仇池六載甚有威惠之稱父憂解任高祖討漢陽起英為左衛將軍加前將軍尋遷大宗正又轉尚書仍本將軍鎮荊州蕭寶卷將陳顯達等寇荊州英連戰失利車駕至南陽免英官爵世宗即位行徐州還復尚書廣武伯蕭寶卷遣將軍陳伯之寇淮南司徒彭城王協鎮壽春以英為鎮南將軍率衆討之英未至賊已引退協還詔英行揚州後英還京師上表曰臣聞取亂悔亡有國之常道陳師鞠旅因機而致發竊以區區寶卷罔顧天常憑恃山河敢抗中國今妖逆數亡驕縱日甚威侮五行怠棄三正淫刑以逞虐害無辜其雍州刺史蕭衍東伐秣陵掃土興兵順流而下唯有孤城更無重衛此則皇天授我之日曠載一逢之秋事易走丸理同拾芥此而不乘將欲何待臣乞躬率步騎三萬直指沔陰據襄陽之城斷黑水之路昏虐君臣自相魚肉我居上流威震遐邇長驅南出進拔江陵其路既近不盈五百則三楚之地一朝可收岷蜀之道自成斷絶又命揚徐二州聲言俱舉緣江焚毀靡使所遺建業窮蹙魚遊釜內士治之師再興孫皓之縛重至齊文軌而大同混天地而為一伏惟陛下暫闢旒纊少垂聽覽獨決聖心無取疑議此期脫爽并吞未日事寢不報英又奏曰臣聞乘虛討弱事在速舉因危攻昧徼捷可期今寶卷亂常骨肉相賊蕃戍鼎立莫知所歸義陽孤絶密邇天境外靡糧援之期內無兵儲之固此乃臨焚之鳥不可去薪授首之寇何容緩斧若此行有果則江右之地斯為經略之基如脫否也非直後舉難圖亦或居安生疾今豫州刺史司馬悅已戒嚴垂邁而東豫州刺史田益宗方擬守三關請遣軍司為之節度宗遣直寢羊靈引為軍司以軍功拜吏部尚書以前後軍功進爵常山侯英奏謹案學令諸州郡學生三年一校所通經數因正使列之然後遣使就郡練考臣伏惟聖明崇道顯成均之風蘊義光膠序之美是以太學之館久置於下國四門之教方構於京瀍計習訓淹年聽受纍紀然俊造之流應問於魏闕不革之輩宜返於齊民使就郡練考核其最殿頃以皇都遷構江揚未一故鄉校之訓弗遑正試致使薰蕕之質均誨學庭蘭蕭之體等教文肆今外宰京官銓考向訖求遣四門博士明通五經者道別校練依令黜陟詔曰學業墮廢為日已久非一使能勸比當別敕尋詔英使持節假鎮南將軍都督征義陽諸軍事率衆南討蕭衍司州刺史蔡道恭聞英將至遣其驍騎將軍楊由率城外居民三千餘家於城西南十里賢首山即嶺為三柵作表𩹉之勢英勒諸軍圍賢首壘焚其柵門楊由乃驅水牛從營而出繼之以兵軍人避牛師遂退下尋分兵圍守其夜柵民任馬駒斬由以降三軍館穀降民安堵蕭衍遣其平西將軍曹景宗後將軍王僧炳等率步騎三萬來救義陽僧炳統衆二萬據鑿峴景宗率一萬繼後英遣冠軍將軍元逞揚烈將軍曹文敬進據樊城以抗之英部勒將士掎角討之大破僧炳軍俘斬四千餘人英又於士雅山結壘與景宗相抗分遣諸統伏於四山示之以弱衍將馬仙琕率衆萬餘來掩英營英命諸軍僞北誘之既至平地統軍傅永等三軍擊之賊便奔退進擊潰之斬首二千三百級斬賊羽林監軍鄧終年仙琕又率一萬餘人重來決戰英勒諸將隨便分擊又破之復斬賊將陳秀之統軍王買奴別破東嶺之陳斬首五百道恭憂死驍騎將軍行州事蔡靈恩復憑窮城短兵日接景宗仙琕知城將拔盡鋭決戰一日三交皆大敗而返靈恩勢窘遂降三關戍聞之亦棄城而走詔曰知賊城已下復克三關展威闢境聲略宣振公私稱泰良以欣然將軍淵規內斷忠謨外舉受律揚旌克申廟算雖方叔之制蠻荊邵虎之掃淮浦匹茲蔑如也新州初附宜廣經略想善加檢督必令周固有所委付然後凱旋耳初高祖之平漢陽英有戰功許復其封反為顯達所敗遂寢是役也世宗大悅乃復之改封中山王食邑一千戶遣大使鴻臚少卿睦延吉持節就拜英送蔡靈恩及衍尚書郎蔡僧協前軍將軍義陽太守馮道要游擊將軍鮑懷慎天門太守王承伯平北府司馬宗象平北府咨議參軍伏粲給事中寧朔將軍蔡道基中兵參軍龐修等數十人詔曰會平江南此等便可放歸也英既還世宗引見深嘉勞之後增封一千戶蕭衍遣將軍寇肥梁詔英使持節加散騎常侍征南將軍都督揚徐二道諸軍事率衆十萬討之所在皆以便宜從事詔英曰賊勢滋甚圍逼肥梁邊將後規以至於此故有斯舉必期勝捷而出軍淹滯肥梁已陷聞之惋悶實乖本圖今衆軍雲集十有五萬進取之方其算安在克殄之期復當遠近竟以幾日可至賊所必勝之規何者為先故遣步兵校尉領中書舍人王雲指取機要英表陳事機乃擊破陰陵斬衍將二十五人及虜首五千餘級又頻破賊軍於梁城斬其支將四十二人殺獲及溺死者將五萬衍中軍大將軍臨川王蕭宏尚書右僕射柳惔等大將五人沿淮南走凡收米三十萬石詔勞英曰知大摧鯨寇威振南海江浦無塵三楚卷壒聲被荒隅同軌斯始公私慶慰良副朕懷便當乘威藉響長驅吳會翦拉遺燼截彼東南也英追至于馬頭衍馬頭戍主委城遁走遂圍鍾離詔曰師行已久士馬疲瘠賊城險固卒難攻屠冬春之交稍非勝便十萬之衆日費無資方圖後舉不待今事且可密裝徐嚴為振旅之意整疆完土開示威略左右蠻楚素應逃亡或竄山湖或難制掠若凶渠黠黨有須翦除者便可撲掃以清疆界如其強狡憑阻未易致力者亦不煩肆兵凱旋遲近不復委曲英表曰臣奉辭伐罪志殄逋寇想敵量攻期至二月將末三月之初理在必克但自此月一日以來霖雨連併可謂天違人願然王者行師舉動不易不可以少致睽淹便生異議臣亦諦思若入三月已後天晴地燥憑陵是常如其連雨仍接不得進攻者臣已更高邵陽之橋防其泛突意外洪長慮其破橋臣亦部分造船復於鍾離城隨水狹處營造浮橋至三月中旬橋必克成晴則攻騰雨則圍守水陸二圖以得為限實願朝廷特開遠略少復賜寬假以日月無使為山之功中途而廢詔曰大軍野次已成勞久攻守之方理可豫見比頻得啓制勝不過暮春及省後表復期孟夏之末彼土蒸濘無宜久淹勢雖必取乃將軍之深計兵久力殆亦朝廷之所憂故遣主書曹道往觀軍勢使還一一具聞及道還英猶表云可克四月水盛破橋英及諸將狼狽奔走士衆沒者十有五六英至揚州遣使送節及衣冠貂蟬章綬詔以付典有司奏英經算失圖案劾處死詔恕死為民後京兆王愈反英復王封邑一千戶除使持假征東將軍都督冀州諸軍事英未發而冀州已平時郢州治中督榮祖潛引蕭衍軍以義陽應之三關之戍並據城降衍郢州刺史婁悅嬰城自守懸瓠城民白早生等殺豫州刺史司馬悅據城南叛衍將齊苟仁率衆守懸瓠悅子尚華陽公主并為所劫詔英使持節都督南征諸軍事假征南將軍出自汝南世宗引英謂之曰婁悅綏御失和銓衡暗於簡授故使郢民引寇關戍外奔義陽孤窘有倒懸之切王國之邵虎威名宿震故屈王親總元戎掃清氛穢昔衛霍以胸奴之故居無寧歲今南疆不靖王不得以屢勞為辭也英對曰臣才非韓白識暗孫吳徒以宗室之長頻荷推轂之寄規略淺短失律喪師宜章子反之戮以謝天下陛下慈深念屨愛等鍾牛使臣得同荀伯再生明世誓追孟氏以報復為期關郢微寇何足平殄滅賊方略已在臣目中願陛下勿勞聖慮也世宗曰截彼東南再清隨楚所望於將軍鍾離一眚豈足以損大德今王董彼三軍朕無憂矣世宗以邢巒頻破早生詔英南赴義陽英以衆少纍表請軍世宗弗許而英輒與邢巒分兵共攻懸瓠克之乃引軍而進初苟仁之據懸瓠衍寧朔將軍張道凝等率衆據楚城聞英將至棄城南走英追擊斬道凝及衍虎賁中郎曹苦生盡俘其衆既次義陽將取三關英策之曰三關相須如左右手若克一關兩關不待攻而定攻難不如攻易東關易攻宜須先取即黃石公所謂戰如風發攻如河決英恐其并力於東乃使長史李華率五統向西關分其兵勢身督諸軍向東關先是馬仙琕使雲騎將軍馬廣率衆拒屯於長薄軍主胡文超別屯松峴英至長薄馬廣夜遁入於武陽英進師攻之聞衍遣其冠軍將軍彭生驃騎將軍徐超秀援武陽英乃緩軍曰縱之使入此城吾先曾觀其形勢易攻耳吾取之如拾遺也諸將未之信生等既入武陽英促圍攻之六日而廣等降於是進擊黃峴衍太子左衛率李元履棄城奔竄又討西關衍司州刺史馬仙琕亦即退走果如英策凡擒其大將六人支將二十人卒七千米四十萬石軍資稱是還朝除尚書僕射永平三年英薨給東園祕器朝服一具帛七百匹贈司徒公諡曰獻武王英五子攸字玄興東宮洗馬早卒贈散騎侍郎攸弟熙字真興好學俊爽有文才聲著於世然輕躁浮動英深慮非保家之主常欲廢之立第四子略為世子宗議不聽略又固請乃止起家祕書郎延昌二年襲封纍遷兼將作大匠拜太常少卿給事黃門侍郎尋轉光祿勳時領軍于忠執政熙忠之壻也故歲中驟遷尋除平西將軍東秦州刺史進號安西將軍祕書監尋以本將軍授相州刺史熙以七月入治其日大風寒雨凍死者二十餘人驢馬數十匹熙聞其祖父前事心惡之又有蛆生其庭初熙兄弟並為清河王懌所昵及劉騰元叉隔絶二宮矯詔殺懌熙乃起兵上表曰臣聞安危無常時有休否臣早屬休明晚逢多難自皇基綿茂九葉承光高祖世宗徽明相襲皇太后聖敬自天德同馬鄧至尊神睿纂御神鑒燭遠四海晏如八表歸化而領軍將軍元叉寵藉外親叨榮左右豺狼為心飽便反嚙遂使二宮阻隔溫凊闕禮又太傅清河王橫被屠害致使忠臣烈士喪氣闕庭親賢宗戚憤恨內外妄指鹿馬孰能踰之王董權逼方此非譬臣仰瞻雲闕泣血而生以細草不除將為爛漫況叉悖逆如此孰可忍之臣忝籍枝草口咢思盡力命碎首屠肝甘之若薺今輒起義兵實甲八萬大徒既進文武爭先與并州刺史城陽王徽州刺史廣陽王淵徐州刺史齊王蕭寶夤等同以今月十四日俱發庶仰憑祖宗之靈俯罄義夫之命掃翦凶醜更清京邑臣親總三軍星邁赴難置兵溫城伏聽天旨王公宰輔或世著忠烈或宿佩恩顧如能同力翦除元叉使太后至尊欣然奉對者臣即解甲散兵赴謝朝闕臣雖才乖昔人位居蕃屏寧容坐觀姦醜虛受榮祿哉熙兵起甫十日為其長史柳元章別駕游荊魏郡太守李孝怡率諸城人鼓譟而入殺熙左右四十餘人執熙置之高樓并其子弟叉遣尚書左丞盧同斬之於鄴街傳首京師始熙妃于氏知熙必敗不從其謀自初哭泣不絶至於熙死熙臨刑為五言詩示其僚吏曰義實動君子主辱死忠臣何以明是節將解七尺身與知友別曰平生方寸心殷勤屬知己從今一銷化悲傷無極已熙既蕃王之貴加有文學好奇愛異交結偉俊風氣甚高名美當世先達後進多造其門始熙之鎮鄴也知友才學之士袁翻李琰李神俊王誦兄弟裴敬憲等咸餞於河梁賦詩告別及熙將死復與知故書曰吾與弟並蒙皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宮太傅清河王橫受屠酷主上幼年獨在前殿君親如此無以自安故率兵民建大義於天下但智力淺短旋見囚執上慚朝廷下愧相知本以名義干心不得不爾流腸碎首復何言哉昔李斯憶上蔡黃犬陸機想華亭鶴唳豈不以恍惚無際一去不還者乎今欲對秋月臨春風藉芳草蔭花樹廣召名勝賦詩洛濱其可得乎凡百君子各敬爾宜為國為身善勗名節立功立事為身而已吾何言哉時人憐之又熙於任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免若其不信試看任城家熙夢中顧瞻任城第舍四面牆崩無遺堵焉熙惡之覺而以告所親及熙之死也果如所夢兄弟三人每從英征伐在軍貪暴或因迎降逐北至有斬殺無辜多增首級以為功狀又于忠之誣郭祚裴植也忠意未決害之由熙勸奬遂至極法世以為寃及熙之禍議者以為有報應焉靈太后反政贈使持節都督冀定瀛相幽五州諸軍事大將軍太尉公冀州刺史增本封一千戶諡曰文莊王長子景獻次仲獻次叔獻並與熙同被害後贈景獻中軍將軍青州刺史葬以王禮仲獻左將軍兗州刺史叔獻右將軍齊州刺史叔獻弟叔仁以年幼獲全與母于氏徙朔州孝昌初靈太后詔叔仁歸京師還其財宅襲先爵除征虜將軍通直散騎常侍孝莊初遇害於河陰贈衛大將軍儀同三司并州刺史子琳襲齊受禪爵例降熙弟誘字惠興自員外郎稍遷通直郎太子中庶子征虜將軍衛尉少卿出為右將軍南秦州刺史叉斬之於岐州妻子得不坐追贈車騎大將軍雍州刺史後贈儀同三司追封都昌縣開國伯食邑八百戶諡曰恭子始伯襲給事中齊受禪爵例降誘弟略字俊興才氣劣於熙而有和邃之譽自員外郎稍遷羽林監通直散騎常侍冠軍將軍給事黃門侍郎清河王懌死後叉黜略為懷朔鎮副將未及赴任會熙起兵與略書來去尋值熙敗略遂潛行自託舊識河內司馬始賓始賓便為荻筏夜與略俱渡盟津詣上黨屯留縣栗法光法光素敦信義欣而納之略舊識刁雙時為西河太守略復歸之停止經年雙乃令從子昌送略潛遁江左蕭衍甚禮敬之封略為中山王邑一千戶宣城太守俄而徐州刺史元法僧據城南叛州內士庶皆為法僧擁逼衍乃以略為大都督令詣彭城接誘初附略至屯於河南為安樂王鑒所破略唯數十騎入城衍尋遣其豫章王綜鎮徐州徵略與法僧同還略雖在江南自以家禍晨夜哭泣身若居喪又惡法僧為人與法僧言未嘗一笑衍復除略衡州刺史未行會綜以城歸國綜長史江革司馬祖耳幾將士五千人悉見擒虜肅宗敕有司悉遣革等還南因以徵略衍乃備禮遣之略之將還也衍為置酒餞別賜金銀百斤衍之百官悉送別江上遣其右衛徐確率百餘人送至京師肅宗詔光祿大夫刁雙境首勞問又敕徐州賜絹布各一千匹除略侍中義陽王食邑一千戶還達石人驛亭詔宗室親黨內外百官先相識者聽迎之近郊賜帛三千匹宅一區粟五千石奴婢三十人其司馬始賓除給事中領直後栗法光本縣令刁昌東平太守刁雙西兗州刺史其略所至一餐一宿之處無不霑賞尋改封東平王又拜車騎大將軍左光祿大夫儀同三司領左衛將軍侍中如故又本官領國子祭酒遷大將軍尚書令靈太后甚寵任之其見委信殆與元徽相埒於時天下多事軍國萬端略守常自保無他裨益唯唯具臣而已爾朱榮略之姑夫略素所輕忽略又黨於鄭儼徐紇榮兼銜之榮入洛也見害於河陰贈以本官加太保司空徐州刺史諡曰文貞子景式襲武定中北廣平太守齊受禪爵例降略弟纂字紹興頗有將略為司徒祭酒聞熙舉兵因逃奔於鄴至即見擒與熙俱死追封北平縣公贈安北將軍州刺史改封高唐縣開國侯食邑八百戶子子獻襲卒於涇州司馬熙異母弟義興出後叔父並洛肅宗初除員外散騎侍郎及熙之遇害也義興以別後故得不坐稍遷輔國將軍通直散騎常侍孝莊初於河陰遇害贈中軍將軍瀛州刺史後贈散騎常侍征東將軍餘如故義興妻趙郡李氏李頗有婦工為爾朱榮妻所親昵永安中追封義興燕郡王邑五百戶尋改封巨鹿王又改封武邑王子述襲天平中通直郎齊受禪爵例降英弟怡起家步兵校尉轉城門校尉遷鄯善鎮將所在貪暴為有司所糾逃竄得免延昌中卒莊帝初以爾朱榮婦兄超贈驃騎大將軍太尉公雍州刺史扶風王長子肅起家員外散騎侍郎轉直寢莊帝初封肅魯郡王邑千戶除散騎常侍出為後將軍廣州刺史後除衛將軍肆州刺史其弟曄僭立拜肅侍中太師録尚書事尋改除使持節都督青膠光齊南青五州諸軍事驃騎大將軍東南道大行臺青州刺史不行永熙二年薨贈使持節侍中都督并二州諸軍事本將軍司徒公并州刺史子道與襲除前將軍齊受禪爵例降曄字華興小字盆子性輕躁有膂力起家祕書郎稍遷通直散騎常侍莊帝初封長廣王邑一千戶出為太原太守行并州事爾朱榮之死也世隆等奔還并州與爾朱兆於建興乃推曄為主大赦所部號年建明尋為世隆等所廢前廢帝立封曄為東海王邑萬戶出帝初坐事賜死於第無子爵除城陽王長壽皇興二年封拜征西大將軍外都大官出為沃野鎮都大將性聰惠善撫接在鎮甚有威名延興五年薨諡康王長子多侯早卒次子鸞字宣明始繼叔章武敬王及兄卒還襲父爵身長八尺腰帶十圍以武藝著稱頻為北都大將高祖時拜外都大官又出為持節都督河西諸軍事征西大將軍領護西戎校尉涼州鎮都大將改鎮立州以鸞為涼州刺史姑臧鎮都大將餘如故後朝于京師會車駕南討領鎮軍將軍定都洛陽高祖幸鄴詔鸞留守乃開建五等食邑一千戶除使持節征南大將軍都督豫荊郢三州河內山陽東郡諸軍事與安南將軍盧淵李佐攻赭陽不克敗退而還時高祖幸瑕丘鸞請罪行宮高祖引見鸞等責之曰卿等總率戎徒義應奮節而進不能夷拔賊城退不能殄茲小寇虧損王威罪應大辟朕革變之始事從寬貸今捨卿等死罪城陽降為定襄縣王削戶五百古者軍行必載廟社之主所以示其威惠各有攸歸今徵卿等敗軍之罪於社主之前以彰厥咎後以留守之功還復本封增邑二百戶除冠軍將軍河內太守轉并州刺史世宗初除平東將軍青州刺史後轉安北將軍定州刺史鸞愛樂佛道修持五戒不飲酒食肉積歲長齊繕起佛寺勸率百姓共為土木之勞公私費擾頗為民患世宗聞而詔曰鸞親唯宗懿作牧大州民物殷繁綏寧所屬宜克己厲誠崇清樹惠而乃驟相徵發專為煩擾編戶嗷嗷家懷嗟怨北州土廣姦亂是由準法尋愆應加肅黜以鸞戚屬情有未忍可遣使者以義督責奪祿一周微示威罰也正始二年薨時年三十八贈帛六百匹詔中書舍人王雲宣旨臨弔贈鎮北將軍冀州刺史諡懷王子徽字顯順粗涉書史頗有吏才世宗時襲封除游擊將軍出為河內太守在郡清整有民譽徵拜長兼散騎常侍肅宗時除右將軍涼州刺史徽以徑途阻遠固請不行除散騎常侍其年除後將軍并州刺史先是州界夏霜禾稼不熟民庶逃散安業者少徽輒開倉賑之文武咸共諫止徽曰昔汲長孺郡守耳尚輒開倉救民災弊況我皇家親近受委大藩豈可拘法而不救民困也先給後表肅宗嘉之加安北將軍後拜安西將軍秦州刺史詔書旦至夕發徽以將之秦部請詣闕恭授仍表啓固陳請不之職改授輔國將軍加度支尚書進號鎮軍將軍于時戎馬在郊王師屢敗徽以軍旅之費上國封絹二千匹粟一萬石以助軍用肅宗不納又以本官兼吏部尚書加侍中征東將軍遷衛將軍右光祿大夫拜尚書左僕射轉車騎將軍儀同三司固辭不拜聽解侍中然後受詔尋除尚書令加開府西道行臺不行時靈太后專制朝綱頽褫徽既居寵任無所匡弼與鄭儼之徒更相阿黨外似柔謹內多猜忌睚眦之忿必思報復識者嫉之又不能防間其妻于氏遂與廣陽王淵姦通及淵受任軍府每有表啓論徽罪過雖涉誣毀頗亦實焉莊帝踐阼拜司州牧尋除司徒仍領牧元皓入洛徽從莊帝北巡及車駕還宮以與謀之功除侍中大司馬太尉公加羽葆鼓吹增邑通前二萬戶餘官如故徽表辭官封前後屢上又啓云河上之功將士之力求回所封加諸勳義徽為莊帝親待內懼榮寵故有此辭以防外議莊帝識其意聽其辭封不許讓官徽後妻莊帝舅女侍中李彧帝之姊壻徽性佞媚善自取容挾內外之意宗室親戚莫與比焉遂與彧等勸帝圖榮莊帝亦先有意榮死世隆等屯據不解除徽太保仍大司馬宗師録尚書事總統內外徽本意謂榮死後枝葉自應散亡及爾朱宗族聚結謀難徽算略無出憂怖而已性多嫉妬不欲人居其前每入參謀議獨與帝決朝臣有上軍國籌策者並勸帝不納乃云小賊何慮不除又吝惜財用自家及國於是有所賞錫咸出薄少或多而中減與而復追徒有糜費恩不感物莊帝雅自約狹尤亦徽所贊成太府少卿李苗徽司徒時司馬也徽待之頗厚苗每致忠言徽自得志多不採納苗謂人曰城陽本自蜂目而豺聲復將露也及爾朱兆之入禁衛奔散莊帝步出雲龍門徽乘馬奔度帝頻呼之徽不顧而去遂走山南至故吏寇彌宅彌外雖容納內不自安乃怖徽云官捕將至令其避他所使人於路邀害送尸於爾朱兆出帝初贈使持節侍中太師大司馬録尚書事司州牧諡曰文獻子延襲爵武定末官至太子中庶子齊受禪爵例降徽兄顯魏給事中司徒掾卒贈輔國將軍東豫州刺史徽次兄顯恭字懷忠揚州別駕以軍功封平陽縣開國子邑三百戶孝莊初除北中郎將遷左將軍東徐州刺史入為安東將軍大司農卿尋除中軍將軍荊州刺史莊帝既殺爾朱榮乃除顯恭使持節都督晉建南汾三州諸軍事鎮西將軍兼尚書左僕射西北道行臺晉州刺史爾朱兆入洛後死於晉陽出帝初贈衛大將軍并州刺史重贈車騎大將軍儀同三司子彥昭襲武定中漁陽太守齊受禪爵例降顯恭弟旭字顯和莊帝時封襄城郡王邑一千戶武定末位至大司馬齊受禪爵例降章武王太洛皇興二年薨追贈征北大將軍章武郡王諡曰敬無子高祖初以南安惠王第二子彬為後彬字豹兒襲爵勇健有武用出為使持節都督東秦豳夏三州諸軍事鎮西大將軍西戎校尉統萬鎮都大將朔州刺史以貪婪削封是時吐京胡反詔彬持節假平北將軍行汾州事率并肆之衆往討之胡平仍除征虜將軍汾州刺史胡民去居等六百餘人保險謀反扇動徒類彬請兵二萬有司奏許之高祖大怒曰何有動兵馬理也可隨宜肅治若不能權方靜帖必須大衆者則先斬刺史然後發兵彬奉詔大懼而率州兵身先將士討胡平之太和二十三年卒賜錢十萬絹二百匹贈以本官加散騎常侍彬有五子長子融字永興儀貌壯麗衣冠甚偉性通率有豪氣高祖時拜祕書郎世宗初復先爵除驍騎將軍蕭衍遣將寇逼淮陽梁城陷沒詔融假節征虜將軍別將南討大摧賊衆還復梁城于時揚州刺史元嵩為奴所害敕融行揚州事尋除假節征虜將軍并州刺史及世宗崩兼司空營陪景陵拜宗正卿以本官行瀛州事遇疾不行未幾除散騎常侍平東將軍青州刺史還為祕書監遷中護軍進號撫軍將軍領河南尹加征東將軍性尤貪殘恣情聚斂為中尉糾彈削除官爵汾夏山胡叛逆連結正平平陽詔復融前封征東將軍持節都督以討之融寡於經略為胡所敗久之加散騎常侍衛將軍左光祿大夫後賊帥鮮于修禮寇暴瀛定二州長孫稚等討之失利除融車騎將軍為前驅左軍都督與廣陽王淵等共討修禮師渡交津葛榮殺修禮而自立轉營至白牛邏輕騎擊融融苦戰終日更無外援遂大奔敗於陳見殺肅宗為舉哀於東堂賜東園祕器朝服一具綵二千八百段贈侍中都督雍華岐三州諸軍事本將軍司空雍州刺史尋以融死王事進贈司徒加前後部鼓吹諡曰莊武子景哲襲武定中開府儀同三司齊受禪爵例降景哲弟朗即後廢帝語在帝紀子黃頭襲封安定王改封安平王齊受禪爵例降融弟凝字定興起家州征虜録事參軍纍遷護軍長史凝姑爾朱榮妻莊帝初封東安王食邑五百戶除持節安東將軍兗州刺史轉濟州刺史仍本將軍永熙二年薨贈持節都督滄瀛冀三州諸軍事驃騎大將軍冀州刺史子彥友襲武定中光祿大夫齊受禪爵例降凝弟湛字鎮興起家祕書郎轉尚書左司郎中遷廷尉少卿莊帝初遇害河陰贈征東將軍青州刺史追封漁陽王食邑五百戶子俊襲齊受禪爵例降湛弟晏字俊興卒於祕書丞贈平東將軍祕書監豫州刺史樂陵王胡兒和平四年薨追封樂陵王贈征北大將軍諡曰康無子顯祖詔胡兒兄汝陰王天賜之第二子永全後之襲封後改名思譽高祖初蠕蠕犯塞以思譽為鎮北大將軍北征大都將後除使持節本將軍領護胸奴校尉都督中軍都將出為使持節鎮東大將軍和龍鎮都大將營州刺史加領護東夷校尉轉為鎮北將軍行鎮北大將軍高祖引見百官於光極堂謂思譽曰代路懸舊都意重故屈叔父遠臨此任不可不敬慎所臨以副朕望及穆泰陰謀不軌思譽知而不告恕死削封為庶人太和末還復其王封正始四年薨贈光州刺史諡曰密王子景略字世彥世宗時襲封拜驍騎將軍除持節冠軍將軍幽州刺史熙平元年薨贈本將軍豫州刺史賜帛四百匹諡曰惠王子霸字休邦襲武定中巨鹿太守齊受禪爵例降景略弟慶略散騎侍郎子子政通直散騎常侍慶略弟洪略農太守中軍將軍行東雍州刺史洪略弟子業平原太守安定王休皇興二年封拜征南大將軍外都大官休少而聰慧治斷有稱高祖初庫莫奚寇邊以休為使持節侍中都督諸軍事征東大將軍領護東夷校尉儀同三司和龍鎮將休撫防有方賊乃款附入為中都大官蠕蠕犯塞出為使持節征北大將軍撫冥鎮大將休身先將士擊虜退之入為內都大官遷太傅及開建五等食邑二千戶車駕南伐領大司馬高祖親行諸軍遇休以三盜人徇於六軍將斬之有詔赦之休執曰陛下將遠清衡霍故親御六師跋涉野次軍行始爾已有姦竊如其不斬何以息盜請必行刑以肅姦慝詔曰大司馬執憲誠應如是但因緣會朕聞王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔高祖謂司徒馮誕曰大司馬嚴而秉法諸軍不可不慎於是六軍肅然定都洛邑休從駕幸鄴命休率從駕文武迎家于平城高祖親餞休於漳水之北十八年休寢疾高祖幸其第流涕問疾中使醫藥相望於路薨賵帛三千匹自薨至殯車駕三臨高祖至其門改服錫衰素辨加絰皇太子百官皆從行弔禮及將葬又贈布帛二千匹諡曰靖王詔假黃鉞加羽葆鼓吹虎賁班劍六十三人悉準三老尉元之儀高祖親送出郊慟哭而返諸王恩禮莫比焉世宗世配饗廟庭長子安幼年早卒次子燮除下大夫世宗初襲拜太中大夫除征虜將軍華州刺史燮表曰謹惟州治李潤堡雖是少梁舊地晉芮錫壤然胡夷內附遂為戎落城非舊邑先代之名爰自國初護羌小戍及改鎮立郡依嶽立州因籍倉府未刊名實竊見馮翊古城羌魏兩民之交許洛水陸之際先漢之左輔皇魏之右翼形勝名都實惟西蕃奧府今州之所在豈唯非舊至乃居岡飲澗井谷穢雜升降劬勞往還數里噂誻明昏有虧禮教未若馮翊面華渭包原澤井淺池平樵牧饒廣採材華陰陸運七十伐木龍門順流而下陪削舊雉功省力易人各為己不以為勞昔宋民無井穿井而欣得人況合城無水得水而不家慶竊聞前政刺史非是無意或值兵舉或遇年災緣此契闊稽延至此去歲已熟秋方大登四境晏安京師無事丁不十錢之費人無八旬之勤損輕益重乞垂昭鑒遂詔曰一勞永逸便可聽移後除征虜將軍豳州刺史延昌四年薨贈本將軍朔州刺史子超字化生肅宗初襲時以胡國珍封安定公改封北平王拜城門校尉通直散騎常侍東中郎將尋除光祿大夫領將作大匠後復本封爾朱榮之入洛超避難洛南遇寇見害莊帝初贈車騎大將軍儀同三司岐州刺史子孝景襲武定中通直郎齊受禪爵例降燮弟願平清狂無行高祖末拜員外郎世宗初遷給事中悖惡日甚殺人劫盜公私成患世宗以其戚近未忍致之於法乃免官禁之別館館名愁思堂冀其克念世宗崩願平乃得出靈太后臨朝以其暴亂不悛詔曰願平志行輕疏每乖憲典可還於別館依前禁錮久之解禁還家付師嚴加誨奬後拜通直散騎常侍前將軍坐裸其妻王氏於其男女之前又強姦妻妹於妻母之側御史中丞侯剛案以不道處死絞刑會赦免黜為員外常侍孝昌中卒子緒幽州安西府功曹參軍莊帝初直閣將軍尋為持節兼武衛將軍關右慰勞十二州大使遂沒吐谷渾子長春員外散騎侍郎武定初封南郡王邑五百戶齊受禪爵例降願平弟永平征虜將軍南州刺史為城民華延明所害太昌初追贈使持節侍中都督定瀛幽三州諸軍事衛將軍定州刺史永平弟珍平司州治中子叔遵員外散騎常侍珍平弟貴平羽林監轉射聲校尉莊帝初除散騎常侍宗正少卿封東萊王邑百戶除平北將軍南相州刺史莊帝既殺爾朱榮加武衛將軍兼侍中為河北山東慰勞大使至定州東北為幽州大都督侯淵所執送於晉陽後還洛前廢帝時以本官行青州事屬土民崔祖螭作逆賊徒甚盛圍逼東陽一百餘日貴平率城民固守又令將士開門交戰大軍救至遂擒祖螭等斬之還除車騎將軍加散騎常侍遷左衛將軍宗師又遷車騎大將軍左光祿大夫儀同三司貴平人才險薄為出帝所信出為青州刺史又加驃騎大將軍開府儀同三司為幽州大都督侯淵所害史臣曰南安原始要終善不掩惡英將帥之用有聲於時熙略兄弟早播民譽或才疏志大或器狹任廣咸不能就其功名俱至非命惜也康王不永鸞起家聲徽飾智矯情外諂內忌永安之禍誰任其責宛其死也固其宜哉章武樂陵蓋不足數靖王聰斷威重見稱太和美矣
