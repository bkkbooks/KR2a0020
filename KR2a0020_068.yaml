body:
  text: 魏書卷六十三列傳第五十一王肅宋辨王肅字恭懿琅邪臨沂人司馬衍丞相導之後也父奐蕭賾尚書左僕射肅少而聰辨涉獵經史頗有大志仕蕭賾歷著作郎太子舍人司徒主簿祕書丞肅自謂禮易為長亦未能通其大義也父奐及兄弟並為蕭賾所殺肅自建業來奔是歲太和十七年也高祖幸鄴聞肅至虛襟待之引見問故肅辭義敏切辨而有禮高祖甚哀惻之遂語及為國之道肅陳說治亂音韻雅暢深會帝旨高祖嗟納之促席移景不覺坐之疲淹也因言蕭氏危滅之兆可乘之機勸高祖大舉於是圖南之規轉鋭器重禮遇日有加焉親貴舊臣莫能間也或屏左右相對談說至夜分不罷肅亦盡忠輸誠無所隱避自謂君臣之際猶玄德之遇孔明也尋除輔國將軍大將軍長史賜爵開陽伯肅固辭伯爵許之詔肅討蕭鸞義陽聽招募壯勇以為爪牙其募士有功賞加常募一等其從肅行者六品已下聽先擬用然後表聞若投化之人聽五品已下先即優授於是假肅節行平南將軍肅至義陽頻破賊軍降者萬餘高祖遣散騎侍郎勞之以功進號平南將軍賜駿馬一匹除持節都督豫東豫東郢三州諸軍事本將軍豫州刺史揚州大中正肅善於撫接治有聲稱尋徵肅入朝高祖手詔曰不見君子中心如醉一日三歲我勞如何飾館華林拂席相待卿欲以何日發汝墳也故復此敕又詔曰肅丁荼暴世志等伍胥自拔吳州膺求魏縣躬操忘禮之本而同無數之喪誓雪怨方展申復窮諭再期蔬縕不改誠季世之高風末代之孝節也但聖人制禮必均愚智先王作則理齊盈虛過之者俯而就之不及者企而行之曾參居罰寧其哀終吳員處酷豈聞四載夫三年者天下之達喪古今之所一其雖欲過禮朕得不制之以禮乎有司可依禮諭之為裁練之制二十年七月高祖以久旱不雨輟膳三旦百僚詣闕引在中書省高祖在崇虛樓遣舍人問曰朕知卿等至不獲相見卿何為而來肅對曰伏承陛下輟膳已經三旦羣臣焦怖不敢自寧臣聞堯水湯旱自然之數須聖人以濟世不由聖以致災是以國儲九年以禦九年之變臣又聞至於八月不雨然後君不舉膳昨四郊之外已蒙滂澍唯京城之內微為少澤蒸民未闕一餐陛下輟膳三日臣庶惶惶無復情地高祖遣舍人答曰昔堯水湯旱賴聖人以濟民朕雖居羣黎之上道謝前王今日之旱無以救恤應待立秋克躬自咎但此月十日已來炎熱焦酷人物同悴而連雲數日高風蕭條雖不食數朝猶自無感朕誠心未至之所致也肅曰臣聞聖人與凡同者五常異者神明昔姑射之神不食五穀臣常謂矯今見陛下始知其驗且陛下自輟膳以來若天全無應臣亦謂上天無知陛下無感一昨之前外有滂澤此有密雲臣即謂天有知陛下有感矣高祖遣舍人答曰昨內外貴賤咸云四郊有雨朕恐此輩皆勉勸之辭三覆之慎必欲使信而有徵比當遣人往行若果雨也便命大官欣然進膳豈可以近郊之內而慷慨要天乎若其無也朕之無感安用朕身以擾民庶朕志確然死而後已是夜澍雨大降以破蕭鸞將裴叔業功進號鎮南將軍加都督豫南兗東荊東豫四州諸軍事封汝陽縣開國子食邑三百戶持節中正刺史如故肅頻表固讓不許詔加鼓吹一部二十二年既平漢陽詔肅曰夫知己貴義君臣務恩不能矜災恤禍恩義焉措卿情同伍員懷酷歸朕然未能翦一讎人馘彼凶帥何嘗不興言憤歎羡吳閭而長息比獲蕭鸞輔國將軍黃瑤起乃知是卿怨也尋當相付微望紓泄使吾見卿之日差得緩懷初賾之收肅父奐也司馬黃瑤起攻奐殺之故詔云然高祖之伐淮北令肅討義陽未克而蕭鸞遣將裴叔業寇渦陽劉藻等救之為叔業所敗肅表求更遣軍援渦陽詔曰得表覽之憮然觀卿意非專在水當是以藻等鋭兵新敗於前事往勢難故也朕若分兵遣之非多會無所制多遣則禁旅難闕今日之計唯當作必克之舉不可為狐疑之師徒失南兗也卿便息意停彼以圖義陽之寇宜止則止還取義陽宜下則下鎮軍淮北深量二途勿致重爽若孟表糧盡軍不及至致失渦陽卿之過也肅乃解義陽之圍以赴渦陽叔業乃引師而退肅坐劉藻等敗黜為平南將軍中正刺史如故高祖崩遺詔以肅為尚書令與咸陽王禧等同為宰輔徵肅會駕魯陽肅至遂與禧等參同謀謨自魯陽至於京洛行途喪紀委肅參量憂勤經綜有過舊戚禧兄弟並敬而昵之上下稱為和輯唯任城王澄以其起自羇遠一旦在己之上以為憾焉每謂人曰朝廷以王肅加我上尚可從叔廣陽宗室尊宿歷任內外云何一朝令肅居其右也肅聞其言降而避之尋為澄所奏劾稱肅謀叛言尋申釋詔肅尚陳留長公主本劉昶子婦彭城公主也賜錢二十萬帛三千匹肅奏考以顯能陟由績著升明退暗於是乎在自百僚曠察四稔于茲請依舊式考檢能否從之裴叔業以壽春內附拜肅使持節都督江西諸軍事車騎將軍與驃騎大將軍彭城王協率步騎十萬以赴之蕭寶卷豫州刺史蕭懿率衆三萬屯於小峴交州刺史李叔獻屯合肥將圖壽春懿遣將胡松李居士等領衆萬餘屯據死虎肅進師討擊大破之擒其將橋珉等斬首數千進討合肥生擒叔獻蕭懿棄小峴南走肅還京師世宗臨東堂引見勞之又問江左有何息耗肅曰如聞崔慧景已死寶卷所仗非邪即佞天殆以此資陛下廓定之期勢將不久以肅淮南纍捷賞帛四千七百五十匹進位開府儀同三司封昌國縣開國侯食邑八百戶餘如故尋以肅為散騎常侍都督淮南諸軍事揚州刺史持節餘官如故肅頻在邊悉心撫接遠近歸懷附者若市以誠綏納咸得其心清身好施簡絶聲色終始廉約家無餘財然性微輕佻頗以功名自許護疵稱伐少所推下高祖每以此為言景明二年薨於壽春年三十八世宗為舉哀詔曰肅奄至不救痛惋兼懷可遣中書侍郎賈思伯兼通直散騎常侍撫慰厥孤給東園祕器朝服一襲錢三十萬帛一千匹布五百匹蠟三百斤并問其卜遷遠近專遣侍御史一人監護喪事務令優厚又詔曰死生動靜卑高有域勝達所居存亡崇顯故杜預之歿窆於首陽司空李沖覆舟是託顧瞻斯所誠亦二代之九原也故揚州刺史肅誠義結於二世英惠符於李杜平生本意願終京陵既有宿心宜遂先志其令葬於沖預兩墳之間使之神遊相得也贈侍中司空公本官如故有司奏以肅忠心大度宜諡匡公詔諡宣簡肅宗初詔為肅建碑銘子紹襲紹字三歸歷官太子洗馬員外常侍中書侍郎卒贈輔國將軍徐州刺史子遷襲武定中通直常侍齊受禪爵隨例降紹弟理孝靜初始得還朝武定末著作佐郎紹肅前妻謝生也肅臨薨謝始攜二女及紹至壽春世宗納其女為夫人肅宗又納紹女為嬪肅弟秉字文政涉獵書史微有兄風世宗初攜兄子誦翊衍等入國拜中書郎遷司徒咨議出為輔國將軍幽州刺史卒贈征虜將軍徐州刺史誦字國章肅長兄融之子學涉有文才神氣清俊風流甚美自員外郎司徒主簿轉司徒屬司空咨議通直常侍汝南王友遷司徒咨議加前軍散騎常侍光祿大夫出為左將軍幽州刺史未幾徵為長兼祕書監徙給事黃門侍郎肅宗崩靈太后之立幼主也於時大赦誦宣讀詔書音制抑揚風神疏秀百僚傾屬莫不歎美孝莊初於河陰遇害年三十七贈驃騎大將軍尚書左僕射司空公徐州刺史諡曰文宣子孝康武定中尚書郎中卒孝康弟俊康性清雅頗有文才齊文襄王中外府祭酒卒贈征虜將軍太府少卿誦弟衍字文舒名行器藝亞於誦自著作佐郎稍遷尚書郎員外常侍司空咨議光祿大夫廷尉揚州大中正度支尚書仍轉七兵徙太常卿出為散騎常侍征東將軍西兗州刺史衍屆治未幾屬爾朱仲遠稱兵內向州既路衝為其攻逼衍不能守為仲遠所擒以其名望不害也令其騎牛從軍久乃見釋還洛除車騎將軍左光祿大夫孝靜初轉侍中將軍如故天平三年卒年五十二敕給東園祕器賵物三百段贈使持節都督青徐兗三州諸軍事驃騎大將軍尚書令司徒公徐州刺史諡曰文獻衍篤於交舊有故人竺虩於西兗為仲遠所害其妻子飢寒衍置之於家纍年贍恤世人稱其敦厚翊字士遊肅次兄琛子也風神秀立好學有文才歷司空主簿清河王友中書侍郎頗鋭於榮利結婚於元叉超拜左將軍濟州刺史尋加平東將軍清靜愛民有政治之稱入為散騎常侍孝莊初遷鎮南將軍金紫光祿大夫領國子祭酒永安元年冬卒年三十七贈侍中衛將軍司空公徐州刺史子淵武定中儀同開府記室參軍宋辨字義和廣平列人人也祖愔與從叔宣博陵崔建俱知名世祖時歷位中書博士員外散騎常侍使江南賜爵列人子還拜廣平太守興安五年卒贈安遠將軍相州刺史諡曰惠長子顯襲爵辨伯父世顯無子養辨為後辨父叔珍李敷妹夫因敷事而死辨才學俊贍少有美名高祖初曾至京師見尚書李沖因言論移日沖竦然異之退而言曰此人一日千里王佐才也顯卒辨襲爵辨與李彪州里迭相祗好彪為祕書丞辨自中散彪請為著作佐郎尋除尚書殿中郎中高祖曾因朝會之次歷訪治道辨年少官微自下而對聲姿清亮進止可觀高祖稱善者久之因是大被知遇賜名為辨意取辨和獻玉楚王不知寶之也遷中書侍郎兼員外常侍使於蕭賾賾司徒蕭子良祕書丞王融等皆稱美之以為志氣謇烈不逮李彪而體韻和雅舉止間邃過之轉散騎侍郎時散騎位在中書之右高祖曾論江左事因問辨曰卿比南行入其隅隩彼政道云何興亡之數可得知不辨對曰蕭氏父子無大功於天下既以逆取不能順守德政不理徭役滋劇內無股肱之助外有怨叛之民以臣觀之必不能貽厥孫謀保有南海若物憚其威身免為幸後車駕南征以辨為司徒司馬曜武將軍東道副將軍人有盜馬靽者斬而徇之於是三軍振懼莫敢犯法黃門郎崔光薦辨自代高祖不許然亦賞光知人未幾以辨兼黃門尋即正兼司徒左長史時大選內外羣官並定四海士族辨專參銓量之任事多稱旨然好言人之陰短高門大族意所不便者辨因毀之至於舊族淪滯人非可忌者又申達之辨又為本州大中正姓族多所降抑頗為時人所怨從駕南討詔辨於豫州都督所部及東荊領葉皆減戍士營農水陸兼作遷散騎常侍尋遷右衛將軍領黃門辨屢自陳讓高祖曰吾為相知者卿亦不可有辭豈得專守一官不助朕為治且常侍者黃門之粗冗領軍者二衛之假攝不足空存推讓以棄大委其被知遇如此始高祖北都之選也李沖多所參預頗抑宋氏辨有恨於沖而與李彪交結雅相知重及彪之抗沖沖謂彪曰爾如狗耳為人所嗾及沖劾彪不至大罪辨之力也彪除名為民辨大相嗟慨密圖申復高祖在汝南不豫大漸旬有餘日不見侍臣左右唯彭城王協等數人而已小瘳乃引見門下及宗室長幼諸人入者未能知致悲泣辨獨進及御床歔欷流涕曰臣不謂陛下聖顏毀瘠乃爾由是益重之車駕征馬圈留辨以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹可不自勉辨頓首辭謝辨劬勞王事夙夜在公恩遇之甚輩流莫及名重朝野亞於李沖高祖每稱辨可為吏部尚書及崩遺詔以辨為之與咸陽王禧等六人輔政而辨已先卒年四十八詔賜錢十萬布三百匹贈安東將軍瀛州刺史諡曰貞順辨性好矜伐自許膏腴高祖以郭祚晉魏名門從容謂辨曰卿固應推郭祚之門也辨笑曰臣家未肯推祚高祖曰卿自漢魏以來既無高官又無俊秀何得不推辨曰臣清素自立要爾不推侍臣出後高祖謂彭城王協曰辨人身良自不惡乃復欲以門戶自矜殊為可怪長子維字伯緒維弟紀字仲烈維少襲父爵自員外郎遷給事中坐諂事高肇出為益州龍驤府長史辭疾不行太尉清河王懌輔政以維名臣之子薦為通直郎辟其弟紀行參軍靈太后臨政委任元叉而叉恃寵驕盈懌每以分理裁斷叉甚忿恨思以害懌遂與維為計以富貴許之維見叉寵勢日隆便至乾沒乃告司染都尉韓文殊父子欲謀逆立懌懌坐被録禁中文殊父子懼而逃遁鞫無反狀以文殊亡走懸處大辟置懌於宮西別館禁兵守之維應反坐叉言於太后欲開將來告者之路乃黜為燕州昌平郡守紀為秦州大羌令維及紀頗涉經史而浮薄無行懌親尊懿望朝野瞻屬維受懌眷賞而無狀構間天下人士莫不怪忿而賤薄之及叉殺懌專斷朝政以維兄弟前者告懌徵維為散騎侍郎紀為太學博士領侍御史甚昵之維超遷通直常侍又除冠軍將軍洛州刺史紀超遷尚書郎初辨謂族弟世景言維性疏險而紀識慧不足終必敗吾業也世景以為不爾至是果然聞者以為知子莫若父尚書令李崇尚書左僕射郭祚右僕射游肇每云伯緒凶疏終敗宋氏幸得殺身耳論者以為有徵後除營州刺史仍本將軍靈太后反政以叉黨除名遂還鄉里尋追其前誣告清河王事於鄴賜死子春卿早亡弟紀以次子欽仁繼欽仁武定末太尉祭酒紀肅宗末為北道行臺卒於晉陽子欽道武定末冀州別駕辨弟機本州治中子寶積卒於中散大夫辨族弟穎字文賢自奉朝請稍遷尚書郎魏郡太守納貨劉騰騰言之於元叉以穎為冠軍將軍涼州刺史穎前妻鄧氏亡後十五年穎夢見之向穎拜曰新婦今被處分為高崇妻故來辭君泫然流涕穎旦而見崇言之崇後數日而卒穎族弟燮字崇和廣平王懷郎中令員外常侍為征北李平司馬北殄元愈頗有贊謀之功燮族弟鴻貴為定州平北府參軍送兵於荊州坐取兵絹四百匹兵欲告之乃斬十人又疏凡不達律令見律有梟首之罪乃生斷兵手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚史臣曰古人有云才未半古功以過之非徒語也王肅流寓之人見知一面雖器業自致抑亦逢時榮任赫然寄同舊列美矣誦翊繼軌不殞光風宋辨以才度見知迹參顧命拔萃出類其有以哉無子之歎豈徒羊舌宗祀之不亡幸矣
