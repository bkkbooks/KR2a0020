body:
  text: 魏書卷一百八之二禮志四之二第十一世宗景明二年夏六月祕書丞孫惠蔚上言臣聞國之大禮莫崇明祀祀之大者莫過禘祫所以嚴祖敬宗追養繼孝合享聖靈審諦昭穆遷毀有制尊卑有定體誠売心著於中百順應於外是以惟王創制為建邦之典仲尼述定為不刊之式暨秦燔詩書鴻籍泯滅漢氏興求拾綴遺篆淹中之經孔安所得唯有卿大夫士饋食之篇而天子諸侯享廟之祭禘祫之禮盡亡曲臺之記戴氏所述然多載尸灌之義牲獻之數而行事之法備物之體蔑有具焉今之取證唯有王制一簡公羊一冊考此二書以求厥旨自餘經傳雖時有片記至於取正無可依攬是以兩漢淵儒魏晉碩學咸據斯文以為朝典然持論有深淺及義有精浮故令傳記雖一而探意乖舛伏惟孝文皇帝合德乾元應靈誕載玄思洞微神心暢古禮括商周樂宣韶濩六籍幽而重昭五典淪而復顯舉二經於和中一姬公於洛邑陛下叡哲淵凝欽明道極應必世之期屬功成之會繼文垂則實惟下武而祫禘二殷國之大事蒸嘗合享朝之盛禮此先皇之所留心聖懷以之永慕臣聞司宗初開致禮清廟敢竭愚管輒陳所懷謹案王制曰天子犆礿祫禘祫嘗祫烝鄭玄曰天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常魯禮三年喪畢而祫於太祖明年春禘於羣廟自爾之後五年而再殷祭一祫一禘春秋公羊魯文二年八月丁卯大事于太廟傳曰大事者何大祫也大祫者何合祭也毀廟之主陳於太祖未毀廟之主皆升合食于太祖五年而再殷祭何休曰陳者就陳列太祖前太祖東鄉昭南鄉穆北鄉其餘孫從王父父曰昭子曰穆又曰殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也禘猶諦也審諦無所遺失察記傳之文何鄭祫禘之義略可得聞然則三年喪畢祫祭太祖明年春祀遍禘羣廟此禮之正也古之道也又案魏氏故事魏明帝以景初三年正月崩至五年正月積二十五晦為大祥太常孔美博士趙怡等以為禫在二十七月到其年四月依禮應祫散騎常侍王肅博士樂詳等以為禫在祥月至其年二月宜應祫祭雖孔王異議六八殊制至於喪畢之祫明年之禘其議一焉陛下永惟孝思因心即禮取鄭捨王禫終此晦來月中旬禮應大祫六室神祏升食太祖明年春享咸禘羣廟自茲以後五年為常又古之祭法時祫並行天子先祫後時諸侯先時後祫此於古為當在今則煩且禮有升降事有文節通時之制聖人弗違當祫之月宜減時祭以從要省然大禮久廢羣議或殊以臣觀之理在無怪何者心制既終二殷惟始祫禘之正實在於斯若停而闕之唯行時祭七聖不聞合享百辟不覩盛事何以宣昭令問垂式後昆乎皇朝同等三代治邁終古而令徽典缺於昔人鴻美慚於往志此禮所不行情所未許臣學不鈎深思無經遠徒閱章句蔑爾無立但飲澤聖時銘恩天造是以妄盡區區冀有塵露所陳蒙允請付禮官集定儀注詔曰禮貴循古何必改作且先聖久遵綿代典豈朕冲闇所宜革之且禮祭之議國之至重先代碩儒論或不一可付八坐五省太常國子參定以聞七月侍中錄尚書事北海王詳等言奉旨集議僉以為禘祫之設前代彝典惠蔚所陳有允舊義請依前剋敬享清宮其求省時祭理實宜爾但求之解注下逼列國兼時奠之敬事難輙省請移仲月擇吉重聞制可十一月壬寅改築圓丘於伊水之陽乙卯仍有事焉延昌四年正月世宗崩肅宗即位三月甲子尚書令任城王澄奏太常卿崔亮上言秋七月應祫祭于太祖今世宗宣武皇帝主雖入廟然烝嘗時祭猶別寢室至於殷祫宜存古典案禮三年喪畢祫於太祖明年春禘於羣廟又案杜預亦云卒哭而除三年喪畢而禘魏武宣后以太和四年六月崩其月既葬除服即吉四時行事而猶未禘王肅韋誕並以為今除即吉故特時祭至於禘祫宜存古禮高堂隆亦如肅議於是停不殷祭仰尋太和二十三年四月一日高祖孝文皇帝崩其年十月祭廟景明二年秋七月祫於太祖三年春禘於羣廟亦三年乃祫謹準古禮及晉魏之議并景明故事愚謂來秋七月祫祭應停宜待三年終乃後祫禘詔曰太常援引古今並有證據可依請熙平二年三月癸未太常少卿元端上言謹案禮記祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭玄注云禘郊祖宗謂祭祀以配食也有虞氏以上尚德禘郊祖宗配用有德者自夏以下稍用其姓代之是故周人以后稷為始祖文武為二祧訖於周世配祭不毀案禮嚳雖無廟配食禘祭謹詳聖朝以太祖道武皇帝配圓丘道穆皇后劉氏配方澤太宗明元皇帝配上帝明密皇后杜氏配地祇又以顯祖獻文皇帝配雩祀太宗明元皇帝之廟既毀上帝地祇配祭有式國之大事唯祀與戎廟配事重不敢專決請召羣官集議以聞靈太后令曰依請於是太師高陽王雍太傅領太尉公清河王懌太保領司徒公廣平王懷司空公領尚書令任城王澄侍中中書監胡國珍侍中領著作郎崔光等議竊以尚德尊功其來自昔郊稷宗文周之茂典仰惟世祖太武皇帝以神武纂業克清禍亂德濟生民功加四海宜配南郊高祖孝文皇帝大聖膺期惟新魏道刑措勝殘功同天地宜配明堂令曰依議施行七月戊辰侍中領軍將軍江陽王繼表言臣功緦之內太祖道武皇帝之後於臣始是曾孫然道武皇帝傳業無窮四祖三宗功德最重配天郊祀百世不遷而曾玄之孫烝嘗之薦不預拜於廟庭霜露之感闕陪奠於階席今七廟之後非直隔歸胙之靈五服之孫亦不霑出身之校之墳史則不然驗之人情則未允何者禮云祖遷於上宗易於下臣曾祖是帝世數未遷便疏同庶族而孫不預祭斯之為屈今古罕有昔堯敦九族周隆本枝故能磐石維城禦侮於外今臣之所親生見隔棄豈所以楨幹根本隆建公族者也伏見高祖孝文皇帝著令銓衡取曾祖之服以為資蔭至今行之相傳不絕而況曾祖為帝而不見錄伏願天鑒有以照臨令皇恩洽穆宗人咸請付外博議永為定準靈太后令曰付八座集禮官議定以聞四門小學博士王僧奇等議案孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝然則太祖不遷者尊王業之初基二祧不毀者旌不朽之洪烈其旁枝遠胄豈得同四廟之親哉故禮記婚義曰古者婦人先嫁三月祖廟未毀教於公宮祖廟既毀教于宗室又文王世子曰五廟之孫祖廟未毀雖庶人冠娶必告死必赴不忘親也親未絕而列於庶人賤無能也鄭注云赴告於君也實四廟言五者容顯考為始封君子故也鄭君別其四廟理協二祭而四廟者在當世服屬之內可以與於子孫之位若廟毀服盡豈得同於此例乎敢竭愚昧請以四廟為斷國子博士李琰之議案祭統曰有事於太廟羣昭羣穆咸在鄭氏注昭穆咸在謂同宗父子皆來古禮之制如是其廣而當今儀注唯限親廟四愚竊疑矣何以明之設使世祖之子男於今存者既身是戚蕃號為重子可得賓於門外不預碑鼎之事哉又因宜變法禮有其說記言五廟之孫祖廟未毀為庶人冠娶必告死必赴注曰實四廟而言五者容顯考始封之君子今因太祖之廟在仍通其曾玄侍祠與彼古記甚相符會且國家議親之律指取天子之玄孫乃不旁準於時后至於助祭必謂與世主相倫將難均一壽有短長世有延促終當何時可得齊同謂宜入廟之制率從議親之條祖祧之裔各聽盡其玄孫使得駿奔堂壇肅承禘礿則情理差通不宜復各為例令事事舛駁侍中司空公領尚書令任城王澄侍中尚書左僕射元暉奏臣等參量琰之等議雖為始封君子又祭統曰有事於太廟羣昭羣穆咸在而不失其倫鄭注云昭穆謂同宗父子皆來也言未毀及同宗則共四廟之辭云未絕與父子明崇五屬之稱天子諸侯繼立無殊吉凶之赴同止四廟祖祧雖存親級彌遠告赴拜薦典記無文斯由祖遷於上見仁親之義疏宗易於下著五服之恩斷江陽之於今帝也計親而枝宗三易數世則廟應四遷吉凶尚不告聞拜薦寧容輒預高祖孝文皇帝聖德玄覽師古立政陪拜止於四廟哀恤斷自緦宗即之人情冥然符一推之禮典事在難違此所謂明王相沿今古不革者也太常少卿元端議禮記祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟遠廟為祧有二祧而祖考以功重不遷二祧以盛德不毀迭遷之義其在四廟也祭統云祭有十倫之義六曰見親疏之殺焉夫祭有昭穆昭穆者所以別父子遠近長幼親疏之序而無亂也是故有倫注云昭穆咸在同宗父子皆來指謂當廟父子為羣不繫於昭穆也若一公十子便為羣公子豈待數公而立稱乎文王世子云五廟之孫祖廟未毀雖為有所援引然與朝議不同如依其議匪直太祖曾玄諸廟子孫悉應預列既無正據竊謂太廣臣等愚見請同僧奇等議靈太后令曰議親律注云非唯當世之屬籍歷謂先帝之五世此乃明親親之義篤骨肉之恩重尚書以遠及諸孫太廣致疑百僚助祭可得言狹也祖廟未毀曾玄不預壇堂之敬便是宗人之昵反外於附庸王族之近更疏於羣辟先朝舊儀草創未定刊制律憲垂之不朽琰之援據甚允情理可依所執十二月丁未侍中司空公領尚書令任城王澄度支尚書崔亮奏謹案禮記曾子問曰諸侯旅見天子不得成禮者幾孔子曰四太廟火日蝕后之喪雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝會孔子應云五而獨言四明不廢朝賀也鄭玄禮注云魯禮三年喪畢祫於太祖明年春禘羣廟又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年五月大祥七月釋禫公會劉子及諸侯于平丘八月歸不及於祫冬公如晉明十四年春歸祫明十五年春乃禘經曰二月癸酉有事於武宮傳曰禘於武公謹案明堂位曰魯王禮也喪畢祫禘似有退理詳考古禮未有以祭事廢元會者禮云吉事先近日脫不吉容改筮三旬尋攝太史令趙翼等列稱正月二十六日祭亦吉請移禘祀在中旬十四日時祭移二十六日猶曰春禘又非退義祭則無疏怠之譏三元有順軌之美既被成旨宜即宣行臣等伏度國之大事在祀與戎君舉必書恐貽後誚輒訪引古籍竊有未安臣等學缺通經識不稽古備位樞納可否必陳冒陳所見伏聽裁衷靈太后令曰可如所執初世宗永平延昌中欲建明堂而議者或云五室或云九室頻屬年饑遂寢至是復議之詔從五室及元叉執政遂改營九室值世亂不成宗配之禮迄無所設神龜初靈太后父司徒胡國珍薨贈太上秦公時疑其廟制太學博士王延業議曰案王制云諸侯祭二昭二穆與太祖之廟而五又小記云王者立四廟鄭玄云高祖已下與始祖而五明立廟之正以親為限不過於四其外有大功者然後為祖宗然則無太祖者止於四世有太祖乃得為五禮之正文也文王世子云五廟之孫祖廟未毀雖為庶人冠娶妻必告鄭玄云實四廟而言五廟者容高祖為始封君之子明始封之君在四世之外正位太祖乃得稱五廟之孫若未有太祖已祀五世則鄭無為釋高祖為始封君之子也此先儒精義當今顯證也又喪服傳曰若公子之子孫有封為國君者則世世祖是人也不祖公子鄭玄云謂後世為君者祖此受封之君不得祀別子也公子若在高祖已下則如其親服後世遷之乃毀其廟爾明始封猶在親限故祀止高祖又云如親而遷尤知高祖之父不立廟矣此又立廟明法與今事相當者也又禮緯云夏四廟至子孫五殷五廟至子孫六注云言至子孫則初時未備也此又顯在緯籍區別若斯者也又晉初以宣帝是始封之君應為太祖而以猶在祖位故唯祀征西已下六世待世世相推宣帝出居太祖之位然後七廟乃備此又依準前軌若重規襲矩者也竊謂太祖者功高業大百世不遷故親廟之外特更崇立苟無其功不可獨居正位而遽見遷毀且三世已前廟及於五玄孫已後祀止於四一與一奪名位莫定求之典禮所未前聞今太上秦公疏爵列土大啟河山傳祚無窮永同帶礪實有始封之功方成不遷之廟但親在四世之內名班昭穆之序雖應為太祖而尚在禰位不可遠探高祖之父以合五者之數太祖之室當須世世相推親盡之後乃出居正位以備五廟之典夫循文責實理貴允當考創宗祊得禮為美不可苟薦虛名取榮多數求之經記竊謂為允又武始侯本無采地於皇朝制令名準大夫案如禮意諸侯奪宗武始四時蒸嘗宜於秦公之廟博士盧觀議案王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三士一自上已下降殺以兩庶人無廟死為鬼焉故曰尊者統遠卑者統近是以諸侯及太祖天子及其祖之所自出祭法曰諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠去墠為鬼至於禘祫方合食太祖之宮大傳曰別子為祖喪服傳曰公子不得禰先君公孫不得祖諸侯鄭說不得祖禰者不得立其廟而祭之也世世祖是人者謂世世祖受封之君不得祖公子者後世為君者祖此受封之君不得祀別子也公子若在高祖以下則如其親服後世遷之乃毀其廟耳愚以為遷者遷於太祖廟毀者從太祖而毀之若不遷太祖不須發祖是人之文明非始封故復見乃毀之節何以知之案諸侯有祖考之廟祭五世之禮五禮正祖為輕一朝頓立而祖考之廟要待六世之君六世已前虛而蔑主求之聖旨未為通論曾子問曰廟無虛主虛主唯四祖考不與焉明太祖之廟必不空置禮緯曰夏四廟至子孫五殷五廟至子孫六周六廟至子孫七見夏無始祖待禹而五殷人郊契得湯而六周有后稷及文王至武王而七言夏即大禹之身言子謂啟誦之世言孫是迭遷之時禹為受命不毀親湯為始君不遷五主文武為二祧亦不去三昭三穆三昭三穆謂通文武若無文武親不過四觀遠祖漢侍中植所說云然鄭玄馬昭亦皆同爾且天子逆加二祧得并為七諸侯預立太祖何為不得為五乎今始封君子之立禰廟頗似成王之於二祧孫卿曰有天下者事七世有一國者事五世假使八世天子乃得事七六世諸侯方通祭五推情準理不其謬乎雖王侯用禮文節不同三隅反之自然昭灼且文宣公方為太祖世居子孫今立五廟竊謂為是禮緯又云諸侯五廟親四始祖一明始封之君或上或下雖未居正室無廢四祀之親小記曰王者禘其祖之所自出以其祖配之而立四廟此實殷湯時制不為難也聊復摽牓略引章條愚戇不足以待大問侍中太傅清河王懌議太學博士王延業及盧觀等各率異見案禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五並是後世追論備廟之文皆非當時據立神位之事也良由去聖久遠經禮殘缺諸儒注記典制無因雖稽考異聞引證古誼然用捨從世通塞有時折衷取正固難詳矣今相國秦公初搆國廟追立神位唯當仰祀二昭二穆上極高曾四世而已何者秦公身是始封之君將為不遷之祖若以功業隆重越居正室恐以卑臨尊亂昭穆也如其權立始祖以備五廟恐數滿便毀非禮意也昔司馬懿立功於魏為晉太祖及至子晉公昭乃立五廟亦祀四世止於高曾太祖之位虛俟宣文待其後裔數滿乃止此亦前代之成事方今所殷鑒也又禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七明知當時太祖之神仍依昭穆之序要待子孫世世相推然後太祖出居正位耳遠稽禮緯諸儒所說近循晉公之廟故事宜依博士王延業議定立四主親止高曾且虛太祖之位以待子孫而備五廟焉又延業盧觀前經詳議並據許慎鄭玄之解謂天子諸侯作主大夫及士則無意謂此議雖出前儒之事實未允情禮何以言之原夫作主之禮本以依神孝子之心非主莫依今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想象平存上自天子下逮於士如此四事並同其禮何至於主惟謂王侯禮云重主道也此為埋重則立主矣故王肅曰重未立主之禮也士喪禮亦設重則士有主明矣孔悝反祏載之左史饋食設主著於逸禮大夫及士既得有廟題紀祖考何可無主公羊傳君有事于廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往今以為攝主者攝神斂主而已不暇待徹祭也何休云宗人攝行主事而往也意謂不然君聞臣喪尚為之不懌況臣聞君喪豈得安然代主終祭也又相國立廟設主依神主無貴賤紀座而已若位擬諸侯者則有主位為大夫者則無主便是三神有主一位獨闕求諸情禮實所未安宜通為主以銘神位懌又議曰古者七廟廟堂皆別光武已來異室同堂故先朝祀堂令云廟皆四𧸐五架北廂設坐東昭西穆是以相國構廟唯制一室同祭祖考比來諸王立廟者自任私造不依公令或五或一參差無準要須議行新令然後定其法制相國之廟已造一室實合朝令宜即依此展其享祀詔依懌議天平四年四月七帝神主既遷於太廟太社石主將遷於社宮禮官云應用幣中書侍郎裴伯茂時為祖祀文伯茂據故事太和中遷社宮高祖用牲不用幣遂以奏聞于時議者或引大戴禮遷廟用幣今遷社宜不殊伯茂據尚書召誥應用牲詔遂從之武定六年二月將營齊獻武王廟議定室數形制兼度支尚書崔昂司農卿盧元明祕書監王元景散騎常侍裴獻伯國子祭酒李渾御史中尉陸操黃門侍郎李騫中書侍郎陽休之前南青州刺史鄭伯猷祕書丞崔劼國子博士邢峙國子博士宗惠振太學博士張毓太學博士高元壽國子助教王顯季等議案禮諸侯五廟太祖及親廟四今獻武王始封之君便是太祖既通親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭各一頰室夏頭徘徊鵄尾又案禮圖諸侯止開南門而二王後祔祭儀法執事列於廟東門之外既有東門明非一門獻武禮數既隆備物殊等準據今廟宜開四門內院南面開三門餘面及外院四面皆一門其內院牆四面皆架為步廊南出夾門各置一屋以置禮器及祭服內外門牆並用赭堊廟東門道南置齋坊道北置二坊西為典祠廨并宰東為廟長廨并置車輅其北為養犧牲之所詔從之
