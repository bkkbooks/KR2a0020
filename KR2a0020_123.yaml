body:
  text: 魏書卷一百八之三禮志四之三第十二魏自太祖至於武泰帝及太皇太后皇太后皇后崩悉依漢魏既葬公除唯高祖太和十四年文明太后崩將營山陵九月安定王休齊郡王簡咸陽王禧河南王幹廣陵王羽潁川王雍始平王協北海王詳侍中太尉録尚書事東陽王丕侍中司徒淮陽王尉元侍中司空長樂王穆亮侍中尚書左僕射平原王陸睿等率百僚詣闕表曰上靈不弔大行太皇太后崩背溥天率土痛慕斷絶伏惟陛下孝思蒸蒸攀號罔極臣等聞先王制禮必有隨世之變前賢創法亦務適時之宜良以世代不同古今異致故也三年之喪雖則自古然中代已後未之能行先朝成式事在可準聖后終制刊之金册伏惟陛下至孝發衷哀毀過禮欲依上古喪終三年誠協大舜孝慕之德實非俯遵濟世之道今雖中夏穆清庶邦康靜然萬機事殷不可暫曠春秋蒸嘗事難廢闕伏願天鑒抑至孝之深誠副億兆之企望喪期禮數一從終制則天下幸甚日月有期山陵將就請展安兆域以備奉終之禮詔曰凶禍甫爾未忍所請休等又表曰臣等聞五帝已前喪期無數三代相因禮制始立名雖虛置行之者寡高宗徒有諒暗之言而無可遵之式康王既廢初喪之儀先行即位之禮於是無改之道或虧三年之喪有缺夫豈無至孝之君賢明之子皆以理貴隨時義存百姓是以君薨而即位不暇改年踰月而即葬豈待同軌葬而即吉不必終喪此乃二漢所以經綸治道魏晉所以綱理政術伏惟陛下以至孝之性遭罔極之艱永慕崩號哀過虞舜誠是萬古之高德曠世之絶軌然天下至廣萬機至殷曠之一朝庶政必滯又聖后終制已有成典宗社廢禮其事尤大伏願天鑒抑哀毀之至誠思在豫之深責仰遵先志典册之文俯哀百辟元元之請詔曰自遭禍罰慌惚如昨奉侍梓宮猶悕髣佛山陵遷厝所未忍聞十月休等又表曰臣等頻煩上聞仰申誠款聖慕惟遠未垂昭亮伏讀哀灼憂心如焚臣等聞承乾統極者宜以濟世為務經綸天下者特以百姓為心故萬機在躬周康弗獲申其慕漢文作戒孝景不得終其禮此乃先代之成軌近世所不易伏惟太皇太后睿聖淵識慮及始終明誥垂於典策遺訓備于末命聿修厥德聖人所重遵承先式臣子攸尚陛下雖欲終上達之禮其如黎元何臣等不勝憂懼之誠敢冒重陳乞垂聽訪以副億兆之望詔曰仰尋遺旨俯聞所奏倍增號絶山陵可依典册如公卿所議衰服之宜情所未忍別當備在心既葬休又表曰奉被癸酉詔書述遺誡之旨昭違從之義遵儉葬之重式稱孝思之深誠伏讀未周悲感交切日月有期山陵即就伏惟陛下永慕崩號倍增摧絶臣等具位在官與國休戚庇心之至不敢不陳咸以為天下之至尊莫尊於王業皇極之至重莫重於萬機至尊故不得以常禮任己至重亦弗獲以世典申情是以二漢已降逮于魏晉葬不過踰月服不淹三旬良以叔世事廣禮隨時變不可以無為之法行之於有為之辰文質不同古今異制其來久矣自皇代革命多歷年祀四祖三宗相繼纂業上承數代之故實俯副兆民之企望豈伊不懷理宜然也文明太皇太后欽明稽古聖思淵深所造終制事合世典送終之禮既明遺誥之文載備奉而行之足以垂風百王軌儀萬葉陛下以至孝之誠哀毀過禮三御不充半溢晝夜不釋絰帶永思纏綿滅性幾及百姓所以憂懼失守臣等所以肝腦塗地王者之尊躬行一日固可以感徹上靈貫被幽顯況今山陵告終百禮咸畢日已淹月仍不卜練比之前世理為過矣願陛下思大孝終始之義愍億兆悲惶之心抑思割哀遵奉終制以時即吉一日萬機則天下蒙恩率土仰賴謹依前式求定練日以備祔禫之禮詔曰比當別在心既而帝引見太尉丕及羣臣等於太和殿前哭拜盡哀出幸思賢門右詔尚書李沖宣旨於王等仰惟先后平日近集羣官共論政治平秩民務何圖一旦禍酷奄鍾獨見公卿言及喪事追惟荼毒五內崩摧丕對曰伏奉明詔羣情圮絶臣與元等不識古義以老朽之年歷奉纍聖國家舊事頗所知聞伏惟遠祖重光世襲至有大諱之日唯侍送梓宮者凶服左右盡皆從吉四祖三宗因而無改世祖高宗臣所目見唯先帝升遐臣受任長安不在侍送之列竊聞所傳無異前式伏惟陛下以至孝之性哀毀過禮伏聞所御三食不滿半溢臣等叩心絶氣坐不安席願暫抑至慕之情遵先朝成事思金册遺令奉行前式無失舊典詔曰追惟慈恩昊天罔極哀毀常事豈足關言既不能待沒而朝夕食粥粗亦支任二公何足以至憂怖所奏先朝成事亦所見聞祖宗情專武略未修文教朕今仰稟聖訓庶習古道論時比事又與先世不同太尉等國老政之所寄於典記舊式或所未悉且可知朕大意其餘喪禮之儀古今異同漢魏成事及先儒所論朕雖在衰服之中以喪禮事重情在必行故暫抑哀慕躬自尋覽今且以所懷別問尚書遊明根高閭等公且可聽之高祖謂明根曰朕丁罹酷罰日月推移山陵已過公卿又依金册據案魏晉請除衰服重聞所奏倍增號哽前者事逼山陵哀疚頓弊未得論今故相引欲具通所懷卿前所表除釋衰麻聞之實用悲恨于時親侍梓宮匍匐筵几哀號痛慕情未暫闋而公卿何忍便有此言何於人情之不足夫聖人制卒哭之禮授練之變皆奪情以漸又聞君子不奪人之喪亦不可奪喪今則旬日之間言及即吉特成傷理明根對曰臣等伏尋金册遺旨踰月而葬葬而即吉故於卜葬之初因奏練除之事仰傷聖心伏增悲悚高祖曰卿等咸稱三年之喪雖則自古然中代以後未之能行朕謂中代所以不遂三年之喪蓋由君上違繼主初立故身襲衮冕以行即位之禮又從儲宮而登極者君德未沇臣義不洽天下顒顒未知所傒故頒備朝儀示皇極之尊及后之喪也因父在不遂即生惰易之情踵以為法諒知敦厚之化不易遵也朕少蒙鞠育慈嚴兼至臣子之情君父之道無不備誨雖自蒙昧粗解告旨庶望量行以免咎戾朕誠不德在位過紀雖未能恩洽四方化行萬國仰稟聖訓足令億兆知有君矣於此之日而不遂哀慕之心使情禮俱損喪紀圮壞者深可痛恨高閭對曰太古既遠事難襲用漢魏以來據有成事漢文繼高惠之蹤斷獄四百幾致刑措猶垂三旬之禮孝景承平遵而不變以此言之不為即位之際有所逼懼也良是君人之道理自宜然又漢稱文景雖非聖君亦中代明主今遺册之旨同於前式伏願陛下述遵遺令以副羣庶之情杜預晉之碩學論自古天子無有行三年之喪者以為漢文之制暗與古合雖叔世所行事可承踵是以臣等慺慺干謁高祖曰漢魏之事與今不同備如向説孝景雖承升平之基然由嫡子即位君德未顯無異前古又父子之親誠是天屬之重然聖母之德昊天莫報思自殞滅豈從衰服而已竊尋金册之旨所以告奪臣子之心令早即吉者慮遺絶萬機荒廢政事羣官所以慺慺亦懼機務之不理矣今仰奉册令俯順羣心不敢暗默不言以荒庶政唯欲存衰麻廢吉禮朔望盡哀寫泄悲慕上無失導誨之志下不乖衆官所請情在可許故專欲行之公卿宜審思朕懷不當固執至如杜預之論雖暫適時事於孺慕之君諒暗之主蓋亦誣矣孔聖稱喪與其易也寧戚而預於孝道簡略朕無取焉祕書丞李彪對曰漢明德馬后保養章帝母子之道無可間然及后之崩葬不淹旬尋以從吉然漢章不受譏於前代明德不損名於往史雖論功比德事有殊絶然母子之親抑亦可擬願陛下覽前世之成規遵金册之遺令割哀從議以親萬機斯誠臣下至心兆庶所願高祖曰既言事殊固不宜仰匹至德復稱孝章從吉不受譏前代朕所以眷戀衰絰不從所議者仰感慈恩情不能忍故也蓋聞孝子之居喪見美麗則感親故釋錦而服粗衰內外相稱非虛加也今者豈徒顧禮違議苟免嗤嫌而已抑亦情發於衷而欲肆之於外金册之意已具前答故不復重論又卒日奉旨不忍片言後事遂非默默在念不顯所懷今奉終之事一以仰遵遺册於令不敢有乖但痛慕之心事繫於豫雖無丁蘭之感庶聖靈不奪至願是以謂無違旨嫌諸公所表稱先朝成式事在可準朕仰惟太祖龍飛九五初定中原及太宗承基世祖纂歷皆以四方未一羣雄競起故鋭意武功未修文德高宗顯祖亦心存武烈因循無改朕承纍世之資仰聖善之訓撫和內外上下輯諧稽參古式憲章舊典四海移風要荒革俗仰遵明軌庶無愆違而方於禍酷之辰引末朝因循之則以為前準非是所喻高閭對曰臣等以先朝所行頗同魏晉又適於時故敢仍請高祖曰卿等又稱今雖中夏穆清庶邦康靜然萬機事廣不可暫曠朕以卿苦見逼奪情不自勝尋覽喪儀見前賢論者稱卒哭之後王者得理庶事依據此文又從遺册之旨雖存衰服不廢萬機無闕庶政得展罔極之思於情差申高閭對曰君不除服於上臣則釋衰於下從服之義有違為臣之道不足又親御衰麻復聽朝政吉凶事雜臣竊為疑高祖曰卿等猶以朕之未除於上不忍專釋於下奈何令朕獨忍於親舊論云王者不遂三年之服者屈己以寬羣下也先后之撫羣下也念之若子視之猶傷卿等哀慕之思既不求寬朕欲盡罔極之慕何為不可但逼遺册不遂乃心將欲居廬服衰寫朝夕之慕升堂襲素理日昃之勤使大政不荒哀情獲遂吉不害於凶凶無妨於吉以心處之謂為可爾遺旨之文公卿所議皆服終三旬釋衰襲吉從此而行情實未忍遂服三年重違旨誥今處二理之際唯望至期使四氣一周寒暑代易雖不盡三年之心得一經忌日情結差申案禮卒哭之後將受變服於朕受日庶民及小官皆命即吉內職羽林中郎已下虎賁郎已上及外職五品已上無衰服者素服以終三月內職及外臣衰服者變從練禮外臣三月而除諸王三都駙馬及內職至來年三月晦朕之練也除凶即吉侍臣君服斯服隨朕所降此雖非舊式推情即理有貴賤之差遠近之別明根對曰聖慕深遠孝情彌至臣等所奏已不蒙許願得踰年即吉既歷冬正歲序改易且足申至慕之情又近遺誥之意何待期年高祖曰册旨速除之意慮廣及百官久曠衆務豈於朕一人獨有違奪今既依次降除各不廢王政復何妨於事而猶奪期年之心高閭對曰昔王孫裸葬士安去棺其子皆從而不違不為不孝此雖貴賤非倫事頗相似臣敢借以為諭今親奉遺令而有所不從臣等所以頻煩干奏李彪亦曰三年不改其父之道可謂大孝今不遵册令恐涉改道之嫌高祖曰王孫士安皆誨子以儉送終之事及其遵也豈異今日改父之道者蓋謂慢孝忘禮肆情違度今梓宮之儉玄房之約明器幃帳一無所陳如斯之事卿等所悉衰服之告乃至聖心卑己申下之意寧可苟順沖約之旨而頓絶創巨之痛縱有所涉甘受後代之譏未忍今日之請又表稱春秋蒸嘗事難廢闕朕聞諸夫子吾不與祭如不祭自先朝以來有司行事不必躬親比之聖言於事殆闕賴蒙慈訓之恩自行致敬之禮今昊天降罰殃禍上延人神喪恃幽顯同切想宗廟之靈亦輟歆祀脫行饗薦恐乖冥旨仰思成訓倍增痛絶豈忍身襲衮冕親行吉事高閭對曰古者郊天越紼行事宗廟之重次於郊祀今山陵已畢不可久廢廟饗高祖曰祭祀之典事由聖經未忍之心具如前告脫至廟庭號慕自纏終恐廢禮公卿如能獨行事在言外李彪曰三年不為禮禮必壞三年不為樂樂必崩今欲廢禮闕樂臣等未敢高祖曰此乃宰豫不仁之説己受責於孔子不足復言羣官前表稱高宗徒有諒暗之言而無可遵之式朕惟信暗默之難周公禮制自茲以降莫能景行言無可遵之式良可怪矣復云康王既廢初喪之儀先行即位之禮於是無改之道式虧三年之喪有缺朕謂服美不安先賢有諭禮畢居喪著在前典或虧之言有缺之義深乖理衷高閭對曰臣等據案成事依附杜預多有未允至乃推校古今量考衆議實如明旨臣等竊惟曾參匹夫七日不食夫子以為非禮及録其事唯書七日不稱三年蓋重其初慕之心伏惟陛下以萬乘之尊不食竟於五日既御則三食不充半溢臣等伏用悲惶肝腦塗地躬行一日足以貫被幽顯豈宜衰服三年以曠機務夫聖人制禮不及者企而及之過之者俯而就之伏願陛下抑至慕之情俯就典禮之重誠是臣等慺慺之願高祖曰恩隆德厚則思戀自深雖非至情由所感發然曾參之孝曠代而有豈朕今日所足論也又前表稱古者葬而即吉不必終禮此乃二漢所以經綸治道魏晉所以綱理庶政朕以為既葬即吉蓋其季俗多亂權宜救世耳諒非光治興邦之化二漢之盛魏晉之興豈由簡略喪禮遺忘仁孝哉公卿偏執一隅便謂經治之要皆在於斯殆非義也昔平日之時公卿每奏稱當今四海晏安諸夏清泰禮樂日新政和民悅蹤侔軒唐事等虞禹漢魏已下固不足仰止聖治及至今日便欲苦奪朕志使不踰於魏晉如此之意未解所由昔文母上承聖主之資下有賢子之化唯助德宣政因風致穆而已當今衆事草創萬務惟始朕以不德沖年踐祚而聖母匡訓以義方詔誨以政事經綸內外憂勤億兆使君臣協和天下緝穆上代已來何后之功得以仰比如有可擬則從衆議堯雖棄子禪舜而舜自有聖德不假堯成及其徂也猶四海遏密終於三年今慈育之恩詔教之德尋之曠代未有匹擬既受非常之恩寧忍從其常式況未殊一時而公卿欲令即吉冠冕黼黻行禮廟庭臨軒設懸饗會萬國尋事求心實所未忍高閭對曰臣等遵承册令因循前典惟願除衰即吉親理萬機至德所在陛下欽明稽古周覽墳籍孝性發於聖質至情出於自然斟酌古今事非臣等所及李彪曰當今雖治風緝穆民庶晏然江南有未賓之吳朔北有不臣之虜東西二蕃雖文表稱順情尚難測是以臣等猶懷不虞之慮高祖曰魯公帶絰從師晉侯墨衰敗寇往聖無譏前典所許如有不虞雖越紼無嫌而況衰麻乎豈可於晏安之辰豫念戎旅之事以廢喪紀哉李彪對曰昔太伯父死適越不失至德之名夫豈不懷有由然也伏願抑至慕之心從遺告之重臣聞知子莫若父母聖后知陛下至孝之性也難奪故豫造金册明著遺禮今陛下孝慕深遠果不可奪臣等常辭知何所啓高祖曰太伯之言有乖今事諸情備如前論更不重古義亦有稱王者除衰而諒暗終喪者若不許朕衰朕則當除衰暗默委政冢宰二事之中惟公卿所擇明根對曰陛下孝侔高宗慕同大舜服衰麻以申至痛理萬機以從遺旨興曠世之廢禮制一代之高則臣等伏尋淵默不言則代政將曠仰順聖慕之心請從衰服之旨東陽王丕曰臣與尉元歷事五帝雖衰老無識敢奏所聞自聖世以來大諱之後三月必須迎神於西攘惡於北具行吉禮自皇始以來未之或易高祖曰太尉國老言先朝舊事誠如所陳但聰明正直唯德是依若能以道不召自至苟失仁義雖請弗來大禍三月而備行吉禮深在難忍縱即吉之後猶所不行況數旬之中而有此理恐是先朝萬得之一失未可以為常式朕在不言之地不應如此但公卿執奪朕情未忍從遂成往復追用悲絶上遂號慟羣官亦哭而辭出壬午詔曰公卿屢上啓事依據金册遺旨中代成式求過葬即吉朕仰惟恩重不勝罔極之痛思遵遠古終三年之禮比見羣官具論所懷今依禮既虞卒哭剋此月二十日受服以葛易麻既衰服在上公卿不得獨釋於下故於朕之授變從練已下復為節降斷度今古以情制衷但取遺旨速除之一節粗申臣子哀慕之深情欲令百官同知此意故用宣示便及變禮感痛彌深十五年四月癸亥朔設薦於太和廟是日高祖及從服者仍朝夕臨始進蔬食上哀哭追感不飯侍中南平王馮誕等諫經宿乃膳甲子罷朝夕哭九月丙戌有司上言求卜祥日詔曰便及此期覽以摧絶敬祭卜祥乃古之成典但世失其義筮日求吉既乖敬事之志又違永慕之心今將屈禮厲衆不訪龜兆已企及此晦寧敢重違册旨以異羣議尋惟永往言增崩裂丁亥高祖宿於廟至夜一刻引諸王三都大官駙馬三公令僕已下奏事中散已上及刺史鎮將立哭於廟庭三公令僕升廟既出監御令陳服笥於廟陛南近侍者奉而升列於堊室前席侍中南平王馮誕𢔛奏請易服進縞冠皂朝服革帶黑屨侍臣各易以黑介幘白絹單衣革帶烏履遂哀哭至乙夜盡戊子質明薦羞奏事中散已上冠服如侍臣刺史已下無變高祖薦酌神部尚書王諶讚祝訖哭拜遂出有司陽祥服如前侍中𢔛奏請易祭服進縞冠素紕白布深衣麻繩履侍臣去幘易幍羣官易服如侍臣又引入如前儀曹尚書遊明根升廟𢔛慰復位哭遂出引太守外臣及諸部渠帥入哭次引蕭賾使并雜客入至甲夜四刻侍御散騎常侍司衛監以上升廟哭既而出帝出廟停立哀哭久而乃還十月太尉丕奏曰竊聞太廟已就明堂功畢然享祀之禮不可久曠至於移廟之日須得國之大姓遷主安廟神部尚書王諶既是庶姓不宜參豫臣昔以皇室宗屬遷世祖之主先朝舊式不敢不聞詔曰具聞所奏尋惟平日倍增痛絶今遵述先旨營建寢廟既而粗就先王制禮職司有分移廟之日遷奉神主皆太尉之事朕亦親自行事不得越局專委大姓王諶所司惟贊板而已時運流速奄及縞制復不得哀哭於明堂後當親拜山陵寫泄哀慕是年高麗王死十二月詔曰高麗王璉守蕃東隅纍朝貢職年踰期頤勤德彌著今既不幸其赴使垂至將為之舉哀而古者同姓哭廟異姓隨其方皆有服制今既久廢不可卒為之衰且欲素委貌白布深衣於城東為盡一哀以見其使也朕雖不嘗識此人甚悼惜之有司可申敕備辦事如別儀十六年九月辛未高祖哭於文明太后陵左終日不絶聲幕越席為次侍臣侍哭壬申高祖以忌日哭於陵左哀至則哭侍哭如昨帝二日不御膳癸酉朝中夕三時哭拜於陵前夜宿監玄殿是夜徹次甲戌帝拜哭辭陵還永樂宮十九年太師馮熙薨有數子尚幼議者以為童子之節事降成人謂為衰而不裳免而不絰又無腰麻繆垂唯有絞帶時博士孫惠蔚上書言臣雖識謝古人然微涉傳記近取諸身遠取諸禮驗情以求理尋理以推制竊謂童子在幼之儀居喪之節冠杖之制有降成人衰麻之服略為不異以玉藻二簡微足明之曰童子之節錦紳并紐錦紳即大帶既有佩觿之革又有錦紐之紳此明童子雖幼已備二帶以凶類吉則腰絰存焉又曰童子無緦服鄭注曰雖不服緦猶免深衣是許其有裳但不殊上下又深衣之制長幼俱服童子為服之緦猶免深衣況居有服之斬而反無裳乎臣又聞先師舊説童子常服類深衣衰裳所施理或取象但典無成言故未敢孤斷又曰聽事則不麻則知不聽事麻矣故注曰無麻往給事此明族人之喪童子有事貫絰帶麻執事不易故暫聽去之以便其使往則不麻不往則絰如使童子本自無麻禮腰首聽與不聽俱闕兩絰唯舉無麻足明不備豈得言聽事則不麻乎以此論之有絰明矣且童子不杖不廬之節理儉於責不裳不絰之制未覩其説又臣竊解童子不衣裳之記是有間之言將謂童子時甫稚齡未就外傅出則不交族人內則事殊長者餕旨父母之前往來慈乳之手故許其無裳以便易之若在志學之後將冠之初年居二九質並成人受道成均之學釋菜上庠之內將命孔氏之門執燭曾參之室而唯有掩身之衣無蔽下之裳臣愚未之安矣又女子未許嫁二十則笄觀祭祀納酒漿助奠廟堂之中視禮至敬之處其於婉容之服寧無其備以此推之則男女雖幼理應有裳但男女未冠禮謝三加女子未出衣殊狄褖無名之服禮文罕見童子雖不當室苟以成人之心則許其人服緦之絰輕猶有絰斬重無麻是為與輕而奪重非禮之意此臣之所以深疑也又衰傍有袵以掩裳際如使無裳袵便徒設若復去袵衰又不備設有齊斬之故而便成童男女唯服無袵之衰去其裳絰此必識禮之所不行亦以明矣若不行於己而立制於人是為違制以為法從制以誤人恕禮而行理將異此詔從其議
