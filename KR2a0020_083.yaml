body:
  text: 魏書卷七十八列傳第六十六孫紹張普惠孫紹字世慶昌黎人世仕慕容氏祖志入國卒於濟陽太守父協字文和上黨太守紹少好學通涉經史頗有文才陰陽術數多所貫涉初為校書郎稍遷給事中自長兼羽林監為門下錄事朝廷大事好言得失遂為世知曾著釋典論雖不具美時有可存與常景等共修律令延昌中紹表曰臣聞建國有計雖危必安施化能和雖寡必盛治乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也伏惟大魏應天明命兆啟無窮畢世後仁祚隆七百今二虢京門下無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領護分事之式徵兵儲粟之要舟車水陸之資山河要害之權緩急去來之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懷怨中正賣望於下里主按舞筆於上臺真偽混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭奄殊類應同役而苦樂懸異士人居職不以為榮兵士役苦心不忘亂故有競棄本出飄藏他土或詭名託養散在人間或亡命山藪漁獵為命或投仗強豪寄命衣食又應遷之戶逐樂諸州應留之徒避寒歸暖兼職人子弟隨逐浮遊南北東西卜居莫定關禁不修任意取適如此之徒不可勝數爪牙不復為用百工爭棄其業混一之計事實闕如考課之方責辦無日流浪之徒決須精校今強敵窺時邊黎伺隙內民不平久戍懷怨戰國之勢竊謂危矣必造禍源者北邊鎮戍之人也若夫一統之年持平用之者大道之計也亂離之期縱橫作之者行權之勢也故道不可久須文質以換情權不可隨洿隆以收物文質應世道形自安洿隆獲衷權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令並議律尋施行令獨不出十餘年矣臣以令之為體即帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要乃是有為之樞機世法之大本也然修令之人亦皆博古依古撰置大體可觀比之前令精粗有在但主議之家太用古制若全依古高祖之法復須昇降誰敢措意有是非哉以是爭故久廢不理然律令相須不可偏用今律班令止於事甚滯若令不班是無典法臣下執事何依而行臣等修律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懷於悒未幾出除濟陰太守還歷司徒功曹參軍步兵長水校尉正光初兼中書侍郎使高麗還為鎮遠將軍右軍將軍久之為徐兗和糴使還朝大陳軍國利害不報紹又表曰臣聞文質互用治道以之緝熙洿隆得時人物以之通濟故能事恢三靈仁洽九服伏惟陛下應靈踐阼沖明照物宰輔忠純伊霍均美既致昇平之基應成無為之業而漠北叛命隴右構逆中州驚擾民庶竊議其故何哉皆由上法不通下情怨塞故也臣雖愚短具鑒始末往在代都武質而治安中京以來文華而政亂故臣昔於太和極陳得失具論四方華夷心態高祖垂納文應可尋延昌正光奏疏頻上主者收錄不蒙報問即日事勢乃至於此盡微臣豫陳之驗今東南有竊號之豎西北有逆命之寇豈得怨天實尤人矣臣今不憂荒外正慮中畿急須改張以寧其意若仍持疑變亂尋作肘腋一乖大事去矣然臣奉國四世欣戚是同但職在冗散不關樞密寧濟之計欲陳無所可謂經緯甚多無機可織夫天下者大器也一正難傾一傾難正當今之危躡足之急臣備肉食痛心無已泣血上陳願垂採察若得言參執事獻可替否寇逆獲除社稷稱慶雖死如生犬馬情畢紹性抗直每上封事常至懇切不憚犯忤但天性疏脫言乍高下時人輕之不見採納紹兄世元早卒世元善彈箏紹後聞箏聲便涕泗嗚咽捨之而去世以此尚之除驍騎將軍使吐谷渾還為太府少卿曾因朝見靈太后謂曰卿年稍老矣紹曰臣年雖老臣卿乃少太后笑之遷右將軍太中大夫紹曾與百僚赴朝東掖未開守門候旦紹於衆中引吏部郎中辛雄於衆外竊謂之曰此中諸人尋當死盡唯吾與卿猶享富貴雄甚駭愕不測所以未幾有河陰之難紹善推祿命事驗甚多知者異之建義初除衞尉少卿將軍如故轉金紫光祿大夫永安中拜太府卿以前參議正光壬子曆賜爵新昌子太昌初遷左衞將軍右光祿大夫永熙二年卒時年六十九贈都督冀瀛滄三州諸軍事驃騎大將軍尚書左僕射冀州刺史諡曰宣子伯元襲齊受禪例降伯元弟叔利右將軍太中大夫紹從父弟瑜濟州長史瑜弟彝字鳳倫太和中舉秀才稍遷步兵校尉卒於武邑太守贈征虜將軍營州刺史子伯融出繼瑜後武定末太守伯融嫡弟子寬開府田曹參軍張普惠字洪賑常山九門人身長八尺容貌魁偉父曄為齊州中水縣令隨父之縣受業齊土專心墳典克厲不息及還鄉里就程玄講習精於三禮兼善春秋百家之說多所窺覽諸儒稱之太和十九年為主書帶制局監與劉桃符石榮劉道斌同員共直頗為高祖所知轉尚書都令史任城王澄重其學業為其聲價僕射李沖曾至澄處見普惠言論亦善之世宗初轉積射將軍澄為安西將軍雍州刺史啟普惠為府錄事參軍尋行馮翊郡事澄功衰在身欲於七月七日集會文武北園馬射普惠奏記於澄曰竊聞三殺九親別疏昵之五服六術等衰麻之心皆因事飾情不易之道者也然則莫大之痛深於終身之外書策之哀除於喪紀之內外者不可無節故斷之以三年內者不可遂除故敦之以日月禮大練之日鼓素琴蓋推以即吉也小功以上非虞祔練除不沐浴此拘之以制也曾子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人祭既不與疑無宴食之道又曰廢喪服可以與於饋奠之事乎子曰脫衰與奠非禮也注云為其忘哀疾愚謂除喪之始不與饋奠小功之內其可觀射乎雜記云大功以下既葬適人人食之其黨也食之非黨也不食食猶擇人於射為惑伏見明教立射會之限將以二七令辰集城中文武肄武藝於北園行揖讓於中否時非大閱之秋景涉妨農之節國家縞禫甫除殿下功衰仍襲釋而為樂以訓百姓便是易先王之典教忘哀戚之情恐非所以昭令德視子孫者也按射儀射者以禮樂為本忘而從事不可謂禮鍾鼓弗設不可謂樂捨此二者何用射為又七日之戲令制無之班勞所施慮違事體庫府空虛宜待新調二三之趣停之為便乞至九月備飾盡行然後奏狸首之章宣矍相之令聲軒懸建雲鉦神民忻暢於斯時也伏惟慈明遠被萬民是望舉動所書發言唯則願更廣訪賜垂曲採昭其管見之心恕其讜言之責則芻蕘無遺歌輿人有獻誦矣澄意納其言託辭自罷乃答曰文武之道自昔成規明教戰振古常軌今雖非公制而此州承前已有斯式既不勞民損公任其私射復何失也且纂文習武人之常藝豈可於常藝之間要須令制乎比適欲依前州府相率王務之暇肄藝良辰亦未言費用庫物也禮兄弟內除明哀已殺小功客至主不絕樂聽樂則可觀武豈傷直自事緣須罷先以令停方獲此請深具來意澄轉揚州啟普惠以羽林監領鎮南大將軍開府主簿尋加威遠將軍普惠既為澄所知歷佐二藩甚有聲譽旋京之日裝束藍縷澄賚絹二十匹以充行資還朝仍羽林監又澄遭太妃憂臣僚為立碑頌題碑欲云康王元妃之碑澄訪於普惠答曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以別名位且以氏配姓愚以為在生之稱故春秋夫人姜氏至自齊既葬以諡配姓故經書葬我小君文姜氏又曰來歸夫人成風之襚皆以諡配姓古者婦人從夫諡今烈懿太妃德冠一世故特蒙褒錫乃萬代之高事豈容於定名之重而不稱烈懿乎澄從之及王師大舉重征鍾離普惠為安樂王詮別將長史班師除揚烈將軍相州安北府司馬遷步兵校尉後以本官領河南尹丞世宗崩坐與甄楷等飲酒遊從免官驍騎將軍刁整家有舊訓將營儉葬普惠以為矯時太甚與整書論之事在刁雍傳故事免官者三載之後降一階而若才優擢授不拘此限熙平中吏部尚書李韶奏普惠有文學依才優之例宜特顯敕除寧遠將軍司空倉曹參軍朝議以不降階為榮時任城王澄為司空表議書記多出普惠廣陵王恭北海王顥疑為所生祖母服期與三年博士執意不同詔羣僚會議普惠議曰謹按二王祖母皆受命先朝為二國太妃可謂受命於天子為始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾子父在為母大功則士之妾子為母期父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命為之三年況天子命其子為列國王命其所生母為國太妃反自同公子為母練冠之與大功乎輕重顛倒不可之甚者也傳曰始封之君不臣諸父昆弟則當服其親服若魯衞列國相為服期判無疑矣何以明之喪服君為姑姊妹女子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相為服不可還準公子遠厭天王故降有四品君大夫以尊降公子大夫之子以厭降名例不同何可亂也禮大夫之妾子以父命慈己申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之高據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻為其皇姑公子雖厭妻尚獲申況廣陵北海論封則封君之子語妃則命妃之孫承妃纂重遠別先皇更以先后之正統厭其所生之祖嫡方之皇姑不以遙乎今既許其申服而復限之以期比之慈母不亦爽歟經曰為君之祖父母父母妻長子傳曰何以期父母長子君服斬妻則小君父卒然後為祖後者服斬今祖乃獻文皇帝諸侯不得祖之母為太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或遠且天子尊則配天莫非臣妾何為命之為國母而不聽子服其親乎記曰從服者所從亡則已又曰不為君母之黨服則為其母之黨服今所從既亡不以親服服其所生則屬從之服於何所施若以諸王入為公卿便同大夫者則當今之議皆不須以國為言也今之諸王自同列國雖不之國別置臣僚玉食一方不得以諸侯言之敢據周禮輙同三年當時議者亦有同異國子博士李郁於議罷之後書難普惠普惠據禮還答鄭重三返郁議遂屈轉諫議大夫澄謂普惠曰不喜君得諫議唯喜諫議得君時靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號詣闕上疏陳其不可左右畏懼莫敢為通會聞胡家穿壙下墳有磐石乃密表曰臣聞優名寶位王者之所光錫尊君愛親臣子所以慎終必使勳績相侔號秩相可然後能顯揚當時傳徽萬代者矣竊見故侍中司徒胡公懷道含靈實誕聖后載育至尊母儀四海近樞克唯允之寄居槐體論道之明故以功餘九錫褒假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未衷何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可並大禮記曰天無二日土無二王嘗禘郊社尊無二上明君臣不可並上伏見詔書以司徒為太上秦公夫人為太上秦君夫人蒙號於前司徒繫之於後尊光之美盛矣竊惟高祖受禪於獻文皇帝故仰尊為太上皇此因上上而生名也皇太后稱令以繫敕下蓋取三從之道遠同文母列於十亂則司徒之為太上恐乖繫敕之意春秋傳曰葬稱公臣子辭明不可復加上也書曰茲予大饗于先王爾祖其從與饗之司徒位尊屬重必當配饗先朝稱太上以為臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晉有小子侯尚曰僭之於天子司徒三公也其可同號於帝乎孔子曰必也正名名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又曰困於上者必反於下故受之以井比剋吉定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啟聖情伏願聖后回日月之明察微臣之請停司徒逼同之號從卑下不踰之稱畏困上之鑒邀謙光之福則天下幸甚臣聞見災修德災變成善此太戊所以興殷桑穀以之自滅況今卜遷方始當修革之會愚以為無上之名不可假之脫譏於千載恐貽不言之咎且君之於臣比葬三臨之禮也司徒誠為后父實人臣也雖子尊不加於父乃天下母以義斷恩不可遂在室之意故曰女子有行遠父母兄弟況乃應坤之載承天之重而朔望於司徒之殯晨昏於郊墓之間雖聖思蒸蒸其不虞宜戒離宸極之嚴居疲雲蹕於道路此亦億兆蒼生瞻仰失圖伏願尋載馳之不歸存靜方之光大則草木可繁人靈斯穆臣職忝諫司敢獻狂瞽謹冒上聞不敢宣露乞垂省覽昭臣微款脫得奉謁聖顏曲盡愚衷者死且不朽太后覽表親至國珍宅召集王公八座卿尹及五品已上博議其事遣使召普惠與相問答又令侍中元叉中常侍賈璨監觀得失任城王澄問普惠曰漢高作帝尊父為太上皇今聖母臨朝贈父太上公求之故實非為無準且君舉作則何必循舊對曰天子稱詔太后稱令故周臣十亂文母預焉仰思所難竊謂非匹澄曰前代太后亦有稱詔聖母自欲存謙光之義故不稱耳何得以詔令之別而廢嚴父之孝對曰后父太上自昔未有前代母后豈不欲尊崇其親王何以不遠謨古義而近順今旨未審太后何故謙於稱詔而不謙於太上竊願聖后終其謙光太傅清河王懌曰昔在僭晉褚氏臨朝殷浩遺褚裒書曰足下今之太上皇也況太上公而致疑對曰褚裒以女輔政辭不入朝淵源譏其不恭故有太上之刺本稱其非不記其是不謂殿下以此賜難侍中崔光曰張生表中引晉有小子侯出自鄭注非為正經對曰雖非正經之文然述正經之旨公好古習禮復固斯難御史中尉元匡因謂崔光曰張表云晉之小子侯以號同稱僭今者太上公名同太上皇比晉小子義似相類但不學不敢辨其是非普惠對曰中丞既疑其是不正其非豈所望於三獨尚書崔亮曰諫議所見正以太上之號不應施於人臣然周有太公尚父亦兼二名人臣尊重之稱固知非始今日普惠對曰尚父者有德可尚太上者上中之上名同義異此亦非並亮又曰古有文王武王亦有文子武子然則太上皇太上公亦何嫌其同也普惠對曰文武者德行之迹故迹同則諡同太上者尊極之位豈得通施於臣下廷尉少卿袁翻曰周官上公九命上大夫四命命數雖殊同為上何必上者皆是極尊普惠厲聲訶翻曰禮有下卿上士何止大夫與公但今所行以太加上二名雙舉不得非極雕蟲小藝微或相許至於此處豈卿所及翻甚有慚色默不復言任城王澄曰諫諍之體各言所見至於用捨固在應時卿向答袁氏聲何太厲普惠對曰所言若是宜見採用所言若非懼有罪及是非須辨非為苟競澄曰朝廷方開不諱之門以廣忠言之路卿今意在向義何云乃慮罪罰議者咸以太后當朝志相崇順遂奏曰張普惠辭雖不屈然非臣等所同渙汗已流請依前詔太后復遣元叉賈璨宣令謂普惠曰朕向召卿與羣臣對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道羣公已有成議卿不得苦奪朕懷後有所見勿得難言普惠於是拜令辭還初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖涕泣普惠謂曰我當休明之朝掌諫議之職若不言所難言諫所難諫便是唯唯曠官尸祿人生有死死得其所夫復何恨然朝廷有道汝輩勿憂及議罷旨勞還宅親故賀其幸甚時中山莊弼遺書普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使羣后逡巡庶僚拱默雖不見用於一時固已傳美於百代聞風快然敬裁此白普惠美其此書每為口實普惠以天下民調幅度長廣尚書計奏復徵綿麻恐其勞民不堪命上疏曰伏聞尚書奏復綿麻之調尊先皇之軌夙宵惟度忻戰交集何者聞復高祖舊典所以忻惟新俱可復而不復所以戰違法仰惟高祖廢大斗去長尺改重秤所以愛萬姓從薄賦知軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上稅綿八兩布上稅麻十五斤萬姓得廢大斗去長尺改重秤荷輕賦之饒不適於綿麻而已故歌舞以供其賦奔走以役其勤天子信於上億兆樂於下故易曰悅以使民民忘其勞此之謂也自茲以降漸漸長闊百姓嗟怨聞於朝野伏惟皇太后未臨朝之前陛下居諒闇之日宰輔不尋其本知天下之怨綿麻不察其輻廣度長秤重斗大革其所弊存其可存而特放綿麻之調以悅天下之心此所謂悅之不以道愚臣所以未悅者也尚書既知國少綿麻不惟法度之易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而羣官共竊之愚臣以為於理未盡何者今宮人請調度造衣物必度忖秤量絹布匹有尺丈之盈一猶不計其廣絲綿斤兼百銖之剩未聞依律罪州郡若一匹之濫一斤之惡則鞭戶主連三長此所以教民以貪者也今百官請俸人樂長闊并欲厚重無復準極得長闊厚重者便云其州能調絹布精闊且長橫發美譽以亂視聽不聞嫌長惡廣求計還官者此百司所以仰負聖明也今若必復綿麻者謂宜先令四海知其所由明立嚴禁復本幅度新綿麻之典依太和之稅其在庫絹布并及絲綿不依典制者請遣一尚書與太府卿左右藏令依今官度官秤計其斤兩廣長折給請俸之人總常俸之數千俸所出以布綿麻亦應其一歲之用使天下知二聖之心愛民惜法如此則高祖之軌中興於神龜明明慈信照布於無窮則孰不幸甚伏願亮臣悾悾之至下慰蒼生之心普惠又表乞朝直之日時聽奉見自此之後月一陛見又以肅宗不親視朝過崇佛法郊廟之事多委有司上疏曰臣聞明德卹祀成湯光六百之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之冥業損巨費於生民減祿削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首於外玄寂之衆遨遊於內愆禮忤時人靈未穆愚謂從朝夕之因求秖劫之果未若先萬國之忻心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之虔親紆朔望之禮釋奠成均竭心千畝明發不寐潔誠禋祼孝悌可以通神明德教可以光四海則一人有喜兆民賴之然後精進三寶信心如來道由禮深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經遠言多孟浪忝職其憂不敢默爾尋別敕付外議釋奠之禮時史官剋日蝕豫敕罷朝普惠以逆廢非禮上疏陳之又表論時政得失一曰審法度平斗尺租調務輕賦役務省二曰聽輿言察怨訟先皇舊事有不便於政者請悉追改三曰進忠謇退不肖任賢勿貳去邪勿疑四曰興滅國繼絕世勳親之胤所宜收書奏肅宗靈太后引普惠於宣光殿隨事難詰延對移時令曰寧有先皇之詔一一翻改普惠僶俛不言令曰卿似欲致諫故以左右有人不肯苦言朕為卿屏左右卿其盡陳之對曰聖人之養庶物愛之如傷況今二聖纂承洪緒妻承夫子承父夫父之不可安然仍行豈先帝傳委之本意仰惟先帝行事或有司之謬或權時所行在後以為不可者皆追而正之聖上忘先帝之自新不問理之伸屈一皆抑之豈蒼生黎庶所仰望於聖德太后曰小小細務一一翻動更成煩擾普惠曰聖上之養庶物若慈母之養赤子今赤子幾臨危壑將赴水火以煩勞而不救豈赤子所望於慈母太后曰天下蒼生寧有如此苦事普惠曰天下之親懿莫重於太師彭城王然遂不免枉死微細之苦何可得無太后曰彭城之苦吾已封其三子何足復言普惠曰聖后封彭城之三子天下莫不忻至德知慈母之在上臣所以重陳者凡如此枉乞垂聖察太后曰卿云興滅國繼絕世滅國絕世竟復誰是普惠曰昔淮南逆終漢文封其四子蓋骨肉之不可棄親親故也竊見故太尉咸陽王冀州刺史京兆王乃皇子皇孫一德之虧自貽悔戾淪幽壤緬焉弗收豈是興滅繼絕之意乞收葬二王封其子孫愚臣之願太后曰卿言有理朕深戢之當命公卿博議此事及任城王澄薨普惠以吏民之義又荷其恩待朔望奔赴至於禫除雖寒暑風雨無不必至初澄嘉賞普惠臨薨啟為尚書右丞靈太后既深悼澄覽啟從之詔行之後尚書諸郎以普惠地寒不應便居管轄相與為約並欲不復上省紛紜多日乃息正光二年詔遣楊鈞送蠕蠕主阿那瓌還國普惠謂遣之將貽後患上疏曰臣聞乾元以利貞為大非義則不動皇王以博施為功非類則不從故能始萬物而化天下者也伏惟陛下叡哲欽明道光虞舜八表宅心九服清晏蠕蠕相害於朔垂妖師扇亂於江外此乃封豕長蛇不識王度天將悔其罪所以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以悅其志恭己以懷其心而先自勞擾艱難下民興師郊甸之內遠投荒塞之外救累世之勁敵可謂無名之師諺曰唯亂門之無過愚情未見其可當是邊將窺竊一時之功不思兵為凶器不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆橫行匈奴中季布以為不可請斬之千載以為美況今旱酷異常聖慈降膳乃以萬五千人使楊鈞為將而欲定蠕蠕忤時而動其可濟乎阿那瓌投命皇朝撫之可也豈容困疲我兆民以資天喪之虜昔莊公納子糾以致乾時之敗魯僖以邾國而有懸冑之今蠕蠕時亂後主繼立雖云散亡姦虞難抑脫有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年飢饉相仍須其自斃小亡大傷然後一舉而并之此卞氏之高略所以獲兩虎不可不圖之今土山告難簡書相續蓋亦無能為也正與今舉相會天其或者欲以告戒人不欲使南北兩疆並興大衆脫狂狡構間於其間而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此微臣所以寒心者也那瓌之不還負何信義此機之際北師宜停臣言不及義文書所經過不敢不陳兵猶火也不戢將自焚二虜自滅之形可以為殷鑒伏願輯和萬國以靜四疆混一之期坐而自至矣臣愚昧多違必無可採匹夫之智願以呈獻表奏詔答曰夫窮鳥歸人尚或興惻況那瓌嬰禍流離遠來依庇在情在國何容弗矜且納亡興喪有國大義皇魏堂堂寧廢斯德後主亂亡似當非謬此送彼迎想無拒戰國義宜表朝算已決卿深誠厚慮朕用嘉戢但此段機略不獲相從脫後不逮勿憚匡言時蕭衍義州刺史文僧明舉城歸順揚州刺史長孫稚遣別駕封壽入城固守衍將裴邃湛僧率衆攻逼詔普惠為持節東道行臺攝軍司赴援之軍始渡淮而封壽已棄城單馬而退軍罷還朝蕭衍弟子西豐侯正德詐稱降款朝廷頗事當迎普惠上疏請赴揚州移還蕭氏不從俄而正德果逃還涼州刺史石士基行臺元洪超並贓貨被繩以普惠為右將軍涼州刺史即為西行臺以病辭免除光祿大夫右丞如故先是仇池武興羣氐數反西垂郡戍租運久絕詔普惠以本官為持節西道行臺給秦岐涇華雍豳東秦七州兵武三萬人任其召發送南秦東益二州兵租分付諸戍其所部將統聽於關西牧守之中隨機召遣軍資板印之屬悉以自隨普惠至南秦停岐涇華雍豳東秦六州兵武召秦州兵武四千人分配四統令送租兵連營接柵相繼而進運租車驢隨機輸轉別遣中散大夫封答慰喻南秦員外常侍楊公熙宣勞東益氐民於時南秦氐豪吳富聚合兇類所在邀劫公熙既至東益州刺史魏子建密與普惠書言公熙舊是蕃國之胤而諸氐與相見者必有陰私言宜加圖防普惠乃符攝公熙令赴南秦公熙果已密遣其從兄山虎與吳富同逆又妄自說鄉里紛動羣氐託云與崔南秦有隙拒而不赴租達平落吳富等果脅車營實公熙所潛遣也後吳富雖為左右所殺而徒黨猶盛秦所綰武都武階租頗得達東益羣氐先款順故廣業仇鳩河池三城粟便得入其應入東益十萬石租皆稽留費盡升斗不至鎮戍兵武遂致飢虛咸恨普恵經略不廣事訖普惠拜表按劾公熙還朝賜絹布一百段時詔訪寃屈普惠上疏曰詩稱文王孫子本枝百世易曰大君有命開國承家皆所以明德睦親維城作翰漢祖封爵之誓曰使黃河如帶太山如礪國以永存爰及苗裔又申之以丹書之信重之以白馬之盟其以強大分王罪犯蹙邑者蓋有之矣未聞父基子構世載忠賢一死一削用為典者也故尚書令臣肇未能遠稽古義近究成旨以初封之詔有親王二千戶始蕃一千戶二蕃五百戶三蕃三百戶謂是親疏世減之法又以開國五等有所減之言以為世減之趣遂立格奏奪稱是高祖本意仍被旨可差謬之來亦已甚矣遂使勳親懷屈幽顯同寃紛訟彌年莫之能息臣輒遠研旨格深窮其事世變減奪今古無據又尋詔書稱昔未可采今始列辭豈得混一罔分久近也故樂良樂安同蕃異封廣陽安豐屬別戶等安定之嫡邑齊親王河間戚近更從蕃食是乃太和降旨初封之倫級勳親兼樹非世減之大驗者也博陵襲爵亦在太和之年時不世減以父嘗全食足戶充本同之始封減從今式如此則減者減其所足之外足者足其所減之內減足之旨乃為所貢所食耳欲使諸王開國弗專其民賦役之差貴賤有等蓋準擬周禮公侯伯子男貢稅之法王食其半公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減戶故始封承襲俱稱所減謂減之以貢食謂食之於國斯實高祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差旨又判之以開訓所減之旨可以不疑於世減矣而臣肇弗稽往事曰五等有所減之格用為世減之法以王封有親疏之等謂是代削之條妄解成旨雷同世奪以此毒天下民其從乎故太傅任城文宣王臣澄樞弼累朝識洞今古為尚書之日殷勤執請孜孜於重議被旨不許於此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曾玄不治未恤嫡封則爵祿無窮枝庶則屬內貶絕儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其寃七廟之孫並訟其切陳訴之案盈於省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦九族之義也臣猥忝今任於茲五年推尋旨格謂無世減之理請近遵高祖減食之謨遠循百代象賢之誥退由九伐進從九儀則刑罰有倫封不虛黜斯乃文王所以克慎不敢侮於魚眾寡而況於公侯伯子男乎今旨訪寃滯愚以此為大者求尋光錫之詔并諸條格所奪所請事事窮審諸王開國非犯罪削奪者並求還復其昔嘗全食足戶充本減從令式者從前則力多於親懿全奪則減足之格不行愚謂祿力並應依所之食而食之若是則力少蕃王粟帛仍本戶邑雖盈之減兩秦既有全食足戶之異故不得同於新封之力耳親恤所裒請依律斷伏惟親親尊賢位必功立尊賢以司民可不慎乎親親以牧族其可棄乎如脫蒙允求以旨判為始其前來吏秩悉年久不追臣又聞明德慎罰文王所以造周咸有一德殷湯所以革夏故能上令下從風動草偃畏之如雷電敬之如明神是以天子家天下綏萬國若天之無不覆地之無不載遷都之構庶方子來汎澤所沾降及陪皂寧有岳牧二千石縣令丞尉治中別駕及諸軍幢受命於朝廷而可不預乎此之班駁雲雨之不平謂是當時有司出納之未允何以明之仰尋世宗詔書百官普進一級中有朝臣刺史登時褒授則內外貴賤莫不同澤又覆奏稱爰及陪皂明無不逮自後人率其心紛綸盈庭嫌少誤惑視聽限以汎前更為年斷六年三年之考以意折之汎前汎後之歲隔而絕之遂使如綸之旨頓於一朝汎前六年上第者全不得汎三年上第者蒙半階而已汎前汎後合考者隔絕而不得無考者無折而全汎前汎後有考無考並蒙全汎與否乖違勤舊彌屈差若毫釐謬以千里其此之謂乎易曰言行君子之所以動天下可不慎歟言之不從無以抑之遂奏奪牧守外祿全不與汎散官改為四年之考汎前者八年一階政令不一寃訟惟甚與而復奪其本在茲致使邀駕擊鼓者無理以加其罪誹謗公聽者無辭以抑其言噂所由生慢勃所由起夫琴瑟不調澆而更張善人國之本也其可棄乎詩云樂只君子邦家之基堯典曰克明俊德呂刑曰何擇非人周官曰官弗必備惟其人咎繇曰無曠庶官天工人其代之詩云人之云亡邦國殄悴又曰雨我公田遂及我私孔子曰不患貧而患不均如此則官必擇人汎則宜溥請遠遵正始元旨近準聖明二汎內外百官悉同一階不以汎前折考不以散任增年則同雲共澍四海均洽如謂未可宜以權理折之易曰聖人之大寶曰位何以守位曰仁春秋傳曰一曰擇人如此則乃可無汎不可無考守宰之汎既以追奪則百官之汎不應獨霑溥澤既收復誰敢怨夫三載之考興於太和再周之陟通於景明閑劇祿力自有加減陪臣以事省降而考則三年朝官既祿等平曹更四周乃陟考祿參差各稱其枉且一日從軍征戍苦於煩任終年專使決斷重於陪臣上若通為三載之考無汎隔折則各盈其分亦足以近塞羣口遠綏四方日昳求賢猶有所失況不遵擇人之訓唯以停久而進乎自今已後考黜願以三宅革心選進願以三儁居德書曰舉能其官惟爾之能稱非其人惟爾弗任斯周道所以佑辟康民敢不敬守臣忝官樞副毗察寃訟寤寐惟省謂宜追正愚固所陳萬無可採出除左將軍東豫州刺史淮南九戍十三郡猶因蕭衍前弊別郡異縣之民錯雜居止普惠乃依次括比省減郡縣上表陳狀詔許之宰守因此綰攝有方姦盜不起民以為便蕭衍遣將胡廣來寇安陽軍主陳明祖等脅白沙鹿城二戍衍又遣定州刺史田超秀田僧達等竊陷石頭戍徑據安陂城郢州新塘之賊近在州西數十里普惠前後命將拒戰並破之普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與其遊學早終其子長瑜普惠每於四時請祿無不減贍給其衣食及為豫州啟長瑜解褐攜其合門拯給之孝昌元年三月在州卒時年五十八贈平北將軍幽州刺史諡曰宣恭長子榮儁武定末齊王相府屬榮儁弟龍子揚州驃騎府長史史臣曰孫紹關右之士又能指論世務亦其志也張普惠明達典故強直從官侃然不撓其有王臣之風矣
