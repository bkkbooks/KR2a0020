body:
  text: 魏書卷一百九樂志五第十四氣質初分聲形立矣聖者因天然之有為入用之物緣喜怒之心設哀樂之器蕢桴葦籥其來自久伏羲絃琴農皇制瑟垂鍾和磬女媧之簧隨感而作其用稍廣軒轅桴阮瑜之管定小一之律以成咸池之美次以六莖五英大章韶夏護武之屬聖人所以移風易俗也故在易之豫義明崇德書云詩言志歌詠言聲依永律和聲八音克諧神人以和周禮圜鍾為宮黃鍾為角大蔟為徵沽洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞奏之六變天神可得而降矣函鍾為宮大蔟為角沽洗為徵南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞奏之八變地示可得而禮矣黃鍾為宮大呂為角大蔟為徵應鍾為羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九溬之舞奏之九變人鬼可得而禮矣此所以協三才寧萬國也凡音宮為君商為臣角為民徵為事羽為物五者不亂則無熫懘之音宮亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱姦聲感人逆氣應之逆氣成象而淫樂興焉正聲感人順氣應之順氣成象而和樂興焉先王其亂故制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠廉肉節奏足以感動人之善心而已不使放心邪氣得接焉樂在宗廟之中君臣上下同聽之莫不和敬在族長鄉里之中長幼同聽之莫不和順閨門之內父子兄弟同聽之莫不和親又有昧任離禁之樂以娛四夷之民斯蓋立樂之方也三代之衰邪音間起則有爛漫靡靡之樂興焉周之衰也諸侯力爭澆僞萌生淫慝滋甚競其邪忘其正廣其器蔑其禮或奏之而心疾或撞之不令晉平公聞清角而顛隕魏文侯聽古雅而眠睡鄭宋齊衛流宕不反於是正樂虧矣大樂感於風化與世推移治國之音安以樂亡國之音哀以思隨時隆替不常厥聲延陵歷聽諸國盛衰必舉蓋所感者著所識者深也樂之崩矣秦始滅學經亡義絶莫探其真人重協俗世貴順耳則雅聲古器幾將淪絶漢興制氏但識其鏗鏘鼓舞不傳其義而於郊廟朝廷皆協律新變雜以趙代秦楚之曲故王禹宋蟲念上書切諫丙強景武顯著當時通儒達士所共歎息矣後漢東平王蒼總議樂事頗有增加大抵循前而已及黃巾董卓以後天下喪亂諸樂亡缺魏武既獲杜夔令其考會古樂而柴玉左延年終以新聲寵愛晉世荀勗典樂與郭夏宋識之徒共加研集謂為合古而阮咸譏之金行不永以至亡敗哀思之來便為驗矣夫大樂與天地同和苟非達識至精何以體其妙極自漢以後舞稱歌名代相改易服章之用亦有不同斯則不襲之義也永嘉已下海內分崩伶官樂器皆為劉聰石勒所獲慕容俊平冉閔遂克之王猛平鄴入於關右苻堅既敗長安紛擾慕容永之東也禮樂器用多歸長子及垂平永並入中山自始祖內和魏晉二代更致音伎穆帝為代王愍帝又進以樂物金石之器雖有未周而絃管具矣逮太祖定中山獲其樂縣既初撥亂未遑創改因時所行而用之世歷分崩頗有遺失天興元年冬詔尚書吏部郎鄧淵定律呂協音樂及追尊皇曾祖皇祖皇考諸帝樂用八佾舞皇始之舞皇始舞太祖所作也以明開大始祖之業後更制宗廟皇帝入廟門奏王夏太祝迎神于廟門奏迎神曲猶古降神之樂乾豆上奏登歌猶古清廟之樂曲終下奏神祚嘉神明之饗也皇帝行禮七廟奏陛步以為行止之節皇帝出門奏總章次奏八佾舞次奏送神曲又舊禮孟秋祀天西郊兆內壇西備列金石樂具皇帝入兆內行禮咸奏舞八佾之舞孟夏有事于東廟用樂略與西郊同太祖初冬至祭天于南郊圓丘樂用皇矣奏雲和之舞事訖奏維皇將燎夏至祭地祇於北郊方澤樂用天祚奏大武之舞正月上日饗羣臣宣布政教備列宮懸正樂兼奏燕趙秦吳之音五方殊俗之曲四時饗會亦用焉凡樂者樂其所自生禮不忘其本掖庭中歌真人代歌上叙祖宗開基所由下及君臣廢興之跡凡一百五十章昏晨歌之時與絲竹合奏郊廟宴饗亦用之六年冬詔太樂總章鼓吹增修雜伎造五兵角抵麒麟鳳皇仙人長蛇白象白虎及諸畏獸魚龍辟邪鹿馬仙車高絙百尺長趫緣橦跳丸五案以備百戲大饗設之於殿庭如漢晉之舊也太宗初又增修之撰合大曲更為鍾鼓之節世祖破赫連昌獲古雅樂及平涼州得其伶人器服並擇而存之後通西域又以悅般國鼓舞設於樂署高宗顯祖無所改作諸帝意在經營不以聲律為務古樂音制罕復傳習舊工更盡聲曲多亡太和初高祖垂心雅古務正音聲時司樂上書典章有闕求集中祕羣官議定其事并訪吏民有能體解古樂者與之修廣器數甄立名品以諧八音詔可雖經衆議於時卒無洞曉聲律者樂部不能立其事彌缺然方樂之制及四夷歌舞稍增列于太樂金石羽旄之飾為壯麗於往時矣五年文明太后高祖並為歌章戒勸上下皆宣之管絃七年秋中書監高允奏樂府歌詞陳國家王業符瑞及祖宗德美又隨時歌謠不準古舊辨雅鄭也十一年春文明太后令曰先王作樂所以和風改俗非雅曲正聲不宜庭奏可集新舊樂章參探音律除去新聲不典之曲裨增鍾縣鏗鏘之韻十五年冬高祖詔曰樂者所以動天地感神祇調陰陽通人鬼故能關山川之風以播德於無外由此言之治用大矣逮乎末俗陵遲正聲頓廢多好鄭衛之音以悅耳目故使樂章散缺伶官失守今方釐革時弊稽古復禮庶令樂正雅頌各得其宜今置樂官實須任職不得仍令濫吹也遂簡置焉十六年春又詔曰禮樂之道自古所先故聖王作樂以和中制禮以防外然音聲之用其致遠矣所以通感人神移風易俗至乃簫韶九奏鳳皇來儀擊石拊石百獸率舞有周之季斯道崩缺故夫子忘味於聞韶正樂於返魯逮漢魏之間樂章復闕然博採音韻粗有篇條自魏室之興太祖之世尊崇古式舊典無墜但干戈仍用文教未淳故令司樂失治定之雅音習不典之繁曲比太樂奏其職司求與中書參議覽其所請愧感兼懷然心喪在躬未忍聞此但禮樂事大乃為化之本自非通博之才莫能措意中書監高閭器識詳富志量明允每間陳奏樂典頗體音律可令與太樂詳採古今以備茲典其內外有堪此用者任其參議也閭歷年考度粗以成立遇遷洛不及精盡未得施行尋屬高祖崩未幾閭卒先是閭引給事中公孫崇共考音律景明中崇乃上言樂事正始元年秋詔曰太樂令公孫崇更調金石燮理音準其書二卷并表悉付尚書夫禮樂之事有國所重可依其請八座已下四門博士以上此月下旬集太樂署考論同異博採古今以成一代之典也十月尚書李崇奏前被旨敕以兼太樂令公孫崇更調金石并其書表付外考試登依旨敕以去八月初詣署集議但六樂該深五聲妙遠至如仲尼淵識故將忘味吳札善聽方可論辨自斯已降莫有詳之今既草創悉不窮解雖微有詰論略無究悉方欲商榷淫濫作範將來寧容聊爾一試便垂竹帛今請依前所召之官并博聞通學之士更申一集考其中否研窮音律辨括權衡若可施用別以聞請制可時亦未能考定也四年春公孫崇復表言伏惟皇魏龍躍鳳舉配天光宅世祖太武皇帝革靜荒嵎廓寧宇內凶醜尚繁戎軒仍動制禮作樂致有闕如高祖孝文皇帝德鍾後仁之期道協先天之日顧雲門以興言感簫韶而忘味以故中書監高閭博識明敏文思優洽紹蹤成均實允所寄乃命閭廣程儒林究論古樂依據六經參諸國志錯綜陰陽以制聲律鍾石管絃略以完具八音聲韻事別粗舉值遷邑嵩瀍未獲周密五權五量竟不就果自爾迄今率多褫落金石虛懸宮商未會伏惟陛下至聖承天纂戎鴻烈以金石未協詔臣緝理謹即廣搜秬黍選其中形又採梁山之竹更裁律呂制磬造鍾依律並就但權量差謬其來久矣頃蒙付并州民王顯進所獻古銅權稽之古範考以今制鍾律準度與權參合昔造猶新始創若舊異世同符如合規矩樂府先正聲有王夏肆夏登歌鹿鳴之屬六十餘韻又有文始五行勺舞太祖初興置皇始之舞復有吳夷東夷西戎之舞樂府之內有此七舞太和初郊廟但用文始五行皇始三舞而已竊惟周之文武頌聲不同漢之祖宗廟樂又別伏惟皇魏四祖三宗道邁隆周功超鴻漢頌聲廟樂宜有表章或文或武以旌功德自非懿望茂親雅量淵遠博識洽聞者其孰能識其得失衛軍將軍尚書右僕射臣高肇器度淹雅神賞入微徽讚大猷聲光海內宜委之監就以成皇代典謨之美昔晉中書監荀勗前代名賢受命成均委以樂務崇述舊章儀刑古典事光前載豈遠乎哉又先帝明詔內外儒林亦任高閭申請今之所須求依前比世宗知肇非才詔曰王者功成治定制禮作樂以宣風化以通明神理萬品贊陰陽光功德治之大本所宜詳之可令太常卿劉芳亦與主之永平二年秋尚書令高肇尚書僕射清河王懌等奏言案太樂令公孫崇所造八音之器并五度五量太常卿劉芳及朝之儒學執諸經傳考辨合否尺寸度數悉與周禮不同問其所以稱必依經文聲則不協以情增減殊無準據竊惟樂者皇朝治定之盛事光贊祖宗之茂功垂之後王不刊之制宜憲章先聖詳依經史且二漢魏晉歷諸儒哲未聞器度依經而聲調差謬臣等參議請使臣芳準依周禮更造樂器事訖之後集議並呈從其善者詔可芳上尚書言調樂諧音本非所曉且國之大事亦不可決於數人今請更集朝彥衆辨是非明取典據資決元凱然後營制肇及尚書邢巒等奏許詔可於是芳主修營時揚州民張陽子義陽民兒鳳鳴陳孝孫戴當千吳殿陳文顯陳成等七人頗解雅樂正聲八佾文武二舞鐘聲管絃登歌聲調芳皆請令教習參取是非永平三年冬芳上言觀古帝王罔不據功象德而制舞名及諸樂章今欲教文武二舞施之郊廟請參制二舞之名竊觀漢魏已來鼓吹之曲亦不相緣今亦須制新曲以揚皇家之德美詔芳與侍中崔光郭祚黃門游肇孫惠蔚等四人參定舞名并鼓吹諸曲其年冬芳又上言臣聞樂者感物移風諷氓變俗先王所以教化黎元湯武所以改章功德晉氏失政中原紛蕩劉石以一時姦雄跋扈魏趙苻姚以部帥強豪趦趄關輔於是禮壞樂隳廢而莫理大魏應期啓運奄有萬方雖日不暇給常以禮樂為先古樂虧闕詢求靡所故頃年以來創造非一考之經史每乖典制遂使鏗鏘之禮未備於郊廟鼓舞之式尚闕於庭陛臣忝官宗伯禮樂是司所以仰慚俯愧不遑寧處者矣自獻春被旨賜令博採經傳更制金石并教文武二舞及登歌鼓吹諸曲今始校就謹依前敕延集公卿并一時儒彥討論終始莫之能異謹以申聞請與舊者參呈若臣等所營形合古制擊拊會節元日大饗則須陳列既歲聿云暮三朝無遠請共本曹尚書及郎中部率呈試如蒙允許賜垂敕判詔曰舞可用新餘且仍舊鼓吹雜曲遂寢焉初御史中尉元匡與芳等競論鍾律孝明帝熙平二年冬匡復上言其事太師高陽王雍等奏停之先是有陳仲儒者自江南歸國頗間樂事請依京房立準以調八音神龜二年夏有司問狀仲儒言前被符問京房準定六十之律後雖有器存曉之者鮮至熹平末張光等猶不能定絃之急緩聲之清濁仲儒授自何師出何典籍而云能曉但仲儒在江左之日頗愛琴又嘗覽司馬彪所撰續漢書見京房準術成數昞然而張光等不能定仲儒不量庸昧竊有意焉遂竭愚思鑽研甚久雖未能測其機妙至於聲韻頗有所得度量衡歷出自黃鍾雖造管察氣經史備有但氣有盈虛黍有巨細差之毫氂失之千里自非管應時候聲驗吉凶則是非之原諒亦難定此則非仲儒淺識所敢聞之至於準者本以代律取其分數調校樂器則宮商易辨若尺寸小長則六十宮商相與微濁若分數加短則六十徵羽類皆小清語其大本居然微異至於清濁相宣諧會歌管皆得應合雖積黍驗氣取聲之本清濁諧會亦須有方若間準意則辨五聲清濁之韻若善琴術則知五調調音之體參此二途以均樂器則自然應和不相奪倫如不練此必有乖謬案後漢順帝陽嘉二年冬十月行禮辟雍奏應鍾始復黃鍾作樂器隨月律是為十二之律必須次第為宮而商角徵羽以類從之尋調聲之體宮商宜濁徵羽用清若依公孫崇止以十二律聲而云還相為宮清濁悉足非唯未練五調調器之法至於五聲次第自是不足何者黃鍾為聲氣之元其管最長故以黃鍾為宮太蔟為商林鍾為徵則宮徵相順若均之八音猶須錯採衆聲配成其美若以應鍾為宮大呂為商蕤賓為徵則徵濁而宮清雖有其韻不成音曲若以夷則為宮則十二律中唯得取中呂為徵其商角羽並無其韻若以中呂為宮則十二律內全無所取何者中呂為十二之窮變律之首依京房書中呂為宮乃以去滅為商執始為徵然後方韻而崇乃以中呂為宮猶用林鍾為商黃鍾為徵何由可諧仲儒以調和樂器文飾五聲非準不妙若如嚴嵩父子心賞清濁是則為難若依案見尺作準調絃緩急清濁可以意推耳但音聲精微史傳簡略舊志唯云準形如瑟十三絃隱間九尺以應黃鍾九寸調中一絃令與黃鍾相得案畫以求其聲遂不辨準須柱以不柱有高下絃有粗細餘十二絃復應若為致令攬者望風拱手又案房準九尺之內為一十七萬七千一百四十七分一尺之內為萬九千六百八十三分又復十之是為於準一寸之內亦為萬九千六百八十三分然則於準一分之內乘為二千分又為小分以辨強弱中間至促雖復離朱之明猶不能窮而分之雖然仲儒私曾考驗但前却中柱使入準常尺分之內則相生之韻已自應合分數既微器宜精妙其準面平直須如停水其中絃一柱高下須與二頭臨嶽一等移柱上下之時不使離絃不得舉絃又中絃粗細須與琴宮相類中絃須施軫如琴以軫調聲令與黃鍾一管相合中絃下依數盡出六十律清濁之節其餘十二絃須施柱如箏又凡絃皆須豫張使臨時不動即於中絃案盡一周之聲度著十二絃上然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器其瑟調以宮為主清調以商為主平調以角為主五調各以一聲為主然後錯採衆聲以文飾之方如錦繡自上代來消息調準之方並史文所略出仲儒所思若事有乖此聲則不和仲儒尋準之分數精微如彼定絃緩急艱難若此而張光等親掌其事尚不知藏中有準既未識其器又焉能施絃也且燧人不師資而習火延壽不束修以變律故云知之者欲教而無從心達者體知而無師苟有一毫所得皆關心抱豈必要經師授然後為奇哉但仲儒自省膚淺才非一足正可粗識音韻才言其理致耳時尚書蕭寶夤奏言金石律呂制度調均中古已來鮮或通曉仲儒雖粗述書文頗有所說而學不師授云出己心又言舊器不任必須更造然後克諧上違成敕用舊之旨輒持己心輕欲制作臣竊思量不合依許詔曰禮樂之事蓋非常人所明可如所奏正光中侍中安豐王延明受詔監修金石博探古今樂事令其門生河間信都芳考算之屬天下多難終無制造芳後乃撰延明所集樂說并諸器物準圖二十餘事而注之不得在樂署考正聲律也普泰中前廢帝詔録尚書長孫稚太常卿祖瑩營理金石永熙二年春稚瑩表曰臣聞安上治民莫善於禮移風易俗莫善於樂易曰先王以作樂崇德殷薦之上帝以配祖考書曰戞擊鳴球拊搏琴瑟以詠祖考來格詩言志律和聲敦叙九族平章百姓天神於焉降歆地祇可得而禮故樂以象德舞以象功干戚所以比其形容金石所以發其歌頌薦之宗廟則靈祇饗其和用之朝廷則君臣協其志樂之時義大矣哉雖復沿革異時晦明殊位周因殷禮百世可知也太祖道武皇帝應圖受命光宅四海義合天經德符地緯九戎薦舉五禮未詳太宗世祖重輝纍耀恭宗顯祖誕隆丕基而猶經營四方匪遑制作高祖孝文皇帝承太平之緒纂無為之運帝圖既遠王度惟新太和中命故中書監高閭草創古樂閭尋去世未就其功閭亡之後故太樂令公孫崇續修遺事十有餘載崇敷奏其功時太常卿劉芳以崇所作體制差舛不合古義請更修營被旨聽許芳又釐綜久而申呈時故東平王元匡共相論駁各樹朋黨爭競紛綸竟無底定及孝昌已後世屬艱虞內難孔殷外敵滋甚永安之季胡賊入京燔燒樂庫所有之鍾悉畢賊手其餘磬石咸為灰燼普泰元年臣等奉敕營造樂器責問太樂前來郊丘懸設之方宗廟施安之分太樂令張乾龜答稱芳所造六格北廂黃鍾之均實是夷則之調其餘三廂宮商不和共用一笛施之前殿樂人尚存又有沽洗太蔟二格用之後宮檢其聲韻復是夷則於今尚在而芳一代碩儒斯文攸屬討論之日必應考古深有明證乾龜之辨恐是歷歲稍遠伶官失職芳久殂沒遺文銷毀無可遵訪臣等謹詳周禮分樂而序之凡樂圜鍾為宮黃鍾為角太蔟為徵沽洗為羽若樂六變天神可得而禮函鍾為宮太蔟為角沽洗為徵南呂為羽若樂八變地示可得而禮黃鍾為宮大呂為角太蔟為徵應鍾為羽若樂九變人鬼可得而禮至於布置不得相生之次兩均異宮並無商聲而同用一徵書曰於豫擊石拊石百獸率舞八音克諧神人以和計五音不具則聲豈成文七律不備則理無和韻八音克諧莫曉其旨聖道幽玄微言已絶漢魏已來未能作者案春秋魯昭公二十年晏子言於齊侯曰先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也服子慎注云黃鍾之均黃鍾為宮太蔟為商沽洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵一懸十九鍾十二懸二百二十八鍾八十四律即如此義乃可尋究今案周禮小胥之職樂懸之法鄭注云鍾磬編縣之二八十六枚漢成帝時犍為郡於水濱得古磬十六枚獻呈漢以為瑞復依禮圖編懸十六去正始中徐州薛城送玉磬十六枚亦是一懸之器檢太樂所用鍾磬各一懸十四不知何據魏侍中繆襲云周禮以六律六同五聲八音六舞大合樂以致鬼神今之樂官徒知古有此制莫有明者又云樂制既亡漢成謂韶武武德武始大鈞可以備四代之樂奏黃鍾舞文始以祀天地奏太蔟舞大武以祀五郊明堂奏姑洗舞武德巡狩以祭四望山川奏蕤賓舞武始大鈞以祀宗廟祀圓丘方澤羣廟祫祭之時則可兼舞四代之樂漢亦有雲翹育命之舞罔識其源漢以祭天魏時又以雲翹兼祀圓丘天郊育命兼祀方澤地郊今二舞久亡無復知者臣等謹依高祖所制尺周官考工記鳧氏為鍾鼓之分磬氏為磬倨句之法禮運五聲十二律還相為宮之義以律呂為之劑量奏請制度經紀營造依魏晉所用四廂宮懸鍾磬各十六懸塤箎箏筑聲韻區別蓋理三稔於䏂始就五聲有節八音無爽笙鏞和合不相奪倫元日備設百僚允矚雖未極萬古之徽蹤實是一時之盛事竊惟古先哲王制禮作樂各有所稱黃帝有咸池之樂顓頊作承雲之舞大章大韶堯舜之異名大夏大濩禹湯之殊稱周言大武秦曰壽人及焚書絶學之後舊章淪滅無可準據漢高祖時叔孫通因秦樂人制宗廟樂迎神廟門奏嘉至皇帝入廟門奏永至登歌再終下奏休成之樂通所作也高祖六年有昭容樂禮容樂又有房中祠樂高祖唐山夫人所作也孝惠二年使樂府令夏侯寬備其簫管更名安世樂高祖廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武德者高祖四年作也以象天下樂己行武以除亂也文始舞者舜韶舞高祖六年更名曰文始以示不相襲也五行舞者本周舞秦始皇二十六年更名曰五行也四時舞者孝文所作以明天下之安和也孝景以武德舞為昭德孝宣以昭德舞為盛德光武廟奏大武諸帝廟並奏文始五行四時之舞及卯金不祀當塗勃興魏武廟樂改云韶武用虞之大韶周之大武總號大鈞也曹失其鹿典午乘時晉氏之樂更名正德自昔帝王莫不損益相緣徽號殊別者也而皇魏統天百三十載至於樂舞迄未立名非所以聿宣皇風章明功德贊揚懋軌垂範無窮者矣案今后宮饗會及五郊之祭皆用兩懸之樂詳攬先誥大為紕繆古禮天子宮懸諸侯軒懸大夫判懸士特懸皇后禮數德合王者名器所資豈同於大夫哉孝經言嚴父莫大於配天宗祀文王於明堂以配上帝即五精之帝也禮記王制庶羞不踰牲燕衣不踰祭服論語禹卑宮室盡力於溝洫惡衣食致美於黻冕何有殿庭之樂過於天地乎失禮之差遠於千里昔漢孝武帝東巡狩封禪還祀泰一於甘泉祭后土於汾陰皆盡用明其無減普泰元年前侍中臣孚及臣瑩等奏求造十二懸六懸裁訖續復營造尋蒙旨判今六懸既成臣等思鍾磬各四鈲鎛相從十六格宮懸已足今請更營二懸通前為八宮懸兩具矣一具備於太極一具列於顯陽若圓丘方澤上辛四時五郊社稷諸祀雖時日相交用之無闕孔子曰周道四達禮樂交通傳曰魯有禘樂賓祭用之然則天地宗廟同樂之明證也其升斗權量當時未定請即刊校以為長準周存六代之樂雲門咸池韶夏濩武用於郊廟各有所施但世運遙緬隨時亡缺漢世唯有虞韶周武魏為武始咸熙錯綜風聲為一代之禮晉無改造易名正德今聖朝樂舞未名舞人冠服無準稱之文武舞而已依魏景初三年以來衣服制其祭天地宗廟武舞執干戚著平冕黑介幘玄衣裳白領袖絳領袖中衣絳合幅袴襪黑韋鞮文舞執羽籥冠委貌其服同上其奏於廟庭武舞武辨赤介幘生絳袍單衣絳領袖皂領袖中衣虎文畫合幅袴白布襪黑韋鞮文舞者進賢冠黑介幘生黃袍單衣白合幅袴服同上其魏晉相因承用不改古之神室方各別所故聲歌各異今之太廟連基接棟樂舞同奏於義得通自中原喪亂晉室播蕩永嘉已後舊章湮沒太武皇帝破平統萬得古雅樂一部正聲歌五十曲工伎相傳間有施用自高祖遷居世宗晏駕內外多事禮物未周今日所有王夏肆夏之屬二十三曲猶得擊奏足以闡纍聖之休風宣重光之盛美伏惟陛下仁格上皇義光下武道契玄機業隆寶祚思服典章留心軌物反堯舜之淳風復文武之境土飾宇宙之儀刑納生人於福地道德熙泰樂載新聲天成地平於是乎在樂舞之名乞垂旨判臣等以愚昧參廁問道呈御之日伏增惶懼詔其樂名付尚書博議以聞其年夏集羣官議之瑩復議曰夫樂所以乘靈通化舞所以象物昭功金石播其風聲絲竹申其歌詠郊天祠地之道雖百世而可知奉神育民之理經千載而不昧是以黃帝作咸池之樂顓頊有承雲之舞堯為大章舜則大韶禹為大夏湯為大濩周曰大武秦曰壽人漢為大豫魏名大鈞晉曰正德雖三統互變五運代降莫不述作相因徽號殊別者也皇魏道格三才化清四宇奕世載德纍葉重光或以文教興邦或以武功平亂功成治定於是乎在及主上龍飛載造景命惟新書軌自同典刑罔二覆載均於兩儀仁澤被於四海五聲有序八音克諧樂舞之名宜以詳定案周兼六代之樂聲律所施咸有次第滅學以後經禮散亡漢來所存二舞而已請以韶舞為崇德武舞為章烈總名曰嘉成漢樂章云高張四縣神來燕饗宗廟所設宮懸明矣計五郊天神尊於人鬼六宮陰極體同至尊理無減降宜皆用宮懸其舞人冠服制裁咸同舊式庶得以光贊鴻功敷揚大業録尚書事長孫稚已下六十人同議申奏詔曰王者功成作樂治定制禮以成為號良無間然又六代之舞者以大為名今可準古為大成也凡音樂以舞為主故干戈羽籥禮亦無別但依舊為文舞武舞而已餘如議初侍中崔光臨淮王彧並為郊廟歌詞而迄不施用樂人傳習舊曲加以訛失了無章句後太樂令崔九龍言於太常卿祖瑩曰聲有七聲調有七調以今七調合之七律起於黃鍾終於中呂今古雜曲隨調舉之將五百曲恐諸曲名後致亡失今輒條記存之於樂府瑩依而上之九龍所録或雅或鄭至於謠俗四夷雜歌但記其聲折而已不能知其本意又名多謬舛莫識所由隨其淫正而取之樂署今見傳習其中復有所遺至於古雅尤多亡矣初高祖討淮漢世宗定壽春收其聲伎江左所傳中原舊曲明君聖主公莫白鳩之屬及江南吳歌荊楚四聲總謂清商至於殿庭饗宴兼奏之其圓丘方澤上辛地祗五郊四時拜廟三元冬至社稷馬射籍田樂人之數各有差等焉
