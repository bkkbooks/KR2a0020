body:
  text: 魏書卷一百八之四禮志四之四第十三世宗永平四年冬十二月員外將軍兼尚書都令史陳終德有祖母之喪欲服齊衰三年以無世爵之重不可陵諸父若下同衆孫恐違後祖之義請求詳正國子博士孫景雍劉懷義封軌高綽太學博士袁升四門博士陽寧居等議嫡孫後祖持重三年不為品庶生二終德宜先諸父太常卿劉芳議案喪服乃士之正禮含有天子諸侯卿大夫之事其中時復下同庶人者皆別標顯至如傳重自士以上古者卿士下通庶人以為差謬何以明之禮稽命徵曰天子之元士二廟下通庶人以為差謬何以明之禮稽命徵曰天子之元士二廟諸侯之上士亦二廟中下士一廟一廟者祖禰共廟祭法又云庶人無廟既如此分明豈得通於庶人也傳重者主宗廟非謂庶人祭於寢也兼纍世承嫡方得為嫡子嫡孫耳不爾者不得繼祖也又鄭玄別變除云為五世長子服斬也魏晉以來不復行此禮矣案喪服經無嫡孫為祖持重三年正文唯有為長子三年嫡孫期傳及注因説嫡孫傳重之義今世既不復為嫡子服斬卑位之嫡孫不陵諸叔而持重則可知也且準終德資階方之於古未登下士庶人在官復無斯禮考之舊典驗之今世則茲範罕行且諸叔見存喪主有寄宜依諸孫服期為允景雍等又議云喪服雖以士為主而必下包庶人何以論之自大夫以上每條標列逮於庶人含而不述比同士制不復疑也唯有庶人為國君此則明義服之輕重不涉於孫祖且受國於曾祖廢疾之祖父亦無重可傳而猶三年不必由世重也夫霜感露濡異識咸感承重主嗣寧甄寢廟嫡孫之制固不同殊又古自卿以下皆不殊承襲末代僭踰未可以語通典是以春秋譏於世卿王制稱大夫不世此明訓也喪服經雖無嫡孫為祖三年正文而有祖為嫡孫期豈祖以嫡服己己與庶孫同為祖服期於義可乎服祖三年此則近世未嘗變也準古士官不過二百石已上終德即古之廟士也假令終德未班朝次苟曰志仁必也斯遂況乃官歷士流當訓章之運而以庶叔之嫌替其嫡重之位未是成人之善也芳又議國子所云喪服雖以士為主而必下包庶人本亦不謂一篇之內全不下同庶人正言嫡孫傳重專士以上此經傳之正文不及庶人明矣戴德喪服變除云父為長子斬自天子達於士此皆士以上乃有嫡子之明據也且承重者以其將代己為宗廟主廟主了不云寢又其證也所引大夫不世者此公羊穀梁近儒小道之書至如左氏詩易尚書論語皆有典證或是未寤許叔重五經異義云今春秋公羊穀梁説卿大夫世位則權并一姓謂周尹氏齊崔氏也而古春秋左氏説卿大夫皆得世祿傳曰官族易曰食舊德舊德謂食父故祿也尚書曰世選爾勞豫不絶爾善詩云惟周之士不顯奕世論語曰興滅國繼絶世國謂諸侯世謂卿大夫也斯皆正經及論語士以上世位之明證也士皆世祿也八品者一命斯乃信然但觀此據可謂覩其綱未照其目也案晉官品令所制九品皆正無從故以第八品準古下士今皇朝官令皆有正從若以其員外之資為第十六品也豈得為正八品之士哉推考古今謹如前議景雍等又議喪服正文大夫以上每事顯列唯有庶人含而不言此通下之義了然無惑且官族者謂世為其功食舊德者謂德侯者世位興滅國繼絶世主謂諸侯卿大夫無罪誅絶者耳且金貂七毦楊氏四公雖以位相承豈得言世祿乎晉太康中令史殷遂以父祥不及所繼求還為祖母三年時政以禮無代父追服之文亦無不許三年之制此即晉世之成規也尚書邢巒奏依芳議詔曰嫡孫為祖母禮令有據士人通行何勞方致疑請也可如國子所議延昌二年春偏將軍乙龍虎喪父給假二十七月而虎并數閏月詣府求上領軍元珍上言案違制律居三年之喪而冒哀求仕五歲刑龍虎未盡二十七月而請宿衛依律結刑五歲三公郎中崔鴻駁曰三年之喪二十五月大祥諸儒或言祥月下旬而禫或言二十七月各有其義未知何者會聖人之旨龍虎居喪已二十六月若依王杜之義便是過禫即吉之月如其依鄭玄二十七月禫中復可以從御職事禮云祥之日鼓素琴然則大祥之後喪事終矣既可以從御職事求上何為不可若如府判禫中鼓琴復有罪乎求之經律理實未允下更詳辨珍又上言案士虞禮三年之喪期而小祥又期而大祥中月而禫鄭玄云中猶間也自喪至此凡二十七月又禮言祥之日鼓素琴鄭云鼓琴者存樂也孔子祥後五日彈琴而不成十日而成笙歌鄭注與鄭志及踰月可以歌皆身自逾月可為此謂存樂也非所謂樂樂者使工為之晉博士許猛解三驗曰案黍離麥秀之歌小雅曰君子作歌惟以告哀魏詩曰心之憂矣我歌且謠若斯之類豈可謂之金石之樂哉是以徒歌謂之謠徒吹謂之和記曰比音而樂之及干戚羽毛謂之樂若夫禮樂之施於金石越於聲音者此乃所謂樂也至於素琴以示終笙歌以省哀者則非樂矣間傳云大祥除衰杖而素縞麻衣大祥之服也雜記注云玄衣黃裳則是禫祭黃者未大吉也檀弓云祥而縞是月禫徙月樂鄭志趙商問鄭玄答云祥謂大祥二十五月是月禫謂二十七月非謂上祥之月也徙月而樂許猛釋六徵曰樂者自謂八音克諧之樂也謂在二十八月工奏金石之樂耳而駁云大祥之後喪事終矣脫如此駁禫復焉施又駁云禫中鼓琴復有罪乎然禫則黃裳未大吉也鼓琴存樂在禮所許若使工奏八音融然成韻既未徙月不罪伊何又駁云禫中既得從御職事求上何為不可檢龍虎居喪二十六月始是素縞麻衣大祥之中何謂禫乎三年沒閏理無可疑麻衣在體冒仕求榮實為大尤罪其焉捨又省依王杜禫祥同月全乖鄭義喪凶尚遠而欲速除何匆匆者哉下府愚量鄭為得之何者禮記云吉事尚近日凶事尚遠日又論語云喪與其易寧戚而服限三年痛盡終身中月之解雖容二義尚遠寧戚又檢王杜之義起於魏末晉初及越騎校尉程猗贊成王肅駁鄭禫二十七月之失為六徵三驗上言於晉武帝曰夫禮國之大典兆民所日用豈可二哉今服禫者各各不同非聖世一統之謂鄭玄説二十七月禫甚乖大義臣每難鄭失六有徵三有驗初未能破臣難而通玄説者如猗之意謂鄭義廢矣太康中許猛上言扶鄭釋六徵解三驗以鄭禫二十七月為得猗及王肅為失而博士宋昌等議猛扶鄭為衷晉武從之王杜之義於是敗矣王杜之義見敗者晉武知其不可行故也而上省同猗而贊王欲虧鄭之成軌竊所未寧更無異義還從前處鴻又駁曰案三年之喪沒閏之義儒生學士猶或病諸龍虎生自戎馬之鄉不蒙稽古之訓數月成年便懼違緩原其本非貪榮求位而欲責以義方未可便爾也且三年之喪再期而大祥中月而禫鄭玄以中為間王杜以為是月之中鄭亦未為必會經旨王杜豈於必乖聖意既諸儒探賾先聖後賢見有不同晉武後雖從宋昌許猛之駁同鄭禫議然初亦從程猗贊成王杜之言二論得否未可知也聖人大祥之後鼓素琴成笙歌者以喪事既終餘哀之中可以存樂故也而樂府必以干戚羽毛施之金石然後為樂樂必使工為之庶民凡品於祥前鼓琴可無罪乎律之所防豈必為貴士亦及凡庶府之此義彌不通矣魯人朝祥而暮歌孔子以為踰月則可矣爾則大祥之後喪事已終鼓琴笙歌經禮所許龍虎欲宿衛皇宮豈欲合刑五歲就如鄭義二十七月而禫二十六月十五升布深衣素冠縞紕及黃裳綵纓以居者此則三年之餘哀不在服數之內也衰絰則埋之於地杖則棄之隱處此非喪事終乎府以大祥之後不為喪事之終何得復言素琴以示終也喪事尚遠日誠如鄭義龍虎未盡二十七月而請宿衛實為匆匆於戚之理合在情責便以深衣素縞之時而罪同杖絰苫塊之日於禮憲未允詳之律意冒喪求仕謂在斬焉草土之中不謂除衰杖之後也又龍虎具列居喪日月無所隱冒府應告之以禮遣還終月便幸彼昧識欲加之罪豈是遵禮敦風愛民之致乎正如鄭義龍虎罪亦不合刑匆匆之失宜科鞭五十三年七月司空清河王懌第七叔母北海王妃劉氏薨司徒平原郡開國公高肇兄子太子洗馬員外亡並上言未知出入猶作鼓吹不請下禮官議決太學博士封祖胄議喪大記云期九月之喪既葬飲酒食肉不與人樂之五月三月之喪比葬飲酒食肉不與人樂之世叔母故主宗子直云飲酒食肉不言不與人樂之鄭玄云義服恩輕以此推之明義服葬容有樂理又禮大功言而不議小功議而不及樂言論之間尚自不及其於聲作明不得也雖復功緦樂在宜止四門博士蔣雅哲議凡三司之尊開國之重其於王服皆有厭絶若尊同體敵雖疏尚宜徹樂如或不同子姓之喪非嫡者既殯之後義不闕樂國子助教韓神固議夫羽旄可以展耳目之適絲竹可以肆遊宴之娛故於樂貴縣有哀則廢至若德儉如禮升降有數文物昭旗旗之明錫鸞為行動之響鳴鐃以警衆聲笳以清路者所以辨等列明貴賤非措哀樂於其間矣謂威儀鼓吹依舊為允兼儀曹郎中房景先駁曰案祖胄議以功緦有喪鼓吹不作雅哲議齊衰卒哭簫管必陳準之輕重理用未安聖人推情以制服據服以副心何容拜虞生之奠於神宮襲衰麻而奏樂大燧一移哀情頓盡反心以求豈制禮之意也就如所言義服恩輕既虞而樂正服一期何以為斷或義服尊正服卑如此之比復何品節雅哲所議公子之喪非嫡者既殯之後義不闕樂案古雖有尊降不見作樂之文未詳此據竟在何典然君之於臣本無服體但恩誠相感致存隱惻是以仲遂卒垂笙籥不入智悼在殯杜蕢明言豈大倫之痛既殯而樂乎又神固等所議以為笳鼓不在樂限鳴鐃以警衆聲笳而清路者所以辨等列明貴賤耳雖居哀恤施而不廢粗而言之似如可通考諸正典未為符合案詩云鍾鼓既設鼓鍾伐鼛又云於論鼓鍾於樂辟雍言則相連豈非樂乎八音之數本無笳名推而類之簫管之比豈可以名稱小殊而不為樂若以王公位重威飾宜崇鼓吹公給不可私辭者魏絳和戎受金石之賞鍾公勳茂蒙五熟之賜若審功膺賞君命必行豈可陳嘉牢於齊殯之時擊鍾磬於疑祔之後尋究二三未有依據國子職兼文學令問所歸宜明據典謨曲盡斟酌率由必衷以辨深惑何容總議並申無所析剖更詳得失據典正議祕書監國子祭酒孫惠蔚太學博士封祖胄等重議司空體服衰麻心懷慘切其於聲樂本無作理但以鼓吹公儀致有疑論耳案鼓吹之制蓋古之軍聲獻捷之樂不常用也有重位茂勳乃得備作方之金石準之管絃其為音奏雖曰小殊然其大體與樂無異是以禮云鼓無當於五聲五聲不得不和竊惟今者加台司之儀蓋欲兼廣威華若有哀用之無變於吉便是一人之年悲樂並用求之禮情於理未盡二公雖受之於公用之非私出入聲作亦以娛己今既有喪心不在樂笳鼓之事明非欲聞其從寧戚之義廢而勿作但禮崇公卿出入之儀至有趨以采齊行以肆夏和鑾之聲佩玉之飾者所以顯槐鼎之至貴彰宰輔之為重今二公地處尊親儀殊百辟鼓吹之用無容全去禮有懸而不樂今陳之以備威儀不作以示哀痛述理節情愚謂為允詔曰可從國子後議清河王懌所生母羅太妃薨表求申齊衰三年詔禮官博議侍中中書監太子少傅崔光議喪服大功章云公之庶昆弟為母傳曰先君餘尊之所厭不得過大功記公子為其母練冠麻衣縓緣既葬除之傳曰何以不在五服中也君之所不服子亦不敢服也此皆謂公侯枝子藉父兄以為稱其母本妾猶繫之於君不得以子貴為夫人者也至如應韓啓宇厥母固自申內主之尊凡蔣別封其親亦容盡君妣之重若然便所謂周公制禮而子姪共尊漢世諸王之國稱太后宮室百官周制京邑自當一傍天子之式而不用公庶之軌魏氏已來雖羣臣稱微然嘗得出臨民土恐亦未必捨近行遠服功衰與練麻也羅太妃居王母之尊二十許載兩裔藩后並建大邦子孫盈第臣吏滿國堂堂列辟禮樂備陳吉慶凶哀宜稱情典則不應傍之公第仍拘先厭愚謂可遠準春秋子貴之文上祔周漢侯王之體成母后之尊蠲帝妾之賤申疏喪之極慕擬功練之輕悲誠如此則三年之喪無乖於自達巨創之痛有遂乎在中寧成過哀情禮俱允時議者不同詔服大功時又疑清河國官從服之制太學博士李景林等二十一人議按禮文君為母三年臣從服期今司空自為先帝所厭不得申其罔極依禮大功據喪服厭降之例並無從厭之文今太妃既捨六宮之稱加太妃之號為封君之母尊崇一國臣下固宜服期不得以王服厭屈而更有降禮有從輕而重義包於此太學博士封偉伯等十人議案臣從君服降君一等君為母三年臣則期今司空以仰厭先帝俯就大功臣之從服不容有過但禮文殘缺制無正條竊附情理謂宜小功庶君臣之服不失其序升降之差頗會禮意清河國郎中令韓子熙議謹案喪服大功章云公之庶昆弟為其母妻傳曰何以大功先君餘尊之所厭不敢過大功也夫以一國之貴子猶見厭況四海之尊固無申理頃國王遭太妃憂議者援引斯條降王之服尋究義例頗有一途但公之庶昆弟或為士或為大夫士之卑賤不得仰匹親王正以餘厭共同可以奪情相擬然士非列土無臣從服今王有臣復不得一準諸士矣議者仍令國臣從服以期嚚昧所見未曉高趣案不杖章云為君之父母妻長子祖父母傳曰父母長子君服斬妻則小君父卒然後為祖後者服斬傳所以深釋父卒為祖服斬者蓋恐君為祖期臣亦同期也明臣之後期由君服斬若由君服斬然後期則君服大功安得亦期也若依公之庶昆弟不云有臣從期若依為君之父母則出應申三年此之二章殊不相干引彼則須去此引此則須去彼終不得兩服功期渾雜一圖也議者見餘尊之厭不得過大功則令王依庶昆弟見不杖章有為君之父母便令臣從服以期此乃據殘文守一隅恐非先聖之情達禮之喪矣且從服之體自有倫貫雖秩微閽寺位卑室老未有君服細絰裁踰三時臣著疏衰獨涉兩歲案禮天子諸侯之大臣唯服君之父母妻長子祖父母其餘不服也唯近臣閽寺隨君而服耳若大夫之室老君之所服無所不從而降一等此三條是從服之通旨較然之明例雖近臣之賤不過隨君之服未有君輕而臣服重者也議者云禮有從輕而重臣之從君義包於此愚謂服問所云有從輕而重公子之妻為其皇姑直是禮記之異獨此一條耳何以知其然案服問經云有從輕而重公子之妻為其皇姑而大傳云從服有六其六曰有從輕而重注曰公子之妻為其皇姑若從輕而重不獨公子之妻者則鄭君宜更見流輩廣論所及不應還用服問之文以釋大傳之義明從輕而重唯公子之妻臣之從君不得包於此矣若復有君為母大功臣從服期當云有從輕而重公子之妻為其皇姑為母大功臣從服期何為不備書兩條以杜將來之惑而偏著一事彌結今日之疑且臣為君母乃是徒從徒從之體君亡則已妻為皇姑既非徒從雖公子早沒可得不制服乎為君之父母妻子君已除喪而後聞喪則不稅蓋以恩輕不能追服假令妻在遠方姑沒遙域過期而後聞喪復可不稅服乎若姑亡必不關公子有否聞喪則稅不計日月遠近者則與臣之從君聊自不同矣又案臣服君黨不過五人悉是三年其餘不服妻服夫黨可直五人乎期功以降可得無服乎臣妻事殊邈然胡越苟欲引之恐非通例也愚謂臣有合離三諫待決妻無去就一醮終身親義既有參差喪服固宜不等故見厭之婦可得申其本服君大功不可過從以期所以從麻而齊專屬公子之妻隨輕而重何關從服之臣尋理求途儻或在此必以臣妻相準未覩其津也子熙誠不能遠探墳籍曲論長智請以情理校其得失君遭母憂巨創之痛臣之為服從君之義如何君至九月便蕭然而即吉臣猶期年仍衰哭於君第創巨而反輕從義而反重緣之人情豈曰是哉侍中崔光學洞今古達禮之宗頃探幽立義申三年之服雖經典無文前儒未辨然推例求旨理亦難奪若臣服從期宜依侍中之論脫君仍九月不得如議者之談耳嬴氏焚坑禮經殘缺故今追訪靡據臨事多惑愚謂律無正條須準傍以定罪禮闕舊文宜準類以作憲禮有期同緦功而服如齊疏者蓋以在心實輕於義乃重故也今欲一依喪服不可從君九月而服周年如欲降一等兄弟之服不可以服君母詳諸二途以取折衷謂宜麻布可如齊衰除限則同小功所以然者重其衰麻尊君母蹙其日月隨君降如此衰麻猶重不奪君母之嚴日月隨降可塞從輕之責矣尚書李平奏以謂禮臣為君黨妻為夫黨俱為從服各降君夫一等故君服三年臣服一期今司空臣懌自以尊厭之禮奪其罔極之心國臣厭所不及當無隨降之理禮記大傳云從輕而重鄭玄注云公子之妻為其皇姑既舅不厭婦明不厭者還應服其本服此則是其例詔曰禮有從無服而有服何但從輕而重乎懌今自以厭故不得申其過隙衆臣古無疑厭之論而有從輕之據曷為不得申其本制也可從尚書及景林等議尋詔曰比決清河國臣為君母服期以禮事至重故追而審之今更無正據不可背章生條但君服既促而臣服仍遠禮緣人情遇厭須變服可還從前判既葬除之四年春正月丁巳夜世宗崩于式乾殿侍中中書監太子少傅崔光侍中領軍將軍于忠與詹事王顯中庶子侯剛奉迎肅宗於東宮入自萬歲門至顯陽殿哭踊久之乃復王顯欲須明乃行即位之禮崔光謂顯曰天位不可暫曠何待至明顯曰須奏中宮光曰帝崩而太子立國之常典何須中宮令也光與于忠使小黃門曲集奏置兼官行事於是光兼太尉黃門郎元昭兼侍中顯兼吏部尚書中庶子裴俊兼吏部郎中書舍人穆弼兼謁者僕射光等請肅宗止哭立於東序于忠元昭扶肅宗西面哭十數聲止服太子之服太尉光奉策進璽綬肅宗𢔛受服皇帝衮冕服御太極前殿太尉光等降自西階夜直羣官於庭中北面稽首稱萬歲熙平二年十一月乙丑太尉清河王懌表曰臣聞百王所尚莫尚於禮於禮之重喪紀斯極世代沿革損益不同遺風餘烈景行終在至如前賢往哲商榷有異或並證經文而論情別緒或各言所見而討事共端雖憲章祖述人自名家而論議紛綸理歸羣正莫不隨時所宗各為一代之典自上達下罔不遵用是使叔孫之儀專擅於漢朝王肅之禮獨行於晉世所謂共同軌文四海畫一者也至乃折旋俯仰之儀哭泣升降之節去來閫巷之容出入閨門之度尚須疇咨禮官博訪儒士載之翰紙著在通法辨答乖殊證據不明即詆訶疵謬糾劾成罪此乃簡牒成文可具閲而知者也未聞有皇王垂範國無一定之章英賢贊治家制異同之式而欲流風作則永貽來世比學官雖建庠序未修稽考古今莫專其任暨乎宗室喪禮百僚凶事冠服制裁日月輕重率令博士一人輕爾議之廣陵王恭北海王皓同為庶母服恭則治重居廬皓則齊期堊室論親則恭皓俱是帝孫語貴則二人並為蕃國不知兩服之證據何經典俄為舛駁莫有裁正懿王昵戚尚或如斯自茲已降何可紀極歷觀漢魏喪禮諸儀卷盈數百或當𨫋名士往復成規或一代詞宗較然為則況堂堂四海藹藹如林而令喪禮參差始於帝族非所以儀刑萬國綴旒四海臣忝官台傅備位喉脣不能秉國之鈞致斯爽缺具瞻所誚無所逃罪謹略舉恭皓二國不同之狀以明喪紀乖異之失乞集公卿樞納內外儒學博議定制班行天下使禮無異準得失有歸并因事而廣永為條例庶塵嶽沾河微酬萬一靈太后令曰禮者為政之本何得不同如此可依表定議事在張普惠傳神龜元年九月尼高皇太后崩於瑤光寺肅宗詔曰崇憲皇太后德協坤儀徵符月晷方融壼化奄至崩殂朕幼集荼蓼夙憑德訓及翕暴定難是賴謨謀夫禮沿情制義循事立可特為齊衰三月以申追仰之心有司奏案舊事皇太后崩儀自復魄斂葬百官哭臨其禮甚多今尼太后既存委俗尊憑居道法凶事簡速不依配極之典庭局狹隘非容百官之位但昔徑奉接義成君臣終始情禮理無廢絶輒準故式立儀如別內外羣官權改常服單衣邪巾奉送至墓列位哭拜事訖而除止在京師更不宣下詔可十一月侍中國子祭酒儀同三司崔光上言被臺祠部曹符文昭皇太后改葬議至尊皇太后羣臣服制輕重四門博士劉季明議云案喪服記雖云改葬緦文無指據至於注解乖異不同馬融王肅云本有三年之服者鄭及三重然而後來諸儒符融者多與玄者少今請依馬王諸儒之議至尊宜服緦案記外宗為君夫人猶內宗鄭注云為君服斬夫人齊衰不敢以親服至尊也今皇太后雖上奉宗廟下臨朝臣至於為姑不得過期計應無服其清河汝南二王母服三年亦宜有緦自餘王公百官為君之母妻唯期而已並應不服又太常博士鄭六議云謹檢喪服并中代雜論記云改葬緦鄭注臣為君子為父妻為夫親見尸柩不可以無服故服緦三年者緦則期已下無服竊謂鄭氏得服緦之旨謬三月之言如臣所見請依康成之服緦既葬而除愚以為允詔可二年正月二日元會高陽王雍以靈太后臨朝太上秦公喪制未畢欲罷百戲絲竹之樂清河王懌以為萬國慶集天子臨享宜應備設太后訪之於侍中崔光光從雍所執懌謂光曰宜以經典為證光據禮記縞冠玄武子姓之冠父母有重喪子不純吉安定公親為外祖又有師恩太后不許公除衰麻在體正月朔日還家哭臨至尊輿駕奉慰記云朋友之墓有宿草焉而不哭是則朋友有期年之哀子貢云夫子喪顏淵若喪子而無服喪子路亦然顏淵之喪饋練肉夫子受之彈琴而後食之若子之哀則容一期不舉樂也孔子既大練五日彈琴父母之喪也由是喪夫子若喪父而無服心喪三年由此而制雖古義難追比來發詔每言師祖之尊是則一期之內猶有餘哀且禮母有喪服聲之所聞子不舉樂今太后更無別宮所居嘉福去太極不為大遠鼓鍾于宮聲聞于外況在內密邇也君之卿佐是謂股肱股肱或虧何痛如之智悼子喪未葬杜蕢所以諫晉平公也今相國雖已安厝裁三月爾陵墳未乾懌以理證為然乃從雍議孝靜武定五年正月齊獻武王薨時祕凶問六日孝靜皇帝舉哀於太極東堂服齊衰三月及將窆中練齊文襄王請自發喪之月帝使侍中陸子彰舉詔三往敦喻王固執詔不許乃從薨月太祖天賜三年十月占授著作郎王宜弟造兵法高宗和平三年十二月因歲除大儺之禮遂耀兵示武更為制令步兵陳於南騎士陳於北各擊鍾鼓以為節度其步兵所衣青赤黃黑別為部隊盾矟矛戟相次周回轉易以相赴就有飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法𢔛起前却莫不應節陳畢南北二軍皆鳴鼓角衆盡大譟各令騎將六人去來挑戰步兵更進退以相拒擊南敗北捷以為盛觀自後踵以為常高祖太和十九年五月甲午冠皇太子恂於廟丙申高祖臨光極堂太子入見帝親詔之事在恂傳六月高祖臨光極堂引見羣官詔曰比冠子恂禮有所闕當思往失更順將來禮古今殊制三代異章近冠恂之禮有三失一朕與諸儒同誤二諸儒違朕故令有三誤今中原兆建百禮惟新而有此三失殊以愧歎春秋襄公將至衛以同姓之國問其年幾而行冠禮古者皆灌地降神或有作樂以迎神昨失作樂至廟庭朕以意而行拜禮雖不得降神於理猶差完司馬彪云漢帝有四冠一緇布二進賢三武辨四通天冠朕見家語冠頌篇四加冠公也家語雖非正經孔子之言與經何異諸儒忽司馬彪志致使天子之子而行士冠禮此朝廷之失冠禮朕以為有賓諸儒皆以為無賓朕既從之復令有失孔所云斐然成章其斯之謂太子太傅穆亮等拜謝高祖曰昔裴頠作冠儀不知有四裴頠尚不知卿等復何愧正光元年秋肅宗加元服𨫋年十一既冠拜太廟大赦改元官有其注輿服之制秦漢已降損益可知矣魏氏居百王之末接分崩之後典禮之用故有闕焉太祖世所制車輦雖參采古式多違舊章今案而書之以存一代之迹乘輿輦輅龍輈十六四衡轂朱班繡輪有雕虬文虎盤螭之飾龍首銜扼鸞爵立衡圓蓋華蟲金雞樹羽蛟龍遊蘇建太常十有二斿畫日月升龍郊天祭廟則乘之乾象輦羽葆圓蓋華蟲金雞樹羽二十八宿天階雲罕山林雲氣仙聖賢明忠孝節義遊龍飛鳳朱雀玄武白虎青龍奇禽異獸可以為飾者皆亦圖焉太皇太后皇太后皇后助祭郊廟則乘之大樓輦輈十二加以玉飾衡輪雕綵與輦輅同駕牛十二小樓輦輈八衡輪色數與大樓輦同駕牛十二天子太皇太后皇太后郊廟亦乘之象輦左右鳳凰白馬仙人前却飛行駕二象羽葆旒蘇龍旗囱麾其飾與乾象同太皇太后皇太后助祭郊廟之副乘也馬輦重級其飾皆如之繢漆直輈六左右騑駕天子籍田小祀時則乘之臥輦其飾皆如之丹漆駕六馬遊觀輦其飾亦如之駕馬十五匹皆白馬朱髦尾天子法駕行幸巡狩小祀時則乘之七寶旃檀刻鏤輦金薄隱起馬輦天子三駕所乘或為副乘緇漆蜀馬車金薄華蟲隱起軺軒駕駟金銀隱起出挽解合步挽天子小駕遊宴所乘亦為副乘金根車羽葆旒畫輈輪華首綵軒交落左右騑太皇太后皇太后皇后助祭郊廟籍田先蠶則乘之長公主大貴公主封君諸王妃皆得乘但右騑而已太祖初皇太子皇子皆鸞輅立乘畫輈龍首朱輪繡轂綵蓋朱𩹉龍旗九斿畫雲楱皇子封則賜之皆駕駟又有軺車緇漆紫幰朱𩹉駕一馬為副乘公安車緇漆紫蓋朱𩹉畫輈朱雀青龍白虎龍旗八斿駕三馬軺車與王同侯車與公同七斿紫蓋青𩹉駕二馬副車亦如之子車緇漆草蠡文六斿皂蓋青𩹉駕一馬副車亦如之闕及公侯子陪列郊天則乘之宗廟小祀乘軺軒而已至高祖太和中詔儀曹令李韶監造車輅一遵古式焉太祖天興二年命禮官捃採古事制三駕鹵簿一曰大駕設五輅建太常屬車八十一乘平城令代尹司隸校尉丞相奉引太尉陪乘太僕御從輕車介士千乘萬騎魚麗雁行前驅皮軒闒芝蓋雲罕指南後殿豹尾鳴葭唱上下作鼓吹軍戎大祠則設之二曰法駕屬車三十六乘平城令代尹太尉奉引侍中陪乘奉車都尉御巡狩小祠則設之三曰小駕屬車十二乘平城令太僕奉引常侍陪乘奉車郎御遊宴離宮則設之二至郊天地四節祠五帝或公卿行事唯四月郊天帝常親行樂加鍾懸以為迎送之節焉天賜二年初改大駕魚麗雁行更為方陳鹵簿列步騎內外為四重列標建旌通門四達五色車旗各處其方諸王導從在鉀騎內公在幢內侯在步矟內子在刀盾內五品朝臣使列乘輿前兩廂官卑者先引王公侯子車旒麾蓋信幡及散官構服一皆純黑肅宗熙平元年六月中侍中劉騰等奏中宮僕刺列車輿朽敗自昔舊都禮物頗異遷京已來未復更造請集禮官以裁其制靈太后令曰付尚書量議太常卿穆紹少卿元端博士鄭六劉臺龍等議案周禮王后之五輅重翟錫面朱厭翟勒面繢安車雕面鷖皆有容蓋翟車貝面組有握輦車組挽有翣羽蓋重翟后從王祭祀所乘厭翟后從王賓饗諸侯所乘安車后朝見於王所乘翟車后出桑則乘輦車后宮中所乘謹以周禮聖制不刊之典其禮文尤備孔子云其或繼周者雖百世可知也以其法不可踰以此言之後王輿服典章多放周式雖文質時變輅名宜存雕飾雖異理無全捨當今聖后臨朝親覽庶政輿駕之式宜備典禮臣等學缺通經叨參議末輒率短見宜準周禮備造五輅雕飾之制隨時增減太學博士王延業議案周禮王后有五輅重翟以從王祠厭翟以從王饗賓客安車以朝見于王翟車以親桑輦車宮中所乘又漢輿服志云秦并天下閲三代之禮或曰殷瑞山車金根之色殷人以為大輅於是始皇作金根之車漢承秦制御為乘輿太皇太后皇太后皆御金根車加交絡帷裳非法駕則乘紫罽軿車雲文畫輈黃金塗五末蓋爪左右騑駕三馬阮諶禮圖并載秦漢已來輿服亦云金根輅皇后法駕乘之以禮婚見廟桑輅后法駕乘之以親桑安車后小駕乘之以助祭山軿車后行則乘之紺罽軿車后小行則乘之以哭公主邑君王妃公侯夫人入閣輿后出入閣宮中小遊則乘之晉先蠶儀注皇后乘雲母安車駕六騩案周秦漢晉車輿儀式互見圖書雖名號小異其大較略相依擬金根車雖起自秦造即殷之遺制今之乘輿五輅是其象也華飾典麗容觀莊美司馬彪以為孔子所謂乘殷之輅即此之謂也案阮氏圖桑車亦飾以雲母晉之雲母車即是一與周之翟車其用正同安車既名同周制又用同重翟山軿車案圖飾之以紫紺罽軿車雖制用異於厭翟而實同用於今入閣輿與輦其用又同案圖今之黑漆畫扇輦與周之輦車其形相似竊以為秦滅周制百事創革官名軌式莫不殊異漢魏因循繼踵仍舊雖時有損益而莫能反古良由去聖久遠典儀殊缺時移俗易物隨事變雖經賢哲祖襲無改伏惟皇太后睿聖淵凝照臨萬物動循典故貽則後王今輒竭管見稽之周禮考之漢晉採諸圖史驗之時事以為宜依漢晉法駕則御金根車駕四馬加交絡帷裳御雲母車駕四馬以親桑其非法駕則御紫罽軿車駕三馬小駕則御安車駕三馬以助祭小行則御紺罽軿車駕三馬以哭公主王妃公侯夫人宮中出入則御畫扇輦車案舊事比之周禮唯闕從王饗賓客及朝見於王之乘竊以為古者諸侯有朝會之禮故有從饗之儀今無其事宜從省略又今之皇居宮掖相逼就有朝見理無結駟即事考實亦宜闕廢又哭公主及王妃周禮所無施之於今實合事要損益不同用捨隨時三代異制其道然也又金根及雲母駕馬或三或六訪之經禮無駕六之文今之乘輿又皆駕四義符古典宜仍駕四其餘小駕宜從駕三其制用形飾備見圖志司空領尚書令任城王澄尚書左僕射元暉尚書右僕射李平尚書齊王蕭寶夤尚書元欽尚書元昭尚書左丞盧同右丞元洪超考功郎中劉懋北主客郎中源子恭南主客郎中遊思進三公郎中崔鴻長兼駕部郎中薛悅起部郎中杜遇左主客郎中元韡騎兵郎中房景先外兵郎中石士基長兼右外兵郎中鄭幼儒都官郎中李秀之兼尚書左士郎中朱元旭度支郎中谷穎左民郎中張均金部郎中李仲東庫部郎中賈思同國子博士薛禎邢晏高諒奚延太學博士邢湛崔瓚韋朏鄭季明國子助教韓神固四門博士楊那羅唐荊寶王令俊吳珍之宋婆羅劉燮高顯雍杜靈俊張文和陳智顯楊渴侯趙安慶賈天度艾僧葕呂太保王當百槐貴等五十人議以為皇太后稱制臨朝躬親庶政郊天祭地宗廟之禮所乘之車宜同至尊不應更有製造周禮魏晉雖有文辭不辨形制假令欲作恐未合古制而不可以為一代典臣以太常國子二議為疑重集羣官並從今議唯恩裁決靈太后令曰羣官以後議折中者便可如奏太祖天興元年冬詔儀曹郎董謐撰朝覲饗宴郊廟社稷之儀六年又詔有司制冠服隨品秩各有差時事未暇多失古禮世祖經營四方未能留意仍世以武力為事取於便習而已至高祖太和中始考舊典以制冠服百僚六宮各有差次早世升遐猶未周洽肅宗時又詔侍中崔光安豐王延明及在朝名學更議之條章粗備焉熙平元年九月侍中儀同三司崔光表奉詔定五時朝服案北京及遷都以來未有斯制輒勒禮官詳據太學博士崔瓚議云周禮及禮記三冠六冕承用區分璅玉五綵配飾亦別都無隨氣春夏之異唯月令有青旗赤玉黑衣白輅隨四時而變復不列辨冕改用之玄黃以此而推五時之冠禮既無文若求諸正典難以經證案司馬彪續漢書輿服及祭祀志云迎氣五郊自永平中以禮讖并月令迎氣服色因采元始故事兆五郊於洛陽又云五郊衣幘各如方色又續漢禮儀志立春京都百官皆著青衣闕服青幘秋夏悉如其色自漢逮于魏晉迎氣五郊用幘從服改色隨氣斯制因循相承不革冠冕仍舊未聞有變今皇魏憲章前代損益從宜五時之冠愚謂如漢晉用幘為允靈太后令曰太傅博學洽通多識前載既綜朝儀彌悉其事便可咨訪以決所疑二年九月太傅清河王懌給事黃門侍郎韋延詳奏謹案前敕制五時朝服嘗訪國子議其舊式太學博士崔瓚等議自漢逮于魏晉迎氣五郊用幘從服改色隨氣斯制因循相承不革冠冕仍舊未聞有變今皇魏憲章前代損益從宜五時之冠謂如漢晉用幘為允尚書以禮式不經請訪議事奉敕付臣令加考決臣以為帝王服章方為萬世則不可輕裁請更集禮官下省定議蒙敕聽許謹集門下及學官以上四十三人尋考史傳量古校今一同國子前議幘隨服變冠冕弗改又四門博士臣王僧奇蔣雅哲二人以為五時冠冕宜從衣變臣等謂從國子前議為允靈太后令曰依議
