body:
  text: 魏書卷七十五列傳第六十三爾朱兆爾朱彥伯爾朱度律爾朱天光爾朱兆字萬仁榮從子也少驍猛善騎射手格猛獸蹻捷過人數從榮遊獵至於窮巖絶澗人所不能升降者兆先之榮以此特加賞愛任為爪牙榮曾送臺使見二鹿乃命兆前止授二箭曰可取此鹿供今食也遂停馬構火以待之俄然兆獲其一榮欲矜夸使人責兆曰何不盡取杖之五十後以軍功除平遠將軍步兵校尉榮之入洛兆兼前鋒都督及孝莊即阼特除中軍將軍金紫光祿大夫又假驍騎將軍建興太守尋除使持節車騎將軍武衛將軍左光祿大夫都督潁川郡開國公食邑千二百戶後從上黨王天穆討平邢杲及元皓之屯於河橋榮遣兆與賀拔勝等自馬渚西夜渡數百騎襲擊皓子冠受擒之又進破安豐王延明皓於是退走莊帝還宮論功除散騎常侍車騎大將軍儀同三司增邑八百戶為汾州刺史復增邑一千戶尋加侍中驃騎大將軍又增邑五百戶及爾朱榮死也兆自汾州率騎據晉陽元曄立授兆大將軍爵為王兆與世隆等定謀攻洛兆遂率衆南出進達太行大都督源子恭下都督史仵龍開壘降兆子恭退走兆輕兵倍道從河梁西涉渡掩襲京邑先是河邊人夢神謂己曰爾朱家欲渡河用爾作灅波津令為之縮水脉月餘夢者死及兆至有行人自言知水淺處以草往往表插而導道焉忽失其所在兆遂策馬涉渡是日暴風鼓怒黃塵漲天騎叩宮門宿衛乃覺彎弓欲射袍撥弦矢不得發一時散走帝步出雲龍門外為兆騎所縶幽於永寧佛寺兆撲殺皇子汙辱妃嬪縱兵虜掠停洛旬餘先令衛送莊帝於晉陽兆後於河梁監閲財貨遂害帝於三級寺初兆將向洛也遣使招齊獻武王欲與同舉王時為晉州刺史謂長史孫騰曰臣而伐君其逆已甚我今不往彼必致恨卿可往申吾意但云山蜀未平今方攻討不可委之而去致有後憂定蜀之日當隔河為犄角之勢如此報之以觀其趣騰乃詣兆及之於并州大谷具申王言兆殊不悅且曰還白高兄弟有吉夢今段之行必有克獲騰問王夢如何兆答曰吾比夢吾亡父登一高堆堆旁之地悉皆耕熟唯有馬藺草株往往猶在吾父問言何故不拔左右云堅不可去吾父顧我令下拔之吾手所至無不盡出以此而言往必有利騰還具報王曰兆等猖狂舉兵犯上吾今不同猜忌成矣勢不可反事爾朱今也南行天子列兵河上兆進不能渡退不得還吾乘山東下出其不意此徒可以一舉而擒俄而兆克京師孝莊幽縶都督尉景從兆南行以書報王王得書大驚召騰示之曰卿可馳驛詣兆示以謁賀密觀天子今在何處為隨兆軍府為別送晉陽脫其送并卿宜馳報吾當於路邀迎唱大義於天下騰晨夜驅馳已遇帝於中路王時率騎東轉聞帝已渡於是西還仍與兆書陳其福禍不宜害天子受惡名兆怒不納帝遂暴崩初榮既死莊帝詔河西人紇豆陵步蕃等令襲秀容兆入洛後步蕃兵勢甚盛南逼晉陽兆所以不暇留洛回師禦之兆雖驍果本無策略頻為步蕃所敗於是部勒士馬謀出山東令人頻徵獻武王於晉州乃分三州六鎮之人令王統領既分兵別營乃引兵南出以避步蕃之鋭步蕃至於樂平郡王與兆還討破之斬步蕃於秀容之石鼓山其衆退走兆將數十騎詣王通夜宴飲後還營招王王知兆難信未能顯示將欲詣之臨上馬長史孫騰牽衣而止兆乃隔水責罵騰等於是各去王還自襄垣東出兆歸晉陽及前廢帝立授兆使持節侍中都督中外諸軍事柱國大將軍領軍將軍領左右并州刺史兼録尚書事大行臺又以兆為天柱大將軍兆謂人曰此是叔父終官我何敢受遂固辭不拜尋加都督十州諸軍事世襲并州刺史齊獻武王之克殷州也兆與仲遠度律約共討之仲遠度律次於陽平兆出井陘屯於廣阿衆號十萬王廣縱反間或云世隆兄弟謀欲害兆復言兆與王同圖仲遠等於是兩不相信各致猜疑徘徊不進仲遠等頻使斛斯椿賀拔勝往喻之兆輕騎三百來就仲遠同坐幕下兆性粗獷意色不平手舞馬鞭長嘯凝望深疑仲遠等有變遂趨出馳還仲遠遣椿勝等追而曉譬兆遂拘縛將還經日放遣仲遠等於是奔退王乃進擊兆兆軍大敗兆與仲遠度律遂相疑阻久而不和世隆請前廢帝納兆女為后兆乃大喜世隆厚禮喻兆赴洛深示卑下隨其所為無敢違者兆與天光度律更自信約然後大會於韓陵山戰敗復奔晉陽遂大掠并州城內獻武王自鄴進討之兆遂走於秀容王又追擊度赤洪嶺破之衆並降散兆竄於窮山殺所乘馬自縊於樹王收而葬之兆果於戰鬬每有征伐常居鋒首當時諸將伏其材力而粗脫少智無將領之能榮雖奇其膽決然每云兆不過將三千騎多則亂矣兆弟智虎前廢帝封為安定王驃騎大將軍肆州刺史開府儀同三司與兆俱走獻武王擒之於梁郡岢嵐南山赦之後死於晉陽爾朱彥伯榮從弟也祖侯真高祖時并安二州刺史始昌侯父買珍世宗時武衛將軍出為華州刺史彥伯性和厚釋褐奉朝請纍遷奉車都尉為榮府長史元曄立以為侍中前廢帝潛默龍花佛寺彥伯敦喻往來尤有勤款廢帝既立爾朱兆以己不預謀大為忿恚將攻世隆詔令華山王鷙兼尚書僕射北道大使慰喻兆兆猶不釋世隆復遣彥伯自往喻之兆乃止及還帝宴彥伯於顯陽殿時侍中源子恭黃門郎竇瑗並侍坐彥伯曰源侍中比為都督與臣相持於河內當爾之時旗鼓相望眇如天隔寧期同事陛下今日之歡也子恭曰蒯通有言犬吠非其主他日之事永安猶今日之事陛下耳帝曰源侍中可謂有射鈎之心也遂令二人極醉而罷尋除使持節驃騎大將軍右光祿大夫馬場大都督封博陵郡開國公後進爵為王又遷司徒于時炎旱有勸彥伯解司徒者乃上表遜位詔許之俄除儀同三司侍中彥伯於兄弟之中差無過患天光等敗於韓陵彥伯欲領兵屯河橋以為聲勢世隆不從及張勸等掩襲世隆彥伯時在禁直從長孫稚等於神虎門啓陳齊獻武王義功既振將除爾朱廢帝令舍人郭崇報彥伯知彥伯狼狽出走為人所執尋與世隆同斬於閶闔門外懸首於斛斯椿門樹傳首於齊獻武王先是洛中謠曰三月末四月初揚灰簸土覔真珠又曰頭去項腳根齊驅上樹不須梯至是並驗彥伯弟仲遠頗知書計肅宗末年爾朱榮兵威稍盛諸有啓謁率多見從而仲遠摹寫榮書又刻榮印與尚書令史通為姦詐造榮啓表請人為官大得財貨以資酒色落魄無行及孝莊即阼除直寢寧遠將軍步兵校尉尋特除平北將軍建興太守頓丘縣開國侯邑五百戶後加散騎常侍及改郡立州遷使持節車騎將軍建州刺史加侍中進爵為公增邑五百戶尋改封清河郡又加車騎大將軍左光祿大夫轉使持節本將軍徐州刺史兼尚書左僕射三徐州大行臺尋進督三徐州諸軍事餘如故仲遠上言曰將統參佐人數不足事須在道更僕以充其員竊見比來行臺採募者皆得權立中正在軍定第斟酌授官今求兼置權濟軍要詔從之於是隨情補授肆意聚斂爾朱榮死仲遠勒衆來向京師攻陷西兗州將逼東郡莊帝詔諸督將駱驛進討並為仲遠所敗又詔都督鄭先護及右衛將軍賀拔勝共討之勝戰不利仍降仲遠尋爾朱兆入洛先護衆散而走前廢帝立除使持節侍中都督三徐二兗諸軍事驃騎大將軍開府儀同三司徐州刺史東道大都督大行臺進爵彭城王尋加大將軍又兼尚書令竟不之州遂鎮於大梁仲遠遣使請準朝式在軍鳴騶帝覽啓笑而許之其肆情如此復進督東道諸軍本將軍兗州刺史餘如故仲遠天性貪暴大宗富族誣之以反歿其家口簿籍財物皆以入己丈夫死者投之河流如此者不可勝數諸將婦有美色者莫不被其淫亂自滎陽以東輸稅悉入其軍不送京師時天光控關右仲遠在大梁兆據并州世隆居京邑各自專恣權強莫比焉所在並以貪虐為事於是四方解體又加太宰解大行臺仲遠專恣尤劇方之彥伯世隆最為無禮東南牧守下至民俗比之豺狼特為患苦後移屯東郡率衆與度律等拒齊獻武王爾朱兆領騎數千自晉陽來會軍次陽平王縱以間說仲遠等迭相猜疑狼狽遁走後與天光等於韓陵戰敗南走東郡仍奔蕭衍死於江南仲遠弟世隆字榮宗肅宗末為直齊轉直寢後兼直閣加前將軍爾朱榮表請入朝靈太后惡之令世隆詣晉陽慰喻榮榮因欲留之世隆曰朝廷疑兄故令世隆來今若遂住便有內備非計之善者榮乃遣之榮舉兵南出世隆遂遁走會榮於上黨建義初除給事黃門侍郎莊帝即位乃特除侍中領軍將軍左衛將軍領左右肆州大中正封樂平郡開國公食邑一千二百戶又除車騎將軍兼領軍俄授左光祿大夫兼尚書右僕射尋即真元皓逼大梁詔假儀同三司前軍都督鎮虎牢世隆不關世事無將帥之略皓既克滎陽擒行臺楊昱世隆懼而遁還莊帝倉卒北巡世隆之罪也駕在河內假驃騎大將軍行臺右僕射都督相州諸軍事相州刺史當州都督及車駕還宮除驃騎大將軍尚書左僕射攝選左右廂出入又以停年格取士頗為猥滯所稱又請解侍中詔加散騎常侍莊帝之將圖爾朱榮也或有榜世隆門以陳其狀者世隆封以呈榮勸其不入榮自恃威強不以為意遂手毀密書唾地曰世隆無膽誰敢生心及榮死世隆奉榮妻燒西陽門率衆夜走北攻河橋殺武衛將軍奚毅率衆還戰大夏門外朝野震懼憂在不測莊帝遣前華陽太守段育慰喻世隆斬之以徇會李苗燒絶河梁世隆乃北遁建州刺史陸希質閉城拒守世隆攻克之盡殺城人以肆其忿及至長子與度律等共推長廣王曄為主曄以世隆為開府儀同三司尚書令樂平郡王加太傅行司州牧增邑五千戶先赴京師會兆於河陽兆既平京邑自以為功讓世隆曰叔父在朝多時耳目應廣如何不知不聞令天柱受禍按劍瞋目聲色甚厲世隆遜辭拜謝然後得已世隆深恨之時仲遠亦自滑臺入京世隆與兄弟密謀以元曄疏遠欲推立前廢帝而爾朱度律意在寶炬乃曰廣陵不言何以主天下世隆兄彥伯密相敦喻乃與度律同往龍花佛寺觀之後知能語遂行廢立初世隆之為僕射自憂不了乃取尚書文簿在家省閲性聰解積十餘日然後視事又畏爾朱榮威深自克勉留心几案傍接賓客遂有解了之名榮死之後無所顧憚及為尚書令常使尚書郎宋遊道邢昕在其宅廳視事東西別坐受納訴訟稱命施行其專恣如此既總朝政生殺自由公行淫佚無復畏避信任羣小隨其與奪又欲收軍人之意加泛除授皆以將軍而兼散職督將兵吏無虛號者自此五等大夫遂致猥濫又無員限天下賤之武定中齊文襄奏皆罷於是始革其弊世隆兄弟羣從各擁強兵割剝四海極其暴虐姦諂蛆酷多見信用溫良名士罕預腹心於是天下之人莫不厭毒世隆尋讓太傅改授太保又固辭前廢帝特置儀同三師之官次上公之下以世隆為之贈其父買珍使持節侍中相國録尚書事都督定相青齊濟五州諸軍事大司馬定州刺史及齊獻武王起義兵仲遠度律等愚戇恃強不以為慮而世隆獨深憂恐及天光戰敗世隆請出收兵前廢帝不許世隆令其外兵參軍陽叔淵單騎馳赴北中簡閲敗衆以次內之而斛斯椿未得入城詭說叔淵曰天光部下皆是西人聞其欲掠京邑遷都長安宜先內我以為其備叔淵信而內之椿既至橋盡殺世隆黨附令行臺長孫稚詣闕奏狀別使都督賈智張勸率騎掩執世隆與兄彥伯俱斬之時年三十三初世隆曾與吏部尚書元世俊握槊忽聞局上歘然有聲一局之子盡皆倒立世隆甚惡之世隆又曾晝寢其妻奚氏忽見有一人持世隆首去奚氏驚怖就視而世隆寢如故也既覺謂妻曰向夢人斷我頭去意殊不適又此年正月晦日令僕並不上省西門不開忽有河內太守田怗家奴告省門亭長云今旦為令王借車牛一乘終日於洛濱遊觀至晚王還省將車出東掖門始覺車上無褥請為記識時世隆封王故呼為令王亭長以令僕不上西門不開無車入省兼無車跡此奴固陳不已公文列訴尚書都令史謝遠疑謂妄有假借白世隆付曹推檢時都官郎穆子容窮究之奴言初來時至司空府西欲向省令王嫌遲遣二防閣捉儀刀催車車入到省西門王嫌牛小繫於闕下槐樹更將一青牛駕車令王著白紗高頂帽短小黑色儐從皆裙襦袴褶握板不似常時服章遂遣一吏將奴送入省中廳事東閣內東廂第一屋中其屋先常閉籥子容以西門不開忽言從入此屋常閉奴言在中詰其虛罔奴云此屋若閉求得開看屋中有一板牀牀上無席大有塵土兼有一甕米奴拂牀而坐兼畫地戲弄甕中之米亦握看之定其閉者應無事驗子容與謝遠自入看之戶閉極久全無開跡及入拂牀畫地蹤緒歷然米亦符同方知不謬具以此對世隆悵然意以為惡未幾見誅世隆弟世承莊帝初為寧朔將軍步兵校尉欒城縣開國伯又特除撫軍將軍金紫光祿大夫左衛將軍尋加侍中領御史中尉世承人才猥劣備員而已及元皓內逼詔世承守轘轅世隆棄虎牢不暇追告尋為元皓所擒臠殺之莊帝還宮贈使持節都督冀州諸軍事驃騎大將軍司徒冀州刺史追封趙郡公世承弟弼字輔伯前廢帝初為散騎常侍左衛將軍封朝陽縣開國伯又除車騎將軍左光祿大夫領左右改封河間郡公尋為驃騎大將軍開府儀同三司青州刺史天光等之赴韓陵也世隆以其府長史房謨兼尚書為齊州行臺召募士馬以趣四瀆闕弼總東陽之衆亦赴亂城疑揚聲渡以為掎角之勢及天光等敗弼乃還州世隆既擒弼欲奔蕭衍數與左右割臂為約弼帳下都督馮紹隆為弼信待乃說弼曰今方同契闊須更約盟宜可當心瀝血示衆以信弼乃從之遂大集部下弼乃踞胡牀令紹隆持刀披心紹隆因推刃殺之傳首京師爾朱度律榮從父弟也鄙朴少言為統軍從榮征伐莊帝初除安西將軍光祿大夫封樂鄉縣開國伯尋轉安北將軍朔州刺史復除軍州刺史後加散騎常侍右衛將軍又除衛將軍左光祿大夫兼京畿大都督榮死與世隆赴晉陽元曄之立以度律為太尉公四面大都督封常山王與爾朱兆入洛兆還晉陽留度律鎮京師前廢帝時為使持節侍中大將軍太尉兼尚書令東北道大行臺與仲遠出拒義旗齊獻武王間之與爾朱兆遂相疑二自敗而還度律雖在軍戎聚斂無厭所至之處為百姓患毒其母山氏聞度律敗遂恚憤而發病及度律至母責之曰汝既荷國恩無狀反叛我何忍見他屠戮汝也言終而卒時人怪異之後解大行臺總隸長孫稚戰於韓陵敗還斛斯椿先據河梁度律欲攻之會大雨晝夜不止士馬疲頓弓矢不得施用遂西走於灅波津為人擒執椿囚之送於齊獻武王王送於洛斬之都市爾朱天光榮從祖兄子少勇決善弓馬榮親愛之每有軍戎事要常預謀策孝昌末榮將擁衆南轉與天光密議既據并肆仍以天光為都將總統肆州兵馬肅宗崩榮向京師以天光攝行肆州委以後事建義初特除撫軍將軍肆州刺史長安縣開國公食邑一千戶榮將討葛榮留天光在州鎮其根本謂之曰我身不得至處非汝無以稱我心永安中加侍中金紫光祿大夫北秀容第一酋長尋轉衛將軍大將軍元天穆東征邢杲詔天光以本官為使持節假鎮東將軍都督隸天穆討破之元皓入洛天光與天穆會榮於河內榮發之後并肆不安詔天光以本官兼尚書僕射為并肆雲朔燕蔚顯汾九州行臺仍行并州委以安靜之天光至并州部分約勒所在寧輯皓破尋還京師遷驃騎將軍加散騎常侍改封廣宗郡公增邑一千戶仍為左衛將軍建義元年夏万俟醜奴僭大號朝廷憂之乃除天光使持節都督雍岐二州諸軍事驃騎大將軍雍州刺史率大都督武衛將軍賀拔嶽大都督侯莫陳悅等以討醜奴天光初行唯配軍士千人詔發京城已西路次民馬以給之時東雍赤水蜀賊斷路詔侍中楊侃先行曉慰并徵其馬侃雖入慰勞而蜀持疑不下天光遂入關擊破之簡取壯健以充軍士悉收其馬至雍又稅民馬合得萬餘匹以軍人寡少停留未進榮遣責之杖天光一百榮復遣軍士二千人以赴天光令賀拔嶽率千騎先驅至岐州界長城西與醜奴行臺尉遲菩薩相遇遂破擒之獲騎士三千步卒萬餘醜奴棄岐州走還安定置柵於平亭天光發雍至岐與嶽合勢於汧渭之間停軍牧馬宣言遠近曰今時將熱非可征討待至秋涼別量進止醜奴每遣窺覘有執送者天光寬而問之仍便放遣免者傳其待秋之言醜奴謂以為實分遣諸軍散營農稼在岐州之北百里涇川使其太尉侯伏侯元進領兵五千據險立柵且耕且守在其左右千人已下為一柵者乃復數處天光知其勢分遂密嚴備晡時潛遣輕騎先行斷路以防賊知於後諸軍盡發昧旦攻圍元進大柵拔之諸所俘執並皆放散須臾之間左右諸柵悉來歸款前去涇州百八十里通夜徑進後日至城賊涇州刺史侯幾長貴仍以城降醜奴棄平亭而走欲趨高平天光遣嶽輕騎急追明日及醜奴於平涼長平坑一戰擒之天光明便共逼高平城內執送蕭寶夤而降賊行臺万俟道洛率衆六千人入山不下時高平大旱天光以馬乏草乃退於城東五十許里息衆牧馬於是涇豳二夏北至靈州賊黨結聚之類並來歸降天光遣都督長孫邪利率二百人行原州事以鎮之道洛招誘城人來掩襲殺邪利并其所部天光與嶽悅等馳赴之道洛出城拒戰暫交便退追殺千餘人道洛還走入山城復降附天光遣慰喻道洛不從乃率衆西依牽屯山據險自守榮責天光失邪利不獲道洛復遣使杖之一百詔降為散騎常侍撫軍將軍雍州刺史削爵為侯天光與嶽悅等復向牽屯討之天光身討道洛道洛戰敗率數千騎而走追之不及遂得入隴投略陽賊帥王慶雲慶雲以道洛驍果絶倫得之甚喜便謂大事可圖乃自稱皇帝以道洛為大將軍天光欲討之而莊帝頻敕榮復有書以隴中險邃兼天盛暑令待冬月而天光知其可制乃率諸軍入隴至慶雲所居水洛城慶雲道洛出城拒戰天光復射中道洛臂失弓還走破其東城賊遂併趨西城城中無水衆聚熱渴有人走降言慶雲道洛欲突出死戰天光恐失賊帥燼釁未已乃遣謂慶雲曰力屈如此可以早降若未敢決當聽諸人今夜共議明晨早報而慶雲等冀得小緩待夜突出報天光云請待明日天光因謂曰相知須水今為小退任取河飲賊衆安悅無復走心天光密使軍人多作木槍各長七尺至黃昏時布立人馬為防衛之勢周匝立槍要路加厚又伏人槍中備其衝突兼令密縛長梯於城北其夜慶雲道洛果便突出馳馬先進不覺至槍馬各傷倒伏兵便起同時擒獲餘衆皆出城南遇槍而止城北軍士登梯上城賊徒路窮乞降至明盡收其仗天光嶽悅等議悉坑之死者萬七千人分其家口於是三秦河渭瓜涼鄯善咸來款順天光頓軍略陽詔復天光前官爵尋加侍中儀同三司增邑至三千戶秦州城民謀殺刺史駱超超覺走歸天光天光復與嶽悅等討平之南秦滑城人謀害刺史辛琛顯琛顯走赴天光天光遣師臨之往皆克定初賊帥夏州人宿勤明達降天光於平涼後復北走收聚部類謀為逆攻降人叱干麒麟欲并其衆麒麟請救於天光天光遣嶽討之未至明達走於東夏嶽聞榮死故不追之仍還涇州以待天光天光亦下隴與嶽圖入洛之策進至雍州北破叛已疑詔遣侍中朱瑞詣天光慰喻天光與嶽謀欲令帝外奔別更推立乃頻啓云臣實無異心惟仰奉天顏以申宗門之罪又其下僚屬啓云天光密有異圖願思勝算以防微意既而莊帝進天光爵為廣宗王元曄又以為隴西王及聞爾朱兆已入京師天光乃輕騎向都見世隆等尋便還雍世隆等議廢元曄更舉親賢遣使告天光天光與定策立前廢帝又加開府儀同三司兼尚書令關西大行臺天光北出夏州遣將討宿勤明達擒之送洛時費也頭帥紇豆陵伊利万俟受洛干等據有河西未有所附天光以齊獻武王起兵信都內懷憂恐不復北事伊利等但微遣備之而已又除大司馬於時獻武王義軍轉盛爾朱兆仲遠等既經敗退世隆纍使徵天光天光不從後令斛斯椿苦要天光云非王無以能定豈可坐看宗家之滅也天光不得已而東下與仲遠等敗於韓陵斛斯椿等先還於河梁拒之天光既不得渡西北走遇雨不可前進乃執獲之與度律送於獻武王王致於洛斬於都市年三十七爾朱專恣分裂天下各據一方天光有定關西之功差不酷暴比之兆與仲遠為不同矣史臣曰爾朱兆之在晉陽天光之據隴右仲遠鎮捍東南世隆專秉朝政于時立君廢主易於奕慶賞威刑咸出於己若使布德行義憂公忘私脣齒相依同心協力則磐石之固未可圖也然是庸才志識無遠所爭唯權勢所好惟財色譬諸溪壑有甚豺狼天下失望人懷怨憤遂令徑敵得容覘間心腹內阻形影外合是以廣阿之役葉落冰離韓陵之戰土崩瓦解一旦殄滅豈不哀哉傳稱師克在和詩云貪人敗類貪而不和難以濟矣
