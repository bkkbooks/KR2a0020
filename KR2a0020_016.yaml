body:
  text: 魏書卷十四神元平文諸帝子孫列傳第二上谷公紇羅神元皇帝之曾孫也初從太祖自獨孤如賀蘭部招集舊戶得三百家與弟建議勸賀訥推太祖為主及太祖登王位紇羅常翼衞左右又從征伐有大功紇羅有援立謀特見優賞及即帝位與弟建同日賜爵為公卒子題少以雄武知名賜爵襄城公從征中山受詔徇下諸郡撫慰新城皆安化樂業進爵為王擊慕容驎於義臺中流矢薨帝以太醫令陰光為視療不盡術伏法子悉襲降爵為襄城公卒贈襄城王建德公嬰文神元皇帝之後也少明辯有決斷太宗器之典出納詔命常執機要世祖踐阼拜護東夷校尉進爵建德公鎮遼西卒真定侯陸神元皇帝之後也世祖時以武功頗蒙恩遇拜散騎常侍賜爵真定侯卒陸曾孫軌字法寄稍遷洛陽令時天下多事軌惟以深刻遇下死多酷濫識者非之孝靜時鄴宮創制以軌為營構使除徐州刺史軌風望既陋又無學術雖歷名位時人輕之卒於州武陵侯因章帝之後也從太祖平中原以功封曲逆侯世祖時改爵武陵長樂王壽樂章帝之後也位選部尚書南安王改封長樂王高宗即位壽樂有援立功拜太宰大都督中外諸軍錄尚書事矜功與尚書令長孫渴侯爭權並伏法望都公頹昭帝之後也隨太祖平中原賜爵望都侯世祖以頹美儀容進止可觀使迎左昭儀於蠕蠕進爵為公卒曲陽侯素延桓帝之後也以小統從太祖征討諸部初定并州為刺史太祖之驚於栢肆也并州守將封竇真為逆素延斬之時太祖意欲撫悅新附悔參合之誅而素延殺戮過多坐免官中山平拜幽州刺史豪奢放逸左遷上谷太守後賜爵曲陽侯時太祖留心黃老欲以純風化俗雖乘輿服御皆去彫飾咸尚質儉而素延奢侈過度太祖深銜之積其過因徵坐賜死順陽公郁桓帝之後也少忠正亢直初以羽林中郎內侍勤幹有稱高宗時位殿中尚書從高宗東巡臨海以勞賜爵順陽公高宗崩乙渾專權隔絕內外百官震恐計無所出郁率殿中衞士數百人從順德門入欲誅渾渾懼逆出問郁曰君入何意郁曰不見天子羣臣憂懼求見主上渾窘怖謂郁曰今大行在殯天子諒闇故未接百官諸君何疑遂奉顯祖臨朝後渾心規為亂朝臣側目郁復謀殺渾為渾所誅顯祖錄郁忠正追贈順陽王諡曰簡宜都王目辰桓帝之後也初以羽林郎從太祖南伐至江高宗即位以勞累遷侍中尚書左僕射封南平公乙渾之謀亂也目辰與兄郁議欲殺渾事泄被誅目辰逃隱得免顯祖傳位有定策勳高祖即位遷司徒封宜都王除雍州刺史鎮長安目辰性亢直耿介不為朋黨朝臣咸憚之然好財利在州政以賄成有罪伏法爵除穆帝長子六脩少而兇悖穆帝五年遣六脩為前鋒與輔相衞雄范班及姬澹等救劉琨帝躬統大兵為後繼劉粲懼焚燒輜重突圍遁走縱騎追之殺傷甚衆帝因大獵於壽陽山陳閱皮肉山為變赤及晉懷帝為劉聰所執穆帝遣六脩與桓帝子普根率精騎助劉琨初穆帝少子比延有寵欲以為後六脩出居新平城而黜其母六脩有驊騮駿馬日行五百里穆帝欲取以給比延後六脩來朝穆帝又命拜比延六脩不從穆帝乃坐比延於己所乘步輦使人導從出遊六脩望見以為穆帝謁伏路左及至乃是比延慚怒而去召之不還穆帝怒率衆伐之帝軍不利六脩殺比延帝改服微行民間有賤婦人識帝遂暴崩普根先守于外聞難率衆來赴攻六脩滅之吉陽男比干太祖族弟也以司衞監討白澗丁零有功賜爵吉陽男後為南道都將戰沒江夏公呂太祖族弟也從世祖平涼州有功封江夏公位外都大官委以朝政大見尊重卒贈江夏王陪葬金陵高涼王孤平文皇帝之第四子也多才藝有志略烈帝之前元年國有內難昭成如襄國後烈帝臨崩顧命迎昭成立之社稷可安及崩羣臣咸以新有大故內外未安昭成在南來未可果比至之間恐生變詐宜立長君以鎮衆望次弟屈剛猛多變不如孤之寬和柔順於是大人梁蓋等殺屈共推孤孤曰吾兄居長自應繼位我安可越次而處大業乃自詣鄴奉迎請身留為質石虎義而從之昭成即位乃分國半部以與之薨子斤失職懷怒構寔君為逆死於長安太祖時以孤勳高追封高涼王諡曰神武斤子樂真頻有戰功後襲祖封太宗初改封平陽王薨子禮襲本爵高涼王薨諡懿王子那襲爵拜中都大官驍猛善攻戰正平初坐事伏法顯祖即位追那功命子紇紹封薨子大曹性愿直高祖時諸王非太祖子孫者例降爵為公以大曹先世讓國功重曾祖樂真勳著前朝改封太原郡公卒無子國除世宗又以大曹從兄子洪威紹恭謙好學為潁川太守有政績孝靜初在潁川聚眾應關西齊獻武王遣將討平之禮弟陵世祖賜爵襄邑男進爵為子卒子瓌位柔玄鎮司馬瓌子鷙字孔雀容貌魁壯腰帶十圍為羽林隊仗副高祖末以征討有功賜爵晉陽男累遷領軍畿部都督武泰元年尒朱榮至河陰殺戮朝士鷙與榮共登高冢俯而觀之自此後與榮合元顥之逼也鷙從駕北迎既到河內欲入城鷙奏曰河內晝則閉門夜引駕入此之意趣難以測量本圖有在願便發邁帝從之前至長子以尒朱榮赴援除鷙車騎將軍封華山王莊帝既殺尒朱榮榮從子兆為亂帝欲率諸軍親討鷙與兆陰通乃勸帝曰黃河萬仞寧可卒渡帝遂自安及兆入殿鷙又約止衞兵帝見逼京邑破皆由鷙之謀孝靜初入為大司馬加侍中鷙有武藝木訥少言性方厚每息直省闥雖暑月不解衣冠曾於侍中高岳之席咸陽王坦恃力使酒陵侮一坐衆皆下之不敢應答坦謂鷙曰孔雀老武官何因得王鷙即答曰斬反人元禧首是以得之衆皆失色鷙怡然如故興和三年薨贈假黃鉞尚書令司徒公子大器襲爵後與元瑾謀害齊文襄王見害孤孫度太祖初賜爵松滋侯位比部尚書卒子乙斤襲爵襄陽侯顯祖崇舊齒拜外都大官甚見優重卒子平字楚國襲世爵松滋侯以軍功賜艾陵男卒子萇高祖時襲爵松滋侯例降侯賜艾陵伯萇性剛毅雖有吉慶事未嘗開口而笑高祖遷都萇以代尹留鎮除懷朔鎮都大將因別賜萇酒雖拜飲而顏色不泰高祖曰聞公一生不笑今方隔山當為朕笑竟不能得高祖曰五行之氣偏有所不入六合之間亦何事不有左右見者無不扼腕大笑世宗時為北中郎將帶河內太守萇以河橋船絙路狹不便行旅又秋水汎漲年常破壞乃為船路遂廣募空車從京出者率令輸石一雙累以為岸橋闊來往便利近橋諸郡無復勞擾公私賴之歷位度支尚書侍中雍州刺史卒諡曰成萇中年以後官位微達乃自尊倨閨門無禮昆季不穆性又貪虐論者鄙之萇子子華字伏榮襲爵孝莊初除齊州刺史先是州境數經反逆邢杲之亂人不自保而子華撫集豪右委之管籥衆皆感悅境內帖然而性甚褊急當其急也口不擇言手自捶擊長史鄭子湛子華親友也見侮罵遂即去之子華雖自悔厲終不能改在官不為矯潔之行凡有餽贈者辭多受少故人不厭其取鞠獄訊囚務加仁恕齊人樹碑頌德後除濟州刺史尒朱兆之入洛也齊州城人趙洛周逐刺史丹陽王蕭贊表濟南太守房士達攝行州事洛周子元顯先隨子華在濟州邀路改表請子華復為齊州刺史子華母房氏曾就親人飲食夜還大吐人以為中毒甚憂懼子華遂掬吐盡噉之其母乃安尋以母憂還都孝靜初除南兗州刺史弟子思通使關西朝廷使右衞將軍郭瓊收之子思謂瓊僕曰速可見殺何為久執國士子華謂子思曰由汝粗疏令我如此以頭叩牀涕泣不自勝子思以手捋鬚顧謂子華曰君惡體氣尋與子思俱死於門下外省子思字衆念性剛暴以忠烈自許元天穆當朝權以親從薦為御史中尉先是兼尚書僕射元順奏以尚書百揆之本至於公事不應送御史至子思奏曰案御史令云中尉督司百僚治書侍御史糾察禁內又云中尉出行車輻前驅除道一里王公百辟避路時經四帝前後中尉二十許人奉以周旋未曾暫廢府寺臺省並從此令唯肅宗之世為臨洮舉哀故兼尚書左僕射臣順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啟云尚書百揆之本令僕納言之貴不宜下隸中尉送名御史尋亦蒙敕聽如其奏從此迄今使無準一臣初上臺具見其事意欲申請決議但以權兼未宜便爾日復一日遂歷炎涼去月朔旦臺移尚書索應朝名帳而省稽留不送尋復移催并主吏忽為尚書郎中裴獻伯後注云案舊事御史中尉逢臺郎於複道中尉下車執板郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕旋省二三未解所以正謂都省別被新式改易高祖舊命即遣移問事何所依又獲尚書郎中王元旭報出蔡氏漢官似非穿鑿始知裴王亦規壞典謨兩人心欲自矯臣案漢書宣秉傳云詔徵秉為御史中丞與司隸校尉尚書令俱會殿庭並專席而坐京師號之為三獨坐又尋魏書崔琰傳晉文陽傅嘏傳皆云既為中丞百僚震悚以此而言則中丞不揖省郎蓋已久矣憲臺不屬都堂亦非今日又尋職令云朝會失時即加彈糾則百官簿帳應送上臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宜付御史又亦彰矣不付名至否臧何驗臣順專執未為平通先朝曲遂豈是正法謹案尚書郎中臣裴獻伯王元旭等望班士流早參清宦輕弄短札斐然若斯苟執異端忽焉至此此而不綱將隳朝令請以見事免獻伯等所居官付法科處尚書納言之本令僕百揆之要同彼浮虛助之乖失宜明首從節級其罪詔曰國異政不可據之古事付司檢高祖舊格推處得失以聞尋從子思奏仍為元天穆所忿遂停元顥之敗封安定縣子孝靜時位侍中而死萇弟珍字金雀襲爵艾陵男世宗時曲事高肇遂為帝寵昵彭城王勰之死珍率壯士害之後卒於尚書左僕射平弟長生位游騎擊將軍卒孝莊時以子天穆貴盛贈司空天穆性和厚美形貌善射有能名年二十起家員外郎六鎮之亂尚書令李崇廣陽王深北討天穆奉使慰勞諸軍路出秀容尒朱榮見其法令齊整有將領氣深相結託約為兄弟未幾榮請天穆為行臺朝廷不許改授別將令赴秀容是時北鎮紛亂所在蜂起六鎮蕩然無復蕃捍惟榮當職路衝招聚散亡天穆為榮腹心除并州刺史及榮赴洛天穆參其始謀乃令天穆留後為之繼援莊帝踐阼天穆以榮之眷昵特除太尉封上黨王徵赴京師榮之討葛榮詔天穆為前軍都督率京師之衆以赴之榮擒葛榮天穆增封通前三萬戶尋監國史錄尚書事開府世襲并州刺史初杜洛周鮮于脩禮為寇瀛冀諸州人多避亂南向幽州前北平府主簿河間邢杲擁率部曲屯據鄚城以拒洛周葛榮垂將三載及廣陽王深等敗後杲南渡居青州北海界靈太后詔流人所在皆置命屬郡縣選豪右為守令以撫鎮之時青州刺史元世儁表置新安郡以杲為太守未報會臺申汰簡所授郡縣以杲從子子瑤資蔭居前乃授河間太守杲深恨於是遂反所在流人先為土人凌忽聞杲起逆率來從之旬朔之間衆踰十萬劫掠村塢毒害民人齊人號之為崯榆賊先是河南人常笑河北人好食榆葉故因以號之杲東掠光州盡海而還又破都督李叔仁軍詔天穆與齊獻武王討大破之杲乃請降傳送京師斬之增天穆邑萬戶時元顥乘虛陷滎陽天穆聞莊帝北巡自畢公壘北渡會車駕於河內尒朱榮以天時炎熱欲還師天穆苦執不可榮乃從之莊帝還宮加太宰羽葆鼓吹增邑通前七萬戶天穆以疏屬本無德望憑藉尒朱爵位隆極當時燻灼朝野傾悚王公已下每旦盈門受納財貨珍寶充積而寬柔容物不甚見疾於時莊帝以其榮黨外示寵敬詔天穆乘車馬出入大司馬門天穆與榮相倚情寄特甚榮常以兄禮事之而尒朱世隆等雖榮子姪位遇已重畏憚天穆俯仰承迎天穆曾言世隆之失榮即加杖其相親任如此莊帝內畏惡之與榮同時見殺前廢帝初贈丞相柱國大將軍雍州刺史假黃鉞諡曰武昭子儼襲美才貌位都官尚書及齊受禪聞敕召假病遂怖而卒西河公敦平文帝之曾孫也太祖初從征被堅執銳名冠諸將後從征中山所向無前太宗時拜中都大官世祖時進爵西河公寵遇彌篤卒子撥襲司徒石平文帝之玄孫也忠勇有膽略尤善騎射從世祖南討至瓜步位尚書令雍州刺史歷比部侍郎華州刺史累遷征南大將軍卒贈司徒公武衞將軍謂烈帝之第四子也寬雅有將略常從太祖征討有功除武衞將軍後謝老歸家顯祖善禮遇之賜几杖服物致膳於第卒賜祕器子烏真膂力絕人隨太祖征伐屢有戰功官至鉅鹿太守子興都聰敏剛毅高宗時為河間太守賜爵樂城子為政嚴猛百姓憚之顯祖初以子丕貴重進爵樂城侯謝老歸家顯祖益禮之賜几杖服物致膳於第其妻婁氏為東陽王太妃卒追贈定州刺史河間公諡曰宣子提襲父侯爵提弟丕世祖擢拜羽林中郎從駕臨江賜爵興平子顯祖即位累遷侍中丞相乙渾謀反丕以奏聞詔丕帥元賀牛益得收渾誅之遷尚書令改封東陽公高祖時封東陽王拜侍中司徒公時有諸疑事三百餘條敕丕制決率皆平允丕子超生車駕親幸其第特加賞賜以執心不二詔賜丕入八議傳示子孫犯至百聽責數恕之放其同籍丁口雜使役調永受復除若有姦邪人方便讒毀者即加斬戮尋遷太尉錄尚書事時淮南王他淮陽王尉元河東王苟頹並以舊老見禮每有大事引入禁中乘步挽杖于朝進退相隨丕他元三人皆容貌壯偉腰帶十圍大耳秀眉鬚鬢斑白百僚觀瞻莫不祗聳唯苟頹小為短劣姿望亦不逮之高祖文明太后重年敬舊存問周渥賜以珍寶丕聲氣高朗博記國事饗讌之際居坐端必抗音大言列既往成敗帝后敬納焉然諂事要人驕侮輕賤每見王叡苻承祖常傾身下之時文明太后為王叡造宅故亦為丕造甲第第成帝后親幸之率百官文武饗落焉使尚書令王叡宣詔賜丕金印一紐太后親造勸戒歌辭以賜羣官丕上疏贊謝太后令曰臣哉隣哉隣哉臣哉君則亡逸於上臣則履冰於下若能如此太平豈難致乎及丕妻段氏卒諡曰恭妃又特賜丕金券高祖文明太后引見公卿於皇信堂太后曰今京師旱儉欲聽飢貧之人出關逐食如欲給過所恐稽延時日不救災窘若任其外出復慮姦良難辨卿等可議其所宜丕議諸曹下大夫以上人各將二吏別掌給過所州郡亦然不過三日給之便訖有何難也高祖從之四日而訖丕請立東宮詔曰年尚幼小有何急之丕曰臣年在西夕思觀盛禮於臣實急不許後例降王爵封平陽郡公求致任詔不許及車駕南伐丕與廣陵王羽留守京師並加使持節詔丕羽曰留守非賢莫可太尉年尊德重位總阿衡羽朕之懿弟溫柔明斷故使二人留守京邑授以二節賞罰在手其祗允成憲以稱朕心丕對曰謹以死奉詔羽對曰太尉宜專節度臣但可副貳而已高祖曰老者之智少者之決何得辭也及高祖還代丕請作歌詔許之歌訖高祖曰公傾朕還車故親歌述志今經構既有次第故暫還舊京願後時亦同茲適及高祖欲遷都臨太極殿引見留守之官大議乃詔丕等如有所懷各陳其志燕州刺史穆羆進曰移都事大如臣愚見謂為未可高祖曰卿便言不可之理羆曰北有獫狁之寇南有荊揚未賓西有吐谷渾之阻東有高句麗之難四方未平九區未定以此推之謂為不可征伐之舉要須戎馬如其無馬事不可克高祖曰卿言無馬此理粗可馬常出北方廄在此置卿何慮無馬今代在山之北為九州之外以是之故遷于中原羆曰臣聞黃帝都涿鹿以此言之古昔聖王不必悉居中原高祖曰黃帝以天下未定居于涿鹿既定之後亦遷于河南尚書于果曰臣誠不識古事如聞百姓之言先皇建都於此無何欲移以為不可中原其如是所由擬數有篡奪自建邑平城以來與天地並固日月齊明臣雖管見膚淺性不昭達終不以代之地而擬伊洛之美但以安土重遷物之常性一旦南移懼不樂也丕曰陛下去歲親御六軍討蕭氏至洛遣任城王澄宣旨敕臣等議都洛初奉恩旨心情惶越凡欲遷移當訊之卜筮審定吉否然後可高祖謂丕曰往在鄴中司徒公誕咸陽王禧尚書李沖等皆欲請龜占移洛吉凶之事朕時謂誕等曰昔周邵卜宅伊洛乃識至兆今無若斯之人卜亦無益然卜者所以決疑此既不疑何須卜也昔軒轅卜兆龜焦卜者請訪諸賢哲軒轅乃問天老天老謂為善遂從其言終致昌吉然則至人之量未然審於龜矣朕既以四海為家或南或北遲速無常南移之民朕自多積倉儲不令窘乏丕曰臣仰奉慈詔不勝喜舞高祖詔羣官曰卿等或以朕無為移徙也昔平文皇帝棄背率土昭成營居盛樂太祖道武皇帝神武應天遷居平城朕雖虛寡幸屬勝殘之運故移宅中原肇成皇宇卿等當奉先君令德光迹洪規前懷州刺史青龍前秦州刺史呂受恩等仍守愚固帝皆撫而答之辭屈而退帝又將北巡丕遷太傅錄尚書事頻表固讓詔斷表啟就家拜授及車駕發代丕留守詔曰中原始構須朕營視在代之事一委太傅賜上所乘車馬往來府省丕雅愛本風不達新式至於變俗遷洛改官制服禁絕舊言皆所不願高祖知其如此亦不逼之但誘示大理令其不生同異至於衣冕已行朱服列位而丕猶常服列在坐隅晚乃稍加弁帶而不能修飾容儀高祖以丕年衰體重亦不強責及罷降非太祖子孫及異姓王者雖較於公爵而利享封邑亦不快疑高祖南征丕表乞少留思更圖後舉會司徒馮誕薨詔六軍反斾丕又以熙薨于代都表求鑾駕親臨詔曰今洛邑肇構跂望成勞開闢暨今豈有以天子之重遠赴舅國之喪朕縱欲為孝其如大孝何縱欲為義其如大義何天下至重君臣道懸豈宜苟相誘引陷君不德令僕已下可付法官貶之又詔以丕為都督領并州刺史後詔以平陽畿甸改封新興公初李沖又德望所屬既當時貴要有杖情遂與子超娶沖兄女即伯尚妹也丕前妻子隆同產數人皆與別居後得宮人所生同宅共產父子情因此偏丕父子大意不樂遷洛高祖之發平城太子恂留於舊京及將還洛隆與超等密謀留恂因舉兵斷關規據陘北時丕以老居并州雖不預其始計而隆超咸以告丕丕外慮不成口雖致難心頗然之及高祖幸平城推穆泰等首謀隆兄弟並是黨丕亦隨駕至平城每於測問令丕坐觀隆超與元業等兄弟並以謀逆伏誅有司奏處孥戮詔以丕應連坐但以先許不死之詔躬非染逆之身聽免死仍為太原百姓其後妻二子聽隨隆超母弟及餘庶兄弟皆徙敦煌丕時年垂八十猶自平城力載隨駕至洛陽高祖每遣左右慰勉之乃還晉陽高祖崩丕自并州來赴世宗引見之以丕舊老禮有加焉尋敕留洛陽後宴于華林都亭特令二子扶侍坐起丕仕歷六世垂七十年位極公輔而還為民庶然猶心戀京邑不能自絕人事尋詔以丕為三老景明四年薨年八十二詔贈左光祿大夫冀州刺史諡曰平長子隆先以反誅隆弟乙升超亦同誅超弟儁邕並有軍功儁封新安縣男邕封涇縣男淮陵侯大頭烈帝之曾孫也善騎射擢為內三郎從世祖有戰功賜爵高宗初封淮陵性謹密帝甚重之位寧北將軍遷右將軍卒贈高平公諡曰烈河間公齊烈帝之玄孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍決死擊賊賊乃退世祖得上馬是日微齊世祖幾至危殆世祖以微服入其城齊固諫不許乃與數人從世祖入城內既覺諸門悉閉世祖及齊等因入其宮中得婦人裙繫之槊上世祖乘而上因此得拔齊有力焉賜爵浮陽侯從征和龍以功拜尚書進爵為公後與新興王俊討禿髮保周坐事免官爵劉義隆將裴方明陷仇池世祖復授齊前將軍與建興公古弼討之遂克仇池威振羌氐復賜爵河間公與武都王楊保宗對鎮駱谷時保宗弟文德說保宗閉險自固有期矣秦州主簿邊因知之密告齊齊晨詣保宗呼曰古弼至欲宣詔保宗出齊叱左右扶保宗上馬馳驛送臺諸氐遂推文德為主求援於劉義隆義隆遣將房亮之苻昭啖龍等率衆助文德齊擊斬殺龍擒亮之氐遂平以功拜內都大官卒諡曰敬長子陵襲爵陵性抗直天安初為乙渾所害陵弟蘭以忠謹見寵高祖初賜爵建陽子卒於武川鎮將子志字猛略少清辯強幹歷覽書傳頗有文才為洛陽令不避強禦與御史中尉李彪爭路俱入見面陳得失彪言御史中尉避承華車蓋駐論道劍鼓安有洛陽縣令與臣抗衡志言神鄉縣主普天之下誰不編戶豈有俯同衆官避中尉高祖曰洛陽我之豐沛自應分路揚鑣自今以後可分路而行及出與彪折尺量道各取其半高祖謂邢巒曰此兒竟可所謂王孫公子不鏤自雕巒曰露枝霜條故多勁節非鸞則鳳其在本枝也員外郎馮俊昭儀之弟恃勢恣撾所部里正志令主吏收繫處刑除官由此忤旨左遷太尉主簿俄為從事中郎車駕南征高祖微服觀戰所有箭欲犯帝志以身障之高祖便得免矢中志目因此一目喪明以志行州事世宗時除荊州刺史還朝御史中尉王顯奏志在州日抑買良人為婢兼剩請供會赦免肅宗初兼廷尉卿後除揚州刺史賜爵建忠伯志在州威名雖減李崇亦為荊楚所憚尋為雍州刺史晚年躭好聲伎在揚州日侍側將百人器服珍麗冠於一時及在雍州逾尚華侈聚斂無極聲名遂損及莫折念生反詔志為西征都督討之念生遣其弟天生屯隴口與志相持為賊所乘遂棄大衆奔還岐州賊遂攻城刺史裴芬之疑城人與賊潛通將盡出之志不聽城人果開門引賊鎖志及芬之送念生見害前廢帝初贈尚書僕射太保扶風公處真烈帝之後也少以壯烈聞位殿中尚書賜爵扶風公委以大政甚見尊禮吐京胡曹僕渾等叛招引朔方胡為援處真與高涼王那等討滅之性貪婪在軍烈暴坐事伏法文安公泥國之疏族也性忠直壯烈有智畫太祖厚遇之賜爵文安公拜安東將軍卒子屈襲爵太宗時居門下出納詔命性明敏善奏事每合上旨賜爵元城侯加功勞將軍與南平公長孫嵩白馬侯崔玄伯等並決獄訟太宗東巡命屈行右丞相山陽侯奚斤行左丞相命掌軍國甚有聲譽後吐京胡與離石胡出以兵等叛置立將校外引赫連屈丐屈督會稽公劉潔永安侯魏勤捍之勤沒於陳潔墜馬胡執送屈丐唯屈衆猶存太宗以屈沒失二將欲斬之時并州刺史元六頭荒淫怠事乃赦屈令攝州事屈縱酒頗廢政事太宗積其前後失檻車徵還斬於市子磨渾少為太宗所知元紹之逆也太宗潛隱於外磨渾與叔孫俊詐云太宗所在紹使帳下二人隨磨渾往規為逆磨渾既得出便縛帳下詣太宗斬之太宗得磨渾大喜因為羽翼以勳賜爵長沙公拜尚書出為定州刺史卒
