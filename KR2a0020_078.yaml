body:
  text: 魏書卷七十三列傳第六十一奚康生楊大眼崔延伯奚康生河南洛陽人其先代人也世為部落大人祖直平遠將軍柔玄鎮將入為鎮北大將軍內外三都大官賜爵長進侯卒贈幽州刺史諡曰簡父普憐不仕而卒太和十一年蠕蠕頻來寇邊柔玄鎮都將李兜討擊之康生性驍勇有武藝弓力十石矢異常箭為當時所服從兜為前驅軍主頻戰陷陳壯氣有聞由是為宗子隊主從駕征鍾離駕旋濟淮五將未渡蕭鸞遣將率衆據渚邀斷津路高祖敕曰能破中渚賊者以為直閣將軍康生時為軍主謂友人曰如其克也得暢名績脫若不捷命也在天丈夫今日何為不決遂便應募縛筏積柴因風放火燒其船艦依煙直進飛刀亂斫投河溺死者甚衆乃假康生直閣將軍後以勳除中堅將軍太子三校西臺直後吐京胡反自號辛支王康生為軍主從章武王彬討之胡遣精騎一千邀路斷截康生率五百人拒戰破之追至石羊城斬首三十級彬甲卒七千與胡對戰分為五軍四軍俱敗康生軍獨全遷為統軍率精騎一千追胡至車突谷詐為墜馬胡皆謂死爭欲取之康生騰騎奮矛殺傷數十人胡遂奔北辛支輕騎退走去康生百餘步彎弓射之應弦而死因俘其牛羊駝馬以萬數蕭鸞置義陽招誘邊民康生復為統軍從王肅討之進圍其城鸞將張伏護自升城樓言辭不遜肅令康生射之以強弓大箭望樓射窗扉開即入應箭而斃彼民見箭皆云狂弩以殺伏護賞帛一千匹又頻戰再退其軍賞三階帛五百匹蕭寶卷將裴叔業率衆圍渦陽欲解義陽之急詔遣高聰等四軍往援之後遣都督廣陵侯元衍並皆敗退時刺史孟表頻啓告高祖敕肅遣康生馳往赴援一戰大破之賞二階帛一千匹及壽春來降也遣康生領羽林一千人給龍馬兩匹馳赴壽春既入其城命集城內舊老宣詔撫賚俄而蕭寶卷將桓和頓軍梁城陳伯之據女完石民心駭動頗有異謀康生乃防禦內外音信不通固城一月援軍乃至康生出擊桓和伯之等二軍並破走之拔梁城合肥洛口三戍以功遷征虜將軍封安武縣開國男食邑二百戶出為南青州刺史後蕭衍郁洲遣軍主徐濟寇邊康生率將出討破之生擒濟賞帛千匹時蕭衍聞康生能引強弓力至十餘石故特作大弓兩張送與康生康生得弓便會集文武乃用平射猶有餘力其弓長八尺把中圍尺二寸箭粗殆如今之長笛觀者以為希世絶倫弓即表送置之武庫又蕭衍遣將宋黑率衆寇擾彭城時康生遭母憂詔起為別將持節假平南將軍領南青州諸軍擊走之後衍復遣都督臨川王蕭宏副將張惠紹勒甲十萬規寇徐州又假宋黑徐州刺史領衆二萬水陸俱進徑圍高冢戍詔授康生武衛將軍持節假平南將軍為別將領羽林三千人騎步甲士隨便割配康生一戰敗之還京召見宴會賞帛千匹賜驊騮御胡馬一匹出為平西將軍華州刺史頗有聲績轉涇州刺史仍本將軍以輒用官炭瓦為御史所劾削除官爵尋旨復之蕭衍直閣將軍徐玄明戍於郁洲殺其刺史張稷以城內附詔遣康生迎接賜細御銀槊一張并棗奈果面敕曰果者果如朕心棗者早遂朕意未發之間郁洲復叛時揚州別駕裴絢謀反除康生平東將軍為別將領羽林四千討之會事平不行遭父憂起為平西將軍西中郎將是歲大舉征蜀假康生安西將軍領步騎三萬邪趣綿竹至隴右世宗崩班師除衛尉卿出為撫軍將軍相州刺史在州以天旱令人鞭石虎畫像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴喪身亦遇疾巫以為虎豹之祟徵拜光祿卿領右衛將軍與元叉同謀廢靈太后遷撫軍大將軍河南尹仍右衛領左右與子難娶左衛將軍侯剛女即元叉妹夫也叉以其通姻深相委託三人率多俱宿禁內時或迭出叉以康生子難為千牛備身康生性粗武言氣高下叉稍憚之見于顏色康生亦微懼不安正光二年三月肅宗朝靈太后于西林園文武侍坐酒酣迭舞次至康生康生乃為力士舞及於折旋每顧視太后舉手蹈足瞋目頷首為殺縛之勢太后解其意而不敢言日暮太后欲攜肅宗宿宣光殿侯剛曰至尊已朝訖嬪御在南何勞留宿康生曰至尊陛下兒隨陛下將東西更復訪問誰羣臣莫敢應靈太后自起援肅宗臂下堂而去康生大呼唱萬歲於後近侍皆唱萬歲肅宗引前入閣左右競相排閣不得閉康生奪其子難千牛刀斫直後元思輔乃得定肅宗既上殿康生時有酒勢將出處分遂為叉所執鎖於門下至曉叉不出令侍中黃門僕射尚書等十餘人就康生所訊其事處康生斬刑難處絞刑叉與剛並在內矯詔決之康生如奏難恕死從流難哭拜辭父康生欣子免死又亦慷慨了不悲泣語其子云我不反死汝何為哭也有司驅逼奔走赴巿時已昏暗行刑人注刀數下不死於地刻截咸言稟叉意旨過至苦痛嘗食典御奚混與康生同執刀入內亦就巿絞刑康生久為將及臨州尹多所殺戮而乃信向佛道數捨其居宅以立寺塔凡歷四州皆有建置死時年五十四子難年十八以侯剛子壻得停百日竟徙安州後尚書盧同為行臺又令殺之康生於南山立佛圖三層先死忽夢崩壞沙門有為解云檀越當不吉利無人供養佛圖故崩耳康生稱然竟及禍靈太后反政贈都督冀瀛滄三州諸軍事驃騎大將軍司空公冀州刺史又追封壽張縣開國侯食邑一千戶子剛襲武定中青州開府主簿齊受禪爵例降剛弟定國襲康生安武縣開國男楊大眼武都氐難當之孫也少有膽氣跳走如飛然側出不為其宗親顧待頗有飢寒之切太和中起家奉朝請時高祖自代將南伐令尚書李沖典選征官大眼往求焉沖弗許大眼曰尚書不見知聽下官出一技便出長繩三丈許繫髻而走繩直如矢馬馳不及見者莫不驚歎沖曰自千載以來未有逸材若此者也遂用為軍主大眼顧謂同僚曰吾之今日所謂蛟龍得水之秋自此一舉終不復與諸君齊列矣未幾遷為統軍從高祖征宛葉穰鄧九江鍾離之間所經戰陳莫不勇冠六軍世宗初裴叔業以壽春內附大眼與奚康生等率衆先入以功封安成縣開國子食邑三百戶除直閣將軍尋加輔國將軍遊擊將軍出為征虜將軍東荊州刺史時蠻酋樊秀安等反詔大眼為別將隸都督李崇討平之大眼妻潘氏善騎射自詣軍省大眼至於攻陳遊獵之際大眼令妻潘戎裝或齊鑣戰場或並驅林壑及至還營同坐幕下對諸僚佐言笑自得時指之謂人曰此潘將軍也蕭衍遣其前江州刺史王茂先率衆數萬次于樊雍招誘蠻夏規立宛州又令其所署宛州刺史雷豹狼軍主曹仲宗等領衆二萬偷據河南城世宗以大眼為武衛將軍假平南將軍持節都督統軍曹敬邴虬樊魯等諸軍討茂先等大破之斬衍輔國將軍王花龍驤將軍申天化俘馘七千有餘衍又遣其舅張惠紹總率衆軍竊據宿豫又假大眼平東將軍為別將與都督邢巒討破之遂乘勝長驅與中山王英同圍鍾離大眼軍城東守淮橋東西二道屬水泛長大眼所綰統軍劉神符公孫祉兩軍夜中爭橋奔退大眼不能禁相尋而走坐徙為營州兵永平中世宗追其前勳起為試守中山內史時高肇征蜀世宗慮蕭衍侵軼徐揚乃徵大眼為太尉長史持節假平南將軍東征別將隸都督元遙遏禦淮肥大眼至京師時人思其雄勇喜其更用臺省閭巷觀者如巿大眼次譙南世宗崩時蕭衍遣將康絢於浮山遏淮規浸壽春詔加大眼光祿大夫率諸軍鎮荊山復其封邑後與蕭寶夤俱征淮堰不能克遂於堰上流鑿渠決水而還加平東將軍大眼善騎乘裝束雄竦擐甲折旋見稱當世撫巡士卒呼為兒子及見傷痍為之流泣自為將帥身先兵士衝突堅陳出入不疑當其鋒者莫不摧拉南賊前後所遣督將軍未渡江預皆畏懾傳言淮泗荊沔之間有童兒啼者恐之云楊大眼至無不即止王肅弟子秉之初歸國也謂大眼曰在南聞君之名以為眼如車輪及見乃不異人大眼曰旗鼓相望瞋眸奮發足使君目不能視何必大如車輪當世推其驍果皆以為關張弗之過也然征淮堰之役喜怒無常捶撻過度軍士頗撼焉識者以為性移所致又以本將軍出為荊州刺史常縛蒿為人衣以青布而射之召諸蠻渠指示之曰卿等若作賊吾政如此相殺也又北淯郡嘗有虎害大眼搏而獲之斬其頭懸於穰巿自是荊蠻相謂曰楊公惡人常作我蠻形以射之又深山之虎尚所不免遂不敢復為寇盜在州二年而卒大眼雖不學遣人讀書坐而聽之悉皆記識令作露布皆口授之而竟不多識字也有三子長甑生次領軍次征南皆潘氏所生氣幹咸有父風初大眼徙營州潘在洛陽頗有失行及為中山大眼側生女夫趙延寶言之於大眼大眼怒幽潘而殺之後娶繼室元氏大眼之死也甑生等問印綬所在時元始懷孕自指其腹謂甑生等曰開國當我兒襲之汝等婢子勿有所望甑生深以為恨及大眼喪將還京出城東七里營車而宿夜二更甑生等開大眼棺延寶怪而問之征南射殺之元怖走入水征南又彎弓射之甑生曰天下豈有害母之人乃止遂取大眼尸令人馬上抱之左右扶挾以叛荊人畏甑生等驍勇不敢苦追奔於襄陽遂歸蕭衍崔延伯博陵人也祖壽於彭城陷入江南延伯有氣力少以勇壯聞仕蕭賾為緣淮遊軍帶濠口戍主太和中入國高祖深嘉之常為統帥膽氣絶人兼有謀略所在征討咸立戰功積勞稍進除征虜將軍荊州刺史賜爵定陵男荊州土險蠻左為寇每有聚結延伯輒自討之莫不摧殄由是穰土帖然無敢為患永平中轉後將軍幽州刺史蕭衍遣其左遊擊將軍趙祖悅率衆偷據峽石詔延伯為別將與都督崔亮討之亮令延伯守下蔡延伯與別將伊生挾淮為營延伯遂取車輪去輞削鋭其輻兩兩接對揉竹為絙貫連相屬並十餘道橫水為橋兩頭施大轆轤出沒任情不可燒斫既斷祖悅等走路又令舟舸不通由是衍軍不能赴救祖悅合軍咸見俘虜於軍拜平南將軍光祿大夫延伯與楊大眼等至自淮陽靈太后幸西林園引見延伯等太后曰卿等志尚雄猛皆國之名將比平峽石公私慶快此乃卿等之功也但淮堰仍在宜須豫謀故引卿等親共量算各出一圖以為後計大眼對曰臣輒謂水陸二道一時俱下往無不克延伯曰臣今輒難大眼既對聖顏答旨宜實水南水北各有溝瀆陸地之計如何可前愚臣短見願聖心愍水兵之勤苦給復一年專習水戰脫有不虞召便可用往無不獲靈太后曰卿之所言深是宜要當敕如請二年除安北將軍并州刺史在州貪汙聞於遠近還為金紫光祿大夫出為鎮南將軍行岐州刺史假征西將軍賜驊騮馬一匹正光五年秋以往在揚州建淮橋之勳封當利縣開國男食邑二百戶尋增邑一百戶改封新豐進爵為子時莫折念生兄天生下隴東寇征西將軍元志為天生所擒賊衆甚盛進屯黑水詔延伯為使持節征西將軍西道都督與行臺蕭寶夤討之寶夤與延伯結壘馬嵬南北相去百餘步寶夤日集督將論討賊方略延伯每云賊新制勝難與爭鋒寶夤正色責之曰君荷國寵靈總戎出討便是安危所繫每云賊不可討以示怯懦損威挫氣乃君之罪延伯明晨詣寶夤自謝仍云今當仰為明公參賊勇怯延伯選精兵數千下渡黑水列陳西進以向賊營寶夤率衆於水東尋原西北以示後繼於時賊衆大盛水西一里營營連接延伯徑至賊壘揚威脅之徐而還退賊以延伯衆少開營競追衆過十倍臨水逼蹙寶夤親觀之懼有虧損延伯不與其戰身自殿後抽衆東渡轉運如神須臾濟盡徐乃自渡賊徒奪氣相率還營寶夤大悅謂官屬曰崔公古之關張也今年何患不制賊延伯馳見寶夤曰此賊非老奴敵公但坐看後日延伯勒衆而出寶夤為後拒天生悉衆來戰延伯申令將士身先士卒陷其前鋒於是勇鋭競進大破之俘斬十餘萬追奔及於小隴秦賊徑強諸將所憚朝廷初議遣將咸云非延伯無以定之果能克敵授右衛將軍於時万俟醜奴宿勤明達等寇掠涇川先是盧祖遷伊生數將等皆以元志前行之始同時發雍從六陌道將取高平志敗仍停涇部延伯既破秦賊乃與寶夤率衆會於安定甲卒十二萬鐵馬八千匹軍威甚盛醜奴置營涇州西北七十里當原城時或輕騎暫來挑戰大兵未交便示奔北延伯矜功負勝遂唱議先驅伐木別造大排內為鎖柱教習強兵負而趨走號為排城戰士在外輜重居中自涇州緣原北上衆軍將出討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師寶夤延伯謂其事實逡巡未閲俄而宿勤明達率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯上馬突陳賊勢摧挫便爾逐北徑造其營賊本輕騎延伯軍兼步卒兵力疲怠賊乃乘間得入排城延伯軍遂大敗死傷者將有二萬寶夤斂軍退保涇州延伯修繕器械購募驍勇復從涇州西進去賊彭抗谷柵七里結營延伯前挫辱不報寶夤獨出襲賊大破之俄頃間平其數柵賊皆逃遁見兵人採掠散亂不整還來衝突遂大奔敗延伯中流矢為賊所害士卒死者萬餘人延伯善將撫能得衆心與康生大眼為諸將之冠延伯末路功名尤重時大寇未平而延伯死朝野歎懼焉贈使持節車騎大將軍儀同三司定州剌史諡曰武烈又有王足者驍果多策略隸邢巒伐蜀所在克捷詔行益州刺史遂圍涪城蜀人大震世宗復以羊祉為益州足聞而引退後遂奔蕭衍次有王神念足之流也後自潁川太守奔江南又冀州人李叔仁叔仁弟龍瓌以勇壯為將統叔仁位至車騎大將軍儀同三司陳郡開國公後為梁州刺史歿於關西龍瓌正光中北征戰死白道其平州刺史王買奴南秦州刺史曹敬南兗州刺史樊魯益州刺史邴虬玄州刺史邢豹及屈祖嚴思達呂叵崔襲柴慶宗宗正珍孫盧祖遷高智方俱為將帥並有攻討之名而事迹不存無以編録然未若康生大眼延伯尤著也史臣曰人主聞鞞鼓之響則思將帥之臣何則夷難平暴折衝禦侮為國之所繫也康生等俱以熊虎之姿奮征伐之氣亦一時之驍猛壯士之功名也
