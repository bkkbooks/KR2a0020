body:
  text: 魏書卷八十七列傳節義第七十五于什門段進石文德汲固王玄威婁提劉渴侯朱長生于提馬八龍門文愛晁清劉侯仁石祖興邵洪哲王榮世胡小虎孫道登李几張安祖王閭大義重於至聞自日人慕之者蓋希行之者實寡至於輕生蹈節臨難如歸殺身成仁死而無悔自非耿介苦心之人鬱怏激氣之士亦何能若斯僉列之傳名節義云于簡字什門代人也太宗時為謁者使喻馮跋及至和龍住外舍不入使人謂跋曰大魏皇帝有詔須馮主出受然後敢入跋使人牽逼令入見跋不拜跋令人按其項什門曰馮主拜受詔吾自以賓主致敬何須苦見逼也與跋往復聲氣厲然初不撓屈既而跋止什門什門於羣衆之中回身背跋被袴後襠以辱之既見拘留隨身衣裳敗壞略盡蟣虱被體跋遺以衣服什門拒而不受和龍人皆歎曰雖古烈士無以過也歷二十四年後馮文通上表稱臣乃送什門歸拜治書侍御史世祖下詔曰什門奉使和龍值狂豎肆虐勇志壯厲不為屈節雖昔蘇武何以加之賜羊千口帛千匹進為上大夫策告宗廟頒示天下咸使聞也段進不知何許人也世祖初為白道守將蠕蠕大檀入塞圍之力屈被執進抗聲大罵遂為賊殺世祖愍之追贈安北將軍賜爵顯美侯諡曰莊石文德河中蒲坂人也有行義真君初縣令黃宣在任喪亡宣單貧無期親文德祖父苗以家財殯葬持服三年奉養宣妻二十餘載及亡又衰絰斂祔率禮無闕自苗逮文德刺史守令卒官者制服送之五世同居閨門雍睦又梁州上言天水白石縣人趙令安孟蘭彊等四世同居行著州里詔並標牓門閭汲固東郡梁城人也為兗州從事刺史李式坐事被收吏民皆送至河上時式子憲生始滿月式大言於衆曰程嬰杵臼何如人也固曰今古豈殊遂便潛還不復回顧徑來入城於式婦閨抱憲歸藏之及捕者收憲屬有一婢產男母以婢兒授之事尋泄固乃攜憲逃遁遇赦始歸憲即為固長育至十餘歲呼固夫婦為郎婆後高祐為兗州刺史嘉固節義以為主簿王玄威農北陝人也顯祖崩玄威立草廬於州城門外衰裳蔬粥哭踴無時刺史苟頹以事表聞詔令問狀玄威稱先帝統御萬國慈澤被於蒼生含氣之類莫不仰賴玄威不勝悲慕中心知此不知禮式詔問玄威欲有所訴聽為表列玄威云聞諱悲號竊謂臣子同例無所求謁及至百日乃自竭家財設四百人齋會忌日又設百僧供至大除日詔送白紬袴褶一具與玄威釋服下州令表異焉婁提代人也顯祖時為內三郎顯祖暴崩提謂人曰聖主升遐安用活為遂引佩刀自刺幾至於死文明太后詔賜帛二百匹時有敕勒部人蛭拔寅兄地于坐盜食官馬依制命死拔寅自誣己殺兄又云實非弟殺兄弟爭死辭不能定高祖詔原之劉渴侯不知何許人也禀性剛烈太和中為徐州後軍以力死戰衆寡不敵遂禽瞋目大罵終不降屈為賊所殺高祖贈立忠將軍平州刺史上庸侯賜絹千匹穀千斛有嚴季者亦為軍校尉與渴侯同殿勢窮被執終不降屈後得逃還除立節將軍賜爵五等男朱長生及于提並代人也高祖時以長生為員外散騎常侍與提俱使高車至其庭高車主阿伏至羅責長生等拜長生拒之曰我天子使安肯拜下土諸侯阿伏至羅乃不以禮待長生以金銀寶器奉之至羅既受獻長生曰為臣內附宜盡臣禮何得口云再拜而實不拜呼出帳命衆中拜阿伏至羅慚其臣下大怒曰帳中何不教我拜而辱我於大衆奪長生等獻物囚之叢石之中兵脅之曰汝能為我臣則活如其不降殺汝長生與于提瞋目厲聲責之曰豈有天子使人拜汝夷我寧為魏鬼不為汝臣至羅彌怒絕其飲食從行者三十人皆降至羅乃給以肉酪惟長生與提不從乃各分徙之積三歲乃得還高祖以長生等守節遠同蘇武甚嘉之拜長生河內太守于提隴西太守並賜爵五等男從者皆為令長馬八龍武邑武強人也輕財重義友人武遂縣尹靈哲在軍喪亡八龍聞即奔赴負屍而歸以家財殯葬為制緦服撫其孤遺恩如所生州郡表列詔表門閭門文愛汲郡山陽人也早孤供養伯父母以孝謹聞伯父亡服未終伯母又亡文愛居喪持服六年哀毀骨立鄉人魏中賢等相與標其孝義晁清遼東人也祖暉濟州刺史潁川公清襲祖爵例降為伯為梁城戍將蕭衍攻圍糧盡城陷清抗節不屈為賊所殺世宗褒美贈樂陵太守諡曰忠子榮賓襲劉侯仁豫州人也城人白早生殺刺史司馬悅據城南叛悅息朏走投侯仁賊雖重加購募又嚴其捶撻侯仁終無漏泄朏遂免禍事寧有司奏其操行請免府籍一小縣詔可石祖興常山九門人也太守田文彪縣令和真等喪亡祖興自出家絹二百餘匹營護喪事州郡表列高祖嘉之賜爵二級為上造後拜寧陵令卒吏部尚書李韶奏其節義請加贈諡以奬來者靈太后令如所奏有司諡曰恭邵洪哲上谷沮陽人也縣令范道榮先自朐城歸款以除縣令道榮鄉人徐孔明妄經公府訟道榮非勳道榮坐除名羇旅孤貧不能自理洪哲不勝義憤遂代道榮詣京師明申曲直經歷寒暑不憚劬勞道榮卒得復雪又北鎮反亂道榮孤單無所歸附洪哲兄伯川復率鄉人來相迎接送達幽州道榮感其誠節訴省申聞詔下州郡標其里閭王榮世陽平館陶人也為三城戍主方城縣子蕭衍攻圍力窮知不可全乃先焚府庫後殺妻妾及賊陷城與戍副鄧元興等俱以不屈被害肅宗下詔褒美忠節進榮世爵為伯贈齊州刺史元興開國子贈洛州刺史胡小虎河南河陰人也少有武氣正光末為統軍於晉壽孝昌中蕭衍將樊文熾等寇邊益州刺史邴虬遣長史和安固守小劍文熾圍之虬命小虎與統軍崔珍寶同往防拒文熾掩襲小虎珍寶並擒之文熾攻小劍未陷乃將珍寶至城下使謂和安曰南軍強盛北救不來豈若歸款取其富貴和安命射之乃退復逼小虎與和安交言小虎乃慷慨謂安曰我柵不防為賊所虜觀其兵士勢不足言努力堅守魏行臺傳梁州遣將已至賊以刀毆擊言不得終遂害之三軍無不歎其壯節哀其死亡賊尋奔敗禽其次將蕭世澄陳文緒等一十一人行臺魏子建壯其氣概啟以世澄購其屍柩乃獲骸骨歸葬孫道登彭城呂縣人也永安初為蕭衍將韋休等所虜面縛臨刃巡遠村塢令其招降鄉曲道登厲聲唱呼但當努力賊無所能賊遂屠戮之又荊州被圍行臺宗靈恩遣使宗女等四人入城曉喻為賊將所獲執女等巡城令其改辭女等大言天軍垂至堅守莫降賊忿各刳其腹然後斬首二州表其節義道登等並賜五品郡五等子爵聽子弟承襲遣使詣所在弔祭李几博陵安平人也七世共居同財家有二十二房一百九十八口長幼濟濟風禮著聞至於作役卑幼競進鄉里嗟美標其門閭張安祖河陽人也襲世爵山北侯時有元承貴曾為河陽令家貧且赴尚書求選逢天寒甚遂凍死路側一子年幼停屍門巷棺斂無託安祖悲哭盡禮買木為棺手自營作斂殯周給朝野嘉歎尚書聞奏標其門閭王閭北海密人也數世同居有百口又太山劉業興四世同居魯郡蓋儁六世同居並共財產家門雍睦鄉里敬異有司申奏皆標門閭史臣曰于什門等或臨危不撓視死如歸或赴險如夷惟義所在其大則光國隆家其小則損己利物故其盛烈所著與河海而爭流峻節所標共松栢而俱茂並蹈履之所致身歿名立豈徒然哉
