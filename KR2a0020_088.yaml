body:
  text: 魏書卷八十三上賀訥劉羅辰姚黃眉杜超賀迷閭毗馮熙李峻李惠夫右賢左戚尚德尊功有國者所以治天下也殷肇王基不藉莘氏為佐周成大業未聞姒姓為輔及於漢世外戚尤重殺身傾族相繼於兩京乃至移其鼎璽亂其邦國魏文深以為誡明帝尚封頑騃晉之楊駿尋至夷宗居上不以至公任物在下徒用私寵要榮繭犢引大車弱質任厚棟所謂愛之所以害之矣太祖初賀訥有部衆之業翼成皇祚其餘或以勞勤或緣恩澤咸序其迹舉外親之盛衰云爾賀訥代人太祖之元舅獻明后之兄也其先世為君長四方附國者數十部祖紇始有勳於國尚平文女父野干尚昭成女遼西公主昭成崩諸部乖亂獻明后與太祖及衛秦二王依訥會苻堅使劉庫仁分攝國事於是太祖還居獨孤部訥總攝東部為大人遷居大寧行其恩信衆多歸之侔於庫仁苻堅假訥鷹揚將軍後劉顯之謀逆太祖聞之輕騎北歸訥訥見太祖驚喜拜曰官家復國之後當念老臣太祖笑答曰誠如舅言要不忘也訥中弟染干粗暴忌太祖常圖為逆每為皇姑遼西公主擁護故染干不得肆其禍心於是諸部大人請訥兄弟求舉太祖為主染干曰在我國中何得爾也訥曰帝大國之世孫興復先業於我國中之福常相持奬立繼統勳汝尚異議豈是臣節遂與諸人勸進太祖登代王位于牛川及太祖討吐突鄰部訥兄弟遂懷異圖率諸部救之帝擊之大潰訥西遁衛辰遣子直力鞮征訥訥告急請降太祖簡精騎二十萬救之遂徙訥部落及諸弟處之東界訥又通於慕容垂垂以訥為歸善王染干謀殺訥而代立訥遂與染干相攻垂遣子麟討之敗染干於牛都破訥於赤城太祖遣師救訥麟乃引退訥從太祖平中原拜安遠將軍其後離散諸部分土定居不聽遷徙其君長大人皆同編戶訥以元舅甚見尊重然無統領以壽終於家訥弟盧亦從平中原以功賜爵遼西公太祖遣盧會衛王儀伐鄴而盧自以太祖之季舅不肯受儀節度太祖遣使責之盧遂忿恨與儀司馬丁建構成其嫌彌加猜忌會太祖敕儀去鄴盧亦引歸太祖以盧為廣川太守盧性雄豪居冀州刺史王輔下襲殺輔奔慕容德德以為并州刺史廣寧王廣固敗盧亦沒訥從父弟悅初太祖之居賀蘭部下人情未甚附唯悅舉部隨從又密為太祖祈禱天神請成大業出於誠至太祖嘉之甚見寵待後平中原以功賜爵巨鹿侯進爵北新公卒子泥襲爵後降為肥如侯太祖崩京師草草泥出舉烽於安陽城北賀蘭部人皆往赴之太宗即位乃罷詔泥與元渾等八人拾遺左右與北新侯安同持節行并定二州劾奏并州刺史元六頭等皆伏罪州郡肅然後從世祖征赫連昌以功進爵為琅邪公軍國大議每參預焉又征蠕蠕為別道將坐逐賊不進詐增虜級當斬贖為庶人久之拜光祿勳為外都大官復本爵卒於官子醜建襲劉羅辰代人宣穆皇后之兄也父眷為北部大人帥部落歸國羅辰有智謀謂眷曰從兄顯忍人也願早圖之眷不以為意後庫仁子顯殺眷而代立又謀逆及太祖即位討顯于馬邑追至彌澤大破之後奔慕容麟麟徙之中山羅辰率騎奔太祖顯恃部衆之強每謀為逆羅辰輒先聞奏以此特蒙寵念尋拜南部大人從平中原以前後勳賜爵永安公以軍功除征東將軍定州刺史卒諡曰敬子殊暉襲爵位并州刺史卒子求引位武衛將軍卒諡曰貞子爾頭位魏昌廮陶二縣令贈巨鹿太守子仁之自有傳姚黃眉姚興之子太宗昭哀皇后之弟也姚泓滅黃眉間來歸太宗厚禮待之賜爵隴西公尚陽翟公主拜駙馬都尉賜隸戶二百世祖即位遷內都大官後拜太常卿卒贈雍州刺史隴西王諡曰獻陪葬金陵黃眉寬和溫厚希言得失世祖悼惜之故贈有加禮杜超字祖仁魏郡鄴人密皇后之兄也少有節操泰常中為相州別駕奉使京師時以法禁不得與后通問始光中世祖思念舅氏以超為陽平公尚南安長公主拜駙馬都尉位大鴻臚卿車駕數幸其第賞賜巨萬神三年以超行征南大將軍太宰進爵為王鎮鄴追加超父豹鎮東大將軍陽平景王母曰巨鹿惠君真君五年超為帳下所害世祖臨其喪哀慟者久之諡曰威王長子道生賜爵城陽侯後為秦州刺史進爵河東公道生弟鳳皇襲超爵加侍中特進世祖追思超不已欲以鳳皇為定州刺史鳳皇不願違離闕庭乃止鳳皇弟道俊賜爵發干侯鎮枋頭除兗州刺史超既薨復授超從弟遺侍中安南將軍開府相州刺史入為內都大官進爵廣平王遺性忠厚頻歷州郡所在著稱薨贈太傅諡曰宣王長子元寶位司空元寶弟胤寶司隸校尉元寶又進爵京兆王及歸而父遺喪明當入謝元寶欲以表聞高宗未知遺薨怪其遲召之元寶將入時人止之曰宜以家憂自辭元寶欲見其寵不從遂冒哀而入未幾以謀反伏誅親從皆斬唯元寶子世衡逃免時朝議欲追削超爵位中書令高允上表理之後兗州故吏汲宗等以道俊遺愛在人前從坐受誅委骸土壤求得收葬書奏詔義而聽之贈散騎常侍安南將軍南康公諡曰昭世衡襲遺公爵賀迷代人從兄女世祖敬哀皇后皇后生恭宗初后少孤無父兄近親唯迷以從父故蒙賜爵長鄉子卒贈光祿大夫五原公閭毗代人本蠕蠕人世祖時自其國來降毗即恭皇后之兄也皇后生高宗高宗太安二年以毗為平北將軍賜爵河東公弟紇為寧北將軍賜爵零陵公其年並加侍中進爵為王毗征東將軍評尚書事紇征西將軍中都大官自餘子弟賜爵為王者二人公五人侯六人子三人同時受拜所以隆崇舅氏當世榮之和平二年追諡后祖父延定襄康公父辰定襄懿王毗薨贈太尉追贈毗妻河東王妃子惠襲紇薨贈司空子豆後賜名莊太和中初立三長以莊為定戶籍大使甚有時譽十六年例降爵後為七兵尚書卒紇弟染位外都大官冀州刺史江夏公卒先是高宗以乳母常氏有保護功既即位尊為保太后後尊為皇太后興安二年太后兄英字世華自肥如令超為散騎常侍鎮軍大將軍賜爵遼西公弟喜鎮東大將軍祠曹尚書帶方公三妹皆封縣君妹夫王睹為平州刺史遼東公追贈英祖父苻堅扶風太守亥為鎮西將軍遼西簡公勃海太守澄為侍中征東大將軍太宰遼西獻王英母許氏博陵郡君遣兼太常盧度世持節改葬獻王於遼西樹碑立廟置守冢百家太安初英為侍中征東大將軍太宰進爵為王喜左光祿大夫改封燕郡從兄泰為安東將軍朝鮮侯欣子伯夫散騎常侍選部尚書次子員金部尚書喜子振太子庶子三年英領太師評尚書事內都大官伏寶泰等州刺史五年詔以太后母宋氏為遼西王太妃和平元年喜為洛州刺史初英事宋不能謹而睹奉宋甚至就食於和龍無車牛宋疲不進睹負宋於笈至是宋於英等薄不如睹之篤謂太后曰何不王睹而黜英太后曰英為長兄門戶主也家內小小不順何足追計睹雖盡力故是他姓奈何在英上本州郡公亦足報耳天安中英為平州刺史欣為幽州刺史伯夫進爵范陽公英黷貨徙燉煌諸常自興安及至是皆以親疏受爵賜田宅時為隆盛後伯夫為洛州刺史以贓汙欺妄徵斬於京師承明元年徵英復官薨諡遼西平王始英之徵也夢日墜其所居黃山下水中村人以車牛挽致不能出英獨抱載而歸聞者異之後員與伯夫子禽可共為飛書誣謗朝政事發有司執憲刑及五族高祖以昭太后故罪止一門欣年老赦免歸家恕其孫一人扶養之給奴婢田宅其家僮入者百人金錦布帛數萬計賜尚書以下宿衛以上其女壻及親從在朝皆免官歸本鄉十一年高祖文明太后以昭太后故悉出其家前後沒入婦女以喜子振試守正平郡卒馮熙字晉昌長樂信都人文明太后之兄也祖文通語在海夷傳世祖平遼海熙父朗內徙官至秦雍二州刺史遼西郡公坐事誅文明太后臨朝追贈假黃鉞太宰燕宣王立廟長安熙生於長安為姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母攜熙逃避至氐羌中撫育年十二好弓馬有勇幹氐羌皆歸附之魏母見其如此將還長安始就博士學問從師受孝經論語好陰陽兵法及長游華陰河東二郡間性泛愛不拘小節人無士庶來則納之熙姑先入掖庭為世祖左昭儀妹為高宗文成帝后即文明太后也使人外訪知熙所在徵赴京師拜冠軍將軍賜爵肥如侯尚恭宗女博陵長公主拜駙馬都尉出為定州刺史進爵昌黎王顯祖即位為太傅纍拜內都大官高祖即位文明太后臨朝王公貴人登進者衆高祖乃承旨皇太后以熙為侍中太師中書監領袐書事熙以頻履師傅又中宮之寵為羣情所駭心不自安乞轉外任文明太后亦以為然於是除車騎大將軍開府都督洛州刺史侍中太師如故洛陽雖經破亂而舊三字石經宛然猶在至熙與常伯夫相繼為州廢毀分用大至頽落熙為政不能仁厚而信佛法自出家財在諸州鎮建佛圖精舍合七十二處寫一十六部一切經延致名德沙門日與講論精勤不倦所費亦不資而在諸州營塔寺多在高山秀阜傷殺人牛有沙門勸止之熙曰成就後人唯見佛圖焉知殺人牛也其北邙寺碑文中書侍郎賈元壽之詞高祖頻登北邙寺親讀碑文稱為佳作熙為州因事取人子女為奴婢有容色者幸之為妾有子女數十人號為貪縱後求入朝授內都大官太師如故熙事魏母孝謹如事所生魏母卒乃散髮徒跣水漿不入口三日詔不聽服熙表求依趙氏之孤高祖以熙情難奪聽服齊衰期後以例降改封京兆郡公高祖納其女為后曰白虎通云王所不臣數有三焉妻之父母抑言其一此所謂供承宗廟不欲奪私心然吾季著於春秋無臣證於往牒既許通體之一用開至尊之敬比長秋配極陰政既敷未聞有司陳奏斯式可詔太師輟臣從禮又勒集書造儀付外高祖前後納熙三女二為后一為左昭儀由是馮氏寵貴益隆賞賜纍巨萬高祖每詔熙上書不臣入朝不拜熙上書如舊熙於後遇疾綿寢四載詔遣醫問道路相望車駕亦數臨幸焉將遷洛高祖親與熙別見其困篤歔欷流涕密敕宕昌公王遇曰太師萬一即可監護喪事十九年薨於代車駕在淮南留臺表聞還至徐州乃舉哀為制緦服詔有司豫辨凶儀并開魏京之墓令公主之柩俱向伊洛凡所營送皆公家為備又敕代給綵帛前後六千匹以供凶用皇后詣代都赴哭太子恂亦赴代哭弔將葬贈假黃鉞侍中都督十州諸軍事大司馬太尉冀州刺史加黃屋左纛備九錫前後部羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威強恢遠曰武奉諡於公柩至洛七里澗高祖服衰往迎叩靈悲慟而拜焉葬日送臨墓所親作志銘主生二子誕修誕字思政修字寶業皆姿質妍麗年才十餘歲文明太后俱引入禁中申以教誡然不能習讀經史故兄弟並無學術徒整飾容儀寬雅恭謹而已誕與高祖同歲幼侍書學仍蒙親待尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王修侍中鎮北大將軍尚書東平公又除誕儀曹尚書知殿中事及罷庶姓王誕為侍中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官高祖立於庭遙受其拜既訖還室修降為侯誕與修雖並長宮禁而性趣乖別誕性淳篤修乃浮競誕亦未能誨督其過然時言於太后高祖嚴責之至於楚棰由是陰懷毒恨遂結左右有憾於誕者求藥欲因食害誕事覺高祖自詰之具得情狀誕引過謝乞全修命高祖以誕父老又重其意不致於法撻之百餘黜為平城百姓修妻司空穆亮女也求離婚請免官高祖引管蔡事皆不許高祖寵誕每與誕同輿而載同案而食同席坐臥彭城王協北海王詳雖直禁中然親近不及十六年以誕為司徒高祖既深愛誕除官日親為制三讓表并啓將拜又為其章謝尋加車騎大將軍太子太師十八年高祖謂其無師傅奬導風誕深自誨責從駕南伐十九年至鍾離誕遇疾不能侍從高祖日省問醫藥備加時高祖鋭意臨江乃命六軍發鍾離南轅與誕泣訣左右皆入無不掩涕時誕已惙然強坐視高祖悲而淚不能下言夢太后來呼臣高祖嗚咽執手而出遂行是日去鍾離五十里許昏時告誕薨問高祖哀不自勝時崔慧景裴叔業軍在中淮去所次不過百里高祖乃輕駕西還從者數千人夜至誕薨所撫尸哀慟若喪至戚達旦聲淚不絶從者亦迭舉音明告蕭鸞鍾離戍主蕭惠休惠休遣其太守奉慰詔求棺於城中及斂迭舉高祖以所服衣充襚親自臨視撤樂去膳宣敕六軍止臨江之駕高祖親北度慟哭極哀詔侍臣一人兼大鴻臚送柩至京禮物儀徐州備造陵兆葬事下洛候設喪至洛陽車駕猶在鍾離詔留守賜賻物布帛五千匹穀五千斛以供葬事贈假黃鉞使持節大司馬領司徒侍中都督太師駙馬公如故加以殊禮備錫九命依晉大司馬齊王攸故事有司奏諡詔曰案諡法善行仁德曰元柔克有光曰懿昔貞惠兼美受三諡之榮忠武雙徽錫兩號之茂式準前迹宜契具瞻既自少綢繆知之惟朕案行定名諡曰元懿帝又親為作碑文及挽歌詞皆窮美盡哀事過其厚車駕還京詔曰馮大司馬已就墳塋永潛幽室宿草之哭何能忘之遂親臨誕墓停車而哭使彭城王協詔羣官脫朱衣服單衣介幘陪哭司徒貴者示以朋友微者示如僚佐公主貞厚有禮度産二男長子穆穆字孝和襲熙爵避皇子愈封改扶風郡公尚高祖女順陽長公主拜駙馬都尉歷員外通直散騎常侍穆與叔輔興不和輔興亡贈相州刺史祖載在庭而穆方高車良馬恭受職命言宴滿堂欣笑自若為御史中尉東平王匡所劾後位金紫光祿大夫遇害河陰贈司空雍州刺史子冏字景昭襲爵昌黎王尋以庶姓罷王仍襲扶風郡公子峭字子漢齊受禪例降穆弟皓襲父誕長樂郡公修弟聿字寶興廢后同産兄也位黃門郎信都伯後坐妹廢免為長樂百姓世宗時卒於河南尹聿同産弟風幼養於宮文明太后特加愛念數歲賜爵至北平王拜太子中庶子出入禁闥寵侔二兄高祖親政後恩寵稍衰降爵為侯幽后立乃復用后死亦冗散卒贈青州刺史崔光之兼黃門也與聿俱直光每謂之曰君家富貴太盛終必衰敗聿云我家何負四海乃呪我也光云以古推之不可不慎時熙為太保誕司徒太子太傅修侍中尚書聿黃門廢后在位禮愛未弛是後歲餘修以罪棄熙誕喪亡后廢聿退時人以為盛必衰也李峻字珍之梁國蒙縣人元皇后兄也父方叔劉義隆濟陰太守高宗遣間使諭之峻與五弟誕嶷雅白永等前後歸京師拜峻鎮西將軍涇州刺史頓丘公雅嶷誕等皆封公位顯後進峻爵為王徵為太宰薨李惠中山人思皇后之父也父蓋少知名歷位殿中都官二尚書左將軍南郡公初世祖妹武威長公主故涼王沮渠牧犍之妻世祖平涼州頗以公主通密計助之故寵遇差隆詔蓋尚焉蓋妻與氏以是而出是後蓋加侍中駙馬都尉殿中都官尚書左僕射卒官贈征南大將軍定州刺史中山王諡曰莊惠弱冠襲父爵妻襄城王韓頽女生二女長即后也惠歷位散騎常侍侍中征西大將軍秦益二州刺史進爵為王轉雍州刺史征南大將軍加長安鎮大將惠長於思察雍州廳事有燕爭巢鬬已纍日惠令人掩獲試命綱紀斷之並辭曰此乃上智所測非下愚所知惠乃使卒以弱竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無留心羣下伏其聰察人有負鹽負薪者同釋重擔息於樹陰二人將行爭一羊皮各言藉背之物惠遣爭者出顧謂州綱紀曰此羊皮可拷知主乎羣下以為戲言咸無答者惠令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所察究多如此類由是吏民莫敢欺犯後為開府儀同三司青州刺史王如故歷政有美績惠素為文明太后所忌誣惠將南叛誅之惠二弟初樂與惠諸子同戮後妻梁氏亦死青州盡沒其家財惠本無釁故天下寃惜焉惠從弟鳳為定州刺史安樂王長樂主簿後長樂以罪賜死時卜筮者河間邢瓚辭引鳳云長樂不軌鳳為謀主伏誅惟鳳弟道念與鳳子及兄弟之子皆逃免後遇赦乃出太和十二年高祖將爵舅氏詔訪存者而惠諸從以再罹孥戮難於應命唯道念敢先詣闕乃申后妹及鳳兄弟子女之存者於是賜鳳子屯爵柏人侯安祖浮陽侯興祖安喜侯道念真定侯從弟寄生高邑子皆加將軍十五年安祖昆弟四人以外戚蒙見詔謂曰卿之先世內外有犯得罪於時然官必用才以親非興邦之選外氏之寵超於末葉從今已後自非奇才不得復外戚謬班抽舉既無殊能今且可還後例降爵安祖等改侯為伯並去軍號高祖奉馮氏過厚於李氏過薄舅家了無用朝野人士所以竊議太常高閭顯言于禁中及世宗寵隆外家並居顯位乃惟高祖舅氏存已不霑恩澤景明末特詔興祖為中山太守正始初詔追崇惠為使持節驃騎將軍開府儀同三司定州刺史中山公太常考行上言案諡法武而不遂曰莊諡曰莊公興祖自中山遷燕州刺史卒以兄安祖子侃晞為後襲先封南郡王後以庶姓罷王改為博陵郡公侃晞為莊帝所親幸拜散騎常侍嘗食典御帝之圖爾朱榮侃晞與魯安等持刀於禁內殺榮及莊帝蒙塵侃晞奔蕭衍
