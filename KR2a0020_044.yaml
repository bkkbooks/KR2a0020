body:
  text: 魏書卷三十九列傳第二十七李寶李寶字懷素小字衍孫隴西狄道人私署涼王皓之孫也父翻字士舉小字武彊私署驍騎將軍祁連酒泉晉昌三郡太守寶沉雅有度量驍勇善撫接伯父歆為沮渠蒙遜所滅寶徙於姑臧歲餘隨舅唐契北奔伊吾臣於蠕蠕其遺民歸附者稍至二千寶傾身禮接甚得其心衆皆樂為用每希報雪屬世祖遣將討沮渠無諱於敦煌無諱捐城遁走寶自伊吾南歸敦煌遂修繕城府規復先業遣弟懷達奉表歸誠世祖嘉其忠款拜懷達散騎常侍敦煌太守別遣使授寶使持節侍中都督西垂諸軍事鎮西大將軍開府儀同三司領護西戎校尉沙州牧敦煌公仍鎮敦煌四品以下聽承制假授真君五年因入朝遂留京師拜外都大官轉鎮南將軍并州刺史還除內都大官高宗初代司馬文思鎮懷荒改授鎮北將軍太安五年薨年五十三詔賜命服一襲贈以本官諡曰宣有六子承茂輔佐公業沖公業早卒沖別有傳承字伯業少有策略初寶欲謀歸款民僚多有異議承時年十三勸寶速定大計於是遂決仍令承隨表入質世祖深相器異禮遇甚優賜爵姑臧侯後遭父憂居喪以孝聞承應傳先封以自有爵乃讓弟茂時論多之承方裕有鑒裁為時所重高宗末以姑臧侯出為龍驤將軍滎陽太守為政嚴明甚著聲稱延興五年卒時年四十五贈使持節本將軍雍州刺史諡曰穆長子韶字元伯學涉有器量與弟彥虔蕤並為高祖賜名焉韶又為季父沖所知重延興中補中書學生襲爵姑臧侯除儀曹令時修改車服及羽儀制度皆令韶典焉遷給事黃門侍郎後例降侯為伯兼大鴻臚卿黃門如故高祖將創遷都之計詔引侍臣訪以古事韶對洛陽九鼎舊所七百攸基地則土中實均朝貢惟王建國莫尚於此高祖稱善遷太子右詹事尋罷左右仍為詹事秦州大中正出為安東將軍兗州刺史高祖自鄴還洛韶朝於路言及庶人恂事高祖曰卿若不出東宮或未至此世宗初徵拜侍中領七兵尚書尋除撫軍將軍并州刺史以從弟伯尚同元禧之逆在州禁止徵還京師雖不知謀猶坐功親免除官爵久之起兼將作大匠敕參定朝儀律令呂苟兒反於秦州除撫軍將軍西道都督行秦州事與右衛將軍元麗率衆討之事平即真璽書勞勉復其先爵時隴右新經師旅之後百姓多不安業韶善撫納甚得夷夏之心徵還行定州事尋轉相州刺史將軍如故肅宗初入為殿中尚書行雍州事後除中軍大將軍吏部尚書加散騎常侍韶在選曹不能平心守正通容而已議者貶之出為冀州刺史清簡愛民甚收名譽政績之美聲冠當時肅宗嘉之就加散騎常侍遷車騎大將軍賜劍佩貂蟬各一具驊騮馬一匹并衣服寢具韶以年及懸車抗表遜位優旨不許轉定州刺史常侍如故及赴中山冀州父老皆送出西境相聚而泣二州境既連接百姓素聞風德州內大治正光五年四月卒於官年七十二詔賵帛七百匹贈侍中持節散騎常侍車騎大將軍司空公雍州刺史諡曰文恭既葬之後有冀州兵千餘人戍於荊州還經韶墓相率培冢數日方歸其遺愛如此初韶克定秦隴永安中追封安城縣開國伯邑四百戶長子璵字道璠襲武定中驃騎大將軍東徐州刺史璵弟瑾字道瑜美容貌頗有才學特為韶所鍾愛清河王懌知賞之懌為司徒辟參軍轉著作佐郎加龍驤將軍稍遷通直散騎侍郎與給事黃門侍郎王遵業尚書郎盧觀典領儀注臨淮王彧謂瑾等曰卿等三俊共掌帝儀可謂舅甥之國王盧即瑾之外兄也肅宗崩上諡策文瑾所制也莊帝初於河陰遇害年四十九贈冠軍將軍齊州刺史長子産之字孫僑容貌短陋而撫訓諸弟愛友篤至年四十九亡産之弟蒨之武定末司空主簿瑾弟瓚字道璋少有風尚辟司徒參軍事神龜中卒贈漢陽太守子修年大將軍開府士曹參軍早亡韶弟彥字次仲頗有學業高祖初舉司州秀才除中書博士轉諫議大夫後因考課降為元士尋行主客曹事徙郊廟下大夫時朝儀典章咸未周備彥留心考定號為稱職高祖南伐彥以蕞爾江閩不足親勞鑾駕頻有表諫雖不從納然亦嘉其至誠及六軍次於淮南徵為廣陵王羽長史加恢武將軍西翼副將軍還除冀州趙郡王幹長史轉青州廣陵王羽長史帶齊郡太守徵為龍驤將軍司徒右長史轉左長史秦州大中正出行揚州事尋徵拜河南尹還至汝陰復敕行徐州事轉平北將軍平州刺史還平東將軍徐州刺史延昌二年夏大霖雨川瀆皆溢彥相水陸形勢隨便疏通得無淹漬之害朝廷嘉之頻詔勞勉入為河南尹遷金紫光祿大夫光祿勳卿轉度支尚書出為撫軍將軍秦州刺史是時破落汗拔陵等反於北鎮二夏豳涼所在蜂起而彥刑政過猛為下所怨城民薛珍劉慶杜超等因四方離叛遂潛結逆謀正光五年六月突入州門擒彥於內齊囚於西府推其黨莫折大提為帥遂害彥永安中追贈侍中驃騎大將軍司徒公雍州刺史諡曰孝貞子燮字德諧少有風望解褐司徒參軍著作佐郎司徒祭酒轉主簿卒贈輔國將軍太常少卿燮弟德廣終於中散大夫德廣弟德顯太尉行參軍稍遷散騎侍郎卒贈征虜將軍東秦州刺史德顯弟德明祕書郎彥弟虔字叔恭太和初為中書學生遷祕書中散轉冀州驃騎府長史太子中舍人世宗初遷太尉從事中郎出為清河太守屬京兆王愈反虔棄郡奔闕世宗聞虔至謂左右曰李虔在冀州日久恩信著物今拔難而來衆情自解矣乃授虔別領軍前慰勞事事平轉長樂太守延昌初冀州大乘賊起令虔以本官為別將與都督元遙討平之遷後將軍燕州刺史還為光祿大夫加平西將軍兼大司農卿出為散騎常侍安東將軍兗州刺史追論平冀州之功賜爵高平男還京除河南邑中正遷鎮軍將軍金紫光祿大夫孝莊初授特進車騎大將軍儀同三司加散騎常侍又進號驃騎大將軍開府儀同三司永安三年冬薨年七十四贈侍中都督冀定瀛三州諸軍事驃騎大將軍太尉公冀州刺史男如故諡曰宣景長子曖字仁明解褐司空行參軍稍遷尚書左外兵郎孝莊初於河陰遇害年四十贈安東將軍度支尚書青州刺史子褒武定中太師法曹參軍曖弟昞字仁曜起家高陽王雍常侍員外散騎侍郎太尉録事參軍孝莊初與兄曖同時遇害年三十八贈散騎常侍左將軍兗州刺史子為武定中司空長流參軍昞弟昭字仁照卒於散騎侍郎贈征虜將軍涼州刺史子士元操武定中並儀同開府參軍事昭弟曉字仁略武定末太尉咨議參軍虔弟蕤字延賓歷步兵校尉東郡太守司農少卿卒贈龍驤將軍豫州刺史長子詠字義興有幹局起家太學博士領殿中侍御史稍遷東郡太守莊帝初遷安東將軍濟州刺史轉廣州刺史加散騎常侍前廢帝時與第三弟通直散騎常侍義真第七弟中書侍郎太常少卿義雍同時為爾朱仲遠所害義雍莊帝居蕃之日以外親甚見親昵及有天下特蒙信任爾朱榮之誅義雍與其事由是並及於禍出帝初贈詠侍中驍騎將軍吏部尚書冀州刺史義真贈前將軍齊州刺史義雍贈安東將軍青州刺史詠次弟義慎司空屬第四弟義遠國子博士莊帝初並於河陰遇害義慎贈散騎常侍征東將車雍州刺史承弟茂字仲宗高宗末襲父爵鎮西將軍敦煌公高祖初除長安鎮都將轉西兗州刺史將軍如故入為光祿大夫例降為侯茂性謙慎以弟沖寵盛懼於盈遂託以老疾固請遜位高祖不奪其志聽食大夫祿還私第因居定州之中山自是優遊里舍不入京師景明三年卒時年七十一諡曰恭侯子靜字紹安襲解褐太尉參軍事定州別駕東平原太守神龜三年卒年五十五子遐字智遠有几案才起家司空行參軍襲爵稍遷右將軍尚書駕部郎中出為河內太守爾朱榮稱兵向洛次其郡境莊帝潛濟河北相會遐既聞榮推奉莊帝遂開門謁候仍從駕南渡及河陰為亂兵所害時年四十二事寧追贈散騎常侍車騎大將軍尚書右僕射秦州刺史以候駕之功封盧鄉縣開國伯邑三百戶子孝儒襲齊受禪爵例降靜弟孚字仲安恭順篤厚起家鎮北府功曹參軍定州別駕汝陽汝南中山三郡太守孝莊初以外親超授撫軍將軍金紫光祿大夫出除鎮東將軍滄州刺史加散騎常侍普泰元年卒年六十二有五子長子惠昭太傅開府城局參軍惠昭弟惠諶武定中齊州別駕孚弟敬安奉朝請早亡敬安弟季安粗涉書史解褐彭城王行參軍稍遷寧朔將軍步兵校尉出為徐州北海王皓撫軍府長史正光末皓為關西都督復引為長史委以戎政尋加驍騎將軍孝昌三年卒於軍時年五十三贈征虜將軍涼州刺史子處默少清惠起家青州彭城王府主簿稍遷通直散騎常侍安東將軍光祿大夫撫軍將軍廣州開府長史天平初卒年三十九茂弟輔字督真亦有人望解褐中書博士遷司徒議曹掾太和初高祖為咸陽王禧納其女為妃除鎮遠將軍潁川太守帶長社戍輔綏懷招集甚得邊和六年卒於郡年四十七贈征虜將軍秦州刺史襄武侯諡曰惠長子伯尚少有重名弱冠除祕書郎高祖每云此李氏之千里駒稍遷通直散騎侍郎敕撰太和起居注尋遷祕書丞世宗初兼給事黃門侍郎景明二年坐與咸陽王禧謀反誅時年二十九伯尚弟仲尚儀貌甚美少以文學知名二十著前漢功臣序讚及季父司空沖誄時兼侍中高聰尚書邢巒見而歎曰後生可畏非虛言也起家京兆王愈行參軍景明中坐兄事賜死年二十五仲尚弟季凱沉敏有識量坐兄事與母弟俱徙邊久之會赦免遂寓居於晉陽沉廢積年孝昌中解褐太尉參軍事加威遠將軍尋除并州安北府長史肅宗崩爾朱榮陰圖義舉季凱豫謀莊帝踐阼徵拜給事黃門侍郎封博平縣開國侯邑七百戶尋加散騎常侍平東將軍轉祕書監進號中軍將軍普泰元年七月爾朱世隆以榮之死謂季凱通知於是見害年五十五出帝初追贈侍中驃騎將軍吏部尚書定州刺史子統字基伯襲武定末太尉刑獄參軍齊受禪爵例降季凱弟延慶孝昌中解褐定州鎮北城局參軍稍遷奉車都尉陳留太守遷鎮東將軍金紫光祿大夫永熙二年卒年五十二贈本將軍雍州刺史子惠矩武定中儀同開府參軍事延慶弟延度武定中衛將軍安德太守輔弟佐字季翼有文武才幹高祖初兼散騎常侍銜命使高麗以奉使稱旨還拜常山太守賜爵真定子遷冠軍將軍懷州刺史賜爵山陽侯尋加安南將軍河內公轉安東將軍相州刺史所在有稱績車駕南討拜安南將軍副大司馬咸陽王禧為殿中將軍尋被敕與征南將軍城陽王鸞安南將軍盧淵等軍攻赭陽各不相節度諸軍皆坐甲城下欲以不戰降賊佐獨勒所部晨夜攻擊屬蕭鸞遣其太子右衛率垣歷生率衆來援咸以勢弱不敵規欲班師佐乃簡騎二千逆賊為賊所敗坐徙瀛州為民車駕征宛鄧復起佐假平遠將軍統軍蕭鸞新野太守劉忌憑城固守佐率所領攻拔之以功封涇陽縣開國子邑三百戶沔北既平廣陽王嘉為荊州刺史仍以佐為嘉鎮南府長史加輔國將軍別鎮新野及大軍凱旋高祖執佐手曰沔北洛陽南門卿既為朕平之亦當為朕善守高祖崩遺敕以佐行荊州事仍本將軍佐在州威信大行邊民悅附前後歸之者二萬許家尋正刺史世宗初徵兼都官尚書景明二年卒年七十一贈征虜將軍秦州刺史諡曰莊子遵襲遵爽俊有父風歷相州治中轉別駕冀州征北府長史司空司馬卒贈龍驤將軍洛州刺史孝莊初以外戚超贈車騎大將軍儀同三司定州刺史子果襲司空咨議參軍武定中坐通西賊伏誅遵弟柬字休賢郡辟功曹以父憂去職遂終身不食酒肉因屏居鄉里肅宗初司空任城王澄嘉其操尚以為參軍事尋轉司徒外兵參軍歷任城濟北二郡太守孝莊初遷鎮遠將軍濟州刺史卒贈安北將軍殿中尚書相州刺史子經司徒咨議參軍行豫州事興和初坐妖言賜死柬弟神俊小名提少以才學知名為太常劉芳所賞釋褐奉朝請轉司徒祭酒從事中郎頃之拜驍騎將軍中書侍郎太常少卿出為前將軍荊州刺史時四方多事所在連兵蕭衍遣將曹敬宗來寇攻圍積時又引水灌城城不沒者數版神俊循撫兵民戮力固守詔遣都督崔暹別將王羆裴衍等赴援敬宗退走時寇賊之後城外多有露骸神俊教令收葬之徵拜大司農卿肅宗末除鎮軍將軍行相州事於時葛榮南逼神俊憂懼乃故墜馬傷腳仍停汲郡有詔追還莊帝纂統以神俊外戚之望拜散騎常侍殿中尚書追論固守荊州之功封千乘縣開國侯邑一千戶轉中書監吏部尚書神俊意尚風流情在推引人物而不能守正奉公無多聲譽有巨鹿人李炎上書言神俊之失天柱將軍爾朱榮曾補人為曲陽縣令神俊以階縣不用榮聞大怒謂神俊自樹親黨排抑勳人神俊懼啓求解官乃除衛將軍右光祿大夫尋屬爾朱兆入京乘輿幽執神俊遂逃竄民間出帝初始來歸闕拜散騎常侍驃騎大將軍左光祿大夫儀同三司孝靜初行并州事尋除驃騎大將軍肆州刺史入為侍中興和二年薨年六十四贈都督雍秦涇三州諸軍事驃騎大將軍尚書左僕射司徒公雍州刺史侍中開國公如故神俊風韻秀舉博學多聞朝廷舊章及人倫氏族多所諳記篤好文雅老而不輟凡所交遊皆一時名士汲引後生為其光價四方才子咸宗附之而性通率不持檢度至於少年之徒皆與褻狎不能清正方重識者以此為譏神俊喪二妻又欲娶鄭嚴祖妹神俊之從甥也盧元明亦將為婚遂至紛競二家鬩於嚴祖之門鄭卒歸元明神俊惆悵不已時人謂神俊鳳德之衰神俊無子從弟延度以第三子容兒後之韶從弟元珍小名大墨起家奉朝請太尉録事參軍卒於步兵校尉元珍弟仲遵有業尚彭城王協為定州請為開府參軍纍轉員外散騎常侍游擊將軍太中大夫出為京兆內史大將軍京兆王繼西伐請為咨議參軍尋除左將軍營州刺史時四方州鎮謀逆叛亂相續營州城內咸有異心仲遵單車赴州既至與大使盧同以恩信懷誘率皆怡悅後肅宗又詔盧同為行臺北出慰勞同疑彼人情難信聚兵將往城民劉安定等先有異志謂欲圖己還相恐動遂執仲遵二子清石阿罕尋亦見殺唯兄子徽仁得免韶從叔思穆字叔仁父抗自涼州渡江左仕劉駿歷晉壽安東東萊三郡太守思穆有度量善談論工草隸為當時所稱太和十七年攜家纍自漢中歸國除步兵校尉遭母憂解任起為都水使者及車駕南伐以本官兼直閣將軍從平南陽以功賜爵為伯尋除司徒司馬彭城王協為定州請為司馬帶巨鹿太守協徙鎮揚州仍請為司馬府解除征虜將軍太中大夫出為京兆內史在郡八年頗有政績徵拜光祿大夫肅宗初除平北將軍中山太守未拜遷安北將軍營州刺史卒於位時年六十一贈安西將軍華州刺史永安中子奬為莊帝所親待復超贈思穆衛將軍中書監左光祿大夫諡曰宣惠有子十四人嫡子斌襲官至散騎侍郎早卒斌兄奬武定末司徒左長史李氏自初入魏人位兼舉因沖寵遇遂為當世盛門而仁義吉凶情禮淺薄期功之服殆無慘容相視窘乏不加拯濟識者以此貶之史臣曰李寶家難流離晚獲歸正大享名器世業不殞諸子承基俱有位望韶清身履度聲績洽美矣神俊才尚風流殆民望也貞粹之地君子或未許焉
