body:
  text: 魏書卷四十七列傳第三十五盧玄盧玄字子真范陽涿人也曾袓諶晉司空劉琨從事中郎袓偃父邈並仕慕容氏為郡太守皆以儒雅稱神四年辟召儒俊以玄為首授中書博士司徒崔浩玄之外兄每與玄言輒歎曰對子真使我懷古之情更深浩大欲齊整人倫分明姓族玄勸之曰夫創制立事各有其時樂為此者詎幾人也宜其三思浩當時雖無異言竟不納浩敗頗亦由此後轉寧朔將軍兼散騎常侍使劉義隆義隆見之與語良久歎曰中郎卿曾袓也既還病卒子度世字子遷幼而聰達有計數為中書學生應選東宮弱冠與從兄遐俱以學行為時流所重度世後以崔浩事棄官逃於高陽鄭羆家羆匿之使者囚羆長子將加捶楚羆戒之曰君子殺身以成人汝雖死勿言子奉父命遂被考掠至乃火爇其體因以物故卒無所言度世後令弟娶羆妹以報其恩世袓臨江劉義隆使其殿中將軍黃延年朝貢世袓問延年曰范陽盧度世坐與崔浩親通逃命江表應已至彼延對曰都下無聞當必不至世袓詔東宮赦度世宗族逃亡及籍沒者度世乃出赴京拜中書侍郎襲爵興安中兼太常卿立保太后父遼西獻王廟加鎮遠將軍進爵為侯後除散騎侍郎使劉駿遣其侍中柳元景與度世對接度世應對失衷還被禁劾經年乃釋除假節鎮遠將軍齊州刺史州接邊境將士數相侵掠度世乃禁勒所統還其俘虜二境以寧後坐事囚繫久之還鄉里尋徵赴京除平東將軍青州刺史未拜遇患延興元年卒年五十三諡曰惠侯四子淵敏昶尚初玄有五子嫡唯度世餘皆別生崔浩事難其庶兄弟常欲危害之度世常深忿恨及度世有子每誡約令絶妾孽不得使長以防後患至淵兄弟婢賤生子雖形貌相類皆不舉接為識者所非淵字伯源小名陽烏性溫雅寡欲有袓父之風敦尚學業閨門和睦襲侯爵拜主客令典屬國遷祕書令始平王師以例降爵為伯給事黃門侍郎遷兼散騎常侍祕書監本州大中正是時高祖將立馮后方集朝臣議之高祖先謂淵曰卿意以為何如對曰此自古所慎如臣愚意宜更簡卜高祖曰以先后之姪朕意已定淵曰雖奉敕如此然於臣心實有未盡及朝臣集議執意如前馮誕有盛寵深以為恨淵不以介懷及高祖議伐蕭賾淵表曰臣誠識不周覽頗尋篇籍自魏晉以前承平之世未有皇輿親御六軍決勝行陳之間者勝不足為武弗勝有虧威德明千鈞之弩不為鼷鼠發機故也昔魏武以弊卒一萬而袁紹土崩謝玄以步兵三千而苻堅瓦解勝負不由衆寡成敗在於須臾若用田豐之謀則坐制孟德矣魏既并蜀迄于晉世吳介有江水居其上流大小勢殊德政理絶然猶君臣協謀垂數十載逮孫皓暴戾上下攜爽水陸俱進一舉始克今蕭氏以篡殺之燼政虐役繁又支屬相屠人神同棄吳會之民延踵皇澤正是齊軌之期一同之會若大駕南巡必左袵革面閩越倒戈其猶運山壓卵有征無戰然愚謂萬乘親戎轉漕難繼千里饋糧士有飢色大軍之後必有凶年不若命將簡鋭蕩滌江右然後鳴鸞巡省告成東嶽則天下幸甚率土戴賴臣又聞流言關右之民自比年以來競設齋會假稱豪貴以相扇惑顯然於衆坐之中以謗朝廷無上之心莫此之甚愚謂宜速懲絶戮其魁帥不爾懼成黃巾赤眉之禍育其微萌不芟之毫末斧斤一加恐蹈害者衆臣世奉皇家義均休戚誠知干忤之愆實深然不忠之罪莫大詔曰至德雖一樹功多途三聖殊文五帝異律或張或弛豈必相因遠惟承平之主所主不親旆五戎者蓋有由矣英明之主或以同軌無征守庸之君或緣志劣寢伐今若喻之英皇時非昔類比之庸后意有恧焉脫元極之尊本不宜駕二公之徒革輅之戎寧非謬歟尋夫昔人若必須己而濟世豈不克廣先業也定火之雄未聞不武世袓之行匪皆疑懾且曹操勝袁蓋由德義內舉苻堅瓦解當緣立政未至定非弊卒之力強十萬之衆寡也今則驅馳先天之術駕用仁義之師審觀成敗庶免斯咎長江之阻未足可憚踰紀之略何必可師洞庭彭蠡竟非殷固奮臂一呼或成漢業經略之義當付之臨機足食之籌望寄之蕭相將希混一豈好輕動利見之事何得委人也又水旱之運未必由兵堯湯之難詎因興旅頗豐之後雖靜有之關左小紛已敕禁勒流言之細曷足以紆天功深録誠心勿恨不相遂耳及車駕南伐趙郡王幹督關右諸軍事詔加淵使持節安南將軍為副勒衆七萬將出子午尋以蕭賾死停師是時涇州羌叛殘破城邑淵以步騎六千衆號三萬徐行而進未經三旬賊衆逃散降者數萬口唯梟首惡餘悉不問詔兼侍中初淵年十四嘗詣長安將還諸相餞送者五十餘人別於渭北有相者扶風人王伯達曰諸君皆不如此盧郎雖位不副實然德聲甚盛望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言平生未幾拜儀曹尚書高祖考課在位降淵以王師守常侍尚書奪常侍祿一周尋除豫州刺史以母老固辭會蕭昭業雍州刺史曹虎遣使請降乃以淵為使持節安南將軍督前鋒諸軍徑赴樊鄧淵面辭曰臣本儒生頗聞俎豆軍旅之事未之學也惟陛下裁之軍期已逼高祖不許淵曰但恐曹虎為周魴耳陛下宜審之虎果偽降淵至葉具曹虎譎詐之問兼陳其利害詔淵進取南陽淵以兵少糧乏表求先攻赭陽以近葉倉故也高祖許焉乃進攻赭陽蕭鸞遣將垣歷生來救淵素無將略為賊所敗坐免官爵為民尋遭母憂高祖遣謁者詣宅宣慰服闋兼太尉長史高祖南討又兼彭城王中軍府長史尋為徐州京兆王愈兼長史賜絹百匹愈既年少事無巨細多決於淵淵以誠信御物甚得東南民和南徐州刺史沈陵密謀外叛淵覺其萌漸潛敕諸戍微為之備屢有表聞朝廷不納陵果殺將佐勒宿豫之衆逃叛濱淮諸戍由備得全陵在邊歷年陰結既廣二州人情咸相扇惑陵之餘黨頗見執送淵皆撫而赦之惟歸罪於陵由是衆心乃安景明初除祕書監二年卒官年四十八贈安北將軍幽州刺史復本爵固安伯諡曰懿初諶父志法鍾繇書傳業纍世世有能名至邈以上兼善草迹淵習家法代京宮殿多淵所題白馬公崔玄伯亦善書世傳衛瓘體魏初工書者崔盧二門淵與僕射李沖特相友善沖重淵門風而淵祗沖才官故結為婚姻往來親密至於淵荷高祖意遇頗亦由沖淵有八子長子道將字祖業應襲父爵而讓其第八弟道舒有司奏聞詔曰長嫡承重禮之大經何得輒授也而道將引清河王國常侍韓子熙讓弟仲穆魯陽男之例尚書李平重申奏詔乃聽許道將涉獵經史風氣謇諤頗有文才為一家後來之冠諸父並敬憚之彭城王協任城王澄皆虛襟相待協為中軍大將軍辟行參軍遷司徒東閣祭酒尚書左外兵郎中轉祕書丞出為燕郡太守道將下車表樂毅霍原之墓而為之立祠優禮儒生勵勸學業敦課農桑墾田歲倍入為司徒司馬卒贈龍驤將軍太常少卿諡曰獻所為文筆數十篇子懷祖太學博士員外散騎侍郎卒懷祖弟懷仁武定中太尉鎧曹參軍道將弟亮字仁業不仕而終子思道亮弟道裕字寧祖少以學尚知名風儀兼美尚顯祖女樂浪長公主拜駙馬都尉太子舍人尋轉洗馬遷散騎侍郎轉安遠將軍中書侍郎兼祕書丞尋以母憂去官服終復拜中書侍郎遷龍驤將軍太子中庶子幽州大中正轉長兼散騎侍郎加左將軍神龜二年除左將軍涇州刺史其年七月卒官年四十四贈撫軍將軍青州刺史賜帛三百匹諡曰文侯子景緒武定中儀同開府録事參軍道裕弟道虔字慶祖粗間經史兼通算術尚高祖女濟南長公主公主驕淫聲穢遐邇先無疹患倉卒暴薨時云道虔所害世宗祕其醜惡不苦窮治尚書嘗奏道虔為國子博士靈太后追主薨事乃黜道虔為民終身不仕孝昌末臨淮王彧因將出征啓除道虔奉車都尉道虔外生李彧尚莊帝姊豐亭公主因相藉託永安中除輔國將軍通直常侍尋加征虜將軍以議曆勳賜爵臨淄伯遷散騎常侍天平初征南將軍轉都官尚書本州大中正出除驃騎將軍幽州刺史尋加衛大將軍卒於官贈都督幽瀛二州諸軍事驃騎大將軍尚書右僕射司空公瀛州刺史諡曰恭文公主二子昌宇昌仁昌宇不慧昌仁早卒道虔又娶司馬氏有子昌裕及司馬見出之後更娉元氏生二子昌期昌衡兄弟競父爵至今未襲道虔弟道侃字希祖州主簿沉雅有學尚孝昌末卒二子早夭以弟道約子正達為後武定中征虜將軍太尉記室參軍道侃弟道和字叔維兄弟之中人望最下冀州中軍府中兵參軍卒子景豫景豫弟景熙武定中儀同開府咨議道和弟道約字季恭起家員外郎纍遷司空録事參軍司徒屬幽州大中正輔國將軍光祿大夫轉司徒右長史太傅李延實出除青州延實先被病道約延實之妻弟詔以道約為延實長史加散騎常侍寄以匡維也永熙中車騎將軍左光祿大夫領廣平王贊儀同開府長史天平中開府儀同高嶽請為長史嶽轉除青冀二州道約仍為長史隨嶽兩藩有毗佐之稱興和末除衛大將軍兗州刺史在州頗得民和武定元年卒年五十八贈使持節驃騎大將軍儀同三司幽州刺史子正通開府咨議少有令譽徵赴晉陽遇患卒妻鄭氏與正通弟正思淫亂武定中為御史所劾人士疾之道約弟道舒字幼安襲父爵自尚書左主客郎中為冠軍將軍中書侍郎卒淵弟敏字仲通小字紅崖少有大量太和初拜議郎早卒贈威遠將軍范陽太守諡曰靖高祖納其女為嬪敏五子義僖字遠慶早有學尚識度沉雅年九歲喪父便有至性少為僕射李沖所歎美起家祕書郎歷太子舍人司徒中郎神龜初任城王澄奏舉義僖除散騎侍郎轉冠軍將軍中散大夫以母憂去職幽州刺史王誦與義僖交款每與舊故李神俊等書曰盧冠軍在此時復惠好輒留連數日得咨詢政道其見重若此齊王蕭寶夤啓為開府咨議參軍辭疾不赴尋兼司空長史拜征虜將軍太中大夫散秩多年淡然自得李神俊勸其干謁當途義僖曰學先王之道貴行先王之志何能苟求富貴也孝昌中除散騎常侍時靈太后臨朝黃門侍郎李神軌勢傾朝野求結婚姻義僖慮其必敗拒而不許王誦謂義僖曰昔人不以一女易五男卿豈易之也義僖曰所以不從正為此耳從之恐禍大而速誦乃堅握義僖之手曰我聞有命不敢以告人遂適他族臨婚之夕靈太后遣中常侍服景就家敕停內外惶怖義僖夷然自若建義初兼都官尚書尋除安東將軍衛尉卿普泰中除都官尚書加驃騎大將軍左光祿大夫義僖少時幽州頻遭水旱先有穀數萬石貸民義僖以年穀不熟乃燔其契州閭悅其恩德性寬和畏慎不妄交款與魏子建情好尤篤言無所隱義僖性清儉不營財利雖居顯位每至困乏麥飯蔬食欣然甘之永熙中風疾頓發興和中卒年六十四贈本將軍儀同三司瀛州刺史諡孝簡子遜之武定中太尉記室參軍遜之弟世猷齊王開府集曹參軍義僖弟義悰字叔預司空行參軍本州治中散騎侍郎司徒咨議參軍子孝章儀同開府行參軍早亡義悰弟義敦字季和征北府默曹參軍子景開字子達武定中儀同開府屬義敦弟義安字幼仁不仕義僖諸弟並遠不逮兄也敏弟昶字叔達小字師顏學涉經史早有時譽太和初為太子中舍人兼員外散騎常侍使於蕭昭業高祖詔昶曰卿便至彼勿存彼我密邇江揚不早當晚會是朕物卿等欲言便無相疑難又敕副使王清石曰卿莫以本是南人言語致慮若彼先有所知所識欲見便見須論即論盧昶正是寬柔君子無多文才或主客命卿作詩可率卿所知莫以昶不作便復罷也凡使人之體以和為貴勿遞相矜誇見於色貌失將命之體卿等各率所知以相規誨及昶至彼值蕭鸞僭立於是高祖南討之昶兄淵為別道將而蕭鸞以朝廷加兵遂酷遇昶等昶本非骨鯁聞南人云兄既作將弟為使者乃大恐怖淚汗交橫鸞以腐米臭魚莝豆供之而謁者張思寧辭氣謇諤曾不屈撓遂以壯烈死於館中昶還高祖責之曰銜命之禮有死無辱雖流放海隅猶宜抱節致殞卿不能長纓羇首已是可恨何乃俯眉飲啄自同犬馬有生必死修短幾何卿若殺身成名貽之竹素何如甘彼芻菽以辱君父乎縱不遠慚蘇武寧不近愧思寧昶對曰臣器乏陸隨忝使閩越屬蕭鸞昏狂誅戮無道恐不得仰奉明時歸養老母苟存尺蠖屈以求伸負辱朝命罪宜萬死乞歸司寇伏聽斧鉞遂見罷黜久之復除彭城王友轉祕書丞景明初除中書侍郎遷給事黃門侍郎本州大中正昶請外祿世宗不許遷散騎常侍兼尚書時洛陽縣獲白鼠昶奏曰謹案瑞典外鎮刺史二千石令長不祗上命刻暴百姓人民怨嗟則白鼠至臣聞禎不虛見德合必符妖不妄出咎彰則至是以古之人君或怠瑞以失德或祗變而立功斯乃萬古之殷鑒千齡之炯誡比者災氣作沴陽虧度陛下流如傷之慈降納隍之旨哀百姓之無辜引在豫之深責舉賢黜佞之詔道映於堯先進思納諫之言事光於舜右伏讀明旨俯觀徵譴敢布庸瞽以陳萬一竊惟一夫之耕食裁充口一婦之織衣止蔽形年租歲調則惟常理此外徵求於何取足然自比年以來兵革屢動荊揚二州屯戍不息鍾離義陽師旅相繼兼荊蠻凶狡王師薄伐暴露原野經秋淹夏汝潁之地率戶從戎河冀之境連丁轉運又戰不必勝加之退負死喪離曠十室而九細役煩徭日月滋甚苛兵酷吏因逞威福至使通原遙畛田蕪罕耘連村接閈蠶飢莫食而監司因公以貪求豪強恃私而逼掠遂令鬻裋褐以益千金之資制口腹而充一朝之急此皆由牧守令長多失其人郡闕黃霸之君縣無魯恭之宰不思所以安民正思所以潤屋故士女呼嗟相望於道路守宰暴貪風聞於魏闕往歲法官案驗多挂刑網謂必顯戮以明勸誡然後遣使覆訊公違憲典或承風挾請輕樹私恩或容情受賄輒施己惠御史所劾皆言誣枉申雪罪人更云清白長侮上之源滋陵下之路忠清之人見之而自怠犯暴之夫聞之以益快白鼠之至信而有徵矣伏願陛下垂睿哲之鑒察妖災之起延對公卿廣詢庶政引見樞納博求民隱存問孤寡去其苛碎輕徭省賦與民休息貞良忠讜置之於朝姦回貪佞棄之於市則九官勿戒而敬百縣不嚴而自肅士女欣欣人有望矣詔曰朕纂承鴻緒伏膺寶曆思靖八方惠康四海當必世之期麟鳳不降屬勝殘之會白鼠告咎萬邦有罪實唯朕躬尚書敷納機猷獻替是寄讜言有聞朕實嘉美轉侍中又兼吏部尚書尋即正仍侍中昶守職而已無所激揚也與侍中元暉等更相朋附為世宗所寵時論鄙之出除鎮東將軍徐州刺史永平四年夏昶表曰蕭衍琅邪郡民王萬壽等款誠內結潛來詣臣云朐山戍今將交換有可圖之機臣即許以旌賞遣其還入至三月二十四夜萬壽等奬率同盟攻掩朐城斬衍輔國將軍琅邪東莞二郡太守帶朐山戍主劉晣并將士四十餘人傳首至州臣即遣兼郯城戍副張天惠率驍勇二百徑往赴之琅邪諸戍絡繹繼援而衍郁洲已遣二軍以拒天惠天惠與萬壽等內外齊擊俘斬數百便即據城詔昶曰彭宋地接邊疆勢連淮海威禦之術功在不易朐山險塞寇之要防水陸交湊揚郁路衝畜聚凶徒虔劉邊鄙青光齊兗每罹其患卿妙算既敷克城殄衆展疆闢土何善如之庸勳之懋朕用嘉止故遣左右直長閻遵業具宣往懷此戍郁洲之本存亡所繫今既失守有不存之心彼見扼喉將圖救援之計今水雨盛行宜須防守卿可深思擬捍之規攘敵之略使還具聞昶又表蕭衍將張稷馬仙琕陰虔和等各領精兵分屯諸堰昌義之張惠紹王神念王茂光承彼傳信續發建鄴自存之計并歸於此量力準寇事恐不輕何者此兵九千賊衆四萬名將健士遠近畢集邀憑雨熱決死來戰藉衆乘凶希固巢穴所以傾國而舉非為朐山將恐王師固六里據湖衝南截淮浦勢崩難測海利鹽物交闕常貢所慮在大有必爭之心若皇家經略方有所討必須簡將增兵加益糧仗與之亢擬相持至秋天麾一動開拓為易圖南之計事本在今請增兵六千米十萬石如其不也伏聽朝議昶又表賊徒大集衆旅強盛置柵朐山屯守門井并圍固城晝夜連戰恐狡勢既強後難除揃輒欲令征虜將軍趙遐率勒見兵與之決勝遐慮衆少不敵若一舉失利則衆心挫怯求待大衆俱至奮鋭擊之竊謂此謀非為孟浪且臣本奉朝規令相拒守以待涼月今歲已云秋高風漸舉經算大圖時事既至且鮑口以東陸運無閡朐固之間本無停潦宜時掩擊邊陲而賊自夏以來貫甲不歇從六里以北城柵相連役使兵人便已疲殆若大衆臨之必可禽捷一城退潰衆壘土崩乘勝圖之易於振朽脫兵不速至長彼熾心軍士憂惶自生異議請速簡配以及事機詔曰克獲朐山計本於昶乘勝之規終宜有寄是以起兵之始即委處分前機經略一以任之今既請兵理宜速遂可遣冀定瀛相四州中品羽林虎賁四千人赴之又詔昶曰朐山之克實由於卿開疆拓土實為長策然經討未服非卿而誰而蟻徒送死規侵王略天亡小賊數在無遠故前者命卿親臨指授尋以卿疾未瘳且待消息今既痊復宜遵前旨秉戈揮鋭殄寇為懷已發虎旅五萬應機電赴指辰而至遂卿本請截彼東南亮委高算又詔昶曰取朐置戍並是卿計始終成敗悉歸於卿卿以兵少請益今已遂卿本意如聞東唐陸道甚狹一軌之外皆是大水彼必據之以斷軍路若已如此更設何策其軍奇兵變遽以表聞又聞衍軍將帥每有流言云魏博淮陽宿豫乃是兩宜若實有此卿可量朐山薪水得支幾時脫事容往返馳驛速聞如薪水少急即可量計若理不可爾亦將軍裁決昶既儒生本少將略又羊祉子燮為昶司馬專任戎事掩昶耳目將士怨之朐山戍主傅文驥糧樵俱罄以城降衍昶見城降於是先走退諸軍相尋奔遁遇大寒雪軍人凍死及落手足者三分而二自國家經略江左唯有中山王英敗於鍾離昶於朐山失利最為甚焉世宗遣黃門甄琛馳驛鎖昶窮其敗狀詔曰朐山之敗傷損實深推始究末罪鍾元帥雖經大宥輕重宜別昶一人可以免官論坐自餘將統以下悉聽依赦復任未幾拜太常卿仍除安西將軍雍州刺史又進號鎮西將軍加散騎常侍熙平元年卒於官贈征北將軍冀州刺史諡曰穆昶寬和矜恕善於綏撫其在徐州戍兵疾親自檢恤至番兵年滿不歸容充後役終昶一政然後始還人庶稱之子元聿字仲訓無他才能尚高祖女義陽長公主拜駙馬都尉位太尉司馬光祿大夫卒贈中書監子士晟儀同開府掾元聿第五弟元明字幼章涉歷羣書兼有文義風彩間潤進退可觀永安初長兼尚書令臨淮王彧欽愛之及彧開府引為兼屬仍領部曲出帝登阼以郎任行禮封城陽縣子遷中書侍郎永熙末居洛東緱山乃作幽居賦焉於時元明友人王由居潁川忽夢由攜酒就之言別賦詩為贈及明憶其詩十字云自茲一去後市朝不復遊元明歎曰由性不狎俗旅寄人間乃今有夢又復如此必有他故經三日果聞由為亂兵所害尋其亡日乃是得夢之夜天平中兼吏部郎中副李諧使蕭衍南人稱之還拜尚書右丞轉散騎常侍監起居積年在史館了不厝意又兼黃門郎本州大中正元明善自標置不妄交遊飲酒賦詩遇興忘返性好玄理作史子新論數十篇文筆別有集録少時常從鄉還洛途遇相州刺史中山王熙熙博識之士見而歎曰盧郎有如此風神唯須誦離騷飲美酒自為佳器遂留之數日贈帛及馬而別元明凡三娶次妻鄭氏與元明兄子士啓淫汙元明不能離絶又好以世地自矜時論以此貶之元明弟元緝字幼緒凶率好酒曾於婦氏飲宴小有不平手刃其客起家祕書郎轉司徒祭酒稍遷輔國將軍司徒司馬卒於官贈散騎常侍都督幽瀛二州諸軍事驃騎大將軍吏部尚書幽州刺史諡曰宣子士深開府行參軍昶弟尚之字季儒小字羡夏亦以儒素見重太和中拜議郎轉趙郡王征東咨議參軍母憂去官後為太尉主簿司徒屬范陽太守章武內史兼司徒右長史加冠軍將軍轉左長史出為前將軍濟州刺史入除光祿大夫正光五年卒年六十二贈散騎常侍安東將軍青州刺史長子文甫字元祐少有器尚涉歷文史有譽於時位司空參軍年四十九卒子敬舒有文學早亡文甫弟文翼字仲祐少甚輕躁晚頗改節為員外郎因歸鄉里永安中為都督守范陽三城拒賊帥韓婁有功賜爵范陽子永熙中除右將軍太中大夫栖遲桑井而卒年六十子士偉興和中中散大夫子翼弟文符字叔僖性通率位員外郎羽林監尚書主客郎中遷通直散騎侍郎永安中卒年四十子子潛武定中齊文襄王中外府中兵參軍度世李氏之甥其為濟州也國家初平升城無鹽房崇吉母傅氏度世繼外祖母兄之子婦也兗州刺史申纂妻賈氏崇吉之姑女也皆亡破軍途老病憔悴而度世推計中表致其恭恤每覲見傅氏跪問起居隨時奉送衣被食物亦存賑賈氏供其服膳青州既陷諸崔墜落多所收贖及淵昶等並循父風遠親疏屬為尊行長者莫不畢拜致敬閨門之禮為世所推謙退簡約不與世競父母亡然同居共財自祖至孫家內百口在洛時有飢年無以自贍然尊卑怡穆豐儉同之親從昆弟常旦省謁諸父出坐別室至暮乃入朝府之外不妄交遊其相勗以禮如此又一門三主當世以為榮淵兄弟亡及道將卒後家風衰損子孫多非法帷薄混穢為論者所鄙度世從祖弟神寶中書博士太和中高祖為高陽王雍納其女為妃初玄從祖兄溥慕容寶之末總攝鄉部屯於海濱遂殺其鄉姻諸祖十餘人稱征北大將軍幽州刺史攻掠郡縣天興中討禽之事在帝紀溥玄孫洪字曾孫太和中歷中書博士稍遷高陽王雍鎮北府咨議參軍幽州中正樂陵陽平二郡太守洪三子長子崇字元禮少立美名有識者許之以遠大景明中驃騎府法曹參軍早卒子子剛司空行參軍荊州驃騎府主簿沒於關中崇弟仲義小名黑知名於世高陽王雍司空行參軍員外散騎侍郎幽州別駕弟三子叔矩字子規武定中尚書郎子規弟子正司徒法曹參軍崇兄弟官雖不達至於婚姻常與玄家齊等仲義弟幹字幼禎州主簿子讓儀同開府參軍洪弟光宗子觀觀弟仲宣事在文苑傳仲宣弟叔虎武定初司徒咨議參軍洪從弟附伯附伯弟侍伯並有學識附伯位至滄州平東府長史侍伯永熙中衛大將軍南岐州刺史侍伯從弟文偉興和中驃騎大將軍青州刺史大夏縣開國男史臣曰盧玄緒業著聞首應旌命子孫繼迹為世盛門其文武功烈殆無足紀而見重於時聲高冠帶蓋德業儒素有過人者淵之兄弟亦有二方之風流雅道家聲諸子不逮餘烈所被弗及盈乎
