body:
  text: 魏書卷八十五列傳文苑第七十三袁躍裴敬憲盧觀封肅邢臧裴伯茂邢昕溫子升夫文之為用其來日久自昔聖達之作賢哲之書莫不統理成章蘊氣標致其流廣變諸非一貫文質推移與時俱化淳于出齊有雕龍之目靈均逐楚著嘉禍之章漢之西京馬揚為首稱東都之下班張為雄伯曹植信魏世之英陸機則晉朝之秀雖同時並列分途爭遠永嘉之後天下分崩夷狄交馳文章殄滅昭成太祖之世南收燕趙網羅俊逮高祖馭天鋭情文學蓋以頡頏漢徹掩踔曹丕氣韻高豔才藻獨構衣冠仰止咸慕新風肅宗歷位文雅大盛學者如牛毛成者如麟角孔子曰才難不其然乎袁躍字景騰陳郡人尚書翻弟也博學俊才性不矯俗篤於交友翻每謂人曰躍可謂我家千里駒也釋褐司空行參軍歷位尚書都兵郎中加員外散騎常侍將立明堂躍乃上議當時稱其博洽蠕蠕主阿那瓌亡破來奔朝廷矜之送復其國既而每使朝貢辭旨頗不盡禮躍為朝臣書與瓌陳以禍福言辭甚美後遷車騎將軍太傅清河王懌文學雅為懌所愛賞懌之文表多出於躍卒贈冠軍將軍吏部郎中所制文集行於世無子兄翻以子聿修繼聿修字叔德七歲遭喪居處禮若成人九歲州辟主簿性深沉有鑒識清靖寡欲與物無競姨夫尚書崔休深所知賞年十八領本州中正兼尚書度支郎中齊受禪除太子庶子以本官行博陵太守裴敬憲字孝虞河東聞喜人也益州刺史宣第二子少有志行學博才清撫訓諸弟專以讀誦為業淡於榮利風氣俊遠郡徵功曹不就諸府辟命先進其弟世人歎美之司州牧高陽王雍舉秀才射策高第除太學博士性和雅未嘗失色於人工隸草解音律五言之作獨擅於時名聲甚重後進共宗慕之中山王將之部朝賢送於河梁賦詩言別皆以敬憲為最其文不能贍逸而有清麗之美少有氣病年三十三卒人物甚悼之敬憲世有仁義於鄉里孝昌中蜀賊陳雙熾所過殘暴至敬憲宅輒相約束不得焚燒為物所伏如此永興三年贈中書侍郎諡曰文盧觀字伯舉范陽涿人也少好學有俊才舉秀才射策甲科除太學博士著作佐郎與太常少卿李神俊光祿大夫王誦等在尚書上省撰定朝儀拜尚書儀曹郎中孝昌元年卒封肅字元雍勃海人尚書回之兄子也早有文思博涉經史太傅崔光見而賞焉位太學博士修起居注兼廷尉監為還園賦其辭甚美正光中京兆王西征引為大行臺郎中委以書記還除尚書左中兵郎中卒肅性恭儉不妄交遊唯與崔勵勵從兄鴻尤相親善所製文章多亡失存者十餘卷邢臧字子良河間人光祿少卿虬長孫也幼孤早立操尚博學有藻思年二十一神龜中舉秀才問策五條考上第為太學博士正光中議立明堂臧為裴頠一室之議事雖不行當時稱其理博出為本州中從事雅為鄉情所附永安初徵為金部郎中以疾不赴轉除東牟太守時天下多事在職少能廉白臧獨清慎奉法吏民愛之隴西李延實莊帝之舅以太傅出除青州啓臧為屬領樂安內史有惠政後除濮陽太守尋加安東將軍臧和雅信厚有長者之風為時人所愛敬為特進甄琛行狀世稱其工與裴敬憲盧觀兄弟並結交分曾共讀回文集臧獨先通之撰古來文章并作者氏族號曰文譜未就病卒時賢悼惜之其文筆凡百餘篇贈鎮北將軍定州刺史諡曰文子恕涉學有識悟裴伯茂河東人司空中郎叔義第二子少有風望學涉羣書文藻富贍釋褐奉朝請大將軍京兆王繼西討引為鎧曹參軍南討絳蜀陳雙熾為行臺長孫承業行臺郎中承業還京師留伯茂仍知行臺事以平薛鳳賢等賞平陽伯再遷散騎常侍典起居注太昌初為中書侍郎永熙中出帝兄子廣平王贊盛選賓僚以伯茂為文學後加中軍大將軍伯茂好飲酒頗涉疏傲久不徙官曾為豁情賦其序略曰余攝養舛和服餌寡術自春徂夏三嬰湊疾雖桐君上藥有時致效而草木下性實縈襟抱故復究覽莊生具體齊物物我兩忘是非俱遣斯人之達吾所師焉故作是賦所以託名豁情寄之風謠矣天平初遷鄴又為遷都賦文多不載二年因內宴伯茂侮慢殿中尚書章武王景哲景哲遂申啓稱伯茂棄其本列與監同行以梨擊案傍汙冠服禁庭之內令人挈衣詔付所司後竟無坐伯茂先出後其伯仲規與兄景融別居景融貧窘伯茂了無賑恤殆同行路世以此貶薄之卒年三十九知舊歎惜焉伯茂末年劇飲不已乃至傷性多有愆失未亡前數日忽云吾得密信將被收掩乃與婦乘車西逃避後因顧指壁中言有官人追逐其妻方知其病卒後殯於家園友人常景李渾王元景盧元明魏季景李騫等十許人於墓傍置酒設祭哀哭涕泣一飲一酹曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏收亦與之友寄以示收收時在晉陽乃同其作論伯茂其十字云臨風想玄度對酒思公榮時人以伯茂性侮傲謂收詩頗得事實贈散騎常侍衛將軍度支尚書雍州刺史重贈吏部尚書諡曰文伯茂曾撰晉書竟未能成無子兄景融以第二子孝才繼邢昕字子明河間人尚書巒弟偉之子幼孤見愛於祖母李氏好學早有才情蕭寶夤以車騎大將軍開府討關中以子明為東閣祭酒委以文翰在軍解褐蕩寇將軍纍遷太尉記室參軍吏部尚書李神俊奏昕修起居注太昌初除中書侍郎加平東將軍光祿大夫時言冒竊官級為中尉所劾免官乃為述躬賦未幾受詔與祕書監常景典儀注事出帝行釋奠禮昕與校書郎裴伯茂等俱為録義永熙末昕入為侍讀與溫子升魏收參掌文詔遷鄴乃歸河間天平初與侍中從叔子才魏季景魏收同徵赴都尋還鄉里既而復徵時蕭衍使兼散騎常侍劉孝儀等來朝貢詔昕兼正員郎迎於境上司徒孫騰引為中郎尋除通直常侍加中軍將軍既有才藻兼長几案自孝昌之後天下多務世人競以吏工取達文學大衰司州中從事宋遊道以公斷見知時與昕嘲謔昕謂之曰世事同知文學外遊道有慚色興和中以本官副李象使於蕭衍昕好忤物人謂之牛是行也談者謂之牛象鬬於江南齊文襄王攝選擬昕為司徒右長史未奏遇疾卒士友悲之贈車騎將軍都官尚書冀州刺史諡曰文所著文章自有集録溫子升字鵬舉自云太原人晉大將軍嶠之後也世居江左祖恭之劉義隆彭城王義康戶曹避難歸國家于濟陰寃句因為其郡縣人焉家世寒素父暉兗州左將軍府長史行濟陰郡事子升初受學於崔靈恩劉蘭精勤以夜繼晝晝夜不倦長乃博覽百家文章清婉為廣陽王淵賤客在馬坊教諸奴子書作侯山祠堂碑文常景見而善之故詣淵謝之景曰頃見溫生淵怪問之景曰溫生是大才士淵由是稍知之熙平初中尉東平王匡博召辭人以充御史同時射策者八百餘人子升與盧仲宣孫搴等二十四人為高第於時預選者爭相引決匡使子升當之皆受屈而去搴謂人曰朝來靡旗亂轍者皆子升逐北遂補御史時年二十二臺中文筆皆子升為之以憂去任服闋還為朝請後李神俊行荊州事引兼録事參軍被徵赴省神俊表留不遣吏部郎中李奬退表不許曰昔伯瑜之不應留王朗所以發歎宜速遣赴無踵彥雲前失於是還省正光末廣陽王淵為東北道行臺召為郎中軍國文翰皆出其手於是才名轉盛黃門郎徐紇受四方表啓答之敏速於淵獨沉思曰彼有溫郎中才藻可畏高車破走珍實盈滿子升取絹四十匹及淵為葛榮所害子升亦見羈執榮下都督和洛興與子升舊識以數十騎潛送子升得達冀州還京李楷執其手曰卿今得免足使夷甫慚德自是無復宦情閉門讀書厲精不已建義初為南主客郎中修起居注曾一日不直上黨王天穆時録尚書事將加捶撻子升遂逃遁天穆甚怒奏人代之莊帝曰當世才子不過數人豈容為此便相放黜乃寢其奏及天穆將討邢杲召子升同行子升未敢應天穆謂人曰吾欲收其才用豈懷前忿也今復不來便須南走越北走胡耳子升不得已而見之加伏波將軍為行臺郎中天穆深加賞之元皓入洛天穆召子升問曰即欲向京師為隨我北渡對曰主上以虎牢失守致此狼狽元皓新入人情未安今往討之必有征無戰王若克復京師奉迎大駕桓文之舉也捨此北渡竊為大王惜之天穆善之而不能用遣子升還洛皓以為中書舍人莊帝還宮為皓任使者多被廢黜而子升復為舍人天穆每謂子升曰恨不用卿前計除正員郎仍舍人及帝殺爾朱榮也子升預謀當時赦詔子升詞也榮入內遇子升把詔書問是何文書子升顏色不變曰敕榮不視之爾朱兆入洛子升懼禍逃匿永熙中為侍讀兼舍人鎮南將軍金紫光祿大夫遷散騎常侍中軍大將軍後領本州大中正蕭衍使張皋寫子升文筆傳於江外衍稱之曰曹植陸機復生於北土恨我辭人數窮百六陽夏太守傅標使吐谷渾見其國主牀頭有書數卷乃是子升文也濟陰王暉業嘗云江左文人宋有顏延之謝靈運梁有沈約任昉我子升足以陵顏轢謝含任吐沈楊遵彥作文德論以為古今辭人皆負才遺行澆薄險忌唯邢子才王元景溫子升彬彬有德素齊文襄王引子升為大將軍府咨議參軍子升前為中書郎嘗詣蕭衍客館受國書自以不修容止謂人曰詩章易作逋峭難為文襄館客元僅曰諸人當賀推子升合陳辭子升久忸怩乃推陸操焉及元僅劉思逸荀濟等作亂文襄疑子升知其謀方使之作獻武王碑文既成乃餓諸晉陽獄食弊襦而死棄尸路隅沒其家口太尉長史宋遊道收葬之又為集其文筆為三十五卷子升外恬靜與物無競言有準的不妄毀譽而內深險事故之際好預其間所以終致禍敗又撰永安記三卷無子史臣曰古之人所貴名不朽者蓋重言之尚存又加之以才名其為貴顯固其宜也自餘或位下人微居常亦何能自達及其靈蛇可握天網俱頓並編緗素咸貫儒林雖其位可下其身可殺千載之後貴賤一焉非此道也孰云能致凡百士子可不務乎
