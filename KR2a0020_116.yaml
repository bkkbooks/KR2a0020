body:
  text: 魏書卷一百六上地形志二上第五夏書禹貢周氏職方中畫九州外薄四海析其物土制其疆域此蓋王者之規摹也戰國分并秦吞海內割裂都邑混一華夷漢興即其郡縣因而增廣班固考地理馬彪志郡國魏世三分晉又一統地道所載又其次也自劉淵石勒傾覆神州僭逆相仍五方淆亂隨所跨擅長更相侵食彼此不犬牙未足論繡錯莫能比魏定燕趙遂荒九服夷翦逋偽一國一家遺之度外吳蜀而已正光已前時惟全盛戶口之數比夫晉之太康倍而已矣孝昌之際亂離尤甚代而北盡為丘墟崤潼已西煙火斷絶齊方全趙死如亂麻於是生民耗減且將大半永安末年胡賊入洛官司文簿散棄者多往時編戶全無追訪今録武定之世以為志焉州郡創改隨而注之不知則闕內史及相仍代相沿魏自明莊寇難紛糾攻伐既廣啓土逾衆王公錫社一地纍封不可備舉故總以為郡其淪陷諸州戶據永熙綰籍無者不録焉司州治鄴城魏武帝國於此太祖天興四年置相州天平元年遷都改領郡十二縣六十五戶三十七萬一千六百七十五口一百四十五萬九千八百三十五魏尹故魏郡漢高祖置二漢屬冀州晉屬司州天興中屬相州天平初改為尹領縣十三戶一十二萬二千六百一十三口四十三萬八千二十四鄴二漢晉屬天平初併蕩陰安陽屬之蕩陰太和中置關今罷有西門豹祠武城牖里城蕩城石竇堰有南部右部西部尉天平中決漳水為萬金渠今世號天平渠臨漳天平初分鄴併內黃斥丘肥鄉置有鼓山肥鄉城邯鄲城斥丘城列人城鸕陂林臺澤有左部東部北部尉繁陽二漢屬晉屬頓丘真君六年併頓丘太和十九年復天平二年屬治繁陽城列人前漢屬廣平後漢屬晉屬廣平天平初屬昌樂太和二十一年分魏置永安元年置郡天平中罷郡復有昌城武安二漢屬晉屬廣平天平初屬臨水晉屬廣平真君六年併鄴太和二十一年復屬魏二漢晉屬平邑天平二年分元城置易陽二漢屬趙國晉屬廣平天平初屬有易陽城元城二漢屬晉屬陽平天平初屬有沙鹿山斥章前漢屬廣平後漢屬巨鹿晉屬廣平真君三年併列人太和二十年復天平初屬貴鄉天平二年分館陶置治趙城有東中郎將治有空陵城關城陽平郡魏文帝黃初二年分魏置治館陶城領縣八戶四萬七千四百四十四口一十六萬二千七十五館陶二漢屬魏郡晉屬有館陶城清淵二漢屬魏郡晉屬有清淵城樂平二漢屬東郡晉屬前漢清縣後漢章帝更名治樂平城發干二漢屬東郡晉屬有發干城臨清太和二十一年置武城永安中置天平元年罷二年復有武城武陽二漢晉屬東郡曰東武陽後改屬陽平二漢屬東郡晉屬永嘉後併樂平太和二十一年復屬有陽平城岡城趙簡子陵武溝水白馬淵廣平郡漢武帝為平干國宣帝改為廣平國後漢建武中省屬巨鹿魏文帝黃初二年復改治曲梁城領縣六戶二萬三千七百五十口一十萬三千四百三平恩二漢屬魏郡晉屬治平恩城有康臺澤曲安景明中分平恩置治曲安城邯鄲二漢屬趙國晉屬後屬魏真君六年屬有紫山廣平前漢屬後漢屬巨鹿晉屬後罷太和二十年復治廣平城曲梁前漢屬後漢屬魏晉屬廣年前漢屬後漢屬巨鹿晉屬永嘉後廢太和二十年復治廣年城汲郡晉武帝置治枋頭領縣六戶二萬九千八百八十三口一十萬二千九百九十七北修武孝昌中分南修武置治清陽城有清陽泉馬泉丁公神育河陶河尉斗泉覆釜山五里泉七里尉馬鳴泉重泉郡戒安陽城南修武二漢屬河內晉屬有黃家吳城宜陽城汲二漢屬河內晉屬後罷太和十二年復治汲城有比干墓太公廟陳城興和二年農人率戶歸國仍置義州於城中朝歌二漢屬河內晉屬有朝歌城崔方城大方山淇水白溝水天井溝苑城新城伏羲祠山陽二漢晉屬河內後屬有沁陽城南北二武陽城孝景二年置郡初治共城後移治山陽城尋罷獲嘉二漢屬河內晉屬後省太和二十三年復治新洛城有獲嘉城廣宗郡太和十一年立尋罷孝昌中復領縣三戶一萬三千二百六十二口五萬五千八百九十七廣宗後漢屬巨鹿晉屬安平中興中立南北廣宗尋罷後屬有廣宗城建始城建德城武強真君三年併信都太和二十二年復有武城經後漢晉屬安平真君二年併南宮後復屬東郡秦置治滑臺城晉改為濮陽後復天興中置兗州太和十八年改領縣七戶三萬五百二十一口一十萬七千七百一十七東燕二漢屬晉屬濮陽後屬有燕城堯祠伍子胥祠平昌孝昌二年分白馬置治平昌城白馬二漢屬晉屬濮陽後屬有朝溝白馬樊城凡豪城涼城有涼城南中城西王母祠酸棗二漢晉屬陳留後屬有酸棗城肺山白沙淵望氣臺五馬淵長垣二漢晉屬陳留後屬真君八年併外黃景明三年復有平丘城匡城蒲城子路祠長垣城衛靈公祠龍城長樂武泰初分涼城置有盤北廣平郡永安中分廣平置領縣三戶一萬六千六百九十一口九萬一千一百四十八南和前漢屬廣平後漢屬巨鹿晉屬後併任太和二十年復有左陽亭沙陵南和城一名嘉和城安豐城任前漢屬廣平後漢屬巨鹿晉屬有廣平鄉城宛鄉城豐城張相祠襄國秦為信都項羽更名二漢屬趙國晉屬後併任太和二十年復有襄國城林慮郡永安元年置領縣四戶一萬三千八百二十一口五萬二千三百七十二林慮二漢屬河內晉屬汲郡前漢名隆慮後漢避殤帝名改焉真君六年併鄴太和二十一年復有陵陽河東流為洹臨淇天平初分朝歌林慮共縣置有王莽嶺源河東流為淇有黎川祜柏嶺黎城淇城共二漢屬河內晉屬汲天平中屬有星城凡城卓水陂柏門山桓門水南流名太清水有簷山白鹿山魏德天平二年分朝歌置有纍山冷泉頓丘郡晉武帝置領縣四戶一萬七千二十二口八萬七千六十三頓丘太和中併汲郡餘民在畿外者景明中置有魚陽澤帝顓頊冢帝嚳冢衛國二漢屬東郡晉屬漢曰觀後漢光武改有衛國城衛康叔冢子路冢蒯聵冢孔悝冢衛輒冢衛靈公冢武鄉城臨黃真君三年併衛國太和十九年復有宮城黃城衛新臺昌鄉水陰安二漢屬魏郡晉屬真君三年併衛國太和十九年復有陰安城審食其冢濮陽郡晉置天興中屬兗州太和十一年屬齊州孝昌末又屬西兗天平初屬領縣四戶一萬八千六百六十四口五萬五千五百一十二廩丘前漢屬東郡後漢屬濟陰晉屬有羊角哀左伯桃冢管公明冢濮陽二漢屬東郡晉屬城陽二漢晉屬濟陰後屬有瓠子河雷澤鄄城二漢屬濟陰晉屬黎陽郡孝昌中分汲郡置治黎陽城領縣三戶一萬一千九百八十口五萬四百五十七黎陽二漢晉屬魏郡後罷孝昌中復屬有黎陽山東黎永安元年分黎陽置頓丘二漢屬東郡晉屬頓丘太和十八年屬汲後屬永安元年分入內黃天平中罷清河郡漢高帝置領縣四戶二萬六千三十三口一十二萬三千六百七十清河二漢晉屬前漢曰厝後漢安帝改為甘陵晉改有河城貝丘二漢晉屬侯城太和十三年置有侯城武城二漢晉曰東武城屬後改有武城有暗閣定州太祖皇始二年置安州天興三年改領郡五縣二十四戶一十七萬七千五百一口八十三萬四千二百七十四中山郡漢高帝置景帝三年改為國後改領縣七戶五萬二千五百九十二口二十五萬五千二百四十一盧奴州郡治二漢屬世祖神中置新城宮有焉卿城樂陽城上曲陽前漢屬常山後漢屬晉屬常山真君七年併新市景明元年復屬有平樂城有山嘉山黑山堯山黃山魏昌二漢晉屬前漢曰苦陘後漢章帝改為漢昌魏文帝改有魏昌城安城新市二漢晉屬有藺相如冢義臺城新市城毋極二漢屬晉罷太和十二年復治毋極城有新城廉臺安喜二漢晉屬前漢曰安險後漢章帝改有天井澤安喜城趙堯祠唐二漢晉屬有左人城寡婦城唐水狼山祠常山郡漢高帝置曰山郡文帝諱改為常山後漢建武中省真定郡屬焉孝章建初中為淮陽永元二年復領縣七戶五萬六千八百九十口二十四萬八千六百二十二九門二漢晉屬有常山城九門城有安樂壘燕趙神受陽壘明臺神真定前漢屬真定國後漢晉屬故東垣漢高帝十一年改有趙朔祠行唐二漢晉曰南行唐屬後改太和十四年置唐郡二十一年罷郡立熙平中移犢乾城治唐城蒲吾二漢晉屬有嘉陽城靈壽二漢晉屬有所山西王母祠慈水井陘二漢晉屬有回星城石邑前漢屬後漢罷晉復屬有石邑城巨鹿郡秦置後漢建武中省廣平國屬焉領縣三戶二萬七千一百七十二口一十三萬二百三十九曲陽二漢晉屬趙國曰下曲陽後改有臨平城真鄉城曲鄉城有堯祠青丘城前漢屬真定後漢屬晉罷太和十二年復有肥壘鄡二漢晉屬有鄡城安定城有西門趙君神有青丘牛丘黃丘馳丘靈丘博陵郡漢桓帝置領縣四戶二萬七千八百一十二口一十三萬五千七十饒陽前漢屬涿後漢屬安平晉屬有魯口城博陵城三良神饒陽城安平前漢屬涿後漢屬安平晉屬治安平城有樓女貴人神深澤前漢屬涿後漢屬安平晉屬二漢晉曰南深澤後改有女蝸神祠安國二漢屬中山晉屬真君七年併深澤景明二年復有鹽石淵安國城北平郡孝昌中分中山置治北平城領縣三戶一萬三千三十四口六萬五千一百二蒲陰二漢晉屬中山前漢曰曲逆章帝改名有蒲陰城安國城安陽赤泉神北平二漢晉屬中山有北平城木門城望都二漢晉屬中山有高昌城朝陽城伊祁山有堯神孫山冀州後漢治高邑袁紹曹操為冀州治鄴魏晉治信都晉世邵續治厭次慕容垂治信都皇始二年平信都仍置領郡四縣二十一戶一十二萬五千六百四十六口四十六萬六千六百一長樂郡漢高帝置為信都郡景帝二年為廣川國明帝更名樂成安帝改曰安平晉改領縣八戶三萬五千六百八十三口一十四萬三千一百四十五堂陽前漢屬巨鹿後漢晉屬安平國後屬有荊丘棗強前漢屬清河後漢罷晉復屬廣川神瑞二年併廣川太和二十二年復屬有棗城扶柳前漢屬後漢晉屬安平國真君三年併堂陽景明元年復索盧晉屬廣川神瑞二年併廣川太和二十二年復屬有索盧城廣川前漢屬後漢屬清河晉屬廣川後屬南宮前漢屬後漢晉屬安平後屬信都二漢晉屬有武陽城安城辟陽城下博二漢晉屬勃海郡漢高帝置世祖初改為滄水郡太和二十一年復領縣四戶三萬七千九百七十二口一十四萬四百八十二南皮二漢晉屬有勃海城東光二漢晉屬修前漢晉屬號修後改有董仲舒祠安陵晉置屬武邑郡晉武帝置領縣五戶二萬九千七百七十五口一十四萬四千五百七十九武遂前漢屬河間後漢晉屬安平後屬阜城前漢屬勃海後漢屬安平晉屬勃海後屬有弓高城灌津前漢屬信都後漢晉屬安平後屬有竇氏冢武邑前漢屬信都後漢晉屬安平後屬武強神光二年併武邑太和十八年復有武強淵安德郡太和中置尋併勃海中興中復領縣四戶二萬二千二百一十六口六萬八千三百九十六平原二漢晉屬平原真君三年併鬲太和二十一年復屬勃海後屬安德二漢晉屬平原後屬勃海後屬繹幕二漢晉屬清河真君三年併武城太和二十一年復後屬鬲二漢晉屬平原後屬勃海後屬治臨齊城并州漢晉治晉陽晉末治臺壁後治晉陽皇始元年平仍置領郡五縣二十六戶一十萬七千九百八十三口四十八萬二千一百四十太原郡領縣十戶四萬五千六口二十萬七千五百七十八晉陽二漢晉屬真君九年罷榆次屬焉有介子推祠西南有懸甕山一名龍山晉水所出東入汾有晉王祠梗陽城同過水出木瓜嶺一出沾嶺一出大廉山一出原過祠下五水合道故曰同過西南入汾出帝太昌中霸朝置大丞相府武定