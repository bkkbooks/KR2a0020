  - {type: variant, offset: 5517, length: 0, content: '', WYG: 魏書卷一魏書卷一考證序紀始均之裔不交南夏是以載籍無聞焉積六十七世至成皇帝諱毛立臣照按北史作六七十代蓋李延夀意謂始均自堯時以迄兩漢豈能確數為六十七世故約略其文耳顧外域傳習舊聞龎固專壹魏收必非無據而定為六十七者不可以彼議此也昭帝紀帝英傑魁㟁北史帝字上有桓字蓋上文稱桓帝率十餘萬騎帝亦同時大舉以助之帝謂昭帝也則此帝字及下帝統部凡十一年句皆指桓帝北史文較明顯徒何大單于慕容廆綱目集覽何作河徒河漢縣名屬平州故城在遼東廣寧中屯衞境北史慕容氏與叚氏俱稱徒河本書或作河或作何前後互異穆帝紀乃從琨求句注陘北之地注監本訛作主句注山名在今代州地本卷帝禦之于句注陘北亦作注今改正然吾逺來士馬疲弊且待终舉賊矣可盡乎臣照按文義疑應作且待终舉矣賊可盡乎終舉猶言後舉也賊可盡乎即左傳盡敵而返敵可盡乎之義盡音儘晉雍州刺史賈疋疋監本訛匹疋即雅字古文也从一从與疋字或作匹者不同今改正昭成帝紀娉慕容元真妹為皇后元真北史作晃又一本娉作聘晉書載記晃字元真今不稱晃蓋避景穆諱也說文娉同聘與娉婷字作平聲者别魏書卷一考證}
