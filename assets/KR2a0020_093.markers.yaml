  - {type: variant, offset: 564, length: 2, content: 李式, krp: 十七年輿駕詣洛路幸其治供帳粗辦境内清靜髙祖頗嘉之而民庶多為立銘置于大路虚相稱美或曰襲所敎也髙祖聞而問之對不以實因是面被責讓尚書奏免其官詔唯降號二等二十年以事為中尉所糾會赦免語在常景傳景眀二年卒贈平南將軍豫州刺史諡曰質子忻襲爵為太尉汝南王悦記室參軍建義初河隂遇害贈散騎常侍安北將軍肆州刺史諡曰穆子子暄襲爵武定末齊州驃騎府功曹參軍齊受禪例降忻弟誕字永安龍驤將軍正平太守亦於河隂遇害贈撫軍將軍并州刺史子希雲舉秀才早亡誕弟殖字永興司空城局參軍子祖幹司徒行參軍并州刺史殖弟永業司空參軍事襲弟椿字元壽少以父任拜祕書中散尋以父憂去職後除羽林監謁者僕射母䘮解任正始初拜中散出為太原太守加鎮逺將軍}
  - {type: variant, offset: 568, length: 2, content: 被收, WYG: 免椿僮僕千餘園宅華廣聲妓自適無乏於時或有勸椿仕者椿笑而不答雅有巧思凡所營製可為後法由是正光中元义將營眀堂辟雍欲徵椿為將作大匠椿聞而以疾固辭孝昌中爾朱榮既據并肆以汾州胡逆表加椿征虜將軍都督尉勞汾胡汾胡與椿比州服其聲望所在降下事寧授右將軍太原太守以預立莊帝之勞封遼陽縣開國子食邑三百户尋轉封真定縣開國侯食邑七百户除持節本將軍華州刺史尋轉使持節散騎常侍殷州刺史元曄立除都官尚書固辭不拜永熈中行冀州事尋除使持節散騎常侍車騎將軍瀛州刺史時有風雹之變詔書廣訪讜言椿乃上疏曰伏奉詔書以風雹厲威上動天睠訪讜辭於百辟詔輿誦於四海宸𠂻懇切備在絲綸祗承兢感心焉靡庴伏惟陛下啓籙應期馭育萬物承綴旒之艱運纂纖絲之危緒忘餐日昃求衣未眀俾上帝下臨愍兹荼蓼永濟溝壑而滄浪降戾作害中秋上帝照臨義不虚變竊惟風為號令皇天所以示威雹者氣激隂陽有所交諍殆行令殊節舒急失中之所致也昔澍雨千里實縁敎祀之誠炎精三舍寧非善言之力譴不空發徵豈謬應誰謂葢髙實符人事伏願陛下留心曲覽垂神逺察禮賢登士博舉審官擢申滯怨振窮省役使夫滋水没川之彦畢居朝右儀表丹青之位未或虛加圜土絶五毒之民揆日息千門之費巖巖廊署無不遇之士忪忪惸獨荷酒帛之恩則物見昭蘇人知休泰徐奏薰風之曲無論鴻鴈之歌豈不天人幸甚鬼神咸忭椿性嚴察下不容姦所在}
