  - {type: variant, offset: 1892, length: 2, content: 邴虬, WYG: 停家久之以邕寵召拜太常少卿尋為荆州大中正出除征虜將軍荆州刺史怡乃致其母喪葬於宛城之南趙氏舊墟以老乞解州任遷拜光禄大夫轉金紫光禄卒贈鎮東將軍相州刺史世宗每出入郊廟脩恒以常侍侍中陪乘而邕兼奉車都尉執轡同載時人竊論號為二趙以趙出南陽徙屬荆州邕轉給事中南陽中正以父為荆州大中正乃罷轉長兼散騎侍郎領左右直長出入禁中後為荆州大中正邕弟尚中書舍人出除南陽太守怡辭荆州也尚求解郡與父俱還未至京師逆除歩兵校尉邕祖嶽舊葬代京喪自平城還葬南陽贈平逺將軍青州刺史世宗崩邕兼給事黄門俄轉太府卿出除平北將軍幽州刺史在州貪縱與范陽盧氏為㛰女父早亡其叔許之而母不從母北平陽氏擕女至家藏避規免邕乃拷掠陽叔遂至於死陽氏訴寃臺}
