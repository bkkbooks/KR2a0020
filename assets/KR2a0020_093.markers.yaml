  - {type: variant, offset: 1892, length: 2, content: 邴虬, krp: 停家久之以邕寵召拜太常少卿尋為荆州大中正出除征虜將軍荆州刺史怡乃致其母喪葬於宛城之南趙氏舊墟以老乞解州任遷拜光禄大夫轉金紫光禄卒贈鎮東將軍相州刺史世宗每出入郊廟脩恒以常侍侍中陪乘而邕兼奉車都尉執轡同載時人竊論號為二趙以趙出南陽徙屬荆州邕轉給事中南陽中正以父為荆州大中正乃罷轉長兼散騎侍郎領左右直長出入禁中後為荆州大中正邕弟尚中書舍人出除南陽太守怡辭荆州也尚求解郡與父俱還未至京師逆除歩兵校尉邕祖嶽舊葬代京喪自平城還葬南陽贈平逺將軍青州刺史世宗崩邕兼給事黄門俄轉太府卿出除平北將軍幽州刺史在州貪縱與范陽盧氏為㛰女父早亡其叔許之而母不從母北平陽氏擕女至家藏避規免邕乃拷掠陽叔遂至於死陽氏訴寃臺}
  - {type: variant, offset: 1895, length: 0, content: '', WYG: 中散大夫孫景安研檢事狀邕坐處死㑹赦得免猶當除名自理經年臨淮王彧時為廷尉久不斷決孝昌初卒侯剛字乾之河南洛陽人其先代人也本出寒微少以善於鼎爼進餁出入乆之拜中散累遷冗從僕射嘗食典御世宗以其質直賜名剛焉稍遷奉車都尉右中郎將領刀劒左右加游擊將軍城門校尉遷武衛將軍仍領典御又加通直散騎常侍詔曰太和之季蟻㓂侵疆先皇於不豫之中命師出討撫戎暴露觸御乖和朕屬當監國弗獲隨侍而左右服事唯藉忠勤剛於違和之中辛勤行餁追逺録誠宜先推敘其以剛為右衛大將軍後領太子中庶子世宗崩剛與侍中崔光迎肅宗於東宫尋除衛尉卿封武陽縣開國侯邑千二百户俄為侍中撫軍將軍恒州大中正遷衛將軍表讓侍中詔不許進爵為公以給侍之勞加賞散伯熙平初除左衛將軍餘官如故侍中游肇出為相州剛言於靈太后曰昔髙氏擅權游肇抗衡不屈先帝所知四海同見而出牧一藩未盡其美宜還引入以輔聖主太后善之剛寵任既隆江陽王繼尚書長孫稚皆以女妻其子司空任城王澄以其起由膳宰頗竊侮之云此近為我舉食然公坐對集敬遇不虧後剛坐掠殺試射羽林為御史中尉元匡所彈廷尉處剛大辟尚書令任城王澄為之言於靈太后侯剛歴仕前朝事有可取纖芥之疵未宜便致於法靈太后乃引見廷尉卿裴延儁少卿袁飜於宣光殿問曰剛因公事掠人邂逅致死律文不坐卿處其大辟竟何所依飜對曰案律邂逅不坐者謂情理已露而隱避不引必須箠撻取其款言謂撾撻以理之類至於此人問則具首正宜依犯結案不應横加箠扑兼剛口唱打殺撾築非理本有殺心事非邂逅處之大辟未乖憲典太后曰卿等且還當别有判於是令曰廷尉執處侯剛於法如猛剛既意在為公未宜便依所執但輕勦民命理無全捨可削封三百户解尚衣典御剛於是頗為失意剛自太和進食遂為典御歴兩都三帝二太后將三十年至此始解未幾加散騎常侍御史中尉元匡之廢也太后訪代匡者剛為太傅清河王懌所舉遂除車騎將軍領御史中尉常侍衛尉如故及領軍元义執政擅權樹結親黨剛長子义之妹夫乃引剛為侍中左衛將軍還領尚食典御以為枝援俄加車騎大將軍領左右復前削之封尋加儀同復領御史中尉剛啓軍旅稍興國用不足求以封邑俸粟賑給征人肅宗許之孝昌元年除領軍餘官如故初元义之解領軍也靈太后以义腹心尚多恐難卒制故權以剛代之示安其意尋出為散騎常侍冀州刺史將軍儀同三司剛行在道詔曰剛因縁時會恩隆自久擢於凡品越昇顯爵徃以微勤賞同利建寵靈之極超絶夷等曽無犬馬識主之誠方懷梟獍返噬之志與權臣元义㛰姻朋黨虧違典制長直禁中一出一入迭為姦防义與劉騰共為心膂間隔二宮逼脅内外且位居繩憲糾察是司宜立格言勢同鷹隼方嚴楚撻枉服貞良專任凶威以直為曲不忠不道深暴民聽附下罔上事彰幽顯莫大之罪難從宥原封爵之科理宜貶奪可征虜將軍餘悉削黜剛終于家永安中贈司徒公剛長子詳自奉朝請稍遷通直散騎侍郎冠軍將軍主衣都統剛以上谷先有侯氏於是始家焉正光中又請以詳為燕州刺史將軍如故欲為家世之基尋進後將軍五年拜司徒左}
