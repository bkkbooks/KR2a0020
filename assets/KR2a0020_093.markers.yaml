  - {type: variant, offset: 564, length: 2, content: 李式, WYG: 十七年輿駕詣洛路幸其治供帳粗辦境内清靜髙祖頗嘉之而民庶多為立銘置于大路虚相稱美或曰襲所敎也髙祖聞而問之對不以實因是面被責讓尚書奏免其官詔唯降號二等二十年以事為中尉所糾會赦免語在常景傳景眀二年卒贈平南將軍豫州刺史諡曰質子忻襲爵為太尉汝南王悦記室參軍建義初河隂遇害贈散騎常侍安北將軍肆州刺史諡曰穆子子暄襲爵武定末齊州驃騎府功曹參軍齊受禪例降忻弟誕字永安龍驤將軍正平太守亦於河隂遇害贈撫軍將軍并州刺史子希雲舉秀才早亡誕弟殖字永興司空城局參軍子祖幹司徒行參軍并州刺史殖弟永業司空參軍事襲弟椿字元壽少以父任拜祕書中散尋以父憂去職後除羽林監謁者僕射母䘮解任正始初拜中散出為太原太守加鎮逺將軍}
  - {type: page-break, offset: 564, content: '', id: KR2a0020_WYG_093-6b, image: WYG0262/WYG0262-0315b.png}
