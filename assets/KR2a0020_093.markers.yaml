  - {type: variant, offset: 1764, length: 0, content: '', krp: 特依許遷驍騎將軍領華林諸作皓性微工巧多所興立為山於天淵池西採掘北邙及南山佳石徙竹汝潁羅蒔其間經構樓館列於上}
  - {type: variant, offset: 1765, length: 0, content: '', WYG: 樹草栽木頗有野致世宗心悦之以時臨幸遷冠軍將軍仍驍騎將軍皓貴寵日升關與政事太傅北海王詳以下咸祗憚附之皓弟年尚二十擢補員外郎皓娶僕射髙肇從妹於世宗為從母迎納之日詳請詣之禮以馬物皓又為弟聘安豐王延明妹延明耻非舊流不許詳勸彊之云欲覔官職如何不與茹皓婚姻也延明乃從焉皓頗敏慧折節下人而濳自經營隂有納受貨産盈積起宅宮西朝貴弗之及也是時世宗雖親萬務皓率常居内留宿不還傳可門下奏事未㡬轉光禄少卿意殊不已方欲陳馬圈從先帝之勞更希進舉初脩皓之寵北海王詳皆附納之又直閤將軍劉胄本為詳所薦常感詳恩宻相承望並共來徃髙肇素疾諸王常䂓陷害既知詳與皓等交關相昵乃構之世宗云皓等將有異謀世宗乃召中尉崔亮令奏皓胄常季賢陳掃靜四人擅勢納賄及私亂諸事即日執皓等皆詣南臺翌日奏處罪其晚就家殺之皓妻被髮出堂哭而迎皓皓徑入哭别食椒而死皓子懷朗仕至南青}
