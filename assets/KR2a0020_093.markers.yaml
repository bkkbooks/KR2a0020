  - {type: variant, offset: 1479, length: 1, content: 諡, WYG: 仲興世居趙郡自以寒微云舊出京兆覇城故為雍州大中正尚書後以仲興開國公賞報過優北海王詳嘗面啓奏請降減事久不決可久在徐州恃仲興寵勢輕侮司馬梁郡太守李長壽遂至忿諍彭城諸沙門共相和解未㡬復有所競可久乃令僮僕邀毆長壽遂折其脅州以表聞北海王詳因百寮朝集厲色大言}
  - {type: page-break, offset: 1479, content: '', id: KR2a0020_WYG_093-14a, image: WYG0262/WYG0262-0319a.png}
  - {type: variant, offset: 1479, length: 1, content: 諡, krp: 仲興世居趙郡自以寒微云舊出京兆覇城故為雍州大中正尚書後以仲興開國公賞報過優北海王詳嘗面啓奏請降減事久不決可久在徐州恃仲興寵勢輕侮司馬梁郡太守李長壽遂至忿諍彭城諸沙門共相和解未㡬復有所競可久乃令僮僕邀毆長壽遂折其脅州以表聞北海王詳因百寮朝集厲色大言}
  - {type: variant, offset: 1481, length: 1, content: 忠, WYG: 徐州名藩先帝所重朝廷云何簡用上佐遂令致此紛紜以徹荒外豈不為國醜辱也衆亦莫有應者仲興是後漸疎不得徑入左右世宗乃下詔奪其封邑出除平北將軍并州刺史卒贈安東將軍青州刺史宼猛上谷人也祖父平城猛少以姿幹充虎賁稍遷羽林中郎從髙祖征南陽以撃賊不進免官世宗踐位復敘用愛其膂力置之左右為千牛備身歴轉遂至武衛將軍出入禁中無所拘忌自以上谷宼氏得補燕州大中正而不能甄别士庶也家漸富侈宅宇髙華妾𨽻充溢微榮弟姪然不及茹皓仲興也卒贈平北將軍燕州刺史趙脩字景業趙郡房}
  - {type: page-break, offset: 1481, content: '', id: KR2a0020_WYG_093-14b, image: WYG0262/WYG0262-0319b.png}
