  - {type: variant, offset: 574, length: 2, content: 至河, WYG: 椿妻鉅鹿魏悦之次女眀達有逺操多識徃行前言隨夫在華州兄子建在洛遇患聞而星夜馳赴膚容虧損親類歎尚之爾朱榮妻北鄉郡長公主深所禮敬永安中詔以為南和縣君内足於財不以華飾為意撫兄子牧情同已子存拯親類所在周洽椿名位終始魏有力焉元象中卒贈鉅鹿郡君椿無子以兄孫叔眀為後叔眀太尉參軍事儀同開府祭酒死於晉陽無子以弟子暄子為後叡弟諶字厚誠為給事中安南將軍祠部尚書賜爵}
