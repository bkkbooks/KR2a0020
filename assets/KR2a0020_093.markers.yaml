  - {type: variant, offset: 1472, length: 5, content: 褒美贈樂陵, WYG: 即位轉左中郎將仍齊帥及帝親政與趙修並見寵任遷光禄大夫領武衛將軍仲興雖與脩並而畏慎自退不若脩之倨傲無禮咸陽王禧之出奔也當時上下微為駭震世宗於乾脯山追仲興馳入金墉城安慰後與領軍于勁共參機要因自理馬圈侍疾及入金墉之功乞同元賞遂封上黨郡開國公食邑二千户自拜武衛及受封之日車駕每臨饗其宅世宗游幸仲興常侍從不離左右外事得徑以聞百寮亦聳體而承望焉兄可久以仲興故自散爵為徐州征虜府長史帶彭城}
