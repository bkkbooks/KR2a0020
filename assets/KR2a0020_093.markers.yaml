  - {type: variant, offset: 1898, length: 0, content: '', krp: 中驃騎將軍殷州刺史還朝久而卒鄭儼字季然滎陽人容貌壯麗初為司徒胡國珍行參軍因縁為靈太后所幸時人未之知也遷員外散騎侍郎直後靈太后廢蕭寳夤西征以儼為開府屬孝昌初太后反政儼請使還朝復見寵待拜諌議大夫中書舍人領嘗食典御晝夜禁中寵愛尤甚儼每休沐太后常遣閹童隨侍儼見其妻唯得言家事而已與徐紇俱為舎人儼以紇有智數仗為謀主紇以儼寵幸既盛傾身承接共相表裏勢動内外城陽王徽微與之合當時政令歸於儼等遷通直郎散騎常侍平東將軍武衛將軍華林都將右衛將軍散騎常侍中軍將軍中書令車騎將軍舍人常侍如故肅宗崩事出倉卒天下咸言儼計也尒朱榮舉兵向洛以儼紇為辭榮逼京師儼走歸鄉里儼從兄仲眀先為滎陽太守至是儼與仲眀欲據郡起衆尋為其部下所殺與仲眀俱傳首洛陽子文寛從出帝殁關西徐紇字武伯樂}
  - {type: variant, offset: 1899, length: 1, content: 固, WYG: 博昌人也家世寒微紇少好學有名理頗以文詞見稱察孝亷對䇿上第髙祖拔為主書世宗初除中書舍人謟附趙脩遷通直散騎侍郎及脩誅坐黨徙枹罕雖在徒役志氣不撓故事捉逃役流兵五人流者聽免紇以此得還久之復除中書舍人太傅清河王懌又以文翰待之及領軍元义之害懌也出為鴈門太}
  - {type: variant, offset: 1899, length: 1, content: 固, krp: 博昌人也家世寒微紇少好學有名理頗以文詞見稱察孝亷對䇿上第髙祖拔為主書世宗初除中書舍人謟附趙脩遷通直散騎侍郎及脩誅坐黨徙枹罕雖在徒役志氣不撓故事捉逃役流兵五人流者聽免紇以此得還久之復除中書舍人太傅清河王懌又以文翰待之及領軍元义之害懌也出為鴈門太}
  - {type: variant, offset: 1901, length: 0, content: '', WYG: 紇稱母老解郡還鄉至家未幾尋入洛飾貌事义大得义意及义父繼西鎮潼闗以紇為從事中郎尋以母憂歸鄉里靈太后反政以紇曽為懌所顧待復起為中書舍人紇又曲事鄭儼是以特被信任俄遷給事黄門侍郎仍領舍人總攝中書門下之事軍國詔命莫不由之時有急速令數吏執筆或行或卧人别占之造次俱成不失事理雖無雅才亦可通情時黄門侍郎太原王遵業琅邪王誦並稱文學亦不免為紇秉筆承其指授尋加鎮南將軍金紫光禄大夫黄門舍人如故紇機辯有智數當公斷決終日不以為勞長直禁中略無休息時復與沙門講論或分宵達曙而心力無怠道俗歎服之然性浮動慕權利外似謇正内實謟諛時豪勝已必相陵駕書生貧士矯意禮之其詭態若此有識鄙薄焉紇既處腹心參斷機宻勢傾一時逺近填湊與鄭儼李神軌寵任相亞時稱徐鄭焉然無經國大體好行}
