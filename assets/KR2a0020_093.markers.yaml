  - {type: variant, offset: 573, length: 0, content: '', WYG: 呼為王太原未幾爾朱榮居椿之宅榮封太原王焉至於齊獻武王之居晉陽覇朝所在人士輻湊椿禮敬親知多所拯接後以老病遂辭疾客居趙郡之西鯉魚祠山興和二年春卒時年六十二贈使持節都督冀瀛二州軍事驃騎大將軍尚書左僕射太尉公冀州刺史諡曰文恭及葬齊獻武王親自弔}
