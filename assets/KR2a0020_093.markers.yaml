  - {type: variant, offset: 1492, length: 0, content: '', WYG: 趙僧􅋆等隂相傳納許受玉印不軌不物日月滋甚朕猶愍其宿隸每加覆護而擅威㺯勢侏張不已法家耳目並求憲網雖欲捨之辟實難爽然楚履既墜江君徘徊鍾牛一聲東向改釁脩雖小人承侍在昔極辟之奏欲加未忍可鞭之一百徙敦煌為兵其家宅作徒即仰停罷所親在内者悉令出禁朕昧於處物育兹豺虎顧尋徃謬有愧臣民便可時勑申没以謝朝野是日脩詣領軍于勁第與之樗蒲籌未及畢而羽林數人相續而至稱詔呼之脩驚起隨出路中執引脩馬詣領軍府琛與顯監決其罰先具問事有力者五人更迭鞭之占令必死㫖決百鞭其實三百脩素肥壯腰皆博碩堪忍楚毒了不轉動鞭訖即召驛馬促之令發出城西門不自勝舉縳置鞍中急驅馳之其母妻追隨不得與語行八十里乃死初于后之入脩之力}
