  - {type: variant, offset: 1901, length: 0, content: '', krp: 紇稱母老解郡還鄉至家未幾尋入洛飾貌事义大得义意及义父繼西鎮潼闗以紇為從事中郎尋以母憂歸鄉里靈太后反政以紇曽為懌所顧待復起為中書舍人紇又曲事鄭儼是以特被信任俄遷給事黄門侍郎仍領舍人總攝中書門下之事軍國詔命莫不由之時有急速令數吏執筆或行或卧人别占之造次俱成不失事理雖無雅才亦可通情時黄門侍郎太原王遵業琅邪王誦並稱文學亦不免為紇秉筆承其指授尋加鎮南將軍金紫光禄大夫黄門舍人如故紇機辯有智數當公斷決終日不以為勞長直禁中略無休息時復與沙門講論或分宵達曙而心力無怠道俗歎服之然性浮動慕權利外似謇正内實謟諛時豪勝已必相陵駕書生貧士矯意禮之其詭態若此有識鄙薄焉紇既處腹心參斷機宻勢傾一時逺近填湊與鄭儼李神軌寵任相亞時稱徐鄭焉然無經國大體好行}
  - {type: variant, offset: 1902, length: 3, content: 劍文熾, WYG: 數説靈太后以鐡券間爾朱榮左右榮知深以為憾啓求誅之榮將入洛既剋河梁紇矯詔夜開殿門取驊騮御馬十匹東走兗州紇弟獻伯為北海太守獻伯弟季彦先為青州長史紇使人告之亦將家南走羊侃時為太山太守紇徃投之説侃令舉兵侃從之遂聚兵反共紇}
