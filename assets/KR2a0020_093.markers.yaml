  - {type: variant, offset: 1488, length: 2, content: 仁豫, WYG: 天盛兄弟越次出補長史大郡脩起自財伍暴致富貴奢慠無禮物情所疾因其在外左右或諷糾其罪自其葬父還也舊寵少薄初王顯祗附於脩後因忿䦧宻伺其過規陷戮之而脩過短都不悛防顯積其前後愆咎列脩葬父時路中淫亂不軌又云與長安人趙僧􅋆謀匿玉印事髙肇甄琛等構成其罪乃宻以聞始琛及李馮等曲事於脩無所不至懼相連及爭共糾擿助攻治之遂乃詔曰小人難育朽棘不彫長惡不悛豈容撫養散騎常侍鎮東將軍領扈左右趙脩昔在東朝選充臺皂幼所經見長難遺之故纂業之初仍引西禁雖地微器陋非所宜採然識早念生遂陞名級自蒙洗濯兇昏日甚驟佞薦憍恩加輕慢不識人倫之體不悟深淺之方陵獵王侯輕􅠅卿相門賔巷士拜叩不接囂氣豪心仍懷鄙塞比聽葬父侈暴繼聞居京造宅殘虐徒旅又廣張形勢妄生矯托與雍}
