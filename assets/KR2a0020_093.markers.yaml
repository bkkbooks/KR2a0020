  - {type: variant, offset: 5, length: 1, content: 七, WYG: 一王叡王仲興㓂猛趙修茹皓趙邕侯剛鄭儼徐紇夫令色巧言矯情飾貌邀眄睞之利射咳唾之私此蓋茍進之常也故甚者刑身瀹子其次舐痔嘗癰況乃散金秦貨輸錢漢爵又何怪哉若夫地窮尊貴嗜欲所攻聖達其猶病諸中庸固不能免男女性態其揆斯一二代之亡皆是物也據天下之圖持海内之命顧指如意髙下在心此乃夏桀殷紂䘮二邦秦母呂雉穢兩國也魏世王叡幸太和之初鄭儼寵孝昌之季主幼於前君稚於後乘間宣淫殆無忌畏樹}
