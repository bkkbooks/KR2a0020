  - {type: variant, offset: 1897, length: 0, content: '', WYG: 領嘗藥典御燕州大中正興}
  - {type: variant, offset: 1897, length: 0, content: '', krp: 領嘗藥典御燕州大中正興}
  - {type: variant, offset: 1898, length: 0, content: '', WYG: 中驃騎將軍殷州刺史還朝久而卒鄭儼字季然滎陽人容貌壯麗初為司徒胡國珍行參軍因縁為靈太后所幸時人未之知也遷員外散騎侍郎直後靈太后廢蕭寳夤西征以儼為開府屬孝昌初太后反政儼請使還朝復見寵待拜諌議大夫中書舍人領嘗食典御晝夜禁中寵愛尤甚儼每休沐太后常遣閹童隨侍儼見其妻唯得言家事而已與徐紇俱為舎人儼以紇有智數仗為謀主紇以儼寵幸既盛傾身承接共相表裏勢動内外城陽王徽微與之合當時政令歸於儼等遷通直郎散騎常侍平東將軍武衛將軍華林都將右衛將軍散騎常侍中軍將軍中書令車騎將軍舍人常侍如故肅宗崩事出倉卒天下咸言儼計也尒朱榮舉兵向洛以儼紇為辭榮逼京師儼走歸鄉里儼從兄仲眀先為滎陽太守至是儼與仲眀欲據郡起衆尋為其部下所殺與仲眀俱傳首洛陽子文寛從出帝殁關西徐紇字武伯樂}
