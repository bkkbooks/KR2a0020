  - {type: variant, offset: 1483, length: 4, content: 榮賓襲劉, WYG: 人父惠安後名謐都曹史積勞補陽武令脩貴追贈威烈將軍本郡太守及葬復贈龍驤將軍定州刺史脩本給事東宮為白衣左右頗有膂力世宗踐阼仍充禁侍愛遇日隆然天性闇塞不閑書疏是故不參文墨世宗親政旬月之間頻有轉授歴員外通直散騎常侍鎮東將軍光禄卿每受除設宴世宗親幸其宅諸王公卿士百寮悉從世宗親見其母脩能劇飲至於逼勸觴爵雖北海王詳廣陽王嘉等皆亦不免必致困亂每適郊廟脩常驂陪出入華林恒乘馬至于禁内咸陽王禧誅其家財貨多賜髙肇及脩脩之葬父也百寮自王公以下無不弔祭酒犢祭奠之具填塞門街於京師為制碑銘石獸石柱皆發民車牛傳致本縣財用之費悉自公家凶吉車乘將百兩道路供給亦皆出官時將馬射世宗留脩過之帝如射宮脩又驂乗輅車旒竿觸東門而折脩恐不逮葬日驛赴窆期左右求從及特遣者數十人脩道路嬉戲殆無慼容或與賔客姦掠婦女倮觀從者噂􅊱喧譁詬詈無節莫不畏而惡之是年又為脩廣増宅舎多所并兼洞門髙堂房廡周博崇麗擬於諸王其四面隣居賂入其地者}
  - {type: page-break, offset: 1483, content: '', id: KR2a0020_WYG_093-15a, image: WYG0262/WYG0262-0319c.png}
