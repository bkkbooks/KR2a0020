  - {type: variant, offset: 1449, length: 1, content: 梁, WYG: 後伯豫襲爵武定中冀州開府録事參軍齊受禪例降魏誠弟亮字平誠承眀初擢為中散告沙門法秀反遷冠軍將軍賜爵永寜侯加給事中出為安西將軍泰州刺史後轉陜州刺史坐事免卒於家亮子洪壽早卒子元景正光中許復先爵降為伯卒無子洪壽弟嶷字安壽除奉朝請稍遷中散大夫以疾歸鄉里遂移居上黨年七十一卒子夷字景預有文才少工詩詠知名於世未官而卒叡叔隆保冠軍將軍姑臧侯卒追贈安東將軍并州刺史鉅鹿公諡曰靖王仲興趙郡南欒人也父天徳起自細微至殿中尚書仲興幼而端謹以父任早給事左右太和中殿内侍御中散武騎侍郎給事中出入禁内十餘年轉冗從僕射猶參宻近為齊帥從駕征新野有功除折衝將軍屯騎校尉又命率千餘騎破賊於鄧}
