  - {type: variant, offset: 375, length: 0, content: '', WYG: 收集離散比至洛陽衆十餘萬行未及關垂有貳志說堅請廵撫燕代并求拜墓許之垂遂殺堅驍騎将軍石越鎮軍将軍毛當引丁零之衆攻堅子長樂公丕於鄴慕容泓沖起兵華澤堅遣子叡暉前後擊泓為泓所敗長安鬼夜哭三旬沖又撃殺堅}
