  - {type: variant, offset: 22, length: 10, content: 高遵張赦提羊祉崔暹酈, WYG: 間顧恃遼海之曲各言應歴數人謂遷圖鼎或更相吞噬迭為驅除或狼戾未馴俟我斧鉞太祖奮風霜於參合鼓雷電於中山黄河以北靡然歸順矣世祖叡略潛舉靈武獨斷以夫僭偽未夷九域尚阻慨然有混一之志既而戎車嵗駕神兵四出全國克敵伐罪弔民遂使專制令擅威福者西自流沙東極滄海莫不授館於東門懸首於北闕矣唯夫窮髪遺虜未拔根株徼􅂷殘狡尚餘栽蘖而北踰翰漠折其肩髀南極江湖抽其膓胃雖骸骨僅存脂膏咸盡視息纔舉魂魄久逰髙祖聖敬時乘遷居改作日轉雲移風行電掃辮髪之渠非逃則附卉服之長琛賮繼入猶以侍子不至取亂乘機五牛一指六師騁路馘其武臣驍帥傾其湯池石城向使時無榖塘之禍民無鼎湖之思北可焚穹廬收服匿削引弓之左袵苑龍荒以牧馬南則罺鼃黽暴鯨鯢變水處之文身化鳥言於人俗矣尋以壽春内欵華陽稽服蕞彼江隂憂於繫頸肅宗以沖年踐祚俄則母后當陽務崇寛政取和朝野置荒遐於度外譬蠻夷於雞肋而黠狄淪胥種落離貳虜帥飄然窮而歸我矜其眼目愍厥顛亡反之於故庭復之以保塞魏}
  - {type: page-break, offset: 22, content: '', id: KR2a0020_WYG_095-2b, image: WYG0262/WYG0262-0344b.png}
