  - {type: variant, offset: 336, length: 2, content: 假范, WYG: 王浚起兵伐頴頴師戰敗淵謂潁曰今二鎮跋扈衆踰十萬恐非宿衛及近郡士民所能禦之淵當為殿下還說五部鳩合義衆以赴國難頴悅拜淵為北單于參丞相軍事淵至左國城劉宣等上大單于之號二旬之間衆便五萬都於離石淵謂宣等曰帝王豈有常哉當上為漢髙下為魏武然晉人未必同我漢有天下世長恩徳結於民心吾又漢氏之甥約為兄弟兄亡弟紹不亦可乎今且可稱漢追尊後主以懐民望乃遷於左國城自稱漢王置百官年號元熙追尊劉禪為孝懐皇帝攻擊郡縣桓帝十一年晉并州刺史司馬騰來乞師桓帝親率萬騎救騰斬淵將綦母豚淵南走蒲子語在序紀晉光熙元年淵進據河東尅平陽蒲坂遂都平陽晉永嘉二年淵稱帝年號永鳯後汾水中得玉璽文曰有新保之蓋王莽之璽也得者因増淵海光三字而獻之淵以為己瑞號年為河瑞以聰為大司馬大單于録尚書事置單于臺於平陽西淵死子和僭立聰即和第四弟也殺和而自立聰猨臂善射彎弓三百斤晉新興太守郭頤辟為主簿任以郡事舉良將為驍騎别部司馬齊王冏以為國中尉出為左部司馬尋遷右部尉太宰河間王顒表為赤沙中郞將以淵在鄴懼為成都王頴所害亡奔頴頴甚悅拜右積弩將軍參前鋒戰事隨還左國淵稱大號拜大司馬封楚王及僭位年號光興聰遣王彌劉曜攻䧟洛陽執晉懐帝改年為嘉平聰於是驕奢滛暴殺戮無已誅翦公卿旬日相繼納其太保劉殷二女為左右貴嬪又納殷孫女四人為貴人六劉之寵傾於後宫聰希復出外事皆中黄門納奏左貴嬪决之其都水使者襄陵王攄以魚蟹不供將作大匠望都公靳陵以營作遲晚並斬於東市聰逰獵無度晨出暮歸觀魚於汾以燭繼晝其弟乂及子粲輿櫬切諌聰怒曰吾豈桀紂幽厲乎而汝等生來哭人也先是劉琨來告難穆帝親率大衆令長子六修擊粲等大破之語在序紀聰與羣臣飲讌逼晉帝行酒晉光禄大夫庾珉等謀以平陽應劉琨於是害晉帝誅珉等改嘉平為建元平陽地震聰崇明觀䧟為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形委蛇其光照地落於平陽北十里視之則肉長二十歩廣二十七步臭達於平陽肉旁常有哭聲晝夜不止聰惡之劉后産一蛇一虎各害人而走尋之不得頃之見在隕肉之旁聰遣劉曜攻䧟長安執晉愍帝改建元為麟嘉其武庫陷入地一丈五尺聰自去冬至足遂不受朝賀立市於後庭與宫人讌戱積日不醒立上皇后樊氏樊氏是聰張后之侍婢也時稱后者四人佩皇后璽綬者七人阿諛日進貨賄公行後宫賞賜動至千萬有豕著進賢冠犬冠武弁帶綬並昇聰座俄而鬬死宿衛之人無見入者平文二年聰死子粲襲位號年漢昌粲荒耽酒色逰蕩後庭軍國之事决於大將軍靳凖凖勒兵誅粲劉氏男女無少長皆殺之凖自號漢王置百官尋為靳明所殺衆降淵族子曜曜字永明少孤見養於淵頗知書計志性不恒拳勇有膂力鐵厚一寸射而洞之坐事當誅亡匿朝鮮客為縣卒㑹赦得還聰之末年位至相國鎮長安靳凖之誅粲也曜來赴之次於赤壁遂僭尊號改年光初靳明既降於曜曜還都長安自稱大趙曜西通張駿南服仇池窮兵極武無復寧嵗又發六百萬功營其父及妻二塜下洞三泉上崇百尺積石為基周回二里發掘古塜以千百數廹督役徒繼以脂燭百姓嘷哭盈於道路又更増九十尺塜前石人有聲言慎封其子允為南陽王以漢陽十三郡為國立單于臺於渭城置左右賢王已下皆以雜種為之曜得黒免改年為太和石虎伐曜曜擊破之遂攻石生於洛陽曜不撫士衆專與嬖臣飲博左右或諫曜怒斬之石勒進據石門曜甫知之解金墉之圍陳于洛西將與勒戰至西陽門麾軍就平師遂大潰曜墜于氷為石勒將石堪所擒勒囚之襄國尋殺之烈帝元年曜子毗率百官棄長安西走秦州尋為石勒所滅羯胡石勒字世龍小字匐勒其先匈奴别部分散居於上黨武鄉羯室因號羯胡祖邪奕干父周曷朱一字乞翼加並為部落小帥周曷朱性凶麤不為羣胡所附勒壯健有膽略好騎射周曷朱每使代已督攝部胡部胡愛信之并州刺史司馬騰執諸胡於山東賣充軍實兩胡一枷勒亦在中至平原賣與師氏為奴師家隣於馬牧勒與牧帥汲桑徃來相託遂招集王陽夔安支雄冀保吳豫劉膺姚豹逯明郭敖劉徴劉寳張曀僕呼延莫郭黒略張越孔豚趙鹿支屈六等東如赤龍騄驥諸苑乘苑馬還掠繒寳以賂汲桑成都王頴之廢也頴故將陽平人公師藩等自稱將軍起兵趙魏衆至數萬勒與汲桑率牧人乘苑馬數百騎以赴之於是桑始命勒以石為姓以勒為名藩拜為前隊督藩戰敗身死勒與汲桑亡潛苑中潁之將如河北也汲桑以勒為伏夜牙門率牧人劫掠郡縣繫囚合軍以應之屯于平石桑自號大將軍進軍攻鄴以勒為前鋒都尉攻鄴剋之尋為晉將茍晞所敗勒徃從劉淵拜為輔漢將軍平晉王劉聰立以勒為征東大將軍并州刺史汲郡公劉粲攻洛陽勒留長史刁膺統步卒九萬徙輜重于重門率輕騎二萬㑹粲於太陽大敗晉監軍裴邈于澠池遂至洛川勒出成臯圍晉陳留太守王讚於倉垣為讚所敗屯文石津將北攻晉幽州刺史王浚㑹浚將王甲始率遼西鮮卑萬餘騎敗劉聰安北大將軍趙固于津北勒乃燒船棄營引軍向栢門迎重門輜重合于石門而濟南攻晉豫州刺史馮嵩于陳郡不剋進攻襄城太守崔廣於繁昌斬之先是雍州流民王如侯脱嚴嶷等起兵江淮間受劉淵官位聞勒之來也懼遣衆一萬拒於襄城勒撃敗之盡俘其衆勒至南陽屯于宛之北山王如遣使通好勒進攻宛剋之斬侯脱降嚴嶷盡并其衆南至襄陽攻剋江西三十餘壘有據江漢之志勒右長史張賓以為不可引軍而北晉太傅東海王越率洛陽之衆二十餘萬討勒越薨於軍軍人推太尉王衍為主率衆而東勒追擊破之於苦縣勒分騎圍而射之相登如山殺王衍及晉襄陽王範等十餘萬人越世子毗聞越薨出自洛陽從者傾城勒逆毗於洧倉破之執毗及晉宗室二十六王并諸卿士皆殺之與王彌劉曜攻䧟洛陽歸功彌曜遂出轘轅執晉大將軍茍晞於蒙城以為左司馬劉聰授勒鎮軍大將軍幽州牧領并州刺史用張賓之計自汝南葛陂北都襄國襲幽州擒王浚殺之劉聰加勒陜東伯得專征伐封拜刺史將軍守宰列侯嵗盡集上及劉粲為靳凖所殺勒率衆赴平陽曜稱尊號授勒大司馬大將軍加九錫増封十郡幷前十三郡進為趙公勒至平陽勒明出與勒戰勒大破之遣兼左長史王修主簿劉茂獻㨗於曜明率平陽之衆奔曜曜西如粟邑勒焚平陽宫室置戍而歸徙渾儀樂器於襄國曜遣使授勒太宰領大將軍進爵趙王増封七郡幷前二十郡出入警蹕冕十有二旒乘金根車駕六馬如魏武輔漢故事王修舎人曹平樂留仕曜朝言於曜曰大司馬遣修等來外表至虔内覘彊弱曜實殘敝懼修宣之大怒追還䇿命而斬王修劉茂逃歸言修死狀勒大怒誅曹平樂父兄夷其三族又知追停太宰趙王之授怒曰帝王之起復何常也趙王趙帝孤自取之名號大小豈爾所節乎勒乃自稱大都督大將軍大單于趙王以二十四郡為趙國號為趙王元年平文三年也勒遣使求和請為兄弟斬其使以絶之自是朝㑹常僭天子禮樂以饗羣臣烈帝元年勒又遣使求和帝許之二年勒僭稱皇帝置百官年號建平雖都襄國又營鄴宫作者數十萬人兼以晝夜五年勒死子大雅僭立大雅名犯顯祖廟諱大雅立號年延熙石虎廢大雅為海陽王而僭立尋殺之虎字季龍勒之從子也祖曰匐邪父曰宼覔宼覔有七子虎第四勒父幼而子之故或謂之為勒弟也晉永興中與勒相失永嘉五年劉琨送勒母王氏及虎於葛陂時年十七矣性殘忍逰獵無度能左右射好以彈彈人軍中甚患之勒白母曰此兒凶暴無賴使軍人殺之聲名可惜宜自除也王曰快牛為犢子時多能破車為復小忍勿却之至年十八身長七尺五寸弓馬迅㨗勇冠當時將佐親戚莫不敬憚勒深嘉之而酷害過差軍中有壯健與已齊者因獵戱謔輙殺之至於降城䧟壘不復斷别善惡坑斬士女尠有遺類御衆嚴整莫敢犯者指授攻討所向無前故勒寵信彌隆仗以專征之任劉聰以虎為魏郡太守鎮鄴三臺又封繁陽侯食邑三千户勒為趙王以虎為車騎將軍加侍中開府進封中山公勒稱尊號為太尉守尚書令封中山王食邑萬户勒死虎擅誅右光禄大夫程遐中書令徐光遣子邃率兵入大雅宫直衛文武皆奔散大雅大懼自陳弱劣讓位于虎虎曰若其不堪天下自當有大義何足豫論遂逼立之虎自為丞相魏王虎以勒文武舊臣皆補丞相閑任其府寮舊昵悉居臺省禁要改勒太子宫曰崇訓宫徙勒妻劉氏已下居之簡其美淑及車馬服御皆歸虎第劉氏謂其彭城王石堪曰丞相便相凌蹈恐國祚之滅不復久矣真可謂養虎自殘者也王將何以圖之堪曰先帝舊臣皆以斥外衆旅不復由人宫殿之中亡所厝計臣請出奔兖州據廪丘扶南陽王恢為盟主宣太后詔於諸牧守征鎮令各率義兵同討惡逆蔑不濟也劉氏然之既而堪計不果虎炙而殺之又殺劉氏石生先鎮長安石朗鎮洛陽並起兵討虎為虎所滅虎遂自立為大趙王號年建武自襄國徙居於鄴乃殺大雅及其母程氏并大雅諸弟初虎衣衮冕將祀南郊照鏡無首大恐怖不敢稱皇帝乃自貶為王使其太子邃省可尚書奏事唯選牧守祀郊廟征伐刑斷乃親覽之虎又改稱大趙天王邃以事呈之恚曰此小事何足呈也時有所問復怒曰何以不呈誚責杖捶月至再三邃甚愠恨私謂中庶子李顔等曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對虎聞而大怒殺邃及其男女二十六人一棺埋之誅其宫臣支黨二百餘人立次子宣為太子虎於鄴起臺觀四十餘所營長安洛陽二宫作者四十餘萬人又欲自鄴起閣道至于襄國勅河南四州具南師之備并朔秦雍嚴西討之資青冀幽州三五發卒諸州造甲者五十萬人擾役黎元民庶失業得農桑者十室而三船夫十七萬人為水所沒為虎所害三分而一課責征士五人車一乘牛二頭米各十五斛絹十匹諸役調有不辦者皆以斬論窮民率多鬻子以充軍制而猶不足者乃自經于道路死者相望猶求發無已太武殿成圖畫忠臣孝子烈士貞女皆變為胡狀頭縮入肩虎大惡之遣司虞中郎將賈霸率工匠四千於東平岡山造獵車千乘轅長三丈髙一丈八尺置髙一丈七尺格虎車四十乘立行樓二層於其上南至滎陽東極陽都使御史監司其中禽獸民有犯者罪至大辟御史因之擅作威福民有美女好牛馬求之不得便誣以犯獸論民死者相繼海岱河濟之間民無寧志矣又發民牛二萬餘頭配朔州牧官増内官二十四等東宫十二等諸公侯七十餘國皆為置女官九等先是大發民女二十已下十三已上三萬餘人為三等之第以分配之郡縣有希㫖務於美淑奪人婦者九千餘人民妻有美色豪勢因而脅之率多自殺太子諸公私令採發者亦垂一萬建國九年虎遣使朝貢虎使其太子宣及宣弟秦公韜逓日省可尚書奏事宣惡韜侔已謂嬖人楊柯牟成等曰汝等殺韜吾入西宫當以韜之國邑分封汝等韜既死上必親臨因行大事亡不濟矣柯等許諾乃夜入韜第而殺之虎將出臨韜喪其司空李農諫乃止翌日有人告之虎大怒以鐡鐶穿宣頷而鏁之作數斗木槽和以羮飯以猪狗法食之取害韜刀仗䑛其上血號呌之聲震動宫殿積柴城北樹標其上標末置鹿盧穿之以繩送宣於標所使韜所親宦者郝雅劉靈拔其髪抽其舌以繩貫其頷鹿盧絞上之劉霸斷其手足斫眼潰腹如韜之傷四面縱火煙焰際天虎從昭儀已下數千人登中臺以觀之火滅取灰分置諸門交道中殺其妻子二十九人誅其四率已下三百人宦者五十人皆車裂節解棄之漳水洿其東宫以養䐗牛十二年虎自稱皇帝號年太寧虎死少子世僭立虎養孫閔殺世以世兄遵為主遵以閔為大將軍輔政遵立七日大風雷震晝昏火水俱下災其太武殿延及宫内府庫至于閶闔門火月餘乃滅遵兄鑒又殺遵而自立號年青龍鑒弟苞與胡張才孫伏都等謀殺閔不尅而死自鳯陽門至琨華殿積屍如邱流血成池閔知胡人不為已用乃閉鄴城四門盡殺諸胡晉人貌似胡者多亦濫死閔乃殺鑒而自立盡滅石氏閔本姓冉乃復其姓自稱大魏號年永興尋為慕容儁所擒鐵弗劉虎南單于之苗裔左賢王去卑之孫北部帥劉猛之從子居於新興慮虒之北北人謂胡父鮮卑母為鐵弗因以為號猛死子副崘來奔虎父誥升爰代領部落誥升爰一名訓兜誥升爰死虎代焉虎一名烏路孤始臣附於國自以衆落稍多舉兵外叛平文與晉并州刺史劉琨共討之虎走據朔方歸附劉聰聰以虎宗室拜安北將軍監鮮卑諸軍事丁零中郎將復渡河侵西部平文逆擊大破之虎退走出塞昭成初虎又㓂西部帝遣軍逆討又大破之虎死子務桓代領部落遣使歸順務桓一名豹子招集種落為諸部雄潛通石虎虎拜為平北將軍左賢王務桓死弟閼陋頭代立密謀反叛語在序紀後務桓子悉勿祈逐閼陋頭而自立悉勿祈死弟衛辰代立衛辰務桓之第三子也既立之後遣子朝獻昭成以女妻衛辰衛辰潛通苻堅堅以為左賢王遣使請堅求田内地春来秋去堅許之後掠堅邉民五十餘口為奴婢以獻於堅堅讓歸之乃背堅專心歸國舉兵伐堅堅遣其建節將軍鄧羌討擒之堅自至朔方以衛辰為夏}
