  - {type: variant, offset: 111, length: 127, content: 而貪酷安忍州人富熾奪民呂勝脛纏一具洛侯輒鞭富熾一百截其右腕百姓王隴客刺殺民王羌奴王愈二人依律罪死而已洛侯生拔隴客舌刺其本并刺胸腹二十餘瘡隴客不堪苦痛隨刀戰動乃立四柱磔其手足命將絕始斬其首支解四體分懸道路見之者無不傷楚闔州驚震人懷怨憤百姓王元壽等一時反叛有, WYG: ''}
