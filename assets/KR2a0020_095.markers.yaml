  - {type: variant, offset: 341, length: 0, content: '', krp: 堅還復其國復附於堅雖於國貢使不絶而誠敬有乖帝討衛辰大破之收其部落十六七焉衛辰奔苻堅堅送還朔方遣兵戍之昭成末衛辰導苻堅來㓂南境王師敗績堅遂分國民為二部自河以西屬之衛辰自河以東屬之劉庫仁語在燕鳯𫝊堅後以衛辰為西單于督攝河西雜類屯代來城慕容永之據長子拜衛辰使持節都督河西諸軍事大將軍朔州牧居朔方姚萇亦遣使結好拜衛辰使持節都督}
  - {type: variant, offset: 342, length: 0, content: '', WYG: 朔雜夷諸軍事大將軍大單于河西王幽州牧累為㓂害登國中衛辰遣子直力鞮宼南部其衆八九萬太祖軍五六千人為其所圍太祖乃以車為方營並戰並前大破之於鐵岐山南直力鞮單騎而走獲牛羊二十餘萬乘勝追之自五原金津南渡逕入其國居民駭亂部落奔潰遂至衛辰所居悦跋城衛辰父子驚遁乃分遣諸將輕騎追之陳留公元䖍南至白鹽池虜衛辰家屬將軍伊謂至木根山禽直力鞮盡并其衆衛辰單騎遁走為其部下所殺傳首行宫獲馬牛羊四百餘萬頭先是河水赤如血衛辰惡之及衛辰之亡誅其族類並投之於河衛辰第三子屈孑亡奔薛于部帥太悉伏屈孑本名勃勃太宗改其名曰屈孑屈孑者卑下也太悉伏送之姚興興髙平公破多羅沒弈干妻之以女屈孑身長八尺五寸興見而竒之拜驍騎將軍加奉車都尉常參軍國大議寵遇踰於勲舊興弟濟南公邕言於興曰屈孑天性不仁難以親育寵之太甚臣竊惑之興曰屈孑有濟世之才吾方收其藝用與之共平天下有何不可乃以屈孑為安逺將軍封陽川侯使助没弈干鎮髙平議以義城朔方雜夷及衛辰部衆三萬配之以候邊隙邕固諫以為不可興曰卿何以知其氣性邕曰屈孑奉上慢御衆殘貪暴無親輕為去就寵之踰分終為邉害興乃止以屈孑為持節安北将軍五原公配以三交五部鮮卑二萬餘落鎮朔方太祖末屈孑襲殺沒弈干而并其衆僭稱大夏天王號年龍昇置百官興乃悔之屈孑耻姓鐵弗遂改為赫連氏自云徽赫與天連又號其支庶為鐵伐氏云其宗族剛銳如鐵皆堪伐人劉裕攻長安屈孑聞而喜曰姚泓豈能拒裕裕必滅之待裕去後吾取之如拾遺耳於是秣馬厲兵休養士卒及裕擒泓留子義真守長安屈孑伐之大破義真積人頭為京觀號曰髑髏臺遂僭稱皇帝於灞上號年為昌武定都統萬勒銘城南頌其功徳以長安為南都性憍虐視民如草芥蒸土以築都城鐵錐刺入一寸即殺作人而并築之所造兵器匠呈必死射甲不入即斬弓人如其入也便斬鎧匠凡殺工匠數千人常居城上置弓劒於側有所嫌忿手自殺之羣臣忤視者鑿其目笑者決其唇諌者謂之誹謗先截其舌而後斬之議廢其長子璝璝自長安起兵攻屈孑屈孑中子太原公昌破璝殺之屈孑以昌為太子始光二年屈孑死昌僭立昌字還國一名折屈孑之第三子也既僭位改年永光世祖聞屈孑死諸子相攻關中大亂於是西伐乃以輕騎一萬八千濟河襲昌時冬至之日昌方宴饗王師奄到上下驚擾車駕次於黒水去城三十餘里昌乃出戰世祖馳徃撃之昌退走入城未及閉門軍士乘勝入其西宫焚其西門夜宿城北明日分軍四出略居民殺獲數萬生口牛馬十數萬徙萬餘家而還後昌遣弟定與司空奚斤相持於長安世祖乘虚西伐濟君子津輕騎三萬倍道兼行羣臣咸諫曰統萬城堅非十日可拔今輕軍討之進不可克退無所資不若步軍攻具一時俱徃世祖曰夫用兵之術攻城最下不得已而用之如其攻具一時俱徃賊必懼而堅守若攻不時拔則食盡兵疲外無所掠非上䇿也朕以輕騎至其城下彼先聞有步軍而徒見騎至必當心閑朕且羸師以誘之若得一戰擒之必矣所以然者軍士去家二千里復有黄河之難所謂置之死地而後生也以是決戰則有餘攻城則不足遂行次于黒水分軍伏於深谷而以少衆至其城下昌將狄子玉來降說昌使人追其弟定定曰城既堅峻未可攻拔待擒斤等然後徐徃内外撃之何有不濟昌以為然世祖惡之退軍城北示昌以弱遣永昌王健及娥清等分騎五千西掠居民會軍士負罪亡入昌城言官軍糧盡士卒食菜輜重在後步兵未至撃之為便昌信其言引衆出城步騎三萬司徒長孫翰等言昌歩陳難陷宜避其鋒且縱步兵一時奮擊世祖曰不然逺來求賊􅂲其不出今避而不擊彼奮我弱非計也遂收軍偽北引而疲之昌以為退鼓譟而前舒陳為翼行五六里世祖衝之賊陳不動稍復前行㑹有風起方術宦者趙倪勸世祖更待後日崔浩叱之世祖乃分騎為左右以掎之世祖墜馬賊已逼接世祖騰馬刺殺其尚書斛黎又殺騎賊十餘人流矢中掌奮擊不輟昌軍大潰不及入城奔於上邽遂克其城初屈孑性奢好治宫室城髙十仭基厚三十歩上廣十歩宫墻五仞其堅可以礪刀斧臺榭髙大飛閣相連皆彫鏤圖畫被以綺繡飾以丹青窮極文采世祖顧謂左右曰蕞爾小國而用民如此雖欲不亡其可得乎後侍御史安頡擒昌世祖使侍中古弼迎昌至京師舎之西宫門内給以乘輿之副又詔昌尚始平公主假常忠將軍㑹稽公封為秦王坐謀反伏誅昌弟定小字直獖屈孑之第五子凶暴無賴昌敗定奔於平凉自稱尊號改年勝光定登隂槃山望其本國泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與諸卿建季興之業俄而有羣狐百數鳴於其側定命射之無所獲定惡之曰此亦大不臧咄咄天道復何言哉與劉義隆連和遥分河北自恒山以東屬義隆恒山以西屬定遣其將㓂麟城始平公隗歸討破之定又將數萬人東擊歸世祖親率輕騎襲平凉定救平凉方陳自固世祖四面圍之斷其水草定不得水引衆下原詔武衛將軍丘眷擊之衆潰定被創單騎遁走收其餘衆乃西保上邽神䴥四年為吐谷渾慕璝所襲擒定送京師伏誅徒河慕容廆字弈洛􅅛其本出於昌黎曽祖莫護跋魏初率諸部落入居遼西從司馬宣王討平公孫淵拜率義王始建國於棘城之北祖木延從母丘儉征髙麗有功加號左賢王父涉歸以勲進拜鮮卑單于遷邑遼東涉歸死廆代領部落以遼東僻逺徙於徒河之青山穆帝之世頗為東部之患左賢王普根擊走之乃修和親晉愍帝拜廆鎮軍將軍昌黎遼東二國公平文之末廆復侵東部擊破之王浚稱制以廆為散騎常侍冠軍將軍前鋒大都督大單于廆以非王命所授拒之廆死子元真代立元真小字萬年名犯恭宗廟諱元真既襲弟仁叛於遼東之平郭與元真相攻元真討斬之乃號年為元年自稱燕王置官如魏武輔漢故事石虎率衆伐元真元真擊走之建國二年帝納元真女為后元真襲石虎至於髙陽掠徙幽冀二州三萬户而還四年元真遣使朝貢城和龍城而都焉元真征髙麗大破之遂入丸都掘髙麗王釗父利墓載其屍并其母妻珍寳掠男女五萬餘口焚其宫室毁丸都而歸釗單馬遁走後稱臣於元真家於昌黎元真死子儁統任儁字宣英既襲位號年為元年聞石氏亂乃礪甲嚴兵將為進取之計鑿山除道入自盧龍剋薊城而都之進剋中山常山大破冉閔於魏昌廉臺擒之閔太子叡固守鄴城進師攻鄴剋之建國十五年儁僭稱皇帝置百官號年元璽國稱大燕郊祀天地十六年遣使朝貢儁自薊遷都於鄴號年為光夀儁死子暐統任暐字景茂儁之第三子也既僭立號年建熙暐政無綱紀時人知其將滅有神降於鄴自稱湘女有聲與人相接數日而去僭晋將桓温率衆伐暐至於枋頭暐叔父垂擊走之垂有大功暐不能賞方欲殺之垂怒奔苻堅堅遣將王猛伐鄴擒暐封新興侯後拜尚書太祖之七年苻堅敗於淮南垂叛攻苻丕於鄴暐弟濟北王泓先為北地長史聞垂攻鄴亡奔闗東收諸馬牧鮮卑衆至數千還屯華隂暐乃潛使諸弟及宗人起兵於外堅遣將軍張永步騎五千擊之為泓所敗泓衆遂盛自稱使持節大都督陜西諸軍事大將軍雍州牧濟北王推垂為丞相都督陜東諸軍事領大司馬冀州牧吳王堅遣子鉅鹿公叡伐泓泓弟中山王沖先為}
