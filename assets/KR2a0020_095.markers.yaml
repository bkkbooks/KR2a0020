  - {type: variant, offset: 375, length: 0, content: '', krp: 收集離散比至洛陽衆十餘萬行未及關垂有貳志說堅請廵撫燕代并求拜墓許之垂遂殺堅驍騎将軍石越鎮軍将軍毛當引丁零之衆攻堅子長樂公丕於鄴慕容泓沖起兵華澤堅遣子叡暉前後擊泓為泓所敗長安鬼夜哭三旬沖又撃殺堅}
  - {type: variant, offset: 376, length: 2, content: 就法, WYG: 姜宇於灞上遂屯阿房進逼長安堅登城觀之歎曰此虜何從而出其彊若斯大言責沖曰爾軰羣奴正可牧牛羊何為送死沖曰奴則奴矣既厭奴苦取爾見代堅遣使送錦袍一領遺沖使者稱有詔古人兵交使在其間卿逺来草創得無勞乎今送一袍以明本懐朕於卿恩分如何而於一朝忽為此變沖命詹事答之亦稱皇太弟有令孤今心在天下豈顧一袍小恵茍能知命便可君臣束手早送皇帝自當寛貸苻氏以酬曩好終不使既徃之事獨美於前堅大怒曰朕不用王景略陽平公之言使白虜敢至於此長安大饑人民相食姚萇叛於北地與沖連和合攻長安有羣烏數萬鳴於長安城上其聲甚悲占者以為不終年有甲兵入城之象每夜有人周城大呼曰楊定健兒應屬我宫殿臺觀應坐我父子同出不共汝旦遣尋求不見人跡先是又謡曰堅入五将山長得堅大信之告其太子永道曰天或導余脱如謡言留汝兼總戎政勿與賊争利吾當出隴收兵運糧以給汝天其或者正訓予}
