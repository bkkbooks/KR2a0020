  - {type: variant, offset: 352, length: 0, content: '', krp: 永黄門郎沖毒暴關中人民流散道路斷絶千里無煙及堅出如五將山沖入長安縱兵大掠死者不可勝計初堅之未亂也關中土然無火而煙氣大起方數十里月餘不滅堅每臨聴訟觀令民有怨者舉煙於城北觀而録之長安為之語曰欲得必存當舉煙闗中謡曰長鞘馬鞭擊左股太嵗南行當復虜西人呼徒河為白虜沖果據長安樂之忘歸且以慕容垂威名夙著跨據山東憚不敢進課農築室為久安之計衆咸怨之登國元年沖左將軍韓延因民之怨殺沖立沖將段随為燕王改年昌}
  - {type: variant, offset: 353, length: 0, content: '', WYG: 沖之入長安王嘉謂之曰鳯皇鳯皇何不髙飛還故鄉無故在此取滅亡沖敗其左僕射慕容恒與永潛謀襲殺段随立宜都王子覬為燕王號年建明率鮮卑男女三十餘萬口乘輿服御禮樂器物去長安而東以永為武衛將軍恒弟護軍將軍韜隂有貳志誘覬殺之于臨晉恒怒去之永與武衛將軍刁雲率衆攻韜韜遣司馬宿勤黎逆戰永執而戮之韜懼出奔恒營恒立慕容沖子望為帝號年建平衆􅊖去望奔永永執望殺之立慕容泓之子忠為帝改年建武忠以永為太尉守尚書令封河東公至聞嘉知慕容垂稱尊號託以農要弗集築燕熙城以自固刁雲等又殺忠推永為大都督大将軍大單于雍秦梁凉四州牧河東王稱藩於垂永以苻丕至平陽恐不能自固乃遣使求丕假道還東丕不許率衆討永永擊走之進據長子永僭稱帝號年中興垂攻丁零翟釗於滑臺釗請救於永永謀於衆尚書郎渤海鮑遵曰徐觀其敝卞莊之舉也中書侍郎太原張騰曰彊弱勢殊何敝之有不如救之成鼎峙之勢可引兵趣中山晝多疑兵夜倍其火彼必懼而還師我衝其前釗躡其後此天授之機不可失也永不從釗敗降永永以釗為車騎大将軍東郡王嵗餘謀殺永永誅之垂遣其龍驤将軍張崇攻永弟武鄉公友於晉陽永遣其尚書令刁雲率衆五萬屯潞川垂停鄴月餘不進永乘詭道伐之乃攝諸軍還於太行軹關垂進師入自木井關攻永從子征東将軍小逸豆歸鎮}
