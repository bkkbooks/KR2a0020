  - {type: variant, offset: 341, length: 0, content: '', WYG: 堅還復其國復附於堅雖於國貢使不絶而誠敬有乖帝討衛辰大破之收其部落十六七焉衛辰奔苻堅堅送還朔方遣兵戍之昭成末衛辰導苻堅來㓂南境王師敗績堅遂分國民為二部自河以西屬之衛辰自河以東屬之劉庫仁語在燕鳯𫝊堅後以衛辰為西單于督攝河西雜類屯代來城慕容永之據長子拜衛辰使持節都督河西諸軍事大將軍朔州牧居朔方姚萇亦遣使結好拜衛辰使持節都督}
