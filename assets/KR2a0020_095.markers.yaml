  - {type: variant, offset: 5, length: 0, content: '', WYG: 三匈奴劉聰羯胡石勒鐵弗劉虎徒河慕容廆臨渭氐苻健羌姚萇略陽氐呂光夫帝皇者配徳兩儀家有四海所謂天無二日土無二王者也三代以徃守在海外秦吞列國漢并天下逮桓靈失政}
