  - {type: variant, offset: 356, length: 0, content: '', WYG: 王次多於臺壁永遣其從兄太尉大逸豆歸救次多等垂將平規擊破之永率衆五萬與垂戰於臺壁南為垂所敗奔還長子嬰城固守大逸豆歸部將濳為内應垂勒兵密進永奔北門為前驅所獲垂數而戮之并斬永公卿已下刁雲大逸豆歸等三十餘人永所統新舊民户及服御圖書器樂珍寳垂盡獲之垂字道明元真苐五子也甚見寵愛常目而謂諸弟曰此兒濶達好竒終能破人家或能成人家故名霸字道業恩遇踰於儁故儁不能平之及即王位以垂墜馬傷齒改名為􅆙外以慕郤􅆙為名内實惡之尋以讖記之文乃去夬以垂為名焉年十三為偏将所在征伐勇冠三軍儁平中原垂為前鋒累戰有大功及僭尊號拜黄門郎出為安東冀州牧封吳王以侍中右禁將軍録留臺事鎮龍城大收東北之和歴位鎮東平州征南大將軍荆兖二州牧司𨽻校尉以車騎大将軍敗桓温於枋頭威名大震不容於暐西奔苻堅堅甚重之拜冠軍將軍封賔都侯堅敗於淮南入於垂軍子寳勸垂殺之垂以堅遇之厚也不聴行至洛陽請求拜墓許之遂起兵攻苻丕於鄴乃引漳水以灌之不沒者尺餘丁零翟斌怨垂使人夜徃決堰水潰故鄴不拔垂稱燕王置百官年號燕元引師去鄴開苻丕西歸之路丕固守鄴城請援於司馬昌明垂怒曰苻丕吾縱之不能去方引南賊䂓固鄴都不可置也乃復進師丕乃棄鄴奔并州垂以兄子魯陽王和為南中郎将鎮鄴垂}
