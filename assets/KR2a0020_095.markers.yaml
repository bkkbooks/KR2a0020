  - {type: variant, offset: 1988, length: 216, content: 騎掩久弗能獲行者患焉赦提設防遏追窮之計宰司善之以赦提為逐賊軍將乃求驍勇追之未幾而獲虎子豹子及其黨與盡送京師斬於闕下自是清靜其靈丘羅思祖宗門豪溢家處隘險多止亡命與之為劫顯祖怒之孥戮其家而思祖家黨相率寇盜赦提應募求捕逐乃以赦提為游徼軍將前後禽獲殺之略盡因而濫有屠害尤為忍酷既資前稱又藉此功除冠軍將軍幽州刺史假安喜侯赦提克己厲約遂有清稱後頗縱妻段氏多有受納令僧尼因事通請貪虐流聞中散李真香出使幽州採訪牧守政績真香驗案其罪赦提懼死欲逃其妻姑, WYG: ''}
