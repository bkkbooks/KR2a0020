  - {type: variant, offset: 351, length: 0, content: '', krp: 家泓當率關中燕人翼衛皇帝還返鄴都與秦以虎牢為界分王天下永為鄰好不復為秦之患也堅怒責暐曰卿雖曰破滅其實若歸奈何因王師小敗猖悖若是泓書如此卿欲去者朕當相資暐叩頭流血涕泣陳謝堅久之曰此自三豎之罪非卿之過復其位待之如初命暐以書招喻垂及泓沖使息兵還長安恕其反叛之咎而暐密遣使謂泓曰今秦數已終社稷不輕勉建大業可以吳王為大將軍領司徒承制封拜聴吾死問汝便即尊位泓於是進向長安年號燕興泓謀臣髙蓋宿勤崇等以泓徳望後沖且持法苛峻乃殺泓立沖為皇太弟承制行事置百官沖去長安二百里堅遣子平原公暉拒之沖大破暉軍進據阿房初堅之滅燕沖姉清河公主年十四有殊色納之寵冠後庭沖年十二亦有龍陽之姿堅又幸之姉弟專寵宫人莫進長安歌之曰一雌復一雄雙飛入紫宫咸懼為亂王猛切諫堅乃出沖及其母卒葬之以燕后之禮長安又謡曰鳯皇鳯皇止阿房堅以鳯皇非梧桐不棲非竹實不食乃蒔梧竹數十萬株于阿房城以待鳯皇之至沖小字鳯皇至是終為堅賊入止阿城焉暐入見堅稽首謝曰弟沖不識義方孤背國恩臣罪應萬死陛下垂天地之容臣蒙更生之恵臣二子昨婚明當三日愚欲暫屈鑾駕幸臣私第堅許之暐出術士王嘉曰椎蘆作籧篨不成文章㑹天大雨不得殺羊言暐將殺堅而不果也堅與羣臣莫之能觧是夜大雨晨不果出初暐之遣諸弟起兵於外也謀欲伏兵請堅殺之時鮮卑在城者猶有千餘人暐令其帥悉羅騰屈突鐵侯等潛告之曰官今使吾外鎮聴舊人悉随可於某日㑹集某處鮮卑信之北部人突賢之妹為堅左將軍竇衝小妻賢與妹别妹請衝留其兄衝馳入白堅堅大驚召騰問之騰具首服乃誅暐父子及其宗族城内鮮卑無少長男女皆殺之廆弟運運孫永永字叔明暐既為苻堅所并永徙於長安家貧夫妻常賣鞾於市及暐為堅所殺也沖乃自稱尊號以永為小將沖與左將軍茍池大戰於驪山永力戰有功斬池等數千級堅大怒復遣領軍將軍楊定率左右精騎二千五百擊沖大敗之俘掠鮮卑萬餘而還堅􅊖坑之又敗沖右僕射慕容憲於㶚滻之間定果勇善戰沖深惮之納永計穿馬埳以自固}
  - {type: variant, offset: 352, length: 0, content: '', WYG: 永黄門郎沖毒暴關中人民流散道路斷絶千里無煙及堅出如五將山沖入長安縱兵大掠死者不可勝計初堅之未亂也關中土然無火而煙氣大起方數十里月餘不滅堅每臨聴訟觀令民有怨者舉煙於城北觀而録之長安為之語曰欲得必存當舉煙闗中謡曰長鞘馬鞭擊左股太嵗南行當復虜西人呼徒河為白虜沖果據長安樂之忘歸且以慕容垂威名夙著跨據山東憚不敢進課農築室為久安之計衆咸怨之登國元年沖左將軍韓延因民之怨殺沖立沖將段随為燕王改年昌}
