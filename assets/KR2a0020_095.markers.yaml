  - {type: variant, offset: 837, length: 737, content: 赤葩渴郎羌深居山谷雖相羈縻王人罕到洪之芟山為道廣十餘步示以軍行之勢乃興軍臨其境山人驚駭洪之將數十騎至其里閭撫其妻子問所疾苦因資遺之衆羌喜悅求編課調所入十倍於常洪之善御戎夷頗有威惠而刻害之聲聞於朝野初洪之微時妻張氏助洪之經營資產自貧至貴多所補益有男女幾十人洪之後得劉氏劉芳從妹洪之欽重而疏薄張氏為兩宅別居偏厚劉室由是二妻妬競互相訟詛兩宅母子往來如讎及莅西州以劉自隨洪之素非廉清每多受納時高祖始建祿制法禁嚴峻司察所聞無不窮糾遂鎖洪之赴京高祖臨太華庭集羣官有司奏洪之受贓狼藉又以酷暴高祖親臨數之以其大臣聽在家自裁洪之志性慷慨多所堪忍疹疾灸療艾炷圍將二寸首足十餘處一時俱下而言笑自若接賓不輟及臨自盡沐浴換衣防卒扶持將出却入遍遶家庭如是再三泣歎良久乃臥而引藥始洪之託為元后兄公私自同外戚至此罪後高祖乃稍對百官辨其誣假而諸李猶善相視恩紀如親洪之始見元后計年為兄及珍之等至洪之以元后素定長幼其呼拜坐皆如家人暮年數延攜之宴飲醉酣之後攜之時或言及本末洪之則起而加敬笑語自若富貴赫弈當舅戚之家遂棄宗專附珍之等後頗存振本屬而猶不顯然劉氏四子長子神自有傳高遵字世禮勃海艹修人父濟滄水太守遵賤出兄矯等常欺侮之及父亡不令在喪位遵遂馳赴平城歸從祖兄中書令允允乃為遵父舉哀以遵為喪主京邑無不弔集朝貴咸識之徐歸奔赴免喪允為營宦路得補樂浪王侍郎遵感成益之恩事允如諸父涉歷文史頗有筆札進中書侍郎詣長安刊燕宣王廟碑進爵安昌子及新製衣冠高祖恭薦宗廟遵形貌莊潔音氣雄暢常兼太祝令跪贊禮事為俯仰之節粗合儀矩由是高祖識待之後與游明根高閭李沖入議律令親對御坐時有陳奏以積年之勞賜粟帛牛馬出為立忠將軍齊州刺史建節歷本州宗鄉改觀而矯等彌妬毀之遵性不廉清在中書時每假歸山東必借備騾馬將從百餘屯逼民家求絲縑不滿意則詬罵不去強相徵求旬, WYG: ''}
