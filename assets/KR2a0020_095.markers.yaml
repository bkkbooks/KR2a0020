  - {type: variant, offset: 2833, length: 274, content: 為景非直失於一人實毀朝則請還付外準行更量虛實靈太后令曰依駁更議元端臺龍上言竊惟諡者行之迹狀者迹之稱然尚書銓衡是司釐品庶物若狀與跡乖應抑而不受錄其實狀然後下寺依諡法準狀科上豈有捨其行迹外有所求去狀去稱將何所準檢祉以母老辭藩乃降手詔云卿綏撫有年聲實兼著安邊寧境實稱朝望及其歿也又加顯贈言祉誠著累朝效彰內外作牧岷區字萌之績驟聞詔冊褒美無替倫望然君子使人器之義無求備德有數德優劣不同剛而能克亦為德焉謹依諡法布德行剛曰景謂前議為允司徒右長史張烈主簿李瑒刺稱案祉歷宦累朝當官之稱委捍西南邊隅靖遏準行易名奬誡攸在竊謂無虧體例尚書李韶又述奏以府寺為允靈太后可其奏祉, WYG: 光擊破熙軍遂入姑臧斬熙}
