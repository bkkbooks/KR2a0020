  - {type: variant, offset: 6, length: 10, content: 列傳酷吏第七十七于洛, WYG: 州瓦裂曹武削平宼難魏文奄有中原於是偽孫假命於江吳僭劉盜名於岷蜀何則戎方椎髻之帥夷俗斷髪之魁世崇凶徳罕聞王道扇以跋扈忻從放命加以中州避地華士違讎思託號令之聲念邀風塵之際因虞候隙仍相君長偷名竊位脅息一隅至乃指言井絡假上帝之祉妄說黄旗云人君之氣論土不出江漢語地僅接襃斜而謂握皇符秉帝籍三分鼎立比蹤王者溺人必笑其在兹乎若是鱉靈可擬於周王夫差容比於漢祖尉他定黄屋之尊子陽成綰璽之貴豈其然哉及鍾會一將之威士治偏師之勢而使騾車西至}
