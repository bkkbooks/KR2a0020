  - {type: variant, offset: 1577, length: 2, content: 縑布, WYG: 衆至十餘萬與慕容沖連和進屯北地苻堅出至五将山萇執而殺之登國元年僭稱皇帝置百官國號大秦年曰建初改長安曰常安以其太子興鎮長安自擊苻登安定敗之萇病夢苻堅将天官使者鬼兵數百突入營中萇懼走後宫宫人迎萇刺鬼誤中萇隂鬼相謂曰正中死處拔矛出血石餘寤而驚悸遂患隂腫醫刺之出血如夢萇乃狂言或稱臣或稱萇殺陛下者兄襄非臣之罪願不枉臣萇死子興襲位祕不發喪興字子略萇長子也既滅苻登乃發喪行服僭稱皇帝於槐里號年皇初天興元年興去皇帝之號降稱天王號年洪始興克洛陽以其弟東平公紹鎮之三年興遣使朝貢太祖遣謁者僕射張濟使於興興又大破乞伏乾歸遂入枹罕獲鎧馬六萬匹乾歸降於興太祖遣軍襲興髙平公沒弈干干棄部衆率數}
