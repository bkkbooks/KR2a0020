  - {type: variant, offset: 361, length: 0, content: '', krp: 遼西歸降太祖以懿為征東将軍平州牧昌黎王後坐反伏誅元真少子徳徳字元明雅為兄垂所重桓温之至枋頭也徳與垂擊走之苻堅滅暐以徳為張掖太守垂稱尊號封為范陽王拜車騎大将軍司𨽻校尉尋遷司徒寳既即位以徳鎮鄴後拜丞相寳既東走羣寮勸徳稱尊號徳不從皇始二年既拔中山太祖遣衛王儀攻鄴徳率户四萬南走滑臺自稱燕王號年為燕元置百官徳冠軍將軍苻廣叛於乞活壘徳留兄子和守滑臺率衆攻廣斬之而和長史李辯殺和以城來降徳無所據乃謀於衆其給事黄門侍郎張華勸徳取彭城而據之其尚書潘聰曰青齊沃壤號曰東秦土方二千里户餘十萬四塞之固負海之饒可謂用武之國宜攻取據之以為關中河内也徳從之引師克薛城徐兗之民盡附之以其南海王法為兗州刺史鎮梁父進克莒城以潘聰為徐州刺史鎮莒城北伐廣固司馬徳宗幽州刺史辟閭渾聞徳将至徙民八千餘户入廣固遣司馬崔誕率千餘人戍薄荀固平原太守張豁屯栁泉誕豁皆承檄遣子降徳渾懼擕妻子北走徳追騎斬之渾少子道秀自歸請與父俱死徳曰渾雖不忠而子能孝其特赦之徳入都廣固僭稱尊號號年建平女水竭徳聞而惡之因而寢疾兄子超請祈女水徳曰人君之命豈女水所知超固請終不許立超為太子徳死超僭立超字祖明徳兄北海王納之子也既僭位號年太上超青州刺史北地王鍾兗州刺史南海王法等起兵叛超超悉平之超南郊柴燎爓起而煙不出靈臺令張光告人曰今火盛而煙滅國其亡乎天賜五年司馬徳宗将劉裕伐超超將公孫五樓勸超拒之於大峴超曰但令度峴我以鐵騎踐之此成擒也太尉桂林王鎮曰若如聖㫖必須平原用馬便宜出峴逆戰戰而不勝猶可退守不宜縱敵自貽㓂逼臣以為天時不如地利拒之大峴䇿之上也超不從出而告人曰主上酷似劉璋今年國滅吾必死之超收鎮下獄裕入大峴超拒之於臨朐乃赦鎮而謝之超戰於臨朐為裕所敗退還廣固裕遂圍之廣固鬼夜哭有流星長十餘丈隕于廣固城潰裕執超送建康市斬之臨渭氐苻健字建業本出略陽臨渭祖懐歸為部落小帥父洪字廣世洪之生也隴右霖雨百姓苦之時有謡曰雨若不止洪水必起故名之曰洪年十二而父死為部帥羣氐推以為盟主劉曜拜洪為寧西将軍率義侯徙之髙陸進為氐王石虎平秦隴表石勒拜冠軍将軍涇陽伯又徙之枋頭遷光烈将軍進爵為侯稍遷冠軍大將軍進封西平公討平梁犢進位車騎大将軍開府儀同三司略陽公冉閔之亂秦雍徙民西歸憑洪為主衆至十餘萬自稱大将軍大單于三秦王既而為其将麻秋所鴆臨死謂健曰關中周漢舊都形勝之國進可以一同天下退不失保全秦雍吾死之後便可鼓行而西健從之健初名羆字世建又避石虎外祖張罷之名故改焉健便弓馬善於事人石虎深愛之歴位翼軍校尉鎮軍将軍時京兆杜洪竊據長安關中雄儁皆應之健密圖關中懼洪之知也乃繕宫室於枋頭課民種麥示無西意既而自稱征西大將軍雍州刺史盡衆西行至盟津起浮橋以濟遣弟輔國将軍雄率歩騎五千入自潼關兄子揚武將軍菁率衆七千自軹關入河東執菁手曰若事不㨗汝死河北我死河南不及黄泉無相見也濟訖焚橋自統大衆繼雄而進杜洪遣将軍張光逆健于潼關雄擊破之洪盡召關中之衆以拒健健聞而筮之遇泰之臨健曰小徃大來吉亨昔徃東而小今還西而大吉孰大焉諸君知不此則漢祖屠秦之機也健長驅至長安杜洪奔司竹健遂入都建國十四年乃僭稱天王號年皇始國號大秦置百官健尋自稱皇帝桓温率衆伐長安次于灞上健弟雄撃温破之温乃引衆東走健遣其太子萇追温比至潼關克敗之萇亦為流矢所中死關中大饑蝗虫生於華澤西至隴山百草皆盡牛馬至相噉毛虎狼食人行路斷絶十八年健死子生僭立生字長生健之第三子也幼而麤}
  - {type: variant, offset: 362, length: 1, content: 虐, WYG: 昏酒無賴祖洪甚惡之生無一目年七嵗洪戱之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪驚鞭之生曰性耐刀矟不堪鞭捶洪曰汝為爾不已吾将以汝為奴生曰可不如石勒也洪懼跣而掩其口謂健曰此兒狂悖宜早除之不然長大必破人家健欲殺之雄止之曰兒長成自當修改何至便如此健乃止及長力舉千鈞雄勇好殺手格猛獸走及奔馬撃刺騎射冠絶一時初健之長子死生母彊氏意在少子栁健以䜟有三羊五眼之言故立之生既僭立號年夀光雖在諒闇逰飲自若彎弓露刃以見朝臣錘鉗鋸鑿備置左右在位未㡬后妃公卿下至僕𨽻殺五百餘人朝饗羣臣酣飲奏樂生親歌以和之命其尚書令辛牢行酒既而生怒曰何不彊酒猶有坐者引弓射牢而殺之於是百僚大懼無不引滿汙服失冠生以為樂長安大風或稱賊至宫門晝閉五日乃止生推告賊者刳出心胃生舅彊平切諌生鑿其頂而殺之虎狼大暴從潼關至于長安晝則斷道夜則發屋不食六畜專以害人自其元年秋至于二年夏虎殺七百餘人民廢農桑内外忷懼其臣奏請禳災生曰野獸飢則食人飽當自止終不累年為患也天将助吾行誅以施刑教但勿犯罪何為怨天生如阿房遇人共妹行者逼令為滛固執弗從生怒殺之其尚書僕射賈元石形貌美偉生與妻樓上望見元石在庭中妻曰此何人也生曰汝欲得也乃誅𤣥石生嘗夜食棗過多至旦病使太醫程延診脉延曰陛下食棗多無他疾也生曰嘻汝非聖人焉知吾食棗乃殺之常從輿上溲便輦者謂之天雨生既眇其目所諱者不足不具少無缺傷殘毁偏隻之言皆不得道左右忤㫖而死者不可勝紀太白犯東井其臣奏曰東井秦也太白罰星必有暴兵起於京師生曰星入井者必將渴耳何所恠乎初生夢大魚食蒲又長安謡曰東海大魚化為龍男便為王女為公問在何所洛門東是月生以謡夢之故誅太師魚遵父子一十八人東海苻堅封也時為龍驤将軍宅在洛門之東又謡曰百里望空城鬱鬱何青青瞎人不知法仰不見天星於是􅊖壊諸空城以禳之法是苻法也生耽湎於酒無復晝夜其臣朝謁漏盡請見生曰日知盡乎須待飲訖因醉問左右曰吾統天下已來汝等何所聞乎或對曰聖明宰世子育百姓罰必有罪賞必有功天下唯歌太平未聞有怨生曰汝媚吾也引而斬之他日又問或對曰陛下}
