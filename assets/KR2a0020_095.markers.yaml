  - {type: variant, offset: 360, length: 0, content: '', krp: 上庸公慕容懿}
  - {type: variant, offset: 361, length: 0, content: '', WYG: 遼西歸降太祖以懿為征東将軍平州牧昌黎王後坐反伏誅元真少子徳徳字元明雅為兄垂所重桓温之至枋頭也徳與垂擊走之苻堅滅暐以徳為張掖太守垂稱尊號封為范陽王拜車騎大将軍司𨽻校尉尋遷司徒寳既即位以徳鎮鄴後拜丞相寳既東走羣寮勸徳稱尊號徳不從皇始二年既拔中山太祖遣衛王儀攻鄴徳率户四萬南走滑臺自稱燕王號年為燕元置百官徳冠軍將軍苻廣叛於乞活壘徳留兄子和守滑臺率衆攻廣斬之而和長史李辯殺和以城來降徳無所據乃謀於衆其給事黄門侍郎張華勸徳取彭城而據之其尚書潘聰曰青齊沃壤號曰東秦土方二千里户餘十萬四塞之固負海之饒可謂用武之國宜攻取據之以為關中河内也徳從之引師克薛城徐兗之民盡附之以其南海王法為兗州刺史鎮梁父進克莒城以潘聰為徐州刺史鎮莒城北伐廣固司馬徳宗幽州刺史辟閭渾聞徳将至徙民八千餘户入廣固遣司馬崔誕率千餘人戍薄荀固平原太守張豁屯栁泉誕豁皆承檄遣子降徳渾懼擕妻子北走徳追騎斬之渾少子道秀自歸請與父俱死徳曰渾雖不忠而子能孝其特赦之徳入都廣固僭稱尊號號年建平女水竭徳聞而惡之因而寢疾兄子超請祈女水徳曰人君之命豈女水所知超固請終不許立超為太子徳死超僭立超字祖明徳兄北海王納之子也既僭位號年太上超青州刺史北地王鍾兗州刺史南海王法等起兵叛超超悉平之超南郊柴燎爓起而煙不出靈臺令張光告人曰今火盛而煙滅國其亡乎天賜五年司馬徳宗将劉裕伐超超將公孫五樓勸超拒之於大峴超曰但令度峴我以鐵騎踐之此成擒也太尉桂林王鎮曰若如聖㫖必須平原用馬便宜出峴逆戰戰而不勝猶可退守不宜縱敵自貽㓂逼臣以為天時不如地利拒之大峴䇿之上也超不從出而告人曰主上酷似劉璋今年國滅吾必死之超收鎮下獄裕入大峴超拒之於臨朐乃赦鎮而謝之超戰於臨朐為裕所敗退還廣固裕遂圍之廣固鬼夜哭有流星長十餘丈隕于廣固城潰裕執超送建康市斬之臨渭氐苻健字建業本出略陽臨渭祖懐歸為部落小帥父洪字廣世洪之生也隴右霖雨百姓苦之時有謡曰雨若不止洪水必起故名之曰洪年十二而父死為部帥羣氐推以為盟主劉曜拜洪為寧西将軍率義侯徙之髙陸進為氐王石虎平秦隴表石勒拜冠軍将軍涇陽伯又徙之枋頭遷光烈将軍進爵為侯稍遷冠軍大將軍進封西平公討平梁犢進位車騎大将軍開府儀同三司略陽公冉閔之亂秦雍徙民西歸憑洪為主衆至十餘萬自稱大将軍大單于三秦王既而為其将麻秋所鴆臨死謂健曰關中周漢舊都形勝之國進可以一同天下退不失保全秦雍吾死之後便可鼓行而西健從之健初名羆字世建又避石虎外祖張罷之名故改焉健便弓馬善於事人石虎深愛之歴位翼軍校尉鎮軍将軍時京兆杜洪竊據長安關中雄儁皆應之健密圖關中懼洪之知也乃繕宫室於枋頭課民種麥示無西意既而自稱征西大將軍雍州刺史盡衆西行至盟津起浮橋以濟遣弟輔國将軍雄率歩騎五千入自潼關兄子揚武將軍菁率衆七千自軹關入河東執菁手曰若事不㨗汝死河北我死河南不及黄泉無相見也濟訖焚橋自統大衆繼雄而進杜洪遣将軍張光逆健于潼關雄擊破之洪盡召關中之衆以拒健健聞而筮之遇泰之臨健曰小徃大來吉亨昔徃東而小今還西而大吉孰大焉諸君知不此則漢祖屠秦之機也健長驅至長安杜洪奔司竹健遂入都建國十四年乃僭稱天王號年皇始國號大秦置百官健尋自稱皇帝桓温率衆伐長安次于灞上健弟雄撃温破之温乃引衆東走健遣其太子萇追温比至潼關克敗之萇亦為流矢所中死關中大饑蝗虫生於華澤西至隴山百草皆盡牛馬至相噉毛虎狼食人行路斷絶十八年健死子生僭立生字長生健之第三子也幼而麤}
