  - {type: variant, offset: 357, length: 0, content: '', krp: 都中山登國元年垂僭稱大位號年為建興建宗廟社稷於中山盡有幽冀平州之地垂遣使朝貢三年太祖遣九原公儀使於垂垂又遣使朝貢四年太祖遣陳留公䖍使於垂又遣使朝貢五年又遣秦王觚使於垂垂留觚不遣遂絶行人垂議討慕容永太史令靳安言於垂曰彗星經尾箕之分燕當有野死之王不出五年其國必亡嵗在鶉火必克長子垂乃止安出而謂人曰此衆既并終不能久安意蓋知太祖之興也而不敢言先是丁零翟遼叛垂後遣使謝罪垂不許遼怒遂自號大魏天王有衆數萬屯於滑臺與垂相擊遼死子釗代之及垂征尅滑臺釗奔長子垂議征長子諸將咸諫以永國未有釁連嵗征役士卒疲怠請待他年垂將從之垂弟司徒范陽王徳固勸垂征垂曰司徒議與吾同二人同心其利斷金吾計决矣且吾投老叩囊底智足以克之不復留逆賊以累子孫垂率步騎七萬伐永剋之十年垂遣其太子寳来㓂時太祖幸河南宫乃進師臨河築臺告津奮揚威武連旌㳂河東西千有餘里是時陳留公䖍五萬騎在河東要山截谷六百餘里以絶其左太原公儀十萬騎在河北以承其後略陽公遵七萬騎塞其南路太祖遣捕寳中山行人一二盡擒馬歩無脫寳乃引船列兵亦欲南渡中流大風卒起漂寳船數十艘泊南岸擒其将士三百餘人太祖悉賜衣服遣還始寳之來垂已有疾自到五原太祖斷其行路父子問絶太祖乃詭其行人之辭令臨河告之曰汝父已死何不遽還兄弟聞之憂怖以為信然於是士卒駭動徃徃間言皆欲為變初寳至幽州其所乘車軸無故自折占工靳安以為大凶固勸令還寳怒不從至是問安安對曰今天變人事咎徴已集速去可免寳逾大恐安退而告人曰今皆將死於他鄉尸骸委於草野為烏鳥螻蟻所食不復見家矣冬十月寳燒船夜遁是時河氷未成寳謂太祖不能度故不設斥候十一月天暴風寒氷合太祖進軍濟河留輜重簡精銳二萬餘騎急追之晨夜兼行暮至參合陂西寳在陂東營於蟠羊山南水上靳安言於寳曰今日西北風勁是追軍将至之應宜設警備兼行速去不然必危寳乃使人防後先不撫循軍無節度将士莫為盡心行十餘里便皆解鞍寢卧不覺大軍在近前驅斥候見寳軍營還告其夜太祖部分衆軍相援諸将羅落東西為掎角之勢約勒士卒束馬口衘枚無聲昧爽衆軍齊進日出登山下臨其營寳衆晨将東引顧見軍至遂驚擾奔走太祖縱騎騰躡大破之有馬者皆蹶倒氷上自相鎮壓死傷者萬數寳及諸父兄弟單馬迸散僅以身免於是寳軍四五萬人一時放仗斂手就羈矣其遺迸去者不過千餘人生擒其王公文武将吏數千獲寳寵妻及宫人器甲輜重軍資雜財十餘萬計垂復欲來宼太史曰太白夕沒西方數日後見東方此為躁兵先舉者亡垂不從鑿山開道至寳前敗所見積骸如邱設祭弔之死者父兄子弟遂皆嘷哭聲震山川垂慙忿嘔血發病而還死於上谷寳僭立寳字道祐小字庫勾垂之第四子也少而輕果無志操好人佞已及為太子砥礪自修朝士翕然稱之垂亦以為克保家業垂妻段氏謂垂曰寳資質雍容柔而不斷承平則為仁明之主處難則非濟世之雄今託之以大業未見克昌之美遼西髙陽兒之賢者宜擇一以樹之趙王麟姦詐負氣常有輕寳之心恐必難作此自家事宜深圖之垂弗納寳聞之深以為恨寳既僭立年號永康遣麟逼其母段氏曰后常謂主上不能繼守大統今竟能不宜早自裁以全段氏段氏怒曰汝兄弟尚逼殺母安能保社稷吾豈惜死念國滅不久耳遂自殺寳議以后諌廢嫡統無母后之道不宜成䘮羣臣咸以為然寳中書令眭邃執意抗言寳從而止皇始元年太祖南伐及克信都寳大懼太祖軍於栢肆寳夜來犯營太祖擊破之寳走還中山率萬餘騎奔薊寳子清河王㑹先守龍城聞寳被圍率衆赴難逢寳於路寳分奪其軍以授弟遼西王農等㑹怒襲農殺之農弟髙陽王隆勸寳收㑹不獲㑹勒兵攻寳寳走龍城㑹追圍之侍御郎髙雲襲敗㑹㑹奔中山寳命雲為子封夕陽公㑹至中山為慕容普隣所殺寳率衆自龍城而南将攻中山衆憚征逃潰寳還龍城垂舅蘭汗拒之寳南走奔薊汗遣使誘迎寳寳殺之將南奔叔父范陽王徳聞徳稱制退濳辟陽汗復遣迎寳寳以汗垂之季舅子盛又汗之壻也必謂無二乃還龍城汗殺之及子弟等百餘人汗自稱大都督大單于昌黎王號年青龍以盛子壻哀而宥之盛字道運寳之長子也垂封為長樂公歴位散騎常侍左將軍寳既僭立進爵為王拜征北大将軍司𨽻校尉尚書左僕射蘭汗之殺寳也以盛為侍中左光禄大夫盛乃間汗兄弟使相疑害李早衛雙劉志張真等皆盛之舊昵汗太子穆並引為腹心盛要結早等因汗穆等酒醉夜襲殺之僭尊號改年為建平又號年為長樂盛改稱庶民大王盛以寳闇而不斷遂峻極威刑纎介嫌忌莫不裁之於未萌防之於未兆於是上下震局人不自安雖忠誠親戚亦僉懐離貳前将軍段璣等夜濳禁中鼓譟攻盛盛聞變起率左右出戰衆皆披潰俄有一賊闇中擊盛傷之遂輦昇殿申約禁衛召叔父河間公熙屬之未至而盛死熙字道文小字長生垂之少子也羣臣與盛伯母丁氏議以其家多難宜立長君遂廢盛子定迎熙而立之熙立殺定年號光始築龍騰苑廣袤十餘里役徒二萬人起景雲山於苑内基廣五百歩高十七丈又起逍遥宫甘露殿連房數百觀閣相交鑿天河渠引水入宫又為妻苻氏鑿曲光海清凉池季夏盛暑不得休息暍死者大半熙逰于城南止大栁樹下若有人呼曰大王且止熙惡之伐其樹下有蛇長丈餘熙盡殺寳諸子改年為建始又為其妻起承華殿負土於北門土與榖同價典軍杜静載棺詣闕上書極諌熙大怒斬之熙妻當季夏思凍魚鱠仲冬須生地黄皆下有司切責不得加之以大辟其虐也如此及苻氏死熙擁其屍而撫之曰體已就冷命遂斷矣於是僵仆絶息久而乃蘇悲號擗踴斬衰食粥大斂之後復啟而交接制百官哭臨沙門素服令有司案檢有淚者為忠孝無淚者罪之於是羣臣震懼莫不含辛以為淚焉及葬熙被髮徒跣歩從轜車高大毁城門而出長老相謂曰慕容氏自毁其門將不入矣中衛将軍馮跋兄弟閉門拒熙執而殺之立夕陽公雲為主雲寳之養子復姓高氏年號正始跋又殺雲自立雲之立也熙幽}
