  - {type: variant, offset: 2655, length: 2, content: 宗崩, WYG: 揚武將軍雷重等将士四千餘人随平投水太祖令泅水鈎捕無得免者平衆三萬餘人皆斂手受執擒興尚書右僕射狄伯友越騎校尉唐小方積弩将軍姚梁國建忠将軍雷星康官北中郎将康猥興從子伯禽已下四品将軍已上四十餘人興逺来赴救自觀其窮力不能免舉軍悲號震動山谷數日不止頻遣使請和太祖不許乃}
