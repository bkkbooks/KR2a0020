  - {type: variant, offset: 379, length: 0, content: '', WYG: 遣其衛将軍楊定擊沖於城西為沖所擒堅彌懼付永道以後事率騎數百出如五将宣告州郡期救長安月餘永道尋将母妻宗室男女數千騎出奔武都遂假道入司馬昌明慕容沖入據長安堅至五将山姚萇遣其将吳忠圍之堅衆奔散獨左右十數人神色自若坐而待之召宰人進食俄而兵至執堅及其夫人張氏與少女寳錦送詣姚萇萇囚之将害焉堅自以平生遇萇厚忿之厲聲大罵謂張氏曰豈令羌奴辱吾兒於是殺寳錦姚萇乃縊堅於新平佛寺永道既奔昌明處之江州桓元以為梁州刺史後為劉裕所誅永道名犯}
