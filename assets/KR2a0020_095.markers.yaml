  - {type: variant, offset: 2654, length: 0, content: '', WYG: 興衆怖擾太祖詔毗陵王順以精騎衝擊獲興甲騎數百斬首千餘級興退南走四十餘里太祖引還平竟不敢出但使人燒圍數百步而已太祖知興氣挫乃南絶䝉坑之口東杜新坂之隘守天度屯賈山令平水陸路絶将坐甲而擒之太祖又縁汾帶岡樹柵數十里以衛芻牧者九月興從汾西北下憑壑為壘以自固興又将數千騎乘西㟁闚視太祖營束栢材從汾上流下之欲以毁橋官軍鈎取以為薪蒸興還壘太祖度其必攻西圍乃命修塹増廣之至夜興果来攻梯短不及棄之塹中而還又分其衆臨汾為壘叩逼水門與平相望太祖因截水中興内外隔絶士衆喪氣於是平糧盡窘急夜􅊖衆将突西南而出興列兵汾西舉烽鼓譟為平接援太祖簡諸軍精銳屯汾西固守南橋絶塞水口興夜聞聲望平力戰突免平聞外鼓望興攻圍引接故但呌呼虚相應和莫敢逼圍平引不得出窮廹乃将二妾赴水而死興安逺将軍不蒙}
