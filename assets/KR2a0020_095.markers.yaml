  - {type: variant, offset: 365, length: 7, content: 酷濫受納貨賄徵, krp: 微過生曰汝謗吾也亦殺之使宫人與男女倮交於殿前引羣臣臨而觀之或生剝牛羊驢馬活燖雞豚鵝鴨數十為羣放之殿下剝人面皮令其歌舞勲舊親戚殺害略盡王公在者以疾告歸得度一日如過十年至於截脛刳胎拉脅鋸頸者動有千數生夜對侍婢曰阿法兄弟亦不可信明當除之旦而侍婢以告法與弟堅率壯士數百人入雲龍門宿衛者皆捨仗歸堅廢生為越王俄而殺之堅字永固一字文玉雄第二子也既殺苻生以位讓其兄清河王法法固以推堅於是去皇帝之號僭稱天王號年永興以法為丞相東海公尋以疑忌殺之改年為甘露時建國二十二年也堅從弟晋公栁反於蒲坂魏公庾反於陜燕公武反於安定堅弟趙公雙反於上邽皆討平之慕容垂奔於堅王猛勸堅殺之堅不從三十八年改為建元堅遣使牛恬朝貢使尚書令王猛伐鄴堅親率大衆以繼之克鄴擒慕容暐堅使其右将軍楊安攻克漢中仍平蜀又遣其武衛将軍茍萇西伐凉州降張天錫遣其子長樂公丕攻克襄陽堅觀其史書見母茍氏通李威之事慙怒乃焚其書堅南伐司馬昌明戎卒六十萬騎二十七萬前後千里旗鼓相望堅至項城凉州兵始達咸陽蜀漢之軍順流而下幽冀之衆至于彭城東西萬里水陸齊進運漕萬艘自河入石門逹于汝潁堅弟陽平公融攻夀春克之融馳使白堅曰賊少易俘但懼越逸宜速進軍堅大悅捨大軍于項城輕騎八千兼道赴之堅與融登城望昌明将謝石軍又望八公山上草木皆類人形顧謂融曰此亦勍敵也何謂少乎憮然有懼色謝石欲戰苻融陳逼肥水石遣使謂融曰君若小退師令将士周旋僕與君公緩轡而觀之不亦美也融於是麾軍却陳欲因其濟覆而取之軍遂奔退制之不可止融馬倒見殺軍遂大敗謝石乘勝追擊至于青岡死者相枕堅單騎遁}
