  - {type: variant, offset: 1660, length: 158, content: 行宮引見誚讓之遵自陳無負帝厲聲曰若無遷都赦必無高遵矣又卿非惟貪惏又虐於刑法謂何如濟陰王猶不免於法卿何人而為此行自今宜自謹約還州仍不悛革齊州人孟僧振至洛訟遵廷尉少卿劉述窮鞫皆如所訴先是沙門道登過遵遵以道登荷寵於高祖多奉以貨深託仗之道登屢因言次申啟救遵帝不省納遂詔述賜遵死時遵子元榮詣洛訟寃猶恃道登不時還赴道登知事決方乃, WYG: 永安平募}
