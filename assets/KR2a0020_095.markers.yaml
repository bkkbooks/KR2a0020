  - {type: variant, offset: 17, length: 0, content: '', krp: 蓋北首天人弗許斷可知焉晉年不永時逢䘮亂異類羣飛姦凶角逐内難興於戚屬外禍結於藩維劉淵一唱石勒繼響二帝沉淪兩都傾覆徒何仍釁氐羌襲梗夷楚喧聒於江淮}
