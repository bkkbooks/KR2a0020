  - {type: variant, offset: 428, length: 0, content: '', WYG: 馳使請命丕以登為征西大将軍開府儀同三司南安王餘因其所稱而授之後與姚萇戰于胡奴阜大破之丕死登國元年登僭稱尊號於隴東號年太初置百官立堅神主於軍中載以輜軿羽葆青蓋建黄旗虎賁之士三百人以衛之每戰必告繕甲治兵引師而東皆刻鉾鎧為死休字示以戰死為志每戰以長矛鈎刃為方圎大陳如有厚薄從中分配故人自為戰所向無前登每圍萇營四面大哭哀聲動人大呼曰殺君賊姚萇出來吾與爾決何為枉害無辜萇憚而不應登進攻安定萇襲其輜重獲登妻毛氏将妻之毛氏哭罵萇殺之登聞姚萇死喜曰姚興小兒吾将折杖以笞之乃盡衆而東以趣廢橋興将尹緯據橋待之争水不得為緯所敗奔於平凉入馬毛山姚興攻之登戰死子崇奔於湟中僭稱尊號改年延初尋為乞伏乾歸所殺羌姚萇字景茂出於南安赤亭燒當之後也祖柯回助魏将絆姜維於沓中以功假綏戎校尉西羌都督父弋仲晉永嘉之亂東徙榆眉劉曜以弋仲為平西将軍平襄公烈帝之五年弋仲率部衆随石虎遷于清河之灄頭勒以弋仲為奮武將軍封襄平公昭成時弋仲死子襄代屯於譙城慕容儁以襄為豫州刺史丹}
