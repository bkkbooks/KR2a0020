  - {type: variant, offset: 3455, length: 7, content: 昂襲祖爵酈道元, WYG: 諱以猜忌不容起兵攻纂纂殺之縱兵大掠纂笑謂左右曰今日之戰何如纂侍中房晷對曰先帝始崩太子以幽逼致殂山陵甫訖大司馬疑懼肆逆京邑交兵友于接刃雖洪自取夷滅亦由陛下無棠棣之義且洪妻陛下弟婦也洪女陛下之姪女也奈何使小人汙辱為婢妾天地神明豈忍見此因歔欷流涕纂謝之乃收洪妻子纂昏虐任情逰田無度耽荒酒色與左右因醉馳獵於坑澗之間或有諌者纂昏不納又性多猜忌忍於殺戮纂從弟超殺纂纂弟緯單馬入城超殺之而立其兄隆隆}
