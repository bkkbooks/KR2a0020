  - {type: variant, offset: 2247, length: 397, content: 此差自解慰段乃陳列真香昔嘗因假而過幽州知赦提有好牛從索不果今臺使心協前事故威逼部下拷楚過極橫以無辜證成誣罪執事恐有不盡使駕部令趙秦州重往究訊事伏如前處赦提大辟高祖詔賜死於第將就盡召妻而責之曰貪濁穢吾者卿也又安吾而不得免禍九泉之下當為仇讎矣又有華山太守趙霸酷暴非理大使崔光奏霸云不遵憲度威虐任情至乃手擊吏人僚屬奔走不可以君人字下納之軌物輒禁止在州詔免所居官羊祉字靈祐太山鉅平人晉太僕卿琇之六世孫也父規之宋任城令世祖南討至鄒山規之與魯郡太守崔邪利及其屬縣徐通愛猛之等俱降賜爵鉅平子拜雁門太守祉性剛愎好刑名為司空令輔國長史襲爵鉅平子侵盜公資私營居宅有司案之抵死高祖特恕遠徙後還景明初為將作都將加左軍將軍四年持節為梁州軍司討叛氐正始二年王師伐蜀以祉假節龍驤將軍益州刺史出劍閣而還又以本將軍為秦梁二州刺史加征虜將軍天性酷忍又不清潔坐掠人為奴婢為御史中尉王顯所彈免高肇南征祉復被起為光祿大夫假平南將軍持節領, WYG: ''}
