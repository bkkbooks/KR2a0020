  - {type: variant, offset: 3485, length: 270, content: 御史中尉李彪以道元秉法清勤引為治書侍御史累遷輔國將軍東荊州刺史威猛為治蠻民詣闕訟其刻峻坐免官久之行河南尹尋即真肅宗以沃野懷朔薄骨律武川撫冥柔玄懷荒禦夷諸鎮並改為州其郡縣戍名令準古城邑詔道元持節兼黃門侍郎與都督李崇籌宜置立裁減去留儲兵積粟以為邊備未幾除安南將軍御史中尉道元素有嚴猛之稱司州牧汝南王悅嬖近左右丘念常與臥起及選州官多由於念念匿於悅第時還其家道元收念付獄悅啟靈太后請全之敕赦之道元遂盡其命因以劾悅是時雍州刺史蕭寶夤反狀稍露悅等諷朝廷遣為關右大使遂為寶夤所害死於陰盤驛亭道元好學歷覽奇書撰注水經四十卷本志十三篇又為七聘及諸文皆行於世然, WYG: 君}
