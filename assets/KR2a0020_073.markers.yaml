  - {type: variant, offset: 5689, length: 222, content: 聰善於去就知肇嫌之側身承奉肇遂待之如舊聰在并州數歲多不率法又與太原太守王椿有隙再為大使御史舉奏肇每以宗私相援事得寢緩世宗末拜散騎常侍平北將軍肅宗踐祚以其素附高肇出為幽州刺史將軍如故尋以高肇之黨與王世義高綽李憲崔楷蘭氛之為中尉元匡所彈靈太后並特原之聰遂停廢于家斷絕人事唯修營園果以聲色自娛久之拜光祿大夫加安北將軍聰心望中書令然後出作青州願竟不果正光元年夏卒年六十九靈太后聞其病遣主書問之聰對使者歔欷慟泣及聞其亡嗟悼良久言朕既無福大臣殞喪且其與朕父, WYG: 曹敬}
