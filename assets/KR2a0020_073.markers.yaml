  - {type: variant, offset: 4236, length: 0, content: '', WYG: 将軍為别将與都督邢巒討破之遂乘勝長驅與中山王英同圍鍾離大眼軍城東守淮橋東西二道屬水汛長大眼所綰統軍劉神符公孫祉兩軍夜中争橋奔退大眼不能禁相㝷而走坐徙為營州兵永平中世宗追其前勳起為試守中山内史時高肇征蜀世宗慮蕭衍侵軼徐揚乃徴大眼為太尉長史持節假平南将軍東征别将𨽻都督元遥遏禦淮肥大眼至京師時人思其雄勇喜其更用臺省閭卷觀者如市大眼次譙南世宗崩時蕭衍遣将康絢扵浮山遏淮規浸夀春詔加大眼光禄大夫率諸軍鎮荆山復其封邑後與蕭寳夤俱徃淮堰不能剋遂扵堰上流鑿渠决水而還加平東将軍大眼善騎乘装束雄竦擐甲折旋見稱當世撫廵士卒呼為兒子及見傷痍為之流泣自為將帥恒身先兵士衝突堅陳出入不疑當其鋒者莫不摧拉南賊前後所遣督将軍未渡江預皆畏懾𫝊言淮泗荆沔之間有童兒啼者恐之云楊大眼至無不即止王肅弟子秉之初歸國也謂大眼曰在南聞君之名以為眼如車輪及見乃不異人大眼曰旗鼓相望瞋眸奮發足使君目不能視何必大如車輪當世推其驍果皆以為闗張弗之過也然征淮堰之役喜怒無常捶撻過度軍士頗憾焉識者以為性侈所致又以本}
