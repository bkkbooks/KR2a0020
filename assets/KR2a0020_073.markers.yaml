  - {type: variant, offset: 9, length: 0, content: '', WYG: 六十一奚康生楊大眼崔延伯奚康生河南洛陽人其先代人也世為部落大夫祖直平逺将軍柔𤣥鎮将入為鎮北大将軍内外三都大官賜爵長進侯卒贈幽州刺史謚曰簡父普憐不仕而卒太和十一年蠕蠕頻來寇邊柔𤣥鎮都将李兠討擊之康生性驍勇有武藝弓力十石矢異常箭為當時所服從兠為前驅軍主頻戰陷陳壮氣有聞由是為宗子隊主從駕征鍾離駕旋濟淮}
  - {type: page-break, offset: 9, content: '', id: KR2a0020_WYG_073-1b, image: WYG0262/WYG0262-0103d.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 六十一奚康生楊大眼崔延伯奚康生河南洛陽人其先代人也世為部落大夫祖直平逺将軍柔𤣥鎮将入為鎮北大将軍内外三都大官賜爵長進侯卒贈幽州刺史謚曰簡父普憐不仕而卒太和十一年蠕蠕頻來寇邊柔𤣥鎮都将李兠討擊之康生性驍勇有武藝弓力十石矢異常箭為當時所服從兠為前驅軍主頻戰陷陳壮氣有聞由是為宗子隊主從駕征鍾離駕旋濟淮}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 将未渡蕭鸞遣将率衆據渚邀斷津路髙祖勅曰能破中渚賊者以為直閤将軍康生時為軍主謂友人曰如其剋也得暢名績脫若不㨗命也在天丈夫今日何為不决遂便應募縛筏積柴因風放火燒其船艦依烟直進飛刀亂斫投河溺死者甚衆乃假康生直閤将軍後以勲除中堅将軍太子三校西臺直後吐京胡反自號辛支王康生為軍主從章武王彬討之胡遣精騎一千邀路斷截康生率五百人拒戰破之追至石羊城斬首三}
  - {type: page-break, offset: 10, content: '', id: KR2a0020_WYG_073-2a, image: WYG0262/WYG0262-0104a.png}
  - {type: variant, offset: 10, length: 0, content: '', krp: 将未渡蕭鸞遣将率衆據渚邀斷津路髙祖勅曰能破中渚賊者以為直閤将軍康生時為軍主謂友人曰如其剋也得暢名績脫若不㨗命也在天丈夫今日何為不决遂便應募縛筏積柴因風放火燒其船艦依烟直進飛刀亂斫投河溺死者甚衆乃假康生直閤将軍後以勲除中堅将軍太子三校西臺直後吐京胡反自號辛支王康生為軍主從章武王彬討之胡遣精騎一千邀路斷截康生率五百人拒戰破之追至石羊城斬首三}
  - {type: variant, offset: 11, length: 3, content: 六甄琛, WYG: 級彬甲卒七千與胡對戰分為五軍四軍俱敗康生軍獨全遷為統軍率精騎一千追胡至車突谷詐為墜馬胡皆謂死争欲取之康生騰騎奮矛殺傷數十人胡遂奔北辛支輕騎退走去康生百餘歩彎弓射之應弦而死因俘其牛羊駝馬以萬數蕭鸞置義陽招誘邊民康生復為統軍從王肅討之進圍其城鸞将張伏䕶自昇城樓言辭不遜肅令康生射之以彊弓大箭望樓射窻扉開即入應箭而斃彼民見箭皆云狂弩以殺伏護賞帛一千匹又頻戰再退其軍賞三階帛五百匹蕭寳卷将裴叔業率衆圍渦陽欲觧義陽之急詔遣}
  - {type: page-break, offset: 11, content: '', id: KR2a0020_WYG_073-2b, image: WYG0262/WYG0262-0104b.png}
