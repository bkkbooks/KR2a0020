  - {type: variant, offset: 3469, length: 610, content: 遣舍人慰其諸子琛性輕簡好嘲謔故少風望然明解有幹具在官清白自高祖世宗咸相知待肅宗以師傅之義而加禮焉所著文章鄙碎無大體時有理詣磔四聲姓族廢興會通緇素三論及家誨二十篇篤學文一卷頗行於世琛長子侃字道正郡功曹釋褐祕書郎性險薄多與盜劫交通隨琛在京以酒色夜宿洛水亭舍毆擊主人為司州所劾淹在州獄琛大以慚慨廣平王懷為牧與琛先不協欲具案窮推琛託左右以聞世宗遣白衣吳仲安敕懷寬放懷固執治之久乃特旨出之侃自此沉廢卒於家侃弟楷字德方粗有文學頗習吏事太平中上高祖頌十二篇文多不載優詔報之琛啟除祕書郎世宗崩未葬楷與河南尹丞張普惠等飲戲免官任城王澄為司徒引為公曹參軍稍遷尚書儀曹郎有當官之稱肅宗末定州刺史廣陽王淵被徵還朝時楷丁憂在鄉淵臨發召楷兼長史委以州任尋值鮮于脩禮毛普賢等率北鎮流民反於州西北之左人城屠村掠野引向州城州城之內先有燕雲三州避難之戶皆依傍市草廬𤺥住脩禮等聲云欲收此輩共為舉動既外寇將逼恐有內應楷見人情不安慮有變起乃收州人中粗豪者皆殺之以威外賊固城民之心及刺史元固大都督楊津等至楷乃還家後脩禮等忿楷屠害北人遂掘其父墓載棺巡城示相報復孝莊時徵為中書侍郎尒朱榮之死帝以其堪率鄉義除試守常山太守賜絹二百匹出帝初除征東將軍金紫光祿大夫遷衞將軍右光祿大夫齊文襄王取為儀同府諮議參軍天平四年卒年四十六贈驃騎將軍祕書監滄州刺史楷弟寬字仁規自員外散騎侍郎本州別駕稍遷太尉從事中郎治書侍御史武定初謝病還鄉卒於家僧林終於鄉里琛從父弟密字叔雍清謹少嗜欲頗涉書史, WYG: 切}
