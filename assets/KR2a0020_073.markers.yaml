  - {type: variant, offset: 1588, length: 1109, content: 御史中尉甄琛身居直法糾摘是司風邪響黷猶宜劾糾況趙脩奢暴聲著內外侵公害私朝野切齒而琛嘗不陳奏方更往來綢繆結納以為朋黨中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之祿虧先皇之選典塵聖明之官人又與武衞將軍黃門郎李憑相為表𩹉憑兄叨封知而不言及脩釁彰方加彈奏生則附其形勢死則就地排之竊天之功以為己力仰欺朝廷俯罔百司其為鄙詐於茲甚矣不實不忠實合貶黜謹依律科徒請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李憑朋附趙脩是親是仗交遊之道不依度或晨昏從就或吉凶往來至乃身拜其親妻見其子每有家事必先請託緇點皇風塵鄙正化此而不糾將何以肅整阿諛奬厲忠概請免所居官以肅風軌奏可琛遂免歸本郡左右相連死黜者三十餘人始琛以父母年老常求解官扶侍故高祖授以本州長史及貴達不復請歸至是乃還供養數年遭母憂母鉅鹿曹氏有孝性夫氏去家路踰百里每得魚肉菜果珍美口實者必令僮僕走奉其母乃後食焉琛母服未闋復喪父琛於塋兆之內手種松栢隆冬之月負掘水土鄉老哀之咸助加力十餘年中墳成木茂與弟僧林誓以同居沒齒專事產業躬親農圃時以鷹犬馳逐自娛朝廷有大事猶上表陳情久之復除散騎常侍領給事黃門侍郎定州大中正大見親寵委以門下庶事出參尚書入厠帷幄琛高祖時兼主客郎迎送蕭賾使彭城劉穓琛欽其器貌常歎詠之穓子晣為朐山戍主晣死家屬入洛有女年未二十琛已六十餘矣乃納晣女為妻婚日詔給費琛深所好悅世宗時調戲之盧昶敗於朐山詔琛馳驛檢按遷河南尹加平南將軍黃門中正如故琛表曰詩稱京邑翼翼四方是則者京邑是四方之本安危所在不可不清是以國家居代患多盜竊世祖太武皇帝親自發憤廣置主司里宰皆以下代令長及五等散男有經略者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都已來天下轉廣四遠赴會事過代都五方雜沓難可備簡寇盜公行劫害不絕此由諸坊混雜釐比不精主司闇弱不堪檢察故也凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精銳無以治之今擇尹既非南金里尉鉛刀而割欲望清肅都邑不可得也里正乃流外四品職輕任碎多是下才人懷苟且不能督察故使盜得容姦百賦失理邊外小縣所領不過百戶而令長皆以將軍居之京邑諸坊大者或千戶五百戶其中皆王公卿尹貴勢姻戚豪猾僕隸蔭養姦徒高門邃宇不可干問又有州郡俠客蔭結貴遊附黨連羣陰為市劫比之邊縣難易不同今難彼易此實為未愜王者立法隨時從宜改弦易調明主所急先朝立品不必即定施而觀之不便則改今閑官靜任猶聽長兼況煩劇要務不得簡能下領請取武官中八品將軍已下幹用貞濟者以本官俸恤領里尉之任各食其祿高者領六部尉中者領經途尉下者領里正不爾請少高里尉之品選下品中應遷之者進而為之則督責有所輦轂可清詔曰里正可進至勳品經途從九品六部尉正九品諸職中簡取何必須武人也琛又奏以, WYG: ''}
