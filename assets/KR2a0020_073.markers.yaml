  - {type: variant, offset: 2791, length: 1, content: 加, WYG: 在州以天旱令人鞭石虎畫像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴䘮身亦遇疾巫以為虎豹之祟徴拜光禄卿領右衞将軍與元义同謀廢靈太后遷撫軍大将軍河南尹仍右衞領左右與子難娶左衞将軍侯剛女即元义妹夫也义以其通姻深相委託三人率多俱宿禁内時或迭出义以康生子難為千牛偹身康生性麤武言氣髙下义稍憚之見于顔色康生亦㣲懼不}
