  - {type: variant, offset: 2934, length: 524, content: 意復書褒美以悅之徵為車騎將軍特進又拜侍中以其衰老詔賜御府杖朝直杖以出入正光五年冬卒詔給東園祕器朝服一具衣一襲錢十萬物七百段蠟三百斤贈司徒公尚書左僕射加後部鼓吹太常議諡文穆吏部郎袁翻奏曰案禮諡者行之迹也號者功之表也車服者位之章也是以大行受大名細行受細名行生於己名生於人故闔棺然後定諡皆累其生時美惡所以為將來勸戒身雖死使名常存也凡薨亡者屬所即言大鴻臚移本郡大中正條其行迹功過承中正移言公府下太常部博士評議為諡列上諡不應法者博士坐如選舉不以實論若行狀失實中正坐如博士自古帝王莫不殷勤重慎以為褒貶之實也今之行狀皆出自其家任其臣子自言君父之行無復相是非之事臣子之欲光揚君父但苦迹之不高行之不美是以極辭肆意無復限量觀其狀也則周孔聯鑣伊顏接袵論其諡也雖窮文盡武罔或加焉然今之博士與古不同唯知依其行狀又先問其家人之意臣子所求便為議上都不復斟酌與奪商量是非致號諡之加與汎階莫異專以極美為稱無復貶降之名禮官之失一至於此案甄司徒行狀至德與聖人齊蹤鴻名共大賢比跡文穆之諡何足加焉但比來贈諡於例普重如甄琛之流無不複諡謂宜依諡法慈惠愛民曰孝宜諡曰孝穆公自今已後明勒太常司徒有行狀如此言辭流宕無復節限者悉請裁量不聽為受必準人立諡不得甚加優越復仍踵前來之失者付法司科罪從之琛祖載肅, WYG: ''}
