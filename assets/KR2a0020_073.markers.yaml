  - {type: variant, offset: 4232, length: 2, content: 戶遷, WYG: 戸除直閤将軍㝷加輔國将軍㳺擊将軍出為征虜将軍東荆州刺史時蠻酋樊秀安等反詔大眼為別将𨽻都督李崇討平之大眼妻潘氏善騎射自詣軍省大眼至於攻陳逰獵之際大眼令妻潘戎裝或齊鑣戰場或並驅林壑及至還營同坐幕下對諸寮佐言笑自得時指之謂人曰此潘将軍也蕭衍遣其前江州刺史王茂先率衆數萬次于樊雍招誘蠻夏規立宛州又令其所署宛州刺史雷豹狼軍主曹仲宗等領衆二萬偷據河南城世宗以大眼為武衞将軍假平南将軍持節都督統軍曹敬邴虬樊魯等諸軍討茂先等大破之斬衍輔國将軍王花龍驤將軍申天化俘馘七千有餘衍又遣其舅張惠紹總率衆軍竊據宿豫又假大眼}
