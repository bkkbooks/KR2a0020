  - {type: variant, offset: 4285, length: 0, content: '', WYG: 賜驊騮馬一匹正光五年秋以徃在揚州建淮橋之勳封當利縣開國男食邑二百戸㝷増邑一百户改封新豐進爵為子時莫折念生兄天生下隴東宼征西将軍元志為天生所擒賊衆甚盛進屯黑水詔延伯為使持節征西将軍西道都督與行臺蕭寳夤討之寳夤與延伯結壘馬嵬南北相去百餘歩寳夤日集督将論討賊方略延伯每云賊新制勝難與争鋒寳夤正色責之曰君荷國寵靈總戎出討便是安危所繫每云賊不可討以示怯懦損威挫氣乃君之罪延伯明晨詣寳夤自謝仍云今當仰為明公參賊勇怯延伯選精兵數千下渡黒水列陳西進以向賊營寳夤率衆扵水東㝷原西北以示後繼於時賊衆大盛水西一里營營連接延伯徑至賊壘揚威愶之徐而還退賊以延伯衆少開營競追衆過十倍臨水逼蹙寳夤親觀之懼有虧損延伯不與其戰身自殿後抽衆東渡轉運}
