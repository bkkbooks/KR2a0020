  - {type: variant, offset: 2791, length: 1, content: 加, krp: 在州以天旱令人鞭石虎畫像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴䘮身亦遇疾巫以為虎豹之祟徴拜光禄卿領右衞将軍與元义同謀廢靈太后遷撫軍大将軍河南尹仍右衞領左右與子難娶左衞将軍侯剛女即元义妹夫也义以其通姻深相委託三人率多俱宿禁内時或迭出义以康生子難為千牛偹身康生性麤武言氣髙下义稍憚之見于顔色康生亦㣲懼不}
  - {type: variant, offset: 2793, length: 2, content: 北將, WYG: 正光二年三月肅宗朝靈太后于西林園文武侍坐酒酣迭舞次至康生康生乃為力士舞及扵折旋每顧視太后舉手蹈足瞋目頷首為殺縳之勢太后解其意而不敢言日暮太后欲携肅宗宿宣光殿侯剛曰至尊已朝訖嬪御在南何勞留宿康生曰至尊陛下兒隨陛下将東西更復訪問誰羣臣莫敢應靈太后自起援肅宗臂下堂而去康生大呼唱萬嵗扵後近侍皆唱萬嵗肅宗引前入閤左右競相排閤不得閉康生奪其子難千牛刀斫直後元思輔乃得定肅宗既上殿康生時有酒勢将出處分遂為义所執鏁於門下至曉义不出令侍中黄門僕射尚書等十餘人就康生所訊其事處康生斬刑難處絞刑义與剛並在内矯詔决之康生如奏難恕死從流難哭拜辭父康生忻子免死又亦慷慨了不悲泣語其子云我不反死汝何為哭也有司驅逼奔走赴市時已昏闇行刑人注刀數下不死於地刻截咸言禀义意㫖過至苦痛嘗食典御奚混與康生同執刀入内亦就市絞刑康生乆為将及臨州尹多所殺戮而乃信向佛道數捨其居宅以立寺塔凡歴四州皆有建置死時五十四子難年十八以侯剛子婿得停百日竟徙安州後尚書盧同為行臺义令殺之康生於南山立佛圖三層先死忽夢崩壞沙門有為解云檀越當不吉利無人供飬佛圖故崩耳康生稱然竟及禍靈太后反政贈都督冀瀛滄三州諸}
