  - {type: variant, offset: 4247, length: 5, content: 尋轉征東將, WYG: 等志尚雄猛皆國之名将比平峽石公私慶快此乃卿等之功也但淮堰仍在宜湏豫謀故引卿等親共量算各出一圖以為後計大眼對曰臣輙謂水陸二道一時俱下徃無不尅延伯曰臣今輙難大眼既對聖顔荅㫖宜實水南水北各有溝瀆陸地之計如何可前愚臣短見願聖心愍水兵之勤苦給復一年専習水戰脫有不虞召便可用徃無不獲靈太后曰卿之所言深是宜要當勅如請二年除安北将}
