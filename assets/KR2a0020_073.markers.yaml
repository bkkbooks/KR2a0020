  - {type: variant, offset: 4292, length: 0, content: '', WYG: 䧟其前鋒扵是勇銳競進大破之俘斬十餘萬追奔及扵小隴秦賊勁彊諸将所憚朝廷初議遣将咸云非延伯無以定之果能剋敵授右衞将軍於時万俟醜奴宿勤明逹等宼掠涇州先是盧祖遷伊瓫生數将等皆以元志前行之始同時發雍從六陌道将取高平志敗仍停涇部延伯既破秦賊乃與寳夤率衆㑹扵安定甲卒十二萬鐡馬八千匹軍威甚盛醜奴置營涇州西北七十里當原城時或輕騎暫來挑戰大兵未交便示奔北延伯矜功負勝遂唱議先驅伐木别造大排内為鏁柱敎習彊兵負而趨走號為排城戰士在外輜重居中自涇州縁原北上衆軍将出討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師寳夤延伯謂其事實逡廵未閱俄而宿勤明達率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯上馬突陳賊勢摧挫便爾逐北徑造其營賊本輕騎延伯軍兼歩卒兵力疲怠賊乃乗間得入排城延伯軍遂大敗死傷者将有二萬寳夤歛軍退保涇州延伯修繕器械購募驍勇復從涇州西進去賊彭阬谷柵七里結營延伯恥前挫辱不報寳夤獨出襲賊大破之俄頃間平其數柵賊皆逃遁見兵人採掠散亂不整還來衝突遂大奔敗延伯中流矢為賊所害士卒死者萬餘人延伯善将撫能得衆心與康生大眼為諸将之冠延伯末路功名尤重時大宼未平而延伯死朝野嘆懼焉}
