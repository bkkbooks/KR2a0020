  - {type: variant, offset: 4747, length: 299, content: 玄謨甥也少隨玄謨征伐以軍功至員外郎早卒聰生而喪母祖母王撫育之大軍攻克東陽聰徙入平城與蔣少遊為雲中兵戶窘困無所不至族祖允視之若孫大加賙給聰涉獵經史頗有文才允嘉之數稱其美言之朝廷云青州蔣少遊與從孫僧智雖為孤弱然皆有文情由是與少遊同拜中書博士積十年轉侍郎以本官為高陽王雍友稍為高祖知賞太和十七年兼員外散騎常侍使於蕭昭業高祖定都洛陽追詔聰等曰比於河陽敕卿仍屆洛周視舊業依然有懷固欲先之營之後乃薄伐且以賾喪甫爾使通在昔乘危幸凶君子弗取是用輟茲前圖遠期來會爰息六師三川是宅將底居成周永恢皇宇今更造璽書以代往詔比所敕授隨宜變之善勗皇華無替指意使還遷通直散騎常侍兼太府少卿轉兼太子左率聰微習弓馬乃以將用自許高祖銳意, WYG: 買奴}
