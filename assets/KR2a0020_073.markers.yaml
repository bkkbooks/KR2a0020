  - {type: variant, offset: 437, length: 742, content: 有尊居父母而醯醢是吝富有萬品而一物是規今者天為黔首生鹽國與黔首鄣護假獲其利是猶富專口齗不及四體也且天下夫婦歲貢粟帛四海之有備奉一人軍國之資取給百姓天子亦何患乎貧而苟禁一池也古之王者世有其民或水火以濟其用或巢宇以誨其居或教農以去其飢或訓衣以除其弊故周詩稱教之誨之飲之食之皆所以撫覆導養為之求利者也臣性昧知理識無遠尚每觀上古愛民之迹時讀中葉驟稅之書未嘗不歎彼遠大惜此近狹今偽弊相承仍崇關之稅大魏恢博唯受穀帛之輸是使遠方聞者罔不歌德昔亶父以棄寶得民碩鼠以受財失衆君王之義宜其高矣魏之簡稅惠實遠矣語稱出內之吝有司之福施惠之難人君之禍夫以府藏之物猶以不施而為災況府外之利而可吝之於黔首且善藏者藏於民不善藏者藏於府藏於民者民欣而君富藏於府者國怨而民貧國怨則示化有虧民貧則君無所取願弛茲鹽禁使沛然遠及依周禮置川衡之法使之監導而已詔曰民利在斯深如所陳付八座議可否以聞司徒錄尚書彭城王勰兼尚書邢巒等奏琛之所列富乎有言首尾大備或無可貶但恐坐談則理高行之則事闕是用遲回未謂為可竊惟古之善為治者莫不昭其勝途悟其遠理及於救世升降稱時欲令豐無過溢儉不致弊役養消息備在厥中節約取足成其性命如不爾者焉用君為若任其生產隨其啄食便是芻狗萬物不相有矣自大道既往恩惠生焉下奉上施卑高理睦然恩惠既交思拯之術廣恐財不賙國澤不厚民故多方以達其情立法以行其志至乃取貨山川輕在民之貢立稅關市裨十一之儲收此與彼非利己也回彼就此非為身也所謂集天地之產惠天地之民藉造物之富賑造物之貧徹商賈給戎戰賦四民贍軍國取乎用乎各有義已禁此淵池不專大官之御斂此匹帛豈為後宮之資既潤不在己彼我理一猶積而散之將焉所吝且稅之本意事有可求固以希濟生民非為富賄藏貨不爾者昔之君子何為然哉是以後來經圖未之或改故先朝商校小大以情降鑒之流疑興復鹽禁然自行以來典司多怠出入, WYG: 發}
