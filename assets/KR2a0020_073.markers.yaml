  - {type: variant, offset: 5047, length: 639, content: 討專訪王肅以軍事聰託肅願以偏裨自効肅言之於高祖故假聰輔國將軍統兵二千與劉藻傅永成道益任莫問俱受肅節度同援渦陽而聰躁怯少威重所經淫掠無禮及與賊交望風退敗與藻等同囚於懸瓠高祖恕死徙平州為民行屆瀛州屬刺史王質獲白兔將獻託聰為表高祖見表顧謂王肅曰在下那得復有此才而令朕不知也肅曰比高聰北徙此文或其所製高祖悟曰必應然也何應更有此輩世宗初聰復竊還京師六輔之廢聰之謀也世宗親政除給事黃門侍郎加輔國將軍遷散騎常侍黃門如故世宗幸鄴還於河內懷界帝親射矢一里五十餘步侍中高顯等奏伏見親御弧矢臨原弋遠弦動羽馳矢鏃所逮三百五十餘步臣等伏惟陛下聖武自天神藝夙茂巧會騶虞之節妙盡矍圃之儀威稜攸疊甝兇懾氣才猛所振勁憝弭心足以肅截九區赫服八宇矣盛事奇迹必宜表述請勒銘射宮永彰聖藝詔曰此乃弓弧小藝何足以示後葉而喉脣近侍苟以為然亦豈容有異便可如請遂刊銘於射所聰為之詞趙脩嬖幸聰深朋附及詔追贈脩父聰為碑文出入同載觀視碑石聰每見脩迎送盡禮聰又為脩作表陳當時便宜教其自安之術由是迭相親狎脩死甄琛李憑皆被黜落聰亦深用危慮而聰先以疏宗之情曲事高肇竟獲自免肇之力也脩之任勢聰傾身事之及脩之死言必毀惡茹皓之寵聰又媚附每相招命言笑攜撫公私託仗無所不至每稱皓才識明敏非趙脩之儔乃因皓啟請青州鎮下治中公廨以為私宅又乞水田數十頃皆被遂許及皓見戮聰以為死之晚也其薄於情義類皆如此侍中高顯出授護軍聰轉兼其處於時顯兄弟疑聰間構而求之聰居兼十餘旬出入機要言即真無遠慮藉貴因權耽於聲色賄納之音聞於遐邇中尉崔亮知肇微恨遂面陳聰罪世宗乃出聰為平北將軍并, WYG: 秦}
