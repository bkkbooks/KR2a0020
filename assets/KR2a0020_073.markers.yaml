  - {type: punctuation, offset: 4238, content: 、, id: KR2a0020_ZHSJ_073-bkkpn867}
  - {type: variant, offset: 4238, length: 0, content: '', WYG: 出為荆州刺史常縛蒿為人衣以青布而射之召諸蠻渠指示之曰卿等若作賊吾政如此相殺也又北淯郡嘗有虎害大眼搏而獲之斬其頭懸於穰市自是荆蠻相謂曰楊公惡人常作我蠻形以射之又深山之虎尚所不免遂不敢復為宼盗在州二年而卒大眼雖不學恒遣人讀書坐而聽之悉皆記識令作露布皆口授之而竟不多識字也有三子長甑生次領軍次征南皆潘氏所生氣幹咸有父風初大眼徙營州潘在洛陽頗有失行及為中山大眼側生女夫趙延寳言之於大眼大眼怒幽潘而殺之後娶繼室元氏大眼之死也甑生等問印綬所在時元始懐孕自指其腹謂甑生等曰開國當我兒襲之汝等婢子勿有所望甑生深以為恨及大眼䘮将還京出城東七里營車而宿夜二更甑生等開大眼棺延寳怪而問之征南射殺之元怖走入水征南又彎弓射之甑生曰天下豈有害母之人乃止遂取大眼屍令人馬上抱之左右扶挾以叛荆人畏甑生等驍勇不敢苦追奔於襄陽遂歸蕭衍崔延伯博陵人也祖夀扵彭城䧟入江南延伯有氣力少以勇壮聞仕蕭賾為縁淮逰軍帶濠口戍主太和中入國高祖深嘉之常為統帥膽氣絶人兼有謀略所在征討咸立戰功積勞稍進除征虜将軍荆州刺史賜爵定陵男荆州土險蠻左為宼每有聚結延伯輙自討之莫不摧殄由是穰土怗然無敢為患永平中轉後将軍幽州刺史蕭衍遣其左遊擊将軍趙祖恱率衆偷據峽石詔延伯為别將與都督崔亮討之亮令延伯守下蔡延伯與别将伊瓫生挾淮為營延伯遂取車輪去輞削銳其輻兩兩接對揉竹為桓貫連相屬並十餘道横水為橋兩頭施大轆轤出没任情不可燒斫既斷祖悅等走路又令舟舸不通由是衍軍不能赴救祖悅合軍咸見俘虜於軍拜平南将軍}
