  - {type: variant, offset: 8452, length: 1298, content: 任積年撫慰未能周盡是以多有怨叛延興中卒年五十初道固之在客邸與薛安都畢衆敬隣館時以朝集相見本既同由武達頗結僚舊時安都志已衰朽於道固情乃疏略而衆敬每盡殷勤道固謂劉休賓房法壽曰古人云非我族類其心必異信不虛也安都視人殊自蕭索畢捺固依依也子景徽字文叡襲父爵臨淄子加寧朔將軍出為青州廣陵王羽征東府司馬大鴻臚少卿出除龍驤將軍平州刺史卒贈本將軍南青州刺史諡曰定子休纂襲爵景徽弟景業字文季別有功太和中賜爵昌國子加建威將軍卒子休緒襲爵員外郎景業弟景淵亦有別功賜爵武城男鷹揚將軍平齊太守卒於郡道固兄目連子僧祐白曜之圍歷城也僧祐母明氏弟僧淵並在城內劉彧授僧祐輔國將軍領衆數千與青齊人家口在歷城梁鄒者明同慶明菩薩等為將佐從淮海揚聲救援將至不其聞道固已敗母弟入國徘徊不進白曜圍東陽時表請景徽往喻僧祐乃歸降白曜送之在客數載賜爵層城侯與房法壽畢薩諸人皆不穆法壽等訟其歸國無誠拘之歲餘因赦乃釋後坐與沙門法秀謀反伏法子道寧給事中僧淵入國坐兄弟徙於薄骨律鎮太和初得還高祖聞其有文學又問佛經善談論敕以白衣賜幘入聽于永樂經武殿後以僧淵為尚書儀曹郎遷洛之後為青州中正尋出為征東大將軍廣陵王羽諮議參軍加顯武將軍討海賊於黃郭大破之蕭鸞乃遣其族兄惠景遺僧淵書說以入國之屈規令改圖僧淵復書曰主上之為人也無幽不照無細不存仁則無遠不及博則無典不究殫三墳之微盡九丘之極至於文章錯綜煥然蔚炳猶夫子之牆矣遂乃開獨悟之明尋先王之迹安遷靈荒兆變帝基惟新中壤宅臨伊域三光起重輝之照庶物蒙再化之始分氏定族料甲乙之科班官命爵清九流之貫禮俗之粲然復興河洛之間重隆周道巷歌邑頌朝熙門穆濟濟之盛非可備陳矣加以累葉重光地兼四岳士馬強富人神欣仰道德仁義民不能名且大人出本無所在況從上聖至天子天孫者乎聖上諸弟風度相類咸陽王已下莫不英越枝葉扶疎遍在天下所稱稍竭殊為未然文士競謀於廟堂武夫效勇於疆埸若論事勢此為實矣計彼主篡殺之迹人鬼同知疑親猜貴早暴遐邇兄投心逆節千載何名物患無施器非時用生不振世沒無令聲先師以為鄙君子以為此則事困伎殫自勉無益故其宜矣以兄之才夙超鄉土如弟之徒誰不瞻仰每尋昔念未敢忘懷雖復途遙二千心想若對敬遵軌範以資一生今名可揚矣而不能顯親事可變矣而不能離辱故世之所未解也且君子在家也不過孝於其親入朝也不過忠於其君主上之於兄恩則不可酬義則不可背身可殺也故非其酬功不逮也故非其報今可以效矣而又弗為非孝也即實而言兄之不變得為忠乎至於講武爭強不敵者久矣論安與危不同者驗矣羣情背去獨留者謬矣願深察之王晏道絕外交器非雄朗專華保望便就屠割方之於兄其全百倍且淮蕃海捍本出北豪壽春之任兄何由免以是而言猜嫌已決又宗門未幾南北莫寄先構之重非兄何託受社之榮鄙心之相望矣今執志不寤忠孝兩忘王晏之辜安能自保見機而作其在茲乎國家西至長安東盡即墨營造器甲必盡堅精晝夜不息者於茲數載今秋中月雲羅必舉賈不及時雖貴不用若不早圖況枉連城矣枚乘有言欲出不出間不容髮精哉斯談弟中於北京身罹事譴大造之及有獲為幸比蒙清舉超進非一犬馬之心誠有在矣雖復彼此為異猶昔情不移也況於今日哉如兄之誨如弟之規改張易調易於反掌萬一乖情此將運也出除龍驤將軍南青州刺史久之坐擅出師無據檢覈幽禁後乃獲免僧淵元妻房氏生二子伯驎伯驥後薄房氏更納, WYG: ''}
