  - {type: variant, offset: 9940, length: 398, content: 稍遷鎮遠將軍前將軍數為將帥永安末與都督源子恭守丹谷戰歿祖龍司空行參軍性剛躁父亡後與兄伯驎訟競嫡庶並以刀劍自衞若怨讎焉祖螭小字社客粗武有氣力刺史元羅板為兼統軍率衆討海賊普泰初與張僧皓俱反圍青州尒朱仲遠遣將討平之傳首京師祖虬少而好學下帷誦書不驅競當世舉秀才不就僧淵從弟和平昌太守家巨富而性吝嗇埋錢數百斛其母李春思堇惜錢不買子軌字啟則盜錢百萬背和亡走後為儀同開府鎧曹參軍坐貪汙死於晉陽玄伯同郡董謐謐父京與同郡崔康時廣陽霍原等俱以碩學播名遼海謐好學傳父業中山平入朝拜儀曹郎撰朝覲饗宴郊廟社稷之儀鄧淵字彥海安定人也祖羌苻堅車騎將軍父翼河間相慕容垂之圍鄴以翼為後將軍冀州刺史真定侯翼泣對使者曰先君忠于秦室翼豈可先叛乎忠臣不事二主自古通義未敢聞命垂遣使喻之曰吾與車騎結異姓兄弟卿亦猶吾之子弟安得辭乎翼曰冀州宜任親賢翼請他役效命垂乃用為建武將軍河間太守尚書左丞皆有聲稱卒於趙郡內史淵性貞素言行可復博覽經書長於易筮, WYG: ''}
