  - {type: variant, offset: 6946, length: 815, content: 尚書令奏除其官終身不齒朏好學有文才歷治書侍御史京兆王愉錄事參軍與愉同逆伏法衡弟恕尚書郎又有崔模字思範魏中尉崔琰兄霸後也父遵慕容垂少府卿叔父整廣川太守模慕容熙末南渡河外為劉裕滎陽太守戍虎牢神中平滑臺模歸降後賜爵武陵男加寧遠將軍始模在南妻張氏有二子沖智季柔模至京師賜妻金氏生子幼度沖智等以父隔遠乃聚貨物間託關境規贖模歸其母張氏每謂之曰汝父性懷本自無決必不能來也行人遂以財賄至都當竊模還模果顧念幼度等指幼度謂行人曰吾何忍捨此輩令坐致刑辱當為爾取一人使名位不減於我乃授以申謨謨劉義隆東郡太守與朱脩之守滑臺神中被執入國俱得賜妻生子靈度申謨聞此乃棄妻子走還江外靈度刑為閹人模長者篤厚不營榮利頗為崔浩輕侮而守志確然不為浩屈與崔賾相親往來如家和平中卒皇興初幼度隨慕容白曜為將時季柔為崔道固長史帶濟南太守城將降先馳馬赴白曜軍幼度亦豫令左右覘迎之而差互不相值為亂兵所害初真君末車駕南克鄒山模兄協子邪利為劉義隆魯郡太守以郡降賜爵臨淄子拜廣寧太守卒於郡邪利二子懷順以父入國故不出仕及國家克青州懷順迎邪利喪還葬青州次恩累政州主簿至刺史陸龍成時謀叛聚城北高柳村將攻州城龍成討斬之懷順與冲智子徽伯等俱奔江外始邪利與二女俱入國一女為張氏婦一女為劉休賓妻生子文華邪利後生庶子法始邪利亡後二女侮法始庶孽常欲令文華襲外祖爵臨淄子法始恨忿無所不為後懷順歸化迎喪始與法始相見未幾法始得襲爵傳至孫延族正光中為冠軍將軍中散大夫季柔孫睦正光三年自郁州歸降模孫景茂冀州別駕青州長史隨郡太守武城男景茂子彥遠襲武定中北徐州司馬始睦來降也與高陵張炅郭縕俱至陵蕭寶夤西討開府西閣祭酒寶夤反陵其黃門侍郎關中平還洛歷尚書郎定州別駕齊文襄王作相以陵頗有文學引參賓客終於征南將軍司空長史贈驃騎大將軍大司農卿顯祖時有崔道固字季堅琰八世孫也祖瓊慕容垂車騎屬父輯南徙青州為泰山太守道固賤出嫡母兄攸之目連等輕侮之輯謂攸之曰此兒姿識如此或能興人門戶汝等何以輕之攸之等遇之彌薄略無兄弟之禮時劉義隆子駿為徐兗二, WYG: 并}
