  - {type: variant, offset: 5586, length: 6, content: 貞公喪禮一依, WYG: 通詔斤發幽州民及宻雲丁零萬餘人運攻具出南道太延初為衛尉改為𢎞農王加征南大將軍後為萬騎大將軍世祖大集羣臣於西堂議伐涼州斤等三十餘人議曰河西王牧犍西垂下國雖内不純臣而外修職貢宜加寛宥恕其㣲愆去嵗新征士馬疲敝未可大舉冝且覊縻其地鹵薄畧無水草大軍既到不得乆停彼聞軍來必嬰城固守攻則難㧞野無所掠終無克獲世祖不從征之涼州平以戰功賜僮𨽻七十戸以斤元老賜}
