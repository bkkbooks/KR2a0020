  - {type: variant, offset: 10927, length: 550, content: 宗慶子伯忻與父俱死伯忻子儼逃越得免後歷尚書郎除常山太守轉安南將軍光祿大夫持節兼尚書左丞郢州行臺又加撫軍將軍卒贈鎮南將軍荊州刺史穎弟權從世祖征伐官至龍驤將軍豫州刺史賜爵新野侯從征蠕蠕坐法死弟顥卒於中書侍郎顥長子靈珍中書學生祕書中散卒贈員外散騎常侍子羨歷中書學生侍御史以明謹見知出為齊州武昌王征虜長史後李元護之為齊州仍為長史帶東魏郡太守在治十年經三刺史以清勤著稱齊人懷其恩德號曰良二千石及代還大受民故送遺頗以此為損中山王英攻義陽羨為軍司罷除諫議大夫兼給事黃門侍郎副侍中游肇為畿內大使後行貨於錄尚書北海王詳轉大司農少卿出行荊州事轉征虜將軍郢州刺史鎮義陽在州銳於聚斂又納賄於于忠徵為給事黃門侍郎尋加後將軍河南尹黃門如故未拜而靈太后臨朝以元昭為河南尹羨仍黃門加平南將軍羨以義陽軍司之勳封安陽縣開國子邑三百戶羨曲附左右故獲封焉時幽瀛滄冀大水頻經寇難民飢詔羨兼尚書假散騎常侍持節詣州隨方賑恤多有所濟神龜初發疽卒年五十四詔賻帛三百匹朝服一襲贈鎮東將軍青州刺史諡曰恭長子躋字伯昇頗有意尚祕書郎朝議以羨本不合山河之賞故不許躋襲躋訴訟久之始聽紹封稍遷前將軍太中大夫梁州開府長史與刺史元羅同陷蕭衍卒於江南子孝緒元象中以躋柩還國興和中襲爵齊受禪例降靈珍弟靈奇立忠將軍齊州刺史進號冠軍將軍賜爵昌國侯為政清簡有威惠子恭伯右光祿大夫, WYG: ''}
