  - {type: variant, offset: 5084, length: 262, content: 坐朝堂決刑獄太宗以郡國豪右大為民蠹乃優詔徵之民多戀本而長吏逼遣於是輕薄少年因相扇動所在聚結西河建興盜賊並起守宰討之不能禁太宗乃引玄伯及北新侯安同壽光侯叔孫建元城侯元屈等問曰前以兇俠亂民故徵之京師而守宰失於綏撫令有逃竄今犯者已多不可悉誅朕欲大赦以紓之卿等以為何如屈對曰民逃不罪而反赦之似若有求於下不如先誅首惡赦其黨類玄伯曰王者治天下以安民為本何能顧小曲直也譬琴瑟不調必改而更張法度不平亦須蕩而更制夫赦雖非正道而可以權行自秦漢以來莫不相踵屈言先誅後赦會於不能兩去孰與一行便定若其赦而不改者誅之不晚太宗從之神瑞初詔玄伯與南平公嵩等, WYG: 八人}
