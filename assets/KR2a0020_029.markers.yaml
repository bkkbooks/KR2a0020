  - {type: variant, offset: 670, length: 1003, content: 姚興興遣將楊佛嵩率衆來援而佛嵩稽緩太祖命謙為書以遺佛嵩曰夫杖順以翦遺乘義而攻昧未有非其運而顯功無其時而著業慕容無道侵我疆埸師老兵疲天亡期至是以遣使命軍必望克赴將軍據方邵之任總熊虎之師事與機會今其時也因此而舉役不再駕千載之勳一朝可立然後高會雲中進師三魏舉觴稱壽不亦綽乎佛嵩乃倍道兼行太祖大悅賜謙爵關內侯重遣謙與佛嵩盟曰昔殷湯有鳴條之誓周武有河陽之盟所以藉神靈昭忠信夫親仁善隣古之令軌歃血割牲以敦永穆今既盟之後言歸其好分災恤患休戚是同有違此盟神祗斯殛寶敗佛嵩乃還明年慕容垂復來寇太祖謂謙曰今事急矣非卿豈能復致姚師卿其行也謙未發而垂退乃止及聞垂死謙上書勸進太祖善之并州平以謙為陽曲護軍賜爵平舒侯安遠將軍皇始元年卒官時年六十三贈平東將軍左光祿大夫幽州刺史高陽公諡曰文子洛陽襲從征慕容寶為冠軍司馬後為祁令太宗追錄謙功以洛陽為雁門太守洛陽家田三生嘉禾皆異壟合穎世祖善之進爵北地公加鎮南將軍出為明壘鎮將居八年卒諡曰恭子寄生襲爵降為侯皇興元年卒洛陽弟安國中山太守安國弟安都廣寧滄水二郡太守加揚威將軍賜爵東光子天安初卒贈平遠將軍冀州刺史東光侯諡曰烈子白虎襲爵為侍御中散後以罪免官奪爵張袞字洪龍上谷沮陽人也祖翼遼東太守父卓昌黎太守袞初為郡五官掾純厚篤實好學有文才太祖為代王選為左長史從太祖征蠕蠕蠕蠕遁走追之五六百里諸部帥因袞言於太祖曰今賊遠糧盡不宜深入請速還軍太祖令袞問諸部帥若殺副馬足三日食否皆言足也太祖乃倍道追之及於廣漠赤地南床山下大破之既而太祖問袞卿曹外人知我前問三日糧意乎對曰皆莫知也太祖曰此易知耳蠕蠕奔走數日畜產之餘至水必留計其道程三日足及輕騎卒至出其不意彼必驚散其勢然矣袞以太祖言出告部帥咸曰聖策長遠非愚近所及也袞常參大謀決策幃幄太祖器之禮遇優厚袞每告人曰昔樂毅杖策於燕昭公達委身於魏武蓋命世難可期千載不易遇主上天姿傑邁逸志凌霄必能囊括六合混一四海夫遭風雲之會不建騰躍之功者非人豪也遂策名委質竭誠伏事時劉顯地廣兵強跨有朔裔會其兄弟乖離共相疑阻袞言於太祖曰顯志大意高希冀非望乃有參天貳地籠罩宇宙之規吳不并越將為後患今因其內釁宜速乘之若輕師獨進或恐越逸可遣使告慕容垂共相聲援東西俱舉勢必擒之然後總括英雄撫懷遐邇此千載一時不可失也太祖從之遂破走顯又從破賀遂命羣官登勿居山遊宴終日從官及諸部大人請聚石為峰以記功德命袞為文慕容寶之來寇也袞言於太祖曰寶乘滑臺之功因長子之捷傾資竭力難與爭鋒愚以為宜羸師卷甲以侈其心太祖從之果破之, WYG: ''}
