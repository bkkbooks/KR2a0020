  - {type: variant, offset: 8087, length: 293, content: 郭道固面縛請罪表曰臣資生南境限隔大化本朝不以卑末委授藩任而劉氏蕭牆內侮懼貽大戮前遣崔啟之奉表歸誠幸蒙陛下過垂矜納并賜爵寵慶佩罔極應奔闕庭但劉彧尋續遣使恕臣百死愚以世奉劉氏深愆蒙宥若猶違背則是不忠於本朝而欲求忠於大魏雖曰希生懼大魏之所不許是用迷回孤負天日冒萬死之艱固執拒守僕臣白曜振曜威靈漸經二載大將臨城以今月十四日臣東郭失守於臣款彧之誠庶可以彰於大魏矣臣勢窮力屈以十七日面縛請罪白曜奉宣皇恩恕臣生命斯實陛下起臣死尸肉臣朽骨天地造物所不能行而陛下育之雖虞舜之貸有苗姬文之宥崇壘方之聖澤未足以喻既未奉朝旨無由親馳道路謹遣大息景徽束骸歸闕伏聽刑斧既而白曜送道固赴都有司案劾奏聞詔恕其死乃徙青齊, WYG: 西征伐常為謀主治軍清整號令嚴明又雅尚人倫禮賢愛}
