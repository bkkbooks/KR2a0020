  - {type: variant, offset: 3162, length: 1871, content: 諡曰簡長子倫字天念年十餘歲入侍左右稍遷護軍長史員外常侍轉大司農少卿燕州大中正熙平中蠕蠕主醜奴遣使來朝抗敵國之書不修臣敬朝議將依漢答匈奴故事遣使報之倫表曰臣聞古之聖王疆理物土辨章要甸荒遐之俗政所不及故禮有壹見之文書著羈縻之事太祖以神武之姿聖明之略經略帝圖日有不暇遂令竪子遊魂一方亦由中國多虞急諸華而緩夷狄也高祖光宅土中業隆卜世赫雷霆之威振熊羆之旅方役南轅未遑北伐昔舊京烽起虜使在郊主上按劍璽書不出世宗運籌帷幄開境揚旌衣裳所及舟車萬里于時醜類款關上亦述尊遺志今大明臨朝澤及行葦國富兵強能言率職何憚而為之何求而行此往日蕭衍通敬求和以誠肅未純抑而不許先帝棄戎於前陛下交夷於後無乃上乖高祖之心下違世宗之意且虜雖慕德亦來觀我懼之以強儻即歸附示之以弱窺覦或起春秋所謂以我卜也又小人難近夷狄無親疏之則怨狎之則侮其所由來久矣是以高祖世宗知其若此來既莫逆去又不追不一之義於是乎在必其委贄玉帛之辰屈膝蕃方之禮則可豐其勞賄籍以珍物至於王人遠役銜命虜庭優以匹敵之尊加之相望之寵恐徒生虜慢無益聖朝假令選衆而舉使乎稱職資酈生之辯騁終軍之辭憑軾下齊長纓繫越苟異曩時猶為不願而況極之以隆崇申之以宴好臣雖下愚輒敢固執若事不獲已應頒制詔示其上下之儀宰臣致書諷以歸順之道若聽受忠誨明我話言則萬乘之盛不失位於域中天子之聲必籠罩於無外脫或未從焉能損益徐舞干戚以招之敷文德而懷遠如迷心不已或肆犬羊則當命辛李之將勒衞霍之師蕩定雲沙掃清逋孽飲馬瀚海之濱鏤石燕然之上開都護置戊己斯亦陛下之高功不世之盛事如思按甲養民務農安邊之術經國之防豈可以戎夷兼并而遽虧典制將取笑於當時貽醜於來葉昔文公請隧襄后有言荊莊問鼎王孫是抑以古方今竊為陛下不取又陛下方欲禮神岷瀆致禮衡山登稽嶺窺蒼梧而反與夷虜之君酋渠之長結昆弟之忻抗分庭之義將何以瞰文命之遐景迹重華之高風者哉臣以為報使甚失如彼不報甚得如此願留須臾之聽察愚臣之言不從出為後將軍肆州刺史還朝除燕州大中正孝莊初遷太常少卿不拜轉大司農卿卒官倫弟恩奉朝請員外郎白澤弟庫瀛州刺史宜陽侯庫長子蘭累遷龍驤將軍行光州事蘭弟修虎都牧駕部二曹給事中上谷公司農少卿奉使柔玄察民疾苦遷平北將軍燕州刺史度弟太平西將軍荊州刺史俎陽侯太弟那寧遠將軍雍城鎮將崔玄伯清河東武城人也名犯高祖廟諱魏司空林六世孫也祖悅仕石虎官至司徒左長史關內侯父潛仕慕容暐為黃門侍郎並有才學之稱玄伯少有儁才號曰冀州神童苻融牧冀州虛心禮敬拜陽平公侍郎領冀州從事管征東記室出總庶事入為賓友衆務修理處斷無滯苻堅聞而奇之徵為太子舍人辭以母疾不就左遷著作佐郎苻丕牧冀州為征東功曹太原郝軒世名知人稱玄伯有王佐之才近代所未有也堅亡避難於齊魯之間為丁零翟釗及司馬昌明叛將張願所留縶郝軒歎曰斯人而遇斯時不因扶搖之勢而與鷃雀飛沉豈不惜哉慕容垂以為吏部郎尚書左丞高陽內史所歷著稱立身雅正與世不羣雖在兵亂猶勵志篤學不以資產為意妻子不免飢寒太祖征慕容寶次於常山玄伯棄郡東走海濱太祖素聞其名遣騎追求執送於軍門引見與語悅之以為黃門侍郎與張袞對總機要草創制度時司馬德宗遣使來朝太祖將報之詔有司博議國號玄伯議曰三皇五帝之立號也或因所生之土或即封國之名故虞夏商周始皆諸侯及聖德既隆萬國宗戴稱號隨本不復更立唯商人屢徙改號曰殷然猶兼行不廢始基之稱故詩云殷商之旅又云天命玄鳥降而生商宅殷土茫茫此其義也昔漢高祖以漢王定三秦滅強楚故遂以漢為號國家雖統北方廣漠之土逮于陛下應運龍飛雖曰舊邦受命惟新是以登國之初改代曰魏又慕容永亦奉進魏土夫魏者大名神州之上國斯乃革命之徵驗利見之玄符也臣愚以為宜號為魏太祖從之於是四方賓王之貢咸稱大魏矣太祖幸鄴歷問故事於玄伯應對若流太祖善之及車駕還京師次於嶺太祖親登山頂撫慰新民適遇玄伯扶老母登嶺太祖嘉之賜以牛米因詔諸徙人不能自進者給以車牛遷吏部尚書命有司制官爵撰朝儀協音樂定律令申科禁玄伯總而裁之以為永式及置八部大夫以擬八坐玄伯通署三十六曹如令僕統事深為太祖所任勢傾朝廷而儉約自居不營產業家徒四壁出無車乘朝晡步上母年七十供養無重膳太祖嘗使人密察聞而益重之厚加饋賜時人亦或譏其過約而玄伯為之踰甚太祖常引問古今舊事王者制度治世之則玄伯陳古人制作之體及明君賢臣往代廢興之由甚合上意未嘗謇諤忤旨亦不諂諛苟容及太祖季年大臣多犯威怒玄伯獨無譴者由於此也太祖曾引玄伯講漢書至婁敬說漢祖欲以魯元公主妻匈奴善之嗟歎者良久是以諸公主皆釐降于賓附之國朝臣子弟雖名族美彥不得尚焉尚書職罷賜玄伯爵白馬侯加周兵將軍與舊功臣庾岳奚斤等同班而信寵過之太祖崩太宗未即位清河王紹聞人心不安大出財帛班賜朝士玄伯獨不受太宗即位命玄伯居門下虛己訪問以不受紹財帛特賜帛二百匹, WYG: ''}
