  - {type: variant, offset: 6377, length: 474, content: 鎮西將軍拜陝城鎮將二崤地嶮民多寇劫性滑稽誘接豪右宿盜魁帥與相交結傾衿待遇不逆微細是以能得民庶忻心莫不感其意氣時官無祿力唯取給於民善撫納招致禮遺大有受取而與之者無恨又弘農出漆蠟竹木之饒路與南通販貿來往家產豐富而百姓樂之諸鎮之中號為能政及解鎮還京民多追戀詣闕上章者三百餘人書奏高祖嘉之延興二年卒年六十三遺命薄葬斂以時服長子衡字伯玉少以孝行著稱學崔浩書頗亦類焉天安元年擢為內祕書中散班下詔命及御所覽書多其迹也衡舉李沖李元愷程駿等終為名器世以是稱之承明元年遷內都坐令善折獄高祖嘉之太和二年襲爵武陵公鎮西將軍遷給事中車駕巡狩以衡為大都督長史衡涉獵書史陳備禦之方便國利民之策凡五十餘條以本將軍除泰州刺史徙爵齊郡公先是河東年饑劫盜大起衡至修龔遂之法勸課農桑周年之間寇盜止息十二年卒年五十四贈散騎常侍左光祿大夫本將軍冀州刺史帛一千匹穀一千斛諡曰惠公衡有五子長子敞字公世襲爵例降為侯自謁者僕射出為平原相敞性狷急與刺史楊椿迭相表列敞坐免官世宗初為鉅鹿太守弟朏之逆敞為黃木軍主韓文殊所藏其家悉見籍沒唯敞妻李氏以公主之甥自隨奴婢田宅二百餘口得免正光中普釋禁錮敞復爵齊郡侯拜, WYG: 加}
