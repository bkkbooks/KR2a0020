  - {type: variant, offset: 5554, length: 2, content: 侍中, WYG: 使詣斤降斤自滑䑓趣洛陽義符虎牢守將毛徳祖遣其司馬翟廣將軍姚勇錯竇覇等率五千人據土樓以拒斤斤進擊破之廣等單馬走免盡殪其衆斤長驅至虎牢軍於汜東留表守輜重自率輕兵狥下河南潁川陳郡以南百姓無不歸附義符陳留太守嚴稜以郡降斤遂平兖豫諸郡還圍虎牢徳祖拒守不下及虎牢潰斤置守宰以撫之自魏初大將行師惟長孫嵩距劉裕斤征河南獨給漏刻及十二牙旗太宗崩斤乃班師世祖即位進爵}
