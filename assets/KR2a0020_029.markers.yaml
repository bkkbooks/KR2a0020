  - {type: 'tls:seg', offset: 2447, content: '', id: KR2a0020_ZHSJ_029-d29p34s6}
  - {type: variant, offset: 2447, length: 303, content: 長而好學博通敏於當世高宗初除中散遷殿中曹給事中甚見寵任參預機密後蠕蠕犯塞顯祖引見羣臣議之尚書僕射元目辰進曰若車駕親行恐京師危懼不如持重固守自安虜懸軍深入糧無繼運以臣量之自退不久遣將追擊破之必矣白澤曰陛下欽明則天比蹤前聖而蠢爾荒愚輕犯王略寇乃顛沛於遠圖我將宴安於近毒仰惟神略則不然矣今若鑾輿親動賊必望麾崩散寧容仰挫神兵坐而縱敵萬乘之尊嬰城自守進失可乘之機退非無前之義惟陛下留神顯祖從之遂大破虜衆白澤本字鍾葵顯祖賜名白澤納其女為嬪出行雍州刺史清心少欲吏民安之顯祖詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以從坐論糾告得尚書已下罪狀者各隨所糾官輕重而授之白澤上表諫曰伏見詔書禁尚書以下受禮者刑身糾之者代職伏惟, WYG: 徒李沈等}
