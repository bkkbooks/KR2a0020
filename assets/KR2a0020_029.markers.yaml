  - {type: variant, offset: 10648, length: 1, content: 南, WYG: 安城公朱提王悦懐刃入禁中將為大逆俊覺悦舉動有異便引手掣之乃於悦懐中得兩刃匕首遂殺之太宗以俊前後功重軍國大計一以委之羣官上事先由俊銓校然後奏聞性平正柔和未嘗有喜怒之色忠篤愛厚不謟上抑下每奉詔宣外必告示殷勤受事者皆飽之而退事宻者倍至蒸仍是以上下嘉歎泰常元年卒時年二十八太宗甚痛悼之親臨哀慟朝野無不追惜贈侍中司空安城王諡孝元賜温明祕器載以輼輬車衞士𨗳從陪葬金陵子蒲襲爵後有大功及寵幸貴臣薨賻送終禮皆依俊故事無得踰之者初俊既卒太宗命其妻桓氏曰夫生既共榮沒冝同穴能殉葬者可任意桓氏乃縊而死遂合葬焉俊既為安城王俊弟隣襲父爵降為丹}
