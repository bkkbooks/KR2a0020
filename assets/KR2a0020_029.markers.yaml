  - {type: variant, offset: 8053, length: 2, content: 復叛, krp: 率衆自平原濟河徇下青兖諸郡建濟河劉裕兖州刺史徐琰奔彭城建遂東入青州司馬}
  - {type: variant, offset: 8056, length: 6, content: 彧命皇興初顯, WYG: 之秀之先聚黨於濟東皆率衆降建入臨淄劉義符前東牟太守清河張幸先匿孤山聞建至率二千人迎建於女水遂圍義符青州刺史竺夔於東陽城義符遣將檀道濟王仲徳救夔建不克而還建以功賜爵夀光侯加鎮南將軍建表曰臣前遣沙門僧䕶詣彭城僧䕶還稱賊發軍向北前鋒將徐卓之己至彭城大將軍到彦之軍在泗口發馬戒嚴必有舉斧之志臣聞為國之道存不忘亡冝繕甲兵増益屯戍先為之備以待其來若不豫設卒難擒殄且吳越之衆便於舟檝今至北土舎其所長逆順既殊勞逸不等平寇定功在於此日臣雖衰敝謀畧寡淺過蒙殊寵忝荷重任討除寇暴臣之志也是以秣馬枕戈思效㣲節願陛下不以南境為憂世}
