  - {type: variant, offset: 7982, length: 1, content: 移, WYG: 不相體觧望風捐去因空城而入非戰攻相逼也魏晉和好之義不廢於前表曰尉建失守之罪自有常刑將更遣良牧彼軍冝西不然將以小致大乖和好之體和之曰王征虜權住於此以待衆軍之集比當西過滑䑓還為魏有何必建旗皷以耀威武乎仲徳卑辭常自言不敢與大魏抗衡建不能制之太宗令建與劉裕相聞以觀其意裕答言洛是晉之舊京而羗姚據之晉欲修復山陵之計乆矣而内難屢興不暇經營司馬休之魯宗之父子司馬國璠兄弟諸桓宗屬皆晉之蠹也而姚氏收集此等欲以圗晉是以伐之道由於魏軍之初舉將以重幣假途㑹彼邊}
