  - {type: variant, offset: 5584, length: 1, content: 諡, WYG: 世祖征赫連昌遣斤率義兵將軍封禮等督四萬五千人襲蒲坂昌守將赫連乙升聞斤將至遣使告昌使至統萬見大軍已圍其城還告乙升曰昌已敗矣乙升懼棄蒲坂西走斤追敗之乙升遂奔長安斤入蒲坂收其資器百姓安業昌弟助興先守長安乙升至復與助興棄長安西走安定斤又西據長安於是秦雍氐羌皆来歸附與赫連定相持累戰破定定聞昌敗遂走上邽斤追之至雍不及而還詔斤班師斤上疏曰赫連昌亡保上邽鳩合餘燼未有盤據之資今因其危滅之為易請益鎧馬平昌而還世祖曰昌亡國叛夫擊之勞傷將士且可息兵取之不晚斤抗表固執乃許之給斤萬人遣將軍劉㧞送馬三千匹與斤斤進討安定昌退保平涼斤屯軍安定以糧竭馬死遂深壘自固監軍侍御史安頡擊昌擒之語在頡傳昌衆復立昌弟定為主守平涼斤自以元帥而擒昌之功更不在已深耻之乃舎輜重輕齎三日糧追定於平涼娥清欲尋水而往斤不從自北道邀其走路定衆將出㑹一小將有罪亡入賊具告其實定知斤軍無糧乏水乃邀斤前後斤衆大潰斤及娥清劉拔為定所擒士卒死者六七千人後世祖克平涼斤等得歸免為宰人使負酒食從駕還京師以辱之尋拜安東將軍降爵為公車駕將討馮}
  - {type: page-break, offset: 5584, content: '', id: KR2a0020_WYG_029-4a, image: WYG0261/WYG0261-0433a.png}
