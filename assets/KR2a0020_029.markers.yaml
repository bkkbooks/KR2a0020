  - {type: variant, offset: 11480, length: 0, content: '', WYG: 奚斤世稱忠孝征伐有克平凉之役師殲身虜雖敗崤之責己赦封尸之効靡立而恩禮隆渥沒祀廟庭叔孫建少展誠勤終著庸伐治邊有術威震夷楚俊委節太宗義彰顛沛察朱提之變有日磾之風加以柔而能正見美朝野可謂世不乏賢矣魏書卷二十九魏書卷二十九考證叔孫建傳青兗輟不}
