  - {type: variant, offset: 6403, length: 0, content: '', WYG: 從征赫連昌為都将以功拜樂部尚書賜爵臨淮公加寧西将軍神䴥中卒諡曰簡子真少以父任為中散從征平涼以功賜爵臨城子拜員外散騎侍郎廣武将軍襲父爵降為建義将軍臨淮侯遷司衛監征蓋吳遷殿中尚書加散騎常侍從駕征劉義隆至江進爵南康公加冠軍将軍卒於軍子吳兒襲爵髙祖初為中散武川鎮将太和初卒贈恒州刺史子長樂襲坐事爵除後歴陵江将軍羽林監子榮族武定中征西将軍繁昌男吳兒弟突朔州長史子元慶平州倉曹參軍尉古真代人也太祖之在賀蘭部賀染干遣侯引乙突等詣行宫将肆逆古真知之密以馳告侯引等不敢發染干疑古真泄其謀乃執栲之以兩車軸押其頭傷一目不伏乃免之登國初從征庫莫奚及叱突鄰竝有功又從救賀蘭破衛辰子直力鞮復擊慕容寳於參合陂又從平中原以功賜爵束州侯加建節将軍太宗初為鴻飛将軍率衆五千鎮大洛城太宗西廵古真與奚斤等率前軍討越勒部大破之獲馬五萬匹牛羊二十萬頭掠二萬餘家西還泰常三年除定州刺史卒子億萬襲卒子盛襲古真弟太真太宗初為平南将軍相州刺史太真弟諾少侍太祖以忠謹著稱從圍中山諾先登傷一目太祖歎曰諾兄弟竝毁其目以建功效誠可嘉也寵侍遂隆除平東将軍賜爵安樂子從討姚平還拜國部大人太宗初為幽州刺史加東統将軍進爵為侯長孫道生之討馮䟦也諾與驍騎将軍延普率師次遼西轉寧東将軍進爵武陵公諾之在州有恵政民吏追思之世祖時薊人張廣達等二百餘人詣闕請之復除安東将軍幽州刺史改邑遼西公兄弟竝為方伯當世榮之燕土亂久民戸凋敝散諾在州前後十數年還業者萬餘家延和中卒第八子觀襲爵卒子崘襲諾長子眷忠謹有父風太宗時執事左右為大官令時侍臣受斤亡入蠕蠕詔眷追之遂至虜庭大檀問其故眷曰受斤負罪天子逃刑在此不時執送是以來取眷遂擒受斤於大檀前左右救之乃免由是以驍烈聞遷司衛監太宗幸幽州詔眷輔世祖居守後征河南督髙車騎臨陣衝突所向無前賊憚之世祖即位命眷與散騎常侍劉庫仁等八人分典四部綰奏機要賜爵山桑侯加陳兵将軍又為安北将軍出鎮北境與平陽王長孫翰擊蠕蠕别帥阿伏干於祚山率師至歌刪山擊蠕蠕别帥便度弟庫仁直引師而北蠕蠕部帥莫孤率髙車騎五千乗來逆眷擊破之斬首千餘級又從征蠕蠕眷出白黑兩漠之間擊其東部大獲而還又從征赫連昌眷出南道擊昌於上邽士衆之糧臨淮公丘堆等督租於郡縣為昌所敗昌乗勝抄掠諸将患之眷與侍御史安頡隂謀設伏邀擊擒昌以功拜寧北将軍加散騎常侍進爵源陽公後從征和龍眷督萬騎前驅慰喻降二千餘戸尋為假節加侍中}
