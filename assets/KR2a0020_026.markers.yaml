  - {type: variant, offset: 669, length: 2003, content: 妃以慰存亡又除中書監侍中如故高祖南討漢陽假勰中軍大將軍加鼓吹一部勰以寵受頻煩乃面陳曰臣聞兼親疏而兩並異同而建此既成文於昔臣願誦之於後陳思求而不允愚臣不請而得豈但今古云殊遇否大異非獨曹植遠羨於臣是亦陛下踐魏文而不顧高祖大笑執勰手曰二曹才名相忌吾與汝以道德相親緣此而言無慚前烈汝但克己復禮更何多及高祖親講喪服於清徽堂從容謂羣臣曰彥和季豫等年在蒙稚早登纓紱失過庭之訓並未習禮每欲令我一解喪服自審義解浮疏抑而不許頃因酒醉坐脫爾言從故屈朝彥遂親傳說將臨講坐慚戰交情御史中尉李彪對曰自古及今未有天子講禮陛下聖叡淵明事超百代臣得親承音旨千載一時從征沔北賜帛三千匹除使持節都督南征諸軍事中軍大將軍開府又詔曰明便交敵可敕將士肅爾軍儀勰於是親勒大衆須臾有二大鳥從南而來一向行宮一向府幕各為人所獲勰言於高祖曰始有一鳥望旗顛仆臣謂大吉高祖戲之曰鳥之畏威豈獨中軍之略也吾亦分其一爾此乃大善兵法咸說至明便大破崔慧景蕭衍其夜大雨高祖曰昔聞國軍獲勝每逢雲雨今破新野南陽及摧此賊果降時潤誠哉斯言勰對曰水德之應遠稱天心高祖令勰為露布勰辭曰臣聞露布者布於四海露之耳目必須宣揚威略以示天下臣小才豈足大用高祖曰汝豈獨親詔亦為才達但可為之及就尤類帝文有人見者咸謂御筆高祖曰汝所為者人謂吾製非兄則弟誰能辨之勰對曰子夏被蚩於先聖臣又荷責於來今及至豫州高祖為家人書於勰曰教風密微禮政嚴嚴若不深心日勸何以敬諸每欲立一宗師肅我元族汝親則宸極位乃中監風標才器實足師範屢有口敕仍執沖遜難違清挹荏苒至今宗制之重捨汝誰寄便委以宗儀責成汝躬有不遵教典隨事以聞吾別肅治之若宗室有愆隱而不舉鍾罰汝躬綱維相厲庶有勸改吾朝聞夕逝不為恨也勰翌日面陳曰奉詔令專主宗制糾舉非違臣聞其身正不令而行其身不正雖令不從臣處宗乏長幼之順接物無國士之禮每因啟請已蒙哀借不謂今詔終不矜免猶願聖慈賜垂蠲遂高祖曰汝諧往欽哉勰表以一歲國秩職俸親恤以裨軍國詔曰割身存國理為遠矣但汝以我親乃減己助國職俸便停親國二事聽三分受一高祖不豫勰內侍醫藥外總軍國之務遐邇肅然人無異議徐謇當世之上醫也先是假還洛陽及召至勰引之別所泣涕執手而謂之曰君今世元化至尊氣力危惙願君竭心專思方治若聖體日康令四海有賴當獲意外之賞不然便有不測之誅非但榮辱乃存亡由此君其勉之左右見者莫不嗚咽及引入謇便欲進治勰以高祖神力虛弱唯令以食味消息勰乃密為壇於汝水之濱依周公故事告天地顯祖請命乞以身代高祖翊日有瘳損自懸瓠幸鄴勰常侍坐輿輦晝夜不離於側飲食必先嘗之而後手自進御車駕還京會百僚於宣極堂行飲至策勳之禮命舍人宣旨勰翼弼六師纂戎荊楚沔北之勳每毗廟算從討新野有克城之謀受命鄧城致大捷之效功為羣將之最也別當授賞不替厥庸高祖謂勰曰吾與汝等早罹艱苦中逢契闊每謂情義隨事而疏比纏患經歲危如寒葉非汝孔懷情敦忠孝孰能動止躬親必先藥膳每尋此事感思殊遠勰悲泣對曰臣等宿遭不天酷恨長世賴陛下撫育得參人伍豈謂上靈無鑒復使聖躬違和萬國所懸蒼生繫氣寢興之勞豈申荼蓼以破慧景等勳增邑五百戶又詔曰朕形疲稚年心勞長歲積思成疴頓發汝潁第六弟勰孝均周弟感侔姬旦遺食捨寐動止必親敦醫勸膳誠力俱竭致茲保康實賴同氣又秉務緝政百司是憑綱維折衷萬揆獲濟撫師於霖浩之辰處戎於薦逼之日安外靜內功臣大道侍省之績可以孔懷無褒翼亮之勤實乃勳存社稷宜有酬賞以旌國功可增邑一千戶勰辭曰臣受遇緣親榮枯事等以此獲賞殊乖情願乞追成旨用息謗言詔曰汝在私能孝處公必忠比來勤憂足布朝野但可祗膺尋以勰為司徒太子太傅侍中如故俄而蕭寶卷將陳顯達內寇高祖復親討之詔勰使持節都督中外諸軍事總攝六師是時高祖不豫勰辭曰臣侍疾無暇六軍須有所託事不兩興情力又竭更請一王總當軍要高祖曰戎務侍疾皆憑於汝牽痾如此吾深慮不濟安六軍保社稷者捨汝而誰何容方便請人以違心寄宗祏所賴唯在於汝諸葛孔明霍子孟異姓受託而況汝乎行次淯陽高祖謂勰曰吾患轉惡汝其努力車駕至馬圈去賊營數里顯達等出戰諸將大破之勰部分諸軍將攻賊壘其夜奔退高祖疾甚謂勰曰修短命也死生大分今吾氣力危惙當成不濟矣雖敗顯達國家安危在此一舉社稷所仗唯在汝身霍子孟以異姓受付況汝親賢可不勉也勰泣曰士於布衣猶為知己盡命況臣託靈先皇聯暉陛下誠應竭股肱之力加之以忠貞但臣出入喉膂每跨時要及於寵靈輝赫聞之遐邇復參宰匠機政畢歸震主之聲見忌必矣此乃周旦遁逃成王疑惑陛下愛臣便為未盡始終之美臣非所以惡華捐勢非所以辭勤請逸正希仰成陛下日鏡之明下念愚臣忘退之禍高祖久之曰吾尋思汝言理實難奪乃手詔世宗曰汝第六叔父勰清規懋賞與白雲俱潔厭榮捨紱以松竹為心吾少與綢繆提攜道趣每請解朝纓恬真丘壑吾以長兄之重未忍離遠何容仍屈素業長嬰世網吾百年之後其聽勰辭蟬捨冕遂其沖挹之性無使成王之朝翻疑姬旦之聖不亦善乎汝為孝子勿違吾敕及高祖崩于行宮遏祕喪事獨與右僕射任城王澄及左右數人為計奉遷高祖於安車中勰等出入如平常視疾進膳可決外奏累日達宛城乃夜進安車於郡廳事得加斂櫬還載臥輿六軍內外莫有知者遣中書舍人張儒奉詔徵世宗會駕梓宮至魯陽乃發喪行服世, WYG: ''}
