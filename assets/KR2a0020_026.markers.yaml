  - {type: variant, offset: 6603, length: 2, content: 例降, WYG: 㑹稽公加冠軍将軍髙宗時除涇州刺史和平五年卒子彌真襲爵彌真卒無子弟狀徳襲爵地干弟侯頭襲地干職為庫部尚書侯頭弟力斤亦以忠謹聞歴位御史中尉并州刺史有政績加冠軍将軍賜爵晉陽侯卒贈平南将軍力斤弟焉陳尚書安樂侯古真族𤣥孫聿字成興性耿介肅宗時為武衛将軍是時領軍元义秉權百寮莫不致敬而聿獨長揖不拜尋出為平西将軍東涼州刺史涼州緋色天下之最义送白綾二千匹令聿染拒而不許义諷御史劾之驛徵至京覆驗無状還復任尋卒於州時年五十贈安北将軍朔州刺史子儉武定中開府祭酒}
