  - {type: variant, offset: 6417, length: 1, content: 青, WYG: 諡曰莊子多侯襲爵多侯少有武幹顯祖時為假節征西将軍領䕶羌戎校尉敦煌鎮将至鎮上表求率輕騎五千西入于闐兼平諸國因敵取資平定為效弗許髙祖初蠕蠕部帥旡盧真率三萬騎入塞圍鎮多侯擊走之以功進號征西大将軍後多侯獵于南山蠕蠕遣部帥度㧞入圍敦煌斷其還路多侯且前且戰遂衝圍而入率衆出戰大破之追北數十里斬首千餘級因上疏求北取伊吾斷蠕蠕通西域之路髙祖善其計以東作方興難之太和元年為妻元氏所害子建襲爵歴位給事中卒無子建弟那襲爵卒子範襲範弟顯業散騎常侍與太原公主姦通生子彦武定中衛将軍南營}
