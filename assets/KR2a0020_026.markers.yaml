  - {type: variant, offset: 6020, length: 275, content: 尊為無上王尋遇害河陰追諡曰孝宣皇帝妻李氏為文恭皇后有二子韶字世冑襲武定末司州牧齊受禪爵例降韶弟襲字世紹武定初封武安王邑一千戶武定末中書侍郎齊受禪爵例降劭兄子直字方言少知名為清河文獻王所賞愛起家除散騎侍郎轉中書侍郎後除通直散騎常侍遷給事黃門侍郎靈太后詔曰故太師彭城武宣王道隆德盛功高微管協契先朝導揚末命扶痾濟難效漢北之誠送往奉居盡魯南之節宗社賴之以安皇基由之永固而謙光守約屢撝增邑之賞辭多受少終保初錫之封非所謂追舊報恩念勳酬德者也可以前後所封戶別封三子為縣公食邑各一千戶庶以少慰仁魂微申朝典子直封真定縣開國公出為冠軍將軍梁州刺史未幾遇患優遊南鄭無他政績, WYG: ''}
