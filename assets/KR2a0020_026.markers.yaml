  - {type: variant, offset: 14, length: 3, content: 九下彭, WYG: 十四長孫肥尉古真長孫肥代人也昭成時年十三以選内侍少有雅度果毅少言太祖之在獨孤及賀蘭部肥常侍從禦侮左右太祖深信仗之登國初與莫題等俱為大将從征劉顯自濡源擊厙莫奚討賀蘭部竝有戰功太祖征蠕蠕大破之肥降其主匹候䟦事具蠕蠕𫝊又從征衛辰及薛于部破滅之蠕蠕别主緼紇提子曷多汗等率部落棄父西走肥以輕騎追至上郡斬之後從征中山拜中領軍将軍車駕次晉陽慕容寳并州刺史遼西王農棄}
