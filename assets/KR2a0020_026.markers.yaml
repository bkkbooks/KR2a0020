  - {type: variant, offset: 179, length: 352, content: 改封彭城王高祖與侍臣昇金墉城顧見堂後梧桐竹曰鳳皇非梧桐不栖非竹實不食今梧桐竹並茂詎能降鳳乎勰對曰鳳皇應德而來豈竹梧桐能降高祖曰何以言之勰曰昔在虞舜鳳皇來儀周之興也鸑鷟鳴於岐山未聞降桐食竹高祖笑曰朕亦未望降之也後宴侍臣於清徽堂日晏移於流化池芳林之下高祖曰向宴之始君臣肅然及將末也觴情始暢而流景將頹竟不盡適戀戀餘光故重引卿等因仰觀桐葉之茂曰其桐其椅其實離離愷悌君子莫不令儀今林下諸賢足敷歌詠遂令黃門侍郎崔光讀暮春羣臣應詔詩至勰詩高祖仍為之改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中令之舉非私也勰對曰臣露此拙方見聖朝之私賴蒙神筆賜刊得有令譽高祖曰雖琢一字猶是玉之本體勰曰臣聞詩三百一言可蔽今陛下賜刊一字足以價等連城勰表解侍中詔曰蟬貂之美待汝而光人乏之秋何容方退也克念作聖庶必有資耳後幸代都次于上黨之銅鞮山路旁, WYG: 毎}
