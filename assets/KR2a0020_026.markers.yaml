  - {type: variant, offset: 6299, length: 1, content: 病, WYG: 進封平陽王加安集将軍蠕蠕大檀之入宼雲中世祖親征之遣翰率北部諸将尉眷自參合以北擊大檀别帥阿伏干於柞山斬首數千級獲馬萬餘匹又與東平公娥清出長川以討大檀大檀衆北遁追擊克獲而還尋遷司徒襲赫連昌破之世祖復征昌翰與廷尉道生宗正娥清率騎三萬為前驅昌戰敗奔上邽翰以八千騎追之至髙平不及而還從襲蠕蠕車駕度漠大檀奔走其弟匹黎率衆赴之遇翰交戰匹黎衆潰走斬其渠帥數百人翰清正嚴明善撫将士太祖甚重之神䴥三年薨深見悼惜為之流涕親臨其䘮禮依安城王叔孫俊故事賻賜有加諡曰威陪𦵏金陵子平成襲爵降為公平成少以父任為中散累遷南部尚書卒陪𦵏金陵子渾襲爵渾初為中散久之為彭城鎮将太和中卒子盛襲爵翰弟受興世祖時從征平凉以功賜爵長進子除河間太守卒子安都襲爵顯祖時為典馬令受興弟陳世祖時為羽林郎征和龍賊自西門出将犯外圍陳擊退之追斬至長城下以功賜爵五等男以從征凉州為都将領入官遷殿中給事中進爵為子遷駕部尚書復出為北鎮都将陳性寛厚好學愛士所歴輙為人追思之髙祖即位進爵吳郡公加安東将軍興光二年}
