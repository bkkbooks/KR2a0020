  - {type: variant, offset: 2786, length: 3151, content: 怒勰每被誚詈言至厲切威責近侍動將誅斬勰承顏悉心多所匡濟及高祖昇遐陳顯達奔遁始爾慮凶問洩漏致有逼迫勰內雖悲慟外示吉容出入俯仰神貌無異及至魯陽也東宮官屬多疑勰有異志竊懷防懼而勰推誠盡禮卒無纖介勰上高祖諡議謹案諡法協時肇享曰孝五宗安之曰孝道德博聞曰文經緯天地曰文仰惟大行皇帝義實該之宜上尊號為孝文皇帝廟曰高祖陵曰長陵世宗從之既葬世宗固以勰為宰輔勰頻口陳遺旨請遂素懷世宗對勰悲慟每不許之勰頻煩表聞辭義懇切世宗難違遺敕遂其雅情猶逼以外任乃以勰為使持節侍中都督冀定幽瀛營安平七州諸軍事驃騎大將軍開府定州刺史勰仍陳讓又面申前意世宗固執不許乃述職尚書令王肅等奏臣等聞旌功表德道貴前王庸勳親親義高盛典是故姬旦翼周光宅曲阜東平宰漢寵絕列蕃彭城王勰景思內昭英風外發協廓乾規掃氛漢沔屬先帝在天鳳旌旋斾靜一六師肅寧南服登聖皇於天衢開有魏之靈祐論道中鉉王猷以穆七德丕宣九功在詠臣等參詳宜增邑一千五百戶詔曰覽奏倍增崩絕未足以上酬勳德且可如奏勰頻表固讓世宗許之世宗與勰書曰恪奉辭暨今悲戀哽咽歲月易遠便迫暮冬每思聞道奉承風教父既辭榮閑外無容頓違至德出蕃累朔荒馳實深今遣主書劉道斌奉宣悲戀願父來望必當屆京展洩哀窮指不云遠勰乃朝於京師景明初蕭寶卷豫州刺史裴叔業以壽春內屬詔勰都督南征諸軍事餘官如故與尚書令王肅迎接壽春詔曰五教治樞古難其選自非親賢兼切莫應斯舉王以明德懋親任屬保傅出居蕃陝入御袞章內外克諧民神攸屬今董率戎麾威號宜重可復授司徒以光望實又詔勰以本官領揚州刺史勰簡刑導禮與民休息州境無虞遐邇安靜揚州所統建安戍主胡景略猶為寶卷拒守不下勰水陸討之景略面縛出降自勰之至壽春東定城戍至於陽石西降建安山蠻順命斬首獲生以數萬計進位大司馬領司徒餘如故增邑八百戶又寶卷遣將陳伯之屯於肥口胡松又據梁城水軍相繼二百餘里勰部分將士分攻諸營伯之胡松率衆出戰諸將擊之斬首九千俘獲一萬伯之等僅以身免屯於烽火勰又分命諸將頻戰伯之計窮宵遁淮南平詔曰王戚尊上輔德勳莫二孤心昧識訓保攸憑比以壽春初開鎮壓任重故令王親董元戎遠撫淮外冒茲炎蒸衡蓋飄颻經略踰時必有虧損淹違詣覿夙夜係情兼制勝宣規威效兼著公私允稱義所欽嘉雖凱旋有期無申延屬可遣給事黃門侍郎鄭道昭就彼祗勞徵勰還朝勰政崇寬裕絲毫不犯淮南士庶追其餘惠至今思之初勰之定壽春也獲蕭寶卷汝陰太守王果豫州治中庾禝等數人勰傾衿禮之常參坐席果承間進曰果等契闊生平皓首播越顧瞻西夕餘光幾何今遭聖化正應力茲愚老申展尺寸但在南百口生死分張乞還江外以申德澤勰矜而許之果又謝曰殿下賜處有過國士果等今還仰負慈澤請聽仁駕振旅反跡江外至此乃還其為遠人所懷如此勰至京師世宗臨東堂引見詔勰曰比鳳皇未至蒼黎二化故仰屈尊謨綏懷邊附而寇豎昏迷敢鬬淮楚叔父英略高明應機殄定凱旋今辰伏慰悲佇勰謝曰臣忝充戍帥撫安新故而不能宣武導恩威懷遐邇致小豎伯之驅率蟻徒侵擾邊堡非唯仰慚天顏實亦俯愧朝列春秋責帥臣實當之賴陛下慈深捨過故使愚臣獲免罪責勰頻表辭大司馬領司徒及所增邑乞還中山有詔不許乃除錄尚書侍中司徒如故固辭不免勰雅好恬素不以勢利嬰心高祖重其事幹縶維不許雖臨崩遺詔復世宗留連每乖情願常悽然歎息以詔旨殷勤僶俛應命時咸陽王禧漸以驕矜頗有不法北海王詳陰言於世宗世宗深忌之又言勰大得人情不宜久在宰輔勸世宗遵高祖遺敕禧等又出領軍于烈為州非烈情願固強之烈深以為忿烈子忠嘗在左右密令忠言於世宗云諸王等意不可測宜廢之早自覽政時將礿祭王公並齋於廟東坊世宗遣于烈將宿衞壯士六十餘人召禧勰詳等引入見之於光極殿世宗謂勰曰頃來南北務殷不容仰遂沖操恪是何人而敢久違先敕今遂叔父高蹈之意勰謝曰先帝不以臣虛薄曲垂罔己之澤出入綢繆公私無捨自陛下龍飛九五屢求解落既為宰輔所抑亦不為陛下所許先歲夏中重塵天聽時蒙優借出為定州往年還洛陽敕總戎淮肥雖無功效幸免罪戾云歸未幾復委臣以非據之任臣頻煩干請具簡聖聽陛下孝深無改仰遵先詔上成睿明之美下遂微臣之志感惟今往悲喜交深乃詔曰王宿尚閑靜志捐世務先帝愛亮之至弗奪此情遺敕炳然許遂沖退雅操不移朕亦未敢違奪今乃釋位歸第丘園是營高尚之節確爾貞固賁履之操邈焉難追而王宅初構財力多闕成立之期歲月莫就可量遣工役分給材瓦禀王所好速令制辦務從簡素以稱王心勰因是作蠅賦以諭懷惡讒構也又以勰為太師勰遂固辭詔曰蓋二儀分象君臣之位形焉上下既位唱和之義生焉自古統天位主曷常不賴明師仗賢輔而後燮和陰陽彝倫民物者哉往而不返者先民誠有之斯所謂獨善其身而亂大倫山林之士耳賢人君子則不然也屈己以安民艱身以濟物所謂以先知覺後知同塵而與天下俱潔者也朕猥以沖年纂臨寶曆實賴叔父匡濟之功誠宜永兼將相以綱維內外但逼奪先旨憚違沖挹俛志割心以遂高素自比水旱乖和陰陽失序是以屈王論道庶燮茲玉燭且師宰從容無廢清尚故周旦復辟而居之尚父期頤以終位王義兼家國理絕獨高可遣侍中敦諭世宗又修家人書於勰曰恪言奉還告承猶執沖遜恪實闇寡政術多粃匡弼之寄仰屬親尊父德望兼重師訓所歸豈得近遺家國遠崇清尚也便願紆降時副傾注之心勰不得已而應命世宗後頻幸勰第及京兆廣平暴虐不法詔宿衞隊主率羽林虎賁幽守諸王於其第勰上表切諫世宗不納勰既無山水之適又絕知己之遊唯對妻子鬱鬱不樂議定律令勰與高陽王雍八座朝士有才學者五日一集參論軌制應否之宜而勰夙侍高祖兼聰達博聞凡所裁決時彥歸仰加以美容貌善風儀端嚴若神折旋合度出入言笑觀者忘疲又加侍中勰敦尚文史物務之暇披覽不輟撰自古帝王賢達至於魏世子孫三十卷名曰要略小心謹慎初無過失雖閑居宴處亦無慢色惰容愛敬儒彥傾心禮待清正儉素門無私謁性仁孝言於朝廷以其舅潘僧固為冀州樂陵太守京兆王愉搆逆僧固見逼從之尚書令高肇性既凶愎賊害賢俊又肇之兄女入為夫人順皇后崩世宗欲以為后勰固執以為不可肇於是屢譖勰於世宗世宗不納因僧固之同愉逆肇誣勰北與愉通南招蠻賊勰國郎中令魏偃前防閤高祖珍希肇提攜搆成其事肇初令侍中元暉以奏世宗暉不從令左衞元珍言之世宗訪之於暉暉明勰無此世宗更以問肇肇以魏偃祖珍為證世宗乃信之永平元年九月召勰及高陽王雍廣陽王嘉清河王懌廣平王懷及高肇等入時勰妃方產勰乃固辭不赴中使相繼不得已乃令命駕意甚憂懼與妃訣而登車入東掖門度一小橋牛不肯進遂擊之良久更有使者責勰來遲乃令去牛人挽而進宴於禁中至夜皆醉各就別所消息俄而元珍將武士齎毒酒而至勰曰吾忠於朝廷何罪見殺一見至尊死無恨也珍曰至尊何可復見王但飲酒勰曰至尊聖明不應無事殺我求與告我罪者一對曲直武士以刀鐶築勰二下勰大言曰皇天忠而見殺武士又以刀鐶築勰勰乃飲毒酒武士就殺之向晨以褥裹屍輿從屏門而出載屍歸第云王因飲而薨勰妃李氏司空沖之女也號哭大言曰高肇枉理殺人天道有靈汝還當惡死及肇以罪見殺論者知有報應焉世宗為舉哀於東堂給東園第一祕器朝服一襲賻錢八十萬布二千匹蠟五百斤大鴻臚護喪事勰既有大功於國無罪見害百姓寃之行路士女流涕而言曰高令公枉殺如此賢王在朝貴賤莫不喪氣追崇假黃鉞使持節都督中外諸軍事司徒公侍中太師王如故給鑾輅九旒虎賁班劍百人前後部羽葆鼓吹轀輬車有司奏太常卿劉芳議勰諡曰王挺德弱齡誕資至孝睿性過人學不師授卓爾之操發自天然不羣之美幼而獨出及入參政務綸綍有光爰登中鉉敷明五教漢北告危皇赫問罪王內親藥膳外總六師及宮車晏駕上下哀慘奮猛銜戚英略潛通翼衞靈輿整戎振斾歷次宛謝迄于魯陽送往奉居無慚周霍禀遺作輔遠至邇安分陝方流詠燕趙廓靖江西威懾南越入釐百揆庶績咸熙履勤不憚在功愈挹溫恭愷悌忠雅寬仁興居有度善終篤始高尚厥心功成身退義亮聖衷美光世典依諡法保大定功曰武善問周達曰宣諡曰武宣王及莊帝即位追號文穆皇帝妃李氏為文穆皇后遷神主於太廟廟稱肅祖語在臨淮王彧傳前廢帝時去其神主嫡子劭字子訥襲封善武藝少有氣節肅宗初蕭衍遣將犯邊劭上表曰偽豎遊魂闚覦邊境勞兵兼時日有千金之費臣仰籍先資紹饗厚秩思以埃塵用裨山海臣國封徐州去軍差近謹奉粟九千斛絹六百匹國吏二百人以充軍用靈太后嘉其至意而不許之起家宗正少卿又除使持節假, WYG: ''}
  - {type: variant, offset: 2786, length: 3151, content: 怒勰每被誚詈言至厲切威責近侍動將誅斬勰承顏悉心多所匡濟及高祖昇遐陳顯達奔遁始爾慮凶問洩漏致有逼迫勰內雖悲慟外示吉容出入俯仰神貌無異及至魯陽也東宮官屬多疑勰有異志竊懷防懼而勰推誠盡禮卒無纖介勰上高祖諡議謹案諡法協時肇享曰孝五宗安之曰孝道德博聞曰文經緯天地曰文仰惟大行皇帝義實該之宜上尊號為孝文皇帝廟曰高祖陵曰長陵世宗從之既葬世宗固以勰為宰輔勰頻口陳遺旨請遂素懷世宗對勰悲慟每不許之勰頻煩表聞辭義懇切世宗難違遺敕遂其雅情猶逼以外任乃以勰為使持節侍中都督冀定幽瀛營安平七州諸軍事驃騎大將軍開府定州刺史勰仍陳讓又面申前意世宗固執不許乃述職尚書令王肅等奏臣等聞旌功表德道貴前王庸勳親親義高盛典是故姬旦翼周光宅曲阜東平宰漢寵絕列蕃彭城王勰景思內昭英風外發協廓乾規掃氛漢沔屬先帝在天鳳旌旋斾靜一六師肅寧南服登聖皇於天衢開有魏之靈祐論道中鉉王猷以穆七德丕宣九功在詠臣等參詳宜增邑一千五百戶詔曰覽奏倍增崩絕未足以上酬勳德且可如奏勰頻表固讓世宗許之世宗與勰書曰恪奉辭暨今悲戀哽咽歲月易遠便迫暮冬每思聞道奉承風教父既辭榮閑外無容頓違至德出蕃累朔荒馳實深今遣主書劉道斌奉宣悲戀願父來望必當屆京展洩哀窮指不云遠勰乃朝於京師景明初蕭寶卷豫州刺史裴叔業以壽春內屬詔勰都督南征諸軍事餘官如故與尚書令王肅迎接壽春詔曰五教治樞古難其選自非親賢兼切莫應斯舉王以明德懋親任屬保傅出居蕃陝入御袞章內外克諧民神攸屬今董率戎麾威號宜重可復授司徒以光望實又詔勰以本官領揚州刺史勰簡刑導禮與民休息州境無虞遐邇安靜揚州所統建安戍主胡景略猶為寶卷拒守不下勰水陸討之景略面縛出降自勰之至壽春東定城戍至於陽石西降建安山蠻順命斬首獲生以數萬計進位大司馬領司徒餘如故增邑八百戶又寶卷遣將陳伯之屯於肥口胡松又據梁城水軍相繼二百餘里勰部分將士分攻諸營伯之胡松率衆出戰諸將擊之斬首九千俘獲一萬伯之等僅以身免屯於烽火勰又分命諸將頻戰伯之計窮宵遁淮南平詔曰王戚尊上輔德勳莫二孤心昧識訓保攸憑比以壽春初開鎮壓任重故令王親董元戎遠撫淮外冒茲炎蒸衡蓋飄颻經略踰時必有虧損淹違詣覿夙夜係情兼制勝宣規威效兼著公私允稱義所欽嘉雖凱旋有期無申延屬可遣給事黃門侍郎鄭道昭就彼祗勞徵勰還朝勰政崇寬裕絲毫不犯淮南士庶追其餘惠至今思之初勰之定壽春也獲蕭寶卷汝陰太守王果豫州治中庾禝等數人勰傾衿禮之常參坐席果承間進曰果等契闊生平皓首播越顧瞻西夕餘光幾何今遭聖化正應力茲愚老申展尺寸但在南百口生死分張乞還江外以申德澤勰矜而許之果又謝曰殿下賜處有過國士果等今還仰負慈澤請聽仁駕振旅反跡江外至此乃還其為遠人所懷如此勰至京師世宗臨東堂引見詔勰曰比鳳皇未至蒼黎二化故仰屈尊謨綏懷邊附而寇豎昏迷敢鬬淮楚叔父英略高明應機殄定凱旋今辰伏慰悲佇勰謝曰臣忝充戍帥撫安新故而不能宣武導恩威懷遐邇致小豎伯之驅率蟻徒侵擾邊堡非唯仰慚天顏實亦俯愧朝列春秋責帥臣實當之賴陛下慈深捨過故使愚臣獲免罪責勰頻表辭大司馬領司徒及所增邑乞還中山有詔不許乃除錄尚書侍中司徒如故固辭不免勰雅好恬素不以勢利嬰心高祖重其事幹縶維不許雖臨崩遺詔復世宗留連每乖情願常悽然歎息以詔旨殷勤僶俛應命時咸陽王禧漸以驕矜頗有不法北海王詳陰言於世宗世宗深忌之又言勰大得人情不宜久在宰輔勸世宗遵高祖遺敕禧等又出領軍于烈為州非烈情願固強之烈深以為忿烈子忠嘗在左右密令忠言於世宗云諸王等意不可測宜廢之早自覽政時將礿祭王公並齋於廟東坊世宗遣于烈將宿衞壯士六十餘人召禧勰詳等引入見之於光極殿世宗謂勰曰頃來南北務殷不容仰遂沖操恪是何人而敢久違先敕今遂叔父高蹈之意勰謝曰先帝不以臣虛薄曲垂罔己之澤出入綢繆公私無捨自陛下龍飛九五屢求解落既為宰輔所抑亦不為陛下所許先歲夏中重塵天聽時蒙優借出為定州往年還洛陽敕總戎淮肥雖無功效幸免罪戾云歸未幾復委臣以非據之任臣頻煩干請具簡聖聽陛下孝深無改仰遵先詔上成睿明之美下遂微臣之志感惟今往悲喜交深乃詔曰王宿尚閑靜志捐世務先帝愛亮之至弗奪此情遺敕炳然許遂沖退雅操不移朕亦未敢違奪今乃釋位歸第丘園是營高尚之節確爾貞固賁履之操邈焉難追而王宅初構財力多闕成立之期歲月莫就可量遣工役分給材瓦禀王所好速令制辦務從簡素以稱王心勰因是作蠅賦以諭懷惡讒構也又以勰為太師勰遂固辭詔曰蓋二儀分象君臣之位形焉上下既位唱和之義生焉自古統天位主曷常不賴明師仗賢輔而後燮和陰陽彝倫民物者哉往而不返者先民誠有之斯所謂獨善其身而亂大倫山林之士耳賢人君子則不然也屈己以安民艱身以濟物所謂以先知覺後知同塵而與天下俱潔者也朕猥以沖年纂臨寶曆實賴叔父匡濟之功誠宜永兼將相以綱維內外但逼奪先旨憚違沖挹俛志割心以遂高素自比水旱乖和陰陽失序是以屈王論道庶燮茲玉燭且師宰從容無廢清尚故周旦復辟而居之尚父期頤以終位王義兼家國理絕獨高可遣侍中敦諭世宗又修家人書於勰曰恪言奉還告承猶