  - {type: variant, offset: 2804, length: 0, content: '', WYG: 臣兵弱南引}
  - {type: variant, offset: 2804, length: 0, content: '', krp: 臣兵弱南引}
  - {type: variant, offset: 2805, length: 0, content: '', WYG: 徳共為脣齒計文徳去年八月與義隆梁州刺史劉秀之同征長安聞臺遣大軍勢援雲集長安地平用馬為便畏國騎軍不敢北出但承仇池局本或作句或作勾皆疑人稱臺軍不多戍兵尠少諸州雜人各有還思軍勢若及必自奔逃進軍取城有易反掌承信其語回趣長安之兵遣文徳蕭道成王虬等將領來攻武都仇池望連秦隴進圍武都已經積日畏臣截後斷其糧路關鎮少兵未有大損今外寇兵彊臣力寡弱拒賊備敵非兵不擬乞選壯兵增戍武都牢城自守可以無患今事已切急若不馳聞損失城鎮恐招深責願遣髙平突騎二千賫糧一月速赴仇池且可抑折逆民支對賊虜須長闕上邽安定戍兵至可得自全糧者民之命也雖有金城湯池無糧不守仇池本無儲積今歲不收苦髙平騎至不知云何以得供援請遣秦州之民送軍祁山臣隨迎致詔髙平鎮將茍莫于率突騎二千以赴之道成等乃退徵豹子為尚書出為内都大官劉駿遣其將殷孝祖脩兩當城於清東以逼南境天水公封勑文擊之不剋詔豹子與給事中周邱等助擊之豹子以南寇城守攻圍費日遂略地至髙平劉駿瑕邱鎮遣歩卒五千助戍兩當去城八里與豹子前鋒候騎相遇即便交戰豹子軍繼至大破之縱騎追擊殺之至於城下其免者十餘人而已城内恐懼不敢出救既而班師先是河西諸胡亡匿避命豹子及前涇州刺史封阿君督河西諸軍南趣石樓與衞大將軍樂安王良以討羣胡豹子等與賊相對不覺胡走無捷而還又坐免官尋以前後戰功復擢為内都大官和平五年六月卒髙宗追惜之贈淮陽王諡曰襄賜命服一襲子道}
