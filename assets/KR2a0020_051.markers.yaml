  - {type: variant, offset: 486, length: 339, content: 彥質厚慎密與人言不及內事世祖以此益親待之進爵武昌公拜安東將軍相州刺史在州受納多違法度詔書切讓之然以彥腹心近臣弗之罪也真君二年卒諡曰宣公子宗之初入為中散領內祕書世祖臨江賜爵高鄉侯高宗踐阼遷殿中尚書出為鎮東將軍定州刺史潁川公受敕討丁零丁零既平宗之因循郡縣求取不節深澤人馬超毀謗宗之宗之怒遂毆殺超懼超家人告狀上超謗訕朝政高宗聞之曰此必妄也朕為天下主何惡於超而超有此言必是宗之懼罪誣超按驗果然事下有司司空伊戨等以宗之腹心近臣出居方伯不能宣揚本朝盡心綏導而侵損齊民枉殺良善妄列無辜上塵朝廷誣詐不道理合極刑太安二年冬遂斬於都南宗之孫亮字元規正光中盪寇將軍稍遷冀州驃騎長史司徒諮議參軍年五十二卒宗之長兄熙字德融襲爵武昌公中書郎早卒子安仁襲除中書郎卒贈安東將軍冀州刺史諡曰簡子元康襲爵後降為侯拜, WYG: 加}
