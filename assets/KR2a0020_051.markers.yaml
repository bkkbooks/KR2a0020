  - {type: variant, offset: 2934, length: 2, content: 邃起, WYG: 萬䕶讓爵於弟翰於時讓者惟萬䕶及元氏侯趙辟惡子元伯讓其弟次興朝廷議而許之翰族孫靜世宗時歴位征虜將軍武衞將軍太子左衞率以幹用稱延昌中遷平北將軍恒州刺史臨朐都䕶坐事免卒子熙奉朝請遷員外散騎侍郎給事中與薛曇尚迎蠕蠕主婆羅門於涼州又除鎮逺將軍河陰令卒贈輔國將軍朔州刺史子纘武定末潁川太守呂羅漢本東平壽張人其先石勒時徙居幽州祖顯字子明少好學性廉直鄉人有分爭者皆就而質焉慕容垂以為河間太守皇始初以郡來降太祖嘉之賜爵魏昌男拜鉅鹿太守清身奉公務存贍恤妻子不免飢寒民頌之曰時惟府君克己清明緝我荒土民胥樂生願壽無疆以享長齡卒官父溫字晞陽善書好施有文武才略世祖伐赫連昌以溫為幢將先登䧟陳每戰必捷以功拜宣威將軍奉車都尉出為秦州司馬遷上黨太守善勸課有治名卒贈平逺將軍豫州刺史野王侯諡曰敬羅漢仁篤慎密弱冠以武幹知名父溫之佐秦州羅漢隨侍隴右氐楊難當率衆數萬寇上邽秦民多應之鎮將元意頭知羅漢善射共登西城樓令羅漢射難當隊將及兵二十三人應弦而殪賊衆轉盛羅漢進計曰今若不出戰示敵以弱衆情􅂝貳大事去矣意頭善之即簡千餘騎令羅漢出戰羅漢與諸騎策馬大呼直衝難當軍衆皆披靡殺難當左右隊騎八人難當大驚會世祖賜難當璽書責其䟦扈難當乃引還仇池意頭具以狀聞世祖嘉之徵為羽林中郎上邽休官呂豐屠各王飛亷等八千餘}
