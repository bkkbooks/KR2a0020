  - {type: variant, offset: 2847, length: 6, content: 襀證訢言爾妄, WYG: 軍入枹罕虜拾歸妻子及其民户分徙千家於上邽留烏頭守枹罕金城邊冏天水梁會謀反扇動秦益二州雜人萬餘户據上邽東城攻逼西城勑文先已設備殺賊百餘人被傷者衆賊乃引退冏會復率衆四千攻城氐羌一萬屯於南嶺休官屠各及諸雜户二萬餘人屯於北嶺為冏等形援勑文遣二將領騎二百設備門内別令騎出擊之既而偽退冏率衆騰逐勑文輕騎横衝大破之斬冏而北嶺之賊從髙射勑文軍人飛矢如雨梁會得奔北嶺騎乃引還復推會為主勑文分兵二百人突入南城燒其門樓賊見火起衆皆驚亂又遣歩卒攻門剋之便率騎士馳入賊餘衆開門出走奔入東城乘背追擊殺千餘人安豐公閭根率軍助勑文勑文表曰安定逆賊帥路那羅遣使齎書與逆帥梁會會以那羅書射於城中那羅稱纂集衆旅剋期助會又仇池城民李洪自稱應王天授玉璽擅作符書誑惑百姓梁會遣使招引楊文徳而文徳遣權壽胡將兵二十人來到會間扇動州土}
