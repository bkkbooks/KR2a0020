  - {type: variant, offset: 2797, length: 1, content: 徐, WYG: 進爵淮陽公鎮長安尋加征西將軍後坐盜官財徙於統萬真君三年劉義隆遣將裴方明等侵南秦王楊難當遂陷仇池世祖徵豹子復其爵位尋拜使持節仇池鎮將督關中諸軍與建興公古弼等分命諸將十道並進四年正月豹子進擊樂鄉大破之擒義隆將王奐之王長卿等六人斬首二千餘級俘獲一千人豹子進軍下辨義隆將强元明辛伯奮棄城遁走追斬之悉獲其衆義隆使其秦}
