  - {type: variant, offset: 1071, length: 1718, content: 高陽太守太中大夫興和三年卒年四十一贈鎮東將軍瀛州刺史曄弟惇字季良武定末兼大司農卿熙弟龍官至趙郡太守孫琰字長琳有幹用初除太學博士累遷尚書南主客郎瀛州中正孝昌中卒年四十七贈平東將軍滄州刺史永熙中重贈散騎常侍衞將軍尚書右僕射瀛州刺史琰弟璣字仲衡有識尚廣平王常侍員外散騎侍郎諫議大夫遷通直散騎常侍瀛州大中正散騎常侍滎陽太守行南青州事卒年五十五琰兄弟並通率多與勝流交遊又有博陵許赤虎涉獵經史善嘲謔延興中著作佐郎與慕容白曜南討後使江南應對敏捷雖言不典故而南人頗稱機辯滑稽焉使還為東郡太守卒官子陀定州長史李訢字元盛小名真奴范陽人也曾袓產產子績二世知名於慕容氏父崇馮跋吏部尚書石城太守延和初車駕至和龍崇率十餘郡歸降世袓甚禮之呼曰李公以崇為平西將軍北幽州刺史固安侯卒年八十一諡曰襄侯訢母賤為諸兄所輕崇曰此子之生相者言貴吾每觀察或未可知遂使入都為中書學生世袓幸中書學見而異之指謂從者曰此小兒終效用於朕之子孫矣因識眄之世袓舅陽平王杜超有女將許貴戚世袓聞之謂超曰李訢後必宦達益人門戶可以女妻之勿許他貴也遂勸成婚南人李哲嘗言訢必當貴達杜超之死也世袓親哭三日訢以超壻得在喪位出入帝目而指之謂左右曰觀此人舉動豈不有異於衆必為朕家幹事之臣訢聰敏機辯強記明察初李靈為高宗博士諮議詔崔浩選中書學生器業優者為助教浩舉其弟子箱子與盧度世李敷三人應之給事高讜子祐尚書段霸兒姪等以為浩阿其親戚言於恭宗恭宗以浩為不平聞之於世袓世袓意在於訢曰云何不取幽州刺史李崇老翁兒也浩對曰前亦言訢合選但以其先行在外故不取之世袓曰可待訢還箱子等罷之訢為世袓所識如此遂除中書助教博士稍見任用入授高宗經高宗即位訢以舊恩親寵遷儀曹尚書領中祕書賜爵扶風公加安東將軍贈其母孫氏為容城君高宗顧謂羣臣曰朕始學之歲情未能專既總萬機溫習靡暇是故儒道實有闕焉豈惟予咎抑亦師傅之不勤所以爵賞仍隆者蓋不遺舊也訢免冠拜謝出為使持節安南將軍相州刺史為政清簡明於折獄姦盜止息百姓稱之訢上疏求立學校曰臣聞至治之隆非文德無以經綸王道太平之美非良才無以光贊皇化是以昔之明主建庠序於京畿立學官於郡邑教國子弟習其道藝然後選其俊異以為造士今聖治欽明道隆三五九服之民咸仰德化而所在州土學校未立臣雖不敏誠願備之使後生聞雅頌之音童幼覩經教之本臣昔蒙恩寵長管中祕時課修學有成立之人髦俊之士已蒙進用臣今重荷榮遇顯任方岳思闡帝猷光宣於外自到以來訪諸文學舊德已老後生未進歲首所貢雖依制遣對問之日懼不克堪臣愚欲仰依先典於州郡治所各立學官使士望之流冠冕之胄就而受業庶必有成其經藝通明者貢之王府則郁郁之文於是不墜書奏顯袓從之以訢治為諸州之最加賜衣服自是遂有驕矜自得之志乃受納民財及商胡珍寶兵民告言尚書李敷與訢少長相好每左右之或有勸以奏聞敷不許顯袓聞訢罪狀檻車徵訢拷劾抵罪時敷兄弟將見疏斥有司諷訢以中旨嫌敷兄弟之意令訢告列敷等隱罪可得自全訢深所不欲且弗之知也乃謂其女壻裴攸曰吾宗與李敷族世雖遠情如一家在事既有此勸竟如何也昨來每欲為此取死引簪自刺以帶自絞而不能致絕且亦不知其事攸曰何為為他死也敷兄弟事釁可知有馮闡者先為敷所敗其家切恨之但呼闡弟問之足知委曲訢從其言又趙郡范襀具條列敷兄弟事狀有司以聞敷坐得罪詔列訢貪冒罪應死以糾李敷兄弟故得降免百鞭髠刑配為厮役訢之廢也平壽侯張讜見訢與語奇之謂人曰此佳士也終不久屈未幾而復為太倉尚書攝南部事用范襀陳端等計令千里之外戶別轉運詣倉輸之所在委滯停延歲月百姓競以貨賂各求在前於是遠近大為困弊道路羣議曰畜聚斂之臣未若盜臣訢弟左將軍璞謂訢曰范襀善能降人以色假人以辭未聞德義之言但有勢利之說聽其言也甘察其行也賊所謂諂諛讒慝貪冒姦佞不早絕之後悔無及訢不從彌信之腹心之事皆以告襀訢既寵於顯袓參決軍國大議兼典選舉權傾內外百僚莫不曲節以事之襀以無功起家拜慮奴令延興末詔曰尚書李訢著勳先朝弼諧皇極讜言嘉謀旬日屢進實國家之楨幹當今之老成也是以擢授南部綜理煩務自在厥位夙夜惟夤乃心匪懈克己復禮退食自公利上之事知無不為賞罰所加不避疏戚雖孝子之思慈母鷹鸇之逐鳥雀何以方之若鄭之子產魯之季文亦未加也然惡直醜正盜憎主人自往年以來羣姦不息劫訢宗人李英等四家焚燒舍宅傷害良善此而可忍孰不可恕有司可明加購募必令擒殄六月顯袓崩訢遷司空進爵范陽公七月以訢為侍中鎮南大, WYG: ''}
