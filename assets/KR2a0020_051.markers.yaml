  - {type: variant, offset: 2864, length: 68, content: 顧余之厚德而忍為此不仁甚矣襀曰公德於襀何若李敷之德於公公昔忍於敷襀今敢不忍於公乎訢慨然曰吾不用璞言自貽伊戚萬悔於心何嗟及矣遂見誅訢有三子, WYG: 剋天安元年五月卒}
