  - {type: variant, offset: 2854, length: 0, content: '', WYG: 李洪自稱應王兩雄不並若欲須我先殺李洪我當自往梁會欲引致文徳誘說李洪來入東城即斬洪首送與文徳仇池鎮將淮陽公臣豹子遣使濳行以今月二十四日來達臣鎮稱楊文徳受劉義隆職爵領兵聚衆在仇池境中沮動民人規竊城鎮且梁會反逆以來南勾文徳援勢相連武都氐羌盡相脣齒為文徳起軍所在屯結兵衆已集剋來不逺臣備邊鎮與賊相持賊在東城隔墻而已但以腹背有敵攻城有疑討度文徳剋來助會若文徳既至百姓響應賊黨遂甚用功益難今文徳未到會復未熟事宜速擊於時為便伏願天鑒特遣大軍助臣誅翦表未及報梁會謀欲逃遁先是勑文掘重壍於東城之外斷賊走路夜中會乃車陳飛梯騰壍而走勑文先嚴兵於壍外拒鬭從夜至旦勑文謀於衆曰困獸猶鬬而況於人賊衆}
