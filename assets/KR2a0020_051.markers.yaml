  - {type: variant, offset: 2937, length: 0, content: '', WYG: 據險為逆詔羅漢率騎一千討擒之從征懸瓠羅漢與瑯邪王司馬楚之駕前招慰降者九千餘户比至盱眙頻破賊軍擒其將顧儼李觀之等以功遷羽林中郎幢將賜爵烏程子加建威將軍及南安王余立羅漢猶典宿衞髙宗之立羅漢有功焉遷少卿仍幢將進爵野王侯加龍驤將軍}
