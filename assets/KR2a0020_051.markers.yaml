  - {type: variant, offset: 3055, length: 0, content: '', WYG: 進爵成陽公入為散騎常侍顯祖初劉彧徐州刺史薛安都以彭城内附彧遣將張永沈攸之等擊安都安都上表請援顯祖進伯恭號鎮東將軍副尚書尉元救之軍次于秺賊將周凱聞伯恭等軍至棄衆遁走張永仍屯下磕永輜重在武原伯恭等攻而剋之永計無所出引師而退時皇興元年正月天大寒雪泗水冰合永與攸之棄船而走伯恭等進擊首虜及凍死甚衆八月伯恭以書喻下邳宿豫城内曰劉彧肆逆滔天弗鑒靈命猶謂絶而復興長江可恃敢遣張永周凱等率此蟻衆送死彭城大軍未臨逆首奔潰今乘機電舉當屠此城遂平吳會弔民代罪幸時歸欵自求多福時攸之吳憘公等率衆數萬來援下邳屯軍焦墟曲去下邳五十餘里伯恭遣子都將侯汾等率騎五百在水南奚升等五百餘騎在水北南北邀之伯恭宻造火車攻具欲水陸俱進攸之等既聞將戰引軍退保樊階城伯恭又令子都將孫天慶等歩騎六千向零中峽斫木斷清水路劉彧寧朔將軍陳顯達領衆二千溯清而上以迎攸之屯於睢清合口伯恭率衆渡水大破顯達軍俘斬十九攸之聞顯達軍敗順流退下伯恭部分諸將俠清南北尋攸之軍後伯恭從睢陵城東向零中峽分軍為二道遣司馬范師子等在清南伯恭從清西與攸之合戰遂大破之斬其將姜産之髙遵世及邱幼弼邱隆先沈榮宗陸道景等首攸之憘公等輕騎遁走乘勝追奔八十餘里軍資器械虜獲萬計進攻宿豫劉彧戍將魯僧遵棄城夜遁又遣將孔太恒等領募騎一千南討淮陽彧太守崔武仲焚城南走遂據淮陽二年以伯恭為散騎常侍都督徐南兗州諸軍事鎮東將軍彭城鎮將東海公三年十月卒贈鎮東大將軍東海王}
