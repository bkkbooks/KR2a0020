  - {type: variant, offset: 2954, length: 0, content: '', WYG: 公元目振都督中外軍事出為鎮西將軍秦益二州刺史時仇池氐羌反攻逼駱谷鎮將吳保元走登百頃請援於羅漢羅漢帥歩騎隨長孫觀掩擊氐羌大破之斬其渠帥賊衆退散詔羅漢曰卿以勞勤獲叙才能致用内總禁旅外臨方岳襃寵之隆可謂備矣自非盡節竭誠將何以垂名竹帛仇池接近邊境兵革屢興既勞士卒亦動民庶皆由鎮將不明綏禁不理之所致也卿應機赴擊殄此兇醜隴右土險民亦剛悍若不導之以徳齊之以刑宼賊莫由可息百姓無以得靜朕垂心治道欲使逺近清穆卿可召集豪右擇其事宜以利民為先益國為本隨其風俗以施威惠其有安土樂業奉公勤私者善加勸督無奪時利明相宣告稱朕意焉涇州民張羌郎扇惑隴東聚衆千餘人州軍討之不能制羅漢率歩騎一千擊羌郎擒之仇池氐羌叛逆遂甚所在鋒起道路斷絶其賊帥蛩廉符祈等皆受劉昱官爵鐵券略陽公伏阿奴為都將與羅漢赴討所在破之生擒廉祈等秦益阻逺南連仇池西接赤水諸羌恃險數為叛逆自羅漢蒞州撫以威惠西戎懐徳土境怗然髙祖詔羅漢曰朕總攝萬幾統臨四海思隆古道光顯風教故内委羣司外任方牧正是志士建節之秋忠臣立功之會然赤水諸羌居邊土非卿善誘何以招輯卿所得口馬表求貢奉朕嘉乃誠便勑領納其馬印付都牧口以賜卿徴拜内都大官聴訟察獄多得其情太和六年卒於官髙祖深悼惜之賜命服一襲贈以本官諡曰莊公長子興祖襲爵山陽公後例降為侯景明元年卒興祖弟伯慶為中散咸陽王禧郎中令伯慶弟世興校書郎羅漢弟大檀為中散恒農太守大檀弟豹子東萊鎮將後改鎮為州行光州事豹子弟七寳侍御中散遷少卿出為假節龍驤將軍東雍州刺史孔伯恭魏郡鄴人也父昭始光初以宻皇后親賜爵汝陰侯加安}
