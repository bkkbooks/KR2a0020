  - {type: 'tls:seg', offset: 2846, content: '', id: KR2a0020_ZHSJ_051-d51p31s14}
  - {type: variant, offset: 2846, length: 0, content: '', WYG: 要蕃防守事宜尤須完實從前以來駱谷置鎮是以奸賊息闚􅎿之心邊城無危敗之禍近由徙就建安致有往年之役前勑卿等部率兵將駱谷築城雖有一時之勤終致永延之固而卿等不祗詔命至于今日徒使兵人稽頓無事閑停方復曲辭表求罷下豈是良將忘身憂國盡忠之謂也諸州之兵已復一歲宜暫戮力成此要功卿等表求來年築城豈不更勞兵將孰若因今之勢即令就之一勞永逸事不再舉也今更給軍糧一月速於駱谷築城使四月盡必令成就訖若不時營築乃築而不成成而不固以軍法從事南天水郡民柳旃據險不順喜率衆討滅之轉散騎常侍安南將軍豫州刺史詔讓其在州寛怠以飲酒廢事威不禁下遣使者就州決以杖罰七年卒贈以本官諡曰恭公子承宗襲爵喜弟雙仁冠軍將軍仇池鎮將封勑文代人也祖豆皇始初領衆三萬東征幽州平定三郡拜幽州刺史後為使持節都督冀青二州諸軍事前將軍開府冀青二州刺史關内侯父湼太宗時為侍御長卒贈龍驤將軍定州刺史章武侯諡曰隱勑文始光初為中散稍遷西部尚書出為使持節散騎常侍鎮西將軍開府領䕶西夷校尉秦益二州刺史賜爵天水公鎮上邽詔勑文率歩騎七千征吐谷渾慕利延兄子拾歸於枹罕衆少不能制詔遣安逺將軍廣川公乙烏頭等二軍與勑文會隴右軍次武始拾歸夜遁勑文}
