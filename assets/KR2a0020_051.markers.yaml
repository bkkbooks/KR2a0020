  - {type: variant, offset: 2862, length: 1, content: 爾, WYG: 初勑文以白虎幡宣告賊衆曰若能歸降原其生命應時降者六百餘人會知人心沮壞於是分遁勑文縱騎躡之死者大半俘獲四千五百餘口略陽王元達因梁會之亂聚衆攻城招引休官屠各之衆推天水休官王宦興為秦地王勑文與臨淮公莫真討之軍次略陽勑文遣使慰諭而元達等三千餘人屯於松多川乃部分諸軍三道並攻賊出營拒戰大破之俘三千人髙宗時與新平公周盆擊劉駿將殷孝祖于清東}
