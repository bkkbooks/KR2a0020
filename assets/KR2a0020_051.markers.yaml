  - {type: variant, offset: 841, length: 229, content: 河州刺史將軍如故入為廷尉少卿除魏郡太守固辭不拜尋卒贈征虜將軍營州刺史諡曰肅子廓字崇遠襲爵除奉朝請累遷頓丘東太原二郡太守卒年二十八子子躬襲子躬武定末中外府水曹參軍齊受禪爵例降子躬弟子憲太尉中兵參軍元康弟護州主簿子瑞字徵之亦州主簿卒瑞弟絢字伯禮頗有業尚閨門雍睦三世同居吏部尚書李神儁常稱其家風自侍御史累遷尚書左民郎司徒諮議參軍修起居注後拜太中大夫興和初卒年四十七贈使持節都督冀瀛二州諸軍事征東將軍吏部尚書冀州刺史絢弟遜武定末東陽平太守遜弟曄字叔明性開率州治中別駕, WYG: 安}
