  - {type: variant, offset: 2801, length: 2, content: 范襀, WYG: 胡崇之鎮仇池至漢中聞官軍已西懼不敢進方明益其兵而遣之豹子與司馬楚之至於濁水擊擒崇之盡虜其衆進至髙平義隆將姜道祖降仇池平未幾諸氐復反推楊文徳為主以圍仇池古弼率諸軍討平之時豹子次於下辨聞圍解欲還弼遣使謂豹子曰賊耻其負敗必求報復後舉為難不如陳兵以待之豹子以為然尋除都督秦雍荆梁益五州諸軍事進號征西大將軍開府仇池鎮將持節公如故十一月義隆復遣楊文徳姜道盛率衆二萬人寇濁水別遣將青陽顯伯守斧山以拒豹子濁水城兵射殺道盛豹子至斧山斬顯伯悉俘其衆豹子又與河間公元齊俱會於濁水賊衆震恐棄其兵甲夜遁初南秦王楊難當歸命詔送楊氏子弟詣京師文徳以行賂得留亡奔漢中義隆以文徳為武都王給兵二千人守葭蘆城招誘氐羌於是武都陰平五部氐民叛應文徳詔豹子率諸軍討之文徳阻兵固險拒豹子文徳將楊髙來䧏引諸軍向其城文徳棄城南走收其妻子寮屬軍資及故武都王保宗妻公主送京師義隆白水太守郭啓元率衆救文徳豹子分軍逆擊大破之啓元文徳走還漢中興安二年正月義隆遣其將蕭道成王虬馬光等入漢中別令楊文徳楊頭等率諸氐羌圍武都城中拒之殺賊二百餘人豹子分兵將救之至女磊聞賊停軍豹子遣人於祁山取馬欲往赴援文徳謂豹子欲斷其糧運回軍還入覆津據險自固義隆恐其輙回又增兵益將令晉壽白水送糧覆津漢川武興運粟甘泉皆置倉儲豹子表曰義隆增兵運糧剋必送死臣所領之衆本自不多唯仰民兵專恃防固其統萬安定二鎮之衆從戎以來經三四歲長安之兵役過期月未有代期衣糧俱盡形顔枯悴窘切戀家逃亡不已既臨寇難不任攻戰士民奸通}
