  - {type: variant, offset: 2840, length: 3, content: 叛狀訢, WYG: 所陳計略商校利害料其應否寧邊益國專之可也今軍威既振羣愚懾服革弊崇新有易因之勢寛猛之宜任其量處應立郡縣者亦聽銓置其楊文度楊鼠親屬家累部送赴臺仇池南秦之根本守禦資儲特須豐積險阻之要尤宜守防令奸覘之徒絶其僥倖勉勤戎務綏靜新俗懷民安士稱朕意焉又詔喜等}
