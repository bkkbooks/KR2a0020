  - {type: variant, offset: 3220, length: 146, content: 學生祕書中散侍御中散出為燕郡范陽二郡太守入為員外散騎常侍尚書右丞中堅將軍遷左丞延昌三年卒贈平遠將軍南青州刺史諡曰敬初崇之歸魏也與州里北平田彪俱降而彪子孫遂微劣焉史臣曰魏氏之有天下百餘年中任刑為治蹉跌之間便至夷滅竇瑾李訢器識既美時曰良幹瑾以片言疑似訢以夙故猜嫌而嬰合門之戮悲夫宗之不全自貽伊戚矣, WYG: 卷五十一考證}
