  - {type: variant, offset: 860, length: 3, content: 父風世, WYG: 和邃之譽自員外郎稍遷羽林監通直散騎常侍冠軍將軍給事黄門侍郎清河王懌死後义黜略為懐朔鎮副將未及赴任㑹熙起兵與畧書來去尋值熙敗畧遂濳行自託舊識河内司馬始賓始賓便為荻茷夜與畧俱渡盟津詣上黨屯留縣栗法光法光素敦信義忻而納之畧舊識刁雙時為西河太守略復歸之停止經年雙乃令從子昌送畧濳遁江左蕭衍甚禮敬之封畧為中山王邑一千户宣城太守俄而徐州刺史元法僧據城南叛州内士庶皆為法僧擁逼衍乃以畧為大都督令詣彭城接誘初附畧至屯於河南為安樂王鑒所破畧唯數十騎入城衍尋遣其豫章王綜鎮徐州徴畧與法僧同還畧雖在江南自以家禍晨夜哭泣身若居喪又惡法僧為人與法僧言未嘗一笑衍復除畧衡州刺史未行㑹綜以城歸國綜長史江革司馬}
  - {type: page-break, offset: 860, content: '', id: KR2a0020_WYG_019-82a, image: WYG0261/WYG0261-0316a.png}
