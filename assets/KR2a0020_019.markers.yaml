  - {type: variant, offset: 626, length: 2, content: 謀範, WYG: 譏深願思任城之言東陽公元丕等進曰皇太子雖聖徳夙彰然實沖幼陛下富於春秋始覽機政普天景仰率土傒心欲隆獨善不以萬物為意其若宗廟何其若億兆何顯祖曰儲宮正統受終文祖羣公相之有何不可於是傳位於髙祖後蠕蠕犯塞雲為中軍大都督從顯祖討之遇於大磧事具蠕蠕傳後仇池氐反以雲為征西大將軍討平之除都督徐兖二州緣淮諸軍事征東大將軍開府徐州刺史雲以太妃蓋氏薨表求解任顯祖不許雲悲號動疾乃許之性善撫綏得徐方之心為百姓所追戀送遺錢貨一無所受顯祖}
