  - {type: variant, offset: 944, length: 0, content: '', krp: 和龍鎮都大將營州刺史加領護東夷校尉轉為鎮北將軍行鎮北大將軍高祖引見百官於光極堂謂思譽曰恒代路懸舊都意重故屈叔父逺臨此任不可不敬慎所臨以副朕望及穆泰隂謀不軌思譽知而不告恕死削封為庶人太和末還復其王封正始四年薨贈光州刺史諡曰密王子景畧字世彦世宗時襲封拜驍騎將軍除持節冠軍將軍幽州刺史熙平元年薨贈本將軍豫州刺史賜帛四百疋諡曰惠王子霸字休邦襲武定中鉅鹿太守齊受禪爵例降景畧弟慶畧散騎侍郎子子政通直散騎常侍慶畧弟洪畧恒農太守中軍將軍行東雍州刺史洪畧弟子業平原太守定安王休皇興二年封拜征南大將軍外都大官休}
  - {type: variant, offset: 945, length: 0, content: '', WYG: 而聰慧治斷有稱高祖初庫莫奚寇邊以休為使持節侍中都督諸軍事征東大將軍領護東夷校尉儀同三司和龍鎮將休撫防有方賊乃款附入為中都大官蠕蠕犯塞出為使持節征北大將軍撫㝠鎮大將休身先將士擊虜退之入為内都大官遷太傅及開建五等食邑二千户車駕南伐領大司馬髙祖親行諸軍遇休以三盗人狥於六軍將斬之有詔赦之休執曰陛下將逺清衡霍故親御六師跋涉野次軍行始爾已有姦竊如其不斬何以息盗請必行刑以肅姦慝詔曰大司馬執憲誠應如是但因緣㑹朕聞王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔髙祖謂司徒馮誕曰大司馬嚴而秉法諸軍不可不慎於是六軍肅然定都洛邑休從駕幸鄴命休率從駕文武迎家于平城髙祖親餞休於漳水之北十八年休寢疾高祖幸其第流涕問疾中使醫藥相望於路薨賵帛三千匹自薨至殯車駕三臨髙祖至其門改服裼衰素弁加絰皇太子百官皆從行弔禮及將葬又贈布帛二千匹諡曰靖王詔假黄鉞加羽葆鼓吹虎賁班劒六十三人悉凖三老尉元之儀髙祖親送出郊慟哭而返諸王恩禮莫比焉世宗世配饗廟庭長子安幼年早卒次子燮除下大夫世宗初襲拜太中大夫除征虜將軍華州刺史燮表曰謹惟州治李潤堡雖是少梁舊地晉芮錫壤然胡夷内附遂為戎落城非舊邑先代之名爰自國初護羌小戍及改鎮立郡依岳立州因籍倉府未刋名實竊見馮翊古城羌魏兩民之交許洛水陸之際先漢之左輔皇魏之右翼形勝名都實惟西蕃奥府今州之所左豈唯非舊至乃居岡飲澗井谷穢雜升降劬勞往還數里譐誻明昬有虧禮教未若馮翊面華渭包原澤井淺池平樵牧饒廣採材華隂陸運七十伐木龍門順流而下陪削舊雉功省力易人各為已不以為勞昔宋民無井穿井而忻得人況合城無水得水而不家慶竊聞前政刺史非是無意或値兵舉或遇年災緣此契闊稽延至此去歲已熟秋方大登四境晏安京師無事丁不十錢之費人無八旬之勤損輕益重乞垂昭鑒遂詔曰一勞永逸便可聽移後除征虜將軍豳州刺史延昌四年薨贈本將軍朔州刺史子超字化生肅宗初襲時以胡國珍封安定公改封北平王拜城門校尉通直散騎常侍東中郎將尋除光禄大夫領將作大匠後復本封尒朱榮之入洛超避難洛南遇寇見害荘帝初贈車騎大將軍儀同三司岐州刺史子孝景襲武定中通直郎齊受禪爵例降燮弟願平清狂無行髙祖末拜員外郎世宗初遷給事中悖惡日甚殺人刼盗公私咸患世宗以其戚近未忍致之於法乃免官禁之别館館名愁思堂冀其克念世宗崩願平乃得出靈太后臨朝以其暴亂不悛詔曰願平志行輕疎每乖憲典可還於别館依前禁錮久之解禁還家付師嚴加誨奬後拜通直散騎常侍前將軍坐祼其妻王氏於其男女之前又彊姦妻妹於妻母之側御史中丞侯剛案以不道處死絞刑㑹赦免黜為員外常侍孝昌中卒子緒幽州安西府功曹叅軍莊帝初直閤將軍尋為持節兼武衛將軍闗右慰勞十二州大使遂沒吐谷渾子長春員外散騎侍郎武定初封南郡王邑五百戸齊受禪爵例降願平弟永平征虜將軍南州刺史為城民華延明所害太昌初追贈使持節侍中都督定瀛幽三州諸軍事衛將軍定州刺史永平弟珍平司州治中子叔遵員外散騎常侍珍平弟貴平羽林監轉射聲校尉莊帝初除散騎常侍宗正少卿封東萊王邑百户除平北將軍南相州刺史莊帝既殺尒朱榮加武衛將軍兼侍中為河北山東慰勞大使至定州東北為幽州大都督侯淵所執送於晉陽後還洛前廢帝時以本官行青州事屬土民崔祖螭作逆賊徒甚盛圍逼東陽一百餘日貴平率城民固守又令將士開門交戰大軍救至遂擒祖螭等斬之還除車騎將軍加散騎常侍遷左衛將軍宗師又遷車騎大將軍左光禄大夫儀同三司貴平人才險薄為出帝所信出為青州刺史又加驃騎大將軍開府儀同三司為幽州大都督侯淵所害史臣曰南安原始要終}
