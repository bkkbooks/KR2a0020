  - {type: variant, offset: 719, length: 0, content: '', WYG: 皆以便宜從事詔英曰賊勢滋甚圍逼肥梁邊將後䂓以至於此故有斯舉必期勝㨗而出軍淹滯肥梁已䧟聞之惋懣實乖本圖今衆軍雲集十有五萬進取之方其算安在克殄之期復當逺近竟以幾日可至賊所必勝之䂓何者為先故遣步兵校尉領中書舎人王雲指取機要英表陳事機乃擊破隂陵斬衍將二十五人及虜首五千餘級又頻破賊軍於梁城斬其支將四十二人殺獲及溺死者將五萬衍中軍大將軍臨川王蕭宏尚書左僕射桞惔等大將五人㳂淮南走凡收米三十萬石詔勞英曰知大摧鯨寇威振南海江浦無塵三楚卷􅅽聲被荒隅同軌斯始公私慶慰良副朕懐便當乘威藉響長驅吳㑹翦拉遺燼截彼東南也英追至于馬頭衍馬頭戍主委城遁走遂圍鍾離詔曰師行已久士馬疲瘠賊城險固卒難攻屠冬春之交稍非勝便十萬之衆日費無貲方圖後舉不待全事且可密装徐嚴為振旅之意整疆完土開示威畧左右蠻楚素應逃亡或竄山湖或難制掠若凶渠黠黨有須翦除者便可撲掃以清疆界如其彊狡憑阻未易致力者亦不煩肆兵凱旋遲近不復委曲英表曰臣奉辭伐罪志殄逋寇想敵量攻期至二月將末三月之初理在必克但自此月一日以來霖雨連併可謂天違人願然王者行師舉動不易不可以少致睽淹便生異議臣亦諦思若入三月已後天晴地燥憑陵是常如其連雨仍接不得進攻者臣已更髙邵陽之橋防其汎突意外洪長慮其破橋臣亦部分造船復於鍾離城隨水狹處營造浮橋至三月中旬橋必克成晴則攻騰雨則圍守水陸二圖以得為限實願朝廷特開逺畧少復賜寛假以日月無使為山之功中途而廢詔曰大軍野次已成勞久攻守之方理可豫見比頻得啓制勝不過暮春及省後表復期孟夏之末彼土蒸濘無宜久淹勢雖必取乃將軍之深計兵久力殆亦朝廷之所憂故遣主書曹道徃觀軍勢使還三具聞及道還英猶表云可克四月水盛破橋英及諸將狼狽奔走士衆沒者十有五六英至揚州遣使送節及衣冠貂蟬章綬詔以付典有司奏英經算失圖案劾處死詔恕死為民後京兆王愉反英復王封邑一千户除使持節假}
