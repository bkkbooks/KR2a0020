  - {type: variant, offset: 616, length: 0, content: '', WYG: 詔曰謹權審度自昔令典定章革歴往代良規匡宗室賢亮留心既久可令更集儒貴以時驗決必務權衡得衷令寸籥不舛又詔曰故廣平殤王洛侯體自恭宗茂年薨殞國除祀廢不祀忽諸匡親同若子私繼嵗久宜樹維城永兹磐石可特襲王爵封東平郡王匡所制尺度訖請集朝士議定是非詔付門下尚書三府九列議定以聞太師高陽王雍等議曰伏惟高祖創改權量已定匡今新造微有參差且匡云所造尺度與漢志王莽權斛不殊又晉中書監荀朂云後漢至魏尺長於古四分有餘於是依周禮積黍以起度量惟古玉律及鍾}
