  - {type: variant, offset: 570, length: 0, content: '', WYG: 将以黷貨削除官爵後除祕書監還復前爵拜統萬鎮将改封西河後改鎮為夏州仍以太興為刺史除守衛尉卿初太興遇患請諸沙門行道所有資財一時布施乞求病愈名曰散生齋及齋後僧皆四散有一沙門方云乞齋餘食太興戲之曰齋食既盡唯有酒肉沙門曰亦能食之因出酒一斗羊脚一隻食盡猶言不飽及辭出後酒肉俱在出門追之無所見太興遂佛前乞願向者之師當非俗人若此病得差即捨王爵入道未幾便愈遂請為沙門表十餘上乃見許時髙祖南討在軍詔皇太子於四月八日為之下髪施帛二千匹既為沙門更名僧懿居嵩山太和二十二年終子昴字伯暉襲薨子悰字魏慶襲孝静時累遷太尉錄尚書事司州牧青州刺史薨於州贈假黄鉞太傅司徒公諡曰文悰寛和有度量美容貌風望儼然得喪之間不見於色性清儉不營産業身死之日家無餘財昴弟仲景性嚴峭莊帝時兼御史中尉京師肅然每向臺恒駕赤牛時人號赤牛中尉太昌初為河南尹奉法無私時吏部尚書樊子鵠部下縱横又為盜竊仲景密加收捕悉獲之咸即行決於是豪貴寒心出帝}
