  - {type: variant, offset: 721, length: 0, content: '', WYG: 如風發攻如河決英恐其并力於東乃使長史李華率五統向西闗分其兵勢身督諸軍向東闗先是馬仙埤使雲騎將軍馬廣率衆拒屯於長薄軍主胡文超别屯松峴英至長薄馬廣夜遁入於武陽英進師攻之聞衍遣其冠軍將軍彭瓮生驃騎將軍徐超秀援武陽英乃緩軍曰縱之使入此城吾先曾觀其形勢易攻耳吾取之如拾遺也諸將未之信瓫生等既入武陽英促圍攻之六日而廣等降於是進擊黄峴衍太子左衛率李元履棄城奔竄又討西闗衍司州刺史馬仙琕亦即退走果如英䇿凡擒其大將六人支將二十人卒七千米四十萬石軍資稱是還朝除尚書僕射永平三年英薨給東園祕器朝服一具帛七百匹贈司徒公諡曰獻武王英五子攸字𤣥興東宫洗馬早卒贈散騎侍郎攸弟熙字真興好學俊爽有文才聲著於世然輕躁浮動英深慮非保家之主}
