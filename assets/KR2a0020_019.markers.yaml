  - {type: variant, offset: 715, length: 0, content: '', WYG: 等宼荆州英連戰失利車駕至南陽免英官爵世宗即位行徐州還復尚書廣武伯蕭寶卷遣將軍陳伯之宼淮南司徒彭城王勰鎮壽春以英為鎮南將軍率衆討之英未至賊已引退勰還詔英行揚州後英還京師上表曰臣聞取亂侮亡有國之常道陳師鞠旅因機而致發竊以區區寶卷罔顧天常慿恃山河敢抗中國今妖逆數亡驕縱日甚威侮五行怠棄三正滛刑以逞虐害無辜其雍州刺史蕭衍東伐秣陵埽土興}
