  - {type: variant, offset: 619, length: 0, content: '', WYG: 高祖所定毫釐畧同又侍中崔光得古象尺于時亦凖議令施用仰惟孝文皇帝徳邁前王睿明下燭不刋之式事難變改臣等參論請停匡議永遵先皇之制詔從之匡每有奏請尚書令任城王澄時致執奪匡剛隘内遂不平先所造棺猶在僧寺乃復修事将與澄相攻澄頗知之後将赴省與匡逢遇騶卒相撾朝野駭愕澄因是奏匡罪狀三十餘條廷尉處以死刑詔付八座議特加原宥削爵除官三公郎中辛雄奏理之後特除平州刺史徙青州刺史尋為闗右都督兼尚書行臺遇疾還京孝昌初卒諡曰文貞後追復本爵改封濟南王第四子獻襲齊受禪爵例降魏書卷十九上魏書卷十九上考證景穆十二王列傳上魏收書闕後}
