  - {type: variant, offset: 939, length: 0, content: '', WYG: 征西大將軍外都大官出為沃野鎮都大將性聰惠善撫接在鎮甚有威名延興五年薨諡康王長子多侯早卒次子鸞字宣明始繼叔章武敬王及兄卒還襲父爵身長八尺腰帶十圍以武藝著稱頻為北都大將髙祖時拜外都大官又出為持節都督河西諸軍事征西大將軍領護西戎校尉涼州鎮都大將改鎮立州以鸞為涼州刺史姑臧鎮都大將餘如故後朝于京師㑹車駕南討領鎮軍將軍定都洛陽髙祖幸鄴詔鸞留守及開建五等食邑一千户除使持節征南大將軍都督豫荆郢三州河内山陽東郡諸軍事與安南將軍盧淵李佐攻赭陽不克敗退而還時髙祖幸瑕丘鸞請罪行宮髙祖引見鸞等責之曰卿等總率戎徒義應奮節而進不能夷㧞賊城退不能殄兹小寇虧損王威罪應大辟朕革變之始事從寛貸今捨卿等死罪城陽降為定襄縣王削户五百古者軍行必載廟社之主所以示其威惠各有攸歸今徴卿等敗軍之罪於社主之前以彰厥咎後以留守之功還復本封増邑二百户除冠軍將軍河内太守轉并州刺史世宗初除平東將軍青州刺史後轉安北將軍定州刺史鸞愛樂佛道脩持五戒不飲酒食肉積歲長齋繕起佛寺勸率百姓共為土木之勞公私費擾頗為民患世宗聞而詔曰鸞親唯宗懿作牧大州民物殷繁綏寧所屬宜克己厲誠崇清樹惠而乃驟相徴發專為煩擾編户嗷嗷家懐嗟怨北州土廣姦亂是由凖法尋愆應加肅黜以鸞戚屬情有未忍可遣使者以義督責奪禄一周微示威罰也正始二年薨時年三十八贈帛六百匹詔中書舍人王雲宣㫖臨弔贈鎮北將軍冀州刺史諡懐王子徽字顯順粗涉書史頗有吏才世宗時襲封除遊擊將軍出為河内太守在郡清整有民譽徴拜長兼散騎常侍肅宗時除右將軍涼州刺史徽以徑途阻逺固請不行除散騎常侍其年除後將軍幷州刺史先是州界夏霜禾稼不熟民庶逃散安業者少徽輒開倉賑之文武咸共諫止徽曰昔汲長孺郡守耳尚輒開倉救民災敝況我皇家親近受委大藩豈可拘法而不救民困也先給後表肅宗嘉之加安北將軍後拜安西將軍秦州刺史詔書旦至夕發徽以將之秦部請詣闕恭授仍表啓固陳請不之職改授輔國將軍加度支尚書進號鎮軍將軍于時戎馬在郊王師屢敗徽以軍旅之費上國封絹二千匹粟一萬石以助軍用肅宗不納又以本官兼吏部尚書加侍中征東將軍遷衛將軍右光禄大夫拜尚書左僕射轉車騎將軍儀同三司固辭不拜聽解侍中然後受詔尋除尚書令加開府西道行臺不行時靈太后專制朝綱頺禠徽既居寵任無所匡弼與鄭儼之徒更相阿黨外似柔謹内多猜忌睚眦之忿必思報復識者嫉之又不能防閑其妻于氏遂與廣陽王淵姦通及淵受任軍府每有表啓論徽罪過雖涉誣毁頗亦實焉莊帝踐阼拜司州牧尋除司徒仍領牧元顥入洛徽從莊帝北巡及車駕還宫以與謀之功除侍中大司馬太尉公加羽葆鼓吹増邑通前二萬户餘官如故徽表辭官封前後屢上又啓云河上之功將士之力求回所封加諸勲義徽為莊帝親待内懼榮寵故有此辭以防外議莊帝識其意聽其辭封不許讓官徽後妻莊帝舅女侍中李彧帝之姊婿徽性侫媚善自取容挾内外之意宗室親戚莫與比焉遂與彧等勸帝圖榮莊帝亦先有意榮死世隆等屯據不解除徽太保仍大司馬宗師録尚書事總統内外徽本意謂榮死後枝葉自應散亡及尒朱宗族聚結謀難徽筭畧無出憂怖而已性多嫉妬不欲人居其前毎入參謀議獨與帝決朝臣有上軍國籌䇿者並勸帝不納乃云小賊何慮不除又恡惜財用自家及國於是有所賞賜咸出薄少或多而中減與而復追徒有糜費恩不感物莊帝雅自約狹尤亦徽所贊成太府少卿李苗徽司徒時司馬也徽待之頗厚苗每致忠言徽自得志多不採納苗謂人曰城陽本自蜂目而豺聲復將露也及尒朱兆之入禁衛奔散莊帝歩出雲龍門徽乘馬奔度帝頻呼之徽不顧而去遂走山南至故吏寇彌宅彌外雖容納内不自安乃怖徽云官捕將至令其避他所使人於路邀害送屍於尒朱兆出帝初贈使持節侍中太師大司馬録尚書事司州牧諡曰文獻子延襲爵武定末官至太子中庶子齊受禪爵例降徽兄顯魏給事中司徒掾卒贈輔國將軍東豫州刺史徽次兄顯恭字懐忠揚州别駕以軍功封平陽縣開國子邑三百户孝莊初除北中郎將遷左將軍東徐州刺史入為安東將軍大司農卿尋除中軍將軍荆州刺史莊帝既殺尒朱榮乃除顯恭使持節都督晉建南汾三州諸軍事鎮西將軍兼尚書左僕射西北道行臺晉州刺史尒朱兆入洛後死於晉陽出帝初贈衛大將軍并州刺史重贈車騎大將軍儀同三司子彦昭襲武定中漁陽太守齊受禪爵例降顯恭弟旭字顯和莊帝時封襄城郡王邑一千户武定末位至大司馬齊受禪爵例降章武王太洛皇興二年薨追贈征北大將軍章武郡王諡曰敬無子髙祖初以南安惠王第二子彬為後彬字豹兒襲爵勇健有武用出為使持節都督東秦豳夏三州諸軍事鎮西大將軍西戎校尉統萬鎮都大將朔州刺史以貪惏削封是時吐京胡反詔彬持節假平北將軍行汾州事率幷肆之衆往討之胡平仍除征虜將軍汾州刺史胡民去居等六百餘人保險謀反扇動徒類彬請兵二萬有司奏許之髙祖大怒曰何有動兵馬理也可隨宜肅治若不能權方静帖必須大衆者則先斬刺史然後發兵彬奉詔大懼而率州兵身先將士討胡平之太和二十三年卒賜錢十萬絹二百匹贈以本官加散騎常侍彬有五子長子融字永興儀貌壯麗衣冠甚偉性通率有豪氣高祖時拜祕書郎世宗初復先爵除驍騎將軍蕭衍遣將寇逼淮陽梁城陷没詔融假節征虜將軍别將南討大摧賊衆還復梁城于時揚州刺史元嵩為奴所害勑融行揚州事尋除假節征虜將軍幷州刺史及世宗崩兼司空營陪景陵拜宗正卿以本官行瀛州事遇疾不行未幾除散騎常侍平東將軍青州刺史還為祕書監遷中護軍進號撫軍將軍領河南尹加征東將軍性尤貪殘恣情聚斂為中尉紏弹削除官爵汾夏山胡叛逆連結正平平陽詔復融前封征東將軍持節都督以討之融寡於經畧為胡所敗久之加散騎常侍衛將軍左光禄大夫後賊帥鮮于脩禮寇暴瀛定二州長孫稚等討之失利除融車騎將軍為前驅左軍都督與廣陽王淵等共討脩禮師渡交津葛榮殺脩禮而自立轉營至白牛邏輕騎擊融融苦戰終日更無外援遂大奔敗於陳見殺肅宗為舉哀於東堂賜東園祕器朝服一具綵二千八百叚贈侍中都督雍華岐三州諸軍事本將軍司空雍州刺史尋以融死王事進贈司徒加前後部鼓吹諡曰莊武子景哲襲武定中開府儀同三司齊受禪爵例降景哲弟朗即後廢帝語在帝紀子黄頭襲封安定王改封安平王齊受禪爵例降融弟凝字定興起家恒州征虜錄事參軍累遷護軍長史凝姑尒朱榮妻莊帝初封東安王食邑五百户除持節安東將軍兗州刺史轉濟州刺史仍本將軍永熙二年薨贈持節都督滄瀛冀三州諸軍事驃騎大將軍冀州刺史子彦友襲武定中光禄大夫齊受禪爵例降凝弟湛字鎮興起家祕書郎轉尚書左司郎中遷廷尉少卿莊帝初遇害河隂贈征東將軍青州刺史追封漁陽王食邑五百户子俊襲齊受禪爵例降湛弟晏字俊興卒於祕書丞贈平東將軍祕書監豫州刺史樂陵王胡兒和平四年薨追封樂陵王贈征北大將軍諡曰康無子顯祖詔胡兒兄汝隂王天賜之第二子永全後之襲封後改名思譽髙祖初蠕蠕犯塞以思譽為鎮北大將軍北征大都將後除使持節本將軍領護匈奴校尉都督中軍都將出為使持節}
