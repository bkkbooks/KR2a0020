  - {type: variant, offset: 687, length: 0, content: '', WYG: 雲廉謹自修留心庶獄挫抑豪彊羣盗息止州民頌之者千有餘人文明太后嘉之賜帛千匹太和五年薨於州遺令薄葬勿受賵襚諸子奉遵其㫖喪至京師車駕親臨哭之哀慟贈以本官諡曰康陪葬雲中之金陵雲長子澄字道鎮少而好學及康王薨澄居喪以孝聞襲封加征北大將軍髙祖時蠕蠕犯塞加澄使持節都督北討諸軍事以討之蠕蠕遁走又以氐羌反叛除都督梁益荆三州諸軍事征南大將軍梁州刺史文明太后引見澄誡厲之顧謂中書令李沖曰此兒風神吐發徳音閑婉當}
