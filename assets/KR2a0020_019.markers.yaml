  - {type: variant, offset: 714, length: 0, content: '', WYG: 解吹笛微曉醫術髙祖時為平北將軍武川鎮都大將假魏公未幾遷都督梁益寧三州諸軍事安南將軍領護西戎校尉仇池鎮都大將梁州刺史髙祖南伐為梁漢别道都將後大駕臨鍾離詔英率衆備宼境上英以大駕親動勢傾東南漢中有可乘之㑹表求進討髙祖許之師次沮水蕭鸞將蕭懿遣將尹紹祖梁季羣等領衆二萬徼山立柵分為數處居髙視下隔水為營英乃謀曰彼帥賤民慢莫能相服衆而無上罔知適從若選精卒幷攻一營彼不相救我克必矣若克一軍四營自拔於是簡兵三面騰上果不相救既破一處四營俱潰生擒梁季羣斬三千餘級俘七百人鸞白馬戍將其夜逃潰乘勝長驅將逼南鄭漢川之民以為神也相率歸附梁州民李天幹等詣英降待以國士之禮天幹等家在南鄭之西請師迎接英遣迎之蕭懿聞而遣將姜脩率衆追襲逮夜交戰頗有殺傷脩後屢敗復更請軍懿遣衆赴之迎者告急英率騎一千倍道赴救未至賊已退還英恐其入城别遣統軍元拔以隨其後英徼其前合擊之盡俘其衆懿續遣軍英不虞賊至且衆力已疲軍少人懼咸欲奔走英乃緩騎徐行神色自若登髙望賊東西指麾狀似處分然後整列而前賊謂有伏兵俄然賊退乘勢追殄遂圍南鄭禁止三軍一無所犯逺近皆供租運先是英未至也蕭懿遣軍主范潔領三千餘人伐獠潔聞大軍圍城欲還救援英遣統軍李平敵李鐵騎等收合巴西晉壽土人以斷其路潔以死決戰遂敗平敵之軍英候其稍近以奇兵掩之盡皆擒獲攻圍九十餘日戰無不克被勑班師英於是先遣老弱身勒精卒留後遣使與懿告别懿以為詐也英還一日猶閉門不開二日之後懿乃遣將追英英親自殿後與士卒下馬交戰賊衆莫敢逼之四日四夜然後賊退全軍而還㑹山氐並反斷英歸路英勒衆奮擊且戰且行為流矢所中軍人莫有知者以功遷安南大將軍賜爵廣武伯在仇池六載甚有威惠之稱父憂解任髙祖討漢陽起英為左衛將軍加前將軍尋遷大宗正又轉尚書仍本將軍鎮荆州蕭寶卷將陳顯}
