  - {type: variant, offset: 871, length: 2, content: 閭若, WYG: 食邑一千户還達石人驛亭詔宗室親黨内外百官先相識者聽迎之近郊賜帛三千匹宅一區粟五千石奴婢三十人其司馬始賓除給事中領直後栗法光本縣令刁昌東平太守刁雙西兗州刺史其畧所至一餐一宿之處無不霑賞尋改封東平王又拜車騎大將軍左光禄大夫儀同三司領左衛將軍侍中如故又本官領國子祭酒遷大將軍尚書令靈太后甚寵任之其見委信殆與元徽相埓於時天下多事軍國萬端畧守常自保無他禆益唯唯具臣而已尒朱榮畧之姑夫畧素所輕忽畧又黨於鄭儼徐紇榮兼銜之榮入洛也見害於河隂贈以本官加太保司空徐州刺史諡曰}
