  - {type: variant, offset: 692, length: 0, content: '', WYG: 無坐字諸寺靈塔石林燕語漢以來九卿官府皆名曰寺鴻臚共一也本以待四裔賔客明帝時攝摩騰竺法蘭自西域以白馬負經至舍於鴻臚寺既死尸不壊因留寺中後遂以為浮圖之居即雒中白馬寺也僧居稱寺本此魏書卷十九中考證欽定四庫全書魏書卷十九下齊魏收撰列傳第七下景穆十二王南安王城陽王章武王樂陵王安定王南安王楨皇興二年封加征南大將軍中都大官尋遷内都大官髙祖即位除涼州鎭都大將尋以綏撫有能加都督西戎諸軍事征西大將軍領護西域校尉儀同三司涼州刺史徴為内都大官出為使持節侍中本將軍開府長安鎭都大將雍州刺史楨性忠謹事母以孝聞賜帛千匹以襃之徴赴講武髙祖引見於皇信堂戒之曰翁孝行著於私庭令問彰於邦國每欽忠懿思一言展故因講武逺徴赴闕仰戀仁慈情在未已但長安鎮年饑民儉理須綏撫不容久留翁今還州其勤隠恤無令境内有飢餒之民翁既國之懿親終無貧賤之慮所宜慎者畧有三事一者恃親驕矜違禮僭度二者傲慢貪奢不恤政事三者飲酒遊逸不擇交友三者不去患禍將生但能慎此足以全身逺害光國榮家終始之德成矣而楨不能遵奉後乃聚斂肆情文明太后髙祖並臨皇信堂引見王公太后令曰汝隂王天賜南安王楨不順法度黷貨聚斂依犯論坐將至不測卿等為當存親以毁令為欲滅親以明法羣臣咸以二王託體先皇宜蒙矜恕太后不答髙祖乃詔曰南安王楨以懿戚之貴作鎮闗右不能潔已奉公助宣皇度方肆貪欲殖貨私庭放縱姦囚壅絶訴訟貨遺諸使邀求虚稱二三之狀皆犯刑書昔魏武翦髪以齊衆叔向戮弟以明法克己忍親以率天下夫豈不懷有為而然耳今者所犯事重疇日循古推刑實在難恕皇太后天慈寛篤恩矜國屬每一尋惟髙宗孔懷之近發言哽塞悲慟于懷且以南安王孝養之名聞於内外特一原恕削除封爵以庶人歸第禁錮終身後髙祖南伐楨從至洛及議遷都首從大計髙祖甚悦楨母劉太妃薨髙祖親幸臨慰及葬贈布帛綵五百段又以楨議定遷都復封南安王食邑一千户出為鎮北大將軍相州刺史髙祖餞楨於華林都亭詔曰從祖南安既之蕃任將曠違千里豫懷惘戀然今者之集雖曰分岐實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文人下筆髙祖送楨於階下流涕而别太和二十年五月至鄴入治日暴風大雨凍死者十數人楨又以旱祈雨于羣神鄴城有石虎廟人奉祀之楨告虎神像云三日不雨當加鞭罰請雨不驗遂鞭像一百是月疽發背}
