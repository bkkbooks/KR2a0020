  - {type: variant, offset: 944, length: 0, content: '', WYG: 和龍鎮都大將營州刺史加領護東夷校尉轉為鎮北將軍行鎮北大將軍高祖引見百官於光極堂謂思譽曰恒代路懸舊都意重故屈叔父逺臨此任不可不敬慎所臨以副朕望及穆泰隂謀不軌思譽知而不告恕死削封為庶人太和末還復其王封正始四年薨贈光州刺史諡曰密王子景畧字世彦世宗時襲封拜驍騎將軍除持節冠軍將軍幽州刺史熙平元年薨贈本將軍豫州刺史賜帛四百疋諡曰惠王子霸字休邦襲武定中鉅鹿太守齊受禪爵例降景畧弟慶畧散騎侍郎子子政通直散騎常侍慶畧弟洪畧恒農太守中軍將軍行東雍州刺史洪畧弟子業平原太守定安王休皇興二年封拜征南大將軍外都大官休}
