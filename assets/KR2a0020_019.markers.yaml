  - {type: variant, offset: 839, length: 0, content: '', WYG: 始熙妃于氏知熙必敗不從其謀自初哭泣不絶至於熙死熙臨刑為五言詩示其竂吏曰義實動君子主辱死忠臣何以明是節將解七尺身與知友别曰平生方寸心殷勤屬知已從今一銷化悲傷無極已熙既蕃王之貴加有文學好奇愛異交結偉俊風氣甚髙名美當世先達後進多造其門始熙之鎮鄴也知友才學之士袁飜李琰李神儁王誦兄弟裴敬憲等咸餞於河梁賦詩告别及熙將死}
