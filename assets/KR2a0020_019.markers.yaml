  - {type: variant, offset: 571, length: 1, content: 高, krp: 西行授仲景中軍大都督留京師齊獻武王欲至洛陽仲景遂棄妻子而遁仲景弟暹字叔照莊帝初除南兖州刺史在州猛暴多所殺害元顥入洛暹據州不屈莊帝還宮封汝陽王遷秦州刺史先時秦州城人屢為反覆暹盡誅之存者十一二普泰元年除涼州刺史貪暴無極欲規府人及商胡富人財物詐一臺符誑諸豪等云欲加賞一時屠戮所有資財生口悉沒自入孝静時位侍中錄尚書事薨贈太師錄尚書子沖襲無子國絶太興弟遥字太原有器望以左衛將軍從髙祖南征賜爵饒陽男世宗初遭所生母憂表請解任詔以餘尊所厭不許肅宗初累遷左光祿大夫仍領䕶軍遷冀州刺史遥以諸胡先無籍貫姦良莫辨悉令造籍又以諸胡設籍當欲税之以充軍用胡人不願乃共構遥云取納金馬御史按驗事與胡同遥坐除名遥陳枉不已勅有司重究乃披雪遷右光祿大夫時冀州沙門法慶既為妖幻遂說渤海人李歸伯歸伯合家從之招率鄉人推法慶為主法慶以歸伯為十住菩薩平魔軍司定漢王自號大乗殺一人者為一住菩薩殺十人為十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害為事於是聚衆殺阜城令破渤海郡殺害吏人刺史蕭寳夤遣兼長史崔伯驎討之敗於煑棗城伯驎戰沒凶衆遂盛所在屠滅寺舍斬戮僧尼焚燒經像云新佛出世除去舊魔詔以遥為使持節都督北征諸軍事帥歩騎十萬以討之法慶相率攻遥遥並擊破之遥遣輔國将軍張虯等率騎追掩討破擒法慶并其妻尼惠暉等斬之傳首京師後擒歸伯戮於都市初遥大功昆弟皆是恭宗之孫至肅宗而本服絶故除遥等屬籍遥表曰竊聞聖人所以南面而聼天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去兹以往猶繫之以姓而弗别綴之以食而弗殊又律云議親者非唯當世之屬親歴謂先帝之五世謹尋斯㫖将以廣帝宗重磐石先皇所以變兹事條為此别制者太和之季方有意於吳蜀經始之費慮深在初割減之起蹔出當時也且臨淮王提分屬籍之始髙祖賜帛三千匹所以重分離樂浪王長命亦賜縑二千匹所以存慈睠此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔已者衆臣誠不欲妄親太階茍求潤屋但傷大宗一分則天子屬籍不過十數人而已在漢諸王之子不限多少皆列土而封謂之曰侯至于魏晉莫不廣胙河山稱之曰公者蓋惡其大宗之不固骨肉之恩疎矣臣去皇上雖是五世之遠於先帝便是天子之孫髙祖所以國秩祿賦復給衣食后族唯給其賦不與衣食者欲以别外内限異同也今諸廟之感在心未忘行道之悲儵然已及其諸封者身亾之日三年服終然後改奪今朝廷猶在遏密之中便議此事實用未安詔付尚書博議以聞尚書令任城王澄尚書左僕射元暉奏同遥表靈太后不從卒諡曰宣公遥弟恒字景安粗渉書史恒以春秋之義為名不以山川表求改名芝歴位太常卿中書監侍中後於河隂遇害赠太傅司徒公諡曰宣穆公濟隂王小新成和平二年封頗有武畧庫莫奚侵擾詔新成率衆討之新成乃多為毒酒賊既漸逼便棄營而去賊至喜而競飲聊無所備遂簡輕騎因醉縱擊俘馘甚多後位外都大官薨贈大将軍諡曰惠公子鬰字伏生襲位開府為徐州刺史以黷貨賜死國除長子弼字邕明剛正有文學位中散大夫以世嫡應襲先爵為季父尚書僕射麗因于氏親寵遂奪弼王爵横授同母兄子誕於是弼絶棄人事託疾還私第世宗徵為侍中弼上表固讓入嵩山以穴為室布衣蔬食卒建義元年子暉業訴復王爵永安三年追贈尚書令司徒公諡曰文獻初弼嘗夢人謂之曰君身不得傳世封其紹先爵者君長子紹遠也弼覺即語暉業終如其言暉業少險薄多與寇盜交通長乃變節渉子史亦頗屬文而慷慨有志節歴位司空太尉加特進領中書監錄尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲啗一日三羊三日一犢又嘗賦詩云昔居王道泰濟濟富羣英今逢世路阻狐兎鬱縱横齊初降封美陽縣公開府儀同三司特進暉業之在晉陽也無所交通居常閑暇乃撰魏藩王家世號為辨宗室録四十卷行於世暉業弟昭業頗有學尚位諫議大夫莊帝将幸洛南昭業立於閶闔門外扣馬諫帝避之而過後勞勉之位給事黄門侍郎衛将軍石光祿大夫卒諡曰文侯鬱弟偃字仲琁位太中大夫卒子誕字曇首初誕伯父鬱以貪汙賜死爵除景明三年誕訴云伯鬱前朝之封正以年長襲封以罪除爵爵由謬襲襲應歸正詔以偃正元妃息曇首濟隂王嫡孫可聼紹封以纂先緒誕既襲爵除齊州刺史在州貪暴大為人患牛馬騾驢無不逼奪家之奴隸悉迫取良人為婦有沙門為誕採藥還而見之誕曰師從外來有何消息對曰唯聞王貪願王早代誕曰齊州七萬戸吾至來一家未得三十錢何得言貪後為御史中尉元纂所糾會赦免薨諡曰静王子撫字伯懿襲莊帝初為從兄暉業訴奪王爵偃弟麗字寳掌位兼宗正卿右衛将軍遷光祿勲宗正右衛如故時秦州屠各王法智推州主簿呂茍兒為主號建明元年置立百官攻逼州郡涇州人陳瞻亦聚衆自稱王號聖明元年詔以麗為使持節都督秦州刺史與别駕楊椿討之茍兒率衆十餘萬屯孤山列據諸險圍逼州城麗出擊大破之便進軍永洛賊徒逆戰麗夜擊走之行秦州事李韶破茍兒于孤山乗勝追奔三十里獲其父母妻子斬賊王五人其餘相繼歸降諸城之圍亦悉奔散茍兒率其王公三十餘人詣麗請罪椿又斬瞻麗因平賊之勢枉掠良善七百餘人世宗嘉其功詔有司不聼追檢拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄囚死及徒流案未申臺者一時放免遷冀州刺史入為尚書左僕射帝問曰聞公在州殺戮無理枉濫非一又大殺道人對曰臣在冀州可殺道人二百許人亦復何多帝曰一物不得其所若納諸隍況殺道人二百而言不多麗脫冠謝賜坐卒諡曰威子顯和少有節操歴司徒記室參軍司徒崔光每見之曰元參軍風流清秀容止閑雅乃宰相之器除徐州安東府長史刺史元法僧叛顯和與戰被擒執手命與連坐顯和曰顯和與阿翁同源别泒皆是磐石之宗一朝以地外叛若遇董狐能無慙徳遂不肻坐法僧猶欲慰喻顯和曰乃可死作惡鬼不能生為叛臣及将殺之神色自若建義初贈秦州刺史汝隂王天賜和平三年封拜鎮南大将軍虎牢鎮都大将後為内都大官髙祖初殿中尚書胡莫寒簡西部勅勒豪富兼丁者為殿中武士而大納財貨簡}
  - {type: variant, offset: 573, length: 2, content: 才能, WYG: 不平衆怒殺莫寒及髙平假鎮将奚陵於是諸部勅勒悉叛詔天賜與給事中羅雲督諸軍討之前鋒勅勒詐降雲信之副将元伏曰勅勒色動恐将有變今不設備将為所圖雲不從勅勒輕騎數千襲殺雲天賜僅得自全後除征北大将軍䕶匈奴中郎将累遷懐朔鎮大将坐貪殘恕死削除官爵卒髙祖哭於思政觀贈本爵葬從王禮諡曰靈王子逞字萬安卒於齊州刺史諡曰威逞子慶和東豫州刺史為蕭衍将所攻舉城降之衍}
