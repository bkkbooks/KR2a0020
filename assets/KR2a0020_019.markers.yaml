  - {type: variant, offset: 855, length: 4, content: 仁亦驍勇, WYG: 先爵除征虜將軍通直散騎常侍孝莊初遇害於河隂贈衛大將軍儀同三司并州刺史子琳襲齊受禪爵例降熙弟誘字惠興自員外郎稍遷通直郎太子中庶子征虜將軍衛尉少卿出為右將軍南秦州刺史义斬之於岐州妻子得不坐追贈車騎大將軍雍州刺史後贈儀同三司追封都昌縣開國伯食邑八百户諡曰恭子始伯襲給事中齊受禪爵例降誘弟略字儁興才氣劣於熙而}
