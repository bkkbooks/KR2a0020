  - {type: variant, offset: 620, length: 2, content: 休息, WYG: 所補樂浪王萬壽傳浪目錄作良魏書卷十九上考證欽定四庫全書魏書卷十九中齊魏收撰列傳第七中景穆十二王任城王任城王雲年五歲恭宗崩號哭不絶聲世祖聞之而呼抱之泣曰汝何知而有成人之意也和平五年封拜使持節侍中征東大將軍和龍鎮都大將顯祖時拜都督中外諸軍事中都坐大官聽理民訟甚收時譽延興中顯祖集羣寮欲禪位於京兆王子推王公卿士莫敢先言雲進曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民父子相傳其来久矣皇魏之興未之有革皇儲正統聖徳夙章陛下必欲割捐塵務頤神清曠者冡副之寄宜紹寶厯若欲捨儲輕移宸極恐非先聖之意駭動人情又天下是祖宗之天下而陛下輒改神器上乖七廟之靈下長姦亂之道此是禍福所由願深思慎之太尉源賀又進曰陛下今欲外選諸王而禪位于皇叔者臣恐春秋蒸嘗昭穆有亂脫萬世之}
