  - {type: variant, offset: 577, length: 11, content: 僚佐範謙恭惠下推心撫納, WYG: 北道總督魏王至項城朝廷出師討之望風退走衍責之曰言同百舌膽若鼷鼠遂徙合浦逞弟汎字普安自元士稍遷營州刺史性貪殘人不堪命相率逐之汎走平州後除光祿大夫宗正卿封東燕縣男於河隂遇害天賜第五子脩義字壽安渉獵書傳頗有文才為高祖所知自元士稍遷左将軍齊州刺史脩義以齊州頻喪刺史累表固辭詔曰脩短有命吉凶由人何得過致憂憚以乖維城之寄違凶就吉時亦有之可聼更立館宇於是移理東城脩義為政寛和愛人在州四嵗不殺一人}
