  - {type: variant, offset: 614, length: 0, content: '', WYG: 事國之大經前雖為南臺所彈然猶許更議若議之日願聼臣暫赴世宗曰劉芳學高一時深明典故其所據者與先朝尺乃寸過一黍何得復云先朝之意也兗州既所執不經後議之日何待赴都也肅宗初入為御史中尉匡嚴於彈紏始奏于忠次彈高聰等免官靈太后並不許以違其糾惡之心又慮匡辭解欲奨安之進號安南将軍後加鎮東将軍匡屢請更權衡不已}
