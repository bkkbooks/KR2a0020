  - {type: variant, offset: 715, length: 0, content: '', krp: 等宼荆州英連戰失利車駕至南陽免英官爵世宗即位行徐州還復尚書廣武伯蕭寶卷遣將軍陳伯之宼淮南司徒彭城王勰鎮壽春以英為鎮南將軍率衆討之英未至賊已引退勰還詔英行揚州後英還京師上表曰臣聞取亂侮亡有國之常道陳師鞠旅因機而致發竊以區區寶卷罔顧天常慿恃山河敢抗中國今妖逆數亡驕縱日甚威侮五行怠棄三正滛刑以逞虐害無辜其雍州刺史蕭衍東伐秣陵埽土興}
  - {type: variant, offset: 716, length: 1, content: 法, WYG: 順流而下唯有孤城更無重衛此則皇天授我之日曠載一逢之秋事易走丸理同拾芥此而不乘將欲何待臣乞躬率步騎三萬直指沔隂據襄陽之城斷黒水之路昏虐君臣自相魚肉我居上流威震遐邇長驅南出進拔江陵其路既近不盈五百則三楚之地一朝可收岷蜀之道自成斷絶又命揚徐二州聲言俱舉縁江焚毁靡使所遺建業窮蹙魚遊釡内士治之師再興孫皓之縛重至齊文軌而大同混天地而為一伏惟陛下暫闢旒纊少垂聽覧獨決聖心無取疑議此期脱爽幷吞未日事寢不報英又奏曰臣聞乘虚討弱事在速舉因危攻昧徼㨗可期今寶卷亂常骨肉相賊蕃戍鼎立莫知所歸義陽孤絶密邇天境外靡糧援之期内無兵儲之固此乃臨焚之鳥不可去薪授首之寇何容緩斧若此行有果則江右之地斯為經畧之基如脱否也非直後舉難圖亦或居要生疾今豫州刺史司馬悦已戒嚴垂邁而東豫州刺史田益宗方擬守三闗請遣軍司為之節度世宗遣直寢羊靈引為軍司以軍功拜吏部尚書以前後軍功進爵常山侯英奏謹案學令諸州郡學生三年一校所通經數因正使列之然後遣使就郡練考臣伏惟聖明崇道顯成均之風藴義光膠序之美是以太學之館久置於下國四門之敎方構於京廛計習訓淹年聽受累紀然儁造之流應問於魏闕不革之輩宜返於齊民使就郡練考覈其最殿頃以皇都遷構江揚未一故鄉校之訓弗遑正試致使薰蕕之質均誨學庭蘭蕭之體等敎文肆今外宰京官銓考向訖求遣四門博士明通五經者道别校練依令黜陟詔曰學業墮廢為日已久非一使能勸比當别勑尋詔英使持節假鎮南將軍都督征義陽諸軍事率衆南討蕭衍司州刺史蔡道恭聞英將至遣其驍騎將軍楊由率城外居民三千餘家於城西南十里賢首山即嶺為二柵作表裏之勢英勒諸軍圍賢首壘焚其柵門楊由乃驅水牛從營而出繼之以兵軍人避牛師遂退下尋分兵圍守其夜柵民任馬駒斬由以降三軍館穀降民安堵蕭衍遣其平西將軍曹景宗後將軍王僧炳等率步騎三萬來救義陽僧炳統衆二萬據鑿峴景宗率一萬繼後英遣冠軍將軍元逞揚烈將軍曹文敬進據樊城以抗之英部勒將士掎角討之大破僧炳軍俘斬四千餘人英又於士雅山結壘與景宗相抗分遣諸統伏於四山示之以弱衍將馬仙琕率衆萬餘來掩英營英命諸軍偽北誘之既至平地統軍𫝊永等三軍擊之賊便奔退進擊潰之斬首二千三百級斬賊羽林監軍鄧終年仙琕又率一萬餘人重來決戰英勒諸將隨便分擊又破之復斬賊將陳秀之統軍王買奴别破東嶺之陣斬首五百道恭憂死驍騎將軍行州事蔡靈恩復憑窮城短兵日接景宗仙琕知城將拔盡鋭決戰一日三交皆大敗而返靈恩勢窘遂降三闗戍聞之亦棄城而走詔曰知賊城已下復克三闗展威闢境聲畧宣振公私稱泰良以欣然將軍淵䂓内斷忠謨外舉受律揚旌克申廟算雖方叔之制蠻荆召虎之掃淮浦匹兹蔑如也新州初附宜廣經畧想善加檢督必令周固有所委付然後凱旋耳初髙祖之平漢陽英有戰功許復其封反為顯達所敗遂寢是役也世宗大悦乃復之改封中山王食邑一千戸遣大使鴻臚少卿睦延吉持節就拜英送蔡靈恩及衍尚書郎蔡僧勰前軍將軍義陽太守馮道要遊擊將軍鮑懐慎天門太守王承伯平北府司馬宗象平北府諮議參軍伏粲給事中寧朔將軍蔡道基中兵參軍龎脩等數十人詔曰㑹平江南此等便可放歸也英既還世宗引見深嘉勞之後増封一千户蕭衍遣將軍寇肥梁詔英使持節加散騎常侍征南將軍都督揚徐二道諸軍事率衆十萬討之}
