  - {type: variant, offset: 592, length: 0, content: '', krp: 體深失為下之義復考校勢臣之前量度偏頗之手臣必刖足内朝抱璞人外囂言肆意彰於朝野然匡職當出納獻替所在斗尺權度正是所司若已有所見能練臧否宜應首唱義端早辨諸惑何故嘿心隨從不闗一言見芳成事方有此語計芳才學與匡殊懸所見淺深不應相匹今乃始發恐此由心借智於人規成虚譽況匡表云所據銅權形如古誌明是漢作非莽别造及案權銘云黄帝始祖徳布於虞虞帝始祖徳布於新若莽佐漢}
  - {type: variant, offset: 593, length: 0, content: '', WYG: 事寧有銘偽新之號哉又尋莽傳云莽居攝即變漢制度考校二證非漢權明矣復云芳之所造又短先朝之尺臣既比之權然相合更云芳尺與千金堰不同臣復量比因見其異二三浮濫難可據凖又云共構虚端妄為疑似託以先朝云非已製臣按此欺詐乃在於匡不在於芳何以言之芳先被勅專造鍾律管籥優劣是其所裁權斛尺度本非其事比前門下索芳尺度而芳牒報云依先朝所班新尺復應下黍更不増損為造鍾律調正分寸而已檢匡造時在牒後一嵗芳於爾日匡未共争已有此牒豈為詐也計崇造寸積黍十二羣情共知而芳造寸唯止十黍亦俱先朝詔書以黍成寸首尾歴然寧有輒欲自取之理肇任居端右百寮是望言行動静必副具瞻若恃權阿黨詐託先詔将指鹿化馬徙日移天即是魏之趙高何以宰物肇若無此匡既誣毁宰相訕謗明時豈應談議之間便有指鹿之事可否之際輕生刖足之言趙高矯惑事屬衰}
