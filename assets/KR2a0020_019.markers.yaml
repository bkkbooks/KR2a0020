  - {type: variant, offset: 592, length: 0, content: '', WYG: 體深失為下之義復考校勢臣之前量度偏頗之手臣必刖足内朝抱璞人外囂言肆意彰於朝野然匡職當出納獻替所在斗尺權度正是所司若已有所見能練臧否宜應首唱義端早辨諸惑何故嘿心隨從不闗一言見芳成事方有此語計芳才學與匡殊懸所見淺深不應相匹今乃始發恐此由心借智於人規成虚譽況匡表云所據銅權形如古誌明是漢作非莽别造及案權銘云黄帝始祖徳布於虞虞帝始祖徳布於新若莽佐漢}
