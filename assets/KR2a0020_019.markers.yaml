  - {type: variant, offset: 590, length: 0, content: '', WYG: 以是追思之遷秦州刺史肅宗初表陳庶人禧庶人愉等請宥前愆賜葬陵域靈太后詔曰收葬之恩事由上㫖藩岳何得越職干陳在州多受納累遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫高居者有㫖先敘時上黨郡缺居遂求之脩義私已許人抑居不與居大言不遜脩義命左右牽曵之居對大衆呼天唱賊人問居曰白日公庭安得有賊居指脩義曰此座上者違天子明詔物多者得官京師白劫此非大賊乎脩義失色居行罵而出後欲邀車駕論脩義罪狀左僕射蕭寳夤諭之乃止二秦反假脩義兼向書右僕射西道行臺行秦州事為諸軍節度脩義性好酒每飲連日遂遇風病神明昏喪雖至長安竟無部分之益元志敗沒賊東至黒水更遣蕭寳夤討之以脩義為雍州刺史卒於州贈司空諡曰文子均位給事黄門侍郎樂浪王萬壽和平三年封拜征東大将軍鎮和龍性貪暴徵還道憂薨諡曰厲王子康王樂平襲薨子長命襲坐殺人賜死國除子忠肅宗時復前爵位太常少卿出帝汎舟天淵池命宗室諸王陪宴忠愚而無智性好衣服遂著紅羅襦繡作領碧紬袴錦為緣帝謂曰朝廷衣冠應有常式何為著百戲衣忠曰臣少來所愛情存綺羅歌衣舞服是臣所願帝曰人之無良乃至此乎廣平王洛侯和平二年封薨諡曰殤無子後以陽平幽王第五子匡後之匡字建扶性耿介有氣節高宗器之謂曰叔父必能儀刑社稷匡輔朕躬今可改名為匡以成克終之美世宗即位累遷給事黄門侍郎茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乗又命皓登車皓褰裳将上匡諫止世宗推之令下皓恨匡失色當時壯其忠謇世宗親政除肆州刺史匡既忤皓懼為所害亷慎自修甚有聲績遷􅁪州刺史徵為大宗正卿河南邑中正匡奏親王及始藩二藩王妻悉有妃號而三藩已下皆謂之妻上不得同為妃名而下不及五品已上有命婦之號竊為疑詔曰夫貴於朝妻榮於室婦女無定升從其夫三藩既啓王封妃名亦宜同等妻者齊也理與已齊可從妃例自是三藩王妻名號始定後除度支尚書匡表引樂陵章武之例求紹洛侯封詔付尚書議尚書奏聼襲封以明興絶之義匡與尚書令高肇不平常無降下之色時世宗委政於肇朝廷傾憚唯匡與肇抗衡先自造棺置於廳事意欲輿棺詣闕論肇罪惡自殺切諫肇聞而惡之後因與太常劉芳議争權量遂與肇聲色御史中尉王顯奏匡曰自金行失御羣偽競興禮壞樂崩彞倫攸斁大魏應期奄有四海高祖孝文皇帝以睿聖統天克復舊典乃命故中書監高閭廣旌儒林推尋樂府依据六經參諸國志以黍裁寸将均周漢舊章屬雲構中遷尚未云就高祖睿思𤣥深參考經記以一黍之大用成分體凖之為尺宣布施行暨正始中故太樂令公孫崇輒自立意以黍十二為寸别造尺度定律刋鍾皆向成訖表求觀試時敕太常卿臣芳以崇造既成請集朝英議其得否芳疑崇尺度與先朝不同察其作者於經史復異推造鮮據非所宜行時尚書令臣肇清河王懌等以崇造乖謬與周禮不同遂奏臣芳依周禮更造成訖量校從其善者而芳以先朝尺度事合古典乃依前詔書以黍刋寸並呈朝廷用裁金石于時議者多云芳是唯黄門侍郎臣孫惠蔚與崇扶同二途參差頻經考議而尚書令臣肇以芳造崇物故之後而惠蔚亦造一尺仍云扶以比崇尺自相乖背量省二三謂芳為得而尚書臣匡表云劉孫二尺長短相傾稽考兩律所容殊異言取中黍校彼二家云並參差抑中無所自立一途請求議判當時議者或是於匡兩途舛駮未即時定肇又云權斛斗尺班行已久今者所論豈喻先㫖宜仰依先朝故尺為定自爾以後而匡與肇厲言都座聲色相加高下失其常倫噂競無復彞序匡更表列據已十是云芳十非又云肇前被敕㫖共芳營督規立鍾石之名希播製作之譽乃憑樞衡之尊藉舅氏之勢與奪任心臧否自已阿黨劉芳遏絶臣事望勢雷同者接以恩言依經按古者即被怒責雖未指鹿化馬移天徙日實使藴藉之士聳氣坐端懐道之夫結舌筵次又言芳昔與崇競恒言自作今共臣論忽}
