  - {type: variant, offset: 839, length: 0, content: '', krp: 始熙妃于氏知熙必敗不從其謀自初哭泣不絶至於熙死熙臨刑為五言詩示其竂吏曰義實動君子主辱死忠臣何以明是節將解七尺身與知友别曰平生方寸心殷勤屬知已從今一銷化悲傷無極已熙既蕃王之貴加有文學好奇愛異交結偉俊風氣甚髙名美當世先達後進多造其門始熙之鎮鄴也知友才學之士袁飜李琰李神儁王誦兄弟裴敬憲等咸餞於河梁賦詩告别及熙將死}
  - {type: variant, offset: 840, length: 0, content: '', WYG: 與知故書曰吾與弟並蒙皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宫太傅清河王横受屠酷主上幼年獨在前殿君親如此無以自安故率兵民建大義於天下但智力淺短旋見囚執上慙朝廷下愧相知本以名義干心不得不爾流腸碎首復何言哉昔李斯憶上蔡黄犬陸機想華亭鶴唳豈不以恍惚無際一去不還者乎今欲對秋月臨春風藉芳草䕃花樹廣召名勝賦詩洛濱其可得乎凡百君子各敬爾宜為國為身善朂名節立功立事為身而已吾何言哉時人憐之又熙於任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免若其不信試看任城家熙夢中顧瞻任城第舎四面牆崩無遺堵焉熙惡之覺而以告所親及熙之死也果如所夢兄弟三人毎從英征伐在軍貪暴或因迎}
