  - {type: variant, offset: 719, length: 1, content: 廣, WYG: 至棄城遁走獲粟三十萬斛既至升城垣苗麋溝二戍拒守不下白曜以千餘騎襲麋溝麋溝潰自投濟水死者千餘人擊垣苗又破之得粟十餘萬斛由是軍糧充足先是淮陽公皮豹子等再征垣苗不剋白曜以一旬之内頻拔四城威震齊土顯祖嘉焉詔曰卿總率戎旅討除不賔霜戈所向無不摧靡旬日之内剋拔四城韓白之功何以加此雖升城戍將房崇吉守逺不順危亡已形潰在旦夕宜勉崇威略務存長轡不必窮兵極武以為勞頓且伐罪弔民國之令典當招懷以徳使來蘇之澤加於百姓升城不降白曜忿之縱兵}
