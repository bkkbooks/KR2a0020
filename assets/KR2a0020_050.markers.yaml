  - {type: variant, offset: 2629, length: 325, content: 三年坐漏泄賜死於家時年三十二鴻弟道植武定末儀同開府中兵參軍太祖時有安定梁穎先仕慕容寶歷黃門郎入國拜建德太守賜爵朝那男孫景儁起家趙郡王幹行參軍稍遷治書侍御史司徒中兵參軍卒子師禮早卒師禮族弟嵩遵少有氣俠起家奉朝請歷司空外兵參軍後蕭寶夤為雍州刺史引為中兵參軍深見信任寶夤反令嵩遵率衆出征嵩遵偽受其署既行之後遂與侯終德等還來襲城以功封烏氏縣開國伯邑五百戶後除光州平東府長史轉荊州驃騎府司馬卒官年四十四嵩遵弟嵩景武定中燕郡太守又有武功蘇湛字景儁魏侍中則之後也晉亂避地河右世祖平涼州還鄉里父擁字天祐秦州撫軍府司馬湛少有器行頗涉羣書年二十餘舉秀才除奉朝請領侍御史轉員外散騎侍郎蕭寶夤之討關西以湛為行臺郎中深見委任孝昌中寶夤大敗東還朝廷以為雍州刺史後自猜懼害中尉酈道, WYG: ''}
