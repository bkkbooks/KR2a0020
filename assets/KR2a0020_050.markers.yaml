  - {type: variant, offset: 8714, length: 3, content: 韋杜舊, WYG: 魏之諸將罕立方面之功尉元以寛雅之風受將帥之任取瑕丘如覆掌剋彭城猶拾遺擒將馘醜威名逺被位極公老聖主乞言無乃近世之一人歟白曜有敦正之風出當薄伐席卷三齊如風靡草接物有禮海垂欣慰其勞固不細矣功名難處追猜嬰戮宥賢議勤未聞於斯日也魏書卷五十魏書卷五十考證慕容白曜傳皆以輿為氏史炤釋文慕容氏音訛又為慕輿胡三省辨之謂慕容慕輿同出於鮮卑其得姓之初各自為氏猶拓跋之與拔拔非音訛也臣人龍按本書官氏志莫輿氏後改為輿氏乃神元皇帝時餘部諸姓内入者若此以輿為氏則慕容種}
