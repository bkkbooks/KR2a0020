  - {type: variant, offset: 764, length: 3, content: 行尋轉, WYG: 朝扇擾邊服崔僧祐蓋次陽陳顯達連兵淮海水陸鋒起揚旌而至規援青齊士民忷忷莫不南顧時兵役既久咸有歸心而白曜外宣皇風内盡方略身擐甲胄與士卒同安撫初附示以恩厚三軍懷挾纊之温新民欣來蘇之澤遂使僧祐擁徒弭斾効順軍門文靜崇仁棄城竄海次陽顯達望塵南奔聲震江吳風偃荆漢及青州剋平文秀面縳海波清靜三齊克定逖彼東南永為國有使天府納六州之貢濟泗息烽警之虞開岱宗封禪之略闢山川望秩之序斯誠宗廟之靈神算所授然抑亦白曜與有力矣及氛翳既靜爵命亦隆榮燭當時聲譽日逺而民惡其上妄生尤隙因其功髙流言惑聽巧偽亂真朱紫難辨傷夷未瘳合門屠戮鴻勲盛徳蔑爾無聞有識之徒能不悽愴臣謂白曜策名王庭累荷榮授歴司出内世載忠美秉鉞啓蕃折衝敵國開疆千里拔城十二辛勤於戎旅之際契濶於矢石之間登鋒履危志存靜亂及方難既夷身膺髙賞受胙河山與國升降六十之年寵靈已極觀其立功足明機運豈容僥倖更邀非望者乎且於時國家士馬屯積京南跨州連鎮勢侔雲岳主將驍雄按鉀在所莫不殉忠死難效節奉時此之不可生心白曜足知之矣況濳逆阻兵營岱厭亂加以王師仍舉州郡屠裂齊民勞止神膽俱喪亡燼之衆不可以圖存離敗之民不可以語勇哉白曜果毅習戎體閑兵勢寧不知士民之不可藉將士之不同已據彊兵之勢因塗炭之民而欲立非常之事此愚夫之所弗為也料此推之事可知矣伏惟陛下聖鑒自天仁孝宰世風冠宇宙道超百王開國以來諸有罪犯極刑不得骸骨者悉聽收葬大造之恩振古未有而白曜人舊功髙嬰禍淪覆名滅國除爵命無紹天下衆庶咸共哀憐方之餘流應有差異願陛下揚日月之光明勲臣之績垂天地之施慰僵屍之魂使合棺定諡殁有餘稱選其宗近才堪驅策錫以微爵繼其絶世進可以奬勸將來退可以顯國恩澤使存者荷莫大之恩死者受骨肉之惠豈不美哉仰惟聖明霈然昭覽狂瞽之言伏待刑憲髙祖覽表嘉愍之白曜弟子契輕薄無檢太和初以名家子擢為中散遷宰官南安王楨有貪暴之響遣中散閭文祖詣長安察之文祖受楨金寳之賂為楨隠而不言事發坐之文明太后引見羣臣謂之曰前論貪清皆云克修文祖時亦在中後竟犯法以此言之人心信不可知髙祖曰古有待放之臣亦有離俗之士卿等自審不勝貪心者聽辭位歸第契進曰臣卑微小人聞識不逺過蒙曲照虚忝今職小人之心無定帝王之法有常以無恒之心奉有常之法非所克堪乞垂退免髙祖曰昔鄭相嗜魚人有獻魚者相曰若取此魚恐削名禄遂不肯受契若知心不可常即知貪之惡矣何為求退遷宰官令微好碎事頗曉工作主司厨宰稍以見知及營洛陽基構征新野南陽起諸攻具契皆參典太和末以功遷}
