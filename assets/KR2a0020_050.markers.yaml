  - {type: variant, offset: 54, length: 2, content: 父逵, WYG: 元年十九以善射稱神䴥中為虎賁中郎將轉羽林中郎小心恭肅以匪懈見知世祖嘉其寛雅有風貌稍遷駕部給事中從幸海隅賜爵富城男加寧逺將軍和平中遷北部尚書加散騎常侍進爵太昌侯拜冠軍將軍天安元年薛安都以徐州内附請師救援顯祖以元為使持節都督東道諸軍事鎮南大將軍博陵公與城陽公孔伯恭赴之劉彧東平太守無鹽戍主申纂詐降元知非誠款外示容納而密備焉劉彧兗州刺史畢衆敬遣東平太守章仇􅋆詣軍歸款元竝納之遂長驅而進賊將周凱望聲遁走彧遣將張永沈攸之等率衆討安都屯于下磕永乃分遣羽林監王穆之領卒五千守輜重於武原龍驤將軍謝善居領卒二千據吕梁散騎侍郎張引領卒二千守茱萸督上租糧供其軍實安都出城見元元依朝㫖授其徐州刺史遣中書侍郎髙閭李璨等與安都俱還入城別令孔伯恭精甲二千撫安内外然後元入彭城元以張永仍據險要攻守勢倍懼傷士卒乃命安都與璨等固守身率精銳揚兵于外分擊吕梁絶其糧運善居遁奔茱萸仍與張引東走武原馳騎追擊斬首八百餘級武原窮寇八千餘人拒戰不下元親擐甲胄四面攻之破穆之外營殺傷大半獲其輜重五百餘乘以給彭城諸軍然後收師緩戰開其走路穆之率餘燼奔于永軍永勢挫力屈元乘勝圍之攻其南門永遂捐城夜遁伯恭安都乘勢追擊時大雨雪泗水冰合永棄船而走元豫測永必將奔亡身率衆軍邀其走路南北奮擊大破於吕梁之東斬首數萬級追北六十餘里死者相枕手足凍斷者十八九生擒劉彧使持節都督梁南北秦三州諸軍事梁秦二州刺史寧朔將軍益陽縣開國侯垣恭祖龍驤將軍羽林監沈承伯等永攸之輕騎走免收其船車軍資器械不可勝數劉彧東徐州刺史張讜據團城徐州刺史王𤣥載守下邳輔國將軍兖州刺史樊昌侯王整龍驤將軍蘭陵太守桓忻驅掠近民保險自固元遣慰喻張讜及青州刺史沈文秀等皆遣使通誠王整桓忻相與歸命元表曰彭城倉廩虛罄人有飢色求運冀相濟兖四州粟取張永所棄船九百艘㳂清運致可以濟救新民顯祖從之又表分兵置戍進定青冀復表曰彭城賊之要蕃不有積粟彊守不可以固若儲糧廣戍雖劉彧師徒悉動不敢窺􅎿淮北之地此自然之勢也詔曰待後軍到量宜守防其青冀已遣軍援須待尅定更運軍糧元又表曰臣受命出疆再罹寒暑進無鄧艾一舉之功退無羊祜保境之略雖淮岱獲振而民情未安臣以愚智屬當偏任茍事宜宣徹敢不以聞臣前表以下邳水陸所湊先規殄滅遣兵屢討猶未擒定然彭城下邳信命未斷而此城之人元居賊界心尚戀土輒相誑惑希幸非望南來息耗壅塞不逹雖至窮廹仍不肯降彭城民任𤣥朗從淮南到鎮稱劉彧將任農夫陳顯達領兵三千來循宿豫臣即以其日密遣覘使驗其虛實如朗所言臣欲自出擊之以運糧未接又恐新民生變遣子都將于沓千劉龍駒等歩騎五千將往赴擊但征人淹久逃亡者多迭相扇動莫有固志器仗敗毁無一可用臣聞伐國事重古人所難功雖可立必須經略而舉若賊向彭城必由清泗過宿豫歴下邳趨青州路亦由下邳入沂水經東安即為賊用師之要今若先定下邳平宿豫鎮淮陽戍東安則青冀諸鎮可不攻而剋若四處不服青冀雖㧞百姓狼顧猶懷僥倖之心臣愚以為宜釋青冀之師先定東南之地斷劉彧北顧之意絶愚民南望之心夏水雖盛無津途可因冬路雖通無髙城可固如此則淮自舉暫勞永逸今雖向熱猶可行師兵尚神速久則生變若天雨既降或因水通運糧益衆規為進取恐近淮民庶飜然改圖青冀二州卒未可拔臣輒與寮佐共議咸謂可然若隠而不陳懼有損敗之責陳而無驗恐成誣罔之罪惟天鑒懸量照臣愚款彧復遣沈攸之吳憘公領卒數萬從沂清而進欲援下邳元遣孔伯恭率歩騎一萬以拒之幷以攸之前敗軍人傷殘手足瘃瓦膝行者盡送令還以沮其衆又表求濟師詔遣征南大將軍}
