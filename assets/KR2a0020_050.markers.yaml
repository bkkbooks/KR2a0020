  - {type: variant, offset: 2955, length: 1657, content: 乃稱兵反時湛臥疾於家寶夤令姜儉報湛云元略受蕭衍意旨乃欲見除酈道元之來事不可測吾不能坐受死亡今便為身計不復作魏臣也與卿契闊故以相報死生榮辱與君共之湛聞之舉聲大哭儉遽止之曰何得便爾湛曰百口居家即時屠滅云何不哭哭數十聲徐謂儉曰為我白齊王王本以窮鳥投人賴朝廷假王羽翼榮寵至此屬國步多虞不能竭忠報德乃欲乘人間隙有不臧之心信惑行路無識之語欲以羸敗之兵守關問鼎今魏德雖衰天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口居家為王族滅寶夤復報曰此自救命之計不得不爾所以不先相白者恐沮吾計故爾湛復曰凡為大事當得天下奇士今但共長安博徒小兒輩計校辦有成理不湛恐荊棘必生庭閤願乞骸骨還鄉里脫得因此病死可以下見先人寶夤素重之以湛病且知不為己用聽還武功寶夤敗莊帝即位徵補尚書郎既至莊帝曰前聞卿答蕭寶夤甚有美辭為我說也湛頓首謝曰臣雖言辭不如伍被始終不易自謂過之然臣與寶夤周遊契闊言得盡心而不能令其不反臣之罪也莊帝悅拜散騎都尉仍領郎尋遷中書侍郎出帝初病還鄉里終於家贈散騎常侍鎮西將軍雍州刺史湛從母弟天水姜儉字文簡父昭自平憲司直出為兗州安東長史帶高平太守卒於營構都將儉少有幹用勤濟過人起家徐州車騎府田曹參軍轉太尉外兵參軍蕭寶夤出討關西引為開府屬軍機謀略多所參預儉亦自謂遭逢知己遂竭誠委託寶夤為雍州仍請為開府從事中郎帶長安令及寶夤反以為左丞尤見信任為羣下所讎疾寶夤敗城人殺之時年三十九蘇湛每謂人曰以姜儉才志堪致富貴惜其不遇命也如何儉弟素武定末中散大夫杜銓字士衡京兆人晉征南將軍預五世孫也祖冑苻堅太尉長史父嶷慕容垂祕書監仍僑居趙郡銓學涉有長者風與盧玄高允等同被徵為中書博士初密太后父豹喪在濮陽世祖欲命迎葬於鄴謂司徒崔浩曰天下諸杜何處望高浩對京兆為美世祖曰朕今方改葬外祖意欲取京兆中長老一人以為宗正命營護凶事浩曰中書博士杜銓其家今在趙郡是杜預之後於今為諸杜之最即可取之詔召見銓器貌瓌雅世祖感悅謂浩曰此真吾所欲也以為宗正令與杜超子道生迎豹喪柩致葬鄴南銓遂與超如親超謂銓曰既是宗近何緣復僑居趙郡乃迎引同屬魏郡焉遷散騎侍郎轉中書侍郎賜爵新豐侯卒贈平南將軍相州刺史魏縣侯諡曰宣子振字季元太和初舉秀才卒於中書博士子遇字慶期起家奉朝請轉員外散騎侍郎尚書起部郎中竊官材瓦起立私宅清論鄙之遷龍驤將軍中散大夫出為河東太守卒贈中軍將軍都官尚書豫州刺史諡曰惠子鴻永熙中司徒倉曹參軍銓族子洪太字道廓延興中為中書博士後使高麗除安遠將軍下邳太守轉梁郡太守太和中除鷹揚將軍絳城鎮將帶新昌陽平二郡太守卒年五十二子祖悅字士豁頗有識尚大將軍劉昶參軍事稍遷天水仇池二郡太守行南秦州事正光中入為太尉汝南王悅諮議參軍出除高陽太守卒於郡子長文字子儒肅宗挽郎員外散騎侍郎稍遷尚書郎以隨叔顒守岐州勳賜爵始平伯加平東將軍天平末卒於安西將軍光祿大夫贈中軍將軍度支尚書雍州刺史長文第四弟子達武定中齊文襄王大都督府戶曹參軍祖悅弟顒字思顏頗有幹用解褐北中府錄事參軍正光中稍遷厲威將軍盱眙太守帶大徐戍主元法僧之叛也顒逃竄獲免後為諫議大夫孝昌二年為西征軍司行岐州事蕭寶夤起逆顒據州不從還除征虜將軍東荊州刺史以守岐州勳封平陽縣開國伯邑五百戶武泰中轉授岐州刺史永安中除涇州刺史時万俟醜奴充斥關右不行乃為都督防守岐州醜奴攻之不克事寧除鎮西將軍光祿大夫以勳又賞安平縣開國伯食邑五百戶以平陽伯轉授弟二子景仲後為征西將軍金紫光祿大夫沒於關西裴駿字神駒小名皮河東聞喜人父雙碩本縣令假建威將軍農太守安邑子卒贈平南將軍東雍州刺史聞喜侯駿幼而聰慧親表異之稱為神駒因以為字弱冠通涉經史好屬文性方檢有禮度鄉里宗敬焉蓋吳作亂於關中汾陰人薛永宗聚衆應之屢殘破諸縣來襲聞喜縣中先無兵仗人情駭動縣令憂惶計無所出駿在家聞之便率厲鄉豪曰在禮君父有危臣子致命府縣今為賊所逼是吾等徇節之秋諸君可不勉乎諸豪皆奮激請行駿乃簡騎驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以狀表聞會世祖親討蓋吳引見駿駿陳事宜甚會機理世祖大悅顧謂崔浩曰裴駿有當世才具且忠義可嘉補中書博士浩亦深器駿目為三河領袖轉中書侍郎劉駿遣使明僧暠朝貢以駿有才學乃假給事中散騎常侍於境上勞接皇興二, WYG: ''}
