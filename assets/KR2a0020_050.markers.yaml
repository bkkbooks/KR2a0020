  - {type: variant, offset: 58, length: 3, content: 垂吏部, WYG: 白曜赴之白曜到瑕丘遇患會泗水暴竭賊軍不得前進白曜遂不行伯恭大破賊軍攸之憘公等輕騎遁走元書與劉彧徐州刺史王元載示其禍福元載狼狽夜走宿豫淮陽皆棄城而遁於是遣南中}
