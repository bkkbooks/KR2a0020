  - {type: variant, offset: 723, length: 1, content: 衍, WYG: 表請濟師顯祖詔白曜赴之白曜到瑕丘遇患時泗水暴竭船不得進憘公退白曜因停瑕丘會崇吉與從弟法壽盜彧盤陽城以贖母妻白曜自瑕丘遣將軍長孫觀等率騎入自馬耳關赴之觀至盤陽諸郡悉降平東將軍長孫陵寧東將軍尉眷東討青州白曜自瑕丘進攻歴城白曜乃}
