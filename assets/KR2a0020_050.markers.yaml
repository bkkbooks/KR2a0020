  - {type: variant, offset: 998, length: 378, content: 尋除右將軍咸陽王禧開府從事中郎復為河南邑中正崇頻居衡品以平直見稱出為鄉郡太守更滿應代吏民詣闕乞留復延三年在郡九年轉司徒諮議久之除華山太守卒子猷之釋褐奉朝請轉給事中步兵校尉稍遷前將軍太中大夫卒猷之弟休之起家安州左將軍府城局參軍轉給事中河南邑中正稍遷安西將軍光祿大夫休之貞和自守未嘗以言行忤物卒子道建武定末定州儀同開府長史帶中山太守道建弟道儒齊文襄王大將軍府東閤祭酒閬族弟珍字靈智高祖賜名焉父尚字文叔樂安王良安西府從事中郎卒贈安遠將軍雍州刺史珍少有志操解褐京兆王子推常侍轉尚書南部郎高祖初蠻首桓誕歸款朝廷思安邊之略以誕為東荊州刺史令珍為使與誕招慰蠻左珍自懸瓠西入三百餘里至桐栢山窮淮源宣揚恩澤莫不降附淮源舊有祠堂蠻俗用人祭之珍乃曉告曰天地明靈即是民之父母豈有父母甘子肉味自今已後悉宜以酒脯代用羣蠻從約至今行之凡所招降七萬餘戶置郡縣而還以奉使稱旨除左將軍樂陵鎮將, WYG: ''}
