  - {type: variant, offset: 66, length: 2, content: 閬少, WYG: 戎昭果毅智勇奮發水陸邀絶應時摧殄自淮以北蕩然清定皆是元帥經略將士效力之所致也朕用嘉焉所獲諸城要害之處分兵置戍以帖民情今方欲清蕩吳會懸旌秣陵至於用兵所宜形勢進止善加量度動靜以聞是時徐州妖人假姓司馬字休符自稱晉王扇惑百姓元遣將追斬之四年詔徵元還京赴西郊尋還所鎮延興元年五月假元淮陽王三年劉昱將蕭順之王勑懃等領衆三萬入寇淮北諸城元分遣諸將逆擊走之元表淮陽郡上黨令韓念祖始臨之初舊民南叛全無一人令撫綏招集愛民如子南來民費係先等前後歸附户至二百}
