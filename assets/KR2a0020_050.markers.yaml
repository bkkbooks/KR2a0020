  - {type: variant, offset: 134, length: 0, content: '', krp: 統萬鎮都將甚得夷民之心三年進爵淮陽王以舊老見禮聽乘歩挽杖於朝蕭道成既自立多遣間諜扇動新民不逞之徒所在蜂起以元威名夙振徵為使持節侍中都督南征諸軍事征西大將軍大都將餘官如故總率諸軍以討之元討五固賊桓和等皆平之東南清晏逺近怗然入為侍中都曹尚書遷尚書令十三年進位}
  - {type: variant, offset: 135, length: 2, content: 馬試, WYG: 徒十六年例降庶姓王爵封山陽郡開國公食邑六百户元表曰臣以天安之初奉律總戎廓寧淮右海内既平仍忝徐岳素餐尸禄積有年歲彼土安危竊所具悉每惟彭城水陸之要江南用兵莫不因之威陵諸夏夫國之大計豫備為先且臣初剋徐方青齊未定從河以南猶懷彼此時劉彧遣張永沈攸之陳顯達蕭順之等前後數度規取彭城勢連青兖唯以彭城既固而永等摧屈今計彼戍兵多是胡人臣前鎮徐州之日胡人子都將呼延籠達因於負罪便爾叛亂鳩引胡類一時扇動頼威靈遐被罪人斯戮又團城子都將胡人王勑懃負釁南叛每懼姧圖狡誘同黨闕誠所見宜以彭城胡軍換取南豫州徙民之兵轉戍彭城又以中州鮮卑增實兵數於事為宜詔曰公之所陳甚合事機其年頻表以老乞身八月詔曰元年尊識逺屢表告退朕以公秉徳清挹體懷平隠仁雅淵廣謀猷是仗方委之以政用康億兆故頻文累札仍違沖志而謙光逾固三請彌切若不屈從髙謨復何以成其美徳也已許其致仕主者可出表付外如禮申遂元詣闕謝老引見於庭命升殿勞宴賜𤣥冠素服又詔曰夫大道凝虚至徳沖挹故尹王法𤣥猷以御世聖人崇謙光而降美是以天子父事三老兄事五更所以明孝悌於萬國垂教本於天下自非道髙識博孰能處之是故五帝憲徳三王乞言若求備一人同之古哲叔世之老孰能克堪師上聖則難為其舉傅中庸則易為其選朕既虚寡徳謝曩喆更老之選差可有之前司徒山陽郡開國公尉元前大鴻臚卿新泰伯游明根並元亨利貞明允誠素少著英風老敷雅迹位顯台宿歸終私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選於是養三老五更於明堂國老庶老於階下髙祖再拜三老親袒割牲執爵而饋於五更行肅拜之禮賜國老庶老衣服有差既而元言曰自天地分判五行施則人之所崇莫重於孝順然五孝六順天下之所先願陛下重之以化四方臣既衰老不究逺趣心耳所及敢不盡誠髙祖曰孝順之道天地之經今承三老明言銘之于懷明根言曰夫至孝通靈至順感幽故詩云孝悌之至通於神明光於四海如此則孝順之道無所不格願陛下念之以濟黎庶臣年志朽敝識見昧然在於心慮不敢不盡髙祖曰五更助三老以言至範敷展徳音當克己復禮以行來授禮畢乃賜歩挽一乘詔曰夫尊老尚更列聖同致欽年敬徳綿哲齊軌朕雖道謝𤣥風識昧叡則仰禀先誨企遵猷㫖故推老以徳立更以元父焉斯彰兄焉斯顯矣前司徒公元前鴻臚卿明根並以沖徳懸車懿量歸老故尊公以三事更以五雖更老非官耄耋罔禄然況事既髙宜加殊養三老可給上公之禄五更可食元卿之俸供食之味亦同其例十七年七月元疾篤髙祖親幸省疾八月元薨時年八十一詔曰元至行寛純仁風美富内秉越羣之武外挺温懿之容自少暨長勲勤備至歴奉五朝美隆四葉南曜河淮之功北光燕然之効魯宋懷仁中鉉載徳所謂立身備於本末行道著於終始勲書玉牒惠結民志者也爰及五福攸集懸車歸老謙損既彰逺近流詠􅈝兹父事儀我萬方謂極眉壽彌贊王業天不遺老奄爾薨逝念功惟善抽怛于懷但戎事致奪恨不盡禮耳可賜布帛綵物二千匹温明祕器朝衣一襲并為營造墳域諡曰景桓公葬以殊禮給羽葆鼓吹假黄鉞班劒四十人賜帛一千匹子羽名犯肅宗廟諱頗有器望起家祕書中散駕部令轉主客給事加通直散騎常侍}
