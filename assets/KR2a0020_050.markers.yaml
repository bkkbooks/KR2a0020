  - {type: variant, offset: 134, length: 0, content: '', WYG: 統萬鎮都將甚得夷民之心三年進爵淮陽王以舊老見禮聽乘歩挽杖於朝蕭道成既自立多遣間諜扇動新民不逞之徒所在蜂起以元威名夙振徵為使持節侍中都督南征諸軍事征西大將軍大都將餘官如故總率諸軍以討之元討五固賊桓和等皆平之東南清晏逺近怗然入為侍中都曹尚書遷尚書令十三年進位}
