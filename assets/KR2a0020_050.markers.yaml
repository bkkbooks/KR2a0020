  - {type: variant, offset: 7701, length: 481, content: 而從之還除尚書右丞出為清河太守武定八年卒於郡子馥以三傳經同說異遂總為一部傳注並出校比短長會亡未就子德維武定末司徒行參軍子馥弟子華字仲夷天平中右光祿大夫柳崇字僧生河東解人也七世祖軌晉廷尉卿崇方雅有器量身長八尺美鬚明目兼有學行舉秀才射策高第解褐太尉主簿尚書右外兵郎中于時河東河北二郡爭境其間有鹽池之饒虜坂之便守宰及民皆恐外割公私朋競紛囂臺府高祖乃遣崇檢斷民官息訟屬荊郢新附南寇窺擾又詔崇持節與州郡經略兼加慰喻還遷太子洗馬本郡邑中正轉中壘將軍散騎侍郎遷司空司馬兼衞尉少卿又領邑中正出為河北太守崇初屆郡郡民張明失馬疑十餘人崇見之不問賊事人人別借以溫顏更問其親老存不農桑多少而微察其辭色即獲真賊呂穆等二人餘皆放遣郡中畏服境內帖然卒於官年五十六贈輔國將軍岐州刺史諡曰穆崇所製文章寇亂遺失長子慶和性沉靜不競於時起家奉朝請稍遷輕車將軍給事中本郡邑中正卒子德逸武定末齊王丞相府主簿慶和弟楷字孝則身長八尺善草書頗涉文史解褐員外散騎侍郎蕭闕西征引為車騎主簿仍為行臺郎中征還以員外郎領殿中侍御史轉太尉記室參軍遷寧遠將軍通直散騎侍郎本郡邑中正普泰初簡定集書省官出除征虜將軍司徒從事中書郎轉, WYG: ''}
