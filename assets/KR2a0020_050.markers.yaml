  - {type: variant, offset: 4615, length: 1754, content: 平南將軍秦州刺史聞喜侯諡曰康子修字元寄清辯好學年十三補中書學生遷祕書中散轉主客令以婦父李訢事出為張掖子都大將張掖境接胡夷前後數致寇掠修明設烽候以方略禦之在邊六年關塞清靜高祖嘉之徵為中部令轉中大夫兼祠部曹事職主禮樂每有疑議修斟酌故實咸有條貫太和十六年卒時年五十一高祖悼惜之賻帛一百匹諡曰恭伯世宗時追贈輔國將軍東秦州刺史修早孤居喪以孝聞二弟三妹並在幼弱撫養訓誨甚有義方次弟務早喪修哀傷之感於行路愛育孤姪同於己子及將異居奴婢田宅悉推與之時人以此稱焉子詢字敬叔美儀貌多藝能音律博弈咸所開解起家奉朝請太尉集曹參軍轉長流尚書起部郎中平昌太守時太原長公主寡居與詢私姦肅宗仍詔詢尚焉尋以主壻特除散騎常侍時本邑中正闕司徒召詢為之詢族叔昞自陳情願此官詢遂讓焉時論善之尋監起居事遷祕書監出為平南將軍郢州刺史詢以凡司戍主蠻酋田朴特地居要險衆踰數萬足為邊捍遂表朴特為西郢州刺史朝議許之蕭衍遣將李國興寇邊時四方多事朝廷未遑外略緣境城戍多為國興所陷賊既乘勝遂向州城詢率厲固守垂將百日援軍既至賊乃退走加散騎常侍安南將軍朴特自國興來寇便與詢掎角為表𩹉聲援郢州獲全朴特頗有力焉徵為七兵尚書至都未幾除豫州刺史尋進號撫軍將軍加散騎常侍未之州還為七兵尚書常侍如故武泰初詔詢以本官兼侍中為關右大使賞擢慕義之徒未及發會尒朱榮入洛於河陰遇害年五十一贈侍中車騎大將軍司空公雍州刺史諡曰貞烈無子修弟務字陽仁少而聰慧舉秀才州辟主簿早卒子美字師伯少有美名舉秀才州主簿太尉咸陽王雅相賞愛欲以女妻之美拒而不納除奉朝請亦早卒無子務弟宣字叔令通辯博物早有聲譽少孤事母兄以孝友稱舉秀才至都見司空李訢與言自旦及夕訢嗟善不已司空李沖有人倫鑒識見而重之高祖初徵為尚書主客郎與蕭賾使顏幼明劉思效蕭琛范雲等對接轉都官郎遷員外散騎侍郎舊令與吏部郎同班闕高祖曾集沙門講佛經因命宣論難甚有理詣高祖稱善遷都洛陽以宣為採材副將奉使稱旨遙除司空諮議參軍府解轉司州治中兼司徒右長史又轉別駕仍長史宣明敏有器幹總攝州府事無凝滯遠近稱之世宗初除太中大夫領本郡中正仍別駕又為司州都督遷太尉長史宣上言曰自遷都已來凡戰陳之處及軍罷兵還之道所有骸骼無人覆藏者請悉令州郡戍邏檢行埋掩并符出兵之鄉其家有死於戎役者使皆招魂復魄祔祭先靈復其年租調身被傷痍者免其兵役朝廷從之出為征虜將軍益州刺史宣善於綏撫甚得羌戎之心復晉壽更置益州改宣所莅為南秦州先是有陰平氐酋楊孟孫擁戶數萬自立為王通引蕭衍數為邊患宣乃遣使招喻曉以逆順孟孫感恩即遣子詣闕武興氐姜謨等千餘人上書乞延更限世宗嘉焉宣家世以儒學為業常慕廉退每歎曰以賈誼之才仕漢文之世不歷公卿將非運也乃謂親賓曰吾本閭閻之士素無當世之志直隨牒推移遂至於此祿後養親道不光國瞻言往哲可以言歸矣因表求解世宗不許乃作懷田賦以心焉永平四年患篤世宗遣太醫令馳驛就視并賜御藥宣素明陰陽之書自始患便知不起因自剋亡日果如其言時年五十八世宗悼惜之贈左將軍豫州刺史諡曰定尋改為穆子敬憲莊伯並在文苑傳第四子獻伯武定末廷尉卿駿從弟安祖少而聰慧年八九歲就師講詩至鹿鳴篇語諸兄云鹿雖禽獸得食相呼而況人也自此之後未曾獨食弱冠州辟主簿民有兄弟爭財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪內外欽服之復有人勸其入仕安祖曰高尚之事非敢庶幾且京師遼遠實憚於栖屑耳於是閑居養志不出城邑安祖曾行值天熱舍於樹下鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置陰地徐徐護視良久得蘇安祖喜而放之後夜忽夢一丈夫衣冠甚偉著繡衣曲領向安祖再拜安祖怪而問之此人云感君前日見放故來謝德聞者異焉後高祖幸長安至河東存訪故老安祖朝於蒲坂高祖與語甚悅仍拜安邑令安祖以老病固辭詔給一時俸以供湯藥焉年八十三卒於家子思濟亦有志操早卒子宗賢思濟弟幼儁卒於猗氏令辛紹先隴西狄道人五世祖怡晉幽州刺史父淵私署涼王李暠驍騎將軍暠子歆亦厚遇之歆與沮渠蒙遜戰於蓼泉軍敗失馬淵以所乘馬援歆而身死於難以義烈見稱西土世祖之平涼州紹先內徙家於晉陽明敏有識量與廣平游明根范陽盧度世同郡李承等甚相友善有至性丁父憂三年口不甘味頭不櫛沐髮遂落盡故常著垂裙皂帽自中書博士轉神部令皇興中薛安都以彭城歸國時朝廷欲綏安初附以紹先為下邳太守加寧朔將軍為政不苟激察舉其大綱而已唯教民治產禦賊之備及劉彧將陳顯達蕭道成蕭順之來寇道成謂順之曰辛紹先未易侵也宜共慎之於是不歷郡境遂徑屯呂梁太和十三年卒贈冠軍, WYG: 鎮北}
