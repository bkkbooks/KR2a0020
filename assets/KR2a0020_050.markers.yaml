  - {type: variant, offset: 7441, length: 259, content: 諡曰貞長子子馥字元穎早有學行孝昌初釋褐南司州龍驤府錄事參軍丁父艱居喪有禮後除給事中南冀州防城都督素為莊帝所知識及即位除宣威將軍尚書右主客郎中持節為南濟冀濟青四州慰勞使尋除寧朔將軍員外散騎常侍仍領郎中太宰元天穆征邢杲引為行臺郎中尋除平原相子馥父子並為此郡吏民懷安之元顥入洛子馥不受其赦刺史元仲景附顥拘子馥并禁家口莊帝反政詔封三門縣開國男食邑二百戶天平中為東南道行臺左丞徐州開府長史入除太尉府司馬長白山連接三齊瑕丘數州之界多有盜賊子馥受使檢覆因辨山谷要害宜立鎮戍之所又諸州豪右在山鼓鑄姦黨多依之又得密造兵仗亦請破罷諸冶朝廷, WYG: 孫}
