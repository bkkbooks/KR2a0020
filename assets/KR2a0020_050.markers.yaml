  - {type: variant, offset: 731, length: 0, content: '', WYG: 降軍人入其西郭頗有採掠文秀悔之遂嬰城拒守二年崔道固及兖州刺史梁鄒守將劉休賔並面縳而降白曜皆釋而禮之送道固休賔及其寮屬于京師後乃徙二城民望於下館朝廷置平齊郡懷寧歸安二縣以居之自餘悉}
  - {type: page-break, offset: 731, content: '', id: KR2a0020_WYG_050-15a, image: WYG0261/WYG0261-0686c.png}
  - {type: variant, offset: 731, length: 0, content: '', krp: 降軍人入其西郭頗有採掠文秀悔之遂嬰城拒守二年崔道固及兖州刺史梁鄒守將劉休賔並面縳而降白曜皆釋而禮之送道固休賔及其寮屬于京師後乃徙二城民望於下館朝廷置平齊郡懷寧歸安二縣以居之自餘悉}
  - {type: variant, offset: 732, length: 0, content: '', WYG: 奴婢分賜百官白曜雖在軍旅而接待人物寛和有禮獲崇吉母妻申纂婦女皆別營安置不令士卒諠雜乃進討東陽冬入其西郭三年春剋東陽擒沈文秀凡獲倉粟八十五萬斛米三千斛弓九千張箭十八萬八千刀二萬二千四百甲胄各三千三百銅五千斤錢十五萬城内户八千六百口四萬一千吳蠻户三百餘始末三年築圍攻擊日日交兵雖士卒死傷無多怨叛督上土人租絹以為軍資不至侵苦三齊欣然安堵樂業剋城之日以沈文秀抗据不為之拜忿而箠撻唯以此見譏以功拜使持節都督青齊東徐州諸軍事開府儀同三司青州刺史濟南王將軍如故四年冬見誅初乙渾專權白曜頗所俠附緣此追以為責及將誅也云謀反叛時論寃之白曜少子真安年十一聞父被執將自殺家人止之曰輕重未可知真安曰王位髙功重若有小罪終不至此我何忍見父之死遂自縊焉白曜弟如意亦從白曜平歴下與白曜同誅太和中著作佐郎成淹上表理白曜曰臣聞經疆啓宇實良將之功襃徳酬庸乃聖王之務昔姜公杖鉞開隆周之基韓生秉旄興鴻漢之業故能賞超當時名埀前史若閫外功成而流言内作人主猜疑良將懷懼樂毅所以背燕章邯所以奔楚至如鄧艾懷忠矯命寧國赤心皎然幽顯同見而横受屠戮良可悲哀及士冶伐吳奮不顧命萬里浮江應機直指使孫皓君臣輿櫬入洛大功亦舉讒書驟至内外唱和貝錦將成微晉武之鑒亦幾於顛沛矣每鑒其事常為痛心聖主明王固宜深察臣伏見故征南大將軍開府儀同三司青州刺史濟南王慕容白曜祖父相資世酋東裔值皇運廓被委節臣妾白曜生}
