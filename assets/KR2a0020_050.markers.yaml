  - {type: variant, offset: 6780, length: 636, content: 軍濟州征虜府長史卒年四十六琨弟懷仁武定末長樂太守懷仁弟賁字叔文少有文學識度沉雅起家北中府中兵參軍員外散騎侍郎建義初修起居注除濟州撫軍府長史出帝時轉膠州車騎府長史遷平東將軍太師咸陽王坦開府長史武定中中尉崔暹表薦賁除闕太守吏民懷其恩惠還卒於鄴時年五十八賁弟烈字季武歷太傅東閤祭酒卒於梁州鎮南府長史烈弟匡字季政頗有文學永安初釋褐封丘令加威烈將軍時經河陰之役朝士多求出外故匡為之後除平遠將軍符璽郎中卒於龍驤將軍通直散騎侍郎時年三十五贈散騎常侍前將軍雍州刺史祥弟少雍字季仲少聰穎有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝性仁厚有禮義門內之法為時所重釋褐奉朝請太學博士員外散騎侍郎司空高陽王雍引為田曹參軍少雍性清正不憚強禦積年久訟造次決之請託路絕時稱賢明正始中詔百官各舉所知高陽王雍及吏部郎中李憲俱以少雍為舉首遷給事中侍中游肇後亦薦之會卒年四十二少雍妻王氏有德義與其從子懷仁兄弟同居懷仁等事之甚謹閨門禮讓人無比焉士大夫以此稱美子元植武定中儀同府司馬元植弟士遜太師開府功曹參軍鳳達弟穆字叔宗舉茂才東雍州別駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不反敬文病臨卒以雜綾二十匹託穆與敬武穆久訪不得經二十餘年始於洛陽見敬武以物還之封題如故世稱其廉信歷東荊州司馬轉長史帶義陽太守領戍雅有恤民之稱轉汝陽太守值水澇民飢上表請輕租賦帝從之遂敕汝陽一郡聽以小絹為調遷中散大夫加龍驤將軍正光四年以老啟求致仕詔引見謂穆志力尚可除平原相穆善撫導民吏懷之孝昌二年徵為, WYG: 進號}
