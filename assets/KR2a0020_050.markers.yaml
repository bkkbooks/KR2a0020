  - {type: variant, offset: 729, length: 1, content: 又, WYG: 薛安都豫州刺史常珍竒兖州刺史畢衆敬等深覩存亡飜然歸義故朝廷納其誠款委以南蕃皆目前之見事東西所備聞也彼無鹽戍主申纂敢縱奸慝劫奪行人官軍始臨一時授首房崇吉固守升城尋即潰散自襄陽以東至于淮海莫不風靡服從正化謂東陽歴城有識之士上思安都之榮顯下念申纂之死亡追悔前惑改圖後悟然執守愚迷不能自革猥總戎旅掃定北方濟黄河知十二之虚說臨齊境想一變之清風踟蹰周覽依然何極故先馳書以喻成敗夫見機而動周易所稱去危就安人事常理若以一介為髙不悛為美則微子負嫌於時紀季受譏於世我皇魏重光累葉徳懐無外軍威所拂無不披靡固非三吳弱卒所能擬抗況於今者勢已土崩劉彧威不制秣陵政不出閫外豈能復浮江越海赴危救急恃此為援何異於蹄涔之魚冀拯江海夫蝮虵螫手則斷手螫足則斷足誠忍肌體以救性命若推義而行之無割身之痛也而可以保家寧宗長守安樂此智士所宜深思重慮自求多福道固固守不降白曜築長圍以攻之長孫陵等既至青州沈文秀遣使}
