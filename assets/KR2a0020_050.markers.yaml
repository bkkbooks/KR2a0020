  - {type: variant, offset: 1551, length: 972, content: 至氣銳未可便挫且共堅守待其攻我疲弊擊之未晚於是憑城拒戰殺傷甚衆相持旬有二日夜開城門掩擊之賊遂奔潰以功進爵為侯車駕南討珍上便宜并自陳在邊歲久悉其要害願為前驅詔珍為隴西公源懷衞大將軍府長史轉太保齊郡王長史遷顯武將軍郢州刺史在州有聲績朝庭嘉之遷龍驤將軍賜驊騮二匹帛五十匹穀三百斛珍乃召集州內孤貧者謂曰天子以我能綏撫卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之尋加平南將軍荊州刺史與尚書盧淵征赭陽為蕭鸞將垣歷生蔡道貴所敗免歸鄉里臨別謂淵曰主上聖明志吞吳會用兵機要在於上流若有事荊楚恐老夫復不得停耳後車駕征樊郢復起珍為中軍大將軍彭城王勰長史沔北既平以珍為建威將軍試守魯陽郡高祖復南伐路經珍郡加中壘將軍正太守珍從至濟水高祖曰朕頃戎車再駕卿常翼務中軍今日之舉亦欲與卿同行但三餢險惡非卿無以守也因敕珍辭還及高祖崩於行宮祕匿而還至珍郡始發大諱還除中散大夫尋加鎮遠將軍太尉諮議參軍永平元年卒時年七十四贈本將軍南青州刺史諡曰懿長子纘字遵彥年十三補中書學生聰敏明辯為博士李彪所稱除祕書中散遷侍御中散高祖每與名德沙門談論往復纘掌綴錄無所遺漏頗見知賞轉散騎侍郎徙太子中舍人仍兼黃門又兼司徒右長史尋轉長兼尚書左丞壽春內附尚書令王肅出鎮揚州請纘為長史加平遠將軍帶梁郡太守肅薨敕纘行州事任城王澄代肅為州復啟纘為長史澄出征之後蕭衍將姜慶真乘虛攻襲遂據外郭雖尋克復纘坐免官永平三年卒年四十五纘弟彧字遵慶亦有學識解褐奉朝請遷太尉騎兵參軍出為雍州治中轉別駕入為司徒掾尋轉散騎侍郎稍遷平遠將軍東豫州刺史彧綏懷蠻左頗得其心蠻首田益宗子魯生魯賢先叛父南入數為寇掠自彧至州魯生等咸牋啟修敬不復為害彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教又於城北置宗武館以習武焉境內清肅還遇大將軍京兆王繼西征請為長史拜通直散騎常侍尋以本官兼尚書為豳夏行臺以功封陰盤縣開國男邑二百戶孝昌元年秋卒於長安贈撫軍將軍雍州刺史諡曰文子彪襲歷本州治中轉別駕孝莊末藍田太守沒於關西彪弟融解褐員外散騎侍郎以軍功賜爵長安伯稍遷大司馬開府司馬融娶司農卿趙郡李瑾女天平中疑其妻與章武王景哲姦通乃刺殺之懼不免仍亦自害彧弟朏字遵顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活甚衆解褐太學博士遷祕書郎中稍遷左軍將軍為荊郢和糴大使南郢州刺史田夷啟稱朏父珍往任荊州恩洽夷夏乞朏充南道別將領荊州驍勇共為腹背詔從之未幾行南荊州事肅宗末, WYG: ''}
