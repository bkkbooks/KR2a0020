  - {type: variant, offset: 329, length: 1, content: 殿, WYG: 平東将軍前廢帝初以舅氏超授征東将軍金紫光祿大夫領國子祭酒久之為車騎将軍右光祿大夫轉䕶軍将軍元象初以本官兼散騎常侍使於蕭衍前後使人蕭衍令其侯王於馬射之日宴對申禮伯猷之行衍令其領軍将軍臧盾與之相接議者以此貶之使還除驃騎将軍南青州刺史在州貪惏妻定豐王元延明女專為聚歛貨賄公行潤及親戚戸口逃散邑落空虚乃誣良民云欲反叛籍其資財盡以入已誅其丈夫婦女配沒百姓怨苦聲聞四方為御史糾劾死罪數十條遇赦免因以頓廢齊文襄王作相每誡厲朝士常以伯猷及崔叔仁為諭武定七年除太常卿其年卒年六十四贈驃騎大将軍}
