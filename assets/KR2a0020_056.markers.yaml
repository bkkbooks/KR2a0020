  - {type: variant, offset: 652, length: 0, content: '', WYG: 諡曰恭長子景儁梗正有高風好古博涉以經明行修徵拜中書博士歴侍御史主文中散受勅接蕭賾使蕭琛范雲高祖賜名為逸後為員外散騎侍郎與著作郎韓興宗參定朝儀雅為高祖所知重遷國子博士每有公事逸常被詔獨進博士特命自逸始}
