  - {type: variant, offset: 655, length: 0, content: '', WYG: 州鎮北府墨曹參軍太尉記室參軍叔楷為殷州巨倫仍為長史北道别将在州陷賊歛恤亡存為賊所義葛榮聞其才名欲用為黃門侍郎巨倫心惡之至五月五日㑹集官寮令巨倫賦詩巨倫乃曰五月五日時天氣已大熱狗便呀欲死牛復吐出舌以此自晦獲免未㡬潜結死士數人夜中南走逢賊逰騎數百俱恐不濟巨倫曰寜南死一寸豈北生一尺也便欺賊曰吾受敕而行賊不信共爇火觀敕火未然巨倫手刃賊帥餘人因與奮擊殺傷數十人賊乃四潰得馬數匹而去夜隂失道惟看佛塔戸而行到洛朝廷嘉之授持節别将北討初楷喪之始巨倫收殯倉卒事不周固至是遂偷路改殯并竊家口以歸尋授國子博士荘帝即位假節中堅將軍東濮陽太守假征虜将軍别将時河北紛梗人避賊多住郡界歲儉飢乏巨倫傾資贍恤務相全濟時類高之元顥入洛據郡不從荘帝還宫行西兗州事封漁陽縣開國男邑}
