  - {type: variant, offset: 872, length: 3, content: 延興五, WYG: 兹地荒蕪臣實為取不揆愚瞽輒敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一準古法皆循舊隄何者河決瓠子梁楚幾危宣防既建水還舊迹十數}
  - {type: page-break, offset: 872, content: '', id: KR2a0020_WYG_056-23a, image: WYG0261/WYG0261-0767c.png}
  - {type: variant, offset: 872, length: 3, content: 延興五, krp: 兹地荒蕪臣實為取不揆愚瞽輒敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一準古法皆循舊隄何者河決瓠子梁楚幾危宣防既建水還舊迹十數}
  - {type: variant, offset: 876, length: 2, content: 卒諡, WYG: 間戸口豐衍又決屯氏兩川分流東北數郡之地僅得支存及下通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毁滅良田水大渠狹更不開瀉衆流壅塞曲直乗之所致也至若量其逶迤穿鑿涓澮分立隄堨所在疏通預決其路令無停蹙隨其高下必得地形土木參功務從便省使地有金隄之堅水有非常之備鈎連相注多置水口從河入海逺邇逕過瀉其墝潟泄此陂澤九月農罷量役計功十月昬正立匠表度縣遣能工麾畫形勢郡發明使籌察可否審地推岸辨其脉流樹板分崖練厥從往别使案檢分部是非瞰睇川原明審通塞當境修治不勞役逺終春自罷未須久功即以高下營田因於水陸水種秔稻陸藝桑麻必使室有久儲門豐餘積其實上葉禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢洿下雲雨隂霖動彌旬月遥途逺運惟用舟艫南畝畬菑微事耒耜而衆庶未為饉色黔首罕有飢顔豈天徳不均致地偏罰故是地勢異圖有兹豐餒臣既鄉居水際目覩荒殘每思鄭白屢想王李夙宵不寐言念皇家愚誠丹款實希效力有心螢爝乞蹔施行使數州士女無廢耕桑之業聖世洪恩有賑飢荒之士鄴宰深笑息自一朝臣之至誠申於今日詔}
  - {type: page-break, offset: 876, content: '', id: KR2a0020_WYG_056-23b, image: WYG0261/WYG0261-0767d.png}
