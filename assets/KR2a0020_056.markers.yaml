  - {type: variant, offset: 111, length: 0, content: '', krp: 書學生遷祕書郎拜主文中散徙員外散騎侍郎祕書丞兼中書侍郎從征沔漢高祖饗侍臣於懸瓠方丈竹堂道昭與兄懿俱侍坐焉樂作酒酣高祖乃歌曰白日光天兮無不曜江左一隅獨未照彭城王勰續歌曰願從聖明兮登衡㑹萬國馳誠混内外鄭懿歌曰雲雷大振兮天門闢率土來賓一正歴邢巒歌曰舜舞干戚兮天下歸文徳逺被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合高祖又歌曰遵彼汝墳兮昔化貞未若今日道風明宋弁歌曰文王政教兮暉江沼寧如大化光四表高祖謂道昭曰自比遷務雖猥與諸才儁不廢詠綴遂命邢巒總集叙記當爾之年卿頻丁艱禍每眷文席常用慨然尋正除中書郎轉通直散騎常侍北海王詳為司徒以道昭與琅邪王秉為諮議參}
  - {type: variant, offset: 112, length: 3, content: 執幢時, WYG: 遷國子祭酒道昭表曰臣竊以為崇治之道必也須才養才之要莫先於學今國子學堂房粗置弦誦闕爾城南太學漢魏石經丘墟殘毁藜藿蕪穢逰兒牧豎為之歎息有情之輩實亦悼心況臣親司而不言露伏願天慈回神紆眄賜垂鑒察若臣微意萬一合允求重勅尚書門下考論營制之模則五雍可翹立而興毁銘可不日而就樹舊經於帝京播茂範於不朽斯有天下者之羙業也不從廣平王懷為司州牧以道昭與宗正卿元匡為州都道昭又表曰臣聞唐虞啟運以文徳為本殷周致治以道藝為先然則禮樂者為國之基不可斯須廢也是故周敷文教四海宅心魯秉周禮彊齊歸義及至戰國紛紜干戈遞用五籍灰焚羣儒坑殄賊仁義之經貴戰争之術遂使天下分崩黔黎荼炭數十年間民無聊生者斯之由矣爰暨漢祖於行陳之中尚優引叔孫通等光武中興於撥亂之際乃使鄭衆范升校書東觀降逮魏晉何嘗不殷勤於篇籍篤學於戎伍伏惟大魏之興也雖羣凶未殄戎馬在郊然猶招集英儒廣開學校用能闡道義於八荒布盛徳於萬國教靡不懐風無不偃今者乗休平之基開無疆之祚定鼎伊瀍惟新寶厯九服感至徳之和四垠懐擊壤之慶而蠢爾閩吴阻化江湫先帝爰震武怒戎車不息而停鑾佇蹕留心典墳命故御史中尉臣李彪與吏部尚書任城王澄等妙選英儒以宗文教澄等依㫖置四門博士四十人其國子博士太學博士及國子助敎宿已簡置伏尋先㫖意在速就但軍國多事未遑營立自爾迄今垂将一紀學官凋落四術寢廢遂使碩儒耆徳卷經而不談俗學後生遺本而逐末進競之風實由於此矣伏惟陛下欽明文思元鑒洞逺越㑹未款務修道以來之遐方後服敷文教而懐之垂心經素優柔墳籍將使化越軒唐徳隆虞夏是故屢發中㫖敦營學館房宇既修生徒未立臣學陋全經識蔽篆素然往年删定律令謬預議筵謹依準前修尋訪舊事參定學令事訖封呈自爾迄今未蒙報判但廢學歴年經術淹滯請學令并制早勅施行使選授有依生徒可準詔曰具卿崇儒敦學之意良不可言新令尋班施行無逺可謂職思其憂無曠官矣道昭又表曰竊惟鼎遷中縣年将一紀縉紳褫業爼豆闕聞遂使濟濟明朝無觀風之羙非所以光國宣風納民軌義臣自往年以來頻請學令並置生員前後累上未蒙一報故當以臣識淺濫官無能有所感悟者也館宇既修生房粗構博士見員足可講習雖新令未班請依舊權置國子學生漸開訓業使播教有章儒風不墜後生覩徙義之機學徒崇知新之益至若孔廟既成釋奠告始揖讓之容請俟令出不報遷祕書監滎陽邑中正出為平東将軍光州刺史轉青州刺史将軍如故復入為祕書監加平南将軍熙平元年卒贈鎮北将軍相州刺史諡曰文恭道昭好為詩賦凡數十篇其在二州政務寛厚不任威刑為吏民所愛子嚴祖頗}
