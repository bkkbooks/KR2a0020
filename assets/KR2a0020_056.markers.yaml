  - {type: variant, offset: 656, length: 0, content: '', WYG: 百戸尋除光祿大夫三年卒時年四十四子武襲武定中懐州衞軍府錄事參軍齊受禪爵例降初巨倫有姉明惠有才行因患眇一目内外親類莫有求者其家議欲下嫁之巨倫姑趙國李叔允之妻高明慈篤聞而悲感曰吾兄盛徳不幸早世豈令此女屈事卑族乃為子翼納之時人歎其義崔氏與翼書詩數十首辭理可觀逸弟模字叔軌身長八尺圍亦如之出後其叔雅有志度起家奉朝請歴太尉祭酒尚書金部郎中太尉主薄轉中郎遷太子家令以公事免神龜中詔復本資除冠軍將軍中散大夫出除魯陽太守正光二年襄陽民密求款附詔模為别将隸淮南王世遵率衆赴之事覺模焚襄陽邑郭而還坐不剋免官及蕭寶夤討關隴引模為西征别将屢有戰功除持節光祿大夫都督别道諸軍事加安東将軍万俟醜奴遣将郝虎南侵模攻破其營擒虎以功封槐里縣開國伯邑五百戸於時将督敗殁者多模挫敵持重號為名将後假征東将軍行岐州事未㡬擊賊入深沒於陳贈撫軍将軍相}
