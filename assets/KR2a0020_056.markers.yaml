  - {type: variant, offset: 3295, length: 273, content: 賜爵天水公鎮上邽詔敕文率步騎七千征吐谷渾慕利延兄子拾歸於枹罕衆少不能制詔遣安遠將軍廣川公乙烏頭等二軍與敕文會隴右軍次武始拾歸夜遁敕文引軍入枹罕虜拾歸妻子及其民戶分徙千家於上邽留烏頭守枹罕金城邊冏天水梁會謀反扇動秦益二州雜人萬餘戶據上邽東城攻逼西城敕文先已設備殺賊百餘人被傷者衆賊乃引退冏會復率衆四千攻城氐羌一萬屯於南嶺休官屠各及諸雜戶二萬餘人屯於北嶺為冏等形援敕文遣二將領騎二百設備門內別令騎出擊之既而偽退冏率衆騰逐敕文輕騎橫衝大破之斬冏而北嶺之賊從高射敕文軍人飛矢如雨梁會得奔北嶺騎乃引還復推會為主敕文分兵二百人突入南城燒其門樓賊見火起衆皆驚亂, WYG: 永熙中}
