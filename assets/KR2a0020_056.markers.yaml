  - {type: variant, offset: 646, length: 0, content: '', WYG: 官假驃騎将軍大都督領所部與行臺楊昱同討之荘帝又遣都督賀拔勝討仲逺勝於陳降賊戰士離心尋聞京師不守先護部衆逃散遂竄伏於南境前廢帝初仲逺遣人招誘之既出而害焉出帝時贈持節都督青齊濟兗四州諸軍事驃騎大将軍儀同三司青州刺史開國如故思和歴太尉中兵參軍同元禧之逆伏法子康業通直郎出帝時坐事賜死子彬武定末齊王相國中兵參軍思和弟季長太學博士卒子喬歴司州治中驃騎将軍左光祿大夫羲叔父簡簡孫尚壮健有将略屢為統軍東西征討以軍功賜爵汝陽男歴位尚書郎步兵校尉驍騎}
  - {type: page-break, offset: 646, content: '', id: KR2a0020_WYG_056-15b, image: WYG0261/WYG0261-0763d.png}
  - {type: variant, offset: 646, length: 0, content: '', krp: 官假驃騎将軍大都督領所部與行臺楊昱同討之荘帝又遣都督賀拔勝討仲逺勝於陳降賊戰士離心尋聞京師不守先護部衆逃散遂竄伏於南境前廢帝初仲逺遣人招誘之既出而害焉出帝時贈持節都督青齊濟兗四州諸軍事驃騎大将軍儀同三司青州刺史開國如故思和歴太尉中兵參軍同元禧之逆伏法子康業通直郎出帝時坐事賜死子彬武定末齊王相國中兵參軍思和弟季長太學博士卒子喬歴司州治中驃騎将軍左光祿大夫羲叔父簡簡孫尚壮健有将略屢為統軍東西征討以軍功賜爵汝陽男歴位尚書郎步兵校尉驍騎}
  - {type: line-break, offset: 647, content: '', id: ZHSJ__dup13692}
  - {type: variant, offset: 647, length: 0, content: '', WYG: 軍遷輔國将軍太尉司馬出為濟州刺史将軍如故為政寛簡百姓安之卒贈本将軍豫州刺史諡曰惠子貴賓襲解褐北海王國常侍員外散騎侍郎稍遷尚書金部郎以公坐免官久之兼太尉屬卒贈征虜将軍荆州刺史子景裕襲武定末儀同開府行參軍貴賓弟次珍卒於員外常侍贈安東將軍光州刺史貴賓異母弟大倪小倪皆麤險薄行好為劫盜侵暴鄉里百姓毒患之普泰中並為尒朱仲逺所殺尚從父兄雲字道漢歴鴈門濮陽二郡貪穢狼籍肅宗時納賄劉騰得為龍驤将軍安州刺史坐遷舉受財為御史所糾因暴病卒雲從父兄子敬賓自祕書郎稍遷輔國将軍中散大夫魏郡太守金紫光祿大夫子士淵司空行參軍羲從父兄徳𤣥顯祖初自淮南内附拜滎陽太守子潁考太和中復為滎陽太守卒贈冠軍将軍豫州刺史開封侯諡曰惠子洪建太尉祭酒同元禧之逆與弟祖育同伏法永安中特追贈平東將軍齊州刺史子士機性識不周多有短失歴散騎侍郎司空從事中郎中書郎卒子道蔭武定末開府行參軍祖育太尉祭酒亦特贈平東将軍豫州刺史祖育弟仲眀奉朝請稍遷太尉屬以公彊當世為從弟儼所昵除滎陽太守儼慮世難欲以東道託之建義初仲明弟季明遇害河隂儼後歸之欲與起兵尋為城民所殺仲明兄洪健李沖女壻建義初荘帝以仲明舅氏之親其弟與謀扶戴仲明之死也且有奉國之意乃追封安平縣開國侯邑七百戸贈侍中車騎大将軍儀同三司尚書左僕射雍州刺史長子道門仲明初謀起義令道門說大都督李叔仁於大梁叔仁始欲同舉後聞莊帝已立叔仁子抜江乃斬道門建義中特贈立節将軍𤓰州刺史道門弟孝邕襲天保初爵隨例降仲眀弟季亮司徒城局參軍員外常侍卒贈散騎常侍撫軍将軍青州刺史季亮弟季明釋褐太學博士正光中譙郡太守帶渦陽戍主頻為蕭衍遣将攻圍兵糧寡少外援不接季明孤城自守卒得保全朝廷嘉之封安徳縣開國伯邑七百戸累遷平東将軍光祿少卿武泰中潜通尒朱榮謀奉荘帝及在河隂遂為亂兵所害事寜追封南潁川郡開國公食邑千五百戸贈驃騎大将軍尚書左僕射司空公定州刺史子昌襲武定末司徒城局參軍天保初爵隨例降崔辯字神通博陵安平人學涉經史威儀整峻顯祖徵拜中書博士散騎侍郎平逺将軍武邑太守政事之餘專以勸學為務年六十二卒贈安南将}
