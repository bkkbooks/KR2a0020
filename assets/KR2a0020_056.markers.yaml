  - {type: variant, offset: 37, length: 2, content: 父耆, WYG: 酸棗令鄭伯孫鄄城令董騰别駕賈徳治中申靈度並在任亷貞勤恤百姓羲皆申表稱薦時論多之文眀太后為高祖納其女為嬪徵為祕書監太和十六年卒贈帛五百疋尚書奏諡曰宣詔曰蓋棺定諡先典成式激揚清濁治道明範故何曾幼孝良史不改繆醜之名賈充寵晉直士猶立荒公之稱羲雖宿有文業而治闕亷清稽古之効未光於朝策昧貨之談己形於民聼諡以善問殊乖其衷又前歲之選匪由備行充舉自荷後任勲積未昭尚書何乃情遺至公愆違明典依諡法博聞多見曰文不勤成名曰靈可贈以本官加諡文靈長子懿}
