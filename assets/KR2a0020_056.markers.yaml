  - {type: variant, offset: 9, length: 0, content: '', WYG: 四十四鄭羲崔辯鄭羲字幼驎滎陽開封人魏将作大匠渾之八世孫也曾祖豁慕容垂太常卿父曄不仕娶于長樂潘氏生六子粗有志氣而羲第六文學為優弱冠舉秀才尚書李孝伯以女妻之高宗末拜中書博士天安初劉彧司州刺史常珍竒據汝南來降顯祖詔殿中尚書元石為都将赴之并招慰淮汝遣羲參石軍事到上蔡珍奇率文武}
  - {type: page-break, offset: 9, content: '', id: KR2a0020_WYG_056-1b, image: WYG0261/WYG0261-0756d.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 四十四鄭羲崔辯鄭羲字幼驎滎陽開封人魏将作大匠渾之八世孫也曾祖豁慕容垂太常卿父曄不仕娶于長樂潘氏生六子粗有志氣而羲第六文學為優弱冠舉秀才尚書李孝伯以女妻之高宗末拜中書博士天安初劉彧司州刺史常珍竒據汝南來降顯祖詔殿中尚書元石為都将赴之并招慰淮汝遣羲參石軍事到上蔡珍奇率文武}
  - {type: variant, offset: 10, length: 9, content: 十九韓茂皮豹子封敕, WYG: 百人來迎既相見議欲頓軍於汝北未即入城羲謂石曰機事尚速今珍奇雖來意未可量不如直入其城奪其管籥據有府庫雖出其非意要以全制為勝石從羲言遂策馬徑入其城城中尚有珍竒親兵數百人在珍奇宅内石既剋城意益驕怠置酒嬉戲無警防之虞羲謂石曰觀珍竒甚有不平之色可嚴兵設備以待非常其夜珍奇果使人燒府廂屋欲因救火作難以石有備乃止眀旦羲齎白虎幡慰郭邑衆心乃定眀年春又引軍東討汝隂劉彧汝隂太守張超城守不下石率精銳攻之不克遂退至陳項議欲還軍長社待秋擊之諸將心樂早還咸稱善計羲曰今張超驅市負檐石蟻聚窮城命不延月宜安心守之超食已盡不降當走可翹足而待成擒物也而欲棄還長社道塗懸逺超必修城深壍多積薪穀將來恐難圖矣石不納遂旋師長社至冬復往攻超超果設備無功而還歴年超死楊}
  - {type: page-break, offset: 10, content: '', id: KR2a0020_WYG_056-2a, image: WYG0261/WYG0261-0757a.png}
  - {type: page-break, offset: 10, content: '', id: KR2a0020_WYG_056-2b, image: WYG0261/WYG0261-0757b.png}
