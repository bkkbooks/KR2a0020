  - {type: variant, offset: 5114, length: 1047, content: 宣告稱朕意焉涇州民張羌郎扇惑隴東聚衆千餘人州軍討之不能制羅漢率步騎一千擊羌郎擒之仇池氐羌叛逆遂甚所在蜂起道路斷絕其賊帥蛩廉符祈等皆受劉昱官爵鐵券略陽公伏阿奴為都將與羅漢赴討所在破之生擒廉祈等秦益阻遠南連仇池西接赤水諸羌恃險數為叛逆自羅漢莅州撫以威惠西戎懷德土境帖然高祖詔羅漢曰朕總攝萬幾統臨四海思隆古道光顯風教故內委羣司外任方牧正是志士建節之秋忠臣立功之會然赤水羌民遠居邊土非卿善誘何以招輯卿所得口馬表求貢奉朕嘉乃誠便敕領納其馬印付都牧口以賜卿徵拜內都大官聽訟察獄多得其情太和六年卒於官高祖深悼惜之賜命服一襲贈以本官諡曰莊公長子興祖襲爵山陽公後例降為侯景明元年卒興祖弟伯慶為中散咸陽王禧郎中令伯慶弟世興校書郎羅漢弟大檀為中散農太守大檀弟豹子東萊鎮將後改鎮為州行光州事豹子弟七寶侍御中散遷少卿出為假節龍驤將軍東雍州刺史孔伯恭魏郡鄴人也父昭始光初以密皇后親賜爵汝陰侯加安東將軍徙爵魏縣侯遷安南將軍昭性柔曠有才用出為趙郡太守治有能名徵拜光祿大夫轉中都大官善察獄訟明於政刑遷侍中鎮東將軍幽州刺史進爵魯郡公和平二年卒諡曰康公長子羅漢東宮洗馬次伯恭以父任拜給事中後賜爵濟陽男加鷹揚將軍出為安南將軍濟州刺史進爵城陽公入為散騎常侍顯祖初劉彧徐州刺史薛安都以彭城內附彧遣將張永沈攸之等擊安都安都上表請援顯祖進伯恭號鎮東將軍副尚書尉元救之軍次于秺賊將周凱聞伯恭等軍至棄衆遁走張永仍屯下磕永輜重在武原伯恭等攻而克之永計無所出引師而退時皇興元年正月天大寒雪泗水冰合永與攸之棄船而走伯恭等進擊首虜及凍死甚衆八月伯恭以書喻下邳宿豫城內曰劉彧肆逆滔天弗鑒靈命猶謂絕而復興長江可恃敢遣張永周凱等率此蟻衆送死彭城大軍未臨逆首奔潰今乘機電舉當屠此城遂平吳會弔民伐罪幸時歸款自求多福時攸之吳憘公等率衆數萬來援下邳屯軍焦墟曲去下邳五十餘里伯恭遣子都將侯汾等率騎五百在水南奚升等五百餘騎在水北南北邀之伯恭密造火車攻具欲水陸俱進攸之等既聞將戰引軍退保樊階城伯恭又令子都將孫天慶等步騎六千向零中峽斫木斷清水路劉彧寧朔將軍陳顯達領衆二千溯清而上以迎攸之屯于睢清合口伯恭率衆渡水大破顯達軍俘斬十九攸之聞顯達軍敗順流退下伯恭部分諸將俠清南北尋攸之軍後伯恭從睢陵城東向零中峽分軍為二道遣司馬范師子等在清南伯恭從清西與攸之合戰遂大破之斬其將姜產之高遵世及丘幼弼丘隆先沈榮宗陸道景等首攸之憘公等輕騎遁走乘勝追奔八十餘里軍資器械虜獲萬計進攻宿豫劉彧戍將魯僧遵棄城夜遁又遣將孔太等領募騎一千南討淮陽彧太守崔武仲焚城南走遂據淮陽二年以伯恭為散騎常侍都督徐南兗, WYG: 三}
