  - {type: variant, offset: 2291, length: 979, content: 淮陽王諡曰襄賜命服一襲子道明襲爵道明第八弟喜高宗以其名臣子擢為侍御中散遷侍御長高祖初吐谷渾拾寅部落飢窘侵掠澆河大為民患詔假喜平西將軍廣川公領涼州枹罕高平諸軍與上黨王長孫觀討拾寅又拜為使持節侍中都督秦雍荊梁益五州諸軍事本將軍開府仇池鎮將假公如故以其父豹子昔鎮仇池有威信故也喜至申恩布惠夷民大悅酋帥強奴子等各率戶歸附於是置廣業固道二郡以居之徵為南部尚書賜爵南康侯加左將軍太和元年劉準葭蘆戍主楊文度遣弟鼠竊據仇池詔喜率衆四萬討鼠軍到建安鼠棄城南走進次濁水遣平西將軍楊靈珍擊文度所置仇池太守楊真真衆潰僅而得免喜遂軍於覆津文度將強大黑固守津道懸崖險絕偏閣單行喜部分將士攀崖涉水衝擊大黑大黑潰走追奔西入攻葭蘆城拔之斬文度傳首京師殺一千餘人詔曰夫忠臣生於德義之門智勇出於將相之族往年氐羌放命侵竊邊戍都將皮喜梁醜奴等或資父舊勳或身建殊效威名著於庸漢公義列於天府故授以節鉞委閫外之任並罄力盡銳克荷所司霜戈始動蟻賊奔散仇池旋復民夷晏安及討葭蘆又梟凶醜元惡俱殲闚永息朕甚嘉之其所陳計略商校利害料其應否寧邊益國專之可也今軍威既振羣愚懾服革弊崇新有易因之勢寬猛之宜任其量處應立郡縣者亦聽銓置其楊文度楊鼠親屬家累部送赴臺仇池南秦之根本守禦資儲特須豐積險阻之要尤宜守防令奸覘之徒絕其僥倖勉勤戎務綏靜新俗懷民安土稱朕意焉又詔喜等曰卿受命專征薄伐邊寇軍威所及即皆平蕩復仇池之舊鎮破葭蘆之新邦梟擒首逆克剪凶黨勳庸之美朕無間然仇池國之要蕃防守事宜尤須完實從前以來駱谷置鎮是以姦賊息闚之心邊城無危敗之禍近由徙就建安致有往年之役前敕卿等部率兵將駱谷築城雖有一時之勤終致永延之固而卿等不祗詔命至于今日徒使兵人稽頓無事閑停方復曲辭表求罷下豈是良將忘身憂國盡忠之謂也諸州之兵已復一歲宜暫戮力成此要功卿等表求來年築城豈不更勞兵將孰若因今兵勢即令就之一勞永逸事不再舉也今更給軍糧一月速於駱谷築城使四月盡必令成就訖若不時營築乃築而不成成而不固以軍法從事南天水郡民柳旃據險不順喜率衆討滅之轉散騎常侍安南將軍豫州刺史詔讓其在州寬怠以飲酒廢事威不禁下遣使者就州決以杖罰七年卒贈以本官諡曰恭公子承宗襲爵喜弟雙仁冠軍將軍仇池鎮將封敕文代人也祖豆皇始初領衆三萬東征幽州平定三郡拜幽州刺史後為使持節都督冀青二州諸軍事前將軍開府冀青二州刺史關內侯父涅太宗時為侍御長卒贈龍驤將軍定州刺史章武侯諡曰隱敕文始光初為中散稍遷西部尚書出為, WYG: ''}
