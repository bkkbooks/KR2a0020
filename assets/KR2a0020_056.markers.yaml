  - {type: variant, offset: 645, length: 0, content: '', WYG: 都督襄廣二州諸軍事鎮南將軍刺史如故進爵郡公増邑一千三百戸尋轉征西将軍東雍州刺史假車騎将軍當州都督常侍如故未之任又轉都督二豫東雍三州諸軍事征東将軍豫州刺史餘官如故又兼尚書右僕射二豫郢潁四州行臺尋除車騎将軍左衞将軍及尒朱榮死徐州刺史尒朱仲逺擁兵向洛前至東郡諸軍出討不能制之乃詔先護以}
