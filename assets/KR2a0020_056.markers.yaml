  - {type: variant, offset: 111, length: 0, content: '', WYG: 書學生遷祕書郎拜主文中散徙員外散騎侍郎祕書丞兼中書侍郎從征沔漢高祖饗侍臣於懸瓠方丈竹堂道昭與兄懿俱侍坐焉樂作酒酣高祖乃歌曰白日光天兮無不曜江左一隅獨未照彭城王勰續歌曰願從聖明兮登衡㑹萬國馳誠混内外鄭懿歌曰雲雷大振兮天門闢率土來賓一正歴邢巒歌曰舜舞干戚兮天下歸文徳逺被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合高祖又歌曰遵彼汝墳兮昔化貞未若今日道風明宋弁歌曰文王政教兮暉江沼寧如大化光四表高祖謂道昭曰自比遷務雖猥與諸才儁不廢詠綴遂命邢巒總集叙記當爾之年卿頻丁艱禍每眷文席常用慨然尋正除中書郎轉通直散騎常侍北海王詳為司徒以道昭與琅邪王秉為諮議參}
  - {type: page-break, offset: 111, content: '', id: KR2a0020_WYG_056-5a, image: WYG0261/WYG0261-0758c.png}
