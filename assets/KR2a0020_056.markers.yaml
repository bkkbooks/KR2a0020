  - {type: variant, offset: 135, length: 0, content: '', WYG: 守小白中書博士子允伯有當世器幹自中書博士遷侍郎轉司空長史高祖納其女為嬪出為建威将軍東徐州刺史轉廣陵王征東府長史帶齊郡内史卒於鴻臚少卿諡曰簡子希儁未官而亡子道育武定中開封太守希儁弟幼儒好學修謹時望甚優丞相高陽王雍以女妻之歴尚書郎通直郎司州别駕有當官之稱卒贈散騎常侍安東将軍兗州刺史諡景幼儒亡後妻淫蕩兇悖肆行無禮子敬道敬徳並亦不才俱走於關右幼儒從兄伯猷每謂所親曰從弟人才足為令徳不幸得如此婦今死復重死可為悲嘆允伯弟平城太尉諮議廣陵王羽納其女為妃出為東平原太守性清狂使酒為政貪殘卒贈征虜将軍南青州刺史長子伯猷博學有文才早知名舉司州秀才以射策高第除幽州平北府外兵參軍轉太學博士領殿中御史與當時名勝咸申逰款肅}
