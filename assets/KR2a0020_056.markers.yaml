  - {type: variant, offset: 4878, length: 235, content: 中外軍事出為鎮西將軍秦益二州刺史時仇池氐羌反攻逼駱谷鎮將吳保元走登百頃請援於羅漢羅漢帥步騎隨長孫觀掩擊氐羌大破之斬其渠帥賊衆退散詔羅漢曰卿以勞勤獲才能致用內總禁旅外臨方岳褒寵之隆可謂備矣自非盡節竭誠將何以垂名竹帛仇池接近邊境兵革屢興既勞士卒亦動民庶皆由鎮將不明綏禁不理之所致也卿應機赴擊殄此兇醜隴右土險民亦剛悍若不導之以德齊之以刑寇賊莫由可息百姓無以得靜朕垂心治道欲使遠近清穆卿可召集豪右擇其事宜以利民為先益國為本隨其風俗以施威惠其有安土樂業奉公勤私者善加勸督無奪時利明, WYG: 冀定}
