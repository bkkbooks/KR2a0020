  - {type: variant, offset: 940, length: 2, content: 賜爵, WYG: 光禄大夫兼尚書北道行臺尋轉軍司未幾分定相二州四郡置殷州以楷為刺史加後将軍楷至州表曰竊惟殷州地實四衝居當五裂西通長山東漸巨野頃國路康寜四方有截仍聚姦宄桴鼓時鳴況今天長喪亂妖災間起定州逆虜趑趣北界鄴下兇燼蠶噬腹心兩處犬羊勢足并合城下之戰匪暮斯朝臣以不武屬此屏捍實思効力以弱敵彊析骸煮弩固此忠節但基趾造創庶事茫然升儲尺刃聊自未有雖欲竭誠莫知攸濟謹列所須兵仗請垂矜許必當虎視一方遏其侵軼肅清境内保全所委詔付外量竟無所給葛榮自破章武廣陽二王之後鋒不可當初楷将之州人咸勸留家口單身述職楷曰貪人之祿憂人之事如一身獨往朝廷謂吾有進退之計将士又誰肯為人固志也遂合家赴州三年春賊勢已逼或勸減小弱以避之乃遣第四女第三兒夜出既而召寮屬共論之咸曰女郎出嫁之女郎君小未勝兵留之無益去復何損且使君在城家口尚多足固将士之意竊不足為疑楷曰國家豈不知城小力弱也置吾死地令吾死耳一朝送免兒女将謂吾心不固虧忠全愛臧獲恥之況吾荷國重寄也遂命追還州既}
