  - {type: variant, offset: 864, length: 4, content: 輕徭寬賦, krp: 子士䕶模弟楷字季則羙風望性剛梗有當世幹具釋褐奉朝請員外散騎侍郎廣平王懐文學正始中以王國官非其人多被刑戮惟楷與楊昱以數諌獲免後為尚書左主客郎中伏波将軍太子中舍人左中郎将以黨附高肇為中尉所劾事在高聦傳楷性嚴烈能摧挫豪彊故時人語曰莫􅰑都買反獬孤楷反付崔楷於時冀定數州頻遭水害楷上疏曰臣聞有國有家者莫不以萬姓為心故矜傷軫於造次求瘼結於寢興黎民阻飢唐堯致歎衆庶斯饉帝乙罰已良以為政與農實繫民命水旱緣兹以得濟夷險用此而獲安頃東北數州頻年淫雨長河激浪洪波汨流川陸連濤原隰通望彌漫不已汎濫為災戸無擔石之儲家有藜藿之色華壤膏腴變為舄鹵菽麥禾黍化作雚蒲斯用痛心徘徊澘然佇立也昔洪水為害四載流於夏書九土既平攸同紀自虞誥亮由君之勤恤臣用劬勞日昃忘餐宵分廢寝伏惟皇魏握圖臨宇惣契裁極道敷九有徳被八荒槐階棘路實維英哲虎門麟閣實曰賢明天地函和日月光曜自比定冀水潦無歲不飢幽瀛川河頻年汎溢豈是陽九厄㑹}
