  - {type: variant, offset: 3641, length: 1235, content: 那羅稱纂集衆旅剋期助會又仇池城民李洪自稱應王天授玉璽擅作符書誑惑百姓梁會遣使招引楊文德而文德遣權壽胡將兵二十人來到會間扇動州土云李洪自稱應王兩雄不並若欲須我先殺李洪我當自往梁會欲引致文德誘說李洪來入東城即斬洪首送與文德仇池鎮將淮陽公臣豹子遣使潛行以今月二十四日來達臣鎮稱楊文德受劉義隆職爵領兵聚衆在仇池境中沮動民人規竊城鎮且梁會反逆以來南勾文德援勢相連武都氐羌盡相脣齒為文德起軍所在屯結兵衆已集剋來不遠臣備邊鎮與賊相持賊在東城隔牆而已但以腹背有敵攻城有疑討度文德剋來助會若文德既至百姓響應賊黨遂甚用功益難今文德未到麥復未熟事宜速擊於時為便伏願天鑒時遣大軍助臣誅翦表未及報梁會謀欲逃遁先是敕文掘重於東城之外斷賊走路夜中會乃車陳飛梯騰而走敕文先嚴兵於外拒鬬從夜至旦敕文謀於衆曰困獸猶鬬而況於人賊衆知無生路人自致死必傷士衆未易可平若開其生路賊必上下離心克之易矣衆咸以為然初敕文以白虎幡宣告賊衆曰若能歸降原其生命應時降者六百餘人會知人心沮壞於是分遁敕文縱騎躡之死者太半俘獲四千五百餘口略陽王元達因梁會之亂聚衆攻城招引休官屠各之衆推天水休官王官興為秦地王敕文與臨淮公莫真討之軍次略陽敕文遣使慰喻而元達等三千餘人屯於松多川乃部分諸軍三道並攻賊出營拒戰大破之俘三千人高宗時與新平公周盆擊劉駿將殷孝祖於清東不克天安元年五月卒長子萬護讓爵於弟翰於時讓者惟萬護及元氏侯趙辟惡子元伯讓其弟次興朝廷義而許之翰族孫靜世宗時歷位征虜將軍武衞將軍太子左衞率以幹用稱延昌中遷平北將軍州刺史臨朐子後坐事免卒子熙奉朝請遷員外散騎侍郎給事中與薛曇尚迎蠕蠕主婆羅門於涼州又除鎮遠將軍河陰令卒贈輔國將軍朔州刺史子纘武定末潁川太守呂羅漢本東平壽張人其先石勒時徙居幽州祖顯字子明少好學性廉直鄉人有分爭者皆就而質焉慕容垂以為河間太守皇始初以郡來降太祖嘉之賜爵魏昌男拜鉅鹿太守清身奉公務存贍卹妻子不免飢寒民頌之曰時惟府君克己清明緝我荒土民胥樂生願壽無疆以享長齡卒官父溫字晞陽善書好施有文武才略世祖伐赫連昌以溫為幢將先登陷陳每戰必捷以功拜宣威將軍奉車都尉出為秦州司馬遷上黨太守善勸課有治名卒贈平遠將軍豫州刺史野王侯諡曰敬羅漢仁篤慎密弱冠以武幹知名父溫之佐秦州羅漢隨侍隴右氐楊難當率衆數萬寇上邽秦民多應之鎮將元意頭知羅漢善射共登西城樓令羅漢射難當隊將及兵二十三人應弦而殪賊衆轉盛羅漢進計曰今若不出戰示敵以弱衆情攜貳大事去矣意頭善之即簡千餘騎令羅漢出戰羅漢與諸騎策馬大呼直衝難當軍衆皆披靡殺難當左右隊騎八人難當大驚會世祖賜難當璽書責其跋扈難當乃引還仇池意頭具以狀聞世祖嘉之徵為羽林中郎上邽休官呂豐屠各王飛廉等八千餘家據險為逆詔羅漢率騎一千討擒之從征懸瓠羅漢與琅邪王司馬楚之駕前招慰降者九千餘戶比至盱眙頻破賊軍擒其將顧儼李觀之等以功遷羽林中郎幢將賜爵烏程子加建威將軍及南安王余立羅漢猶典宿衞高宗之立羅漢有力焉遷少卿仍幢將進爵野王侯加龍驤將軍拜司衞監遷散騎常侍殿中尚書進爵山陽公加鎮西將軍及蠕蠕犯塞顯祖討之羅漢與右僕射南平公元目振, WYG: ''}
