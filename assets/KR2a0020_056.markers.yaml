  - {type: variant, offset: 36, length: 0, content: '', WYG: 田智度年十五妖惑動衆擾亂京索以羲河南民望為州郡所信遣羲乗傳慰諭羲到宣示禍福重加募賞旬日之間衆皆歸散智度奔潁川尋見擒斬以功賜爵平昌男加鷹揚将軍高祖初兼員外散騎常侍假寧朔将軍陽武子使於劉準中山王叡寵幸當世並置王官羲為其傅是後歴年不轉資産亦乏因請假歸遂盤桓不返及李沖貴寵與羲姻好乃就家徵為中書令文眀太后為父燕宣王立廟於長安初成以羲兼太常卿假滎陽侯具官屬詣長安拜廟刋石建碑於廟門還以使功仍賜侯爵加給事中出為安東将軍西兗州刺史假南陽公羲多所受納政以賄成性又嗇吝民有禮餉者皆不與杯酒臠肉西門受羊酒東門酤賣之以李沖之親法官不之紏}
  - {type: page-break, offset: 36, content: '', id: KR2a0020_WYG_056-3a, image: WYG0261/WYG0261-0757c.png}
  - {type: variant, offset: 36, length: 0, content: '', krp: 田智度年十五妖惑動衆擾亂京索以羲河南民望為州郡所信遣羲乗傳慰諭羲到宣示禍福重加募賞旬日之間衆皆歸散智度奔潁川尋見擒斬以功賜爵平昌男加鷹揚将軍高祖初兼員外散騎常侍假寧朔将軍陽武子使於劉準中山王叡寵幸當世並置王官羲為其傅是後歴年不轉資産亦乏因請假歸遂盤桓不返及李沖貴寵與羲姻好乃就家徵為中書令文眀太后為父燕宣王立廟於長安初成以羲兼太常卿假滎陽侯具官屬詣長安拜廟刋石建碑於廟門還以使功仍賜侯爵加給事中出為安東将軍西兗州刺史假南陽公羲多所受納政以賄成性又嗇吝民有禮餉者皆不與杯酒臠肉西門受羊酒東門酤賣之以李沖之親法官不之紏}
