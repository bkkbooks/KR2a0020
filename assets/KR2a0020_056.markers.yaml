  - {type: variant, offset: 977, length: 1313, content: 安西將軍開府儀同三司進爵淮陽公鎮長安尋加征西將軍後坐盜官財徙於統萬真君三年劉義隆遣將裴方明等侵南秦王楊難當遂陷仇池世祖徵豹子復其爵位尋拜使持節仇池鎮將督關中諸軍與建興公古弼等分命諸將十道並進四年正月豹子進擊樂鄉大破之擒義隆將王奐之王長卿等六人斬首三千餘級俘獲二千人豹子進軍下辨義隆將強玄明辛伯奮棄城遁走追斬之悉獲其衆義隆使其秦州刺史胡崇之鎮仇池至漢中聞官軍已西懼不敢進方明益其兵而遣之豹子與司馬楚之至於濁水擊擒崇之盡虜其衆進至高平義隆將姜道祖降仇池平未幾諸氐復反推楊文德為主以圍仇池古弼率諸軍討平之時豹子次于下辨聞圍解欲還弼遣使謂豹子曰賊其負敗必求報復後舉為難不如陳兵以待之豹子以為然尋除都督秦雍荊梁益五州諸軍事進號征西大將軍開府仇池鎮將持節公如故十一月義隆復遣楊文德姜道盛率衆二萬人寇濁水別遣將青陽顯伯守斧山以拒豹子濁水城兵射殺道盛豹子至斧山斬顯伯悉俘其衆豹子又與河間公元齊俱會于濁水賊衆震恐棄其兵甲夜遁初南秦王楊難當歸命詔送楊氏子弟詣京師文德以行賂得留亡奔漢中義隆以文德為武都王給兵二千人守葭蘆城招誘氐羌於是武都陰平五部氐民叛應文德詔豹子率諸軍討之文德阻兵固險拒豹子文德將楊高來降引諸軍向其城文德棄城南走收其妻子僚屬軍資及故武都王保宗妻公主送京師義隆白水太守郭啟玄率衆救文德豹子分軍逆擊大破之啟玄文德走還漢中興安二年正月義隆遣其將蕭道成王虬馬光等入漢中別令楊文德楊頭等率諸氐羌圍武都城中拒之殺賊二百餘人豹子分兵將救之至女磊聞賊停軍豹子遣人於祁山取馬欲往赴援文德謂豹子欲斷其糧運回軍還入覆津據險自固義隆恐其輒回又增兵益將令晉壽白水送糧覆津漢川武興運粟甘泉皆置倉儲豹子表曰義隆增兵運糧剋必送死臣所領之衆本自不多唯仰民兵專恃防固其統萬安定二鎮之衆從戎以來經三四歲長安之兵役過期月未有代期衣糧俱盡形顏枯悴窘切戀家逃亡不已既臨寇難不任攻戰士民姦通知臣兵弱南引文德共為脣齒計文德去年八月與義隆梁州刺史劉秀之同征長安聞臺遣大軍勢援雲集長安地平用馬為便畏國騎軍不敢北出但承仇池局人稱臺軍不多戍兵尠少諸州雜人各有還思軍勢若及必自奔逃進軍取城有易返掌承信其語回趣長安之兵遣文德蕭道成王虬等將領來攻武都仇池望連秦隴進圍武都已經積日畏臣截後斷其糧路關鎮少兵未有大損今外寇兵強臣力寡弱拒賊備敵非兵不擬乞選壯兵增戍武都牢城自守可以無患今事已切急若不馳聞損失城鎮恐招深責願遣高平突騎二千賫糧一月速赴仇池且可抑折逆民支對賊虜須長闕上邽安定戍兵至可得自全糧者民之命也雖有金城湯池無糧不守仇池本無儲積今歲不收苦高平騎至不知云何以得供援請遣秦州之民送軍祁山臣隨迎致詔高平鎮將苟莫于率突騎二千以赴之道成等乃退徵豹子為尚書出為內都大官劉駿遣其將殷孝祖修兩當城於清東以逼南境天水公封敕文擊之不克詔豹子與給事中周丘等助擊之豹子以南寇城守攻圍費日遂略地至高平劉駿瑕丘鎮遣步卒五千助戍兩當去城八里與豹子前鋒候騎相遇即便交戰豹子軍繼至大破之縱騎追擊殺之至於城下其免者十餘人而已城內恐懼不敢出救既而班師先是河西諸胡亡匿避命豹子及前涇州刺史封阿君督河西諸軍南趣石樓與衞大將軍樂安王良以討羣胡豹子等與賊相對不覺胡走無捷而還又坐免官尋以前後戰功復擢為內都大官和平五年六月卒高宗追惜之, WYG: 朝野傷歎焉}
