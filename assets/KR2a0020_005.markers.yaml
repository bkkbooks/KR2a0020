  - {type: variant, offset: 3346, length: 653, content: 月車駕還宮六月西征諸將扶風公元處真等八將坐盜沒軍資所在虜掠贓各千萬計並斬之八月衞大將軍樂安王範薨冬十月侍中中書監宜都王穆壽薨十二月鄯善遮逸國並遣子朝獻晉王伏羅薨九年春正月劉義隆遣使朝貢氐楊文德受義隆官號守葭蘆城招誘武都陰平五部氐民詔仇池鎮將皮豹子討之文德棄城南走擒其妻子僚屬義隆白水太守郎啟玄率衆救文德豹子逆擊大破之啟玄文德走還漢中宕昌羌酋梁瑾慈遣使內附并貢方物二月癸卯行幸定州山東民飢啟倉賑之罷塞圍作遂西幸上黨誅潞叛民二千餘家徙西河離石民五千餘家于京師詔於壺關東北大王山累石為三封又斬其北鳳皇山南足以斷之三月車駕還宮夏五月甲戌以交趾公韓拔為假節征西將軍領護西戎校尉鄯善王鎮鄯善賦役其民比之郡縣六月辛酉行幸廣德宮丁卯悅般國遣使求與王師俱討蠕蠕帝許之秋八月詔中外諸軍戒嚴九月乙酉治兵于西郊丙戌上幸陰山是月成周公萬度歸千里驛上大破焉耆國其王鳩尸卑那奔龜茲冬十月辛丑農王奚斤薨癸卯以婚姻奢靡喪葬過度詔有司更為科限癸亥大赦天下十有二月詔成周公萬度歸自焉耆西討龜茲皇太子朝于行宮遂從北討至于受降城不見蠕蠕因積糧城內留守而還北平王長孫敦坐事降爵為公十年春正月戊辰朔帝在漠南大饗百僚班賜有差甲戌北伐二月蠕蠕渠帥尒綿他拔等率其部落千餘家來降蠕蠕吐賀真恐懼遠遁事具蠕蠕傳三月遂蒐于河西庚寅車駕還宮夏五月庚寅行幸陰山秋七月浮圖沙國遣使貢獻九月閱武磧上遂北伐事具蠕蠕傳冬十月庚子皇太子及羣官奉迎於行宮壬午大饗班賜所獲及布帛各有差十有一月龜茲疏勒破洛那員闊諸國各遣使朝獻十有二月戊申車駕至自北伐己酉以平昌公元託真為中山王十一年春正, WYG: ''}
