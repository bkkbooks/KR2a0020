  - {type: variant, offset: 4693, length: 1, content: 會, WYG: 赦改元庚午詔散騎常侍馮闡使於劉駿二月衛將軍樂安王良督東雍吐京六壁諸軍西趣河西征西將軍皮豹子等督河西諸軍南趨石樓以討河西叛胡夏四月戊戌皇太后常氏崩於壽安宫五月癸酉葬昭太后於廣寗鳴鷄山六月甲午詔征西大將軍陽平王新成等督統萬髙平諸軍出南道南郡公李惠等督涼州諸軍出北道討吐谷渾什寅崔浩之誅也史官遂廢至是復置河西叛胡詣長安首罪遣使者安慰之秋七月乙丑劉駿遣使朝貢壬午行幸河西八月西征諸軍至西平什寅走保南山九月諸軍濟河追之遇瘴氣多有疫疾乃引軍還獲畜二十餘萬庚午輿駕還宫冬十月居常王獻馴象三十有一月詔散騎侍郎盧度世員外郎朱安興使於劉駿二年春正月乙酉詔曰刺史牧民爲萬里之表自頃每因發調逼民假貸大商富賈要射時利旬日之間增贏十倍上下通同分以潤屋故編戸之家困於凍餒豪富之門日有兼積爲政之弊莫過於此其一切禁絶犯者十疋以上皆死布告天下咸令知禁二月辛卯行幸中山丙午至於鄴遂幸信都三月劉駿遣使朝貢輿駕所過皆親對髙年問民疾苦詔民年八十以上一子不從役靈丘南有山髙四百餘丈乃詔}
