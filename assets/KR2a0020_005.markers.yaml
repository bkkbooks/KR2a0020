  - {type: variant, offset: 4165, length: 190, content: 買得棄州走斌之遂入城仍使寧朔將軍王玄謨西攻滑臺詔枋頭鎮將平南將軍南康公杜道儁助守兗州八月癸亥田於河西癸未治兵於西郊九月辛卯輿駕南伐癸巳皇太子北伐屯于漠南吳王余留守京都庚子曲赦定冀相三州死罪已下發州郡兵五萬分給諸軍冬十月癸亥車駕止枋頭詔殿中尚書長孫真率騎五千自石濟渡備玄謨遁走乙丑車駕濟河玄謨大懼棄軍而走衆各潰散追躡斬首萬餘級器械山積帝遂至東平蕭斌之棄濟州退保歷城乃命諸將分道並進使, WYG: 閭若文}
