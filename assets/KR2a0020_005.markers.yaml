  - {type: variant, offset: 4586, length: 2, content: 歷陽, WYG: 今有穿毁墳壠者斬之劉駿將殷孝祖脩兩城於清水東詔鎮西將軍天水公封勑文等擊之辛卯車駕次于車輪山累石記行征西將軍皮豹子等三將三萬騎助擊孝祖車駕度漠蠕蠕絶跡逺遁其别部烏朱賀頽庫世頽率衆來降十有二月征東將軍中山王託眞薨五年春正月己巳朔征西將軍皮豹子略地}
