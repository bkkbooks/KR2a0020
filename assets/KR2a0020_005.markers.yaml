  - {type: variant, offset: 5161, length: 546, content: 月劉義隆將和之寇濟州梁坦及魯安生軍于京索龐萌薛安都寇弘農秋七月征南將軍安定公韓元興討之和之退梁坦安生亦走八月冠軍將軍封禮率騎二千從浢津南渡赴弘農九月司空高平公兒烏干屯潼關平南將軍昌黎公元遼屯河內冬十月丙午朔余為宗愛所賊殿中尚書長孫渴侯與尚書陸麗迎立皇孫是為高宗焉帝生不逮密太后及有所識言則悲慟哀感傍人太宗聞而嘉歎暨太宗不豫衣不釋帶性清儉率素服御飲膳取給而已不好珍麗食不二味所幸昭儀貴人衣無兼綵羣臣白帝更峻京邑城隍以從周易設險之義又陳蕭何壯麗之說帝曰古人有言在德不在險屈丐蒸土築城而朕滅之豈在城也今天下未平方須民力土功之事朕所未為蕭何之對非雅言也每以財者軍國之本無所輕費至賞賜皆是死事勳績之家親戚受寵未曾橫有所及臨敵常與士卒同在矢石之間左右死傷者相繼而帝神色自若是以人思効命所向無前命將出師指授節度從命者無不制勝違爽者率多敗失性又知人拔士於卒伍之中惟其才效所長不論本末兼甚嚴斷明於刑賞功者賞不遺賊罪者刑不避親雖寵愛之終不虧法常曰法者朕與天下共之何敢輕也故大臣犯法無所寬假雅長聽察瞬息之間下人無以措其姦隱然果於誅戮後多悔之司徒崔浩既死之後帝北伐時宣城公李孝伯疾篤傳者以為卒也帝聞而悼之謂左右曰李宣城可惜又曰朕向失言崔司徒可惜李宣城可哀褒貶雅意皆此類也恭宗景穆皇帝諱晃太武皇帝之長子也母賀夫人延和元, WYG: ''}
