  - {type: variant, offset: 4938, length: 0, content: '', WYG: 以定相二州霣霜殺稼免民田租是月詔員外散騎常侍游明根驍騎將軍昌邑子婁内近寧朔將軍襄平子李五鱗使于劉駿十有二月辛丑詔曰名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可爲之條格使貴賤有章上下咸序著之于令壬寅詔曰夫㛰姻者人道之始是以夫婦之義三綱之首禮之重者莫過於斯尊卑髙下宜令區别然中代以來貴族之門多不率法或貪利財賄或因緣私好在於茍合無所選擇令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓爲㛰犯者加罪五年春正月丁亥封皇弟雲爲任城王二月詔以州鎮十四去歲蟲水開倉賑恤夏四月癸卯頓丘公李峻進爵爲王閏月戊子帝以旱故減膳責躬是夜㴻雨大降五月}
