  - {type: variant, offset: 4584, length: 0, content: '', WYG: 文虎龍率千餘家内附十有二月以州鎭五蝗民饑使使者開倉以賑之是月于闐扶餘等五十餘國各遣使朝獻四年春正月丙午朔初設酒禁乙卯行幸廣寗溫泉宮遂東廵平州庚午至於遼西黄山宫遊宴數日親對高年勞問疾苦二月丙子登碣石山觀滄海大饗羣臣於山下班賞進爵各有差改碣石山爲樂遊山築壇記行於海濵戊寅南幸信都畋遊於廣川三月丁未觀馬射於中山所過郡國賜復一年丙辰車駕還宫起太華殿乙丑東平王陸俟薨夏五月壬戌詔曰朕卽阼至今屢下寛大之㫖蠲除煩苛去諸不急欲令物獲其所人安其業而牧守百里不能宣揚恩意求欲無厭斷截官物以入於已使課調懸少而深文極墨委罪於民茍求免咎曾不改懼國家之制賦役乃輕比年已來雜調減省而所在州郡咸有逋懸非在職之官綏導失所貪穢過度誰使之然自今常調不充民不安業宰民之徒加以死罪申告天下稱朕意焉六月丙申畋於松山秋七月庚午行幸河西九月乙巳還宫辛亥太華殿成丙寅饗羣臣大赦天下冬十月甲戌北廵至隂山有故塚毁廢詔曰昔姬文葬枯骨天下歸}
