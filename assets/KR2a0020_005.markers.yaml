  - {type: variant, offset: 922, length: 2422, content: 貢夏四月武都王楊保宗謀反諸將擒送京師諸氐羌復推保宗弟文德為主圍仇池丁酉大赦天下己亥行幸陰山五月將軍古弼大破諸氐解仇池圍六月庚寅詔曰朕承天子民憂理萬國欲令百姓家給人足興於禮義而牧守令宰不能助朕宣揚恩德勤恤民隱至乃侵奪其產加以殘虐非所以為治也今復民貲賦三年其田租歲輸如常牧守之徒各厲精為治勸課農桑不聽妄有徵發有司彈糾勿有所縱癸巳大閱于西郊秋九月辛丑行幸漠南甲辰捨輜重以輕騎襲蠕蠕分軍為四道事具蠕蠕傳鎮北將軍封沓亡入蠕蠕冬十一月將軍皮豹子等追破劉義隆將於濁水甲子車駕至於朔方詔曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除亂掃清不順二十年矣夫陰陽有往復四時有代謝授子任賢所以休息優隆功臣式圖長久蓋古今不易之令典也其令皇太子副理萬機總統百揆諸朕功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩以劇職更舉賢俊以備百官主者明為科制以稱朕心十二月辛卯車駕至自北伐五年春正月壬寅皇太子始總百揆侍中中書監宜都王穆壽司東郡公崔浩侍中廣平公張黎侍中建興公古弼輔太子以決庶政諸上書者皆稱臣上疏儀與表同戊申詔曰愚民無識信惑妖邪私養師巫挾藏讖記陰陽圖緯方伎之書又沙門之徒假西戎虛誕生致妖孽非所以壹齊政化布淳德於天下也自王公已下至於庶人有私養沙門師巫及金銀工巧之人在其家者皆遣詣官曹不得容匿限今年二月十五日過期不出師巫沙門身死主人門誅明相宣告咸使聞知庚戌詔曰自頃以來軍國多事未宣文教非所以整齊風俗示軌則於天下也今制自王公已下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅二月辛未中山王辰等八將以北伐後期斬于都南癸酉驃騎大將軍樂平王丕薨庚辰行幸廬闕三月戊戌大會于那南池遣使者四輩使西域甲辰車駕還宮癸丑詔征西大將軍司空上黨王長孫道生鎮統萬夏四月乙亥侍中太宰陽平王杜超為帳下所殺五月丁酉行幸陰山之北六月北部民殺立義將軍衡陽公莫孤率五千餘落北走追擊于漠南殺其渠帥餘徙居冀相定三州為營戶西平王吐谷渾慕利延殺其兄子緯代是月緯代弟叱力延等來奔乞師以叱力延為歸義王秋七月癸卯東雍州刺史沮渠秉謀叛伏誅八月乙丑田于河西壬午詔員外散騎常侍高濟使於劉義隆晉王伏羅督高平涼州諸軍討吐谷渾慕利延九月帝自河西至馬邑觀于崞川己亥車駕還宮丁未行幸漠南冬十月癸未晉王伏羅大破慕利延慕利延走奔白蘭慕利延從弟伏念長史鵴鳩梨部大崇娥等率其部一萬三千落內附十一月劉義隆遣使朝貢十二月粟特國遣使朝貢丙戌車駕還宮六年春正月辛亥車駕行幸定州引見長老存問之詔兼員外散騎常侍宋愔使劉義隆二月遂西幸上黨觀連理樹於泫氏西至吐京討徙叛胡出配郡縣三月庚申車駕還宮詔諸有疑獄皆付中書以經義量決是月酒泉公郝溫反於杏城殺守將王幡縣吏蓋鮮率宗族討溫溫棄城走自殺家屬伏誅夏四月庚戌征西大將軍高涼王那等討吐谷渾慕利延於陰平白蘭詔秦州刺史天水公封敕文擊慕利延兄子什歸於枹罕散騎常侍成周公萬度歸乘傳發涼州以西兵襲鄯善六月壬辰車駕北巡什歸聞軍將至棄城夜遁秋八月丁亥封敕文入枹罕分徙千家還上邽壬辰度歸以輕騎至鄯善執其王真達以詣京師帝大悅厚待之車駕幸陰山之北次于廣德宮詔發天下兵三分取一各當戒嚴以須後命徙諸種雜人五千餘家於北邊令民北徙畜牧至廣漠以餌蠕蠕壬寅高涼王那軍到曼頭城慕利延驅其部落西渡流沙那急追故西秦王慕璝世子被囊逆軍拒戰那擊破之被囊輕騎遁走中山公杜豐精騎追之度三危至雪山生擒被囊什歸及熾磐子成龍送于京師慕利延遂西入于闐國九月盧水胡蓋吳聚衆反於杏城冬十月戊子長安鎮副將元紇率衆討之為吳所殺吳黨遂盛民皆渡渭奔南山於是詔發高平敕勒騎赴長安詔將軍叔孫拔乘傳領攝并秦雍兵屯渭北十有一月高涼王那振旅還京師己未遣那及殿中尚書安定公韓茂率騎屯相州之陽平郡發冀州民造浮橋於碻磝津蓋吳遣其部落帥白廣平西掠新平安定諸夷酋皆聚衆應之殺汧城守將吳遂進軍李閏堡分兵掠臨晉巴東將軍章直與戰大敗之兵溺死於河者三萬餘人吳又遣兵西掠至長安將軍叔孫拔與戰於渭北大破之斬首三萬餘級庚申遼東王竇漏頭薨河東蜀薛永宗聚黨盜官馬數千匹驅三千餘人入汾曲西通蓋吳受其位號秦州刺史金城公周鹿觀率衆討之不克而還庚午詔殿中尚書扶風公元處真尚書平陽公慕容嵩二萬騎討薛永宗詔殿中尚書乙拔率五將三萬騎討蓋吳西平公寇提三將一萬騎討吳黨白廣平蓋吳自號天台王署置百官辛未車駕還宮選六州兵勇猛者二萬人使永昌王仁高涼王那分領為二道各一萬騎南略淮泗以北徙青徐之民以實河北癸未車駕西巡七年春正月戊辰車駕次東雍州庚午圍薛永宗營壘永宗出戰大敗六軍乘之永宗衆潰永宗男女無少長赴汾水死辛未車駕南幸汾陰庚辰帝臨戲水蓋吳退走北地二月丙戌幸長安存問父老丁亥幸昆明池丙申幸盩厔誅叛民耿青孫溫二壘與蓋吳通謀者軍次陳倉誅散關氐害守將者還幸雍城田於岐山之陽北道諸軍乙拔等大破蓋吳於杏城吳棄馬遁走永昌王仁至高平擒劉義隆將王章略金鄉方與遷其民五千家於河北高涼王那至濟南東平陵遷其民六千餘家於河北三月詔諸州坑沙門毀諸佛像徙長安城工巧二千家於京師車駕旋軫幸洛水分軍誅李閏叛羌是月金城邊冏天水梁會反據上邽東城秦州刺史封敕文擊之斬冏衆復推會為帥夏四月甲申車駕至自長安戊子鄴城毀五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽五月癸亥安豐公閭根率騎詣上邽與敕文討梁會會走漢中蓋吳復聚杏城自號秦地王假署山民衆旅復振於是遣永昌王仁高涼王那督北道諸軍同討之六月甲申發定冀相三州兵二萬人屯長安南山諸谷以防越逸丙戌發司幽定冀四州十萬人築畿上塞圍起上谷西至于河廣袤皆千里秋八月蓋吳為其下人所殺傳首京師永昌王仁平其遺燼高涼王那破蓋吳黨白廣平生擒屠各路那羅於安定斬于京師復略陽公羯兒王爵八年春正月吐京胡阻險為盜詔征東將軍武昌王提征南將軍淮南王他討之不下山胡曹僕渾等渡河西保山以自固招引朔方諸胡提等引軍討僕渾二月己卯高涼王那等自安定討平朔方胡因與提等合軍共攻僕渾斬之其衆赴險死者以萬數癸未行幸中山頒賜從官文武各有差高陽易縣民不從官命討平之徙其餘燼於北地三月河西王沮渠牧犍謀反伏誅徙定州丁零三千家於京師, WYG: 獻}
