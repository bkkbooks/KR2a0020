  - {type: variant, offset: 339, length: 2, content: 太祖, WYG: 本官常侍是第三清今授臣勇武其號至濁且文武又殊請更改授世宗曰今依勞行賞不問清濁卿何得乃復以清濁為辭亮曰聖明在上清濁故分臣既屬聖明是以敢啓世宗曰九流之内人咸君子雖文武號殊佐治一也卿何得獨欲乖衆妄相清濁所請未可但依前授亮曰今江左未賔書軌宜一方為陛下授命前驅拓定吳會官爵陛下之所輕賤命微臣之所重陛下方収所重何惜所輕世宗}
