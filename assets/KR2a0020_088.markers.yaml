  - {type: variant, offset: 316, length: 1, content: 輕, WYG: 日家無餘財太宗悼惜之贈征虜将軍幷州刺史平臯侯謚曰宣子純字道尚襲爵鎮逺将軍平臯子坐事爵除純弟代字定燕陳留北平二郡太守卒贈冠軍将軍營州刺史謚曰惠侯代所歴著清稱有父之遺風代子長年中書博士出為寜逺将軍汝南太守有郡民劉崇之兄弟分析家貧惟有一牛爭之不決訟於郡庭長年見之悽然曰汝曹當以一牛故致此競脱有二牛各應得一豈有訟理即以家牛一頭賜之於是郡境之中各相誡約咸敦敬讓太和初卒於家子琛字寳貴少有孝行歴武}
