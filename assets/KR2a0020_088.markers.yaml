  - {type: variant, offset: 329, length: 4, content: 官家復國, WYG: 與卿親宜假借吾未至之前一不相問今日}
  - {type: variant, offset: 329, length: 4, content: 官家復國, krp: 與卿親宜假借吾未至之前一不相問今日}
  - {type: variant, offset: 335, length: 3, content: 當念老, WYG: 終不相捨而逺慶行意自若世景繩之以法逺慶懼棄官亡走於是竂屬畏威莫不改肅終日坐於㕔事未嘗寢息縣史三正及諸細民至即見之無早晚之節來者無不盡其情抱皆假之恩顔屛人密語民間之事巨細必知發姦擿伏有若神明嘗有一吏休滿還郡食人雞豚又有一幹受人一帽又食二雞世景叱之曰汝何敢食甲乙雞豚取丙丁之帽吏幹叩頭伏罪於是上下震悚莫敢犯禁坐弟道璵事除名世景友于之性過絶於人及道璵死哭之哀切酸感行路形容毁悴見者莫不歎愍歳餘母喪遂不勝哀而卒世景嘗撰晉書竟未得就子季儒遺腹生弱冠太守崔楷辟為功曹起家太學博士明威將軍曽至譙宋之間為文弔嵇康甚有理致後夜寢室壊壓殞年二十五時人咸傷惜之路邕陽平清淵人世宗時積功勞除齊州東魏郡太守有惠政靈太后詔曰邕蒞政清勤善綏民俗比經年儉郡内饑饉羣庶嗷嗷將就溝壑而邕自出家粟賑賜貧窘民以獲濟雖古之良守何以尚兹宜見霑錫以垂奬勸可賜龍廐馬一匹衣一襲被褥一具班宣州鎮咸使聞知邕以善治民稍遷至南青州刺史而卒閻慶允不知何許人為東秦州敷城太守在政五年清勤厲俗頻年饑饉慶允歳常以家粟千石賑恤貧窮民賴以濟其部民楊寳龍等一千餘人申訟美政有司奏曰案慶允自蒞此郡惠政有聞又能自以已粟賑恤饑饉乃有子愛百姓之義如不少加優賚無以厲彼貪殘又案齊州東魏郡太守路邕在郡治能與之相埒語其分贍又亦不殊而聖㫖優隆賜以衣馬求情即理謂合同賞靈太后卒無襃賞焉明亮字文徳平原人性方厚有識幹自給事中歴員外常侍延昌中世宗臨朝堂親自黜陟授亮勇武将軍亮進曰}
