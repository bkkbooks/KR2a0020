  - {type: variant, offset: 4600, length: 0, content: '', krp: 欲殺令尹子南其子棄疾為王御士而上告焉對曰泄命重刑臣不為也王遂殺子南其徒曰行乎曰吾與殺吾父行将焉入曰臣乎曰殺父事讎吾不忍乃縊而死注云棄疾自謂不告父為與殺謂王為讎皆非禮春秋譏焉斯盖門外之治以義斷恩知君殺父而子不告是也母之於父同在門内恩無可掩義無斷割知母將殺理應告父如其已殺宜聽告官今母殺父而子不告便是知母而不知父識比野人義近禽獸且母之於父作合移天既殺已之天復殺子之天二天頓毁豈容頓黙此母之罪義不在赦下手之日母恩即離仍以母道不告鄙臣所以致惑今聖化淳洽穆如韶夏食椹懐音梟獍猶變况承風稟教識善知惡之民哉脱下愚不移事在言外如或有之可臨時議罪何用豫制斯條用為訓誡誠恐千載之下談者諠譁以明明大朝有尊母卑父之論以臣管見實所不取如在淳風厚俗必欲行之且君父一也父者子之天被殺事重宜附父謀反大逆子得告之條父一而已至情可見竊惟聖主有作明賢贊成光國寧民厥用為大非下走頑蔽所能上測但受恩深重輒獻瞽言儻蒙収察乞付評議詔付尚書三公郎封君義立判云身體髮膚受之父母生我勞悴續莫大焉子於父母同氣異息終天靡報在情一也今忽欲論其尊卑辨其優劣推心未忍訪古無據母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子将欲何之案春秋莊公元年不稱即位文姜出故服䖍註云文姜通兄齊襄與殺公而不反父殺母出隠痛深諱朞而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理且聖人設法所以防淫禁暴極言善惡使知而避之若臨事議刑則䧟罪多矣惡之甚者殺父害君著之律令百王罔革此制何嫌獨求削去既於法無違於事非害宣布有年謂不宜改瑗復難云}
  - {type: variant, offset: 4601, length: 0, content: '', WYG: 局判云子於父母同氣異息終天靡報在情一也今欲論其尊卑辨其優劣推心未忍訪古無據瑗}
  - {type: page-break, offset: 4601, content: '', id: KR2a0020_WYG_088-16a, image: WYG0262/WYG0262-0270a.png}
  - {type: variant, offset: 4601, length: 0, content: '', krp: 局判云子於父母同氣異息終天靡報在情一也今欲論其尊卑辨其優劣推心未忍訪古無據瑗}
  - {type: variant, offset: 4602, length: 9, content: 庶姓罷王仍襲扶風郡, WYG: 為易曰天尊地卑乾坤定矣又曰乾天也故稱父坤地也故稱母又曰乾為天為父坤為地為母禮喪服經曰為父斬衰三年為母齊衰朞尊卑優劣顯在典章何言訪古無據局判云母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子欲將何之瑗案典律未聞母殺其父而子有隠母之義既不告母便是與殺父天下豈有無父之國此子獨得有所之乎局判又云案春秋莊公元年不稱即位文姜出故服䖍注云文姜通於兄齊襄與殺公而不反父殺母出隠痛深諱朞而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理瑗尋注義隠痛深諱者以父為齊所殺而母與之隠痛父死深諱母出故不稱即位非為諱母與殺也是以下文以義絶其罪不為與殺明矣公羊傳曰君殺子不言即位隠之也朞而中練父憂少衰始念於母略書夫人遜於齊是内諱出奔猶為罪文傳曰不稱姜氏絶不為親禮也注云夫人有與殺桓之罪絶不為親得尊父之義善莊公思大義絶有罪故曰禮也以大義絶有罪得禮之衷明有讎疾告列之理但春秋桓莊之際齊為大國通於文姜魯公讁之文姜以告齊襄使}
