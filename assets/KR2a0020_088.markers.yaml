  - {type: variant, offset: 316, length: 1, content: 輕, krp: 日家無餘財太宗悼惜之贈征虜将軍幷州刺史平臯侯謚曰宣子純字道尚襲爵鎮逺将軍平臯子坐事爵除純弟代字定燕陳留北平二郡太守卒贈冠軍将軍營州刺史謚曰惠侯代所歴著清稱有父之遺風代子長年中書博士出為寜逺将軍汝南太守有郡民劉崇之兄弟分析家貧惟有一牛爭之不決訟於郡庭長年見之悽然曰汝曹當以一牛故致此競脱有二牛各應得一豈有訟理即以家牛一頭賜之於是郡境之中各相誡約咸敦敬讓太和初卒於家子琛字寳貴少有孝行歴武}
  - {type: variant, offset: 318, length: 0, content: '', WYG: 常侍羽林監太子翊軍校尉卒子略武定中左光祿大夫鹿生濟陰乘氏人父夀興沮渠牧犍庫部郎生再為濟南太守有治稱顯祖嘉其能特徴赴季秋馬射賜以驄馬加以青服彰其廉潔前後在任十年時三齊始附人懐茍且蒲博終朝頗廢農業生立制斷之聞者嗟善後歴徐州任城王澄廣陵侯元衍征東安南二府長史帶淮陽太守郯城鎮將年七十四正始中卒追贈龍驤將軍兗州刺史張應不知何許人延興中為魯郡太守應履行貞素聲績著聞妻子樵采以自供高祖深嘉其能遷京兆太守所在清白得吏民之忻心焉宋世景廣平人河南尹飜之第三弟也少自修立事親以孝聞與弟道璵下帷誦讀博覽羣言尤精經義族兄弁甚重之舉秀才對策上第拜國子助教遷彭城王勰開府法曹行參軍勰愛其才學雅相器敬高祖亦嘉之遷司徒法曹行參軍世景明刑理著律令裁決疑獄剖判如流轉尚書祠部郎彭城王勰每稱之曰宋世景精識尚書僕射才也臺中疑事右僕射高肇常以委之世景既才長從政加之夙勤不怠兼領數曹深著稱績頻為左僕射源懐引為行臺郎廵察州鎮十有餘所黜陟賞罰莫不咸允遷徙十鎮别置諸戍明設亭候以備}
  - {type: page-break, offset: 318, content: '', id: KR2a0020_WYG_088-4a, image: WYG0262/WYG0262-0264a.png}
  - {type: page-break, offset: 318, content: '', id: KR2a0020_WYG_088-4b, image: WYG0262/WYG0262-0264b.png}
