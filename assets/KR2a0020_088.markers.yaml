  - {type: variant, offset: 4579, length: 8, content: 遇害河陰贈司空雍, WYG: 敷奏偘然前廢帝甚重之出帝時為廷尉卿及釋奠開講瑗與散騎常侍溫子昇給事黄門侍郎魏季景通直散騎常侍李業興竝為擿句天平中除鎮東將軍金紫光祿大夫尋除廣宗太守治有清白之稱廣宗民情凶戾前後累政咸見告訟惟瑗一人終始全潔轉中山太守加征東将軍聲譽甚美為吏民所懐及齊獻武王班書州郡誡約牧守令長稱瑗政績以為勸厲焉後授使持節夲将軍平}
