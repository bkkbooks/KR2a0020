  - {type: variant, offset: 5432, length: 269, content: 二年高祖將爵舅氏詔訪存者而惠諸從以再罹孥戮難於應命唯道念敢先詣闕乃申后妹及鳳兄弟子女之存者於是賜鳳子屯爵柏人侯安祖浮陽侯興祖安喜侯道念真定侯從弟寄生高邑子皆加將軍十五年安祖昆弟四人以外戚蒙見詔謂曰卿之先世內外有犯得罪於時然官必用才以親非興邦之選外氏之寵超於末葉從今已後自非奇才不得復外戚謬班抽舉既無殊能今且可還後例降爵安祖等改侯為伯並去軍號高祖奉馮氏過厚於李氏過薄舅家了無用朝野人士所以竊議太常高閭顯言于禁中及世宗寵隆外家並居顯位乃惟高祖舅氏存已不霑恩澤景明末特詔興祖為中山太守正始初詔追崇惠為使持節驃騎將軍開府儀同三司定州刺史中山公太常, WYG: 八}
