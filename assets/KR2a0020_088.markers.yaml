  - {type: variant, offset: 319, length: 4, content: 歸訥訥見, WYG: 虜懐大相委重還而薦之於世宗曰宋世景文武才略當今寡儔清平忠直亦少其比陛下若任之以機要終不減李沖也世宗曰朕亦聞之尚書令廣陽王嘉右僕射高肇吏部尚書中山王英共薦世景為國子博士尋薦為尚書右丞王顯與宋弁有隙毁之於世宗故事寢不報尋加伏波將軍行滎陽}
