  - {type: variant, offset: 4591, length: 8, content: 冏字景昭襲爵昌黎, WYG: 不得告告者死再三返覆之未得其門何者案律子孫告父母祖父母者死又漢宣云子匿父母孫匿大父母皆勿論葢謂父母祖父母小者攘羊甚者殺害之類恩須相隠律抑不言法理如是足見其直未必指母殺父止子不言也若父殺母乃是夫殺妻母卑於父此子不告是也而母殺父不聽子告臣誠下愚輙以為惑昔楚康}
