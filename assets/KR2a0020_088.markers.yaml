  - {type: variant, offset: 2028, length: 2488, content: 賜爵遼西公弟喜鎮東大將軍祠曹尚書帶方公三妹皆封縣君妹夫王睹為平州刺史遼東公追贈英祖父苻堅扶風太守亥為鎮西將軍遼西簡公勃海太守澄為侍中征東大將軍太宰遼西獻王英母許氏博陵郡君遣兼太常盧度世持節改葬獻王於遼西樹碑立廟置守冢百家太安初英為侍中征東大將軍太宰進爵為王喜左光祿大夫改封燕郡從兄泰為安東將軍朝鮮侯訢子伯夫散騎常侍選部尚書次子員金部尚書喜子振太子庶子三年英領太師評尚書事內都大官伏寶泰等州刺史五年詔以太后母宋氏為遼西王太妃和平元年喜為洛州刺史初英事宋不能謹而睹奉宋甚至就食於和龍無車牛宋疲不進睹負宋於笈至是宋於英等薄不如睹之篤謂太后曰何不王睹而黜英太后曰英為長兄門戶主也家內小小不順何足追計睹雖盡力故是他姓奈何在英上本州郡公亦足報耳天安中英為平州刺史訢為幽州刺史伯夫進爵范陽公英黷貨徙燉煌諸常自興安及至是皆以親疏受爵賜田宅時為隆盛後伯夫為洛州刺史以贓汙欺妄徵斬於京師承明元年徵英復官薨諡遼西平王始英之徵也夢日墜其所居黃山下水中村人以車牛挽致不能出英獨抱載而歸聞者異之後員與伯夫子禽可共為飛書誣謗朝政事發有司執憲刑及五族高祖以昭太后故罪止一門訢年老赦免歸家恕其孫一人扶養之給奴婢田宅其家僮入者百人金錦布帛數萬計賜尚書以下宿衞以上其女婿及親從在朝皆免官歸本鄉十一年高祖文明太后以昭太后故悉出其家前後沒入婦女以喜子振試守正平郡卒馮熙字晉昌長樂信都人文明太后之兄也祖文通語在海夷傳世祖平遼海熙父朗內徙官至秦雍二州刺史遼西郡公坐事誅文明太后臨朝追贈假黃鉞太宰燕宣王立廟長安熙生於長安為姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母攜熙逃避至氐羌中撫育年十二好弓馬有勇幹氐羌皆歸附之魏母見其如此將還長安始就博士學問從師受孝經論語好陰陽兵法及長游華陰河東二郡間性汎愛不拘小節人無士庶來則納之熙姑先入掖庭為世祖左昭儀妹為高宗文成帝后即文明太后也使人外訪知熙所在徵赴京師拜冠軍將軍賜爵肥如侯尚恭宗女博陵長公主拜駙馬都尉出為定州刺史進爵昌黎王顯祖即位為太傅累拜內都大官高祖即位文明太后臨朝王公貴人登進者衆高祖乃承旨皇太后以熙為侍中太師中書監領袐書事熙以頻履師傅又中宮之寵為羣情所駭心不自安乞轉外任文明太后亦以為然於是除車騎大將軍開府都督洛州刺史侍中太師如故洛陽雖經破亂而舊三字石經宛然猶在至熙與常伯夫相繼為州廢毀分用大至頹落熙為政不能仁厚而信佛法自出家財在諸州鎮建佛圖精舍合七十二處寫一十六部一切經延致名德沙門日與講論精勤不倦所費亦不貲而在諸州營塔寺多在高山秀阜傷殺人牛有沙門勸止之熙曰成就後人唯見佛圖焉知殺人牛也其北邙寺碑文中書侍郎賈元壽之詞高祖頻登北邙寺親讀碑文稱為佳作熙為州因事取人子女為奴婢有容色者幸之為妾有子女數十人號為貪縱後求入朝授內都大官太師如故熙事魏母孝謹如事所生魏母卒乃散髮徒跣水漿不入口三日詔不聽服熙表求依趙氏之孤高祖以熙情難奪聽服齊衰期後以例降改封京兆郡公高祖納其女為后曰白虎通云王所不臣數有三焉妻之父母抑言其一此所謂供承宗廟不欲奪私心然吾季著於春秋無臣證於往牒既許通體之一用開至尊之敬比長秋配極陰政既敷未聞有司陳奏斯式可詔太師輟臣從禮又勒集書造儀付外高祖前後納熙三女二為后一為左昭儀由是馮氏寵貴益隆賞賜累巨萬高祖每詔熙上書不臣入朝不拜熙上書如舊熙於後遇疾綿寢四載詔遣醫問道路相望車駕亦數臨幸焉將遷洛高祖親與熙別見其困篤歔欷流涕密敕宕昌公王遇曰太師萬一即可監護喪事十九年薨於代車駕在淮南留臺表聞還至徐州乃舉哀為制緦服詔有司豫辨凶儀并開魏京之墓令公主之柩俱向伊洛凡所營送皆公家為備又敕代給綵帛前後六千匹以供凶用皇后詣代都赴哭太子恂亦赴代哭弔將葬贈假黃鉞侍中都督十州諸軍事大司馬太尉冀州刺史加黃屋左纛備九錫前後部羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威強恢遠曰武奉諡於公柩至洛七里澗高祖服衰往迎叩靈悲慟而拜焉葬日送臨墓所親作誌銘主生二子誕脩誕字思政脩字寶業皆姿質妍麗年纔十餘歲文明太后俱引入禁中申以教誡然不能習讀經史故兄弟並無學術徒整飾容儀寬雅恭謹而已誕與高祖同歲幼侍書學仍蒙親待尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王脩侍中鎮北大將軍尚書東平公又除誕儀曹尚書知殿中事及罷庶姓王誕為侍中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官高祖立於庭遙受其拜既訖還室脩降為侯誕與脩雖並長宮禁而性趣乖別誕性淳篤脩乃浮競誕亦未能誨督其過然時言於太后高祖嚴責之至於楚棰由是陰懷毒恨遂結左右有憾於誕者求藥欲因食害誕事覺高祖自詰之具得情狀誕引過謝乞全脩命高祖以誕父老又重其意不致於法撻之百餘黜為平城百姓脩妻司空穆亮女也求離婚請免官高祖引管蔡事皆不許高祖寵誕每與誕同輿而載同案而食同席坐臥彭城王勰北海王詳雖直禁中然親近不及十六年以誕為司徒高祖既深愛誕除官日親為制三讓表并啟將拜又為其章謝尋加車騎大將軍太子太師十八年高祖謂其無師傅奬導風誕深自誨責從駕南伐十九年至鍾離誕遇疾不能侍從高祖日省問醫藥備加時高祖銳意臨江乃命六軍發鍾離南轅與誕泣訣左右皆入無不掩涕時誕已惙然強坐視高祖悲而淚不能下言夢太后來呼臣高祖嗚咽執手而出遂行是日去鍾離五十里許昏時告誕薨問高祖哀不自勝時崔慧景裴叔業軍在中淮去所次不過百里高祖乃輕駕西還從者數千人夜至誕薨所撫屍哀慟若喪至戚達旦聲淚不絕從者亦迭舉音明告蕭鸞鍾離戍主蕭惠休惠休遣其太守奉慰詔求棺於城中及斂迭舉高祖以所服衣充襚親自臨視撤樂去膳宣敕六軍止臨江之駕高祖親北度慟哭極哀詔侍臣一人兼大鴻臚送柩至京禮物儀徐州備造陵兆葬事下洛候設喪至洛陽車駕猶在鍾離詔留守賜賻物布帛五千匹穀五千斛以供葬事贈假黃鉞使持節大司馬領司徒侍中都督太師駙馬公如故加以殊禮備錫九命依晉大司馬齊王攸故事有司奏諡詔曰案諡法善行仁德曰元柔克有光曰懿昔貞惠兼美受三諡之榮忠武雙徽錫兩號之茂式準前迹宜契具瞻既自少綢繆知之惟朕案行定名諡曰元懿帝又親為作碑文及挽歌詞皆窮美盡哀事過其厚車駕還京詔曰馮大司馬已就墳塋永潛幽室宿草之哭何能忘之遂親臨誕墓停車而哭使彭城王勰詔羣官脫朱衣服單衣介幘陪哭司徒貴者示以朋友微者示如僚佐公主貞厚有禮度產二男長子穆穆字孝和襲熙爵避皇子愉封改扶風郡公尚高祖女順陽長公主拜駙馬都尉歷員外, WYG: ''}
