  - {type: variant, offset: 5287, length: 144, content: 吏民莫敢欺犯後為開府儀同三司青州刺史王如故歷政有美績惠素為文明太后所忌誣惠將南叛誅之惠二弟初樂與惠諸子同戮後妻梁氏亦死青州盡沒其家財惠本無釁故天下寃惜焉惠從弟鳳為定州刺史安樂王長樂主簿後長樂以罪賜死時卜筮者河間邢瓚辭引鳳云長樂不軌鳳為謀主伏誅惟鳳弟道念與鳳子及兄弟之子皆逃免後遇赦乃出太和, WYG: 魏書卷八}
