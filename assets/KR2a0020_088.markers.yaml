  - {type: variant, offset: 4590, length: 0, content: '', WYG: 在州政如治郡又為齊獻武王丞相府右長史瑗無軍府斷割之才不堪稱職又行晉州事既還京師上表曰臣在平州之日蒙班麟趾新制即依朝命宣示所部士庶忻仰有若三章臣聞法象巍巍乃大舜之事政道郁郁亦隆周之軌故元首股肱可否相濟聲教之聞於此為證伏惟陛下應圖臨㝢握紀承天克構洪基會昌寳厯式張琴瑟且調宮羽去甚刪泰革弊遷澆俾高祖之徳不墜於地畫一既歌萬國歡躍臣伏讀至三公曹第六十六條母殺其父}
