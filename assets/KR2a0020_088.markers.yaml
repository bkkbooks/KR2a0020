  - {type: variant, offset: 4946, length: 1, content: 南, WYG: 金紫光禄大夫遷太府少卿轉衛將軍廣平太守治有能名姦吏跼蹐秋毫無犯雅性清儉屬歳饑饉家餽未至使人外尋陂澤採藕根而食之遇有疾苦家人解衣質米以供之然其為治亦尚威嚴朝廷以其清白賜榖一千斛絹一百匹興和初卒年五十二吏民奔哭莫不悲慟贈都督徐兗二州諸軍事衛大將軍吏部尚書兗州刺史謚曰貞武定初齊獻武王以敦及中山太守蘇淑在官奉法清約自居宜見追褒以厲天下乃上言請加旌錄詔曰昔五袴興謠兩岐致詠皆由仁覃千里化洽一邦故廣平太守羊敦故中山太守蘇淑並器業和隠幹用貞濟善政聞國清譽在民方藉良才遂登高秩先後凋亡朝野傷悼追旌清徳蓋惟舊章可各賞帛一百匹穀五百斛班下}
