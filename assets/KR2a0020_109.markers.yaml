  - {type: variant, offset: 4457, length: 3, content: 門闕下, WYG: 於聲韻頗有所得度量權歴出自黃鐘雖造管察氣經史備有但氣有盈虛黍有巨細差之毫釐失之千里自非管應時候聲驗吉凶則是非之原諒亦難定此則非仲儒淺識所敢聞之至於準者本以代律取其分數調校樂器則宫商易辨若尺寸小長則六十宮商相與微濁若分數加短則六十徵羽類皆小清語其大本居然微異至於清濁相宣諧會歌管皆得應合雖積黍驗氣取聲之本清濁諧㑹亦須有方若閑準意則辨五聲清濁之韻若善琴術則知五調調音之體參此二途以均樂器則自然應和不相奪倫如不練此必有乖謬案後漢順帝陽嘉二年冬}
  - {type: page-break, offset: 4457, content: '', id: KR2a0020_WYG_109-12b, image: WYG0262/WYG0262-0700b.png}
