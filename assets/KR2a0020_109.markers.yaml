  - {type: variant, offset: 2922, length: 192, content: 怖威北竄不敢復南和平五年吐賀真死子予成立號受羅部真可汗魏言惠也自稱永康元年率部侵塞北鎮遊軍大破其衆皇興四年予成犯塞車駕北討京兆王子推東陽公元丕督諸軍出西道任城王雲等督軍出東道汝陰王賜濟南公羅烏拔督軍為前鋒隴西王源賀督諸軍為後繼諸將會車駕于女水之濱顯祖親誓衆詔諸將曰用兵在奇不在衆也卿等為朕力戰方略已在朕心乃選精兵五千人挑戰多設奇兵以惑之虜衆奔潰逐北三十餘里斬首五萬級降者萬餘人戎馬器械, WYG: ''}
