  - {type: variant, offset: 6763, length: 0, content: '', WYG: 德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛徳文始四時五行之舞武徳者高祖四年作也以象天下樂已行武以除亂也文始舞者舜韶舞高祖六年更名曰文始以示不相襲也五行舞者本周舞秦始皇二十六年更名曰五行也四時舞者孝文所作以明天下之安和也孝景以武德舞為昭德孝宣以昭德舞為盛徳光武廟奏大武諸帝廟並奏文始五行四時之舞及卯金不祀當塗勃興魏武廟樂改云韶武用虞之大韶周之大武總號大鈞也曹失其鹿典午乗時晋氏之樂更名正德自昔帝}
