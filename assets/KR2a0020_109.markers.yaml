  - {type: variant, offset: 8340, length: 775, content: 或是神物天使之然將下就之其姊大驚曰此是畜生無乃辱父母也妹不從下為狼妻而產子後遂滋繁成國故其人好引聲長歌又似狼嘷無都統大帥當種各有君長為性粗猛黨類同心至於寇難翕然相依鬬無行陳頭別衝突乍出乍入不能堅戰其俗蹲踞褻黷無所忌避婚姻用牛馬納聘以為榮結言既定男黨營車闌馬令女黨恣取上馬袒乘出闌馬主立於闌外振手驚馬不墜者即取之墜則更取數滿乃止俗無穀不作酒迎婦之日男女相將持馬酪熟肉節解主人延賓亦無行位穹廬前叢坐飲宴終日復留其宿明日將婦歸既而將夫黨還入其家馬羣極取良馬父母兄弟雖惜終無言者頗諱取寡婦而優憐之其畜產自有記識雖闌縱在野終無妄取俗不清潔喜致震霆每震則叫呼射天而棄之移去至來歲秋馬肥復相率候於震所埋羖羊燃火拔刀女巫祝說似如中國祓除而羣隊馳馬旋繞百帀乃止人持一束柳桋回竪之以乳酪灌焉婦人以皮裹羊骸戴之首上縈屈髮鬢而綴之有似軒冕其死亡葬送掘地作坎坐屍於中張臂引弓佩刀挾矟無異於生而露坎不掩時有震死及疫癘則為之祈福若安全無他則為報賽多殺雜畜燒骨以燎走馬遶旋多者數百帀男女無小大皆集會平吉之人則歌舞作樂死喪之家則悲吟哭泣其遷徙隨水草衣皮食肉牛羊畜產盡與蠕蠕同唯車輪高大輻數至多後徙於鹿渾海西北百餘里部落強大常與蠕蠕為敵亦每侵盜于國家太祖親襲之大破其諸部後太祖復度弱洛水西行至鹿渾海停駕簡輕騎西北行百餘里襲破之虜獲生口馬牛羊二十餘萬復討其餘種於狼山大破之車駕巡幸分命諸將為東西二道太祖親勒六軍從中道自駁髯水西北徇略其部諸軍同時雲合破其雜種三十餘落衞王儀別督將從西北絕漠千餘里復破其遺迸七部於是高車大懼諸部震駭太祖自牛川南引大校獵以高車為圍騎徒遮列周七百餘里聚雜獸於其中因驅至平城即以高車衆起鹿苑南因臺陰北距長城東包白登屬之西山尋而高車姪利曷莫弗敕力犍率其九百餘落內附拜敕力犍為揚威將軍置司馬參軍賜穀二萬斛後高車解批莫弗幡豆建復率其部三十餘落內附亦拜為威遠將軍置司馬參軍賜, WYG: ''}
