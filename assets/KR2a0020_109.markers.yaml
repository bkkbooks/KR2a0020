  - {type: variant, offset: 1844, length: 303, content: 為也就使能來若不先滅蠕蠕便是坐待寇至腹背受敵非上策也吾行決矣於是車駕出東道向黑山平陽王長孫翰從西道向大娥山同會賊庭五月次于沙漠南舍輜重輕襲之至栗水大檀衆西奔弟匹黎先典東落將赴大檀遇翰軍翰縱騎擊之殺其大人數百大檀聞之震怖將其族黨焚燒廬舍絕跡西走莫知所至於是國落四散竄伏山谷畜產布野無人收視世祖緣栗水西行過漢將竇憲故壘六月車駕次於兔園水去平城三千七百里分軍搜討東至瀚海西接張掖水渡燕然山東西五千餘里南北三千里高車諸部殺大檀種類前後歸降三十餘萬俘獲首虜及戎馬百餘萬匹八月世祖聞東部高車屯巳尼陂人畜甚衆去官軍千餘里遂遣左僕射安原等往討之暨巳尼陂高車諸部望軍降者數十萬大檀部落衰弱因發疾而死子吳提立號敕連可汗魏言神聖, WYG: 考定}
