  - {type: variant, offset: 6232, length: 499, content: 四年阿那瓌衆大飢入塞寇抄肅宗詔尚書左丞元孚兼行臺尚書持節喻之孚見阿那瓌為其所執以孚自隨驅掠良口二千公私驛馬牛羊數十萬北遁謝孚放還詔驃騎大將軍尚書令李崇等率騎十萬討之出塞三千餘里至瀚海不及而還俟匿伐至洛陽肅宗臨西堂引見之五年婆羅門死於洛南之館詔贈使持節鎮西將軍秦州刺史廣牧公是歲沃野鎮人破六韓拔陵反諸鎮相應孝昌元年春阿那瓌率衆討之詔遣牒云具仁齎雜物勞賜阿那瓌阿那瓌拜受詔命勒衆十萬從武川鎮西向沃野頻戰克捷四月肅宗又遣兼通直散騎常侍中書舍人馮儁使阿那瓌宣勞班賜有差阿那瓌部落既和士馬稍盛乃號敕連頭兵豆伐可汗魏言把攬也十月阿那瓌復遣郁久閭彌娥朝貢三年四月阿那瓌遣使人鞏鳳景等朝貢及還肅宗詔之曰北鎮羣狄為逆不息蠕蠕主為國立忠助加誅討言念誠心無忘寢食今知停在朔垂與尒朱榮隣接其嚴勒部曲勿相暴掠又近得蠕蠕主啟更欲為國東討但蠕蠕主世居北漠不宜炎夏今可且停聽待後敕蓋朝廷慮其反覆也此後頻使朝貢建義初孝莊詔曰夫勳高者賞重德厚者名隆蠕蠕主阿那瓌鎮衞北藩禦侮朔表遂使陰山息警弱水無塵刊跡狼山銘功瀚海至誠既篤勳緒莫酬故宜標以殊禮何容格以常式自今以後讚拜不言名上書不稱臣太昌元年六月阿那瓌遣烏句蘭樹什伐等朝貢并為長子請尚公主, WYG: ''}
