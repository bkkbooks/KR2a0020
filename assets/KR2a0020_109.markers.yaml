  - {type: variant, offset: 4462, length: 2, content: 肅宗, WYG: 行禮辟雍奏應鐘始復黃鐘作樂器隨月律是為十二之律必須次第為宫而商角徵羽以類從之尋調聲之體宫商宜濁徵羽用清若公孫崇止以十二律聲而云還相為宫清濁悉足非唯未練五調調器之法至於五聲次苐自是不足何者黃鐘為聲氣之元其管最長故以黃鐘為宫太蔟為商林鐘為徵則宫徵相順若均之八音猶須錯採衆聲配成其美若以應鐘為宫大吕為商蕤賓為徵則徵濁而宫清雖有其韻不成音曲若以夷則為宫則十二律中唯得取中吕為徵其商角羽並無其韻若以中吕為宫則十二律内全無所取何者中吕為十二之竅疑變律之首依京房書中吕為宫乃以去滅為商執始為徵然後方韻而崇乃以中吕猶用林鐘為商黃鐘為徵何由可諧仲儒以調和樂器文飾五聲非準不妙若如嚴嵩父子心賞清濁是則為難若依案見尺作準調絃緩急清濁可以意推耳但音聲精微史傳簡略舊志唯云準形如瑟十三絃隐間九尺以應黃鐘九寸調中一絃令與黃鐘相得案盡以求其聲遂不辨準須柱以不柱有高下絃有粗細餘十二絃復應若為致令攬者望風拱手又案房準九尺之内為一十七萬七千一百四十七分一尺之内為萬九千六百八十三分又復十之是為於準一寸之内亦為萬九千六百八十三分然則於準一分之内乗為二十分又為小分以辨彊弱中間至促雖復離朱之明猶不能窮而分之雖然仲儒私曾考驗但前却中柱使入準常尺分之内則相生之韻已自應合分數既微器宜精妙其準面平直須如停水其中絃一柱高下須與二頭}
