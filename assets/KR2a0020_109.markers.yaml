  - {type: variant, offset: 1264, length: 238, content: 與女俱嬪于和龍乃立步鹿真步鹿真立委政樹黎初高車叱洛侯者叛其渠帥導社崘破諸部落社崘德之以為大人步鹿真與社崘子社拔共至叱洛侯家淫其少妻妻告步鹿真叱洛侯欲舉大檀為主遺大檀金馬勒為信步鹿真聞之歸發八千騎往圍叱洛侯叱洛侯焚其珍寶自刎而死步鹿真遂掩大檀大檀發軍執步鹿真及社拔絞殺之乃自立大檀者社崘季父僕渾之子先統別部鎮於西界能得衆心國人推戴之號牟汗紇升蓋可汗魏言制勝也斛律父子既至和龍馮跋封為上谷侯大檀率衆南徙犯塞太宗親討之大檀懼而遁走遣山陽侯奚斤等追之遇寒雪士衆凍死墮指者十二三及太宗崩, WYG: 節}
