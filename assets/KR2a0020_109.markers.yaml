  - {type: variant, offset: 6755, length: 0, content: '', WYG: 極萬古之徽蹤實是一時之盛事竊惟古先哲王制禮作樂各有所稱黃帝有咸池之樂顓頊作承雲之舞大章大韶堯舜之異名大夏大濩禹湯之殊稱周言大武秦曰壽人}
