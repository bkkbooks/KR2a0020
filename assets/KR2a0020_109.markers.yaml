  - {type: page-break, offset: 5, content: '', id: KR2a0020_WYG_109-2a, image: WYG0262/WYG0262-0695a.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 九齊魏收撰志第十四樂五氣質初分聲形立矣聖者因天然之有為入用之物縁喜怒之心設哀樂之器蕢桴葦籥其來自久伏羲絃琴農皇制瑟垂鐘和磬女媧之簧隨感而作其用稍廣軒轅桴阮瑜之管定小一之律以成咸池之美次以六莖五英大章韶夏濩武之屬聖人所以移風易俗也故在易之豫義明崇德書云詩言志歌詠言聲依永律和聲八音克諧神人以和周禮圜鐘為宫黃鐘為角太蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞奏之六變天神可得而降矣函鐘為宫太蔟為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞奏之八變地祇可得而禮矣黃鐘為宫大吕為角太蔟為徵應鐘為羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九聲之舞奏之九變人鬼可得而禮矣此所以協}
