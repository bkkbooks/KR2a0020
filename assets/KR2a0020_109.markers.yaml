  - {type: variant, offset: 2150, length: 3, content: 遣使朝, WYG: 春公孫崇復表言伏惟皇魏龍躍鳳舉配天光宅世祖太武皇帝革静荒嵎廓寧宇内兇醜尚繁戎軒仍動制禮作樂致有闕如髙祖孝文皇帝德鍾後仁之期道協先天之日顧雲門以興言感簫韶而忘味以故中書監髙閭博識明敏文思優洽紹蹤成均實允所寄乃命閭廣程儒林究論古樂依據六經參諸國志錯綜隂陽以制聲律鐘石管絃略以完具八音聲韻事别粗舉值遷邑崧瀍未獲周密五權五量竟不就果自爾迄今率多褫落金石虛懸宫商未會伏惟陛下至聖承天纂戎鴻烈以金石未協詔臣緝理謹即廣搜秬黍選其中形又採梁山之竹更裁律吕制磬造鐘依律並就但權量差謬其來久矣頃蒙付并州民王顯進所}
