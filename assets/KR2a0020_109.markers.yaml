  - {type: variant, offset: 1073, length: 0, content: '', krp: 詔尚書吏部郎鄧淵定律呂恊音樂及追尊皇曽祖皇祖皇考諸帝樂用八佾舞皇始之舞皇始舞太祖所作也以明開大始祖之業後更制宗廟皇帝入廟門奏王夏太祝迎神于廟門奏迎神曲猶古降神之樂乾豆上奏登歌猶古清廟之樂曲終下奏神祚嘉神明之饗也皇帝行禮七廟奏陛歩以為行止之節皇帝出門奏總章次奏八佾舞次奏送神曲}
  - {type: variant, offset: 1074, length: 3, content: 犯塞二, WYG: 舊禮孟秋祀天西郊兆内壇西備列金石樂具皇帝入兆内行禮咸奏舞八佾之舞孟夏有事于東廟用樂略與西郊同太祖初冬至祭天于南郊圜丘樂用皇矣奏雲和之舞事訖奏維皇將燎夏至祭地祇於北郊方澤樂用天祚奏大武之舞正月上日饗羣臣宣布政教備列宫懸正樂兼奏燕趙秦吳之音五方殊俗之曲四時饗會亦用焉凡樂者樂其所自生禮不忘其本掖庭中歌真人代歌上敘祖宗開基所由下及君臣廢興之跡凡一百五十章昏晨歌之時與絲竹合奏郊廟宴饗亦用之六}
