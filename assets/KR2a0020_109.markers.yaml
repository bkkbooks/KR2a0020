  - {type: variant, offset: 6, length: 1, content: 列, WYG: 才寧萬國也凡音宫為君商為臣角為民徵為事羽為物五者不亂則無惉懘之音宮亂則荒其君驕商亂則陂其官壊角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱姦聲感人逆氣應之逆氣成象而滛樂興焉正氣感人順氣應之順氣成象而和樂興焉先王恥其亂故制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠亷肉節奏足以感動人之善心而已不使放心邪氣得接焉樂在宗廟之中君臣上下同聽之莫不和敬在族長鄉里之中長幼同聽之莫不和順閨門之内父子兄弟同聽之莫不和親又有韎昧任禁之樂以娛四夷之民斯蓋立樂之方也三代之衰邪音間起則有爛漫靡靡之樂興焉周之衰也諸侯力爭澆偽萌生滛慝滋甚競其邪忘其正廣其噐蔑其禮或奏之而心疾或撞之而不令晉平公聞清角而顛隕魏文侯聽古雅而眠睡鄭宋齊衞流宕不反於是正樂虧矣大樂感於風化與世推移治國之音安以樂亡國之音哀以思隨時隆替不常厥聲延陵歴聽諸國盛衰必舉蓋所感者著所識者深也樂之崩矣秦始滅學經亡義絶莫採其真人重協俗世貴順耳則雅聲古器幾將淪絶漢興制氏但識其鏗鏘鼓舞不}
  - {type: page-break, offset: 6, content: '', id: KR2a0020_WYG_109-2b, image: WYG0262/WYG0262-0695b.png}
  - {type: page-break, offset: 6, content: '', id: KR2a0020_WYG_109-3a, image: WYG0262/WYG0262-0695c.png}
