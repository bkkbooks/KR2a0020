  - {type: variant, offset: 1507, length: 1, content: 檀, WYG: 矣逮乎末俗陵遲正聲頓廢多好鄭衞之音以悦耳目故使樂章散缺伶官失守今方釐革時弊稽古復禮庶令樂正雅頌各得其宜今置樂官實須任職不得仍令濫吹也遂簡置焉十六年春又詔曰禮樂之道自古所先故聖王作樂以和中制禮以防外然音聲之用其致逺矣所以通感人神移風易俗至乃簫韶九成鳳皇來儀擊石拊石百獸率舞有周之季斯道崩缺故夫子忘味於}
