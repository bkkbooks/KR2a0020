  - {type: variant, offset: 7352, length: 987, content: 歸先是海出大龜枯死於平郭至是而乞得龜敗別部人逸豆歸殺乞得龜而自立與慕容晃相攻擊遣其國相莫渾伐晃而莫渾荒酒縱獵為晃所破死者萬餘人建國八年晃伐逸豆歸逸豆歸拒之為晃所敗殺其驍將涉亦干逸豆歸遠遁漠北遂奔高麗晃徙其部衆五千餘落於昌黎自此散滅矣徒何段就六眷本出於遼西其伯祖日陸眷因亂被賣為漁陽烏丸大庫辱官家奴諸大人集會幽州皆持唾壺唯庫辱官獨無乃唾日陸眷口中日陸眷因咽之西向拜天曰願使主君之智慧祿相盡移入我腹中其後漁陽大飢庫辱官以日陸眷為健使將之詣遼西逐食招誘亡叛遂至強盛日陸眷死弟乞珍代立乞珍死子務目塵代立即就陸眷父也據有遼西之地而臣於晉其所統三萬餘家控絃上馬四五萬騎穆帝時幽州刺史王浚以段氏數為己用深德之乃表封務目塵為遼西公假大單于印綬浚使務目塵率萬餘騎伐石勒於常山封龍山下大破之務目塵死就六眷立就六眷與弟匹磾從弟末波等率五萬餘騎圍石勒於襄國勒登城望之見將士皆釋仗寢臥無警備之意勒因其懈怠選募勇穿城突出直衝末波生禽之置之座上與飲宴盡歡約為父子盟誓而遣之末波既得免就六眷等遂攝軍而還不復報浚歸于遼西自此以後末波常不敢南向溲焉人問其故末波曰吾父在南其感勒不害己也如此就六眷死其子幼弱匹磾與劉琨世子羣奔喪匹磾陰卷甲而往欲殺其從叔羽鱗及末波而奪其國末波等知之遣軍逆擊匹磾劉羣為末波所獲匹磾走還薊懼琨禽己請琨宴會因執而害之匹磾既殺劉琨與羽鱗末波自相攻擊部衆乖離欲擁其衆徙保上谷阻軍都之險以拒末波等平文帝聞之陰嚴精騎將擊之匹磾恐懼南奔樂陵後石勒遣石虎擊段文鴦于樂陵破之生擒文鴦匹磾遂率其屬及諸塢壁降于石勒末波自稱幽州刺史屯遼西末波死國人立日陸眷弟護遼為主烈帝時假護遼驃騎大將軍幽州刺史大單于北平公弟鬱蘭撫軍將軍冀州刺史勃海公建國元年石虎征護遼於遼西護遼奔平岡山遂投慕容晃晃殺之鬱蘭奔石虎以所徙鮮卑五千人配之使屯令支鬱蘭死子龕代之及冉閔之亂龕率衆南移遂據齊地慕容儁使弟玄恭帥衆伐龕於廣固執龕送之薊儁毒其目而殺之坑其徒三千餘人高車蓋古赤狄之餘種也初號為狄歷北方以為勑勒諸夏以為高車丁零其語略與匈奴同而時有小異或云其先匈奴之甥也其種有狄氏袁紇氏斛律氏解批氏護骨氏異奇斤氏俗云匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國北無人之地築高臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間耳復一年乃有一老狼晝夜守臺嘷呼因穿臺下為空穴經時不去其小女曰吾父處我於此欲以與天而今狼, WYG: ''}
