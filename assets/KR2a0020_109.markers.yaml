  - {type: variant, offset: 5835, length: 2, content: 吏部, WYG: 受詔監修金石博探古今樂事令其門生河間信都芳考算之屬天下多難終無制造芳後乃撰延明所集樂説并諸器物準圖二十餘事而注之不得在樂署考正樂律也普泰中前廢帝詔録}
  - {type: variant, offset: 5835, length: 2, content: 吏部, krp: 受詔監修金石博探古今樂事令其門生河間信都芳考算之屬天下多難終無制造芳後乃撰延明所集樂説并諸器物準圖二十餘事而注之不得在樂署考正樂律也普泰中前廢帝詔録}
  - {type: variant, offset: 5839, length: 392, content: 元脩義尚書李彥給事黃門侍郎元纂給事黃門侍郎張烈給事黃門侍郎盧同等奏曰竊聞漢立南北單于晉有東西之稱皆所以相維禦難為國藩籬今臣等參議以為懷朔鎮北土名無結山吐若奚泉敦煌北西海郡即漢晉舊障二處寬平原野彌沃阿那瓌宜置西吐若奚泉婆羅門宜置西海郡各令總率部落收離聚散其爵號及資給所須唯恩裁處彼臣下之官任其舊俗阿那瓌所居既是境外宜少優遣以示威刑請沃野懷朔武川鎮各差二百人令當鎮軍主監率給其糧仗送至前所仍於彼為其造構功就聽還諸於北來在婆羅門前投化者令州鎮上佐準程給糧送詣懷朔阿那瓌鎮與使人量給食釰在京館者任其去留阿那瓌草創先無儲積請給朔州麻子乾飯二千斛官駝運送婆羅門居於西海既是境內資衞不得同之阿那瓌等新造藩屏宜各遣使持節馳驛先詣慰喻并委經略肅宗從之十二月詔安西將軍廷尉元洪超兼尚書行臺詣敦煌安置婆羅門婆羅門尋與部衆謀叛投肽噠肽噠三妻皆婆羅門姊妹也仍為州軍所討禽之三年十二月阿那瓌上表乞粟以為田種詔給萬, WYG: 長孫稚太常卿祖瑩營理金}
  - {type: variant, offset: 5839, length: 392, content: 元脩義尚書李彥給事黃門侍郎元纂給事黃門侍郎張烈給事黃門侍郎盧同等奏曰竊聞漢立南北單于晉有東西之稱皆所以相維禦難為國藩籬今臣等參議以為懷朔鎮北土名無結山吐若奚泉敦煌北西海郡即漢晉舊障二處寬平原野彌沃阿那瓌宜置西吐若奚泉婆羅門宜置西海郡各令總率部落收離聚散其爵號及資給所須唯恩裁處彼臣下之官任其舊俗阿那瓌所居既是境外宜少優遣以示威刑請沃野懷朔武川鎮各差二百人令當鎮軍主監率給其糧仗送至前所仍於彼為其造構功就聽還諸於北來在婆羅門前投化者令州鎮上佐準程給糧送詣懷朔阿那瓌鎮與使人量給食釰在京館者任其去留阿那瓌草創先無儲積請給朔州麻子乾飯二千斛官駝運送婆羅門居於西海既是境內資衞不得同之阿那瓌等新造藩屏宜各遣使持節馳驛先詣慰喻并委經略肅宗從之十二月詔安西將軍廷尉元洪超兼尚書行臺詣敦煌安置婆羅門婆羅門尋與部衆謀叛投肽噠肽噠三妻皆婆羅門姊妹也仍為州軍所討禽之三年十二月阿那瓌上表乞粟以為田種詔給萬, krp: 長孫稚太常卿祖瑩營理金}
