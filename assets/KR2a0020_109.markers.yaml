  - {type: variant, offset: 6739, length: 1, content: 詔, WYG: 承太平之緒纂無為之運帝圖既逺王度惟新太和中命故中書監高閭草剏古樂閭尋去世未就其功閭亡之後故太樂令公孫崇續修遺事十有餘載崇敷奏其功時太常卿劉芳}
  - {type: variant, offset: 6739, length: 1, content: 詔, krp: 承太平之緒纂無為之運帝圖既逺王度惟新太和中命故中書監高閭草剏古樂閭尋去世未就其功閭亡之後故太樂令公孫崇續修遺事十有餘載崇敷奏其功時太常卿劉芳}
  - {type: variant, offset: 6741, length: 2, content: 范陽, WYG: 崇所作體制差舛不合古義請更修營被㫖聽許芳又釐綜久而申呈時故東平}
  - {type: variant, offset: 6741, length: 2, content: 范陽, krp: 崇所作體制差舛不合古義請更修營被㫖聽許芳又釐綜久而申呈時故東平}
  - {type: variant, offset: 6744, length: 1, content: 誨, WYG: 元匡共相論駁各樹朋黨爭競紛綸竟無底定及孝昌已後世屬艱虞内難孔殷外敵滋甚永安}
  - {type: page-break, offset: 6744, content: '', id: KR2a0020_WYG_109-17a, image: WYG0262/WYG0262-0702c.png}
  - {type: variant, offset: 6744, length: 1, content: 誨, krp: 元匡共相論駁各樹朋黨爭競紛綸竟無底定及孝昌已後世屬艱虞内難孔殷外敵滋甚永安}
  - {type: variant, offset: 6746, length: 4, content: 長女琅邪, WYG: 季胡賊入京燔燒樂庫所有之鐘悉畢賊手其餘磬石咸為灰燼普泰元年臣等奉勅營造樂器責問太樂前來郊丘懸設之方宗廟施安之分太樂令張乾龜答稱芳所造六格北廂黄鐘之均實是夷則之調其餘三廂宫商不和共用一笛施之前殿樂人尚存又有姑洗太蔟二格用之後宫檢其聲韻復是夷則於今尚在而芳一代碩儒斯文攸屬討論之日必應考古深有明證乾龜之辨恐是歴歳稍逺伶官失職芳久殂没遺文銷毁無可遵訪臣等謹詳周禮分樂而序之凡樂圜鐘為宫黄鐘為角太蔟為徵姑洗為羽若樂六變天神可得而禮函鐘為宫太蔟為角姑洗為徵南吕為羽若樂八變地祇可得而禮黃鐘為宫大吕為角太蔟為徵應鐘為羽若樂九變人鬼可得而禮至於布置不得相生之次兩均異宫並無商聲而同用一徵書曰於予擊石拊石百獸率舞八音克諧神人以和計五音不具則聲豈成文七律不備則理無和韻八音克諧莫曉其㫖聖道幽𤣥微言已絶漢魏以來未能作者案春秋魯昭}
  - {type: page-break, offset: 6746, content: '', id: KR2a0020_WYG_109-17b, image: WYG0262/WYG0262-0702d.png}
