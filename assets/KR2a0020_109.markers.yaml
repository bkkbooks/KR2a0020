  - {type: variant, offset: 6768, length: 7, content: 阿那瓌遣使朝貢, WYG: 祭皆用兩懸之樂詳攬先誥大為紕繆古禮天子宫懸諸侯軒懸大夫判懸士特懸皇后禮數德合王者名器所資豈同於大夫哉孝經言嚴父莫大於配天宗祀文王於明堂以配上帝即五精之帝也禮記王制庻羞不踰牲燕衣不踰祭服論語禹卑宫室盡力於溝洫惡衣服致美於黻冕何有殿庭之樂過於天地乎失禮之差逺於千里昔漢孝武帝東廵狩封禪還祀泰一於甘泉祭后土於汾陰皆盡用眀其無減普泰元年前侍中臣孚及臣瑩等奏}
