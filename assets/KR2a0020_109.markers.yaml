  - {type: variant, offset: 8, length: 12, content: 第九十一蠕蠕匈奴宇文莫槐, WYG: 其義而於郊廟朝廷皆協律新變雜以趙代秦楚之曲故王禹宋曄上書切諫丙强景武顯著當時通儒達士所共歎息矣後漢東平王蒼總議樂事頗有增加大扺循前而已及黃巾董卓以後天下喪亂諸樂亡缺魏武既獲杜夔令其考會古樂而柴玉左延年終以新聲寵愛晉世荀朂典樂與郭夏宋識之}
