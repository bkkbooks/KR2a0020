  - {type: variant, offset: 6754, length: 0, content: '', WYG: 濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也服子慎注云黃鐘之均黃鐘為宫太蔟為商姑洗為角林鐘為徵南吕為羽應鐘為變宫蕤賓為變徵一懸十九鐘十二懸二百二十八鐘八十四律即如此義乃可尋究今案周禮小胥之職樂懸之法鄭注云鐘磬編縣之二八十六枚漢成帝時犍為郡於水濱得古磬十六枚獻呈漢以為瑞復依禮圖編懸十六去正始中徐州薛成送玉磬十六枚亦是一懸之器檢太樂所用鐘磬各一懸十四不知何據魏侍中繆襲云周禮以六律六同五聲八音六舞大合樂以致鬼神今之樂官徒知古有此制莫有明者又云樂制既亡漢成謂韶武武德武始大鈞可以備四代之樂奏黃鐘舞文始以祀天地奏太簇舞大武以祀五郊明堂奏姑洗舞武徳廵狩以祭四望山川奏蕤賓舞武始大鈞以祀宗廟祀圜丘方澤羣廟祫祭之時則可兼舞四代之樂漢亦有雲翹育命之舞罔識其源漢以祭天魏時又以雲翹兼祀圜丘天郊育命兼祀方澤地郊今二舞久亡無復知者臣等謹依髙祖所制尺周官考工記鳬氏為鐘鼓之分磬氏為磬倨闕之法禮運五聲十二律還相為宫之義以律吕為之劑量奏請制度經紀營造依魏晉所用四廂宫懸鐘磬各十六懸塤箎筝筑聲韻區别蓋理三稔於兹始就五聲有節八音無爽笙鏞和合不相奪倫元日備設百僚允矚雖}
