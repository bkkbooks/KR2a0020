  - {type: variant, offset: 1509, length: 1, content: 而, WYG: 韶正樂於返魯逮漢魏之間樂章復闕然博採音韻粗有篇條自魏室之興太祖之世尊崇古式舊典無墜但干戈仍用文教未淳故令司樂失治定之雅音習不典之繁曲比太樂奏其職司求與中書參議攬其所請愧感兼懷然心喪在躬未忍闕此但禮樂事}
