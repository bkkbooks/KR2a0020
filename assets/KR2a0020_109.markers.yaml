  - {type: variant, offset: 4806, length: 1022, content: 有姦臣因亂作逆殺臣兄立臣為主裁過旬日臣以陛下恩慈如天是故倉卒輕身投國歸命陛下詔曰具卿所陳理猶未盡可更言之阿那瓌再拜受詔起而言曰臣以家難輕來投闕老母在彼萬里分張本國臣民皆已迸散陛下隆恩有過天地求乞兵馬還向本國誅翦叛逆收集亡散陛下慈念賜借兵馬老母若在得生相見以申母子之恩如其死也即得報讎以雪大臣當統臨餘人奉事陛下四時之貢不敢闕絕陛下聖顏難覩敢有披陳但所欲言者口不能盡言別有辭啟謹以仰呈願垂昭覽仍以啟付舍人常景具以奏聞尋封阿那瓌朔方郡公蠕蠕王賜以衣冕加之軺蓋祿從儀衞同于戚藩十二月肅宗以阿那瓌國無定主思還綏集啟請切至詔議之時朝臣意有同異或言聽還或言不可領軍元叉為宰相阿那瓌私以金百斤貨之遂歸北二年正月阿那瓌等五十四人請辭肅宗臨西堂引見阿那瓌及其伯叔兄弟五人升階賜坐遣中書舍人穆弼宣勞阿那瓌等拜辭詔賜阿那瓌細明光人馬鎧二具鐵人馬鎧六具露絲銀纏槊二張并白眊赤漆槊十張并白眊黑漆槊十張并幡露絲弓二張并箭朱漆柘弓六張并箭黑漆弓十張并箭赤漆盾六幡并刀黑漆盾六幡并刀赤漆鼓角二十具五色錦被二領黃紬被褥三十具私府繡袍一領并帽內者緋納襖一領緋袍二十領并帽內者雜綵千段緋納小口袴褶一具內中宛具紫納大口袴褶一具內中宛具百子帳十八具黃布幕六張新乾飯一百石麥八石榛五石銅烏錥四枚柔鐵烏錥二枚各受二斛黑漆竹榼四枚各受二升婢二口父草馬五百匹駝百二十頭春戈牛一百頭羊五千口朱畫盤器十合粟二十萬石至鎮給之詔侍中崔光黃門元纂郭外勞遣阿那瓌來奔之後其從父兄俟力發婆羅門率數萬人入討示發破之示發走奔地豆于為其所殺推婆羅門為主號彌偶可社句可汗魏言安靜也時安北將軍懷朔鎮將楊鈞表傳聞彼人已立主是阿那瓌同堂兄弟夷人獸心已相君長恐未肯以殺兄之人郊迎其弟輕往虛反徒損國威自非廣加兵衆無以送其入北二月肅宗詔舊經蠕蠕使者牒云具仁往喻婆羅門迎阿那瓌復藩之意婆羅門殊自驕慢無遜避之心責具仁禮敬具仁執節不屈婆羅門遣大官莫何去汾俟斤丘升頭六人將兵二千隨具仁迎阿那瓌五月具仁還鎮論彼事勢阿那瓌慮不敢入表求還京會婆羅門為高車所逐率十部落詣涼州歸降於是蠕蠕數萬相率迎阿那瓌七月阿那瓌啟云投化蠕蠕元退社渾河旃等二人以今月二十六日到鎮云國土大亂姓姓別住迭相抄掠當今北人鵠望待拯今乞依前恩賜給精兵一萬還令督率送臣磧北撫定荒人脫蒙所請事必克濟詔付尚書門下博議八月詔兼散騎常侍王遵業馳驛宣旨慰阿那瓌并申賜賚九月蠕蠕後主俟匿伐來奔懷朔鎮阿那瓌兄也列稱規望乞軍并請阿那瓌十月錄尚書事高陽王雍尚書令李崇侍中侯剛尚書左僕射元欽侍中元叉, WYG: ''}
