  - {type: variant, offset: 4465, length: 4, content: 顯陽殿引, WYG: 岳一等移柱上下之時不使離絃不得舉絃又中絃粗細須與琴宫相類中絃須施軫如琴以軫調聲令與黃鐘一管相合中絃下依數盡出六十律清濁之節其餘十二絃須施柱如筝又凡絃皆須豫張使臨時不動即於中絃案盡一周之聲度著十二絃上然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器其瑟調以宫為主清調以商為主平調以宫為主五調各以一聲為主然後錯採衆聲以文飾之方如錦繡上來消息調準之方並史文所略出仲儒所思若事有乖此聲則不和仲儒尋準之分數精微如彼定絃緩急艱難若此而張光等親掌其事尚不知藏中有準既未識其器又焉能施絃也且燧人不師資而習火延壽不束脩以變律故云知之者欲教而無}
