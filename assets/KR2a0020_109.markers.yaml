  - {type: variant, offset: 1504, length: 2, content: 即位, WYG: 破赫連昌獲古雅樂及平涼州得其伶人器服並擇而存之後通西域又以悦般國鼓舞設於樂署髙宗顯祖無所改作諸帝意在經營不以聲律為務古樂音制罕復𫝊習舊工更盡聲曲多亡太和初髙祖垂心雅古務正音聲時司樂上書典章有闕求集中祕羣官議定其事并訪吏民有能體解古樂者與之修廣器數甄立名品以諧八音詔可雖經衆議於時卒無洞曉聲律者樂部不能立其事彌缺然方樂之制及四夷歌舞稍增列于太樂金石羽旄之飾為壯麗於往時矣五年文明太后髙祖並為歌章戒勸上下皆宣之管絃七年秋中書監髙允奏樂府歌詞陳國家王業符瑞及祖宗德美又隨時歌謡不準古舊辨雅鄭也十一年春文明太后令曰先王作樂所以和風改俗非雅曲正聲不宜庭奏可集新舊樂章參探音律除去新聲不典之曲禪增鐘縣鏗鏘之韻十五年冬髙祖詔曰樂者所以動天地感神祇調陰陽通人鬼故能闗山川之風以播德於無外由此言之治用}
