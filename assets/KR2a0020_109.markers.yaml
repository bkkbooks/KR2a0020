  - {type: variant, offset: 1511, length: 1, content: 喜, WYG: 乃為化之本自非通博之才莫能措意中書監高閭器識詳富志量明允每閭陳奏樂典頗體音律可令與太樂詳採古今以備兹典其内外有堪此用者任其參議也閭歴年考度粗以成立遇遷洛不及精盡未得施行尋屬高祖崩未幾閭卒先是閭引給事中公孫崇共考音律景明中崇乃上言樂事正}
