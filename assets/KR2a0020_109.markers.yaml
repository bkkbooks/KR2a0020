  - {type: variant, offset: 3202, length: 591, content: 遣使請和求結姻援安可孤其款意乃詔報曰所論婚事今始一反尋覽事理未允厥中夫男而下女爻象所明初婚之吉敦崇禮娉君子所以重人倫之本不敬其初令終難矣予成每懷譎詐終顯祖世更不求婚太和元年四月遣莫何去汾比拔等來獻良馬貂裘比拔等稱伏承天朝珍寶華麗甚積求一觀之乃敕有司出御府珍玩金玉文繡器物御文馬奇禽異獸及人間所宜用者列之京肆令其歷觀焉比拔見之自相謂曰大國富麗一生所未見也二年二月又遣比拔等朝貢尋復請婚焉高祖志存招納許之予成雖歲貢不絕而款約不著婚事亦停九年予成死子豆崘立號伏古敦可汗魏言也自稱太平元年豆崘性殘暴好殺其臣侯醫垔石洛候數以忠言諫之又勸與國通和勿侵中國豆崘怒誣石洛候謀反殺之夷其三族十六年八月高祖遣陽平王頤左僕射陸叡並為都督領軍斛律桓等十二將七萬騎討豆崘部內高車阿伏至羅率衆十餘萬落西走自立為主豆崘與叔父那蓋為二道追之豆崘出自浚稽山北而西那蓋出自金山豆崘頻為阿伏至羅所敗那蓋累有勝捷國人咸以那蓋為天所助欲推那蓋為主那蓋不從衆強之那蓋曰我為臣不可焉能為主衆乃殺豆崘母子以屍示那蓋那蓋乃襲位那蓋號候其伏代庫者可汗魏言悅樂也自稱太安元年那蓋死子伏圖立號他汗可汗魏言緒也自稱始平元年正始三年伏圖遣使紇奚勿六跋朝獻請求通和世宗不報其使詔有司敕勿六跋曰蠕蠕遠祖社崘是大魏叛臣往者包容暫時通使今蠕蠕衰微有損疇日大魏之德方隆周漢跨據中原指清八表正以江南未平權寬北掠通和之事未容相許若修藩禮款誠昭著者當不孤爾也, WYG: ''}
