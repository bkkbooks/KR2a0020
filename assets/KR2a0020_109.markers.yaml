  - {type: variant, offset: 6920, length: 269, content: 無裳焉秋收烏頭為毒藥以射禽獸莫槐虐用其民為部人所殺更立其弟普撥為大人普撥死子丘不勤立尚平文女丘不勤死子莫廆立本名犯太祖諱莫廆遣弟屈雲攻慕容廆廆擊破之又遣別部素延伐慕容廆於棘城復為慕容廆所破時莫廆部衆強盛自稱單于塞外諸部咸畏憚之莫死子遜昵延立率衆攻慕容廆於棘城廆子翰先戍於外遜昵延謂其衆曰翰素果勇必為人患宜先取之城不足憂也乃分騎數千襲翰翰聞之使人詐為段末波使者逆謂遜昵延曰翰數為吾患久思除之今聞來討甚善戒嚴相待宜兼路早赴翰設伏待之遜昵延以為信然長驅不備至於伏所為翰所虜翰馳使告廆乘勝遂進及晨而至廆亦盡銳應之遜昵延見而方嚴率衆逆戰前鋒始交而翰, WYG: ''}
