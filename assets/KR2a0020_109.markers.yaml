  - {type: variant, offset: 6735, length: 0, content: '', WYG: 春稚瑩表曰臣聞安上治民莫善於禮移風易俗莫善於樂易曰先王以作樂崇徳殷薦之上帝以配祖考書曰戛擊鳴球拊搏琴瑟以詠祖考來格詩言志律和聲敦敘九族平章百姓天神於焉降歆地祇可得而禮故樂以象德舞以象功干戚所以比其形容金石所以發其歌頌薦之宗廟則靈祇饗其和用之朝廷則君臣協其志樂之時義大矣哉雖復㳂革異時晦明殊位周因殷禮百世可知也太祖道武皇帝應圖受命光宅}
  - {type: page-break, offset: 6735, content: '', id: KR2a0020_WYG_109-16b, image: WYG0262/WYG0262-0702b.png}
  - {type: variant, offset: 6735, length: 0, content: '', krp: 春稚瑩表曰臣聞安上治民莫善於禮移風易俗莫善於樂易曰先王以作樂崇徳殷薦之上帝以配祖考書曰戛擊鳴球拊搏琴瑟以詠祖考來格詩言志律和聲敦敘九族平章百姓天神於焉降歆地祇可得而禮故樂以象德舞以象功干戚所以比其形容金石所以發其歌頌薦之宗廟則靈祇饗其和用之朝廷則君臣協其志樂之時義大矣哉雖復㳂革異時晦明殊位周因殷禮百世可知也太祖道武皇帝應圖受命光宅}
  - {type: variant, offset: 6736, length: 2, content: 月出, WYG: 海義合天經徳符地緯九戎荐舉五禮未詳太宗世祖重輝累耀恭宗顯祖誕隆丕基而猶經營四方匪遑制作高祖孝文皇}
  - {type: variant, offset: 6736, length: 2, content: 月出, krp: 海義合天經徳符地緯九戎荐舉五禮未詳太宗世祖重輝累耀恭宗顯祖誕隆丕基而猶經營四方匪遑制作高祖孝文皇}
