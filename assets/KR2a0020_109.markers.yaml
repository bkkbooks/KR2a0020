  - {type: variant, offset: 150, length: 240, content: 役屬於國後世祖以其無知狀類於蟲故改其號為蠕蠕車鹿會既為部帥歲貢馬畜貂豽皮冬則徙度漠南夏則還居漠北車鹿會死子吐奴傀立吐奴傀死子跋提立跋提死子地粟袁立地粟袁死其部分為二地粟袁長子匹候跋繼父居東邊次子縕紇提別居西邊及昭成崩縕紇提附衞辰而貳於我登國中討之蠕蠕移部遁走追之及於大磧南牀山下大破之虜其半部匹候跋及部帥屋擊各收餘落遁走遣長孫嵩及長孫肥追之渡磧嵩至平望川大破屋擊禽之斬以徇肥至涿邪山及匹候跋跋舉落請降獲縕紇提子曷多汗及曷多汗兄詰歸之社崘斛律等并宗黨數百人分配諸部縕紇提西遁將歸衞辰, WYG: 絃管具矣逮}
