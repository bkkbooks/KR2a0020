  - {type: variant, offset: 4000, length: 319, content: 讓以蠕蠕藩禮不備之意初豆崘之死也那蓋為主伏圖納豆崘之妻候呂陵氏生醜奴阿那瓌等六人醜奴立後忽亡一子字祖惠求募不能得有屋引副升牟妻是豆渾地萬年二十許為醫巫假託神鬼先常為醜奴所信出入去來乃言此兒今在天上我能呼得醜奴母子欣悅後歲仲秋在大澤中施帳屋齋潔七日祈請天上經一宿祖惠忽在帳中自云在天上醜奴母子抱之悲喜大會國人號地萬為聖女納為可賀敦授夫副升牟爵位賜牛馬羊三千頭地萬既挾左道亦有姿色醜奴甚加重愛信用其言亂其國政如是積歲祖惠年長其母問之祖惠言我在地萬家不嘗上天上天者地萬教也其母具以狀告醜奴醜奴言地萬懸鑒遠事不可不信勿用讒言也既而地萬恐懼譖祖惠於醜奴醜奴陰殺之正光初醜奴母遣莫何去汾李具列等絞殺地萬醜奴怒欲誅具列等又阿至羅侵醜奴醜奴擊之軍敗還為母, WYG: 芳}
