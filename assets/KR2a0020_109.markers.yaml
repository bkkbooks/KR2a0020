  - {type: variant, offset: 4445, length: 1, content: 郎, krp: 游肇孫惠蔚等四人參定舞名并鼓吹諸曲其年冬芳又上言臣聞樂者感物移風諷氓變俗先王所以教化黎}
  - {type: variant, offset: 4447, length: 1, content: 纂, WYG: 湯武所以闕一版請依京房立凖以調八音神龜二年夏有司問狀仲儒言前被符問京房準定六十之律後雖有存曉之者尠至熹平末張光等猶不能定絃之急緩聲之清濁仲儒授自何師出何典籍而云能曉但仲儒}
  - {type: variant, offset: 4447, length: 1, content: 纂, krp: 湯武所以闕一版請依京房立凖以調八音神龜二年夏有司問狀仲儒言前被符問京房準定六十之律後雖有存曉之者尠至熹平末張光等猶不能定絃之急緩聲之清濁仲儒授自何師出何典籍而云能曉但仲儒}
  - {type: variant, offset: 4449, length: 7, content: 近郊並申宴勞引, WYG: 江左之日頗授琴文嘗覽司馬彪所撰續漢書見京房準術成數昞然而張光等不能定仲儒不量庸昧竊有意焉遂竭愚思鑚研甚久雖未能測其機妙}
