  - {type: variant, offset: 1073, length: 0, content: '', WYG: 詔尚書吏部郎鄧淵定律呂恊音樂及追尊皇曽祖皇祖皇考諸帝樂用八佾舞皇始之舞皇始舞太祖所作也以明開大始祖之業後更制宗廟皇帝入廟門奏王夏太祝迎神于廟門奏迎神曲猶古降神之樂乾豆上奏登歌猶古清廟之樂曲終下奏神祚嘉神明之饗也皇帝行禮七廟奏陛歩以為行止之節皇帝出門奏總章次奏八佾舞次奏送神曲}
