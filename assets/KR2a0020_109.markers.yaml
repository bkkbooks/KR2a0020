  - {type: variant, offset: 11081, length: 1, content: 薛, WYG: 得古雅樂一部正聲歌五十曲工伎相傳間有施用自高祖遷居世宗晏駕内外多事禮物未周今日所有王夏肆夏之屬二十三曲猶得擊奏足以闡累聖之休風宣重光之盛美伏惟陛下仁格上皇義光下武道契𤣥機業隆寳祚思服典章留心軌物反堯舜之淳風復文武之境土飾宇宙之儀刑納生人於福地道德熙泰樂載新聲天成地平於是乎在樂舞之名乞垂㫖判臣等以愚昧參厠問道呈御之日伏增惶懼詔其樂名付尚書博議以聞其年夏集羣官議之瑩復議曰夫樂所以乗靈通化舞所以象物昭功金石播其風聲絲竹申其歌詠郊天祠地之道雖百世而可知奉神育民之理經千載而不昧是以黃帝作咸池之樂顓頊有承雲之舞堯為大章舜則大韶禹為大夏湯為大濩周曰大武秦曰壽人漢為大予魏名大鈞晋曰正德雖三統互變五運代降莫不述作相因徽號殊别者也皇魏道格三才化清四宇奕世載德累葉重光或以文教興邦或以武功平亂功成治定於是乎在及主上龍飛載造景命惟新書軌自同典刑罔二覆載均於兩儀仁澤被於四海五聲有序八音克諧樂舞之名宜以詳定案周兼六代之樂聲律所施咸有次第滅學以後經禮散亡漢來所存二舞而已請以韶武為崇德武舞為章烈總名曰嘉成漢樂章云髙張四縣神來燕饗宗廟所設宫懸明矣計五郊天神尊於人鬼六宫陰極體同至尊理無減降宜皆用宫懸其舞人冠服制裁咸同舊式庶得以光賛鴻功敷揚大業録尚書事長孫稚已下六十人同議申奏詔曰王者功成作樂治定制禮以成為號良無間然又六代之舞者以大為名今可準古為大成也凡音樂以舞為主故}
