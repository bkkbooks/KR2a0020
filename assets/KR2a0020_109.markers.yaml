  - {type: variant, offset: 9381, length: 1697, content: 之而還至漠南聞高車東部在巳尼陂人畜甚衆去官軍千餘里將遣左僕射安原等討之司徒長孫翰尚書令劉潔等諫世祖不聽乃遣原等并發新附高車合萬騎至于巳尼陂高車諸部望軍而降者數十萬落獲馬牛羊亦百餘萬皆徙置漠南千里之地乘高車逐水草畜牧蕃息數年之後漸知粒食歲致獻由是國家馬及牛羊遂至于賤氈皮委積高宗時五部高車合聚祭天衆至數萬大會走馬殺牲遊遶歌吟忻忻其俗稱自前世以來無盛於此會車駕臨幸莫不忻悅後高祖召高車之衆隨車駕南討高車不願南行遂推袁紇樹者為主相率北叛遊踐金陵都督宇文福追討大敗而還又詔平北將軍江陽王繼為都督討之繼先遣人慰勞樹者樹者入蠕蠕尋悔相率而降高車之族又有十二姓一曰泣伏利氏二曰吐盧氏三曰乙旃氏四曰大連氏五曰窟賀氏六曰達薄干氏七曰阿崘氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏先是副伏羅部為蠕蠕所役屬豆崘之世蠕蠕亂離國部分散副伏羅阿伏至羅與從弟窮奇俱統領高車之衆十餘萬落太和十一年豆崘犯塞阿伏至羅等固諫不從怒率所部之衆西叛至前部西北自立為王國人號之曰候婁匐勒猶魏言大天子也窮奇號候倍猶魏言儲主也二人和穆分部而立阿伏至羅居北窮奇在南豆崘追討之頻為阿伏至羅所敗乃引衆東徙十四年阿伏至羅遣商胡越者至京師以二箭奉貢云蠕蠕為天子之賊臣諫之不從遂叛來至此而自豎立當為天子討除蠕蠕高祖未之信也遣使者于提往觀虛實阿伏至羅與窮奇遣使者薄頡隨于提來朝貢其方物詔員外散騎侍郎可足渾長生復與于提使高車各賜繡袴褶一具雜綵百匹窮奇後為肽噠所殺虜其子彌俄突等其衆分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人置之高平鎮阿伏至羅長子蒸阿伏至羅餘妻謀害阿伏至羅阿伏至羅殺之阿伏至羅又殘暴大失衆心衆共殺之立其宗人跋利延為主歲餘肽噠伐高車將納彌俄突國人殺跋利延迎彌俄突而立之彌俄突既立復遣朝貢又奉表獻金方一銀方一金杖二馬七匹駝十頭詔使者慕容坦賜彌俄突雜綵六十匹世宗詔之曰卿遠據沙外頻申誠款覽揖忠志特所欽嘉蠕蠕肽噠吐谷渾所以交通者皆路由高昌掎角相接今高昌內附遣使迎引蠕蠕往來路絕姦勢不得妄令羣小敢有陵犯擁塞王人罪在不赦彌俄突尋與蠕蠕主伏圖戰於蒲類海北為伏圖所敗西走三百餘里伏圖次於伊吾北山先是高昌王麴嘉表求內徙世宗遣孟威迎之至伊吾蠕蠕見威軍怖而遁走彌俄突聞其離駭追擊大破之殺伏圖於蒲類海北割其髮送於孟威又遣使獻龍馬五匹金銀貂皮及諸方物詔東城子亮報之賜樂器一部樂工八十人赤紬十匹雜綵六十匹彌俄突遣其莫何去汾屋引叱賀真貢其方物肅宗初彌俄突與蠕蠕主醜奴戰敗被禽醜奴繫其兩脚於駑馬之上頓曳殺之漆其頭為飲器其部衆悉入肽噠經數年肽噠聽彌俄突弟伊匐還國伊匐既復國遣使奉表於是詔遣使者谷楷等拜為鎮西將軍西海郡開國公高車王伊匐復大破蠕蠕蠕蠕主婆羅門走投涼州正光中伊匐遣使朝貢因乞朱畫步挽一乘并幔褥鞦元𡈼一副傘扇各一枚青曲蓋五枚赤漆扇五枚鼓角十枚詔給之伊匐後與蠕蠕戰敗歸其弟越居殺伊匐自立天平中越居復為蠕蠕所破伊匐子比適復殺越居而自立興和中比適又為蠕蠕所破越居子去賓自蠕蠕來奔齊獻武王欲招納遠人上言封去賓為高車王拜安北將軍肆州刺史既而病死初太祖時有吐突隣部在女水上常與解如部相為脣齒不供職事登國三年太祖親西征渡弱洛水復西行趣其國至女水上討解如部落破之明年春盡略徙其部落畜產而還又有紇突隣與紇奚世同部落而各有大人長帥擁集種類常為寇於意辛山登國五年太祖勒衆親討焉慕容驎率師來會大破之紇突隣大人屋地鞬紇奚大人庫寒等皆舉部歸降皇始二年車駕伐中山軍於栢肆慕容寶夜來攻營軍人驚走還於國路由并州遂反將攻晉陽并州刺史元延討平之紇突隣部帥匿物尼紇奚部帥叱奴根等復聚黨反於陰館南安公元順討之不克死者數千人太祖聞之遣安遠將軍庾岳還討匿物尼等皆殄之又有侯呂隣部衆萬餘口常依險畜牧登國中其大人叱伐為寇於苦水河八年夏太祖大破之并禽其別帥焉古延等薛干部常屯聚於三城之間及滅衞辰後其部帥太悉伏望軍歸順太祖撫安之車駕還衞辰子屈丐奔其部太祖聞之使使詔太悉伏執送之太悉伏出屈丐以示使者曰今窮而見投寧與俱亡何忍送之遂不遣太祖大怒車駕親討之會太悉伏先出擊曹覆寅官軍乘虛遂屠其城獲太悉伏妻子珍寶徙其人而還太悉伏來赴不及遂奔姚興未幾亡歸嶺北上郡以西諸鮮卑雜胡聞而皆應之天賜五年屈丐盡劫掠總服之及, WYG: ''}
