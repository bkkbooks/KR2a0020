  - {type: variant, offset: 2450, length: 456, content: 寇也留其兄乞列歸與北鎮諸軍相守敬崇等破乞列歸于陰山之北獲之乞列歸歎曰沮渠陷我也獲其伯父他吾無鹿胡及其將帥五百人斬首萬餘級吳提聞而遁走道生追之至于漠南而還真君四年車駕幸漠南分四道樂安王範建寧王崇各統十五將出東道樂平王督十五將出西道車駕出中道中山王辰領十五將為中軍後繼車駕至鹿渾谷與賊將遇吳提遁走追至頞根河擊破之車駕至石水而還五年復幸漠南欲襲吳提吳提遠遁乃還吳提死子吐賀真立號處可汗魏言唯也十年正月車駕北伐高涼王那出東道略陽王羯兒出西道車駕與景穆自中道出涿邪山吐賀真別部帥尒綿他拔等率千餘家來降是時軍行數千里吐賀真新立恐懼遠遁九月車駕北伐高涼王那出東道略陽王羯兒出中道與諸軍期會於地弗池吐賀真悉國精銳軍資甚盛圍那數十重那掘長圍堅守相持數日吐賀真數挑戰輒不利以那衆少而固疑大軍將至解圍夜遁那引軍追之九日九夜吐賀真益懼棄輜重踰穹隆嶺遠遁那收其輜重引軍還與車駕會於廣澤略陽王羯兒盡收其人戶畜產百餘萬自是吐賀真遂單弱遠竄邊疆息警矣太安四年車駕北征騎十萬車十五萬兩旌旗千里遂渡大漠吐賀真遠遁其莫弗烏朱駕頹率衆數千落來降乃刊石記, WYG: 茂}
