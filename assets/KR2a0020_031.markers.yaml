  - {type: variant, offset: 3252, length: 224, content: 右曹尚書仍加散騎常侍從征劉義隆至江賜爵會稽公加冠軍將軍高宗時除涇州刺史和平五年卒子彌真襲爵彌真卒無子弟狀德襲爵地干弟侯頭襲地干職為庫部尚書侯頭弟力斤亦以忠謹聞歷位御史中尉并州刺史有政績加冠軍將軍賜爵晉陽侯卒贈平南將軍力斤弟焉陳尚書安樂侯古真族玄孫聿字成興性耿介肅宗時為武衞將軍是時領軍元叉秉權百僚莫不致敬而聿獨長揖不拜尋出為平西將軍東涼州刺史涼州緋色天下之最叉送白綾二千匹令聿染拒而不許叉諷御史劾之驛徵至京覆驗無狀還復任尋卒於州時年五十贈安北將軍朔, WYG: 郎燕}
