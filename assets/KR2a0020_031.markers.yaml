  - {type: variant, offset: 172, length: 4, content: 慕容寶并, WYG: 以烈留守之重宻報凶問烈處分行留神色無變世宗即位寵任如前咸陽王禧為宰輔權重當時曾遣家僮傳言於烈曰須舊羽林虎賁執仗出入領軍可為差遣烈曰天子諒闇事歸宰輔領軍但知典掌宿衞有詔不敢違理無私給奴惘然而返傳烈言報禧禧復遣謂烈曰我是天子兒天子叔元輔之命與詔何異烈厲色而答曰向者亦不道王非是天子兒叔若是詔應遣官人所由遣私奴索官家羽林烈頭可得羽林不可得禧惡烈剛直遂議出之乃授使持節散騎常侍征北將軍恒}
