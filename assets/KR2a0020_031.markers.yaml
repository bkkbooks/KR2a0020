  - {type: variant, offset: 23, length: 2, content: 昭成, WYG: 能左右馳射武藝過人登國中拜冠軍將軍假新安子後與寜朔將軍公孫蘭領歩騎二萬濳自太原從韓信故道開井陘路襲慕容寶於中山既而車駕後至見道路修理大悦即賜其名馬及趙魏平定太祖置酒髙㑹謂栗磾曰卿即吾之黥彭大賜金帛進假新安公太祖田於白登山見熊將數子顧謂栗磾曰卿勇幹如此寜能搏之乎對曰天地之性人為貴若摶之不勝豈不虛斃一壯士自可驅致御前坐而制之尋皆擒獲太祖顧而謝之永興中關東羣盗大起西河反叛栗磾受命征伐所向皆平即以本號留鎮平陽轉鎮逺將軍河内鎮將賜爵新城男栗磾撫導新邦甚有威惠劉裕之伐姚泓也栗磾慮其北擾遂築壘於河上親自守焉禁防嚴宻斥候不通裕甚憚之不敢前進裕遺栗磾書逺引孫權求討關羽之事假道西上題書曰黒矟公麾下栗磾以狀表聞太宗許之因授黑矟將軍栗磾好持黑矟以自標裕望而異之故有是語奚斤之征虎牢也栗磾别率所部攻徳宗河南太守王涓之於金墉涓之棄城遁走遷豫州刺史將軍如故進爵新安侯洛陽雖歴代所都乆為邊裔城闕蕭條野無烟火栗磾刋闢榛荒勞來安集徳刑既設甚得百姓之心太宗南幸盟津謂栗磾曰河可橋乎栗磾曰杜預造橋遺事可想乃編次大船構橋於冶坂六軍既濟太宗深歎美之世祖之征赫連昌敕栗磾與宗兵將軍交趾侯周幾襲陜城昌𢎞農太守曹逹不戰而走乗勝長驅仍至三輔進爵為公加安南將軍平統萬遷蒲坂鎮將時𢎞農河内上黨三郡賊起栗磾討之轉虎牢鎮大將加督河内軍尋遷使持節都督兗桓二州諸軍事鎮南將軍枋頭都將又為外都大官平刑折獄甚有聲稱卒年七十五賜東園祕器朝服一具衣一襲贈太尉公栗磾自少治戎迄於白首臨事善斷所向無前加以謙虛下士刑罰不濫世祖甚悼惜之子洛㧞襲爵少以功臣子拜侍御中散有姿容善應對恭慎小心世祖甚加愛寵因賜名焉車駕征討恒在侍衞擢領監御曹事從征涼州既平賜奴婢四十口轉監御曹令恭宗之在東宫厚加禮遇洛㧞以恭宗雖則儲君不冝逆自結納恒畏避屛退左轉領候宫曹事頃之襲爵出為使持節散騎常侍寜東將軍和龍鎮都大將營州刺史以治有能名進號安東將軍又為外都大官㑹隴西屠各王景文等恃險竊命私署王侯髙宗詔洛㧞與南陽王惠夀督四州之衆討平之徙其惡黨三千餘家於趙魏轉拜侍中殿中尚書遷尚書令侍中如故在朝祗肅百寮惮之太安四年卒}
