  - {type: variant, offset: 55, length: 4, content: 禦侮左右, WYG: 駕南征加鎮南將軍及遷洛陽人情戀本多有異議髙祖問烈曰卿意云何烈曰陛下聖畧淵逺非愚管所測若隐心而言樂遷之與戀舊唯中半耳髙祖曰卿既不唱異即是同深感不言之益宜且還舊都以鎮代邑敕留臺庶政一相參委車駕幸代執烈手曰宗廟至重翼衞不輕卿當祗奉靈駕時遷洛邑朕以此事相託顧非不重也烈與髙陽王雍奉遷神主於洛陽髙祖嘉其勳誠遷光禄卿十九年大選百僚烈子登引例求進烈表曰臣上或近臣下不決引一人疑而恩出分外冀荷榮禄當今聖明之朝理應謙讓而臣子登引人求進是臣素無教訓請乞黜落髙祖曰此乃有識之言不謂烈能辨此乃引見登詔曰朕今創理新邑明揚天下卿父乃行謙讓之表而有直士之風故進卿為}
  - {type: page-break, offset: 55, content: '', id: KR2a0020_WYG_031-5a, image: WYG0261/WYG0261-0456c.png}
