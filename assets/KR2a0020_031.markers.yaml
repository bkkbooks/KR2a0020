  - {type: variant, offset: 785, length: 306, content: 率衆鎮北境威名甚著蠕蠕憚之後為都督北部諸軍事平北將軍真定侯給殿中細拾隊加旌旗鼓吹蠕蠕每犯塞翰拒擊有功進爵為公世祖即位徵還京師進封平陽王加安集將軍蠕蠕大檀之入寇雲中世祖親征之遣翰率北部諸將尉眷自參合以北擊大檀別帥阿伏干於柞山斬首數千級獲馬萬餘匹又與東平公娥青出長川以討大檀大檀衆北遁追擊克獲而還尋遷司徒襲赫連昌破之世祖復征昌翰與廷尉道生宗正娥清率騎三萬為前驅昌戰敗奔上邽翰以八千騎追之至高平不及而還從襲蠕蠕車駕度漠大檀奔走其弟匹黎率衆赴之遇翰交戰匹黎衆潰走斬其渠帥數百人翰清正嚴明善撫將士太祖甚重之神三年薨深見悼惜為之流涕親臨其喪禮依安城王叔孫俊故事賻賜有加諡曰威陪葬金陵子平成襲爵降為公平成少以父任為中散累遷南部, WYG: ''}
