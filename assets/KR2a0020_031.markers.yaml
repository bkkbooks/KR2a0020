  - {type: variant, offset: 2610, length: 0, content: '', WYG: 冀州刺史太傅清河王等奏曰竊惟先帝升遐之初皇上登極之始四海謐然宇内晏清至於奉迎乗輿侍衞省闥斯乃臣子之常節職司之恒理不容以此為功妄開井邑臣等前議所以廣建茅土者正以畏迫威權茍免暴戾故也是以中議之際以十三日夜入為無勳唯以拒違矯令抑黜姦回㣲可褒叙以前侍中臣忠總攝文武侍中臣光乆在樞宻讃同其意故唯賞二人今尚書臣昭等無涯上訴奉敕重議案王顯隂結姦徒志為不逞高肇逺同凶逆遥搆禍端無將之罪事合洿戮而忠等徵罪唯以厥身不至孥戮又出罪人窮治不盡案律凖憲事在不輕暨皇上纂厯聖后别宫母子隔異温凊道絶皆忠等之咎過方厥勳功㣲罪重又忠專權之後擅殺樞納輙廢宰輔令朝野駭心逺近怪愕功過相除悉不合賞請悉追奪靈太后從之熙平元年春御史中尉元匡奏曰臣聞事主不以幽貞革心奉上不以趣捨虧節是以倚秦宫而慟哭復楚之功己多陟盧龍而樹勤廣魏之勳不淺而申包避賞君子於是義之田疇拒命良史所以稱美竊唯宫車晏駕天人位易正是忠臣孝子致節之秋前領軍將軍臣忠不能砥礪名行自求多福方因矯制擅相除假清官顯職歳月隆崇臣等在蕃之時乃心家國書誚往來憤氣成疚傷禮敗徳臣忠即主謹案臣忠世以鴻勳盛徳受遇累朝出入承明左右機近幸國大災肆其愚戇專擅朝命無人臣之心裴郭受寃於既往宰輔黜辱於明世又自矯為儀同三司尚書令領崇訓衞尉原其此意便欲無上自處既事在恩後宜加顯戮請御史一人令史一人就州行决崔光與忠雖同受召而謂光既儒望朝之禮宗攝心虛逺不關世務但忠以光意望崇重逼光光若不同又有危禍伏度二聖欽明深垂昭恕而自去歳正月十三日世宗晏駕以後八月一日皇太后未親覽以前諸有不由階級而權臣用命或發門下詔書或由中書宣敕擅相拜授者己經恩宥正可免其叨竊之罪既非時望朝野所知冐階而進者並求追奪靈太后令曰直繩所糺實允朝憲但忠事經肆宥又蒙特原無冝追罪餘如奏又詔曰忠以往年大諱之際開崇邑土然酬庸理乖有司執奪豈冝一謬棄其餘勳也但忠歴任禁要誠節皎然宜褒錫山河以安厥望可靈夀縣開國公邑五百戸初世宗崩後高太后將害靈太后劉騰以告侯剛剛以告忠忠請計於崔光光曰宜置胡嬪於别所嚴加守衞理必萬全計之上者忠等從之具以此意啟靈太后太后意乃安故太后深徳騰等四人並有寵授忠以毁之者多懼不免禍願還京師欲自營救靈太后不許二年四月除尚書右僕射加侍中將軍如故神龜元年三月復儀同三司疾病未拜見裴郭為祟忠自知必死表曰先帝録臣父子一介之誠昭臣家世奉公之節故申之以婚姻重之以爵禄至乃位亞三槐秩班九命自大明利見之始百官總己之初臣復得猥攝禁戎緝寧内外斯誠社稷之靈兆民之福臣何力之有焉但陛下以叡明御㝢皇太后以聖善臨朝衽席不遺簪履弗棄復乃寵窮出内榮遍宫閨外牧兩河入參百揆顧服知妖省躬識戾而臣將慎靡方致兹痾疚自去秋苦痢纒綿迄今藥石備嘗日增無損又今年己來力候轉惡㣲喘緒息振復良難鴻慈未酬伏枕涕咽臣薄福無男遺體莫嗣貪及餘生謹陳宿抱臣先飬亡第四弟第二子司徒掾永超為子猶子之念實切於心乞立為嫡傳此山河靈太后令曰于忠表如此既誠勳宜録又無子可矜臨危所祈不容致奪可特聽如請以彰殊效忠薨年五十七給東園祕器朝服一具衣一襲錢二十萬布七百疋蠟三百斤贈侍中司空公有司奏太常少卿元端議忠剛直猛暴專戇好殺案}
