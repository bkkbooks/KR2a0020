  - {type: variant, offset: 765, length: 0, content: '', WYG: 遷長水校尉尋除左右郎將領直寢元禧之謀亂也車駕在外變起倉卒未知所之忠奏曰臣世蒙殊寵乃心王室臣父領軍付留守之重計防遏有在必無所慮世宗即遣忠馳騎觀之而烈分兵嚴備果如所量世宗還宫撫背曰卿差彊人意賜帛五百匹又曰先帝賜卿名登誠為羙稱朕嘉卿忠款今改卿名忠既表貞固之誠亦所以名實相副也父憂去職未幾起復本官遷司空長史于時太傅録尚書北海王詳親尊權重將作大匠王遇多随詳所欲而給之後因公事忠於詳前謂遇曰殿下國之周公阿衡王室所須材用自應關㫖何至阿諛附勢損公恵私也遇既不寧詳亦慙謝遷征虜將軍餘如故以平元禧功封魏郡開國公食邑九百戸尋}
