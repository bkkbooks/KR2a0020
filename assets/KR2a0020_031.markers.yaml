  - {type: variant, offset: 2336, length: 0, content: '', WYG: 恒州大中正宻遣中使詔曰自比股肱褫落心膂無寄方任雖重比此為輕故輟兹外任委以内務當勤夙無怠稱朕所寄也延昌初除都官尚書加平南將軍領左衞中正如故又}
