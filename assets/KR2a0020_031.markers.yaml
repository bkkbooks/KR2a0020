  - {type: variant, offset: 770, length: 6, content: 與磨渾等拾遺, WYG: 兼武衞將軍每以鯁氣正辭為北海王詳所忿面責忠曰我憂在前見爾死不憂爾見我死時也忠曰人生於世自有定分若應死於王手避亦不免若其不爾王不能殺詳因忠表讓之際宻勸世宗以忠為列卿令解}
