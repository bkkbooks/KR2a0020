  - {type: variant, offset: 1852, length: 230, content: 目以建功效誠可嘉也寵待遂隆除平東將軍賜爵安樂子從討姚平還拜國部大人太宗初為幽州刺史加東統將軍進爵為侯長孫道生之討馮跋也諾與驍騎將軍延普率師次遼西轉寧東將軍進爵武陵公諾之在州有惠政民吏追思之世祖時薊人張廣達等二百餘人詣闕請之復除安東將軍幽州刺史改邑遼西公兄弟並為方伯當世榮之燕土亂久民戶凋散諾在州前後十數年還業者萬餘家延和中卒第八子觀襲爵卒子崘襲諾長子眷忠謹有父風太宗時執事左右為大官令時侍臣受斤亡入蠕蠕詔眷追之遂至虜庭大檀問其故眷曰受斤負罪天子逃刑在此不時執送, WYG: 位於}
