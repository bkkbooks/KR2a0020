  - {type: variant, offset: 2336, length: 0, content: '', krp: 恒州大中正宻遣中使詔曰自比股肱褫落心膂無寄方任雖重比此為輕故輟兹外任委以内務當勤夙無怠稱朕所寄也延昌初除都官尚書加平南將軍領左衞中正如故又}
  - {type: punctuation, offset: 2341, content: ，, id: KR2a0020_ZHSJ_031-bkkpn490}
  - {type: 'tls:seg', offset: 2341, content: '', id: KR2a0020_ZHSJ_031-d31p33s26}
  - {type: variant, offset: 2341, length: 0, content: '', WYG: 嘗因侍宴賜之劒杖舉酒屬忠曰卿世秉貞節故恒以禁衞相委昔以卿行忠賜名曰忠今以卿才堪禦侮以所御劔杖相賜循名取義意在不輕其出入周旋恒以自防也忠頓首陳謝遷侍中領軍將軍忠面陳讓云臣無學識不堪兼文武之任世宗曰當今學識有文者不少但心直不如卿欲使卿劬勞於下我當無憂於上及世宗崩夜中與侍中崔光遣右衞將軍侯剛迎肅宗於東宫而即位忠與門下議以肅宗幼年未親機政太尉高陽王雍屬尊望重宜入居西栢堂省决庶政任城王澄明徳茂親可為尚書令總攝百揆奏中宫請即敕授御史中尉王顯欲逞姦計與中常侍給事中孫伏連等厲色不聽寢門下之奏宫闕侍中黃門但牒六輔姓字齎來孫伏連等宻欲矯太后令以髙肇録尚書事顯與高猛為侍中忠即於殿中收顯殺之忠既居門下又總禁衞遂秉朝政權傾一時初太和中軍國多事高祖以用度不足百官之禄四分減一忠既擅權欲以惠澤自固乃悉歸所減之禄職人}
  - {type: page-break, offset: 2341, content: '', id: KR2a0020_WYG_031-11a, image: WYG0261/WYG0261-0459c.png}
  - {type: page-break, offset: 2341, content: '', id: KR2a0020_WYG_031-11b, image: WYG0261/WYG0261-0459d.png}
