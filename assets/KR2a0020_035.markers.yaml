  - {type: variant, offset: 2517, length: 1, content: 頡, WYG: 世祖從浩議南鎮諸將復表賊至而自陳兵少簡幽州以南戍兵佐守就漳水造舩嚴以為備公卿議者僉然欲遣騎五千并假署司馬楚之魯軌韓延之等令誘引邊民浩曰非上策也彼聞幽州已南精兵悉發大造舟舩輕騎在後欲存立司馬誅除劉族必舉國駭擾懼於滅亡當悉發精鋭來備北境後審知官軍有聲無實恃其先聚必喜而前行徑來至河肆其侵暴則我守將無以禦之若彼有見機之人善設權譎乘間深入虞我國虚生變不難非制敵之良計今公卿欲以威力攘賊乃所以招令速至也夫張虚聲而召實害此之謂矣不可不思後悔無及我使在彼期四月前還可待使至審而後發猶未晚也且楚之之徒是彼所忌將奪其國彼安得端坐視之故楚之徃則彼來止則彼息其勢然也且楚之等瑣才能招合輕薄無賴而不能成就大功為國生事使兵連禍結必此之羣矣臣嘗聞魯軌説姚興求入荆州至則散敗乃不免蠻賊掠賣為奴使禍及姚泓已然之效浩復陳天時不利於彼}
