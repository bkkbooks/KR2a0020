  - {type: variant, offset: 3000, length: 0, content: '', WYG: 蠕蠕師不多日潔等各欲回還後獲其生口云軍還之時去賊三十里是潔等之計過矣夫北土多積雪至冬時常避寒南徙若因其時濳軍而出必與之遇則可擒獲世祖以為然乃分軍為四道詔諸將俱㑹鹿渾海期日有定而潔恨計不用沮誤諸將無功而還事在潔傳世祖西廵詔浩與尚書順陽公蘭延都督行臺中外諸軍事世祖至東雍親臨汾曲觀叛賊薛永宗壘進軍圍之永宗出兵欲戰世祖問浩曰今日可擊不浩曰永宗未知陛下自來人心安閑北風迅疾宜急擊之湏臾必碎若待明日恐其見官軍盛大必夜遁走世祖從之永宗潰滅車駕濟河前驅告賊在渭北世祖至洛水橋賊已夜遁詔問浩曰盖呉在長安北九十里渭北地空榖草不備欲渡渭南西行何如浩對曰盖吳營去此六十里賊魁所在擊虵之法當湏破頭頭破則尾豈能復動宜乘勢先擊吳今軍往一日便到平吳之後回向長安亦一日而至一日之内未便損傷愚謂宜從北道若從南道則盖吳徐入北山卒未可平世祖不從乃渡渭南吳聞世祖至盡散入北山果如浩言軍無所克世祖悔之後以浩輔東宫之勤賜繒絮布帛各千叚著作令史太原閔湛趙郡郄標素諂事浩乃請立石銘刋載國書并勒所注五經浩贊成之㳟宗善焉遂營於天郊東三里方百三十歩用功三百萬乃訖世祖蒐于河西詔浩詣行在所議軍事浩表曰昔漢武帝患匈奴彊盛故開凉州五郡通西域勸農積榖為滅賊之資東西迭擊故漢未疲而匈奴已敝後遂入朝昔平凉州臣愚以為北賊未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虚雖有鎮戍適可禦邊而已至於大舉軍資必乏陛下以此事闊逺竟不施用如臣愚意猶如前議募徙豪彊大家充實凉土軍舉之日東西齊勢此計之得者浩又上五寅元厯表曰太宗即位元年勅臣解急就章孝經論語詩尚書春秋禮記周易三年成訖復詔臣學天文星厯易式九宫無不盡看至今三十九年晝夜無廢臣禀性弱劣力不及健婦人更無餘能是以專心思書忘寢與食至乃夢共鬼爭義遂得周公孔子之要術始知古人有虚有實妄語者多真正者少自秦始皇燒書之後經典絶滅漢髙祖以來世人妄造厯術者有十餘家皆不得天道之正大誤四千小誤甚多不可言盡臣愍其如此今遭陛下太平之世除偽從真宜改誤厯以從天道是以臣前奏造厯今始成訖謹以奏呈唯恩省察以臣厯術宣示中書博士然後施用非但時人天地鬼神知臣得正可以益國家萬世之名過於三皇五帝矣事在律厯志真君十一年六月誅浩清河崔氏無逺近范陽盧氏太原郭氏河東栁氏皆浩之姻親盡夷其族初郄標等立石銘刋國記浩盡述國事備而不典而石銘顯在衢路往來行者咸以為言事遂聞發有司按驗浩取祕書郎吏及長厯生數百人意狀浩伏受賕其祕書郎吏已下盡死浩始弱冠大原郭逸以女妻之浩晚成不曜華采故時人未知逸妻王氏}
