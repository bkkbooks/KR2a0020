  - {type: variant, offset: 1556, length: 0, content: '', WYG: 景見災修徳熒惑退舍願陛下遣諸憂虞恬神保和納御嘉福無以闇昧之説致損聖思必不得已請陳瞽言自聖化龍興不崇儲貳是以永興之始社稷㡬危今宜早建東宫選公卿忠賢陛下素所委仗者使為師傅左右信臣簡在聖心者以充賔友入總萬幾出統戎政監國撫軍六柄在手若此則陛下可以優游無為頤神養夀進御醫藥萬嵗之後國有成主民有所歸則奸宄息望旁無覬覦此乃萬世之令典塞禍之大備也今長皇子燾年漸一周明叡溫和衆情所繫時登儲副則天下幸甚立}
