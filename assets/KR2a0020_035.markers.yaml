  - {type: variant, offset: 8208, length: 465, content: 賊帥賀略孫聚衆千餘人叛于石樓真擊破之殺五百餘人是時初置長蛇鎮真率衆築城未訖而氐豪仇檀等反叛氐民咸應其衆甚盛真擊平之殺四千餘人卒城長蛇而還東平王道符反于長安殺雍州刺史魚玄明關中草草以真為長安鎮將賜爵河南公長安兵民素伏威信真到撫慰之皆怡然安靜咸陽民趙昌受劉彧署龍驤將軍扇動鄠厔二縣聚黨數百人據赤谷以叛真與雍州刺史劉邈討平之昌單騎走免後鄠縣民王稚兄弟聚二千餘人招引趙昌始平石安池陽靈武四縣人皆應之衆至五千據治谷堡時詔南郡王李惠等領步騎六千討昌真以大軍未至慮昌滋蔓與雍州刺史劉邈討昌昌出營拒戰真擊破之斬昌及賊首三千餘級傳首京師并誅其黨與七百餘人獲男女一千餘口雍州民夷莫不震伏在鎮數年甚著威稱延興二年卒歸葬京師諡曰烈子延字契胡提頗有氣幹襲爵河南公累遷歷長安鎮將拜安南將軍濟州刺史例降改封汝陽侯京兆王愉為徐州刺史以延為愉府司馬帶彭城內史正始初除武川鎮將入除太僕卿都督沃野武川懷朔三鎮諸軍事安北將軍懷朔鎮大將加散騎常侍正光初拜金紫光祿大夫復除太僕卿受使綏慰秀容為牧子所害弟什夤太府卿平東將軍光祿大夫建義初拜都官尚書卒於平南將軍光祿大夫呂洛拔代人, WYG: 神}
