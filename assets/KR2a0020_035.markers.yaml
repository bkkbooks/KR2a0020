  - {type: variant, offset: 1545, length: 3, content: 嶺山通, WYG: 雖然太祖用漠北醇樸之人南入中地變風易俗化洽四海自與羲農齊烈臣豈能仰名太宗曰屈丐何如浩曰屈丐家國夷滅一身孤寄為姚氏封殖不思樹黨彊隣報讎雪耻乃結忿於蠕蠕背徳於姚興撅豎小人無大經略正可殘暴終為人所滅耳太宗大悦語至中夜賜浩御縹醪酒十觚水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同其㫖也三年彗星出}
