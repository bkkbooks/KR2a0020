  - {type: variant, offset: 1653, length: 1, content: 征, WYG: 避居西宫時隐而窺之聼其決斷大悦謂左右侍臣曰長孫嵩宿徳舊臣歴事四世功存社稷奚斤辯㨗智謀名聞遐邇安同曉解俗情明練於事穆觀達於政要識吾㫖趣崔浩博聞彊識精於天人之㑹丘堆雖無大用然在公專謹以此六人輔相吾與汝曹遊行四境伐叛柔服可得志於天下矣羣臣時奏所疑太宗曰此非我所知當決之汝曹國主也㑹聞劉裕死太宗欲取洛陽虎牢滑臺浩曰陛下不以劉裕欻起納其使貢裕亦敬事陛下不幸今死乘喪伐之雖得之不令春秋晉士匄帥師侵齊聞齊侯卒乃還君子犬其不伐喪以為恩足以感孝子義足以動諸侯今國家亦未能一舉而定江南宜遣人弔祭存其孤弱恤其凶災布義風於天下令徳之事也若此則化被荆揚南金象齒羽毛之珍可不求而自至裕新死黨與未離兵臨其境必相率拒戰功不可必不如緩之待其惡稔如其彊臣爭權變難必起然後命將揚威可不勞士卒而收淮北之地太宗鋭意南伐詰浩曰劉裕因姚興死而滅其國裕死我伐之何為不可浩固執曰興死二子交爭裕乃伐之太宗大怒不從浩言遂遣奚斤南伐議於監國之前曰先攻城也先略地也斤曰請先攻城浩曰南人長於守城苻氏攻襄陽經年不拔今以大國之力攻其小城若不時剋挫損軍勢敵得徐嚴而來我怠彼鋭危道也不如分軍略地至淮為限列置守宰收歛租榖滑臺虎牢反在軍北絶望南救必沿}
