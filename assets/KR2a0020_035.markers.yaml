  - {type: variant, offset: 1549, length: 5, content: 門關又築塢, WYG: 津入太微經北斗絡紫㣲犯天棓八十餘日至漢而滅太宗復召諸儒術士問之曰今天下未一四方岳峙災咎之應將在何國朕甚畏之盡情以言勿有所隐咸共推浩令對浩曰古人有言夫災異之生由人而起人無釁焉妖不自作故人失}
  - {type: page-break, offset: 1549, content: '', id: KR2a0020_WYG_035-7b, image: WYG0261/WYG0261-0499d.png}
  - {type: variant, offset: 1549, length: 5, content: 門關又築塢, krp: 津入太微經北斗絡紫㣲犯天棓八十餘日至漢而滅太宗復召諸儒術士問之曰今天下未一四方岳峙災咎之應將在何國朕甚畏之盡情以言勿有所隐咸共推浩令對浩曰古人有言夫災異之生由人而起人無釁焉妖不自作故人失}
