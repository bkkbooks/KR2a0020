  - {type: variant, offset: 1683, length: 0, content: '', WYG: 左右忌浩正直共排毁之世祖雖知其能不免羣議故出浩以公歸第及有疑議召而問焉浩纖妍白晳如美婦人而性敏逹長於謀計常自比張良謂已稽古過之既得歸第因欲修服食養性之術而宼謙之有神中錄圖新經浩因師之始光中}
