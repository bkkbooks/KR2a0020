  - {type: variant, offset: 1695, length: 0, content: '', WYG: 堅不從而敗今天時人事都不和協何可舉動世祖意不決乃召浩令與淵等辯之浩難淵曰陽者徳也隂者刑也故日蝕修徳月蝕修刑夫王者之用刑大則陳諸原野小則肆之市朝戰伐者用刑之大者也以此言之三隂用兵盖得其類修刑之義也嵗星襲月年饑民流應在他國逺期十二年太白行蒼龍宿於天文為}
  - {type: variant, offset: 1695, length: 0, content: '', krp: 堅不從而敗今天時人事都不和協何可舉動世祖意不決乃召浩令與淵等辯之浩難淵曰陽者徳也隂者刑也故日蝕修徳月蝕修刑夫王者之用刑大則陳諸原野小則肆之市朝戰伐者用刑之大者也以此言之三隂用兵盖得其類修刑之義也嵗星襲月年饑民流應在他國逺期十二年太白行蒼龍宿於天文為}
  - {type: variant, offset: 1696, length: 0, content: '', WYG: 不妨北伐淵等俗生志意淺近牽於小數不達}
  - {type: page-break, offset: 1696, content: '', id: KR2a0020_WYG_035-14a, image: WYG0261/WYG0261-0503a.png}
  - {type: variant, offset: 1696, length: 0, content: '', krp: 不妨北伐淵等俗生志意淺近牽於小數不達}
  - {type: variant, offset: 1697, length: 0, content: '', WYG: 體難與逺圖臣觀天文比年以來月行掩昴至今猶然其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也夫聖明御時能行非常之事古人語曰非常之原黎民懼焉及其成功天下晏然願陛下勿疑也淵等慙而言曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而苦勞士馬也浩曰淵言天時是其所職若論形勢非彼所知斯乃漢世舊説常談施之於今不合事宜也何以言之夫蠕蠕者舊是國家北邊叛隷今誅其元惡收其善民令復舊役非無用也漠北髙凉不生蚊蚋水草美善夏則北遷田牧其地非不可耕而食也蠕蠕子弟來降貴者尚公主賤者}
  - {type: page-break, offset: 1697, content: '', id: KR2a0020_WYG_035-14b, image: WYG0261/WYG0261-0503b.png}
