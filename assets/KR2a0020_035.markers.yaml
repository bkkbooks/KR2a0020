  - {type: variant, offset: 3306, length: 2, content: 湘東, WYG: 得壻俄而女亡王深以傷恨復以少女繼婚逸及親屬以為不可王固執與之逸不能違遂重結好浩非毁佛法而妻郭氏敬好釋典時時讀誦浩怒取而焚之捐灰於厠中及浩幽執置之檻内送於城南使衛士數十人溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以為報應之驗也初浩構害李順基萌已成夜夢秉火爇順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之悉投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虚事夫以火爇人暴之極也階亂兆禍復已招也商書曰惡之易也如火之燎於原不可向邇其猶可撲滅乎且兆始惡者有終殃積不善者無餘慶厲階成矣}
