  - {type: variant, offset: 1852, length: 3, content: 屈丐犯, WYG: 昌在座淵等自以無先言慙赧而不能對世祖大悦謂公卿曰吾意决矣亡國之臣不可與謀信矣哉而保太后猶難之復令羣臣於保太后前評議世祖謂浩曰此等意猶不伏卿善曉之令悟既罷朝或有尤浩者曰今呉賊南宼而舍之北伐行師千里其誰不知若蠕蠕逺遁前無所獲後有南賊之患危之道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國以來南人恐懼揚聲動衆以衛淮北彼北我南彼勞我息其勢然矣比破蠕蠕往還之間故不見其至也何以言之劉裕得闗中留其愛子精兵數萬良將勁卒猶不能固守舉軍盡没號哭之聲至今未已如何正當國家休明之世士馬彊盛之時而欲以駒犢齒虎口也設令國家與之}
  - {type: page-break, offset: 1852, content: '', id: KR2a0020_WYG_035-15b, image: WYG0261/WYG0261-0503d.png}
  - {type: variant, offset: 1852, length: 3, content: 屈丐犯, krp: 昌在座淵等自以無先言慙赧而不能對世祖大悦謂公卿曰吾意决矣亡國之臣不可與謀信矣哉而保太后猶難之復令羣臣於保太后前評議世祖謂浩曰此等意猶不伏卿善曉之令悟既罷朝或有尤浩者曰今呉賊南宼而舍之北伐行師千里其誰不知若蠕蠕逺遁前無所獲後有南賊之患危之道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國以來南人恐懼揚聲動衆以衛淮北彼北我南彼勞我息其勢然矣比破蠕蠕往還之間故不見其至也何以言之劉裕得闗中留其愛子精兵數萬良將勁卒猶不能固守舉軍盡没號哭之聲至今未已如何正當國家休明之世士馬彊盛之時而欲以駒犢齒虎口也設令國家與之}
  - {type: variant, offset: 1856, length: 0, content: '', WYG: 南彼必不能守之自量不能守是以必不來若或有衆備邊之軍耳夫見瓶水之凍知天下之寒嘗肉一臠識鑊中之味物有其類可推而得也且蠕蠕恃其絶逺謂國家力不能至自寛來久故夏則散衆放畜秋肥乃聚背寒向溫南來宼抄今出其慮表攻其不備大軍卒至必驚駭星分望塵奔走牡馬䕶羣牝馬戀駒驅馳難制不得水草未過數日則聚而困敝可一舉而滅蹔勞永逸長久之利時不可失也唯患上無此意今聖慮已決發曠世之謀如何止之陋矣哉公卿也諸軍遂行天師謂浩曰是行也如之何果可克乎浩對曰天時形勢必克無疑但恐諸將瑣瑣前後顧慮不能乘勝深入使不全舉耳及軍入其境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍搜討東}
