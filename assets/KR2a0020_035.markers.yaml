  - {type: 'tls:seg', offset: 1551, content: '', id: KR2a0020_ZHSJ_035-d35p12s27}
  - {type: variant, offset: 1555, length: 0, content: '', WYG: 下則變見於上天事恒象百代不易漢書載王莽簒位之前彗星出入正與今同國家主尊臣卑上下有序民無異望唯僭晉卑削主弱臣彊累世陵遲故桓元逼奪劉裕秉權彗孛者惡氣之所生是為僭晉將滅劉裕簒之之應也諸人莫能易浩言太宗深然之五年裕果廢其主司馬徳文而自立南鎮上裕改元赦書時太宗幸東南潟滷池射鳥聞之驛召浩謂之曰往年卿言彗星之占驗矣朕於今日始信天道初浩父疾篤浩乃剪爪截髪夜在庭中仰禱斗極為父請命求以身代叩頭流血嵗餘不息家人罕有知者及父終居喪盡禮時人稱之襲爵白馬公朝廷禮儀優文策詔軍國書記盡闗於浩浩能為雜説不長屬文而留心於制度科律及經術之言作家祭法次序五宗蒸嘗之禮豐儉之節義理可觀性不好老荘之書每讀不過數十行輒棄之曰此矯誣之説不近人情必非老子所作老聃習禮仲尼所師豈設敗法之書以亂先王之敎袁生所謂家人筐篋中物不可揚於王庭也太宗恒有微疾怪異屢見乃使中貴人密問於浩曰春秋星孛北斗七國之君皆將有咎今兹日蝕於胃昴盡光趙代之分野朕疾彌年療治無損恐一旦奄忽諸子竝少將如之何其為我設圖後之計浩曰陛下春秋富盛聖業方融徳以除災幸就平愈且天道懸逺或消或應昔}
  - {type: page-break, offset: 1555, content: '', id: KR2a0020_WYG_035-8a, image: WYG0261/WYG0261-0500a.png}
  - {type: page-break, offset: 1555, content: '', id: KR2a0020_WYG_035-8b, image: WYG0261/WYG0261-0500b.png}
