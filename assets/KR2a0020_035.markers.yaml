  - {type: variant, offset: 1663, length: 0, content: '', WYG: 隨軍為謀主及車駕之還也浩從太宗幸西河太原登憇髙陵之上下臨河流傍覽川域慨然有感遂與同寮論五等郡縣之是非考秦始皇漢武帝之違失好古識治時伏其言天師宼謙之每與浩言聞其論古治亂之迹常自夜達旦竦意歛容無有懈倦既而歎羙之曰斯言也惠皆可底行亦當今之臯繇也但}
