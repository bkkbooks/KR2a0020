  - {type: variant, offset: 690, length: 1, content: 給, WYG: 拜博士祭酒賜爵武城子常授太宗經書每至郊祠父子竝乘軒軺時人榮之太宗好隂陽術數聞浩説易及洪範五行善之因命浩筮吉凶參觀天文考定疑惑浩綜覈天人之際舉其綱紀諸所處决多有應驗恒與軍國大謀甚為寵密是時有兔在後宫驗問門官無從得入太宗怪之命浩推其咎徴浩以為當有隣國貢嬪嬙者善應也明年姚興果獻女神瑞二年秋榖不登太史令王亮蘇坦因華隂公主等言讖書國家當治鄴應大樂五十年勸太宗遷都浩興特進周澹言於太宗曰今國家遷都於鄴可救今年之飢非長久之䇿也東州之人常謂國家居廣漠之地民畜無算號稱牛毛之衆今留守舊都分家南徙恐不滿諸州之地参居郡縣處榛林之間不便水土疾疫死傷情見}
