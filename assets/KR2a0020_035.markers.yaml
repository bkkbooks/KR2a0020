  - {type: variant, offset: 692, length: 119, content: 中任職用事轉大長秋世祖征赫連昌遣斤部造攻具進爵淮南公加平北將軍時并州胡酋田卜謀反誅餘衆不安遣斤鎮慮虒以撫慰之斤綏靜胡魏甚收聲稱劉義隆遣將到彥之寇河南世祖西征赫連定以斤為衞兵將軍鎮蒲坂關隴平斤徙鎮長安假節鎮西將軍斤遂驕矜不順法度信用左右調役, WYG: 露則}
