  - {type: variant, offset: 7378, length: 162, content: 率宗族歸國太祖善之尚華陰公主賜爵其思子與其弟並為上賓入八議太宗即位進大肥為內都大官增爵為侯神瑞中為都將討越勒部於跋那山大破之泰常初復為都將領禁兵討蠕蠕獲其大將莫孤渾宜城王奚斤之攻虎牢也大肥與娥清領十二軍出中道略地高平金鄉東至泰山假大肥使持節安陽公鎮撫陳汝世祖初復與奚斤出雲中白道討大檀破之還為內都大官出除使持節冀青二州刺史假, WYG: ''}
