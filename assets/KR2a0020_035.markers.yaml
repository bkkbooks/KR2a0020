  - {type: variant, offset: 2132, length: 380, content: 光猶增日月之曜先臣同往因聖運歸身太祖竭誠勠力立効於險難之中臣以頑闇忝備股肱陛下恩育委以朝政思展微誠仰報恩澤而魯元姦佞構成貝錦天威遂加合門俱戮此乃命也非臣之枉但魯元外類忠貞內懷姦詐而陛下任以腹心恐釁發肘腋臣與魯元生為怨人死為讎鬼非以私故謗毀魯元不復眷眷披露誠款原弟頡頡弟聰為內侍聰弟䎱為龍驤將軍給事黃門侍郎賜爵廣宗侯原兄弟外節儉而內實積聚及誅後籍其財至數萬頡辯慧多策略最有父風太宗初為內侍長令察舉百僚糾刺姦慝無所回避嘗告其父陰事太宗以為忠特親寵之宜城王奚斤自長安追擊赫連昌至于安定頡為監軍侍御史斤以馬多疫死士衆乏糧乃深壘自固遣太僕丘堆等督租於民間為昌所敗昌遂驕矜日來侵掠芻牧者不得出士卒患之頡進計曰本奉詔誅賊今乃退守窮城若不為賊殺當以法誅進退安有生路而王公諸將晏然無謀將何以報恩塞責斤曰今若出戰則馬力不足以步擊騎終無捷理當須京師救騎至然後步陳擊於內騎兵襲其外所謂, WYG: ''}
