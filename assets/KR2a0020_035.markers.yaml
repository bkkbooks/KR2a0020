  - {type: variant, offset: 1689, length: 5, content: 光祿勳尋除, WYG: 太常卿時議討赫連昌羣臣皆以為難唯浩曰往年以來熒惑再守羽林皆成鈎已其占秦亡又今年五星併出東方利以西伐天應人和時㑹竝集不可失也世祖乃使奚斤等擊蒲坂而親率輕騎襲其都城大獲而還及世祖復討昌次其城下收衆偽退昌鼓譟而前舒陣為兩翼㑹有風雨從東南來揚沙昬㝠宦者趙倪進曰今風雨從賊後來我向彼背天不􅂇人又將士飢渴願陛下攝騎避之更待後日浩叱之曰是何言歟千里制勝一日之中豈得變易賊前行不止後已離絶宜分軍隐出掩擊不意風道在人豈有常也世祖曰善分騎奮擊昌軍大潰初太祖詔尚書郎鄧淵著國記十餘卷編年次事體例未成逮于太宗廢而不述神䴥二年詔集諸文人撰錄國書浩及弟覽髙讜鄧頴晁繼范亨黄輔等共參著作叙成國書三十卷是年議擊蠕蠕朝臣内外盡不欲行保太后固止世祖世祖皆不聼唯浩贊成策略尚書令劉潔左僕射安原等乃使黄門侍郎仇齊推赫連昌太史張淵徐辯説世祖曰今年己巳三隂之嵗嵗星襲月大白在西方不可舉兵北伐必敗雖尅不利於上又羣臣共贊和淵等云淵少時嘗諫苻堅不可南}
