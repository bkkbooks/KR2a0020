  - {type: variant, offset: 1699, length: 10, content: 冀青二州刺史同長子屈, WYG: 大夫居滿朝列又髙車號為名騎非不可臣而畜也夫以南人追之則患其輕疾於國兵則不然何者彼能逺走我亦能逺逐與之進退非難制也且蠕蠕往數入國民吏震驚今夏不乘虚掩進破滅其國至秋復來不得安臥自}
