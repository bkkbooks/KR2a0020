  - {type: variant, offset: 1118, length: 187, content: 妹沒入苻氏宮出賜劉庫仁為妻庫仁貴寵之同因隨眷商販見太祖有濟世之才遂留奉侍性端嚴明惠好長者之言登國初太祖徵兵於慕容垂事在窟咄傳同頻使稱旨遂見寵異以為外朝大人與和跋等出入禁中迭典庶事太祖班賜功臣同以使功居多賜以妻妾及隸戶三十馬二匹羊五十口加廣武將軍從征姚平於柴壁姚興悉衆救平太祖乃增築重圍以拒興同進計曰臣受遣詣絳督租見汾東有蒙坑東西三百餘里徑路不通姚興來必從汾西乘高臨下直至柴壁, WYG: 甚難}
