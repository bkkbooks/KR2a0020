  - {type: variant, offset: 3504, length: 3873, content: 陽平公諡曰定毅歷位內外稍遷殿中尚書散騎常侍賜爵常山公加安南將軍遷尚書右僕射以擒反人梁衆保加侍中本官如故後例降為侯出除使持節鎮東將軍定州刺史時太極殿成將行考室之禮引集羣臣而雪不克饗高祖曰朕經始正殿功構初成將集百僚考行大禮然同雲仍結霏雪驟零將由寡昧未能仰答天心此之不德咎竟焉在卿等宜各陳所懷以匡不逮毅稽首對曰雪霜風雨天地之常夏霂冬霰四時節今隆冬雪降固是其時又禮云雨沾服失容則廢禮自古而然不足為異高祖曰昔劉秀將濟呼沱為之冰合但朕德謝古人不能仰感天意故也後轉都督涼河二州鄯善鎮諸軍事涼州刺史車駕南伐毅表諫曰伏承六軍雲動問罪荊揚弔民淮表一同甌越但臣愚見私竊未安何者京邑新遷百姓易業公私草創生途索然兼往歲弗稔民多飢饉二三之際嗟惋易興天道悠長宜遵養時晦願抑赫斯以待後日詔曰時不自來因人則合今年人事殊非昔歲守株之唱便可停也陽九利涉豈卿所知也太和二十一年卒賜錢二十萬布二百匹丘堆代人也美容儀以忠謹親侍太宗即位拾遺左右稍遷散騎常侍與叔孫建等討滅山胡劉裕泝河西伐詔堆與建自河內次枋頭以備寇盜姚泓既滅堆留鎮并州赫連屈孑遣三千騎寇河西堆自并州與游擊將軍王洛生擊走之以功賜爵為侯世祖監國臨朝堆與太尉穆觀等為右弼世祖即位進爵臨淮公加鎮西將軍徙為太僕世祖征赫連昌堆與常山王素督步兵三萬人為後繼昌戰敗南奔世祖遣堆與宗正娥清率五千騎略地關右昌貳城守將堅守不下堆與清攻拔之詔堆班師宜城王奚斤表留堆等進平昌許之堆斤合軍與昌相拒擊士馬乏糧堆與義兵將軍封禮督租於民間士卒暴掠為昌所襲敗績堆將數百騎還城斤追擊赫連定留堆守輜重斤為定所擒堆聞而棄甲走長安復將高涼王禮棄守東走蒲坂世祖大怒遣西平公安頡斬堆延和初詔曰堆國之肺腑勳著先朝西征喪師遂從軍法國除祀絕朕甚愍之可賜其子跋爵淮陵侯加安遠將軍後征蓋吳戰沒子麟襲爵歷位駕部令出為瑕丘鎮將假平南將軍東海公遷東兗州刺史卒官娥清代人也少有將略累著戰功稍遷振威將軍劉裕遣將朱超石寇平原至畔城遁還清與長孫道生追之至河獲其將楊豐還拜給事黃門侍郎先是徒河民散居三州頗為民害詔清徙之平城清善綏撫徙者如歸太宗南巡幸鄴以清為中領軍將軍與宋兵將軍周幾等渡河略地至湖陸高平民屯聚林藪拒射官軍清等因誅數千家虜獲萬餘口賜爵須昌侯清與幾等遂鎮枋頭世祖初清自枋頭還京師假征南將軍進為東平公蠕蠕大檀徙居漠南清與平陽王長孫翰從東道出長川討之大獲而還轉宗正卿尋從征蠕蠕又從平統萬遂與奚斤追赫連昌至安定與昌相持及安頡擒昌昌弟定西走斤追之清欲尋水而往斤不從遂與斤俱為定所擒世祖克平涼乃得還後詔清鎮并州討山胡白龍於西河斬白龍父及其將帥遂屠其城遷平東將軍與古弼等東討馮文通以不急戰文通奔高麗檻車徵黜為門卒遂卒於家子延官至員外散騎常侍賜爵南平公劉尼代人也本姓獨孤氏曾祖敦有功於太祖為方面大人父婁冠軍將軍卒贈并州刺史尼少壯健有膂力勇果善射世祖見而善之拜羽林中郎賜爵昌國子加振威將軍宗愛既殺南安王余於東廟祕之惟尼知狀尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今欲立誰愛曰待還宮擢諸王子賢者而立之尼懼其有變密以狀告殿中尚書源賀賀時與尼俱典兵宿衞仍共南部尚書陸麗謀曰宗愛既立南安還復殺之今不能奉戴皇孫以順民望社稷危矣將欲如何麗曰唯有密奉皇孫耳於是賀與尚書長孫渴侯嚴兵守衞尼與麗迎高宗於苑中麗抱高宗於馬上入京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衞之士皆可還宮衆咸唱萬歲賀及渴侯登執宗愛賈周等勒兵而入奉高宗於宮門外入登永安殿以尼為內行長進爵建昌侯遷散騎常侍安南將軍又進爵東安公尋遷尚書右僕射加侍中進封為王出為征南將軍定州刺史在州清慎然率多酒醉治日甚少徵為殿中尚書加侍中特進高宗末遷司徒顯祖即位以尼有大功於先朝彌加尊重賜別戶三十皇興四年車駕北征帝親誓衆而尼昏醉兵陳不整顯祖以其功重特恕之免官而已延興四年薨子社生襲爵世宗時寧朔將軍步兵校尉熙平初卒贈龍驤將軍朔州刺史諡曰克奚眷代人也少有將略太祖時有戰功太宗時為尚書假安南將軍虎牢鎮將為寇所憚世祖初為中軍都曹尚書復鎮虎牢賜爵南陽公加使持節侍中都督豫洛二州河內諸軍事鎮南將軍開府尋徙鎮長安世祖幸美稷眷受詔督諸軍共討山胡白龍于西河破之屠其城斬首數千級虜其妻子而還世祖平姑臧遣眷討沮渠牧犍弟私署張掖太守宜得宜得奔酒泉酒泉太守無諱與宜得奔高昌獲其二城後沮渠天周復據酒泉眷討平之虜男女四千餘人世祖征蠕蠕以眷為尚書督偏將出別道詔會鹿渾海眷與中山王辰等諸大將俱後期斬于都南爵除車伊洛焉耆胡也世為東境部落帥修職貢世祖錄其誠款延和中授伊洛平西將軍封前部王賜絹一百匹綿一百斤繡衣一具金帶靴帽伊洛大悅規欲歸闕沮渠無諱斷路伊洛與無諱連戰破之時無諱卒其弟天周奪無諱子乾壽兵規領部曲伊洛前後遣使招喻乾壽等率戶五百餘家來奔伊洛送之京師又招喻李寶弟欽等五十餘人送詣敦煌伊洛又率部衆二千餘人伐高昌討破焉耆東關七城虜獲男女二百人駝千頭馬千匹以金一百斤奉獻先是伊洛征焉耆留其子歇守城而安周乘虛引蠕蠕三道圍歇并遣使謂歇曰爾父已投大魏爾速歸首當賜爾爵號歇固守連戰久之外無救援為安周所陷走奔伊洛伊洛收集遺散一千餘家歸焉耆鎮世祖嘉之正平元年詔伊洛曰歇年尚幼能固守城邑忠節顯著朕甚嘉之可遣歇詣闕伊洛令歇將弟波利等十餘人赴都正平二年伊洛朝京師賜以妻妾奴婢田宅牛羊拜上將軍王如故興安二年卒贈鎮西大將軍秦州刺史諡曰康王賜綿絹雜綵五百匹衣二十七襲葬禮依盧魯元故事歇襲爵皇興末拜使持節平西將軍豫州刺史延興三年卒子伯主襲爵波利天安二年拜立節將軍樂官侯皇興三年卒兄子洛都襲爵宿石朔方人也赫連屈孑弟文陳之曾孫也天興二年文陳父子歸闕太祖嘉之以宗女妻焉賜奴婢數十口拜為上將軍祖若豆根太宗時賜姓宿氏襲上將軍父沓干世祖時虎賁幢將從征平涼有功拜虎威將軍侍御郎賜爵漢安男轉中散遷給事兼領工曹從駕討和龍以功賜奴婢十七戶真君四年從駕討蠕蠕戰沒世祖悼惜之詔求沓干子時石年甫十一引見以幼聽歸年十三襲爵擢為中散從駕至江拜宣威將軍興光中遷侍御史拜中壘將軍進爵蔡陽子典宜官曹遷內行令從幸苑內遊獵石於高宗前走馬道峻馬倒殞絕久之乃蘇由是御馬得制高宗嘉之賜綿一百斤帛五十匹駿馬一匹改爵義陽子嘗從獵高宗親欲射虎石叩馬而諫引高宗至高原上後虎騰躍殺人詔曰石為忠臣鞚馬切諫免虎之害後有犯罪宥而勿坐賜駿馬一匹尚上谷公主拜駙馬都尉天安初遷散騎常侍吏部尚書進爵太山公為北中道都大將延興元年卒追贈太原王諡曰康葬禮依盧魯元故事太和初子倪襲爵比部侍御來大千代人也父初真從太祖避難叱候山參創業之功官至後將軍武原侯與在八議大千驍果善騎射為騎都尉永興初襲爵遷中散至於朝賀之日大千常著御鎧盤馬殿前朝臣莫不嗟歎遷內幢將典宿衞禁旅大千用法嚴明上下齊肅嘗從太宗校獵見虎在高巖上大千持矟直前刺之應手而死太宗嘉其勇壯又為殿中給事世祖踐祚與襄城公盧魯元等七人俱為常侍持仗侍衞晝夜不離左右從討赫連昌共長孫道生與賊交戰道生馬倒為賊所擊大千馳救賊衆散走大千扶道生上馬遂得免從討蠕蠕戰功居多遷征北大將軍賜爵廬陵公鎮雲中兼統白道軍事闕賊北叛大千前後追擊莫不平殄延和初車駕北伐大千為前鋒大破虜軍世祖以其壯勇數有戰功兼悉北境險要詔大千巡撫六鎮以防寇虜經略布置甚得事宜後吐京胡反以大千為都將討平之在吐京卒喪還停於平城南世祖出還見而問之左右以對世祖悼歎者良久詔曰大千忠勇盡節功在可嘉今聽喪入殯城內贈司空諡曰莊公子丘頹襲爵降為晉興侯拜安遠將軍從駕到江進右將軍和平中遷中散轉相曹都典奉事皇興四年卒贈寧南將軍陳留公諡曰簡子蕇襲爵丘頹弟提官至監御曹給事冠軍將軍兗州刺史濮陽侯太和十年卒周幾代人也父千有功太祖之世賜爵順陽侯坐事死幾少以善騎射為獵郎太宗即位為殿中侍御史掌宿衞禁兵斷決稱職遷左民尚書神瑞中并州飢民遊食山東詔幾領衆鎮博陵之魯口以安集之泰常初白澗行唐民數千家負嶮不供輸稅幾與安康子長孫道生宣示禍福逃民遂還于時郡縣斬叛胡翟猛雀於林慮山猛雀遺種竄於行唐及襄國幾追討盡誅之後為寧朔將軍拒司馬德宗將劉裕於南破毛德祖於土樓以功賜爵交阯侯世祖以幾有智勇遣鎮河南威信著于外境幾常嫌奚斤等綏撫關中失和百姓不附每至言論形於聲色斤等憚焉進號宋兵將軍率洛州刺史于栗磾以萬人襲陝城卒于軍軍人無不歎惜之歸葬京師追贈交阯公諡曰桓子步襲爵卒子安國襲爵太和中討蠕蠕失利伏法爵除豆代田代人也太宗時以善騎射為內細射從攻虎牢詔代田登樓射賊矢不虛發與奚斤前鋒先入擒劉義隆將毛德祖并長史司馬三人以功遷內三郎從討赫連昌乘勝追賊入其宮門門閉代田踰宮而出世祖壯之拜勇武將軍後從駕平昌以戰功賜奴婢十五口黃金百斤銀百斤神中討蠕蠕賜爵關中侯從討平涼擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田敕斤曰全爾身命者代田功也改爵井陘侯加散騎常侍右衞將軍領內都幢將從討和龍戰功居多遷殿中尚書賜奴婢六十口以前後軍功進爵長廣公加平東將軍從駕南討轉太子太保出為統萬鎮大將興安中卒贈侍中安東大將軍長廣王諡曰恭子求周為內三郎從駕到江賜爵五等子又進爵為侯後襲父爵為吏部尚書皇興二年卒贈征北大將軍長廣王諡曰簡子多侯襲爵周觀代人也驍勇有膂力每在軍陳必應募先登以功進為軍將長史尋轉軍將擊赫連屈丐有功賜爵安川子遷北鎮軍將世祖即位從討蠕蠕以軍功進為都副將鎮雲中神中又討蠕蠕大獲增爵為侯從征平涼進爵金城公遷為都將從破離石胡加散騎常侍轉高平鎮將觀善撫士卒號有威名真君初詔觀統五軍西討禿髮保周於張掖徙其民數百家將置於京師至武威輙與諸將私分之世祖大怒黜觀為金城侯改授內都大官出除平南將軍秦州刺史復爵金城公撫馭失和民薛永宗聚衆於汾曲以叛觀討永宗為流矢所中世祖幸蒲坂觀聞帝至驚怖而起瘡重遂卒世祖怒絕其爵子豆初為三郎遷軍將卒于長樂太守閭大肥蠕蠕人也太祖時與其弟大碸倍, WYG: ''}
  - {type: variant, offset: 3504, length: 3873, content: 陽平公諡曰定毅歷位內外稍遷殿中尚書散騎常侍賜爵常山公加安南將軍遷尚書右僕射以擒反人梁衆保加侍中本官如故後例降為侯出除使持節鎮東將軍定州刺史時太極殿成將行考室之禮引集羣臣而雪不克饗高祖曰朕經始正殿功構初成將集百僚考行大禮然同雲仍結霏雪驟零將由寡昧未能仰答天心此之不德咎竟焉在卿等宜各陳所懷以匡不逮毅稽首對曰雪霜風雨天地之常夏霂冬霰四時節今隆冬雪降固是其時又禮云雨沾服失容則廢禮自古而然不足為異高祖曰昔劉秀將濟呼沱為之冰合但朕德謝古人不能仰感天意故也後轉都督涼河二州鄯善鎮諸軍事涼州刺史車駕南伐毅表諫曰伏承六軍雲動問罪荊揚弔民淮表一同甌越但臣愚見私竊未安何者京邑新遷百姓易業公私草創生途索然兼往歲弗稔民多飢饉二三之際嗟惋易興天道悠長宜遵養時晦願抑赫斯以待後日詔曰時不自來因人則合今年人事殊非昔歲守株之唱便可停也陽九利涉豈卿所知也太和二十一年卒賜錢二十萬布二百匹丘堆代人也美容儀以忠謹親侍太宗即位拾遺左右稍遷散騎常侍與叔孫建等討滅山胡劉裕泝河西伐詔堆與建自河內次枋頭以備寇盜姚泓既滅堆留鎮并州赫連屈孑遣三千騎寇河西堆自并州與游擊將軍王洛生擊走之以功賜爵為侯世祖監國臨朝堆與太尉穆觀等為右弼世祖即位進爵臨淮公加鎮西將軍徙為太僕世祖征赫連昌堆與常山王素督步兵三萬人為後繼昌戰敗南奔世祖遣堆與宗正娥清率五千騎略地關右昌貳城守將堅守不下堆與清攻拔之詔堆班師宜城王奚斤表留堆等進平昌許之堆斤合軍與昌相拒擊士馬乏糧堆與義兵將軍封禮督租於民間士卒暴掠為昌所襲敗績堆將數百騎還城斤追擊赫連定留堆守輜重斤為定所擒堆聞而棄甲走長安復將高涼王禮棄守東走蒲坂世祖大怒遣西平公安頡斬堆延和初詔曰堆國之肺腑勳著先朝西征喪師遂從軍法國除祀絕朕甚愍之可賜其子跋爵淮陵侯加安遠將軍後征蓋吳戰沒子麟襲爵歷位駕部令出為瑕丘鎮將假平南將軍東海公遷東兗州刺史卒官娥清代人也少有將略累著戰功稍遷振威將軍劉裕遣將朱超石寇平原至畔城遁還清與長孫道生追之至河獲其將楊豐還拜給事黃門侍郎先是徒河民散居三州頗為民害詔清徙之平城清善綏撫徙者如歸太宗南巡幸鄴以清為中領軍將軍與宋兵將軍周幾等渡河略地至湖陸高平民屯聚林藪拒射官軍清等因誅數千家虜獲萬餘口賜爵須昌侯清與幾等遂鎮枋頭世祖初清自枋頭還京師假征南將軍進為東平公蠕蠕大檀徙居漠南清與平陽王長孫翰從東道出長川討之大獲而還轉宗正卿尋從征蠕蠕又從平統萬遂與奚斤追赫連昌至安定與昌相持及安頡擒昌昌弟定西走斤追之清欲尋水而往斤不從遂與斤俱為定所擒世祖克平涼乃得還後詔清鎮并州討山胡白龍於西河斬白龍父及其將帥遂屠其城遷平東將軍與古弼等東討馮文通以不急戰文通奔高麗檻車徵黜為門卒遂卒於家子延官至員外散騎常侍賜爵南平公劉尼代人也本姓獨孤氏曾祖敦有功於太祖為方面大人父婁冠軍將軍卒贈并州刺史尼少壯健有膂力勇果善射世祖見而善之拜羽林中郎賜爵昌國子加振威將軍宗愛既殺南安王余於東廟祕之惟尼知狀尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今欲立誰愛曰待還宮擢諸王子賢者而立之尼懼其有變密以狀告殿中尚書源賀賀時與尼俱典兵宿衞仍共南部尚書陸麗謀曰宗愛既立南安還復殺之今不能奉戴皇孫以順民望社稷危矣將欲如何麗曰唯有密奉皇孫耳於是賀與尚書長孫渴侯嚴兵守衞尼與麗迎高宗於苑中麗抱高宗於馬上入京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衞之士皆可還宮衆咸唱萬歲賀及渴侯登執宗愛賈周等勒兵而入奉高宗於宮門外入登永安殿以尼為內行長進爵建昌侯遷散騎常侍安南將軍又進爵東安公尋遷尚書右僕射加侍中進封為王出為征南將軍定州刺史在州清慎然率多酒醉治日甚少徵為殿中尚書加侍中特進高宗末遷司徒顯祖即位以尼有大功於先朝彌加尊重賜別戶三十皇興四年車駕北征帝親誓衆而尼昏醉兵陳不整顯祖以其功重特恕之免官而已延興四年薨子社生襲爵世宗時寧朔將軍步兵校尉熙平初卒贈龍驤將軍朔州刺史諡曰克奚眷代人也少有將略太祖時有戰功太宗時為尚書假安南將軍虎牢鎮將為寇所憚世祖初為中軍都曹尚書復鎮虎牢賜爵南陽公加使持節侍中都督豫洛二州河內諸軍事鎮南將軍開府尋徙鎮長安世祖幸美稷眷受詔督諸軍共討山胡白龍于西河破之屠其城斬首數千級虜其妻子而還世祖平姑臧遣眷討沮渠牧犍弟私署張掖太守宜得宜得奔酒泉酒泉太守無諱與宜得奔高昌獲其二城後沮渠天周復據酒泉眷討平之虜男女四千餘人世祖征蠕蠕以眷為尚書督偏將出別道詔會鹿渾海眷與中山王辰等諸大將俱後期斬于都南爵除車伊洛焉耆胡也世為東境部落帥修職貢世祖錄其誠款延和中授伊洛平西將軍封前部王賜絹一百匹綿一百斤繡衣一具金帶靴帽伊洛大悅規欲歸闕沮渠無諱斷路伊洛與無諱連戰破之時無諱卒其弟天周奪無諱子乾壽兵規領部曲伊洛前後遣使招喻乾壽等率戶五百餘家來奔伊洛送之京師又招喻李寶弟欽等五十餘人送詣敦煌伊洛又率部衆二千餘人伐高昌討破焉耆東關七城虜獲男女二百人駝千頭馬千匹以金一百斤奉獻先是伊洛征焉耆留其子歇守城而安周乘虛引蠕蠕三道圍歇并遣使謂歇曰爾父已投大魏爾速歸首當賜爾爵號歇固守連戰久之外無救援為安周所陷走奔伊洛伊洛收集遺散一千餘家歸焉耆鎮世祖嘉之正平元年詔伊洛曰歇年尚幼能固守城邑忠節顯著朕甚嘉之可遣歇詣闕伊洛令歇將弟波利等十餘人赴都正平二年伊洛朝京師賜以妻妾奴婢田宅牛羊拜上將軍王如故興安二年卒贈鎮西大將軍秦州刺史諡曰康王賜綿絹雜綵五百匹衣二十七襲葬禮依盧魯元故事歇襲爵皇興末拜使持節平西將軍豫州刺史延興三年卒子伯主襲爵波利天安二年拜立節將軍樂官侯皇興三年卒兄子洛都襲爵宿石朔方人也赫連屈孑弟文陳之曾孫也天興二年文陳父子歸闕太祖嘉之以宗女妻焉賜奴婢數十口拜為上將軍祖若豆根太宗時賜姓宿氏襲上將軍父沓干世祖時虎賁幢將從征平涼有功拜虎威將軍侍御郎賜爵漢安男轉中散遷給事兼領工曹從駕討和龍以功賜奴婢十七戶真君四年從駕討蠕蠕戰沒世祖悼惜之詔求沓干子時石年甫十一引見以幼聽歸年十三襲爵擢為中散從駕至江拜宣威將軍興光中遷侍御史拜中壘將軍進爵蔡陽子典宜官曹遷內行令從幸苑內遊獵石於高宗前走馬道峻馬倒殞絕久之乃蘇由是御馬得制高宗嘉之賜綿一百斤帛五十匹駿馬一匹改爵義陽子嘗從獵高宗親欲射虎石叩馬而諫引高宗至高原上後虎騰躍殺人詔曰石為忠臣鞚馬切諫免虎之害後有犯罪宥而勿坐賜駿馬一匹尚上谷公主拜駙馬都尉天安初遷散騎常侍吏部尚書進爵太山公為北中道都大將延興元年卒追贈太原王諡曰康葬禮依盧魯元故事太和初子倪襲爵比部侍御來大千代人也父初真從太祖避難叱候山參創業之功官至後將軍武原侯與在八議大千驍果善騎射為騎都尉永興初襲爵遷中散至於朝賀之日大千常著御鎧盤馬殿前朝臣莫不嗟歎遷內幢將典宿衞禁旅大千用法嚴明上下齊肅嘗從太宗校獵見虎在高巖上大千持矟直前刺之應手而死太宗嘉其勇壯又為殿中給事世祖踐祚與襄城公盧魯元等七人俱為常侍持仗侍衞晝夜不離左右從討赫連昌共長孫道生與賊交戰道生馬倒為賊所擊大千馳救賊衆散走大千扶道生上馬遂得免從討蠕蠕戰功居多遷征北大將軍賜爵廬陵公鎮雲中兼統白道軍事闕賊北叛大千前後追擊莫不平殄延和初車駕北伐大千為前鋒大破虜軍世祖以其壯勇數有戰功兼悉北境險要詔大千巡撫六鎮以防寇虜經略布置甚得事宜後吐京胡反以大千為都將討平之在吐京卒喪還停於平城南世祖出還見而問之左右以對世祖悼歎者良久詔曰大千忠勇盡節功在可嘉今聽喪入殯城內贈司空諡曰莊公子丘頹襲爵降為晉興侯拜安遠將軍從駕到江進右將軍和平中遷中散轉相曹都典奉事皇興四年卒贈寧南將軍陳留公諡曰簡子蕇襲爵丘頹弟提官至監御曹給事冠軍將軍兗州刺史濮陽侯太和十年卒周幾代人也父千有功太祖之世賜爵順陽侯坐事死幾少以善騎射為獵郎太宗即位為殿中侍御史掌宿衞禁兵斷決稱職遷左民尚書神瑞中并州飢民遊食山東詔幾領衆鎮博陵之魯口以安集之泰常初白澗行唐民數千家負嶮不供輸稅幾與安康子長孫道生宣示禍福逃民遂還于時郡縣斬叛胡翟猛雀於林慮山猛雀遺種竄於行唐及襄國幾追討盡誅之後為寧朔將軍拒司馬德宗將劉裕於南破毛德祖於土樓以功賜爵交阯侯世祖以幾有智勇遣鎮河南威信著于外境幾常嫌奚斤等綏撫關中失和百姓不附每至言論形於聲色斤等憚焉進號宋兵將軍率洛州刺史于栗磾以萬人襲陝城卒于軍軍人無不歎惜之歸葬京師追贈交阯公諡曰桓子步襲爵卒子安國襲爵太和中討蠕蠕失利伏法爵除豆代田代人也太宗時以善騎射為內細射從攻虎牢詔代田登樓射賊矢不虛發與奚斤前鋒先入擒劉義隆將毛德祖并長史司馬三人以功遷內三郎從討赫連昌乘勝追賊入其宮門門閉代田踰宮而出世祖壯之拜勇武將軍後從駕平昌以戰功賜奴婢十五口黃金百斤銀百斤神中討蠕蠕賜爵關中侯從討平涼擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田敕斤曰全爾身命者代田功也改爵井陘侯加散騎常侍右衞將軍領內都幢將從討和龍戰功居多遷殿中尚書賜奴婢六十口以前後軍功進爵長廣公加平東將軍從駕南討轉太子太保出為統萬鎮大將興安中卒贈侍中安東大將軍長廣王諡曰恭子求周為內三郎從駕到江賜爵五等子又進爵為侯後襲父爵為吏部尚書皇興二年卒贈征北大將軍長廣王諡曰簡子多侯襲爵周觀代人也驍勇有膂力每在軍陳必應募先登以功進為軍將長史尋轉軍將擊赫連屈丐有功賜爵安川子遷北鎮軍將世祖即位從討蠕蠕以軍功進為都副將鎮雲中神中又討蠕蠕大獲增爵為侯從征平涼進爵金城公遷為都將從破離石胡加散騎常侍轉高平鎮將觀善撫士卒號有威名真君初詔觀統五軍西討禿髮保周於張掖徙其民數百家將置於京師至武威輙與諸將私分之世祖大怒黜觀為金城侯改授內都大官出除平南將軍秦州刺史復爵金城公撫馭失和民薛永宗聚衆於汾曲以叛觀討永宗為流矢所中世祖幸蒲坂觀聞帝至驚怖而起瘡重遂卒世祖怒絕其爵子豆初為三郎遷軍將卒于長樂太守閭大肥蠕蠕人也太祖時與其弟大碸倍, krp: ''}
