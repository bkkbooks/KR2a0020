  - {type: variant, offset: 1542, length: 0, content: '', WYG: 御衣一襲絹五十疋綿五十斤初姚興死之前嵗也太史奏熒惑在匏𤓰星中一夜忽然亡失不知所在或謂下入危亡之國將為童謠妖言而後行其災禍太宗聞之大驚乃召諸碩儒十數人令與史官求其所詣浩對曰案春秋左氏傳説神降于莘其至之日各以其物祭也請以日辰推之庚午之夕辛未之朝天有隂雲熒惑之亡當在此二日之内庚之與未皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄説無徴之言浩笑而不應後八十餘日熒惑果出於東井留守盤旋秦中大旱赤地昆明池水竭童謠訛言國内諠擾明年姚興死二子交兵三年國滅於是諸人皆服曰非所及也泰常元年司馬德宗將劉裕伐姚泓舟師自淮泗入清}
  - {type: page-break, offset: 1542, content: '', id: KR2a0020_WYG_035-3b, image: WYG0261/WYG0261-0497d.png}
  - {type: variant, offset: 1542, length: 0, content: '', krp: 御衣一襲絹五十疋綿五十斤初姚興死之前嵗也太史奏熒惑在匏𤓰星中一夜忽然亡失不知所在或謂下入危亡之國將為童謠妖言而後行其災禍太宗聞之大驚乃召諸碩儒十數人令與史官求其所詣浩對曰案春秋左氏傳説神降于莘其至之日各以其物祭也請以日辰推之庚午之夕辛未之朝天有隂雲熒惑之亡當在此二日之内庚之與未皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄説無徴之言浩笑而不應後八十餘日熒惑果出於東井留守盤旋秦中大旱赤地昆明池水竭童謠訛言國内諠擾明年姚興死二子交兵三年國滅於是諸人皆服曰非所及也泰常元年司馬德宗將劉裕伐姚泓舟師自淮泗入清}
  - {type: variant, offset: 1543, length: 0, content: '', WYG: 泝河西上假道於國詔羣臣議之外朝公卿咸曰函谷闗號曰天險一人荷戈萬夫不得進裕舟舩歩兵何能西入脫我乘其後還路甚難若北上河岸其行為易揚言伐姚意或難測假其水道宼不可縱宜先發軍斷河上流勿令西過又議之内朝咸同外計太宗將從之浩曰此非上䇿司馬休之之徒擾其荆州劉裕切齒來久今興死子劣乘其危亡而伐之臣觀其意必欲入闗勁躁之人不顧後患今若塞其西路裕必上岸北侵如此則姚無事而我受敵今蠕蠕内宼民食又乏不可發軍發軍赴南則北宼進擊若其救北則東州復危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞莊刺虎兩得之勢也使裕勝也必徳我假道之恵令姚氏勝也亦不失救隣之名縱使裕得闗中縣逺難守彼不能守終為我物今不勞兵馬坐觀成敗鬭兩虎而收長久之利上䇿也夫為國之計擇利而為之豈顧婚姻酬一女子之恵哉假令國家棄恒山以南裕必不能發吳越之兵與官軍爭守河北也居然可知議者猶曰裕西入函谷則進退路窮腹背受敵北上岸則姚軍必不出闗助我揚聲西行意在北進其勢然也太宗遂從羣議遣長孫嵩發兵拒之戰於畔城為裕將朱超石所敗師人多傷太宗聞之恨不用浩計二年司馬徳宗齊郡太守王懿來降上書陳計稱劉裕在洛勸國家以軍絶其後路則裕軍可不戰而克書奏太宗善之㑹浩在前進講書傳太宗問浩曰劉裕西伐前軍已至潼闗其事如何以卿觀之事得濟不浩對曰昔姚興好養虚名而無實用子泓又病衆叛親離裕乘其危兵精將勇以臣觀之克之必矣太宗曰劉裕武能何如慕容垂浩曰裕勝太宗曰試言其狀浩曰慕容垂承父祖世君之資生便尊貴同類歸之若夜蛾之赴火少加倚仗便足立功劉裕挺出寒㣲不階尺土之資不因一卒之用奮臂大呼而夷滅桓元北擒慕容超南摧盧循等僭晉陵遲遂執國命裕若平姚而還必簒其主其勢然也秦地戎夷混并虎狼之國裕亦不能守之風俗不同人情難變欲行荆揚之化於三秦之地譬無翼而欲飛無足而欲走不可得也若留衆守之必資於宼孔子曰善人為邦百年可以勝殘去殺今以秦之難制一二年間豈裕所能哉且可}
