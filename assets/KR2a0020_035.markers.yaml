  - {type: variant, offset: 1319, length: 199, content: 制也宜截汾曲為南北浮橋乘西岸築圍西圍既固賊至無所施其智力矣從之興果視平屠滅而不能救以謀功賜爵北新侯加安遠將軍詔同送姚興將越騎校尉唐小方等於長安清河王紹之亂太宗在外使夜告同令收合百工伎巧衆皆響應奉迎太宗即位命同與南平公長孫嵩並理民訟又詔與肥如侯賀護持節循察并定二州及諸山居雜胡丁零宣詔撫慰問其疾苦糾舉守宰不法同至并州表曰竊見并州所部守宰多不奉法又刺史擅用御府鍼工古彤為晉陽令交通財賄共為姦利請案律治罪, WYG: 遷都}
