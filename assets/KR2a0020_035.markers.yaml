  - {type: variant, offset: 2999, length: 0, content: '', WYG: 若北國兵動先其未至徑前入河若其不動住彭城勿進如浩所量世祖謂公卿曰卿輩前謂我用浩計為謬驚怖固諫常勝之家始皆自謂踰人逺矣至於歸終乃不能及遷浩司徒時方士祁纖奏立四王以日東西南北為名欲以致禎吉除災異詔浩與學士議之浩對曰先王建國以作蕃屏不應假名以為其福夫日月運轉周歴四方京都所居在於其内四王之稱實奄邦畿名之則逆不可承用先是纖奏改代為萬年浩曰昔太祖道武皇帝應天受命開拓洪業諸所制置無不循古以始封代土後稱為魏故代魏兼用猶彼殷商國家積徳著在圖史當享萬億不宜假名以為益也纖之所聞皆非正義世祖從之是時河西王沮渠牧犍内有貳意世祖將討焉先問於浩浩對曰牧犍惡心已露不可不誅官軍往年北伐雖不尅獲實無所損于時行者内外軍馬三十萬匹計在道死傷不滿八千嵗常羸死恒不減萬乃不少於此而逺方承虚便謂大損不能復振今出其不意不圖大軍卒至必驚駭騷擾不知所出擒之必矣且牧犍劣弱諸弟驕恣爭權從横民心離解加比年以來天災地變都在秦涼成滅之國也世祖曰善吾意亦以為然命公卿議之𢎞農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父職貢朝廷接以蕃禮又王姬釐降罪未甚彰謂且羈縻而已今士馬勞止宜可小息又其地鹵斥略無水草大軍既到不得久停彼聞軍來必完聚城守攻則難拔野無所掠於是尚書古弼李順之徒皆曰自溫圉河以西至於姑臧城南天梯山上冬有積雪深一丈餘至春夏消液下流成川引以溉灌彼聞軍至決此渠口水不通流則致渴乏去城百里之内赤地無草又不任久停軍馬斤等議是也世祖乃命浩以其前言與斤共相難抑諸人不復餘言唯曰彼無水草浩曰漢書地理志稱凉州之畜為天下饒若無水草何以畜牧又漢人為居終不於無水草之地築城郭立郡縣也又雪之消液纔不歛塵何得通渠引漕溉灌數百萬頃乎此言大詆誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辨浩曰汝曹受人金錢欲為之辭謂我目不見便可欺也世祖隐聼聞之乃出親見斤等辭㫖嚴厲形於神色羣臣乃不敢復言唯唯而已於是遂討凉州而平之多饒水草如浩所言乃詔浩曰昔皇祚之興世隆北土積德累仁多歴年載澤流蒼生義聞四海我太祖道武皇帝協順天人以征不服應期撥亂奄有區夏太宗承統光隆前緒釐正刑典大業維新然荒域之外猶未賔服此祖宗之遺志而貽功於後也朕以𦕈身獲奉宗廟戰戰兢兢如臨淵海懼不能負荷至重繼名丕烈故即位之初不遑寧處揚威朔裔掃定赫連逮於神䴥始命史職注集前功以成一代之典自爾已來戎旗仍舉秦隴克定徐兖無塵平逋宼於龍川討孽豎於凉域豈朕一人獲濟於此賴宗廟之靈羣公卿士宣力之效也而史闕其職篇籍不著每懼斯事之墜焉公徳冠朝列言為世範小大之任望君存之命公留臺綜理史務述成此書務從實錄浩於是監秘書事以中書侍郎髙允散騎侍郎張偉參著作續成前紀至於損益襃貶折衷潤色浩所總焉及恭宗始總百揆浩復與宜都王穆夀輔政事時又將討蠕蠕劉潔復致異議世祖逾欲討之乃召問浩浩對曰往}
