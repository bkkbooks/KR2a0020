  - {type: variant, offset: 1544, length: 0, content: '', WYG: 戎束甲息民備境以待其歸秦地亦當終為國有可坐而守也太宗曰裕已入闗不能進退我遣精騎南襲彭城夀春裕亦何能自立浩曰今西北二宼未殄陛下不可親御六師兵衆雖盛而將無韓白長孫嵩有治國之用無進取之能非劉裕敵也臣謂待之不晚太宗笑曰卿量之已審矣浩曰臣嘗私論近世人物不敢不上聞若王猛之治國苻堅之管仲也慕容元恭之輔少主慕容暐之霍光也劉裕之平逆亂司馬徳宗之曹操也太宗曰卿謂先帝如何浩曰小人管窺懸象何能見𤣥穹之廣}
  - {type: page-break, offset: 1544, content: '', id: KR2a0020_WYG_035-6b, image: WYG0261/WYG0261-0499b.png}
