  - {type: variant, offset: 889, length: 1, content: 將, WYG: 過髙祖崩梓宫達魯陽乃行遺詔北海王詳奉宣遺㫖長秋卿白整等入授后藥后走呼不肯引決曰官豈有此也是諸王輩殺我耳整等執持强之乃含椒而盡殯以后禮梓宫次洛南咸陽王禧等知審死相視曰若無遺詔我兄弟亦當作計去之豈可令失行婦人宰制天下殺我輩也諡曰幽皇后𦵏長陵塋内孝文昭皇后髙氏司徒公肇之妹也父颺母蓋氏凡四男三女皆生於東裔髙祖初乃舉室西歸近龍城鎮鎮表后徳色婉豔任充宫掖及至文明太后親幸北部曹見后姿貌竒之遂入掖庭時年十三初后幼曾夢在堂内立而日光自窓中照之灼灼而熱后東西避之光猶斜照不已如是數夕后自怪之以白其父颺颺以問遼東人閔宗宗曰此竒徵也貴不可言颺曰何以知之宗曰夫日者君人之徳帝王之象也光照女身必有恩命及之女避猶照者主上來求女不獲已也昔有夢月入懐猶生天子况日照之徵此女必将被帝命誕育人君之象也遂生世宗後生廣平王懐次長樂公主及馮昭儀寵盛密有母養世宗之意后自代如洛陽暴薨於汲郡之共縣或云昭儀遣人賊后也世宗之為皇太子三日一朝幽后后拊念慈愛有加髙祖出征世宗入朝必久留后宫親視櫛沐母道隆備其後有司奏請加昭儀號諡曰文昭貴人髙祖從之世宗踐阼追尊配饗后先葬城西長陵東南陵制卑局因就起山陵號終寧陵置邑户五百家肅宗詔曰文昭皇太后徳協坤儀美符文姒作合髙祖實誕英聖而夙世淪暉孤塋弗祔先帝孝感自𠂻遷奉未遂永言哀恨義結幽明廢吕尊薄禮伸漢代又詔曰文昭皇太后尊配髙祖祔廟定號促令遷奉自終及始太后當主可更上尊號稱太皇太后以同漢晉之典正姑婦之禮廟號如舊文昭遷靈櫬於長陵兆西北六十步初開終寧陵數丈於梓宫上獲大虵長丈餘黑色頭有王字蟄而不動靈櫬既遷置虵舊處宣武順皇后于氏太尉烈弟勁之女也世宗始親政事烈時為領}
