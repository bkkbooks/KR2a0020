  - {type: variant, offset: 477, length: 9, content: 億兆同茲慶泰可大赦, WYG: 髙祖幸靈泉池燕羣臣及藩國使人諸方渠帥各令為其方舞髙祖帥羣臣上夀太后忻然作歌帝亦和歌遂命羣臣各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至襃美叡等皆引丕等參之以示無私又自以過失懼人議已小有疑忌便見誅戮迄后之崩髙祖不知所生至如李訢李恵之徒猜嫌覆滅者十餘家死者數百人率多枉濫}
