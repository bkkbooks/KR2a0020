  - {type: variant, offset: 496, length: 0, content: '', WYG: 器至於素帳縵茵瓷瓦之物亦皆不置此則遵先志從册令俱奉遺事而有從有違未達者或以致怪梓宫之裏𤣥堂之内聖靈所憑是以一一奉遵仰昭儉徳其餘外事有所不從以盡痛慕之情其宣示逺近著告羣司上明儉誨之善下彰違命之失及卒哭孝文服衰近臣從服三司已下外臣衰服者變服就練七品已下盡除即吉設祔祭於太和殿公卿已下始親公事髙祖毁瘠絶酒肉不内御者三年初髙祖孝於太后乃於永固陵東北里餘豫營夀宫有終焉瞻望之志及遷洛陽乃自表瀍西以為山園之所而方山虚宫至今猶存號曰萬年堂云文成元皇后李氏梁國蒙縣人母頓丘王峻之妹也后之生也有異於常父方叔恒言此女當大貴及長姿質美麗世祖南征永昌王仁出夀春軍至后宅因得后及仁鎮長安遇事誅后與其家人送平城宫髙宗登白樓望見美之謂左右曰此婦人佳乎左右咸曰然乃下臺后得幸於齋庫中遂有娠常太后後問后后云為帝所幸仍有娠時守庫者亦私書壁記之别加驗問皆相符同及生顯祖拜貴人太安}
