  - {type: variant, offset: 1923, length: 6203, content: 椿前司空公楊津及其家丙戌司徒公尒朱彥伯以旱遜位戊子除彥伯侍中開府儀同三司庚寅以侍中太保開府尚書令樂平王尒朱世隆為儀同三師位次上公八月庚子詔隴西王尒朱天光下文武討宿勤明達者汎三級潁川王尒朱兆率步騎二萬出井陘趨殷州李元忠棄城還信都丙午常山王尒朱度律彭城王尒朱仲遠等率衆出抗義旗九月丁丑以侍中驃騎將軍盧同驃騎大將軍杜德車騎大將軍橋寧並為儀同三司己卯以使持節都督東道諸軍事兼尚書令東道大行臺彭城王尒朱仲遠為太宰庚辰加使持節大將軍都督關中諸軍事兼尚書令西道大行臺隴西王尒朱天光為大司馬驃騎大將軍青州刺史開府儀同三司穆紹薨癸巳追尊皇考為先帝皇妣王氏為先太妃封皇弟永業為高密王皇子子恕為勃海王冬十月壬寅齊獻武王推勃海太守元朗即皇帝位於信都二年春三月齊獻武王敗尒朱天光等於韓陵夏四月辛巳齊獻武王與廢帝至邙山使魏蘭根慰諭洛邑且觀帝之為人蘭根忌帝雅德還致毀謗竟從崔𡞾議廢帝於崇訓佛寺而立平陽王脩為帝帝既失位乃賦詩曰朱門久可患紫極非情玩顛覆立可待一年三易換時運正如此唯有修真觀太昌初帝殂於門下外省時年三十五出帝詔百司赴會大鴻臚監護喪事葬用王禮加以九旒鑾輅黃屋左纛班劍百二十人二衞羽林備儀衞後廢帝諱朗字仲哲章武王融第三子也母曰程氏少稱明悟永安二年為肆州魯郡王後軍府錄事參軍儀同開府司馬元曄之建明二年正月戊子為冀州勃海太守及齊獻武王起義兵將誅暴逆乃推戴之冬十月壬寅即皇帝位於信都城西昇壇焚燎大赦稱中興元年文武百官普汎四級以齊獻武王為侍中丞相都督中外諸軍事大將軍錄尚書事大行臺增邑三萬戶以兼侍中撫軍將軍河北大使高乾邕為侍中司空公前平北將軍通直散騎常侍高敖曹為驃騎大將軍儀同三司冀州刺史以終其身以前刺史元嶷為儀同三司己酉尒朱度律尒朱仲遠斛斯椿賀拔勝賈顯智次於陽平將抗義師齊獻武王縱反間構之遂與尒朱兆相疑敗散而還辛亥齊獻武王大破尒朱兆於廣阿虜其卒五千餘人詔將士汎五級留守者二級詔征東將軍吏部尚書封隆之為使持節北道大使隨方處分十有一月己巳詔曰王度創開彝倫方始所班官秩不改舊章而無識之徒因茲僥倖謬增軍級虛名顯位皆言前朝所授理難推抑自非嚴為條制無以防其偽竊諸有虛增官號為人發糾罪從軍法若入格檢覈無名者退為平民終身禁錮庚辰齊獻武王率師攻鄴城是年南兗城民王乞德逼前刺史劉世明以州降蕭衍衍使其將元樹入據譙城二年春正月壬午拔鄴擒刺史劉誕詔諸將士汎四級封侯增邑九十七人各有差等癸未詔曰自中興草昧典制權輿郡縣之官率多行督假有正者風化未均眷彼周餘專為漁獵朕所以夙興夜寐有惕於懷有司明加糾罰稱朕意焉二月辛亥上孝莊皇帝諡曰武懷皇帝甲子以齊獻武王為大丞相柱國大將軍太師增封三萬戶并前為六萬戶三月丙寅以齊文襄王起家為驃騎大將軍儀同三司丙子以侍中車騎大將軍尚書左僕射孫騰為驃騎大將軍儀同三司丁丑車駕幸鄴乙酉詔文武家屬自信都赴鄴城閏月乙未以安北將軍光祿大夫博野縣開國伯尉景為驃騎大將軍儀同三司丙申以衞將軍金紫光祿大夫厙狄干為車騎大將軍儀同三司壬寅尒朱天光兆度律仲遠等屯於洹水之南癸丑齊獻武王出頓紫陌庚申尒朱兆率輕騎三千夜襲鄴城叩西門不克退走壬戌齊獻武王大破尒朱天光等四胡於韓陵前廢帝鎮軍將軍賀拔勝徐州刺史杜德於陳降尒朱兆走趣并州仲遠奔東郡天光度律將赴洛陽大都督斛斯椿賈顯智倍道先還夏四月甲子朔椿等據河橋懼罪自劾尋擒天光度律於河橋西北大行臺長孫稚都督賈顯智等率騎入京師執尒朱世隆彥伯斬於都街送天光度律於齊獻武王辛未前廢帝驃騎大將軍行濟州事侯景據城降仍除儀同三司兼尚書僕射南道大行臺濟州刺史甲戌以車騎將軍尚書右僕射魏蘭根為驃騎大將軍儀同三司乙亥以車騎大將軍儀同三司中軍大都督高盛兼尚書僕射北道行臺隨機處分尒朱仲遠奔蕭衍青州刺史尒朱弼為其部下馮紹隆所殺傳首京師丙子前廢帝安東將軍辛永右將軍建州大都督張悅舉城降辛巳車駕至河陽遜位於別邸太昌元年五月封安定郡王邑一萬戶後以罪殂於門下外省時年二十永熙二年葬於鄴西南野馬岡出帝諱脩字孝則廣平武穆王懷之第三子也母李氏性沉厚少言好武事始封汝陽縣開國公拜通直散騎侍郎轉中書侍郎建義初除散騎常侍尋遷平東將軍兼太常卿又為鎮東將軍宗正卿永安三年封平陽王普泰初轉侍中鎮東將軍儀同三司兼尚書右僕射又加侍中尚書左僕射中興二年夏四月安定王自以疏遠未允四海之心請遜大位齊獻武王與百僚會議僉謂高祖不可無後乃共奉王戊子即帝位於東郭之外入自東陽雲龍門御太極前殿羣臣朝賀禮畢昇閶闔門詔曰否泰相沿廢興互有玄天無所隱精靈弗能諭大魏統乾德漸區宇牢籠九服旁三光而上天降禍運踵多難禮樂崩淪憲章漂沒赫赫宗周翦為戎寇肅肅清廟將成茂草胡羯乘機肆其昏虐殺君害王刳剔海內競其吞噬之意不識醉飽之心自書契以來未有若斯者已大丞相勃海王忠存本朝精貫白日爰舉義旗志雪國故廣阿之軍貔虎奪氣鄴下之師金湯失險近者四胡相率實繁有徒驅天下之兵盡華戎之銳桴鼓暫交一朝盪滅元兇授首大憝斯擒揚旆濟河掃清伊洛士民安堵不失舊章社稷危而復安洪基毀而還構朕以託體宸極猥當樂推祗握寶圖承茲大業得以眇身託於王公之上若涉淵水罔識攸津思與兆民同茲嘉慶可大赦天下改中興二年為太昌元年詔前御史中尉樊子鵠起復本官兼尚書左僕射東南道大行臺都督儀同三司徐州刺史杜德討元樹齊獻武王上言建義之家枉為尒朱氏籍沒者悉皆蠲免帝以世易復除齊獻武王為大丞相天柱大將軍太師世襲定州刺史增封九萬并前十五萬戶庚寅加齊文襄王侍中開府儀同餘如故壬辰齊獻武王還鄴車駕餞別於乾脯山五月丙申前廢帝廣陵王殂以太傅淮陽王欣為太師封沛郡王司徒公趙郡王諶為太保侍中驃騎大將軍開府儀同三司清河王亶儀同三師使持節侍中驃騎大將軍開府儀同三司司州牧南陽王寶炬為太尉公侍中太保錄尚書事長孫稚為太傅侍中驃騎大將軍尚書左僕射元羅儀同三司尚書令驃騎大將軍吏部尚書元世儁儀同三司戊戌以齊獻武王固讓聽解天柱大將軍減封五萬戶餘悉如故辛丑以前司空高乾邕復為司空公乙巳帝幸華林都亭宴羣臣班賚有差羽林隊主唐猛突入稱慶帝以猛犯禁衞杖之猛辭色有忤斬之階下丁未詔曰無侮惸獨事炳前經惠此魚眾寡聲留往冊朕以薄德作民父母乃眷元元寤言增歎今理運惟新哀矜伊始如有孤老疾病無所依歸者有司明加隱括依格賑贍又詔曰理有一準則民無覬覦法啟二門則吏多威福前主為律後主為令歷世永久實用滋章非所以準的庶品隄防萬物可令執事之官四品以上集於都省取諸條格議定一途其不可施用者當局停記新定之格勿與舊制相連務在約通無致冗滯己酉以侍中驃騎大將軍儀同三司清河王亶為司徒公庚戌詔曰頃西土年飢百姓流徙或身倚溝渠或命懸道路皆見棄草土取厭烏鳶言念於此有警夜寐掩骼之禮誠所庶幾行墐之義冀亦可勉其諸有露屍令所在埋覆可宣告天下乙卯詔外內解嚴六月癸亥朔帝於華林園納訟丙寅蠕蠕肽噠高麗契丹庫莫奚國並遣使朝貢丁卯太尉公司州牧南陽王寶炬坐事降為驃騎大將軍開府王如故歸第令羽林衞守改諡武懷皇帝曰孝莊癸酉蠕蠕肽噠國遣使朝貢戊寅詔內外百司普汎六級在京百僚加中興四級義師將士並加軍汎六級在鄴百官三級河北同義之州兩級河橋建義者加五級關西二級諸受建明普泰封爵汎級優特之階悉追己卯帝臨顯陽殿納訟乙酉高麗契丹庫莫奚國遣使朝貢丙戌以前驃騎大將軍開府儀同三司斛斯椿還為前官詔曰間者凶權誕恣法令變常遂立夷貊輕賦冀收天下之意隨以箕斂之重終納十倍之征掩目捕雀何能過此朕屬念蒸黎無忘寢食加田桑始事生業未滋若頓依常格或不周展今歲租調且兩收一丐來年復舊辛卯以使持節衞大將軍儀同三司尚書左僕射賈顯度為驃騎大將軍開府儀同三司秋七月乙未詔曰頃永安馭運載育皇儲遂錫汎階以申國慶近經普泰便爾中追今罪人既殄舊章斯復宜述往旨用卒前恩皇子汎二級悉可還授文穆廟汎故宜停寢若已受者依例追之庚子以驃騎大將軍開府南陽王寶炬為太尉公壬寅齊獻武王率衆入自滏口大都督厙狄干入自井陘討尒朱兆乙巳齊獻武王以尒朱天光尒朱度律送之京師斬於都巿己酉以兼尚書左僕射東南道大行臺樊子鵠為儀同三司庚戌詔侍中驃騎將軍左光祿大夫高隆之為使持節驃騎大將軍儀同三司兼尚書左僕射北道行臺率步騎十萬趨太行會齊獻武王隆之解行臺仍為大丞相軍司齊獻武王次於武鄉尒朱兆大掠晉陽北走秀容并州平乙卯帝臨顯陽殿親理寃獄丙辰以宗師東萊王貴平為車騎大將軍儀同三司是月夏州徙民郭遷據宥州反刺史元嶷棄城走詔行臺侯景率齊州刺史尉景濟州刺史蔡儁等攻討之城陷遷奔蕭衍東南道大行臺樊子鵠大破蕭衍軍於譙城擒其鄴王元樹及譙州刺史朱文開八月壬戌朔齊文襄王來朝燕射班賚部下各有差丁卯以西中郎將元寧為高平王甲戌以車騎大將軍左光祿大夫李琰之為儀同三司庚寅以車騎將軍左光祿大夫崔秉為驃騎大將軍儀同三司辛卯以車騎將軍右光祿大夫高岳為驃騎大將軍儀同三司九月癸未以侍中驃騎大將軍左光祿大夫封津為儀同三司庚子帝幸華林都亭引見元樹及公卿百僚蕃使督將等宴射班賚各有差癸卯燕郡開國公賀拔允進爵為王乙巳帝幸都水南過洛汭遂至澗己酉復田于北原癸丑以太師沛王欣為廣陵王前廢帝子勃海王子恕改封沛郡王甲寅以侍中驃騎大將軍封隆之任祥並為儀同三司以車騎大將軍河南尹元仲景為驃騎大將軍儀同三司乙卯車駕謁山陵丙辰蠕蠕高昌國遣使朝貢庚申以衞將軍前吏部尚書李神雋撫軍將軍右衞將軍婁昭並為驃騎大將軍儀同三司冬十月甲子以使持節衞將軍光州刺史高仲密為車騎大將軍儀同三司丁卯以車騎大將軍左光祿大夫潘蠻為儀同三司己卯以車騎大將軍左光祿大夫高琛為特進驃騎開府儀同三司庚寅以使持節驃騎將軍肆州刺史劉貴為驃騎大將軍儀同三司十有一月甲午以車騎將軍揚州刺史斛斯敦為驃騎大將軍儀同三司丁酉日南至車駕有事於圓丘戊戌朝會百官於太極前殿甲辰安定王朗及東海王曄坐事死乙巳蠕蠕國遣使朝貢己酉以前太尉公汝南王悅為侍中大司馬開府葬靈太后胡氏十有二月丙寅以驃騎大將軍領御史中尉綦雋為儀同三司乙亥以侍中廣平王贊為驃騎大將軍開府儀同三司丁亥殺大司馬汝南王悅大赦天下改太昌為永興以太宗號尋改為永熙元年二年春正月庚寅朔朝饗羣臣于太極前殿甲午齊獻武王自晉陽出討尒朱兆丁酉大