  - {type: variant, offset: 9, length: 2, content: 紀第, WYG: 及賔卒速侯等欲因帝㑹䘮為變語頗漏泄帝聞之知其終不奉順乃先圖之於是伏勇士於宫中晨起以佩刀殺后馳使告速侯等言后暴崩速侯等驚走來赴因執而殺之文帝皇后封氏生桓穆二帝早崩昭帝立乃葬焉髙宗初穿天淵池獲一石銘稱桓帝葬母封氏逺近赴會二}
