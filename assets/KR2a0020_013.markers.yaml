  - {type: variant, offset: 33, length: 4, content: 諱恭字脩, WYG: 平文崩昭成在襁褓時國有内難将害諸皇子后匿帝於袴中懼人知呪曰若天祚未終者汝便無聲遂良久不啼得免於難昭成初欲定都於灅源川築城郭起宫室議不決后聞之曰國自上世遷徙為}
  - {type: variant, offset: 33, length: 4, content: 諱恭字脩, krp: 平文崩昭成在襁褓時國有内難将害諸皇子后匿帝於袴中懼人知呪曰若天祚未終者汝便無聲遂良久不啼得免於難昭成初欲定都於灅源川築城郭起宫室議不決后聞之曰國自上世遷徙為}
