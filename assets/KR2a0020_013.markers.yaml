  - {type: variant, offset: 891, length: 0, content: '', WYG: 總心膂之任以嬪御未備因左右諷諭稱后有容徳世宗乃迎入為貴人時年十四甚見寵愛立為皇后謁于太廟后静黙寛容性不妬忌生皇子昌三嵗夭殁其後暴崩宫禁事祕莫能知悉而世議歸咎于髙夫人𦵏永泰陵諡曰順皇后宣武皇后髙氏文昭皇后弟偃之女也世宗納為貴人生皇子早夭又生建徳公主後拜為皇后甚見禮重性妬忌宫人希得進御及肅宗即位上尊號曰皇太后尋為尼居瑶光寺非大節慶不入宫中建徳公主始五六嵗靈太后恒置左右撫愛之神龜元年太后出覲母武邑君時天文有變靈太后欲以后當禍是夜暴崩天下寃之䘮還瑶光佛寺殯𦵏皆以尼禮初髙祖幽后之寵也欲専其愛後宫接御多見阻遏髙祖時言于近臣稱婦人妬防雖王者亦不能免况士庶乎世宗暮年髙后悍忌夫人嬪御有至帝崩不蒙侍接者由是在洛二十餘年皇子全育者惟肅宗而已宣武靈皇后胡氏安定臨涇人司徒國珍女也母皇甫氏産后之日赤光四照京兆山北縣有趙胡者善於卜相國珍問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也后姑為尼頗能講道世宗初入講禁中積數嵗諷左右稱后姿行世宗聞之乃召入掖庭為承華世婦而椒掖之中以國舊制相與祈祝皆願生諸王公主不願生太子唯后每謂夫人等言天子豈可獨無兒子何縁畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后固意確然幽夜獨誓云但使所懐是男次第當長子子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻䘮皇子自以春秋長矣深加慎護為擇乳保皆取良家宜子者養於别宫皇后及充華嬪皆莫得而撫視焉及肅宗踐阼尊后為皇太妃後尊為皇太后臨朝聴政猶稱殿下下令行事後改令稱詔羣臣上書曰陛下自稱曰朕太后以肅宗冲幼未堪親祭欲傍周禮夫人與君交獻之義代行祭禮訪尋故式門下召禮官博士議以為不可而太后欲以幃幔自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后薦祭故事太后大悅遂攝行初祀太后性聰悟多才藝姑既為尼幼相依託畧得佛經大義親覽萬幾手筆斷決幸西林園法流堂命侍臣射不能者罰之又自射針孔中之大悅賜左右布帛有差先是太后勅造申訟車時御焉出自雲龍大司馬門從宫西北入自千秋門以納寃訟又親策孝秀州郡計吏於朝堂太后與肅宗幸華林園宴羣臣于都亭曲水令王公已下各賦七言詩太后詩曰化光造物含氣貞帝詩曰恭已無為賴慈英王公已下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺親建刹於九級之基僧尼士女赴者數萬人及改𦵏文昭髙后太后不欲令肅宗主事乃自為䘮主出至終寧陵親奠遣事還哭於太極殿至於訖事皆自主焉後幸嵩髙山夫人九嬪公主已下從者數百人昇于頂中廢諸淫祀而胡天神不在其列後幸左蔵王公嬪主已下從者百餘人皆令任力負布絹即以賜之多者過二百匹少者百餘匹唯長樂公主手持絹二十匹而出示不異衆而無勞也世稱其廉}
