  - {type: variant, offset: 216, length: 119, content: 莊帝崩尒朱世隆等以元曄疏遠又非人望所推以王潛默晦身有過人之量將謀廢立恐實不語乃令王所親申其意且兼迫脅王遂答曰天何言哉世隆等大悅春二月己巳曄進至邙南世隆等奉王東郭之外行禪讓之禮羣臣上表曰否泰沿時殷憂啟聖故六飛在御三石興符伏惟陛下運屬千齡智周, WYG: 登尊極省決}
