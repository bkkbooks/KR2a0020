  - {type: variant, offset: 1091, length: 2, content: 丁丑, WYG: 所厭穢文武解體所在亂逆土崩魚爛由於此矣僧敬又因聚集親族遂涕泣諫曰陛下母儀海内豈宜輕脫如此后大怒自是不召僧敬太后自以行不修懼宗室所嫌於是内為朋黨防蔽耳目肅宗所親幸者太后多以事害焉有蜜多道人能胡語肅宗置於左右太后慮其𫝊致消息三月三日於城南大巷中殺之方懸賞募賊又於禁中殺領左右鴻臚少卿谷㑹紹達並帝所親也母子之間嫌隙屢起鄭儼慮禍乃與太后計因潘充華生女太后詐以為男便大赦改年肅宗之崩事出倉卒時論咸言鄭儼徐紇之計於是朝野憤歎太后乃奉潘嬪女言太子即位經數日見人心已安始言潘嬪本實生女今宜更擇嗣君遂立臨洮王子釗為主年始三嵗天下愕然及武泰元年尒朱榮稱兵渡河太后盡召肅宗六宫皆令入道太后亦自落髪榮遣騎拘送太后及幼主於河隂太后對榮多所陳說榮拂衣而起太后及幼主並沉於河太后妹馮翊君收瘞於雙靈佛寺出帝時始葬以后禮而追}
