  - {type: variant, offset: 470, length: 2, content: 薄撫, WYG: 㓜纂寶歴仰恃慈明緝寧四海欲報之徳正覺是憑諸鷙鳥傷生之類宜放之山林其以此地為太皇太后經始靈塔於是罷鷹師曹以其地為報徳佛寺太后與髙祖遊于方山顧瞻川阜有終焉之志因謂羣臣曰舜𦵏蒼梧二妃不從豈必逺祔山陵然後為貴哉吾百年之後神其安此髙祖乃詔有司營建夀陵於方山又起永固石室将終為清廟焉太和五年起作八年而成刋石立碑頌太后功徳太后以髙祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇文多不載太后立文宣王廟於長安又立思燕佛圖於龍城皆刋石立碑太后又制内屬五廟之孫外戚六親緦麻皆受復除性儉素不好華飾躬御縵繒而已宰人上膳案裁徑尺羞膳滋味減於故事十分之八太后嘗以體不安服菴䕡子宰人昏而進粥有蝘蜒在焉后舉匕得之髙祖侍側大怒将加極罰太后笑而釋之自太后}
