  - {type: variant, offset: 567, length: 3, content: 尒朱兆, WYG: 劉昶子婦也年少婺居北平公馮夙后之同母弟也后求婚於髙祖髙祖許之公主志不願后欲强之婚有日矣公主密與侍婢及家僮十餘人乗輕車冒霖雨赴懸瓠奉謁髙祖自陳本意因言后與菩薩亂狀髙祖聞而駭愕未之全信而祕匿之惟}
