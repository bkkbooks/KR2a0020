  - {type: variant, offset: 564, length: 2, content: 潁川, WYG: 制薨髙祖仁恕不欲襲前事而禀文明太后意故不果行諡曰貞皇后𦵏金陵及恂以罪賜死有司奏追廢后為庻人孝文廢皇后馮氏太師熙之女也太和十七年髙祖既終䘮太尉元丕等表以長秋未建六宫無主請正内位髙祖從之立后為皇后髙祖每遵典禮后及夫嬪以下妾御皆以次進車駕南伐后留京師髙祖又南征后率六宫遷洛陽及后父熙兄誕薨髙祖為書慰以敘哀情及車駕還洛恩遇甚厚髙祖後重引后姊昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規為内主譖構百端尋廢后為庻人后貞謹有徳操遂為練行尼後終於瑶光佛寺孝文幽皇后亦馮熙女母曰常氏本微賤得幸於熙熙元妃公主薨後遂主家事生后與北平公夙文明太皇太后欲家世貴寵乃簡熙二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未幾疾病文明太后乃遣還家為尼髙祖猶留念焉嵗餘而太后崩髙祖服終頗存訪之又聞后素疹痊除遣閹官雙三念璽書勞問遂迎赴洛陽及至寵愛過初専寢當夕宫人稀復進見拜為左昭儀後立為皇后始以疾歸頗有失徳之聞髙祖頻嵗南征后遂與中官髙菩薩私亂及髙祖在汝南不豫后便公然醜恣中常侍雙蒙等為其心腹中常侍劇鵬諫而不從憤懼致死是時彭城公主宋}
