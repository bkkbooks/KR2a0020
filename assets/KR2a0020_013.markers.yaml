  - {type: variant, offset: 38, length: 1, content: 廣, WYG: 今事難之後基業未固若城郭而居一旦寇來難卒遷動乃止烈帝之崩國祚殆危興復大業后之力也十八年崩𦵏雲中金}
  - {type: page-break, offset: 38, content: '', id: KR2a0020_WYG_013-3b, image: WYG0261/WYG0261-0209d.png}
  - {type: variant, offset: 38, length: 1, content: 廣, krp: 今事難之後基業未固若城郭而居一旦寇來難卒遷動乃止烈帝之崩國祚殆危興復大業后之力也十八年崩𦵏雲中金}
  - {type: variant, offset: 40, length: 1, content: 惠, WYG: 太祖即位配饗太廟昭成皇后慕容氏元真之女也初帝納元真妹為妃未幾而崩元真復請繼好遣大人長孫秩逆后元真送于境上后至有寵生獻明帝及秦明}
  - {type: variant, offset: 40, length: 1, content: 惠, krp: 太祖即位配饗太廟昭成皇后慕容氏元真之女也初帝納元真妹為妃未幾而崩元真復請繼好遣大人長孫秩逆后元真送于境上后至有寵生獻明帝及秦明}
  - {type: variant, offset: 42, length: 1, content: 羽, WYG: 后性聰敏多知沉厚善決斷専理内事每事多從初昭成遣衛辰兄悉勿祈還部落也后戒}
  - {type: variant, offset: 42, length: 1, content: 羽, krp: 后性聰敏多知沉厚善決斷専理内事每事多從初昭成遣衛辰兄悉勿祈還部落也后戒}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 曰汝還必深防衛辰辰姦猾終當滅汝悉勿祈死其子果為衛辰所殺卒如后言建國二十三年崩太祖即位配饗太廟獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖苻洛之内侮也后與太祖及故臣吏避難北徙俄而髙車奄來抄掠后乗車與太祖避賊而南中路失轄后懼仰天而告曰國家𦙍胄豈止爾絶滅也惟神靈扶助遂馳輪正不傾行百餘里至七介山南而得免難後劉顯使人将害太祖帝姑為顯弟亢埿妻知之密以告后梁眷亦來告難后乃令太祖去之后夜飲顯使醉向晨故驚廐中羣馬顯使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之故顯不使急追太祖得至賀蘭部羣情未甚歸附后從弟外朝大人悅舉部隨從供奉盡禮顯怒将害后后夜奔亢埿家匿神車中三日亢埿舉室請救乃得免會劉顯部亂始得亡歸後后弟染干忌太祖之得人心舉兵圍逼行宫后出謂染干曰汝等今安所置我而欲殺吾}
  - {type: page-break, offset: 44, content: '', id: KR2a0020_WYG_013-4a, image: WYG0261/WYG0261-0210a.png}
  - {type: page-break, offset: 44, content: '', id: KR2a0020_WYG_013-4b, image: WYG0261/WYG0261-0210b.png}
  - {type: variant, offset: 44, length: 0, content: '', krp: 曰汝還必深防衛辰辰姦猾終當滅汝悉勿祈死其子果為衛辰所殺卒如后言建國二十三年崩太祖即位配饗太廟獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖苻洛之内侮也后與太祖及故臣吏避難北徙俄而髙車奄來抄掠后乗車與太祖避賊而南中路失轄后懼仰天而告曰國家𦙍胄豈止爾絶滅也惟神靈扶助遂馳輪正不傾行百餘里至七介山南而得免難後劉顯使人将害太祖帝姑為顯弟亢埿妻知之密以告后梁眷亦來告難后乃令太祖去之后夜飲顯使醉向晨故驚廐中羣馬顯使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之故顯不使急追太祖得至賀蘭部羣情未甚歸附后從弟外朝大人悅舉部隨從供奉盡禮顯怒将害后后夜奔亢埿家匿神車中三日亢埿舉室請救乃得免會劉顯部亂始得亡歸後后弟染干忌太祖之得人心舉兵圍逼行宫后出謂染干曰汝等今安所置我而欲殺吾}
  - {type: punctuation, offset: 46, content: ，, id: KR2a0020_ZHSJ_013-bkkpn4}
  - {type: 'tls:seg', offset: 46, content: '', id: KR2a0020_ZHSJ_013-d13p2s5}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 染干慙而去後后少子秦王觚使于燕慕容垂止之后以觚不返憂念寢疾皇始元年崩時年四十六祔𦵏于盛樂金陵後追加尊諡配饗焉道武皇后慕容氏寶之季女也中山平入充掖庭得幸左丞相衛王儀等奏請立皇后帝從羣臣議令后鑄金人成乃立之告於郊廟封后}
  - {type: page-break, offset: 46, content: '', id: KR2a0020_WYG_013-5a, image: WYG0261/WYG0261-0210c.png}
  - {type: variant, offset: 46, length: 0, content: '', krp: 染干慙而去後后少子秦王觚使于燕慕容垂止之后以觚不返憂念寢疾皇始元年崩時年四十六祔𦵏于盛樂金陵後追加尊諡配饗焉道武皇后慕容氏寶之季女也中山平入充掖庭得幸左丞相衛王儀等奏請立皇后帝從羣臣議令后鑄金人成乃立之告於郊廟封后}
  - {type: variant, offset: 47, length: 0, content: '', WYG: 孟為溧陽君後崩道武宣穆皇后劉氏劉眷女也登國初納為夫人生華隂公主後生太宗后専理内事寵待有加以鑄金人不成故不得登后位魏故事後宫産子将為儲貳其母皆賜死太祖未年后以舊法薨太宗即位追尊諡號配饗太廟自此後宫人為帝母皆正位配饗焉明元昭哀皇后姚氏姚興女也興封西平長公主太宗以后禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸之出入居處禮秩如后焉是後猶欲正位而后謙讓不當泰常五年薨帝追恨之贈皇后璽綬而後加諡焉葬雲中金陵明元密皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宫有寵生世祖及太宗即位拜貴嬪泰常五年薨諡}
  - {type: page-break, offset: 47, content: '', id: KR2a0020_WYG_013-5b, image: WYG0261/WYG0261-0210d.png}
  - {type: page-break, offset: 47, content: '', id: KR2a0020_WYG_013-6a, image: WYG0261/WYG0261-0211a.png}
  - {type: variant, offset: 47, length: 0, content: '', krp: 孟為溧陽君後崩道武宣穆皇后劉氏劉眷女也登國初納為夫人生華隂公主後生太宗后専理内事寵待有加以鑄金人不成故不得登后位魏故事後宫産子将為儲貳其母皆賜死太祖未年后以舊法薨太宗即位追尊諡號配饗太廟自此後宫人為帝母皆正位配饗焉明元昭哀皇后姚氏姚興女也興封西平長公主太宗以后禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸之出入居處禮秩如后焉是後猶欲正位而后謙讓不當泰常五年薨帝追恨之贈皇后璽綬而後加諡焉葬雲中金陵明元密皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宫有寵生世祖及太宗即位拜貴嬪泰常五年薨諡}
  - {type: variant, offset: 48, length: 0, content: '', WYG: 密貴嬪𦵏雲中金陵世祖即位追尊號諡配饗太廟又立后廟于鄴刺史四時薦祀以魏郡太后所生之邑復其調役後甘露降于廟庭髙宗時相州刺史髙閭表修后廟詔曰婦人外成理無獨祀隂必配陽以成天地未聞有萃之國立太姒之饗此乃先皇所立一時之至感非經世之逺制便可罷祀先是世祖保母竇氏初以夫家坐事誅與二女俱入宫操行純備進退以禮太宗命為世祖保母性仁慈勤撫導世祖感其恩訓奉養不異所生及即位尊為保太后後尊為皇太后封其弟漏頭為遼東王太后訓釐内外甚有聲稱性恬素寡欲喜怒不形於色好揚人之善隐人之過世祖征凉州蠕蠕呉提入宼太后命諸将擊走之真君元年崩時年六十三詔天下大臨三日太保盧魯元監護䘮事諡曰恵𦵏崞山從后意也初后嘗登崞山顧謂左右曰吾母養帝躬敬神而愛人若死而不滅必不為賤鬼然於先朝本無位次不可違禮以從園陵此山之上可以終託故葬焉别立后寢廟於崞山建碑頌徳太武皇后赫連氏赫連屈丐女也世祖平統萬納后及二妹俱為貴人後立為皇后髙宗初崩袝𦵏金陵太武敬哀皇后賀氏代人也初為夫人生恭宗神䴥元年薨追贈貴嬪葬雲中金陵後追加號諡配饗太廟景穆恭皇后郁久閭氏河東王毗妹也少以選入東宫有寵真君元年生髙宗世祖末年薨髙宗即位追尊號諡𦵏雲中金陵配饗太廟髙宗乳母常氏本遼西人太延中以事入宫世祖選乳髙宗慈和履順有劬勞保護之功髙宗即位尊為保太后尋為皇太后謁於郊廟和平元年崩詔天下大臨三日諡曰昭𦵏於廣甯磨笄山俗謂之鳴鷄山太后遺志也依恵太后故事别立寢廟置守陵二百家樹碑頌徳文成文明皇后馮氏長樂信都人也父朗秦雍二州刺史西城郡公母樂浪}
