  - {type: variant, offset: 488, length: 0, content: '', WYG: 寃之十四年崩於太和殿時年四十九其日有雄雉集于太華殿髙祖酌飲不入口五日毁慕過禮諡曰文明太皇太后葬於永固陵日中而反虞於鑒𤣥殿詔曰尊旨從儉不申罔極之痛稱情允禮仰損儉訓之徳進退思惟倍用崩感又山陵之節亦有成命内則方丈外裁揜坎脱於孝子之心有所不盡者室中可二丈墳不得過三十餘步今}
