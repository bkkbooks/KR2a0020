  - {type: variant, offset: 498, length: 0, content: '', WYG: 太后令依故事令后具條記在南兄弟及引所結宗兄洪之悉以付託臨訣每一稱兄弟輙拊胷慟泣遂薨後諡曰元皇后𦵏金陵配饗太廟獻文思皇后李氏中山安喜人南郡王恵之女也姿徳婉淑年十八以選入東宫顯祖即位}
