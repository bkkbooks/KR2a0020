  - {type: variant, offset: 573, length: 6, content: 尒朱仲遠隴西, WYG: 侍疾左右具知其事此後后漸憂懼與母常氏求託女巫禱厭無所不至願髙祖疾不起一旦得如文明太后輔少主稱命者賞報不貲又取三牲宫中妖祠假言祈福専為左道母常或自詣宫中或遣侍婢與相報答髙祖自豫州北幸鄴后慮還見治檢彌懐危怖驟令閹人託參起居皆賜之衣裳殷勤託寄勿使漏洩亦令雙蒙充行省其信不然惟小黄門蘇興夀密陳委曲髙祖問其本末勅以勿洩至洛執問菩薩雙蒙等六人迭相證舉具得情狀髙祖以疾卧含温室夜引后并列菩薩等於戸外后臨入令閹人搜衣中稍有寸刃便斬后頓首泣謝乃賜坐東楹去御筵二丈餘髙祖令菩薩等陳狀又讓后曰汝母有妖術可具言之后乞屏左右有所密啓髙祖勅中侍悉出唯令長秋卿白整在側取衛直刀拄之后猶不言髙祖乃以綿堅塞整耳自小語呼整再三無所應乃令后言事隐人莫知之髙祖乃喚彭城北海二}
