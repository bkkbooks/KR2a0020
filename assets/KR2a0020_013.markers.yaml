  - {type: variant, offset: 1170, length: 752, content: 南陽王寶炬侍中征東將軍平陽王脩並儀同三司乙酉詔簡北來及在京二官員外剩置者己丑以持節驃騎將軍涇州刺史賀拔岳為儀同三司岐州刺史使持節車騎大將軍渭州刺史侯莫陳悅為儀同三司秦州刺史庚寅詔天下有德孝仁賢忠義志信者可以禮召赴闕不應召者以不敬論丙申劉靈助率衆次於安國城定州刺史侯淵破斬之傳首京師戊戌以使持節侍中車騎大將軍斛斯椿侍中衞將軍元受並特進儀同三司詔曰頃官方失序仍令沙汰定員簡剩已有判決退下之徒微亦可愍諸在簡下可特優一級皆授將軍預參選限隨能補用是春冠軍將軍南青州刺史茹懷朗使其部將何寶率步騎三千擊蕭衍守將於琅邪擒其尚書左僕射儀同三司雲麾將軍徐兗二州刺史劉相如夏四月癸卯幸華林都亭燕射班錫有差太樂奏伎有倡優為愚癡者帝以非雅戲詔罷之壬子有事於太廟癸丑詔以齊獻武王為使持節侍中都督冀州諸軍事驃騎大將軍開府儀同三司大都督東道大行臺冀州刺史驃騎大將軍安定王尒朱智虎為開府儀同三司肆州刺史乙卯以右衞將軍賀拔勝武衞將軍大野拔並為儀同三司己未帝於顯陽殿簡試通直散騎常侍散騎侍郎通直郎剩員非才他轉之癸亥隴西王尒朱天光大破宿勤明達擒送京師斬之丙寅以侍中驃騎大將軍尒朱彥伯為司徒公詔有司不得復稱偽梁罷細作之條無禁鄰國往還詔員外諫議大夫步兵校尉奉車都尉羽林監給事中積射將軍奉朝請殿中將軍宮門僕射殿中司馬督治禮郎十一官得俸而不給力老合外選者依常格其未老欲外選者聽解其七品以上朔望入朝若正員有闕隨才進補前員外簡退優階者追之稱事簡下者仍優一級先是南陽太守趙脩延執刺史李琰之五月丙子荊州城民斬脩延送首還推琰之為刺史尒朱仲遠使其都督魏僧勗等討崔祖螭於東陽擒斬之六月庚申齊獻武王以尒朱逆亂始興義兵於信都西定殷州斬其刺史尒朱羽生命南趙郡太守李元忠為刺史鎮廣阿癸亥帝臨顯陽殿親理寃訟戊辰以使持節驃騎大將軍開府尒朱弼為儀同三司秋七月壬申尒朱世隆等害前太保, WYG: ''}
