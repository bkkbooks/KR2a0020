  - {type: variant, offset: 580, length: 2, content: 尒朱, WYG: 令入坐言昔是汝嫂今乃他人但入勿避二王固辭不獲命及入髙祖云此老嫗乃欲白刃揷我肋上可窮問本末勿有所難髙祖深自引過致愧二王又云馮家女不能復相廢逐且使在宫中空坐有心乃能自死汝等勿謂吾猶有情也髙祖素至孝猶以文明太后故未便行廢良久二王出乃賜后辭死訣再拜稽首涕泣歔欷令入東房及入宫後帝命閹人有所問於后后罵曰}
