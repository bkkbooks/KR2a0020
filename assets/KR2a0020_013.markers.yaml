  - {type: variant, offset: 1088, length: 2, content: 勞勉, WYG: 幽太后於北宫於禁中殺懌其後太后從子都統僧敬與備身左右張車渠等數十人謀殺义復奉太后臨朝事不克僧敬坐徙邊車渠等死胡氏多免黜後肅宗朝太后於西林園讌文武侍臣飲至日夕义乃起至太后前自陳外云太后欲害已及騰太后答云無此語遂至于極昏太后乃起執肅宗手下堂言母子不聚久今暮共一宿諸大臣送我入太后與肅宗向東北小閤左衛将軍奚康生謀欲殺义不果自劉騰死义又寛怠太后與肅宗及髙陽王雍為計解义領軍太后復臨朝大赦改元自是朝政疎緩威恩不立天下牧守所在貪惏鄭儼汙亂宫掖勢傾海内李神軌徐紇並見親侍一二年中位總禁要手握王爵輕重在心宣淫於朝為四方}
