  - {type: variant, offset: 5, length: 2, content: 廢出, krp: 皇后列傳漢因秦制帝之祖母曰太皇太后母曰皇太后妃曰皇后餘則多稱夫人隨世增損非如周禮有夫人嬪婦御妻之定數焉魏晉相因時有昇降前史言之具矣魏氏王業之兆雖始於神元至於昭成之前世崇儉質妃牆嬪御率多闕焉惟以次第為稱而章平思昭穆恵煬烈八帝妃后無聞太祖追尊祖妣皆從帝諡為皇后始立中宫餘妾或稱夫人多少無限然皆有品次世祖稍增左右昭儀及貴人椒房中式數等後庭漸已多矣又魏故事将立皇后必令手鑄金人以成者為吉不成則不得立也又世祖髙宗縁保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁髙祖改定内官左右昭儀位視大司馬}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典内事内司視尚書令僕作司大監女侍中三官視二品監女尚書美人女史女賢人書史書女小書女五官視三品中才人供人中使女生才人恭使宫人視四品春衣女酒女饗女食奚官女奴視五官神元皇后竇氏沒鹿回部大人賔之女也賔臨終誡其二子速侯回題令善事}
