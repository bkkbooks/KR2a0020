  - {type: variant, offset: 2262, length: 0, content: '', WYG: 戰刀不如棒密勒軍士馬上各齎神棒一枚置於馬側至於戰時不聽斬級以棒棒之而已慮廢騰逐也乃分命壮勇所當衝突號令嚴明戰士同奮榮身自陷陳出於賊後表裏合擊大破之於陳擒葛榮餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃普告勒各從所樂親屬相隨任所居止於是羣情喜悦登即四散數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授用新附者咸安時人服其處分機速乃檻車送葛榮赴闕}
