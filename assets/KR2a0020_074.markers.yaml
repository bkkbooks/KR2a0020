  - {type: variant, offset: 1390, length: 484, content: 上玩籍先帝天縱多能克文克武營遷謀伐手不釋卷良以經史義深補益處廣雖則劬勞不可暫輟斯乃前王之美實後王之水鏡善足以遵惡足以誡也陛下道悟自深淵鑒獨得昇法座於宸闈釋覺善於日宇凡在聽矚塵蔽俱開然五經治世之模六籍軌俗之本蓋以訓物有漸應時匪妙必須先粗後精乘近即遠伏願經書玄覽孔釋兼存則內外俱周真俗斯暢後除司州別駕加鎮遠將軍及詔立明堂羣官博議延儁獨著一堂之論太傅清河王懌時典衆議讀而笑曰子故欲遠符僕射也兼太子中庶子尋即正別駕如故加冠軍將軍肅宗初遷散騎常侍監起居注加前將軍又加平西將軍除廷尉卿轉平北將軍幽州刺史范陽郡有舊督亢渠徑五十里漁陽燕郡有故戾陵諸堰廣袤三十里皆廢毀多時莫能修復時水旱不調民多飢餒延儁謂疏通舊跡勢必可成乃表求營造遂躬自履行相度水形隨力分督未幾而就溉田百萬餘畝為利十倍百姓至今賴之又命主簿酈惲修起學校禮教大行民歌謠之在州五年考績為天下最延儁繼母隨延儁在薊時遇重患延儁啟求侍母還京療治至都未幾拜太常卿時汾州山胡恃險寇竊正平平陽二郡尤被其害以延儁兼尚書為西北道行臺節度討胡諸軍尋遇疾敕還三餢羣蠻寇掠不已車駕欲親征之延儁乃於病中上疏諫諍尋除七兵尚書安南將軍徙殿中尚書加中軍將軍, WYG: ''}
