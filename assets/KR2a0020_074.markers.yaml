  - {type: variant, offset: 2708, length: 615, content: 尚書僕射餘如故子叔祉武定末太子洗馬良從父兄子慶孫字紹遠少孤性倜儻重然諾釋褐員外散騎侍郎正光末汾州吐京羣胡薛悉公馬牒騰並自立為王聚黨作逆衆至數萬詔慶孫為募人別將招率鄉豪得戰士數千人以討之胡賊屢來逆戰慶孫身先士卒每摧其鋒遂深入至雲臺郊諸賊更相連結大戰郊西自旦及夕慶孫身自突陳斬賊王郭康兒賊衆大潰敕徵赴都除直後於後賊復鳩集北連蠡升南通絳蜀兇徒轉盛復以慶孫為別將從軹關入討至齊子嶺東賊帥范多范安族等率衆來拒慶孫與戰復斬多首乃深入二百餘里至陽胡城朝廷以此地被山帶河衿要之所肅宗末遂立邵郡因以慶孫為太守假節輔國將軍當郡都督民經賊亂之後率多逃竄慶孫務安緝之咸來歸業永安中還朝除太中大夫尒朱榮之死也世隆擁衆北渡詔慶孫為大都督與行臺源子恭率衆追擊軍次太行而慶孫與世隆密通事泄追還河內而斬之時年三十六慶孫任俠有氣鄉曲壯士及好事者多相依附撫養咸有恩紀在郡之日值歲飢凶四方遊客常有百餘慶孫自以家糧贍之性雖粗武愛好文流與諸才學之士咸相交結輕財重義座客常滿是以為時所稱子子瑩永安中太尉行參軍延儁從祖弟仲規少好經史頗有志節起家奉朝請領侍御咸陽王禧為司州牧辟為主簿仍表行建興郡事車駕自代還洛次於郡境仲規備供帳朝於路側高祖詔仲規曰朕開置神畿畿郡望重卿既首應司隸美舉復督我名邦何能自致也仲規對曰陛下窮神盡聖應天順民棄彼玄壤來宅紫縣臣方罄心力躍馬吳會冀功銘帝籍勳書王府豈一郡而已高祖笑曰冀卿必副此言車駕達河梁見咸陽王謂曰昨得汝主簿為南道主人六軍豐贍元弟之寄殊副所望尋除, WYG: ''}
