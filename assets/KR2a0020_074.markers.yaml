  - {type: variant, offset: 2349, length: 0, content: '', WYG: 臨陳擒冠受延明聞冠受見擒遂自逃散顥便率麾下南奔事在其傳車駕渡河入居華林園詔曰周武奉時藉十亂以纂厯漢祖先天資三傑以除暴理民濟治斯道未爽使持節柱國大将軍大丞相太原王榮蘊伏風煙抱含日月總奇正以成術兼文武而為資昔處亂朝韜光戢翼秣馬冀北厲兵晉陽佇龍顔而振腕想日角以歎息忠勇奮發虎士如林義功始立所向風靡故能芟夷羣惡振此頽綱俾朕寡昧獲承鴻緖雖大位克正而衆盜未息葛榮跋扈仍亂中原建旗伐罪授首殲馘元顥凶頑構成巨釁阻弄呉楚虧汙宗社朕徙御北徂劬勞鞍甲王聞難星奔一舉大定下洽民和上匡王室鴻勳巨績書契所未紀飲至䇿勳事絶}
