  - {type: variant, offset: 2270, length: 0, content: '', WYG: 是以有莘贊亳不次之號爰歸渭叟翼周殊世之班載集况導源積石襲構崐山門踵英猷弼成鴻業抗髙天之摧柱振厚地之絶維德冠五侯勳髙九伯者哉太原王榮代荷蕃寵世載忠烈入匡頽運出勦元兇使積年之霧倐焉滌蕩數載之塵一朝清謐燕恒既泰趙魏還蘇比績況功古今莫二若不式稽舊典増是禮數将何以昭德報功遠明國範可大丞相}
