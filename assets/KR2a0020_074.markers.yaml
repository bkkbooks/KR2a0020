  - {type: variant, offset: 2581, length: 1, content: 兼, WYG: 擒王慶雲万俟道樂闗西悉平於是天下大難便以盡矣榮性好獵不舍寒暑至於列圍而進必須齊一雖遇阻險不得回避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勳濟天下四方無事惟宜調政飬民順時蒐狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海内何宜今日便言勳也如聞朝士猶自寛縱今秋欲共兄戒勒士馬校獵嵩原令貪汚朝貴入圍搏虎仍出魯陽歴三荆悉擁生蠻北填六鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬户侯如其不降徑渡數千騎便徃縛取待六合寧一八表無塵然後共兄奉天子廵四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也榮身雖居外恒遥制朝廷廣布親戚列為左右伺察動静大小必知或有僥倖求官者皆詣榮承候得其啓請無不遂之曽闗補定州曲陽縣令吏部}
