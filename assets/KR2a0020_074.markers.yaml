  - {type: variant, offset: 1898, length: 8, content: 儁在臺閣守職而已, WYG: 并州牧子素和婆崘嶮作逆榮並前後討平之遷直閤将軍冠軍将軍仍别将内附叛胡乞歩落堅胡劉阿如等作亂𤓰肆勅勒北列歩若反於沃陽榮並滅之以功封安平縣開國侯食邑一千户㝷加通直散騎常侍勅勒解律洛陽作逆桑乾西與費也頭牧子迭相掎角榮率騎破洛陽於深井逐牧子於河西進號平北将軍光祿大夫假安北将軍為北道都督㝷除武衛将軍俄加使持節安北将軍都督恒朔討虜諸軍假撫軍将軍進封博陵郡公増邑五百戸其梁郡前爵聽賜第二子時榮率衆至肆州刺史尉慶賔畏惡之閉城不納榮怒攻㧞之乃署其從叔羽生為刺史執慶賔於秀容自是榮兵威漸盛朝廷亦}
