  - {type: variant, offset: 2581, length: 1, content: 兼, krp: 擒王慶雲万俟道樂闗西悉平於是天下大難便以盡矣榮性好獵不舍寒暑至於列圍而進必須齊一雖遇阻險不得回避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勳濟天下四方無事惟宜調政飬民順時蒐狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海内何宜今日便言勳也如聞朝士猶自寛縱今秋欲共兄戒勒士馬校獵嵩原令貪汚朝貴入圍搏虎仍出魯陽歴三荆悉擁生蠻北填六鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬户侯如其不降徑渡數千騎便徃縛取待六合寧一八表無塵然後共兄奉天子廵四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也榮身雖居外恒遥制朝廷廣布親戚列為左右伺察動静大小必知或有僥倖求官者皆詣榮承候得其啓請無不遂之曽闗補定州曲陽縣令吏部}
  - {type: punctuation, offset: 2584, content: ，, id: KR2a0020_ZHSJ_074-bkkpn520}
  - {type: 'tls:seg', offset: 2584, content: '', id: KR2a0020_ZHSJ_074-d74p31s7}
  - {type: variant, offset: 2584, length: 0, content: '', WYG: 李神儁以階懸不奉别更擬人榮聞大怒即遣其所補者徃奪其任榮使入京雖復微蔑朝貴見之莫不傾靡及至闕下未得通奏恃榮威勢至乃忿怒榮曽啓北人}
  - {type: variant, offset: 2584, length: 0, content: '', krp: 李神儁以階懸不奉别更擬人榮聞大怒即遣其所補者徃奪其任榮使入京雖復微蔑朝貴見之莫不傾靡及至闕下未得通奏恃榮威勢至乃忿怒榮曽啓北人}
  - {type: variant, offset: 2586, length: 0, content: '', WYG: 南諸州荘帝未許天穆入見面啓曰天柱既有大功若請普代天下官屬恐陛下亦不得違之如何啓數人為州便停不用帝正色曰天柱若不為人臣朕亦須代如其猶存臣節無代天下百官理此事復何足論榮聞所啓不允大為恚恨曰天子由誰得立今乃不用我語荘帝外廹於榮恒怏怏不悦兼懲榮河隂之事恐終難保又城陽王徽侍中李彧等欲擅威權懼榮害之復相閒構日月滋甚於是荘帝密有圖榮之意三年九月榮啓将入朝朝士慮其有變荘帝又畏惡之榮從弟世隆與榮書勸其不來榮妻北鄉郡長公主亦勸不行榮並不從帝既圖榮榮至入見即欲害之以天穆在并恐為後患故隠忍未發榮之入洛有人告榮云帝欲圖之榮即具奏帝曰外人告云亦言王欲害我我豈信之於是榮不自疑每入謁帝從人不過數十又皆挺身不持兵仗及天穆至帝伏兵於明光殿}
