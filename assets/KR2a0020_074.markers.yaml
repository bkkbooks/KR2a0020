  - {type: variant, offset: 3511, length: 210, content: 諫議大夫仍領著作出帝時議孝莊諡事遂施行時詔撰四部要略令景融專典竟無所成元象中儀同高岳以為錄事參軍弟景顏被劾廷尉獄景融入選吏部擬郡為御史中丞崔暹所彈云其貪昧苟進遂坐免官武定四年冬病卒年五十二景融卑退廉謹無競於時雖才不稱學而緝綴無倦文詞汎濫理會處寡所作文章別有集錄又造鄴都晉都賦云景顏頗有學尚起家汝南王開府行參軍孝莊初為廣州防蠻別將行漢廣郡事元顥入洛與刺史鄭先護據州起義事寧賜爵保城子以軍功稍遷太尉從事中郎轉諮議參軍孝靜初徙, WYG: ''}
