  - {type: variant, offset: 1893, length: 1, content: 吏, WYG: 太師相國西河郡王榮絜白美容貎幼而神機明決及長好射獵每設圍誓衆便為軍陳之法號令嚴肅衆莫敢犯秀容界有池三所在髙山之上清深不測相傳曰祁連池魏言天池也父新興曽與榮遊池上忽聞簫皷之音新興謂榮曰古老相傳凡聞此聲皆至公輔吾今年已衰暮當為汝耳汝其勉之榮襲爵後除直寝游擊将軍正光中四方兵起遂散畜牧招合義勇給其衣馬蠕蠕主阿那瓌宼掠北鄙詔假榮節冠軍将軍别将𨽻都督李崇北征榮率其新}
