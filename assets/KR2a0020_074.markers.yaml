  - {type: variant, offset: 4173, length: 3394, content: 袁翻字景翔陳郡項人也父宣有才筆為劉彧青州刺史沈文秀府主簿皇興中東陽平隨文秀入國而大將軍劉昶每提引之言是其外祖淑之近親令與其府諮議參軍袁濟為宗宣時孤寒甚相依附及翻兄弟官顯與濟子洸演遂各凌競洸等乃經公府以相排斥翻少以才學擅美一時初為奉朝請景明初李彪在東觀翻為徐紇所薦彪引兼著作佐郎以參史事及紇被徙尋解後遷司徒祭酒揚烈將軍尚書殿中郎正始初詔尚書門下於金墉中書外省考論律令翻與門下錄事常景孫紹廷尉監張虎律博士侯堅固治書侍御史高綽前軍將軍邢苗奉車都尉程靈虬羽林監王元龜尚書郎祖瑩宋世景員外郎李琰之太樂令公孫崇等並在議限又詔太師彭城王勰司州牧高陽王雍中書監京兆王愉前青州刺史劉芳左衞將軍元麗兼將作大匠李韶國子祭酒鄭道昭廷尉少卿王顯等入預其事後除豫州中正是時修明堂辟雍翻議曰謹案明堂之義今古諸儒論之備矣異端競構莫適所歸故不復遠引經傳傍採紀籍以為之證且論意之所同以詶詔旨耳蓋唐虞已上事難該悉夏殷已降校可知之謂典章之極莫如三代郁郁之盛從周斯美制禮作樂典刑在焉遺風餘烈垂之不朽案周官考工所記皆記其時事具論夏殷名制豈其紕謬是知明堂五室三代同焉配帝象行義則明矣及淮南呂氏與月令同文雖布政班時有堂个之別然推其體例則無九室之證既而世衰禮壞法度淆薥正義殘隱妄說斐然明堂九室著自戴禮探緒求源罔知所出而漢氏因之自欲為一代之法故鄭玄云周人明堂五室是帝一室也合於五行之數周禮依數以為之室德行於今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也於今不同是漢異周也漢為九室略可知矣但就其此制猶竊有懵焉何者張衡東京賦云乃營三宮布教班常複廟重屋八達九房此乃明堂之文也而薛綜注云房室也謂堂後有九室堂後九室之制非巨異乎裴頠又云漢氏作四維之个不能令各處其辰就使其像可圖莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘於載籍且鄭玄之詁訓三禮及釋五經異義並盡思窮神故得之遠矣覽其明堂圖義皆有悟人意察察著明確乎難奪諒足以扶微闡幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易玄之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可準觀夫今之基址猶或髣髴高卑廣狹頗與戴禮不同何得以意抑必便謂九室可明且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難明故有一屋之論並非經典正義皆以意妄作茲為曲學家常談不足以範時軌世皇代既乘乾統曆得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏放篇之浮說徒損經紀雅誥之遺訓而欲以支離橫議指畫妄圖儀刑宇宙而貽來葉者也又北京制置未皆允帖繕修草創以意良多事移禮變所存者無幾理苟宜革何必仍舊且遷都之始日不遑給先朝規度每事循古是以數年之中悛換非一良以永法為難數改為易何為宮室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言明堂五室請同周制郊建三雍求依故所庶有會經誥無失典刑識偏學疏退慚謬浪後議選邊戍事翻議曰臣聞兩漢警於西北魏晉備在東南是以鎮邊守塞必寄威重伐叛柔服實賴溫良故田叔魏尚聲高於沙漠當陽鉅平績流於江漢紀籍用為美談今古以為盛德自皇上以叡明纂御風凝化遠威厲秋霜惠霑春露故能使淮海輸誠華陽即序連城請面比屋歸仁懸車劍閣豈伊曩載鼓譟金陵復在茲日然荊揚之牧宜盡一時才望梁郢之君尤須當今秀異自比緣邊州郡官至便登疆場統戍階當即用或值穢德凡人或遇貪家惡子不識字民溫恤之方唯知重役殘忍之法廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防寇禦賊之心唯有通商聚斂之意其勇力之兵驅令抄掠若值強敵即為奴虜如有執獲奪為己富其羸弱老小之輩微解金鐵之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或耘草平陸販貿往還相望道路此等祿既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬歷夏加之疾苦死於溝瀆者常十七八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乘擾故驅率犬羊屢犯疆埸頻年已來甲冑生蟣十萬在郊千金日費為弊之深一至於此皆由邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本既失之在始庸可止乎愚謂自今已後荊揚徐豫梁益諸蕃及所統郡縣府佐統軍至于戍主皆令朝臣王公已下各舉所知必選其才不拘階級若能統御有方清高獨著威足臨戎信能懷遠撫循將士得其忻心不營私潤專修公利者則就加爵賞使久於其任以時褒賚厲其忠款所舉之人亦垂優異奬其得士嘉其誠節若不能一心奉公才非捍禦貪惏日富經略無聞人不見德兵厭其勞者即加顯戮用彰其罪所舉之人隨事免降責其謬薦罰其偽薄如此則舉人不得挾其私受任不得孤其舉善惡既審沮勸亦明庶邊患永消譏議攸息矣遭母憂去職熙平初除冠軍將軍廷尉少卿尋加征虜將軍後出為平陽太守翻為廷尉頗有不平之論及之郡甚不自得遂作思歸賦曰日色黯兮高山之岑月逢霞而未畑霞值月而成陰望他鄉之阡陌非舊國之池林山有木而蔽月川無梁而復深悵浮雲之弗限何此恨之難禁於是雜石為峯諸煙共色秀出無窮煙起不極錯翻花而似繡網遊絲其如織蝶兩戲以相追燕雙飛而鼓翼怨驅馬之悠悠歎征夫之未息爾乃臨峻壑坐層阿北眺羊腸詰屈南望龍門嵯峨疊千重以聳翠橫萬里而揚波遠鼯與麝走鰩鼈及龜鼉彼曖然兮鞏洛此邈矣兮關河心鬱鬱兮徒傷思搖搖兮空滿思故人兮不見神翻覆兮魂斷斷魂兮如亂憂來兮不散俯鏡兮白水水流兮漫漫異色兮縱橫奇光兮爛爛下對兮碧沙上覩兮青岸岸上兮氤氳駁霞兮絳氛風搖枝而為弄日照水以成文行復行兮川之畔望復望兮望夫君君之門兮九重門余之別兮千里分願一見兮導我意我不見兮君不聞魄惝怳兮知何語氣繚戾兮獨縈縕彼鳥馬之無知尚有情於南北雖吾人之固鄙豈忘懷於上國去上國之美人對下邦之鬼蜮形既同於魍魎心匪殊於蝥賊欲修之而難化何不殘之云克知進退之非可徒終朝以默默願生還於洛濱荷天地之厚德神龜末遷冠軍將軍涼州刺史時蠕蠕主阿那瓌後主婆羅門並以國亂來降朝廷問翻安置之所翻表曰謬以非才忝荷邊任猥垂訪逮安置蠕蠕主阿那瓌婆羅門等處所遠近利害之宜竊惟匈奴為患其來久矣雖隆周盛漢莫能障服衰弱則降富強則叛是以方叔召虎不遑自息衞青去病勤亦勞止或修文德以來之或興干戈以伐之而一得一失利害相侔故呼韓來朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆埸自卜惟洛食定鼎伊高車蠕蠕迭相吞噬始則蠕蠕衰微高車強盛蠕蠕則自救靡暇高車則僻遠西北及蠕蠕復振反破高車主喪民離不絕如綫而高車今能終雪其復摧蠕蠕者正由種類繁多不可頓滅故也然鬬此兩敵即卞莊之算得使境上無塵數十年中者抑此之由也今蠕蠕為高車所討滅外憑大國之威靈兩主投身一期而至百姓歸誠萬里相屬進希朝廷哀矜克復宗社退望庇身有道保其妻兒雖乃遠夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絕列聖同規撫降卹附綿經共軌若棄而不受則虧我大德若納而禮待則損我資儲來者既多全徙內地非直其情不願迎送艱難然夷不亂華殷鑒無遠覆車在於劉石毀轍固不可尋且蠕蠕尚存則高車猶有內顧之憂未暇窺窬上國若蠕蠕全滅則高車跋扈之計豈易可知今蠕蠕雖主奔於上民散於下而餘黨實繁部落猶衆處處布以望今主耳高車亦未能一時并兼盡令率附又高車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦強敵唯涼州敦煌而已涼州土廣民希糧仗素闕燉煌酒泉空虛尤甚若蠕蠕無復竪立令高車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主皆宜存之居阿那瓌於東偏處婆羅門於西裔分其降民各有攸屬那瓌住所非所經見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡本屬涼州今在酒泉直北張掖西北千二百里去高車所住金山一千餘里正是北虜往來之衝要漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事為便即可永為重戍鎮防西北宜遣一良將加以配衣仍令監婆羅門凡諸州鎮應徙之兵隨宜割配且田且戍雖外為置蠕蠕之舉內實防高車之策一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙渡流沙即是我之外蕃高車勁敵西北之虞可無過慮如其姦回返覆孤恩背德者此不過為逋逃之寇於我何損今不早圖戎心一啟脫先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州燉煌及於西海躬行山谷要害之所親閱亭障遠近之宜商量士馬校練糧仗部分見定處置得所入春西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為羣正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度微似小損歲終大計其利實多高車豺狼之心何可專信假令稱臣致款正可外加優納而復內備彌深所謂先人有奪人之心者也管窺所陳懼多孟浪時朝議是之還拜吏部郎中加平南將, WYG: 将}
  - {type: variant, offset: 4173, length: 3394, content: 袁翻字景翔陳郡項人也父宣有才筆為劉彧青州刺史沈文秀府主簿皇興中東陽平隨文秀入國而大將軍劉昶每提引之言是其外祖淑之近親令與其府諮議參軍袁濟為宗宣時孤寒甚相依附及翻兄弟官顯與濟子洸演遂各凌競洸等乃經公府以相排斥翻少以才學擅美一時初為奉朝請景明初李彪在東觀翻為徐紇所薦彪引兼著作佐郎以參史事及紇被徙尋解後遷司徒祭酒揚烈將軍尚書殿中郎正始初詔尚書門下於金墉中書外省考論律令翻與門下錄事常景孫紹廷尉監張虎律博士侯堅固治書侍御史高綽前軍將軍邢苗奉車都尉程靈虬羽林監王元龜尚書郎祖瑩宋世景員外郎李琰之太樂令公孫崇等並在議限又詔太師彭城王勰司州牧高陽王雍中書監京兆王愉前青州刺史劉芳左衞將軍元麗兼將作大匠李韶國子祭酒鄭道昭廷尉少卿王顯等入預其事後除豫州中正是時修明堂辟雍翻議曰謹案明堂之義今古諸儒論之備矣異端競構莫適所歸故不復遠引經傳傍採紀籍以為之證且論意之所同以詶詔旨耳蓋唐虞已上事難該悉夏殷已降校可知之謂典章之極莫如三代郁郁之盛從周斯美制禮作樂典刑在焉遺風餘烈垂之不朽案周官考工所記皆記其時事具論夏殷名制豈其紕謬是知明堂五室三代同焉配帝象行義則明矣及淮南呂氏與月令同文雖布政班時有堂个之別然推其體例則無九室之證既而世衰禮壞法度淆薥正義殘隱妄說斐然明堂九室著自戴禮探緒求源罔知所出而漢氏因之自欲為一代之法故鄭玄云周人明堂五室是帝一室也合於五行之數周禮依數以為之室德行於今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也於今不同是漢異周也漢為九室略可知矣但就其此制猶竊有懵焉何者張衡東京賦云乃營三宮布教班常複廟重屋八達九房此乃明堂之文也而薛綜注云房室也謂堂後有九室堂後九室之制非巨異乎裴頠又云漢氏作四維之个不能令各處其辰就使其像可圖莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘於載籍且鄭玄之詁訓三禮及釋五經異義並盡思窮神故得之遠矣覽其明堂圖義皆有悟人意察察著明確乎難奪諒足以扶微闡幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易玄之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可準觀夫今之基址猶或髣髴高卑廣狹頗與戴禮不同何得以意抑必便謂九室可明且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難明故有一屋之論並非經典正義皆以意妄作茲為曲學家常談不足以範時軌世皇代既乘乾統曆得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏放篇之浮說徒損經紀雅誥之遺訓而欲以支離橫議指畫妄圖儀刑宇宙而貽來葉者也又北京制置未皆允帖繕修草創以意良多事移禮變所存者無幾理苟宜革何必仍舊且遷都之始日不遑給先朝規度每事循古是以數年之中悛換非一良以永法為難數改為易何為宮室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言明堂五室請同周制郊建三雍求依故所庶有會經誥無失典刑識偏學疏退慚謬浪後議選邊戍事翻議曰臣聞兩漢警於西北魏晉備在東南是以鎮邊守塞必寄威重伐叛柔服實賴溫良故田叔魏尚聲高於沙漠當陽鉅平績流於江漢紀籍用為美談今古以為盛德自皇上以叡明纂御風凝化遠威厲秋霜惠霑春露故能使淮海輸誠華陽即序連城請面比屋歸仁懸車劍閣豈伊曩載鼓譟金陵復在茲日然荊揚之牧宜盡一時才望梁郢之君尤須當今秀異自比緣邊州郡官至便登疆場統戍階當即用或值穢德凡人或遇貪家惡子不識字民溫恤之方唯知重役殘忍之法廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防寇禦賊之心唯有通商聚斂之意其勇力之兵驅令抄掠若值強敵即為奴虜如有執獲奪為己富其羸弱老小之輩微解金鐵之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或耘草平陸販貿往還相望道路此等祿既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬歷夏加之疾苦死於溝瀆者常十七八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乘擾故驅率犬羊屢犯疆埸頻年已來甲冑生蟣十萬在郊千金日費為弊之深一至於此皆由邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本既失之在始庸可止乎愚謂自今已後荊揚徐豫梁益諸蕃及所統郡縣府佐統軍至于戍主皆令朝臣王公已下各舉所知必選其才不拘階級若能統御有方清高獨著威足臨戎信能懷遠撫循將士得其忻心不營私潤專修公利者則就加爵賞使久於其任以時褒賚厲其忠款所舉之人亦垂優異奬其得士嘉其誠節若不能一心奉公才非捍禦貪惏日富經略無聞人不見德兵厭其勞者即加顯戮用彰其罪所舉之人隨事免降責其謬薦罰其偽薄如此則舉人不得挾其私受任不得孤其舉善惡既審沮勸亦明庶邊患永消譏議攸息矣遭母憂去職熙平初除冠軍將軍廷尉少卿尋加征虜將軍後出為平陽太守翻為廷尉頗有不平之論及之郡甚不自得遂作思歸賦曰日色黯兮高山之岑月逢霞而未畑霞值月而成陰望他鄉之阡陌非舊國之池林山有木而蔽月川無梁而復深悵浮雲之弗限何此恨之難禁於是雜石為峯諸煙共色秀出無窮煙起不極錯翻花而似繡網遊絲其如織蝶兩戲以相追燕雙飛而鼓翼怨驅馬之悠悠歎征夫之未息爾乃臨峻壑坐層阿北眺羊腸詰屈南望龍門嵯峨疊千重以聳翠橫萬里而揚波遠鼯與麝走鰩鼈及龜鼉彼曖然兮鞏洛此邈矣兮關河心鬱鬱兮徒傷思搖搖兮空滿思故人兮不見神翻覆兮魂斷斷魂兮如亂憂來兮不散俯鏡兮白水水流兮漫漫異色兮縱橫奇光兮爛爛下對兮碧沙上覩兮青岸岸上兮氤氳駁霞兮絳氛風搖枝而為弄日照水以成文行復行兮川之畔望復望兮望夫君君之門兮九重門余之別兮千里分願一見兮導我意我不見兮君不聞魄惝怳兮知何語氣繚戾兮獨縈縕彼鳥馬之無知尚有情於南北雖吾人之固鄙豈忘懷於上國去上國之美人對下邦之鬼蜮形既同於魍魎心匪殊於蝥賊欲修之而難化何不殘之云克知進退之非可徒終朝以默默願生還於洛濱荷天地之厚德神龜末遷冠軍將軍涼州刺史時蠕蠕主阿那瓌後主婆羅門並以國亂來降朝廷問翻安置之所翻表曰謬以非才忝荷邊任猥垂訪逮安置蠕蠕主阿那瓌婆羅門等處所遠近利害之宜竊惟匈奴為患其來久矣雖隆周盛漢莫能障服衰弱則降富強則叛是以方叔召虎不遑自息衞青去病勤亦勞止或修文德以來之或興干戈以伐之而一得一失利害相侔故呼韓來朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆埸自卜惟洛食定鼎伊高車蠕蠕迭相吞噬始則蠕蠕衰微高車強盛蠕蠕則自救靡暇高車則僻遠西北及蠕蠕復振反破高車主喪民離不絕如綫而高車今能終雪其復摧蠕蠕者正由種類繁多不可頓滅故也然鬬此兩敵即卞莊之算得使境上無塵數十年中者抑此之由也今蠕蠕為高車所討滅外憑大國之威靈兩主投身一期而至百姓歸誠萬里相屬進希朝廷哀矜克復宗社退望庇身有道保其妻兒雖乃遠夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絕列聖同規撫降卹附綿經共軌若棄而不受則虧我大德若納而禮待則損我資儲來者既多全徙內地非直其情不願迎送艱難然夷不亂華殷鑒無遠覆車在於劉石毀轍固不可尋且蠕蠕尚存則高車猶有內顧之憂未暇窺窬上國若蠕蠕全滅則高車跋扈之計豈易可知今蠕蠕雖主奔於上民散於下而餘黨實繁部落猶衆處處布以望今主耳高車亦未能一時并兼盡令率附又高車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦強敵唯涼州敦煌而已涼州土廣民希糧仗素闕燉煌酒泉空虛尤甚若蠕蠕無復竪立令高車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主皆宜存之居阿那瓌於東偏處婆羅門於西裔分其降民各有攸屬那瓌住所非所經見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡本屬涼州今在酒泉直北張掖西北千二百里去高車所住金山一千餘里正是北虜往來之衝要漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事為便即可永為重戍鎮防西北宜遣一良將加以配衣仍令監婆羅門凡諸州鎮應徙之兵隨宜割配且田且戍雖外為置蠕蠕之舉內實防高車之策一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙渡流沙即是我之外蕃高車勁敵西北之虞可無過慮如其姦回返覆孤恩背德者此不過為逋逃之寇於我何損今不早圖戎心一啟脫先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州燉煌及於西海躬行山谷要害之所親閱亭障遠近之宜商量士馬校練糧仗部分見定處置得所入春西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為羣正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度微似小損歲終大計其利實多高車豺狼之心何可專信假令稱臣致款正可外加優納而復內備彌深所謂先人有奪人之心者也管窺所陳懼多孟浪時朝議是之還拜吏部郎中加平南將, krp: 将}
