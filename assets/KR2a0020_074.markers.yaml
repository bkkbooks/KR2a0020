  - {type: variant, offset: 2258, length: 3, content: 併力攻, WYG: 鋒已過汲郡所在村塢悉被􅋊略榮啓求討之九月乃率精騎七千馬皆有副倍道兼行東出滏口葛榮為賊既乆横行河北時衆寡非敵議者謂無制賊之理葛榮聞之喜見於色乃令其衆曰此易與耳諸人俱辦長繩至便缚取葛榮自鄴以北列陳數十里箕張而進榮潛軍山谷為竒兵分督将已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬}
