  - {type: variant, offset: 1941, length: 1, content: 雍, krp: 見逼權順所請耳今璽運已移天命有在宜時即尊號将軍必若推而不居存魏社稷亦任更擇親賢共相輔戴榮旣有異圖遂鑄金為已像數四不成時幽州人劉靈助善卜占為榮所信言天時人事必不可爾榮亦精神恍惚不自支持乆而方悟遂便愧悔於是獻武王榮外兵參軍司馬子如等切諫陳不可之理榮曰愆誤若是惟當以死謝朝廷今日安危之機計将何出獻武王等曰未若還奉長樂以安天下於是還奉荘帝十四日輿駕入宮于時或云榮欲遷都晉陽或云欲肆兵大掠迭相驚恐人情駭震京邑士子不一存率皆逃竄無敢出者直衛空虚官守廢曠榮聞之上書曰臣世荷蕃寄征討累年奉忠王室志存效死直以太后滛亂孝明暴崩遂率義兵扶立社稷陛下登祚之始人情未安大兵交際難可齊一諸王朝貴横死者衆臣今粉軀不足塞徃責以謝亡者然追榮襃德謂之不朽乞降天慈㣲申私責無上王請追尊帝號諸王刺史乞贈三司其位班三品請贈令僕五品之官各贈方伯六品已下及白民贈以鎮郡諸死者無後聽繼即授封爵均其髙下節級别科使恩洽存亡有慰生死詔曰覽表不勝鯁塞朕德行無感致滋酷濫㝷繹徃事實切於懷可如所表自兹已後贈終叨濫庸人賤品動至大官為識者所不貴武定中齊文襄王始革其失追襃有典焉榮啓帝遣使循城勞問於是人情遂安朝士逃亡者亦稍來歸闕榮又奏請番直朔望之日引見三公令僕尚書九卿及司州牧河南尹洛陽河隂執事之官參論國治經綸王道以為常式五月榮還晉陽七月詔曰乾坤統物星象贊其功皇王御運股肱匡其業是以周道中缺齊晉立濟世之忠殷祚或虧彭韋振救時之節自前朝失御厄運荐臻太原王榮爰戴朕躬推臨萬國勳踰伊霍功格二儀王室不壞伊人是頼可柱國大将軍兼錄尚書事餘如故時葛榮将向京師衆號百萬相}
