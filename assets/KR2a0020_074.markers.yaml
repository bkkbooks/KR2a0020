  - {type: variant, offset: 2272, length: 1, content: 章, WYG: 河北畿外諸軍事増邑一萬户通前三萬餘官悉如故初榮之将討葛榮也軍次襄垣遂令軍士列圍大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則擒葛榮不中則否既而並應弦而殪三軍咸悦及破賊之後即命立碑於其所號雙兔碑榮将戰之夜夢一人從葛榮索千牛刀而葛榮初不肯與此人自稱我是道}
  - {type: page-break, offset: 2272, content: '', id: KR2a0020_WYG_074-12a, image: WYG0262/WYG0262-0117a.png}
  - {type: variant, offset: 2272, length: 1, content: 章, krp: 河北畿外諸軍事増邑一萬户通前三萬餘官悉如故初榮之将討葛榮也軍次襄垣遂令軍士列圍大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則擒葛榮不中則否既而並應弦而殪三軍咸悦及破賊之後即命立碑於其所號雙兔碑榮将戰之夜夢一人從葛榮索千牛刀而葛榮初不肯與此人自稱我是道}
  - {type: variant, offset: 2274, length: 0, content: '', WYG: 皇帝汝何敢違葛榮乃奉刀此人手持授榮既寤而喜自知必勝又詔曰我皇魏道契神元德光靈範源先二象化穆五才三歴與日月惟休金鼎共乾坤俱永而正光之末皇運時屯百揆咸亂九宮失叙朝野撫膺士女嗟怨遂使四海土崩九區瓦解逆賊杜周䖍劉燕代妖宼葛榮假噬魏趙常山易水戎鼓夜驚冰井叢臺胡塵晝合朔南乆已丘墟河北殆成灰燼宗廟懷匪安之慮社稷急不測之憂大丞相太原}
  - {type: page-break, offset: 2274, content: '', id: KR2a0020_WYG_074-12b, image: WYG0262/WYG0262-0117b.png}
  - {type: variant, offset: 2274, length: 0, content: '', krp: 皇帝汝何敢違葛榮乃奉刀此人手持授榮既寤而喜自知必勝又詔曰我皇魏道契神元德光靈範源先二象化穆五才三歴與日月惟休金鼎共乾坤俱永而正光之末皇運時屯百揆咸亂九宮失叙朝野撫膺士女嗟怨遂使四海土崩九區瓦解逆賊杜周䖍劉燕代妖宼葛榮假噬魏趙常山易水戎鼓夜驚冰井叢臺胡塵晝合朔南乆已丘墟河北殆成灰燼宗廟懷匪安之慮社稷急不測之憂大丞相太原}
  - {type: variant, offset: 2275, length: 1, content: 融, WYG: 榮道鏡域中德光區外神昭藏徃思實知來義踵先勳忠資曩烈遂能大建義謀收集忠勇熊羆競逐虎豹爭先軒翥南溟搏風北極氣震林原勢動山岳弔民伐罪殲此鯨鯢戮卒多於長平積器髙於熊耳秦晉聞聲而喪膽齊莒側聽而讋息中興之業是乎再隆太平之基兹焉更始雖復伊霍宣翼之功桓文崇贊之道何足以髣髴鴻蹤比勳盛烈道格普天仁沾率土振古以來未有其比若不廣錫山河大開土宇何以表大義之崇髙摽盛德之廣逺可以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽等七郡各萬户通前滿十萬户為太原國邑又進位太師餘如故建義初北海王元顥南奔蕭衍衍乃立為魏主資以兵将時邢杲宼亂三齊與顥應接朝廷以顥孤弱不以為慮永安三年春詔大将軍元穆先平齊地然後回師征顥顥以大軍未還乘虛征進既䧟梁國鼓行而西滎陽虎牢並皆不守五月車駕出幸河北事出不虞天下改望榮聞之即時馳傳朝行宫於上黨之長子行其部分輿駕於是南轅榮為前驅旬日之間兵馬大集資糧器仗繼踵而至天穆既平邢杲亦渡河以㑹車駕顥}
  - {type: page-break, offset: 2275, content: '', id: KR2a0020_WYG_074-13a, image: WYG0262/WYG0262-0117c.png}
