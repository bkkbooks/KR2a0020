  - {type: variant, offset: 1934, length: 0, content: '', WYG: 進為大都督加金紫光祿大夫時杜洛周陷中山於時車駕聲将北討以榮為左軍不行及葛榮吞洛周凶勢轉盛榮恐其南逼鄴城表求遣騎三千東援相州肅宗不許又遷車騎将軍右光祿大夫㝷進位}
  - {type: page-break, offset: 1934, content: '', id: KR2a0020_WYG_074-4b, image: WYG0262/WYG0262-0113b.png}
  - {type: variant, offset: 1934, length: 0, content: '', krp: 進為大都督加金紫光祿大夫時杜洛周陷中山於時車駕聲将北討以榮為左軍不行及葛榮吞洛周凶勢轉盛榮恐其南逼鄴城表求遣騎三千東援相州肅宗不許又遷車騎将軍右光祿大夫㝷進位}
  - {type: punctuation, offset: 1938, content: 、, id: KR2a0020_ZHSJ_074-bkkpn394}
  - {type: variant, offset: 1938, length: 0, content: '', WYG: 榮以山東賊盛慮其西逸乃遣兵固守滏口以防之復上書曰臣前以二州頻反大軍喪敗河北無援實慮南侵故令精騎三千出援相州京師影響斷其南望賊聞此衆當亦息圖使還奉勑云念生裊勠寳夤受擒醜奴明逹並送誠款三輔告謐闗隴載寧費穆虎旅大翦妖蠻兩絳狂蜀漸已稽顙又承北海王顥率衆二萬出鎮相州北海皇孫名位崇重鎮撫鄴城實副羣望惟願廣其配衣及機早遣今闗西雖平兵未可役山南隣賊理無發召王師雖衆頻被摧北人情危怯實謂難用若不更思方略無以萬全如臣愚量蠕蠕主阿那瓌荷國厚恩未應忘報求乞一使慰喻那瓌即遣發兵東引直趣下口揚威振武以躡其背北海之軍鎮撫相部嚴加警備以當其前臣麾下雖少輒盡力命自井陘以北隘口以西分防險要攻其肘腋葛榮雖并洛周威恩未著人類差異形勢可分於是榮遂嚴勒部曲廣召義勇北捍馬邑東塞井陘㝷屬肅宗崩事出倉卒榮聞之大怒謂鄭儼徐紇為之與元天穆等密議稱兵入匡朝廷討定之乃抗表曰伏承大行皇帝背棄萬方奉諱號踴五内摧剝仰㝷詔㫖實用驚惋今海内草草異口一言皆云大行皇帝鴆毒致禍臣等外聽訟言内自追測去月二十五日聖體康悆至於二十六日奄忽昇遐卽事觀望實有所惑且天子寝疾侍臣不離左右親貴名醫瞻仰患状面奉音㫖親承顧託豈容不豫初不召醫崩棄曽無親奉欲使天下不為恠愕四海不為喪氣豈可得乎復皇后女生稱為儲兩疑惑朝野虛行慶宥宗廟之靈見欺兆民之望已失使七百危於累卵社稷墜於一朝方選君嬰孩之中寄治乳抱之日使姦豎專朝賊臣亂紀惟欲指影以行權假形而弄詔此則掩眼捕雀塞耳盜鐘今泰隴塵飛趙魏霧合寳夤醜奴勢逼豳雍葛榮就德憑陵河海楚兵吴卒密邇在郊古人有言邦之不臧隣之福也一旦聞此誰不闚􅎿竊惟大行皇帝聖德馭宇繼體正君猶邊烽迭舉妖宼不滅况今從佞臣之計随親戚之談舉潘嬪之女以誑百姓奉未言之兒而臨四海欲使海内安乂愚臣所未聞也伏願留聖善之慈回須臾之慮照臣忠誠錄臣至款聽臣赴闕預參大議問侍臣帝崩之由訪禁旅不知之状以徐鄭之徒付之司敗雪同天之恥謝遠近之怨然後更召宗親推其年德聲副遐邇改承寶祚則四海更蘇百姓幸甚於是遂勒所統将赴京師靈太后甚懼詔以李神軌為大都督将於大行杜防榮抗表之始遣從子天光親信奚毅及倉頭王相入洛與從弟世隆密議廢立天光乃見荘帝具論榮心帝許之天光等還北榮發晉陽猶疑所立乃以銅鑄髙祖及咸陽王禧等六王子孫像成者當奉為主惟荘帝獨就師次河内重遣王相密來奉迎帝與兄彭城王劭弟始平王子正於髙渚濳渡以赴之榮軍将士咸稱萬嵗於時武泰元年四月九日也十一日榮奉帝為主詔以榮為使持節侍中都督中外諸軍事大将軍開府兼尚書令領軍将軍領左右太原王食邑二萬户十二日百官皆朝於行宮十三日榮惑武衛将軍費穆之説乃引迎駕百官於行宫西北云欲祭天朝士既集列騎圍遶責天下喪亂明帝卒崩之由云皆緣此等貪虐不相匡弼所致因縱兵亂害王公卿士皆斂手就戮死者千三百餘人皇弟皇兄並亦見害靈太后少主其日暴崩榮遂有大志令御史趙元則造禪文遣數十人遷帝於河橋至夜四更中復奉帝南還營幕帝憂憤無計乃令人喻㫖於榮曰帝王迭襲盛衰無常旣屬屯運四方瓦解将軍仗義而起前無横陳此乃天意非人力也我}
