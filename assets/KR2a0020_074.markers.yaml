  - {type: variant, offset: 7572, length: 525, content: 以本將軍出為齊州刺史無多政績孝昌中除安南將軍中書令領給事黃門侍郎與徐紇俱在門下並掌文翰翻既才學名重又善附會亦為靈太后所信待是時蠻賊充斥六軍將親討之翻乃上表諫止後蕭寶夤大敗於關西翻上表請為西軍死亡將士舉哀存而還者并加賑賚後拜度支尚書尋轉都官翻表曰臣往忝門下翼侍帳幄同時流輩皆以出離左右蒙數階之陟唯臣奉辭非但直去黃門今為尚書後更在中書令下於臣庸朽誠為叨濫準之倫匹或有未盡竊惟安南之與金紫雖是異品之隔實有半階之校加以尚書清要位遇通顯準秩論資似加少進語望比官人不願易臣自揆自顧力極求此伏願天地成造有始有終矜臣疲病乞臣骸骨願以安南尚書換一金紫時天下多事翻雖外請閑秩而內有求進之心識者怪之於是加撫軍將軍肅宗靈太后曾醼於華林園舉觴謂羣臣曰袁尚書朕之杜預欲以此杯敬屬元凱今為盡之侍座者莫不羨仰翻名位俱重當時賢達咸推與之然獨善其身無所奬拔排抑後進懼其凌己論者鄙之建義初遇害於河陰年五十三所著文筆百餘篇行於世贈使持節侍中車騎將軍儀同三司青州刺史嫡子寶首武定中司徒記室參軍寶首兄叔德武定末太子中舍人翻弟躍語在文苑傳躍弟颺本州治中別駕豫州冠軍府司馬而卒颺弟昇太學博士司徒記室尚書儀曹郎中正員郎通直常侍颺死後昇通其妻翻慚恚為之發病昇終不止時人鄙穢之亦於河陰見害贈左將軍齊州刺史, WYG: ''}
