  - {type: variant, offset: 2600, length: 0, content: '', WYG: 初世隆等得志乃詔曰故使持節侍中都督河北諸軍事天柱大将軍大丞相太師領左右兼錄尚書北道大行臺太原王榮功濟區夏誠貫幽明天不憗遺奄從物化追終襃績列代通謨紀德銘勳前王令範可贈假黃鉞相國錄尚書事司州牧使持節侍中将軍王如故又詔曰故假黄鉞持節侍中相國錄尚書都督中外諸軍事天柱大将軍司州牧太原王榮惟岳降靈應期作輔功侔伊霍德契桓文方籍棟梁永康國命道長運短震悼兼深前已襃贈用彰厥美然禮數弗窮文物有闕逺近之望猶或未盡宜循舊典更加殊錫可追號為晉王加九錫給九旒鑾輅虎賁班劔三百人轀輬車凖晉太宰安平獻王故事諡曰武詔曰武泰之末乾樞中圯丕基寳命有若綴旒晉王榮固天所縱世秉忠誠一匡邦國再造區夏俾我頽綱於斯復振雖勳銘王府德被管絃而從祀之禮於兹尚闕非所以酬懋賞於當}
  - {type: page-break, offset: 2600, content: '', id: KR2a0020_WYG_074-18b, image: WYG0262/WYG0262-0120b.png}
