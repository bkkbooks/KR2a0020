  - {type: punctuation, offset: 8100, content: ：, id: KR2a0020_ZHSJ_074-bkkpn1632}
  - {type: variant, offset: 8100, length: 1, content: 崔, WYG: 太祖撫運乘時奄開王業世祖以武功一海内髙祖以文德革天下世宗之後政道頗虧及明皇幼沖女主南面始則于忠專恣繼以元义權重握賞罰之柄擅生殺之威榮悴在親疎貴賤由離合附㑹者結之以子女進趨者要之以金帛且佞諛用事功勤不賞居官肆其聚斂乘勢極其陵暴於是四海囂然已有羣飛之漸矣逮於靈后反政宣滛於朝鄭儼手運天機口吐王制李軌徐紇刺促以求先元略元徽喔咿以競入私利畢舉公道盡亡遐邇怨憤天下鼎沸傾覆之徵於此至矣尒朱榮緣将帥之列藉部衆之用屬肅宗暴崩民怨神怒遂有匡頽拯敝之志援主逐惡之圖蓋天啓之也於是上下離心文武解體咸企忠義之聲俱聽桓文之舉勞不汗馬朝野靡然扶翼懿親宗祏有主祀魏配天不殞舊物及夫擒葛榮誅元顥戮邢杲剪韓婁醜奴寳夤咸裊馬市此諸魁者或據象魏或僭號令人謂秉皇符身各謀帝業非徒鼠竊狗盜一城一聚而已茍非榮之致力剋夷大難則不知幾人稱帝幾人稱王也然則榮之功烈亦已茂乎而始則希覬非望睥睨宸極終乃靈后少帝沉流不反河隂之下衣冠塗地此其所以得罪人神而終於夷戮也向使榮無姦忍之失修德義之風則彭韋伊霍夫何足數至於末迹見猜地逼貽斃斯則蒯通致説於韓王也魏書卷七十四魏書卷七十四考證尒朱榮傳三厯與日月惟}
