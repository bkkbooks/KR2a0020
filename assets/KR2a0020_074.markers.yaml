  - {type: variant, offset: 684, length: 473, content: 車騎將軍尚書僕射冀州刺史諡文貞侯休少而謙退事母孝謹及為尚書子仲文納丞相雍第二女女妻領軍元叉長庶子祕書郎稚舒挾恃二家志氣微改內有自得之心外則陵藉同列尚書令李崇左僕射蕭寶夤右僕射元欽皆以雍叉之故每憚下之始休母房氏欲以休女妻其外孫邢氏休不欲乃違其母情以妻叉子議者非之休有九子長子𡞾字長儒武定中七兵尚書武城縣開國公𡞾弟仲文散騎常侍仲文弟叔仁性輕俠重衿期歷通直散騎侍郎司徒司馬散騎常侍出為驃騎將軍潁州刺史以貪汙為御史所劾興和中賜死於宅臨刑賦詩與諸弟訣別而不及其兄以其不甚營救故也叔仁弟叔義孝莊時為尚書庫部郎坐兄𡞾鑄錢事發合家逃逸數日叔義遂見執獲時城陽王徽為司州牧臨淮王彧以非其身罪驟為致言徽不從乃殺之叔義弟子侃以竊級為中書郎為尚書左丞和子岳彈糾失官後兼通直常侍使於蕭衍還路病卒子侃弟子聿武定末東莞太守卒子聿弟子約開府祭酒休弟夤字敬禮太子舍人早卒贈樂安太守妻安樂王長樂女晉寧主也貞烈有德行子長謙好學修立少有令名仕歷給事中仍還鄉里久之刺史尉景取為開府諮議參軍事晚頗以酒為損天平中被徵兼主客郎接蕭衍使張臯等後兼散騎常侍使蕭衍還卒於宿豫時人歎惜之以死王事贈驃騎將軍, WYG: 鎮}
