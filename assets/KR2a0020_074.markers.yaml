  - {type: variant, offset: 27, length: 208, content: 御史中丞逞之玄孫也祖靈和仕劉義隆為員外散騎侍郎父宗伯世宗初追贈清河太守休少孤貧矯然自立舉秀才入京師與中書郎宋弁通直郎邢巒雅相知友尚書王嶷欽其人望為長子娉休姊贍以貨財由是少振高祖納休妹為嬪以為尚書主客郎轉通直正員郎兼給事黃門侍郎休好學涉歷書史公事軍旅之隙手不釋卷崇尚先達愛接後來常參高祖侍席禮遇次于宋郭之輩高祖南伐以北海王為尚書僕射統留臺事以休為尚書左丞高祖詔休曰北海年少未閑政績百揆之務便以相委轉長史兼給事黃門侍郎後, WYG: ''}
