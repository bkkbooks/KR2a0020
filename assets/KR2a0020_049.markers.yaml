  - {type: 'tls:seg', offset: 5200, content: '', id: KR2a0020_ZHSJ_049-d49p62s31}
  - {type: variant, offset: 5200, length: 338, content: 領精騎一千專殿駕後未幾轉驍騎將軍仍領太僕典牧令從駕征南陽兼武衞將軍二十二年車駕南討遣福與右衞將軍楊播為前軍至鄧城福選兵簡將為攻圍之勢高祖望福軍法齊整將士閑習大被褒歎蕭鸞遣其尚書崔慧景黃門郎蕭衍率衆十萬來救高祖指麾將士敕福領高車羽林五百騎出賊南面奪其橋道遏絕歸路賊衆大恐六道來戰福據鞍誓衆身先士卒賊不得前遂大奔潰賜爵昌黎伯正武衞加征虜將軍尋以高車叛命加征北將軍北征都將追討之軍敗被黜景明初乃起拜平遠將軍南征統軍進計於都督彭城王勰曰建安是淮南重鎮彼此要衝得之則義陽易圖不獲則壽春難保勰然之及勰為州遂令福攻建安建安降以勳封襄樂縣開國男邑二百戶除太僕少卿尋以衍將寇邊假節征虜將軍領兵出三關討之又詔福行豫州事與東豫州刺史田益宗共相影援綏遏蠻楚還為光祿大夫轉太僕卿延昌中以本官領左衞將軍除, WYG: 員外}
