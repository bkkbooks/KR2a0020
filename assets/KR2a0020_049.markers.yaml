  - {type: variant, offset: 263, length: 348, content: 西將軍後平涼州攻城野戰多有克捷以功賜爵帶方公除長安鎮都大將會蠕蠕侵境馳驛徵還除柔玄鎮都大將後以斤機辯敕與王俊使蠕蠕迎女備後宮又以本將軍開府為長安鎮都大將卒贈本將軍雍州刺史諡曰靜陪葬金陵子敦襲爵有姿貌善舉止自太子洗馬稍遷散騎常侍庫部尚書卒贈安東將軍幽州刺史諡曰恭子伊利高宗時襲爵除內行長以沉密小心恭勤不怠領御食羽獵諸曹事伊利曾病顯祖幸其宅自視醫藥其見待如此稍遷散騎常侍儀曹尚書出為安東將軍兗州刺史善撫導在州數年邊民歸之五千餘戶高祖時蠕蠕來寇詔伊利追擊之不及而反後依例降為侯除司農卿光祿大夫卒世宗初贈征北將軍燕州刺史諡曰靜子阿奴亦忠實寡言有智度以勳臣之子除侍御中散襲爵稍遷中散大夫卒子殺鬼襲爵武泰中驃騎將軍南青州刺史敦弟拔歷殿中尚書賜爵濟南公高祖時進爵為王除征西將軍吏部尚書改封趙郡王後例降為公卒贈寧, WYG: ''}
