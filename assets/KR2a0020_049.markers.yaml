  - {type: variant, offset: 6149, length: 305, content: 太守仍為長史還朝拜左軍將軍轉河陰令有嚴明之稱時蠕蠕主婆羅門自涼州歸降其部衆因飢侵掠邊邑詔穆銜命宣慰便皆款附明年復叛入寇涼州除穆輔國將軍假征虜將軍兼尚書左丞西北道行臺仍為別將往討之穆至涼州蠕蠕遁走穆謂其所部曰夷狄獸心唯利是視見敵便走乘虛復出今王師來討雖畏威逃跡然軍還之後必來侵暴今欲羸師誘致冀獲一戰若不令其破膽終恐疲於奔命衆咸然之穆乃簡練精騎伏於山谷使羸步之衆為外營以誘之賊騎覘見謂為信弱俄而競至穆伏兵奔擊大破之斬其帥郁厥烏爾俟斤十代等獲生口雜畜甚衆及六鎮反叛詔穆為別將隸都督李崇北伐都督崔暹失利崇將班師會諸將議曰朔州是白道之衝賊之咽喉若此處不全則并肆危矣今欲選諸將一人留以鎮捍不知誰堪此任僉曰無過穆者崇乃請為朔, WYG: ''}
