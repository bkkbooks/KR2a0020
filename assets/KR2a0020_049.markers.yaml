  - {type: variant, offset: 4862, length: 1, content: 鎮, WYG: 郡功曹而卒鑒頗有文學自中書博士轉侍郎延興中受詔使齊州觀省風俗行兖州事以功賜爵桐廬縣子出為奮威將軍東徐州刺史鑒欲安悅新附民有年老者表求假以守令詔從之又於州内冶銅以為農具兵民獲利卒贈冠軍將軍青州刺史安平侯諡曰康子合字貴和少有時譽襲爵桐廬子為中書學生主文中散太尉諮議參軍本州大中正出為常山太守卒於郡時年二十七長子脩義有風望襲爵自司徒默曹參軍再遷寧逺將軍新野太守還除太尉掾出為冀州征東府長史卒年四十五長子放寛襲爵齊受禪例降合弟秉少有志氣太和中為中書學生拜奉朝請轉徐州安東府錄事參軍陽平王顯之為定州秉復為衞軍府錄事參軍帶毋極令時甄琛為長史因公事言競之間秉以拳擊琛墜于牀下琛以本縣長笑而不論其豪率若此彭城王勰征壽春秉從行招致壯俠以為部卒勰目之謂左右曰吾當寄膽氣於此人後為司空主簿轉掾城門校尉長兼司空司馬遷長史加輔國將軍出除左將軍廣平内史大納財貨為清論所鄙入為司徒左長史未幾除平東將軍光祿大夫尋加安西將軍出除燕州刺史時天下多事遂為杜洛周攻圍秉堅守歴年朝廷遣都督元譚與秉第二子仲哲赴救譚敗仲哲死之秉遂率城民奔定州坐免官尋除撫軍將軍行相州事轉征}
