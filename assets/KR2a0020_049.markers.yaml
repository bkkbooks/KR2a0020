  - {type: variant, offset: 87, length: 175, content: 寧南將軍河內鎮將世祖初遷侍中外都大官總三十六曹事年一百七歲精爽不衰世祖以其忠売心甚見信待監典後宮出入臥內因除長信卿年一百一十詔聽歸老賜大寧東川以為居業并為築城即號曰羅侯城至今猶存朝廷每有大事驛馬詢訪焉年一百二十歲卒贈寧東將軍幽州刺史諡曰貞子斤太宗時為侍御中散後從世祖討赫連昌世祖追奔入城昌邀擊左右多死斤力戰有功世祖嘉之後錄勳除散騎常侍侍中四部尚書又加, WYG: ''}
