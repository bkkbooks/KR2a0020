  - {type: variant, offset: 4351, length: 1, content: 卒, WYG: 博陵公尉元鎮東將軍陽城公孔伯恭等率衆迎之顯祖復以璨參二府軍事軍達九里山安都率文武出迎元不加禮接安都還城使遂不至時劉彧將張永沈攸之等率衆先屯下礚元令璨與中書郎髙閭入彭城說安都安都即與俱載赴軍元等入城收管籥其夜永攻南門不剋退還時永輜重在武原璨勸元乘永之失據攻永米舩大破之斬首數千級時大雪寒永軍凍死者萬計於是遂定淮北加璨寧朔將軍與張讜對為兖州刺史綏安初附以參定徐州之功賜爵始豐侯加建武將軍延興元年}
