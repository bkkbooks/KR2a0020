  - {type: variant, offset: 1922, length: 0, content: '', WYG: 贈殷州刺史次敬義司徒長流參軍兼光祿少卿平北將軍光祿大夫卒贈本將軍殷州刺史次叔向為徐州鎧曹參軍帶郭浦戍主值刺史元法僧叛逼入蕭衍次幼緒早亡次季脩博陵常山二郡太守次世幹次稚明兄弟並不修名行險暴無禮為時所賤華弟憑字青龍祕書主文中散累遷冀州征東長史太子中舍人阿附趙脩超遷司空長史給事黄門侍郎武衞將軍定州大中正坐脩黨免官後除趙郡太守卒子道嘉字同吉豫州外兵參軍汝陽太守同吉弟文衡開府行參軍恢弟綜行河間郡早卒綜子道字良軌有業尚初拜奉朝請尚書度支郎遷洛為營構將髙祖南伐為行臺郎車駕還拜太子歩兵校尉世宗初轉歩兵校尉兼散騎侍郎副盧昶東北道使拜司空諮議加中壘將軍京兆王愉以征東將軍為冀州刺史道為愉府司馬愉反召集州府以告之道不從為愉所害}
