  - {type: variant, offset: 3481, length: 821, content: 江關掃一衡霍竊惟在鎮之兵不減數萬資糧之絹人十二匹即自隨身用度無準未及代下不免飢寒論之於公無毫釐之潤語其利私則橫費不足非所謂納民軌度公私相益也徐州左右水陸壤沃清汴通流足盈激灌其中良田十萬餘頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稻一歲之中且給官食半兵耘植餘兵尚衆且耕且守不妨捍邊一年之收過於十倍之絹暫時之耕足充數載之食於後兵資唯須內庫五稔之後穀帛俱溢匪直戍士有豐飽之資於國有吞敵之勢昔杜預田宛葉以平吳充國耕西零以強漢臣雖識謝古人任當邊守庶竭塵露有增山海高祖納之又上疏曰臣聞先王建不易之軌萬代承之聖主垂不刊之制千載共仰伏惟陛下道洽羣生恩齊造化仁德所覃迹超前哲遠崇古典留意治方革前王之弊法申當今之宜用定貢賦之輕重均品秩之厚薄庶令百辟足以代耕編戶享其餘畜巍乎煥焉不可量也臣竊尋居邊之民蒙化日淺戎馬之所資計素微小戶者一丁而已計其徵調之費終歲乃有七縑去年徵責不備或有貨易田宅質妻賣子呻吟道路不可忍聞今淮南之人思慕聖化延頸企足十室而九恐聞賦重更懷進退非惟損皇風之盛慮傷慕義之心且臣所居與南連接民情去就實所諳知特宜寬省以招未至其小郡太守數戶而已一請止六尺絹歲不滿匹既委邊捍取其必死邀之士重何吝君輕今班制已行布之天下不宜忤冒以亂朝章但猥藉恩私備位蕃岳憂責之地敢不盡言書奏文明太皇太后令曰俸制已行不可以小有不平便虧通式在州戍兵每歲交代虎子必親自勞送喪者給其斂帛州內遭水二麥不收上表請貸民粟民有車牛者求詣東兗給之並如所奏民得安堵高祖曾從容問祕書丞李彪曰卿頻使江南徐州刺史政績何如彪曰綏邊布化甚得其和高祖曰朕亦知之沛郡太守邵安下邳太守張攀咸以贓樜虎子案之於法安等遣子弟上書誣虎子南通賊虜高祖曰此其妄矣朕度虎子必不然也推案果虛乃下詔曰夫君臣體合則功業可興上下猜懼則治道替矣沛郡太守邵安下邳太守張攀咸以貪惏獲罪各遣子弟詣闕告刺史虎子縱民通賊妄稱無端安宜賜死攀及子僧保鞭一百配敦煌安息他生鞭一百可集州官兵民等宣告行決塞彼輕狡之源開此陳力之效在州十一載太和十, WYG: ''}
