  - {type: variant, offset: 6585, length: 676, content: 衞將軍率衆討擊破於關口之南遷金紫光祿大夫正武衞將軍尒朱榮向洛靈太后徵穆令屯小平及榮推奉莊帝河梁不守穆遂棄衆先降穆素為榮所知見之甚悅穆潛說榮曰公士馬不出萬人今長驅向洛前無橫陳者正以推奉主上順民心故耳既無戰勝之威羣情素不厭伏今以京師之衆百官之盛一知公之虛實必有輕侮之心若不大行誅罰更樹親黨公還北之日恐不得度太行而內難作矣榮心然之於是遂有河陰之事天下聞之莫不切齒榮入洛穆遷中軍將軍吏部尚書魯縣開國侯食邑八百戶又領夏州大中正蕭衍遣將軍曹義宗逼荊州詔穆為使持節南征將軍都督南征諸軍事大都督以援之穆潛軍徑進出其不意至即大破之生擒義宗送闕以功遷衞將軍進封趙平郡開國公增邑一千戶遷使持節加侍中車騎將軍假儀同三司前鋒大都督與大將軍元天穆東討邢杲破平之時元顥內逼莊帝北幸顥入京師穆與天穆既平齊地回師將擊顥穆先驅圍虎牢盡銳攻之將拔屬天穆北渡既無後繼人情離沮穆遂降顥以河陰酷濫事起於穆引入詰讓出而殺之時年五十三莊帝還宮追贈侍中司徒公諡曰武宣長子慶遠永安中龍驤將軍青州開府司馬第二子孝遠襲天平中叛入關西孟威字能重河南洛陽人頗有氣尚尤曉北土風俗歷東宮齋帥羽林監時四鎮高車叛投蠕蠕高祖詔威曉喻禍福追還逃散分配為民後以明解北人之語敕在著作以備推訪永平中自鎮遠將軍前軍將軍左右直長加龍驤將軍出使高昌還遷城門校尉直閤將軍沃野鎮將正光初蠕蠕主阿那瓖歸國詔遣前郢州刺史陸希道兼侍中為使主以威兼散騎常侍為副遠畿迎接阿那瓖之還國也復以威為平北將軍光祿大夫假員外常侍為使主護送之前後頻使遠蕃粗皆稱旨復加撫軍將軍普泰中除大鴻臚卿尋加驃騎大將軍左光祿大夫天平三年卒贈使持節侍中本將軍都督冀瀛滄三州諸軍事, WYG: 定末}
