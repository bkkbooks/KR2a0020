  - {type: variant, offset: 3111, length: 195, content: 事當官正直內外憚之及文明太后臨朝出虎子為枋頭鎮將虎子素剛簡為近臣所疾因小過黜為鎮門士及顯祖南巡次於山陽虎子拜訴於路曰臣昔事先帝過霑重恩陛下在諒闇之日臣橫罹非罪自擯黜此蕃已經多載不悟今日得奉聖顏遂流涕嗚咽顯祖曰卿先帝舊臣久屈非所良用憮然詔虎子侍行訪以政事數十里中占對不絕時山東飢饉盜賊競起相州民孫誨等五百餘人稱虎子在鎮之日土境清晏訴乞虎子乃復除枋頭鎮將即日之任至鎮數州之地姦徒屏跡顯祖璽書慰喻, WYG: 參軍}
