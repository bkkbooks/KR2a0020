  - {type: variant, offset: 1955, length: 794, content: 爵東陽子除奮武將軍高宗初遷尚書加散騎常侍進爵平昌公拜安南將軍遷尚書左僕射太安元年詔羣臣議立皇太子名其奴與司徒麗等以為宜以德命名帝從之又與河東王閭毗太宰常英等並平尚書事在官慎法不受私請時以西征吐谷渾諸將淹停不進久囚未決其奴與尚書毛法仁等窮問其狀連日具伏和平六年遷司空加侍中高宗崩乙渾與林金閭擅殺尚書楊保年等殿中尚書元郁率殿中宿衞士欲加兵於渾渾懼歸咎於金閭執金閭以付郁時其奴以金閭罪惡未分乃出之為定州刺史皇興元年長安鎮將東平王道符反詔其奴領征西大將軍率殿中精甲萬騎以討之未至而道符敗軍還三年薨內外咸歎惜之贈平昌王諡曰宣子天受襲爵初為內行令太和六年遷弩庫曹下大夫卒苟頹代人也曾祖烏提登國初有勳於太祖賜吳寧子父洛跋內行長頹性厚重少言嚴毅清直武力過人擢為中散小心謹敬世祖南討以頹為前鋒都將每臨敵對戰常先登陷陳世祖至江賜爵建德男加寧遠將軍還遷奏事中散典涼州作曹遷內行令轉給事中遷司衞監以本將軍拜洛州刺史為政剛嚴抑強扶弱山蠻畏威不敢為寇承明元年文明太后令百官舉才堪幹事人足委仗者於是公卿咸以頹應選徵拜散騎常侍殿中尚書進爵成德侯加後將軍太和元年加散騎常侍尋遷侍中安東將軍都曹尚書進爵河南公頹方正好直言雖文明太后生殺不允頹亦言至懇切未曾阿諛李訢李敷之誅也頹並致諫太后不從三年遷征北大將軍司空公進爵河東王以舊老聽乘步挽杖於朝大駕行幸三川頹留守京師沙門法秀謀反頹率禁衞收掩畢獲內外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗社獲安者實卿之功也七年詔曰頹為台鼎論道是寄歷奉四朝庸績彌遠宜加崇異以彰厥功自茲已後可永受復除十三年冬薨高祖痛悼者久之贈賵有加諡僖王長子愷累遷冠軍將軍柔玄懷荒武川鎮大將襲爵河東王例降為公正光二年卒贈平北將軍州刺史子寶武定中北梁太守愷弟養步兵校尉早卒養弟資武騎侍郎河間太守太僕少卿汲郡太守遷龍驤將軍肆州刺史還除武衞將軍加後將軍延昌末卒贈平北將軍并州刺史并給, WYG: ''}
