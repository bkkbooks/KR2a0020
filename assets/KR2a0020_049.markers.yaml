  - {type: variant, offset: 2770, length: 305, content: 金紫光祿大夫頹弟若周散騎常侍尚書太和中安南將軍豫州刺史潁川侯卒贈光祿大夫若周弟壽樂太和中北部尚書安南將軍懷州刺史假山陽公未拜尋除散騎常侍殿中尚書晉安侯卒贈安東將軍冀州刺史頹從叔孤少以忠直稱太宗即位以定策功拜車騎將軍後除鎮軍大將軍并州刺史博陵公不治產業死之日家無餘財百姓追思之薛野月者代人也父達頭自姚萇時率部落歸國太祖嘉其忠款賜爵聊城侯散員大夫待以上客之禮賜妻鄭氏達頭閑雅恭慎太祖深器之卒贈平南將軍冀州刺史諡曰悼野月者少失父母養於宗人利家及長好學善射高宗初召補羽林遷給事中典民籍事校計戶口號為稱職賜爵順陽子野月者少孤父侯不襲至是錫爵和平中除平南將軍并州刺史進爵河東公轉太州刺史在治有聲卒年六十一贈散騎常侍大將軍并, WYG: 幽}
