  - {type: variant, offset: 3075, length: 348, content: 侍郎敕撰太和起居注尋遷祕書丞世宗初兼給事黃門侍郎景明二年坐與咸陽王禧謀反誅時年二十九伯尚弟仲尚儀貌甚美少以文學知名二十著前漢功臣序讚及季父司空沖誄時兼侍中高聰尚書邢巒見而歎曰後生可畏非虛言也起家京兆王愉行參軍景明中坐兄事賜死年二十五仲尚弟季凱沉敏有識量坐兄事與母弟俱徙邊久之會赦免遂寓居於晉陽沉廢積年孝昌中解褐太尉參軍事加威遠將軍尋除并州安北府長史肅宗崩尒朱榮陰圖義舉季凱豫謀莊帝踐阼徵拜給事黃門侍郎封博平縣開國侯邑七百戶尋加散騎常侍平東將軍轉祕書監進號中軍將軍普泰元年七月尒朱世隆以榮之死謂季凱通知於是見害年五十五出帝初追贈侍中驃騎將軍吏部尚書定州刺史子統字基伯襲武定末太尉刑獄參軍齊受禪爵例降季凱弟延慶孝昌中解褐定州鎮北城局參軍稍遷奉車都尉陳留太守遷鎮東將軍金紫光祿大夫永熙二年卒年五十二贈本, WYG: ''}
