  - {type: variant, offset: 1701, length: 298, content: 贈輔國將軍太常少卿燮弟德廣終於中散大夫德廣弟德顯太尉行參軍稍遷散騎侍郎卒贈征虜將軍東秦州刺史德顯弟德明祕書郎彥弟虔字叔恭太和初為中書學生遷祕書中散轉冀州驃騎府長史太子中舍人世宗初遷太尉從事中郎出為清河太守屬京兆王愉反虔棄郡奔闕世宗聞虔至謂左右曰李虔在冀州日久恩信著物今拔難而來衆情自解矣乃授虔別領軍前慰勞事事平轉長樂太守延昌初冀州大乘賊起令虔以本官為別將與都督元遙討平之遷後將軍燕州刺史還為光祿大夫加平西將軍兼大司農卿出為散騎常侍安東將軍兗州刺史追論平冀州之功賜爵高平男還京除河南邑中正遷鎮軍將軍金紫光祿大夫孝莊初授特進車騎大將軍儀同三司加散騎常侍又進號驃騎大將軍開府儀同三司永安三年冬薨年七十四, WYG: ''}
