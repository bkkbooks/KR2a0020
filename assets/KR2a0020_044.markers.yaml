  - {type: variant, offset: 4264, length: 2, content: 鉅鹿, WYG: 戰功除員外散騎常侍轉直寢與万俟醜奴戰没贈冠軍將軍豫州刺史子仲鸞武定末齊王丞相府長流參軍慶壽弟慶安歴給事中尚書殿中郎中後加平北將軍武衞將軍河隂遇害贈征東將軍兗州刺史長子仲融融弟仲衍費于代}
