  - {type: variant, offset: 5017, length: 0, content: '', krp: 雍州刺史史臣曰羅結枝附葉從當舊之眷子孫顯祿俱至公王伊馛以勇力見擢而能賛伐姑臧之䇿請參}
  - {type: variant, offset: 5018, length: 0, content: '', WYG: 祕之官世祖嘉之於前良有以也乙瓌之驍猛和奴之貞正苟頽之剛直虎子之威彊宇文之氣幹咸亦有用之士費穆出身致力遂有功名而末路一言禍被簪帶校之文和異世同咎其死也幸哉孟威致力荒裔其勤可錄矣羅結孫㧞高祖時進爵濟南王㧞孫延天興中驃騎將軍案太祖初卽位年號天興㧞仕高祖其孫必非太祖時蓋年號誤也魏}
