  - {type: variant, offset: 4221, length: 3, content: 封千乘, WYG: 業可興上下猜懼則治道替矣沛郡太守邵安下邳太守張攀咸以貪惏獲罪各遣子弟詣闕告刺史虎子縱民通賊妄稱無端安宜賜死攀及子僧保鞭一百配敦煌安息他生鞭一百可集州官兵民等宣告行決塞彼輕狡之源開此陳力之效在州十一載太和十五年卒年五十一贈散騎常侍鎭南將軍相州刺史諡曰文有六子長子世遵襲爵例降為侯景明中為秦州刺史稍遷左將軍年四十二長子忱字安民正光中襲爵稍遷鎭南將軍鉅鹿太守定州儀同開府諮議參軍齊獻武王大行臺左丞中外府司馬出為殷州驃騎府長史武定五年除鎭北將軍北廣平太守為治暴虐曾因公事一家之内併殺數人為民所訟將致之罪遇患卒於郡贈征西將軍西兗州刺史忱弟安顥武定末東豫州征西府長史世遵弟曇慶少有度量永平中員外散騎常侍遷尚書郎年五十一卒子衍字元孫輕財慕義熙平中為侍御史奉朝請永安中尚書駕部郎中行河隂}
