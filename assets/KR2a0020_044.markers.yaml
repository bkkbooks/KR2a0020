  - {type: variant, offset: 2751, length: 0, content: '', WYG: 擢為侍郎轉三郎賜爵汾陽子加振威將軍世祖之將討涼州也議者咸諫唯司徒崔浩勸世祖決行羣臣出後馛言於世祖曰若涼州無水草何得為國議者不可用也宜從浩言世祖善之既剋涼州世祖大會於姑臧謂羣臣曰崔公智謀有餘吾亦不復竒之吾正竒馛弓馬之士而所見能與崔同此深自可竒顧謂浩曰馛智力如此終至公相浩曰何必讀書然後為學衞青霍去病亦不讀書而能大建勲名致位公輔世祖笑曰誠如公言馛性忠謹世祖愛之親待日殊賞賜優厚眞君初世祖欲拜馛為尚書封郡公馛辭曰尚書務殷公爵至重非臣年少愚近所宜荷任請收過恩世祖問其欲馛曰中祕二省多諸文士若恩矜不已請參其次世祖賢之遂拜為中護將軍祕書監}
