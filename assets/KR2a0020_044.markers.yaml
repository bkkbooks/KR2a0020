  - {type: variant, offset: 4664, length: 222, content: 京兆內史大將軍京兆王繼西伐請為諮議參軍尋除左將軍營州刺史時四方州鎮謀逆叛亂相續營州城內咸有異心仲遵單車赴州既至與大使盧同以恩信懷誘率皆怡悅後肅宗又詔盧同為行臺北出慰勞同疑彼人情難信聚兵將往城民劉安定等先有異志謂欲圖己還相恐動遂執仲遵二子清石阿罕尋亦見殺唯兄子徽仁得免韶從叔思穆字叔仁父抗自涼州渡江左仕劉駿歷晉壽安東東萊三郡太守思穆有度量善談論工草隸為當時所稱太和十七年攜家累自漢中歸國除步兵校尉遭母憂解任起為都水使者及車駕南伐以本官兼直閤將軍從, WYG: ''}
