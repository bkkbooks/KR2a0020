  - {type: variant, offset: 4275, length: 3, content: 失天柱, WYG: 衝賊之咽喉若此處不全則并肆危矣今欲選諸將一人留以鎭捍不知誰堪此任僉曰無過穆者崇乃請為朔州刺史仍本將軍尋改除雲州刺史穆招離聚散頗得人心時北境州鎭悉皆淪没唯穆獨據一城四面抗拒久之援軍不至兼行路阻塞糧仗俱盡穆知勢窮乃棄城南走投尒朱榮於秀容既而詣闕請罪詔原之孝昌中二絳蜀反以穆為都督討平之拜前將軍散騎常侍遷平南將軍光祿大夫妖賊李洪於陽城起逆連結蠻左詔穆兼武衞將軍率衆討擊破於關口之南遷金紫光祿大夫正武衞}
