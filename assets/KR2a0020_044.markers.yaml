  - {type: variant, offset: 4267, length: 0, content: '', WYG: 也祖峻仕赫連昌為寧東將軍泰常末率衆來降拜龍驤將軍賜爵犍為公後遷征南將軍廣阿鎭大將徙爵下邳公父郁以隨父歸誠勲賜五等男除燕郡太守卒贈幽州刺史于少有節操起家内三郎世祖南伐從駕至江以宿衞之勤除寧遠將軍賜爵松陽男遷商賈部二曹令除平南將軍懷州刺史卒子萬襲太和初除平南將軍梁國鎭將後高祖南伐萬從駕渡淮戰殁贈鎭東將軍冀州刺史子穆字朗興性剛烈有壯氣頗渉書史好尚功名世宗初襲男爵後除夏州别駕尋加寧逺將軍轉涇州平西府長史時刺史皇甫集靈太后之元舅恃外戚之親多為非法穆正色匡諫集亦憚之轉安定太守仍為長史還朝拜左軍將軍轉河隂令有嚴明之稱時蠕蠕主婆羅門自涼州歸降其部衆因饑侵掠邊邑詔穆銜命宣慰便皆欵附明年復叛入寇涼州除穆輔國將軍假征虜將軍兼尚書左丞西北道行臺仍為别將往討之穆至涼州蠕蠕遁走穆謂其所部曰彼衆輕狡唯利是視見敵便走乘虛復出今王師來討雖畏威逃跡然軍還之後必來侵暴今欲羸師誘致冀獲一戰若不令其破膽終恐疲於奔命衆咸然之穆乃簡練精騎伏於山谷使羸劣之衆為外營以誘之賊騎覘見謂為信弱俄而競至穆伏兵奔擊大破之斬其帥郁厥烏爾俟斤十代等獲生口雜畜甚衆及六鎭反叛詔穆為别將𨽻都督}
