  - {type: variant, offset: 4213, length: 0, content: '', krp: 進爵成德侯加後將軍太和元年加散騎常侍尋遷侍中安東將軍都曹尚書進爵河南公頽方正好直言雖文明太后生殺不允頽亦言至懇切未曾阿諛李訢李敷之誅也頽竝致諫太后不從三年遷征北大將軍司空公進爵河東王以舊老聽乘歩挽杖於朝大駕行幸三川頽留守京師沙門法秀謀反頽率禁衞收掩畢獲内外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗社獲安者實卿之功也七年詔曰頽為台鼎論道是寄歴奉四朝庸績彌遠宜加崇異以彰厥功自兹已後可永受復除十三年冬薨高祖痛悼者久之贈賵有加諡僖王長子愷累遷冠軍將軍柔𤣥懷荒武川鎮大將襲爵河東王例降為公正光二年卒贈平北將軍恒州刺史子寶武定中北梁太守愷弟養歩兵校尉早卒養弟資武騎侍郎河間太守太僕少卿汲郡太守遷龍驤將軍肆州刺史還除武衞將軍加後將軍延昌末卒贈平北將軍并州刺史并給帛二百匹布一百匹諡曰愍子景蠻莊帝時撫軍將軍金紫光祿大夫頽弟若周散騎常侍尚書太和中安南將軍豫州刺史潁川侯卒贈光祿大夫若周弟壽樂太和中北部尚書安南將軍懷州刺史假山陽公未拜尋除散騎常侍殿中尚書晉安侯卒贈安東將軍冀州刺史頽從叔孤少以忠直稱太宗即位以定䇿功拜車騎將軍後除鎭軍大將軍并州刺史愽陵公不治產業死之日家無餘財百姓}
  - {type: variant, offset: 4214, length: 4, content: 論固守荊, WYG: 思之薛野䐗代人也父達頭自姚萇時率部落歸國太祖嘉其忠款賜爵聊城侯散員大夫待以上客之禮賜妻鄭氏達頭閑雅恭愼太祖深器之卒贈平南將軍冀州刺史諡曰悼野䐗少失父母養於宗人利家及長好學善射高宗初召補羽林遷給事中典民籍事校計户口號為稱職賜爵順陽子野䐗少孤父侯不襲至是錫爵和平中除平南將軍并州刺史進爵河東公轉太州刺史在治有聲卒年六十一贈散騎常侍大將軍并州刺史諡曰簡子虎子姿貌壯偉明斷有父風年十三入侍高宗太安中遷内行長典奏諸曹事當官正直内外憚之及文明太后臨朝出虎子為枋頭鎭將虎子素剛簡為近臣所疾因小過黜為鎭門士及顯祖南廵次於山陽虎子拜訴於路曰臣昔事先帝過霑重恩陛下在諒闇之日臣橫罹非罪自擯黜此蕃已經多載不悟今日得奉聖顏遂流涕嗚咽顯祖曰卿先帝舊臣久屈非所良用憮然詔虎子侍行訪以政事數十里中占對不絶時山東饑饉盜賊競起相州民孫誨等五百餘人稱虎子在鎭之日土境清晏訴乞虎子仍復除枋頭鎭將即日之任至鎭數}
