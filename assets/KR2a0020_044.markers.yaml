  - {type: variant, offset: 3435, length: 381, content: 儀同開府參軍事延慶弟延度武定中衞將軍安德太守輔弟佐字季翼有文武才幹高祖初兼散騎常侍銜命使高麗以奉使稱旨還拜常山太守賜爵真定子遷冠軍將軍懷州刺史賜爵山陽侯尋加安南將軍河內公轉安東將軍相州刺史所在有稱績車駕南討拜安南將軍副大司馬咸陽王禧為殿中將軍尋被敕與征南將軍城陽王鸞安南將軍盧淵等軍攻赭陽各不相節度諸軍皆坐甲城下欲以不戰降賊佐獨勒所部晨夜攻擊屬蕭鸞遣其太子右衞率垣歷生率衆來援咸以勢弱不敵規欲班師佐乃簡騎二千逆賊為賊所敗坐徙瀛州為民車駕征宛鄧復起佐假平遠將軍統軍蕭鸞新野太守劉忌憑城固守佐率所領攻拔之以功封涇陽縣開國子邑三百戶沔北既平廣陽王嘉為荊州刺史仍以佐為嘉鎮南府長史加輔國將軍別鎮新野及大軍凱旋高祖執佐手曰沔北洛陽南門卿既為朕平之亦當為朕善守高祖崩遺敕以佐行荊州事仍本將軍佐在州威信大行邊民悅附前後歸之者二萬許家尋正刺史世宗初徵兼都官尚書景明二年卒年七十一, WYG: 重}
  - {type: variant, offset: 3435, length: 381, content: 儀同開府參軍事延慶弟延度武定中衞將軍安德太守輔弟佐字季翼有文武才幹高祖初兼散騎常侍銜命使高麗以奉使稱旨還拜常山太守賜爵真定子遷冠軍將軍懷州刺史賜爵山陽侯尋加安南將軍河內公轉安東將軍相州刺史所在有稱績車駕南討拜安南將軍副大司馬咸陽王禧為殿中將軍尋被敕與征南將軍城陽王鸞安南將軍盧淵等軍攻赭陽各不相節度諸軍皆坐甲城下欲以不戰降賊佐獨勒所部晨夜攻擊屬蕭鸞遣其太子右衞率垣歷生率衆來援咸以勢弱不敵規欲班師佐乃簡騎二千逆賊為賊所敗坐徙瀛州為民車駕征宛鄧復起佐假平遠將軍統軍蕭鸞新野太守劉忌憑城固守佐率所領攻拔之以功封涇陽縣開國子邑三百戶沔北既平廣陽王嘉為荊州刺史仍以佐為嘉鎮南府長史加輔國將軍別鎮新野及大軍凱旋高祖執佐手曰沔北洛陽南門卿既為朕平之亦當為朕善守高祖崩遺敕以佐行荊州事仍本將軍佐在州威信大行邊民悅附前後歸之者二萬許家尋正刺史世宗初徵兼都官尚書景明二年卒年七十一, krp: 重}
