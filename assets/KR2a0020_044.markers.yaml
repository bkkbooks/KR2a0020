  - {type: variant, offset: 4263, length: 0, content: '', WYG: 解任復除太僕卿又為金紫光祿大夫出除散騎常侍都督懷朔沃野武川三鎭諸軍事征北將軍懷朔鎭將至鎭遇病卒詔遣主書樂安嘉赴弔贈車騎大將軍定州刺史開國如故諡曰貞惠長子善字慶孫襲爵自司空掾稍遷平南將軍光祿大夫孝昌末北征戰殁贈車騎將軍冀州刺史善弟延字慶壽體貌魁岸眉目疎朗永平中釋褐奉朝請直後員外散騎常侍以父老詔聽隨侍在瀛州屬大乘妖黨突入州城延率奴客戰死者數人身被重瘡賊乃小退而縱火燒齋閣福時在内延突火而入抱福出外支體灼爛髮盡為燼於是勒衆與賊苦戰賊乃散走以此見稱孝昌中授假節建威將軍西道别將赴援關隴}
