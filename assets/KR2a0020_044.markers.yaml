  - {type: variant, offset: 1292, length: 200, content: 開府士曹參軍早亡韶弟彥字次仲頗有學業高祖初舉司州秀才除中書博士轉諫議大夫後因考課降為元士尋行主客曹事徙郊廟下大夫時朝儀典章咸未周備彥留心考定號為稱職高祖南伐彥以蕞爾江閩不足親勞鑾駕頻有表諫雖不從納然亦嘉其至誠及六軍次於淮南徵為廣陵王羽長史加恢武將軍西翼副將軍還除冀州趙郡王幹長史轉青州廣陵王羽長史帶齊郡太守徵為龍驤將軍司徒右長史轉左長史秦州大中正出行揚州事尋徵拜河南尹還至汝陰復敕行徐州事轉平北將軍平, WYG: 岐}
