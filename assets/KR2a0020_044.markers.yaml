  - {type: variant, offset: 3985, length: 0, content: '', WYG: 西兗州刺史天平元年舉兵應樊子鵠與行臺左丞宗顯戰敗死時年四十六瑗弟諧字遵和武定中司馬諧弟琛字仲珍解褐司空參軍事稍遷東平濟隂二郡太守散騎常侍卒時年四十九和其奴代人也少有操行善射御初為三郎轉羽林中郎以恭勤致稱賜爵東陽子除奮武將軍高祖初遷尚書加散騎常侍進爵平昌公拜安南將軍遷尚書左僕射太安元年詔羣臣議立皇太子名其奴與司徒麗等以為宜以德命名帝從之又與河東王閭毗太宰常英等竝平尚書事在官愼法不受私請時以西征吐谷渾諸將淹停不進久囚未決其奴與尚書毛法仁等窮問其狀連日具伏和平六年遷司空加侍中高宗崩乙渾與林金閭擅殺尚書楊保年等}
