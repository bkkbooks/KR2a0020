  - {type: variant, offset: 4325, length: 0, content: '', WYG: 進封趙平郡開國公增邑一千户遷使持節加侍中車騎將軍假儀同三司前鋒大都督與大將軍元天穆東討邢杲破平之時元顥内逼莊帝北幸顥入京師穆與天穆既平齊地回帥將擊顥穆先驅圍虎牢盡銳攻之將㧞屬天穆北渡既無後繼人情離沮穆遂降顥以河隂酷濫事起於穆引人詰讓出而殺之時年五十三莊帝還宮追贈侍中司徒公諡曰武宣長子慶逺永安中龍驤將軍青州開府司馬第二子孝遠襲天平中叛入關西孟威字能重河南洛陽人頗有氣尚尤曉北土風俗歴東宫齊帥羽林監時四鎭高車叛投蠕蠕高祖詔威曉喻禍福追還逃散分配為民後以明解北人之語勅在著作以備推訪永平中自鎭遠將軍前軍將軍左}
