  - {type: variant, offset: 2012, length: 668, content: 驃騎大將軍太尉公冀州刺史男如故諡曰宣景長子曖字仁明解褐司空行參軍稍遷尚書左外兵郎孝莊初於河陰遇害年四十贈安東將軍度支尚書青州刺史子褒武定中太師法曹參軍曖弟昞字仁曜起家高陽王雍常侍員外散騎侍郎太尉錄事參軍孝莊初與兄曖同時遇害年三十八贈散騎常侍左將軍兗州刺史子為武定中司空長流參軍昞弟昭字仁照卒於散騎侍郎贈征虜將軍涼州刺史子士元操武定中並儀同開府參軍事昭弟曉字仁略武定末太尉諮議參軍虔弟蕤字延賓歷步兵校尉東郡太守司農少卿卒贈龍驤將軍豫州刺史長子詠字義興有幹局起家太學博士領殿中侍御史稍遷東郡太守莊帝初遷安東將軍濟州刺史轉廣州刺史加散騎常侍前廢帝時與第三弟通直散騎常侍義真第七弟中書侍郎太常少卿義邕同時為尒朱仲遠所害義邕莊帝居蕃之日以外親甚見親昵及有天下特蒙信任尒朱榮之誅義邕與其事由是並及於禍出帝初贈詠侍中驍騎將軍吏部尚書冀州刺史義真贈前將軍齊州刺史義邕贈安東將軍青州刺史詠次弟義慎司空屬第四弟義遠國子博士莊帝初並於河陰遇害義慎贈散騎常侍征東將車雍州刺史承弟茂字仲宗高宗末襲父爵鎮西將軍敦煌公高祖初除長安鎮都將轉西兗州刺史將軍如故入為光祿大夫例降為侯茂性謙慎以弟沖寵盛懼於盈遂託以老疾固請遜位高祖不奪其志聽食大夫祿還私第因居定州之中山自是優遊里舍不入京師景明三年卒時年七十一諡曰恭侯子靜字紹安襲解褐太尉參軍事定州別駕東平原太守神龜三年卒年五十五子遐字智遠有几案才起家司空行參軍襲爵稍遷右將軍尚書駕部郎中出為河內太守尒朱榮稱兵向洛次其郡境莊帝潛濟河北相會遐既聞榮推奉莊帝遂開門謁候仍從駕南渡及河陰為亂兵所害時年四十二事寧追贈散騎常侍車騎大將軍, WYG: ''}
