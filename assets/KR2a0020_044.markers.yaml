  - {type: variant, offset: 5030, length: 1, content: 子, krp: 其孫先於爾時為驃騎將軍光祿大夫者耶年號當有訛費于傳引人詰讓人北史作入魏書卷四}
  - {type: variant, offset: 5033, length: 134, content: 人嫡子斌襲官至散騎侍郎早卒斌兄奬武定末司徒左長史李氏自初入魏人位兼舉因沖寵遇遂為當世盛門而仁義吉凶情禮淺薄期功之服殆無慘容相視窘乏不加拯濟識者以此貶之史臣曰李寶家難流離晚獲歸正大享名器世業不殞諸子承基俱有位望韶清身履度聲績洽美矣神儁才尚風流殆民望也貞粹之地君子或未許焉, WYG: 考證}
