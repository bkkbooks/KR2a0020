  - {type: variant, offset: 4214, length: 4, content: 論固守荊, krp: 思之薛野䐗代人也父達頭自姚萇時率部落歸國太祖嘉其忠款賜爵聊城侯散員大夫待以上客之禮賜妻鄭氏達頭閑雅恭愼太祖深器之卒贈平南將軍冀州刺史諡曰悼野䐗少失父母養於宗人利家及長好學善射高宗初召補羽林遷給事中典民籍事校計户口號為稱職賜爵順陽子野䐗少孤父侯不襲至是錫爵和平中除平南將軍并州刺史進爵河東公轉太州刺史在治有聲卒年六十一贈散騎常侍大將軍并州刺史諡曰簡子虎子姿貌壯偉明斷有父風年十三入侍高宗太安中遷内行長典奏諸曹事當官正直内外憚之及文明太后臨朝出虎子為枋頭鎭將虎子素剛簡為近臣所疾因小過黜為鎭門士及顯祖南廵次於山陽虎子拜訴於路曰臣昔事先帝過霑重恩陛下在諒闇之日臣橫罹非罪自擯黜此蕃已經多載不悟今日得奉聖顏遂流涕嗚咽顯祖曰卿先帝舊臣久屈非所良用憮然詔虎子侍行訪以政事數十里中占對不絶時山東饑饉盜賊競起相州民孫誨等五百餘人稱虎子在鎭之日土境清晏訴乞虎子仍復除枋頭鎭將即日之任至鎭數}
  - {type: variant, offset: 4220, length: 0, content: '', WYG: 地姦徒屏跡顯祖璽書慰喻後除平南將軍相州刺史顯祖崩不行太和二年襲爵三年詔虎子督三將出壽春與劉昶南討四年徐州民桓和等叛逆屯於五固詔虎子為南征都副將與尉元等討平之以本將軍為彭城鎭將至鎭雅得民和除開府徐州刺史時州鎭戍兵資絹自隨不入公庫任其私用常苦飢寒虎子上表曰臣聞金湯之固非粟不守韓白之勇非糧不戰故自用兵以來莫不先積聚然後圖兼并者也今江左未賓鯨鯢待戮自不委粟彭城以彊豐沛將何以拓定江關掃一衡霍竊惟在鎭之兵不減數萬資糧之絹人十二匹即自隨身用度無準未及代下不免饑寒論之於公無毫釐之潤語其利私則横費不足非所謂納民軌度公私相益也徐州左右水陸壤沃清汴通流足盈激灌其中良田十萬餘頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稻一嵗之中且給官食半兵􅜶植餘兵尚衆且耕且守不妨捍邊一年之收過於十倍之絹暫時之耕足充數載之食於後兵資唯須内庫五稔之後穀帛俱溢匪直戍士有豐飽之資於國有吞敵之勢昔杜預田宛葉以平吳充國耕西零以彊漢臣雖識謝古人任當邊守庶竭塵露有增山海高祖納之又上疏曰臣聞先王建不易之軌萬代承之聖主埀不刋之制千載共仰伏惟陛下道洽羣生恩齊造化仁德所覃迹超前哲遠崇古典留意治方革前王之弊法申當今之宜用定貢賦之輕重均品秩之厚薄庶令百辟足以代耕編户享其餘畜巍乎煥焉不可量也臣竊尋居邊之民蒙化日淺戎馬之所資計素微小户者一丁而已計其徵調之費終嵗乃有七縑去年徵責不備或有貨易田宅質妻賣子呻吟道路不可忍聞今淮南之人思慕聖化延頸企足十室而九恐聞賦重更懐進退非惟損皇風之盛慮傷慕義之心且臣所居與南連接民情去就實所諳知特宜寛省以招未至其小郡太守數户而已一請止六尺絹嵗不滿匹既委邊捍取其必死邀之士重何吝君輕今班制已行布之天下不宜忤冒以亂朝章但猥藉恩私備位蕃岳憂責之地敢不盡言書奏文明太皇太后令曰俸制已行不可以小有不平便虧通式在州戍兵每嵗交代虎子必親自勞送喪者給其歛帛州内遭水二麥不收上表請貸民粟民有車牛者求詣東兗給之竝如所奏民得安堵高祖曾從容問祕書丞李彪曰卿頻使江南徐州刺史政績何如彪曰綏邊布化甚得其和高祖曰朕亦知之沛郡太守邵安下邳太守張攀咸以贓汚虎子案之於法安等遣子弟上書誣虎子南通賊虜高祖曰此其妄矣朕度虎子必不然也推案果虛乃下詔曰夫君臣體合則}
