  - {type: variant, offset: 4213, length: 0, content: '', WYG: 進爵成德侯加後將軍太和元年加散騎常侍尋遷侍中安東將軍都曹尚書進爵河南公頽方正好直言雖文明太后生殺不允頽亦言至懇切未曾阿諛李訢李敷之誅也頽竝致諫太后不從三年遷征北大將軍司空公進爵河東王以舊老聽乘歩挽杖於朝大駕行幸三川頽留守京師沙門法秀謀反頽率禁衞收掩畢獲内外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗社獲安者實卿之功也七年詔曰頽為台鼎論道是寄歴奉四朝庸績彌遠宜加崇異以彰厥功自兹已後可永受復除十三年冬薨高祖痛悼者久之贈賵有加諡僖王長子愷累遷冠軍將軍柔𤣥懷荒武川鎮大將襲爵河東王例降為公正光二年卒贈平北將軍恒州刺史子寶武定中北梁太守愷弟養歩兵校尉早卒養弟資武騎侍郎河間太守太僕少卿汲郡太守遷龍驤將軍肆州刺史還除武衞將軍加後將軍延昌末卒贈平北將軍并州刺史并給帛二百匹布一百匹諡曰愍子景蠻莊帝時撫軍將軍金紫光祿大夫頽弟若周散騎常侍尚書太和中安南將軍豫州刺史潁川侯卒贈光祿大夫若周弟壽樂太和中北部尚書安南將軍懷州刺史假山陽公未拜尋除散騎常侍殿中尚書晉安侯卒贈安東將軍冀州刺史頽從叔孤少以忠直稱太宗即位以定䇿功拜車騎將軍後除鎭軍大將軍并州刺史愽陵公不治產業死之日家無餘財百姓}
