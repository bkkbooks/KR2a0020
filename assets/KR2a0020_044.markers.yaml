  - {type: variant, offset: 4244, length: 3, content: 風流情, WYG: 書北道行臺代魏蘭根後為鎭東將軍金紫光祿大夫太昌初加征東將軍行兗州事天平中除驃騎大將軍齊州刺史曇尚凡歴三州俱稱貪虐還除將作大匠卒於官年六十一贈都督瀛滄二州諸軍事本將軍儀同三司瀛州刺史子仲芬武定中齊文襄王中外府中兵參軍曇尚弟琡字曇珍武定末儀同三司尚書右僕射宇文福河南洛陽人其先南單于之遠屬世為擁部大人祖活撥仕慕容垂為唐郡内史遼東公太祖之平慕容寶活撥入國為第一客福少驍果有膂力太和初拜羽林郎將遷建節將軍賜爵新昌侯南征都將擊蕭賾有功授顯武將軍尋除恢武將軍北征都將特賜戎服破蠕蠕别部獲萬餘還除都牧給事十七年車駕南討假冠軍將軍後軍將軍時仍遷洛勅福檢行牧馬之所福規石濟以西河内以東拒黃河南北千里為牧地事尋施行今之馬塲是也及從代移雜畜於牧所福善於將養竝無損耗高祖嘉之尋補司衞監從駕豫州加冠軍將軍西道都將假節征虜將軍領精騎一千專殿駕後未幾轉驍騎將軍仍領太僕典牧令從駕征南陽兼武衞將軍二十二年車駕南討遣福與右衞將軍楊播為前軍至鄧城福選兵簡將為攻圍之勢高祖望福軍法齊整將士閑習大被褒歎蕭鸞遣其尚書崔慧景黃門郎蕭衍率衆十萬來救高祖指麾將士勅福領高車羽林五百騎出賊南面奪其橋道遏絶歸路賊衆大恐六道來戰福據鞍誓衆身先士卒賊不得前遂大奔潰賜爵昌黎伯正武衞加征虜將軍尋以高車叛命加征北將軍北征都將追討之軍敗被黜景眀初乃起拜平遠將軍南征統軍進計於都督彭城王勰曰建安是淮南重鎭彼此要衝得之則義陽易圖不獲則壽春難保勰然之及勰為州遂令福攻建安建安降以勲封襄樂縣開國男邑二百户除太僕少卿尋以衍將寇邊假節征虜將軍領兵出三關討之又詔福行豫州事與東豫州刺史田益宗共相影援綏遏蠻楚還為光祿大夫轉太僕卿延昌中以本官領左衞將軍除散騎常侍都官尚書加安東將軍營州大中正熙平初除鎭北將軍瀛州刺史福性忠清}
