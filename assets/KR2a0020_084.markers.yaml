  - {type: variant, offset: 3, length: 0, content: '', WYG: 八十四齊魏收撰列傳儒林第}
  - {type: variant, offset: 3, length: 0, content: '', krp: 八十四齊魏收撰列傳儒林第}
  - {type: variant, offset: 5, length: 4, content: 九列傳第, WYG: 二梁越盧醜張偉梁祚平恒陳竒常爽劉獻之張吾貴劉蘭孫恵蔚徐遵明董徴刁沖盧景裕李同軌李業興自晉永嘉之後運鍾喪亂宇内分崩羣兇肆禍生民不見爼豆之容黔首唯覩戎馬之跡禮樂文章掃地将盡而契之所感斯道猶存高才有徳之流自彊蓬蓽鴻生碩儒之軰抱器晦已太祖初定中原雖日不暇給始建都邑便以經術為先立太學置五經博士生員千有餘人天興二年春增國子太學生員至三千豈不以天下可馬上取之不可以馬上治之為國之道文武兼用毓才成務意在兹乎聖達經猷葢為逺矣四年春命樂師入學習舞釋菜於先聖先師太宗世改國子為中書學立教授博士世祖始光三年春别起太學於城東後徴盧元高允等而令州郡各舉才學於是人多砥尚儒林轉興顯祖天安初詔立鄉學郡置博士二人助教二人學生}
  - {type: page-break, offset: 5, content: '', id: KR2a0020_WYG_084-1b, image: WYG0262/WYG0262-0229d.png}
  - {type: page-break, offset: 5, content: '', id: KR2a0020_WYG_084-2a, image: WYG0262/WYG0262-0230a.png}
  - {type: variant, offset: 5, length: 4, content: 九列傳第, krp: 二梁越盧醜張偉梁祚平恒陳竒常爽劉獻之張吾貴劉蘭孫恵蔚徐遵明董徴刁沖盧景裕李同軌李業興自晉永嘉之後運鍾喪亂宇内分崩羣兇肆禍生民不見爼豆之容黔首唯覩戎馬之跡禮樂文章掃地将盡而契之所感斯道猶存高才有徳之流自彊蓬蓽鴻生碩儒之軰抱器晦已太祖初定中原雖日不暇給始建都邑便以經術為先立太學置五經博士生員千有餘人天興二年春增國子太學生員至三千豈不以天下可馬上取之不可以馬上治之為國之道文武兼用毓才成務意在兹乎聖達經猷葢為逺矣四年春命樂師入學習舞釋菜於先聖先師太宗世改國子為中書學立教授博士世祖始光三年春别起太學於城東後徴盧元高允等而令州郡各舉才學於是人多砥尚儒林轉興顯祖天安初詔立鄉學郡置博士二人助教二人學生}
  - {type: xml-element, offset: 6, content: '', id: KR2a0020_ZHSJ_084-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR2a0020_ZHSJ_084-d84p1s1}
  - {type: line-break, offset: 6, content: '', id: ZHSJ__dup21552}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 人後詔大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人太和中改中書學為國子學建明堂辟雍尊三老五更又開皇子之學及遷都洛邑詔立國子太學四門小學高祖欽明稽古篤好墳典坐輿據鞍不忘講道劉芳李彪諸人以經書進崔光邢巒之徒以文史達其餘渉獵典章閑集詞翰莫不縻以好爵動貽賞眷於是斯文鬱然比隆周漢世宗時復詔營國學樹小學於四門大選儒生以為小學博士員四十人雖黌宇未立而經術彌顯時天下承平學業大盛故燕齊趙魏之間横經著錄不可勝數大者千餘人小者猶數百州舉茂異郡貢孝廉對揚王庭每年逾衆神龜中將立國學詔以三品以上及五品清官之子以充生選未及簡置仍復停寝正光三年乃釋奠於國學命祭酒崔光講孝經始置國子生三十六人暨孝昌之後海内淆亂四方校學所存無㡬永熙中復釋奠於國學又於顯陽殿詔祭酒劉廞講孝經黄門李郁説禮記中書舎人盧景宣講大戴禮夏小正篇復置生}
