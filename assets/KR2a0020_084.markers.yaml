  - {type: variant, offset: 4226, length: 0, content: '', WYG: 徐遵明於趙魏之間時有漁陽鮮于靈馥亦聚徒教授而遵明聲譽未高著錄尚寡業興乃詣靈馥黌舍類受業者靈馥乃謂曰李生久逐羌博士何所得也業興黙爾不言及靈馥説左𫝊業興問其大義數條靈馥不能對於是振衣而起曰羌子弟正如此耳遂便徑還自此靈馥生徒傾學而就遵明遵明學徒大盛業興之為也後乃博渉百家圖緯風角天文占候無不討練尤長算厯雖在貧賤常自矜負若禮待不足縱於權貴不為之屈後為王遵業門客舉孝廉為校書郎以世行趙匪歴節氣後辰下算延昌}
