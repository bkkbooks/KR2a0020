  - {type: variant, offset: 6525, length: 0, content: '', WYG: 可復守諸侯之地故分封二公衍又問乾卦初稱潛龍二稱見龍至五飛龍初可名為虎問意小乖業興對學識膚淺不足仰酬衍又問尚書正月上日受終文祖此是何正業興對此是夏正月衍言何以得知業興曰案尚書中候運}
