  - {type: variant, offset: 206, length: 3, content: 裴昭明, WYG: 出為河内太守延和二年冬卒闕初中山襲爵太和中以老疾自免子升頭襲爵後例降張偉字仲業小名翠螭太原中都人也高祖敏晉秘書監偉學通諸經講授鄉里受業者常數百人儒謹汎納勤於教訓雖有頑固不曉問至數十偉告喻殷勤曾無慍色常依附經典教以孝悌門人感其仁化事之如父性恬平不以夷嶮易操清雅篤慎非法不言世祖時與高允等俱被辟命拜中書博士轉侍郎大将軍樂安王範從事中郎馮翊太守還仍為中書侍郎本國大中正使酒泉慰勞沮渠無諱還遷}
