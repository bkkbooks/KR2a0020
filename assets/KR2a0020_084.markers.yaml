  - {type: variant, offset: 618, length: 737, content: 南之日必得罪本朝淹言彼有君子也卿將命折中還南之日應有高賞若無君子也但令有光國之譽雖復非理見罪亦復何嫌南史董孤自當直筆既而高祖遣李沖問淹昭明所言淹以狀對高祖詔沖曰我所用得人仍敕送衣給昭明等賜淹果食明旦引昭明等入皆令文武盡哀後正侍郎高祖以淹清貧賜絹百匹十六年蕭賾遣其散騎常侍庾蓽散騎侍郎何憲主書邢宗慶朝貢值朝廷有事明堂因登靈臺以觀雲物高祖敕淹引蓽等館南矚望行禮事畢還外館賜酒食宗慶語淹言南北連和既久而比棄信絕好為利而動豈是大國善隣之義淹言夫為王者不拘小節中原有菽工採者獲多豈眷眷守尾生之信且齊先主歷事宋朝荷恩積世當應便爾欺奪宗慶庾蓽及行者皆相顧失色何憲知淹昔從南入而以手掩目曰卿何為不作于禁而作魯肅淹言我捨危効順欲追蹤陳韓何于禁之有憲亦不對王肅歸國也高祖以淹曾官江表詔觀是非乃造肅與語還奏言實時議紛紜猶謂未審高祖曰明日引入我與語自當知之及鑾輿行幸肅多扈從敕淹將引若有古跡皆使知之行到朝歌肅問此是何城淹言紂都朝歌城肅言故應有殷之頑民也淹言昔武王滅紂悉居河洛中因劉石亂華仍隨司馬東渡肅知淹寓於青州乃笑而謂淹曰青州間何必無其餘種淹以肅本隸徐州言青州本非其地徐州間今日重來非所知也肅遂伏馬上掩口而笑顧謂侍御史張思寧曰向者聊因戲言遂致辭溺思寧馳馬奏聞高祖大悅謂彭城王勰曰淹此段足為制勝輿駕至洛肅因侍宴高祖戲肅曰近者行次朝歌聞成淹共卿殊有往覆卿試重之肅言臣前朝歌為淹所困不謂此事仰聞聽覽臣爾日失言一之已甚豈宜再說遂皆大笑高祖又謂肅曰淹能制卿其才亦不困肅言淹才詞便為難有聖朝宜應進高祖言若因此進淹恐辱卿轉甚肅言臣屈己達人正可顯臣之美高祖曰卿既為人所屈欲求屈己之名復於卿太優肅言淹既蒙進臣得屈己伸人此所謂陛下惠而不費遂酣笑而止乃賜淹龍上馬一匹并鞍勒宛具朝服一襲轉謁者僕射時遷都高祖以淹家無行資敕, WYG: 拜}
