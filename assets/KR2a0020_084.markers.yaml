  - {type: 'tls:seg', offset: 3686, content: '', id: KR2a0020_ZHSJ_084-d84p24s5}
  - {type: variant, offset: 3688, length: 0, content: '', WYG: 祠墓之榮伏見故處士兖州徐遵明生在衡泌弗因世族之基長於原野匪乘雕有之地而託心淵曠置情恬雅處靜無悶居約不憂故能垂簾自精下帷獨得鑽經緯之微言研聖賢之妙旨莫不入其門户踐其堂奥信以稱大儒於海内擅明師於日下矣是故眇眇四方知音之類延首慕徳跂踵依風每精廬暫闢杖策不逺千里束修受業編錄将踰萬人固已企盛烈於西河擬高蹤於北海若慕竒好士愛客尊賢罷吏遊梁紛而成列遵明以碩徳重名首蒙禮命曳􅅂雅歩眷同置醴黄門李郁具所知明方申薦奏之恩處心守壑之志潛居樂道遂往不歸故北海王入洛之初率土風靡遵明確然守志忠潔不渝遂與太守李湛將誅叛逆時有邂逅受斃凶險至誠高節堙沒無聞朝野人士相與嗟悼伏惟陛下逺應龍序俯執天𠂻每端聽而忘昃常坐思而候曉雖微功小善片言一行莫不衣裳加室玉帛在門况遵明冠蓋一時師表當世溘焉㝠沒旌紀寂寥逝者長辭無論榮價文明叙物敦厲斯在臣託跡諸生親承顧眄惟伏膺之義感在三之重是以越分陳愚上諠幄座特乞加以顯諡追以好爵仰申朝廷尚徳之風下示學徒稽古之利若宸鑒昭回曲垂矜採則荒墳千載式貴生平卒無贈諡董徴字文發頓丘衛國人也祖英高平太守父虬郡功曹徴身長七尺二寸好古學尚雅素年十七師}
  - {type: page-break, offset: 3688, content: '', id: KR2a0020_WYG_084-20b, image: WYG0262/WYG0262-0239b.png}
