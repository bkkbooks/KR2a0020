  - {type: variant, offset: 2897, length: 0, content: '', krp: 郡中正恵蔚既入東觀見典籍未周乃上疏曰臣聞聖皇之御世也必幽贊人經參天貳地憲章典故述遵鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圖書祕籍乃承天之正術治人之貞範是以溫柔疏逺詩書之教恭儉易良禮樂之道爻彖以精微為神春秋以屬辭為化故大訓炳於東序藝文光於麟閣斯實}
  - {type: variant, offset: 2898, length: 4, content: 守時冀州, WYG: 平之樞宗勝殘之要道有國之靈基帝王之盛業安上靖民敦風美俗其在兹乎及秦棄學術禮經泯絶漢興求訪典文載舉先王遺訓燦然復存暨光武撥亂日不暇給而入洛之書二千餘兩魏晉之世尤重典墳収亡集逸九流咸備觀其鳩閲史篇訪購經論紙竹所載略盡無遺臣學闕通儒思不及逺徒循章句片義無立而慈造曲覃厠班祕省忝官承乏唯書是司而觀閣舊典先無定目}
