  - {type: variant, offset: 3700, length: 1, content: 長, WYG: 籧篨裹尸倮而葬者確而為論並非折𠂻既知二者之失豈宜同之當令所存者棺厚不過三寸高不過三尺弗用繒綵歛以時服轜車止用白布為幔不加畫飾名為清素車又去挽歌方相幷明器雜物及沖祖遵将卒敕其子孫令奉雍遺旨河南尹丞張普恵謂為太儉貽書於沖叔整議其進退整令與通學議之沖乃致書國學諸儒以論其事學官竟不能荅沖以嫡𫝊祖爵東}
