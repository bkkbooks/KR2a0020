  - {type: variant, offset: 297, length: 320, content: 出何典淹言吉凶不同禮有成數玄冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿遠自江南奉慰不能式遵成事方謂議出何典行人得失何其異哉昭明言二國交和既久南北皆須準望齊高帝崩魏遣李彪通弔於時初不素服齊朝亦不以為疑那得苦見要逼淹言彪通弔之日朝命以弔服自隨而彼不遵高宗追遠之慕乃踰月即吉彪行弔之時齊之君臣皆已鳴玉盈庭貂璫曜日百僚內外朱服煥然彪行人不被主人之命復何容獨以素服間衣冠之中來責雖高未敢聞命我皇帝仁孝之性侔於有虞處諒闇以來百官聽於冢宰卿豈得以此方彼也昭明乃搖膝而言三皇不同禮亦安知得失所歸淹言若如來談卿以虞舜高宗為非也昭明遂相顧而笑曰非孝者宣尼有成責行人亦弗敢言希主人裁以弔服使人唯齎袴褶比既戎服不可以弔幸借緇衣以申國命今為魏朝所逼違負指授, WYG: 隆}
