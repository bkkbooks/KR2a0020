  - {type: variant, offset: 5825, length: 203, content: 青州彭城王劭府長兼司馬尋解長兼廣川人劉鈞東清河人房須反劭遣悆監州軍討之戰於商山頗有所捷將統皆劭左右擅增首級妄請賞帛悆面執不與劭弗從悆勃然作色曰竭志立言為王為國豈悆家事不辭而出劭追而謝焉竊勳者放言噂欲加私害悆聞而笑之不以介意先是蕭衍遣將彭羣王辯率衆七萬圍逼琅邪自春及秋官軍不至而兩青士馬裁可萬餘師次鄖城久而未進劭乃遣悆南青州刺史胡平遣長史劉仁之並監勒諸將徑赴賊壘大破之斬羣首俘馘二千餘級肅宗嘉之璽書勞問永安中, WYG: 摘句後}
