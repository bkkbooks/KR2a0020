  - {type: variant, offset: 1930, length: 0, content: '', WYG: 修竒河北人也自云晉凉州刺史驤之八世孫祖刃仕慕容垂竒少孤家貧而奉母至孝髫齓聰識有夙成之美性氣剛亮與俗不羣愛翫經典博通墳籍常非馬融鄭𤣥解經失㫖志在著述五經}
  - {type: page-break, offset: 1930, content: '', id: KR2a0020_WYG_084-7b, image: WYG0262/WYG0262-0232d.png}
  - {type: variant, offset: 1930, length: 0, content: '', krp: 修竒河北人也自云晉凉州刺史驤之八世孫祖刃仕慕容垂竒少孤家貧而奉母至孝髫齓聰識有夙成之美性氣剛亮與俗不羣愛翫經典博通墳籍常非馬融鄭𤣥解經失㫖志在著述五經}
  - {type: variant, offset: 1931, length: 0, content: '', WYG: 注孝經論語頗𫝊於世為搢紳所稱與河間邢祐同召赴京時祕書監游雅素聞其名始頗好之引入祕省欲授以史職後與竒論典誥及詩書雅贊扶馬鄭至於易訟卦天與水違行雅曰自蔥嶺以西水皆西流推此而言易之所及自蔥嶺以東耳竒曰易理綿廣包含宇宙若如公言自蔥嶺以西豈東向望天哉竒執義非雅每如此類終不茍從雅性䕶短因以為嫌嘗衆辱竒或爾汝之或指為小人竒曰公身為君子竒身且小人耳雅曰君言身且小人君祖父是何人也竒曰祖燕東部侯釐雅質竒曰侯釐何官也竒曰三皇不𫝊禮官名豈同哉故昔有雲師火正鳥師之名以斯而言世革則官異時易則禮變公為皇魏東宮内侍長侍長竟何職也由是雅深憾之先是𠡠以竒付雅令銓補祕書雅既惡之遂不復叙用焉竒冗散數年高允與竒讎溫古籍嘉其逺致稱竒通識非凡學所窺允微勸雅曰君朝望具瞻何為與野儒辨簡牘章句雅謂允有私於竒曰君寧黨小人也乃取竒所注論語孝經焚於坑内竒曰公貴人不乏樵薪何乃燃竒論語雅愈怒因告京師後生不聽𫝊授而竒無降志亦評雅之失雅製昭皇太后碑文論后名字之美比諭前魏之甄后竒刺發其非遂聞於上詔下司徒檢對碑史事乃郭后雅有屈焉有人為謗書多怨時之言頗稱竒不得志雅乃諷在事云此書言竒不遂當是竒假人為之如依律文造謗書者皆及孥戮遂抵竒罪時司徒平原王陸麗知竒見枉惜其才學故得遷延經年冀有寛宥但執以獄成竟致大戮遂及其家竒於易尤長在獄嘗自筮卦未及成乃擥破而歎曰吾不度来年冬季及竒受害如其所占竒初被召夜夢星墜壓脚明而告人曰星則好風星則好雨夢星壓脚必無善徴但時命峻切不敢不赴耳竒妹適常氏有子曰矯之仕歴郡守神龜中上書陳時政所宜言頗忠至清河王懌稱美之竒所注論語矯之𫝊掌未能行於世其義多異鄭𤣥往往與司徒崔浩同常爽字仕明河内溫人魏太常卿林六世}
