  - {type: variant, offset: 3678, length: 1, content: 兼, WYG: 瀛州刺史諡曰戴子伯禮襲封伯禮善隸書拜奉朝請員外散騎侍郎寧朔将軍歩兵校尉國子博士卒贈輔國将軍巴州刺史子産同襲少有才學早亡時人惜之徐遵明字子判華陰人也身長八尺幼孤好學年十七隨鄉人毛靈和等詣山東求學至上黨乃師屯留王聰受毛詩}
  - {type: variant, offset: 3678, length: 1, content: 兼, krp: 瀛州刺史諡曰戴子伯禮襲封伯禮善隸書拜奉朝請員外散騎侍郎寧朔将軍歩兵校尉國子博士卒贈輔國将軍巴州刺史子産同襲少有才學早亡時人惜之徐遵明字子判華陰人也身長八尺幼孤好學年十七隨鄉人毛靈和等詣山東求學至上黨乃師屯留王聰受毛詩}
