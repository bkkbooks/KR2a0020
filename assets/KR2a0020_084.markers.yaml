  - {type: variant, offset: 3681, length: 0, content: '', krp: 禮記一年便辭聰詣燕趙師事張吾貴吾貴門徒甚盛遵明伏膺數月乃私謂其友人曰張生名高而義無檢格凡所講説不愜吾心請更從師遂與平原田猛略就范陽孫買徳受業一年復欲去之猛略謂遵明曰君年少從師每不終業千里負帙何去就之甚如此用意終恐無成遵明曰吾今始知真師所在猛略曰何在遵明乃指心曰正在於此乃詣平原唐遷納之居於蠶舎讀孝經論語毛詩尚書三禮不出門院凡經六年時彈箏吹笛以自娛慰又知陽平館陶趙世業家有服氏春秋是晉世永嘉舊本遵明乃往讀之復經數載因手撰春秋義章}
  - {type: variant, offset: 3682, length: 1, content: 山, WYG: 三十卷是後教授門徒蓋寡久之乃盛遵明每臨講坐必持經執疏然後敷陳其學徒至今浸以成俗遵明講學於外二十餘年海内莫不宗仰頗好聚歛有損儒者之風後廣平王懐聞而徴焉至而尋退不好京輦孝昌末}
  - {type: variant, offset: 3682, length: 1, content: 山, krp: 三十卷是後教授門徒蓋寡久之乃盛遵明每臨講坐必持經執疏然後敷陳其學徒至今浸以成俗遵明講學於外二十餘年海内莫不宗仰頗好聚歛有損儒者之風後廣平王懐聞而徴焉至而尋退不好京輦孝昌末}
  - {type: variant, offset: 3684, length: 0, content: '', WYG: 渡河客於任城以兖州有舊因徙居焉永安初東道大使元羅表薦之竟無禮辟二年元顥入洛任城太守李湛将舉義兵遵明同其事夜至民間為亂兵所害時年五十五永熙二年遵明弟子通直散騎常侍李業興表曰臣聞}
