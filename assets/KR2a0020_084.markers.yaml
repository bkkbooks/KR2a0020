  - {type: variant, offset: 1998, length: 2, content: 頗涉, WYG: 之於左氏似不能説吾貴聞之謂其徒曰我今夏講暫罷後當説𫝊君等来日皆當持本生徒怪之而已吾貴謂劉蘭云君曾讀左氏為我一説蘭遂為講三旬之中吾貴兼讀杜服隠括兩家異同悉舉諸生後集便為講之義例無窮皆多新異蘭乃伏聽學者以此益竒之而以辯能飾非好為詭説由是業不久𫝊而氣陵牧守不屈王侯竟不仕而終劉蘭武邑人年三十餘始入小學書急就篇家人覺其聰敏遂令從師受春秋詩禮於中山王保安家貧無以自資且耕且學三年之後便白其兄蘭欲講書其兄笑而聽之為立黌舎聚徒二百蘭讀左氏五日一遍兼通五}
