  - {type: variant, offset: 1941, length: 0, content: '', WYG: 嚴正有志槩雖家人僮隸未嘗見其寛誕之容篤志好學博聞彊識明習緯候五經百家多所研綜州郡禮命皆不就世祖西征涼土爽與兄仕國歸款軍門世祖嘉之賜仕國爵五品顯美男爽為六品拜宣威將軍是時戎車屢駕征伐為事貴遊子弟未遑學術爽置館溫水之右教授門徒七百餘人京師學業翕然復興爽立訓甚有勸罰之科弟子事之若嚴君焉尚書左僕射元贊平原太守司馬貞安著作郎程靈虬皆是爽教所就崔浩高允並稱爽之嚴教奨勵有方允曰文翁柔勝先生剛克立教雖殊成人一也其為通識歎服如此因教授之暇述六經略注以廣制作甚有條貫其序曰𫝊稱立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義然則仁義者人之性也經典者身之文也皆以陶鑄神情啓悟耳目未有不由學而能成其器不由習而能利其業是故季路勇士也服道以成忠烈之槩寗越庸夫也講藝以全高尚之節葢所由者習也所因者本也本立而道生身文而徳備焉昔者先王之訓天下也莫不導以詩書教以禮樂移其風俗和其人民故恭儉莊敬而不煩者教深於禮也廣博易良而不奢者教深於樂也溫柔敦厚而不愚者教深於詩也疏通知逺而不誣者教深於書也潔靜精微而不賊者教深於易也屬辭比事而不亂者教深於春秋也夫樂以和神詩以正言禮以明體書以廣聽春秋以斷事五者葢五常之道相須而傋而易為之源故曰易不可見則乾坤其㡬乎息矣由是言之六經者先王之遺烈聖人之盛事也安可不逰心寓目習性文身哉頃因暇日屬意藝林略撰所聞討論其本名曰六經略注以訓門徒焉其略注行於世爽不事王侯獨守閑靜講肄經典二十餘年時人號為儒林先生年六十三卒於家子文通歴官至鎮西司馬南天水太守西翼校尉文通子景别有𫝊劉獻之博陵饒陽人也少而孤貧雅好詩𫝊曾受業於渤海程元後遂博觀衆籍見名法之言掩卷而笑曰若使楊墨之流不為此書千載誰知其小也曽謂其所親曰觀屈原離騷之作自是狂人死其宜矣何足惜也吾常謂濯纓洗耳有異人之迹哺糟歠醨有同物之志而孔子曰我則異於是無可無不可誠哉斯言實獲我心時人有從獻之學者獻之輒謂之曰人之立身雖百行殊途凖之四科要以徳行為首君若能入孝出悌忠信仁讓不待出户天下自知儻不能然雖復下帷針股躡屩從師正可博聞多識不過為土龍乞雨眩惑将來其於立身之道有何益乎孔門之徒初亦未悟見臯魚之歎方歸而養親嗟乎先達何自覺之晚也束脩不易受之亦難敢布心腹子其圗之由是四方學者莫不高其行義而希造其門獻之善春秋毛詩每講左氏盡隠公八年便止云義例已了不復須觧由是弟子不能究竟其説後本郡舉孝廉非其好也逼遣之乃應命至京稱疾而還高祖幸中山詔徴典内校書獻之喟然歎曰吾不如莊周散木逺矣一之謂甚其可再乎固以疾辭時中山張吾貴與獻之齊名海内皆曰儒宗吾貴每一講唱門徒千數其行業可稱者寡獻之著錄數百而已皆經通之士於是有識者辨其優劣魏承喪亂之後五經大義雖有師説而海内諸生多有疑滯咸決於獻之六藝之文雖不悉注然所摽宗旨頗異舊義撰三禮大義四卷三𫝊略例三卷注毛詩序義一卷今行於世幷章句疏三卷注湼槃經未就而卒有四子放古爰古參古修古放古幼有人才為州從事早亡爰古參古並𫝊父詩而不能精通也張吾貴字吳子中山人少聰慧口辯身長八尺容貎竒偉}
