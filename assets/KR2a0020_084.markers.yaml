  - {type: variant, offset: 3685, length: 2, content: 臺頗, WYG: 道樹徳非求利於當年服義履仁豈邀恩於没世但天爵所存果致式閭之禮民望攸屬終}
  - {type: variant, offset: 3685, length: 2, content: 臺頗, krp: 道樹徳非求利於當年服義履仁豈邀恩於没世但天爵所存果致式閭之禮民望攸屬終}
