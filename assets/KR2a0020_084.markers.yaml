  - {type: variant, offset: 6529, length: 1, content: 衞, WYG: 星鳥以殷仲春即是二月此出堯典何得云堯時不知用何正也業興對雖三正不同言時節者皆據夏時正月周禮仲春二月㑹男女之無夫家者雖自周書月亦夏時堯之日月亦當如此但所見不深無以辨析明問衍又曰禮原壤之母死孔子助其沐椁原壤叩木而歌曰久矣不託音狸首之班然執女手之卷然孔子聖人而與原壤為友業興對孔子即自解言親者不失其為親故者不失其為故又問原壤何處人業興對曰鄭注云原壤孔子幼少之舊故是魯人衍又問孔子聖人所存必可法原壤不孝有逆人倫何以存故舊之小節廢不孝之大罪業興對曰原壤所行事自彰著幼少之交非是今始既無大故何容棄之孔子深敦故舊之義於理無失衍又問孔子聖人何以書原壤之事垂法萬代業興對曰此是後人所錄非孔子自制猶合葬於防如此之類禮記之中動有百數衍又問易曰太極是有無業興對所𫝊太極是有素不𤣥學何敢輒酬還兼散騎常侍加中軍大}
