  - {type: variant, offset: 3098, length: 282, content: 以城南叛詔紹慰勞至上蔡為賊所襲囚送江東仍被鎖禁蕭衍領軍將軍呂僧珍暫與紹言便相器重衍聞之遣使勞紹云忠臣孝子不可無人今當聽卿還國紹對曰老母在洛無復方寸既奉恩貸實若更生衍又遣主書霍靈超謂紹曰今放卿還令卿通兩家之好彼此息民豈不善也對曰通好息民乃兩國之事既蒙命及輒當聞奏本朝衍賜紹衣物引入見之令其舍人周捨慰勞并稱戰爭多年民物塗炭是以不先言與魏朝通好比亦有書都無報旨卿宜備申此意故遣傳詔周靈秀送卿至國遲有嘉問又令謂紹曰卿知所以得不死不今者獲卿乃天意也夫千人之聚不散則亂故須立君以治天下不以天下養一人凡在民上胡不思此若欲通好今以宿豫還彼彼當以漢中見歸先是詔有司以所獲衍將齊苟兒等, WYG: 四}
