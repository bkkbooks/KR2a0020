  - {type: variant, offset: 6508, length: 2, content: 征蠻, WYG: 朱异問業興曰魏洛中委粟山是南郊邪業興曰委粟是圓丘非南郊异曰比聞郊丘異所是用鄭義我此中用王義業興曰然洛京郊丘之處專用鄭解异曰若然女子逆降傍親亦從鄭以不業興曰此之一事亦不專從若卿此間用王義除禫應用二十五月何以王儉喪禮禫用二十七月也异遂不荅業興曰我昨見明堂四柱方屋都無五九之室當是裴頠所制明堂上圓下方裴唯除室耳今此上不圓何也异曰圓方之説經典無文何怪於方業興曰圓方之言出處甚明卿自不見見卿錄梁主孝經義亦云上圓下方卿言豈非自相矛楯异曰若然圓方竟出何經業興曰出孝經援神契异曰緯候之書何用信也業興曰卿若不信靈威仰叶光紀之類經典亦無出者卿復信不异不荅蕭衍親問業興曰聞卿善於經義儒𤣥之中何所通達業興曰少為書生止讀五典至於深義不辨通釋衍問詩周南王者之風繋之周公召南仁賢之風繫之召公何名為繋業興對曰鄭注儀禮云昔}
