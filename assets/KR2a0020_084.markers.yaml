  - {type: variant, offset: 6511, length: 13, content: 都督轉荊州刺史值尒朱兆入洛, WYG: 王王季居於岐陽躬行召南之教以興王業及文王行今周南之教以受命作邑於酆分其故地屬之二公名為繋衍又問若是故地應自統攝何由分封二公業興曰文王為諸侯之時所化之本國今既登九五之尊}
