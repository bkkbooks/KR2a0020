  - {type: variant, offset: 1919, length: 2, content: 歷治, WYG: 清貧守素不交勢貴年八十七太和十二年卒子元吉有父風少子重歴碎職後為相州鎮北府參軍事平恒字繼叔燕國薊人祖視父儒並仕慕容為通宦恒耽勤讀誦研練經籍鉤深致逺多所博聞自周以降暨於魏世帝王𫝊代之由貴臣升降之緒皆撰錄品第商略是非號曰略注合百餘篇好事者覽之咸以為善焉安貧樂道不以屢空改操徴為中}
  - {type: page-break, offset: 1919, content: '', id: KR2a0020_WYG_084-6b, image: WYG0262/WYG0262-0232b.png}
  - {type: variant, offset: 1919, length: 2, content: 歷治, krp: 清貧守素不交勢貴年八十七太和十二年卒子元吉有父風少子重歴碎職後為相州鎮北府參軍事平恒字繼叔燕國薊人祖視父儒並仕慕容為通宦恒耽勤讀誦研練經籍鉤深致逺多所博聞自周以降暨於魏世帝王𫝊代之由貴臣升降之緒皆撰錄品第商略是非號曰略注合百餘篇好事者覽之咸以為善焉安貧樂道不以屢空改操徴為中}
  - {type: variant, offset: 1922, length: 3, content: 侍御史, WYG: 博士久之出為幽州别駕廉貞寡欲不營資産衣食至常不足妻子不免飢寒後拜著作佐郎遷祕書丞時高允為監河閒邢祐北平陽嘏河東裴宗廣平程駿金城趙元順等為著作佐郎雖才學互有短長然俱為稱職並號長者允每稱博通經籍無過恒也恒即劉彧將軍王元謨舅子恒三子並不率父業好酒自棄恒常忿其世衰植杖廵舎側崗而哭不為營事㛰宦任意官娶故仕聘濁碎不得及其門流恒婦弟鄧宗慶及外甥孫元明等每以為言恒曰此輩會是衰頓何煩勞我乃别構精廬幷置經籍於其中一奴自給妻子莫得而往酒食亦不與同時有珍美呼時老東安公刁雍等共飲噉之家人無得嘗焉太和十年以恒為祕書令而恒固請為郡未授}
  - {type: page-break, offset: 1922, content: '', id: KR2a0020_WYG_084-7a, image: WYG0262/WYG0262-0232c.png}
