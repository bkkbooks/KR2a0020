  - {type: variant, offset: 5488, length: 318, content: 崔延伯李叔仁等分為三道徑趣江西安樂王鑒李神領冀相齊濟青光羽林十萬直向琅邪南出諸人相謂曰詎非華辭也悆曰可驗崇朝何華之有日晏令還景儁送悆上戲馬臺北望城壘曰何此城之固良非彼軍士所能圖擬卿可語二王回師改計悆曰金墉湯池衝甲彌巧貴守以人何論險害還軍於路與梁話誓盟契約既固未旬綜果降詔曰日者法僧父子頑固自天長惡不已竊城外叛職此亂階遂使彭宋名藩翻為賊有雖宗臣名將揮戈於泗濱虎士雄卒竦劍於汴渚然高墉峻堞非可易登廣涘深隍實為難踐是用日昃忘食中宵憤惋者也而衍都督豫章王蕭綜體運知機欲歸有道潛遣密信送款於都督臨淮王于時事同夜光能不按劍殿中侍御史監軍鹿悆不憚虎口視險若夷便能占募入驗虛實誓盟既固所圖遂果返地復城息我兵甲亦是悆之力焉若不酬以榮祿何以勸厲將來可封定陶, WYG: ''}
