  - {type: variant, offset: 6526, length: 2, content: 普泰, WYG: 篇云日月營始故知夏正衍又問堯時以何月為正業興對自堯以上書典不載實所不知衍又云寅賔出日即是正月日}
  - {type: variant, offset: 6526, length: 2, content: 普泰, krp: 篇云日月營始故知夏正衍又問堯時以何月為正業興對自堯以上書典不載實所不知衍又云寅賔出日即是正月日}
