  - {type: variant, offset: 4549, length: 749, content: 數里悆覺問得禾之處從者以告悆大忿即停船上岸至取禾處以縑三丈置禾束下而返初為真定公元子直國中尉勸以忠廉之節嘗賦五言詩曰嶧山萬丈樹雕鏤作琵琶由此材高遠弦響藹中華又曰援琴起何調幽蘭與白雪絲管韻未成莫使弦響絕子直少有令問悆欲其善終故以諷焉母憂去職服闋仍卒任子直出鎮梁州悆隨之州州有兵糧和糴和糴者靡不潤屋悆獨不取子直強之終不從命莊帝為御史中尉悆兼殿中侍御史監臨淮王彧軍時蕭衍遣其豫章王綜據徐州綜密信通彧云欲歸款綜時為蕭衍愛子衆議咸謂不然彧募人入報驗其虛實悆遂請行曰若綜有誠心與之盟約如其詐也豈惜一人命也時徐州始陷邊方騷擾綜部將成景儁胡龍牙並總強兵內外嚴固悆遂單馬間出徑趣彭城未至之間為綜軍主程兵潤所止問其來狀悆答曰兵交使在自昔通言我為臨淮王所使須有交易兵潤遂先遣人白龍牙等綜既有誠心聞悆被執語景儁等曰我每疑元略規欲叛城將驗其虛實且遣左右為元略使入魏軍中喚彼一人其使果至可令人詐作略身在一深室詭為患狀呼使戶外令人傳語時略始被衍追還綜又遣腹心梁話迎悆密語意狀令善酬答引悆入城詣龍牙所時日已暮龍牙列仗舉火引悆曰元中山甚欲相見故令喚卿又曰安豐臨淮將少弱卒規復此城容可得乎悆曰彭城魏之東鄙勢在必爭得否在天非人所測龍牙曰當如卿言復詣景儁住所停悆在外門久而未入時夜已久星月甚明有綜軍主姜桃來與悆語曰君年已長宿又充今使良有所達元法僧魏之微子拔城歸梁梁主待物有道乃舉手上指今歲星在斗斗吳之分野君何為不歸梁國我令君富貴悆答曰君徒知其一未知其二法僧者莒僕之流而梁納之無乃有愧於季孫也今月建鶉首斗牛受破歲星木也逆而克之君吳國敗喪不久且衣錦夜遊有識不許言未及盡引入見景儁景儁曰元中山雖曰相喚不懼而來何也答曰昔楚伐吳吳遣蹷由勞師今者此行略同於彼又曰遊歷多年與卿先經相識仍由緣景儁便記引悆同坐謂悆曰卿不為刺客也答曰今者為使欲返命本朝相刺之, WYG: 禮}
