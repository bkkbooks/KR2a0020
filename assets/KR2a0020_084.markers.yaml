  - {type: variant, offset: 3698, length: 1, content: 紹, WYG: 際發志精專不捨晝夜殆忘寒暑學通諸經偏修鄭説陰陽圖緯算數天文風氣之書莫不闗綜當世服其精博刺史郭祚聞其盛名訪以疑義沖應機解辯無不袪其久惑後太守范陽盧尚之刺史河東裴桓並徴沖為功曹主簿非所好也受署而巳不闗事務惟以講學為心四方學徒就其受業者歳有數百沖雖儒生而執心壯烈不畏彊禦延昌中世宗舅司徒高肇擅恣威權沖乃抗表極言其事辭旨懇直文義忠憤太傅清河王懌覽而歎息先是沖曾祖雍作行孝論以誡子孫稱古之葬者衣之以薪不封不樹後世聖人易之棺椁其有生則不能致養死則厚葬過度及於末世}
