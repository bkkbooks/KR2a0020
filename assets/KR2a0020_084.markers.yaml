  - {type: variant, offset: 1357, length: 299, content: 力送至洛陽并賜假日與家累相隨行次靈丘屬蕭鸞遣使敕驛馬徵淹車駕濟淮淹於路左請見高祖竚駕而進之淹曰蕭鸞悖虐幽明同棄陛下俯應人神按劍江涘然敵不可小蜂蠆有毒而況國乎深願聖明保萬全之策詔曰此前車之轍得不慎乎淹曰伏聞發洛已來諸有諫者解官奪職恐非聖明納下之義高祖曰此是我命耳卿不得為干斧鉞淹曰昔文王詢於芻蕘晉文聽輿人之誦臣雖卑賤敢同匹夫高祖優而容之詔賜絹百匹高祖幸徐州敕淹與閭龍駒等主舟檝將汎泗入河泝流還洛軍次碻磝淹以黃河浚急慮有傾危乃上疏陳諫高祖敕淹曰朕以代無運漕之路故京邑民貧今移都伊洛欲通運四方而黃河急浚人皆難涉我因有此行必須乘流所以開百姓之心知卿至誠而今者不得相納敕賜驊騮馬一匹衣冠一襲除羽林監領主客令加, WYG: 中建}
