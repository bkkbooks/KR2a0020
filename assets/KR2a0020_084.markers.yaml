  - {type: variant, offset: 3690, length: 2, content: 前廢, WYG: 榮仗節還家云胡不樂因誡二三子弟曰此之富貴匪自天降乃勤學所致耳時人榮之入為司農少卿光祿大夫徴出州入卿匪唯學業所致亦由汝南王悦以其師資之義為之啓請焉永安初加平東将軍尋以老解職永熙二年卒出}
  - {type: variant, offset: 3690, length: 2, content: 前廢, krp: 榮仗節還家云胡不樂因誡二三子弟曰此之富貴匪自天降乃勤學所致耳時人榮之入為司農少卿光祿大夫徴出州入卿匪唯學業所致亦由汝南王悦以其師資之義為之啓請焉永安初加平東将軍尋以老解職永熙二年卒出}
  - {type: variant, offset: 3694, length: 2, content: 元孚, WYG: 徴昔授父業故優贈散騎常侍都督相殷滄三州諸軍事車騎大將軍儀同三司尚書左僕射相州刺史諡曰文烈子仲曜武定末儀同開府屬刁沖字文朗渤海饒安人也鎮東將軍雍之曾孫十三而孤孝慕過人其祖母司空高允女聰明婦人也哀其早孤撫養尤篤沖免喪後便志學他方高氏泣涕留之沖終不止雖家世貴達及從師於外自同諸生於時學制諸生悉日直監厨沖雖有僕隸不令}
