  - {type: variant, offset: 3689, length: 0, content: '', WYG: 河監伯陽受論語毛詩春秋周易就河内高望崇受周官後於博陵劉獻之遍受諸經數年之中大義精練講授生徒太和末為四門小學博士後世宗詔徴入琁華宮令孫恵蔚問以六經仍詔徴教授京兆清河廣平汝南四王後特除員外散騎侍郎清河王懌之為司空司徒引徴為長流參軍懌遷大尉徴為倉曹參軍出為沛郡太守加揚烈將軍入為太尉司馬俄加輔國將軍未㡬以夲將軍除安州刺史徴因述職路次過家置酒高㑹大享邑老乃言曰腰龜返國昔人}
