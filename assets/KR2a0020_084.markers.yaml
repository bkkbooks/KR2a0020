  - {type: variant, offset: 3681, length: 0, content: '', WYG: 禮記一年便辭聰詣燕趙師事張吾貴吾貴門徒甚盛遵明伏膺數月乃私謂其友人曰張生名高而義無檢格凡所講説不愜吾心請更從師遂與平原田猛略就范陽孫買徳受業一年復欲去之猛略謂遵明曰君年少從師每不終業千里負帙何去就之甚如此用意終恐無成遵明曰吾今始知真師所在猛略曰何在遵明乃指心曰正在於此乃詣平原唐遷納之居於蠶舎讀孝經論語毛詩尚書三禮不出門院凡經六年時彈箏吹笛以自娛慰又知陽平館陶趙世業家有服氏春秋是晉世永嘉舊本遵明乃往讀之復經數載因手撰春秋義章}
  - {type: page-break, offset: 3681, content: '', id: KR2a0020_WYG_084-19a, image: WYG0262/WYG0262-0238c.png}
