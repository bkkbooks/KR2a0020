  - {type: variant, offset: 2897, length: 0, content: '', WYG: 郡中正恵蔚既入東觀見典籍未周乃上疏曰臣聞聖皇之御世也必幽贊人經參天貳地憲章典故述遵鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圖書祕籍乃承天之正術治人之貞範是以溫柔疏逺詩書之教恭儉易良禮樂之道爻彖以精微為神春秋以屬辭為化故大訓炳於東序藝文光於麟閣斯實}
