  - {type: variant, offset: 5, length: 1, content: 五, WYG: 一十三齊魏收撰志第十九官氏九百姓不能以自治故立君以司牧元首不可以獨斷乃命臣以佐之然則安海内正國家非一人之力也書契以外其事蔑聞至於羲軒昊頊之間龍火鳥人之職頗可知矣唐虞六十夏商倍之周過三百是為大備而秦漢魏晉代有加減罷置盛衰隨時適務且國異政家殊俗設官命職何常之有帝王為治禮樂不相沿海内作家物色非一用其由來尚矣魏氏世君𤣥朔逺統闕臣掌事立司各有號秩及交好南夏頗亦改剏昭成之即王位已命燕鳳為右長史許謙為郎中令矣餘官雜號多同於晉朝建國二年初置左右近侍之職無常員或至百數侍直禁中𫝊宣詔命皆取諸部大人及豪族良家子弟儀貌端嚴機辯才幹者應選又置内侍長四人主顧問拾遺應對若今之侍中散騎常侍也其諸方雜人來附者總謂之烏丸各以多少稱酋庶長分為南北部復置二部大人以統攝之時帝弟觚監北部子寔君監南部分民而治若古}
