  - {type: variant, offset: 18, length: 0, content: '', WYG: 登國元年因而不改南北猶置大人對治二部是年置都統長又置幢將及外朝大人官其都統長領殿内之兵直王宮幢將員六人主三郎衞士直宿禁中者自侍中已下中散已上皆統之外朝大人無常員主受詔命外使出入禁中國有大喪大禮皆與參知隨所典焉}
