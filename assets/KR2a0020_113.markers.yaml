  - {type: variant, offset: 9248, length: 7, content: 車一星及東井南, WYG: 世已外則各自計之不蒙宗人之蔭也雖緦麻而三世官不至姓班有族官則入族官無族官則不入姓族之例也凡此定姓族者皆具列由來直擬姓族以呈聞朕當決姓族之首末其此諸状皆須問宗族列疑明同然後勾其舊籍審其官宦有實則奏不得輕信其言虚長僥偽不實者訴人皆加傳㫖問而詐不以實之坐選官依職事答問不以實之條令司空公穆亮領軍將軍元儼中護軍廣陽王嘉尚書陸琇等詳定}
