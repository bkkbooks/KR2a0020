  - {type: variant, offset: 9015, length: 0, content: '', WYG: 正月尚書令髙肇奏都水臺請依舊二使者參軍事謁者并錄事令史亦隨事史立詔曰使者置二可如所奏其下屬司唯須充事耳亦何勞多也參軍錄事並更置一謁者加二令史依舊肇又奏諸州諮議記室户曹刑獄田曹水曹集曹士曹參軍悉併省之四年七月詔改宗子羽林為宗士其本秩付尚書計其資集敘從七已下從八已上官正光元年七月置左右衞將軍各二人十二月罷諸州中正郡縣定姓族後復孝昌二年十月詔宗士庶子二官各増二百人置望士隊四百人取肺府之族有武藝者孝荘初以尒朱榮有扶翼之功拜柱國大將軍位在丞相上又拜大丞相天柱大將軍増佐吏又以太尉上黨王天穆為太宰増佐吏永安二年各詔復置司直十人視五品隸廷尉覆治御史檢劾事普泰初以尒朱世隆為儀同}
