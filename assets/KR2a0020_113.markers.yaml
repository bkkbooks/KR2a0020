  - {type: variant, offset: 9220, length: 2, content: 赦天, WYG: 略然也至於或自所居或以國號或用官爵或用事物雖緣時不同俱其義矣魏氏本居朔壤地遠俗殊賜姓命氏其事不一亦如長勺尾氏終葵之屬也初安帝統國諸部有九十九姓至獻帝時七分國人使諸兄弟各攝領之乃分其氏自後兼并他國各有本部部中别族為内姓焉年世稍久互以改易興衰存滅間有之矣今舉其可知者獻帝以兄為紇骨氏後改為胡氏次兄為普氏後改為周氏次兄為拓拔氏後改為長孫氏弟為達奚氏後改為奚氏次弟為伊婁氏後改為伊氏次弟為丘敦氏後改為丘氏次弟為侯氏後改為亥氏七族之興自此始也又命叔父之𦙍曰乙旃氏後改為叔孫氏又命疏屬曰車焜氏後改為車氏凡與帝室為十姓百世不通婚太和以前國之喪葬祠禮非十族不得與也髙祖革之各以職司從事神元皇帝時餘部諸姓内入者丘穆陵氏後改為穆氏步六孤氏後改為陸氏賀賴氏後改為賀氏獨孤氏後改為劉氏賀樓氏後改為樓氏勿忸于氏後改為于氏是連氏後改為連氏僕闌氏後改為僕氏若干氏後改為苟氏拔列氏後改為梁氏撥略氏後改為略氏若口引氏後改為宼氏叱羅氏後改為羅氏普陋茹氏後改為茹氏賀葛氏後改為葛氏是賁氏後改為封氏阿伏于氏後改為阿氏可地延氏後改為延氏阿鹿桓氏後改為鹿氏他駱㧞氏後改為駱氏薄奚氏後改為薄氏烏丸氏後改為桓氏素和氏後改為和氏吐谷渾氏依舊吐谷渾氏胡古口引氏後改為侯氏賀若氏依舊賀若氏谷渾氏後改為渾氏匹婁氏後改為婁氏俟力伐氏後改為鮑氏吐伏盧氏後改為盧氏牒云氏後改為云氏是云氏後改為是氏叱利氏後改為利氏副呂氏後改為副氏那氏依舊那氏如羅氏後改為如氏乞扶氏後改為扶氏阿單氏後改為單氏俟幾氏後改為幾氏賀兒氏後改為兒氏吐奚氏後改為古氏出連氏後改為畢氏庾氏依舊庾氏賀㧞氏後改為何氏叱呂氏後改為呂氏莫那婁氏後改為莫氏奚斗盧氏後改為索盧氏莫蘆氏後改為蘆氏出大汙氏後改為韓氏沒路眞氏後改為路氏扈地于氏後改為扈氏莫輿氏後改為輿氏紇干氏後改為干氏俟伏斤氏後改為伏氏是樓氏後改為髙氏尸突氏後改為屈氏沓盧氏後改為沓氏嗢石蘭氏後改為石氏解枇氐後改為解氏奇斤氏後改為奇氏須卜氏後改為卜氏丘林氏後改為林氏大莫干氏後改為郃氏尒綿氏後改為綿氏蓋樓氏後改為蓋氏素黎氏後改為黎氏渴單氏後改為單氏壹斗眷氏後改為明氏叱門氏後改為門氏宿六斤氏後改為宿氏馝䢴氏後改為䢴氏土難氏後改為山氏屋引氏後改為房氏樹洛干氏後改為樹氏乙弗氏後改為乙氏東方宇文慕容氏即宣帝時東部此二部最為彊盛别自有傳南方有茂眷氏後改為茂氏宥連氏後改為雲氏次南有紇豆陵氏後改為竇氏侯莫陳氏後改為陳氏厙狄氏後改為狄氏太洛稽氏後改為稽氏柯㧞氏後改為柯氏西方尉遲氏後改為尉氏步鹿根氏後改為步氏破多羅氏後改為潘氏叱干氏後改為薛氏俟奴氏後改為俟氏輾遲氏後改為展氏費連氏後改為費氏其連氏後改為綦氏去斤氏後改為艾氏渴侯氏後改為緱氏叱盧氏後改為祝氏和稽氏後改為緩氏寃賴氏後改為就氏嗢盆氏後改為溫氏達勃氏後改為襃氏獨孤渾氏後改為杜氏凡此諸部其渠長皆自統衆而尉遲已}
