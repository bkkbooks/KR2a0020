  - {type: variant, offset: 9225, length: 1, content: 月, WYG: 分故官達者位極公卿其功衰之親仍居猥任比欲制定姓族事多未就且宜甄擢隨時漸銓其穆陸賀劉樓于嵇尉八姓皆太祖已降勲著當世位盡王公灼然可知者且下司州吏部勿充猥官一同四姓自此以外應班士流者尋續别敕原出朔土舊為部落大人而自皇始已来有三世官}
