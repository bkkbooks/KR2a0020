  - {type: variant, offset: 324, length: 671, content: 憂六年七月鎮西大將軍司隸校尉毗陵王順有罪以王還第十二月庚申月與太白同入羽林六年正月月掩氐西南星六月甲辰月掩北斗魁第四星十月乙巳月犯軒轅第四星十一月辛巳月犯熒惑天賜元年二月甲辰月掩歲星在角占曰天下兵起三年四月蠕蠕寇邊夜召兵將旦賊走乃罷四月甲午月掩軒轅第四星占曰女主惡之六年七月夫人劉氏薨後諡宣穆皇后五月壬申月掩斗魁第二星二年三月壬辰月掩左執法丁酉月掩心前星四月己卯月犯鎮星在東壁占曰貴人死四年五月常山王遵有罪賜死七月己未月掩鎮星八月丁巳月犯斗第一星占曰大臣憂三年七月太尉穆崇薨十月丁巳月掩鎮星在營室三年二月己丑月犯心後星四月癸丑月犯太微西上將己未月犯房南第二星占曰將相有憂四年五月誅定陵公和跋五月癸未月犯左角占曰左將軍死六年三月左將軍曲陽侯元素延死十二月丙午月掩太白在危四年二月庚申月掩心後星五年五月丁未月掩斗第二星占曰大人憂六年十月戊辰太祖崩太宗永興元年二月甲子月犯昴占曰胡不安天子破匈奴二年五月太宗討蠕蠕社崘社崘遁走九月壬寅月犯昴閏月丁酉月犯昴二年三月丁卯月掩房南第二星又掩斗第五星五月甲子月掩斗第五星己亥月掩昴六月己丑月犯房南第二星七月乙亥月犯輿鬼八月甲申月犯心前星三年六月庚子月犯歲星在畢占曰有邊兵五年四月上黨民勞聰士臻羣聚為盜殺太守令長相率外奔八月乙未月犯歲星在參四年春正月壬戌月行畢蝕歲星癸亥月掩房北第二星閏月庚申月行昴犯熒惑七月月蝕熒惑八月戊申月犯泣星十月辛亥月掩天關占曰有兵五年六月濩澤民劉逸自號征東將軍三巴王署置官屬攻逼建興郡元城侯元屈等討平之五年三月戊辰月行參犯太白四月癸卯月暈翼軫角七月庚午月掩鈎鈐占曰喉舌臣憂五年三月散騎, WYG: 宿直殿省比}
