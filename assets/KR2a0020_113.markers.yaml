  - {type: variant, offset: 9227, length: 2, content: 翼暈, WYG: 給事已上及州刺史鎮大將及品登王公者為姓若本非大人而皇始已来職官三世尚書已上及品登王公而中間不降官緒亦為姓諸部落大人之後而皇始已来官不及前列而有三世為中散監已上外為}
