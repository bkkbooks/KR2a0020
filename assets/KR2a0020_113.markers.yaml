  - {type: variant, offset: 80, length: 2, content: 犯東, WYG: 置八部大人散騎常侍待詔管官其八部大人於皇城四方四維面置一人以擬八座謂之八國常侍待詔侍直左右出入王命二年三月分尚書三十六曹及諸外署凡置三百六十曹令大夫主之大夫各有屬官其有文簿當曹敷奏欲以省彈駮之煩初令五經諸書各置博士國子學生員三十人三年十月置受恩蒙養長徳訓士四官受恩職比特進無常員有人則置親貴器望者為之蒙養職比光祿大夫無常員取勤舊休閑者長徳職比中散大夫無常員訓士職比諫議大夫規諷時政匡刺非違又置仙人博士官典煑錬百藥四年七月罷匈奴中郎將官令諸部護軍皆屬大將軍府九月罷外蘭臺御史總屬内省十二月復尚書三十六曹曹置代人令史一人譯令史一人書令史二人天賜元年八月初置六謁官準古六卿其秩五品屬官有大夫秩六品大夫屬官有元士秩七品元士屬官有署令長秩八品令長屬官有署丞秩九品九月減五等之爵始分為四曰王公侯子除伯男二號皇子及異姓元功}
