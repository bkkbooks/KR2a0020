  - {type: variant, offset: 85, length: 0, content: '', WYG: 十二人侯者七十九人子者一百三人王封大郡公封小郡侯封大縣子封小縣王第一品公第二品侯第三品子第四品又制散官五等五品散官比三都尉六品散官比議郎七品散官比太中中散諫議三大夫八品散官比郎中九品散官比舍人文官五品已下才能秀異者總比之造士亦有五等武官五品已下堪任將帥者亦有五等若百官有闕者則於中擢以補之初帝欲法古純質每於制定官號多不依周漢舊名或取諸身或取諸物或以民事皆擬遠古雲鳥之義諸曹走使謂之鳧鴨取飛之迅疾以伺察者為候官謂之白鷺取其延頸遠望自餘之官義皆類此咸有比況又制諸州各置都尉以領兵十一月以八國姓族難分故國立大師小師令辯其宗黨品舉人才自八國以外郡各自立師職分如八國比今之中正也宗室立宗師亦如州郡八國之儀十二月詔始賜王公侯子國臣吏大郡王二百人次郡王上郡公百人次郡公五十人侯二十五人子十二人皆立典師職比家丞總統羣隸二年二月復罷尚書三十六曹别置武歸修勤二職武歸比郎中修勤比令史分主省務二年正月置内官員二十人比侍中常侍迭直左右又制諸州置三刺史刺史用品第六者宗室一人異姓二人比古之上中下三大夫也郡置三太守用七品者縣置三令長八品者刺史令長各之州縣以太守上有刺史下有令長雖置而未臨民自前功臣為州者徴還京師以爵歸第置散騎郎獵郎諸省令史省事典籤等四}
