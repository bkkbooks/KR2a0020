  - {type: variant, offset: 9016, length: 0, content: '', WYG: 司位次上公又侍中黄門武衞將軍並増置六人永安已後遠近多事置京畿大都督復立州都督俱總軍人天平四年夏罷六州都督悉𨽻京畿其京畿大都督仍不改焉立府置佐舊制有大將軍不置太尉有丞相不置司徒自正光已後天下多事勲賢並軌乃俱置之武定二年十一}
