  - {type: variant, offset: 7907, length: 3, content: 元志討, WYG: 上郡太守内史相開國縣子右第四品中堅將軍中壘將軍尚書左丞二大二公諮議參軍事司州别駕從事史第二品將軍始蕃王長史太子家令太子率更令太子僕中書侍郎太子庶子第二品將軍始蕃王司馬前左右後軍將軍以前上階寧朔將軍建威將軍振威將軍奮威將軍揚威將軍廣威將軍諫議大夫尚書右丞司空皇子諮議參軍事司州治中從事史左右中郎將建武將軍振武將軍奮武將軍揚武將軍廣武將軍從第一品將軍開府諮議叅軍事散子右從第四品寧遠將軍鷹揚將軍折衝將軍揚烈將軍從第二品將軍二蕃王長史二大二公從事中郎祕書丞皇子友國子博士散騎侍郎太子中舎人員外散騎常侍從第二品將軍二蕃王司馬以前上階射聲校尉越騎校尉屯騎校尉步軍校尉長水校尉司空皇子}
