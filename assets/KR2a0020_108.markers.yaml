  - {type: variant, offset: 4351, length: 0, content: '', WYG: 重故追而審之今更無正據不可背章生條但君服既促而臣服仍遠禮縁人情遇厭須變服可還從前判既葬除之四年春正月丁巳夜世宗崩于式乾殿侍中中書監太子少傅崔光侍中領軍將軍于忠與詹事}
  - {type: variant, offset: 4351, length: 0, content: '', krp: 重故追而審之今更無正據不可背章生條但君服既促而臣服仍遠禮縁人情遇厭須變服可還從前判既葬除之四年春正月丁巳夜世宗崩于式乾殿侍中中書監太子少傅崔光侍中領軍將軍于忠與詹事}
  - {type: variant, offset: 4352, length: 2, content: 忽倪, WYG: 顯中庶子侯剛奉迎肅宗於東宫入自萬歳門至顯陽殿哭踊久之乃復王顯欲須明乃行即位之禮崔光謂顯曰天位不可暫曠何待至明顯曰須奏中宮光曰帝崩而太子立國之常典何須中宮令也光與于忠使小黄門曲集奏置兼官行事於是光兼太尉黃門郎元昭兼侍中顯兼吏部尚書中庶子裴儁兼吏部郎中書舍人穆弼兼謁者僕射光等請肅宗止哭立于東序于忠元昭扶肅宗西向哭十數聲止服太子之服太尉光奉䇿進璽綬肅宗跽受服皇帝用衮冕服御太極前殿太尉光等降自西階夜直羣官於庭中北面稽首稱萬歳熙平二年十一月乙丑太尉清河王懌表曰臣聞百王所尚莫尚於禮於禮之重喪紀斯極世代㳂革損益不同遺風餘烈景行終在至如前賢往喆商確有異或竝證經文而論情别緒或各言所見而討事共端雖憲章祖述人自名家而論議紛綸理歸羣正莫不隨時所宗各為一代之典自上達下罔不遵用是使叔孫之儀專擅於漢朝王肅之禮獨行於晋世所謂共同軌文四海畫一者也至乃折旋俯仰之儀哭泣升降之節去來閫巷之容出入閨門之度尚須疇諮禮官博訪儒士載之翰紙著在通法辯答乖殊證據不明即詆訶疵謬糾劾成罪此乃簡牒成文可具閱而知者也未聞有皇王垂範國無一定之章英賢贊治家制異同之式而欲流風作則永貽來世比學官雖建庠序未修稽考古今莫專其任暨乎宗室喪禮百竂凶事冠服制裁日月輕重率令博士一人輕爾議之廣陵王恭北海王顥同為庻母服恭則治重居廬顥則齊期堊室論親則恭顥倶是帝孫語貴則二人竝為蕃國不知兩服之證據何經典俄為舛駮莫有裁正懿王昵戚尚或如斯自兹}
