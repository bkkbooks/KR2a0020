  - {type: variant, offset: 278, length: 1, content: 域, WYG: 郊舊事嵗増木主七易世則更兆其事無益於神明初革前儀定置主七立碑於郊所太和二年旱帝親祈皇天日月五星於苑中祭之夕大雨遂赦京師三年上祈於北苑又禱星於苑中六年十一月将親祀七廟詔有司依禮具儀於是羣臣議曰昔有虞親䖍祖考來格殷宗躬謁介福逌降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中思親祀事稽合古王禮之常典臣等謹案舊章并採}
