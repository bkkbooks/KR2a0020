  - {type: variant, offset: 6124, length: 7, content: 鬣明珠夜光璧東, WYG: 髦尾天子法駕行幸廵狩小祀時則乗之七寳旃檀刻鏤輦金薄隱起馬輦天子三駕所乗或為副乗緇漆蜀馬車金薄華蟲隱起軺軒駕駟金銀隱起出挽解合歩挽天子小駕遊宴所乗亦為副乗金根車羽葆旒畫輈輪華首綵軒交落左右騑太皇太后皇太后皇后助祭郊廟籍田先蠶則乗之長公主大貴公主封君諸王妃皆得乗但右騑而已太祖初皇太子皇子皆鸞輅立乗畫輈龍首朱輪繡轂䋛蓋朱裏龍旂九斿􅀞雲楱皇子封則賜之皆駕駟又有軺車緇漆紫幰朱裏駕一馬為副乗公安車緇漆紫蓋朱裏􅀞輈朱雀青龍白虎龍旂八斿駕三馬軺車與王同侯車與公同七斿紫蓋青裏駕二馬副車亦如之子車緇漆草蠡文六斿皂蓋青裏駕一馬副車亦如之闕及公侯子陪列郊天則乗之宗廟小祀乘軺軒而已至高祖太和中詔儀曹令李韶監造車輅一遵古式焉太祖天興二年命禮官捃採古事制三駕鹵簿一曰大駕設五輅建太常屬車八十一乗平城令代尹司𨽻校尉丞相奉引太尉陪乗太僕御從輕車介士千乗萬騎魚麗鴈行前驅皮軒闒㦸芝蓋雲䍐指}
