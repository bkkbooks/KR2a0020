  - {type: variant, offset: 4095, length: 0, content: '', krp: 剋吉亥備小駕躬臨千畝官别有勑癸丑帝臨宣文堂引議曹尚書劉昶鴻臚卿游明根行儀曹事李韶授策孔子崇文聖之諡於是昶等就廟行事既而帝齋中書省親拜祭於廟九月甲寅朔大享於明堂祀文明太后於𤣥室帝親為之詞十月己亥詔曰夫先王制禮所以經綸萬代貽法後昆至乃郊天享祖莫不配祭然而有節白登廟者有為而興昭穆不次故太祖有三層之宇巴陵無方丈之室又常用季秋躬駕展䖍祀禮或有褻慢之失嘉樂頗涉野合之譏今授衣之旦享祭明堂𤣥冬之始奉烝太廟若復致齋白登便為一月再駕事成褻瀆回詳二理謂宜省一白登之髙未若九室之美幃次之華未如清廟之盛將欲廢彼東山之祀成此二享之敬可具勑有司但令内典神者攝行祭事獻明道武各有廟稱可具依舊式自太宗諸帝昔無殿宇因停之十八年南廵正月次殷比干墓祭以太牢三月詔罷西郊祭天十九年帝南征正月車駕濟淮命太常致祭又詔祀岱岳三月癸亥詔曰知太和廟已就神儀靈主宜時奉寧可剋三月三日己巳内奉遷於正廟其出金墉之儀一凖出代都太和之式入新廟之典可依近至金墉之軌其威儀鹵簿如出代廟百官奉遷宜可省之但令朝官四品已上侍官五品已上及宗室奉迎六月相州刺史髙閭表言伏惟太武皇帝發孝思之深誠同渭陽之逺感以鄴土舅氏之故鄉有歸魂之舊宅故為宻皇后立廟於城内嵗時祭祀置廟戸十家齋宫三十人春秋烝嘗冠服從事刺史具威儀親行薦酌升降揖讓與七廟同儀禮畢撤㑹而罷今廟殿虧漏門牆傾毁簠簋故敗行禮有闕臣備職司目所親覩若以七廟惟新明堂初制配饗之儀備於京邑者便應罷壊輟其常祭如以功髙特立宜應新其靈宇敢陳所見伏請恩裁詔罷之十一月庚午帝幸委粟山議定圜丘己夘帝在合温室引咸陽王禧司空公穆亮吏部尚書任城王澄及議禮之官詔曰朝集公卿欲論圜丘之禮今短晷斯極長日方至案周官祀昊天上帝於圜丘禮之大者兩漢禮有參差魏晉猶亦未一我魏氏雖上參三皇下考叔世近代都祭圜丘之禮復未考周官為不刋之法令以此祭圜丘之禮示卿等欲與諸賢考之厥衷帝曰夕牲之禮無可依凖近在代都已立其議殺牲祼神誠是一日之事終無夕而殺牲待明而祭員外散騎常侍劉芳對曰臣謹案周官牧人職正有夕展牲之禮實無殺牲之事祕書令李彪曰夕不殺牲誠如聖㫖未審告廟以不臣聞魯人將有事于上帝必先有事于泮宫注曰先人以此推之應有告廟帝曰卿言有理但朕先以郊配意欲廢告而卿引證有據當從卿議帝又曰圜丘之牲色無常凖覽推古事乖互不一周家用騂解言是尚晉代靡知所據舜之命禹悉用堯辭復言𤣥牡告于后帝今我國家時用夏正至於牲色未知何凖祕書令李彪曰觀古用𤣥似取天𤣥之義臣謂宜用𤣥至於五帝各象其方色亦有其義帝曰天何時不𤣥地何時不黄意欲從𤣥又曰我國家常聲鼔以集衆易稱二至之日商旅不行后不省方以助微陽微隂今若依舊鳴鼔得無闕寢鼔之義員外郎崔逸曰臣案周禮當祭之日靁鼔靁鼗八靣而作猶不妨陽臣竊謂以鼔集衆無妨古義癸未詔三公衮冕八章太常鷩冕六章用以陪薦甲申長至祀昊天於委粟山大夫祭疑二十年立方澤於河隂仍遣使者以太牢祭漢光武及明章三帝陵魏書卷一百八之一魏書卷一百八之一考證髙祖太和十五年十一月奉神主於齋車神監本誤作臣今改正魏書卷一百八之一考證欽定四庫全書魏書卷一百八之二齊魏收撰志第十一禮四之二世宗景明二年夏六月袐書丞孫恵蔚上言臣聞國之大禮莫崇眀祀祀之大者莫過禘祫所以嚴祖敬宗追養繼孝合享聖靈審諦昭穆遷毁有恒制尊卑有定體誠慤著於中百順應於外是以惟王剏制為建邦之典仲尼述定為不刋之式暨秦燔詩書鴻籍泯滅漢氏興求拾綴遺篆淹中之經孔安所得唯有卿大夫士饋食之篇而天子諸侯享廟之祭禘祫之禮盡亡曲臺之記戴氏所述然多載尸灌之義牲獻之數而行事之法備物之體蔑有具焉今之取證唯有王制一簡公羊一冊考此二書以求厥㫖自餘經傳雖時有片記至於取正無可依攬是以兩漢淵儒魏晋碩學咸據斯文以為朝典然持論有深淺及義有精浮故令傳記雖一而探意乖舛伏惟孝文皇帝合徳乾元應靈誕載𤣥思洞㣲神心暢古禮括商周樂宣韶濩六籍幽而重昭五典淪而復顯舉二經於和中一姬公於洛邑陛下叡哲淵凝欽眀道極應必世之期屬功成之㑹繼文垂則寔惟下武而祫禘二殷國之大事蒸嘗合享朝之盛禮此先皇之所留心聖懐以之永慕臣聞司疑宗初開致禮清廟敢竭愚管輙陳所懐謹案王制曰天子犆礿祫禘祫嘗祫蒸鄭𤣥曰天子諸侯之䘮畢合先君之主於祖廟而祭之謂之祫後因以為常魯禮三年䘮畢而祫於太祖明年春禘於羣廟自爾之後五年而再殷祭一祫一禘春秋公羊魯文二年八月丁卯大事于太廟傳曰大事者何大祫也大祫者何合祭也毁廟之主陳於太祖未毁廟之主皆升合食于太祖五年而再殷祭何休曰陳者就陳列太祖前太祖東鄉昭南鄉穆北鄉其餘孫従王父父曰昭子曰穆又曰殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也禘猶諦也審諦無所遺失察記傳之文何鄭祫禘之義略可得聞然則三年䘮畢祫祭太祖眀年春祀遍禘羣廟此禮之正也古之道也又案魏氏故事魏眀帝以景初三年正月崩至五年正月積二十五晦為大祥太常孔羙博士趙怡等以為禫在二十七月到其年四月依禮應祫散騎常侍王肅博士樂詳等以為禫在祥月至其年二月宜應祫祭雖孔王異議六八殊制至於䘮畢之祫眀年之禘其議一焉陛下永惟孝思因心即禮取鄭捨王禫終此晦來月中旬禮應大祫六室神祏外食太祖眀年春享咸禘羣廟自茲以後五年為常又古之祭法時祫並行天子先祫後時諸侯先時後祫此於古為當在今則煩且禮有升降事有文節通時之制聖人弗違當祫之月宜減時祭以従要省然大禮久廢羣議或殊以臣觀之理在無怪何者心制既終二殷惟始祫禘之正寔在於斯若停而闕之唯行時祭七聖不聞合享百辟不覩盛事何以宣昭令問垂式後昆乎皇朝同等三代治邁終古而令徽典缺於昔人鴻羙慚於往志此禮所不行情所未許臣學不鈎深思無經逺徒閲章句蔑爾無立但飲澤聖時銘恩天造是以妄盡區區冀有塵露所陳蒙允請付禮官集定儀注詔曰禮貴循古何必改作且先聖久遵綿代恒典豈朕沖闇所宜革之且禮祭之議國之至重先代碩儒論或不一可付八座五省太常國子参定以聞七月侍中錄尚書事北海王詳等言奉㫖集議僉以為禘祫之設前代彝典恵蔚所陳有允舊義請依前剋敬享清宫其求省時祭理實宜爾但求之解注下逼列國兼時奠之敬事難輙省請移仲月擇吉重聞制可十一月壬寅改築圜丘於伊水之陽乙卯仍有事焉延昌四年正月世宗崩肅宗即位三月甲子尚書令任城王澄奏太常卿崔亮上言秋七月應祫祭于太祖今世宗宣武皇帝主雖入廟然烝嘗時祭猶别寢室至於殷祫宜存古典案禮三年䘮畢祫於太祖明年春禘於羣廟又案杜預亦云卒哭而除三年䘮畢而禘魏武宣后以太和四年六月崩其月既𦵏除服即吉四時行事而猶未禘王肅韋誕並以為今除即吉故特時祭至於禘祫宜存古禮髙堂隆亦如肅議於是停不殷祭仰尋太和二十三年四月一日髙祖孝文皇帝崩其年十月祭廟􅕺眀二年秋七月祫於太祖三年春禘於羣廟亦三年乃祫謹凖古禮及晋魏之議并景眀故事愚謂来秋七月祫祭應停宜待年終乃後祫禘詔曰太常援引古今並有證據可依請熙平二年三月癸未太常少卿兀端上言謹案禮記祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭𤣥注大禘郊祖宗謂祭祀以配食也有虞氏以上尚徳禘郊祖宗配用有徳者自夏以下稍用其姓代之是故周人以后稷為始祖文武為二姚訖於周世配祭不毁案禮嚳雖無廟配食禘祭謹詳聖朝以太祖道武皇帝配圜丘道穆皇后劉氏配方澤太宗眀元皇帝配上帝明宻皇后杜氏配地祗又以顯祖獻文皇帝配雩祀太宗眀元皇帝之廟既毁上帝地祇配祭有式國之大事唯祀與戎廟配事重不敢專決請召羣官集議以聞靈太后令曰依請於是太師髙陽王雍太傅領太尉公清河王懌太保領司徒公廣平王懐司空公領尚書令任城王澄侍中中書監胡國􅎇侍中領著作郎崔光等議竊以尚徳尊功其來自昔郊稷宗文周之茂典仰惟世祖太武皇帝以神武纂業剋清禍亂徳濟生民功加四海宜配南郊髙祖孝文皇帝大聖膺期惟新魏道刑措勝殘功同天地宜配明堂令曰依議施行七月戊辰侍中領軍将軍江陽王繼表言臣功緦之内太祖道武皇帝之後於臣始是曾孫然道武皇帝傳業無窮四祖三宗功徳最重配天郊祀百世不遷而曾𤣥之孫烝嘗之薦不預拜於廟庭霜露之感闕陪奠於階席今七廟之後非直隔歸胙之靈五服之孫亦不霑出身之叙校之墳史則不然驗之人情則未允何者禮云祖遷於上宗易於下臣曽祖是帝世數未遷便疎同庶族而孫不預祭斯之為屈今古罕有昔堯敦九族周隆本枝故能磐石維城禦侮於外今臣之所親生見隔棄豈所以楨幹根本隆建公族者也伏見髙祖孝文皇帝著令銓衡取曾祖之服以為資蔭至今行之相𫝊不絶而况曾祖為帝而不見錄伏願天鑒有以照臨令皇恩洽穆宗人咸敘請付外博議永為定準靈太后令曰付八座集禮官議定以聞四門小學博士王僧竒等議案孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝然則太祖不遷者尊王業之初基二祧不毁者旌不朽之洪烈其旁枝逺胄豈得同四廟之親哉故禮記婚義曰古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教于宗室又文王世子曰五廟之孫祖廟未毁雖庶人冠娶必告死必赴不忘親也親未絶而列於庶人賤無能也鄭注云赴告於君也實四廟言五者容顯考為始封君子故也鄭君别其四廟理協二祭而四廟者在當世服屬之内可以與於子孫之位若廟毁服盡豈得同於此例乎敢竭愚昧請以四廟為斷國子博士李琰之議案祭統曰有事於太廟羣昭羣穆咸在鄭氏注昭穆咸在謂同宗父子皆来古禮之制如是其廣而當今儀注唯限親廟四愚竊疑矣何以眀之設使世祖之子男於今存者既身是戚蕃號為重子可得賔於門外不預碑鼎之事哉又因宜變法禮有其說記言五廟之孫祖廟未毁為庶人冠娶必告死必赴注曰實四廟而言五者容顯考始封之君子今因太祖之廟在仍通其曽𤣥侍祠與彼古記甚相符㑹且國家議親之律指取天子之𤣥孫乃不旁準於時后至於助祭必謂與世主相倫將難均一壽有長短世有延促終當何時可得齊同謂宜入廟之制率従議親之條祖祧之裔各聽盡其𤣥孫使得駿奔堂壇肅承禘礿則情理差通不宜復各為例令事事舛駮侍中司空公領尚書令任城王澄侍中尚書左僕射元暉奏臣等参量琰之等議雖為始封君子又祭統曰有事於太廟羣昭羣穆咸在而不失其倫鄭注云昭穆謂同宗父子皆來也言未毁及同宗則共四廟之辭云未絶與父子明崇五屬之稱天子諸侯繼立無殊吉凶之赴同止四廟祖祧雖存親級彌逺告赴拜薦典記無文斯由祖遷於上見仁親之義疎宗易於下著五服之恩斷江陽之於今帝也計親而枝宗三易數世則廟應四遷吉凶尚不告聞拜薦寧容輒預髙祖孝文皇帝聖徳𤣥覽師古立政陪拜止於四廟哀恤斷自緦宗即之人情㝠然符一推之禮典事在難違此所謂眀王相沿今古不革者也太常少卿元端議禮記祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧而祖考以功重不遷二祧以盛徳不毁迭遷之義其在四廟也祭統云祭有十倫之義六曰見親疎之殺焉夫祭有昭穆昭穆者所以别父子逺近長幼親疎之序而無亂也是故有倫注云昭穆咸在同宗父子皆来指謂當廟父子為羣不繫於昭穆也若一公十子便為羣公子豈待數公而立稱乎文王世子云五廟之孫祖廟未毁雖為有所援引然與朝議不同如依其議匪直太祖曽𤣥諸廟子孫悉應預列既無正據竊謂太廣臣等愚見請同僧竒等議靈太后令曰議親律注云非唯當世之屬籍歴謂先帝之五世此乃明親親之義篤骨肉之恩重尚書以逺及諸孫太廣致疑百僚助祭可得言狭也祖廟未毁曾𤣥不預壇堂之敬便是宗人之昵反外於附庸王族之近更疎於羣辟先朝舊儀草剏未定刋制律憲垂之不朽琰之援據甚允情理可依所執十二月丁未侍中司空公領尚書令任城王澄度支尚書崔亮奏謹案禮記曾子問曰諸侯旅見天子不得成禮者㡬孔子曰四太廟火日蝕后之䘮雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝㑹孔子應云五而獨言四明不廢朝賀也鄭𤣥禮注云魯禮三年䘮畢祫於太祖明年春禘羣廟又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年五月大祥七月釋禫公㑹劉子及諸侯于平邱八月歸不及於祫冬公如晋明十四年春歸祫明十五年春乃禘經曰二月癸酉有事於武宫傳曰禘於武公謹案明堂位曰魯王禮也䘮畢祫禘似有退理詳考古禮未有以祭事廢元㑹者禮云吉事先近日脫不吉容改筮三旬尋攝太史令趙翼等列稱正月二十六日祭亦吉請移禘祀在中旬十四日時祭移二十六日猶曰春禘又非退義祭則無疏怠之譏三元有順軌之羙既被成㫖宜即宣行臣等伏度國之大事在祀與戎君舉必書恐貽後誚輙訪引古籍竊有未安臣等學缺通經識不稽古備位樞納可否必陳冒陳所見伏聽裁衷靈太后令曰可如所執初世宗永平延昌中欲建明堂而議者或云五室或云九室頻屬年饑遂寢至是復議之詔従五室及元議執政遂改營九室值世亂不成宗配之禮迄無所設神龜初靈太后父司徒胡國珎薨贈太上秦公時疑其廟制太學博士王延業議曰案王制云諸侯祭二昭二穆與太祖之廟而五又小記云王者立四廟鄭𤣥云髙祖已下與始祖而五明立廟之正以親為限不過於四其外有大功者然後為祖宗然則無太祖者止於四世有太祖乃得為五禮之正文也文王世子云五廟之孫祖廟未毁雖為庶人冠娶妻必告鄭𤣥云寔四廟而言五廟者容髙祖為始封君之子明始封之君在四世之外正位太祖乃得稱五廟之孫若未有太祖已祀五世則鄭無為釋髙祖為始封君之子也此先儒精義當今顯證也又䘮服𫝊曰若公子之子孫有封為國君者則世世祖是人也不祖公子鄭𤣥云謂後世為君者祖此受封之君不得祀别子也公子若在髙祖已下則如其親服後世遷之乃毁其廟爾明始封猶在親限故祀止髙祖又云如親而遷尤知髙祖之父不立廟矣此又立廟明法與今事相當者也又禮緯云夏四廟至子孫五殷五廟至子孫六注云言至子孫則初時未備也此又顯在緯籍區别若斯者也又晋初以宣帝是始封之君應為太祖而以猶在祖位故唯祀征西已下六世待世世相推宣帝出居太祖之位然後七廟乃備此又依準前軌若重規襲矩者也竊謂太祖者功髙業大百世不遷故親廟之外特更崇立茍無其功不可獨居正位而遽見遷毁且三世已前廟及於五𤣥孫已後祀止於四一與一奪名位莫定求之典禮所未前聞今太上秦公疏爵列土大啟河山𫝊祚無窮永同帶礪實有始封之功方成不遷之廟但親在四世之内名班昭穆之序雖應為太祖而尚在禰位不可逺探髙祖之父以合五者之數太祖之室當須世世相推親盡之後乃出居正位以備五廟之典夫循文責實理貴允當考剏宗祊得禮為羙不可茍薦虛名取榮多數求之經記竊謂為允又武始侯本無采地於皇朝制令名準大夫案如禮意諸侯奪宗武始四時蒸嘗宜於秦公之廟博士盧觀議案王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三士一自上已下降殺以兩庶人無廟死為鬼焉故曰尊者統逺卑者統近是以諸侯及太祖天子及其祖之所自出祭法曰諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠去墠為鬼至於禘祫方合食太祖之宫大𫝊曰别子為祖䘮服傳曰公子不得禰先君公孫不得祖諸侯鄭說不得祖禰者不得立其廟而祭之也世世祖是人者謂世世祖受封之君不得祖公子者後世為君者祖此受封之君不得祀别子也公子若在髙祖以下則如其親服後世遷之乃毁其廟耳愚以為遷者遷於太祖廟毁者従太祖而毁之若不遷太祖不須廢祖是人之文明非始封故復見乃毁之節何以知之案諸侯有祖考之廟祭五世之禮五禮正祖為輕一朝頓立而祖考之廟要待六世之君六世已前虛而蔑主求之聖㫖未為通論曾子問曰廟無虛主虛主唯四祖考不與焉眀太祖之廟必不空置禮緯曰夏四廟至子孫五殷五廟至子孫六周六廟至子孫七見夏無始祖待禹而五殷人郊契得湯而六周有后稷及文王至武王而七言夏即大禹之身言子謂啟誦之世言孫是迭遷之時禹為受命不毁親湯為始君不遷五主文武為二祧