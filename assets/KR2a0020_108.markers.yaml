  - {type: variant, offset: 142, length: 0, content: '', WYG: 二年正月帝親祀上帝于南郊以始祖神元皇帝配為壇通四陛為壝埓三重天位在其上南面神元西面五精帝在壇内壝内四帝各於其方一帝在未日月五星二十八宿天一太一北斗司中司命司祿司民在中壝内各因其方其餘從食者合一千餘神餟在外壝内藉用藁秸玉用四珪幣用束帛牡用黝犢器用陶匏上帝神元用犢各一五方帝共用犢一日月等共用牛一祭畢燎牲體左於壇南已地從陽之義其瘞地壇兆制同南郊明年正月辛酉郊天癸亥瘞地於北郊以神元竇皇后配五岳名山在中壝内四瀆大川於外壝内后土神元后牲共用𤣥牲一玉用兩珪幣用束帛五岳等用牛一祭畢瘞牲體右於壇之北亥地從隂也乙丑赦京師畿内五嵗刑以下其後冬至祭上帝于圜丘夏至祭地于方澤用牲帛之屬與二郊同冬十月平文昭成獻明廟成嵗五祭用二至二分臘牲用太牢常遣宗正兼太尉率祀官侍祀置太社太稷帝社於宗廟之右為方壇四陛祀以二月八月用戊皆太牢句龍配社周棄配稷皆有司侍祀立祖神常以正月上未設藉於端門内祭牲用羊豕犬各一又立神元思帝平文昭成獻明五帝廟於宫中嵗四祭用正冬臘九月牲用馬牛各一太祖親祀宫中立星神一嵗一祭常以十二月用馬薦各一牛豕各二雞一}
  - {type: page-break, offset: 142, content: '', id: KR2a0020_WYG_108-3b, image: WYG0262/WYG0262-0656d.png}
  - {type: page-break, offset: 142, content: '', id: KR2a0020_WYG_108-4a, image: WYG0262/WYG0262-0657a.png}
