  - {type: variant, offset: 4345, length: 1, content: 王, krp: 餘不服妻服夫黨可直五人乎朞功以降可得無服乎臣妻事殊邈然胡越茍欲引之恐非通例也愚謂臣有合離三諫待決妻無去就一醮終身親義既有參差喪服固宜不等故見厭之婦可得申其本服君屈大功不可過從以朞所以從麻而齊專屬公子之妻隨輕而重何闗從服之臣尋理求途儻或在此必以臣妻相準未覩其津也子熙誠不能逺探墳籍曲論長智請以情理校其得失君遭母憂巨創之痛臣之為服從君之義如何君至九月便蕭然而即吉臣猶朞年仍衰哭於君第創巨而反輕從義而反重縁之人情豈曰是哉侍中崔光學洞今古逹禮之宗頃探幽立義申三年之服雖經典無文前儒未辨然推例求㫖理亦難奪若臣服從朞宜依侍中之論脫君仍九月不得如議者之談耳嬴氏焚坑禮經殘缺故今追訪靡據臨事多惑愚謂律無正條須準傍以定罪禮闕舊文定準類以作憲禮有朞同緦功而服如齊疏者蓋以在心實輕於義乃重故也今欲一依喪服不可從君九月而服周年如欲降一等兄弟之服不可以服君母詳諸二途以取折衷謂宜麻布可如齊衰除限則同小功所以然者重其衰麻尊君母蹙其日月隨君降如此衰麻猶重不奪君母之嚴日月隨降可塞從輕之責矣尚書李平奏以謂禮臣謂君黨妻為夫黨俱為從服各降君夫一等故君服三年臣服一朞今司空臣懌自以尊厭之禮奪其罔極之心國臣厭所不及當無隨降之理禮記大傳云從輕而重鄭𤣥注云公子之妻為其皇姑既舅不厭婦明不厭者還應服其本服此則是其例詔曰禮有從無服}
  - {type: variant, offset: 4348, length: 0, content: '', WYG: 服何但從輕而重乎懌今自以厭故不得申}
