  - {type: variant, offset: 149, length: 2, content: 未暇, WYG: 克剪凶醜拓定四邊冲人纂業徳聲弗彰豈謂幽遐稽首來王具知舊廟弗毁弗亡悠悠之懐希仰餘光王業之興起自皇祖綿綿瓜瓞時惟多祜敢以丕功配饗于天子子孫孫福祿永延敞等既祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神奉之咸謂魏國感靈祗之應也石室南距代京可四千餘里明年六月司徒崔浩奏議神祀多不經案祀典所宜祀凡五十七所餘復重}
