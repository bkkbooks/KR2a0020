  - {type: variant, offset: 4301, length: 0, content: '', krp: 不及其於聲作明不得也雖復功德樂在宜止四門博士蔣雅哲議凡三司之尊開國之重其於王服皆有厭絶若尊同體敵雖疏尚宜徹樂如或不同子姓之喪非嫡者既殯之後義不闕樂國子助教韓神固議闕可以展耳目之適絲竹可以肆遊宴之娛故於樂貴縣有哀則廢至若德儉如禮升降有數文物昭旂旗之明錫鸞為行動之響列明貴賤非措哀樂於其間矣謂威儀鼔吹依舊為允兼儀曹郎中房景先駮曰案祖胄議以功德有喪鼔吹不作雅哲議齊衰卒哭簫管必陳準之輕重理用未安聖人推情以制服據服以副心何容拜虞生之奠於神宫襲衰麻而奏樂大燧一移哀情頓盡反心以求豈制禮之意也就如所言義服恩輕既虞而樂正服一朞何以為斷或義服尊正服卑如}
  - {type: variant, offset: 4302, length: 6, content: 每使朝貢粟特, WYG: 之比復何品節雅哲所議公子之喪非嫡者既殯之後義不闕樂案古雖有尊降不見作樂之文未詳此據竟在何典然君之於臣本無服體但恩誠相感致存惻隐是以仲遂卒垂笙籥不入智悼在殯杜蕢明言豈大倫之痛既殯而樂乎又神固等所議以為笳鼔不在樂限鳴鐃以警衆聲笳而清路者所以辨等列明貴賤耳雖居哀恤施而不廢粗而言之似如可通考諸正典未為符合案詩云鍾鼔既設鼔鍾伐鼛又云於論鼓鍾於樂辟雍言則相連豈非樂乎八音之數本無笳名推而類之簫管之比豈可以名稱小殊而不為樂若以王公位重威飾宜崇鼔吹公給不可私辭者魏絳和戎受金石之賞鍾公勲茂蒙五熟之賜若審功膺賞君命必行豈可陳嘉牢於齊殯之時擊鍾磬於疑袝之後尋究二三未有依據}
  - {type: page-break, offset: 4302, content: '', id: KR2a0020_WYG_108-83a, image: missing/missing}
