  - {type: variant, offset: 6132, length: 0, content: '', WYG: 後殿豹尾鳴葭唱上下作鼔吹軍戎大祠則設之二曰法駕屬車三十六乗平城令代尹太尉奉引侍中陪乗奉車都尉御廵狩小祠則設之三曰小駕屬車十二乗平城令太僕奉引常侍陪乗奉車郎御遊宴離宮則設之二至郊天地四節祠五帝或公卿行事唯四月郊天帝常親行樂加鍾懸以為迎送之節焉天賜二年初改大駕魚麗鴈行更為方陳鹵簿列歩騎内外為四重列檦建旌}
