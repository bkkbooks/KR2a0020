  - {type: variant, offset: 6388, length: 5, content: 焉在波路西, krp: 圖桑車亦飾以雲母晉之雲母車即是一與周之翟車其用正同安車既名同周制又用同重翟山軿車案圖飾之以紫紺罽軿車雖制用異於厭翟而實同用於今入閤輿與輦其用又同案圖今之黑漆畫扇輦與周之輦車其形相似竊以為秦減周制百事剏革官名軌式莫不殊異漢魏因循繼踵仍舊雖時有損益而莫能反古良由去聖久逺典儀殊缺時移俗易物隨事變雖經賢哲祖襲無改伏惟皇太后叡聖淵凝照臨萬物動循典故貽則後王今輒竭管見稽之周禮考之漢晋採諸圖史驗之時事以為宜依漢晉法駕則御金根車駕四馬加交絡帷裳御雲母車駕四馬以親桑其非法駕則御紫罽軿車駕三馬小駕則御安車駕三馬以助祭小行則御紺罽軿車駕三馬以哭公主王妃公侯夫人宮中出入則御畫扇輦車案舊事比之周禮唯闕從王饗賓客及朝見於王之乗竊以為古者諸侯有朝會之禮故有從饗之儀今無其事宜從省略又今之皇居宮掖相逼就有朝見理無結駟即事考實亦宜闕廢又哭公主及王妃周禮所無施之於今寔合事要損益不同用捨隨時三代異制其道然也又金根及雲母駕馬或三或六訪之經禮無駕六之文今之乗輿又皆駕四義符古典宜仍駕四其餘小駕宜從駕三其制用形飾備見圖志司空領尚書令任城王澄尚書左僕射元暉尚書右僕射李平尚書齊王蕭寳夤尚書元欽尚書元昭尚書左丞盧同右丞元洪超考功郎中劉懋北主客郎中源子恭}
