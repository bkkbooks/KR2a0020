  - {type: 'tls:seg', offset: 4266, content: '', id: KR2a0020_ZHSJ_108-d108p31s2}
  - {type: variant, offset: 4266, length: 0, content: '', WYG: 之大典兆民所日用豈可二哉今服禫者各各不同非聖世一統之謂鄭𤣥說二十七月禫甚乖大義臣每難鄭失六有徴三有驗初未能破臣難而通𤣥說者如猗之意謂鄭義廢矣太康中許猛上言扶鄭釋六禫解三驗以鄭禫二十七月為得猗及王肅為失而博士宋昌等議猛扶鄭為衷晉武從之王杜之義於是敗矣王杜之義見敗者晉武知其不可行}
  - {type: page-break, offset: 4266, content: '', id: KR2a0020_WYG_108-79b, image: missing/missing}
  - {type: variant, offset: 4266, length: 0, content: '', krp: 之大典兆民所日用豈可二哉今服禫者各各不同非聖世一統之謂鄭𤣥說二十七月禫甚乖大義臣每難鄭失六有徴三有驗初未能破臣難而通𤣥說者如猗之意謂鄭義廢矣太康中許猛上言扶鄭釋六禫解三驗以鄭禫二十七月為得猗及王肅為失而博士宋昌等議猛扶鄭為衷晉武從之王杜之義於是敗矣王杜之義見敗者晉武知其不可行}
  - {type: variant, offset: 4267, length: 0, content: '', WYG: 也而上省同猗而贊王欲虧鄭之成軌竊所未寧更無異義還從前處鴻又駮曰案三年之喪沒閏之義儒生學士猶或病諸龍虎生自戎馬之鄉不蒙稽古之訓數月成年便懼違緩原其本非貪榮求位而欲責以義方未可便爾也且三年之喪再朞而}
  - {type: page-break, offset: 4267, content: '', id: KR2a0020_WYG_108-80a, image: missing/missing}
  - {type: variant, offset: 4267, length: 0, content: '', krp: 也而上省同猗而贊王欲虧鄭之成軌竊所未寧更無異義還從前處鴻又駮曰案三年之喪沒閏之義儒生學士猶或病諸龍虎生自戎馬之鄉不蒙稽古之訓數月成年便懼違緩原其本非貪榮求位而欲責以義方未可便爾也且三年之喪再朞而}
  - {type: variant, offset: 4268, length: 2, content: 宛國, WYG: 祥中月而禫鄭元以中為間王杜以為是月之中鄭亦未為必會經㫖王杜豈於必乖聖意既諸儒探賾先聖後賢見有不同晉武後雖從宋昌許猛之駮同鄭禫議然初亦從程猗贊成王杜之言二論得否未可知}
  - {type: variant, offset: 4268, length: 2, content: 宛國, krp: 祥中月而禫鄭元以中為間王杜以為是月之中鄭亦未為必會經㫖王杜豈於必乖聖意既諸儒探賾先聖後賢見有不同晉武後雖從宋昌許猛之駮同鄭禫議然初亦從程猗贊成王杜之言二論得否未可知}
