  - {type: variant, offset: 281, length: 0, content: '', krp: 盡則毁以示有終之義三年而祫以申追逺之情禘祫既是一祭分而兩之事無所據毁廟三年一祫又有不盡四時於禮為闕七廟四時常祭祫則三年一祭而又不究四時於情為簡王以禘祫為一祭王義為長鄭以圜丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫并為一名從王禘是祭圜丘大祭之名上下同用從鄭若以數則黷五年一禘改祫從禘五年一禘則四時盡禘以稱今情禘則依禮文先禘而後時祭便即施行著之於令永為世法髙閭曰書稱肆類於上帝禋于六宗六宗之祀禮無明文名位壇兆歴代所疑漢魏及晉諸儒異説或稱天地四時或稱六者之間或稱易之六子或稱風雷之類或稱星辰之屬或曰世代所宗或云宗廟所尚或曰社稷五祀凡有十一家自晉已來逮于聖世以為論者}
  - {type: variant, offset: 282, length: 0, content: '', WYG: 多皆有所闕莫能評究遂相因承别立六宗之兆總為一位而祭之比勑臣等評議取衷附之祀典臣等承㫖披究往説各有其理較而論之長短互有若偏用一家事或差舛衆疑則從多今惑則仍古請依先别處六宗之兆總為一祀而祭之帝曰詳定朝令祀為事首以疑從疑何所取正昔石渠虎閤之議皆凖類以引義原事以證情故能}
