  - {type: variant, offset: 152, length: 0, content: '', WYG: 小神請皆罷之奏可十一年十一月世祖南征逕恒山祀以太牢浮河濟祀以少牢過岱宗祀以太牢至魯以太牢祭孔子遂臨江登瓜步而還文成皇帝即位三年正月遣有司詣華岳修廟立碑數十人在山上聞虛中若音聲聲中稱萬嵗云和平元年正月帝東廵歴橋山祀黄帝幸遼西望祀醫無閭山遂縁海西南幸冀州北至中山過恒岳禮其神而返明年帝南廵過石門遣使者用玉璧牲牢禮恒岳四月旱下詔州郡}
