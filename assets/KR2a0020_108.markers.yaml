  - {type: variant, offset: 138, length: 3, content: 復詳記, krp: 久替謹命禮官擇吉日受皇帝璽綬惟神祗其丕祚於魏室永綏四方事畢詔有司定行次正服色羣臣奏以國家繼黄帝之後宜為土徳故神獸如牛牛土畜又黄星顯曜其符也於是始從土徳數用五服尚黄犧牲用白祀天之禮用周典以夏四月親祀于西郊徽幟有加}
