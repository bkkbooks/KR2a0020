  - {type: variant, offset: 4775, length: 289, content: 王餘子出各就邊任兄弟更不相見也國人號王曰醫囋妃曰防步率王之諸子曰殺野大官有摸胡壇掌國內獄訟泥忽汗掌庫藏開禁地卑掌文書及衆務次有遏羅訶地掌王之內事薛波勃掌四方兵馬其下皆有屬官分統其事兵有甲矟圓排劍弩弓箭戰兼乘象百人隨之其刑法重罪懸諸竿上射殺之次則繫獄新王立乃釋之輕罪則劓刖若髠或剪半鬢及繫牌於項以為辱犯強盜者繫之終身姦貴人妻者男子流婦人割其耳鼻賦稅則準地輸銀錢俗事火神天神文字與胡書異多以姊妹為妻妾自餘婚合亦不擇尊卑諸夷之中最為醜穢矣百姓女年十歲以上有姿貌者王收養之有功勳人即以分賜死者多棄屍於山一月著服城外有人別居唯知喪葬之事號為不淨人若入城巿搖鈴自別以六月為歲首尤重七月七日十, WYG: 允詔可}
