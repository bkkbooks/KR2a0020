  - {type: variant, offset: 5119, length: 2, content: 生願, WYG: 聞子不舉樂今太后更無别宮所居嘉福去太極不為大逺鼔鍾于宮聲聞于外况在内密邇也君之卿佐是謂股肱股肱或虧何痛如之智悼子喪未葬杜簣所以諫晉平公也今相國雖已安厝裁三月爾陵墳未乾懌以理證為然乃從雍議孝靜武定五年正月齊獻武王薨時祕凶問六}
