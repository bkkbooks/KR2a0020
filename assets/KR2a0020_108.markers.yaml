  - {type: variant, offset: 4072, length: 2, content: 意命, WYG: 孟春應祀者頃以事殷遂及今日可令仍以仲月而饗祀焉凡在祀令者其數有五帝堯樹則天之功興巍巍之治可祀於平陽虞舜播太平之風致無為之化可祀於廣寗夏禹禦洪水之災建天下之利可祀於安邑周文公制禮作樂垂範萬葉可祀於洛陽其宣尼之廟已於}
