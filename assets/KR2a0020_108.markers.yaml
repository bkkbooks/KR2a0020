  - {type: variant, offset: 4271, length: 1, content: 都, WYG: 聖人大祥之後鼔素琴成笙歌者以喪事既終餘哀之中可以存樂故也而樂府必以干戚羽毛施之金石然後為樂樂必使工為之庶民凡品於祥前鼔琴可無罪乎律之所防豈必為}
  - {type: page-break, offset: 4271, content: '', id: KR2a0020_WYG_108-80b, image: missing/missing}
  - {type: variant, offset: 4271, length: 1, content: 都, krp: 聖人大祥之後鼔素琴成笙歌者以喪事既終餘哀之中可以存樂故也而樂府必以干戚羽毛施之金石然後為樂樂必使工為之庶民凡品於祥前鼔琴可無罪乎律之所防豈必為}
  - {type: variant, offset: 4273, length: 2, content: 山城, WYG: 士亦及凡庶府之此義彌不通矣魯人朝祥而暮歌孔子以為踰月則可矣爾則大祥之後喪事已終鼔琴笙歌經禮所許龍虎欲宿衛皇宫豈欲合刑五歳就如鄭義二十七月而禫二十六月十五升布深衣素冠縞紕及黃裳綵纓以居者此則三年之餘哀不}
  - {type: variant, offset: 4273, length: 2, content: 山城, krp: 士亦及凡庶府之此義彌不通矣魯人朝祥而暮歌孔子以為踰月則可矣爾則大祥之後喪事已終鼔琴笙歌經禮所許龍虎欲宿衛皇宫豈欲合刑五歳就如鄭義二十七月而禫二十六月十五升布深衣素冠縞紕及黃裳綵纓以居者此則三年之餘哀不}
