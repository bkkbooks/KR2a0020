  - {type: variant, offset: 4063, length: 5, content: 齊契討蠕蠕, WYG: 郊行禮然月有餘閏行無常凖若一依分日或值月出於東而行禮於西尋情即理不可施行昔祕書監薛謂等嘗論此事以為朝日以朔夕月以朏卿等意謂朔朏二分何者為是尚書游明根對曰考案舊式推校衆議宜從朏月十一月己未朔帝釋禫祭於太和廟帝衮冕與祭者朝服既而帝冠黑介幘素紗深衣拜山陵而還宫庚申帝親省齋宫冠服及郊祀俎豆癸亥冬至將祭圜丘帝衮冕劔舄侍臣朝服辭太和廟之圜丘升祭柴燎遂祀明堂大合既而還之太和廟乃入甲子帝衮冕辭太和廟臨太華殿朝羣官既而帝冠通天絳紗袌臨饗禮帝感慕樂懸而不作丁夘遷廟陳列冕服帝躬省之既而帝衮冕辭太和廟之太廟百官陪從奉神主於齋車至新廟有司升神主於太廟諸王侯牧守四海蕃附各以其職來祭十六年正月戊午詔曰夫四時享祀人子常道然祭薦之禮貴賤不同故有邑之君祭以首時無田之士薦以仲月況七廟之重而用中節者哉自頃蒸嘗之禮頗違舊義今將仰遵逺式以此孟月犆礿於太廟但朝典初改衆務殷湊無遑齋潔遂及於今又接神饗祖必須擇日今禮律未宣有司或不知此可勑太常令剋日以聞二月丁酉詔曰夫崇聖祀徳逺代之通典秩闕三字中古之近規故三五至仁唯徳配享夏殷私已稍用其姓且法施於民祀有明典立功垂惠祭有恒式斯乃異代同途奕}
