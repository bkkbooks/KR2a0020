  - {type: variant, offset: 278, length: 1, content: 域, krp: 郊舊事嵗増木主七易世則更兆其事無益於神明初革前儀定置主七立碑於郊所太和二年旱帝親祈皇天日月五星於苑中祭之夕大雨遂赦京師三年上祈於北苑又禱星於苑中六年十一月将親祀七廟詔有司依禮具儀於是羣臣議曰昔有虞親䖍祖考來格殷宗躬謁介福逌降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中思親祀事稽合古王禮之常典臣等謹案舊章并採}
  - {type: variant, offset: 280, length: 0, content: '', WYG: 魏故事撰祭服冠屨牲牢之具罍洗簠簋爼豆之器百官助祭位次樂官節奏之引升降進退之法别集為親拜之儀制可於是上乃親祭其後四時常祀皆親之十年四月帝初以法服御輦祀於西郊十二年十月帝親築圜丘於南郊十三年正月帝以大駕有事於圜丘五月庚戍車駕有事於方澤壬戌髙祖臨皇信堂引見羣臣詔曰禮記祭法稱有虞氏禘黄帝大𫝊曰禘其祖之所自出又稱不王不禘論曰禘自既灌詩頌長發大禘爾雅曰禘大祭也夏殷四時祭礿禘烝嘗周改禘為祠祭義稱春祭秋嘗亦夏殷祭也王制稱犆礿祫禘祫嘗祫烝其禮𫝊之文如此鄭𤣥解禘天子祭圜丘曰禘祭宗廟大祭亦曰禘三年一祫五年一禘祫則合羣毁廟之主於太廟合而祭之禘則増及百官配食者審諦而祭之天子先禘祫而後時祭諸侯先時祭而後禘祫魯禮三年喪畢而祫明年而禘圜丘宗廟大祭俱稱禘祭有兩禘明也王肅解禘祫稱天子諸侯皆禘於宗廟非祭天之祭郊祀后稷不稱禘宗廟稱禘禘祫一名也合而祭之故稱祫審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉之故稱五年再殷祭不言一禘一祫斷可知矣禮文大略諸儒之説盡具於此卿等便可議其是非尚書游明根左丞郭祚中書侍郎封琳著作郎崔光等對曰鄭氏之義禘者大祭之名大祭圜丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆圜丘常合不言祫宗廟時合故言祫斯則宗廟祫禘竝行圜丘一禘而已宜於宗廟俱行禘祫之禮二禮異故名殊依禮春廢犆礿於嘗於蒸則祫不於三時皆行禘祫之禮中書監髙閭儀曹令李韶中書侍郎髙遵等十三人對稱禘祭圜丘之禘與鄭義同其宗廟禘祫之祭與王義同與鄭義同者以為有虞禘黄帝黄帝非虞在廟之帝不在廟非圜丘而何又大𫝊稱祖其所自出之祖又非在廟之文論稱禘自既灌事似據爾雅稱禘大祭也頌長發大禘也殷王之祭斯皆非諸侯之禮諸侯無禘禮唯夏殷夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行圜丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名據王氏之義祫而禘祭之故言禘祫總謂再殷祭明不異也禘祫一名也其禘祫止於一時止於一時者祭不欲數數則黷一嵗而三禘愚以為過數帝曰尚書中書等據二家之義論禘祫詳矣然於行事取衷猶有未允監等以禘祫為名義同王氏禘祭圜丘事與鄭同無所間然尚書等與鄭氏同兩名兩祭竝存竝用理有未稱俱據二義一時禘祫而闕二時之禘事有難從夫先王制禮内縁人子之情外協尊卑之序故天子七廟諸侯五廟大夫三廟數盡則毁藏主於太祖之廟三年而祫祭之}
