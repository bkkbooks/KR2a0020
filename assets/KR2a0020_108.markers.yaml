  - {type: variant, offset: 4328, length: 4, content: 康居西北, WYG: 五服中也君之厭不得申其罔極依禮大功據喪服厭降之例竝無從厭之文今太妃既捨六宮之稱如太妃之號為封君之母尊崇一國臣下固宜服朞不得以王服厭屈而更有降禮有從輕而重義包於此太學博士封偉伯等十人議案臣從君服降君一等君為母三年臣則朞今司空以仰厭先帝俯就大功臣之從服不容有過但禮文殘缺制無正條竊附情理謂宜小功庶君臣之服不失其序升降之差頗會禮意清河國郎中令韓子熙議謹案喪服大功章云公之庶昆弟為其母妻傳曰何以大功先君餘尊之所厭不敢過大功也夫以一國之貴子猶見厭況四海之尊固無申理頃國王遭太妃憂議者援引斯條降王之服尋究義例頗有一途但公之庶昆弟或為士或為大夫士之卑賤不得仰匹親王正以餘厭共同可以奪情相擬然士非列土無臣從服今王有臣復不得一準諸士矣議者仍令國臣從服以朞嚚昧所見未曉高趣案不杖章云為君之父母妻長子祖父母傳曰父母長子君服斬妻則小君父卒然後為祖後者服斬傳所以深釋父卒為祖服斬者蓋恐君為祖朞臣亦同朞也明臣之後朞由君服斬若由君服斬然後朞則君服大功安得亦朞也若依公之庶昆弟不云有臣從朞若依為君之父母則出應申三年此之二章殊不相干引彼則須}
