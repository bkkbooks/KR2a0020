  - {type: variant, offset: 4262, length: 3, content: 里洛那, WYG: 月工奏金石之樂耳而駮云大祥之後喪事終矣脫如此駮禫復焉施又駮云禫中鼓琴復有罪乎然禫則黃裳未大吉也鼓琴存樂在禮所許若使工奏八音融然成韻既未徙月不罪伊何又駮云禫中既得從御職事求上何為不可檢龍虎居喪二十六月始是素縞麻衣大祥之中何謂禫乎三年沒閏理無可疑麻衣在體冒仕求榮寔為大尤罪其焉捨又省依王杜禫祥同月全乖鄭義喪凶尚逺而欲速除何怱怱者哉下府愚量鄭為得之何者禮記云吉事尚近日凶事尚逺日又論語云喪與其易寧戚而服限三年痛盡終身中月之解雖容二義尚逺寧戚又檢王杜之義起於魏末晉初及越騎校尉程猗贊成王肅駮鄭禫二十七月之失為六徴三驗上言於晋武帝曰夫禮}
