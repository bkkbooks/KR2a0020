  - {type: variant, offset: 5125, length: 1, content: 為, WYG: 高祖太和十九年五月甲午冠皇太子恂於廟丙申高祖臨光極堂太子入見帝親詔之事在恂傳六月高祖臨光極堂引見羣官詔曰比冠子恂禮有所闕當思往失更順將來禮古今殊制三代異章近冠恂之禮有三失一朕與諸儒同誤二諸儒違朕故令有三誤今中原兆建百禮惟新而有此三失殊以愧歎春秋襄公將至衞以同姓之國問其秊幾而行冠禮古者皆灌地降神或有作樂以迎神昨失作樂至廟庭朕以意而行拜禮雖不得降神於理猶差完司馬彪云}
