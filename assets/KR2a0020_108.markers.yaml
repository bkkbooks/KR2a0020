  - {type: variant, offset: 4316, length: 2, content: 奄蔡, WYG: 軍聲獻㨗之樂不常用也有重位茂勳乃得備作方之金石準之管絃其為音奏雖曰小殊然其大體與樂無異是以禮云鼔無當於五聲五聲不得不和竊惟今者如台司之儀蓋欲兼廣威華若有哀用之無變於吉便是}
