  - {type: variant, offset: 1170, length: 1, content: 成, WYG: 都曹尚書新秦侯游明根散騎常侍南部令鄧侍祖祕書中散李愷尚書左丞郭祚右丞霸城子衛慶中書侍郎封琳中書郎秦昌子崔挺中書侍郎賈元壽等言臣等受勑共議中書監髙閭祕書丞李彪等二人所議皇魏行次尚書髙閭以石承晉為水徳以燕承石為木徳以秦承燕為火徳大魏次秦為土徳皆以地據中夏以為得統之徴皇魏建號事接秦末晉既滅亡天命在我故因中原有寄即而承之彪等據神元皇帝與晉武竝時桓穆二帝仍修舊好始自平文逮于太祖抗衡秦趙終平慕容晉祚終於秦方大魏興於雲朔據漢棄秦承}
