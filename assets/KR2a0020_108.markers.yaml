  - {type: variant, offset: 4333, length: 1, content: 代, WYG: 此引此則須去彼終不得兩服功朞渾雜}
  - {type: variant, offset: 4333, length: 1, content: 代, krp: 此引此則須去彼終不得兩服功朞渾雜}
  - {type: variant, offset: 4335, length: 1, content: 萬, WYG: 圖也議者見餘尊之厭不得過大功則令王依庶昆弟見不杖章有為君之父母便令臣從服以朞此乃據殘文守一隅恐非先聖之情達禮之喪矣且從服之體自有倫貫雖秩微閽寺位卑室老未有君服細絰裁踰三時臣著疏衰獨渉兩歳案禮天子諸侯之大臣唯服君之父母妻長子祖父母其餘不服也唯近臣閽寺隨君而服耳若大夫之室老君之所服無所不從而降一等此三條是從服之通旨較然之明例雖近臣之賤不過隨君之服未有君輕而臣服重者也議者云禮有從輕而重臣之從君義包於此愚謂服問所云有從輕而重公子之妻為其皇姑直是禮記之異獨此一條耳何以知其然案服問經云有從輕而重公子之妻為其皇姑而大傳云從服有}
