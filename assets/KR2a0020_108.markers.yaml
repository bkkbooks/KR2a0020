  - {type: variant, offset: 1605, length: 266, content: 所石上有辟支佛跣處雙跡猶存于闐西五百里有比摩寺云是老子化胡成佛之所俗無禮義多盜賊淫縱自高昌以西諸國人等深目高鼻唯此一國貌不甚胡頗類華夏城東二十里有大水北流號樹枝水即黃河也一名計式水城西五十五里亦有大水名達利水與樹枝水會俱北流真君中世祖詔高涼王那擊吐谷渾慕利延慕利延懼驅其部落渡流沙那進軍急追之慕利延遂西入于闐殺其王死者甚衆顯祖末蠕蠕寇于闐于闐患之遣使素目伽上表曰西方諸國今皆已屬蠕蠕奴世奉大國至今無異今蠕蠕軍馬到城下奴聚兵自固故遣使奉獻延望救援顯祖詔公卿議之公卿奏曰于闐去京師幾萬里蠕蠕之性惟習野掠不能攻城若為所拒當已旋矣雖欲遣師勢, WYG: 古典實}
