  - {type: variant, offset: 5116, length: 1, content: 天, WYG: 臨享宜應備設太后訪之於侍中崔光光從雍所執懌謂光曰宜以經典為證光據禮記縞冠𤣥武子姓之冠父母有重喪子不純吉安定公親為外祖又有師恩太后不許公除衰麻在體正月朔日還家哭臨至尊輿駕奉慰記云朋友之墓有宿草焉而不哭是則朋友有朞年之哀子貢云夫子喪顔淵若喪子而無服喪子路亦然顔淵之喪饋練肉夫子受之彈琴而後食之若子之哀則容一朞不舉樂也孔子既大練五日彈琴父母之喪也由是喪夫子若喪父而無服心喪三年由此而制雖古義難追比來發詔每言師祖之尊是則一朞之内猶有餘哀且禮母有喪服聲}
