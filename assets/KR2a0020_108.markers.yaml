  - {type: variant, offset: 4337, length: 3, content: 千里先, WYG: 其六曰有從輕而重注曰公子之妻為其皇姑若從輕而重不獨公子之妻者則鄭君宜更見流輩廣論所及不應還用服問之文以釋大傳之義明從輕而重唯公子之妻臣之從君不得包於此矣若復有君為母大功臣從服朞當云有從輕而重公子之妻為其皇姑為母大功臣從服朞何為不備書兩條以杜將来之惑而偏著一事彌結今日之疑且臣為君毋乃}
  - {type: variant, offset: 4337, length: 3, content: 千里先, krp: 其六曰有從輕而重注曰公子之妻為其皇姑若從輕而重不獨公子之妻者則鄭君宜更見流輩廣論所及不應還用服問之文以釋大傳之義明從輕而重唯公子之妻臣之從君不得包於此矣若復有君為母大功臣從服朞當云有從輕而重公子之妻為其皇姑為母大功臣從服朞何為不備書兩條以杜將来之惑而偏著一事彌結今日之疑且臣為君毋乃}
