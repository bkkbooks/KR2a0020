  - {type: 'tls:seg', offset: 4300, content: '', id: KR2a0020_ZHSJ_108-d108p31s8}
  - {type: variant, offset: 4300, length: 0, content: '', WYG: 員外亡竝上言未知出入猶作鼓吹不請下禮官議決太學博士封祖胄議喪大記云朞九月之喪旣葬飲酒食肉不與人樂之五月三月之喪比葬飲酒食肉不與人樂之世叔母故主宗子直云飲酒食肉不言不與人樂之鄭𤣥云義服恩輕以此推之明義服葬容有樂理又禮大功言而不議小功議而不及樂言論之間尚}
  - {type: variant, offset: 4300, length: 0, content: '', krp: 員外亡竝上言未知出入猶作鼓吹不請下禮官議決太學博士封祖胄議喪大記云朞九月之喪旣葬飲酒食肉不與人樂之五月三月之喪比葬飲酒食肉不與人樂之世叔母故主宗子直云飲酒食肉不言不與人樂之鄭𤣥云義服恩輕以此推之明義服葬容有樂理又禮大功言而不議小功議而不及樂言論之間尚}
  - {type: variant, offset: 4301, length: 0, content: '', WYG: 不及其於聲作明不得也雖復功德樂在宜止四門博士蔣雅哲議凡三司之尊開國之重其於王服皆有厭絶若尊同體敵雖疏尚宜徹樂如或不同子姓之喪非嫡者既殯之後義不闕樂國子助教韓神固議闕可以展耳目之適絲竹可以肆遊宴之娛故於樂貴縣有哀則廢至若德儉如禮升降有數文物昭旂旗之明錫鸞為行動之響列明貴賤非措哀樂於其間矣謂威儀鼔吹依舊為允兼儀曹郎中房景先駮曰案祖胄議以功德有喪鼔吹不作雅哲議齊衰卒哭簫管必陳準之輕重理用未安聖人推情以制服據服以副心何容拜虞生之奠於神宫襲衰麻而奏樂大燧一移哀情頓盡反心以求豈制禮之意也就如所言義服恩輕既虞而樂正服一朞何以為斷或義服尊正服卑如}
  - {type: page-break, offset: 4301, content: '', id: KR2a0020_WYG_108-82a, image: missing/missing}
