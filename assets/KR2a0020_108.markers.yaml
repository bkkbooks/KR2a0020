  - {type: variant, offset: 2543, length: 964, content: 九城國小人貧無綱紀法令兵有弓刀甲矟婚姻略同華夏死亡者皆焚而後葬其服制滿七日則除之丈夫並翦髮以為首飾文字與婆羅門同俗事天神並崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉氣候寒土田良沃穀有稻粟菽麥畜有駝馬養蠶不以為絲唯充綿纊俗尚蒲萄酒兼愛音樂南去海十餘里有魚鹽蒲葦之饒東去高昌九百里西去龜茲九百里皆沙磧東南去瓜州二千二百里恃地多險頗剽劫中國使世祖怒之詔成周公萬度歸討之約齎輕糧取食路次度歸入焉耆東界擊其邊守左回尉犁二城拔之進軍向員渠鳩尸卑那以四五萬人出城守險以拒度歸募壯勇短兵直往衝鳩尸卑那衆大潰盡虜之單騎走入山中度歸進屠其城四鄙諸戎皆降服焉耆為國斗絕一隅不亂日久獲其珍奇異玩殊方譎詭不識之物橐駝馬牛雜畜巨萬時世祖幸陰山北宮度歸破焉耆露板至世祖省訖賜司徒崔浩書曰萬度歸以五千騎經萬餘里拔焉耆三城獲其珍奇異物及諸委積不可勝數自古帝王雖云即序西戎有如指注不能控引也朕今手把而有之如何浩上書稱美遂命度歸鎮撫其人初鳩尸卑那走山中猶覬城不拔得還其國既見盡為度歸所克乃奔龜茲龜茲以其壻厚待之龜茲國在尉犂西北白山之南一百七十里都延城漢時舊國也去代一萬二百八十里其王姓白即後涼呂光所立白震之後其王頭繫綵帶垂之於後坐金師子牀所居城方五六里其刑法殺人者死劫賊則斷其一臂并刖一足稅賦準地徵租無田者則稅銀錢風俗婚姻喪葬物產與焉耆略同唯氣候少溫為異又出細氈饒銅鐵鉛皮氍毹鐃沙鹽綠雌黃胡粉安息香良馬犎牛等東有輪臺即漢貳師將軍李廣利所屠者其南三百里有大河東流號計式水即黃河也東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙帳六百餘里東南去瓜州三千一百里其東闕城戍寇竊非一世祖詔萬度歸率騎一千以擊之龜茲遣烏羯目提等領兵三千距戰度歸擊走之斬二百餘級大獲駝馬而還俗性多淫置女巿收男子錢入官土多孔雀羣飛山谷間人取養而食之孳乳如鷄鶩其王家有千餘隻云其國西北大山中有如膏者流出成川行數里入地如擀餬甚臭服之髮齒已落者能令更生病人服之皆愈自後每使朝貢姑默國居南城在龜茲西去代一萬五百里役屬龜茲溫宿國居溫宿城在姑默西北去代一萬五百五十里役屬龜茲尉頭國居尉頭城在溫宿北去代一萬六百五十里役屬龜茲烏孫國居赤谷城在龜茲西北去代一萬八百里其國數為蠕蠕所侵西徙葱嶺山中無城郭隨畜牧逐水草太延三年遣使者董琬等使其國後每使朝貢疏勒國在姑默西白山南百餘里漢時舊國也去代一萬, WYG: ''}
