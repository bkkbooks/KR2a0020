  - {type: variant, offset: 424, length: 199, content: 國其王得朝廷所賜拜受甚悅謂琬曰傳聞破洛那者舌皆思魏德欲稱臣致貢但患其路無由耳今使君等既到此可往二國副其慕仰之誠琬於是自向破洛那遣明使者舌烏孫王為發導譯達二國琬等宣詔慰賜之已而琬明東還烏孫破洛那之屬遣使與琬俱來貢獻者十有六國自後相繼而來不間于歲國使亦數十輩矣初世祖每遣使西域常詔河西王沮渠牧犍令護送至姑臧牧犍發使導路出於流沙後使者自西域還至武威牧犍左右謂使者曰我君承蠕蠕吳提妄說云去歲魏天子自來伐我士, WYG: 侍中尚書駙}
