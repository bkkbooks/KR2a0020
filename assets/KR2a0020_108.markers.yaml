  - {type: variant, offset: 145, length: 2, content: 經營, WYG: 有兩彗星見劉后使占者占之曰祈之則當掃定天下后從之故立其祀又立闕二字神十二嵗一祭常以十一月各用牛一雞三又立主神四嵗二祭常以八月十月各用羊一又置獻明以上所立天神四十所嵗二祭亦以八月十月神尊者以馬次以牛小以羊皆女巫行事又於雲中及盛樂神元舊都祀神元以下七帝嵗三祭正冬臘用馬牛各一祀官侍祀明年春帝始躬耕籍田祭先農用羊一祀日於東郊用騂牛一秋分祭月於西郊用白羊一天賜二年夏四月復祀天于西郊為方壇一置木主七於上東為二陛無等周垣四門門各依其方色為名牲用白犢黄駒白羊各一祭之日帝御大駕百官及賓國諸部大人畢從至郊所帝立青門内近南壇西内朝臣皆位於帝北外朝臣及大人咸位於青門之外后率六宫從黑門入列於靑門内近北並西面廩犧令掌牲陳於壇前女巫執皷立於陛之東西靣選帝之十族子弟七人執酒在巫南西面北上女巫升壇摇鼓帝拜若肅拜百官内外盡拜祀訖復拜拜訖乃殺牲執酒七人西向以酒灑天神主復拜如此者七禮畢而返自是之後嵗一祭太宗永興三年三月帝禱于武周車輪二山初清河王紹有寵於太祖性凶悍帝毎以義責之弗從帝懼其變乃於山上祈福於天地神祗及即位壇兆後因以為常祀嵗一祭牲用牛帝皆親之無常日明年立太祖廟于白登山嵗一祭具太牢帝親之亦無常月兼祀皇天上帝以山神配旱則禱之多有效是嵗詔郡國於太祖廵幸行宫之所各立壇祭以太牢嵗一祭皆牧守侍祀又立太祖别廟於宫中嵗四祭用牛馬羊各一又加置天日月之神及諸小神二十八所於宫内嵗二祭各用羊一後二年於白登西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊及親行貙劉之禮别置天神等二十三於廟左右其神大者以馬小者以羊華隂公主帝姊也元紹之為逆有保䕶功故别立其廟於太祖廟垣後因祭薦焉又於雲中盛樂金陵三所各立太廟四時祀官侍祀泰常三年為五精帝兆於四郊逺近依五行數各為方壇四陛埓壝三重通四門以太皥等及諸佐隨配侑祭黄帝常以立秋前十八日餘四帝各以四立之日牲各用牛一有司主之又六宗靈星風伯雨師司民司祿先農之壇皆有别兆祭有常日牲用少牢立春之日遣有司迎春於東郊祭用酒脯棗栗無牲幣又立五岳四瀆廟於桑乾水之隂春秋遣有司祭有牲及幣四瀆唯以牲牢凖古望秩云其餘山川及海若諸神在州郡者合三百二十四所每嵗十月遣祀官詣州鎮遍祀有水旱災厲則牧守各隨其界内祈謁其祭皆用牲王畿内諸山川皆列祀次祭各有水旱則禱之明年八月帝嘗於白登廟將薦熟有神異焉太廟博士許鍾上言曰臣聞聖人能饗帝孝子能饗親伏惟陛下孝誠之至通於神明近嘗於太祖廟有車騎聲從北門入殷殷轞轞震動門闕執事者無不肅慄斯乃國祚永隆之兆宜告天下使知聖徳之深遠辛未幸代至鴈門關望祀恒岳後二年九月幸橋山遣有司祀黄帝唐堯廟明年正月南廵恒岳祀以太牢幸洛陽遣使以太牢祀嵩髙華岳還登太行五月至自洛陽諸所過山川羣祀之後三年二月祀孔子於國學以顔淵配神䴥二年帝将征蠕蠕省郊祀儀四月以小駕祭天神畢帝遂親戎大㨗而還歸格於祖禰徧告羣神九月立宻皇太后廟於鄴后之舊鄉也置祀官太常博士齋郎三十餘人侍祀嵗五祭太延元年立廟於恒岳華嵩岳上各置侍祀九十人嵗時祈禱水旱其春秋泮涸遣官率刺史祭以牲牢有玉幣魏先之居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔逺真君中烏洛侯國遣使朝獻云石廟如故民常祈請有神驗焉其嵗遣中書侍郎李敞詣石室告祭天地以皇祖先妣配祝曰天子燾謹遣敞等用駿足一元大武敢昭告于皇天之靈自啓闢之初祐我皇祖于彼土田歴載億年聿來南遷惟祖惟父光宅}
