  - {type: variant, offset: 638, length: 528, content: 丕我君大喜宣言國中又聞吳提遣使告西域諸國稱魏已削弱今天下唯我為強若更有魏使勿復恭奉西域諸國亦有貳者牧犍事主稍以慢惰使還具以狀聞世祖遂議討牧犍涼州既平鄯善國以為脣亡齒寒自然之道也今武威為魏所滅次及我也若通其使人知我國事取亡必近不如絕之可以支久乃斷塞行路西域貢獻歷年不入後平鄯善行人復通始琬等使還京師具言凡所經見及傳聞傍國云西域自漢武時五十餘國後稍相并至太延中為十六國分其地為四域自葱嶺以東流沙以西為一域葱嶺以西海曲以東為一域者舌以南月氏以北為一域兩海之間水澤以南為一域內諸小渠長蓋以百數其出西域本有二道後更為四出自玉門渡流沙西行二千里至鄯善為一道自玉門渡流沙北行二千二百里至車師為一道從莎車西行一百里至葱嶺葱嶺西一千三百里至伽倍為一道自莎車西南五百里葱嶺西南一千三百里至波路為一道焉自琬所不傳而更有朝貢者紀其名不能具國俗也其與前使所異者錄之鄯善國都扜泥城古樓蘭國也去代七千六百里所都城方一里地多沙鹵少水草北即白龍堆路至太延初始遣使來獻四年遣其弟素延耆入侍及世祖平涼州沮渠牧犍弟無諱走保敦煌無諱後謀渡流沙遣其弟安周擊鄯善王比龍恐懼欲降會魏使者自天竺罽賓還俱會鄯善勸比龍拒之遂與連戰安周不能克退保東城後比龍懼率衆西奔且末其世子乃應安周鄯善人頗剽劫之令不得通世祖詔, WYG: 馮誕}
