  - {type: variant, offset: 1217, length: 0, content: '', WYG: 擅祖宗之名居二祧之廟仰惟先朝舊事舛駮不同難以取凖今将述遵先志具詳禮典宜制祖宗之號定将來之法烈祖有剏基之功世祖有開拓之徳宜為祖宗百世不遷而遠祖平文功未多於昭成然廟號為太祖道武建業之勲髙於平文廟號為烈祖比功校徳以為未允朕今奉尊道武為太祖與顯祖為二祧餘者以次而遷平文既遷廟唯有六始今七廟一則無主唯當朕躬此事亦臣子所難言夫生必有終人之常理朕以不徳忝承洪緒若宗廟之靈獲全首領以沒于地為昭穆之次心願畢矣必不可豫設可垂之文示後必令遷之司空公長樂王穆亮等奏言升平之㑹事在於今推功考徳實如明㫖但七廟之祀備行日久無宜闕一虚}
