  - {type: variant, offset: 4276, length: 11, content: 疏勒西北去代萬四千四百, WYG: 服數之内也衰絰則埋之於地杖則棄之隱處此非喪事終乎府以大祥之後不為喪事之終何得復言素琴以示終也喪事尚逺日誠如鄭義龍虎未盡二十七月而請宿衞實為怱怱於戚之理合在情責便以深衣素縞之時而罪同杖絰苫凷之日於禮憲未允詳之律意冒喪求仕謂在斬焉草土之中不謂除衰杖之後也又龍虎具列居喪日月無所隱冒府應告之以禮遣還終月便幸彼昧識欲加之罪豈是遵禮敦風愛民之致乎正如鄭義龍虎罪亦不合刑怱怱之失宜科鞭}
