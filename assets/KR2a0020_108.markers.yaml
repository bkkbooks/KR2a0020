  - {type: variant, offset: 4355, length: 4, content: 三世矣其, WYG: 降何可紀極歴觀漢魏喪禮諸儀卷盈數百或當時名士往復成規或一代詞宗較然為則况堂堂四海藹藹如林而令喪禮參差始於帝族非所以儀刑萬}
