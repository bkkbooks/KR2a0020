  - {type: variant, offset: 5122, length: 2, content: 出處, WYG: 孝靜皇帝舉哀於太極東堂服齊衰三月及將窆中練齊文襄王請自發喪之月帝使侍中陸子彰舉詔三往敦喻王固執詔不許乃從薨月太祖天賜三年十月占授著作郎王宜弟造兵法高宗和平三年十二月因歳除大儺之禮遂燿兵示武更為制令歩兵陳於南騎士陳於北各擊鍾鼔以為節度其歩兵所衣青赤黃黑别為部隊楯矟矛㦸相次周回轉易以相赴就有飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法跽起前却莫不應節陳畢南北二軍皆鳴鼔角衆盡大譟各令騎將六人去來挑戰歩兵更進退以相拒擊南敗北㨗以為盛觀自後踵以為}
