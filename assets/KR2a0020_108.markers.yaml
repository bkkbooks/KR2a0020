  - {type: variant, offset: 4325, length: 0, content: '', WYG: 理未盡二公雖受之於公用之非私出入聲作亦以娛已今既有喪心不在樂笳鼓之事明非欲聞其從寧戚之義廢而勿作但禮崇公卿出入之儀至有趨以采齊行以肆夏和鑾之聲佩玉之飾者所以顯槐鼎之至貴彰宰輔之為重今二公地處尊親儀殊百辟鼔吹之用無容全去禮有懸而不樂今陳之以備威儀不作以示哀痛述理節情愚謂為允詔曰可從國子後議清河王懌所生母羅太妃薨表求申齊衰三年詔禮官博議侍中中書監太子少傅崔光議喪服}
