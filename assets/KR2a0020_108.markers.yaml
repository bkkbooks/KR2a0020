  - {type: variant, offset: 1285, length: 257, content: 鎮之賦役其人比之郡縣且末國都且末城在鄯善西去代八千三百二十里真君三年鄯善王比龍避沮渠安周之難率國人之半奔且末後役屬鄯善且末西北方流沙數百里夏日有熱風為行旅之患風之所至唯老駝豫知之即鳴而聚立埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻口其風迅駛斯須過盡若不防者必至危斃于闐國在且末西北葱嶺之北二百餘里東去鄯善千五百里南去女國二千里西去朱俱波千里北去龜茲千四百里去代九千八百里其地方亘千里連山相次所都城方八九里部內有大城五小城數十于闐城東三十里有首拔河中出玉石土宜五穀并桑麻山多美玉有好馬駝騾其刑法殺人者死餘罪各隨輕重懲罰之, WYG: 供廟饗又詔曰禮云}
