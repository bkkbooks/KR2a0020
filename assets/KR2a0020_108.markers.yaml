  - {type: variant, offset: 4341, length: 3, content: 匈奴殺, WYG: 徒從徒從之體君亡則已妻為皇姑既非徒從雖公子早没可得不制服乎為君之父母妻子君已除喪而後聞喪則不税蓋以恩輕不能追服假令妻在逺方姑没遥域過朞而後聞喪復可不税服乎若姑亡必不闗公子有否聞喪則税不許日月逺近者則與臣之從君聊自不同矣又案臣服君黨不過五人悉是三年}
