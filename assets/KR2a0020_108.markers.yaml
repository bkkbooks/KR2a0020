  - {type: variant, offset: 284, length: 1, content: 求, krp: 文可據有本可推而不評而定之其致安在朕躬覽尚書之文稱肆類上帝禋於六宗文相連屬理似一事上帝稱肆而無禋六宗言禋而不别其名以此推之上帝六宗當是一時之祀非别祭之名肆類非獨祭之目焚煙非他祀之用六宗者必是天皇大帝及五帝之神明矣禋是祭帝之事故稱禋以關其他故稱六以證之然}
  - {type: variant, offset: 286, length: 2, content: 卑辭, WYG: 肆類上帝禋于六宗一祭也互舉以成之今祭圜丘五帝在焉其牲幣俱禋故稱肆類上帝禋于六宗一祭}
  - {type: variant, offset: 286, length: 2, content: 卑辭, krp: 肆類上帝禋于六宗一祭也互舉以成之今祭圜丘五帝在焉其牲幣俱禋故稱肆類上帝禋于六宗一祭}
  - {type: variant, offset: 289, length: 0, content: '', WYG: 六祀備焉六祭既備無煩復别立六宗之位便可依此附令永為定法十四年八月詔曰丘澤初志配尚宜定五徳相襲分叙有常然異同之論著於往漢未詳之説疑在今史羣官百辟可議其所應必令合衷以成萬代之式中書監髙閭議以為帝王之作百代可知運代相承書𫝊可驗雖祚命有長短徳政有優劣至於受終嚴祖殷薦上帝其致一也故敢述其前載舉其大略臣聞居尊據極允應明命者莫不以中原為正統神州為帝宅茍位當名全化迹流洽則不專以世數為與奪善惡為是非故堯舜禪揖一身異尚魏晉相代少紀運殊桀紂至虐不廢承歴之叙厲惠至昏不闕周晉之錄計五徳之論始自漢劉一時之議三家致别故張蒼以漢為水徳賈誼公孫臣以漢為土徳劉向以漢為火徳以為水徳者正以嘗有水溢之應則不推運代相承之數矣以土徳者則以亡秦繼歴相即為次不推逆順之異也以為火徳者懸證赤帝斬蛇之符棄秦之暴越惡承善不以世次為正也故以承周為火徳自兹厥後乃以為常魏承漢火生土故魏為土徳晉承魏土生金故晉為金徳趙承晉金生水故趙為水徳燕承趙水生木故燕為木徳秦承燕木生火故秦為火徳秦之未滅皇魏未克神州秦氏既亡大魏稱制𤣥朔故平文之廟始稱太祖以明受命之證如周在岐之陽若繼晉晉亡已久若棄秦則中原有寄推此而言承秦之理事為明驗故以魏承秦魏為土徳又五緯表驗黄星曜彩考氏定實合徳軒轅承土祖未事為著矣又秦趙及燕雖非明聖各正號赤縣統有中土郊天祭地肆類咸秩明刑制禮不失舊章奄岱踰河境被淮漢非若齷齪邊方僣擬之屬逺如孫權劉備近若劉裕道成事繫蠻夷非關中夏伏唯聖朝徳配天地道被四海承乾統歴功侔百王光格同於唐虞享祚流於周漢正位中境奄有萬方今若并棄三家逺承晉氏則蔑中原正次之實存之無損於此而有成於彼廢之無益於今而有傷於事臣愚以為宜從尚黄定為土徳又前代之君明賢之史皆因其可襃襃之可貶貶之今議者偏據可絶之義而不錄可全之禮所論事大垂之萬葉宜竝集中秘羣儒人人别議擇其所長於理為悉秘書丞臣李彪著作郎崔光等議以為尚書閭議繼近秦氏臣職掌國籍頗覽前書惜此正次慨彼非緒輒仰推帝始逺尋百王魏雖建國君民兆朕振古祖黄制朔緜迹有因然此帝業神元為首案神元晉武往}
