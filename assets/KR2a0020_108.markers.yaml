  - {type: variant, offset: 4097, length: 2, content: 鼓舞, krp: 祖配之而立四廟此實殷湯時制不為難也聊復標牓略引章條愚戇不足以待大問侍中太傅清河王懌議太學博士王延業及盧觀等各率異見案禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五並是後世追論備廟之文皆非當時據立神位之事也良由去聖久逺經禮殘缺諸儒注記典制無因雖稽考異聞引證古誼然用捨従世通塞有時折衷取正固難詳矣今相國秦公初搆國廟追立神位唯當仰祀二昭二穆上極髙曽四世而已何者秦公身是始封之君将為不遷之祖若以功業隆重越居正室恐以卑臨尊亂昭穆也如其權立始祖以備五廟恐數滿便毁非禮意也昔司馬懿立功於魏為晋太祖及至子晋公昭乃立五廟亦祀四世止於髙曾太祖之位虛俟宣文待其後裔數滿乃止此亦前代之成事方今所殷監也又禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七明知當時太祖之神仍依昭穆之序要待子孫世世相推然後太祖出居正位耳逺稽禮緯諸儒所說近循晋公之廟故事宜依博士王延業議定立四主親止髙曽且虛太祖之位以待子孫而備五廟焉又延業盧觀前經詳議並據許慎鄭𤣥之解謂天子諸侯作主大夫及士則無意謂此議雖出前儒之事實未允情禮何以言之原夫作主之禮本以依神孝子之心非主莫依今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想象平存上自天子下逮於士如此四事並同其禮何至於主惟謂王侯禮云重主道也此為理重則立主矣故王肅曰重未立主之禮也士䘮禮亦設重則士有主明矣孔悝反祏載之左史饋食設主著於逸禮大夫及士既得有廟題紀祖考何可無主公羊傳君有事于廟聞大夫之䘮去樂卒事大夫聞君之䘮攝主而往今以為攝主者攝神斂主而已不暇待徹祭也何休云宗人攝行主事而往也意謂不然君聞臣䘮尚為之不懌况臣聞君䘮豈得安然代主終祭也又相國立廟設主依神主無貴賤紀座而已若位擬諸侯者則有主位為大夫者則無主便是三神有主一位獨闕求諸情禮實所未安宜通為主以銘神位懌又議曰古者七廟廟堂皆别光武已来異室同堂故先朝祀堂令云廟皆四枤五架北廂設座東昭西穆是以相國構廟唯制一室同祭祖考比来諸王立廟者自任私造不依公令或五或一参差無準要須議行新令然後定其法制相國之廟已造一室寔合朝令宜即依此展其享祀詔依懌議天平四年四月七帝神主既遷於太廟太社石主将遷於社宫禮官云應用幣中書侍郎裴伯茂時為祖祀文伯茂據故事太和中遷社宫髙祖用牲不用幣遂以奏聞于時議者或引大戴禮遷廟用幣今遷社宜不殊伯茂據尚書召詔應用牲詔遂従之武定六年二月将營齊獻武王廟議定室數形制兼度支尚書崔昂司農卿盧元明袐書監王元􅕺散騎常侍裴獻伯國子祭酒李渾御史中尉陸操黄門侍郎李騫中書侍郎陽休之前南青州刺史鄭伯猷祕書丞崔劼國子博士邢峙國子博士宗恵振太學博士張毓太學博士髙元壽國子助教王顯季等議案禮諸侯五廟太祖及親廟四今獻武王始封之君便是太祖既通親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭各一頰室夏頭徘徊鴟尾又案禮圗諸侯止開南門而二王後祔祭儀法執事列於廟東門之外既有東門明非一門獻武禮數既隆備物殊等準據今廟宜開四門内院南面開三門餘面及外院四面皆一門其内院牆四面皆架為歩廊南出夹門各置一屋以置禮器及祭服内外門牆並用赭堊廟東門道南置齋坊道北置二坊西為典祠廨并厨宰東為廟長廨并置車輅其北為養犧牲之所詔従之魏書卷一百八之二魏書卷一百八之二考證初世宗永平延昌中欲建明堂及元議執政元議應係元义之訛孝静帝武定六年内外門墻並用赭堊堊監本訛作聖今改正魏書卷一百八之二考證欽定四庫全書魏書卷一百八之三齊魏收撰志第十二禮四之三魏自太祖至於武泰帝及太皇太后皇太后皇后崩悉依漢魏既𦵏公除唯高祖太和十四年文明太后崩将營山陵九月安定王休齊郡王簡咸陽王禧河南王幹廣陵王羽潁川王雍始平王勰北海王詳侍中太尉錄尚書事東陽王丕侍中司徒淮陽王尉元侍中司空長樂王穆亮侍中尚書左僕射平原王陸叡等率百寮詣闕表曰上靈不弔大行太皇太后崩背溥天率土痛慕斷絶伏惟陛下孝思烝烝攀號罔極臣等聞先王制禮必有隨世之變前賢剏法亦務適時之宜良以世代不同古今異致故也三年之䘮雖則自古然中代已後未之能行先朝成式事在可準聖后終制刋之金冊伏惟陛下至孝發衷哀毁過禮欲依上古䘮終三年誠協大舜孝慕之徳實非俯遵濟世之道今雖中夏穆清庶邦康静然萬幾事殷不可暫曠春秋烝嘗事難廢闕伏願天鑒抑至孝之深誠副億兆之企望䘮期禮數一従終制則天下幸甚日月有期山陵将就請展安兆域以備奉終之禮詔曰凶禍甫爾未忍所請休等又表曰臣等聞五帝已前䘮期無數三代相因禮制始立名雖虛置行之者寡髙宗徒有諒闇之言而無可遵之式康王既廢初䘮之儀先行即位之禮於是無改之道或虧三年之䘮有缺夫豈無至孝之君賢明之子皆以理貴隨時義存百姓是以君薨而即位不暇改年踰月而即𦵏豈待同軌𦵏而即吉不必終䘮此乃二漢所以經綸治道魏晋所以綱理政術伏惟陛下以至孝之性遭罔極之艱永慕崩號哀過虞舜誠是萬古之髙徳曠世之絶軌然天下至廣萬幾至殷曠之一朝庶政必滯又聖后終制已有成典宗社廢禮其事尤大伏願天鑒抑哀毁之至誠思在予之深責仰遵先志典冊之文俯哀百辟元元之請詔曰自遭禍罰慌惚如昨奉侍梓宫猶怖髣髴山陵遷厝所未忍聞十月休等又表曰臣等頻煩上聞仰申誠欵聖慕惟逺未垂昭亮伏讀哀灼憂心如焚臣等聞承乾統極者宜以濟世為務經綸天下者特以百姓為心故萬幾在躬周康弗獲申其慕漢文作戒孝景不得終其禮此乃先代之成軌近世所不易伏惟太皇太后叡聖淵識慮及始終明誥垂於典䇿遺訓備於末命聿修厥徳聖人所重遵承先式臣子攸尚陛下雖欲終上逹之禮其如黎元何臣等不勝憂懼之誠敢冐重陳乞垂聼訪以副億兆之望詔曰仰尋遺㫖俯聞所奏信增號絶山陵可依典冊如公卿所議衰服之宜情所未忍别當備敘在心既𦵏休又表曰奉被癸酉詔書述遺誠之㫖昭違従之義遵儉𦵏之重式稱孝思之深誠伏讀未周悲感交切日月有期山陵即就伏惟陛下永慕崩號倍增摧絶臣等具位在官與國休戚庇心之至不敢不陳咸以為天下之至尊莫尊於王業皇極之至重莫重於萬㡬至尊故不得以常禮任已至重亦弗獲以世典申情是以二漢已降逮于魏晋𦵏不過踰月服不淹三旬良以叔世事廣禮隨時變不可以無為之法行之於有為之辰文質不同古今異制其來久矣自皇代革命多歴年祀四祖三宗相繼纂業上承數代之故實俯副兆民之企望豈伊不懐理宜然也文明太皇太后欽明稽古聖思淵深所造終制事合世典送終之禮既明遺誥之文載備奉而行之足以垂風百王軌儀萬葉陛下以至孝之誠哀毁過禮三御不充半溢晝夜不釋絰帶永思纒綿滅姓㡬及百姓所以憂懼失守臣等所以肝腦塗地王者之尊躬行一日固可以感徹上靈貫被幽顯况今山陵告終闕二字咸畢日已淹月仍不卜練比之前世理為過矣願陛下思大孝終始之義愍億兆悲惶之心抑思割哀遵奉終制以時即吉一日萬㡬則天下蒙恩率土仰賴謹依前式求定練日以備祔禫之禮詔曰比當别敘在心既而帝引見太尉丕及羣臣等於太和殿前哭拜盡哀出幸思賢門右詔尚書李沖宣旨於王等仰惟先后平日近集羣官共論政治平秩民務何圖一旦禍酷奄鍾獨見公卿言及䘮事追惟荼毒五内崩摧丕對曰伏奉明詔羣情圯絶臣與元等不識古義以老朽之年歴奉累聖國家舊事頗所知聞伏惟逺祖重光世襲至有大諱之日唯侍送梓宫者凶服左右盡皆従吉四祖三宗因而無改世祖髙宗臣所目見唯先帝升遐臣受任長安不在侍送之列竊聞所𫝊無異前式伏惟陛下以至孝之性哀毁過禮伏聞所御三食不滿半溢臣等叩心絶氣坐不安席願暫抑至慕之情遵先朝成事思金冊遺令奉行前式無失舊典詔曰追惟慈恩昊天罔極哀毁常事豈足闗言既不能待没而朝夕食粥粗亦支任二公何足以至憂怖所奏先朝成事亦所具聞祖宗情專武略未修文教朕今仰稟聖訓庶習古道論時比事又與先世不同太尉等國老政之所寄於典記舊式或所未悉且可知朕大意其餘䘮禮之儀古今異同漢魏成事及先儒所論朕雖在衰服之中以䘮禮事重情在必行故暫抑哀慕躬自尋覧今且以所懐别問尚書㳺明根髙閭等公且可聽之髙祖謂明根曰朕丁罹酷罰日月推移山陵已過公卿又依金冊據案魏晋請除衰服重聞所奏倍増號哽前者事逼山陵哀疚頓敝未得論敘今故相引欲具通所懐卿前所表除釋衰麻聞之實用悲恨于時親侍梓宫匍匐筵几哀號痛慕情未暫闋而公卿何忍便有此言何於人情之不足夫聖人制卒哭之禮授練之變皆奪情以漸又聞君子不奪人之䘮亦不可奪䘮今則旬日之間言及即吉特成傷理明根對曰臣等伏尋金冊遺㫖踰月而𦵏𦵏而即吉故於卜𦵏之初因奏練除之事仰傷聖心伏增悲悚髙祖曰卿等咸稱三年之䘮雖則自古然中代以後未之能行朕謂中代所以不遂三年之䘮葢由君上違世繼主初立故身襲衮冕以行即位之禮又従儲宫而登極者君徳未沇臣義不洽天下顒顒未知所傒故頒備朝儀示皇極之尊及后之䘮也因父在不遂即生惰易之情踵以為法諒知敦厚之化不易遵也朕少蒙鞠育慈嚴兼至臣子之情君父之道無不備誨雖自蒙昧粗解告㫖庶望量行以免咎戾朕誠不徳在位過紀雖未能恩洽四方化行萬國仰禀聖訓足令億兆知有君矣於此之日而不遂哀慕之心使情禮俱損䘮紀圯壊者深可痛恨髙閭對曰太古既逺事難襲用漢魏以来據有成事漢文繼髙恵之蹤斷獄四百㡬致刑措猶垂三旬之禮孝景承平遵而不變以此言之不為即位之際有所逼懼也良是君臣之道理自宜然又漢稱文景雖非聖君亦中代明主今遺冊之㫖同於前式伏願陛下述遵遺令以副羣庶之情杜預晋之碩學論自古天子無有行三年之䘮者以為漢文之制闇與古合雖叔世所行事可承踵是以臣等慺慺干謁髙祖曰漢魏之事與今不同備如向說孝景雖承昇平之基然由嫡子即位君徳未顯無異前古又父子之親誠是天屬之重然聖母之徳昊天莫報思自殞滅豈従衰服而已竊尋金冊之㫖所以告奪臣子之心令早即吉者慮遺絶萬幾荒廢政事羣臣所以慺慺亦懼機務之不理矣今仰奉冊令俯順羣心不敢闇黙不言以荒庶政唯欲存衰麻廢吉禮朔望盡哀寫泄悲慕上無失導誨之志下不乖衆官所請情在可許故專欲行之公卿宜審思朕懐不當固執至如杜預之論雖暫適時事於孺慕之君諒闇之主葢亦誣矣孔聖稱䘮與其易也寧戚而預於孝道簡略朕無取焉袐書丞李彪對曰漢明徳馬后保養章帝母子之道無可問然及后之崩𦵏不淹旬尋以従吉然漢章不受譏於前代明徳不損名於往史雖論功比徳事有殊絶然母子之親抑亦可擬願陛下覽前世之成規遵金冊之遺令割哀従議以親萬機斯誠臣下至心兆庶所願髙祖曰既言事殊固不宜仰匹至徳復稱孝章従吉不受譏前代朕所以眷戀衰絰不従所議者仰感慈恩情不能忍故也葢聞孝子之居䘮見羙麗則感親故釋錦而服麤衰内外相稱非虛加也今者豈徒顧禮違議茍免嗤嫌而已抑亦情發於衷而欲肆之於外金冊之意已具前答故不復重論又卒日奉㫖不忍片言後事遂非嘿嘿在念不顯所懐今奉終之事一以仰遵遺冊於令不敢有乖但痛慕之心事繋於予雖無丁蘭之感庻聖靈不奪至願是以謂無違㫖嫌諸公所表稱先朝成式事在可準朕仰惟太祖龍飛九五初定中原及太宗承基世祖纂歴皆以四方未一羣雄競起故銳意武功未修文徳髙宗顯祖亦心存武烈因循無改朕承累世之資仰聖善之訓撫和内外上下輯諧稽参古式憲章舊典四海移風要荒革俗仰遵明軌庶無愆違而方於禍酷之辰引末朝因循之則以為前準非是所喻髙閭對曰臣等以先朝所行頗同魏晋又適於時故敢仍請髙祖曰卿等又稱今雖中夏穆清庶邦康静然萬機事廣不可暫曠朕以卿苦見逼奪情不自勝尋覽䘮儀見前賢論者稱卒哭之後王者得理庶事依據此文又従遺冊之㫖雖存衰服不廢萬幾無闕庶政得展罔極之思於情差申髙閭對曰君不除服於上臣則釋衰於下従服之義有違為臣之道不足又親御衰麻復聽朝政吉凶事雜臣竊為疑髙祖曰卿等猶以朕之未除於上不忍專釋於下奈何令朕獨忍於親舊論云王者不遂三年之服者屈已以寛羣下也先后之撫羣下也念之若子視之猶傷卿等哀慕之思既不求寛朕欲盡罔極之慕何為不可但逼遺冊不遂乃心將欲居廬服衰寫朝夕之慕升堂襲素理日昃之勤使大政不荒哀情獲遂吉不害於凶凶無妨於吉以心處之謂為可爾遺㫖之文公卿所議皆服終三旬釋衰襲吉従此而行情實未忍遂服三年重違㫖誥今處二理之際唯望至期使四氣一周寒暑代易雖不盡三年之心得一終忌日情結差申案禮卒哭之後将受變服於朕受日庶民及小官皆命即吉内職羽林中郎已下虎賁郎已上及外職五品已上無衰服者素服以終三月内職及外臣衰服者變従練禮外臣三月而除諸王三都駙馬及内職至來年三月晦朕之練也除凶即吉侍臣君服斯服隨朕所降比雖非舊式推情即理有貴賤之差遠近之别明根對曰聖慕深逺孝情彌至臣等所奏已不蒙許願得踰年即吉既歴冬正嵗序改易且足申至慕之情又近遺誥之意何待期年髙祖曰冊㫖速除之意慮廣及百官久曠衆務豈於朕一人獨有違奪今既依次降除各不廢王政復何妨於事而猶奪期年之心髙閭對曰昔王孫倮𦵏士安去棺其子皆従而不違不為不孝此雖貴賤非倫事頗相似臣敢借以為諭今親奉遺令而有所不従臣等所以頻煩于奏李彪亦曰三年不改其父之道可謂大孝今不遵冊令恐渉改道之嫌髙祖曰王孫士安皆誨子以儉送終之事及其遵也豈異今日改父之道者葢謂慢孝忘禮肆情違度今梓宫之儉𤣥房之約明器幃帳一無所陳如斯之事卿等所悉衰服之告乃至聖心卑己申下之意寧可茍順沖約之㫖而頓絶創巨之痛縱有所渉甘受後代之譏未忍今日之請又表稱春秋蒸嘗事難廢闕朕聞諸夫子吾不與祭如不祭自先朝以来有司行事不必躬親比之聖言於事殆闕賴蒙慈訓之恩自行致敬之禮今昊天降罰殃禍上延人神䘮恃幽顯同切想宗廟之靈亦輟歆祀脫行饗薦恐乖㝠㫖仰思成訓倍增痛絶豈忍身襲衮冕親行吉事髙閭對曰古者郊天越紼行事宗廟之重次於郊祀今山陵已畢不可久廢廟饗髙祖曰祭祀之典事由聖經未忍之心具如前告脫至廟庭號慕自纒終恐廢禮公卿如能獨行事在言外李彪曰三年不為禮禮必壊三年不為樂樂必崩今欲廢禮闕樂臣等未敢髙祖曰此乃宰予不仁之說已受責於孔子不足復言羣官前表稱髙宗徒有諒闇之言而無可遵之式朕惟信闇黙之難周公禮制自兹以降莫能􅕺行言無可遵之式良可怪矣復云康王既廢初䘮之儀先行即位之禮於是無改之道式虧三年之䘮有缺朕謂服羙不安先賢有諭禮畢居䘮著在前典或虧之言有缺之義深乖理衷髙閭對曰臣等據案成事依附杜預多有未允至乃推校古今量考衆議實如明㫖臣等切惟曾参匹夫七日不食夫子以為非禮及錄其事唯書七日不稱三年葢重其初慕之心伏惟陛下以萬乗之尊不食竟於五日既御則三食不充半溢臣等伏用悲惶肝腦塗地躬行一日足以貫被幽顯豈宜衰服三年以曠機務夫聖人制禮不及者企而及之過之者俯而就之伏願陛下抑至慕之情俯就典禮之重誠是臣等慺慺之願髙祖曰恩隆徳厚則思戀自深雖非至情由所感發然曾参之孝曠代而有豈朕今日所足論也又前表稱古者𦵏而即吉不必終禮此乃二漢所以經綸治道魏晋所以綱理庶政朕以為既𦵏即吉盖其季俗多亂權宜救世耳諒非光治興邦之化二漢之盛魏晋之興豈由簡略䘮禮遺忘仁孝哉公卿偏執一隅便謂經治之要皆在於斯殆非義也昔平日之時公卿每奏稱當今四海晏安諸夏清泰禮樂日新政和民恱蹤侔軒唐事等虞禹漢魏已下固不足仰止聖治及至今日便欲苦奪朕志使不踰於魏晋如此之意未解所由昔文母上承聖主之資下有賢子之化唯助徳宣政因風致穆而已當今衆事草剏萬務惟始朕以不徳沖年踐祚而聖母匡訓以義方詔誨以政事經綸内外憂勤億兆使君臣協和天下輯穆上代以来何后之功得以仰比如有可擬則従衆議堯雖棄子禪舜而舜自有聖徳不假堯成及其徂也猶四海遏宻終於三年今慈育之恩詔教之徳尋之曠代未有匹擬既受非常之恩寧忍従其常式况未殊一時而公卿欲令即吉冠冕黼黻行禮廟庭臨軒設懸饗㑹萬國尋事求心實所未忍髙閭對曰臣等遵承冊令因循前典惟願除衰即吉親理萬幾至徳所在陛下欽明稽古周覽墳籍孝性發於聖質至情出於自然斟酌古今事非臣等所及李彪曰當今雖治風緝穆民庶晏然江南有未賔之吴朔北有不臣之虜東西二蕃雖文表稱順情尚難測是以臣等猶懐不虞之慮髙祖曰魯公帶絰従師晋侯墨衰敗寇往聖無譏前典所許如有不虞雖越紼無嫌而况衰麻乎豈可於晏安之辰豫念戎旅之事以廢䘮紀哉李彪對曰昔太伯父死適越不失至徳之名夫豈不懐有由然也伏願抑至慕之心従遺告之重臣聞知子莫若父母聖后知陛下至孝之性也難奪故豫造金冊明著遺禮今陛下孝慕深逺果不可奪臣等常辭知何所啟髙祖曰太伯之言有乖今事諸情備如前論更不重敘古義亦有稱王者除衰而諒闇終䘮者若不許朕衰朕則當除衰闇黙委政冡宰二事之中惟公卿所擇明根對曰陛下孝侔髙宗慕同大舜服衰麻以申至痛理萬幾以従遺㫖興曠世之廢禮制一代之髙則臣等伏尋淵黙不言則代政将曠仰順聖慕之心請従衰服之㫖東陽王丕曰臣與尉元歴事五帝雖衰老無識敢奏所聞自聖世以来大諱之後三月必須迎神於西攘惡於北具行吉禮自皇始以来未之或易髙祖曰太尉國老言先朝舊事誠如所陳但聰眀正直唯徳是依若能以道不召自至茍失仁義雖請弗来大禍三月而備行吉禮深在難忍縱即吉之後猶所不行况數旬之中而有此理恐是先朝萬得之一失未可以為常式朕在不言之地不應如此但公卿執奪朕情未忍従遂成往復追用悲絶上遂號慟羣官亦哭而辭出壬午詔曰公卿屢上啓事依據金冊遺㫖中代成式求過𦵏即吉朕仰惟恩重不勝罔極之痛思遵逺古終三年之禮比見羣官具論所懐今依禮既虞卒哭剋此月二十日受服以葛易麻既衰服在上公卿不得獨釋於下故於朕之授變従練已下復為節降斷度今古以情制𠂻但取遺㫖速除之一節粗申臣子哀慕之深情欲令百官同知此意故用宣示便及變禮感痛彌深十五年四月癸亥朔設薦於太和廟是日髙祖及従服者仍朝夕臨始進蔬食上哀哭追感不飯侍中南平王馮誕等諌經宿乃膳甲子罷朝夕哭九月丙戌有司上言求卜祥日詔曰便及此期覽以摧絶敬祭卜祥乃古之成典但世失其義筮曰永吉既乖敬事之志又違永慕之心今将屈禮厲衆不訪龜兆已企及此晦寧敢重違冊㫖以異羣議尋惟永往言増崩裂丁亥髙祖宿於廟至夜一刻引諸王三都大官駙馬三公令僕已下奏事中散已上及刺史鎮将立哭於廟庭三公令僕升廟既出監御令陳服笥於廟陛南近侍者奉而升列於堊室前席侍中南平王馮誕跽奏請易服進縞冠皂朝服革帶黒屨侍臣各易以黒介幘白絹單衣革帶烏履遂哀哭至乙夜盡戊子質明薦羞奏事中散已上冠服如侍臣刺史已下無變髙祖薦酌神部尚書王諶讃祝訖哭拜遂出有司陽祥服如前侍中跽奏請易祭服進縞冠素紕白布深衣麻繩履侍臣去幘易幍羣官易服如侍臣又引入如前儀曹尚書㳺明根升廟跽慰復位哭遂出引太守外臣及諸部渠帥入哭次引蕭賾使幷雜客入至甲夜四刻侍御散騎常侍司衛監以上升廟哭既而出帝出廟停立哀哭久而乃還十月太尉丕奏曰竊聞太廟已就眀堂功畢然享祀之禮不可久曠至於移廟之日湏得國之大姓遷主安廟神部尚書王諶既是庶姓不宜参豫臣昔以皇室宗屬遷世祖之主先朝舊式不敢不聞詔曰具聞所奏尋惟平日倍增痛絶今遵述先㫖營建寢廟既而粗就先王制禮職司有分移廟之日遷奉神主皆太尉之事朕亦親自行事不得越局専委大姓王諶所司惟賛板而已時運流速奄及縞制復不得哀哭於明堂後當親拜山陵寫泄哀慕是年髙麗王死十二月詔曰髙麗王璉守蕃東隅累朝貢職年踰期頥勤徳彌著今既不幸其赴使垂至将為之舉哀而古者同姓哭廟異姓隨其方皆有服制今既久廢不可卒為之衰且欲素委貌白布深衣於城東為盡一哀以見其使也朕雖不嘗識此人甚悼惜之有司可申敕備辦事如别儀十六年九月辛未髙祖哭於文明太后陵左終日不絶聲幕越席為次侍臣侍哭壬申髙祖以忌日哭於陵左哀至則哭侍哭如昨帝二日不御膳癸酉朝中夕三時哭拜於陵前夜宿監𤣥殿是夜徹次甲戌帝拜哭辭陵還永樂宫十九年太師馮熙薨有數子尚幼議者以為童子}
  - {type: variant, offset: 4101, length: 0, content: '', WYG: 事降成人謂為衰而不裳免而不絰又無腰麻繆垂唯有絞帶時博士孫恵蔚上書言臣雖識謝古人然微渉傳記近取諸身逺取諸禮驗情以求理尋理以推制竊謂童子在幼之儀居䘮之節冠杖之制有降成人衰麻之服略為不異以玉藻二簡㣲足眀之曰童子之節錦紳并細錦即大帶既有佩觹之革又有錦紐之紳此眀童子雖幼已備二帶以凶類吉則腰絰存焉又曰童子無緦服鄭注曰雖不服緦猶免深衣是許其有裳但不殊上下又深衣之制長㓜俱服童子為服之緦猶免深衣况居有服之斬而反無裳乎臣又聞先師舊說童子常服類深衣衰裳所施理或取象但典無成言故未敢孤斷又曰聽事則不麻則知不聽事麻矣故注曰無麻往給事此眀族人之䘮童子有事貫絰帶麻執事不易故暫聽去之以便其使往則不麻不往則絰如使童子本自無麻禮腰首聽與不聽俱闕兩絰唯舉無麻足眀不備豈得言聽事則不麻乎以此論之有絰明矣且童子不杖不廬之節理儉於責疑不裳不絰之制未覩其說又臣竊解童子不衣裳之記是有聞之言將謂童子時甫稚齡未就外傅出則不交族人内則事殊長者餕㫖父母之前往来慈乳之手故許其無裳以便易之若在志學之後将冠之初年居二九質並成人受道成均之學釋菜上庠之内将命孔氏之門執燭曾参之室而唯有掩身之衣無蔽下之裳臣愚未之安矣又女子未許嫁二十則䈂觀祭祀納酒漿助奠廟堂之中視禮至敬之處其於婉容之服寧無其備以此推之則男女雖幼理應有裳但男女未冠禮謝三加女子未出衣殊狄褖無名之服禮文罕見童子雖不當室茍以成人之心則許其人服緦之絰輕猶有絰斬重無麻是為與輕而奪重非禮之意此臣之所以深疑也又衰傍有袵以掩裳際如使無裳袵便徒設若復去袵衰又不備設有齊斬之故而便成童男女唯服無袵之衰去其裳絰此必識禮之所不行亦以眀矣若不行於已而立制於人是為違制以為法従制以誤人恕禮而行理将異此詔従其議魏書卷一百八之三魏書卷一百八之三考證禮志敘日已淹月仍不卜練日監本訛作自今改正臨軒設懸饗㑹萬國軒監本訛作宜今改正魏書卷一百八之三考證欽定四庫全書魏書卷一百八之四齊魏收撰志第十三禮四之四世宗永平四年冬十二月員外將軍兼尚書都令史陳終德有祖母之喪欲服齊衰三年以無世爵之重不可陵諸父若下同衆孫恐違後祖之義請求詳正國子博士孫景邕劉懷義封軌高綽太學博士袁昇四門博士陽寧居等議嫡孫後祖持重三年不為品庶生二終德宜先諸父太常卿劉芳議案喪服乃士之正禮含有天子諸侯卿大夫之事其中時復下同庶人者皆别標顯至如傳重自士以上古者卿士咸多世位又士以上乃有宗廟世儒多云嫡孫傳重下通庶人以為差謬何以明之禮稽命徴曰天子之元士二廟諸侯之上士亦二廟中下士一廟一廟者祖禰共廟祭法又云庶人無廟既如此分明豈得通於庶人也傳重者主宗廟非謂庶人祭於寢也兼累世承嫡方得為嫡子嫡孫耳不爾者不得繼祖也又鄭𤣥别變除云為五世長子服斬也魏晉以來不復行此禮矣案喪服經無嫡孫為祖持重三年正文唯有為長子三年嫡孫朞𫝊及注因說嫡孫𫝊重之義今世既不復為嫡子服斬卑位之嫡孫不陵諸叔而持重則可知也且準終德資階方之於古未登下士庶人在官復無斯禮考之舊典驗之今世則兹範罕行且諸叔見存喪主有寄宜依諸孫服朞為允景邕等又議云喪服雖以士為主而必下包庶人何以論之自大夫以下每條標列逮於庶人含而不述比同士制起後疑也唯有庶人為國君此則明義服之輕重不渉於孫祖且受國於曾祖廢疾之祖父亦無重可傳而猶三年不必由世重也夫霜感露濡異識咸感承重主嗣寧甄寢廟嫡孫之制固不同殊又古自卿以下皆不殊承襲末代僭妄不可以語通典是以春秋譏於世卿王制稱大夫不世此明訓也喪服經雖無嫡孫為祖三年正文而有祖為嫡孫者豈祖以嫡服己巳與庻孫同為祖服朞於義可乎服祖三年此則近世未嘗變也準古士官不過二百石已上終德即古之廟士也假令終德未班朝次茍曰志仁必也斯遂況乃官歴士流當訓章之運而以庶叔之嫌替其嫡重之位未是成人之善也芳又議國子所云喪服雖以士為主而必下包庶人本亦不謂一篇之内全不下同庶人正言嫡孫𫝊重專士以上此經𫝊之正文不及庶人明矣戴德喪服變除云父為長子斬自天子達於士此皆士以上乃有嫡子之明據也且承重者以其將代已為宗廟主廟主了不云寢又其證也所引大夫不世者此公羊穀梁近儒小道之書至如左氏詩易尚書論語皆有典證或是未寤許叔重五經異義云今春秋公羊穀梁説卿大夫世位則權幷一姓謂周尹氏齊崔氏也而古春秋左氏說卿大夫皆得世禄傳曰官族易曰食舊德舊德謂食父故禄也尚書曰世選爾勞予不絶爾善詩云惟周之士不顯奕世論語曰興滅國繼絶世國謂諸侯世謂卿大夫也斯皆正經及論語士以上世位之明證也士皆世禄也八品者一命斯乃信然但觀此據可謂覩其綱未照其目也案晉官品令所制九品皆正無從故以第八品準古下士今皇朝官令皆有正從若以其員外之資為第十六品也豈得為正八品之士哉推考古今謹如前議景邕等又議喪服正文大夫以上每事顯列唯有庶人含而不言此通下之義了然無惑且官族者謂世為其功食舊德者謂德侯者世位興滅國繼絶世主謂諸侯卿大夫無罪誅絶者耳且金貂七毦楊氏四公雖以位相承豈得言世禄乎晉太康中令史殷遂以父祥不及所繼求還為祖母三年時政以禮無代父追服之文亦無不許三年之制此即晉世之成規也尚書邢巒奏依芳議詔曰嫡孫為祖母禮令者處士人通行何勞方致疑請也可如國子所議延昌二年春偏將軍乙龍虎喪父給假二十七月而虎幷數閏月詣府求上領軍元珍上言案違制律居三年之喪而冒哀求仕五歳刑龍虎未盡二十七月而請宿衞依律結刑五歳三公郎中崔鴻駮曰三年之喪二十五月大祥諸儒或言祥月下旬而禫或言二十七月各有其義未知何者會聖人之㫖龍虎居喪已二十六月若依王杜之義便是過禫即吉之月如其依鄭𤣥二十七月禫中復可以從御職事禮云祥之日鼔素琴然則大祥之後喪事終矣既可以從御職事求上何為不可若如府判禫中鼔琴復有罪乎求之經律理實未允下更詳辨珍又上言案士虞禮三年之喪朞而小祥又朞而大祥中月而禫鄭𤣥云中猶閒也自喪至此凡二十七月又禮言祥之日鼓素琴鄭云鼔琴者存樂也孔子祥後五日彈琴而不成十日而成笙歌鄭注與鄭志及踰月可以歌皆身自逾月可為此謂存樂也非所謂樂樂者使工為之晋博士許猛解三驗曰案黍離麥秀之歌小雅曰君子作歌惟以告哀魏詩曰心之憂矣我歌且謡若斯之類豈可謂之金石之樂哉是以徒歌謂之謡徒吹謂之和記曰比音而樂之及干戚羽毛謂之樂若夫禮樂之}
