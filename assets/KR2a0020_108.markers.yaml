  - {type: variant, offset: 4101, length: 0, content: '', krp: 事降成人謂為衰而不裳免而不絰又無腰麻繆垂唯有絞帶時博士孫恵蔚上書言臣雖識謝古人然微渉傳記近取諸身逺取諸禮驗情以求理尋理以推制竊謂童子在幼之儀居䘮之節冠杖之制有降成人衰麻之服略為不異以玉藻二簡㣲足眀之曰童子之節錦紳并細錦即大帶既有佩觹之革又有錦紐之紳此眀童子雖幼已備二帶以凶類吉則腰絰存焉又曰童子無緦服鄭注曰雖不服緦猶免深衣是許其有裳但不殊上下又深衣之制長㓜俱服童子為服之緦猶免深衣况居有服之斬而反無裳乎臣又聞先師舊說童子常服類深衣衰裳所施理或取象但典無成言故未敢孤斷又曰聽事則不麻則知不聽事麻矣故注曰無麻往給事此眀族人之䘮童子有事貫絰帶麻執事不易故暫聽去之以便其使往則不麻不往則絰如使童子本自無麻禮腰首聽與不聽俱闕兩絰唯舉無麻足眀不備豈得言聽事則不麻乎以此論之有絰明矣且童子不杖不廬之節理儉於責疑不裳不絰之制未覩其說又臣竊解童子不衣裳之記是有聞之言將謂童子時甫稚齡未就外傅出則不交族人内則事殊長者餕㫖父母之前往来慈乳之手故許其無裳以便易之若在志學之後将冠之初年居二九質並成人受道成均之學釋菜上庠之内将命孔氏之門執燭曾参之室而唯有掩身之衣無蔽下之裳臣愚未之安矣又女子未許嫁二十則䈂觀祭祀納酒漿助奠廟堂之中視禮至敬之處其於婉容之服寧無其備以此推之則男女雖幼理應有裳但男女未冠禮謝三加女子未出衣殊狄褖無名之服禮文罕見童子雖不當室茍以成人之心則許其人服緦之絰輕猶有絰斬重無麻是為與輕而奪重非禮之意此臣之所以深疑也又衰傍有袵以掩裳際如使無裳袵便徒設若復去袵衰又不備設有齊斬之故而便成童男女唯服無袵之衰去其裳絰此必識禮之所不行亦以眀矣若不行於已而立制於人是為違制以為法従制以誤人恕禮而行理将異此詔従其議魏書卷一百八之三魏書卷一百八之三考證禮志敘日已淹月仍不卜練日監本訛作自今改正臨軒設懸饗㑹萬國軒監本訛作宜今改正魏書卷一百八之三考證欽定四庫全書魏書卷一百八之四齊魏收撰志第十三禮四之四世宗永平四年冬十二月員外將軍兼尚書都令史陳終德有祖母之喪欲服齊衰三年以無世爵之重不可陵諸父若下同衆孫恐違後祖之義請求詳正國子博士孫景邕劉懷義封軌高綽太學博士袁昇四門博士陽寧居等議嫡孫後祖持重三年不為品庶生二終德宜先諸父太常卿劉芳議案喪服乃士之正禮含有天子諸侯卿大夫之事其中時復下同庶人者皆别標顯至如傳重自士以上古者卿士咸多世位又士以上乃有宗廟世儒多云嫡孫傳重下通庶人以為差謬何以明之禮稽命徴曰天子之元士二廟諸侯之上士亦二廟中下士一廟一廟者祖禰共廟祭法又云庶人無廟既如此分明豈得通於庶人也傳重者主宗廟非謂庶人祭於寢也兼累世承嫡方得為嫡子嫡孫耳不爾者不得繼祖也又鄭𤣥别變除云為五世長子服斬也魏晉以來不復行此禮矣案喪服經無嫡孫為祖持重三年正文唯有為長子三年嫡孫朞𫝊及注因說嫡孫𫝊重之義今世既不復為嫡子服斬卑位之嫡孫不陵諸叔而持重則可知也且準終德資階方之於古未登下士庶人在官復無斯禮考之舊典驗之今世則兹範罕行且諸叔見存喪主有寄宜依諸孫服朞為允景邕等又議云喪服雖以士為主而必下包庶人何以論之自大夫以下每條標列逮於庶人含而不述比同士制起後疑也唯有庶人為國君此則明義服之輕重不渉於孫祖且受國於曾祖廢疾之祖父亦無重可傳而猶三年不必由世重也夫霜感露濡異識咸感承重主嗣寧甄寢廟嫡孫之制固不同殊又古自卿以下皆不殊承襲末代僭妄不可以語通典是以春秋譏於世卿王制稱大夫不世此明訓也喪服經雖無嫡孫為祖三年正文而有祖為嫡孫者豈祖以嫡服己巳與庻孫同為祖服朞於義可乎服祖三年此則近世未嘗變也準古士官不過二百石已上終德即古之廟士也假令終德未班朝次茍曰志仁必也斯遂況乃官歴士流當訓章之運而以庶叔之嫌替其嫡重之位未是成人之善也芳又議國子所云喪服雖以士為主而必下包庶人本亦不謂一篇之内全不下同庶人正言嫡孫𫝊重專士以上此經𫝊之正文不及庶人明矣戴德喪服變除云父為長子斬自天子達於士此皆士以上乃有嫡子之明據也且承重者以其將代已為宗廟主廟主了不云寢又其證也所引大夫不世者此公羊穀梁近儒小道之書至如左氏詩易尚書論語皆有典證或是未寤許叔重五經異義云今春秋公羊穀梁説卿大夫世位則權幷一姓謂周尹氏齊崔氏也而古春秋左氏說卿大夫皆得世禄傳曰官族易曰食舊德舊德謂食父故禄也尚書曰世選爾勞予不絶爾善詩云惟周之士不顯奕世論語曰興滅國繼絶世國謂諸侯世謂卿大夫也斯皆正經及論語士以上世位之明證也士皆世禄也八品者一命斯乃信然但觀此據可謂覩其綱未照其目也案晉官品令所制九品皆正無從故以第八品準古下士今皇朝官令皆有正從若以其員外之資為第十六品也豈得為正八品之士哉推考古今謹如前議景邕等又議喪服正文大夫以上每事顯列唯有庶人含而不言此通下之義了然無惑且官族者謂世為其功食舊德者謂德侯者世位興滅國繼絶世主謂諸侯卿大夫無罪誅絶者耳且金貂七毦楊氏四公雖以位相承豈得言世禄乎晉太康中令史殷遂以父祥不及所繼求還為祖母三年時政以禮無代父追服之文亦無不許三年之制此即晉世之成規也尚書邢巒奏依芳議詔曰嫡孫為祖母禮令者處士人通行何勞方致疑請也可如國子所議延昌二年春偏將軍乙龍虎喪父給假二十七月而虎幷數閏月詣府求上領軍元珍上言案違制律居三年之喪而冒哀求仕五歳刑龍虎未盡二十七月而請宿衞依律結刑五歳三公郎中崔鴻駮曰三年之喪二十五月大祥諸儒或言祥月下旬而禫或言二十七月各有其義未知何者會聖人之㫖龍虎居喪已二十六月若依王杜之義便是過禫即吉之月如其依鄭𤣥二十七月禫中復可以從御職事禮云祥之日鼔素琴然則大祥之後喪事終矣既可以從御職事求上何為不可若如府判禫中鼔琴復有罪乎求之經律理實未允下更詳辨珍又上言案士虞禮三年之喪朞而小祥又朞而大祥中月而禫鄭𤣥云中猶閒也自喪至此凡二十七月又禮言祥之日鼓素琴鄭云鼔琴者存樂也孔子祥後五日彈琴而不成十日而成笙歌鄭注與鄭志及踰月可以歌皆身自逾月可為此謂存樂也非所謂樂樂者使工為之晋博士許猛解三驗曰案黍離麥秀之歌小雅曰君子作歌惟以告哀魏詩曰心之憂矣我歌且謡若斯之類豈可謂之金石之樂哉是以徒歌謂之謡徒吹謂之和記曰比音而樂之及干戚羽毛謂之樂若夫禮樂之}
