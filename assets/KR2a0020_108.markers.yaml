  - {type: variant, offset: 133, length: 3, content: 相吞滅, WYG: 舉其大但事多粗略且兼闕遺髙祖稽古率由舊則斟酌前王擇其令典朝章國範煥乎復振早年懕世叡慮未從不爾劉馬之迹夫何足數世宗優遊在上致意𤣥門儒業文風顧有未洽墜禮淪聲因之而往肅宗已降魏道衰羸太和之風仍世凋落以至於海内傾圯綱紀泯然鳴呼魯秉周禮國以克固齊臣撤器降人折謀治身不得以造次忘治國庸可而須臾忽也初自皇始迄於武定朝廷典禮之迹故總而錄之太祖登國元年即代王位於牛川西向設祭告天成禮天興元年定都平城即皇帝位立壇兆告祭天地祝曰皇帝臣珪取用𤣥牡昭告于皇天后土之靈上天降命乃眷我祖宗世王幽都珪以不徳纂戎前緒思寧黎元龔行天罰殪劉顯屠衛辰平慕容定中夏羣下勸進謂宜正位居尊以副天人之望珪以天時人謀}
  - {type: page-break, offset: 133, content: '', id: KR2a0020_WYG_108-2a, image: WYG0262/WYG0262-0656a.png}
  - {type: page-break, offset: 133, content: '', id: KR2a0020_WYG_108-2b, image: WYG0262/WYG0262-0656b.png}
