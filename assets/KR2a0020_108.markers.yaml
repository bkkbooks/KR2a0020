  - {type: variant, offset: 7091, length: 748, content: 語與蠕蠕高車及諸胡不同衆可十萬無城邑依隨水草以氈為屋夏遷涼土冬逐暖處分其諸妻各在別所相去或二百三百里其王巡歷而行每月一處冬寒之時三月不徙王位不必傳子子弟堪任死便授之其國無車有輿多駝馬用刑嚴急偷盜無多少皆腰斬盜一責十死者富者累石為藏貧者掘地而埋隨身諸物皆置冢內其人兇悍能鬬戰西域康居于闐沙勒安息及諸小國三十許皆役屬之號為大國與蠕蠕婚姻自太安以後每遣使朝貢正光末遣使貢師子一至高平遇万俟醜奴反因留之醜奴平送京師永熙以後朝獻遂絕其國南去漕國千五百里東去瓜州六千五百里初熙平中肅宗遣王伏子統宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數蓋舉其略云朱居國在于闐西其人山居有麥多林果咸事佛語與于闐相類役屬肽噠渴槃國在葱嶺東朱駒波西河經其國東北流有高山夏積霜雪亦事佛道附於肽噠鉢和國在渴槃西其土尤寒人畜同居穴地而處又有大雪山望若銀峯其人唯食餅飲麥酒服裘有二道一道西行向肽噠一道西南趣烏萇亦為肽噠所統波知國在鉢和西南土狹人貧依託山谷其王不能總攝有三池傳云大池有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多遇風雪之困賒彌國在波知之南山居不信佛法專事諸神亦附肽噠東有鉢盧勒國路嶮緣鐵鎖而度下不見底熙平中宋雲等竟不能達烏萇國在賒彌南北有葱嶺南至天竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪決焉土多林果引水灌田豐稻麥事佛多諸寺塔事極華麗人有爭訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知往來也乾陀國在烏萇西本名業波為肽噠所破因改焉其王本是敕勒臨國已二世矣好征戰與罽賓鬬三年不罷人怨苦之有鬬象七百頭十人乘一象皆執兵仗象鼻縳刀以戰所都城東南七里有佛塔高七十丈周三百步即所謂雀離佛圖也康國者康居之後也遷徙無常不故地, WYG: 色}
