  - {type: variant, offset: 6133, length: 5, content: 交趾又水道, WYG: 門四達五色車旗各處其方諸王導從在鉀騎内公在幢内侯在歩矟内子在刀楯内五品朝臣使列乗輿前兩廂官卑者先引王公侯子車旒麾蓋信幡及散官構服一皆純黑肅宗熙平元年六月中侍中劉騰等奏中宮僕刺列車輿朽敗自昔舊都禮物頗異遷京已來未復更造請集禮官以裁其制靈太后令曰付尚書量議太常卿穆紹少卿元端博士鄭六劉臺龍等議案周禮王后之五輅重翟錫面朱總厭翟勒面繢總安車彫面鷖總皆有容蓋翟車貝面組總有握輦車組輓有翣羽蓋重翟后從王祭祀所乗厭翟后從王賓饗諸侯所乘安車后朝見於王所乘翟車后出桑則乘輦車后宮中所乗謹以周禮聖制不刋之典其禮文尤備孔子云其或繼周者雖百世可知也以其法不可踰以此言之後王輿服典章多放周式雖文質時變輅名宜存彫飾雖異理無全捨當今聖后臨朝親覽庶政輿駕之式宜備典禮臣等學缺}
