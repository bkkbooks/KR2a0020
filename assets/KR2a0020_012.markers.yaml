  - {type: variant, offset: 5712, length: 0, content: '', krp: 遣使朝貢二年春正月地豆干國遣使朝貢二月丁夘徐州人劉烏黒聚衆反遣行臺慕容紹宗}
  - {type: variant, offset: 5713, length: 2, content: 仲遠, WYG: 平之三月蕭衍遣使朝貢以旱故宥死罪以下囚丙午以開府儀同三司孫騰為太保壬子以齊文襄王為大將軍領侍中其文武職事賞罰衆典詢禀之中書監元弼為録尚書左僕射司馬子如為尚書令以今上為左僕射夏四月室韋國遣使朝貢五月甲午遣散騎常侍魏季景使於蕭衍丁酉太尉廣陽王湛薨秋八月癸酉尚書令司馬子如坐事免九月甲申以開府儀同三司濟隂王暉業為太尉太師咸陽王坦坐事免以王還第冬十月丁巳太保孫騰大司馬髙隆之各為括戸大使凡獲逃戸六十餘萬十有一月西河地陷有火出甲申以司徒髙隆之為尚書令以前大司馬婁昭為司徒齊文襄王如晋陽庚子車駕有事於圜丘辛五蕭衍遣使朝貢壬寅齊文襄王從獻武王討山胡破之俘獲一萬餘戸分配諸州是嵗吐谷渾髙麗蠕蠕勿吉國並遣使朝貢三年春正月丙申遣兼散騎常侍李奨使於蕭衍丁未齊獻武王請於并州置晋陽宫以處配沒之口二月庚申吐谷渾國奉其從妹以備後庭納為容華嬪夏五月甲辰大赦天下秋七月庚子蕭衍遣使朝貢冬十月遣中書舎人尉瑾使於蕭衍乙未齊獻武王請邙山之俘釋其桎梏配以人間寡婦十有二月以司空侯景為司徒以中書令韓軌為司空戊子以太保孫騰為録尚書事是嵗髙麗吐谷渾蠕蠕國並遣使朝貢四年夏五月壬寅蕭衍遣使朝貢六月庚子以司徒侯景為河南大行臺應機討防秋七月壬寅遣兼散騎常侍元廓使於蕭衍八月移洛陽漢魏石經於鄴齊獻武王自鄴帥衆西伐文襄王㑹於晋州九月圍玉壁以挑之寳炬黒獺不敢應冬十有一月齊獻武王有疾班師文襄王如晋陽是嵗室韋勿吉地豆干髙麗蠕蠕國並遣使朝貢五年春正月丙午齊獻武王薨於晋陽秘不發䘮辛亥司徒侯景反潁州刺史司馬世雲以城應之景入據潁城誘執豫州刺史髙元成襄州刺史李宻廣州刺史暴顯等遣司空韓軌驃騎大將軍儀同三司賀拔勝可朱渾道元左衛將軍劉豐等帥衆討之景乃遣使降於寳炬請師救援寳炬遣其將李景和王思政帥騎赴之思政等入據潁州景乃出走豫州乙五蕭衍遣使朝貢二月侯景復背寳炬歸於蕭衍衍署景河南大將軍承制夏四月壬申大將軍齊文襄王來朝甲午遣兼散騎常侍李緯使於蕭衍五月丁酉朔大赦天下戊戌以尚書右僕射襄城王旭為太尉甲辰以太原公今上為尚書令領中書監餘如故詢以政事以青州刺史尉景為大司馬以開府儀同三司厙狄干為太師以録尚書事孫騰為太傅以汾州刺史賀仁為太保以司空韓軌為司徒以領軍將軍可朱渾道元為司空以司徒髙隆之録尚書事以徐州刺史慕容紹宗為尚書左僕射髙陽王斌為右僕射戊午大司馬尉景薨六月司徒韓軌司空可朱渾道元等自潁州班師乙酉帝為齊獻武王舉哀於東堂服緦縗詔尚書右僕射髙陽王斌兼大鴻臚卿赴晋陽監護喪事太尉襄城王旭兼尚書令奉詔宣慰秋七月}
