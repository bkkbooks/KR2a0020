  - {type: variant, offset: 5929, length: 0, content: '', WYG: 八三年二月奉諡曰孝静皇帝葬於漳西山崗其後發之陵崩死者六十人帝好文學美容儀力能挾石師子以踰牆射無不中嘉辰宴㑹多命羣臣賦詩從容沉雅有孝文風齊文襄王嗣事甚忌焉以大将軍中兵參軍崔季舒為中書黄門侍郎令監察動静小大皆令季舒知文襄與季舒書曰癡人復何似癡勢小差未帝甞與獵於鄴東馳逐如飛監衛都督烏那羅受工伐從後呼帝曰天子莫走馬大将軍怒文襄嘗侍飲大舉觴曰臣澄勸陛下酒帝不悦曰自古無不亡之國朕亦何用此活文襄怒曰朕朕狗脚朕文襄使季舒毆帝三拳奮衣而出明日文襄使季舒勞帝帝亦謝焉賜絹季舒未敢受以啓文襄文襄使取一段帝束百匹以與之曰亦一段耳帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連恥本自江海人忠義動君子常侍侍講荀濟知帝意乃與華山王大器元瑾宻謀於宫内為山而作地道向北城至千秋門門者覺地下響動以告文襄文襄勒兵入宫曰陛下何意反邪臣父子功存社稷何負陛下邪將殺諸妃嬪帝正色曰王自欲反何關於我我尚不惜身何况妃嬪文襄下牀叩頭大啼謝罪於是酣飲夜久乃出居三日幽帝於含草堂大器瑾等皆見烹於市及將禪位於文宣襄城王旭及司徒潘相樂侍中張亮黄門郎趙彦琛等求入奏事帝在昭陽殿見之旭曰五行遞運有始有終齊王聖徳欽明萬姓歸仰臣等昧死聞奏願陛下則堯禪舜帝便斂容答曰此事推挹已久謹當遜避又云若爾湏作詔書侍郎崔劭裴讓之奏云詔已作訖即付楊愔進於帝凡十條書訖帝曰將安朕何所復若為而去楊愔對曰在北城别有館宇還備法駕依常仗衛而去帝乃下御座歩就東廊口詠范蔚宗後漢書賛云獻生不辰身播國屯終我}
