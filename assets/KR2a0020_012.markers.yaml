  - {type: variant, offset: 1131, length: 358, content: 東道大使征東將軍光祿勳元欣副之巡方黜陟先行後聞辛酉大將軍尒朱榮還晉陽帝餞於邙陰丙寅詔曰自孝昌之季法令昏泯懷忠守素擁隔莫申深怨宿憾控告靡所其有事在通途橫被疑異名例無爽枉見排抑或選舉不平或賦役煩苛諸如此者不可具說其有訴人經公車注不合者悉集華林東門朕當親理寃獄以申積滯己巳齊州郡民賈皓聚衆反夜襲州城會明退走乙亥晉州刺史樊子鵠克唐州斬刺史崔元珍行臺酈惲傳首京師壬午詔求德行文藝政事強直者縣令太守刺史皆其志業具以表聞得三人以上縣令太守刺史賞一階舉非其人亦黜一階又以舊軍勳不過征虜自今以後宜依前式以上餘階積而為品其從輿駕北來之徒不在此例悉不聽破品受階破階請帛先是蕭衍遣其將曹義宗寇荊州癸未以中軍將軍吏部尚書費穆為使持節都督南征諸軍事節度荊州刺史王羆以討之六月丁亥朔追封兄真定縣開國公子直為陳留王庚寅以鎮軍將軍金紫光祿大夫李虔為車, WYG: 驃}
