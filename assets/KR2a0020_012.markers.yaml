  - {type: variant, offset: 5709, length: 0, content: '', WYG: 差選勇士庚寅前潁州刺史奚思業為河南大使簡發勇士丁酉蕭衍遣使朝貢戊申開府儀同三司汝陽王暹薨秋七月丁丑詔以齊獻武王為相國録尚書事大行臺固辭相國八月壬辰兼散騎常侍王元景兼通直散騎常侍魏收使於蕭衍九月甲子發畿内民夫十萬人城鄴城四十日罷辛未曲赦畿内死罪以下各有差冬十有一月癸亥以新宫成大赦天下改元八十以上賜綾帽及杖七十以上賜帛及有疾廢者賜粟帛築城之夫給復一年二年春正月壬申以太保尉景為太傅以驃騎大將軍開府儀同三司厙狄干為太保丁丑徙御新宫大赦内外百官普進一階營構主將别優一階三月己夘蕭衍遣使朝貢夏五月己酉西魏行臺宫延和陜州刺史宫元慶率戸内屬置之河北新附賑廪各有差壬子遣兼散騎常侍李象使於蕭衍閏月己丑封皇子景植為宜陽王皇弟威為清河王謙為潁川王六月壬子大司馬華山王鷙薨冬十月丁未蕭衍遣使朝貢十有二月乙夘遣兼散騎常侍崔長謙使於蕭衍是嵗蠕蠕髙麗勿吉國並遣使朝貢三年春二月甲辰阿至羅出吐㧞那渾大率部來降三月己酉梁州人公孫貴賔聚衆反自號天王陽夏鎮將討擒之夏四月戊申阿至羅國主副伏羅越居子去賔來降封為髙車王六月乙丑蕭衍遣使朝貢秋七月齊文襄王如晋陽己夘宜陽王景植薨八月甲子遣兼散騎常侍李騫使於蕭衍冬十月癸夘齊文襄王自晋陽來朝先是詔文襄王}
