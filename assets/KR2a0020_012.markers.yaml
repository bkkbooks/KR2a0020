  - {type: variant, offset: 5710, length: 0, content: '', WYG: 羣臣於麟趾閣議定新制甲寅班於天下己巳發夫五萬人築漳濵堰三十五日罷癸亥車駕狩於西山十有一月戊寅還宫丙戌以開府儀同三司彭城王韶為太尉以度支尚書胡僧敬為司空是嵗蠕蠕髙麗勿吉國並遣使朝貢四年春正月丙辰蕭衍遣使朝貢夏四月丙寅遣兼散騎常侍李繪使於蕭衍乙酉以侍中廣陽王湛為太尉以尚書右僕射髙隆之為司徒以太尉彭城王韶為録尚書事丁亥太傅尉景坐事降為驃騎大將軍開府儀同三司辛夘以太保厙狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射五月辛巳齊獻武王來朝請令百官月一面敷政事明揚仄陋納諫屏邪親理獄訟褒黜勤怠牧守有愆節級相坐椒掖之内進御以序後園鷹犬悉皆放棄六月還晋陽丙申復前侍中樂浪王忠爵丁酉復陳留王景皓常山王紹宗髙宻王永業爵秋八月庚戍以開府儀同三司吏部尚書侯景為兼尚書僕射河南行臺随機討防冬十月甲寅蕭衍遣使朝貢齊獻武王圍寳炬玉壁十有一月壬午班師驃騎大將軍開府儀同三司青州刺史西河王悰薨十有二月辛亥遣兼散騎常侍楊斐使於蕭衍是嵗蠕蠕髙麗吐谷渾國並遣使朝貢武定元年春正月壬戌朔大赦天下改元己巳車駕蒐於邯鄲之西山癸酉還宫二月壬申北豫州刺史髙仲宻據虎牢西叛三月寳炬遣其子突與宇文黒獺率衆來援仲宻庚子圍河橋南城丙午帝親納訟戊申齊獻武王討黒獺戰於邙山大破之擒寳炬兄子臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮驃騎大將軍儀同三司太子詹事趙善督將參寮等四百餘人俘斬六萬餘甲仗牛馬不可}
