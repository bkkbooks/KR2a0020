  - {type: variant, offset: 107, length: 739, content: 進封長樂王轉侍中中軍將軍三年十月以兄彭城王劭事轉為衞將軍左光祿大夫中書監實見出也及武泰元年春二月肅宗崩大都督尒朱榮將向京師謀欲廢立以帝家有忠勳且兼民望陰與帝通榮乃率衆來赴夏四月丙申帝與兄弟夜北渡河丁酉會榮於河陽戊戌南濟河即帝位以兄彭城王劭為無上王弟霸城公子正為始平王以榮為使持節侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王己亥百僚相率有司奉璽紱備法駕奉迎於河梁庚子車駕巡河西至陶渚榮以兵權在己遂有異志乃害靈太后及幼主次害無上王劭始平王子正又害丞相高陽王雍司空公元欽儀同三司元芝儀同三司東平王略廣平王悌常山王召己北平王超任城王彝趙郡王毓中山王叔仁齊郡王溫公卿已下二千餘人列騎衞帝遷於便幕既而榮悔稽顙謝罪語在榮傳辛丑車駕入宮御太極殿詔曰太祖誕命應期龍飛燕代累世重光載隆帝緒冀欲闡茲洪業永在無窮豈圖多難遘茲百六致使妖悖四起內外競侵朝無恤政之臣野多怨酷之士實由女主專朝致茲顛覆孝明皇帝大情沖順深存隱忍奄棄萬國衆用疑焉苟求胡出入守神器凡厥有心莫不解體太原王榮世抱忠孝功格古今赴義晉陽大會河洛乃推翼朕躬應茲大命德謝少康道愧前緒猥以眇身君臨萬國如涉淵海罔知所濟可大赦天下改武泰為建義元年從太原王督將軍士普加五階在京文官兩階武官三級復天下租役三年壬寅太原王尒朱榮上表請追諡無上王為皇帝餘死於河陰者諸王刺史贈三司三品者令僕五品者刺史七品以下及民郡鎮諸死者子孫聽立後授封爵詔從之癸卯以前太尉公江陽王繼為太師司州牧驃騎大將軍開府儀同三司相州刺史北海王顥為太傅開府仍刺史平東將軍光祿大夫清淵縣開國侯李延寔為太保進封陽平王尋轉太傅安南將軍并州刺史元天穆為太尉公封上黨王侍中車騎大將軍儀同三司楊椿為司徒公車騎大將軍儀同三司頓丘郡開國公穆紹為司空公領尚書令進爵為王使持節車騎大將軍雍州刺史上黨公長孫稚, WYG: ''}
