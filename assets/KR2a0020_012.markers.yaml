  - {type: variant, offset: 5891, length: 2, content: 元曄, WYG: 侯景濟江推蕭衍弟子臨賀王正徳為主以攻建業是嵗髙麗室韋蠕蠕吐谷渾國並遣使朝貢七年春正月戊辰蕭衍弟子北徐州刺史中山侯蕭正表以鍾離内屬封蘭陵郡開國公呉郡王三月丁夘侯景尅建業還以蕭衍為主衍弟子北兗州刺史定襄侯蕭祗相譚侯蕭退來降衍江北郡國皆内屬夏四月大行臺慕容紹宗大都督劉豐遇暴風溺水死甲辰詔以齊文襄王為相國齊王緑綟綬讃拜不名入朝不趨劒履上殿食冀州之渤海長樂安徳武邑瀛州之河間五郡邑十五萬戸餘如故王固辭是月侯景殺蕭衍立子綱為主五月齊文襄王帥衆自鄴赴潁川六月丙申克潁州擒寳炬大将軍尚書左僕射東道大行臺太原郡開國公王思政潁州刺史皇甫僧顯等及戰士一萬餘人男女數萬口齊文襄王遂如洛州秋七月齊文襄王至自南討請宥思政之罪八月辛夘詔立皇子長仁為皇太子齊文襄王薨於第祕不發喪癸巳}
