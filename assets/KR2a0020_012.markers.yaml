  - {type: variant, offset: 5697, length: 0, content: '', WYG: 万俟受洛于等於北豫相㑹俱討潁州梁回等棄城遁走潁州平二月豫州刺史堯雄攻揚州㧞之擒寳炬義州刺史韓顯揚州長史丘岳送京師丙辰遣兼散騎常侍}
  - {type: variant, offset: 5697, length: 0, content: '', krp: 万俟受洛于等於北豫相㑹俱討潁州梁回等棄城遁走潁州平二月豫州刺史堯雄攻揚州㧞之擒寳炬義州刺史韓顯揚州長史丘岳送京師丙辰遣兼散騎常侍}
  - {type: variant, offset: 5698, length: 3, content: 先護兼, WYG: 伯猷使於蕭衍三月齊獻武王固請觧大丞相詔從之夏四月庚寅曲赦畿内壬辰齊獻武王還晋陽請開酒禁六月壬辰帝幸華林都堂聼訟是夏山東大水蝦蟇鳴於樹上秋七月己亥髙麗國遣使朝貢行臺侯景司徒公髙敖曹圍寳炬將獨孤如願於金墉寳炬宇文黒獺並來赴救大都督厙狄干率諸將前驅齊獻武王總衆繼進八月辛夘戰於河隂大破之斬其大都督儀同三司宼洛生等二十餘人俘獲數萬司徒公髙敖曹大都督李猛宋顯並戰沒寳炬留其將長孫子彦守金墉壬辰齊獻武王濟河子彦棄城走九月大都督賀㧞仁撃邢摩納盧仲禮等破平之冬十月蕭衍遣使朝貢十有一月庚寅遣陸操使於蕭衍齊獻武王來朝十有二月甲辰還晋陽興和元年春正月辛酉以尚書令孫騰為司徒三月甲寅朔封常山郡王劭第二子曜為陳郡王夏五月齊文襄王來朝甲戌立皇后髙氏乙亥大赦天下是月髙麗國遣使朝貢六月乙酉以}
