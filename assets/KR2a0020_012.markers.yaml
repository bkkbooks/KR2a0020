  - {type: variant, offset: 2659, length: 2965, content: 戊午以無上王世子韶為彭城王陳留王子寬為陳留王寬弟剛為浮陽王剛弟質為林慮王癸亥齊獻武王行臺于暉與徐兗行臺崔孝芬大都督刁宣大破羊侃於瑕丘侃奔蕭衍兗州平戊寅以上黨王天穆為大將軍開府世襲并州刺史封前將軍太中大夫元凝為東安王十有二月庚子詔行臺于暉回師討邢杲次於歷下是歲葛榮餘黨韓樓復據幽州反二年春正月甲寅于暉所部都督彭樂率二千餘騎北走於韓樓乃班師二月癸未朔詔諸禁衞之官從戎有功及傷夷者赴選先甲午尊皇考為文穆皇帝廟號肅祖皇妣為文穆皇后燕州民王慶祖聚衆於上黨自稱為王柱國大將軍尒朱榮討擒之壬寅詔散騎常侍濟陰王暉業兼行臺尚書督都督李德龍丘大千鎮梁國三月壬戌詔大將軍上黨王天穆與齊獻武王討邢杲夏四月癸未遷肅祖文穆皇帝及文穆皇后神主于太廟內外百僚普汎加一級曲赦畿內死罪至流人減一等徒刑以下悉免庚子詔太原王尒朱榮下將士並汎加二級辛丑上黨王天穆齊獻武王大破邢杲於齊州之濟南杲降送京師斬於都市元顥攻陷考城執行臺元暉業都督丘大千五月壬子朔元顥克梁國丁巳以撫軍將軍前徐州刺史楊昱為使持節鎮東將軍東南道大都督率衆鎮滎陽尚書僕射尒朱世隆鎮虎牢侍中尒朱世承鎮崿岅辛酉詔私馬仗從戎優階授官壬戌又詔募士一依征葛榮甲子又詔職人及民出馬優階各有差乙丑內外戒嚴癸酉元顥陷滎陽執楊昱尒朱世隆棄虎牢遁還甲戌車駕北巡乙亥幸河內丙子元顥入洛丁丑進封城陽縣開國公元祉為平原王安昌縣開國侯元鷙為華山王並加儀同三司戊寅行臺崔孝芬大都督刁宣破元顥後軍都督侯暄於梁國斬之擒其卒三千人以侍中車騎將軍尚書右僕射尒朱世隆為使持節行臺僕射本將軍相州刺史鎮鄴城以便宜從事又詔上黨百年以下九十以上板三品郡八十以上四品郡七十以上五品郡太原王尒朱榮會車駕於長子即日反斾上黨王天穆北渡會車駕於河內六月己丑儀同三司費穆為顥所害壬寅克河內斬太守元襲都督宗正珍孫秋七月戊辰都督尒朱兆賀拔勝從硤石夜濟破顥子冠受及安豐王延明軍元顥敗走庚午車駕入居華林園昇大夏門大赦天下以使持節車騎將軍都督潁川郡開國公尒朱兆為車騎大將軍儀同三司詔以前朝勳書多竊冒宜一切焚棄之若立效灼然為時所知者別加科賞蕃客及邊酋翻城降有勳未叙者不在焚斷之限北來軍士及隨駕文武馬渚立義加汎五級河北執事之官二級河南立義及迎駕之官并中途扈從亦二級壬申以柱國大將軍太原王尒朱榮為天柱大將軍加前後部羽葆鼓吹癸酉臨潁縣卒江豐斬元顥傳首京師甲戌以大將軍上黨王天穆為太宰司徒公城陽王徽為大司馬太尉公乙亥宴勞天柱大將軍尒朱榮上黨王天穆及北來督將於都亭出宮人三百繒錦雜綵數萬匹班賜有差又諸州郡遣使奉表行宮者並加一大階丁丑獲元顥弟頊斬於都市詔受元顥爵賞階級悉追奪之己卯以鎮東將軍南青州刺史元旭為襄城王平南將軍南兗州刺史元暹為汝陽王閏月辛巳帝始居宮內辛卯以車騎將軍兼吏部尚書楊津為司空巴州刺史嚴始欣據州南叛蕭衍遣其將蕭玩張鴻江茂達等率衆赴援八月庚戌朔詔諸有公私債負一錢以上巨萬以還悉皆禁斷不得徵責己未以侍中太傅李延寔為司徒公丁卯封瓜州刺史元太榮為東陽王甲戌侍中太保楊椿致仕乙亥詔車騎將軍右光祿大夫奚毅板授天柱大將軍尒朱榮太宰天穆下勳及祖父叔伯耆年者牧守有差九月大都督侯淵討韓樓於薊破斬之幽州平万俟醜奴攻東秦城陷之殺刺史高子朗冬十月丁丑以前司空公丹陽王蕭贊為司徒公十有一月己卯就德興自營州遣使請降丁亥詔羣官休停在外者皆令赴闕程會有差丙午以大司馬太尉公城陽王徽為太保司徒公丹陽王蕭贊為太尉公開府儀同三司雍州刺史長孫稚為司徒公十有二月辛亥蕭衍兗州刺史張景邕荊州刺史李靈起雄信將軍蕭進明來降三年春正月己丑益州刺史長孫壽梁州刺史元儁等遣將與征巴州都督元景夏討嚴始欣斬之蕭衍都督蕭玩何難尉陳愁敗走斬玩首俘獲萬餘人辛丑東徐州城民呂文欣王赦等殺刺史元太賓據城反以撫軍將軍都官尚書樊子鵠兼右僕射為行臺督征南將軍都督賈顯智征東將軍徐州刺史嚴思達以討之二月甲寅克之東徐平三月醜奴大行臺尉遲菩薩寇岐州大都督賀拔岳可朱渾道元大破之夏四月丁巳以侍中太尉公丹陽王蕭贊為使持節都督齊濟兗三州諸軍事驃騎大將軍開府儀同三司齊州刺史丁卯雍州刺史尒朱天光討醜奴蕭寶夤於安定破擒之囚送京師甲戌以關中平大赦天下醜奴斬於都市寶夤賜死於駝牛署六月戊午詔胡氏親屬受爵於朝者黜附編民肽達國獻師子一是月白馬龍涸胡王慶雲僭稱大位於水洛城署置百官秋七月丙子天光平水洛城擒慶雲坑其城民一萬七千癸巳蕭衍民革虬卜湯世率堡聚內附庚子車騎大將軍儀同三司李叔仁坐事除名為民九月辛卯天柱大將軍尒朱榮上黨王天穆自晉陽來朝戊戌帝殺榮天穆於明光殿及榮子儀同三司菩提乃昇閶闔門詔曰蓋天道忌盈人倫嫉惡疏而不漏刑之無捨是以呂霍之門禍譴所伏梁董之家咎徵斯在頃孝昌之末天步孔艱女主亂政監國無主尒朱榮爰自晉陽同憂王室義旗之建大會盟津與世樂推共成鴻業論其始圖非無勞效但致遠恐泥終之實難曾未崇朝豺聲已露河陰之役安忍無親王公卿士一朝