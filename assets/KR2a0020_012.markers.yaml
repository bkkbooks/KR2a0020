  - {type: variant, offset: 1510, length: 0, content: '', WYG: 相州之廨改相州刺史為司州牧魏郡太守為魏尹徙鄴舊人西徑百里以居新遷之人分鄴置臨漳縣以魏郡林慮廣平陽丘汲郡黎陽東濮陽清河廣宗等郡為皇畿十有二月丁夘燕郡王賀㧞允薨庚午詔内外觧嚴百司悉依舊章從容雅服不得以矛釤從事丙子遣侍中封隆之等五人為大使巡諭天下丁丑赦畿内閏月蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉宇文黒獺既害出帝乃以南陽王寳炬僣尊號初置四中郎將於礓石橋置東中蒲泉置西中濟北置南中洺水置北中二年春正月寳炬渭州刺史可朱渾道元擁部來降齊獻武王迎納之賑其廪食己巳詔以齊獻武王為相國假黄鉞劔履上殿入朝不趨餘悉如故王固讓不受乙亥兼尚書右僕射東南道行臺元晏討元慶和破走之二月壬午以太尉咸陽王坦為太𫝊以司州牧西河王悰為太尉己丑前南青州刺史大野拔斬樊子鵠以降兗州平戊戌蕭衍司州刺史陳慶之宼豫州刺史堯雄撃走之三月辛酉以司徒髙盛為太尉以司空髙昻為司徒濟隂王暉業為司空齊獻武王討平山胡劉蠡升斬之其子南海王復僣帝號獻武王進撃破擒之及其弟西海王皇后夫人已下四百人并逋逃之人二萬餘戸辛未以旱故詔京邑及諸州郡縣收瘞骸骨是春髙麗契丹並遣使朝貢夏四月前青州刺史侯梁反攻掠青齊癸未濟州刺史蔡儁討平之壬辰降京師見囚五月大旱勒城門殿門及省府寺署坊門澆人不簡王公無限日得雨乃止六月元慶和宼南頓豫州刺史堯雄大破之秋七月甲戍封汝南王悦孫綽為琅邪王八月辛夘司空濟隂王暉業坐事免甲午發衆七萬六千人營新宫九月齊獻武王以治民之官多不奉法請選朝士清正者州别遣一人問疾苦丁巳以開府儀同三司襄城王旭為司空冬十有一月丁未蕭衍將栁仲禮宼荆州刺史王元撃破之癸丑祀圜丘甲寅閶闔門災龍見并州人家井中丙寅詔齊文襄王起家為散騎常侍驃騎大將軍左光禄大夫儀同三司太原郡開國公食邑三千戸十有二月壬午車駕狩於鄴東甲午文武百官量事各給禄三年春正月癸夘朔饗羣臣於前殿戊申詔百官舉士舉不稱才者兩免之齊獻武王襲寳炬西夏州克之詔加齊獻武王九錫之禮侍中元子思敦諭固讓乃止二月丁未蕭衍光州刺史郝樹以州内附丁酉詔加齊文襄王使持節尚書令大行臺大都督以鮮卑髙車酋庶皆𨽻之三月甲寅以開府儀同三司華山王鷙為大司馬丁夘陽夏太守盧公纂據郡}
