  - {type: variant, offset: 6027, length: 136, content: 一月葬於靜陵史臣曰魏自孝昌之末天下淆然外侮內亂神器固將無主莊帝潛思變化招納勤王雖時事孔棘而卒有四海猾逆既翦權強擅命抑是兆謀運智之秋勞謙夕惕之日也未聞長轡之策遽深負刺之恐謀謨罕術授任乖方猜嫌行戮禍不旋踵嗚呼胡醜之為釁也豈周衰晉末而已哉至於高祖不祀武宣享廟三后降鑒福祿固不永矣, WYG: 二考證}
