  - {type: variant, offset: 1587, length: 154, content: 瓜州刺史襲爵泰臨縣開國伯高昌王太尉公上黨王天穆為大都督東北道諸軍事率都督宗正珍孫奚毅賀拔勝尒朱陽都等討任褒帝以寇難未夷避正殿責躬撤膳又班募格收集忠勇其有直言正諫之士敢決徇義之夫陳國家利害之謀赴君親危難之節者集華林園面論事幽州平北府主簿河間邢杲率河北流民十餘萬戶反於青州之北海自署漢王號年天統戊申以征東將軍金紫, WYG: 右}
