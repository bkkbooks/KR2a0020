  - {type: variant, offset: 2471, length: 184, content: 之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽七郡各萬戶增封太原王尒朱榮為太原國戊戌又加榮太師庚戌以侍中鎮南將軍太原郡開國公于暉兼尚書左僕射為行臺與齊獻武王討羊侃壬子太師江陽王繼薨癸丑以膠東縣開國侯李侃希復其祖爵南郡王是月車騎大將軍儀同三司李叔仁討邢杲於濰水失利而還大都督費穆大破蕭衍軍擒其將曹義宗檻送京師蕭衍以北海王顥為魏主號年孝基入據南兗之銍城, WYG: ''}
