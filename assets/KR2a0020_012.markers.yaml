  - {type: variant, offset: 5897, length: 8, content: 尒朱度律自鎮京師, WYG: 内外百官並加二級甲午齊王如晋陽冬十月癸未以開府儀同三司咸陽王坦為太傅甲午以開府儀同三司潘相樂為司空十有二月甲辰呉郡王蕭正表薨己酉以并州刺史彭樂為司徒是嵗蠕蠕地豆干室韋髙麗吐谷渾國並遣使朝貢八年春正月辛酉帝為齊文襄王舉哀於東堂丁夘詔贈齊文襄王假黄鉞使持節相國都督中外諸軍事齊王璽綬輼輬車黄屋左纛前後部羽葆鼓吹輕車介士備九錫之禮諡曰文襄王戊辰詔齊王為使持節丞相都督中外諸軍事録尚書事大行臺齊郡王食邑一萬戸甲戌地豆干契丹國並遣使朝貢二月甲申葬齊文襄王車駕祖於漳濵庚寅以尚書令髙隆之為太保三月庚申進齊郡王爵為齊王夏四月乙巳蠕蠕遣使朝貢五月}
