  - {type: variant, offset: 1512, length: 0, content: '', WYG: 大都督元整破之夏四月丁酉昌樂王誕薨五月癸夘賜鰥寡孤獨貧窮者衣物各有差丙辰以録尚書事西河王悰為司州牧戊辰太尉髙盛薨六月辛巳趙郡王諶薨秋七月庚子大赦天下蕭衍夏州刺史田獨鞞頴川防城都督劉鸞慶並以州内附八月并肆􅃰建四州隕霜大饑九月壬寅以定州刺史侯景兼尚書右僕射南道行臺節度諸軍南討丙辰陽平人路季禮聚衆反辛酉御史中尉竇泰討平之冬十有一月戊申詔尚書可遣使廵檢河北流移飢人邢陘滏口所經之處若有死屍即為藏掩勿使靈臺枯骨有感於通夢廣漢露骸時聞於夜哭侯景攻克蕭衍楚州獲刺史桓和十有二月以并州刺史尉景為太保辛未遣使者板假老人官百嵗已下各有差壬申大司馬清河王亶薨丁丑齊獻武王自晋陽西討次於蒲津司徒公大都督髙敖曹趨上洛車騎大將軍竇泰入自潼闗癸未以太傅咸陽王坦為太師乙酉勿吉國遣使朝貢是嵗髙麗國遣使朝貢四年春正月禁十五日相偷戲竇泰失利自殺丁巳髙敖曹攻上洛克之擒寳炬驃騎大將軍洛州刺史梁企以汝陽王暹為録尚書事夏四月辛未遷七帝神主入新廟大赦天下内外百官普進一階先是滎陽人張儉等聚衆反於大醜山通寳炬壬辰武衛將軍髙元盛討破之六月己巳幸華林園理訟辛未詔尚書掩骼埋胾推録囚徒壬午閶闔門災先是蕭衍因益州刺史傅和請通好秋七月甲辰遣兼散騎常侍李楷兼吏部郎中盧元明兼}
