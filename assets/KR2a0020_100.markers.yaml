  - {type: variant, offset: 7989, length: 319, content: 濟武威太守父雅州秀才與沙門法秀謀反伏誅季坐腐刑入事宮掖久之除小黃門以忤旨出為潞縣令不拜仍除奉朝請靈太后反政授寧朔將軍長水校尉領黃門令轉前軍將軍中給事中時四方多事太后每令季出使於外後慰勞西軍還至潼關華州羌人舜明等據嶮作逆都督姜道明不能進討會舜明遣十餘人詐降入道明軍闕遂散出為新興太守肅宗崩與尒朱榮等議立莊帝莊帝即位起拜平北將軍肆州刺史尋除撫軍將軍中侍中以參謀之勳封元城縣開國侯食邑七百戶仍加金紫光祿大夫幽州大中正尋攝燕安平營中正前廢帝以為車騎將軍右光祿大夫中侍中如故永熙中加驃騎將軍季遇疾詔遣使存問三年九月卒天平初贈使持節都督幽燕安平四州諸軍事儀同三司幽州刺史中侍中將軍侯如故初季以兄叔良為襲季爵卒子世冑襲齊受禪例降封津字醜漢勃海蓨人也祖羽, WYG: ''}
