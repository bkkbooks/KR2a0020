  - {type: variant, offset: 8692, length: 472, content: 為平東將軍光祿大夫轉鎮南將軍金紫光祿大夫除衞將軍右光祿大夫初津被敕營出帝父廣平王陵永熙中以營陵功封津城陽縣開國子邑三百戶津自有封乃啟轉於憑後除衞大將軍左光祿大夫興和三年夏卒年六十七憑無他才伎始終資歷皆由於津津卒之後憑亦無贈子靈素襲齊受禪例降津從兄荅光祿大夫子宗顯司徒掾劉思逸平原人父直武邑太守與元愉反於信都伏誅思逸少充腐刑初為中小史轉寺人久之除小黃門拜奉朝請坐事免後除東莞太守思逸雖身在閹寺而性頗豪率輕薄無行好結朋遊又除左將軍大長秋卿遷中侍中平東將軍武定中與元瑾等謀反伏誅又有張景嵩毛暢者咸以閽寺在肅宗左右而並黠了甚見知遇俱為小黃門每承間陳元叉之惡於肅宗元叉之出景嵩暢頗有力焉靈太后反政未即戮叉時內外喧喧云叉還入知政事暢等恐禍及己乃啟肅宗欲詔右衞將軍楊津密往殺叉詔書已成未及出叉妻知之告太后云景嵩暢與清河王息召己欲廢太后太后信之責暢暢出詔書草以呈太后太后讀之知無廢己狀意為小解然叉妻構之不已遂致疑惑未幾出暢為頓丘太守後復出景嵩為魯郡太守乃密令御史掩暢暢走免尋捕殺之景嵩因入都太后數其與暢同計之事大致嫌責後為陽城滎陽二郡太守孝靜時位至中侍中坐事死, WYG: ''}
