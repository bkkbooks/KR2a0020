  - {type: variant, offset: 7805, length: 1, content: 雍, WYG: 法無以成其責故聽其所啟詔禮等還若今復違㫖則過咎益露後雖自陳無所逃罪然後興師討之於義為得九夷之國世居海外道暢則奉藩惠戢則保境故羈縻著於前典楛貢曠於歳時卿備陳彊弱之形具列往代之迹俗殊事異擬貺乖􅇆洪規大略其致猶在今中夏平一宇内無虞毎欲陵威東極懸旌域表拯荒黎於偏方舒皇風於逺服身由髙麗即叙未及卜征今若不從詔㫖則卿之來謀載協朕意元戎啟行将不云逺便可豫率同興具以待事時遣報使速究彼情師舉之日卿為鄉導之首大㨗之後又受元功之賞不亦善乎所獻錦布海物雖不悉達明卿至心今賜雜物如别又詔璉䕶送安等安等至髙句麗璉稱昔與餘慶有讎不令東過安等於是皆還乃下詔切責之五年使安等從東萊浮海賜餘慶璽書褒其誠節安等至海濱遇風飄蕩竟不達而還勿吉國在髙句麗北舊肅慎國也邑落各自有長不相總一其人勁悍於東夷最彊言語獨異常輕豆莫婁等國諸國亦患之去洛五千里自和龍北二百餘里有善玉山山北行十三日至祁黎山又北行七日至如洛􅅛水水廣里餘又北行十五日至太魯水又東北行十八日到其國國有大水濶三里餘名速末水其地下濕築城穴居屋形似塜開口於上以梯出入其國無牛有車馬佃則偶耕車則歩推有粟及麥穄菜則有葵水氣醎凝鹽生樹上亦有鹽池多䐗無羊嚼米醖酒飲能至醉婦人則布裙男子䐗犬皮裘初婚之夕男就女家執女乳而罷便以為定仍為夫婦俗以人溺洗手面頭揷虎豹尾善射獵弓長三尺箭長尺二寸以石為鏃其父母春夏死立埋之冢上作屋不令雨濕若秋冬以其屍捕貂貂食其肉多得之常七八月造毒藥傅箭鏃射禽獸中者便死煑藥毒氣亦能殺人國南有徒太山魏言太皇有虎豹羆狼不害人人不得山上溲汙行逕山者皆以物盛去延興中遣使乙力支朝獻太和初又貢馬五百匹乙力支稱初發其國乘船泝難河西上至太􅀈河沉船於水南出陸行渡洛孤水從契丹西界達和龍自云其國先破髙句麗十落宻共百濟謀從水道并力取髙句麗遣乙力支奉使大國請其可否詔勑三國同是藩附宜共和順勿相侵􅅰乙力支乃還從其來道取得本船汎達其國九年復遣使侯尼支朝獻明年復入貢其傍有大莫盧國覆鍾國莫多囘國庫婁國素和國具弗伏國匹黎尒國拔大何國郁羽陵國庫伏真國魯婁國羽真侯國前後各遣使朝獻太和十二年勿吉復遣使貢楛矢方物於京師十七年又遣使人婆非等五百餘人朝獻景明四年復遣使侯力歸等朝貢自此迄于正光貢使相尋爾後中國紛􅅰頗或不至興和二年六月遣使石久云等貢方物至於武定不絶失韋國在勿吉北千里去洛六千里路出和龍北千餘里入契丹國又北行十日至啜水又北行三日有蓋水又北行三日有犢了山其山髙大周囘三百餘里又北行三日有大水名屈利又北行三日至刃水叉北行五日到其國有大水從北而來廣四里餘名􅎄水國土下濕語與厙莫奚契丹豆莫婁國同頗有粟麥及穄唯食猪魚飬牛馬俗又無羊夏則城居冬逐水草亦多貂皮丈夫索髪用角弓其箭尤長女婦束髪作义手髻其國少竊盗盗一徴三殺人者責馬三百匹男女悉衣白鹿皮襦袴有麴釀酒俗愛赤珠為婦人飾穿挂於頸以多為貴女不得此乃至不嫁父母死男女聚哭三年屍則置於林樹之上武定二年四月始遣使張焉豆伐等獻其方物迄武定末貢使相尋豆莫婁國在勿吉國北千里去洛六千里舊北扶餘也在失韋之東東至於海方二千里其人土著有宫室倉庫多山陵廣澤於東夷之域最為平敞地宜五榖不生五果其人長大性彊勇謹厚不冦抄其君長皆以六畜名官邑落有豪帥飲食亦用俎豆有麻布衣制類髙麗而幅大其國大人以金銀飾之用刑嚴急殺人者死没其家人為奴婢俗婬尤惡妬婦妬者殺之尸其國南山上至腐女家欲得輸牛馬乃與之或言本穢貊之地也地豆干國在失韋西千餘里多牛羊出名馬皮為衣服無五榖惟食肉酪延興二年八月遣使朝貢至于太和六年貢使不絶十四年頻來犯塞髙祖詔征西大将軍陽平王頤擊走之自後時朝京師迄武定末貢使不絶厙莫奚國之先東部宇文之别種也初為慕容元真所破遺落者竄匿松漠之間其民不絜浄而善射獵好為冦鈔登國三年太祖親自出討至弱洛水南大破之獲其四部落馬牛羊豕十餘萬帝曰此羣狄諸種不識徳義互相侵盗有犯王略故往征之且䑕竊狗盗何足為患今中}
