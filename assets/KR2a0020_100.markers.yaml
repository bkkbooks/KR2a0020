  - {type: variant, offset: 800, length: 262, content: 而知外祖嵩已死唯有三舅每言於世祖世祖為訪其舅是時東方罕有仕者廣盆皆不樂入平城洛齊獨請行曰我養子兼人道不全當為兄弟試禍福也乃乘驢赴京魯元候知將至結從者百餘騎迎于桑乾河見而下拜從者亦同致敬入言于世祖世祖問其才用所宜將授之以官魯元曰臣舅不幸生為閹人唯合與陛下守宮闈耳而不言其養子世祖矜焉賜以奴馬引見尋拜武衞將軍俄而賜爵文安子稍遷給事黃門侍郎魏初禁網疏闊民戶隱匿漏脫者多東州既平綾羅戶民樂葵因是請採漏戶供為綸綿自後逃戶占為細繭羅縠者非一於是雜營戶帥遍於天下不屬守宰發賦輕易民多私附戶口錯亂不可檢括洛齊奏議罷之一屬郡縣從平涼州以功超遷, WYG: 遣}
