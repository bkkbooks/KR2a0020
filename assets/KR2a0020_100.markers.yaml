  - {type: variant, offset: 75, length: 6, content: 閽寺取則天象, WYG: 暖處有一男破殻而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘人以朱蒙非人所生将有異志請除之王不聽命之飬馬朱蒙毎私試知有善惡駿者减食令痩駑者善飬令肥夫餘王以肥者自乘以痩者給朱蒙後狩于田以朱蒙善射限之一矢朱蒙雖矢少殪獸甚多夫餘之臣又謀殺之朱蒙母隂知告朱蒙曰國将害汝以汝才略宜逺適四方朱蒙乃與烏引烏違等二人棄夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鼈並浮為之成橋朱蒙得渡魚鼈乃解追騎不得渡朱蒙遂至普述水遇見三人其一人著麻衣一人著衲衣一人著水藻衣與朱蒙至紇升骨城遂居焉號曰髙句麗因以為氏焉初朱蒙在夫餘時妻懐孕朱蒙逃後生一子字始閭諧及長知朱蒙為國主即與母亡而歸之名之曰閭逹委之國}
