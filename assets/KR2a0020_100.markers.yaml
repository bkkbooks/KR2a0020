  - {type: variant, offset: 7801, length: 1, content: 儀, WYG: 餘悉如故延死子成立訖於武定末其貢使無歲不至百濟國其先出自夫餘其國北去髙句麗千餘里處小海之南其民土著地多下濕率皆山居有五榖其衣服飲食與髙句麗}
  - {type: variant, offset: 7801, length: 1, content: 儀, krp: 餘悉如故延死子成立訖於武定末其貢使無歲不至百濟國其先出自夫餘其國北去髙句麗千餘里處小海之南其民土著地多下濕率皆山居有五榖其衣服飲食與髙句麗}
  - {type: variant, offset: 7803, length: 0, content: '', WYG: 延興二年其王餘慶始遣使上表曰臣建國東極豺狼隔路雖世承靈化莫由奉藩瞻望雲闕馳情罔極凉風微應伏惟皇帝陛下協和天休不勝係仰之情謹遣私署冠軍将軍駙馬都尉弗斯侯長史餘禮龍􅋮将軍帶方太守司馬張茂等投舫波阻搜徑𤣥津託命自然之運遣進萬一之誠冀神祗垂感皇靈洪覆克達天庭宣暢臣志雖旦聞夕没永無餘恨又云臣與髙句麗源出夫餘先世之時篤崇舊欵其祖釗輕廢隣好親率士衆陵踐臣境臣祖湏整旅電邁應機馳擊矢石暫交梟斬釗首自爾已來莫敢南顧自馮氏數終餘燼奔竄醜類漸盛遂見陵逼構怨連禍}
  - {type: page-break, offset: 7803, content: '', id: KR2a0020_WYG_100-7a, image: WYG0262/WYG0262-0452a.png}
  - {type: variant, offset: 7803, length: 0, content: '', krp: 延興二年其王餘慶始遣使上表曰臣建國東極豺狼隔路雖世承靈化莫由奉藩瞻望雲闕馳情罔極凉風微應伏惟皇帝陛下協和天休不勝係仰之情謹遣私署冠軍将軍駙馬都尉弗斯侯長史餘禮龍􅋮将軍帶方太守司馬張茂等投舫波阻搜徑𤣥津託命自然之運遣進萬一之誠冀神祗垂感皇靈洪覆克達天庭宣暢臣志雖旦聞夕没永無餘恨又云臣與髙句麗源出夫餘先世之時篤崇舊欵其祖釗輕廢隣好親率士衆陵踐臣境臣祖湏整旅電邁應機馳擊矢石暫交梟斬釗首自爾已來莫敢南顧自馮氏數終餘燼奔竄醜類漸盛遂見陵逼構怨連禍}
  - {type: variant, offset: 7804, length: 0, content: '', WYG: 十餘載財殚力竭轉自孱踧若天慈曲矜逺及無外速遣一将來救臣國當奉送鄙女執埽後宫并遣子弟牧圉外廐尺壌匹夫不敢自有又云今璉有罪國自魚肉大臣彊族戮殺無已罪盈惡積民庶崩離是㓕亡之期假手之秋也且馮族士馬有鳥畜之戀樂浪諸郡懐首丘之心天威一舉有征無戰臣雖不敏志效畢力當率所綂承風響應且髙麗不義逆詐非一外慕隗囂藩卑之辭内懐兇禍豕突之行或南通劉氏或北約蠕蠕共相脣齒謀陵王略昔唐堯至聖致罰丹水孟嘗稱仁不捨塗詈涓流之水宜早壅塞今若不取将貽後悔去庚辰年後臣西界小石山北國海中見屍十餘并得衣噐鞍勒視之非髙麗之物後聞乃是王人來降臣國長蛇隔路以沉於海雖未委當深懐僨恚昔宋戮申舟楚荘徒跣鷂撮放鳩信陵不食充敵建名美隆無已夫以區區偏鄙猶慕萬代之信况陛下合氣天地勢傾山海豈令小豎跨塞天逵今上所得鞍一以為實騐顕祖以其僻逺冒險朝獻禮遇優厚遣使者邵安與其使俱還詔曰得表聞之無恙甚喜卿在東隅處五服之外不逺山海歸誠魏闕欣嘉至意用戢于懐朕承萬世之業君臨四海綂御羣生今宇内清一八表歸義襁負而至者不可稱數風俗之和士馬之盛皆餘禮等親所聞見卿與髙麗不穆屢致陵犯茍能順義守之以仁亦何憂於冦讎也前所遣使浮海以撫荒外之國從來積年往而不返存亡達否未能審悉卿所送鞍比校舊乗非中國之物不可以疑似之事以生必然之過經略權要已具别㫖又詔曰知髙麗阻疆侵軼卿土修先君之舊怨棄息民之大徳兵交累載難結荒邉使兼申胥之誠國有楚越之急乃應展義扶微乗機電舉但以髙麗稱藩先朝供職日久於彼雖有自昔之釁於國未有犯令之愆卿使命始通便求致伐尋討事會理亦未周故往年遣禮等至平壌欲騐其由状然髙麗奏請頻煩辭理俱詣行人不能抑其請}
