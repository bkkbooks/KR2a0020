  - {type: variant, offset: 6203, length: 1295, content: 持節授之騰幼充宮役手不解書裁知署名而已姦謀有餘善射人意靈太后臨朝特蒙進寵多所干託內外碎密栖栖不倦洛北永橋太上公太上君及城東三寺皆主修營吏部嘗望騰意奏其弟為郡帶戍人資乖越清河王懌抑而不與騰以為恨遂與領軍元叉害懌廢靈太后於宣光殿宮門晝夜長閉內外斷絕騰自執管鑰肅宗亦不得見裁聽傳食而已太后服膳俱廢不免飢寒又使中常侍賈粲假言侍肅宗書密令防察叉以騰為司空公表𩹉擅權共相樹置叉為外禦騰為內防迭直禁闥共裁刑賞騰遂與崔光同受詔乘步挽出入殿門四年之中生殺之威決於叉騰之手八坐九卿旦造騰宅參其顏色然後方赴省府亦有歷日不能見者公私屬請唯在財貨舟車之利水陸無遺山澤之饒所在固護剝削六鎮交通互市歲入利息以巨萬計又頗役嬪御時有徵求婦女器物公然受納逼奪隣居廣開室宇天下咸患苦之正光四年三月薨于位年六十賵帛七百匹錢四十萬蠟二百斤鴻臚少卿護喪事中官為義息衰絰者四十餘人騰之初治宅也奉車都尉周特為之筮不吉深諫止之騰怒而不用特告人曰必困於三月四月之交至是果死廳事甫成陳屍其下追贈使持節驃騎大將軍太尉公冀州刺史騰之葬日閹官為義服杖絰衰縞者以百數朝貴皆從軒蓋填塞相屬郊野魏初以來權閹存亡之盛莫及焉靈太后反政追奪爵位發其冢散露骸骨沒入財產後騰所養一子叛入蕭衍太后大怒因徙騰餘養於北裔尋遣密使追殺之於汲郡賈粲字季宣酒泉人也太和中坐事腐刑頗涉書記世宗末漸被知識得充內侍自崇訓丞為長兼中給事中中嘗藥典御轉長兼中常侍遷光祿少卿光祿大夫靈太后之廢粲與元叉劉騰等伺帝動靜右衞奚康生之謀殺叉也靈太后肅宗同升於宣光殿左右侍臣俱立西階下康生既被囚執粲紿太后曰侍官懷恐不安陛下宜親安慰太后信之適下殿粲便扶肅宗於東序前御顯陽還閉太后於宣光殿粲既叉黨威福亦震於京邑自云本出武威魏太尉文和之後遂移家屬焉時武威太守韋景承粲意以其兄緒為功曹緒時年向七十未幾又以緒為西平太守比景代下已轉武威太守靈太后反政欲誅粲以叉騰黨與不一恐驚動內外乃止出粲為濟州刺史未幾遣武衞將軍刁宣馳驛殺之資財沒於縣官楊範字法僧長樂廣宗人也高宗時坐宗人劫賊被誅範宮刑為王琚所養恩若父子往來出入其家範為中謁者轉黃門中謁者僕射中給事中射聲校尉加寧遠將軍為中尹世宗崩高陽王雍總政出為白水太守加龍驤將軍靈太后臨朝徵為常侍崇訓太僕卿領中嘗藥典御賜爵華陰子為平西將軍華州刺史中官內侍貴者靈太后皆許其方岳以範年長拜跪為難所司非要故得早遂其請父子納貨勞役兵民為御史所糾子遂逃竄範事得散赴京師遂廢於家後靈太后念範勤舊乃以範為中侍中安南將軍尋進鎮南將軍崇訓太僕華州大中正卒贈征西將軍秦州刺史成軌字洪義上谷居庸人少以罪刑入事宮掖以謹厚稱除中謁者僕射高祖意有所欲軌瞻候容色時有奏發輒合帝心從駕南征專進御食于時高祖不豫常居禁中晝夜無懈車駕還賜帛百匹景明中嘗食典御丞僕射如故轉中給事中步兵校尉敕侍東宮延昌末遷中常侍中嘗食典御光祿大夫賜始平伯統京染都將轉崇訓太僕少卿遭母憂詔遣主書常顯景弔慰又起為本官進安東將軍崇訓衞尉卿久之超遷中侍中撫軍將軍典御崇訓如故尋除中軍將軍燕州大中正孝昌二年以勤舊封始平縣開國伯食邑三百戶肅宗所幸潘嬪以軌為假父頗為中官之所敬憚建義初軌迎於河陰詔令安慰宮內進爵為侯增戶三百并前六百戶遷衞將軍其年八月卒, WYG: 䇿}
