  - {type: variant, offset: 2543, length: 642, content: 人父瓚姚泓安定護軍為赫連屈丐所侵人懷危懼亡奔者相屬瓚獨率衆拒守見殺小沒入宮刑會魏平統萬遂徙平城內侍東宮以聰識有智略稱未幾轉西臺中散每從征伐屢有戰功多獲賞賜世祖幸瓜步慮有北寇之虞乃加小左衞將軍賜爵泥陽子除留臺將軍車駕還都遷給事中綰太僕曹乃請父瓚贈諡求更改葬詔贈振威將軍秦州刺史石安縣子諡曰戴轉小領駕部課理有方畜牧蕃息出為冠軍將軍并州刺史進爵中都侯州內四郡百餘人詣闕頌其政化後遷冀州刺史聲稱微少於前然所在清約當時牧伯無能及也性頗忍酷所養子息驅馳鞭撻視如仇讎小之為并州以郭祚為主簿重祚門才兼任之以書記時人多之張宗之字益宗河南鞏人家世寒微父孟舒劉裕西征假洛陽令及宗之貴幸高宗贈孟舒平南將軍洛州刺史鞏縣侯諡曰貞初緱氏宗文邕聚黨於伊闕謀反逼脅孟舒等文邕敗孟舒走免宗之被執入京充腐刑以忠厚謹慎擢為侍御中散賜爵鞏縣侯遂歷右將軍中常侍儀曹庫部二曹尚書領中祕書進爵彭城公出為散騎常侍寧西將軍東雍州刺史以在官有稱入為內都大官出除散騎常侍鎮東將軍冀州刺史又例降為侯太和二十年卒年六十九贈建節將軍懷州刺史諡曰敬宗之兄鸞旗中書侍郎東宮中庶子兼宿衞給事加寧遠將軍賜爵洛陽男轉殿中給事出為散騎常侍冠軍將軍涇州刺史進爵為侯復為殿中給事中常侍卒贈洛州刺史諡曰靖始宗之納南來殷孝祖妻蕭氏劉義隆儀同三司思話弟思度女也多悉婦人儀飾故事太和中初制六宮服章蕭被命在內預見訪採數蒙賜賚蕭兄子超業後名彥幼隨姑入國娶李洪之女賴其給贍以自濟歷位太尉長史武衞將軍齊州刺史散騎常侍中軍將軍金紫光祿大夫彥時來往蕭寶夤致敬稱名呼之為尊彥於河陰遇害, WYG: 上䇿}
