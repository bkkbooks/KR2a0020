  - {type: variant, offset: 4086, length: 2115, content: 高祖執手謂之曰老人歸途幾日可達好慎行路太和十二年遷都曹加侍中祭酒尚書領中曹侍御後降爵為侯睹生卒贈秦州刺史諡曰靖賜黃金八十斤繒綵及絹八百匹以供喪用并別使勞慰加嶷大長秋卿嶷老疾請乞外祿乃以為鎮西將軍涇州刺史特加右光祿大夫將之州高祖餞於西郊樂陽殿以御白羽扇賜之十九年被詔赴洛以刺史從駕南征常參侍左右以嶷耆舊每見勞問數追稱嶷之正直命乘馬出入行禁之間與司徒馮誕同例軍回還州自以故老前宦為政多守往法不能遵用新制侮慢舊族簡於接禮天性酷薄雖弟姪甥壻略無存潤後數年卒於州先以從弟老壽為後又養太師馮熙子次興嶷死後二人爭立嶷妻張氏致訟經年得以熙子為後老壽亦仍陳訴終獲紹爵次興還於本族給奴婢三十口嶷前後賜賞奴婢牛馬蓋數百千他物稱是老壽凡薄酒色肆情御史中尉王顯奏言風聞前洛州刺史陰平子石榮積射將軍抱老壽恣蕩非軌易室而姦臊聲布於朝野醜音被於行路即攝鞫問皆與風聞無差犯禮傷化老壽等即主謹案石榮籍貫兵伍地隔宦流處世無入朝之期在生絕冠冕之望遭時之運逢非次之擢以犬馬延慈簪履恩念自微至貴位階方岳不能懷恩感德上酬天施迺咎彰遐邇嚮穢京墟老壽種類無聞氏姓莫紀丐乞刑餘之家覆養閹人之室蒙國殊澤預班爵序正宜治家假內疑教誡閨庭方恣其淫姦換妻易妾榮前在洛州遠迎老壽妻常氏兵人千里疲於道路老壽同敝笱之在梁若其原疑之無別男女三人莫知誰子人理所未聞鳥獸之不若請以見事免官付廷尉理罪鴻臚削爵詔可老壽妻常氏萬敵弟女也老壽死後收紀家業稍復其舊奴婢尚六七百人三女並嬪貴室為老壽祖父皆造碑銘自洛就鄉而建之西方云直谷出二貴人石榮者從主書稍進為州自被劾後遂便廢頓子長宣武定中南兗州刺史與侯景反伏法王遇字慶時本名他惡馮翊李潤鎮羌也與雷党不蒙俱為羌中強族自云其先姓王後改氏鉗耳世宗時復改為王焉自晉世已來為渠長父守貴為郡功曹卒遇既貴追贈安西將軍秦州刺史澄城公遇坐事腐刑為中散遷內行令中曹給事中加員外散騎常侍右將軍賜爵富平子遷散騎常侍安西將軍進爵宕昌公拜尚書轉吏部尚書仍常侍例降為侯出為安西將軍華州刺史加散騎常侍幽后之前廢也遇頗言其過及後進幸高祖對李沖等申后無咎而稱遇謗議之罪沖言果爾遇合死也高祖曰遇舊人未忍盡之當止黜廢耳遂遣御史馳驛免遇官奪其爵收衣冠以民還私第世宗初兼將作大匠未幾拜光祿大夫復奪爵廢后馮氏之為尼也公私罕相供恤遇自以常更奉接往來祗謁不替舊敬衣食雜物每有薦奉后皆受而不讓又至其館遇夫妻迎送謁伏侍立執臣妾之禮遇性巧強於部分北都方山靈泉道俗居宇及文明太后陵廟洛京東郊馬射壇殿修廣文昭太后墓園太極殿及東西兩堂內外諸門制度皆遇監作雖年在耆老朝夕不倦跨鞍驅馳與少壯者均其勞逸又長於人事留意酒食之間每逢僚舊具設餚果觴膳精豐然競於榮利趨求勢門趙脩之寵也遇往還宗承受敕為之監作第宅增於本旨笞擊作人莫不嗟怒卒于官初遇之疾也太傅北海王與太妃俱往臨問視其危惙為之泣下其善奉諸貴致相悲悼如此贈使持節鎮西將軍雍州刺史侯如故始遇與抱嶷並為文明太后所寵前後賜以奴婢數百人馬牛羊他物稱是二人俱號富室遇養弟子厲本郡太守稍遷至右軍將軍襲爵宕昌侯產業有過于遇時苻承祖略陽氐人也因事為閹人為文明太后所寵自御竹罒戊令遷中部給事中散騎常侍輔國將軍賜爵略陽侯兼典選部事中部如故轉吏部尚書仍領中部高祖為造甲第數臨幸之進爵略陽公安南將軍加侍中知都曹事初太后以承祖居腹心之任許以不死之詔後承祖坐贓應死高祖原之削職禁錮在家授悖義將軍佞濁子月餘遂死王質字紹奴高陽易人也其家坐事幼下蠶室頗解書學為中曹吏內典監稍遷祕書中散加寧朔將軍賜爵永昌子領監御遷為侍御給事又領選部監御二曹事復特加前將軍進爵魏昌侯轉選部尚書加員外散騎常侍出為鎮遠將軍瀛州刺史質在州十年風化粗行察姦糾慝究其情狀民庶畏服之而刑政刻峻多所笞戮號為威酷高祖頗念其忠勤宿舊每行留大故馮司徒亡廢馮后陸叡穆泰等事皆賜質以璽書手筆莫不委至同之戚貴質皆寶掌以為榮入為大長秋卿未幾而卒李堅字次壽高陽易人也高宗初因事為閹人文明太后臨朝稍遷至中給事中賜爵魏昌伯小心謹慎常在左右雖不及王遇王質等而亦見任用高祖遷洛轉被委授為太僕卿檢課牧產多有滋息世宗初出為安東將軍瀛州刺史本州之榮同於王質所在受納家產巨萬值京兆王愉反於冀州堅勒衆征愉為愉所破代還遇風疾拜光祿大夫數年卒贈撫軍將軍相州刺史賵帛五百匹以弟子曇景為後襲爵魏昌伯為羽林監直後秦松不知其所由太和末為中尹遷長秋卿賜爵高都子有罪免世宗復其爵起為光祿大夫領中常侍遷平北將軍領長秋卿出為散騎常侍安北將軍并州刺史卒贈大將軍肆州刺史諡曰定白整者亦因事腐刑少掌宮掖碎職以恭敏著稱稍遷至中常侍太和末為長秋卿賜爵雲陽男世宗封其妻王氏為縣君卒贈平北將軍并州刺史劉騰字青龍本平原城民徙屬南兗州之譙郡幼時坐事受刑補小黃門轉中黃門高祖之在懸瓠騰使詣行所高祖問其中事騰具言幽后私隱與陳留公主所告符協由是進冗從僕射仍中黃門後與茹皓使徐兗采召民女及還遷中給事稍遷中尹中常侍特加龍驤將軍後為大長秋卿金紫光祿大夫太府卿肅宗踐極之始以騰預在宮衞封開國子食邑三百戶是年靈太后臨朝以與于忠保護之勳除崇訓太僕加中侍中改封長樂縣開國公食邑一千五百戶拜其妻時為鉅鹿郡君每引入內受賞賚亞於諸主外戚所養二子為郡守尚書郎騰曾疾篤靈太后慮或不救遷衞將軍儀同三司餘官仍舊後疾瘳騰之拜命肅宗當為臨軒會其日大風寒甚而罷乃, WYG: ''}
