  - {type: line-break, offset: 2036, content: '', id: ZHSJ__dup24693}
  - {type: variant, offset: 2040, length: 469, content: 徐州北部主書郎公孫處顯為荊州選部監公孫蘧為幽州皆曰有能也實有私焉黑疾其虧亂選體遂爭於殿庭曰以功授官因爵與祿國之常典中書侍郎尚書主書郎諸曹監勳能俱立不過列郡今訢皆用為方州臣實為惑顯祖疑之曰公孫蘧且止蘧最為訢厚於是黑與訢遂為深隙訢竟列黑為監藏時多所截沒先是法禁寬緩百司所典與官並食故多所損折遂黜為門士黑自以為訢所陷歎恨終日廢寢忘食規報前怨踰年還入為侍御散騎常侍侍中尚書左僕射復兼選部如昔黑告訢專恣訢遂出為徐州及其將獲罪也黑構成以誅之然後食甘寢安志在於職事出為假節鎮南大將軍儀同三司定州刺史進爵為王克己清儉憂濟公私時有人欲行私賂黑曰高官祿厚足以自給賣公營私本非情願終無所納高祖文明太后幸中山聞之賜帛五百匹穀一千五百石轉冀州刺史太和六年秋薨於官詔賜絹四百五十匹穀一千斛車牛二十乘致柩至都追贈司空公諡曰康黑養族弟趙奴第四子熾為後熾字貴樂初為中散襲黑爵後降為公官至揚州安南府長史加平遠將軍元嵩之死壽春也熾處分安輯微有聲稱神龜中卒贈光州刺史黑為定州與熾納鉅鹿魏幹女有二子長子揆字景則襲父侯爵官至樂陵太守卒贈左將軍滄州刺史揆弟儁之字仲彥輕薄無行為給事中轉, WYG: 郊遣}
