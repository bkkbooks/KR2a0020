  - {type: variant, offset: 3224, length: 260, content: 散稍遷員外郎京兆王大農久之除義陽太守為司空劉騰諮議參軍散騎常侍平東將軍光祿大夫太昌初卒年七十七贈驃騎大將軍儀同三司冀州刺史子顥邵郡太守卒贈荊州刺史顥弟璟中散大夫璟弟瑋武定中豫州征西府長史諸中官皆世衰唯趙黑及宗之後家僮數百通於士流劇鵬高陽人粗覽經史閑曉吏事與王質等俱充宦官性通率不以閽閹為文明太后時亦見眷遇為給事中高祖遷洛常為宮官事幽后后之惑薩菩薩也鵬密諫止之不從遂發憤而卒兄買奴亦為宦者歷位幽州刺史才志遠不及鵬是時有李豐之徒數人皆被眷寵出入禁闈並致名位積貲巨萬第宅華壯文明太后崩後乃漸衰矣張祐字安福安定石唐人父成扶風太守, WYG: ''}
