  - {type: variant, offset: 9167, length: 1, content: 闕, WYG: 夷狄之於中國羈縻而已髙麗歳修貢職東藩之冠榮哀之禮致自天朝亦為優矣其他碌碌咸知欵貢豈牛馬内向東風入律者也魏書卷一百魏書卷一百考證厙莫奚𫝊二十二年入冦安州冦監本誤作塞今改正又二十二年北史作二十年烏洛侯𫝊無大君長部落莫弗皆世為之臣人龍按北史室韋國𫝊云南室韋分為二十五部毎部有餘莫弗瞞咄猶酋長也北室韋分為九部落其部落渠帥號乞引莫賀咄毎部有莫何弗三人以貳之則此云莫弗亦酋長名也魏書卷一百考證}
