  - {type: variant, offset: 7807, length: 7, content: 刺史養子冏哲襲, WYG: 大亂吾先平之然後張其威懐則無所不服矣既而車駕南還雲中懐服燕趙十數年間諸種與庫莫奚亦皆滋盛乃開遼海置戍和龍諸夷震懼各獻方物髙宗顯祖世厙莫奚歳致名馬文皮髙祖初遣使朝貢太和四年輙入塞内辭以畏地豆干鈔掠詔書切責之二十二年入冦安州營燕幽三州兵數千人擊走之後復欵附毎求入塞與交易詔曰厙莫奚去太和二十一年以前與安營二州邉民参居交易往來並無疑貳至二十二年叛逆以來遂爾逺竄今雖欵附猶在塞表毎請入塞與民交易若抑而不許乖其歸向之心聽而不虞或有萬一之警不容依先任其交易事宜限節交市之日州遣上佐監之自是已後歳常朝獻至於武定末不絶契丹國在厙莫奚東異種同類俱竄於松漠之間登國中國軍大破之遂逃迸與厙莫奚分背經數十年稍滋蔓有部落於和龍之北數百里多為冦盗真君以來求朝獻歳貢名馬􅂋祖時使莫弗紇何辰奉獻得班饗於諸國之末歸而相謂言國家之美心皆忻慕於是東北羣狄聞之莫不思服悉萬丹部何大何部伏弗郁部羽陵部日連部匹絜部黎部吐六于部等各以其名馬文皮入獻天府遂求為常皆得交市於和龍宻雲之間貢獻不絶太和三年髙句麗竊與蠕蠕謀欲取地豆干以分之契丹懼其侵軼其莫弗賀勿干率其部落車三千乘衆萬餘口驅徒雜畜求入内附止於白狼水東自此歳常朝貢後告饑髙祖矜之聽其入闗市糴及世宗肅宗時恒遣使貢方物熈平中契丹使人祖真等三十人還靈太后以其俗嫁娶之際以青氊為上服人給青氊两匹賞其誠欵之心餘依舊式朝貢至}
