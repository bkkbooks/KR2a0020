  - {type: variant, offset: 8351, length: 340, content: 除中謁者僕射遷奉車都尉肅宗初冀州大乘賊起詔津慰勞津世不居桑梓故不為州鄉所歸靈太后令津侍肅宗書遷常山太守孝昌初除中侍中加征虜將軍仍除崇訓太僕領宮室都將冀州大中正超拜金紫光祿大夫二年封東光縣開國子食邑二百戶鎮南將軍兼中關右慰勞大傳出為散騎常侍征東將軍濟州刺史永安初中侍中衞將軍尋轉大長秋左光祿大夫太昌初驃騎大將軍儀同三司津少長宮闈給事左右善候時情號為機悟天平初除開府儀同三司本將軍懷州刺史元象初復為中侍中大長秋卿仍開府儀同夏薨年六十二贈都督冀瀛幽安四州諸軍事本將軍司徒公冀州刺史諡曰孝惠養兄子長業襲爵齊受禪例降津兄憑字元寄當時逃竄後會赦免太和中奉朝請冀州趙郡王幹田曹參軍定州彭城王勰水曹參軍給事中越騎校尉以討大乘功除左中郎將遷龍驤將軍中散大夫孝昌中歷農武邑二郡太守尋除征虜將軍光州刺史, WYG: 壁而}
