  - {type: variant, offset: 2191, length: 655, content: 符彧軍令速赴擊賊聞之果自走散在軍上疏曰凡人所以臨堅陳而忘身觸白刃而不憚者一則求榮名二則貪重賞三則畏刑罰四則避禍難非此數事雖聖王不能勸其臣慈父不能厲其子明主深知其情故賞必行罰必信使親疏貴賤勇怯賢愚聞鍾鼓之聲見旌旗之列莫不奮激競赴敵場豈厭久生而樂早死也利害懸於前欲罷不能耳自秦隴逆節將歷數年蠻左亂常稍已多載凡在戎役數十萬人三方師衆敗多勝少跡其所由不明賞罰故也陛下欲天下之早平愍征夫之勤悴乃降明詔賞不移時然兵將之勳歷稔不決亡軍之卒晏然在家致令節士無所勸慕庸人無所畏懾進而擊賊死交而賞賒退而逃散身全而無罪此其所以望敵奔沮不肯進力者矣若重發明詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯須廢也賞罰陛下之所易尚不能全而行之攻敵士之所難欲其必死寧可得也臣既庸弱忝當戎使職司所見輒敢上聞惟陛下審其可否會右丞闕肅宗詔僕射城陽王徽舉人徽遙舉雄仍除輔國將軍尚書右丞尋轉吏部郎中遷平東將軍光祿大夫郎中如故上疏曰帝王之道莫尚於安民安民之本莫加於禮律禮律既設擇賢而行之天下雍熙無非任賢之功也故虞舜之盛穆穆標美文王受命濟濟以康高祖孝文皇帝天縱大聖開復典謨選三代之異禮採二漢之典法端拱而四方安刑措而兆民治世宗重光繼軌每念聿修官人有道萬里清謐陛下劬勞日昃躬親庶政求瘼恤民無時暫憩而黔首紛然兵車不息以臣愚見可得而言自神龜末來專以停年為選士無善惡歲久先職無劇易名到授官執按之吏以差次日月為功能銓衡之人以簡用老舊為平直且庸劣之人莫不貪鄙委斗筲以共治之重託碩鼠以百里之命皆貨賄是求肆心縱意禁制雖煩不勝其欲致令徭役不均發調違謬箕斂盈門, WYG: 被}
