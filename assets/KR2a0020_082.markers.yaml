  - {type: variant, offset: 5457, length: 4639, content: 諮議參軍通直常侍永熙中襄城太守天平初洛州以南人情駭懼敕為大使持節慰諭廣洛二州三年除征東將軍行陽平郡事郡民路黑奴起逆攻郡為黑奴所執諸賊勸殺之黑奴曰成敗未可知何為先殺太守也乃將珍之自隨待遇以禮右衞將軍郭瓊討平黑奴乃得免興和中為衞將軍司徒司馬武定三年除驃騎將軍北海太守還為儀同開府長史兼光祿少卿未幾詔珍之持節為廣洛北荊揚雍襄六州慰勞大使北荊鎮城行廣州事招納有稱齊文襄王遣書慰勉賜以衣帛尋敕行平州卒於官贈驃騎大將軍洛州刺史諡曰恭子懿武定末開府鎧曹參軍羊深字文淵太山平陽人梁州刺史祉第二子也早有風尚學涉經史好文章兼長几案少與隴西李神儁同志相友自司空府記室參軍轉輕車將軍尚書騎兵郎尋轉駕部加右軍將軍于時沙汰郎官務精才實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之肅宗行釋奠之禮講孝經儕輩之中獨蒙引聽時論美之正光末北地人車金雀等帥羌胡反叛高平賊宿勤明達寇豳夏諸州北海王顥為都督行臺討之以深為持節通直散騎常侍行臺左丞軍司仍領郎中顥敗還京頃之遷尚書左丞加平東將軍光祿大夫蕭寶夤反攻圍華州正平薛鳳賢等聚衆作逆敕深兼給事黃門侍郎與大行臺僕射長孫稚共會潼關規模進止事平以功賜爵新泰男靈太后曾幸邙山集僧尼齋會公卿盡在座會事將終太后引見深欣然勞問之深謝曰臣蒙國厚恩世荷榮遇寇難未平是臣憂責而隆私忽被犬馬知歸太后顧謂左右曰羊深真忠臣也舉坐傾心孝昌末徐方多事以深為東道慰勞使即為二徐行臺莊帝踐祚除安東將軍太府卿又為二兗行臺深處分軍國損益隨機亦有時譽初尒朱榮殺害朝士深第七弟侃為太山太守性粗武遂率鄉人外託蕭衍深在彭城忽得侃書招深同逆深慨然流涕斬侃使人并書表聞莊帝乃下詔曰羊侃作逆霧起瑕丘擁集不逞扇擾疆埸傾宗之禍侃乃自貽累世之節一朝毀汙羊深血誠奉國秉操罔貳聞弟猖勃自劾請罪此之丹款實戢于懷且叔向復位春秋稱美深之慷慨氣同古人忠烈遠彰赤心已著可令還朝面受委敕乃歸京師除名久之除撫軍將軍金紫光祿大夫元顥入洛以深兼黃門郎顥平免官後拜大鴻臚卿普泰初遷散騎常侍衞將軍右光祿大夫監起居注自天下多事東西二省官員委積前廢帝敕深與常侍盧道虔元晏元法壽選人補定自奉朝請以上各有沙汰尋兼侍中廢帝甚親待之是時膠序廢替名教陵遲深乃上疏曰臣聞崇禮建學列代之所修尊經重道百王所不易是以均塾洞啟昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乘乾統物欽若奉時模唐軌虞率由前訓重以高祖繼聖垂衣儒風載蔚得才之盛如彼薪楢固以追隆周而並驅駕炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自茲已降世極道消風猷稍遠澆薄方競退讓寂寥馳競靡節進必吏能升非學藝是使刀筆小用計日而期榮專經大才甘心於陋巷然治之為本所貴得賢苟值其人豈拘常檢三代兩漢異世間出或釋褐中林鬱登卿尹或投竿釣渚徑升公相事炳丹青義在往策彼哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠時盛德見徵不過四門登庸不越九品以此取士求之濟治譬猶却行以及前之燕而向楚積習之不可者其所由來漸矣昔魯興泮宮頌聲爰發鄭廢學校國風以譏將以納民軌物莫始於經禮菁莪育才義光於篇什自兵亂以來垂將十載干戈日陳俎豆斯闕四海荒涼民物凋弊名教頓虧風流殆盡世之陵夷可為歎息陛下中興纂曆理運惟新方隅稍康實惟文德但禮賢崇讓之科沿世未備還淳反樸之化起言斯繆夫先黃老而退六經史遷終其成蠹貴玄虛而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼確論造次必儒臣愚以為宜重修國學廣延胄子使函丈之教日聞釋奠之禮不闕并詔天下郡國興立儒教考課之程咸依舊典苟經明行修宜擢以不次抑斗筲喋喋之才進大雅汪汪之德博收鴻生以光顧問縶維奇異共精得失使區寰之內競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠闇短敢慕前訓用稽古義上塵聽覽伏願陛下垂就日之監齊非煙之化儻以臣言可採乞特施行廢帝善之出帝初拜中書令頃之轉車騎大將軍左光祿大夫永熙三年六月以深兼御史中尉東道軍司及出帝入關深與樊子鵠等同逆於兗州子鵠署深為齊州刺史於太山博縣商王村結壘招引山齊之民天平二年正月大軍討破之於陳斬深子肅武定末儀同開府東閤祭酒楊機字顯略天水冀人祖伏恩郡功曹赫連屈丐時將家奔洛陽因以家焉機少有志節為士流所稱河南尹李平元暉並召署功曹暉尤委以郡事或謂暉曰弗躬弗親庶人弗信何得委事於機高臥而已暉曰吾聞君子勞於求士逸於任賢故前代有坐嘯之人主諾之守吾既委得其才何為不可由是聲名更著解褐奉朝請於時皇子國官多非其人詔選清直之士機見舉為京兆王愉國中尉愉甚敬憚之遷給事中伏波將軍廷尉評延昌中行河陰縣事機當官正色不避權勢明達政事斷獄以情甚有聲譽平東將軍荊州刺史楊大眼啟為其府長史熙平中為涇州平西府長史尋授河陰令轉洛陽令京輦伏其威風希有干犯凡訴訟者一經其前後皆識其名姓并記事理世咸異之遷鎮軍將軍司州治中轉別駕荊州蠻叛兼尚書左丞南道行臺討之還除中散大夫復為別駕州牧高陽王雍事多委機出除清河內史轉左將軍河北太守並有能名建義初拜平南將軍光祿大夫兼廷尉卿又除安南將軍司州別駕未幾行河南尹轉廷尉卿徙衞尉卿出除安西將軍華州刺史永熙中衞將軍右光祿大夫尋除度支尚書機方直之心久而彌厲奉公正己為時所稱家貧無馬多乘小犢車時論許其清白與辛雄等並誅年五十九子毗羅解褐開府參軍事卒於鎮遠將軍機兄順字元信梁郡太守順子僧靜武定中太中大夫機兄子虬少有公幹頻為司州記室戶曹從事早卒高崇字積善勃海蓨人四世祖撫晉永嘉中與兄顧避難奔於高麗父潛顯祖初歸國賜爵開陽男居遼東詔以沮渠牧犍女賜潛為妻封武威公主拜駙馬都尉加寧遠將軍卒崇少聰敏以端謹見稱徵為中散稍遷尚書三公郎家資富厚僮僕千餘而崇志尚儉素車馬器服充事而已自修潔與物無競初崇舅氏坐事誅公主痛本生絕胤遂以崇繼牧犍後改姓沮渠景明中啟復本姓襲爵遷領軍長史伏波將軍洛陽令為政清斷吏民畏其威風每有發摘不避強禦縣內肅然朝廷方有遷授會病卒年三十七贈漁陽太守永安二年復贈征虜將軍滄州刺史諡曰成初崇謂友人曰仲尼四科德行為首人能立身約己不忘典訓斯亦足矣故吾諸子闕子謙之字道讓少事後母李以孝聞李亦撫育過於己生人莫能辨其兄弟所出同異論者兩重之及長屏絕人事專意經史天文算曆圖緯之書多所該涉日誦數千言好文章留意老易襲爵釋褐奉朝請加宣威將軍轉奉車都尉廷尉丞正光中尚書左丞元孚慰勞蠕蠕反被拘留及蠕蠕大掠而還置孚歸國事下廷尉卿及監以下謂孚無坐惟謙之以孚辱命以流罪尚書同卿執詔可謙之奏孝昌初行河陰縣令先是有人囊盛瓦礫指作錢物詐市人馬因逃去詔令追捕必得以聞謙之乃偽枷一囚立於馬市宣言是前詐市馬賊今欲刑之密遣腹心察市中私議者有二人相見忻然曰無復憂矣執送按問具伏盜馬徒黨悉獲并出前後盜竊之處資貨甚多遠年失物之家各來得其本物具以狀奏尋詔除寧遠將軍正河陰令在縣二年損益治體多為故事弟道穆為御史在公亦有能名世美其父子兄弟並著當官之稱舊制二縣令得面陳得失時佞幸之輩惡其有所發聞遂共奏罷謙之乃上疏曰臣以無庸謬宰神邑實思奉法不撓稱是官方酬朝廷無貲之恩盡人臣守器之節但豪家支屬戚里親媾縲紲所及舉目多是皆有盜憎之色咸起怨上之心縣令輕弱何能克濟先帝昔發明詔得使面陳所懷臣亡父先臣崇之為洛陽令常得入奏是非所以朝貴斂手無敢干政近日以來此制遂寢致使神宰威輕下情不達今二聖遠遵堯舜憲章高祖愚臣望策其駑蹇少立功名乞新舊典更明往制庶姦豪知禁頗自屏心詔曰此啟深會朕意付外量聞謙之又上疏曰臣聞夏德中微少康成克復之主周道將廢宣王立中興之功則知國無常安世無弊唯在明主所以變之有方化之有道耳自正光已來邊城屢擾命將出師相繼於路軍費戎資委輸不絕至如弓格賞募咸有出身槊刺斬首又蒙階級故四方壯士願征者多各各為己公私兩利若使軍帥必得其人賞勳不失其實則何賊不平何征不捷也諸守帥或非其才多遣親者妄稱入募別倩他人引弓格虛受征官身不赴陳惟遣奴客充數而已對寇臨敵曾不彎弓則是王爵虛加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曹擅作威福如有清貞奉法不為回者咸共譖毀橫受罪罰在朝顧望誰肯申聞蔽上擁下虧風壞政使讒諂甘心忠讜息義況且頻年以來多有徵發民不堪命動致流離苟保妻子競逃王役不復顧其桑井憚比刑書正由還有必困之理歸無自安之路若聽歸其本業徭役微甄則還者必衆墾田增闢數年之後大獲課民今不務以理還之但欲嚴符切勒恐數年之後走者更多安業無幾故有國有家者不患民不我歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一致且琴瑟不韻知音改弦更張騑驂未調善御執轡成組諺云迷而知反得道不遠此言雖小可以諭大陛下一日萬機事難周覽元凱結舌莫肯明言臣雖庸短世受榮祿竊慕前賢匪躬之義不避斧鉞之誅以希一言之益伏願少垂覽察略加推採使朝章重舉軍威更振海內起惟新之歌天下見復禹之績則臣奏之後笑入下泉靈太后得其疏以責左右近侍諸寵要者由是疾之乃啟太后云謙之有學藝宜在國學以訓胄子詔從之除國子博士謙之與袁翻常景酈道元溫子昇之徒咸申款舊好於贍恤言諾無虧居家僮隸對其兒不撻其父母生三子便免其一世無髠黥奴婢常稱俱禀人體如何殘害以父舅氏沮渠蒙遜曾據涼土國書漏闕謙之乃修涼書十卷行於世涼國盛事佛道為論貶之因稱佛是九流之一家當世名士競以佛理來難謙之還以佛義對之竟不能屈以時所行歷多未盡善乃更改元修撰為一家之法雖未行於世議者歎其多能於時朝議鑄錢以謙之為鑄錢都將長史乃上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公為周置九府圜法至景王時更鑄大錢秦兼海內錢重半兩漢興以秦錢重改鑄榆莢錢至文帝五年復為四銖孝武時悉復銷壞更鑄三銖至元狩中變為五銖又造赤仄之錢以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不隨時而變竊以食貨之要八政為首聚財之貴詒訓典文是以昔之帝王乘天地之饒御海內之富莫不腐紅粟於太倉藏朽貫於泉府儲畜既盈民無困敝可以寧謐四極如身使臂者矣昔漢之孝武地廣財豐外事四戎遂虛國用於是草萊之臣出財助國興利之計納稅廟堂市列榷酒之官邑有告緡之令鹽鐵既興錢幣屢改少府遂豐上林饒積外闢百蠻內不增賦者皆計利之由也今羣妖未息四郊多壘徵稅既煩千金日費資儲漸耗財用將竭誠楊氏獻說之秋桑兒言利之日夫以西京之盛錢猶屢改並行小大子母相權況今寇難未除州郡淪敗民物凋零軍國用少別鑄小錢可以富益何損於政何妨於人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之於古亦宜效之於今矣昔禹遭大水以歷山之金鑄錢救民之困湯遭大旱以莊山之金鑄錢贖民之賣子者今百姓窮悴甚於曩日欽明之主豈得垂拱而觀之哉臣今此鑄以濟交乏五銖之錢任使並用行之無損國得其益穆公之言於斯驗矣臣雖術愧計然識非心算暫充錢官頗覩其理苟有所益不得不言脫以為疑求下公卿博議如謂為允即乞施行詔將從之事未就會卒初謙之弟道穆正光中為御史糾相州刺史李世哲事大相挫辱其家以為憾至是世哲弟神軌為靈太后深所寵任直謙之家僮訴良神軌左右之入諷尚書判禁謙之於廷尉時將赦神軌乃啟靈太后發詔於獄賜死時年四十二朝士莫不哀之所著文章百餘篇別有集錄永安中贈征虜將軍營州刺史諡曰康又除一子出身以明寃屈謙之妻中山張氏明識婦人也教勸諸子從師受業常誡之曰自我為汝家婦未見汝父一日不讀書汝等宜各修勤勿替先業謙之長子子儒字孝禮元顥入洛其叔道穆從駕北巡子儒後踰河至行宮莊帝見之具訪洛中事意子儒備陳元顥敗在旦夕帝謂道穆曰卿初來日何故不與子儒俱行對曰臣家百口在洛須其經營且欲其今日之來知京師後事帝曰子儒非直合卿本懷亦大慰朕意仍授祕書郎中轉通直郎後除安東將軍光祿大夫司徒中兵參軍兼祭酒襲爵興和初除兼殿中侍御史時四方多有流民子儒為梁州北豫西兗三州檢戶使所獲甚多後以公事去官武定六年卒時年四十一子儒弟緒字叔宗明悟好學謙之常謂人曰興吾門者當是此兒及長涉獵書傳好文詠司空, WYG: ''}
  - {type: variant, offset: 5457, length: 4639, content: 諮議參軍通直常侍永熙中襄城太守天平初洛州以南人情駭懼敕為大使持節慰諭廣洛二州三年除征東將軍行陽平郡事郡民路黑奴起逆攻郡為黑奴所執諸賊勸殺之黑奴曰成敗未可知何為先殺太守也乃將珍之自隨待遇以禮右衞將軍郭瓊討平黑奴乃得免興和中為衞將軍司徒司馬武定三年除驃騎將軍北海太守還為儀同開府長史兼光祿少卿未幾詔珍之持節為廣洛北荊揚雍襄六州慰勞大使北荊鎮城行廣州事招納有稱齊文襄王遣書慰勉賜以衣帛尋敕行平州卒於官贈驃騎大將軍洛州刺史諡曰恭子懿武定末開府鎧曹參軍羊深字文淵太山平陽人梁州刺史祉第二子也早有風尚學涉經史好文章兼長几案少與隴西李神儁同志相友自司空府記室參軍轉輕車將軍尚書騎兵郎尋轉駕部加右軍將軍于時沙汰郎官務精才實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之肅宗行釋奠之禮講孝經儕輩之中獨蒙引聽時論美之正光末北地人車金雀等帥羌胡反叛高平賊宿勤明達寇豳夏諸州北海王顥為都督行臺討之以深為持節通直散騎常侍行臺左丞軍司仍領郎中顥敗還京頃之遷尚書左丞加平東將軍光祿大夫蕭寶夤反攻圍華州正平薛鳳賢等聚衆作逆敕深兼給事黃門侍郎與大行臺僕射長孫稚共會潼關規模進止事平以功賜爵新泰男靈太后曾幸邙山集僧尼齋會公卿盡在座會事將終太后引見深欣然勞問之深謝曰臣蒙國厚恩世荷榮遇寇難未平是臣憂責而隆私忽被犬馬知歸太后顧謂左右曰羊深真忠臣也舉坐傾心孝昌末徐方多事以深為東道慰勞使即為二徐行臺莊帝踐祚除安東將軍太府卿又為二兗行臺深處分軍國損益隨機亦有時譽初尒朱榮殺害朝士深第七弟侃為太山太守性粗武遂率鄉人外託蕭衍深在彭城忽得侃書招深同逆深慨然流涕斬侃使人并書表聞莊帝乃下詔曰羊侃作逆霧起瑕丘擁集不逞扇擾疆埸傾宗之禍侃乃自貽累世之節一朝毀汙羊深血誠奉國秉操罔貳聞弟猖勃自劾請罪此之丹款實戢于懷且叔向復位春秋稱美深之慷慨氣同古人忠烈遠彰赤心已著可令還朝面受委敕乃歸京師除名久之除撫軍將軍金紫光祿大夫元顥入洛以深兼黃門郎顥平免官後拜大鴻臚卿普泰初遷散騎常侍衞將軍右光祿大夫監起居注自天下多事東西二省官員委積前廢帝敕深與常侍盧道虔元晏元法壽選人補定自奉朝請以上各有沙汰尋兼侍中廢帝甚親待之是時膠序廢替名教陵遲深乃上疏曰臣聞崇禮建學列代之所修尊經重道百王所不易是以均塾洞啟昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乘乾統物欽若奉時模唐軌虞率由前訓重以高祖繼聖垂衣儒風載蔚得才之盛如彼薪楢固以追隆周而並驅駕炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自茲已降世極道消風猷稍遠澆薄方競退讓寂寥馳競靡節進必吏能升非學藝是使刀筆小用計日而期榮專經大才甘心於陋巷然治之為本所貴得賢苟值其人豈拘常檢三代兩漢異世間出或釋褐中林鬱登卿尹或投竿釣渚徑升公相事炳丹青義在往策彼哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠時盛德見徵不過四門登庸不越九品以此取士求之濟治譬猶却行以及前之燕而向楚積習之不可者其所由來漸矣昔魯興泮宮頌聲爰發鄭廢學校國風以譏將以納民軌物莫始於經禮菁莪育才義光於篇什自兵亂以來垂將十載干戈日陳俎豆斯闕四海荒涼民物凋弊名教頓虧風流殆盡世之陵夷可為歎息陛下中興纂曆理運惟新方隅稍康實惟文德但禮賢崇讓之科沿世未備還淳反樸之化起言斯繆夫先黃老而退六經史遷終其成蠹貴玄虛而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼確論造次必儒臣愚以為宜重修國學廣延胄子使函丈之教日聞釋奠之禮不闕并詔天下郡國興立儒教考課之程咸依舊典苟經明行修宜擢以不次抑斗筲喋喋之才進大雅汪汪之德博收鴻生以光顧問縶維奇異共精得失使區寰之內競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠闇短敢慕前訓用稽古義上塵聽覽伏願陛下垂就日之監齊非煙之化儻以臣言可採乞特施行廢帝善之出帝初拜中書令頃之轉車騎大將軍左光祿大夫永熙三年六月以深兼御史中尉東道軍司及出帝入關深與樊子鵠等同逆於兗州子鵠署深為齊州刺史於太山博縣商王村結壘招引山齊之民天平二年正月大軍討破之於陳斬深子肅武定末儀同開府東閤祭酒楊機字顯略天水冀人祖伏恩郡功曹赫連屈丐時將家奔洛陽因以家焉機少有志節為士流所稱河南尹李平元暉並召署功曹暉尤委以郡事或謂暉曰弗躬弗親庶人弗信何得委事於機高臥而已暉曰吾聞君子勞於求士逸於任賢故前代有坐嘯之人主諾之守吾既委得其才何為不可由是聲名更著解褐奉朝請於時皇子國官多非其人詔選清直之士機見舉為京兆王愉國中尉愉甚敬憚之遷給事中伏波將軍廷尉評延昌中行河陰縣事機當官正色不避權勢明達政事斷獄以情甚有聲譽平東將軍荊州刺史楊大眼啟為其府長史熙平中為涇州平西府長史尋授河陰令轉洛陽令京輦伏其威風希有干犯凡訴訟者一經其前後皆識其名姓并記事理世咸異之遷鎮軍將軍司州治中轉別駕荊州蠻叛兼尚書左丞南道行臺討之還除中散大夫復為別駕州牧高陽王雍事多委機出除清河內史轉左將軍河北太守並有能名建義初拜平南將軍光祿大夫兼廷尉卿又除安南將軍司州別駕未幾行河南尹轉廷尉卿徙衞尉卿出除安西將軍華州刺史永熙中衞將軍右光祿大夫尋除度支尚書機方直之心久而彌厲奉公正己為時所稱家貧無馬多乘小犢車時論許其清白與辛雄等並誅年五十九子毗羅解褐開府參軍事卒於鎮遠將軍機兄順字元信梁郡太守順子僧靜武定中太中大夫機兄子虬少有公幹頻為司州記室戶曹從事早卒高崇字積善勃海蓨人四世祖撫晉永嘉中與兄顧避難奔於高麗父潛顯祖初歸國賜爵開陽男居遼東詔以沮渠牧犍女賜潛為妻封武威公主拜駙馬都尉加寧遠將軍卒崇少聰敏以端謹見稱徵為中散稍遷尚書三公郎家資富厚僮僕千餘而崇志尚儉素車馬器服充事而已自修潔與物無競初崇舅氏坐事誅公主痛本生絕胤遂以崇繼牧犍後改姓沮渠景明中啟復本姓襲爵遷領軍長史伏波將軍洛陽令為政清斷吏民畏其威風每有發摘不避強禦縣內肅然朝廷方有遷授會病卒年三十七贈漁陽太守永安二年復贈征虜將軍滄州刺史諡曰成初崇謂友人曰仲尼四科德行為首人能立身約己不忘典訓斯亦足矣故吾諸子闕子謙之字道讓少事後母李以孝聞李亦撫育過於己生人莫能辨其兄弟所出同異論者兩重之及長屏絕人事專意經史天文算曆圖緯之書多所該涉日誦數千言好文章留意老易襲爵釋褐奉朝請加宣威將軍轉奉車都尉廷尉丞正光中尚書左丞元孚慰勞蠕蠕反被拘留及蠕蠕大掠而還置孚歸國事下廷尉卿及監以下謂孚無坐惟謙之以孚辱命以流罪尚書同卿執詔可謙之奏孝昌初行河陰縣令先是有人囊盛瓦礫指作錢物詐市人馬因逃去詔令追捕必得以聞謙之乃偽枷一囚立於馬市宣言是前詐市馬賊今欲刑之密遣腹心察市中私議者有二人相見忻然曰無復憂矣執送按問具伏盜馬徒黨悉獲并出前後盜竊之處資貨甚多遠年失物之家各來得其本物具以狀奏尋詔除寧遠將軍正河陰令在縣二年損益治體多為故事弟道穆為御史在公亦有能名世美其父子兄弟並著當官之稱舊制二縣令得面陳得失時佞幸之輩惡其有所發聞遂共奏罷謙之乃上疏曰臣以無庸謬宰神邑實思奉法不撓稱是官方酬朝廷無貲之恩盡人臣守器之節但豪家支屬戚里親媾縲紲所及舉目多是皆有盜憎之色咸起怨上之心縣令輕弱何能克濟先帝昔發明詔得使面陳所懷臣亡父先臣崇之為洛陽令常得入奏是非所以朝貴斂手無敢干政近日以來此制遂寢致使神宰威輕下情不達今二聖遠遵堯舜憲章高祖愚臣望策其駑蹇少立功名乞新舊典更明往制庶姦豪知禁頗自屏心詔曰此啟深會朕意付外量聞謙之又上疏曰臣聞夏德中微少康成克復之主周道將廢宣王立中興之功則知國無常安世無弊唯在明主所以變之有方化之有道耳自正光已來邊城屢擾命將出師相繼於路軍費戎資委輸不絕至如弓格賞募咸有出身槊刺斬首又蒙階級故四方壯士願征者多各各為己公私兩利若使軍帥必得其人賞勳不失其實則何賊不平何征不捷也諸守帥或非其才多遣親者妄稱入募別倩他人引弓格虛受征官身不赴陳惟遣奴客充數而已對寇臨敵曾不彎弓則是王爵虛加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曹擅作威福如有清貞奉法不為回者咸共譖毀橫受罪罰在朝顧望誰肯申聞蔽上擁下虧風壞政使讒諂甘心忠讜息義況且頻年以來多有徵發民不堪命動致流離苟保妻子競逃王役不復顧其桑井憚比刑書正由還有必困之理歸無自安之路若聽歸其本業徭役微甄則還者必衆墾田增闢數年之後大獲課民今不務以理還之但欲嚴符切勒恐數年之後走者更多安業無幾故有國有家者不患民不我歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一致且琴瑟不韻知音改弦更張騑驂未調善御執轡成組諺云迷而知反得道不遠此言雖小可以諭大陛下一日萬機事難周覽元凱結舌莫肯明言臣雖庸短世受榮祿竊慕前賢匪躬之義不避斧鉞之誅以希一言之益伏願少垂覽察略加推採使朝章重舉軍威更振海內起惟新之歌天下見復禹之績則臣奏之後笑入下泉靈太后得其疏以責左右近侍諸寵要者由是疾之乃啟太后云謙之有學藝宜在國學以訓胄子詔從之除國子博士謙之與袁翻常景酈道元溫子昇之徒咸申款舊好於贍恤言諾無虧居家僮隸對其兒不撻其父母生三子便免其一世無髠黥奴婢常稱俱禀人體如何殘害以父舅氏沮渠蒙遜曾據涼土國書漏闕謙之乃修涼書十卷行於世涼國盛事佛道為論貶之因稱佛是九流之一家當世名士競以佛理來難謙之還以佛義對之竟不能屈以時所行歷多未盡善乃更改元修撰為一家之法雖未行於世議者歎其多能於時朝議鑄錢以謙之為鑄錢都將長史乃上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公為周置九府圜法至景王時更鑄大錢秦兼海內錢重半兩漢興以秦錢重改鑄榆莢錢至文帝五年復為四銖孝武時悉復銷壞更鑄三銖至元狩中變為五銖又造赤仄之錢以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不隨時而變竊以食貨之要八政為首聚財之貴詒訓典文是以昔之帝王乘天地之饒御海內之富莫不腐紅粟於太倉藏朽貫於泉府儲畜既盈民無困敝可以寧謐四極如身使臂者矣昔漢之孝武地廣財豐外事四戎遂虛國用於是草萊之臣出財助國興利之計納稅廟堂市列榷酒之官邑有告緡之令鹽鐵既興錢幣屢改少府遂豐上林饒積外闢百蠻內不增賦者皆計利之由也今羣妖未息四郊多壘徵稅既煩千金日費資儲漸耗財用將竭誠楊氏獻說之秋桑兒言利之日夫以西京之盛錢猶屢改並行小大子母相權況今寇難未除州郡淪敗民物凋零軍國用少別鑄小錢可以富益何損於政何妨於人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之於古亦宜效之於今矣昔禹遭大水以歷山之金鑄錢救民之困湯遭大旱以莊山之金鑄錢贖民之賣子者今百姓窮悴甚於曩日欽明之主豈得垂拱而觀之哉臣今此鑄以濟交乏五銖之錢任使並用行之無損國得其益穆公之言於斯驗矣臣雖術愧計然識非心算暫充錢官頗覩其理苟有所益不得不言脫以為疑求下公卿博議如謂為允即乞施行詔將從之事未就會卒初謙之弟道穆正光中為御史糾相州刺史李世哲事大相挫辱其家以為憾至是世哲弟神軌為靈太后深所寵任直謙之家僮訴良神軌左右之入諷尚書判禁謙之於廷尉時將赦神軌乃啟靈太后發詔於獄賜死時年四十二朝士莫不哀之所著文章百餘篇別有集錄永安中贈征虜將軍營州刺史諡曰康又除一子出身以明寃屈謙之妻中山張氏明識婦人也教勸諸子從師受業常誡之曰自我為汝家婦未見汝父一日不讀書汝等宜各修勤勿替先業謙之長子子儒字孝禮元顥入洛其叔道穆從駕北巡子儒後踰河至行宮莊帝見之具訪洛中事意子儒備陳元顥敗在旦夕帝謂道穆曰卿初來日何故不與子儒俱行對曰臣家百口在洛須其經營且欲其今日之來知京師後事帝曰子儒非直合卿本懷亦大慰朕意仍授祕書郎中轉通直郎後除安東將軍光祿大夫司徒中兵參軍兼祭酒襲爵興和初除兼殿中侍御史時四方多有流民子儒為梁州北豫西兗三州檢戶使所獲甚多後以公事去官武定六年卒時年四十一子儒弟緒字叔宗明悟好學謙之常謂人曰興吾門者當是此兒及長涉獵書傳好文詠司空, krp: ''}
