  - {type: punctuation, offset: 3423, content: 、, id: KR2a0020_ZHSJ_082-bkkpn724}
  - {type: variant, offset: 3423, length: 386, content: 關西慰勞大使將發請事五條一言逋懸租調宜悉不徵二言簡罷非時徭役以紓民命三言課調之際使豐儉有殊令州郡量檢不得均一四言兵起歷年死亡者衆或父或子辛酸未歇見存耆老請假板職悅生者之意慰死者之魂五言喪亂既久禮儀罕習如有閨門和穆孝悌卓然者宜表其門閭仍啟曰臣聞王者愛民之道有六一曰利之二曰成之三曰生之四曰與之五曰樂之六曰喜之使民不失其時則成之也省刑罰則生之也薄賦斂則與之也無多徭役則樂之也吏靜不苛則喜之也伏惟陛下道邁前王功超往代敷春風而鼓俗旌至德以調民生之養之正當茲日悅近來遠亦是今時臣既忝將命宣揚聖澤前件六事謂所宜行若不除煩收疾惠孤恤寡便是徒乘官驛虛號王人往還有費於郵亭皇恩無逮於民俗謹率愚管敢以陳聞乞垂覽許莊帝從之因詔民年七十者授縣八十者授郡九十加四品將軍百歲從三品將軍三年遷鎮南將軍都官尚書行河南尹普泰時為鎮軍將軍殿中尚書又加衞將軍右光祿大夫秦州大中正太昌中又除殿中尚書兼吏部尚書尋除, WYG: ''}
