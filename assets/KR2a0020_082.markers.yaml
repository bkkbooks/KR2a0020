  - {type: variant, offset: 5063, length: 5, content: 父母兄弟悉, WYG: 矜吝之心好飲酒澹於榮利自得懐抱不事權門性和厚恭愼每讀書見韋弦之事深薄之危乃圖古昔可以鑒戒指事為象讚而述之曰周雅云謂天蓋髙不敢不跼謂地蓋厚不敢不蹐有朝隱大夫監戒斯文乃惕焉而懼曰夫道喪則世傾利重則身輕是故乘和體遜式銘方冊防微愼獨載象丹青信哉辭人之賦文晦而理明仰瞻髙天聽卑視諦俯測厚地岳峻川渟誰其戴之不私不畏誰其踐之不陷不墮故善惡是徴物罔同異論亢匪久人咸敬忌嗟乎唯地厚矣尚亦兢兢浩浩名位孰識其親摶之弗得聆之}
