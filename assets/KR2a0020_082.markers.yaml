  - {type: variant, offset: 2861, length: 314, content: 法懸而不用自此夷夏之民相將為亂豈有餘憾哉蓋由官授不得其人百姓不堪其命故也當今天下黔黎久經寇賊父死兄亡子弟淪陷流離艱危十室而九白骨不收孤煢靡恤財殫力盡無以卒歲宜及此時早加慰撫蓋助陛下治天下者惟在守令最須簡置以康國道但郡縣選舉由來共輕貴遊儁才莫肯居此宜改其弊以定官方請上等郡縣為第一清中等為第二清下等為第三清選補之法妙盡才望如不可並後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不歷郡縣不得為內職則人思自勉上下同心枉屈可申強暴自息刑政日平民俗奉化矣復何憂於不治何恤於逆徒也竊見今之守令清慎奉治則政平訟理有非其才則綱維荒穢伏願陛下暫留天心校其利害則臣言可驗不待終朝昔杜畿寬惠河東無警蘇則分糧金城克復略觀今古風俗遷訛罔不, WYG: 釐州}
