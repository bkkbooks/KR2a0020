  - {type: variant, offset: 3879, length: 1102, content: 帝入關右齊獻武王至洛於永寧寺集朝士責讓雄及尚書崔孝芬劉欽楊機等曰為臣奉主扶危救亂若處不諫諍出不陪隨緩則耽寵急便竄避臣節安在諸人默然不能對雄對曰當主上信狎近臣雄等不與謀議及乘輿西邁若即奔隨便恐跡同佞黨留待大王便以不從蒙責雄等進退如此不能自委溝壑實為慚負王復責曰卿等備位納言當以身報國不能盡忠依附諂佞未聞卿等諫諍一言使國家之事忽至於此罪欲何歸也乃誅之時年五十沒其家口二子士璨士貞逃入關中雄從父兄纂字伯將學涉文史溫良雅正初為兗州安東府主簿與祕書丞同郡李伯尚有舊伯尚與咸陽王禧同逆逃竄投纂事覺坐免官積十餘年除奉朝請稍轉太尉騎兵參軍每為府主清河王懌所賞及欲定考懌曰辛騎兵有學有才宜為上第轉越騎校尉尚書令李崇北伐蠕蠕引為錄事參軍臨淮王彧北征以纂隨崇有稱啟為長史及廣陽王淵北伐又引為長史尋拜諫議大夫雅為彧所稱歎屢在朝廷薦舉之蕭衍遣將曹義宗攻新野詔纂持節兼尚書左丞南道行臺率衆赴接至便破之義宗等以其勁速不敢復進於時海內多虞京師更無繼援惟以二千餘兵捍禦疆埸又詔為荊州軍司除驍騎將軍加輔國將軍纂善撫將士人多用命賊甚憚之會肅宗崩諱至咸以對敵欲祕凶問纂曰安危在人豈關是也遂發喪號哭三軍縞素還入州城申以盟約尋為義宗所圍相率固守莊帝即位除通直散騎常侍征虜將軍兼尚書仍行臺後大都督費穆擊義宗擒之入城因舉酒屬纂曰微辛行臺之在斯吾亦無由建此功也入朝言於莊帝稱纂固節危城宜蒙爵賞以勸將來帝乃下詔慰勉之尋除持節平東將軍中郎將賜絹五十匹金裝刀一口永安二年元顥乘勝卒至城下尒朱世隆狼狽退還城內空虛遂為顥擒及莊帝還宮纂謝不守之罪帝曰於時朕亦北巡東軍不守豈卿之過還鎮虎牢俄轉中軍將軍滎陽太守民有姜洛生康乞得者舊是太守鄭仲明左右豪猾偷竊境內為患纂伺捕擒獲梟於郡市百姓忻然加鎮東將軍太昌中除左光祿大夫纂僑寓洛陽乃為河南邑中正永熙三年除使持節河內太守齊獻武王赴洛兵集城下纂出城謁王曰纂受詔於此本有禦防大王忠貞王室扶奬顛危纂敢不匍匐王曰吾志去姦佞以康國道河內此言深得王臣之節因命前侍中司馬子如曰吾行途疲弊宜代吾執河內手也便入洛九月行西荊州事兼尚書南道行臺尋正刺史時蠻酋樊五能破析陽郡應宇文黑獺纂議欲出軍討之纂行臺郎中李廣諫曰析陽四面無民唯一城之地耳山路深險表𩹉羣蠻今若少遣軍則力不能制賊多遣則減徹防衞根本虛弱脫不如意便大挫威名人情一去州城難保纂曰豈得縱賊不討令其為患日深廣曰今日之事唯須萬全且慮在心腹何暇疥癬聞臺軍已破洪威計不久應至公但約勒屬城使各修完壘壁善撫百姓以待救兵雖失析陽如棄雞肋纂曰卿言自是一途我意以為不爾遂遣兵攻之不克而敗諸將因亡不返城人又密招西賊黑獺遣都督獨孤如願率軍潛至突入州城遂至廳閤纂左右惟五六人短兵接戰為賊所擒遂害之贈都督定殷二州諸軍事, WYG: ''}
