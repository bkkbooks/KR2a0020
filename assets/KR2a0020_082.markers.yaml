  - {type: variant, offset: 4998, length: 0, content: '', WYG: 瑩以文學見重常語人云文章須自出機杼成一家風骨何能共人同生活也蓋譏世人好偷竊他文以為已用而瑩之筆札亦無乏天才但不能均調玉石兼有製裁之體減於袁常焉性爽俠有節氣士有窮厄以命歸之必見存拯時亦以此多之其文集行於世}
