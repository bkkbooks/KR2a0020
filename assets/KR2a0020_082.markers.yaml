  - {type: variant, offset: 3213, length: 207, content: 蕭寶夤在雍州起逆城人侯衆德等討逐之多蒙爵賞武泰中詔雄兼尚書為關西賞勳大使未行之間會尒朱榮入洛及河陰之難人情未安雄潛竄不出莊帝欲以雄為尚書門下奏曰辛雄不出存亡未分莊帝曰寧失亡而用之不可失存而不用也遂除度支尚書加安南將軍元顥入洛也北中郎將楊侃從駕北出莊帝以侃為度支尚書及乘輿反洛復召雄上雄面辭曰臣不能死事俛眉從賊乃是朝廷罪人縱陛下不賜誅罰而北來尚書勳高義重臣宜避賢路莊帝曰卿且還本司朕當別有處分遂解侃尚書未幾詔雄以本官, WYG: 徴}
