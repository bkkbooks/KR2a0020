  - {type: variant, offset: 1881, length: 309, content: 時遣大都督安豐王延明督臨淮王彧討之盤桓不進乃詔雄副太常少卿元誨為使給齊庫刀持節乘驛催軍有違即令斬決肅宗謂雄曰誨朕家諸子摽以親懿籌策機計仗卿取勝耳到軍勒令並進徐州綜送降款冀州刺史侯剛啟為長史肅宗以雄長於世務惜不許之更除司空長史於時諸公皆慕其名欲屈為佐莫能得也時諸方賊盛而南寇侵境山蠻作逆肅宗欲親討以荊州為先詔雄為行臺左丞與前軍臨淮王彧東趣葉城別將裴衍西通餢路衍稽留未進彧師已次汝濱北溝求救彧以處分道別不欲應之雄曰今裴衍未至王士衆已集蠻左唐突撓亂近畿梁汝之間民不安業若不時撲滅更為深害王秉麾閫外唯利是從見可而進何必守道苟安社稷理可專裁所謂臣率義而行不待命者也彧恐後有得失之責要雄符下雄以駕將親伐蠻夷必懷震動乘彼離心無往不破, WYG: ''}
