  - {type: variant, offset: 4986, length: 0, content: '', WYG: 司徒公雍州刺史諡曰文簡琰之少機警善談經史百家無所不覽朝廷疑事多所訪質每云崔博而不精劉精而不博我既精且博學兼二子謂崔光劉芳也論者許其博未許其精當時物議咸共宗之又自誇文章從姨兄常景笑而不許每休閑之際恒閉門讀書不交人事嘗謂人曰吾所以好讀書不求身後之名但異見異聞心之所願是以孜孜搜討欲罷不能豈為聲名勞七尺也此乃天性非為力彊前後再居史職無所編緝安豐王延明博聞多識每有疑滯恒就琰之辨析自以為不及也二子綱惠並從出帝入關祖瑩字元珍范陽遒人也曾祖敏仕慕容垂為平原太守太祖定中山賜爵安固子拜尚書左丞卒贈并州刺史祖嶷字元逹以從征平原功進爵為侯位馮翊太守贈幽州刺史父季眞多識前言徃行位中書侍郎卒於安逺將軍鉅鹿太守瑩年八歲能誦詩書十二為中書學生好學躭書以晝繼夜父母恐其成疾禁之不能止常密於灰中藏火驅逐僮僕父母寢睡之後燃火讀書以衣被蔽塞窻户恐漏光明為家人所覺由是聲譽甚盛内外親屬呼為聖小兒尤好屬文中書監髙允每歎曰此子才器非諸生所及終當逺至時中書博士張天龍講尚書選為都講生徒悉集瑩夜讀書勞倦不覺天曉催講既切遂誤持同房生趙郡李孝怡曲禮卷上座博士嚴毅不敢還取乃置禮於前誦尚書三篇不遺一字講罷孝怡異之向博士說舉學盡驚後髙祖聞之召入令誦五經章句并陳大義帝嗟賞之瑩出後髙祖戲盧昶曰昔流共工於幽州北裔之地那得忽有此子昶對曰當是才為世生以才名拜太學博士徴署司徒彭城王勰法曹行參軍髙祖顧謂勰曰蕭賾以王元長為子良法曹今為汝用祖瑩豈非倫匹也勑令掌勰書記瑩與陳郡袁飜齊名秀出時人為之語曰京師楚楚袁與祖洛中翩翩祖與袁再遷尚書三公郎尚書令王肅曾於省中詠悲平城詩云悲平城驅馬入雲中陰山常晦雪荒松無罷風彭城王勰甚嗟其美欲使肅更詠乃失語云王公吟詠情性聲律殊佳可便為誦悲彭城詩肅因戲勰云何意悲平城為悲彭城也勰有慙色瑩在座即云所有悲彭城王公自未見耳肅云可為誦之瑩應聲云悲彭城楚歌四面起屍積石梁亭血流睢水裏肅甚嗟賞之勰亦大悅退謂瑩曰即定是神口今日若不得卿幾為吳子所屈為冀州鎮東府長史以貨賄事發除名後侍中崔光舉為國子博士仍領尚書左户部李崇為都督北討引瑩為長吏坐截沒軍資除名未幾為散騎侍郎孝昌中於廣平主第掘得古玉印勑召瑩與黄門侍郎李琰之命辨何世之物瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時人稱為博物累遷國子祭酒領給事黄門侍郎幽州大中正監起居事又監議事元顥入洛以瑩為殿中尚書莊帝還宫坐為顥作詔罪狀尒朱榮免官後除祕書監中正如故以參議律歴賜爵容城縣子坐事繋於廷尉前廢帝遷車騎將軍初莊帝末尒朱兆入洛軍人焚燒樂署鍾石管弦略無存者勑瑩與録尚書事長孫稚侍中元孚典造金石雅樂三載乃就事在樂志遷車騎大將軍及出帝登阼瑩以太常行禮封文安縣子天平初將遷鄴齊獻武王因召瑩議之以功遷儀同三司進爵為伯薨贈}
