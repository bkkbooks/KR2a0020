  - {type: variant, offset: 964, length: 908, content: 性簡自帝心鷹鸇之志形於在昔故高祖錫之以匡名陛下任之以彈糾至若茹皓昇輦匡斥宜下之言高肇當政匡陳擅權之表剛毅忠款羣臣莫及骨鯁之跡朝野共知當高肇之時匡造棺致諫主聖臣直卒以無咎假欲重造先帝已容之於前陛下亦宜寬之於後況其元列由緒與罪按不同也脫終貶黜不在朝廷恐杜忠臣之口塞諫者之心乖琴瑟之至和違鹽梅之相濟祁奚云叔向之賢可及十世而匡不免其身實可嗟惜未幾匡除龍驤將軍平州刺史右僕射元欽謂左僕射蕭寶夤曰至如辛郎中才用省中諸人莫出其右寶夤曰吾聞游僕射云得如雄者四五人共治省事足矣今日之賞何其晚哉初廷尉少卿袁翻以犯罪之人經恩競訴枉直難明遂奏曾染風聞者不問曲直推為獄成悉不斷理詔令門下尚書廷尉議之雄議曰春秋之義不幸而失寧僭不濫僭則失罪人濫乃害善人今議者不忍罪姦吏使出入縱情令君子小人薰蕕不別豈所謂賞善罰惡殷勤隱恤者也仰尋周公不減流言之愆俯惟釋之不加驚馬之辟所以小大用情貴在得所失之千里差在毫釐雄久執按牘數見疑訟職掌三千願言者六一曰御史所糾有注其逃走者及其出訴或為公使本曹給過所有指如不推檢文按灼然者雪之二曰御史赦前注獲見贓不辨行賕主名檢無賂以置直之主宜應洗復三曰經拷不引傍無三證比以獄按既成因即除削或有據令奏復者與奪不同未獲為通例又須定何如得為證人若必須三人對見受財然後成證則於理太寬若傳聞即為證則於理太急今請以行賕後三人俱見物及證狀顯著準以為驗四曰赦前斷事或引律乖錯使除復失衷雖按成經赦宜追從律五曰經赦除名之後或邀駕訴枉被旨重究或訴省稱寃為奏更檢事付有司未被研判遂遇恩宥如此之徒謂不得異於常格依前按為定若不合拷究已復之流請不追奪六曰或受辭下檢反覆使鞫獄證占分明理合清雪未及告按忽逢恩赦若從證占而雪則違正格如除其名罪濫潔士以為罪須按成雪以占定若拷未畢格及要證一人不集者不得為占定古人雖患察獄之不精未聞知寃而不理今之所陳實士師之深疑朝夕之急務願垂察焉詔從雄議自後每有疑議雄與公卿駁難事多見從於是公能之名甚盛又為祿養論稱仲尼陳五孝自天子至庶人無致仕之文禮記八十一子不從政九十家不從政鄭玄注云復除之然則止復庶民非公卿大夫士之謂以為宜聽祿養不約其年書奏肅宗納之以母憂去任卒哭右僕射元欽奏雄起復為郎俄兼司州別駕加前軍將軍孝昌元年徐州刺史元法僧以城南叛, WYG: 規奔}
