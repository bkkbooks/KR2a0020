  - {type: variant, offset: 10099, length: 2467, content: 轉長流參軍除鎮遠將軍冀州儀同府中兵參軍為府主封隆之所賞隆之行梁州濟州引自隨令總攝數郡武定三年卒年三十二緒弟孝貞武定中司徒士曹參軍孝貞弟孝幹司空東閤祭酒謙之弟恭之字道穆行字於世學涉經史非名流儁士不與交結幼孤事兄如父母每謂人曰人生厲心立行貴於見知當使夕脫羊裘朝佩珠玉者若時不我知便須退迹江海自求其志御史中尉元匡高選御史道穆奏記於匡曰道穆生自蓬簷長於陋巷頗獵羣書無純碩之德尚好章詠乏彫掞之工雖欲厠影髦徒班名俊伍其可得哉然凝明獨斷之主雄才不世之君無藉朽株之資求人屠釣之下不牽闇投之誚取士商歌之中是以聞英風而慷慨望雲路而低佪者天下皆是也若得身隸繡衣名充直指雖謝周生騎上之敏實有茅氏就鑊之心匡大喜曰吾久知其人適欲召之遂引為御史其所糾摘不避權豪臺中事物多為匡所顧問道穆曾進說於匡曰古人有言罰一人當取千萬人懼豺狼當道不問狐狸明公荷國重寄宜使天下知法匡深然之正光中出使相州刺史李世哲即尚書令崇之子貴盛一時多有非法逼買民宅廣興屋宇皆置鴟尾又於馬埒堠上為木人執節道穆繩糾悉毀去之并發其贓貨具以表聞又尒朱榮討蠕蠕道穆監其軍事榮甚憚之還除奉朝請俄除太尉鎧曹參軍蕭寶夤西征以道穆為行臺郎中軍機之事多以委之大都督崔延伯敗後賊勢轉強屢請益兵朝廷不許寶夤謂道穆曰非卿一行兵無益理遂令乘傳赴洛靈太后親問賊勢道穆具以狀對太后怒曰比來使人皆言賊弱卿何獨云其強也道穆曰前使不實者當是冀陛下恩顏望霑爵賞臣既忝使人不敢虛妄願令近臣親檢足知虛實事訖當反遇病不行後屬兄謙之被害情不自安遂託身於莊帝帝時為侍中特相欽重引居第中深相保護俄而帝以兄事見出道穆懼禍乃攜家趣濟陰變易姓名往來於東平畢氏以避時難莊帝即位徵為尚書三公郎中加寧朔將軍尋兼吏部郎中與薛曇尚書使晉陽授尒朱榮職賜爵龍城侯九月除太尉長史領中書舍人遭母憂去職帝令中書舍人溫子昇就宅弔慰詔攝本任表辭不許三年加前軍將軍及元顥逼虎牢城或勸帝赴關西者帝以問道穆道穆對曰關中今日殘荒何由可往臣謂元顥兵衆不多乘虛深入者由國家將帥征捍不得其人耳陛下若親率宿衞高募重賞背城一戰臣等竭其股肱之力破顥孤軍必不疑矣如恐成敗難測非萬乘所履便宜車駕北渡循河東下徵大將軍天穆合於滎陽向虎牢別徵尒朱王軍令赴河內以掎角之旬月之間何往不克臣竊謂萬全之計不過於此帝曰高舍人語是其夜到河內郡北未有城守可依帝命道穆秉燭作詔書數十紙布告遠近於是四方知乘輿所在除中軍將軍給事黃門侍郎安喜縣開國公食邑千戶於時尒朱榮欲回師待秋道穆謂榮曰元顥以蕞爾輕兵奄據京洛使乘輿飄露人神恨憤主憂臣辱良在於今大王擁百萬之衆輔天子而令諸侯自可分兵河畔縛筏造船處處遣渡徑擒羣賊復主宮闕此桓文之舉也且一日縱敵數世之患今若還師令顥重完守具徵兵天下所謂養虺成蛇悔無及矣榮深然之曰楊黃門侃已陳此計當更議決耳及莊帝反政因宴次謂尒朱榮曰前若不用高黃門計則社稷不安可為朕勸其酒令醉榮對曰臣本北征蠕蠕高黃門與臣作監軍臨事能決實可任用除征南將軍金紫光祿大夫兼御史中尉尋即真仍兼黃門道穆外秉直繩內參機密凡是益國利民之事必以奏聞諫諍極言無所顧憚選用御史皆當世名輩李希宗李繪陽休之陽斐封君義邢子明蘇淑宋世良等四十人於時用錢稍薄道穆表曰四民之業錢貨為本救弊改鑄王政所先自頃以私鑄薄濫官司糾繩挂網非一在市銅價八十一文得銅一斤私造薄錢斤餘二百既示之以深利又隨之以重刑罹罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不此乃因循有漸科防不切朝廷之愆彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鉛沙縱復私營不能自潤直置無利自應息心況復嚴刑廣設也以臣測之必當錢貨永通公私獲允後遂用楊侃計鑄永安五銖錢僕射尒朱世隆當朝權盛因內見衣冠失儀道穆便即彈糾帝姊壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以為恨泣以訴帝帝謂公主曰高中尉清直之人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯極以為愧道穆免冠謝曰臣蒙陛下恩守陛下法不敢獨於公主虧朝廷典章以此負陛下帝曰朕以愧卿卿反謝朕尋敕監儀注又詔曰祕書圖籍所在內典書又加繕寫緗素委積蓋有年載出內繁蕪多致零落可令御史中尉兼給事黃門侍郎道穆總集帳目并牒儒學之士編比次第道穆又上疏曰臣聞舜命臯陶姦宄是託禹泣罪人堯心為念所以舉直措枉事切曩賢明德慎罰議存先典高祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要所謂禮樂互興不相沿襲者矣臣以無庸忝當今任所思報效未忘寢興但識謝知今業慚稽古未能進一言以利國說一策以興邦索米長安豈不知愧至於職司其憂猶望僶俛竊見御史出使悉受風聞雖時獲罪人亦不無枉濫何者得堯之罰不能不怨守令為政容有愛憎姦猾之徒思報惡多有妄造無名共相誣謗御史一經檢究於不成杖木之下以虛為實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指冀以清肅若仍踵前失或傷善人則尸祿之責無所逃罪所以夙夜為憂思有悛革如臣鄙見請依太和故事還置司直十人名隸廷尉秩以五品選歷官有稱心平性正者為之御史若出糾劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居別館御史檢了移付司直覆問事訖與御史俱還中尉彈聞廷尉科按一如舊式庶使獄成罪定無復稽寬為惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聽以所檢迭相糾發如二使阿曲有不盡理聽罪家詣門下通訴別加按檢如此則肺石之傍怨訟可息叢棘之下受罪吞聲者矣詔從之復置司直及尒朱榮之死也帝召道穆付赦書令宣於外因謂之曰自今日後當得精選御史矣先是榮等常欲以其親黨為御史故有此詔及尒朱世隆等率其部類戰於大夏門北道穆受詔督戰又贊成太府卿李苗斷橋之計世隆等於是北遁加衞將軍假車騎將軍大都督兼尚書右僕射南道大行臺又除車騎將軍餘官如故時雖外託征蠻而帝恐北軍不利欲為南巡之計未發會尒朱兆入洛道穆慮禍及己託病去官世隆以道穆忠於前朝遂害之時年四十二太昌中贈使持節都督雍秦二州諸軍事車騎大將軍儀同三司雍州刺史子士鏡襲爵為北豫州刺史高仲密擁入關道穆弟謹之繼沮渠氏後卒於滄州平東府主簿年三十五贈通直郎無子謹之弟慎之字道密好學有諸兄風年二十三卒無子以兄謙之第二子緒繼焉, WYG: ''}
