  - {type: variant, offset: 5024, length: 0, content: '', krp: 督平北將軍元譚以禦之景表求勒幽州諸縣悉入古城山路有通賊之處權發兵夫隨宜置戍以為防遏又以頃來差兵不盡彊壯今之三長皆是豪門多丁為之今求權發為兵肅宗皆從之進號平北將軍别勑譚西至軍都關北從盧龍塞據此二嶮以杜賊出入之路又詔景山中嶮路之處悉令捍塞景遣府錄事參軍裴智成發范陽三長之兵以守白㠈都督元譚據居庸下口俄而安州石離冗城斛鹽三戍兵反結洛周有衆二萬餘落自松岍赴賊譚勒别將崔仲哲等截軍都關以待之仲哲戰沒洛周又自外應之腹背受敵譚遂大敗諸軍夜散詔以景所部别將李琚為都督代譚征下口降景為後將軍解州任仍詔景為幽安𤣥等四州行臺賊既南出鈔掠薊城景命統軍梁仲體率兵士邀擊破之獲賊將禦夷鎮軍主孫念恒都督李琚為賊所攻薊城之北軍敗而死率屬城人禦之賊不敢逼洛周還據上谷授景平北將軍光祿大夫行臺如故洛周遣其都督王曹紇眞馬叱斤等率衆薊南以掠人榖乃遇連雨賊衆疲勞景與都督于榮刺史王延年置兵粟國邀其走路大敗之斬曹紇眞洛周率衆南趨汜陽景與延年及榮復破之又遣别將重破之於州西虎眼泉擒斬及溺死者甚衆後洛周南圍范陽城人翻降執刺史延年及景送於洛周洛周尋為葛榮所吞景又入榮榮破景得還朝永安初詔復本官兼黄門侍郎又攝著作固辭不就二年除中軍將軍正黄門先是參議正光壬}
