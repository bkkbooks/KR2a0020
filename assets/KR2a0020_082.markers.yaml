  - {type: variant, offset: 5022, length: 0, content: '', WYG: 刺史髙聰通直郎徐紇各作碑銘並以呈御世宗悉付侍中崔光簡之光以景所造為最乃奏曰常景名位乃處諸人之下文出諸人之上遂以景文刋石肇尚平陽公主未幾主薨肇欲使公主家令居廬制服付學官議正施行尚書又以訪景景以婦人無專國之理家令不得有純臣之義乃執議曰喪紀之本實稱物以立情輕重所因亦縁情以制禮雖理關盛衰事經今古而制作之本降殺之宜其實一焉是故臣之為君所以資敬而崇重為君母妻所以從服而制義然而諸侯大夫之為君者謂其有地土有吏屬無服文者言其非世爵也今王姬降適雖加爵命事非君邑理異列土何者諸王開國備立臣吏生有趨奉之勤死盡致喪之禮而公主家令唯有一人其丞已下命之屬官既無接事之儀實闕為臣之體原夫公主之貴所以立家令者蓋以主之内事脱須關外理無自達必也因人然則家令唯通内外之職及典主家之事而無關君臣之理名義之分也由是推之家令不得為純臣公主不可為正君明矣且女人之為君男子之為臣古禮所不載先朝所未議而四門博士裴道廣孫榮乂等以公主為之君以家令為之臣制服以斬乖謬彌甚又張虛景吾難覊等不推君臣之分不尋致服之情猶同其議凖母制齊求之名實理未為允竊謂公主之爵既非食采之君家令之官又無純臣之式若附如母則情義罔施若凖小君則從服無據案如經禮事無成文即之愚見謂不應服朝廷從之景淹滯門下積歲不至顯官以蜀司馬相如王襃嚴君平揚子雲等四賢皆有髙才而無重位乃託意以讚之其讚司馬相如曰長卿有艶才直致不羣性鬱若春煙舉皎如秋月映遊梁雖好仁仕漢常稱病清貞非我事窮逹委天命其讚王子淵曰王子挺秀質逸氣干青雲明珠既絶俗白鵠信驚羣才世茍不合遇否途自分空枉碧鷄命徒獻金馬文其讚嚴君平曰嚴公體沉静立志明霜雪味道綜微言端著演妙說才屈羅仲口位結李强舌素尚邁金貞清標陵玉徹其讚揚子雲曰蜀江導清流揚子挹餘休含光絶後彦覃思邈前修世輕久不賞𤣥談物無求當途謝權寵置酒獨閑遊景在樞密十有餘年為侍中崔光盧昶游肇元暉尤所知賞累遷積射將軍給事中延昌初東宫建兼太子屯騎校尉錄事皆如故其年受勑撰門下詔書凡四十卷尚書元萇出為西安將軍雍州刺史請景為司馬以景階次不及除錄事參軍襄威將軍帶長安令甚有惠政民吏稱之先是太常劉芳與景等撰朝令未及班行别典儀注多所草創未成芳卒景纂成其事及世宗崩召景赴京還修儀注拜謁者僕射加寧逺將軍又以本官兼中書舍人後授步兵校尉仍舍人又勑撰太和之後朝儀已施行者凡五十餘卷時靈太后詔依漢世陰鄧二后故事親奉廟祀與帝交獻景乃據正以定儀注朝廷是之正光初除龍驤將軍中散大夫舍人如故時肅宗以講學之禮於國子寺司徒崔光執經勑景與董紹張徹馮元興王延業鄭伯猷等俱為録義事畢又行釋奠之禮並詔百官作釋奠詩時以景作為美是年九月蠕蠕主阿那􅅛歸闕朝廷疑其位次髙陽王雍訪景景曰昔咸寧中南單于來朝晉世處之王公特進之下今日為班宜在蕃王儀同三司之間雍從之朝廷典章疑而不決則時訪景而行初平齊之後光禄大夫髙聰徙於北京中書監髙允為之娉妻給其資宅聰後為允立碑每云吾以此文報德足矣豫州刺史常綽以未盡其美景尚允才器先為遺德頌司徒崔光聞而觀之尋味良久乃云髙光禄平日每矜其文自許報允之德今見常生此頌髙氏不得獨擅其美也侍中崔光安豐王延明受詔議定服章勑景參修其事尋進號冠軍將軍阿那瓌之還國也境上遷延仍陳窘乏遣尚書左丞元孚奉詔振恤阿那瓌執孚過柔𤣥奔于漠北遣尚書令李崇御史中尉兼右僕射元纂追討不及乃令景出塞經瓫山臨瀚海宣勑勒衆而返景經涉山水悵然懐古乃擬劉琨扶風歌十二首進號征虜將軍孝昌初兼給事黄門侍郎尋除左將軍太府少卿仍舍人固辭少卿不拜改授散騎常侍將軍如故徐州刺史元法僧叛入蕭衍衍遣其豫章王蕭綜入據彭城時安豐王延明為大都督大行臺率臨淮王彧等衆軍討之既而蕭綜降附徐州清復遣景兼尚書持節馳與行臺都督觀機部分景經洛汭乃作銘焉是時尚書令蕭寶夤都督崔延伯都督北海王顥都督車騎將軍元恒芝等並各出討詔景詣軍宣㫖勞問還以本將軍授徐州刺史杜洛周反於燕州仍以景兼尚書為行臺與幽}
