  - {type: variant, offset: 5061, length: 0, content: '', WYG: 刁整每謂曰卿清德自居不事家業雖儉約可尚將何以自濟也吾恐摯太常方餧於栢谷耳遂與衛將軍羊深矜其所之乃率刁雙司馬彦邕李諧畢祖彦畢義顯等各出錢千文而為買馬焉天平初遷鄴景匹馬從駕是時詔下三日户四十萬狼狽就道收百官馬尚書丞郎巳下非陪從者盡乘驢齊獻武王以景清貧特給車牛四乘妻孥方得逹鄴後除儀同三司仍本將軍武定六年以老疾去官詔曰几杖為禮安車致養敬齒尊賢其來尚矣景藝業該通文史淵洽歴事三京年彌五紀朝章言歸禄俸無餘家徒壁立宜從哀恤以旌元老可特給右光禄事力終其身八年薨景善與人交終始若一其逰處者皆服其深逺之度未曾}
