  - {type: variant, offset: 349, length: 3, content: 秉筆迄, WYG: 令諸察獄先備五聽之理盡求情之意又驗諸證信事多疑似猶不首實者然後加以拷掠諸犯年刑已上枷鎻流徙已上增以杻械迭用不俱非大逆外叛之罪皆不大枷高杻重械又無用石之文而法官州郡因緣增加遂爲恒法進乖五聽退違令文誠宜案劾依旨科處但踵行已久計不推坐檢杖之小大鞕之長短令有定式但枷之輕重先無成制臣等參量造大枷長一丈三尺喉下長一丈通頰木各方五寸以擬大逆外叛杻械以掌流刑已上諸臺寺州郡大枷請悉焚之枷本掌囚非拷訊所用從今斷獄皆依令盡聼訊之理量人彊弱加之拷掠不聽非法拷人兼以拷石自是枷杖之制頗有定凖未幾獄官肆虐稍復重大法例律五等列爵及在官品令從第五以階當刑二歲免官者三載之後聽仕降先階一等延昌二年春尚書邢巒奏竊詳王公已下或析體宸極或著勲當時咸胙土授民維城王室至於五等之爵亦以功錫雖爵秩有異而號擬河山得之至難失之永墜刑典旣同名復殊絕請議所宜附爲永制詔議律之制與八座門下參論皆以爲官人若罪本除名以職當刑猶有餘資復降階而叙至於五等封爵除刑若盡永卽甄削便同之除名於例實爽愚謂自王公以下有封邑罪除名三年之後宜各降本爵一等王及郡公降爲縣公公爲侯侯爲伯伯爲子子爲男至于縣男則降爲鄉男五等爵者亦依此而降至於散男其鄉男}
