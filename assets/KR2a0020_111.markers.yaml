  - {type: variant, offset: 329, length: 0, content: '', WYG: 并合二千九百餘條晉室喪亂中原蕩然魏氏承百王之末屬崩散之後典刑泯棄禮俗澆薄自太祖撥亂蕩滌華夏至于太和然後吏清政平斷獄省簡所謂百年而後勝殘去殺故𣙜舉行事以著于篇魏初禮俗純朴刑禁疎簡宣帝南遷復置四部大人坐王庭決辭訟以言語約束刻契記事無囹圄考訊之法諸犯罪者皆臨時決遣神元因循亡所革易穆帝時劉聰石勒傾覆晉室帝將平其亂乃峻刑法每以軍令從事民乘寛政多以違命得罪死者以萬計於是國落騷駭平文承業綏集離散昭成建國二年當死者聽其家獻金馬以贖犯大逆者親族男女無少長皆斬男女不以禮交皆死民相殺者聽與死家馬牛四十九頭及送葬器物以平之無繫訊連逮之坐盗官物一備五私則備十法令明白百姓晏然太祖㓜遭艱難備嘗險阻具知民之情僞及在位躬行仁厚協和民庶旣定中原患前代刑網峻密乃命三公郞王德除其法之酷切於民者約定科令大崇簡易是時天下民久苦兵亂畏法樂安帝知其若此乃鎮之以𤣥黙罰必從輕兆庶欣戴焉然於大臣持法不捨季年災異屢見太祖不豫網紀禠頓刑罰頗爲濫酷太宗卽位修廢官恤民隱命南平公長孫嵩北新侯安同對理民訟庶政復有叙焉帝旣練精庶事爲吏者浸以深文避罪世祖卽位以刑禁重神䴥中詔司徒崔浩定律令除五歲四歲刑増一年刑分大辟爲二科死斬死入絞大逆不道腰斬誅其同籍年十四已下腐刑女子沒縣官害其親者轘之爲蠱毒者男女皆斬而焚其家巫蠱者負羖羊抱犬沉諸淵當刑者贖貧則加鞭二百畿内民富者燒炭於山貧者役於圊溷女子入舂稾其固疾不逮于人守苑囿王官階九品得以官爵除刑婦人當刑而孕産後百日乃決年十四已下降刑之半八十及九歲非殺人不坐拷訊不踰四十九論刑者部主具狀公車鞫辭而三都決之當死者部案奏聞以死不可復生懼監官不能平獄成皆呈帝親臨問無異辭怨言乃絶之諸州國之大辟皆先讞報乃施行闕左懸登聞鼓人有窮寃則撾鼓公車上奏其表是後民官瀆貨帝思有以肅之太延三年詔天下吏民得舉告牧守之不法於是凡庶之凶悖者專求牧宰之失迫脅在位取豪於閭閻而長吏咸降心以待之苟免而不恥貪暴猶自若也時輿駕數親征討及行幸四方眞君五年命恭宗總百揆監國少傅游雅上疏曰殿下親覽百揆經營内外昧旦而興諮詢國老臣職忝凝承司是獻替漢武時始啓河右四郡議諸疑罪而讁徙之十數年後邊郡充實並修農戍孝宣因之以服北方此近世之事也帝王之於罪人非怒而誅之欲其徙善而懲惡讁徒之苦其懲亦深自非大逆正刑皆可從徙雖舉家投遠忻喜赴路力役終身不敢言苦且遠流分離心或思善如此姦邪可息邊垂足備恭宗善其言然未之行六年春以有司斷法不平詔諸疑獄皆付中書依古經義論決之初盗律贓四十匹致大辟民多慢政峻其法贓三匹皆死正平元年詔曰刑網太密犯者更衆朕甚愍之其詳案律令務求厥中有不便於民者增損之於是游雅與中書侍郞胡方回等改定律制盗律復舊加故縱通情止舍之法及他罪凡三百九十一條門誅四大辟一百四十五刑二百二十一條有司雖增損條章猶未能闡明刑典高宗初仍遵舊式太安四年始設酒禁是時年榖屢登士民多因酒致酗訟或議主政帝惡其若此故一切禁之釀沽飲皆斬之吉凶賔親則開禁有日程增置内外候官伺察諸曹外部州鎮至有微服雜亂於府寺間以求百官疵失其所窮治有司苦加訊惻而多相誣逮輒劾以不敬諸司官贓二丈皆斬又增律七十九章門房之誅十有三大辟三十五刑六十二和平末冀州刺史源賀上言自非大逆手殺人者}
