  - {type: variant, offset: 354, length: 4, content: 採塵黷旒, WYG: 降授者三年之後聽依其本品之資出身詔從之其年秋符璽郞中高賢弟員外散騎侍郞仲賢叔司徒府主簿六珍等坐弟季賢同元愉逆除名爲民㑹赦之後被旨勿論尚書邢巒奏案季賢旣受逆官爲其𫝊檄規扇幽瀛遘兹禍亂據律凖犯罪當孥戮兄叔坐法法有明典賴蒙大宥身命獲全除名還民於其爲幸然反逆坐重故支屬相及體旣相及事同一科豈有赦前皆從流斬之罪赦後獨除反者之身又緣坐之罪不得以職除流且貨賕小愆宼盜微戾贓狀露驗者會赦猶除其名何有罪極裂冠釁均毁}
