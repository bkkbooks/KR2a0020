  - {type: variant, offset: 333, length: 0, content: '', WYG: 位高祖猶躬覽萬幾刑政嚴明顯拔淸節沙汰貪鄙牧守之廉潔者往往有聞焉延興四年詔自非大逆干紀者皆止其身罷門房之誅自獄付中書覆案後頗上下法遂罷之獄有大疑乃平議焉先是諸曹奏事多有疑請又口傳詔敕或致矯擅於是事無大小皆令據律正名不得疑奏合則制可失𠂻則彈詰之盡從中墨詔自是事咸精詳下莫敢相罔顯祖}
