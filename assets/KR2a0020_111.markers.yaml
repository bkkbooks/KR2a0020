  - {type: variant, offset: 334, length: 2, content: 并前, WYG: 年尤重刑罰言及常用惻愴每於獄案必令覆鞫諸有囚繫或積年不斷羣臣頗以爲言帝曰獄滯雖非治體不猶愈乎倉卒而濫也夫人幽苦則思善故囹圄與福堂同居朕欲其改悔而加以輕恕耳由是囚繫雖淹滯而刑罰多得其所又以赦令屢下則狂愚多僥幸故自延興終於季年不復下赦理官鞫囚杖限五十而有司欲免之則以細捶欲陷之則先大杖民多不勝而誣引或絕命於杖下顯祖知其若此乃爲之制其捶用荆平其節訊囚者其本大三分杖背者二分撻脛者一分拷悉依令皆從於輕簡也高祖馭宇留心刑法故事斬者皆裸形伏質入死者絞雖有律未之行也太和元年詔曰刑法所以禁暴息姦絕其命不在裸形其參詳舊典務從寛仁司徒元丕等奏言聖心垂仁恕之惠使受戮者免裸骸之恥普天感德莫不幸甚臣等謹議大逆及賊各棄市袒斬盗及吏受賕各絞刑踣諸甸師又詔曰民由化穆非嚴刑所制防之雖峻陷者罙甚今犯法至死同入斬刑去衣裸體男女媟見豈齊之以法示之以禮者也今具爲之制三年下詔曰治因政寛弊由網密今候職千數姦巧弄威重罪受賕不列細􅂈吹毛而舉其一切罷之於是更置謹直者數百人以防諠鬭於街術吏民安其職業先是以律令不具姦吏用法致有輕重詔中書令高閭集中秘官等修改舊文隨}
