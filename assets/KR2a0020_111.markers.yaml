  - {type: variant, offset: 361, length: 2, content: 冰谷, krp: 凖律斟降合刑五歲至如買者知是良人決便眞賣不語前人得之由緒前人謂眞奴婢更或轉賣因此流洞罔知所在家人追贖求訪無處永沉賤隷無復良期案其罪狀與掠無異且法嚴而姦易息政寛而民多犯水火之喻先典明文今謂買人親屬而復決賣不告前人良狀由緒處同掠罪太保高陽王雍議曰州處張回專引盜律檢回所犯本非和掠保證明然去盜遠矣今引以盜律之條處以和掠之罪原情究律實爲乖當如臣鈞之議知買掠良人者本無罪文何以言之羣盜彊盜無首從皆同和掠之罪故應不異明此自無正條引類以結罪臣鴻以轉賣流漂罪與掠等可謂罪人斯得案賊律云謀殺人而發覺者流從者五歲刑已傷及殺而還蘇者死從者流已殺者斬從而加功者死不加者流詳沉賤之與身死流漂之與腐骨一存一亡爲害孰甚然賊律殺人有首從之科盜人賣買無唱和差等謀殺之與和掠同是良人應爲凖例所以不引殺人減之降從彊盜之一科縱令謀殺之與彊盜俱得爲例而似從輕其義安在又云知人掠盜之物而故賣者以隨從論此明禁暴掠之原遏姦盜之本非謂市之於親尊之手而同之於盜掠之刑竊謂五服相賣俱是良人所以容有差等之罪者明去掠盜理遠故從親疏爲差級尊卑爲輕重依律諸共犯罪皆以發意爲首明賣買之元有由魁末之坐宜定若羊皮不云賣則回無買心則羊皮爲元首張回爲從坐首有沾刑之科從有極黙之戾推之憲律法刑無據買者之罪宜各從賣者之坐又詳臣鴻之議有從他親屬買得良人而復眞賣不語後人由狀者處同掠罪旣一爲婢賣與不賣俱非良人何必以不賣爲可原轉賣爲難恕張回之愆宜鞭一百賣子葬親孝誠可美而表賞之議未聞刑罰之科已降恐非敦風厲俗以德導民之謂請免羊皮之罪公酬賣直詔曰羊皮賣女葬母孝誠可嘉便可特原張回雖買之於父不應轉賣可刑五歲先是皇族有譴皆不持訊時有宗士元顯富犯罪須鞫宗正約以舊制尚書李平奏以帝宗磐固周布於天下其屬籍疎遠蔭官卑末無良犯憲理須推究請立限斷以爲定式詔曰雲來綿逺繁衍世滋植籍宗氏而爲不善量亦多矣先朝旣無不訊之格而空相矯恃以長違暴諸在議請之外可悉依常法其年六月兼廷尉卿元志監王靖等上言檢除名之例依律文獄成謂處罪案成者寺謂犯罪逕彈後使覆檢鞫證定刑罪狀彰露案署分兩獄理是成若使案雖成雖已申省事下廷尉或寺以情狀未盡或邀駕撾鼔或門下立疑更付别使者可從未成之條其家人陳訴信其專辭而阻成斷便是曲遂於私有乖公體何者五詐旣窮六備已立僥倖之軰更起異端進求延罪於漏刻退希不測之恩宥辨以惑正曲以亂直長民姦於下隳國法於上竊所未安大理正崔纂評楊機丞甲休律博士劉安元以爲律文獄已成及決竟經所綰而疑有姦欺不直於法及訴寃枉者得攝訊覆治之檢使處罪者雖已案成御史風彈以痛誣伏或拷不承引依證而科或有私嫌彊逼成罪家人訴枉辭案相背刑憲不輕理須訊鞫旣爲公正豈疑於私如謂規不測之澤抑絕訟端則枉滯之徒終無申理若從其案成便乖覆治之律然未判經赦及覆治理狀眞僞未分承前以來如此例皆得復職愚謂經奏遇赦及已覆治得爲獄成尚書李韶奏使雖結案處上廷尉解送至省及家人訴枉尚書納辭連解下鞫未檢遇宥者不得爲案成之獄推之情理謂崔纂等議爲允詔從之熙平中有冀州妖賊延陵王買負罪逃亡赦書斷限之後不自歸首廷尉卿裴延儁上言法例律諸逃亡赦書斷限之後不自歸首者復罪如初依賊律謀反大逆處置梟首其延陵法權等所謂月光童子劉景暉者妖言惑衆事在赦後闕合死坐正崔纂以爲景暉云能變爲蛇雉此乃傍人之言雖殺暉爲無理恐赦暉復惑衆是以依違不敢專執當今不諱之朝不應行無罪之戮景暉九歲小兒口尚乳臭舉動云爲並不闗己月光之稱不出其口皆姦吏無端横生粉墨所謂爲之者巧殺之者能若以妖言惑衆據律應死然更不破闕惑衆赦令之後方顯其律令之外更求其罪赦律何以取信於天下天下焉得不疑於赦律乎書曰與殺無辜寧失有罪又案法例律八十已上八歲已下殺傷論坐者上請議者謂悼耄之罪不用此律愚以老智如尚父少惠如甘羅此非常之士可如其議景暉愚小自依凡律靈太后令曰景暉旣經恩宥何得議加橫罪可謫略陽民餘如奏時司州表河東郡民李憐生行毒藥案以死坐其母訴稱一身年老更無朞親例合上請檢籍不謬未及判申憐母身䘮州斷三年服終後乃行決司徒曹參軍許琰謂州判爲允主簿李瑒駮曰案法例律諸犯死罪若祖父母父母年七十已上無成人子孫旁無朞親者具狀上請流者鞭笞留飬其親終則從流不在原赦之例檢上請之言非應府州所决毒殺人者斬妻子流計其所犯實重餘憲凖之情律所虧不淺且憐旣懷酖毒之心謂不可參隣人任計其母在猶宜闔門投畀况今死也引以三年之禮乎且給假殯葬足示仁寛今已卒哭不合更延可依法處斬流其妻子實足誡彼氓庶肅是刑章尚書蕭寳夤奏從瑒執詔從之舊制直閣直後直齋武官隊主隊副等以比視官至於犯譴不得除罪尚書令任城王澄奏案諸州中正亦非品令所載又無祿恤先朝已來皆得當刑直閣等禁直上下有宿衛之勤理不應異靈太后令凖中正神龜中蘭陵公主駙馬都尉劉輝坐與河陰縣民張智壽妹容妃陳慶和妹慧猛姦亂耽惑毆主傷胎輝懼罪逃亡門下處奏各入死刑智壽慶和並以知情不加防限處以流坐詔曰容妃慧猛恕死髠鞭付宮餘如奏尚書三公郞中崔纂執曰伏見旨募若獲劉輝者職人賞二階白民聽出身進一階厮役免役奴婢爲良案輝無叛逆之罪賞同反人劉宣明之格又尋問下處奏以容妃慧猛與輝私姦兩情躭惑令輝俠忿毆主傷胎雖律無正條罪合極法並處入死其智壽等二家配敦煌爲兵天慈廣被不卽施行雖恕其命竊謂未可夫律令高皇帝所以治天下不爲喜怒增減不由親疎改易案鬬律祖父母父母忿怒以兵刃殺子孫者五歲刑毆殺者四歲刑若心有愛憎而故殺者各加一等雖王姬下降貴殊常妻然人婦之孕不得非一夕生永平四年先朝舊格諸刑流及死皆首罪判官後決從者事必因本以求支獄若以輝逃避便應懸處未有捨其首罪而成其未愆流死參差或時末允門下中禁大臣職在敷奏昔邴吉爲相不存鬬斃而問牛喘豈不以司别故也案容妃等罪止於姦私若擒之穢席衆證分明卽律科處不越刑坐何得同宮掖之罪齊奚官之闕案智壽口訴妹適司士曹參軍羅顯貴已生二女於其夫則他家之母禮云婦人不二夫猶日不二天若私門失度罪在於夫釁非兄弟昔魏晉未除五族之刑有免子戮母之坐何曾諍之謂在室之女從父母之刑已醮之婦從夫家之刑斯乃不刋之令軌古今之通議律朞親相隱之謂凡罪况姦私之醜豈得以同氣相證論刑過其所犯語情又乖律憲案律姦罪無相緣之坐不可借輝之忿加兄弟之刑夫刑人於市與衆棄之爵人於朝與衆共之明不私於天下無欺於耳目何得以非正刑書施行四海刑名一失駟馬不追旣有詔旨依卽行下非律之案理宜更請尚書元脩議以爲昔哀姜悖禮於魯齊侯取而殺之春秋所譏又夏姬罪濫於陳國但責徴舒而不非父母明婦人外成犯禮之愆無闗本屬況出適之妹釁及兄弟乎右僕射游肇奏言臣等謬參樞轄獻替是司門下出納謨明常則至於無良犯法職有司存劾罪結案本非其事容犯等姦狀罪止於刑並處極法凖律未當出適之女坐及其兄推據典憲理實爲猛又輝雖逃刑罪非孥戮募同大逆亦謂加重乖律之案理宜陳請乞付有司重更詳議詔曰輝悖法者之罪不可縱厚賞懸募必望擒獲容妃慧猛與輝私亂因此耽惑主致非常此而不誅將何懲肅且已醮之女不應坐及昆弟但智壽慶和知妹姦情初不防禦招引劉輝共成淫醜敗風穢化理深其罰特敕門下結獄不拘恒司豈得一同常例以爲通凖且古有詔獄寧復一歸大理而尚書治本納言所屬弗究悖理之淺深不詳損化之多少違彼義途茍存執憲殊乖任寄深合罪責崔纂可免郞都坐尚書悉奪祿一時孝昌已後天下淆亂法令不恒或寛或猛及尒朱擅權輕重肆意在官者多以深酷爲能至遷鄴京畿羣盗頗起有司奏立嚴制諸彊盜殺人者首從皆斬妻子同籍配爲樂戸其不殺人及贓不滿五匹魁首斬從者死妻子亦爲樂戸小盜贓滿十匹已上魁首死妻子配驛從者流侍中孫騰上言}
