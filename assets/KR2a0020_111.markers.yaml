  - {type: variant, offset: 347, length: 1, content: 妨, WYG: 聞王者繼天子物爲民父母導之以德化齊之以刑法小大必以情哀矜而勿喜務於三訊五聽不以木石定獄伏惟陛下子愛蒼生恩侔天地疏網改祝仁過商后以枷杖之非度愍民命之或傷爰降慈旨廣垂昭恤雖有虞愼獄之深漢文惻隱之至亦未可共日而言矣謹案獄}
