  - {type: variant, offset: 343, length: 0, content: '', WYG: 二章門房之誅十有六大辟之罪二百三十五刑三百七十七除羣行剽劫首謀門誅律重者止梟首時法官及州郡縣不能以情折獄乃爲重枷大幾圍復以縋石懸於囚頸傷内至骨更使壯卒迭搏之囚率不堪因以誣服吏持此以爲能帝聞而傷之乃制非大逆有明證而不款辟者不得大枷律枉法十匹義贓二百匹大辟至八年始班祿制更定義贓}
