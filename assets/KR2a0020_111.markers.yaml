  - {type: variant, offset: 364, length: 1, content: 啟, WYG: 詳法若畫一理尚不二不可喜怒由情而致輕重案律公私刼盜罪止流刑而比執事苦違好爲穿鑿律令之外更立餘條通相糺之路班捉獲之賞斯乃刑書徒設獄訟更煩法令滋彰盜賊多有非所謂不嚴而治遵守典故者矣臣以爲升平之美義在省刑陵遲之弊必由峻法是以漢約三章天下歸德秦酷五刑率土瓦解禮訓君子律禁小人舉罪定名國有常辟至如眚災肆赦怙終賊刑經典垂言國朝成範隨時所用各有司存不宜巨細滋煩令民豫備恐防之彌堅攻之彌甚請諸犯盜之人悉准律令以明恒憲庶使刑殺折𠂻不得棄本從末詔從之天平後遷移草剏百司多不奉法貨賄公行興和初齊文襄王入輔朝政以公平肅物大改其風至武定中法令嚴明四海知治矣魏書卷一百一}
