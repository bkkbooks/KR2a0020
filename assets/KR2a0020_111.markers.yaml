  - {type: variant, offset: 135, length: 8, content: 跨蹤前載順末克讓, WYG: 毁先王之典制挾書之禁法繁於秋荼網密於凝脂姦僞並生赭衣塞路獄犴淹積囹圄成市於是天下怨叛十室而九漢祖入闗蠲削煩苛致三章之約文帝以仁厚斷獄四百幾致刑措孝武世以姦宄滋甚增律五十餘篇宣帝時路溫舒上書曰夫獄者天下之命書曰與其殺不辜寧失有罪今治獄吏非不慈仁也上下相敺以刻爲明深者獲公名平者多後患故治獄吏皆欲人死非憎人也自安之道在人之死夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以示人吏治者利其然則指導以明之上奏畏郤則鍜鍊而周内之雖咎繇聽之猶以爲死有餘罪何則文致之罪故也故天下之患莫深於獄宣帝}
