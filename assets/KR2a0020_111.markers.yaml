  - {type: variant, offset: 343, length: 0, content: '', krp: 二章門房之誅十有六大辟之罪二百三十五刑三百七十七除羣行剽劫首謀門誅律重者止梟首時法官及州郡縣不能以情折獄乃爲重枷大幾圍復以縋石懸於囚頸傷内至骨更使壯卒迭搏之囚率不堪因以誣服吏持此以爲能帝聞而傷之乃制非大逆有明證而不款辟者不得大枷律枉法十匹義贓二百匹大辟至八年始班祿制更定義贓}
  - {type: variant, offset: 344, length: 1, content: 卷, WYG: 匹枉法無多少皆死是秋遣使者廵行天下糾守宰之不法坐贓死者四十餘人食祿者跼蹐賕謁之路殆絕帝哀矜庶獄至於奏讞率從降恕全命徙邊歲以千計京師决死獄歲竟不過五十州鎮亦簡十一年春詔曰三千之罪莫大於不孝而律不遜父母罪止髠刑於理未衷可更詳改又詔曰前命公卿論定刑典而門房之誅猶在律策違失周書父子異罪推古求情意甚無取可更議之刪除繁酷秋八月詔曰律文刑限三年便入極黙坐無太半之校罪有死生之殊可詳案律條諸有此類更一刋定冬十月復詔公卿令參議之十二年詔犯死罪若父母祖父母年老更無成人子孫又無朞親者仰案後列奏以待報著之令格世宗卽位意在寛政正始元年冬詔曰議獄定律有國攸愼輕重損益世或不同先朝垂心典憲刋革令軌但時屬征役未之詳究施於時用猶致疑舛尚書門下可於中書外省論律令諸有疑事斟酌新舊更加思理增減上下必令周備隨有所立别以申聞庶於循變協時永作通制永平元年秋七月詔尚書檢枷杖大小違制之由科其罪失尚書令高肇尚書僕射淸河王懌尚書邢巒尚書李平尚書江陽王繼等奏曰}
