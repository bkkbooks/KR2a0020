  - {type: variant, offset: 359, length: 1, content: 墮, WYG: 父子齊刑兄弟共罰赦前同斬從流赦後有復官之理依律則罪合孥戮凖赦則例皆除名古人議無將之罪者毁其室洿其宮絕其蹤滅其類其宅猶棄而況人乎請依律處除名爲民詔曰死者旣在赦前又員外非在正侍之限便可悉聽復仕三年尚書李平奏冀州阜城民費羊皮母亡家貧無以葬賣七嵗子與同城人張回爲婢回轉賣於鄃縣民梁定之而不言良狀案盜律掠人掠賣人和賣人爲奴婢者死回故買羊皮女謀以轉賣依律處絞刑詔曰律稱和賣人者謂兩人詐取他財今羊皮賣女告回稱良張回利賤知良公買誠於律俱乖而兩各非詐此女雖父賣爲婢體本是良回轉賣之日應有遲疑而賣者旣以有罪買者不得不坐但賣者以天性難奪支屬易遺尊卑不同故罪有異買者知良故買又於彼無親若買同賣者卽理不可何者賣五服内親屬在尊長者死此亦非掠從其眞買曁於致罪刑死大殊明知買者之坐自應一例不得全如鈞議云買者之罪不過賣者之咎也且買者於彼無天性支屬之義何故得有差等之理又案别條知人掠盗之物而故買者以隨從論依此律文知人掠良從其宜買罪止於流然其親屬相賣坐殊凡掠至於買者亦宜不等若處同流坐於法爲}
