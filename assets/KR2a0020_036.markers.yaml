  - {type: variant, offset: 20, length: 0, content: '', krp: 父系慕容垂散騎侍郎東武城令治有}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 名太祖定中原以系為平棘令年老卒於家贈寧朔將軍趙郡太守平棘男順博渉經史有才䇿知名於世神瑞中中書博士轉中書侍郎始光初從征蠕蠕以籌略之功拜後軍將軍仍賜爵平棘子加奮威將軍世祖將討赫連昌謂崔浩曰朕前北征李順獻䇿數事實合經略大謀今欲使揔攝前驅之事卿以為何如浩對曰順智足周務實如聖㫖但臣與之婚姻深知其行然性果於去就不可專委世祖乃止初浩弟娶順妹又以弟子娶順女雖二門婚媾而浩頗輕順順又弗之伏也由是濳相猜忌故浩毁之至統萬大破昌軍順謀功居右轉拜}
  - {type: page-break, offset: 21, content: '', id: KR2a0020_WYG_036-1b, image: WYG0261/WYG0261-0512d.png}
