  - {type: variant, offset: 37, length: 0, content: '', WYG: 尋除光祿大夫守度支尚書二十一年髙祖幸長安冏以咸陽山河險固秦漢舊都古稱陸海勸髙祖去洛陽而都之後髙祖引見笑而謂之曰卿一昨有啟欲朕都此昔婁敬一説漢祖即日西駕尚書今以西京説朕仍使朕不廢東轅當是獻可理殊所以今古相反耳冏對曰昔漢祖起於布衣欲藉嶮以自固婁敬之言合於本㫖今陛下百世重光德洽四海事同隆周均其職貢是以愚臣獻説不能上動髙祖大悦其年冏卒賜錢二十萬布百匹朝服一具衣一襲冏性鯁烈敢直言常面折髙祖彈駮公卿無所回避百寮皆憚之髙祖常加優禮故車駕廵幸恒兼尚書右僕射雖才學不及諸兄然公彊當世堪濟過之子祐字長禧篤穆友于見稱於世歴位給事中尚書祠部郎相州撫軍府長史司空從事中郎博陵太守所在亦以清幹著稱祐弟太字季寧渉歴書傳太尉行軍員外郎順弟修基陳留太守卒子探幽探幽兄子洪鸞河間太守洪鸞孫悕傑樂陵太守武定中以貪汙賜死修基季弟惲字善祖小字藥囊少有髙名為中書侍郎從世祖征涼州戰没時人咸惜焉初順與從兄靈從弟孝伯竝以學識器業見重於時故能砥礪宗族競名修尚靈與族叔詵族弟熙等俱被徴事在髙允髙士頌詵字令孫京兆太守詵後繼闕秀林小名榼性彊直太和中自中書博士為頓丘相豪右畏之景明初試守博陵郡抑彊扶弱政以威嚴為名以母憂去職後為太尉諮議參軍}
