  - {type: variant, offset: 2694, length: 2744, content: 兼武衞將軍每以鯁氣正辭為北海王詳所忿面責忠曰我憂在前見爾死不憂爾見我死時也忠曰人生於世自有定分若應死於王手避亦不免若其不爾王不能殺詳因忠表讓之際密勸世宗以忠為列卿令解左右聽其讓爵於是詔停其封優進太府卿正始二年秋詔忠以本官使持節兼侍中為西道大使刺史鎮將贓罪顯暴者以狀申聞守令已下便即行決與撫軍將軍尚書李崇分使二道忠劾并州刺史高聰贓罪二百餘條論以大辟還除平西將軍華州刺史遭繼母憂不行服闋授安北將軍相州刺史又為衞尉卿河南邑中正詔忠與吏部尚書元暉度支尚書元匡河南尹元萇等推定代方姓族高肇忌其為人欲密出之乃言於世宗稱中山要鎮作捍須才以忠器能宜居其位於是出授安北將軍定州刺史世宗既而悔之復授衞尉卿領左衞將軍州大中正密遣中使詔曰自比股肱褫落心膂無寄方任雖重比此為輕故輟茲外任委以內務當勤夙無怠稱朕所寄也延昌初除都官尚書加平南將軍領左衞中正如故又加散騎常侍嘗因侍宴賜之劍杖舉酒屬忠曰卿世秉貞節故以禁衞相委昔以卿行忠賜名曰忠今以卿才堪禦侮以所御劍杖相賜循名取義意在不輕其出入周旋以自防也忠頓首陳謝遷侍中領軍將軍忠面陳讓云臣無學識不堪兼文武之任世宗曰當今學識有文者不少但心直不如卿欲使卿劬勞於下我當憂無於上及世宗崩夜中與侍中崔光遣右衞將軍侯剛迎肅宗於東宮而即位忠與門下議以肅宗幼年未親機政太尉高陽王雍屬尊望重宜入居西柏堂省決庶政任城王澄明德茂親可為尚書令總攝百揆奏中宮請即敕授御史中尉王顯欲逞姦計與中常侍給事中孫伏連等厲色不聽寢門下之奏宮闕侍中黃門但牒六輔姓字齎來孫伏連等密欲矯太后令以高肇錄尚書事顯與高猛為侍中忠即於殿中收顯殺之忠既居門下又總禁衞遂秉朝政權傾一時初太和中軍國多事高祖以用度不足百官之祿四分減一忠既擅權欲以惠澤自固乃悉歸所減之祿職人進位一級舊制天下之民絹布一匹之外各輸綿麻八兩忠悉以與之忠白高陽王雍自云世宗本許優轉雍憚忠威權便順其意加忠車騎大將軍忠自謂新故之際有安社稷之功諷動百僚令加己賞於是太尉雍清河王懌廣平王懷難違其意議封忠常山郡開國公食邑二千戶百僚咸以為然忠又難於獨受乃諷朝廷同在門下者皆加封邑尚書左僕射郭祚尚書裴植以忠權勢日盛勸雍出忠忠聞之逼有司誣奏其罪郭祚有師傅舊恩裴植擁地入國忠並矯詔殺之朝野憤怨莫不切齒王公已下畏之累跡又欲殺高陽王雍侍中崔光固執乃止遂免雍太尉以王還第自此之後詔命生殺皆出於忠既尊靈太后為皇太后居崇訓宮忠為儀同三司尚書令領崇訓衞尉侍中領軍如故靈太后臨朝解忠侍中領軍崇訓衞尉止為儀同尚書令加侍中忠為令旬餘靈太后引門下侍官于崇訓宮問曰忠在端右聲聽何如咸曰不稱厥位乃出忠使持節都督冀定瀛三州諸軍事征北大將軍冀州刺史太傅清河王等奏曰竊惟先帝升遐之初皇上登極之始四海謐然宇內晏清至於奉迎乘輿侍衞省闥斯乃臣子之常節職司之理不容以此為功妄開井邑臣等前議所以廣建茅土者正以畏迫威權苟免暴戾故也是以中議之際以十三日夜入為無勳唯以拒違矯令抑黜姦回微可褒以前侍中臣忠總攝文武侍中臣光久在樞密讚同其意故唯賞二人今尚書臣昭等無涯上訴奉敕重議案王顯陰結姦徒志為不逞高肇遠同凶逆遙搆禍端無將之罪事合洿戮而忠等徵罪唯以厥身不至孥戮又出罪人窮治不盡案律準憲事在不輕暨皇上纂曆聖后別宮母子隔異溫清道絕皆忠等之咎過方厥勳功微罪重又忠專權之後擅殺樞納輒廢宰輔令朝野駭心遠近怪愕功過相除悉不合賞請悉追奪靈太后從之熙平元年春御史中尉元匡奏曰臣聞事主不以幽貞革心奉上不以捨虧節是以倚秦宮而慟哭復楚之功已多陟盧龍而樹勤廣魏之勳不淺而申包避賞君子於是義之田疇拒命良史所以稱美竊唯宮車晏駕天人位易正是忠臣孝子致節之秋前領軍將軍臣忠不能砥礪名行自求多福方因矯制擅相除假清官顯職歲月隆崇臣等在蕃之時乃心家國書誚往來憤氣成疚傷禮敗德臣忠即主謹案臣忠世以鴻勳盛德受遇累朝出入承明左右機近幸國大災肆其愚戇專擅朝命無人臣之心裴郭受寃於既往宰輔黜辱於明世又自矯旨為儀同三司尚書令領崇訓衞尉原其此意便欲無上自處既事在恩後宜加顯戮請御史一人令史一人就州行決崔光與忠雖同受召而謂光既儒望朝之禮宗攝心虛遠不關世務但忠以光意望崇重逼光光若不同又有危禍伏度二聖欽明深垂昭恕而自去歲正月十三日世宗晏駕以後八月一日皇太后未親覽以前諸有不由階級而權臣用命或發門下詔書或由中書宣敕擅相拜授者已經恩宥正可免其叨竊之罪既非時望朝野所知冒階而進者並求追奪靈太后令曰直繩所糾實允朝憲但忠事經肆宥又蒙特原無宜追罪餘如奏又詔曰忠以往年大諱之際開崇邑土然酬庸理乖有司執奪豈宜一謬棄其餘勳也但忠厥任禁要誠節皎然宜褒錫山河以安厥望可靈壽縣開國公邑五百戶初世宗崩後高太后將害靈太后劉騰以告侯剛剛以告忠忠請計於崔光光曰宜置胡嬪於別所嚴加守衞理必萬全計之上者忠等從之具以此意啟靈太后太后意乃安故太后深德騰等四人並有寵授忠以毀之者多懼不免禍願還京師欲自營救靈太后不許二年四月除尚書右僕射加侍中將軍如故神龜元年三月復儀同三司疾病未拜見裴郭為祟忠自知必死表曰先帝錄臣父子一介之誠昭臣家世奉公之節故申之以婚姻重之以爵祿至乃位亞三槐秩班九命自大明利見之始百官總己之初臣復得猥攝禁戎緝寧內外斯誠社稷之靈兆民之福臣何力之有焉但陛下以叡明御宇皇太后以聖善臨朝衽席不遺簪屨弗棄復乃寵窮出內榮遍宮闈外牧兩河入參百揆顧服知妖省躬識戾而臣將慎靡方致茲痾疚自去秋苦痢纏綿迄今藥石備嘗日增無損又今年已來力候轉惡微喘緒息振復良難鴻慈未酬伏枕涕咽臣薄福無男遺體莫嗣貪及餘生謹陳宿抱臣先養亡第四弟第二子司徒掾永超為子猶子之念實切於心乞立為嫡傳此山河靈太后令曰于忠表如此既誠勳宜錄又無子可矜臨危所祈不容致奪可特聽如請以彰殊效忠薨年五十七給東園祕器朝服一具衣一襲錢二十萬布七百匹蠟三百斤贈侍中司空公有司奏太常少卿元端議忠剛直猛暴專戇好殺案諡法剛強理直曰武怙威肆行曰醜宜諡武醜公太常卿元脩義議忠盡心奉上剪除凶逆依諡法除偽寧真曰武夙夜恭事曰敬諡武敬公二卿不同事奏靈太后令曰可依正卿議于氏自曾祖四世貴盛一皇后四贈三公領軍尚書令三開國公忠性多猜忌不交勝己唯與直閤將軍章初瓌千牛備身楊保元為斷金之交李世哲求寵於忠私以金帛寶貨事初瓌保元初瓌保元談之遂被賞愛引為腹心忠擅權昧進為崇訓之由皆世哲計也忠後妻中山王尼須女微解詩書靈太后臨朝引為女侍中賜號范陽郡君永超名翻襲爵尋卒子世衡襲齊受禪例降忠弟景字百年自司州從事稍遷步兵校尉寧朔將軍高平鎮將坐貪殘受納為御史中尉王顯所彈會赦免忠薨後景為武衞將軍謀廢元叉叉黜為征虜將軍懷荒鎮將及蠕蠕主阿那瓌叛亂鎮民固請糧廩而景不給鎮民不勝其忿遂反叛執縛景及其妻拘守別室皆去其衣服令景著皮裘妻著故絳襖其被毀辱如此月餘乃殺之烈弟敦自中散遷驍騎將軍景明中假節行并州事除征虜將軍州刺史卒官贈使持節平北將軍州刺史子昕員外郎直後主衣都統揚烈將軍懷朔武川鎮將中散大夫孝昌中使蠕蠕與阿那瓌擒逆賊破洛汗聽明出六斤等轉, WYG: ''}
