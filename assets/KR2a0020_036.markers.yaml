  - {type: variant, offset: 758, length: 758, content: 為使持節散騎常侍寧東將軍和龍鎮都大將營州刺史以治有能名進號安東將軍又為外都大官會隴西屠各王景文等恃險竊命私署王侯高宗詔洛拔與南陽王惠壽督四州之衆討平之徙其惡黨三千餘家於趙魏轉拜侍中殿中尚書遷尚書令侍中如故在朝祗肅百僚憚之太安四年卒時年四十四洛拔有六子長子烈善射少言有不可犯之色少拜羽林中郎遷羽林中郎將延興初敕領寧光宮宿衞事遷屯田給納太和初秦州刺史尉洛侯雍州刺史宜都王目辰長安鎮將陳提等貪殘不法烈受詔案驗咸獲贓罪洛侯目辰等皆致大辟提坐徙邊仍以本官行秦雍二州事遷司衞監總督禁旅從幸中山車駕還次肆州司空苟頹表沙門法秀月斗惑百姓潛謀不軌詔烈與吏部尚書闕丞祖馳驛討之會秀已平轉左衞將軍賜爵昌國子遷殿中尚書賜帛三千匹于時高祖幼冲文明太后稱制烈與元丕陸叡李沖等各賜金策許以有罪不死加散騎常侍遷前將軍進爵洛陽侯尋轉衞尉卿從駕南征加鎮南將軍及遷洛陽人情戀本多有異議高祖問烈曰卿意云何烈曰陛下聖略淵遠非愚管所測若隱心而言樂遷之與戀舊唯中半耳高祖曰卿既不唱異即是同深感不言之益宜且還舊都以鎮代邑敕留臺庶政一相參委車駕幸代執烈手曰宗廟至重翼衞不輕卿當祗奉靈駕時遷洛邑朕以此事相託顧非不重也烈與高陽王雍奉遷神主於洛陽高祖嘉其勳誠遷光祿卿十九年大選百僚烈子登引例求進烈表曰臣上或近臣下不決引一人疑而恩出分外冀荷榮祿當今聖明之朝理應謙讓而臣子登引人求進是臣素無教訓請乞黜落高祖曰此乃有識之言不謂烈能辦此乃引見登詔曰朕今創禮新邑明揚天下卿父乃行謙讓之表而有直士之風故進卿為太子翊軍校尉又加烈散騎常侍封聊城縣開國子食邑二百戶及穆泰陸叡謀反舊京高祖幸代泰等伏法賜烈及李沖璽書述金策之意語在陸叡傳是逆也代鄉舊族同惡者多唯烈一宗無所染預高祖嘉其忠操益器重之歎曰元儼決斷威恩深自不惡然而為臣盡忠猛決不如烈也爾日烈在代都必即斬其五三元首耳烈之節概不謝金日磾也詔, WYG: ''}
