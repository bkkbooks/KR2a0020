  - {type: variant, offset: 25, length: 0, content: '', WYG: 之月余承之攝官直於本省對九重之清切望八襲之崢嶸感代序以長懐觀爽氣而軫慮籠樊之念既多寥廓之想彌切含毫有思斐然成賦猶潘生之秋興王子之登閣也厠鄭璞於周寳編魚目於隋珠未敢自同作者盖亦各言爾忘云荷峻極之層構導積石之洪流有馬形而謨舜亦龍徳而史周爰相趙之鴻烈逮藩魏之優遊為衢樽於上葉號木鐸於前修若豢龍之不隕似窮葉之世濟故抱玉而懐珠且滋蘭而樹蕙或舟楫以匡時或棲遲以卒嵗尚無忝於先人諒貽厥於來裔書金􅁽以葳蕤布銀繩而昭晰清風忽其緬邈啓皇祖於庚寅李伯仁上東門銘曰上東少陽厥位在寅條風動物月值孟春王}
