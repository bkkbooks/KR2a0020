  - {type: punctuation, offset: 2051, content: 、, id: KR2a0020_ZHSJ_036-bkkpn450}
  - {type: variant, offset: 2051, length: 222, content: 領軍進爵為侯增邑三百戶并前五百戶自是長直禁中機密大事皆所參焉太尉咸陽王禧謀反也武興王楊集始馳於北邙以告時世宗從禽於野左右分散直衞無幾倉卒之際莫知計之所出乃敕烈子忠馳覘虛實烈時留守已處分有備因忠奏曰臣雖朽邁心力猶可此等猖狂不足為慮願緩蹕徐還以安物望世宗聞之甚以慰悅及駕還宮禧已遁逃詔烈遣直閤叔孫侯將虎賁三百人追執之順后既立以世父之重彌見優禮八月暴疾卒時年六十五世宗舉哀於朝堂給東園第一祕器朝服一具衣一襲賜錢二百萬布五百匹贈使持節侍中大將軍太尉公雍, WYG: 兖}
