  - {type: variant, offset: 2318, length: 284, content: 假節振威將軍沃野鎮將貪殘多所受納坐免官以公還第卒贈平州刺史祚子若襲爵多酒過為叔父景所撾殺子順襲卒子馥襲祚弟忠字思賢本字千年弱冠拜侍御中散文明太后臨朝刑政頗峻侍臣左右多以微譴得罪忠朴直少言終無過誤太和中授武騎侍郎因賜名登轉太子翊軍校尉世宗即位遷長水校尉尋除左右郎將領直寢元禧之謀亂也車駕在外變起倉卒未知所之忠進曰臣世蒙殊寵乃心王室臣父領軍付留守之重計防遏有在必無所慮世宗即遣忠馳騎觀之而烈分兵嚴備果如所量世宗還宮撫背曰卿差強人意賜帛五百匹又曰先帝賜卿名登誠為美稱朕嘉卿忠款今改卿名忠既表貞固之誠亦所以名實相副也父憂去職未幾起復本官遷司空長史于時太傅錄尚書北海王詳親尊權重, WYG: ''}
