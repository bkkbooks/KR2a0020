  - {type: variant, offset: 5743, length: 3, content: 長文字, WYG: 恃寧以父事被刑武定末官至中尹恃寧弟子寧襲爵開府黙曹參軍齊禪爵例降熙族孫蘭和自右軍將軍歴平陽勃海二郡太守蘭和弟蘭集平昌太守熙族孫同軌體貌魁岸腰帶十圍學綜諸經多所治誦兼讀釋氏又好醫術年二十二舉秀才射䇿除奉朝請領國子􅂇教轉著作郎典儀注修國史遷國子博}
