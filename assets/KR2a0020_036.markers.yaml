  - {type: variant, offset: 5653, length: 2, content: 元伯, WYG: 惜襲武定末齊文襄王大將軍府記室參軍齊受禪爵例降顯進弟恃顯位至左中郎將卒贈中壘將軍安州刺史恃顯養京兆王愉妾楊氏為女愉改楊姓為李而親念恃顯恃顯子道舒與愉同逆愉敗走免第三子道璩武定末范陽太守道璩弟道瓘少以父譴被刑位至中常侍恃顯弟曄字季顯渉歴書史司徒行參軍稍遷濟州輔國府長史坐兄事免後除尚書中兵郎遷冠軍}
