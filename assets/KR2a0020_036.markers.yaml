  - {type: variant, offset: 5747, length: 1, content: 端, WYG: 加征虜將軍永熙二年出帝幸平等寺僧徒講説敕同軌論難音韻閒朗往復可觀出帝善之三年春釋菜詔延公卿學官於顯陽殿敕祭酒劉廞講孝經黄門李郁講禮記中書舍人盧景宣解大戴禮夏小正篇時廣招儒學引令預聼同軌經義素優辯析兼美而不得執經深為慨恨太平中轉中書侍郎興和中兼通直散騎常侍使蕭衍衍深躭釋學遂集名僧於其愛敬同泰二寺講湼槃大品經引同軌預席衍兼遣其臣竝共觀聼同論難久之道俗咸以為善盧景裕卒齊獻武王引同軌在館敎諸公子甚嘉禮之每旦入授日暮始歸緇素請業者同軌夜為解説四時恒爾不以為倦武定四年夏卒年四十七時人傷惜之齊獻武王亦殊嗟悼賻禭甚厚贈驃騎大將軍瀛州刺史諡曰康同軌兄義深}
