  - {type: variant, offset: 1517, length: 529, content: 領軍將軍以本官從征荊沔加鼓吹一部高祖謂彭城王勰曰烈先朝舊德智勇兼有軍之大計宜共參決宛鄧既平車駕還洛論功加散騎常侍金紫光祿大夫二十三年蕭寶卷遣其太尉陳顯達入寇馬圈高祖輿疾赴之執烈手曰都邑空虛維捍宜重可鎮衞二宮以輯遠近之望顯達破走高祖崩於行宮彭城王勰總一六軍祕諱而返稱詔召世宗會駕魯陽以烈留守之重密報凶問烈處分行留神色無變世宗即位寵任如前咸陽王禧為宰輔權重當時曾遣家僮傳言於烈曰須舊羽林虎賁執仗出入領軍可為差遣烈曰天子諒闇事歸宰輔領軍但知典掌宿衞有詔不敢違理無私給奴惘然而返傳烈言報禧禧復遣謂烈曰我是天子兒天子叔元輔之命與詔何異烈厲色而答曰向者亦不道王非是天子兒叔若是詔應遣官人所由遣私奴索官家羽林烈頭可得羽林不可得禧惡烈剛直遂議出之乃授使持節散騎常侍征北將軍州刺史烈不願藩授頻表乞停輒優答弗許烈乃謂彭城王勰曰殿下忘先帝南陽之詔乎而逼老夫乃至於此遂以疾固辭世宗以禧等專擅潛謀廢之會二年正月礿祭三公並致齋於廟世宗夜召烈子忠謂曰卿父忠允貞固社稷之臣明可早入當有處分忠奉詔而出質明烈至世宗詔曰諸父慢怠漸不可任今欲使卿以兵召之卿其行乎烈對曰老臣歷奉累朝頗以幹勇賜識今日之事所不敢辭乃將直閣已下六十餘人宣旨召咸陽王禧彭城王勰北海王詳衞送至于帝前諸公各稽首歸政以烈為散騎常侍, WYG: ''}
