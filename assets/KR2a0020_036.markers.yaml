  - {type: variant, offset: 21, length: 0, content: '', krp: 名太祖定中原以系為平棘令年老卒於家贈寧朔將軍趙郡太守平棘男順博渉經史有才䇿知名於世神瑞中中書博士轉中書侍郎始光初從征蠕蠕以籌略之功拜後軍將軍仍賜爵平棘子加奮威將軍世祖將討赫連昌謂崔浩曰朕前北征李順獻䇿數事實合經略大謀今欲使揔攝前驅之事卿以為何如浩對曰順智足周務實如聖㫖但臣與之婚姻深知其行然性果於去就不可專委世祖乃止初浩弟娶順妹又以弟子娶順女雖二門婚媾而浩頗輕順順又弗之伏也由是濳相猜忌故浩毁之至統萬大破昌軍順謀功居右轉拜}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 軍將軍後征統萬遷前將軍授之以兵昌出逆戰順督勒士衆破其左軍及克統萬世祖賜諸將珍寳雜物順固辭唯取書數千卷世祖善之至京論功以順為給事黄門侍郎賜奴婢十五戸帛千匹又從擊赫連定於平涼三秦平遷散騎常侍進爵為侯加征虜將軍遷四部尚書甚見寵待沮渠䝉遜以河西内附世祖欲精簡行人崔浩曰䝉遜稱蕃欵著河}
  - {type: variant, offset: 22, length: 0, content: '', krp: 軍將軍後征統萬遷前將軍授之以兵昌出逆戰順督勒士衆破其左軍及克統萬世祖賜諸將珍寳雜物順固辭唯取書數千卷世祖善之至京論功以順為給事黄門侍郎賜奴婢十五戸帛千匹又從擊赫連定於平涼三秦平遷散騎常侍進爵為侯加征虜將軍遷四部尚書甚見寵待沮渠䝉遜以河西内附世祖欲精簡行人崔浩曰䝉遜稱蕃欵著河}
  - {type: variant, offset: 23, length: 1, content: 馳, WYG: 若俾遐域流通殊荒畢至宜令清徳重臣奉詔襃慰尚書李順即其人也世祖曰順納言大臣固不宜先為此使若䝉遜身執玉帛而朝於朕復何以加之浩曰邢貞使呉亦魏之太常茍事是宜無嫌於重爾日之行豈呉王入覲也世祖從之以順為太常䇿拜䝉遜為太傅凉王使還拜使持節都督秦雍梁益四州諸軍事寧西將軍開府長安鎮都大將進爵髙平公未㡬復徴為四部尚書加散騎常侍延和初復使凉州䝉遜遣中兵校郎楊定歸白順曰年衰多疹舊患發動腰脚不隨不堪拜伏比三五日消息小差當相見順曰王之年老朝廷所知以王祗執臣禮别有詔㫖豈得自安不見上使也䝉遜翌日延順入至庭中而䝉遜箕坐隐几無動起之状順正色大言曰不謂此叟無禮乃至於是今則覆亡之不恤而敢陵侮天地魂神逝矣何用見之將握節而出䝉遜使定歸追順於庭曰太常既雅恕衰疾傳云朝廷有不拜之詔是以敢自安耳若太常曰爾拜爾跽而不祗命斯乃小臣之罪矣順益怒曰齊桓公九合諸侯一匡天下周王賜胙命曰伯舅無下拜而桓公奉遵臣節降而拜受今君雖功髙勲厚未若小白之勤朝廷雖相崇重未有不拜之詔如便偃蹇自大此乃速禍之道非圖久安之計若朝廷震怒遂相吞滅悔何及哉䝉遜曰太常規之以古烈懼之以天威敢不翹悚敬聼休命遂拜伏盡禮禮畢䝉遜曰夫恃徳者昌恃力者亡朝廷頃來征伐屢克境宇已博但當循理此民亦足興治然專務討擊恐不可常勝順曰昔太祖廓定洪基造有區夏太宗承統王業惟新自聖上臨御志寧四海是以戎車屢駕親冒風霜滅赫連於三秦走蠕蠕於漠北闢土開邊𨽻首不紀僵屍截馘所在成觀除蕩暴虐存恤黎庶威震八荒聲被九域自古以來用兵之美未有今日之盛是以遐方荒俗之氓莫不翹足抗手歛衽屈膝天兵四臨昭徳罰罪何云恃力夫聖王之用兵也征南蠻則北狄怨討西戎則東夷恨天子安得已哉䝉遜曰誠如來言則凉土之民亦願魏帝逺至何為復遽驛告警不舍晝夜意君之所言殆為虚事順曰苗民叛帝舜而親暴君有扈違后啓而從逆主咸懾逼於近地牽制於凶威自古而然豈獨凉民也順既使還世祖問與䝉遜復往之辭及䝉遜政教得失順曰䝉遜專威河右三十許年經渉艱難粗識機變又綏集荒􅑍逺人頗亦畏服雖不能貽厥孫謀猶足以終其一世前嵗表許十月送曇無懺及臣往迎便乖本意不忠不信於是而甚禮者身之輿敬者行之本未有無禮不敬而能久享福祿以臣觀之不復周矣世祖曰若如卿言則効在無逺其子必復襲世襲世之後早晚當滅順對曰臣略見其子竝非才俊能保一隅如聞敦煌太守牧犍器性粗立若繼䝉遜者必此人也然比之於父僉云不逮殆天所用資聖明也世祖曰朕今方事于東未暇營西如卿所言三五年間不足為晚且停前計以為後圖既而䝉遜死問至世祖謂順曰卿言䝉遜死今則驗矣又言牧犍立何其妙哉朕尅凉州亦當不逺於是賜絹千匹廐馬一乘進號安西將軍寵待彌厚政之巨細無所不參崔浩惡之順凡使涼州十有二返世祖稱其能而䝉遜數與順遊宴頗有悖慢之言恐順東還泄之朝廷尋以金寳納順懐中故䝉遜罪釁得不聞徹浩知之密言於世祖世祖未之信太延三年順復使涼州及還世祖曰昔與卿密圖期之無逺但以頃年東伐未遑西顧荏苒之間遂及于此今和龍既平三方無事比繕甲治兵指營河右掃蕩萬里今其時也卿往復積嵗洞鑒廢興若朕此年行師當尅以不順對曰臣疇日所啟私謂如然但民勞既久未獲寧息不可頻動以増勞悴願待他年世祖從之五年議征涼州順議以涼州之水草不宜逺征與崔浩庭諍浩固執以為宜征世祖從浩議及至姑臧甚豐水草世祖與恭宗書以言其事頗銜順後謂浩曰卿昔所言今果驗矣浩曰臣之所言虚實皆如此類初䝉遜有西域沙門曇無懺㣲有方術世祖詔順令䝉遜送之京邑順受䝉遜金聼其殺之世祖克涼州復聞而嫌順涼土既平詔順差次羣臣賜以爵位順頗受納品第不平涼州人徐桀發其事浩又毁之云順昔受牧犍父子重賂毎言涼州無水草不可行師及陛下至姑臧水草豐足其詐如此㡬誤國事不忠若是反言臣讒之於陛下世祖大怒真君三年遂刑順於城西順死後數年其從父弟孝伯為世祖知重居中用事及浩之誅世祖怒甚謂孝伯曰卿從兄往雖誤國朕意亦未便至此由浩譖毁朕忿遂盛殺卿從兄者浩也皇興初順子敷等貴寵顯祖追贈順侍中鎮西大將軍太尉公髙平王諡曰宣王妻邢氏曰孝妃順四子長子敷字景文真君二年選入中書教學以忠謹給侍東宫又為中散與李訢盧遐度世等竝以聰敏内參機密出入詔命敷性謙恭加有文學髙宗寵遇之遷秘書下大夫典掌要切加前軍將軍賜爵平棘子後兼錄南部遷散騎常侍南部尚書中書監領内外祕書襲爵髙平公朝政大議事無不闗及劉彧徐州刺史薛安都司州刺史常珍奇以彭城懸瓠降附于時朝議謂彼誠偽未可信保敷乃固執必然曰劉氏喪亂釁起蕭墻骨肉内離藩屏外叛今以皇朝之靈兵馬之力兼并之㑹宜在於今况安都珍奇識機歸命奉誠萬里小民元元企仰皇化今之事機安可復失於是衆議乃同遣師接援淮海寧輯敷有力焉敷既見待二世兄弟親戚在朝者十有餘人弟奕又有寵於文明太后李訢列其惡罪二十餘條顯祖大怒皇興四年冬誅敷兄弟削順位號為庶人敷從弟顯德妹夫廣平宋叔珍等皆坐闗亂公私同時伏法敷兄弟敦崇孝義家門有禮至於居喪法度吉凶書記皆合典則為北州所稱美既至斯禍時人歎惜之敷長子伯和次仲良與父俱死伯和走竄嵗餘為人執送殺之伯和有庶子孝祖年小蔵免後敷妻崔氏得出宫養之至平涼太守敷弟式字景則學業知名歴散騎常侍平東將軍西兖州刺史濮陽侯式自以家據權要心慮危禍常敕津吏臺有使者必先啟告然後渡之既而使人平曉卒至津吏欲先告式使者給云我湏南還不停此州不煩令刺史知也津人信之與使俱渡使者既濟突入執式赴都與兄俱死式子憲字仲軌清粹善風儀好學有器度太和初襲爵又降為伯拜祕書中散雅為髙祖所賞稍遷散騎侍郎接對蕭衍使蕭琛范雲以母老乞歸養拜趙郡太守趙脩與其州里脩歸葬父母也牧守以下畏之累跡推憲不為之屈時人髙之轉授驍騎將軍尚書左丞長兼吏部郎中遷長兼司徒左長史定州大中正尋遷河南尹參議新令於尚書上省永平三年出為左將軍兖州刺史四年坐事除名後以黨附髙肇為御史所劾事具髙聰傳正光二年二月肅宗講於國子堂召憲預聼又以子騫為國子生四年拜光祿大夫復本爵濮陽伯五年除持節安西將軍行雍州刺史尋除七兵尚書加撫軍將軍孝昌初元法僧據徐州反叛詔憲為使持節假鎮東將軍徐州都督與安豐王延眀臨淮王彧等討之㑹蕭衍遣其豫章王綜據彭城俄而綜降徐州既平詔遣兼黄門侍郎常景詣軍慰勞賜憲驊騮馬一匹仍除征東將軍揚州刺史淮南大都督二年蕭衍遣其北平將軍元樹右衛將軍胡龍牙䕶軍將軍夏侯亶等來宼夀陽樹等從下蔡軍於城之東北亶從黎漿而屯於城南憲謂不先破元樹等則夏侯亶無由可尅乃遣子長鈞率衆逆戰軍敗長鈞見執樹等乘之憲力屈以城降因求還國衍聼歸既至敕付廷尉三年秋憲女壻安樂王鑒據相州反靈太后謂鑒心懐劫脅遂詔賜憲死時年五十八永熙中贈使持節侍中都督定冀相殷四州諸軍事驃騎大將軍儀同三司尚書令定州刺史諡曰文静子希逺字景沖早卒子祖悛襲祖爵齊受禪例降希逺兄長鈞興和中梁州驃騎府長史希逺第二弟希宗字景𤣥出後憲兄性寛和儀貌雅麗渉獵書傳有文才起家太尉參軍事轉直後領侍御史遷通直散騎常侍尋為東南道行臺邸珍右丞與諸軍討賊於彭沛克之轉齊獻武王大行臺郎中遷散騎常侍中軍大將軍金紫光祿大夫獻武王擢為中外府長史為齊王納其第二女希宗以人望兼美深見禮遇出行上黨太守尋而遘疾興和二年四月卒於郡年四十贈使持節都督定冀滄瀛殷五州諸軍事驃騎大將軍司空公殷州刺史諡曰文簡長子祖昇武定末太子洗馬希宗弟希仁字景山武定末國子祭酒兼給事黄門侍郎希仁弟騫字希義博渉經史文藻富盛年十四國子學生以聰達見知歴大將軍府法曹參軍太宰府主簿轉中散大夫遷中書舍人加通直散騎常侍曾為釋情賦曰單閼之年無}
