  - {type: variant, offset: 25, length: 0, content: '', krp: 之月余承之攝官直於本省對九重之清切望八襲之崢嶸感代序以長懐觀爽氣而軫慮籠樊之念既多寥廓之想彌切含毫有思斐然成賦猶潘生之秋興王子之登閣也厠鄭璞於周寳編魚目於隋珠未敢自同作者盖亦各言爾忘云荷峻極之層構導積石之洪流有馬形而謨舜亦龍徳而史周爰相趙之鴻烈逮藩魏之優遊為衢樽於上葉號木鐸於前修若豢龍之不隕似窮葉之世濟故抱玉而懐珠且滋蘭而樹蕙或舟楫以匡時或棲遲以卒嵗尚無忝於先人諒貽厥於來裔書金冊以葳蕤布銀繩而昭晰清風忽其緬邈啓皇祖於庚寅李伯仁上東門銘曰上東少陽厥位在寅條風動物月值孟春王}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 子詩曰於顯我王緝乘斯民俊明有徳嚴恭惟寅逄軒教之方洽遇周命之惟新譬龍虎其有合信山川而降神若勝庭之五傑似不速之三人協嗜欲於將至豈物色而方臻荷天寵以來儀歩康衢而騁力如乾元之利貞若坤四之方直内弼諧於本朝外闢土於殊域乘紫氛以厲羽負青天而鼓翼既公侯之必復亦慶緒之所融績竝樹於八凱道俱升於二宫遂遵流以至海且因岳而為嵩同羽儀於班氏均載德於楊公何日月之逾邁引寒暑而相終委晉㑹於弱齒遺堂構於㣲躬嗟䝉昧之無取故告舍而不及已濩落而少成又擁腫而無立愧精堅於百鍊慚忠信於十邑非珪璋之特達詎芳菲之易襲未砥礪以自進寧琢磨而成章􅆾宋子之萬字異應生之五行不請觀於石室豈借書於晉皇求班莊而不遂况蔡文之可望參四科其未獲入三選而誰許本無聲於梁魏故未聞於陳汝居玉石以多迷宅顯晦而乘所既無懐於四至安有情於再舉雖衣冠之末胄而世禄之緒餘等渤澥之乘鴈類九罭之逃魚處江淮而不變對朝市而閑居空闔門以靖軌非論道而修書少賔客於季彦謝朋交於太初在正光之御厯實明皇之拱已曾問政於上學著為君而我齒呌閽人以望予遂陟降於庭止同崔駰之謁帝若謝兼之來仕逮孝荘之入統乃道喪而時昏水羣飛於溟海火載燎於中原延膠船而越水若朽索而乘奔玉羊失而無御金雞亡而不存天歩忽其多難横流且其云始既雲擾而海沸亦岳立而棊峙睇三綱之日紊見四維之不理顧茂草以傷懐視匪車而思起雖風雨之如晦亮膠喈而不已自牽役於宰朝實有懐於胥恥在下僚而栖屑願奮迅於泥滓睠故鄉以臨睨悵有動於思歸越來流以鼓枻遡北風而結騑入成都之舊宅反觀津之故扉乃曲肱而不悶信抱甕而無機且耕而食且蠶而衣恒一日以自省亦三月而無違遊仁義之肴覈採墳素之精㣲誠因閑而養拙亦有樂於嘉肥及勾芒御節姑洗之首散遲遲於麗日發依依於弱栁鳥閒闗以呼庭花芬披而落牖聼乃越於笙簧望有踰於新婦襲成服以逍遙願良辰而聊厚乃席壠而踞石遂嘯儔而命偶同浴沂之五六似禊洛之八九或促膝以持肩或援笙而鼔缶賔奉萬年之觴主報千金之夀各笑語而卒獲傳禮儀於不朽斯盖先民之所樂而余心之所守也至於少昊為帝庚辛處躔視墟里之蕭蕭過寒夜之綿綿積霜靄於近援起泬寥於逺天思多端以類長若臨水而登山幸出遊之或寫冀觀濤之可蠲遂杖䇿緩歩或漁或田弋鳬鴈於清溪釣魴鯉於深泉張廣幕布長筵酌濁酒割芳鮮起白雪於促柱奉綠水於危弦賦湛露而不已歌驪駒而未旋跌蕩世俗之外疎散造化之間人生行樂聊用永年悟柱下之稱工聞首陽之為拙既有惜於苽懸且自悲於井渫訪鄭詹之格言求季主之髙說去衡門以策駟望象魏而投轍服毳衣以從務乘大車而就列比汗海而無紀喻江河而有缺睠重地而懼深念索米而慙結運有折於玉斗時忽亡於金鏡始䝉塵以播蕩卒流彘而居鄭彼上天之降鑒實下民之請命因艱難以隆基據殷憂而啟聖調南風以負扆居北辰而為政創彝倫於九疇班平章於百姓喻繩契以論蹤援成昭而比盛酌徙鎬之故典究遷亳之遺令奄四海以為家開七百而増慶覩禮樂之方隆信光華之始映百揆鬱以時序四門穆其惟清如得人於漢世比多士於周庭有一匡以作相或十亂而為楨各秉文而經武故天平而地成伊余身之忝穢得再入於承明執綸言之猶紼戴㑹弁之如星非廵潰以窺井信夕惕而懐驚承周任之有言攬老子之知足奉烱誡以周旋抱徽猷而與屬每有偃於唯塵恒興言於寵辱思散髪以抽簪願全真而守朴睠疎傅以俳􅆦望申公而躑躅冀鄙志之獲展庶㣲願之逢時歌致令而可卜詠歸田而有期揖帝城以髙逝與人事而長辭擊壤而頌結草而嬉援巢父以戲潁追許子而升箕供暮餐於沆瀣給朝餌於瓊芝同糟醨而無别混名實而不治放言肆慾無慮無思何鷦鷯之可賦鴻鵠之為詩哉尋加散騎常侍殷州大中正鎮南將軍尚書左丞仍以本官兼散騎常侍使蕭衍後坐事免論者以為非罪騫嘗贈親友盧元明魏收詩曰幽棲多暇日揔駕萃荒坰南瞻帶宫雉北睇拒畦瀛流火時將末懸炭漸云輕寒風率已厲秋水寂無聲層隂蔽長野凍雨暗窮汀侣浴浮還没孤飛息且驚三禠俄終嵗一丸曾未營閑居同洛涘歸身款武城稍旅原思藋坐夢尹懃荆監河愛斗水蘇子惜餘明益州達友趣廷尉辯交情豈若忻蓬蓽收志偶沉宴後詔兼太府少卿尋除征南將軍給事黄門侍郎死於晉陽所著詩賦碑誄别有集錄贈本將軍太常殷州刺史齊受禪重贈使持節侍中都督殷滄二州諸軍事車騎大將軍儀同三司仍殷州刺史諡曰文惠騫弟希禮字景節武定末通直散騎常侍希逺庶長兄劒興和中梁州驃騎府長史式弟奕字景世美容貌有才}
