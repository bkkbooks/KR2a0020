  - {type: variant, offset: 1917, length: 0, content: '', krp: 雅有智筭頻使稱㫖拜龍驤將軍未幾賜爵日南公從平中原以功進為尚書鎮鄴慕容徳使兄子和守滑䑓和長史李辨殺和求援於䟦䟦率輕騎赴之既至辨悔閉門拒守䟦使尚書郎鄧暉説之辨乃開門䟦入收其府藏徳聞之遣將率三千騎擊䟦䟦逆擊大破之擒其將士千餘人而還於是陳潁之民多来向化改封定陵公與常山王遵率衆五萬討賀蘭部别帥木易干破之出為平原太守太祖寵遇䟦冠於諸将時羣臣皆敦尚恭儉而䟦好修虛譽炫曜於時性尤奢淫太祖戒之弗革後車駕北狩犲山收䟦刑之路側妻劉氏自殺以從初将刑䟦太祖命其諸弟毗等視訣䟦謂毗曰灅北地瘠可居水南就耕良田廣為産業各相勉勵務自纂修令之背己曰汝曹何忍視吾之死也毗等觧其㣲意詐稱使者云奔長安追之不及太祖怒遂誅其家後世祖西廵五原囘幸犲山校獵忽遇暴風雲霧四塞世祖怪而問之羣下僉言䟦世居此土祠冢猶存其或者能致斯變帝遣建興公古弼祭以三牲霧即除散後世祖蒐狩之日每先祭之少子歸從征赫連昌有功拜統萬將軍賜爵成臯男與西平公安頡攻虎牢㧞之進爵髙陽侯後以罪徙配涼州為民蓋吳作亂於關中復拜歸龍驤將軍往討之還拜使持節冠軍將軍雍城鎮都大將髙陽侯}
  - {type: variant, offset: 1918, length: 0, content: '', WYG: 子度襲爵尚書都官郎昌平大守卒度子延穆司州部郡從事早卒子安武定末給事黃門侍郎奚牧代人也重厚有智謀太祖寵遇之稱之曰仲兄初劉顯謀害太祖梁眷知其謀濳使牧與穆崇至七介山以告語在崇傳太祖録先帝舊臣又以牧告顯之功拜為治民長敷奏政事參與計謀太祖征慕容寶加輔國將軍畧地晉川獲寳丹陽王買得及離石䕶軍髙秀和}
