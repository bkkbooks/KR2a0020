  - {type: variant, offset: 2117, length: 7, content: 常典選曹轉給事, WYG: 既不豫多所猜惡遂誅之時人咸寃惜焉岳葬在代西善無之界後世祖討赫連氏經其基宅愴然動容遂下詔為立廟令一州之民四時致祭求其子孫任為將帥者得其子陵從征有功聽襲爵路皇始初從征慕容寶為城門校尉遷司𨽻校尉爵髙平公而誅賀狄干代人也家本小族世忠厚為將以平當稱稍遷北部大人登國初與長孫嵩為對明於聽察為人愛敬太祖遣狄干致馬千匹結婚於姚萇㑹萇死興立因止狄干而絶婚興弟平率衆冦平陽太祖討平之擒其將狄伯支唐小方等三十餘人天賜}
