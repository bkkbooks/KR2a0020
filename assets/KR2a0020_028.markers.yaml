  - {type: variant, offset: 2125, length: 0, content: '', krp: 詔北新侯安同送唐小方於長安後蠕蠕社崘與興和親送馬八千匹始濟河赫連屈孑忿興與國交好乃叛興邀留社崘馬興乃遣使請}
  - {type: variant, offset: 2126, length: 0, content: '', WYG: 駿馬千匹贖伯支而遣狄干還太祖意在離間二寇於是許之狄干在長安幽閉因習讀書史通論語尚書諸經舉止風流有似儒者初太祖普封}
  - {type: variant, offset: 2126, length: 0, content: '', krp: 駿馬千匹贖伯支而遣狄干還太祖意在離間二寇於是許之狄干在長安幽閉因習讀書史通論語尚書諸經舉止風流有似儒者初太祖普封}
