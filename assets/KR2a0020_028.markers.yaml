  - {type: variant, offset: 2172, length: 0, content: '', krp: 尚書令弼雖事務殷湊而讀書不輟端謹慎宻口不言禁中之事功名等於張黎而亷不及也上谷民上書言苑囿過度民無田業乞減大半以賜貧人弼覽見之入欲陳奏遇世祖與給事中劉樹碁志不聽事弼侍坐良乆不獲中聞乃起於世祖前捽樹頭掣下床以手搏其耳以拳歐其背曰朝廷不治實爾之罪世祖失容放碁曰不聽奏事實在朕躬樹何罪置之弼具狀以聞世祖竒弼公直皆可其所奏以丐百姓弼曰為臣而逞其志於君前者非無罪也乃詣公車免冠徒跣自劾請罪世祖遣使者召之及至世祖曰卿其冠履吾聞築社之役蹇蹷而築之端冕而事之神與之福然則卿有何罪自今以後茍利社稷益國便民者雖復顛沛造次卿則為之無所頋也世祖大閲將校獵於河西弼留守詔以肥馬給騎人弼命給弱者世祖大怒曰尖頭奴敢裁量朕也朕還䑓先斬此奴弼頭尖世祖常名之曰筆頭是以時人呼為筆公弼屬官惶怖懼誅弼告之曰吾以為事君使畋獵不適盤遊其罪小也不備不虞使戎寇恣逸其罪大也今北狄孔熾南虜未滅狡焉之志闚伺邊境是吾憂也故選肥馬備軍實為不虞之逺慮茍使國家有利吾何避死乎明主可以理干此自吾罪非卿等之咎世祖聞而歎曰有臣如此國之寶也賜衣一襲馬二匹鹿十頭後車駕畋於山北大獲麋鹿數千頭詔尚書發車牛五百乗以運之世祖尋謂從者曰筆公必不與我汝軰不如馬運之速遂還行百餘里而弼表至曰今秋榖懸黄麻菽布野猪鹿竊食鳥鴈侵費風波所耗朝夕參倍乞賜矜緩使得收載世祖謂左右曰筆公果如朕所卜可謂社稷之臣初楊難當之來也詔弼悉送其子弟於京師楊𤣥少子文徳以黃金四十斤賂弼弼受金留文徳而遇之無禮文徳亡入劉義隆世祖以其正直有戰功弗加罪責也世祖崩吳王立以弼為司徒髙宗即位與張黎並坐議不合㫖俱免有怨謗之言其家人告巫蠱俱伏法時人寃之張黎鴈門平原人也善書計太祖知待之太宗器其忠亮賜爵廣平公管綜機要世祖以其功舊任以輔弼除大司農卿軍國大議黎常與焉加}
