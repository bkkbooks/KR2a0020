  - {type: variant, offset: 1919, length: 0, content: '', WYG: 平陶以軍功拜并州刺史賜爵任城公州與姚興接界興頗冦邊牧乃與興書稱頓首鈞禮抗之責興侵邊不直之意興以與國通和恨之有言於太祖太祖戮之莫題代人也多智有才用初為幢將領禁兵太祖之征慕容寶也寶夜来犯營軍人驚駭遂有亡還京師者言官軍敗於栢肆京師不安南安公元順因之欲攝國事題謂順曰此大事不可輕爾冝審待後要不然禍將及矣順乃止以功拜平逺將軍賜爵扶柳公進號}
