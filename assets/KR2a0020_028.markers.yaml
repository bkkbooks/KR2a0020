  - {type: variant, offset: 2164, length: 0, content: '', WYG: 率歩騎二萬來救與弼等相遇弼偽退以誘之世祖使髙車勑勒馳擊定斬首數千級弼乗勝取安定又與永昌王健等討馮文通文通嬰城固守弼芟其禾而還後又征文通文通求救於髙麗髙麗救至文通將東奔民多難之其大臣古埿因民心之不欲遂率衆攻文通開城門以引官軍弼疑古埿譎詐不入城髙麗軍至文通乃随之文通之奔也令婦人被甲居中其精卒及髙麗陳兵於外弼部將髙苟子率騎衝擊賊軍弼酒醉㧞刀止之故文通得東奔將士皆怨弼不擊世祖大怒徵還黜為廣夏門卒尋復為侍中與尚書李順使於涼州拜安西將軍賜爵建興}
