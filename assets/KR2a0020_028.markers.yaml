  - {type: variant, offset: 2429, length: 558, content: 庫仁妻公孫氏厚其資送庫仁又詣堅加庫仁振威將軍後慕容垂圍苻丕于鄴又遣將平規攻堅幽州刺史王永于薊庫仁自以受堅爵命遣妻兄公孫希率騎三千助永擊規大破之阬規降卒五千餘人乘勝長驅進據唐城與垂子麟相持庫仁聞希破規復將大舉以救丕發雁門上谷代郡兵次於繁畤先是慕容文等當徙長安遁依庫仁部常思東歸其計無由至是役也知人不樂文等乃夜率三郡人攻庫仁庫仁匿於馬文執殺之乘其駿馬奔慕容垂公孫希聞亂自唐城走於丁零庫仁弟眷繼攝國事白部大人絜佛叛眷力不能討乃引苻堅并州刺史張蚝擊佛破之眷又破賀蘭部于善無又擊蠕蠕別帥肺渥于意親山破之獲牛羊數十萬頭眷第二子羅辰性機警有智謀謂眷曰比來行兵所向無敵心腹之疾願早圖之眷曰誰也曰從兄顯忍人也為亂非旦則夕耳眷不以為意其後徙牧于牛川庫仁子顯果殺眷而代立羅辰奔太祖事在外戚傳顯本名醜伐既殺眷代立又欲謀逆語在太祖紀太祖即位顯自善無南走馬邑族人奴真領部來附奴真兄犍先居賀蘭部至是奴真請召犍而讓部焉太祖義而許之犍既領部自以久託賀訥德之乃使弟去斤遺之金馬訥弟染干因謂之曰我待汝兄弟厚汝今領部宜來從我去斤請之奴真奴真曰父為國家附臣世効忠貞我志全名節是故推讓今汝等無狀乃欲叛主懷貳於是殺犍及去斤染干聞其殺兄率騎討之奴真懼徙部來奔太祖太祖自迎之遣使責止染干奴真感恩請奉妹充後宮太祖納之後太祖討顯于馬邑追至彌澤大破之衞辰與慕容垂通好送馬三, WYG: 布帛各}
