  - {type: variant, offset: 2144, length: 0, content: '', WYG: 決行乃問於崔浩浩固言可伐世祖從浩議既出與諸將期㑹鹿渾谷而潔恨其計不用欲沮諸將乃矯詔更期故諸將不至時虜衆大亂恭宗欲擊}
  - {type: variant, offset: 2144, length: 0, content: '', krp: 決行乃問於崔浩浩固言可伐世祖從浩議既出與諸將期㑹鹿渾谷而潔恨其計不用欲沮諸將乃矯詔更期故諸將不至時虜衆大亂恭宗欲擊}
  - {type: variant, offset: 2145, length: 1, content: 克, WYG: 潔執不可語在帝紀停鹿渾谷六日諸將猶不進賊已逺遁追至石水不及而還師次漠中糧盡士卒多死潔隂使人驚軍勸世祖棄車輕還世祖不從潔以軍行無功奏歸罪於崔浩世祖曰諸將後期及賊不擊罪在諸將豈在於浩浩又言潔矯詔事遂發輿駕至五原收潔幽之世祖之征也潔私謂親人曰若軍出無功車駕不返者吾當立樂平王潔又使右丞張嵩求圖讖問劉氏應王繼國家後我審有名姓否嵩對曰有姓而無名窮治款引搜嵩家果得讖書潔與南康公狄隣及嵩等皆夷三族死者百餘人潔既居勢要擅作威福諸阿附者登長忤恨者黜免内外憚之側目而視㧞城破國者聚歛財貨與潔分之籍其家産財盈巨萬世祖追忿言則切齒古弼代人也少忠謹好讀書又善騎射初為獵郎使長安稱㫖轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其輔佐材也令弼典西部與劉潔等分綰機要敷奏百揆世祖即位以功拜立節將軍賜爵靈夀侯征并州叛胡還進為侍中吏部尚書典南部奏事與安原降東部髙車於已尼陂又與劉潔屯五原河北以備叛民拜安西將軍從征}
