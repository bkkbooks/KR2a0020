  - {type: variant, offset: 2129, length: 0, content: '', WYG: 襄武侯加秦兵將軍及狄干至太祖見其言語衣服有類羌俗以為慕而習之故忿焉既而殺之弟歸亦剛直方雅與狄干俱死李栗鴈門人也昭成時父祖入國少辯㨗有才能兼有將畧初随太祖幸賀蘭部在元從二十一人中太祖愛其藝能時王業草創爪牙心腹多任親近唯栗一介逺寄兼非戚舊當世榮之數有戰功拜左軍將軍太祖征慕容寶栗督五萬騎為前驅軍之所至莫不降下遷左將軍慕容寶棄中山東走也栗以輕騎追之不及而還栗性簡慢矜寵不率禮度每在太祖前舒放倨傲不自祗肅咳唾任情太祖積其宿過天興三年遂誅之於是威嚴始厲制勒羣下盡卑謙之禮自栗始也劉潔長樂信都人也祖父生頗觧卜筮昭成時慕容氏來獻女為公主家臣仍随入朝賜以妻生子父提太祖時官至樂陵太守賜爵信都男卒潔性彊力多智數從征討有功進爵㑹稽公河西胡張外建興王紹等聚黨為逆潔與永}
  - {type: page-break, offset: 2129, content: '', id: KR2a0020_WYG_028-7a, image: WYG0261/WYG0261-0425c.png}
