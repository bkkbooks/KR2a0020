  - {type: variant, offset: 73, length: 1839, content: 同來歸國說桓穆二帝招納晉人於是晉人附者稍衆桓帝嘉之以為輔相任以國事及劉淵石勒之亂勸桓帝匡助晉氏東瀛公司馬騰聞而善之表加將號稍遷至右將軍封定襄侯桓帝崩後操立碑於大城南以頌功德云魏軒轅之苗裔言桓穆二帝馳名域外九譯宗焉治國御衆威禁大行聲著華裔齊光純靈智深謀遠窮幽極明治則清斷沉浮得情仁如春陽威若秋零強不淩弱隱恤孤煢道教仁行化而不刑國無姦盜路有頌聲自西訖東變化無形威武所向下無交兵南壹王室北服丁零招諭六狄咸來歸誠超前絕後致此有成奉承晉皇扞禦邊疆王室多難天網弛綱豪心遠濟靡離其殃歲翦逆命姦盜豺狼永安元年歲次甲子姦黨猶逆東西狼跱敢逼天王兵甲屢起怙衆肆暴虐用將士鄴洛遘隙棄親求疏乃招暴類屠各匈奴劉淵姦賊結黨同呼敢擊并土殺害無辜殘破狼籍城邑丘墟交刃千里長蛇塞塗晉道應天言展良謨使持節平北將軍并州刺史護匈奴中郎將東瀛公司馬騰才神絕世規略超遠時逢多難懼損皇祀欲引兵駕獫狁孔熾造設權策濟難奇思欲招外救朝臣莫應高算獨斷決謀盟意爰命外國引軍內備簡賢選士命茲良使遣參軍壺倫牙門中行嘉義陽亭侯衞謨協義亭侯衞鞬等馳奉檄書至晉陽城又稱桓穆二帝心在宸極輔相二衞對揚毗翼操展文謀雄奮武烈承命會議諮論奮發昔桓文匡佐功著周室顯名載籍列賞備物大衆迴動熙同靈集興軍百萬期不經日兄弟齊契決勝廟算鼓譟南征平夷險難又云二帝到鎮言若合符引接款密信義不渝會盟汾東銘篆丹書永世奉承慎終如初契誓命將精銳先驅南救涅縣東解壽陽窘迫之邑幽而復光太原西河樂平上黨遽遭寇暴白骨交橫羯賊肆虐六郡凋傷羣惡相應圖及華堂旌旗輕指羯黨破喪遣騎十萬前臨淇漳鄴遂振潰凶逆奔亡軍據州南曜鋒太行翼衞內外鎮靜四方志在竭力奉戴天王忠恕用暉外動亦攘於是曜武振旅而旋長路匪夷出入經年毫毛不犯百姓稱傳周覽載籍自古及今未聞外域奔救內患棄家憂國以危易安惟公遠略臨難能權應天順人恩德素宣和戎靜朔危邦復存又云非桓天挺忠孝自然孰能超常不為異端回動大衆感公之言功濟方州勳烈光延升平之日納貢充蕃憑瞻鑾蓋步趾三川有德無祿大命不延年三十有九以永興二年六月二十四日寢疾薨殂背棄華殿雲中名都國失惠主哀感欷歔悲痛煩寃載號載呼舉國崩絕攀援靡訴遠近齊軌奔赴梓廬人百其身盈塞門塗高山其頹茂林凋枯仰訴造化痛延悲夫又云桓帝忠於晉室駿奔長衢隆冬凄凄四出行誅蒙犯霜雪疹入脉膚用致薨殞不永桑榆以死勤事經勳同模垂名金石載美晉書平北哀悼祭以豐考行論勳諡曰義烈功施於人祀典所說又云桓帝經濟存亡繼絕荒服是賴祚存不輟金龜簫鼓軺蓋殊制反及二代莫與同列并域嘉歎北國感榮各竭其心思揚休名刊石紀圖像存形靡輟享祀饗以犧牲永垂于後沒有餘靈長存不朽延於億齡其頌又稱桓帝金堅玉剛應期順會王有北方行能濟國武平四荒無思不服區域大康世路紛糾運遭播揚羯胡因釁敢害并土哀痛下民死亡失所率衆百萬平夷險阻存亡繼絕一州蒙祜功烈桓桓龍文虎武朱邑小善遺愛桐鄉勳攘大患六郡無闕悉之來由功而存刊石勒銘垂示後昆時晉光熙元年秋也皇興初雍州別駕雁門段榮於大邗掘得此碑文雖非麗事宜載焉故錄於傳桓穆二帝並禮重操穆帝三年卒始操所與宗室鄉親入國者衞懃安樂亭侯衞崇衞清並都亭侯衞泥段繁並信義將軍都亭侯王發建武將軍都亭侯范班折衝將軍廣武亭侯賈慶建武將軍上洛亭侯賈循都亭侯李壹關中侯郭乳關內侯皆為桓帝所表授也六脩之難存者多隨劉琨任子遵南奔衞雄姬澹莫含等名皆見碑雄字世遠澹字世雅並勇健多計畫晉世州從事既與衞操俱入國桓帝壯其膂力並以為將常隨征伐大著威名桓帝之赴難也表晉列其勳效皆拜將軍雄連有戰功稍遷至左將軍雲中侯澹亦以勇績著名桓帝末至信義將軍樓煩侯穆帝初並見委任衞操卒後俱為左右輔相六脩之逆國內大亂新舊猜嫌迭相誅戮雄澹並為羣情所附謀欲南歸言於衆曰聞諸舊人忌新人悍戰欲盡殺之吾等不早為計恐無種矣晉人及烏丸驚懼皆曰死亡隨二將軍於是雄澹與劉琨任子遵率烏丸晉人數萬衆而叛琨聞之大悅率數百騎馳如平城撫納之會石勒攻琨樂平太守韓據請救於琨琨以得雄澹之衆欲因其銳以滅石勒雄澹諫曰亂民飢疲未可便用宜休息觀釁而動琨不從使雄澹率衆討勒琨屯廣牧為之聲援勒率輕騎與雄澹戰澹大敗率騎千餘奔于代郡勒遣孔萇追滅之莫含雁門繁畤人也家世貨殖貲累巨萬劉琨為并州辟含從事含居近塞下常往來國中穆帝愛其才器善待之及為代王備置官屬求含於琨琨遣入國含心不願琨諭之曰當今胡寇滔天泯滅諸夏百姓流離死亡塗地主上幽執沉溺醜虜唯此一州介在羣胡之間以吾薄德能自存立者賴代王之力是以傾身竭寶長子遠質覬滅殘賊報雪大卿為忠節亦是奮義之時何得苟惜共事之小誠以忘出身之大益入為代王腹心非但吾願亦一州所賴含乃入代參國官後琨徙五縣之民於陘南含家獨留含甚為穆帝所重常, WYG: ''}
