  - {type: variant, offset: 2140, length: 1, content: 謀, WYG: 朝臣咸推其能於是超遷尚書令改為鉅鹿公世祖破蠕蠕大檀于雲中潔言於世祖曰大檀恃衆雖破膽奔北恐不懼往敗將復送死請收田訖復一大舉東西並進為二道討之世祖然其言後大議征討潔言冝先平馮䟦世祖不從勑勒新民以將吏侵奪咸出怨言期牛馬飽草當赴漠北潔與左僕射安原奏欲及河氷未觧徙之河西氷觧之後不得北遁世祖曰不然此等習俗放散日乆有似園中之鹿急則衝突緩之則定吾自處之有道不煩徙也潔等固執乃聽分徙三萬餘落於河西西至白鹽池新民驚駭皆曰圈我於河西之中是將殺我也欲西走涼州潔與侍中古弼屯五原河北左僕射安原屯悦㧞城北備之既而新民數千騎北走潔追討之走者糧絶相枕而死時南州大水百姓阻飢潔奏曰臣聞天地至公故萬物咸育帝王無私而黎民戴頼伏惟陛下以神武之姿紹重光之緒恢隆大業育濟羣生威之所振無思不服澤之所洽無逺不懐太平之治於是而在自頃邊寇内侵戎車屢駕天資聖明所在克殄方難既平皆蒙訓錫勲髙者受爵功平者獲賞寵賜優崇有過古義而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資自山以東偏遇水害頻年不收就食他所臣聞率土之濵莫非王臣應加哀矜以鴻覆育今南摧彊寇西敗醜虜四海晏如人神恊暢若與兆民共饗其福則惠感和氣蒼生悦樂矣世祖從之於是復天下二嵗租賦潔與樂平王丕督諸軍取上邽軍至啟陽百姓爭致牛酒潔至上邽諸將咸欲斬其豪帥以示王威潔不聽撫慰秦隴秋豪無犯人皆安業世祖將發隴右騎卒東伐髙麗潔進曰隴土新民始染大化冝賜優復以饒實之兵馬足食然後可用世祖深納之車駕西伐潔為前鋒沮渠牧犍弟董來率萬餘人拒戰於城南潔信卜者之言日辰不協擊皷却陳故後軍不進董來得入城世祖㣲嫌之後潔與建寜王崇督諸軍於三城胡部中簡兵六千將以戍姑臧胡不從命千餘人叛走潔與崇擊誅之虜男女數千人潔朝夕在樞密深見委任性既剛直恃寵自專世祖心稍不平時議伐蠕蠕潔意不欲言於世祖曰虜非有邑居遷徙無常前來出軍無所擒獲不如廣農積榖以待其來羣臣皆從其}
