  - {type: variant, offset: 2165, length: 1, content: 加, WYG: 鎮長安甚著威名及議征涼州弼與順咸言涼州乏水草不冝行師世祖不從既克姑臧㣲嫌之以其有將畧故弗之責也劉義隆遣將裴方明等擊南秦王楊難當難當遣使請救兵未至難當奔上邽方明克仇池立楊𤣥庶子保熾於是假弼節督隴右諸軍義隆遣其秦州刺史胡崇之屯仇池弼與}
  - {type: page-break, offset: 2165, content: '', id: KR2a0020_WYG_028-13a, image: WYG0261/WYG0261-0428c.png}
  - {type: variant, offset: 2165, length: 1, content: 加, krp: 鎮長安甚著威名及議征涼州弼與順咸言涼州乏水草不冝行師世祖不從既克姑臧㣲嫌之以其有將畧故弗之責也劉義隆遣將裴方明等擊南秦王楊難當難當遣使請救兵未至難當奔上邽方明克仇池立楊𤣥庶子保熾於是假弼節督隴右諸軍義隆遣其秦州刺史胡崇之屯仇池弼與}
