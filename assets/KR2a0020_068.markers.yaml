  - {type: variant, offset: 3118, length: 714, content: 賜名為弁意取弁和獻玉楚王不知寶之也遷中書侍郎兼員外常侍使於蕭賾賾司徒蕭子良祕書丞王融等皆稱美之以為志氣謇烈不逮李彪而體韻和雅舉止閑邃過之轉散騎侍郎時散騎位在中書之右高祖曾論江左事因問弁曰卿比南行入其隅隩彼政道云何興亡之數可得知不弁對曰蕭氏父子無大功於天下既以逆取不能順守德政不理徭役滋劇內無股肱之助外有怨叛之民以臣觀之必不能貽厥孫謀保有南海若物憚其威身免為幸後車駕南征以弁為司徒司馬曜武將軍東道副將軍人有盜馬靽者斬而徇之於是三軍振懼莫敢犯法黃門郎崔光薦弁自代高祖不許然亦賞光知人未幾以弁兼黃門尋即正兼司徒左長史時大選內外羣官並定四海士族弁專參銓量之任事多稱旨然好言人之陰短高門大族意所不便者弁因毀之至於舊族淪滯人非可忌者又申達之弁又為本州大中正姓族多所降抑頗為時人所怨從駕南討詔弁於豫州都督所部及東荊領葉皆減戍士營農水陸兼作遷散騎常侍尋遷右衞將軍領黃門弁屢自陳讓高祖曰吾為相知者卿亦不可有辭豈得專守一官不助朕為治且常侍者黃門之粗冗領軍者二衞之假攝不足空存推讓以棄大委其被知遇如此始高祖北都之選也李沖多所參預頗抑宋氏弁有恨於沖而與李彪交結雅相知重及彪之抗沖沖謂彪曰爾如狗耳為人所嗾及沖劾彪不至大罪弁之力也彪除名為民弁大相嗟慨密圖申復高祖在汝南不豫大漸旬有餘日不見侍臣左右唯彭城王勰等數人而已小瘳乃引見門下及宗室長幼諸人入者未能知致悲泣弁獨進及御床歔欷流涕曰臣不謂陛下聖顏毀瘠乃爾由是益重之車駕征馬圈留弁以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹可不自勉弁頓首辭謝弁劬勞王事夙夜在公恩遇之甚輩流莫及名重朝野亞於李沖高祖每稱弁可為吏部尚書及崩遺詔以弁為之與咸陽王禧等六人輔政而弁已先卒年四十八詔賜錢十萬布三百匹, WYG: 害}
