  - {type: variant, offset: 2956, length: 1, content: 相, WYG: 肅宗踐祚以其素附髙肇出為幽州刺史將軍如故尋以髙肇之黨與王世義髙綽李憲崔楷蘭氛之為中尉元匡所彈靈太后並特原之聰遂停廢于家斷絶人事唯修營園果以聲色自娛久之拜光祿大夫加安北將軍聰心望中書令然後出作青州願竟不果正光元年夏卒年六十九靈太后聞其病遣主書問之聰對使者歔欷慟泣及聞其亡嗟悼良久言朕既無福大臣殞䘮且其與朕父南征契濶戎旅特可感念􅈖布帛三百匹氷一車贈撫軍將軍青}
