  - {type: variant, offset: 492, length: 526, content: 本而同無數之喪誓雪怨方展申復窮諭再期蔬縕不改誠季世之高風末代之孝節也但聖人制禮必均愚智先王作則理齊盈虛過之者俯而就之不及者企而行之曾參居罰寧其哀終吳員處酷豈聞四載夫三年者天下之達喪古今之所一其雖欲過禮朕得不制之以禮乎有司可依禮諭之為裁練之制二十年七月高祖以久旱不雨輟膳三旦百僚詣闕引在中書省高祖在崇虛樓遣舍人問曰朕知卿等至不獲相見卿何為而來肅對曰伏承陛下輟膳已經三旦羣臣焦怖不敢自寧臣聞堯水湯旱自然之數須聖人以濟世不由聖以致災是以國儲九年以禦九年之變臣又聞至於八月不雨然後君不舉膳昨四郊之外已蒙滂澍唯京城之內微為少澤蒸民未闕一餐陛下輟膳三日臣庶惶惶無復情地高祖遣舍人答曰昔堯水湯旱賴聖人以濟民朕雖居羣黎之上道謝前王今日之旱無以救恤應待立秋克躬自咎但此月十日已來炎熱焦酷人物同悴而連雲數日高風蕭條雖不食數朝猶自無感朕誠心未至之所致也肅曰臣聞聖人與凡同者五常異者神明昔姑射之神不食五穀臣常謂矯今見陛下始知其驗且陛下自輟膳以來若天全無應臣亦謂上天無知陛下無感一昨之前外有滂澤此有密雲臣即謂天有知陛下有感矣高祖遣舍人答曰昨內外貴賤咸云四郊有雨朕恐此輩皆勉勸之辭三覆之慎必欲使信而有徵比當遣人往行若果雨也便命大官欣然進膳豈可以近郊之內而慷慨要天乎若其無也朕之無感, WYG: 勲賞}
