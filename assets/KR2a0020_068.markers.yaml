  - {type: variant, offset: 2935, length: 5, content: 賜爵列人子, WYG: 討專訪王肅以軍事聰託肅願以偏裨自効肅言之於髙祖故假聰輔國將軍統兵二千與劉藻傅永成道益任莫問俱受肅節度同援渦陽而聰躁怯少威重所經淫掠無禮及與賊交望風退敗與藻等同囚於懸瓠髙祖恕死徙平州為民行届瀛州屬刺史王質獲白兎將獻託聰為表髙祖見表顧為王肅曰在下那得復有此才而令朕不知也肅曰比髙聰北徙此文或其所製髙祖悟曰必應然也何應更有此輩世宗初聰復竊}
