  - {type: variant, offset: 2941, length: 2, content: 拜廣, WYG: 京師六輔之廢聰之謀也世宗親政除給事黄門侍郎加輔國將軍遷散騎常侍黄門如故世宗幸鄴還於河内懷界帝親射矢一里五十餘歩侍中髙顯等奏伏見親御弧矢臨原弋逺弦動羽馳矢鏃所逮三百五十餘歩臣等伏惟陛下聖武自天神藝夙茂巧㑹騶虞之節妙盡矍圃之儀威稜攸疉甝兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事竒迹必宜表述請勒銘射宫永彰聖藝詔曰此乃弓弧小藝何足以示後葉而喉脣近侍茍以為然亦豈容有異便可如請遂刋銘於射所聰為之詞趙修嬖幸聰深朋附及詔追贈修父聰為碑文出入同載觀視碑石聰毎見修迎送盡禮聰又為修作表陳當時便宜敎其自安之術由是迭相親狎修死甄琛李憑皆被黜落聰亦深用危慮而聰先以疎宗之情曲事髙肇竟獲自免肇之力也修之任勢聰傾身事之及修之死言必毁惡茹皓之寵聰又媚附毎相招命言笑􅂝撫公私託仗無所不至毎稱皓才識明敏非趙修之儔乃因皓啓請青州鎮下治中公廨以為私宅又乞水田數十頃皆被遂許及皓見戮聰以為死之晚也其薄於情義類皆如此侍中髙顯出授護軍聰轉兼其處於時顯兄弟疑聰間搆而求之聰居兼十餘旬出入機要言即真無逺慮藉貴因權躭於聲色賄納之音聞於遐邇中尉崔亮知肇微恨遂靣陳聰罪世宗乃出聰為}
