  - {type: variant, offset: 1174, length: 1221, content: 黃瑤起乃知是卿怨也尋當相付微望紓泄使吾見卿之日差得緩懷初賾之收肅父奐也司馬黃瑤起攻奐殺之故詔云然高祖之伐淮北令肅討義陽未克而蕭鸞遣將裴叔業寇渦陽劉藻等救之為叔業所敗肅表求更遣軍援渦陽詔曰得表覽之憮然觀卿意非專在水當是以藻等銳兵新敗於前事往勢難故也朕若分兵遣之非多會無所制多遣則禁旅難闕今日之計唯當作必克之舉不可為狐疑之師徒失南兗也卿便息意停彼以圖義陽之寇宜止則止還取義陽宜下則下鎮軍淮北深量二途勿致重爽若孟表糧盡軍不及至致失渦陽卿之過也肅乃解義陽之圍以赴渦陽叔業乃引師而退肅坐劉藻等敗黜為平南將軍中正刺史如故高祖崩遺詔以肅為尚書令與咸陽王禧等同為宰輔徵肅會駕魯陽肅至遂與禧等參同謀謨自魯陽至於京洛行途喪紀委肅參量憂勤經綜有過舊戚禧兄弟並敬而昵之上下稱為和輯唯任城王澄以其起自羇遠一旦在己之上以為憾焉每謂人曰朝廷以王肅加我上尚可從叔廣陽宗室尊宿歷任內外云何一朝令肅居其右也肅聞其言降而避之尋為澄所奏劾稱肅謀叛言尋申釋詔肅尚陳留長公主本劉昶子婦彭城公主也賜錢二十萬帛三千匹肅奏考以顯能陟由績著昇明退闇於是乎在自百僚曠察四稔于茲請依舊式考檢能否從之裴叔業以壽春內附拜肅使持節都督江西諸軍事車騎將軍與驃騎大將軍彭城王勰率步騎十萬以赴之蕭寶卷豫州刺史蕭懿率衆三萬屯於小峴交州刺史李叔獻屯合肥將圖壽春懿遣將胡松李居士等領衆萬餘屯據死虎肅進師討擊大破之擒其將橋珉等斬首數千進討合肥生擒叔獻蕭懿棄小峴南走肅還京師世宗臨東堂引見勞之又問江左有何息耗肅曰如聞崔慧景已死寶卷所仗非邪即佞天殆以此資陛下廓定之期勢將不久以肅淮南累捷賞帛四千七百五十匹進位開府儀同三司封昌國縣開國侯食邑八百戶餘如故尋以肅為散騎常侍都督淮南諸軍事揚州刺史持節餘官如故肅頻在邊悉心撫接遠近歸懷附者若市以誠綏納咸得其心清身好施簡絕聲色終始廉約家無餘財然性微輕佻頗以功名自許護疵稱伐少所推下高祖每以此為言景明二年薨於壽春年三十八世宗為舉哀詔曰肅奄至不救痛惋兼懷可遣中書侍郎賈思伯兼通直散騎常侍撫慰厥孤給東園祕器朝服一襲錢三十萬帛一千匹布五百匹蠟三百斤并問其卜遷遠近專遣侍御史一人監護喪事務令優厚又詔曰死生動靜卑高有域勝達所居存亡崇顯故杜預之歿窆於首陽司空李沖覆舟是託顧瞻斯所誠亦二代之九原也故揚州刺史肅誠義結於二世英惠符於李杜平生本意願終京陵既有宿心宜遂先志其令葬於沖預兩墳之間使之神遊相得也贈侍中司空公本官如故有司奏以肅忠心大度宜諡匡公詔諡宣簡肅宗初詔為肅建碑銘子紹襲紹字三歸歷官太子洗馬員外常侍中書侍郎卒贈輔國將軍徐州刺史子遷襲武定中通直常侍齊受禪爵隨例降紹弟理孝靜初始得還朝武定末著作佐郎紹肅前妻謝生也肅臨薨謝始攜二女及紹至壽春世宗納其女為夫人肅宗又納紹女為嬪肅弟秉字文政涉獵書史微有兄風世宗初攜兄子誦翊衍等入國拜中書郎遷司徒諮議出為輔國將軍幽州刺史卒贈征虜將軍徐州刺史誦字國章肅長兄融之子學涉有文才神氣清儁風流甚美自員外郎司徒主簿轉司徒屬司空諮議通直常侍汝南王友遷司徒諮議加前軍散騎常侍, WYG: ''}
