  - {type: variant, offset: 2933, length: 1, content: 江, WYG: 於蕭昭業髙祖定都洛陽追詔聰等曰比於河陽𠡠卿仍届瀍洛周視舊業依然有懷固欲先之營之後乃薄伐且以賾䘮甫爾使通在昔乘危幸凶君子弗取是用輟兹前圖逺期来㑹爰息六師三川是宅將底居成周永恢皇宇今更造璽書以代往詔比所𠡠授隨宜變之善朂皇華無替指意使還遷通直散騎常侍兼太府少卿轉兼太子左率聰微習弓馬乃以將用自許髙祖鋭意}
