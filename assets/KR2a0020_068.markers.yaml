  - {type: variant, offset: 36, length: 1, content: 奐, WYG: 凝州主簿琛少敏悟閨門之内兄弟戱狎不以禮法自居頗學經史稱有刀筆而形貎短陋尠風儀舉秀才入都積歲頗以奕棊棄日至乃通夜不止手下蒼頭常令秉燭或時睡頓大加其杖如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭奴不敢辭罪乃以圍棊日夜不息豈是向京之意而賜加杖罰不亦非理琛惕然慙感遂從許叡李彪假書研習聞見益優太和初拜中書博士遷諌議大夫時有所陳亦為高祖知賞轉通直散騎侍郎出為本州征北府長史後為本州陽平王頤衛軍府長史世宗踐祚以琛為中散大夫兼御史中尉轉通直散騎常侍仍兼中尉琛表曰王者道同天壤施齊造化濟時拯物為民父母故年穀不登為民祈祀乾坤所惠天子順之山川秘利天子通之苟益生民損躬無吝如或所聚唯為賑恤是以月令稱山林藪澤有能取蔬食禽獸者皆野虞敎導之其迭相侵奪者罪之無赦此眀導民而弗禁通有無以相濟也周禮雖有川澤之禁正所以防其殘盡必令取之有時斯所謂障護雖在公更所以為民守之耳且一家之長惠及子孫一運之君澤周天下皆所以厚其所養以為國家之富未有尊居父母而醯醢是吝富有萬品而一物是規今者天為黔首生鹽國與黔首障護假獲其利是猶富專口齗不及四體也且天下夫婦歲貢粟帛四海之有備奉一人軍國之資取給百姓天子亦何患乎貧而茍禁一池也古之王者世有其民或水火以濟其用或巢宇以誨其居或敎農以去其飢或訓衣以除其敝故周詩稱敎之誨之飲之食之皆所以撫覆導養為之求利者也臣性昧知理識無逺尚每觀上古愛民之迹時讀中葉驟稅之書未嘗不歎彼逺大惜此近狭今偽弊相承仍崇關鄽之稅大魏恢博唯受穀帛之輸是使逺方聞者罔不歌徳昔亶父以棄寶得民碩鼠以受財失衆君王之義宜其高矣魏之簡稅惠實逺矣語稱出内之吝有司之福施惠之難人君之禍夫以府藏之物猶以不施而為災况府外之利而可吝之於黔首且善藏者藏於民不善藏者藏於府藏於民者民欣而君富藏於府者國怨而民貧國怨則示化有虧民貧則君無所取願弛兹鹽禁使沛然逺及依周禮置川衡之法使之監導而已詔曰民利在斯深如所陳付八座議可否以聞司徒録尚書彭城王勰兼尚書邢巒等奏琛之所列富乎有言首尾大備或無可貶但恐坐談則理高行之則事闕是用遲回未謂為可竊惟古之善為治者莫不昭其勝途悟其逺理及於救世升降稱時欲令豐無過溢儉不致敝役養消息備在厥中節約取足成其性命如不爾者焉用君為若任其生産隨其啄食便是芻狗萬物不相有矣自大道既往恩惠生焉下奉上施卑高理睦然恩惠既交思拯之術廣恒恐財不賙國澤不厚民故多方以逹其情立法以行其志至乃取貨山川輕在民之貢立稅關市裨十一之儲收此與彼非利已也回彼就此非為身也所謂集天地之産惠天地之民藉造物之富賑造物之貧徹商賈給戎戰賦四民贍軍國取乎用乎各有義已禁此淵池不専大官之御歛此匹帛豈為後宫之資既潤不在已彼我理一猶積而散之将焉所吝且稅之本意事有可求固以希濟生民非為富賄藏貨不爾者昔之君子何為然哉是以後來經圖未之或改故先朝商校小大以情降鑒之流疑興復鹽禁然自行以來典司多怠出入之間事不如法遂令細民怨嗟商販輕議此乃用之者無方非興之者有謬至使朝廷明識聼營其間今而罷之懼失前㫖一行一改法若易棊參論理要宜依前式詔曰司鹽之稅乃自古通典然興制利民亦代或不同茍可以富氓益化唯理所在甄琛之表實所謂助政毗治者也可從其前計使公私並宜川利無擁尚書嚴為禁豪彊之制也詔琛參八座議事尋正中尉常侍如故遷侍中領中尉琛俛眉畏避不能繩糾貴逰凡所劾治率多下吏於時趙修盛寵琛傾身事之琛父凝為中散大夫弟僧林為本州别駕皆託修申逹至修姦詐事露明當收考今日乃舉其罪及監決修鞭猶相隱惻然告人曰趙修小人背如土牛殊耐鞭杖有識以此非之修死之明日琛與黄門郎李憑以朋黨被召詣尚書兼尚書元英邢巒窮其阿附之狀琛曾拜官諸賔悉集巒乃晚至琛謂巒曰卿何處放蛆来今晚始顧雖以戲言巒變色銜忿及此大相推窮司徒公録尚書北海王詳等奏曰臣聞黨人為患自古所疾政之所忌雖寵必誅皆所以存天下之至公保靈基於永業者也伏惟陛下纂聖前暉淵鑒幽慝恩斷近習憲軌唯新大政蔚以增光鴻猷於焉永泰謹按侍中領御史中尉甄琛身居直法糾擿是司風邪響黷猶宜劾糾况趙修奢暴聲著内外侵公害私朝野切齒而琛嘗不陳奏方更往来綢繆結納以為朋黨中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之祿虧先皇之選典塵聖明之官人又與武衞將軍黄門郎李憑相為表裏憑兄叨封知而不言及修釁彰方加彈奏生則附其形勢死則就地排之竊天之功以為已力仰欺朝廷俯罔百司其為鄙詐於兹甚矣不實不忠寔合貶黜謹依律科徒請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李憑朋附趙修是親是仗交遊之道不依恒度或晨昏從就或吉凶往来至乃身拜其親妻見其子毎有家事必先請託緇點皇風塵鄙正化此而不糾將何以蕭整阿諛奬厲忠槩請免所居官川肅風軌奏可琛遂免歸本郡左右相連死黜者三十餘人始琛以父母年老常求解官扶侍故高祖授以本州長史及貴逹不復請歸至是乃還供養數年遭母憂母鉅鹿曹氏有孝性夫氏去家路踰百里每得魚肉菜果珍美口實者必令僮僕走奉其母乃後食焉琛母服未闋復䘮父琛於塋兆之内手種松栢隆冬之月負掘水土鄉老哀之咸助加力十餘年中墳成木茂與弟僧林誓以同居没齒專事産業親躬農圃時以鷹犬馳逐自娛朝廷有大事猶上表陳情久之復除散騎常侍領給事黄門侍郎定州大中正大見親寵委以門下庶事出參尚書入厠帷幄琛髙祖時兼主客郎迎送}
