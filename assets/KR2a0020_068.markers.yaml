  - {type: variant, offset: 2920, length: 2, content: 歷位, WYG: 拜中書侍郎真君元年關右慰勞大使二年拜使持節鎮西將軍涼州刺史卒贈征東將軍燕州刺史諡曰穆纂頗渉經史雅有氣尚交結勝流太和中釋褐奉朝請稍遷伏波將軍任城王澄鎮北府騎兵參軍帶魏昌縣令吏民安之後為北中府司馬久之除樂􅁜太守在郡多所受納聞御史至棄郡逃走於是除名乃卒天平初贈使持節都督冀定二州諸軍事驃騎將軍定州刺史纂叔感字崇仁有器業不應州郡之命子宣軌少孤事母以孝聞歴郡功曹州主簿延昌中釋褐奉朝請冀州征東府長流參軍轉相州中軍府錄事參軍定州别駕後除鎮逺將軍員外散騎常侍出為相州撫軍府司馬宣軌性通率輕財好施屬葛榮圍城與刺史李神有固守之効永安中以功賜爵中山公中興初坐事死於鄴子子瑜纂從弟元賔太和十六年出身奉朝請遷員外郎給事中正光中除中堅將軍射聲校尉永安三年卒永熙中外甥髙敖曹貴逹啓贈持節撫軍將軍瀛州刺史子辨天平中司徒行參軍髙聰字僧智本渤海蓚人曾祖軌隨慕容徳徙青州因居北海之劇縣父法昂劉駿車騎將軍王元謨甥也少隨元謨征伐以軍功至員外郎早卒聰生而䘮母祖母王撫育之大軍攻剋東陽聰徙入平城與蔣少遊為雲中兵户窘困無所不至族祖允視之若孫大加賙給聰渉獵經史頗有文才允嘉之數稱其美言之朝廷云青州蔣少遊與從孫僧智雖為孤弱然皆有文情由是與少遊同拜}
