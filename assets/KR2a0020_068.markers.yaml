  - {type: punctuation, offset: 2596, content: 、, id: KR2a0020_ZHSJ_068-bkkpn544}
  - {type: variant, offset: 2598, length: 246, content: 將軍西兗州刺史衍屆治未幾屬尒朱仲遠稱兵內向州既路衝為其攻逼衍不能守為仲遠所擒以其名望不害也令其騎牛從軍久乃見釋還洛除車騎將軍左光祿大夫孝靜初轉侍中將軍如故天平三年卒年五十二敕給東園祕器賵物三百段贈使持節都督青徐兗三州諸軍事驃騎大將軍尚書令司徒公徐州刺史諡曰文獻衍篤於交舊有故人竺虩於西兗為仲遠所害其妻子飢寒衍置之於家累年贍恤世人稱其敦厚翊字士遊肅次兄琛子也風神秀立好學有文才歷司空主簿清河王友中書侍郎頗銳於榮利結婚於元叉超拜左將軍濟州刺史尋加平東將軍清靜愛民有政治之稱入為散騎常侍孝莊初遷鎮南, WYG: ''}
