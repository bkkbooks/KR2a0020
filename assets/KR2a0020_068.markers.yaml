  - {type: variant, offset: 39, length: 0, content: '', WYG: 使彭城劉纘琛欽其器貌常歎詠之纘子晣為朐山戍主晣死家屬入洛有女年未二十琛已六十餘矣乃納晣女為妻婚日詔給厨費琛深所好悦世宗時調戲之盧昶敗於胊山詔琛馳驛檢按遷河南尹加平南將軍黄門中正如故琛表曰詩稱京邑翼翼四方是則者京邑是四方之本安危所在不可不清是以國家居代患多盗竊世祖太武皇帝親自發憤廣置主司里宰皆以下代令長及五等散男有經畧者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都已来天下轉廣四逺赴㑹事過代都五方雜沓難可備簡寇盗公行劫害不絶此由諸坊混雜釐比不精主司闇弱不堪檢察故也凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精鋭無以治之今擇尹既非南金里尉鈆刀而割欲望清肅都邑不可得也里正乃流外四品職輕任碎多是下才人懷茍且不能督察故使盗得容姦百賦失理邊外小縣所領不過百户而令長皆以將軍居之京邑諸坊大者或千户五百户其中皆王公卿尹貴勢姻戚豪猾僕隸䕃養姦徒髙門邃宇不可干問又有州郡侠客䕃結貴遊附黨連羣隂為市劫比之邊縣難易不同今難彼易此實為未惬王者立法隨時從宜改弦易調明王所急先朝立品不必即定施而觀之不便則改今閑官静任猶聼長兼况煩劇要務不得簡能下領請取武官中八品將軍已下幹用貞濟者以本官俸恤領里尉之任各食其祿髙者領六部尉中者領經途尉下者領里正不爾請少髙里尉之品選下品中應遷之者進而為之則督貴有所輦轂可清詔曰里正可進至勲品經途從九品六部尉正九品諸職中簡取何必湏武人也琛又奏以羽林為遊軍於諸坊巷司察盗賊於是京邑清靜至今踵焉轉太子少保黄門如故大將軍髙肇伐蜀以琛為使持節假撫軍將軍領歩騎四萬為前驅都督琛次梁州獠亭會世宗崩班師髙肇既死以琛肇之黨也不宜復參朝政出為營州刺史加安北將軍歲餘以光祿大夫李思穆代之時年六十五矣遂停中山久之乃赴洛除鎮西將軍涼州刺史猶以琛髙氏之昵也不欲處之於内尋徴拜太常卿仍以本將軍出為徐州刺史及入辭肅宗琛辭以老詔除吏部尚書將軍如故未幾除征北將軍定州刺史衣錦晝遊大為稱滿治體嚴細甚無聲譽崔光辭司徒之授也琛與光書外相抑揚内實附㑹也光亦揣其意復書褒美以悦之徴為車騎將軍特進又拜侍中以其衰老詔賜御府杖朝直杖以出入正光五年冬卒詔給東園秘器朝服一具衣一襲錢十萬物七百段蠟三百斤贈司徒公}
