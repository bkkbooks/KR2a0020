  - {type: variant, offset: 4018, length: 219, content: 靈太后臨政委任元叉而叉恃寵驕盈懌每以分理裁斷叉甚忿恨思以害懌遂與維為計以富貴許之維見叉寵勢日隆便至乾沒乃告司染都尉韓文殊父子欲謀逆立懌懌坐被錄禁中文殊父子懼而逃遁鞫無反狀以文殊亡走懸處大辟置懌於宮西別館禁兵守之維應反坐叉言於太后欲開將來告者之路乃黜為燕州昌平郡守紀為秦州大羌令維及紀頗涉經史而浮薄無行懌親尊懿望朝野瞻屬維受懌眷賞而無狀構間天下人士莫不怪忿而賤薄之及叉殺懌專斷朝政以維兄弟前者告懌徵維為散騎侍郎紀為太學博士領侍御史甚昵之維超, WYG: 稍}
