  - {type: variant, offset: 68, length: 0, content: '', WYG: 慰其諸子琛性輕簡好嘲謔故少風望然明解有幹具在官清白自髙祖世宗咸相知待肅宗以師傅之義而加禮焉所著文章鄙碎無大體時有理詣磔四聲姓族廢興㑹通緇素三論及家誨二十篇篤學文一卷頗行於世琛長子侃字道正郡功曹釋褐秘書郎性險薄多與盗劫交通隨琛在京以酒色夜宿洛水亭舍歐擊主人為司州所劾淹在州獄琛大以慙慨廣平王懷為牧與琛先不協欲具案窮推琛託左右以聞世宗遣白衣吳仲安勑懷寛放懷固執治之久乃特㫖出之侃自此沉廢卒於家侃弟楷字徳方粗有文學頗習吏事太平中上髙祖頌十二篇文多不載優詔報之琛啓除秘書郎世宗崩未葬楷與河南尹丞張普惠等飲戲免官任城王澄為}
