  - {type: variant, offset: 4380, length: 258, content: 早亡弟紀以次子欽仁繼欽仁武定末太尉祭酒紀肅宗末為北道行臺卒於晉陽子欽道武定末冀州別駕弁弟機本州治中子寶積卒於中散大夫弁族弟穎字文賢自奉朝請稍遷尚書郎魏郡太守納貨劉騰騰言之於元叉以穎為冠軍將軍涼州刺史穎前妻鄧氏亡後十五年穎夢見之向穎拜曰新婦今被處分為高崇妻故來辭君泫然流涕穎旦而見崇言之崇後數日而卒穎族弟燮字崇和廣平王懷郎中令員外常侍為征北李平司馬北殄元愉頗有贊謀之功燮族弟鴻貴為定州平北府參軍送兵於荊州坐取兵絹四百匹兵欲告之乃斬十人又疏凡不達律令見律有梟首之罪乃生斷兵手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚, WYG: ''}
