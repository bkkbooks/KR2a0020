  - {type: variant, offset: 366, length: 0, content: '', WYG: 尚書左僕射和其奴爲司空壬子以淮南王他爲鎭西大將軍儀同三司鎭涼州六月封繁陽侯李嶷爲丹陽王征東大將軍馮熙爲昌黎王乙丑詔曰夫賦斂煩則民財匱課調輕則用不足是以十一而税頌聲作矣先朝𣙜其輕重以恵百姓朕承洪業上惟祖宗之休命夙興待旦惟民之恤欲令天下同於逸豫而徭賦不息將何以塞煩去苛拯濟黎元者哉今兵革不起畜積有餘諸有雜調一以與民秋七月癸巳太尉乙渾爲丞相位居諸王上事無大小皆決於渾九月庚子曲赦京師丙午詔曰先朝以州牧親民宜置良佐故勑有司班九條之制使前政選吏以待俊乂必謂銓衡允衷朝綱應敘然牧司寛惰不祗憲㫖舉非其人愆于典度今制刺史守宰到官之日仰自舉民望忠信以爲選官不聼前政共相干冐若簡任失所以罔上論是月劉子業征北大將軍義陽王劉昶自彭城來降冬十月徵陽平王新成京兆王子推濟隂王小新成汝隂王天賜任城王雲入朝是歲劉子業叔父彧殺子業僭立天安元年春正月己丑朔大赦改年二月庚申丞相太原王乙渾謀反伏誅乙亥以侍中元孔雀爲濮陽王侍中陸定國爲東郡王三月庚子以隴西王源賀爲太尉辛丑髙宗文成皇帝神主祔于太廟辛亥帝幸道壇親受符籙曲赦京師髙麗波斯于闐阿襲諸國遣使朝獻秋七月闕二字詔諸有詐取爵位罪特原之削其爵職其有祖父假爵號貨賕以正名者不聼繼襲諸非勞進超遷者亦各還初不以實聞者以大不敬論九月劉彧司州刺史常珍竒以懸瓠内屬己酉初立鄉學郡置博士二人助教二人學生六十人劉彧徐州刺史薛安都以彭城内屬彧將張永沈攸之擊安都詔北部尚書尉元爲鎮南大將軍都督諸軍事鎮東將軍城陽公孔伯恭爲副出東道救彭城殿中尚書}
