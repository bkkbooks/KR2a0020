  - {type: variant, offset: 2900, length: 0, content: '', WYG: 上黨王長孫觀討之廣陽王石侯薨三月丙戌詔曰朕思百姓病苦民多非命明發不寐疚心疾首是以廣集良醫逺採名藥欲以救䕶兆民可宣告天下民有病者所在官司遣醫就家診視所須藥物任醫量給之夏四月辛丑大赦天下戊申長孫觀軍至曼頭山大破拾寅拾寅與麾下數百騎宵遁拾寅從弟豆勿來及其渠帥匹婁拔累等率所領降附五月封皇弟長樂爲建昌王六月劉彧遣使朝貢秋八月羣盜入彭城殺鎭將元解愁長史勒兵滅之蠕蠕犯塞九月丙寅輿駕北伐諸將俱會于女水大破虜衆事具蠕蠕傳司徒東安王劉尼坐事免壬申車駕至自北伐飲至䇿勲告于宗廟冬十月誅濟南王慕容白曜髙平公李敷十有一月詔弛山澤之禁十有二月甲辰幸鹿野苑石窟寺}
