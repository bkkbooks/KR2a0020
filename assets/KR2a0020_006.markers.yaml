  - {type: variant, offset: 3753, length: 303, content: 子胡仁薨追封樂陵王乙巳詔曰朕憲章舊典分職設官欲令敷揚治化緝熙庶績然在職之人皆蒙顯擢委以事任當厲己竭誠務省徭役使兵民優逸家給人贍今內外諸司州鎮守宰侵使兵民勞役非一自今擅有召役逼雇不程皆論同枉法夏四月癸亥上幸西苑親射虎三頭五月壬辰侍中漁陽王尉眷薨壬寅行幸陰山秋七月壬午詔曰朕每歲以秋日閑月命羣官講武平壤所幸之處必立宮壇糜費之功勞損非一宜仍舊貫何必改作也八月丙寅遂畋于河西詔曰朕順時畋獵而從官殺獲過度既殫禽獸乖不合圍之義其敕從官及典圍將校自今已後不聽濫殺其畋獲皮肉別自頒賚壬申詔曰前以民遭飢寒不自存濟有賣鬻男女者盡仰還其家或因緣勢力或私行請託共相通容不時檢校令良家子息仍為奴婢今仰精究不聽取贖有犯加罪若仍不檢還聽, WYG: 帝尊}
