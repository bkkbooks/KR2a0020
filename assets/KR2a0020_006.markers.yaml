  - {type: variant, offset: 2130, length: 765, content: 課調懸少而深文極墨委罪於民苛求免咎曾不改懼國家之制賦役乃輕比年已來雜調減省而所在州郡咸有逋懸非在職之官綏導失所貪穢過度誰使之致自今常調不充民不安業宰民之徒加以死罪申告天下稱朕意焉六月丙申畋於松山秋七月庚午行幸河西九月乙巳還宮辛亥太華殿成丙寅饗羣臣大赦天下冬十月甲戌北巡至陰山有故塚毀廢詔曰昔姬文葬枯骨天下歸仁自今有穿毀墳隴者斬之劉駿將殷孝祖修兩城於清水東詔鎮西將軍天水公封敕文等擊之辛卯車駕次于車輪山累石記行十一月詔征西將軍皮豹子等三將三萬騎助擊孝祖車駕度漠蠕蠕絕跡遠遁其別部烏朱賀頹庫世頹率衆來降十有二月征東將軍中山王託真薨五年春正月己巳朔征西將軍皮豹子略地至高平大破孝祖斬獲五千餘級二月己酉侍中司空河南公伊戨薨三月庚寅曲赦京師死罪已下夏四月乙巳封皇弟子推為京兆王五月居常國遣使朝獻六月戊申行幸陰山秋八月庚戌遂幸雲中壬戌還宮九月戊辰詔曰夫褒賞必於有功刑罰審於有罪此古今之所同由來之常式牧守莅民侵食百姓以營家業王賦不充雖歲滿去職應計前逋正其刑罪而主者失於督察不加彈正使有罪者優游獲免無罪者妄受其辜是啟姦邪之路長貪暴之心豈所謂原情處罪以正天下自今諸遷代者仰列在職殿最案制治罪克舉者加之爵寵有愆者肆之刑戮使能否殊貫刑賞不差主者明為條制以為常楷儀同三司敦煌公李寶薨冬十有二月戊申詔曰朕承洪業統御羣有思恢政化以濟兆民故薄賦斂以實其財輕徭役以紓其力欲令百姓修業人不匱乏而六鎮雲中高平二雍秦州徧遇災旱年穀不收其遣開倉廩以賑之有流徙者諭還桑梓欲市糴他界為關傍郡通其交易之路若典司之官分職不均使上恩不達於下下民不贍於時加以重罪無有攸縱和平元年春正月甲子朔大赦改元庚午詔散騎常侍馮闡使於劉駿二月衞將軍樂安王良督東雍吐京六壁諸軍西趣河西征西將軍皮豹子等督河西諸軍南趨石樓以討河西叛胡夏四月戊戌皇太后常氏崩於壽安宮五月癸酉葬昭太后於廣寧鳴鷄山六月甲午詔, WYG: 持節}
