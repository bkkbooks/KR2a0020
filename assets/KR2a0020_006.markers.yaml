  - {type: variant, offset: 4136, length: 335, content: 同禮亦異數所以殊等級示軌儀今喪葬嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可為之條格使貴賤有章上下咸序著之于令壬寅詔曰夫婚姻者人道之始是以夫婦之義三綱之首禮之重者莫過於斯尊卑高下宜令區別然中代以來貴族之門多不率法或貪利財賄或因緣私好在於苟合無所選擇令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓為婚犯者加罪五年春正月丁亥封皇弟雲為任城王二月詔以州鎮十四去歲蟲水開倉賑恤夏四月癸卯頓丘公李峻進爵為王閏月戊子帝以旱故減膳責躬是夜澍雨大降五月庚申劉駿死子子業僭立六月丁亥行幸陰山秋七月辛丑北鎮游軍大破蠕蠕壬寅行幸河西九月辛丑車駕還宮冬十月琅邪王司馬楚之薨十有二月南秦王楊難當薨吐呼羅國遣使朝獻六年春正月丙申大赦, WYG: 統}
