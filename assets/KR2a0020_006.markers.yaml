  - {type: variant, offset: 1256, length: 270, content: 城改年癸酉詔曰夫為治者因宜以設官舉賢以任職故上下和平民無怨謗若官非其人姦邪在位則政教陵遲至於凋薄思明黜陟以隆治道今遣尚書穆伏真等三十人巡行州郡觀察風俗入其境農不墾殖田畝多荒則徭役不時廢於力也耆老飯蔬食少壯無衣褐則聚斂煩數匱於財也閭里空虛民多流散則綏導無方疏於恩也盜賊公行劫奪不息則威禁不設失於刑也衆謗並興大小嗟怨善人隱伏佞邪當途則為法混淆昏於政也諸如此比黜而戮之善於政者褒而賞之其有阿枉不能自申聽詣使告狀使者檢治若信清能衆所稱美誣告以求直反其罪使者受財斷察不平聽詣公車上訴其不孝父母不順尊長為吏姦暴及為盜賊各具以名上其容隱者以所匿之罪罪之是, WYG: 師六}
