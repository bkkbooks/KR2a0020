  - {type: variant, offset: 6701, length: 0, content: '', WYG: 舍人遭母憂去職帝令中書舍人温子昇就宅弔慰詔攝本任表辭不許三年加前軍將軍及元顥逼虎牢城或勸帝赴關西者帝以問道穆道穆對曰關中今日殘荒何由可往臣謂元顥兵衆不多乗虛深入者由國家將帥征提不得其人耳陛下若親率宿衞髙募重賞背城一戰臣等竭其股肱之力破顥孤軍必不疑矣如恐成敗難測非萬乗所履便宜車駕北渡循河東下徵大將軍天穆合於滎陽向虎牢别徵尒朱王軍令赴河内以掎角之旬月之間何往不剋臣竊謂萬全之計不過於此帝曰髙舍人語是其夜到河内郡北未有城守可依帝命道穆秉燭作詔書數十紙布告逺近於是四方知乗輿所在除中軍將軍給事黄門}
