  - {type: variant, offset: 6727, length: 1, content: 齊, WYG: 兼御史中尉尋即真仍兼黄門道穆外秉直繩内參機密凢是益國利民之事必以奏聞諫諍極言無所顧憚選用御史皆當世名軰李希宗李繪陽休之陽斐封君義邢子明蘇淑宋世良等四十人於時用錢稍薄道穆表曰四民之業錢貨爲本救獘改鑄王政所先自頃以私鑄薄濫官司糾繩挂網非一在市銅價八十一}
