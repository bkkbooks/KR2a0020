  - {type: variant, offset: 6042, length: 1, content: 獻, WYG: 淵太山平陽人梁州刺史祉第二子也早有風尚學渉經史好文章兼長几案少與隴西李神儁同志相友自司空府記室參軍轉輕車將軍尚書騎兵即尋轉駕部加右軍將軍于時沙汰郎官務精才實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之肅宗行釋奠之禮講孝經儕軰之中獨䝉引聴時論美之正光末北地人車金雀等帥羌胡反叛高平賊宿勤明達宼豳夏諸州北海王顥爲都督行臺討之以深爲持節通直散騎常侍行臺左丞軍司仍領即中顥敗還京頃之遷尚書左丞加平東將軍光禄大夫蕭寶夤反攻圍華州王平薛鳳賢等聚衆作逆勑深兼給事黄門侍郎與大行臺僕射長孫稚共會潼關規模進止事平以功賜爵新泰男靈太后曾幸邙山集僧尼齋會公卿盡在座會事將終太后引見深欣然勞問之深謝曰臣䝉國厚恩世荷榮遇寇難未平是臣憂責而隆私忽被犬馬知歸太后顧謂左右曰羊深真忠臣也舉坐傾心孝昌末徐方多事以深爲東道慰勞使即爲二徐行臺莊帝踐祚除安東將軍太府卿又爲二兖行臺深處分軍國損益隨機亦有時譽}
