  - {type: variant, offset: 5963, length: 0, content: '', WYG: 王懌所賞及欲定考懌曰辛騎兵有學有才宜爲上第轉越騎校尉尚書令李崇北伐蠕蠕引爲録事參軍臨淮王彧北征以纂隨崇有稱啓爲長史及廣陽王淵北伐又引爲長史尋拜諫議大夫雅爲彧所稱歎屢在朝廷薦舉之蕭衍遣將曹義宗攻新野詔纂持節兼尚書左丞}
