  - {type: variant, offset: 4636, length: 82, content: 任城王澄之圍鍾離也以思伯持節為其軍司及澄失利思伯為後殿澄以思伯儒者謂之必死及至大喜曰仁者必有勇常謂虛談今於軍司見之矣思伯託以失道不伐其功時論稱其長者後為河內太守不拜, WYG: 尚書右丞}
