  - {type: variant, offset: 6727, length: 1, content: 齊, krp: 兼御史中尉尋即真仍兼黄門道穆外秉直繩内參機密凢是益國利民之事必以奏聞諫諍極言無所顧憚選用御史皆當世名軰李希宗李繪陽休之陽斐封君義邢子明蘇淑宋世良等四十人於時用錢稍薄道穆表曰四民之業錢貨爲本救獘改鑄王政所先自頃以私鑄薄濫官司糾繩挂網非一在市銅價八十一}
  - {type: variant, offset: 6729, length: 5, content: 襄王引為開, WYG: 得銅一斤私造薄錢斤餘二百既示之以深利又隨之以重刑罹罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷之愆彼復何罪昔漢文帝以五分錢小故鑄四銖至武帝復改三銖爲半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鈆沙縱復私營不能自潤直置無利自應息心況復嚴刑廣設也以臣測之必當錢貨永通公私獲允後遂用楊侃計鑄永安五銖錢僕射尒朱世隆當朝權盛因内見衣冠失儀道穆便即彈糾帝姊夀陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以爲恨泣以訴帝帝謂公主曰髙中尉清直之人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯極以爲愧道穆免冠謝曰臣䝉陛下恩守陛下法不敢獨於公主虧朝廷典章以此負陛下帝曰朕以愧卿卿反謝朕尋勑監儀注又詔曰祕書圖籍所在内典書又加繕冩緗素委積蓋有年載出内繁蕪多致零落可令御史中尉兼給事黄門侍即道穆惣集帳目并牒儒學之士編比次第道穆又上疏曰臣聞舜命臯陶姦宄是託禹泣辜人堯心爲念所以舉直錯枉事切曩賢明徳慎罰議存先典髙祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要所謂禮樂互興不相㳂襲者矣臣以無庸忝當今任所思報效未忘寢興但識謝知今業慙稽古未能進一言以利國説一䇿以興邦索米長安豈不知耻至於職司其憂猶望僶俛竊見御史出使悉受風聞雖時獲罪人亦不無枉濫何者得堯之罰不能不怨守令爲政容有愛憎姦猾之徒恒思報惡多有妄造無名共相誣謗御史一經檢究耻於不成杖木之下以虛爲實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指冀以清肅若仍踵前失或傷善人則尸禄之責無所逃罪所以夙夜爲憂思有悛革如臣鄙見請依太和故事還置司直十人名𨽻廷尉秩以五品選歴官有稱心平性正者爲之御史若出紏劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居别館御史檢了移付司直覆問事訖與御史俱還中尉彈聞廷尉科按一如舊式庶使獄成罪定無復稽寛爲惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聴以所檢迭相紏發如二使阿曲有不盡理聴罪家詣門下通訴别加按檢如此則肺石之傍怨訟可息叢棘之下受罪吞聲者矣詔從之復置司直及尒朱榮之死也帝召道穆付赦書令宣於外因謂之曰自今日後常得精選御史矣先是榮等常欲以其親黨爲御史故有此詔及尒朱世隆等率其部類戰於大夏門北道穆受詔督戰又贊成太}
