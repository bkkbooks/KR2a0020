  - {type: variant, offset: 269, length: 332, content: 默曹參軍早卒尼從子鳴鵠鳴鵠弟季智俱有名於時前後並為幽州司馬季智子璠通直散騎常侍季智從弟荊范陽太守有吏能卒贈平西將軍東益州刺史季智從子伯慶汝南太守伯慶從父弟藻字景德少孤有雅志涉獵經史太和初舉秀才射策高第以母疾還徵拜中書博士詔兼禮官拜燕宣王廟於長安還授寧遠將軍賜爵魏昌男選為廷尉正轉考功郎中除建德太守以清貧賜帛六十匹尋假寧遠將軍領統軍外防內撫甚得居邊之稱解任還家久之除兗州左將軍府長史又拜瀛州安東府長史加揚烈將軍藻以年老歸家闔門不關世事孝昌中在鄉為賊帥杜洛周所囚發病卒永熙中贈征虜將軍幽州刺史子貞字世幹早卒貞弟弼字世輔長於吏事本州別駕加輕車將軍屬洛周陷城弼遂率宗親南渡河居於青州值邢杲起逆青州城民疑河北人為杲內應遂害弼時年四十八子撝襲祖爵弼弟斐武定末尚書右丞藻從弟令鮮, WYG: ''}
