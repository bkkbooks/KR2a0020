  - {type: variant, offset: 6457, length: 1, content: 獄, WYG: 令常得入奏是非所以朝貴斂手無敢干政近日以來此制遂寢致使神宰威輕下情不達今二聖逺遵堯舜憲章髙祖愚臣望䇿其駑蹇少立功名乞新舊典更明往制庶姦豪知禁頗自屏心詔曰此啓深會朕意付外量聞謙之又上疏曰臣聞夏德中微少康成克復之主周道將廢宣王立中興之功則知國無常安世無恒敝唯在明主所以變之有方化之有道耳自正光已來邊城屢擾命將出師相繼於路軍費戎資委輸不絶至如弓格賞募咸有出身槊刺斬首又䝉階級故四方壯士願征者多各各爲己公私兩利若使軍帥必得其人賞勲不失其實則何賊不平何征不㨗也諸守帥或非其才多遣親者妄稱入募别倩他人引弓格虛受征官身不赴陳惟遣奴客充數而已對宼臨敵曾不彎弓則是王爵虛加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曹擅作威福如有清貞奉法不爲回者咸共譖毁横受罪罰在朝顧望誰肯申聞蔽上擁下虧風壊政使讒諂甘心忠讜息義况且頻年以來多有徵發民不堪命動致流離茍保妻}
  - {type: page-break, offset: 6457, content: '', id: KR2a0020_WYG_077-27a, image: WYG0262/WYG0262-0152a.png}
  - {type: page-break, offset: 6457, content: '', id: KR2a0020_WYG_077-27b, image: WYG0262/WYG0262-0152b.png}
