  - {type: variant, offset: 4631, length: 1, content: 轉, WYG: 悴乃降明詔賞不移時然兵將之勲歴稔不決亡軍之卒晏然在家致令節士無所勸慕庸人無所畏懾進而擊賊死交而賞賖退而逃散身全而無罪此其所以望敵奔沮不肯進力者矣若重發明詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯須廢也賞罰陛下之所易尚不能全而行之攻敵士之所難欲其必死寧可得也臣既庸弱忝當戎使職司所見輙敢上聞惟陛下審其可否會右丞闕肅宗詔僕射城陽王徽舉人徽遥舉雄仍除}
