  - {type: variant, offset: 4812, length: 6, content: 祿少卿仍拜左, WYG: 禄大夫郎中如故上疏曰帝王之道莫尚於安民安民之本莫加於禮律禮律既設擇賢而行之天下雍熙無非任賢之功也故虞舜之盛穆穆標羙文王受命濟濟以康髙祖孝文皇帝天縱大聖開復典謨選三代之異禮採二漢之典法端拱而四方安刑措而兆民治世宗重光繼軌每念聿修官人有道萬里清謐陛下劬勞日昃躬親庶政求瘼恤民無時暫憩而黔首紛然兵車不息以臣愚見可得而言自神龜末來專以停年爲選士無善惡歳乆先叙職無劇易名到授官執按之吏以差次日月爲功能銓衡之人以簡用老舊爲平直且庸劣之人莫不貪鄙委斗筲以共治之重託碩鼠以百里之命皆貨賄是求肆心縱意禁制雖煩不勝其欲致令徭役不均發調違謬箕斂盈門囚執满道二聖明詔寢而不遵畫一之法懸而不用自此夷夏之民相}
  - {type: page-break, offset: 4812, content: '', id: KR2a0020_WYG_077-9b, image: WYG0262/WYG0262-0143b.png}
