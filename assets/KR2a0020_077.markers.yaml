  - {type: variant, offset: 6008, length: 1, content: 贈, WYG: 至城下尒朱世隆狼狽退還城内空虛遂爲顥擒及莊帝還宫纂謝不守之罪帝曰於時朕亦北廵東軍不守豈卿之過還鎮虎牢俄轉中軍將軍榮陽太守民有姜洛生康乞得者舊是太守鄭仲明左右豪猾偷竊境内爲患纂伺捕擒獲梟於郡市百姓忻然加鎮東將軍太昌中除左光禄大夫纂僑寓洛陽乃爲河南邑中正永熙三年除}
