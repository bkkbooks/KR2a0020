  - {type: variant, offset: 6008, length: 1, content: 贈, krp: 至城下尒朱世隆狼狽退還城内空虛遂爲顥擒及莊帝還宫纂謝不守之罪帝曰於時朕亦北廵東軍不守豈卿之過還鎮虎牢俄轉中軍將軍榮陽太守民有姜洛生康乞得者舊是太守鄭仲明左右豪猾偷竊境内爲患纂伺捕擒獲梟於郡市百姓忻然加鎮東將軍太昌中除左光禄大夫纂僑寓洛陽乃爲河南邑中正永熙三年除}
  - {type: punctuation, offset: 6012, content: 、, id: KR2a0020_ZHSJ_077-bkkpn1176}
  - {type: variant, offset: 6012, length: 0, content: '', WYG: 河内太守齊獻武王赴洛兵集城下纂出城謁王曰纂受詔於此本有禦防大王忠貞王室扶奨顛危纂敢不匍匐王曰吾志去姦佞以康國道河内此言深得王臣之節因命前侍中司馬子如曰吾行途疲敝宜代吾執河内手也便入洛九月行西荆州事兼尚書南道行臺尋正刺史時蠻酋樊五能破析陽郡應宇文黑獺纂議欲出軍討之纂行臺郎中李廣諫曰析陽四面無民唯一城之地耳山路深險表裏羣蠻今若少遣軍則力不能制賊多遣則減徹防衞根本虛弱脱不如意便大挫威名人情一去州城難保纂曰豈得縱賊不討令其爲患日深廣曰今日之事唯湏萬全且慮在心腹何暇疥癬聞臺軍已破洪威計不乆應至公但約勒屬城使各修完壘壁善撫百姓以待救兵雖失析陽如棄雞肋纂曰卿言自是一途我意以爲不爾遂遣兵攻之不剋而敗諸將因亡不返城人又密招西賊黑獺遣}
  - {type: page-break, offset: 6012, content: '', id: KR2a0020_WYG_077-15b, image: WYG0262/WYG0262-0146b.png}
  - {type: page-break, offset: 6012, content: '', id: KR2a0020_WYG_077-16a, image: WYG0262/WYG0262-0146c.png}
