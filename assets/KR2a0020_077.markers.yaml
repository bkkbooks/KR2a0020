  - {type: variant, offset: 6464, length: 3, content: 夫叔寶, WYG: 獲課民今不務以理還之但欲嚴符切勒恐數年之後走者更多安業無幾故有國有家者不患民不我歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一致且琴瑟不韻知音改弦更張騑驂未調善御執轡成組諺云迷而知反得道不逺此言雖小可以諭大陛下一日萬幾事難周覽元凱結舌莫肯明言臣雖庸短世受榮禄竊慕前賢匪躬之義不避斧鉞之誅以希一言之益伏願少垂覽察略加推採使朝章重舉軍威更振海内起惟新之歌天下見復禹之績則臣奏之後笑入下泉靈太后得其疏以責左右近侍諸寵要者由是疾之乃啓太后云謙之有學藝宜在國學以訓胄子詔}
