  - {type: variant, offset: 80, length: 178, content: 徵拜祕書著作郎奏佛道宜在史錄後改中書學為國子學時中書監高閭侍中李沖等以尼碩學博識舉為國子祭酒高祖嘗親在苑堂講諸經典詔尼侍聽賜帛百匹尼後兼幽州中正出為幽州平北府長史帶漁陽太守未拜坐為中正時受鄉人財貨免官尼每自傷曰吾昔未仕不曾羨人今日失官與本何異然非吾宿志命也如何既而還鄉遂卒於冀州年六十一有書數千卷所造字釋數十篇未就而卒其從孫太學博士承慶遂撰為字統二十卷行於, WYG: ''}
