  - {type: variant, offset: 5962, length: 0, content: '', WYG: 帝入闗右齊獻武王至洛於永寧寺集朝士責讓雄及尚書崔孝芬劉廞楊機等曰爲臣奉主扶危救亂若處不諫諍出不陪隨緩則耽寵急便竄避臣節安在諸人黙然不能對雄對曰當主上信狎近臣雄等不與謀議及乗輿西邁若即奔隨便恐跡同佞黨留待大王便以不從䝉責雄等進退如此不能自委溝壑實爲慙負王復責曰卿等備位納言當以身報國不能盡忠依附諂佞未聞卿等諫諍一言使國家之事忽至於此罪欲何歸也乃誅之時年五十没其家口二子士璨士貞逃入關中雄從父兄纂字伯將學渉文史温良雅正初爲兖州安東府主簿與祕書丞同郡李伯尚有舊伯尚與咸陽王禧同逆逃竄投纂事覺坐免官積十餘年除奉朝請稍轉太尉騎兵參軍每爲府主清}
