  - {type: variant, offset: 8258, length: 1219, content: 贈征東將軍濟州刺史長子超字伯穎武定末司徒錄事參軍濟州大中正超弟昭淮州驃騎大將軍府長史曹世表字景昇東魏郡魏人也魏大司馬休九世孫祖謨父慶並有學名世表少喪父舉止有禮度性雅正工尺牘涉獵羣書太和二十三年尚書僕射任城王澄奏世表為國子助教頗失意後轉司徒記室與武威賈思伯范陽盧同隴西辛雄等並相友善侍中崔光鄉里貴達每稱美之遇患歸鄉永平中除兗州左將軍府司馬非其所願復以病解延昌中除清河太守治官省約百姓安之正光中拜前將軍通直散騎常侍大將軍京兆王繼西征以為從事中郎攝中水兵事自當煩劇論者皆稱其能還都拜司空長史孝昌中青齊頻年反亂詔世表持節慰喻還都轉尚書右丞後加征虜將軍出行豫州刺史值蕭衍將湛僧珍陷東豫州州民劉獲鄭辯反於州界為之內應朝廷以源子恭代世表為州以世表為東南道行臺率元安平元顯伯皇甫鄧林等討之於時賊衆強斷小殷關驛使不通諸將以士馬單少皆敗散之餘不敢復戰咸欲保城自固世表時患背腫乃輿病出外呼統軍是云寶謂之曰湛僧珍所以敢深入為寇者以獲辯皆州民之望為之內應向有驛至知劉獲移軍欲迎僧珍去此八十里今出其不意一戰可破獲破則僧珍自走東南清服卿之功也乃簡選兵馬付寶討之促令發軍日暮出城比曉兵合賊不意官軍卒至一戰破獲諸賊悉平湛僧珍退走唯鄭辯與子恭親舊亡匿子恭所世表召諸將吏衆責子恭收辯斬之傳首京師敕遣中使宣旨慰喻賜馬二匹衣服被褥復以世表行豫州事行臺如故還朝加左將軍兼尚書東道行臺沿河分立鎮戍以備葛榮行達青州遇患卒時年五十四永熙中贈平東將軍齊州刺史潘永基字紹業長樂廣宗人也父靈虬中書侍郎永基性通率輕財好施為冀州鎮東府法曹行參軍遷威烈將軍揚州曲陽戍主轉西硤石戍主治陳留南梁二郡事頗有威惠轉揚州車騎府主簿累遷虎賁中郎將直寢前將軍出為持節平北將軍冀州防城都督長樂太守于時葛榮攻信都長圍遏水以灌州城永基與刺史元孚同心勠力晝夜防拒外無軍援內乏糧儲從春至冬力窮乃陷榮欲害孚永基請以身代孚死永安二年除潁川太守遷鎮東將軍東徐州刺史時蕭衍將曹世宗馬洪武等率衆來寇永基出討破之永熙中為征東將軍金紫光祿大夫遷車騎將軍左光祿大夫尋加衞大將軍復除東徐州刺史前後在州為吏民所樂代還京師元象初卒年五十六贈散騎常侍都督冀瀛滄三州諸軍事驃騎大將軍尚書右僕射司徒公冀州刺史長子子禮州主簿子禮弟子智武定中太尉士曹參軍朱元旭字君昇本樂陵人也祖霸真君末南叛投劉義隆遂居青州之樂陵元旭頗涉子史開解几案起家清河王國常侍太學博士員外散騎侍郎頻使高麗除尚書度支郎中神龜末以郎選不精大加沙汰元旭與隴西辛雄范陽祖瑩泰山羊深西平源子恭並以才用見留尋加鎮遠將軍兼尚書右丞仍郎中本州中正時關西都督蕭寶夤啟云所統十萬食唯一月於是肅宗大怒召問所由錄令以下皆推罪於元旭元旭入見於御座前屈指校計寶夤兵糧乃踰一年事乃得釋除通直散騎常侍永安初加平東將軍尚書左丞光祿大夫後轉司農少卿遷衞將軍左光祿大夫天平中復拜尚書左丞既無風操俛仰隨俗性多機數自容而已於時朝廷分汲郡河內二界挾河之地以立義州安置關西歸款之戶除元旭使持節驃騎將軍義州刺史武定三年夏卒於州年六十, WYG: ''}
