  - {type: variant, offset: 4819, length: 5, content: 軍兗州刺史, WYG: 爲亂豈有餘憾哉蓋由官授不得其人百姓不堪其命故也當今天下黔黎乆經宼賊父死兄亡子弟淪陷流離艱危十室而九白骨不收孤煢靡恤財殫力盡無以卒歳宜及此時早加慰撫蓋助陛下治天下者惟在守令最湏簡置以康國道但郡縣選舉由來共輕貴遊儁才莫肯居此宜改其獘以定官方請上等郡縣爲第一清中等爲第二清下等爲第三清選補之法妙盡才望如不可竝後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不歴郡縣不得爲内職則人思自勉上下同心枉屈可申彊暴自息刑政日平民俗奉化矣復何憂於不治何恤於逆徒也竊見今之守令清慎奉治則政平訟理有非其才則綱維荒穢伏願陛下蹔留天心校其利害則臣言可驗不待終朝昔杜畿寛惠河東無警蘓則分糧金城剋復略觀今古風俗遷訛罔不任賢以相化革朝任夕治功可立待若遵常習故不明選典欲以静民便恐無日書奏會}
