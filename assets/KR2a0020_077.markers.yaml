  - {type: variant, offset: 867, length: 306, content: 政久之以公事免後除給事中領侍御史轉治書劾奏廣平王懷汝南王悅南陽長公主及使懷荒鎮將萬貳望風逃走劾農太守裴粲免官時世宗廣訪得失固上讜言表曰臣聞為治不在多方在於力行而已當今之務宜早正東儲立師傅以保護立官司以防衞以係蒼生之心攬權衡親宗室強幹弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素餐孜孜萬幾躬勤庶務使民無謗讟之響省徭役薄賦斂修學官遵舊章貴農桑賤工賈絕談虛窮微之論簡桑門無用之費以存元元之民以救飢寒之苦上合昊天之心下悅億兆之望然後備器械修甲兵習水戰滅吳會撰封禪之禮襲軒唐之軌同彼七十二君之徽號協定鼎嵩河之心副高祖殷勤之寄上與三皇比隆下與五帝齊美豈不茂哉臣位卑識昧言不及義屬聖明廣訪敢獻瞽言伏願陛下留神少垂究察初世宗委任, WYG: 蔚典校}
