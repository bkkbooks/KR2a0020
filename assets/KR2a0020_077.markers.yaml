  - {type: variant, offset: 5896, length: 0, content: '', WYG: 以侃爲度支尚書及乘輿反洛復召雄上雄靣辭曰臣不能死事俛眉從賊乃是朝廷罪人縱陛下不賜誅罰而北來尚書勲髙義重臣宜避賢路莊帝曰卿且}
