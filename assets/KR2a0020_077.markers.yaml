  - {type: variant, offset: 5641, length: 217, content: 轉正都官時太保崔光疾甚表薦思伯為侍講中書舍人馮元興為侍讀思伯遂入授肅宗杜氏春秋思伯少雖明經從官廢業至是更延儒生夜講晝授性謙和傾身禮士雖在街途停車下馬接誘恂恂曾無倦色客有謂思伯曰公今貴重寧能不驕思伯曰衰至便驕何常之有當世以為雅談為元叉所寵論者譏其趣勢孝昌元年卒贈鎮東將軍青州刺史又贈尚書右僕射諡曰文貞子彥始武定中淮陽太守思伯弟思同字士明少厲志行雅好經史釋褐彭城王國侍郎五遷尚書考功郎青州別駕久之遷鎮遠將軍中散大夫試守滎陽太守尋即真後除平, WYG: 加安}
