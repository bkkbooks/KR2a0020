  - {type: variant, offset: 6403, length: 0, content: '', WYG: 成初崇謂友人曰仲尼四科德行爲首人能立身約已不忘典訓斯亦足矣故吾諸子闕子謙之字道讓少事後母李以孝聞李亦撫育過於已生人莫能辨其兄弟所出同異論者兩重之及長屏絶人事專意經史天文算歴圖緯之書多所該渉日誦數千言好文章留意老易襲爵釋褐奉朝請加宣威將軍轉奉車都尉廷尉丞正光中尚書左丞元孚慰勞蠕蠕反被拘留及蠕蠕大掠而還置孚歸國事下廷尉卿及監以下謂孚無坐惟謙之以孚辱命闕以流罪尚書同卿執詔可謙之奏孝昌初行河隂縣令先是有人囊盛瓦礫指作錢物詐市人馬因逃去詔令追捕必得以聞謙之乃僞枷一囚立於馬市宣言是前詐市馬賊今欲刑之密遣腹心察市中私議者有二人相見忻然曰無復憂矣執送按問具伏盗馬徒黨悉獲并出前後盗竊之處資貨甚多逺年失物之家各來得其本物具以狀奏尋詔除寧逺將軍正河隂令在縣二年損益治體多爲故事弟道}
