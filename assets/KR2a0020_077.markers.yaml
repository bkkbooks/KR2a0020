  - {type: variant, offset: 6479, length: 1, content: 坐, WYG: 謙之與袁飜常景酈道元温子昇之徒咸申欵舊好於贍恤言諾無虧居家僮隷對其兒不撻其父母生三子便免其一世無髠黥奴婢常稱俱禀人體如何殘害以父舅氏沮渠蒙遜曾據涼土國書漏闕謙之乃修涼書十卷行於世涼國盛事佛道爲論貶之因稱佛是九流之一家當世名士競以佛理來難謙之還以佛義對之竟不能屈以時所行厯多未盡善乃更改元修撰爲一家之法雖未行於世議者歎其多能於時朝議鑄錢以謙之爲鑄錢都將長史乃上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公爲周置九府圜法至景王時更鑄大錢秦兼海内錢重半兩漢興以秦錢重改鑄榆莢錢至文帝五年復爲四銖孝武時悉復銷壊更鑄三銖至元狩中變爲五銖又造赤仄之錢以一當五王莾攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不隨時而變竊以食貨之要八政爲首聚財之貴詒訓典文是以昔之帝王乗天地之饒御海内之富莫不腐紅粟於太倉藏朽貫於泉府儲畜既盈民無困敝可以寧謐四極如身使臂者矣昔漢之孝武地廣財豐外事四戎遂虛國用於是草萊之臣出財助國興利之計納税廟堂市列𣙜酒之官邑有告緡之令鹽鐵既興錢幣屢改少府遂豐上林饒積外闢百蠻内不增賦者皆計利之由也今羣妖未息四郊多壘徵税既煩千金日費資儲漸耗財用將竭誠楊氏獻税之秋桑兒言利之日夫以西京之盛錢猶屢改竝行小大子母相權况今宼難未除州郡淪敗民物凋零軍國用少别鑄小錢可以富益何損於政何妨於人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之於古亦宜效之於今矣昔禹遭大水以歴山之金鑄錢救民之困湯遭大旱以莊山之金鑄錢贖民之賣子者今百姓窮悴甚於曩日欽明之主豈得垂拱而觀之哉臣今此鑄以濟交乏五銖之錢任使竝用行之無損國得其益穆公之言於斯驗矣臣雖術愧計然識非心筭暫充錢官頗覩其理茍有所益不得不言脱以爲疑求下公卿博議如謂爲允即乞施行詔將從之事未就會卒初謙之}
