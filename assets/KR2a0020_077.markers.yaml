  - {type: variant, offset: 6524, length: 1, content: 沛, WYG: 營州刺史諡曰康又除一子出身以明寃屈謙之妻中山張氏明識婦人也敎勸諸子從師受業常誡之曰自我爲汝家婦未見汝父一日不讀書汝等宜各修勤勿替先業謙之長子子儒字孝禮元顥入洛其叔道穆從駕北廵子儒後踰河至行宫莊帝見之具訪洛中事意子儒備陳元顥敗在旦夕帝謂道穆曰卿初來日何故不與子儒俱行對曰臣家百口在洛湏其經營且欲其今日之來知京師後事帝曰子儒非直合卿本懐亦大慰朕意仍授祕書郎中轉通直即後除安東將軍光禄大夫司徒中兵參軍兼祭酒襲爵興和初除兼殿中侍御史時四方多有流民子儒爲梁州北豫西兖三州檢户使所獲甚多後以公事去官武定六年卒時年四十一子儒弟緒字叔宗明悟好學謙之常謂人曰興吾門者當是此兒及長渉獵書𫝊好文詠司空行參軍轉長流參軍除鎮逺將軍冀州儀同府中兵參軍爲府主封隆之所賞隆之行梁州濟州引自隨恒令總攝數}
