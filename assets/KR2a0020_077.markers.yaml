  - {type: variant, offset: 4615, length: 0, content: '', WYG: 錫之以匡名陛下任之以彈糾至若茹皓升輦匡斥宜下之言高肈當政匡陳擅權之表剛毅忠款羣臣莫及骨鯁之跡朝野共知當高肈之時匡造棺致諫主聖臣直卒以無咎假欲重造先帝已容之於前陛下亦宜寛之於後況其元列由緒與罪按不同也脱終貶黜不在朝廷恐杜忠臣之口塞諫者之心乖琴瑟之至和違鹽梅之相濟祈奚云叔向之賢可及十世而匡不免其身實可嗟惜未幾匡除龍驤將軍平州刺史右僕射元欽謂左僕射蕭寶夤曰至如辛即中才用省中諸人莫出其右寶夤曰吾聞游僕射云得如雄者四五人共治省事足矣今日之賞何其晚哉初廷尉少卿袁飜以犯罪之人經恩競訴枉直難明遂奏曽染風聞者不問曲直推爲獄成悉不斷理詔令門下尚書廷尉議之雄議曰春秋之義不幸而失寜僣不濫僣則失罪人濫乃害善人今議者不忍罪姦吏使出入縱情令君子小人薰蕕不别豈}
  - {type: page-break, offset: 4615, content: '', id: KR2a0020_WYG_077-4b, image: WYG0262/WYG0262-0140d.png}
  - {type: page-break, offset: 4615, content: '', id: KR2a0020_WYG_077-5a, image: WYG0262/WYG0262-0141a.png}
  - {type: variant, offset: 4615, length: 0, content: '', krp: 錫之以匡名陛下任之以彈糾至若茹皓升輦匡斥宜下之言高肈當政匡陳擅權之表剛毅忠款羣臣莫及骨鯁之跡朝野共知當高肈之時匡造棺致諫主聖臣直卒以無咎假欲重造先帝已容之於前陛下亦宜寛之於後況其元列由緒與罪按不同也脱終貶黜不在朝廷恐杜忠臣之口塞諫者之心乖琴瑟之至和違鹽梅之相濟祈奚云叔向之賢可及十世而匡不免其身實可嗟惜未幾匡除龍驤將軍平州刺史右僕射元欽謂左僕射蕭寶夤曰至如辛即中才用省中諸人莫出其右寶夤曰吾聞游僕射云得如雄者四五人共治省事足矣今日之賞何其晚哉初廷尉少卿袁飜以犯罪之人經恩競訴枉直難明遂奏曽染風聞者不問曲直推爲獄成悉不斷理詔令門下尚書廷尉議之雄議曰春秋之義不幸而失寜僣不濫僣則失罪人濫乃害善人今議者不忍罪姦吏使出入縱情令君子小人薰蕕不别豈}
  - {type: variant, offset: 4616, length: 0, content: '', WYG: 謂賞善罰惡殷勤隠恤者也仰尋周公不減流言之愆俯惟釋之不加驚馬之辟所以小大用情貴在得所失之千里差在毫釐雄乆執案牘數見疑訟職掌三千願言者六一曰御史所糾有注其逃走者及其出訴或爲公使本曹給過所有指如不推檢文案灼然者雪之二曰御史赦前注獲見贓不辨行賕主名檢無賂以置直之主宜應洗復三曰經拷不引傍無三證比以獄案既成因即除削或有據令奏復者與奪不同未獲爲通例又須定何如得爲證人若必湏三人對見受財然後成證則於理太寛若傳聞即爲證則於理太急令請以行賕後三人俱見物及證狀顯著凖以爲驗四曰赦前斷事或引律乖錯使除復失𠂻雖案成經赦宜追從律五曰經赦除名之後或邀駕訴枉被㫖重究或訴省稱寃爲奏更檢事付有司未被研判遂遇恩宥如此之徒謂不得異於常格依前案爲定若不合拷究已復之流請不追奪六曰或受辭下檢反覆使鞫獄證占分明理合清雪未及告案忽逄恩赦若從證占而雪則違正格如除其名罪濫潔士以爲罪須案成雪以占定若拷未畢格及要證一人未集者不得爲占定古人雖患察獄之不精未聞}
  - {type: page-break, offset: 4616, content: '', id: KR2a0020_WYG_077-5b, image: WYG0262/WYG0262-0141b.png}
  - {type: page-break, offset: 4616, content: '', id: KR2a0020_WYG_077-6a, image: WYG0262/WYG0262-0141c.png}
