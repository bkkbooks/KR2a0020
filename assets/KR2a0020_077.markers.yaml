  - {type: punctuation, offset: 4617, content: ，, id: KR2a0020_ZHSJ_077-bkkpn882}
  - {type: 'tls:seg', offset: 4617, content: '', id: KR2a0020_ZHSJ_077-d77p102s12}
  - {type: variant, offset: 4617, length: 0, content: '', WYG: 寃而不理今之所陳實士師之深疑朝夕之急務願垂察焉詔從雄議自後每有疑議雄與公卿駮難事多見從於是公能之名甚盛又爲禄飬論稱仲尼陳五孝自天子至庶人無致仕之文禮記八十一子不從政九十家不從政鄭元注云復除之然則止復庶民非公卿大夫士之謂以爲宜聴禄飬不約其年書奏肅宗納之以母憂去任卒哭右僕射元欽奏雄起復爲即俄兼司州别駕加前軍將軍孝昌元年徐州刺史元法僧以城南叛蕭衍遣蕭綜來據彭城時遣大都督安豐王延明督臨淮王或討之磐桓不進乃詔雄副太}
  - {type: page-break, offset: 4617, content: '', id: KR2a0020_WYG_077-6b, image: WYG0262/WYG0262-0141d.png}
  - {type: page-break, offset: 4617, content: '', id: KR2a0020_WYG_077-7a, image: WYG0262/WYG0262-0142a.png}
  - {type: variant, offset: 4617, length: 0, content: '', krp: 寃而不理今之所陳實士師之深疑朝夕之急務願垂察焉詔從雄議自後每有疑議雄與公卿駮難事多見從於是公能之名甚盛又爲禄飬論稱仲尼陳五孝自天子至庶人無致仕之文禮記八十一子不從政九十家不從政鄭元注云復除之然則止復庶民非公卿大夫士之謂以爲宜聴禄飬不約其年書奏肅宗納之以母憂去任卒哭右僕射元欽奏雄起復爲即俄兼司州别駕加前軍將軍孝昌元年徐州刺史元法僧以城南叛蕭衍遣蕭綜來據彭城時遣大都督安豐王延明督臨淮王或討之磐桓不進乃詔雄副太}
  - {type: variant, offset: 4618, length: 0, content: '', WYG: 少卿元晦爲使給齊庫刀持節乘驛催軍有違即令斬決肅宗謂雄曰誨朕家諸子摽以親懿籌策機計仗卿取勝耳到軍勒令竝進徐州綜送降欵冀州刺史侯剛啓爲長史肅宗以雄長於世務惜不許之更除司空長史於時諸公皆慕其名欲屈爲佐莫能得也時諸方賊盛而南宼侵境山蠻作逆肅宗欲親討以荆州爲先詔雄爲行臺左丞與前軍臨淮王彧東趨葉城别將裴衍西通鵶路衍稽留未進或師已次汝濱北溝求救或以處分道别不欲應之雄曰今裴衍未至王士衆已集蠻左唐突撓亂近畿梁汝之間民不安業若不時撲滅更爲深害王秉麾閫外唯利是}
  - {type: page-break, offset: 4618, content: '', id: KR2a0020_WYG_077-7b, image: WYG0262/WYG0262-0142b.png}
  - {type: variant, offset: 4618, length: 0, content: '', krp: 少卿元晦爲使給齊庫刀持節乘驛催軍有違即令斬決肅宗謂雄曰誨朕家諸子摽以親懿籌策機計仗卿取勝耳到軍勒令竝進徐州綜送降欵冀州刺史侯剛啓爲長史肅宗以雄長於世務惜不許之更除司空長史於時諸公皆慕其名欲屈爲佐莫能得也時諸方賊盛而南宼侵境山蠻作逆肅宗欲親討以荆州爲先詔雄爲行臺左丞與前軍臨淮王彧東趨葉城别將裴衍西通鵶路衍稽留未進或師已次汝濱北溝求救或以處分道别不欲應之雄曰今裴衍未至王士衆已集蠻左唐突撓亂近畿梁汝之間民不安業若不時撲滅更爲深害王秉麾閫外唯利是}
  - {type: variant, offset: 4619, length: 0, content: '', WYG: 見可而進何必守道茍安社稷理可專裁所謂臣率義而行不待命者也或恐後有得失之責要雄符下雄以駕將親伐蠻夷必懐震動乗彼離心無往不破遂符或軍令速赴繫賊聞之果自走散在軍上疏曰凢人所以臨堅陳而忘身觸白刄而不憚者一則求榮名二則貪重賞三則畏刑罰四則避禍難非此數事雖聖王不能勸其臣慈父不能厲其子明主深知其情故賞必行罰必信使親疎貴賤勇怯賢愚聞鐘鼓之聲見旌旗之列莫不奮激競赴敵塲豈厭乆生而樂早死也利害懸於前欲罷不能耳自秦隴逆節將歴數年蠻左亂常稍已多載凢在戎役數十萬人三方師衆敗多勝少跡其所由不明賞罰故也陛下欲天下之早平愍}
  - {type: page-break, offset: 4619, content: '', id: KR2a0020_WYG_077-8a, image: WYG0262/WYG0262-0142c.png}
  - {type: page-break, offset: 4619, content: '', id: KR2a0020_WYG_077-8b, image: WYG0262/WYG0262-0142d.png}
