  - {type: variant, offset: 1174, length: 2842, content: 下不甚親覽好桑門之法尚書令高肇以外戚權寵專決朝事又咸陽王禧等並有釁故宗室大臣相見疏薄而王畿民庶勞弊益甚固乃作南北二都賦稱代田漁聲樂侈靡之事節以中京禮儀之式因以諷諫辭多不載世宗末中尉王顯起宅既成集僚屬饗宴酒酣問固曰此宅何如固對曰晏嬰湫隘流稱于今豐屋生災著於周易此蓋同傳舍耳唯有德能卒願公勉之顯默然他日又謂固曰吾作太府卿庫藏充實卿以為何如固對曰公收百官之祿四分之一州郡贓贖悉入京藏以此充府未足為多且有聚斂之臣寧有盜臣豈不戒哉顯大不悅以此銜固又有人間固於顯顯因奏固剩請米麥免固官既無事役遂闔門自守著演賾賦以明幽微通塞之事其詞曰紹有周之遐軌兮初錫世於河陽建甸侯而列爵兮與王室而並昌遭季葉之紛亂兮仍矯迹於良鄉棄侯衞之楨弼兮乃殖根於幽方自祖考而輝烈兮逮余躬而翳微懼堂構之頹撓兮恐崩毀其洪基心惴惴而慄慄兮若臨深而履薄登喬木而長吟兮抗幽谷而靡託何身輕而任重兮懼顛墜於峻壑憑神明之扶助兮雖幽微而獲存賴先后之醇德兮乃保護其遺孫伊日月之屢遷兮何四時之相逼知年命之有期兮慨斡流之不息傷艱躓之相承兮悲屯蹇而日臻心惻愴而不懌兮乃有懷於古人或垂綸於渭濱兮有胥靡於傅巖既應繇而赴兆兮作殷周之元鑒孔栖栖而不息兮終見黜於庶邦墨馳騁而不已兮亦舉世而不容有鸞孤而爭國兮有讓位而採薇有躍馬而赴會兮有棲遲以俟時曹納辛而袁亡兮袁戮田而曹盛鮑授州而得時兮韓棄牧而失性趙堯門而誕聖兮終夭隱而不繁衞泯軀於世難兮啟洪業於宣元釋臯繇之法憲兮見蓼六之先亡練疑枉於怨獄兮寧于公之獨昌明禍福之同門兮知休咎之異塗尋倚伏之無源兮或先詘而後舒賜憑軒而策駟兮撫清琴而自娛憲服弊於陋巷兮蘊六藝於蓬廬勃計行而致位兮錯謀合而身傾蕭功成而福集兮韓勳立而禍并紛回平而綿結兮亮未識其幽情有積毀而恩昵兮有積譽而寵衰或形乖而意合兮或身密而志離情與貌而紛競兮體與識而交馳旦流言而見疑先緣謗而益信樂食子而中疏兮巴放麑而日進或舉世而稱賢兮偶不合於主心或居鄉而三黜兮獨為時之所欽或負鼎而干主兮或杖策於幽林或望旗而色阻兮或臨危而撫琴道有大而由小兮義有顯而必微理貴在於得要兮事終成於會機每一日而三省兮亦有念而九思孰有是而可是兮孰有非而可非石育子而啟夏兮鳦遺卵而孕殷鳥藉冰而存棄兮虎乳孩以字文發昇舟而魚躍兮季潛軀而覆雲或揮戈而爭帝兮或洗耳而辭君道曲成而不一兮神參差而異兆茲聖達之未明兮豈前修之克了迷白日之近遙兮方有闚於天表且臨海而觀瀾兮何津源之杳杳文遷繹而身徂兮景守節而災移湯改祝而革命兮靈投策而詬龜圉據胎而為巨兮友發文而自相風吹鶂而襄墜兮神壓紐而平王被嬴縮之由人兮信吉凶之在己或勤憂以減齡兮亦安樂而獲祉弟成師而害兄兮父純臣而烹子識同命於三君兮兆先見於矞姒始樓桑而發輝兮終龍變於巴庸繞閶門而結慶兮鬱蟬蛻於三江水浩浩而襄陵兮竊息壤而瘠之鯀殛死於羽山兮禹宣力而營之鑿龍門以通河兮疏九江而入海總九州以攸同兮甄五都之所在雖父子之同氣兮乃業行之丕改以患蹇為福兮痛比干之殘軀以佞諛為獲安兮哂宰嚭之見屠以舉士而受賞兮悼史遷之腐刑以進為無益兮見鄂秋之專城以仁義為桎梏兮信揖讓之勞疲以放曠為懸解兮傷六親之乖離哀越種之被戮兮嘉范蠡之脫羈欽四皓之高尚兮歎伊周之涉危望仗鉞而先鋒兮光安車而弗顧求封賞於寸心兮夢台袞於遠慮或忌賢而獨立或篡君以自樹既思匿而名揚兮亦求清而反汙見衆兆之紛錯兮覩變化之無方心營營而擾擾兮乃探衷而準常儼端坐於弊筵兮始拂龜而整策冀靈鑒之祐余兮願告余以忠益龜發兆以施靈兮利去華而守約蓍布列而成卦兮保龍潛而勿躍踵嘉遁之玄蹤兮追考盤於巖壑登名山以恬澹兮辭朝巿之紛若奉貞吉於占繇兮翻夕警而晨裝揖許公於箕嶺兮諮夷齊於首陽瞻嵩華之嵁崿兮眺碣之土冊磄陵江湖之駭浪兮昇醫閭之尚羊乘玄虬之弈弈兮鳴玉鑾之瑲瑲浮滄波而濯足兮入三山而解裳謁伯禹於塗山兮詰三苗於三危登蒼梧而遐眺兮訪二妃於有媯追祝融於荊芊兮問洛宓於馮夷陵回飈而上驤兮窮深谷而下馳沿扶水而遠矚兮見虞淵之威微乖閬風之峻岅兮覿王母於崦嵫昇瑤臺而奏歌兮坐瓊室而賦詩託赤水以寄命兮附光風以傳辭出琨岫之崢嶸兮入氾林之杳鬱採鍾山之玉瑛兮收珠澤之珂圼攜羽民而遠遊兮探長生之妙術騰雲霧而窈冥兮變域中之穢質望玄闕之寂寥兮過寒門而懷悲揖若士於霄際兮求霧塵於海湄憑帝臺而肆眺兮歷層冰而風馳越弱水之渟濙兮躡不周之嶮巇屑瓊蘂以為糧兮斟玉液以為漿結秋蘭以為珮兮攬白蜺以為裳聳景雲而上征兮撫閶闔而啟扉肅百神而警策兮奏中皇於紫微聆鈞天而九變兮耽廣樂而忘歸忽心移而志駭兮戀舊京而依依握招搖以為旆兮巡天漢而下遊建雲旗之逶迤兮御回風之瀏瀏策王良以斂轡兮命風伯以挾輈符屏翳以清路兮告河鼓以具舟聊右次於析木兮遹回駕於青丘訪古人以首陽兮亦問道於鷞鳩覩三韓之累累兮見卉服之悠悠瞻雒常之鬱鬱兮貢楛矢之啾啾心怊怊而惕惕兮志憫憫而綿綿伊五嶽之塠塠兮何四海之涓涓瞻九河其如帶兮觀三江其沉然夫五都之總總兮尚何足以遊盤彼八方之局促兮殊無可以達觀方吞霞而棄粒兮亦屑玉而鍊丹漱醴泉以養氣兮吸沆瀣以當餐蔭建木之長柯兮援木禾之修莖咀玉髓而充渴兮嚼正陽以長生參松喬而撫翰兮侶浮丘而上征嗟域中之默默兮詎攄寫其深情情盤桓而猶豫兮志狐疑而未決久放蕩而不還兮心惆悵而不悅憶慈親於故鄉兮戀先君於丘墓回遊駕而改轅兮縱歸轡而緩御僕眷眷於短銜兮馬依依於跬步還故園而解羈兮入茅宇而返素耕東臯之沃壤兮釣北湖之深潭養慈顏於婦子兮競獻壽而薦甘朝樂酣於濁酒兮夕寄忻於素琴誦風雅以導志兮蘊六籍於胸襟敦儒墨之大教兮崇逸民之遠心播仁聲於終古兮流不朽之徽音進不求於聞達兮退不營於榮利泛若不繫之舟兮湛若不用之器不潔其身兮不屑於位不拘小節兮不求曲備資靈運以託己兮任性命之遭隨既聽天而委化兮無形志之兩疲除紛競而靖默兮守沖寂以無為寄後賢以籍賞兮寧怨時之弗知亂曰禀元承命人最靈兮夭壽否泰本天成兮體源究道歸聖哲兮隨化委遇能達節兮顯親揚名德之上兮保家全身亦厚量兮趣世浮動違性命兮鑒始究終同水鏡兮志願不合思遠遊兮陵虛騁志從所求兮周歷四極騰八表兮形勞志沮未衷道兮反我遊駕養慈親兮躬耕練藝齊至人兮固又作刺讒疾嬖幸詩二首曰巧佞巧佞讒言興兮營營習習似青蠅兮以白為黑在汝口兮汝非蝮蠆毒何厚兮巧佞巧佞一何工矣司間司忿言必從矣朋黨噂自相同矣浸潤之譖傾人墉矣成人之美君子貴焉攻人之惡君子焉汝何人斯譖毀日繁予實無罪騁汝詭言番番緝緝讒言側入君子好讒如或弗及天疾讒說汝其至矣無妄之禍行將及矣泛泛遊鳧弗制弗拘行藏之徒或智或愚維予小人未明茲理毀與行俱言與釁起我其懲矣我其悔矣豈求人兮忠恕在己彼諂諛兮人之蠹兮剌促昔粟罔顧辱以求媚兮邪干側入如恐弗及以自容兮志行褊小好習不道朝挾其車夕承其輿或騎或徒載奔載趨或言或笑曲事親要正路不由邪徑是蹈不識大猷不知話言其朋其黨其徒實繁有詭其行有佞其音蘧蒢戚施邪媚是欽既詭且妬以逞其心是信是任敗其以多不始不慎末如之何習習宰嚭營營無極梁丘寡智王鮒淺識伊戾息夫異世同力江充趙高甘言似直豎刁上官擅生羽翼乃如之人僭爽其德豈徒喪邦又亦覆國嗟爾中下其親其昵不謂其非不覺其失好之有年寵之有日我思古人心焉若疾凡百君子宜其慎矣覆車之鑒近可信矣言既備矣事既至矣反是不思維塵及矣肅宗即位除尚, WYG: ''}
  - {type: variant, offset: 1174, length: 2842, content: 下不甚親覽好桑門之法尚書令高肇以外戚權寵專決朝事又咸陽王禧等並有釁故宗室大臣相見疏薄而王畿民庶勞弊益甚固乃作南北二都賦稱代田漁聲樂侈靡之事節以中京禮儀之式因以諷諫辭多不載世宗末中尉王顯起宅既成集僚屬饗宴酒酣問固曰此宅何如固對曰晏嬰湫隘流稱于今豐屋生災著於周易此蓋同傳舍耳唯有德能卒願公勉之顯默然他日又謂固曰吾作太府卿庫藏充實卿以為何如固對曰公收百官之祿四分之一州郡贓贖悉入京藏以此充府未足為多且有聚斂之臣寧有盜臣豈不戒哉顯大不悅以此銜固又有人間固於顯顯因奏固剩請米麥免固官既無事役遂闔門自守著演賾賦以明幽微通塞之事其詞曰紹有周之遐軌兮初錫世於河陽建甸侯而列爵兮與王室而並昌遭季葉之紛亂兮仍矯迹於良鄉棄侯衞之楨弼兮乃殖根於幽方自祖考而輝烈兮逮余躬而翳微懼堂構之頹撓兮恐崩毀其洪基心惴惴而慄慄兮若臨深而履薄登喬木而長吟兮抗幽谷而靡託何身輕而任重兮懼顛墜於峻壑憑神明之扶助兮雖幽微而獲存賴先后之醇德兮乃保護其遺孫伊日月之屢遷兮何四時之相逼知年命之有期兮慨斡流之不息傷艱躓之相承兮悲屯蹇而日臻心惻愴而不懌兮乃有懷於古人或垂綸於渭濱兮有胥靡於傅巖既應繇而赴兆兮作殷周之元鑒孔栖栖而不息兮終見黜於庶邦墨馳騁而不已兮亦舉世而不容有鸞孤而爭國兮有讓位而採薇有躍馬而赴會兮有棲遲以俟時曹納辛而袁亡兮袁戮田而曹盛鮑授州而得時兮韓棄牧而失性趙堯門而誕聖兮終夭隱而不繁衞泯軀於世難兮啟洪業於宣元釋臯繇之法憲兮見蓼六之先亡練疑枉於怨獄兮寧于公之獨昌明禍福之同門兮知休咎之異塗尋倚伏之無源兮或先詘而後舒賜憑軒而策駟兮撫清琴而自娛憲服弊於陋巷兮蘊六藝於蓬廬勃計行而致位兮錯謀合而身傾蕭功成而福集兮韓勳立而禍并紛回平而綿結兮亮未識其幽情有積毀而恩昵兮有積譽而寵衰或形乖而意合兮或身密而志離情與貌而紛競兮體與識而交馳旦流言而見疑先緣謗而益信樂食子而中疏兮巴放麑而日進或舉世而稱賢兮偶不合於主心或居鄉而三黜兮獨為時之所欽或負鼎而干主兮或杖策於幽林或望旗而色阻兮或臨危而撫琴道有大而由小兮義有顯而必微理貴在於得要兮事終成於會機每一日而三省兮亦有念而九思孰有是而可是兮孰有非而可非石育子而啟夏兮鳦遺卵而孕殷鳥藉冰而存棄兮虎乳孩以字文發昇舟而魚躍兮季潛軀而覆雲或揮戈而爭帝兮或洗耳而辭君道曲成而不一兮神參差而異兆茲聖達之未明兮豈前修之克了迷白日之近遙兮方有闚於天表且臨海而觀瀾兮何津源之杳杳文遷繹而身徂兮景守節而災移湯改祝而革命兮靈投策而詬龜圉據胎而為巨兮友發文而自相風吹鶂而襄墜兮神壓紐而平王被嬴縮之由人兮信吉凶之在己或勤憂以減齡兮亦安樂而獲祉弟成師而害兄兮父純臣而烹子識同命於三君兮兆先見於矞姒始樓桑而發輝兮終龍變於巴庸繞閶門而結慶兮鬱蟬蛻於三江水浩浩而襄陵兮竊息壤而瘠之鯀殛死於羽山兮禹宣力而營之鑿龍門以通河兮疏九江而入海總九州以攸同兮甄五都之所在雖父子之同氣兮乃業行之丕改以患蹇為福兮痛比干之殘軀以佞諛為獲安兮哂宰嚭之見屠以舉士而受賞兮悼史遷之腐刑以進為無益兮見鄂秋之專城以仁義為桎梏兮信揖讓之勞疲以放曠為懸解兮傷六親之乖離哀越種之被戮兮嘉范蠡之脫羈欽四皓之高尚兮歎伊周之涉危望仗鉞而先鋒兮光安車而弗顧求封賞於寸心兮夢台袞於遠慮或忌賢而獨立或篡君以自樹既思匿而名揚兮亦求清而反汙見衆兆之紛錯兮覩變化之無方心營營而擾擾兮乃探衷而準常儼端坐於弊筵兮始拂龜而整策冀靈鑒之祐余兮願告余以忠益龜發兆以施靈兮利去華而守約蓍布列而成卦兮保龍潛而勿躍踵嘉遁之玄蹤兮追考盤於巖壑登名山以恬澹兮辭朝巿之紛若奉貞吉於占繇兮翻夕警而晨裝揖許公於箕嶺兮諮夷齊於首陽瞻嵩華之嵁崿兮眺碣之土冊磄陵江湖之駭浪兮昇醫閭之尚羊乘玄虬之弈弈兮鳴玉鑾之瑲瑲浮滄波而濯足兮入三山而解裳謁伯禹於塗山兮詰三苗於三危登蒼梧而遐眺兮訪二妃於有媯追祝融於荊芊兮問洛宓於馮夷陵回飈而上驤兮窮深谷而下馳沿扶水而遠矚兮見虞淵之威微乖閬風之峻岅兮覿王母於崦嵫昇瑤臺而奏歌兮坐瓊室而賦詩託赤水以寄命兮附光風以傳辭出琨岫之崢嶸兮入氾林之杳鬱採鍾山之玉瑛兮收珠澤之珂圼攜羽民而遠遊兮探長生之妙術騰雲霧而窈冥兮變域中之穢質望玄闕之寂寥兮過寒門而懷悲揖若士於霄際兮求霧塵於海湄憑帝臺而肆眺兮歷層冰而風馳越弱水之渟濙兮躡不周之嶮巇屑瓊蘂以為糧兮斟玉液以為漿結秋蘭以為珮兮攬白蜺以為裳聳景雲而上征兮撫閶闔而啟扉肅百神而警策兮奏中皇於紫微聆鈞天而九變兮耽廣樂而忘歸忽心移而志駭兮戀舊京而依依握招搖以為旆兮巡天漢而下遊建雲旗之逶迤兮御回風之瀏瀏策王良以斂轡兮命風伯以挾輈符屏翳以清路兮告河鼓以具舟聊右次於析木兮遹回駕於青丘訪古人以首陽兮亦問道於鷞鳩覩三韓之累累兮見卉服之悠悠瞻雒常之鬱鬱兮貢楛矢之啾啾心怊怊而惕惕兮志憫憫而綿綿伊五嶽之塠塠兮何四海之涓涓瞻九河其如帶兮觀三江其沉然夫五都之總總兮尚何足