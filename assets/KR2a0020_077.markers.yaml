  - {type: 'tls:seg', offset: 4081, content: '', id: KR2a0020_ZHSJ_077-d77p96s13}
  - {type: variant, offset: 4082, length: 275, content: 傅清河王懌舉固除步兵校尉領汝南王悅郎中令尋加寧遠將軍時悅年少行多不法屑近小人固上疏切諫并面陳往代諸王賢愚之分以感動悅悅甚敬憚之懌大悅以為舉得其人熙平二年除洛陽令將軍如故在縣甚有威風丁母憂號慕毀病杖而能起練禫之後猶酒肉不進時固年踰五十而喪過於哀鄉黨親族咸歎服焉神龜末清河王懌領太尉辟固從事中郎屬懌被害元叉秉政朝野震悚懌諸子及門生吏僚莫不慮禍隱避不出素為懌所厚者彌不自安固以嘗被辟命遂獨詣喪所盡哀慟哭良久乃還僕射游肇聞而歎曰雖欒布王脩何以尚也君子哉若人及汝南王悅為太尉選舉多非其人又輕肆檛撻固以前為元卿雖離國猶上疏切諫事在悅傳悅辟固為從事中郎不就正光二年, WYG: 學博士轉}
