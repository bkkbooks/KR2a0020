  - {type: variant, offset: 5896, length: 0, content: '', krp: 以侃爲度支尚書及乘輿反洛復召雄上雄靣辭曰臣不能死事俛眉從賊乃是朝廷罪人縱陛下不賜誅罰而北來尚書勲髙義重臣宜避賢路莊帝曰卿且}
  - {type: line-break, offset: 5897, content: '', id: ZHSJ__dup19917}
  - {type: variant, offset: 5897, length: 4, content: 宮封營陵, WYG: 本司朕當别有處分遂解侃尚書未㡬詔雄以本官兼侍中闗西慰勞大使將發請事五條一言逋懸租調宜悉不徵二言簡罷非時徭役以紓民命三言課調之際使豐儉有殊令州郡量檢不得均一四言兵起歴年死亡者衆或父或子辛酸未歇見存耆老請假板職悦生者之意慰死者之魂五言喪亂既乆禮儀罕習如有閨門和穆孝悌卓然者宜表其門閭仍啟曰臣聞王者愛民之道有六一曰利之二曰成之三曰生之四曰與之五曰樂之六曰喜之使民不失其時則成之也省刑罰則生之也薄賦斂則與之也無多徭役則樂之也吏静不苛則喜之也伏惟陛下道邁前王功超往代敷春風而鼓俗旌至德以調民生之養之正當兹日悦近來逺亦是今時臣既忝將命宣揚聖澤前件六事謂所宜行若不除煩收疾惠孤恤寡便是徒乘官驛虛號王人往還有費於郵亭皇恩無逮於民俗謹率愚管敢以陳聞乞垂覽許莊帝從之因詔民年七十者授}
  - {type: page-break, offset: 5897, content: '', id: KR2a0020_WYG_077-12a, image: WYG0262/WYG0262-0144c.png}
  - {type: page-break, offset: 5897, content: '', id: KR2a0020_WYG_077-12b, image: WYG0262/WYG0262-0144d.png}
