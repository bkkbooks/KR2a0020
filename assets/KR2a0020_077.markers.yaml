  - {type: variant, offset: 6047, length: 2, content: 為別, WYG: 禍侃乃自貽累世之節一朝毁汙羊深血誠奉國秉操罔貳聞弟猖勃自劾請罪此之丹款實戢于懐且叔向復位春秋稱羙深之慷慨氣同古人忠烈逺彰赤心已著可令還朝面受委勑乃歸京師除名乆之除撫軍將軍金紫光禄大夫元顥入洛以深兼黄門即顥平免官後拜大鴻臚卿普泰初遷散騎常侍衞將軍右光禄大夫監起居注自天下多事東西二省官員委積前廢帝勑深與常侍盧道䖍元晏元法壽選人補定自奉朝請以上各有沙汰尋兼侍中廢帝甚親待之是時膠序廢替名敎陵遲深乃上疏曰臣聞崇禮建學列代之所修尊經重道百王所不易是以均塾洞啓昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乗乾統物欽若奉時模唐軌虞率由前訓重以髙祖繼聖垂衣儒風載蔚得才之盛如彼薪楢固以追隆周而竝驅}
  - {type: page-break, offset: 6047, content: '', id: KR2a0020_WYG_077-20b, image: WYG0262/WYG0262-0148d.png}
  - {type: variant, offset: 6047, length: 2, content: 為別, krp: 禍侃乃自貽累世之節一朝毁汙羊深血誠奉國秉操罔貳聞弟猖勃自劾請罪此之丹款實戢于懐且叔向復位春秋稱羙深之慷慨氣同古人忠烈逺彰赤心已著可令還朝面受委勑乃歸京師除名乆之除撫軍將軍金紫光禄大夫元顥入洛以深兼黄門即顥平免官後拜大鴻臚卿普泰初遷散騎常侍衞將軍右光禄大夫監起居注自天下多事東西二省官員委積前廢帝勑深與常侍盧道䖍元晏元法壽選人補定自奉朝請以上各有沙汰尋兼侍中廢帝甚親待之是時膠序廢替名敎陵遲深乃上疏曰臣聞崇禮建學列代之所修尊經重道百王所不易是以均塾洞啓昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乗乾統物欽若奉時模唐軌虞率由前訓重以髙祖繼聖垂衣儒風載蔚得才之盛如彼薪楢固以追隆周而竝驅}
  - {type: variant, offset: 6050, length: 1, content: 也, WYG: 炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自兹已降世極道消風猷稍逺澆薄方競退讓寂寥馳競靡節進必吏能升非學藝是使刀筆小用計日而期榮專經大才甘心於陋巷然治之爲本所貴得賢茍值其人豈拘常檢三代兩漢異世間出或釋褐中林鬱登卿尹或投竿釣渚徑升公相事炳丹青義在往䇿彼哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠時盛徳見徵不過四門登庸不越九品以此取士求之濟治譬猶却行以及前之燕而向楚積習之不可者其所由來漸矣昔魯興泮官頌聲爰發鄭廢學校國風以譏將以納民軌物莫始於經禮菁莪育才義光於篇什自兵亂以來垂將十載干戈日陳爼豆斯闕四海荒凉民物凋敝名敎頓虧風流殆盡世之陵夷可爲歎息陛下中興纂歴理運惟新方隅稍康實惟文德但禮賢崇讓之科沿世未備還淳反樸之化起言斯繆夫先黄老而退六經史遷終其成蠧貴𤣥虛而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼確論造次必儒臣愚以爲宜重修國學廣延胄子使函丈之敎日聞釋奠之禮不闕并詔天下郡國興立儒敎考課之程咸依舊典茍經明行修宜擢以不次抑斗筲喋喋之才進大雅汪汪之德博收鴻生以光顧問縶維竒異共精得失使區寰之内競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠闇短敢慕前訓用稽古義上塵聴覽伏願陛下垂就日之監齊非煙之化儻以臣言可採乞特施行廢帝善之出帝初拜中書令頃之轉車騎大將軍左光禄大夫永熙三年六月以深兼御史中尉東道軍司及出帝入關深與樊子鵠等同逆於兖州子鵠暑深爲齊州刺史於太山博縣商王村結壘招引山齊之民天平二年正月大軍討破之於陳斬深子肅武定末儀同開府東閤祭酒楊機字顯略天水冀人祖伏恩郡功曹赫連屈丐時將家奔洛陽因以家焉機少有志節爲士流所稱河南尹李平元暉竝召署功曹暉尤委以郡事或謂暉曰弗躬弗親庶人弗信何得委事於機髙卧而已暉曰吾聞君子勞於求士逸於任賢故前代有坐嘯之人主諾之守吾既委得其才何爲不可由是聲名更著解褐奉朝請於時皇子國官多非其人詔選清直之士機見舉爲京兆王愉國中尉愉甚敬憚之遷給事中伏波將軍廷尉評延昌中行河隂縣事機當官正色不避權勢明達政事斷獄以情甚有聲譽平東將軍荆州刺史楊大眼啓爲其府長史熙平中爲涇州平西府長史尋授河隂令轉洛陽令京輦伏其威風希有干犯凢訴訟者一經其前後皆識其名姓并記事理世咸異之遷鎮軍將軍司州治中轉别駕荆州蠻叛兼尚書左丞南道行臺討之還除中散大夫復爲别駕州牧髙陽王雍事多委機出除}
