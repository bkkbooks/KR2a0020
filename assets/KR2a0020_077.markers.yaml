  - {type: variant, offset: 6770, length: 1354, content: 冀州刺史諡曰文簡以子子貞預義之勤也子貞歷司空長史武邑太守司徒右長史陽平太守入為吏部郎中出為驃騎將軍兗州刺史坐貪汙賜死路恃慶字伯瑞陽平清淵人也祖綽陽平太守恃慶有幹用與廣平宋翻俱知名為鄉閭所稱相州刺史李安世並表薦之太和中除奉朝請恃慶以從兄文舉有才望因推讓之高祖遂並拜焉稍遷尚書儀曹郎轉左民郎行潁川郡出為華州安定王征虜府長史尋以母憂去職仍轉定州河間王琛長史琛貪暴肆意恃慶每進苦言年四十八卒贈左將軍安州刺史諡曰襄子祖璧給事中恃慶弟仲信亦好學為太尉參軍稍遷奉車都尉開府掾章武王融之討葛榮也仲信為其都督府長史融敗歿仲信遂亦免棄仲信弟思略字叔約有識尚冀州安東府騎軍參軍子祖遺武定末太學博士思略弟思令字季儁初為廣陽王司空參軍轉司空城局參軍司徒記室威遠將軍尚書左民郎轉右民時天下多事思令乃上疏曰臣聞國之大事唯祀與戎戎之有功在於將帥三代不必別民取治不等五霸不必異兵各能克定有湯武之賢猶須伊望之佐堯舜之聖尚有稷契之輔得其人也六合唾掌可清失其人也三河方為戰地何者動之甚易靖之至難竊以比年以來將帥多是寵貴子孫軍幢統領亦皆故義託附貴戚子弟未經戎役至於銜杯躍馬志逸氣浮軒眉攘腕便以攻戰自許及臨大敵怖懼交懷雄圖銳氣一朝頓盡乃令羸弱在前以當銳強壯居後以安身兼復器械不精進止不集任羊質之將驅不練之兵當負險之衆敵數戰之虜欲令不敗豈有得哉是以兵知必敗始集而先逃將又怖敵遷延而不進國家便謂官號未滿重爵屢加復疑賞賚之輕金帛日賜帑藏空虛民財殫盡致使賊徒更增膽氣益盛生民損耗荼毒無聊主歎臣哀何心寢食臣雖位微竊不遑舍臣聞孝行出於忠貞節義率多果決德可感義夫恩可勸死士今若捨上所輕求下所重黜陟幽明賞罰善惡搜徒簡卒練兵習武甲密弩強弓調矢勁謀夫既設辯士先陳曉以安危示其禍福如其不悛以我義順之師討茲悖逆之豎豈異厲蕭斧而伐朝菌鼓洪爐而燎毛髮雖愚者知其不旋踵矣敢以愚短昧死陳誠尋拜假節征虜將軍陽平太守又割冀州之清河相州之陽平齊州之平原以為南冀州仍以思令為左將軍南冀州刺史假平東將軍都督時葛榮遣其清河太守季虎據高唐城以招叛民思令乃命麾下并率鄉曲潛軍夜往出其不意遂大破之徐乃收衆南還又詔思令并領冀州流民及葛榮滅還鎮平原後除征東將軍金紫光祿大夫轉衞將軍右光祿大夫天平三年三月卒時年五十一贈驃騎將軍定州刺史恃慶從叔景略起家中書博士太和中尚書郎本郡中正出為齊州魏郡平原二郡太守卒景略弟雄字仲略容貌偉異以軍功為給事中高祖曾對羣臣云路仲略好尚書郎僕射李沖云其人宜為武職遂停轉太尉咸陽王錄事參軍遷伏波將軍奉車都尉卒贈頓丘太守景略從祖弟法常幼而修立為郡功曹早卒儀同李神儁與之有舊每云諸路前輩中有路法常足為名士謂必遠至而竟無年天下事誠難知也房亮字景高清河人也父法延譙郡太守亮好學有節操太和中舉秀才為奉朝請拜祕書郎又兼員外散騎侍郎副中書侍郎宋弁使於蕭賾還除尚書二千石郎中濟州中正兼員外常侍使高麗高麗王託疾不拜以亮辱命坐白衣守郎中後除濟北太守轉平原太守以清嚴稱時冀州刺史京兆王愉據州反平原界在河北與愉接境愉乃遣人說亮啖以榮利亮即斬其使人發兵防捍愉怒遣其大將張靈和率衆攻亮亮督厲兵民喻以逆順出城拒擊大破之尋遭憂解任服終除左將軍汲郡太守遷前將軍東荊州刺史亮留心撫納夷夏安之時邊州刺史例得一子出身亮不言其子而啟弟子超為奉朝請議者稱之轉平東將軍滄州刺史入為光祿大夫加安東將軍永安二年卒年七十一贈撫軍將軍齊, WYG: 雍}
