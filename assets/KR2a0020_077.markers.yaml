  - {type: variant, offset: 6593, length: 2, content: 書冀, WYG: 好章詠乏彫掞之工雖欲厠影髦徒班名俊伍其可得哉然凝明獨斷之主雄才不世之君無藉朽株之資求人屠釣之下不牽闇投之誚取士商歌之中是以聞英風而慷慨望雲路而低回者天下皆是也若得身𨽻繡衣名充直指雖謝周生騎上之敏實有茅氏就鑊之心匡大喜曰吾乆知其人適欲召之遂引爲御史其所糾擿不避權豪臺中事物多爲匡所顧問道穆曾進説於匡曰古人有言罰一人當取千萬人懼豺狼當道不問狐狸明公荷國重寄宜使天下知法匡深然之正光中出使相}
