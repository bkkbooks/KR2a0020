  - {type: variant, offset: 6035, length: 1, content: 青, WYG: 定州刺史子子炎武定中博陵太守雄從祖曇䕶以謹厚見稱卒於并州州都子熾武定中衞將軍右光禄大夫雄族祖琛字僧貴父敬宗延興中代郡太守琛少孤曾過友人見其父母兄弟悉無恙垂涕乆之釋褐奉朝請滎陽郡丞太守元麗性頗使酒琛每諫之麗後醉輙令閉閤曰勿使丞入也髙祖南征麗從輿駕詔琛曰委卿郡事如太守也景明中爲伏波將軍濟州輔國府長史轉奉車都尉出爲揚州征南府長史刺史李崇多事産業琛每諍折崇不從遂相糾舉詔竝不問後加龍驤將軍帶南梁太守崇因置酒謂琛曰長史後必爲刺史但不知得上佐何如人耳琛對曰若萬一叨忝得一方正長史朝夕聞過是所願也崇有慙色卒於官琛寛雅有度量渉獵經史喜愠不形於色當官奉法在所有稱長子悠字元壽早有器業爲侍御史監揚州軍賊平録勲書時崇猶爲刺史欲寄人名悠不許崇曰我昔值其父今復逄其子早卒悠弟俊字叔義有文才東益州征虜府外兵參軍府主魏子建爲山南行臺以爲即中有軍國機斷還京於滎陽爲人劫害贈征虜將軍東秦州刺史俊弟術武定末散騎常侍術弟休字季令休弟修字季緒俱有學尚亦早卒時人傷惜之琛族子珍之少有氣力太尉鎧曹行參軍稍遷中堅將軍司徒録事參軍廣州大中正丁憂去任尋起爲汝北太守永安中司空諮議參軍通直常侍永熙中襄城太守天平初洛州以南人情駭懼勑爲大使持節慰諭廣洛二州三年除征東將軍行陽平郡事郡民路黑奴起逆攻郡爲黑奴所執諸賊勸殺之黑奴曰成敗未可知何爲先殺太守也乃將珍之自隨待遇以禮右衞將軍郭瓊討平黑奴乃得免興和中爲衞將軍司徒司馬武定三年除驃騎將軍北海太守還爲儀同開府長史兼光禄少卿未幾詔珍之持節爲廣洛北荆揚雍襄六州慰勞大使北荆鎮城行廣州事招納有稱齊文襄王遣書慰勉賜以衣帛尋勑行平州卒於官贈驃騎大將軍洛}
