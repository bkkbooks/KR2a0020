  - {type: variant, offset: 171, length: 212, content: 雍建義將軍雍遂於河濟之間招集流散得五千餘人南阻大闕擾動徐兗建牙誓衆傳檄邊境劉裕遣將李嵩等討雍雍斬之於蒙山於是衆至二萬進屯固山七年三月雍從弟彌亦率衆入京口規共討裕裕遣兵破之六月雍又侵裕青州雍敗乃收散卒保於馬耳山又為裕青州軍所逼遂入大鄉山八年太宗南幸鄴朝於行觀問先聞卿家縛劉裕於卿親疏雍曰是臣伯父太宗笑曰劉裕父子當應憚卿又謂之曰朕先遣叔孫建等攻青州民盡藏避城猶未下彼既素憚卿威士民又相信服今欲遣卿助建等卿宜勉之於是假雍鎮東將軍青, WYG: 荆}
