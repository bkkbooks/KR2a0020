  - {type: variant, offset: 6513, length: 0, content: '', WYG: 且薛安都畢衆敬危急投命竝受茅土之爵論古則如彼語今則如此明明之世不及比流竊惟梁鄒嚴固地據中齊粟攴十載控弦數千萬方之升城不可同日而語升城猶能抗兵累旬傷殺甚衆若臣亡父固守孤城則非一朝可剋高祖曰歴城既陷梁鄒便是掌中何煩兵力對曰若如聖㫖白曜便應窮兵極意取勝俯仰何為上假赤虎之信下衒知變之民高祖曰卿父此勲本自至少以卿才地豈假殷勤對曰臣尫愚六蔽文武無施響絶九臯聞天無日遭逢聖運萬死猶生但臣竊見徐兗是賊藩要徐兗既降諸戍皆應國有而東徐州刺史張讜所戍團城領二郡而已徐兗降後猶閉門拒命授以方嶽始乃歸降父}
