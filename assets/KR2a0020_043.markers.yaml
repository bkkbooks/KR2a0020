  - {type: variant, offset: 4672, length: 701, content: 風塵之言想不足介意也劉義隆計既不行復遣刺客呂玄伯購慧龍首二百戶男絹一千匹玄伯偽為反間來求屏人有所論慧龍疑之使人探其懷有尺刀玄伯叩頭請死慧龍曰各為其主也吾不忍害此人左右皆言義隆賊心未已不殺玄伯無以制將來慧龍曰死生有命彼亦安能害我且吾方以仁義為干鹵又何憂乎刺客遂捨之時人服其寬恕慧龍自以遭難流離常懷憂悴乃作祭伍子胥文以寄意焉生一男一女遂絕房室布衣蔬食不參吉事舉動必以禮太子少傅游雅言於朝曰慧龍古之遺孝也撰帝王制度十八篇號曰國典真君元年拜使持節寧南將軍虎牢鎮都副將未至鎮而卒臨沒謂功曹鄭曄曰吾覊旅南人恩非舊結蒙聖朝殊特之慈得在疆埸効命誓願鞭屍吳市戮墳江陰不謂嬰此重疾有心莫遂非唯仰愧國靈實亦俯慚后土修短命也夫復何言身歿後乞葬河內州縣之東鄉依古墓而不墳足藏髮齒而已庶魂而有知猶希結草之報時制南人入國者皆葬桑乾曄等申遺意詔許之贈安南將軍荊州刺史諡穆侯吏人及將士共於墓所起佛寺圖慧龍及僧彬象讚之呂玄伯感全宥之恩留守墓側終身不去子寶興襲爵寶興少孤事母至孝尚書盧遐妻崔浩女也初寶興母及遐妻俱孕浩謂曰汝等將來所生皆我之自出可指腹為親及婚浩為撰儀躬自監視謂諸客曰此家禮事宜盡其美及浩被誅盧遐後妻寶興從母也緣坐沒官寶興亦逃避未幾得出盧遐妻時官賜度河鎮高車滑骨寶興盡賣貨產自出塞贖之以歸州辟治中從事別駕舉秀才皆不就閉門不交人事襲爵長社侯龍驤將軍卒子瓊襲爵瓊字世珍高祖賜名焉太和九年為典寺令十六年降侯為伯高祖納其長女為嬪拜前軍將軍并州大中正正始中為光州刺史有受納之響為中尉王顯所劾終得雪免神龜中除左將軍兗州刺史去州歸京多年沉滯所居在司空劉騰宅西騰雖勢傾朝野初不候之騰既權重吞并隣宅增廣舊居唯瓊終不肯與以此久見抑屈瓊女適范陽盧道亮, WYG: ''}
