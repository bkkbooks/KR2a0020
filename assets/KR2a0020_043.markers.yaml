  - {type: variant, offset: 6531, length: 1, content: 姪, krp: 景伯字長暉高祖諶避地渡河居於齊州之東清河繹幕焉祖元慶仕劉駿歴七郡太守後為沈文秀青州建威府司馬劉彧之殺子業自立也子業弟子勛起兵攻之文秀遣其将劉珍之率兵助彧後背彧歸于子勛元慶不同為文秀所害父愛親率勒鄉部攻文秀劉彧嘉之起家授龍驤将軍尋會文秀降彧乃止顯祖時三齊平隨例内徙為平齊民以父非命疏服終身景伯生於桑乾少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李沖沖時典選拔為奉朝請司空祭酒給事中尚書儀曹郎除齊州輔國長史值刺史死勅行州事政存寛簡百姓安之後値清河太守杜昶外叛郡居山嶮盜賊羣起除清河太守郡民劉簡虎曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣捕擒之即署其子為西曹掾命喻山賊賊以景伯不念舊惡一時俱下論者稱之舊守令六年為限限滿将代郡民韓靈和等三百餘人表訴乞留復加二載後遷太尉中郎司徒諮議參軍輔國将軍司空長史以母疾去官景伯性淳和渉獵經史諸弟宗之如事嚴親及弟妓亡蔬食終喪朞不内御憂毁之容有如居重其次弟景先亡其幼弟景逺朞年哭臨亦不内寢鄉里為之語曰有義有禮房家兄弟廷尉卿崔光韶好標牓人物無所推尚每云景伯有士大夫之行業及母亡景伯居喪不食鹽菜因此}
  - {type: variant, offset: 6533, length: 0, content: '', WYG: 為水病積年不愈孝昌三年卒于家時年五十贈左将軍齊州刺史子文烈武定中尚書三公郎中景先字光胄幼孤貧無資從師其母自授毛詩曲禮年十二請其母曰豈可使兄傭賃以供景先也請自求衣然後就學母哀其小不許苦請從之遂得一羊裘忻然自足晝則樵蘇夜誦經史自是精勤遂大通贍太和中例得還鄉郡辟功曹州舉秀才値州将卒不得對策解褐太學博士時太常劉芳侍中崔光當世儒宗歎其精博光遂奏兼著作佐郎修國史尋除司徒祭酒員外郎侍中穆紹又啟景先撰世宗起}
  - {type: page-break, offset: 6533, content: '', id: KR2a0020_WYG_043-25a, image: WYG0261/WYG0261-0603c.png}
  - {type: variant, offset: 6533, length: 0, content: '', krp: 為水病積年不愈孝昌三年卒于家時年五十贈左将軍齊州刺史子文烈武定中尚書三公郎中景先字光胄幼孤貧無資從師其母自授毛詩曲禮年十二請其母曰豈可使兄傭賃以供景先也請自求衣然後就學母哀其小不許苦請從之遂得一羊裘忻然自足晝則樵蘇夜誦經史自是精勤遂大通贍太和中例得還鄉郡辟功曹州舉秀才値州将卒不得對策解褐太學博士時太常劉芳侍中崔光當世儒宗歎其精博光遂奏兼著作佐郎修國史尋除司徒祭酒員外郎侍中穆紹又啟景先撰世宗起}
  - {type: variant, offset: 6534, length: 1, content: 潁, WYG: 注累遷歩兵校尉領尚書郎齊州中正所歴皆有當官之稱景先沉敏方正事兄恭謹出告反面晨昬參省側立移時兄亦危坐相敬如對賓客兄會寢疾景先侍湯藥衣冠不解形容毁瘁親友見者莫不哀之神龜元年蕭衍龍驤将軍田甲能據東義陽城内屬勅景先為行臺發二荆兵以援之在軍遇疾而還其年卒於家時年四十三贈持節冠軍将軍洛州刺史諡曰文景先作五經疑問百餘篇其言該典今行於時文多略舉其切於世教者問王者受命木火相生曰五精代感稟靈者興金德方隆禎發華渚水運告昌瑤光啟祚人道承天天理應實受謝既彰𤣥命若契相生之義有允不違至如湯武革命殺伐是用水火為次遵而不改既事乖代終而數同納麓逆順且殊禎運宜異而兆徵不差有疑符應問禹以鮌配天舜不尊父曰明明在上下土是冒道高者負扆四方神積者郊原斯主是以則天不能私其子紹堯不敢尊其父鮌既罪彰於山}
