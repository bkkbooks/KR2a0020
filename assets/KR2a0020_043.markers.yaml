  - {type: variant, offset: 785, length: 1859, content: 薄骨律鎮將至鎮表曰臣蒙寵出鎮奉辭西藩總統諸軍戶口殷廣又總勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寧處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口累率皆飢儉略加檢行知此土稼穡艱難夫欲育民豐國事須大田此土乏雨正以引河為用觀舊渠堰乃是上古所制非近代也富平西南三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入此渠中計昔為之高於水不過一丈河水激急沙土漂流今日此渠高於河水二丈三尺又河水浸射往往崩頹渠溉高懸水不得上雖復諸處案舊引水水亦難求今艾山北河中有洲渚水分為二西河小狹水廣百四十步臣今求入來年正月於河西高渠之北八里分河之下五里平地鑿渠廣十五步深五尺築其兩岸令高一丈北行四十里還入古高渠即循高渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十步廣十步高二丈絕斷小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則水一遍水凡四溉穀得成實官課常充民亦豐贍詔曰卿憂國愛民知欲更引河水勸課大田宜便興立以克就為功何必限其日數也有可以便國利民者動靜以聞七年雍表曰奉詔高平安定統萬及臣所守四鎮出車五千乘運屯穀五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車來往猶以為難設令載穀不過二十石每涉深沙必致滯陷又在河西轉至沃野越度大河計車五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一歲不過二運五十萬斛乃經三年臣前被詔有可以便國利民者動靜以聞臣聞鄭白之渠遠引淮海之粟泝流數千周年乃得一至猶稱國有儲糧民用安樂今求於牽屯山河水之次造船二百艘二船為一舫一船勝穀二千斛一舫十人計須千人臣鎮內之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人功輕於車運十倍有餘不費牛力又不廢田詔曰知欲造船運穀一冬即成大省民力既不費牛又不廢田甚善非但一運自可永以為式今別下統萬鎮出兵以供運穀卿鎮可出百兵為船工豈可專廢千人雖遣船匠猶須卿指授未可專任也諸有益國利民如此者續復以聞九年雍表曰臣聞安不忘亂先聖之政也況綏服之外帶接邊城防守不備無以禦敵者也臣鎮所綰河西爰在邊表常懼不虞平地積穀實難守護兵人散居無所依恃脫有妖姦必致狼狽雖欲自固無以得全今求造城儲穀置兵備守鎮自建立更不煩官又於三時之隙不令廢農一歲二歲不訖三歲必成立城之所必在水陸之次大小高下量力取辦詔許之至十年三月城訖詔曰卿深思遠慮憂勤盡思知城已周訖邊境無不虞之憂千載有永安之固朕甚嘉焉即名此城為刁公城以旌爾功也興光二年詔雍還都拜特進將軍如故和平六年表曰臣聞有國有家者莫不禮樂為先故樂記云禮所以制外樂所以修內和氣中釋恭敬溫文是以安上治民莫善於禮易俗移風莫善於樂且於一民一俗尚須崇而用之況統御八方陶鈞六合者哉故帝堯修五禮以明典章作咸池以諧萬類顯皇軌於云岱揚鴻化於介丘令木石革心鳥獸率舞包天地之情達神明之德夫感天動神莫近於禮樂故大樂與天地同和大禮與天地同節和故百物阜生節故報天祭地禮行於郊則上下和肅肅者禮之情和者樂之致樂至則無怨禮至則不違揖讓而治天下者禮樂之謂歟唯聖人知禮樂之不可以已故作樂以應天制禮以配地所以承天之道治人之情故王者治定制禮功成作樂虞夏殷周易代而起及周之末王政陵遲仲尼傷禮樂之崩亡痛文武之將墜自衞返魯各得其中逮乎秦皇翦棄道術灰滅典籍坑燼儒士盲天下之目絕象魏之章簫韶來儀不可復矣賴大漢之興改正朔易服色協音樂制禮儀正聲古禮粗欲周備至於孝章每以三代損益優劣殊軌歎其薄德無以易民視聽博士曹褒覩斯詔也知上有制作之意乃上疏求定諸儀以為漢禮終於休廢寢而不行及魏晉之日修而不備伏惟陛下無為以恭己使賢以御世方鳴和鸞以陟岱宗陪羣后以昇中岳而三禮闕於唐辰象舞替於周日夫君舉必書古之典也柴望之禮帝王盛事臣今以為有其時而無其禮有其德而無其樂史闕封石之文工絕清頌之饗良由禮樂不興王政有闕所致也臣聞樂由禮所以象德禮由樂所以防淫五帝殊時不相沿三王異世不相襲事與時並名與功偕故也臣識昧儒先管窺不遠謂宜修禮正樂以光大聖之治詔令公卿集議會高宗崩遂寢皇興中雍與隴西王源賀及中書監高允等並以耆年特見優禮錫雍几杖劍履上殿月致珍羞焉雍性寬柔好尚文典手不釋書明敏多智凡所為詩賦頌論并雜文百有餘篇又汎施愛士怡靜寡欲篤信佛道著教誡二十餘篇以訓導子孫太和八年冬卒年九十五賜命服一襲賵帛五百匹贈儀同三司冀州刺史將軍如故諡曰簡雍長子纂字奉宗中書侍郎早卒纂弟遵字奉國襲爵遵弟紹字奉世武騎侍郎汝陰王天賜涼州征西府, WYG: ''}
