  - {type: variant, offset: 6184, length: 320, content: 延之曾來往栢谷塢省魯宗之墓有終焉之志因謂子孫云河洛三代所都必有治於此者我死不勞向北代葬也即可就此及卒子從其言遂葬於宗之墓次延之死後五十餘年而高祖徙都其孫即居於墓北栢谷塢延之前妻羅氏生子措措隨父入國又以淮南王女妻延之生道仁措推道仁為嫡襲父爵位至殿中尚書進爵西平公袁式字季祖陳郡陽夏人漢司徒滂之後父淵司馬昌明侍中式在南歷武陵王遵諮議參軍與司馬文思等歸姚興泰常二年歸國為上客賜爵陽夏子與司徒崔浩一面便盡國士之交是時朝儀典章悉出於浩浩以式博於古事每所草創顧訪之性長者雖羈旅飄泊而清貧守度不失士節時人甚敬重之皆呼曰袁諮議延和二年衞大將軍樂安王範為雍州刺史詔式與中書侍郎高允俱為從事中郎辭而獲免式沉靖樂道周覽書傳至於詁訓倉雅偏所留懷作字釋未就以天安二年, WYG: ''}
