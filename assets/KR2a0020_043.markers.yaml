  - {type: variant, offset: 6530, length: 0, content: '', WYG: 出鎮關右聞其名徵補騎兵參軍領帳内綂軍孝昌中其鄉人劉蒼生劉鈞房須等作亂攻陷郡縣頻敗州軍時士達父憂在家刺史元欣欲逼其為将士達以禮固辭欣乃命其友人馮元興謂之曰今合境從逆賊徒轉熾若萬一陷州君家豈得獨全既急病如此安得顧名教也士逹不得已而起率州郭之人二千餘人東西討擊悉破平之武泰初就家拜平原太守抑挫豪彊境内肅然時邢杲寇亂憚其威名越郡城西度不敢攻逼永安末轉濟南太守士逹不入京師而頻為夲州郡時人榮之永安末尒朱兆入洛刺史蕭贊為城民趙洛周所逐城内無主洛周等以士逹鄉情所歸乃就郡請之命攝州事永熙二年卒年三十八時人傷惜之贈平東将軍齊州刺史諡曰武士逹弟士素武定末太尉諮議參軍士素弟士章尚書郎法夀族}
  - {type: page-break, offset: 6530, content: '', id: KR2a0020_WYG_043-23a, image: WYG0261/WYG0261-0602c.png}
  - {type: variant, offset: 6530, length: 0, content: '', krp: 出鎮關右聞其名徵補騎兵參軍領帳内綂軍孝昌中其鄉人劉蒼生劉鈞房須等作亂攻陷郡縣頻敗州軍時士達父憂在家刺史元欣欲逼其為将士達以禮固辭欣乃命其友人馮元興謂之曰今合境從逆賊徒轉熾若萬一陷州君家豈得獨全既急病如此安得顧名教也士逹不得已而起率州郭之人二千餘人東西討擊悉破平之武泰初就家拜平原太守抑挫豪彊境内肅然時邢杲寇亂憚其威名越郡城西度不敢攻逼永安末轉濟南太守士逹不入京師而頻為夲州郡時人榮之永安末尒朱兆入洛刺史蕭贊為城民趙洛周所逐城内無主洛周等以士逹鄉情所歸乃就郡請之命攝州事永熙二年卒年三十八時人傷惜之贈平東将軍齊州刺史諡曰武士逹弟士素武定末太尉諮議參軍士素弟士章尚書郎法夀族}
  - {type: variant, offset: 6531, length: 1, content: 姪, WYG: 景伯字長暉高祖諶避地渡河居於齊州之東清河繹幕焉祖元慶仕劉駿歴七郡太守後為沈文秀青州建威府司馬劉彧之殺子業自立也子業弟子勛起兵攻之文秀遣其将劉珍之率兵助彧後背彧歸于子勛元慶不同為文秀所害父愛親率勒鄉部攻文秀劉彧嘉之起家授龍驤将軍尋會文秀降彧乃止顯祖時三齊平隨例内徙為平齊民以父非命疏服終身景伯生於桑乾少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李沖沖時典選拔為奉朝請司空祭酒給事中尚書儀曹郎除齊州輔國長史值刺史死勅行州事政存寛簡百姓安之後値清河太守杜昶外叛郡居山嶮盜賊羣起除清河太守郡民劉簡虎曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣捕擒之即署其子為西曹掾命喻山賊賊以景伯不念舊惡一時俱下論者稱之舊守令六年為限限滿将代郡民韓靈和等三百餘人表訴乞留復加二載後遷太尉中郎司徒諮議參軍輔國将軍司空長史以母疾去官景伯性淳和渉獵經史諸弟宗之如事嚴親及弟妓亡蔬食終喪朞不内御憂毁之容有如居重其次弟景先亡其幼弟景逺朞年哭臨亦不内寢鄉里為之語曰有義有禮房家兄弟廷尉卿崔光韶好標牓人物無所推尚每云景伯有士大夫之行業及母亡景伯居喪不食鹽菜因此}
