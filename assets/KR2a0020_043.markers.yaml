  - {type: variant, offset: 5563, length: 1, content: 令, WYG: 傳每推重之與共論説言次遂及陳壽三國志有古良史之風其所著述文義典正皆揚于王廷之言微而顯婉而成章班史以来無及壽者脩之曰昔在蜀中聞長老言壽曾為諸葛亮門下書佐被撻百下故其論武侯云應變将畧非其所長浩乃與論曰承祚之評亮乃有故義過美之譽案其迹也不為負之非挾恨之矣何以云然夫亮之相劉備當九州鼎沸之會英雄奮發之}
