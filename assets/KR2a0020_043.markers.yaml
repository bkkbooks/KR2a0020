  - {type: variant, offset: 3222, length: 959, content: 西兗州刺史整遂攜家依焉永安初拜金紫光祿大夫二年兼黃門元顥入洛用為滄州刺史莊帝還朝坐免官後歸鄉里及莊帝殺尒朱榮就除鎮東將軍行滄州事普泰初假征東大將軍滄冀瀛三州刺史大都督將軍如前尋加車騎將軍右光祿大夫逢本鄉賊亂奉母客於齊州加衞大將軍天平四年卒於鄴贈司空公諡曰文獻整解音律輕財好施交結名勝聲酒自娛然貪而好色為議者所貶初雍與從弟寶惠俱入國寶惠字道明太祖以為上客卒有六子子連城為冀州開府掾刁氏世有榮祿而門風不甚修潔為時所鄙雍族孫雙字子山高祖藪晉齊郡太守藪因晉亂居青州之樂安父道履皇興初除平原太守至雙始還本鄉雙少好學兼涉文史雅為中山王英所知賞拜西河太守正光初中山王熙之誅也熙弟略投命於雙雙護之周年時購略甚切略乃謂雙曰我兄弟屠滅已盡唯我一身漏刃相託卿雖厚恩久見容蔽但事留變生終恐難保脫萬一發覺我死分也無事相累卿若送吾出境便是再生之惠如其不爾輒欲自裁雙曰人生會有一死死所難遇耳今遭知己視死如歸願不以為慮略後苦求南轉雙乃遣從子昌送達江左靈太后返政知略因雙獲免徵拜光祿大夫時略姊饒安公主刁宣妻也頻訴靈太后乞徵略還朝廷乃以徐州所獲俘江革祖耳幾二人易之以雙與略有舊乃令至境迎接略肅宗末除西兗州刺史時賊盜蜂起州人張桃弓等招聚亡命公行劫掠雙至境先遣使諭桃弓陳示禍福桃弓即隨使歸罪雙捨而不問後有盜發之處令桃弓追捕咸悉擒獲於是州境清肅莊帝初行濟州刺史以功封曲城鄉男出帝初遷驃騎大將軍左光祿大夫興和三年卒贈車騎大將軍儀同三司齊州刺史諡曰清穆王慧龍自云太原晉陽人司馬德宗尚書僕射愉之孫散騎侍郎緝之子也幼聰慧愉以為諸孫之龍故名焉初劉裕微時愉不為禮及得志愉合家見誅慧龍年十四為沙門僧彬所匿百餘日將慧龍過江為津人所疑曰行意怱怱徬徨得非王氏諸子乎僧彬曰貧道從師有年止西岸今暫欲定省還期無遠此隨吾受業者何至如君言既濟遂西上江陵依叔祖忱故吏荊州前治中習辟疆時刺史魏詠之卒辟疆與江陵令羅脩前別駕劉期公土人王騰等謀舉兵推慧龍為盟主剋日襲州城而劉裕聞詠之卒亦懼江陵有變遣其弟道規為荊州衆遂不果羅脩將慧龍又與僧彬北詣襄陽司馬德宗雍州刺史魯宗之資給慧龍送渡江遂自虎牢奔于姚興其自言也如此泰常二年姚泓滅慧龍歸國太宗引見與言慧龍請效力南討言終俯而流涕天子為之動容謂曰朕方混一車書席卷吳會卿情計如此豈不能相資以衆乎然亦未之用後拜洛城鎮將配兵三千人鎮金墉既拜十餘日太宗崩世祖初即位咸謂, WYG: ''}
