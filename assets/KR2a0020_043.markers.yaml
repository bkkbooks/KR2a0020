  - {type: variant, offset: 6521, length: 1, content: 政, WYG: 子勛死道固文秀悉復歸彧乃罷兵道固慮其扇亂百姓遂切遣之而法壽外託裝辦而内不欲行㑹從弟崇吉在升城為慕容白曜所破母妻沒於白曜軍崇吉奔還舊宅法壽與崇吉年志粗相諧協而親則從祖兄弟也崇吉以母妻見獲託法壽為計法夀既不欲南行恨道固逼切又矜崇吉情理時道固以兼治中房靈賓督清河廣川郡事戍盤陽法壽遂與崇吉潛謀襲靈賓克之仍歸款於白曜以贖母妻白曜遣将軍長孫觀等自大山南入馬耳關以赴盤陽還崇吉母妻初道固遣軍圍盤陽法壽等拒守二十餘日觀軍至賊乃散走觀軍入城詔以法壽為平逺将軍與韓騏驎對為冀州刺史督上租糧以法壽從父弟靈民為清河太守思順為濟南太守靈悦為平原太守伯憐為廣川太守叔玉為高陽太守叔玉兄伯玉為河間太守伯玉從父弟思安為樂陵太守思安弟幼安為高密太守以安初附及歴城梁鄒降法壽崇吉等與崔道固劉休賓俱至京師以法夀為上客崇吉為次客崔劉為下客法壽供給亞於安都等以功賜爵壮武侯加平逺将軍給以田宅奴婢性好酒愛施親舊賓客率同飢飽坎壈常不豐足畢衆敬等皆尚其通愛太和中卒贈平東将軍青州刺史諡敬侯子伯祖襲例降為伯歴齊郡内史伯祖闇弱委事於功曹張僧皓僧皓大}
