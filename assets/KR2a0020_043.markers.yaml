  - {type: variant, offset: 6516, length: 1, content: 位, WYG: 拜員外郎襄威將軍青州别駕卒文顥性仁孝篤厚徐州安豊王府騎兵參軍季友南青州左軍府錄事參軍聞慰博識有才思至延興中南叛休賓叔父旋之其妻許氏二子法鳯法武而旋之早亡東陽平許氏攜二子入國孤貧不自立竝疎薄不淪為時人所棄母子皆出家為尼既而反俗太和中高祖選盡物望河南人士才學之徒咸見申擢法鳯兄弟無可收用不蒙選授後俱奔南法武後改名孝標云房法壽小名烏頭清河繹幕人也幼孤少好射獵輕率勇果結羣小而為劫盜從叔元慶範鎮等坐法壽被州郡切責時月相繼宗族甚患之弱冠州迎主簿後以母老不復應州郡之命常盜殺䐗牛以供其母招集壮士常有百數母亡歲餘遇沈文秀崔道固起兵應劉子勛明僧暠劉乘民起兵應劉彧攻討文秀法壽亦與清河太守王元邈起兵西屯合討道固元邈以法壽為司馬累破道固軍甚為歴城所憚加法壽綏邊将軍}
