  - {type: variant, offset: 6527, length: 1, content: 遠, WYG: 朔将軍改爵清河子卒官子敬寳襲爵敬寳亦壮健奉朝請征北中兵參軍北征綂軍寧逺府軍每有戰功早卒子去病襲伯玉坐弟叔玉南奔徙於北邊後亦南叛為蕭鸞南陽太守高祖南伐剋宛外城命舍人公孫延景宣詔於伯玉曰天無二日土無兩王是以躬總六師蕩一四海宛城小戍豈足以禦抗王威深可三思封侯胙土事在俯仰伯玉對曰外臣荷國厚恩奉任彊境為臣之道未敢聽命伏惟遊鑾逺渉願不損神高祖又遣謂曰朕親率麾斾逺清江沔此之小戍豈足徘徊王師但戎輅所經纖介須殄宜量力三思自求多福且卿早蒙蕭賾殊常之眷曾不懐恩報以塵露蕭鸞妄言入繼道成賾子無孑遺卿不能建忠於前君方立節於逆豎卿之罪一又頃年傷我偏師卿之罪二今鑾斾親戎清一南服不先面縛待罪麾下卿之罪三卿之此戍多則一年中則百日少則三旬剋殄豈逺宜善思之後悔無及伯玉對曰昔蒙武帝愷悌之恩忝侍左右此之厚遇無忘夙夜但繼主失德民望有歸主上龍飛踐極光紹太宗非直副億兆之深望實兼武皇之遺勅是以懃懃懇懇不敢失墜往者北師深入宼擾邊民輒厲将士以救蒼生此乃邊戍常事陛下不得垂責及剋宛伯玉面縛而降高祖引見伯玉并其參佐二百人詔伯玉曰朕承天馭宇方欲清一寰域卿蕞爾小戍敢拒六師卿之愆罪理在不赦伯玉對曰臣既小人備荷驅使緣百口在南致拒皇畧罪合萬死高祖曰凡立忠抱節皆應有所至若奉逆君守迷節古人所不為卿何得事逆賊蕭鸞自貽伊譴伯玉對曰臣愚癡晚悟罪合萬斬今遭陛下願乞生命高祖曰凡人惟有兩途知機獲福背機受禍勞我王師彌歴嵗月如此為降何人有罪且朕前遣舎人公孫廷景城西共卿語云天無二日土無二王卿答云在此不在彼天道攸逺變化無方卿寧知今日在此不在彼乎伯玉乞命而已更無所言高祖以思安頻為伯玉泣請故特宥之伯玉在南之日放妾楊氏為尼入國遂令還俗復愛幸焉為有司所奏高宗聽之世宗即位拜長史兼游擊将軍出為馮翊相卒官崇吉少驍勇為沈文秀中兵參軍及太原戍守傅靈越率衆棄郡南赴子勛文秀以崇吉督郡事既而背文秀同於劉彧母叔在歴城為崔道固所拘繫又将致刑於市以恐之而崇吉卒無所顧㑹道固歸彧乃出其母彧以崇吉為龍驤将軍并州刺史領太原太守戍升城崇吉以其從兄靈獻為長史姨兄賈延年為司馬未幾而白曜軍至白曜遣人招之崇吉不降遂閉門固守升城至小人力不多勝仗者不過七百人而白曜侮之乃遣衆陵城崇吉設土蕇方梁下相舂擊不時剋殄白曜遂築長城圍三重更造攻具日夜攻擊自二月至四月糧矢俱盡崇吉突圍出走遁藏民舎母妻見獲道固遣治中房靈賓慰引之崇吉不肯見道固遂東歸舊村隂募壮士欲以偷母還奔河南白曜慮其如此守備嚴固後與法壽取盤陽俱降及立平齊郡以歴城民為歸安縣崇吉為縣令頗懐昔憾與道固接事意甚不平後委縣出臺訟道固罪状數條會赦不問崇吉乞解縣許之停京師半歲乃南奔崇吉夫婦異路剃髪為沙門改名僧逹投其族叔法延住歲餘清河張畧之亦豪俠士也崇吉遺其金帛得以自遣妻從幽州南出亦得相會崇吉至江東尋病死崇吉從父弟三益字敬安於南陽内附高祖與語善之曰三益了了殊不惡拜員外散騎侍郎尋出為太山太守遷兗州左軍府司馬所在以清和著稱還除左将軍正光中卒年六十三九子長子士隆興和中東清河太守帶盤陽鎮将士隆弟士逹少有才氣其族兄景先有鑒識每曰此兒俶儻終當大其門户起家濟州左将軍府倉曹參軍時京兆王繼為大}
