  - {type: variant, offset: 6523, length: 0, content: '', krp: 受納伯祖衣食不充後廣陵王羽為青州伯祖為從事郎中平原相轉幽州轉國長史坐公事免官卒子翼襲宣威将軍大城戍主永安中青州太傅開府從事中郎伯祖弟叔祖别以功賜爵魏昌子歴廣陵王國郎中令長廣東萊二郡太守龍驤将軍中散大夫永安中安東将軍郢州刺史叔祖弟幼愍安豐新蔡二郡太守坐事奪官居家忽聞有客聲出無所見還至庭中為家羣犬所噬遂卒初長孫觀之将至盤陽也城中稍以震懼時劉彧給事中崔平仲欲歸江南自歴下至圍城軍中與十餘騎遙共法壽語靈賓密遣人捕執之始法壽克盤陽之後常禁靈賓於别齋既得平仲引與同室致酒食叙國軍明将入意夜中北城上縋出平仲靈賓等十餘人厥明官軍至城靈賓遂歸梁鄒靈賓文藻不如兄靈建而辯悟過之靈建在南官至州治中渤海太守以才名見稱兄弟俱入國為平齊民雖流漂屯圯操尚卓然竝卒於平齊靈建子宣明亦文學著稱雅有父風高祖擢為中書博士遷洛轉議郎試守東}
  - {type: variant, offset: 6524, length: 1, content: 稱, WYG: 河郡正始中京兆王愉出除征東冀州以宣明為記室參軍愉反逼宣明為太守靈賓從父弟堅字千秋少有才名亦内徙為平齊民太和初高祖擢為袐書郎遷司空諮議齊州大中正高祖臨朝令諸州中正各舉所知千秋與幽州中正陽尼各舉其子高祖曰昔有一祁名垂往史今有二奚當聞來牒出為濮陽太守世宗時復為司空諮議加立忠将軍卒贈南青州刺史諡曰懿長子祖淵羽林監從章武王融討葛榮沒於陳贈安東将軍濟州刺史祖淵弟祖皓長水校尉後討蕭衍将於九山戰殁贈撫軍将軍兗州刺史崔平仲自東陽南奔妻子於歴城入國太和中髙祖聽其還南思安有勇力伯玉果敢有将畧思安賜爵西安子建威将軍北平太守遷大司馬司馬齊州武昌王府司馬高祖南伐徵為歩兵校尉直閤将軍中綂軍善撫士衆高祖嘉之漢陽既平復為武昌王司馬帶東魏郡太守}
