  - {type: variant, offset: 6521, length: 1, content: 政, krp: 子勛死道固文秀悉復歸彧乃罷兵道固慮其扇亂百姓遂切遣之而法壽外託裝辦而内不欲行㑹從弟崇吉在升城為慕容白曜所破母妻沒於白曜軍崇吉奔還舊宅法壽與崇吉年志粗相諧協而親則從祖兄弟也崇吉以母妻見獲託法壽為計法夀既不欲南行恨道固逼切又矜崇吉情理時道固以兼治中房靈賓督清河廣川郡事戍盤陽法壽遂與崇吉潛謀襲靈賓克之仍歸款於白曜以贖母妻白曜遣将軍長孫觀等自大山南入馬耳關以赴盤陽還崇吉母妻初道固遣軍圍盤陽法壽等拒守二十餘日觀軍至賊乃散走觀軍入城詔以法壽為平逺将軍與韓騏驎對為冀州刺史督上租糧以法壽從父弟靈民為清河太守思順為濟南太守靈悦為平原太守伯憐為廣川太守叔玉為高陽太守叔玉兄伯玉為河間太守伯玉從父弟思安為樂陵太守思安弟幼安為高密太守以安初附及歴城梁鄒降法壽崇吉等與崔道固劉休賓俱至京師以法夀為上客崇吉為次客崔劉為下客法壽供給亞於安都等以功賜爵壮武侯加平逺将軍給以田宅奴婢性好酒愛施親舊賓客率同飢飽坎壈常不豐足畢衆敬等皆尚其通愛太和中卒贈平東将軍青州刺史諡敬侯子伯祖襲例降為伯歴齊郡内史伯祖闇弱委事於功曹張僧皓僧皓大}
  - {type: variant, offset: 6523, length: 0, content: '', WYG: 受納伯祖衣食不充後廣陵王羽為青州伯祖為從事郎中平原相轉幽州轉國長史坐公事免官卒子翼襲宣威将軍大城戍主永安中青州太傅開府從事中郎伯祖弟叔祖别以功賜爵魏昌子歴廣陵王國郎中令長廣東萊二郡太守龍驤将軍中散大夫永安中安東将軍郢州刺史叔祖弟幼愍安豐新蔡二郡太守坐事奪官居家忽聞有客聲出無所見還至庭中為家羣犬所噬遂卒初長孫觀之将至盤陽也城中稍以震懼時劉彧給事中崔平仲欲歸江南自歴下至圍城軍中與十餘騎遙共法壽語靈賓密遣人捕執之始法壽克盤陽之後常禁靈賓於别齋既得平仲引與同室致酒食叙國軍明将入意夜中北城上縋出平仲靈賓等十餘人厥明官軍至城靈賓遂歸梁鄒靈賓文藻不如兄靈建而辯悟過之靈建在南官至州治中渤海太守以才名見稱兄弟俱入國為平齊民雖流漂屯圯操尚卓然竝卒於平齊靈建子宣明亦文學著稱雅有父風高祖擢為中書博士遷洛轉議郎試守東}
