  - {type: variant, offset: 6524, length: 1, content: 稱, krp: 河郡正始中京兆王愉出除征東冀州以宣明為記室參軍愉反逼宣明為太守靈賓從父弟堅字千秋少有才名亦内徙為平齊民太和初高祖擢為袐書郎遷司空諮議齊州大中正高祖臨朝令諸州中正各舉所知千秋與幽州中正陽尼各舉其子高祖曰昔有一祁名垂往史今有二奚當聞來牒出為濮陽太守世宗時復為司空諮議加立忠将軍卒贈南青州刺史諡曰懿長子祖淵羽林監從章武王融討葛榮沒於陳贈安東将軍濟州刺史祖淵弟祖皓長水校尉後討蕭衍将於九山戰殁贈撫軍将軍兗州刺史崔平仲自東陽南奔妻子於歴城入國太和中髙祖聽其還南思安有勇力伯玉果敢有将畧思安賜爵西安子建威将軍北平太守遷大司馬司馬齊州武昌王府司馬高祖南伐徵為歩兵校尉直閤将軍中綂軍善撫士衆高祖嘉之漢陽既平復為武昌王司馬帶東魏郡太守}
