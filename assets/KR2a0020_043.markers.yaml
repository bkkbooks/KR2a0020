  - {type: variant, offset: 6511, length: 0, content: '', WYG: 曰康公子泰寳襲爵征虜長史例降為侯卒子乾祐襲朱脩之者劉義隆司徒從事中郎守滑臺安頡圍之其母在家乳汁忽出母號慟告家人曰我年老非復有乳汁之時今忽如此兒必殁矣果以其日為頡所擒世祖善其固守授以内職以宗室女妻之而佞巧輕薄為人士所賤為雲中鎮将及入馮文通文通送之江南唐和字稚起晉昌宜安人也父繇以涼土喪亂民無所歸推隴西李暠於敦煌以寧一州李氏為沮渠蒙遜所滅和與兄契􅂝外甥李寳避難伊吾招集民衆二千餘家臣於蠕蠕蠕蠕以契為伊吾王經二十年和與契遣使來降為蠕蠕所逼遂擁部落至于高昌蠕蠕遣部帥阿若率騎討和至白力城和率騎五百先攻高昌契與阿若戰殁和收餘衆奔前部王國時沮渠安周屯橫截城和攻㧞之斬安周兄子樹又剋高寧白力二城斬其戍主遣使表状世祖嘉其誠款屢賜和和後與前部王車伊洛擊破安周斬首三百世祖遣成周公萬度歸討焉耆詔和與伊洛率所領赴度歸和奉詔㑹度歸喻下栁驢以東六城因共擊波居羅城㧞之後同征龜兹度歸令和鎮焉耆時柳驢戍主乙真伽率諸胡將據城而叛和領輕騎一百匹入其城擒乙真伽斬之由是諸胡款附西域剋平和有力也正平元年和詣闕世祖優寵之待以上客高宗以和歸誠先朝拜鎮南将軍酒泉公太安中出為濟州刺史甚有稱績徵為内都大官評決獄訟不加捶楚察疑獲實者甚多世以是稱之皇興中卒年六十七贈征西大将軍太常卿酒泉王諡曰宣子欽字孟直中書學生襲爵太和中拜鎮南将軍長安鎮副将轉陜州刺史将軍如故後降爵為侯二十年卒子景宣襲爵歴并州城陽王徽後軍府長史加中堅将軍遷東郡太守普泰中卒贈撫軍将軍秦州刺史景宣弟季弼武定中滄州别駕契子𤣥逹性果毅有父風與叔父和歸闕俱為上客拜安西将軍晉昌公顯祖時出為華州刺史将軍如故杏城民蓋平定聚衆為逆顯祖遣給事楊鍾葵擊平定不剋而還詔𤣥達討平之杏城民成赤李又聚黨自號為王逼掠郡縣殘害百姓𤣥達率騎二百邀其狹路擊破之叛民曾平原復聚為亂𤣥達追擊悉平之延興二年有罪免官太和十六年降爵為侯卒子崇字繼祖襲爵盛樂太守崇弟興業定陽闡熙二郡太守劉休賓字處幹本平原人祖昶從慕容德度河家于北海之都昌縣父奉伯劉裕時北海太守休賓少好學有文才兄弟六人乘民延和等皆有時譽休賓為劉彧虎賁中郎将稍遷幽州刺史鎮梁鄒及慕容白曜軍至升城遣人説之令降休賓不從劉彧龍驤将軍崔靈延行渤海郡房靈建等數十家皆入梁鄒同舉休賓為征虜兗州會劉彧遣使授休賓輔國将軍兗州刺史休賓妻崔邪利女也坐一男字文曄崔氏先歸寧在魯郡邪利之降也文曄母子遂與俱入國至是白曜表請崔與文曄既至白曜以報休賓又於北海執延和妻子送至梁鄒巡視城下休賓答白曜許歴城降當即歸順密遣兼主簿尹文達向歴城觀國軍形勢文達詣白曜詐言聞王臨境故來祗候私謂白曜曰劉休賓父子兄弟累郡連州今若識運知機束手歸化不審明王加何賞敘白曜曰休賓仕南爵寵如此今若不勞兵甲望風自降者非直處卿富貴兼還其婦兒休賓縱令不畏攻圍豈不憐其妻子也今升城卿自徃見文達乃至升城見休賓妻子文曄攀援文逹哭泣號咷以爪髮為信文逹回還復經白曜誓約而去白曜曰卿是休賓耳目腹心親見其妻子又知我衆旅少多善共量議自求多福文逹還見休賓出其妻兒爪髪兼宣白曜所言及國軍形勢謂休賓曰升城已敗歴城非朝則夕公可早圖之休賓撫爪髮泣涕曰妻子幽隔誰不愍乎吾荷南朝厚恩受寄邊任今顧妻子而降於臣節足乎然而密與其兄子聞慰議為降計聞慰曰此故當文逹誑詐耳年常抄掠豈有多軍也但可撫彊兵勤}
