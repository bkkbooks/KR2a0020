  - {type: variant, offset: 5803, length: 380, content: 后臨朝天下方亂謀避地自求徐州太后曰王誦罷幽州始作黃門卿何乃欲徐州更待一二年當有好處分遵業兄弟並交遊時俊乃為當時所美及尒朱榮入洛兄弟在父喪中以於莊帝有從姨兄弟之親相率奉迎俱見害河陰議者惜其人才而譏其躁競贈并州刺史著三晉記十卷遵業子松年尚書庫部郎韓延之字顯宗南陽赭陽人魏司徒暨之後也司馬德宗平西府錄事參軍劉裕率伐司馬休之未至江陵密使與延之書招之延之報曰聞親率戎馬遠履西畿闔境士庶莫不怪駭何者莫知師出之名故也司馬平西體國忠貞款愛待物當於古人中求耳劉裕足下海內之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣今伐人之君啗人以利真可謂處懷期物自有由來者矣以平西之至德寧無授命之臣乎假令天長喪亂九流渾濁當與臧洪遊於地下不復多言裕得書歎息以示諸佐曰事人當應如此劉裕父名翹字顯宗於是延之字顯宗名子為翹蓋示不臣劉氏也後奔姚興泰常二年與司馬文思來入國以延之為虎牢鎮將爵魯陽侯, WYG: 和}
