  - {type: variant, offset: 6512, length: 0, content: '', WYG: 衛方城狹嶮何為便生憂怯示人以弱也休賓又謂文逹曰卿勿憚危苦更為吾作一返善觀形勢於是遣文逹偷道而出令與白曜為期剋日許送降欵文逹既至白曜喜曰非直休賓父子荷榮城内賢豪亦隨人補授卿便即為梁鄒城主以酒灌地啟告山河曰若負休賓使我三軍覆没初白曜之表取休賓妻子也顯祖以道固既叛詔授休賓持節平南将軍冀州刺史平原公至是付文逹詔䇿文達還謂休賓曰白曜信誓如此公可早為決計恐攻逼之後降悔無由休賓於是告兄子聞慰曰事勢可知汝早作降書聞慰沉疑因執不作遂差本契白曜尋遣著作佐郎許赤虎夜至梁鄒南門下告城上人曰汝語劉休賓何由遣文逹頻造僕射許送降文歸誠大化何得無信違期不來於是門人唱告城内悉知遂相維持欲降不得皆云劉休賓父子欲以我城内人易榮位也尋被攻逼經冬至春歴城降白曜遣道固子景業與文曄至城下休賓知道固降乃出請命白曜送休賓及宿有名望者十餘人俱入代都為客及立平齊郡乃以梁鄒民為懷寧縣休賓為縣令延興二年卒文曄有志尚綜覽羣書輕財重義太和中坐從兄聞慰南叛與二弟文顥季友被徙北邊高祖特聽還代高祖曾幸方山文曄大言於路側曰求見聖明申宣久屈高祖遣尚書李沖宣詔問曰卿欲何言聽卿面自申盡於是引見文曄對曰臣之陋族出自平原徃因燕亂流離河表居齊以来八九十載真君十一年世祖太武皇帝廵江之日時年二歲隨外祖魯郡太守崔邪利於鄒山歸國邪利蒙賜四品除廣寗太守以臣年小不及齒錄至天安之初皇威逺被臣亡父休賓劉氏持節兗州刺史戍梁鄒時慕容白曜以臣父居全齊之要水陸道衝青冀二城往來要路三城岳跱竝拒王師白曜知臣母子先在代京表請臣母子慰勞臣即被先帝詔遣乘傳詣軍又賜亡父官爵白曜遣右司馬盧河内等送臣母子至鄒臣既見亡父備申皇澤云吾蒙本朝寵遇捍禦藩屏尊卑百口竝在二城吾若先降百口必被誅滅既不固誠於本朝又令尊卑塗炭豈堪為人臣以奉大魏乎汝且申吾意白僕射降意已判平歴城即率士衆送欵軍前既剋歴城白曜遣赤虎送臣并崔道固子景業等向梁鄒亡父既見赤虎之信仰感聖朝逺遣妻子又知天命有歸擁衆一萬以城降欵乘驛赴臺蒙為客例臣私釁深重亡父以延興二年孤背明世血誠微心未獲申展如臣等比竝蒙榮爵為在事孤抑以人廢勲高祖曰卿訴父賞而卿父無勲歴城齊之西關歸命請順梁鄒小戍豈能獲全何足以為功也文曄對曰誠如聖㫖愚臣所見猶有未申何者昔樂毅破齊七十餘城唯有即墨獨在此豈非根亡而條立且夫降順之人驗之古今未有不由危逼者故黄權無路歸欵列地封}
