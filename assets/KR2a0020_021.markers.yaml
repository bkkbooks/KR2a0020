  - {type: variant, offset: 387, length: 0, content: '', WYG: 延到其州界以驛邏無兵攝帥檢覈隊主髙保願列言所有之兵王皆私役謐聞而大怒鞭保願等五人各二百數日之間謐召近州夫閉城四門内外嚴固搜掩城中楚掠備至又無事而斬六人合城兇懼衆遂大呼屯門謐怖登樓毁梯以自固土人散走城人分守四門靈太后遣遊擊將軍王靖馳馹諭之城人既見靖至開門謝罪奉送管籥乃罷謐州還除大司農卿又除散騎常侍平北將軍幽州刺史謐妃胡氏靈太后從女也未發坐毆其妃免官後除都官尚書加安南將軍正光四}
