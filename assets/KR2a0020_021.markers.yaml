  - {type: variant, offset: 243, length: 2, content: 徵赴, krp: 曰利建雖古未必今宜經野由君理非下請邑采之封自有别式入除司州牧都督司豫荆郢洛東荆六州諸軍事開府如故賜帛二千匹粟五千斛詔以禧元弟之重食邑三千戸自餘五王皆食邑二千戸髙祖引見朝臣詔之曰卿等欲令魏朝齊美於殷周為令漢晉獨擅於上代禧曰陛下聖明御運實願邁迹前王髙祖曰若然將以何事致之為欲修身改俗為欲仍染前事禧對曰宜應改舊以成日新之美髙祖曰為欲止在一身為欲𫝊之子孫禧對曰既卜世靈長願欲𫝊之來業髙祖曰若然必須改作卿等當各從之不得違也禧對曰上命下從如風靡草髙祖曰自上古以來及諸經籍焉有不先正名而得行禮乎今欲斷諸北語一從正音年三十以上習性已久容或不可卒革三十以下見在朝廷之人語音不聽仍舊若有故為當降爵黜官各宜深戒如此漸習風化可新若仍舊俗恐數世之後伊洛之下復成被髮之人王公卿士咸以然不禧對曰實如聖㫖宜應改易髙祖曰朕嘗與李沖論此沖言四方之語竟知誰是帝者言之即為正矣何必改舊從新沖之此言應合死罪乃謂沖曰卿實負社稷合令御史牽下沖免冠陳謝又引見王公卿士責留}
