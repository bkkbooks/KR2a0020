  - {type: variant, offset: 3067, length: 173, content: 爵偃弟麗字寶掌位兼宗正卿右衞將軍遷光祿勳宗正右衞如故時秦州屠各王法智推州主簿呂苟兒為主號建明元年置立百官攻逼州郡涇州人陳瞻亦聚衆自稱王號聖明元年詔以麗為使持節都督秦州刺史與別駕楊椿討之苟兒率衆十餘萬屯孤山列據諸險圍逼州城麗出擊大破之便進軍水洛賊徒逆戰麗夜擊走之行秦州事李韶破苟兒于孤山乘勝追奔三十里獲其父母妻子斬賊王五人其餘相繼歸降諸城之圍亦悉奔, WYG: 所賞愛起家除}
