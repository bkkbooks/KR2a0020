  - {type: variant, offset: 4718, length: 345, content: 無降下之色時世宗委政於肇朝廷傾憚唯匡與肇抗衡先自造棺置於廳事意欲輿棺詣闕論肇罪惡自殺切諫肇聞而惡之後因與太常劉芳議爭權量遂與肇聲色御史中尉王顯奏匡曰自金行失御羣偽競興禮壞樂崩彝倫攸斁大魏應期奄有四海高祖孝文皇帝以睿聖統天克復舊典乃命故中書監高閭廣旌儒林推尋樂府依据六經參諸國志以黍裁寸將均周漢舊章屬雲構中遷尚未云就高祖睿思玄深參考經記以一黍之大用成分體準之為尺宣布施行暨正始中故太樂令公孫崇輒自立意以黍十二為寸別造尺度定律刊鍾皆向成訖表求觀試時敕太常卿臣芳以崇造既成請集朝英議其得否芳疑崇尺度與先朝不同察其作者於經史復異推造尠據非所宜行時尚書令臣肇清河王懌等以崇造乖謬與周禮不同遂奏臣芳依周禮更造成訖量校從其善者而芳以先朝尺度事合古典乃依前詔書以黍刊寸並呈朝廷用裁金石于時議者多云芳是唯黃門, WYG: ''}
