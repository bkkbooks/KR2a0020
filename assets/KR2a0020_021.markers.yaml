  - {type: variant, offset: 246, length: 1, content: 勗, WYG: 之官曰昨望見婦女之服仍為夾領小袖我徂東山雖不三年既離寒暑卿等何為而違前詔禧對曰陛下聖過堯舜光化中原臣雖仰禀明規每事乖互將何}
  - {type: variant, offset: 246, length: 1, content: 勗, krp: 之官曰昨望見婦女之服仍為夾領小袖我徂東山雖不三年既離寒暑卿等何為而違前詔禧對曰陛下聖過堯舜光化中原臣雖仰禀明規每事乖互將何}
  - {type: variant, offset: 248, length: 2, content: 戰伐, WYG: 宣布皇經敷贊帝則舛違之罪實合刑憲髙祖曰若朕言非卿等當須庭論如何入則順㫖退有不從昔舜語禹汝無面從退有後言其卿等之謂乎尋以禧長兼太尉公後髙祖幸禧第謂司空穆亮僕射李沖曰既有天地又有君臣太尉位居台鉉在冢宰之上三槐九棘不可久空元弟禧雖在事不長而戚連皇極且長兼太尉以和餁鼎朕常恐君有空授之名臣貽彼己之刺今幸其宅徒屈二賔良以為愧髙祖有事於方澤質明羣臣問起居髙祖曰昨日方澤殊自大暑遇天雲䕃密行人差得無敝禧對曰陛下徳感天地故雲物凝彩雖復雨師灑掃風伯清塵豈過於此髙祖曰伊洛南北之中此乃天地氤氲隂陽風雨之所交會自然之應非寡徳所能致此髙祖篤於兄弟以禧次長禮遇優隆然亦知其性貪每加切誡雖當時遵奉而終不改操禧表曰國朝偃武崇文偏捨來久州鎮兵人或有雄勇不閑武藝今取嵗暮之暇番上之日訓其兵法弓矢干矟三分竝教使人閑其能臨事無闕詔曰雖云教武未練其方既逼北行疑聞教武脱生羣惑且可停之後從平漢陽以尅南陽之勲加侍中正太尉及髙祖崩禧受遺輔政雖為宰輔之首而從容推委無所是非而濳受賄賂隂為威惠者禧特甚焉是年八座奏增邑千戸世宗從之固辭不受禧性憍奢貪淫財色姬妾數十意尚不已衣被繡綺車乗鮮麗猶逺有簡娉以恣其情由是昧求貨賄奴婢千數田業鹽鐵徧於逺近臣吏僮隸相繼經營世宗頗惡之景明二年春禧等為將礿祭入齋世宗詔領軍于烈率左右召禧等入於光極殿詔曰恪雖寡昧忝承寶厯比纒尫疹實憑諸父茍延視息奄涉三齡父等歸遜殷勤今便親攝百揆且還府司當别處分尋詔曰朕以寡昧夙罹閔凶憂煢在疚罔知攸濟寔賴先帝聖徳遺澤所覃宰輔忠賢劬勞王室用能撫和上下肅清内外乃式遵復子歸政告遜辭理懇至邈然難奪便當勵兹空乏親覽機務王尊惟元叔道性淵凝可進位太保領太尉司空北海王季父英明聲略茂舉可大將軍録尚書事世宗既覽政禧意不安而其國齋帥劉小茍每稱左右言欲誅禧禧聞而歎曰我不負心天家豈應如此由是常懐憂懼加以趙修専寵王公罕得進見禧遂與其妃兄兼給事黃門侍郎李伯尚謀反時世宗幸小平津禧在城西小宅初欲勒兵直入金墉衆懐沮異禧心因緩自旦達晡計不能決遂約不洩而散武興王楊集始出便馳告而禧意不疑乃與臣妾向洪池别墅遣小茍奉啓云檢行田牧小茍至邙嶺已逢軍人怪小茍赤衣將欲殺害小茍困廹言欲告反乃緩之禧是夜宿於洪池大風暴雨拔樹折木禧不知事露其夜或說禧曰殿下集衆圖事見意而停恐必漏洩今夕何宜自寛恐危禍將至禧曰有此軀命應知自惜豈待人言又說曰殿下兒婦已渡河兩頭不相知今俛眉自安不其危乎禧曰初遣去日令如行人渡河聽我動靜我久已遣人追之計今應還而尹仵期與禧長子通已入河内郡列兵仗放囚徒而將士所在追禧禧自洪池東南走僮僕不過數人左右從禧者唯兼防閤尹龍虎禧憂廹不知所為謂龍虎曰吾憒憒不能堪試作一謎當思解之以釋毒悶龍虎欻憶舊謎云眠則俱眠起則俱起貪如豺狼贓不入已都不有心於規刺也禧亦不以為諷已因解之曰此是眼也而龍虎謂之是箸渡洛水至栢谷塢從者唯禧二舅及龍虎而已顧謂龍虎曰凡夫尚有節義相為取死汝可勉心作與太尉公同死計龍虎曰龍虎東野常人遭殿下寛明接處左右今屬危難恨無逺計匡濟聖躬若與殿下同命雖死猶生俄而禧被擒獲送華林都亭世宗親問事源著千斤鏁格龍虎羽林掌衛之初髙祖閑宴從容言於禧等我後子孫邂逅不逮汝等觀望輔取之理無令他人有也禧臨盡雖言不次第猶尚泣涕追述先㫖然畏廹䘮志不能慷慨有所感激也及與諸妹公主等訣言及一二愛妾公主哭且罵之云坐多取此婢輩貪逐財物畏罪作反致今日}
