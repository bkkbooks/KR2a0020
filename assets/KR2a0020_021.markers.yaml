  - {type: variant, offset: 901, length: 0, content: '', krp: 居太極西栢堂諮决大政給親信二十人又詔雍為宗師進太傅侍中領太尉公王如故别勑將作營國子學寺給雍居之領軍于忠擅權専恣僕射郭祚勸雍出之忠怒矯詔殺祚及尚書裴植廢雍以王歸第朝有大事使黃門郎就諮訪之忠尋復矯詔將欲殺雍以問侍中崔光光拒之乃止未幾靈太后臨朝出忠為冀州刺史雍表曰臣初入栢堂見詔㫖之行一由門下而臣出君行不以悛意每覽傷矜視之慘目深知不可不能禁制臣之罪一也臣近忝内樞兼尸師傅宜保護聖躬温凊晨夕而于忠身居武司禁勒自在限以内外朝謁簡絶皇居寢食所在不知社稷安危又亦不預出入栢堂尸位而已臣之罪二也忠規欲殺臣賴在事執拒又令僕卿相任情進黜遷官授職多不經旬斥退賢良専納心腹威振百寮勢傾朝野臣見其如此欲出忠為雍州刺史鎮撫關右在心未行反為忠廢忝官尸禄孤負恩私臣之罪三也先帝升遐儲宫纂統斯乃君父之恒謨臣子之永則加賞之義自古無之忠既人臣受恩先帝䘮禍之際竭節是常迎陛下於東宫臣下之恒事如其不爾更欲何為而忠意氣凌雲坐要封爵爾日抑之交恐為禍臣以權臣所欲不敢輙違即集王公卿士議其多少清河王臣懌先帝懿弟識度寛明臨衆唱議非以勤而賞之憚違權臣之㫖望顔而授臣知不可因而從之臣之罪四也忠秉權門下且居宰執又總禁旅為崇訓衛尉身兼内外横于宫掖臣之罪五也古者重罪必令三公會期至旬日所以重死刑也先帝登極十有七年細人犯刑猶寛憲墨朝廷貴仕不戮一人今陛下踐阼年未半周殺僕射尚書如夭一草是忠秉權矯㫖擅行誅戮臣知不能救臣之罪六也臣位荷師相年未及終難恕之罪顯露非一何情以處何顔以生雖經恩宥猶有餘責謹反私門伏聽司敗靈太后感忠保護之勲不問其罪增雍封一千戸除侍中太師又加使持節以本官領司州牧雍表請王公以下賤妾悉不聽用織成錦繡金玉珠璣違者以違㫖論奴婢悉不得衣綾綺纈止於縵繒而已奴則布服竝不得以金銀為釵帶犯者鞭一百太后從之而不能久行也詔雍乗步挽出入掖門又以本官録尚書事雍頻表辭遜優荅不許詔侍中敦諭詔雍朝夕侍講肅宗覽政除使持節司州牧侍中太師録尚書如故肅宗加元服雍兼太保與兼太尉崔光攝行冠禮詔雍乗車出入大司馬門進位丞相給羽葆鼓吹倍加班劒餘悉如故又賜帛八百匹與一千人供具催令速拜詔雍依齊郡順王簡太和故事朝訖引坐特優拜伏之禮總攝内外與元义同决庶政嵗禄萬餘粟至四萬伎侍盈房諸子璫冕榮貴之盛昆弟莫及焉元妃盧氏薨後更納博陵崔顯妹甚有色寵欲以為妃世宗初以崔氏世號東崔地寒望劣難之久乃聽許延昌已後多幸伎侍近百許人而疎弃崔氏别房幽禁不得關豫内政僅給衣食而已至乃左右無復婢使子女欲省其母必啓聞許乃得見未幾崔暴薨多云雍毆殺之也靈太后許賜其女伎未及送之雍遣其閹豎丁鵞自至宫内料簡四口冒以還第太后責其専擅追停之孝昌初詔曰比相府弗開隂陽未變王秉哲居宗勲望隆重道庇蒼生威被華裔體國猶家匪躬在節可開府置佐史尋罷司徒以為丞相府孝莊初尒朱榮欲害朝士遂云雍將謀逆於河隂遇害贈假黃鉞相國諡文穆王雍識懐短淺又無學業雖位居朝首不為時情所推既以親尊地當宰輔自熙平以後朝政褫落不能守正匡弼唯唯而已及清河王懌之死元义専政天下大責歸焉嫡子泰字昌頗有時譽}
  - {type: variant, offset: 903, length: 0, content: '', WYG: 書侍郎尋遷通直散騎常侍鎮東將軍太常卿與雍同時遇害追贈侍中特進驃騎大將軍太尉公武州刺史髙陽王諡曰文孝子斌襲武定中官至尚書右僕射齊受禪爵例降泰兄端字宣雅美容貌頗涉書史起家散騎侍郎累遷通直常侍鴻臚太常少卿散騎常侍出為安東將軍青州刺史是時蕭衍遣將寇逼徐揚除端撫軍將軍金紫光禄大夫使持節東南道大使處分軍機賊平拜鎮軍將軍兖州刺史俄而衍將復冦徐兖圍逼州城端率在州文武拒守得全以功封安得縣開國公食邑五百戸還除}
