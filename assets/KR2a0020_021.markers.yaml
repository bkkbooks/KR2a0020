  - {type: variant, offset: 2366, length: 1, content: 監, WYG: 舍人張儒奉詔徵世宗會駕梓宫至魯陽乃發喪行服世宗即位勰跪授髙祖遺勑數紙咸陽王禧疑勰為變停在魯陽郡外久之乃入謂勰曰汝非但辛勤亦危險至極勰恨之對曰兄識髙年長故知有夷險彦和握蛇騎虎不覺艱難禧曰汝恨吾後至耳自髙祖不豫勰常居中親侍醫藥夙夜不離左右至於衣帶罕解亂首垢面帝患久多忿因之以遷怒勰每被誚詈言至厲切威責近侍動將誅斬勰承顔悉心多所匡濟及髙祖昇遐陳顯達奔遁始爾慮凶問洩漏致有逼迫勰内雖悲慟外示吉容出入俯仰神貌無異及至魯陽也東宫官屬多疑勰有異志竊懐防懼而勰推誠盡禮卒無纎介勰上髙祖諡議謹案諡法協時肇享曰孝五宗安之曰孝道德博聞曰文經緯天地曰文仰惟大行皇帝義實該之宜上尊號為孝文皇帝廟曰髙祖陵曰長陵世宗從之既葬世宗固以勰為宰輔勰頻口陳遺㫖請遂素懐世宗對勰悲慟每不許之勰頻煩表聞辭義懇切世宗難違遺勑遂其雅情猶逼以外任乃以勰為使持節}
