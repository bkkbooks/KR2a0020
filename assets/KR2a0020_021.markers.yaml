  - {type: variant, offset: 2174, length: 5, content: 廣胙河山稱, WYG: 嗚咽及引入謇便欲進治勰以髙祖神力虚弱唯令以食味消息勰乃密為壇於汝水之濵依周公故事告天地顯祖請命乞以身代髙祖翌日有瘳損自懸瓠幸鄴勰常侍坐輿輦晝夜不離於側飲食必先嘗之而後手自進御車駕還京會百寮於宣極堂行飲至策勲之禮命舍人宣㫖勰翼弼六師纂戎荆楚沔北之勲每毗廟算從討新野有克城之謀受命鄧城至大捷之効功為羣將之最也别當授賞不替厥庸髙祖謂勰曰吾與汝等早罹艱苦中逢契濶每謂情義隨事而疎比纒患經嵗危如寒葉非汝孔懐情敦忠孝孰能動止躬親必先藥膳每尋此事感思殊逺勰悲泣對曰臣等宿遭不天酷恨長世賴陛下撫育得參人伍豈謂上靈無鑒復使聖躬違和萬國所懸蒼生繫氣寢興之勞豈申荼蓼以破慧景等勲增邑五百戸又詔曰朕形疲稚年心勞長嵗積思成痾頓發汝潁第六弟勰孝均周弟感侔姬旦遺食捨寐動止必親敦醫勸膳誠力俱竭致兹保康實賴同氣又秉務緝政百司是憑綱維折衷萬揆獲濟撫師於霖浩之辰處戎於荐逼之日安外靜内功臣大道侍省之績可以孔懐無褒翼亮之勤實乃勲存社稷宜有酬賞以旌國功可増邑一千户勰辭曰臣受遇縁親榮枯事等以此獲賞殊乖情願乞追成㫖用息謗言詔曰汝在私能孝處公必忠比來勤憂足布朝野但可祇膺尋以勰為司徒太子太傅侍中如故俄而蕭寳卷將陳顯達内寇髙祖復親討之詔勰使持節都督中外諸軍事總攝六師是時髙祖不豫勰辭曰臣侍疾無暇六軍須有所託事不兩興情力又竭更請一王總當軍要髙祖曰戎務侍疾皆憑於汝牽痾如此吾深慮不濟安六軍保社稷者捨汝而誰何容方便請人以違心寄宗袥所賴唯在於汝諸葛孔明霍子孟異姓受託而况汝乎行次淯陽髙祖謂勰曰吾患轉惡汝其努力車駕至馬圈去賊營數里顯達等出戰諸將大破之勰部分諸軍將攻賊壘其夜奔退髙祖疾甚謂勰曰修短命也死生大分今吾氣力危惙當成不濟矣雖敗顯達國家安危在此一舉社稷所仗唯在汝身霍子孟以異姓受付况汝親賢可不勉也勰泣曰士於布衣猶為知已盡命况臣託靈先皇聨暉陛下誠應竭股肱之力加之以忠貞但臣出入喉膂每跨時要及於寵靈輝赫聞之遐邇復參宰匠機政畢歸震主之聲見忌必矣此乃周旦遁逃成王疑惑陛下愛臣便為未盡始終之美臣非所以惡華捐勢非所以辭勤請逸正希仰成陛下日鏡之明下念愚臣忘退之禍髙祖久}
