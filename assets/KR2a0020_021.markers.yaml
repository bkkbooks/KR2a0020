  - {type: variant, offset: 896, length: 1, content: 服, WYG: 非才皆劣稱事之輩未必悉賢而考閑以多年課煩以少嵗上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明參差之考非聖慈之心改典易常乃有司之意又尋考級之奏委於任事之手涉議科勤絶於散官之筆遂使在事者得展自勤之能散輩者獨絶披衿之所抑以上下之閑限以㫖格之判致使近侍禁職抱槃屈之辭禁衛武夫懐不申之恨欲尅平四海何以獲諸又散官在直一玷成尤銜使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以禄微加賞罪殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啓處又曰豈不懐歸畏此簡書依依楊栁以叙治兵之役霏霏雨雪又申振旅之勤若折往來日月便是採薇之詩廢枤杜之歌罷又任事之官吉凶請假定省掃拜動歴十旬或因患重請動輙經嵗征役在途勤泰百倍苦樂之勢非任事之倫在家私閑非理務之日論優語劇先宜折之武人本挽上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不涉或帶甲連年負重千里或經戰損傷或年老衰竭今試以本格責其如初有爽於先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彦或歴嶮千餘或履危萬里登有死亡之憂咸懐不返之慼魂骨奉忠以尸將命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以奬勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年升一階檢無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上陟上第之士由汎而退臣又見部尉資品本居流外刋諸明令行之已久然近為里巷多盗以}
