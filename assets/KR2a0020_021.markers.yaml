  - {type: variant, offset: 5064, length: 1052, content: 郎臣孫惠蔚與崇扶同二途參差頻經考議而尚書令臣肇以芳造崇物故之後而惠蔚亦造一尺仍云扶以比崇尺自相乖背量省二三謂芳為得而尚書臣匡表云劉孫二尺長短相傾稽考兩律所容殊異言取中黍校彼二家云並參差抑中無所自立一途請求議判當時議者或是於匡兩途舛駁未即時定肇又云權斛斗尺班行已久今者所論豈喻先旨宜仰依先朝故尺為定自爾以後而匡與肇厲言都座聲色相加高下失其常倫噂競無復彝序匡更表列據己十是云芳十非又云肇前被敕旨共芳營督規立鍾石之名希播製作之譽乃憑樞衡之尊藉舅氏之勢與奪任心臧否自己阿黨劉芳遏絕臣事望勢雷同者接以恩言依經按古者即被怒責雖未指鹿化馬移天徙日實使蘊藉之士聳氣坐端懷道之夫結舌筵次又言芳昔與崇競言自作今共臣論忽稱先朝豈不前謂可行輒欲自取後知錯謬便推先朝殊非大臣之體深失為下之義復考校勢臣之前量度偏頗之手臣必刖足內朝抱璞人外囂言肆意彰於朝野然匡職當出納獻替所在斗尺權度正是所司若己有所見能練臧否宜應首唱義端早辨諸惑何故默心隨從不關一言見芳成事方有此語計芳才學與匡殊懸所見淺深不應相匹今乃始發恐此由心借智於人規成虛譽況匡表云所據銅權形如古誌明是漢作非莽別造及案權銘云黃帝始袓德布於虞虞帝始袓德布於新若莽佐漢時事寧有銘偽新之號哉又尋莽傳云莽居攝即變漢制度考校二證非漢權明矣復云芳之所造又短先朝之尺臣既比之權然相合更云芳尺與千金堰不同臣復量比因見其異二三浮濫難可據準又云共構虛端妄為疑似託以先朝云非己製臣按此欺詐乃在於匡不在於芳何以言之芳先被敕專造鍾律管籥優劣是其所裁權斛尺度本非其事比前門下索芳尺度而芳牒報云依先朝所班新尺復應下黍更不增損為造鍾律調正分寸而已檢匡造時在牒後一歲芳於爾日匡未共爭已有此牒豈為詐也計崇造寸積黍十二羣情共知而芳造寸唯止十黍亦俱先朝詔書以黍成寸首尾歷然寧有輒欲自取之理肇任居端右百僚是望言行動靜必副具瞻若恃權阿黨詐託先詔將指鹿化馬徙日移天即是魏之趙高何以宰物肇若無此匡既誣毀宰相訕謗明時豈應談議之間便有指鹿之事可否之際輕生刖足之言趙高矯惑事屬衰秦卞和抱璞時遇暴楚何宜以濟濟之朝而有斯謗者哉阻惑朝聽不敬至甚請以肇匡並禁尚書推窮其原付廷尉定罪詔曰可有司奏匡誣肇處匡死刑世宗恕死降為光祿大夫又兼宗正卿出為兗州刺史匡臨發帝引見於東堂勞勉之匡猶以尺度金石之事國之大經前雖為南臺所彈然猶許更議若議之日願聽臣暫赴世宗曰劉芳學高一時深明典故其所據者與先朝尺乃寸過一黍何得復云先朝之意也兗州既所執不經後議之日何待赴都也肅宗初入為御史中尉匡嚴於彈糾始奏于忠次彈高聰等免官靈太后並不許以違其糾惡之心又慮匡辭解欲奬安之進號, WYG: ''}
