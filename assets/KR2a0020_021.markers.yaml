  - {type: variant, offset: 3690, length: 354, content: 征北大將軍護匈奴中郎將累遷懷朔鎮大將坐貪殘恕死削除官爵卒高祖哭於思政觀贈本爵葬從王禮諡曰靈王子逞字萬安卒於齊州刺史諡曰威逞子慶和東豫州刺史為蕭衍將所攻舉城降之衍以為北道總督魏王至項城朝廷出師討之望風退走衍責之曰言同百舌膽若鼷鼠遂徙合浦逞弟汎字普安自元士稍遷營州刺史性貪殘人不堪命相率逐之汎走平州後除光祿大夫宗正卿封東燕縣男於河陰遇害天賜第五子脩義字壽安涉獵書傳頗有文才為高祖所知自元士稍遷左將軍齊州刺史脩義以齊州頻喪刺史累表固辭詔曰修短有命吉凶由人何得過致憂憚以乖維城之寄違凶就吉時亦有之可聽更立館宇於是移理東城脩義為政寬和愛人在州四歲不殺一人百姓以是追思之遷秦州刺史肅宗初表陳庶人禧庶人愉等請宥前愆賜葬陵域靈太后詔曰收葬之恩事由上旨藩岳何得越職干陳在州多受納累遷吏部尚書及在銓衡唯專貨賄授官大小皆有定價時中, WYG: 通直}
