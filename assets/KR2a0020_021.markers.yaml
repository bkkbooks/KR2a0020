  - {type: variant, offset: 359, length: 6, content: 穆泰謀反遣使, WYG: 開府如故賜雜物五百叚又密賜黃金十斤髙祖親餞於近郊詔幹曰夫刑獄之理先哲所難然既有邦國得不自勵也汝我之懿弟當聿修厥徳光崇有魏深思逺圖如臨深履薄若恃親重不務世政國有常憲方増悲感髙祖詔以李憑為長史唐茂為司馬盧尚之為諮議叅軍以匡弼之而憑等諫諍幹殊不納州表斬盗馬人於律過重而尚書以幹初臨縱而不劾詔曰夫刑以節人罪必無濫故刑罰不中民無措足若必以威殺為良則應汎通衆牧茍須有禁何得不稽之正典又律令條憲無聽新君加戮之文典禮舊章不著始臨専威之美尚書曲阿朕意實傷皇度幹闇於治理律外重刑竝可}
