  - {type: 'tls:seg', offset: 892, content: '', id: KR2a0020_ZHSJ_021-d21p9s6}
  - {type: variant, offset: 894, length: 0, content: '', WYG: 行鎮軍大將軍總攝留事遷衛尉加散騎常侍除使持節鎮北將軍相州刺史常侍如故髙祖誡雍曰相州乃是舊都自非朝賢徳望無由居此是以使汝作牧為牧之道非難非易其身正不令而行故便是易其身不正雖令不從故便是難又當愛賢士存信約無用人言而輕與奪也進號征北將軍世宗初遷使持節都督冀相瀛三州諸軍事征北大將軍開府冀州刺史常侍如故雍在二州微有聲稱入拜驃騎大將軍司州牧世宗時幸雍第皆盡家人之禮遷司空公議定律令雍常入叅大議轉太尉公加侍中時雍以旱故再表遜位優詔不許除太保領太尉侍中如故世宗行考陟之法雍表曰竊惟三載考績百王通典今任事上中者三年升一階散官上第者四載登一級閑冗之官本非虚置或以賢能而進或因累勤而舉如其無能不應忝兹髙選既其以能進之朝伍或任官外戍逺使絶域催督逋懸察檢州鎮皆是散官以充劇使及於考陟排同閑伍檢散官}
