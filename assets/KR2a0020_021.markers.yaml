  - {type: variant, offset: 384, length: 2, content: 景明, WYG: 初襲封幹妃穆氏表謐母趙等悖禮愆常不遜日甚尊卑義阻母子道絶詔曰妾之於女君猶婦人事舅姑君臣之禮義無乖二妾子之於君母禮加如子之恭何得黷我風政可付宗正依禮治罪謐在母䘮聽音聲飲戲為御史中尉李平所彈遇赦復封除通直散騎常侍加龍驤將軍遷太子中庶子出為冠軍將軍岐州刺史謐性嚴暴虐下人肅宗初臺使}
