  - {type: variant, offset: 947, length: 0, content: '', krp: 以禦榮顥至汲郡屬尒朱榮入洛推奉莊帝詔授顥太傅開府侍中刺史王竝如故顥以葛榮南侵尒朱縦害遂盤桓顧望圖自安之䇿先是顥啓其舅范遵為殷州刺史遵以葛榮充逼未得行顥令遵權停於鄴顥既懐異謀乃遣遵行相州事代前刺史李神為已表裏之援相州行臺甄先受朝㫖委其守鄴知顥異圖恐遵為變遂相率廢遵還推李神攝理州事然後遣軍候顥逆順之勢顥以事意不諧遂與子冠受率左右奔於蕭衍顥見衍泣涕自陳言辭壯烈衍竒之遂以顥為魏王假之兵將令其北入永安二年四月於梁國城南登壇燔燎號孝基元年莊帝詔濟隂王暉業為都督於考城拒之為顥所擒又尅行臺楊昱於滎陽尒朱世隆自虎牢走退莊帝北幸顥遂入洛改稱建武元年顥以數千之衆轉戰輙尅據有都邑號令自己天下人情想其風政而自謂天之所授頗懐驕怠宿昔賔客近習之徒咸見寵待干擾政事又日夜縱酒不恤軍國所統南兵凌竊市里朝野莫不失望時又酷斂公私不安莊帝與尒朱榮還師討顥自於河梁拒戰王師渡於馬渚冠受戰敗被擒因相繼而敗顥率帳下數百騎及南兵勇健者自轘轅而出至臨潁顥部騎分散為臨潁縣卒所斬出帝初贈使持節侍中都督冀定相殷四州諸軍事驃騎大將軍大司馬冀州刺史武定中子娑羅襲齊受禪爵例降顥弟瑱字寶意起家為通直郎轉中書郎歴武衛將軍光禄少卿黄門郎出除平北將軍相州刺史為大宗正卿封平樂縣開國公食邑八百戸莊帝初拜侍中車騎將軍封東海王食邑千户俄遷中書監左光禄大夫兼尚書右僕射又拜車騎大將軍加侍中瑱無他才幹以親屬早居重任兄顥入洛成敗未分便以意氣自得為時人所笑顥敗潛竄為人執送斬於都市出帝初贈侍中都督雍華岐三州諸軍事驃騎大將軍太尉公尚書令雍州刺史子衍襲爵武定中通直散騎侍郎齊受禪爵例降史臣曰顯祖諸子俱聞道於太和之日咸陽望重位隆自猜謀亂趙郡愆於王度終諡曰靈廣陵夙稱明察不幸中夭惜矣髙陽器術缺然終荷棟幹孝昌之叛蓋不足以責之北海義昧鶺鴒奢淫自䘮雖禍由閒言亦自貽伊戚顥取若拾遺亡不旋踵豈守之無術其天將覆之魏書卷二十一上魏書卷二十一上考證趙郡王幹𫝊銓衡是荷荷一本作何北海王詳𫝊閉密始末閉一本作秘魏書卷二十一上考證欽定四庫全書魏書卷二十一下齊魏收撰列傳第九下獻文六王彭城王彭城王勰字彦和少而岐嶷姿性不羣太和九年封始平王加侍中征西大將軍勰生而母潘氏卒其年顯祖崩及有所知啓求追服文明太后不許乃毁瘠三年弗參吉慶髙祖大竒之敏而耽學不舍晝夜博綜經史雅好屬文髙祖革創解侍中將軍拜光禄大夫復除侍中長直禁内參決軍國大政萬幾之事無不預焉及車駕南伐以勰行撫軍將軍領宗子軍宿衛左右開建五等食邑二千戸轉中書令侍中如故改封彭城王髙祖與侍臣升金墉城顧見堂後梧桐竹曰鳳凰非梧桐不栖非竹實不食今梧桐竹並茂詎能降鳳乎勰對曰鳳凰應德而來豈竹梧桐能降髙祖曰何以言之勰曰昔在虞舜鳳凰來儀周之興也鸑鷟鳴於岐山未聞降桐食竹髙祖笑曰朕亦未望降之也後宴侍臣於清徽堂日宴移於流化池芳林之下髙祖曰向宴之始君臣肅然及將末也􅜠情始暢而流景將頽竟不盡適戀戀餘光故重引卿等因仰觀桐葉之茂曰其桐其椅其實離離愷悌君子莫不令儀今林下諸賢足敷歌詠遂令黃門侍郎崔光讀暮春羣臣應詔詩至勰詩髙祖乃為之改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中令之舉非私也勰對曰臣露此拙方見聖朝之私賴蒙神筆賜刋得有令譽髙祖曰雖琢一字猶是玉之本體勰曰臣聞詩三百一言可蔽今陛下賜刋一字足以價等連城勰表解侍中詔曰蟬貂之美待汝而光人乏之秋何容方退也克念作聖庶必有資耳後幸代都次于上黨之銅鞮山路旁有大松樹十數根時髙祖進繖遂行而賦詩令人示勰曰吾始作此詩雖不七步亦不言逺汝可作之比至吾所令就之也時勰去帝十餘步遂且行且作}
