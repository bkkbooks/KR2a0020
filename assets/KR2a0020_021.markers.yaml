  - {type: variant, offset: 223, length: 0, content: '', WYG: 以諸弟典三都誠禧等曰汝等國之至親皆㓜年任重三都折獄特宜用心夫未能操刀而使割錦非傷錦之尤寔授刀之責皆可修身慎行勿有乖爽文明太后亦誠禧等曰汝兄繼承先業統御萬機戰戰兢兢恒恐不稱汝所治雖小亦宜克念髙祖又曰周文王小心翼翼聿懐多福如有周公之才使驕且吝其餘不足觀汝等宜小心畏慎勿自驕怠出為使持節開府冀州刺史髙祖餞於南郊又以濟隂王鬱枉法}
  - {type: page-break, offset: 223, content: '', id: KR2a0020_WYG_021-2a, image: WYG0261/WYG0261-0331c.png}
  - {type: variant, offset: 223, length: 0, content: '', krp: 以諸弟典三都誠禧等曰汝等國之至親皆㓜年任重三都折獄特宜用心夫未能操刀而使割錦非傷錦之尤寔授刀之責皆可修身慎行勿有乖爽文明太后亦誠禧等曰汝兄繼承先業統御萬機戰戰兢兢恒恐不稱汝所治雖小亦宜克念髙祖又曰周文王小心翼翼聿懐多福如有周公之才使驕且吝其餘不足觀汝等宜小心畏慎勿自驕怠出為使持節開府冀州刺史髙祖餞於南郊又以濟隂王鬱枉法}
