  - {type: punctuation, offset: 254, content: 「, id: KR2a0020_ZHSJ_021-bkkpn39}
  - {type: variant, offset: 254, length: 0, content: '', WYG: 可憐咸陽王奈何作事悞金牀玉几不能眠夜蹋霜與露洛水湛湛彌岸長行人那得度其歌遂流至江表北人在南者雖富貴絃歌奏之莫不灑泣同謀誅斬者數十人濳瘞禧於北邙絶其諸子屬籍禧之諸女微給資産奴婢自餘家財悉以分賚髙肇趙脩二家其餘賜内外百官逮于流外多者百餘匹下至十匹於後禧諸子每之衣食獨彭城王勰嵗中再三賑給之禧有子八人長子通字曇和竊入河内太守陸琇初與通情既聞禧敗乃殺之通弟翼字仲和後會赦詣闕上書求葬其父頻年泣請世宗不許翼乃與弟昌曄奔於蕭衍翼與昌申屠氏出曄李妃所生也翼容貌魁壯風制可觀衍甚重之封為咸陽王翼讓其嫡弟曄衍不許後以為信武將軍青冀二州刺史鎮郁州翼謀舉州入國為衍所移昌為衍直閤將軍翼弟顯和昌弟樹後亦奔於衍顯和卒於江南樹字秀和美姿貌善吐納兼有將略衍尤器之封為魏郡王後改封鄴王數為將領窺覦邊服時揚州降衍兵武既衆衍將湛僧珍慮其飜異盡欲殺之樹以家國遂皆聽還衍以樹為鎮西將軍郢州刺史爾朱榮之害百官也樹聞之乃請衍討榮衍乃資其士馬侵擾境上前廢帝時竊據譙城出帝初詔御史中尉樊子鵠為行臺率徐州刺史大都督杜徳以討之樹城守不下子鵠使金紫光禄大夫張安期往說之樹乃請委城還南子鵠許之樹恃誓約不為戰備杜徳襲擊之擒樹送京師禁於永寧佛寺未幾賜死孝靜時其子貞自建業赴鄴啓求葬樹許之詔贈樹侍中都督青徐兗揚豫五州諸軍事太師司徒公尚書令揚州刺史貞既葬還於江南曄字世茂衍封為桑乾王拜散騎常侍卒於秣陵初正光中詔曰周徳崇厚蔡仲享國漢道仁恕淮南畢王皆所以申恩懿戚蠲蕩舊釁義彰曩葉詠流前史頃者咸陽京兆王自貽禍敗事由間惑猶有可矜兩門諸子竝可聽附屬籍後復禧王爵葬以王禮詔曄弟坦襲改封敷城王邑八百戸坦傲佷兇麤從叔安豐王延明責之曰汝兇悖性與身而長昔有宋東海王禕志性凡劣時人號曰驢王我熟觀汝所作亦恐不免驢號莊帝初還復本封武定中為太師齊受禪爵例降坦弟昶起家通直散騎常侍琅邪縣開國公邑五百戸莊帝初特封太原王累遷鴻臚卿超拜車騎大將軍儀同三司天平二年薨贈太尉公子善慧襲齊受禪爵例降趙郡王幹字思直太和九年封河南王加衛大將軍除侍中中都大官尋授車騎將軍左光禄大夫領吏部尚書所生母薨髙祖詔曰太妃韓氏薨逝情以傷慟太妃先朝之世位擬九嬪豫班上族誕我同氣念此孤稚但用感惻明}
