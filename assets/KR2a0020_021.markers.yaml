  - {type: variant, offset: 233, length: 0, content: '', krp: 畢修遺志卿等謂可行不當各盡對無以面從禧對曰儀制之事用捨各隨其時而人可使由之不可使知之臣謂宜述元志備行朝式髙祖然之詔曰仲尼在鄉黨猶尚恂恂周文王為世子卑躬求道禧等雖連蕚宸暉得不尊尚師傅也故為置之以加令徳廷尉卿李沖可咸陽王師禧將還州髙祖親餞之賦詩敘意加禧}
