  - {type: variant, offset: 1919, length: 0, content: '', WYG: 獲勰言於髙祖曰始有一鳥望旗顛仆臣謂大吉髙祖戲之曰鳥之畏威豈獨中軍之畧也吾亦分其一爾此乃大善兵法咸說至明便大破崔慧景蕭衍其夜大雨髙祖曰昔聞國軍獲勝每逢雲雨今破新野南陽及摧此賊果降時潤誠哉斯言勰對曰水德之應逺稱天心髙祖令勰為露布勰辭曰臣聞露布者布於四海露之耳目必須宣揚威畧}
