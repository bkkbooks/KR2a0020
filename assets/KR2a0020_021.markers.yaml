  - {type: variant, offset: 934, length: 0, content: '', WYG: 車騎大將軍儀同三司司州牧天平三年薨贈使持節侍中太保司徒公尚書令將軍牧如故諡曰文獻無子以斌第二子子亮為後誕弟勒义勅义弟亘亘弟伏陁伏陁弟彌陁彌陁弟僧育僧育弟居羅出帝初勒义封陽平縣亘封濮陽縣伏陁封武陽縣彌陁封新陽縣僧育封頓丘縣居羅封衛縣竝開國伯食邑四百戸天平中竝除鎮逺將軍散騎侍郎僧育走關西國除其餘齊受禪爵例降北海王詳字季豫美姿容善舉止太和九年封加侍中征北大將軍後拜光禄大夫解侍中將軍又兼侍中從髙祖南伐為散騎常侍髙祖自洛北廵詳常與侍中彭城王勰竝在輿輦陪侍左右至髙宗射銘之所髙祖停駕詔諸弟及侍臣皆試射逺近唯詳箭不及髙宗箭所十餘步髙祖嘉之拊掌欣笑遂詔勒銘親自為制五等開建食邑二千户遷侍中轉祕書監車駕南伐詳行中領軍留守給鼓吹一部甲仗三百人兼督營構之務髙祖賜詳璽書曰比遊神何業也邱墳六籍何事非娛善正風猷肅是禁旅詳後朝於行宫髙祖引見之詳慶平沔北髙祖曰朕以畿南未清神麾暫動沔北數城竝皆柔服此乃將士之效非朕之功詳對曰陛下徳邁唐虞功微周漢自南之風於是乎始詳還洛髙祖餞之詔詳曰昔者淮夷叛命故有三年之舉鬼方不令乃致淹載之師况江吳竊命于今十紀朕必欲蕩滌南海然後言歸今夏停此故與汝相見善守京邑副我所懐趙郡王幹薨以詳行司州牧除護軍將軍兼尚書左僕射髙祖臨崩顧命詳為司空輔政世宗即位以詳有營構之勤增邑一千戸詳以帝居諒闇不受世宗覽政遷侍中大將軍録尚書事咸陽王禧之謀反也詳表求解任詔曰一人之身愆不累徳形乖性别忠逆固殊是以父殛子興義髙唐世弟戮兄登迹顯周魯禧之與國異體同氣既肆無君之逆安顧弟友之親叔父忠顯二朝誠貫廟社寔朂贊沖昧保乂鴻猷豈容以微介之慮忘阿衡之重貂章即已勑還願不再述祚屬眇躬言及斯事臨紙慙恨惋慨兼深詳重表陳解詔復不許除太傅領司徒侍中録尚書事如故詳固辭詔遣敦勸乃受詳與八座奏曰竊惟姦刧難除為蠧日久郡盗作患有國攸病故五刑為用猶陷觸網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治}
