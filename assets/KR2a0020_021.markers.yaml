  - {type: variant, offset: 899, length: 1, content: 惠, WYG: 輕不肅欲進品清流以壓姦宄甄深啓云為法者施而觀之不便則改竊謂斯言有可採用聖慈昭覽更髙宰尉之秩今考格始宣懐怨者衆臣竊觀之亦謂不可有光國典改之何難世宗乃引雍共論時務肅宗初詔雍}
