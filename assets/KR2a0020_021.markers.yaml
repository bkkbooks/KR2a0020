  - {type: variant, offset: 681, length: 0, content: '', WYG: 至鴈門乃令羽歸望其稱効故賜如意以表心遷都議定詔羽兼太尉告于廟社遷京之後北蕃人夷多有未悟羽鎮撫代京内外肅然髙祖嘉之十八年春羽表辭廷尉不許羽奏外考令文每嵗終州鎮列牧守治狀及至再考隨其品第以彰黜陟去十五年中在京百寮盡已經考為三等此年便是三載雖外有成令而内令未班内外考察理應同等臣輙推凖外考以定京官治行詔曰雖内考未宣績已久著故明堂月令載公卿大夫論考屬官之治職區分著三公疑尚書三載殿最之義此之考内已為明矣但論考之事理在不輕問績之方應關朕聽輙爾輕發殊為躁也每考之義應在年終既云此年何得春初也今始維夏旦待至秋後髙祖臨朝堂議政事謂羽曰遷都洛陽事格天地但汝之迷徒未開沉鄣耳朕家有四海往來何難朕初發洛陽教示永壽皆謂分别比自來後諸處分之事已差前勑今舉大功寧為虚費且朕無周召之弟豈容宴安日逸今便北廵遷留之事當稱朕懐後髙祖臨朝堂謂羣臣曰兩儀既闢人生其間故上天不言樹君以代是以書稱三考之績禮云考成之章自皇王以降斯道靡易朕以寡徳猥荷洪基思與百辟允釐庶務然朕識乏知人不能使朝絶素餐之譏野無考槃之刺夙宵寤寐載懐怵惕卿等皆是朝賢國彦匡弼是寄各率乃心以旌考績之義如乖忠正國有常刑賢者雖疎必進不肖者雖親必黜顧謂羽曰上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髪之美中等守本事可大通羽先呈廷尉五局司直髙祖曰夫刑獄之難實惟自古必也斷訟夫子所稱然五局所司専主刑獄比聞諸風聽多論五局不精知人之難朕豈獨決當與羣臣同之卿等各陳所聞髙祖謂羽及少卿鄧述曰五局司直卿等以何為品羽對曰諸司直竝簡聖心往者百官初置擢為獄官聽訟察辭無大差越所以為二等者或以視事甫爾或以見機遲速朝廷既有九品之制故計其絲髮之差以為品第統論所得大都相似髙祖曰朕頃年以其人識見可取故簡司獄官小優劣不足為差然廷尉所司人命之本事須心平性正抑彊哀弱不避貴勢直情折獄者可為上等今正欲聽採風謡虚實難悉正欲不採事無所據然人言惡者未必是惡言善者不必是善所以然者或斷訟不避豪貴故人以為惡或將勢抑賤貴人以為好然關朕之聽皆貴者言是以遲廻三復良由於此局事須冰清玉潔明揚褒貶卿等既是親典邪正得失悉所具之可精辨以聞鄧述對曰陛下行賞得人餘者甘心若實不盡能無以勸勵如臣愚見願不行賞髙祖曰朕昔置此官許三年考績必行賞罰既經今考若無黜陟恐正直者莫肯用心邪曲者無以改肅自非釋之于公何能盡其至理雖不可精其微致且望粗有殿最諸尚書更與羣官善量所以髙祖謂尚書等曰朕仰纂乾構君臨萬宇往者稽古典章樹兹百職然尚書之任樞機是司豈惟總括百揆緝和人務而已朕之得失寔在於斯自卿等在任年垂二周未嘗言朕之一失獻可否之片規又未嘗進一賢而退一不肖此二事罪之大者髙祖又謂羽曰汝之淺薄固不足以況晉之巨源考之今世民斯下矣汝始為廷尉及初作尚書内外瞻望以吾有弟自往秋南斾之後近小人逺君子在公阿黨虧我皇憲出入無章動乖體則計汝所行應在下下之第髙祖又謂羽曰汝既是宸極之弟而居樞端之任汝自在職以來功勤之績不聞於朝阿黨之音頻干朕聽汝之過失已備積於前不復能别叔今黜汝録尚書廷尉但居特進太保又謂尚書令陸叡曰叔飜在省之初甚有善稱自近以來偏頗懈怠豈不由卿等隨其邪偽之心不能相導以義雖不成大責已致小罰今奪卿尚書令禄一周謂左僕射元贊曰卿夙徳老成久居機要不能光贊物務奬勵同寮賊人之謂豈不在卿計叔飜之黜卿應大辟但以咎歸一人不復相罪又為少師未允所授今解卿少師之任削禄一周詔吏部尚書澄曰叔父既非端右又非座元豈宜濫歸衆過也然觀叔父神志驕傲少保之任似不能存意可解少保謂長兼尚書于果曰卿履歴卑淺超升名任不能勤謹夙夜數辭以疾長兼之職位亞正員今解卿長兼可光禄大夫守尚書削禄一周又謂守尚書尉羽曰卿在集書殊無憂存左史之事今降為長兼常侍亦削禄一周又謂守尚書盧淵曰卿始為守尚書未合考績然卿在集書雖非髙功為一省文學之士嘗不以左史在意如此之咎罪無所歸今降卿長兼王師守常侍尚書如故奪常侍禄一周謂左丞公孫良右丞乞伏義受曰二丞之任所以協贊尚書光宣出納而卿等不能正心直言規佐尚書論卿之罪應合大辟但以尚書之失事鍾叔飜故不能别致貶責二丞可以白衣守本官冠服禄恤盡皆削奪若三年有成還復本任如其無成則永歸南畝又謂散騎常侍元景曰卿等自任集書合省逋墮致使王言遺滯起居不修如此之咎責在於卿今降為中大夫守常侍奪禄一周謂諫議大夫李彦曰卿雖處諫議之官實人不稱職可去諫議退為元士又謂中庶子游肇等曰自建承華已經一稔然東宫之官無直言之士雖未經三載事須考黜肇及中舍人李平識學可觀可為中安樂王詮可為下中解東華之任退為員外散騎常侍馮夙可為下下免中庶子免爵兩任員外常侍如故中舍人閭賢保可為下下退為武騎常侍又謂公孫良曰頃年用人多乖觀才之授實是武人而授以文官黜同大例於理未均諸如此比黜官如初髙祖引陸叡元贊等於前曰北人每言北人何用知書朕聞此深用憮然今知書者甚衆豈皆聖人朕自行禮九年置官三載正欲開導兆人致之禮教朕為天子何假中原欲令卿等子孫博見多知若永居恒北值不好文主卿等子孫不免面牆也陸叡對曰實如明詔金氏若不入仕漢朝七世知名亦不可得也髙祖大悦及五等開建羽食渤海之東光二千戸車駕南伐羽進號衛將軍除使持節都督青齊光南青四州諸軍事征東大將軍開府青州刺史以留守代京之功増邑五百户髙祖幸羽第與諸弟言曰朕昨親受人訟始知廣陵之明了咸陽王禧對曰臣年為廣陵}
