  - {type: variant, offset: 934, length: 0, content: '', krp: 車騎大將軍儀同三司司州牧天平三年薨贈使持節侍中太保司徒公尚書令將軍牧如故諡曰文獻無子以斌第二子子亮為後誕弟勒义勅义弟亘亘弟伏陁伏陁弟彌陁彌陁弟僧育僧育弟居羅出帝初勒义封陽平縣亘封濮陽縣伏陁封武陽縣彌陁封新陽縣僧育封頓丘縣居羅封衛縣竝開國伯食邑四百戸天平中竝除鎮逺將軍散騎侍郎僧育走關西國除其餘齊受禪爵例降北海王詳字季豫美姿容善舉止太和九年封加侍中征北大將軍後拜光禄大夫解侍中將軍又兼侍中從髙祖南伐為散騎常侍髙祖自洛北廵詳常與侍中彭城王勰竝在輿輦陪侍左右至髙宗射銘之所髙祖停駕詔諸弟及侍臣皆試射逺近唯詳箭不及髙宗箭所十餘步髙祖嘉之拊掌欣笑遂詔勒銘親自為制五等開建食邑二千户遷侍中轉祕書監車駕南伐詳行中領軍留守給鼓吹一部甲仗三百人兼督營構之務髙祖賜詳璽書曰比遊神何業也邱墳六籍何事非娛善正風猷肅是禁旅詳後朝於行宫髙祖引見之詳慶平沔北髙祖曰朕以畿南未清神麾暫動沔北數城竝皆柔服此乃將士之效非朕之功詳對曰陛下徳邁唐虞功微周漢自南之風於是乎始詳還洛髙祖餞之詔詳曰昔者淮夷叛命故有三年之舉鬼方不令乃致淹載之師况江吳竊命于今十紀朕必欲蕩滌南海然後言歸今夏停此故與汝相見善守京邑副我所懐趙郡王幹薨以詳行司州牧除護軍將軍兼尚書左僕射髙祖臨崩顧命詳為司空輔政世宗即位以詳有營構之勤增邑一千戸詳以帝居諒闇不受世宗覽政遷侍中大將軍録尚書事咸陽王禧之謀反也詳表求解任詔曰一人之身愆不累徳形乖性别忠逆固殊是以父殛子興義髙唐世弟戮兄登迹顯周魯禧之與國異體同氣既肆無君之逆安顧弟友之親叔父忠顯二朝誠貫廟社寔朂贊沖昧保乂鴻猷豈容以微介之慮忘阿衡之重貂章即已勑還願不再述祚屬眇躬言及斯事臨紙慙恨惋慨兼深詳重表陳解詔復不許除太傅領司徒侍中録尚書事如故詳固辭詔遣敦勸乃受詳與八座奏曰竊惟姦刧難除為蠧日久郡盗作患有國攸病故五刑為用猶陷觸網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治}
  - {type: variant, offset: 935, length: 0, content: '', WYG: 整綱提目政之大要謹尋奪禄事條班已周嵗然京邑尹令善惡易聞邊州逺守或難聽審皆上下同情迭相掩没設有賊發隱而不言或以劫為偷或遏掠成盗更令賊發難知攘竊惟甚臣等參議若依制削奪則縣無朞月之宰附條貶黜郡靡嵗稔之守此制必行所謂法令滋章盗賊多有昔黃龔變風不由削禄張趙稱美豈憚貶退然綏導之體得失在人乃可重選慎官依律劾禁不宜輕改法令削黜羣司今請改制條還附律處其勵已公清賞有常典風謡黷賄案為考第世宗從之詳之拜命其夜暴風震電拔其庭中桐樹大十圍倒立本處初世宗之覽政也詳聞彭城王勰有震主之慮而欲奪其司徒大懼物議故為大將軍至是乃居之天威如此識者知其不終世宗講武於鄴詳與右僕射髙肇領軍于勁留守京師初太和末詳以少弟延愛景明初復以季父崇寵位望兼極百寮憚之而貪冒無厭多所取納公私營販侵剥逺近嬖狎羣小所在請託珍麗充盈聲色侈縱建飾第宇開起山池所費巨萬矣又於東掖門外大路之南驅逼細人規占第宅至有䘮柩在堂請延至葬而不見許乃令輿櫬巷次行路哀嗟詳母髙太妃頗亦助為威虐親命毆擊怨響嗷嗷妃宋王劉昶女不見答禮寵妾范氏愛等伉儷及其死也痛不自勝乃至葬訖猶毁􅎬視之表請贈平昌縣君詳又蒸於安定王燮妃髙氏髙氏即茹皓妻姊嚴禁左右閉密始末詳既素附於皓又縁淫好往來綢密皓之取妻也詳親至其家忻飲極醉詳雖貪侈聚斂朝野所聞而世宗禮敬尚隆憑寄無替軍國大事總而裁决每所敷奏事皆協允詳常别住華林園之西隅與都亭宫館密邇相接亦通後門世宗毎濳幸其所肆飲終日其寵如此又詳拜受因其私慶啓請世宗世宗頻幸南第御其後堂與髙太妃相見呼為阿母伏而上酒禮若家人臨出髙每拜送舉觴祝言願官家千萬嵗壽嵗嵗一至妾母子舍也初世宗之親政也詳與咸陽王禧彭城王勰竝被召入共乗犢車防衛嚴固髙時遑廹以為詳必死亦乗車傍路哭而送至金墉及詳得免髙云自今而後不願富貴但令母子相保共汝埽市作活也至此貴寵崇盛不復言有禍敗之理後為髙肇所譖云詳與皓等謀為逆亂于時詳在南第世宗召中尉崔亮入禁勑糾詳貪淫及茹皓劉胄常季賢陳掃靜等専恣之狀亮乃奏詳貪害公私婬亂典禮朝廷比以軍國費廣禁斷諸蕃雜獻而詳擅作威令命寺署酬直驅奪人業崇侈私第蒸穢無道失尊卑之節塵敗軍章虧風教之紀請以見事免所居官爵付鴻臚削奪輙下禁止付廷尉治罪并劾皓等夜即收禁南臺又虎賁百人圍守詳第慮其驚懼奔越遣左右郭翼開金墉門馳出諭之示以中尉彈狀詳母髙見翼頓首號泣不自勝詳言審如中尉所糾何憂也正恐更有大罪橫至耳人奉我珍異貨物我實愛之果為取受吾何憂乎私以自寛至明皓等皆賜死引髙陽王雍等五王入議詳罪單車防守還華林之館母妻相與哭入所居小奴弱婢數人隨從官防甚嚴終夜擊􅢎列坐圍守外内不通世宗為此不幸園十餘日徙詳就太府寺圍禁彌切詔曰王位兼台輔親懿莫二朝野屬賴具瞻所歸不能勵徳存道宣融軌訓方乃肆兹貪靦穢暴顯聞逺負先朝友愛之寄近乖家國推敬所期理官執憲寔合刑典天下為公豈容私抑但朕諸父傾落存者無幾便極逮坐情有未安可免為庶人别營坊館如法禁衛限以終身邦家不造言尋感慨遂别營館於洛陽縣東北隅二旬而成將徙詳居之會其家奴數人隂結黨輩欲以刧出詳密抄名字濳託侍婢通於詳詳始得執省而門防主司遥見突入就詳手中攬得呈奏至夜守者以聞詳哭數聲而暴死詳自至太府令其母妻還居南宅五日一來與其相見此夜母妻不在死於婢手中至明告其凶問詔曰北海叔奄至傾背痛慕抽慟情不自任明便舉哀可勑備辦䘮還南宅諸王皇宗悉令奔赴給東園祕器賵物之數一依廣陵故事詳之初禁也乃以蒸髙事告母母大怒詈之苦切曰汝自有妻妾侍婢少盛如花何忽共許髙麗婢姦通令致此罪我得髙麗當噉其肉乃杖詳背及兩脚百餘下自行杖力疲乃令奴代髙氏素嚴詳每有微罪常加責罰以絮裹杖至是去絮皆至瘡膿詳苦杖十餘日乃能立又杖其妃劉氏數十云新婦大家女門户匹敵何所畏也而不檢校夫婿婦人皆妬獨不妬也劉笑而受罰卒無所言詳貪淫之失雖聞逺近而死之日罪無定名逺近歎怪之停殯五載永平元年十月詔曰故太傅北海王體自先皇特鍾友愛受遺訓輔冲昧攸託不圖暮節晦徳終缺哀榮便可追復王封尅日營厝少慰幽魂以旌隂疑戚諡曰平王子顥字子明襲少慷慨有壯氣除龍驤將軍通直散騎常侍轉宗正卿光禄大夫長兼宗正卿散騎常侍平東將軍轉都官尚書加安南將軍出除散騎常侍撫軍將軍徐州刺史尋為御史彈劾除名其後賊帥宿勤明達叱千騏驎等寇亂豳華諸州乃復顥王爵以本將軍加使持節假征西將軍都督華豳東秦諸軍事兼左僕射西道行臺以討明達顥轉戰而前頻破賊衆解豳華之圍以功增封八百户進號征西將軍又除尚書右僕射持節行臺都督如故尋遷車騎大將軍儀同三司餘如故值蕭寶夤等大敗於平凉顥亦奔還京師於時葛榮南進稍逼鄴城武泰初以顥為侍中驃騎大}
