  - {type: 'tls:seg', offset: 240, content: '', id: KR2a0020_ZHSJ_021-d21p4s6}
  - {type: variant, offset: 240, length: 0, content: '', WYG: 於時王國舍人應取八族及清修之門禧取任城王隸戸為之深為髙祖所責詔曰夫婚姻之義曩葉攸崇求賢擇偶綿代斯慎故剛柔著於易經鵲巢載于詩典所以重夫婦之道美尸鳩之徳作配君子流芳後昆者也然則婚者合二姓之好結他族之親上以事宗廟下以繼後世必敬慎重正而後親之夫婦既親然後父子君臣禮義忠孝於斯備矣太祖龍飛九五始稽逺則而撥亂創業日昃不暇至於諸王聘合之儀宗室婚姻之戒或得賢淑或乖好逑自兹以後其風漸缺皆人乏窈窕族非百兩擬匹卑濫舅氏輕微違典滯俗深用為歎以皇子茂年宜簡令正前者所納可為妾媵將以此年為六弟聘室長弟咸陽王禧可娉故潁川太守隴西李輔女次弟河南王幹可聘故中散代郡穆明樂女次弟廣陵王羽可聘驃騎諮議叅軍滎陽鄭平城女次弟潁川王雍可聘故中書博士范陽盧神寶女次弟始平王勰可聘廷尉卿隴西李沖女季弟}
