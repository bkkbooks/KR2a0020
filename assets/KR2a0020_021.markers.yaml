  - {type: variant, offset: 2590, length: 0, content: '', krp: 王肅迎接壽春詔曰五教治樞古難其選自非親賢兼切莫應斯舉王以明德懋親任屬保傅出居蕃陜入御衮章内外克諧民神攸屬今董率戎麾威號宜重可復授}
  - {type: variant, offset: 2592, length: 0, content: '', WYG: 以光望實又詔勰以本官領揚州刺史勰簡刑導禮與民休息州境無虞遐邇安靜揚州所統建安戍主胡景畧猶為寳卷拒守不下勰水陸討之景畧面縛出降自勰之至壽春東定城戍至於陽石西降建安山蠻順命斬首獲生以數萬計進位大司馬領司徒餘如故增邑八百戸又寳卷遣將陳伯之屯於肥口胡松又據梁城水軍相繼二百餘里勰部分將士分攻諸營伯之胡松率衆出戰諸將擊之斬首九千俘獲一萬伯之等僅以身免屯於烽火勰又分命諸將頻戰伯之計窮宵遁淮南平詔曰王戚尊上輔德勲莫二孤心昧識訓保攸憑比以壽春初開鎮壓任重故令王親董元戎逺撫淮外冐兹炎蒸衡蓋飄颻經畧踰時必有虧損淹違詣覿夙夜係情兼制勝宣規威効兼著}
  - {type: page-break, offset: 2592, content: '', id: KR2a0020_WYG_021-56b, image: WYG0261/WYG0261-0358d.png}
