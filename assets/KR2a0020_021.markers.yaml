  - {type: variant, offset: 2849, length: 1, content: 衞, krp: 鄭道昭就彼祗勞徴勰還朝勰政崇寛裕絲毫不犯淮南士庶追其餘惠至今思之初勰之定壽春也獲蕭寳卷汝隂太守王果豫州治中庾稷等數人勰傾衿禮之常參坐席果承閒進曰果等契濶生平皓首播越顧瞻西夕餘光幾何今遭聖化正應力兹愚老申展尺寸但在南百口生死分張乞還江外以申德澤勰矜而許之果又謝曰殿下賜處有過國士果等今還仰負慈澤請聽仁駕振旅反跡江外至此乃還其為逺人所懐如此勰至京師世宗臨東堂引見詔勰曰比鳳凰未一疑蒼黎二化故仰屈尊謨綏懐邊附而寇豎昏迷敢鬬淮楚叔父英畧髙明應機殄定凱旋今辰伏慰悲佇勰謝曰臣忝充戎帥撫安新故而不能宣武導恩威懐遐邇致小豎伯之驅率蟻徒侵擾邊堡非唯仰慙天顔實亦俯愧朝列春秋責帥臣實當之賴陛下慈深捨過故使愚臣獲免罪責勰頻表辭大司馬領司徒及所増邑乞還中山有詔不許乃除録尚書侍中司徒如故固辭不免勰雅好恬素不以勢利嬰心髙祖重其事幹縶維不許雖臨崩遺詔復世宗留連每乖情願常悽然歎息以詔㫖殷勤僶俛應命時咸陽王禧漸以憍矜頗有不法北海王詳隂言於世宗世宗深忌之又言勰大得人情不宜久在宰輔勸世宗遵髙祖遺勅禧等又出領軍于烈為恒州非烈情願固彊之烈深以為忿烈子忠嘗在左右密令忠言於世宗云諸王等意不可測宜廢之早自覽政時將礿祭王公並齋於廟東坊世宗遣于烈將宿衛壯士六十餘人召禧勰詳等引入見之於光極殿世宗謂勰曰頃來南北務殷不容仰遂冲操恪是何人而敢久違先勑今遂叔父髙蹈之意勰謝曰先帝不以臣虚薄曲垂罔已之澤出入綢繆公私無捨自陛下龍飛九五屢求解落既為宰輔所抑亦不為陛下所許先歲夏中重塵天聽時蒙優借出為定州往年還洛陽勑總戎淮肥雖無功効幸免罪戾云歸未幾復委臣以非㨿之任臣頻煩干請具簡聖聽陛下孝深無改仰遵先詔上成睿明之美下遂微臣之志感惟今往悲喜交深乃詔曰王宿尚閑静志捐世務先帝愛亮之至弗奪此情遺勑炳然許遂沖退雅操不移朕亦未敢違奪今乃釋位歸第丘園是營髙尚之節確爾貞固賁履之操邈焉難追而王宅初構財力多闕成立之期歲月莫就可量遣工役分給材瓦禀王所好速令制辦務從簡素以稱王心勰因是作蠅賦以諭懐惡讒構也又以勰為太師勰遂固辭詔曰蓋二儀分象君臣之位形焉上下既位唱和之義生焉自古統天位主曷嘗不賴明師仗賢輔而後燮和隂陽彝倫民物者哉往而不返者先民誠有之斯所謂獨善其身而亂大倫山林之士耳賢人君子則不然也屈已以安民艱身以濟物所謂以先知覺後知同塵而與天下俱潔者也朕猥以冲年纂臨寳歴實賴叔父匡濟之功誠宜永兼將相以綱維内外但逼奪先㫖憚違冲挹俛志割心以遂髙素自比水旱乖和隂陽失序是以屈王論道庶燮兹玉燭且師宰從容無廢清尚故周旦復辟而居之尚父期頤以終位王義兼家國理絶獨髙可遣侍中敦諭世宗又修家人書於勰曰恪言奉還告承猶執冲遜恪實闇寡政術多粃匡弼之寄仰屬親尊父德望兼重師訓所歸豈得近遺家國逺崇清尚也便願紆降時副傾注之心勰不得已而應命世宗後頻幸勰第及京兆廣平暴虐不法詔宿衛隊主率羽林虎賁幽守諸王於其第勰上表切諫世宗不納勰既無山水之適又絶知己之遊唯對妻子鬱鬱不樂議定律令勰與髙陽王雍八座朝士有才學者五日一集參論軌制應否之宜而勰夙侍髙祖兼聰達博聞凡所裁決時彦歸仰加以美容貌善風儀端嚴若神折旋合度出入言笑觀者忘疲又加侍中勰敦尚文史物務之暇披覧不輟撰自古帝王賢達至於魏世子孫三十卷名曰要畧小心謹慎初無過失雖閑居宴處亦無慢色惰容愛敬儒彦傾心禮待清正儉素門無私謁性仁孝言於朝廷以其舅潘僧固為冀州樂陵太守京兆王愉構逆僧固見逼從之尚書令髙肇性既兇愎賊害賢俊又肇之兄女入為夫人順皇后崩世宗欲以為后勰固執以為不可肇於是屢譛勰於世宗世宗不納因僧固之同愉逆肇誣勰北與愉通南招蠻賊勰國郎中令魏偃前防閤髙祖珍希肇提攜構成其事肇初令侍中元暉以奏世宗暉不從令左衛元珍言之世宗訪之於暉暉明勰無此世宗更以問肇肇以魏偃祖珍為證世宗乃信之永平元年九月召勰及髙陽王雍廣陽王嘉清河王懌廣平王懐及髙肇等入時勰妃方産勰乃固辭不赴中使相繼不得已乃令命駕意甚憂懼與妃訣而登車入東掖門度一小橋牛不肯進遂擊之良久更有使者責勰來遲乃令去牛人挽而進宴於禁中至夜皆醉各就别所消息俄而元珍將武士齎毒酒而至勰曰吾忠於朝廷何罪見殺一見至尊死無恨也珍曰至尊何可復見王但飲酒勰曰至尊聖明不應無事殺我求與告我罪者一對曲直武士以刀鐶築勰二下勰大言曰皇天忠而見殺武士又以刀鐶築勰勰乃飲毒酒武士就殺之向晨以褥裹屍輿從屏門而出載屍歸第云王因飲而薨勰妃李氏司空沖之女也號哭大言曰髙肇枉理殺人天道有靈汝還當惡死及肇以罪見殺論者知有報應焉世宗為舉哀於東堂給東園第一祕器朝服一襲賻錢八十萬布二千匹蠟五百斤大鴻臚護喪事勰既有大功於國無罪見害百姓寃之行路士女流涕而言曰髙令公枉殺如此賢王在朝貴賤莫不喪氣追崇假黄鉞使持節都督中外諸軍事司徒公侍中太師王如故給鑾輅九旒虎賁班劒百人前後部羽葆鼓吹輼輬車有司奏太常卿劉芳議勰諡曰王挺德弱齡誕資至孝睿性過人學不師授卓爾之操發自天然不羣之美㓜而獨出及入參政務綸綍有光爰登中鉉敷明五教漢北告危皇赫問罪王内親藥膳外總六師及宫車晏駕上下哀慘奮猛銜戚英畧潜通翼衛靈輿整戎振斾歴次宛謝迄于魯陽送往奉居無慙周霍禀遺作輔逺至邇安分陜恒方流詠燕趙廓靖江西威懾南越入釐百揆庶績咸熙履勤不憚在功愈挹温恭愷悌忠雅寛仁興居有度善終篤始髙尚厥心功成身退義亮聖衷美光世典依諡法保大定功曰武善問周達曰宣諡曰武宣王及莊帝即位追號文穆皇帝妃李氏為文穆皇后遷神主於太廟廟稱肅祖語在臨淮王彧傳前廢帝時去其神主嫡子劭字子訥襲封善武藝少有氣節肅宗初蕭衍遣將犯邊劭上表曰偽豎遊魂闚覦邊境勞兵兼時日有千金之費臣仰藉先資紹饗厚秩思以埃塵用禆山海臣國封徐州去軍差近謹奉粟九千斛絹六百匹國吏二百人以充軍用靈太后嘉其至意而不許之起家宗正少卿又除使持節假散騎常侍平東}
