  - {type: variant, offset: 3333, length: 355, content: 左僕射帝問曰聞公在州殺戮無理枉濫非一又大殺道人對曰臣在冀州可殺道人二百許人亦復何多帝曰一物不得其所若納諸隍況殺道人二百而言不多麗脫冠謝賜坐卒諡曰威子顯和少有節操歷司徒記室參軍司徒崔光每見之曰元參軍風流清秀容止閑雅乃宰相之器除徐州安東府長史刺史元法僧叛顯和與戰被擒執手命與連坐顯和曰顯和與阿翁同源別派皆是盤石之宗一朝以地外叛若遇董狐能無慚德遂不肯坐法僧猶欲慰喻顯和曰乃可死作惡鬼不能坐為叛臣及將殺之神色自若建義初贈秦州刺史汝陰王天賜和平三年封拜鎮南大將軍虎牢鎮都大將後為內都大官高祖初殿中尚書胡莫寒簡西部敕勒豪富兼丁者為殿中武士而大納財貨簡選不平衆怒殺莫寒及高平假鎮將奚陵於是諸部敕勒悉叛詔天賜與給事中羅雲督諸軍討之前鋒敕勒詐降雲信之副將元伏曰敕勒色動恐將有變今不設備將為所圖雲不從敕勒輕騎數千襲殺雲天賜僅得自全, WYG: 侍郎}
