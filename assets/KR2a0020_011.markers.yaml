  - {type: variant, offset: 6712, length: 865, content: 酋胕增戍朔垂戎捍所寄實惟斯等先帝以其誠效既亮方加酬錫會宛郢馳烽朐泗告警軍旗頻動兵連積歲茲恩仍寢用迄于今怨叛之興頗由於此朕叨承乾曆撫馭宇宙調風布政思廣惠液宜追述前恩敷茲後施諸州鎮軍貫元非犯配者悉免為民鎮改為州依舊立稱此等世習干戈率多勁勇今既甄拔應思報效可三五簡發討彼沙隴當使人齊其力奮擊先驅妖黨狂醜必可蕩滌衝鋒斬級自依賞丁酉南秀容牧子于乞真反殺太僕卿陸延別將尒朱榮討平之戊戌莫折念生遣都督竇雙攻盤頭郡東益州刺史魏子建遣將竇念祖討之斬雙擒斬千餘人九月壬申詔尚書左僕射齊王蕭寶夤為西道行臺大都督率征西將軍都督崔延伯又詔復撫軍將軍北海王顥官爵為都督並率諸將西討乙亥帝幸明堂餞寶夤等是月蕭衍遣將裴邃虞鴻襲據壽春外城刺史長孫稚擊走之邃退屯黎漿詔河間王琛總衆援之衍又遣將寇淮陽詔祕書監安樂王鑒率衆討之吐谷渾主伏連籌兵討涼州于菩提棄城走追斬之城民趙天安復推宋穎為刺史冬十月營州城人劉安定就德興據城反執刺史李仲遵城人王惡兒斬安定以降德興東走自號燕王胡琛遣其將宿勤明達寇豳夏北華三州壬午詔都督北海王顥率諸將討之十有一月戊申莫折天生攻陷岐州執都督元志及刺史裴芬之高平人攻殺卜朝共迎胡琛十有二月壬辰詔太傅京兆王繼為太師大將軍率諸將討之肽噠契丹地豆于庫莫奚諸國並遣使朝貢汾州正平平陽山胡叛逆詔復征東將軍章武王融封爵為大都督率衆討之山南行臺東益州刺史魏子建招降南秦氐民復六郡十二戍又斬賊王韓祖香南秦賊王張長命畏逼乃告降於蕭寶夤是月莫折念生遣兵攻涼州城人趙天安復執刺史以應之孝昌元年春正月庚申徐州刺史元法僧據城反害行臺高諒自稱宋王號年天啟遣其子景仲歸於蕭衍衍遣其將胡龍牙成景雋元略等率衆赴彭城詔祕書監安樂王鑒回師以討之鑒於彭城南擊元略大破之盡俘其衆既而不備為法僧所敗衍遣其豫章王綜入守彭城法僧擁其僚屬守令兵戍及郭邑士女萬餘口南入詔鎮軍將軍臨淮王彧尚書李憲為都督衞將軍國子祭酒安豐王延明為東道行臺復儀同三司李崇官爵為東道大都督俱討徐州崇以疾不行癸亥蕭寶夤崔延伯大破秦賊於黑水斬獲數萬天生退走入隴西涇岐及隴東悉平以太師大將軍京兆王繼為太尉餘官如故二月以領軍將軍元叉, WYG: ''}
