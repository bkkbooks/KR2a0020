  - {type: variant, offset: 10747, length: 359, content: 濟南王庚申東郡民趙顯德反殺太守裴烟自號都督立其兄子為太守詔都督李叔仁討之是月蕭衍將成景雋寇彭城詔員外常侍崔孝芬為行臺率將擊走之三月甲子詔將西討中外戒嚴虜賊走復潼關戊辰詔將回駕北討詔金紫光祿大夫源子邕為大都督討葛榮辛未齊州廣川民劉鈞執清河太守邵懷聚衆反自署大行臺清河民房須自署大都督屯據昌國城夏四月別將元斌之討東郡斬顯德己酉蠕蠕國遣使朝貢六月蠕蠕國遣使朝貢是月詔都督李叔仁討劉鈞平之秋七月陳郡民劉獲鄭辯反於西華號年天授州軍討平之相州刺史安樂王鑒據州反己丑大赦天下是月青州刺史彭城王劭南青州刺史胡平遣將斬蕭衍將彭羣首俘獲二千餘人八月都督源子邕李軌裴衍攻鄴丁未斬鑒相州平仍令子邕等討葛榮九月辛卯東豫州刺史元慶和以城南叛戊子蠕蠕國遣使朝貢秦州城民杜粲殺莫折念生自行州事南秦州城民辛琛自行州事遣使歸罪冬十月戊申曲赦農已西河北正平, WYG: ''}
