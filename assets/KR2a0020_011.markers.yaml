  - {type: variant, offset: 11882, length: 1, content: 皇, WYG: 又幸華林都亭納訟壬寅又以長孫稚為後軍大都督六月丁夘大都督源子恭鎮胡陽汝陽王暹守石濟儀同三司賈顯智率豫州刺史斛斯夀東趨濟州庚午吐谷渾國遣使朝貢丙子詔曰頃年以來天歩時阻干戈不戢荆棘斯生或徇節感恩奮不顧命或臨戎對敵赴難如歸身首横分骸骨不斂勲誠靡録榮贈莫加寤寐矜之良有嗟悼可普告内外所在言列若無親近聼故友陳之尚書檢實随状科贈庶粗慰寃魂少申惻隠庚辰以使持節車騎大将軍中軍大都督斛律沙門為開府儀同三司秋七月辛巳朔以鎮東将軍前大鴻臚卿}
  - {type: page-break, offset: 11882, content: '', id: KR2a0020_WYG_011-24a, image: WYG0261/WYG0261-0194a.png}
