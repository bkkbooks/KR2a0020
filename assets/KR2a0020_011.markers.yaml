  - {type: variant, offset: 11884, length: 2, content: 后幼, WYG: 原王昶特為車騎大将軍儀同三司己丑帝親總六軍十餘萬衆次於河橋以斛斯椿為前軍大都督㝷詔椿鎮虎牢又詔荆州刺史賀㧞勝赴於行所勝率所部次於汝水庚子以使持節征西将軍岐州刺史越肱特為儀同三司丁未帝為椿等廹脅遂出於長安己酉齊獻武王入洛賀拔勝走還荆州八月甲寅推司徒公清河王亶為大司馬承制總萬㡬居尚書省辛酉齊獻武王西迎車駕戊辰制曰晦為明始亂實治基爰著天道又符人事故姬祚中㣲踐土有勤王之役劉氏将傾北軍致左祖之舉用能隆此逺年克兹卜世永熙之季權佞擅朝羣小是崇勲賢見害官縁價以貴賤獄因貨而死生宗祏飄若綴旒民命棄如草莽大丞相位居晉鄭任屬桓文興甲汾川問罪伊洛羣姦畏威擁廹人}
