  - {type: variant, offset: 11887, length: 1, content: 崩, WYG: 以自蔽衛逺出秦方雖車駕流移未即返御然權佞将除天下延頸魏邦雖舊其化惟新思與兆民同兹更始可大赦天下行臺侯景討荆州賀㧞勝戰敗走奔蕭衍九月癸巳以衛大将軍河南尹元子思為使持節行臺僕射使持節驃騎大将軍開府儀同三司領軍将軍婁昭為西道大都督幷率左右侍官西迎車駕己酉椿黨毛鴻賔守潼闗齊獻武王破擒之是日齊獻武王東遷於洛是月東清河人傅皛殺太守韓子捷據郡反㑹赦乃降冬十月戊辰使持節驃騎大将軍開府儀同三司行青州事侯淵克東揚州斬刺史東萊王貴平𫝊首京師閏十二月癸巳帝為宇文黒獺所害時年二十五}
