  - {type: variant, offset: 11875, length: 3, content: 尒朱榮, WYG: 以前司徒公燕郡王賀拔允為太尉公八月乙丑齊文襄王來朝帝燕於華林都亭班賚部下各有差以驃騎大将軍前南岐州刺史司馬子如為儀同三司戊辰軍駕餞文襄王於河梁仍}
  - {type: variant, offset: 11875, length: 3, content: 尒朱榮, krp: 以前司徒公燕郡王賀拔允為太尉公八月乙丑齊文襄王來朝帝燕於華林都亭班賚部下各有差以驃騎大将軍前南岐州刺史司馬子如為儀同三司戊辰軍駕餞文襄王於河梁仍}
  - {type: punctuation, offset: 11880, content: ．, id: KR2a0020_ZHSJ_011-bkkpn2411}
  - {type: 'tls:seg', offset: 11880, content: '', id: KR2a0020_ZHSJ_011-d11p113s3}
  - {type: variant, offset: 11880, length: 0, content: '', WYG: 而返癸酉齊獻武王上表固讓王爵不許請分邑十萬戸節降為品回授勲義從之九月壬子以散騎常侍車騎大将軍左光禄大夫崔孝芬為儀同三司冬十月癸未以衛将軍𤓰州刺史泰臨縣開國伯髙昌王麴子堅為儀同三司進爵郡王十有一月癸巳持節征北将軍殷州刺史邸珍為徐州大都督東道行臺僕射率将討東徐州十有二月丁巳車駕狩於嵩陽己巳遂幸温湯丁丑車駕還宫三年春正月壬辰齊獻武王討費也頭於河西苦洩河大破之獲其帥紇豆陵伊利遷其部落於内地二月東梁州為夷民侵逼詔使持節車騎大将軍行東雍州事泉企為東梁州行臺都督以討之己未蕭衍假節豫州刺史南昌王毛香舉城内附授以持節安南将軍信州刺史義昌王壬戌大赦天下丙子帝親釋奠禮先師辛巳幸洪池陂遂遊田壬午以衛将軍前徐州刺史元祐為衛大将軍儀同三司以驃騎将軍左衛将軍元斌之為頴昌王三月壬寅以前侍中車騎大将軍李彧為驃騎大将軍儀同三司夏四月戊午契丹國遣使朝貢辛未髙平王寜坐事降爵為公丙子髙麗國遣使朝貢五月丙戌増置勲府庶子廂别六百人又増騎官廂别二百人依第出身騎官秩比直齋辛夘詔曰大魏得一居宸乗六馭㝢考風雲之所㑹宅日月之所中自北而南東征西怨后來其蘇無思不偃而勾吳負險久遺度外世祖太武皇帝握金鏡以照耀撃玉鼓以鏗鏘神武之所牢籠威風之所轥轢莫不雲徹霧卷瓦觧氷消長江已北盡為魏土頃天歩中圯國綱時屯凶豎因機牙窺上國疆場侵噬州郡淪胥乃眷東顧無忘寝食自非五牛警斾七萃按部何以復文武之舊業拯塗炭於遺黎朕将親總六軍經臨彭汴一勞永逸庶保無疆内外百竂便可嚴備出頓之期更聼後勑時帝為斛斯椿元毗王思政魏光等謟佞間阻貳於齊獻武王託討蕭衍盛暑徴發河南諸州之兵天下怪惡之語在斛斯椿傳丙申以使持節侍中大司馬開府司州牧廣陵王欣為左軍大都督太傅録尚書事長孫稚為中軍四面大都督丁酉帝幸華林都亭集京畿都督及軍士三千餘人慰勉之}
