  - {type: variant, offset: 11874, length: 0, content: '', WYG: 辰詔諸參佐自三府以下爰及外州皆不得復加常侍及兼兩員雖已搜者亦悉追之是月青州人耿翔襲據膠州殺刺史裴粲通於蕭衍五月庚寅詔諸幽枉未申事經一周已上悉集華林将親覽察脱事已經年有司不列者聼其人各自陳訴若事連州郡由縁淹嵗者亦仰尚書總集以聞壬寅以使持節驃騎大将軍儀同三司齊州刺史侯淵復為開府儀同三司乙巳詔曰大夫之職位秩貴顯員外之官亦為匪賤而下及胥吏帶領非一髙卑渾雜有損彛章自今已後京官樂為稱事小職者直加散號将軍願罷卑官者聼為大夫及員外之職不宜仍前散實叅領其中㫖特加者不在此例東徐州城民王早簡實等殺刺史崔庠據州入蕭衍六月壬申以驃騎大将軍開府儀同三司尚書右僕射樊子鵠為青膠刺使督濟州刺史大都督蔡儁討耿翔丁丑以驃騎大将軍前行南兖州事念賢為儀同三司秋七月辛夘以使持節鎮北将軍大都督泰州刺史万俟普撥為驃騎大将軍儀同三司壬辰以太師司州牧廣陵王欣為大司馬侍中以太尉公趙郡王諶為太師並開府庚}
  - {type: page-break, offset: 11874, content: '', id: KR2a0020_WYG_011-20b, image: WYG0261/WYG0261-0192b.png}
  - {type: page-break, offset: 11874, content: '', id: KR2a0020_WYG_011-21a, image: WYG0261/WYG0261-0192c.png}
