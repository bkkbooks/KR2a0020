  - {type: variant, offset: 3419, length: 424, content: 上書者聽密封通奏壬寅詔曰農要之月時澤弗應嘉穀未納三麥枯悴德之無感歎懼兼懷可敕內外依舊雩祈率從祀典察獄理寃掩胔埋骼冀瀛之境往經寇暴死者既多白骨橫道可遣專令收葬賑窮恤寡救疾存老準訪前式務令周備三月甲辰澍雨大洽夏四月乙丑肽噠國遣使朝貢五月戊戌以司空任城王澄為司徒驃騎大將軍儀同三司京兆王繼為司空秋八月己未御史中尉東平王匡坐事削除官爵辛未以左光祿大夫皇甫集為征西將軍儀同三司九月庚寅皇太后幸崧高山癸巳還宮瀛州民劉宣明謀反事覺伏誅冬十有一月乙酉蠕蠕莫緣梁賀侯豆率男女七百人來降十有二月癸丑司徒任城王澄薨庚申大赦天下詔除淫祀焚諸雜神是歲高麗王雲死以世子安為其國王正光元年春正月乙酉詔曰建國緯民立教為本尊師崇道茲典自昔來歲仲陽節和氣潤釋奠孔顏乃其時也有司可豫繕國學圖飾聖賢置官簡牲擇吉備禮夏四月丙辰詔尚書長孫稚巡撫北藩觀察風俗五月辛巳詔曰朕以寡薄運膺寶圖雖未明求衣惕懼終日而闇昧多闕炎旱為災在予之愧無忘寢食今刑獄繁多囹圄尚積宜敷仁惠以濟斯民八座可推鞠見囚務申枉濫, WYG: 差等}
