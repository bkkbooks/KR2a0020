  - {type: variant, offset: 1481, length: 1, content: 胡, WYG: 齊獻武王封渤海王増邑五百戸特進車騎大將軍清河王亶為儀同三司侍中太傅驃騎大將軍開府儀同三司尚書令樂平王尒朱世隆為太保開府前司徒公長孫稚為太尉公録尚書事侍中驃騎大將軍開府儀同三司趙郡王諶為司空公稚固辭㝷除驃騎大將軍開府儀同三司丙子帝引見尚書右僕射元羅及皇宗於顯陽殿勞勉之丁丑加驃騎大將軍北華州刺史公孫畧儀同三司己卯詔右衛將軍賀拔勝并尚書一人募伎作及雜戸從征者正入出身皆授實官私馬者優一大階庚辰以侍中衛將軍咸陽王坦衛將軍尚書左僕射南陽王寳炬侍中征東將軍平陽王修並儀同三司乙酉詔簡北來及在京二官員外剩置者己丑以持節驃騎將軍涇州刺史賀拔岳為儀同三司岐州刺史使持節車騎大將軍渭州刺史侯莫陳悅為儀同三司秦州刺史庚寅詔天下有徳孝仁賢忠義志信者可以禮召赴闕不應召者以不敬論丙申劉靈助率衆次於安}
