  - {type: variant, offset: 1549, length: 382, content: 茂草古帝諸陵多見踐藉可明敕所在諸有帝王墳陵四面各五十步勿聽耕稼宕昌國遣使朝貢九月丁丑淮堰破蕭衍緣淮城戍村落十餘萬口皆漂入于海十有二月癸巳詔洛陽河陰及諸曹雜人年七十已上魚眾寡貧困不能自存及年雖少而痼疾長廢窮苦不濟者研實具列以聞二年春正月大乘餘賊復相聚結攻瀛州刺史宇文福討平之甲戌大赦天下戊子勿吉國遣使朝貢庚寅詔遣大使巡行四方問疾苦恤孤寡黜陟幽明又詔選曹用人務在得才廣求栖遁共康治道州鎮城隍各令嚴固齋會聚集糾執妖諠囹圄皆令造屋桎梏務存輕小工巧浮迸不得隱藏絹布繒綵長短合式偷竊軍階亦悉沙汰籍貫不實普使糾案聽自歸首逋違加罪詔中尉元匡考定權衡癸丑地伏羅罽賓國並遣使朝獻二月庚子契丹鄧至宕昌諸國並遣使朝獻丁未封御史中尉元匡為東平王三月甲戌吐谷渾國遣使朝獻丁亥太保領司徒廣平王懷薨夏四月甲午高麗波斯疏勒肽噠諸國並遣使朝獻丁酉詔京尹所統百年以上賜大郡板九十以上賜小郡板戊申以中書監, WYG: ''}
