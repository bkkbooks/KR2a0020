  - {type: variant, offset: 11369, length: 1, content: 雍, WYG: 司州牧南陽王寳炬為太尉公侍中太保錄尚書事長孫稚為太傅侍中驃騎大将軍尚書左僕射元羅儀同三司尚書令驃騎大将軍吏部尚書元世儁儀同三司戊戌以齊獻武王固讓聼觧天柱大将軍减封五萬戸餘悉如故辛丑以前司空髙乾邕復為司空公乙巳帝幸華林都亭宴羣臣班賚有差羽林隊主唐猛突入稱慶帝以猛犯禁衛杖之猛辭色有忤斬之階下丁未詔曰無侮惸獨事炳前經恵此鰥寡聲留往册朕以薄徳作民父母乃眷元元寤言増歎今理運惟新哀矜伊始如有孤老疾病無所依歸者有司明加隠括依格賑贍又詔曰理有一凖則民無覬覦法啓二門則吏多威福前主為律後主為令歴世永乆實用滋章非所以凖的庶品隄防萬物可令執事之官四品以上集於都省取諸條格議定一途其不可施用者當局停記新定之格勿與舊制相連務在約通無致冗滯己酉以侍中驃騎大将軍儀同三司清河王亶為司徒公庚戌詔曰頃西土年饑百姓流徙或身倚溝渠或命懸道路皆見棄草土取厭烏鳶言念於此有警夜寐掩骼之禮誠所庶㡬行墐之義冀亦可勉其諸有露屍令所在埋覆可宣告天下乙夘詔外内觧嚴六月癸亥朔帝於華林園納訟丙寅蠕蠕嚈噠髙麗契丹厙莫奚國並遣使朝貢丁夘太尉公司州牧南陽王寳炬坐事降為驃騎大将軍開府王如故歸第令羽林衛守改謚武懐皇帝曰孝荘癸百蠕蠕嚈噠國遣使朝貢戊寅詔内外百司普汎六級在京百竂加中興四級義師将士並加軍汎六級在鄴百官三級河北同義之州兩級河橋建義者加五級闗西二級諸受建明普泰封爵汎級優特之階悉追己夘帝臨顯陽殿納訟乙酉髙麗契丹厙莫奚國遣使朝貢丙戌以前驃騎大将軍開府儀同三司斛斯椿還為前官詔曰間者凶權誕恣法令變常遂立夷貊輕賦冀收天下之意随以箕斂之重終納十倍之征掩目捕雀何能過此朕屬念蒸黎無忘寝食加田桑始事生業未滋若頓依常格或不周展今嵗租調且兩收一丐來年復舊辛夘以使持節衛大将軍儀同三司尚書左僕射賈顯度為驃騎大将軍開府儀同三司秋七月乙未詔曰頃永安馭運載育皇儲遂錫汎階以申國慶近經普泰便爾中追今罪人既殄舊章斯復宜述往㫖用卒前恩皇子汎二級悉可還授文穆廟汎故宜停寝若已受者依例追之庚子以驃騎大将軍開府南陽玊寳炬為太尉公壬寅齊獻武王率衆入自滏口大都督厙狄干入自井陘討尒朱兆乙巳齊獻武王以尒朱天光尒朱度律送之京師斬於都市己酉以兼尚書左僕射東南道大行臺樊子鵠為儀同三司庚戌詔侍中驃騎将軍左光禄大夫髙隆之為使持節驃騎大将軍儀同三司兼尚書左僕射北道行臺率歩騎十萬趨大行㑹齊獻武王隆之觧行臺仍為大丞相軍司齊獻武王次於武鄉尒朱兆大掠晉陽北走秀容并州平乙夘帝臨顯陽殿親理寃獄丙辰以宗師東萊王貴平為車騎大将軍儀同三司是月夏州徙民郭遷據宥州反刺史元嶷棄城走詔行臺侯景率齊}
