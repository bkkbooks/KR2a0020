  - {type: variant, offset: 11373, length: 1, content: 兼, WYG: 尉景濟州刺史蔡儁等攻討之城䧟遷奔蕭衍東南道大行臺樊子鵠大破蕭衍軍於譙城擒其鄴王元樹及譙州刺史朱文開八月壬戌朔齊文襄王來朝燕射班賚部下各有差丁夘以西中郎将元寜為髙平王甲戌以車騎大将軍左光禄大夫李琰之為儀同三司庚寅以車騎将軍左光禄大夫崔秉為驃騎大将軍儀同三司辛夘以車騎将軍右光禄大夫髙岳為驃騎大将軍儀同三司九月癸未以侍中驃騎大将軍左光禄大夫封津為儀同三司庚子帝幸華林都亭引見元樹及公卿百寮蕃使督将等宴射班賚各有差癸夘燕郡開國公賀拔允進爵為王乙巳帝幸都水南過洛汭遂至瀍澗己酉復田於北原癸丑以太師沛王欣為廣陵王前廢帝子渤海王子恕改封沛郡王甲寅以侍中驃騎大将軍封隂之任祥並為儀同三司以車騎大将軍河南尹元仲景為驃騎大将軍儀同三司乙夘車駕謁山陵丙辰蠕蠕髙昌國遣使朝貢庚申以衛将軍前吏部}
