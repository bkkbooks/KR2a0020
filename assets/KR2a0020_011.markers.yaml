  - {type: variant, offset: 4406, length: 263, content: 里遠馳庇命有道悲同申伍忠孝足矜方存興滅之師以隆繼絕之舉宜且優以賓禮期之立功疏爵胙土大啟河岳可封朔方郡開國公蠕蠕王食邑一千戶錫以衣冕加以軺車祿恤儀衞同乎戚蕃十有二月壬子詔曰蠕蠕王阿那瓌遭離寇禍遠來投庇邦分衆析猶無定主而永懷北風思還綏集啟訴情切良用愍然夫存亡恤敗自古通典可差國使及彼前後三介與阿那瓌相隨并敕懷朔都督簡銳騎二千躬自率護送達境首令觀機招納若彼候迎宜錫筐篚車馬之屬務使優隆禮餞而返如不容受任聽還闕其行裝資遣付尚書量給辛酉以司空京兆王繼為司徒公二年春正月南秦州氐反二月庚戌假光祿大夫邴虬撫軍將軍以討之癸亥車駕幸國子學講孝經, WYG: 戸}
