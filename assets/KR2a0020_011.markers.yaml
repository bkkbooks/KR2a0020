  - {type: variant, offset: 545, length: 685, content: 將軍于忠為尚書令特進崔光為車騎大將軍並儀同三司壬辰復前江陽王繼本國以濟南王彧復先封為臨淮王羣臣奏請皇太后臨朝稱制九月乙巳皇太后親覽萬機詔曰高祖革禮成治遺澤在民世宗纂承丕業聖德昭達朕以沖孺屬當寶圖洪基至重若履冰薄王公百辟羣牧庶官皆受遇先朝寵榮自昔宜各勉崇共康世道勠力竭誠以匡輔不逮其有懷道丘園昧跡板築山栖谷飲舒卷從時者宜廣戔帛緝和鼎有能讜言直諫濟世益時者在所以聞當待以不次之位孝子順孫義夫節婦表其門閭以彰厥美高年孤獨不能自存者贍以粟帛若因饑失業天屬流離或賣鬻男女以為僕隸者各聽歸還比冀方未肅徐城寇擾將統久勞士卒疲弊並遣撫慰賜以衣馬緣邊州鎮固捍之勞朔方酋庶北面所委亦令勞賚以副其心其有先朝舊事寢而不舉頃來便習不依軌式者並可疏聞當加覽裁若益時利治不拘常制者自依別例其明相申約稱朕意焉甲寅征北元遙破斬法慶及渠帥百餘人傳首京師安定王爕薨庚申高昌庫莫奚契丹諸國並遣使朝獻蕭衍將趙祖悅襲據硤石癸亥詔定州刺史崔亮假鎮南將軍率諸將討之冀州刺史蕭寶夤為鎮東將軍次淮堰戊辰鄧至國遣使朝貢冬十月庚午朔勿吉國貢楛矢壬午高麗吐谷渾國並遣使朝獻乙酉以安定公胡國珍為中書監儀同三司甲午蕭衍弘化太守杜桂舉郡內屬十有二月辛丑以高陽王雍為太師己酉鎮南崔亮破祖悅遂圍硤石丁卯帝皇太后謁景陵高車國遣使朝獻熙平元年春正月戊辰朔大赦改年荊沔都督元志大破蕭衍軍斬其農太守王世定等以吏部尚書李平為鎮軍大將軍兼尚書右僕射為行臺節度討硤石諸軍二月乙巳鎮東蕭寶夤大破衍將於淮北癸亥初聽秀才對策第居中上已上之乙丑鎮南崔亮鎮軍李平等克硤石斬衍豫州刺史趙祖悅傳首京師盡俘其衆是月吐谷渾宕昌鄧至諸國並遣朝貢三月辛未以揚州刺史李崇為驃騎, WYG: ''}
