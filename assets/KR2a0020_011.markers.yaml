  - {type: variant, offset: 33, length: 3, content: 平三年, WYG: 安末有白莊帝者言王不語將有異圖民間遊聲又云有天子之氣王懼禍逃匿上洛㝷見追躡執送京師拘禁多日以無狀獲免及莊帝崩尒朱世隆等以元曄疎逺又非人望所推以王潜嘿晦身有過人之量將謀廢立恐實不語乃令王所親申其意且兼廹脅王遂答曰天何言哉世隆等大悅春}
