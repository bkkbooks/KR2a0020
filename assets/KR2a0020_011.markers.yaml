  - {type: variant, offset: 11164, length: 3, content: 長孫稚, krp: 又加侍中尚書左僕射中興二年夏四月安定王自以疎逺未允四海之心請遜大位齊獻武王與百寮㑹議僉謂髙祖不可無後乃共奉王戊子即帝位於東郭之外入自東陽雲龍門御太極前殿羣臣朝賀禮畢昇閶闔門詔曰否泰相沿廢興互有𤣥天無所隠精靈弗能諭大魏統乾徳漸區㝢牢籠九服旁礴三光而上天降禍運踵多難禮樂崩淪憲章漂没赫赫宗周翦為戎宼肅肅清廟將成茂草胡羯乗機肆其昬虐殺君害王刳剔海内競其吞噬之意不識醉飽之心自書契以來未有若斯者已大丞相渤海王忠存本朝精貫白日爰舉義旗志雪國恥故廣阿之軍貔虎奪氣鄴下之師金湯失險近者四胡相率實繁有徒驅天下之兵盡華戎之銳桴鼔暫交一朝盪滅元兇授首大憝斯擒揚斾濟河掃清伊洛士民安堵不失舊章社稷危而復安洪基毁而還構朕以託體宸極猥當樂推祗握寳圖承兹大業得以眇身託於王公之上若渉淵水罔識攸津思與兆民同兹嘉慶可大赦天下改中興二年為太昌元年詔前御史中尉樊子鵠起復本官兼尚書左僕射東南道大行臺都督儀同三司徐州史史杜徳}
