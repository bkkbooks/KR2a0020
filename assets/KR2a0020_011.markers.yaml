  - {type: variant, offset: 11537, length: 260, content: 孕椒宮冀誕儲兩而熊羆無兆維虺遂彰于時直以國步未康假稱統胤欲以底定物情係仰宸極何圖一旦弓劍莫追國道中微大行絕祀皇曾孫故臨洮王寶暉世子釗體自高祖天表卓異大行平日養愛特深義齊若子事符當璧及翊日弗愈大漸彌留乃延入青蒲受命玉几暨陳衣在庭登策靡及允膺大寶即日踐阼朕是用惶懼忸怩心焉靡洎今喪君有君宗祏惟固宜崇賞卿士爰及百辟凡厥在位並加陟叙內外百官文武督將征人遭艱解府普加軍功二階其禁衞武官直閤以下直從以上及主帥可軍功三階其亡官失爵聽復封位謀反大逆削除者不在斯限清議禁錮亦悉蠲除若二品以上不能自受者任授兒弟可班宣遠邇咸使知之乙卯幼主即位, WYG: 差庚戌}
