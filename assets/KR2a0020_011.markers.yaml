  - {type: variant, offset: 11802, length: 0, content: '', WYG: 将軍儀同三司蕭衍勞州刺史曹鳯東荆州刺史雷能勝等舉城内屬二月庚申以使持節鎮東将軍行汾州事張瓊為驃騎大将軍儀同三司辛酉以司空公髙乾邕為使持節驃騎大将軍開府儀同三司咸陽王坦為司空公三月己丑朔加驃騎大将軍滄州刺史賈顯智開府儀同三司辛夘詔以前普觧諸行臺今阿至羅相率降欵復以齊獻武王為大行臺随機裁處甲午以車騎将軍蔚州刺史竇泰為使持節車騎大将軍開府儀同三司相州刺史使持節驃騎大将軍開府儀同三司徐州刺史髙乾邕坐事賜死太師魯郡王肅薨戊申以使持節}
