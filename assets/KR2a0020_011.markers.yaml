  - {type: variant, offset: 11408, length: 3, content: 都督討, WYG: 車騎大将軍儀同三司丁夘以車騎大将軍左光禄大夫潘蠻為儀同三司己夘以車騎大将軍左光禄大夫髙琛為特進驃騎開府儀同三司庚寅以使持節驃騎将軍肆州刺史劉貴為驃騎大将軍儀同三司十有一月甲午以車騎将軍揚州刺史斛斯敦為驃騎大将軍儀同三司丁酉日南至車駕有事於圜丘戊戌朝㑹百官於太極前殿甲辰安定王朗及東海王曄坐事死乙巳蠕蠕國遣使朝貢己酉以前太尉公汝南王悦為侍中大司馬開府葬靈太后胡氏十有二月丙寅以驃騎大将軍領御史中尉綦雋為儀同三司乙亥以侍中廣}
