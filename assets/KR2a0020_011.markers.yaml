  - {type: variant, offset: 4728, length: 1983, content: 繼進位太保壬寅車騎大將軍儀同三司崔光為司徒公蕭衍義州刺史文僧明率衆內屬五月辛巳南荊州刺史桓叔興自安昌南叛乙酉烏萇國遣使朝貢閏月丁巳居密波斯國並遣使朝貢六月己巳高昌國遣使朝貢癸巳勿吉國遣使朝貢秋七月癸丑詔曰時澤弗降禾稼形損在予之責夙宵震懼雖克躬撤降仍無招感有司可修案舊典祗行六事圄犴淹枉隨速鞫決庶尹廢職量加修厲魚眾獨困窮在所存恤役賦煩民咸加蠲省賢良讜直以時升進貪殘邪佞即就屏黜男女怨曠務令會偶庶革止懲違有弭災沴八月己巳伏羅國遣使朝貢蠕蠕後主郁久閭侯匿伐來奔懷朔鎮十有一月乙未朔高昌國遣使朝貢戊申衞大將軍儀同三司皇甫集薨癸丑侍中車騎大將軍侯剛加儀同三司十有二月甲戌詔司徒崔光安豐王延明等議定服章庚辰以東益南秦氐反詔中軍將軍河間王琛討之失利三年春正月辛亥帝耕籍田夏四月庚辰以高車國主覆羅伊匐為鎮西將軍西海郡開國公高車王六月己巳詔曰朕以沖昧夙纂寶歷不能祗奉上靈感延和氣致令炎旱頻歲嘉雨弗洽百稼燋萎晚種未下將成災年秋稔莫覬在予之責憂懼震懷今可依舊分遣有司馳祈嶽瀆及諸山川百神能興雲雨者盡其虔肅必令感降玉帛牲牢隨應薦享上下群官側躬自厲理寃獄止土功減膳撤懸禁止屠殺秋七月壬子波斯不漢龜茲諸國遣使朝貢冬十月己巳吐谷渾國遣使朝貢十有一月乙巳車駕有事於圓丘丙午詔曰治歷明時前王茂軌考辰正律弈代通規是以北平革定於漢年楊偉草算於魏世自皇運肇基典章猶缺推步晷曜未盡厥理先朝仍世每所慨然至神龜中始命儒官改創疏踳回度易憲始會琁衡今天正斯始陽煦將開品物初萌宜變耳目所謂魏雖舊邦其曆維新者也便可班宣內外號曰正光曆又首節嘉辰獲展丘禘神人交和理契幽顯思與億兆共此維新可大赦天下十有二月癸酉以左光祿大夫皇甫度為儀同三司乙酉以車騎大將軍尚書右僕射元欽為儀同三司太保京兆王繼為太傅司徒崔光為太保丁亥以牧守妄立碑頌輒興寺塔第宅豐侈店肆商販詔中尉端衡肅厲威風以見事糾劾七品六品祿足代耕亦不聽錮貼店肆爭利城市四年春二月壬辰追封故咸陽王禧為敷城王京兆王愉為臨洮王清河王懌為范陽王以禮加葬丁丑河間王琛章武王融並以貪汙削爵除名己卯以蠕蠕主阿那瓌率衆犯塞遣尚書左丞元孚兼尚書為北道行臺持節喻之蠕蠕後主侯匿伐來朝京師宕昌國遣使朝貢司空劉騰薨夏四月阿那瓌執元孚驅掠畜牧北遁甲申詔驃騎大將軍尚書令李崇中軍將軍兼尚書右僕射元纂率騎十萬討蠕蠕出塞三千餘里不及而還秋七月辛亥詔曰達尊斯在齒預一焉崇敬黃耇先代通訓故方叔以元老處位充國緣自強見留雖七十致仕明乎典故然以德尚壯許其縶維今庶僚之中或年迫懸車循禮宜退但少收其力老棄其身言念勤舊眷然未忍或戴白在朝未當外任或停私歷紀甫受考級如此之徒雖滿七十聽其莅民以終常限或新解郡縣或外佐始停已滿七十方求更者吏部可依令不奏其有高名俊德老成髦士灼然顯達為時所知者不拘斯例若才非秀異見在朝官依令合解者可給本官半祿以終其身使辭朝之叟不恨歸於閭巷矣八月己巳詔曰狂蠢肆暴陵竊北垂雖軍威時接賊徒懾遁然獯虐所過多離其禍言念斯弊有軫深懷可敕北道行臺遣使巡檢遭寇之處饑餒不粒者厚加賑恤務令存濟戊寅詔曰朕以眇闇忝承鴻緒因祖宗之基託王公之上每鑒寐屬慮思康億兆比雨旱愆時星運舛錯政理闕和靈祇表異永尋夕惕載恧于懷宜詔百司各勤厥職諸有魚眾寡窮疾寃滯不申者並加釐恤若孝子順孫廉貞義節才學超異獨行高時者具以言上朕將親覽加以旌命癸未追復故范陽王懌為清河王九月丁酉庫莫奚國遣使朝獻詔侍中太尉汝南王悅入居門下與丞相高陽王雍參決尚書奏事冬十有一月丙申趙郡王謐薨丁酉太保崔光薨十有二月蕭衍遣將寇邊詔假征南將軍崔延伯討之以太尉汝南王悅為太保徐州刺史北海王顥坐貪污削除官爵五年春正月辛丑車駕有事於南郊閏二月癸巳肽噠國遣使朝貢三月沃野鎮人破落汗拔陵聚衆反殺鎮將號真王元年詔臨淮王彧為鎮軍將軍假征北將軍都督北征諸軍事以討之夏四月高平酋長胡琛反自稱高平王攻鎮以應拔陵別將盧祖遷擊破之琛北遁五月臨淮王彧敗於五原削除官爵壬申詔尚書令李崇為大都督率廣陽王淵等北討六月秦州城人莫折太提據城反自稱秦王殺刺史李彥詔雍州刺史元志討之南秦州城人孫掩張長命韓祖香據城反殺刺史崔遊以應太提太提遣城人卜朝襲克高平殺鎮將赫連略行臺高元榮太提尋死子念生代立僭稱天子號年天建置立百官丁酉大赦秋七月甲寅詔吏部尚書元脩義兼尚書僕射為西道行臺率諸將西討戊午復河間王琛臨淮王彧本封都督崔暹失利于白道大都督李崇率衆還平城坐長史祖瑩截沒軍資免除官爵丁丑念生遣其都督楊伯年樊元張朗等攻仇鳩河池二戍東益州刺史魏子建遣將尹祥黎叔和擊破之斬樊元首殺賊千餘人是月涼州幢帥于菩提呼延雄執刺史宋穎據州反念生遣其兄高陽王天生下隴東寇八月甲午元志大敗於隴東退守岐州丙申詔曰賞貴宿勞明主德恩沾舊績哲后常範太祖道武皇帝應期撥亂大造區夏世祖太武皇帝纂戎丕緒光闡王業躬率六師掃清逋穢諸州鎮城人本充牙爪服勤征旅契闊行間備嘗勞劇逮顯祖獻文皇帝自北被南淮海思乂便差割強族分衞方鎮高祖孝文皇帝遠遵盤庚將遷嵩洛規遏北疆蕩闢南境選良, WYG: 起}
