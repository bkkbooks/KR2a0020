  - {type: variant, offset: 7600, length: 1791, content: 忠紹之侍中特進衞大將軍穆紹為儀同三司戊戌大赦壬辰莫折念生遣都督楊鮓梁下辯姜齊等攻仇池郡城行臺東益州刺史魏子建遣將盛遷擊破之斬下辯齊等首壬寅詔曰勸善黜惡經國茂典其令每歲一終郡守列令長刺史列守相以定考課辯其能否若有濫謬以考功失衷論是月齊州魏郡民房伯和聚衆反會赦乃散三月己巳詔太尉西道都督京兆王繼班師壬申詔曰丞相高陽王道德淵廣明允篤誠儀形太階垂風下國實所以予違汝弼致治責成宜班新制宣之遐邇其州郡先上司徒公文悉可改上相府施行符告皆亦如之甲戌詔曰選衆而舉其來自昔朕纘承大業綜理萬幾求賢致治心焉若渴知人則哲振古所難宜博訪公卿採茲聲實可令第一品以下五品以上人各薦其所知不限素身居職必使精辯器藝具注所能然後依牒簡擢隨才收庶濟濟之美無替往時謇謇之直有申茲歲蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入寇直城梁州刺史傅竪眼遣息敬紹率衆拒擊大破之擒斬三千餘人休儒等走還魏興是月齊州清河民崔畜殺太守董遵廣川民傅堆執太守劉莽反青州刺史安樂王鑒討平之是月破落汗拔陵別帥王也不盧等攻陷懷朔鎮夏四月蕭衍益州刺史蕭淵猷遣將樊文熾蕭世澄等率衆圍小劍戍益州刺史邴虬遣子子達行臺魏子建遣別將淳于誕拒擊之辛卯皇太后復臨朝攝政引羣臣面陳得失詔曰朕以寡昧夙承天歷茫若涉海罔知所濟實憑宗社降祐之靈庶勉幼志以康世道而神龜之末權臣擅命元叉劉騰陰相影響遂使皇太后幽隔後宮太傅清河王無辜致害相州刺史中山王熙橫被夷滅右衞將軍奚康生仍見誅翦從此已後無所畏忌恣諸侵求任所與奪無君之心積習稍久不臣之迹緣事彌彰蔽耳目之明專生殺之柄天下為之不康四郊由茲多壘此而可忍孰不可懷雖屢經赦宥未容致之于法猶宜辨正以謝朝野騰身既往可追削爵位叉之罪狀誠合徽纆但以宗枝舅戚特加全貸可除名為民壬辰征西將軍都督崔延伯大敗於涇川戰歿五月戊辰淳于誕等大破蕭衍軍俘斬萬計擒蕭世澄等十一將文熾僅以身免走成都戊子驃騎大將軍儀同三司李崇薨六月癸未大赦改年詔文武之官從軍二百日文官優一級武官優二級蠕蠕主阿那瓌率衆大破拔陵斬其將孔雀等諸將逼彭城蕭綜夜潛出降蕭衍諸將奔退衆軍追躡免者十一二秋八月癸酉詔斷遠近貢獻珍麗違者免官柔玄鎮人杜洛周率衆反於上谷號年真王攻沒郡縣南圍燕州戊子莫折念生遣都督杜黑兒杜光等攻仇池郡行臺魏子建遣將成遷擊破之斬杜光首九月乙卯詔減天下諸調之半丙辰詔左將軍幽州刺史常景為行臺征虜將軍元譚為都督以討洛周辛酉詔曰追功表德為善者勸祖宗功臣勒銘王府而子孫廢替淪於凡民爵位無聞遷流有失潁川名守重泉令宰惠風美政結於民心而猶同常品未蒙褒陟非所謂愛及甘棠彝倫攸者也其功臣名將為先朝所知子孫屈塞不見齒牧守令長聲稱卓然者皆仰有司具以名聞朕將振彼幽滯用闡治風壬戌詔百官五品已上各舉所知辛未曲赦南北兩秦州冬十月蠕蠕國主阿那瓌遣使朝貢是月吐谷渾國復討趙天安降之河州長史元永平治中孟賓等推肽噠使主高徽行州事而前刺史梁釗子景進攻殺之景進又自行州事十有一月辛亥詔曰大孝榮親著之昔典故安平耄耋諸子滿朝自今諸有父母年八十以上者皆聽居官祿養溫清朝夕時四方多事諸蠻復反十有二月壬午詔曰高祖以大明定功世宗以下武寧亂聲溢朔南化清中宇業盛隆周祚延七百朕幼齡纂曆夙馭鴻基戰戰兢兢若臨淵谷闇於治道政刑未孚權臣擅命亂我朝式致使西秦跋扈朔漠構妖蠢爾荊蠻氛埃不息孔熾甚於涇陽出軍切於細柳而師旅盤桓留滯不進北淯懸危南陽告急將虧荊沔之地以致蹙國之憂今茅轂扼腕爪牙歎憤並欲摧挫封豕剿截長蛇使人神兩泰幽明獻吉朕將躬馭六師掃蕩逋穢其配衣六軍分隸熊虎前驅後隊左翼右師必令將帥雄果軍吏明濟糧仗車馬速度時須其有失律亡軍兵戍逃叛盜賊劫掠伏竄山澤者免其往咎錄其後効別立募格聽其自新廣下州郡令赴軍所今先討荊蠻疆理南服戈旗東指掃平淮外然後奮七萃於西戎騰五牛於北狄躬撫亂離之苦面恤饑寒之患爾乃還蹕嵩宇飲至廟庭沉璧河洛告成泰岱豈不盛歟百官內外牧守軍宰宜各肅勤用明爾職山胡劉蠡升反自稱天子置官僚是月以臨淮王彧為征南大將軍率衆討魯陽蠻二年春正月庚戌封廣平王懷庶長子太常少卿誨為范陽王壬子以太保汝南王悅領太尉是月都督元譚次於軍都為洛周所敗五原降戶鮮于脩禮反於定州號魯興元年詔左光祿大夫長孫稚為使持節假驃騎將軍大都督北討諸軍事與都督河間王琛率將討之二月甲申帝皇太后臨大夏門親覽寃訟是月疊伏羅國遣使朝貢三月庚子以驃騎大將軍徐州刺史安豐王延明為儀同三司追復中山王熙本爵子叔仁紹之甲寅西部敕勒斛律洛陽反於桑乾西與河西牧子通連別將尒朱榮擊破之夏四月大赦天下癸巳, WYG: ''}
