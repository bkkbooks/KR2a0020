  - {type: variant, offset: 921, length: 2, content: 神龜, WYG: 轉寜朔將軍司州别駕遷太子左衛率河北太守世宗初除鎮逺將軍豫州刺史時有汝南上蔡董毛奴者齎錢五千死在道路郡縣疑民張堤為刦又於堤家得錢五千堤懼拷掠自誣言殺獄既至州悦觀色察言疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺此賊竟遺何物靈之云唯得一刀鞘而已悦取鞘視之曰此非里卷所為也乃召州城刀匠示之有郭門者前曰此刀鞘門手所作去嵗賣與郭民董及祖悦收及祖詰之曰汝何故殺人取錢而遺刀鞘及祖欵引靈之又於及祖身上得毛奴所著皂襦及祖伏法悦之察獄多此類也豫州于今稱之悦與鎮南將軍元英攻義陽克之詔改蕭衍司州為郢州以悦為征虜將軍郢州刺史蕭衍遣其豫州刺史馬仙琕左軍將軍永陽戍主陳可等率衆一萬於三闗南六十里因山起城名為竹墩遣其輔國將軍濟隂太守薊沛精卒二千以戌之後於闗南四十里麻陽舊柵起城仙琕輕騎東南為之節度闗南之民多懐兩望悦令西闗統軍諸靈鳯掩擊敗之盡燔其城樓儲積擒薊沛及其輔國將軍軍主劉靈秀詔曰司馬悦首謀義陽征略有㨗且違京既久屢請入朝可遂此志聼其赴闕尋詔以本將軍為豫州刺史論義陽之勲封漁陽縣開國子食邑三百户永元元年城人白早生謀為叛逆遂斬悦首送蕭衍既而邢巒復懸瓠詔曰司馬悦暴罹横酷身首異所國戚舊勲特可悼念主書董紹銜命公行囚漂殊域事可矜愍尚書可量賊將齊茍兒等四人之中分遣二人勑揚州為移以易悦首及紹迎接還本用慰亡存贈平東將軍青州刺史賜帛三百疋諡曰荘子朏襲爵朏尚世宗妹華陽公主拜駙馬都尉特除員外散騎常侍加鎮逺將軍正光五年公主薨月餘朏卒贈左將軍滄州刺史子鴻字慶雲性麤武襲爵位至都水使者坐與西賊交通賜死子孝政襲齊受禪爵例降金龍弟躍字寳龍尚趙郡公主拜駙馬都尉代兄為雲中鎮將朔州刺史假安北將軍河内公躍表罷河西苑封與民墾殖有司執奏此麋鹿所聚太官取給今若與民至於奉獻時禽懼有所闕詔曰此地若任稼穡雖有獸利事湏廢封若是山澗虞禁何損尋先朝置此豈茍藉斯禽亮亦以俟軍行薪蒸之用其更論之躍固請宜以與民髙祖從之還為祠部尚書大鴻臚卿頴川王師以疾表求解任太和十九年卒贈金紫光禄大夫賜朝服一具衣一襲絹一千匹楚之父子相繼鎮雲中朔土服其威徳司馬景之字洪略晉汝南王亮之後太宗時歸闕爵蒼梧公加征南大將軍清直有節操太宗甚重之卒贈汝南王子師子襲爵景之兄準字巨之以泰常末率三千餘家歸國時太宗在虎牢授寧逺將軍新蔡公假相州刺史隨駕至京出除廣寗太守悦近來逺清儉有稱世祖嘉之賜布六百疋後降號為平逺將軍改為密陵侯興光}
