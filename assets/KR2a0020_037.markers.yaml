  - {type: variant, offset: 3638, length: 461, content: 民愿朴父子賓旅同寢一室回下車勒令別處其俗遂改徵為太尉長史頻行定州徐州事尋除後將軍汾州刺史肅宗初轉涼州刺史加右將軍固辭不拜仍授平北將軍瀛州刺史時大乘寇亂之後加以水潦百姓困乏回表求賑恤免其兵調州內甚賴之又為度支尚書尋轉都官尚書冀州大中正滎陽鄭雲諂事長秋卿劉騰貨騰紫纈四百匹得為安州刺史除書旦出暮往詣回坐未定謂回曰我為安州卿知之否彼土治生何事為便回答之曰卿荷國寵靈位至方伯雖不能拔園葵去織婦宜思方略以濟百姓如何見造而問治生乎封回不為商賈何以相示雲慚媿失色靈太后臨朝召百官問得失羣臣莫敢言回對曰昔孔丘為司寇十日而誅少正卯魯國肅然欺巧自息姬旦行戮不避兄弟周道用隆徐偃專行仁義其國乃滅自古及今未有不厲威刑而能治者頃來頗由長吏寬怠侵剝百姓盜賊羣起請肅刑書以懲未犯太后意納之而不能用轉為七兵尚書領御史中尉尚書右僕射元欽與從父兄麗妻崔氏姦通回乃劾奏時人稱之除鎮東將軍冀州刺史肅宗末徵為殿中尚書頻表遜職以為右光祿大夫莊帝初遇害於河陰時年七十七贈侍中車騎大將軍司空公定州刺史諡曰孝宣長子隆之武定中開府儀同三司齊州刺史安德郡開國公子子繪武定中勃海, WYG: ''}
