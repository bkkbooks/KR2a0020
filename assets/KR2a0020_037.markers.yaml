  - {type: variant, offset: 1200, length: 1213, content: 永樂弟弼武定中安西將軍營州刺史安陵縣開國男月者兒弟徽字榮顯小字苟兒聰敏有氣幹為任城王澄所知賞景明中起家奉朝請延昌中假員外散騎常侍使於肽噠西域諸國莫不敬憚之破洛侯烏孫並因之以獻名馬還拜冗從僕射神龜中遷射聲校尉左中郎將游擊將軍又假平西將軍員外散騎常侍使肽噠還至枹罕屬莫折念生反於秦隴時河州刺史元祚為前刺史梁釗息景進等招引念生攻河州祚以憂死長史元永平治中孟賓臺使元湛共推徽行河州事綏接有方兵士用命別駕乞伏世則潛通景進徽殺之徵兵於吐谷渾吐谷渾率衆救之景進敗退走奔秦州景進尋率羌夷復來攻逼徽遣統軍六景相馳表請師詔徽仍行河州事久無援救力屈城陷為賊所害永熙中喪還洛陽贈使持節侍中都督冀定相瀛滄五州諸軍事司徒公冀州刺史諡曰文宣子歸義有志烈初除奉朝請加威烈將軍與父徽俱使西域還都稍遷龍驤將軍中散大夫西征都督每有戰功後沒於陣太昌初贈侍中驃騎大將軍儀同三司雍州刺史諡曰孝貞子普武定末安南將軍太子左衞率歸義弟歸彥武定末驃騎大將軍開府儀同三司徐州刺史安喜縣開國男真弟各拔廣昌鎮將卒贈燕州刺史子猛虎鄯善鎮錄事及居喪以至性稱遂絕宦情子元國早卒次顯國武定末撫軍將軍汶陽男顯國弟達武定中驃騎將軍行滄州事達弟永國征虜將軍中散大夫永國弟子國武衞將軍各拔少子盛天平中侍中太尉公廣平郡開國公子子瑗武定末兼武衞將軍謐弟稚字幼寧薄骨律鎮將營州刺史子陀字難陀沃野鎮長卒贈琅邪太守子雍字景雲司徒從事後與少子思義俱奔蕭衍卒於江南元象初喪還特贈使持節散騎常侍都督冀定瀛滄幽五州諸軍事驃騎大將軍尚書令司徒公冀州刺史子思宗武定末中軍將軍儀同三司兗州刺史上洛郡開國男思義特贈使持節散騎常侍都督青兗齊三州諸軍事車騎大將軍尚書僕射儀同三司青州刺史陀弟興早卒興子貴孫晉州刺史湖弟字叔宗慕容垂鉅鹿太守太祖時率郡降賜爵涇縣侯加龍驤將軍仍守鉅鹿卒贈安東將軍幽州刺史諡曰惠子道字始愔襲爵拜都牧令遷鎮南將軍相州刺史未及之職卒仍以為贈諡曰莊子幹字干奴好學寬厚有雅度襲爵涇縣侯後例降為伯歷南青州征虜府司馬威遠將軍鄯善鎮遠府長史仍轉汾州後軍府長史白水太守所在以廉平著稱太昌初卒贈使持節都督秦雍二州諸軍事車騎大將軍司空公雍州刺史諡曰孝穆子侃字伯欣襲除南秦州長史卒贈輔國將軍涼州刺史諡曰宣子紹字廣祖襲爵興和初征虜將軍滄州刺史侃弟騰字伏興卒於安東將軍光州刺史襄城縣開國公子陟字祖遷司空中郎太尉主簿陟弟憬通直郎憬弟翽襲父爵騰弟隆之武定末太保尚書令平原郡開國公崔逞字叔祖清河東武城人也魏中尉琰之六世孫曾祖諒晉中書令祖遇仕石虎為特進父瑜黃門郎逞少好學有文才遭亂孤貧躬耕于野而講誦不廢慕容暐時郡舉上計掾補著作郎撰燕記遷黃門侍郎及苻堅并慕容暐以為齊郡太守堅敗司馬昌明以逞為清河平原二郡太守為翟遼所虜授以中書令慕容垂滅翟釗以為祕書監慕容寶東走和龍為留臺吏部尚書及慕容驎立逞攜妻子亡歸太祖張袞先稱美逞及見禮遇甚重拜為尚書任以政事錄三十六曹別給吏屬居門下省尋除御史中丞太祖攻中山未克六軍乏糧民多匿穀問羣臣以取粟方略逞曰取椹可以助糧, WYG: 如}
