  - {type: variant, offset: 41, length: 2, content: 泰吏, WYG: 榮期司馬徳宗梁益二州刺史為其參軍楊承祖所殺楚之時年十七送父䘮還丹陽值劉裕誅夷司馬戚屬叔父宣期兄貞之竝為所殺楚之乃亡匿諸沙門中濟江自歴陽西入義陽竟陵蠻中及從祖荆州刺史休之為裕所敗乃亡於汝頴之間楚之少有英氣能折節待士與司馬順眀道㳟等所在聚黨及劉裕自立楚之規欲報復收衆據長社歸之者常萬餘人劉裕深憚之遣刺客沐謙害楚之楚之待謙甚厚謙夜詐疾知楚之必自來因欲殺之楚之聞謙病果自齎湯藥往省之謙感其意乃出匕首於席下以状告之曰將軍為裕所忌憚願不輕率以保全為先楚之歎曰若如來言雖有所防恐有所失謙遂委身以事之其推誠信物得士之心皆此類也太宗末山陽公奚斤略地河南楚之遣使請降因表曰江淮以北聞王師南首無不抃舞思奉徳化而逼於宼逆無由自致臣因民之欲請率慕義為國前驅今皆白衣無以制服人望若䝉偏裨之號假王威以唱義則莫不率從於是假楚之使持節征南將軍荆州刺史奚斤既平河南以楚之所率戸民分置汝南南陽南頓新蔡四郡以益豫州世祖初楚之遣妻子内居於鄴尋徴入朝時南藩諸將表劉義隆欲入為宼以楚之為使持節安南大將軍封琅邪王屯潁川以距之其長史臨邑子歩還表曰楚之渡河百姓思舊義衆雲集汝潁以南望風翕然回首革面斯誠陛下應天順民聖徳廣被之所致也世祖大悦璽書勞勉賜前後}
