  - {type: variant, offset: 515, length: 230, content: 將陽平王頤率衆討之頤假樹生鎮遠將軍都將先驅有功樹生尚氣俠意在浮沉自適不願職位辭不受賞論者高之居宅數有赤光紫氣之異鄰伍驚恐僉謂怪變宅不可居樹生曰何往非善安之自若雅好音律常以絲竹自娛孝昌初北州大亂詔發衆軍廣開募賞以樹生有威略授以大都督令率勁勇鎮捍舊蕃二年卒時年五十五太昌初追贈使持節都督冀相滄瀛殷定六州諸軍事大將軍太師錄尚書事冀州刺史追封勃海王諡曰文穆妻韓氏為勃海王國太妃永熙中後贈假黃鉞侍中都督中外諸軍事加後部羽葆鼓吹餘如故長子即齊獻武王也王弟琛字永寶天平中驃騎, WYG: 西}
