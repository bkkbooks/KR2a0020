  - {type: variant, offset: 37, length: 1, content: 垂, WYG: 德劉裕誅元後還建鄴裕復以休之為荆州刺史休之頗得江漢人心劉裕疑其有異志而休之子文思繼休之兄尚之為譙王謀圖裕裕執送休之令自為其所休之表廢文思并與裕書陳謝神瑞中裕收休之子文寳兄子文祖並殺之乃率衆討休之休之上表自陳於德宗與德宗鎮北將軍魯宗之宗之子竟陵太守軌等起兵討裕裕軍至江陵休之不能敵遂與軌奔襄陽裕復進軍討之太宗遣長孫嵩屯河東將為之援時姚興征虜將軍姚成王冠軍將軍}
  - {type: page-break, offset: 37, content: '', id: KR2a0020_WYG_037-2a, image: WYG0261/WYG0261-0527c.png}
  - {type: variant, offset: 37, length: 1, content: 垂, krp: 德劉裕誅元後還建鄴裕復以休之為荆州刺史休之頗得江漢人心劉裕疑其有異志而休之子文思繼休之兄尚之為譙王謀圖裕裕執送休之令自為其所休之表廢文思并與裕書陳謝神瑞中裕收休之子文寳兄子文祖並殺之乃率衆討休之休之上表自陳於德宗與德宗鎮北將軍魯宗之宗之子竟陵太守軌等起兵討裕裕軍至江陵休之不能敵遂與軌奔襄陽裕復進軍討之太宗遣長孫嵩屯河東將為之援時姚興征虜將軍姚成王冠軍將軍}
  - {type: variant, offset: 39, length: 1, content: 空, WYG: 馬國璠亦將兵救之不及而還休之遂與子文思及宗之等奔於姚興裕滅姚泓休之與文思及德宗河間王子道賜輔國將軍溫楷竟陵内史魯軌荆州治中韓延之殷約平西參軍桓謐桓璲及桓溫孫道度道子渤海刁雍陳郡袁式等數百人皆將妻子詣嵩降月餘休之卒于嵩軍詔曰司馬休之率其同義萬里歸誠雅操不遂中年殞䘮朕甚愍焉其追贈征西大將軍右光祿大夫諡始平聲公文思與淮南公國璠池陽子道賜不平而偽親之引與飲宴國璠性疏直因酒醉遂語文思言已將與溫楷及三城胡酋王珍曹栗等外叛因説京師豪彊可與為謀數十人文思告之皆坐誅以文思為廷尉卿賜爵鬱林公善於其職聼訟斷獄百姓不復匿其情劉義隆遣将裴方明擊楊難當於仇池世祖以文思為假節征南大將軍進爵譙王督洛豫諸軍南趣襄陽邀其歸路還京為懐朔鎮將興安初薨子彌陁襲爵以選尚臨涇公主而辭以先取毗陵公竇瑾女與瑾竝坐祝詛伏誅司馬楚之字徳秀晉宣帝弟太常馗之八世孫}
  - {type: page-break, offset: 39, content: '', id: KR2a0020_WYG_037-2b, image: WYG0261/WYG0261-0527d.png}
  - {type: page-break, offset: 39, content: '', id: KR2a0020_WYG_037-3a, image: WYG0261/WYG0261-0528a.png}
