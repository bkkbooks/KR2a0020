  - {type: variant, offset: 925, length: 0, content: '', WYG: 子安國襲爵司馬叔璠晉安平獻王孚之後也父曇之司馬徳宗河間王桓元劉裕之際叔璠與兄國璠北奔慕容超後西投姚興劉裕滅姚泓北奔屈丐世祖平統萬兄弟俱入國國璠賜爵淮南公卒無子爵除叔璠安逺將軍丹楊侯卒長子靈夀神䴥中與弟道夀俱來歸國靈夀冠軍將軍温縣侯道夀寜朔將軍宜陽子靈夀出除陳郡}
