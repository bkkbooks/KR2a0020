  - {type: variant, offset: 4101, length: 1892, content: 隆之弟興之字祖冑經明行修恬素清靜起家太學博士員外郎出為瀛冀二州平北府長史所歷有當官之譽孝昌中卒天平中追贈散騎常侍撫軍將軍雍州刺史尋重贈殿中尚書諡曰文子孝琬字子倩武定末開府中郎孝琬弟孝琰祕書郎興之弟延之字祖業天平中驃騎大將軍青州刺史剡縣開國子磨奴既以回為後請於顯祖贈鑒寧遠將軍滄水太守鑒長子琳字彥寶顯祖末本州表貢拜中書博士高祖初大軍南討琳參鎮南軍事後為河南七州大使還拜中書侍郎與侍中南平王馮誕等議定律令賜布帛六百匹粟六百石馬牛各一遷太尉長史轉司宗下大夫有長者之稱行東兗州事及改定百官除司空長史出為立忠將軍南青州刺史兼散騎常侍持節西道大使還為長兼太中大夫轉廣平內史又為光祿大夫世宗末除後將軍夏州刺史徵為安東將軍光祿大夫神龜二年卒贈使持節撫軍將軍相州刺史子元稱元稱弟子盛並早卒子盛弟子施武定末沛郡太守琳子肅在文苑傳懿從兄子愷字思悌弈之孫也父勸慕容垂侍中太常卿愷給事黃門侍郎散騎常侍後入代都名出懿子玄之右俱坐司馬氏事死愷妻盧玄姊也愷子伯達棄母及妻李氏南奔河表改婚房氏顯祖末伯達子休傑內入祖母盧猶存垂百歲矣而李已死休傑高祖時以歸國勳為河間太守兼冀州咸陽王府諮議參軍休傑從弟靈祐仕劉義隆為青州治中勃海太守慕容白曜平三齊靈祐率二百人詣白曜降賜爵下密子後除建威將軍勃海太守卒子進壽襲爵肅宗時為揚州治中以失義州為刺史元志所殺事具志傳子子游武定中開府中兵參軍進壽弟蚌卒於冀州別駕蚌弟粲起家荊州長流參軍司空水曹參軍殿中侍御史累遷征東將軍廣州長史還除光祿大夫卒贈衞將軍冀州刺史回族叔軌字廣度沉謹好學博通經傳與光祿大夫武邑孫惠蔚同志友善惠蔚每推軌曰封生之於經義非但章句可奇其標明綱格統括大歸吾所弗如者多矣善自修潔儀容甚偉或曰學士不事修飾此賢何獨如此軌聞笑曰君子整其衣冠尊其瞻視何必蓬頭垢面然後為賢言者慚退太和中拜著作佐郎稍遷尚書儀曹郎中兼員外散騎常侍銜命高麗高麗王雲恃其偏遠稱疾不親受詔軌正色詰之喻以大義雲乃北面受詔先是契丹虜掠邊民六十餘口又為高麗擁掠東歸軌具聞其狀移書徵之雲悉資給遣還有司奏軌遠使絕域不辱朝命權宜曉慰邊民來蘇宜加爵賞世宗詔曰權宜徵口使人常體但光揚有稱宜賞一階轉考功郎中除本郡中正勃海太守崔休入為吏部郎以兄考事干軌軌曰法者天下之平不可以舊君故虧之也休歎其守正軌在臺中稱為儒雅奏請遣四門博士明經學者檢試諸州學生詔從之尋除國子博士加揚武將軍假通直散騎常侍慰勞汾州山胡司空清河王懌表修明堂辟雍詔百僚集議軌議曰明堂者布政之宮在國之陽所以嚴父配天聽朔設教其經構之式蓋已尚矣故周官匠人職云夏后氏世室殷人重屋周人明堂五室九階四戶八窗鄭玄曰或舉宗廟或舉王寢或舉明堂互之以見同制然則三代明堂其制一也案周與夏殷損益不同至於明堂因而弗革明五室之義得天數矣是以鄭玄又曰五室者象五行也然則九階者法九土四戶者達四時八窗者通八風誠不易之大範有國之式若其上圓下方以則天地通水環宮以節觀者茅蓋白盛為之質飾赤綴白綴為之戶牖皆典籍所具載制度之明義也在秦之世焚滅五典毀黜三代變更先聖不依舊憲故呂氏月令見九室之義大戴之禮著十二堂之論漢承秦法亦未能改東西二京俱為九室是以黃圖白虎通蔡邕應劭等咸稱九室以象九州十二堂以象十二辰夫室以祭天堂以布政依天而祭故室不過五依時布政故堂不踰四州之與辰非所可法九與十二其用安在今聖朝欲尊道訓民備禮化物宜則五室以為永制至如廟學之嫌臺沼之雜袁準之徒已論正矣遺論具在不復須載尋以本官行東郡太守遷前軍將軍行夏州事好立條教所在有績轉太子僕遷廷尉少卿加征虜將軍卒贈右將軍濟州刺史初軌深為郭祚所知祚常謂子景尚曰封軌高綽二人並幹國之才必應遠至吾平生不妄進舉而每薦此二公非直為國進賢亦為汝等將來之津梁也其見重如此軌既以方直自業高綽亦以風概立名尚書令高肇拜司徒綽送迎往來軌竟不詣綽顧不見軌乃遽歸曰吾一生自謂無愆規矩今日舉措不如封生遠矣軌以務德慎言修身之本姦回讒佞世之巨害乃為務德慎言遠佞防姦四戒文多不載軌長子偉伯字君良博學有才思弱冠除太學博士每朝廷大議偉伯皆預焉雅為太保崔光僕射游肇所知賞太尉清河王懌辟參軍事懌親為孝經解詁命偉伯為難例九條皆發起隱漏偉伯又討論禮傳詩易疑事數十條儒者咸稱之尋將經始明堂廣集儒學議其制度九五之論久而不定偉伯乃搜檢經緯上明堂圖說六卷正光末尚書僕射蕭寶夤以為關西行臺郎及寶夤為逆偉伯乃與南平王冏潛結關中豪右韋子粲等謀舉義兵事發見殺年三十六時人惜之永安中追贈散騎常侍征虜將軍瀛州刺史聽一子出身偉伯無子轉授第三弟翼偉伯撰封氏本錄六卷并詩賦碑誄雜文數十篇偉伯弟業字君脩奉朝請領殿中侍御史早卒業弟翼字君贊美容貌腰帶十圍以兄偉伯立節之勳除給事中後加揚烈將軍武定初卒翼弟述字君義武定末廷尉少卿述弟詢字景文尚書起部郎, WYG: ''}
