  - {type: variant, offset: 2414, length: 499, content: 飛鴞食椹而改音詩稱其事太祖雖銜其侮慢然兵既須食乃聽以椹當租逞又曰可使軍人及時自取過時則落盡太祖怒曰內賊未平兵人安可解甲仗入林野而收椹乎是何言歟以中山未拔故不加罪天興初姚興侵司馬德宗襄陽戍戍將郗恢馳使乞師於常山王遵遵以聞太祖詔逞與張袞為遵書以答初恢與遵書云賢兄虎步中原太祖以言悖君臣之體敕逞袞亦貶其主號以報之逞袞乃云貴主太祖怒曰使汝貶其主以答乃稱貴主何若賢兄也遂賜死後司馬德宗荊州刺史司馬休之等數十人為桓玄所逐皆將來奔至陳留南分為二輩一奔長安一歸廣固太祖初聞休之等降大悅後怪其不至詔兗州尋訪獲其從者問故皆曰國家威聲遠被是以休之等咸欲歸闕及聞崔逞被殺故奔二處太祖深悔之自是士人有過者多見優容逞七子二子早亡第三子義義弟諲諲弟禕禕弟嚴嚴弟賾逞之內徙也終慮不免乃使其妻張氏與四子留冀州令歸慕容德遂奔廣固逞獨與小子賾在平城及逞之死亦以此為譴賾字泰沖初為太子洗馬後稍遷散騎常侍賜爵清河侯後世祖聞劉義隆以諲為冀州刺史乃曰義隆知用其兄我豈無冀州也乃以賾為平東將軍冀州刺史又為大鴻臚持節策拜楊難當為南秦王奉使數返光揚朝命世祖善之及驃騎大將軍樂平王丕等督諸軍取上邽使賾齎詔於丕前喻難當奉詔後與方士韋文秀詣王屋山造金丹不就, WYG: ''}
