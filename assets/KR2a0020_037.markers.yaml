  - {type: variant, offset: 925, length: 0, content: '', krp: 子安國襲爵司馬叔璠晉安平獻王孚之後也父曇之司馬徳宗河間王桓元劉裕之際叔璠與兄國璠北奔慕容超後西投姚興劉裕滅姚泓北奔屈丐世祖平統萬兄弟俱入國國璠賜爵淮南公卒無子爵除叔璠安逺將軍丹楊侯卒長子靈夀神䴥中與弟道夀俱來歸國靈夀冠軍將軍温縣侯道夀寜朔將軍宜陽子靈夀出除陳郡}
  - {type: variant, offset: 926, length: 1, content: 昌, WYG: 守劉義隆侵境詔靈夀招引義士得二千餘人從西平公安頡破虎牢滑臺洛陽三城徙五百餘家入河内又從討蠕蠕西征涼州所在著功出為遼西太守治有清儉之稱太和九年卒贈懐州刺史諡曰靖靈夀娶太宰頓丘王李峻女與婦父雅不相善每見抑退故位不大至子恵安髙祖時襲爵厯恒州别駕桑乾太守太尉諮議參軍事卒子祖珍年十五舉司州秀才解褐員外散騎侍郎年十八先父卒祖珍弟宗龎世宗時父恵安以久病啓以爵轉授解褐安定王府騎兵參軍洛州龍驤府司馬善射未曽自伐性閑淡少所交遊識者云其淳至永安中卒子嵩亮襲恵安弟直安歴位尚書郎濟北濟南二郡太守員外散騎常侍蕭寳夤征鍾離引為長史坐軍退免官加刑以疾得免尋除東平原太守還京為中散大夫加征虜將軍太中大夫遷左將軍正光四年卒贈大將軍濟州刺史子龍泉滄州開府長史道夀長子元興襲父爵子景和給事中稍遷揚州驃騎府長史清河内史正光}
