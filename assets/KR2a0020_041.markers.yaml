  - {type: punctuation, offset: 514, content: 、, id: KR2a0020_ZHSJ_041-bkkpn112}
  - {type: variant, offset: 514, length: 361, content: 寧西將軍開府長安鎮都大將進爵高平公未幾復徵為四部尚書加散騎常侍延和初復使涼州蒙遜遣中兵校郎楊定歸白順曰年衰多疹舊患發動腰脚不隨不堪拜伏比三五日消息小差當相見順曰王之年老朝廷所知以王祗執臣禮別有詔旨豈得自安不見上使也蒙遜翌日延順入至庭中而蒙遜箕坐隱几無動起之狀順正色大言曰不謂此叟無禮乃至於是今則覆亡之不恤而敢陵侮天地魂神逝矣何用見之將握節而出蒙遜使定歸追順於庭曰太常既雅恕衰疾傳云朝廷有不拜之詔是以敢自安耳若太常曰爾拜爾𢔛而不祗命斯乃小臣之罪矣順益怒曰齊桓公九合諸侯一匡天下周王賜胙命曰伯舅無下拜而桓公奉遵臣節降而拜受今君雖功高勳厚未若小白之勤朝廷雖相崇重未有不拜之詔如便偃蹇自大此乃速禍之道非圖久安之計若朝廷震怒遂相吞滅悔何及哉蒙遜曰太常規之以古烈懼之以天威敢不翹悚敬聽休命遂拜伏盡禮禮畢蒙遜曰夫恃德者昌恃力者亡朝廷頃來, WYG: ''}
