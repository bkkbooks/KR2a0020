  - {type: variant, offset: 2577, length: 12, content: 部郎中遷長兼司徒左長史定, WYG: 犯罪每多逃遁因眚乃出竝皆釋然自今已後犯罪不問輕重而藏竄者悉逺流若永避不出兄弟代徙懷乃奏曰謹按條制逃吏不在赦限竊惟聖朝之恩事異前宥諸流徙在路尚蒙旋反況有未發而仍遣邊戍按守宰犯罪逃走者衆禄潤旣優尚有兹失及蒙恩宥卒然得還今獨苦此等恐非均一之法如臣管執謂宜免之書奏門下以成式旣班駮奏不許懐重奏曰臣以為法貴經通治尚簡要刑憲之設所以網羅罪人茍理之所備不在繁典行之可通豈容峻制此乃古今之達政救世之恒規伏尋條制勲品已下罪發逃亡遇恩不宥仍流妻子雖欲抑絶姧途匪為通式謹按事條侵官敗法專據流外豈九品已上人皆貞白也其諸州守宰職任清流至有貪濁事發逃竄而遇恩免罪勲品已下獨乖斯例如此則寛縱上流法切下吏育物有差惠罰不等又謀逆滔天輕恩尚免吏犯微罪獨不蒙赦使大宥之經不通開生之路致壅進違古典退乖今律輒率愚見以為宜停書奏世宗納之其年除車騎大將軍涼}
  - {type: page-break, offset: 2577, content: '', id: KR2a0020_WYG_041-7b, image: WYG0261/WYG0261-0570d.png}
