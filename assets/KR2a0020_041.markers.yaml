  - {type: variant, offset: 424, length: 0, content: '', WYG: 之出為征南將軍冀州刺史改封隴西王賀上書曰臣聞人之所寳莫寳於生全徳之厚者莫厚於宥死然犯死之罪難以盡恕權其輕重有可矜恤今勍寇遊魂於北狡賊負險於南其在疆場猶須防戍臣愚以為自非大逆赤手殺人之非其坐贓及盜與過誤之愆應入死者皆可原命謫守邊境是則已斷之體更受全生之恩徭役之家漸蒙休息之惠刑措之化庶幾在兹虞書曰流宥五刑此其義也臣受恩深重無以仰荅將違闕庭豫增係戀敢上瞽}
