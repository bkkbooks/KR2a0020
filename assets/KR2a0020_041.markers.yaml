  - {type: variant, offset: 7228, length: 552, content: 恃顯弟曄字季顯涉歷書史司徒行參軍稍遷濟州輔國府長史坐兄事免後除尚書中兵郎遷冠軍中散大夫正光二年南荊州刺史桓叔興驅掠城民叛入蕭衍衍資以兵糧令築谷陂城以立洛州逼土山戍詔曄持節兼尚書左丞為行臺督諸軍討叔興大破之乘勝拔谷陂叔興退走軍還仍除尚書左丞出除洛州刺史將軍如故未拜卒贈左將軍齊州刺史子暉賓美容貌和沉雅太學博士暉賓弟山儒少而清立學涉羣書山儒少弟大蓋並早卒曄族弟孝怡字悅宗中書學生相州高陽王雍主簿廣陵王羽掾新蔡太守別將蕭寶夤長史從中山王英破蕭衍臨川王蕭宏於梁城除朔州安北府長史又為中堅將軍相州鎮北府長史遷冠軍將軍魏郡太守相州刺史中山王熙據鄴起兵也孝怡陰結募城民與熙長史柳元章別駕游荊之等率衆擒熙賞爵昌樂伯靈太后反政以孝怡叉黨除名為民後安樂王鑒鎮鄴起孝怡為別將永安初除左將軍太中大夫仍為防城都督以拒葛榮之勳賜爵趙郡公拜撫軍將軍光祿大夫永安三年行殷州事遷驃騎大將軍左光祿大夫武定六年卒八十子思道儀同開府中兵參軍武城縣公熙字仲熙神中與高允等俱被徵拜中書博士轉侍郎以使沮渠有功賜爵元氏子加中壘將軍卒贈鎮東將軍豫州刺史諡曰莊子季主襲卒贈青州刺史諡曰貞子遺元襲初除冀州趙郡王幹東閤祭酒累轉尚書左民郎中冀州京兆王愉功曹參軍帶扶柳令為愉所親逼與同反愉敗遺元逃竄會赦乃雪復除兗州平東府長史後拜中堅將軍殷州征北將軍長史卒年六十三贈, WYG: ''}
