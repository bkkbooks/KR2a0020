  - {type: punctuation, offset: 6664, content: 、, id: KR2a0020_ZHSJ_041-bkkpn1366}
  - {type: variant, offset: 6664, length: 354, content: 夏州刺史卒贈左將軍齊州刺史肅從弟曒字景林有學識初除奉朝請太學博士司空主簿以母憂去職服闋拜左軍將軍正光中元叉以其弟羅為青州刺史曒為羅平東府長史遷廷尉少卿殷州大中正孝昌二年冬卒年五十七贈平東將軍齊州刺史諡曰宣子慎武定中東平太守曒從弟仲琁奉朝請定雍二州長史太尉諮議中散太中大夫東郡汲郡二郡太守司徒左長史弘農太守先是宮牛二姓阻嶮為害仲琁示以威惠並即歸伏還除衞將軍金紫光祿大夫仍除北雍州刺史將軍如故轉車騎將軍左光祿大夫天平初遷都於鄴以仲琁為營構將作進號衞大將軍出除車騎大將軍兗州刺史仲琁以孔子廟牆宇頗有頹毀遂修改焉還除將作大匠所歷並清勤有聲年六十六卒贈驃騎大將軍儀同三司青州刺史子希良侍御史詵從子善犯孝靜諱趙郡太守子顯進州主簿顯進子映字輝道南安王國常侍光州征虜府主簿相州治中寧朔將軍步兵校尉孝昌三年冬卒年四十二天平中贈, WYG: ''}
