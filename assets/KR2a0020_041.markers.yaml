  - {type: variant, offset: 422, length: 1, content: 順, WYG: 人之立名宜其得實何可濫也賜名賀焉拜殿中尚書南安王余為宗愛所殺也賀部勒禁兵静遏外内與南部尚書陸麗決議定䇿翼戴髙宗令麗與劉尼馳詣苑中奉迎高宗賀守禁中為之内應俄而麗抱高宗單騎而至賀乃開門髙宗卽位社稷大安賀有力焉轉征北將軍加給事中以定策之勲進爵西平王髙宗卽位班賜百僚謂賀曰朕大賚善人卿其任意取之勿謙退也賀辭固使取之賀唯取戎馬一疋而已是時斷獄多濫賀上書曰案律謀反之家其子孫雖養他族追還就戮所以絶罪人之類彰大逆之辜其為劫賊應誅者兄弟子姪在逺道隔關津皆不坐竊惟先朝制律之意以不同謀非絶類之罪故特垂不死之詔若年十三已下家人首惡計謀所不及愚以為可原其命沒入縣官髙宗}
  - {type: page-break, offset: 422, content: '', id: KR2a0020_WYG_041-2b, image: WYG0261/WYG0261-0568b.png}
  - {type: page-break, offset: 422, content: '', id: KR2a0020_WYG_041-3a, image: WYG0261/WYG0261-0568c.png}
