  - {type: variant, offset: 5895, length: 0, content: '', WYG: 王臣澄按故司空臣沖所造明堂様并連表詔荅兩京模式奏求營起緣期發㫖卽加葺繕侍中領軍臣义物動作官宣贊授令自兹厥後方配兵人或給一千或與數百進退節縮曾無定準欲望速了理在難克若使專役此功長得營造委成責辦容有就期但所給之夫本自寡少諸處競借動即千計雖有繕作之名終無就功之實爽塏荒茫淹積年載結架崇構指就無兆仍令肄胄之禮掩仰而不進養老之儀寂寥而不返構厦止於尺土為山頓於一簣良可惜歟愚謂召民經始必有子來之歌興造勿亟將致不日之美況本兵不多兼之牽役廢此與彼循環無極便是輟創禮之重資不急之費廢經國之功供寺館之役求之逺圖不亦闕矣今諸寺大作稍以粗舉竝可徹減專事經綜嚴勒工匠務令克成使祖宗有薦配之期蒼生覩禮樂之富書奏從之除冠軍將軍中散大夫又領治書侍御史秦益氐反詔子恭持節為}
