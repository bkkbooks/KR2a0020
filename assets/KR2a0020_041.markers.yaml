  - {type: variant, offset: 3217, length: 291, content: 事黃門侍郎希仁弟騫字希義博涉經史文藻富盛年十四國子學生以聰達見知歷大將軍府法曹參軍太宰府主簿轉中散大夫遷中書舍人加通直散騎常侍曾為釋情賦曰單閼之年無射之月余承乏攝官直於本省對九重之清切望八襲之崢嶸感代序以長懷觀爽氣而軫慮籠樊之念既多寥廓之想彌切含毫有思斐然成賦猶潘生之秋興王子之登閣也厠鄭璞於周寶編魚目於隨珠未敢自同作者蓋亦各言爾志云荷峻極之層構導積石之洪流有馬形而謨舜亦龍德而史周爰相趙之鴻烈逮藩魏之優遊為衢樽於上葉號木鐸於前修若豢龍之不隕似窮桑之世濟故抱玉而懷珠且滋蘭而樹蕙或舟楫以匡時或棲遲以卒歲尚無忝於先人諒貽厥於來裔書金冊以葳蕤布銀繩而昭晣清風忽其緬邈啟皇祖於庚寅李伯仁上, WYG: ''}
