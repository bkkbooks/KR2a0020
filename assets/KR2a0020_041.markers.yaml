  - {type: variant, offset: 107, length: 235, content: 後軍將軍仍賜爵平棘子加奮威將軍世祖將討赫連昌謂崔浩曰朕前北征李順獻策數事實合經略大謀今欲使總攝前驅之事卿以為何如浩對曰順智足周務實如聖旨但臣與之婚姻深知其行然性果於去就不可專委世祖乃止初浩弟娶順妹又以弟子娶順女雖二門婚媾而浩頗輕順順又弗之伏也由是潛相猜忌故浩毀之至統萬大破昌軍順謀功居右轉拜左軍將軍後征統萬遷前將軍授之以兵昌出逆戰順督勒士衆破其左軍及克統萬世祖賜諸將珍寶雜物順固辭唯取書數千卷世祖善之至京論功以順為給事黃門侍郎賜奴婢十五戶帛千匹又從擊赫連定於平涼三秦平遷, WYG: ''}
