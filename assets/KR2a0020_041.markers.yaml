  - {type: variant, offset: 5799, length: 1, content: 加, WYG: 除恒農太守遷夏州刺史時沃野鎮人破落汗㧞陵首為反亂所在蜂起綂萬逆胡與相應接子雍嬰城自守城中糧盡煮馬皮而食之子雍善綏撫得士心人人戮力無有離貳以饑饉轉切欲自出求糧留子延伯據守寮屬僉云今天下分析冦賊萬重四方音信莫不斷絶俄頃之間變在不意何宜父子如此分張未若棄城俱去更展規略子雍泣而謂衆曰吾世荷國恩早受藩寄此是吾死地更欲何求然守禦以來嵗月不淺所患乏糧不得制勝吾今向東州得數月之食還與諸人保全必矣遂自率羸弱向東夏運糧延伯與將士送出城外哭而拜辭三軍莫不嗚咽子雍行數日為朔方胡帥曹阿各㧞所邀力屈見執子雍乃密遣人齎書間行與城中文武云大軍在近努力圍守必令諸人福流苗裔又勑延伯令共固守子雍雖被囚執雅為胡人所敬常以民禮事之子雍為陳安危禍福之理勸阿各㧞令降阿各㧞將從之未果而死㧞弟桑生代總部衆竟隨子雍降時北海王顥為大行臺子雍具陳賊可滅之狀顥給子雍兵馬令其先行時東夏合境反叛所在屯結子雍轉鬭而前九旬之中凡數十戰仍平東夏徴税租粟運於綂萬於是二夏漸寧及蕭寶夤等為賊所敗賊帥宿勤明達遣息阿非率衆邀路華州白水被圍逼關右騷擾咫尺不通時子雍新平黒城遂率士馬并夏州募義之民擕家席卷鼓行南出賊帥康維摩擁率羌胡守鋸谷斷􅀈裳橋子雍與交戰大破之生禽維摩又攻賊帥契官斤於楊氏堡破之子雍出自西夏漸至於東轉戰千里至是朝廷始得其委問除散騎常侍使持節假撫軍將軍都督兼行臺尚書復破賊帥紇單歩胡提於曲沃堡肅宗璽書勞勉之子雍在白水郡復破阿非軍多所斬獲詔遣侍中尚書令城陽王徽於潼關宣㫖慰勞除中軍將軍金紫光禄大夫給事黄門侍郎封樂平縣開國公邑一千户還洛以葛榮久逼信都詔假子雍征北將軍為北討都督時相州刺史安樂王鑒據鄴反勑子雍與都督李神軌先討之子雍行達湯隂鑒遣弟斌之夜襲子雍軍不克奔敗而返子雍乘機繼進徑圍鄴城與裴衍神軌等攻鑒平之改封陽平縣開國公增邑千五百户進號鎮東將軍遂與裴衍發鄴以封葛榮而信都城陷除子雍冀州刺史餘官如故子雍以冀州不守上書曰賊中甚飢專仰野掠今朝廷足食兵卒飽暖高璧深壘勿與爭鋒彼求戰則不得野掠無所獲不盈數旬可坐制凶醜時裴衍復表求行詔子雍與衍速進子雍重表固請如謂不可乞令裴衍獨行若不賜解求停裴衍茍逼固行取敗旦夕詔不聽遂與衍俱進至陽平郡東北漳曲榮率賊十萬來逼官軍子雍戰敗被害年四十朝野痛惜之贈車騎大将軍儀同三司雍州刺史公如故永安中重贈司空諡曰莊穆長子延伯出後從伯次子士則早亡士則弟士正士規竝坐事死次楷字士質小字那延襲武定中齊文襄王府參軍齊受禪例降延伯初為司空參軍事時南秦民吳富反叛詔以河間王琛為都督延伯叔父子恭為軍司延伯為綂軍隨子恭西討戰必先鋒子恭見其年幼常訶制之而不能禁子雍在夏州表乞兵援詔延伯率羽林一千人赴之城鬬野戰勇冠三軍子雍之向東夏留延伯城守付以後事延伯與兵士共分湯菜防固城隍及子雍為胡所執合城憂懼延伯乃人人曉喻曰吾父吉凶不測方寸焦爛實難裁割但奉命守城所為處重若以私害公誠孝竝闕諸君幸得此心無虧所寄於是衆感其義莫不勵憤朝廷聞而嘉之除龍驤將軍行夏州事封五城縣開國子食邑三百户卒能固守及後刺史至延伯率領義衆還赴子雍共平黑城在􅀈棠橋戰先鋒陷陳身擒維摩及至白水首摧阿非隨子雍至都進爵浮陽伯增封百户為諫議大夫假}
