  - {type: variant, offset: 2697, length: 0, content: '', WYG: 百而已山川水陸彼所諳利脱江湘無波君臣效職藉水憑舟倐忽而至壽春容不自保江南將若之何今寶卷邑居有土崩之形邊城無繼援之兆清蕩江區寔在今日臣受恩既重不敢不言詔曰不君不臣江南常弊有粟不食其在斯矣上天將欲亡之諸蕃又願取之人事天道孰云匪會但以養害仁者不為且十月五日衍軍已達大航其大傷小亡之勢久應有決假令天罰寳卷衍}
