  - {type: variant, offset: 2749, length: 4, content: 豫章王綜, WYG: 奉公不撓皆此類也懷又表曰景明以來北蕃連年災旱高原陸野不任營殖唯有水田少可菑畝然主將參僚專擅腴美瘠土荒疇給百姓因此困敝日月滋甚諸鎮水田請依地令分給細民先貧後富若分付不平令一人怨訟者鎮將已下連署之官各奪一時之禄四人已上奪禄一周北鎮邊蕃事異諸夏徃日置官全不差别沃野一鎮自將已下八百餘人黎庶怨嗟僉曰煩猥邊隅事尠實少畿服請主帥吏佐五分減二詔曰省表具恤民之懷已勑有司一依所上下為永準如斯之比不便於民損化害政者其備列以聞時細民為豪彊陵壓積年枉滯一朝見申者日有百數所上事宜便於北邊者凡四十餘條皆見嘉納正始元年九月有告蠕蠕率十二萬騎六道竝進欲直趨沃野懷朔南寇恒代詔懷以本官加使持節侍中出}
