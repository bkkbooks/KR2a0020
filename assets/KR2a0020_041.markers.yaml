  - {type: variant, offset: 876, length: 1055, content: 伐屢克境宇已博但當循理此民亦足興治然專務討擊恐不可常勝順曰昔太祖廓定洪基造有區夏太宗承統王業惟新自聖上臨御志寧四海是以戎車屢駕親冒風霜滅赫連於三秦走蠕蠕於漠北闢土開邊隸首不紀僵屍截馘所在成觀除蕩暴虐存卹黎庶威震八荒聲被九域自古以來用兵之美未有今日之盛是以遐方荒俗之氓莫不翹足抗手斂衽屈膝天兵四臨昭德罰罪何云恃力夫聖王之用兵也征南蠻則北狄怨討西戎則東夷恨天子安得已哉蒙遜曰誠如來言則涼土之民亦願魏帝遠至何為復遽驛告警不舍晝夜意君之所言殆為虛事順曰苗民叛帝舜而親暴君有扈違后啟而從逆主咸懾逼於近地牽制於凶威自古而然豈獨涼民也順既使還世祖問與蒙遜往復之辭及蒙遜政教得失順曰蒙遜專威河右三十許年經涉艱難粗識機變又綏集荒陬遠人頗亦畏服雖不能貽厥孫謀猶足以終其一世前歲表許十月送曇無讖及臣往迎便乖本意不忠不信於是而甚禮者身之輿敬者行之本未有無禮不敬而能久享福祿以臣觀之不復周矣世祖曰若如卿言則効在無遠其子必復襲世襲世之後早晚當滅順對曰臣略見其子並非才俊能保一隅如聞敦煌太守牧犍器性粗立若繼蒙遜者必此人也然比之於父僉云不逮殆天所用資聖明也世祖曰朕今方事于東未暇營西如卿所言三五年間不足為晚且停前計以為後圖既而蒙遜死問至世祖謂順曰卿言蒙遜死今則驗矣又言牧犍立何其妙哉朕克涼州亦當不遠於是賜絹千匹馬一乘進號安西將軍寵待彌厚政之巨細無所不參崔浩惡之順凡使涼州十有二返世祖稱其能而蒙遜數與順遊宴頗有悖慢之言恐順東還泄之朝廷尋以金寶納順懷中故蒙遜罪釁得不聞徹浩知之密言於世祖世祖未之信太延三年順復使涼州及還世祖曰昔與卿密圖期之無遠但以頃年東伐未遑西顧荏苒之間遂及于此今和龍既平三方無事比繕甲治兵指營河右掃蕩萬里今其時也卿往復積歲洞鑒廢興若朕此年行師當克以不順對曰臣疇日所啟私謂如然但民勞既久未獲寧息不可頻動以增勞悴願待他年世祖從之五年議征涼州順議以涼州乏水草不宜遠征與崔浩庭諍浩固執以為宜征世祖從浩議及至姑臧甚豐水草世祖與恭宗書以言其事頗銜順後謂浩曰卿昔所言今果驗矣浩曰臣之所言虛實皆如此類初蒙遜有西域沙門曇無讖微有方術世祖詔順令蒙遜送之京邑順受蒙遜金聽其殺之世祖克涼州後聞而嫌順涼土既平詔順差次羣臣賜以爵位順頗受納品第不平涼州人徐桀發其事浩又毀之云順昔受牧犍父子重賂每言涼州無水草不可行師及陛下至姑臧水草豐足其詐如此幾誤國事不忠若是反言臣讒之於陛下世祖大怒真君三年遂刑順於城西順死後數年其從父弟孝伯為世祖知重居中用事及浩之誅世祖怒甚謂孝伯曰卿從兄往雖誤國朕意亦未便至此由浩譖毀朕忿遂盛殺卿從兄者浩也皇興初順子敷等貴寵顯祖追贈順侍中鎮, WYG: ''}
