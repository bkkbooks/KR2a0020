  - {type: variant, offset: 503, length: 0, content: '', WYG: 奉皇帝璽綬以授髙祖是歲河西勑勒叛遣賀率衆討之䧏二千餘落倍道兼行追賊黨都朱于等至枹䍐大破之斬首五千餘級虜男女萬餘口雜畜三萬餘頭復追綂萬高平上邽三鎮叛勑勒至于金城斬首三千級賀依古今兵法及先儒耆舊之説略採至要為十二陳圖以上之顯祖覽而嘉焉賀以年老辭位詔不許又詔}
  - {type: page-break, offset: 503, content: '', id: KR2a0020_WYG_041-5a, image: WYG0261/WYG0261-0569c.png}
  - {type: variant, offset: 503, length: 0, content: '', krp: 奉皇帝璽綬以授髙祖是歲河西勑勒叛遣賀率衆討之䧏二千餘落倍道兼行追賊黨都朱于等至枹䍐大破之斬首五千餘級虜男女萬餘口雜畜三萬餘頭復追綂萬高平上邽三鎮叛勑勒至于金城斬首三千級賀依古今兵法及先儒耆舊之説略採至要為十二陳圖以上之顯祖覽而嘉焉賀以年老辭位詔不許又詔}
  - {type: variant, offset: 505, length: 0, content: '', WYG: 三道諸軍屯于漠南是時每歲秋冬遣軍三道竝出以備北冦至春中乃班師賀以勞役京都又非禦邊長計乃上言請募諸州鎮有武健者三萬人復其徭賦厚加賑恤分為三部二鎮之間築城城置萬人給彊弩十二床武衛三百乘弩一床給牛六頭武衛一乘給牛二頭多造馬槍及諸器械使武略大將二人以鎮撫之冬則講武春則種殖竝戍竝耕則兵未勞而有盈畜矣又於白道南三處立倉運近州鎮租粟以充之足食足兵以備不虞於宜為便不可歲常舉衆連動京師令朝廷恒有北顧之慮也事寢不報又上書稱病篤乞骸骨至于再三乃許之朝有大議皆就詢訪又給衣藥珍羞太和元年二月療疾於温湯高祖文明太后遣使者屢問消息太醫視疾患篤還京師賀乃遺令勑諸子曰吾頃以老患辭事不悟天慈降恩爵逮於汝汝其毋傲吝毋荒怠毋奢越毋嫉姤疑思問言思審行思恭服思度遏惡揚善親賢逺佞目觀必眞耳屬必正誠勤以事君清約以行已吾終之後所葬時服單櫝足申孝心芻靈明器一無用也三年秋薨年七十三贈侍中太尉隴西王印綬諡曰宣賻雜綵五百疋賜輼輬車及命服溫明袐器陪葬于金陵長子延性謹厚好學初以功臣子拜侍御中散賜爵武城子西治都將卒贈涼州刺史廣武侯諡曰簡子鱗襲延弟思禮後賜名懷謙恭寛雅有大度高宗末為侍御中散父賀辭老詔懐受父爵拜征南將軍尋為持節督諸軍屯於漠南還除殿中尚書出為長安鎮將雍州刺史清儉有惠政善於撫恤劫盜息止流民皆相率來還嵗餘復拜殿中尚書加侍中參都曹事又督諸軍征蠕蠕六道大將咸受節度遷尚書令參議律令後例降為公除司州刺史從駕南征加衛大將軍領中軍事以母憂去職賜帛三百疋穀千石十九年除征北大將軍夏州刺史轉都督雍岐東}
