  - {type: variant, offset: 5893, length: 1, content: 防, WYG: 涼州刺史開國如故子孝孫襲齊受禪爵例降子雍弟子恭字靈順聰慧好學初辟司空參軍事司徒祭酒尚書北主客郎中攝南主客事蕭衍亡人許周自稱為衍給事黃門侍郎朝士翕然咸共信待子恭奏曰徐州表投化人許團并其弟周等究其牒狀周列云已蕭衍黃門侍郎又稱心存山水不好榮宦屢曾辭讓貽彼赫怒遂被出為齊康郡因爾歸國願畢志嵩嶺比加採訪略無證明尋其表狀又復莫落案牒推理實有所疑何者昔夷齊獨徃周王不屈其志伯況辭禄漢帝因成其美斯實古先喆王必有不臣之人者也蕭衍雖復崎嶇江左竊號一隅至於處物未甚悖禮豈有士辭榮祿而茍不聽之哉推察情理此則孟浪假蕭衍皆狂不存雅道逼士出郡未為死急何宜輕去生飬之土長辭父母之邦乎若言不好榮官志願嵩嶺者初届之日卽應杖筞尋山負帙㳂水而乃廣尋知已遍造執事希榮之心已見逃宦之志安在昔梁鴻去鄉終傭吳會逢萌浮海逺客遼東竝全志飬性逍遙而已考之事實何其懸哉又其履歴清華名位高達計其家累應在不輕今者歸化何其孤廻設使當時怱遽不得擕將及其來後家貲産業應見簿歛尊卑口累亦當從法而周兄弟怡然嘗無憂慼若無種族理或可通如有不坐便應是衍故遣非周投化推究二三真偽難辨請下徐揚二州密訪必令獲實不盈數旬玉石可覩於是詔推訪周果以罪歸闕假稱職位如子恭所疑河州羌却鐡忽反殺害長吏詔子恭持節為行臺率諸將討之子恭嚴勒州郡及諸軍不得犯民一物輕與賊戰然後示以威恩兩旬間悉皆降欵朝廷嘉之正光元年為行臺左丞廵行北邊轉為起部郎明堂辟雍竝未建就子恭上書曰臣聞辟臺望氣軌物之德既高方堂布政範世之道斯逺是以書契之重理冠於造化推尊之美事絶於生民至如郊天饗帝蓋以對越上靈宗祀配天是用酬膺下土大孝莫之能加嚴父以兹為大乃皇王之休業有國之盛典竊惟皇魏居震綂極總宙馭宇革制土中垂式無外自北徂南同卜維於洛食定鼎遷民均氣候於寒暑高祖所以始基世宗於是恢構按功成作樂治定制禮乃訪遺文修廢典建明堂立學校興一代之茂矩標千載之英規永平之中始創雉構基趾草昧迄無成功故尚書令任}
