  - {type: variant, offset: 2694, length: 2, content: 尋除, WYG: 蕭衍勒兵而東襲上流之衆已逼其郊廣陵京口各持兵而懷兩望鍾離淮隂竝鼎峙而觀得失秣陵孤危制不出門君子小人竝罹灾禍延首北望朝不及夕斯實天啓之期吞并之會乘厥蕭墻之釁籍其分崩之隙東據歴陽兼指𤓰歩縁江鎮戍達於荆郢然後奮雷電之威布山河之信則江西之地不刃自來吳會之鄉指期可舉昔士治有言皓若暴死更立賢主文武之官各得其任則勍敵也若蕭衍克就上下同心非直後圖之難實亦揚境危逼何則壽春之去建鄴}
