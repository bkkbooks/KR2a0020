  - {type: variant, offset: 2248, length: 322, content: 庶人敷從弟顯德妹夫廣平宋叔珍等皆坐關亂公私同時伏法敷兄弟敦崇孝義家門有禮至於居喪法度吉凶書記皆合典則為北州所稱美既致斯禍時人歎惜之敷長子伯和次仲良與父俱死伯和走竄歲餘為人執送殺之伯和有庶子孝祖年小藏免後敷妻崔氏得出宮養之至平涼太守敷弟式字景則學業知名歷散騎常侍平東將軍西兗州刺史濮陽侯式自以家據權要心慮危禍常敕津吏臺有使者必先啟告然後渡之既而使人平曉卒至津吏欲先告式使者紿云我須南過不停此州不煩令刺史知也津人信之與使俱渡使者既濟突入執式赴都與兄俱死式子憲字仲軌清粹善風儀好學有器度太和初襲爵又降為伯拜祕書中散雅為高祖所賞稍遷散騎侍郎接對蕭衍使蕭琛范雲以母老乞歸養拜趙郡太守趙脩與其州里脩歸葬父母也牧守以下畏之累跡惟憲不為之屈時人高之轉授驍騎將軍, WYG: ''}
