  - {type: variant, offset: 2705, length: 3, content: 孝昌初, krp: 司徒公平原王興安二年追論定筞之勲進先臣爵西平王皇興季年顯祖將傳大位於京兆王先臣時都督諸將屯於武川被徵詣京特見顧問先臣固執不可顯祖久乃許之遂命先臣持節授皇帝璽綬於高祖至太和十六年麗息叡狀私書稱其亡父與先臣援立高宗朝廷追錄封叡鉅鹿郡開國公臣時丁艱草土不容及例至二十年除臣雍州刺史臨發奉辭靣奏先帝申先臣舊勲時勑㫖但赴所臨尋當别判至二十一年車駕幸雍臣復陳聞時蒙勑㫖征還當授自宫車晏駕遂爾不白竊惟先臣逺則援立高宗寶歴不墜近則陳力顯祖神器有歸如斯之勲超世之事麗以父功而獲河山之賞臣有家勲不霑茅社之賜得否相懸請垂裁處詔曰宿老}
