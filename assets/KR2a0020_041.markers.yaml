  - {type: variant, offset: 6005, length: 0, content: '', krp: 尚書行臺與正平都督長孫稚合勢進討大破之正平賊帥范明逺與賊帥劉牙奴竝面縛請降事平除平南將軍豫州刺史尋加散騎常侍撫軍將軍武泰初郢州刺史元願達以城降蕭衍詔徵都督尉慶賓還京師回衆𨽻子恭以討之衍將夏侯夔率衆數萬來宼逺近不安夔乘勢分兵遂逼新蔡自攻毛城子恭隨方應援賊竝破走蕭衍豫州刺史夏侯亶復遣四將率衆三萬入圍南頓北攻陳項子恭遣軍禦之賊復奔退加鎮南將軍又兼尚書行䑓子恭勒衆渡淮徙民於淮北立郡縣置戍而還蕭衍直閣將軍軍主胡智達等八將與其監軍閻次洪入宼屯於州城東北四十餘里子恭擊破之斬智達生擒次洪元顥之入洛也加子恭車騎將軍子恭不敢拒之而頻遣間使參莊帝動靜未幾顥敗車駕還洛進征南將軍兼右僕射假車騎將軍後加散騎常侍板橋蠻文石活石忌麤受蕭衍印節扇誘黨類據險寇竊子恭躬率將士徑襲其柵數日之中殱殪略盡諸蠻欵服咸求輸税徵拜右光禄大夫}
