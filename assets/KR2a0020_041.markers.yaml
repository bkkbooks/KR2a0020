  - {type: variant, offset: 3509, length: 1960, content: 門銘曰上東少陽厥位在寅條風動物月值孟春王武子詩曰於顯我王緝乘斯民俊明有德嚴恭惟夤逢軒教之方洽遇周命之惟新譬龍虎其有合信山川而降神若勝庭之五傑似不速之三人協嗜欲於將至豈物色而方臻荷天寵以來儀步康衢而騁力如乾元之利貞若坤四之方直內弼諧於本朝外闢土於殊域乘紫氛以厲羽負青天而鼓翼既公侯之必復亦慶緒之所融績並樹於八凱道俱升於二宮遂遵流以至海且因岳而為嵩同羽儀於班氏均載德於楊公何日月之逾邁引寒暑而相終委晉會於弱齒遺堂構於微躬嗟蒙昧之無取故告舍而不及已濩落而少成又擁腫而無立愧精堅於百鍊慚忠信於十邑非珪璋之特達詎芳菲之易襲未砥礪以自進寧琢磨而成章乖宋子之萬字異應生之五行不請觀於石室豈借書於晉皇求班莊而不遂況蔡文之可望參四科其未獲入三選而誰許本無聲於梁魏故未聞於陳汝居玉石以多迷宅顯晦而乖所既無懷於四至安有情於再舉雖衣冠之末冑而世祿之緒餘等渤澥之乘雁類九罭之逃魚處江淮而不變對朝市而閑居空闔門以靖軌非論道而修書少賓客於季彥謝朋交於太初在正光之御曆實明皇之拱己曾問政於上學著為君而我齒叫閽人以望予遂陟降於庭止同崔駰之謁帝若謝兼之來仕逮孝莊之入統乃道喪而時昏水羣飛於溟海火載燎於中原延膠船而越水若朽索而乘奔玉羊失而無御金雞亡而不存天步忽其多難橫流且其云始既雲擾而海沸亦岳立而峙睇三綱之日紊見四維之不理顧茂草以傷懷視匪車而思起雖風雨之如晦亮膠喈而不已自牽役於宰朝實有懷於胥在下僚而栖屑願奮迅於泥滓眷故鄉以臨睨悵有動於思歸越來流以鼓枻遡北風而結騑入成都之舊宅反觀津之故扉乃曲肱而不悶信抱甕而無機且耕而食且蠶而衣一日以自省亦三月而無違遊仁義之肴覈採墳素之精微誠因閑而養拙亦有樂於嘉肥及勾芒御節姑洗之首散遲遲於麗日發依依於弱柳鳥間關以呼庭花芬披而落牖聽乃越於笙簧望有踰於新婦襲成服以逍遙願良辰而聊厚乃席壠而踞石遂嘯儔而命偶同浴沂之五六似禊洛之八九或促膝以持肩或援笙而鼓缶賓奉萬年之觴主報千金之壽各笑語而卒獲傳禮儀於不朽斯蓋先民之所樂而余心之所守也至於少昊為帝庚辛處躔視墟里之蕭蕭過寒夜之綿綿積霜靄於近援起泬寥於遠天思多端以類長若臨水而登山幸出遊之或寫冀觀濤之可蠲遂杖策緩步或漁或田弋鳧雁於清溪釣魴鯉於深泉張廣幕布長筵酌濁酒割芳鮮起白雪於促柱奉綠水於危弦賦湛露而不已歌驪駒而未旋跌蕩世俗之外疏散造化之間人生行樂聊用永年悟柱下之稱工聞首陽之為拙既有惜於苽懸且自悲於井渫訪鄭詹之格言求季主之高說去衡門以策駟望象魏而投轍服毳衣以從務乘大車而就列比汗海而無紀喻江河而有缺眷重地而懼深念索米而慚結運有折於玉斗時忽亡於金鏡始蒙塵以播蕩卒流彘而居鄭彼上天之降鑒實下民之請命因艱難以隆基據殷憂而啟聖調南風以負扆居北辰而為政創彝倫於九疇班平章於百姓喻繩契以論蹤援成昭而比盛酌徙鎬之故典究遷亳之遺令奄四海以為家開七百而增慶覩禮樂之方隆信光華之始映百揆鬱以時序四門穆其惟清如得人於漢世比多士於周庭有一匡以作相或十亂而為楨各秉文而經武故天平而地成伊余身之忝穢得再入於承明執綸言之猶紼戴會弁之如星非巡潰以窺井信夕惕而懷驚承周任之有言攬老子之知足奉烱誡以周旋抱徽猷而與屬每有偃於唯塵興言於寵辱思散髮以抽簪願全真而守朴眷疏傅以徘徊望申公而躑躅冀鄙志之獲展庶微願之逢時歌致命而可卜詠歸田而有期揖帝城以高逝與人事而長辭擊壤而頌結草而嬉援巢父以戲潁追許子而升箕供暮餐於沆瀣給朝餌於瓊芝同糟醨而無別混名實而不治放言肆慾無慮無思何鷦鷯之可賦鴻鵠之為詩哉尋加散騎常侍殷州大中正鎮南將軍尚書左丞仍以本官兼散騎常侍使蕭衍後坐事免論者以為非罪騫嘗贈親友盧元明魏收詩曰幽棲多暇日總駕萃荒坰南瞻帶宮雉北睇拒畦瀛流火時將末懸炭漸云輕寒風率已厲秋水寂無聲層陰蔽長野凍雨暗窮汀侶浴浮還沒孤飛息且驚三褫俄終歲一丸曾未營閑居同洛涘歸身款武城稍旅原思藋坐夢尹懃荊監河愛斗水蘇子惜餘明益州達友趣廷尉辯交情豈若忻蓬蓽收志偶沉冥後詔兼太府少卿尋除征南將軍給事黃門侍郎死於晉陽所著詩賦碑誄別有集錄贈本將軍太常殷州刺史齊受禪重贈使持節侍中都督殷滄二州諸軍事車騎大將軍儀同三司仍殷州刺史諡曰文惠騫弟希禮字景節武定末通直散騎常侍希遠庶長兄長劍興和中梁州驃騎府長史式弟弈字景世美容貌有才藝早歷顯職散騎常侍宿衞監都官尚書安平侯與兄敷同死太和初文明太后追念弈兄弟乃誅李訢存問憲等一二家歲時賜以布帛弈別生弟冏字道度少為中散逃避得免太和中拜下大夫南部給事出為龍驤將軍南豫州刺史還拜冠軍將軍尋除光祿大夫守度支尚書二十一年高祖幸長安冏以咸陽山河險固秦漢舊都古稱陸海勸高祖去洛陽而都之後高祖引見笑而謂之曰卿一昨有啟欲朕都此昔婁敬一說漢祖即日西駕尚書今以西京說朕仍使朕不廢東轅當是獻可理殊所以今古相反耳冏對曰昔漢祖起於布衣欲藉嶮以自固婁敬之言合於本旨今陛下百世重光德洽四海事同隆周均其職貢是以愚臣獻說不能上動高祖大悅其年冏卒賜錢二十萬布百匹, WYG: 園祕器}
