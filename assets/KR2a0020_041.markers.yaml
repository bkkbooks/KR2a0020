  - {type: variant, offset: 6267, length: 239, content: 從事中郎蕭寶卷豫州刺史裴叔業以壽春歸附詔煥以本官為軍司與楊大眼奚康生等率衆迎接煥至淮西叔業兄子植遣使送質煥等濟師入城撫慰民咸忻悅仍行揚州事賜爵容城伯軍還行河內郡事拜司徒右長史以荊蠻擾動敕煥兼散騎常侍慰勞之降者萬餘家除輔國將軍梁州刺史時武興氐楊集起舉兵作逆令弟集義邀斷白馬戍敕假煥平西將軍督別將石長樂統軍王祐等與軍司苟金養俱討之大破集起軍會秦州民呂苟兒反煥仍令長樂等由麥積崖赴援屬都督元麗至遂共平之時氐王楊定進猶據方山與苟兒影響煥密募氐趙芒路斬定進還朝遇患卒時年四十四贈征虜將軍幽, WYG: 公兖}
