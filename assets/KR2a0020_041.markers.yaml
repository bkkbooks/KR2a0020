  - {type: variant, offset: 7895, length: 249, content: 助教轉著作郎典儀注修國史遷國子博士加征虜將軍永熙二年出帝幸平等寺僧徒講說敕同軌論難音韻閒朗往復可觀出帝善之三年春釋菜詔延公卿學官於顯陽殿敕祭酒劉廞講孝經黃門李郁講禮記中書舍人盧景宣解大戴禮夏小正篇時廣招儒學引令預聽同軌經義素優辯析兼美而不得執經深為慨恨天平中轉中書侍郎興和中兼通直散騎常侍使蕭衍衍深耽釋學遂集名僧於其愛敬同泰二寺講涅槃大品經引同軌預席衍兼遣其臣並共觀聽同軌論難久之道俗咸以為善盧景裕卒齊獻武王引同軌在館教諸公子甚嘉禮之每旦入授日暮始歸緇素請業者同軌夜為解說四時爾不以為倦武定四年夏卒, WYG: 雍戰敗被害}
