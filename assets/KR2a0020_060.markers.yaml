  - {type: variant, offset: 177, length: 0, content: '', krp: 興宗弟顯宗字茂親性剛直能面折庭諍亦有才學沙門法撫三齊稱其聰悟常與顯宗校試抄百餘人名各讀一遍隨即覆呼法撫猶有一二舛謬顯宗了無誤錯法撫歎曰貧道生平以來唯服郎耳太和初舉秀才對策甲科除著作佐郎車駕南討兼中書侍郎既定遷都顯宗上書其一日竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可簡并功則洛京易就往冬輿駕停鄴是閑隙之時猶編户供奉勞費為劇聖鑒矜愍優㫖殷勤爵浹高年賚周鰥寡雖賑普霑今猶恐來夏菜色況三農要時六軍雲㑹其所損業實為不少雖調斂輕省未足稱勞然大駕親臨誰敢寜息往來承奉紛紛道路田蠶暫廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生癘疫此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功専力以營洛邑則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉爾如歸其二曰自古聖帝必以儉約為美亂主必以奢侈貽患仰惟先朝皆卑宫室而致力於經略故能基宇開廣業祚隆泰今洛陽基址魏明帝所營取譏前代伏願陛下損之又損頃來北都富室競以第宅相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝渠使寺署有别四民異居永垂百世不刋之範則天下幸甚矣三曰竊聞輿駕還洛陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂況萬乘之尊富有四海乎警蹕於闑闥之内者豈以為儀容而已蓋以戒不虞也清道而後行尚恐銜蹶之或失況履渉山河而不}
  - {type: variant, offset: 178, length: 0, content: '', WYG: 三思哉此愚臣之所以悚息伏願少垂省察其四曰伏惟陛下耳聽法音目翫墳典口對百辟心虞萬幾晷昃而食夜分而寢加以孝思之至隨時而深文章之業口成篇卷雖叡明所用未足為煩然非所以嗇神養性頤無疆之祚莊周有言形有待而智無涯以有待之形役無涯之智殆矣此愚臣所不安伏願陛下垂拱司契委下責成唯冕旒垂纊而天下治矣高祖頗納之顯宗又上言曰進賢求才百王之所先也前代取士必先正名故有賢良方正之稱今之州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此則可令别貢門望以叙士人何假冒秀孝之名也夫門望者是其父祖之遺烈亦何益於皇家益於時者賢才而已茍有其才雖屠釣奴虜之賤聖皇不恥以為臣茍非其才雖三后之𦙍自墜於皁𨽻矣是以大才受大官小才受小官各得其所以致雍熈議者或云今世等無竒才不若取士於門此亦失矣豈可以世無周邵便廢宰相而不置哉但當校其有寸長銖重者即先叙之則賢才無遺矣又曰夫帝皇所以居尊以御下者威也兆庶所以徙惡以從善者法也是以有國有家必以刑法為治生民之命於是而在有罪必罰罰必當辜則雖箠撻之刑而人莫敢犯也有制不行人得僥倖則雖參夷之誅不足以肅自太和以來多坐盗弃市而遠近肅清由此言之止姦在於防檢不在嚴刑也今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盗迭相敦厲遂成風俗陛下居九重之内視人如赤子百司分萬務之要遇下如仇讐是則堯舜止一人而桀紂以千百和氣不至蓋由於此書曰與其殺不辜寜失不經實宜勑示百寮以惠元元之命又曰昔周王為犬戎所逐東遷河洛鎬京猶稱宗周以存本也光武雖曰中興實自創革西京尚置京尹亦不廢舊今陛下光隆先業遷宅中土稽古復禮於斯為盛豈若周漢出於不得已哉按春秋之義有宗廟曰都無則謂之邑此不刋之典也況北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福地實亦遠矣今便同之郡國臣竊不安愚謂代京宜建畿置尹一如故事崇本重舊以光萬葉又曰伏見洛京之制居民以官位相從不依族類然官位非常有朝榮而夕悴則衣冠淪於厮豎之邑臧獲騰於膏腴之里物之顚倒或至於斯古之聖王必令四民異居者欲其業定而志專業定則不偽志專則不淫故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居伎作屠沽各有攸處但不設科禁賣買任情販貴易賤錯居混雜假令一處彈箏吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童齔任意所從其走赴舞堂者萬數往就學館者無一此則伎作不可雜居士人不宜異處之明驗也故孔父云里仁之美孟母𢎞三徒之訓賢聖明誨若此之重今令伎作家習士人風禮則百年難成令士人兒童効伎作容態則一朝可得是以士人同處則禮教易興伎作雜居則風俗難改朝廷每選舉人士則校其一㛰一宦以為升降何其密也至與開伎作宦途得與膏粱華望接閈連甍何其略也此愚臣之所惑今稽古建極光宅中區凡所徙居皆是公地分别伎作在於一言有何為疑而闕盛美又曰自南偽相承竊有淮北欲擅中華之稱且以招誘邊民故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆疑惑書記錯亂區宇非所以疆域物土必也正名之謂也愚以為可依地理舊名一皆釐革小者幷合大者分置及中州郡縣昔以户少併省今人口既多亦不可復舊君人者以天下為家不得有所私也故倉庫儲貯以俟水旱之災供軍國之用至於有功徳者然後加賜爰及末代乃寵之所隆賜賚無限自比以來亦為太過在朝諸貴受禄不輕土木被錦綺僮妾厭粱肉而復厚賚屢加動以千計若分賜鰥寡贍濟實多如不悛革豈周給不繼富之謂也愚謂事有可賞則明㫖襃揚稱事加賜以勸為善不可以親近之昵猥損天府之儲又曰諸宿衞内直者宜令武官習弓矢文官諷書傳而今給其蒲博之具以成褻狎之容長矜争之心恣諠囂之慢徒損朝儀無益事實如此之類一宜禁止高祖善之後乃啓乞宋王劉昶府諮議参軍事欲立効南境高祖不許高祖曽謂顯宗及程靈虬曰著作之任國書是司卿等之文朕自委悉中省之品卿等所聞若欲取況古人班馬之徒固自遼闊若求之當世文學之能卿等應推崔孝伯又謂顯宗曰見卿所撰燕志及在齊詩詠大勝比來之文然著述之功我所不見當更訪之監令校卿才能可居中第又謂程靈虬曰卿比顯宗復有差降可居下上顯宗對曰臣才第短淺猥聞上天至乃比於崔光實為隆渥然臣竊謂陛下貴古而賤今臣學微才短誠不敢仰希古人然遭聖明之世覩惟新之禮染翰勒素實録時事亦未慙於後人昔揚雄著太𤣥經當時不免覆盎之談二百年外則越諸子今臣之所撰雖未足光述帝載禆暉日月然萬祀之後仰觀祖宗巍巍之功上覩陛下明明之徳亦何謝欽明於唐典慎徽於虞書高祖曰假使朕無愧於虞舜卿復何如於堯臣顯宗曰臣聞君不可以獨治故設百官以贊務陛下齊蹤堯舜公卿寜非二八之儔高祖曰卿為著作僅名奉職未是良史也顯宗曰臣仰遭明時直筆而無懼又不受金安眠美食此臣優於遷固也高祖哂之後與}
