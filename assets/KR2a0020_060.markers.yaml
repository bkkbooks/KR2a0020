  - {type: variant, offset: 415, length: 1, content: 高, WYG: 棄周漢遐軌犧庭周漢奚棄忿彼苛刻犧庭曷軌希仁尚徳徽音一振聲敎四塞豈惟京甸化播萬國誠信幽贊隂陽以調谷風扇夕甘雨降朝嘉生含穎深盛熙苗鰥貧巷詠寡婦室謡聞諸詩者雲漢賦宣章句逈秀英昭雅篇矧乃盛明徳隆道𤣥豈唯雨施神徴豐年豐年盛矣化無不濃有禮有樂政莫不通咨臣延躍欣詠時邕誰云易遇曠齡一逢上天無親唯徳是在思樂盛明雖疲勿怠差之毫釐千里之倍願言勞謙求仁不悔人亦有言聖主慎微五國連兵踰年厯時鹿車而運廟算失思有司不惠蠶食役煩民不堪命將家逃山宜督厥守威徳是宣威徳如何聚衆盈川民之從令實賴衣食農桑失本誰耕誰織飢寒切身易子而食静言念之實懷歎息昔聞典論非位不謀漆室憂國遺芳載臭咨臣昏老偏蒙恩祐忽忘狂瞽敢獻愚陋文明太后令曰省詩表聞之歌頌宗}
