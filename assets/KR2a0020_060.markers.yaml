  - {type: variant, offset: 181, length: 0, content: '', WYG: 分朕意一以為可復以為不可宜相與量之李沖對曰未審上古已來置官列位為欲為膏粱兒地為欲益治贊時高祖曰俱欲為治沖曰若欲為治陛下今日何為專崇門品不有拔才之詔髙祖曰茍有殊人之伎不患不知然君子之門假使無當世之用者要自徳行純篤朕是以用之沖曰傅巖吕望豈可以門見舉高祖曰如此濟世者希曠代有一兩人耳沖謂諸卿士曰適欲請諸賢救之祕書令李彪曰師旅寡少未足為援意有所懐不敢盡言於聖日陛下若専以門地不審魯之三卿孰若四科高祖曰猶如向解顯宗進曰陛下光宅洛邑百禮唯新國之興否指此一選臣既學識浮淺不能援引古今以證此議且以國事論之不審中祕書監令之子必為祕書郎頃來為監令者子皆可為不高祖曰卿何不論當世膏腴為監令者顯宗曰陛下以物不可類不應以貴承貴以賤襲賤高祖曰若有高明卓爾才具雋出者朕亦不拘此例後為本州中正一十一年車駕南伐顯宗為右軍府長史征虜將軍統軍軍次赭陽蕭鸞戍主成公期遣其軍主胡松高法援等并引蠻賊來擊軍營顯宗親率拒戰遂斬法援首顯宗至新野高祖詔曰卿破賊斬帥殊益軍勢朕方攻堅城何為不作露布也顯宗曰臣頃聞鎮南將軍王肅獲賊二三驢馬數匹皆為露布臣在東觀私每哂之近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脱復高曵長縑虚張功㨗尤而效之其罪彌甚臣所以歛毫卷帛解上而已高祖笑曰如卿此勲誠合茅社湏赭陽平定檢審相酬新野平以顯宗為鎮南廣陽王嘉諮議參軍顯宗後上表頗自矜伐訴前征勲詔曰顯宗斐然成章甚可怪責進退無檢虧我清風此而不糺成長敝俗可付尚書推列以聞兼尚書張彞奏免顯宗官詔曰顯宗雖浮矯致愆才猶可用豈得永棄之也可以白衣守諮議展其後效但鄙狠之性不足參華可奪見闕并禁問訊諸王顯宗既失意遇信向洛乃為五言詩贈御史中尉李彪曰賈生謫長沙董儒詣臨江愧無若人跡忽尋兩賢踪追昔渠閣游䇿駑厠羣龍如何情願奪飃然獨遠從痛哭去舊國銜淚届新邦哀哉無援民嗷然失侣鴻彼蒼不我聞千里告志同二十三年卒顯宗撰馮氏燕志孝友傳各十卷所作文章頗傳於世景明初追赭陽勲賜爵章武男子武華襲除討㓂將軍奉朝請太原太守程駿字驎駒本廣平曲安人也六世祖良晉都水使者坐事流于涼州祖父肇吕光民部尚書駿少孤貧居喪以孝稱師事劉昞性機敏好學晝夜無倦昞謂門人曰舉一隅而以三隅反者此子亞之也駿謂昞曰今世名教之儒咸謂老莊其言虛誕不切實要弗可以經世駿意以為不然夫老子著抱一之言莊生申性本之㫖若斯者可謂至順矣人若乖一則煩偽生爽性則沖真喪昞曰卿年尚稚言若老成美哉由是聲譽益播沮渠牧犍擢為東宫}
