  - {type: 'tls:seg', offset: 177, content: '', id: KR2a0020_ZHSJ_060-d60p3s15}
  - {type: variant, offset: 177, length: 0, content: '', WYG: 興宗弟顯宗字茂親性剛直能面折庭諍亦有才學沙門法撫三齊稱其聰悟常與顯宗校試抄百餘人名各讀一遍隨即覆呼法撫猶有一二舛謬顯宗了無誤錯法撫歎曰貧道生平以來唯服郎耳太和初舉秀才對策甲科除著作佐郎車駕南討兼中書侍郎既定遷都顯宗上書其一日竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可簡并功則洛京易就往冬輿駕停鄴是閑隙之時猶編户供奉勞費為劇聖鑒矜愍優㫖殷勤爵浹高年賚周鰥寡雖賑普霑今猶恐來夏菜色況三農要時六軍雲㑹其所損業實為不少雖調斂輕省未足稱勞然大駕親臨誰敢寜息往來承奉紛紛道路田蠶暫廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生癘疫此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功専力以營洛邑則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉爾如歸其二曰自古聖帝必以儉約為美亂主必以奢侈貽患仰惟先朝皆卑宫室而致力於經略故能基宇開廣業祚隆泰今洛陽基址魏明帝所營取譏前代伏願陛下損之又損頃來北都富室競以第宅相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝渠使寺署有别四民異居永垂百世不刋之範則天下幸甚矣三曰竊聞輿駕還洛陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂況萬乘之尊富有四海乎警蹕於闑闥之内者豈以為儀容而已蓋以戒不虞也清道而後行尚恐銜蹶之或失況履渉山河而不}
