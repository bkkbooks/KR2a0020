  - {type: variant, offset: 111, length: 0, content: '', krp: 不受子熙縁父素懐卒亦不襲及顯宗卒子熙别蒙賜爵乃}
  - {type: variant, offset: 113, length: 0, content: '', WYG: 先爵讓弟仲穆兄弟友愛如此父亡居喪有禮子熙為懌所眷遇遂闕位待其畢喪後復用及元义害懌乆不得葬子熙為之憂悴屏處田野每言王若不得復封以禮遷葬誓以終身不仕後靈太后返政以元义為尚書令解其領軍子熙與懌中大夫劉定興學官令傅靈􅋆賔客張子慎伏闕上書曰竊惟故主太傅清河王職綜樞衡位居論道盡忠貞以奉公竭心膂以事國自先皇崩殂陛下冲幼負扆當朝義同分陜宋維反常}
