  - {type: variant, offset: 183, length: 0, content: '', WYG: 于京師為司徒崔浩所知文成踐阼拜著作佐郎未幾遷著作郎為任城王雲郎中令進箴於王王納而嘉之皇興中除高密太守尚書李敷奏曰夫君之使臣必湏終效駿實史才方申直筆千里之任十室可有請留之數載以成前籍後授方伯愚以為允書奏從之顯祖屢引駿與論易老之義顧謂羣臣曰朕與此人言意甚開暢又問駿曰卿年幾何對曰臣六十有一顯祖曰昔太公既老而遭文王卿今遇朕豈非早也駿曰臣雖才謝吕望而陛下尊過西伯覬天假餘年竭六韜之効延興末高麗王璉求納女於掖庭顯祖許之假駿}
