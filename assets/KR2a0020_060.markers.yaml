  - {type: variant, offset: 5262, length: 744, content: 禮樂事大不容輒決自非博延公卿廣集儒彥討論得失研窮是非則無以垂之萬葉為不朽之式被報聽許數旬之間頻煩三議于時朝士頗以崇專綜既久不應乖謬各默然無發論者芳乃探引經誥搜括舊文共相難質皆有明據以為盈縮有差不合典式崇雖示相酬答而不會問意卒無以自通尚書述奏仍詔委芳別更考制於是學者彌歸宗焉芳以社稷無樹又上疏曰依合朔儀注日有變以朱絲為繩以繞係社樹三匝而今無樹又周禮司徒職云設其社稷之壝而樹之田主各以其社之所宜木鄭玄注云所宜木謂若松柏栗也此其一證也又小司徒封人職云掌設王之社壝為畿封而樹之鄭玄注云不言稷者王主於社稷社之細也此其二證也又論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗是乃土地之所宜也此其三證也又白虎通云社稷所以有樹何也尊而識之也使民望即見敬之又所以表功也案此正解所以有樹之義了不論有之與無也此其四證也此云社稷所以有樹何然則稷亦有樹明矣也又五經通義云天子太社王社諸侯國社侯社制度奈何曰社皆有垣無屋樹其中以木有木者土主生萬物萬物莫善於木故樹木也此其五證也此最其丁寧備解有樹之意也又五經要義云社必樹之以木周禮司徒職曰班社而樹之各以土地所生尚書逸篇曰太社惟松東社惟柏南社惟梓西社惟栗北社惟槐此其六證也此又太社及四方皆有樹別之明據也又見諸家禮圖社稷圖皆畫為樹唯誡社誡稷無樹此其七證也雖辨有樹之據猶未正所植之木案論語稱夏后氏以松殷人以柏周人以栗便是世代不同而尚書逸篇則云太社惟松東社惟柏南社惟梓西社惟栗北社惟槐如此便以一代之中而五社各異也愚以為宜植以松何以言之逸書云太社惟松今者植松不慮失禮惟稷無成證乃社之細蓋亦不離松也世宗從之芳沉雅方正概尚甚高經傳多通高祖尤器敬之動相顧訪太子恂之在東宮高祖欲為納芳女芳辭以年貌非宜高祖歎其謙慎更敕芳舉其宗女芳乃稱其族子長文之女高祖乃為恂娉之與鄭懿女對為左右孺子焉, WYG: ''}
