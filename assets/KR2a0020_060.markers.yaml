  - {type: variant, offset: 986, length: 1020, content: 根與高閭以儒老學業特被禮遇公私出入每相追隨而閭以才筆時侮明根世號高游焉子肇襲爵肇字伯始高祖賜名焉幼為中書學生博通經史及蒼雅林說高祖初為內祕書侍御中散司州初建為都官從事轉通直郎祕閣令遷散騎侍郎典命中大夫車駕南伐肇上表諫止高祖不納尋遷太子中庶子肇謙素敦重文雅見任以父老求解官扶侍高祖欲令遂祿養乃出為本州南安王楨鎮北府長史帶魏郡太守王薨復為高陽王雍鎮北府長史太守如故為政清簡加以匡贊歷佐二王甚有聲迹數年以父憂解任景明末徵為廷尉少卿固辭乃授黃門侍郎遷散騎常侍黃門如故兼侍中為畿內大使黜陟善惡賞罰分明轉太府卿徙廷尉卿兼御史中尉黃門如故肇儒者動存名教直繩所舉莫非傷風敗俗持法仁平斷獄務於矜恕尚書令高肇世宗之舅為百僚懾憚以肇名與己同欲令改易肇以高祖所賜秉志不許高肇甚銜之世宗嘉其剛梗盧昶之在朐山也肇諫曰朐山蕞爾僻在海濱山湖下墊民無居者於我非急於賊為利為利故必致死而爭之非急故不得已而戰以不得已之衆擊必死之師恐稽延歲月所費遂甚假令必得朐山徒致交爭終難全守所謂無益之田也知賊將屢以宿豫求易朐山臣愚謂此言可許朐山久捍危弊宜速審之若必如此宿豫不征而自伏持此無用之地復彼舊有之疆兵役時解其利為大世宗將從之尋而昶敗遷侍中蕭衍軍主徐玄明斬其青冀二州刺史張稷首以郁洲內附朝議遣兵赴援肇表曰玄明之款雖奔救是當然事有損益或憚舉而功多或因小而生患不可必也今六里朐山地實接海陂湖下濕人不可居郁洲又在海中所謂雖獲石田終無所用若不得連口六里雖克尚不可守況方事連兵而爭非要也且六里於賊逾要去此閑遠若以閑遠之兵攻逼近之衆其勢既殊不可敵也災儉之年百姓飢弊餓死者亦復不少何以得宜靜之辰興干戈之役軍糧資運取濟無所唯見其損未覩其益且新附之民服化猶近特須安帖不宜勞之勞則怨生怨生則思叛思叛則不自安不安則擾動脫爾則連兵難解事不可輕宜損茲小利不使大損世宗並不納大將軍高肇伐蜀肇諫曰臣聞遠人不服則修文德以來之兵者凶器不得已而後用當今治雖太平論征未可何者山東關右殘傷未復頻年水旱百姓空虛宜在安靜不宜勞役然往昔開拓皆因城主歸款故有征無戰今之據者雖假官號真偽難分或有怨於彼不可全信且蜀地險隘稱之自古鎮戍晏然更無異趣豈得虛承浮說而動大軍舉不慎始悔將何及討蜀之略願俟後圖世宗又不納肅宗即位遷中書令光祿大夫加金章紫綬相州大中正出為使持節加散騎常侍鎮東將軍相州刺史有惠政徵為太常卿遷尚書右僕射固辭詔不許肇於吏事斷決不速主者諮呈反覆論叙有時不曉至於再三必窮其理然後下筆雖寵勢干請終無回撓方正之操時人服之及領軍元叉之廢靈, WYG: ''}
