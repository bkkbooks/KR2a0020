  - {type: variant, offset: 121, length: 3, content: 假員外, WYG: 罪莫不俛眉飲氣唯諮是從僕射游肇亢言厲氣發憤成疾為王致死王之忠誠欵篤節義純貞非但蘊藏胷襟實乃形於文翰搜括史傳撰顯忠録區目十篇分卷二十既欲彰忠心於萬代豈可為逆亂於一朝迄追遺志足明丹欵义籍寵姻戚恃握兵馬無君之心實懷皁白擅廢太后枉害國王生殺之柄不由陛下賞罰之詔一出於义名藩重地皆其親黨京官要任必其心腹中山王熈本興義兵不圖神器戮其大逆合門滅盡遂令元略南奔為國臣患奚康生國之猛將盡忠弃市其餘枉被屠戮者不可稱數縁此普天喪氣匝地憤傷致使朔隴猖狂歴嵗為亂荆徐蠢動職是之由昔趙高秉秦令關東鼎沸今元义執權使四方雲擾自古及今竹帛所載賊子亂臣莫此為甚開逆之始起自宋維成禍之末良由騰矣而令凶徒姦黨迭相樹置高官厚禄任情自取非但臣等痛恨終身抑為聖朝懷慙負愧以臣赤心慺慺之見宜梟諸兩觀洿其舎盧騰合斵棺斬骸沉其五族上謝天人幽隔之憤下報忠臣寃酷之痛方乃崇亞三事委以樞端所謂虎也更傅其翼朝野切齒遐邇扼腕蔓草難除去之宜盡臣歴觀曠代緬追振古當斷不斷其禍更生況义猜忍更居衡要臣中宵九歎竊以寒心實願宸鑒早為之所臣等潛伏閭閻於兹六載旦號白日夕泣星辰叩地寂寥呼天無響衞野納肝秦庭夜哭千古之痛何足相比今幸遇陛下叡聖親覽萬幾太后仁明更撫四海臣等敢詣闕披陳乞報寃毒書奏靈太后義之乃引子熙為中書舎人後遂剖騰棺賜义死尋修國史加寜朔將軍未幾除著作郎又兼司州别駕轉輔國將軍鴻臚少卿建義初兼黄門尋正子熙清白自守不交人事又少孤為叔顯宗所撫養及顯宗卒顯宗子伯華又幼子熈友愛等於同生長猶共居車馬資財隨其費用未嘗見於言色又上書求析階與伯華於是除伯華東太原太守及伯華在郡為刺史元弼所辱子熙乃泣訴朝廷肅宗詔遣按檢弼遂大見詰讓尒朱榮之擒葛榮也送至京師莊帝欲面見數之子熙以為榮既元兇自知必死恐或不遜無宜見之尒朱榮聞而大怒請罪子熙莊帝恕而不責尋加征虜將軍及邢杲之起逆詔子熙慰勞杲詐降而子熙信之還至樂陵杲復反子熙遂還坐付廷尉論以大辟恕死免官未幾兼尚書吏部郎普泰初除通直}
