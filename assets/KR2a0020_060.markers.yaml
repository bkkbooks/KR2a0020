  - {type: variant, offset: 172, length: 2, content: 東青, WYG: 侍讀又除國子祭酒子熙儉素安貧常好退静遷鄴之始百司並給兵力時以祭酒閑務止給二人或有令其陳請者子熙曰朝廷自不給祭酒兵何關韓子熙事也論者高之尋除驃騎將軍元象中加衛大將軍先是子熙與弟聘王氏為妻姑之女也生二子子熙尚未婚後遂與寡嫗李氏姦合而生三子王李不穆迭相告言厯年不罷子熙因此慙恨遂以發疾興和中孝静欲行釋奠敕子熙為侍講尋卒遺戒不求贈諡其子不能遵奉遂至干謁武定初贈驃騎將軍儀同三司幽}
