  - {type: variant, offset: 102, length: 0, content: '', WYG: 魯陽男加伏波將軍父亡在喪有禮邦族稱之後參征南慕容白曜軍事進攻升城師人多傷及城潰白曜將坑之麒麟諌曰今始踐偽境方圖進取宜寛威厚惠以示賊人此韓信降范陽之計勍敵在前而便坑其衆恐自此以東將人各為守攻之難剋日乆師老外民乘之以生變故則三齊未易圖也白曜從之皆令復業齊人大悦後白曜表麒麟為冠軍將軍與房法壽對為冀州刺史白曜攻東陽麒麟上義租六十萬斛并攻戰器械於是軍資無乏及白曜被誅麒麟亦徴還停滯多年高祖時拜給事黄門侍郎乘傳招慰徐兖叛民歸順者四千餘家尋除冠軍將軍齊州刺史假魏昌侯麒麟在官寡於刑罰從事劉普慶説麒麟曰明公仗節方夏而無所斬戮何以示威麒麟曰刑罰所以止惡蓋不得已而用之今民不犯法何所戮乎若必湏斬斷以立威名當以卿應之普慶慙懼而退麒麟以新附之人未階臺宦士人沉抑乃表曰齊土自屬偽方歴載久遠舊州府寮動有數百自皇威開被幷職從省守宰闕任不聽土人監督竊惟新人未階朝宦州郡扄任甚少沉塞者多願言冠冕輕為去就愚謂守宰有闕宜推用豪望増置吏員廣延賢喆則華族蒙榮良才獲叙懐徳}
  - {type: page-break, offset: 102, content: '', id: KR2a0020_WYG_060-1b, image: WYG0261/WYG0261-0816b.png}
