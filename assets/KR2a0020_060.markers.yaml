  - {type: variant, offset: 568, length: 290, content: 始委以禮任遲能迂德匡贊於朕然高尚悠邈便爾言歸君臣之禮於斯而畢眷德思仁情何可已夫七十致仕典禮所稱位隆固辭賢者達節但季俗陵遲斯道弗繼卿獨秉冲操居今行古有魏以來首振頹俗進可以光我朝化退可以榮慰私門明根對曰臣桑榆之年鍾鳴漏盡蒙陛下之澤首領獲全待盡私庭下奉先帝陛下大恩臣之願也但犬馬之戀不勝悲塞因泣不自勝高祖命之令進言別殷勤仍為流涕賜青紗單衣委貌冠被褥錦袍等物其年以司徒尉元為三老明根為五更行禮辟雍語在元傳賜步挽一乘給上卿之祿供食之味太官就第月送之以定律令之勤賜布帛一千匹穀一千斛後明根歸廣平賜絹五百匹安車一乘馬二匹幄帳被褥車駕幸鄴明根朝于行宮詔曰游五更光素蓬簷歸終衡里可謂朝之舊德國之老成, WYG: 士}
