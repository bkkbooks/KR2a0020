  - {type: variant, offset: 2604, length: 930, content: 李敷妻司徒崔浩之弟女芳祖母浩之姑也芳至京師詣敷門崔芳流播拒不見之芳雖處窮窘之中而業尚貞固聰敏過人篤志墳典晝則傭書以自資給夜則讀誦終夕不寢至有易衣併日之弊而澹然自守不汲汲於榮利不慼慼於賤貧乃著窮通論以自慰焉芳常為諸僧傭寫經論筆迹稱善卷直以一縑歲中能入百餘匹如此數十年賴以頗振由是與德學大僧多有還往時有南方沙門惠度以事被責未幾暴亡芳因緣關知文明太后召入禁中鞭之一百時中官李豐主其始末知芳篤學有志行言之於太后太后微愧於心會蕭賾使劉纘至芳之族兄也擢芳兼主客郎與纘相接尋拜中書博士後與崔光宋弁邢產等俱為中書侍郎俄而詔芳與產入授皇太子經遷太子庶子兼員外散騎常侍從駕洛陽自在路及旋京師侍坐講讀芳才思深敏特精經義博聞強記兼覽蒼雅尤長音訓辨析無疑於是禮遇日隆賞賚豐渥正除員外散騎常侍俄兼通直常侍從駕南巡撰述行事尋而除正王肅之來奔也高祖雅相器重朝野屬目芳未及相見高祖宴羣臣於華林肅語次云古者唯婦人有笄男子則無芳曰推經禮正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此專謂凶事也禮初遭喪男子免時則婦人髽男子冠時則婦人笄言俱時變而男子婦人免髽冠笄之不同也又冠尊故奪其笄稱且互言也非謂男子無笄又禮內則稱子事父母雞初鳴櫛纚笄總以茲而言男子有笄明矣高祖稱善者久之肅亦以芳言為然曰此非劉石經邪昔漢世造三字石經於太學學者文字不正多往質焉芳音義明辨疑者皆往詢訪故時人號為劉石經酒闌芳與肅俱出肅執芳手曰吾少來留意三禮在南諸儒亟共討論皆謂此義如吾向言今聞往釋頓袪平生之惑芳理義精通類皆如是高祖遷洛路由朝歌見殷比干墓愴然悼懷為文以弔之芳為注解表上之詔曰覽卿注殊為富博但文非屈宋理慚張賈既有雅致便可付之集書詔以芳經學精洽超遷國子祭酒以母憂去官高祖南征宛鄧起為輔國將軍太尉長史從太尉咸陽王禧攻南陽蕭鸞將裴叔業入寇徐州疆埸之民頗懷去就高祖憂之以芳為散騎常侍國子祭酒徐州大中正行徐州事徙兼侍中從征馬圈高祖崩於行宮及世宗即位芳手加兗冕高祖自襲斂暨于啟祖山陵練除始末喪事皆芳撰定咸陽王禧等奉申遺旨令芳入授世宗經及南徐州刺史沈陵外叛徐州大水遣芳撫慰賑恤之尋正侍中祭酒中正並如故芳表曰夫為國家者罔不崇儒尊道學校為先誠復政有質文茲範不易諒由萬端資始衆務禀法故也唐虞已往典籍無據隆周以降, WYG: 乞効舊}
