  - {type: variant, offset: 3535, length: 1709, content: 居虎門周禮大司樂云師氏掌以糆詔王居虎門之左司王朝掌國中失之事以教國子弟蔡氏勸學篇云周之師氏居虎門左敷陳六藝以教國子今之祭酒即周師氏洛陽記國子學官與天子宮對太學在開陽門外案學記云古之王者建國親民教學為先鄭氏注云內則設師保以教使國子學焉外則有太學庠序之官由斯而言國學在內太學在外明矣案如洛陽記猶有仿像臣愚謂今既徙縣崧瀍皇居伊洛宮闕府寺僉復故趾至於國學豈可舛替校量舊事應在宮門之左至如太學基所炳在仍舊營構又去太和二十年發敕立四門博士於四門置學臣案自周已上學惟以二或尚西或尚東或貴在國或貴在郊爰暨周室學蓋有六師氏居內太學在國四小在郊禮記云周人養庶老於虞庠虞庠在國之四郊禮又云天子設四學當入學而太子齒注云四學周四郊之虞庠也案大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴德帝入北學尚貴而尊爵帝入太學承師而問道周之五學於此彌彰案鄭注學記周則六學所以然者注云內則設師保以教使國子學焉外則有太學庠序之官此其證也漢魏已降無復四郊謹尋先旨宜在四門案王肅注云天子四郊有學去王都五十里考之鄭氏不云遠近今太學故坊基趾寬曠四郊別置相去遼闊檢督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌且今時制置多循中代未審四學應從古不求集名儒禮官議其定所從之遷中書令祭酒如故出除安東將軍青州刺史為政儒緩不能禁止姦盜廉清寡欲無犯公私還朝議定律令芳斟酌古今為大議之主其中損益多芳意也世宗以朝儀多闕其一切諸議悉委芳修正於是朝廷吉凶大事皆就諮訪焉轉太常卿芳以所置五郊及日月之位去城里數於禮有違又靈星周公之祀不應隸太常乃上疏曰臣聞國之大事莫先郊祀郊祀之本實在審位是以列聖格言彪炳綿籍先儒正論昭著經史臣學謝全經業乖通古豈可輕薦瞽言妄陳管說竊見所置壇祠遠近之宜考之典制或未允衷既曰職司請陳膚淺孟春令云其數八又云迎春於東郊盧植云東郊八里之郊也賈逵云東郊木帝太昊八里許慎云東郊八里郊也鄭玄孟春令注云王居明堂禮曰王出十五里迎歲蓋殷禮也周禮近郊五十里鄭玄別注云東郊去都城八里高誘云迎春氣於東方八里郊也王肅云東郊八里因木數也此皆同謂春郊八里之明據也孟夏令云其數七又云迎夏於南郊盧植云南郊七里郊也賈逵云南郊火帝炎帝七里許慎云南郊七里郊也鄭玄云南郊去都城七里高誘云南郊七里之郊也王肅云南郊七里因火數也此又南郊七里之審據也中央令云其數五盧植云中郊五里之郊也賈逵云中兆黃帝之位并南郊之季故云兆五帝於四郊也鄭玄云中郊西南未地去都城五里此又中郊五里之審據也孟秋令云其數九又曰迎秋於西郊盧植云西郊九里郊賈逵云西郊金帝少皡九里許慎云西郊九里郊也鄭玄云西郊去都城九里高誘云西郊九里之郊也王肅云西郊九里因金數也此又西郊九里之審據也孟冬令云其數六又云迎冬於北郊盧植云北郊六里郊也賈逵云北郊水帝顓頊六里許慎云北郊六里郊也鄭玄云北郊去都城六里高誘云北郊六里之郊也王肅云北郊六里因水數也此又北郊六里之審據也宋氏含文嘉注云周禮王畿千里二十分其一以為近郊近郊五十里倍之為遠郊迎王氣蓋於近郊漢不設王畿則以其方數為郊處故東郊八里南郊七里西郊九里北郊六里中郊在西南未地五里祭祀志云建武二年正月初制郊兆於雒陽城南七里依採元始中故事北郊在雒陽城北四里此又漢世南北郊之明據也今地祇準此至如三十里之郊進乖鄭玄所引殷周二代之據退違漢魏所行故事凡邑外曰郊今計四郊各以郭門為限里數依上禮朝拜日月皆於東西門外今日月之位去城東西路各三十竊又未審禮又云祭日於壇祭月於坎今計造如上禮儀志云立高禖祠于城南不云里數故今仍舊靈星本非禮事兆自漢初專為祈田隸郡縣郊祀志云高祖五年制詔御史其令天下立靈星祠牲用太牢縣邑令長侍祠晉祠令云郡縣國祠稷社先農縣又祠靈星此靈星在天下諸縣之明據也周公廟所以別在洛陽者蓋姬旦創成洛邑故傳世洛陽崇祠不絕以彰厥庸夷齊廟者亦世為洛陽界內神祠今並移太常恐乖其本天下此類甚衆皆當部郡縣修理公私於之禱請竊惟太常所司郊廟神祇自有常限無宜臨時斟酙以意若遂爾妄營則不免淫祀二祠在太常在洛陽於國一也然貴在審本臣以庸蔽謬忝今職考括墳籍博採羣議既無異端謂粗可依據今玄冬務隙野罄人閑遷易郊壇二三為便詔曰所上乃有明據但先朝置立已久且可從舊先是高祖於代都詔中書監高閭太常少卿陸琇并公孫崇等十餘人修理金石及八音之器後崇為太樂令乃上請尚書, WYG: ''}
