  - {type: variant, offset: 105, length: 0, content: '', WYG: 女計口受田宰司四時巡行臺使嵗一按檢勤相勸課嚴加賞罰數年之中必有盈贍雖遇災凶免於流亡矣往年校比戸貫租賦輕少臣所統齊州租粟纔可給俸略無入倉雖於民為利而不可長乆脱有戎役或遭天災恐供給之方無所取濟可减絹布増益穀租年豐多積嵗儉出賑所謂私民之穀寄積於官官有宿積則民無荒年矣十二年春卒於官年五十六遺敕其子殯以素棺事從儉約麒麟立性恭愼恒置律令於坐傍臨終之日唯有俸絹數十匹其清貧如此贈散騎常侍安東將軍燕郡公諡曰康長子興宗字茂先好學有文才年十五受道太學後司空高允奏為祕書郎參著作事中山王叡貴寵當世闕為文遷祕書中散太和十四年冬卒贈}
