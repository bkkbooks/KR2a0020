  - {type: variant, offset: 191, length: 6, content: 都督兗州諸軍, WYG: 持節如高麗迎女賜布帛百疋駿至平壤城或勸璉曰魏昔與燕婚既而伐之由行人具其夷險故也今若送女恐不異於馮氏璉遂謬言女喪駿與璉往復經年責璉以義方璉不勝其忿遂斷駿從者酒食璉欲逼辱之憚而不敢害㑹顯祖崩乃還拜祕書令初遷神主于太廟有司奏舊}
