  - {type: variant, offset: 115, length: 5, content: 敬慎每嗟美, WYG: 逾深逾厲去其本宅移住殿西闔門静守親賔阻絶于時吏部諮禀劉騰奏其弟官郡戍兼補及經内呈為王駮退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宫栲闕胡定誣王行毒含齒戴髪莫不悲惋及㑹公卿議王}
  - {type: variant, offset: 115, length: 5, content: 敬慎每嗟美, krp: 逾深逾厲去其本宅移住殿西闔門静守親賔阻絶于時吏部諮禀劉騰奏其弟官郡戍兼補及經内呈為王駮退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宫栲闕胡定誣王行毒含齒戴髪莫不悲惋及㑹公卿議王}
