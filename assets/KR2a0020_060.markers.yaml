  - {type: variant, offset: 8043, length: 328, content: 稍遷伏波將軍羽林監彥植恭慎長厚為時所稱時滎陽鄭演仕劉彧為琅邪太守屬徐州刺史薛安都將謀內附演贊成其事顯祖初入朝以功除冠軍將軍彭城太守洛陽侯後拜太中大夫改爵雲陽伯卒贈幽州刺史諡曰懿其子孫因此遂家彭泗子長猷以父勳起家拜寧遠將軍東平太守尋轉沛郡入為南主客郎中太尉屬襲爵雲陽伯車駕南伐既克宛城拜長猷南陽太守及鑾輿將反詔長猷曰昔曹公克荊州留滿寵於後朕今委卿此郡兼統戎馬非直綏初附以扞城相託特賜縑二百匹高祖崩於南陽斂於其郡尋徵護軍長史世宗初壽春歸發兼給事黃門侍郎持節宣慰及任城王為揚州刺史詔長猷為諮議參軍帶安豐太守轉徐州武昌王府長史帶彭城內史徵拜諫議大夫轉司徒諮議遷通直散騎常侍永平五年卒諡曰貞侯子廓襲卒子元休襲興和中睢州刺史齊受禪爵例降元休弟憑字元祐武定中司徒從事中郎, WYG: ''}
