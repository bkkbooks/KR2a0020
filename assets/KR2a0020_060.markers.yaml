  - {type: variant, offset: 412, length: 0, content: '', WYG: 當正直而凖古典安可依附暫時舊事乎賜駿衣一襲帛二百匹駿又表曰春秋有云見有禮於其君者若孝子之養父母見無禮於其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳恒殺君宣尼}
  - {type: page-break, offset: 412, content: '', id: KR2a0020_WYG_060-21a, image: WYG0261/WYG0261-0826a.png}
  - {type: variant, offset: 412, length: 0, content: '', krp: 當正直而凖古典安可依附暫時舊事乎賜駿衣一襲帛二百匹駿又表曰春秋有云見有禮於其君者若孝子之養父母見無禮於其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳恒殺君宣尼}
  - {type: variant, offset: 413, length: 1, content: 公, WYG: 討雖欲晏逸其得已乎今廟算天回七州雲動將水蕩鯨鯢陸掃凶逆然戰貴不陳兵家所美宜先遣劉昶招喻淮南若應聲響悦同心齊舉則長江之險可朝服而濟道成之首可崇朝而懸茍江南之輕薄背劉氏之恩義則曲在彼矣何負神明哉直義檄江南振旅囘斾亦足以示救患之大仁揚義風於四海且攻難守易則力懸百倍不可不深思不可不熟慮今天下雖謐方外猶虞拾夤僥倖於西南狂虜伺釁於漠北脱攻不稱心恐兵不卒解兵不卒解則憂慮逾深夫為社稷之計者莫不先於守本臣愚以為觀兵江滸振曜皇威宜特加撫慰秋毫無犯則民知徳信民知徳信則襁負而來襁負而來則淮北可定淮北可定則吳宼異圖宼圖異則禍釁出然後觀釁而動則不晚矣請停諸州之兵且待後舉所謂守本者也伏惟陛下太皇太后英算神規彌綸百勝之外應機體變獨悟方寸之中臣影頽虞淵昬耄將及雖思憂國終無云補不從沙門法秀謀反伏誅駿表曰臣聞詩之作也蓋以言志邇之事父遠之事君關諸風俗靡不備焉上可以頌美聖徳下可以申厚風化言之者無罪聞之者足以誡此古人用詩之本意臣以垂没之年得逢盛明之運雖復昬耄將及猶慕廉頗强飯之風伏惟陛下太皇太后道合天地明侔日月則天與唐風斯穆順帝與周道通靈是以狂妖懷逆無隱謀之地㝠靈潛翦伏發覺之誅用能七廟幽贊人神扶助者已臣不勝喜躍謹竭老鈍之思上慶國頌十六章幷序巡狩甘雨之徳焉其頌曰乾徳不言四時迭序於皇大魏則天承祜疊聖三宗重明四祖豈伊殷周遐契三五明明在上聖敬日新汪汪叡后體治垂仁徳從風穆教與化津千載昌運道隆兹辰嵗惟巡狩應運遊田省方問苦訪政高年咸秩百靈柴望山川誰云禮滯遇聖則宣王業初定中山是由臨幸之盛情特綢繆仰歌祖業俯欣春柔大哉肆眚蕩民百憂百憂既蕩與之更初邕邕億兆户詠來蘇忽有狂豎謀逆聖都明靈幽告發覺伏誅羿浞為亂祖龍干紀狂華冬茂有自來矣美哉皇度道固千祀百靈潛翦姦不遑起姦不遑起罪人得情憲章刑律五秩猶輕於穆二聖仁等春生}
