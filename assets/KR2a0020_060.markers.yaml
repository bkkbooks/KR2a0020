  - {type: variant, offset: 103, length: 1, content: 樂, WYG: 土庶或在兹朝議從之太和十一年京都大饑麒麟表陳時務曰古先哲王經國立治積儲九稔謂之太平故躬籍千畝以勵百姓用能衣食滋茂禮敎興行逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞實百王之常軌為治之所先今京師民庶不田者多逰食之口三分居二蓋一夫不耕或受其飢況於今者動以萬計故頃年山東遭水而民有餒終今秋京都遇旱穀價踊貴實由農人不勸素無儲積故也伏惟陛下天縱欽明道高三五昧旦憂勤思恤民敝雖帝虞一日萬幾周文昃不暇食蔑以為喻上垂覆載之澤下有凍餒之人皆由有司不為明制長吏不恤其本自承平日乆豐穰積年競相矜夸遂成侈俗車服第宅奢僭無限喪葬婚娶為費實多貴富之家童妾袨服工商之族玉食錦衣農夫餔糟糠蠶婦乏短褐故令耕者日少田有荒蕪穀帛罄於府庫寶貨盈於市里衣食匱於室麗服溢於路飢寒之本實在於斯愚謂凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴賤有别民歸朴素制天下}
