  - {type: variant, offset: 114, length: 0, content: '', WYG: 子性若青蠅汙白點黒䜛侫是務以元义皇姨之壻權勢攸歸遂相附託規求榮利共結圖謀坐生眉眼誣告國王枉以大逆頼明明在上赫赫臨下泥漬自消玉質還潔謹案律文諸告事不實以其罪罪之維遂無罪出為大郡刑賞僭差朝野怪愕若非宋維與义為計豈得全其身命方撫千里王以權在寵家塵謗紛雜恭慎之}
