  - {type: variant, offset: 6529, length: 1513, content: 散騎侍郎出補徐州開府從事中郎父廞之死騭率勒鄉部赴兗州與刺史樊子鵠抗禦王師每戰流涕突陳城陷擒送晉陽齊獻武王矜而赦之文襄王之為儀同開府以騭為屬本州大中正武定初轉中書舍人加安東將軍於時與蕭衍和通騭前後受敕接對其使十六人出為司徒右長史未幾遷左長史六年受使兗州行達東郡暴疾卒時人嗟惜之追贈本將軍南青州刺史廞弟悅永安中開府記室悅弟戫武定中鎮南將軍金紫光祿大夫戫弟粹州別駕朱衣直閤粹少尚氣俠兄廞死粹招合部曲就兗州刺史樊子鵠謀應關西大將軍攻討城陷殺之芳叔撫之孫思祖勇健有將略高祖末入朝歷羽林監梁沛二郡太守員外常侍屢為統軍南征累著功捷任城王之圍鍾離也蕭衍遣其冠軍將軍張惠紹及彭張豹子等率衆一萬送糧鍾離時思祖為平遠將軍領兵數千邀衍餉軍於邵陽遣其長史元龜步騎一千於鍾離之北遏其前鋒錄事參軍繆琰掩其後思祖身率精銳橫衝其陳三軍合擊大破之擒惠紹及衍驍騎將軍祁陽縣開國男趙景悅悅弟寧遠將軍景脩寧遠將軍梅世和屯騎校尉任景攸長水校尉邊欣越騎校尉賈慶真龍驤將軍徐敞等俘斬數千人尚書論功擬封千戶侯思祖有二婢美姿容善歌舞侍中元暉求之不得事遂停寢後除揚烈將軍遼西太守思祖於路叛奔蕭衍衍以思祖為輔國將軍北徐州刺史頻寇淮北數年而死纘子晰歷蕭衍琅邪東莞二郡太守戍朐山朐山人王萬壽斬晰送首以朐山內附并晰子翐於京師數年後以翐為給事中汝陽太守正光初自郡南叛芳從子懋字仲華祖泰之父承伯仕於劉彧並有名位懋聰敏好學博綜經史善草隸書多識奇字世宗初入朝拜員外郎遷尚書外兵郎中加輕車將軍芳甚重之凡所撰制朝廷軌儀皆與參量尚書博議懋與殿中郎袁翻常為議主達於從政臺中疑事咸所訪決受詔參議新令性沉雅厚重善與人交器宇淵曠風流甚美時論高之尚書李平與之結莫逆之友遷步兵校尉領郎中兼東宮中舍人轉員外常侍鎮遠將軍領考功郎中立考課之科明黜陟之法甚有條貫肅宗初大軍攻硤石懋為李平行臺郎中城拔懋頗有功太傅清河王懌愛其風雅常目而送之曰劉生堂堂搢紳領袖若天假之年必為魏朝宰輔詔懋與諸才學之士撰成儀令懌為宰相積年禮懋尤重令諸子師之遷太尉司馬熙平二年冬暴病卒家甚清貧亡之日徒四壁而已太傅懌及當時才儁莫不痛惜之贈持節前將軍南秦州刺史諡曰宣簡懋詩誄賦頌及諸文筆見稱於時又撰諸器物造作之始十五卷名曰物祖子筠字士貞自員外散騎侍郎歷河南郡丞中散大夫徐州大中正祕書丞天平初卒贈前將軍徐州刺史子規早卒筠弟籭字士文少而聰惠年十二詣尚書王衍衍與語大奇之遂與太傅李延寔祕書李凱上疏薦之拜祕書郎籭亦善士興和元年卒年二十八無子兄子矩繼懋從叔元孫養志丘園不求聞達高祖幸彭城起家拜蘭陵太守治以清靜為名卒官子長文高祖擢為南兗州冠軍府長史帶譙郡太守被圍糧竭固節全城以功賜爵下邑子遷魯郡太守高祖為太子恂納其女為孺子卒子敬先襲爵敬先弟徽奉朝請徐州治中長文弟永字履南頗有將略累著征戰之勤歷位中散大夫龍驤將軍神龜中兼大鴻臚卿持策拜高麗王安還除范陽太守芳族兄僧利輕財通俠甚得鄉情高祖幸徐州引見善之拜徐州別駕遷沛郡太守後遂從容鄉里不樂臺官積十餘年朝議慮其有二志徵拜輕車將軍羽林監卒官長子世雄至太山太守世雄弟世明字伯楚頗涉書傳自奉朝請稍遷蘭陵太守彭城內史屬刺史元法僧以城外叛遂送蕭衍衍欲加封爵世明固辭不受頻請衍乞還衍聽之肅宗時徵為諫議大夫孝莊末除征虜將軍南兗州刺史時尒朱世隆等威權自己四方怨叛城民王乞得逼劫世明據州歸蕭衍衍封世明開國縣侯食邑千戶征西大將軍郢州刺史又加儀同三司世明復辭不受固請北歸衍不奪其意乃躬餞之於樂遊苑世明既還奉送所持節身歸鄉里自是不復入朝常以射獵為適興和三年卒於家贈驃騎大將軍儀同三司徐州刺史子禕字彥英武定末冠軍將軍中散大夫初蘭陵繆儼靈奇與彭城劉氏才望略等及彭城內附靈奇弟子承先隨薛安都至京師賜爵襄賁子尋還徐州數十年間了無從官者世宗末承先子彥植襲爵見, WYG: ''}
