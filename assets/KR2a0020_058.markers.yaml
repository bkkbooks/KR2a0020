  - {type: variant, offset: 773, length: 0, content: '', WYG: 寡弱始加招募将從滏口而入值尒朱兆等便已剋洛相州刺史李神等議欲與津舉城通欵津不從以子逸既為光州刺史兄子昱時為東道行臺鳩率部曲在於梁沛津規欲東轉更為方略乃率輕騎望於濟州渡河而尒朱仲逺已陷東郡所圖不遂乃還京師普泰元年亦遇害於洛時年六十三太昌初贈都督秦華雍三州諸軍事大将軍太傅雍州刺史諡曰孝穆将葬本鄉詔大鴻臚持節監䕶喪事津有六子長子遁字山才其家貴顯諸子弱冠咸縻王爵而遁性澹退年近三十方為鎮西府主簿累遷尚書郎荘帝北廵奉詔慰勞山東車駕入洛除尚書左丞又為光祿大夫仍左丞永安末父津受委河北兼黄門郎詣鄴參行省事尋遷征東将軍金紫光祿大夫亦被害於洛時年四十二太昌初贈車騎大将軍儀同三司幽州刺史諡曰恭定遁弟逸字遵道有當世才度起家員外散騎侍郎以功賜爵華隂男轉給事中父津在中山為賊攻逼逸請使於爾朱榮徵師赴救詔許之建義初荘帝猶在河陽逸獨往謁帝特除給事黄門侍郎領中書舍人及朝士濫禍帝益憂怖詔逸晝夜陪侍數日之内常寝宿於御牀前帝曽夜中謂逸曰昨來舉目唯見異人頼得卿差以自慰尋除吏部郎中出為平西将軍南秦州刺史加散騎常侍時年二十九於時方伯之少未有先之者仍以路阻不行改除平東将軍光州刺史逸折節綏撫乃心民務或日昃不食夜分不寝至於兵人從役必親自送之或風日之中雨雪之下人不堪其勞逸曽無倦色又法令嚴眀寛猛相濟於是合境肅然莫敢干犯時災儉連歲人多餓死逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為命百姓不足君孰與足假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅以下謂公儲難闕並執不許尚書令臨淮王彧以為宜貸二萬詔聼二萬逸既出粟之後其老小殘疾不能自存活者又於州門煮粥飯之将死而得濟者以萬數帝聞而善之逸為政愛人尤憎豪猾廣設耳目其兵吏出使下邑皆自持糧人或為設食者雖在闇室終不進咸言楊使君有千里眼那可欺之在州政績尤羙及其家禍尒朱仲逺遣使扵州害之時年三十二吏人如喪親戚城邑村洛為營齋供一月之中所在不絶太昌初贈都督豫郢二州諸軍事衞將軍尚書僕射豫州刺史諡曰貞逸弟謐字遵智辟太尉行參軍厯員外散騎常侍以功賜爵𢎞農伯鎮軍将軍金紫光祿大夫衞将軍在晉陽為尒朱兆所害太昌初贈驃騎将軍兗州刺史謐弟遵彦武定中吏部尚書華隂縣開國侯津弟暐字延季性雅厚頗有文學起家奉朝請稍遷散騎侍郎直閤将軍本州大中正兼武衛将軍尚食典御孝昌初正武衞将軍加散騎常侍安南將軍荘帝初遇害扵河隂贈衞將軍儀同三司雍州刺史子元讓武定末尚書祠部郎中播家世純厚並敦義讓昆季相事有如父子播剛毅椿津恭謙與人言自稱名字兄弟旦則聚於廰堂終日相對未曾入内有一羙味不集不食廰堂間往往幃幔隔障為寝息之所時就休偃還共談笑椿年老曾他處醉歸津扶侍還室仍假寐閤前承候安否椿津年過六十並登台鼎而津嘗旦暮參問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還}
