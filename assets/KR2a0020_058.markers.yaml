  - {type: variant, offset: 2876, length: 381, content: 其見委遇乃至於此是用寵以元凱爵以公侯詔冊曰江陽之巡奇謀屢進六師大捷亦有勳焉出內勤王寵遇隆厚方開大賞而世祖登遐梓宮始遷外任名岳高宗沖年纂運未及追臣行舛百靈先臣棄世微績未甄誠志長奪搢紳僉傷早世朝野咸哀不永臣亡兄襲無子封除永惟宗構五情崩圮先臣榮寵前朝勳書王府同之常倫爵封堙墜準古量今實深荼苦竊惟朝例廣川王遵太原公元大曹等並以勳重先朝世絕繼祀或以傍親或聽弟襲皆傳河山之功垂不世之賞況先臣在蒙委任運籌幃帟勳著於中聲傳於外事等功均今古無易是以漢賞信布裁重良平魏酬張徐不棄荀郭今數族追賞於先朝之世先臣絕封於聖明之時瞻流顧侶存亡永恨竊見正始中爰發存亡之詔褒賢報功之旨熙平元年故任城王澄所請十事復新前澤成一時之盛事垂曠代之茂典凡在纓紱誰不感慶蓋以奬勸來今垂範萬古且劉氏偽書翻流上國尋其訕謗百無一實前後使人不書姓字亦無名爵至於張暢傳中略先臣對問雖改脫略盡自欲矜高然逸韻難虧猶見稱載非, WYG: 通}
