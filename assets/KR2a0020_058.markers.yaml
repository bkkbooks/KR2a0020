  - {type: variant, offset: 3500, length: 1472, content: 中書學生安世年十一高宗見其尚小引問之安世陳說父祖甚有次第即以為學生高宗每幸國學獨被引問詔曰汝但守此至大不慮不富貴居父憂以孝聞天安初拜中散以溫敏敬慎顯祖親愛之累遷主客令蕭賾使劉纘朝貢安世美容貌善舉止纘等自相謂曰不有君子其能國乎纘等呼安世為典客安世曰三代不共禮五帝各異樂安足以亡秦之官稱於上國纘曰世異之號凡有幾也安世曰周謂掌客秦改典客漢名鴻臚今曰主客君等不欲影響文武而殷勤亡秦纘又指方山曰此山去燕然遠近安世曰亦由石頭之於番禺耳國家有江南使至多出藏內珍物令都下富室好容服者貨之令使任情交易使至金玉肆問價纘曰北方金玉大賤當是山川所出安世曰聖朝不貴金玉所以賤同瓦礫又皇上德通神明山不愛寶故無川無金無山無玉纘初將大市得安世言慚而罷遷主客給事中時民困飢流散豪右多有占奪安世乃上疏曰臣聞量地畫野經國大式邑地相參致治之本井稅之興其來日久田萊之數制之以限蓋欲使土不曠功民罔游力雄擅之家不獨膏腴之美單陋之夫亦有頃畝之分所以恤彼貧微抑茲貪欲同富約之不均一齊民於編戶竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事涉數世三長既立始返舊墟廬井荒毀桑榆改植事已歷遠易生假冒強宗豪族肆其侵凌遠認魏晉之家近引親舊之驗又年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑爭訟遷延連紀不判良疇委而不開柔桑枯而不採僥倖之徒興繁多之獄作欲令家豐歲儲人給資用其可得乎愚謂今雖桑井難復宜更均量審其徑術令分藝有準力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均於兆庶如阜如山可有積於比戶矣又所爭之田宜限年斷事久難明悉屬今主然後虛妄之民絕望於覬覦守分之士永免於凌奪矣高祖深納之後均田之制起於此矣出為安平將軍相州刺史假節趙郡公敦勸農桑禁斷淫祀西門豹史起有功於民者為之修飾廟堂表薦廣平宋翻陽平路恃慶皆為朝廷善士初廣平人李波宗族強盛殘掠生民前刺史薛道襀親往討之波率其宗族拒戰大破襀軍遂為逋逃之藪公私成患百姓為之語曰李波小妹字雍容褰裙逐馬如卷蓬左射右射必疊雙婦女尚如此男子那可逢安世設方略誘波及諸子姪三十餘人斬于鄴市境內肅然以病免太和十七年卒于家安世妻博陵崔氏生一子瑒崔氏以妬悍見出又尚滄水公主生二子謐郁瑒字琚羅涉歷史傳頗有文才氣尚豪爽公強當世延昌末司徒行參軍遷司徒長兼主簿太師高陽王雍表薦瑒為其友正主簿于時民多絕戶而為沙門瑒上言禮以教世法導將來跡用既殊區流亦別故三千之罪莫大不孝不孝之大無過於絕祀然則絕祀之罪重莫甚焉安得輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶須裁之以禮一身親老棄家絕養既非人理尤乖禮情堙滅大倫且闕王貫交缺當世之禮而求將來之益孔子云未知生焉知死斯言之至亦為備矣安有棄堂堂之政而從鬼教乎又今南服未靜衆役仍煩百姓之情方多避役若復聽之恐捐棄孝慈比屋而是沙門都統僧暹等忿瑒鬼教之言以瑒為謗毀佛法泣訴靈太后太后責之瑒自理曰竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毀且鬼神之名皆通靈達稱自百代正典三皇五帝皆號為鬼天地曰神祇人死曰鬼易曰知鬼神之情狀周公自美亦云能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼教佛非天非地本出於人應世導俗其道幽隱名之為鬼愚謂非謗且心無不善以佛道為教者正可未達衆妙之門耳靈太后雖知瑒言為允然不免暹等之意猶罰瑒金一兩轉尚書郎加伏波將軍隨蕭寶夤西征以瑒為統軍假寧遠將軍瑒德洽鄉閭招募雄勇其樂從者數百騎瑒傾家賑恤率之西討寶夤見瑒至乃拊瑒肩曰子遠來吾事辦矣故其下每有戰功軍中號曰李公騎寶夤又啟瑒為左丞仍為別將軍機戎政皆與參決寶夤又啟為中書侍郎還朝除鎮遠將軍岐州刺史坐辭不赴任免官建義初於河陰遇害時年四十五初贈鎮東將軍尚書右僕射殷州刺史太昌中重贈, WYG: ''}
