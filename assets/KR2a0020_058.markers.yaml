  - {type: variant, offset: 63, length: 0, content: '', WYG: 始即為上客給田宅賜奴婢馬牛羊遂成富室自爾至今二十年二千石方伯不絶祿恤甚多至於親姻知故吉凶之際必厚加贈襚來往賓寮必以酒肉飲食是故親姻朋友無憾焉國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾恒見翁著布衣韋帶常約敕諸父曰汝等後世脫若富貴於今日者慎勿積金一斤綵帛百匹已上用為富也又不聼治生求利又不聼與勢家作婚姻至吾兄弟不能遵奉今汝等服乗以漸華好吾是以知恭儉之徳漸不如上世也又吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍别食也又願畢吾兄弟世不異居異財汝等眼見非為虚假如聞汝等兄弟時有别齋獨食者此又不如吾等一世也吾今日不為貧賤然居住舍宅不作壮麗華飾者正慮汝等後世不賢不能保守之方為勢家所奪北都時朝法嚴急太和初吾兄弟三人並居内}
