  - {type: variant, offset: 287, length: 4, content: 賜爵南昌, WYG: 儀同開府司徒太保津今復為司空者正由忠貞小心謹慎口不嘗論人過無貴無賤待之以禮以是故至此耳聞汝等學時俗人乃有坐而待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來髙祖以下乃有七郡太守三十二州刺史内外顯職時流少比汝等若能存禮節不為奢淫憍慢假不勝人足免尤誚足成名家吾今年始七十五自惟氣力尚堪朝覲天}
