  - {type: variant, offset: 791, length: 97, content: 將常事宜當以法裁物何用發橋杜門窮城之中復何以十萬誇大我亦有良馬百萬復可以此相矜暢曰王侯設險何但法令而已也我若誇君當言百萬所以言十萬者正是二王左右素所畜養者耳此城內有數州士庶工徒營伍猶所未論我本鬬, WYG: 皆引寮佐}
