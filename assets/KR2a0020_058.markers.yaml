  - {type: variant, offset: 43, length: 2, content: 教授, krp: 實答之云無修白捺意而侃曰白捺小城本非形勝邃好小黠令集兵遣移虚搆是言得無有别圖也稚深悟之乃云錄事可造移報侃移曰彼之纂兵想别有意何}
  - {type: variant, offset: 46, length: 4, content: 業郡三辟, WYG: 妄構白捺也他人有心予忖度之勿謂秦無人也邃得移謂已知覺便爾散兵𤓰花等以期契不㑹便相告發伏辜者十數家邃後竟襲夀春入羅城而退遂列營於㴝漿梁城日夕鈔掠稚乃奏侃為統軍侃叔椿為雍州刺史又請為其府錄事參軍帶長安令府州之務多所委決及蕭寶夤等軍敗北地}
  - {type: variant, offset: 46, length: 4, content: 業郡三辟, krp: 妄構白捺也他人有心予忖度之勿謂秦無人也邃得移謂已知覺便爾散兵𤓰花等以期契不㑹便相告發伏辜者十數家邃後竟襲夀春入羅城而退遂列營於㴝漿梁城日夕鈔掠稚乃奏侃為統軍侃叔椿為雍州刺史又請為其府錄事參軍帶長安令府州之務多所委決及蕭寶夤等軍敗北地}
