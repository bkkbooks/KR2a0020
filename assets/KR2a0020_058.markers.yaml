  - {type: punctuation, offset: 5502, content: 、, id: KR2a0020_ZHSJ_058-bkkpn1312}
  - {type: variant, offset: 5502, length: 788, content: 三十家方為一戶沖以三正治民所由來遠於是創三長之制而上之文明太后覽而稱善引見公卿議之中書令鄭羲祕書令高祐等曰沖求立三長者乃欲混天下一法言似可用事實難行羲又曰不信臣言但試行之事敗之後當知愚言之不謬太尉元丕曰臣謂此法若行於公私有益咸稱方今有事之月校比民戶新舊未分民必勞怨請過今秋至冬閑月徐乃遣使於事為宜沖曰民者冥也可使由之不可使知之若不因調時百姓徒知立長校戶之勤未見均徭省賦之益心必生怨宜及課調之月令知賦稅之均既識其事又得其利因民之欲為之易行著作郎傅思益進曰民俗既異險易不同九品差調為日已久一旦改法恐成擾亂太后曰立三長則課有常準賦有分苞蔭之戶可出僥倖之人可止何為而不可羣議雖有乖異然惟以變法為難更無異義遂立三長公私便之遷中書令加散騎常侍給事中如故尋轉南部尚書賜爵順陽侯沖為文明太后所幸恩寵日盛賞賜月至數千萬進爵隴西公密致珍寶御物以充其第外人莫得而知焉沖家素清貧於是始為富室而謙以自牧積而能散近自姻族逮于鄉閭莫不分及虛己接物垂念羇寒衰舊淪屈由之躋者亦以多矣時以此稱之初沖兄佐與河南太守來崇同自涼州入國素有微嫌佐因緣成崇罪餓死獄中後崇子護又糾佐贓罪佐及沖等悉坐幽繫會赦乃免佐甚銜之至沖寵貴綜攝內外護為南部郎深慮為沖所陷常求退避而沖每慰撫之護後坐贓罪懼必不濟沖乃具奏與護本末嫌隙原恕之遂得不坐沖從甥陰始孫孤貧往來沖家至如子姪有人求官因其納馬於沖始孫受輒而不為言後假方便借沖此馬馬主見沖乘馬而不得官後乃自陳始末沖聞之大驚執始孫以狀款奏始孫坐死其處要自厲不念愛惡皆此類也是時循舊王公重臣皆呼其名高祖常謂沖為中書而不名之文明太后崩後高祖居喪引見待接有加及議禮儀律令潤飾辭旨刊定輕重高祖雖自下筆無不訪決焉沖竭忠奉上知無不盡出入憂勤形於顏色雖舊臣戚輔莫能逮之無不服其明斷慎密而歸心焉於是天下翕然及殊方聽望咸宗奇之高祖亦深相杖信親敬彌甚君臣之間情義莫二及改置百司開建五等以沖參定典式封滎陽郡開國侯食邑, WYG: ''}
