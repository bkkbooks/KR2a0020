  - {type: variant, offset: 43, length: 2, content: 教授, WYG: 實答之云無修白捺意而侃曰白捺小城本非形勝邃好小黠令集兵遣移虚搆是言得無有别圖也稚深悟之乃云錄事可造移報侃移曰彼之纂兵想别有意何}
