  - {type: variant, offset: 1871, length: 329, content: 人故為前驅引導耳大軍未至而河冰向合玄謨量宜反旆未為失算但因夜回歸致戎馬驚亂耳我家懸瓠小城陳憲小將魏帝傾國攻圍累旬不克胡盛之偏裨小帥衆無三旅始濟翮水魏國君臣奔散僅得免脫滑臺之師無所多愧鄒山小戍雖有微險河畔之民多是新附始慕政化姦盜未息示使崔邪利撫之而已今雖陷沒何損於國魏帝自以十萬之師而制一崔邪利乃復足言也近聞蕭縣百姓並依山險聊遣馬文恭以十隊迎之耳文恭前以三隊出還走彼大營嵇玄敬以百舸至留城魏軍奔敗輕敵致此亦非所卹王境人民列居河畔二國交兵當互加撫養而魏師入境事生意外官不負民民亦何怨知入境七百里無相捍拒此自上由太尉神算次在武陵聖略軍國之要雖不預聞然用兵有機間亦不容相語孝伯曰君藉此虛談支離相對可謂遁辭知其所窮且主上當不圍此城自率衆軍直造瓜步南事若辦城故不待攻圍南, WYG: 道}
