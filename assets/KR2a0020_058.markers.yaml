  - {type: page-break, offset: 26, content: '', id: KR2a0020_WYG_058-1b, image: WYG0261/WYG0261-0783d.png}
  - {type: variant, offset: 26, length: 0, content: '', krp: 太守有稱績高祖南廵吏人頌之加寧逺将軍賜帛三百匹徵為選部給事中有}
  - {type: variant, offset: 27, length: 1, content: 順, WYG: 平之譽除安南将軍洛州刺史未之任而卒贈以本官加𢎞農公諡曰簡播本字元休太和中高祖賜改焉母王氏文明太后之外姑播少修整奉養盡禮擢為中散累遷給事領中起部曹以外親優賜亟加前後萬計進北部給事中詔播廵行北邊高祖親送及戸戒以軍略未幾除龍驤将軍員外常侍轉衞尉少卿常侍如故與陽平王頤等出漠北擊蠕蠕大獲而還高祖嘉其勲賜奴婢十口遷武衞将軍復擊蠕蠕至居然山而還除左将軍尋假前将軍隨車駕南討至鍾離師回詔播領步卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴陳南岸身自居後諸軍渡盡賊衆遂集於是圍播乃為圓陳以禦之身自搏擊斬殺甚多相拒再宿軍人食盡賊圍更急高祖在北而望之既無舟船不得救援水勢稍減播領精騎三百歴其舟船大呼曰今我欲渡能戰者來賊莫敢動遂擁衆而濟高祖甚壮之賜爵華隂子尋除右衞将軍後}
  - {type: page-break, offset: 27, content: '', id: KR2a0020_WYG_058-2a, image: WYG0261/WYG0261-0784a.png}
  - {type: page-break, offset: 27, content: '', id: KR2a0020_WYG_058-2b, image: WYG0261/WYG0261-0784b.png}
  - {type: variant, offset: 27, length: 1, content: 順, krp: 平之譽除安南将軍洛州刺史未之任而卒贈以本官加𢎞農公諡曰簡播本字元休太和中高祖賜改焉母王氏文明太后之外姑播少修整奉養盡禮擢為中散累遷給事領中起部曹以外親優賜亟加前後萬計進北部給事中詔播廵行北邊高祖親送及戸戒以軍略未幾除龍驤将軍員外常侍轉衞尉少卿常侍如故與陽平王頤等出漠北擊蠕蠕大獲而還高祖嘉其勲賜奴婢十口遷武衞将軍復擊蠕蠕至居然山而還除左将軍尋假前将軍隨車駕南討至鍾離師回詔播領步卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴陳南岸身自居後諸軍渡盡賊衆遂集於是圍播乃為圓陳以禦之身自搏擊斬殺甚多相拒再宿軍人食盡賊圍更急高祖在北而望之既無舟船不得救援水勢稍減播領精騎三百歴其舟船大呼曰今我欲渡能戰者來賊莫敢動遂擁衆而濟高祖甚壮之賜爵華隂子尋除右衞将軍後}
  - {type: variant, offset: 29, length: 5, content: 父弟父曾少, WYG: 駕討崔慧景蕭衍於鄧城破之進號平東将軍時車駕耀威沔水上已設宴高祖與中軍彭城王勰賭射左衞元遥在勰朋内而播居帝曹遥射侯正中籌限已滿高祖曰左衞籌足右衞不得不解播對曰仰恃聖恩庶㡬必争於是彎弓而發其箭正中高祖笑曰養由基之妙何復過是遂舉巵酒以賜播曰古人酒以養病朕今賞卿之能可謂今古之殊也從到懸瓠除太府卿進爵為伯景明初兼侍中使恒州贍恤寒乏轉左衞将軍出除安北将軍并州刺史固辭乃授安西將軍華州刺史至州借民田為御史王基所劾削除官爵延昌二年卒于家子侃等停柩不葬披訴積年至熙平中乃贈鎮西将軍雍州刺史并復其爵諡曰壮侃字士業頗愛琴書尤好計畫時播一門貴滿朝廷兒姪早通而侃獨不交逰公卿罕有識者親朋勸其出仕侃曰茍有良田何憂晚歲但恨無才具耳年三十一襲爵華隂伯釋褐太尉汝南王悅騎兵叅軍揚州刺史長孫稚請為錄事參軍蕭衍豫州刺史裴邃}
  - {type: page-break, offset: 29, content: '', id: KR2a0020_WYG_058-3a, image: WYG0261/WYG0261-0784c.png}
  - {type: page-break, offset: 29, content: '', id: KR2a0020_WYG_058-3b, image: WYG0261/WYG0261-0784d.png}
