  - {type: variant, offset: 314, length: 6, content: 能知也遷比部, WYG: 不寃痛之太昌初贈都督冀定殷相四州諸軍事太師丞相冀州刺史子昱字元晷起家廣平王懐左常侍懐好武事數出逰獵昱每規諫正始中以京兆廣平二王國臣多有縱恣公行屬請於是詔御史中尉崔亮窮治之伏法於都市者三十餘人其不死者悉除名為民惟昱與博陵崔楷以忠諌得免後除太學博士員外散騎侍郎初}
