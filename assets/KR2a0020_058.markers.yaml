  - {type: variant, offset: 2735, length: 140, content: 光三年上書曰竊惟庸勳賞勞有國典興滅繼絕哲后所先是以積德累忠春秋許宥十世立功著節河山誓其永久伏惟世祖太武皇帝英叡自天籠罩日域東清遼海西定玉門凌滅漠北飲馬江水臣亡父故尚書宣城公先臣孝伯冥基感會邀幸昌辰綢繆幃幄繾綣侍從廟算嘉謀每蒙顧採于時儲后監國奏請徵賢詔報曰朕有一孝伯足以治天下何用多, WYG: 丞建義初}
