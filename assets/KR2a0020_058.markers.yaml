  - {type: variant, offset: 56, length: 0, content: '', krp: 多私鑄稍就薄小乃至風飄水浮米斗㡬直一千侃奏曰昔馬援至隴西嘗上書求復五銖錢事下三府不許及援徵入為虎賁中郎親對光武申釋其趣事始施行臣頃在雍州亦表陳其事聼人與官並鑄五銖錢使人樂為而俗弊得改㫖下尚書八座不許以今況昔即理不殊求取臣前表經御披析侃乃隨事剖辨孝荘從之乃鑄五銖錢如侃所奏万俟醜奴陷東秦遂圍岐州扇誘巴蜀大都督尒朱天光率衆西伐詔侃以本官使持節兼尚書僕射為關右慰勞大使還朝除侍中加衞将軍右光祿大夫荘帝将圖尒朱榮也侃與其内弟李晞城陽王徽侍中李彧等咸預密謀尒朱兆之入洛也侃時休沐遂得潜竄歸於華隂普泰初天光在關西遣侃子婦父韋義逺招慰之立盟許恕其罪侃從兄昱恐為家禍令侃出應假其食言不過一人身殁冀全百口侃往赴之秋七月為天光所害太昌初贈車騎将軍儀同三司幽州刺史子純陁襲播弟椿字延夀本字仲考太和中與播俱蒙高祖賜改性寛謹初拜中散典御廐曹以端慎小心專司醫藥遷内給事與兄播並侍禁闈又領蘭臺行職改授中部曹析訟公正高祖嘉之及文明太后崩高祖五日不食椿進諌曰陛下至性孝過有虞居哀五朝水漿不御羣下惶灼莫知所言陛下荷祖宗之業臨萬國之重豈可同匹夫之節以取僵仆且聖人之禮毁不滅性縱陛下欲自賢於萬代其若宗廟何高祖感其言乃一進粥轉授宫輿曹少卿加給事中出為安逺将軍豫州刺史高祖自洛向豫幸其州館信宿賜馬十匹縑千匹遷冠軍将軍濟州刺史高祖自鍾離趣鄴至磝碻幸其州館又賜馬二匹縑千五百匹坐為平原太守崔敞所訟廷尉論輙收市利費用官炭免官後降為寜朔将軍梁州刺史初武興王楊集始為楊靈珍所破降於蕭鸞至是率賊萬餘自漢中而北規復舊土椿領歩騎五千出頓下辨貽書集始開以利害集始執書對使者曰楊使君此書除我心腹之疾遂領其部曲千餘人來降尋以母老解還後武都氐楊㑹反假椿節冠軍将軍都督西征諸軍事行梁州刺史與軍司羊祉討破之於後梁州運糧為羣氐劫奪詔椿兼征虜将軍持節招慰尋以氐叛拜光祿大夫假平西将軍督征討諸軍事以討之還兼太僕卿秦州羌吕茍兒涇州屠各陳聸等聚衆反詔椿為别将𨽻安西将軍元麗討之賊入隴守蹊自固或謀伏兵山陘斷其出入待糧盡而攻之或云斬除山木縱火焚之然後進討椿曰並非計也此本規盗非有經略自王師一至無戰不摧所以深竄者正避死耳今宜勒三軍勿更侵掠賊必謂我見險不前心輕我軍然後掩其不備可一舉而平矣乃緩師不進賊果出掠乃以軍中驢馬餌之不加討逐如是多日隂簡精卒銜枚夜襲斬瞻𫝊首入正太僕卿加安東将軍初顯祖世有蠕蠕萬餘戸降附居於高平薄骨律二鎮太和之末叛走略盡惟有一千餘家太中大夫王通高平鎮将郎育等求徙置淮北防其叛走詔許之慮不從命乃使椿持節往徙焉椿以為徙之無益上書曰臣以古人有言裔不謀夏夷不亂華荒忽之人羈縻而已是以先朝居之於荒服之間者正以恱近來逺招附殊俗亦以别華戎異内外也今新附者衆若舊者見徙新者必不安不安必思土思土則走叛狐死首丘其害方甚又此族類衣毛食肉樂冬便寒南土濕熱往必将盡進失歸伏之心退非藩衞之益徙在中夏而生後患愚心所見謂為不可時八座議不從遂徙於濟州緣河居之冀州元愉之難果悉浮河赴賊所在抄掠如椿所策永平初徐州城人成景儁以宿豫叛詔椿率衆四萬討之不剋而返久之除都督朔州撫㝠武川懐朔三鎮三道諸軍事平北将軍朔州刺史在州為廷尉奏椿前為太僕卿日招引細人盜種牧田三百四十頃依律處刑五歲尚書邢巒據正始别格奏椿罪應除名為庶人注籍盜門同籍合門不仕世宗以新律既班不宜雜用舊制詔依寺斷聼以贖論尋加撫軍将軍入除都官尚書監修白溝堤堰復以本将軍除定州刺史自太祖平中山多置軍府以相威攝凡有八軍軍各配兵五千食祿主帥軍各四十六人自中原稍定八軍之兵漸割南戍一軍兵纔千餘然主帥如故費祿不少椿表罷四軍減其帥百八十四人州有宗子稻田屯兵八百戸年常發夫三千草三百車修補畦堰椿以屯兵惟輸此田課更無傜役及至閑月即應修治不容復勞百姓椿亦表罷朝廷從之椿在州因治黒山道餘功伐木私造佛寺役使兵力為御史所劾除名為庶人正光五年除輔國将軍南秦州刺史時南秦州反叛路又阻塞仍停長安轉授岐州復除撫軍将軍衞尉卿轉左衞将軍又兼尚書右僕射馳驛詣并肆齎絹三萬匹募召恒朔流民揀充軍士不行尋加衞将軍出除都督雍南豳二州諸軍事本将軍雍州刺史又進號車騎大将軍儀同三司蕭寳夤元恒芝諸軍為賊所敗恒芝從渭北東渡椿使追之不止寳夤後至留於逍遙園内收集将士猶得萬餘由是三輔人心頗得安帖于時涇岐及豳悉已陷賊扶風以西非復國有椿乃鳩募内外得七千餘人遣兄子錄事參軍侃率以防禦詔椿以本官加侍中兼尚書右僕射為行臺節度關西諸将其統内五品已下郡縣須有補用者任即擬授椿遇暴疾頻啟乞解詔許之以蕭寳夤代椿為刺史行臺椿還鄉里遇子昱将還京師因謂曰當今雍州刺史亦不賢於蕭寳夤但其上佐朝廷應遣心膂重人何得任其牒用此乃聖朝百慮之一失且寳夤不藉刺史為榮吾觀其得州喜悅不少至於賞罰云為不依常憲恐有異心關中可惜汝今赴京稱吾此意以啟二聖并白宰輔更遣長史司馬防城都督欲安關中正須三人耳如其不遣必成深憂昱還面啟肅宗及靈太后並不信納及寳夤邀害御史中尉酈道元猶上表自理稱為椿父子所謗詔復除椿都督雍岐南豳三州諸軍事本将軍開府儀同三司雍州刺史討蜀大都督椿辭以老病不行建義元年遷司徒公尒朱榮東討葛榮詔椿統衆為後軍榮擒葛榮乃止永安初進位太保侍中給後部鼓吹元顥入洛椿子征東将軍昱出鎮滎陽為顥所擒又椿弟順為冀州刺史順子仲宣正平太守兄子侃弟子遁並從駕河北為顥嫌疑以椿家世顯重恐失人望未及加罪時人助其憂怖或有}
