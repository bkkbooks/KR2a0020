  - {type: variant, offset: 326, length: 5, content: 伐規略之功, WYG: 虜将軍中書侍郎遷給事黄門侍郎時北鎮饑民二十餘萬詔昱為使分散於冀定瀛三州就食後賊圍豳州詔昱兼侍中持節催西北道大都督北海王顥仍隨軍監察豳州圍解雍州蜀賊張映龍姜神逹知州内空虚謀欲攻掩刺史元脩義懼而請援一日一夜書移九通都督李叔仁遲疑不赴昱曰長安關中基本今大軍䪺在涇豳與賊相對若使長安不守大軍自然瓦散此軍雖往有何益也遂與叔仁等俱}
