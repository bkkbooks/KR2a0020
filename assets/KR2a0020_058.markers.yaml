  - {type: variant, offset: 1599, length: 271, content: 親自銜命不患彼此不盡故不復遣信義恭獻蠟燭十梃駿獻錦一匹孝伯曰君南土士人何為著屩君而著此將士云何暢曰士人之言誠為多愧但以不武受命統軍戎陳之間不容緩服孝伯曰永昌王自頃鎮長安今領精騎八萬直造淮南壽春亦閉門自固不敢相禦向送劉康祖首彼之所見王玄謨甚是所悉亦是常才耳何意作如此任使以致奔敗自入境七百餘里主人竟不能一相拒抗鄒山之險彼之所憑前鋒始得接手崔邪利便爾入穴將士倒曳出之主上丐其生命今從在此復何以輕脫遣馬文恭至蕭縣使望風退撓也彼之民人甚相忿怨言清平之時賦我租帛至有急難不能相拯暢曰知永昌已過淮南康祖為其所破比有信使無此消息王玄謨南土偏將不謂為才但以其, WYG: ''}
