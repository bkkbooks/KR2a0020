  - {type: variant, offset: 322, length: 0, content: '', WYG: 令王肅除揚州刺史出頓於洛陽東亭朝貴畢集詔令諸王送别昱伯父播同在餞席酒酣之後廣陽王嘉北海王詳等與播論議競理播不為之屈北海顧謂昱曰尊伯性剛不伏理大不如尊使君也昱前對曰昱父道隆則從其隆道洿則從其洿伯父剛則不吐柔亦不茹一坐歎其能言肅曰非此郎何得申二父之羙也延昌三年}
  - {type: page-break, offset: 322, content: '', id: KR2a0020_WYG_058-18a, image: WYG0261/WYG0261-0792a.png}
  - {type: variant, offset: 322, length: 0, content: '', krp: 令王肅除揚州刺史出頓於洛陽東亭朝貴畢集詔令諸王送别昱伯父播同在餞席酒酣之後廣陽王嘉北海王詳等與播論議競理播不為之屈北海顧謂昱曰尊伯性剛不伏理大不如尊使君也昱前對曰昱父道隆則從其隆道洿則從其洿伯父剛則不吐柔亦不茹一坐歎其能言肅曰非此郎何得申二父之羙也延昌三年}
  - {type: variant, offset: 323, length: 0, content: '', WYG: 本官帶詹事丞于時肅宗在懐抱之中至於出入左右乳母而已不令宫寮聞知昱諫曰陛下不以臣等凡淺備位宫臣太子動止宜令翼從然自此以來輕爾出入進無二傅輔導之羙退闕羣寮陪侍之式非所謂示民軌儀著君臣之義陛下若召太子必降手勅令臣下咸知為後世法於是詔曰自今已後若非朕手勅勿令兒輙出宫臣在直者從至萬歲門久之轉太尉掾兼中書舍人靈太后嘗從容謂昱曰今帝年幼朕親萬機然自薄徳化不能感親姻在外不稱人心卿有所聞慎勿諱隐昱於是奏揚州刺史李崇五車載貨恒州刺史楊鈞造銀食噐十具並餉領軍元义靈太后召义夫妻泣而責之义深恨之昱第六叔舒妻武昌王和之妹和即义之從祖父舒早喪有一男六女及終喪而元氏}
  - {type: page-break, offset: 323, content: '', id: KR2a0020_WYG_058-18b, image: WYG0261/WYG0261-0792b.png}
