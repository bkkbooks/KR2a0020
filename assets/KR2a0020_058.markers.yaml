  - {type: variant, offset: 60, length: 2, content: 功曹, WYG: 公先帝舊臣實為元老今四方未寜理須諮訪但高尚其志決意不留既難相違深用悽愴椿亦歔欷欲拜荘帝親執不聼於是賜以絹布給羽林衞送羣公百寮餞於城西張方橋行路觀者莫不稱歎椿臨行誡子孫曰我家入魏}
