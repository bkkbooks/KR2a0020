  - {type: variant, offset: 386, length: 1, content: 文, WYG: 臨陳斬靈珍首王辯退走侃兄深時為徐州行臺府州咸欲禁深昱曰昔叔向不以鮒也見廢春秋貴之奈何以侃罪深也宜聼朝㫖不許羣議還朝未㡬屬元顥侵逼大梁除昱征東将軍右光祿大夫加散騎常侍使持節假車騎将軍為南道大都督鎮滎陽顥既擒濟隂王暉業乗虚徑進大兵集於城下遣其左衞劉業王道安等招昱令降昱不從顥遂攻之城陷都督元}
