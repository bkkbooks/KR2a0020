  - {type: variant, offset: 745, length: 0, content: '', WYG: 而州軍新敗津以賊既乗勝士衆勞疲柵壘未安不可擬敵賊必夜至則萬無一全欲移軍入城更圗後舉刺史元固稱賊既逼城不可示弱閉門不内津揮刀欲斬門者軍乃得入城賊果夜至見柵空而去其後賊攻州城東面已入羅城刺史閉小城東門城中搔擾不敢出戰津欲禦賊長史許被守門不聼津手劍擊被不中被乃走津開門出戰斬賊帥一人殺賊數百賊退人心少安詔除衞尉卿征官如故以津兄衞尉卿椿代為左衞尋加鎮軍将軍討虜都督兼吏部尚書北道行臺初津兄椿得罪此州由鉅鹿人趙略投書所致及津之至略舉家逃走津乃下教慰喻令其還業於是闔州愧服逺近稱之時賊帥薛脩禮杜洛周殘掠州境孤城獨立在兩宼之間津貯積柴粟修理戰具更營雉堞賊每來攻機械競起又扵城中去城十歩掘地至泉廣作地道潜兵涌出置爐鑄鐡持以灌賊賊遂相語曰不畏利槊堅城唯畏楊公鐵星津與賊帥元洪業及與賊中督将尉靈根程殺鬼潘法顯等書曉喻之并授鐡劵許以爵位令圖賊帥毛普賢洪業等感悟復書云今與諸人密議欲殺普賢願公聼之又賊欲圍城正為取北人耳城中所有北人必須盡殺公若置之恐縱敵為患矣願公察之津以城内北人雖是惡黨然掌握中物未忍便殺但收内子城防禁而已将吏無不感其仁恕朝廷初以鐡劵二十枚委津分給津隨賊中首領閒行送之脩禮普賢頗亦由此而死既而杜洛周圍州城津盡力捍守詔加衛将軍封開國縣侯邑一千户将士有功者任津科賞兵民給復八年葛榮以司徒說津津大怒斬其使以絶之自受攻圍經渉三稔朝廷不能拯赴乃遣長子遁突圍而出詣蠕蠕主阿那瓌令其討賊遁日夜泣諭阿那瓌遣其從祖吐豆發率精騎一萬南出前鋒已達廣昌賊防塞隘口蠕蠕持疑遂還津長史李裔引賊踰城賊入轉衆津苦戰不敵遂見拘執洛周脱津衣服置地牢下數日欲将烹之諸賊還相諫止遂得免害津曾與裔相見對諸賊帥以大義責之辭淚俱發裔大慙典守者以相告洛周弗之責也及葛榮吞洛周復為榮所拘守榮破始得還洛永安初詔除津本将軍荆州刺史加散騎常侍當州都督津以前在中山陷宼詣闕固辭竟不之任二年兼吏部尚書又除車騎将軍左光祿大夫仍除吏部元顥内逼荘帝}
