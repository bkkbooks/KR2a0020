  - {type: variant, offset: 6291, length: 3725, content: 百戶拜廷尉卿尋遷侍中吏部尚書咸陽王師東宮既建拜太子少傅高祖初依周禮置夫嬪之列以沖女為夫人詔曰昔軒皇誕御垂棟宇之構爰歷三代興宮觀之式然茅茨土堦昭德於上代層臺廣厦崇威於中葉良由文質異宜華樸殊禮故也是以周成繼業營明堂於東都漢祖聿興建未央於咸鎬蓋所以尊嚴皇威崇重帝德豈好奢惡儉苟弊民力者哉我皇運統天協纂乾曆銳意四方未遑建制宮室之度頗為未允太祖初基雖粗有經式自茲厥後復多營改至於三元慶饗萬國充庭觀光之使具瞻有闕朕以寡德猥承洪緒運屬休期事鍾昌運宜遵遠度式茲宮宇指訓規模事昭於平日明堂太廟已成於昔年又因往歲之豐資藉民情之安逸將以今春營改正殿違犯時令行之惕然但朔土多寒事殊南夏自非裁度當春興役徂暑則廣制崇基莫由克就成功立事非委賢莫可改制規模非任能莫濟尚書沖器懷淵博經度明遠可領將作大匠司空長樂公亮可與大匠共監興繕其去故崇新之宜修復太極之制朕當別加指授車駕南伐加沖輔國大將軍統衆翼從自發都至於洛陽霖雨不霽仍詔六軍發軫高祖戎服執鞭御馬而出羣臣啟顙於馬首之前高祖曰長驅之謀廟算已定今大軍將進公等更欲何云沖進曰臣等不能折衝帷幄坐制四海而令南有竊號之渠實臣等之咎陛下以文軌未一親勞聖駕臣等誠思亡軀盡命効死戎行然自離都淫雨士馬困弊前路尚遙水潦方甚且伊洛境內小水猶尚致難況長江浩汗越在南境若營舟檝必須停滯師老糧乏進退為難矜喪反旆於義為允高祖曰一同之意前已具論卿等正以水雨為難然天時頗亦可知何者夏既炎旱秋故雨多玄冬之初必當開爽比後月十間若雨猶不已此乃天也脫於此而晴行則無害古不伐喪謂諸侯同軌之國非王者統一之文已至於此何容停駕沖又進曰今者之舉天下所不願唯陛下欲之漢文言吾獨乘千里馬竟何至也臣有意而無其辭敢以死請高祖大怒曰方欲經營宇宙一同區域而卿等儒生屢疑大計斧鉞有常卿勿復言策馬將出於是大司馬安定王休兼左僕射任城王澄等並殷勤泣諫高祖乃諭羣臣曰今者興動不小動而無成何以示後苟欲班師無以垂之千載朕仰惟遠祖世居幽漠違衆南遷以享無窮之美豈其無心輕遺陵壤今之君子寧獨有懷當由天工人代王業須成故也若不南鑾即當移都於此光宅土中機亦時矣王公等以為何如議之所決不得旋踵欲遷者左不欲者右安定王休等相率如右前南安王楨進曰夫愚者闇於成事智者見於未萌行至德者不議於俗成大功者不謀於衆非常之人乃能建非常之事廓神都以延王業度土中以制帝京周公啟之於前陛下行之於後故其宜也且天下至重莫若皇居人之所貴寧如遺體請上安聖躬下慰民望光宅中原輟彼南伐此臣等願言蒼生幸甚羣臣咸唱萬歲高祖初謀南遷恐衆心戀舊乃示為大舉因以脅定羣情外名南伐其實遷也舊人懷土多所不願內憚南征無敢言者於是定都洛陽沖言於高祖曰陛下方修周公之制定鼎成周然營建六寢不可遊駕待就興築城郛難以馬上營訖願暫還北都令臣下經造功成事訖然後備文物之章和玉鑾之響巡時南徙軌儀土中高祖曰朕將巡省方岳至鄴小停春始便還未宜遂不歸北尋以沖為鎮南將軍侍中少傅如故委以營構之任改封陽平郡開國侯邑戶如先車駕南伐以沖兼左僕射留守洛陽車駕渡淮別詔安南大將軍元英平南將軍劉藻討漢中召雍涇岐三州兵六千人擬戍南鄭克城則遣沖表諫曰秦州險阨地接羌夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄茲未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脫終攻不克徒動民情連胡結夷事或難測輒依旨密下刺史待軍克鄭城然後差遣如臣愚見猶謂未足何者西道險阨單徑千里今欲深戍絕界之外孤據羣賊之中敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷寇所守意在惜地校之二義德有淺深惠聲已遠何遽於一城哉且魏境所掩九州過八民人所臣十分而九所未民者惟漠北之與江外耳羈之在近豈急急於今日也宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹將為吞并之舉今鍾離壽陽密邇未拔赭城新野跬步弗降所克者舍之而不取所降者撫之而旋戮東道既未可以近力守西蕃寧可以遠兵固若果欲置者臣恐終以資敵也又今建都土中地接寇壤方須大收死士平蕩江會輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死効未易可獲推此而論不戍為上高祖從之車駕還都引見沖等謂之曰本所以多置官者慮有令僕闇弱百事稽壅若明獨聰專則權勢大併今朕雖不得為聰明又不為劣闇卿等不為大賢亦不為大惡且可一兩年許少置官司高祖自鄴還京汎舟洪池乃從容謂沖曰朕欲從此通渠於洛南伐之日何容不從此入洛從洛入河從河入汴從汴入清以至於淮下船而戰猶出戶而鬬此乃軍國之大計今溝渠若須二萬人以下六十日有成者宜以漸修之沖對曰若爾便是士無遠涉之勞戰有兼人之力遷尚書僕射仍領少傅改封清淵縣開國侯邑戶如前乃太子恂廢沖罷少傅高祖引見公卿於清徽堂高祖曰聖人之大寶惟位與功是以功成作樂治定制禮今徙極中天創居嵩洛雖大構未成要自條紀略舉但南有未賓之豎兼兇蠻密邇朕夙夜悵惋良在於茲取南之計決矣朕行之謀必矣若依近代也則天子下帷深宮之內準上古也則有親行祚延七百魏晉不征旋踵而殞祚之修短在德不在征今但以行期未知早晚知幾其神乎朕既非神焉能知也而頃來陰陽卜術之士咸勸朕今征必克此既家國大事宜共君臣各盡所見不得以朕先言便致依違退有同異沖對曰夫征戰之法先之人事然後卜筮今卜筮雖吉猶恐人事未備今年秋稔有損常實又京師始遷衆業未定加之征戰以為未可宜至來秋高祖曰僕射之言非為不合朕意之所慮乃有社稷之憂然咫尺寇戎無宜自安理須如此僕射言人事未從亦不必如此朕去十七年擁二十萬衆行不出畿甸此人事之盛而非天時往年乘機天時乃可而闕人事又致不捷若待人事備復非天時若之何如僕射之言便終無征理朕若秋行無克捷三君子並付司寇不可不人盡其心罷議而出後世宗為太子高祖醼於清徽堂高祖曰皇儲所以纂歷三才光昭七祖斯乃億兆咸悅天人同泰故延卿就此一醼以暢忻情高祖又曰天地之道一盈一虛豈有常泰天道猶爾況人事乎故有升有黜自古而然悼往欣今良用深歎沖對曰東暉承儲蒼生咸幸但臣前忝師傅弗能弼諧仰慚天日慈造寬含得預此醼慶愧交深高祖曰朕尚弗能革其昏師傅何勞愧謝也後尚書疑元拔穆泰罪事沖奏曰前彭城鎮將元拔與穆泰同逆養子降壽宜從拔罪而太尉咸陽王禧等以為律文養子而為罪父及兄弟不知情者不坐謹審律意以養子於父非天性於兄弟非同氣敦薄既差故刑典有降是以養子雖為罪而父兄不預然父兄為罪養子不知謀易地均情豈獨從戮乎理固不然臣以為依據律文不追戮於所生則從坐於所養明矣又律惟言父不從子不稱子不從父當是優尊厲卑之義臣禧等以為律雖不正見互文起制於乞也舉父之罪於養也見子坐是為互起互起兩明無罪必矣若以嫡繼養與生同則父子宜均祇明不坐且繼養之注云若有別制不同此律又令文云諸有封爵若無親子及其身卒雖有養繼國除不襲是為有福不及己有罪便預坐均事等情律令之意便相矛盾伏度律旨必不然也臣沖以為指例條尋罪在無疑準令語情頗亦同式詔曰僕射之議據律明矣太尉等論於典矯也養所以從戮者緣其已免所生故不得復甄於所養此獨何福長處吞舟于國所以不襲者重列爵特立制因天之所絕推而除之耳豈復報對刑賞于斯則應死可特原之沖機敏有巧思北京明堂圓丘太廟及洛都初基安處郊兆新起堂寢皆資於沖勤志強力孜孜無怠旦理文簿兼營匠制几案盈積剞劂在手終不勞厭也然顯貴門族務益六姻兄弟子姪皆有爵官一家歲祿萬匹有餘是其親者雖復癡聾無不超越官次時論亦以此少之年纔四十而鬢髮班白姿貌豐美未有衰狀李彪之入京也孤微寡援而自立不羣以沖好士傾心宗附沖亦重其器學禮而納焉每言之於高祖公私共相援益及彪為中尉兼尚書為高祖知待便謂非復藉沖而更相輕背惟公坐斂袂而已無復宗敬之意也沖頗銜之後高祖南征沖與吏部尚書任城王澄並以彪倨傲無禮遂禁止之奏其罪狀沖手自作家人不知辭甚激切因以自劾高祖覽其表歎悵者久之既而曰道固可謂溢也僕射亦為滿矣沖時震怒數數責彪前後愆悖瞋目大呼投折几案盡收御史皆泥首面縛詈辱肆口沖素性溫柔而一旦暴恚遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人醫藥所不能療或謂肝藏傷裂旬有餘日而卒時年四十九高祖為舉哀於懸瓠發聲悲泣不能自勝詔曰沖貞和資性德義樹身訓業自家道素形國太和之始朕在弱齡早委機密實康時務鴻漸洛朝選開清升冠端右惟允出納忠肅柔明足敷睿範仁恭信惠有結民心可謂國之賢也朝之望也方昇寵秩以旌功舊奄致喪逝悲痛于懷既留勤應陟兼良宿宜褒可贈司空公給東園祕器朝服一具衣一襲贈錢三十萬布五百匹蠟二百斤有司奏諡曰文穆葬於覆舟山近杜預冢高祖之意也後車駕自鄴還洛路經沖墓左右以聞高祖臥疾望墳掩泣久之詔曰司空文穆公德為時宗勳簡朕心不幸徂逝託墳邙嶺旋鑾覆舟躬睇塋域悲仁惻舊有慟朕衷可遣太牢之祭以申吾懷及與留京百官相見皆沖亡沒之故言及流淚高祖得留臺啟知沖患狀謂右衞宋弁曰僕射執我樞衡總釐朝務清儉居躬知寵已久朕以仁明忠雅委以台司之寄使我出境無後顧之憂一朝忽有此患朕甚懷愴慨其相痛惜如此沖兄弟六人四母所出頗相忿及沖之貴封祿恩賜皆以共之內外輯睦父亡後同居二十餘年至洛乃別第宅更相友愛久無間然皆沖之德也始沖之見私寵也兄子韶有憂色慮致傾敗後榮名日顯稍乃自安而沖明目當官圖為己任自始迄終無所避屈其體時推運皆此類也子延寔等語在外戚傳史臣曰燕趙信多奇士李孝伯風範鑒略蓋亦過人遠甚世祖雄猜嚴斷崔浩已見誅夷而入參心膂出幹政事獻可替否無際可尋故能從容任遇以功名始卒其智器固以優乎安世識具通雅時幹之良瑒以豪俊達郁則儒博顯李沖早延寵眷入幹腹心風流識業固乃一時之秀終協契聖主佐命太和位當端揆身任梁棟德洽家門功著王室蓋有魏之亂臣也, WYG: 考證}
  - {type: variant, offset: 6291, length: 3725, content: 百戶拜廷尉卿尋遷侍中吏部尚書咸陽王師東宮既建拜太子少傅高祖初依周禮置夫嬪之列以沖女為夫人詔曰昔軒皇誕御垂棟宇之構爰歷三代興宮觀之式然茅茨土堦昭德於上代層臺廣厦崇威於中葉良由文質異宜華樸殊禮故也是以周成繼業營明堂於東都漢祖聿興建未央於咸鎬蓋所以尊嚴皇威崇重帝德豈好奢惡儉苟弊民力者哉我皇運統天協纂乾曆銳意四方未遑建制宮室之度頗為未允太祖初基雖粗有經式自茲厥後復多營改至於三元慶饗萬國充庭觀光之使具瞻有闕朕以寡德猥承洪緒運屬休期事鍾昌運宜遵遠度式茲宮宇指訓規模事昭於平日明堂太廟已成於昔年又因往歲之豐資藉民情之安逸將以今春營改正殿違犯時令行之惕然但朔土多寒事殊南夏自非裁度當春興役徂暑則廣制崇基莫由克就成功立事非委賢莫可改制規模非任能莫濟尚書沖器懷淵博經度明遠可領將作大匠司空長樂公亮可與大匠共監興繕其去故崇新之宜修復太極之制朕當別加指授車駕南伐加沖輔國大將軍統衆翼從自發都至於洛陽霖雨不霽仍詔六軍發軫高祖戎服執鞭御馬而出羣臣啟顙於馬首之前高祖曰長驅之謀廟算已定今大軍將進公等更欲何云沖進曰臣等不能折衝帷幄坐制四海而令南有竊號之渠實臣等之咎陛下以文軌未一親勞聖駕臣等誠思亡軀盡命効死戎行然自離都淫雨士馬困弊前路尚遙水潦方甚且伊洛境內小水猶尚致難況長江浩汗越在南境若營舟檝必須停滯師老糧乏進退為難矜喪反旆於義為允高祖曰一同之意前已具論卿等正以水雨為難然天時頗亦可知何者夏既炎旱秋故雨多玄冬之初必當開爽比後月十間若雨猶不已此乃天也脫於此而晴行則無害古不伐喪謂諸侯同軌之國非王者統一之文已至於此何容停駕沖又進曰今者之舉天下所不願唯陛下欲之漢文言吾獨乘千里馬竟何至也臣有意而無其辭敢以死請高祖大怒曰方欲經營宇宙一同區域而卿等儒生屢疑大計斧鉞有常卿勿復言策馬將出於是大司馬安定王休兼左僕射任城王澄等並殷勤泣諫高祖乃諭羣臣曰今者興動不小動而無成何以示後苟欲班師無以垂之千載朕仰惟遠祖世居幽漠違衆南遷以享無窮之美豈其無心輕遺陵壤今之君子寧獨有懷當由天工人代王業須成故也若不南鑾即當移都於此光宅土中機亦時矣王公等以為何如議之所決不得旋踵欲遷者左不欲者右安定王休等相率如右前南安王楨進曰夫愚者闇於成事智者見於未萌行至德者不議於俗成大功者不謀於衆非常之人乃能建非常之事廓神都以延王業度土中以制帝京周公啟之於前陛下行之於後故其宜也且天下至重莫若皇居人之所貴寧如遺體請上安聖躬下慰民望光宅中原輟彼南伐此臣等願言蒼生幸甚羣臣咸唱萬歲高祖初謀南遷恐衆心戀舊乃示為大舉因以脅定羣情外名南伐其實遷也舊人懷土多所不願內憚南征無敢言者於是定都洛陽沖言於高祖曰陛下方修周公之制定鼎成周然營建六寢不可遊駕待就興築城郛難以馬上營訖願暫還北都令臣下經造功成事訖然後備文物之章和玉鑾之響巡時南徙軌儀土中高祖曰朕將巡省方岳至鄴小停春始便還未宜遂不歸北尋以沖為鎮南將軍侍中少傅如故委以營構之任改封陽平郡開國侯邑戶如先車駕南伐以沖兼左僕射留守洛陽車駕渡淮別詔安南大將軍元英平南將軍劉藻討漢中召雍涇岐三州兵六千人擬戍南鄭克城則遣沖表諫曰秦州險阨地接羌夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄茲未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脫終攻不克徒動民情連胡結夷事或難測輒依旨密下刺史待軍克鄭城然後差遣如臣愚見猶謂未足何者西道險阨單徑千里今欲深戍絕界之外孤據羣賊之中敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷寇所守意在惜地校之二義德有淺深惠聲已遠何遽於一城哉且魏境所掩九州過八民人所臣十分而九所未民者惟漠北之與江外耳羈之在近豈急急於今日也宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹將為吞并之舉今鍾離壽陽密邇未拔赭城新野跬步弗降所克者舍之而不取所降者撫之而旋戮東道既未可以近力守西蕃寧可以遠兵固若果欲置者臣恐終以資敵也又今建都土中地接寇壤方須大收死士平蕩江會輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死効未易可獲推此而論不戍為上高祖從之車駕還都引見沖等謂之曰本所以多置官者慮有令僕闇弱百事稽壅若明獨聰專則權勢大併今朕雖不得為聰明又不為劣闇卿等不為大賢亦不為大惡且可一兩年許少置官司高祖自鄴還京汎舟洪池乃從容謂沖曰朕欲從此通渠於洛南伐之日何容不從此入洛從洛入河從河入汴從汴入清以至於淮下船而戰猶出戶而鬬此乃軍國之大計今溝渠若須二萬人以下六十日有成者宜以漸修之沖對曰若爾便是士無遠涉之勞戰有兼人之力遷尚書僕射仍領少傅改封清淵縣開國侯邑戶如前乃太子恂廢沖罷少傅高祖引見公卿於清徽堂高祖曰聖人之大寶惟位與功是以功成作樂治定制禮今徙極中天創居嵩洛雖大構未成要自條紀略舉但南有未賓之豎兼兇蠻密邇朕夙夜悵惋良在於茲取南之計決矣朕行之謀必矣若依近代也則天子下帷深宮之內準上古也則有親行祚延七百魏晉不征旋踵而殞祚之修短在德不在征今但以行期未知早晚知幾其神乎朕既非神焉能知也而頃來陰陽卜術之士咸勸朕今征必克此既家國大事宜共君臣各盡所見不得以朕先言便致依違退有同異沖對曰夫征戰之法先之人事然後卜筮今卜筮雖吉猶恐人事未備今年秋稔有損常實又京師始遷衆業未定加之征戰以為未可宜至來秋高祖曰僕射之言非為不合朕意之所慮乃有社稷之憂然咫尺寇戎無宜自安理須如此僕射言人事未從亦不必如此朕去十七年擁二十萬衆行不出畿甸此人事之盛而非天時往年乘機天時乃可而闕人事又致不捷若待人事備復非天時若之何如僕射之言便終無征理朕若秋行無克捷三君子並付司寇不可不人盡其心罷議而出後世宗為太子高祖醼於清徽堂高祖曰皇儲所以纂歷三才光昭七祖斯乃億兆咸悅天人同泰故延卿就此一醼以暢忻情高祖又曰天地之道一盈一虛豈有常泰天道猶爾況人事乎故有升有黜自古而然悼往欣今良用深歎沖對曰東暉承儲蒼生咸幸但臣前忝師傅弗能弼諧仰慚天日慈造寬含得預此醼慶愧交深高祖曰朕尚弗能革其昏師傅何勞愧謝也後尚書疑元拔穆泰罪事沖奏曰前彭城鎮將元拔與穆泰同逆養子降壽宜從拔罪而太尉咸陽王禧等以為律文養子而為罪父及兄弟不知情者不坐謹審律意以養子於父非天性於兄弟非同氣敦薄既差故刑典有降是以養子雖為罪而父兄不預然父兄為罪養子不知謀易地均情豈獨從戮乎理固不然臣以為依據律文不追戮於所生則從坐於所養明矣又律惟言父不從子不稱子不從父當是優尊厲卑之義臣禧等以為律雖不正見互文起制於乞也舉父之罪於養也見子坐是為互起互起兩明無罪必矣若以嫡繼養與生同則父子宜均祇明不坐且繼養之注云若有別制不同此律又令文云諸有封爵若無親子及其身卒雖有養繼國除不襲是為有福不及己有罪便預坐均事等情律令之意便相矛盾伏度律旨必不然也臣沖以為指例條尋罪在無疑準令語情頗亦同式詔曰僕射之議據律明矣太尉等論於典矯也養所以從戮者緣其已免所生故不得復甄於所養此獨何福長處吞舟于國所以不襲者重列爵特立制因天之所絕推而除之耳豈復報對刑賞于斯則應死可特原之沖機敏有巧思北京明堂圓丘太廟及洛都初基安處郊兆新起堂寢皆資於沖勤志強力孜孜無怠旦理文簿兼營匠制几案盈積剞劂在手終不勞厭也然顯貴門族務益六姻兄弟子姪皆有爵官一家歲祿萬匹有餘是其親者雖復癡聾無不超越官次時論亦以此少之年纔四十而鬢髮班白姿貌豐美未有衰狀李彪之入京也孤微寡援而自立不羣以沖好士傾心宗附沖亦重其器學禮而納焉每言之於高祖公私共相援益及彪為中尉兼尚書為高祖知待便謂非復藉沖而更相輕背惟公坐斂袂而已無復宗敬之意也沖頗銜之後高祖南征沖與吏部尚書任城王澄並以彪倨傲無禮遂禁止之奏其罪狀沖手自作家人不知辭甚激切因以自劾高祖覽其表歎悵者久之既而曰道固可謂溢也僕射亦為滿矣沖時震怒數數責彪前後愆悖瞋目大呼投折几案盡收御史皆泥首面縛詈辱肆口沖素性溫柔而一旦暴恚遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人醫藥所不能療或謂肝藏傷裂旬有餘日而卒時年四十九高祖為舉哀於懸瓠發聲悲泣不能自勝詔曰沖貞和資性德義樹身訓業自家道素形國太和之始朕在弱齡早委機密實康時務鴻漸洛朝選開清升冠端右惟允出納忠肅柔明足敷睿範仁恭信惠有結民心可謂國之賢也朝之望也方昇寵秩以旌功舊奄致喪逝悲痛于懷既留勤應陟兼良宿宜褒可贈司空公給東園祕器朝服一具衣一襲贈錢三十萬布五百匹蠟二百斤有司奏諡曰文穆葬於覆舟山近杜預冢高祖之意也後車駕自鄴還洛路經沖墓左右以聞高祖臥疾望墳掩泣久之詔曰司空文穆公德為時宗勳簡朕心不幸徂逝託墳邙嶺旋鑾覆舟躬睇塋域悲仁惻舊有慟朕衷可遣太牢之祭以申吾懷及與留京百官相見皆沖亡沒之故言及流淚高祖得留臺啟知沖患狀謂右衞宋弁曰僕射執我樞衡總釐朝務清儉居躬知寵已久朕以仁明忠雅委以台司之寄使我出境無後顧之憂一朝忽有此患朕甚懷愴慨其相痛惜如此沖兄弟六人四母所出頗相忿及沖之貴封祿恩賜皆以共之內外輯睦父亡後同居二十餘年至洛乃別第宅更相友愛久無間然皆沖之德也始沖之見私寵也兄子韶有憂色慮致傾敗後榮名日顯稍乃自安而沖明目當官圖為己任自始迄終無所避屈其體時推運皆此類也子延寔等語在外戚傳史臣曰燕趙信多奇士李孝伯風範鑒略蓋亦過人遠甚世祖雄猜嚴斷崔浩已見誅夷而入參心膂出幹政事獻可替否無際可尋故能從容任遇以功名始卒其智器固以優乎安世識具通雅時幹之良瑒以豪俊達郁則儒博顯李沖早延寵眷入幹腹心風流識業固乃一時之秀終協契聖主佐命太和位當端揆身任梁棟德洽家門功著王室蓋有魏之亂臣也, krp: 考證}
