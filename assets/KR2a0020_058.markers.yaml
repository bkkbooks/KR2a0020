  - {type: variant, offset: 1094, length: 330, content: 交故無容私覿義恭獻皮袴褶一具駿奉酒二器甘蔗百梃孝伯曰又有詔太尉安北久絕南信殊當憂悒若欲遣信者當為護送脫須騎者亦當以馬送之暢曰此方間路甚多使命日夕往復不復以此勞魏帝也孝伯曰亦知有水路似為白賊所斷暢曰君著白衣稱白賊也孝伯大笑曰今之白賊似異黃巾赤眉暢曰黃巾赤眉不在江南孝伯曰雖不在江南亦不離徐方也孝伯曰向與安北相聞何以久而不報暢曰二王貴遠啟聞為難孝伯曰周公握髮吐餔二王何獨貴遠暢曰握髮吐餐不謂隣國之人也孝伯曰本邦尚爾隣國彌應盡恭且賓至有禮主人宜以禮接暢曰昨見衆賓至門未為有禮孝伯曰非是賓至無禮直是主人怱怱無待賓調度耳孝伯又言有詔程天祚一介常人誠知非江南之選近於汝陽身被九槍落在水我使牽而出之凡人骨肉分張並思集聚聞其弟在此如何不遣暫出尋自令反豈復苟留一人暢曰知欲程天祚, WYG: 下泣}
