  - {type: variant, offset: 4981, length: 260, content: 儀同三司冀州刺史瑒俶儻有大志好飲酒篤於親知每謂弟郁曰士大夫學問稽博古今而罷何用專經為老博士也與弟謐特相友愛謐在鄉物故瑒慟哭絕氣久而方蘇不食數日期年之中形骸毀悴人倫哀歎之瑒三子長子義盛武定中司徒倉曹參軍瑒弟謐字永和在逸士傳謐弟郁字永穆好學沉靜博通經史自著作佐郎為廣平王懷友懷深相禮遇時學士徐遵明教授山東生徒甚盛懷徵遵明在館令郁問其五經義例十餘條遵明所答數條而已稍遷國子博士自國學之建諸博士率不講說朝夕教授惟郁而已謙虛雅寬甚有儒者之風遷廷尉少卿加冠軍將軍轉通直散騎常侍建義中以兄瑒卒遂撫育孤姪歸於鄉里永熙初除散騎常侍大將軍左, WYG: 右}
