  - {type: variant, offset: 52, length: 0, content: '', WYG: 毛洪賓據郡引宼抄掠渭北侃啟椿自出討之遂購募戰士信宿之間得三千餘人銜枚夜進至馮翊郡西賊見大軍卒至衆情離解洪賓遂通書送質乞求自效於是擒送宿勤明逹兄子賊署南平王烏過仁後雍州刺史蕭寶夤據州反尚書僕射長孫稚討之除侃鎮逺将軍諫議大夫為稚行臺左丞尋轉通直散騎常侍軍次𢎞農侃白稚曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類算略抗行當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所騁奇必須北取蒲坂飛棹西岸置兵死地人有鬬心華州之圍可}
  - {type: page-break, offset: 52, content: '', id: KR2a0020_WYG_058-4b, image: WYG0261/WYG0261-0785b.png}
  - {type: page-break, offset: 52, content: '', id: KR2a0020_WYG_058-5a, image: WYG0261/WYG0261-0785c.png}
  - {type: variant, offset: 52, length: 0, content: '', krp: 毛洪賓據郡引宼抄掠渭北侃啟椿自出討之遂購募戰士信宿之間得三千餘人銜枚夜進至馮翊郡西賊見大軍卒至衆情離解洪賓遂通書送質乞求自效於是擒送宿勤明逹兄子賊署南平王烏過仁後雍州刺史蕭寶夤據州反尚書僕射長孫稚討之除侃鎮逺将軍諫議大夫為稚行臺左丞尋轉通直散騎常侍軍次𢎞農侃白稚曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類算略抗行當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所騁奇必須北取蒲坂飛棹西岸置兵死地人有鬬心華州之圍可}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 戰而解潼關之賊必望風潰散諸處既平長安自剋愚計可錄請為明公前驅稚曰薛修義已圍河東薛鳯賢又保安邑都督宗正珍孫停師虞坂久不能進雖有此計猶用為疑侃曰珍孫本行陳一夫因緣進逹可為人使未可使人一旦受元帥之任處分三軍精神亂矣寧堪圍賊河東治在蒲坂西帶河湄所部之民多在東境脩義驅率壮勇西圍郡邑父老妻弱尚保舊村若率衆一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彦等領騎與侃於𢎞農北渡所領悉是騎士習於野戰未可攻城先據石錐壁侃乃班告曰今且停軍於此以待步卒兼觀民情向背然後可行若送降名者各自還村候臺軍舉烽火各亦應之以明降欵其無應烽者即是不降之村理須殄戮賞賚軍士民遂轉相告報未實降者亦詐舉烽一宿之間火光遍數百里内圍城之宼不測所以各自散歸脩義亦即逃遁長安平侃頗有力建義初除冠軍将軍東雍州刺史其年州罷除中散大夫為都督鎮潼關還朝除右将軍岐州刺史屬元顥内逼詔以本官假撫軍将軍為都督率衆鎮大梁未發詔行北中郎将孝荘徙御河北執侃手曰朕停卿蕃寄移住此者正為今日但卿尊卑百口若隨朕行所累處大卿可還洛寄之後圖侃曰此誠陛下曲恩寧可以臣微族頓廢君臣之義固求陪從至建州敘行從功臣自城陽王徽已下凡十人並増三階以侃河梁之誠特加四階侃固辭乞同諸人久乃見許於是除鎮軍将軍度支尚書兼給事黃門侍郎敷西縣開國公食邑一千戸及車駕南還顥令蕭衍将陳慶之守北中城自據南岸有夏州義士為顥守河中渚乃密信通欵求破橋立效尒朱榮率軍赴之及橋破應接不果皆為顥所屠滅榮因悵然将為還計欲更圖後舉侃曰未審明大王發并州之日已知有夏州義士指來相應為欲廣申經略寧復帝基乎夫兵散而更合瘡愈而更戰持此收功自古不少豈可以一圖不全而衆慮頓廢今事不果乃是兩賊相殺則大王之利矣若今即還民情失望去}
