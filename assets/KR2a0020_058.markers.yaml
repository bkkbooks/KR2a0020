  - {type: variant, offset: 324, length: 1, content: 從, WYG: 請别居昱父椿乃集親姻泣而謂曰我弟不幸早終今男不婚女未嫁何怱怱便求離居不聼遂懐憾焉神龜二年瀛州民劉宣明謀反事覺逃竄义乃使和及元氏誣告昱藏隐宣明云父定州刺史椿叔華州刺史津並送甲仗三百具謀圖不逞义又構成其事乃遣左右御仗五百人夜圍昱宅而收之並無所獲靈太后問其状昱具對元氏遘釁之端言至哀切太后乃解昱縛和及元氏並處死刑而义相左右和直免官元氏卒亦不坐及元义之廢太后乃出昱為濟隂内史中山玉熙起兵於鄴义遣黄門盧同詣鄴刑熙并窮黨與同希义旨就郡鏁昱赴鄴訊百日後乃還任孝昌初除}
