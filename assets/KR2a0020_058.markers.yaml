  - {type: variant, offset: 5323, length: 177, content: 左僕射儀同三司定州刺史子士謙儀同開府參軍事李沖字思順隴西人敦煌公寶少子也少孤為長兄滎陽太守承所攜訓承常言此兒器量非方為門戶所寄沖沈雅有大量隨兄至官是時牧守子弟多侵亂民庶輕有乞奪沖與承長子韶獨清簡皎然無所求取時人美焉顯祖末為中書學生沖善交遊不妄戲雜流輩重之高祖初以例遷祕書中散典禁中文事以修整敏惠漸見寵待遷內祕書令南部給事中舊無三長惟立宗主督護所以民多隱冒, WYG: 卷}
