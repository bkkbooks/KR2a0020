  - {type: variant, offset: 409, length: 2, content: 江夏, WYG: 公錄尚書事相州刺史子辯字僧逹厯通直常侍平東将軍東雍州刺史辯弟仲宣有風度才學自奉朝請稍遷太尉掾中書舍人通直散騎侍郎加鎮逺将軍賜爵𢎞農男建義初遷通直常侍出為平西将軍正平太守進爵為伯在郡有能名就加安西将軍還京之日兄弟與父同遇害辯太昌初贈使持節都督燕恒二州諸軍事車騎大将軍儀同三司恒州刺史仲宣贈都督青光二州諸軍事車騎大将軍尚書右僕射青州刺史仲宣子元就幼而俊拔收捕時年九歲牽挽兵人謂曰欲害諸尊乞先就死兵人以刀斫斷其臂猶請死不止遂先殺之永熙初贈汝隂太守仲宣弟測朱衣直閤亦同時見害太昌中贈都督平營二州諸軍事鎮北将軍吏部尚書平州刺史測弟稚卿太昌中為尚書右丞坐事死順弟津字羅漢本名延祚高祖賜名焉少端謹以噐度見稱年十一除侍御中散于時高祖沖幼文明太后臨朝津曽久侍左右忽咳逆失聲遂吐血數升藏衣袖太后聞聲閱而不見問其故具以實言遂以敬慎見知賜縑百匹遷符璽郎中津以身在禁密不外交逰至於宗族姻表罕相祗候司徒馮誕與津少結交逰而津見其貴寵每恒退避及相招命多辭疾不往誕以為恨而津逾逺焉人或謂之曰司徒君之少舊宜蒙進逹何遽自外也津曰為勢家所厚復何容易但全吾今日亦以足矣轉振威将軍領監曹奏事令又為直寝遷太子歩兵校尉高祖南征以津為都督征南府長史至懸瓠徵加直閤将軍後從駕濟淮司徒誕薨高祖以津送柩還都遷長水校尉仍直閤景明中世宗逰扵北邙津時陪從太尉咸陽}
