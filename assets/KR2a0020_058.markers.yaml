  - {type: variant, offset: 386, length: 1, content: 文, krp: 臨陳斬靈珍首王辯退走侃兄深時為徐州行臺府州咸欲禁深昱曰昔叔向不以鮒也見廢春秋貴之奈何以侃罪深也宜聼朝㫖不許羣議還朝未㡬屬元顥侵逼大梁除昱征東将軍右光祿大夫加散騎常侍使持節假車騎将軍為南道大都督鎮滎陽顥既擒濟隂王暉業乗虚徑進大兵集於城下遣其左衞劉業王道安等招昱令降昱不從顥遂攻之城陷都督元}
  - {type: variant, offset: 388, length: 0, content: '', WYG: 太守西河王悰並踰城而走俱被擒縶昱與弟息五人在門樓上須臾顥至執昱下城面責昱曰楊昱卿今死甘心否卿自負我非我負卿也昱荅曰分不望生向所以不下樓者正慮亂兵耳但恨八十老父無人供養負病黄泉求乞小弟一命便死不朽也顥乃拘之明旦顥将陳慶之胡光等三百餘人伏顥帳前請曰陛下渡江三千里無遺鏃之費昨日一朝殺傷五百餘人求乞楊昱以快意顥曰我在江東嘗聞梁主言初下都日袁昻為吴郡不降稱其忠節奈何殺楊昱自此之外任卿等所請於是斬昱下統帥三十七人皆令蜀兵刳腹取心食之顥既入洛除昱名為民孝荘還宫還復前官及父椿辭老請解官從養詔不許尒朱榮之死也昱為東道行臺率衆拒尒朱仲逺會尒朱兆入洛昱還京師後歸鄉里亦為天光所害太昌初贈都督瀛定二州諸軍事驃騎大将軍司空公定州刺史子孝邕員外郎}
