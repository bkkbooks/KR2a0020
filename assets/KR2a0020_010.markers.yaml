  - {type: variant, offset: 9870, length: 0, content: '', WYG: 正珍孫秋七月戊辰都督尒朱兆賀㧞勝從硤石夜濟破顥子冠受及安豐王延明軍元顥敗走庚午車駕入居華林園昇大夏門大赦天下以使持節車騎将軍都督頴川郡開國公尒朱兆為車騎大将軍儀同三司詔以前朝勲書多竊冒宜一切焚棄之若立效灼然為時所知者别加科賞蕃客及邉首翻城降有勲未敘者不在焚斷之限北來軍士及隨駕文武諸立義加汎五級河北執事之官二級河南立義及迎駕之官并中途扈從亦二級壬申以柱國大将軍太原王尒朱榮為天柱大将軍加前後部羽葆鼓吹癸酉臨潁縣卒江豐斬元顥傳首京師}
