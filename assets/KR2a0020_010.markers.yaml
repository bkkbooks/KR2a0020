  - {type: variant, offset: 1115, length: 730, content: 王肅薨九月丁酉發畿內夫五萬人築京師三百二十三坊四旬而罷己亥立皇后于氏乙卯免壽春營戶為揚州民冬十月丁卯吐谷渾國遣使朝獻辛未蕭寶卷零陵戍主華候率戶內屬十有一月丙申以驃騎大將軍穆亮為司空丁酉大將軍北海王詳為太傅領司徒壬寅改築圓丘於伊水之陽乙卯仍有事焉十二月高麗國遣使朝貢是月寶卷直後張齊殺其主寶卷降蕭衍衍克建業三年春二月戊寅詔曰自比陽旱積時農民廢殖寤言增愧在予良多申下州郡有骸骨暴露者悉可埋瘞三月魯陽蠻反蕭寶卷弟建安王寶夤來降夏四月詔撫軍將軍李崇討魯陽反蠻是月蕭衍又廢其主寶融而僭立自稱曰梁閏月丁巳司空穆亮薨五月揚州小峴戍主党法宗襲蕭衍大峴戍破之擒其龍驤將軍邾菩薩送之京師秋七月癸酉于闐國遣使朝獻詔加文官從征顯達宿衞者二階閑散者一階八月癸卯蕭寶融鎮南大將軍江州刺史陳伯之遣使請降乙卯以前太傅平陽公丕為三老九月丁巳車駕行幸鄴丁卯詔使者弔殷比干墓戊寅閱武於鄴南庚辰武興國世子楊紹先遣使朝獻冬十月庚子帝親射遠及一里五十步羣臣勒銘於射所甲辰車駕還宮十有一月己卯詔京洛兵蕪歲踰十紀先皇定鼎舊都惟新魏曆翦掃榛荒創茲雲構鴻功茂績規模長遠今廟社乃建宮極斯崇便當以來月中旬蠲吉徙御仰尋遺意感慶交衷既禮盛周宣斯干之制事高漢祖壯麗之儀可依典故備茲考告以稱遐邇人臣之望十有二月戊子詔曰民本農桑國重蠶籍粢盛所憑冕織攸寄比京邑初基耕桑暫缺遺規往旨宜必祗修今寢殿顯成移御維始春郊無遠拂羽有辰便可表營千畝開設宮壇秉耒援筐躬勸億兆壬寅饗羣臣于太極前殿賜布帛有差以初成也甲辰揚州破蕭衍將張囂之斬級二千是歲疏勒罽賓婆羅捺烏萇阿喻羅婆不崙拔羅弗波女提斯羅噠舍伏耆奚那太羅槃烏稽悉萬斤朱居槃訶盤撥斤厭味朱沴洛南天竺持沙那斯頭諸國並遣使朝貢河州大飢死者二千餘口四年春正月乙亥車駕籍田於千畝梁州氐楊會反詔行梁州事, WYG: ''}
