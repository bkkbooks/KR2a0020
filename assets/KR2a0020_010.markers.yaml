  - {type: variant, offset: 1847, length: 6581, content: 左將軍羊祉討之三月己巳皇后先蠶於北郊庚辰揚州破蕭衍將於陰山斬其龍驤將軍吳道爽等數千級夏四月癸未朔以蕭寶夤為鎮東將軍東揚州刺史封丹陽郡開國公齊王庚寅南天竺國獻辟支佛牙戊戌詔曰酷吏為禍綿古同患孝婦淫刑東海燋壤今不雨十旬意者其有寃獄乎尚書鞫京師見囚務盡聽察之理己亥帝以旱減膳徹懸辛丑澍雨大洽五月甲戌楊椿羊祉大破反氐斬首數千級六月壬午朔封皇弟悅為汝南王丙戌發冀定瀛相并濟六州二萬人馬千匹增配壽春秋七月乙卯三老平陽公丕薨庚午詔還收鹽池利以入公辛未以彭城王勰為太師八月庚子以吏部尚書元英假鎮南將軍攻蕭衍義陽勿吉國貢楛矢辛丑行幸河南城離宮冬十有一月壬子揚州大破蕭衍軍斬其徐州刺史潘佃憐擒司馬明素己未以武興國世子楊紹先為其國王癸亥詔尚書左僕射源懷撫勞代都北鎮隨方拯恤乙亥鎮南將軍元英大破蕭衍將吳子陽於白沙擒斬千數十有二月庚寅詔鎮南將軍李崇討東荊反蠻丙申詔曰先朝制立軌式庶事惟允但歲積人移物情乖惰比或擅有增損廢墜不行或守舊遺宜時有舛妨或職分錯亂互相推委其下百司列其疑闕速以奏聞癸卯蕭衍梁州刺史平陽縣開國侯翟遠徐州刺史永昌縣開國侯陳虎牙降正始元年春正月庚戌江州刺史曲江公陳伯之破蕭衍將趙祖悅於東關丙辰東荊州刺史楊大眼大破羣蠻樊季安等丙寅大赦改年二月戊子蕭衍將姜慶真襲陷壽春外郭州軍擊走之丁酉揚州統軍劉思祖大破衍衆於邵陽擒其冠軍將軍邵陽縣開國侯張惠紹驍騎將軍祁陽縣開國男趙景悅等十將斬獲數千級三月壬申元英破衍將王僧炳於樊城夏四月辛卯高麗國遣使朝獻五月丁未朔太傅北海王詳以罪廢為庶人六月以旱徹樂減膳癸巳詔曰朕以匪德政刑多舛陽旱歷旬京甸枯瘁在予之責夙宵疚懷有司可循案舊典祗行六事囹圄寃滯平處決之庶尹廢職量加修舉魚眾寡困窮在所存恤役賦殷煩咸加蠲省賢良讜直以禮進之貪殘佞諛時加屏黜男女怨曠務令媾會稱朕意焉甲午帝以旱親薦享於太廟戊戌詔立周旦夷齊廟於首陽山庚子以旱見公卿已下引咎責躬又錄京師見囚殊死已下皆減一等鞭杖之坐悉皆原之秋七月癸丑蕭衍角城戍主柴慶宗以城來降李崇大破諸蠻帥樊素安八月丙子元英破蕭衍將馬仙琕於義陽詔洛陽令有大事聽面敷奏乙酉元英攻義陽拔之擒送蕭衍冠軍將軍蔡靈恩等十餘將辛卯英又大破衍將仍清三關丁酉封元英為中山王戊戌西羌宋萬率戶四千內附九月丙午詔緣淮南北所在鎮戍皆令及秋播麥春種粟稻隨其土宜水陸兼用必使地無遺利兵無餘力比及來稔令公私俱濟也又詔諸州蠲停徭役不得橫有徵發甲子詔中山王英所執蕭衍冠軍將軍監司州事蔡靈恩等隨才擢乙丑蕭衍霍州刺史田道龍義州刺史張宗之遣使內附蠕蠕犯塞詔左僕射源懷討之冬十月乙未詔斷羣官白衣募吏十有一月戊午詔曰古之哲王創業垂統安民立化莫不崇建膠序開訓國冑昭宣三禮崇明四術使道暢羣邦風流萬宇自皇基徙構光宅中區軍國務殷未遑經建靖言思之有慚古烈可敕有司依漢魏舊章營繕國學十有二月丙子以苑牧公田分賜代遷之戶己卯詔羣臣議定律令己亥行幸伊闕閏月癸卯朔蕭衍行梁州事夏侯道遷據漢中來降假尚書邢巒鎮西將軍率衆以赴之乙丑驃騎大將軍高陽王雍為司空尚書令廣陽王嘉加儀同三司二年春正月丙子以宕昌國世子梁彌博為其國王鄧至國遣使朝貢二月梁州氐反絕漢中運路刺史邢巒頻大破之夏四月己未城陽王鸞薨乙丑詔曰任賢明治自昔通規宣風贊務實惟多士而中正所銓但存門第吏部彝倫仍不才舉遂使英德罕昇司務多滯不精厥選將何考陟八座可審議往代貢士之方擢賢之體必令才學並申資望兼致丙寅以仇池氐叛詔光祿大夫楊椿假平西將軍率衆以討之邢巒遣統軍王足西伐頻破蕭衍諸軍遂入劍閣執衍輔國將軍范始男送京師五月辛巳氐賊虎率衆降六月己丑詔曰先朝勳臣或身罹譴黜子孫沉滯或宦途失次有替舊流因而弗採何以奬勸言念前績情有親疏宗及庶族祖曾功績可紀而無朝官有官而才堪優引者隨才銓授甲寅蕭衍冠軍將軍李畋等置營始平郡東涪水之北王足逆擊敗之斬衍冠軍將軍張湯輔國將軍馬市寧朔將軍李當姜見祖輔國將軍馮文豪龍驤將軍何營之等甲子詔尚書李崇太府卿于忠散騎常侍游肇諫議大夫鄧羨崇忠使持節並兼侍中羨兼黃門俱為大使糾斷外州畿內其守令之徒咎失彰露者即便施決州鎮重職聽為表聞乙丑蕭衍冠軍將軍王景胤輔國將軍魯方達等攻竹亭王足大破之斬其輔國將軍王明達龍驤將軍張方熾丁卯揚州刺史薛真度大破蕭衍將王超宗俘斬三千級戊辰蕭衍將魯方達屯戍新城足又遣統軍盧祖遷等擊敗之斬衍冠軍將軍楊伯仁寧朔將軍任安定秋七月甲戌詔曰朕纂馭寶曆於今七載德澤未敷鑒不燭遠人之寃瘼所在猶滋而糾察之獄未暢于下賢愚靡分皂白均貫非所以革民耳目使善惡勵心今分遣大使省方巡檢隨其愆負與風響相符者即加糾黜以明雷霆之威以申旄軒之舉因以觀風辨俗採訪功過褒賞賢者糾罰淫慝理窮恤弊以稱朕心戊子王足擊破蕭衍軍斬其龍驤將軍喻增暉寧朔將軍庫保壽輔國將軍魯天惠建武將軍王文標王足逼涪城壬辰蕭衍巴西太守庾域冠軍將軍統軍主李畋等逆戰足擊破之俘斬千數八月壬寅詔中山王英南討襄沔庚戌王足遣統軍紀洪雅盧祖遷等攻破衍軍斬其秦梁二州刺史魯方達等十五人壬子王足又遣統軍盧祖遷等擊破衍軍斬其都督冠軍將軍梓潼縣開國子王景胤劉達等二十四將軍甲寅揚州擊衍將姜慶真於羊石破之是月衍沔東太守田青喜率郡七縣三十一戶萬九十內附九月己巳揚州刺史元嵩擊破衍湘州刺史楊公則等斬獲數千冬十有一月戊辰朔武興國王楊紹先叔父集起謀反詔光祿大夫楊椿討之王足圍涪城益州諸郡戍降者十二三民送編籍者五萬餘戶既而足引軍而退十有二月庚申又詔驃騎大將軍源懷慎令討武興反氐三年春正月丁卯朔皇子生大赦天下壬申梁秦二州刺史邢巒連破氐賊克武興蕭衍冀州刺史桓和入寇南青州州軍擊走之秦州民王智等聚衆二千自號王公尋推秦州主簿呂苟兒為主年號建明己卯楊集起兄弟相率降二月丙辰詔曰昔虞戒面從昌言屢進周任諫輔王闕必箴朕仰纘鴻基伏膺寶曆思康庶績一日萬幾是以側望忠言虛求讜直而良策弗進規畫無聞豈所謂弼諧元首匡救不逮者乎可詔王公已下其有嘉謀深圖直言忠諫利國便民矯時厲俗者咸令指事陳奏無或依違戊午詔右衞將軍元麗等討呂苟兒乙丑平南將軍陳伯之破蕭衍徐州刺史昌義之於梁城是月衍將蕭昞率衆五萬寇淮陽三月己巳以戎旅大興詔罷諸作己卯詔荊州刺史趙怡平南將軍奚康生赴淮陽樂良王長命坐殺人賜死國除戊子名皇子曰昌庚寅平南將軍曲江縣開國公陳伯之自梁城南奔夏四月乙未詔罷鹽池禁甲辰詔遣使者巡慰北邊酋庶庚戌以中山王英為征南將軍都督揚徐二道諸軍事指授邊將蕭衍江州刺史王茂先寇荊州屯於河南城詔平南將軍楊大眼討之辛酉大破之斬其輔國將軍王花首虜二千餘進攻河南城茂先逃潰追奔至於漢水拔其五城將軍宇文福略衍司州俘獲千餘口而還五月乙丑朔詔尚書拯義陽初附之戶丙寅詔曰掩骼埋胔古之令典順辰修令朝之式今時澤未降春稼已旱或有孤老餒疾無人贍救因以致死暴露溝塹者洛陽部尉依法棺埋壬申蕭衍將張惠紹入寇陷宿豫乙亥衍將蕭容陷梁城辛巳衍將韋叡陷合肥城壬午詔尚書元遙率衆南討癸未以秦隴未平詔征西將軍于勁節度諸軍己丑衍將又陷羊石霍丘二城六月辛丑又陷小峴戍乙巳安西將軍元麗大破秦賊斬賊帥王智五人梟首六千丁未假平南將軍奚康生破蕭衍將張惠紹斬其徐州刺史宋黑丁巳詔尚書邢巒出討徐兗秋七月丙寅衍將桓和寇孤山陷固城庚辰元麗大破秦賊降呂苟兒及其王公三十餘人秦涇二州平戊子中山王英大破衍徐州刺史王伯敖於陰陵斬其將二十五人首虜五千有餘己丑詔發定冀瀛相并肆六州十萬人以濟南軍八月壬寅安東將軍邢巒破蕭衍將桓和於孤山斬首萬餘級將軍元別克固城斬衍冠軍將軍桓方慶統軍畢祖朽別克蒙山斬衍龍驤將軍矯道儀等斬賊及赴沂死者四千餘人兗州平己酉詔平南將軍安樂王詮督後發諸軍以赴淮南壬戌曲赦涇秦岐涼河五州九月癸酉邢巒大破衍軍於宿豫斬其大將藍懷恭等四十餘人張惠紹棄宿豫蕭昞棄淮陽南走追斬數萬級徐州平己丑中山王英大破衍軍於淮南衍中軍大將軍臨川王蕭宏尚書右僕射柳惔徐州刺史昌義之等棄梁城沿淮東走追奔次於馬頭衍冠軍將軍戍主朱思遠棄城宵遁擒送衍將四十餘人斬獲士卒五萬有餘英遂攻鍾離高麗國遣使朝貢蕭衍遣將士卒三萬寇義陽丁酉夜遁走郢州刺史婁悅追擊破之戊申蠕蠕國遣使朝貢己未征虜將軍趙遐大破衍衆於𡉚攵城桑坪十有一月甲子帝為京兆王愉清河王懌廣平王懷汝南王悅講孝經於式乾殿庚寅詔曰往歲隴右扇逆合境不民其中猶有卒能自守無豫釁亂疾風知勁良在可嘉尚書可甄量報賞以表誠義是月梁州再破反獠四年春二月丙午吐谷渾宕昌國並遣使朝獻己未勿吉國貢楛矢三月丙子疊伏羅國遣使朝貢夏四月戊戌鍾離大水中山王英敗績而還壬寅吐谷渾鳩磨羅阿拔磨拔切磨勒悉萬斤諸國並遣使朝獻六月己丑朔詔曰高祖德格兩儀明並日月播文教以懷遠人調禮學以旌儁造徙縣中區光宅天邑總霜露之所均一姬卜於洛涘戎繕兼興未遑儒教朕纂承鴻緒君臨寶曆思模聖規述遵先志今天平地寧方隅無事可敕有司準訪前式置國子立太學樹小學於四門丙午蕭衍龍驤將軍馮翊太守宇文子生等七郡相率內附丁未社蘭達那羅舍彌比羅直諸國並遣使朝獻秋八月辛卯契丹國遣使朝獻己亥中山王英齊王蕭寶夤坐鍾離敗退並除名為民庚子庫莫奚宕昌吐谷渾諸國遣使朝獻辛丑敦煌民飢開倉賑恤九月己未詔曰朕秉曆承天履年將紀徙正宮極歲浹歸餘台懿茂親祗勤已久列司英彥庸績未酬非所謂有功見知賞以時及其以司空高陽王雍為太尉尚書令廣陽王嘉為司空百官悉進位一級庚申夏州長史曹明謀反伏誅甲子開斜谷舊道疏勒車勒阿駒南天竺婆羅等諸國遣使朝獻丙戌司州民飢開倉賑恤閏月甲午禁大司馬門不得車馬出入冬十月丁巳高麗半社悉萬斤可流伽比沙疏勒于闐等諸國並遣使朝獻丁卯皇后于氏崩戊辰疏勒國遣使朝貢庚午淮陽太守安樂以城南叛辛未肽噠波斯渴槃渴文提不那杖忸杖提等諸國並遣使朝獻乙酉葬順皇后於永泰陵十有一月丁未禁河南畜牝馬自碣石至於劍閣東西七千里置二十二都尉己酉阿與呵羅槃跋吐羅諸國並遣使朝獻十有二月戊午詔兵士鍾離沒落者復一房田租三年辛酉特那杖提莎鉢離阿失勒摩致鉢諸國遣使朝貢甲子蠕蠕高車民他莫孤率部來降丁丑鉢崙波利伏佛冑善乾達諸國遣使朝貢永平元年春正月戊戌潁川太守王神念奔於蕭衍二月辛未勿吉南天竺國並遣使朝獻三月戊子皇子昌薨己亥斯羅阿比羅阿夷义多婆那伽伽師達于闐諸國並遣使朝獻丙午以去年旱儉遣使者所在賙恤夏四月阿伏至羅國遣使朝貢五月癸未高麗國遣使朝獻辛卯帝以旱故減膳撤懸六月壬申詔曰慎獄重刑著於往誥朕御茲寶曆明鑒未遠斷決煩疑實有攸愧可依洛陽舊圖修聽訟觀農隙起功及冬令就當與王公卿士親臨錄問癸酉高車國遣使朝貢秋七月辛卯高車契丹汗畔罽賓諸國並遣使朝獻甲午以夫人高氏為皇后乙未詔曰察獄以情審之五聽枷杖小大各宜定準然比廷尉司州河南洛陽河陰及諸獄官鞫訊之理未盡矜恕掠拷之苦每多切酷非所以祗憲量衷慎刑重命者也推濫究枉良軫於懷可付尚書精檢枷杖違制之由斷罪聞奏八月癸亥冀州刺史京兆王愉據州反乙丑假尚書李平鎮北將軍行冀州事以討之丁卯大赦改年庚午吐谷渾庫莫奚國並遣使朝貢九月辛巳朔李平大破元愉於草橋丙戌復前中山王英本封壬辰蠕蠕國遣使朝貢定州刺史安樂王詮大破元愉於信都北戊戌殺侍中太師彭城王勰辛丑詔赦冀州民雜工役為元愉所詿誤者其能斬獲逆黨別加優賞癸卯李平克信都元愉北走斬其所署冀州牧韋超右衞將軍睦雅尚書僕射劉子直吏部尚書崔朏等統軍叔孫頭執愉送信都羣臣請誅愉帝弗許詔送京師冀州平庚子郢州司馬彭珍治中督榮祖等謀叛潛引蕭衍衆入義陽郢州刺史婁悅擊走之詔將軍胡季智屈祖等南赴義陽三關戍主侯登陽鳳省等以城南叛婁悅嬰城固守遣中山王英督步騎三萬以赴之冬十月丁巳詔復故北海王詳本封葬以王禮豫州彭城人白早生殺刺史司馬悅據城南叛蕭衍遣將齊苟仁等四將以助之詔尚書邢巒行豫州事督將軍崔暹率騎討之丙子邢巒大破早生及苟仁軍於鮑口丁丑前宿豫戍主成安樂子景儁殺宿豫戍主嚴仲賢以城南叛十有一月庚寅詔安東將軍楊椿率衆四萬攻宿豫十有二月己未邢巒克懸瓠斬白早生擒齊苟仁等俘蕭衍卒三千餘人分賜王公已下癸亥中山王英破衍將於楚城擒衍寧朔將軍張疑等郢州刺史婁悅破衍將馬仙琕於金山壬申漢東蠻民一萬七千戶相率內附丙子高麗國遣使朝獻是歲高昌國王麴嘉遣其兄子私署左衞將軍孝亮奉表來朝因求內徙乞師迎接二年春正月蕭衍遣王神念寇南兗詔輔國將軍長孫稚假平南將軍為都督率統軍邴虬等五軍以討之丁亥胡密步就磨忸密槃是悉萬斤辛豆那越拔忸諸國並遣使朝獻壬辰肽噠薄知國遣使來朝貢白象一乙未高昌國遣使朝貢丙申中山王英進逼蕭衍長薄戍戊戌宵潰殺傷千數丁酉拔武陽關擒衍雲騎將軍松滋縣開國侯馬廣冠軍將軍遷陵縣開國子彭生驍騎將軍當陽縣開國伯徐元季等二十六將俘獲七千餘人進攻黃峴西關衍將馬仙琕棄西關李元履棄黃峴遁走是月涇州沙門劉慧汪聚衆反詔華州刺史奚康生討之二月乙卯詔曰比軍役頻興仗多毀敗在庫戎器見有無幾安不忘危古人所戒五兵之器事須充積經造既殷非衆莫舉今可量造四萬人雜仗三月癸未磨豆羅阿曜社蘇突闍地伏羅諸國並遣使朝獻夏四月己酉詔以武川鎮飢開倉賑恤甲子詔曰聖人濟世隨物汙隆或正或權理無在先朝以雲駕甫遷嵩基始構河洛民庶徙舊未安代來新宅尚不能就伊闕西南羣蠻填聚沔陽賊城連邑作戍蠢爾愚巴心未純款故暫抑造育之仁權緩肅姦之法今京師天固與昔不同楊郢荊益皆悉我有保險諸蠻罔不歸附商洛民情誠倍往日唯樊襄已南仁乖道政被拘隔化非民之咎而無賴之徒輕相劫掠屠害良善離人父兄衍之為酷實亦深矣便可放彼掠民示其大惠捨此殘賊未令之愆并敕緣邊州鎮自今已後不聽境外寇盜犯者罪同境內若州鎮主將知容不糾坐之如律五月高麗國遣使朝獻辛丑帝以旱故減膳徹懸禁斷屠殺甲辰幸華林都亭親錄囚徒犯死罪已下降一等六月高昌國遣使朝獻辛亥詔曰江海方同車書宜一諸州軌轍南北不等今可申敕四方使遠近無二秋七月癸未契丹國遣使朝獻八月丁未鄧至國遣使朝獻戊申以鄧至國世子像覽蹄為其國王高昌勿吉庫莫奚諸國並遣使朝獻九月辛巳封故北海王子顥為北海王壬午詔定諸門闥名冬十月癸丑以司空廣陽王嘉為司徒庚午郢州獻七寶牀詔不納十有一月甲申詔禁屠殺含孕以為永制己丑帝於式乾殿為諸僧朝臣講維摩詰經十有二月詔曰五等諸侯比無選式其同姓者出身公正六下侯從六上伯從六下子正七上男正七下異族出身公從七上侯從七下伯正八上子正八下男從八上清修出身公從八下侯正九上伯正九下子從九上男從九下可依此之疊伏羅弗菩提朝咤波羅諸國並遣使朝獻三年春二月丙午高昌鄧至國並遣使朝獻壬子秦州沙門劉光秀謀反州郡捕斬之癸亥秦州隴西羌殺鎮將趙儁阻兵反叛州軍討平之三月丙戌皇子生大赦天下高麗吐谷渾宕昌諸國並遣使朝獻夏四月平陽郡之禽昌襄陵二縣大疫自正月至此月死者二千七百三十人五月丁亥詔以冀定二州旱儉開倉賑恤六月壬寅詔重求遺書於天下丁卯名皇子曰詡閏月己亥吐谷渾高麗契丹諸國各遣使朝貢秋七月己未吐谷渾國遣使朝貢八月己卯勿吉國遣使朝貢九月壬寅烏萇伽秀沙尼諸國並遣使朝獻丙辰高車別帥可略汗等率衆一千七百內屬冬十月辛卯中山王英薨丙申詔曰朕乘乾御曆年周一紀而道謝擊壤教慚刑厝至於下民之煢魚眾疾苦心常愍之此而不恤豈為民父母之意也可敕太常於閑敞之處別立一館使京畿內外疾病之徒咸令居處嚴敕醫署分師療治考其能否而行賞罰雖齡數有期修短分定然三疾