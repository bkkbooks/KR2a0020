  - {type: variant, offset: 9999, length: 2, content: 量矣, WYG: 跡日月以甚㧞髪數罪盖不足稱斬竹書愆豈云能盡方復托名朝宗隂圖釁逆睥睨天居窺覦聖厯乃有裂冠毁冕之心将為㧞本塞源之事天既厭亂人亦悔禍同惡之臣宻來投告将而必誅罪無容捨又元天穆宗室末屬名望素㣲遭逢際㑹頗參義舉不能竭其忠誠以奉家國乃復棄本逐末背同即異為之謀主成彼禍心是而可忍孰不可恕並以伏辜自貽伊慼元惡既除人神慶泰便可大赦天下遣武衛将軍奚毅前燕州刺史崔淵率兵鎮北中是夜僕射爾朱世隆榮妻郷郡長公主率榮部曲焚西陽門出屯河隂己亥攻河橋擒毅等於途害之據北中城南逼京邑詔以驃騎大將軍雍州刺史廣宗郡開國公尒朱天光為侍中儀同三司以侍中司空公楊津為使持節督并肆燕恒雲朔顯汾蔚九州諸軍事驃騎大将軍并州刺史兼尚書令北道大行臺經略并肆庚子詔諸舊代人赴華林園帝将親簡敘以撫軍将軍金紫光禄大夫髙乾邕為侍中河北大使招集驍勇冬十月癸夘朔封安南将軍大鴻臚卿元寳炬為南陽王大宗正卿汝陽縣開國公元修為平陽王通直散騎常侍龍驤将軍新陽縣開國伯元誕為昌樂王復通直散騎常侍琅邪縣開國公李叔仁官爵仍為使持節大都督以討世隆甲辰以魏郡王諶徙封趙郡王諶弟子趙郡王寘改封平昌王儀同三司李虔薨丁未班募攻河橋格賞帛授官各有差戊申皇子生大赦天下文武百寮汎二級以平南将軍中書令魏蘭根兼尚書左僕射為河北行臺定相殷三州禀蘭根節度乙夘通直散騎常侍假平西将軍都督李苖以火舩焚河橋尒朱世隆退走丙辰詔大都督兼尚書僕射行臺源子恭率步騎一萬出自西道行臺楊昱領都督李偘希等部募勇士八千往從東路防守之子恭仍鎮太行丹谷世隆至建州刺史陸希質拒守城䧟盡屠之唯希質獲免以中軍将軍前東荆州刺史元顯恭為使持節都督晉建南汾三州諸軍事鎮西将軍晉州刺史兼尚書左僕射為征西道行臺節度都督薛善樂薛修義裴元雋薛崇禮薛憘族等丁夘詔以世隆北叛河内固守其在城督将文武普加二級兵士給復三年壬申尒朱世隆停建興之髙都尒朱兆自晉陽來㑹之共推太原太守行并州刺史長廣王曄為主大赦所部號年建明普汎四級徐州刺史爾朱仲逺反率衆向京師十有一月癸酉朔詔車騎将軍左衛将軍鄭先護為使持節大将軍大都督與都督李偘希赴行臺楊昱以討之乙亥以使持節兼尚書令西道大行臺司徒公長孫稚為太尉公侍中尚書令驃騎大将軍開府儀同三司臨淮王彧為司徒公丙子以驃騎大将軍儀同三司雍州刺史廣宗郡開國公尒朱天光開府進爵為王丁丑尒朱仲逺䧟西兗州執刺史王衍癸未以右衛将軍賀拔勝為東征都督壬辰又以左衛将軍大都督鄭先護兼尚書左僕射為行臺與勝並討仲逺戊戍詔罷魏蘭根行臺以後将軍定州刺史薛曇尚為使持節兼尚書為北道行臺隨機召發行豫州刺史元崇禮殺後行州事隂導和擅攝豫州庚子賀拔勝與仲逺戰於滑臺東失利仍奔之十有二月壬寅朔尒朱兆宼丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆大都督源子恭奔退甲辰尒朱兆尒朱度律自富平津上率騎渉渡以襲京城事出倉卒禁衛不守帝出雲龍門兆逼帝幸永寜佛寺殺皇子并殺司徒公臨淮王彧左僕射范陽王誨戊申元曄大赦天下爾朱度律自鎮京師甲寅尒朱兆遷帝於晉陽甲子崩於城内三級佛寺時年二十四并害陳留王寛是月河西人紇豆陵歩蕃破落韓常大敗尒朱兆於秀容齊州城人趙洛周據西城反應尒朱兆刺史丹陽王蕭贊棄城走南陽太守趙脩延執荆州刺史李琰之自行州事中興二年諡為武懐皇帝太昌元年又諡孝莊皇帝廟號敬宗十一月葬於静陵}
