  - {type: variant, offset: 9869, length: 0, content: '', WYG: 隆鎮虎牢侍中尒朱世承鎮崿岅辛酉詔私馬仗從戎優階授官壬戍又詔募士一依征葛榮甲子又詔職人及民出馬優階各有差乙丑内外戒嚴癸酉元顥䧟滎陽執楊昱􅈛朱世隆棄虎牢遁還甲戍車駕北廵乙亥幸河内丙子元顥入洛丁丑進封城陽縣開國公元祉為平原王安昌縣開國侯元鷙為華山王並加儀同三司戊寅行臺崔孝芬大都督刁宣破元顥後軍都督侯暄於梁國斬之擒其卒三千人以侍中車騎将軍尚書右僕射尒朱世隆為使持節行臺僕射本将軍相州刺史鎮鄴城以便宜從事又詔上黨百年以下九十以上板三品郡八十以上四品郡七十以上五品郡太原王尒朱榮會車駕於長子即日反斾上黨王天穆北渡會車駕於河内六月己丑儀同三司費穆為顥所害壬寅克河内斬太守元襲都督}
