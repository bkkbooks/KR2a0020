  - {type: variant, offset: 8738, length: 180, content: 貸饑民自二月不雨至於是晦六月壬申澍雨大洽戊寅通河南牝馬之禁己卯詔曰去歲水災今春炎旱百姓饑餒救命靡寄雖經蠶月不能養績今秋輸將及郡縣期於責辦尚書可嚴勒諸州量民資產明加檢校以救艱弊庚辰詔出太倉粟五十萬石以賑京師及州郡饑民秋七月吐谷渾契丹國並遣朝獻八月壬戌吐谷渾國遣使朝貢丁亥勿吉國貢楛矢冬十月乙亥立皇子詡為皇太子是月肽噠于闐高昌及庫莫奚諸國並遣使朝獻十有一月丙申詔曰, WYG: 集華林東門}
