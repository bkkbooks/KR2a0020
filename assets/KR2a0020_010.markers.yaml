  - {type: variant, offset: 9868, length: 0, content: '', WYG: 肅祖皇妣為文穆皇后燕州民王慶祖聚衆於上黨自稱為王柱國大将軍尒朱榮討擒之壬寅詔散騎常侍濟隂王暉業兼行臺尚書督都督李徳龍丘大千鎮梁國三月壬戍詔大將軍上黨王天穆與齊獻武王討邢杲夏四月癸未遷肅祖文穆皇帝及文穆皇后神主于太廟内外百寮普汎加一級曲赦畿内死罪至流人減一等徒刑以下悉免庚子詔太原王尒朱榮下将士並汎加二級辛丑上黨王天穆齊獻武王大破邢杲於齊州之濟南杲降送京師斬於都市元顥攻䧟考城執行臺元暉業都督丘大千五月壬子朔元顥克梁國丁巳以撫軍将軍前徐州刺史楊昱為使持節鎮東将軍東南道大都督率衆鎮榮陽尚書僕射尒朱}
