  - {type: variant, offset: 9942, length: 1, content: 勰, WYG: 平南将軍南兗州刺史元暹為汝陽王閏月辛巳帝始居宫内辛夘以車騎将軍兼吏部尚書楊津為司空巴州刺史嚴始欣據州南叛蕭衍遣其将蕭玩張鴻江茂逹等率衆赴援八月庚戍朔詔諸有公私債負一錢以上巨萬以還悉皆禁斷不得徴責己未以侍中太𫝊李延寔為司徒公丁夘封𤓰州刺史元太榮為東陽王甲戍侍中太保楊椿致仕乙亥詔車騎将軍右光禄大夫奚毅板授天柱大将軍尒朱榮太宰天穆下勲及祖父叔伯耆年者牧守有差九月大都督侯淵討韓樓於薊破斬之幽州平万俟醜奴攻東秦城䧟之殺刺史髙子朗冬十月丁丑以前司空公丹陽王蕭賛為司徒公十有一月己夘就徳興自營州遣使請降丁亥詔羣官休停在外者皆令赴闕程㑹有差丙午以大司馬太尉公城陽王徽為太保司徒公丹陽王蕭替為太尉公開府儀同三司雍州刺史長孫稚為司徒公十有二月辛亥蕭衍兗州刺史張景邕荆州刺史李靈起雄信将軍蕭進明來降三年春正月己丑益州刺史長孫壽梁州刺史元雋等遣将與征巴州都督元景夏討嚴始欣斬之蕭衍都督蕭玩何難尉陳愁敗走斬玩首俘獲萬餘人辛丑東徐州城民呂文欣王赦等殺刺史元太賔據城反以撫軍将軍都官尚書樊子鵠兼右僕射為行臺督征南將軍都督賈顯智征東将軍徐州刺史嚴思達以討之二月甲寅克之東徐平三月醜奴大行臺尉遲菩薩宼岐州大都督賀㧞岳可朱渾道元大破之夏四月丁巳以侍中太尉公丹陽王蕭贊為使持節都督齊濟兗三州諸軍事驃騎大将軍開府儀同三司齊州刺史丁夘雍州刺史尒朱天光討醜奴蕭寳夤於安定破擒之囚送京師甲戍以關中平大赦天下醜奴斬於都市寳夤賜死於駞牛署六月戊午詔胡民親屬受爵於朝者黜附編民嚈噠國獻師子一是月白馬龍涸胡王慶雲僭稱大位於永洛城署置百官秋七月丙子天光平永洛城擒慶雲坑其城民一萬七千癸巳蕭衍民革虬卜湯世率堡聚内附庚子車騎大将軍儀同三司李叔仁坐事除名為民九月辛夘天柱大将軍尒朱榮上黨王天穆自晉陽來朝戊戌帝殺榮天穆於明光殿及榮子儀同三司菩提乃昇閶闔門詔}
