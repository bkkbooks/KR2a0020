  - {type: variant, offset: 93, length: 0, content: '', WYG: 帝位以兄彭城王劭為無上王弟覇城公子正為始平王以榮為使持節侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王己亥百寮相率有司奉璽紱備法駕奉迎於河梁庚子車駕廵河西至陶渚榮以兵權在己遂有異志乃害靈太后及㓜主次害無上王劭始平王子正又害丞相髙陽王雍司空公元欽儀同三司元恒芝儀同三司東平王略廣平王悌常山王邵北平王超任城王彛趙郡王敏中山王叔仁齊郡王温公卿已下二千餘人列騎衛帝遷於便幕既而榮悔稽顙謝罪語在榮傳辛丑車駕入宫御太極殿詔曰太祖誕命應期龍飛燕代累世重光載隆帝緒冀欲闡兹洪業永在無窮豈圗多難遘兹百六致使妖悖四起内外競侵朝無恤政之臣野多怨酷之士實由女主專朝致兹顛覆孝明}
