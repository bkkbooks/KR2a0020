  - {type: variant, offset: 9944, length: 3, content: 吾固疑, WYG: 蓋天道忌盈人倫嫉惡疎而不漏刑之無捨是以呂霍之門禍譴所伏梁董之家咎徴斯在頃孝昌之末天歩孔艱女主亂政監國無主􅈛朱榮爰自晉陽同憂王室義旗之建大會盟津與世樂推共成鴻業論其始圖非無勞效但致逺恐泥終之實難曾未崇朝豺聲已露河隂之役安忍無親王公卿士一朝塗地宗戚靡遺内外俱盡假弄天威殆危神器時事倉卒未遑問罪尋以葛賊横行馬首南向捨過責成用平醜虜及元顥問鼎大駕北廵復致勤王展力行所以}
