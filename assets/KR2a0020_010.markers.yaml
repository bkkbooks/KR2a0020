  - {type: variant, offset: 8461, length: 0, content: '', krp: 頓丘郡開國公穆紹為司空公領尚書令進爵為王使持節車騎大将軍雍州刺史上黨公長孫稚為驃騎大将軍開府儀同}
  - {type: variant, offset: 8462, length: 0, content: '', WYG: 司進爵為王㝷改封馮翊王中軍将軍殿中尚書元諶為儀同三司尚書左僕射封魏郡王中軍将軍給事黄門侍郎元瑱為東海王金紫光禄大夫廣陵王恭為儀同三司甲辰追復故廣陽王淵故樂安王鑒爵通直散騎常侍敷城王坦為咸陽王諫議大夫元貴平為東萊王直閣将軍元肅為魯郡王秘書郎中元曄為長廣王馮翊郡開國公源紹景復先爵隴西王扶風郡開國公馮冏東郡公陸子彰北平公長孫悦並復其先王爵以北平王超還復為安定王丁未詔内外觧嚴庚戍封大将軍尒朱榮次子义羅為梁郡王詔蠕蠕主阿那瓌賛拜不名上書不稱臣是}
