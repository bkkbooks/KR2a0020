  - {type: variant, offset: 698, length: 330, content: 禧進位太保司空北海王詳為大將軍錄尚書事丁巳引見羣臣於太極前殿告以覽政之意辛酉高麗國遣使朝獻壬戌以太保咸陽王禧領太尉大將軍廣陵王羽為司徒詔曰朕幼承寶曆艱憂在疚庶事不親風化未洽今始覽政務義協惟新思使四方風從率善可分遣大使黜陟幽明二月庚午宿衞之官進位一級甲戌大赦天下三月乙未朔詔曰比年以來連有軍旅役務既多百姓彫弊宜時矜量以拯民瘼正調之外諸妨害損民一時蠲罷辛亥詔曰諸州刺史不親民事緩於督察郡縣稽逋旬月之間纔一覽決淹獄久訟動延時序百姓怨嗟方成困弊尚書可明條制申下四方令日親庶事嚴勒守宰不得因循寬怠虧政壬戌詔曰治尚簡靜任貴應事州府佐史除板稍多方成損弊無益政道又京師百司僚局殷雜官有閑長者亦同此例苟非稱要悉從蠲省青齊徐兗四州大飢民死者萬餘口是月蕭衍立寶卷弟南康王寶融為主年號, WYG: 侍}
