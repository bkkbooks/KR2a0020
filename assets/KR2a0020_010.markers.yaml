  - {type: variant, offset: 9103, length: 1, content: 魯, WYG: 子鵠克唐州斬刺史崔元珍行臺酈惲傳首京師壬午詔求徳行文藝政事強直者縣令太守刺史皆敘其志業具以表聞得三人以上縣令太守刺史賞一階舉非其人亦黜一階又以舊敘軍勲不過征虜自今以後宜依前式以上餘階積而為品其從輿駕北來之徒不在此例悉不聼破品受階破階請帛先是蕭衍遣其将曹義宗宼荆州癸未以中軍将軍吏部尚書費穆為使持節都督南征諸軍事節度荆州刺史王羆以討之六月丁亥朔追封兄真定縣開國公子直為陳留王庚寅以鎮軍将軍金紫光禄大夫李虔為車騎大將軍儀同三司特進辛夘南荆州刺史李志據城南叛通直散騎常侍髙乾邕及弟等率合流民起兵於齊州之平原頻破州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒率車三萬餘乗南宼至沁水癸夘以髙昌王世子光為平西将軍𤓰州刺史襲爵泰臨縣開國伯髙昌王太尉公上黨王天穆為大都督東北道諸軍事率都督宗正珍孫奚毅賀㧞勝尒朱陽都等討任褒帝以宼難未夷避正殿責躬徹膳又班募格收集忠勇其有直言正諌之士敢決徇義之夫陳國家利害之謀赴君親危難之節者集華林園面諭事幽州平北府主簿河間邢杲率河北流民十餘萬戸反於青州之北海自署漢王號年天統戊申以征東将軍金紫光禄大夫李叔仁為車騎大将軍儀同三司}
