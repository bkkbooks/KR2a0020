  - {type: page-break, offset: 8100, content: '', id: KR2a0020_WYG_072-27a, image: WYG0262/WYG0262-0100c.png}
  - {type: variant, offset: 8101, length: 225, content: 正鴻不殞家風式纘世業古學克明在新必鏡多識前載博極羣書史才富洽號稱籍甚年止壯立便斐然懷著述意正始之末任屬記言撰緝餘暇乃刊著趙燕秦夏涼蜀等遺載為之贊序褒貶評論先朝之日草構悉了唯有李雄蜀書搜索未獲闕茲一國遲留未成去正光三年購訪始得討論適訖而先臣棄世凡十六國名為春秋一百二卷近代之事最為備悉未曾奏上弗敢宣流今繕寫一本敢以仰呈儻或淺陋不回睿賞乞藏祕閣以廣異家子元後謀反事發逃竄會赦免尋為其叔鵾所殺光從祖弟長文字景翰少亦徙於代都聰敏有學識太和中除奉朝請遷洛拜司空, WYG: 兵}
