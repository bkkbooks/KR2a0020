  - {type: variant, offset: 8471, length: 2, content: 德林, WYG: 紹業長樂廣宗人也父靈虬中書侍郎永基性通率輕財好施為冀州鎭東府法曹行參軍遷威烈將軍揚州曲陽戍主轉西硤石戍主治陳留南梁二郡事頗有威惠轉揚州車騎府主簿累遷虎賁中郎將直寢前將軍出為持節平北將軍冀州防城都督長樂太守于時葛榮攻信都長圍遏水以灌州城永基與刺史元孚同心戮力晝夜防拒外無軍援内乏糧儲從春至冬力窮乃陷榮欲害孚永基請以身代孚死永安二年除潁川太守遷鎭東將軍東除州刺史時蕭衍將曹世宗馬洪武等率衆來寇永基出討破之}
