  - {type: variant, offset: 6093, length: 680, content: 治中頗有受納御史案之乃與守者俱逃後除梁郡太守會遭所生母憂不拜敬友精心佛道晝夜誦經免喪之後遂菜食終世恭寬接下修身厲節自景明已降頻歲不登飢寒請丐者皆取足而去又置逆旅於肅然山南大路之北設食以供行者延昌三年二月卒年五十九子鴻字彥鸞少好讀書博綜經史太和二十年拜彭城王國左常侍景明三年遷員外郎兼尚書虞曹郎中敕撰起居注遷給事中兼祠部郎轉尚書都兵郎中詔太師彭城王勰以下公卿朝士儒學才明者三十人議定律令於尚書上省鴻與光俱在其中時論榮之永平初豫州城人白早生殺刺史司馬悅據懸瓠叛詔鎮南將軍邢巒討之以鴻為行臺鎮南長史徙三公郎中加輕車將軍遷員外散騎常侍領郎中延昌二年將大考百僚鴻以考令於體例不通乃建議曰竊惟王者為官求才使人以器黜陟幽明揚清激濁故績效能官才必稱位者朝昇夕進年歲數遷豈拘一階半級閡以僚等位者哉二漢以降太和以前苟必官須此人人稱此職或超騰昇陟數歲而至公卿或長兼試守稱允而遷進者披卷則人人而是舉目則朝貴皆然故能時收多士之譽國號豐賢之美竊見景明以來考格三年成一考一考轉一階貴賤內外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如黃龔儒學如王鄭史才如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一概不曾甄別琴瑟不調改而更張雖明旨已行猶宜消息世宗不從三年鴻以父憂解任甘露降其廬前樹十一月世宗以本官徵鴻四年復有甘露降其京兆宅之庭樹復加中堅將軍常侍領郎如故遷中散大夫高陽王友仍領郎中其年為司徒長史正光元年加前將軍修高祖世宗起居注光撰魏史徒有卷目初未考正闕略尤多每云此史會非我世所成但須記錄時事以待後人臨薨言鴻於肅宗五年正月詔鴻以本官修緝國史孝昌初拜給事黃門侍郎尋加散騎常侍齊州大, WYG: ''}
