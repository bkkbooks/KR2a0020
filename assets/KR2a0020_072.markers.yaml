  - {type: variant, offset: 82, length: 1, content: 崔, WYG: 延興從弟固字敬安性俶儻不拘小節少任俠好劒客弗事生産年二十六始折節好學遂博覽篇籍有文才太和中從大將軍宋王劉昶征義陽板府法曹行參軍假陵江將軍昶嚴暴治軍甚急三軍戰慄無敢言者固啓諫幷面陳事宜昶大怒欲斬之使監當攻}
  - {type: variant, offset: 82, length: 1, content: 崔, krp: 延興從弟固字敬安性俶儻不拘小節少任俠好劒客弗事生産年二十六始折節好學遂博覽篇籍有文才太和中從大將軍宋王劉昶征義陽板府法曹行參軍假陵江將軍昶嚴暴治軍甚急三軍戰慄無敢言者固啓諫幷面陳事宜昶大怒欲斬之使監當攻}
  - {type: variant, offset: 85, length: 2, content: 共拒, WYG: 在軍勇決志意閑雅了無懼色昶甚竒之軍還言之髙祖年三十餘始辟大將軍府參軍事署城局仍從昶鎭彭城板兼長史俄以憂去任裴叔業以淮南内附世宗詔平南將軍廣陵侯元衎與司徒彭城王勰同鎭壽春勑固為衎司馬還除太尉西閤祭酒兼廷尉評上改定律令議除給事中出為試守平北太守甚有惠政乆之以公事免後除給事中領侍御史轉治書劾奏廣平王懷汝南王悦南陽長公主及使懷荒鎭將萬貳望風逃走劾恒農太守裴粲免官時世宗廣訪得失固上讜言表曰臣聞為治不在多方在於力行而已當今之務宜早正東儲立師傅以保護立官司以防衛以係蒼生之心攬權衡親宗室彊幹弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素餐孜孜萬幾躬勤庶務使民無謗讟之響省徭役薄賦歛修學官遵舊章貴農桑賤工賈絶談虛窮微之論簡桑門無用之費以存元元之民以救飢寒之苦上合昊天之心下悦億兆之望然後備器械修甲兵習水戰滅吳㑹撰封禪之禮襲軒唐之軌同彼七十二君之徽號協定鼎嵩河之心副髙祖殷勤之寄上與三皇比隆下與五帝齊美豈不茂哉臣位卑識昧言不及義屬聖明廣訪敢獻瞽言伏願陛下留神少垂究察初世宗委任羣下不甚親覽好桑門之法尚書令髙肇以外戚權寵專決朝事又咸陽王禧等並有釁故宗室大臣相見疎薄而王畿民庶勞敝益甚固乃作南北二都賦稱恒代田漁聲樂侈靡之事節以中京禮儀之式因以諷諌辭多不載世宗末中尉王顯起宅既成集寮屬饗宴酒酣問固曰此宅何如固對曰晏嬰湫隘流稱于今豐屋生災著於周易此葢同傳舍耳唯有德能卒願公勉之顯嘿然他日又謂固曰吾作太府卿庫藏充實卿以為何如固對曰公收百官之祿四分之一州郡贓贖悉入京藏以此充府未足為多且有聚斂之臣寧有盗臣豈不戒哉顯大不悦以此銜固又有人間固於顯顯因奏固剩請米麥免固官既無事役遂闔門自守著演賾賦以明幽微通塞之事其詞曰紹有周之遐軌兮初錫世於河陽建甸侯而列爵兮與王室而並昌遭季葉之紛亂兮仍矯迹於良鄉棄衛侯之楨弼兮乃植根於幽方自祖考而輝烈兮逮余躬而翳微懼堂構之頽撓兮恐崩毁其洪基心惴惴而慄慄兮若臨深而履薄登喬木而長吟兮抗幽谷而靡託何身輕而任重兮懼顛墜於峻壑慿神明之扶助兮雖幽微而獲存頼先后之醇德兮乃保護其遺孫伊日月之屢遷兮何四時之相逼知年命之有期兮慨斡流之不息傷難躓之相承兮悲屯蹇而日臻心惻愴而不懌兮乃有懷於古人或垂綸於渭濵兮有胥靡於傅巖既應繇而赴兆兮作殷周之元鑒孔栖栖而不息兮終見黜於庶邦墨馳騁而不已兮亦舉世而不容有鸞孤而爭}
