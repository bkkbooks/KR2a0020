  - {type: variant, offset: 6791, length: 1304, content: 度支尚書青州刺史鴻弱冠便有著述之志見晉魏前史皆成一家無所措意以劉淵石勒慕容儁苻健慕容垂姚萇慕容德赫連屈孑張軌李雄呂光乞伏國仁禿髮烏孤李暠沮渠蒙遜馮跋等並因世故跨僭一方各有國書未有統一鴻乃撰為十六國春秋勒成百卷因其舊記時有增損褒貶焉鴻二世仕江左故不錄僭晉劉蕭之書又恐識者責之未敢出行於外世宗聞其撰錄遣散騎常侍趙邕詔鴻曰聞卿撰定諸史甚有條貫便可隨成者送呈朕當於機事之暇覽之鴻以其書有與國初相涉言多失體且既未訖迄不奏聞鴻後典起居乃妄載其表曰臣聞帝王之興也雖誕應圖籙然必有驅除蓋所以翦彼厭政成此樂推故戰國紛紜年過十紀而漢祖夷殄羣豪開四百之業歷文景之懷柔蠻夏世宗之奮揚威武始得涼朔同文牂越一軌於是談遷感漢德之盛痛諸史放絕乃鈐括舊書著成太史所謂緝茲人事光彼天時之義也昔晉惠不競華戎亂起三帝受制於姦臣二皇晏駕於非所五都蕭條鞠為煨燼趙燕既為長蛇遼海緬成殊域窮兵銳進以力相雄中原無主八十餘年遺晉僻遠勢略孤微民殘兵革靡所歸控皇魏龍潛幽代世篤公劉內修德政外抗諸偽并冀之民懷寶之士襁負而至者日月相尋雖邠岐之赴太王謳歌之歸西伯實可同年而語矣太祖道武皇帝以神武之姿接金行之運應天順民龍飛受命太宗必世重光業隆玄默世祖雄才叡略闡曜威靈農戰兼修掃清氛穢歲垂四紀而寰宇一同儋耳文身之長卉服斷髮之酋莫不請朔率職重譯來庭隱愍鴻濟之澤三樂擊壤之歌百姓始得陶然蘇息欣於堯舜之世自晉永寧以後雖所在稱兵競自尊樹而能建邦命氏成為戰國者十有六家善惡興滅之形用兵乖會之勢亦足以垂之將來昭明勸戒但諸史殘缺體例不全編錄紛謬繁略失所宜審正不同定為一書伏惟高祖以大聖應期欽明御運合德乾坤同光日月建格天之功創不世之法開鑿生民惟新大造陛下以青陽繼統叡武承天應符屈己則道高三五頤神至境則洞彼玄宗剖判百家斟酌六籍遠邁石渠美深白虎至如導禮革俗之風昭文變性之化固以感彼禽魚穆茲寒暑而況愚臣沐浴太和懷音正始而可不勉強難革之性砥礪木石之心哉誠知敏謝允南才非承祚然國志史考之美竊亦輒所庶幾始自景明之初搜集諸國舊史屬遷京甫爾率多分散求之公私驅馳數歲又臣家貧祿薄唯任孤力至於紙盡書寫所資每不周接暨正始元年寫乃向備謹於吏按之暇草構此書區分時事各繫本錄破彼異同凡為一體約損煩文補其不足三豕五門之類一事異年之流皆稽以長曆考諸舊志刪正差謬定為實錄商校大略著春秋百篇至三年之末草成九十五卷唯常璩所撰李雄父子據蜀時書尋訪不獲所以未及繕成輟筆私求七載于今此書本江南撰錄恐中國所無非臣私力所能終得其起兵僭號事之始末乃亦頗有但不得此書懼簡略不成久思陳奏乞敕緣邊求採但愚賤無因不敢輕輒散騎常侍太常少卿荊州大中正臣趙邕忽宣明旨敕臣送呈不悟九臯微志乃得上聞奉敕欣惶慶懼兼至今謹以所訖者附臣邕呈奏臣又別作序例一卷年表一卷仰表皇朝統括大義俯明愚臣著錄微體徒竊慕古人立言美意文致疏鄙無一可觀簡御之日伏深慚悸鴻意如此然自正光以前不敢顯行其書自後以其伯光貴重當朝知時人未能發明其事乃頗相傳讀亦以光故執事者遂不論之鴻經綜既廣多有違謬至如太祖天興二年姚興改號鴻以為改在元年太宗永興二年慕容超擒於廣固鴻又以為事在元年太常二年姚泓敗於長安而鴻亦以為滅在元年如此之失多不考正子子元祕書郎後永安中乃奏其父書曰臣亡考故散騎常侍給事黃門侍郎前, WYG: ''}
