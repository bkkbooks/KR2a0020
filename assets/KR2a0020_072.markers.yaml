  - {type: variant, offset: 11, length: 5, content: 五崔光崔光, WYG: 陽尼賈思伯李叔虎路恃慶房亮曹世表潘永基朱元旭陽尼字景文北平無終人少好學博通羣籍與上谷侯天護頓丘李彪同志齊名幽州刺史胡泥以尼學藝文雅乃表薦之徴拜祕書著作郎奏佛道宜在史録後改中書學為國子學時中書監髙閭侍中李沖等以尼碩學博識舉為國子祭酒髙祖嘗親在苑堂講諸經典詔尼侍聽賜帛百匹尼後兼幽州中正出為幽州平北府長史帶漁陽太守未拜坐為中正時受鄉人財貨免官尼每自傷曰吾昔未仕不曽羡人今日失官與}
