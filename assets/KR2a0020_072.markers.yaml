  - {type: variant, offset: 88, length: 0, content: '', krp: 兮有讓位而採薇有躍馬而赴㑹兮有棲遲以俟時曹納辛而袁亡兮袁戮田而曹盛鮑授州而得時兮韓棄牧而失性趙堯門而誕聖兮終夭隠而不繁衛泯軀於世難兮啓洪業於宣元釋臯繇之法憲兮見蓼六之先亡練疑枉於怨獄兮寧于公之獨昌明禍福之同門兮知休咎之異塗尋倚伏之無源兮或先詘而後舒賜慿軒而策駟兮撫清琴而自娛憲服敝於陋巷兮藴六藝於蓬廬勃計行而致位兮錯謀合而身傾蕭功成而福集兮韓勲立而禍并紛回平而綿結兮亮未識其幽情有積毁而恩昵兮有積譽而寵衰或形乖而意合兮或身密而志離情與貌而紛競兮體與識而交馳旦流言而見疑先緣謗而益信樂食子而中疎兮巴放麑而日進或舉世而稱賢兮偶不合於主心或居鄉而三黜兮獨為時之所欽或負鼎而干主兮或杖䇿於幽林或望旗而色阻兮或臨危而撫琴道有大而由小兮義有顯而必微理貴在於得要兮事終成於㑹機每一日而三省兮亦有念而九思孰有是而可是兮孰有非而可非石育子而啓夏兮鳦遺卵而孕殷鳥藉冰而存棄兮虎乳孩以字文發昇舟而魚躍兮季潛軀而覆雲或揮戈而爭帝兮或洗耳而辭君道曲成而不一兮神參差而異兆兹聖達之未明兮豈前修之克了迷白日之近遙兮方有闚於天表且臨海而觀瀾兮何津源之杳杳文遷繹而身徂兮景守節而災移湯改祝而革命兮靈投策而詬龜圉據胎而為巨兮友發文而自相風吹鶂而襄墜兮神壓紐而平王彼嬴縮之由人兮信吉凶之在已或勤憂以減齡兮亦安樂而獲祉弟成師而害兄兮父純臣而烹子識同命於三君兮兆先見於矞姒始樓桑而發輝兮終龍變於巴庸繞閶門而結慶兮鬱蟬蜕於三江水浩浩而襄陵兮竊息壤而瘠之鮌殛死於羽山兮禹宣力而營之鑿龍門以通河兮疎九江而入海總九州以攸同兮甄五都之所在雖父子之同氣兮乃業行之丕改以患蹇為福兮痛比干之殘軀以佞諛為獲安兮哂宰嚭之見屠以舉士而受賞兮悼史遷之腐刑以進為無益兮見鄂秋之專城以仁義為桎梏兮信揖讓之勞疲以放曠為解懸兮傷六親之乖離哀越種之被戮兮嘉范蠡之脱羈欽四皓之髙尚兮歎伊周之涉危望仗鉞而先鋒兮光安車而勿顧求封賞於寸心兮夢台袞於遠慮或忌賢而獨立或簒君以自樹既思匿而名揚兮亦求清而反汙見衆兆之紛錯兮覩變化之無方心營營而擾擾兮乃探𠂻而凖常儼端坐於敝筵兮始拂龜而整策冀靈鑒之祐余兮願告余以忠益龜發兆以施靈兮利去華而守約蓍布列而成卦兮保龍潛而勿躍踵嘉遯之𤣥蹤兮追考盤於巖壑登名山以恬澹兮辭朝市之紛若奉貞吉於占繇兮翻夕警而晨裝揖許公於箕嶺兮諮夷齊於首陽膽嵩華之嵁崿兮眺恒碣之䃐磄陵江湖之駭浪兮昇醫閭之尚羊乘𤣥虬之奕奕兮鳴玉鑾之瑲瑲浮滄波而濯足兮入三山而解裳謁伯禹於塗山兮詰三苗於三危登蒼梧而遐眺兮訪二妃於有媯追祝融於荆芉兮問洛宓於馮夷陵囘飈而上驤兮窮深谷而下馳㳂扶水而遠矚兮見虞淵之威微乘閬風之峻岅兮覿王母於崦嵫昇瑤臺而奏歌兮坐瓊室而賦詩託赤水以寄命兮附光風以𫝊辭出琨岫之崢嶸兮入汜林之杳鬱採鍾山之玉瑛兮收珠澤之珂珬攜羽民而逺遊兮探長生之妙術騰雲霧而窈㝠兮變域中之穢質望𤣥闕之寂寥兮過寒門而懷悲揖若士於霄際兮求霧塵於海湄憑帝臺而肆眺兮歴層冰而風馳越弱水之渟濙兮躡不周之嶮巇屑瓊蘂以為糧兮斟玉液以為漿結秋蘭以為珮兮攬白蜺以為裳聳景雲而上征兮撫閭闔而啓扉肅百神而警策兮奏中皇於紫微聆鈞天而九變兮耽廣樂而忘歸忽心移而志駭兮戀舊京而依依握招摇以為斾兮巡天漢而下遊建雲旗之逶迤兮御囘風之瀏瀏策王良以斂轡兮命風伯以挾輈符屏翳以清路兮告河鼓以具舟聊右次於析木兮遹囘駕於靑邱訪古人以首陽兮亦問道於鷞鳩覩三韓之累累兮見卉服之悠悠瞻雒常之鬱鬱兮貢楛矢之啾啾心怊怊而惕惕兮志憫憫而綿綿伊五嶽之塠塠兮何四海之涓涓瞻九河其如帶兮觀三江其沉然夫五都之揔揔兮尚何足以遊盤彼八方之局促兮殊無可以達觀方吞霞而棄粒兮亦屑玉而鍊丹潄醴泉以養氣兮吸沆瀣以當餐䕃建木之長柯兮援木禾之修莖咀玉髓而充渴兮嚼正陽以長生參松喬而撫翰兮侣浮邱而上征嗟域中之黙黙兮詎攄寫其深情情盤桓而猶豫兮志狐疑而未決久放蕩而不還兮心惆悵而不悦憶慈親於故鄉兮戀先君於邱墓囘遊駕而改轅兮縱歸轡而緩御僕眷眷於短銜兮馬依依於跬步還故園而解羈兮入茅宇而返素耕東臯之沃壤兮釣北湖之深潭養慈顔於婦子兮競獻壽而薦甘朝樂酣於濁酒兮夕寄忻於素琴誦風雅以導志兮藴六藉於胸襟敦儒墨之大教兮崇逸民之逺心播仁聲於終古兮流不朽之徽音進不求於聞達兮退不營於榮利泛若不繫之舟兮湛若不用之器不潔其身兮不屑於位不拘小節兮不求曲備資靈運以託已兮任性命之遭隨既聽天而委化兮無形志之兩疲除紛競而靖黙兮守沖寂以無為寄後賢以籍賞兮寧怨時之弗知亂曰稟元承命人冣靈兮夭壽否泰本天成兮體源究道歸聖哲兮隨化委遇能達節兮顯親揚名德之上兮保家全身亦厚量兮趣世浮動違性命兮鑒始究終同水鏡兮志願不合思逺遊兮陵虛騁志從所求兮周歴四極騰人表兮形勞志沮未衷道兮反我遊駕養慈親兮躬耕練藝齊至人兮固又作刺讒疾嬖幸詩二首曰巧巧佞佞讒言興兮營營習習似青蠅兮以白為黒在汝口兮汝非蝮蠆毒何厚兮巧佞巧佞一何工矣司閒司忿言必從矣朋黨噂􅊱自相同矣浸潤之譖傾人墉矣成人之美君子貴焉攻人之惡君子恥焉汝何人斯譖毁日繁予實無罪騁汝詭言番番緝緝讒言側入君子好讒如或弗及天疾讒説汝其至矣無妄之禍行將及矣泛泛遊鳬弗制弗拘行藏之徒或智或愚維予小人未明兹理毁與行俱言與釁起我其懲矣我其悔矣豈求人兮忠恕在已彼諂諛兮人之蠧兮刺促昔粟罔顧恥辱以求媚兮邪干側入如恐弗及以自容兮志行𥚹小好習不道朝挾其車夕承其輿或騎或徒載奔載趨或言或笑曲事親要正路不由邪徑是蹈不識大猷不知話言其朋其黨其徒實繁有詭其行有佞其音蘧蒢戚施邪媚是欽既詭且妬以逞其心是信是任敗其以多不始不愼末如之何習習宰嚭營營無極梁丘寡智王鮒淺識伊戾息夫異世同力江充趙髙甘言似直豎刁上官擅生羽翼乃如之人僭爽其德豈徒喪邦又亦覆國嗟爾中下其親其昵不謂其非不覺其失好之有年寵之有日我思古人心焉若疾凡百君子宜其慎矣覆車之鑒近可信矣言既備矣事既至矣反是不思維塵及矣肅宗即位除尚書考功郎奏諸秀孝中第者聽叙自固始大}
