  - {type: variant, offset: 105, length: 0, content: '', krp: 制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極於三王後來疑議難可準信鄭元云周人明堂五室是帝各有一室也合於五行之數周禮依數以為之室施行于今雖有不同時説然耳尋鄭此論非為無當按月令亦無九室之文原其制置不乖五室其青陽右个即明堂左个明堂右个即總章左个總章右个即𤣥堂左个𤣥堂右个即青陽左个如此則室猶是五而布政十二五室之理謂為可按其方圓髙廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之説裴逸一屋之論及諸}
  - {type: variant, offset: 106, length: 1, content: 貧, WYG: 紛紜並無取焉學者善其議又遷太常卿兼度支尚書轉正都官時太保崔光疾甚表薦思伯為侍講中書舎人馮元興為侍讀思伯遂入授肅宗杜氏春秋思伯少雖明經從官廢業至是更延儒生夜講晝授性謙和輕身禮士雖在街途停車下馬接誘恂恂曽無倦色客有謂思伯曰公今貴重寧能不驕思伯曰衰至便驕何常之有當世以為雅談為元义所寵論者譏其趣勢孝昌元年卒贈鎭東將軍青州刺史又贈尚書右僕射諡曰文貞子彦始武定中淮陽太守思伯弟思同字士明少厲志行雅好經史釋褐彭城王國侍郎五遷尚書考功郎青州别駕久之遷鎭逺將軍中散大夫試守滎陽太守尋即真後除平南將軍襄州刺史雖無明察之譽百姓安之及元顥之亂也思同與廣州刺史鄭光護並不降莊帝還宮封營陵縣開國男邑二百户除撫軍將軍給事黄門侍郎青州大中正又為鎭東金紫光禄大夫仍兼黄門尋加車騎大將軍左光禄大夫遷鄴後除黄門侍郎兼侍中河南慰勞大使仍與國子祭酒韓子熙並為侍講授静帝杜氏春秋又加散騎常侍兼七兵尚書尋拜侍中興和二年卒贈使持節都督青徐光三州諸軍事驃騎大將軍尚書右僕射司徒公青州刺史諡曰文獻初思同之為别駕也清河崔光韶先為治中自恃資地恥居其下聞思同還鄉遂便去職州里人物為思同恨之及光韶之亡遺誡子姪不聽求贈思同遂上表訟光韶操業登時蒙贈諡論者歎尚焉思同之侍講也國子博士遼西衛冀隆為服氏之學上書難杜氏春秋六十三事思同復駮冀隆乖錯者十一條互相是非積成十卷詔下國學集諸儒考之事未竟而思同卒卒後魏郡姚文安樂陵秦道静復述思同意冀隆亦尋物故浮陽劉休和又持冀隆説至今未能裁正焉李叔虎渤海脩人也從祖金世祖神䴥中與髙允俱被徵位至征南從事中郎叔虎}
