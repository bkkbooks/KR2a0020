  - {type: variant, offset: 103, length: 1, content: 徙, WYG: 元壽髙祖時中書侍郎有學行見稱於時思伯釋褐奉朝請太子步兵校尉中書舎人轉中書侍郎頗為髙祖所知常從征伐及世宗即位以時從之勤轉輔國將軍任城王澄之圍鍾離也以思伯持節為其軍司及澄失利思伯為後殿澄以思伯儒者謂之必死及至大喜曰仁者必有勇常謂虛談今於軍司見之矣思伯託以失道不伐其功時論稱其長者後為河内太守不拜尋除鴻臚少卿以母憂免服闋徵為滎陽太守有政績遷征虜將軍南青州刺史初思伯與弟思同師事北海陰鳯授業無資酬之鳯遂質其衣物及思伯之部送縑百匹遺鳯因具車馬迎之鳯慙不徃時人稱歎焉尋以父憂免後除征虜將軍光禄少卿仍拜左將軍兖州刺史肅宗時徵為給事黄門侍郎因請拜掃還鄉里未拜以風聞免尋除右將軍涼州刺史思伯以州邊逺不樂外出辭以男女未㛰靈太后不許舎人徐紇言之得改授太尉長史又除安東將軍廷尉卿思伯自以儒素為業不好法律希言事俄轉衛尉卿于時議建明堂多有同異思伯上議曰按周禮考工記云夏后氏世室殷重屋周明堂皆五室鄭注云此三者或舉宗廟或舉王寢或舉明堂互言之以明其制同也若然則殷夏之世已有明堂矣唐虞以前其事未聞戴德禮記云明堂凡九室十二堂蔡邕云明堂者天子太廟饗功養老教學選士皆於其中九室十二堂按戴德撰記世所不行且九室十二堂其於規制恐難得厥衷周禮營國左祖右社明堂在國之陽則非天子太廟明矣然則禮記月令四堂及太室皆謂之廟者當以天子暫配享五帝故耳又王制云周人養國老於東膠鄭注云東膠即辟雍在王宮之東又詩大雅云邕邕在宮肅肅在廟鄭注云宮謂辟雍宮也所以助王養老則尚和助祭則尚敬又不在明堂之驗矣按孟子云齊宣王謂孟子曰吾欲毁明堂若明堂是廟則不應有毁之問且蔡邕論明堂之制云堂方一百四十尺象坤之策屋圓徑二百一十六尺象乾之策方六丈徑九丈象陰陽九六之數九室以象九州屋髙八十一尺象黄鍾九九之數二十八柱以象宿外廣二十四丈以象氣按此皆以天地陰陽氣數為法而室獨象九州何也若立五室以象五行豈不快也如此蔡氏之論非為通典九室之言或未可從竊尋考工記雖是補闕之書相承已久諸儒注述無言非者方之後作不亦優乎且孝經援神契五經要義舊禮圖皆作五室及徐劉之論同考工者多矣朝廷若獨絶今古自為一}
