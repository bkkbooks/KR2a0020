  - {type: variant, offset: 1177, length: 311, content: 二年八月光表曰去二十八日有物出于太極之西序敕以示臣臣按其形即莊子所謂蒸成菌者也又云朝菌不終晦朔雍門周所稱磨蕭斧而伐朝菌皆指言蒸氣鬱長非有根種柔脆之質凋殞速易不延旬月無擬斧斤又多生墟落穢濕之地罕起殿堂高華之所今極宇崇麗牆築工密糞朽弗加沾濡不及而茲菌歘構厥狀扶疏誠足異也夫野木生朝野鳥入廟古人以為敗亡之象然懼災修德者咸致休慶所謂家利而怪先國興而妖豫是故桑穀拱庭太戊以昌雊雉集鼎武丁用熙自比鴟鵲巢于廟殿梟鵩鳴於宮寢菌生賓階軒坐之正準諸往記信可為誡且南西未靜兵革不息郊甸之內大旱跨時民勞物悴莫此之甚承天子育者所宜矜恤伏願陛下追殷二宗感變之意側躬聳誠惟新聖道節夜飲之忻強朝御之膳養方富之年保金玉之性則魏祚可以永隆皇壽等於山岳四年秋除, WYG: 尋轉}
