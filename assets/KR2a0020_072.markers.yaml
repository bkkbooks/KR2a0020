  - {type: variant, offset: 17, length: 0, content: '', WYG: 何異然非吾宿志命也如何既而還鄉遂卒於冀州年六十一有書數千卷所造字釋數十篇未就而卒其從孫太學博士承慶遂撰為字統二十卷行於世子介字天佐奉朝請冀州黙曹參軍早卒尼從子鳴鵠鳴鵠弟季智俱有}
