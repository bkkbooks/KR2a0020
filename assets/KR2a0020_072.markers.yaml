  - {type: punctuation, offset: 6037, content: 、, id: KR2a0020_ZHSJ_072-bkkpn1336}
  - {type: variant, offset: 6037, length: 2, content: 通直, WYG: 威逺將軍尚書左民郎轉右民時天下多事思令乃上疏曰臣聞國之大事唯祀與戎戎之有功在於將帥三代不必别民取治不等五霸不必異兵各能剋定有湯武之賢猶須伊望之佐堯舜之聖尚有稷契之輔得其人也六合唾掌可清失其人也三河方為戰地何者動之甚易靖之至難竊以比年以來將帥多是寵貴子孫軍幢統領亦皆故義託附貴戚子弟未經戎役至於衘杯躍馬志逸氣浮軒眉攘腕便以攻戰自許及臨大敵怖懼交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當鋭彊壯居後以安身兼復器械不精進止不集任羊質之將驅不練之兵當負險之衆敵數戰之虜欲令不敗豈有得哉是以兵知必敗始集而先逃將又怖敵遷延而不進國家便謂官號未滿重爵屢加復疑賞賚之輕金帛日賜帑藏空虛民財殫盡致使賊徒更増膽氣益盛生民損耗荼毒無聊主歎臣哀何心寢食臣雖位微竊不遑舎臣聞孝行出於忠貞節義率多果決德可感義夫恩可勸死士今若捨上所輕求下所重黜陟幽明賞罰善惡搜徒簡卒練兵習武甲密弩彊弓調矢勁謀夫既設辯士先陳曉以安危示其禍福如其不悛以我義順之師討兹悖逆之豎豈異厲蕭斧而伐朝菌鼓洪爐而燎毛髮雖愚者知其不旋踵矣敢以愚短昩死陳誠尋拜假節征虜將軍陽平太守又割冀州之平清河相州之陽平齊州之原以為南冀州仍以思令為左將軍南冀州刺史假平東將軍都督時葛榮遣其清河太守據季虎髙唐城以招叛民思令乃命麾下幷率鄉曲潛軍夜徃出其不意遂大破之徐乃收衆南還又詔思令幷領冀州流民及葛榮滅還鎭平原後除征東將軍金紫光禄大夫轉衛將軍右光禄大夫天平三年三月卒時年五十一贈驃騎將軍定州刺史恃慶從叔景略起家中書博士太和中尚書郎本郡中正出為齊州魏郡平原二郡太守卒景略弟雄字仲略容貌偉異以軍功為給事中髙祖曽對羣臣云路仲略好尚書郎才僕射李沖云其人宜為武職遂停轉太尉咸陽王録事參軍遷伏波將軍奉車都尉卒贈頓邱太守景略從祖弟法常幼而修立為郡功曹早卒儀同李神儁與之有舊每云諸路前輩中有路法常足為名士謂必逺至而竟無年天下事誠難知也房亮字景髙清河人也父法延譙郡太守亮好學有節操太和中舉秀才為奉朝請拜祕書郎又兼員外}
