  - {type: variant, offset: 18, length: 0, content: '', WYG: 於時前後並為幽州司馬季智子璠通直散騎常侍季智從弟荆范陽太守有吏能卒贈平西將軍東益州刺史季智從子伯慶汝南太守伯慶從父弟藻字景德少孤有雅志涉獵經史太和初舉秀才射策髙第以母疾還徴拜中書博士詔兼禮官拜燕宣王廟於長安還授寧遠將軍賜爵魏昌男選為廷尉正轉考功郎中除建德太守以清貧賜帛六十匹尋假寜逺將軍領統軍外防内撫甚得居邊之稱解任還家乆之除兗州左將軍府長史又拜瀛州安東府長史加揚烈將軍藻以年老歸家闔門不關世事}
