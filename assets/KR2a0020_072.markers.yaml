  - {type: variant, offset: 89, length: 0, content: '', WYG: 征硤石勑為僕射李平行臺七兵郎中平竒固勇敢軍中大事悉與謀之又命固節度水軍固設竒計先期乘賊獲其外城軍罷太傅清河王懌舉固除步兵校尉領汝南王悦即中令尋加寧逺將軍時悦年少行多不法屑近小人固上疏切諫幷面陳徃代諸王賢愚之分以感動悦悦甚敬憚之懌大悦以為舉得其人熙平二年除洛陽令將軍如故在縣甚有威風丁母憂號}
