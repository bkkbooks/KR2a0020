  - {type: variant, offset: 613, length: 562, content: 元年石顯伏辜此其效也靈帝光和元年南宮寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡邕邕對曰貌之不恭則有雞禍臣竊推之頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黃巾賊遂破壞四方疲於賦役民多叛者上不改政遂至天下大亂今之雞狀雖與漢不同而其應頗相類矣向邕並博達之士考物驗事信而有證誠可畏也臣以邕言推之翅足衆多亦羣下相扇助之象雛而未大脚羽差小亦其勢尚微易制御也臣聞災異之見皆所以示吉凶明君覩之而懼乃能招福闇主視之彌慢所用致禍詩書春秋秦漢之事多矣此陛下所觀者也今或有自賤而貴關預政事殆亦前代君房之匹比者南境死亡千計白骨橫野存有酷恨之痛歿為怨傷之魂義陽屯師盛夏未返荊蠻狡猾征人淹次東州轉輸往多無還百姓困窮絞縊以殞北方霜降蠶婦輟事羣生憔悴莫甚於今此亦賈誼哭歎谷永切諫之時司寇行戮君為之不舉陛下為民父母所宜矜恤國重戎戰用兵猶火內外怨弊易以亂離陛下縱欲忽天下豈不仰念太祖取之艱難先帝經營劬勞也誠願陛下留聰明之鑒警天地之意禮處左右節其貴越往者鄧通董賢之盛愛之正所以害之又躬饗加罕宴宗或闕時應親肅郊廟延敬諸父檢訪四方務加休息爰發慈旨撫賑貧瘼簡費山池減撤聲飲晝存政道夜以安身博釆芻蕘進賢黜佞則兆庶幸甚妖弭慶進禎祥集矣世宗覽之大悅後數日而茹皓等並以罪失伏法於是禮光愈重加撫軍, WYG: 朔}
