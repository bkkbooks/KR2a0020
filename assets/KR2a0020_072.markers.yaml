  - {type: variant, offset: 2082, length: 3228, content: 靈太后臨朝之後光累表遜位于忠擅權光依附之及忠稍被疏黜光并送章綬冠服茅土表至十餘上靈太后優答不許有司奏追于忠及光封邑熙平元年二月太師高陽王雍等奏舉光授肅宗經初光有德於靈太后語在于忠傳四月更封光平恩縣開國侯食邑一千戶以朝陽伯轉授第二子勗其月敕賜羊車一乘時靈太后臨朝每於後園親執弓矢光乃表上中古婦人文章因以致諫曰孔子云士志於道據於德依於仁遊於藝藝謂禮樂書數射御明前四業丈夫婦人所同修者若射御唯主男子事不及女古之賢妃烈媛母儀家國垂訓四海宣教九宗可秉道懷德率遵仁禮是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通於神明和風溢于區宇因時暇豫清暑林園遠藐姑射眷言矍相弦矢所發必中正鵠威靈遐暢義震上下文武懾心左右悅目吾王不遊吾何以休不窺重仞安見富美天情沖謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章錄一帙其集具在內伏願以時披覽仰裨未聞息彎挾之勞納閑拱之泰頤精養壽栖神翰林是秋靈太后頻幸王公第宅光表諫曰禮記云諸侯非問疾弔喪而入諸臣之家是謂君臣為謔不言王后夫人明無適臣家之義夫人父母在有時歸寧親沒使卿大夫聘春秋紀陳宋齊之女並為周王后無適本國之事是制深於士大夫許嫁唁兄又義不得衞女思歸以禮自抑載馳竹竿所為作也漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帷以接羣臣示男女之別國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流傳皆綴集以垂來詠昨軒駕頻出幸馮翊君任城王第雖漸中秋餘熱尚蒸衡蓋往還聖躬煩倦豐嘉醴罄竭時羞上壽弗限一觴方丈甘踰百品旦及日斜接對不非謂順時而遊奉養有度縱雲輦崇涼御筵安暢左右僕侍衆過千百扶衞跋涉袍鉀在身蒙曝塵日渙汗流離致時飢渴餐飯不贍賃馬假乘交費錢帛昔人稱陛下甚樂臣等至苦或其事也伏惟皇太后月靈炳曜坤儀挺茂誕育帝躬維興魏道德踰文母仁邁和憙親以天至遠異莫間愛由真固非俟虛隆紆屈鑾駕降臨闉里榮光帝京士女藻悅白首之耋欣遇犧年青衿之童慶屬唐日千載之所難一朝之為易非至明超古忘驕釋吝孰能若斯者哉魏元已來莫正斯美興居出入自當坦然豈同往嫌曲有矯避但帝族方衍勳貴增遷祗請遂多將成彝式陛下遵酌前王貽厥後矩天下為公億兆己任專薦郊廟止決大政輔養神和簡息遊幸以德為車以樂為御考仁聖之風習治國之道則率土屬賴含生仰悅矣臣過荷恩榮所知必盡默默唯唯愚竊未敢輕陳狂瞽分貽憲坐神龜元年夏光表曰詩稱蔽芾甘棠勿翦勿伐邵伯所茇又云雖無老成人尚有典刑傳曰思其人猶愛其樹況用其道不恤其人是以書始稽古易本山泉觀於天文以察時變觀於人文以化成天下孟子實匡張訓說安世記篋於汾南伯山抱卷於河右元始孤論充漢帝之坐孟皇片字懸魏王之帳前哲之寶重墳籍珍愛分篆猶若此之至也矧迺聖典鴻經炳勒金石理為國楷義成家範迹實世模事則人軌千載之格言百王之盛烈而令焚荒汙毀積榛棘而弗掃為鼯鼬之所栖宿童豎之所登踞者哉誠可為痛心疾首拊膺扼腕伏惟皇帝陛下孝敬日休自天縱睿垂心初學儒業方熙皇太后欽明慈淑臨制統化崇道重教留神翰林將披雲臺而問禮拂麟閣以招賢誠宜遠開闕里清彼孔堂而使近在城闉面接宮廟舊校為墟子衿永替豈所謂建國君民教學為先京邑翼翼四方是則也尋石經之作起自炎劉繼以曹氏典論初乃三百餘載計末向二十紀矣昔來雖屢經戎亂猶未大崩侵如聞往者刺史臨州多構圖寺道俗諸用稍有發掘基蹠泥灰或出於此皇都始遷尚可補復軍國務殷遂不存檢官私顯隱漸加剝撤播麥納菽秋春相因生蒿杞時致火燎由是經石彌減文字增缺職忝冑教參掌經訓不能繕修頹墜興復生業倍深慚今求遣國子博士一人堪任幹事者專主周視驅禁田牧制其踐穢料閱碑牒所失次第量厥補綴詔曰此乃學者之根源不朽之永格垂範將來憲章之本便可一依公表光乃令國子博士李郁與助教韓神固劉燮等勘校石經其殘缺者計料石功并字多少欲補治之於後靈太后廢遂寢二年八月靈太后幸永寧寺躬登九層佛圖光表諫曰伏見親昇上級佇蹕表刹之下祗心圖構誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可按禮記為人子者不登高不臨深古賢有言策畫失於廟堂大人蹷於中野漢書上欲西馳下峻坂爰盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚柰高廟太后何又云上酎祭宗廟出欲御樓船薛廣德免冠頓首曰宜從橋陛下不聽臣臣以血汙車輪樂正子春曾參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寧累級閣道回隘以柔懦之寶體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齋七日致齋三日然後入祀神明可得而通今雖容像未建已為神明之宅方加雕繢飾麗丹青人心所祗銳觀滋甚登者既衆異懷若面縱一人之身盡誠潔豈左右臣妾各竭虔仰不可獨昇必有扈侍懼或忘慎非飲酒茹葷而已昨風霾暴興紅塵四塞白日晝昏特可驚畏春秋宋衞陳鄭同日而災伯姬待姆致焚如之禍去皇興中青州七級亦號崇壯夜為上火所焚雖梓慎裨竈之明尚不能逆剋端兆變起倉卒預備不虞天道幽遠自昔深誡墟墓必哀廟社致敬望塋棲慟入門聳慄適墓不登隴未有昇陟之事傳云公既視朔遂登觀臺其下無天地先祖之神故可得而乘也內經寶塔高華堪室千萬唯盛言香花禮拜豈有登上之義獨稱三寶階從上而下人天交接兩得相見超世奇絕莫可而擬恭敬拜跽悉在下級遠存矚眺周見山河因其所眄增發嬉笑未能級級加虔步步崇慎徒使京邑士女公私湊集上行下從理勢以然迄於無窮豈長世競慕一登而可抑斷哉蓋心信為本形敬乃末重實輕根靖實躁君恭己正南面者豈月乘峻極旬御層階今經始既就子來自勸基構已興雕絢漸起紫山華臺即其宮也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂汙永歸清寂下竭肅穆之誠上展瞻仰之敬勿踐勿履顯固億齡融教闡悟不其博歟九月靈太后幸嵩高光上表諫曰伏聞明後當親幸嵩高往還累宿鑾遊近甸存省民物誠足為善雖漸農隙所獲栖畝飢貧之家指為珠玉遺秉滯穟莫不寶惜步騎萬餘來去經踐駕輦雜競騖交馳縱加禁護猶有侵耗士女老幼微足傷心秋末久旱塵壤委深風霾一起紅埃四塞轅關峭嶮山路危狹聖駕清道當務萬安乘履澗壑蒙犯霜露出入半旬途越數百飄曝彌日仰虧和豫七廟上靈容或未許億兆下心實用悚慄且藏蟄節遠昆蟲布列蠉蠕之類盈於川原車馬輾蹈必有殘殺慈矜好生應垂未測誠恐悠悠之議將謂為福興罪厮役困於負檐爪牙窘於賃乘供頓候迎公私擾費兵幕士方履敗穿晝暄夜淒罔所覆藉監帥驅捶泣呼相望霜旱為災所在不稔飢饉荐臻方成儉弊為民父母所宜存恤靖以撫之猶懼離散乃於收斂初辰致此行舉自近及遠交興怨嗟伏願遠覽虞舜恭己無為近遵老易不出戶牖罷勞形之遊息傷財之駕動循典防納諸軌儀委司責成寄之耳目人神幸甚朝野抃悅靈太后不從正光元年冬賜光几杖衣服二年春肅宗親釋奠國學光執經南面百僚陪列司徒京兆王繼頻上表以位讓光夏四月以光為司徒侍中國子祭酒領著作如故光表固辭歷年終不肯受八月獲禿鶖鳥於宮內詔以示光光表曰蒙示十四日所得大鳥此即詩所謂有鶖在梁解云禿鶖也貪惡之鳥野澤所育不應入殿庭昔魏氏黃初中有鵜鶘集于靈芝池文帝下詔以曹恭公遠君子近小人博求賢俊太尉華歆由此遜位而讓管寧者也臣聞野物入舍古人以為不善是以張臶惡䢽賈誼忌鵩鵜鶘暫集而去前王猶為至誡況今親入宮禁為人所獲方被畜養晏然不以為懼準諸往義信有殊矣且饕餮之禽必資魚肉菽麥稻粱時或餐啄一食之費容過斤鎰今春夏陽旱穀糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意於醜形惡聲哉衞侯好鶴曹伯愛雁身死國滅可為寒心陛下學通春秋親覽前事何得口詠其言行違其道誠願遠師殷宗近法魏祖修德延賢消災集慶放無用之物委之川澤取樂琴書頤養神性肅宗覽表大悅即棄之池澤詔召光與安豐王延明議定服章三年六月詔光乘步挽至東西上閤九月進位太保光又固辭光年耆多務疾病稍增而自強不已常在著作疾篤不歸四年十月肅宗親臨省疾詔斷賓客中使相望為止聲樂罷諸遊眺拜長子勵為齊州刺史十一月疾甚敕子姪等曰諦聽吾言聞曾子有云人之將死其言也善啟予手啟予足而今而後吾知免夫吾荷先帝厚恩位至於此史功不成歿有遺恨汝等以吾之故並得名位勉之勉之以死報國修短命也夫復何言速可送我還宅氣力雖微神明不亂至第而薨年七十三肅宗聞而悲泣中使相尋詔給東園溫明祕器朝服一具衣一襲錢六十萬布一千匹蠟四百斤大鴻臚監護喪事車駕親臨撫屍慟哭御輦還宮流涕於路為減常膳言則追傷每至光坐講讀之處未曾不改容悽悼五年正月贈太傅領尚書令驃騎大將軍開府, WYG: ''}
  - {type: variant, offset: 2082, length: 3228, content: 靈太后臨朝之後光累表遜位于忠擅權光依附之及忠稍被疏黜光并送章綬冠服茅土表至十餘上靈太后優答不許有司奏追于忠及光封邑熙平元年二月太師高陽王雍等奏舉光授肅宗經初光有德於靈太后語在于忠傳四月更封光平恩縣開國侯食邑一千戶以朝陽伯轉授第二子勗其月敕賜羊車一乘時靈太后臨朝每於後園親執弓矢光乃表上中古婦人文章因以致諫曰孔子云士志於道據於德依於仁遊於藝藝謂禮樂書數射御明前四業丈夫婦人所同修者若射御唯主男子事不及女古之賢妃烈媛母儀家國垂訓四海宣教九宗可秉道懷德率遵仁禮是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通於神明和風溢于區宇因時暇豫清暑林園遠藐姑射眷言矍相弦矢所發必中正鵠威靈遐暢義震上下文武懾心左右悅目吾王不遊吾何以休不窺重仞安見富美天情沖謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章錄一帙其集具在內伏願以時披覽仰裨未聞息彎挾之勞納閑拱之泰頤精養壽栖神翰林是秋靈太后頻幸王公第宅光表諫曰禮記云諸侯非問疾弔喪而入諸臣之家是謂君臣為謔不言王后夫人明無適臣家之義夫人父母在有時歸寧親沒使卿大夫聘春秋紀陳宋齊之女並為周王后無適本國之事是制深於士大夫許嫁唁兄又義不得衞女思歸以禮自抑載馳竹竿所為作也漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帷以接羣臣示男女之別國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流傳皆綴集以垂來詠昨軒駕頻出幸馮翊君任城王第雖漸中秋餘熱尚蒸衡蓋往還聖躬煩倦豐嘉醴罄竭時羞上壽弗限一觴方丈甘踰百品旦及日斜接對不非謂順時而遊奉養有度縱雲輦崇涼御筵安暢左右僕侍衆過千百扶衞跋涉袍鉀在身蒙曝塵日渙汗流離致時飢渴餐飯不贍賃馬假乘交費錢帛昔人稱陛下甚樂臣等至苦或其事也伏惟皇太后月靈炳曜坤儀挺茂誕育帝躬維興魏道德踰文母仁邁和憙親以天至遠異莫間愛由真固非俟虛隆紆屈鑾駕降臨闉里榮光帝京士女藻悅白首之耋欣遇犧年青衿之童慶屬唐日千載之所難一朝之為易非至明超古忘驕釋吝孰能若斯者哉魏元已來莫正斯美興居出入自當坦然豈同往嫌曲有矯避但帝族方衍勳貴增遷祗請遂多將成彝式陛下遵酌前王貽厥後矩天下為公億兆己任專薦郊廟止決大政輔養神和簡息遊幸以德為車以樂為御考仁聖之風習治國之道則率土屬賴含生仰悅矣臣過荷恩榮所知必盡默默唯唯愚竊未敢輕陳狂瞽分貽憲坐神龜元年夏光表曰詩稱蔽芾甘棠勿翦勿伐邵伯所茇又云雖無老成人尚有典刑傳曰思其人猶愛其樹況用其道不恤其人是以書始稽古易本山泉觀於天文以察時變觀於人文以化成天下孟子實匡張訓說安世記篋於汾南伯山抱卷於河右元始孤論充漢帝之坐孟皇片字懸魏王之帳前哲之寶重墳籍珍愛分篆猶若此之至也矧迺聖典鴻經炳勒金石理為國楷義成家範迹實世模事則人軌千載之格言百王之盛烈而令焚荒汙毀積榛棘而弗掃為鼯鼬之所栖宿童豎之所登踞者哉誠可為痛心疾首拊膺扼腕伏惟皇帝陛下孝敬日休自天縱睿垂心初學儒業方熙皇太后欽明慈淑臨制統化崇道重教留神翰林將披雲臺而問禮拂麟閣以招賢誠宜遠開闕里清彼孔堂而使近在城闉面接宮廟舊校為墟子衿永替豈所謂建國君民教學為先京邑翼翼四方是則也尋石經之作起自炎劉繼以曹氏典論初乃三百餘載計末向二十紀矣昔來雖屢經戎亂猶未大崩侵如聞往者刺史臨州多構圖寺道俗諸用稍有發掘基蹠泥灰或出於此皇都始遷尚可補復軍國務殷遂不存檢官私顯隱漸加剝撤播麥納菽秋春相因生蒿杞時致火燎由是經石彌減文字增缺職忝冑教參掌經訓不能繕修頹墜興復生業倍深慚今求遣國子博士一人堪任幹事者專主周視驅禁田牧制其踐穢料閱碑牒所失次第量厥補綴詔曰此乃學者之根源不朽之永格垂範將來憲章之本便可一依公表光乃令國子博士李郁與助教韓神固劉燮等勘校石經其殘缺者計料石功并字多少欲補治之於後靈太后廢遂寢二年八月靈太后幸永寧寺躬登九層佛圖光表諫曰伏見親昇上級佇蹕表刹之下祗心圖構誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可按禮記為人子者不登高不臨深古賢有言策畫失於廟堂大人蹷於中野漢書上欲西馳下峻坂爰盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚柰高廟太后何又云上酎祭宗廟出欲御樓船薛廣德免冠頓首曰宜從橋陛下不聽臣臣以血汙車輪樂正子春曾參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寧累級閣道回隘以柔懦之寶體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齋七日致齋三日然後入祀神明可得而通今雖容像未建已為神明之宅方加雕繢飾麗丹青人心所祗銳觀滋甚登者既衆異懷若面縱一人之身盡誠潔豈左右臣妾各竭虔仰不可獨昇必有扈侍懼或忘慎非飲酒茹葷而已昨風霾暴興紅塵四塞白日晝昏特可驚畏春秋宋衞陳鄭同日而災伯姬待姆致焚如之禍去皇興中青州七級亦號崇壯夜為上火所焚雖梓慎裨竈之明尚不能逆剋端兆變起倉卒預備不虞天道幽遠自昔深誡墟墓必哀廟社致敬望塋棲慟入門聳慄適墓不登隴未有昇陟之事傳云公既視朔遂登觀臺其