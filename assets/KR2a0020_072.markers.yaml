  - {type: variant, offset: 105, length: 0, content: '', WYG: 制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極於三王後來疑議難可準信鄭元云周人明堂五室是帝各有一室也合於五行之數周禮依數以為之室施行于今雖有不同時説然耳尋鄭此論非為無當按月令亦無九室之文原其制置不乖五室其青陽右个即明堂左个明堂右个即總章左个總章右个即𤣥堂左个𤣥堂右个即青陽左个如此則室猶是五而布政十二五室之理謂為可按其方圓髙廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之説裴逸一屋之論及諸}
