  - {type: variant, offset: 94, length: 3, content: 平三齊, WYG: 後猶酒肉不進時固年踰五十而喪過於哀鄉黨親族咸歎服焉神龜末清河王懌領太尉辟固從事中郎屬懌被害元义秉政朝野震悚懌諸子及門生吏寮莫不慮禍隠避不出素為懌所厚者彌不自安固以嘗被辟命遂獨詣喪所盡哀慟哭良久乃還僕射游肇聞而歎曰雖欒布王脩何以尚也君子哉若人及汝南王悦為太尉選舉多非其人又輕肆檛撻固以前為元卿雖離國猶上疏切諫事在悦傳悦辟固為從事中郎不就正}
