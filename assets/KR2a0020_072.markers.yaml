  - {type: variant, offset: 8434, length: 0, content: '', WYG: 値蕭衍將湛僧珍陷東豫州州民劉獲鄭辯反於州界為之内應朝廷以源子恭代世表為州以世表為東南道行臺率元安平元顯伯皇甫鄧林等討之於時賊衆彊斷小殷關驛使不通諸將以士馬單少皆敗散之餘不敢復戰咸欲保城自固世表時患背腫乃輿病出外呼統軍是云寳謂之曰湛僧珍所以敢深入為寇者以獲辯皆州民之望為之内應向有驛至知劉獲移軍欲迎僧珍去此八十里今出其不意一戰可破獲破則僧珍自走東南清服卿之功也乃簡選兵馬付寳討之促令發軍自暮出城比曉兵合賊不意官軍卒至一戰破獲諸賊悉平湛僧珍退走唯鄭辯與子恭親舊亡匿子恭所世表召諸將吏衆責子恭收辯斬之傳首京師勑遣中使宣㫖慰喩賜馬二匹衣服被褥復以世表行豫州事行臺如故}
