  - {type: variant, offset: 1796, length: 278, content: 遷右光祿大夫侍中監如故四年正月世宗夜崩光與侍中領軍將軍于忠迎肅宗於東宮安撫內外光有力焉帝崩後二日廣平王懷扶疾入臨以母弟之親徑至太極西廡哀慟禁內呼侍中黃門領軍二衞云身欲上殿哭大行又須入見主上諸人皆愕然相視無敢抗對者光獨攘衰振杖引漢光武初崩太尉趙憙橫劍當階推下親王故事辭色甚厲聞者莫不稱善壯光理義有據懷聲淚俱止云侍中以古事裁我我不敢不服於是遂還頻遣左右致謝初永平四年以黃門郎孫惠蔚代光領著作惠蔚首尾五載無所厝意至是三月尚書令任城王澄表光宜還史任於是詔光還領著作四月遷特進五月以奉迎肅宗之功封光博平縣開國公食邑二千戶七月領國子祭酒八月詔光乘步挽於雲龍門出入尋遷車, WYG: 卒贈驃}
