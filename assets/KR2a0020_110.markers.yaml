  - {type: variant, offset: 6, length: 3, content: 列傳第, WYG: 百餘萬漸增國用既定中山分徙吏民及徒何種人工伎巧十萬餘家以充京都各給耕牛計口授田天興初制定京邑東至代郡西及善無南極陰館北盡參合為畿内之田其外四方四維置八部帥以監之勸課農耕量校收入以為殿最又躬耕藉田率先百姓自後比歳大熟匹中八十餘斛是時戎車不息雖頻有年猶未足以久贍矣太宗永興中頻有水旱詔簡宫人非所當御及非執作伎巧自餘出賜鰥民神瑞二年又不熟京畿之内路有行饉帝以飢將遷都於鄴用博士崔浩計乃止於是分簡尤貧者就食山東敕有司勸課留農者曰前志有之人生在勤勤則不匱凡庶民之不畜者祭無牲不耕者祭無盛不樹者死無槨不蠶者衣無帛不績者喪無衰敎行三農生殖}
  - {type: page-break, offset: 6, content: '', id: KR2a0020_WYG_110-2b, image: WYG0262/WYG0262-0708b.png}
  - {type: variant, offset: 6, length: 3, content: 列傳第, krp: 百餘萬漸增國用既定中山分徙吏民及徒何種人工伎巧十萬餘家以充京都各給耕牛計口授田天興初制定京邑東至代郡西及善無南極陰館北盡參合為畿内之田其外四方四維置八部帥以監之勸課農耕量校收入以為殿最又躬耕藉田率先百姓自後比歳大熟匹中八十餘斛是時戎車不息雖頻有年猶未足以久贍矣太宗永興中頻有水旱詔簡宫人非所當御及非執作伎巧自餘出賜鰥民神瑞二年又不熟京畿之内路有行饉帝以飢將遷都於鄴用博士崔浩計乃止於是分簡尤貧者就食山東敕有司勸課留農者曰前志有之人生在勤勤則不匱凡庶民之不畜者祭無牲不耕者祭無盛不樹者死無槨不蠶者衣無帛不績者喪無衰敎行三農生殖}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 穀教行園囿毓長草木教行虞衡山澤作材敎行藪牧養蕃鳥獸敎行百工飭成器用教行商賈阜通貨賄教行嬪婦化治絲枲教行臣妾事勤力役自是民皆力勤故歳數豐穰畜牧滋息泰常六年詔六部民羊滿百口調戎馬一匹世祖即位開拓四海以五方之民各有其性故修其教不改其俗齊其政不易其宜納其方貢以充倉廪收其貨物以實庫藏又於歳時取鳥獸之登於爼用者以牣膳府先是禁􅃠疏闊民多逃隱天興中詔採諸漏户令輸綸綿自後諸逃户占為細繭羅縠者甚衆於是雜營戸帥遍於天下不隷守宰賦役不周戸口錯亂始光三年詔一切罷之以屬郡縣神䴥二年帝親御六軍略地廣漠分命諸將窮追蠕蠕東至瀚海西接張掖北度燕然山大破之虜其種落及馬牛雜畜方物萬計其後復遣成周公萬度歸西伐焉耆其王鳩尸卑那單騎奔龜兹舉國臣民負錢懷貨一時降欵獲其竒寳異玩以巨萬駝馬雜畜不可勝數度歸遂入龜兹復獲其殊方瓌詭之物億萬已上是時方隅未剋帝屢親戎駕而委政於恭宗眞君中恭宗下令修農職之教事在帝紀此後數年之中軍國用足矣高宗時牧守之官頗為貨利太安初遣使者二十餘輩循行天下觀風俗視民所疾苦詔使者察諸州郡墾殖田畝飲食衣服閭里虛實盜賊劫掠貧富彊劣而罰之自此牧守頗改前弊民以安業自太祖定中原世祖平方難收獲珍寳府藏盈積和平二年秋詔中尚方作黃金合盤}
