  - {type: variant, offset: 2220, length: 240, content: 不語語而不盡意有未及及收呈草皆以周悉此亦難有又敕兼主客郎接蕭衍使謝珽徐陵侯景既陷臺城衍鄱陽王範時為合州刺史文襄敕收以書喻之範得書乃率部伍西上州刺史崔聖念入據其城文襄謂收曰今定一州卿有其力猶恨尺書徵建鄴未效耳文襄崩文宣如晉陽令與黃門郎崔季舒高德正吏部郎中尉瑾於北第參掌機密轉祕書監兼著作郎又除定州大中正時齊將受禪楊愔奏收置之別館令撰禪代詔冊諸文遣徐之才守門不聽出天保元年除中書令仍兼著作郎封富平縣子二年受詔撰魏史除魏尹故優以祿力專在史閣不知郡事初帝令羣臣各言志收曰臣願得直筆東觀早出, WYG: 止}
