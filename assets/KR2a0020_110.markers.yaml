  - {type: variant, offset: 594, length: 373, content: 李韶韶從弟延寔頗為弈時人謂為耽好子建每曰於機權廉勇之際得之深矣且吾未為時用博弈可也及一臨邊事凡經五年未曾對局還洛後俄拜常侍衞尉卿初元顥內逼莊帝北幸子建謂所親盧義僖曰北海自絕社稷稱藩蕭衍吾老矣豈能為陪臣遂攜家口居洛南顥平乃歸先苦風痺及此遂甚以卿任有務屢上書乞身特除右光祿大夫邢杲之平太傅李延寔子侍中彧為大使撫慰東土時外戚貴盛送客填門子建亦往候別延寔曰小兒今行何以相勗子建曰益以盈滿為誡延寔悵然久之及莊帝殺尒朱榮遇禍於河陰者其家率相弔賀太尉李虔第二子仁曜子建之女壻往亦見害子建謂姨弟盧道虔曰朝廷誅翦權強凶徒尚梗未聞有奇謀異略恐不可濟此乃李門禍始弔賀無乃怱怱及永安之後李氏宗族流離或遇誅夷如其所慮後歷左光祿大夫加散騎常侍驃騎大將軍子建自出為藩牧董司山南居脂膏之中遇天下多事正身潔己不以財利經懷及歸京師家人衣食常不周贍清素之迹著於終始性存重慎不雜交遊唯與, WYG: 髙陽王雍}
