  - {type: variant, offset: 1472, length: 6, content: 臺將加彈劾賴, WYG: 之州依舊為便至於京西京北域内州鎮未有錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五穀則有負擔之難錢之為用貫繦相屬不假斗斛之器不勞秤尺之平濟世之宜謂為深允請並下諸方州鎮其太和及新鑄五銖并古錢内外全好者不限大小悉聽行之雞眼鐶鑿依律而禁河南州鎮先用錢者既聽依舊不在斷限唯太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方之錢通用京師其聽依舊之處與太和錢及新造五銖並行若盜鑄者罪重常憲既欲均齊物品廛井斯和若不繩以嚴法無以肅兹違犯符㫖一宣仍不遵用者刺史守令依律治罪詔從之而河北諸州舊少錢貨猶以他物交易錢略不入市也二年冬}
