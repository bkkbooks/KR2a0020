  - {type: variant, offset: 16, length: 1, content: 魏, WYG: 受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔榆棗奴各依良限三年種畢不畢奪其不畢之地於桑榆地分雜蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為世業身終不還恒從見口有盈者}
  - {type: variant, offset: 16, length: 1, content: 魏, krp: 受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔榆棗奴各依良限三年種畢不畢奪其不畢之地於桑榆地分雜蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為世業身終不還恒從見口有盈者}
  - {type: variant, offset: 18, length: 1, content: 知, WYG: 受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉戸老小癃殘無授田者年十一已上及癃者各授以半夫田年踰七十者不還所受寡婦守志者雖免課亦授婦田諸還受民田恒以正月若始受田而身亡及賣買奴婢牛者皆至明年正月乃得還受諸土廣民稀之處隨力所及官借民種蒔役有土居者依法}
