  - {type: variant, offset: 5, length: 0, content: '', WYG: 一十齊魏收撰志第十五食貨六夫為國為家者莫不以穀貨為本故洪範八政以食為首其在易曰聚人曰財周禮以九職任萬民以九賦歛財賄是以古先哲王莫不敬授民時務農重穀躬親千畝貢賦九州且一夫不耕一女不織或受其飢寒者飢寒廹身不能保其赤子攘竊而犯法以至於殺身迹其所由王政所陷也夫百畝之内勿奪其時易其田疇薄其稅歛民可使富也既飽且富而仁義禮節生焉亦所謂衣食足識榮辱也晉末天下大亂生民道盡或死於干戈或斃於饑饉其幸而自存者蓋十五焉太祖定中原接喪亂之敝兵革並起民廢農業方事雖殷然經略之先以食為本使東平公儀墾闢河北自五原至于棝陽塞外為屯田初登國六年破衞辰收其珍寳畜産名馬三十餘萬牛羊}
