  - {type: variant, offset: 391, length: 1, content: 大, WYG: 之饒況乃漳洹夷路河濟平流而不均彼省煩同兹巨益且鴻溝之引宋衞史牒具存討虜之通幽冀古迹備在舟車省益理寔相懸水陸難易力用不等昔沗東州親逕闕驗斯損益不可同年而語請諸通水運之處皆宜率同此式縱復五百三百里車運水次校計利饒猶為不少其欽所列州郡如請興造東路諸州皆先通水運今年租調悉用舟檝若船數有闕且賃假充事比之僦車交成息耗其先未通流宜遣檢}
