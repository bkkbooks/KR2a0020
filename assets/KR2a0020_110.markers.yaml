  - {type: variant, offset: 384, length: 0, content: '', WYG: 糴積為邊備有司又請於水運之次隨便置倉乃於小平右門白馬津漳涯黑水濟州陳郡大梁凡八所各立邸閣每軍國有須應機漕引自此費役微省三門都將薛欽上言計京西水次汾華二州恒農河北河東正平平陽五郡年常綿絹及貲麻皆折公物雇車牛送京道險人敝費公損私略計華州一車官酬絹八匹三丈九尺别有私民雇價布六十匹河東一車官酬絹五匹二丈别有私民雇價布五十匹自餘州郡雖未練多少推之逺近應不減此今求車取雇絹三匹市材造船不勞採斫計船一艘舉十三車車取三匹合有三十九匹雇作手并匠及船上雜具食直足以成船計一船剰絹七十八匹布七百八十匹又租車一乘官格四十斛成載私民雇價逺者五斗布一匹近者一石布一匹凖其私費一車布逺者八十匹近者四十匹造船一艘計舉七百石凖其雇價應有一千四百匹今取布三百匹造船一艘并船上覆治雜事計一船有剰布一千一百匹又其造船之處皆須鋸材人功并削船茹依功多少即給當州郡門兵不假更召汾州有租調之處去汾不過百里華州去河不滿六十並令計程依舊酬價車送船所船之所運唯達雷陂其陸路從雷陂至倉庫調一車雇絹一匹租一車布五匹則於公私為便尚書度支郎}
