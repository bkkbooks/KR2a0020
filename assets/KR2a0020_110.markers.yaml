  - {type: variant, offset: 20, length: 3, content: 高良侯, WYG: 授諸地狹之處有進丁受田而不樂遷者則以其家桑田為正田分又不足不給倍田又不足家内人别減分無桑之鄉凖此為法樂遷者聽逐空荒不限異州他郡唯不聽避勞就逸其地足之處不得無故而移諸民有新居者三口給地一畝以為居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者恒從所近若同時倶受先貧後富再倍之田放此為法諸逺流配讁無}
