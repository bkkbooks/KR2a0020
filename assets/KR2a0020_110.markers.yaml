  - {type: variant, offset: 1388, length: 0, content: '', krp: 官司取與自由貴賤任口若無大宥罪合推斷詳度二三深乖王法臣等商量請依先朝之詔禁之為便防姦息暴斷遣輕重亦凖前㫖所置監司一同往式於是復置監官以監檢焉其後更罷更立以至於永熙自遷鄴後於滄瀛幽青四州之境傍海煑鹽滄州置竈一千四百八十四瀛州置竈四百五十二幽州置竈一百八十青州置竈五百四十六又於邯鄲置竈四計終歳合收鹽二十萬九千七百二斛四升軍國所資得以周贍矣魏初至於太和錢貨無所周流高祖始詔天下用錢焉十九年冶鑄粗備文曰太和五銖詔京師及諸州鎮皆通行之内外百官禄皆凖絹給錢絹匹為錢二百在所遣錢工備爐冶民有欲鑄聽就鑄之銅必精練無所和雜}
  - {type: punctuation, offset: 1389, content: ，, id: KR2a0020_ZHSJ_110-bkkpn290}
  - {type: 'tls:seg', offset: 1389, content: '', id: KR2a0020_ZHSJ_110-d110p7s28}
  - {type: variant, offset: 1389, length: 0, content: '', WYG: 宗永平三年冬又鑄五銖錢肅宗初京師及諸州鎮或鑄或否或有止用古錢不行新鑄致商貨不通貿遷頗隔熙平初尚書令任城王澄上言臣聞洪範八政貨居二焉易稱天地之大德曰生聖人之大寳曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位成養羣生奉順天德治國安民之本也夏殷之政九州貢金以定五品周仍其舊太公立九府之法於是國貨始行定銖兩之楷齊桓循用以覇諸侯降及秦始漢文遂有輕重之異吳濞鄧通之錢}
  - {type: page-break, offset: 1389, content: '', id: KR2a0020_WYG_110-20a, image: WYG0262/WYG0262-0717a.png}
  - {type: variant, offset: 1389, length: 0, content: '', krp: 宗永平三年冬又鑄五銖錢肅宗初京師及諸州鎮或鑄或否或有止用古錢不行新鑄致商貨不通貿遷頗隔熙平初尚書令任城王澄上言臣聞洪範八政貨居二焉易稱天地之大德曰生聖人之大寳曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位成養羣生奉順天德治國安民之本也夏殷之政九州貢金以定五品周仍其舊太公立九府之法於是國貨始行定銖兩之楷齊桓循用以覇諸侯降及秦始漢文遂有輕重之異吳濞鄧通之錢}
  - {type: variant, offset: 1390, length: 1, content: 初, WYG: 利遍於天下河南之地猶甚多焉逮于孝武乃更造五銖其中毁鑄隨利改易故使錢有大小之品竊尋太和之錢高祖留心剏制後與五銖並行此乃}
  - {type: variant, offset: 1390, length: 1, content: 初, krp: 利遍於天下河南之地猶甚多焉逮于孝武乃更造五銖其中毁鑄隨利改易故使錢有大小之品竊尋太和之錢高祖留心剏制後與五銖並行此乃}
  - {type: variant, offset: 1392, length: 3, content: 詣門𡞾, WYG: 刋之式但臣竊聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利於京邑之肆而不入徐揚之市土貨既殊貿鬻亦異便於荆郢之邦者則礙於兗豫之域致使貧民有重困之切王道貽隔化之訟去永平三年都座奏斷天下用錢不依凖式者時被敕云不行之錢雖有常禁其先用之處權可聽行至年末悉令斷之延昌二年徐州民儉刺史啟奏求行土錢㫖聽權依舊用謹尋不行之錢律有明式指謂雞眼鐶鑿更無餘禁計河南諸州今所行者悉非制限昔來繩禁愚竊惑焉又河北州鎮既無新造五銖設有舊者而復禁斷並不得行專以單絲之縑疎縷之布狹幅促度不中常式裂匹}
