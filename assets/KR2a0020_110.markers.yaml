  - {type: variant, offset: 86, length: 0, content: '', WYG: 留業者皆令主司審覈開倉賑貸其有特不自存者悉檢集為粥於街衢以救其困然主者不明牧察郊甸閒甚多餧死者時承平日久府藏盈積詔盡出御府衣服珍寳太官雜器太僕乗具内庫弓矢刀鉾十分之八外府衣物繒布絲纊諸所供國用者以其大半班齎百司下至工商皁隷逮于六鎮邉戍畿内鰥寡孤獨貧癃者皆有差十二年詔羣臣求安民之術有司上言請析州郡常調九分之二京都度支歳用之餘各立官司豐年糴貯於倉時儉則加私之一糴之於民如此民必力田以買絹積財以取粟官年登則常積歳凶則直給又别立農官取州郡户十分之一以為屯民相水陸之宜斷頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歳責六十斛甄其正課幷征戍雜役行此二事數年之中則穀積而民足矣帝覽而善之尋施行焉自此公私豐贍雖時有水旱不為災也世祖之平統萬定秦隴以河西水草善乃以為牧地畜産滋息馬至二百餘萬匹橐駝將半之牛羊則無數高祖即}
