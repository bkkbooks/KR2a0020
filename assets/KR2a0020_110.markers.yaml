  - {type: variant, offset: 1480, length: 4, content: 辛雄為言, WYG: 崔亮奏恒農郡銅青谷有銅鑛計一斗得銅五兩四銖葦池谷鑛計一斗得銅五兩鸞帳山鑛計一斗得銅四兩河内郡王屋山鑛計一斗得銅八兩南青州苑燭山齊州商山並是往昔銅官舊迹見在謹按鑄錢方興用銅處廣既有冶利並宜開鑄詔從之自後所行之錢民多私鑄稍就小薄價用彌賤建義初重盜鑄之禁開糾賞之格至永安二年秋詔更改鑄文曰永安五銖官自立爐起自九月至三年正月而止官欲貴錢乃出藏絹分遣使人}
