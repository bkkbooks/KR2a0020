  - {type: variant, offset: 1388, length: 0, content: '', WYG: 官司取與自由貴賤任口若無大宥罪合推斷詳度二三深乖王法臣等商量請依先朝之詔禁之為便防姦息暴斷遣輕重亦凖前㫖所置監司一同往式於是復置監官以監檢焉其後更罷更立以至於永熙自遷鄴後於滄瀛幽青四州之境傍海煑鹽滄州置竈一千四百八十四瀛州置竈四百五十二幽州置竈一百八十青州置竈五百四十六又於邯鄲置竈四計終歳合收鹽二十萬九千七百二斛四升軍國所資得以周贍矣魏初至於太和錢貨無所周流高祖始詔天下用錢焉十九年冶鑄粗備文曰太和五銖詔京師及諸州鎮皆通行之内外百官禄皆凖絹給錢絹匹為錢二百在所遣錢工備爐冶民有欲鑄聽就鑄之銅必精練無所和雜}
