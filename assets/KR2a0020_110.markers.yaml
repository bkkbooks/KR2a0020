  - {type: variant, offset: 12, length: 3, content: 自序漢, WYG: 具徑二尺二寸鏤以白銀鈿以玫瑰其銘曰九州致貢殊域來賓乃作兹器錯用具珍鍛以紫金鏤以白銀範圍擬載吐燿含真纖文麗質若化若神皇王御之百福惟新其年冬詔出内庫綾綿布帛二十萬匹令内外百官分曹賭射四年春詔賜京師之民年七十已上大官厨食以終其身顯祖即位親行儉素率先公卿思所以賑益黎庶至天安皇興間歳頻大旱絹匹千錢劉彧淮北青冀徐兗司五州告亂請降命將率衆以援之既臨其境青冀懐貳進軍圍之數年乃拔山東之民咸勤於征戍轉運帝深以為念遂因民貧富為租輸三等九品之制千里内納粟千里外納米上三品戸入京師中三品入他州要倉下三品入本州先是太安中高宗以常賦之外雜調十五頗為煩重將與除之尚書毛法仁曰此是軍國資用今頓罷之臣愚以為不可帝曰使地利無窮民力不竭百姓有餘吾孰與不足遂免之未幾復調如前至是乃終罷焉於是賦歛稍輕民復贍矣舊制民間所織絹布皆幅廣二尺二寸長四十尺為一匹六十尺為一端令任服用後乃漸至濫惡不依尺度髙祖延興三年秋七月更立嚴制令一凖前式違者罪各有差有司不檢察與同罪太和八年始凖古班百官之禄以品第各有差先是天下户以九品混通戸調帛二匹絮二斤絲一斤粟二十石又入帛一匹二丈委之州庫以供調外之費至是户增帛三匹粟二石九斗以為官司之禄後增調外帛滿二匹所調各隨其土所出其司冀雍華定相秦洛豫懷兗陜徐青齊濟南豫東兗東徐十九州貢綿絹及絲幽平幷肆岐涇荆涼梁汾秦安營豳夏光郢東秦司州萬年鴈門上谷靈丘廣寗平涼郡懷州邵郡上郡之長平白水縣青州北海郡之膠東縣平昌郡之東武平昌縣高密郡之昌安高密夷安黔陬縣秦州河東之蒲坂汾陰縣東徐州東莞郡之莒諸東莞縣雍州馮翊郡之連芍縣咸陽郡之寧夷縣北地郡之三原雲陽銅官宜君縣華州華山郡之夏陽縣徐州北濟郡之離狐豐縣東海郡之贛榆襄賁縣皆以麻布充稅九年下詔均給天下民田諸男夫十五以上受露田四十畝婦人二十畝奴婢依良丁牛一頭受田三十畝限四牛所授之田率倍之三易之田再倍之以供耕作及還受之盈縮諸民年及課則受田老免及身没則還田奴婢牛隨有無以還受諸桑田不在還受之限但通入倍田分於分雖盈没則還田不得以充露田之數不足者以露田充倍諸}
