  - {type: variant, offset: 388, length: 1, content: 愧, WYG: 刳木為舟用興上代鑿渠通運利盡中古是以漕輓河渭留侯以為偉談方舟蜀漢酈生稱為口實豈直張純之奏見美東都陳勰之功事高晋世其為利益所從來久矣案欽所列實允事宜即中之計備盡公理但舟檝所通逺近必至茍利公私不宜止}
