  - {type: variant, offset: 1385, length: 2, content: 熏灼, WYG: 限者亦不苟與細民競兹贏利但利起天池取用無法或豪貴封護或近者吝守卑賤逺來超然絶望是以因置主司令其裁察彊弱相兼務令得所且十一之税自古及今取輒以次所濟為廣自爾霑洽逺近齊平公私兩宜儲益不少及鼓吹主簿王後興等詞稱請供百官食鹽二萬斛之外歳求輸馬千匹牛五百頭以此而推非可稍計後中尉甄琛啓求罷禁被敕付議尚書執奏稱琛啟坐談則理高行之則事闕請依常禁為允詔依琛計乃為繞池之民尉保光等擅自固護語其障禁倍}
