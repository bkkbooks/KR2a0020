  - {type: variant, offset: 6129, length: 221, content: 伏願亮臣悾悾之至下慰蒼生之心普惠又表乞朝直之日時聽奉見自此之後月一陛見又以肅宗不親視朝過崇佛法郊廟之事多委有司上疏曰臣聞明德卹祀成湯光六百之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之冥業損巨費於生民減祿削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首於外玄寂之衆遨遊於內愆禮忤時人靈未穆愚謂從朝夕之, WYG: ''}
