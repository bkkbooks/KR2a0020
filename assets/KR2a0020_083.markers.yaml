  - {type: variant, offset: 9371, length: 1097, content: 乎如脫蒙允求以旨判為始其前來吏秩悉年久不追臣又聞明德慎罰文王所以造周咸有一德殷湯所以革夏故能上令下從風動草偃畏之如雷電敬之如明神是以天子家天下綏萬國若天之無不覆地之無不載遷都之構庶方子來汎澤所沾降及陪皂寧有岳牧二千石縣令丞尉治中別駕及諸軍幢受命於朝廷而可不預乎此之班駁雲雨之不平謂是當時有司出納之未允何以明之仰尋世宗詔書百官普進一級中有朝臣刺史登時褒授則內外貴賤莫不同澤又覆奏稱爰及陪皂明無不逮自後人率其心紛綸盈庭嫌少誤惑視聽限以汎前更為年斷六年三年之考以意折之汎前汎後之歲隔而絕之遂使如綸之旨頓於一朝汎前六年上第者全不得汎三年上第者蒙半階而已汎前汎後合考者隔絕而不得無考者無折而全汎前汎後有考無考並蒙全汎與否乖違勤舊彌屈差若毫釐謬以千里其此之謂乎易曰言行君子之所以動天下可不慎歟言之不從無以抑之遂奏奪牧守外祿全不與汎散官改為四年之考汎前者八年一階政令不一寃訟惟甚與而復奪其本在茲致使邀駕擊鼓者無理以加其罪誹謗公聽者無辭以抑其言噂所由生慢勃所由起夫琴瑟不調澆而更張善人國之本也其可棄乎詩云樂只君子邦家之基堯典曰克明俊德呂刑曰何擇非人周官曰官弗必備惟其人咎繇曰無曠庶官天工人其代之詩云人之云亡邦國殄悴又曰雨我公田遂及我私孔子曰不患貧而患不均如此則官必擇人汎則宜溥請遠遵正始元旨近準聖明二汎內外百官悉同一階不以汎前折考不以散任增年則同雲共澍四海均洽如謂未可宜以權理折之易曰聖人之大寶曰位何以守位曰仁春秋傳曰一曰擇人如此則乃可無汎不可無考守宰之汎既以追奪則百官之汎不應獨霑溥澤既收復誰敢怨夫三載之考興於太和再周之陟通於景明閑劇祿力自有加減陪臣以事省降而考則三年朝官既祿等平曹更四周乃陟考祿參差各稱其枉且一日從軍征戍苦於煩任終年專使決斷重於陪臣上若通為三載之考無汎隔折則各盈其分亦足以近塞羣口遠綏四方日昳求賢猶有所失況不遵擇人之訓唯以停久而進乎自今已後考黜願以三宅革心選進願以三儁居德書曰舉能其官惟爾之能稱非其人惟爾弗任斯周道所以佑辟康民敢不敬守臣忝官樞副毗察寃訟寤寐惟省謂宜追正愚固所陳萬無可採出除左將軍東豫州刺史淮南九戍十三郡猶因蕭衍前弊別郡異縣之民錯雜居止普惠乃依次括比省減郡縣上表陳狀詔許之宰守因此綰攝有方姦盜不起民以為便蕭衍遣將胡廣來寇安陽軍主陳明祖等脅白沙鹿城二戍衍又遣定州刺史田超秀田僧達等竊陷石頭戍徑據安陂城郢州新塘之賊近在州西數十里普惠前後命將拒戰並破之普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與其遊學早終其子長瑜普惠每於四時請祿無不減贍給其衣食及為豫州啟長瑜解褐攜其合門拯給之孝昌元年三月在州卒時年五十八贈平北將軍幽州刺史諡曰宣恭長子榮儁武定末齊王相府屬榮儁弟龍子揚州驃騎府長史, WYG: 市}
