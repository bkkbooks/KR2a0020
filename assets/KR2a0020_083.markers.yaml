  - {type: variant, offset: 7164, length: 695, content: 約並欲不復上省紛紜多日乃息正光二年詔遣楊鈞送蠕蠕主阿那瓌還國普惠謂遣之將貽後患上疏曰臣聞乾元以利貞為大非義則不動皇王以博施為功非類則不從故能始萬物而化天下者也伏惟陛下叡哲欽明道光虞舜八表宅心九服清晏蠕蠕相害於朔垂妖師扇亂於江外此乃封豕長蛇不識王度天將悔其罪所以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以悅其志恭己以懷其心而先自勞擾艱難下民興師郊甸之內遠投荒塞之外救累世之勁敵可謂無名之師諺曰唯亂門之無過愚情未見其可當是邊將窺竊一時之功不思兵為凶器不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆橫行匈奴中季布以為不可請斬之千載以為美況今旱酷異常聖慈降膳乃以萬五千人使楊鈞為將而欲定蠕蠕忤時而動其可濟乎阿那瓌投命皇朝撫之可也豈容困疲我兆民以資天喪之虜昔莊公納子糾以致乾時之敗魯僖以邾國而有懸冑之今蠕蠕時亂後主繼立雖云散亡姦虞難抑脫有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年飢饉相仍須其自斃小亡大傷然後一舉而并之此卞氏之高略所以獲兩虎不可不圖之今土山告難簡書相續蓋亦無能為也正與今舉相會天其或者欲以告戒人不欲使南北兩疆並興大衆脫狂狡構間於其間而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此微臣所以寒心者也那瓌之不還負何信義此機之際北師宜停臣言不及義文書所經過不敢不陳兵猶火也不戢將自焚二虜自滅之形可以為殷鑒伏願輯和萬國以靜四疆混一之期坐而自至矣臣愚昧多違必無可採匹夫之智願以呈獻表奏詔答曰夫窮鳥歸人尚或興惻況那瓌嬰禍流離遠來依庇在情在國何容弗矜且納亡興喪有國大義皇魏堂堂寧廢斯德後主亂亡似當非謬此送彼迎想無拒戰國義宜表朝算已決卿深誠厚慮朕用嘉戢但此段機略不獲相從脫後不逮勿憚匡言時蕭衍義, WYG: 涇}
