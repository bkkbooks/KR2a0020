  - {type: variant, offset: 11, length: 1, content: 六, WYG: 部祖紇始有勲於國尚平文女父野干尚昭成女遼西公主昭成崩諸部乖亂獻明后與太祖及衞秦二王依訥會苻堅使劉庫仁分攝國事於是太祖還居獨孤部訥總攝東部為大人遷居大寗行其恩信衆多歸之侔於庫仁苻堅假訥鷹揚將軍後劉顯之謀逆太祖聞之輕騎北歸訥訥見太祖驚喜拜曰官家復國之後當念老臣太祖笑答曰誠如舅言要不忘也訥中弟染干麤暴忌太祖常圖為逆每為皇姑遼西公主擁䕶故染干不得肆其禍心於是諸部大人請訥兄弟求舉太祖為主染干曰在我國中何得爾也訥曰帝大國之世}
