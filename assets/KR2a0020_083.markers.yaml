  - {type: variant, offset: 902, length: 0, content: '', WYG: 妾有子女數十人號為貪縱後求入朝授内都大官太師如故熙事魏母孝謹如事所生魏母卒乃散髪徒跣水漿不入口三日詔不聽服熙表求依趙氏之孤髙祖以熙情難奪聽服齊衰期後以例降改封京兆郡公髙祖納其女為后曰白虎通云王所不臣數有三焉妻之父母抑言其一此所謂供承宗廟不欲奪私心然吾季著於春秋無臣證於徃牒既許通體之一用開至尊之敬比長秋配極陰政既敷未聞有司陳奏斯式可詔太師輟臣從禮又勒集書造儀付外髙祖前後納熙三女二為后一為左昭儀由是馮氏寵貴益隆賞賜累巨萬髙祖每詔熙上書不臣入朝不拜熙上書如舊熙於後遇疾綿寢四載詔遣醫問道路相望車駕亦數臨幸焉將遷洛髙祖親與熙别見其困篤歔欷流涕密勅宕昌公王遇曰大師萬一即可監䕶喪事十九年薨於代車駕在淮南留臺表聞還至}
