  - {type: variant, offset: 2114, length: 279, content: 姓便是易先王之典教忘哀戚之情恐非所以昭令德視子孫者也按射儀射者以禮樂為本忘而從事不可謂禮鍾鼓弗設不可謂樂捨此二者何用射為又七日之戲令制無之班勞所施慮違事體庫府空虛宜待新調二三之趣停之為便乞至九月備飾盡行然後奏狸首之章宣矍相之令聲軒懸建雲鉦神民忻暢於斯時也伏惟慈明遠被萬民是望舉動所書發言唯則願更廣訪賜垂曲採昭其管見之心恕其讜言之責則芻蕘無遺歌輿人有獻誦矣澄意納其言託辭自罷乃答曰文武之道自昔成規明教戰振古常軌今雖非公制而此州承前已有斯式既不勞民損公任其私射復何失也且纂文習武人之常藝豈可於常藝之間要須令制乎比適欲依前州府相率王務之暇肄藝良辰亦未言費用庫物也禮, WYG: 疋妻梁四百匹男女姊妹}
