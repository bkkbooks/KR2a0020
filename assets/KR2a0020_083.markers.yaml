  - {type: variant, offset: 99, length: 0, content: '', krp: 冐哀而入未幾以謀反伏誅親從皆斬唯元寶子世衡逃免時朝議欲追削超爵位中書令髙允上表理之後兖州故吏汲宗等以道儁遺愛在人前從坐受誅委骸土壤求得收葬書奏詔義而聽之贈散騎常侍安南將軍南康公諡曰昭世衡襲遺公爵賀迷代人從兄女世祖敬哀皇后皇后生恭宗初后少孤無父兄近親唯迷以從父故蒙賜爵長鄉子卒贈光禄大夫五原公閭毗代人本蠕蠕人世祖時自其國來降毗即恭皇后之兄也皇后生髙宗髙宗太安二年以毗}
  - {type: variant, offset: 100, length: 0, content: '', WYG: 平北將軍賜爵河東公弟紇為寧北將軍賜爵零陵公其年竝加侍中進爵為王毗征東將軍評尚書事紇征西將軍中都大官自餘子弟賜爵為王者二人公五人侯六人子三人同時受拜所以隆崇舅氏當}
  - {type: variant, offset: 100, length: 0, content: '', krp: 平北將軍賜爵河東公弟紇為寧北將軍賜爵零陵公其年竝加侍中進爵為王毗征東將軍評尚書事紇征西將軍中都大官自餘子弟賜爵為王者二人公五人侯六人子三人同時受拜所以隆崇舅氏當}
  - {type: variant, offset: 101, length: 0, content: '', WYG: 榮之和平二年追諡后祖父延襄康公父辰定襄懿王毗薨贈太尉追贈毗妻河東王妃子惠襲紇薨贈司空子豆後賜名莊太和中初立三長以莊為定户籍大使甚有時譽十六年例降爵後為七兵尚書卒紇弟染位外都大官冀州刺史江夏公卒先是髙宗以乳母常氏有保䕶功既即位尊為保太后後尊為皇太后興安二年太后兄英字世華自肥如令超為散騎常侍鎭軍大將軍賜爵遼西公弟喜鎭東大將軍祠曹尚書帶方公三妹皆封縣君妹夫王睹為平州刺史遼西公追贈英祖父苻堅扶風太守亥為鎭西將軍遼西蘭公渤海太守澄為侍中征東大將軍太宰遼西獻王英母許氏博陵郡君遣兼太常盧度世持節改葬獻王於遼西樹碑立廟置守冡百家太安初英為侍中征東大將軍太宰進爵為王喜左光禄大夫改封燕郡從兄泰為安東將軍朝鮮侯訢子伯夫散騎常侍選部尚書次子員金部尚書喜子振太子庶子三年英領太師評尚書事内都大官伏寶泰等州刺史五年詔以太后母宋氏為遼西王太妃和平元年喜為洛州刺史初英事宋不能謹而睹奉宋甚至就食於和龍無車牛宋疲不進睹負宋於笈至是宋於英等薄不如睹之篤謂太后曰何不王睹而黜英太后曰英為長兄門户主也家内小小不順何足追計睹雖盡力故是他姓柰何在英上本州郡公亦足報耳天安中英為平州刺史訢為幽州刺史伯夫進爵范陽公英黷貨徙燉煌諸常自興公及疑至是皆以親疏受爵賜田宅時為隆盛後伯夫為洛州刺史以贓汙欺妄徴斬於京師承明元年徴英復官薨謚遼西平王始英之徴也夢日墜其所居黄山下水中村人以車牛挽致不能出英獨抱載而歸聞者異之後員與伯夫子禽可共為飛書誣謗朝政事發有司執憲刑及五族髙祖以昭太后故罪止一門訢年老赦免歸家恕其孫一人扶飬之給奴婢田宅其家僮入者百人金錦布帛數萬計賜尚書以下宿衛以上其女壻及親從在朝皆免官歸本鄉十一年髙祖文明太后以昭太后故悉出其家前後沒入婦女以喜子振試守正平郡卒馮熙字晉昌長樂信都人文明太后之兄也祖文通語在海夷傳世祖平遼海熙父朗内徙官至秦雍二州刺史遼西郡公坐事誅文明太后臨朝追贈假黄鉞太宰燕宣王立廟長安熙生於長安為姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母携熙逃避至氐羌中撫育年十二好弓馬有勇幹氐羌皆歸附之魏母見其如此將還長安始就博士學問從師受孝經論語好陰陽兵法及長游華陰河東二郡間性汎愛不拘小節人無士庶來則納之熙姑先入掖庭為始祖左昭儀妹為髙宗文成帝后即文明太后也使人外訪}
