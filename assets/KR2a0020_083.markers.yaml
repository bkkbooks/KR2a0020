  - {type: variant, offset: 98, length: 0, content: '', WYG: 世祖悼惜之故贈有加禮杜超字祖仁魏郡鄴人密皇后之兄也少有節操泰常中為相州别駕奉使京師時以法禁不得與后通問始光中世祖思念舅氏以超為陽平公尚南安長公主拜駙馬都尉位太鴻臚卿車駕數幸其第賞賜巨萬神䴥三年以超行征南大將軍太宰進爵為王鎮鄴追加超父豹鎮東大將軍陽平景王母曰鉅鹿惠君眞君五年超為帳下所害世祖臨其喪哀慟者久之諡曰威王長子道生賜爵城陽侯後為秦州刺史進爵河東公道生弟鳯皇襲超爵加侍中特進世祖追思超不巳欲以鳯皇為定州刺史鳯皇不願違離闕庭乃止鳯皇弟道儁賜爵發干侯鎮枋頭除兖州刺史超既薨復授超從弟遺侍中安南將軍開府相州刺史入為内都大官進爵廣平王遺性忠厚頻歴州郡所在著稱薨贈太傅諡曰宣王長子元寶位司空元寶弟允寳司隸校尉元寶又進爵京兆王及歸而父遺喪明當入謝元寶欲以表聞髙宗未知遺薨怪其遲召之元寶將入時人止之曰宜以家憂自辭元寶欲見其寵不從}
