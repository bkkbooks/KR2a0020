  - {type: variant, offset: 102, length: 5, content: 曾著釋典論, WYG: 熙所在徴赴京師拜冠軍將軍賜爵肥如侯尚恭宗女博陵長公主拜駙馬都尉出為定州刺史進爵昌黎王顯祖即位為太傅累拜内都大官髙祖即位文明太后臨朝王公貴人登進者衆髙祖乃承㫖皇太后以熙為侍中太師中書監領祕書事熙以頻履師𫝊又中宫之寵為羣情所駭心不自安乞轉外任文明太后亦以為然於是除車騎大將軍開府都督洛州刺史侍中太師如故洛陽}
