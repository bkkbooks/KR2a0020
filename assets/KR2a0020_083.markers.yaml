  - {type: punctuation, offset: 1525, content: 、, id: KR2a0020_ZHSJ_083-bkkpn341}
  - {type: variant, offset: 1525, length: 2, content: 驃騎, WYG: 大司馬太尉冀州刺史加黄屋左纛備九錫前後部羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威彊恢逺曰武奉諡於公柩至洛七里澗髙祖服衰徃迎叩靈悲慟而拜焉葬日送臨墓所親作誌銘主生二子誕修誕字思政修字寳業皆姿質妍麗年纔十餘歲文明太后俱引入禁中申以教誡然不能習讀經史故兄弟並無學術徒整飾容儀寛雅恭謹而已誕與髙祖同歲㓜侍書學仍蒙親待尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王修侍中鎮北}
  - {type: page-break, offset: 1525, content: '', id: KR2a0020_WYG_083-12b, image: WYG0262/WYG0262-0218d.png}
  - {type: page-break, offset: 1525, content: '', id: KR2a0020_WYG_083-13a, image: WYG0262/WYG0262-0219a.png}
  - {type: variant, offset: 1525, length: 2, content: 驃騎, krp: 大司馬太尉冀州刺史加黄屋左纛備九錫前後部羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威彊恢逺曰武奉諡於公柩至洛七里澗髙祖服衰徃迎叩靈悲慟而拜焉葬日送臨墓所親作誌銘主生二子誕修誕字思政修字寳業皆姿質妍麗年纔十餘歲文明太后俱引入禁中申以教誡然不能習讀經史故兄弟並無學術徒整飾容儀寛雅恭謹而已誕與髙祖同歲㓜侍書學仍蒙親待尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王修侍中鎮北}
  - {type: punctuation, offset: 1530, content: 、, id: KR2a0020_ZHSJ_083-bkkpn342}
  - {type: variant, offset: 1532, length: 0, content: '', WYG: 東平公又除誕議曹尚書知殿中事及罷庶姓王誕為待中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官髙祖立於庭遙受其拜既訖還室修降為侯誕與修雖並長宫禁而性趣乖别誕性淳篤修乃浮競誕亦未能誨督其過然時言於太后髙祖嚴責之至於楚捶由是陰懐毒恨遂結}
  - {type: variant, offset: 1532, length: 0, content: '', krp: 東平公又除誕議曹尚書知殿中事及罷庶姓王誕為待中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官髙祖立於庭遙受其拜既訖還室修降為侯誕與修雖並長宫禁而性趣乖别誕性淳篤修乃浮競誕亦未能誨督其過然時言於太后髙祖嚴責之至於楚捶由是陰懐毒恨遂結}
  - {type: variant, offset: 1533, length: 3, content: 僕射冀, WYG: 右有憾於誕者求藥欲因食害誕事覺髙祖自詰之具得情状誕引過謝乞全修命髙祖以誕父老又重其意不致於法撻之百餘黜為平城百姓修妻司空穆亮女也求離㛰請免官髙祖引管蔡事皆不許髙祖寵誕每與誕同輿而載同案而食同席坐臥彭城王勰北海王詳雖直禁中然親近不及十六年以誕為司徒髙祖既深愛誕除官日親為制三讓表幷啟將拜又為其章謝尋加車騎大將軍太子太師十八年髙祖謂其無師傅奬道風誕深自誨責從駕南伐十九年至鍾離誕遇疾不能侍從髙祖日省問醫藥備加時髙祖銳意臨江乃命六軍發鍾離南轅與誕泣訣左右皆入無不掩涕時誕已惙然彊坐視髙祖悲而淚不能下言夢太后來呼臣髙祖嗚咽執手而出遂行是日去鍾離五十里許昬時告誕薨問髙祖哀不自勝時崔慧景裴叔業軍在中淮去所次不過百里髙祖乃輕駕西還從者數千人夜至誕薨所撫屍哀慟若喪至戚逹旦聲淚不絶從者亦迭舉音明告蕭鸞鍾離戍主蕭惠休惠休遣其太守奉慰詔求棺於城中及歛迭舉髙祖以所服衣幍充禭親自臨視撤樂去膳宣勑六軍止臨江之駕髙祖親北度慟哭極哀詔侍臣一人兼大鴻臚送柩至京禮物轜儀徐州備造陵兆葬事下洛候設喪至洛陽車駕猶在鍾離詔留守賜賻物布帛五千匹榖五千斛以供葬事贈假黄鉞使持節大司馬領司徒侍中都督太師駙馬公如故加以殊禮備錫九命依晉大司馬齊王攸故事有司奏諡詔曰案諡法善行仁德曰元柔克有光曰懿昔貞惠兼美受三諡之榮忠武雙徽錫兩號之茂式凖前迹宜契具瞻既自少綢繆知之惟朕案行定名諡曰元懿帝又親為作碑文及挽歌詞皆窮美盡哀事過其厚車駕還京詔曰馮大司馬已就墳塋永潛幽室宿草之哭何能忘之遂親臨誕墓停車而哭使彭城王勰詔羣官脫朱衣服單衣介幘陪哭司徒貴者示以朋友微者示如寮佐公主貞厚有禮度産二男長子穆穆字孝和襲熙爵避皇子愉封改扶風郡公尚髙祖女順陽長公主拜駙馬都尉歴員外通直散騎常侍穆與叔輔興不和輔興亡贈相}
