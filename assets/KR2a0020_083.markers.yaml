  - {type: variant, offset: 99, length: 0, content: '', WYG: 冐哀而入未幾以謀反伏誅親從皆斬唯元寶子世衡逃免時朝議欲追削超爵位中書令髙允上表理之後兖州故吏汲宗等以道儁遺愛在人前從坐受誅委骸土壤求得收葬書奏詔義而聽之贈散騎常侍安南將軍南康公諡曰昭世衡襲遺公爵賀迷代人從兄女世祖敬哀皇后皇后生恭宗初后少孤無父兄近親唯迷以從父故蒙賜爵長鄉子卒贈光禄大夫五原公閭毗代人本蠕蠕人世祖時自其國來降毗即恭皇后之兄也皇后生髙宗髙宗太安二年以毗}
