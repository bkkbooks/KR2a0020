  - {type: variant, offset: 8489, length: 881, content: 犯蹙邑者蓋有之矣未聞父基子構世載忠賢一死一削用為典者也故尚書令臣肇未能遠稽古義近究成旨以初封之詔有親王二千戶始蕃一千戶二蕃五百戶三蕃三百戶謂是親疏世減之法又以開國五等有所減之言以為世減之趣遂立格奏奪稱是高祖本意仍被旨可差謬之來亦已甚矣遂使勳親懷屈幽顯同寃紛訟彌年莫之能息臣輒遠研旨格深窮其事世變減奪今古無據又尋詔書稱昔未可采今始列辭豈得混一罔分久近也故樂良樂安同蕃異封廣陽安豐屬別戶等安定之嫡邑齊親王河間戚近更從蕃食是乃太和降旨初封之倫級勳親兼樹非世減之大驗者也博陵襲爵亦在太和之年時不世減以父嘗全食足戶充本同之始封減從今式如此則減者減其所足之外足者足其所減之內減足之旨乃為所貢所食耳欲使諸王開國弗專其民賦役之差貴賤有等蓋準擬周禮公侯伯子男貢稅之法王食其半公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減戶故始封承襲俱稱所減謂減之以貢食謂食之於國斯實高祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差旨又判之以開訓所減之旨可以不疑於世減矣而臣肇弗稽往事曰五等有所減之格用為世減之法以王封有親疏之等謂是代削之條妄解成旨雷同世奪以此毒天下民其從乎故太傅任城文宣王臣澄樞弼累朝識洞今古為尚書之日殷勤執請孜孜於重議被旨不許於此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曾玄不治未恤嫡封則爵祿無窮枝庶則屬內貶絕儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其寃七廟之孫並訟其切陳訴之案盈於省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦九族之義也臣猥忝今任於茲五年推尋旨格謂無世減之理請近遵高祖減食之謨遠循百代象賢之誥退由九伐進從九儀則刑罰有倫封不虛黜斯乃文王所以克慎不敢侮於魚眾寡而況於公侯伯子男乎今旨訪寃滯愚以此為大者求尋光錫之詔并諸條格所奪所請事事窮審諸王開國非犯罪削奪者並求還復其昔嘗全食足戶充本減從令式者從前則力多於親懿全奪則減足之格不行愚謂祿力並應依所之食而食之若是則力少蕃王粟帛仍本戶邑雖盈之減兩秦既有全食足戶之異故不得同於新封之力耳親恤所裒請依律斷伏惟親親尊賢位必功立尊賢以司民可不慎乎親親以牧族其可, WYG: ''}
