  - {type: variant, offset: 174, length: 226, content: 也伏惟大魏應天明命兆啟無窮畢世後仁祚隆七百今二虢京門下無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領護分事之式徵兵儲粟之要舟車水陸之資山河要害之權緩急去來之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懷怨中正賣望於下里主按舞筆於上臺真偽混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭奄殊類應同役而苦樂懸異士人居職不以為榮兵士役苦心不忘亂故有競棄本, WYG: 自}
