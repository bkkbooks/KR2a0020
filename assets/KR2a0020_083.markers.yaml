  - {type: variant, offset: 2636, length: 962, content: 以諡配姓古者婦人從夫諡今烈懿太妃德冠一世故特蒙褒錫乃萬代之高事豈容於定名之重而不稱烈懿乎澄從之及王師大舉重征鍾離普惠為安樂王詮別將長史班師除揚烈將軍相州安北府司馬遷步兵校尉後以本官領河南尹丞世宗崩坐與甄楷等飲酒遊從免官驍騎將軍刁整家有舊訓將營儉葬普惠以為矯時太甚與整書論之事在刁雍傳故事免官者三載之後降一階而若才優擢授不拘此限熙平中吏部尚書李韶奏普惠有文學依才優之例宜特顯敕除寧遠將軍司空倉曹參軍朝議以不降階為榮時任城王澄為司空表議書記多出普惠廣陵王恭北海王顥疑為所生祖母服期與三年博士執意不同詔羣僚會議普惠議曰謹按二王祖母皆受命先朝為二國太妃可謂受命於天子為始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾子父在為母大功則士之妾子為母期父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命為之三年況天子命其子為列國王命其所生母為國太妃反自同公子為母練冠之與大功乎輕重顛倒不可之甚者也傳曰始封之君不臣諸父昆弟則當服其親服若魯衞列國相為服期判無疑矣何以明之喪服君為姑姊妹女子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相為服不可還準公子遠厭天王故降有四品君大夫以尊降公子大夫之子以厭降名例不同何可亂也禮大夫之妾子以父命慈己申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之高據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻為其皇姑公子雖厭妻尚獲申況廣陵北海論封則封君之子語妃則命妃之孫承妃纂重遠別先皇更以先后之正統厭其所生之祖嫡方之皇姑不以遙乎今既許其申服而復限之以期比之慈母不亦爽歟經曰為君之祖父母父母妻長子傳曰何以期父母長子君服斬妻則小君父卒然後為祖後者服斬今祖乃獻文皇帝諸侯不得祖之母為太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或遠且天子尊則配天莫非臣妾何為命之為國母而不聽子服其親乎記曰從服者所從亡則已又曰不為君母之黨服則為其母之黨服今所從既亡不以親服服其所生則屬從之服於何所施若以諸王入為公卿便同大夫者則當今之議皆不須以國為言也今之諸王自同列國雖不之國別置臣僚玉食一方不得以諸侯言之敢據周禮輙同三年當時議者亦有同異國子博士李郁於議罷之後書難普惠普惠據禮還答鄭重三返郁議遂屈轉諫議大夫澄謂普惠曰不喜君得諫議唯喜諫議得君時靈太后父司徒胡, WYG: 極豐贍}
