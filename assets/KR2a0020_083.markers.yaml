  - {type: variant, offset: 1552, length: 0, content: '', WYG: 後坐妹廢免為長樂百姓世宗時卒於河南尹聿同産弟風㓜養於宮文明太后特加愛念數歲賜爵至北平王拜太子中庶子出入禁闥寵侔二兄髙祖親政後恩寵少衰降爵為侯幽后立乃復敘用后死亦冗散卒贈青州刺史崔光之兼黄門也與聿俱直光每謂之曰君家富貴太盛終必衰敗聿云我家何負四海乃呪我也光云以古推之不可不愼時熙為太保誕司徒太子太傅脩侍中尚書聿黄門廢后在位禮愛未弛是後歲餘脩以罪棄熙誕喪亡后廢聿退時人以為盛必衰也李峻字珍之梁國蒙縣人}
