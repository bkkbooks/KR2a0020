  - {type: variant, offset: 3658, length: 1015, content: 者之所光錫尊君愛親臣子所以慎終必使勳績相侔號秩相可然後能顯揚當時傳徽萬代者矣竊見故侍中司徒胡公懷道含靈實誕聖后載育至尊母儀四海近樞克唯允之寄居槐體論道之明故以功餘九錫褒假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未衷何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可並大禮記曰天無二日土無二王嘗禘郊社尊無二上明君臣不可並上伏見詔書以司徒為太上秦公夫人為太上秦君夫人蒙號於前司徒繫之於後尊光之美盛矣竊惟高祖受禪於獻文皇帝故仰尊為太上皇此因上上而生名也皇太后稱令以繫敕下蓋取三從之道遠同文母列於十亂則司徒之為太上恐乖繫敕之意春秋傳曰葬稱公臣子辭明不可復加上也書曰茲予大饗于先王爾祖其從與饗之司徒位尊屬重必當配饗先朝稱太上以為臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晉有小子侯尚曰僭之於天子司徒三公也其可同號於帝乎孔子曰必也正名名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又曰困於上者必反於下故受之以井比剋吉定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啟聖情伏願聖后回日月之明察微臣之請停司徒逼同之號從卑下不踰之稱畏困上之鑒邀謙光之福則天下幸甚臣聞見災修德災變成善此太戊所以興殷桑穀以之自滅況今卜遷方始當修革之會愚以為無上之名不可假之脫譏於千載恐貽不言之咎且君之於臣比葬三臨之禮也司徒誠為后父實人臣也雖子尊不加於父乃天下母以義斷恩不可遂在室之意故曰女子有行遠父母兄弟況乃應坤之載承天之重而朔望於司徒之殯晨昏於郊墓之間雖聖思蒸蒸其不虞宜戒離宸極之嚴居疲雲蹕於道路此亦億兆蒼生瞻仰失圖伏願尋載馳之不歸存靜方之光大則草木可繁人靈斯穆臣職忝諫司敢獻狂瞽謹冒上聞不敢宣露乞垂省覽昭臣微款脫得奉謁聖顏曲盡愚衷者死且不朽太后覽表親至國珍宅召集王公八座卿尹及五品已上博議其事遣使召普惠與相問答又令侍中元叉中常侍賈璨監觀得失任城王澄問普惠曰漢高作帝尊父為太上皇今聖母臨朝贈父太上公求之故實非為無準且君舉作則何必循舊對曰天子稱詔太后稱令故周臣十亂文母預焉仰思所難竊謂非匹澄曰前代太后亦有稱詔聖母自欲存謙光之義故不稱耳何得以詔令之別而廢嚴父之孝對曰后父太上自昔未有前代母后豈不欲尊崇其親王何以不遠謨古義而近順今旨未審太后何故謙於稱詔而不謙於太上竊願聖后終其謙光, WYG: 雍}
