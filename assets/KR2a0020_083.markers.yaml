  - {type: variant, offset: 5, length: 5, content: 八列傳第六, WYG: 一上賀訥劉羅辰姚黄眉杜超賀迷閭毗馮熙李峻李惠夫右賢左戚尚德尊功有國者所以治天下也殷肇王基不藉莘氏為佐周成大業未聞姒姓為輔及於漢世外戚尤重殺身傾族相繼於兩京乃至移其鼎璽亂其邦國魏文深以為誡明帝尚封頑騃晉之楊駿尋至夷宗居上不以至公任物在下徒用私寵要榮繭犢引大車弱質任厚棟所謂愛之所以害之矣太祖初賀訥有部衆之業翼成皇祚其餘或以勞勤或縁恩澤咸序其迹舉外親之盛衰云爾賀訥代人太祖之元舅獻明后之兄也其先世為君長四方附國者數}
  - {type: page-break, offset: 5, content: '', id: KR2a0020_WYG_083-1b, image: WYG0262/WYG0262-0213b.png}
