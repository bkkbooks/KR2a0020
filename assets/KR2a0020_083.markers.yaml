  - {type: variant, offset: 5300, length: 813, content: 來甚迅速佇立催去普惠諸子憂怖涕泣普惠謂曰我當休明之朝掌諫議之職若不言所難言諫所難諫便是唯唯曠官尸祿人生有死死得其所夫復何恨然朝廷有道汝輩勿憂及議罷旨勞還宅親故賀其幸甚時中山莊弼遺書普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使羣后逡巡庶僚拱默雖不見用於一時固已傳美於百代聞風快然敬裁此白普惠美其此書每為口實普惠以天下民調幅度長廣尚書計奏復徵綿麻恐其勞民不堪命上疏曰伏聞尚書奏復綿麻之調尊先皇之軌夙宵惟度忻戰交集何者聞復高祖舊典所以忻惟新俱可復而不復所以戰違法仰惟高祖廢大斗去長尺改重秤所以愛萬姓從薄賦知軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上稅綿八兩布上稅麻十五斤萬姓得廢大斗去長尺改重秤荷輕賦之饒不適於綿麻而已故歌舞以供其賦奔走以役其勤天子信於上億兆樂於下故易曰悅以使民民忘其勞此之謂也自茲以降漸漸長闊百姓嗟怨聞於朝野伏惟皇太后未臨朝之前陛下居諒闇之日宰輔不尋其本知天下之怨綿麻不察其輻廣度長秤重斗大革其所弊存其可存而特放綿麻之調以悅天下之心此所謂悅之不以道愚臣所以未悅者也尚書既知國少綿麻不惟法度之易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而羣官共竊之愚臣以為於理未盡何者今宮人請調度造衣物必度忖秤量絹布匹有尺丈之盈一猶不計其廣絲綿斤兼百銖之剩未聞依律罪州郡若一匹之濫一斤之惡則鞭戶主連三長此所以教民以貪者也今百官請俸人樂長闊并欲厚重無復準極得長闊厚重者便云其州能調絹布精闊且長橫發美譽以亂視聽不聞嫌長惡廣求計還官者此百司所以仰負聖明也今若必復綿麻者謂宜先令四海知其所由明立嚴禁復本幅度新綿麻之典依太和之稅其在庫絹布并及絲綿不依典制者請遣一尚書與太府卿左右藏令依今官度官秤計其斤兩廣長折給請俸之人總常俸之數千俸所出以布綿麻亦應其一歲之用使天下知二聖之心愛民惜法如此則高祖之軌中興於, WYG: 據鞍}
