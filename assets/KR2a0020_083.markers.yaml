  - {type: variant, offset: 36, length: 2, content: 濟陽, WYG: 官子醜建襲劉羅辰代人宣穆皇后之兄也父眷為北部大人帥部落歸國羅辰有智謀謂眷曰從兄顯忍人也願早圖之眷不以為意後庫仁子顯殺眷而代立又謀逆及太祖即位討顯于馬邑追至彌澤大破之後奔慕容麟麟徙之中山羅辰率騎奔太祖顯恃部衆之彊每謀為逆羅辰輙先聞奏以此特蒙寵念尋拜南部大人從平中原以前後勲賜爵永安公以軍功除征東將軍定州刺史卒謚曰敬子殊暉襲爵位幷州刺史卒子求引位武衛將軍卒謚曰貞子爾頭位魏昌廮陶二縣令贈鉅鹿}
