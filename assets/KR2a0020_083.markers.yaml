  - {type: variant, offset: 6351, length: 294, content: 求秖劫之果未若先萬國之忻心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之虔親紆朔望之禮釋奠成均竭心千畝明發不寐潔誠禋祼孝悌可以通神明德教可以光四海則一人有喜兆民賴之然後精進三寶信心如來道由禮深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經遠言多孟浪忝職其憂不敢默爾尋別敕付外議釋奠之禮時史官剋日蝕豫敕罷朝普惠以逆廢非禮上疏陳之又表論時政得失一曰審法度平斗尺租調務輕賦役務省二曰聽輿言察怨訟先皇舊事有不便於政者請悉追改三曰進忠謇退不肖任賢勿貳去邪勿疑四曰興滅國繼絕世勳親之胤所宜收書奏肅宗, WYG: 遂寝疾}
