  - {type: variant, offset: 25, length: 2, content: 世仕, WYG: 勸進太祖登代王位于牛川及太祖討吐突隣部訥兄弟遂懐異圖率諸部救之帝擊之大潰訥西遁衛辰遣子直力鞮征訥訥告急請降太祖簡精騎二十萬救之遂徙訥部落及諸弟處之東界訥又通於}
  - {type: variant, offset: 25, length: 2, content: 世仕, krp: 勸進太祖登代王位于牛川及太祖討吐突隣部訥兄弟遂懐異圖率諸部救之帝擊之大潰訥西遁衛辰遣子直力鞮征訥訥告急請降太祖簡精騎二十萬救之遂徙訥部落及諸弟處之東界訥又通於}
  - {type: variant, offset: 29, length: 1, content: 氏, WYG: 垂垂以訥為歸善王染干謀殺訥而代立訥遂與染干相攻垂遣子麟討之敗染干於牛都破訥於赤城太}
  - {type: page-break, offset: 29, content: '', id: KR2a0020_WYG_083-3a, image: WYG0262/WYG0262-0214a.png}
