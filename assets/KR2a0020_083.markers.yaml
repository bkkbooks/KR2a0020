  - {type: variant, offset: 2475, length: 160, content: 聲譽旋京之日裝束藍縷澄賚絹二十匹以充行資還朝仍羽林監又澄遭太妃憂臣僚為立碑頌題碑欲云康王元妃之碑澄訪於普惠答曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以別名位且以氏配姓愚以為在生之稱故春秋夫人姜氏至自齊既葬以諡配姓故經書葬我小君文姜氏又曰來歸夫人成風之襚, WYG: 差}
