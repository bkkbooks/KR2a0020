  - {type: variant, offset: 1036, length: 479, content: 京以來文華而政亂故臣昔於太和極陳得失具論四方華夷心態高祖垂納文應可尋延昌正光奏疏頻上主者收錄不蒙報問即日事勢乃至於此盡微臣豫陳之驗今東南有竊號之豎西北有逆命之寇豈得怨天實尤人矣臣今不憂荒外正慮中畿急須改張以寧其意若仍持疑變亂尋作肘腋一乖大事去矣然臣奉國四世欣戚是同但職在冗散不關樞密寧濟之計欲陳無所可謂經緯甚多無機可織夫天下者大器也一正難傾一傾難正當今之危躡足之急臣備肉食痛心無已泣血上陳願垂採察若得言參執事獻可替否寇逆獲除社稷稱慶雖死如生犬馬情畢紹性抗直每上封事常至懇切不憚犯忤但天性疏脫言乍高下時人輕之不見採納紹兄世元早卒世元善彈箏紹後聞箏聲便涕泗嗚咽捨之而去世以此尚之除驍騎將軍使吐谷渾還為太府少卿曾因朝見靈太后謂曰卿年稍老矣紹曰臣年雖老臣卿乃少太后笑之遷右將軍太中大夫紹曾與百僚赴朝東掖未開守門候旦紹於衆中引吏部郎中辛雄於衆外竊謂之曰此中諸人尋當死盡唯吾與卿猶享富貴雄甚駭愕不測所以未幾有河陰之難紹善推祿命事驗甚多知者異之建義初除衞尉少卿將軍如故轉金紫光祿大夫永安中拜太府卿以前參議正光壬子曆賜爵新昌子太昌初遷左衞將軍右光祿大夫永熙二年卒時年六十九贈, WYG: ''}
