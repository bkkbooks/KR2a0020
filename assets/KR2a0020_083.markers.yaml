  - {type: variant, offset: 1559, length: 0, content: '', krp: 涇州刺史頓丘公雅嶷誕等皆封公位顯後進峻爵為王徴為太宰薨李惠中山人思皇后之父也父蓋少知名歴位殿中都官二尚書左將軍南郡公初世祖妹武威長公主故涼王沮渠牧犍之妻世祖平涼州頗以公主通密計助之故寵遇差隆詔蓋尚焉蓋妻與氏以是而出是後蓋加侍中駙馬都尉殿中都官尚書左僕射卒官贈征南大將軍定州刺史中山王諡曰莊惠弱冠襲父爵妻襄城王韓頽女生二女長即后也惠歴位散騎常侍侍中征西大將軍秦益二州刺史進爵為王轉雍州刺史征南大將軍加長安鎭大將惠長於思察雍州㕔事有燕爭巢鬭已累日惠令人掩獲試命綱紀斷之並辭曰此乃上智所測非下愚所知惠乃使卒以弱竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無留心羣下伏其聰察人有負鹽負薪者同釋重檐息於樹隂二人將行爭一羊皮各言藉背之物惠遣爭者出顧謂州綱紀曰此羊皮可拷知主乎羣下以為戱言咸無答者惠令人置羊皮蓆上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所察究多如此類由是吏民莫敢欺犯後為開府儀同三司青州刺史王如故歴政有美績惠素為文明太后所忌誣惠將南叛誅之惠二弟初樂與惠諸子同戮後妻梁氏亦死青州盡沒其家財惠本無釁故天下寃惜焉惠從弟鳳為定州刺史安樂王長樂主簿後長樂以罪賜死時卜筮者河間邢瓚辭引鳳云長樂不軌鳳為謀主伏誅惟鳳弟道念與鳳子及兄弟之子皆逃免後遇赦乃出太和十二年髙祖將爵舅氏詔訪存者而惠諸從以再罹拏戮難於應命唯道念敢先詣闕乃申后妹及鳳兄弟子女之存者於是賜鳳子屯爵栢人侯安祖浮陽侯興祖安喜侯道念眞定侯從弟寄生髙邑子皆加將軍十五年安祖昆弟四人以外戚蒙見詔謂曰卿之先世内外有犯得罪於時然官必用才以親非興邦之選外氏之寵超於末葉從今已後自非竒才不得復外戚謬班抽舉既無殊能今且可還後例降爵安祖等改侯為伯並去軍號髙祖奉馮氏過厚於李氏過薄舅家了無叙用朝野人士所以竊議太常髙閭顯言於禁中及世宗寵隆外家並居顯位乃惟髙祖舅氏存已不霑恩澤景明末特詔興祖為中山太守正始初詔追崇惠為使持節驃騎將軍開府儀同三司定州刺史中山公太常考行上言案諡法武而不遂曰壯諡曰壯公興祖自中山遷燕州刺史卒以兄安祖子侃晞為後襲先封南郡王後以庶姓罷王改為博陵郡公侃晞為莊帝所親幸拜散騎常侍嘗食典御帝之圖爾朱榮侃晞與魯安等持刀於禁内殺榮及莊帝蒙塵侃晞奔蕭衍魏書卷八十三上魏書卷八十三上考證列傳第七十一上魏收書外戚𫝊上亡後人所補賀訥𫝊父野干干監本誤于今改正馮熙𫝊左右皆入入監本誤人今改正魏書卷八十三上考證欽定四庫全書魏書卷八十三下齊魏收撰列𫝊外戚第七十一下高肇于勁胡國珍李延寔高肇字首文文昭皇太后之兄也自云本渤海蓨人五世祖顧晉永嘉中避亂入高麗父颺字法修高祖初與弟乘信及其鄉人韓内冀富等入國拜厲威將軍河間子乘信明威將軍俱待以客禮賜奴婢牛馬綵帛遂納颺女是為文昭皇后生世宗颺卒景明初世宗追思舅氏徴肇兄弟等錄尚書事北海王詳等奏颺宜贈左光禄大夫賜爵渤海公謚曰敬其妻蓋氏宜追封清河郡君詔可又詔颺嫡孫猛襲渤海公爵封肇平原郡公肇弟顯澄城郡公三人同日受封始世宗未與舅氏相接将拜爵乃賜衣幘引見肇顯于華林都亭皆甚惶懼舉動失儀數日之間富貴赫奕是年咸陽王禧誅財物珍寳奴婢田宅多入高氏未㡬肇為尚書左僕射領吏部冀州大中正尚世宗姑高平公主遷尚書令肇出自夷土時望輕之及在位居要留心百揆孜孜無倦世咸謂之為能世宗初六輔專政後以咸陽王禧無事構逆由是遂委信肇肇既無親族頗結朋黨附之者旬月超昇背之者䧟以大罪以北海王詳位居其上構殺之又説世宗防衛諸王殆同囚禁時順皇后暴崩世譏言肇為之皇子昌薨僉謂王顯失於醫療承肇意㫖及京兆王愉出為冀州刺史畏肇恣擅遂至不軌肇又譖殺彭城王勰由是朝野側目咸畏惡之因此專權與奪任已又嘗與清河王懌於雲龍門外廡下忽忿諍大至紛紜太尉高陽王雍和止之高后既立愈見寵信肇既當衡軸每事任已本無學識動違禮度好改先朝舊制出情妄作減削封秩抑黜勲人由是怨聲盈路矣延昌初遷司徒雖貴登台鼎猶以去要怏怏形乎辭色衆咸嗤笑之父兄封贈雖久竟不改瘞三年乃詔令遷葬肇不自臨赴唯遣其兄子猛改服詣代遷葬於鄉時人以肇無識哂而不責也其年大舉征蜀以肇為大将軍都督諸軍為之節度與都督甄琛等二十餘人俱面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒轉卧渠中鞍具瓦解衆咸怪異肇出惡焉四年世宗崩赦罷征軍肅宗與肇及征南将軍元遥等書稱諱言以告凶問肇承變哀愕非唯仰慕亦私憂身禍朝夕悲泣至于羸悴将至宿瀍澗驛亭家人夜迎省之皆不相視直至闕下衰服號哭昇太極殿奉喪盡哀太尉髙陽王先居西柏堂專決庶事與領軍于忠密欲除之潛備壯士直寝邢豹伊瓮生等十餘人於舍人省下肇哭梓宮訖於百官前引入西廊清河王懌任城王澄及諸王等皆竊言目之肇入省壯士搤而拉殺之下詔暴其罪惡又云刑書未及便至自盡自餘親黨悉無追問削除職爵葬以士禮及昏乃於厠門出其尸歸家初肇西征行至函谷車軸中折從者皆以為不獲吉還也靈太后臨朝令特贈營州刺史永熙二年出帝贈使持節侍中中外諸軍事太師大丞相太尉公錄尚書事冀州刺史肇子植自中書侍郎為濟州刺史率州軍討破元愉别將有功當蒙封賞不受云家荷重恩為國致效是其常節何足以膺進陟之報懇惻發于至誠歴青相朔恒四州刺史卒植頻莅五州皆清能著稱當時號為良刺史贈安北将軍冀州刺史肇長兄琨早卒襲颺封渤海郡公贈都督五州諸軍事鎮東大將軍冀州刺史詔其子猛嗣猛字豹兒尚長樂公主即世宗同母妹也拜駙馬都尉歴位中書令出為雍州刺史有能名入為殿中尚書卒贈司空冀州刺史出帝時復贈太師大丞相錄尚書事公主無子猛先在外有男不敢令主知臨終方言之年㡬三十矣乃召為喪主尋卒無後琨弟偃字仲游太和十年卒正始中贈安東将軍都督青州刺史謚曰莊侯景明四年世宗納其女為貴嬪及于順皇后崩永平元年立為皇后二年八座奏封后母王氏為武邑郡君偃弟夀早卒夀弟即肇也肇弟顯侍中髙麗國大中早卒于勁字鍾葵太尉㧞之子頗有武略以功臣子又以功績位沃野鎮将賜爵富昌子拜征虜将軍世宗納其女為后封太原郡公妻劉氏為章武郡君後拜征北將軍定州刺史卒贈司空諡曰恭莊公自栗磾至勁累世貴盛一皇后四贈公三領軍二尚書令三開國公勁雖以后父但以順后早崩竟不居公輔子暉字宣明后母弟也少有氣幹襲爵位汾州刺史暉善事人為尒朱榮所親以女妻其子長孺歴侍中河南尹後兼尚書僕射東南道行臺與齊獻武王討平羊侃於兖州元顥入洛害之勁弟天恩位内行長遼西太守卒贈平東將軍燕州刺史天恩子仁生位}
