  - {type: variant, offset: 592, length: 290, content: 質以換情權不可隨洿隆以收物文質應世道形自安洿隆獲衷權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令並議律尋施行令獨不出十餘年矣臣以令之為體即帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要乃是有為之樞機世法之大本也然修令之人亦皆博古依古撰置大體可觀比之前令精粗有在但主議之家太用古制若全依古高祖之法復須昇降誰敢措意有是非哉以是爭故久廢不理然律令相須不可偏用今律班令止於事甚滯若令不班是無典法臣下執事何依而行臣等修律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懷於悒未幾出除濟陰太守還歷司徒功曹參軍步兵長水校尉正光初兼, WYG: ''}
