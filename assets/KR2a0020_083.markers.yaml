  - {type: variant, offset: 31, length: 2, content: 志入, WYG: 遣師救訥麟乃引退訥從太祖平中原拜安逺將軍其後離散諸部分土定居不聽遷徙其君長大人皆同編户訥以元舅甚見尊重然無統領以壽終於家訥弟盧亦從平中原以功賜爵遼西公太祖遣盧會衛王儀伐鄴而盧自以太祖之季舅不肯受儀節度太祖遣使責之盧遂忿恨與儀司馬丁建構成其嫌彌加猜忌會太祖勑儀去鄴盧亦引歸太祖以盧為廣川太守盧性雄豪耻居冀州刺史王輔下襲殺輔奔慕容德德以為幷州刺史廣寧王廣固敗盧亦沒訥從父弟悅初太祖之居賀蘭部下人情未甚附唯悅舉部隨從又密為太祖祈禱天神請成大業出於誠至太祖嘉之甚見寵待後平中原以功賜爵鉅鹿侯進爵北新卒子泥襲爵後降為肥如侯太祖崩京師草草泥出舉烽於安陽城北賀蘭部人皆徃赴之太宗即位乃罷詔泥與元渾等八人拾遺左右與北新侯安同持節行幷定二州劾奏幷州刺史元六頭等皆伏罪州郡肅然後從世祖征赫連昌以功進爵為琅邪公軍}
  - {type: page-break, offset: 31, content: '', id: KR2a0020_WYG_083-3b, image: WYG0262/WYG0262-0214b.png}
  - {type: page-break, offset: 31, content: '', id: KR2a0020_WYG_083-4a, image: WYG0262/WYG0262-0214c.png}
