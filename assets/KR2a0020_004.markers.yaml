  - {type: variant, offset: 8666, length: 0, content: '', WYG: 魏書卷四上魏書卷四上考證世祖紀初造新字千餘臣人龍按本書太祖紀天興四年比衆經文字凡四萬餘字此則初造新字頒之逺近蓋天興所集者經傳所有也始光所造者時俗所行而衆經文所不及收者也金石文字記謂説文所無而後人續添之字大都出此然三國志云有山隂朱育依體像類造作異字千名以上則知别撰之字自漢有之矣馮文通長樂公崇及其母弟朗朗弟邈北史作馮文通子長樂公崇考列傳崇朗邈皆文通子也加一子字義較明魏書卷四上考證欽定四庫全書魏書卷四下齊魏收撰帝紀第四下世祖紀下恭宗紀太平真君元年春正月己酉沮渠無諱圍酒泉辛亥分遣侍臣廵行州郡觀察風俗問民疾苦壬子無諱誘執弋陽公元潔二月己巳詔假通直常侍邢穎使於劉義隆發長安五千人浚昆明池三月酒泉陷夏四月庚辰無諱寇張掖秃髪保周屯于刪丹丙戍詔撫軍大將軍永昌王健等督諸軍討保周五月辛夘行幸北部乙巳無諱復圍張掖不克退還丙辰車駕還宮六月丁丑皇孫濬生大赦改年秋七月行幸隂山己丑永昌王健至番禾破保周保周遁走丙申皇太后竇氏崩于行宮癸丑保周自殺傳首京師八月甲申無諱降送弋陽公元潔及諸將士九月壬寅車駕還宮冬十有一月丁亥行幸山北十二月車駕還宮是嵗州鎮十五民饑開倉賑恤以河南王曜子羯兒為河間王後改封畧陽王二年春正月癸夘拜沮渠無諱為征西大將軍涼州牧酒泉王甲辰行幸溫泉二月壬戍車駕還宮三月辛夘葬惠太后於崞山庚戌新興王俊畧陽王羯兒有罪並黜為公辛亥封蠕蠕郁乆閭乞列歸為朔方王沮渠萬年為張掖王夏四月丁巳劉義隆遣使朝貢庚辰詔鎮南將軍南陽公奚眷征酒泉五月辛夘行幸山北秋八月辛亥詔散騎侍郎張偉等使劉義隆行幸河西九月戊戍撫軍大將軍永昌王健薨冬十有一月庚子鎮南將軍奚眷平酒泉獲沮渠天周臧嗟屈徳男女四千口十有二月甲戍車駕還宮丙子劉義隆遣使朝貢三年春正月甲申帝至道壇親受符籙備法駕旗幟盡青語在釋老志三月壬寅北平王長孫頽有罪削爵為侯夏四月無諱走渡流沙據鄯善李暠孫寶據敦煌遣使内附三月行幸隂山之北閏月劉義隆龍驤將軍裴方明梁州刺史劉康祖寇南秦南秦王楊難當敗奔於上邽六月丙戍難當朝於行宮先是起殿於隂山之北殿始成而難當至因名曰廣徳焉秋七月丙寅詔安西將軍建興公古弼督隴右諸軍及殿中虎賁與武都王楊保宗等從祁山南入征西將軍淮陽公皮豹子與琅邪王司馬楚之等督關中諸軍從散關西入俱會仇池鬱林公司馬文思為征南大將軍進爵譙王督洛豫諸軍事南趣襄陽征南將軍東安公刁雍東趣廣陵邀方明歸路冬十月己夘封皇子伏羅為晉王翰為秦王譚為燕王建為楚王余為吳王十有二月辛巳侍中太保襄城公盧魯元薨丁酉車駕還宮李寶遣使朝貢以寶為鎮西大將軍開府儀同三司沙州牧封敦煌公四年春正月己巳征西將軍皮豹子等大破劉義隆將於樂鄉擒其將王奐之王長卿等强元明辛伯奮棄下辨遁走追斬之盡虜其衆庚午行幸中山二月丙子車駕至于􅁪山之陽詔有司刋石勒銘是月克仇池三月庚申車駕還宮壬戌烏洛侯國遣使朝貢夏四月武都王楊保宗謀反諸將擒送京師諸氐羌復推保宗弟文徳為主圍仇池丁酉大赦天下己亥行幸隂山五月將軍古弼大破諸氐解仇池圍六月庚寅詔曰朕承天子民憂理萬國欲令百姓家給人足興於禮義而牧守令宰不能助朕宣揚恩徳勤恤民隱至乃侵奪其産加以殘虐非所以為治也今復民貲賦三年其田租嵗輸如常牧守之徒各厲精為治勸課農桑不得妄有徴發有司彈糾勿有所縱癸巳大閲于西郊秋九月辛丑行幸漠南甲辰捨輜重以輕騎襲蠕蠕分軍為四道事具蠕蠕𫝊鎮北將軍封沓亡入蠕蠕冬十一月將軍皮豹子等追破劉義隆將於濁水甲子車駕至於朔方詔曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除亂埽清不順二十年矣夫隂陽有往復四時有代謝授子任賢所以休息優隆功臣式圖長乆蓋古今不易之令典也其令皇太子副理萬幾總統百揆諸朕功臣勤勞日乆皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩以劇職更舉賢俊以備百官主者明為科制以稱朕心十二月辛夘車駕至自北伐五年春正月壬寅皇太子始總百揆侍中中書監宜都王穆夀司徒東郡公崔浩侍中廣平公張黎侍中建興公古弼輔太子以決庶政諸上書者皆稱臣上疏儀與表同戊申詔曰愚民無識信惑妖邪私飬師巫挾藏䜟記隂陽圖緯方伎之書又沙門之徒假西戎虚誕生致妖孽非所以壹齊政化布淳徳於天下也自王公已下至於庶人有私飬沙門師巫及金銀工巧之人在其家者皆遣詣官曹不得容匿限今年二月十五日過期不出師巫沙門身死主人門誅明相宣告咸使聞知庚戍詔曰自頃以來軍國多事未宣文教非所以整齊風俗示軌則於天下也今制自王公已下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅二月辛未中山王辰等八將以北伐後期斬于都南癸酉驃騎大將軍樂平王丕薨庚辰行幸廬闕三月戊戌大會于那南池遣使者四輩使西域甲辰車駕還宮癸丑詔征西大將軍司空上黨王長孫道生鎮統萬夏四月乙亥侍中太宰陽平王杜超為帳下所殺五月丁酉行幸隂山之北六月北部民殺立義將軍衡陽公莫孤率五千餘落北走追擊于漠南殺其渠帥餘徙居冀相定三州為營户西平王吐谷渾慕利延殺其兄子緯代是月緯代弟叱力延等來奔乞師以叱力延為歸義王秋七月癸夘東雍州刺史沮渠秉謀叛伏誅八月乙丑田于河西壬午詔員外散騎常侍髙濟使於劉義隆晉王伏羅督髙平涼州諸軍討吐谷渾慕利延九月帝自河西至馬邑觀于崞川己亥車駕還宮丁未行幸漠南冬十月癸未晉王伏羅大破慕利延慕利延走奔白蘭慕利延從弟伏念長史鵴鳩黎部大崇娥等率其部一萬三千落内附十一月劉義隆遣使朝貢十二月粟特國遣使朝貢丙戍車駕還宮六年春正月辛亥車駕行幸定州引見長老存問之詔兼員外散騎常侍宋愔使劉義隆二月遂西幸上黨觀連理樹於泫氏西至吐京討徙叛胡出配郡縣三月庚申車駕還宮詔諸有疑獄皆付中書以經義量決是月酒泉公郝溫反於杏城殺守將王幡縣吏蓋鮮率宗族討溫溫棄城走自殺家屬伏誅夏四月庚戌征西大將軍高涼王那等討吐谷渾慕利延於隂平白蘭詔秦州刺史天水公封勑文擊慕利延兄子什歸於枹罕散騎常侍成周公萬度歸乗傳發涼州以西兵襲鄯善六月壬辰車駕北廵什歸聞軍將至棄城夜遁秋八月丁亥封勅文入枹罕分徙千家還上邽壬辰度歸以輕騎至鄯善執其王真逹以詣京師帝大悦厚待之車駕幸隂山之北次于廣徳宮詔發天下兵三分取一各當戒嚴以須後命徙諸種雜人五千餘家於北邊令民北徙畜牧至廣漠以餌蠕蠕壬寅髙涼王那軍到曼頭城慕利延驅其部落西渡流沙那急追故西秦王慕璝世子被囊逆軍拒戰那擊破之被囊輕騎遁走中山公杜豐精騎追之度三危至雪山生擒被囊什歸及熾磐子成龍送于京師慕利延遂西入于闐國九月盧水胡蓋吳聚衆反於杏城冬十月戊子長安鎮副將元紇率衆討之為吳所殺吳黨遂盛民皆渡渭奔南山於是詔發髙平勑勒騎赴長安詔將軍叔孫㧞乗傳領攝并秦雍兵屯渭北十有一月髙涼王那振旅還京師己未遣那及殿中尚書安定公韓茂率騎屯相州之陽平郡發冀州民造浮橋於碻磝津蓋吳遣其部落帥白廣平西掠新平安定諸夷酋皆聚衆應之殺汧城守將呉遂進軍李閠堡分兵掠臨晉已東將軍章直與戰大敗之兵溺死於河者三萬餘人吳又遣兵西掠至長安將軍叔孫技與戰於渭北大破之斬首三萬餘級庚申遼東王竇漏頭薨河東蜀薛永宗聚黨盜官馬數千匹驅三千餘人入汾曲西通蓋吳受其位號秦州刺史金城公周鹿觀率衆討之不克而還庚午詔殿中尚書扶風公元處真尚書平陽公慕容嵩二萬騎討薛永宗詔殿中尚書乙㧞率五將三萬騎討蓋吳西平公寇提三將一萬騎討吳黨白廣平蓋吳自號天台王署置百官辛未車駕還宮選六州兵勇猛者二萬人使永昌王仁髙涼王那分領為二道各一萬騎南畧淮泗以北徙青徐之民以實河北癸未車駕西征七年春正月戊辰車駕次東雍州庚午圍薛永宗營壘永宗出戰大敗六軍乗之永宗衆潰永宗男女無少長赴汾水死辛未車駕南幸汾隂庚辰帝臨戲水蓋吳退走北地二月丙戍幸長安存問父老丁亥幸昆明池丙申幸盩厔誅叛民耿青孫溫二壘與蓋吳通謀者軍次陳倉誅散關氐害守將者還幸雍城田於岐山之陽北道諸軍乙㧞等大破蓋吳於杏城吳棄馬遁走永昌王仁至髙平擒劉義隆將王章略金鄉方與遷其民五千家於河北髙涼王那至濟南東平陵遷其民六千餘家於河北三月詔諸州坑沙門毁諸佛像徙長安城工巧二千家於京師車駕旋軫幸洛水分軍誅李閏叛羌是月金城邊冏天水梁會反據上邽東城秦州刺史封勑文擊之斬冏衆復推㑹為帥夏四月甲申車駕至自長安戊子鄴城毁五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽五月癸亥安豐公閭根率騎詣上邽與勑文討梁會會走漢中蓋吳復聚杏城自號秦地王假署山民衆旅復振於是遣永昌王仁髙涼王那督北道諸軍同討之六月甲申發定冀相三州兵二萬人屯長安南山諸谷以防越逸丙戍發司幽定冀四州十萬人築畿上塞圍起上谷西至于河廣袤皆千里秋八月蓋吳為其下人所殺傳首京師永昌王仁平其遺燼髙涼王那破蓋吳黨白廣平生擒屠各路那羅於安定斬于京師復略陽公羯兒王爵八年春正月吐京胡阻險為盜詔征東將軍武昌王提征南將軍淮南王他討之不下山胡曹僕渾等渡河西保山以自固招引朔方諸胡提等引軍討僕渾二月己夘髙涼王那等自安定討平朔方胡因與提等合軍共攻僕渾斬之其衆赴險死者以萬數癸未行幸中山頒賜從官文武各有差髙陽易縣民不從官命討平之徙其餘燼於北地三月河西王沮渠牧犍謀反伏誅徙安州丁零三千家於京師夏五月車駕還宮六月西征諸將扶風公元處真等八將坐盜没軍資所在虜掠贓各千萬計並斬之八月衞大將軍樂安王範薨冬十月侍中中書監宜都王穆夀薨十二月鄯善遮逸國並遣子朝獻晉王伏羅薨九年春正月劉義隆遣使朝貢氐楊文徳受義隆官號守葭蘆城招誘武都隂平五部氐民詔仇池鎮將皮豹子討之文徳棄城南走擒其妻子寮屬義隆白水太守郎啓元率衆救文徳豹子逆擊大破之啓元文徳走還漢中宕昌羌酋梁瑾慈遣使内附并貢方物二月癸夘行幸定州山東民饑啓倉賑之罷塞圍作遂西幸上黨誅潞叛民二千餘家徙西河離石民五千餘家于京師詔於壺關東北大王山累石為三封又斬其北鳯皇山南足以斷之三月車駕還宮夏五月甲戌以交趾公韓㧞為假節征西將軍領䕶西戎校尉鄯善王鎮鄯善賦役其民比之郡縣六月辛酉行幸廣徳宮丁夘悦般國遣使求與王師俱討蠕蠕帝許之秋八月詔中外諸軍戒嚴九月乙酉治兵于西郊丙戍上幸隂山是月成周公萬度歸千里驛上大破焉耆國其王鳩尸卑那奔龜兹冬十月辛丑恒農王奚斤薨癸夘以婚姻奢靡喪𦵏過度詔有司更為科限癸亥大赦天下十有二月詔成周公萬度歸自焉耆西討龜兹皇太子朝于行宮遂從北討至于受降城不見蠕蠕因積糧城内留守而還北平王長孫敦坐事降爵為公十年春正月戊辰朔帝在漠南大饗百寮班賜有差甲戍北伐二月蠕蠕渠帥爾綿他㧞等率其部落千餘家來降蠕蠕吐賀真恐懼逺遁事具蠕蠕傳三月遂蒐于河西庚寅車駕還宫夏五月庚寅行幸隂山秋七月浮圖沙國遣使貢獻九月閲武磧上遂北伐事具蠕蠕傳冬十月庚子皇太子及羣官奉迎於行宮壬午大饗班賜所獲及布帛各有差十有一月龜兹疏勒破落那員闊諸國各遣使朝獻十有二月戊申車駕至自北伐己酉以平昌公元託真為中山王十一年春正月乙酉行幸洛陽所過郡國皆親對髙年存恤孤寡以髙涼王那為儀同三司二月甲午大蒐於梁川皇子真薨是月大治宮室皇太子居于北宮車駕遂征懸瓠益遣使者安慰境外之民其不服者誅之永昌王仁大破劉義隆將劉坦之程天祚於汝東斬坦之擒天祚夏四月癸夘輿駕還宮賜從者及留臺郎吏已上生口各有差六月己亥誅司徒崔浩辛丑北廵隂山秋七月義隆遣其輔國將軍蕭斌之率衆六萬寇濟州刺史王買得棄州走斌之遂入城仍使寧朔將軍王元謨西攻滑臺詔枋頭鎮將平南將軍南康公杜道􅖡助守兗州八月癸亥田於河西癸未治兵於西郊九月辛夘輿駕南伐癸巳皇太子北伐屯於漠南吳王余留守京都庚子曲赦定冀相三州死罪已下發州郡兵五萬分給諸軍冬十月癸亥車駕止枋頭詔殿中尚書長孫真率騎五千自石濟渡備元謨遁走乙丑車駕濟河元謨大懼棄軍而走衆各潰散追躡斬首萬餘級器械山積帝遂至東平蕭斌之棄濟州退保厯城乃命諸將分道並進使征西大將軍永昌王仁自洛陽出壽春尚書長孫真趨馬頭楚王建趨鍾離髙涼王那自青州趨下邳車駕自卭道十有一月辛夘至于鄒山劉義隆魯郡太守崔邪利率屬城降使使者以太牢祀孔子壬子次于彭城遂趨盱眙頞盾國獻師子一十有二月丁夘車駕至淮詔刈萑葦作筏數萬而濟義隆盱眙守將臧質閉門拒守將軍胡崇之等率衆二萬援盱眙燕王譚大破之梟崇之等斬首萬餘級淮南皆降是月永昌王仁攻懸瓠㧞之獲義隆守將趙淮送京師斬之過定項城及淮西大破義隆將劉康祖斬之并虜將軍胡盛之王羅漢等傳致行宮癸未車駕臨江起行宮於𤓰歩山永昌王仁自厯陽至於江西髙涼王那自山陽至於廣陵諸軍皆同日臨江所過城邑莫不望塵奔潰其降者不可勝數甲申義隆使獻百牢貢其方物又請進女於皇孫以求和好帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之詔皇孫為書致馬通問焉正平元年春正月丙戍朔大會羣臣於江上班賞各有差文武受爵者二百餘人丁亥輿駕北旋是月破洛那􅄢賔迷密諸國各遣使朝獻二月戊寅車駕濟河癸未次于魯口皇太子朝於行宮三月己亥車駕至自南伐飲至策勲告於宗廟以降民五萬餘家分置近畿賜留臺文武所獲軍資生口各有差夏五月壬寅大赦六月壬戌改年車師國王遣子入侍詔曰夫刑網太密犯者更衆朕甚愍之有司其案律令務求厥中自餘有不便於民者依比增損詔太子少傅游雅中書侍郎胡方囘等改定律制略陽王羯兒儀同三司髙涼王那有罪賜死戊辰皇太子薨壬申𦵏景穆太子於金陵秋七月丁亥行幸隂山省諸曹吏員三分之一九月癸巳車駕還宮冬十月庚申行幸隂山劉義隆遣使朝貢詔殿中將軍郎法祐使於義隆己巳司空上黨王長孫道生薨十有二月丁丑車駕還宮封皇孫濬為髙陽王尋以皇孫世嫡不宜在藩乃止封秦王翰為東平王燕王譚為臨淮王楚王建為廣陽王呉王余為南安王二年春正月庚辰朔南來降民五千餘家於中山謀叛州軍討平之冀州刺史張掖王沮渠萬年與降民通謀賜死三月甲寅帝崩於永安宮時年四十五祕不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元為承平尊皇后赫連氏為皇太后三月辛夘上尊諡曰太武皇帝𦵏於雲中金陵廟號世祖夏六月劉義隆將檀和之寇濟州梁坦及魯安生軍于京索龎萌薛安都寇宏農秋七月征南將軍安定公韓元興討之和之退梁坦安生亦走八月冠軍將軍封禮率騎二千從浢津南渡赴宏農九月司空髙平公兒烏干屯潼關平南將軍昌黎公元遼屯河内冬十月丙午朔余為宗愛所賊殿中尚書長孫渇侯與尚書陸麗迎立皇孫是為髙宗焉帝生不逮密太后及有所識言則悲慟哀感傍人太宗聞而嘉歎暨太宗不豫衣不釋帶性清儉率素服御飲膳取給而已不好珍麗食不二味所幸昭儀貴人衣無兼綵羣臣白帝更峻京邑坁隍以從周易設險之義又陳蕭何壯麗之説帝曰古人有言在徳不在險屈丐蒸土築城而朕滅之豈在城也今天下未平方須民力土功之事朕所朱為蕭何之對非雅言也毎以財者軍國之本無所輕費至賞賜皆是死事勲績之家親戚愛寵未曾横有所及臨敵常與士卒同在矢石之間左右死傷者相繼而帝神色自若是以人思効命所向無前命將出師指授節度從命者無不制勝違爽者率多敗失性又知人㧞士於卒伍之中惟其才效所長不論本末兼甚嚴斷明於刑賞功者賞不遺賤罪者刑不避親雖寵愛之終不虧法常曰法者朕與天下共之何敢輕也故大臣犯法無所寛假雅長聽察瞬息之間下人無以措其姦隱然果於誅戮後多悔之司徒崔浩既死之後帝北伐時宣城公李孝伯疾篤𫝊者以為卒也帝聞而悼之謂左右曰李宣城可惜又曰朕向失言崔司徒可惜李宣城可哀褒貶雅意皆此類也恭宗景穆皇帝諱晃太武皇帝之長子也母賀夫人延和元年春正月丙午立為皇太子時年五歳明慧彊識聞則不忘及長好讀經史皆通大義世祖甚竒之世祖東征和龍詔恭宗錄尚書事西征涼州詔恭宗監國初世祖之伐河西也李順等咸言姑臧無水草不可行師恭宗有疑色及車駕至姑臧乃詔恭宗曰姑臧城東西門外流泉合於城北其大如河自餘溝渠流入澤中其間乃無燥地澤草茂盛可供大軍數年人之多言亦可惡也故有此勑以釋汝疑恭宗謂宮臣曰為人臣不實若此豈是忠乎吾初聞有疑但帝決行耳㡬誤人大事言者復何面見帝也真君四年恭宗從世祖討蠕蠕至鹿渾谷與賊相遇虜惶怖部落擾亂恭宗言於世祖曰今大軍卒至宜速進擊掩其不備破之必矣尚書令劉潔固諫以為塵盛賊多出至平地恐為所圍須軍大集然後擊之可也恭宗謂潔曰此塵之盛由賊恇擾軍人亂故何有營上而有此塵世祖疑之遂不急擊蠕蠕逺遁既而獲虜候騎世祖問之對曰蠕蠕不覺官軍卒至上下惶懼引衆北走經六七日知無追者始乃徐行世祖深恨之自是恭宗所言軍國大事多見納用遂知萬機初恭宗監國曾令曰周書言任農以耕事貢九榖任圃以樹事貢草木任工以餘材貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其材任虞以澤事貢其物其制有司課畿内之民使無牛家以人牛力相貿墾殖鋤耨其有牛家與無牛家一人種田二十二畆償以私鋤功七畆如是為差至與小老無牛家種田七畆小老者償以鋤功二畝皆以五口下貧家為率各列家别口數所勸種頃畝明立簿目所種者於地首標題姓名以辨種殖之功又禁飲酒雜戲棄本沽販者墾田大為增闢正平元年六月戊辰薨於東宮時年二十四庚午冊曰嗚呼惟爾誕資明叡岐嶷夙成正位少陽克荷基構賔于四門百揆時叙允釐庶績風雨不迷宜享無疆隆我皇祚如何不幸奄焉殂殞朕用悲慟于厥心今使使持節兼太尉張黎兼司徒竇瑾奉策即柩賜諡曰景穆以顯昭令徳魂而有靈其尚嘉之髙宗即位追尊為景穆皇帝廟號恭宗史臣曰世祖聰明雄斷威靈傑立藉二世之資奮征伐之氣遂戎軒四出周旋險夷掃統萬平秦隴翦遼海盪河源南夷荷擔北蠕削跡廓定四表混一戎華其為功也大矣遂使有魏之業光邁百王豈非神叡經綸事當命世至於初則東儲不终末乃釁成所忽固本貽防殆弗思乎恭宗明徳令聞夙世殂夭其戾園之悼歟魏書卷四下魏書卷四下考證世祖紀明於刑賞功者賞不遺賤罪者刑不避親賤監本誤賊今改正魏書卷四下考證}
