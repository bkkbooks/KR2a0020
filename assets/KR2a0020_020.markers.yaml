  - {type: variant, offset: 944, length: 1, content: 遣, krp: 後還長安廣川王畧延興二年封位中都大官性明敏鞫獄稱平太和四年薨諡曰莊子諧字仲和襲十九年薨詔曰朕宗室多故從弟諧䘮逝悲痛摧割不能已巳古者大臣之䘮有三臨之禮此蓋三公已上至於卿司已下故應闕自漢已降多無此禮朕欲遵古典哀感從情雖以尊降伏私痛寧爽欲令諸王有朞親者為之三臨大功之親者為之再臨小功緦麻為之一臨廣川王於朕大功必欲再臨再臨者欲於大殮之日親臨盡哀成服之後緦麻而弔既殯之緦麻理在無疑大殮之臨當否如何為須撫柩於始䘮為應盡哀於闔棺早晚之宜擇其厥中黄門侍郎崔光宋弁通直常侍劉芳典命下大夫李元凱中書侍郎高敏等議曰三臨之事乃自古禮爰及漢魏行之者稀陛下至聖慈仁方遵前軌志必哀䘮慮同寧戚臣等以為若朞親三臨大功宜再始䘮之初哀之至極既以情降宜從始䘮大殮之臨伏如聖㫖詔曰魏晉已來親臨多闕至於戚臣必於東堂哭之頃大司馬安定王薨朕既臨之後復更受慰於東堂今日之事應更哭否光等議曰東堂之哭蓋以不臨之故今陛下躬親撫視羣臣從駕臣等參議以為不宜復哭詔曰若大司馬戚尊位重必哭於東堂而廣川既是諸王之子又年位尚幼卿等議之朕無異焉諧}
  - {type: variant, offset: 946, length: 4, content: 圍逼溫湯, WYG: 大殮髙祖素服深衣哭之入室哀慟撫尸而出有司奏廣川王妃薨於代京未審以新尊從於卑舊為宜卑舊來就新尊詔曰遷洛之人自兹厥後悉可歸骸邙嶺皆不得就塋恒代其有夫先葬在北婦今䘮在南婦人從夫宜還代葬若欲移父就母亦得任之其有妻墳於恒代夫死於洛不得以尊就卑欲移母就父宜亦從之若異葬亦從之若不在葬限身在代䘮葬之彼此皆得任之其户屬恒燕身官京洛去留之宜亦從所擇其屬諸州者各得任意詔贈諧武衛將軍諡曰剛及葬高祖親臨送之子靈道襲卒諡悼王齊郡王簡字叔亮太和五年封位中都大官簡母沮渠牧犍女也簡性貎特類外祖後為内都大官高祖嘗與簡俱朝文明太后於皇信堂簡居帝之右行家人禮遷太保高祖仁孝以諸父零落存者唯簡每見立以待之俟坐致敬問起居停簡拜伏簡性好酒不能理公私之事妻常氏燕郡公常喜女也文明太后以賜簡性幹綜家事頗節斷簡酒乃至盗竊求乞婢侍卒不能禁二十三年薨時高祖不豫詔曰叔父薨背痛慕摧絶不自勝任但虚頓床枕未堪奉赴當力疾發哀諡曰靈王世宗時改諡曰順子祐字伯授襲母常氏髙祖以納不以禮不許其為妃世宗以母從子貴詔特拜為齊國太妃祐位涇州刺史薨諡曰敬河間王若字叔儒年十六未封而薨追封河間諡曰孝詔京兆康王子太安為後太安於若為從弟非相後之義廢之以齊郡王子琛繼琛字曇寳幼而敏慧髙祖愛之世宗時拜定州刺史琛妃世宗舅女髙皇后妹琛憑恃内外多所受納貪惏之極及還朝靈太后詔曰琛在定州惟不將中山宫來自餘無所不致何可更復叙用由是遂廢于家琛以肅宗始學獻金字孝經又無方自達乃與劉騰為養息賂騰金寳巨萬計騰屢為之言乃得兼都官尚書出為秦州刺史在州聚斂百姓吁嗟屬東益南秦二州氐反詔琛為行臺仍充都督還攝州事琛性貪暴既總軍省求欲無厭百姓患害有甚狼虎}
