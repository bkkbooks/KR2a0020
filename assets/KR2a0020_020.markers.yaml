  - {type: variant, offset: 4710, length: 592, content: 穆壽孫女司空從妹也聰明婦人及為嘉妃多所匡贊光益家道子深字智遠襲爵肅宗初拜肆州刺史預行恩信胡人便之劫盜止息後為州刺史在州多所受納政以賄成私家有馬千匹者必取百匹以此為累遷殿中尚書未拜坐淫城陽王徽妃于氏為徽表訟詔付丞相高陽王雍等宗室議決其罪以王還第及沃野鎮人破六韓拔陵反叛臨淮王彧討之失利詔深為北道大都督受尚書令李崇節度時東道都督崔暹敗於白道深上書曰邊豎構逆以成紛梗其所由來非一朝也昔皇始以移防為重盛簡親賢擁麾作鎮配以高門子弟以死防遏不但不廢仕宦至乃偏得復除當時人物忻慕為之及太和在歷僕射李沖當官任事涼州土人悉免厮役豐沛舊門仍防邊戍自非得罪當世莫肯與之為伍征鎮驅使但為虞候白直一生推遷不過軍主然其往世房分留居京者得上品通官在鎮者便為清途所隔或投彼有北以御魑魅多復逃胡鄉乃峻邊兵之格鎮人浮遊在外皆聽流兵捉之於是少年不得從師長者不得遊宦獨為匪人言者流涕自定鼎伊洛邊任益輕唯底滯凡才出為鎮將轉相模習專事聚斂或有諸方姦吏犯罪配邊為之指蹤過弄官府政以賄立莫能自改咸言姦吏為此無不切齒憎怒及阿那瓌背恩縱掠竊奔命師追之十五萬衆度沙漠不日而還邊人見此援師便自意輕中國尚書令臣崇時即申聞求改鎮為州將允其願抑亦先覺朝廷未許而高闕戍主率下失和拔陵殺之敢為逆命攻城掠地所見必誅王師屢北賊黨日盛此段之舉指望銷平其崔暹隻輪不反臣崇與臣逡巡復路今者相與還次雲中馬首是瞻未便西邁將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦, WYG: ''}
