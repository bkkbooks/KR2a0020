  - {type: variant, offset: 944, length: 1, content: 遣, WYG: 後還長安廣川王畧延興二年封位中都大官性明敏鞫獄稱平太和四年薨諡曰莊子諧字仲和襲十九年薨詔曰朕宗室多故從弟諧䘮逝悲痛摧割不能已巳古者大臣之䘮有三臨之禮此蓋三公已上至於卿司已下故應闕自漢已降多無此禮朕欲遵古典哀感從情雖以尊降伏私痛寧爽欲令諸王有朞親者為之三臨大功之親者為之再臨小功緦麻為之一臨廣川王於朕大功必欲再臨再臨者欲於大殮之日親臨盡哀成服之後緦麻而弔既殯之緦麻理在無疑大殮之臨當否如何為須撫柩於始䘮為應盡哀於闔棺早晚之宜擇其厥中黄門侍郎崔光宋弁通直常侍劉芳典命下大夫李元凱中書侍郎高敏等議曰三臨之事乃自古禮爰及漢魏行之者稀陛下至聖慈仁方遵前軌志必哀䘮慮同寧戚臣等以為若朞親三臨大功宜再始䘮之初哀之至極既以情降宜從始䘮大殮之臨伏如聖㫖詔曰魏晉已來親臨多闕至於戚臣必於東堂哭之頃大司馬安定王薨朕既臨之後復更受慰於東堂今日之事應更哭否光等議曰東堂之哭蓋以不臨之故今陛下躬親撫視羣臣從駕臣等參議以為不宜復哭詔曰若大司馬戚尊位重必哭於東堂而廣川既是諸王之子又年位尚幼卿等議之朕無異焉諧}
