  - {type: variant, offset: 6057, length: 830, content: 便欲望風排抑然其當途以來何直退勳而已但是隨臣征者即便為所嫉統軍袁叔和曾經省訴徽初言有理又聞北征隸臣為統應時變色復令臣兄子仲顯異端訟臣緝緝翩翩謀相誹謗言臣惡者接以恩顏稱臣善者即被嫌責甄琛曾理臣屈乃視之若仇讎徐紇頗言臣短即待之如親戚又驃騎長史祖瑩昔在軍中妄增首級矯亂戎行蠹害軍府獲罪有司避命山澤直以謗臣之故徽乃還雪其罪臣府司馬劉敬比送降人既到定州翻然背叛賊如決河豈其能擁且以臣府參僚不免身首異處徽既怒遷捨其元惡闕及胥徒從臣行者莫不悚懼頃州之人乞臣為刺史徽乃斐然言不可測及降戶結謀臣頻表啟徽乃因執言此事及向定州遠彼姦惡又復論臣將有異志翻覆如此欲相陷沒致令國朝遽賜遷代賊起之由誰使然也徽既優幸任隆一世慕勢之徒於臣何有是故餘人攝選車馬填門及臣居邊賓遊罕至臣近比為慮其為梗是以孜孜乞赴京闕屬流人舉斧元戎垂翅復從後命自安無所僶俛先驅不敢辭事及臣出都行塵未滅已聞在後復生異議言臣將兒自隨證為可疑之兆忽稱此以構亂悠悠之人復傳音響言左軍臣融右軍臣衍皆受密敕伺察臣事徽既用心如此臣將何以自安竊以天步未夷國難猶梗方伯之任於斯為急徽昔臨藩乃有人譽及居端右蔑爾無聞今求出之為州使得申其利用徽若外從所長臣無內慮之切脫蒙闕公私幸甚深以兵士頻經退散人無鬬情連營轉柵日行十里行達交津隔水而陳賊脩禮常與葛榮謀後稍信朔州人毛普賢榮常銜之普賢昔為深統軍及在交津深使人諭之普賢乃有降意又使錄事參軍元晏說賊程殺鬼果相猜貳葛榮遂殺普賢脩禮而自立榮以新得大衆上下未安遂北度瀛州深便率衆北轉榮東攻章武王融戰敗於白牛邏深遂退走趨定州聞刺史楊津疑其有異志乃止於州南佛寺停三日夜乃召都督毛諡等六七人臂肩為約危難之際期相拯恤諡疑深意異乃密告津云深謀不軌津遣諡討深深走出諡叫噪追躡深與左右行至博陵郡界逢賊遊騎乃引詣葛榮賊徒見深頗有喜者榮新自立內惡之乃害深莊帝追復王爵贈司徒公諡曰忠武子湛字士深少有風尚莊帝初襲封孝靜初累遷冀州刺史所在聚斂風政不立入為侍中後行司州牧時齊獻武王作相以湛頗有器望啟超拜太尉公薨贈假黃鉞大司馬尚書令, WYG: ''}
