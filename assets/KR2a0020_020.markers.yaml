  - {type: variant, offset: 236, length: 157, content: 翰真君三年封秦王拜侍中中軍大將軍參典都曹事忠貞雅正百僚憚之太傅高允以翰年少作諸侯箴以遺之翰覽之大悅後鎮枹罕以信惠撫衆羌戎敬服改封東平王世祖崩諸大臣等議欲立翰而中常侍宗愛與翰不協矯太后令立南安王余遂殺翰子道符襲爵中軍大將軍顯祖踐阼拜長安鎮都大將皇興元年謀反司馬段太陽討斬之傳首京師臨淮王譚真君三年封燕王拜侍中參都曹事, WYG: ''}
