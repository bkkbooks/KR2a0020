  - {type: variant, offset: 4419, length: 276, content: 拜徐州刺史甚有威惠後封廣陽王以紹建後高祖南伐詔嘉斷均口嘉違失指授令賊得免帝怒責之曰叔祖定非世孫何太不上類也及將大漸遺詔以嘉為尚書左僕射與咸陽王禧等輔政遷司州牧嘉表請於京四面築坊三百二十各周一千二百步乞發三正復丁以充茲役雖有暫勞姦盜永止詔從之拜衞大將軍尚書令除儀同三司嘉好飲酒或沉醉在世宗前言笑自得無所顧忌帝以其屬尊年老常優容之與彭城北海高陽諸王每入宴集極歡彌夜數加賞賜帝亦時幸其第性好儀飾車服鮮華既居儀同又任端首出入容衞道路榮之後遷司空轉司徒嘉好立功名有益公私多所敷奏帝雅委付之愛敬人物後來才俊未為時知者侍坐之次轉加談引時人以此稱之薨遺命薄葬世宗悼惜之, WYG: ''}
