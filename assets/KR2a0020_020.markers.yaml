  - {type: variant, offset: 5303, length: 753, content: 此天下之事何易可量時不納其策東西部敕勒之叛朝議更思深言遣兼黃門侍郎酈道元為大使欲復鎮為州以順人望會六鎮盡叛不得施行深後上言今六鎮俱叛二部高車亦同惡黨以疲兵討之不必制敵請簡選兵或留守州要處更為後圖及李崇徵還深專總戎政拔陵避蠕蠕南移渡河先是別將李叔仁以拔陵來逼請求迎援深赴之前後降附二十萬人深與行臺元纂表求州北別立郡縣安置降戶隨宜賑賚息其亂心不從詔遣黃門郎楊昱分散之於冀定瀛三州就食深謂纂曰此輩復為乞活矣禍亂當由此作既而鮮于脩禮叛於定州杜洛周反於幽州其餘降戶猶在州遂欲推深為主深乃上書乞還京師令左衞將軍楊津代深為都督以深為侍中右衞將軍定州刺史時中山太守趙叔隆別駕崔融討賊失利臺使劉審考覈未訖會賊逼中山深乃令叔隆防境審馳驛還京云深擅相放縱城陽王徽與深有隙因此構之乃徵深為吏部尚書兼中領軍及深至都肅宗不欲使徽深相憾敕因宴會令相和解徽銜不已後河間王琛等為鮮于脩禮所敗乃除深儀同三司大都督章武王融為左都督裴衍為右都督並受深節度徽因奏靈太后構深曰廣陽以愛子握兵在外不可測也乃敕章武王等潛相防備融遂以敕示深深懼事無大小不敢自決靈太后聞之乃使問深意狀乃具言曰往者元叉執權移天徙日而徽託附無翼而飛今大明反政任寄唯重以徽褊心銜臣切骨臣以疏滯遠離京輦被其構阻無所不為然臣昔不在其後自此以來翻成陵谷徽遂一歲八遷位居宰相臣乃積年淹滯有功不錄自徽執政以來非但抑臣而已北征之勳皆被擁塞將士告捷終無片賞雖為表請多不蒙遂前留元標據于盛樂後被重圍析骸易子倒懸一隅嬰城二載賊散之後依階乞官徽乃盤退不允所請而徐州下邳戍主賈勳法僧叛後暫被圍逼固守之勳比之未重乃立得州即授開國天下之事其流一也功同賞異不平謂何又驃騎李崇北征之日啟募八州之人聽用關西之格及臣在後依此科賞復言北道征者不得同於關西定襄陵廟之至重平城守國之要鎮若計此而論功亦何負於秦楚但以嫉臣之, WYG: ''}
