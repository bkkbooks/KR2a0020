  - {type: variant, offset: 4023, length: 264, content: 命孚監儀注孚上表曰昔太和中中書監高閭太樂令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請別營造久而方就復召公卿量校合否論者沸騰莫有適從登被旨敕並見施用往歲大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前以來置宮懸四箱簨簴六架東北架編黃鍾之磬十四雖器名黃鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太蔟編於西北蕤賓列於西南並皆器象差位調律不和又有儀鍾十四虛懸架首初不叩擊今便刪廢以從正則臣今據周禮鳧氏修廣之規磬氏倨句之法吹律求聲叩鍾求音損除繁雜討論實錄依十二月為十二宮各準辰次當位懸設月聲既備隨用擊奏則會, WYG: 末䘮}
