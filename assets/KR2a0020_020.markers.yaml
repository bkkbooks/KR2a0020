  - {type: variant, offset: 1312, length: 2668, content: 金德將興宣王受寄自茲而降世秉威權景王意存毀冕文王心規裂冠雖祭則魏主而權歸晉室昆之與季實傾曹氏且子元宣王冢胤文王成其大業故晉武繼文祖宣景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典禘祫失序著譏前經高祖德溢寰中道超無肅祖雖勳格宇宙猶曾奉贄稱臣穆皇后稟德坤元復將配享乾位此乃君臣並筵嫂叔同室歷觀墳籍未有其事時莊帝意銳朝臣無敢言者唯彧與吏部尚書李神儁並有表聞詔報曰文穆皇帝勳格四表道邁百王是用考循舊軌恭上尊號王表云漢太上於香街南頓於舂陵漢高不因瓜瓞之緒光武又無世及之德皆身受符命不由父祖別廟異寢於理何差文穆皇帝天眷人宅歷數有歸朕忝承下武遂主神器既帝業有統漢氏非倫若以昔況今不當移寢則魏太祖晉景帝雖王跡已顯皆以人臣而終豈得與餘帝別廟有闕餘序漢郡國立廟者欲尊高祖之德使饗遍天下非關太廟神主獨在外祠薦漢宣之父亦非勳德所出雖不追尊不亦可乎伯考之名自是尊卑之稱何必準古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不得同室乎且晉文景共為一代議者云世限七主無定數昭穆既同明有共室之理禮既有祔嫂叔何嫌禮士祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毀莊帝既逼諸妹之請此辭意黃門侍郎常景中書侍郎邢子才所替成也又追尊兄彭城王為孝宣皇帝彧又面諫曰陛下中興意欲憲章前古作而不法後世何觀歷尋書籍未有其事願割友于之情使名器無爽帝不從及神主入廟復敕百官悉陪從一依乘輿之式彧上表以為爰自中古迄於下葉崇尚君親褒明功懿乃有皇號終無帝名今若去帝直留皇名求之古義少有依準又不納尒朱榮死除彧司徒公尒朱世隆率部北叛詔彧防河陰及尒朱兆率衆奄至彧出東掖門為賊所獲見兆辭色不屈為羣胡所毆薨出帝贈太師太尉公雍州刺史彧美風韻善進止衣冠之下雅有容則博覽羣書不為章句所著文藻雖多亡失猶有傳於世者然居官不能清白所進舉止於親婭為識者所譏無子弟孝友少有時譽襲爵淮陽王累遷滄州刺史為政溫和好行小惠不能清白而無所侵犯百姓亦以此便之孝靜帝宴齊文襄王於華林園孝友因醉自譽又云陛下許賜臣能帝笑曰朕聞王自道清文襄曰臨淮王雅旨舍罪於是君臣俱笑而不罪孝友明於政理嘗奏表曰令制百家為黨族二十家為閭五家為比隣百家之內有帥二十五徵發皆免苦樂不均羊少狼多復有蠶食此之為弊久矣京邑諸或七八百家唯一里正二史庶事無闕而況外州乎請依舊置三正之名不改而百家為四閭閭二比計族省十二丁得十二匹貲絹略計見管之戶應二萬餘族一歲出貲絹二十四萬匹十五丁出一番兵計得一萬六千兵此富國安人之道也古諸侯娶九女士有一妻二妾晉令諸王置妾八人郡公侯妾六人官品令第一第二品有四妾第三第四有三妾第五第六有二妾第七第八有一妾所以陰教聿修繼嗣有廣廣繼嗣孝也修陰教禮也而聖朝忽棄此數由來漸久將相多尚公主王侯亦娶后族故無妾媵習以為常婦人多幸生逢今世舉朝略是無妾天下殆皆一妻設令人強志廣娶則家道離索身事迍邅內外親知共相嗤怪凡今之人通無準節父母嫁女則教之以妒姑姊逢迎必相勸以忌持制夫為婦德以能妬為女工自云不受人欺畏他笑我王公猶自一心已下何敢二意夫妬忌之心生則妻妾之禮廢妻妾之禮廢則姦淫之兆興斯臣之所以毒恨者也請以王公第一品娶八通妻以備九女稱事二品備七三品四品備五五品六品則一妻二妾限以一周悉令充數若不充數及待妾非禮使妻妒加捶撻免所居官其妻無子而不娶妾斯則自絕無以血食祖父請科不孝之罪離遣其妻臣之赤心義唯家國欲使吉凶無不合禮貴賤各有其宜省人帥以出兵丁立倉儲以豐穀食設賞格以擒姦盜行典令以示朝章庶使足食足兵人信之矣又冒申妻妾之數正欲使王侯將相功臣子弟苗胤滿朝傳祚無窮此臣之志也詔付有司議奏不同孝友又言今人生為皁隸葬擬王侯存沒異途無復節制崇壯丘壠盛飾祭儀隣里相榮稱為至孝又夫婦之始王化所先共食合瓢足以成禮而今之富者彌奢同牢之設甚於祭槃累魚成山山有林木林木之上鸞鳳斯存徒有煩勞終成委棄仰惟天意其或不然請自茲以後若婚葬過禮者以違旨論官司不加糾劾即與同罪孝友在尹積年以法自守甚著聲稱然性無骨鯁善事權勢為正直者所譏齊受禪爵例降昌弟孚字秀和少有令譽侍中游肇并州刺史高聰司徒崔光等見孚咸曰此子當準的人物恨吾徒衰暮不及見耳累遷兼尚書右丞靈太后臨朝宦者干政孚乃總括古今名妃賢后凡為四卷奏之遷左丞蠕蠕王阿那瓌既得返國其人大飢相率入塞阿那瓌上表請臺賑給詔孚為北道行臺詣彼賑恤孚陳便宜表曰皮服之人未嘗粒食宜從俗因利拯其所無昔漢建武中單于款塞時轉河東米糒二萬五千斛牛羊三萬六千頭以給之斯即前代和戎撫新柔遠之長策也乞以牸牛產羊餬其口命且畜牧繁息是其所便毛血之利惠兼衣食又尚書奏云如其仍住七州隨置之臣謂人情戀本寧肯徙內若依臣請給賑雜畜愛本重鄉必還舊土如其不然禁留益損假令逼徙事非久計何者人面獸心去留難測既易水草痾恙將多憂愁致困死亡必甚兼其餘類尚在沙磧脫出狂勃翻歸舊巢必殘掠邑里遺毒百姓亂而方塞未若杜其未萌又貿遷起於上古交易行於中世漢與胡通亦立關巿今北人阻飢命懸溝壑公給之外必求巿易彼若願求宜見聽許又云營大者不計小名圖遠者弗拘近利雖戎狄衰盛歷代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下策昔在代京為重備將帥勞止甲士疲力前世苦之計未能致今天祚大魏亂亡在彼朝廷垂天覆之恩廓大造之德鳩其散亡禮送令返宜因此時善思遠策竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓款塞漢遣董忠韓昌領邊郡士馬送出朔方因留衞助又光武時亦令中郎將段彬置安集掾史隨單于所在參察動靜斯皆守吉之元龜安邊之勝策計今朝廷成功不減曩時蠕蠕國弊亦同疇日宜準昔成謨略依舊事借其所閑地聽使田牧粗置官屬示相慰撫嚴戒邊兵以見保衞馭以仁縻以久策使親不至矯詐疏不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也又云先人有奪人之心待降如受強敵武非專外亦以防內若從處分割配諸州鎮遼遠非轉輸可到悔叛之情變起難測又居人畜業布在原野戎夷性貪見則思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州內徙復不肯從既其如此為費必大朝廷不許孚持白虎幡勞阿那瓌於柔玄懷荒二鎮間阿那瓌衆號三十萬陰有異意遂拘留孚載以轀車日給酪一升肉一段每集其衆坐孚東廂稱為行臺甚加禮敬阿那瓌遂南過至舊京後遣孚等還因上表謝罪有司以孚事下廷尉丞高謙之云孚辱命處孚流罪後拜冀州刺史孚勸課農桑境內稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八家皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力後為葛榮所陷為榮所執兄祐為防城都督兄子子禮為錄事參軍榮欲先害子禮孚請先死以贖子禮叩頭流血榮乃捨之又大集將士議其死事孚兄弟各誣己引過爭相為死又孟都潘紹等數百人皆叩頭就法請活使君榮曰此魏之誠臣義士也凡同禁五百人皆得免榮平還除冀州刺史, WYG: ''}
