  - {type: variant, offset: 4939, length: 1, content: 永, krp: 馮翊吉翰以叟才士頗相禮接授叟末佐不稱其懐未㡬翰遷益州叟隨入蜀多為豪㒞所尚時蜀沙門法成鳩率僧旅㡬于千人鑄丈六金像劉義隆惡其聚衆將加大辟叟聞之即赴丹陽啟申其羙遂得免焉復還於蜀法成感之遺其珍物價直千餘匹叟謂法成曰緯蕭何人能棄明珠吾為徳請財何為也一無所受在益土五六載北至楊難當乃西入沮渠牧犍遇之不重叟亦本無附之之誠乃為詩示所知廣}
  - {type: variant, offset: 4941, length: 0, content: '', WYG: 程伯達其略曰羣犬吠新客佞闇排疎賔直途既以塞曲路非所遵望衛惋祝鮀眄楚悼靈均何用宣憂懐託翰寄輔仁伯達見詩謂叟曰凉州雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝鮀之有也叟曰古人有言君子聞鞞鼓之聲則思戰争之士貴主奉正朔而弗淳慕仁義而未允地陋僻而僭徽號居小事大寧若兹乎徐偃之轍故不旋踵矣吾之擇木夙在大魏與子暫違非久濶也嵗餘牧犍破降叟既先歸國朝廷以其識機拜虎威將軍賜爵始復男家於密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所栖謝其髙矣後叟被徴至謝恩并獻詩一篇髙宗時召叟及舒並使作檄劉駿蠕蠕文舒文劣於叟舒尋歸家叟不治産業常苦飢貧然不以為恥養子字螟蛉以自給養每至貴勝之門恒乗一牸牛敝韋袴褶而已作布囊容三}
  - {type: page-break, offset: 4941, content: '', id: KR2a0020_WYG_052-8a, image: WYG0261/WYG0261-0705c.png}
  - {type: page-break, offset: 4941, content: '', id: KR2a0020_WYG_052-8b, image: WYG0261/WYG0261-0705d.png}
  - {type: variant, offset: 4941, length: 0, content: '', krp: 程伯達其略曰羣犬吠新客佞闇排疎賔直途既以塞曲路非所遵望衛惋祝鮀眄楚悼靈均何用宣憂懐託翰寄輔仁伯達見詩謂叟曰凉州雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝鮀之有也叟曰古人有言君子聞鞞鼓之聲則思戰争之士貴主奉正朔而弗淳慕仁義而未允地陋僻而僭徽號居小事大寧若兹乎徐偃之轍故不旋踵矣吾之擇木夙在大魏與子暫違非久濶也嵗餘牧犍破降叟既先歸國朝廷以其識機拜虎威將軍賜爵始復男家於密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所栖謝其髙矣後叟被徴至謝恩并獻詩一篇髙宗時召叟及舒並使作檄劉駿蠕蠕文舒文劣於叟舒尋歸家叟不治産業常苦飢貧然不以為恥養子字螟蛉以自給養每至貴勝之門恒乗一牸牛敝韋袴褶而已作布囊容三}
  - {type: variant, offset: 4942, length: 0, content: '', WYG: 斗飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華者視之蔑如也尚書李敷嘗遺之以財都無所取初叟一見髙允曰吳鄭之交以紵縞為羙談吾之於子以弦韋為幽贄以此言之彼可無愧也於允館見中書侍郎趙郡李璨璨被服華靡叟貧老衣褐璨頗忽之叟謂之曰老子今若相許脱體上袴褶衣帽君欲作何計也譏其惟假盛服璨􅅥然失色叟少孤每言及父母則淚下若孺子之號春秋當祭之前則先求旨酒美膳將具所知廣寗常順陽馮翊田文宗上谷侯法儶擕壺執榼至郭外空静處設坐奠拜盡孝思之敬時敦煌汜潛家善釀酒每節送一壺與叟著作佐郎博陵許赤虎河東裴定宗等謂潛曰再三之恵以為過厚子恵於叟何其恒也潛曰我恒給祭者以其恒於孝思也論者以潜為君子矣順陽等數子禀叟奬示頗渉文流髙閭曽造其家值叟短褐曵柴從田歸舍為閭設濁酒䔫食皆手自辦集其館宇卑陋園疇褊局而飯菜精潔醯醬調羙見其二妾並}
