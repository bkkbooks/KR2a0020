  - {type: variant, offset: 5029, length: 0, content: '', WYG: 軍拜著作郎欽與髙允書曰昔皇綱未振華裔殊風九服分隔金蘭莫遂希懐寄契延想積久天遂其願爰遘京師才非季札而眷深孫喬徳乖程子而義均傾盖曠齡罕遇㑹之一朝比公私理異訓諮路塞端拱蓬宇歎慨如何不量鄙拙貢詩數韻若夫泉江相忘之談遺言存意之羙雖莊生之所尚非淺識所宜循愛敬既深情期往返思遲徳意以祛鄙吝若能紆鳯彩以燿榛薈廻連城以映瓦礫者是所望也詩曰嵬峩恒嶺滉瀁滄溟山挺其和水燿其精啟兹令族應期誕生華冠衆彦偉邁羣英其一於穆吾子含貞藉茂如彼松竹陵霜擢秀味老思冲翫易體復戢翼九臯聲溢宇宙其二我皇龍興重離疊映剛徳外彰柔明内鏡乾象奄氣坤厚山競風無殊音俗無異徑其三經緯曰文著述曰史斟酌九流錯綜幽㫖帝用詶諮明發虚擬廣闢四門披延髦}
