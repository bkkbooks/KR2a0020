  - {type: variant, offset: 4396, length: 238, content: 徵譴敢布庸瞽以陳萬一竊惟一夫之耕食裁充口一婦之織衣止蔽形年租歲調則惟常理此外徵求於何取足然自比年以來兵革屢動荊揚二州屯戍不息鍾離義陽師旅相繼兼荊蠻凶狡王師薄伐暴露原野經秋淹夏汝潁之地率戶從戎河冀之境連丁轉運又戰不必勝加之退負死喪離曠十室而九細役煩徭日月滋甚苛兵酷吏因逞威福至使通原遙畛田蕪罕耘連村接閈蠶飢莫食而監司因公以貪求豪強恃私而逼掠遂令鬻裋褐以益千金之資制口腹而充一朝之急此皆由牧守令長多失其人郡闕黃霸之君縣無魯恭之宰不思所以安民正思所以潤屋故士女呼嗟相望於道路守宰暴貪, WYG: ''}
