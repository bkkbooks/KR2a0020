  - {type: variant, offset: 3417, length: 625, content: 李神軌勢傾朝野求結婚姻義僖慮其必敗拒而不許王誦謂義僖曰昔人不以一女易五男卿豈易之也義僖曰所以不從正為此耳從之恐禍大而速誦乃堅握義僖之手曰我聞有命不敢以告人遂適他族臨婚之夕靈太后遣中常侍服景就家敕停內外惶怖義僖夷然自若建義初兼都官尚書尋除安東將軍衞尉卿普泰中除都官尚書加驃騎大將軍左光祿大夫義僖少時幽州頻遭水旱先有穀數萬石貸民義僖以年穀不熟乃燔其契州閭悅其恩德性寬和畏慎不妄交款與魏子建情好尤篤言無所隱義僖性清儉不營財利雖居顯位每至困乏麥飯蔬食忻然甘之永熙中風疾頓發興和中卒年六十四贈本將軍儀同三司瀛州刺史諡孝簡子遜之武定中太尉記室參軍遜之弟世猷齊王開府集曹參軍義僖弟義悰字叔預司空行參軍本州治中散騎侍郎司徒諮議參軍子孝章儀同開府行參軍早亡義悰弟義敦字季和征北府默曹參軍子景開字子達武定中儀同開府屬義敦弟義安字幼仁不仕義僖諸弟並遠不逮兄也敏弟昶字叔達小字師顏學涉經史早有時譽太和初為太子中舍人兼員外散騎常侍使於蕭昭業高祖詔昶曰卿便至彼勿存彼我密邇江揚不早當晚會是朕物卿等欲言便無相疑難又敕副使王清石曰卿莫以本是南人言語致慮若彼先有所知所識欲見便見須論即論盧昶正是寬柔君子無多文才或主客命卿作詩可率卿所知莫以昶不作便復罷也凡使人之體以和為貴勿遞相矜誇見於色貌失將命之體卿等各率所知以相規誨及昶至彼值蕭鸞僭立於是高祖南討之昶兄淵為別道將而蕭鸞以朝廷加兵遂酷遇昶等昶本非骨鯁聞南人云兄既作將弟為使者乃大恐怖淚汗交橫鸞以腐米臭魚莝豆供之而謁者張思寧辭氣謇諤曾不, WYG: 方回赫連}
