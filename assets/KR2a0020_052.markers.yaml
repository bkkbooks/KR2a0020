  - {type: variant, offset: 5023, length: 2, content: 戍主, WYG: 周滅妖姒羿䘮以田險詖蔽其耳目鄭衛陳於其前怙才肆虐異端是纒豈伊害身厥𦙍殱焉茫茫禹跡畫為九區昆蟲鳥獸各有巢居雲歌唐后垂横羙虞疎綱改祝殷道攸敷龍盤應徳隋地銜珠勿謂無心識命不殊勿謂理絶千載同符爰在子桓靈數攸臻儀形徐阮左右}
