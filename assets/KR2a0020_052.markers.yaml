  - {type: variant, offset: 5034, length: 2, content: 傳首, WYG: 瑀有女始笄妙選良偶有心於昞遂别設一席於坐前謂諸弟子曰吾有一女年向成長欲覔一快女壻誰坐此席者吾當婚焉昞遂奮衣來坐神志肅然曰向聞先生欲求快女壻昞其人也瑀遂以女妻之昞後隐居酒泉不應州郡之命弟子受業者五百餘人李暠私署徴為儒林祭酒從事中郎暠好尚文典書史穿落者親自補治昞時侍側前請代暠暠曰躬自執者欲人重此典籍吾與卿相值何異孔明之㑹元徳遷撫夷護軍雖有政務手不釋卷暠曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將}
