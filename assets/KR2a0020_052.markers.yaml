  - {type: variant, offset: 5031, length: 0, content: '', krp: 爾應其求翰飛東觀口吐瓊音手揮霄翰弹毫珠零落紙錦粲墳無疑割典無滯泮其五山降則謙含柔為信林崇日漸明升斯進有邈夫子兼兹四慎弱而難勝通而不峻其六南董邈矣史功不申固傾佞竇雄穢羙新遷以陵腐邕由卓泯時無逸勒路盈摧輪其七尹佚謨周孔明述魯抑揚羣致憲章三五昻昻髙生纂我遐武勿謂古今建規易矩其八自昔索居沉淪西藩風馬既殊標榜莫緣開通有運闇遇當年披衿暫面定交一言其九諮疑祕省訪滯京都水鏡叔度洗吝田蘇望儀神婉即象心虚悟言禮樂採研詩書其十履霜悼遷撫節感變嗟我年邁迅踰激電進乏由賜退非回憲素髪掩𤣥枯顔落蒨其十一文以㑹友友由知已詩以明言言以通理盻坎迷流覿良闇止伊爾虬光四鱗曲水其十二允答書曰頃因行李承足下髙問延佇之勞為日久矣王途一啟得叙其懐欣於相遇情無有已足下兼愛為心每能存顧養之以風味恵之以徳音執翫反覆銘於心抱吾少之尋常之操長無老成之致憑頼賢勝以自克勉而來喻襃飾有過其分既承雅贈即應有答但唱髙則難和理深則難詶所以留連日月以至於今今往詩一扃誠不足標明來㫖且表以心幸恕其鄙滯領其至意詩曰湯湯流漢藹藹南都載稱多士載耀靈珠邈矣髙族世記丹圖啟基郢城振彩凉區其一吾生朗到誕發英風紹熈前緒奕世克隆方圓備體淑徳斯融望傾羣儁響駭華戎其二響駭伊何金聲允著匡贊西藩拯厥時務肅志琴書恬心初素潛思淵渟秀藻雲布其三上天降命祚鍾有代協燿紫宸與乾作配仁邁春陽功隆覆載招延隐叟永貽大賚其四伊余櫟散才至庸㣲遭緣幸㑹忝與樞機竊名華省厠足丹墀愧無螢燭少益天暉其五明升非諭信漸難兼體卑處下豈曰能謙進不𢎞道退失淵潛既慙朱闕亦愧閭閻其六史班稱逹楊蔡致深負荷典䇿載蹈於心四轍同軌覆車相尋敬承嘉誨永佩明箴其七逺思古賢内尋諸已仰謝丘明長揖南史遐武雖存髙蹤難擬夙興夕惕豈獲恬止其八世之圯矣靈運未通風馬殊隔區域異封有懐西望路險莫從王澤逺灑九服來同其九在昔平吴二陸稱寳今也尅凉吾生獨矯道映儒林義為羣表我思與之均於紵縞其十仁乏田蘇量非叔度韓生屬降林宗仍顧千載曠遊遘兹一遇藻詠風流鄙心已悟其十一年時迅邁物我俱逝任之斯通擁之則滯結駟貽塵屢空亦敝兩間可守安有回賜其十二詩以言志志以表丹慨哉刎頸義已中殘雖曰不敏請事金蘭爾其勵之無忘嵗寒崔浩之誅也欽亦賜死欽在河西撰蒙遜記十卷無足可稱弟舒字景太䝉遜庫部郎中與兄同歸國賜爵句町男加威逺將軍名亞於兄子孫皆衰替叚承根武威姑臧人自云漢太尉熲九世孫也父暉字長祚身長八尺餘師事歐陽湯湯甚器愛之有一童子與暉同志後二年童子辭歸從暉請馬暉戲作木馬與之童子甚悦謝暉曰吾太山府君子奉勑遊學今將欲歸煩子厚贈無以報徳子後位至常伯封侯非報也且以為好言終乘木馬騰空而去暉乃自知必將貴也乞伏熾磐以暉為輔國大將軍凉州刺史御史大夫西海侯磐子暮末襲位國政衰亂暉父子奔吐谷渾暮璝暮璝内附暉與承根歸國世祖素聞其名頗重之以為上客後暉従世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市曝尸數日時有儒生京兆林白奴欽暉徳音夜竊其尸置之枯井女為敦煌張氏婦久而聞之乃向長安收𦵏承根好學機辯有文思而性行疎薄有始無終司徒崔浩見而竒之以為才堪注述言之世祖請為著作郎引與同事世咸重其文而薄其行甚為敦煌公李寳所敬待承根贈寳詩曰世道衰陵淳風殆緬衢交問鼎路盈訪瓕狥競爭馳天機莫踐不有真宰榛棘誰揃其一於皇我后重明襲煥文以息煩武以静亂剖蜯求珍搜巖采幹野無投綸朝盈逸翰其二自昔凉季林焚淵涸矯矯公子鱗羽靡託靈慧雖奮袄氛未廓鳯戢崐丘龍潛𤣥漠其三數不常擾艱極則夷奮翼幽裔翰飛京師珥蝉紫闥杖節方畿弼我王度庶績緝熈其四自余幽淪眷參舊契庶庇餘光優游卒嵗忻路未淹離轡已際顧難分岐載張載繼其五聞諸交舊累聖疊曜淳源雖漓民懐餘劭思樂哲人静以鎮躁藹彼繁音和此清調其六詢下曰文辨訐曰明化由禮治政以寛成勉崇仁敎播徳簡刑傾首景風遲聞休聲其七浩誅承根與宗欽等俱死承根外孫長水校尉南陽張令言羙鬚髯言談舉止有異武人李琰之李神儁一時名士並稱羙之闞駰字元隂敦煌人也祖倞有名於西土父玖為一時秀士官至㑹稽令駰博通經傳聰敏過人三史羣言經目則誦時人謂之宿讀注王朗易傳學者藉以通經撰十三州志行於世䝉遜甚重之常侍左右訪以政治損益拜秘書考課郎中給文吏三十人典校經籍刋定諸子三千餘卷加奉車都尉牧犍待之彌重拜大行遷尚書姑臧平樂平王丕鎮凉州引為從事中郎王薨之後還京師家甚貧敝不免飢寒性能多食一飯至三升乃飽卒無後劉昞字延明敦煌人也父寶字子玉以儒學稱昞年十四就博士郭瑀學時瑀弟子五百餘人通經業者八}
