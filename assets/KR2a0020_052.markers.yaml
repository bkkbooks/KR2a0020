  - {type: variant, offset: 4736, length: 151, content: 徵矣伏願陛下垂叡哲之鑒察妖災之起延對公卿廣詢庶政引見樞納博求民隱存問孤寡去其苛碎輕徭省賦與民休息貞良忠讜置之於朝姦回貪佞棄之於市則九官勿戒而敬百縣不嚴而自肅士女欣欣人有望矣詔曰朕纂承鴻緒伏膺寶曆思靖八方惠康四海當必世之期麟鳳不降屬勝殘之會白鼠告咎萬邦有罪實唯朕躬尚書敷納機猷獻替是寄讜言有聞朕實嘉美轉侍, WYG: 仕路遂入漢}
