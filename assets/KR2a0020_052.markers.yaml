  - {type: variant, offset: 2943, length: 0, content: '', WYG: 姜白龍據南城龍驤將軍泉建率土民北入桑坯姜脩又分軍據興勢龍驤將軍譚思文據夾石司州刺史王僧炳頓南安並扇動夷獠規翻南鄭遐率甲士九千所在衝擊數百里中莫不摧靡前後斬首五千餘級還以輔國將軍出為滎陽太守時蕭衍將馬仙琕率衆攻圍朐城戌主傅文驥嬰城固守以遐持節假平東將軍為别將與劉思祖等救之次於鮑口去朐城五十里夏雨頻降厲渉長驅將至朐城仙琕見遐營壘未就逕來逆戰思祖率彭沛之衆望陳奔退遐孤軍奮擊獨破仙琕斬其直閤將軍軍主李魯生直後軍主葛景羽等仙琕先分軍於朐城之西阻水列柵以圍固城遐身自潛行觀水深淺結草為筏銜枚夜進破其六柵遂解固城之圍進救朐城都督盧昶率大軍繼之未㡬而文驥力竭以城降賊衆軍大崩昶棄其節𫝊輕騎而走惟遐獨握節而還時仲冬寒盛兵士凍死者朐山至於郯城二百里間僵尸相屬昶儀衛失盡於郯城借假節以為軍威遐坐失利免官延昌中起為}
