  - {type: variant, offset: 5482, length: 688, content: 趙遐率勒見兵與之決勝遐慮衆少不敵若一舉失利則衆心挫怯求待大衆俱至奮銳擊之竊謂此謀非為孟浪且臣本奉朝規令相拒守以待涼月今歲已云秋高風漸舉經算大圖時事既至且鮑口以東陸運無閡朐固之間本無停潦宜時掩擊邊陲而賊自夏以來貫甲不歇從六里以北城柵相連役使兵人便已疲殆若大衆臨之必可禽捷一城退潰衆壘土崩乘勝圖之易於振朽脫兵不速至長彼熾心軍士憂惶自生異議請速簡配以及事機詔曰克獲朐山計本於昶乘勝之規終宜有寄是以起兵之始即委處分前機經略一以任之今既請兵理宜速遂可遣冀定瀛相四州中品羽林虎賁四千人赴之又詔昶曰朐山之克實由於卿開疆拓土實為長策然經討未服非卿而誰而蟻徒送死規侵王略天亡小賊數在無遠故前者命卿親臨指授尋以卿疾未瘳且待消息今既痊復宜遵前旨秉戈揮銳殄寇為懷已發虎旅五萬應機電赴指辰而至遂卿本請截彼東南亮委高算又詔昶曰取朐置戍並是卿計始終成敗悉歸於卿卿以兵少請益今已遂卿本意如聞東唐陸道甚狹一軌之外皆是大水彼必據之以斷軍路若已如此更設何策其軍奇兵變遽以表聞又聞衍軍將帥每有流言云魏博淮陽宿豫乃是兩宜若實有此卿可量朐山薪水得支幾時脫事容往返馳驛速聞如薪水少急即可量計若理不可爾亦將軍裁決昶既儒生本少將略又羊祉子燮為昶司馬專任戎事掩昶耳目將士怨之朐山戍主傅文驥糧樵俱罄以城降衍昶見城降於是先走退諸軍相尋奔遁遇大寒雪軍人凍死及落手足者三分而二自國家經略江左唯有中山王英敗於鍾離昶於朐山失利最為甚焉世宗遣黃門甄琛馳驛鎖昶窮其敗狀詔曰朐山之敗傷損實深推始究末罪鍾元帥雖經大宥輕重宜別昶一人可以免官論坐自餘將統以下悉聽依赦復任未幾拜太常卿仍除安西將軍雍州刺史又進號鎮西將軍加散騎常侍熙平元年卒於官贈征北將軍冀, WYG: 凉}
