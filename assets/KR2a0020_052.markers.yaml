  - {type: variant, offset: 5092, length: 0, content: '', WYG: 月致羊酒牧犍尊為國師親自致拜命官屬以下皆北面受業焉時同郡索敞隂興為助敎並以文學見舉每巾衣而入世祖平凉州士民東遷夙聞其名拜樂平王從事中郎世祖詔諸年七十以上聽留本鄉一子扶養昞時老矣在姑臧嵗餘思鄉而返至凉州西四百里韭本或作悲亦作匪谷窟遇疾而卒昞六子長子僧衍早亡次仲禮留鄉里次字仲次貳歸少歸仁並遷代京後分屬諸州為城民歸仁有二子長買奴次顯宗太和十四年尚書李冲奏昞河右碩儒今子孫沉屈未有禄潤賢者子孫宜䝉顯異於是除其一子為郢州雲陽令正光三年太保崔光奏曰臣聞太上立徳其次立功立言死而不朽前哲所尚思人愛樹自古稱羙故樂平王從事中郎敦煌劉昞著業凉城遺文兹在篇籍之羙頗足可觀如或愆釁當䝉數世之宥况乃維祖逮孫相去未逺而令久淪皂𨽻不獲收異儒學之士所為竊歎臣忝職史敢冐以聞奏乞敕尚書推檢所屬甄免碎役用廣聖朝旌善繼絶敦化厲俗於是乎在四年六月詔曰昞徳冠前世蔚為儒宗太保啟陳深合勸善其孫等三家特可聼免河西人以為榮趙柔字元順金城人也少以徳行才學知名河右沮渠牧犍時為金部郎世祖平凉州内徙京師髙宗踐祚拜為著作郎後以歴効有績出為河内太守甚著仁恵柔嘗在路得人所遺金珠一貫價直數百縑柔呼主還之後有人與柔鏵數百枚者柔與子善明鬻之於市有從柔買索絹二十匹有商人知其賤與柔三十匹善明欲取之柔曰與人交易一言}
