  - {type: variant, offset: 5026, length: 2, content: 晣并, WYG: 陳披文採友叩典問津用能重離襲曜魏鼎維新於昭儲后運應𤣥籙夕惕乾乾虚衿逺屬外撫幽荒内懐焭獨猶懼思不逮逺明不遐燭君有諍臣庭立謗木本枝克昌永符天禄微臣作箴敢告在僕世祖平凉州入國賜爵臥樹男加鷹揚}
