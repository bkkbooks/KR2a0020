  - {type: variant, offset: 4943, length: 3, content: 夏昶表, WYG: 衰跛𦕈衣布穿敝閭見其貧約以物直十餘匹贈之亦無辭愧閭作宣命賦叟為之序密雲左右皆祗仰其徳嵗時奉以麻布榖麥叟隨分散之家無餘財年八十而卒叟元妻敦煌宋氏先亡無子後庶養者亦皆早夭竟以絶後叟死無有家人營主凶事胡始昌迎而殯之于家𦵏於墓次即令一弟繼之襲其爵始復男虎威將軍叟與始昌雖為宗室而性氣殊詭不相好附於其存也往來乃簡及亡而收恤至厚議者以為非必敦哀疎宗或緣求利品秩也宋繇字體業敦煌人也曽祖配祖悌世仕張軌子孫父僚張𤣥靚龍驤將軍武興太守繇生而僚為張邕所誅五嵗䘮母事伯母張氏以孝聞八嵗而張氏卒居䘮過禮繇少而有志尚喟然謂妹夫張彦}
  - {type: page-break, offset: 4943, content: '', id: KR2a0020_WYG_052-10a, image: WYG0261/WYG0261-0706c.png}
