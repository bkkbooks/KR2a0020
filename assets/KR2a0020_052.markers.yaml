  - {type: variant, offset: 4939, length: 1, content: 永, WYG: 馮翊吉翰以叟才士頗相禮接授叟末佐不稱其懐未㡬翰遷益州叟隨入蜀多為豪㒞所尚時蜀沙門法成鳩率僧旅㡬于千人鑄丈六金像劉義隆惡其聚衆將加大辟叟聞之即赴丹陽啟申其羙遂得免焉復還於蜀法成感之遺其珍物價直千餘匹叟謂法成曰緯蕭何人能棄明珠吾為徳請財何為也一無所受在益土五六載北至楊難當乃西入沮渠牧犍遇之不重叟亦本無附之之誠乃為詩示所知廣}
