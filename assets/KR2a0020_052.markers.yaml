  - {type: variant, offset: 5020, length: 2, content: 帶朐, WYG: 子超尚書度支郎超弟稚字季預師事安邑李紹伯受諸經傳性清嚴治家如官府太和中拜司徒屬又以例降除西中府户曹參軍轉并州城陽王鸞城局參軍景明二年拜白水縣令在縣十一年頗得民和遷青州渤海太守正光三年卒子遊道武定末太尉長史張湛字子然一字仲元敦煌人魏執金吾恭九世孫也湛弱冠知名凉土好學能屬文冲素有大志仕沮渠蒙遜黄門侍郎兵部尚書凉州平入國年五十餘矣賜爵南浦男加寧逺將軍司徒崔浩識而禮之浩注易敘曰國家西平河右敦煌張湛金城宗欽武威叚承根三人皆儒者並有儁才見稱於西州每與余論易余以左氏傳卦解之遂相勸為注故因退朝之餘暇而為之解焉其見稱如此湛至京師家貧不粒操尚無虧浩常給其衣食每嵗贈浩詩頌浩常報答及浩被誅湛懼悉燒之兄懐義閑粹有才幹遭母憂哀毁過人服制雖除而䔫糲弗改卒于征西參軍長子廣平髙平令宗欽字景若金城人也父夑字文友吕光太常卿欽少而好學有儒者之風博綜羣言聲著河右仕沮渠蒙遜為中書郎世子洗馬欽上東宫侍臣箴曰恢恢𤣥古悠悠生民五才迭用經叙彛倫匡父維子弼君伊臣顛而能扶屈而能申昔在上聖妙鑒厥趣不曰我明而乖其度不曰我新而忽其故如彼在泉臨深是懼如彼覆車望途改歩是以令問宣流英風逺布及於三季道喪純遷桀起瓊臺紂醊糟}
