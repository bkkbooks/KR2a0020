  - {type: variant, offset: 595, length: 1082, content: 識者所非淵字伯源小名陽烏性溫雅寡欲有袓父之風敦尚學業閨門和睦襲侯爵拜主客令典屬國遷祕書令始平王師以例降爵為伯給事黃門侍郎遷兼散騎常侍祕書監本州大中正是時高祖將立馮后方集朝臣議之高祖先謂淵曰卿意以為何如對曰此自古所慎如臣愚意宜更簡卜高祖曰以先后之姪朕意已定淵曰雖奉敕如此然於臣心實有未盡及朝臣集議執意如前馮誕有盛寵深以為恨淵不以介懷及高祖議伐蕭賾淵表曰臣誠識不周覽頗尋篇籍自魏晉以前承平之世未有皇輿親御六軍決勝行陳之間者勝不足為武弗勝有虧威德明千鈞之弩不為鼷鼠發機故也昔魏武以弊卒一萬而袁紹土崩謝玄以步兵三千而苻堅瓦解勝負不由衆寡成敗在於須臾若用田豐之謀則坐制孟德矣魏既并蜀迄于晉世吳介有江水居其上流大小勢殊德政理絕然猶君臣協謀垂數十載逮孫皓暴戾上下攜爽水陸俱進一舉始克今蕭氏以篡殺之燼政虐役繁又支屬相屠人神同棄吳會之民延踵皇澤正是齊軌之期一同之會若大駕南巡必左袵革面閩越倒戈其猶運山壓卵有征無戰然愚謂萬乘親戎轉漕難繼千里饋糧士有飢色大軍之後必有凶年不若命將簡銳盪滌江右然後鳴鸞巡省告成東岳則天下幸甚率土戴賴臣又聞流言關右之民自比年以來競設齋會假稱豪貴以相扇惑顯然於衆坐之中以謗朝廷無上之心莫此之甚愚謂宜速懲絕戮其魁帥不爾懼成黃巾赤眉之禍育其微萌不芟之毫末斧斤一加恐蹈害者衆臣世奉皇家義均休戚誠知干忤之愆實深然不忠之罪莫大詔曰至德雖一樹功多途三聖殊文五帝異律或張或弛豈必相因遠惟承平之主所主不親旆五戎者蓋有由矣英明之主或以同軌無征守庸之君或緣志劣寢伐今若喻之英皇時非昔類比之庸后意有恧焉脫元極之尊本不宜駕二公之徒革輅之戎寧非謬歟尋夫昔人若必須己而濟世豈不克廣先業也定火之雄未聞不武世袓之行匪皆疑懾且曹操勝袁蓋由德義內舉苻堅瓦解當緣立政未至定非弊卒之力強十萬之衆寡也今則驅馳先天之術駕用仁義之師審觀成敗庶免斯咎長江之阻未足可憚踰紀之略何必可師洞庭彭蠡竟非殷固奮臂一呼或成漢業經略之義當付之臨機足食之籌望寄之蕭相將希混一豈好輕動利見之事何得委人也又水旱之運未必由兵堯湯之難詎因興旅頗豐之後雖靜有之關左小紛已敕禁勒流言之細曷足以紆天功深錄誠心勿恨不相遂耳及車駕南伐趙郡王幹督關右諸軍事詔加淵使持節安南將軍為副勒衆七萬將出子午尋以蕭賾死停師是時涇州羌叛殘破城邑淵以步騎六千衆號三萬徐行而進未經三旬賊衆逃散降者數萬口唯梟首惡餘悉不問詔兼侍中初淵年十四嘗詣長安將還諸相餞送者五十餘人別於渭北有相者扶風人王伯達曰諸君皆不如此盧郎雖位不副實然德聲甚盛望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言平生未幾拜儀曹尚書高祖考課在位降淵以王師守常侍尚書奪常侍祿一周尋除, WYG: ''}
