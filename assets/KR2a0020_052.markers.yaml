  - {type: variant, offset: 4947, length: 6, content: 蕭衍琅邪郡民, WYG: 門戸傾覆負荷在繇不銜膽自厲何以繼承先業遂隨彦至酒泉追師就學閉室誦書晝夜不倦博通經史諸子羣言靡不覽綜吕光時舉秀才除郎中後奔叚業業拜繇中散常侍繇以業無經濟逺略西奔李暠歴位通顯家無餘財雅好儒學雖在兵難之間講誦不廢每聞儒士在門常倒屣出迎停寝政事引談經籍尤眀斷决時事亦無滯也沮渠蒙遜平酒泉於繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜剋李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任蒙遜之將死也以子牧犍委託之牧犍以繇為左丞送其妹興平公主於京師世祖拜繇為河西}
