  - {type: variant, offset: 5093, length: 112, content: 即據城詔昶曰彭宋地接邊疆勢連淮海威禦之術功在不易朐山險塞寇之要防水陸交湊揚郁路衝畜聚凶徒虔劉邊鄙青光齊兗每罹其患卿妙算既敷克城殄衆展疆闢土何善如之庸勳之懋朕用嘉止故遣左右直長閻遵業具宣往懷此戍郁洲之本存亡所繫今既失守有不存之, WYG: 定豈可以利動}
