  - {type: variant, offset: 427, length: 718, content: 陽招誘邊民康生復為統軍從王肅討之進圍其城鸞將張伏護自昇城樓言辭不遜肅令康生射之以強弓大箭望樓射窗扉開即入應箭而斃彼民見箭皆云狂弩以殺伏護賞帛一千匹又頻戰再退其軍賞三階帛五百匹蕭寶卷將裴叔業率衆圍渦陽欲解義陽之急詔遣高聰等四軍往援之後遣都督廣陵侯元衍並皆敗退時刺史孟表頻啟告高祖敕肅遣康生馳往赴援一戰大破之賞二階帛一千匹及壽春來降也遣康生領羽林一千人給龍馬兩匹馳赴壽春既入其城命集城內舊老宣詔撫賚俄而蕭寶卷將桓和頓軍梁城陳伯之據女完石民心駭動頗有異謀康生乃防禦內外音信不通固城一月援軍乃至康生出擊桓和伯之等二軍並破走之拔梁城合肥洛口三戍以功遷征虜將軍封安武縣開國男食邑二百戶出為南青州刺史後蕭衍郁洲遣軍主徐濟寇邊康生率將出討破之生擒濟賞帛千匹時蕭衍聞康生能引強弓力至十餘石故特作大弓兩張送與康生康生得弓便會集文武乃用平射猶有餘力其弓長八尺把中圍尺二寸箭粗殆如今之長笛觀者以為希世絕倫弓即表送置之武庫又蕭衍遣將宋黑率衆寇擾彭城時康生遭母憂詔起為別將持節假平南將軍領南青州諸軍擊走之後衍復遣都督臨川王蕭宏副將張惠紹勒甲十萬規寇徐州又假宋黑徐州刺史領衆二萬水陸俱進徑圍高塚戍詔授康生武衞將軍持節假平南將軍為別將領羽林三千人騎步甲士隨便割配康生一戰敗之還京召見宴會賞帛千匹賜驊騮御胡馬一匹出為平西將軍華州刺史頗有聲績轉涇州刺史仍本將軍以輒用官炭瓦為御史所劾削除官爵尋旨復之蕭衍直閤將軍徐玄明戍於郁洲殺其刺史張稷以城內附詔遣康生迎接賜細御銀槊一張并棗柰果面敕曰果者果如朕心棗者早遂朕意未發之間郁洲復叛時揚州別駕裴絢謀反除康生平東將軍為別將領羽林四千討之會事平不行遭父憂起為平西將軍西中郎將是歲大舉征蜀假康生安西將軍領步騎三萬邪趣緜竹至隴右世宗崩班師, WYG: 初}
