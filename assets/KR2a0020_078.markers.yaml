  - {type: variant, offset: 1954, length: 2, content: 來未, WYG: 爲美況今旱酷異常聖慈降膳乃以萬五千人使楊鈞爲將而欲定蠕蠕忤時而動其可濟乎阿那瓌投命皇朝撫之可也豈容困疲我兆民以資天喪之虜昔莊公納子糾以致乾時之敗魯僖以邾國而}
