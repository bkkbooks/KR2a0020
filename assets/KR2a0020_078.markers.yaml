  - {type: variant, offset: 1957, length: 3, content: 逸材若, krp: 懸胄之耻今蠕蠕時亂後主繼立雖云散亡姦虞難抑脱有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年饑饉相仍湏其自弊小亡大傷然後一舉而并之}
  - {type: variant, offset: 1961, length: 0, content: '', WYG: 卞氏之高略所以獲兩虎不可不圖之今土山告難簡書相續蓋亦無能爲也正與今舉相會天其或者欲以告戒人不欲使南北兩疆竝興大衆脱狂狡搆閒於其間而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此㣲臣所以寒心}
  - {type: variant, offset: 1961, length: 0, content: '', krp: 卞氏之高略所以獲兩虎不可不圖之今土山告難簡書相續蓋亦無能爲也正與今舉相會天其或者欲以告戒人不欲使南北兩疆竝興大衆脱狂狡搆閒於其間而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此㣲臣所以寒心}
