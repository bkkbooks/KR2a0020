  - {type: variant, offset: 2238, length: 247, content: 大眼為武衞將軍假平南將軍持節都督統軍曹敬邴虬樊魯等諸軍討茂先等大破之斬衍輔國將軍王花龍驤將軍申天化俘馘七千有餘衍又遣其舅張惠紹總率衆軍竊據宿豫又假大眼平東將軍為別將與都督邢巒討破之遂乘勝長驅與中山王英同圍鍾離大眼軍城東守淮橋東西二道屬水汎長大眼所綰統軍劉神符公孫祉兩軍夜中爭橋奔退大眼不能禁相尋而走坐徙為營州兵永平中世宗追其前勳起為試守中山內史時高肇征蜀世宗慮蕭衍侵軼徐揚乃徵大眼為太尉長史持節假平南將軍東征別將隸都督元遙遏禦淮肥大眼至京師時人思其雄勇喜其更用臺省閭巷觀者如巿大眼次譙南世宗崩時, WYG: 爲便}
