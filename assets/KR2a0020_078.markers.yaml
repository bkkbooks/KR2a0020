  - {type: variant, offset: 1950, length: 0, content: '', WYG: 卿云興滅國繼絶世滅國絶世竟復誰是普惠曰昔淮南逆終漢文封其四子蓋骨肉之不可棄親親故也竊見故太尉咸陽王冀州刺史京兆王乃皇子皇孫一德之虧}
  - {type: variant, offset: 1950, length: 0, content: '', krp: 卿云興滅國繼絶世滅國絶世竟復誰是普惠曰昔淮南逆終漢文封其四子蓋骨肉之不可棄親親故也竊見故太尉咸陽王冀州刺史京兆王乃皇子皇孫一德之虧}
  - {type: variant, offset: 1951, length: 0, content: '', WYG: 貽悔戾沉淪幽壤􅃡焉弗收豈是興滅繼絶之意乞收葬二王封其子孫愚臣之願太后曰卿言有理朕深戢之當命公卿博議此事及任城王澄薨普惠以吏民之義又荷其恩待朔望奔赴至於禪除雖寒暑風雨無不必至初澄嘉賞普惠臨薨啓爲尚書右丞靈太后既深悼澄覽啓從之詔行之後尚書諸郎以普惠地寒不應便居管轄相與爲約竝欲不放上省紛紜多日乃息正光二年詔遣楊鈞送蠕蠕主阿那瓌還國普惠謂遣之將貽後患上疏曰臣聞乾元以利貞爲大非義則不動皇王以博施爲功非類則不從故能始萬物而化天下者也伏惟陛下叡哲欽明道光虞舜八表宅心九服清晏蠕蠕相害於朔垂妖師扇亂於江外此乃封豕長虵不識王度天將悔其罪所以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以悦其志恭已以懐其心而先自勞擾艱難下民興師郊甸之内逺投荒塞之外救累世之勍敵可謂無名之師諺曰唯亂門之無過愚情未見其可當是邊將窺竊一時之功不思兵爲凶器不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆横行匈奴中季布以爲不可請斬之}
  - {type: page-break, offset: 1951, content: '', id: KR2a0020_WYG_078-22b, image: WYG0262/WYG0262-0170b.png}
  - {type: page-break, offset: 1951, content: '', id: KR2a0020_WYG_078-23a, image: WYG0262/WYG0262-0170c.png}
