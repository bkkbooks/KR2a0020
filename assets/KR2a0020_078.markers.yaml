  - {type: variant, offset: 1913, length: 0, content: '', WYG: 父者有德可稱太上者上中之上名同義異此亦非竝亮又曰古有文王武王亦有文子武子然則太上皇太上公亦何嫌于同也普惠對曰文武者徳行之迹故迹同則諡同太上者尊極之位豈得通施於臣下廷尉少卿袁飜曰周官上公九命上大夫四命命數雖殊同名爲上何必上者皆是極尊普惠厲聲訶飜曰禮有下卿上士何止大夫與公但今所行以太加上二名雙舉不得非極雕蟲小藝微或相許至於此處豈卿所及飜甚有慙色黙不復言任城王澄曰諫諍之體各言所見至於用捨固在應時卿向荅袁氏聲何太厲普惠對曰所言若是宜見採用所言若非懼有罪及是非湏辨非爲茍競澄曰朝廷方開不諱之門以廣忠言之路卿今意在向義何云乃慮罪罰議者咸以太后當朝志相黨順遂奏曰張普惠辭雖不屈然非臣等所同渙汗已流請依前詔太后復遣元义賈璨宣令謂普惠曰朕向召卿與羣臣對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道羣公已有成議卿不得苦奪朕懐後有所見勿得難言普惠於是拜令辭還初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖涕泣普惠謂曰我當休明之朝掌諌議之職若不言所難言諫所難諌便是唯唯曠官尸禄人生有死死得其所夫復何恨然朝廷有道汝軰勿憂及議罷㫖勞還宅親故賀其幸甚時中山莊弼遺}
