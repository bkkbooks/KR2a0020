  - {type: variant, offset: 3297, length: 297, content: 並十餘道橫水為橋兩頭施大轆轤出沒任情不可燒斫既斷祖悅等走路又令舟舸不通由是衍軍不能赴救祖悅合軍咸見俘虜於軍拜平南將軍光祿大夫延伯與楊大眼等至自淮陽靈太后幸西林園引見延伯等太后曰卿等志尚雄猛皆國之名將比平峽石公私慶快此乃卿等之功也但淮堰仍在宜須豫謀故引卿等親共量算各出一圖以為後計大眼對曰臣輒謂水陸二道一時俱下往無不克延伯曰臣今輒難大眼既對聖顏答旨宜實水南水北各有溝瀆陸地之計如何可前愚臣短見願聖心愍水兵之勤苦給復一年專習水戰脫有不虞召便可用往無不獲靈太后曰卿之所言深是宜要當敕如請二年除安北將軍并州刺史在州貪汙聞於遠近還為金紫光祿大夫出為鎮南將軍行岐州刺史假征西將軍賜驊騮馬一匹正光五年秋以往在, WYG: 榮儁弟龍子}
