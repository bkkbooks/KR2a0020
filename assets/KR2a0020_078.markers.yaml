  - {type: variant, offset: 1914, length: 0, content: '', WYG: 普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使羣后逡廵庶竂拱黙雖}
  - {type: variant, offset: 1914, length: 0, content: '', krp: 普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使羣后逡廵庶竂拱黙雖}
  - {type: variant, offset: 1916, length: 0, content: '', WYG: 用於一時固已傳美於百代聞風快然敬裁此白普惠美其此書每爲口實普惠以天下民調幅度長廣尚書計奏復徵綿麻恐其勞民不堪命上疏曰伏聞尚書奏復綿麻之調尊先皇之軌夙宵惟度忻戰交集何者聞復髙祖舊典所以忻惟新俱可復而不復所以戰違法仰惟髙祖廢大斗去長尺改重秤所以愛萬姓從薄賦}
