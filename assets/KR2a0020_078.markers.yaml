  - {type: 'tls:seg', offset: 1963, content: '', id: KR2a0020_ZHSJ_078-d78p18s24}
  - {type: variant, offset: 1963, length: 0, content: '', WYG: 那瓌之不還負何信義此機之際北師宜停臣言不及義文書所經過不敢不陳兵猶火也不戢將自焚二虜自滅之形可以爲殷鑒伏願輯和萬國以静四疆混一之期坐而自至矣臣愚昧多違必無可採匹夫之智願以呈獻表奏詔答曰夫窮鳥歸人尚或興惻況那瓌嬰禍流離逺來依庇在情在國何容弗矜且納亡興喪有國大義皇魏堂堂寧廢斯德後主亂亡似當非謬此送彼迎想無拒戰國義宜表朝筭已決卿深誠厚慮朕用嘉戢但此叚機略不獲相從脱後不逮勿憚匡言時蕭衍義州刺史文僧明舉城歸順揚州刺史長孫稚遣别駕封夀入城固守衍將裴邃湛僧率衆攻逼詔普惠爲持節東道行臺攝軍司赴援之軍始度淮而封夀已棄城單馬而退軍罷還朝蕭衍弟子西豐侯正德詐稱降欵朝廷頗事當迎普惠上疏請赴揚州移還蕭氏不從俄而正德果逃還涼州刺史石士基行臺元洪超竝贓貨被繩以普惠爲右將軍涼州刺史即爲西行臺以病辭免除光禄大夫右丞如故先是仇池武興羣氐數反西垂郡戍租運乆絶詔普惠以本官爲持節西道行臺給秦歧涇華雍豳東秦七州兵武三萬人任其召發送南秦東益二州兵租分付諸戍其所部將統聴於關西牧守之中隨機召遣軍資板印之屬悉以自隨普惠至南秦停歧涇華雍豳東秦六州兵武召秦州兵武四千人分配四統令送租兵連營接柵相繼而進運租車驢隨機輸轉别遣中散大夫封答慰喻南秦員外常侍楊公熙宜勞東益氐民於時南秦氐豪呉富聚合兇類所在邀劫公熙既至東益州刺史魏子建密與普惠書言公熙舊是蕃國之𦙍而諸氐與相見者必有隂私言宜加圖防普惠乃符攝公熙令赴南秦公熙果已密遣其從兄山虎與呉富同逆又妄自説鄉里紛動羣氐託云與崔南秦有隙拒而不赴租達平落呉富等果愶車營實公熙所潛遣也後呉富雖爲左右所殺而後黨猶盛秦闕所綰武都武階租頗得達東益羣氐先欵順故廣業仇鳩河池三城粟便得入其應入東益十萬石租皆稽留費盡升斗不至鎮戍兵武}
  - {type: page-break, offset: 1963, content: '', id: KR2a0020_WYG_078-24b, image: WYG0262/WYG0262-0171b.png}
