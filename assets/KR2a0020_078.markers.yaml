  - {type: variant, offset: 1906, length: 5, content: 沖弗許大眼, WYG: 仰思所難竊謂非匹澄曰前代太后亦有稱詔聖母自欲存謙光之義故不稱耳何得以詔令之别而廢嚴父之孝對曰后父太上自昔未有前代母后豈不欲尊崇其親王何以不逺謨古義而近順今㫖未審太后何故謙於稱詔而不謙於太上竊願聖后終其謙光太傅清河王懌曰昔在僭晉禇氏臨朝殷浩遺禇裒書曰足下今之太上皇也況太上公而致疑對曰禇裒以女輔政辭不入朝淵源譏其不恭故有太上之刺本稱其非不記其是不謂殿下以此賜難侍中崔光曰張生表中引晉有小子侯出自鄭注非爲正經對曰雖非正經之文然述正經之㫖公好古習禮復固斯難御史中尉元匡因謂崔光曰張表云晉之小子侯以號同稱僭今者太上公名同太上皇比晉小子義似相類但不學不敢辨其是非普惠對曰中丞既疑其是不正其非豈所望於三獨尚書崔亮曰諌議所見正以太上之號不應施於人臣然周有太公尚父亦兼二名人臣尊重之稱固知非始今日普惠對}
