  - {type: variant, offset: 4127, length: 330, content: 暫來挑戰大兵未交便示奔北延伯矜功負勝遂唱議先驅伐木別造大排內為鎖柱教習強兵負而趨走號為排城戰士在外輜重居中自涇州緣原北上衆軍將出討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師寶夤延伯謂其事實逡巡未閱俄而宿勤明達率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯上馬突陳賊勢摧挫便爾逐北徑造其營賊本輕騎延伯軍兼步卒兵力疲怠賊乃乘間得入排城延伯軍遂大敗死傷者將有二萬寶夤斂軍退保涇州延伯修繕器械購募驍勇復從涇州西進去賊彭抗谷柵七里結營延伯前挫辱不報寶夤獨出襲賊大破之俄頃間平其數柵賊皆逃遁見兵人採掠散亂不整還來衝突遂大奔敗延伯中流矢為賊所害士卒死者萬餘人延伯善將撫能得衆心與康生大眼為諸將之冠延伯末路功名尤重時大寇未平而延伯死朝野歎懼焉贈使持節車騎大將軍儀同三司定州剌, WYG: 府長}
