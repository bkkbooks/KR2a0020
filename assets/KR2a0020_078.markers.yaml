  - {type: variant, offset: 1816, length: 1, content: 青, WYG: 水縣令隨父之縣受業齊土專心墳典剋厲不息及還鄉里就程元講習精於三禮兼善春秋百家之説多所窺覽諸儒稱之太和十九年爲主書帶制局監與劉桃符石榮劉道斌同員共直頗爲髙祖所知轉尚書都令史任城王澄重其學業爲其聲價僕射李沖曾至澄處見普惠言論亦善之世宗初轉積射將軍澄爲安西將軍雍}
