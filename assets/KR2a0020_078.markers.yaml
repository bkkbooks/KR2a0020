  - {type: variant, offset: 1896, length: 5, content: 沖典選征官, WYG: 韶奏普惠有文學依才優之例宜特顯叙勑除寧逺將軍司空倉曹參軍朝議以不降階爲榮時任城王澄爲司空表議書記多出普惠廣陵王恭北海王顥疑爲所生祖母服朞與三年博士執意不同詔羣寮㑹議普惠議曰謹按二王祖母皆受命先朝爲二國太妃可謂受命於天子爲始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云}
