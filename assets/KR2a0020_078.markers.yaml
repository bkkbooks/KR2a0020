  - {type: variant, offset: 1922, length: 1, content: 技, WYG: 歳之用使天下知二聖之心愛民惜法如此則高祖之軌中興於神龜明明慈信照布於無窮則孰不幸甚伏願亮臣悾悾之至下慰蒼生之心普惠又表乞朝直之日時聴奉見自此之後月一陛見又以肅宗不親視朝過崇佛法郊廟之事多委有司上疏曰臣聞明德卹祀成湯光六百之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之㝠業捐巨費於生民減禄削力近供無事之僧崇飾雲殿逺邀未然之報昧爽之臣稽首於外𤣥寂之衆遨遊於内愆禮忤時人靈未穆愚謂從朝夕之因求秖刼之果未若先萬國之忻心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之䖍親紆朔望之禮釋奠成均竭心千畆明發不寐潔誠禋祼孝悌可以通神明德敎可以光四海則一人有喜兆民頼之然後精進三寶信心如來道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官乆折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經逺言多孟浪忝職其憂不敢黙爾尋别勑付外議釋奠之禮時史官剋日蝕豫勑罷朝普惠以逆廢非禮上疏陳之又表論時政得失一曰審法度平斗尺調租務輕賦役務省二曰聴輿言察怨訟先皇舊事有不}
