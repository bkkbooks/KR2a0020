  - {type: variant, offset: 2961, length: 253, content: 元始懷孕自指其腹謂甑生等曰開國當我兒襲之汝等婢子勿有所望甑生深以為恨及大眼喪將還京出城東七里營車而宿夜二更甑生等開大眼棺延寶怪而問之征南射殺之元怖走入水征南又彎弓射之甑生曰天下豈有害母之人乃止遂取大眼屍令人馬上抱之左右扶挾以叛荊人畏甑生等驍勇不敢苦追奔於襄陽遂歸蕭衍崔延伯博陵人也祖壽於彭城陷入江南延伯有氣力少以勇壯聞仕蕭賾為緣淮遊軍帶濠口戍主太和中入國高祖深嘉之常為統帥膽氣絕人兼有謀略所在征討咸立戰功積勞稍進除征虜將軍荊州刺史賜爵定陵男荊州土險蠻左為寇每有聚結延伯輒自討之莫不摧殄由是穰土帖然無敢為患永, WYG: 年五十八贈}
