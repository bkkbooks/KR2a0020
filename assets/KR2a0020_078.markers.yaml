  - {type: variant, offset: 1917, length: 1, content: 聽, WYG: 軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上税綿八兩布上税麻十五斤萬姓得廢大斗去長尺改重秤荷輕賦之饒不適於綿麻而已故歌舞以供其職奔走以役其勤天子信於上億兆樂於}
  - {type: variant, offset: 1917, length: 1, content: 聽, krp: 軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上税綿八兩布上税麻十五斤萬姓得廢大斗去長尺改重秤荷輕賦之饒不適於綿麻而已故歌舞以供其職奔走以役其勤天子信於上億兆樂於}
  - {type: variant, offset: 1919, length: 0, content: '', WYG: 故易曰悦以使民民忘其勞此之謂也自兹以降漸漸長闊百姓嗟􅀢聞於朝野伏惟皇太后未臨朝之前陛下居諒闇之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長秤重斗大革其所獘存其可存而特放綿麻之調以悦天下之心此所謂悦之不以道愚臣所以未悦者也尚書既知國少綿麻不惟法度之闕字易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而羣}
  - {type: page-break, offset: 1919, content: '', id: KR2a0020_WYG_078-18b, image: WYG0262/WYG0262-0168b.png}
  - {type: variant, offset: 1919, length: 0, content: '', krp: 故易曰悦以使民民忘其勞此之謂也自兹以降漸漸長闊百姓嗟􅀢聞於朝野伏惟皇太后未臨朝之前陛下居諒闇之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長秤重斗大革其所獘存其可存而特放綿麻之調以悦天下之心此所謂悦之不以道愚臣所以未悦者也尚書既知國少綿麻不惟法度之闕字易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而羣}
  - {type: variant, offset: 1920, length: 0, content: '', WYG: 共竊之愚臣以爲於理未盡何者今宫人請調度造衣物必度忖秤量絹布疋有尺丈之盈一猶不計其廣絲綿斤兼百銖之剰未聞依律罪州郡若一疋之濫一斤之惡則鞕户主連三長此所以敎民以貪者也今百官請俸人樂長闊并欲厚重無復凖極得長闊厚重者便云其州能調絹布精闊且長横發美譽以亂視聴不聞嫌長惡廣求計還官者此百司所以仰負聖明也今若必復綿麻者謂宜先令四海知其所由明立嚴禁復本幅度新綿麻之典依太和之税其在庫絹布并及絲綿不依典制者請遣一尚書與太府卿左右藏令依今官度官秤計其斤兩廣長折給請俸之人總常俸之數千俸所}
  - {type: page-break, offset: 1920, content: '', id: KR2a0020_WYG_078-19a, image: WYG0262/WYG0262-0168c.png}
