  - {type: variant, offset: 1902, length: 2, content: 眼往, WYG: 夫之妾子父在爲母大功則士之妾子爲母朞父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命爲之三年況天子命其子爲列國王命其所生母爲國太妃反自同公子爲母練冠之與大功乎輕重顛倒不可之甚者也𫝊曰始封之君不臣諸父昆弟則當服其親服若魯衞列國相爲服朞判無疑矣何以明之喪服君爲姑姉妹女子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相爲服不可還凖公子逺厭天王故降有四品君大夫以尊降公子大夫之子以厭降名例不同何可亂也禮大夫之妾子以父命慈己申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之高據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻爲其皇姑公子雖厭妻尚獲申況廣陵北海論封則封君之子語妃則命妃之孫承妃纂重逺别先皇更以先后之正統厭其所生之祖嫡方之皇姑不以遥乎今既許其申服而復限之以朞比之慈母不亦爽歟經曰爲君之祖父母父母妻長子傳曰何以朞父母長子君服斬妻則小君父卒然後爲祖後者服斬今祖乃獻文皇帝諸侯不得祖之母爲太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或逺且天子尊則配天莫非臣妾何爲命之爲國母而不聼子服其親乎記曰從服者所從亡則已又曰不爲君母之黨服則爲其母之黨服今所從既亡不以親服服其所生則屬從之服於何所施若以諸王入爲公卿便同大夫者則當今之議皆不湏以國爲言也今之諸王自同列國雖不之國别置臣寮玉食一方不得以諸侯言之敢據周禮輙同三年當時議者亦有同異國子博士李郁於議罷之後書難普惠普惠據禮還荅鄭重三返郁議遂屈轉諌議大夫澄謂普惠曰不喜君得諌議唯喜諌議得君時靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號詣闕上疏陳其不可左右畏懼莫敢爲通會聞胡家穿壙下墳有磐石乃密表曰臣聞優名寶位王者之所光錫尊君愛親臣子所以慎終必使勲績相侔號秩相可然後能顯揚當時𫝊徽萬代者矣竊見故侍中司徒胡公懐道含靈實誕聖后載育至尊母儀四海近樞克惟允之寄居槐體論道之明故以功餘九錫褒假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未𠂻何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可竝大禮記曰天無二日土無二王嘗禘郊社尊無二上明君臣不可竝上伏見詔書以司徒爲太上秦公夫人爲太上秦君夫人䝉號於前司徒繫之於後尊光之美盛矣竊惟高祖受禪於獻文皇帝故仰尊爲太上皇此因上上而生名也皇太后稱令以繫勑下蓋取三從之道逺同文母列於十亂則司徒之爲太上恐乖繫勑之意春秋傳曰葬稱公臣子辭明不可復加上也書曰兹予大饗于先王爾祖其從與饗之司徒位尊屬重必當配饗先朝稱太上以爲臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晉有小子侯尚曰僭之於天子司徒三公也其可同號於帝乎孔子曰必也正名名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又曰困於上者必反於下故受之以井比剋吉定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啓聖情伏願聖后回日月之明察㣲臣之請停司徒逼同之號從卑下不踰之稱畏困上之鑒邀謙光之福則天下幸甚臣聞見災修德災變成善此太戊所以興殷桑穀以之自滅況今卜遷方始當修革之會愚以爲無上之名不可假之脱譏於千載恐貽不言之咎且君之於臣比葬三臨之禮也司徒誠爲后父實人臣也雖子尊不加於父乃天下母以義斷恩不可遂在室之意故曰女子有行逺父母兄弟況乃應坤之載承天之重而朔望於司徒之殯晨昬於郊墓之間雖聖思蒸蒸其不虞宜戒離宸極之嚴居疲雲蹕於道路此亦億兆蒼生瞻仰失圖伏願尋載馳之不歸存静方之光大則草木可繁人靈斯穆臣職忝諌司敢獻狂瞽謹冒上聞不敢宣露乞垂省覽昭臣微款脱得奉謁聖顔曲盡愚𠂻者死且不朽太后覽表親至國珍宅召集王公入座卿尹及五品已上博議其事遣使召普惠與相問荅又令侍中元义中常侍賈璨監觀得失任城王澄問普惠曰漢高作帝尊父爲太上皇今聖母臨朝贈父太上公}
