  - {type: variant, offset: 35, length: 3, content: 為部落, WYG: 道形自安洿隆獲𠂻權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令竝議律尋施行令獨不出十餘年矣臣以令之爲體即帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要乃是有爲之樞機世法之}
