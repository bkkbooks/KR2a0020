  - {type: variant, offset: 2009, length: 5, content: 征宛葉穰鄧, WYG: 本意仍彼㫖可差謬之來亦已甚矣遂使勲親懐屈幽顯同寃紛訟彌年莫之能息臣輙逺研㫖格深窮其事世變減奪今古無據又尋詔書稱昔未可采今始列璧疑豈得混一内分乆近也故樂良樂安同蕃異封廣陽安豐屬則户等安定之嫡邑齊親王河間戚近更從蕃食是乃太和降㫖初封之倫級勲親兼樹非世減之大驗者也博陵襲爵亦在太和之年時不世減以父嘗全食足户充本同之始封減從今式如此則減者減其所足之外足者足其所減之内減足之㫖乃爲所貢所食耳欲使諸王開國弗專其民賦役之差貴賤有等蓋凖擬周禮公侯伯子男貢税之法王食其半公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減户故始封承襲俱稱所減謂減之以貢食謂食之於國斯實高祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差㫖又判之以開訓所減之㫖可以不疑於世減矣而臣肇弗稽往事曰五等有所減之格用爲世減之法以王封有親踈之等謂是代削之條妄解成㫖雷同世奪以此毒天下民其從乎故太傅任城文宣王臣澄樞弼累朝識洞今古爲尚書之日殷勤執請孜孜於重議被㫖不許於此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曽𤣥不治未恤嫡封則爵禄無窮枝庶則屬内貶絶儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其寃七廟之孫竝訟其切陳訴之案盈於省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦}
