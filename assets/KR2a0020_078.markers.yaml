  - {type: variant, offset: 1928, length: 4, content: 丈許繫髻, WYG: 曰進忠謇退不肖任賢勿貳去邪勿疑四曰興滅國繼絶世勲親之𦙍所宜收敘書奏肅宗靈太后引普惠於宣光殿隨事難詰延對移時令曰寧有先皇之詔一一飜改普惠僶俛不言令曰卿似欲致諌故以左右有人不肯苦言朕爲卿屏左右卿其盡陳之對曰聖人之飬庶物愛之如傷況今二聖纂承洪緒妻承夫子承父夫父之不可安然仍行豈先帝𫝊委之本意仰惟先帝行事或有司之謬或權時所行在後以爲不可者皆追}
