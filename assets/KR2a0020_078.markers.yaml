  - {type: variant, offset: 2021, length: 3, content: 經戰陳, WYG: 以克慎不敢侮於鰥寡而況於公侯伯子男乎今㫖訪寃滯愚以此爲大者求尋光錫之詔并諸條格所奪所請事事窮審諸王開國非犯罪削奪者竝求還復其昔嘗全食足户充本減從令式者從前則力多於親懿全奪則減足之格不行愚謂禄力竝應依所之食而食之若是則力少蕃王粟帛仍本户邑雖盈之減兩秦既有全食足户之異故不得同於新封之力耳親恤所裒請依律斷伏惟親親尊賢位必功立尊賢以司民可不慎乎親親以牧族其可棄乎如脱䝉允求以㫖判爲始其前來吏秩悉年乆不追臣又聞明德慎罰文王所以造周咸有一德殷湯所以革夏故能上令下從風動草偃畏之如雷電敬之如明神是以天子家天下綏萬國若天之無不覆地之無不載遷都之構庶方子來汎澤所沾降及陪皂寜有岳牧二千石縣令丞尉治中别駕及諸軍幢受命於朝廷而可不預乎此之班駮雲雨之不平謂是當時有司出納之未允何以明之仰尋世宗詔書百官普進一級中有朝臣刺史登時褒授則内外貴賤}
