  - {type: variant, offset: 1816, length: 1, content: 青, krp: 水縣令隨父之縣受業齊土專心墳典剋厲不息及還鄉里就程元講習精於三禮兼善春秋百家之説多所窺覽諸儒稱之太和十九年爲主書帶制局監與劉桃符石榮劉道斌同員共直頗爲髙祖所知轉尚書都令史任城王澄重其學業爲其聲價僕射李沖曾至澄處見普惠言論亦善之世宗初轉積射將軍澄爲安西將軍雍}
  - {type: variant, offset: 1818, length: 0, content: '', WYG: 刺史啓普惠爲府録事參軍尋行馮翊郡事澄功衰在身欲於七月七日集會文武北園馬射普惠奏記於澄曰竊聞三殺九親别踈昵之叙五服六術等衰麻之心皆因事飾情不易之道者也然則莫大之痛深於終身之外書䇿之哀除於喪紀之内外者不可無節故斷之以三年内者不可遂除故敦之以日月禮太練之日鼓素琴蓋推以即吉也小功以上非虞祔練除不沐浴此拘之以制也曽子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人祭既不與疑無宴食之道又曰廢喪服可以與於饋奠之事乎子曰脱衰與奠非禮也注云爲其忘哀疾愚謂除喪之始不與饋奠小功之内其可觀射乎雜記云大功以下既葬適人人食之其黨也食之非黨也不食食猶擇人於射爲惑伏見明敎立射會之限將以二七令辰集城中文武肄武藝於北園行揖讓於中否時非大閲之秋景涉妨農之節國家縞禫甫除殿下功衰仍襲釋而爲樂以訓百姓便是易先王之典敎忘哀戚之情恐非所以昭令德視子孫者也按射儀射者以禮樂爲本忘而從事不可謂禮鍾鼓弗設不可謂樂捨此二者何用射爲又七日之戲令制無之班勞所施慮違事體庫府空虛宜待新調二三之趣停之爲便乞至九月備飾盡行然後奏狸首之章宣矍相之令聲軒懸建雲鉦神民忻暢於斯時也伏惟慈明逺被萬民是望舉動所書發言唯則願更廣訪賜垂曲採昭其管見之心恕其讜言之責則芻蕘無遺歌輿人有獻誦矣澄意納其言託辭自罷乃荅曰文武之道自昔成規明耻敎戰振古常軌今雖非公制而此州承前已有斯式既不勞民損公任其私射復何失也且纂文習武人之常藝豈可於常藝之間要湏令制乎比適欲依前州府相率王務之暇肄藝良辰亦未言費用庫物也禮兄弟内除明哀已殺小功客至主不絶樂聴樂則可觀武豈傷直自事縁湏罷先以令停方獲此請深具來意澄轉揚州啓普惠以羽林監領鎮南大將軍}
