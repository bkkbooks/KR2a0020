  - {type: variant, offset: 1314, length: 375, content: 三月肅宗朝靈太后于西林園文武侍坐酒酣迭舞次至康生康生乃為力士舞及於折旋每顧視太后舉手蹈足瞋目頷首為殺縛之勢太后解其意而不敢言日暮太后欲攜肅宗宿宣光殿侯剛曰至尊已朝訖嬪御在南何勞留宿康生曰至尊陛下兒隨陛下將東西更復訪問誰羣臣莫敢應靈太后自起援肅宗臂下堂而去康生大呼唱萬歲於後近侍皆唱萬歲肅宗引前入閤左右競相排閤不得閉康生奪其子難千牛刀斫直後元思輔乃得定肅宗既上殿康生時有酒勢將出處分遂為叉所執鎖於門下至曉叉不出令侍中黃門僕射尚書等十餘人就康生所訊其事處康生斬刑難處絞刑叉與剛並在內矯詔決之康生如奏難恕死從流難哭拜辭父康生忻子免死又亦慷慨了不悲泣語其子云我不反死汝何為哭也有司驅逼奔走赴巿時已昏闇行刑人注刀數下不死於地刻截咸言禀叉意旨過至苦痛嘗食典御奚混與康生同執刀入內亦就巿絞刑康生久為將及臨州尹多所殺戮而乃信向佛道數捨其居宅以立寺塔凡歷四州皆有建置死, WYG: 卒}
