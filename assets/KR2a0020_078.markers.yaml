  - {type: variant, offset: 1957, length: 3, content: 逸材若, WYG: 懸胄之耻今蠕蠕時亂後主繼立雖云散亡姦虞難抑脱有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年饑饉相仍湏其自弊小亡大傷然後一舉而并之}
