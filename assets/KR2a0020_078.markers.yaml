  - {type: variant, offset: 1822, length: 0, content: '', WYG: 尋加威逺將軍普惠既爲澄所知歴佐二藩甚有聲譽旋京之日装束藍縷澄賚絹二十匹以充行資還朝仍羽林監又澄遭太妃憂臣寮爲立碑頌題碑欲云康王元妃之碑澄訪於普惠荅曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以别名位且以氏配姓愚以爲在生之稱故春秋夫人姜氏至自}
  - {type: page-break, offset: 1822, content: '', id: KR2a0020_WYG_078-9a, image: WYG0262/WYG0262-0163c.png}
  - {type: variant, offset: 1822, length: 0, content: '', krp: 尋加威逺將軍普惠既爲澄所知歴佐二藩甚有聲譽旋京之日装束藍縷澄賚絹二十匹以充行資還朝仍羽林監又澄遭太妃憂臣寮爲立碑頌題碑欲云康王元妃之碑澄訪於普惠荅曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以别名位且以氏配姓愚以爲在生之稱故春秋夫人姜氏至自}
  - {type: variant, offset: 1823, length: 4, content: 受禪爵例, WYG: 既葬以諡配姓故經書葬我小君文姜氏又曰來歸夫人成風之禭皆以諡配姓古者婦人從夫諡今烈懿太妃德冠一世故特䝉褒錫乃萬代之高事豈容於定名之重而不稱烈懿乎澄從之及王師大舉重征鍾離普惠爲安樂王詮别將長史班師除揚烈將軍相州安北府司馬遷步兵校尉後以本官領河南尹丞世宗崩坐與甄楷等飲酒遊從免官驍騎將軍刁整家有舊訓將營儉葬普惠以爲矯時太甚與整書論之事在刁雍𫝊故事免官者三載之後}
