  - {type: variant, offset: 3596, length: 530, content: 建淮橋之勳封當利縣開國男食邑二百戶尋增邑一百戶改封新豐進爵為子時莫折念生兄天生下隴東寇征西將軍元志為天生所擒賊衆甚盛進屯黑水詔延伯為使持節征西將軍西道都督與行臺蕭寶夤討之寶夤與延伯結壘馬嵬南北相去百餘步寶夤日集督將論討賊方略延伯每云賊新制勝難與爭鋒寶夤正色責之曰君荷國寵靈總戎出討便是安危所繫每云賊不可討以示怯懦損威挫氣乃君之罪延伯明晨詣寶夤自謝仍云今當仰為明公參賊勇怯延伯選精兵數千下渡黑水列陳西進以向賊營寶夤率衆於水東尋原西北以示後繼於時賊衆大盛水西一里營營連接延伯徑至賊壘揚威脅之徐而還退賊以延伯衆少開營競追衆過十倍臨水逼蹙寶夤親觀之懼有虧損延伯不與其戰身自殿後抽衆東渡轉運如神須臾濟盡徐乃自渡賊徒奪氣相率還營寶夤大悅謂官屬曰崔公古之關張也今年何患不制賊延伯馳見寶夤曰此賊非老奴敵公但坐看後日延伯勒衆而出寶夤為後拒天生悉衆來戰延伯申令將士身先士卒陷其前鋒於是勇銳競進大破之俘斬十餘萬追奔及於小隴秦賊勁強諸將所憚朝廷初議遣將咸云非延伯無以定之果能克敵授右衞將軍於時万俟醜奴宿勤明達等寇掠涇川先是盧祖遷伊生數將等皆以元志前行之始同時發雍從六陌道將取高平志敗仍停涇部延伯既破秦賊乃與寶夤率衆會於安定甲卒十二萬鐵馬八千匹軍威甚盛醜奴置營涇州西北七十里當原城時或輕, WYG: 驃}
