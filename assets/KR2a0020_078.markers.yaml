  - {type: variant, offset: 2029, length: 0, content: '', WYG: 年三年之考以意折之汎前汎後之歳隔而絶之遂使如綸之㫖頓於一朝汎前六年上第者全不得汎三年上第者蒙半階而已汎前汎後合考者隔絶而不得無考者無折而全汎前汎後有考無考竝䝉全汎與否乖違勤舊彌屈差若毫釐謬以千里其此之謂乎易曰言行君子之所以動天下可不慎歟言之不從無以抑之遂奏奪牧守外禄全不與汎散官改爲四年之考汎前者八年一階政令不一寃訟惟甚與而復奪其本在兹致使邀駕擊鼓者無理以加其罪誹謗公聴者無辭以抑其言噂􅊱所由生慢悖所由起夫琴瑟不調澆而更張善人國之本也其可棄乎詩云樂只君子邦家之基堯典曰克明俊德呂刑曰何擇非人周官曰官弗必備惟其人咎繇曰無曠庶官天工人其代之詩云人之云亡邦國殄悴又曰雨我公田遂及我私孔子曰不患貧而患不均如此則官必擇人汎則宜溥請逺遵正始元㫖近凖聖明二汎内外百官悉同一階不以汎前折考不以散任增年則同雲共澍四海均洽如謂未可宜以權理折之易曰聖人之大寶曰位何以守位曰仁春秋傳曰一曰擇人如此則乃可無汎不可無考守宰之汎既以追奪則百官之汎不應獨霑溥澤既收復誰敢怨夫三載之考興於太和再周之陟通於景明閑劇禄力自有加減陪臣以事省降而考則三年朝官既禄等平曹更四周乃陟考禄參差各稱其枉且一日從}
