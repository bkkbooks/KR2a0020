  - {type: variant, offset: 11, length: 0, content: '', WYG: 六孫紹張普惠孫紹字世慶昌黎人世仕慕容氏祖志入國卒於濟陽太守乆恊字文和上黨太守紹少好學通渉經史頗有文才隂陽術數多所貫渉初爲校書郎稍遷給事中自長兼羽林監爲門下録事朝廷大事好言得失遂爲世知曾著釋典論雖不具美時有可存與常景等共修律令延昌中紹表曰臣聞建國有計雖危必安施化能和雖寡必盛治乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也伏惟大魏應天明命兆啓無窮必世後仁祚隆七百今二虢京門了無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領護分事之式徵兵儲粟之要舟車水陸之資山河要害之權緩急去來之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懐怨中正賣望於下里主案舞筆於上臺真僞混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭奄殊類應同役而苦樂懸異士人居職不以爲榮兵士役苦心不忘亂故有競棄本生飄藏他土或詭名託飬散在人間或亡命山藪漁獵爲命或投仗彊豪寄命衣食又應遷之戸逐樂諸州應留之徒避寒歸暖兼職人子弟隨逐浮遊南北東西卜居莫定闗禁不修任意取適如此之徒不可勝數爪牙不復爲用百工爭棄其業混}
