  - {type: variant, offset: 2549, length: 0, content: '', krp: 款屬路並申以婚好行李如歸蠕蠕境斜界黄河望通豳夏飛雪千里層氷洞積北風轉勁實䈥角之時沍寒方猛正氈裘之利吐谷渾疾彼凶逆彊兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方侯隙企其移踵加以獨孤如願擁衆秦中治兵劫愶黒獺北備西擬内營腹心救首救尾疲於奔命豈暇稱兵東指出師函谷且秋風揚塵國有恒防闗河形勝之際山川襟帶之所猛将精兵基跱岳立又寳炬河隂之北黒獺亡山之走衆無一旅僅以身歸就其不顧根本輕懐進趣斯則一勞永逸天賛我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虚誕夫景䋲樞席牖之子阡陌鄙俚之夫遭風塵之會逄馳騖之日遂位在三吏邑啟千社揣身量分久當止足而乃周章去就離跂不已夫豈徒爾事可㩁揚度其衆叛親離守死不暇乃}
