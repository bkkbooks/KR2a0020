  - {type: variant, offset: 2558, length: 5, content: 平昌縣開國, WYG: 銀百两綱出太極殿因西北風而颺之頻放數鵄景令走馬射取之竟不能達也衍城内大饑人相食米一斗八十萬皆以人肉雜牛馬而賣之軍人共於徳陽堂前立市屠一牛得絹三千匹賣一狗得錢二十萬皆燻䑕捕雀而食之至是雀䑕皆盡死者相枕初有盗取其池魚者衍猶大怒勑付廷尉既而宿昔都盡其不識事宜如此景久攻未拔而衍外援雖多各各乖張無有總制更相妬忌不肯奮擊唯衍}
