  - {type: variant, offset: 332, length: 0, content: '', krp: 省昭業疑畏使虎賁中郎将潘淑領百人屯太極殿西階以防之大斂之始呼賾伎人備舉衆樂諸伎雖畏威從事莫不哽咽流涕及成服悉遣諸王還第子良固乞留過賾葬不許昭業素好狗馬立未十日便毁賾所起招婉殿以殿材乞閹人徐龍駒造宅於其處為馬埓馳走墜馬面額並傷稱疾不出者數日多聚名鷹快犬以粱肉奉之賾将葬喪車未出端門昭業便稱疾還内裁入閤便於内奏胡伎鞞鐸之聲震響内外時司空王敬則問射聲校尉蕭坦之曰便如此不當忽忽邪坦之曰此政當是内人哭聲響徹耳自賾葬後昭業微服而出遊走里市又多往其父母陵隧中與羣小共作鄙藝擲塗賭跳放鷹走狗諸雜狡獪日日輙往以此為常朝事大小皆斷於尚書}
  - {type: variant, offset: 333, length: 3, content: 高允念, WYG: 蕭鸞初蕭賾聚錢上庫至五億萬齋庫亦出三億萬金銀布帛絲綿不可稱計至此歲末所用過半皆賜與左右厮卒之徒及至廢黜府庫空盡昭業在内常著紫綿紅繡雜衣或錦帽改年為隆昌以黄門郎周奉叔為冠軍将軍青州刺史奉叔諂䛕為事昭業甚悦之而專恣跋扈無所忌惮常從單刀二十口出入禁闥門衛莫敢訶止毎語人云周郎刀不識君徐龍駒自東宫齋師以便佞見寵搆造姦邪以取容媚凡諸鄙黷雜事皆龍駒所勸誘也昭業為龍駒置美女伎樂常住含章殿著黄綸帽被貂裘南面向案代昭業畫勑左右侍直與昭業不異蕭鸞固請誅之楊珉及母亦並下獄死珉及母為昭業所寵恩情特隆賞賜傾府藏珉為何氏所幸常居中内侍蕭鸞初令衛尉蕭諶征北諮議蕭坦之請誅珉何氏與昭業同席坐流涕覆面謂坦之曰楊郎好年少無罪何可枉殺坦之乃耳語於昭業曰此事别有一意不可令人聞昭業呼何氏曰阿奴暫起去坦之乃曰外間並云楊珉與皇后有情聞彰遐邇此事自古所無恐必誤官事昭業不得已乃許之俄勑原之已行刑矣益州刺史劉悛罷任還昭業以}
  - {type: page-break, offset: 333, content: '', id: KR2a0020_WYG_098-9a, image: WYG0262/WYG0262-0421c.png}
  - {type: page-break, offset: 333, content: '', id: KR2a0020_WYG_098-9b, image: WYG0262/WYG0262-0421d.png}
