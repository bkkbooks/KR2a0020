  - {type: variant, offset: 1186, length: 969, content: 孫氏男玉者夫為靈縣民所殺追執讎人男玉欲自殺之其弟止而不聽男玉曰女人出適以夫為天當親自復雪云何假人之手遂以杖毆殺之有司處死以聞顯祖詔曰男玉重節輕身以義犯法緣情定罪理在可原其特恕之清河房愛親妻崔氏者同郡崔元孫之女性嚴明高尚歷覽書傳多所聞知子景伯景先崔氏親授經義學行修明並為當世名士景伯為清河太守每有疑獄常先請焉貝丘民列子不孝吏欲案之景伯為之悲傷入白其母母曰吾聞聞不如見山民未見禮教何足責哉但呼其母來吾與之同居其子置汝左右令其見汝事吾或應自改景伯遂召其母崔氏處之於榻與之共食景伯之溫凊其子侍立堂下未及旬日悔過求還崔氏曰此雖顏慚未知心愧且可置之凡經二十餘日其子叩頭流血其母涕泣乞還然後聽之終以孝聞其識度厲物如此竟以壽終涇州貞女兕先氏許嫁彭老生為妻娉幣既畢未及成禮兕先率行貞淑居貧常自舂汲以養父母老生輒往逼之女曰與君禮命雖畢二門多故未及相見何由不禀父母擅見陵辱若苟行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死謂老生曰生身何罪與君相遇我所以執節自固者寧更有所邀正欲奉給君耳今反為君所殺若魂靈有知自當相報言終而絕老生持女珠瓔至其叔宅以告叔叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑原其強暴便可戮之而女守禮履節沒身不改雖處草萊行合古跡宜賜美名以顯風操其標墓旌善號曰貞女姚氏婦楊氏者閹人苻承祖姨也家貧無產業及承祖為文明太后所寵貴親姻皆求利潤唯楊獨不欲常謂其姊曰姊雖有一時之榮不若妹有無憂之樂姊每遺其衣服多不受強與之則云我夫家世貧好衣美服則使人不安與之奴婢則云我家無食不能供給終不肯受著破衣自執勞事時受其衣服多不著密埋之設有著者污之而後服承祖每見其寒悴深恨其母謂不供給之乃啟其母曰今承祖一身何所乏少而使姨如是母具以語之承祖乃遣人乘車往迎之則厲志不起遣人強舁於車上則大哭言爾欲殺我也由是苻家內外皆號為癡姨及承祖敗有司執其二姨至殿庭一姨致法以姚氏婦衣裳弊陋特免其罪其識機雖呂嬃亦不過也滎陽京縣人張洪初妻劉氏年十七夫亡遺腹生子三歲又沒其舅姑年老朝夕奉養率禮無違兄矜其少寡欲奪而嫁之劉氏自誓弗許以終其身陳留董景起妻張氏景起早亡張時年十六痛夫少喪哀傷過禮形容毀頓永不沐浴蔬食長齋又無兒息獨守貞操期以闔棺鄉曲高之終見標異漁陽太守陽尼妻高氏勃海人學識有文才高祖敕令入侍後宮幽后表啟悉其辭也滎陽史映周妻同郡耿氏女年十七適於映周, WYG: ''}
