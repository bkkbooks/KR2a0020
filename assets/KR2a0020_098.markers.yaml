  - {type: variant, offset: 2544, length: 1, content: 歎, WYG: 遣息敬紹率衆大敗之擒斬三千人休儒等遁走四月衍益州刺史蕭潤猷遣将樊文熾等率衆圍小劍戍益州刺史邴虬遣子子達行臺魏子建遣别将淳于誕拒擊之五月誕等大破文熾俘斬二萬擒其次将蕭世隆等十二人文熾走免是歲衍又改年為大通二年七月衍将元樹湛僧珍等冦壽春又攻逼新野詔都督魏承祖討破之三年二月衍将成景儁冦彭城行臺崔孝芬率諸将擊走之建義元年衍遣其将曹義宗冦荆州大都督費穆大破之生擒義宗檻送京師初爾朱榮入洛北海王顥奔於衍衍以顥為魏主資顥士馬令其大将陳慶之部率送顥永安二年夏遂入洛陽車駕還討破走之唯慶之一身走免自餘部衆皆見俘執閏月巴州刺史嚴始欣據州入衍衍遣将蕭玩張鴻等率衆赴援都督元景夏率益梁二州軍討之三年正月斬始欣衍衆敗走又斬蕭玩等首俘獲萬餘人普泰元年春南青州刺史茹懐朗遣部将何寳率歩騎三千擊衍守将於琅邪擒其雲麾将軍徐兗二州刺史沈預斬其宣猛将軍齊州刺史劉相如永熈元年夏衍遣其鄴王元樹及譙州刺史朱文開入據譙城東南道行臺樊子鵠率諸軍攻克之擒元樹文開等送於京師天平元年十月衍雄信将軍紀耕率衆入冦􅀈嵣都督曹仲尼破走之斬其軍主沈達閔荘等二年正月衍将湛僧珍冦南兗州州軍擊破之行臺元晏又破湛僧珍等於項城虜其闕二字刺史楊㬓二月衍司州刺史陳慶之郢州刺史田朴特等冦邉豫州刺史堯雄擊走之五月衍仁州刺史黄道始冦北濟隂徐州刺史任祥討破之十月衍将梁秉儁冦單父祥又大敗之俘斬萬餘人十一月衍雍州刺史蕭恭遣将栁仲禮冦荆州刺史王元軌破之於牛飲斬其将張殖王世興是年衍又改號為中大通三年五月豫州刺史堯雄攻衍白茍堆鎮克之擒其北平太守茍元曠十月行臺侯景攻䧟衍楚城獲其楚州刺史桓和兄弟四年九月衍青冀二州刺史徐子彦冦圉城南青州刺史陸景元擊走之先是益州刺史傅和以城降衍衍資送和令申意於齊獻武王求通交好王志綏邉逺乃請許之四年冬衍遣其散騎常侍張臯通直常侍劉孝儀通直常侍崔曉朝貢二年夏又遣散騎常侍沈山卿通直常侍劉研朝貢興和二年春又遣散騎常侍桞豹通直常侍劉景彦朝貢其年冬又遣散騎常侍陸晏子通直常侍沈景徽朝貢是年衍改號大同三年夏又遣散騎常侍明少遐通直郎謝藻朝貢四年春又遣散騎常侍袁狎通直常侍賀文發朝貢其年冬又遣散騎常侍劉孝勝通直常侍謝景朝貢武定元年夏又遣散騎常侍沈衆通直常侍殷徳卿朝貢其年冬又遣散騎常侍蕭確通直常侍陸􅃡朝貢三年秋又遣散騎常侍徐君房通直常侍庾信朝貢四年夏又遣散騎常侍蕭瑳通直常侍賀徳瑒朝貢五年春又遣散騎常侍謝蘭通直常侍鮑至朝貢朝廷亦遣使報之十餘年間南境寧息六年衍又改號為中大同其年又改為太清是歲司徒侯景反遣使通衍請其拯援衍惑景遊説遂絶貢使衍子綱及朝臣並切諌以為不可衍不從乃遣其兄子豫州刺史貞陽侯淵明北兗州刺史胡貴孫等冦逼徐州與侯景為聲援仍堰泗水以灌彭城齊文㐮王遣行臺慕容紹宗儀同三司髙岳潘相樂等率衆討之紹宗檄衍境内曰夫乾坤交泰明聖興作有冥運行之力俱盡變化之途抱識含靈融然並至呈形賦命混而同往所以𤣥功潜運至徳旁通百姓日用而不知萬國受賜而無迹豈徒鑿其耳目易其心慮悟以風雲一其文軌使夫日月之照不私雨露之施均洽運諸仁壽之域納於福祿之林自晋政多僻金衍淪蕩中原作戰鬬之塲生民為鳥獸之餌則我皇魏握𤣥帝之圖納水靈之祉駕雲車而自北䇿龍御以圖南致符上帝援溺下土怪物殛死淫水不作運神噐於顧眄定寳命於踟蹰恢之以武功振之以文徳字内反可封之俗員首識堯舜之心沙海荒忽之外瀚漠羈縻之表方志所不𫝊荒經所不綴莫不䋲谷釣山依風託水共仰中國之聖同欣大道之行唯夫三吳百越獨阻聲教匪民之咎責有由焉自偽晋之後劉蕭作慝擅僣一隅號令自已惟我祖宗馭宇爱民重戰未極謀臣之畫不窮節将之兵聊遣行人降以尺一圓臺已築黄屋輙去賜其几杖置之度外蕭衍輕險有素士操蔑聞睥睨君親自少而長好亂樂禍惡直醜正巧用其短以少為多詃惑愚淺大言以驚俗驅扇邪僻口兵以作威曲體脅肩摇脣鼓舌候當朝之顧指邀在位之餘論遂汙辱冠帶偷竊藩維及寳卷昬狂下不堪命曾無北面有犯之節遽㓕人倫在三之禮憑妖假怪鬼語神言稱兵指闕傾朝鴆主陵虐孤寡聾愚士民天不悔禍姦醜得志内恣彫靡外逞殘賊驅羸國之兵迫糊口之衆南出五嶺北防九江屯戍不解役無寧歲死亡矢刃之下夭折霧露之中哭泣者無已傷痍者不絶託身人上忽下如草遂使頑嚚子弟肆行淫虐狡猾羣小縱極貪惏剝割蒼生肌肉略盡刳剔黔首骨髓俱罄猛虎未方其害餓狼詎侔其禍惵惵周餘救死無地至於矯情飾詐事非一緒毒螫滿懐妄敦戒業躁競盈胸謬治清静至乃大興寺塔廣繕臺堂昭陽到景垂珠銜璧峥嶸刻削千門萬户鞭撻疲民盡其筋骨延壌運石悲歌掩途死而可祈甘同仙化智淺謀疎曾不自揆遏桐栢之流翻為已害子亡齊之𦙍忽為戌首書契迄兹罕聞其事至於廢捐冡嫡崇樹愚子明黨路開彼我側目疾視扼腕十室而九翹足有待良亦多人二紀於兹王家多故始則車馳之警終有驚墜之哀神祗痛憤寓縣崩震於是故相國齊獻武髙王感天壌之惨黷激雲雷以慨然仗髙義而率民奮大節以成務爰有匡國定霸之圖非直討賊雪恥之舉於是叡略紛紜靈武冠世盪滌逋孽尊主康邦皇上秉歴受圖天臨日鏡道隨𤣥運徳與神行既而元首懐舞戚之風上宰薄兵車之㑹遂解縶南冠喻以好睦舟車遵溯川陸光華亭徼相望欣然自泰反肉還童不待羊陸雖嘉謀長算爰自我始罷戰息民兩獲其泰王者之信明如四時豈或為人君父二三其徳書而不法可不惜哉侯景一介役夫出自凡賤身名淪没無或可紀直以趨馳便習見爱尒朱小人叨竊遂忝名位及中興之際義旗四指元惡不赦實在羣胡景荷人成拔籍其股肱主人有丹頸之期所天蹈族㓕之釁雖不能蔽捍左右以命酬恩猶當惨顔後至義形於色而趣利改圖速如覆手投身麾下甘為僕𨽻獻武王棄其瑕穢錄其小誠得厠五命之末預在一隊之後参跡驅馳庶其來効長鞭利鎩術以制之既闗隴逋誅毎事經略以河南空虚之地非兵戰之衝薄存掎角聊示旗鼔豈資實效寄以遊聲軍機催勒盖唯景任總兵綂旅别有司存而愚褊有積憍愎遂甚犯違軍紀仍自猜貳禍心潜搆翻為亂階負恩棄徳罔恤天討不義不昵厚而必顛委慈母如脱屣棄少弟如遺土羣子陸陸妻姪成行慕姜兒之爽言蔑伯春之宛轉跳梁猖蹶夫欲誰欺比之梟獍}
