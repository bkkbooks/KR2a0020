  - {type: variant, offset: 220, length: 1, content: 愷, WYG: 中領軍都督南兗兗徐青冀五州鎮軍将軍南兗州刺史持節侯如故後進爵為公增邑二千户劉昱凶虐日甚道成與直閤王敬則昱左右楊玉夫同謀殺昱迎弟凖立之改年為昇明時太和元年也道成移鎮東城以甲仗五十人入殿進位侍中司空錄尚書事驃騎大将軍持節都督刺史如故封竟陵郡公五千户給班劍三十人又進督豫司二州荆州刺史沈攸之舉兵討道成道成率衆入鎮朝堂司徒袁粲先鎮石頭據城與尚書令劉秉前湘州刺史王藴謀討道成宻信要攸之速下將為内應不充粲與子最俱死秉父子踰城走於􅋕檐湖王藴走向鬭場並見擒攸之至于夏口敗走與第三子中書郎太和单騎南奔華容縣俱自縊死道成又為太尉增封三千户班劔四十人甲仗百人入殿道成将有大志凖侍中王儉請閒勸之道成曰卿言何我今當依事相啟言辭雖厲而意色甚悦儉諷動在位乃加道成黃鉞都督中外諸軍事太傅領揚州牧劔履上殿入朝不趨賛拜不名置左右長史司馬從事中郎掾屬各四人使持節侍中太尉驃騎大将軍錄尚書南徐州刺史如故道成詐辭殊禮重申前命劔履上殿入朝不趨賛拜不名進位相國總百揆封十郡為齊公備九錫之禮加璽紱逺遊冠位至諸王上加相國緣綟綬其驃騎大将軍揚州牧南徐州刺史如故於是建齊臺置百官以東府為齊宫又增封十郡進公為王尋僣大號封其主劉凖為汝隂王未幾而死於是髙祖詔梁郡王嘉督二将出淮隂隴西公元操三将出廣陵河東公薛虎子三将出壽春以討之元操等攻其馬頭戍剋之道成遣其徐州刺史崔文仲攻䧟茬眉戍詔遣尚書游明根討之又遣平南将軍郎大檀三将出昫城將軍白吐頭二将出海西将軍元泰二将出漣口将軍封延三将出角城鎮南将軍賀羅出下蔡道成梁州刺史崔慧景遣長史裴叔保率衆冦武興闗城氐帥楊鼠擊破之叔保還南鄭梁郡王嘉破道成将盧紹之𤣥元度於昫山下蔡戍主棄城遁走又詔昌黎王馮熈為西道都督與征南将軍桓誕出義陽鎮南将軍賀羅自下蔡東出鍾離道成游擊将軍桓康於淮陽破之道成豫州刺史垣崇祖冦下蔡昌黎王馮熈擊破之梁郡王嘉大破道成将俘獲二萬餘口送京師道成遣後軍参軍車僧朗朝貢先是劉凖遣使殷靈誕茍昭先未反而道成僣立及僧朗至朝廷處之靈誕之下僧朗與靈誕競前後降人解奉君遂於朝會刄僧朗詔加殯斂送喪令還道成死子賾僣立改年為永明賾遣其驍騎将軍劉纘前将軍張謨朝貢八年又遣兼員外散騎常侍司馬憲兼員外散騎侍郎庾習朝獻九年遣輔國将軍劉纘通直郎裴昭明朝貢十年又遣昭明與冠軍参軍司馬廸之朝貢賾初為太子時特奢侈道成毎欲廢之賴王敬則和諧賾性貪惏常謂人曰唯崔慧景知我貧賾嘗至其益州刺史劉悛宅晝卧覺悛自捧金澡盤面廣三尺愛姬執金澡灌受四升以充沃盥因以奉獻賾納之其好利若此賾逰獵無度其殿中将軍邯郸起上表諌賾殺之十三年遣平南参軍顔幼明冗從僕射劉思效朝貢十四年賾巴東王子響殺長史劉寅司馬席恭穆謀殺賾賾遣丹陽尹蕭順之討殺之十五年二月遣員外散騎常侍裴昭明員外散騎侍郎謝竣朝貢九月又遣司徒参軍蕭琛范縝朝貢十六年復遣琛與司徒参軍范雲朝貢又遣車騎功曹庾蓽南豫州别駕何憲朝貢十七年賾雍州刺史王奐與南蠻長史劉興祖論衆罪賾以興祖付獄令送還建業奐輙於獄殺之而云自死賾怒遣其直閤将軍曹道剛梁州刺史曹虎等收奐奐閉門拒戰司馬黄瑶起於城内起兵攻奐殺之奐子祕書丞肅肅弟秉來降賾子長懋死立其孫南郡王昭業為太孫賾遇疾暫絶其子竟陵王子良在殿内昭業未入中書郎王融戎服於中書省閤口斷東宫仗不得進欲立子良賾既蘇昭業入殿融知子良不得立乃釋服還省賾死昭業立十數日收融付廷尉殺之昭業生而為其叔子良所養而矯情飾詐隂懐鄙慝與左右無賴羣小二十許人共衣食同卧起妻何氏擇其中美貌者與交通宻就富商大賈取錢無數既與子良同居未得肆意子良移西邸昭業獨住西州毎至昬夜輙開後閤與諸小人共至諸營署恣淫宴凡諸不逞皆迭加爵位許以南面之日便即施行皆疏官位名號於黃牋紙與之各各囊盛帶之肘後昭業師史仁祖侍書胡天翼聞之相與謀曰若言之二宫則其事未易若於營署為異人所毆打及為犬物所傷殘豈直罪止一身亦當盡室及禍年各已七十餘生寕足吝也數日仁祖天翼皆自殺昭業父長懋自患及死昭業侍奉憂哀號毁過禮及還私室與所親愛欣笑酣飲備諸甘滋葬畢立為皇太孫截壁為閤於母房内往何氏閒毎入輙彌時不出賾至東宫昭業迎拜號慟絶而後蘇賾自下輿抱持之寵愛隆重初昭業在西州令}
