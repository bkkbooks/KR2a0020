  - {type: variant, offset: 2564, length: 1, content: 邑, WYG: 邵陵王綸再於鍾山决戰戰敗而走景糧既少遂譎衍求和衍信之乃割江西四州授景封為夀陽王遣其朝貢與部下歃血盟訖景詐引軍還石頭衍乃勑援軍令下諸軍初不受詔後重勑乃從衍又令援軍以船三百艘給景景猶嫌其少又勅付}
