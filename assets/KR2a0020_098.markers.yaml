  - {type: variant, offset: 35, length: 100, content: 原女子孫氏房愛親妻崔氏涇州貞女兕先氏姚氏婦楊氏張洪初妻劉氏董景起妻張氏陽尼妻高氏史映周妻耿氏任城國太妃孟氏苟金龍妻劉氏盧元禮妻李氏河東孝女姚氏刁思遵妻魯氏夫婦人之事存於織組紃酒漿醯醢而已至如嫫訓軒宮娥, WYG: 以道}
