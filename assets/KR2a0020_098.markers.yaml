  - {type: variant, offset: 332, length: 0, content: '', WYG: 省昭業疑畏使虎賁中郎将潘淑領百人屯太極殿西階以防之大斂之始呼賾伎人備舉衆樂諸伎雖畏威從事莫不哽咽流涕及成服悉遣諸王還第子良固乞留過賾葬不許昭業素好狗馬立未十日便毁賾所起招婉殿以殿材乞閹人徐龍駒造宅於其處為馬埓馳走墜馬面額並傷稱疾不出者數日多聚名鷹快犬以􅆝肉奉之賾将葬喪車未出端門昭業便稱疾還内裁入閤便於内奏胡伎鞞鐸之聲震響内外時司空王敬則問射聲校尉蕭坦之曰便如此不當忽忽邪坦之曰此政當是内人哭聲響徹耳自賾葬後昭業微服而出遊走里市又多往其父母陵隧中與羣小共作鄙藝擲塗賭跳放鷹走狗諸雜狡獪日日輙往以此為常朝事大小皆斷於尚書}
  - {type: page-break, offset: 332, content: '', id: KR2a0020_WYG_098-8a, image: WYG0262/WYG0262-0421a.png}
