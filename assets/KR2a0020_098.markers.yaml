  - {type: variant, offset: 2555, length: 1, content: 光, WYG: 徳交通許推為主景至横江衍令正徳率軍拒景正徳因而迎之景濟江立以為主以趣建業衍好人佞己末年尤甚或有云國家彊盛者即便忿怒有云朝廷衰弱者因致喜悦是以其朝臣左右皆承其風㫖莫敢正言初景之将渡江也衍沿道軍戍皆有啟列而}
  - {type: variant, offset: 2555, length: 1, content: 光, krp: 徳交通許推為主景至横江衍令正徳率軍拒景正徳因而迎之景濟江立以為主以趣建業衍好人佞己末年尤甚或有云國家彊盛者即便忿怒有云朝廷衰弱者因致喜悦是以其朝臣左右皆承其風㫖莫敢正言初景之将渡江也衍沿道軍戍皆有啟列而}
