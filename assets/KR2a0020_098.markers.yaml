  - {type: variant, offset: 2537, length: 0, content: '', WYG: 任太洪齊遁走初衍每欲稱兵境上闚伺邉隙常為諸將摧破雖懐進趣之計而勢力不從遂於浮山堰淮規為壽春之害肅宗詔征南蕭寳夤率諸将討之大破衍衆於淮北秋九月堰自潰决漂其緣淮城戍居民村落十餘萬口流入於海正光元年衍改稱普通}
