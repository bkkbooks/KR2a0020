  - {type: 'tls:seg', offset: 2557, content: '', id: KR2a0020_ZHSJ_098-d98p16s43}
  - {type: variant, offset: 2557, length: 0, content: '', WYG: 領軍朱异恐忤衍意且謂景不能渡遂不為聞景至嵫湖方大驚駭乃令其太子綱守中書省軍事悉以委之又逼居民入城百姓因相剝掠不可禁止衍令直從監俞景茂赦二冶尚方錢署罪人及建康廷尉諸囚欲押令入城以充防捍諸徒囚放火燒冶一時散走衍憂懣無計唯令其王公已下分屯諸門攝諸寺藏錢皆入聚徳陽堂以充軍實景既至便圍其城縱火燒爇掘長圍築土山以攻衍衍亦於城内起山以應之衍令文武運土人責二十石於是其王侯朝貢皆自負檐蕭綱亦欲自負僉議以為太示迫屈乃止衍毎募人出戰素無號令初或蹔勝後必奔背景宣言曰城中非無菜但無醬耳以戲侮之衍太官及軍人無柴乃𤼵取尚書省武庫左右藏以充用衍州鎮外援雖有至者而景圍柵深固内外斷絶衍數募人出戰常為景所執獲有一小兒請以飛鵄𫝊致消息綱乃作數千丈䋲綴紙鵄於䋲端縛書其背又題鵄口若有得鵄送援軍者}
  - {type: page-break, offset: 2557, content: '', id: KR2a0020_WYG_098-33b, image: WYG0262/WYG0262-0433d.png}
  - {type: page-break, offset: 2557, content: '', id: KR2a0020_WYG_098-34a, image: WYG0262/WYG0262-0434a.png}
