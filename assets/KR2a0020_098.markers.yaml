  - {type: variant, offset: 3091, length: 1, content: 闕, WYG: 二蕭競塗泥之中同蝸角之戰或年纔三紀或身不獲終而偷名江徼自擬王者考之邃古所未前聞昔句踐致貢而延世夫差争長而後死两冦方之呉越不乃劣乎魏書卷九十八魏書卷九十八考證蕭衍傳是歲衍又改年為大通歴代甲子圖梁大通元年即魏孝昌三年此書于孝昌元年之下謂是歲改年大通互異是年衍又改號為中大通歴代甲子圖歲在丁未梁改普通為大通己酉又改中大通乙夘又改為大同即東魏孝静帝之天平二年也此書則于天平二年之下謂為中大通二年夏二年上脱年號臣人龍按本書孝静帝紀號天平者凡四年至次年正月即改元為元象又次年十一月即改元興和今上文云四年冬下文云興和二年春則此年當稱元象元年是年衍改號大同歴代甲子圖東魏興和二年為梁大同六年與書互異六年衍又改號為中大同其年又改為太清歴代甲子圖梁中大同元年即東魏武定四年又梁太清元年即東魏武定五年與此互異魏書卷九十八考證}
