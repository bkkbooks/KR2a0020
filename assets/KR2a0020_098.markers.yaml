  - {type: variant, offset: 2550, length: 1, content: 世, WYG: 将棄懸瓠逺赴彭城老賊姦謀復将作矣固揚聲赴助計在圖襲吞淵明之衆招厭虐之民舉長淮以為斷仍鵄張歲月南面假名死而後已此盖蜯鷸之禍我承其弊且偽主昬悖不惟善隣賊忍之心老而彌篤納逋叛之詭譎蔑信義以猖狂天喪其神人重其怨将踐𤓰圃之蹤且追兒侯之轍今徴發犬羊侵軼徐部築壘擁川覬覦小利此而可忍孰不可懐兵凶戰危出不得已謬奉朝規肅兹九伐扛鼎拔樹之衆超乗投石之旅練甲爭途波聚霧合虎班龍文之逸蘭池蒲梢之駔嘘天陸野躡影追風振旅南轅長驅討䠞非直三吳䑕面一麾魚駭乗此而往青蓋将歸且衍虐網蚩兵權在外持險躁之風俗兼輕薄之子孫蕭綸兇狡之魁豈無商臣之佷蕭譽失志之憤當召專諸之客外崩中潰今也其時幕府師行以禮兵動以義弔民伐罪理有存焉其有知機審變翻然鵲起立功立事去危就安賞典未忘事必加等若軍威所至敢有拒違尺兒已上咸從梟戮今三禮四義之将豹虎熊羆之士深銜逋偽信納叛亡違卜愎諌實興伐役莫不含怒作色如赴私讐茹肝渉血義不旋踵攻戰之日事若有神莾積麻亂匪旦伊夕以彼曲師危卒望我軍鋒何異蛣蜣被甲蝍蛆舉尾正恐旗鼓一接芝藋俱摧先事喻懐備知翰墨王侯無種禍福由人斯盖丈夫肉食之秋壮士封侯之㑹冬氷可折時不再來凡百君子勉求多福檄之所到咸共申省知我國行師之意冬十二月紹}
