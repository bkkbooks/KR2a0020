  - {type: variant, offset: 2705, length: 0, content: '', WYG: 遣使詣景景又詭云今時既熱便不能得去正當乞留京師為朝廷立效耳而悉力大攻七年三月遂拔之景自至建業縱軍士前後虜掠倉庫所有皆掃地盡矣景乃從數百騎見衍􅒣欷流涕因請香火為作義兒還以衍為主令正徳通啟云前為景所擒使攝四海辭不獲免權總萬機今景既入輔乞解僣濫以王還邸自景圍建業城中多有腫病死者相繼無復板木乃刳柱為棺自雲龍神虎門外横屍重沓血汁漂流無復行路及景入城悉聚尸焚之煙氣張天臭聞數十里初城中男女十餘萬人及䧟存者纔二三千人又皆帶疾病盖天亡之也衍尋為景所餓殺自衍為景攻圍歴百餘日衍子荆州刺史湘東王繹益州刺史武陵王紀各擁兵自守坐看衍之懸危竟不奔赴始景渡江至䧟城之後江南之民及衍王侯妃主世胄子弟為景軍人所掠或自相賣鬻漂流入國者盖以數十萬口加以饑饉死亡所在塗地江左遂為丘墟矣初衍崇信佛道於建業起同泰寺又於}
