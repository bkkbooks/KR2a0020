  - {type: variant, offset: 2541, length: 1, content: 散, WYG: 走國軍追躡所獲萬計衍初聞之慟哭氣絶甚為慙惋猶云其子言其病風所致時人咸笑之三月衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入冦直城梁州刺史傅}
