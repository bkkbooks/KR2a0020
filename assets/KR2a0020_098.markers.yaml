  - {type: variant, offset: 2538, length: 1, content: 賊, WYG: 三年其弟子西豐侯正徳棄衍來奔尋復亡歸衍初忿之改其姓為背氏既而復焉封為臨賀王五年九月衍将裴邃虞鴻襲據壽春外郭刺史長孫稚擊走之孝昌元年正月徐州刺史元法僧據城南叛衍遣豫章王綜鎮彭城綜蕭寳卷之遺腹子也初衍平建業因納其母吳氏吳氏先有孕後生綜衍謂為已子甚寵愛之綜既長母宻告綜綜遂潜圖叛衍既鎮彭城及大軍往討綜}
