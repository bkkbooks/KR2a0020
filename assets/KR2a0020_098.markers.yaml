  - {type: variant, offset: 2546, length: 2, content: 具狀, krp: 類同醜欲擬虵䑕顧匪其倫及逺託闗右委命冦逆寳炬定君臣之分黑獺結兄弟之親授以名噐之尊救其重圍之死憑人繫援假人鼻息俄而忘恩背惠親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流禦之地甘辭卑體進熟圖身詭言浮説抑可知矣叛豎救命豈将擇音偽朝大夫幸災忘義主耄於上臣蔽於下逐雀去草曾不是圖竊寳叛邑椒蘭比好人而無禮其能國乎夫安危有大勢成敗有恒兆不假離朱之目不藉子野之聽聊陳刺心之説且吐伐謀之言今帝道休明皇猷允塞四民樂業百靈效祉雖上相云亡而伊陟繼事秉文經武虎視龍驤驅日下之俊雄收一世之英鋭擊刺猶雷電合戰如風雨控弦躍馬固敵是求蠕蠕昔遭離亂輻分瓦裂匹馬孤征告困於我國家深敦隣附愍其入懐盡憂人之禮極繼絶之義保衛出於故地資給唯其多少存其已亡之業成其莫大之基深仁厚徳鏤其骨髓引領思報義如手足吐谷渾深執忠孝膠漆不渝萬里仰徳}
  - {type: variant, offset: 2549, length: 0, content: '', WYG: 款屬路並申以婚好行李如歸蠕蠕境斜界黄河望通豳夏飛雪千里層氷洞積北風轉勁實䈥角之時沍寒方猛正氈裘之利吐谷渾疾彼凶逆彊兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方侯隙企其移踵加以獨孤如願擁衆秦中治兵劫愶黒獺北備西擬内營腹心救首救尾疲於奔命豈暇稱兵東指出師函谷且秋風揚塵國有恒防闗河形勝之際山川襟帶之所猛将精兵基跱岳立又寳炬河隂之北黒獺亡山之走衆無一旅僅以身歸就其不顧根本輕懐進趣斯則一勞永逸天賛我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虚誕夫景䋲樞席牖之子阡陌鄙俚之夫遭風塵之會逄馳騖之日遂位在三吏邑啟千社揣身量分久當止足而乃周章去就離跂不已夫豈徒爾事可㩁揚度其衆叛親離守死不暇乃}
