  - {type: variant, offset: 2246, length: 0, content: '', WYG: 田道隆義州刺史張宗之遣使内附十二月衍梁秦二州行事夏侯道遷據漢中内附詔尚書邢巒率衆赴之二年四月巒頻破衍軍遂入劍閣執其輔國将軍范始男送京師巒又遣綂軍王足破衍諸将斬其輔國将軍馮文豪等六月衍遣将王超宗冦邉揚州刺史薛真度大破之俘斬三千級七月王足又大破衍衆斬其秦梁二州刺史魯方達王明達等三十餘将俘虜二千五百人九月衍湘州刺史揚公則率衆冦壽春揚州刺史元嵩擊破之斬獲數千級三年正月衍徐州刺史昌義之冦梁城江州刺史王茂先冦荆州屯河南城平南將軍陳伯之擊義之平南將軍楊大眼擊茂先並大破之斬其輔國将軍王花俘斬二千茂先逃潰追奔至於漢水拔其五城将軍宇文福略衍司州俘獲千餘口而還五月衍将蕭昞冦淮陽張惠紹冦宿豫蕭宻冦梁城}
