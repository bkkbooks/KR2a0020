  - {type: variant, offset: 13, length: 3, content: 崔覽妻, WYG: 六島夷蕭道成島夷蕭衍島夷蕭道成字紹伯晋陵武進楚也僣晋時以武進之東城為蘭陵郡縣遂為蘭陵人父承之常隨宗人蕭思話征伐久乃得為其横野司馬以軍功仕劉義隆位至右軍将軍道成少好武事初從散冗毎充征役前後為討蠻小帥以堪勤劇見知思話之鎮襄陽啟之自隨任以綂戍稍遷左軍中兵參軍毎在疆場擾動邉民曾至談堤大敗而走劉駿時間闗偽職至建業令駿死子業以為後軍将軍直閤子業死劉彧除右軍将軍時子業江州刺史晋安王子勛會稽太守尋陽王子房等並舉兵彧加道成輔國将軍東討平定諸縣晋陵太守袁摽吳郡太守顧琛吳興太守王雲生皆棄郡奔走時徐州刺史薛安都遣從子索兒率鋭衆渡淮徴道成拒焉以功}
