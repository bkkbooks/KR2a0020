  - {type: variant, offset: 2909, length: 179, content: 正光中母死女勝年十五哭泣不絕聲水漿不入口者數日不勝哀遂死太守崔游申請為營墓立碑自為製文表其門閭比之曹娥改其里曰上虞里墓在郡城東六里大道北至今名為孝女冢滎陽刁思遵妻魯氏女也始笄為思遵所娉未踰月而思遵亡其家矜其少寡許嫁已定魯聞之以死自誓父母不達其志遂經郡訴稱刁氏吝護寡女不使歸寧魯乃與老姑徒步詣司徒府自告情狀普泰初有司聞奏廢帝詔曰貞夫節婦古今同尚可令本司依式標牓, WYG: 親屬並見屠害矣}
