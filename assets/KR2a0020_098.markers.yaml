  - {type: variant, offset: 668, length: 244, content: 隙死不足恨但夙心往志不聞於沒世矣良痛母老家貧供奉無寄赤子矇眇血祀孤危所以抱怨於黃墟耳房垂泣而對曰幸承先人餘訓出事君子義在自畢有志不從命也夫人在堂稚子襁褓顧當以身少相感長往之恨俄而溥卒及大斂房氏操刀割左耳投之棺中仍曰鬼神有知相期泉壤流血滂然助喪者咸皆哀懼姑劉氏輟哭而謂曰新婦何至於此房對曰新婦少年不幸實慮父母未量至情覬持此自誓耳聞知者莫不感愴於時子緝生未十旬鞠育於後房之內未曾出門遂終身不聽絲竹不預座席緝年十二房父母仍存於是歸寧父兄尚有異議緝竊聞之以啟母房命駕紿云他行因而遂歸其家弗知之也行, WYG: 廣陵}
