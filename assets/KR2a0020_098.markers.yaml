  - {type: variant, offset: 2554, length: 0, content: '', WYG: 而死不可勝數衍既慙悔六年復遣使羊珍孫欵闗乞和並修弔書於齊文襄王文㐮王欲以威徳懐之許其通而不復其書衍於是遣其散騎常侍謝班通直常侍徐陵詣闕朝貢班等未及還而侯景舉兵襲衍宻與衍弟子臨賀王}
