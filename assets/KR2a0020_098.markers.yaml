  - {type: variant, offset: 997, length: 8, content: 吏民立碑頌德金紫, WYG: 胡景略於建安城剋之擒景略寳卷雍州刺史蕭衍據㐮陽舉兵伐之荆州行事蕭頴胄應衍三月頴胄叛寳卷以南康王寳融為天子於是寳融僣即帝位頴胄為侍中尚書令衍為左僕射都督征討諸軍征東大将軍使持節如故頴胄請封寳卷為虞陽縣侯寳融不許又封涪陵王頴胄監八州諸軍事行荆州刺史假衍黄鉞蕭衍軍至沔口郢州嬰城自守寳卷又殺巴陵王昭胄永新侯昭秀黃門郎蕭寅寳卷昬暴日甚内外不堪其前南譙太守王靈秀等於石頭迎寳卷弟寳夤率城内文武向其臺城百姓空手隨從者萬數會日暮城門閉不剋衍兵至建業所在棄寳卷降之衍兵入宫寳卷在含徳殿吹笙歌作女兒子卧未及睡聞兵入趨出北户欲還後宫清曜閣已閉閹人禁防黄泰平刀傷其􅂰仆地顧曰奴反也直後張齊斬首送衍衍追封東昏侯廢其皇后太子為庶人衍殺寳卷弟湘東王寳晊衍又殺邵陵王寳攸晋熈王寳松桂陽王寳貞其建安王寳夤來奔尋逼寳融禪位於已封為巴陵王宫于姑孰寳融尋暴死島夷蕭衍字叔達亦晋陵武進楚也父順之蕭賾}
