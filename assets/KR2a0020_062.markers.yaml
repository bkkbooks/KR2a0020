  - {type: variant, offset: 1882, length: 754, content: 與鄉人父老書相存慰辭旨款備得者榮之三世同居門有禮讓於後頻值飢年家始分析挺與弟振推讓田宅舊資惟守墓田而已家徒壁立兄弟怡然手不釋卷時穀糴踊貴鄉人或有贍者遺挺辭讓而受仍亦散之貧困不為畜積故鄉邑更欽歎焉舉秀才射策高第拜中書博士轉中書侍郎以工書受敕於長安書文明太后父燕宣王碑賜爵泰昌子轉登聞令遷典屬國下大夫以參議律令賜布帛八百匹穀八百石馬牛各二尚書李沖甚重之高祖以挺女為嬪太和十八年大將軍宋王劉昶南鎮彭城詔假立義將軍為昶府長史以疾辭免乃以王肅為長史其被寄遇如此後除昭武將軍光州刺史威恩並著風化大行十九年車駕幸兗州召挺赴行在所及見引諭優厚又問挺治邊之略因及文章高祖甚悅謂挺曰別卿已來焉二載吾所綴文已成一集今當給卿副本時可觀之又顧謂侍臣曰擁旄者悉皆如此吾何憂哉復還州及散騎常侍張彝兼侍中巡行風俗見挺政化之美謂挺曰彝受使省方採察謠訟入境觀政實愧清使之名州治舊掖城西北數里有斧山峯嶺高峻北臨滄海南望岱嶽一邦遊觀之地也挺於頂上欲營觀宇故老曰此嶺秋夏之際常有暴雨迅風巖石盡落相傳云是龍道恐此觀不可久立挺曰人神相去何遠之有虬龍忽豈唯一路乎遂營之數年間果無風雨之異挺既代即為風雹所毀於後作復尋壞遂莫能立衆以為善化所感時以犯罪配邊者多有逃越遂立重制一人犯罪逋亡合門充役挺上書以為周書父子罪不相及天下善人少惡人多以一人犯罪延及合門司馬牛受桓魋之罰柳下惠嬰盜跖之誅豈不哀哉辭甚雅切高祖納之先是州內少鐵器用皆求之他境挺表復鐵官公私有賴諸州中正本在論人高祖將辨天下氏族仍亦訪定乃遙授挺本州大中正掖縣有人年踰九十板輿造州自稱少曾充使林邑得一美玉方尺四寸甚有光彩藏之海島垂六十歲忻逢明治今願奉之挺曰吾雖德謝古人未能以玉為寶遣船隨取光潤果然竟不肯受仍表送京都世宗即位累表乞還景明初見代老幼泣涕追隨縑帛贈送挺悉不納散騎常侍趙脩得幸世宗挺雖同州壤未嘗詣門, WYG: ''}
