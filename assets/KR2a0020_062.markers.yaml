  - {type: variant, offset: 905, length: 3, content: 多少斯, WYG: 道殊故禍福之途異耳昔光武議為太子置傅以問其羣臣羣臣望意皆言太子舅執金吾新陽侯隂就可博士張佚正色曰今立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才光武稱善曰置傅以正太子也今博士不難正朕况太子乎即拜佚為太子太傅漢明卒為賢主然則佚之傅漢明}
