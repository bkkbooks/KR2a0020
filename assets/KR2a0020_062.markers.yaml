  - {type: variant, offset: 3008, length: 381, content: 令高肇親寵權盛子植除青州刺史啟孝芬為司馬後除司徒記室參軍司空屬定州大中正長於剖判甚有能名府主任城王澄雅重之熙平中澄奏地制八條孝芬所參定也在府久之除龍驤將軍廷尉少卿孝昌初蕭衍遣將裴邃等寇淮南詔行臺酈道元都督河間王琛討之停師城父累月不進敕孝芬持節齎齊庫刀催令赴接賊退而還荊州刺史李神儁為蕭衍遣將攻圍詔加孝芬通直散騎常侍以將軍為荊州刺史兼尚書南道行臺領軍司率諸將以援神儁因代焉於時州郡內戍悉已陷沒且路由三餢賊已先據孝芬所統既少不得徑進遂從弘農堰渠山道南入遣弟孝直輕兵在前出賊不意賊便奔散人還安堵肅宗嘉勞之并賚馬及綿絹等物後以元叉之黨與盧同李奬等並除名徵還又孝芬為廷尉之日章武王融以贓貨被劾孝芬按以重法及融為都督北討鮮于脩禮於時孝芬弟孝演率勒宗從避賊於博陵郡城為賊攻陷尋為賊所害融乃密啟云孝演入賊為王遂見收捕合家逃竄遇赦乃出孝昌三年蕭衍將成景儁率衆逼彭城除孝芬寧朔將軍員, WYG: 左}
