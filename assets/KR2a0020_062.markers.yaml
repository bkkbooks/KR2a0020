  - {type: variant, offset: 1141, length: 1, content: 昶, krp: 牛二頭其年加員外散騎常侍使於蕭賾賾遣其主客郎劉繪接對并設讌樂彪辭樂及坐彪曰齊主既賜讌樂}
  - {type: variant, offset: 1143, length: 0, content: '', WYG: 勞行人向辭樂者卿或未相體自喪禮廢替於兹以久我皇孝性自天追慕罔極故有今者喪除之議去三月晦朝臣始除衰裳猶以素服從事裴謝在此固應具此我今辭樂想卿無怪繪答言辭樂之事向以不異請問魏朝喪禮竟何所依彪曰高宗三年孝文踰月今聖上追鞠育之深恩感慈訓之厚徳執於殷漢之間可謂得禮之變繪復問若欲遵古何為不終三年彪曰萬幾不可久曠故割至慕俯從羣議服變不異三年而限同一期可謂亡禮之禮繪言汰哉叔氏專以禮許人彪曰聖朝自為曠代之制何關許人繪言百官總已聽於冡宰萬幾何慮於曠彪曰我聞載籍五帝之臣臣不若君故君親攬}
