  - {type: variant, offset: 1443, length: 1, content: 仍, WYG: 建義初叛入蕭衍高道悦字文欣遼東新昌人也曽祖䇿馮跋散騎常侍新昌侯祖育馮文通建徳令値世祖東討率其所部五百餘家歸命軍門世祖授以建忠將軍齊郡建徳二郡太守賜爵肥如子父元起武邑太守遂居渤海蓚縣道悦少為中書學士侍御主文}
