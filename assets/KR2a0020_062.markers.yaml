  - {type: variant, offset: 2802, length: 185, content: 故吏聞凶問莫不悲感共鑄八尺銅像於城東廣因寺起八關齋追奉冥福其遺愛若此初崔光之在貧賤也挺贍遺衣食常親敬焉又識邢巒宋弁於童稚之中並謂終當遠致世稱其知人歷官二十餘年家資不益食不重味室無綺羅閨門之內雍雍如也舊故多有贈賵諸子推挺素心一無所受有子六人長子孝芬字恭梓早有才識博學好文章高祖召見甚嗟賞之李彪謂挺曰比見賢子謁帝旨諭殊優今當為羣拜紀挺曰卿自欲善處人父子之間然斯言吾所不敢聞也, WYG: ''}
