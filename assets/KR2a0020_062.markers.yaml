  - {type: variant, offset: 1438, length: 1, content: 轉, WYG: 輔國將軍永寜寺典作副將始彪竒志及媫妤特加器愛公私坐集必自稱詠由是為高祖所責及彪亡後媫妤果入掖庭後宫咸師宗之世宗崩為比丘尼通習經義法座講説諸僧歎重之志所在著績桓叔興外叛南荆荒毁領軍元义舉其才任撫導擢為南荆州刺史加}
