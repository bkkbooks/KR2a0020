  - {type: variant, offset: 891, length: 0, content: '', WYG: 王政可為長太息者六此即是其一也夫上之所好下必從之故越王好勇而士多輕死楚靈好瘠而國有飢人今二聖躬行儉素詔令殷勤而百姓之奢猶未革者豈楚越之人易變如彼大魏之士難化如此蓋朝制弗宣人未見徳使之然耳臣愚以為第宅車服自百官以至于庶人宜為其等制使貴不逼賤卑不僭高不可以稱其侈意用違經典今或者以為習俗日久不可卒革臣謹言古人革之之漸昔子産為政一年百姓歌之曰我有田疇子産伍之我有衣冠子産禇之孰殺子産吾其與之及三年乃改歌曰我有田疇子産殖之我有子弟子産誨之子産若死其誰繼之然則鄭人之智豈前昬而後明哉且從政者湏漸受化者難頓故也今若為制以差品之始末之情魏士與鄭人同矣既同鄭人是為卒有善歌豈可憚其初怨而不為終善哉夫尚儉者開福之源好奢者起貧之兆然則儉約易以教行華靡難以財滿是以聖人留意焉賢人希凖焉故夏禹卑宫室而惡衣服殷湯寢黄屋而乘輅輿此示儉於後王後王所宜觀其意而取折衷也孔子為魯司冦乘柴車而駕駑馬晏嬰為齊正卿冠濯冠而衣故裘此示儉於後臣後臣所宜識其情而消息之也前志云作法於涼其弊猶貪此言雖略有達治道臣之瞽言儻或可採比及三年可以有成有成則人務本人務本則奢費除奢費除則榖帛豐穀帛豐則人逸樂人逸樂則皇基固矣其二曰易稱主器者莫若長子傳曰太子奉冢嫡之粢盛然則祭亡主則宗廟無所饗冡嫡廢則神器無所傳聖賢知其如此故垂誥以為長世之法昔姬王得斯道也故恢崇儒術以訓世嫡世嫡於是乎習成懿徳用大協於黎蒸是以世統生人載祀八百逮嬴氏之君於秦也殆棄徳政坑焚儒典弗以義方教厥冡子於是習成凶徳肆虐以臨黔首是以饗年不永二世而亡亡之與興其道在於師傅師傅之損益可得而言益者周公傅成王教以孝仁禮義逐去邪人不使見惡人}
