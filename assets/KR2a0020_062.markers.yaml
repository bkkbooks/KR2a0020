  - {type: variant, offset: 1221, length: 0, content: '', WYG: 之十一年先帝先后遠惟景業綿綿休烈若不恢史闡錄懼上業茂功始有缺矣於是召名儒之士充麟閣之選于時忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓高祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢制作於此者恐閨門既異出入生疑弦柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢簡牘弗張其於書功録美不其闕歟伏惟孝文皇帝承天地之寳崇祖宗之業景功未就奄焉崩殞凡百黎萌若無天地賴遇陛下體明叡之眞應保合之量恢大明以燭物履靜恭以安邦天清其氣地樂其静不愆不忘率由舊章可謂重明疊聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理於有象盡性於衆變可謂日月出矣無幽不燭也記曰善流者欲人繼其行善歌者欲人繼其聲故傳曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖達今王之懿美洞鑒準之前代其徳靡悔也時哉時哉可不光昭哉合徳二儀者先皇之陶鈞也齊明日月者先皇之洞照也慮周四時者先皇之茂功也合契神鬼者先皇之𤣥燭也遷都改邑者先皇之達也變是協和者先皇之鑒也思同書軌者先皇之遠也守在四夷者先皇之略也海外有截者先皇之威也禮田岐陽者先皇之義也張樂岱郊者先皇之仁也鑾幸幽漠者先皇之智也燮伐南荆者先皇之禮也升中告成者先皇之肅也親䖍宗社者先皇之敬也袞實無闕者先皇之徳也開物成務者先皇之貞也觀乎人文者先皇之藴也革弊創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功}
