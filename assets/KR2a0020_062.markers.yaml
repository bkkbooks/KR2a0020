  - {type: variant, offset: 1447, length: 5, content: 時年四十九, WYG: 於右軍將軍顯族弟敬猷有風度員外散騎侍郎殿中侍御史進給事中輕車將軍奉車都尉蕭寳夤西征引為驃騎司馬及寶寅謀逆敬猷與行臺郎中封偉伯等潛圖義舉謀泄見殺}
