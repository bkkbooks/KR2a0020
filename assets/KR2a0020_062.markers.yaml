  - {type: variant, offset: 979, length: 0, content: '', WYG: 文成皇帝慨少時師不勤教嘗謂羣臣曰朕始學之日年尚幼沖情未能專既臨萬幾不遑温習今而思之豈唯予咎抑亦師傅之不勤尚書李訢免冠而謝此則近日之可鑒也伏惟太皇太后翼贊高宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬之躋及儲宫誕育復親撫誥日省月課實勞神慮今誠宜準古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈畜倉廩故堯湯水旱人無菜色者蓋由備之有漸積之有素暨于漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畝不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農相切若此頃年山東饑去嵗京師儉内外人庶出入就豐既廢營産疲而乃達又於國體實有虚損若先多積榖安而給之豈有驅督老弱餬口千里之外以今況古誠可懼也臣以為宜析州郡常調九分之二京都度支嵗用之餘各立官司年豐糴積於倉時儉則加私之二糶之於人如此民必力田以買官絹又務貯財以取官粟年登則常積嵗凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃畝之數以贓贖雜物餘財市牛科給令其肆力一夫之田嵗責六十斛蠲其正課并征戍雜役行此二事數年之中則榖積而人足雖災不為害臣又聞前代明主}
