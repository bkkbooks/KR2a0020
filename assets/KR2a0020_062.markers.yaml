  - {type: variant, offset: 1446, length: 0, content: '', krp: 久之轉治書侍御史加諫議大夫正色當官不憚彊禦車駕南征徴兵秦雍大期秋季閲集洛陽道悦以使者治書御史薛聰侍御主文中散元志等稽違期㑹奏舉其罪又奏兼左僕射吏部尚書任城王澄位總朝右任屬戎機兵使㑹否曽不檢奏尚書左丞公孫良職維樞轄蒙冐莫舉請以見事免良等所居官時道悦兄觀為外兵郎中而澄奏道悦有黨兄之負高祖詔責然以事經恩宥遂寢而不論詔曰道悦資性忠篤稟操貞亮居法樹平肅之規處諫著必犯之節三公憚其風鯁朕實嘉其一至謇諤之誠何愧黯鮑也其以為主爵下大夫諌議如故車駕將幸鄴又兼御史中尉留守洛京時宫極初基廟庫未構車駕將水路幸鄴已詔都水回營構之材以造舟檝道悅表諌曰臣聞博納輿言君上之崇務規箴匡正臣下之誠節是以置鼓設謗爰自曩日虚襟博聽義屬今辰臣既踈魯濫蒙榮貴司兼獻弼職當然否佩遇恩華願陳聞見竊以都作營構之材部别科擬素有定所工治已訖回付都水用造舟艫闕永固居宇之功作暫時遊嬉之用損耗殊倍終為棄物且子來之誠本期營起今乃倄繕舟檝更為非務公私回惶僉深怪愕又欲御泛龍舟經由石濟其㳂河挽道久以荒蕪舟檝之人素不便習若欲委棹正流深薄之危古今共慎若欲挽牽取進授衣之月躶形水陸恐乖視人若子之義且鄴洛相望陸路平直時乘沃若往來匪難更乃捨周道之安即渉川之殆此乃愚智等慮朝野俱惑進退伏思不見其可又從駕羣寮聽將妻累舟檝之間更無限隔士女雜亂内外不分當今景御休明惟新式度裁禮調風軌物寰宇竊惟斯舉或損洪猷深失溥天順則之望又氐胡犯順未恭西道偏戎旗胄仍襲南宼對接迎畿蠻民踈戾每造不軌闚覦間隙或生慮外愚謂應妙選懿親撫寜後事令姦回息覬覦之望邊宼絶闚疆之心臣稟性愚直知而無隱區區丹志冒昧以聞詔曰省所上事深具乃心但卿之立言半非矣當湏陳非以示謬稱是以彰得然後明所以而不用有由而為之不爾則未相體耳回材都水暫營嬉遊終為棄物修繕非務舟檝無彰士女雜亂此則卿之失辭矣深薄之危撫後之重斯則卿之得言也於是髙祖遂從陸路轉道悦太子中庶子正色立朝儼然難犯宫官上下咸畏憚之太和二十年秋車駕幸中岳詔太子恂入居金墉而恂潛謀還代忿道悦前後規諌遂於禁中殺之高祖甚加悲惜贈散騎常侍帶管州刺史賜帛五百匹并遣王人慰其妻子又詔使者監䕶喪事葬于舊塋諡曰貞侯世宗又追録忠槩拜長子顯族給事中顯族亦以忠厚見稱}
