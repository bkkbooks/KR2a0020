  - {type: variant, offset: 1018, length: 13, content: 西兗州刺史假東光侯鎮滑臺祐, WYG: 及文明太后崩羣臣請高祖公除高祖不許與彪往復語在禮志高祖詔曰歴觀古事求能非一或承藉微䕃著徳當時或見拔幽陋流名後葉故毛遂起賤奮抗楚之辯茍有才能何必拘族也彪雖宿非清第本闕華資然識性嚴聰學博墳籍剛辯之才頗堪時用兼憂吏若家載宣朝美若不賞庸叙績將何}
