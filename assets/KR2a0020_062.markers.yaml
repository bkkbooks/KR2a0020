  - {type: variant, offset: 1207, length: 1, content: 歲, WYG: 代炎闕崇道冠來事降及華馬陳于咸有放焉四敷贊弗遠不可力致豈虚也哉其餘率見而書覩事而作者多矣尋其本末可往來焉唯我皇魏之奄有中華也嵗越百齡年幾十紀太祖}
