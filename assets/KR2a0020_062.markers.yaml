  - {type: variant, offset: 1461, length: 223, content: 諡曰惠子德正襲武定中黃門侍郎顥弟雅字興賢有風度自給事中稍遷司徒府錄事參軍定州撫軍府長史卒年三十四天平中追贈散騎常侍平北將軍冀州刺史子德乾早有令問任城太守卒雅弟諒字脩賢少好學多識強記居喪以孝聞太和末京兆王愉開府辟召高祖妙簡行佐諒與隴西李仲尚趙郡李鳳起等同時應選稍遷太尉主簿國子博士正光中加驍騎將軍為徐州行臺至彭城屬元法僧反叛逼諒同之諒不許為法僧所害時年四十一朝廷痛惜之贈左將軍滄州刺史又下詔以諒臨危授命誠節可重復贈使持節平北將軍幽州刺史贈帛二百匹優, WYG: 聽}
