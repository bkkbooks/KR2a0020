  - {type: variant, offset: 3390, length: 595, content: 常侍兼尚書右丞為徐州行臺孝芬將發入辭靈太后謂孝芬曰卿女今事我兒與卿便是親舊曾何相負而內頭元叉車中稱此老嫗會須却之孝芬曰臣蒙國厚恩義無斯語假實有此誰能得聞若有聞知此於元叉親密過臣遠矣乞對言者足辨虛實靈太后悵然意解乃有愧色景儁築柵造堰謀斷泗水以灌彭城孝芬率大都督李叔仁柴集等赴戰景儁等力屈退走除孝芬安南將軍光祿大夫兼尚書為徐兗行臺建義初太山太守羊侃據郡反遠引南賊圍逼兗州除孝芬散騎常侍鎮東將軍金紫光祿大夫仍兼尚書東道行臺大都督刁宣馳往救援與行臺于暉接至便圍之侃突圍奔蕭衍餘悉平定永安二年莊帝聞元顥有內侵之計敕孝芬南赴徐州顥遂潛師向考城擒大都督濟陰王暉業乘勝徑進遣其後軍都督侯暄守梁國城以為後援孝芬勒諸將馳往圍暄恐顥遣援乃急攻之晝夜不息五日暄遂突出擒斬之俘其卒三千餘人莊帝還宮授西兗州刺史將軍如故孝芬久倦外役固辭不行乃除太常卿普泰元年南陽太守趙脩延襲據荊州城囚刺史李琰之招引南寇除孝芬衞將軍荊州刺史兼尚書南道行臺又除都督三荊諸軍事車騎將軍假驃騎將軍孝芬已出次改授散騎侍驃騎將軍西兗州刺史太昌初兼殿中尚書尋除車騎大將軍左光祿大夫仍尚書後加儀同三司兼吏部尚書出帝入關齊獻武王至洛與尚書辛雄劉廞等並誅時年五十沒其家口天平中乃免之孝芬博文口辯善談論愛好後進終日忻然商搉古今間以嘲謔聽者忘疲所著文章數十篇有子八人長子勉字宣祖頗涉史傳有几案才正光初除太學博士莊帝之為御史中尉啟除侍御史永安初除建節將軍尚書右中, WYG: ''}
