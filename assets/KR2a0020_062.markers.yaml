  - {type: variant, offset: 1225, length: 0, content: '', WYG: 有成正本藴之麟閣副貳藏之名山時司空北海王詳尚書令王肅以其無禄頗相賑餉遂在祕書省同王隱故事白衣修史世宗親政崔光表曰伏見前御史中尉臣李彪夙懐美意創刋魏典臣昔為彪所致與之同業積年其志力貞彊考述無倦督勸羣竂注綴略舉雖頃來契濶多所廢離近蒙収起還綜厥事老而彌厲史才日新若克復舊職專功不殆必能昭明春秋闡成皇籍既先帝厚委宿厯高班纖負微愆應從滌洗愚謂宜申以常伯正綰者作停其外役展其内思研積歳月紀册必就鴻聲巨迹蔚乎有章盛軌懋詠鑠焉無泯矣世宗不許詔彪兼通直散騎常侍行汾州事非彪好也固請不行有司切遣之㑹遘疾累旬景明二年秋}
