  - {type: variant, offset: 1226, length: 3, content: 太常議, WYG: 於洛陽年五十八始彪為中尉號為嚴酷以姦款難得乃為木手擊其脇腋氣絶而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪之病也體上往往瘡潰痛毒備極詔賜帛一百五十匹贈鎮逺將軍汾州刺史}
  - {type: variant, offset: 1226, length: 3, content: 太常議, krp: 於洛陽年五十八始彪為中尉號為嚴酷以姦款難得乃為木手擊其脇腋氣絶而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪之病也體上往往瘡潰痛毒備極詔賜帛一百五十匹贈鎮逺將軍汾州刺史}
  - {type: variant, offset: 1231, length: 3, content: 煬侯詔, WYG: 剛憲彪在祕書嵗餘史業竟未及就然區分書體皆彪之功述春秋三傳合成十卷其所著詩頌賦誄章奏雜筆百餘篇别有集彪雖與宋弁結管鮑之交弁為大中正與高祖私議猶以寒地處之殊不欲微相優假彪亦知之不以為恨及弁卒彪痛之無已為之哀誄備盡辛酸郭祚為吏部彪為子志求官祚仍以舊第處之彪以位經常伯又兼尚書謂祚應以貴遊拔之深用忿怨形於言色時論以此譏祚祚每}
