  - {type: variant, offset: 979, length: 0, content: '', krp: 文成皇帝慨少時師不勤教嘗謂羣臣曰朕始學之日年尚幼沖情未能專既臨萬幾不遑温習今而思之豈唯予咎抑亦師傅之不勤尚書李訢免冠而謝此則近日之可鑒也伏惟太皇太后翼贊高宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬之躋及儲宫誕育復親撫誥日省月課實勞神慮今誠宜準古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈畜倉廩故堯湯水旱人無菜色者蓋由備之有漸積之有素暨于漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畝不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農相切若此頃年山東饑去嵗京師儉内外人庶出入就豐既廢營産疲而乃達又於國體實有虚損若先多積榖安而給之豈有驅督老弱餬口千里之外以今況古誠可懼也臣以為宜析州郡常調九分之二京都度支嵗用之餘各立官司年豐糴積於倉時儉則加私之二糶之於人如此民必力田以買官絹又務貯財以取官粟年登則常積嵗凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃畝之數以贓贖雜物餘財市牛科給令其肆力一夫之田嵗責六十斛蠲其正課并征戍雜役行此二事數年之中則榖積而人足雖災不為害臣又聞前代明主}
  - {type: variant, offset: 980, length: 0, content: '', WYG: 務懐遠人禮賢引滯故漢髙過趙求樂毅之胄晉武廓定旌吳蜀之彦臣謂宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義二可以懐江漢歸有道之情其四曰昔帝舜命咎繇惟刑之恤周公誥成王勿誤于庶獄斯皆君臣相誡重刑之至也今二聖哀矜罪辜小大二情讞決之日多從降恕時不得已必垂惻隱雖前王之勤聽肆赦亦如斯而已至若行刑犯時愚臣竊所未安漢制舊斷獄報重常盡季冬至孝章時改盡十月以育三微後嵗旱論者以十月斷獄隂氣微陽氣泄以故致旱事下公卿尚書陳寵議冬至陽氣始萌故十一月有射干芸荔之應周以為春十二月陽氣上通雉雊雞乳殷以為春十三月陽氣已至蟄蟲皆震夏以為春三微成著以通三統三統之月斷獄流血是不稽天意也月令仲冬之月身欲寜事欲静以起隆怒不可謂寧以行大刑不可謂静章帝善其言卒以十月斷今京都及四方斷獄報重常竟季冬不推三正以育三微寛宥之情每過於昔遵時之憲猶或闕然豈所謂助陽發生垂奉微之仁也誠宜遠稽周典近採漢制天下斷獄起自初秋盡於孟冬不於三統之春行斬絞之刑如此則道協幽顯仁垂後昆矣其五曰古者大臣有坐不亷而廢者不謂之不亷乃曰簠簋不飾此君之所以禮貴臣不明言其過也臣有大譴則白冠㲠纓盤水加劔造室而請死此臣之所以知罪而不敢逃刑也聖朝賔遇大臣禮同古典自太和以降有負罪當陷大辟者多得歸第自盡遣之日深垂隱愍言發悽淚百官莫不見四海莫不聞誠足以感將死之心慰戚屬之情然恩發至𠂻未著永制此愚臣所以敢陳末見昔漢文時人有告丞相周勃謀反者逮繫長安獄頓辱之與皁𨽻同賈誼乃上書極陳君臣之義不宜如是夫貴臣者天子為其改容而體貌之吏人為其俯伏而敬貴之其有罪過廢之可也賜之死可也若束縛之輸之司冦榜笞之小吏詈罵之殆非所以令衆庶見也及將刑也臣則北面再拜跪而自裁天子曰子大夫自有過耳吾遇子有禮矣上不使人抑而刑之也孝文深納其言是後大臣有罪皆自殺不受刑至孝武時稍復入獄良由孝文行之當時不為永制故耳伏惟聖徳慈惠豈與漢文比隆哉今天下有道庶人不議之時臣安可陳瞽言於朝但恐萬世之後繼體之主有若漢武之事焉夫道貴長久所以樹之風聲也法尚不虧所以貽厥孫謀也焉得行恩當時而不著長世之制乎其六曰孝經稱父子之道天性書云孝乎惟孝友于兄弟二經之㫖蓋明一體而同氣可共而不可離者也及其有罪罪不相及者乃君上之厚恩也至若有懼懼應相連者固自然之恒理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色宴安榮位遊從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也昔秦伯以楚人圍江素服而示懼宋仲子以失舉桓譚免冠而謝罪然則子弟之於父兄父兄之於子弟惟其情至豈與結盟相知者同年語其深淺哉二聖清簡風俗孝慈是先臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦厲凡薄使人知有所恥矣其七曰禮云臣有大喪君三年不呼其門此聖人縁情制禮以終孝子之情者也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮于虐秦殆皆泯矣漢初軍旅屢興未能遵古至宣帝時民當從軍屯者遭大父母父母死未满三月皆弗徭役其朝臣喪制未有定聞至後漢元初中大臣有重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢而不行晉時鴻臚鄭黙喪親固請終服武帝感其孝誠遂著令以為常聖魏之初撥亂返正未遑建終喪之制今四方無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懷竊有未盡伏見朝臣丁父憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂緌同節慶之醼傷人子之道虧天地之經愚謂如有遭大父母父母喪者皆聽終服若無其人有曠庶官者則優㫖慰喻起令視事但綜司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆於禮事所宜行也如臣之言少有可採願付有司别為條制高祖覽而}
