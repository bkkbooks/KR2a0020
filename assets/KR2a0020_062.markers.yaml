  - {type: variant, offset: 4493, length: 2406, content: 簡朝議謂為未申復贈安北將軍定州刺史子昂武定中尚書左丞兼度支尚書孝暐弟孝演字則伯出繼伯父性通率美鬚髯姿貌魁傑少無宦情沉浮鄉里河間王琛為定州刺史以為治中晚除瀛州安西府外兵參軍因罷歸及鮮于脩禮起逆孝演率宗屬保郡城為賊攻陷賊以孝演民望恐移衆心乃害之時年四十無子弟孝直以子士遊為後士遊儀同府倉曹參軍孝演弟孝直字叔廉身八尺眉目踈朗早有志尚起家司空行參軍尋為員外散騎侍郎宣威將仍以本官入領直後轉寧遠將軍汝南王開府掾領直寢兄孝芬除荊州詔孝直假征虜將軍別將總羽林二千騎與孝芬俱行孝直潛師徑進賊遂破走孝芬入城後蕭衍將曹義宗仍在馬圈鼓動順陽蠻夷緣邊寇竊孝直率衆禦之賊皆退散還轉直閤將軍通直散騎常侍尒朱兆入洛孝直以天下未寧去職歸鄉里勸督宗人務行禮義後除安東將軍光祿大夫太昌中又除衞將軍右光祿大夫並辭不赴宗親勸孝直曰榮華人之所願何故陸沉孝直不答年五十八卒於鄉里顧命諸子曰吾才疏效薄於國無功若朝廷復加贈諡宜循吾意不得祗受若致干求則非吾子斂以時服祭勿殺生其子皆遵行之有四子長子士順儀同開府行參軍孝直弟孝政字季讓十歲挺亡號哭不絕見者為之悲傷操尚貞立博洽經史雅好辭賦喪紀之禮特所留情衣服制度手能執造太尉汝南王悅辟行參軍年四十九卒子巖武定中員外常侍孝芬兄弟孝義慈厚弟孝演孝政先亡孝芬等哭泣哀慟絕內蔬食容貌損瘠見者傷之孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也鷄鳴而起旦參顏色一錢尺帛不入私房吉凶有須聚對分給諸婦亦相親愛有無共之始挺兄弟同居孝芬叔振既亡之後孝芬等奉承叔母李氏若事所生旦夕溫凊出入啟覲家事巨細一以諮決每兄弟出行有獲財物尺寸已上皆內李氏之庫四時分賚李自裁之如此者二十餘歲撫從弟宣伯子朗如同氣焉挺弟振字延根少有學行居家孝友為宗族所稱自中書學生為祕書中散在內謹敕為高祖所知出為冀州咸陽王禧驃騎府司馬在任久之太和二十年遷建威將軍平陽太守不拜轉高陽內史高祖南討徵兼尚書左丞留京振既才幹被擢當世以為榮後改定職令振本資惟擬五品詔曰振在郡著績宜有褒升除太子庶子景明初除長兼廷尉少卿振有公斷以明察稱河內太守陸琇與咸陽王禧同謀為逆禧敗事發振窮治之時琇內外親黨及當朝貴要咸為之言振研覈切至終無縱緩遂斃之於獄其奉法如此正始初除龍驤將軍肆州刺史在任有政績還朝除河東太守永平中卒於郡時年五十九贈本將軍南兗州刺史諡曰定振歷官四十餘載考課為稱職議者善之長子宣伯早喪子勁字仲括驃騎參軍宣伯弟子朗美容貌涉獵經史少溫厚有風尚以軍功起家襄威將軍員外散騎侍郎普泰中從兄孝芬為荊州請為車騎府司馬孝芬轉西兗州為驃騎府司馬太昌初冠軍將軍北徐州撫軍府長史固辭不獲免興和二年中尉高仲密引為侍御史尋加平西將軍武定中卒子道綱挺從父弟元珍釋褐司徒行參軍稍遷司徒主簿趙郡王幹開府屬景明中荊州長史久之為司徒從事中郎有公平稱後遷中散大夫加征虜將軍正光末山胡作逆除平陽太守假右將軍為別將以討之頻破胡賊郡內以安武泰初改郡為唐州仍除元珍為刺史加右將軍以破胡勳賜爵涼城侯尒朱榮之趣洛也遣其都督樊子鵠取唐州元珍與行臺酈惲拒守不從為子鵠所陷被害世咸痛之子叔恭挺從父弟瑜之字仲璉少孤有學業太和中釋褐奉朝請廣陵王羽常侍累歷蕃佐入為司空功曹參軍事太尉主簿遷冀州撫軍府長史後為揚州平東府長史帶南梁太守蕭衍義州刺史文僧明來降瑜之迎接有勳賜爵高邑男孝昌初除鴻臚少卿三年卒年五十六贈平北將軍瀛州刺史有三子長子孟舒字長才襲父爵累遷平東將軍太中大夫興和中除廣平太守卒贈中軍將軍殷州刺史贈平東將軍諡曰康孟舒弟仲舒武定末鄴縣令仲舒弟季舒給事黃門侍郎挺從祖弟脩和州主簿子儉字元恭雅有器度歷太學博士終於符璽郎中儉弟緒字仲穆定州撫軍府法曹參軍緒小弟孝忠侍御史祕書郎並有容貌無他才識緒子子謙尚書郎子謙弟子讓與侯景同反子謙坐以囚執遇病死於晉陽子讓弟子廉等並伏法脩和弟敬邕性長者有幹用高祖時自司徒主簿轉尚書都官郎中所在稱職遷太子步兵校尉景明初母憂去職後中山王英南討引為都督府長史加左中郎將以功賜爵臨淄男遷龍驤將軍太府少卿以本將軍出除營州刺史庫莫奚國有馬百匹因風入境敬邕悉令送還於是夷人感附熙平二年拜征虜將軍太中大夫神龜中卒年五十七贈左將軍濟州刺史諡曰恭子子盛襲爵除奉朝請脩和從弟接字顯賓容貌魁偉放邁自高不拘常檢為中書博士樂陵內史雅為任城王澄所禮待及澄為定州刺史接了無民敬王忻然容下之後為冀州安東府司馬轉樂陵太守還鄉而卒挺族子纂字叔則博學有文才景明中太學博士轉員外散騎侍郎襄威將軍既不為時知乃著無談子論後為給事中延昌中除梁州征虜府長史熙平初為寧遠將軍廷尉正每於大獄多所據明有當官之譽時太原王靜自廷尉監遷少卿纂居其下乃與靜書辭氣抑揚無上下之體又啟求解任乃除左中郎將領尚書三公郎中未幾以公事免後為洛陽令正光中卒年四十五贈司徒左長史凡所製文多行於世長子史武定末儀同府長流參軍纂兄穆寬雅有度量州辟主簿卒子暹武定末度支尚書兼右僕射纂弟融字脩業奉朝請尚書令高肇出討巴蜀引為統軍還除員外散騎侍郎正光中定州別駕年四十二卒子鴻翻郡功曹纂從祖弟遊字延叔少有風概釋褐奉朝請稍遷太尉主簿江州刺史陳伯之啟為司馬還除奉車都尉大都督中山王英征義陽引為錄事參軍尋轉司馬及英敗於鍾離遊坐徙秦州久而得還大將軍高肇西征引為統軍除步兵校尉遷豫州征虜府長史未幾除征虜將軍北趙郡太守並有政績熙平末轉河東太守郡有鹽戶常供州郡為兵子孫見丁從役遊矜其勞苦乃表聞請聽更代郡內感之太學舊在城內遊乃移置城南閑敞之處親自說經當時學者莫不勸慕號為良守以本將軍遷涼州刺史以母憂解任正光中起除右將軍南秦州刺史固辭不免先是州人楊松柏楊洛德兄弟數為反叛遊至州深加招慰松柏歸款引為主簿稍以辭色誘之兄弟俱至松柏既州之豪帥感遊恩遇奬諭羣氐咸來歸款且以過在前政不復自疑遊乃因宴會一時俱斬於是外人以其不信合境皆反正光五年夏秦州城人殺刺史李彥據州為逆數日之後遊知必不安謀欲出外尋為城人韓祖香孫言攻於州館遊事窘登樓慷慨悲歎乃推下小女而殺之義不為羣小所辱也尋為祖香等所執害時年五十二永安中贈散騎侍郎鎮北將軍定州刺史子伏護開府參軍, WYG: 閔}
