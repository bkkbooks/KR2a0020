  - {type: variant, offset: 1202, length: 4, content: 稽命處刑, WYG: 肅等許為左右彪乃表曰臣聞龍圖出而皇道明龜書見而帝徳昶斯實㝠中之書契也自瑞官文而卑高陳民師建而賤貴序此乃人間之繩式也是以唐典篆欽明之册虞書銘眘徽之篇傳著夏氏之箴詩錄商家之頌斯皆國史明乎得失之迹也逮于周姬鑒乎二代文王開之以兩經公旦申之以六聯郁乎其文典章大略也故觀雅頌識文武之丕烈察歌音辨周公之至孝是以季札聽風而知始基聽頌而識盛徳至若尼父之别魯籍丘明之辨孔志可謂婉而成章盡而不汚者矣自餘乘志之比其亦有趣焉暨史班之錄乃文窮於秦漢事盡於哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類}
  - {type: page-break, offset: 1202, content: '', id: KR2a0020_WYG_062-18b, image: WYG0261/WYG0261-0855b.png}
  - {type: variant, offset: 1202, length: 4, content: 稽命處刑, krp: 肅等許為左右彪乃表曰臣聞龍圖出而皇道明龜書見而帝徳昶斯實㝠中之書契也自瑞官文而卑高陳民師建而賤貴序此乃人間之繩式也是以唐典篆欽明之册虞書銘眘徽之篇傳著夏氏之箴詩錄商家之頌斯皆國史明乎得失之迹也逮于周姬鑒乎二代文王開之以兩經公旦申之以六聯郁乎其文典章大略也故觀雅頌識文武之丕烈察歌音辨周公之至孝是以季札聽風而知始基聽頌而識盛徳至若尼父之别魯籍丘明之辨孔志可謂婉而成章盡而不汚者矣自餘乘志之比其亦有趣焉暨史班之錄乃文窮於秦漢事盡於哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類}
