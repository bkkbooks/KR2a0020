  - {type: variant, offset: 1194, length: 0, content: '', WYG: 曰崔光之博李彪之直是我國家得賢之基車駕南伐彪兼度支尚書與僕射李沖任城王等參理留臺事彪素性剛豪與沖等意議乖異遂形於聲色殊無降下之心自謂身為法官莫能糾劾己者遂多專恣沖積其前後罪過乃於尚書省禁止彪上表曰臣聞範國匡人光化昇治輿服典章理無暫失故晉文功建九合猶見抑於請隧季氏藉政三世尚受譏於璵璠固知名器之重不可以妄假先王既憲章於古陛下又經綸於今用能車服有叙禮物無墜案臣彪昔於凡品特以才㧞等望清華司文東觀綢繆恩眷繩直憲臺左加金璫右珥蟬冕闕東省宜感恩厲節忠以報徳而竊名忝職身為違傲矜勢高亢公行僭逸坐與禁省冒取官材輙駕乘黄無所憚懾肆志傲然愚聾視聽此而可忍誰不可懐臣輙集尚書以下令史以上并治書侍御史臣酈道元等於尚書都座以彪所犯罪狀告彪訊其虚實若或不知湏訊部下彪答臣言事見在目實如所劾皆彪所知何湏復召部下臣今請以見事免彪所居職付廷尉治獄沖又表曰臣與彪相識以來垂二十載彪始南使之時見其色厲辭辯才優學博臣之愚識謂是拔萃之一人及彪位宦升達參與言燕聞彪評章古今商略人物興言於侍筵之次啓論於衆英之中賞忠識正發言懇惻惟直是語辭無隱避雖復諸王之尊近侍之要至有是非多面抗折酷疾矯詐毒諐非違厲色正辭如鷹鸇之逐鳥雀懔懔然實似公清之操臣雖下才輙亦尚其梗槩欽其正直微識其褊急之性而不以為瑕及其初登憲臺始居司直首復騶唱之儀肇正直繩之體當時識者僉以為難而彪秉志信行不避豪勢其所彈劾應弦而倒赫赫之威振於下國肅肅之稱著自京師天下改目貪暴歛手臣時見其所行信謂言行相符忠清内發然時有私於臣云其威暴者臣以直䋲之官人所忌疾風謗之際易生音謡心不承信往年以河陽事曽與彪在領軍府共太尉司空及領軍諸卿等集閲廷尉所問囚徒時有人訴枉者二公及臣少欲聽採語理未盡彪便振怒東坐攘袂揮赫口稱賊奴叱吒左右髙聲大呼云南臺中取我木手去搭奴肋折雖有此言終竟不取即言南臺所問唯恐枉活終無枉死但可依此時諸人以所枉至重有首實者多又心難彪遂各嘿爾因縁此事臣遂心疑有濫審加情察知其威虐猶未體其採訪之由訊檢之狀商略而言酷急小罪肅禁為大㑹而言之猶謂益多損少故懷寢所疑不以申徹實失為臣知無不聞之義及去年大駕南行以來彪兼尚書日夕共事始乃知其言與行舛是己非人專恣無忌尊身忽物安以身作之過深劾他人己方事人好人佞已聽其言同振古忠恕之賢校其行是天下佞暴之賊臣與任城卑躬曲己若順弟之奉暴兄其所欲者事雖非理無不屈從依事求實悉有成驗如臣列得實宜殛彪於有北以除姦矯之亂政如臣無證宜投臣於四裔以息青蠅之白黒高祖在懸瓠覽表歎愕曰何意留京如此也有司處彪大辟高祖恕之除名而已彪尋歸本鄉高祖自懸瓠北幸鄴彪拜迎於鄴南高祖曰朕之期卿每以貞松為志嵗寒為心卿應報國盡身為用而近見彈文殊乖所以卿罹此䜛為朕與卿為宰事與卿為卿自取彪對曰臣愆由已至罪自身招實非陛下横與臣罪又非宰事無辜濫臣臣罪既如此宜伏東臯之下不應遠點屬車之塵但伏承聖躬不豫臣肝膽塗地是以敢至非謝罪而來高祖納宋弁言將復採用㑹留臺表言彪與御史賈尚往窮庶人恂事理有誣抑}
