  - {type: page-break, offset: 1221, content: '', id: KR2a0020_WYG_062-21a, image: WYG0261/WYG0261-0856c.png}
  - {type: variant, offset: 1221, length: 0, content: '', krp: 之十一年先帝先后遠惟景業綿綿休烈若不恢史闡錄懼上業茂功始有缺矣於是召名儒之士充麟閣之選于時忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓高祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢制作於此者恐閨門既異出入生疑弦柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢簡牘弗張其於書功録美不其闕歟伏惟孝文皇帝承天地之寳崇祖宗之業景功未就奄焉崩殞凡百黎萌若無天地賴遇陛下體明叡之眞應保合之量恢大明以燭物履靜恭以安邦天清其氣地樂其静不愆不忘率由舊章可謂重明疊聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理於有象盡性於衆變可謂日月出矣無幽不燭也記曰善流者欲人繼其行善歌者欲人繼其聲故傳曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖達今王之懿美洞鑒準之前代其徳靡悔也時哉時哉可不光昭哉合徳二儀者先皇之陶鈞也齊明日月者先皇之洞照也慮周四時者先皇之茂功也合契神鬼者先皇之𤣥燭也遷都改邑者先皇之達也變是協和者先皇之鑒也思同書軌者先皇之遠也守在四夷者先皇之略也海外有截者先皇之威也禮田岐陽者先皇之義也張樂岱郊者先皇之仁也鑾幸幽漠者先皇之智也燮伐南荆者先皇之禮也升中告成者先皇之肅也親䖍宗社者先皇之敬也袞實無闕者先皇之徳也開物成務者先皇之貞也觀乎人文者先皇之藴也革弊創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功}
  - {type: variant, offset: 1223, length: 0, content: '', WYG: 加以謙尊而光為而弗有可謂四三皇而六五帝矣誠宜功書於竹素聲播於金石臣竊謂史官之達者大則與日月齊明小則與四時並茂其大者孔子左丘是也小者史遷班固是也故能聲流於無窮義昭於來裔是以金石可滅而流風不泯者其唯載籍乎諺曰相門有相將門有將斯不唯其性蓋言習之所得也竊謂天文之官太史之職如有其人宜其世矣故尚書稱羲和世掌天地之官張衡賦曰學乎舊史氏斯蓋世傳之義也若夫良冶之子善知為裘良弓之子善知為箕物豈有定習貫則知耳所以言及此者史職不修事多淪曠天人之際不可湏臾闕載也是以談遷世事而功立彪固世事而名成道爭乃前鑒之軌轍後鏡之蓍龜也然前代史官之不終業者有之皆陵遲之世不能容善是以平子去史而成賦伯喈違閣而就志近僭晉之世有佐郎王隱為著作虞預所毁亡官在家晝則樵薪供爨夜則觀文屬綴集成晉書存一代之事司馬紹勅尚書唯給筆札而已國之大籍成於私家末世之弊乃至如此史官之不遇時也今大魏之史職則身貴禄則親榮優哉游哉式榖爾休矣而典謨弗恢者其有以也而故著作漁陽傅毗北平陽尼河間邢産廣平宋弁昌黎韓顯宗等並以文才見舉注述是同皆登年不永弗終茂績前著作程靈虬同時應舉共掌此務今從他職官非所司唯崔光一人雖不移任然侍官兩兼故載述致闕臣聞載籍之興由於大業雅頌垂薦起於徳美雖時有文質史有備略然歴世相仍不改此度也昔史談誡其子遷曰當世有美而不書汝之罪也是以久而見美孔明在蜀不以史官留意是以久而受譏取之深衷史談之志賢亮遠矣書稱無曠庶官詩有職思其憂臣雖今非所司然昔忝斯任故不以草茅自疏敢言及於此語曰患為之者不必知知之者不得為臣誠不知彊欲為之耳竊尋先朝賜臣名彪者遠則擬漢史之叔皮近則凖晉史之紹統推名求義欲罷不能荷恩佩澤死而後已今求都下乞一靜處綜理國籍以終前志官給事力以充所湏雖不能光啓大録庶不為飽食終日耳近則期月可就遠則}
