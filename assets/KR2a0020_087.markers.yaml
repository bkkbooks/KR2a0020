  - {type: variant, offset: 4164, length: 855, content: 性和厚恭慎每讀書見韋弦之事深薄之危乃圖古昔可以鑒戒指事為象讚而述之曰周雅云謂天蓋高不敢不跼謂地蓋厚不敢不蹐有朝隱大夫監戒斯文乃惕焉而懼曰夫道喪則性傾利重則身輕是故乘和體遜式銘方冊防微慎獨載象丹青信哉辭人之賦文晦而理明仰瞻高天聽卑視諦俯測厚地岳峻川渟誰其戴之不私不畏誰其踐之不陷不墜故善惡是徵物罔同異論亢匪久人咸敬忌嗟乎唯地厚矣尚亦兢兢浩浩名位孰識其親搏之弗得聆之無聞故有戒於顯而急乎微好爵是冒聲奢是基身陷於祿利言溺於是非或求欲而未厭或知足而不辭是故位高而勢愈迫正立而邪愈欺安有位極而危不萃邪榮而正不凋故悔多於地厚禍甚於天高夫悔未結誰肯曲躬夫禍未加誰肯累足固機發而後思圖車覆而後改躅改之無及故狡兔失穴思之在後故逆鱗易觸君子則不然體舒則懷卷視溺則思濟原夫人之度足蘭於無階之天勢位之危深於不測之地餌厚而躬不競爵降而心不係守善於已成懼愆於未敗雖盈而戒沖通而慮滯以知命為遐齡以樂天為大惠以戢智而從時以懷愚而遊世曲躬焉累足焉苟行之晝已決矣猶夜則思其計誦之口亦明矣故心必賞其契故能不同不誘而弭謗於羣小無毀無譽而貽信於上帝託身與金石俱堅立名與天壤相弊囂競無侵優遊獨逝夫如是故綺閣金門可安其宅錦衣玉食可頤其形柳下三黜不慍其色子文三陟不喜其情而惑者見居高可以持勢欲乘高以據榮見直道可以修己欲專道以邀聲夫去聲然後聲可立豈矜道之所宣慮危然後安可固豈假道之所全是以君子鑒恃道不可以流聲故去聲而懷道鑒專道不可以守勢故去勢以崇道何者履道雖高不得無亢求聲雖道不得無悔然則聲奢繁則實儉凋功業進則身迹退如此則精靈遂越驕侈自親情與道絕事與勢隣方欲役思以持勢乘勢以求津故利欲誘其情禍難嬰其身利欲交則幽明以之變禍難構則智術無所陳若然者雖縻爵帝扃焉得而寧之雖結珮皇庭焉得而榮之故身道未究而崇邪之徑已形成功未立而修正之術已生福祿交蹇於人事屯難頓萃於時情忠介剖心於白日耿節沉骨於幽靈因斯愚智之所機倚伏之所係全亡之所依其在遜順而已哉嗚呼鑒之嗚呼鑒之景所著述數百篇見行於世刪正晉司空張華博物志及撰儒林列女傳各數十篇云長子昶少學識有文才早卒昶弟彪之永安中司空行參軍, WYG: 閭}
