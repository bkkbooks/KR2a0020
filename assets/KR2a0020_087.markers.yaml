  - {type: variant, offset: 1466, length: 673, content: 尚書左僕射司徒公冀州刺史瑩以文學見重常語人云文章須自出機杼成一家風骨何能共人同生活也蓋譏世人好偷竊他文以為己用而瑩之筆札亦無乏天才但不能均調玉石兼有製裁之體減於袁常焉性爽俠有節氣士有窮厄以命歸之必見存拯時亦以此多之其文集行於世子珽字孝徵襲常景字永昌河內人也父文通天水太守景少聰敏初讀論語毛詩一受便覽及長有才思雅好文章廷尉公孫良舉為律博士高祖親得其名既而用之後為門下錄事太常博士正始初詔尚書門下於金墉中書外省考論律令敕景參議世宗季舅護軍將軍高顯卒其兄右僕射肇私託景及尚書邢巒幷州刺史高聰通直郎徐紇各作碑銘並以呈御世宗悉付侍中崔光簡之光以景所造為最乃奏曰常景名位乃處諸人之下文出諸人之上遂以景文刊石肇尚平陽公主未幾主薨肇欲使公主家令居廬制服付學官議正施行尚書又以訪景景以婦人無專國之理家令不得有純臣之義乃執議曰喪紀之本實稱物以立情輕重所因亦緣情以制禮雖理關盛衰事經今古而制作之本降殺之宜其實一焉是故臣之為君所以資敬而崇重為君母妻所以從服而制義然而諸侯大夫之為君者謂其有地土有吏屬無服文者言其非世爵也今王姬降適雖加爵命事非君邑理異列土何者諸王開國備立臣吏生有趨奉之勤死盡致喪之禮而公主家令唯有一人其丞已下命之屬官既無接事之儀實闕為臣之禮原夫公主之貴所以立家令者蓋以主之內事脫須關外理無自達必也因人然則家令唯通內外之職及典主家之事耳無關君臣之理名義之分也由是推之家令不得為純臣公主不可為正君明矣且女人之為君男子之為臣古禮所不載先朝所未議而四門博士裴道廣孫榮乂等以公主為之君以家令為之臣制服以斬乖謬彌甚又張虛景吾難羈等不推君臣之分不尋致服之情猶同其議準母制, WYG: ''}
