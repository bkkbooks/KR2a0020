  - {type: variant, offset: 919, length: 429, content: 王勰法曹行參軍高祖顧謂勰曰蕭賾以王元長為子良法曹今為汝用祖瑩豈非倫匹也敕令掌勰書記瑩與陳郡袁翻齊名秀出時人為之語曰京師楚楚袁與祖洛中翩翩祖與袁再遷尚書三公郎尚書令王肅曾於省中詠悲平城詩云悲平城驅馬入雲中陰山常晦雪荒松無罷風彭城王勰甚嗟其美欲使肅更詠乃失語云王公吟詠情性聲律殊佳可更為誦悲彭城詩肅因戲勰云何意悲平城為悲彭城也勰有慚色瑩在座即云所有悲彭城王公自未見耳肅云可為誦之瑩應聲云悲彭城楚歌四面起屍積石梁亭血流睢水𩹉肅甚嗟賞之勰亦大悅退謂瑩曰即定是神口今日若不得卿幾為吳子所屈為冀州鎮東府長史以貨賄事發除名後侍中崔光舉為國子博士仍領尚書左戶部李崇為都督北討引瑩為長吏坐截沒軍資除名未幾為散騎侍郎孝昌中於廣平王第掘得古玉印敕召瑩與黃門侍郎李琰之令辨何世之物瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時人稱為博物累遷國子祭酒領給事黃門侍郎幽州大中正監起居事又監議事元顥入洛以瑩為殿中尚書莊帝還宮坐為顥作詔罪狀尒朱榮免官後除祕書監中正如故以參議律曆賜爵容, WYG: 戍主方}
