  - {type: variant, offset: 2140, length: 957, content: 求之名實理未為允竊謂公主之爵既非食菜之君家令之官又無純臣之式若附如母則情義罔施若準小君則從服無據案如經禮事無成文即之愚見謂不應服朝廷從之景淹滯門下積歲不至顯官以蜀司馬相如王褒嚴君平揚子雲等四賢皆有高才而無重位乃託意以讚之其讚司馬相如曰長卿有艷才直致不羣性鬱若春煙舉皎如秋月映遊梁雖好仁仕漢常稱病清貞非我事窮達委天命其讚王子淵曰王子挺秀質逸氣干青雲明珠既絕俗白鵠信驚羣才世苟不合遇否途自分空枉碧鷄命徒獻金馬文其讚嚴君平曰嚴公體沉靜立志明霜雪味道綜微言端蓍演妙說才屈羅仲口位結李強舌素尚邁金貞清標陵玉徹其讚揚子雲曰蜀江導清流揚子挹餘休含光絕後彥覃思邈前修世輕久不賞玄談物無求當途謝權寵置酒獨閑遊景在樞密十有餘年為侍中崔光盧昶游肇元暉尤所知賞累遷積射將軍給事中延昌初東宮建兼太子屯騎校尉錄事皆如故其年受敕撰門下詔書凡四十卷尚書元萇出為安西將軍雍州刺史請景為司馬以景階次不及除錄事參軍襄威將軍帶長安令甚有惠政民吏稱之先是太常劉芳與景等撰朝令未及班行別典儀注多所草創未成芳卒景纂成其事及世宗崩召景赴京還修儀注拜謁者僕射加寧遠將軍又以本官兼中書舍人後授步兵校尉仍舍人又敕撰太和之後朝儀已施行者凡五十餘卷時靈太后詔依漢世陰鄧二后故事親奉廟祀與帝交獻景乃據正以定儀注朝廷是之正光初除龍驤將軍中散大夫舍人如故時肅宗行講學之禮於國子寺司徒崔光執經敕景與董紹張徹馮元興王延業鄭伯猷等俱為錄義事畢又行釋奠之禮並詔百官作釋奠詩時以景作為美是年九月蠕蠕主阿那瓌歸闕朝廷疑其位次高陽王雍訪景景曰昔咸寧中南單于來朝晉世處之王公特進之下今日為班宜在蕃王儀同三司之間雍從之朝廷典章疑而不決則時訪景而行初平齊之後光祿大夫高聰徙於北京中書監高允為之娉妻給其資宅聰後為允立碑每云吾以此文報德足矣豫州刺史常綽以未盡其美景尚允才器先為遺德頌司徒崔光聞而觀之尋味良久乃云高光祿平日每矜其文自許報允之德今見常生此頌高氏不得獨擅其美也侍中崔光安豐王延明受詔議定服章敕景參修其事尋進號冠軍將軍阿那瓌之還國也境上遷延仍陳窘乏遣尚書左丞元孚奉詔振恤阿那瓌執孚過柔玄奔于漠北遣尚書令李崇御史中尉兼右僕射元纂追討不及乃令景出塞經山臨瀚海宣敕勒衆而返景經涉山水悵然懷古乃擬劉琨扶風歌十二首進號征虜將軍孝昌初兼給事黃門侍郎尋除左將軍太府少卿仍舍人固辭少卿不拜改授散騎常侍將軍如故徐, WYG: ''}
