  - {type: variant, offset: 679, length: 0, content: '', WYG: 應謝所任閭對曰昔蠕蠕主敦崇和親其子不遵父志屢犯邊境如臣愚見謂不宜弔髙祖曰敬其父則子悅敬其君則臣悅卿云不合弔慰是何言歟閭遂引愆免冠謝罪高祖謂閭曰蠕蠕使牟提小心恭慎甚有使人之禮同行疾其敦厚每至陵辱恐其還北必被謗誣昔劉準使殷靈誕每禁下人不為非禮之事及其還國果被譖愬以致極刑今為㫖書可明牟提忠於其國使蠕蠕主知之是年冬至高祖文明太后大饗羣官高祖親舞於太后前羣臣皆舞高祖乃歌仍率羣臣再拜上夀閭進曰臣聞大夫行孝行合一家諸侯行孝聲著一國天子行孝徳被四海今陛下聖性自天敦行孝道稱觴上夀靈應無差臣等不勝慶踊謹上千萬歲夀高祖大悅賜羣臣帛人三十匹又議政於皇信堂高祖曰百揆多途萬幾事猥未周之闕卿等宜有所陳閭對曰臣伏思太皇太后十八條之令及仰尋聖朝所行事周於百揆理兼於庶務孔子至聖三年有成子産治鄭歴載乃就今聖化方宣風政驟改行之積久自然致治理之必明不患事闕又為政之道終始若一民可使由之不可使知之政令既宣若有不合於民者因民之心而改之願終成其事使至教必行臣反覆三思理畢於此不知其他但使今之法度必理必明必行必久勝殘去殺可不逺而致高祖曰刑法者王道之所用何者為法何者為刑施行之日何先何後閭對曰臣聞刑制立會軌物齊衆謂之法犯違制約致之於憲謂之刑然則法必先施刑必後著自鞭杖己上至於死罪皆謂之刑刑者成也成而不可改髙祖曰論語稱冉子退朝孔子問曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之何者是政何者為事閭對曰臣聞政者君上之所施行合於法度經國治民之屬皆謂之政臣下奉教承㫖作而行之謂之事然則天下大同風軌齊一則政出於天子王道衰則政出於諸侯君道缺則政出於大夫故詩敘曰王道衰政教失則國異政家殊俗政者上之所行事者下之所奉高祖曰若君命為政子夏為莒父宰問政此應奉命而已何得稱政尚書游明根曰子夏宰民故得稱政帝善之十四年秋閭上表曰奉癸未詔書以春夏少雨憂饑饉之方臻愍黎元之傷瘁同禹湯罪已之誠齊堯舜引咎之徳虞災致懼詢及卿士令各上書極陳損益深恩被於蒼生厚惠流于后土伏惟陛下天啟聖姿利見纂極欽若昊天光格宇宙太皇太后以叡哲賛世稽合三才高明柔克道被無外七政昭宣於上九功咸序於下君人之量逾高謙光之㫖彌篤修復祭儀宗廟所以致敬飾正器服禮樂所以宣和増儒官以重文徳簡勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦宄置鄰黨以穆之究庶官之勤劇班俸祿以優之知勞逸之難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絶讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降鑒在下休咎之徴咸由人召故帝道昌則九疇敘君徳衰而彜倫斁休瑞並應享以五福則康于其邦咎徴屢臻罰以六極則害于其國斯乃洪範之實徴神祇之明驗及其厄運所纒世鍾陽九數乖於天理事違於人謀時則有之矣故堯湯逢歴年之災周漢遭水旱之患然立功修行終能弭息今考治則有如此之風計運未有如彼之害而陛下殷勤引過事邁前王從星澍雨之徴指辰可必消災滅禍之符灼然自見雖王畿之内頗為少雨關外諸方禾稼仍茂茍勤之以禮綏之以和一歲不收未為大損但豫備不虞古之善政安不忘危有國常典竊以北鎮新徙家業未就思親戀本人有愁心一朝有事難以禦敵可寛其往來頗使欣慰開雲中馬城之食以賑恤之足以感徳致力邊境矣明察畿甸之民飢甚者出靈邱下館之粟以救其乏可以安慰孤貧樂業保土使幽定安并四州之租隨運以溢其處開關㢮禁薄賦賤糴以消其費清道路恣其東西隨豐逐食貧富相贍可以免度凶年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄凶儉之年民輕違犯可緩其使役急其禁令宜於未然之前申敕外牧又一夫幽枉王道為虧京師之獄或恐未盡可集見囚於都曹使明折庶獄者重加究察輕者即可決遣重者定状以聞罷非急之作放無用之獸此乃救凶之常法且以見憂於百姓論語曰不患貧而患不安茍安而樂生雖遭凶年何傷於民庶也愚臣所見如此而已詔曰省表聞之當敕有司依此施行後詔聞與太常採雅樂以營金石又領廣陵王師出除鎮南將軍相州刺史以參定律令之勤賜布帛千匹粟一千斛牛馬各三閭上疏陳伐吴之策高祖納之遷都洛陽閭表諌言遷有十損必不獲已請遷於鄴高祖頗嫌之蕭鸞雍州刺史曹虎據襄陽請降詔劉昶薛真度等四道南伐車駕親幸懸瓠閭表諫曰洛陽草創虎既不遣質任必非誠心無宜輕舉高祖不納虎果虗詐諸將皆無功而還高祖攻鍾離未剋將於淮南修故城而置鎮戍以撫新附之民賜閭璽書具論其状閭表曰南土亂亡僣主屢易陛下命將親征威陵江左望風慕化剋拔數城施恩布徳携民襁負可謂澤流邊方威惠普著矣然元非大舉軍興後時本為迎降戎卒實少兵法十則圍之倍則攻之所率既寡東西懸濶難以並稱伏承欲留戍淮南招撫新附昔世祖以回山倒海之威歩騎數十萬南臨𤓰歩諸郡盡降而盱眙小城攻而弗剋班師之日兵不戍一郡土不闢一廛夫豈無人以大鎮未平不可守小故也堰水先塞其源伐木必拔其本源不塞本不拔雖翦枝竭流終不可絶矣夀陽盱眙淮隂淮南之源本也三鎮不剋其一而留兵守郡不可自全明矣既逼敵之大鎮隔深淮之險少置兵不足以自固多留衆糧運難可充又欲附渠}
