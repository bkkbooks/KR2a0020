  - {type: variant, offset: 677, length: 1, content: 爵, WYG: 其凶業頻為宼擾為惡不悛自相違叛如臣愚見宜興軍討之雖不頓除巢穴且以挫其醜勢閭曰昔漢時天下一統故得窮追北狄今南有胡宼不宜懸軍深入高祖曰先朝屢興征伐者以有未賔之虜朕承太平之基何為摇動兵革夫兵者凶器聖王不得已而用之便可停也高祖又曰今欲遣蠕蠕使還應有書問以不羣臣以為宜有乃詔閭為書於時蠕蠕國有喪而書不敘凶事髙祖曰卿為中書監職典文詞所造㫖書不論彼之凶事若知而不作罪在灼然若情思不}
