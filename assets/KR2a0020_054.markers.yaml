  - {type: variant, offset: 673, length: 0, content: '', WYG: 家給人足禮讓可得而生但亷清之人不必皆富豐財之士未必悉賢今給其俸則清者足以息其濫竊貪者足以感而勸善若不班祿則貪者肆其姦情清者不能自保難易之驗灼然可知如何一朝便欲去俸淮南之議不亦謬乎詔從閭議高祖又引見王公已下於皇信堂高祖曰政雖多途治歸一體朕每蒙慈訓猶自昧然誠知忠佞有損益而未識其異同恒懼忠貞見毁佞人便進寤寐思此如有隐憂國彦朝賢休戚所共宜辨斯真偽以釋朕懐尚書游明根對曰忠佞之士實亦難知依古爵人先試之以官官定然後祿之三載考績然後忠佞可明閭曰竊謂袁盎徹慎夫人席是其忠譖殺晁錯是其佞若以異人言之望之為忠石顯是佞高祖曰自非聖人忠佞之行時或互有但忠功顯即謂之忠佞迹成斯謂之佞史官據成事而書於今觀之有别明矣朕所問者未然之前卿之所對已然之後閭曰佞者飾智以行事忠者發心以附道譬如玉石皦然可知高祖曰玉石同體而異名忠佞異名而同理求之於同則得其所以異尋之於異則失其所以同出處同異之間交換忠佞之境豈是皦然易明哉或有託佞以成忠或有假忠以飾佞如楚子綦後事顯忠初非佞也閭曰子綦諌楚初雖隨述終致忠言此適欲㡬諌非為佞也子綦若不設初權後忠無由得顯高祖善閭對閭後上表曰臣聞為國之道其要有五一曰文徳二曰武功三曰法度四曰防固五曰刑賞故逺人不服則修文徳以來之荒狡放命則播武功以威之民未知戰則制法度以齊之暴敵輕侵則設防固以禦之臨事制勝則明刑賞以勸之用能闢國寜方征伐四剋北狄悍愚同於禽獸所}
