  - {type: variant, offset: 670, length: 0, content: '', WYG: 固安貞子閭早孤少好學博綜經史文才儁偉下筆成章本名驢司徒崔浩見而竒之乃改為閭而字焉真君九年徵拜中書博士和平末遷中書侍郎高宗崩乙渾擅權内外危懼文明太后臨朝誅渾引閭與中書令高允入於禁内參決大政賜爵安樂子加南中郎將與鎮南大將軍尉元南赴徐州閭先入彭城收管籥元表閭以本官領東徐州刺史與張讜對鎮團城後還京城以功進爵為侯加昭武將軍顯祖傳位徙御崇光宫閭上表頌曰臣聞刑制改物者應天之聖君齷齪順常者守文之庸主故五帝異規而化興三王殊禮而致治用能憲章萬祀垂範百王歴葉所以挹其遺風後君所以酌其軌度伏惟太上皇帝道光二儀明齊日月至徳潛通武功四暢霜威南被則淮徐來同齊斧北斷則獫狁覆斃西摧三危之酋東引肅慎之貢荒遐欵塞九}
  - {type: page-break, offset: 670, content: '', id: KR2a0020_WYG_054-3a, image: WYG0261/WYG0261-0732a.png}
  - {type: variant, offset: 670, length: 0, content: '', krp: 固安貞子閭早孤少好學博綜經史文才儁偉下筆成章本名驢司徒崔浩見而竒之乃改為閭而字焉真君九年徵拜中書博士和平末遷中書侍郎高宗崩乙渾擅權内外危懼文明太后臨朝誅渾引閭與中書令高允入於禁内參決大政賜爵安樂子加南中郎將與鎮南大將軍尉元南赴徐州閭先入彭城收管籥元表閭以本官領東徐州刺史與張讜對鎮團城後還京城以功進爵為侯加昭武將軍顯祖傳位徙御崇光宫閭上表頌曰臣聞刑制改物者應天之聖君齷齪順常者守文之庸主故五帝異規而化興三王殊禮而致治用能憲章萬祀垂範百王歴葉所以挹其遺風後君所以酌其軌度伏惟太上皇帝道光二儀明齊日月至徳潛通武功四暢霜威南被則淮徐來同齊斧北斷則獫狁覆斃西摧三危之酋東引肅慎之貢荒遐欵塞九}
  - {type: variant, offset: 671, length: 0, content: '', WYG: 宅心於是從容閑覽希心𤣥奥尚鼎湖之竒風崇巢由之高潔疇咨熙載亮采羣后爰挹大位傳祚聖人開古之高範爰萃於一朝曠葉之希事載見於今日昔唐堯禪舜前典大其成功太伯讓季孔子稱其至徳苟位以聖傳臣子一也謹上至徳頌一篇其詞曰茫茫太極悠悠遐古三皇刑制五帝垂祜仰察璿璣俯鑒后土雍容端拱惟徳是與夏殷世傳周漢纂烈道風雖邈仍誕明哲爰暨三季下凌上替九服三分禮樂四缺上靈降鑒思皇反正乃眷有魏配天承命功冠前王徳侔往聖移風革俗天保載定於穆太皇克廣聖度𤣥化外暢惠鑒内悟遺此崇高挹彼沖素道映當今慶流後祚明明我皇承乾紹焕比誦熙周方文隆漢重光麗天晨暉疊旦六府孔修三辰貞觀功均乾造雲覆雨潤養之以仁敦之以信綏之斯和動之斯震自東徂西無思不順禎候並應福祿來格嘉穀秀町素文表石𤣥鳥呈皓醴泉流液黃龍蜿蜿逰鱗弈弈沖訓既布率土咸寧穆穆四門灼灼典刑勝殘豈逺期月有成翹翹東岳庶見翠旌先民有言千載一泰昔難其運今易其㑹沐浴淳澤被服冠帶飲和陶潤載欣載頼文以寫意功由頌宣吉甫作歌式昭永年唐政緝熙康哉垂篇仰述徽烈被之管絃高允以閭文章富逸舉以自代遂為顯祖所知數見引接參論政治命造鹿苑頌北伐碑顯祖善之永明初為中書令加給事中委以機密文明太后甚重閭詔令書檄碑銘贊頌皆其文也太和三年出師討淮北閭表曰伏見廟算有事淮海雖成事不說猶可思量臣以愚劣本非武用至於軍旅尤所不學直以無諱之朝敢肆狂瞽區區短見竊有所疑臣聞兵者凶器不得已而用之今天下開泰四方無虞豈宜盛世干戈妄動疑一也淮北之城凡有五處難易相兼皆須攻擊然攻守難圖力懸百倍反覆思量未見其利疑二也縱使如心於國無用發兵逺入費損轉多若不置城是謂空争疑三也脱不如意當延日月屯衆聚費于何不有疑四也伏願思此四疑時速返斾文明太后令曰六軍電發有若摧朽何慮四難也遷尚書中書監淮南王他奏求依舊斷祿文明太后令召羣臣議之閭表曰天生烝民樹之以君明君不能獨理必須臣以作輔君使臣以禮臣事君以忠故車服有等差爵命有分秩徳高者則位尊任廣者則祿重下者祿足以代耕上者俸足以行義庶民均其賦以展奉上之心君王聚其材以供事業之用君班其俸垂惠則厚臣受其祿感思則深於是貪殘之心止竭効之誠篤兆庶無侵削之煩百辟備禮容之羙斯則經世之明典為治之至術自堯舜以來逮于三季雖優劣不同而斯道弗改自中原崩否天下幅裂海内未一民戸耗減國用不充俸祿遂廢此則事出臨時之宜良非久長之道大魏應期紹祚照臨萬方九服既和}
