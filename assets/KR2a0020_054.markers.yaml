  - {type: variant, offset: 674, length: 0, content: '', WYG: 者野戰所短者攻城若以狄之所短奪其所長則雖衆不能成患雖來不能内逼又狄散居野澤隨逐水草戰則與家産並至奔則與畜牧俱逃不齎資糧而飲食足是以古人伐北方攘其侵掠而已歴代為邊患者良以倐忽無常故也六鎮勢分倍衆不鬬互相圍逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武踵其前事此四代之君皆帝王之雄傑所以同此役者非智術之不長兵衆之不足乃防狄之要事其理宜然故也易稱天險不可升地險山川丘陵王公設險以守其國長城之謂歟今宜依故於六鎮之北築長城以禦北虜雖有暫勞之勤乃有永逸之益如其一成惠及百世即於要害往往開門造小城於其側因地却敵多置弓弩狄來有城可守有兵可捍既不攻城野掠無獲草盡則走終必懲艾宜發近州武勇四萬人及京師二萬人合六萬人為武士於苑内立征北大將軍府選忠勇有志幹者以充其選下置官屬分為三軍二萬人專習弓射二萬人專習戈楯二萬人專習騎矟修立戰塲十日一習採諸葛亮八陣之法為平地禦宼之方使其解兵革之宜識旌旗之節器械精堅必堪禦宼使將有定兵兵有常主上下相信晝夜如一七月發六部兵六萬人各備戎作之具敕臺北諸屯倉庫隨近作米俱送北鎮至八月征北部率所領與六鎮之兵直至磧南揚威漠北狄若來拒與之決戰若其不來然後散分其地以築長城計六鎮東西不過千里若一夫一月之功當三歩之地三百人三里三千人三十里三萬人三百里則千里之地强弱相兼計十萬人一月必就運糧一月不足為多人懐永逸勞而無怨計築長城其利有五罷逰防之苦其利一也北部放牧無抄掠之患其利二也登城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也歲常逰運永得不匱其利五也又任將之道特須委信遣之以禮恕之以情閫外之事有利輙決赦其小過要其大功足以兵力資其給用君臣相體若身之使臂然後忠勇可立則勝可果是以忠臣盡其心征將竭其力雖三敗而踰榮雖三背而彌寵詔曰覧表具卿安邊之策比當與卿面論一二髙祖又引見羣臣議伐蠕蠕帝曰蠕蠕前後再擾朔邊近有投化人云敕勒渠帥興兵叛之蠕蠕王身率徒衆追至西漠今為應乗弊致討為應休兵息民左僕射穆亮對曰自古以來有國有家莫不以戎為首蠕蠕}
