  - {type: variant, offset: 672, length: 0, content: '', WYG: 表咸謐二聖欽明文思道冠百代動遵禮式稽考舊章准百王不易之勝法述前聖利世之高軌置立鄰黨班宣俸祿事設令行於今已久苛慝不生上下無怨姦巧革慮闚覦絶心利潤之厚同於天地以斯觀之如何可改又洪波奔激則隄防宜厚姦悖充斥則禁網須嚴且飢寒切身慈母不保其}
