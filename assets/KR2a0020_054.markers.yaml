  - {type: variant, offset: 237, length: 314, content: 四十八顯祖愍之追贈恢散騎常侍鎮西將軍定州刺史鉅鹿公諡曰貞恢長子悅祖襲爵高邑侯例降為伯卒子瑾字伯瓊太和中拜奉朝請後襲爵轉司徒廣陽王嘉集曹參軍太尉高陽王雍長流參軍太尉清河王懌記室參軍後除中堅將軍步兵校尉葛榮反於河北所在殘害詔瑾持節兼吏部郎中東北道弔慰大使至冀州值葛榮圍逼敕授瑾防城都督時瑾以二子自隨次子戰死瑾恐動人情忍哀輟哭城陷沒賊既而走免永安初拜左將軍太中大夫殷州大中正累遷衞將軍右光祿大夫太尉諮議參軍天平初除車騎將軍大司農卿中正如故瑾淳謹好學老而不倦元象元年秋卒年六十五贈使持節都督定瀛殷三州諸軍事驃騎大將軍司徒公定州刺史子景威襲武定末西汝陰太守齊受禪爵例降悅祖弟顯甫本州別駕遷步兵校尉從駕南討以功賜爵平棘子行并州事尋除河北太守, WYG: ''}
