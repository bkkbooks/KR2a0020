  - {type: variant, offset: 701, length: 195, content: 光祿少卿平北將軍光祿大夫卒贈本將軍殷州刺史次叔向為徐州鎧曹參軍帶郭浦戍主值刺史元法僧叛逼入蕭衍次幼緒早亡次季脩博陵常山二郡太守次世幹次稚明兄弟並不修名行險暴無禮為時所賤華弟憑字青龍祕書主文中散累遷冀州征東長史太子中舍人阿附趙脩超遷司空長史給事黃門侍郎武衞將軍定州大中正坐脩黨免官後除趙郡太守卒子道嘉字同吉豫州外兵參軍汝陽太守同吉弟文衡開府行參軍恢弟綜行河間郡早卒綜子遵字良軌有業尚初拜奉朝請, WYG: 吏部}
