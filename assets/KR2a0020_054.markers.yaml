  - {type: variant, offset: 1334, length: 675, content: 中為祕書中散本州別駕轉趙郡常山二郡太守遷中書郎雅為高允所知天安初劉彧徐州刺史薛安都舉彭城降詔鎮南大將軍博陵公尉元鎮東將軍城陽公孔伯恭等率衆迎之顯祖復以璨參二府軍事軍達九里山安都率文武出迎元不加禮接安都還城使遂不至時劉彧將張永沈攸之等率衆先屯下元令璨與中書郎高閭入彭城說安都安都即與俱載赴軍元等入城收管籥其夜永攻南門不克退還時永輜重在武原璨勸元乘永之失據攻永米船大破之斬首數千級時大雪寒永軍凍死者萬計於是遂定淮北加璨寧朔將軍與張讜對為兗州刺史綏安初附以參定徐州之功賜爵始豐侯加建武將軍延興元年年四十卒諡曰懿子元茂太和八年襲爵加建武將軍以寬雅著稱闕又例降拜司徒司馬尋除振威將軍南征別將彭城鎮副將民吏安之賞帛百匹穀二百斛太和二十年年四十四卒贈顯武將軍徐州刺史諡曰順子秀之字鳳起初除京兆王參軍轉員外散騎侍郎襲爵拜尚書都官郎秀之弟子雲字鳳昇司空參軍轉外兵參軍本州治中子雲弟子羽字鳳降征南法曹參軍子羽弟子岳字鳳跱員外郎大司馬祭酒秀之等早孤事母孝謹兄弟並容貌魁偉風度審正而皆早卒鳳昇子道宗武定末直閤將軍道宗弟道林司徒中兵參軍元茂弟宣茂太和初拜中書博士稍遷司空諮議轉司馬監營構事出除寧朔將軍試守正平郡不拜兼定州大中正坐受鄉人財貨為御史所劾除名為民從駕征新野又從討樊鄧持節兼散騎常侍東南二道使景明中除平陽太守以罪左遷步兵校尉正始初除太中大夫遷光祿大夫宣茂議明堂之制以五室為長與游肇往復肇善之遷平東將軍幽州刺史延昌二年卒年五十九遺言薄葬贈本將軍齊州刺史諡曰惠子藉之字脩遠性謹正粗涉書史歷員外郎給事中司徒諮議參軍前將軍太中大夫著忠誥一篇文多不載永熙初卒年五十四贈中軍將軍定, WYG: ''}
