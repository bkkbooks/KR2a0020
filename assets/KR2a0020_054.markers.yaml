  - {type: variant, offset: 233, length: 3, content: 等恢時, WYG: 重雅文學而雅輕薄允才允性柔寛不以為恨允將婚于邢氏雅勸允娶于其族允不從雅曰人貴河間邢不勝廣平游人自棄伯度我自敬黃頭貴已賤人皆此類也允著徵士頌殊為重雅事在允傳雅因論議長短忿儒者陳竒遂陷奇至族議者深責之和平二}
