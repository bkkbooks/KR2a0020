  - {type: variant, offset: 2352, length: 1127, content: 贈冠軍將軍青州刺史安平侯諡曰康子合字貴和少有時譽襲爵桐廬子為中書學生主文中散太尉諮議參軍本州大中正出為常山太守卒於郡時年二十七長子脩義有風望襲爵自司徒默曹參軍再遷寧遠將軍新野太守還除太尉掾出為冀州征東府長史卒年四十五長子放寬襲爵齊受禪例降合弟秉少有志氣太和中為中書學生拜奉朝請轉徐州安東府錄事參軍陽平王頤之為定州秉復為衞軍府錄事參軍帶毋極令時甄琛為長史因公事言競之間秉以拳擊琛墜於牀下琛以本縣長笑而不論其豪率若此彭城王勰征壽春秉從行招致壯俠以為部卒勰目之謂左右曰吾當寄膽氣於此人後為司空主簿轉掾城門校尉長兼司空司馬遷長史加輔國將軍出除左將軍廣平內史大納財貨為清論所鄙入為司徒左長史未幾除平東將軍光祿大夫尋加安西將軍出除燕州刺史時天下多事遂為杜洛周攻圍秉堅守歷年朝庭遣都督元譚與秉第二子仲哲赴救譚敗仲哲死之秉遂率城民奔定州坐免官尋除撫軍將軍行相州事轉征東將軍金紫光祿大夫孝昌末冀州流民聚於河外因立東冀州除秉為刺史加征東將軍不之任永安二年遷衞將軍右光祿大夫秉年老被疾上表辭事詔不許元顥入洛秉避居陽武二年除散騎常侍車騎將軍左光祿大夫太昌中除驃騎大將軍儀同三司常侍左光祿如故頻以老病乞解永熙三年去職天平四年薨年七十八贈使持節侍中都督定瀛滄三州諸軍事本將軍尚書令司徒公定州刺史諡曰靖穆長子忻字伯悅有世幹為荊州平南府外兵參軍北道行臺常景引為行臺郎又啟除員外郎復為安遠將軍尚書左中兵郎中以鄭儼之甥兼尚書左丞莊帝初遇害於河陰年四十二贈鎮軍將軍殿中尚書冀州刺史忻弟仲哲生為祖母宋氏所養早有知識六歲宋亡啼慕不止見者悲之性恢達常以將略自許辟司徒行參軍假寧朔將軍統軍從廣陽王淵北討擊柔玄賊破之賜爵安平縣男及父秉於燕州被圍泣訴朝庭遂除別將與都督元譚赴援到下口遇賊仲哲戰歿時年三十五長子長瑜武定中儀同開府中兵參軍長瑜弟叔瓚司徒田曹參軍仲哲弟叔彥撫軍將軍叔彥弟季通武定中兼司農少卿季通小弟季良風望閑雅自太學博士從都督李神軌征討有功賜爵蒲陰縣男尋除著作佐郎通直散騎侍郎轉征虜將軍員外散騎常侍太尉長史及秉還鄉季良亦去職歸養後除中軍將軍光祿大夫先秉卒於家時年三十六贈車騎將軍尚書右僕射定州刺史諡曰簡秉弟習字貴禮有世譽歷司徒主簿彭城王勰開府屬遷幽州長史博陵太守吏民愛敬之在郡九年轉河東太守卒於郡年五十一贈中山太守孝昌三年重贈後將軍并州刺史長子世儒字希業卒於大司馬從事中郎世儒第三弟叔業武定中南兗州別駕秉從父弟廣字仲慶有議幹初為中書學生高祖時殿中郎中歷通直散騎侍郎太子步兵校尉詔守尚書左丞父憂去職後任城王澄為揚州引廣為鎮南府長史以母老辭景明末卒於家贈安遠將軍光州刺史子元獻字世儁頗有學識舉秀才不行後卒於鄉里廣弟文業為中書博士轉司徒主簿城陽王鸞為定州刺史引為治中年四十九卒子伯謙武定末司空諮議參軍, WYG: ''}
