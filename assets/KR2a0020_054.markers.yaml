  - {type: variant, offset: 680, length: 1, content: 直, WYG: 漕路必由于泗口泝淮而上須經角城淮隂大鎮舟船素畜敵因先積之資以拒始行之路若元戎旋斾兵士挫怯夏雨水長救援實難忠勇雖奮事不可濟淮隂東接山陽南通江表兼近江都海西之資西有盱眙夀陽之鎮且安土樂本人之常情若必留戍軍還之後恐為敵擒何者鎮戍新立懸在異境以勞禦逸以新擊舊而能自固者未之有也昔彭城之役既剋其城戍鎮已定而思叛外向者猶過數方角城蕞爾處在淮北去淮陽十八里五固之役攻圍歴時卒不能剋以今比昔事兼數倍今以向熱水雨方降兵刄既交難以恩恤降附之民及諸守令亦可徙置淮北如其不然進兵臨淮速度士卒班師還京踵太武之成規營皇居於伊洛畜力以待敵釁布徳以懐逺人使中國清穆化被遐裔淮南之鎮自効可期天安之捷指辰不逺車駕還幸石濟閭朝於行宫高祖謂閭曰朕往年之意不欲決征但兵士已集恐為幽王之失不容中止發洛之日正欲至於懸瓠以觀形勢然機不可失遂至淮南而彼諸將並列州鎮至無所獲定由晚一月日故也閭對曰人皆是其所事而非其所不事猶犬之吠非其主且古者攻戰之法倍則攻之十則圍之聖駕親戎誠應大㨗所以無大獲者良由兵少故也且徙都者天下之大事今京邑甫爾庶事草創臣聞詩云惠此中國以綏四方臣願陛下從容伊瀍優逰京洛使徳被四海中國緝寧然後向化之徒自然樂附高祖曰願從容伊瀍實亦不少但未獲耳閭曰司馬相如臨終恨不見封禪今雖江介不賔小賊未殄然中州之地略亦盡平豈可於聖明之辰而闕盛禮齊桓公霸諸侯猶欲封禪而況萬乗高祖曰由此桓公屈於管仲荆揚未一豈得如卿言也閭曰漢之名臣皆不以江南為中國且三代之境亦不能逺高祖曰淮海惟揚州荆及衡陽惟荆州此非近中國乎及車駕至鄴高祖頻幸其州館詔曰閭昔在中禁有定禮正樂之勲作藩於州有亷清公幹之羙自大軍停軫庶事咸豐可謂國之老成善始令終者也每惟厥徳朕甚嘉焉可賜帛五百匹粟一千斛馬一匹衣一襲以褒厥勤閭每請本州以自効詔曰閭以懸車之年方求衣錦知進忘退有塵謙徳可降號平北將軍朝之老成宜遂情願徙授幽州刺史令存勸兩修恩法並舉閭以諸州罷從事依府置參軍於治體不便表宜復舊高祖不悅歲餘表求致仕優答不許徵為太常卿頻表陳遜不聼又車駕南討漢陽閭上表諌求回師高祖不納漢陽平賜閭璽書閭上表陳謝世宗踐祚閭累表遜位詔曰閭貞幹早聞儒雅素著出内清華朝之㑺老以年及致仕固求辭任宜聼解宗伯遂安車之禮特加優授崇老成之秩可光祿大夫金印紫綬使}
