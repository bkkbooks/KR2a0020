  - {type: variant, offset: 9161, length: 0, content: '', WYG: 焉其王本是勅勒臨國民二世矣好征戰與罽賔鬬三年不罷人怨苦之有鬭象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔髙七十丈周三百步即所謂雀離佛圖也康國者康居之後也遷徙無常不恒故地自漢以來相承不絶其王本姓温月氏人也舊居祁連山北昭武城因被匈奴所破西踰葱嶺遂有其國枝庶各分王故康國左右諸國並以昭武}
