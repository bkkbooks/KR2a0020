  - {type: variant, offset: 11, length: 0, content: '', WYG: 西域夏書稱西戎即序班固云就而序之非盛威武致其貢物也漢氏初開西域有三十六國其後分立五十五王置校尉都䕶以撫納之王莾簒位西域遂絶至於後漢班超所通者五十餘國西至西海東西萬里皆來朝貢復置都䕶校尉以相綂攝其後或絶或通漢朝以為勞敝中國其官時置時廢暨魏晋之後互相吞㓕不可復詳記焉太祖初經營中原未暇及於}
