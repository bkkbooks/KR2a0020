  - {type: variant, offset: 129, length: 2, content: 成都, WYG: 然於是詔之曰朕承天理物欲令萬方各安其所應勅諸軍以拯汝難但去汝遐阻雖復遣援不救當時之急已停師不行汝宜知之朕今練甲飬卒一二歲間當躬率猛将為汝除患汝其謹警候以待大舉先是朝廷遣使者韓羊皮使波斯波斯}
