  - {type: variant, offset: 5227, length: 1452, content: 曰寧康徵溫入朝又詔溫無拜尚書謝安等於新亭見溫皆敬溫拜昱墓得病還姑熟溫自歸寢疾諷求備物九錫謝安已令吏部郎袁彥伯撰策文文成安輒勾點令更治改既屢引日乃謀於尚書僕射王彪之彪之云聞彼病日增亦當不復支久自可小遲回其事安從之溫死苻堅遣苻雅率將王統朱彤楊安姚萇步騎五萬向駱谷伐昌明秦州刺史楊纂纂請救於梁州刺史楊亮亮遣參軍卜靖赴之敗走朱彤至梁州亮望風奔散於是堅遂有梁益二州昌明上下莫不憂怖建國三十九年昌明改年曰太元元年太祖七年苻堅大舉討昌明令其國曰東南平定指日當以司馬昌明為尚書僕射可速為起第堅前後擒張天錫等皆豫築甲宅至而居之堅至淮南大敗奔退是時昌明年長嗜酒好內而昌明弟會稽王道子任居宰相昏醟尤甚狎昵諂邪于時尼娼構扇內外風俗頹薄人無廉左僕射王珣兒婚門客車數百乘會聞王雅為太子少傅回以詣雅者半焉雅素有寵人情去就若此皇始元年昌明死子德宗僭立初昌明耽於酒色末年殆為長夜之飲醒治既少外人罕得接見故多居內殿流連於樽俎之間以嬖姬張氏為貴人寵冠後宮威行閫內於時年幾三十昌明妙列妓樂陪侍嬪少乃笑而戲之云汝以年當廢吾已屬諸姝少矣張氏潛怒昌明不覺而戲逾甚向夕昌明稍醉張氏乃多潛飲宦者內侍而分遣焉至暮昌明沉醉臥張氏遂令其婢蒙之以被既絕而懼貨左右云以魘死時道子昏廢子元顯專政遂不窮張氏之罪德宗既立改年為隆安以道子為太傅揚州牧中書監加殊禮黃鉞羽葆鼓吹又增甲仗百人入殿既而內外衆事必先關於道子尚書僕射王國寶輕薄無行為道子所親權震建業取東宮兵以配己府道子以王緒為輔國將軍琅邪內史又輒并石頭之兵屯于建業緒猶領其從事中郎居中用事寵幸當政德宗兗州刺史王恭惡國寶王緒之亂政也乃要荊州刺史殷仲堪剋期同舉王恭表德宗曰國寶身負莫大之罪謹陳其狀前荊州刺史王悅國寶同產弟也受任西藩不幸致喪國寶求假奔彼遂不即路慮臺糾察懼於黜免乃毀冠改服變為婦人與婢同載入請相王又先帝暴崩莫不驚號而國寶靦然了無哀容方犯閤叩扉求行姦計欲詐為遺詔矯弄神器彰暴于外莫不聞知讒疾二昆過於讎敵樹立私黨遍於府朝兵食資儲斂為私積販官鬻爵威恣百城收聚不逞招集亡命輔國將軍王緒頑凶狂狡人理不齒同惡相成共竊名器自知禍惡已盈怨集人鬼規為大逆蕩覆天下昔趙鞅興晉陽之甲夷君側之惡臣雖駑劣敢忘斯義恭表至道子密欲討恭以元顯為征虜將軍內外諸軍潛加嚴備而國寶惶懼不知所為乃遣數百人戍竹里夜遇風雨各散而歸緒勸國寶殺王珣然後南征北伐弗聽反問計於珣既而懼懾遂上表解職尋復悔懼詐稱德宗復其本官道子既不能拒恭等之兵亦欲因以委罪乃收國寶付廷尉殺之斬王緒於市以悅恭等司徒左長史王廞遭母喪居吳恭板行吳國內史廞乃徵發吳興諸郡兵國寶既死王恭使廞反於喪廞謂因緣事際可大得志乃據吳郡遣子弟率衆擊恭以女為真烈將軍亦置官屬領兵自衞恭遣司馬劉牢之討平之德宗譙王尚之兄弟復說道子以為藩伯強盛宰相權弱宜密樹置以自藩衞道子然之分遣腹心跨據形要由是內外騷動王恭深慮禍難復密要殷仲堪西中郎將庾楷廣州刺史桓玄同會建業玄等響應恭抗表傳檄以江州刺史王愉司馬尚之為事端仲堪遣龍驤將軍南郡相楊佺期舟師五千發江陵桓玄借兵於仲堪亦給五千人於是德宗戒嚴加道子黃鉞遣右將軍謝琰拒恭等元顯為征討都督衆軍繼進前軍王珣領中軍府衆次于北郊以尚之為豫州刺史率弟恢之允之西討楷等皆執白虎幡居前王恭遣劉牢之為前鋒次于竹里初道子之謀恭也啗牢之以重賞牢之斬恭別帥顏延延弟強送二級於謝琰琰與牢之俱進襲恭恭奔于曲阿為湖浦尉所執送建業尚之與庾楷子鴻戰于牛渚斬鴻前鋒將殷萬鴻遁還歷陽尚之猶不敢濟桓玄佺期奄至橫江尚之等退恢之所領外軍皆沒玄等徑造石頭仲堪繼在蕪湖建業震駭道子殺恭於倪塘桓玄等於是走還尋陽是年冬德宗, WYG: ''}
