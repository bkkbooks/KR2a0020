  - {type: variant, offset: 132, length: 1, content: 穎, WYG: 遣使獻馴象及珍物經于闐于闐中于王秋仁輙留之假言慮有冦不達羊皮言状顕祖怒又遣羊皮奉詔責譲之自後毎使朝獻蒲山國故皮山國也居皮城在于闐南去代一萬二千里其國西南三里有凍凌山後役屬于闐悉居半國故西夜國也一名子合其王號子治呼犍在于闐西去代萬二千九百七十里太延初遣使來獻自後貢使不絶權於摩國故烏秏國也其王居烏秏城在悉居半西南去代一萬二千九百七十里渠莎國居故莎車城在子合西北去代一萬二千九百八十里車師國一名前部其王居交河城去代萬五十里其地北接蠕蠕本通使交易世祖初始遣使朝獻詔行人王恩生許綱等出使恩生等始渡流沙為蠕蠕}
