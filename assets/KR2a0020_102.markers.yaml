  - {type: variant, offset: 15, length: 7, content: 馬叡賨李雄僭晉, WYG: 奏依漢氏故事請通西域可以振威徳於荒外又可致竒貨於天府太祖曰漢氏不保境安人乃逺開西域使海内虚耗何利之有今若通之前獘復加百姓矣遂不從歴太宗世竟不招納太延中魏徳益以逺聞西域龜兹疏勒烏孫悦般渇槃陁鄯善焉耆車師粟特諸國王始遣使來獻世祖以西域漢世雖通有求則卑辭而來無欲則驕慢王命此其自知絶逺大兵不可至故也若報使往來終無所益欲不遣使有}
