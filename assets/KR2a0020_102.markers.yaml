  - {type: variant, offset: 92, length: 0, content: '', WYG: 知我國事取亡必近不如絶之可以支久乃斷塞行路西域貢獻歴年不入後平鄯善行人復通始琬等使還京師具言凡所經見及傳聞傍國云西域自漢武時五十餘國後稍相并至太延中為十六國分其地為四域自葱嶺以東流沙以西為一域葱嶺以西海曲以東為一域者舌以南月氏以北為一域两海之間水澤以南為一域内諸小渠長蓋以百數其出西域本有二道後更為四出自玉門渡流沙西行二千里至鄯善為一道自玉門渡流沙北行一千二百里至車師為一道從莎車西行百里至葱嶺葱嶺西一千三百里至伽倍為一道自莎車西南五百里葱嶺西南一千三百里至波路為一道焉自琬所不傳而更有朝貢者紀其名不能具國俗也其與前使所異者錄之鄯善國都扜泥城古樓蘭國也去代七千六百里所都城方一里地多沙鹵少水草北即白龍堆路至太延}
