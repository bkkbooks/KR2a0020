  - {type: variant, offset: 9159, length: 0, content: '', WYG: 正光末遣使貢師子一至髙平遇万俟醜奴反因留之醜奴平送京師永熈以後朝獻遂絶初熈平中肅宗遣王伏子綂宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數盖舉其略云其國去漕國千五百里去𤓰州六千五百里朱居國在于闐西其人山居有麥多林果咸事佛語與于闐相類役屬嚈噠渇槃陁國在葱嶺東朱駒波西河經其國東北流有髙山夏積霜雪亦事佛道附於嚈噠鉢和國在渇槃陁西其土尤寒人畜同居穴地而處}
