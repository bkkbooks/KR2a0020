  - {type: variant, offset: 1477, length: 1624, content: 人泣而出隗還淮陰後奔石勒協奔江乘為敦追兵所害叡師敗敦自為丞相武昌郡公邑萬戶朝事大小皆關諮之敦收戴淵及叡尚書左僕射周顗並斬于石頭皆叡朝之望也於是改易百官及諸州鎮其餘轉徙黜免者過百數或朝行暮改或百日半年敦所寵沈充錢鳳等所言必用所譖必死敦將還武昌其長史謝鯤曰公不朝懼天下私議敦曰君能保無變乎對曰鯤近入覲主上側席待公遲得相見宮省穆然必無不虞之慮公若入朝鯤請侍從敦曰正復殺君等數百何損朝廷遂不朝而去敦召安南將軍甘卓轉譙王承為軍司並不從敦遣從母弟南蠻校尉魏乂率江夏太守李攻承於臨湘旬日城陷執承送于武昌敦從弟王廙使賊迎之害于車中先是王敦表疏言旨不遜叡以示承曰敦言如此豈有厭哉對曰陛下不早裁之難將作矣敦惡之襄陽太守周慮襲殺甘卓叡畏迫於敦居常憂戚發病而死子紹僭立改年曰太寧王敦將篡諷紹徵己乃為書曰孤子紹頓首天下事大紹以眇身弗克負荷哀憂孔疚如臨于谷實賴冢宰以濟艱難公邁德樹勳遐邇歸懷任社稷之託居總己之統然道里長遠江川阻深動有介石之機而回旋之間固以有所喪矣謂公宜入輔朝政得旦夕詶諮朝士亦僉以為然以公高亮忠肅至心憂國苟其宜然便當以至公處之期於靜國寧民要之括囊無咎伏想闇同此志願便速剋近期以副翹企之懷紹恭憚於敦若此復使兼太常應詹拜敦丞相武昌郡公奏事不名入朝不趨劍履上殿敦於是屯於蕪湖敦乃轉王導為司徒自領揚州刺史以兄含子應為武衞將軍以自副貳敦無子養應為後敦疾踰年故召含還欲屬以後事是時敦令紹宿衞之兵三番休二紹密欲襲敦微行察敦營壘及敦疾紹屢遣大臣訊問起居遷含驃騎大將軍儀同三司敦疾甚紹召其司徒王導中書監庾亮丹陽尹溫嶠尚書卞壼密謀討之導嶠及右將軍卞敦共據石頭光祿勳應詹都督朱雀桁南諸軍事尚書令郗鑒都督從駕諸軍事紹出次于中堂敦聞兵起怒欲自將困不能坐召其黨錢鳳鄧岳周撫等率衆三萬指造建業含謂敦曰此事吾便當行於是以含為元帥鳳等問敦曰事克之日天子云何敦曰尚未南郊何為天子便盡卿兵勢唯保護東海王及裴妃而已初紹謂敦已死故敢發兵及下詔數日敦猶能與王導書後自手筆曰太真別來幾日作如此事太真溫嶠字也紹朝見之咸共駭懼含等兵至溫嶠輒燒朱雀桁以挫其鋒紹使中軍司馬曹渾左衞參軍陳嵩段匹磾弟禿率壯士千人逆含等戰于江寧斬其前鋒將何康殺數百人敦聞康死軍不獲濟怒曰我兄老婢耳門戶衰微群從中才兼文武者皆早死今年事去矣語參軍呂寶曰我當力行因作勢而起困乏乃復臥使術士郭璞筮之卦成對曰不能佳敦既疑璞勸亮嶠等事又聞卦惡於是殺璞敦疾轉困語其舅羊鑒及子應曰我亡後應便即位先立朝廷百官然後營葬初敦敗叡之後夢白犬自天而下噬之及疾甚見刁協甘卓為祟遂死王應祕不發喪裹屍以席埋於齋中與其將諸葛瑤等縱酒淫逸沈充將萬餘人來會含等充臨行顧謂其妻曰男兒不建豹尾不能歸也紹平西將軍祖約率衆至于淮南逐敦所置淮南太守任台紹將劉遐蘇峻濟自滿洲含相率渡兵應詹逆擊大破之周撫斬錢鳳沈充將吳儒斬充紹遣御史劉彝發敦瘞斬屍梟首朱雀桁紹死子衍僭立號年曰咸和衍歷陽太守蘇峻不順於衍衍護軍庾亮曰蘇峻豺狼終為禍亂晁錯所謂削之亦反不削亦反削之反速而禍小不削反遲而禍大乃以大司農徵之令峻弟逸領峻部曲徵書至峻怒曰庾亮專擅欲誘殺我也阜陵令匡術樂安人任讓並為峻謀主勸峻誅亮乃使使推崇祖約共討亮約大喜於是約命兄逖子沛國內史渙女壻淮南太守許柳將兵會峻峻使其黨韓光光名犯恭宗廟諱入姑熟殺于湖令陶馥殘掠而還衍假庾亮節為征討都督使其右衞將軍趙胤左將軍司馬流率衆次于慈湖韓光晨襲流殺之衍以其驍騎將軍鍾雅為前鋒監軍假節率舟軍拒峻宣城內史桓彝統吏士次于蕪湖韓光敗之大掠宣城諸縣而還江州刺史溫嶠使督護王愆期西陽太守鄧岱鄱陽太守紀睦等以舟軍赴于建業愆期岱次直瀆峻督衆二萬濟自橫江登牛渚山愆期等邀擊不制峻至于蔣山衍假領軍卞壼節率諸將陳兵衍之將怯兵弱為峻所敗卞壼及其二子丹陽尹羊曼黃門侍郎周導廬江太守陶瞻散騎侍郎任台等皆死死者三千餘人庾亮兵敗與三弟奔于柴桑峻遂焚衍宮羣賊突掠百僚奔散唯有米數石而已無以自供峻逼衍大赦庾亮兄弟不在赦限峻以祖約為太尉尚書令加侍中自為驃騎將軍領軍將軍錄尚書事於是建業荒毀奔投吳會者, WYG: ''}
