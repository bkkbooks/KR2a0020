  - {type: variant, offset: 6866, length: 1910, content: 凝之事五斗米道恩之來也弗先遣軍乃稽顙于道室跪而呪說指麾空中若有處分者官屬勸其討恩凝之曰我已請大道出兵凡諸津要各有數萬人矣恩漸近乃聽遣軍比兵出恩已至矣戰敗凝之奔走再宿執之旬日恩衆數萬自號平東將軍逼人士為官屬於是諸郡妖惑並殺守令而應之衆皆雲集吳國內史桓謙出奔吳興太守謝邈被害自德宗以來內外乖貳石頭以外皆專之於荊江自江以西則受命於豫州京口暨于江北皆兗州刺史劉牢之等所制德宗政令所行唯三吳而已恩既作亂八郡盡為賊場及丹陽諸縣處處蜂起建業轉成蹙弱且妖惑之徒多潛都邑人情危懼慮大兵竊發於是衆軍戒嚴劉牢之共衞將軍謝琰討之賊等禁令不行肆意殺戮士庶死者不可勝計或醢諸縣令以食其妻子不肯者輒支解之其虐如此驃騎長史王平之死未葬恩剖棺焚屍以其頭為穢器牢之率軍討破之琰將至吳興賊徒遁走驅逼士庶奔于山陰諸妖亂之家婦女尤甚未得去者皆盛飾嬰兒投之于水而告之曰賀汝先登仙堂我尋復就汝也賊既走散邑屋焚毀郛郭之中時見人跡經月乃漸有歸者謝琰留屯烏程遣其將高素助牢之牢之率衆軍濟江初孫恩聞八郡響應也告諸官屬曰天下無復事矣當與諸君朝服而至建業既聞牢之臨江復曰我割據浙江不失作勾踐也尋知牢之已濟乃曰孤不走於是乃走緣道多遺珍寶牢之將士爭取之不得窮追恩復入於海初三吳困於虐亂皆企望牢之高素等既至放肆抄暴百姓咸怨毒失望焉孫恩在海妖衆轉復從之既破永嘉臨海復入山陰謝琰戰歿於是建業大震遣冠軍將軍東海太守桓不才輔國將軍孫無終廣陵相高雅之等東討恩吳興太守庾慮妖黨復發大行誅戮殺男女數千人孫恩復破高雅之於餘姚雅之走還山陰元顯自為後將軍開府儀同三司都督十六州本官悉如故封子彥章為東海王食吳興四萬餘戶清選文學臣僚吏兵一同宗國孫恩浮海奄至京口戰士十萬劉牢之隔在山陰衆軍懼不敢旋恩遂徑向建業德宗惶駭遽召豫州刺史司馬尚之于時中外驚擾而元顯置酒高會道子唯日祈于鍾山恩來漸近百姓忷懼尚之率精銳馳至徑屯積弩堂恩時泝風不得疾行數日乃至白石恩本以諸軍分散欲掩不備知尚之尚在建業復聞牢之不還不敢上乃走向郁洲恩別帥盧循攻沒廣陵虜掠而去桓玄聞孫恩之逼也乃建牙戒嚴表求征討時恩去未遠玄表復至元顯等大懼急遣止玄庾楷密使自結於元顯說玄大失人情衆不為用若朝廷遣軍己當內應元顯得書大喜遣張法順謀于劉牢之牢之同許焉於是徵兵裝艦將謀西討德宗改年曰元興以元顯為大都督討玄玄軍至元顯不戰而敗父子並為玄所殺後改年為大亨天興六年十月德宗遣使朝京師德宗封桓玄為楚王玄尋逼德宗手詔禪位德宗出居永安宮玄既受禪封德宗為南康平固縣王居之尋陽天賜元年德宗在姑熟二月至尋陽其彭城內史劉裕殺玄徐州刺史桓脩與劉毅等舉兵討玄玄敗走尋陽攜德宗兄弟至於江陵又走荊州荊州別駕王康產南郡相王騰之迎德宗入南郡府桓玄死玄將桓振復襲江陵斬王康產及騰之將殺德宗玄揚州刺史新安王桓謙苦禁之乃止時盧循執德宗廣州刺史吳隱之自號平南將軍廣州刺史令其黨徐道覆據始興餘郡皆以親黨居之德宗復僭立於江陵改年義熙尚書陶夔迎德宗達于板橋大風暴起龍舟沉沒死者十餘人德宗發江陵至尋陽其益州刺史毛璩參軍譙縱反攻涪城克之遂以益州叛德宗德宗發姑熟還建業六月太祖遣軍攻德宗鉅鹿太守賀申申舉城降永興二年盧循復起於嶺南殺德宗江州刺史何無忌於石城咸欲以德宗北走知循未下乃止裕令撫軍劉毅討循敗於桑落洲步走而還裕黨孟昶諸葛長民等勸裕擁德宗過江裕不從神瑞二年德宗遣廣武將軍玄文石齊朝貢泰常初劉裕征姚泓二年太宗遣長孫道生娥清破其將朱超石於石河擒騎將楊豐斬首千七百餘級三年德宗死弟德文僭立四年改年曰元熙五年德文禪位於裕裕封德文為零陵王德文后河南褚氏兄季之弟淡之雖德文姻戚而盡心於裕德文每生男輒令方便殺焉或誘內人密加毒害前後非一及德文被廢囚於秣陵宮常懼見禍與褚氏共止一室慮有鴆毒自煮食於前六年劉裕將殺之不欲遣人入內令淡之兄弟視褚氏褚氏出別宮於是兵乃踰垣而入進藥於德文德文不肯飲曰佛教自殺者不復人身乃以被掩殺之自叡之僭江南至於德文之死君弱臣強不相羈制賞罰號令皆出權寵危亡廢奪釁故相尋所謂夷狄之有君不若諸夏之亡也賨李雄字仲儁蓋廩君之苗裔也其先居於巴西宕渠秦并天下為黔中郡薄賦其民口出錢三十巴人謂賦為賨因為名焉後徙櫟陽祖慕魏東羌獵將慕有五子輔特庠流驤晉惠時關西擾亂頻歲大飢特兄弟率流民數萬家就穀漢中遂入巴蜀時晉益州刺史趙廞反叛特兄弟起兵誅之晉拜特宣威將軍長樂鄉侯流奮威將軍武陽侯流民閻式等推特行鎮北大將軍承制封拜流行鎮東將軍後與晉益州刺史羅尚相攻昭帝七年特自稱大將軍大都督號年建初戰敗為尚所殺流代統兵事流字玄通自稱大都督大將軍流病將死以後事屬雄雄特少子也雄自稱大都督大將軍十年僭稱成都王號年建興置百官時涪陵人范長生頗有術數雄篤信之勸雄即真十二年僭稱皇帝號大成改年為晏平拜長生為天地太師領丞相西山王又改年為玉衡雄以中原喪亂乃頻, WYG: ''}
