  - {type: variant, offset: 87, length: 0, content: '', WYG: 向破洛那遣明使者舌烏孫王為發導譯達二國琬等宣詔慰賜之已而琬明東還烏孫破洛那之屬遣使與琬俱來貢獻者十有六國自後相繼而來不間于歲國使亦數十輩矣初世祖毎遣使西域常詔河西王沮渠牧犍令䕶送至姑臧牧犍恒發使導路出於流沙後使者自西域還至武威牧犍左右謂使者曰我君承蠕蠕吳提妄説云去歲魏天子自來伐我士馬疫死大敗而還我禽其長弟樂平王丕我君大喜宣}
  - {type: page-break, offset: 87, content: '', id: KR2a0020_WYG_102-3a, image: WYG0262/WYG0262-0476a.png}
  - {type: variant, offset: 87, length: 0, content: '', krp: 向破洛那遣明使者舌烏孫王為發導譯達二國琬等宣詔慰賜之已而琬明東還烏孫破洛那之屬遣使與琬俱來貢獻者十有六國自後相繼而來不間于歲國使亦數十輩矣初世祖毎遣使西域常詔河西王沮渠牧犍令䕶送至姑臧牧犍恒發使導路出於流沙後使者自西域還至武威牧犍左右謂使者曰我君承蠕蠕吳提妄説云去歲魏天子自來伐我士馬疫死大敗而還我禽其長弟樂平王丕我君大喜宣}
  - {type: variant, offset: 88, length: 3, content: 河內溫, WYG: 國中又聞吳提遣使告西域諸國稱魏已削弱今天下唯我為彊若更有魏使勿復恭奉西域諸國亦有貳者牧犍事主稍以慢惰使還具以状聞世祖遂議討牧犍凉州既平鄯善國以為脣亡齒寒自然之道也今武威為魏所㓕次及我也若通其使}
  - {type: variant, offset: 88, length: 3, content: 河內溫, krp: 國中又聞吳提遣使告西域諸國稱魏已削弱今天下唯我為彊若更有魏使勿復恭奉西域諸國亦有貳者牧犍事主稍以慢惰使還具以状聞世祖遂議討牧犍凉州既平鄯善國以為脣亡齒寒自然之道也今武威為魏所㓕次及我也若通其使}
