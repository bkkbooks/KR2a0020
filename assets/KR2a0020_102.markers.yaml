  - {type: variant, offset: 6683, length: 2, content: 并乞, krp: 自是不絶伽倍國故休宻翕侯都和墨城在莎車西去代一萬三千里人居山谷間折薛莫孫國故雙靡翕侯都雙靡城在伽倍西去代一萬三千五百里人居山谷間鉗敦國故貴霜翕侯都䕶澡城在折薛莫孫西去代一萬三千五百六十里人居山谷間弗敵沙國故肸頓翕侯都薄茅城在鉗敦西去代一萬三千六百六十里居山谷間閻浮謁國故髙附翕侯都髙附城在弗敵沙南去代一萬三千七百六十里居山谷間大月氏國都盧監氏城在弗敵沙西去代一萬四千五百里北與蠕蠕接數為所侵遂西徙都薄羅城去弗敵沙二千一百里其王寄多羅勇武遂興}
  - {type: variant, offset: 6686, length: 4, content: 請討姚興, WYG: 越大山南侵北天竺自乾陁羅以北五國盡役屬之世祖時其國人商販京師自云能鑄石為五色琉璃於是採礦山中於京師鑄之既成光澤乃美於西方來者乃詔為行殿容百餘人光色映徹觀者見之莫不驚駭以為神明所作自此中國瑠璃遂賤人不復珍之安息國在葱嶺西都蔚搜城北與康居西與波斯相接在大月氏西北去代二萬一千五百里大秦國一名黎軒都安都城從條支西渡海曲一萬里去代三萬九千四百里其海傍出猶渤海也而東西與渤海相望盖自然之理地方六千里居两海之間其地平正人居星布其王都城分為五城各方五里周六十里王居中城城置八臣以主四方而王城亦置八臣分主四城若謀國事及四方有不决者則四城之臣集議王所王自聽之然後施行王三年一出觀風化人有寃枉詣王訴訟者當方之臣小則譲責大則黜退令其舉賢人以代之其人端正長大衣服車旗擬儀中國故外域謂之大秦其土宜五榖桑麻人務蠶田多璆琳琅玕神龜白馬朱鬛明珠夜光璧東南通交趾又水道通益州永昌郡多出異物大秦西海水之西有河河西南流河西有南北山山西有赤水西有白玉山玉山西有西王母山玉為堂云從安息西界循海曲亦至大秦四萬餘里於彼國觀日月星辰無異中國而前史云條支西行百里日入處失之逺矣阿鈎羌國在莎車西南去代一萬三千里國西有縣度山其間四百里中往往有棧道下臨不測之淵人行以䋲索相持而度因以名之土有五榖諸果市用錢為貨居止立宮室有兵噐土出金珠波路國在阿鈎羌西北去代一萬三千九百里其地濕熱有蜀馬土平物産國俗與阿鈎羌同小月氏國都富樓沙城其王本大月氏王寄多羅子也寄多羅為匈奴所逐西徙後令其子守此城因號小月氏焉在波路西南去代一萬六千六百里先居西平張掖之間被服頗與羌同其俗以金銀錢為貨随畜牧移徙亦類匈奴其城東十里有佛塔周三百五十歩髙八十丈自佛塔初建計至武定八年八百四十}
