  - {type: variant, offset: 4303, length: 888, content: 餘里以通舟軍自清水入河慕容垂逆擊破之獲其資仗溫之北引也先命西中郎將袁真及趙悅開石門而袁真等停於梁宋石門不通糧竭溫自枋頭回軍垂以步騎數萬追及襄邑大敗溫軍溫遂歸罪袁真除名削爵收節傳真子雙之等殺梁國內史朱憲真據壽陽以叛真諸子兄弟阻兵自守招誘陸城戍將陳郡太守朱輔數千人遣參軍爨亮通慕容暐又遣使西降苻堅真病死輔立其嫡子瑾為使持節建威將軍豫州刺史瑾弟四五人皆領兵暐令陳文報爨亮且以觀變桓溫遣督護竺瑤以軍泝淮伐瑾瑤次于肥口屢戰慕容暐假瑾征南將軍揚州刺史宣城公瑾弟泓等皆郡守四品將軍朱輔亦如之溫乃伐瑾瑾等拒戰於是築長圍守之城中震潰遂平瑾初溫任兼將相其不臣之心形于音氣曾臥對親僚撫枕而起曰為爾寂寂將為文景所笑衆莫敢對後悉衆北討冀成陵奪之勢及枋頭奔敗知民望之去己既平瑾問中書郎郗超曰足以雪枋頭之乎超曰此未厭有識之情也公六十之年敗於大舉不建不世之勳不足以鎮愜民望因說溫以廢立之事溫既宿有此謀深納超言溫自廣陵將旋鎮姑孰至于白石及言其主弈少同閹人之疾初在東海琅邪國親近嬖人相龍朱靈寶等並侍臥內而美人田氏孟氏遂生三男衆致疑惑然莫能審其虛實至是將建儲立王溫因之以定廢立之計遂率百僚並還朝堂溫率衆入屯兵宮門進坐殿庭使督謢竺瑤散騎侍郎劉亨取弈璽綬弈著白袷單衣步下西堂登犢車羣臣拜辭皆殞涕侍御史將百餘人送出神虎門入東海第於是迎司馬昱而立之昱叡子也昱東向流涕拜受璽綬昱既僭立改年曰咸安以溫依諸葛亮故事甲仗入殿進丞相其大司馬等皆如故留鎮建以弈為海西縣公溫常有大志昱心不自安謂中書郎郗超曰命之修短本所不計故當無復近日事邪超父愔為會稽太守超假還東昱謂之曰致意尊公家國之事遂至於此由吾不能以道匡衞思患豫防愧歎之深言何能喻又誦庾闡詩云志士痛朝危忠臣哀主辱因泣下昱疾與溫書曰吾遂委篤足下便入冀得相見不謂疾患遂至於此今者惙然勢不復久且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼冲眇然非阿衡輔導之訓當何以寧濟也國事家計一託於公昱死子昌明僭立徐州小吏盧悚與其妖衆男女二百向晨攻廣莫門詐言海西公還由萬春雲龍門入殿略取三廂及武庫甲仗時門下軍校並假兼在直吏士駭愕不知所為游擊將軍毛安之先入雲龍門討悚中領軍桓祕將軍殷康止車門入會兵攻之斬, WYG: ''}
