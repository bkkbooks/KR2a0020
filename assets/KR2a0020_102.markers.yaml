  - {type: variant, offset: 322, length: 6, content: 輒改易郡縣假, WYG: 下詔撫慰之開焉耆倉給之正平初遣子入侍自後毎使朝貢且彌國都天山東于大谷在車師北去代一萬五百七十里本役屬車師焉耆國在車師南都員渠城白山南七十里漢時舊國也去代一萬二百里其王姓龍名鳩尸卑那即前凉張軌所討龍熈之𦙍所都城方二里國内凡有九城國小人貧無綱紀法令兵有弓刀甲矟㛰姻略同華夏死亡者皆焚而後葬其服制滿七日則除之丈夫並剪髪以為首飾文字與婆羅門同俗事天神並崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉氣候寒土田良沃榖有稻粟菽麥畜有駝馬飬蠶不以為絲唯充綿纊俗尚蒲萄酒兼愛音樂南去海十餘里有魚鹽蒲葦之饒東去髙昌九百里西去龜兹九百里皆沙磧東南去𤓰州二千二百里恃地多險頗剽劫中國使世祖怒之詔成周公萬度歸討之約齎輕糧取食路次度歸入焉耆東界擊其邉守左回尉犁二城拔之進軍向員渠鳩尸卑那以四五萬人出城守險以拒度歸募壮勇短兵直往衝鳩尸卑那衆大潰盡虜之单騎走入山中度歸進屠其城四鄙諸戎皆降服焉耆為國斗絶一隅不亂日久獲其珍竒異翫殊方譎詭不識之物橐駝馬牛雜畜巨萬時世祖幸隂山北宫度歸破焉耆露板至世祖省訖賜司徒崔浩書曰萬度歸以五千騎經萬餘里拔焉耆三城獲其珍竒異物及諸委積不可勝數自古帝王雖云即序西戎有如指注不能控引也朕今手把而有之如何浩上書稱美遂命度歸鎮撫其人初鳩尸卑那走山中猶覬城不拔得還其國既見盡為度歸所剋乃奔龜兹龜兹以其壻厚待之龜兹國在尉犁西北白山之南一百七十里都延城漢時舊國也去代一萬二百八十里其王姓白即後凉吕光所立白震之後其王頭繫綵帶垂之於後坐金師子牀所居城方五六里其刑法殺人者死劫賊則斷其一臂并刖一足税賦凖地徴租無田者則税銀錢風俗婚姻喪葬物産與焉耆略同唯氣候少温為異又出細氈饒銅鐵鈆麖皮氍毹沙鹽綠雌黄胡粉安息香良馬犎牛等東有輪臺即漢貳師将軍李廣利所屠者其南三百里有大河東流號計式水即黄河也東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙帳六百餘里東南去𤓰州三百里其東闕城戍冦竊非一世祖詔萬度歸率騎一千以擊之龜兹遣烏羯目提等領兵三千距戰度歸擊走之斬二百餘級大獲駝馬而還俗性多淫}
