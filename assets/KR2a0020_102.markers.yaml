  - {type: variant, offset: 3304, length: 820, content: 至于石頭俄引還次于蔡洲沙門浦庾亮守白石壘詰朝峻將萬餘人攻之亮等逆擊峻退吳國內史庾冰率三吳之衆驟戰不勝瑾商等破庾冰前軍於無錫焚掠肆意韓光攻宣城內史桓彝彝率吏民力戰不勝為光所殺祖約為潁川人陳光率其屬攻之約乃奔於歷陽長樂人賈寧勸峻殺王導盡誅諸大臣峻不從乃改計叛峻王導使袁耽潛誘納之謀奉衍出奔溫嶠嶠食盡貸于陶侃侃怒曰使君前云不憂無士衆及糧食也唯欲得老民為主耳今比戰皆北良將安在今若無食民便欲西歸先是嶠慮侃不赴故以甘言招侃嶠乃卑辭謝之且曰今者騎虎之勢可得下乎賊垂滅願公留思侃怒少止其將李陽說曰今事若不捷雖有粟焉得而食之公宜割見儲以卒大事乃以米五萬石供軍祖渙襲湓口欲以沮溫嶠之兵渙過晥攻譙國內史桓雲不克乃還蘇峻并兵攻大業大業水竭皆飲糞汁諸將謀救之慮不能當且欲水陸攻峻陶侃以舟師攻石頭溫嶠庾亮陳于白石峻子碩以數十騎出戰峻見碩騎乃捨其衆自以四馬北下突陳陳堅乃還軍士彭世李千投之以矛峻墜馬遂梟首臠割之焚其骸骨任讓及諸賊帥復立峻弟逸求峻屍弗獲乃發衍父母冢剖棺焚屍匡術率其徒據苑城以降韓光蘇碩等率衆攻苑苑中飢穀石四萬諸將攻石頭蘇碩及章武王世子休率勁賊孔盧張偏等數十人擊李陽於柤浦退走碩等追之庾冰司馬滕含以銳卒自後擊之碩逸等震潰奔于曲阿含入抱衍始得出奔溫嶠之舟是時兵破之後宮室灰燼議欲遷移王導不從乃止衍改年咸康建國中衍死中書監庾冰廢衍子千齡立其弟岳改年曰建元初岳之立當改元庾冰立號而晉初已有改作又如之乃為建元頃之或告冰曰子作年號乃不視讖也讖云建元之末丘山崩丘山岳也冰瞿然久而歎曰如有吉凶豈改易所能救乎遂不復改岳死庾冰欲立司馬昱驃騎將軍何充立岳子聃號年曰永和聃安西將軍桓溫率所統七千餘人伐蜀拜表輒行聃威力微弱不能控制也及石虎死聃征北將軍褚裒以舟軍至下邳西中郎將陳逵進據淮南石遵聞裒至下邳使其司空李農領萬餘騎逆圍督護王龕於薛執龕送于鄴又殺李邁龕裒之驍將三軍喪氣乃引還陳逵聞之震懼焚淮南而走桓溫表廢聃揚州刺史殷浩聃憚溫乃除其名溫遂率所統諸軍步騎四萬自郢越關中至灞上苻健與, WYG: ''}
