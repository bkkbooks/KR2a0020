  - {type: variant, offset: 8780, length: 0, content: '', WYG: 南天竺國去代三萬一千五百里有伏醜城周帀十里域中出麾尼珠珊瑚城東三百里有拔賴城城中出黄金白真檀石蜜蒲萄土宜五榖世宗時其國王婆羅化遣使獻駿馬金銀自此毎使朝貢疊伏羅國去代三萬一千里國中有勿悉城城北有鹽竒水西流有白象并有阿末黎木皮中織作布土宜五榖世宗時其國王伏陀末多遣使獻方物自是毎使朝貢拔豆國去代五萬一千里東至多勿當國西至旃那國中間相去七百五十里南至罽陵伽國北至弗那伏且國中間相去九百里國中出金銀雜寳白象水牛㲠牛蒲萄五果土宜五榖嚈噠國大月氏之種類也亦曰髙車之别種其原出於塞北自金山而南在于闐之西都馬許水南二百餘里去長安一萬一百里其王都拔底延城蓋王舍城也其城方十里餘多寺塔皆飾以金風俗}
