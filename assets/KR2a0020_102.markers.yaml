  - {type: variant, offset: 329, length: 0, content: '', WYG: 女市收男子錢入官土多孔雀羣飛山谷間人取飬而食之孳乳如鷄鶩其王家恒有千餘隻云其國西北大山中有如膏者流出成川行數里入地如䬾餬甚臭服之髮齒已落者能令更生病人服之皆愈自後毎使朝貢姑黙國居南城在龜兹西去代一萬五百里役屬龜兹温宿國居温宿城在姑黙西北去代一萬五百五十里役屬龜兹尉頭國居尉頭城在温宿北去代一萬六百五十里役屬龜兹烏孫國居赤谷城在龜兹西北去代一萬八百里其國數為蠕蠕所侵西徙葱嶺山中無城郭随畜牧逐水草太延三年遣使者董琬等使其國後毎使朝貢疏勒國在姑黙西白山南百餘里漢時舊國也去代一萬一千二百五十里髙宗末其王遣使送釋迦牟尼佛袈裟一長二丈餘髙宗以審是佛衣應有靈異遂燒之以騐虚實置於猛火之上經日不然觀者莫不悚駭心形俱肅其王戴金師子冠土多稻粟麻麥銅鐵錫雌黄錦綿毎歳常供送於突厥其都城方五里國内有大城十二小城數十人手足皆六指産子非六指者即不育勝兵二千人南有黄河西帶葱嶺東去龜兹千五百里西去鏺汗國千里南去朱俱波八九百里東北至突厥牙帳千餘里東南去𤓰州四千六百里悦般國在烏孫西北去代一萬九百三十里其先匈奴北單于之部落也為漢車騎将軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜兹北地方數千里衆可二十餘萬凉州人猶謂之單于王其風俗言語與髙車同而其人清潔於胡俗剪髮齊眉以醍醐塗之昱昱然光澤日三澡潄然後飲食其國南界有火山山傍石皆燋鎔流地數十里乃凝堅人取為藥即石流黄也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與大檀相見入其界百餘里見其部人不浣衣不絆髮不洗手婦人舌䑛噐物王謂其從臣曰汝曹誑我入此狗國中乃馳還大檀遣騎追之不及自是相仇讎數相征討真君九年遣使朝獻并送幻人稱能割人喉脉令斷擊人頭令骨䧟皆血出或數升或盈斗以草藥内其口中令嚼咽之湏􅁷血止飬瘡一月復常又無痕瘢世祖疑其虚乃取死罪囚試之皆騐云中國諸}
