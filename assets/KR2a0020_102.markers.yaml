  - {type: variant, offset: 778, length: 283, content: 交通俗氣輕急不識禮教盛飾子女以招遊客此其土風也戰國時則并於楚故地遠恃險世亂則先叛世治則後服秦末項羽起江南故衡山王吳芮從百越之兵越王無諸身率閩中之衆以從滅秦漢初封芮為長沙王無諸為閩越王又封吳王濞於朱方逆亂相尋亟見夷滅漢末大亂孫權遂與劉備分據吳蜀權阻長江殆天地所以限內外也叡因擾亂跨而有之中原冠帶呼江東之人皆為貉子若狐貉類云巴蜀蠻獠谿俚楚越鳥聲禽呼言語不同猴蛇魚鼈嗜慾皆異江山遼闊將數千里叡羈縻而已未能制服其民有水田少陸種以罟網為業機巧趨利恩義寡薄家無藏蓄常守饑寒地既暑濕多有腫泄之病障氣毒霧射工沙蝨蛇虺之害無所不有叡割有揚荊梁三州之土因其故地分置十數州及諸郡縣郡縣戶口, WYG: 都早伽}
