  - {type: variant, offset: 612, length: 0, content: '', WYG: 其國南有山名伽色那山出師子毎使朝貢忸密國都忸密城在悉萬斤西去代二萬二千八百二十八里洛那國故大宛國也都貴山城在疏勒西北去代萬四千四百五十里太和三年遣使獻汗血馬自此毎使朝貢粟特國在葱嶺之西古之奄蔡一名温那沙居於大澤在康居西北去代一萬六千里先是匈奴殺其王而有其國至王忽倪已三世矣其國商人先多詣凉土販貨及克姑臧悉見虜髙宗初粟特王遣使請贖之詔聽焉自後無使朝獻波斯國都宿利城在忸密西古條支國也去代二萬四千二百二十八里城方十里户十餘萬河經其城中南流土地平正出金銀鍮石珊瑚琥珀車渠馬腦多大真珠頗棃瑠璃水精瑟瑟金剛火齊鑌鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及薰陸鬱金蘇合青木等香胡椒蓽撥石蜜千年棗香附子訶犂勒無食子鹽緑雌黄等物氣候暑熱家自藏氷}
  - {type: page-break, offset: 612, content: '', id: KR2a0020_WYG_102-14b, image: WYG0262/WYG0262-0481d.png}
  - {type: page-break, offset: 612, content: '', id: KR2a0020_WYG_102-15a, image: WYG0262/WYG0262-0482a.png}
  - {type: page-break, offset: 612, content: '', id: KR2a0020_WYG_102-15b, image: WYG0262/WYG0262-0482b.png}
  - {type: variant, offset: 612, length: 0, content: '', krp: 其國南有山名伽色那山出師子毎使朝貢忸密國都忸密城在悉萬斤西去代二萬二千八百二十八里洛那國故大宛國也都貴山城在疏勒西北去代萬四千四百五十里太和三年遣使獻汗血馬自此毎使朝貢粟特國在葱嶺之西古之奄蔡一名温那沙居於大澤在康居西北去代一萬六千里先是匈奴殺其王而有其國至王忽倪已三世矣其國商人先多詣凉土販貨及克姑臧悉見虜髙宗初粟特王遣使請贖之詔聽焉自後無使朝獻波斯國都宿利城在忸密西古條支國也去代二萬四千二百二十八里城方十里户十餘萬河經其城中南流土地平正出金銀鍮石珊瑚琥珀車渠馬腦多大真珠頗棃瑠璃水精瑟瑟金剛火齊鑌鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及薰陸鬱金蘇合青木等香胡椒蓽撥石蜜千年棗香附子訶犂勒無食子鹽緑雌黄等物氣候暑熱家自藏氷}
  - {type: variant, offset: 614, length: 0, content: '', WYG: 沙磧引水溉灌其五榖及鳥獸等與中夏略同唯無稻及黍稷土出名馬大驢及駝往往有日行七百里者富室至有數千頭又出白象師子大鳥卵有鳥形如槖駝有两翼飛而不能髙食草與肉亦能噉火其王姓波氏名斯坐金羊牀戴金花冠衣錦袍織成帔飾以真珠寳物其俗丈夫剪髮戴白皮帽貫頭衫两廂近下開之亦有巾帔緣以織成婦女服大衫披大帔其髪前為髻後披之飾以金銀花仍貫五色珠落之於膊王於其國内别有小牙十餘所猶中國之離宫也毎年四月出遊處之十月乃還王即位以後擇諸子内賢者宻書其名封之於庫諸子及大臣皆莫之知也王死衆乃發書視之其封内有名者即立以為王餘子出各就邉任兄弟更不相見也國人號王曰醫囋妃曰防歩率王之諸子曰殺野大官有摸胡壇掌國内獄訟泥忽汗掌庫藏開禁地早掌文書及衆務次有遏羅訶地掌王之内事薛波勃掌四方兵馬其下皆有屬官分統其事兵有甲矟圓排劍弩弓箭戰兼乗象百人随之其刑法重罪懸諸竿上射殺之次則繫獄新王立乃釋之輕罪則劓刖若髠或剪半鬢及繫牌於項以為恥辱犯彊盗者繫之終身姦貴人妻者男子流婦人割其耳鼻賦税則凖地輸銀錢俗事火神天神文字與胡書異多以姊妹為妻妾自餘婚合亦不擇尊卑諸夷之中最為醜穢矣百姓女年十歲以上有姿貎者王收飬之有功勲人即以分賜死者多棄屍於}
