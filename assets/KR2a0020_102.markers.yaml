  - {type: variant, offset: 6683, length: 2, content: 并乞, WYG: 自是不絶伽倍國故休宻翕侯都和墨城在莎車西去代一萬三千里人居山谷間折薛莫孫國故雙靡翕侯都雙靡城在伽倍西去代一萬三千五百里人居山谷間鉗敦國故貴霜翕侯都䕶澡城在折薛莫孫西去代一萬三千五百六十里人居山谷間弗敵沙國故肸頓翕侯都薄茅城在鉗敦西去代一萬三千六百六十里居山谷間閻浮謁國故髙附翕侯都髙附城在弗敵沙南去代一萬三千七百六十里居山谷間大月氏國都盧監氏城在弗敵沙西去代一萬四千五百里北與蠕蠕接數為所侵遂西徙都薄羅城去弗敵沙二千一百里其王寄多羅勇武遂興}
