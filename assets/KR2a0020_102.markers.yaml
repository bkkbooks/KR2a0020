  - {type: variant, offset: 9160, length: 0, content: '', WYG: 有大雪山望若銀峰其人唯食餅麨飲麥酒服氈裘有二道一道西行向嚈噠一道西南趣烏萇亦為嚈噠所統波知國在鉢和西南土狹人貧依託山谷其王不能總攝有三池𫝊云大池有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多遇風雪之困賖彌國在波知之南山居不信佛法專事諸神亦附嚈噠東有鉢盧勒國路嶮緣鐵銷而度下不見底熈平中宋雲等竟不能逹烏萇國在賖彌南北有葱嶺南至天竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪决焉土多林果引水灌田豐稻麥事佛多諸寺塔事極華麗人有争訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知往來也乾陁國在烏萇西本名業波為嚈噠所破因}
  - {type: page-break, offset: 9160, content: '', id: KR2a0020_WYG_102-25b, image: WYG0262/WYG0262-0487b.png}
