  - {type: variant, offset: 113, length: 2, content: 左右, WYG: 鄯善王以鎮之賦役其人比之郡縣且末國都且末城在鄯善西去代八千三百二十里真君三年鄯善王比龍避沮渠安周之難率國人之半奔且末後役屬鄯善且末西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駝豫知之即鳴而聚立埋其口鼻於沙中人毎以為候亦即将氈擁蔽鼻口其風迅駛斯湏過盡若不防者必至危斃于闐國在且末西北葱嶺之北二百餘里東去鄯善千五百里南去女國二千里去朱俱波千里北去龜兹千四百里去代九千八百里其地方亘千里連山相次所都城方八九里部内有大城五小城數十于闐城東三十里有苜拔河中出玉石土冝五榖並桑麻山多美玉有好馬駝騾其刑法殺人者死餘罪各随輕重懲罰之自外風俗物産與龜兹略同俗重佛法寺塔僧尼甚衆王尤信尚毎設齋日必親自灑掃饋食焉城南五十里有贊摩寺即昔羅漢比丘盧旃為其王造覆盆浮圖之所石上有辟支佛跣處雙跡猶存于闐西五里有比摩寺云是老子化胡成佛之所俗無禮義多盗賊滛縱自髙昌以西諸國人等深目髙鼻唯此一國貌不甚胡頗類華夏城東二十里有大水北流號樹枝水即黄河也一名計式水城西五十五里亦有大水名達利水與樹枝水會俱北流真君中世祖詔髙凉王那擊吐谷渾慕利延慕利延懼驅其部落渡流沙那進}
