  - {type: variant, offset: 8020, length: 0, content: '', WYG: 為優仍許其讓蕭衍求通和好朝廷盛選行人以諧兼散騎常侍為聘使主諧至石頭蕭衍遣其主客郎范胥當接諧問胥曰主客在郎官幾時胥答曰我本訓胄虎門適復今任諧言國子博士不應左轉為郎胥答曰特為接應逺賓故權兼耳諧言屈已濟務誠得事宜由我一介行人令卿左轉胥答曰自顧菲薄不足對揚盛美豈敢言屈胥問曰今猶尚暖北間當小寒於此諧答曰地居隂陽之正寒暑適時不知多少胥曰所訪鄴下豈是測影之地諧答曰皆是皇居帝里相去不逺可得統而言之胥曰洛陽既稱盛羙何事還鄴諧答曰不常厥邑于兹五邦王者無外所在闗河復何所怪胥曰殷人否危故遷相耿貴朝何為而遷諧答聖人藏往知來相時而動何必俟於隆替胥曰金陵王氣兆於先代黄旗紫蓋本出東南君臨萬邦故宜在此諧答曰帝王符命豈得與中國比隆紫蓋黄旗終於入洛無乃自害也有口之說乃是俳諧亦何足道蕭衍親問諧曰魏朝人士德行四科之徒凡有幾人諧對曰本朝多士等如林}
