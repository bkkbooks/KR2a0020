  - {type: variant, offset: 220, length: 0, content: '', WYG: 諡曰康子脩年即巒父也州主簿巒少而好學負帙尋師家貧厲節遂博覽書𫝊有文才幹略美鬚髯姿貌甚偉州郡表貢拜中書博士遷員外散騎侍郎為髙祖所知賞兼員外散騎常侍使於蕭賾還拜通直郎轉中書侍郎甚見顧遇常參座席髙祖因行藥至司空府南見巒宅遣使謂巒曰朝行藥至此見卿宅乃住東望徳館情有依然巒對曰陛下移構中京方建無窮之業臣意在與魏昇降寧容不務永年之宅髙祖謂司空穆亮僕射李沖曰巒之此言其意不小有司奏策秀孝詔曰秀孝殊問經權異策邢巒才清可令策秀後兼黄門郎從征漢北巒在新野後至髙祖曰伯玉天迷其心鬼惑其慮守危邦固逆主乃至如此巒曰新野既摧衆城悉潰唯有伯玉不識危機平殄之辰事在旦夕髙祖曰至此以來雖未擒滅城隍已崩想在不逺所以緩攻者正待中書為露布耳尋除正黄門兼御史中尉瀛州大中正遷散騎常侍兼尚書世宗初巒奏曰臣聞昔者明王之以德治天下莫不重粟帛輕金寶然粟帛安國育民之方金玉是虚華損徳之物故先皇深觀古今去諸奢侈服御尚質不貴雕鏤所珍在素不務奇綺至乃以紙絹為帳扆銅鐵為轡勒訓朝廷以節儉示百姓以憂務日夜孜孜小大必慎輕賤珠璣示其無設府藏之金裁給而已更不買積以費國資逮景明之初承升平之業四疆清晏遠邇來同於是蕃貢繼路商賈交入諸所獻貿倍多於常雖加以節約猶嵗損萬計珍貨常有餘國用恒不足若不裁其分限便恐無以支嵗自今非為要須者請皆不受世宗從之尋正尚書常侍如故蕭衍梁秦二州行事夏侯道遷以漢中内附詔加巒使持節都督征梁漢諸軍事假鎭西將軍進退徵攝得以便宜從事巒至漢中}
