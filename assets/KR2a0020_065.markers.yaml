  - {type: variant, offset: 8020, length: 0, content: '', krp: 為優仍許其讓蕭衍求通和好朝廷盛選行人以諧兼散騎常侍為聘使主諧至石頭蕭衍遣其主客郎范胥當接諧問胥曰主客在郎官幾時胥答曰我本訓胄虎門適復今任諧言國子博士不應左轉為郎胥答曰特為接應逺賓故權兼耳諧言屈已濟務誠得事宜由我一介行人令卿左轉胥答曰自顧菲薄不足對揚盛美豈敢言屈胥問曰今猶尚暖北間當小寒於此諧答曰地居隂陽之正寒暑適時不知多少胥曰所訪鄴下豈是測影之地諧答曰皆是皇居帝里相去不逺可得統而言之胥曰洛陽既稱盛羙何事還鄴諧答曰不常厥邑于兹五邦王者無外所在闗河復何所怪胥曰殷人否危故遷相耿貴朝何為而遷諧答聖人藏往知來相時而動何必俟於隆替胥曰金陵王氣兆於先代黄旗紫蓋本出東南君臨萬邦故宜在此諧答曰帝王符命豈得與中國比隆紫蓋黄旗終於入洛無乃自害也有口之說乃是俳諧亦何足道蕭衍親問諧曰魏朝人士德行四科之徒凡有幾人諧對曰本朝多士等如林}
  - {type: variant, offset: 8021, length: 0, content: '', WYG: 武賢才布在列位四科之美非無其人庸短造次無以備啓衍曰武王有亂臣十人魏雖人物之盛豈得頓如卿言諧曰愚謂周稱十人本無佐命至於濟濟多士實是文王之詩皇朝廊廟之才足與周人有競衍曰若爾文足摽異武有冠絶者便可指陳諧曰大丞相渤海王秉文經武左右皇極畫一九州懸衡四海録尚書汝陽王元叔昭尚書令元世儁宗室之秀綰政朝端左僕射司馬子如右僕射髙隆之並時譽民英戮力匡輔侍中髙岳侍中孫騰勲賢忠亮宣贊王猷自餘才美不可具悉衍曰故宜輔弼幼主永固基業深不可言江南稱其才}
