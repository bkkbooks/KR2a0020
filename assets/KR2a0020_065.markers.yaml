  - {type: variant, offset: 5366, length: 372, content: 率拒戰遂斬法援首顯宗至新野高祖詔曰卿破賊斬帥殊益軍勢朕方攻堅城何為不作露布也顯宗曰臣頃聞鎮南將軍王肅獲賊二三驢馬數匹皆為露布臣在東觀私每哂之近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脫復高曳長縑虛張功捷尤而效之其罪彌甚臣所以斂毫卷帛解上而已高祖笑曰如卿此勳誠合茅社須赭陽平定檢審相酬新野平以顯宗為鎮南廣陽王嘉諮議參軍顯宗後上表頗自矜伐訴前征勳詔曰顯宗斐然成章甚可怪責進退無檢虧我清風此而不糾或長弊俗可付尚書推列以聞兼尚書張彝奏免顯宗官詔曰顯宗雖浮矯致愆才猶可用豈得永棄之也可以白衣守諮議展其後效但鄙很之性不足參華可奪見并禁問訊諸王顯宗既失意遇信向洛乃為五言詩贈御史中尉李彪曰賈生謫長沙董儒詣臨江愧無若人跡忽尋兩賢蹤追昔渠閣游策駑厠羣龍如何情願奪飄然獨遠從痛哭去舊國銜淚届新邦哀哉無援民嗷然失侶鴻彼蒼不我聞千里告志同二十三年卒顯宗撰馮氏燕志孝友傳各十卷, WYG: 善}
