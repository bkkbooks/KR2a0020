  - {type: variant, offset: 228, length: 3, content: 義租六, WYG: 憑國威下仗將士邊帥用命頻有薄㨗藉勢乗威經度大劒既剋南安據彼要險前軍長邁已至梓潼新化之民飜然懷惠瞻望涪益旦夕可屠正以兵少糧匱未宜前出為爾稽緩懼失民心則更為宼今若不取後圖便難輒率愚管庶幾殄剋如其無功分受憲坐且益州殷實戸餘}
