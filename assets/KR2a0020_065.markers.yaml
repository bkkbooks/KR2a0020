  - {type: variant, offset: 2591, length: 0, content: '', WYG: 初為與廣平王懷遊晏左遷鄚縣令未之官除給事中遷司空主簿本州中正汝南王文學稍遷輔國將軍司空長史兼吏部郎中以本將軍出為南兖州刺史徵為太中大夫兼丞相髙陽王右長史尋以本將軍除滄州刺史為政清静吏民安之孝昌中卒時年五十一贈征北將軍尚書左僕射瀛州刺史諡曰文貞晏篤於義讓初為南兖州刺史例得一子觧褐乃啟其孤}
