  - {type: variant, offset: 8017, length: 1, content: 年, WYG: 虚舟之不繫既未識其所以來亦豈知其所以逝於是得喪同遣忘懷自深遇物栖息觸地山林雖因西浮之迹何異東都之心願自託於魚鳥永得性於飛沉庻保此以獲没不再罪於當今孝静初遭母憂還鄉里徵為魏尹將軍如故以禫制未終表辭朝議}
