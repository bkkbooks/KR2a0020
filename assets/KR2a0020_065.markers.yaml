  - {type: variant, offset: 6689, length: 1028, content: 背劉氏之恩義則曲在彼矣何負神明哉直義檄江南振旅回斾亦足以示救患之大仁揚義風於四海且攻難守易則力懸百倍不可不深思不可不熟慮今天下雖謐方外猶虞拾夤僥倖於西南狂虜伺舋於漠北脫攻不稱心恐兵不卒解兵不卒解則憂慮逾深夫為社稷之計者莫不先於守本臣愚以為觀兵江滸振曜皇威宜特加撫慰秋毫無犯則民知德信民知德信則襁負而來襁負而來則淮北可定淮北可定則吳寇異圖寇圖異則禍釁出然後觀釁而動則不晚矣請停諸州之兵且待後舉所謂守本者也伏惟陛下太皇太后英算神規彌綸百勝之外應機體變獨悟方寸之中臣影頹虞淵昏耄將及雖思憂國終無云補不從沙門法秀謀反伏誅駿表曰臣聞詩之作也蓋以言志邇之事父遠之事君關諸風俗靡不備焉上可以頌美聖德下可以申厚風化言之者無罪聞之者足以誡此古人用詩之本意臣以垂沒之年得逢盛明之運雖復昏耄將及猶慕廉頗強飯之風伏惟陛下太皇太后道合天地明侔日月則天與唐風斯穆順帝與周道通靈是以狂妖懷逆無隱謀之地冥靈潛翦伏發覺之誅用能七廟幽贊人神扶助者已臣不勝喜踴謹竭老鈍之思上慶國頌十六章并序巡狩甘雨之德焉其頌曰乾德不言四時迭序於皇大魏則天承祜疊聖三宗重明四祖豈伊殷周遐契三五明明在上聖敬日新汪汪叡后體治垂仁德從風穆教與化津千載昌運道隆茲辰歲惟巡狩應運遊田省方問苦訪政高年咸秩百靈柴望山川誰云禮滯遇聖則宣王業初定中山是由臨幸之盛情特綢繆仰歌祖業俯欣春柔大哉肆眚蕩民百憂百憂既蕩與之更初邕邕億兆戶詠來蘇忽有狂竪謀逆聖都明靈幽告發覺伏誅羿浞為亂祖龍千紀狂華冬茂有自來矣美哉皇度道固千祀百靈潛翦姦不遑起姦不遑起罪人得情憲章刑律五秩猶輕於穆二聖仁等春生除棄周漢遐軌犧庭周漢奚棄忿彼苛刻犧庭曷軌希仁尚德徽音一振聲教四塞豈惟京甸化播萬國誠信幽贊陰陽以調谷風扇夕甘雨降朝嘉生含穎深盛熙苗魚眾貧巷詠寡婦室謠聞諸詩者雲漢賦宣章句迥秀英昭雅篇矧乃盛明德隆道玄豈唯兩施神徵豐年豐年盛矣化無不濃有禮有樂政莫不通咨臣延躍欣詠時邕誰云易遇曠齡一逢上天無親唯德是在思樂盛明雖疲勿怠差之毫釐千里之倍願言勞謙求仁不悔人亦有言聖主慎微五國連兵踰年歷時鹿車而運廟算失思有司不惠蠶食役煩民不堪命將家逃山宜督厥守威德是宣威德如何聚衆盈川民之從令實賴衣食農桑失本誰耕誰織飢寒切身易子而食靜言念之實懷歎息昔聞典論非位不謀漆室憂國遺芳載臭咨臣昏老偏蒙恩祐忽忘狂瞽敢獻愚陋文明太后令曰省詩表聞之歌頌宗祖之功德可爾當世之言何其過也所箴下章戢之不忘駿又奏得一頌始於固業終於無為十篇文多不載文明太后令曰省表并頌十篇聞之鑒戒既備良用欽玩養老乞言其斯之謂又, WYG: 葬}
