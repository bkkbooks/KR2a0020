  - {type: variant, offset: 286, length: 0, content: '', krp: 邊患斯由靈贊皇魏天敗寇豎非臣等弱劣所能剋勝若臣之愚見今正宜修復邊鎭俟之後動且蕭衍尚在凶身未除螳蜋之志何能自息唯應廣備以待其來實不宜勞師逺入自取疲困今中山進軍鍾離實所未觧若能為得失之計不顧萬全直襲廣陵入其内地出其不備或未可知正欲屯兵蕭密餘軍猶自在彼欲言無糧運船復至而欲以八十日糧圖城者臣未之前聞且廣陵任城可為前戒豈容今者復欲同之今若往也彼牢城自守不與人戰城塹水深非可填塞空坐至春則士自敝苦遣臣赴彼糧何以致夏來之兵不齎冬服脫遇氷雪取濟何方臣寧荷怯儒不進之責不受敗損空行之罪鍾離天險朝貴所具若有内應則所不知如其無也必無剋状若其不復其辱如何若信臣言也願賜臣停若謂臣難行求囬臣所領兵統悉付中山任其處分臣求單騎隨逐東西且俗諺云耕則問田奴絹則問織婢臣雖不武忝備征將前宜可否頗實知之臣既謂難何容强遣詔曰安東頻請罷軍遲回未往阻異戎規殊乖至望士馬既殷無容停積宜務神速東西齊契乗勝掃殄以赴機㑹巒累表求還世宗許之英果敗退時人伏其識略初侍中盧昶與巒不平昶與元暉俱世宗所寵御史中尉崔亮昶之黨也昶暉令亮糾巒事成許言於世宗以亮為侍中亮於是奏劾巒在漢中掠良人為奴婢巒懼為昶等所陷乃以漢中所得巴西太守龎景民女化生等二十餘口與暉化生等數人奇色也暉大悅乃背昶為巒言於世宗云巒新有大功已經赦宥不宜方為此獄也世宗納之髙肇以巒有剋敵之效而為昶等所排助巒申釋故得不坐豫州城民白早生殺刺史司馬悅以城南入蕭衍遣其}
