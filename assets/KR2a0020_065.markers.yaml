  - {type: variant, offset: 7718, length: 177, content: 曰程駿歷官清慎言事每愜又門無俠貨之賓室有懷道之士可賜帛六百匹旌其儉德駿悉散之親舊性介直不競時榮太和九年正月病篤乃遺令曰吾存尚儉薄豈可沒為奢厚哉昔王孫裸葬有感而然士安籧篨頗亦矯厲今世既休明百度循禮彼非吾志也可斂以時服器皿從古遂卒年七十二初駿病甚高祖文明太后遣使者更問其疾敕御師徐謇診視賜以湯藥臨終詔以小子公稱為中散從子靈虬為著作佐郎及卒高祖文明太后傷惜之賜, WYG: 給}
