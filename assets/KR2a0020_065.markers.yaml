  - {type: variant, offset: 7978, length: 4, content: 並早卒公, krp: 徐州北海王顥撫軍府司馬入為長兼中書侍郎崔光引為兼著作郎諧在史職無所歴意加輔國將軍相州大中正光禄大夫除金紫光禄大夫加衛將軍元顥入洛以為給事黄門侍郎顥敗除名乃為述身賦曰夫休咎相躡禍福相生龜筮迷其兆聖達蔽其萌覽成敗於前迹料趣舍於人情咸爭途以走利罕外已以逃名連從車以載禍多廐馬以取刑豈知夫一介獨往乃千乗所不能傾伊薄躬之悔吝無性命之淑靈藉休庸於祖武仰餘烈於家聲徒從師以下學之遊道於上京洎方年之四五實始筮之弱齡爰釋巾而從吏謬邀寵於時明彼闕一字闕一字之赫赫乃陋周而小漢帝文篤其成功我武治其未亂掩四奥而同軌穆三辰而貞觀威北暢而武戢鼎南遷而文煥異人相趨於絳闕鴻生接武於儒館總羣雅而同歸果方員而殊貫伊濫吹之所從初竊服於宰旅奉盛王之髙義遊兎園而容與綴鴻鷺之末行連英髦之茂序及伯舅之西伐赫靈旗之東舉復奉役於前轅仍執羈於後距廹𤣥冬之暮嵗歴闗山之遐阻風激沙而破石雪浮河而漫野樂在志其無端悲涉物而多緒俄宫車之晏駕改乗轅而歸予屬推恩之在今自傍枝而禔福既獻闕一字以命宗叨㣲躬於侯服}
