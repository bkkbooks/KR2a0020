  - {type: variant, offset: 2699, length: 228, content: 一曰竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可簡并功則洛京易就往冬輿駕停鄴是閑隙之時猶編戶供奉勞費為劇聖鑒矜愍優旨殷勤爵浹高年賚周魚眾寡雖賑貸普霑今猶恐來夏菜色況三農要時六軍雲會其所損業實為不少雖調斂輕省未足稱勞然大駕親臨誰敢寧息往來承奉紛紛道路田蠶暫廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生癘疫此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功專力以營洛邑則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉爾如歸, WYG: 室宥}
