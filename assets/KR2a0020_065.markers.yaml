  - {type: variant, offset: 3655, length: 1673, content: 重之內視人如赤子百司分萬務之要遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由於此書曰與其殺不辜寧失不經實宜敕示百僚以惠元元之命又曰昔周王為犬戎所逐東遷河洛鎬京猶稱宗周以存本也光武雖曰中興實自創革西京尚置京尹亦不廢舊今陛下光隆先業遷宅中土稽古復禮於斯為盛豈若周漢出於不得已哉按春秋之義有宗廟曰都無則謂之邑此不刊之典也況北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福地實亦遠矣今便同之郡國臣竊不安愚謂代京宜建畿置尹一如故事崇本重舊以光萬葉又曰伏見洛京之制居民以官位相從不依族類然官位非常有朝榮而夕悴則衣冠淪於厮竪之邑臧獲騰於膏腴之里物之顛倒或至於斯古之聖王必令四民異居者欲其業定而志專業定則不偽志專則不淫故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝創基撥亂日不暇給然猶分別士庶不令雜居伎作屠沽各有攸處但不設科禁賣買任情販貴易賤錯居混雜假令一處彈箏吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童任意所從其走赴舞堂者萬數往就學館者無一此則伎作不可雜居士人不宜異處之明驗也故孔父云里仁之美孟母弘三徙之訓賢聖明誨若此之重今令伎作家習士人風禮則百年難成令士人兒童効伎作容態則一朝可得是以士人同處則禮教易興伎作雜居則風俗難改朝廷每選舉人士則校其一婚一宦以為升降何其密也至於開伎作宦途得與膏粱華望接閤連甍何其略也此愚臣之所惑今稽古建極光宅中區凡所徙居皆是公地分別伎作在於一言有何為疑而闕盛美又曰自南偽相承竊有淮北欲擅中華之稱且以招誘邊民故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆疑惑書記錯亂區宇非所以疆域物土必也正名之謂也愚以為可依地理舊名一皆釐革小者并合大者分置及中州郡縣昔以戶少併省今人口既多亦可復舊君人者以天下為家不得有所私也故倉庫儲貯以俟水旱之災供軍國之用至於有功德者然後加賜爰及末代乃寵之所隆賜賚無限自比以來亦為太過在朝諸貴受祿不輕土木被錦綺僮妾厭粱肉而復厚賚屢加動以千計若分賜魚眾寡贍濟實多如不悛革豈周急不繼富之謂也愚謂事有可賞則明旨褒揚稱事加賜以勸為善不可以親近之昵猥損天府之儲又曰諸宿衞內直者宜令武官習弓矢文官諷書傳而今給其蒱博之具以成褻狎之容長矜爭之心恣諠囂之慢徒損朝儀無益事實如此之類一宜禁止高祖善之後乃啟乞宋王劉昶府諮議參軍事欲立効南境高祖不許高祖曾謂顯宗及程靈虬曰著作之任國書是司卿等之文朕自委悉中省之品卿等所聞若欲取況古人班馬之徒固自遼闊若求之當世文學之能卿等應推崔孝伯又謂顯宗曰見卿所撰燕志及在齊詩詠大勝比來之文然著述之功我所不見當更訪之監令校卿才能可居中第又謂程靈虬曰卿比顯宗復有差降可居下上顯宗對曰臣才第短淺猥聞上天至乃比於崔光實為隆渥然臣竊謂陛下貴古而賤今臣學微才短誠不敢仰希古人然遭聖明之世覩惟新之禮染翰勒素實錄時事亦未慚於後人昔揚雄著太玄經當時不免覆盎之談二百年外則越諸子今臣之所撰雖未足光述帝載稗暉日月然萬祀之後仰觀祖宗巍巍之功上覩陛下明明之德亦何謝欽明於唐典慎徽於虞書高祖曰假使朕無愧於虞舜卿復何如於堯臣顯宗曰臣聞君不可以獨治故設百官以贊務陛下齊蹤堯舜公卿寧非二八之儔高祖曰卿為著作僅名奉職未是良史也顯宗曰臣仰遭明時直筆而無懼又不受金安眠美食此臣優於遷固也高祖哂之後與員外郎崔逸等參定朝儀高祖曾詔諸官曰自近代已來高卑出身有常分朕意一以為可復以為不可宜相與量之李沖對曰未審上古已來置官列位為欲為膏粱兒地為欲益治讚時高祖曰俱欲為治沖曰若欲為治陛下今日何為專崇門品不有拔才之詔高祖曰苟有殊人之伎不患不知然君子之門假使無當世之用者要自德行純篤朕是以用之沖曰傅巖呂望豈可以門見舉高祖曰如此濟世者希曠代有一兩人耳沖謂諸卿士曰適欲請諸賢救之祕書令李彪曰師旅寡少未足為援意有所懷不敢盡言於聖日陛下若專以門地不審魯之三卿孰若四科高祖曰猶如向解顯宗進曰陛下光宅洛邑百禮唯新國之興否指此一選臣既學識浮淺不能援引古今以證此議且以國事論之不審中祕書監令之子必為祕書郎頃來為監令者子皆可為不高祖曰卿何不論當世膏腴為監令者顯宗曰陛下以物不可類不應以貴承貴以賤襲賤高祖曰若有高明卓爾才具雋出者朕亦不拘此例後為本州中正二十一年車駕南伐顯宗為右軍府長史, WYG: 卒贈}
