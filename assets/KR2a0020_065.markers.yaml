  - {type: variant, offset: 3500, length: 154, content: 以居尊以御下者威也兆庶所以徙惡以從善者法也是以有國有家必以刑法為治生民之命於是而在有罪必罰罰必當辜則雖箠撻之刑而人莫敢犯也有制不行人得僥倖則雖參夷之誅不足以肅自太和以來未多坐盜棄市而遠近肅清由此言之止姦在於防檢不在麗刑也今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盜迭相敦厲遂成風俗陛下居, WYG: 稱年四十}
