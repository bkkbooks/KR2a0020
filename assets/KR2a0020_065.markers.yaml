  - {type: variant, offset: 224, length: 0, content: '', WYG: 西七百南北千里獲郡十四二部護軍及諸縣戍遂逼涪城巒表曰揚州成都相去萬里陸途既絶唯資水路蕭衍兄子淵藻去年四月十三日發揚州今嵗四月四日至蜀水軍西上非周年不達外無軍援一可圖也益州頃經劉季連反叛鄧元起攻圍資儲散盡倉庫空竭今猶未復兼民人喪膽無復固守之意二可圖也蕭淵藻是羣劇少年未洽治務及至益州便戮鄧元超曹亮宗臨戎斬將則是駕馭失方范國惠津渠退敗鏁執在獄今之所任並非宿將重名皆是左右少年而已既不厭民望多行殘暴民心離觧三可圖也蜀之所恃唯劒閣今既剋南安巳奪其險據彼界内三分已一從南安向涪方軌任意前軍累破後衆喪魂四可圖也昔劉禪據一國之地姜維為佐鄧艾既出綿竹彼即投降及符堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓温西征不旬月而平蜀地昔來恒多不守况淵藻是蕭衍兄子骨肉至親若其逃亡當無死理脫軍剋涪城淵藻復何宜城中坐而受困若其出鬬庸蜀之卒唯便刀矟弓箭至少假有遥射弗至傷人五可圖也臣聞乗機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在於今矣是以踐極之初壽春馳款先嵗命將義}
