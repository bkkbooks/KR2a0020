  - {type: variant, offset: 7986, length: 0, content: '', WYG: 雖邇傒塵滓而賞許雲霞棲閑虚以築館背城闕而為家帶二學之髙宇逺三市之狹邪事雖儉而未陋製有度而不奢山隠勢於複石水回流於激沙樹先春而動色草迎嵗而發花座有清談之客門交好事之車或林嬉於月夜或水宴於景斜肆雕章之腴㫖咀文藝之英華差緑芰與丹藕薦朱李及甘𤓰雖慙洛水之名致有類金谷之諠譁聊自足於所好豈留連於或號思烱戒而自反朂身名於所蹈奉哲后之淵猷讚崇麾於華奥豈千乗之乏使感一眄之相勞竟不留於三月因病滿而休告彼東觀之清華乃任隆於載筆蔡一去而貽恨張再選而有述忽牽短而濫官司惇史於藏室慙班子之繁麗㣲馬生之簡實復通籍而延寵陪帝扄之華密信儀鳯之所棲乃絲文之自出歴五載而徘徊猶官命之不改謝能飛於無翼故同滯於有待晚加秩於戎章乃闕一字號之斯在屬運道之將季諒冠屨之無碍奄昇御於鼎湖忽流哀於四海昔漢命之中㣲皇統於是三絶暨孝昌之陵陂亦繼闕一字而禍結將小雅之詩廢復三綱之道滅思跼蹐於時昏獨沉吟於運閉遂退處於窮里不外交於人}
  - {type: page-break, offset: 7986, content: '', id: KR2a0020_WYG_065-29a, image: WYG0261/WYG0261-0895a.png}
