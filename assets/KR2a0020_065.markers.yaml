  - {type: variant, offset: 7987, length: 4, content: 伯好學頗, WYG: 及數反於中興驅時雄而電逝既藉取亂之權方乗轉圓之勢俄隙開而守廢遂冠冕之毁裂彼膏原而塗野嗟衛肝與稽血何古今之一揆毎治少而亂多盧遁身於東掖荀窘迹於南羅時獲逃於闕一字阜仍竄宿於巖阿首丘急於明發東路長其如何遽登舟而鼓柂乃㳂洛而汎河騖寸隂於不測競征鳥於歸波時在所而放命連百萬於山東何信都之巨猾若封豕與大風肆吞噬於觜距咸邑燼而野空徑黎陽之寇聚廹崖壘之渢隆躁通川而鼎沸矢交射於舟中備百罹於兹日諒陳蔡之非窮乗虎口而獲濟陵陽侯而迅往得投憇於濮陽實陶衛之舊壤望鄉村而佇立曽不遥之河廣聞虜馬之夕嘶見胡塵之晝上王略恢而廟勝車徒發而雷響扇風師之猛氣張天罼之層網裁一鼓而冰銷俄氛祲之廓蕩昔蘧生之出奔覩亡徵於亂政及季子之來反乃君立而位定伊吾人之蕞爾本無傒於衰盛忻草茅而偃伏且優遊於宸慶復推斥於宦流延光華於璽命甫聞内侍之忝復奉優加之令何金紫之陸離鬱貂玉之相映時權定之云初尚民心之易擾何建武之明傑茂雄姿於天表忽靈命之}
