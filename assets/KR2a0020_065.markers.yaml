  - {type: variant, offset: 223, length: 0, content: '', WYG: 之斬景民巴西悉平蕭衍遣其冠軍將軍孔陵等率衆二萬屯據深坑冠軍將軍曾方達固南安冠軍將軍任僧褒輔國將軍李畎戍石同巒統軍王足所在擊破之梟衍輔國將軍樂保明寧朔將軍李伯度龍驤將軍李思賢賊遂保囬車柵足又進擊衍輔國將軍范峻自餘斬獲殆將萬數孔陵等收集遺衆奔保梓潼足又破之斬衍輔國將軍符伯度其殺傷投溺者萬有餘人開地定民}
