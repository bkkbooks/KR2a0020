  - {type: variant, offset: 7992, length: 16, content: 文才荊州府主簿始駿從祖弟伯達伯達, WYG: 歸藉親均而爭紹師出楚而飈發斾陵江而雲矯闢閶闔之崢嶸端冕旒於億兆神駕逝以流越翠華飈而繚繞茍命舛而數違雖功深而祚夭時難忽然已及網羅周其四張非五三之親暱罕狥節於漢陽彼百寮之冠帶咸北面於西王矧恩疎而任逺固身存而義亡及宸居之反正振天網於頽綱甄大義以明罰虚半列於周行乃褫帶而來反驅下澤於故鄉探宿志以内求撫身途而自計不詭遇以邀合豈釣}
