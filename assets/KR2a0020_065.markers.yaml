  - {type: variant, offset: 7956, length: 0, content: '', WYG: 東南情存避難當時物論謂其得所然北海未敗之日徐州刺史元孚為其純臣莫之敢距表啟相望遲速唯命及皇輿返正神器斯復輕薄之徒共生僥倖詭言要賞曲道求通濫及善人稱為己力若以奬受命賊朝語跡成罪便與天下共當此責于時朝㫖唯命免官亦既經恩方加酷濫伊昔具臣比肩賊所身臨河上日尋干戈時逢寛政任遇不改一介使人獨嬰斯戮凡在有心孰不嗟悼前朝所以論功}
