  - {type: variant, offset: 6556, length: 132, content: 匹駿又表曰春秋有云見有禮於其君者若孝子之養父母見無禮於其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳殺君宣尼請討雖欲晏逸其得已乎今廟算天回七州雲動將水蕩鯨鯢陸掃凶逆然戰貴不陳兵家所美宜先遣劉昶招喻淮南若應聲響悅同心齊舉則長江之險可朝服而濟道成之首可崇朝而懸苟江南之輕, WYG: 叚熙平元年冬卒遺命}
