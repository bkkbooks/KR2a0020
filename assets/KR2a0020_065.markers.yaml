  - {type: variant, offset: 7953, length: 2, content: 都水, WYG: 慰勞徐州羽林及城人不承顥㫖害奬𫝊首洛陽出帝時奬故吏通直散騎常侍宋游道上書理奬曰臣聞賞善罸惡謂之二機有道存焉所貴不濫是以子胥無罪呉人痛之郄宛不幸國言未息故河南尹李奬門居戚里世擅名家有此良才是兼周用自少及長忠孝為心入朝出牧清明流譽襟懷放暢風神爽發實廊廟之瑚璉社稷之楨幹往嵗北海竊據負扆當朝王公卿士俛眉從事而奬闔門百口同居京洛既被羈縶自拔無由託}
