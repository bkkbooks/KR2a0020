  - {type: variant, offset: 283, length: 2, content: 家尋, WYG: 級元桓又破固城畢祖朽復破念等兖州悉平巒破賊將藍懷恭於睢口進圍宿豫而懷恭等復於淮南造城規斷水陸之路巒身率諸軍自水南而進遣平南將軍楊大眼從北逼之統軍劉思祖等夾水造筏燒其舩舫衆軍齊進拔柵填塹登其城火起中流四面俱擊仍陷賊城俘斬數萬在陳别斬懷恭擒其列侯列將直閤直後三千餘人俘斬一萬宿豫既平蕭昞亦於淮陽退走二戍獲米四十餘萬石世宗賜巒璽書曰知大龕醜虜威振賊庭淮外霧披徐方卷濭王略逺恢混一維始公私慶泰何快如之賊衍此舉實為傾國比者宿豫陷殁淮陽嬰城凶狡侜張規抗王旅將軍忠規協著火烈霜摧電動岱隂風掃沂嶧遂令逋誅之寇一朝殱夷元鯨大憝千里折首殊勲茂㨗自古莫二但揚區未安餘燼宜盪乘勝掎角勢不可遺便可率厲三軍因時經略申威東南清彼江介忘此仍勞用圖永逸進退規度委之髙算又詔巒曰淮陽宿豫雖已清復梁城之賊猶敢聚結事宜乗勝并勢摧殄可率二萬之衆渡淮與征南掎角以圖進取之計及梁城賊走中山王英乗勝攻鍾離又詔巒帥衆㑹之巒表曰奉彼詔㫖令臣濟淮與征南掎角乗勝長驅實是其㑹但愚懷所量竊有未盡夫圖南因於積風伐國在於資給用兵治戎須先計校非可抑為必闕幸其無能若欲掠地誅民必應萬勝如欲攻城取邑未見其果得之則所益未幾不獲則虧損必大蕭衍傾竭江東為今嵗之舉疲兵喪衆大敗而還君臣失計取笑天下雖野戰非人敵守城足有餘今雖攻之未易可剋又廣陵懸逺去江四十里鍾離淮隂介在淮外假其歸順而來猶恐無糧艱守况加攻討勞兵士乎且征南軍士從戎二時疲敝死病量可知巳雖有乘勝之資懼無逺用之力若臣之愚見謂宜修復舊戍牢實邊方息養中州擬之後舉又江東之釁不患乆無畜力待機謂為勝計詔曰濟淮掎角事如前勑何容猶爾盤桓方有此請可速進軍經略之宜聼征南至要巒又表曰蕭衍侵境乆勞王師今者奔走實}
