  - {type: variant, offset: 233, length: 2, content: 斛并, krp: 比壽春義陽三倍非匹可乗可利實在于兹若朝廷志存保民未欲經略臣之在此便為無事乞歸侍養㣲展烏鳥詔曰若賊敢闚𨵦觀機翦撲如其無也則安民保境以悅邊心子蜀之舉更聼後勑方將席卷岷蜀電掃西南何得辭以戀親中途告退宜朂令圖務申髙略巒又表曰昔鄧艾鍾㑹率十八萬衆傾中國資給裁得平蜀所以然者鬬實力故也况臣才絶古人智勇又闕復何宜請二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可剋今王足前進已逼涪城脫得涪城則益州便是成擒之物但得之有早晚耳且梓潼已附民戸數萬朝廷豈得不守之也若守也直保境之兵則已一萬臣今請二萬五千所増無幾又劒閣天險古來所稱張載銘云世亂則逆世清斯順此之一言良可惜矣臣誠知征戎危事不易可為自軍度劒閣以來鬢髮中白憂慮戰懼寧可一日為心所以勉强者既得此地而自退不守恐辜先皇之恩遇負陛下之爵禄是以孜孜頻有陳請且臣之意算正欲先圖涪城以漸而進若剋涪城便是中分益州之地斷水陸之衝彼外無援軍孤城自守復何能持乆哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大剋不得則自全又巴西南鄭相離一千四百去州迢遞恒多生動昔在南之日以其統綰勢難故增立巴州鎮靜夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯五三族落雖在山居而多有豪右文學箋啟往往可觀冠帶風流亦為不少但以去州既遠不能仕進至於州綱無由厠迹巴境民豪便是無梁州之分是以鬱怏多生動靜比建議之始嚴𤣥思自號巴州刺史剋城以來仍使行事巴西廣袤一千戸餘四萬若彼立州鎮攝華獠則大帖民情從墊江已還不復勞征自為國有世宗不從又王足於涪城輒還遂不定蜀巒既剋巴西遣軍主李仲遷守之仲遷得蕭衍將張法養女有美色甚惑之散費兵儲専心酒色公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城降衍將譙希遠巴西遂没武興氐楊集起等反叛巒遣統軍傅豎眼討平之語在豎眼𫝊巒之初至漢中從容風雅接豪右以禮撫細民以惠嵗餘之後頗因百姓去就誅滅齊民籍為奴婢者二百餘口兼商販聚歛清論鄙之徵授度支尚書時蕭衍遣兵侵軼徐兖緣邊鎮戍相繼陷没朝廷憂之乃以巒為使持節都督東討諸軍事安東將軍尚書如故世宗勞遣巒於東堂曰蕭衍寇邊旬朔滋甚諸軍舛互規致連戍陷没宋魯之民尤罹湯炭誠知將軍旋京未久膝下難違然東南之寄非將軍莫可將軍其勉建殊績以稱朕懷自古忠臣亦非無孝也巒對曰賊雖送死連城犬羊衆盛然逆順理殊滅當無逺况臣仗陛下之神算奉律以摧之平殄之期可指辰而待願陛下勿以東南為慮世宗曰漢祖有云金吾擊郾吾無憂矣今將軍董戎朕何慮哉先是蕭衍輔國將軍蕭及先率衆二萬寇陷固城冠軍將軍魯顯文驍騎將軍相文玉等率衆一萬屯於孤山衍將角念等率衆一萬擾亂龜蒙土民從逆十室而五巒遣統軍樊魯討文玉别將元恒}
