  - {type: variant, offset: 1143, length: 796, content: 子熙父以爵讓弟顯宗不受子熙緣父素懷卒亦不襲及顯宗卒子熙別蒙賜爵乃以其先爵讓弟仲穆兄弟友愛如此父亡居喪有禮子熙為懌所眷遇遂闕位待其畢喪後復用及元叉害懌久不得葬子熙為之憂悴屏處田野每言王若不得復封以禮遷葬誓以終身不仕後靈太后返政以元叉為尚書令解其領軍子熙與懌中大夫劉定興學官令傅靈襀賓客張子慎伏闕上書曰竊惟故主太傅清河王職綜樞衡位居論道盡忠貞以奉公竭心膂以事國自先皇崩殂陛下沖幼負扆當朝義同分陝宋維反常小子性若青蠅汙白點黑讒佞是務以元叉皇姨之壻權勢攸歸遂相附託規求榮利共結圖謀坐生眉眼誣告國王枉以大逆賴明明在上赫赫臨下泥漬自消玉質還潔謹案律文諸告事不實以其罪罪之維遂無罪出為大郡刑賞僭差朝野怪愕若非宋維與叉為計豈得全其身命方撫千里王以權在寵家塵謗紛雜恭慎之心逾深逾厲去其本宅移住殿西闔門靜守親賓阻絕于時吏部諮禀劉騰奏其弟官郡戍兼補及經內呈為王駁退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宮拷掠胡定誣王行毒含齒戴髮莫不悲惋及會公卿議王之罪莫不俛眉飲氣唯諮是從僕射游肇亢言厲氣發憤成疾為王致死王之忠誠款篤節義純貞非但蘊藏胸襟實乃形於文翰搜括史傳撰顯忠錄區目十篇分卷二十既欲彰忠心於萬代豈可為逆亂於一朝乞追遺志足明丹款叉籍寵姻戚恃握兵馬無君之心實懷皂白擅廢太后枉害國王生殺之柄不由陛下賞罰之詔一出於叉名藩重地皆其親黨京官要任必其心腹中山王熙本興義兵不圖神器戮其大逆合門滅盡遂令元略南奔為國巨患奚康生國之猛將盡忠棄市其餘枉被屠戮者不可稱數緣此普天喪氣匝地憤傷致使朔隴猖狂歷歲為亂荊徐蠢動職是之由昔趙高秉秦令關東鼎沸今元叉執權使四方雲擾自古及今竹帛所載賊子亂臣莫此為甚開逆之始起自宋維成禍之末良由騰矣而令凶徒姦黨迭相樹置高官厚祿任情自取非但臣等痛恨終身抑為聖朝懷慚負愧以臣赤心慺慺之見宜梟諸兩觀洿其舍廬騰合棺斬骸沉其五族上謝天人幽隔之憤下報忠臣寃酷之痛方乃崇亞三事委以樞端所謂虎也更傅其翼朝野切齒遐邇扼腕蔓草難, WYG: ''}
