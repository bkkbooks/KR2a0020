  - {type: variant, offset: 7957, length: 0, content: '', WYG: 見其邊人且相慰悅其有郭黙生亂劉允懸首事乃權宜蓋非實録昔鄧艾下世叚灼理其寃馬援物故朱勃申其屈臣雖小人趣事君子有懷舊恩義兼人故見其若此乆欲陳辭含言未吐遂至今日幽泉已閉壟樹成行内手捫心顧懷愧慨幸逢興聖理運唯新雖日纂戎事同創革頻有大恩被於率土亡官失爵者悉蒙追復而奬雜木猶存牛車未改士感知已懷此無忘輕率瞽言干犯輦轂伏願天鑒賜垂矜覽加其贈秩慰此幽魂詔贈衛將軍冀州刺史子構襲}
