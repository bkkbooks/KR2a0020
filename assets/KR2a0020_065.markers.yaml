  - {type: variant, offset: 2592, length: 1, content: 顯, WYG: 子子慎年甫十二而其子已弱冠矣後為滄州復啟孤兄子昕為府主簿而其子並未從宦世人以此多之子測武定末太子洗馬測弟亢字子髙頗有文學釋褐司空行參軍遷廣平王開府從事中郎兼通直散騎常侍使於蕭衍時年二十八還除平東將軍齊文襄王大將軍府屬又轉中外府屬武定七年坐事死於晉陽年三十四巒叔祖祐字}
