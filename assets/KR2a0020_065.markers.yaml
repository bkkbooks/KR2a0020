  - {type: variant, offset: 2108, length: 235, content: 鴻臚少卿建義初兼黃門尋正子熙清白自守不交人事又少孤為叔顯宗所撫養及顯宗卒顯宗子伯華又幼子熙友愛等於同生長猶共居車馬資財隨其費用未嘗見於言色又上書求析階與伯華於是除伯華東太原太守及伯華在郡為刺史元弼所辱子熙乃泣訴朝廷肅宗詔遣按檢弼遂大見詰讓尒朱榮之擒葛榮也送至京師莊帝欲面見數之子熙以為榮既元兇自知必死恐或不遜無宜見之尒朱榮聞而大怒請罪子熙莊帝恕而不責尋加征虜將軍及邢杲之起逆詔子熙慰勞杲詐降而子熙信之還至樂陵杲復反子熙遂還坐付廷尉論以大辟恕死免官未幾兼尚書吏部郎普泰初除, WYG: ''}
