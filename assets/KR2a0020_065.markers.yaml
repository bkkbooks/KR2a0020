  - {type: variant, offset: 5819, length: 1, content: 師, krp: 後以例降襲爵彭城公拜太子中舍人遷散騎侍郎舍人如故遷太子中庻子平因侍從容請自效一郡髙祖曰卿復欲以吏}
  - {type: variant, offset: 5821, length: 4, content: 劉昞性機, WYG: 自試也拜長樂太守政務清静吏民懷之車駕南伐以平兼冀州儀同開府長史甚著聲稱仍除正長史太守如故未幾遂行河南尹豪右權貴憚之世宗即位除黄門郎遷司徒左長史行尹如故尋以稱職正尹長史如故車駕將幸鄴平上表諌曰伏見巳丑詔書雲軒鑾輅行幸有期鳳服龍驂剋駕近日將欲講武淇陽大習鄴魏馳驌騻於緑竹之區騁驎驥於漳􅇭之壤斯誠幽顯同忻人靈共悅臣之愚管竊有惑焉何者嵩京創構洛邑俶營雖年跨十稔根基未就代民至洛始欲向盡資產罄於遷移牛畜斃於輦運陵太行之險越長津之難辛勤備經得達京闕富者猶損大半貧者可以意知兼歴嵗從戎不遑啟處自景明已來差得休息事農者未積二丰之儲築室者裁有數間之屋莫不肆力伊瀍人急其務寔宜安静新人勸其稼穡令國有九年之糧家有水旱之備若乗之以羈紲則所廢多矣一夫從役舉家失業今復秋稼盈田禾菽遍野鑾駕所幸騰踐必殷未若端拱中天坐招四海耀武崧原禮射伊洛士馬無跋涉之勞兆民有康哉之詠可不美歟不從詔以本官行相州事世宗至鄴親幸平第見其諸子尋正刺史加征虜將軍平勸課農桑修飾太學簡試通儒以充博士選五郡聰}
