  - {type: variant, offset: 897, length: 2, content: 進號, WYG: 平原二郡太守贈濟州刺史元興少有操尚隨僧集在平原因就中山張吾貴常山房虬學通禮傳頗有文才年二十三還鄉敎授常數百人領竂孝廉對䇿高第又舉秀才時御史中尉王顯有權寵元興奏記於顯召爲檢校御史尋轉殿中除奉朝請三使高麗江陽王繼爲司徒元興爲記室參軍遂爲元义所知义秉朝政引元興為尚書殿中郎領中書舍人仍御史元興居其腹心預聞時事卑身剋已人無恨焉家數貧約食容恒數十人同其飢飽曾無吝色時人歎尚之及太保崔光臨薨薦元興爲侍讀尚書賈思伯爲侍講授肅宗杜氏春秋於式乾殿元興常爲擿句儒者榮之及义欲解領軍以訪元興元興曰未知公意如何耳又曰卿謂吾欲反也元興不敢言因勸之义既賜死元興亦被廢乃爲浮萍詩以自喻曰有草生碧池無根縁水上脆弱惡風波危微苦驚浪丞相高陽王雍召爲兼屬未幾去任還鄉僕射元羅爲東道大使以元興爲本郡太守尋徴赴闕以母憂還家頻值鄉亂數爲監軍元興多所賞罰鄉黨頗以此憾焉上黨王天穆之討邢杲引爲大將軍從事中郎元顥入洛復爲}
  - {type: page-break, offset: 897, content: '', id: KR2a0020_WYG_079-13b, image: WYG0262/WYG0262-0182b.png}
