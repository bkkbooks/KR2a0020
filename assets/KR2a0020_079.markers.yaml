  - {type: variant, offset: 271, length: 0, content: '', WYG: 諡曰定子霄字景鸞亦學渉好爲文詠但詞彩不倫率多鄙俗與河東姜質等朋遊相好詩賦閒起知音之士共所嗤笑閭巷淺識頌諷成羣乃至大行於世歴治書侍御史而卒范紹字始孫敦煌龍勒人少而聰敏年十二父命就學師事崔光以父憂廢業母又誡之曰汝父卒日令汝逺就崔生希有成立今已過朞宜遵成命紹還赴學太和初充太學生轉筭生頗渉經史十六年}
