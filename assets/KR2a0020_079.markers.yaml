  - {type: variant, offset: 687, length: 0, content: '', WYG: 碭郡太守卒董紹字興逺新蔡鮦陽人也少好學頗有文義起家}
  - {type: variant, offset: 687, length: 0, content: '', krp: 碭郡太守卒董紹字興逺新蔡鮦陽人也少好學頗有文義起家}
  - {type: variant, offset: 688, length: 0, content: '', WYG: 門博士歴殿中侍御史國子助敎積射將軍兼中書舍人辯於對問爲世宗所賞豫州城人白早生以城南叛詔紹慰勞至上蔡爲賊所襲囚送江東仍被鏁禁蕭衍領軍將軍呂僧珍蹔與詔言便相器重衍聞之遣使勞紹云忠臣孝子不可無之今當聴卿還國紹對曰老母在洛無復}
  - {type: variant, offset: 688, length: 0, content: '', krp: 門博士歴殿中侍御史國子助敎積射將軍兼中書舍人辯於對問爲世宗所賞豫州城人白早生以城南叛詔紹慰勞至上蔡爲賊所襲囚送江東仍被鏁禁蕭衍領軍將軍呂僧珍蹔與詔言便相器重衍聞之遣使勞紹云忠臣孝子不可無之今當聴卿還國紹對曰老母在洛無復}
  - {type: variant, offset: 689, length: 0, content: '', WYG: 寸既奉恩貸實若更生衍又遣主書霍靈超謂紹曰今放卿還令卿通兩家之好彼此息民豈不善也對曰通好息民乃兩國之事既䝉命及輙當聞奏本朝衍賜紹衣物引入見之令其舍人周捨慰勞并稱戰爭多年民物塗炭是以不耻先言與魏朝通好比亦有書都無報㫖卿宜備申此意故遣傳詔周靈秀送卿至國遲有嘉問又令謂紹曰卿知所以得不死不今者獲卿乃天意也夫千人之聚不散則亂故湏立君以治天下不以天下飬一人凡在民上胡不思此若欲通好今以宿豫還彼彼當以漢中見歸先是詔有司以所獲衍將齊茍兒等十人欲以換紹事在司馬悦𫝊及紹還世宗愍之永平中除給事中仍兼舍人紹雖陳説和計朝廷不許乆之加輕車將軍正舍人又除歩}
  - {type: page-break, offset: 689, content: '', id: KR2a0020_WYG_079-11a, image: WYG0262/WYG0262-0181a.png}
