  - {type: variant, offset: 273, length: 0, content: '', krp: 選爲門下通事令史遷録事令掌奏文集髙祖善之又爲侍中李沖黄門崔光所知出内文奏多以委之高祖曽謂近臣曰崔光從容范紹之力稍遷彊弩將軍積弩將軍公車令加給事中遷羽林監揚州刺史任城王澄請征鍾離勑紹詣夀春共量進止澄曰湏兵十萬往還百日渦陽鍾離廣陵廬江欲數道俱進但糧仗軍資湏朝廷速遣紹曰計十萬之衆往還百日湏糧百日頃秋以向末方欲徵召兵仗可集恐糧難至有兵無糧何以剋敵願王善思爲社稷深慮澄沉思良乆曰實如卿言使還具以狀聞後澄遂征鍾離無功而返尋除長兼奉車都尉轉右都水使者録事如故丁母憂去職值義陽初復起紹除寜逺將軍郢州龍驤府長史帶義陽太守其年冬使還都值朝廷有南討之計發河北數州田兵二萬五千人通縁淮戍兵合五萬餘人廣開屯田八座奏紹爲西道六州營田大使加歩兵校尉紹勤於勸課頻嵗大獲又詔紹詣鍾離與都督中山王英論攻鍾離形勢英固言必剋紹觀其城隍防守恐不可䧟勸令班師英不從紹還具以狀聞俄而英敗詔以徐豫二境民稀土曠令紹量度處所更立一州紹以譙城形要之所置州爲便遂立南兖入爲主衣都統加中堅將軍轉前軍將軍追賞營田之勤拜游擊將軍遷龍驤將軍太府少卿都統如故轉長兼太府卿紹量功節用甄煩就簡凢有}
