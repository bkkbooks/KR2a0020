  - {type: variant, offset: 5397, length: 223, content: 入朝朝士慮其有變莊帝又畏惡之榮從弟世隆與榮書勸其不來榮妻北鄉郡長公主亦勸不行榮並不從帝既圖榮榮至入見即欲害之以天穆在并恐為後患故隱忍未發榮之入洛有人告榮云帝欲圖之榮即具奏帝曰外人告云亦言王欲害我我豈信之於是榮不自疑每入謁帝從人不過數十又皆挺身不持兵仗及天穆至帝伏兵於明光殿東廊引榮及榮長子菩提天穆等俱入坐定光祿少卿魯安典御李侃晞等抽刀而至榮窘迫起投御坐帝先橫刀膝下遂手刃之安等亂斫榮與天穆菩提同時俱死榮時年三十八於是內外喜叫聲滿京城既而大赦前廢帝, WYG: 興和}
