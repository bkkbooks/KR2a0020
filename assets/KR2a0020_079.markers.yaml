  - {type: variant, offset: 686, length: 0, content: '', WYG: 四年卒於州贈平東將軍滄州刺史改贈濟州諡曰康道斌在恒農修立學館建孔子廟堂圖畵形像去郡之後民故追思之乃復畫道斌形於孔子像之西而拜謁焉子士長武定}
  - {type: page-break, offset: 686, content: '', id: KR2a0020_WYG_079-10b, image: WYG0262/WYG0262-0180d.png}
  - {type: variant, offset: 686, length: 0, content: '', krp: 四年卒於州贈平東將軍滄州刺史改贈濟州諡曰康道斌在恒農修立學館建孔子廟堂圖畵形像去郡之後民故追思之乃復畫道斌形於孔子像之西而拜謁焉子士長武定}
