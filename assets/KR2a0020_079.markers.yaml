  - {type: variant, offset: 82, length: 0, content: '', krp: 朝服行事主客執之云弔有常式何得以朱衣入山庭昭明等言本奉朝命不容改易如此者數四執志不移高祖勑尚書李沖令選一學識者更與論執沖奏遣淹昭明言未解魏朝不聴朝服行禮義出何典淹言吉凶不同禮有成數𤣥冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿逺自江南奉慰不能式遵成事方謂議出何典行人得失何其異哉昭明言二國交和既乆南北皆湏凖望齊高帝崩魏遣李彪通弔於時初不素服齊朝亦不以爲疑那得苦見要逼淹言彪通弔之日朝命以弔服自隨而彼不遵高宗追逺之慕乃踰月即吉彪行弔之時齊之君臣皆已鳴玉盈庭貂璫曜日百寮内外朱服煥然彪行人不被主人之命復何容獨以素服閒衣冠之中來責雖高未敢聞命我皇帝仁孝之性侔於有虞處諒闇以來百官聴於冡宰卿豈得以此方彼也昭明乃摇膝而言三皇不同禮亦安知得失所歸淹言若如來談卿以虞舜高宗爲非也昭明遂相顧而笑曰非孝者宣尼有成責行人亦弗敢言希主人裁以弔服使人唯齎袴褶比既戎服不可以弔幸借緇衣幍以申國命今爲魏朝所逼違負指授還南之日必得罪本朝淹言彼有君子也卿將命折中還南之日應有高賞若無君子也但令有光國之譽雖復非理見罪亦復何嫌南史董狐自當直筆既而高祖遣李沖問淹昭明所言淹以狀對高祖詔沖曰我所用得人仍勑送衣幍給昭明等賜淹果食明旦引昭明等入皆令文武盡哀後正侍即高祖以淹清貧賜絹百匹十六年蕭賾遣其散騎常侍庾蓽散騎侍即何憲主書邢宗慶朝貢值朝廷有事明堂因登靈臺以觀雲物高祖勑淹引蓽等館南矚望行禮事畢還外館賜酒食宗慶語淹言南北連和既乆而比棄信絶好爲利而動豈是大國善隣之義淹言夫爲王者不拘小節中原有菽工採者獲多豈眷眷守尾生之信且齊先主歴事宋朝荷恩積世當應便爾欺奪宗慶庾蓽及行者皆相顧失色何憲知淹昔從南入而以手掩目曰卿何爲不作于禁而作魯肅淹言我捨危効順欲追蹤陳韓何于禁之有憲亦不對王肅歸國也高祖以淹曾宦江表詔觀是非乃造肅與語還奏言實時議紛紜猶謂未審高祖曰明日引入我與語自當知之及鑾輿行幸肅多扈從勑淹將引若有古跡皆使知之行到朝歌肅問此是何城淹言紂都朝歌城肅言故應有殷之頑民也淹言昔武王滅紂悉}
  - {type: variant, offset: 83, length: 1, content: 秀, WYG: 河洛中因劉石亂華仍隨司馬東渡肅知淹寓於青州乃笑而謂淹曰青州閒何必無其餘種淹以肅本𨽻徐州言青州本非其地徐州閒今日重來非所知也肅遂伏馬上掩口而笑顧謂侍御史張思寧曰向者聊因戲言遂致辭溺思寧馳馬奏聞高祖大悦謂彭城王勰曰淹此叚足爲制勝輿駕至洛肅因侍宴高祖戲肅曰近者行次朝歌聞成淹共卿殊有往覆卿試重叙之肅言臣前朝歌爲淹所困不謂此事仰聞聴覽臣爾日失言一之已甚豈宜再説遂皆大笑高祖又謂肅曰淹能制卿其才亦不困肅言淹才詞便爲難有聖朝宜應叙進高祖言若因此進淹恐辱卿轉甚肅言臣屈已達人正可顯臣之羙高祖曰卿既爲人所屈欲求屈已之名復於卿太優肅言淹既䝉進臣得屈已伸人此所謂陛下惠而不費遂酣笑而止乃賜淹龍廐上馬一疋并鞍勒宛具朝服一襲轉謁者僕射時遷都高祖以淹家無行資勑給事力送至洛陽并賜假日與家累相隨行次靈邱屬蕭鸞遣使勑驛馬徵淹車駕濟淮淹於路左請見高祖竚駕而進之淹曰蕭鸞悖虐幽明同棄陛下俯應人神按劔江涘然敵不可小蜂蠆有毒而況國乎深願聖明保萬全之䇿詔曰此前車之轍得不慎乎淹曰伏聞發洛已來諸有諌者解官奪職恐非聖明納下之義高祖曰此是我命耳卿不得爲干斧鉞淹曰昔文王詢於芻蕘晉文聴輿人之誦臣雖卑賤敢同匹夫高祖優而}
