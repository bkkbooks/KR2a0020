  - {type: variant, offset: 26, length: 0, content: '', WYG: 自言晉侍中粲之六世孫祖昇家於北海父洪名犯顯祖廟諱仕劉義隆爲撫軍府中兵參軍早卒淹好文學有氣尚劉子業輔國府刑獄參軍事劉彧以爲員外即假龍驤將軍領軍主令援東陽歴城皇興中降慕容白曜赴闕授兼著作即時顯祖於仲冬之月欲廵漠北朝臣以寒甚固諫竝不納淹上接輿釋遊論顯祖覽之詔尚書李訢曰卿等諸人不如成淹論通釋人意乃勑停行太和中文明太后崩蕭賾遣}
