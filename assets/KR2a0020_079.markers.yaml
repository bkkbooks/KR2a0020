  - {type: variant, offset: 2178, length: 2982, content: 說乃引迎駕百官於行宮西北云欲祭天朝士既集列騎圍遶責天下喪亂明帝卒崩之由云皆緣此等貪虐不相匡弼所致因縱兵亂害王公卿士皆斂手就戮死者千三百餘人皇弟皇兄並亦見害靈太后少主其日暴崩榮遂有大志令御史趙元則造禪文遣數十人遷帝於河橋至夜四更中復奉帝南還營幕帝憂憤無計乃令人喻旨於榮曰帝王迭襲盛衰無常既屬屯運四方瓦解將軍杖義而起前無橫陳此乃天意非人力也我本相投規存性命帝王重位豈敢妄希直是將軍見逼權順所請耳今璽運已移天命有在宜時即尊號將軍必若推而不居存魏社稷亦任更擇親賢共相輔戴榮既有異圖遂鑄金為己像數四不成時幽州人劉靈助善卜占為榮所信言天時人事必不可爾榮亦精神恍惚不自支持久而方悟遂便愧悔於是獻武王榮外兵參軍司馬子如等切諫陳不可之理榮曰愆誤若是惟當以死謝朝廷今日安危之機計將何出獻武王等曰未若還奉長樂以安天下於是還奉莊帝十四日輿駕入宮于時或云榮欲遷都晉陽或云欲肆兵大掠迭相驚恐人情駭震京邑士子不一存率皆逃竄無敢出者直衞空虛官守廢曠榮聞之上書曰臣世荷蕃寄征討累年奉忠王室志存效死直以太后淫亂孝明暴崩遂率義兵扶立社稷陛下登祚之始人情未安大兵交際難可齊一諸王朝貴橫死者衆臣今粉軀不足塞往責以謝亡者然追榮褒德謂之不朽乞降天慈微申私責無上王請追尊帝號諸王刺史乞贈三司其位班三品請贈令僕五品之官各贈方伯六品已下及白民贈以鎮郡諸死者無後聽繼即授封爵均其高下節級別科使恩洽存亡有慰生死詔曰覽表不勝鯁塞朕德行無感致茲酷濫尋繹往事貫切於懷可如所表自茲已後贈終叨濫庸人賤品動至大官為識者所不貴武定中齊文襄王始革其失追褒有典焉榮啟帝遣使循城勞問於是人情遂安朝士逃亡者亦稍來歸闕榮又奏請番直朔望之日引見三公令僕尚書九卿及司州牧河南尹洛陽河陰執事之官參論國治經綸王道以為常式五月榮還晉陽七月詔曰乾坤統物星象贊其功皇王御運股肱匡其業是以周道中缺齊晉立濟世之忠殷祚或虧彭韋振救時之節自前朝失御厄運荐臻太原王榮爰戴朕躬推臨萬國勳踰伊霍功格二儀王室不壞伊人是賴可柱國大將軍兼錄尚書事餘如故時葛榮將向京師衆號百萬相州刺史李神軌閉門自守賊鋒已過汲郡所在村塢悉被殘略榮啟求討之九月乃率精騎七千馬皆有副倍道兼行東出滏口葛榮為賊既久橫行河北時衆寡非敵議者謂無制賊之理葛榮聞之喜見於色乃令其衆曰此易與耳諸人俱辦長繩至便縛取葛榮自鄴以列陳數十里箕張而進榮潛軍山谷為奇兵分督將已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士馬上各齎神棒一枚置於馬側至於戰時不聽斬級以棒棒之而已慮廢騰逐也乃分命壯勇所當衝突號令嚴明戰士同奮榮身自陷陳出於賊後表𩹉合擊大破之於陳擒葛榮餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃普告勒各從所樂親屬相隨任所居止於是羣情喜悅登即四散數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量力授用新附者咸安時人服其處分機速乃檻車送葛榮赴闕詔曰功格天地錫命之位必崇道濟生民褒賞之名宜大是以有莘贊亳不次之號爰歸渭叟翼周殊世之班載集況導源積石襲構崐山門踵英猷弼成鴻業抗高天之摧柱振厚地之絕維德冠五侯勳高九伯者哉太原王榮代荷蕃寵世載忠烈入匡頹運出剿元兇使積年之霧倏焉滌蕩數載之塵一朝清謐燕既泰趙魏還蘇比績況功古今莫二若不式稽舊典增是禮數將何以昭德報功遠明國範可大丞相都督河北畿外諸軍事增邑一萬戶通前三萬餘官悉如故初榮之將討葛榮也軍次襄垣遂令軍士列圍大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則擒葛榮不中則否既而並應弦而殪三軍咸悅及破賊之後即命立碑於其所號雙兔碑榮將戰之夜夢一人從葛榮索千牛刀而葛榮初不肯與此人自稱我是道武皇帝汝何敢違葛榮乃奉刀此人手持授榮既寤而喜自知必勝又詔曰我皇魏道契神元德光靈範源先二象化穆五才玉歷與日月惟休金鼎共乾坤俱永而正光之末皇運時屯百揆咸亂九宮失朝野撫膺士女嗟怨遂使四海土崩九區瓦解逆賊杜周虔劉燕代妖寇葛榮假噬魏趙常山易水戎鼓夜驚冰井叢臺胡塵晝合朔南久已丘墟河北殆成灰燼宗廟懷匪安之慮社稷急不測之憂大丞相太原王榮道鏡域中德光區外神昭藏往思實知來義踵先勳忠資曩烈遂能大建義謀收集忠勇熊羆競逐虎豹爭先軒翥南溟摶風北極氣震林原勢動山岳弔民伐罪殲此鯨鯢戮卒多於長平積器高於熊耳秦晉聞聲而喪膽齊莒側聽而讋息中興之業是乎再隆太平之基茲焉更始雖復伊霍宣翼之功桓文崇贊之道何足以髣髴鴻蹤比勳盛烈道格普天仁沾率土振古以來未有其比若不廣錫山河大開土宇何以表大義之崇高標盛德之廣遠可以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽等七郡各萬戶通前滿十萬戶為太原國邑又進位太師餘如故建義初北海王元顥南奔蕭衍衍乃立為魏主資以兵將時邢杲寇亂三齊與顥應接朝廷以顥孤弱不以為慮永安二年春詔大將軍元穆先平齊地然後回師征顥顥以大軍未還乘虛徑進既陷梁國鼓行而西滎陽虎牢並皆不守五月車駕出幸河北事出不虞天下改望榮聞之即時馳傳朝行宮於上黨之長子行其部分輿駕於是南轅榮為前驅旬日之間兵馬大集資糧器仗繼踵而至天穆既平邢杲亦渡河以會車駕顥都督宗正珍孫河內太守元襲固守不降榮攻而克之斬珍孫元襲以徇帝幸河內城榮與顥相持於河上顥令都督安豐王延明緣河據守榮既未有舟船不得即渡議欲還北更圖後舉黃門郎楊侃高道穆等並謂大軍若還失天下之望固執以為不可語在侃等傳屬馬渚諸楊云有小船數艘求為鄉導榮乃令都督尒朱兆等率精騎夜濟登岸奮擊顥子領軍將軍冠受率馬步五千拒戰兆大破之臨陳擒冠受延明聞冠受見擒遂自逃散顥便率麾下南奔事在其傳車駕渡河入居華林園詔曰周武奉時藉十亂以纂曆漢祖先天資三傑以除暴理民濟治斯道未爽使持節柱國大將軍大丞相太原王榮蘊伏風煙抱含日月總奇正以成術兼文武而為資昔處亂朝韜光戢翼秣馬冀北厲兵晉陽佇龍顏而振腕想日角以歎息忠勇奮發虎士如林義功始立所向風靡故能芟夷羣惡振此頹綱俾朕寡昧獲承鴻緒雖大位克正而衆盜未息葛榮跋扈仍亂中原建旗伐罪授首殲馘元顥凶頑構成巨釁阻弄吳楚虧汙宗社朕徙御北徂劬勞鞍甲王聞難星奔一舉大定下洽民和上匡王室鴻勳巨績書契所未紀飲至策勳事絕於比況非常之功必有非常之賞可天柱大將軍此官雖訪古無聞今員未有太祖已前增置此號式遵典故用錫殊禮又宜開土宇可增封十萬通前二十萬加前後部羽葆鼓吹餘如故榮尋還晉陽先是葛榮枝黨韓婁仍據幽平二州榮遣都督侯淵討斬之時賊帥万俟醜奴蕭寶夤擁衆豳涇兇勢日盛榮遣其從子天光為雍州刺史令率都督賀拔岳侯莫陳悅等總衆入關討之天光既至雍州以衆少不敵逡巡未集榮大怒遣其騎兵參軍劉貴馳驛詣軍加天光杖罰天光等大懼乃進討連破之擒醜奴寶夤並檻車送闕天光又擒王慶雲万俟道樂關西悉平於是天下大難便以盡矣榮性好獵不舍寒暑至於列圍而進必須齊一雖遇阻險不得回避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勳濟天下四方無事惟宜調政養民順時蒐狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海內何宜今日便言勳也如聞朝士猶自寬縱今秋欲共兄戒勒士馬校獵嵩原令貪污朝貴入圍搏虎仍出魯陽歷三荊悉擁生蠻北填六鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬戶侯如其不降徑渡數千騎便往縛取待六合寧一八表無塵然後共兄奉天子巡四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也榮身雖居外遙制朝廷廣布親戚列為左右伺察動靜小大必知或有僥倖求官者皆詣榮承候得其啟請無不遂之曾關補定州曲陽縣令, WYG: ''}
  - {type: variant, offset: 2178, length: 2982, content: 說乃引迎駕百官於行宮西北云欲祭天朝士既集列騎圍遶責天下喪亂明帝卒崩之由云皆緣此等貪虐不相匡弼所致因縱兵亂害王公卿士皆斂手就戮死者千三百餘人皇弟皇兄並亦見害靈太后少主其日暴崩榮遂有大志令御史趙元則造禪文遣數十人遷帝於河橋至夜四更中復奉帝南還營幕帝憂憤無計乃令人喻旨於榮曰帝王迭襲盛衰無常既屬屯運四方瓦解將軍杖義而起前無橫陳此乃天意非人力也我本相投規存性命帝王重位豈敢妄希直是將軍見逼權順所請耳今璽運已移天命有在宜時即尊號將軍必若推而不居存魏社稷亦任更擇親賢共相輔戴榮既有異圖遂鑄金為己像數四不成時幽州人劉靈助善卜占為榮所信言天時人事必不可爾榮亦精神恍惚不自支持久而方悟遂便愧悔於是獻武王榮外兵參軍司馬子如等切諫陳不可之理榮曰愆誤若是惟當以死謝朝廷今日安危之機計將何出獻武王等曰未若還奉長樂以安天下於是還奉莊帝十四日輿駕入宮于時或云榮欲遷都晉陽或云欲肆兵大掠迭相驚恐人情駭震京邑士子不一存率皆逃竄無敢出者直衞空虛官守廢曠榮聞之上書曰臣世荷蕃寄征討累年奉忠王室志存效死直以太后淫亂孝明暴崩遂率義兵扶立社稷陛下登祚之始人情未安大兵交際難可齊一諸王朝貴橫死者衆臣今粉軀不足塞往責以謝亡者然追榮褒德謂之不朽乞降天慈微申私責無上王請追尊帝號諸王刺史乞贈三司其位班三品請贈令僕五品之官各贈方伯六品已下及白民贈以鎮郡諸死者無後聽繼即授封爵均其高下節級別科使恩洽存亡有慰生死詔曰覽表不勝鯁塞朕德行無感致茲酷濫尋繹往事貫切於懷可如所表自茲已後贈終叨濫庸人賤品動至大官為識者所不貴武定中齊文襄王始革其失追褒有典焉榮啟帝遣使循城勞問於是人情遂安朝士逃亡者亦稍來歸闕榮又奏請番直朔望之日引見三公令僕尚書九卿及司州牧河南尹洛陽河陰執事之官參論國治經綸王道以為常式五月榮還晉陽七月詔曰乾坤統物星象贊其功皇王御運股肱匡其業是以周道中缺齊晉立濟世之忠殷祚或虧彭韋振救時之節自前朝失御厄運荐臻太原王榮爰戴朕躬推臨萬國勳踰伊霍功格二儀王室不壞伊人是賴可柱國大將軍兼錄尚書事餘如故時葛榮將向京師衆號百萬相州刺史李神軌閉門自守賊鋒已過汲郡所在村塢悉被殘略榮啟求討之九月乃率精騎七千馬皆有副倍道兼行東出滏口葛榮為賊既久橫行河北時衆寡非敵議者謂無制賊之理葛榮聞之喜見於色乃令其衆曰此易與耳諸人俱辦長繩至便縛取葛榮自鄴以列陳數十里箕張而進榮潛軍山谷為奇兵分督將已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士馬上各齎神棒一枚置於馬側至於戰時不聽斬級以棒棒之而已慮廢騰逐也乃分命壯勇所當衝突號令嚴明戰士同奮榮身自陷陳出於賊後表𩹉合擊大破之於陳擒葛榮餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃普告勒各從所樂親屬相隨任所居止於是羣情喜悅登即四散數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量力授用新附者咸安時人服其處分機速乃檻車送葛榮赴闕詔曰功格天地錫命之位必崇道濟生民褒賞之名宜大是以有莘贊亳不次之號爰歸渭叟翼周殊世之班載集況導源積石襲構崐山門踵英猷弼成鴻業抗高天之摧柱振厚地之絕維德冠五侯勳高九伯者哉太原王榮代荷蕃寵世載忠烈入匡頹運出剿元兇使積年之霧倏焉滌蕩數載之塵一朝清謐燕既泰趙魏還蘇比績況功古今莫二若不式稽舊典增是禮數將何以昭德報功遠明國範可大丞相都督河北畿外諸軍事增邑一萬戶通前三萬餘官悉如故初榮之將討葛榮也軍次襄垣遂令軍士列圍大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則擒葛榮不中則否既而並應弦而殪三軍咸悅及破賊之後即命立碑於其所號雙兔碑榮將戰之夜夢一人從葛榮索千牛刀而葛榮初不肯與此人自稱我是道武皇帝汝何敢違葛榮乃奉刀此人手持授榮既寤而喜自知必勝又詔曰我皇魏道契神元德光靈範源先二象化穆五才玉歷與日月惟休金鼎共乾坤俱永而正光之末皇運時屯百揆咸亂九宮失朝野撫膺士女嗟怨遂使四海土崩九區瓦解逆賊杜周虔劉燕代妖寇葛榮假噬魏趙常山易水戎鼓夜驚冰井叢臺胡塵晝合朔南久已丘墟河北殆成灰燼宗廟懷匪安之慮社稷急不測之憂大丞相太原王榮道鏡域中德光區外神昭藏往思實知來義踵先勳忠資曩烈遂能大建義謀收集忠勇熊羆競逐虎豹爭先軒翥南溟摶風北極氣震林原勢動山岳弔民伐罪殲此鯨鯢戮卒多於長平積器高於熊耳秦晉聞聲而喪膽齊莒側聽而讋息中興之業是乎再隆太平之基茲焉更始雖復伊霍宣翼之功桓文崇贊之道何足以髣髴鴻蹤比勳盛烈道格普天仁沾率土振古以來未有其比若不廣錫山河大開土宇何以表大義之崇高標盛德之廣遠可以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽等七郡各萬戶通前滿十萬戶為太原國邑又進位太師餘如故建義初北海王元顥南奔蕭衍衍乃立為魏主資以兵將時邢杲寇亂三齊與顥應接朝廷以顥孤弱不以為慮永安二年春詔大將軍元穆先平齊地然後回師征顥顥以大軍未還乘虛徑進既陷梁國鼓行而西滎陽虎牢並皆不守五月車駕出幸河北事出不虞天下改望榮聞之即時馳傳朝行宮於上黨之長子行其部分輿駕於是南轅榮為前驅旬日之間兵馬大集資糧器仗繼踵而至天穆既平邢杲亦渡河以會車駕顥都督宗正珍孫河內太守元襲固守不降榮攻而克之斬珍孫元襲以徇帝幸河內城榮與顥相持於河上顥令都督安豐王延明緣河據守榮既未有舟船不得即渡議欲還北更圖後舉黃門郎楊侃高道穆等並謂大軍若還失天下之望固執以為不可語在侃等傳屬馬渚諸楊云有小船數艘求為鄉導榮乃令都督尒朱兆等率精騎夜濟登岸奮擊顥子領軍將軍冠受率馬步五千拒戰兆大破之臨陳擒冠受延明聞冠受見擒遂自逃散顥便率麾下南奔事在其傳車駕渡河入居華林園詔曰周武奉時藉十亂以纂曆漢祖先天資三傑以除暴理民濟治斯道未爽使持節柱國大將軍大丞相太原王榮蘊伏風煙抱含日月總奇正以成術兼文武而為資昔處亂朝韜光戢翼秣馬冀北厲兵晉陽佇龍顏而振腕想日角以歎息忠勇奮發虎士如林義功始立所向風靡故能芟夷羣惡振此頹綱俾朕寡昧獲承鴻緒雖大位克正而衆盜未息葛榮跋扈仍亂中原建旗伐罪授首殲馘元顥凶頑構成巨釁阻弄吳楚虧汙宗社朕徙御北徂劬勞鞍甲王聞難星奔一舉大定下洽民和上匡王室鴻勳巨績書契所未紀飲至策勳事絕於比況非常之功必有非常之賞可天柱大將軍此官雖訪古無聞今員未有太祖已前增置此號式遵典故用錫殊禮又宜開土宇可增封十萬通前二十萬加前後部羽葆鼓吹餘如故榮尋還晉陽先是葛榮枝黨韓婁仍據幽平二州榮遣都督侯淵討斬之時賊帥万俟醜奴蕭寶夤擁衆豳涇兇勢日盛榮遣其從子天光為雍州刺史令率都督賀拔岳侯莫陳悅等總衆入關討之天光既至雍州以衆少不敵逡巡未集榮大怒遣其騎兵參軍劉貴馳驛詣軍加天光杖罰天光等大懼乃進討連破之擒醜奴寶夤並檻車送闕天光又擒王慶雲万俟道樂關西悉平於是天下大難便以盡矣榮性好獵不舍寒暑至於列圍而進必須齊一雖遇阻險不得回避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勳濟天下四方無事惟宜調政養民順時蒐狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海內何宜今日便言勳也如聞朝士猶自寬縱今秋欲共兄戒勒士馬校獵嵩原令貪污朝貴入圍搏虎仍出魯陽歷三荊悉擁生蠻北填六鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬戶侯如其不降徑渡數千騎便往縛取待六合寧一八表無塵然後共兄奉天子巡四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也榮身雖居外遙制朝廷廣布親戚列為左右伺察動靜小大必知或有僥倖求官者皆詣榮承候得其啟請無不遂之曾關補定州曲陽縣令, krp: ''}
