  - {type: variant, offset: 1044, length: 0, content: '', WYG: 齊州刺史文集百餘篇元興世寒因元义之勢託其交道相用爲州主簿論者以爲非倫高祖時有譙郡曹道頗渉經史有幹用舉孝廉太和中東宮主書門下錄事景明中尚書都令史領主書後轉中書舍人行使每稱㫖出除東郡太守卒贈儀同三司又有北海曹昇亦以學識清立見知歴治書侍御史永安中黄門郎散騎常侍出帝世國子祭酒不營家産至以餒卒於鄴時人傷歎之又齊郡曹昻有學識舉秀才永安中太學博士兼尚書即而常徒歩上省以示清貧忽遇盜大失綾縑時人鄙其矯詐鹿悆字永吉濟隂人父生在良吏傳悆好兵書隂陽釋氏之學太師彭城王勰召爲館客嘗詣徐州馬疫附船而至大梁夜睡從者上岸竊禾四束以飼其馬船行數里悆覺問得禾之處從者以告念大忿即停船上岸至取禾處以縑三丈置禾束下而返初爲真定公元子直國中尉恒勸以忠廉之節嘗賦五言詩曰嶧山萬丈樹雕鏤作琵琶由此材高逺弦響藹中華又曰援琴起何調幽蘭與白雪絲管韻未成莫使弦響絶子直少有令問悆欲其善終故以諷焉母憂去職服闋仍卒任子直出鎮梁州悆隨之州州有兵糧和糴和糴者靡不潤屋悆獨不取子直彊之終不從命莊帝爲御史中尉悆兼殿中侍御史監臨淮王彧軍時蕭衍遣其豫章王綜據徐州綜密信通彧云欲歸􅅃綜時為蕭衍愛子衆議咸謂不然或募人入報驗其虛實悆遂請行曰若綜有誠心與之盟約如其詐也豈惜一人命也時徐州始䧟邊方騷擾綜部將成景雋胡龍牙並總彊兵内外嚴固悆遂單馬間出徑趣彭城未至之間爲綜軍主程兵潤所止問其來狀悆答曰兵交使在自昔通言我為臨淮王所使湏有交易兵潤遂先遣人白龍牙等綜既有誠心聞悆被執語景雋等曰我每疑元略規欲叛城將驗其虚實且遣左}
