  - {type: variant, offset: 1295, length: 657, content: 其配衣及機早遣今關西雖平兵未可役山南隣賊理無發召王師雖衆頻被摧北人情危怯實謂難用若不更思方略無以萬全如臣愚量蠕蠕主阿那瓌荷國厚恩未應忘報求乞一使慰喻那瓌即遣發兵東引直趣下口揚威振武以躡其背北海之軍鎮撫相部嚴加警備以當其前臣麾下雖少輒盡力命自井陘以北隘口以西分防險要攻其肘腋葛榮雖并洛周威恩未著人類差異形勢可分於是榮遂嚴勒部曲廣召義勇北捍馬邑東塞井陘尋屬肅宗崩事出倉卒榮聞之大怒謂鄭儼徐紇為之與元天穆等密議稱兵入匡朝廷討定之乃抗表曰伏承大行皇帝背棄萬方奉諱號踴五內摧剝仰尋詔旨實用驚惋今海內草草異口一言皆云大行皇帝鴆毒致禍臣等外聽訟言內自追測去月二十五日聖體康悆至於二十六日奄忽昇遐即事觀望實有所惑且天子寢疾侍臣不離左右親貴名醫瞻仰患狀面奉音旨親承顧託豈容不豫初不召醫崩棄曾無親奉欲使天下不為怪愕四海不為喪氣豈可得乎復皇后女生稱為儲兩疑惑朝野虛行慶宥宗廟之靈見欺兆民之望已失使七百危於累卵社禝墜於一朝方選君嬰孩之中寄治乳抱之日使姦豎專朝賊臣亂紀惟欲指影以行權假形而弄詔此則掩眼捕雀塞耳盜鍾今秦隴塵飛趙魏霧合寶夤醜奴勢逼豳雍葛榮就德憑陵河海楚兵吳卒密邇在郊古人有言邦之不臧隣之福也一旦聞此誰不闚竊惟大行皇帝聖德馭宇繼體正君猶邊烽迭舉妖寇不滅況今從佞臣之計隨親戚之談舉潘嬪之女以誑百姓奉未言之兒而臨四海欲使海內安乂愚臣所未聞也伏願留聖善之慈回須臾之慮照臣忠誠錄臣至款聽臣赴闕預參大議問侍臣帝崩之由訪禁旅不知之狀以徐鄭之徒付之司敗雪同天之謝遠近之怨然後更召宗親推其年德聲副遐邇改承寶祚則四海更蘇百姓幸甚於是遂勒所統將赴京師, WYG: ''}
