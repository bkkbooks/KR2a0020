  - {type: variant, offset: 1045, length: 1, content: 衞, WYG: 為元略使入魏軍中喚彼一人其使果至可令人詐作略身在一深室詭爲患狀呼使户外令人傳語時略始被衍追還綜又遣腹心梁話迎悆密語意狀令善酬答引悆入城詣龍牙所時日已暮龍牙列仗舉火引悆曰元中山甚欲相見故令喚卿又曰安豐臨淮將少弱卒規復此城容可得乎悆曰彭城魏之東鄙勢在必爭得否在天非人所測龍牙曰當如卿言復詣景雋住所停悆在外門乆而未入時夜已乆星月甚明有綜軍主姜桃來與悆語曰君年已長宿又充今使良有所達元法僧魏之微子拔城歸梁梁主待物有道乃舉手上指今歳星在斗斗呉之分野君何爲不歸梁國我令君富貴悆答曰君徒知其一未知其二法僧者莒僕之流而梁納之無乃有愧於季孫也今月建鶉首斗牛受破歳星木也逆而剋之君呉國敗喪不乆且衣錦夜遊有識不許言未及盡引入見景儁景儁曰元中山雖曰相喚不懼而來何也答曰昔楚伐呉呉遣蹷由勞師今者此行略同於彼又曰遊歴多年與卿先經相識仍敘由縁景儁便記引悆同坐謂悆曰卿不爲刺客也答曰今者爲使欲返命本朝相刺之事更卜後圖爲設飯食雜果悆彊飲多食向敵數人微自夸矜諸人相謂曰壯士哉乃引向元略所一人引入户内指床令坐一人别在室中出謂悆曰中山有敎與君相聞悆遂起立使人謂悆曰君但坐悆曰家國王子豈有坐聴敎命使人曰頓首君我昔有以向南且遣相喚欲聞鄉事晚來患動不獲相見悆曰且奉音㫖冐險祗赴不得瞻見内懐反側遂辭而退湏臾天曉綜軍主范朂景儁司馬楊㬓等競問北朝士馬多少悆云秦隴既平三方静晏今有高車白眼羌蜀五十萬齊王陳留崔延伯李叔仁等分為三道徑趣江西安樂王鑒李神領冀相齊濟青光羽林十萬直向琅邪南出諸人相謂曰詎非華辭也悆曰可驗崇朝何華之有日晏令還景儁送悆上戲馬臺北望城壘曰何此城之固良非彼軍士所能圖擬卿可語二王回師改計悆曰金墉湯池衝甲彌巧貴守以人何論險害還軍於路與梁話誓盟契約既固未旬綜果降詔曰日者法僧父子頑固自天長惡不巳竊城外叛職此亂階遂使彭宋名藩飜爲賊有雖宗臣名將揮戈於泗濵虎士雄卒竦劔於汴渚然高墉峻堞非可易登廣涘深隍實為難踐是用日昃忘食中宵憤惋者也而衍都督豫章王蕭綜體運知機欲歸有道潛遣密信送欵於都督臨淮王于時事同夜光能不按劔殿中侍御史監軍鹿悆不憚虎口視險若夷便能占募入驗虛實誓盟既固所圖遂果返地復城息我兵甲亦是悆之力焉若不酬以榮禄何以勸厲將來可封定陶縣開國子食邑三百户除員外散騎常侍俄出爲青州彭城王劭府長兼司馬尋解長兼廣川人劉鈞東清河人房湏反劭遣悆監州軍討之戰於商山頗有所㨗將統皆劭左右擅增首級妄請賞帛悆面執不與劭弗從悆勃然作色曰竭志立言為王爲國豈悆家事不辭而出劭追而謝焉竊勲者放言噂􅊱欲加私害悆聞而笑之不以尒意先是蕭衍遣將彭羣王辯率衆七萬圍逼琅邪自春及秋官軍不至而兩青士馬裁可萬餘師次鄖城乆而未進劭乃遣悆南青州刺史胡平遣長史劉仁之竝監勒諸將徑赴賊壘大破之斬羣首俘馘二千餘級肅宗嘉之璽書勞問永安中入爲左}
