  - {type: variant, offset: 346, length: 334, content: 家世豪擅財貨豐贏曾行馬羣見一白蛇頭有兩角遊於馬前新興異之謂曰爾若有神令我畜牧蕃息自是之後日覺滋盛牛羊駝馬色別為羣谷量而已朝廷每有征討輙獻私馬兼備資糧助裨軍用高祖嘉之除右將軍光祿大夫及遷洛後特聽冬朝京師夏歸部落每入朝諸王公朝貴競以珍玩遺之新興亦報以名馬轉散騎常侍平北將軍秀容第一領民酋長新興每春秋二時與妻子閱畜牧於川澤射獵自娛肅宗世以年老啟求傳爵於榮朝廷許之正光中卒年七十四贈散騎常侍平北將軍州刺史諡曰簡孝莊初贈假黃鉞侍中太師相國西河郡王榮潔白美容貌幼而神機明決及長好射獵每設圍誓衆便為軍陳之法號令嚴肅衆莫敢犯秀容界有池三所在高山之上清深不測相傳曰祁連池魏言天池也父新興曾與榮遊池上忽聞簫鼓之音新興謂榮曰古老相傳凡聞此聲皆至公輔吾今年已衰暮當為汝耳汝其勉之榮襲爵後除直寢, WYG: 水校尉}
