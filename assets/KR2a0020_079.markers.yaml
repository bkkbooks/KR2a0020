  - {type: variant, offset: 685, length: 0, content: '', WYG: 始中除征虜將軍中書舍人以勤明見知乆不遷職世宗謂之曰揚子雲爲黄門頓歴三世卿居此任始十年不足辭也東豫州刺史田益宗居邊貪穢世宗頻詔桃符爲使慰喻之桃符還具稱益宗既老耄而諸子非理處物世宗後欲代之恐其背叛拜桃符征虜將軍豫州刺史與後軍將軍李世哲領衆襲益宗語在益宗傳桃符善恤蠻左爲民吏所懐乆之徵還病卒年五十一贈後將軍洛州刺史子景均殿中侍御史劉道斌武邑灌津人自云中山靖王勝之後也幼而好學有器幹及長腰帶十圍鬚髯甚羙舉孝廉入京拜校書即轉主書頗爲高祖所知從征南陽還加積射將軍給事中高祖謂黄門侍郎邢巒曰道斌是叚之舉便異儕流矣世宗即位遷謁者僕射轉歩兵校尉廣武將軍領中書舍人出爲武邑太守時冀州新經元愉逆亂之後加以連年災儉道斌頻爲表請蠲其租賦百姓賴之罷郡還除右將軍太中大夫又以本將軍出爲恒農太守遷岐州刺史所在有清治之稱正}
  - {type: page-break, offset: 685, content: '', id: KR2a0020_WYG_079-9b, image: WYG0262/WYG0262-0180b.png}
  - {type: page-break, offset: 685, content: '', id: KR2a0020_WYG_079-10a, image: WYG0262/WYG0262-0180c.png}
