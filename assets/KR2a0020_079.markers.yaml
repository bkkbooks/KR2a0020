  - {type: variant, offset: 82, length: 0, content: '', WYG: 朝服行事主客執之云弔有常式何得以朱衣入山庭昭明等言本奉朝命不容改易如此者數四執志不移高祖勑尚書李沖令選一學識者更與論執沖奏遣淹昭明言未解魏朝不聴朝服行禮義出何典淹言吉凶不同禮有成數𤣥冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿逺自江南奉慰不能式遵成事方謂議出何典行人得失何其異哉昭明言二國交和既乆南北皆湏凖望齊高帝崩魏遣李彪通弔於時初不素服齊朝亦不以爲疑那得苦見要逼淹言彪通弔之日朝命以弔服自隨而彼不遵高宗追逺之慕乃踰月即吉彪行弔之時齊之君臣皆已鳴玉盈庭貂璫曜日百寮内外朱服煥然彪行人不被主人之命復何容獨以素服閒衣冠之中來責雖高未敢聞命我皇帝仁孝之性侔於有虞處諒闇以來百官聴於冡宰卿豈得以此方彼也昭明乃摇膝而言三皇不同禮亦安知得失所歸淹言若如來談卿以虞舜高宗爲非也昭明遂相顧而笑曰非孝者宣尼有成責行人亦弗敢言希主人裁以弔服使人唯齎袴褶比既戎服不可以弔幸借緇衣幍以申國命今爲魏朝所逼違負指授還南之日必得罪本朝淹言彼有君子也卿將命折中還南之日應有高賞若無君子也但令有光國之譽雖復非理見罪亦復何嫌南史董狐自當直筆既而高祖遣李沖問淹昭明所言淹以狀對高祖詔沖曰我所用得人仍勑送衣幍給昭明等賜淹果食明旦引昭明等入皆令文武盡哀後正侍即高祖以淹清貧賜絹百匹十六年蕭賾遣其散騎常侍庾蓽散騎侍即何憲主書邢宗慶朝貢值朝廷有事明堂因登靈臺以觀雲物高祖勑淹引蓽等館南矚望行禮事畢還外館賜酒食宗慶語淹言南北連和既乆而比棄信絶好爲利而動豈是大國善隣之義淹言夫爲王者不拘小節中原有菽工採者獲多豈眷眷守尾生之信且齊先主歴事宋朝荷恩積世當應便爾欺奪宗慶庾蓽及行者皆相顧失色何憲知淹昔從南入而以手掩目曰卿何爲不作于禁而作魯肅淹言我捨危効順欲追蹤陳韓何于禁之有憲亦不對王肅歸國也高祖以淹曾宦江表詔觀是非乃造肅與語還奏言實時議紛紜猶謂未審高祖曰明日引入我與語自當知之及鑾輿行幸肅多扈從勑淹將引若有古跡皆使知之行到朝歌肅問此是何城淹言紂都朝歌城肅言故應有殷之頑民也淹言昔武王滅紂悉}
