  - {type: variant, offset: 110, length: 0, content: '', WYG: 姊尋除南部尚書侍中卒諡曰宣髙祖追思崇勲令著作郎韓顯宗與真撰定碑文建於白登山真子泰本名石洛髙祖賜名焉以功臣子孫尚章武長公主拜駙馬都尉典羽獵四曹事賜爵馮翊侯遷殿中尚書加散騎常侍安西將軍進爵為公出為鎭南將軍洛州刺史例降為侯尋徵為右光禄大夫尚書右僕射又出為使持節鎮北將軍定州刺史改封馮翊縣開國侯食邑五百戸進征北將軍初文明太后幽髙祖於别室將謀黜廢泰切諫乃止髙祖徳之錫以山河寵待隆至泰自陳病乆乞為恒州遂轉陸叡為定州以泰代焉泰不願遷都叡未及發而泰己至遂潛相扇誘圖為叛乃與叡及安樂侯元隆}
