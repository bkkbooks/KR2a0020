  - {type: punctuation, offset: 542, content: 、, id: KR2a0020_ZHSJ_027-bkkpn106}
  - {type: variant, offset: 543, length: 8, content: 保李沖並免冠稽首, WYG: 卿興和中卒贈都督冀滄二州諸軍事征東將軍冀州刺史子巖武定中司徒諮議參軍平國弟相國官至安東將軍濟州刺史上洛公相國弟正國尚長樂公主拜駙馬都尉子平城早卒髙祖時始平公主薨於宫追贈平城駙馬都尉與公主合葬平城弟長城司徒左長史子世恭武定中朱衣直閤長城弟彧符璽郎中卒子永延尚書騎兵郎青州征東司馬正國弟應國征西將軍張掖公子度孤襲爵平南將軍梁城鎭將子清休頗有將畧司農少卿武衞將軍左光禄大夫出為驃騎大將軍夏州刺史子鐵槌祕書郎應國弟安國歴金部長殿中尚書加右衞將軍賜爵新平子為乙渾所殺追贈征虜將軍子吐萬襲爵襄城鎭將子金寶祕書郎壽弟伏真高宗世稍遷尚書賜爵任城侯出為兗州刺史假寧東將軍濮陽公子常貴南陽太守伏真弟多侯歴位殿中給事左將軍賜爵長寧子遷可衞監髙宗崩乙渾專權時司徒陸麗在代郡溫湯療病渾忌之遣多侯追麗多侯謂麗曰渾有無君之心大王衆所望也去必危宜徐歸}
