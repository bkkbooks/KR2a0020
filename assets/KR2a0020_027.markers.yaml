  - {type: variant, offset: 119, length: 1, content: 歲, WYG: 輔正平元年卒子伏干襲爵尚濟北公主拜駙馬都尉和平二年卒諡曰康無子伏干弟羆襲爵尚新平長公主拜駙馬都尉又除虎牢鎮將頻以不法致罪髙祖以其勲徳之胄讓而赦之轉征東將軍吐京鎭將羆賞善罰惡深自克厲時西河胡叛羆欲討之而離石都將郭洛頭拒違不從羆遂上表自劾以威不攝下請就刑戮髙祖乃免洛頭官山胡劉什婆寇掠郡縣羆討滅之自是部内肅然莫不敬憚後改吐京鎭為汾州仍以羆為刺史前吐京太守劉升在郡甚有威惠限滿還都胡民八百餘人詣羆請之前定陽令吳平仁亦有恩信戸増數倍羆以吏民懐之並為表請髙祖皆從焉羆既頻薦升等所部守令咸自砥礪威化大行百姓安之州民李軌郭及祖等七百餘人詣闕頌羆恩徳髙祖以羆政和民悦増秩延限後徵為光禄勲随例降王為魏郡開國公邑五百戸又除鎮北將軍燕州刺史鎭廣寗尋遷都督夏州髙平鎮諸軍事本將軍夏州刺史鎭統萬又除侍中中書監穆泰之反羆與濳通赦後事發削封為民卒于家世宗時追贈鎮北將軍恒州刺史子建字晚興性通率頗好文史起家祕書郎稍遷直閤將軍兼武衞建妻尒朱榮之妹建常依附榮榮入洛之後除鎮東將軍金紫光禄大夫征北將軍封濟北郡開國公後遷散騎常侍車騎大將軍左光禄大夫兼尚書北道行䑓并州事元曄之立建兼尚書右僕射俄轉侍中驃騎大將軍出帝末本將軍儀同三司洛州刺史天平中坐事自殺於五原城北子千牙武定中開府祭酒建弟衍字進興解褐員外郎封新興縣開國子稍遷通直常侍行雲州事羆弟亮字幼輔初字老生早有風度顯祖時起家為侍御中散尚中山長公主拜駙馬都尉封趙郡王加侍中征南大將軍徙封長樂王髙祖初除使持節秦州刺史在州未期大著聲稱徵為殿中尚書又遷使持節征西大將軍西戎校尉敦煌鎮都大將政尚寛簡賑恤窮乏被徵還朝百姓追思之除都督秦梁益三州諸軍事征南大將軍領䕶西戎校尉仇池鎮將時宕昌王梁彌機死子彌博立為吐谷渾所逼來奔仇池亮以彌機蕃教素著矜其亡滅彌博凶悖氐羌所棄彌機兄子彌承戎民歸樂表請納之髙祖從焉於是率騎三萬次於龍鵠擊走吐谷渾立彌承而還是時階陵比谷羌董耕奴斯卑等率衆數千人寇仇池屯於陽遐嶺亮副將楊靈珍率騎擊走之氐豪楊卜自延興以來從軍征伐二十一戰前來鎮將抑而不聞亮表卜為廣業太守豪右咸悦境内大安徵為侍中尚書右僕射于時復置司州髙祖曰司州始立未有寮吏須立中正以定選舉然中正之任必須徳望兼資者世祖時崔浩為冀州中正長孫嵩為司州中正可謂得人公卿等宜自相推舉必令稱允尚書陸叡舉亮為司州大中正時蕭頤遣將陳顯逹攻䧟醴陽加亮使持節征南大將軍都督懐洛南北豫徐兗六州諸軍事以討之顯逹遁走乃還尋遷司空參議律令例降爵為公時文明太后崩己過期月髙祖毁瘠猶甚亮表曰王者居極至尊至重父天母地懐柔百靈是以古先喆王制禮成務施政立治必順天而後動宣憲垂範必依典而後行用能四時不忒隂陽和暢若有過舉咎徵必集故大舜至慕事在納麓之前孔子至聖䘮無過瘠之紀堯書稽古之羙不録在服之痛禮備諸侯之䘮而無天子之式雖有上逹之言未見居䘮之典然則位重者為世以屈己居聖者逹命以忘情伏惟陛下至徳參二儀惠澤覃河海宣禮明刑動遵古式以至孝之痛服期年之䘮練事既闋號慕如始綂重極之尊同衆庶之制廢越紼之大敬闕宗祀之舊軌誠由文明}
