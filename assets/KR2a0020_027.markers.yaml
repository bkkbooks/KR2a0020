  - {type: variant, offset: 1129, length: 332, content: 之託右中郎將趙郡李恃顯為之養父就之禮逆產子寶月順皇后召李入宮毀擊之強令為尼於內以子付妃養之歲餘后父于勁以后久無所誕乃上表勸廣嬪侍因令后歸李於愉舊愛更甚愉好文章頗著詩賦時引才人宋世景李神儁祖瑩邢晏王遵業張始均等共申宴喜招四方儒學賓客嚴懷真等數十人館而禮之所得穀帛率多散施又崇信佛道用度常至不接與弟廣平王懷頗相夸尚競慕奢麗貪縱不法於是世宗攝愉禁中推案杖愉五十出為冀州刺史始愉自以職求侍要既勢劣二弟潛懷愧恨頗見言色又以幸妾屢被頓辱內外離抑及在州謀逆愉遂殺長史羊靈引及司馬李遵稱得清河王密疏云高肇謀殺害主上於是遂為壇於信都之南柴燎告天即皇帝位赦天下號建平元年立李氏為皇后世宗詔尚書李平討愉愉出拒王師頻敗遂嬰城自守愉知事窮攜李及四子數十騎出門諸軍追之見執以送詔徵赴京師申以家, WYG: 終羆止削廢}
