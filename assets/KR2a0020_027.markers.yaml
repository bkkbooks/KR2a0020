  - {type: punctuation, offset: 532, content: 、, id: KR2a0020_ZHSJ_027-bkkpn104}
  - {type: variant, offset: 532, length: 0, content: '', WYG: 言是也及亮兄羆預穆泰反事亮以府事付司馬慕容契上表自劾髙祖優詔不許還令攝事亮頻煩固請乆乃許之尋除使持節征北大將軍開府儀同三司冀州刺史徙封頓邱郡開國公食邑五百戸以紹崇爵世宗即位遷定州刺史尋除驃騎大將軍尚書令俄轉司空公景明三年薨時年五十二給東園温明祕器朝服一具衣一襲錢四十萬布七百匹蠟二百斤世宗親臨小斂贈太尉公領司州牧諡曰匡子紹字永業髙祖以其貴臣世胄顧念之九歳除員外郎侍學東宫轉}
  - {type: page-break, offset: 532, content: '', id: KR2a0020_WYG_027-14b, image: WYG0261/WYG0261-0416b.png}
  - {type: variant, offset: 532, length: 0, content: '', krp: 言是也及亮兄羆預穆泰反事亮以府事付司馬慕容契上表自劾髙祖優詔不許還令攝事亮頻煩固請乆乃許之尋除使持節征北大將軍開府儀同三司冀州刺史徙封頓邱郡開國公食邑五百戸以紹崇爵世宗即位遷定州刺史尋除驃騎大將軍尚書令俄轉司空公景明三年薨時年五十二給東園温明祕器朝服一具衣一襲錢四十萬布七百匹蠟二百斤世宗親臨小斂贈太尉公領司州牧諡曰匡子紹字永業髙祖以其貴臣世胄顧念之九歳除員外郎侍學東宫轉}
  - {type: variant, offset: 534, length: 0, content: '', WYG: 舎人十一尚琅邪長公主拜駙馬都尉散騎侍郎領京兆王愉文學世宗初通直散騎常侍高陽王雍友遭父憂詔起襲爵散騎常侍領主衣都統遷祕書監侍中金紫光禄大夫光禄卿又遷衞將軍}
