  - {type: variant, offset: 1701, length: 458, content: 一年封世宗初拜侍中轉尚書僕射懌才長從政明於斷決割判衆務甚有聲名司空高肇以帝舅寵任既擅威權謀去良宗屢譖懌及愉等愉不勝其忿怒遂舉逆冀州因愉之逆又構殺勰懌恐不免肇又錄囚徒以立私惠懌因侍宴酒酣乃謂肇曰天子兄弟詎有幾人而炎炎不息昔王莽頭禿亦藉渭陽之資遂篡漢室今君曲形見矣恐復終成亂階又言於世宗曰臣聞唯器與名不可以假人是故季氏旅泰宣尼以為深譏仲叔軒懸丘明以為至誡諒以天尊地卑君臣道別宜杜漸防萌無相僭越至於減膳錄囚人君之事今乃司徒行之詎是人臣之義且陛下修政教解獄訟則時雨可降玉燭知和何使明君失之於上姦臣竊之於下長亂之基於此在矣世宗笑而不應肅宗初遷太尉侍中如故詔懌裁門下之事又典經義注時有沙門惠憐者自云呪水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力優重使於城西之南治療百姓病懌表諫曰臣聞律深惑衆之科禮絕妖淫之禁皆所以大明居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能月斗誘生人致黃巾之禍天下塗炭數十年間角之由也昔新垣姦不登於明堂五利僥終嬰於顯戮靈太后以懌肅宗懿叔德先具瞻委以朝政事擬周霍懌竭力匡輔以天下為己任, WYG: 七考證穆崇傳}
