  - {type: variant, offset: 524, length: 0, content: '', WYG: 太華殿髙祖曰朕仰遵先意將營殿宇役夫既至興功有日今欲徙居永樂以避囂埃土木雖復無心毁之能不悽愴今故臨對卿等與之取别此殿乃髙宗所制爰歴顯祖逮朕沖年受位於此但事來奪情將有改制仰惟疇昔惟深悲感亮稽首對曰臣聞稽之卜筮載自典經占以決疑古今攸尚興建之功事在不易願陛下訊之蓍龜以定可否又去歳役作為功甚多太廟明堂一年便就若仍歳頻興恐民力凋弊且材幹新伐為功不固願得逾年小康百姓髙祖曰若終不為可如卿言後必為之逾年何益朕遠覽前王無不興造故有周創業經建靈䑓洪漢受終未央是作草創之初猶尚若此況朕承累聖之運屬太平之基且今八表}
