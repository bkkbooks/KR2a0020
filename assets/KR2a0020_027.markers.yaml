  - {type: variant, offset: 118, length: 0, content: '', WYG: 暴疾薨於苑内時年三十五太宗親臨其䘮悲動左右賜以通身隠起金飾棺䘮禮一依安城王叔孫俊故事贈宜都王諡曰文成世祖即位每與羣臣談宴未嘗不歎惜慇懃以為自泰常以來佐命勲臣文武兼濟無及之者見稱如此子夀襲爵少以父任選侍東宫尚樂陵公主拜駙馬都尉明敏有父風世祖愛重之擢為下大夫敷奏機辨有聲内外遷侍中中書監領南部尚書進爵宜都王加征東大將軍夀辭曰臣祖崇先皇之世屬值艱危幸天贊梁眷誠心宻告故得效功前朝流福於後昔陳平受賞歸功無知今眷元勲未録而臣獨奕世受榮豈惟仰愧古賢抑亦有虧國典世祖嘉之乃求眷後得其孫賜爵郡公輿駕征涼州命夀輔恭宗總録要機内外聽焉行次雲中將濟河宴諸將於宫世祖别御静室召夀及司徒崔浩尚書李順世祖謂夀曰蠕蠕吳提與牧犍連和今聞朕征涼州必來犯塞若伏兵漠南殄之為易朕故留壯兵肥馬使卿輔佐太子收田既訖便可分伏要害以待虜至引使深入然後擊之擒之必矣涼州路遠朕不得救卿若違朕指授為虜侵害朕還斬卿崔浩李順為證非虛言也夀頓首受詔壽信卜筮之言謂賊不來竟不設備而吳提果至侵及善無京師大駭壽不知所為欲築西郭門請恭宗避保南山惠太后不聽乃止遣司空長孫道生等擊走之世祖還以無大損傷故不追咎恭宗監國夀與崔浩等輔政人皆敬浩夀獨凌之又自恃位任以為人莫已及謂其子師曰但令吾兒及我亦足勝人不須苦教之遇諸父兄弟有如僕𨽻夫妻並坐共食而令諸父餕餘其自矜無禮如此為時人所鄙笑真君八年薨贈太尉諡曰文宣子平國襲爵尚城陽長公主拜駙馬都尉侍中中書監為太子}
