  - {type: variant, offset: 33, length: 6, content: 七男林皇后生, WYG: 外孫梁眷知之宻遣崇告太祖眷謂崇曰顯若知之問汝者丈夫當死節雖刀劔刳割勿泄也因以寵妻及所乗良馬付崇曰事覺吾當以此自明崇來告難太祖馳如賀蘭部顯果疑眷泄其謀將囚之崇乃唱言曰梁眷不顧恩義奬顯為逆今我掠得其妻馬足以雪忿顯聞而信之窟咄之難崇外甥于植等謀執太祖以應之告崇曰今窟咄己立衆咸歸附富貴不可失願舅圗之崇乃夜告太祖太祖誅植等北踰隂山復幸賀蘭部崇甚見寵待太祖為魏王拜崇征虜將軍從平中原賜爵歴陽公散騎常侍後遷太尉加侍中徙為安邑公又從征髙車大勝而還姚興圍洛陽司馬徳宗將辛恭靖請救太祖遣崇六千騎赴之未至恭靖敗詔崇即鎭野王除豫州刺史仍本將軍徵為太尉又徙冝都公天賜三年薨先是衛王儀謀逆崇豫焉太祖惜其功而祕之及有司奏諡太祖親覽諡法至述義不克曰丁太祖曰此當矣乃諡曰丁公初太祖避窟咄之難遣崇還察人心崇夜至民中留馬與從者乃㣲服入其營㑹有火光為舂妾所識賊皆驚起崇求從者不得因匿於坑中徐乃竊馬奔走宿於大澤有白狼向崇而號崇乃覺悟馳馬随狼而走適去賊黨追者已至遂得免難太祖異之命崇立祀子孫世奉焉太和中追録功臣以崇配饗崇長子遂留歴顯官討蠕蠕有功賜爵零陵侯後以罪}
