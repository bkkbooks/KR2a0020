  - {type: variant, offset: 2251, length: 505, content: 月叉與劉騰逼肅宗於顯陽殿閉靈太后於後宮囚懌於門下省誣懌罪狀遂害之時年三十四朝野貴賤知與不知含悲喪氣驚振遠近夷人在京及歸聞懌之喪為之劈面者數百人廣平王懷闕有魏諸王召入華林別館禁其出入令四門博士董徵授以經傳世宗崩乃得歸汝南王悅好讀佛經覽書史為性不倫俶儻難測悅妃閭氏即東海公之女也生一子不見禮答有崔延夏者以左道與悅遊合服仙藥松朮之屬時輕與出採芝宿於城外小人之所遂斷酒肉粟稻唯食麥飯又絕房中而更好男色輕忿妃妾至加捶撻同之婢使悅之出也妃住於別第靈太后敕檢問之引入窮悅事故妃病杖伏床蓐瘡尚未愈太后因悅之杖妃乃下令禁斷令諸親王及三蕃其有正妃疾患百日已上皆遣奏聞若有猶行捶撻就削封位及清河王懌為元叉所害悅了無讎恨之意乃以桑落酒候伺之盡其私佞叉大喜以悅為侍中太尉臨拜日就懌子亶求懌服玩之物不時稱旨乃召亶杖之百下亶居廬未葬形氣羸弱暴加威撻殆至不濟闕仍呼阿兒親自循撫闕悅為大剉碓置於州門盜者便欲斬其手時人懼其無常能行異事姦偷畏之而暫息及尒朱榮舉兵向洛既憶入間疑俄而聞榮肆毒於河陰遂南奔蕭衍衍立為魏主號年更興衍遣其將軍王辯送置於境上以覬侵逼及齊獻武王既誅榮以悅高祖子宜承大業乃令人示意悅既至清狂如故動為罪失不可扶持乃止出帝初除大司馬卒, WYG: 考證}
