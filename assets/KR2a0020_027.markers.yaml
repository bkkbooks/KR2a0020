  - {type: variant, offset: 161, length: 358, content: 東堂引恂入見誡以冠義曰夫冠禮表之百代所以正容體齊顏色順辭令容體正顏色齊辭令順故能正君臣親父子和長幼然母見必拜兄弟必敬責以成人之禮字汝元道所寄不輕汝當尋名求義以順吾旨二十年改字宣道遷洛詔恂詣代都其進止儀禮高祖皆為定及恂入辭高祖曰今汝不應向代但太師薨於壤朕既居皇極之重不容輕赴舅氏之喪欲使汝展哀舅氏拜汝母墓一寫為子之情汝至彼太師事畢後日宜一拜山陵拜訖汝族祖南安可一就問訊在途當溫讀經籍今日親見吾也後高祖每歲征幸恂常留守主執廟祀恂不好書學體貌肥大深忌河洛暑熱意每追樂北方中庶子高道悅數苦言致諫恂甚銜之高祖幸崧岳恂留守金墉於西掖門內與左右謀欲召牧馬輕騎奔代手刃道悅於禁中領軍元儼勒門防遏夜得寧靜厥明尚書陸琇馳啟高祖於南高祖聞之駭惋外寢其事仍至汴口而還引恂數罪與咸陽王禧等親杖恂又令禧等更代百餘下扶曳出外不起者月餘拘於城西別館, WYG: 殿}
