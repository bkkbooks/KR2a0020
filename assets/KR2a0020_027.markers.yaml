  - {type: variant, offset: 126, length: 4, content: 立名恂字, WYG: 過甚豈所謂順帝之則約躬随衆者也陛下既為天地所子又為萬民父母子過哀父則為之慘悴父過慼子則為之憂傷近蒙接見咫尺旒冕聖容哀毁駭感無止況神祗至靈而不乆虧和氣㣲致風旱者哉書稱一人有慶兆民頼之今一人過哀黎}
