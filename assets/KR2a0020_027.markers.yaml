  - {type: variant, offset: 1012, length: 116, content: 彭城王中軍府長史盧陽烏兼長史州事巨細委之陽烏世宗初為護軍將軍世宗留愛諸弟愉等常出入宮掖晨昏寢處若家人焉世宗每日華林戲射衣衫騎從往來無間遷中書監世宗為納順皇后妹為妃而不見禮答愉在徐州納妾李氏本姓楊東郡人夜聞其歌悅之遂被寵嬖罷州還京欲進, WYG: ''}
