  - {type: variant, offset: 113, length: 2, content: 常置, WYG: 宻表其事髙祖乃遣任城王澄率并肆兵以討之澄先遣治書侍御史李煥單車入代出其不意泰等驚駭計無所出煥曉諭逆徒示以禍福於是凶黨離心莫為之用泰自度必敗乃率麾下數百人攻煥郭門兾以一捷不克單馬走出城西為人擒送澄亦尋到窮治黨與髙祖幸代親見罪人問其反狀泰等伏誅子伯智八歲侍學東宫十歲拜太子洗馬散騎侍郎尚饒陽公主拜駙馬都尉早卒子階伯智弟士儒字叔賢徙涼州後乃得還為太尉參軍事子容武定中汲郡太守乙九弟忸頭侍中北部尚書卒贈司空公諡曰敬子蒲坂虞曹尚書征虜將軍涇州刺史贈征西將軍雍州刺史諡曰昭子韶字伏興員外散騎侍郎代郡太守征東將軍金紫光禄大夫卒贈使持節都督冀相殷三州諸軍事驃騎大將軍冀州刺史諡曰文子遵伯幽州司馬遂留弟觀字闥拔襲崇爵少以文藝知名選充内侍太祖器之太宗即位為左衞將軍綰門下中書出納詔命及訪舊事未嘗有所遺漏太宗竒之尚冝陽公主拜駙馬都尉稍遷太尉世祖之監國觀為右弼出則統攝朝政入則應對}
