  - {type: variant, offset: 527, length: 0, content: '', WYG: 謂亮曰三代之禮日出視朝自漢魏以降禮儀漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共}
  - {type: variant, offset: 527, length: 0, content: '', krp: 謂亮曰三代之禮日出視朝自漢魏以降禮儀漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共}
  - {type: variant, offset: 528, length: 1, content: 廢, WYG: 可否遂命讀奏案髙祖親自次}
  - {type: variant, offset: 528, length: 1, content: 廢, krp: 可否遂命讀奏案髙祖親自次}
  - {type: punctuation, offset: 530, content: ．, id: KR2a0020_ZHSJ_027-bkkpn103}
  - {type: 'tls:seg', offset: 530, content: '', id: KR2a0020_ZHSJ_027-d27p5s28}
  - {type: variant, offset: 530, length: 0, content: '', WYG: 又謂亮曰徐州表給歸化人稟王者民之父母誠冝許之但今荆揚不賓書軌未一方欲親御六師問罪江介計萬戸投化歳食百萬若聽其給也則蕃儲虛竭雖得戸千萬猶未成一同且欲随貧賑恤卿意何如亮對曰所存逺大實如聖㫖及車駕南遷遷武衞大將軍以本官董攝中軍事髙祖南伐以亮録尚書事留鎮洛陽後髙祖將自小平汎舟幸石濟亮諫曰臣聞垂堂之誨振古成規於安思危著於周易是以憑險弗防沒而不弔匹夫之賤猶不自輕况萬乗之尊含生所仰而可忽乎是故處則深宫廣厦行則萬騎千乗昔漢帝欲乗舟渡渭廣徳將以首血汗車輪帝乃感而就橋夫一渡小水猶尚若斯况洪河浩汗有不測之慮且車乗由人猶有奔逸致敗之害况水之緩急非人所制脱難出慮表其如宗廟何髙祖曰}
  - {type: page-break, offset: 530, content: '', id: KR2a0020_WYG_027-13b, image: WYG0261/WYG0261-0415d.png}
  - {type: page-break, offset: 530, content: '', id: KR2a0020_WYG_027-14a, image: WYG0261/WYG0261-0416a.png}
