  - {type: variant, offset: 47, length: 0, content: '', WYG: 咎悔恒讀佛經禮拜歸心於善髙祖幸代遂如長安中尉李彪承間密表告恂復與左右謀逆髙祖在長安使中書侍郎邢巒與咸陽王禧奉詔齎椒酒詣河陽賜恂死時年十五殮以麤棺常服瘞於河陽城二十二年冬御史臺令史龍文觀坐法當死告廷尉稱恂前被攝左右之日有手書自理不知狀}
