  - {type: variant, offset: 8004, length: 282, content: 命將授旗隨陸啟顙運籌制勝淮漢自賓節用勞心志清六合是故纘武修文仍世彌盛陛下當周康靖治之時豈得晏安於玄默然取外之理要由內強圖人之本先在自備蕭衍雖虐使其民而窺覦不已若遇我虛疲士民淍窘賊衍年老志張思播虺毒此之弗圖恐受其病伏惟陛下妙齡在位聖德方昇皇太后總御天機乾乾夕惕若留意於負荷忿車書之未一進賢拔能重官人之舉標賞忠清旌養人之器修干戈之用畜熊虎之士愛時鄙財輕寶重穀七八年間陛下聖略方剛親王德幹壯茂將相膂力未衰愚臣猶堪戎伍荷戈帶甲之衆蓄銳於今燕弧冀馬之盛充牣在昔又賊衍惡積禍盈勢不能久子弟闇悖釁逆已彰亂亡之兆灼然可見兼弱有徵天與不遠大同之機宜須蓄備昔漢帝力疾討滅英布高皇臥病親, WYG: 初}
