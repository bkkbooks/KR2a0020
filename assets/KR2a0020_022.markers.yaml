  - {type: variant, offset: 7052, length: 219, content: 以戒良士之困刑者侀也每垂三宥秉律執請不得已而用之是故小大之獄察之以情一人呼嗟或虧王道刑罰得失乃興廢之所由也竊聞司州牧高陽王臣雍栲殺奉朝請韓元昭前門下錄事姚敬賢雖因公事理實未盡何者太平之世草不橫伐行葦之感事驗隆周若昭等狀彰死罪以定應刑於都市與衆棄之如其疑似不分情理未究不宜以三清九流之官杖下便死輕絕民命傷理敗法往年州於大市鞭殺五人及檢贓狀全無寸尺今復酷害一至於此朝野云云咸懷驚愕若殺生在下虐專於臣人君之權安所復用自開古以來明明之世未聞斯比也, WYG: 齊獻}
