  - {type: variant, offset: 9021, length: 288, content: 王羲之小學篇數千言晝夜誦之旬有五日一皆通徹豐奇之白澄曰豐十五從師迄于白首耳目所經未見此比江夏黃童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋集門生討論同異于時四方無事國富民康豪貴子弟率以朋遊為樂而順下帷讀書篤志愛古性謇諤淡於榮利好飲酒解鼓琴能長吟永歎吒詠虛室世宗時上魏頌文多不載起家為給事中時尚書令高肇帝舅權重天下人士望塵拜伏順曾懷刺詣肇門門者以其年少答云在坐大有貴客不肯為通順叱之曰任城王兒可是賤也及見直往登牀捧手抗禮王公先達莫不怪慴而順辭吐傲然若無所覩肇謂衆賓曰此兒豪氣尚爾況其父乎及出肇加敬送之澄聞之大怒杖之數十後超轉中書侍郎俄遷太常少卿以父憂去職哭泣嘔血身自負土時年, WYG: 卷}
