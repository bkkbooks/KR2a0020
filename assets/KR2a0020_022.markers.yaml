  - {type: variant, offset: 9354, length: 136, content: 不造門謝謁順拜表而已曾不詣叉叉謂順曰卿何謂聊不見我順正色曰天子富於春秋委政宗輔叔父宜以至公為心舉士報國如何賣恩責人私謝豈所望也至於朝論得失順常鯁言正議曾不阿旨由此見憚出除平北將軍州刺史順謂叉曰北鎮紛紜方為國梗桑乾舊都根本所繫請假都督為國捍屏叉心疑難不欲授以兵官謂順曰此朝廷, WYG: 可考聞懌}
