  - {type: variant, offset: 10388, length: 509, content: 以告真或夭胎而奉味或殘軀以獻珍或主皮而興禮或牢豢以供神雖死生之異質俱有益於國人非如蒼蠅之無用唯構亂於蒸民遂屬疾在家杜絕慶弔後除吏部尚書兼右僕射及上省登階向榻見榻甚故問都令史徐仵起仵起曰此榻曾經先王坐順即哽塞涕泗交流久而不能言遂令換之時三公曹令史朱暉素事錄尚書高陽王雍雍欲以為廷尉評頻請託順順不為用雍遂下命用之順投之於地雍聞之大怒昧爽坐都廳召尚書及丞郎畢集欲待順至於衆挫之順日高方至雍攘袂撫几而言曰身天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投棄於地順鬚鬢俱張仰面看屋憤氣奔涌長歔而不言久之搖一白羽扇徐而謂雍曰高祖遷宅中土創定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成旨自有短垣而復踰之也雍曰身為丞相錄尚書如何不得用一人為官順曰庖人雖不治庖尸祝不得越樽俎而代之未聞有別旨令殿下參選事順又厲聲曰殿下必如是順當依事奏聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也後除征南將軍右光祿大夫轉兼左僕射尒朱榮之奉莊帝召百官悉至河陰素聞順數諫諍惜其亮直謂朱瑞曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走為陵戶鮮于康奴所害家徒四壁無物斂屍止有書數千, WYG: ''}
