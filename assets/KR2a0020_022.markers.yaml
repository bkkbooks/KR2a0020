  - {type: variant, offset: 5779, length: 801, content: 是衆心忻服又加散騎常侍驃騎大將軍尋遷司空加侍中俄詔領尚書令初正始之末詔百司普昇一級而執事者不達旨意刺史守令限而不及澄奏曰竊惟雲構鬱起澤及百司企春望榮內外同慶至於賞陟不及守宰爾來十年寃訟不絕封回自鎮遠安州入為太尉長史元匡自征虜州入作宗卿二人遷授並在先詔應蒙之理備在於斯兼州佐停私之徒陪臣郡丞之例尚蒙天澤下降榮及當時然參佐之來皆因府主今府主不霑佐官獨預棄本賞末愚謂未允今計刺史守宰之官請準回匡悉同汎限上允初旨百司之章下覆訟者元元之心詔曰自今已後內外之事嘗經先朝者不得重聞澄奏曰臣聞堯懸諫諍之鼓舜置誹謗之木皆所以廣耳目於芻蕘達四聰於天下伏惟太祖開基化隆自遠累聖相承於今九帝重光疊照樜隆必同與奪隨時道無體思過如渴言重千金故稱無諱之朝邁蹤三五高祖沖年纂曆文明協統變官易律未為違典及慈聖臨朝母儀宇縣爰發慈令垂心滯獄深枉者仰日月於九泉微屈者希曲照於盆下今乃格以先朝限以一例斯誠奉遵之本心實乖元元之至望在于謙挹有乖舊典謹尋抱枉求直或經累朝毫釐之差正之宜速謬若千里駟馬弗追故禮有損益事有可否父有諍子君有諫臣琴瑟不調理宜改作是以防川之論小決則通鄉校之言擁則敗國矧伊陳屈而可抑以先朝且先朝屈者非故屈之或有司愛憎或執事濁僻空文致法以誤視聽如此寃塞彌在可哀僭之與濫寧失不經乞收今旨還依前詔詔曰省奏深體毗贊之情三皇異軌五代殊風一時之制何必詮改必謂虛文設旨理在可申者何容不同來執可依往制澄表上皇誥宗制并訓詁各一卷意欲皇太后覽之思勸戒之益又奏利國濟民所宜振舉者十條一曰律度量衡公私不同所宜一之二曰宜興學校以明黜陟之法三曰宜興滅繼絕各舉所知四曰五調之外一不煩民任民之力不過三日五曰臨民之官皆須黜陟以旌賞罰六曰逃亡代輸去來年久者若非伎作任聽即住七曰邊兵逃走或實陷沒皆須精檢三長及近親若實隱之徵其代輸不隱勿論八曰工商世業之戶復徵租調無以堪濟今請免之使專其業九曰三長禁姦不得隔越相領戶不滿者隨近并合十曰羽林虎賁邊方有事暫可赴戰常戍宜遣蕃兵代之, WYG: 顯陽殿閉}
