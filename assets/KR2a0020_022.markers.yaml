  - {type: punctuation, offset: 9487, content: 「, id: KR2a0020_ZHSJ_022-bkkpn2105}
  - {type: variant, offset: 9491, length: 814, content: 事非我所裁順曰叔父既握國柄殺生由己自言天之歷數應在我躬何得復有朝廷也叉彌忿憚之轉為安東將軍齊州刺史順自負有才不得居內每懷鬱怏形於言色遂縱酒歡娛不親政事叉解領軍徵為給事黃門侍郎親友郊迎賀其得入順曰不患不入正恐入而復出耳俄兼殿中尚書轉侍中初中山王熙起兵討元叉不果而誅及靈太后反政方得改葬順侍坐西遊園因奏太后曰臣昨往看中山家葬非唯宗親哀其寃酷行路士女見其一家七喪皆為口自本然莫不酸泣叉妻時在太后側順指之曰陛下奈何以一妹之故不伏元叉之罪使天下懷寃太后默然不語就德興反於營州使尚書盧同往討之大敗而返屬侍中穆紹與順侍坐因論同之罪同先有近宅借紹紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同有好宅與要勢侍中豈慮罪也紹慚不敢復言靈太后頗事妝飾數出遊幸順面諍曰禮婦人夫喪自稱未亡人首去珠玉衣不被綵陛下母臨天下年垂不惑過甚修飾何以示後世靈太后慚而不出還入宮責順曰千里相徵豈欲衆中見辱也順曰陛下盛服炫容不畏天下所笑何臣之一言乎初城陽王徽慕順才名偏相結納而廣陽王淵姦徽妻于氏大為嫌隙及淵自定州被徵入為吏部尚書兼中領軍順為詔書辭頗優美徽疑順為淵左右由是與徐紇間順於靈太后出順為護軍將軍太常卿順奉辭於西遊園徽紇侍側順指之謂靈太后曰此人魏之宰嚭魏國不滅終不死亡紇脅肩而出順遂抗聲叱之曰爾刀筆小人正堪為几案之吏寧應忝茲執虧我彝倫遂振衣而起靈太后默而不言時追論順父顧託之功增任城王彝邑二千戶又析彝邑五百戶以封順為東阿縣開國公順疾徽等間之遂為蠅賦曰余以仲秋休沐端坐衡門寄想琴書託情紙翰而蒼蠅小蟲往來牀几疾其變白聊為賦云遐哉大道廓矣洪氛肇立秋夏爰啟冬春既含育於萬性又芻狗而不仁隨因緣以授體齊美惡而無分生茲穢類靡益於人名備羣品聲損衆倫欹脛纖翼紫首蒼身飛不能迥聲若遠聞點緇成素變白為黑寡愛蘭芳偏貪穢食集桓公之屍居平叔之側亂鷄鳴之響毀皇宮之飾習習戶庭營營榛棘反覆往還譬彼讒賊膚受既通譖潤罔極緝緝幡幡交亂四國於是妖姬進邪士來聖賢擁忠孝摧周昌拘於牖里天乙囚於夏臺伯奇, WYG: 䘮}
  - {type: variant, offset: 9491, length: 814, content: 事非我所裁順曰叔父既握國柄殺生由己自言天之歷數應在我躬何得復有朝廷也叉彌忿憚之轉為安東將軍齊州刺史順自負有才不得居內每懷鬱怏形於言色遂縱酒歡娛不親政事叉解領軍徵為給事黃門侍郎親友郊迎賀其得入順曰不患不入正恐入而復出耳俄兼殿中尚書轉侍中初中山王熙起兵討元叉不果而誅及靈太后反政方得改葬順侍坐西遊園因奏太后曰臣昨往看中山家葬非唯宗親哀其寃酷行路士女見其一家七喪皆為口自本然莫不酸泣叉妻時在太后側順指之曰陛下奈何以一妹之故不伏元叉之罪使天下懷寃太后默然不語就德興反於營州使尚書盧同往討之大敗而返屬侍中穆紹與順侍坐因論同之罪同先有近宅借紹紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同有好宅與要勢侍中豈慮罪也紹慚不敢復言靈太后頗事妝飾數出遊幸順面諍曰禮婦人夫喪自稱未亡人首去珠玉衣不被綵陛下母臨天下年垂不惑過甚修飾何以示後世靈太后慚而不出還入宮責順曰千里相徵豈欲衆中見辱也順曰陛下盛服炫容不畏天下所笑何臣之一言乎初城陽王徽慕順才名偏相結納而廣陽王淵姦徽妻于氏大為嫌隙及淵自定州被徵入為吏部尚書兼中領軍順為詔書辭頗優美徽疑順為淵左右由是與徐紇間順於靈太后出順為護軍將軍太常卿順奉辭於西遊園徽紇侍側順指之謂靈太后曰此人魏之宰嚭魏國不滅終不死亡紇脅肩而出順遂抗聲叱之曰爾刀筆小人正堪為几案之吏寧應忝茲執虧我彝倫遂振衣而起靈太后默而不言時追論順父顧託之功增任城王彝邑二千戶又析彝邑五百戶以封順為東阿縣開國公順疾徽等間之遂為蠅賦曰余以仲秋休沐端坐衡門寄想琴書託情紙翰而蒼蠅小蟲往來牀几疾其變白聊為賦云遐哉大道廓矣洪氛肇立秋夏爰啟冬春既含育於萬性又芻狗而不仁隨因緣以授體齊美惡而無分生茲穢類靡益於人名備羣品聲損衆倫欹脛纖翼紫首蒼身飛不能迥聲若遠聞點緇成素變白為黑寡愛蘭芳偏貪穢食集桓公之屍居平叔之側亂鷄鳴之響毀皇宮之飾習習戶庭營營榛棘反覆往還譬彼讒賊膚受既通譖潤罔極緝緝幡幡交亂四國於是妖姬進邪士來聖賢擁忠孝摧周昌拘於牖里天乙囚於夏臺伯奇, krp: 䘮}
