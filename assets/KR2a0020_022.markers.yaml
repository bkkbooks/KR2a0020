  - {type: variant, offset: 14, length: 0, content: '', krp: 十孝文五王廢太子京兆王清河王廣平王汝南王孝文皇帝}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 男林皇后生廢太子恂文昭皇后生宣武皇帝廣平文穆王懐袁貴人生京兆王愉羅夫人生清河文獻王懌汝南文宣王悅鄭充華生皇子恌未封早夭廢太子庶人恂字元道生而母死文明太后撫視之常置左右年四嵗太皇太后親為立名恂字元道於是大赦太和十七年七月癸丑立恂為皇太子及冠恂於廟髙祖臨光極東堂引恂入見誡以冠義曰夫冠禮表之百代所以正容體齊顔色順辭令容體正顔色齊辭令順故能正君臣親父子和長㓜然母見必拜兄弟必敬責以成人之禮字汝元道所寄不輕汝當尋名求義以順吾㫖二十年改字宣道遷洛詔恂詣代都其進止儀禮髙祖皆為定及恂入辭髙祖曰今汝不應向代但太師薨於恒壤朕既居皇極之重不容輕赴舅氏之䘮欲使汝展哀舅氏拜汝母墓一寫為子之情汝至彼太師事畢後日宜一拜山陵拜訖汝族祖南安可一就問訊在途當温讀經籍今日親見吾也後髙祖每嵗征幸恂常留守主執廟祀恂不好書學體貌肥大深忌河洛暑熱意每追樂北方}
