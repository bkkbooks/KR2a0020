  - {type: variant, offset: 48, length: 2, content: 有成, WYG: 中尉李彪侍御史賈尚寢不為聞賈坐繫廷尉時彪免歸髙祖在鄴尚書表收彪赴洛會赦遂不窮其本末賈尚出繫暴病數日死初髙祖將為恂娶司徒馮誕長女以女㓜待年長先為娉彭城劉長文滎陽鄭懿女為左右孺子時恂年十三四髙祖泛舟天淵池謂郭祚崔光宋弁曰}
