  - {type: variant, offset: 4192, length: 1323, content: 達入寇漢陽是時高祖不豫引澄入見清徽堂詔曰顯達侵亂沔陽不安朕不親行莫攘此賊朕疾患淹年氣力惙弊如有非常委任城大事是段任城必須從朕澄涕泣對曰臣謹當竭股肱之力以命上報遂從駕南伐高祖崩澄受顧命世宗初有降人嚴叔懋告尚書令王肅遣孔思達潛通寶卷圖為叛逆寶卷遣俞公喜送敕於肅公喜還南肅與裴叔業馬為信澄信之乃表肅將叛輒下禁止咸陽北海二王奏澄擅禁宰輔免官歸第尋出為平西將軍梁州刺史辭以母老除安東將軍相州刺史復固辭改授安西將軍雍州刺史尋徵赴季秋講武除都督淮南諸軍事鎮南大將軍開府揚州刺史下車封孫叔敖之墓毀蔣子文之廟頻表南伐世宗不許又辭母老乞解州任寢而不報加散騎常侍澄表曰臣參訓先朝藉規有日前言舊軌頗亦聞之又昔在代親習皇宗熟祕序疑庭無闕日臣每於侍坐先帝未常不以書典在懷禮經為事周旋之則不輟於時自鳳舉中京方隆禮教宗室之範每蒙委及四門之選負荷銓量自先皇升遐未遑修述學宮虛荷四門之名宗人有闕四時之業青衿之緒於茲將廢臣每惟其事竊所傷懷伏惟聖略宏遠四方罕務宴安之辰於是乎在何為太平之世而令子衿之歎興焉聖明之日而使宗人之訓闕焉愚謂可敕有司修復皇宗之學開闢四門之教使將落之族日就月將詔曰冑子崇業自古盛典國均之訓無應久廢尚書更可量宜修立澄又表母疾解州任不聽蕭衍將張囂之寇陷夷陵戍澄遣輔國將軍成興步騎赴討大破之復夷陵囂之遁走又遣長風戍主奇道顯攻蕭衍陰山戍破之斬其戍主龍驤將軍都亭侯梅興祖仍引攻白戍又破之斬其寧朔將軍關內侯吳道爽澄表曰蕭衍頻斷東關欲令巢湖汎溢湖周回四百餘里東關合江之際廣不過數十步若賊計得成大湖傾注者則淮南諸戍必同晉陽之事矣又吳楚便水且灌且掠淮南之地將非國有壽陽去江五百餘里衆庶惶惶並懼水害脫乘民之願攻敵之虛豫勒諸州纂集士馬首秋大集則南瀆可為飲馬之津霍嶺必成徙倚之觀事貴應機經略須早縱混一不可必果江西自是無虞若猶豫緩圖不加除討關塞既成襄陵方及平原民戍定為魚矣詔發冀定瀛相并濟六州二萬人馬一千五百匹令仲秋之中畢會淮南并壽陽先兵三萬委澄經略先是朝議有南伐之意以蕭寶夤為東揚州刺史據東城陳伯之為江州刺史戍陽石以澄總督二鎮授之節度至是勒兵進討以東關水衝大峴險要東關縱水陽石合肥有急懸之切不圖大峴則歷陽有乘險之援淮陵陸道九山水路並宜經略於是遣統軍傅豎眼王神念等進次大峴東關九山淮陵皆分部諸將倍道據之總勒大衆絡繹相接而神念克其關要潁川二城斬衍軍主費尼而寧朔將軍韋惠龍驤將軍李伯由仍固大峴澄遣統軍党法宗傅豎眼等進軍克之遂圍白塔牽城數日之間便即逃潰衍清溪戍望風散走衍徐州刺史司馬明素率衆三千欲援九山徐州長史潘伯隣規固淮陵寧朔將軍王燮負險焦城法宗進克焦城破淮陵擒明素斬伯隣其濟陰太守王厚強廬江太守裴邃即亦奔退詔澄曰將軍文德內昭武功外暢奮揚大略將蕩江吳長旌始舒賊徒懾氣銳旅方馳東關席卷想江湖弭波在旦夕耳所送首虜並已聞之初澄出討之後衍將姜慶真襲據壽春外郭齊王蕭寶夤擊走之長史韋纘坐免官澄以在外無坐遂攻鍾離又詔鍾離若食盡三月已前固有可克如至四月淮水泛長舟行無礙宜善量之前事捷也此實將軍經略勳有常焉如或以水盛難圖亦可為萬全之計不宜昧利無成以貽後悔也蕭衍冠軍將軍張惠紹游擊將軍殷暹驍騎將軍趙景悅龍驤將軍張景仁等率衆五千送糧鍾離澄遣統軍王足劉思祖等邀擊惠紹等大破之獲惠紹殷暹景仁及其屯騎校尉史文淵等軍主以上, WYG: 忠録}
