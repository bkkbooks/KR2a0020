  - {type: variant, offset: 1390, length: 1863, content: 之卦未可全為吉也高祖厲聲曰象云大人虎變何言不吉也澄曰陛下龍興既久豈可方同虎變高祖勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣子豫參顧問敢盡愚衷高祖既銳意必行惡澄此對久之乃解曰各言其志亦復何傷車駕還宮便召澄未及昇階遙謂曰向者之革卦今更欲論之明堂之忿懼衆人競言阻我大計故厲色怖文武耳想解朕意也乃獨謂澄曰今日之行誠知不易但國家興自北土徙居平城雖富有四海文軌未一此間用武之地非可文治移風易俗信為甚難崤函帝宅河洛王里因茲大舉光宅中原任城意以為何如澄曰伊洛中區均天下所據陛下制御華夏輯平九服蒼生聞此應當大慶高祖曰北人戀本忽聞將移不能不驚擾也澄曰此既非常之事當非常人所知唯須決之聖懷此輩亦何能為也高祖曰任城便是我之子房加撫軍大將軍太子少保又兼尚書左僕射及駕幸洛陽定遷都之策高祖詔曰遷移之旨必須訪衆當遣任城馳驛向代問彼百司論擇可否近日論革今真所謂革也王其勉之既至代都衆聞遷詔莫不驚駭澄援引今古徐以曉之衆乃開伏澄遂南馳還報會車駕於滑臺高祖大悅曰若非任城朕事業不得就也從幸鄴宮除吏部尚書及幸代車駕北巡留澄銓簡舊臣初魏自公侯以下迄于選臣動有萬數冗散無事澄品為三等量其優劣盡其能否之用咸無怨者駕還洛京復兼右僕射高祖至北邙遂幸洪池命澄侍昇龍舟因賦詩以序懷高祖曰朕昨夜夢一老公頭鬢皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂嵇紹以身衞主殞命御側亦是晉之忠臣比干遭紂兇虐忠諫剖心可謂殷之良士二人俱死於王事墳塋並在於道周然陛下徙御經殷墟而弔比干至洛陽而遺嵇紹當是希恩而感夢高祖曰朕何德能幽感達士也然實思追禮先賢標揚忠懿比干嵇紹皆是古之誠烈而朕務濃於比干禮略於嵇紹情有愧然既有此夢或如任城所言於是求其兆域遣使弔祭焉蕭鸞既殺蕭昭業而自立昭業雍州刺史曹虎請以襄陽內附分遣諸將車駕將自赴之豫州又表虎奉誠之使不復重來高祖引澄及咸陽王禧彭城王勰司徒馮誕司空穆亮鎮南李沖等議之高祖曰比得邊州表云襄陽慕化朕將鳴鑾江沔為彼聲勢今復表稱更無後信於行留之計竟欲如何禧等或云宜行或言宜止高祖曰衆人紛紜意見不等朕莫知所從必欲盡行留之勢使言理俱暢者宜有客主共相起發任城與鎮南為應留之議朕當為宜行之論諸公俱坐聽得失長者從之於是高祖曰二賢試言留計也沖對曰臣等正以徒御草創人斯樂安內而應者未審不宜輕爾動發高祖曰襄陽款問似當是虛亦知初遷之民無宜勞役脫歸誠有實即當乘其悅附遠則有會稽之會近則略平江北如其送款是虛且可遊巡淮楚問民之瘼使彼土蒼生知君德之所在復何所損而惜此一舉脫降問是實而停不撫接不亦稽阻款誠毀朕大略也澄曰降問若審應有表質而使人一返靜無音問其詐也可見今代遷之衆人懷戀本細累相攜始就洛邑居無一椽之室家闕儋石之糧而使怨苦即戎泣當白刃恐非歌舞之師也今茲區宇初構又東作方興正是子來百堵之日農夫肆力之秋宜寬彼逋誅惠此民庶且三軍已援無稽赴接苟其款實力足納撫待克平襄沔然後動駕今無故勞涉空為往返恐挫損天威更成賊膽願上覽盤庚始遷之艱難下矜詩人由庚之至詠輯寧新邑惠康億兆而司空亮以為宜行公卿皆同之澄謂亮曰公在外見旌鉞既張而有憂色每聞談論不願此行何得對聖顏更如斯之語也面背不同事涉欺佞非所謂論道之德更失國士之體或有傾側當由公輩佞臣李沖曰任城王可謂忠於社稷願陛下深察其言臣等在外皆憚征行唯貴與賤不謀同辭仰願聖心裁其可否高祖曰任城適以公等從朕有如此論不從朕者何必皆忠而通識安危也小忠是大忠之賊無乃似諸澄曰臣既愚闇不識大理所可言者雖涉小忠要是竭盡微款不知大忠者竟何據高祖曰任城脫居台鼎之任欲令大忠在己也澄曰臣誠才非台弼智闕和鼎脫得濫居公鉉庶當官而行不負愚志高祖大笑澄又謂亮曰昔汲黯於漢武前面折公孫食脫粟飯臥布被云其詐也于時公孫謙讓下之武帝歎汲黯至忠公孫長者二人稱賢公既道均昔士願思長者之言高祖笑曰任城欲自比汲黯也且所言是公未知得失所在何便謝司空也駕遂南伐五等開建食邑一千戶後從征至懸瓠以篤疾還京駕餞之汝濆賦詩而別車駕還洛引見王公侍臣於清徽堂高祖曰此堂成來未與王公行宴樂之禮後東閤廡堂粗復始就故今與諸賢欲無高而不昇無小而不入因之流化渠高祖曰此曲水者亦有其義取乾道曲成萬物無滯次之洗煩池高祖曰此池中亦有嘉魚澄曰此所謂魚在在藻有頒其首高祖曰且取王在靈沼於牣魚躍次之觀德殿高祖曰射以觀德故遂命之次之凝閑堂高祖曰名目要有其義此蓋取夫子閑居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李沖曰此東曰步元廡西曰遊凱廡此堂雖無唐堯之君卿等當無愧於元凱沖對曰臣既遭唐堯之君不敢辭元凱之譽高祖曰光景垂落朕同宗則有載考之義卿等將出無遠何得默爾不示德音即命黃門侍郎崔光郭祚, WYG: ''}
