  - {type: variant, offset: 3632, length: 559, content: 似當勢弱泰既不相拒無故發兵非宜也但速往鎮之民心自定遂倍道兼行出其不意又遣治書侍御史李煥先赴至即擒泰民情怡然窮其黨與罪人皆得鉅鹿公陸叡安樂侯元隆等百餘人皆獄禁具狀表聞高祖覽表大悅召集公卿以下以表示之曰我任城可謂社稷臣也尋其罪案正復臯陶斷獄豈能過之顧謂咸陽王等曰汝等脫當其處不能辦此車駕尋幸平城勞澄曰任城此行深副遠寄對曰陛下威靈遠被罪人無所逃刑臣何勞之有引見逆徒無一人稱枉時人莫不歎之高祖顧謂左右曰昔仲尼云聽訟吾猶人也必也使無訟乎然聖人之聽訟殆非常人所匹必也無訟今日見之矣以澄正尚書車駕南伐留澄居守復兼右僕射澄表請以國秩一歲租布帛助供軍資詔受其半高祖幸鄴值高車樹者反叛車駕將親討之澄表諫不宜親行會江陽王繼平之乃止高祖還洛引見公卿高祖曰營國之本禮教為先朕離京邑以來禮教為日新以不澄對曰臣謂日新高祖曰朕昨入城見車上婦人冠帽而著小襦襖者若為如此尚書何為不察澄曰著猶少於不著者高祖曰深可怪也任城意欲令全著乎一言可以喪邦者斯之謂歟可命史官書之又曰王者不降佐於蒼昊皆拔才而用之朕失於舉人任許一羣婦人輩奇事當更銓簡耳任城在省為舉天下綱維為當署事而已澄曰臣實署事而已高祖曰如此便一令史足矣何待任城又曰我遣舍人宣詔何為使小人聞之澄曰時雖有幹吏去榜亦遠高祖曰遠則不聞聞則不遠既得聞詔理故可知於是留守羣臣遂免冠謝罪尋除尚書右僕射蕭寶卷遣其太尉陳, WYG: ''}
