  - {type: variant, offset: 5517, length: 0, content: '', WYG: 卷以見意焉正光元年}
  - {type: variant, offset: 5517, length: 0, content: '', krp: 卷以見意焉正光元年}
  - {type: variant, offset: 5518, length: 225, content: 人既而遇雨淮水暴長引歸壽春還既狼狽失兵四千餘人頻表解州世宗不許有司奏軍還失路奪其開府又降三階時蕭衍有移求換張惠紹澄表請不許詔付八座會議尚書令廣陽王嘉等奏宜還之詔乃聽還後果復寇邊轉澄鎮北大將軍定州刺史初民中每有橫調百姓煩苦前後牧守未能蠲除澄多所省減民以忻賴又明黜陟賞罰之法表減公園之地以給無業貧口禁造布絹不任衣者母孟太妃薨居喪毀瘠當世稱之服闋除太子太保於時高肇當朝猜忌賢戚澄為肇間構常恐不全乃終日昏飲以示荒敗所作詭越時謂為狂世宗夜崩時事倉卒高肇擁兵於外, WYG: 月义與劉騰逼}
