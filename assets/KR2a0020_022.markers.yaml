  - {type: variant, offset: 8287, length: 580, content: 顯達夫以萬乘之主豈忘宴安實以侵名亂正計不得已今宜慕二帝之遠圖以肅寧為大任然頃年以來東西難寇艱虞之興首尾連接雖尋得翦除亦大損財力且飢饉之氓散亡莫保收入之賦不增出用之費彌衆不愛力以悅民無豐資以待敵此臣所以夙夜懷憂悚息不寧者也易曰何以守位曰仁何以聚人曰財故曰財者非天不生非地不長非時不成非人不聚生聚之由如此其難集人守位若此之重興替之道焉可不慮又古者使民歲不過三日食壯者之糧任老者之智此雖太平之法難卒而因然妨民害財不亦宜戒今墉雉素修庫崇列雖府寺膠塾少有未周大抵省府粗得庇理務諸寺靈塔俱足致虔講道唯明堂辟雍國禮之大來冬司徒兵至請籌量減徹專力經營務令早就其廣濟數施之財酬商互市之弊凡所營造自非供御切須戎仗急要亦宜微減以務阜積庶府無橫損民有全力夫食土簋而媯德昭寢卑室而禹功盛章臺麗而楚力衰阿宮壯而秦財竭存亡之由灼然可覩願思前王一同之功畜力聚財以待時會靈太后銳於繕興在京師則起永寧太上公等佛寺功費不少外州各造五級佛圖又數為一切齋會施物動至萬計百姓疲於土木之功金銀之價為之踊上削奪百官事力費損庫藏兼曲賚左右日有數千澄故有此表雖卒不從常優答禮之政無大小皆引參決澄亦盡心匡輔事有不便於民者必於諫諍雖不見用殷勤不已內外咸敬憚之神龜二年薨年五十三賻布一千二百匹錢六十萬蠟四百斤給東園溫明祕器朝服一具衣一襲大鴻臚監護喪事詔百僚會喪贈假黃鉞使持節都督中外諸軍事太傅領太尉公加以殊禮備九錫依晉, WYG: ''}
