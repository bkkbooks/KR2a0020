  - {type: variant, offset: 82, length: 363, content: 中外諸軍事中都坐大官聽理民訟甚收時譽延興中顯祖集羣僚欲禪位於京兆王子推王公卿士莫敢先言雲進曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民父子相傳其來久矣皇魏之興未之有革皇儲正統聖德夙章陛下必欲割捐塵務頤神清曠者冢副之寄宜紹寶曆若欲捨儲輕移宸極恐非先聖之意駭動人情又天下是祖宗之天下而陛下輒改神器上乖七廟七靈下長姦亂之道此是禍福所由願深思慎之太尉源賀又進曰陛下今欲外選諸王而禪位于皇叔者臣恐春秋蒸嘗昭穆有亂脫萬世之後必有逆饗之譏深願思任城之言東陽公元丕等進曰皇太子雖聖德夙彰然實沖幼陛下富於春秋始覽機政普天景仰率土傒心欲隆獨善不以萬物為意其若宗廟何其若億兆何顯祖曰儲宮正統受終文祖羣公相之有何不可於是傳位於高祖後蠕蠕犯塞雲為中軍大都督從顯祖討之遇於大磧事具蠕蠕傳後仇池氐反以雲為征西大將軍討平之除都督徐兗二州緣淮諸軍事征東大將軍開府, WYG: ''}
