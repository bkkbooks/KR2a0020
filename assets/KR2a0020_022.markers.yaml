  - {type: variant, offset: 11088, length: 1498, content: 州諸軍事將軍尚書右僕射冀州刺史順弟淑淑弟悲並早卒悲弟紀字子綱永熙中給事黃門侍郎隨出帝沒於關中澄弟嵩字道岳高祖時自中大夫遷員外常侍轉步兵校尉大司馬安定王休薨未及卒哭嵩便遊田高祖聞而大怒詔曰嵩不能克己復禮企心典憲大司馬薨殂甫爾便以鷹鷂自娛有如父之痛無猶子之情捐心棄禮何其太速便可免官後從平沔北累有戰功除左中郎將兼武衞將軍高祖南伐蕭寶卷將陳顯達率衆拒戰嵩身備三仗免冑直前將士從之顯達奔潰斬獲萬計嵩於爾日勇冠三軍高祖大悅而言曰任城康王大有褔德文武頓出其門以功賜爵高平縣侯賚帛二千五百匹初高祖之發洛也馮皇后以罪幽於宮內既平顯達回次穀唐原高祖疾甚將賜后死曰使人不易可得顧謂任城王澄曰任城必不負我嵩亦當不負任城可使嵩也於是引嵩入內親詔遣之世宗即位以武衞將軍兼侍中出為平南將軍荊州刺史嵩表曰蕭寶卷骨肉相殘忠良先戮臣下囂然莫不離背君臣攜貳干戈日尋流聞寶卷雍州刺史蕭衍兄懿於建業阻兵與寶卷相持荊郢二州刺史並是寶卷之弟必有圖衍之志臣若遣書相聞迎其本謀冀獲同心并力除衍平衍之後彼必旋師赴救丹陽當不能復經營疆陲全固襄沔臣之軍威已得臨據則沔南之地可一舉而收緣漢曜兵示以威德思歸有道者則引而納之受疑告危者則援而接之總兵竚銳觀釁伺隙若其零落之形已彰怠懈之勢已著便可順流摧鋒長驅席卷詔曰所陳嘉謀深是良計如當機形可進任將軍裁之既而蕭衍尋克建業乃止除平北將軍州刺史轉平東將軍徐州刺史又轉安南將軍揚州刺史蕭衍湘州刺史楊公則率衆二萬屯軍洛口姜慶真領卒五千據於首陂又遣其左軍將軍騫小眼軍主何天祚張俊興等率衆七千攻圍陸城嵩乃遣統軍封邁王會等步騎八千討之邁達陸城賊皆夜遁追擊破之斬獲數千公則慶真退還馬頭衍徐州刺史昌義之屯據高皇遣三軍潛寇陰陵以淮水淺竭不通船艦屯於馬頭衍將田道龍何景先等領卒三千已至衡山規寇陸城寇並充逼嵩遣兼統軍李叔仁等援合肥小峴楊石頻戰破之衍征虜將軍趙草屯於黃口嵩遣軍司趙熾等往討之先遣統軍安伯醜潛師夜渡伏兵下蔡草率卒四千逆來拒戰伯醜與下蔡戍主王虎等前後夾擊大敗之俘斬溺死四千餘人統軍李叔仁等夜襲硤石之賊又破之衍將姜慶真專據肥汭冠軍將軍曹天寶屯於鷄口軍主尹明世屯東硤石嵩遣別將羊引次于淮西去賊營十里司馬趙熾率兵一萬為表𩹉聲勢衆軍既會分擊賊之四壘四壘之賊戰敗奔走斬獲數千溺死萬數統軍牛敬賓攻硤石明世宵遁慶真合餘燼浮淮下下蔡戍主王略截流擊之俘斬太半於是威名大振後為蒼頭李太伯等同謀害嵩并妻穆氏及子世賢世宗為嵩舉哀於東堂賻絹一千匹贈車騎將軍領軍諡曰剛侯第二子世儁頗有幹用而無行業襲爵除給事中東宮舍人伯父澄表求轉階授之於是除員外散騎常侍肅宗時追論嵩勳封世儁衞縣開國男食邑二百戶遷冠軍將軍宗正少卿又為散騎常侍安南將軍武衞將軍河南尹尋除鎮東將軍青州刺史轉征東將軍加散騎常侍邢杲之亂圍逼州城世儁憑城拒守遂得保全孝莊時除衞將軍吏部尚書尒朱兆寇京師詔世儁以本官為都督防守河橋及兆至河世儁初無拒守意便隔岸遙拜時論疾之前廢帝世為驃騎將軍仍加尚書尤為尒朱世隆所昵出帝初加儀同三司改封武陽縣開國子食邑五百戶世儁居選曹不能厲心多所受納為中尉彈糾坐免官尋復本職孝靜初加侍中尚書右僕射遷尚書令世儁輕薄好去就詔送晉陽興和中薨贈侍中都督冀定瀛殷四州諸軍事驃騎大將軍太傅定州刺史尚書令開國公如故諡曰躁戾子景遠襲散騎侍郎世賢弟世哲武定中吏部郎嵩弟贍字道周高祖時自大夫稍遷宗正少卿龍驤將軍光州刺史散騎常侍左將軍遷平東將軍兗州刺史頗愛書史而貪暴好殺澄忿之絕其往來有四子長子遠尚書郎史臣曰顯祖之將禪讓可謂國之大節康王毅然庭諍德音孔昭一言興邦其斯之謂歟文宣貞固俊遠鬱為宗傑身因累朝寧濟夷險既社稷是任其梁棟之望也順謇諤俶儻有汲黯之風不用於時橫招非命惜矣嵩有行陳之氣儁則裂冠之徒歟, WYG: 考證}
