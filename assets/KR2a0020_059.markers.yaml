  - {type: variant, offset: 82, length: 449, content: 稍遷太子少傅領禁兵進爵為侯加建義將軍受詔與中書侍郎胡方回等改定律制出為散騎常侍平南將軍東雍州刺史假梁郡公在任廉白甚有惠政徵為祕書監委以國史之任不勤著述竟無所成詔雅為太華殿賦文多不載雅性剛戇好自矜誕陵獵人物高允重雅文學而雅輕薄允才允性柔寬不以為恨允將婚于邢氏雅勸允娶于其族允不從雅曰人貴河間邢不勝廣平游人自棄伯度我自敬黃頭貴己賤人皆此類也允著徵士頌殊為重雅事在允傳雅因論議長短忿儒者陳奇遂陷奇至族議者深責之和平二年卒贈相州刺史諡曰宣侯子僧奴襲爵卒子雙鳳襲雅弟子曇護太和中為中散遷典寺令後慰勞仇池為賊所害贈肆州刺史高閭字閻士漁陽雍奴人五世祖原晉安北軍司上谷太守關中侯有碑在薊中祖雅少有令名州別駕父洪字季願陳留王從事中郎閭貴乃贈寧朔將軍幽州刺史固安貞子閭早孤少好學博綜經史文才儁偉下筆成章本名驢司徒崔浩見而奇之乃改為而字焉真君九年徵拜中書博士和平末遷中書侍郎高宗崩乙渾擅權內外危懼文明太后臨朝誅渾引閭與中書令高允入於禁內參決大政賜爵安樂子加南中郎將與鎮南大將軍尉元南赴徐州閭先入彭城收管籥元表閭以本官領東, WYG: ''}
