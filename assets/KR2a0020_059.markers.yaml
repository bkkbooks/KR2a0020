  - {type: variant, offset: 6288, length: 388, content: 月卒于家世宗遣使弔慰賵帛四百匹四年三月贈鎮北將軍幽州刺史諡曰文侯閭好為文章軍國書檄詔令碑頌銘贊百有餘篇集為三十卷其文亦高允之流後稱二高為當時所服閭強果敢直諫其在私室言裁聞耳及於朝廷廣衆之中則談論鋒起人莫能敵高祖以其文雅之美每優禮之然貪褊矜慢初在中書好詈辱諸博士博士學生百有餘人有所干求者無不受其財貨及老為二州乃更廉儉自謹有良牧之譽有三子長子元昌襲爵位至遼西博陵二郡太守子欽字希叔頗有文學莫折念生之反也欽隨元志西討志敗為賊所擒念生以為黃門郎死於秦州子穆宗襲祖爵興和中定州開府祭酒欽弟石頭小石皆早卒元昌弟定殷中壘將軍漁陽太守卒贈征虜將軍安州刺史子洪景少有名譽早卒次子宣景武定中開府司馬定殷弟幼成員外郎頗有文才性清狂為奴所害閭弟悅篤志好學有美於閭早卒史臣曰游雅才業亦高允之亞歟至於陷族陳奇斯所以絕世而莫祀也高閭發言有章句下筆富文彩亦一代之偉人故能受遇累朝見重高祖挂冠謝事禮備懸輿美矣, WYG: 九考證}
