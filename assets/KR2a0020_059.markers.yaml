  - {type: variant, offset: 573, length: 2, content: 創制, WYG: 于御聽高祖每優假之不以怪問至於陳奏本國事故語及征役則能歛容涕泗悲動左右而天性褊躁喜怒不恒每至威忿楚朴特苦引待南士禮多不足縁此人懐畏避太和初轉内都坐大官及蕭道成殺劉準時遣諸將南伐詔昶曰卿識機體運先覺而來卿宗廟不復血食朕聞斯問矜忿兼懐今遣大將軍率南州甲卒以伐逆豎剋蕩兇醜翦除民害氛穢既清即胙卿江南之土以興蕃業乃以本將軍與諸將同行路經徐州哭拜其母舊堂哀感從者乃遍循故居處處隕涕左右亦莫不辛酸及至軍所將欲臨陳四面拜諸將士自陳家國滅亡蒙朝廷慈覆辭理切至聲氣激揚涕泗横流三軍咸為感歎後昶恐雨水方降表請還師從之又加儀同三司領儀曹尚書於時}
