  - {type: variant, offset: 3434, length: 738, content: 事及其還國果被譖愬以致極刑今為旨書可明牟提忠於其國使蠕蠕主知之是年冬至高祖文明太后大饗羣官高祖親舞於太后前羣臣皆舞高祖乃歌仍率羣臣再拜上壽閭進曰臣聞大夫行孝行合一家諸侯行孝聲著一國天子行孝德被四海今陛下聖性自天敦行孝道稱觴上壽靈應無差臣等不勝慶踊謹上千萬歲壽高祖大悅賜羣臣帛人三十匹又議政於皇信堂高祖曰百揆多途萬機事猥未周之闕卿等宜有所陳閭對曰臣伏思太皇太后十八條之令及仰尋聖朝所行事周於百揆理兼於庶務孔子至聖三年有成子產治鄭歷載乃就今聖化方宣風政驟改行之積久自然致治理之必明不患事闕又為政之道終始若一民可使由之不可使知之政令既宣若有不合於民者因民之心而改之願終成其事使至教必行臣反覆三思理畢於此不知其他但使今之法度必理必明必行必久勝殘去殺可不遠而致高祖曰刑法者王道之所用何者為法何者為刑施行之日何先何後閭對曰臣聞創制立會軌物齊衆謂之法犯違制約致之於憲謂之刑然則法必先施刑必後著自鞭杖已上至於死罪皆謂之刑刑者成也成而不可改高祖曰論語稱冉子退朝孔子問曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之何者是政何者為事閭對曰臣聞政者君上之所施行合於法度經國治民之屬皆謂之政臣下奉教承旨作而行之謂之事然則天下大同風軌齊一則政出於天子王道衰則政出於諸侯君道缺則政出於大夫故詩序曰王道衰政教失則國異政家殊俗政者上之所行事者下之所奉高祖曰若君命為政子夏為莒父宰問政此應奉命而已何得稱政尚書游明根曰子夏宰民故得稱政帝善之十四年秋閭上表曰奉癸未詔書以春夏少雨憂飢饉之方臻愍黎元之傷瘁同禹湯罪己之誠齊堯舜引咎之德虞災致懼詢及卿士令各上書極陳損益深恩被於蒼生厚惠流于后土伏惟陛下天啟聖姿利見纂極欽若昊天光格宇宙太皇太后以叡哲贊世稽合三才高明柔克道被無外七政昭宣於上九功咸序於下君人之量逾高謙光之旨, WYG: ''}
