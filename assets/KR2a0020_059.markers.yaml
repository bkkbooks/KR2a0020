  - {type: variant, offset: 5055, length: 0, content: '', WYG: 考功曹别書於黄紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黄門印署掌在尚書嚴加緘密不得開視考績之日然後對共裁量如此則少存實録薄止姦回其内外考格裁非庸管乞求博議以為畫一若殊謀異䇿事關廢興遐邇所談物無異義者自可臨}
