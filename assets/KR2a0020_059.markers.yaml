  - {type: variant, offset: 5054, length: 0, content: '', WYG: 利之規終慙十一之潤皆虚張無功妄指贏益坐獲數階之官藉成通顯之貴於是巧詐萌生偽辯鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其苦斯但抑之則其流已注引之則有何紀極夫琴瑟在於必和更張求其適調去者既不可追來者猶或宜改按周官太宰之職嵗終則令官府各正所司受其㑹計聽其致事而詔於王三嵗則大計羣吏之治而誅賞之愚謂今可粗依其凖見居官者每嵗終本曹皆明辨在官日月具覈才行能否審其實用而注其上下游辭宕説一無取焉列上尚書覆其合否如有紕謬即正而罰之不得方復推詰委否容其進退既定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞總而奏之經奏之}
