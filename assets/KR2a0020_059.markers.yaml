夤明當拜命其夜慟哭至晨備禮䇿授賜車馬什物給虎賁五百人事從豐厚猶不及劉昶之優隆也又任其募天下壯勇得數千人以文智三人等為積弩將軍文榮等三人為彊弩將軍竝為軍主寶夤雖少羈流而志性雅重過朞猶絶酒肉慘形悴色蔬食麤衣未嘗嬉笑及被命當南伐貴要多相慿託門庭賔客若市書記相尋寶夤接對報復不失其理正始元年三月寶夤行達汝隂東城已䧟遂停壽春之栖賢寺值賊將姜慶真内侵士民響附圍逼壽春遂據外郭寶夤躬貫甲胄率下擊之自四更交戰至明日申時賊旅彌盛寶夤以衆寡無援退入金城又出相國東門率衆力戰始破走之當寶夤壽春之戰勇冠諸軍聞見者莫不壯之七月還京師改封梁郡開國公食邑八百戸及中山王英南伐寶夤又表求征乃為使持節鎭東將軍别將以繼英配羽林虎賁五百人與英頻破衍軍乘勝遂}
  - {type: variant, offset: 4972, length: 0, content: '', WYG: 淮水汛溢寶夤與英狼狽引退士卒死没者十四五有司奏寶夤守東橋不固軍敗由之處以極法詔曰寶夤因難投誠宜加矜貸可恕死免官削爵還第尋尚南陽長公主賜帛一千匹并給禮具公主有婦徳事寶夤盡肅雍之禮雖好合積年而敬事不替寶夤每入室公主必立以待之相遇如賔自非太妃疾篤}
