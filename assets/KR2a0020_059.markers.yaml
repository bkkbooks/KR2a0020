  - {type: variant, offset: 572, length: 0, content: '', WYG: 植根南偽託體不殊秉旄作牧職班台位天厭子業夷戮同體背本歸朝事捨簪笏臣弟彧廢姪自立彰于遐邇孔懐之義難奪為臣之典靡經棠棣之詠可修越敬之事未允臣若改書事為二敬猶修往文彼所不納伏願聖慈停臣今答朝廷從之拜外都坐大官公主復薨更尚平陽長公主昶好犬馬愛武事入國歴紀猶布衣皂冠同凶素之服然訶詈童僕音雜夷夏雖在公坐諸王每侮弄之或戾手齧臂至於痛傷笑呼之聲}
