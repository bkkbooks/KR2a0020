  - {type: variant, offset: 4173, length: 727, content: 篤修復祭儀宗廟所以致敬飾正器服禮樂所以宣和增儒官以重文德簡勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦宄置鄰黨以穆之究庶官之勤劇班俸祿以優之知勞逸之難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絕讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降鑒在下休咎之徵咸由人召故帝道昌則九疇君德衰而彝倫斁休瑞並應享以五福則康于其邦咎徵屢臻罰以六極則害于其國斯乃洪範之實徵神祇之明驗及其厄運所纏世鍾陽九數乖於天理事違於人謀時則有之矣故堯湯逢歷年之災周漢遭水旱之患然立功修行終能弭息今考治則有如此之風計運未有如彼之害而陛下殷勤引過事邁前王徙星澍雨之徵指辰可必消災滅禍之符灼然自見雖王畿之內頗為少雨關外諸方禾稼仍茂苟動之以禮綏之以和一歲不收未為大損但豫備不虞古之善政安不忘危有國常典竊以北鎮新徙家業未就思親戀本人有愁心一朝有事難以禦敵可寬其往來頗使欣慰開雲中馬城之食以賑恤之足以感德致力邊境矣明察畿甸之民飢甚者出靈丘下館之粟以救其乏可以安慰孤貧樂業保土使幽定安并四州之租隨運以溢其處開關薥禁薄賦賤糴以消其費清道路恣其東西隨豐遂食貧富相贍可以免度凶年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄凶儉之年民輕違犯可緩其使役急其禁令宜於未然之前申敕外牧又一夫幽枉王道為虧京師之獄或恐未盡可集見囚於都曹使明折庶獄者重加究察輕者即可決遣重者定狀以聞罷非急之作放無用之獸此乃救凶之常法且以見憂於百姓論語曰不患貧而患不安苟安而樂生雖遭凶年何傷於民庶也愚臣所見如此而已詔曰省表聞之當敕有司依此施行後詔閭與太常採雅樂以營金石又領廣陵王師出除鎮南將軍相州刺史以參定律令之勤賜布帛千匹粟一千斛牛馬各三閭上疏陳伐吳之策高祖納之遷都洛陽閭表諫言遷有十損必不獲已請遷於鄴高祖頗嫌之, WYG: 崇}
