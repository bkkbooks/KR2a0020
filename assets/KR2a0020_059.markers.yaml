  - {type: variant, offset: 605, length: 387, content: 而致治用能憲章萬祀垂範百王歷葉所以挹其遺風後君所以酌其軌度伏惟太上皇帝道光二儀明齊日月至德潛通武功四暢霜威南被則淮徐來同齊斧北斷則獫狁覆斃西摧三危之酋東引肅慎之貢荒遐款塞九有宅心於是從容閑覽希心玄奧尚鼎湖之奇風崇巢由之高潔疇咨熙載亮采羣后爰挹大位傳祚聖人開古之高範爰萃於一朝曠葉之希事載見於今日昔唐堯禪舜前典大其成功太伯讓季孔子稱其至德苟位以聖傳臣子一也謹上至德頌一篇其詞曰茫茫太極悠悠遐古三皇創制五帝垂祜仰察璿璣俯鑒后土雍容端拱惟德是與夏殷世傳周漢纂烈道風雖邈仍誕明哲爰暨三季下凌上替九服三分禮樂四缺上靈降鑒思皇反正乃眷有魏配天承命功冠前王德侔往聖移風革俗天保載定於穆太皇克廣聖度玄化外暢惠鑒內悟遺此崇高挹彼沖素道映當今慶流後祚明明我皇承乾紹煥比誦熙周方文隆漢重光麗天晨暉疊旦六府孔修三辰貞觀功均乾造雲覆雨潤養之以仁敦之以信綏之斯和動之斯震自東徂西無思不順禎候並應福祿來格, WYG: 實忻}
