  - {type: variant, offset: 5052, length: 0, content: '', WYG: 所以不復文移北土卿幼有倜儻之心早懐縱横之氣往日卿於石頭舉事雖不克㨗亦丈夫也今止河洛眞其時矣雖然為卿計者莫若行率此衆襲據彭城别當遣}
