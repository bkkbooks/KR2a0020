  - {type: variant, offset: 4969, length: 0, content: '', WYG: 親錢之命百寮賦詩贈昶又以其文集一部賜昶高祖因以所製文筆示之謂昶曰時契勝殘事鍾文業雖則不學欲罷不能脱思一見故以相示雖無足味聊復為笑耳其重昶如是自昶之背彭城至是久矣其昔齋宇山池竝尚存立昶更修繕還處其中不能綏邊懷物撫接義故而閨門喧猥内外姦雜前民舊吏莫不慨歎焉豫營墓於彭城西南與三公主同塋而異穴發石累之墳崩壓殺十餘人後復移改為公私費害高祖南討昶候駕於行宫高祖遣侍中迎勞之昶討蕭昭業司州雖屢破賊軍而義陽拒守不剋昶乃班師十九年高祖在彭城昶至入見昶曰臣奉敕專征尅殄兇醜徒勞士馬久淹嵗時有損威靈伏聽斧鉞高祖曰朕之此行本無攻守之意正欲伐罪弔民宣威布徳二事既暢不失本圖朕亦無剋而還豈但卿也十月昶朝于京師高祖臨光極堂大選髙祖曰朝因月旦欲評魏典夫典者為國大綱治民之柄君能好典則國治不能則國亂我國家昔在􅁪代随時制作非通世之長典故自夏及秋親議條制或言唯能是寄不必拘門朕以為不爾何者當今之世仰祖質朴清濁同流混齊一等君子小人名品無别此殊為不可我今八族以上士人品第有九九品之外小人之官復有七等若茍有其人可起家為三公正恐賢才難得不可止為一人渾我典制故令班鏡九流清一朝軌使千載之後我得髣像唐虞卿等依俙元凱昶對曰陛下光宅中區惟新朝典刋正九流為不朽之法豈唯髣像唐虞固以有高三代高祖曰國家本來有一事可慨可慨者何恒無公言得失今卿等各盡其心人君患不能納羣下之諫為臣患不能盡忠於主朕今舉一人如有不可卿等盡言其失若有才能而朕所不識者宜各舉所知朕當虛已延納若能如此能舉則受賞不言則有罪及論大將軍高祖曰劉昶即其人也後給班劒二十人二十一年四月薨於彭城年六十二高祖為之舉哀給溫明祕器錢百萬布五百匹蠟三百斤朝服一具衣一襲贈假黄鉞太傅領揚州刺史加以殊禮備九錫給前後部羽葆鼔吹依晉琅邪武王伷故事諡曰明昶適子承緒主所生也少而尫疾尚高祖妹彭城長公主為駙馬都尉先昶卒贈員外常侍長子文遠次輝字重昌竝皆疎狂昶深慮不能守其爵封然輝猶小未多罪過乃以為世子襲封正始初尚蘭陵長公主世宗第二姊也拜員外常侍公主頗嚴妬輝嘗私幸主侍婢有身主笞殺之剖其孕子節解以草裝實婢腹祼以示輝輝遂忿憾疎薄公主公主姊因入聽講言其故於靈太后太后敕清河王懌窮其事懌與高陽王雍廣平王懷奏其不和之狀無可為夫婦之理請離婚削除封位太后從之公主在宫周嵗高陽王及劉騰等皆為言於太后太后慮其不改未許之雍等屢請不已聽復舊義太后流涕送公主誡令謹護正光初輝又私婬張陳二氏女公主更不檢惡主姑陳留公主共相扇奨遂與輝復致忿爭輝推主墮床手脚毆蹈主遂傷胎輝懼罪逃逸靈太后召清河王懌決其事二家女髠笞付宫兄弟皆坐鞭刑徙配敦煌為兵公主因傷致薨太后親臨慟哭舉哀太極東堂出葬城西太后親送數里盡哀而還謂侍中崔光曰向哭所以過哀者追念公主為輝頓辱非一乃不關言能為隠忍古今寧有此此所以痛之後執輝於河内之溫縣幽于司州將加死刑會赦得免三年復其官爵遷征虜將軍中散大夫四年輝卒家遂衰頓無復可紀文遠歴歩兵校尉前將軍景明初為統軍在壽春坐謀殺刺史王肅以壽春叛事發伏法有通直郎劉武英者太和十九年從淮南内附自云劉裕弟長沙景王道憐之曽孫賜爵建寧子司徒外兵參軍稍轉歩兵校尉游擊將軍卒于河内太守而昶不以為族親也蕭寶夤字智亮蕭鸞第六子寶卷母弟也鸞之竊位封寶夤建安王寶卷立以為車騎將軍開府領石頭戍軍事寶卷惛狂其直後劉靈運等謀奉寶夤密遣報寶夤寶夤許之遂迎寶夤率石頭文武向其臺城稱警蹕百姓隨從者數百人㑹日暮城門閉乃燒三尚及建業城城上射殺數人衆乃奔散寶夤棄車歩走部尉執送之自列為人所逼寶卷亦不罪責也寶卷弟寶融僭立以寶夤為衛將軍南徐州刺史改封鄱陽王蕭衍既克建業殺其兄弟將害寶夤以兵守之未至嚴急其家閹人顔文智與左右麻拱黄神密計穿墻夜出寶夤具小船於江岸脱本衣服著烏布􅃭腰繫千許錢潛赴江畔躡屩徒歩脚無全皮防守者至明追之寶夤假為釣者隨流上下十餘里追者不疑待散乃度西岸遂委命投華文榮文榮與其從子天龍惠連等三人棄家將寶夤遁匿山澗賃驢乘之晝伏宵行景明二年至壽春之東城戍戍主杜元倫推檢知實蕭氏子也以禮延待馳告揚州刺史任城王澄澄以車馬侍衛迎之時年十六徒歩憔悴見者以為掠賣生口也澄待以客禮乃請喪居斬衰之服澄遣人曉示情禮以喪兄之制給其齊衰寶夤從命澄率官寮赴弔寶夤居處有禮不飲酒食肉輟笑簡言一同極哀之節壽春多其故義皆受慰唁唯不見夏侯一族以夏侯同蕭衍故也改日造澄澄深器重之景明三年閏四月詔曰蕭寶夤深識機運歸誠有道冒嶮履屯投命絳闕微子陳韓亦曷以過也可遣羽林監領主書劉桃符詣彼迎接其資生所湏之物及衣冠車馬在京邸館付尚書悉令預備及至京師世宗禮之甚重伏訴闕下請兵南伐雖遇暴風大雨終不暫移是年冬蕭衍江州刺史陳伯之與其長史褚胄等自壽春歸降請軍立効世宗以寶夤誠懇及伯之所陳時不可失四年二月乃引八座門下入議部分之方四月除使持節都督東揚南徐兖三州諸軍事鎮東將軍揚州刺史丹陽郡開國公齊王配兵一萬令且據東城待秋冬大舉寶夤明當拜命其夜慟哭至晨備禮䇿授賜車馬什物給虎賁五百人事從豐厚猶不及劉昶之優隆也又任其募天下壯勇得數千人以文智三人等為積弩將軍文榮等三人為彊弩將軍竝為軍主寶夤雖少羈流而志性雅重過朞猶絶酒肉慘形悴色蔬食麤衣未嘗嬉笑及被命當南伐貴要多相慿託門庭賔客若市書記相尋寶夤接對報復不失其理正始元年三月寶夤行達汝隂東城已䧟遂停壽春之栖賢寺值賊將姜慶真内侵士民響附圍逼壽春遂據外郭寶夤躬貫甲胄率下擊之自四更交戰至明日申時賊旅彌盛寶夤以衆寡無援退入金城又出相國東門率衆力戰始破走之當寶夤壽春之戰勇冠諸軍聞見者莫不壯之七月還京師改封梁郡開國公食邑八百戸及中山王英南伐寶夤又表求征乃為使持節鎭東將軍别將以繼英配羽林虎賁五百人與英頻破衍軍乘勝遂}
