  - {type: variant, offset: 5077, length: 1, content: 寡, WYG: 而揚州刺史長孫稚大破邃軍斬鴻賊遂奔退初秦州城人薛珍劉慶杜遷等反執刺史李彦推莫折大提為首自稱秦王大提尋死其第四子念生竊號天子改年曰天建置立官寮以息阿胡為太子其兄阿倪為西河王弟天生為髙陽王伯珍為}
