  - {type: variant, offset: 5758, length: 181, content: 見封禪今雖江介不賓小賊未殄然中州之地略亦盡平豈可於聖明之辰而闕盛禮齊桓公霸諸侯猶欲封禪而況萬乘高祖曰由此桓公屈於管仲荊揚未一豈得如卿言也閭曰漢之名臣皆不以江南為中國且三代之境亦不能遠高祖曰淮海惟揚州荊及衡陽惟荊州此非近中國乎及車駕至鄴高祖頻幸其州館詔曰閭昔在中禁有定禮正樂之勳作藩於州有廉清公幹之美自大軍停軫庶事咸豐可謂國之老成善始令終者也每惟厥德朕甚嘉焉可賜帛, WYG: 敢怠墮注墮同惰魏書卷}
