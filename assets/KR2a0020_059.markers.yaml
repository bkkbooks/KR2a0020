  - {type: variant, offset: 5940, length: 347, content: 百匹粟一千斛馬一匹衣一襲以褒厥勤閭每請本州以自効詔曰閭以懸車之年方求衣錦知進忘退有塵謙德可降號平北將軍朝之老成宜遂情願徙授幽州刺史令存勸兩修恩法並舉閭以諸州罷從事依府置參軍於治體不便表宜復舊高祖不悅歲餘表求致仕優答不許徵為太常卿頻表陳遜不聽又車駕南討漢陽閭上表諫求回師高祖不納漢陽平賜閭璽書閭上表陳謝世宗踐阼閭累表遜位詔曰閭貞幹早聞儒雅素著出內清華朝之儁老以年及致仕固求辭任宜聽解宗伯遂安車之禮特加優授崇老成之秩可光祿大夫金印紫綬使散騎常侍兼吏部尚書邢巒就家拜授及辭引見於東堂賜以餚羞訪之大政以其先朝儒舊告老永歸世宗為之流涕詔曰閭歷官六朝著勳五紀年禮致辭義光進退歸軒首路感悵兼懷安駟籝金漢世榮貺可賜安車几杖輿馬繒綵衣服布帛事從豐厚百僚餞之猶昔羣公之祖二疏也閭進陟北邙上望闕表以示戀慕之誠景明三年, WYG: ''}
