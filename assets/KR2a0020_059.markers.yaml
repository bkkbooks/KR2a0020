  - {type: variant, offset: 5084, length: 0, content: '', WYG: 餞之寳夤與大都督崔延伯擊天生大破之斬獲十餘萬追奔至于小隴軍人採掠遂致稽留不速追討隴路復塞仍進討高平賊帥万俟醜奴於安定更有負㨗時有天水人吕伯度兄弟始共念生同逆後與兄衆保於顯親聚衆討念生戰敗降於胡琛琛以伯度為大都督秦王資其士馬還征秦州大敗念生將杜粲於成紀又破其金城王莫折普賢於永洛城遂至顯親念生率衆身自拒戰又大奔敗伯度乃背胡琛襲琛將劉㧞破走之遣其兄子忻和率騎東引國軍念生事廹乃詐降於寳夤朝廷喜伯度立義之功授撫軍將軍涇州刺史平秦郡開國公食邑三千户而大都督元修義高聿停軍隴口久不西進念生復反伯度終為醜奴所殺故賊勢更甚寳夤不能制孝昌二年四月除寳夤侍中驃騎大將軍儀同三司假大將軍尚書令給後部鼓吹増封千户寳夤初自黒水終至平涼與賊相對數年攻擊賊亦憚之關中保全寳夤之力矣三年正月除司空公出師既久兵將疲敝是月大敗還雍州仍停長安收聚離散有司處寳夤死罪詔恕為民四月除使持節都督雍涇岐南豳四州諸軍事征西將軍雍州刺史假車騎大將軍開府西討大都督自關以西皆受節度九月念生為其常山王杜粲所殺合門皆盡粲據州請降於寳夤十月除散騎常侍車騎將軍尚書令復其舊封是時山東關西宼賊充斥王師履北人情沮喪寳夤自以出軍累年糜費尤廣一旦覆敗慮見猜責内不自安朝廷頗亦疑阻乃遣御史中尉酈道元為關中大使寳夤謂密欲取已彌以憂懼而長安輕薄之徒因相説動道元行達隂盤驛寳夤密遣其將郭子恢等攻而殺之詐収道元尸表言白賊所害又殺都督南平王仲冏是月遂反僭舉大號赦其部内稱隆緒元年立百官乃遣郭子恢東㓂潼關行臺張始榮圍華州刺史崔襲詔尚書僕射行臺長孫稚討之時北地人毛鴻賔與其兄遐糾率鄉義將討寳夤寳夤遣其大將軍盧祖遷等擊遐為遐所殺又遣其將侯終徳徃攻遐㑹子恢為官軍所敗長孫稚又遣子子彦破始榮於華州終徳因此勢挫還圖寳夤軍至白門寳夤始覺與終徳交戰戰敗攜公主及其少子與部下百餘騎從後門出走渡渭橋投於寜夷巴張宕昌劉興周舍尋奔醜奴醜奴以寳夤為太傅永安三年都督尒朱天光遣賀拔岳等破醜奴於安定追擒醜奴寳夤}
