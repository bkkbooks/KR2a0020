  - {type: variant, offset: 5085, length: 0, content: '', WYG: 送京師詔置閶闔門外都街之中京師士女聚共觀視凡經三日吏部尚書李神儶黄門侍郎高道穆並與寳夤素舊二人相與左右言於莊帝云其逆迹事在前朝冀得赦免㑹應詔王道習時自外至莊帝問道習在外所聞道習曰唯聞陛下欲不殺蕭寳夤帝問其故道習曰人云李尚書高黄門與寳夤周款並居得言之地必能全之道習因曰若謂寳夤逆在前朝便將恕之寳夤敗於長安走為醜奴太傅豈非陛下御厯之日賊臣不翦法欲安施帝然其言乃於太僕駞牛署賜死寳夤之將死神儁攜酒就之以叙舊故因對之下泣而寳夤夷然自持了不憂懼唯}
