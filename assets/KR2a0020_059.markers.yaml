  - {type: variant, offset: 993, length: 863, content: 穀秀町素文表石玄鳥呈皓醴泉流液黃龍蜿蜿遊鱗奕奕沖訓既布率土咸寧穆穆四門灼灼典刑勝殘豈遠期月有成翹翹東岳庶見翠旌先民有言千載一泰昔難其運今易其會沐浴淳澤被服冠帶飲和陶潤載欣載賴文以寫意功由頌宣吉甫作歌式昭永年唐政緝熙康哉垂篇仰述徽烈被之管絃高允以閭文章富逸舉以自代遂為顯祖所知數見引接參論政治命造鹿苑頌北伐碑顯祖善之承明初為中書令加給事中委以機密文明太后甚重閭詔令書檄碑銘贊頌皆其文也太和三年出師討淮北閭表曰伏見廟算有事淮海雖成事不說猶可思量臣以愚劣本非武用至於軍旅尤所不學直以無諱之朝敢肆狂瞽區區短見竊有所疑臣聞兵者凶器不得已而用之今天下開泰四方無虞豈宜盛世干戈妄動疑一也淮北之城凡有五處難易相兼皆須攻擊然攻守難圖力懸百倍反覆思量未見其利疑二也縱使如心於國無用發兵遠入費損轉多若不置城是謂空爭疑三也脫不如意當延日月屯衆聚費于何不有疑四也伏願思此四疑時速返旆文明太后令曰六軍電發有若摧朽何慮四難也遷尚書中書監淮南王他奏求依舊斷祿文明太后令召羣臣議之閭表曰天生烝民樹之以君明君不能獨理必須臣以作輔君使臣以禮臣事君以忠故車服有等差爵命有分秩德高者則位尊任廣者則祿重下者祿足以代耕上者俸足以行義庶民均其賦以展奉上之心君王聚其材以供事業之用君班其俸垂惠則厚臣受其祿感恩則深於是貪殘之心止竭効之誠篤兆庶無侵削之煩百辟備禮容之美斯則經世之明典為治之至術自堯舜以來逮于三季雖優劣不同而斯道弗改自中原崩否天下幅裂海內未一民戶耗減國用不充俸祿遂廢此則事出臨時之宜良非長久之道大魏應期紹祚照臨萬方九服既和八表咸謐二聖欽明文思道冠百代動遵禮式稽考舊章準百王不易之勝法述前聖利世之高軌置立鄰黨班宣俸祿事設令行於今已久苛慝不生上下無怨姦巧革慮闚覦絕心利潤之厚同於天地以斯觀之如何可改又洪波奔激則隄防宜厚姦悖充斥則禁網須嚴且飢寒切身慈母不保其子家給人足禮讓可得而生但廉清之人不必皆富豐財之士未必悉賢今給其俸則清者足以息其濫竊貪者足以感而勸善若不班祿則貪者肆其姦情清者不能自保難易之驗灼然可知如何一朝便欲去俸淮南之議不亦謬乎詔從閭議高祖又引見王公已下於皇信堂, WYG: 遇}
