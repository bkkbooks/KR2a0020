  - {type: variant, offset: 5089, length: 2, content: 留戍, WYG: 奔白鹿山至河橋為北中所執朝議明其不相干預仍蒙慰勉建義初隨尒朱榮赴晉陽莊帝徴贊還洛轉司徒遷太尉尚帝姊壽陽長公主出為都督齊濟西兖三州諸軍事驃騎大將軍開府儀同三司齊州刺史寳夤見擒贊拜表請寳夤命尒朱兆入洛為城民趙洛周所逐公主被録還京尒朱世隆欲相陵逼公主守操被害贊既棄州為沙門潛詣長白山未幾趣白鹿山至陽平遇病而卒時年三十一贊機辯文義頗有可觀而輕薄俶儻猶有父之風尚普泰末敕迎其喪至洛遣黄門郎鹿悆護喪事以王禮與公主合葬嵩山至元象初吳人盜其喪還江東蕭衍猶以為子祔葬蕭氏墓焉贊江南有子在國無後蕭正表字公儀蕭衍弟臨川王宣達子也正表長七尺九寸眉目踈朗雖質貌豐美而性理短闇衍以為封山縣開國侯拜給事中歴東宫洗馬}
