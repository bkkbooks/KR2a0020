  - {type: variant, offset: 4976, length: 0, content: '', WYG: 東堂餞之詔曰蕭衍送死連兵再離寒暑􅀸忠規内挺孝誠外亮必欲鞭尸吳墓戮衍江隂故授卿以總統之任仗卿以克㨗之規宜其勉歟寶夤對曰讎恥未復枕戈俟旦雖無申包之志敢忘伍胥之心今仰仗神謀俯厲將帥誓必拉彼姦勍以清王略聖澤下臨不勝悲荷因泣涕横流哽咽良久於後盧昶軍敗唯寶夤師全而歸延昌初除安東將軍瀛州刺史復其齊王四年遷撫軍將軍冀州刺史及大乘賊起寶夤遣軍討之頻為賊破臺軍至乃滅之靈太后臨朝還京師蕭衍遣其將康絢於浮山堰淮以灌揚徐除寶夤使持節都督東討諸軍事鎮東將軍以討之尋復封梁郡開國公寄食濟州之濮陽熙平初賊堰既成淮水濫溢將為揚徐之患寶夤於堰上流更鑿新渠引注淮澤水乃小減乃遣輕車將軍劉智文虎威將軍劉延宗率壯士千餘夜渡淮燒其竹木營聚破賊三壘殺獲數千人斬其直閤將軍王升明而還火數日不滅衍將垣孟孫張僧副等水軍三千渡淮北攻統軍吕叵寶夤遣府司馬元達統軍魏續年等赴擊破之孟孫等奔退乃授左光禄大夫殿中尚書寶夤又遣軍王周恭叔率壯士數百夜渡}
