  - {type: variant, offset: 5075, length: 0, content: '', WYG: 先王教之盛典三千之條莫大於不孝毁則藏姦常刑靡赦所以晉恭獲謗無所逃死衞伋受誣二子繼沒親命匪棄國孰無父况今封豕尚存長虵未滅偷生江表自安毒酖而正徳居猶子之親竊通侯之貴父榮於國子爵於家履霜弗聞去就先結隔絶山淮溫凊永盡定省長違報復何日以此為心心可知矣皇朝綿基累葉恩均四海自北徂南要荒仰澤能言革化無思不韙賁玉帛於邱園標忠孝以納賞築藁街于伊洛集華裔其歸心被髮鐻身之酋屈膝而請吏交趾文身之渠款關而効質至如正徳宜甄義以致貶昔越栖㑹稽賴宰嚭以獲立漢困彭宋實丁公而獲免吳項已平二臣即法豈不録其情哉欲明責以示後况遺君忽父狼子是心既不親親安能親人中間變詐或有萬等伏惟陛下聖敬自天欽光纂厯昭徳塞違以臨羣后脱包此凶醜寘之列位百官是象其何誅焉臣釁結禍深痛纒肝髓日暮途遥復報無日豈區區於一豎哉但才雖庸近職居獻替愚𠂻寸抱敢不申陳伏願聖慈少垂察覽訪議槐棘論其是非使秋霜春露施之有在相鼠攸刺遄死有歸無令申伋受笑於茍存曽閔淪名於盛世正徳既至京師朝廷待之尤薄嵗餘還叛五年蕭衍遣其將裴邃虞鴻等}
  - {type: page-break, offset: 5075, content: '', id: KR2a0020_WYG_059-19b, image: WYG0261/WYG0261-0810d.png}
