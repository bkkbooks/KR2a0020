  - {type: variant, offset: 5052, length: 0, content: '', krp: 所以不復文移北土卿幼有倜儻之心早懐縱横之氣往日卿於石頭舉事雖不克㨗亦丈夫也今止河洛眞其時矣雖然為卿計者莫若行率此衆襲據彭城别當遣}
  - {type: variant, offset: 5053, length: 0, content: '', WYG: 以相影援得㨗之後便遣卿兄子屏侍送卿國廟并卿室家及諸姪從若方欲還北更設竒計恐機事一差難重復集勿為韓信受困野鷄寶夤表送其書陳其忿毒之意朝廷為之報答寶夤志存雪復屢請居邊神龜中出為都督徐南兖二州諸軍事車騎將軍徐州刺史乃起學館於清東朔望引見土姓子弟接以恩顔與論經義勤於政治吏民愛之凡在三州皆著名稱正光二年徴為車騎大將軍尚書左僕射善於吏職甚有聲名四年上表曰臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可知矣大較在于官人用才審於所蒞練迹校名驗於虛實豈不以臧否得之餘論優劣著於歴試者乎既聲窮於月旦品定於黄紙用效於名軰事彰於臺閤則賞罰之途差有商凖用捨之宜非無依據雖復勇進忘退之儔奔競於市里過分亡涯之請馳騖於多門猶且顧其聲第慎其與奪器分定於下爵位懸於上不可妄叨故也今竊見考功之典所懐未喻敢竭無隠試陳萬一何者竊惟文武之名在人之極地徳行之稱為生之最首忠貞之美立朝之譽仁義之號處身之端自非職惟九官任當四岳授曰爾諧讓稱俞往將何以克厭大名允兹令問自比已來官罔高卑人無貴賤皆餙辭假説用相褒舉涇渭同波薰蕕共器求者不能量其多少與者不復覈其是非遂使冠履相貿名與實爽謂之考功事同汎渉紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身亡廢絶或具寮離索或同事凋零雖當時文簿記其殿最日久月深駮落都盡人有去留誰復掌其勤墮或停休積稔或分隔數千累年之後方求追訪聲迹立其考第無不茍相悦附共為脣齒餙垢掩疵妄加丹素趣令得階而已無所顧惜賢達君子未免斯患中庸已降夫復何論官以求成身以請立上下相蒙莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程既而限滿代還復經六年而叙是則嵗周十二始得一階於東西兩省文武閒職公府散佐無事冗官或數旬方應一直或朔望止於蹔朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虚名而升陟之方甚易何内外之相懸令厚薄之如是又聞之聖人大寳曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古之人修其天爵而人爵從之故雖文質異時汚隆殊世莫不寳兹名器不以假人是以賞罰之柄恒自持也至乃周之藹藹五叔無官漢之察察館陶徒請豈不重骨肉私親親誠以賞罰一差則無以懲勸至公暫替則覬覦相欺故至慎至惜殷勤若此况乎親非肺腑才乖秀逸或充單介之使始無汗馬之勞或説}
