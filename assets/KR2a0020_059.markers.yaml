  - {type: variant, offset: 5087, length: 1, content: 承, WYG: 法次子權與少子凱射戲凱矢激中之而死凱仕至司徒左長史凱妻長孫稚女也輕薄無禮公主數加罪責凱竊銜恨妻復惑説之天平中凱遂遣奴害公主乃轘凱於東市妻梟首家遂殄滅寳夤兄寳卷子贊字徳文本名綜入國寳夤改焉初蕭衍滅寳卷寳卷宫人吳氏始孕匿而不言衍乃納之生贊以為已子封豫章王及長學渉有才思其母告之以實贊晝則談謔如常夜則銜悲泣涕結客待士恒有來奔之志為衍諸子深所猜疾而衍甚愛寵之有濟隂芮文寵安定梁話贊曲加禮接乃割血自誓布以腹心寵話等既感其情義敬相然諾値元法僧以彭城叛入蕭衍衍命贊為南兖徐二州刺史都督江北諸軍事鎮彭城於時肅宗遣安豐王延明臨淮王彧討之贊便遣使密告誠款與寵話夜出歩投彧軍孝昌元年秋届于洛陽陛見之後就館舉哀追服三載寳夤于時在關西遣使觀察聞其形貌歛眉悲感朝廷賞賜豐渥禮遇隆厚授司空封高平郡開國公丹陽王食邑七千户及寳夤反贊惶怖}
