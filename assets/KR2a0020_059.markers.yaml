  - {type: variant, offset: 4978, length: 2, content: 修故, WYG: 焚賊徐州刺史張豹子等十一營賊衆驚擾自殺害者甚衆寶夤還京師又除使持節散騎常侍都督荆闕東洛三州諸軍事衛將軍荆州刺史不行復為殿中尚書寳夤之在淮堰蕭衍手書與寳夤曰謝齊建安王寳夤亡兄長沙宣武王昔投漢中値北宼華陽地絶一隅内無素畜外絶繼援守危疏勒計踰田單卒能全土破敵以弱為彊使至之日君臣動色左右相賀齊明帝每念此功未嘗不輟箸咨嗟及至張永崔慧景事大將覆軍於外小將懐貳於内事危累卵勢過綴旒亡兄忠勇奮發旋師大峴重圍累日一鼓魚潰克定慧景功踰桓文亡弟衛尉兄弟戮力盡心内外大勲不報翻罹荼酷百口幽執禍害相尋朕於齊明帝外有龕敵之力内盡帷幄之誠日自三省曽無寸咎遠身邊外亦復不免遂遣劉山陽輕舟西上來見掩襲時危事廹勢不得已所以誓衆樊鄧㑹踰孟津本欲翦除梅蟲兒茹法珍等以雪冤酷拔濟親屬反身素里屬張稷王珍國已建大事寶晊子晉屢動危機廹樂推之心應上天之命事不獲已豈其始願所以自有天下絶棄房室斷除滋味正欲使四海見其夲心耳勿謂今日之位是為可重朕之視此曽不如一芥雖復崆峒之蹤難追汾陽之志何遠而今立此堰卿當未達本意朕於昆蟲猶不欲殺亦何急爭無用之地戰蒼生之命也正為李繼伯在壽陽侵犯邊境嵗月滋甚或攻小}
