  - {type: variant, offset: 2305, length: 3, content: 英攻義, WYG: 寶弟虎皮有才器本縣令虎皮弟臻字仙勝年十二遭父憂居喪以孝稱輕財好士顯祖末為中川太守時馮熙為洛州刺史政號貪虐仙勝㣲能附之甚得其意轉𢎞農太守後以母老屢求解任久乃從之高祖初母憂未闋以恒農大盜張煩等賊害良善徵為都將與荆州刺史公孫初頭等追揃之拜振武將軍北}
