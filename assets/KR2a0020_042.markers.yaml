  - {type: variant, offset: 2339, length: 4, content: 馬仙琕左, WYG: 代下之後蠻民以刺史酈道元峻刻請治為刺史朝議以邉民宜悦乃以治代道元進號征虜將軍坐遣戍兵送道元免官治兄弟竝孝友敦穆白首同居父亡雖久而猶於平生所處堂宇備設幃帳几杖以時節開堂列拜垂淚陳薦若宗廟然吉凶之事必先啓告逺出行反亦如之治世宗末遷前將軍河州刺史在任數年遇郤鐡忽反又為城民詣都列其貪狀十六條會赦免久之兼廷尉卿又兼尚書畏避勢家承顔候色不能有所執據尋遷金紫光祿大夫是時蠻反於三鵶治為都督追討戰沒贈持節都督雍華岐三州諸軍事衛大將軍七兵尚書雍州刺史昌平男治弟彌兼尚書郎為城陽王徽所親待永安末徽避尒朱兆脱身南走歸命於彌彌不納遣人加害時論深責之後沒關西治長子朏之字長明自直後奉朝請再遷鎮逺將軍諫議大夫仍直後建義中出除冠}
