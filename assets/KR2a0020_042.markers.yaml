  - {type: variant, offset: 2545, length: 5, content: 悅暴罹橫酷, WYG: 師次無鹽劉彧戍主申纂憑城拒守識者僉以攻具未周不宜便進範曰今輕軍逺襲深入敵境無宜淹留久稽機候且纂必以我軍來速不去攻守謂方城可憑弱卒可恃此天亡之時也今若外濳威形内整戎旅密厲將士出其非意可一攻而剋之白曜曰一日縱敵數世之患今若舒遲民心固矣司馬之䇿是也遂濳軍偽退示以不攻纂果不設備於是即夜部分旦便騰城崇朝而剋白曜將盡以其人為軍實範曰齊四履之地世號東秦不逺為經略恐未可定也今皇威始被民未霑澤連城有懷貳之將此邑有拒守之夫宜先信義示之軌物然後民心可懷二州可定白曜曰此良䇿也乃免之進次肥城白曜將攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且見無鹽之卒死者塗炭成敗之機足為鑒矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰白曜目範於衆曰此行也得卿三齊不足定矣軍達升城劉彧太原太守房崇吉棄母妻東走彧青州刺史沈文秀遣其寧朔將軍張元孫奉牋歸欵請軍接援白曜將遣偏師赴之範曰桑梓之戀有懷同徳文秀家在江南青土無墳栢之累擁衆數萬勁甲堅城彊則拒戰勢屈則走師未逼之朝夕無患竟何所畏己求援軍且觀其使詞煩而顔愧視下而志怯幣厚言甘誘我也若不逺圖懼虧軍勢既進無所取退逼彊敵羝羊觸藩羸角之謂未若先守歴城平盤陽下梁鄒剋樂陵然後方軌連鑣揚旌直進何患不壺漿路左以迎明公者哉白曜曰卿前後納䇿皆不失衷今日之算吾所不取何者道固孤城裁能自守盤陽諸戍勢不野戰文秀必剋殄意在先誠天與不取後悔何及範曰短見猶謂不虚歴城足食足兵非一朝可㧞文秀既據東陽為諸城根本多遣軍則歴城之固不立少遣衆則無以懼敵心脱文秀還叛閉門拒守偏師在前為其所挫梁鄒諸城追擊其後文秀}
