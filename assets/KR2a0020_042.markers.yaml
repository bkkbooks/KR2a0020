  - {type: variant, offset: 2624, length: 5, content: 賜帛三百匹, WYG: 假范陽公範前解州還京也夜夢隂毛拂踝他日説之時齊人有占夢者曰史武進云豪盛於齊下矣使君臨撫東泰道光海岱必當重牧全齊再祿營邱矣範笑而荅曰吾將為卿必驗此夢果如其言是時鎮將元伊利表範與外賊交通高祖詔範曰卿身非功舊位無重班所以超遷顯爵任居方夏者正以勤能致逺雖外無殊效亦未有負時之愆而將鎮伊利妄生姦撓表卿造船市玉與外賊交通規䧟卿罪窺覦州任有司推驗虚實自顯有罪者今伏其辜矣卿其明為算略勿復懷疑待卿别犯處刑及鞭今怒刑罷鞭止罰五十卿宜克循綏輯邊服稱朕意也還朝年六十二卒於京師}
