  - {type: variant, offset: 680, length: 983, content: 十七送父喪還丹楊值劉裕誅夷司馬戚屬叔父宣期兄貞之並為所殺楚之乃亡匿諸沙門中濟江自歷陽西入義陽竟陵蠻中及從祖荊州刺史休之為裕所敗乃亡於汝潁之間楚之少有英氣能折節待士與司馬順明道恭等所在聚黨及劉裕自立楚之規欲報復收衆據長社歸之者常萬餘人劉裕深憚之遣刺客沐謙害楚之楚之待謙甚厚謙夜詐疾知楚之必自來因欲殺之楚之聞謙病果自齎湯藥往省之謙感其意乃出匕首於席下以狀告之曰將軍為裕所忌憚願不輕率以保全為先楚之歎曰若如來言雖有所防恐有所失謙遂委身以事之其推誠信物得士之心皆此類也太宗末山陽公奚斤略地河南楚之遣使請降因表曰江淮以北聞王師南首無不抃舞思奉德化而逼於寇逆無由自致臣因民之欲請率慕義為國前驅今皆白衣無以制服人望若蒙偏裨之號假王威以唱義則莫不率從於是假楚之使持節征南將軍荊州刺史奚斤既平河南以楚之所率戶民分置汝南南陽南頓新蔡四郡以益豫州世祖初楚之遣妻子內居於鄴尋徵入朝時南藩諸將表劉義隆欲入為寇以楚之為使持節安南大將軍封琅邪王屯潁川以拒之其長史臨邑子步還表曰楚之渡河百姓思舊義衆雲集汝潁以南望風翕然回首革面斯誠陛下應天順民聖德廣被之所致也世祖大悅璽書勞勉賜前後部鼓吹義隆將到彥之泝河而西列守南岸至於潼關及彥之等退走楚之破其別軍於長社又與冠軍將軍安頡攻滑臺拔之擒義隆將朱脩之李元德及東郡太守申謨俘萬餘人上疏曰臣奉命南伐受任一方而智力淺短誠節未效所以夙夜憂惶忘寢與食臣屢遣人至荊揚所在陳說具論天朝盛化之美莫不忻承聖德傾首北望而義隆兄弟知人情搖動遣臣私讎順為司州刺史統淮北七郡代垣苗守懸瓠自鞏洛滑臺敗散已來義隆其敗北多加罪罰到彥之削位退同卒伍殺姚縱夫於壽春斬竺靈秀於彭城王休元託疾檀道濟斥放凡在腹心悉懷疑阻民怨臣猜可謂今日臣聞平殄寇逆必乘戰勝之威建立功勳亦因離貳之勢伏惟陛下聖德膺符道光四海神旌所指莫不摧服其未賓者義隆而已今天網遐舉殊方仰德固宜掃清東南齊一區宇使濟濟之風被於江漢世祖以兵久勞不從以散騎常侍徵還從征涼州以功賜隸戶一百義隆遣將裴方明胡崇之寇仇池以楚之為假節與淮陽公皮豹子等督關中諸軍從散關西入擊走方明擒崇之仇池平而還車駕伐蠕蠕詔楚之與濟陰公盧中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕說令擊楚之等以絕糧運蠕蠕乃遣姦覘入楚之軍截驢耳而去有告失驢耳者諸將莫能察楚之曰必是覘賊截之以為驗耳賊將至矣即使軍人伐柳為城水灌之令凍城立而賊至冰峻城固不可攻逼賊乃走散世祖聞而嘉之尋拜假節侍中, WYG: 除}
