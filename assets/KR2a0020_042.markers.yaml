  - {type: variant, offset: 2133, length: 168, content: 劫又於堤家得錢五千堤懼拷掠自誣言殺獄既至州悅觀色察言疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺此賊竟遺何物靈之云唯得一刀鞘而已悅取鞘視之曰此非里巷所為也乃召州城刀匠示之有郭門者前曰此刀鞘門手所作去歲賣與郭民董及祖悅收及祖詰之曰汝何故殺人取錢而遺刀鞘及祖款引靈之又於及祖身上得毛奴所著皂襦及祖伏法悅之察獄多此類也豫州于今稱之悅與鎮, WYG: 安}
