  - {type: variant, offset: 3005, length: 234, content: 悅近來遠清儉有稱世祖嘉之賜布六百匹後降號為平遠將軍改為密陵侯興光初卒子安國襲爵司馬叔璠晉安平獻王孚之後也父曇之司馬德宗河間王桓玄劉裕之際叔璠與兄國璠北奔慕容超後西投姚興劉裕滅姚泓北奔屈丐世祖平統萬兄弟俱入國國璠賜爵淮南公卒無子爵除叔璠安遠將軍丹楊侯卒長子靈壽神中與弟道壽俱來歸國靈壽冠軍將軍溫縣侯道壽寧朔將軍宜陽子靈壽出除陳郡太守劉義隆侵境詔靈壽招引義士得二千餘人從西平公安頡破虎牢滑臺洛陽三城徙五百餘家入河內又從討蠕蠕西征涼州所在著功出為遼西太守治有清儉之稱太和九年, WYG: ''}
