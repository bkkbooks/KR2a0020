  - {type: variant, offset: 2084, length: 1, content: 別, WYG: 之僑郡以益之雖位高爵重而接待不倦初讚之未貴也嘗從相者唐文相文曰君額上黑子入幘位當至方伯封公及貴也文以民禮拜謁仍曰明公憶民疇昔之言乎爾日但知公當貴然不能自知得為州民也讚曰徃時卿言杜瓊不得官長人咸謂不然及瓊被選為盩厔令卿猶言相中不見而瓊果以暴疾未拜而終昔魏舒見主人兒死自知己必至公吾常以卿言瓊之驗亦復不息此望也乃賜文衣服良馬讚在州十七年甚獲公私之譽年老表求致仕真君九年卒年八十六遺令薄葬斂以時服世祖悼惜之諡曰宣穆長子元寶襲爵為豫州别}
