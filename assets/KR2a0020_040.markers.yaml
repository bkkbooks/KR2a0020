  - {type: variant, offset: 3397, length: 0, content: '', WYG: 假長廣公為政清平抑彊扶弱州中有徳宿老名望重者以友禮待之詢之政事責以方略如此者十人號曰十善又簡取諸縣彊門百餘人以為假子誘接殷勤賜以衣服令各歸家為耳目於外於是發奸擿伏事無不驗百姓以為神明無敢刦盗者在州七年家至貧約徴為散騎常侍民乞留馛者千餘人顯祖不許謂羣臣曰馛之善政雖復古人何以}
