  - {type: variant, offset: 148, length: 43, content: 太宗初拜博士祭酒賜爵武城子常授太宗經書每至郊祠父子並乘軒軺時人榮之太宗好陰陽術數聞浩說, WYG: 遷内都大官安定盧永劉超等聚黨萬餘以叛世祖以俟威恩被於闗中詔以本官加都督秦雍諸軍事鎮長安世祖曰秦川險絶奉化日近吏民未被恩徳故頃年己來頻有叛動今超等恃險不順王命朕若以重兵與卿則超等必合而為一據險拒戰未}
