  - {type: variant, offset: 8839, length: 636, content: 事在律曆志真君十一年六月誅浩清河崔氏無遠近范陽盧氏太原郭氏河東柳氏皆浩之姻親盡夷其族初郄標等立石銘刊國記浩盡述國事備而不典而石銘顯在衢路往來行者咸以為言事遂聞發有司按驗浩取祕書郎吏及長曆生數百人意狀浩伏受賕其祕書郎吏已下盡死浩始弱冠太原郭逸以女妻之浩晚成不曜華采故時人未知逸妻王氏劉義隆鎮北將軍王仲德姊也每奇浩才能自以為得壻俄而女亡王深以傷恨復以少女繼婚逸及親屬以為不可王固執與之逸不能違遂重結好浩非毀佛法而妻郭氏敬好釋典時時讀誦浩怒取而焚之捐灰於厠中及浩幽執置之檻內送於城南使衞士數十人溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以為報應之驗也初浩構害李順基萌已成夜夢秉火爇順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之悉投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虛事夫以火爇人暴之極也階亂兆禍復己招也商書曰惡之易也如火之燎於原不可向邇其猶可撲滅乎且兆始惡者有終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至是而族浩既工書人多託寫急就章從少至老初不憚勞所書蓋以百數必稱馮代強以示不敢犯國其謹也如此浩書體勢及其先人而妙巧不如也世寶其迹多裁割綴連以為模楷浩母盧氏諶孫也浩著食經曰余自少及長耳目聞見諸母諸姑所修婦功無不蘊習酒食朝夕養舅姑四時祭祀雖有功力不任僮使常手自親焉昔遭喪亂飢饉仍臻饘蔬餬口不能具其物用十餘年間不復備設先妣慮久廢忘後生無知見而少不習業書乃占授為九篇文辭約舉婉而成章聰辯強記皆此類也親沒之後值國龍興之會平暴除亂拓, WYG: 因}
