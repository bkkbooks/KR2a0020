  - {type: variant, offset: 896, length: 643, content: 德宗將劉裕伐姚泓舟師自淮泗入清欲泝河西上假道於國詔羣臣議之外朝公卿咸曰函谷關號曰天險一人荷戈萬夫不得進裕舟船步兵何能西入脫我乘其後還路甚難若北上河岸其行為易揚言伐姚意或難測假其水道寇不可縱宜先發軍斷河上流勿令西過又議之內朝咸同外計太宗將從之浩曰此非上策司馬休之之徒擾其荊州劉裕切齒來久今興死子劣乘其危亡而伐之臣觀其意必欲入關勁躁之人不顧後患今若塞其西路裕必上岸北侵如此則姚無事而我受敵今蠕蠕內寇民食又乏不可發軍發軍赴南則北寇進擊若其救北則東州復危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞莊刺虎兩得之勢也使裕勝也必德我假道之惠令姚氏勝也亦不失救隣之名縱使裕得關中縣遠難守彼不能守終為我物今不勞兵馬坐觀成敗鬬兩虎而收長久之利上策也夫為國之計擇利而為之豈顧婚姻酬一女子之惠哉假令國家棄山以南裕必不能發吳越之兵與官軍爭守河北也居然可知議者猶曰裕西入函谷則進退路窮腹背受敵北上岸則姚軍必不出關助我揚聲西行意在北進其勢然也太宗遂從羣議遣長孫嵩發兵拒之戰於畔城為裕將朱超石所敗師人多傷太宗聞之恨不用浩計二年司馬德宗齊郡太守王懿來降上書陳計稱劉裕在洛勸國家以軍絕其後路則裕軍可不戰而克書奏太宗善之會浩在前進講書傳太宗問浩曰劉裕西伐前軍已至潼關其事如何以卿觀之事得濟不浩對曰昔姚興好養虛名而無實用子泓又病衆叛親離裕乘其危兵精將勇以臣觀之克之必矣太宗曰劉裕武能何如慕容垂浩曰裕勝太宗曰試言其狀浩曰慕容垂乘父祖世君之資生便尊貴同類歸之若夜蛾之赴火少加倚仗便足立功劉裕挺出寒微不階尺土之資不因一卒之用奮臂, WYG: ''}
