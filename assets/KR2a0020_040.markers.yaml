  - {type: variant, offset: 9570, length: 190, content: 晉公卿常侮模賾模謂人曰桃簡正可欺我何合輕我家周兒也浩小名桃簡賾小名周兒世祖頗聞之故誅浩時二家獲免浩既不信佛道模深所歸向每雖糞土之中禮拜形像浩大笑之云持此頭顱不淨處跪是胡神也史臣曰崔浩才藝通博究覽天人政事籌策時莫之二此其所以自比於子房也屬太宗為政之秋值世祖經營之日言聽計從寧廓區夏遇既隆也勤亦茂哉謀雖蓋世威未震主末途邂逅遂不自全豈鳥盡弓藏民惡其上將器盈必概陰害貽禍何斯人而遭斯酷悲夫, WYG: 書卷四十考證}
