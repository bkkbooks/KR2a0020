  - {type: variant, offset: 3726, length: 0, content: '', krp: 山陽太守莊帝即位徴拜給事黄門侍郎子彰妻即咸陽王禧女禧誅養於彭城王第荘帝親之略同諸姊建義初尒朱榮欲修舊事庶姓封王由是封子彰濮陽王食邑七百户尋而詔罷仍復先爵除安西將軍洛州刺史還拜征東將軍金紫光禄大夫領廣平王贊開府諮議參軍事天平中拜衛將軍頴州刺史以母憂去職元象中以本將軍除齊州刺史又加驃騎將軍行懐州事轉北豫州刺史仍除徐州刺史將軍竝如故一年歴三州當世榮之還朝除衛大將軍右光禄大夫又行瀛州事尋拜侍中復行滄州事進號驃騎大將軍行冀州事除侍讀兼七兵尚書行青州事子彰之為州以聚歛為事晚節修改自行青冀滄瀛甚有時譽加以虚已納物人敬愛之武定八年二月除中書監三月卒年五十四賻帛一百疋追贈都督青光齊三州諸軍事驃騎大將軍開府儀同三司青州刺史公如故諡曰文宣子彰崇好道術曽嬰重疾藥中湏桑螵蛸子彰不忍害物遂不服焉其仁恕如此敎訓六子雅有法度子昴武定中中書舍人昴弟駿太子洗馬駿弟杳尚書倉部郎叡字思弼其母張氏字黄龍本恭宗宫人以賜麗生叡麗之亡也叡始十餘嵗襲爵撫軍大將軍平原王沉雅好學折節下士年未二十時人便以宰輔許之娶徐州刺史博陵崔鑒女鑒謂所親云平原王才度不惡但恨其姓名殊為重複時髙祖未改其姓叡婚自東徐還經於鄴見李彪甚敬悦之仍與俱趨京師以為館客資給衣馬僮使待之甚厚為北征都督拜北部長轉尚書加散騎常侍太和八年正月叡與隴西公元琛竝持節為東西二道大使襃善罰惡聲稱聞於京師五月詔賜叡夏服一具後以叡為北征都督擊蠕蠕大破之遷侍中都曺尚書時蠕蠕又犯塞詔叡率騎五千以討之蠕蠕遁走追至石磧擒其帥赤阿突等數百人而還如散騎常侍遷尚書左僕射領北部尚書十六年降五等之爵以麗勲著前朝封叡鉅鹿郡開國公食邑三百户尋為使持節鎮北大將軍與陽平王頤竝為都督督領軍將軍斛律桓等北征三道諸軍事歩騎十萬以討蠕蠕叡以下各賜衣物有差闕二字親幸城北訓誓羣帥除尚書令衛將軍闕大破蠕蠕而還尋以母憂解令髙祖將有南伐之事以本官起之改授征南將軍叡固辭請終情禮詔曰叡猶執私痛致違往旨金革方馳何宜曲遂也加領衛尉可重勑有司速令敦喻後除使持節都督恒肆朔三州諸軍事本將軍恒州刺史行尚書令髙祖大考百官奪叡尚書令祿一周十九年叡表曰臣聞先天有弗違之略後天有順時之見今蕭鸞盗有名目竊據江左惡盈罪稔天人棄之取亂攻昧誠在兹日愚以長江浩蕩彼之巨防可以徳招難以力屈又南土昬霧暑氣鬱蒸師人經夏必多疾病而鼎遷草創庶事甫爾臺省無論政之館府寺靡聼治之所百寮居止事等行路沉雨炎陽自成癘疫且兵徭竝舉聖王所難今介胄之士外攻讐宼羸弱之夫内動土木運給之費日損千金驅罷敝之兵討堅城之虜將何以取勝乎陛下往冬之舉政欲曜武江漢示威衡湘自春㡬夏理宜釋甲願櫜旌卷斾為持久之方崇成帝居深重本之固聖懐無内念之虞兆庶休斤板之役修禮華區諷風洛浦然簡英略之將任猛毅之雄南取荆湘據其要府則梁秦以西覩機白服撫附振威回麾東指則義陽以左馳聲可制然後布仁化以綏近播恩施以懐逺凡在有情孰不思奮還遣慕徳之人効其餘力乘流而下勢勝萬倍蕞爾閩甌敢不稽顙豈必兹年競斯寸尺惟願顧存近勑納降而旋不紆鑾輿久臨炎暑髙祖從之叡表請車駕還代親臨太師馮熈之𦵏坐削奪都督三州諸軍事尋除都督恒朔二州諸軍事進號征北大將軍以有順遷之表加邑四百戸時穆泰為定州刺史辭以疾病上温則甚請恒州自効髙祖許之乃以叡為散騎常侍定州刺史將軍如故叡未發遂與泰等同謀搆逆賜死獄中聼免孥戮徙其妻子為遼西郡民詔僕射李冲領軍于烈曰陸叡元不早闕五字大臣自與卿等同受非常之詔朕許以不死之㫖思得上下齊信以保大義朕於卿等常忘短棄瑕務相含養豈謂陸叡無心之甚一年於斯乃與穆泰結禍數圖反噬以朕遷洛内外不可擬舉諸王議引子恂若斯之論前後非一始欲推故南安王次推陽平王若不肯從欲逼樂陵王訕謗朝廷書信炳然事既垂就叡以洛都休明勸令小緩於是之後兩人復競然猶隐而弗聞賴陽平王忠貞奮發獲泰之言便爾馳表得使正人紏慝恒岳無塵是以叡之愆失處入門誅朕諦尋前旨許不盡法反逆之志自負幽㝠違誓在彼不闗朕也反心逆意既異餘犯雖欲矜恕末如之何然猶憶先言兼以末頗異議聼自死别府免厥孥戮其門子孫永世不齒元丕二子一弟首為賊端其父無人明證理在可覩但以言無炳灼隐而弗窮以連坐應死特恕為民朕本期有終而彼自棄卿等之閒忽及今日違心乖念一何可悲故此别示想無致怪也謀反之外皎如白日耳冲烈表曰臣等邀逢幸㑹生遇昌辰才非利用坐班位列功無汗馬猥受山河叨忝之寵終古無比莫大之施萬殞靡酬而叡丕識乖犬馬心同梟獍潛引童稚搆兹妖逆違悖天常罪踰萬殞叡結釁在心隂搆不息閒説戚蕃擬窺乾象雖覩休平未懐疑惑何嘗片辭披露宿志原心語跡實為賊首丕之二子從惡累年交扇東西規擾并夏測觀此状無客不知雖聖慈含育恕其生命其若天地何其若神祇何夫効誠盡節為下之常分刑兹無捨在上之常法况曲䝉莫大之恩奨以忠貞之義而更違天背道包藏姧逆求情推理罪乃常誅而慈造寛渥更流恩貸續叡三斷之骸還丕已絶之魄二三縱宥實虧憲典猶復上延天眷言念疇日不以臣等背負餘黨别垂明詔再申齊信之恩重喻皎日之㫖伏讀悲慙惟深隗惕叡長子希道字洪度有風貌羙鬚髯歴覽經史頗有文致初拜中散遷通直郎坐父事徙於遼西於後得還從征自効以軍功拜給事中遷司徒記室司空主簿征南將軍元英攻蕭衍司州以希道為副及克義陽以功賜爵淮陽男拜諫議大夫以學闗今古參議新令轉廷尉少卿加龍驤將軍南青州刺史以本將軍轉梁州刺史希道頻表辭免又除東夏州刺史不拜轉北中郎將遷前將軍郢州刺史希道善於馭邊甚有威略轉平西將軍涇州刺史正光四年卒官贈撫軍將軍定州刺史希道有六子士懋字元偉天平中以其曽祖麗有翼戴之勲詔特復鉅鹿郡開國公邑三百户令士懋襲武定中平東將軍營州刺史士懋弟士宗字仲彦尚書左外兵郎中士宗弟士述字幼文符璽郎中士宗士述建義初竝於河隂遇害士述弟士沉出繼從叔昕之士沉弟士㢘字季脩建州平北府長史永安末為尒朱世隆攻䧟州城見害士㢘弟士佩字季偉武定中安東將軍司州治中希道弟希悦尚書外兵郎中驃騎諮議叅軍通直散騎常侍平南將軍光禄大夫遇害於河隂贈散騎常侍衛將軍相州刺史希悦弟希謐太尉叅軍早卒希謐弟希静字季黙司徒黙曹稍遷邵郡太守希静弟希質字幼成起家員外郎領侍御史稍遷散騎侍郎陽城太守孝莊初除龍驤將軍膠州刺史蕭衍遣將率衆數萬從郁洲浮海據島來侵州界希質討破之轉建州刺史將軍如故爾朱榮之死也世隆率衆北還晉陽希質固守拒之城陷兄子被害希質妻元氏榮妻之兄孫由是獲免天平初給事黄門侍郎遷魏尹轉}
