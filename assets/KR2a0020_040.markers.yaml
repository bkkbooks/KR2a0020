  - {type: variant, offset: 112, length: 1, content: 浩, WYG: 未已吳一身蔵竄非其親信誰能獲之若停十萬之衆以追一人非上䇿也不如私許吳叔免其妻子使自追吳擒之必也諸將咸曰今來討賊既破之獲其二叔唯吳一人何所復至俟曰吳之悖逆本自天性今若獲免必誑惑愚民稱王者不死妄相扇動為患必大諸君不見毒蛇乎斷其頭猶能為害况除腹心疾而曰必遺其類其可乎諸將曰公言是也但得賊不殺更有所求遂去不返其如罪何俟曰此罪我與諸君當之髙涼王那亦從俟計遂遣吳二叔與之期及期吳叔不至諸將各咎於俟俟曰此未得其便耳必不背也後數日果斬吳以至皆如其言俟之明略}
