  - {type: variant, offset: 4249, length: 255, content: 東不妨北伐淵等俗生志意淺近牽於小數不達大體難與遠圖臣觀天文比年以來月行奄昴至今猶然其占三年天子大破旄頭之國蠕蠕高車旄頭之衆也夫聖明御時能行非常之事古人語曰非常之原黎民懼焉及其成功天下晏然願陛下勿疑也淵等慚而言曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而苦勞士馬也浩曰淵言天時是其所職若論形勢非彼所知斯乃漢世舊說常談施之於今不合事宜也何以言之夫蠕蠕者舊是國家北邊叛隸今誅其元惡收其善民令復舊役非無用也漠北高涼不生蚊蚋水草美善夏則北遷田牧其地非不可耕而食也蠕蠕子弟來降貴者尚公主賤者, WYG: 衛}
