  - {type: variant, offset: 4519, length: 944, content: 非不可臣而畜也夫以南人追之則患其輕疾於國兵則不然何者彼能遠走我亦能遠逐與之進退非難制也且蠕蠕往數入國民吏震驚今夏不乘虛掩進破滅其國至秋復來不得安臥自太宗之世迄於今日無歲不驚豈不汲汲乎哉世人皆謂淵辯通解數術明決成敗臣請試之問其西國未滅之前有何亡徵知而不言是其不忠若實不知是其無術時赫連昌在座淵等自以無先言慚赧而不能對世祖大悅謂公卿曰吾意決矣亡國之師不可與謀信矣哉而保太后猶難之復令羣臣於保太后前評議世祖謂浩曰此等意猶不伏卿善曉之令悟既罷朝或有尤浩者曰今吳賊南寇而舍之北伐行師千里其誰不知若蠕蠕遠遁前無所獲後有南賊之患危之道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國以來南人恐懼揚聲動衆以衞淮北彼北我南彼勞我息其勢然矣比破蠕蠕往還之間故不見其至也何以言之劉裕得關中留其愛子精兵數萬良將勁卒猶不能固守舉軍盡沒號哭之聲至今未已如何正當國家休明之世士馬強盛之時而欲以駒犢齒虎口也設令國家與之河南彼必不能守之自量不能守是以必不來若或有衆備邊之軍耳夫見瓶水之凍知天下之寒嘗肉一臠識鑊中之味物有其類可推而得也且蠕蠕恃其絕遠謂國家力不能至自來久故夏則散衆放畜秋肥乃聚背寒向溫南來寇抄今出其慮表攻其不備大軍卒至必驚駭星分望塵奔走牡馬護群牝馬戀駒驅馳難制不得水草未過數日則聚而困敝可一舉而滅暫勞永逸長久之利時不可失也唯患上無此意今聖慮已決發曠世之謀如何止之陋矣哉公卿也諸軍遂行天師謂浩曰是行也如之何果可克乎浩對曰天時形勢必克無疑但恐諸將瑣瑣前後顧慮不能乘勝深入使不全舉耳及軍入其境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍搜討東西五千里南北三千里凡所俘虜及獲畜產車廬彌漫山澤蓋數百萬高車殺蠕蠕種類歸降者三十餘萬落虜遂散亂矣世祖沿弱水西行至涿邪山諸大將果疑深入有伏兵勸世祖停止不追天師以浩曩日之言固勸世祖窮討不聽後有降人言蠕蠕大檀先被疾不知所為乃焚燒穹廬科車自載將數百人入山南走民畜窘聚方六十里中無人領統相去百八十里追軍不至乃徐徐西遁唯此得免後聞涼州賈胡言若復前行二日則盡滅之矣世祖深恨之大軍既還南賊竟不能動如浩所量浩明識天文好觀星變常置金銀銅鋌於酢器中令青夜有所見即以鋌畫紙作字以記其異世祖每幸浩第多問以異事或倉卒不及束帶奉進蔬食不暇精美世祖為舉匕箸或立嘗而旋其見寵愛如此於是引浩出入臥內加侍中特進撫軍大, WYG: ''}
