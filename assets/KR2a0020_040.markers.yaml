  - {type: variant, offset: 3414, length: 1, content: 浩, WYG: 吏民大歛布帛以遺之馥一皆不受民亦不取於是以物造佛寺焉名長廣公寺後襲父爵改封建安王時劉彧司州刺史常珍奇以懸瓠内附而新民猶懐去就馛銜旨撫慰諸有陷軍為奴婢者馛皆免之百姓忻悦民情乃定車駕討蠕蠕詔馛為選部尚書錄留臺事督兵運糧一委處分顯祖將禪位於京兆王子推任城王雲隴西王源賀等竝皆固諫馛抗言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿庭有死無貳久之帝意乃解詔曰馛直臣也其能保吾子乎遂以馛為太保與太尉源賀持節奉皇帝璽紱傳位于髙祖延興四年薨贈以本官諡曰貞王馛有六子琇凱知名琇字伯琳馛第五子母赫連氏身長七尺九寸甚有婦徳馛有以爵𫝊琇之意琇年九嵗馛謂之曰汝祖東平王有十二子我為嫡長承襲家業今已年老屬汝㓜冲詎堪為陸氏宗首乎琇對曰茍非鬬力何患童稚馛奇之遂立琇為世子馛薨襲爵琇沉毅少言雅好讀書以功臣子孫為侍御長給事中遷黄門侍郎轉太常少卿散騎常侍太子左詹事領北海王師光禄大夫轉祠部尚書司州大中正㑹}
  - {type: page-break, offset: 3414, content: '', id: KR2a0020_WYG_040-6a, image: WYG0261/WYG0261-0557c.png}
  - {type: page-break, offset: 3414, content: '', id: KR2a0020_WYG_040-6b, image: WYG0261/WYG0261-0557d.png}
  - {type: variant, offset: 3414, length: 1, content: 浩, krp: 吏民大歛布帛以遺之馥一皆不受民亦不取於是以物造佛寺焉名長廣公寺後襲父爵改封建安王時劉彧司州刺史常珍奇以懸瓠内附而新民猶懐去就馛銜旨撫慰諸有陷軍為奴婢者馛皆免之百姓忻悦民情乃定車駕討蠕蠕詔馛為選部尚書錄留臺事督兵運糧一委處分顯祖將禪位於京兆王子推任城王雲隴西王源賀等竝皆固諫馛抗言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿庭有死無貳久之帝意乃解詔曰馛直臣也其能保吾子乎遂以馛為太保與太尉源賀持節奉皇帝璽紱傳位于髙祖延興四年薨贈以本官諡曰貞王馛有六子琇凱知名琇字伯琳馛第五子母赫連氏身長七尺九寸甚有婦徳馛有以爵𫝊琇之意琇年九嵗馛謂之曰汝祖東平王有十二子我為嫡長承襲家業今已年老屬汝㓜冲詎堪為陸氏宗首乎琇對曰茍非鬬力何患童稚馛奇之遂立琇為世子馛薨襲爵琇沉毅少言雅好讀書以功臣子孫為侍御長給事中遷黄門侍郎轉太常少卿散騎常侍太子左詹事領北海王師光禄大夫轉祠部尚書司州大中正㑹}
  - {type: variant, offset: 3416, length: 0, content: '', WYG: 兄叡事免官景明初試守河内郡咸陽王禧謀反令子曇和與尹仵期薛繼祖等先據河内琇聞禧敗斬曇和首時以琇不先送曇和禧敗始斬首責其通情徴詣廷尉廷尉少卿崔振窮治罪状按琇大逆陸宗大小咸見收捕㑹將叔先薨於獄琇弟凱仍上書訴寃世宗詔復琇爵子景祚襲凱字智君謹重好學年十七為中書學生拜侍御中散轉通直散騎侍郎遷}
  - {type: page-break, offset: 3416, content: '', id: KR2a0020_WYG_040-7a, image: WYG0261/WYG0261-0558a.png}
  - {type: variant, offset: 3416, length: 0, content: '', krp: 兄叡事免官景明初試守河内郡咸陽王禧謀反令子曇和與尹仵期薛繼祖等先據河内琇聞禧敗斬曇和首時以琇不先送曇和禧敗始斬首責其通情徴詣廷尉廷尉少卿崔振窮治罪状按琇大逆陸宗大小咸見收捕㑹將叔先薨於獄琇弟凱仍上書訴寃世宗詔復琇爵子景祚襲凱字智君謹重好學年十七為中書學生拜侍御中散轉通直散騎侍郎遷}
  - {type: variant, offset: 3417, length: 0, content: '', WYG: 子庶子給事黄門侍郎凱在樞要十餘年以忠厚見稱希言屢中髙祖嘉之後遇患頻上書乞骸骨詔不許勑大醫給湯藥除正平太守在郡七年號為良吏初髙祖將議革變舊風大臣竝有難色又每引劉芳郭祚等密與規謨共論時政而國戚謂遂疎已怏怏有不平之色乃令凱私踰之曰至尊但欲廣知前事直當問其古式耳終無親彼而相疏也國戚舊人意乃稍解咸陽王禧謀逆凱兄琇䧟罪凱亦被收遇赦乃免凱痛兄之死哭無時節目㡬失明訴寃不己備盡人事至正始初世宗復琇官爵凱大喜置酒集諸親曰吾所以數年之中抱病忍死者顧門户計耳逝者不追今願畢矣遂以其年卒贈龍驤將軍南青州刺史諡曰恵長子暐字道暉與弟恭之竝有時譽洛陽令賈禎見其兄弟歎曰僕以老年更覩雙璧又嘗兄弟共候黄門郎孫恵蔚恵蔚謂諸賔曰不意二陸復在座隅吾徳謝張公無以延譽暐起家司徒行參軍太尉西閣祭酒兼尚書右民三公郎坐事免後除伏波將軍正光中卒贈司州治中孝昌中重贈冠軍將軍恒州刺史暐擬急就篇為悟䝉章及七誘十醉章表數十篇暐與恭之晚不睦為時所鄙子元規武定中尚書郎恭之字季順有操尚釋褐侍御史著作佐郎建義初除中書侍郎領著作郎尋除河北太守轉征虜將軍殷州刺史前廢帝初拜廷尉卿加鎮西將軍所歴竝有聲績後坐事免孝静初還復本位出除征南將軍東荆州刺史天平四年卒贈散騎常侍衛將軍吏部尚書定州刺史諡曰懿恭之所著文章詩賦凡千餘篇子曄開府中兵參軍馛弟石跋涇州刺史石跋弟歸東宫舍人駕部校尉歸弟尼内侍校尉東陽鎮都將尼弟麗少以忠謹入侍左右太武特親昵之舉動審慎而無愆失賜爵章安子稍遷南部尚書太武崩南安王余立既而為中常侍宗愛等所殺百寮憂惶莫知所立麗以髙宗世嫡之重民望所係乃首建大義與殿中尚書長孫渴侯尚書源賀羽林郎劉尼奉迎髙宗於苑中立之社稷獲安麗之謀矣由是受心膂之任在朝者無出其右興安初封平原王加撫軍將軍麗辭曰陛下以一統之重承基繼業至於奉迎守順臣闕二字常豈敢昧冒以干大典頻讓再三詔不聼麗乃啟曰臣父歴奉先朝忠勤著稱今年至西夕未登王爵臣叨荷寵榮於分已過愚款之情未申犬馬之効未展願裁過恩聼遂所請髙宗曰朕為天下主豈不能得二王封卿父子也乃以其父俟為東平王麗尋遷侍中撫軍大將軍司徒公復其子孫賜妻妃號麗以優寵既頻固辭不受髙宗益重之領太子太傅麗好學愛士常以講習為業其所待者皆篤行之流士多稱之性又至孝遭父憂毁瘠過禮和平六年髙宗崩先是麗療疾於代郡温泉聞諱欲赴左右止之曰宫車晏駕王徳望素重姧臣若疾民譽慮有不測之禍願少遲回朝廷寧静然後奔赴猶為未晚麗曰安有聞君父之䘮方慮禍難不即奔波者遂便馳赴乙渾尋擅朝政忌而害之初渾悖傲每為不法麗數諍之由是見忌顯祖甚追惜麗諡曰簡王陪葬金陵髙祖追錄先朝功臣以麗配饗廟庭麗二妻長曰杜氏次張氏長子定國杜氏所生次叡張氏所生定國在襁抱髙}
