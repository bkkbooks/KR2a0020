  - {type: variant, offset: 1587, length: 1208, content: 國裕亦不能守之風俗不同人情難變欲行荊揚之化於三秦之地譬無翼而欲飛無足而欲走不可得也若留衆守之必資於寇孔子曰善人為邦百年可以勝殘去殺今以秦之難制一二年間豈裕所能哉且可治戎束甲息民備境以待其歸秦地亦當終為國有可坐而守也太宗曰裕已入關不能進退我遣精騎南襲彭城壽春裕亦何能自立浩曰今西北二寇未殄陛下不可親御六師兵衆雖盛而將無韓白長孫嵩有治國之用無進取之能非劉裕敵也臣謂待之不晚太宗笑曰卿量之已審矣浩曰臣嘗私論近世人物不敢不上聞若王猛之治國苻堅之管仲也慕容玄恭之輔少主慕容暐之霍光也劉裕之平逆亂司馬德宗之曹操也太宗曰卿謂先帝如何浩曰小人管窺懸象何能見玄穹之廣大雖然太祖用漠北醇樸之人南入中地變風易俗化洽四海自與羲農齊列臣豈能仰名太宗曰屈丐何如浩曰屈丐家國夷滅一身孤寄為姚氏封殖不思樹黨強隣報讎雪乃結忿於蠕蠕背德於姚興撅竪小人無大經略正可殘暴終為人所滅耳太宗大悅語至中夜賜浩御縹醪酒十觚水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同其旨也三年彗星出天津入太微經北斗絡紫微犯天棓八十餘日至漢而滅太宗復召諸儒術士問之曰今天下未一四方岳峙災咎之應將在何國朕甚畏之盡情以言勿有所隱咸共推浩令對浩曰古人有言夫災異之生由人而起人無釁焉妖不自作故人失於下則變見於上天事象百代不易漢書載王莽篡位之前彗星出入正與今同國家主尊臣卑上下有序民無異望雖僭晉卑削主弱臣強累世陵遲故桓玄逼奪劉裕秉權彗孛者惡氣之所生是為僭晉將滅劉裕篡之之應也諸人莫能易浩言太宗深然之五年裕果廢其主司馬德文而自立南鎮上裕改元赦書時太宗幸東南潟滷池射鳥聞之驛召浩謂之曰往年卿言彗星之占驗矣朕於今日始信天道初浩父疾篤浩乃剪爪截髮夜在庭中仰禱斗極為父請命求以身代叩頭流血歲餘不息家人罕有知者及父終居喪盡禮時人稱之襲爵白馬公朝廷禮儀優文策詔軍國書記盡關於浩浩能為雜說不長屬文而留心於制度科律及經術之言作家祭法次序五宗蒸嘗之禮豐儉之節義理可觀性不好老莊之書每讀不過數十行輒棄之曰此矯誣之說不近人情必非老子所作老聃習禮仲尼所師豈設敗法文書以亂先王之教袁生所謂家人筐篋中物不可揚於王庭也太宗有微疾怪異屢見乃使中貴人密問於浩曰春秋星孛北斗七國之君皆將有咎今茲日蝕於胃昂盡光趙代之分野朕疾彌年療治無損恐一旦奄忽諸子並少將如之何其為我設圖後之計浩曰陛下春秋富盛聖業方融德以除災幸就平愈且天道懸遠或消或應昔宋景見災修德熒惑退舍願陛下遣諸憂虞恬神保和納御嘉福無以闇昧之說致損聖思必不得已請陳瞽言自聖化龍興不崇儲貳是以永興之始社禝幾危今宜早建東宮選公卿忠賢陛下素所委仗者使為師傅左右信臣簡在聖心者以充賓友入總萬機出統戎政監國撫軍六柄在手若此則陛下可以優遊無為頤神養壽進御醫藥萬歲之後國有成主民有所歸則姦宄息望旁無覬覦此乃萬世之令典塞禍之大備也今長皇子燾年漸一周明叡溫和衆情所繫時登儲副則天下幸甚立子以長禮之大經若須並待成人而擇倒錯天倫則生履霜堅冰之禍自古以來載籍所記興衰存亡尠不由此太宗納之於是使浩奉策告宗廟命, WYG: ''}
