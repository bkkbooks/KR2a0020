  - {type: variant, offset: 8098, length: 740, content: 世祖至東雍親臨汾曲觀叛賊薛永宗壘進軍圍之永宗出兵欲戰世祖問浩曰今日可擊不浩曰永宗未知陛下自來人心安閑北風迅疾宜急擊之須臾必碎若待明日恐其見官軍盛大必夜遁走世祖從之永宗潰滅車駕濟河前驅告賊在渭北世祖至洛水橋賊已夜遁詔問浩曰蓋吳在長安北九十里渭北地空穀草不備欲渡渭南西行何如浩對曰蓋吳營去此六十里賊魁所在擊蛇之法當須破頭頭破則尾豈能復動宜乘勢先擊吳今軍往一日便到平吳之後回向長安亦一日而至一日之內未便損傷愚謂宜從北道若從南道則蓋吳徐入北山卒未可平世祖不從乃渡渭南吳聞世祖至盡散入北山果如浩言軍無所克世祖悔之後以浩輔東宮之勤賜繒絮布帛各千段著作令史太原閔湛趙郡郄標素諂事浩乃請立石銘刊載國書并勒所注五經浩贊成之恭宗善焉遂營於天郊東三里方百三十步用功三百萬乃訖世祖蒐于河西詔浩詣行在所議軍事浩表曰昔漢武帝患匈奴強盛故開涼州五郡通西域勸農積穀為滅賊之資東西迭擊故漢未疲而匈奴已弊後遂入朝昔平涼州臣愚以為北賊未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虛雖有鎮戍適可禦邊而已至於大舉軍資必乏陛下以此事闊遠竟不施用如臣愚意猶如前議募徙豪強大家充實涼土軍舉之日東西齊勢此計之得者浩又上五寅元曆表曰太宗即位元年敕臣解急就章孝經論語詩尚書春秋禮記周易三年成訖復詔臣學天文星曆易式九宮無不盡看至今三十九年晝夜無廢臣禀性弱劣力不及健婦人更無餘能是以專心思書忘寢與食至乃夢共鬼爭義遂得周公孔子之要術始知古人有虛有實妄語者多真正者少自秦始皇燒書之後經典絕滅漢高祖以來世人妄造曆術者有十餘家皆不得天道之正大誤四千小誤甚多不可言盡臣愍其如此今遭陛下太平之世除偽從真宜改誤曆以從天道是以臣前奏造曆今始成訖謹以奏呈唯恩省察以臣曆術宣示中書博士然後施用非但時人天地鬼神知臣得正可以益國家萬世之名過於三皇五帝, WYG: ''}
