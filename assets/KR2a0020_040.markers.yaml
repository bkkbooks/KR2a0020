  - {type: variant, offset: 5781, length: 243, content: 且彼先嚴有備必堅城固守屯軍攻之則糧食不給分兵肆討則無以應敵未見其利就使能來待其勞倦秋涼馬肥因敵取食徐往擊之萬全之計勝必可克在朝群臣及西北守將從陛下征討西滅赫連北破蠕蠕多獲美女珍寶馬畜成群南鎮諸將聞而生羨亦欲南抄以取資財是以披毛求瑕妄張賊勢冀得肆心既不獲聽故數稱賊動以恐朝廷背公存私為國生事非忠臣也世祖從浩議南鎮諸將復表賊至而自陳兵少簡幽州以南戍兵佐守就漳水造船嚴以為備公卿議者僉然欲遣騎五千并假署司馬楚之魯軌韓延之等令誘引邊民浩曰非上策也彼聞幽州已南精兵悉發大造舟船輕騎在後欲存立司馬誅, WYG: 己}
