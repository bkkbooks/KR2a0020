  - {type: variant, offset: 6025, length: 2064, content: 劉族必舉國駭擾懼於滅亡當悉發精銳來備北境後審知官軍有聲無實恃其先聚必喜而前行徑來至河肆其侵暴則我守將無以禦之若彼有見機之人善設權譎乘間深入虞我國虛生變不難非制敵之良計今公卿欲以威力攘賊乃所以招令速至也夫張虛聲而召實害此之謂矣不可不思後悔無及我使在彼期四月前還可待使至審而後發猶未晚也且楚之之徒是彼所忌將奪其國彼安得端坐視之故楚之往則彼來止則彼息其勢然也且楚之等瑣才能招合輕薄無賴而不能成就大功為國生事使兵連禍結必此之群矣臣嘗聞魯軌說姚興求入荊州至則散敗乃不免蠻賊掠賣為奴使禍及姚泓已然之效浩復陳天時不利於彼曰今茲害氣在揚州不宜先舉兵一也午歲自刑先發者傷二也日蝕滅光晝昏星見飛鳥墮落宿值斗牛憂在危亡三也熒惑伏匿於翼軫戒亂及喪四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉而萬全國安而身盛今義隆新國是人事未周也災變屢見是天時不協也舟行水涸是地利不盡也三事無一成自守猶或不安何得先發而攻人哉彼必聽我虛聲而嚴我亦承彼嚴而動兩推其咎皆自以為應敵兵法當分災迎受害氣未可舉動也世祖不能違衆乃從公卿議浩復固爭不從遂遣陽平王杜超鎮鄴琅邪王司馬楚之等屯潁川於是賊來遂疾到彥之自清水入河泝流西行分兵列守南岸西至潼關世祖聞赫連定與劉義隆懸分河北乃治兵欲先討赫連群臣曰義隆猶在河中舍之西行前寇未可必克而義隆乘虛則失東州矣世祖疑焉問計於浩浩曰義隆與赫連定同惡相招連結馮跋牽引蠕蠕規肆逆心虛相唱和義隆望定進定待義隆前皆莫敢先入以臣觀之有似連雞不得俱飛無能為害也臣始謂義隆軍來當屯住河中兩道北上東道向冀州西道衝鄴如此則陛下當自致討不得徐行今則不然東西列兵徑二千里一處不過數千形分勢弱以此觀之儜兒情見止望固河自守免死為幸無北渡意也赫連定殘根易摧擬之必仆克定之後東出潼關席卷而前則威震南極江淮以北無立草矣聖策獨發非愚近所及願陛下西行勿疑平涼既平其日宴會世祖執浩手以示蒙遜使曰所云崔公此是也才略之美當今無比朕行止必問成敗決焉若合符契初無失矣後冠軍將軍安頡軍還獻南俘因說南賊之言云義隆敕其諸將若北國兵動先其未至徑前入河若其不動住彭城勿進如浩所量世祖謂公卿曰卿輩前謂我用浩計為謬驚怖固諫常勝之家始皆自謂踰人遠矣至於歸終乃不能及遷浩司徒時方士祁纖奏立四王以日東西南北為名欲以致禎吉除災異詔浩與學士議之浩對曰先王建國以作蕃屏不應假名以為其福夫日月運轉周歷四方京都所居在於其內四王之稱實奄邦畿名之則逆不可承用先是纖奏改代為萬年浩曰昔太祖道武皇帝應天受命開拓洪業諸所制置無不循古以始封代土後稱為魏故代魏兼用猶彼殷商國家積德著在圖史當享萬億不待假名以為益也纖之所聞皆非正義世祖從之是時河西王沮渠牧犍內有貳意世祖將討焉先問於浩浩對曰牧犍惡心已露不可不誅官軍往年北伐雖不克獲實無所損于時行者內外軍馬三十萬匹計在道死傷不滿八千歲常羸死不減萬乃不少於此而遠方承虛便謂大損不能復振今出其不意不圖大軍卒至必驚駭騷擾不知所出擒之必矣且牧犍劣弱諸弟驕恣爭權從橫民心離解加比年以來天災地變都在秦涼成滅之國也世祖曰善吾意亦以為然命公卿議之弘農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父職貢朝廷接以蕃禮又王姬釐降罪未甚彰謂宜羈縻而已今士馬勞止宜可小息又其地鹵斥略無水草大軍既到不得久停彼聞軍來必完聚城守攻則難拔野無所掠於是尚書古弼李順之徒皆曰自溫圉河以西至於姑臧城南天梯山上冬有積雪深一丈餘至春夏消液下流成川引以溉灌彼聞軍至決此渠口水不通流則致渴乏去城百里之內赤地無草又不任久停軍馬斤等議是也世祖乃命浩以其前言與斤共相難抑諸人不復餘言唯曰彼無水草浩曰漢書地理志稱涼州之畜為天下饒若無水草何以畜牧又漢人為居終不於無水草之地築城郭立郡縣也又雪之消液纔不斂塵何得通渠引漕溉灌數百萬頃乎此言大詆誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辨浩曰汝曹受人金錢欲為之辭謂我目不見便可欺也世祖隱聽聞之乃出親見斤等辭旨嚴厲形於神色群臣乃不敢復言唯唯而已於是遂討涼州而平之多饒水草如浩所言乃詔浩曰昔皇祚之興世隆北土積德累仁多歷年載澤流蒼生義聞四海我太祖道武皇帝協順天人以征不服應期撥亂奄有區夏太宗承統光隆前緒釐正刑典大業惟新然荒域之外猶未賓服此祖宗之遺志而貽功於後也朕以眇身獲奉宗廟戰戰兢兢如臨淵海懼不能負荷至重繼名丕烈故即位之初不遑寧處揚威朔裔掃定赫連逮於神始命史職注集前功以成一代之典自爾已來戎旗仍舉秦隴克定徐兗無塵平逋寇於龍川討孽豎於涼域豈朕一人獲濟於此賴宗廟之靈群公卿士宣力之効也而史闕其職篇籍不著每懼斯事之墜焉公德冠朝列言為世範小大之任望君存之命公留臺綜理史務述成此書務從實錄浩於是監祕書事以中書侍郎高允散騎侍郎張偉參著作續成前紀至於損益褒貶折中潤色浩所總焉及恭宗始總百揆浩復與宜都王穆壽輔政事時又將討蠕蠕劉潔復致異議世祖逾欲討之乃召問浩浩對曰往擊蠕蠕師不多日潔等各欲回還後獲其生口云軍還之時去賊三十里是潔等之計過矣夫北土多積雪至冬時常避寒南徙若因其時潛軍而出必與之遇則可擒獲世祖以為然乃分軍為四道詔諸將俱會鹿渾海期日有定而潔恨計不用沮誤諸將無功而還事在潔傳世祖西巡詔浩與尚書順陽公蘭延, WYG: 叡}
