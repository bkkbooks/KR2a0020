  - {type: variant, offset: 3419, length: 1, content: 西, WYG: 其第詔養宫内至於遊止常與顯祖同處年六嵗為中庶子及顯祖踐阼拜散騎常侍特賜封東郡王加鎮南將軍定國以承父爵頻辭不許又求以父爵讓弟叡乃聼之俄遷侍中儀曹尚書轉殿中尚書前後大駕征廵每擢為行臺錄都曹事超遷司空定國恃恩不循法度延興五年坐事免官爵為兵太和初復除侍中鎮南將軍秦益二州刺史復王爵八年薨於州贈以本官諡曰荘王賜命服一襲子昕之字慶始風望端雅襲爵例䧏為公尚顯祖女常山公主拜駙馬都尉歴通直郎景明中以從叔琇罪免官尋以主壻除通直散時常侍未㡬遷司徒司馬加輔國將軍出為兖州刺史尋進號安東將軍治有名績仍除青州刺史在州著寛平之稱轉安北將軍相州刺史永平四年夏卒贈鎮東將軍冀州刺史諡曰恵初定國娶}
