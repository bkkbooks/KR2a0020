  - {type: variant, offset: 7064, length: 7, content: 禮班賜有差甲午, WYG: 愧無忘寢食今刑獄繁多囹圄尚積宜敷仁惠以濟斯民八座可推鞫見四務申枉濫癸未詔曰攘災招應修政爲本民乃神主實宜率先刺史守令與朕共治天下宜哀矜勿喜視民如傷況今炎旱歴時萬姓彫敝而不撫恤窮寃理決庶獄可嚴勑州郡善加綏隱務盡聰明加之祗肅必使事允人神時致靈感其賦役不便於民者具以狀聞便當蠲罷秋七月丙子侍中元义侍中劉騰奉帝幸前殿矯}
