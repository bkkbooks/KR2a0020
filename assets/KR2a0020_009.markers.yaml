  - {type: variant, offset: 7974, length: 334, content: 步不得樵蘇踐蹋丁亥車駕有事於方澤七月廢皇后馮氏戊寅帝以久旱咸秩羣神自癸未不食至于乙酉是夜澍雨大洽丁亥詔曰炎陽爽節秋零卷澍在予之責實深悚慄故輟膳三晨以命上訴靈鑒誠款曲流雲液雖休勿休寧敢愆怠將有賢人湛德高士凝棲雖加銓採未能招致其精訪幽谷舉茲賢彥直言極諫匡予不及又邪佞毀朝固唯治蠹貪夫竊位大政以虧主者彈劾不肖明黜盜祿又法為治要民命尤重在京之囚悉命條奏朕將親案以時議決又疾苦六極人神所矜宜時訪恤以拯窮廢魚眾寡困乏不能自存者明加矜恤令得存濟又輕徭薄賦君人常理歲中役具以狀聞又夫婦之道生民所先仲春奔會禮有達式男女失時者以禮會之又京民始業農桑為本田稼多少課督以不具以狀言八月壬辰朔幸華林園親錄囚徒咸降本罪二等決遣之戊戌車駕幸嵩高甲寅還宮丁巳南安王楨薨幸華林園聽訟九月戊辰車駕閱武於小, WYG: 餘騎渡渭而走雍州}
