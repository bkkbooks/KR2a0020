  - {type: variant, offset: 7036, length: 3, content: 車駕至, WYG: 朔以右光祿大夫劉騰爲衞將軍儀同三司戊申皇太后髙氏崩于瑤光寺冬十月丁卯以尼禮葬於北邙十有二月辛未詔曰民生有終下歸兆域京邑隱賑口盈億萬貴賤攸憑未有定所爲民父母尤宜存恤今制乾脯山以西擬爲九原二年春正月丁亥詔曰朕以沖眇纂承寶位夙夜惟寅若涉淵海頼皇太后慈仁被以夙訓}
