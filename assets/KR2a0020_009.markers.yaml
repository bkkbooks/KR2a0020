  - {type: variant, offset: 7658, length: 0, content: '', WYG: 明允篤誠儀型太階垂風下國實所以予違汝弼致治責成宜班新制宣之遐邇其州郡先上司徒公文悉可改上相府施行符告皆亦如之甲戌詔曰選衆而舉其來自昔朕纉承大業綜理萬幾求賢致治心焉若渴知人則哲振古所難宜博訪公卿採兹聲實可令第一品以下五品以上人各薦其所知不限素身居職必使精辯器藝具注所能然後依牒簡擢隨才収叙庶濟濟之美無替往時謇謇之直有申兹歲蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入宼直城梁州刺史傅竪眼遣息敬紹率衆拒擊大破之擒斬三千餘人休儒等走還魏興是月齊州清河民崔畜殺太守董遵廣川民傅堆執太守劉莾反青州刺史安樂王鑒討平之是月破落汗㧞}
