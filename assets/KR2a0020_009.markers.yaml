  - {type: variant, offset: 7034, length: 0, content: '', WYG: 自正月不雨至于六月辛卯澍雨乃降秋七月河州民却鐵怱聚衆反自稱水池王詔行臺源子恭討之閏月戊戌吐谷渾國遣使朝貢甲辰開恒州銀山之禁與民共之丁未波斯疏勒烏萇龜兹諸國並遣使朝獻八月癸丑朔詔曰朕沖昩纂厯未閑政道皇太后殷憂在疚始覽萬幾故獄犴淹枉百姓寃敝言念繁刑思存降省京師見囚殊死以下可悉減一等丁巳詔曰頃年以來戎車頻動服制未終奪哀從役罔極之痛弗申鞠育之恩靡報非所謂敦崇至道者也自今雖金革之事皆不得請起居喪甲子勿吉國遣使朝貢鐵怱相率降於行臺源子恭九月}
