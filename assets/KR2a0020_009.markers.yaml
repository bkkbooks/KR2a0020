  - {type: variant, offset: 9109, length: 770, content: 愉為京兆王懌為清河王懷為廣平王壬申行幸河南城甲戌講武於華林園庚辰車駕南討九月丙申詔曰哀貧恤老王者所先魚眾寡六疾尤宜矜愍可敕司州洛陽之民年七十已上無子孫六十以上無期親貧不自存者給以衣食及不滿六十而有廢痼之疾無大功之親窮困無以自療者皆於別坊遣醫救護給醫師四人豫請藥物以療之丁酉詔河南尹李崇討梁州叛羌受征西源懷節度辛丑帝留諸將攻赭陽引師而南癸卯至宛城夜襲其郛克之丁未車駕發南陽留太尉咸陽王禧前將軍元英攻之己酉車駕至新野冬十月丁巳四面進攻不克詔左右軍築長圍以守之乙亥追廢貞皇后林氏為庶人十有一月甲午蕭鸞前軍將軍韓秀方弋陽太守王副之後軍將軍趙祖悅等十五將來降丁酉大破賊軍於沔北獲其將軍王伏保等於是民皆復業九十以上假以郡守六十五以上假以縣令新野民張暏柵萬餘家拒守不下十有二月庚申破之俘斬萬餘丁卯詔流徒之囚皆勿決遣有登城之際令其先鋒自效庚午車駕臨沔遂巡沔東還戊寅車駕還新野己卯親行營壘隱恤六軍蕭鸞將王曇紛等萬餘人寇南青州黃郭戍戍主崔僧淵擊破之悉虜其衆以齊郡王子琛紹河間王若後高昌國遣使朝貢二十有二年春正月癸未朔朝饗羣臣於新野行宮丁亥拔新野獲蕭鸞輔國將軍新野太守劉忌斬之於宛戊子鸞湖陽戍主蔡道福棄城遁走辛卯鸞赭陽戍主成公期軍主胡松棄城遁走壬辰鸞輔國將軍舞陰戍主黃瑤起及直閤將軍臺軍主鮑舉南鄉太守席謙相尋遁走瑤起鮑舉為軍人所獲送庚戌行幸南陽二月乙卯進攻宛北城甲子拔之鸞冠軍將軍南陽太守房伯玉面縛出降庚午車駕幸新野辛未詔以穰民首歸大順終始若一者給復三十年標其所居曰歸義鄉次降者給復十五年三月壬午朔大破鸞平北將軍崔惠景黃門郎蕭衍軍於鄧城斬獲首虜二萬有餘庚寅行幸樊城觀兵襄沔耀武而還曲赦二荊魯陽郡鎮南將軍王肅攻鸞義陽鸞遣將裴叔業寇渦陽乙未詔將軍鄭思明嚴虛敬宇文福等三軍繼援辛丑行幸湖陽乙未次比陽戊申詔荊州諸郡之民初降次附復同穰縣辛亥行幸懸瓠夏四月甲寅從征武直之官進, WYG: 即}
