  - {type: variant, offset: 59, length: 1, content: 貢, WYG: 獻丁未詔假右光祿大夫元遙征北大將軍攻討法慶宕昌國遣使朝獻八月乙亥領軍于忠矯詔殺左僕射郭祚尚書裴植免太傅領太尉髙陽王雍官以王還第丙子尊皇太妃爲皇太后己卯吐谷渾國遣使朝獻庚辰蕭衍定州刺史田超秀率衆三千請降戊子帝朝皇太后於宣光殿大赦天下己丑司徒清河王懌進位太傅領太尉司空廣平王懷爲太保領司徒驃騎大將軍任城王澄爲司空庚寅車騎大將軍于忠爲尚書令特進崔光爲車騎大將軍並儀同三司壬辰復前江陽王繼本國以濟南王彧復先封爲臨淮王羣臣奏請皇太后臨朝稱制九月乙巳皇太后親覽萬幾詔曰高祖革禮成治遺澤在民世宗纂承丕業聖德昭逺朕以冲孺屬當寳圖洪基至重若履冰薄王公百辟羣牧庶官皆受遇先朝寵榮自昔宜各勉崇共康世道戮力竭誠以匡輔不逮其有懷道邱園昧跡板築山栖谷飲舒卷從時者宜廣戔帛緝和鼎餁有能讜言直諫濟世益時者在所以聞當待以不次之位孝子順孫義夫節婦表其門閭以彰厥美高年孤獨不能自存者贍以粟帛若因饑失業天屬流離或賣鬻男女以爲僕隸者各聽歸還比冀方未肅徐城宼擾將統久勞士卒疲敝並遣撫慰賜以衣馬緣邊州鎮固捍之勞朔方酋庶北靣所委亦令勞賚以副其心其有先朝舊事寢而不舉頃來便習不依軌式者並可疏聞當加覽裁若益時利治不拘常制者自依别例其明相申約稱朕意焉甲寅征北元遙破斬法慶及渠帥百餘人傳首京師安定王燮薨}
