  - {type: variant, offset: 7655, length: 0, content: '', krp: 其誠効旣亮方加酬錫會宛郢馳𤇺朐泗告警軍旗頻動兵連積歲兹恩仍寢用迄于今怨叛之興頗由於此朕叨承乾厯撫馭宇宙調風布政思廣惠液宜追述前恩敷兹後施諸州鎮軍貫元非犯配者悉免爲民鎮改爲州依舊立稱此等世習干戈率多勁勇今既甄㧞應思報効可三五簡發討彼沙隴當使人齊其力奮擊先驅妖黨狂醜必可蕩滌衝鋒斬級自依恒賞丁酉南秀容牧子于乞真反殺太僕卿陸延别將尒朱榮討平之戊戌莫折念生遣都督竇雙攻盤頭郡東益州刺史魏子建遣將竇念祖討之斬雙擒斬千餘人九月壬申詔尚書左僕射齊王蕭寶夤爲西道行臺大都督率征西將軍都督崔延伯又詔復撫軍將軍北海王顥官爵爲都督並率諸將西討乙亥帝幸明堂餞寶夤等是月蕭衍遣將裴邃虞鴻襲據夀春外城刺史長孫稚擊走之邃退屯黎漿詔河間王琛總衆援之衍又遣將宼淮陽詔祕書監安樂王鑒率衆討之吐谷渾主伏連籌兵討涼州于菩提棄城走追斬之城民趙天安復推宋穎爲刺史冬十月營州城人劉安定就德興據城反執刺史李仲遵城人王惡兒斬安定以降德興東走自號燕王胡琛遣其將宿勤明達宼豳夏北華三州壬午詔都督北海王顥率諸將討之十有一月戊申莫折天生攻陷岐州執都督元志及刺史裴芬之髙平人攻殺卜朝共迎胡琛十有二月壬辰詔太傅京兆王繼爲太師大將軍率諸將討之嚈噠契丹地豆干厙莫奚諸國並遣使朝貢汾州正平平陽山胡叛逆詔復征東將軍章武王融封爵爲大都督率衆討之山南行臺東益州刺史魏子建招降南秦氐民復六郡十二戍又斬賊王韓祖香南秦賊王張長命畏逼乃告降於蕭寳夤是月莫折念生遣兵攻涼州城人趙天安復執刺史以應之孝昌元年春正月庚申徐州刺史元法僧據城反害行臺髙諒自稱宋王號年天啓遣其子景仲歸於蕭衍衍遣其將胡龍牙成景雋元略等率衆赴彭城詔祕書監安樂王鑒囘師以討之鑒於彭城南擊元略大破之盡俘其衆既而不備爲法僧所敗衍遣其豫章王綜入守彭城法僧擁其寮屬守令兵戍及郭邑士女萬餘口南入詔鎮軍將軍臨淮王彧尚書李憲爲都督衞將軍國子祭酒安豐王延明爲東道行臺復儀同三司李崇官爵爲東道大都督俱討徐州崇以疾不行癸亥蕭寳夤崔延伯大破秦賊於黑水斬獲數萬天生退走入隴西涇岐及隴東悉平以太師大將軍京兆王繼爲太尉餘官如故二月以領軍將軍元义爲驃騎大將軍儀同三司詔追復樂浪王長命本爵以其子忠紹之侍中}
