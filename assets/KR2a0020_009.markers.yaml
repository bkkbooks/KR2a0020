  - {type: variant, offset: 7657, length: 0, content: '', WYG: 衞大將軍穆紹爲儀同三司戊戌大赦壬辰莫折念生遣都督楊鮓梁下辯姜齊等攻仇池郡城行臺東益州刺史魏子建遣將盛遷擊破之斬下辯齊等首壬寅詔曰勸善黜惡經國茂典其令毎歲一終郡守列令長刺史列守相以定考課辯其能否若有濫謬以考功失𠂻論是月齊州魏郡民房伯和聚衆反會赦乃散三月己巳詔太尉西道都督京兆王繼班師壬申詔曰丞相髙陽王道德淵}
