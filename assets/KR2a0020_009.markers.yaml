  - {type: variant, offset: 10261, length: 1, content: 保, WYG: 后詔曰皇家握歴受圖年將二百祖宗累聖社稷載安髙祖以文思先天世宗以下武經世股肱惟良元首穆穆及大行在御重以寛仁奉養率由溫明恭順朕以寡昩親臨萬國識謝塗山德慙文母屬妖逆遞興四郊多故實望穹靈降祐麟趾衆繁自潘充華有孕椒宮冀誕儲兩而熊羆無兆維虺遂彰于時直以國步未康假稱統𦙍欲以底定物情係仰宸極何圖一旦弓劒莫追國道中微大行絶祀皇曾孫故臨洮王寳暉世子釗體自髙祖天表卓異大行平日養愛特深義}
