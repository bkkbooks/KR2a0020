  - {type: variant, offset: 7073, length: 0, content: '', WYG: 后詔曰魏有天下奕葉重光髙祖孝文皇帝以英聖馭天徙京定鼎世宗宣武皇帝以睿明承業廓寧區夏而鴻勲未半早已登遐乃令車書弗同鯨宼尚熾幼主稚弱夙纂寶厯曾是宗祏莫克祗奉朕所以敬順羣請臨朝總政帝年以長久思退身所以往歲殷勤具陳情㫖百官内外已照此懷而僉爾衆意苦見勤奪僶俛從事以迄于兹自此春來先疾屢發藥石攝療莫能善瘳夏首及今數加動劇便不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫輯萬邦諧決百揆朕當率前志敬遜别宮逺惟復}
