  - {type: variant, offset: 5719, length: 0, content: '', WYG: 曰察訟理寃實維政首躬親聽覽民信所由比日諒闇之中治綱未振獄犴繁廣嗟訴驟聞雖曰司存每多誣壅曾是寡德實深矜慨自今月望當蹔出城闉親納滯枉主者可宣諸近逺咸使聞知是月城青齊兖涇平營肆七州所治東陽歴城瑕丘平涼肥如和龍九原七城冬十月庚寅以幽冀滄瀛四州大饑遣尚書長孫稚兼尚書鄧羡元纂等廵撫百姓開倉賑恤丁酉年吕國貢楛矢戊戌以光州饑敝遣使賑恤乙卯詔曰北京根舊帝業所基南遷二紀猶有留住懷本樂故未能自遣若未遷者悉可聽其仍停安堵永業門才術藝應於時求者自别徵引不在斯例周之子孫漢之劉族遍於海内咸致蕃衍豈拘南北千里而已哉十有一月甲子蕭衍平西將軍巴州刺史牟漢寵遣使請降十有二月丁未蠕蠕國遣使朝貢神龜元年春正月甲子詔以氐酋楊定爲隂平王丙寅以特進江陽王繼爲驃騎大將軍儀同三司壬申詔曰朕沖昧撫運政道未康民之疾苦弗遑紀恤夙宵矜慨鑒寐深懐眷彼百齡悼兹}
