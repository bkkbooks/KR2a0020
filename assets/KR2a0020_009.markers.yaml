  - {type: variant, offset: 6364, length: 237, content: 之民百齡以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡魚眾老不能自存者賜以穀帛緣路之民復田租一歲孝悌廉義文武應求具以名聞戊辰車駕至懸瓠己巳詔壽陽鍾離馬頭之師所獲男女之口皆放還南十有九年春正月辛未朔朝饗羣臣於懸瓠癸酉詔禁淮北之民不得侵掠犯者以大辟論甲戌檄喻蕭鸞丙子鸞龍陽縣開國侯王朗自渦陽來降壬午講武於汝水之西大賚六軍丙申平南將軍王肅頻破蕭鸞將擒其寧州刺史董巒己亥車駕濟淮二月甲辰幸八公山路中雨甚詔去蓋見軍士病者親隱恤之戊申車駕巡淮而東民皆安堵租運屬路壬子高麗, WYG: 氐反蠕蠕}
