  - {type: variant, offset: 10787, length: 142, content: 以帝聰聖後或不利於馮氏將謀廢帝乃於寒月單衣閉室絕食三朝召咸陽王禧將立之元丕穆泰李冲固諫乃止帝初不有憾唯深德丕等撫念諸弟始終曾無纖介惇睦九族禮敬俱深雖於大臣持法不縱然性寬慈每垂矜捨進食者曾以熱羹傷帝手又曾於食中得蟲穢之物並笑而恕之宦者先有譖帝於太后太后大怒杖帝數十帝默然而受不自申明太后, WYG: 幼主}
