  - {type: variant, offset: 4418, length: 852, content: 庫莫奚諸國並遣使朝獻壬戌宴四廟子孫於宣文堂帝親與之齒行家人之禮甲子帝臨朝堂引見公卿已下決疑政錄囚徒丁丑以旱撤膳襄陽蠻酋雷婆思等率一千三百餘戶內徙居於太和川六月丙戌帝將南伐詔造河橋己丑詔免徐南豫陝岐東徐洛豫七州軍糧丁未講武乙巳詔曰六職備于周經九列炳於漢晉務必有人守其職比百秩雖陳事典未自八元樹位躬加省覽遠依往籍近採時宜作職員令二十一卷事迫戎期未善周悉雖不足綱範萬度永垂不朽且可釋滯目前釐整時務須待軍回更論所闕權可付外施行其有當局所疑而令文不載者隨事以聞當更附之立皇子恂為皇太子戊申高麗國遣使朝獻秋七月癸丑以皇太子立詔賜民為人後者爵一級為公士曾為吏屬者爵二級為上造魚眾寡孤獨不能自存者人粟五斛戊午中外戒嚴是月蕭賾死孫昭業僭立八月乙酉三老山陽郡公尉元薨丙戌車駕類於上帝遂臨尉元喪丁亥帝辭永固陵己丑車駕發京師南伐步騎百餘萬太尉丕奏請以宮人從詔曰臨戎不語內事宜停來請壬寅車駕至肆州民年七十已上賜爵一級路見眇跛者停駕親問賜衣食終身戊申幸并州親見高年問所疾苦九月壬子詔兼員外散騎常侍高聰兼員外散騎侍郎賈禎使於蕭昭業丁巳詔以車駕所經傷民秋稼者畝給穀五斛戊辰濟河詔洛懷并肆所過四州之民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級魚眾寡孤獨不能自存者粟人五斛帛二匹孝悌廉義文武應求者皆以名聞又詔廝養之戶不得與士民婚有文武之才積勞應進者同庶族例聽之庚午幸洛陽周巡故宮基趾帝顧謂侍臣曰晉德不修早傾宗祀荒毀至此用傷朕懷遂詠黍離之詩為之流涕壬申觀洛橋幸太學觀石經乙亥鄧至王像舒彭遣子舊詣闕朝貢并奉表求以位授舊詔許之丙子詔六軍發軫丁丑戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月戊寅朔幸金墉城詔徵司空穆亮與尚書李沖將作大匠董爵經始洛京己卯幸河南城乙酉幸豫州癸巳次於石濟乙未解嚴設壇於滑臺城東告行廟以遷都之意大赦天下起滑臺宮又詔京師及諸州從戎者賜爵一級應募者加二級主將三級癸卯幸鄴城乙巳詔安定王休率從官迎家於代京車駕送於漳水上初帝之南伐也起宮殿於鄴西十有一月癸亥宮成徙御焉十有二月戊寅巡省六軍庚寅陰平, WYG: ''}
