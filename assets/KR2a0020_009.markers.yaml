  - {type: variant, offset: 1153, length: 1850, content: 宕昌國遣使朝貢甲午詔曰日月薄蝕陰陽之度耳聖人懼人君之放怠因之以設誡故稱日蝕修德月蝕修刑廼癸巳夜月蝕盡公卿已下宜慎刑罰以答天意丁酉起宣文堂經武殿癸卯侍中司徒淮南王他薨吐谷渾宕昌武興諸國各遣使朝貢閏月甲子帝觀築圓丘於南郊乙丑高麗國遣使朝貢辛未幸靈泉池癸酉還宮十有一月詔以二雍豫三州民飢開倉賑恤梁州刺史臨淮王提坐貪縱徙配北鎮十有二月蠕蠕伊吾戍主高羔子率衆三千以城內附以侍中安豐王猛為開府儀同三司十有三年春正月辛亥車駕有事於圓丘於是初備大駕乙丑兗州民王伯恭聚衆勞山自稱齊王東萊鎮將孔伯孫討斬之戊辰蕭賾遣衆寇邊淮陽太守王僧儁擊走之二月壬午高麗國遣使朝獻庚子引羣臣訪政道得失損益之宜三月甲子吐谷渾國遣使朝獻夏州刺史章武王彬以貪賕削封夏四月丁丑詔曰昇樓散物以賚百姓至使人馬騰踐多有毀傷今可斷之以本所費之物賜窮老貧獨者丁亥幸靈泉池遂幸方山己丑還宮吐谷渾國遣使朝貢州鎮十五大飢詔所在開倉賑恤五月庚戌車駕有事於方澤六月汝陰王天賜南安王楨並坐贓賄免為庶人高麗國遣使朝貢秋七月甲辰陰平國遣使朝貢丙寅幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師八月乙亥詔兼員外散騎常侍邢產兼員外散騎侍郎侯靈紹使於蕭賾戊子詔諸州鎮有水田之處各通溉灌遣匠者所在指授中尺國遣使朝貢九月丁未吐谷渾武興宕昌諸國各遣使朝獻出宮人以賜北鎮人貧魚眾無妻者冬十月甲申高麗國遣使朝貢十有一月己未安豐王猛薨十有二月丙子侍中司空河東王苟頹薨甲午蕭賾遣使朝貢己亥以尚書令尉元為司徒左僕射穆亮為司空是歲蠕蠕別帥叱呂勤率衆內附十有四年春正月乙丑行幸方山二月辛未行幸靈泉池壬申還宮戊寅初詔定起居注制己卯詔遣侍臣循行州郡問民疾苦三月壬申吐谷渾宕昌武興陰平諸國並遣使朝貢夏四月地豆于頻犯塞甲戌征西大將軍陽平王頤擊走之甲午詔兼員外散騎常侍邢產兼員外散騎侍郎蘇季連使於蕭賾五月己酉庫莫奚犯塞安州都將樓龍兒擊走之沙門司馬惠御自言聖王謀破平原郡擒獲伏誅秋七月甲辰詔罷都牧雜制丙午行幸方山丙辰遂幸靈泉池高麗國遣使朝八月丙寅朔車駕還宮辛卯宕昌國遣使朝貢詔議國之行次九月癸丑太皇太后馮氏崩壬戌高麗國遣使朝貢詔聽蕃鎮曾經內侍者前後奔赴冬十月戊辰詔曰自丁荼苦奄踰晦朔仰遵遺旨祖奠有期朕將親侍龍輿奉訣陵隧諸常從之具悉可停之其武衞之官防侍如法癸酉葬文明太皇太后於永固陵甲戌車駕謁永固陵羣臣固請公除帝不許己卯車駕謁永固陵庚辰帝居廬引見羣僚於太和殿太尉東陽王丕等據權制固請帝引古禮往復羣臣乃止語在禮志京兆王太興有罪免官削爵詔曰公卿屢依金冊遺旨中代權式請過葬即吉朕思遵遠古終三年之制依禮既虞卒哭此月二十一日授服以葛易麻既衰服在上公卿不得獨釋於下故於朕之授服變從練禮已下復為節降斟酌今古以制厥衷且取遺旨速除之一端粗申臣子罔極之巨痛癸未詔曰朕遠遵古式欲終三年之禮百辟羣官據金冊顧命將奪朕心從先朝之制朕仰惟金冊俯自推省取諸二衷不許衆議以衰服過期終四節之慕又奉聖訓聿修誥旨不敢闇默自居以曠機政庶不愆遺令之意差展哀慕之情普下州鎮長至三元絕告慶之禮甲申車駕謁永固陵辛卯詔曰羣官以萬機事重請求聽政朕仰祗遺命亦思無怠但哀慕纏綿心神迷塞未堪自力以親政事近侍先掌機衡者皆謀猷所寄且可任之如有疑事當時與論決十有一月甲寅詔曰垂及至節感慕崩摧凡在臣列誰不哽切內外職人先朝班次及諸方雜客冬至之日盡聽入臨三品已上衰服者至夕復臨其餘唯旦臨而已其拜哭之節一依別儀丁巳蕭賾遣使朝貢十有二月壬午詔依準丘井之式遣使與州郡宣行條制隱口漏丁即聽附實若朋附豪勢陵抑孤弱罪有常刑十五年春正月丁卯帝始聽政於皇信東室初分置左右史官吐谷渾國遣使朝貢二月乙亥枹罕鎮將長孫百年請討吐谷渾所置洮陽泥和二戍許之己丑蕭賾遣使朝貢三月甲辰車駕謁永固陵己酉悉萬斤等五國遣使朝貢夏四月癸亥帝始進蔬食乙丑謁永固陵自正月不雨至于癸酉有司奏祈百神詔曰昔成湯遇旱齊景逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在予一人今普天喪恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便欲祀事唯當考躬責己以待天譴甲戌詔員外散騎常侍李彪尚書郎公孫阿六頭使於蕭賾己卯經始明堂改營太廟五月己亥議改律令於東明觀折疑獄乙卯百年攻洮陽泥和二戍克之俘獲三千餘人詔悉免歸高麗國遣使朝獻丙辰詔造五輅六月丁未濟陰王鬱以貪殘賜死秋七月乙丑謁永固陵規建壽陵戊寅吐谷渾國遣使朝貢己卯詔議祖宗以道武為太祖乙酉車駕巡省京邑聽訟而還八月壬辰議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之戊戌移道壇於桑乾之陰改曰崇虛寺己亥詔諸州舉秀才先盡才學乙巳親定禘祫之禮丁巳議律令事仍省雜祀九月辛巳蕭賾遣使朝貢壬午吐谷渾高麗, WYG: ''}
