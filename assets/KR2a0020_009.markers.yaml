  - {type: variant, offset: 7588, length: 4, content: 圓丘甲申, WYG: 服章庚辰以東益南秦氐反詔中軍將軍河間王琛討之失利三年春正月辛亥帝耕籍田夏四月庚辰以髙車國主覆羅伊匐爲鎭西將軍西海郡開國公髙車王六月己巳詔曰朕以沖昧夙纂寶厯不能祗奉上靈感延和氣致令炎旱頻歲嘉雨弗洽百稼燋萎晚種未下將成災年秋稔莫覬在予之責憂懼震懷今可依舊分遣有司馳祈嶽瀆及諸山川百神能興雲雨者盡其虔肅必令感降玉帛牲牢隨應薦享上下羣官側躬自厲理寃獄止土功減膳撤懸禁止屠殺秋七月壬子波斯不漢龜兹諸國遣使朝貢冬十月己巳吐谷渾國遣使朝貢十有一月乙巳車駕}
