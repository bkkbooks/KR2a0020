  - {type: 'tls:seg', offset: 7654, content: '', id: KR2a0020_ZHSJ_009-d9p46s36}
  - {type: variant, offset: 7654, length: 0, content: '', WYG: 都督崔暹失利于白道大都督李崇率衆還平城坐長史祖瑩截没軍資免除官爵丁丑念生遣其都督楊伯年樊元張朗等攻仇鳩河池二戍東益州刺史魏子建遣將尹祥黎叔和擊破之斬樊元首殺賊千餘人是月凉州幢帥于菩提呼延雄執刺史宋穎據州反念生遣其兄髙陽王天生下隴東宼八月甲午元志大敗於隴東退守岐州丙申詔曰賞貴宿勞明主恒德恩沾舊績哲后常範太祖道武皇帝應期撥亂大造區夏世祖太武皇帝纂戎丕緒光闡王業躬率六師埽清逋穢諸州鎮城人本充牙爪服勤征旅契闊行間備嘗勞劇逮顯祖獻文皇帝自北被南淮海思乂便差割彊族分衞方鎮髙祖孝文皇帝逺遵盤庚將遷嵩洛規遏北疆蕩闢南境選良家酋帥增戍朔垂戎捍所寄實惟斯等先帝}
  - {type: page-break, offset: 7654, content: '', id: KR2a0020_WYG_009-21a, image: WYG0261/WYG0261-0162c.png}
  - {type: variant, offset: 7654, length: 0, content: '', krp: 都督崔暹失利于白道大都督李崇率衆還平城坐長史祖瑩截没軍資免除官爵丁丑念生遣其都督楊伯年樊元張朗等攻仇鳩河池二戍東益州刺史魏子建遣將尹祥黎叔和擊破之斬樊元首殺賊千餘人是月凉州幢帥于菩提呼延雄執刺史宋穎據州反念生遣其兄髙陽王天生下隴東宼八月甲午元志大敗於隴東退守岐州丙申詔曰賞貴宿勞明主恒德恩沾舊績哲后常範太祖道武皇帝應期撥亂大造區夏世祖太武皇帝纂戎丕緒光闡王業躬率六師埽清逋穢諸州鎮城人本充牙爪服勤征旅契闊行間備嘗勞劇逮顯祖獻文皇帝自北被南淮海思乂便差割彊族分衞方鎮髙祖孝文皇帝逺遵盤庚將遷嵩洛規遏北疆蕩闢南境選良家酋帥增戍朔垂戎捍所寄實惟斯等先帝}
  - {type: variant, offset: 7655, length: 0, content: '', WYG: 其誠効旣亮方加酬錫會宛郢馳􅇏朐泗告警軍旗頻動兵連積歲兹恩仍寢用迄于今怨叛之興頗由於此朕叨承乾厯撫馭宇宙調風布政思廣惠液宜追述前恩敷兹後施諸州鎮軍貫元非犯配者悉免爲民鎮改爲州依舊立稱此等世習干戈率多勁勇今既甄㧞應思報効可三五簡發討彼沙隴當使人齊其力奮擊先驅妖黨狂醜必可蕩滌衝鋒斬級自依恒賞丁酉南秀容牧子于乞真反殺太僕卿陸延别將尒朱榮討平之戊戌莫折念生遣都督竇雙攻盤頭郡東益州刺史魏子建遣將竇念祖討之斬雙擒斬千餘人九月壬申詔尚書左僕射齊王蕭寶夤爲西道行臺大都督率征西將軍都督崔延伯又詔復撫軍將軍北海王顥官爵爲都督並率諸將西討乙亥帝幸明堂餞寶夤等是月蕭衍遣將裴邃虞鴻襲據夀春外城刺史長孫稚擊走之邃退屯黎漿詔河間王琛總衆援之衍又遣將宼淮陽詔祕書監安樂王鑒率衆討之吐谷渾主伏連籌兵討涼州于菩提棄城走追斬之城民趙天安復推宋穎爲刺史冬十月營州城人劉安定就德興據城反執刺史李仲遵城人王惡兒斬安定以降德興東走自號燕王胡琛遣其將宿勤明達宼豳夏北華三州壬午詔都督北海王顥率諸將討之十有一月戊申莫折天生攻陷岐州執都督元志及刺史裴芬之髙平人攻殺卜朝共迎胡琛十有二月壬辰詔太傅京兆王繼爲太師大將軍率諸將討之嚈噠契丹地豆干厙莫奚諸國並遣使朝貢汾州正平平陽山胡叛逆詔復征東將軍章武王融封爵爲大都督率衆討之山南行臺東益州刺史魏子建招降南秦氐民復六郡十二戍又斬賊王韓祖香南秦賊王張長命畏逼乃告降於蕭寳夤是月莫折念生遣兵攻涼州城人趙天安復執刺史以應之孝昌元年春正月庚申徐州刺史元法僧據城反害行臺髙諒自稱宋王號年天啓遣其子景仲歸於蕭衍衍遣其將胡龍牙成景雋元略等率衆赴彭城詔祕書監安樂王鑒囘師以討之鑒於彭城南擊元略大破之盡俘其衆既而不備爲法僧所敗衍遣其豫章王綜入守彭城法僧擁其寮屬守令兵戍及郭邑士女萬餘口南入詔鎮軍將軍臨淮王彧尚書李憲爲都督衞將軍國子祭酒安豐王延明爲東道行臺復儀同三司李崇官爵爲東道大都督俱討徐州崇以疾不行癸亥蕭寳夤崔延伯大破秦賊於黑水斬獲數萬天生退走入隴西涇岐及隴東悉平以太師大將軍京兆王繼爲太尉餘官如故二月以領軍將軍元义爲驃騎大將軍儀同三司詔追復樂浪王長命本爵以其子忠紹之侍中}
