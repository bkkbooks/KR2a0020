  - {type: variant, offset: 7060, length: 3, content: 行飲至, WYG: 蠕蠕莫緣梁賀侯豆率男女七百人來降十有二月癸丑司徒任城王澄薨庚申大赦天下詔除淫祀焚諸雜神是歳高麗王雲死以世子安爲其國王正光元年春正月乙酉詔曰建國緯民立敎爲本尊師崇道兹典自昔來歲仲陽節和氣潤釋奠孔顔乃其時也有司可豫繕國學圖飾聖賢置官簡牲擇吉備禮夏四月丙辰詔尚書長孫稚廵撫北藩觀察風俗五月辛巳詔曰朕以寡薄運膺寶圖雖未明求衣惕懼終日而闇昧多闕炎旱爲災在予}
