  - {type: variant, offset: 7634, length: 0, content: '', WYG: 尚書令李崇中軍將軍兼尚書右僕射元纂率騎十萬討蠕蠕出塞三千餘里不及而還秋七月辛亥詔曰達尊斯在齒預一焉崇敬黄耉先代通訓故方叔以元老處位充國緣自彊見留雖七十致仕明乎典故然以德尚壯許其縶維今庶寮之中或年廹懸車循禮宜退但少収其力老弃其身言念勤舊睠然未忍或戴白在朝未當外任或停私歴紀甫受考級如此之徒雖滿七十聽其莅民以終常限或新解郡縣或外佐始停已滿七十方求更叙者吏部可依令不奏其有髙名俊德老成髦士灼然顯達爲時所知者不拘斯例若才非秀異見在朝官依令合解者可給本官半祿以終其身使辭朝之叟不恨歸於閭巷矣八月己巳詔曰狂蠢肆暴陵竊北垂雖軍威時接賊徒懾遁然獯虐所過多離其禍言念斯敝有軫深懷可勑北道行臺遣使廵檢遭宼之處饑餒不粒者厚加賑恤務令存濟戊寅詔曰朕以眇闇沗承鴻緒因祖宗之基託王公之上每鑒寐屬慮思康億兆比雨旱愆時星運舛錯政理闕和靈祇表異永尋夕惕載恧于懷宜詔百}
