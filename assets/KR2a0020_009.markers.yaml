  - {type: variant, offset: 8554, length: 514, content: 常侍劉藻巡方省察問民疾苦黜陟守宰宣揚風化乙巳車駕北巡二月壬戌次於太原親見高年問所不便乙丑詔并州士人年六十已上假以郡守先是定州民王金鈎訛言惑衆自稱應王丙寅州郡捕斬之癸酉車駕至平城甲戌謁永固陵癸未行幸雲中三月庚寅車駕至自雲中辛卯謁金陵乙未車駕南巡己酉次離石叛胡歸罪宥之甲寅詔汾州民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級丙辰車駕次平陽遣使者以太牢祭唐堯夏四月庚申幸龍門遣使者以太牢祭夏禹癸亥行幸蒲坂遣使者以太牢祭虞舜戊辰詔修堯舜夏禹廟辛未行幸長安壬申武興王楊集始來朝乙亥親見高年問所疾苦丙子遣侍臣分省縣邑賑賜穀帛戊寅幸未央殿阿房宮遂幸昆明池癸未大將軍宋王劉昶薨丙戌遣使者以太牢祀漢帝諸陵五月丁亥朔衞大國遣使朝貢己丑車駕東旋汎渭入河庚寅詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣令七十以上假荒縣庶老以年各減一等七十以上賜爵三級其營船之夫賜爵一級孤寡魚眾貧窮痾廢疾各賜帛二匹穀五斛其孝友德義文學才幹悉仰貢舉壬辰遣使者以太牢祭周文王於酆祭武王於鎬癸卯遣使祭華嶽六月庚申車駕至自長安壬戌詔冀定瀛相濟五州發卒二十萬將以南討癸亥司空穆亮遜位丁卯部分六師以定行留秋七月甲午立昭儀馮氏為皇后戊辰以前司空穆亮為征北, WYG: ''}
