  - {type: variant, offset: 7660, length: 0, content: '', krp: 也不盧等攻陷懷朔鎮夏四月蕭衍益州刺史蕭淵猷遣將樊文熾蕭世澄等率衆圍小劒戍益州刺史邴虬遣子子達行臺魏子建遣别將淳于誕拒擊之辛卯皇太后復臨朝攝政引羣臣面陳得失詔曰朕以寡昧夙承天厯茫若涉海罔知所濟實憑宗社降祐之靈庶勉幼志以康世道而神龜之末權臣擅命元义劉騰隂相影響遂使皇太后幽隔後宮太傅清河王無辜致害相州刺史中山王熙横被夷滅右衛將軍奚康生仍見誅翦從此已後無所畏忌恣諸侵求任所與奪無君之心積習稍久不臣之迹緣事彌彰蔽耳目之明專生殺之柄天下爲之不康四郊由兹多壘此而可忍孰不可懷雖屢經赦宥未容致之于法猶宜辨正以謝朝野騰身既往可追削爵位义之罪狀誠合徽纒但以宗枝舅戚特加全貸可除名爲民壬辰征西將軍都督崔延伯大敗於涇川戰殁五月戊辰淳于誕等大破蕭衍軍俘斬萬計擒蕭世澄等十一將文熾僅以身免走成都戊子驃騎大將軍儀同三司李崇薨六月癸未大赦改年詔文武之官從軍二百日文官優一級武官優二級蠕蠕主阿那瓌率衆大破㧞陵斬其將孔雀等諸將逼彭城蕭綜夜潛出降蕭衍諸將奔退衆軍追躡免者十一二秋八月癸酉詔斷逺近貢獻珍麗違者免官柔𤣥鎮人杜洛周率衆反於上谷號年真王攻没郡縣南圍燕州戊子莫折念生遣都督杜黑兒杜光等攻仇池郡行臺魏子建遣將成遷擊破之斬杜光首九月乙卯詔減天下諸調之半丙辰詔左將軍幽州刺史常景爲行臺征虜將軍元譚爲都督以討洛周辛酉詔曰追功表德爲善者勸祖宗功臣勒銘王府而子孫廢替淪於凡民爵位無聞遷流有失潁川名守重泉令宰惠風美政結於民心而猶同常品未蒙襃陟非所謂愛及甘棠彞倫攸叙者也其功臣名將爲先朝所知子孫屈塞不見齒敘牧守令長聲稱卓然者皆仰有司具以名聞朕將振彼幽滯用闡治風壬戌詔百官五品已上各舉所知辛未曲赦南北兩秦州冬十月蠕蠕國主阿那瓌遣使朝貢是月吐谷渾國復討趙天安降之河州長史元永平治中孟賔等推嚈噠使主髙徽行州事而前刺史梁釗子景進攻殺之景進又自行州事冬十有一月辛亥詔曰大孝榮親著之昔典故安平耄耋諸子滿朝自今諸有父母年八十以上者皆聽居官祿養溫清朝夕時四方多事諸蠻復反十有二月壬午詔曰髙祖以大明定功世宗以下武寧亂聲溢朔南化清中宇業盛隆周祚延七百朕幼齡纂厯夙馭鴻基戰戰兢兢若臨淵谷闇於治道政刑未孚權臣擅命亂我朝式致使西秦跋扈朔漠搆妖蠢爾荆蠻氛埃不息孔熾甚於涇陽出軍切於細栁而師旅盤桓留滯不進北淯懸危南陽告急將虧荆沔之地以致蹙國之憂今茅轂扼腕爪牙歎憤並欲摧挫封豕勦截長蛇使人神兩泰幽明獻吉朕將躬馭六師埽蕩逋穢其配衣六軍分隸熊虎前驅後隊左翼右師必令將帥雄果軍吏朋濟糧仗車馬速度時須其有失律亡軍兵戍逃叛盜賊劫掠伏竄山澤者免其往咎錄其後効别立募格聽其自新廣下州郡令赴軍所今先討荆蠻疆理南服戈旗東指埽平淮外然後奮七萃於西戎騰五牛於北狄躬撫亂離之苦面恤饑寒之患爾乃還蹕嵩宇飲至廟庭沉璧河洛告成泰岱豈不盛歟百官内外牧守軍宰宜各肅勤用明爾職山胡劉蠡升反自稱天子置官寮是月以臨淮王彧爲征南大將軍率衆討魯陽蠻二年春正月庚戌封廣平王懷庶長子太常少卿誨爲范陽王壬子以太保汝南王悦領太尉是月都督元譚次於軍都爲洛周所敗五原降戸鮮于修禮反於定州號魯興元年詔左光祿大夫長孫稚為使持節假驃騎將軍大都督北討諸軍事與都督河間王琛率將討之二月甲申帝皇太后臨大夏門親覽寃訟是月疊伏羅國遣使朝貢三月庚子以驃騎大將軍徐州刺史安豐王延明爲儀同三司追復中山王熙本爵子叔仁紹之甲寅西部勑勒斛律洛陽反於桑乾西與河西牧子通連别將尒朱榮擊破之夏四月大赦天下癸巳以侍中車騎大將軍城陽王徽爲儀同三司朔州城人鮮于阿胡庫狄豐樂據城反丁未都督李琚次於薊城之北又爲洛周所敗琚戰殁戊申以驃騎大將軍開府齊王寳夤爲儀同三司北討都督河間王琛長孫稚失利奔還詔免琛稚官爵庫莫奚國遣使朝貢五月丁未車駕將北討内外戒嚴前給事黄門侍郎元略自蕭衍還朝封義陽王以丞相髙陽王雍爲大司馬吏部尚書廣陽王淵爲驃騎大將軍儀同三司尋爲大都督率都督章武王融北討修禮戊申燕州刺史崔秉率衆棄城南走中山乙丑以安西將軍光祿大夫宗正珍孫爲都督討汾州反胡六月己巳曲赦齊州絳蜀陳雙熾聚衆反自號始建王曲赦平陽建興正平三郡詔假鎮西將軍都督長孫稚討雙熾平之丙子義陽王略改封東平王衞大將軍西道都督元恒芝爲車騎大將軍儀同三司戊寅詔復京兆王繼本封江陽王戊子詔曰自運屬艱棘歴載於兹𤇺驛交馳旌鼓不息祖宗盛業危若綴旒社稷鴻基殆將淪墜朕威德不能遐被經略無以及逺俾令蒼生罹此塗炭何以茍安黄屋無愧黔黎今便避居正殿蔬餐素服當親自招募収集忠勇其有直言正諫之士敢決徇義之夫二十五日悉集華林東門人别引見共論得失班告内外咸使聞知乙未以衞將軍東平王略爲左光祿大夫儀同三司秋七月丙午杜洛周遣其别帥曹紇真宼掠幽州行臺常景遣都督于榮邀于粟園大破之斬紇真獲三千餘級牛驢二萬餘頭戊申恒州陷行臺元纂奔冀州甲子蕭衍將元樹湛僧珍等宼夀春八月丙子進封廣川縣開國公元邵爲常山王以驃騎大將軍東道行臺臨淮王彧爲儀同三司戊寅帝幸南石窟寺即日還宮戊子進散騎常侍御史中尉武城縣開國公子攸爲長樂王都督伊瓫生討巴失利戰殁癸巳賊帥元洪業斬鮮于修禮請降爲賊黨葛榮所殺都督尒朱榮於肆州執刺史尉慶賔令其從叔}
  - {type: variant, offset: 7661, length: 2, content: 為征, WYG: 生統州事九月辛亥葛榮敗都督廣陽王淵章武王融於博野白牛邏融殁於陣榮自稱天子號曰齊國年稱廣安甲申常景又破洛周斬其武川王賀㧞文興别帥侯莫陳升生擒男女四百口牛驢五千餘頭就德興攻陷平州殺刺史王買奴是月莫折天生請降蕭寳夤使行臺左丞崔士和入據秦州天生復叛送士和於胡琛殺之冬十有一月戊戌杜洛周攻陷幽州執刺史王延年及行臺常景丙午税京師田租畝五升借賃公田者畝一升閏月税市人出入者各一錢店舍爲五等齊州平原民劉樹劉蒼生聚衆反州軍破走之劉樹奔蕭衍衍將原樹逼夀春揚州刺史李憲力屈以城降之初留州郡縣及長史司馬戍主副質子於京師衍又遣將攻逼新野詔都督魏承祖討之詔曰頃舊京淪覆中原喪亂宗室子女屬籍在七廟之内爲雜戸濫門所拘辱者悉聽離絶三年春正月甲戌以司空公皇甫度爲司徒儀同三司蕭寳夤爲司空車騎將軍北海王顥爲車騎大將軍儀同三司徐州民任道棱聚衆反襲據蕭城以叛州軍討平之辛巳葛榮陷殷州刺史崔楷固節死之遂}
