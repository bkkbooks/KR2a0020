  - {type: variant, offset: 7650, length: 1, content: 楨, WYG: 悦入居門下與丞相髙陽王雍參決尚書奏事冬十有一月丙申趙郡王謐薨丁酉太保崔光薨十有二月蕭衍遣將宼邊詔假征南將軍崔延伯討之以太尉汝南王悦爲太保徐州刺史北海王顥坐貪汙削除官爵五年春正月辛丑車駕有事於南郊閏二月癸巳嚈噠國遣使朝貢三月沃野鎮人破落汗㧞陵聚衆反殺鎭將號真王元年詔臨淮王彧爲鎮軍將軍假征北將軍都督北征諸軍事以討之夏四月髙平酋長胡琛反自稱髙平王攻鎮以應㧞陵别將盧祖遷擊破之琛北遁五月臨淮王彧敗於五原削除官爵壬申詔尚書令李崇爲大都督率廣陽王淵等北討六月秦州城人莫折太提據城反自稱秦王殺刺史李彦詔雍州刺史元志討之南秦州城人孫掩張長命韓祖香據城反殺刺史崔遊以應太提太提遣城人卜朝襲克髙平殺鎭將赫連略行臺髙元榮太提尋死子念生代立僭稱天子號年天建置立百官丁酉大赦秋七月甲寅詔吏部尚書元脩義兼尚書僕射爲西道行臺率諸將西討戊午}
