  - {type: variant, offset: 10930, length: 416, content: 後亦不以介意聽覽政事莫不從善如流哀矜百姓思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑為倦尚書奏案多自尋省百官大小無不留心務於周洽每言凡為人君患於不均不能推誠御物苟能均誠胡越之人亦可親如兄弟常從容謂史官曰直書時事無諱國惡人君威福自己史復不書將何所懼南北征巡有司奏請治道帝曰粗修橋梁通輿馬便止不須去草剗令平也凡所修造不得已而為之不為不急之事損民力也巡幸淮南如在內地軍事須伐民樹者必留絹以酬其直民稻粟無所傷踐諸有禁忌禳厭之方非典籍所載者一皆除罷雅好讀書手不釋卷五經之義覽之便講學不師受探其精奧史傳百家無不該涉善談莊老尤精釋義才藻富贍好為文章詩賦銘頌任興而作有大文筆馬上口授及其成也不改一字自太和十年已後詔冊皆帝之文也自餘文章百有餘篇愛奇好士情如飢渴待納朝賢隨才輕重常寄以布素之意悠然玄邁不以世務嬰心又少而善射有膂力年十餘歲能以指彈碎羊髆骨及射禽獸莫不隨所志斃之至年十五便不復殺生射獵之事悉止性儉素常服澣濯之衣鞍勒鐵木而已帝之雅志皆此類也, WYG: ''}
