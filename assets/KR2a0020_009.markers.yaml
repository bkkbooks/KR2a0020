  - {type: variant, offset: 7661, length: 2, content: 為征, krp: 生統州事九月辛亥葛榮敗都督廣陽王淵章武王融於博野白牛邏融殁於陣榮自稱天子號曰齊國年稱廣安甲申常景又破洛周斬其武川王賀㧞文興别帥侯莫陳升生擒男女四百口牛驢五千餘頭就德興攻陷平州殺刺史王買奴是月莫折天生請降蕭寳夤使行臺左丞崔士和入據秦州天生復叛送士和於胡琛殺之冬十有一月戊戌杜洛周攻陷幽州執刺史王延年及行臺常景丙午税京師田租畝五升借賃公田者畝一升閏月税市人出入者各一錢店舍爲五等齊州平原民劉樹劉蒼生聚衆反州軍破走之劉樹奔蕭衍衍將原樹逼夀春揚州刺史李憲力屈以城降之初留州郡縣及長史司馬戍主副質子於京師衍又遣將攻逼新野詔都督魏承祖討之詔曰頃舊京淪覆中原喪亂宗室子女屬籍在七廟之内爲雜戸濫門所拘辱者悉聽離絶三年春正月甲戌以司空公皇甫度爲司徒儀同三司蕭寳夤爲司空車騎將軍北海王顥爲車騎大將軍儀同三司徐州民任道棱聚衆反襲據蕭城以叛州軍討平之辛巳葛榮陷殷州刺史崔楷固節死之遂}
  - {type: variant, offset: 7664, length: 0, content: '', WYG: 圍冀州甲申詔峻鑄錢之制蕭寳夤元恒芝大敗于涇州大隴都督南平王仲冏小隴都督髙聿並相尋退散東秦州刺史潘義淵以汧城降賊髙平虜賊逼岐州城人執刺史魏蘭根以城應之豳州刺史畢祖暉行臺羊深並奔退祖暉於陣殁北海王顥尋亦敗走賊帥胡引祖據北華州以應之賊帥比于騏麟入據豳州曲赦闗西及正平平陽建興戊子以司徒皇甫度爲太尉己丑以四方未平詔内外戒嚴將親出討辛卯蕭衍將湛僧珍圍東豫州詔散騎常侍元暐爲都督以討之是月衍又遣將彭羣王辯等率衆數萬逼琅邪詔青州南青二州討之二月丁酉詔曰闗隴遭罹宼難燕趙賊逆憑陵蒼生波流耕農靡業加諸轉運勞役已甚州倉儲實無宜懸匱自非開輸賞之格何以息漕運之煩凡有能輸粟入瀛定岐雍四州者官斗二百斛賞一階入二華州者五百石賞一階不限多少粟畢授官虜賊據潼闗丁未追復故東平王匡爵改封濟南王庚申東郡民趙顯德反殺太守裴烟自號都督立其兄子爲太守詔都督李叔仁討之是月蕭衍將成景儁宼彭城詔員外常侍崔孝芬爲行臺率將擊走之三月甲子詔將西討中外戒嚴虜賊走復潼闗戊辰詔將囘駕北討詔金紫光祿大夫源子邕爲大都督討葛榮辛未齊州廣川民劉鈞執清河太守邵懷聚衆反自署大行臺清河民房須自署大都督屯據昌國城夏四月别將元斌之討東郡斬顯德己酉蠕蠕國遣使朝貢六月蠕蠕國遣使朝貢是月詔都督李叔仁討劉鈞平之秋七月陳郡民劉獲鄭辯反於西華號年天授州軍討平之相州刺史安樂王鑒據州反己丑大赦天下是月青州刺史彭城王劭南青州刺史胡平遣將斬蕭衍將彭羣首俘獲二千餘人八月都督源子邕李軌裴衍攻鄴丁未斬鑒相州平仍令子邕等討葛榮九月辛卯東豫州刺史元慶和以城南叛戊子蠕蠕國遣使朝貢秦州城民杜粲殺莫折念生自行州事南秦州城民辛琛自行州事遣使歸罪冬十月戊申曲赦恒農巴西河北正平平陽邵郡及闗西諸州辛亥以衞將軍討虜大都督尒朱榮爲車騎將軍儀同三司甲寅雍州刺史蕭寳夤據州反自號曰齊年稱隆緒詔尚書右僕射長孫稚討之十有一月己丑葛榮攻陷冀州執刺史元孚逐出居民凍死者十六七十有二月戊申都督源子邕裴衍與葛榮戰敗於陽平東北漳水曲並戰殁是月杜粲爲駱超所殺遣使歸罪武泰元年春正月癸亥以北海王顥爲驃騎}
