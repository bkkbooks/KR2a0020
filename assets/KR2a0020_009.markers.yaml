  - {type: variant, offset: 9880, length: 376, content: 三階文官二級外官一階庚午發州郡兵二十萬人限八月中旬集懸瓠趙郡王幹薨五月丙午詔在征身喪者四品已下及卑兼之職給帛有差六月庚申詔諸王將士戰沒皆加優贈秋七月壬午詔曰朕以寡德屬茲靖亂實賴羣英凱清南夏宜約躬賞效以勸茂績后之私府便可損半六宮嬪御五服男女常恤供亦令減半在戎之親三分省一是月蕭鸞死子寶卷僭立八月辛亥皇太子自京師來朝壬子蕭寶卷奉朝請鄧學擁其齊興郡內屬敕勒樹者相率反叛詔平北將軍江陽王繼都督北討諸軍事以討之壬午高麗國遣使朝獻九月己亥帝以蕭鸞死禮不伐喪乃詔反斾庚子仍將北伐叛虜丙午車駕發懸瓠冬十月己酉朔曲赦二豫殊死已下復民田租一歲十有一月辛巳幸鄴十有二月甲寅以江陽王繼定敕勒乃詔班師二十有三年春正月戊寅朔朝羣臣以帝疾瘳上壽大饗於澄鸞殿壬午幸西門豹祠遂歷漳水而還蕭寶卷遣太尉陳顯達寇荊州癸未詔前將軍元英討之乙酉車駕發鄴戊戌至自鄴庚子告於廟社癸卯行飲至策勳之禮甲辰, WYG: ''}
