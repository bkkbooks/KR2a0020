  - {type: variant, offset: 569, length: 320, content: 均然廼者以來猶有餓死衢路無人收識良由本部不明籍貫未實廩恤不周以至於此朕猥居民上聞用慨然可重遣精檢勿令遺漏冬十月辛未詔罷起部無益之作出宮人不執機杼者甲戌詔曰鄉飲禮廢則長幼之叙亂孟冬十月民閑歲𨻶宜於此時導以德義可下諸州黨里之內推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞十有一月丁未詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡太官雜器太僕乘具內庫弓矢出其太半班賚百官及京師士庶下至工商皂隸逮於六鎮戍士各有差戊申詔曰朕惟上政不明令民陷身罪戾今寒氣勁切杖捶難任自今月至來年孟夏不聽拷問罪人又歲既不登民多飢窘輕繫之囚宜速決了無令薄罪久留獄犴十有二月詔祕書丞李彪著作郎崔光改析國記依紀傳之體是歲大飢詔所在開倉賑恤十有二, WYG: 元}
