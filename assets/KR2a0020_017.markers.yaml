  - {type: variant, offset: 6368, length: 246, content: 姓悉原不問太祖慮內難乃北踰陰山幸賀蘭部遣安同及長孫賀徵兵於慕容垂賀亡奔窟咄安同間行遂達中山慕容垂遣子賀驎步騎六千以隨之安同與垂使人蘭紇俱還達牛川窟咄兄子意烈捍之安同乃隱藏於商賈囊中至暮乃入空井得免仍奔賀驎軍既不至而稍前逼賀染干陰懷異端乃為窟咄來侵北部人皆驚駭莫有固志於是北部大人叔孫普洛節及諸烏丸亡奔衞辰賀驎聞之遽遣安同朱譚等來既知賀驎軍近衆乃小定太祖自弩山幸牛川窟咄進屯高柳太祖復使安同詣賀驎因克會期安同還太祖踰參合出代北與賀驎會於高柳窟咄困迫望旗奔走遂為衞辰殺之帝悉收其衆賀驎別帝歸於中山, WYG: 考證}
