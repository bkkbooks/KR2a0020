  - {type: variant, offset: 2642, length: 237, content: 壯之即日拜都幢將封暨陽子卒于中軍都將弟陪斤襲爵坐事國除陪斤子昭小字阿倪尚書張彝引兼殿中郎高祖將為齊郡王簡舉哀而昭乃作宮懸高祖大怒詔曰阿倪愚騃誰引為郎於是黜彝白衣守尚書昭遂停廢世宗時昭從弟暉親寵用事稍遷左丞世宗崩于忠執政昭為黃門郎又曲事之忠專權擅威枉陷忠賢多昭所指導也靈太后臨朝為尚書河南尹聾而佷戾理務峭急所在患之尋出為雍州刺史在州貪虐大為人害後入為尚書諂事劉騰進號征西將軍卒贈尚書左僕射納貨元叉所以贈禮優越昭子玄字彥道以節儉知名莊帝時為洛陽令及前廢帝即位玄上表乞葬莊帝時議善, WYG: 奇}
