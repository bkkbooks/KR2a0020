  - {type: variant, offset: 3714, length: 1365, content: 史世宗即位拜尚書主客郎巡省風俗還奏事稱旨為給事黃門侍郎初高祖遷洛而在位舊貴皆難於移徙時欲和合衆情遂許冬則居南夏便居北世宗頗惑左右之言外人遂有還北之問至乃牓賣田宅不安其居暉乃請間言事世宗曰先皇遷都之日本期冬南夏北朕欲聿遵成詔故有外人之論暉曰先皇移都為百姓戀土故發冬夏二居之詔權寧物意耳乃是當時之言實非先皇深意且北來遷人安居歲久公私計立無復還情陛下終高祖定鼎之業勿信邪臣不然之說世宗從之再遷侍中領右衞將軍雖無補益深被親寵凡在禁中要密之事暉別奉旨藏之於櫃唯暉入乃開其餘侍中黃門莫有知者侍中盧昶亦蒙恩眄故時人號曰餓虎將軍飢鷹侍中遷吏部尚書納貨用官皆有定價大郡二千匹次郡一千匹下郡五百匹其餘受職各有差天下號曰市曹出為冀州刺史下州之日連車載物發信都至湯陰間首尾相繼道路不斷其車少脂角即於道上所逢之牛生截取角以充其用暉檢括丁戶聽其歸首出調絹五萬匹然聚斂無極百姓患之肅宗初徵拜尚書左僕射詔攝吏部選事上疏曰臣聞治人之本實委牧守之官得其才則政平物理失其人則訟興怨結自非察訪善惡明加貶賞將何以黜彼貪怠陟此清勤也竊以大使巡省必廣迎送之費御史馳糾頗回威濫之刑且暫爾往還理不委悉縱有簡舉良未平當愚謂宜令三司八座侍中黃門各布耳目外訪州鎮牧將治人守令能不若德教有方清白獨著宜以名聞即加褒陟若治績無効貪暴遠聞亦便示牒登加貶退如此則不出庭戶坐知四方端委垂拱明賞審罰矣又表以御史之職鷹鸇是任必逞爪牙有所噬搏若選後生年少血氣方剛者恐其輕肆勁直傷物處廣愚謂宜簡宿官經事忠良平慎者為之詔付外依此施行後詔暉與任城王澄京兆王愉東平王匡共決門下大事暉又上書論政要其一曰御史之職務使得賢必得其人不拘階秩久於其事責其成功其二曰安人寧邊觀時而動頃來邊將亡遠大之略貪萬一之功楚梁之好未聞而蠶婦之怨屢結斯乃庸人所為銳於姦利之所致也平吳之計自有良圖不在於一城一戍也又河北數州國之基本飢荒多年戶口流散方今境上兵復徵發即如此日何易舉動愚謂數年以來唯宜靜邊以息占役安人勸農惠此中夏請嚴勅邊將自今有賊戍求內附者不聽輙遣援接皆須表聞違者雖有功請以違詔書論三曰國之資儲唯藉河北飢饉積年戶口逃散生長姦詐因生隱藏出縮老小妄注死失收人租調割入於己人困於下官損於上自非更立權制善加檢括損耗之來方在未已請求其議明宣條格帝納之暉頗愛文學招集儒士崔鴻等撰錄百家要事以類相從名為科錄凡二百七十卷上起伏羲迄於晉宋凡十四代暉疾篤表上之神龜元年卒賜東園祕器贈使持節都督中外諸軍事司空公諡曰文憲將葬給羽葆班劍鼓吹二十人羽林百二十人陳留王虔昭成子紇根之子也少以壯勇知名登國初賜爵陳留公與衞王儀破黜弗部從攻衞辰慕容寶來寇虔絕其左翼寶敗垂恚憤來桑乾虔勇而輕敵於陳戰沒虔姿貌魁傑武力絕倫每以常矟細短大作之猶患其輕復綴鈴於刃下其弓力倍加常人以其殊異於世代京武庫常存而志之虔常臨陣以矟剌人遂貫而高舉又嘗以一手頓矟於地馳馬偽退敵人爭取引不能出虔引弓射之一箭殺二三人搖矟之徒亡魂而散徐乃令人取矟而去每從征討常先登陷陳勇冠當時敵無衆寡莫敢抗其前者及薨舉國悲歎為之流涕太祖追惜傷慟者數焉追諡陳留桓王配饗廟庭封其子悅為朱提王悅外和內佷太祖常以桓王死王事特加親寵為左將軍襲封後為宗師悅恃寵驕矜每謂所親王洛生之徒言曰一旦宮車晏駕吾止避衞公除此誰在吾前衞王儀美髯為內外所重悅故云初姚興之贖狄伯支悅送之路由雁門悅因背誘姦豪以取其意後遇事譴逃亡投雁門規收豪傑欲, WYG: 謀}
