  - {type: variant, offset: 2120, length: 249, content: 害觚以固衆心太祖聞之哀慟及平中山發普驎柩斬其尸收議害觚者高霸程同等皆夷五族以大刃剉殺之乃改葬觚追諡秦愍王封子夔為豫章王以紹觚常山王遵昭成子壽鳩之子也少而壯勇不拘小節太祖初有佐命勳賜爵略陽公慕容寶之敗也別率騎七百邀其歸路由是有參合之捷及平中山拜尚書左僕射加侍中領勃海之合口及博陵勃海羣盜起遵討平之遷州牧封常山王遵好酒天賜四年坐醉亂失禮於太原公主賜死葬以庶人禮子素太宗從母所生特見親寵少引內侍頻歷顯官賜爵尚安公拜外都大官世祖初復襲爵休屠郁原等叛素討之斬渠率徙千餘家於涿鹿之陽立平原郡以處之及平統萬以素有, WYG: 退}
