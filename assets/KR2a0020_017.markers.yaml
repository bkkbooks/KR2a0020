  - {type: variant, offset: 2370, length: 223, content: 懷之略拜假節征西大將軍以鎮之後拜內都大官高宗即位務崇寬征罷諸雜調有司奏國用不足固請復之惟素曰臣聞百姓不足君孰與足帝善而從之詔羣臣議定皇子名素及司徒陸麗議曰古帝王之制名其體有五有信有義有象有假有類伏惟陛下當盛明之運應昌發之期誕生皇子宜以德命高宗從之素宗屬之懿又年老帝每引入訪以治國政事固辭疾歸第雅性方正居官五十載終始如一時論賢之薨諡曰康陪葬金陵配饗廟庭長子可悉陵年十七從世祖獵遇一猛虎陵遂空手搏之以獻世祖曰汝才力絕人當為國立事勿如此也即拜內行阿干又, WYG: 震漠北尋}
