  - {type: variant, offset: 663, length: 576, content: 喜徙封東平公命督屯田於河北自五原至棝楊塞外分農稼大得人心慕容寶之寇五原儀攝據朔方要其還路及并州平儀功多遷尚書令從圍中山慕容德之敗也太祖以普驎妻周氏賜儀并其僮僕財物尋遷都督中外諸軍事左丞相進封衞王中山平復遣儀討鄴平之太祖將還代都置中山行臺詔儀守尚書令以鎮之遠近懷附尋徵儀以丞相入輔又從征高車儀別從西北破其別部又從討姚平有功賜以絹布綿牛馬羊等儀膂力過人弓力將十石陳留公虔矟大稱異時人云衞王弓桓王矟世祖之初育也太祖喜夜召儀入太祖曰卿聞夜喚乃不怪懼乎儀曰臣推誠以事陛下陛下明察臣輙自安忽奉夜詔怪有之懼實無也太祖告以世祖生儀起拜而歌舞遂對飲申旦召羣臣入賜儀御馬御帶縑錦等先是上谷侯岌張兗代郡許謙等有名于時學博今古初來入國聞儀待士先就儀儀並禮之共談當世之務指畫山河分別城邑成敗要害造次備舉謙等歎服相謂曰平原公有大才不世之略吾等當附其尾太祖以儀器望待之尤重數幸其第如家人禮儀矜功恃寵遂與宜都公穆崇謀為亂伏武士伺太祖欲為逆崇子遂留在伏士中太祖召之將有所使遂留聞召恐發踰牆告狀太祖祕而恕之天賜六年天文多變占者云當有逆臣伏尸流血太祖惡之頗殺公卿欲以厭當天災儀內不自安單騎遁走太祖使人追執之遂賜死葬以庶人禮儀十五子子纂五歲太祖命養於宮中少明敏動止有禮太祖愛之恩與諸皇子同世祖踐阼除定州刺史封中山公進爵為王賜步挽几以優異之纂好酒愛佞政以賄成世祖殺其親嬖人後悔過修謹拜內大將軍居, WYG: ''}
