  - {type: variant, offset: 2881, length: 784, content: 除尚書左丞出帝即位以孫騰為左僕射騰即齊獻武王心膂仗入省玄依法舉劾當時咸為玄懼出帝重其強正封臨淄縣子後從帝入關昭弟紹字醜倫少聰慧遷尚書右丞紹斷決不避強禦世宗詔令檢趙脩獄以脩佞幸因此遂加杖罰令其致死帝責紹不重聞紹曰脩姦佞甚於董賢臣若不因釁除之恐陛下復被哀帝之名以其言正遂不罪焉及出廣平王懷拜紹賀曰阿翁乃皇家之正直雖朱雲汲黯何以仰過紹曰但恨戮之稍晚以為愧耳卒於涼州刺史陪斤弟忠字仙德少沉厚以忠謹聞高祖時累遷右僕射賜爵城陽公加侍中鎮西將軍有翼贊之勤百僚咸敬之太和四年病篤辭退養疾於高柳輿駕親送都門之外賜雜綵二百匹羣僚侍臣執別者莫不涕泣及卒皆悼惜之諡曰宣命有司為立碑銘有十七子子盛字始興襲爵位謁者僕射卒盛弟壽興少聰慧好學世宗初為徐州刺史在官貪虐失於人心其從兄侍中暉深害其能因譖之於帝詔尚書崔亮馳驛檢覆亮發日受暉旨遂鞭撻三寡婦令其自誣稱壽興壓己為婢壽興終恐不免乃令其外弟中兵參軍薛脩義將車十乘運小麥經其禁之旁壽興因踰牆出脩義以大木函盛壽興其上加麥載之而出遂至河東匿脩義家逢赦乃出見世宗自陳為暉所譖世宗亦更無所責初壽興為中庶子時王顯在東官賤因公事壽興杖之三十及顯有寵為御史中尉奏壽興在家每有怨言誹謗朝廷因帝極飲無所覺悟遂奏其事命帝注可直付壽興賜死帝書半不成字當時見者亦知非本心但懼暉等威不敢申拔及行刑日顯自往看之壽興命筆自作墓誌銘曰洛陽男子姓元名景有道無時其年不永餘文多不載顧謂其子曰我棺中可著百張紙筆兩枚吾欲訟顯於地下若高祖之靈有知百日內必取顯如遂無知亦何足戀及世宗崩顯尋被殺壽興之死時論亦以為前任中尉彈高闕讒諷所致靈太后臨朝三公郎中崔鴻上疏理壽興詔追雪贈豫州刺史諡曰莊壽興弟益生少亡忠弟德封河間公卒於鎮南將軍贈曹州刺史德子悝潁川太守卒於光州刺史諡曰恭子嶷字子仲出帝初授兗州刺史于時城人王奉伯等相扇謀逆棄城出走懸門發斷嶷要闕而出詔齊州刺史尉景本州刺史蔡儁各部在州士往討之嶷返復任封, WYG: 與}
