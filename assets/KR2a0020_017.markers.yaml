  - {type: variant, offset: 5082, length: 768, content: 為土人執送太祖恕而不罪太宗即位引悅入侍仍懷姦計說帝云京師雜人不可保信宜誅其非類者又雁門人多詐并可誅之欲以雪其私忿太宗不從悅內自疑懼懷刀入侍謀為大逆叔孫俊疑之竊視其懷有刀執而賜死弟崇世祖詔令襲桓王爵崇性沉厚初衞王死後太祖欲敦宗親之義詔引諸王子弟入宴常山王素等三十餘人咸謂與衞王相坐疑懼皆出逃遁將奔蠕蠕唯崇獨至太祖見之甚悅厚加禮賜遂寵敬之素等於是亦安久之拜并州刺史有政績從征蠕蠕別督諸軍出大澤越涿邪山威懾漠北薨諡曰景王子建襲降爵為公位鎮北將軍懷荒鎮大將卒建子琛位朔二州刺史琛子翌尚書左僕射虔兄顗性嚴重少言太祖常敬之雅有謀策從平中山以功賜爵蒲城侯平盧太守特見寵厚給鼓吹羽儀禮同岳牧莅政以威信著稱居官七年乃以元易干代顗為郡時易干子萬言得寵於太祖易干恃其子輕忽於顗不告其狀輕騎卒至排顗墜牀而據顗坐顗不知代己謂以罪見捕既而知之其侮慢謂易干曰我更滿被代常也汝無禮見辱豈可容哉遂搏而殺之以狀具聞太祖壯之萬言累以訴請乃詔顗輸贖顗乃自請罪太祖赦之復免其贖病卒子崘世祖時襲父爵以功除統萬鎮將後從永昌王仁南征別出汝陰濟淮劉義隆將劉康祖屯於慰武亭以邀軍路師人患之崘曰今大風既勁若令推草車方軌並進乘風縱煙火以精兵自後乘之破之必矣從之斬康祖傳首行宮高宗即位除秦州刺史進爵隴西公卒諡定公子琛襲爵毗陵王順昭成子地干之子也性疏佷登國初賜爵南安公及太祖討中山留順守京師栢肆之敗軍人有亡歸者言大軍奔散不知太祖所在順聞之欲自立納莫題諫乃止時賀力眷等聚衆作亂於陰館順討之不克乃從留宮自白登南入繁畤故城阻灅水為固以寧人心太祖善之進封為王位司隸校尉太祖好黃老數召諸王及朝臣親為說之在坐莫不祗肅順獨坐寐欠伸不顧而唾太祖怒廢之以王薨於家遼西公意烈昭成子力真之子也先沒於慕容垂太祖征中山棄妻子迎於井陘及平中原有戰獲勳賜爵遼西公除廣平太守時和跋為鄴行臺意烈性雄耿自以帝屬居跋下遂陰結徒黨將襲鄴, WYG: ''}
