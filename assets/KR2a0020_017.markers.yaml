  - {type: variant, offset: 20, length: 0, content: '', WYG: 七男杜密皇后生世祖太武皇帝大慕容夫人生樂平戾王丕安定殤王彌闕母氏慕容夫人生樂安宣王範尹夫人生永昌荘王健建寧王崇新興王俊二王並闕母氏樂平王丕少有才幹為世所稱太宗以丕長愛其噐度特優異}
  - {type: page-break, offset: 20, content: '', id: KR2a0020_WYG_017-1b, image: WYG0261/WYG0261-0259d.png}
  - {type: variant, offset: 20, length: 0, content: '', krp: 七男杜密皇后生世祖太武皇帝大慕容夫人生樂平戾王丕安定殤王彌闕母氏慕容夫人生樂安宣王範尹夫人生永昌荘王健建寧王崇新興王俊二王並闕母氏樂平王丕少有才幹為世所稱太宗以丕長愛其噐度特優異}
  - {type: variant, offset: 21, length: 1, content: 庶, WYG: 泰常七年封拜車騎大将軍後督河西高平諸軍討南秦王楊難當軍至略陽禁令齊肅所過無私百姓争致牛酒難當懼還仇池而諸将議曰若不誅豪帥軍還之後必聚而為寇又以大衆逺出不有所掠則無以充軍實賞将士将從之時中書侍郎高允參丕軍事諌曰今若誅之是傷其向化之心恐大軍一還為亂必速丕以為然於是綏懐初附秋毫無犯初馮𢎞之奔高麗世祖詔遣送之高麗不遣世祖怒將討之丕上疏以為和龍新定宜優復之使廣修農殖以饒軍實然後進圖可一舉而滅帝納之乃止後坐劉潔事以憂薨事在潔𫝊諡曰戾王子拔襲爵後坐事賜死國除丕之薨及日者董道秀之死也高允遂著筮論曰昔眀元末起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王黙而有喜色後事發王遂憂死而道秀棄市道秀若推六爻以對王曰易稱亢龍有悔窮高曰亢高而無民不為善也夫如是則上寧於王下保於已福祿方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎安定王彌泰常七年封太宗討滑臺留守京師薨諡殤王無子國除樂安王範泰常七年封雅性沉厚寛和仁恕世祖以長安形勝之地非範莫可任者乃拜範都督五州諸軍事衞大將軍開府儀同三司長安鎮都大将高選才能以為僚佐範謙恭惠下推心撫納百姓稱之時秦土新罹寇賊流亡者相繼範請崇易簡之治帝納之於是遂寛傜與人休息後劉潔之謀範聞而不告事發因疾暴薨}
