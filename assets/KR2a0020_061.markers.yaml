  - {type: variant, offset: 7226, length: 1, content: 楷, WYG: 瀛州刺史為賊帥鮮于脩禮攻圍積旬拒守自固病卒於州贈衛將軍吏部尚書兖州刺史祖朽無子以弟祖歸子義暢為後襲爵義暢傾巧無士業善通時要歴尚書郎中侍郎兖州刺史大中正中軍將軍通直散騎常侍太昌初車騎將軍尋除散騎常侍天平中坐與北豫州山賊張儉通伏法祖髦起家奉朝請兄祖朽别封南城以須昌侯回授之神龜初累遷揚烈將軍東平太守後為本州别駕卒於官子義和襲卒於右將軍太中大夫贈散騎常侍安東將軍兖州刺史子仁超義和第六弟義亮性豪疎歴尚書郎中書舍人太平中與舎人韋鴻坐泄密賜盡於宅祖暉早有器幹自奉朝請稍遷鎮遠將軍前軍將軍直後正始中除龍驤將軍東郡太守入為驍騎將軍加征虜將軍後試守渤海郡熙平中拜潁川太守神龜初除右將軍豳州刺史入為平東將軍光禄大夫正光五年豳州民反招引隴賊攻逼州城以祖暉前在州日得民情和復授平西將軍豳州刺史假安西將軍為别將以討之祖暉且戰且前突圍入治孝昌初北海王顥救}
