  - {type: variant, offset: 4878, length: 268, content: 東將軍豫州刺史祖育弟仲明奉朝請稍遷太尉屬以公強當世為從弟儼所昵除滎陽太守儼慮世難欲以東道託之建義初仲明弟季明遇害河陰儼後歸之欲與起兵尋為城民所殺仲明兄洪健李沖女壻建義初莊帝以仲明舅氏之親其弟與謀扶戴仲明之死也且有奉國之意乃追封安平縣開國侯邑七百戶贈侍中車騎大將軍儀同三司尚書左僕射雍州刺史長子道門仲明初謀起義令道門說大都督李叔仁於大梁叔仁始欲同舉後聞莊帝已立叔仁子拔江乃斬道門建義中特贈立節將軍瓜州刺史道門弟孝邕襲天保初爵隨例降仲明弟季亮司徒城局參軍員外常侍卒贈散騎常侍撫軍將軍青州刺史季亮弟季明釋褐太學博士正光中譙郡太守帶渦陽戍主頻為, WYG: ''}
