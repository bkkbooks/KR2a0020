  - {type: variant, offset: 7723, length: 0, content: '', krp: 以珍竒為持節平南將軍豫州刺史河内公珍竒表曰臣昔蒙劉氏生成之恩感義亡身志陳報答遂與雍州刺史袁顗豫州刺史殷琰等共唱大義奉戴子勛纂承彼厯大運未集遂至分崩而劉彧滔天殺主簒立蒼生殄悴危於綴旒伏惟陛下龍姿鳯儀光格四表凡在黔黎延屬象魏所願天地垂仁亟圖南服宜遣文檄喻以吉凶使江東之地離心草靡荆雍九州北面請吏乞高臣官名更遣雄將秣馬五千助臣經討并賜威儀震動江外長江已北必可定矣臣雖不武乞備前驅進據之宜更在處分敢冐愚款推誠上聞機運可乘實在兹日珍竒雖有虛表而誠款未純嵗餘徴其子超超母胡氏不欲超赴京師密懐南叛時汝徐未平元石自出攻之珍竒乘虚於懸瓠反叛燒城東門斬三百餘人虜掠上蔡安城平輿三縣居民屯于灌水石馳往討擊大破之㑹日闇放火燒其營珍竒乃匹馬逃免其子超走到苦城為人所殺小子沙彌囚送京師刑為閹人沈文秀字仲逺吳興武康人伯父慶之劉駿司空公文秀初為郡主簿稍遷建威將軍青州刺史和平六年劉子業為其叔彧所殺文秀遂與諸州推立劉子勛及子勛敗皇興初文秀與崔道固俱以州降請師應接顯祖遣平東將軍長孫陵等率騎赴之㑹劉彧遣文秀弟文炳來喻之文秀復歸於彧彧以文秀為輔國將軍刺史如故後慕容白曜既剋升城引軍向歴下白曜復遣陵等率萬餘人長驅至東陽文秀始欲降以軍人虜掠遂有悔心乃嬰城固守陵乃引師軍於清西白曜既下歴城乃率大衆并力攻討長圍數匝自夏至春始剋文秀取所持節衣冠儼然坐於齋内亂兵入曰文秀何在文秀厲聲曰身是執而躶送于白曜左右令拜文秀曰各二國大臣無相拜之禮白曜忿之乃至撾撻後還其衣為之設饌遂與長史房天樂司馬沈嵩等鎻送京師面縛數罪宥死待為下客給以麤衣蔬食顯祖重其節義稍亦加禮之拜為外都下大夫太和三年遷外都大官髙祖嘉文秀忠於其國賜絹綵二百匹後為南征都將臨發賜以戎服尋除持節平南將軍懐州刺史假吳郡公是時河南富饒人好奉遺文秀一無所納卒守清貧然為政寛緩不能禁止盜賊而大興水田於公私頗有利益在州數年年六十一卒子保沖太和中奉朝請大將軍宋王外兵參軍後為南徐州冠軍長史二十一年坐援漣口退敗有司處之死刑高祖詔曰保沖文秀之子可特原命配洛陽作部終身既而獲免世宗時卒於下邳太守房天樂者清河人滑稽多智先為青州别駕文秀㧞為長史督齊郡州府之事一以委之卒于京師弟子嘉慶漁陽太守嘉慶從弟瑚璉長廣太守文秀族子嵩聰敏有筆札文秀以為司馬甚器任之随文秀至懐州文秀卒後依宋王劉昶昶遇之無禮憂愧飢寒未幾而卒文秀族子陵字道通太和十八年高祖南伐陵攜族孫智度歸降引見於行宫陵姿質姸偉辭氣辯暢髙祖竒之禮遇亞於王肅授前軍將軍後監南徐州諸軍事中壘將軍南徐州刺史尋假節龍驤將軍二十二年秋進持節冠軍將軍及高祖崩陵隂有叛心長史趙儼密言于朝廷尚書令王肅深保明之切責儼既而果叛殺數十人驅掠城中男女百餘口夜走南入智度於彭城知之從清中單舸奔陵為下邳戍人所射殺張讜字處言清河東武城人也六世祖名犯顯祖諱晉長秋卿父華為慕容超左僕射讜仕劉駿歴給事中泰山太守青冀二州輔國府長史帶魏郡太守劉彧之立遥授冠軍將軍東徐州刺史及革徐兗讜乃歸順於尉元元亦表授冠軍東徐州刺史遣中書侍郎高閭與讜對為刺史後至京師禮遇亞於薛畢以勲賜爵平陸侯加平遠將軍讜性開通篤於撫恤青齊之士雖疏族末姻咸相敬視李敷李訢等寵要勢家亦推懐陳款無所顧避畢衆敬等皆敬重之高允之徒亦相器待延興四年卒贈平南將軍青州刺史諡康侯子敬伯求致父喪出葬冀州清河舊墓久不被許停柩在家積五六年第四子敬叔先在徐州初聞父喪不欲奔赴而規南叛為徐州所勒送至乃自理後得襲父爵敬伯自以随父歸國之功賜爵昌安侯出為樂陵太守敬叔武邑太守父喪得葬舊墓還屬清河初讜兄弟十人兄忠字處順在南為合鄉令世祖南征忠歸降賜爵新昌男拜新興太守卒官贈冀州刺史初讜妻皇甫氏被掠賜中官為婢皇甫遂乃詐癡不能梳沐後讜為劉駿冀州長史因貨千餘匹購求皇甫高宗怪其納財之多也引見之時皇甫年垂六十矣高宗曰南人竒好能重室家之義此老母復何所任乃能如此致費也皇甫氏歸讜令諸妾境上奉迎數年卒卒後十年而讜入國讜兄子安世正始中自梁漢同夏侯道遷歸款為客積年出為東河問太守卒官元茂為信都令遷冀州治中元茂弟子讓洛州安西府長史都水使者田益宗光城蠻也身長八尺雄果有將略貌狀舉止有異常蠻世為四山蠻帥受制於蕭頤太和十七年遣使張超奉表歸款十九年拜員外散騎常侍都督光城弋陽汝南新蔡宋安五郡諸軍事冠軍將軍南司州刺史光城縣開國伯食蠻邑一千户所統守宰任其銓置後以益宗既渡淮北不可仍為司州乃於新蔡立東豫州以益宗為刺史尋改封安昌縣伯食實邑五百户二十二年進號征虜將軍景明初蕭衍遣軍主吳子陽率衆冦三關益宗遣光城太守梅興之歩騎四千進至隂山關南八十餘里據長風城逆擊子陽大破之斬獲千餘級蕭衍建寜太守黄天賜築城赤亭復遣其將黄公賞屯於漴城與長風相持益宗命安蠻太守梅景秀為之犄角擊討破天賜等斬首數百獲其二城上表曰臣聞機之所在聖賢弗之疑兼弱攻昧前王莫之捨皆拯羣生於湯炭盛武功於方來然霜葉將淪非勁飈無以速其籜天之所棄非假手無以殲其人竊惟蕭衍闕常君臣交争江外州鎮中分為兩東西抗峙已淹嵗時民庶窮於轉輸甲兵疲於戰鬭事救於目前力盡於麾下闕無外維州鎮綱紀庶方藩城棊立孤存而已不乘機電掃廓彼蠻疆恐後之經略未易於此且壽春雖平三面仍梗鎮守之宜實湏豫設義陽差近淮源利渉津要朝廷行師必由此道若江南一平有事淮外須乘夏水汎長列舟長淮師赴壽春湏從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼衆不過湏精卒一萬二千然行師之法貴張形勢請使兩荆之衆西擬隨雍揚州之卒頓于建安得捍三關之援然後二豫之軍直據南關對抗延頭遣一都督總諸軍節度季冬進師迄于春末弗過十旬剋之必矣世宗納之遣鎮南元英攻義陽益宗遣其息魯生領歩騎八千斷賊糧運并焚其鈞城積聚衍戌主趙文舉率衆拒戰魯生破之獲文舉及小將胡建興古皓莊元仲等斬五千餘級溺死千五百人倉米運舟焚燒蕩盡後賊寧朔將軍楊僧遠率衆二千冦逼䝉籠益宗命魯生與戍主竒道顯逆擊破之追奔十里俘斬千餘進號平南將軍又詔益宗率其部曲并州鎮文武與假節征虜將軍太僕少卿宇文福綏防蠻楚加安南將軍増封一百户賜帛二千匹白早生反於豫州詔益宗曰懸瓠要藩密邇崧潁南疆之重所寄不輕而羣小猖狂忽構釁逆殺害鎮主規成反叛此而可忍孰不可容即遣尚書邢巒摠精騎五萬星馳電驅征南將軍中山王英統馬歩七萬絡繹繼發量此蟻宼唯當逃奔知將軍志翦犲狼以清邊境節義慷慨良在可嘉非蹇蹇之至何以能爾深戢誠款方相委託故遣中書舎人趙文相具宣朕懷往還之規口别指授便可善盡筭略隨宜追掩勿令此豎得有竄逸遲近清盪更有别㫖時自樂口已南郢豫二州諸城皆沒於賊唯有義陽而已蕭衍招益宗以車騎大將軍開府儀同三司五千户郡公當時安危在益宗去就而益宗守節不移郢豫剋平益宗之力也益宗年稍衰老聚歛無厭兵民患其侵擾諸子及孫競規賄貨部内苦之咸言欲叛世宗深亦慮焉乃遣中書舎人劉桃符宣㫖慰喻庶以安之桃符還啓益宗侵掠之狀世宗詔之曰風聞卿息魯生淮南貪暴擾亂細民又横殺梅伏生為爾不已損卿誠效可令魯生與使赴闕當加任使如欲外禄便授中畿一郡魯生久未至延昌中詔曰益宗先朝耆艾服勤邊境不可以地湏其人遂令乆屈可使持節鎮東將軍濟州刺史常侍如故世宗慮其不受代遣後將軍李世哲與桃符率衆襲之出其不意奄入廣陵益宗子魯生魯賢等奔於關南招引賊兵襲逐諸戍光城已南皆為賊所保世哲討擊破之復置郡戌而以益宗還授征南將軍金紫光禄大夫加散騎常侍改封曲陽縣開國伯益宗生長邊地不願内榮雖位秩崇重猶以為恨上表曰臣昔在南仰餐皇化擁率部曲三千餘家棄彼邊榮歸投樂土兄弟荼炭釁結賊朝高祖孝文皇帝録臣乃誠授以藩任方欲仰憑國威冀雪冤恥豈容背寵向讐就險危命昔郢豫紛擾臣躬率義兵擁絶賊路竊謂誠心仰簡朝野但任重據邊易招塵謗致使桃符横加䜛毁説臣恒欲投南暴亂非一乞檢事原以何為驗復云虐害番兵殺賣過半如其所言未審死失之家所訟有幾又云耗官粟帛倉庫傾盡御史覆檢曽無損折初代之日二子魯生魯賢從子超秀等並在城中安然無二而桃符密遣積射將軍鹿永固私將甲士打息魯生僅得存命唱云我被面勑若能得魯生魯賢首者各賞本郡士馬圍遶騰城唱殺二息戰怖實由於此殘敗居業為生蕩然乃復毁發墳墓露泄枯骸存者罹生離之苦亡魂遭粉骨之痛昔嵗朝廷頻遣桃符數加慰勞而桃符凶姦擅生禍福云唯我相申致降恩㫖及返京師復欺朝廷説臣父子全無忠誠誣陷貞良惑亂朝聽乞攝桃符與臣並對若臣罪有狀分從憲網如桃符是謬坐宜有歸詔曰既經大宥不容方更為獄熙平初益宗又表乞東豫以招二子靈太后令曰卿誠著二朝勲光南服作藩萬里列土承家前朝往恩酬叙不淺兼子弟荷榮中表被澤相闕輕重卿所知悉先帝以卿勞舊州小禄薄故遷牧華壤爰登顯級于時番兵交換不生猜疑而卿息魯賢等無事外叛忠孝俱乖飜為戎首以卿誠重不復相討今卧䕶征南榮以金紫朝廷處遇又甚於先且卿年老方就閑養焉得以本州為念魯賢來否豈待自往也但遣慰納足相昭亮若審遣信當更啓聞别勑東豫聽卿喻曉魯賢二年卒年七十三贈征東大將軍郢州刺史諡曰莊少子纂襲封位至征虜將軍中散大夫卒贈左將軍東豫州刺史益宗長子隨興冠軍將軍平原太守隨興情貪邊官不願内地改授弋陽汝南二郡太守益宗兄興祖太和末亦來歸附景明中假郢州刺史及義陽置郢州改授征虜將軍江州刺史詔賜朝服劒舄一具治麻城興祖卒益宗請隨興代之世宗不許罷并東豫初益州内附之後蕭鸞遣寧州刺史董巒追討之官軍進擊執巒并其子景曜送於行宫巒字仲舒營陽人真君末隨父南叛雖長自江外言語風氣猶同華夏性疎武不多識文字高祖引巒於庭問其南事巒怖不能對數顧景曜景曜進代父答申叙蕭鸞簒襲始終辭理横出言非而辯高祖異焉以巒為越騎校尉景曜為員外郎謀欲南叛坐徙朔州及車駕南討漢陽召巒從軍景曜至洛陽密啓其父必當奔叛軍次魯陽巒單騎南走過南陽新野厯告二城以魏軍當至戒之備防房伯玉劉忌並云無足可慮巒曰不然軍勢甚盛至境首北向哭呼景曜云吾百口在彼事理湏還不得顧汝一子也景曜鎻詣行在所數而斬之又有陳伯之者下邳人也以勇力自効仕於江南為鎮南大將軍江州刺史豐城縣開國公景明三年伯之遣使密表請降并遣其子冠軍將軍徐}
