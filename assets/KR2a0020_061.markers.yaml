  - {type: variant, offset: 6189, length: 0, content: '', WYG: 懐景弟懐儁撫軍將軍光禄大夫汾隂男出為征南將軍益州刺史天平初代還至梁州與刺史元羅俱為蕭衍將蘭欽所擒送江南衍見懐儁謂之曰卿父先為魏荆州我于時猶在襄陽且州壊連接極相知練卿今至此當能住乎若欲還者亦以禮相遣顧謂左右曰此家在北富貴極不可言懐儁便乞歸衍聼還國興和中卒}
