  - {type: variant, offset: 6189, length: 0, content: '', krp: 懐景弟懐儁撫軍將軍光禄大夫汾隂男出為征南將軍益州刺史天平初代還至梁州與刺史元羅俱為蕭衍將蘭欽所擒送江南衍見懐儁謂之曰卿父先為魏荆州我于時猶在襄陽且州壊連接極相知練卿今至此當能住乎若欲還者亦以禮相遣顧謂左右曰此家在北富貴極不可言懐儁便乞歸衍聼還國興和中卒}
  - {type: variant, offset: 6190, length: 0, content: '', WYG: 湛儒襲武定中司空水曹參軍齊受禪爵例降真度諸子既多其母非一同産相朋因有憎愛興和中遂致訴列云以毒藥相害顯在公府發揚疵釁時人恥焉畢衆敬小名捺東平湏昌人少好弓馬射獵交結輕果常於疆境盜掠為業劉駿為徐兖刺史辟為部從事駿既竊號歴其泰山太守冗從僕射及劉彧殺子業而自立遣衆敬出詣兖州募人到彭城刺史薛安都召與密謀云晉安有上流之名且孝武第三子當共卿為計西從乃矯彧命以衆敬行兖州事衆敬從之時兖州刺史殷孝祖留其妻子率文武二千人赴彧使司馬劉文石守城衆敬率衆取瑕邱殺文石安都與孝祖先不相協命衆敬誅孝祖諸子衆敬不得已遂殺之州内悉附唯東平太守申纂據無鹽城不與之同及彧平子勛授纂兖州刺史㑹安都引國授軍經其城下纂閉門城守深恨衆敬㑹有人發衆敬父墓遂令其母骸首散落衆敬發哀行服栲掠近墓細民死者十餘人又疑纂所為弟衆愛為安都長史亦遣人密至齊隂掘纂父墓以相報答及安都以城入國衆敬不同其謀子元賔以母并百口悉在彭城恐交致禍日夜啼泣遣請衆敬衆敬猶未從之衆敬先已遣表謝彧彧授衆敬兖州刺史而以元賔有他罪猶不捨之衆敬㧞刀斫柱曰皓首之年唯有此子今不原貸何用獨全及尉元至遂以城降元遣將入城事定衆敬悔恚數日不食皇興初就拜散騎常侍寜南將軍兖州刺史賜爵東平公與中書侍郎李璨對為刺史慕容白曜攻剋無鹽申纂為亂兵所傷走出被擒送於白曜白曜無殺纂之意而城中火起纂創重不能避為火所燒死衆敬聞剋無鹽懼不殺纂乃與白曜書并表朝廷云家之禍酷皆由於纂聞纂死乃悦二年與薛安都朝于京師因留之賜甲第一區後復為兖州刺史將軍如故徴還京師衆敬善自奉養食膳豐華必致他方遠味年已七十鬢髪皓白而氣力未衰跨鞍馳騁有若少壯篤於姻類深有國}
