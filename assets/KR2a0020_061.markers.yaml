  - {type: variant, offset: 4534, length: 1, content: 本, WYG: 寧西將軍秦州刺史安邑侯道異弟道次既質京師拜南中郎將給事中賜爵安邑侯加安遠將軍出為安西將軍秦州刺史假河南公太和十五年為光禄大夫卒子巒襲爵降為平温子尚書郎秦州刺史鎮遠將軍隴西鎮將帶隴西太守後為滎陽太守遷平北將軍肆州刺史所在貪穢在州彌甚納賄於司空劉騰以求美官未得而騰死正光五年莫折念生反於秦州遣其别帥卜胡王慶雲等衆冦涇州肅宗以巒為持節光禄大夫假安南將軍西道别將與伊瓮生等討之進及平涼郡東與賊交戰不利巒等退還後為撫軍將軍汧城大都督鎮北隴孝昌二年春卒於軍贈征西大將軍雍州刺史子如故安都兄子碩明隨安都入國賜爵蒲坂侯清河太守太中大夫安都從祖弟真度初與安都南奔及安都為徐州真度為長史頗有勇幹為其爪牙從安都來降為上客太和初賜爵河北侯加安遠將軍為鎮遠將軍平州刺史假陽平公後降侯為伯除冠軍將軍隨駕南討假平南將軍久之除䕶南蠻校尉平南將軍荆州刺史蕭賾雍州刺史曹虎之詐降也詔真度督四將出襄陽無功而還後征赭陽為房伯玉所敗有司奏免官爵高祖詔曰真度之罪誠如所奏但頃與安都送欵彭方開闢徐宋外捍沈攸道成之師内寧邊境烏合之衆淮海來服功頗在兹言念厥績每用嘉美赭陽百敗何足計也宜異羣將更申後效可還其元勲之爵復除荆州刺史自餘徽號削奪進足彰忠退可明失尋除假節假冠軍將軍東荆州刺史初遷洛後真度每獻計於高祖勸先取樊鄧後攻南陽故為高祖所賞賜帛一百疋又加持節正號冠軍改封臨晉縣開國公食邑三百户詔曰獻忠盡心人臣令節標善賞功有國徽範故一言可以興邦片辭可以喪國得無遠録前謀以襃厥善真度爰自遷京每在戎役沔北之計恒所與聞知無不言頗見採納及六師南邁朕欲超據新野羣情皆異真度獨與朕同撫蠻寧夷實有勤績可増邑二百户轉征虜}
