  - {type: variant, offset: 2356, length: 1417, content: 將軍相州刺史諡曰文恭道昭好為詩賦凡數十篇其在二州政務寬厚不任威刑為吏民所愛子嚴祖頗有風儀粗觀文史歷通直郎通直常侍輕躁薄行不修士業傾側勢家乾沒榮利閨門穢亂聲滿天下出帝時御史中尉綦儁劾嚴祖與宗氏從姊姦通人士咸言之而嚴祖聊無愧色孝靜初除驃騎將軍左光祿大夫鴻臚卿出為北豫州刺史仍本將軍罷州還除鴻臚卿卒贈都督豫兗潁三州諸軍事將軍司空公豫州刺史嚴祖弟敬祖性亦粗疏起家著作佐郎鄭儼之敗也為鄉人所害敬祖弟述祖武定中尚書述祖弟遵祖祕書郎卒贈輔國將軍光州刺史遵祖弟順卒於太常丞自靈太后預政淫風稍行及元叉擅權公為姦穢自此素族名家遂多亂雜法官不加糾治婚宦無貶於世有識咸以歎息矣羲五兄長白驎次小白次洞林次叔夜次連山並恃豪門多行無禮鄉黨之內疾之若讎白驎孫道慓隨郡太守小白中書博士子胤伯有當世器幹自中書博士遷侍郎轉司空長史高祖納其女為嬪出為建威將軍東徐州刺史轉廣陵王征東府長史帶齊郡內史卒於鴻臚少卿諡曰簡子希儁未官而亡子道育武定中開封太守希儁弟幼儒好學修謹時望甚優丞相高陽王雍以女妻之歷尚書郎通直郎司州別駕有當官之稱卒贈散騎常侍安東將軍兗州刺史諡景幼儒亡後妻淫蕩兇悖肆行無禮子敬道敬德並亦不才俱走於關右幼儒從兄伯猷每謂所親曰從弟人才足為令德不幸得如此婦今死復重死可為悲嘆胤伯弟平城太尉諮議廣陵王羽納其女為妃出為東平原太守性清狂使酒為政貪殘卒贈征虜將軍南青州刺史長子伯猷博學有文才早知名舉司州秀才以射策高第除幽州平北府外兵參軍轉太學博士領殿中御史與當時名勝咸申遊款肅宗釋奠詔伯猷錄義安豐王延明之征徐州也引為行臺郎中事寧還都遷尚書外兵郎中典起居注以軍功賜爵陽武子稍遷散騎常侍平東將軍前廢帝初以舅氏超授征東將軍金紫光祿大夫領國子祭酒久之為車騎將軍右光祿大夫轉護軍將軍元象初以本官兼散騎常侍使於蕭衍前後使人蕭衍令其侯王於馬射之日宴對申禮伯猷之行衍令其領軍將軍臧盾與之相接議者以此貶之使還除驃騎將軍南青州刺史在州貪惏妻安豐王元延明女專為聚斂貨賄公行潤及親戚戶口逃散邑落空虛乃誣良民云欲反叛籍其資財盡以入己誅其丈夫婦女配沒百姓怨苦聲聞四方為御史糾劾死罪數十條遇赦免因以頓廢齊文襄王作相每誡厲朝士常以伯猷及崔叔仁為諭武定七年除太常卿其年卒年六十四贈驃騎大將軍中書監兗州刺史伯猷弟仲衡武定中儀同開府中郎仲衡弟輯之解褐奉朝請領侍御史以軍功賜爵城臯男稍遷黎陽太守屬元顥入洛令其舅范遵鎮守滑臺與輯之隔岸相對遵潛軍夜渡規欲掩襲輯之率厲城民拒河撀之遵遂遁走朝廷嘉之除司州別駕尋轉司空長史遷鎮南將軍金紫光祿大夫孝靜初除征南將軍東濟北太守帶肥城戍主男如故天平四年卒時年四十九贈都督北豫梁二州諸軍事驃騎將軍度支尚書北豫州刺史輯之弟懷孝武定中司徒諮議洞林子敬叔司州都官從事滎陽邑中正濮陽太守坐貪穢除名子籍字承宗徐州平東府長史籍弟瓊字祖珍有強幹之稱自太尉諮議為范陽太守治頗有聲卒贈太常少卿孝昌中弟儼寵要重贈安東將軍青州刺史瓊兄弟雍睦其諸娣姒亦咸相親愛閨門之內有無相通為時人所稱美子道邕歿關西儼事在恩倖傳敬叔弟士恭燕郡太守孝昌中因儼之勢除衞尉少卿尋遷左將軍瀛州刺史時葛榮寇竊河北州城淪陷不獲之鎮尋除征北將軍金紫光祿大夫又遷衞將軍右光祿大夫永熙中卒贈驃騎將軍冀州刺史重贈尚書左僕射諡曰貞長子子貞司空掾遷從事中郎南兗州開府司馬子貞弟子湛齊濟二州長史光祿大夫子湛弟昭伯武定中東平太守昭伯弟子嘉早卒子大護武定中司空戶曹參軍叔夜子伯夏司徒諮議東萊太守卒贈冠軍將軍太常少卿青州刺史子忠字周子右軍將軍鎮遠將軍卒贈平東, WYG: ''}
