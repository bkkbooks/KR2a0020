  - {type: 'tls:seg', offset: 1588, content: '', id: KR2a0020_ZHSJ_061-d61p13s3}
  - {type: variant, offset: 1588, length: 731, content: 道昭又表曰臣聞唐虞啟運以文德為本殷周致治以道藝為先然則禮樂者為國之基不可斯須廢也是故周敷文教四海宅心魯秉周禮強齊歸義及至戰國紛紜干戈遞用五籍灰焚羣儒坑殄賊仁義之經貴戰爭之術遂使天下分崩黔黎荼炭數十年間民無聊生者斯之由矣爰暨漢祖於行陳之中尚優引叔孫通等光武中興於撥亂之際乃使鄭衆范升校書東觀降逮魏晉何嘗不殷勤於篇籍篤學於戎伍伏惟大魏之興也雖羣凶未殄戎馬在郊然猶招集英儒廣開學校用能闡道義於八荒布盛德於萬國教靡不懷風無不偃今者乘休平之基開無疆之祚定鼎伊惟新寶曆九服感至德之和四垠懷擊壤之慶而蠢爾閩吳阻化江湫先帝爰震武怒戎車不息而停鑾佇蹕留心典墳命故御史中尉臣李彪與吏部尚書任城王澄等妙選英儒以崇文教澄等依旨置四門博士四十人其國子博士太學博士及國子助教宿已簡置伏尋先旨意在速就但軍國多事未遑營立自爾迄今垂將一紀學官凋落四術寢廢遂使碩儒耆德卷經而不談俗學後生遺本而逐末進競之風實由於此矣伏惟陛下欽明文思玄鑒洞遠越會未款務修道以來之遐方後服敷文教而懷之垂心經素優柔墳籍將使化越軒唐德隆虞夏是故屢發中旨敦營學館房宇既修生徒未立臣學陋全經識蔽篆素然往年刪定律令謬預議筵謹依準前修尋訪舊事參定學令事訖封呈自爾迄今未蒙報判但廢學歷年經術淹滯請學令并制早敕施行使選授有依生徒可準詔曰具卿崇儒敦學之意良不可言新令尋班施行無遠可謂職思其憂無曠官矣道昭又表曰竊惟鼎遷中縣年將一紀縉紳褫業俎豆闕聞遂使濟濟明朝無觀風之美非所以光國宣風納民軌義臣自往年以來頻請學令並置生員前後累上未蒙一報故當以臣識淺濫官無能有所感悟者也館宇既修生房粗構博士見員足可講習雖新令未班請依舊權置國子學生漸開訓業使播教有章儒風不墜後生覩徙義之機學徒崇知新之益至若孔廟既成釋奠告始揖讓之容請俟令出不報遷祕書監滎陽邑中正出, WYG: ''}
