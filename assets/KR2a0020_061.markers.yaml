  - {type: variant, offset: 6595, length: 599, content: 起哂之茲地荒蕪臣實為不揆愚瞽輒敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一準古法皆循舊隄何者河決瓠子梁楚幾危宣防既建水還舊迹十數年間戶口豐衍又決屯氏兩川分流東北數郡之地僅得支存及下通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毀滅良由水大渠狹更不開瀉衆流壅塞曲直乘之所致也至若量其逶迤穿鑿涓澮分立隄堨所在疏通預決其路令無停蹙隨其高下必得地形土木參功務從便省使地有金隄之堅水有非常之備鈎連相注多置水口從河入海遠邇逕通瀉其墝潟泄此陂澤九月農罷量役計功十月昏正立匠表度縣遣能工麾畫形勢郡發明使籌察可否審地推岸辨其脈流樹板分崖練厥從往別使案檢分剖是非瞰睇川原明審通塞當境修治不勞役遠終春自罷未須久功即以高下營田因於水陸水種秔稻陸藝桑麻必使室有久儲門豐餘積其實上葉禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢洿下雲雨陰霖動彌旬月遙途遠運惟用舟艫南畝畬菑微事耒耜而衆庶未為饉色黔首罕有飢顏豈天德不均致此偏罰故是地勢異圖有茲豐餒臣既鄉居水際目覩荒殘每思鄭白屢想王李夙宵不寐言念皇家愚誠丹款實希效力有心螢爝乞暫施行使數州士女無廢耕桑之業聖世洪恩有賑飢荒之士鄴宰深笑息自一朝臣之至誠申於今日詔曰頻年水旱為患黎民阻飢靜言念之昃不遑食鑒此事條深協在慮但計畫功廣非朝夕可合宜付外量聞事遂施行楷用功未就詔還追罷久之京兆王繼為大將軍西討引楷為司馬還轉後將軍廣平太守後葛榮轉盛諸將拒擊並皆失利孝昌初加楷持節散騎常侍光祿大夫, WYG: ''}
