  - {type: variant, offset: 1065, length: 294, content: 刺史尋進號平東將軍懿好勸課善斷決雖不潔清義然後取百姓猶思之永平三年卒贈本將軍兗州刺史諡曰穆子恭業襲爵武定三年坐與房子遠謀逆伏誅懿弟道昭字僖伯少而好學綜覽羣言初為中書學生遷祕書郎拜主文中散徙員外散騎侍郎祕書丞兼中書侍郎從征沔漢高祖饗侍臣於懸瓠方丈竹堂道昭與兄懿俱侍坐焉樂作酒酣高祖乃歌曰白日光天無不曜江左一隅獨未照彭城王勰續歌曰願從聖明兮登衡會萬國馳誠混江外鄭懿歌曰雲雷大振兮天門闢率土來賓一正歷邢巒歌曰舜舞干戚兮天下歸文德遠被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合高祖又歌曰遵彼汝墳兮昔化貞未若今日道風明宋弁歌曰文王政教兮暉江沼寧如大化光四表高祖謂道昭曰自比遷務雖猥與諸才儁不廢詠綴, WYG: ''}
