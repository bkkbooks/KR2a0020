  - {type: variant, offset: 7757, length: 0, content: '', WYG: 曲江縣開國公邑一千户虎牙為冠軍將軍員外散騎常侍豫寧縣開國伯邑五百户正始初蕭衍征虜將軍趙祖悦築城於水東與頴川接對置兵數千欲為攻討之本伯之進軍討祖悦大破之乘勝長驅入城刺祖悦三創賊衆大敗進討南城破賊諸部斬獲數千二年夏除伯之光禄大夫虎牙遷前軍將軍孟表字武逹濟北蛇丘人也自云本屬北地號索里諸孟青徐内屬後表因事南渡仕蕭鸞為馬頭太守太和十八年表據郡歸誠除輔國將軍南兖州刺史領馬頭太守賜爵譙縣侯鎮渦陽後蕭鸞遣其豫州刺史裴叔業攻圍六十餘日城中食盡唯以朽革及草木皮葉為糧表撫循將}
