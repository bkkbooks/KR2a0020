  - {type: variant, offset: 6216, length: 0, content: '', WYG: 郎尚書郎治書侍御史加寧遠將軍本州中正正始三年蕭衍將蕭及先率歩騎二萬入㓂兖州及先令别帥角念屯于蒙山以祖朽為統軍假寧朔將軍隸邢巒討之祖朽開誘有方降者相繼賊出逆戰祖朽大破之賊走還柵祖朽夜又焚擊賊徒潰散追討百餘里斬獲及赴沂水死者四千餘人斬龍驤將軍矯道儀寧朔將軍王季秀以功封南城縣開國男食邑二百户歴}
