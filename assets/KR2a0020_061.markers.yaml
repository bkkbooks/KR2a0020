  - {type: variant, offset: 5685, length: 385, content: 別將北討初楷喪之始巨倫收殯倉卒事不周固至是遂偷路改殯并竊家口以歸尋授國子博士莊帝即位假節中堅將軍東濮陽太守假征虜將軍別將時河北紛梗人士避賊多住郡界歲儉飢乏巨倫傾資贍恤務相全濟時類高之元顥入洛據郡不從莊帝還宮行西兗州事封漁陽縣開國男邑二百戶尋除光祿大夫三年卒時年四十四子武襲武定中懷州衞軍府錄事參軍齊受禪爵例降初巨倫有姊明惠有才行因患眇一目內外親類莫有求者其家議欲下嫁之巨倫姑趙國李叔胤之妻高明慈篤聞而悲感曰吾兄盛德不幸早世豈令此女屈事卑族乃為子翼納之時人歎其義崔氏與翼書詩數十首辭理可觀逸弟模字叔軌身長八尺圍亦如之出後其叔雅有志度起家奉朝請歷太尉祭酒尚書金部郎中太尉主簿轉中郎遷太子家令以公事免神龜中詔復本資除冠軍將軍中散大夫出除魯陽太守正光二年襄陽民密求款附詔模為別將隸淮南王世遵率衆赴之事覺模焚襄陽邑郭而還坐不克免官及蕭寶夤討關隴引模為西征別將屢有戰功除持節光祿大夫, WYG: ''}
