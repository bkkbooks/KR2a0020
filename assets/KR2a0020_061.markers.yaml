  - {type: variant, offset: 7229, length: 334, content: 表曰竊惟殷州地實四衝居當五裂西通長山東漸臣野頃國路康寧四方有截仍聚姦宄桴鼓時鳴況今天長喪亂妖災間起定州逆虜趑趣北界鄴下兇燼蠶噬腹心兩處犬羊勢足并合城下之戰匪暮斯朝臣以不武屬此屏捍實思効力以弱敵強析骸煮弩固此忠節但基趾造創庶事茫然升儲尺刃聊自未有雖欲竭誠莫知攸濟謹列所須兵仗請垂矜許必當虎視一方遏其侵軼肅清境內保全所委詔付外量竟無所給葛榮自破章武廣陽二王之後鋒不可當初楷將之州人咸勸留家口單身述職楷曰貪人之祿憂人之事如一身獨往朝廷謂吾有進退之計將士又誰肯為人固志也遂合家赴州三年春賊勢已逼或勸減小弱以避之乃遣第四女第三兒夜出既而召僚屬共論之咸曰女郎出嫁之女郎君小未勝兵留之無益去復何損且使君在城家口尚多足固將士之意竊不足為疑楷曰國家豈不知城小力弱也置吾死地令吾死耳一朝送, WYG: 坐}
