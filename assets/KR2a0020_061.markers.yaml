  - {type: variant, offset: 323, length: 2, content: 張超, krp: 李㧞等遂逼陜}
  - {type: variant, offset: 326, length: 363, content: 守不下石率精銳攻之不克遂退至陳項議欲還軍長社待秋擊之諸將心樂早還咸稱善計羲曰今張超驅市人負擔石蟻聚窮城命不延月宜安心守之超食已盡不降當走可翹足而待成擒物也而欲棄還長社道塗懸遠超必修城深多積薪穀將來恐難圖矣石不納遂旋師長社至冬復往攻超超果設備無功而還歷年超死楊文長代戍食盡城潰乃克之竟如羲策淮北平遷中書侍郎延興初陽武人田智度年十五妖惑動衆擾亂京索以羲河南民望為州郡所信遣羲乘傳慰諭羲到宣示禍福重加募賞旬日之間衆皆歸散智度奔潁川尋見擒斬以功賜爵平昌男加鷹揚將軍高祖初兼員外散騎常侍假寧朔將軍陽武子使於劉準中山王叡寵幸當世並置王官羲為其傅是後歷年不轉資產亦乏因請假歸遂磐桓不返及李沖貴寵與羲姻好乃就家徵為中書令文明太后為父燕宣王立廟於長安初成以羲兼太常卿假滎陽侯具官屬詣長安拜廟刊石建碑於廟門還以使功仍賜侯爵加給事中出為安東將軍西兗, WYG: 時秦}
