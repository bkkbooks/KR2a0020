  - {type: variant, offset: 5450, length: 233, content: 以本官子巨倫字孝宗幼孤及長歷涉經史有文學武藝以世宗挽郎除冀州鎮北府墨曹參軍太尉記室參軍叔楷為殷州巨倫仍為長史北道別將在州陷賊斂恤亡存為賊所義葛榮聞其才名欲用為黃門侍郎巨倫心惡之至五月五日會集官僚令巨倫賦詩巨倫乃曰五月五日時天氣已大熱狗便呀欲死牛復吐出舌以此自晦獲免未幾潛結死士數人夜中南走逢賊遊騎數百俱恐不濟巨倫曰寧南死一寸豈北生一尺也便欺賊曰吾受敕而行賊不信共爇火觀敕火未然巨倫手刃賊帥餘人因與奮擊殺傷數十人賊乃四潰得馬數匹而去夜陰失道惟看佛塔戶而行到洛朝廷嘉之授, WYG: ''}
