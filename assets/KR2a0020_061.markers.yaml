  - {type: variant, offset: 6207, length: 7, content: 幹具釋褐奉朝請, WYG: 榮之時衆敬以老還鄉常呼元賔為使君每於元賔聽政之時乘輿出至元賔所先遣左右勑不聽起觀其斷決忻忻然喜見顔色衆敬善持家業尤能督課田産大致儲積元賔為政清平善撫民物百姓愛樂之以父憂解任喪中遥授長兼殿中尚書其年冬末卒贈撫軍將軍衛尉卿諡曰平賜帛八百匹元賔入國初娶東平劉氏有四子祖朽祖髦祖歸祖旋賜妻元氏生二子祖榮祖暉祖朽最長祖暉次祖髦故事前妻雖先有子後賜之妻子皆承嫡所以劉氏先亡祖暉不服重元氏後卒祖朽等三年終禮祖榮早卒子義允襲祖爵東平公例降為侯陵江將軍給事中卒子僧安襲祖朽身長八尺腰帶十圍歴渉經史好為文詠性寛厚善與人交襲父爵湏昌侯例降為伯起家}
