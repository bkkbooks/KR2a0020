  - {type: variant, offset: 7722, length: 0, content: '', WYG: 光禄大夫天平四年卒年五十贈都督兗濟二州諸軍事征東將軍尚書左僕射兗州刺史祖彦弟哲永安末祕書郎諸畢當朝不之榮貴但幃薄不修為時所鄙申纂者本魏郡人申鍾會孫也皇始初太祖平中山纂宗室南奔家于濟隂及在無鹽劉彧用為兗州刺史顯祖曰申纂既不識機又不量力進不能歸正朔退不能還江南守孤城於危亡之地欲建功立節豈可得乎纂既敗子景義入國太和中為散員士宋王劉昶國侍郎景明初試守濟隂郡揚州車騎府録事參軍右司馬常珍竒者汝南人也為劉駿司州刺史亦與薛安都等推立劉子勛子勛敗遣使馳告長社鎮請降顯祖遣殿中尚書元石為都將率衆赴之中書博士鄭羲參右軍事進至上蔡珍竒率文武來迎羲說石令徑入城語在羲傳事}
