  - {type: variant, offset: 6205, length: 0, content: '', WYG: 若至親太和中高祖賔禮舊老衆敬與咸陽公高允引至方山雖文武奢儉好尚不同然亦與允甚相愛敬接膝談款有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具銀装劒一口刺虎矛一枚仙人文綾一百疋文明太后髙祖引見於皇信堂賜以酒饌車一乘馬三匹絹三百匹勞遣之十五年十月卒詔於兖州賜絹一千匹以供葬事子元賔少而豪俠有武幹渉獵書史為劉駿正員將軍與父同建勲誠及至京師俱為上客賜爵湏昌侯加平遠將軍後以元賔勲重拜使持節平南將軍兖州刺史假彭城公父子相代為本州}
  - {type: page-break, offset: 6205, content: '', id: KR2a0020_WYG_061-11b, image: WYG0261/WYG0261-0835d.png}
