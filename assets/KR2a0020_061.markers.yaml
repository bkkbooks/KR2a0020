  - {type: variant, offset: 703, length: 229, content: 賄成性又嗇吝民有禮餉者皆不與杯酒臠肉西門受羊酒東門酤賣之以李沖之親法官不之糾也酸棗令鄭伯孫鄄城令童騰別駕賈德治中申靈度並在任廉貞勤恤百姓羲皆申表稱薦時論多之文明太后為高祖納其女為嬪徵為祕書監太和十六年卒贈帛五百匹尚書奏諡曰宣詔曰蓋棺定諡先典成式激揚清濁治道明範故何曾幼孝良史不改繆醜之名賈充寵晉直士猶立荒公之稱羲雖宿有文業而治闕廉清稽古之効未光於朝策昧貨之談已形於民聽諡以善問殊乖其衷又前歲之選匪由備行充舉自荷後任勳績未昭尚書何乃情遺至公愆違明典依諡法博聞多, WYG: 武力}
