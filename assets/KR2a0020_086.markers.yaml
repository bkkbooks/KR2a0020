  - {type: variant, offset: 1357, length: 376, content: 對賓客破牀弊席粗飯冷菜衣服故敗乃過逼下善候當途能為詭激每於稠人廣衆之中或撾一姦吏或縱一孤貧大言自眩示己高明矜物無知淺識皆稱其美公能之譽動過其實性又酷虐在晉陽曾營城雉仁之統監作役以小稽緩遂杖前殷州刺史裴瑗幷州刺史王綽齊獻武王大加譴責性好文字吏書失體便加鞭撻言韻微訛亦見捶楚吏民苦之而愛好文史敬重人流與齋帥馮元興交款元興死後積年仁之營視其家常出隆厚時人以此尚之字文忠之河南洛陽人也其先南單于之遠屬世據東部後入居代都祖阿生安南將軍巴西公父侃卒於治書侍御史忠之獵涉文史頗有筆札釋褐太學博士天平初除中書侍郎裴伯茂與之同省常侮忽之以忠之色黑呼為黑宇後敕修國史元象初兼通直散騎常侍副鄭伯猷使蕭衍武定初為安南將軍尚書右丞仍修史未幾以事除名忠之好榮利自為中書郎六七年矣遇尚書省選右丞預選者皆射策忠之入試焉既獲丞職大為忻滿志氣囂然有驕物之色識者笑之既失官爵怏怏發病卒子君山, WYG: 門閭}
