  - {type: punctuation, offset: 815, content: 、, id: KR2a0020_ZHSJ_086-bkkpn166}
  - {type: variant, offset: 815, length: 410, content: 屯田郎李延孝外兵郎李奐三公郎王延業方駕而行偉少居後路逢一尼望之歎曰此輩緣業同日而死謂偉曰君方近天子當作好官而昇等四人皆於河陰遇害果如其言俄領著作郎前廢帝立除安東將軍祕書監仍著作初尒朱兆之入洛官守奔散國史典書高法顯密埋史書故不遺落偉自以為功訴求爵賞偉挾附世隆遂封東阿縣伯而法顯止獲男爵偉尋進侍中孝靜初除衞大將軍中書令監起居後以本官復領著作卒官贈驃騎大將軍開府儀同三司都督幽州刺史諡曰文貞公國史自鄧淵崔琛崔浩高允李彪崔光以還諸人相繼撰錄綦儁及偉等諂說上黨王天穆及尒朱世隆以為國書正應代人修緝不宜委之餘人是以儁偉等更主大籍守舊而已初無述著故自崔鴻死後迄終偉身二十許載時事蕩然萬不記一後人執筆無所憑據史之遺闕偉之由也外示沉厚內實矯競與綦儁少甚相得晚以名位之間遂若水火與宇文忠之之徒代人為黨時賢畏惡之而愛尚文史老而彌篤偉弟少亡偉撫寡訓孤同居二十餘載恩義甚篤不營產業身亡之後賣宅營葬妻子不免飄泊士友歎愍之長子昂襲爵劉仁之字山靜河南洛, WYG: 滎}
