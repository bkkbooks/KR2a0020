  - {type: page-break, offset: 0, content: '', id: KR2a0020_ZHSJ_086-1791a}
  - {type: line-break, offset: 0, content: '', id: ZHSJ__dup22062}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 六齊魏收撰列𫝊孝感第七十四趙琰長孫慮乞伏保孫益徳董洛生楊引閻元明吳悉達王續生李顯達張昇倉跋王崇郭文恭經云孝徳之本孝悌之至通於神明此葢生人之大者淳風既逺世情雖薄孔門有以責衣錦詩人所以思素冠且生盡色養之天終極哀思之地若乃誠達泉魚感通鳥獸事匪常論斯葢希矣至如溫牀扇席灌樹負土時或加人咸為度俗今書趙琰等以孝感為目焉趙琰字叔起天水人父溫為楊難當司馬初苻氏亂琰為乳母攜奔夀春年十四乃歸孝心色養餁熟之節必親調之皇興中京師儉婢簡粟糶之琰遇見切責勅留輕粃嘗送子應冀州娉室從者於路遇得}
  - {type: page-break, offset: 5, content: '', id: KR2a0020_WYG_086-1b, image: WYG0262/WYG0262-0252d.png}
