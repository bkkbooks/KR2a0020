  - {type: variant, offset: 10, length: 0, content: '', WYG: 耜即令送還刃主刃主高之義而不受琰命委之而去初為兗州司馬轉團城鎮副将還京為淮南王他府長史時禁制甚嚴不聽越闗葬於舊兆琰積三}
