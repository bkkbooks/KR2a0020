  - {type: variant, offset: 808, length: 6, content: 偉與儀曹郎袁, WYG: 弔贈盡禮如舊相識王續生滎陽京縣人也遭繼母憂居䘮杖而後起及終禮制鬢髪盡落有司奏聞世宗詔標旌門閭甄其徭役李顯達潁川陽翟人也父䘮水漿不入口七日鬢髮墮落形體枯悴六年廬於墓側哭不絶聲殆於滅性州牧高陽王雍以狀奏靈太后詔表其門閭張}
