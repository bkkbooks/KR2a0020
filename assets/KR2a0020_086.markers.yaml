  - {type: variant, offset: 1289, length: 0, content: '', WYG: 詔標門閭王崇字乾邕陽夏雍丘人也兄弟並以孝稱身勤稼穡以養二親仕梁州鎮南府主簿母亡杖而後起鬢髮墮落未及葬柩殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至有一小鳥素質墨眸形大如雀栖於崇廬朝夕不去母䘮始闋復丁父憂哀毁過禮是年陽夏風雹所過之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃竟無損落及過崇地風雹如}
