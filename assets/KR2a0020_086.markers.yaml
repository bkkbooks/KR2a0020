  - {type: variant, offset: 685, length: 0, content: '', krp: 上狀稱美有司奏宜旌賞復其一門樹其純孝詔别勅集書標楊引至行}
  - {type: variant, offset: 686, length: 0, content: '', WYG: 可假以散員之名閻元明河東安邑人也少而至孝行著鄉閭太和五年除北隨郡太守元明以違離親養興言悲慕母亦慈念泣淚䘮明元明悲號上訴許歸奉養一見其母母目便開刺史呂夀恩列狀上聞詔下州郡表為孝門復其租調兵役令終母年母亡服終心喪積載每忌日悲慟傍鄰昆弟雍和尊卑諧穆安貧樂道白首同歸又猗氏縣人令狐仕兄弟四人早喪父泣慕十載奉養其母孝著鄉邑而力田積粟博施不已又河東郡人楊風等七百五十人列稱樂户皇甫奴兄弟雖沉屈兵伍而操尚彌高奉養繼親甚著恭孝之稱又東郡小黄縣人董吐渾兄養事親至孝三世同居閨門有禮景明初畿内大使王凝奏請標異詔從之吳悉達河東聞喜人也弟兄三人年並幼小父母為人所殺四時號慕悲感鄉鄰及長報仇避地永安昆弟同居四十餘載閨門和睦讓逸競勞雖於儉年糊饘不繼賔客經過必傾所有每守宰殯䘮私辦車牛送終葬所隣人孤貧窘困莫不解衣輟糧以相賑恤鄉閭五百餘人詣州稱頌焉刺史以悉達兄弟行著鄉里板贈悉達父渤海太守悉達後}
  - {type: page-break, offset: 686, content: '', id: KR2a0020_WYG_086-4b, image: WYG0262/WYG0262-0254b.png}
