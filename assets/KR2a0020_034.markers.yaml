  - {type: variant, offset: 1899, length: 0, content: '', krp: 賜爵金鄉公加忠意將軍後改為宣城公太宗性明察羣臣多以職事遇遣至有杖罰故路頭優游不任事侍宿左右從容談笑而已路頭性無害毎至評獄處理常獻寛恕之議以此見重於朝太宗亦敬納之寵待隆厚賞賜無數當時功臣親幸莫及泰常六年卒太宗親臨哀慟贈侍中左衛大將軍太師宣城王諡曰忠貞喪禮一依安成王叔孫俊故事陪葬金陵子眷襲爵盧魯元昌黎徒河人也曾祖副鳩仕慕容垂為尚書令臨澤公祖父並至大官魯元敏而好學寛和有雅度太宗時選為通直郎以忠謹給侍東宫恭勤盡節世祖親愛之及即位以為中書侍郎拾遺左右寵待彌深而魯元益加謹肅世祖逾親信之内外大臣莫不敬憚焉性多容納善與人交好掩人之過揚人之美由是公卿咸親附之魯元以工書有文才累遷中書監領秘書事賜爵襄城公加散騎常侍右將軍贈其父為信都侯}
  - {type: variant, offset: 1901, length: 4, content: 蠕蠕戰沒, WYG: 赫連昌世祖親追擊之入其城門魯元隨世祖出入是日微魯元㡬至危殆從征平凉以功拜征北大將軍加侍中後遷太保錄尚書事世祖貴異之常從征伐出入臥内每有平殄輒以功賞賜僮𨽻前後數百人布帛以萬計世祖臨幸其第不出旬日欲其居近易於往來乃賜甲第於宫門南衣食車馬皆乘輿之副真君三年冬車駕幸隂山魯元以疾不從侍臣問疾送醫藥傳驛相屬於路及薨世祖甚悼惜之還臨其喪哭之哀慟東西二宫命太官日送奠晨昏哭臨訖則備奏鐘鼓伎樂輿駕比𦵏三臨之喪禮依安成王故事而賵送有加贈襄城王諡曰孝𦵏於崞山為建碑闕自魏興貴臣恩寵無與為比}
