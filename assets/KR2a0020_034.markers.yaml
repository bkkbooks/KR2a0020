  - {type: variant, offset: 1899, length: 0, content: '', WYG: 賜爵金鄉公加忠意將軍後改為宣城公太宗性明察羣臣多以職事遇遣至有杖罰故路頭優游不任事侍宿左右從容談笑而已路頭性無害毎至評獄處理常獻寛恕之議以此見重於朝太宗亦敬納之寵待隆厚賞賜無數當時功臣親幸莫及泰常六年卒太宗親臨哀慟贈侍中左衛大將軍太師宣城王諡曰忠貞喪禮一依安成王叔孫俊故事陪葬金陵子眷襲爵盧魯元昌黎徒河人也曾祖副鳩仕慕容垂為尚書令臨澤公祖父並至大官魯元敏而好學寛和有雅度太宗時選為通直郎以忠謹給侍東宫恭勤盡節世祖親愛之及即位以為中書侍郎拾遺左右寵待彌深而魯元益加謹肅世祖逾親信之内外大臣莫不敬憚焉性多容納善與人交好掩人之過揚人之美由是公卿咸親附之魯元以工書有文才累遷中書監領秘書事賜爵襄城公加散騎常侍右將軍贈其父為信都侯}
  - {type: page-break, offset: 1899, content: '', id: KR2a0020_WYG_034-3b, image: WYG0261/WYG0261-0493b.png}
