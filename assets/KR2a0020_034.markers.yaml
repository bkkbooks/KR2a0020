  - {type: variant, offset: 3766, length: 147, content: 有當官之稱轉尚書令出為涼州鎮大將加鎮西將軍隣與鎮副將奚牧並以貴戚子弟競貪財貨專作威福遂相糾發坐伏誅史臣曰奚斤世稱忠孝征伐有克平涼之役師殲身虜雖敗崤之責已赦封尸之效靡立而恩禮隆渥沒祀廟庭叔孫建少展誠勤終著庸伐治邊有術威震夷楚俊委節太宗義彰顛沛察朱提之變有日磾之風加以柔而有正見美朝野可謂世不乏賢矣, WYG: 卷三十四考證}
