  - {type: variant, offset: 1910, length: 0, content: '', krp: 兩宫勢傾天下内性寛厚有父風而恭順不及正平初宫臣伏誅世祖以魯元故唯殺内而厚撫其兄弟統以父任侍東宫世祖以元舅陽平王杜超女南安長公主所生妻之車駕親自臨送太官設供具賜賚以千計髙宗即位典選部主客二曹興安二年卒贈襄城王諡曰景無子弟彌娥襲爵拜北鎮都將卒贈襄城王諡曰恭子興仁襲爵陳建代人也祖渾太祖末為右衛將軍父陽尚書建以善騎射擢為三郎稍遷下大夫内行長世祖討山胡白龍意甚輕之單將數十騎登山臨嶮每日如此白龍乃伏壮士十餘處出}
  - {type: variant, offset: 1911, length: 0, content: '', WYG: 不意世祖墮馬㡬至不測建以身捍賊大呼奮擊殺賊數人身被十餘創世祖壮之賜户二十髙宗初賜爵阜城侯加冠軍將軍出為幽州刺史假秦郡公髙宗以建貪暴懦弱遣使就州罰杖五十髙祖初徴為尚書右僕射加侍中進爵趙郡公建與侍中尚書晉陽侯元仙徳殿中尚書長樂王穆亮比部尚書平原王陸叡密表曰皇天輔徳命集大魏臣等祖父翼贊初興勤過蜀漢誓固山河享兹景福寵辱休戚與國均焉臣以凡近識無逺逹階藉先寵遂荷今任彼已之譏播於羣口仰感生成俯自䇿厲顧省駑鈍終於無益然飲冰驚寐實懐慙負至於願天髙地厚何日忘之自永嘉之末封豕橫噬馬叡南據奄有荆楚及桓劉跋扈禍難相繼岱宗隔望秩之敬青徐限見徳之風獻文皇帝髫齔龍飛道光率土干戚暫舞淮海從風車書既同華裔將一昊天不弔奄背萬邦竊聞劉昱天亡權臣殺害思正之民翹想罔極愚謂時不再來機宜易失毫分之差致悔千里天與不取反受其咎所謂見而不作過在介石者也宜簡雄將號令八方義陽王臣昶深悟存亡逺同孫氏茍歴運響從則呉㑹可定脫事有難成則振旅而返進可以揚義聲於四海退可以通徳信於遐裔宜乘之㑹運鍾今日如合聖聼乞速施行脱忤天心願存臣表徐觀後驗賞罰隨焉髙祖嘉之遷司徒征西大將軍進爵魏郡王髙祖與文明太后頻幸建第賜建妻宴於後庭太和九年薨子念襲爵為中山守坐掠良人為御史中尉王顯所彈遇赦免爵除萬安國代人也祖真世為酋帥恒率部民從世祖征伐以功除平西將軍敦煌公轉驃騎大將軍儀同三司父振尚髙陽長公主拜駙馬都尉遷散騎常侍寧西將軍長安鎮將賜爵馮翊公安國少明敏有姿貌以國甥復尚河南公主拜駙馬都尉遷散騎常侍}
