  - {type: variant, offset: 358, length: 1155, content: 幸雲中斤留守京師昌黎王慕容伯兒收合輕俠失志之徒李沈等三百餘人謀反斤聞而召伯兒入天文殿東廡下窮問款引悉收其黨誅之詔與南平公長孫嵩等俱坐朝堂錄決囚徒太宗大閱于東郊治兵講武以斤行左丞相大蒐於石會山車駕西巡詔斤為先驅討越勒部於鹿那山大破之獲馬五萬匹牛羊二十萬頭徙二萬餘家而還又詔斤與長孫嵩等八人坐止車門右聽理萬機蠕蠕犯塞令斤等追之事具蠕蠕傳拜天部大人進爵為公命斤出入乘軺軒備威儀導從世祖之為皇太子臨朝聽政以斤為左輔劉義符立其大臣不附國內離阻乃遣斤收劉裕前侵河南地假斤節都督前鋒諸軍事司空公晉兵大將軍行揚州刺史率吳兵將軍公孫表等南征用表計攻滑臺不拔求濟師太宗怒其不先略地切責之乃親南巡次中山義符東郡太守王景度捐城遁走司馬楚之等並遣使詣斤降斤自滑臺趣洛陽義符虎牢守將毛德祖遣其司馬翟廣將軍姚勇錯竇霸等率五千人據土樓以拒斤斤進擊破之廣等單馬走免盡殪其衆斤長驅至虎牢軍於汜東留表守輜重自率輕兵徇下河南穎川陳郡以南百姓無不歸附義符陳留太守嚴稜以郡降斤遂平兗豫諸郡還圍虎牢德祖拒守不下及虎牢潰斤置守宰以撫之自魏初大將行師唯長孫嵩拒劉裕斤征河南獨給漏刻及十二牙旗太宗崩斤乃班師世祖即位進爵宜城王仍為司空世祖征赫連昌遣斤率義兵將軍封禮等督四萬五千人襲蒲坂昌守將赫連乙升聞斤將至遣使告昌使至統萬見大軍已圍其城還告乙升曰昌已敗矣乙升懼棄蒲坂西走斤追敗之乙升遂奔長安斤入蒲坂收其資器百姓安業昌弟助興先守長安乙升至復與助興棄長安西走安定斤又西據長安於是秦雍氐羌皆來歸附與赫連定相持累戰破定定聞昌敗遂走上邽斤追之至雍不及而還詔斤班師斤上疏曰赫連昌亡保上邽鳩合餘燼未有盤據之資今因其危滅之為易請益鎧馬平昌而還世祖曰昌亡國叛夫擊之勞傷將士且可息兵取之不晚斤抗表固執乃許之給斤萬人遣將軍劉拔送馬三千匹與斤斤進討安定昌退保平涼斤屯軍安定以糧竭馬死遂深壘自固監軍侍御史安頡擊昌擒之語在頡傳昌衆復立昌弟定為主守平涼斤自以元帥而擒昌之功更不在己深之乃舍輜重輕齎三日糧追定於平涼娥清欲尋水而往斤不從自北道邀其走路定衆將出會一小將有罪亡入賊具告其實定知斤軍無糧乏水乃邀斤前後斤衆大潰斤及娥清劉拔為定所擒士卒死者六七千人後世祖克平涼斤等得歸免為宰人使負酒食從駕還京師以辱之尋拜安東將軍降爵為公車駕將討馮文通詔斤發幽州民及密雲丁零萬餘人運攻具出南道太延初為衞尉改為弘農王加征南大將軍後為萬騎大將軍世祖大集羣臣於西堂議伐涼州斤等三十餘人議曰河西王牧犍西垂下國雖內不純臣而外修職貢宜加寬宥恕其微愆去歲新征士馬疲弊未可大舉宜且覊縻其地鹵薄略無水草大軍既到不得久停彼聞軍來必嬰城固守攻則難拔野無所掠終無克獲世祖不從征之涼州平以戰功賜僮隸七十戶以斤元老賜安車平決刑獄諮訪朝政斤聰辯強識善於談論遠說先朝故事雖未皆是時有所得聽者歎美之每議大政多見從用朝廷稱焉真君九年薨時年八十世祖, WYG: ''}
