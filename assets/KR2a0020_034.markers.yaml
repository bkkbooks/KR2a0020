  - {type: variant, offset: 1910, length: 0, content: '', WYG: 兩宫勢傾天下内性寛厚有父風而恭順不及正平初宫臣伏誅世祖以魯元故唯殺内而厚撫其兄弟統以父任侍東宫世祖以元舅陽平王杜超女南安長公主所生妻之車駕親自臨送太官設供具賜賚以千計髙宗即位典選部主客二曹興安二年卒贈襄城王諡曰景無子弟彌娥襲爵拜北鎮都將卒贈襄城王諡曰恭子興仁襲爵陳建代人也祖渾太祖末為右衛將軍父陽尚書建以善騎射擢為三郎稍遷下大夫内行長世祖討山胡白龍意甚輕之單將數十騎登山臨嶮每日如此白龍乃伏壮士十餘處出}
