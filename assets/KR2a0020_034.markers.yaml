  - {type: variant, offset: 2981, length: 204, content: 聞為國之道存不忘亡宜繕甲兵增益屯戍先為之備以待其來若不豫設卒難擒殄且吳越之衆便於舟檝今至北土舍其所長逆順既殊勞逸不等平寇定功在於此日臣雖衰弊謀略寡淺過蒙殊寵忝荷重任討除寇暴臣之志也是以秣馬枕戈思效微節願陛下不以南境為憂世祖優詔答之賜以衣馬建與汝陰公長孫道生濟河而南彥之仲德等自清入濟東走青州劉義隆兗州刺史竺靈秀棄須昌南奔湖陸建追擊大破之斬首五千餘級遂至鄒魯還屯范城世祖以建威名南震為義隆所憚除平原鎮大將封丹陽, WYG: 曰}
