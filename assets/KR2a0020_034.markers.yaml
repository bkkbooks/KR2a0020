  - {type: variant, offset: 3220, length: 238, content: 陽一道攻滑臺義隆將檀道濟王仲德救滑臺建與汝陰公道生拒擊之建分軍挾戰縱輕騎邀其前後焚燒穀草以絕其糧道道濟兵飢叛者相繼由是安頡等得拔滑臺建沉敏多智東西征伐常為謀主治軍清整號令嚴明又雅尚人倫禮賢愛士在平原十餘年綏懷內外甚得邊稱魏初名將尠有及之南方憚其威略青兗輒不為寇太延三年薨時年七十三世祖悼惜之諡曰襄王賜葬金陵長子俊字醜歸少聰敏年十五內侍左右性謹密初無過行以便弓馬轉為獵郎太祖崩清河王紹閉宮門太宗在外紹逼俊以為己援俊外雖從紹內實忠款仍與元磨渾等說紹得歸太宗事在磨渾傳是時太宗左右唯, WYG: 兒}
