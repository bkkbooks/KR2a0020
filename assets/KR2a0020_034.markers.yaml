  - {type: variant, offset: 2297, length: 663, content: 德宗將劉裕伐姚泓令其部將王仲德為前鋒將逼滑臺兗州刺史尉建率所部棄城濟河仲德遂入滑臺乃宣言曰晉本意欲以布帛七萬匹假道於魏不謂魏之守將便爾棄城太宗聞之詔建自河內向枋頭以觀其勢仲德入滑臺月餘又詔建渡河曜威斬尉建投其屍於河呼仲德軍人與語詰其侵境之意仲德遣司馬竺和之建命公孫表與言和之曰王征虜為劉太尉所遣入河西行將取洛城掃山陵之寇非敢侵犯魏境太尉自遣使請魏帝陳將假道而魏兗州刺史不相體解望風捐去因空城而入非戰攻相逼也魏晉和好之義不廢於前表曰尉建失守之罪自有常刑將更遣良牧彼軍宜西不然將以小致大乖和好之體和之曰王征虜權住於此以待衆軍之集比當西過滑臺還為魏有何必建旗鼓以耀威武乎仲德卑辭常自言不敢與大魏抗衡建不能制之太宗令建與劉裕相聞以觀其意裕答言洛是晉之舊京而羌姚據之晉欲修復山陵之計久矣而內難屢興不暇經營司馬休之魯宗之父子司馬國璠兄弟諸桓宗屬皆晉之蠹也而姚氏收集此等欲以圖晉是以伐之道由於魏軍之初舉將以重幣假途會彼邊鎮棄守而去故晉前軍得以西進非敢憑陵魏境裕以官軍在河南恐斷其前路乃命引軍北寇及班師乃止語在帝紀建與南平公長孫嵩各簡精兵二千觀劉裕事勢語在嵩傳遷廣阿鎮將羣盜斂跡威名甚震久之除使持節都督前鋒諸軍事楚兵將軍徐州刺史率衆自平原濟河徇下青兗諸郡建濟河劉裕兗州刺史徐琰奔彭城建遂東入青州司馬受之秀之先聚黨於濟東皆率衆降建入臨淄劉義符前東牟太守清河張幸先匿孤山聞建至率二千人迎建於女水遂圍義符青州刺史竺夔於東陽城義符遣將檀道濟王仲德救夔建不克而還建以功賜爵壽光侯加鎮南將軍建表曰臣前遣沙門僧護詣彭城僧護還稱賊發軍向北前鋒將徐卓之已至彭城, WYG: ''}
