  - {type: variant, offset: 3832, length: 184, content: 以討之尋復封梁郡開國公寄食濟州之濮陽熙平初賊堰既成淮水濫溢將為揚徐之患寶夤於堰上流更鑿新渠引注淮澤水乃小減乃遣輕車將軍劉智文虎威將軍劉延宗率壯士千餘夜渡淮燒其竹木營聚破賊三壘殺獲數千人斬其直閤將軍王升明而還火數日不滅衍將垣孟孫張僧副等水軍三千渡淮北攻統軍呂叵寶夤遣府司馬元達統軍魏續年等赴擊破之孟孫等奔退乃授左光祿大夫殿中尚書寶夤又遣軍主周恭叔率壯士數百夜渡淮南焚賊徐, WYG: 青}
