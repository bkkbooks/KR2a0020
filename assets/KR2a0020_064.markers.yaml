  - {type: variant, offset: 1144, length: 412, content: 許又賜布千匹及發高祖親餞之命百僚賦詩贈昶又以其文集一部賜昶高祖因以所製文筆示之謂昶曰時契勝殘事鍾文業雖則不學欲罷不能脫思一見故以相示雖無足味聊復為笑耳其重昶如是自昶之背彭城至是久矣其昔齋宇山池並尚存立昶更修繕還處其中不能綏邊懷物撫接義故而閨門喧猥內外姦雜前民舊吏莫不慨歎焉豫營墓於彭城西南與三公主同塋而異穴發石累之墳崩壓殺十餘人後復移改為公私費害高祖南討昶候駕於行宮高祖遣侍中迎勞之昶討蕭昭業司州雖屢破賊軍而義陽拒守不克昶乃班師十九年高祖在彭城昶至入見昶曰臣奉敕專征剋殄兇醜徒勞士馬久淹歲時有損威靈伏聽斧鉞高祖曰朕之此行本無攻守之意正欲伐罪弔民宣威布德二事既暢不失本圖朕亦無克而還豈但卿也十月昶朝于京師高祖臨光極堂大選高祖曰朝因月旦欲評魏典夫典者為國大綱治民之柄君能好典則國治不能則國亂我國家昔在代隨時制作非通世之長典故自夏及秋親議條制或言唯能是寄不必拘門朕以為不爾何者當今之世仰祖質朴清濁同流混齊一等君子小人名品無別此殊為, WYG: 息禁過}
