  - {type: variant, offset: 8606, length: 0, content: '', WYG: 事求銓别選格排抑武人不使預在清品由是衆口喧喧謗讟盈路立榜大巷剋期㑹集屠害其家彛殊無畏避之意父子安然神龜二年二月羽林虎賁幾將千人相率至尚書省詬罵求其長子尚書郎始均不獲以瓦石擊打公門上下畏懼莫敢討抑遂便持火虜掠道中薪蒿以杖石為兵器直造其第曵彛堂下捶辱極意唱呼嗸嗸焚其屋宇始均仲瑀當時踰北垣而走始均回救其父拜伏羣小以請父命羽林等就加毆擊生投之於煙火之中及得尸骸不復可識唯以髻中小釵為驗仲瑀傷重走免彛僅有餘命沙門寺與其比隣輿致於寺逺近聞見莫不惋駭彛臨終口占左右上啓曰臣自奉國及孫六世尸禄素餐負恩唯靦徒思竭智盡誠終然靡效臣第二息仲瑀所上之事益治實多既曰有益寜容黙爾通呈有日未簡神聽豈圖衆忿乃至於此臣不能禍防未萌慮絶殃兆致令軍衆横囂攻焚臣宅息始均仲瑀等叩請流血乞代臣死始均即陷塗炭仲瑀經宿方蘇臣年已六十宿被榮遇垂暮之秋忽見此苦顧瞻災酷古今無比臣傷至重殘氣假延望景顧時推漏就盡頃刻待終臣之命也知復何言若所上之書少為益國臣便是生以理全死與義合不負二帝於地下臣無餘恨矣一歸泉壤長離紫庭戀仰天顔誠痛無已不勝眷眷力喘奉辭伏願二聖加御珍膳覆露黔首壽保}
