  - {type: variant, offset: 4025, length: 0, content: '', WYG: 載準限而判三應昇退今既通考未審為十年之中通其殿最積以為第隨前後年斷各自除其善惡而為昇降且負注之章數成殿為差此條以寡愆為最多戾為殿未審取何行是寡愆何坐為多戾結累品次復有幾等諸文案失衷應杖十者為一負罪依律次過隨負記十年之中三經肆眚赦前之罪不問輕重皆蒙宥免或為御史所彈案驗未周遇赦復任者未審記殿得除以不詔曰獨著超倫及才備寡咎皆謂文武兼上上之極言耳自此以降猶有八等隨才為次令文已具其積負累殿及守平得濟皆含在其中何容别疑也所云通考者據摠多年之言至於黜陟之體自依舊來年斷何足復請其罰贖已決之殿固非免限遇赦免罪惟記其殿除之尋加散騎常侍時詔}
