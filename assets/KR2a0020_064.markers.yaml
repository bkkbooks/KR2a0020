  - {type: variant, offset: 7388, length: 379, content: 官軍所敗長孫稚又遣子子彥破始榮於華州終德因此勢挫還圖寶夤軍至白門寶夤始覺與終德交戰戰敗攜公主及其少子與部下百餘騎從後門出走渡渭橋投於寧夷巴張宕昌劉興周舍尋奔醜奴醜奴以寶夤為太傅永安三年都督尒朱天光遣賀拔岳等破醜奴於安定追擒醜奴寶夤並送京師詔置閶闔門外都街之中京師士女聚共觀視凡經三日吏部尚書李神儁黃門侍郎高道穆並與寶夤素舊二人相與左右言於莊帝云其逆亦事在前朝冀得赦免會應詔王道習時自外至莊帝問道習在外所聞道習曰唯聞陛下欲不殺蕭寶夤帝問其故道習曰人云李尚書高黃門與寶夤周款並居得言之地必能全之道習因曰若謂寶夤逆在前朝便將恕之寶夤敗於長安走為醜奴太傅豈非陛下御曆之日賊臣不翦法欲安施帝然其言乃於太僕牛署賜死寶夤之將死神儁攜酒就之以舊故因對之下泣而寶夤夷然自持了不憂懼唯稱推天委命恨不終臣節而已公主攜男女就寶夤訣別慟哭極哀寶夤死色貌不改寶夤有三子皆公主所生而並凡劣, WYG: 祟祚}
