  - {type: variant, offset: 4022, length: 0, content: '', WYG: 少師祚曽從世宗幸東宫肅宗幼弱祚懐一黄㼐出奉肅宗時應詔左右趙桃弓與御史中尉王顯迭相脣齒深為世宗所信祚私事之時人謗祚者號為桃弓僕射黄㼐少師祚奏曰謹案前後考格雖班天下如臣愚短猶有未悟今湏定職人遷轉由狀超越階級者即湏量折景明初考格五年者得一階半正始中故尚書中山王英奏考格被㫖但可正滿三周為限不得計殘年之勤又去年中以前二制不同奏請裁決㫖云黜陟之體自依舊來恒斷今未審從舊來之㫖為從景明之斷為從正始為限景明考法東西省文武閑官悉為三}
