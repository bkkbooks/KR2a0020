  - {type: variant, offset: 4019, length: 2, content: 張豹, WYG: 祚値嵗不稔闔境飢敝矜傷愛下多所賑恤雖斷決淹留號為煩緩然士女懐其徳澤于今思之入為侍中金紫光禄大夫并州大中正遷尚書右僕射時議定新令詔祚與侍中黄門參議刋正故事令僕中丞騶唱而入宫門至於馬道及祚為僕射以為非盡敬之宜言於世宗帝納之下詔御在太極騶唱至止車門御在朝堂至司馬門騶唱不入宫自此始也詔祚本官領太}
