  - {type: punctuation, offset: 3372, content: 、, id: KR2a0020_ZHSJ_064-bkkpn699}
  - {type: variant, offset: 3373, length: 376, content: 東將軍別將以繼英配羽林虎賁五百人與英頻破衍軍乘勝遂攻鍾離淮水汎溢寶夤與英狼狽引退士卒死沒者十四五有司奏寶夤守東橋不固軍敗由之處以極法詔曰寶夤因難投誠宜加矜貸可恕死免官削爵還第尋尚南陽長公主賜帛一千匹幷給禮具公主有婦德事寶夤盡肅雍之禮雖好合積年而敬事不替寶夤每入室公主必立以待之相遇如賓自非太妃疾篤未曾歸休寶夤器性溫順自處以禮奉敬公主內外諧穆清河王懌親而重之永平四年盧昶克蕭衍朐山戍以琅邪戍主傅文驥守之衍遣師攻文驥盧昶督衆軍救之詔寶夤為使持節假安南將軍別將長驅往赴受盧昶節度賜帛三百匹世宗於東堂餞之詔曰蕭衍送死連兵再離寒暑卿忠規內挺孝誠外亮必欲鞭尸吳墓戮衍江陰故授卿以總統之任仗卿以克捷之規宜其勉歟寶夤對曰讎未復枕戈俟旦雖無申包之志敢忘伍胥之心今仰仗神謀俯厲將帥誓必拉彼姦勁以清王略聖澤下臨不勝悲荷因泣涕橫流哽咽良久於後盧昶軍敗唯寶夤全師而歸延昌初除安東, WYG: 北}
