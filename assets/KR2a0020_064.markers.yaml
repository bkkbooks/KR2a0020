  - {type: variant, offset: 8605, length: 0, content: '', WYG: 彛務尚典式考訪故事及臨隴右彌加討習於是出入直衛方伯威儀赫然可觀羌夏畏伏憚其威整一方肅静號為良牧其年冬太極初就彛與郭祚等俱以勤舊被徴及還州進號撫軍將軍彛表解州任詔不許彛敷政隴右多所制立宣布新風革其舊俗民庶愛仰之為國造佛寺名曰興皇諸有罪咎者隨其輕重謫為土木之功無復鞭杖之罰時陳留公主寡居彛意願尚主主亦許之僕射高肇亦望尚主主意不可肇怒譖彛於世宗稱彛擅立刑法勞役百姓詔遣直後萬貳興馳驛檢察貳興肇所親愛必欲致彛深罪彛清身奉法求其愆過遂無所得見代還洛猶停廢數年因得偏風手脚不便然志性不移善自將攝稍能朝拜久之除光禄大夫加金章紫綬彛愛好知已輕忽下流非其意者視之蔑爾雖疹疾家庭而志氣彌高上表曰臣聞元天高朗尚假列星以助明洞庭淵湛猶藉衆流以増大莫不以孤照不詣其幽獨深未盡其廣先聖識其若此必取物以自誡故堯稱則天設謗木以曉未明舜稱盡善懸諌鼓以規政闕虞人獻箴規之㫖盤盂著舉動之銘庶幾見善而思齊聞惡以自改眷眷於悔往之衢孜孜於不逮之路用能聲高百王卓絶中古經十氏而不渝歴二千以孤鬱伏惟太祖撥亂奕代重光世祖以不世之才開盪函夏顯祖以溫明之徳潤伏九區高祖大聖臨朝經營云始未明求衣日昃忘食開翦荆棘徙御神縣更新風軌冠帶朝流海東雜種之渠衡南異服之帥沙西氊頭之戎漢北辮髮之虜重譯納貢請吏稱藩積徳懋於夏殷富仁盛於周漢澤教既周武功亦匝猶且發明詔思求直士信是蒼生薦言之秋祝史陳辭之日況臣家自奉國八十餘年紆金鏘玉及臣四世過以小才藉䕃出仕學慙專門武闕方略早荷先帝眷仗之恩未蒙陛下不遺之施侍則出入兩都官厯納言常伯忝牧秦藩號兼安撫實思碎首膏原仰酬二朝之惠輕塵碎石逺増嵩岱之高輒私訪舊書竊觀圖史其帝皇興起之元配天隆家之業修造益民之竒龍麟雲鳯之瑞卑宫愛物之仁釋網改祝之澤前歌後舞之應囹圄寂寥之美可為輝風景行者輒謹編丹青以標睿範至如太康好田遇窮后迫禍武乙逸禽罹震雷暴酷夏桀滛亂南巢有非命之誅殷紂昏酣牧野有倒戈之陳周厲逐獸滅不旋踵幽王遇惑死亦相尋暨於漢成失御亡新簒奪桓靈不綱魏武遷鼎晉惠闇弱骨肉相屠終使聰曜鴞視并州勒虎狼據燕趙如此之軰罔不畢載起元庖犧終於晉末凡十六代百二十八帝厯三千二百七十年雜事五百八十九合成五卷名曰厯帝圖亦謗木諫鼔虞人盤盂之類脫蒙置御坐之側時復披覽冀或起予左右上補未萌伏願陛下遠惟宗廟之憂近存黎民之念取其賢君棄其惡主則微臣雖沉淪地下無異乘雲登天矣世宗善之彛又表曰竊惟皇王統天必以窮幽為美盡理作聖亦假廣採成明故詢於芻蕘著之周什輿人獻箴流於夏典不然則美刺無以得彰善惡有時不達逮於兩漢魏晉雖道有隆汚而被繡傳檄未始闕也及惠帝失御中夏崩離劉符專據秦西燕趙獨制關左姚夏繼起五涼競立致使九服摇摇民無定主禮儀典制此焉堙滅暨大魏應厯撥亂登皇翦彼鯨鯢龕靖神縣數紀之間天下寜一傳輝七帝積聖如神高祖遷鼎成周永兹八百偃武修文憲章斯改實所謂加五帝登三王民無徳而名焉猶且慮獨見之不明欲廣訪於得失乃命四使觀察風謡臣時忝常伯充一使之列遂得仗節揮金宣恩東夏周厯於齊魯之間遍馳於梁宋之域詢採詩頌研檢獄情實庶片言之不遺美刺之俱顯而才輕任重多不遂心所採之詩並始申目而値鑾輿南討問罪宛鄧臣復忝行軍樞機是務及輦駕之返膳御未和續以大諱奄臻四海崩慕遂爾推遷不及聞徹未幾改牧秦蕃違離闕下繼以譴疾相纒寜丁八嵗常恐所採之詩永淪丘壑是臣夙夜所懐以為深憂者也陛下垂日月之明行雲雨之施察臣往罪之濫矜臣貧病之切既蒙崇以禄養復得拜掃丘墳明目友朋無所負愧且臣一二年來所患不劇尋省本書粗有髣髴凡有七卷今寫上呈伏願昭覽勑付有司使魏代所採之詩不堙於丘井臣之願也肅宗初侍中崔光表曰彛及李韶朝列之中唯此二人出身官次本在臣方器能幹世又並為多近來參差便成替後計其階途雖應遷陟然恐班秩猶未賜等昔衛之公叔引下同舉晉之士匄推長伯游古人所髙當時見許敢縁斯義乞降臣位一階授彼汎級齊行聖庭帖穆選叙詔加征西將軍冀州大中正雖年向六十加之風疾而自彊人事孜孜無怠公私法集衣冠從事延詩道俗􅁱營齋講好善欽賢愛奬人物南北新舊莫不多之大起第宅徽號華侈頗侮其疎宗舊戚不甚存紀時有怨憾焉榮宦之間未能止足屢表在秦州預有開援漢中之勲希加賞報積年不已朝廷患之第二子仲瑀上}
