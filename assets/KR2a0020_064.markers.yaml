  - {type: variant, offset: 4056, length: 3028, content: 州諸軍事衞將軍荊州刺史不行復為殿中尚書寶夤之在淮堰蕭衍手書與寶夤曰謝齊建安王寶夤亡兄長沙宣武王昔投漢中值北寇華陽地絕一隅內無素畜外絕繼援守危疏勒計踰田單卒能全土破敵以弱為強使至之日君臣動色左右相賀齊明帝每念此功未嘗不輟箸咨嗟及至張永崔慧景事大將覆軍於外小將懷貳於內事危累卵勢過綴旒亡兄忠勇奮發旋師大峴重圍累日一鼓魚潰克定慧景功踰桓文亡弟衞尉兄弟勠力盡心內外大勳不報翻罹荼酷百口幽執禍害相尋朕於齊明帝外有龕敵之力內盡帷幄之誠日自三省曾無寸咎遠身邊外亦復不免遂遣劉山陽輕舟西上來見掩襲時危事迫勢不得已所以誓衆樊鄧會踰孟津本欲翦除梅虫兒茹法珍等以雪寃酷拔濟親屬反身素里屬張稷王珍國已建大事寶晊子晉屢動危機迫樂推之心應上天之命事不獲已豈其始願所以自有天下絕棄房室斷除滋味正欲使四海見其本心耳勿謂今日之位是為可重朕之視此曾不如一芥雖復崆峒之蹤難追汾陽之志何遠而今立此堰卿當未達本意朕於昆蟲猶不欲殺亦何急爭無用之地戰蒼生之命也正為李繼伯在壽陽侵犯邊境歲月滋甚或攻小城小戍或掠一村一里若小相酬答終無寧日邊邑爭桑吳楚連禍所以每抑鎮戍不與校計繼伯既得如此濫竊彌多今修此堰止欲以報繼伯侵盜之役既非大舉所以不復文移北土卿幼有倜儻之心早懷縱橫之氣往日卿於石頭舉事雖不克捷亦丈夫也今止河洛真其時矣雖然為卿計者莫若行率此衆襲據彭城別當遣軍以相影援得捷之後便遣卿兄子屏侍送卿國廟幷卿室家及諸姪從若方欲還北更設奇計恐機事一差難重復集勿為韓信受困野鷄寶夤表送其書陳其忿毒之意朝廷為之報答寶夤志存雪復屢請居邊神龜中出為都督徐南兗二州諸軍事車騎將軍徐州刺史乃起學館於清東朔望引見土姓子弟接以恩顏與論經義勤於政治吏民愛之凡在三州皆著名稱正光二年徵為車騎大將軍尚書左僕射善於吏職甚有聲名四年上表曰臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可知矣大較在于官人用才審於所莅練迹校名驗於虛實豈不以臧否得之餘論優劣著於歷試者乎既聲窮於月旦品定於黃紙用效於名輩事彰於臺閤則賞罰之途差有商準用捨之宜非無依據雖復勇進忘退之儔奔競於市里過分亡涯之請馳騖於多門猶且顧其聲第慎其與奪器分定於下爵位懸於上不可妄叨故也今竊見考功之典所懷未喻敢竭無隱試陳萬一何者竊惟文武之名在人之極地德行之稱為生之最首忠貞之美立朝之譽仁義之號處身之端自非職惟九官任當四岳授曰爾諧讓稱俞往將何以克厭大名允茲令問自比已來官罔高卑人無貴賤皆飾辭假說用相褒舉涇渭同波薰猶共器求者不能量其多少與者不復覈其是非遂使冠履相貿名與實爽謂之考功事同汎陟紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身名廢絕或具僚離索或同事凋零雖當時文簿記其殿最日久月深駁落都盡人有去留誰復掌其勤墮或停休積稔或分隔數千累年之後方求追訪聲迹立其考第無不苟相悅附共為脣齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢達君子未免斯患中庸已降夫復何論官以求成身以請立上下相蒙莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程既而限滿代還復經六年而是則歲周十二始得一階於東西兩省文武閑職公府散佐無事冗官或數旬方應一直或朔望止於暫朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虛名而升陟之方甚易何內外之相懸令厚薄之如是又聞之聖人大寶曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古之人修其天爵而人爵從之故雖文質異時污隆殊世莫不寶茲名器不以假人是以賞罰之柄自持也至乃周之藹藹五叔無官漢之察察館陶徒請豈不重骨肉私親親誠以賞罰一差則無以懲勸至公暫替則覬覦相欺故至慎至惜殷勤若此況乎親非胏腑才乖秀逸或充單介之使始無汗馬之勞或說興利之規終慚十一之潤皆虛張無功妄指贏益坐獲數階之官藉成通顯之貴於是巧詐萌生偽辯鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其若斯但抑之則其流已注引之則有何紀極夫琴瑟在於必和更張求其適調去者既不可追來者猶或宜改按周官太宰之職歲終則令官府各正所司受其會計聽其致事而詔於王三歲則大計羣吏之治而誅賞之愚謂今可粗依其準見居官者每歲終本曹皆明辨在官日月具覈才行能否審其實用而注其上下游辭宕說無一取焉列上尚書覆其合否如有紕謬即正而罰之不得方復推詰委否容其進退既定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞總而奏之經奏之後考功曹別書於黃紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黃門印署掌在尚書嚴加緘密不得開視考績之日然後對共裁量如此則少存實錄薄止姦回其內外考格裁非庸管乞求博議以為畫一若殊謀異策事關廢興遐邇所談物無異議者自可臨時斟酌匪拘例至如援流引比之訴貪榮求級之請如不限以關鍵肆其傍通則蔓草難除涓流遂積穢我彝章撓茲大典謂宜明加禁斷以全至治開返本之路杜澆弊之門如斯則吉士盈朝薪槱載煥矣詔付外博議以為永式竟無所定時蕭衍弟子西豐侯正德來降寶夤表曰伏見揚州表蕭正德自云避禍遠投宸掖背父叛君駭議衆口深心指趣厥情難測臣聞立身行道始於事親終於事君故君親盡之以敬嚴父兼之以博愛斯人倫之所先王教之盛典三千之罪莫大於不孝毀則藏姦常刑靡赦所以晉恭獲謗無所逃死衞伋受誣二子繼沒親命匪棄國孰無父況今封豕尚存長蛇未滅偷生江表自安毒酖而正德居猶子之親竊通侯之貴父榮於國子爵於家履霜弗聞去就先結隔絕山淮溫凊永盡定省長違報復何日以此為心心可知矣皇朝綿基累葉恩均四海自北徂南要荒仰澤能言革化無思不韙賁玉帛於丘園標忠孝以納賞築䤝街于伊洛集華裔其歸心被髮鐻身之酋屈膝而請吏交趾文身之渠款關而効質至如正德宜甄義以致貶昔越栖會稽賴宰嚭以獲立漢困彭宋實丁公而獲免吳項已平二臣即法豈不錄其情哉欲明責以示後況遺君忽父狼子是心既不親親安能親人中間變詐或有萬等伏惟陛下聖敬自天欽光纂歷昭德塞違以臨羣后脫苞此凶醜置之列位百官是象其何誅焉臣釁結禍深痛纏肝髓日暮途遙復報無日豈區區於一豎哉但才雖庸近職居獻替愚衷寸抱敢不申陳伏願聖慈少垂察覽訪議槐棘論其是非使秋霜春露施之有在相鼠攸刺遄死有歸無令申伋受笑於苟存曾閔淪名於盛世正德既至京師朝廷待之尤薄歲餘還叛五年蕭衍遣其將裴邃虞鴻等率衆寇揚州詔寶夤為使持節散騎常侍車騎大將軍都督徐州東道諸軍事率諸將討之既而揚州刺史長孫稚大破邃軍斬鴻賊遂奔退初秦州城人薛珍劉慶杜遷等反執刺史李彥推莫折大提為首自稱秦王大提尋死其第四子念生竊號天子改年曰天建置立官僚以息阿胡為太子其兄阿倪為西河王弟天生為高陽王伯珍為東郡王安保為平陽王遣天生率衆出隴東攻沒汧城仍陷岐州執元志裴芬之等遂寇雍州屯於黑水朝廷甚憂之乃除寶夤開府西道行臺率所部東行將統為大都督西征肅宗幸明堂因以餞之寶夤與大都督崔延伯擊天生大破之斬獲十餘萬追奔至于小隴軍人採掠遂致稽留不速追討隴路復塞仍進討高平賊帥万俟醜奴於安定更有負捷時有天水人呂伯度兄弟始共念生同逆後與兄衆保於顯親聚衆討念生戰敗降於胡琛琛以伯度為大都督秦王資其士馬還征秦州大敗念生將杜粲於成紀又破其金城王莫折普賢於水洛城遂至顯親念生率衆身自拒戰又大奔敗伯度乃背胡琛襲琛將劉拔破走之遣其兄子忻和率騎東引國軍念生事迫乃詐降於寶夤朝廷喜伯度立義之功授撫軍將軍涇州刺史平秦郡開國公食邑三千戶而大都督元脩義高聿停軍隴口久不西進念生復反伯度終為醜奴所殺故賊勢更甚寶夤不能制孝昌二年四月除寶夤侍中驃騎大將軍儀同三司假大將軍尚書令給後部鼓吹增封千戶寶夤初自黑水終至平涼與賊相對數年攻擊賊亦憚之關中保全寶夤之力矣三年正月除司空公出師既久兵將疲弊是月大敗還雍州仍停長安收聚離散有司處寶夤死罪詔恕為民四月除使持節都督雍涇岐南豳四, WYG: ''}
  - {type: variant, offset: 4056, length: 3028, content: 州諸軍事衞將軍荊州刺史不行復為殿中尚書寶夤之在淮堰蕭衍手書與寶夤曰謝齊建安王寶夤亡兄長沙宣武王昔投漢中值北寇華陽地絕一隅內無素畜外絕繼援守危疏勒計踰田單卒能全土破敵以弱為強使至之日君臣動色左右相賀齊明帝每念此功未嘗不輟箸咨嗟及至張永崔慧景事大將覆軍於外小將懷貳於內事危累卵勢過綴旒亡兄忠勇奮發旋師大峴重圍累日一鼓魚潰克定慧景功踰桓文亡弟衞尉兄弟勠力盡心內外大勳不報翻罹荼酷百口幽執禍害相尋朕於齊明帝外有龕敵之力內盡帷幄之誠日自三省曾無寸咎遠身邊外亦復不免遂遣劉山陽輕舟西上來見掩襲時危事迫勢不得已所以誓衆樊鄧會踰孟津本欲翦除梅虫兒茹法珍等以雪寃酷拔濟親屬反身素里屬張稷王珍國已建大事寶晊子晉屢動危機迫樂推之心應上天之命事不獲已豈其始願所以自有天下絕棄房室斷除滋味正欲使四海見其本心耳勿謂今日之位是為可重朕之視此曾不如一芥雖復崆峒之蹤難追汾陽之志何遠而今立此堰卿當未達本意朕於昆蟲猶不欲殺亦何急爭無用之地戰蒼生之命也正為李繼伯在壽陽侵犯邊境歲月滋甚或攻小城小戍或掠一村一里若小相酬答終無寧日邊邑爭桑吳楚連禍所以每抑鎮戍不與校計繼伯既得如此濫竊彌多今修此堰止欲以報繼伯侵盜之役既非大舉所以不復文移北土卿幼有倜儻之心早懷縱橫之氣往日卿於石頭舉事雖不克捷亦丈夫也今止河洛真其時矣雖然為卿計者莫若行率此衆襲據彭城別當遣軍以相影援得捷之後便遣卿兄子屏侍送卿國廟幷卿室家及諸姪從若方欲還北更設奇計恐機事一差難重復集勿為韓信受困野鷄寶夤表送其書陳其忿毒之意朝廷為之報答寶夤志存雪復屢請居邊神龜中出為都督徐南兗二州諸軍事車騎將軍徐州刺史乃起學館於清東朔望引見土姓子弟接以恩顏與論經義勤於政治吏民愛之凡在三州皆著名稱正光二年徵為車騎大將軍尚書左僕射善於吏職甚有聲名四年上表曰臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可知矣大較在于官人用才審於所莅練迹校名驗於虛實豈不以臧否得之餘論優劣著於歷試者乎既聲窮於月旦品定於黃紙用效於名輩事彰於臺閤則賞罰之途差有商準用捨之宜非無依據雖復勇進忘退之儔奔競於市里過分亡涯之請馳騖於多門猶且顧其聲第慎其與奪器分定於下爵位懸於上不可妄叨故也今竊見考功之典所懷未喻敢竭無隱試陳萬一何者竊惟文武之名在人之極地德行之稱為生之最首忠貞之美立朝之譽仁義之號處身之端自非職惟九官任當四岳授曰爾諧讓稱俞往將何以克厭大名允茲令問自比已來官罔高卑人無貴賤皆飾辭假說用相褒舉涇渭同波薰猶共器求者不能量其多少與者不復覈其是非遂使冠履相貿名與實爽謂之考功事同汎陟紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身名廢絕或具僚離索或同事凋零雖當時文簿記其殿最日久月深駁落都盡人有去留誰復掌其勤墮或停休積稔或分隔數千累年之後方求追訪聲迹立其考第無不苟相悅附共為脣齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢達君子未免斯患中庸已降夫復何論官以求成身以請立上下相蒙莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程既而限滿代還復經六年而是則歲周十二始得一階於東西兩省文武閑職公府散佐無事冗官或數旬方應一直或朔望止於暫朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虛名而升陟之方甚易何內外之相懸令厚薄之如是又聞之聖人大寶曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古之人修其天爵而人爵從之故雖文質異時污隆殊世莫不寶茲名器不以假人是以賞罰之柄自持也至乃周之藹藹五叔無官漢之察察館陶徒請豈不重骨肉私親親誠以賞罰一差則無以懲勸至公暫替則覬覦相欺故至慎至惜殷勤若此況乎親非胏腑才乖秀逸或充單介之使始無汗馬之勞或說興利之規終慚十一之潤皆虛張無功妄指贏益坐獲數階之官藉成通顯之貴於是巧詐萌生偽辯鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其若斯但抑之則其流已注引之則有何紀極夫琴瑟在於必和更張求其適調去者既不可追來者猶或宜改按周官太宰之職歲終則令官府各正所司受其會計聽其致事而詔於王三歲則大計羣吏之治而誅賞之愚謂今可粗依其準見居官者每歲終本曹皆明辨在官日月具覈才行能否審其實用而注其上下游辭宕說無一取焉列上尚書覆其合否如有紕謬即正而罰之不得方復推詰委否容其進退既定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞總而奏之經奏之後考功曹別書於黃紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黃門印署掌在尚書嚴加緘密不得開視考績之日然後對共裁量如此則少存實錄薄止姦回其內外考格裁非庸管乞求博議以為畫一若殊謀異策事關廢興遐邇所談物無異議者自可臨時斟酌匪拘例至如援流引比之訴貪榮求級之請如不限以關鍵肆其傍通則蔓草難除涓流遂積穢我彝章撓茲大典謂宜明加禁斷以全至治開返本之路杜澆弊之門如斯則吉士盈朝薪槱載煥矣詔付外博議以為永式竟無所定時蕭衍弟子西豐