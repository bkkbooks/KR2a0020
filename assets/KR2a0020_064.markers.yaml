  - {type: variant, offset: 1666, length: 494, content: 有高三代高祖曰國家本來有一事可慨可慨者何無公言得失今卿等各盡其心人君患不能納羣下之諫為臣患不能盡忠於主朕今舉一人如有不可卿等盡言其失若有才能而朕所不識者宜各舉所知朕當虛己延納若能如此能舉則受賞不言則有罪及論大將軍高祖曰劉昶即其人也後給班劍二十人二十一年四月薨於彭城年六十二高祖為之舉哀給溫明祕器錢百萬布五百匹蠟三百斤朝服一具衣一襲贈假黃鉞太傅領揚州刺史加以殊禮備九錫給前後部羽葆鼓吹依晉琅邪武王伷故事諡曰明昶適子承緒主所生也少而疾尚高祖妹彭城長公主為駙馬都尉先昶卒贈員外常侍長子文遠次輝字重昌並皆疏狂昶深慮不能守其爵封然輝猶小未多罪過乃以為世子襲封正始初尚蘭陵長公主世宗第二姊也拜員外常侍公主頗嚴妬輝嘗私幸主侍婢有身主笞殺之剖其孕子節解以草裝實婢腹裸以示輝輝遂忿憾疏薄公主公主姊因入聽講言其故於靈太后太后敕清河王懌窮其事懌與高陽王雍廣平王懷奏其不和之狀無可為夫婦之理請離婚削除封位太后從之公主在宮周歲高陽王及劉騰等皆為言於太后太后慮其不改未許之雍等屢請不已聽復舊義太后流涕送公主誡令謹護正光初輝又私淫張陳二氏女公主更不檢惡主姑陳留公主共相扇奬遂與輝復致忿爭輝推主墮床手脚毆蹈主遂傷胎輝懼罪, WYG: 姦吏}
