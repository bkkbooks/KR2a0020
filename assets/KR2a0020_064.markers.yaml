  - {type: variant, offset: 2187, length: 397, content: 配敦煌為兵公主因傷致薨太后親臨慟哭舉哀太極東堂出葬城西太后親送數里盡哀而還謂侍中崔光曰向哭所以過哀者追念公主為輝頓辱非一乃不關言能為隱忍古今寧有此此所以痛之後執輝於河內之溫縣幽于司州將加死刑會赦得免三年復其官爵遷征虜將軍中散大夫四年輝卒家遂衰頓無復可紀文遠歷步兵校尉前將軍景明初為統軍在壽春坐謀殺刺史王肅以壽春叛事發伏法有通直郎劉武英者太和十九年從淮南內附自云劉裕弟長沙景王道憐之曾孫賜爵建寧子司徒外兵參軍稍轉步兵校尉游擊將軍卒于河內太守而昶不以為族親也蕭寶夤字智亮蕭鸞第六子寶卷母弟也鸞之竊位封寶夤建安王寶卷立以為車騎將軍開府領石頭戍軍事寶卷昏狂其直後劉靈運等謀奉寶夤密遣報寶夤寶夤許之遂迎寶夤率石頭文武向其臺城稱警蹕百姓隨從者數百人會日暮城門閉乃燒三尚及建業城城上射殺數人衆乃奔散寶夤棄車步走部尉執送之自列為人所逼寶卷亦不罪責也寶卷弟寶融僭立以寶夤為衞將軍南徐州刺史改封鄱陽王蕭衍既克建業殺, WYG: ''}
