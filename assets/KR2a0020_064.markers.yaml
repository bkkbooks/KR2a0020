  - {type: variant, offset: 2619, length: 749, content: 寶夤具小船於江岸脫本衣服著烏布襦腰繫千許錢潛赴江畔躡屩徒步脚無全皮防守者至明追之寶夤假為釣者隨流上下十餘里追者不疑待散乃度西岸遂委命投華文榮文榮與其從子天龍惠連等三人棄家將寶夤遁匿山澗賃驢乘之晝伏宵行景明二年至壽春之東城戍戍主杜元倫推檢知實蕭氏子也以禮延待馳告揚州刺史任城王澄澄以車馬侍衞迎之時年十六徒步憔悴見者以為掠賣生口也澄待以客禮乃請喪居斬衰之服澄遣人曉示情禮以喪兄之制給其齊衰寶夤從命澄率官僚赴弔寶夤居處有禮不飲酒食肉輟笑簡言一同極哀之節壽春多其故義皆受慰唁唯不見夏侯一族以夏侯同蕭衍故也改日造澄澄深器重之景明三年閏四月詔曰蕭寶夤深識機運歸誠有道冒險履屯投命絳闕微子陳韓亦曷以過也可遣羽林監領主書劉桃符詣彼迎接其資生所須之物及衣冠車馬在京邸館付尚書悉令豫備及至京師世宗禮之甚重伏訴闕下請兵南伐雖遇暴風大雨終不暫移是年冬蕭衍江州刺史陳伯之與其長史褚冑等自壽春歸降請軍立效世宗以寶夤誠懇及伯之所陳時不可失四年二月乃引八座門下入議部分之方四月除使持節都督東揚南徐兗三州諸軍事鎮東將軍東揚州刺史丹陽郡開國公齊王配兵一萬令且據東城待秋冬大舉寶夤明當拜命其夜慟哭至晨備禮策授賜車馬什物給虎賁五百人事從豐厚猶不及劉昶之優隆也又任其募天下壯勇得數千人以文智三人等為積弩將軍文榮等三人為強弩將軍並為軍主寶夤雖少羇流而志性雅重過期猶絕酒肉慘形悴色蔬食粗衣未嘗嬉笑及被命當南伐貴要多相憑託門庭賓客若市書記相尋寶夤接對報復不失其理正始元年三月寶夤行達汝陰東城已陷遂停壽春之栖賢寺值賊將姜慶真內侵士民響附圍逼壽春遂據外郭寶夤躬貫甲冑率下擊之自四更交戰至明日申時賊旅彌盛寶夤以衆寡無援退入金城又出相國東門率衆力戰始破走之當寶夤壽春之戰勇冠諸軍聞見者莫不壯之七月還京師改封梁郡開國公食邑八百戶及中山王英南伐寶夤又表求征乃, WYG: ''}
