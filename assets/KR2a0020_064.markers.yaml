  - {type: variant, offset: 4026, length: 0, content: '', WYG: 明堂國學祚奏曰今雲羅西舉開納岷蜀戎旗東指鎮靖淮荆漢沔之間復湏防捍徴兵發衆所在殷廣邊郊多壘烽驛未息不可於師旅之際興板築之功且獻嵗云暨東作將始臣愚量謂宜待豐靖之年因子來之力可不時而就從之世宗末年每引祚入東宫密受賞賚多至百餘萬雜以錦繡又特賜以劒杖恩籠甚深遷左僕射先是蕭衍遣將康絢遏淮將灌揚徐祚表曰蕭衍狂悖擅斷川瀆役苦民勞危亡已兆然古諺有之敵不可縱夫以一酌之水或為不測之淵如不時滅恐同原草宜命一重將率統軍三十人領羽林一萬五千人并科京東七州虎旅九萬長驅電邁遄令撲討擒斬之勲一如常制}
