  - {type: variant, offset: 7802, length: 404, content: 之而死凱仕至司徒左長史凱妻長孫稚女也輕薄無禮公主數加罪責凱竊銜恨妻復惑說之天平中凱遂遣奴害公主乃轘凱於東巿妻梟首家遂殄滅寶夤兄寶卷子贊字德文本名綜入國寶夤改焉初蕭衍滅寶卷寶卷宮人吳氏始孕匿而不言衍仍納之生贊以為己子封豫章王及長學涉有才思其母告之以實贊晝則談謔如常夜則銜悲泣涕結客待士有來奔之志為衍諸子深所猜疾而衍甚愛寵之有濟陰芮文寵安定梁話贊曲加禮接乃割血自誓布以腹心寵話等既感其情義敬相然諾值元法僧以彭城叛入蕭衍衍命贊為南兗徐二州刺史都督江北諸軍事鎮彭城於時肅宗遣安豐王延明臨淮王彧討之贊便遣使密告誠款與寵話夜出步投彧軍孝昌元年秋屆于洛陽陛見之後就館舉哀追服三載寶夤于時在關西遣使觀察聞其形貌斂眉悲感朝廷賞賜豐渥禮遇隆厚授司空封高平郡開國公丹陽王食邑七千戶及寶夤反贊惶怖欲奔白鹿山至河橋為北中所執朝議明其不相干預仍蒙慰勉建義初隨尒朱榮赴晉陽莊帝徵贊還洛轉司徒遷太尉尚帝姊壽陽長公主出為都督齊濟西兗三州諸軍事, WYG: ''}
