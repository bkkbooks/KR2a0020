  - {type: variant, offset: 4023, length: 0, content: '', WYG: 考同任事而前尚書盧昶奏上第之人三年轉半階今之考格復分為九等前後不同參差無凖詔曰考在上中者得汎以前有六年以上遷一階三年以上遷半階殘年悉除考在上下者得汎以前六年以上遷半階不滿者除其得汎以後考在上下者三年遷一階散官從盧昶所奏祚又奏言考察令公清獨著徳績超倫而無負殿者為上上一殿為上中二殿為上下累計八殿品降至九未審今諸曹府寺凡考在事公清然才非獨著績行稱務而徳非超倫幹能粗可而守平堪任或人用小劣處官濟事并全無負殿之徒為依何第景明三年以來至今}
