  - {type: variant, offset: 2968, length: 1, content: 襲, WYG: 忌蒙遜威名微疎逺之天興四年蒙遜内不自安請為安西太守蒙遜欲激怒其衆乃宻誣告男成叛逆業殺之蒙遜泣告衆陳欲復讎之意男成素有恩信衆情怨憤泣而從之蒙遜因舉兵攻殺業私署使持節大都督大将軍凉州牧張掖公號年永安居張掖永興中蒙遜克姑臧遷居之改號元始元年自稱河西王置百官丞郎以下頻遣使朝貢蒙遜寝於新臺閹人王懐祖斫蒙遜傷足蒙遜妻孟氏擒懐祖斬之蒙遜聞劉裕㓕姚泓怒甚有校書郎言事於蒙遜蒙遜曰汝聞劉裕入闗敢妍妍然也遂殺之其峻暴如此泰常中蒙遜充李歆尋㓕敦煌後改年承𤣥神䴥中遣尚書郎宗舒左常侍髙猛朝貢上表曰伏惟陛下天縱叡聖徳超百王陶育齊於二儀洪基隆於三代然鍾運多雖九服紛􅅰神旗暫擁車書未同上靈降祐祚歸有道純風一鼔殊方革面羣生幸甚率土齊欣臣誠弱才效無可錄幸遇重光思竭力命自欣投老得覩盛化冀終餘年慿倚皇極前後奉表貢使相望去者杳然寂無旋返未審津塗冦險竟不仰逹為天朝髙逺未蒙齒錄屏營戰灼無地自措往年侍郎郭祗等還奉被詔書三接之恩始隆萬里之心有賴今極難之餘開泰唯始誘勸既加引納彌篤老臣見存遐外無棄仰荷愷悌之仁俯蹈康哉之詠然商胡後至奉公卿書援引歴數安危之機厲以竇融知命之美顧惟情願實深悚惕何者臣不自揆逺託大䕃庶微誠上宣天鑒下降若萬國來庭百辟陛賀髙蹈先至之端獨步知機之首但世難尚殷情願未遂章表頻修滯懐不暢許身於國欵誠莫表致惑羣后貽慮公卿辭旨紛紜抑引重沓不在同奨之例未逹拱辰之心延首一隅低回四極臣歴觀符瑞候察天時未有過於皇魏踰於陛下加以靈啟聖姿㓜登天位美詠侔於成康道化踰於文景方将振神綱以掩六合灑𤣥澤以潤八荒况在秦隴荼炭之餘直是老臣盡效之㑹後蒙遜遣子安周内侍世祖遣兼太常李順持節拜蒙遜為假節加侍中都督凉州西域羌戎諸軍事太傅行征西大将軍凉州牧凉王冊曰昔我皇祖胄自黄軒總御羣才攝服戎夏疊曜重光不殞其舊逮于太祖應期協運大業唯新奄有區宇受命作魏降及太宗廣闢崇基政和民阜朕承天緒思廓宇縣然時運或否雰霧四張赫連跋扈於闗西大檀陸梁於漠北戎夷負阻江淮未賓是用自東徂西戎軒屢駕賴宗廟靈長将士宣力充翦兇渠震服彊獷四方漸泰表裏無塵王先識機運經略深逺與朕協同厥功洪茂當今運鍾時季僣逆慿陵有土者莫不跨峙一隅有民者莫不榮其私號不遵衆星拱極之道不慕細流歸海之義而王深悟大體率由典章任土貢珍愛子入侍勲義著焉道業存焉惟王乃祖乃父有土有民論功徳則無二於當時言氏族則始因於世}
