  - {type: variant, offset: 2975, length: 1, content: 太, WYG: 以下建天子旌旗出入警蹕如漢初諸侯王故事欽哉惟時往踐乃職祗服朕命協亮天工俾九徳咸事無忝庶官用終爾顯徳對揚我皇祖之休烈崔浩之辭也蒙遜又改稱義和元年延和二年四月蒙遜死遣使監䕶䘮事諡曰武宣王蒙遜性媱忌忍於刑戮閨庭之中略無風禮第三子牧犍綂任自稱河西王遣使請朝命先是世祖遣李順迎蒙遜女為夫人㑹蒙遜死牧犍受蒙遜遺意送妹於京師拜右昭儀改稱承和元年世祖又遣李順拜牧犍使持節侍中都督凉沙河三州西域羌戎諸軍事車騎将軍開}
