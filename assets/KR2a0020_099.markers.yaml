  - {type: variant, offset: 591, length: 901, content: 鎮東大將軍置王官二十二人中書侍郎鄭羲為傅郎中令以下皆當時名士又拜叡妻丁氏為妃及沙門法秀謀逆事發多所牽引叡曰與其殺不辜寧赦有罪宜梟斬首惡餘從疑赦不亦善乎高祖從之得免者千餘人叡出入帷幄太后密賜珍玩繒綵人莫能知率常以夜帷車載往閹官防致前後巨萬不可勝數加以田園奴婢牛馬雜畜並盡良美大臣及左右因是以受賚錫外示不私所費又以萬計及疾病高祖太后每親視疾侍官省問相望於道及疾篤上疏曰臣聞忠於事君者節義著於臨終孝於奉親者淳誠表於垂沒故孔明卒軍不忘全蜀之計曾參疾甚情存善言之益雖則庸昧敢忘景行臣荷天地覆載之恩蒙大造生成之德漸風訓於華年服道教於弱冠濯纓清朝垂周三紀受先帝非分之眷叨陛下殊常之寵遂乃齊跡功舊內侍幃幄爵列諸王位班上等從容聞道與知國政誠思竭盡力命以報所受不謂事與心違忽嬰重疾每屈輿駕親臨問之榮洽生平惠流身後犬馬之誠銜佩罔極今所病遂篤慮必不起延首闕庭鯁戀終日仰恃皇造宿眷之隆敢陳愚昧管窺之見臣聞為治之要其略有五一者慎刑罰二者任賢能三者親忠信四者遠讒佞五者行黜陟夫刑罰明則姦宄息賢能用則功績著親忠信則視聽審遠讒佞則疑間絕黜陟行則貪叨改是以欽恤惟刑載在唐典知人則哲唯帝所難周書垂好德之文漢史列防姦之論考省幽明先王大典又八表既廣遠近事殊撫荒裔宜待之以寬信綏華甸宜惠之以明簡哀恤孤獨賑施困窮錄功舊赦小罪輕徭役薄賦斂修福業禁淫祀願聽政餘暇賜垂覽察使子囊之誠重申於當世將墜之志獲用於明時尋薨時年四十八高祖文明太后親臨哀慟賜溫明祕器宕昌公王遇監護喪事贈衞大將軍太宰并州牧諡曰宣王內侍長董醜奴營墳墓將葬於城東高祖登城樓以望之京都文士為作哀詩及誄者百餘人乃詔為叡立祀於都南二十里大道右起廟以時祭薦并立碑銘置守祀五家又詔褒叡圖其捍虎狀於諸殿命高允為之讚京都士女謟稱叡美造新聲而絃歌之名曰中山王樂詔班樂府合樂奏之初叡女妻李沖兄子延賓次女又適趙國李恢子華女之將行也先入宮中其禮略如公主王女之儀太后親御太華殿寢其女於別帳叡與張祐侍坐叡所親及兩李家丈夫婦人列於東西廊下及車引太后送過中路時人竊謂天子太后嫁女叡之葬也假親姻義舊衰絰縞冠送喪者千餘人皆舉聲慟泣以要榮利時謂之義孝叡既貴乃言家本太原晉陽遂移屬焉故其兄弟封爵移以并州郡縣薨後重贈叡父橋侍中征, WYG: 號安}
