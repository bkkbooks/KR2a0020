  - {type: variant, offset: 2948, length: 6, content: 謹慎密甚被知, WYG: 徳殿前有雙雉飛出宫内通街大樹上有烏鵲争巢鵲為烏所殺敦煌父老令狐熾夢一白頭公帢衣而謂曰南風動吹長木胡桐椎不中轂言訖忽然不見歆小字桐椎至是而亡歆弟敦煌太守恂復自立于敦煌稱冠軍将軍凉州刺史蒙遜攻恂于敦煌三面起堤以水灌城恂請降不許城陷恂自殺蒙遜充敦煌恂兄飜子寳後入國自有𫝊胡沮渠蒙遜本出臨松盧水其先為匈奴左沮渠遂以官為氏蒙遜􅉸稽有權變頗曉天文為諸胡所歸吕光殺其伯父西平太守羅仇蒙遜聚衆萬餘屯於金山與從兄晋昌太守男成共推建康太守段業為使持節大都督龍驤大将軍凉州牧建康公稱神璽元年業以蒙遜為張掖太守封臨池侯男成為輔國将軍委以軍國之}
