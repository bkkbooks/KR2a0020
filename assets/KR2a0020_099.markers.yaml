  - {type: variant, offset: 4036, length: 686, content: 何簡用上佐遂令致此紛紜以徹荒外豈不為國醜辱也衆亦莫有應者仲興是後漸疏不得徑入左右世宗乃下詔奪其封邑出除平北將軍并州刺史卒贈安東將軍青州刺史寇猛上谷人也祖父平城猛少以姿幹充虎賁稍遷羽林中郎從高祖征南陽以擊賊不進免官世宗踐位復用愛其膂力置之左右為千牛備身歷轉遂至武衞將軍出入禁中無所拘忌自以上谷寇氏得補燕州大中正而不能甄別士庶也家漸富侈宅宇高華妾隸充溢微榮弟姪然不及茹皓仲興也卒贈平北將軍燕州刺史趙脩字景業趙郡房子人父惠安後名謐都曹史積勞補陽武令脩貴追贈威烈將軍本郡太守及葬復贈龍驤將軍定州刺史脩本給事東宮為白衣左右頗有膂力世宗踐阼仍充禁侍愛遇日隆然天性闇塞不閑書疏是故不參文墨世宗親政旬月之間頻有轉授歷員外通直散騎常侍鎮東將軍光祿卿每受除設宴世宗親幸其宅諸王公卿士百僚悉從世宗親見其母脩能劇飲至於逼勸觴爵雖北海王詳廣陽王嘉等皆亦不免必致困亂每適郊廟脩常驂陪出入華林乘馬至于禁內咸陽王禧誅其家財貨多賜高肇及脩脩之葬父也百僚自王公以下無不弔祭酒犢祭奠之具填塞門街於京師為制碑銘石獸石柱皆發民車牛傳致本縣財用之費悉自公家凶吉車乘將百兩道路供給亦皆出官時將馬射世宗留脩過之帝如射宮脩又驂乘輅車旒竿觸東門而折脩恐不逮葬日驛赴窆期左右求從及特遣者數十人脩道路嬉戲殆無戚容或與賓客姦掠婦女裸觀從者噂喧譁詬詈無節莫不畏而惡之是年又為脩廣增宅舍多所并兼洞門高堂房廡周博崇麗擬於諸王其四面隣居賂入其地者侯天盛兄弟越次出補長史大郡脩起自賤伍暴致富貴奢傲無禮物情所疾因其在外左右或諷糾其罪自其葬父還也舊寵小薄初王顯祗附於脩後因忿鬩密伺其過規陷戮之而脩過短都不悛防顯積其前後愆咎列脩葬父時路中淫亂不軌, WYG: 隂澹}
