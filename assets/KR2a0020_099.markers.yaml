  - {type: variant, offset: 7408, length: 1391, content: 年至此始解未幾加散騎常侍御史中尉元匡之廢也太后訪代匡者剛為太傅清河王懌所舉遂除車騎將軍領御史中尉常侍衞尉如故及領軍元叉執政擅權樹結親黨剛長子叉之妹夫乃引剛為侍中左衞將軍還領尚食典御以為枝援俄加車騎大將軍領左右復前削之封尋加儀同復領御史中尉剛啟軍旅稍興國用不足求以封邑俸粟賑給征人肅宗許之孝昌元年除領軍餘官如故初元叉之解領軍也靈太后以叉腹心尚多恐難卒制故權以剛代之示安其意尋出為散騎常侍冀州刺史將軍儀同三司剛行在道詔曰剛因緣時會恩隆自久擢於凡品越昇顯爵往以微勤賞同利建寵靈之極超絕夷等曾無犬馬識主之誠方懷梟鏡返噬之志與權臣元叉婚姻朋黨虧違典制長直禁中一出一入迭為姦防又與劉騰共為心膂間隔二宮逼脅內外且位居繩憲糾察是司宜立格言勢同鷹隼方嚴楚撻枉服貞良專任凶威以直為曲不忠不道深暴民聽附下罔上事彰幽顯莫大之罪難從宥原封爵之科理宜貶奪可征虜將軍餘悉削黜剛終于家永安中贈司徒公剛長子詳自奉朝請稍遷通直散騎侍郎冠軍將軍主衣都統剛以上谷先有侯氏於是始家焉正光中又請以詳為燕州刺史將軍如故欲為家世之基尋進後將軍五年拜司徒左長史領嘗藥典御燕州大中正興和中驃騎將軍殷州刺史還朝久而卒鄭儼字季然滎陽人容貌壯麗初為司徒胡國珍行參軍因緣為靈太后所幸時人未之知也遷員外散騎侍郎直後靈太后廢蕭寶夤西征以儼為開府屬孝昌初太后反政儼請使還朝復見寵待拜諫議大夫中書舍人領嘗食典御晝夜禁中寵愛尤甚儼每休沐太后常遣閹童隨侍儼見其妻唯得言家事而已與徐紇俱為舍人儼以紇有智數仗為謀主紇以儼寵幸既盛傾身承接共相表𩹉勢動內外城陽王徽微與之合當時政令歸於儼等遷通直郎散騎常侍平東將軍武衞將軍華林都將右衞將軍散騎常侍中軍將軍中書令車騎將軍舍人常侍如故肅宗崩事出倉卒天下咸言儼計也尒朱榮舉兵向洛以儼紇為辭榮逼京師儼走歸鄉里儼從兄仲明先為滎陽太守至是儼與仲明欲據郡起衆尋為其部下所殺與仲明俱傳首洛陽子文寬從出帝歿關西徐紇字武伯樂安博昌人也家世寒微紇少好學有名理頗以文詞見稱察孝廉對策上第高祖拔為主書世宗初除中書舍人諂附趙脩遷通直散騎侍郎及脩誅坐黨徙枹罕雖在徒役志氣不撓故事捉逃役流兵五人流者聽免紇以此得還久之復除中書舍人太傅清河王懌又以文翰待之及領軍元叉之害懌也出為雁門太守紇稱母老解郡還鄉至家未幾尋入洛飾貌事叉大得叉意及叉父繼西鎮潼關以紇為從事中郎尋以母憂歸鄉里靈太后反政以紇曾為懌所顧待復起為中書舍人紇又曲事鄭儼是以特被信任俄遷給事黃門侍郎仍領舍人總攝中書門下之事軍國詔命莫不由之時有急速令數友執筆或行或臥人別占之造次俱成不失事理雖無雅裁亦可通情時黃門侍郎太原王遵業琅雅王誦並稱文學亦不免為紇秉筆求其指授尋加鎮南將軍金紫光祿大夫黃門舍人如故紇機辯有智數當公斷決終日不以為勞長直禁中略無休息時復與沙門講論或分宵達曙而心力無怠道俗歎服之然性浮動慕權利外似謇正內實諂諛時豪勝己必相陵駕書生貧士矯意禮之其詭態若此有識鄙薄焉紇既處腹心參斷機密勢傾一時遠近填湊與鄭儼李神軌寵任相亞時稱徐鄭焉然無經國大體好行小數說靈太后以鐵券間尒朱榮左右榮知深以為憾啟求誅之榮將入洛既克河梁紇矯詔夜開殿門取驊騮御馬十匹東走兗州紇弟獻伯為北海太守獻伯弟季彥先為青州長史紇使人告之亦將家南走羊侃時為太山太守紇往投之說侃令舉兵侃從之遂聚兵反共紇圍兗州孝莊初遣侍中于暉為行臺與齊獻武王督諸軍討之紇慮不免說侃請乞師於蕭衍侃信之遂奔衍文筆駁論數十卷多有遺落時或存於世焉史臣曰闕, WYG: 九考證}
