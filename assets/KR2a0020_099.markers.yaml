  - {type: variant, offset: 2877, length: 0, content: '', WYG: 胡烈於髙斛堆敗凉州刺史蘇愉于金山咸寧中又斬凉州刺史楊欣於丹嶺盡有凉州之地後為部民没骨所殺從弟務丸綂任務丸曾孫思復犍部衆稍盛即烏孤父也思復犍死烏孤綂任皇始初吕光拜烏孤益州牧左賢王烏孤私署大都督大将軍大單于西平王年號太初天興初烏孤又稱武威王徙治樂都置車騎将軍已下分立郡縣烏孤因酒走馬馬倒傷脇笑曰幾為吕光父子所喜既而遂死弟凉州牧西平公利鹿孤綂任徙治西平改年建和使使朝貢遣弟車騎将軍傉檀拒吕纂纂士馬精鋭軍人大懼傉檀下馬據胡􅇃以安衆情乃貫甲交戰破纂軍二千餘級利鹿孤私署百官自丞相以下利鹿孤死傉檀綂任私署凉王}
