  - {type: variant, offset: 2985, length: 2, content: 卒贈, WYG: 河西王牧犍以無功授賞乃留順上表乞安平一號􅄖詔不許牧犍尚世祖妹武威公主遣其相宋繇表謝獻馬五百匹黄金五百斤繇又表請公主及牧犍母妃后定號朝議謂禮母以子貴妻從夫爵牧犍母宜稱河西國太后公主於其國内可稱王后於京師則稱公主詔從之牧犍遣其将軍沮渠旁周朝京師世祖遣侍中古弼尚書李順賜其侍臣衣服有差并徴世子封壇入侍牧犍乃遣封壇朝於京師太延五年世祖遣尚書賀多羅使凉州且觀虚實以牧犍雖稱蕃致貢而内多乖悖於是親征之詔公卿為書讓之曰王外從正朔内不捨僣罪一也民籍地圖不登公府任土作貢不入司農罪二也既荷王爵又授偽官取两端之榮邀不二之寵罪三也知朝廷志在懐逺固違聖略切税商胡以斷行旅罪四也揚言西戎髙自驕}
