  - {type: variant, offset: 5934, length: 349, content: 之皓妻被髮出堂哭而迎皓皓徑入哭別食椒而死皓子懷朗仕至南青州刺史興和初以罪賜死子姪徙邊冑字元孫河間人始為北海王詳所舉六輔時出守本郡與皓俱赴鄴宮講武亦自乞留至洛久不用詳又為啟晚乃拜將軍直閤季賢起於主馬世宗初好騎乘因是獲寵位至殿中將軍司藥丞仍主閑與茹皓通知庶事勢望漸隆引其兄為朝請直寢娶武昌王鑒妹季賢又將娶洛州刺史元拔女並結託帝戚以為榮援云掃靜徐義恭並彭城舊營人掃靜能為世宗典櫛梳義恭善執衣服並以巧便旦夕居中愛幸相侔官不異掃靜妻義恭姊也情相遺薄室家不諧義恭忿恨之親經世宗訴其欺侮世宗以其左右兩護之二人皆承奉茹皓亦並加接眷而掃靜偏為親密與皓常在左右略不歸休皓敗掃靜亦死於家義恭小心謹慎謙退少語皓等死後彌見幸信長侍左右典掌祕密世宗不豫義恭晝夜扶侍崩于懷中靈太后臨政義恭諂附元叉又有淫宴多在其宅為嘗藥次御出為東, WYG: ''}
