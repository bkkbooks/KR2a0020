  - {type: variant, offset: 6618, length: 479, content: 尚求解郡與父俱還未至京師逆除步兵校尉邕祖嶽舊葬代京喪自平城還葬南陽贈平遠將軍青州刺史世宗崩邕兼給事黃門俄轉太府卿出除平北將軍幽州刺史在州貪縱與范陽盧氏為婚女父早亡其叔許之而母不從母北平陽氏攜女至家藏避規免邕乃拷掠陽叔遂至於死陽氏訴寃臺遣中散大夫孫景安研檢事狀邕坐處死會赦得免猶當除名自理經年臨淮王彧時為廷尉久不斷決孝昌初卒侯剛字乾之河南洛陽人其先代人也本出寒微少以善於鼎覔進出入久之拜中散累遷冗從僕射嘗食典御世宗以其質直賜名剛焉稍遷奉車都尉右中郎將領刀劍左右加游擊將軍城門校尉遷武衞將軍仍領典御又加通直散騎常侍詔曰太和之季蟻寇侵疆先皇於不豫之中命師出討撫戎暴露觸御乖和朕屬當監國弗獲隨侍而左右服事唯藉忠勤剛於違和之中辛勤行追遠錄誠宜先推其以剛為右衞大將軍後領太子中庶子世宗崩剛與侍中崔光迎肅宗於東宮尋除衞尉卿封武陽縣開國侯邑千二百戶俄為侍中撫軍將軍州大中正遷衞將軍表讓侍中詔不許進爵為公以給侍之勞加賞散伯熙平初除左衞將軍餘官如故侍中游肇出為相州剛言於靈太后曰昔高氏擅權游肇抗衡不屈先帝所知四海同見而出牧一藩未盡其美宜還引入以輔聖主太后善之剛寵任既隆江陽王繼尚, WYG: 魏}
