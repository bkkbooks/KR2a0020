  - {type: variant, offset: 2650, length: 0, content: '', WYG: 令混病死弟元安代輔政以旱祈帶石山元安欲登之弟名犯世宗諱曰世人云登此山者破家身亡元安曰安有此也䇿馬登之馬倒傷足御史房屋柱自燃燋折或曰柱之為字也}
  - {type: variant, offset: 2650, length: 0, content: '', krp: 令混病死弟元安代輔政以旱祈帶石山元安欲登之弟名犯世宗諱曰世人云登此山者破家身亡元安曰安有此也䇿馬登之馬倒傷足御史房屋柱自燃燋折或曰柱之為字也}
  - {type: variant, offset: 2651, length: 2, content: 僕射, WYG: 木右主宋字含木木燋宋破而主存灾之大也宜防之又所乘馬五匹一夜中髭尾秃人曰尾之為字也尸下毛毛去尸絶㓕之徴元安曰吉凶在天知可如何未幾元安司馬張邕起兵殺元安盡誅宋氏先是謡曰㓕宋者田土子邕一名野邕刑殺過差内外復思為亂駿少子天錫因民心起兵殺邕以冠軍大将軍輔政元靖庶母郭氏以天錫擅權與張氏疎宗謀誅之事發天錫殺元靖而自立天錫字純嘏一名公純私署使持節大都督大将軍䕶羌校尉凉州牧凉王有火然於泥中天錫驕恣媱昬不恤民務元日與嬖人褻飲既闕二字羣臣朝賀又不省其母從事中郎張慮輿襯切諌且求大覲天錫不納昭成末苻堅遣将茍萇伐凉州破之天錫降於萇初駿時謡曰劉新婦簸米石新婦炊羖羝蕩滌簸張兒張兒食之口正披是時姑臧及諸郡國童兒皆歌之謂劉曜石虎並伐凉州不充至堅而降之也天錫至長安堅拜為尚書堅敗於夀春天錫奔建康鮮卑乞伏國仁出於隴西其先如弗自漠北南出五代祖祐隣并兼諸部部衆漸盛父司繁擁部落降於苻堅以為南單于又拜鎮西将軍鎮勇士川司繁死國仁代綂任苻堅之伐司馬昌明以國仁為前将軍領騎先鋒及堅之敗國仁叔歩頽叛於隴右堅令國仁討之歩頽大悦迎而推之招集部落衆十餘萬}
