  - {type: variant, offset: 2643, length: 0, content: '', WYG: 西中郎将凉州刺史領䕶羌校尉西平公劉曜䧟長安寔自稱侍中司空大都督凉州牧承制行事于時天下䘮亂秦雍之民死者十八九唯凉州獨全寔自恃衆彊轉為驕恣平文皇帝四年寔為左右閻沙等所殺先是謡曰蛇利砲蛇利砲公頭墜地而不覺寔所住室梁間有人象而無頭久之乃㓕寔惡之未幾見殺寔弟茂綂任茂字成遜私署使持節都督凉州諸軍事平西将軍䕶羌校尉凉州牧西平公誅閻沙等百餘人遣使朝貢茂妻弟賈模兄弟謀害茂茂殺之劉曜上隴茂懼而降曜以為太師凉王茂卒無子寔子駿綂任駿字公庭自稱使持節大将軍䕶羌校尉凉州牧西平公遣使朝貢煬帝時隴西人辛晏以枹罕降之駿遂有河南之地至於狄道與石勒分境駿築南城起謙光殿於其中窮珍極巧又四面各起一殿東曰宜陽青殿南曰朱陽赤殿面曰正徳白殿北曰𤣥武黒殿服章噐物皆依色隨四時居之其旁有直省寺署一依方色其奢僣如此民以勞怨駿議治石田参軍索孚諌曰凡為治者動不逆天機作不破地徳昔后稷之播百榖不墾磐石禹决江河不逆流勢今欲徙石為田運土殖榖計所損用畝盈百石所收不過三石而已竊所未安駿怒出孚為伊吾都尉有石隕於破胡燋而碎聲如擊鼓聞七百里其處氣上黒如煙煙首如赤飊駿少而淫佚常夜出微行姦亂邑里少年皆化之性又貪惏有圖秦隴意以榖帛付民歲收倍利利不充者簿賣田宅分武威武興西平張掖酒泉建康西海西郡湟河晋興廣武十一郡為凉州以長子重華為刺史金興晋城武始南安永晋大夏武城漢中八郡為河州以其寧戎校尉張瓘為刺史敦煌晋昌髙昌西域都䕶戊巳校尉玉門大䕶軍三郡三營為沙州以西胡校尉楊宣為刺史駿私署大都督大将軍假凉王督攝三州始置諸祭酒郎中大夫舍人謁者之官官號皆擬天朝而微辨其名舞六佾建豹尾車服旌旗一如王者軌保凉州隂澹之力駿以隂氏門宗彊盛忌之乃逼澹弟鑒令自殺由是大失人情駿既病見鑒為祟遂死時建國九年也子重華綂任重華字太林私署使持節大都督太尉公䕶羌校尉凉州牧平西公假凉王石虎遣麻秋率衆渡河城於長最凉州震動司馬張耽薦主簿謝艾於重華重華任之艾擊斬秋將纂母安等俘斬萬五千人重華遣使朝貢自署丞相凉王領秦雍凉三州牧重華死子曜靈綂任曜靈年十歲自稱大司馬凉州牧以重華兄祚為撫軍將軍輔政祚先蒸重華母馬氏宻説馬氏以曜靈㓜弱湏立長君馬從之遂廢曜靈而立祚曜靈尋為祚所殺祚字太伯既綂任自稱大将軍凉州牧凉公專為姦虐駿及重華子女未嫁者皆媱之凉州人士咸賦牆茨初重華末年有螽斯蟲集安昌門外緣壁逆行都尉常據諌曰螽斯是祚小字今乃逆行災之大者願出之重華曰子孫繁昌之徴何為災也吾昨夢祚攝位方委以周公之事輔翼世子而祚終殺曜靈焉自署凉王立宗廟置百官號和平元年遣使朝貢又追加軌以下王號濫殺謝艾於酒泉郎中丁琪諌祚僣竊祚斬琪於闕下廢諸神祀山川枯竭置五都尉司人姦過禁四品以下不得衣繒帛庶人不得畜奴婢乘車馬百姓怨憤有光状如車盖聲如雷震動城邑仲夏降霜有神降自稱𤣥冥與人交語祚日夜祈之神言與其福利祚信焉衆知祚必敗而祚暴虐彌甚明年祚河州刺史張瓘起兵討祚驍騎将軍宋混率衆應瓘混進攻姑臧祚遣侍中索孚伐瓘有王鸞者云師出必敗并陳祚三不道祚以妖言惑衆斬之鸞臨刑曰我死之後軍敗於外王死於内祚族之宋混至姑臧領軍趙長等開宫門應之入殿稱萬歲祚以長等破混也出勞之長以槊刺祚中額祚奔入為厨士徐黒所殺暴尸道左城内咸稱萬歲瓘等立重華少子元靖綂任元靖字元安自署使持節大都督大将軍凉王以瓘為尚書令凉州牧秉政宋混為尚書僕射瓘性猜惡賞罰皆以愛憎無復綱紀郎中殷郇陳損益諌瓘瓘曰虎生三日能食肉不湏人教由是莫有言者瓘與元靖参乘出城城北大橋三梁俱折瓘惡之乃日日散錢帛樹私惠而都街殺人朝朝不絶思為亂者十室而九東苑大冢上忽有池水城東大澤地忽火然廣數里乃殺宿嫌牛旋等以應水火之變瓘謀誅諸宋廢元靖自立先是太白守輿鬼占者以為州分當有暴兵故瓘欲猒之於是宋混率衆誅瓘瓘先殺妻子三十口乃自殺元靖以混為}
