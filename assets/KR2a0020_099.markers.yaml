  - {type: variant, offset: 4940, length: 993, content: 納許受玉印不軌不物日月滋甚朕猶愍其宿隸每加覆護而擅威弄勢侏張不已法家耳目並求憲網雖欲捨之辟實難爽然楚履既墜江君徘徊鍾牛一聲東向改釁脩雖小人承侍在昔極辟之奏欲加未忍可鞭之一百徙敦煌為兵其家宅作徒即仰停罷所親在內者悉令出禁朕昧於處物育茲豺虎顧尋往謬有愧臣民便可時敕申沒以謝朝野是日脩詣領軍于勁第與之樗蒲籌未及畢而羽林數人相續而至稱詔呼之脩驚起隨出路中執引脩馬詣領軍府琛與顯監決其罰先具問事有力者五人更迭鞭之占令必死旨決百鞭其實三百脩素肥壯腰背博碩堪忍楚毒了不轉動鞭訖即召驛馬促之令發出城西門不自勝舉縛置鞍中急驅馳之其母妻追隨不得與語行八十里乃死初于后之入脩之力也脩死後領軍于勁猶追感舊意經恤其家自餘朝士昔相宗承者悉棄絕之示己之疏遠焉茹皓字禽奇舊吳人也父讓之本名要隨劉駿巴陵王休若為將至彭城是時南土飢亂遂寓居淮陽上黨皓年十五六為縣金曹吏有姿貌謹惠南徐州刺史沈陵見而善之自隨入洛陽舉充高祖白衣左右世宗踐祚皓侍直禁中稍被寵接世宗嘗拜山陵路中欲引與同車皓奮衣將昇黃門侍郎元匡切諫乃止及世宗親政皓眷賚日隆又以馬圈之勞當擬補員外將軍時趙脩亦被幸妬害之求出皓為外守皓亦慮見危禍不樂內官遂超授濮陽太守加厲威將軍其父因皓訟理舊勳先除兗州陽平太守賜以子爵父子剖符名邦郡境相接皓忻然於去內不以疏外為戚及趙脩等敗竟獲全免雖起微細為守乃清簡寡事世宗幸鄴講武皓啟求朝趨解郡授左中郎將領直閤寵待如前皓既官達自云本出雁門雁門人諂附者乃因薦皓於司徒請為肆州大中正府省以聞詔特依許遷驃騎將軍領華林諸作皓性微工巧多所興立為山於天淵池西採掘北邙及南山佳石徙竹汝潁羅蒔其間經構樓館列於上下樹草栽木頗有野致世宗心悅之以時臨幸遷冠軍將軍仍驍騎將軍皓貴寵日升關與政事太傅北海王詳以下咸祗憚附之皓弟年尚二十擢補員外郎皓娶僕射高肇從妹於世宗為從母迎納之日詳親詣之禮以馬物皓又為弟聘安豐王延明妹延明非舊流不許詳勸強之云欲覓官職如何不與茹皓婚姻也延明乃從焉皓頗敏慧折節下人而潛自經營陰有納受貨產盈積起宅宮西朝貴弗之及也是時世宗雖親萬務皓率常居內留宿不還傳可門下奏事未幾轉光祿少卿意殊不已方欲陳馬圈從先帝之勞更希進舉初脩皓之寵北海王詳皆附納之又直閤將軍劉冑本為詳所薦常感詳恩密相承望並共來往高肇素疾諸王常規陷害既知詳與皓等交關相昵乃構之世宗云皓等將有異謀世宗乃召中尉崔亮令奏皓冑常季賢陳掃靜四人擅勢納賄及私亂諸事即日執皓等皆詣南臺翌日奏處罪其晚就家, WYG: ''}
