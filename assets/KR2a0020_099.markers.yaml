  - {type: punctuation, offset: 7096, content: 、, id: KR2a0020_ZHSJ_099-bkkpn1465}
  - {type: variant, offset: 7098, length: 309, content: 長孫稚皆以女妻其子司空任城王澄以其起由膳宰頗竊侮之云此近為我舉食然公坐對集敬遇不虧後剛坐掠殺試射羽林為御史中尉元匡所彈廷尉處剛大辟尚書令任城王澄為之言於靈太后侯剛歷仕前朝事有可取纖芥之疵未宜便致於法靈太后乃引見廷尉卿裴延儁少卿袁翻於宣光殿問曰剛因公事掠人邂逅致死律文不坐卿處其大辟竟何所依翻對曰案律邂逅不坐者謂情理已露而隱避不引必須箠撻取其款言謂撾撻以理之類至於此人問則具首正宜依犯結案不應橫加箠扑兼剛口唱打殺撾築非理本有殺心事非邂逅處之大辟未乖憲典太后曰卿等且還當別有判於是令曰廷尉執處侯剛於法如猛剛既意在為公未宜便依所執但輕勦民命理無全捨可削封三百戶解嘗食典御剛於是頗為失意剛自太和進食遂為典御歷兩都三帝二太后將三, WYG: 卷九}
