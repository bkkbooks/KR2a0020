  - {type: variant, offset: 1912, length: 262, content: 參軍并州刺史殖弟永業司空參軍事襲弟椿字元壽少以父任拜祕書中散尋以父憂去職後除羽林監謁者僕射母喪解任正始初拜中散出為太原太守加鎮遠將軍坐事免椿僮僕千餘園宅華廣聲妓自適無乏於時或有勸椿仕者椿笑而不答雅有巧思凡所營製可為後法由是正光中元叉將營明堂辟雍欲徵椿為將作大匠椿聞而以疾固辭孝昌中尒朱榮既據并肆以汾州胡逆表加椿征虜將軍都督慰勞汾胡汾胡與椿比州服其聲望所在降下事寧授右將軍太原太守以預立莊帝之勞封遼陽縣開國子食邑三百戶尋轉封真定縣開國侯食邑七百戶除持節本將軍華州刺史尋轉使持節散騎常侍殷州刺史元曄立除都官尚書固辭不拜永熙中行冀, WYG: ''}
