  - {type: variant, offset: 206, length: 130, content: 神繫仰御之有術宗社弗墜肅宗不言垂拱潛濟罕方六合淆然至於隕覆且承顏色竊光寵勢等秋風氣同夏日亦何世而不有哉此周旦所以誡其朋詩人是為疾羣小也太宗時王車之徒雖云幸念皆宣力夷險誠效兼存未如趙脩等出於近習趨走之地坐擅威刑勢傾都鄙得之非道君子所以賤之書其變態備禍福之由焉王叡, WYG: 父軌}
