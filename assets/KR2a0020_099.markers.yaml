  - {type: variant, offset: 2972, length: 0, content: '', WYG: 是以周成命太公以表東海㐮王錫晋文大啟南陽是用割凉州之武威張掖敦煌酒泉西海金城西平七郡封王為凉王受兹素土苴以白茅用建冢社為魏室藩輔盛衰存亡與魏升降夫功髙則爵尊徳厚則任重又加命王入贊百揆謀謨幃幄出征不懐登攝侯伯其以太傅行征西大将軍仗鉞秉旄鷹揚河右逺祛王略懐柔荒隅北盡于窮髪南極於庸岷西被于崐嶺東至于河曲王實征之以夾輔皇室又命王建}
