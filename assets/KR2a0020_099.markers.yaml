  - {type: variant, offset: 2990, length: 1, content: 肆, WYG: 提挈為姦罪七也承勅過限輙假征鎮罪八也欣敵之全幸我之敗侮慢王人供不以禮罪九也既㛰帝室寵踰功舊方恣慾情蒸媱其嫂罪十也既違伉儷之體不篤婚姻之義公行酖毒規害公主罪十一也備防王人候守闗要有如冦讎罪十二也為臣如是其可恕乎先令後誅王者之典也若親率羣臣委贄郊迎謁拜馬首上䇿也六軍既臨面縛輿襯又其次也如其守迷窮城不時悛悟身死族㓕為世大戮宜思厥中自求多福也官軍濟河牧犍曰何故爾也用其左丞姚定國計不肯出迎求救於蠕蠕又遣弟董來率兵萬餘人拒官軍於城南戰退車駕至姑臧遣使喻牧犍令出牧犍聞蠕蠕内侵於善無幸車駕返斾遂嬰城自守牧犍兄子祖踰城出降具知其情世祖乃引諸軍進攻牧犍兄子萬年率麾下又來降城拔牧犍與左右文武面縛請罪詔釋其縛徙凉州民三萬餘家于京師初太延中有一父老投書於敦煌城東門忽然不見其書一紙八字文曰凉王三十年若七年又於震電之所得石丹書曰河西河西三十年破帶石樂七年帶石山名在姑臧南山祀傍泥䧟不通牧犍征南大将軍董來曰祀豈有知乎遂毁祀伐木通道而行牧犍立果七年而㓕如其言牧犍媱嫂李氏兄弟三人𫝊嬖之李與牧犍姊共毒公主上遣解毒醫乘𫝊救公主得愈上徴李氏牧犍不遣厚送居於酒泉上大怒既充猶以妹壻待之其母死以王太妃禮𦵏焉又為蒙遜置守墓三十家改授牧犍征西大将軍王如故初官軍未入之間牧犍使人斫開府庫取金銀珠玉及珍竒噐物不更封閉小民因之入盗巨細蕩盡有司求賊不得真君八年其所親人及守藏者告之上乃窮竟其事搜其家中悉得所藏噐物又告牧犍父子多畜毒藥前後隐竊殺人乃有百數姊妹皆為左道朋行媱佚曾無愧顔始􅄢賓沙門曰曇無讖東入鄯善自云能使鬼治病令婦人多子與鄯善王妹曼頭陁林私通發覺亡奔凉州蒙遜寵之號曰聖人曇無讖以男女交接之術教授婦人蒙遜諸女子婦皆往受法世祖聞諸行人言曇無讖之術乃召曇無讖蒙遜不遣遂發露其事拷訊殺之至此帝知之於是賜昭儀沮渠氏死誅其宗族唯萬年及祖以前先降得免是年人又告牧犍猶與故臣民交通謀反詔司徒崔浩就公主第賜牧犍死牧犍與主訣良久乃自裁葬以王禮諡曰哀王及公主薨詔與牧犍合葬公主無男有女以國甥親寵得襲母爵為武威公主蒙遜子秉字季義世祖以其父故拜東雍}
