  - {type: variant, offset: 3491, length: 408, content: 爵降為伯卒無子洪壽弟嶷字安壽除奉朝請稍遷中散大夫以疾歸鄉里遂移居上黨年七十一卒子夷字景預有文才少工詩詠知名於世未官而卒叡叔隆保冠軍將軍姑臧侯卒追贈安東將軍并州刺史鉅鹿公諡曰靖王仲興趙郡南欒人也父天德起自細微至殿中尚書仲興幼而端謹以父任早給事左右太和中殿內侍御中散武騎侍郎給事中出入禁內十餘年轉冗從僕射猶參密近為齋帥從駕征新野有功除折衝將軍屯騎校尉又命率千餘騎破賊於鄧城除振威將軍越騎校尉賜帛千匹高祖於馬圈自不豫大漸迄於崩仲興頗預侍護達魯陽世宗即位轉左中郎將仍齋帥及帝親政與趙脩並見寵任遷光祿大夫領武衞將軍仲興雖與脩並而畏慎自退不若脩之倨傲無禮咸陽王禧之出奔也當時上下微為駭震世宗於乾脯山追仲興馳入金墉城安慰後與領軍于勁共參機要因自理馬圈侍疾及入金墉之功乞同元賞遂封上黨郡開國公食邑二千戶自拜武衞及受封之日車駕每臨饗其宅世宗游幸仲興常侍從不離左右外事得徑以聞百僚亦聳體而承望焉兄可久以仲興故自散爵為徐州征虜府長史帶彭城, WYG: 是髙昌}
