  - {type: variant, offset: 15, length: 190, content: 叡王仲興寇猛趙脩茹晧趙邕侯剛鄭儼徐紇夫令色巧言矯情飾貌邀眄睞之利射咳唾之私此蓋苟進之常也故甚者刑身瀹子其次舐痔嘗癰況乃散金秦貨輸錢漢爵又何怪哉若夫地窮尊貴嗜欲所攻聖達其猶病諸中庸固不能免男女性態其揆斯一二代之亡皆是物也據天下之圖持海內之命顧指如意高下在心此乃夏桀殷紂喪二邦秦母呂雉穢兩國也魏世王叡幸太和之初鄭儼寵孝昌之季主幼於前君稚於後乘間宣淫殆無忌畏樹列朋黨蔽塞天聰高祖明聖外彰, WYG: 李暠盧水胡沮渠蒙遜張寔字安遜安定烏氏}
