  - {type: variant, offset: 2317, length: 315, content: 號令皇天所以示威雹者氣激陰陽有所交諍殆行令殊節舒急失中之所致也昔澍雨千里實緣教祀之誠炎精三舍寧非善言之力譴不空發徵豈謬應誰謂蓋高實符人事伏願陛下留心曲覽垂神遠察禮賢登士博舉審官擢申滯怨振窮省役使夫滋水沒川之彥畢居朝右儀表丹青之位未或虛加圜土絕五毒之民揆日息千門之費巖巖廊署無不遇之士忪忪惸獨荷酒帛之恩則物見昭蘇人知休泰徐奏薰風之曲無論鴻雁之歌豈不天人幸甚鬼神咸抃椿性嚴察下不容姦所在吏民畏之重足天平末更滿還鄉初椿於宅構起廳事極為高壯時人忽云此乃太原王宅豈是王太原宅椿往為本郡世皆呼為王太原未幾尒朱榮居椿之宅榮封太原王焉至於齊獻武王之居晉陽霸朝所在人士輻湊椿禮敬親知多所拯接後以老病遂辭疾客居趙郡之西鯉魚祠山興和二年春卒時年六十二贈, WYG: ''}
