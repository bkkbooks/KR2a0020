  - {type: variant, offset: 6469, length: 0, content: '', WYG: 規還圖悦遣追夏州刺史宇文黑獺黑獺至遂總岳部衆并家口入高平城以自安固乃勒衆入隴征悦悦聞之棄城南據山水之險設陳候戰黑獺至遥望見悦欲待明日決鬭悦先召南秦州刺史李景和其夜景和遣人詣黑獺密許翻降至暮景和乃勒其所部使上驢駝云儀同有敎欲還秦州守以拒賊令軍人嚴備景和復紿悦帳下云儀同欲還秦州汝等何不装辦衆謂爲實以次相驚人情惶惑不可復止皆散走而趣秦州景和先驅至城據門以慰輯之悦部衆離散猜畏傍人不􅃪左右近已與其二弟并兒及謀殺岳者八九人棄軍迸走數日之中盤回往來不知所趣左右勸向靈州而悦不決言下隴之}
