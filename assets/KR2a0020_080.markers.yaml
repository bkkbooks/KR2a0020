  - {type: variant, offset: 2928, length: 0, content: '', WYG: 散騎常侍安南將軍黄門如故丁父憂去官詔起復任除青州大中正及元顥内逼瑞啓勸北幸乃從駕於河陽除侍中征南將軍兼吏部尚書改封北海郡開國公增邑一千户莊帝還洛加衞將軍左光禄大夫又改封樂陵郡開國公仍侍中瑞雖爲尒朱榮所委而善處朝廷之間莊帝亦賞遇之曾謂侍臣曰爲人臣當湏忠實至如朱元龍者朕待之亦不異餘人瑞啓乞三從之内並屬滄州樂陵郡詔許之仍轉滄州大中正瑞始以青州樂陵有朱氏意欲歸之故求爲青州中正又以滄州樂陵亦有朱氏而心好河北遂乞移屬焉尋加}
