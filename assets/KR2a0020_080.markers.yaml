  - {type: variant, offset: 6538, length: 0, content: '', WYG: 榮徴勝南赴大軍留淵獨鎮中山及莊帝還宮榮令淵進討韓樓配卒甚少或以爲言榮曰侯淵臨機設變是其所長若總大衆未必能用今擊此賊故當不足定也止給騎七百淵遂廣張軍聲多設供具親率數百騎深入樓境欲執行人以問虛實去薊百餘里值賊帥陳周馬歩萬餘淵遂潛伏以乘其背大破}
