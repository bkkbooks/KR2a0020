  - {type: variant, offset: 1704, length: 349, content: 府長史元曄立以為侍中前廢帝潛默龍花佛寺彥伯敦喻往來尤有勤款廢帝既立尒朱兆以己不預謀大為忿恚將攻世隆詔令華山王鷙兼尚書僕射北道大使慰喻兆兆猶不釋世隆復遣彥伯自往喻之兆乃止及還帝醼彥伯於顯陽殿時侍中源子恭黃門郎竇瑗並侍坐彥伯曰源侍中比為都督與臣相持於河內當爾之時旗鼓相望眇如天隔寧期同事陛下今日之歡也子恭曰蒯通有言犬吠非其主他日之事永安猶今日之事陛下耳帝曰源侍中可謂有射鈎之心也遂令二人極醉而罷尋除使持節驃騎大將軍右光祿大夫馬場大都督封博陵郡開國公後進爵為王又遷司徒于時炎旱有勸彥伯解司徒者乃上表遜位詔許之俄除儀同三司侍中彥伯於兄弟之中差無過患天光等敗於韓陵彥伯欲領兵屯河橋以為聲勢世隆不從及張勸等掩襲世隆彥伯時在禁直從長孫稚等於神虎門啟陳齊獻武王義功既振將除尒朱廢帝令舍人郭崇報彥伯知彥伯狼狽出走為人, WYG: ''}
