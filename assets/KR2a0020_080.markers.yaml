  - {type: variant, offset: 4531, length: 0, content: '', WYG: 爲酋帥曾祖鍮石世祖末從駕至𤓰歩賜爵臨江伯父億彌襲祖爵高祖時越騎校尉延慶少便弓馬有膽力正光末除直後𨽻大都督李崇北伐後隨尒朱榮入洛仍從榮討葛榮於相州延慶世}
