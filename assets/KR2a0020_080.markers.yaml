  - {type: variant, offset: 4542, length: 2, content: 為齊, WYG: 左僕射山東行臺北海郡開國公邑五百户時幽州刺史劉靈助以莊帝幽崩遂舉兵唱義諸州豪右咸相結附靈助進屯於定州之安固世隆白前廢帝以延慶與大都督侯淵於定州相會以討靈助淵謂延慶曰靈助善於卜占百姓信惑所在響應未易可圖若萬一戰有利鈍則大事去矣未若還師西入據闗拒險以待其變延慶曰劉靈助庸人也天道深逺豈其所識大兵一臨彼皆恃其妖術坐看符厭寧肯戮力致死與吾爭勝負哉如吾計者政欲出營城外詭言西歸靈助聞之必信而自寛潛軍往襲可一往而擒淵從之乃出頓城西聲云將還簡精騎一千夜發詰朝造靈助壘戰於城北遂破擒之仍兼尚書左僕射爲恒雲燕朔四}
