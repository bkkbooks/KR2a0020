  - {type: variant, offset: 3286, length: 418, content: 會兆於河陽兆既平京邑自以為功讓世隆曰叔父在朝多時耳目應廣如何不知不聞令天柱受禍按劍瞋目聲色甚厲世隆遜辭拜謝然後得已世隆深恨之時仲遠亦自滑臺入京世隆與兄弟密謀以元曄疏遠欲推立前廢帝而尒朱度律意在寶炬乃曰廣陵不言何以主天下世隆兄彥伯密相敦喻乃與度律同往龍花佛寺觀之後知能語遂行廢立初世隆之為僕射自憂不了乃取尚書文簿在家省閱性聰解積十餘日然後視事又畏尒朱榮威深自克勉留心几案傍接賓客遂有解了之名榮死之後無所顧憚及為尚書令常使尚書郎宋遊道邢昕在其宅廳視事東西別坐受納訴訟稱命施行其專恣如此既總朝政生殺自由公行淫佚無復畏避信任羣小隨其與奪又欲收軍人之意加汎除授皆以將軍而兼散職督將兵吏無虛號者自此五等大夫遂致猥濫又無員限天下賤之武定中齊文襄奏皆罷於是始革其弊世隆兄弟羣從各擁強兵割剝四海極其暴虐姦諂蛆酷多見信用溫良名士罕預腹心於是天下之人莫不厭毒世隆尋讓太傅改授太保又固辭前廢帝特置儀同三師之官次上公之下以世隆為之贈其父買珍使持節侍中相國錄尚書事, WYG: ''}
