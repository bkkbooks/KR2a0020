  - {type: variant, offset: 3884, length: 547, content: 世隆曾與吏部尚書元世儁握槊忽聞局上歘然有聲一局之子盡皆倒立世隆甚惡之世隆又曾晝寢其妻奚氏忽見有一人持世隆首去奚氏驚怖就視而世隆寢如故也既覺謂妻曰向夢人斷我頭去意殊不適又此年正月晦日令僕並不上省西門不開忽有河內太守田怗家奴告省門亭長云今旦為令王借車牛一乘終日於洛濱遊觀至晚王還省將車出東掖門始覺車上無褥請為記識時世隆封王故呼為令王亭長以令僕不上西門不開無車入省兼無車跡此奴固陳不已公文列訴尚書都令史謝遠疑謂妄有假借白世隆付曹推檢時都官郎穆子容窮究之奴言初來時至司空府西欲向省令王嫌遲遣二防閤捉儀刀催車車入到省西門王嫌牛小繫於闕下槐樹更將一青牛駕車令王著白紗高頂帽短小黑色儐從皆裙襦袴褶握板不似常時服章遂遣一吏將奴送入省中廳事東閤內東廂第一屋中其屋先常閉籥子容以西門不開忽言從入此屋常閉奴言在中詰其虛罔奴云此屋若閉求得開看屋中有一板牀牀上無席大有塵土兼有一甕米奴拂牀而坐兼畫地戲弄甕中之米亦握看之定其閉者應無事驗子容與謝遠自入看之戶閉極久全無開跡及入拂牀畫地蹤緒歷然米亦符同方知不謬具以此對世隆悵然意以為惡未幾見誅世隆弟世承莊帝初為寧朔將軍步兵校尉欒城縣開國伯又特除撫軍將軍金紫光祿大夫左衞將軍尋加侍中領御史中尉世承人才猥劣備員而已及元顥內逼詔世承守轘轅世隆棄虎牢不暇追告尋為元顥所擒臠殺之莊帝還宮, WYG: ''}
