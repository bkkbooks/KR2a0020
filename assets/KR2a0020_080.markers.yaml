  - {type: variant, offset: 4980, length: 1, content: 洛, WYG: 邙山尒朱仲逺帳下都督橋寧張子期自滑臺而至獻武王責寧等曰汝事仲逺擅其榮利盟契百重許同生死前仲逺自徐爲逆汝爲戎首今仲逺南走汝復背之於臣節則不忠論事人則無信犬馬尚識恩養汝今犬馬之不如遂}
  - {type: variant, offset: 4980, length: 1, content: 洛, krp: 邙山尒朱仲逺帳下都督橋寧張子期自滑臺而至獻武王責寧等曰汝事仲逺擅其榮利盟契百重許同生死前仲逺自徐爲逆汝爲戎首今仲逺南走汝復背之於臣節則不忠論事人則無信犬馬尚識恩養汝今犬馬之不如遂}
