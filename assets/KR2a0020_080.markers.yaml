  - {type: variant, offset: 6934, length: 0, content: '', WYG: 朱瑞以背本向義責不見原延慶黨舊違順常刑所及斛斯椿姦佞爲心讒忒自口取譬蒼蠅交亂四國投於豺虎天實棄之賈智侯淵反覆取斃破胡器小謀大終於顛蹶子鵠迷機寡筭竟以殱殄岳負力無謀制以一劒悦果行慮淺死不旋足觀其亡滅自取之也魏書卷八十魏書卷八十考證斛斯椿傳朝野莫不讐疾之臣人龍按北史斛斯椿傳椿從孝武帝入闗内外戒嚴惟椿得列威儀鳴騶清路帝嘗給椿店數區耕牛三十頭椿以國難未平不可與百姓爭利辭店受牛日烹一頭以饗軍士及死家無餘資此獨加醜詆蓋以其與齊獻武爲難耳賈顯度傳時趙修廵起逆荆州臣人龍按本卷樊子鵠傳云趙修延判於荆州又本書李琰之傳云南陽太守趙修延誣琰之規奔蕭衍襲州城仍自行州事城内人斬修延則此與下文荆州斬送修廵皆訛延爲廵也賀拔勝傳勝與田怙等奔走榮第田怙北史作田怡又本書}
