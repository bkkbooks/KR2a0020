  - {type: variant, offset: 1208, length: 494, content: 又以兆為天柱大將軍兆謂人曰此是叔父終官我何敢受遂固辭不拜尋加都督十州諸軍事世襲并州刺史齊獻武王之克殷州也兆與仲遠度律約共討之仲遠度律次於陽平兆出井陘屯於廣阿衆號十萬王廣縱反間或云世隆兄弟謀欲害兆復言兆與王同圖仲遠等於是兩不相信各致猜疑徘徊不進仲遠等頻使斛斯椿賀拔勝往喻之兆輕騎三百來就仲遠同坐幕下兆性粗獷意色不平手舞馬鞭長嘯凝望深疑仲遠等有變遂趨出馳還仲遠遣椿勝等追而曉譬兆遂拘縛將還經日放遣仲遠等於是奔退王乃進擊兆兆軍大敗兆與仲遠度律遂相疑阻久而不和世隆請前廢帝納兆女為后兆乃大喜世隆厚禮喻兆赴洛深示卑下隨其所為無敢違者兆與天光度律更自信約然後大會於韓陵山戰敗復奔晉陽遂大掠并州城內獻武王自鄴進討之兆遂走於秀容王又追擊度赤洪嶺破之衆並降散兆竄於窮山殺所乘馬自縊於樹王收而葬之兆果於戰鬬每有征伐常居鋒首當時諸將伏其材力而粗脫少智無將領之能榮雖奇其膽決然每云兆不過將三千騎多則亂矣兆弟智虎前廢帝封為安定王驃騎大將軍肆州刺史開府儀同三司與兆俱走獻武王擒之於梁郡岢嵐南山赦之後死於晉陽尒朱彥伯榮從弟也祖侯真高祖時并安二州刺史始昌侯父買珍世宗時武衞將軍出為華州刺史彥伯性和厚釋褐奉朝請累遷奉車都尉, WYG: 即中甚}
