  - {type: variant, offset: 2054, length: 823, content: 執尋與世隆同斬於閶闔門外懸首於斛斯椿門樹傳首於齊獻武王先是洛中謠曰三月末四月初揚灰簸土覔真珠又曰頭去項脚根齊驅上樹不須梯至是並驗彥伯弟仲遠頗知書計肅宗末年尒朱榮兵威稍盛諸有啟謁率多見從而仲遠摹寫榮書又刻榮印與尚書令史通為姦詐造榮啟表請人為官大得財貨以資酒色落魄無行及孝莊即阼除直寢寧遠將軍步兵校尉尋特除平北將軍建興太守頓丘縣開國侯邑五百戶後加散騎常侍及改郡立州遷使持節車騎將軍建州刺史加侍中進爵為公增邑五百戶尋改封清河郡又加車騎大將軍左光祿大夫轉使持節本將軍徐州刺史兼尚書左僕射三徐州大行臺尋進督三徐州諸軍事餘如故仲遠上言曰將統參佐人數不足事須在道更僕以充其員竊見比來行臺採募者皆得權立中正在軍定第斟酌授官今求兼置權濟軍要詔從之於是隨情補授肆意聚斂尒朱榮死仲遠勒衆來向京師攻陷西兗州將逼東郡莊帝詔諸督將駱驛進討並為仲遠所敗又詔都督鄭先護及右衞將軍賀拔勝共討之勝戰不利仍降仲遠尋尒朱兆入洛先護衆散而走前廢帝立除使持節侍中都督三徐二兗諸軍事驃騎大將軍開府儀同三司徐州刺史東道大都督大行臺進爵彭城王尋加大將軍又兼尚書令竟不之州遂鎮於大梁仲遠遣使請準朝式在軍鳴騶帝覽啟笑而許之其肆情如此復進督東道諸軍本將軍兗州刺史餘如故仲遠天性貪暴大宗富族誣之以反歿其家口簿籍財物皆以入己丈夫死者投之河流如此者不可勝數諸將婦有美色者莫不被其淫亂自滎陽以東輸稅悉入其軍不送京師時天光控關右仲遠在大梁兆據并州世隆居京邑各自專恣權強莫比焉所在並以貪虐為事於是四方解體又加太宰解大行臺仲遠專恣尤劇方之彥伯世隆最為無禮東南牧守下至民俗比之豺狼特為患苦後移屯東郡率衆與度律等拒齊獻武王尒朱兆領騎數千自晉陽來會軍次陽平王縱以間說仲遠等迭相猜疑狼狽遁走後與天光等於韓陵戰敗南走東郡仍奔蕭衍死於江南仲遠弟世隆字榮宗肅宗末為直齋轉直寢後兼直閤加前將軍尒朱榮表請入朝靈太后惡之令世隆詣晉陽慰喻榮榮因欲留之世隆曰朝廷疑兄故令世隆來今若遂住便有內備非計之善者榮乃遣之榮舉兵南出世隆遂遁走會榮於上黨, WYG: 親任}
