  - {type: variant, offset: 5070, length: 0, content: '', WYG: 將軍光禄大夫都督封石艾縣開國公邑一千户從上黨王天穆破邢杲值元顥入洛仍與天穆渡河赴行宫於河内顥平以本將軍除廣州刺史假鎮南將軍轉南兖州刺史尒朱榮之死也顯度情不自安南奔蕭衍衍厚待之普泰初還朝授衞大將軍儀同三司左光禄大夫又行濟州事復隨尒朱度律等北拒義旗敗於韓陵與斛斯椿及弟顯智等率衆先據河橋誅尒朱氏出帝初除尚書左僕射尋加驃騎大將軍開府儀同三司定州大中正未幾以本官行徐州刺史東道大行臺永熙三年五月轉雍州刺史西道大行臺殁於闗中弟智字顯智少有膽決孝昌中告毛謐等逆靈太后嘉之除伏波將軍冗從僕射領直齋蕭衍將夏侯夔攻郢州以智爲龍驤將軍别將討之至則夔退智仍入城及刺史元顯達以城降於蕭衍智勒城人不欲叛者與顯達交戰相率歸闕後爲都督𨽻太宰上黨王天穆征邢杲臨陳流矢中胷仍戰不已元顥入洛仍隨天穆渡河朝莊帝於河内與尒朱兆同先渡河破顥軍以勲除持節征南將軍金紫光禄大夫封義陽縣開國伯邑五百户假衞將軍與行臺樊子鵠討呂文欣於東徐州平之加侍中驃騎大將軍増邑三百户尋行東中郎將加散騎常侍及尒朱仲逺爲徐州刺史智𨽻仲逺赴彭城尒朱榮之死也仲逺舉兵向洛智不從之遂擁部下出清水東招勒州民與相拒擊莊帝聞而善之除右光禄大夫武衞將軍進爵爲侯増邑二百户通前一千因鎮徐州普泰初還洛仲逺忿其乖背議欲殺之智兄顯度先爲世隆所厚世隆爲解喻得全時趙脩巡起逆荆州蕭衍遣兵接援世隆欲令智以功自効遣智討之除使持節散騎常侍車騎大將軍左光禄大夫假驃騎大將軍荆州大都督進爵爲公將發會荆州斬送修廵首不行又從尒朱度律北拒義旗合尒朱兆於陽平兆與度律自相疑阻退還除驃騎大將軍後隨度律等敗於韓陵智與兄顯度斛斯椿謀誅尒朱氏椿顯度據守北中令智等入京擒世隆兄弟出帝初除散騎常侍本將軍開府儀同三司滄州刺史在州貪縱甚爲民害出帝徴還京師尋加授侍中以本將軍除濟州刺史率衆達東郡仍停不進於長夀津爲相州刺史竇泰所破還洛天平初赴晉陽智去就多端後坐事死時年四十五子羅侯祕書即樊子鵠代郡平城人其先荆州蠻酋被遷於代父興平城鎮長史歸義侯普泰中子鵠貴顯乃贈征虜將軍荆州刺史子鵠值北鎮擾亂南至并州尒朱榮引爲都督府倉曹參軍孝昌三年冬榮使子鵠詣京師靈太后見之問榮兵勢子鵠應對稱㫖太后嘉之除直齋封南和縣開國子邑三百户令還赴榮榮以爲行臺即中行上黨郡及榮向洛以爲假節假平南將軍都督河東正平軍事行唐州事刺史崔元珍閉門拒守子鵠攻剋之建義初拜平北將軍晉州刺史封永安縣開國伯食邑千户又兼尚書行臺治有威信山胡率服元顥入洛薛脩義及降蜀陳雙熾等受顥處分率衆攻州城子鵠出與戰大破之又破脩義等於土門以功拜撫軍將軍尋徴授都官尚書西荆州大中正後兼右僕射爲行臺督賈智等討呂文欣於東徐州平之還除車騎將軍左光禄大夫進封南陽郡開國公增户六百尚書如故仍假驃騎大將軍率所部為都督時尒朱榮在晉陽京師之事子鵠頗預委寄故在臺閣征官不解後出除散騎常侍本將軍殷州刺史屬歳旱儉子鵠恐民流亡乃勒有粟之家分貸貧者并遣人牛易力多種二麥州内以此獲安及尒朱榮之死世隆等遣書招子鵠欲與同趣京師子鵠不從以母在晉陽啓求移鎮河南莊帝嘉之除車騎大將軍豫州刺史假驃騎大將軍都督二豫郢三州諸軍事兼尚書右僕射二豫郢潁四州行臺子鵠到相州又勑賚絹五百匹行達汲郡聞尒朱兆入洛乃渡河見仲逺仲逺遣鎮汲郡兆徴子鵠赴洛既見責以乖異之意奪其部衆將還晉陽及紇豆陵歩藩起以子鵠爲都督徵發糧仗元曄以爲侍中御史中尉中軍大都督隨曄向洛普泰初仍除舊任及趙脩延叛於荆州詔子鵠通三鵶道而還遭母憂去職前廢帝聞其在洛無宅凶費不周賚絹四百疋粟五百石以本官起之太昌初兼尚書左僕射東南道大行臺總大都督杜德等追討尒朱仲逺仲逺已奔蕭衍收其兵馬甲伏時蕭衍遣元樹入寇䧟據譙城詔子鵠與德討之樹屯兵梁國欲來逆戰見子鵠軍盛夜退還譙子鵠引兵追躡樹又背城爲陳子鵠勒兵直趣城下縱騎衝突樹衆大敗奔入城門城門隘塞多自殺害於是斬千餘級獲馬數百匹大收鎧伏遂圍城加儀同三司樹勒兵出戰輙被摧衂遂不敢出自守而已子鵠恐蕭衍遣救乃分兵擊衍苞州然州宕州大澗䝉縣等五城並望風逃散樹既無外援計無所出子鵠又令人説之樹遂請率衆歸南以地還國子鵠等許之共結盟約及樹衆半出子鵠中擊破之擒樹及衍譙州刺史朱文開俘馘甚多班師出帝賚馬匹遷吏部尚書轉尚書右僕射尋加驃騎大將軍開府典選初青州人耿翔聚衆反亡奔蕭衍衍資其兵偷據膠州除子鵠使持節侍中青膠大使督濟州刺史蔡雋討之師達青州翔拔城奔走在軍遇病詔遣醫給藥仍除兖州刺史餘官如故便道之州子鵠先遣腹心縁歴民間採察得失及入境太山太守彭穆參候失儀子鵠責讓穆并數其罪狀穆皆引伏於是州内震悚及出帝入闗子鵠據城爲逆南青州刺史大野拔徐州人劉粹各率衆就子鵠天平初遣儀同三司婁昭等率衆討之子鵠先使前膠州刺史嚴思逹鎮東平郡昭攻陷之仍引兵圍子鵠城乆不拔昭以水灌城静帝欲招慰下之遣散騎常侍陸琛兼黄門即張景徴齎璽書勞子鵠而大野拔因與相見左右斬子鵠以降賀拔勝字破胡神武尖山人祖爾逗選充北防家於武川以窺覘蠕蠕兼有戰功顯祖賜爵龍城男爲本鎮軍主父度拔襲爵正光末沃野人破落汗拔陵聚衆反度拔與三子鄉中豪勇援懐朔鎮殺賊王衞可瓌度拔尋爲賊所害孝昌中追贈安逺}
