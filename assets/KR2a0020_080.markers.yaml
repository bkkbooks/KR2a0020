  - {type: variant, offset: 352, length: 853, content: 爵為王兆與世隆等定謀攻洛兆遂率衆南出進達太行大都督源子恭下都督史仵龍開壘降兆子恭退走兆輕兵倍道從河梁西涉渡掩襲京邑先是河邊人夢神謂己曰尒朱家欲渡河用爾作灅波津令為之縮水脉月餘夢者死及兆至有行人自言知水淺處以草往往表插而導道焉忽失其所在兆遂策馬涉渡是日暴風鼓怒黃塵漲天騎叩宮門宿衞乃覺彎弓欲射袍撥弦矢不得發一時散走帝步出雲龍門外為兆騎所縶幽於永寧佛寺兆撲殺皇子汙辱妃嬪縱兵虜掠停洛旬餘先令衞送莊帝於晉陽兆後於河梁監閱財貨遂害帝於三級寺初兆將向洛也遣使招齊獻武王欲與同舉王時為晉州刺史謂長史孫騰曰臣而伐君其逆已甚我今不往彼必致恨卿可往申吾意但云山蜀未平今方攻討不可委之而去致有後憂定蜀之日當隔河為犄角之勢如此報之以觀其趣騰乃詣兆及之於并州大谷具申王言兆殊不悅且曰還白高兄弟有吉夢今段之行必有克獲騰問王夢如何兆答曰吾比夢吾亡父登一高堆堆旁之地悉皆耕熟唯有馬藺草株往往猶在吾父問言何故不拔左右云堅不可去吾父顧我令下拔之吾手所至無不盡出以此而言往必有利騰還具報王曰兆等猖狂舉兵犯上吾今不同猜忌成矣勢不可反事尒朱今也南行天子列兵河上兆進不能渡退不得還吾乘山東下出其不意此徒可以一舉而擒俄而兆克京師孝莊幽縶都督尉景從兆南行以書報王王得書大驚召騰示之曰卿可馳驛詣兆示以謁賀密觀天子今在何處為隨兆軍府為別送晉陽脫其送并卿宜馳報吾當於路邀迎唱大義於天下騰晨夜驅馳已遇帝於中路王時率騎東轉聞帝已渡於是西還仍與兆書陳其福禍不宜害天子受惡名兆怒不納帝遂暴崩初榮既死莊帝詔河西人紇豆陵步蕃等令襲秀容兆入洛後步蕃兵勢甚盛南逼晉陽兆所以不暇留洛回師禦之兆雖驍果本無策略頻為步蕃所敗於是部勒士馬謀出山東令人頻徵獻武王於晉州乃分三州六鎮之人令王統領既分兵別營乃引兵南出以避步蕃之銳步蕃至於樂平郡王與兆還討破之斬步蕃於秀容之石鼓山其衆退走兆將數十騎詣王通夜宴飲後還營招王王知兆難信未能顯示將欲詣之臨上馬長史孫騰牽衣而止兆乃隔水責罵騰等於是各去王還自襄垣東出兆歸晉陽及前廢帝立授兆使持節侍中都督中外諸軍事柱國大將軍領軍將軍領左右并州刺史兼錄尚書事, WYG: 又爲}
