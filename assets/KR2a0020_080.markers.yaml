  - {type: variant, offset: 6930, length: 1, content: 矣, WYG: 於斛斯椿也及子鵠平詔以封延之爲青州刺史淵既不獲州任情又恐懼行達廣川遂刼光州庫兵反遣騎詣平原執前膠州刺史賈璐夜襲青州南郭刼前廷尉卿崔光韶以惑人情攻掠郡縣其部下督帥叛拒之淵率騎奔蕭衍途中亡散行達南青州南境爲賣漿者斬之𫝊首京師家口配没}
