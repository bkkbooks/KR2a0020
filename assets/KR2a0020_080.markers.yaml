  - {type: variant, offset: 6888, length: 1, content: 洛, WYG: 城西淵擁部據城不時迎納民劉桃符等濳引暹入據西城淵爭門不剋率騎出奔妻兒部曲爲暹所虜行達廣里會承制以淵行青州事齊獻武王又遺淵書曰卿勿以部曲輕少難於東邁齊人澆薄唯利是從齊州城民尚能迎汝陽王青州之人豈不能開門待卿也但當勉之淵乃復還暹始歸其部曲而貴平自以斛斯椿黨亦不受代淵進襲高陽郡剋之置部曲家累於城中身率輕騎遊掠於外貴平使其長子率衆攻高陽南青州刺史茹懐朗遣兵助之時青州城人餽糧者首尾相繼淵親率騎夜趣青州詐餽糧人曰臺軍已至殺戮都盡我是世子下人今已走還城汝何爲復去也人信其言棄糧奔走比曉復謂行人曰臺軍昨夜已至高陽我是前鋒今始到此頗知侯公竟在何處城人兇懼遂執貴平出降淵自惟反覆慮不獲安遂}
