  - {type: variant, offset: 4983, length: 0, content: '', krp: 椿自以數爲反覆見寧等之死意常不安遂密構間勸出帝置閣内}
  - {type: variant, offset: 4984, length: 1, content: 市, WYG: 督部曲又增武直人數自直閤已下員别數百皆選天下輕剽者以充之又説帝數出遊幸號令部曲别爲行陳椿自約勒指麾其間從此以後軍謀朝政一決於椿又勸帝徴兵詭稱南討將以伐齊獻武王帝從之遂陳兵城西北接邙山南至洛水帝詰旦戎服與椿臨閲焉獻武王以椿亂政欲誅之椿譖説既行因此遂相恐動出帝勒兵河橋令椿爲前軍營於邙山北尋遣椿率歩騎數千鎮虎牢椿弟豫州刺史元夀與都督賈顯智守滑臺獻武王令相州刺史竇泰撃破之椿懼已不免復啓出帝假説遊聲以刼愶帝信之遂入闗椿亦西走長安椿狡猾多事好亂樂禍于時敗國朝野莫不讎疾之元夀尋爲部下所殺賈顯度中山無極人父道監沃野鎮長史顯度形貎偉壯有志氣初爲别將防守薄骨律鎮正光末北鎮擾亂爲賊攻圍顯度拒守多時以賊勢轉熾不可乆立乃率鎮民浮河而下既達秀容爲}
