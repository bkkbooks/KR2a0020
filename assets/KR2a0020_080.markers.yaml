  - {type: variant, offset: 6539, length: 1, content: 策, WYG: 虜其卒五千餘人尋還其馬伏縱令入城左右諫曰既獲賊衆何爲復資遣之也淵曰我兵即少不可力戰事湏爲計以離隙之淵度其已至遂率騎夜進昧旦叩其城門韓樓果疑降卒爲淵内應遂遁走追擒之以勲進爵爲侯增邑八百户尋詔淵以本將軍爲平州刺史大都督仍鎮范陽及尒朱榮之死也范陽太守盧文偉誘淵出獵閉門拒之淵率部曲屯於郡南爲榮舉哀勒兵南向莊帝使東萊王貴平爲大使慰勞燕薊淵乃詐降貴平信之遂執貴平自隨}
