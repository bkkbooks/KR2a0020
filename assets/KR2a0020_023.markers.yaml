  - {type: variant, offset: 7658, length: 0, content: '', WYG: 護匈奴中郎將東嬴公司馬騰才神絶世規略超逺時逢多難懼損皇祀欲引兵駕獫狁孔熾造設權䇿濟難竒思欲招外救朝臣莫應髙算獨斷決謀盟意爰命外國引軍内備簡賢選士命兹良使遣參軍壺倫牙門中行嘉義陽亭侯衛謨協義亭侯衛鞬等馳奉檄書至晉陽城又稱桓穆二帝心在宸極輔相二衛對揚毗翼操展文謀雄奮武烈承命會議諮論奮發昔桓文匡佐功著周室顯名載籍列賞備物大衆廻動熙同靈集興軍百萬期不經日兄弟齊契决勝廟算鼓譟南征平夷險難又云二帝到鎮言若合符引接款密信義不渝會盟汾東銘篆丹書永世奉承慎終如初契誓命將精銳}
