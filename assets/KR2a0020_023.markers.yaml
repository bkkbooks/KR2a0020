  - {type: variant, offset: 10400, length: 390, content: 魏之右翼形勝名都實惟西蕃奧府今州之所在豈唯非舊至乃居岡飲澗井谷穢雜昇降劬勞往還數里譐誻明昏有虧禮教未若馮翊面華渭包原澤井淺池平樵牧饒廣採材華陰陸運七十伐木龍門順流而下陪削舊雉功省力易人各為己不以為勞昔宋民無井穿井而忻得人況合城無水得水而不家慶竊聞前政刺史非是無意或值兵舉或遇年災緣此契闊稽延至此去歲已熟秋方大登四境晏安京師無事丁不十錢之費人無八旬之勤損輕益重乞垂昭鑒遂詔曰一勞永逸便可聽移後除征虜將軍豳州刺史延昌四年薨贈本將軍朔州刺史子超字化生肅宗初襲時以胡國珍封安定公改封北平王拜城門校尉通直散騎常侍東中郎將尋除光祿大夫領將作大匠後復本封尒朱榮之入洛超避難洛南遇寇見害莊帝初贈車騎大將軍儀同三司岐州刺史子孝景襲武定中通直郎齊受禪爵例降燮弟願平清狂無行高祖末拜員外郎世宗初遷給事中悖惡日甚殺人劫盜公私成患世宗以其戚近未忍致之於法乃免官禁之別館館名愁思堂冀其克念世宗崩願平乃得出靈太, WYG: ''}
