  - {type: variant, offset: 7661, length: 1, content: 界, krp: 勲烈光延升平之日納貢充蕃憑瞻鑾蓋步趾三川有徳無禄大命不延年三十有九以永興三年六月二十四日寢疾薨殂背棄華殿雲中名都國失惠主哀感欷歔悲痛煩寃載號載呼舉國崩絶攀援靡訴逺近齊軌奔赴梓廬人百其身盈塞門塗髙山其頽茂林凋枯仰詐造化痛延悲夫又云桓帝忠於晉室駿奔長衢隆冬凄凄四出行誅蒙犯霜雪疹入脉膚用致薨殞不永桑榆以死勤事經勲同模垂名金石載美晉書平北哀悼祭以豐厨考行論勲諡曰義烈功施於人祀典所說又云桓帝經濟存亡繼絶荒服是賴祚存不輟金龜簫鼓軺蓋殊制反及二代莫與同列并域嘉歎北國感榮各竭其心思揚休名刋石紀功圖像存形靡輟享祀饗以犧牲永垂于後沒有餘靈長存不朽延於億齡其頌又稱桓帝金堅玉剛應期順會王有北方行能濟國武平四荒無思不服區域大康世路紛糾運遭播揚羯胡因釁敢害并土哀痛下民死亡失所率衆百萬平夷險阻存亡繼絶一州蒙祜功烈桓桓龍文虎武朱邑小善遺愛桐鄉勲攘大患六郡無闕悉之來由功而存刋石勒銘垂示後昆時晉光熙元年秋也皇興初雍州别駕鴈門叚榮於大䢴掘得此碑文雖非麗事宜載焉故録於𫝊桓穆二帝並禮重操穆帝三年卒始操所與宗室鄉親入國者衛懃安樂亭侯衛崇衛清並都亭侯衛沉叚繁並信義將軍都亭侯王發建武將軍都亭侯范班折衝將軍廣武亭侯賈慶建武將軍上洛亭侯賈循都亭侯李壹關中侯郭乳關内侯皆為桓帝所表授也六修之難存者多隨劉琨任子遵南奔衛雄姬澹莫含等名皆見碑雄字世逺澹字世雅並勇健多計畫晉世州從事既與衛操俱入國桓帝壯其膂力並以為將常隨征伐大著威名桓帝之赴難也表晉列其勲效皆拜將軍雄連有戰功稍遷至左將軍雲中侯澹亦以勇績著名桓帝末至信義將軍樓煩侯穆帝初並見委任衛操卒後俱為左右輔相六修之逆國内大亂新舊猜嫌迭相誅戮雄澹並為羣情所附謀欲南歸言於衆曰聞諸舊人忌新人悍戰欲盡殺之吾等不早為計恐無種矣晉人及烏丸驚懼皆曰死生隨二將軍於是雄澹與劉琨任子遵率烏丸晉人數萬衆而叛琨聞之大悅率數百騎馳如平城撫納之會石勒攻琨樂平太守韓據請救於琨琨以得雄澹之衆欲因其鋭以滅石勒雄澹諫曰亂民飢疲未可便用宜休息觀釁而動琨不從使雄澹率衆討勒琨屯廣牧為之聲援勒率輕騎與雄澹戰澹大敗率騎千餘奔于代郡勒遣孔萇追滅之莫含鴈門繁畤人也家世貨殖貲累巨萬劉琨為并州辟含從事含居近塞下常往來國中穆帝愛其才器善待之及為代王備置官屬求含於琨琨遣入國含心不願琨諭之曰當今胡宼滔天泯滅諸}
  - {type: variant, offset: 7663, length: 3, content: 霜禾稼, WYG: 百姓流離死亡塗地主上幽執沉溺醜虜唯此一州介在羣胡之間以吾薄徳能自存立者賴代王之力是以傾身竭寳長子逺質覬滅殘賊報雪大耻卿為忠節亦是奮義之時何得茍惜共事之小誠以忘出身之大益入為代王腹心非但吾願亦一州所賴含乃入代參國官後琨徙五縣之民於陘南含家獨留含甚為穆帝所重常參軍國大謀卒於左將軍關中侯其故宅在桑乾川南世稱莫含壁或音訛謂之莫回城云子顯知名於時昭成世為左常侍顯子題亦有䇿謀太祖使題與將軍王建等三軍討慕容寳廣甯太守劉亢埿斬之徙亢埿部落于平城寳上谷太守驎捐郡逃走太祖追討題為大將别出東道以功賜爵東宛侯及還京師常與李栗侍宴栗坐}
