  - {type: variant, offset: 9684, length: 247, content: 屈叔父遠臨此任不可不敬慎所臨以副朕望及穆泰陰謀不軌思譽知而不告恕死削封為庶人太和末還復其王封正始四年薨贈光州刺史諡曰密王子景略字世彥世宗時襲封拜驍騎將軍除持節冠軍將軍幽州刺史熙平元年薨贈本將軍豫州刺史賜帛四百匹諡曰惠王子霸字休邦襲武定中鉅鹿太守齊受禪爵例降景略弟慶略散騎侍郎子子政通直散騎常侍慶略弟洪略農太守中軍將軍行東雍州刺史洪略弟子業平原太守安定王休皇興二年封拜征南大將軍外都大官休少而聰慧治斷有稱高祖初庫莫奚寇邊以休為使持節侍中都督諸軍事征東大將軍領護東夷校尉儀同三司和龍鎮將休撫防有方賊, WYG: 推讓今汝等無狀}
