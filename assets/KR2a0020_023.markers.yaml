  - {type: variant, offset: 7659, length: 0, content: '', WYG: 驅南救涅縣東解夀陽窘廹之邑幽而復光太原西河樂平上黨遽遭寇暴白骨交横羯賊肆虐六郡凋傷羣惡相應圖及華堂旌旗輕指羯黨破䘮遣騎十萬前臨淇漳鄴遂振潰凶逆奔亡軍據州南曜鋒太行翼衛内外鎮静四方志在竭力奉戴天王忠恕用暉外動亦攘於}
  - {type: variant, offset: 7659, length: 0, content: '', krp: 驅南救涅縣東解夀陽窘廹之邑幽而復光太原西河樂平上黨遽遭寇暴白骨交横羯賊肆虐六郡凋傷羣惡相應圖及華堂旌旗輕指羯黨破䘮遣騎十萬前臨淇漳鄴遂振潰凶逆奔亡軍據州南曜鋒太行翼衛内外鎮静四方志在竭力奉戴天王忠恕用暉外動亦攘於}
