  - {type: variant, offset: 10791, length: 453, content: 臨朝以其暴亂不悛詔曰願平志行輕疏每乖憲典可還於別館依前禁錮久之解禁還家付師嚴加誨奬後拜通直散騎常侍前將軍坐裸其妻王氏於其男女之前又強姦妻妹於妻母之側御史中丞侯剛案以不道處死絞刑會赦免黜為員外常侍孝昌中卒子緒幽州安西府功曹參軍莊帝初直閤將軍尋為持節兼武衞將軍關右慰勞十二州大使遂沒吐谷渾子長春員外散騎侍郎武定初封南郡王邑五百戶齊受禪爵例降願平弟永平征虜將軍南州刺史為城民華延明所害太昌初追贈使持節侍中都督定瀛幽三州諸軍事衞將軍定州刺史永平弟珍平司州治中子叔遵員外散騎常侍珍平弟貴平羽林監轉射聲校尉莊帝初除散騎常侍宗正少卿封東萊王邑百戶除平北將軍南相州刺史莊帝既殺尒朱榮加武衞將軍兼侍中為河北山東慰勞大使至定州東北為幽州大都督侯淵所執送於晉陽後還洛前廢帝時以本官行青州事屬土民崔祖螭作逆賊徒甚盛圍逼東陽一百餘日貴平率城民固守又令將士開門交戰大軍救至遂擒祖螭等斬之還除車騎將軍加散騎常侍遷左衞將軍宗師又遷車騎大將軍左光祿大夫儀同三司貴平人才險薄為出帝所信出為青州刺史又加驃騎大將軍開府儀同三司為幽州大都督侯淵所害, WYG: 𫝊}
