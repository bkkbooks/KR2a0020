  - {type: punctuation, offset: 111, content: 、, id: KR2a0020_ZHSJ_023-bkkpn15}
  - {type: variant, offset: 111, length: 751, content: 侍中本將軍開府長安鎮都大將雍州刺史楨性忠謹事母以孝聞賜帛千匹以褒之徵赴講武高祖引見於皇信堂戒之曰翁孝行著於私庭令問彰於邦國每欽忠懿思一言展故因講武遠徵赴闕仰戀仁慈情在未已但長安鎮年飢民儉理須綏撫不容久留翁今還州其勤隱恤無令境內有飢餒之民翁既國之懿親終無貧賤之慮所宜慎者略有三事一者恃親驕矜違禮僭度二者傲慢貪奢不恤政事三者飲酒遊逸不擇交友三者不去患禍將生但能慎此足以全身遠害光國榮家終始之德成矣而楨不能遵奉後乃聚斂肆情文明太后高祖並臨皇信堂引見王公太后令曰汝陰王天賜南安王楨不順法度黷貨聚斂依犯論坐將至不測卿等為當存親以毀令為欲滅親以明法羣臣咸以二王託體先皇宜蒙矜恕太后不答高祖乃詔曰南安王楨以懿戚之貴作鎮關右不能潔己奉公助宣皇度方肆貪欲殖貨私庭放縱姦囚壅絕訴訟貨遺諸使邀求虛稱二三之狀皆犯刑書昔魏武翦髮以齊衆叔向戮弟以明法克己忍親以率天下夫豈不懷有為而然耳今者所犯事重疇日循古推刑實在難恕皇太后天慈寬篤恩矜國屬每一尋惟高宗孔懷之近發言哽塞悲慟于懷且以南安王孝養之名聞於內外特一原恕削除封爵以庶人歸第禁錮終身後高祖南伐楨從至洛及議遷都首從大計高祖甚悅楨母劉太妃薨高祖親幸臨慰及葬贈布帛綵五百段又以楨議定遷都復封南安王食邑一千戶出為鎮北大將軍相州刺史高祖餞楨於華林都亭詔曰從祖南安既之蕃任將曠違千里豫懷惘戀然今者之集雖曰分歧實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文人下筆高祖送楨於階下流涕而別太和二十年五月至鄴入治日暴風大雨凍死者十數人楨又以旱祈雨于羣神鄴城有石虎廟人奉祀之楨告虎神像云三日不雨當加鞭罰請雨不驗遂鞭像一百是月疽發背薨諡曰惠贈帛一千匹及葬又賜帛千匹遣黃門郎監護喪事及州刺史穆泰謀反楨知而不告雖薨猶追奪爵封國除有五子子英字虎兒性識聰敏博聞強記便弓馬解吹笛微曉醫術高祖時為, WYG: ''}
