  - {type: variant, offset: 8746, length: 0, content: '', krp: 時初并河}
  - {type: variant, offset: 8747, length: 3, content: 戎校尉, WYG: 人心未一雲撫慰新舊皆得其所神䴥中卒諡曰敬公劉庫仁本字沒根劉虎之宗也一名洛垂少豪爽有智略母平文皇帝之女昭成皇帝復以宗女妻之為南部大人建國三十九年昭成暴崩太祖未立苻堅以庫仁為陵江將軍關内侯令與衛辰分國部衆而}
