  - {type: variant, offset: 89, length: 4, content: 域校尉儀, WYG: 訖東變化無形威武所向下無交兵南壹王室北服丁零招諭六狄咸來歸誠超前絶後致此有成奉承晉皇扞禦邊疆王室多難天網㢮綱豪心逺濟靡離其殃嵗剪逆命姦盗豺狼永安元年嵗次甲子姦黨猶逆東西狼跱敢逼天王兵甲屢起怙衆肆暴虐用將士鄴洛搆隙棄親求疏乃招異類屠各匈奴劉淵姦賊結黨}
