  - {type: variant, offset: 7660, length: 0, content: '', WYG: 曜武振旅而旋長路匪夷出入經年毫毛不犯百姓稱𫝊周覽載籍自古及今未聞外域奔救内患棄家憂國以危易安惟公逺略臨難能權應天順人恩徳素宣和戎静朔危邦復存又云非桓天挺忠孝自然孰能超常不為異端回動大衆感公之言功濟方}
