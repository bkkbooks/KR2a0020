  - {type: variant, offset: 8751, length: 3, content: 萬鎮都, WYG: 之自河以西屬衛辰自河以東屬庫仁於是獻明皇后擕太祖及衛秦二王自賀蘭部來居焉庫仁盡忠奉事不以興廢易節撫納離散恩信甚彰苻堅進庫仁廣武將軍給幢麾鼓蓋儀比諸侯處衛辰在庫仁之下衛辰怒殺堅五原太守而叛攻庫仁西部庫仁又伐衛辰破之追至隂山西北千餘里獲其妻子盡收其衆庫仁西征庫狄部}
