  - {type: variant, offset: 9330, length: 238, content: 襲封安定王改封安平王齊受禪爵例降融弟凝字定興起家州征虜錄事參軍累遷護軍長史凝姑尒朱榮妻莊帝初封東安王食邑五百戶除持節安東將軍兗州刺史轉濟州刺史仍本將軍永熙二年薨贈持節都督滄瀛冀三州諸軍事驃騎大將軍冀州刺史子彥友襲武定中光祿大夫齊受禪爵例降凝弟湛字鎮興起家祕書郎轉尚書左司郎中遷廷尉少卿莊帝初遇害河陰贈征東將軍青州刺史追封漁陽王食邑五百戶子俊襲齊受禪爵例降湛弟晏字俊興卒於祕書丞贈平東將軍祕書監豫州刺史樂陵王胡兒和平四年薨追封樂陵王贈征北大將軍諡曰康無子顯祖詔胡兒兄汝陰王天賜之, WYG: 眷}
