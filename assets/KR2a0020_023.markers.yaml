  - {type: variant, offset: 7843, length: 898, content: 衞將軍右光祿大夫拜尚書左僕射轉車騎將軍儀同三司固辭不拜聽解侍中然後受詔尋除尚書令加開府西道行臺不行時靈太后專制朝綱頹褫徽既居寵任無所匡弼與鄭儼之徒更相阿黨外似柔謹內多猜忌睚眦之忿必思報復識者嫉之又不能防閑其妻于氏遂與廣陽王淵姦通及淵受任軍府每有表啟論徽罪過雖涉誣毀頗亦實焉莊帝踐阼拜司州牧尋除司徒仍領牧元顥入洛徽從莊帝北巡及車駕還宮以與謀之功除侍中大司馬太尉公加羽葆鼓吹增邑通前二萬戶餘官如故徽表辭官封前後屢上又啟云河上之功將士之力求回所封加諸勳義徽為莊帝親待內懼榮寵故有此辭以防外議莊帝識其意聽其辭封不許讓官徽後妻莊帝舅女侍中李彧帝之姊婿徽性佞媚善自取容挾內外之意宗室親戚莫與比焉遂與彧等勸帝圖榮莊帝亦先有意榮死世隆等屯據不解除徽太保仍大司馬宗師錄尚書事總統內外徽本意謂榮死後枝葉自應散亡及尒朱宗族聚結謀難徽算略無出憂怖而已性多嫉妬不欲人居其前每入參謀議獨與帝決朝臣有上軍國籌策者並勸帝不納乃云小賊何慮不除又吝惜財用自家及國於是有所賞錫咸出薄少或多而中減與而復追徒有糜費恩不感物莊帝雅自約狹尤亦徽所贊成太府少卿李苗徽司徒時司馬也徽待之頗厚苗每致忠言徽自得志多不採納苗謂人曰城陽本自蜂目而豺聲復將露也及尒朱兆之入禁衞奔散莊帝步出雲龍門徽乘馬奔度帝頻呼之徽不顧而去遂走山南至故吏寇彌宅彌外雖容納內不自安乃怖徽云官捕將至令其避他所使人於路邀害送屍於尒朱兆出帝初贈使持節侍中太師大司馬錄尚書事司州牧諡曰文獻子延襲爵武定末官至太子中庶子齊受禪爵例降徽兄顯魏給事中司徒掾卒贈輔國將軍東豫州刺史徽次兄顯恭字懷忠揚州別駕以軍功封平陽縣開國子邑三百戶孝莊初除北中郎將遷左將軍東徐州刺史入為安東將軍大司農卿尋除中軍將軍荊州刺史莊帝既殺尒朱榮乃除顯恭使持節都督晉建南汾三州諸軍事鎮西將軍兼尚書左僕射西北道行臺晉州刺史尒朱兆入洛後死於晉陽出帝初贈衞大將軍并州刺史重贈車騎大將軍儀同三司子彥昭襲武定中漁陽太守齊受禪爵例降顯恭弟旭字顯和莊帝時封襄城郡王邑一千戶武定末位至大司馬齊受禪爵例降章武王太洛皇興二年薨追贈征北大將軍章武郡王諡曰敬無子高祖初以南安惠王第二子彬為後彬字豹兒襲爵勇健有武用出為使持節都督東秦豳夏三州諸軍事, WYG: ''}
