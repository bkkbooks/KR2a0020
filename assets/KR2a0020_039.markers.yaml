  - {type: variant, offset: 2208, length: 0, content: '', WYG: 咸陽王禧為殿中將軍尋被勅與征南將軍城陽王鸞安南將軍盧淵等軍攻赭陽各不相節度諸軍皆坐甲城下欲以不戰降賊佐獨勒所部晨夜攻擊屬蕭鸞遣其太子右衛率垣歴生率衆來援咸以勢弱不敵規欲班師佐乃簡騎二千逆賊為賊所敗坐徙瀛州為民車駕征宛鄧復起佐假平逺將軍統軍蕭鸞新野太守劉忌憑城固守佐率所領攻拔之以功封涇陽縣開國子邑三百戸沔北既平廣陽王嘉為荆州刺史仍以佐為嘉鎮南府長史加輔國將軍别鎮新野及大軍凱旋髙祖執佐手曰沔北洛陽南門卿既為朕平之亦當為朕善守髙祖崩遺勅以佐行荆州事仍本將軍佐在州威信大行邊民悦附前後歸之者二萬許家尋正刺史世宗初徴兼都官尚書景明二年卒年七十一贈征虜將軍秦州刺史諡曰莊子遵襲遵爽儁有父風歴相州治中轉别駕冀州征北府長史司空司馬卒贈龍驤將軍洛州刺史孝荘初以外戚超贈車騎}
  - {type: page-break, offset: 2208, content: '', id: KR2a0020_WYG_039-13b, image: WYG0261/WYG0261-0551d.png}
