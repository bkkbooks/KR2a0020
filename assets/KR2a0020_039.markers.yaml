  - {type: page-break, offset: 883, content: '', id: KR2a0020_WYG_039-7b, image: WYG0261/WYG0261-0548d.png}
  - {type: variant, offset: 884, length: 403, content: 中書監領祕書事賜爵襄城公加散騎常侍右將軍賜其父為信都侯從征赫連昌世祖親追擊之入其城門魯元隨世祖出入是日微魯元幾至危殆從征平涼以功拜征北大將軍加侍中後遷太保錄尚書事世祖貴異之常從征伐出入臥內每有平殄輒以功賞賜僮隸前後數百人布帛以萬計世祖臨幸其第不出旬日欲其居近易於往來乃賜甲第於宮門南衣食車馬皆乘輿之副真君三年冬車駕幸陰山魯元以疾不從侍臣問疾送醫藥傳驛相屬於路及薨世祖甚悼惜之還臨其喪哭之哀慟東西二宮命太官日送奠晨昏哭臨訖則備奏鐘鼓伎樂輿駕比葬三臨之喪禮依安城王故事而贈送有加贈襄城王諡曰孝葬於崞山為建碑闕自魏興貴臣恩寵無與為比子統襲爵少子內給侍東宮恭宗深昵之常與臥起同衣父子有寵兩宮勢傾天下內性厚有父風而恭順不及正平初宮臣伏誅世祖以魯元故唯殺內而厚撫其兄弟統以父任侍東宮世祖以元舅陽平王杜超女南安長公主所生妻之車駕親自臨送太官設供具賜賚以千計高宗即位典選部主客二曹興安二年卒贈襄城王諡曰景無子弟彌娥襲爵拜北, WYG: ''}
