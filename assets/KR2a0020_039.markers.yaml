  - {type: variant, offset: 2215, length: 1, content: 薨, WYG: 勰為定州請為開府叅軍累轉員外散騎常侍遊擊將軍太中大夫出為京兆内史大將軍京兆王繼西伐請而諮議叅軍尋除左將軍營州刺史時四方州鎮謀逆叛亂相續營州城内咸有異心仲遵單車赴州既至與大使盧同以恩信懐誘率皆怡悦後肅宗又詔盧同為行臺北出慰勞同疑彼人情難信聚兵將往城民劉安定等先有異志謂欲圖已還相恐動遂執仲遵二}
