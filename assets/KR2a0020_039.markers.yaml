  - {type: variant, offset: 713, length: 170, content: 左衞大將軍太師宣城王諡曰忠貞喪禮一依安城王叔孫俊故事陪葬金陵子眷襲爵盧魯元昌黎徒河人也曾祖副鳩仕慕容垂為尚書令臨澤公祖父並至大官魯元敏而好學和有雅度太宗時選為直郎以忠謹給侍東宮恭勤盡節世祖親愛之及即位以為中書侍郎拾遺左右寵待彌深而魯元益加謹肅世祖逾親信之內外大臣莫不敬憚焉性多容納善與人交好掩人之過揚人之美由是公卿咸親附之魯元以工書有文才累, WYG: 正}
