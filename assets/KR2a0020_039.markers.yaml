  - {type: variant, offset: 2139, length: 0, content: '', WYG: 太尉諮議叅軍䖍弟㽔字延賔歴歩兵校尉東郡太守司農少卿卒贈龍驤將軍豫州刺史長子詠字義興有幹局起家太學博士領殿中侍御史稍遷東郡太守荘帝初遷安東將軍濟州刺史轉廣州刺史加散騎常侍前廢帝時與弟三弟通直散騎常侍義真弟七弟中書侍郎太常少卿義邕同時為尒朱仲逺所害義邕荘帝居蕃之日以外親甚見親昵及有天下特䝉信任尒朱榮之誅義邕與其事由是竝及於禍出帝初贈詠侍中驍騎將軍吏部尚書冀州刺史義真贈前將軍齊州刺史義邕贈安東將軍青州刺史詠次弟義慎司空屬第四弟義逺國子博士荘帝初竝於河隂遇害義慎贈散騎常侍征東將軍雍州刺史承弟茂字仲宗髙宗末襲父爵鎮西將軍敦煌公髙祖初除長安鎮都將轉西兖州刺史將軍如故入為光禄大夫例降為侯茂性謙慎以弟冲寵盛懼於盈遂託以老疾固請遜位髙祖不奪其志聼食大夫禄還私第因居定州之中山自是優遊早舍不入京師景明三年卒時年七十一諡曰恭侯子静字紹安襲解褐太尉叅軍事定州别駕東平原太守神龜三年卒年五十五子遐字智逺有几案才起家司空行叅軍襲爵稍遷右將軍尚書駕部郎中出為河内太守尒朱榮稱兵向洛次其郡境莊帝潛濟河北相㑹遐既聞榮推奉荘帝遂}
