  - {type: variant, offset: 2211, length: 0, content: '', WYG: 儀同三司定州刺史子果襲司空諮議叅軍武定中坐通西賊伏誅遵弟柬字休賢郡辟功曹以父憂去職遂終身不食酒肉因屏居鄉里肅宗初司空任城王澄嘉其操尚以為叅軍事尋轉司徒外兵叅軍歴任城濟北二郡太守孝莊初遷鎮逺將軍濟州刺史卒贈安北將軍殿中尚書相州刺史子經司徒諮議叅軍行豫州事興和初坐妖言賜死柬弟神儁小名提少以才學知名為太常劉芳所賞釋褐奉朝請轉司徒祭酒從事中郎頃之拜驍騎將軍中書侍郎太常少卿出為前將軍荆州刺史時四方多事所在連兵蕭衍遣將曹敬宗來宼攻圍積時又引水灌城城不没者數版神儁循撫兵民戮力固守詔遣都督崔暹别將王羆裴衍等赴援敬宗退走時宼賊之後城外多有露骸神儁敎令收𦵏之徴拜大司農卿肅宗末除鎮軍將軍行相州事於時葛榮南逼神儁憂懼乃故墜馬傷脚仍停汲郡有詔追還荘帝纂統以神儁外戚之望拜散騎常侍殿中尚書追論固守荆州之功}
