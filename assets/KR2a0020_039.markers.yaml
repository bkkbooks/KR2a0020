  - {type: variant, offset: 243, length: 0, content: '', WYG: 將軍雍州刺史諡曰穆長子韶字元伯學渉有器量與弟彦䖍㽔並為髙祖賜名焉韶又為季父沖所知重延興中補中書學生襲爵姑臧侯除儀曹令時修改車服及羽儀制度皆令韶典焉遷給事黄門侍郎後例降侯為伯兼大鴻臚卿黄門如故髙祖將創遷都之計詔引侍臣訪以古事韶對洛陽九鼎舊所七百攸基地則土中實均朝貢惟玉建國莫尚於此髙祖稱善遷太子右詹事尋罷左右仍為詹事秦州大中正出為安東將軍兖州刺史髙祖自鄴還洛韶朝於路言及庶人恂事髙祖曰卿若不出東宫或未至此世宗初徴拜侍中領七兵尚書尋除撫軍將軍并州刺史以從弟伯尚同元禧之逆}
