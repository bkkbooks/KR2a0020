  - {type: variant, offset: 1656, length: 260, content: 書既同華裔將一昊天不弔奄背萬邦竊聞劉昱夭亡權臣殺害思正之民翹想罔極愚謂時不再來機宜易失毫分之差致悔千里天與不取反受其咎所謂見而不作過在介石者也宜簡雄將號令八方義陽王臣昶深悟存亡遠同孫氏苟歷運響從則吳會可定脫事有難成則振旅而返進可以揚義聲於四海退可以通德信於遐裔宜乘之會運鍾今日如合聖聽乞速施行脫忤天心願存臣表徐觀後驗賞罰隨焉高祖嘉之遷司徒征西大將軍進爵魏郡王高祖與文明太后頻幸建第賜建妻宴於後庭太和九年薨子念襲爵為中山守坐掠良人為御史中尉王顯所彈遇赦免爵除萬安國代人也祖真世為酋帥率部民從世祖征伐以功除平西將軍敦煌公轉驃, WYG: ''}
