  - {type: variant, offset: 2187, length: 2, content: 華陰, WYG: 弟季凱沉敏有識量坐兄事與母弟俱徙邊久之㑹赦免遂寓居於晉陽沉廢積年孝昌中解褐太尉叅軍事加威逺將軍尋除并州安北府長史肅宗崩尒朱榮隂圖義舉季凱豫謀荘帝踐阼徴拜給事黄門侍郎封博平縣開國侯邑七百戸尋加散騎常侍東平將軍轉祕書監進號中軍將軍普泰元年七月尒朱世隆以榮之死謂季凱通知於是見害年五十五出帝初追贈侍中驃騎將軍吏部尚書定州刺史子統字基伯襲武定末太尉刑獄叅軍齊受禪爵例降季凱弟延慶孝昌中解褐定州鎮北城局叅軍稍遷奉車都尉陳留太守遷鎮東將軍金紫光祿大夫永熈二年卒年五十二贈本將軍雍州刺史子恵矩武定中儀同開府叅軍事延慶弟延度武定中衛將軍安徳太守輔弟佐字季翼有文武才幹髙祖初兼散騎常侍銜命使髙麗以奉使稱㫖還拜常山太守賜爵真定子遷冠軍將軍懐州刺史賜爵山陽侯尋加安南將軍河内}
