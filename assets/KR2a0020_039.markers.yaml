  - {type: variant, offset: 550, length: 0, content: '', WYG: 車騎大將軍司空公雍州刺史諡曰文恭既𦵏之後有冀州兵千餘人戍於荆州還經韶墓相率培冢數日方歸其遺愛如此初韶克定秦隴永安中追封安城縣開國伯邑四百戸長子璵字道璠襲武定中驃騎大將軍東徐州刺史璵弟瑾字道瑜美容貌頗有才學特為韶所鍾愛清河王懌知賞之懌為司徒辟叅軍轉著作佐郎加龍驤將軍稍遷通直散騎侍郎與給事黄門侍郎王遵業尚書郎盧觀典領儀注臨淮王彧謂瑾等曰卿等三儁共掌帝儀可謂舅甥之國士盧即瑾之外兄也肅宗崩上諡筞文瑾所制也荘帝初於河隂遇害年四十九贈冠軍將軍齊州刺史長子産之字孫僑容貌短陋而撫訓諸弟愛友篤至年四十九亡産之弟蒨之武定末司空主簿瑾弟瓚字道璋少有風尚辟司徒叅軍事神龜中}
