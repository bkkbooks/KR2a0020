  - {type: variant, offset: 2212, length: 2, content: 長樂, WYG: 千乘縣開國侯邑一千戸轉中書監吏部尚書神儁意尚風流情在推引人物而不能守正奉公無多聲譽有鉅鹿人李炎上書言神儁之失天柱將軍尒朱榮曽補人為曲陽縣令神儁以階縣不用榮聞大怒謂神儁自樹親黨排抑勲人神儁懼啓求解官乃除衛將軍左光祿大夫尋屬尒朱兆入京乘輿幽執神儁遂逃竄民間出帝初始來歸闕拜散騎常侍驃騎大將軍左光祿大夫儀同三司孝静初行并州事尋除驃騎大將軍肆州刺史入為侍中興和二年薨年六十四贈都督雍秦涇三州諸軍事驃騎大將軍尚書左僕射司徒公雍州刺史侍中開國公如故神儁風韻秀舉博學多聞朝廷舊章及人倫氏族多所諳記篤好文雅老而不輟凡所交遊皆一時名士汲引後生為其光價四方才子咸宗附之而性通率不持檢度至於少年之徒皆與褻狎不能清正方重識者以此為譏神儁䘮二妻又欲娶鄭嚴祖妹神儁之從甥也盧元明亦將為婚遂至紛競二家鬩於嚴祖之門鄭卒歸元明神儁惆悵不己時人謂神儁鳯徳之衰神儁無子從弟延度以第三子容兒後之韶從弟元珍小名大墨起家奉朝請太尉録事叅軍卒於歩兵校尉元珍弟仲遵有業尚彭城}
