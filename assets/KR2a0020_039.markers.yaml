  - {type: variant, offset: 1463, length: 192, content: 爵趙郡公建與侍中尚書晉陽侯元仙德殿中尚書長樂王穆亮比部尚書平原王陸叡密表曰皇天輔德命集大魏臣等祖父翼贊初興勤過蜀漢誓固山河享茲景福寵辱休戚與國均焉臣以凡近識無遠達階藉先寵遂荷今任彼己之譏播於羣口仰感生成俯自策厲顧省駑鈍終於無益然飲冰驚寐實懷慚負至於願天高地厚何日忘之自永嘉之末封豕橫噬馬叡南據奄有荊楚及桓劉跋扈禍難相繼岱宗隔望秩之敬青徐限見德之風獻文皇帝髫龍飛道光率土干戚暫舞淮海從風, WYG: ''}
