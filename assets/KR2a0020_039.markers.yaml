  - {type: variant, offset: 2182, length: 0, content: '', WYG: 軍時年五十三贈征虜將軍凉州刺史子處黙少清恵起家青州彭城王府主簿稍遷通直散騎常侍安東將軍光禄大夫撫軍將軍廣州開府長史天平初卒年三十九茂弟輔字督真亦有人望解褐中書博士遷司徒議曹掾太和初髙祖為咸陽王禧納其女為妃除鎮逺將軍潁川太守帶長社戍輔綏懐招集甚得邊和六年卒於郡年四十七贈征虜將軍秦州刺史襄武侯諡曰恵長子伯尚少有重名弱冠除祕書郎髙祖毎云此李氏之千里駒稍遷通直散騎侍郎勅撰太和起居注尋遷祕書丞世宗初兼給事黄門侍郎景明二年坐與咸陽王禧謀反誅時年二十九伯尚弟仲尚儀貌甚美少以文學知名二十著前漢功臣序讚及季父司空沖誄時兼侍中髙聰}
