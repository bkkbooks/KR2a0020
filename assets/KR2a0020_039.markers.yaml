  - {type: variant, offset: 551, length: 4, content: 車路頭代, WYG: 贈漢陽太守子修年大將軍開府士曹叅軍早亡韶弟彦字次仲頗有學業髙祖初舉司州秀才除中書博士轉諫議大夫後因考課降為元士尋行主客曹事徙郊廟下大夫時朝儀典章咸未周備彦留心考定號為稱職髙祖南伐彦以蕞爾江閩不足親勞鑾駕頻有表諫雖不從納然亦嘉其至誠及六軍次於淮南徴為廣陵王羽長史加恢武將軍西翼副將軍還除冀州趙郡王幹長史轉青州廣陵王羽長史帶齊郡太守徴為龍驤將軍司徒右長史轉左長史秦州大中正出行揚州事尋徴拜河南尹還至汝隂復勅行徐州事轉平北將軍平州刺史還平東將軍徐州刺史延昌二年夏大霖雨川瀆皆溢彦相水陸形勢隨便疏通得無淹漬之害朝廷嘉之頻詔勞勉入為河南尹遷金紫光祿大夫光禄勲卿轉度支尚書出為撫軍將軍秦州刺史是時破落汗拔陵等反於北鎮二夏豳涼所在蜂起而彦刑政過猛為下所怨城民薛珍劉慶杜超等因四方離叛遂潛結逆謀正光五年六月突入州門擒彦於内齋囚於西府推其黨莫折大提為帥遂害彦永安中追贈侍中驃騎大將軍司徒公雍州刺史諡曰孝貞子燮字徳諧少有風望解褐司徒叅軍著作佐郎司徒祭酒轉主簿卒贈輔國將軍太常少卿燮弟徳廣終於中散大夫徳廣弟徳顯太尉行叅軍稍遷散騎侍郎卒贈征虜將軍東秦州刺史徳顯弟徳眀祕書郎彦弟䖍字叔恭太和初為中書學生遷祕書中散轉冀州驃騎府長史太子中舍}
