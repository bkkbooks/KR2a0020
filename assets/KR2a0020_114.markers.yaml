  - {type: variant, offset: 365, length: 0, content: '', krp: 十餘泰常中卒未殯帝三臨其䘮追贈老夀將軍趙胡靈公初法果每言太祖明叡好道即是當今如来沙門宜應盡禮遂常致拜謂人曰能鴻道者人主也我非拜天子乃是禮佛耳法果四十始為沙門有子曰猛詔令襲果所加爵帝後幸廣宗有沙門曇澄年且百嵗邀見於路奉致果物帝敬其年老志力不衰亦加以老壽將軍號是時鳩摩羅什為姚興所敬於長安草堂寺集義學八百人重譯經本羅什聰辯有淵思逹東西方言時沙門道彤僧略道恒道􅀈僧肇曇影等與羅什共相提挈發明幽致諸深大經論十有餘部更定章句辭義通明至今沙門共所祖習道彤等皆識學洽通僧肇尤為其最羅什之撰譯僧肇常執筆定諸辭義注維摩經又著數論皆有妙㫖學者宗之又沙門法顯慨律藏不具自長安遊天竺歴三十餘國隨有經律之處學其書語譯而寫之十年乃於南海師子國隨商人汎舟東下晝夜昬迷將二百日乃至青州長廣郡不其勞山南下乃出海焉是嵗神瑞二年也法顯所逕諸國傳記之今行於世其所得律通譯未能盡正至江南更與天竺禪師䟦陁羅辯定之謂之僧祇律大備于前為今沙門所持受先是有沙門法領從揚州入西域得華嚴經本定律後數年䟦陁羅共沙門法業重加譯撰宣行於時世祖初即位亦遵太祖太宗之業每引髙徳沙門與共談論於四}
  - {type: variant, offset: 366, length: 2, content: 戊辰, WYG: 八日輿諸佛像行於廣衢帝親御門樓臨觀散花以致禮敬先是沮渠蒙遜在涼州亦好佛法有罽賔沙門曇摩讖習諸經論於姑臧與沙門智嵩等譯湼槃諸經十餘部又曉術數禁呪歴言他國安危多所中驗蒙遜每以國事諮之神䴥中帝命蒙遜送讖詣京師惜而不遣既而懼魏威責遂使人殺讖讖死之日謂門徒曰今時將有客來可早食以待之食訖而走使至時人謂之知命智嵩亦爽悟篤志經籍後乃以新出經論於涼土教授辯論幽㫖著湼槃義記戒行峻整門人齊肅知涼州將有兵役與門徒數人欲往胡地道路饑饉絶糧積日弟子求得禽獸肉請嵩彊食嵩以戒自誓遂餓死於酒泉之西山弟子積薪焚其屍骸骨灰燼唯舌獨全色状不變時人以為誦説功報涼州自張軌後世信佛教敦煌地接西域道俗交得其舊式村塢相屬多有塔寺太延中涼州平徙其國人於京邑沙門佛事皆俱東象教彌増矣尋以沙門衆多詔罷年五十已下者世祖初平赫連昌得沙門惠始姓張家本清河聞羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聽講夕則還處静坐三輔有識多宗之劉裕滅姚泓留子義眞鎮長安義眞及寮佐皆敬重焉義眞之去長安也赫連屈丐追敗之道俗少長咸見坑戮惠始身被白刃而體不傷衆大怪異言於屈丐屈丐大怒召惠始於前以所持寶劒擊之又不能害乃懼而謝罪統萬平惠始到京都多所訓導時人莫測其迹世祖甚重之每加禮敬始自習禪至於没世稱五十餘年未嘗寢臥或時跣行雖履泥塵初不汙足色愈鮮白世號之曰白脚師太延中臨終於八角寺齊潔端坐僧徒滿側凝泊而絶停屍十餘日坐既不改容色如一舉世神異之遂瘞寺内至眞君六年制城内不得留瘞乃葬於南郊之外始死十年矣開殯儼然初不傾壊送葬者六千餘人莫不感慟中書監髙允為其傳頌其徳迹惠始冡上立石精舎圖其形像經毁法時猶自全立世祖即位富於春秋既而鋭志武功毎以平定禍亂為先雖歸宗佛法敬重沙門而未存覽經教深求緣報之意及得宼謙之道帝以清浄無為有仙化之證遂信行其術時司徒崔浩博學多聞帝每訪以大事浩奉謙之道尤不信佛與帝言數加非毁常謂虚誕為世費害帝以其辯博頗信之㑹蓋呉反杏城闗中騷動帝乃西伐至於長安先是長安沙門種麥寺内御騶牧馬於麥中帝入觀馬沙門飲從官酒從官入其便室見大有弓矢矛楯出以奏聞帝怒曰此非沙門所用當與蓋呉通謀規害人耳命有司案誅一寺閲其財産大得釀酒具及州郡牧守富人所寄藏物蓋以萬計又為屈室與貴室女私行淫亂帝既忿沙門非法浩時從行因進其説詔誅長安沙門焚破佛像勑留臺下四方令一依長安行事又詔曰彼沙門者假西戎虚誕妄生妖孽非所以一齊政化布淳徳於天下也自王公已下有私養沙門者皆送官曹不得隠匿限今年二月十五日過期不出沙門身死容止者誅一門時恭宗為太子監國素敬佛道頻上表陳刑殺沙門之濫又非圖像之罪今罷其道杜諸寺門世不修奉土}
