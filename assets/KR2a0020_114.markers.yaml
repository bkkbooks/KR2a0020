  - {type: variant, offset: 3205, length: 246, content: 其餘災波及晉魏仍其兵革之禍二年九月土犯畢為疆埸之兵三年七月木犯土于參占曰戰敗亡地國君死四年十月月掩天關其災同上參外主巴蜀其後晉師伐蜀戮其主譙縱先是四年閏月月犯熒惑在昴七月又蝕之五年將軍奚斤討越勤大破之明年禿髮氏降于西秦其君檀戮死神瑞元年二月填入東井犯天尊旱祥也天象若曰土失其性水源將壅焉施于天尊所以福矜寡之萌也先是去年九月至于五月歲再犯軒轅大星八月庚寅至二年三月填再犯鬼積尸歲星主農事軒轅主雪霜風雨之神返覆由之所以告黃祇也土爰稼穡鬼為物之精氣是謂稼穡潛耗人將以饉而死焉一曰大旱是後京師比歲霜旱, WYG: 常餌松脂不食}
