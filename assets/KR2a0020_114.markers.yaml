  - {type: variant, offset: 2258, length: 0, content: '', WYG: 赦後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令充限其地賣還一如上式自今外州若欲造寺僧滿五十已上先令本州表列昭𤣥量審奏聽乃立若有違犯悉依前科州郡已下容而不禁罪同違㫖庶仰遵先皇不朽之業俯奉今㫖慈悲之令則繩墨可全聖道不墜矣奏可未幾天下䘮亂加以河陰之酷朝士死者其家多捨居宅以施僧尼京邑第舎略為寺矣前日禁令不復行焉元象元年秋詔曰梵境幽𤣥義歸清曠伽藍浄土理絶囂塵前朝城内先有禁斷自聿來遷鄴率由舊章而百辟士民届都之始城外新城並皆給宅舊城中暫時普借更擬後須非為永久如聞諸人多以二處得地或捨舊城所借之宅擅立為寺知非已有假此一名終恐因習滋甚有虧恒式宜付有司精加隠括且城中舊寺及宅並有定帳其新立之徒悉從毁廢冬又詔天下牧守令長悉不聽造寺若有違者不問財之所出并計所營功庸悉以枉法論興和二年春詔以鄴城舊宮為天平寺世宗以來至武定末沙門知名者有惠猛惠辨惠深僧暹道欽僧獻道晞僧深惠光惠顯法榮道長並見重於當世自魏有天下至於禪讓佛經流通大集中國凡有四百一十五部合一千九百一十九卷正光已後天下多虞工役尤甚於是所在編民相與入道假慕沙門實避調役猥濫之極自中國之有佛法未之有也略而計之僧尼大衆二百萬矣其寺三萬有餘流弊不歸一至於此識者所以歎息也道家之原出於老子其自言也先天地生以資萬類上處玉京為神王之宗下在紫㣲為飛仙之主千變萬化有徳不徳隨感應物厥迹無常授軒轅於峨嵋教帝嚳於牧徳大禹聞長生之訣尹喜受道徳之㫖至於丹書紫字昇𤣥飛步之經玉石}
