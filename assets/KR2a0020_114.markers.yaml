  - {type: variant, offset: 4304, length: 238, content: 年而宋篡之夫晉室雖微泰始之遺俗也蓋皇天有以原始篤終以哀王道之淪喪故猶著二微之戒焉神瑞二年四月木入南宮加右執法五月火又如之八月金入自掖門掩左執法泰常元年六月又由掖門入太微五月火犯執法是冬土守天尊而月掩之三年八月土又入太微犯執法因留二百餘日九月金又犯右執法十月火犯上將因留左掖門內二十日乃逆行四年三月出西蕃又還入之繞填星成句己四月丙午行端門出皆晉氏之謫也自晉滅之後太微有變多應魏國也泰常三年十月辛巳有大流星出昴歷天津乃分為三須臾有聲占曰車騎滿野非喪即會明年四月帝有事于東廟蕃服之君, WYG: 置立壇祠先朝}
