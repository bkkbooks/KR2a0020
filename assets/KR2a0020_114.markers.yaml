  - {type: variant, offset: 2357, length: 0, content: '', krp: 其為教也咸蠲去邪累澡雪心神積行樹功累徳増善乃至白日昇天長生世上所以秦皇漢武甘心不息靈帝置華蓋於灌龍設壇場而為禮及張陵受道於鵠鳴因傳天官章本千有二百弟子相授其事大行齋祠跪拜各成法道有三元九府百二十官一切諸神咸所統攝又稱刼數頗類佛經其延康龍漢赤明開皇之屬皆其名也及其刼終稱天地俱壊其書多有禁祕非其徒也不得輒觀至於化金銷玉行符勑水奇方妙術萬等千條上云羽化飛天次稱消災滅禍故好異者往往而尊事之初文帝入賔於晉從者務勿塵姿神奇偉登仙於伊闕之山寺識者咸云魏祚之將大}
  - {type: variant, offset: 2358, length: 0, content: '', WYG: 祖好老子之言誦詠不倦天興中儀曹郎董謐因獻服食仙經數十篇於是置仙人博士立仙坊煑鍊百藥封西山以供其薪蒸令死罪者試服之非其本心多死無驗太祖猶將修焉太醫周澹苦其煎採之役欲廢其事乃陰令妻貨仙人博士張曜妾得曜隠罪曜懼死因請辟穀太祖許之給曜資用為造浄堂於苑中給洒掃民二家而練藥之官仍為不息乆之太祖意少懈乃止世祖時道士宼謙之字輔眞南雍州刺}
