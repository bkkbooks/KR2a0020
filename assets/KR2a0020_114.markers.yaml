  - {type: variant, offset: 2366, length: 3, content: 禍更政, WYG: 勞今賜汝遷入内宮太眞太寶九州眞師治鬼師治民師繼天師四錄修勤不懈依勞復遷賜汝天中三眞太文錄劾召百神以授弟子文錄有五等一曰陰陽太官二曰正府眞官三曰正房眞官四曰宿宮散官五曰並進錄主壇位禮拜衣冠儀式各有差品凡六十餘卷號曰錄圖眞經付汝奉持轉佐北方泰平眞君出天宮静論之法能興造克就則起眞仙矣又地上生民末劫垂及其中行教甚難但令男女}
