  - {type: variant, offset: 364, length: 0, content: '', WYG: 下詔曰夫佛法之興其來遠矣濟益之功冥及存没神蹤遺軌信可依憑其勑有司於京城建飾容範修整宮舎令信向之徒有所居止是歲始作五級佛圖耆闍崛山及須彌山殿加以繢飾别構講堂禪堂及沙門座莫不巖具焉太宗踐位遵太祖之業亦好黄老又崇佛法京邑四方建立圖像仍令沙門敷導民俗初皇始中趙郡有沙門法果誡行精至開演法籍太祖聞其名詔以禮徴赴京師後以為道人統綰攝僧徒每與帝言多所惬允供施甚厚至太宗彌加崇敬永興中前後授以輔國宜城子忠信侯安成公之號皆固辭帝常親幸其居以門小狹不容輿輦更廣大之年}
  - {type: page-break, offset: 364, content: '', id: KR2a0020_WYG_114-8b, image: WYG0262/WYG0262-0797b.png}
  - {type: variant, offset: 364, length: 0, content: '', krp: 下詔曰夫佛法之興其來遠矣濟益之功冥及存没神蹤遺軌信可依憑其勑有司於京城建飾容範修整宮舎令信向之徒有所居止是歲始作五級佛圖耆闍崛山及須彌山殿加以繢飾别構講堂禪堂及沙門座莫不巖具焉太宗踐位遵太祖之業亦好黄老又崇佛法京邑四方建立圖像仍令沙門敷導民俗初皇始中趙郡有沙門法果誡行精至開演法籍太祖聞其名詔以禮徴赴京師後以為道人統綰攝僧徒每與帝言多所惬允供施甚厚至太宗彌加崇敬永興中前後授以輔國宜城子忠信侯安成公之號皆固辭帝常親幸其居以門小狹不容輿輦更廣大之年}
  - {type: variant, offset: 365, length: 0, content: '', WYG: 十餘泰常中卒未殯帝三臨其䘮追贈老夀將軍趙胡靈公初法果每言太祖明叡好道即是當今如来沙門宜應盡禮遂常致拜謂人曰能鴻道者人主也我非拜天子乃是禮佛耳法果四十始為沙門有子曰猛詔令襲果所加爵帝後幸廣宗有沙門曇澄年且百嵗邀見於路奉致果物帝敬其年老志力不衰亦加以老壽將軍號是時鳩摩羅什為姚興所敬於長安草堂寺集義學八百人重譯經本羅什聰辯有淵思逹東西方言時沙門道彤僧略道恒道􅀈僧肇曇影等與羅什共相提挈發明幽致諸深大經論十有餘部更定章句辭義通明至今沙門共所祖習道彤等皆識學洽通僧肇尤為其最羅什之撰譯僧肇常執筆定諸辭義注維摩經又著數論皆有妙㫖學者宗之又沙門法顯慨律藏不具自長安遊天竺歴三十餘國隨有經律之處學其書語譯而寫之十年乃於南海師子國隨商人汎舟東下晝夜昬迷將二百日乃至青州長廣郡不其勞山南下乃出海焉是嵗神瑞二年也法顯所逕諸國傳記之今行於世其所得律通譯未能盡正至江南更與天竺禪師䟦陁羅辯定之謂之僧祇律大備于前為今沙門所持受先是有沙門法領從揚州入西域得華嚴經本定律後數年䟦陁羅共沙門法業重加譯撰宣行於時世祖初即位亦遵太祖太宗之業每引髙徳沙門與共談論於四}
  - {type: page-break, offset: 365, content: '', id: KR2a0020_WYG_114-9a, image: WYG0262/WYG0262-0797c.png}
