  - {type: variant, offset: 2190, length: 2, content: 著云, WYG: 都維那僧暹僧頻等進違成㫖退乖内法肆意任情奏求逼召致使吁嗟之怨盈於行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之意深失陛下歸依之心遂令此等行號巷哭呌訴無所至乃白羽貫耳列訟宮闕悠悠之人尚為哀痛况慈悲之士而可安之請聽茍子等還鄉課輸儉乏之年周給貧寡若有不虞以擬邊捍其暹等違旨背律謬奏之愆請付昭𤣥依僧律推處詔曰暹等特可原之餘如奏世宗篤好佛理每年常於禁中親講經論廣集名僧標明義㫖沙門條錄為内起居焉上既崇之下彌企尚至延昌中天下州郡僧尼等積有一萬三千七百二十七所徒侣逾衆熙平元年詔遣沙門惠生使西域採諸經律正光三年冬還京師所得經論一百七十部行於世}
