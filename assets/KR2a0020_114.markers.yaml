  - {type: variant, offset: 16, length: 0, content: '', krp: 業清淨凡人修行粗為極云可以逹惡善報漸階聖迹初階聖者有三種人其根業太差謂之三乘聲聞乘緣覺乘大乘取其可乘運以至道為名此三人惡迹已盡但修心盪累濟物進徳初根人為小乗行四諦法中根人為中乘受十二因緣上根人為大乗則修六度雖階三乗而要由修進萬行拯度億流彌長遠乃可登佛境矣所謂佛者本號釋迦文者譯言能仁謂徳克道備堪濟萬物也釋迦前有六佛釋迦繼六佛而成道處今賢刧文言將来有彌勒佛方繼釋迦而降世釋迦即天竺迦維衞國王之子天竺其總稱迦維别名也初釋迦於四月八日夜從母右脅而生既生姿相超異者三十二種天降嘉瑞以應之亦三十二其本起經説之備矣釋迦生時當周荘王九年春秋魯荘公七年夏四月恒星不見夜明是也至魏武定八年凡一千二百三十七年云釋迦年三十成佛導化羣生四十九載乃於拘尸那城娑羅雙樹間以二月十五日而入般湼槃湼槃譯云滅度或言常樂我淨明無遷謝及諸苦累也諸佛法身有二種義一者眞實二者權應眞實身謂至極之體妙絶拘累不得以方處期不可以形量限有感斯應體常湛然權應身者謂和光六道同塵萬類生滅隨時修短應物形由感生體非實有權形雖謝眞體不遷但時無妙感故莫得常見耳明佛生非實生滅非實滅也佛既謝世香木焚尸靈骨分碎大小如粒擊之不壊焚亦不燋或有光明神驗胡言謂之舎利弟子收奉置之寶瓶竭香花致敬慕建宮宇謂為塔塔亦胡言猶宗廟也故世稱塔廟於後百年有王阿育以神力分佛舎利於諸鬼神造八萬四千塔布於世界皆同日而就今洛陽彭城姑臧臨渭皆有阿育王寺蓋承其遺迹焉釋迦雖般湼槃而留影迹爪齒於天竺於今猶在中土來往並稱見之初釋迦所説教法既湼槃後有聲聞弟子大迦葉阿難等五百人撰集著錄阿難親承囑授多聞總持蓋能綜覈深致無所漏失乃綴文字撰載三藏十二部經如九流之異統其大歸終以三乘為本後數百年有羅漢菩薩相繼著論贊明經義以破外道摩訶衍大小阿毗曇中論十二門論百法論成實論等是也皆傍諸藏部大義假立外問而以内法釋之漢章帝時楚王英喜為浮屠齋戒遣郎中令奉黄縑白紈三十匹詣國相以贖愆詔報曰楚王尚浮屠之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國桓帝時襄楷言佛陁黄老道以諫欲令好生惡殺少嗜慾去奢泰尚無為魏明帝曽欲壊宮西佛圖外國沙門乃金盤盛水置於殿前以佛舎利投之於水乃有五色光起於是帝歎曰自非靈異安得爾乎遂徙於道闕為作周閣百間佛圖故處鑿為濛汜池種芙蓉於中後有天竺沙門曇柯迦羅入洛宣譯誡律中國誡律之始也自洛中構白馬寺盛飾佛圖畫迹甚妙為四方式凡宮塔制度猶依天竺舊状而重構之從一級至三五七九世人相承謂之浮圖或云佛圖晉世洛中佛圖有四十二所矣漢世沙門皆衣赤布後乃易以雜色晉元康中有胡沙門支恭明譯佛經維摩法華三本起等微言隠義未之能究後有沙門常山衞道安性聰敏日誦經萬餘言研求幽㫖慨無師匠獨坐静室十二年覃思構精神悟妙賾以前所出經多有舛駮乃正其乖謬石勒時有天竺沙門浮圖澄少於烏萇國就羅漢入道劉曜時到襄國後為石勒所宗信號為大和尚軍國規謨頗訪之所言多驗道安曽至鄴候澄澄見而異之澄卒後中國紛亂道安乃率門徒南遊新野欲令𤣥宗在所流布分遣弟子各趣諸方法汰詣揚州法和入蜀道安與慧遠之襄陽道安後入苻堅堅素欽徳問既見宗以師禮時西域有胡沙門鳩摩羅什思通法門道安思與講釋每勸堅致羅什什亦承安令問謂之東方聖人或時遥拜致敬道安卒後二十餘載而羅什至長安恨不及安以為深慨道安所正經義與羅什譯出符㑹如一初無乖舛於是法㫖大著中原魏先建國於𤣥朔風俗淳一無為以自守與西域殊絶莫能往來故浮圖之教未之得聞或聞而未信也及神元與魏晉通聘文帝又在洛陽昭成又至襄國乃備究南夏佛法之事}
