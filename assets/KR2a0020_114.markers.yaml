  - {type: variant, offset: 3825, length: 347, content: 月月三犯畢再入之再犯畢陽星占曰邊兵起貴人有死者元年十二月蠕蠕犯塞上自將大破之二年上黨胡反詔五將討平之泰常元年長樂河間南陽王皆薨二年豫章王又薨常山霍季聚衆反伏誅二年四月辛巳有星孛于天市五月甲申彗星出天市掃帝座在房心北市所以建國均人心宋分也國且殊號人將更主其革而為宋乎先是往歲七月月犯鈎鈐十一月月食房上相至元年二月又如之天象若曰尚尸鈐鍵之位君憑而尊之者又將及矣是歲八月金木合于翼占曰且有內兵楚邦受之至泰常二年正月晉荊州刺史司馬休之雍州刺史魯宗之為劉裕所襲皆出奔走是歲十月鎮星守太微七十餘日占曰易代立王其三年三月癸丑太白犯五諸侯如桓氏之占七月有流星孛于少微以入太微自劉氏之霸三變少微以加南宮矣始以方伯專之中則霸形干之又今孛政除之馴而三積堅冰至焉是月辰星見東方在翼甚明大翼楚邦也是為冢臣干明賊人其昌先是, WYG: ''}
