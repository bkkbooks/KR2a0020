  - {type: variant, offset: 2857, length: 334, content: 右歲星所以阜農事安萬人也占曰月仍犯之邊萌阻兵而荐饑是歲六月癸巳金木合于東井七月甲申金犯土于井占曰其國內兵有白衣之會十一月土犯井十二月癸卯土犯鉞土主疆理之政存亡之機也是為土地分裂有戮死之君徵在秦邦至五年二月丙午火土皆犯井占曰國有兵喪之禍主出走是月壬辰歲鎮熒惑太白聚于井將以建霸國之命也其地君子憂小人流又自三年四月至五年三月熒惑三干鬼主命者將夭而國徙焉是時雍州假王霸之號者六國而赫連氏據朔方之地尤為強暴荐食關中秦人奔命者殆路間歲姚興薨而難作于內明年劉裕以晉師伐之秦師連戰敗績執姚泓以歸戕諸建康既而遺守內攜長安淪覆焉或曰自上黨並河山之北皆鬼星參畢之郊也五年四月上黨羣盜外叛六月濩澤人劉逸自稱三巴王七月河西胡曹龍入蒲子號大單于十月將軍劉潔魏勤擊吐京叛胡失利勤力戰死潔為所虜明年, WYG: 官終辭不受扶風魯祈遭}
