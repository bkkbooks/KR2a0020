  - {type: variant, offset: 674, length: 475, content: 殷徐州之次桓玄國焉劉裕興焉天象若曰君德之不建人之無援且有權其列蕃盜其名器之守而荐食之者矣又將由其天步席其帝庭而出號施令焉至四年二月甲寅有大流星衆多西行歷牛虛危絕漢津貫太微紫微虛危主靜人牽牛主農政皆負海之陽國也天象若曰黎元喪其所食失其所係命卒至流亡矣上不能恤又將播遷以從之其後晉人有孫恩之難而桓玄踵之三吳連兵荐饑西奔死亡者萬計竟篡晉主而流之尋陽既又劫之以奔江陵是歲三月甲子月生齒占曰有賊臣七月丁卯月犯天關關所以制畿封國也月犯之是為兵起于郊甸十月甲子月又犯東蕃上相占同二年既而桓玄戡金陵殺司馬元顯太傅道子是歲秀容胡帥亦聚衆反伏誅五年四月辛丑月掩辰星在東井月為陰國之兵辰象戰鬬占曰所直野軍大起戰不勝亡地家臣死冬十月帝伐秦師于蒙坑大敗之遂舉乾壁關中大震其上將姚平赴水死是月戊申月暈左角太史令晁崇奏角蟲將死上慮牛疫乃命諸將併重焚車丙戌車駕北引牛大疫死者十有八九官車所御巨犗數百同日斃於路側首尾相屬麋鹿亦多死者五年三月戊子太白犯五諸侯晝見經天九月己未又犯進賢太白為強侯之誡犯五諸侯所以興霸形也是時桓玄擅征伐之柄專殺諸侯以弱其本朝卒以干君之明而代奪之故皇天著誡焉若, WYG: 詔}
