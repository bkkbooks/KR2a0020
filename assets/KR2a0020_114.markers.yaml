  - {type: variant, offset: 5, length: 0, content: '', WYG: 一十四齊魏收撰志第二十釋老十大人有作司牧生民結繩以往書契所絶故靡得而知焉自羲軒已還至於三代其神言秘策蘊圖緯之文範世率民垂墳典之迹秦肆其毒滅於灰燼漢採遺籍復若丘山司馬遷區别異同有陰陽儒墨名法道徳六家之義劉歆著七略班固志藝文釋氏之學所未曽紀案漢武元狩中遣霍去病討匈奴至臯蘭過居延斬首大獲昆邪王殺休屠王將其衆}
  - {type: page-break, offset: 5, content: '', id: KR2a0020_WYG_114-1b, image: WYG0262/WYG0262-0793d.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 一十四齊魏收撰志第二十釋老十大人有作司牧生民結繩以往書契所絶故靡得而知焉自羲軒已還至於三代其神言秘策蘊圖緯之文範世率民垂墳典之迹秦肆其毒滅於灰燼漢採遺籍復若丘山司馬遷區别異同有陰陽儒墨名法道徳六家之義劉歆著七略班固志藝文釋氏之學所未曽紀案漢武元狩中遣霍去病討匈奴至臯蘭過居延斬首大獲昆邪王殺休屠王將其衆}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 萬來降獲其金人帝以為大神列於甘泉宮金人率長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元夀元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中土聞之未之信了也後孝明帝夜夢金人頂有白光飛行殿庭乃訪羣臣傅毅始以佛對帝遣郎中蔡愔博士弟子秦景等使於天竺寫浮屠遺範愔仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門及跪拜之法自此始也愔又得佛經四十二章及釋迦立像明帝令畫工圖佛像置清涼臺及顯節陵上經緘於蘭臺石室愔之還也以白馬負經而至漢因立白馬寺於洛城雍闗西摩騰法蘭咸卒於此寺浮屠正號曰佛陁佛陁與浮圖聲相近皆西方言其來轉為二音華言譯之則謂浮覺言滅穢成明道為聖悟凡其經㫖大抵言生生之類皆因行業而起有過去當今未來歴三世識神常不滅凡為善惡必有報應漸積勝業陶冶麤鄙經無數形藻練神明乃致無生而得佛道其閒階次心行等級非一皆緣淺以至深藉㣲而為著率在於積仁順蠲嗜慾習虚靜而成通照也故其始修心則依佛法僧謂}
