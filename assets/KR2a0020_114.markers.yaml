  - {type: variant, offset: 2168, length: 2, content: 歸戕, WYG: 聞當加敘接先是立監福曹又改為昭𤣥備有官屬以斷僧務髙祖時沙門道順惠覺僧意惠紀僧範道弁惠度智誕僧顯僧義僧利並以義行知重世宗即位永平元年秋詔曰緇素既殊法律亦異故道教彰於互顯禁勸各有所宜自今已後衆僧犯殺人已上罪者仍依俗斷餘犯悉付昭𤣥以内律僧制之二年冬沙門統惠深上言僧尼浩曠清濁混流不遵禁典精麤莫别輒與經律法師羣議立制}
