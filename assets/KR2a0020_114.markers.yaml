  - {type: variant, offset: 2186, length: 1, content: 形, WYG: 人不應犯法積八不浄物然經律所制通塞有方依律車牛淫人不浄之物不得為己私畜唯有老病年六十以上者限聽一乘又比来僧尼或因三寶出貸私財緣州外又出家捨著本無凶儀不應廢道從俗其父母三師遠聞凶問聽哭三日若在見前限以七日或有不安寺舎遊止民間亂道生過皆}
  - {type: page-break, offset: 2186, content: '', id: KR2a0020_WYG_114-22a, image: WYG0262/WYG0262-0804a.png}
  - {type: variant, offset: 2186, length: 1, content: 形, krp: 人不應犯法積八不浄物然經律所制通塞有方依律車牛淫人不浄之物不得為己私畜唯有老病年六十以上者限聽一乘又比来僧尼或因三寶出貸私財緣州外又出家捨著本無凶儀不應廢道從俗其父母三師遠聞凶問聽哭三日若在見前限以七日或有不安寺舎遊止民間亂道生過皆}
  - {type: variant, offset: 2189, length: 0, content: '', WYG: 等若有犯者脱服還民其有造寺者限僧五十以上啟聞聽造若有輒營置者處以違勅之罪其僧寺僧衆擯出外州僧尼之法不得為俗人所用若有犯者還配本屬其外國僧尼來歸化者求精檢有徳行合三藏者聽住若無徳行遣還本國若其不去依此僧制治罪詔從之先是於恒農荆山造珉玉丈六像一三年冬迎置於洛濵之報徳寺世宗躬觀致敬四年夏詔曰僧祇之粟本期濟施儉年出貸豐則收入山林僧尼隨以給施民有窘敝亦即賑之但主司冒利規取贏息及其徴責不計水旱或償利過本或翻改券契侵蠧貧下莫知紀極細民嗟毒歲月滋深非所以矜此窮乏宗尚慈拯之本意也自今已後不得傳委維那都尉可令刺史共加監括尚書檢諸有僧祇穀之處州别列其元數出入贏息賑給多少并貸償歲月見在未收上臺錄記若收利過本及翻改初券依律免之勿復徵責或有私債轉施償僧即以丐民不聽收檢後有出貸先盡貧窮徴債之科一凖舊格富有之家不聽輒貸脱仍冒濫依法治罪又尚書令髙肇奏言謹案故沙門統曇曜昔於承明元年奏涼州軍户趙茍子等二百家為僧祇户立課積粟擬濟饑年不限道俗皆以拯施又依内律僧祇户不得别屬一寺}
  - {type: page-break, offset: 2189, content: '', id: KR2a0020_WYG_114-22b, image: WYG0262/WYG0262-0804b.png}
  - {type: page-break, offset: 2189, content: '', id: KR2a0020_WYG_114-23a, image: WYG0262/WYG0262-0804c.png}
