  - {type: variant, offset: 4598, length: 1331, content: 姚氏薨是為昭哀皇后六月貴嬪杜氏薨是為密后先是二年九月火犯軒轅三年八月金又犯之占同也四年自正月至秋七月月行四犯太微天象若曰太微粹陽之天庭月者臣也今橫行之不已甚乎先是元年五月月犯歲星在角是歲七月月又犯歲星明年宋始建國後年而晉主殂裕鴆之也昔桓氏之難月再干歲星再劫其主至是亦再犯之而再勦其君極其幽逼之患而濟以篡殺之禍斯謂之甚矣先是三年九月月犯火于鶉尾十二月又犯火于太微是歲五月月犯太白在井十月又犯之在斗且再犯井星皆有兵水大喪諸侯有死者七月雁門河內大水五年三月南陽王意文死十一月西涼李歆為沮渠所滅晉君亦殂秦吳亡之應五年十一月乙卯熒惑犯填星在角角外朝也土為紀綱火主內亂會于天門王綱將紊焉占曰有死君逐主后妃憂之十二月月蝕熒惑在亢亢內庭也占曰君薨而亂作于內貴臣以兵死是月客星見于翼翼楚邦也占曰國更服邊有急將軍或謀反者六年二月月食南斗杓星十月乙酉金土鬬于亢占曰內兵且喪更立王公又兗州陳鄭之墟也有攻城野戰之象焉至七年正月犯南斗三月壬戌又犯之斗為人君受命又吳分是歲五月宋武殂秋九月魏師侵宋北鄙十一月攻滑臺克之明年拔虎牢陷金墉屠許昌遂啟河南之地八年宋太后蕭氏死既大臣專權遷殺其主卒皆伏誅自五年八月至七年十二月熒惑一守軒轅再犯進賢再犯房星月一犯軒轅及房皆女君大臣之戒是時陽平河南王太尉穆觀相次薨而宋氏廷臣乘釁以侮其主竟以誅死云或曰火犯土亢為饑疾時官軍陷武牢會軍大疫死者十二三是冬詔稟饑人六年六月壬午有大流星出紫宮占曰上且行幸若有大君之使明年駕幸橋山祠黃帝東過幽州命使者觀省風俗十月上南征八年春步自鄴宮遂絕靈昌至東郡觀兵成臯反自河內登太行山幸高都飲至晉陽焉七年二月辛巳有星孛于虛危向河津占曰玄枵所以飾喪紀也宗廟並起司人疑更謀有易政之象十一月甲寅彗星出室掃北斗及于門占曰內宮幾室主命將易塞垣有土功之事其地又齊衞也八年正月彗星出奎南長三丈東南掃河奎為荐食之兵徐方之地占曰西北之兵伐之君絕嗣天下饑七年十二月帝命壽光侯叔孫建徇定齊地八年春築長城距五原二千餘里置守卒以備蠕蠕冬十月大饑十一月己巳上崩于西宮明年宋廢其主由是南邦日蹙齊衞之地盡為兵衝及世祖即政遂荒淮沂以負東海云八年二月丙寅火守斗亦南邦之謫也十一月彗星孛于土司空司空主疆理邦域且曰有土功哭泣事後年赫連屈孑薨太武征之取新秦之地由是征伐四克提封萬里云世祖始光元年正月壬午月犯心大星心為宋分中星者君也月為大臣主刑事是歲五月宋權臣徐羨之謝晦傅亮放殺其主而立其弟宜都王是為宋文帝至十月火犯心天戒若曰是復作亂以干其君矣十月壬寅大流星出天將軍西南行殷殷有聲占曰有禁暴之兵上將督戰以所首名之三年正月歲星食月在張張南國之分歲之於月少君之象今反食之且誅強大之臣是月羨之等戮死謝晦興江陵之甲以伐其君宋將檀道濟帥師禦之晦又奔潰伏誅或曰是歲上伐赫連氏入其郛夏都直代西南亦奔星應也二年五月太白晝見經天占曰時謂亂紀革人更王六月己丑火入羽林守六十餘日占曰禁兵大起且有反臣之戒三年十月有流星出西南而東北行光明燭地有聲如雷鳥獸盡駭占曰所發之野有破國遷君西南直夏而首于代都焉著而有聲盛怒也四年五月辛酉金水合于西方占曰兵起大戰先是三年正月宋人有謝氏之難王卒盡出冬十一月上伐赫連昌入其郛徙萬餘家以歸是歲復攻之六月大敗昌于城下昌奔上邽遂拔統萬盡收夏器用虜其母弟妻子由是威加四隣北夷讋焉, WYG: ''}
