  - {type: variant, offset: 2361, length: 0, content: '', WYG: 吾此經誡自天地開闢以來不傳於世今運數應出汝宣吾新科清整道教除去三張偽法租米錢税及男女合氣之術大道清虚豈有斯事專以禮度為首而加之以服食閉練使王九疑人長客之等十二人授謙之服氣導引口訣之法遂得辟穀氣盛體輕顔色殊麗弟子十餘人皆得其術泰常八年十月戊戍有牧土上師李譜文來臨嵩岳云老君之𤣥孫昔居代郡桑乾以漢武之世得道為牧土宮主領治三十六土人鬼之政地方十八萬里有奇蓋歴術一章之數也其中為方萬里者有三百六十萬遣弟子宣教云嵩岳所統廣漢平土方萬里以授謙之作誥曰吾處天宮敷演眞法處汝道年二十二嵗除十年為竟蒙其餘十二年教化雖無大功}
