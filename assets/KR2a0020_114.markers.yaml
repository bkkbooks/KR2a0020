  - {type: variant, offset: 2253, length: 4, content: 水左翼八, krp: 禁故世宗仰修先志爰發明㫖城内不造立浮圖僧尼寺舎亦欲絶其希覬文武二帝豈不愛尚佛法蓋以道俗殊歸理無相亂故也但俗眩虚聲僧貪厚潤雖有顯禁猶自冒營至正始三年沙門統惠深有違景明之禁便云營就之寺不忍移毁求自今已後更不聽立先㫖含寛抑典從請前班之詔仍卷不行後來私謁彌以奔競永平二年深等復立條制啓云自今已後欲造寺者限僧五十已上聞徹聽造若有輒營置者依俗違勑之罪其寺僧衆擯出外州邇來十年私營轉盛罪擯之事寂爾無聞豈非朝格雖明恃福共毁僧制徒立顧利莫從者也不俗不道務為損法人而無厭其可極乎夫學迹沖妙非浮識所辯𤣥門曠寂豈短辭能究然浄居塵外道家所先功緣㝠深匪尚華遁苟能誠信童子聚沙可邁於道場純陁儉設足薦於雙樹何必縱其盗竊資營寺觀此乃民之多幸非國之福也然比日私造動盈百數或乗請公地輒樹私福或啓得造寺限外廣制如此欺罔非可稍計臣以才劣誠忝工務奉遵成規裁量是總所以披尋舊㫖研究圖格輒遣府司馬陸昶屬崔孝芬都城之中及郭邑之内檢括寺舎數乘五百空地表刹未立塔宇不在其數民不畏法乃至於斯自遷都已來年踰二紀寺奪民居三分且一髙祖立制非徒欲使緇素殊途抑亦防㣲深慮世宗述之亦不錮禁營福當在杜塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連簷接響像塔纒於腥臊性靈没於嗜慾眞偽混居往來紛雜下司因習而莫非僧曹對制而不問其於汙染眞行塵穢練僧薰蕕同器不亦甚歟往在北代有法秀之謀近日冀州遭大乗之變皆初假神教以惑衆心終設姦誑用逞私悖太和之制因法秀而杜遠景明之禁慮大乘之將亂始知祖宗叡聖防遏處深履霜堅冰不可不慎昔如來闡教多依山林今此僧徒戀著城邑豈湫隘是經行所宜浮諠必栖禪之宅當由利引其心莫能自止處者既失其眞造者或損其福乃釋氏之糟糠法中之社鼠内戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有栖心眞趣道業清遠者或外假法服内懐悖徳者如此之徒宜辯涇渭若雷同一貫何以勸善然覩法贊善凡人所知矯俗避嫌物情同趣臣獨何為孤議獨發誠以國典一廢追理至難法網暫失條綱將亂是以冒陳愚見兩願其益臣聞設令在於必行立罰貴能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而違犯不息者豈不以假福託善幸罪不加人殉其私吏難茍劾前制無追往之辜後旨開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁糾其來違懲其往失脱不峻檢方垂容借恐今㫖雖明復如往日又㫖令所斷標榜禮拜之處悉聽不禁愚以為樹榜無常禮處難驗欲云有造立榜證公須營之辭指言嘗禮如此則徒有禁名實通造路且徙御已後斷詔四行而私造之徒不懼制㫖豈是百官有司怠於奉法將由網漏禁寛容託有他故耳如臣愚意都城之中雖有標榜營造麤功事可改立者請依先制在於郭外任擇所便其地若買得券證分明者聽其轉之若官地盗作即令還官若靈像既成不可移撤請依今勑如舊不禁悉令坊内行止不聽毁坊開門以妨里内通巷若被㫖者不在斷限郭内凖此商量其廟像嚴立而逼近屠沽請斷旁屠殺以潔靈居雖有僧數而事在可移者令就閑敞以避隘陋如今年正}
