  - {type: variant, offset: 2385, length: 1, content: 感, WYG: 受其法術於是上疏讃明其事曰臣聞聖王受命則有天應而河圖洛書皆寄言於蟲獸之文未若今日人神接對手筆燦然辭㫖深妙自古無比昔漢髙雖復英聖四皓猶或耻之不為屈節今清徳隠仙不召自至斯誠陛下侔蹤軒黄應天之符也豈可以世俗常談而忽上靈之命臣竊懼之世祖欣然乃使謁者奉玉帛牲牢祭嵩岳迎致其餘弟子在山中者於是崇奉天師顯揚新法宣布天下道業}
