  - {type: variant, offset: 2251, length: 1, content: 火, WYG: 已前用功八十萬二千三百六十六肅宗熙平中於城内太社西起永寧寺靈太后親率百寮表基立刹佛圖九層髙四十餘丈其諸費用不可勝計景明寺佛圖亦其亞也至於官私寺塔其數甚衆神龜元年冬司空公尚書令任城王澄奏曰仰惟髙祖定鼎嵩瀍卜世悠遠慮括終始制洽天人造物開符垂之萬葉故都城制云城内唯擬一永寧寺地郭内唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢踰矩逮景明之初㣲有}
