  - {type: variant, offset: 1676, length: 226, content: 興六年冬十月至元年四月月再掩軒轅占曰有亂易政后妃執其咎三年五月壬寅熒惑犯氐氐宿宮也天戒若曰是時蠱惑人主而興內亂之萌矣亦自我天視而修省焉及六年七月宣穆后以強死太子微行人間既而有清河萬人之難二年八月火犯斗丁亥又犯建斗為大人之事建為經綸之始此天所以建創業君時劉裕且傾晉祚而清河之釁方作矣帝猶不悟至是歲九月火犯哭星其象若曰將以內亂至于哭泣之事焉由是言之皇天所以訓劫殺之主熟矣而罕能敦復以自悟悲夫二年八月甲子熒惑犯少微庚寅犯右執法癸卯犯左執法十一月丙戌太白掩釣鈐, WYG: 下}
