  - {type: variant, offset: 14, length: 1, content: 第, WYG: 畏也又有五戒去殺盗媱妄言飲酒大意與仁義禮智信同名為異耳云奉持之則生天人勝處虧犯則墜鬼畜諸苦又善惡生處凡有六道焉諸服其道者則剃落鬚髮釋累辭家結師資遵律度相與和居治心修淨行乞以自給謂之沙門或曰桑門亦聲相近總謂之僧皆胡言也僧譯為和命衆桑門為息心比丘為行乞俗人之信憑道法者男曰優婆塞女曰優婆夷其為沙門者初修十誡曰沙彌而終於二百五十則具足成大僧婦入道者曰比丘尼其誠至於五百皆以闕為本隨事増數在於防心攝身正口心去貪忿癡身除殺媱盗口斷妄雜諸非正言總謂之十善道能具此謂之}
