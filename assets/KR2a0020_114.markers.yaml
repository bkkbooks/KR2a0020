  - {type: variant, offset: 13778, length: 230, content: 吳中比歲霖雨傷稼也十二年三月甲申歲星逆行入氐甲申皆齊分也占曰諸侯王而升為天子者逆行者其事逆也先是去年十月歲辰太白合于氐是謂驚立絕行改立王公是歲四月月犯氐與歲同舍六月丁巳月又入氐犯歲星月為強大之臣歲為少君也與歲同心內宮而干犯之強宗擅命逼奪其君之象也再干之其事荐至十三年三月庚申月犯歲十五年六月又犯之歲星不在宿宮是為強侯之譴江南太子賢王相次薨歿既而齊武帝殂太孫幼沖西昌輔政竟殺二君而篡之月再犯于氐及逆行之效也或曰月犯木饑祥也時比歲稼穡不登又十二年正月戊戌月犯左角十, WYG: 禮接焉魏書卷}
