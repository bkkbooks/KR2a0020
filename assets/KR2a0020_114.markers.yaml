  - {type: variant, offset: 561, length: 0, content: '', WYG: 十尺次六十尺彫飾奇偉冠於一世曇曜奏平齊户及諸民有能歲輸穀六十斛入僧曹者即為僧祇户粟為僧祇粟至於儉歲賑給飢民又請民犯重罪及官奴以為佛圖户以供諸寺掃洒歲兼營田輸粟髙宗並許之於是僧祇户粟及寺户徧於州鎮矣曇曜又與天竺沙門常那邪舎等譯出新經十四部又有沙門道進僧超法存等並有名於時演唱諸異顯祖即位敦信尤深覽諸經論好老莊毎引諸沙門及能談𤣥之士與論理要初髙宗太安末劉駿於丹陽中興寺設齋有一沙門容止獨秀舉衆往目皆莫識焉沙門惠璩起問之答名惠明又問所往答云從天安寺來語訖忽然不見駿君臣以為靈感改中興為天安寺是後七年而帝踐阼號天安元年是年劉彧徐州刺史薛安都始以城地來降明年盡有淮北之地其歲髙祖誕載於時起永寧寺構七級佛圖髙三百餘尺基架博敞為天下第一又於天宮寺造釋迦立像髙四十三尺用赤金十萬斤黄金六百斤皇興中又構三級石佛圖榱棟楣楹上下重結大小皆石髙十丈鎮固巧密為京華壯觀髙祖踐位顯祖移御北苑崇光宮覽習𤣥籍建鹿野佛圖於苑中之西山去崇光右十里巖房禪堂禪僧居其中焉延興二年夏四}
