  - {type: variant, offset: 164, length: 196, content: 當有真人起於燕代之間大兵鏘鏘其鋒不可當冬十一月黃星又見天下莫敵是歲六月木犯哭星木人君也君有哭泣之事是月太后賀氏崩至秋晉帝殂二年六月庚戌月奄金于端門之外戰祥也變及南宮是謂朝庭有兵時燕王慕容寶已走和龍秋九月其弟賀麟復糾合三萬衆寇新市上自擊之大敗燕師于義臺悉定河北而晉桓玄等連衡內侮其朝庭日夕戒嚴是歲正月火犯哭星占有死喪哭泣事秋八月又守井鉞占曰大臣誅十月襄城王題薨明年正月右軍將軍尹國於冀州謀反被誅, WYG: 朗公谷焉}
