  - {type: variant, offset: 2838, length: 2, content: 參四, WYG: 汝曹可求遷錄吾去之後天宮眞難就復遇設㑹之日更布二席於上師坐前弟子問其故謙之曰仙官來是夜卒前一日忽言吾氣息不接腹中大痛而行止如常至明旦便終須臾口中氣状若烟雲上出窻中至天半乃消屍體引長弟子量之八尺三寸三日已後稍縮至歛量之長六寸於是諸弟子以為尸解變化而去不死也時有京兆人韋文秀隠於嵩髙徴詣京師世祖曽問方士金丹事多曰可成文秀對曰神道幽昧變化難測可以闇遇難以豫期臣昔者受教於先師曽聞其事未之為也世祖以文秀闗右豪族風操溫雅言對有方遣與尚書崔頤詣王屋山合丹竟不能就時方士至者前後數人河東祁纖好相人世祖賢之拜纖上大夫潁陽絳略聞喜呉劭道引養氣積}
