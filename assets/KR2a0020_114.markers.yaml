  - {type: variant, offset: 2357, length: 0, content: '', WYG: 其為教也咸蠲去邪累澡雪心神積行樹功累徳増善乃至白日昇天長生世上所以秦皇漢武甘心不息靈帝置華蓋於灌龍設壇場而為禮及張陵受道於鵠鳴因傳天官章本千有二百弟子相授其事大行齋祠跪拜各成法道有三元九府百二十官一切諸神咸所統攝又稱刼數頗類佛經其延康龍漢赤明開皇之屬皆其名也及其刼終稱天地俱壊其書多有禁祕非其徒也不得輒觀至於化金銷玉行符勑水奇方妙術萬等千條上云羽化飛天次稱消災滅禍故好異者往往而尊事之初文帝入賔於晉從者務勿塵姿神奇偉登仙於伊闕之山寺識者咸云魏祚之將大}
