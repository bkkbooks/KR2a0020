  - {type: variant, offset: 2371, length: 1, content: 語, WYG: 功及上世其中能修身練藥學長生之術即為眞君種民藥别授方銷練金丹雲英八石玉漿之法皆有決要上師李君手筆有數篇其餘皆正眞書曹趙道覆所書古文鳥迹篆隸雜體辭義約辯婉而成章大自與世禮相凖擇賢推徳信者為先勤者次之又言二儀之間有三十六天中有三十宮宮有一主最髙者無極至尊次曰大至眞尊次天覆地載陰陽眞尊次洪正眞尊姓趙名道隠以殷時得道牧土之師也牧土之來赤松王喬之倫及韓終張安世劉根張陵近世仙者並為翼從牧土命謙之為子與羣仙結為徒友幽㝠之事世所不了謙之具問一一告焉經云佛者昔於西胡得道}
