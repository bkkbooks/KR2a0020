  - {type: variant, offset: 559, length: 0, content: '', krp: 也恭宗言雖不用然猶緩宣詔書遠近皆豫聞知得各為計四方沙門多亡匿獲免在京邑者亦蒙全濟金銀寶像及諸經論大得秘藏而土木宮塔聲教所及莫不畢毁矣始謙之與浩同從車駕苦與浩諍浩不肯謂浩曰卿今促年受戮滅門户矣後四年浩誅備五刑時年七十浩既誅死帝頗悔之業已行難中修復恭宗潛欲興之未敢言也佛淪廢終帝世積七八年然禁稍寛㢮篤信之家得密奉事沙門專}
  - {type: variant, offset: 560, length: 0, content: '', WYG: 者猶竊法服誦習焉唯不得顯行於京都矣先是沙門曇曜有操尚又為恭宗所知禮佛法之滅沙門多以餘能自效還俗求見曜誓欲守死恭宗親加勸喻至於再三不得已乃止密持法服器物不暫離身聞者歎重之髙宗踐極下詔曰夫為帝王者必袛奉明靈顯彰仁道其能惠著生民濟益羣品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族況釋迦如来功濟大千惠流塵境等生死者歎其逹觀覽文義者貴其妙明助王政之禁律益仁智之善性排斥羣邪開演正覺故前代已來莫不崇尚亦我國家常所尊事也世祖太武皇帝開廣邊荒徳澤遐及沙門道士善行純誠惠始之倫無遠不至風義相感往往如林夫山海之深怪物多有姦淫之徒得容假託講寺之中致有兇黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然値軍國多事未遑修復朕承洪緒君臨萬邦思述先志以隆斯道今制諸州郡縣於衆居之所各聽建佛圖一區任其財用不制㑹限其好樂道法欲為沙門不問長幼出於良家性行素篤無諸嫌穢鄉里所明者聽其出家率大州五十小州四十人其郡遙遠臺者十人各當局分皆足以化惡就善播揚道教也天下承風朝不及夕往時所毁圖寺仍還修矣佛像經論皆復得顯京師沙門師賢本罽賔國王種人少入道東遊涼城涼平赴京罷佛法時師賢假為醫術還俗而守道不改於修復日即反沙門其同輩五人帝乃親為下髪師賢仍為道人統是年詔有司為石像令如帝身既成顔上足下各有黑石㝠同帝體上下黒子論者以為純誠所感興光元年秋勑有司於五縀大寺内為太祖已下五帝鑄釋迦立像五各長一丈六尺都用赤金二萬五千斤太安初有師子國胡沙門邪奢遺多浮陁難提等五人奉佛像三到京都皆云備歴西域諸國見佛影迹及肉髻外國諸王相承咸遣工匠摹寫其容莫能及難提所造者去十餘步視之炳然轉近轉㣲又沙勒湖沙門赴京師致佛鉢并畫像迹和平初師賢卒曇曜代之更名沙門統初曇曜以復佛法之明年自中山被命赴京值帝出見于路御馬前銜曜衣時以為馬識善人帝後奉以師禮曇曜白帝於京城西武州塞鑿山石壁開窟五所鐫建佛像各一髙者}
