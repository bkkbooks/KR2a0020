  - {type: variant, offset: 5930, length: 7550, content: 元年五月癸未太白犯天街占曰六夷髦頭滅二年五月太白晝見占曰大兵且興強國有弱者是月上北征蠕蠕大破之虜獲以鉅萬計遂降高車以實漠南闢地數千里云三年六月火犯井鬼入軒轅占曰秦憂兵亂有死君又旱饑之應丙子有大流星出危南入羽林占曰兵起負海國與王師合戰是歲自三月至十月太白再犯歲星月又犯之占曰有國之君或罹兵刑之難者且歲饉十二月丙戌流星首如甕長二十餘丈大如數十斛船色正赤光燭人面自天船及河抵奎大星及于壁占曰天船以濟兵車奎為徐方東壁衞也是為宋師之祥昭盛者事大也是歲六月宋將到彥之等侵魏自南鄙清水入河泝流而西列屯二千餘里九月帝用崔浩策行幸統萬遂擊赫連定於平涼十二月克之悉定三秦地明年大師涉河攻滑臺屠之宋人宵遁是時赫連定轉攻西秦戮其君乞伏慕末吐谷渾慕容璝又襲擊定虜之以強死者再君焉是歲二月定州大饉詔開倉賑乏或曰奎星羽獵理兵象也流星抵之而著大是為大人之事冬十月上大閱于漠南甲騎五十萬旌旗二千餘里又明盛之徵四年金火入東井火又犯天戶明年正月又犯鬼占曰秦有兵喪而至秦夏出夷威沮渠蒙遜又死氐主楊難當陷宋之漢中地云四年三月有大流星東南行光燭地長六七丈食頃乃滅後有聲占曰大兵從之是時諸將方逐宋師至歷城不及有聲駿奔之象也四月辛未太白晝見于胃胃為趙分五月太白犯天關十月丙辰月又掩之天關外主勃碣山河之險窮焉占曰兵革起九月丙寅有流星大如斗赤色發太微至北斗而滅太微禮樂之庭且有昭德之舉而述宣王命是以帝車受之是月壬申有詔徵范陽盧玄等三十六人郡國察秀孝數百人且命以禮宣喻申其出處之節明年六月上伐北燕舉燕十餘郡進圍和龍徙豪傑三萬餘家以歸四年八月金入太微亦君自將兵象明年正月庚午火入鬼占曰秦有死君四月己丑太白晝見為不臣其後秦王赫連昌叛走伏誅之應也延和元年七月有大流星出參左肩東北入河乃滅參主兵政晉魏墟也山河所首推之大兵將發于魏以加燕國八月癸未太白犯心前星乙酉又犯心明堂占曰有亡國近期二年十二月有流星大如甕尾長二十餘丈奔君之象比歲連兵東討至太延二年三月燕後主馮文通去國奔高麗元年四月月犯左角五月月掩斗七月月食左角皆占曰兵大起其後征西將軍金崖安定鎮將延普涇州刺史狄子玉爭權崖及子玉舉兵攻普不克據胡空谷反平西將軍陸俟討獲之三年三月丙辰金晝見在參魏邦戒也閏月戊寅金犯五諸侯占曰四滑起官兵起亂疑己丑月入井犯太白占曰兵起合戰秦邦受之七月上幸隰城詔諸軍討山胡白龍入西河九月克之伏誅者數千人而宋大將軍彭城王義康方擅威福後竟幽廢是歲二月庚午月犯畢口而出因暈昴及五車占曰貴人死五月甲子陰平王求薨太延元年五月月犯右執法九月火犯太微上將又犯左執法十月丙午月犯右執法二年二月月犯東蕃上相三月月及太白俱犯右執法及上相三年八月火犯左執法及上將五年二月木逆行犯執法皆大臣謫也元年十月左僕射安原謀反誅三年正月征東大將軍中山王纂太尉北平王長孫嵩鎮南大將軍丹陽王叔孫建皆薨其後宋大將軍義康坐徙豫章誅其黨與僕射殷景仁亦尋卒焉元年五月彗出軒轅二年正月月犯火月后妃也三年七月木犯軒轅至五年七月月掩填星並女主謫也真君元年太后竇氏殂宋氏皇后亦終或曰彗出軒轅女主有為寇者其後沮渠氏失國實公主潛啟魏師二年五月壬申有星孛于房占曰名山崩有亡國八月丁亥木入鬼守積尸十一月辛亥又犯鬼鬼秦分天戒若曰涼君淫奢無度財力窮矣將喪國身為戮焉二年正月四年十一月月皆犯井亦為秦有兵刑三年正月壬午有星晡前晝見東北在井左右色黃大如橘魏師之應也黃星出于燕墟而慕容氏滅今復見東井涼室亡乎四年四月己酉華山崩華山西鎮也天又若曰星孛于房既有徵矣鎮傾而國從之先是元年十二月金犯羽林二年十二月至四年十一月火再入之五年五月太白晝見胃昴入羽林遂犯畢畢又邊兵也六月上自將西征秋八月進圍姑臧九月丙戌沮渠牧犍帥文武將吏五千餘人面縛來降明年悉定涼地或曰星孛于房為大臣之事又饉祥也火入鬼犯軒轅又稼穡不成自元年已來將相薨尤衆至真君元年州鎮十五盡饑四年十月壬戌大流星出文昌入紫宮聲如雷天象若曰將相或以全師禦衞帝宮者其事密近有震驚之象焉明年六月帝西征詔大將軍嵇敬等帥衆二萬屯漠南以備暴寇九月蠕蠕乘虛犯塞遂至七介山京師大駭司空長孫道生等并力拒之虜乃退走是月壬午有大流星出紫微入貫索長六丈餘占曰有大君之命貫索賤人牢也明年帝命侍臣行郡國觀風俗問其所疾苦云真君二年七月壬寅填星犯鉞鎮者國家所安危而為之綱紀者也其嬰鈇鉞之戮而君及焉自元年十一月至此月歲星三犯房上相歲星為人君今反覆由之循省鈎鈐之備也天若戒輔臣曰涼邦卒滅敵國殫矣而猶挾震主之威負百勝之計盍思盈亢之戒乎是時司徒崔浩方持國鈞且有寵於上明年安西李順備五刑之誅而由浩鍛成之後八年竟族滅無後夫天哀賢良而示以明訓夙矣罕能省躬以先覺豈不悲哉浩誅之明年卒有景穆之禍後年而亂作三年三月癸未月犯太白占曰大兵起合戰九月乙丑有星孛于天牢入文昌五車經昴畢之間至天苑百餘日與宿俱入西方天象若曰且有王者之兵彗除髦頭之域矣貴臣預有戮焉明年正月征西將軍皮豹子大敗宋師于樂鄉九月上北伐樂平王丕統十五將為左軍中山王辰統十五將為右軍上自將中軍蠕蠕可汗不敢戰亡追至頓根河虜二萬餘騎而還中山王辰等八將軍坐後期皆斬或曰彗由昴畢貴人多死十一月太保盧魯元薨五年二月樂平王丕薨六年二月太白熒惑歲星聚于東井占曰三星合是為驚立絕行其國內外有兵與喪改立王公九月盧水胡蓋吳據杏城反僭署百官雜虜皆響從關內大震十一月將軍叔孫拔敗吳師于渭北至七年正月太白犯熒惑占曰兵起有大戰時上討吳黨於河東屠之遂幸長安二月吳軍敗績于杏城棄馬遁去復收合餘燼八月乃夷之五年五月月犯心六年四月又如之占曰兵犯宋邦是月太白入軒轅占曰有反臣是冬宋太子詹事范曄謀反誅詔高涼王那徇淮泗徙其人河北焉九年正月火水皆入羽林占曰禁兵大起四月太白晝見經天十年五月彗星出于昴北此天所以滌除天街而禍髦頭之國也時間歲討蠕蠕是秋九月上復自將征之所捕虜凡百餘萬矣是歲七月太白犯哭星占曰天子有哭泣事明年春皇子真薨十年十月辛巳彗星見于太微占曰兵喪並興國亂易政臣賊主至十一年正月甲子太白晝見經天四月又如之占曰中歲而再干明兵事尤大且革人更王之應也是歲十月甲辰熒惑入太微十二月辛未又犯之癸卯又如之占曰臣將戮主君將惡之仍犯事荐也先是八年正月庚午月犯心大星九年正月犯歲星是歲九月太白又犯歲星至正平元年五月彗星見卷舌入太微卷舌讒言之戒六月辛酉彗星進逼帝坐七月乙酉犯上相拂屏出端門滅于翼軫辛酉直陰國翼軫為楚邦于屏者蕭牆之亂也天象若曰夫膚受之譖實為亂階卒至芟夷主相而專其大號雖南國之君由遷及焉先是去年十月上南征絕河十二月六師涉淮登瓜步山觀兵騎士六十萬列屯三千餘里宋人兇懼饋百牢焉是年正月盡舉淮南地俘之以歸所夷滅甚衆六月帝納宗愛之言皇太子以強死明年二月愛殺帝于永安宮左僕射蘭延等以建議不同見殺愛立吳王余為主尋又賊之荐災之驗也間歲宋太子劭坐蠱事泄亦殺其君而僭立劭弟武陵王駿以上流之師討平之滅於翼軫之徵也先是七年八月月犯熒惑八月至十一月又犯軒轅是歲正月太白經天九月火犯太微十月宗愛等伏誅高宗踐阼至十一月錄尚書元壽尚書令長孫渴侯以爭權賜死太尉黎司徒弼又忤旨左遷孛于屏相之應出明年五月太后崩高宗興安二年二月有星孛于西方占曰凡孛者非常惡氣所生也內不有大亂外且有大兵至興光元年二月有流星大如月西行占曰奔星所墜其野有兵光盛者事大先是京兆王杜元寶建康王崇濟南王麗濮陽王閭文若永昌王仁相次謀反伏誅是歲宋南郡王義宣及魯爽臧質以荊豫之師構逆大將王玄謨等西討盡夷之或曰彗加太微翼軫之餘禍也春秋星之大變或災連三國之君其流炎之所及二十餘年而後弭至是彗干天庭二太子首亂三君為戮侯王辜死者幾數十人由此言之皇天疾威之誡不可不惕也太安元年六月辛酉有星起河鼓東流有尾跡光明燭地河鼓為履險之兵負海之象也昭盛為人君之事星之所往君且從之間二歲帝幸遼西登碣石以臨滄海復所過郡國一年又尾迹之徵是歲五月火入斗斗主形命之養其後三吳荐饑仍歲疾疫三年夏四月熒惑犯太白占曰是謂相鑠不可舉事用兵成師以出而禍其雄之象也明年宋將殷孝祖侵魏南鄙詔征南將軍皮豹子擊之宋軍大敗或曰金火合主喪事明年十月金又犯哭星十二月征東將軍中山王託真薨三年十一月熒惑犯房鈎鈐星是謂強臣不御王者憂之至四年正月月入太微犯西蕃三月又犯五諸侯占曰諸侯大臣有謀反伏誅者是月太白犯房月入南斗皆宋分占曰國有變臣為亂十一月長星出於奎色白蛇行有尾跡既滅變為白雲奎為徐方又魯分也占曰下有流血積骨明年宋兗州刺史竟陵王誕據廣陵作亂宋主親戎自夏涉秋無日不戰及城陷悉屠之四年八月熒惑守畢直徼垣之南占曰歲饉至五年二月又入東井占曰旱兵飢疫大臣當之六月太白犯鉞占曰兵起更正朔是歲二月司空伊戨薨十二月六鎮雲中高平雍秦饑旱明年改年為和平至六月諸將討吐谷渾什寅遂絕河窮躡之會軍大疫乃還是歲三月流星數萬西行占曰小流星百數四面行者庶人遷之象既而吐谷渾舉國西遁大軍又隨躡之四年九月月犯軒轅十二月犯氐至五年正月月掩軒轅又掩氐東南星皆后妃之府也和平元年正月丁未歲犯鬼鬼為死喪歲星人君也是為君有喪事三月月掩軒轅四月戊戌皇太后崩於壽安宮宋志云人間宣言人主帷箔不修故謫見軒轅又五年十一月月犯左執法明年十一月又犯之占曰大臣有憂和平二年征東將軍河東王閭毗薨十月廣平王洛侯薨和平元年十月有長星出於天倉長丈餘饉祥也二年三月熒惑入鬼是謂稼穡不成且曰萬人相食其後定相阻飢宥其田租時三吳亦仍歲凶旱死者十二三先是元年四月太白犯東井井鬼皆秦分雍州有兵亂自元年六月月犯心大星三犯前後于房心宋分時宋君虐其諸弟後宮多喪子女繼夭哭泣之聲相再是歲詔諸將討雍州叛氐大破之宋雍州刺史海陵王休茂亦稱兵作亂間歲而宋主殂嗣子淫昏政刑紊焉先是元年十月太白入氐占曰兵起後宮有白衣會三年五月歲星犯上將占曰上將憂之三年八月月犯哭星皆宋祥也是歲樂良王萬壽及征東大將軍常山王素並薨二年三月辛巳有長星出天津色赤長匹餘滅而復出大小百數天津帝之都船所以渡神通四方光大且衆為人君之事天象若曰是將有千乘萬騎之舉而絕逾大川矣是月發卒五千餘通河西獵道後年八月帝校獵于河西宋主亦大閱舟師巡狩江右云二年九月太白犯南斗斗吳分占曰君死更政大臣有誅者十一月太白犯填填女君也且曰有內兵白衣會至三年九月火犯積尸占曰貴人憂之斧鉞用十月太白犯歲星歲為人君而以兵喪干之且有死君篡殺之禍是月熒惑守軒轅占曰女主憂之宮中兵亂十一月歲入氐氐為正寢歲為有國之君占曰諸侯王有來入宮者五年二月月入南斗魁中犯第四星占曰大人憂太子傷宮中有自賊者又大赦既而宋孝武及宋后相繼崩殂少主荐誅輔臣釁連戚屬羣下相與殺之而立宋明帝江南大饑且仍有肆眚之令焉先是三年六月太白犯東井七月火入井四年五月金火皆犯上相五年六月火又入井占曰大臣憂斧鉞用六年七月月犯心前星是月宋殺少主其後有乙渾之難五年七月丁未歲星守心心為明堂歲為諸侯為長子入而守之立君之象占曰凡五星守心皆為宮中亂賊羣下有謀立天子者七月己酉有流星長丈餘入紫微經北辰第三星而滅占曰有大喪九月丁酉火入軒轅十一月長星出織女色正白彗之象也女主專制將由此始是以天視由之長星彗之著易政之漸焉冬熒惑入太微犯上將十二月遂守之占曰公侯謀上且有斬臣六年正月乙未有流星長丈餘自五車抵紫宮西蕃乃滅天象若曰羣臣或修霸刑而干蕃輔之任矣且占曰政亂有奇令四月太白犯五諸侯占曰有專殺諸侯者五月癸卯上崩于太華殿車騎大將軍乙渾矯詔殺尚書楊寶年等于禁中戊申又害司徒平原王陸麗明年皇太后定策誅之太后臨朝自馮氏始也或曰心為宋分是歲六月歲星晝見于南斗斗為天祿吳分也天象若曰或以諸侯干君而代奪之是冬宋明帝以皇弟踐阼孝武諸子舉兵攻之四方響應尋皆伏誅有太白之刑與歲星之祐焉是歲三月有流星西行不可勝數至明乃止至六月己卯又有流星多西南行星衆而小庶人象也星之所首人將從之及宋討孝武諸子大兵首自尋陽進平荊雍其後張永之師敗績于呂梁魏師盡舉淮右俘其人又西流之效也顯祖天安元年正月戊子太白犯歲星歲農事也肅殺干之是為稼穡不登六月熒惑犯鬼占曰旱饑疾疫金革用八月丁亥太白犯房占曰霜雨失節馬牛多死九月甲寅熒惑犯上將太白犯南斗第三星占曰貴人將相有誅者十一月己酉太白又犯歲星或曰歲為諸侯太白主兵刑之政再干之事洊也是歲九月州鎮十一旱饑十月宋氏六王皆戮死明年宋師敗于呂梁江南阻饑牛且大疫其後東平王道符擅殺副將及雍州刺史據長安反詔司空和其奴討滅之九月詔賜六鎮孤貧布帛宋主以後宮服御賜征北將士後歲夏旱河決州鎮二十七皆饑尋又天下大疫元年六月太白犯左執法十月火又犯之占曰大臣有憂霸者之刑用是歲六月月犯井十月又掩之皇興元年正月月犯井北轅第二星八月又蝕之占曰貴人當之有將死水旱祥也道符作亂之明年司空和其奴太宰李峻皆薨皇興元年四月太白犯鎮星占曰有攻城略地之事六月壬寅太白犯鬼秦分也二年正月太白犯熒惑占曰大兵起是時鎮南大將軍尉元征南大將軍慕容白曜略定淮泗明年徐州羣盜作亂元又討平之後歲正月上黨王觀西征吐谷渾又大破之二年九月癸卯火犯太微上將占曰上將誅先是元年六月熒惑犯氐是歲十一月太白又犯之是為內宮有憂逼之象占曰天子失其宮四年十月誅濟南王慕容白曜明年上迫於太后傳位太子是為孝文帝宋志以為先是比年月頻犯左角占曰天子筂之及上遜位而宋明帝亦殂高祖延興元年十月庚子月入畢口畢魏分占曰小人罔上大人易位國有拘主反臣十二月辛卯火犯鈎鈐鈎鈐以統天駟火為內亂天象若曰人君失馭或以亂政乘之矣乙巳鎮星犯井夫井者天下之平也而女君以干之是為后竊刑柄占曰天下無主大人憂之有過賞之事焉二年正月月犯畢丙子月犯東井庚子又如之占曰天下有變令貴人多死者三年八月月犯太微又羣陰不制之象也是時馮太后宣淫于朝昵近小人而附益之所費以鉅萬億計天子徒尸位而已二年九月河間王閭虎皮以貪殘賜死其後司空東平郡王陸麗坐事廢為兵既而宮車晏駕或曰月入畢口為赦令二年正月曲赦京師及秦涼諸鎮星及月犯井皆為水災且旱祥也是歲九月州鎮十一水旱詔免其田租開倉賑乏四年九月己卯月犯畢七月丙申太白犯歲星在角丁卯太白又入氐太白有母后之幾主兵喪之政以干君於外朝而及其宿宮是將有劫殺之虞矣二月癸丑月犯軒轅甲寅又犯歲星月為強大之臣為主女之象始由后妃之府而干少陽之君示人主以戒敬之備也五年三月甲戌月掩填星天象若曰是又僻行不制而棄其紀綱矣且占曰貴人強死天下亂三月癸未金火皆入羽林占曰臣欲賊主諸侯之兵盡發八月乙亥月掩畢十一月月入軒轅食第二星至承明元年四月月食尾五月己亥金火皆入軒轅庚子相逼同光皆后妃之謫也天若言曰母后之釁幾貫盈矣人君忘祖考之業慕匹夫之孝其如宗祀何是時獻文不悟至六月暴崩實有酖毒之禍焉由是言之皇天有以覩履霜之萌而為之成象久矣其後文明皇太后崩孝文皇帝方修諒陰之儀篤孺子之慕竟未能述宣春秋之義而懲供人之黨是以胡氏循之卒傾魏室豈不哀哉或曰太白犯歲於天門以臣伐君之象金火同光又兵亂之徵時宋主昏狂公侯近戚寃死相繼既而桂陽建平王並稱兵內侮矢及宮闕僅乃戡之尋為左右楊玉夫等所殺或曰月犯歲鎮金火入軒轅皆饉祥也月掩畢主邊兵四年州鎮十三饑又比歲蝗旱太和元年雲中又饑開倉賑之先是四年四月丙午有大星西流殷殷有聲十一月辛未又如之是歲五月宋桂陽王反于江州間歲沈攸之反于江陵皆為大兵西伐時以江南內攜又詔五將伐蜀太和元年五月庚子太白犯熒惑在張南國之次也占曰其國兵喪並興有軍大戰人主死壬申水土合于翼皆入太微主令不行之象也占曰女主持政大夫執綱國且內亂羣臣相殺九月丁亥太白晝見經天光色尤盛更姓之祥也二年九月火犯鬼占曰主以淫泆失政相死之三年三月月犯心心為天王又宋分三月填星逆行入太微留左掖門內占曰土守南宮必有破國易代逆行者事逆也自元年三月至二年六月月行五犯太微與劉氏篡晉同占又自元年八月至三年五月月行六犯南斗入魁中斗為大人壽命且吳分是時馮太后專政而宋將蕭道成亦擅威福之權方圖劉氏宋司徒袁粲起兵石頭沈攸之起兵江陵將誅之不克皆為所殺三年四月竟篡其君而自立是為齊帝是年五月又害宋君于丹陽宮又元年十月月犯昴為刑獄事二年六月月犯房占曰貴人有誅者或曰月犯斗亦大臣之謫也其後李惠伏誅宜都長樂王並賜死又元年二月壬戌月在井暈參畢兩河五車占曰大赦至八月大赦天下三年正月壬子又暈觜參昴畢五車東井至十月大赦天下三年自五月至十二月月三入斗魁中四年五月庚戌七月己巳又如之六年二月又犯斗魁第二星占曰其國大人憂不出三年七月丁未十月丙申月再犯心大星自四年正月至六年二月又五干之斗為爵祿之柄心為布政之宮月行干而之亦以荐矣其占曰月犯心亂臣在側有亡君之戒人主以善事除殃是時馮太后將危少主者數矣帝春秋方富而承事孝敬動無違禮故竟得無咎至六年三月而齊主殂焉或曰月犯斗其國兵憂心又豫州也時比歲連兵南討五年二月大破齊師于淮陽又擊齊下蔡軍大敗之先是三年八月金犯軒轅四年二月又犯軒轅第二星六年正月又犯軒轅大星八月又犯軒轅左角左角后宗也是時太后淫亂而幽后之姪娣又將薄德天若言曰是無周南之風不足訓也故月太白驟于之三年九月庚子太白犯左執法十二月丙戌月犯之四年二月辛巳月又犯之九月壬戌太白又犯之五年二月癸卯月犯太微西蕃上將至六年十月乙酉熒惑又犯之夫南宮執法所以糾淫忒成肅雍而上將朝庭之輔也天象若曰王化將薥淫風幾興固不足以令天下矣而廷臣莫之糾弼安用之文明太后雖獨厚幸臣而公卿坐受榮賜者費亦巨億蓋近乎素餐焉其三年九月安樂王長樂下獄死隴西王源賀薨四年正月廣川王略薨襄城王韓頹徙邊七月頓丘王李鍾葵賜死其後任城王雲中山王叡又薨比年死黜相繼蓋天謫存焉四年春月又掩火亦大臣死黜之祥也又比年月再犯昴亦為獄事與白衣之會也五年九月辛巳填犯辰星于軫占曰為饑為內亂且有壅川溢水之變是歲京師大霖雨州鎮十二饑至六年七月丙申又大流星起東壁光明燭地尾長二丈餘東壁土功之政也是月發卒五萬通靈丘道十月己酉有流星入翼尾長五丈餘七星中州之羽儀翼南國也天象若曰將擇文明之士使于楚邦焉明年員外散騎常侍李彪使齊始通二國之好焉四年正月丁未月在畢暈參井五車赦祥也四月幸廷尉獄錄囚徒明年二月大赦是月月在翼有偏日暈侵五車東井軒轅北河鬼至北斗紫垣攝提六年正月癸亥月在畢暈參兩肩五車胃昴畢至甲戌天下大赦江南嗣君即位亦大赦改元七年六月庚午辰時東北有流星一大如太白北流破為三段十月己亥星隕如虹是時太后專朝且多外嬖雖天子由倚附之故有干明之謫焉破而為三席勢者衆也昔春秋星隕如雨而羣陰起霸其後漢成帝時旰日晦冥衆星行隕燿燿如雨而王氏之禍萌至是天妖復見又與元后同符矣十年八月辰時有星落如流火三道戊寅又有流星出日西南一丈所西北流大如太白至午西破為二段尾長五尺復分為二入雲間仍見者事荐也後代其踵而行之以至於分崩離析乎先是七年十月有客星大如斗在參東似孛占曰大臣有執主之命者且歲旱糴貴十年九月熒惑犯歲星歲主農事火星以亂氣干之五稼旱傷之象也占曰元陽以饉人不安自八年至十一年黎人阻饑且仍歲災旱八年正月辛巳月在畢暈井歲星觜參五車占曰有赦糴貴其年六月大赦冬州鎮十五水旱人饑九年正月月在參暈觜參兩肩五車為大赦為水戊申月犯井為水祥也是歲冀定數州大水人有鬻男女者京師及州鎮十三水旱傷稼明年大赦十一年三月丁亥火土合于南斗填為履霜之漸斗為經始之謀而天視由之所以為大人之戒也占曰其國內亂不可舉事用兵是時齊主持諸侯王酷甚雖酒食之饋猶裁之有司故天若言曰, WYG: 猥湊}
  - {type: variant, offset: 5930, length: 7550, content: 元年五月癸未太白犯天街占曰六夷髦頭滅二年五月太白晝見占曰大兵且興強國有弱者是月上北征蠕蠕大破之虜獲以鉅萬計遂降高車以實漠南闢地數千里云三年六月火犯井鬼入軒轅占曰秦憂兵亂有死君又旱饑之應丙子有大流星出危南入羽林占曰兵起負海國與王師合戰是歲自三月至十月太白再犯歲星月又犯之占曰有國之君或罹兵刑之難者且歲饉十二月丙戌流星首如甕長二十餘丈大如數十斛船色正赤光燭人面自天船及河抵奎大星及于壁占曰天船以濟兵車奎為徐方東壁衞也是為宋師之祥昭盛者事大也是歲六月宋將到彥之等侵魏自南鄙清水入河泝流而西列屯二千餘里九月帝用崔浩策行幸統萬遂擊赫連定於平涼十二月克之悉定三秦地明年大師涉河攻滑臺屠之宋人宵遁是時赫連定轉攻西秦戮其君乞伏慕末吐谷渾慕容璝又襲擊定虜之以強死者再君焉是歲二月定州大饉詔開倉賑乏或曰奎星羽獵理兵象也流星抵之而著大是為大人之事冬十月上大閱于漠南甲騎五十萬旌旗二千餘里又明盛之徵四年金火入東井火又犯天戶明年正月又犯鬼占曰秦有兵喪而至秦夏出夷威沮渠蒙遜又死氐主楊難當陷宋之漢中地云四年三月有大流星東南行光燭地長六七丈食頃乃滅後有聲占曰大兵從之是時諸將方逐宋師至歷城不及有聲駿奔之象也四月辛未太白晝見于胃胃為趙分五月太白犯天關十月丙辰月又掩之天關外主勃碣山河之險窮焉占曰兵革起九月丙寅有流星大如斗赤色發太微至北斗而滅太微禮樂之庭且有昭德之舉而述宣王命是以帝車受之是月壬申有詔徵范陽盧玄等三十六人郡國察秀孝數百人且命以禮宣喻申其出處之節明年六月上伐北燕舉燕十餘郡進圍和龍徙豪傑三萬餘家以歸四年八月金入太微亦君自將兵象明年正月庚午火入鬼占曰秦有死君四月己丑太白晝見為不臣其後秦王赫連昌叛走伏誅之應也延和元年七月有大流星出參左肩東北入河乃滅參主兵政晉魏墟也山河所首推之大兵將發于魏以加燕國八月癸未太白犯心前星乙酉又犯心明堂占曰有亡國近期二年十二月有流星大如甕尾長二十餘丈奔君之象比歲連兵東討至太延二年三月燕後主馮文通去國奔高麗元年四月月犯左角五月月掩斗七月月食左角皆占曰兵大起其後征西將軍金崖安定鎮將延普涇州刺史狄子玉爭權崖及子玉舉兵攻普不克據胡空谷反平西將軍陸俟討獲之三年三月丙辰金晝見在參魏邦戒也閏月戊寅金犯五諸侯占曰四滑起官兵起亂疑己丑月入井犯太白占曰兵起合戰秦邦受之七月上幸隰城詔諸軍討山胡白龍入西河九月克之伏誅者數千人而宋大將軍彭城王義康方擅威福後竟幽廢是歲二月庚午月犯畢口而出因暈昴及五車占曰貴人死五月甲子陰平王求薨太延元年五月月犯右執法九月火犯太微上將又犯左執法十月丙午月犯右執法二年二月月犯東蕃上相三月月及太白俱犯右執法及上相三年八月火犯左執法及上將五年二月木逆行犯執法皆大臣謫也元年十月左僕射安原謀反誅三年正月征東大將軍中山王纂太尉北平王長孫嵩鎮南大將軍丹陽王叔孫建皆薨其後宋大將軍義康坐徙豫章誅其黨與僕射殷景仁亦尋卒焉元年五月彗出軒轅二年正月月犯火月后妃也三年七月木犯軒轅至五年七月月掩填星並女主謫也真君元年太后竇氏殂宋氏皇后亦終或曰彗出軒轅女主有為寇者其後沮渠氏失國實公主潛啟魏師二年五月壬申有星孛于房占曰名山崩有亡國八月丁亥木入鬼守積尸十一月辛亥又犯鬼鬼秦分天戒若曰涼君淫奢無度財力窮矣將喪國身為戮焉二年正月四年十一月月皆犯井亦為秦有兵刑三年正月壬午有星晡前晝見東北在井左右色黃大如橘魏師之應也黃星出于燕墟而慕容氏滅今復見東井涼室亡乎四年四月己酉華山崩華山西鎮也天又若曰星孛于房既有徵矣鎮傾而國從之先是元年十二月金犯羽林二年十二月至四年十一月火再入之五年五月太白晝見胃昴入羽林遂犯畢畢又邊兵也六月上自將西征秋八月進圍姑臧九月丙戌沮渠牧犍帥文武將吏五千餘人面縛來降明年悉定涼地或曰星孛于房為大臣之事又饉祥也火入鬼犯軒轅又稼穡不成自元年已來將相薨尤衆至真君元年州鎮十五盡饑四年十月壬戌大流星出文昌入紫宮聲如雷天象若曰將相或以全師禦衞帝宮者其事密近有震驚之象焉明年六月帝西征詔大將軍嵇敬等帥衆二萬屯漠南以備暴寇九月蠕蠕乘虛犯塞遂至七介山京師大駭司空長孫道生等并力拒之虜乃退走是月壬午有大流星出紫微入貫索長六丈餘占曰有大君之命貫索賤人牢也明年帝命侍臣行郡國觀風俗問其所疾苦云真君二年七月壬寅填星犯鉞鎮者國家所安危而為之綱紀者也其嬰鈇鉞之戮而君及焉自元年十一月至此月歲星三犯房上相歲星為人君今反覆由之循省鈎鈐之備也天若戒輔臣曰涼邦卒滅敵國殫矣而猶挾震主之威負百勝之計盍思盈亢之戒乎是時司徒崔浩方持國鈞且有寵於上明年安西李順備五刑之誅而由浩鍛成之後八年竟族滅無後夫天哀賢良而示以明訓夙矣罕能省躬以先覺豈不悲哉浩誅之明年卒有景穆之禍後年而亂作三年三月癸未月犯太白占曰大兵起合戰九月乙丑有星孛于天牢入文昌五車經昴畢之間至天苑百餘日與宿俱入西方天象若曰且有王者之兵彗除髦頭之域矣貴臣預有戮焉明年正月征西將軍皮豹子大敗宋師于樂鄉九月上北伐樂平王丕統十五將為左軍中山王辰統十五將為右軍上自將中軍蠕蠕可汗不敢戰亡追至頓根河虜二萬餘騎而還中山王辰等八將軍坐後期皆斬或曰彗由昴畢貴人多死十一月太保盧魯元薨五年二月樂平王丕薨六年二月太白熒惑歲星聚于東井占曰三星合是為驚立絕行其國內外有兵與喪改立王公九月盧水胡蓋吳據杏城反僭署百官雜虜皆響從關內大震十一月將軍叔孫拔敗吳師于渭北至七年正月太白犯熒惑占曰兵起有大戰時上討吳黨於河東屠之遂幸長安二月吳軍敗績于杏城棄馬遁去復收合餘燼八月乃夷之五年五月月犯心六年四月又如之占曰兵犯宋邦是月太白入軒轅占曰有反臣是冬宋太子詹事范曄謀反誅詔高涼王那徇淮泗徙其人河北焉九年正月火水皆入羽林占曰禁兵大起四月太白晝見經天十年五月彗星出于昴北此天所以滌除天街而禍髦頭之國也時間歲討蠕蠕是秋九月上復自將征之所捕虜凡百餘萬矣是歲七月太白犯哭星占曰天子有哭泣事明年春皇子真薨十年十月辛巳彗星見于太微占曰兵喪並興國亂易政臣賊主至十一年正月甲子太白晝見經天四月又如之占曰中歲而再干明兵事尤大且革人更王之應也是歲十月甲辰熒惑入太微十二月辛未又犯之癸卯又如之占曰臣將戮主君將惡之仍犯事荐也先是八年正月庚午月犯心大星九年正月犯歲星是歲九月太白又犯歲星至正平元年五月彗星見卷舌入太微卷舌讒言之戒六月辛酉彗星進逼帝坐七月乙酉犯上相拂屏出端門滅于翼軫辛酉直陰國翼軫為楚邦于屏者蕭牆之亂也天象若曰夫膚受之譖實為亂階卒至芟夷主相而專其大號雖南國之君由遷及焉先是去年十月上南征絕河十二月六師涉淮登瓜步山觀兵騎士六十萬列屯三千餘里宋人兇懼饋百牢焉是年正月盡舉淮南地俘之以歸所夷滅甚衆六月帝納宗愛之言皇太子以強死明年二月愛殺帝于永安宮左僕射蘭延等以建議不同見殺愛立吳王余為主尋又賊之荐災之驗也間歲宋太子劭坐蠱事泄亦殺其君而僭立劭弟武陵王駿以上流之師討平之滅於翼軫之徵也先是七年八月月犯熒惑八月至十一月又犯軒轅是歲正月太白經天九月火犯太微十月宗愛等伏誅高宗踐阼至十一月錄尚書元壽尚書令長孫渴侯以爭權賜死太尉黎司徒弼又忤旨左遷孛于屏相之應出明年五月太后崩高宗興安二年二月有星孛于西方占曰凡孛者非常惡氣所生也內不有大亂外且有大兵至興光元年二月有流星大如月西行占曰奔星所墜其野有兵光盛者事大先是京兆王杜元寶建康王崇濟南王麗濮陽王閭文若永昌王仁相次謀反伏誅是歲宋南郡王義宣及魯爽臧質以荊豫之師構逆大將王玄謨等西討盡夷之或曰彗加太微翼軫之餘禍也春秋星之大變或災連三國之君其流炎之所及二十餘年而後弭至是彗干天庭二太子首亂三君為戮侯王辜死者幾數十人由此言之皇天疾威之誡不可不惕也太安元年六月辛酉有星起河鼓東流有尾跡光明燭地河鼓為履險之兵負海之象也昭盛為人君之事星之所往君且從之間二歲帝幸遼西登碣石以臨滄海復所過郡國一年又尾迹之徵是歲五月火入斗斗主形命之養其後三吳荐饑仍歲疾疫三年夏四月熒惑犯太白占曰是謂相鑠不可舉事用兵成師以出而禍其雄之象也明年宋將殷孝祖侵魏南鄙詔征南將軍皮豹子擊之宋軍大敗或曰金火合主喪事明年十月金又犯哭星十二月征東將軍中山王託真薨三年十一月熒惑犯房鈎鈐星是謂強臣不御王者憂之至四年正月月入太微犯西蕃三月又犯五諸侯占曰諸侯大臣有謀反伏誅者是月太白犯房月入南斗皆宋分占曰國有變臣為亂十一月長星出於奎色白蛇行有尾跡既滅變為白雲奎為徐方又魯分也占曰下有流血積骨明年宋兗州刺史竟陵王誕據廣陵作亂宋主親戎自夏涉秋無日不戰及城陷悉屠之四年八月熒惑守畢直徼垣之南占曰歲饉至五年二月又入東井占曰旱兵飢疫大臣當之六月太白犯鉞占曰兵起更正朔是歲二月司空伊戨薨十二月六鎮雲中高平雍秦饑旱明年改年為和平至六月諸將討吐谷渾什寅遂絕河窮躡之會軍大疫乃還是歲三月流星數萬西行占曰小流星百數四面行者庶人遷之象既而吐谷渾舉國西遁大軍又隨躡之四年九月月犯軒轅十二月犯氐至五年正月月掩軒轅又掩氐東南星皆后妃之府也和平元年正月丁未歲犯鬼鬼為死喪歲星人君也是為君有喪事三月月掩軒轅四月戊戌皇太后崩於壽安宮宋志云人間宣言人主帷箔不修故謫見軒轅又五年十一月月犯左執法明年十一月又犯之占曰大臣有憂和平二年征東將軍河東王閭毗薨十月廣平王洛侯薨和平元年十月有長星出於天倉長丈餘饉祥也二年三月熒惑入鬼是謂稼穡不成且曰萬人相食其後定相阻飢宥其田租時三吳亦仍歲凶旱死者十二三先是元年四月太白犯東井井鬼皆秦分雍州有兵亂自元年六月月犯心大星三犯前後于房心宋分時宋君虐其諸弟後宮多喪子女繼夭哭泣之聲相再是歲詔諸將討雍州叛氐大破之宋雍州刺史海陵王休茂亦稱兵作亂間歲而宋主殂嗣子淫昏政刑紊焉先是元年十月太白入氐占曰兵起後宮有白衣會三年五月歲星犯上將占曰上將憂之三年八月月犯哭星皆宋祥也是歲樂良王萬壽及征東大將軍常山王素並薨二年三月辛巳有長星出天津色赤長匹餘滅而復出大小百數天津帝之都船所以渡神通四方光大且衆為人君之事天象若曰是將有千乘萬騎之舉而絕逾大川矣是月發卒五千餘通河西獵道後年八月帝校獵于河西宋主亦大閱舟師巡狩江右云二年九月太白犯南斗斗吳分占曰君死更政大臣有誅者十一月太白犯填填女君也且曰有內兵白衣會至三年九月火犯積尸占曰貴人憂之斧鉞用十月太白犯歲星歲為人君而以兵喪干之且有死君篡殺之禍是月熒惑守軒轅占曰女主憂之宮中兵亂十一月歲入氐氐為正寢歲為有國之君占曰諸侯王有來入宮者五年二月月入南斗魁中犯第四星占曰大人憂太子傷宮中有自賊者又大赦既而宋孝武及宋后相繼崩殂少主荐誅輔臣釁連戚屬羣下相與殺之而立宋明帝江南大饑且仍有肆眚之令焉先是三年六月太白犯東井七月火入井四年五月金火皆犯上相五年六月火又入井占曰大臣憂斧鉞用六年七月月犯心前星是月宋殺少主其後有乙渾之難五年七月丁未歲星守心心為明堂歲為諸侯為長子入而守之立君之象占曰凡五星守心皆為宮中亂賊羣下有謀立天子者七月己酉有流星長丈餘入紫微經北辰第三星而滅占曰有大喪九月丁酉火入軒轅十一月長星出織女色正白彗之象也女主專制將由此始是以天視由之長星彗之著易政之漸焉冬熒惑入太微犯上將十二月遂守之占曰公侯謀上且有斬臣六年正月乙未有流星長丈餘自五車抵紫宮西蕃乃滅天象若曰羣臣或修霸刑而干蕃輔之任矣且占曰政亂有奇令四月太白犯五諸侯占曰有專殺諸侯者五月癸卯上崩于太華殿車騎大將軍乙渾矯詔殺尚書楊寶年等于禁中戊申又害司徒平原王陸麗明年皇太后定策誅之太后臨朝自馮氏始也或曰心為宋分是歲六月歲星晝見于南斗斗為天祿吳分也天象若曰或以諸侯干君而代奪之是冬宋明帝以皇弟踐阼孝武諸子舉兵攻之四方響應尋皆伏誅有太白之刑與歲星之祐焉是歲三月有流星西行不可勝數至明乃止至六月己卯又有流星多西南行星衆而小庶人象也星之所首人將從之及宋討孝武諸子大兵首自尋陽進平荊雍其後張永之師敗績于呂梁魏師盡舉淮右俘其人又西流之效也顯祖天安元年正月戊子太白犯歲星歲農事也肅殺干之是為稼穡不登六月熒惑犯鬼占曰旱饑疾疫金革用八月丁亥太白犯房占曰霜雨失節馬牛多死九月甲寅熒惑犯上將太白犯南斗第三星占曰貴人將相有誅者十一月己酉太白又犯歲星或曰歲為諸侯太白主兵刑之政再干之事洊也是歲九月州鎮十一旱饑十月宋氏六王皆戮死明年宋師敗于呂梁江南阻饑牛且大疫其後東平王道符擅殺副將及雍州刺史據長安反詔司空和其奴討滅之九月詔賜六鎮孤貧布帛宋主以後宮服御賜征北將士後歲夏旱河決州鎮二十七皆饑尋又天下大疫元年六月太白犯左執法十月火又犯之占曰大臣有憂霸者之刑用是歲六月月犯井十月又掩之皇興元年正月月犯井北轅第二星八月又蝕之占曰貴人當之有將死水旱祥也道符作亂之明年司空和其奴太宰李峻皆薨皇興元年四月太白犯鎮星占曰有攻城略地之事六月壬寅太白犯鬼秦分也二年正月太白犯熒惑占曰大兵起是時鎮南大將軍尉元征南大將軍慕容白曜略定淮泗明年徐州羣盜作亂元又討平之後歲正月上黨王觀西征吐谷渾又大破之二年九月癸卯火犯太微上將占曰上將誅先是元年六月熒惑犯氐是歲十一月太白又犯之是為內宮有憂逼之象占曰天子失其宮四年十月誅濟南王慕容白曜明年上迫於太后傳位太子是為孝文帝宋志以為先是比年月頻犯左角占曰天子筂之及上遜位而宋明帝亦殂高祖延興元年十月庚子月入畢口畢魏分占曰小人罔上大人易位國有拘主反臣十二月辛卯火犯鈎鈐鈎鈐以統天駟火為內亂天象若曰人君失馭或以亂政乘之矣乙巳鎮星犯井夫井者天下之平也而女君以干之是為后竊刑柄占曰天下無主大人憂之有過賞之事焉二年正月月犯畢丙子月犯東井庚子又如之占曰天下有變令貴人多死者三年八月月犯太微又羣陰不制之象也是時馮太后宣淫于朝昵近小人而附益之所費以鉅萬億計天子徒尸位而已二年九月河間王閭虎皮以貪殘賜死其後司空東平郡王陸麗坐事廢為兵既而宮車晏駕或曰月入畢口為赦令二年正月曲赦京師及秦涼諸鎮星及月犯井皆為水災且旱祥也是歲九月州鎮十一水旱詔免其田租開倉賑乏四年九月己卯月犯畢七月丙申太白犯歲星在角丁卯太白又入氐太白有母后之幾主兵喪之政以干君於外朝而及其宿宮是將有劫殺之虞矣二月癸丑月犯軒轅甲寅又犯歲星月為強大之臣為主女之象始由后妃之府而干少陽之君示人主以戒敬之備也五年三月甲戌月掩填星天象若曰是又僻行不制而棄其紀綱矣且占曰貴人強死天下亂三月癸未金火皆入羽林占曰臣欲賊主諸侯之兵盡發八月乙亥月掩畢十一月月入軒轅食第二星至承明元年四月月食尾五月己亥金火皆入軒轅庚子相逼同光皆后妃之謫也天若言曰母后之釁幾貫盈矣人君忘祖考之業慕匹夫之孝其如宗祀何是時獻文不悟至六月暴崩實有酖毒之禍焉由是言之皇天有以覩履霜之萌而為之成象久矣其後文明皇太后崩孝文皇帝方修諒陰之儀篤孺子之慕竟未能述宣春秋之義而懲供人之黨是以胡氏循之卒傾魏室豈不哀哉或曰太白犯歲於天門以臣伐君之象金火同光又兵亂之徵時宋主昏狂公侯近戚寃死相繼既而桂陽建平王並稱兵內侮矢及宮闕僅乃戡之尋為左右楊玉夫等所殺或曰月犯歲鎮金火入軒轅皆饉祥也月掩畢主邊兵四年州鎮十三饑又比歲蝗旱太和元年雲中又饑開倉賑之先是四年四月丙午有大星西流殷殷有聲十一月辛未又如之是歲五月宋桂陽王反于江州間歲沈攸之反于江陵皆為大兵西伐時以江南內攜又詔五將伐蜀太和元年五月庚子太白犯熒惑在張南國之次也占曰其國兵喪並興有軍大戰人主死壬申水土合于翼皆入太微主令不行之象也占曰女主持政大夫執綱國且內亂羣臣相殺九月丁亥太白晝見經天光色尤盛更姓之祥也二年九月火犯鬼占曰主以淫泆失政相死之三年三月月犯心心為天王又宋分三月填星逆行入太微留左掖門內占曰土守南宮必有破國易代逆行者事逆也自元年三月至二年六月月行五犯太微與劉氏篡晉同占又自元年八月至三年五月月行六犯南斗入魁中斗為大人壽命且吳分是時馮太后專政而宋將蕭道成亦擅威福之權方圖劉氏宋司徒袁粲起兵石頭沈攸之起兵江陵將誅之不克皆為所殺三年四月竟篡其君而自立是為齊帝是年五月又害宋君于丹陽宮又元年十月月犯昴為刑獄事二年六月月犯房占曰貴人有誅者或曰月犯斗亦大臣之謫也其後李惠伏誅宜都長樂王並賜死又元年二月壬戌月在井暈參畢兩河五車占曰大赦至八月大赦天下三年正月壬子又暈觜參昴畢五車東井至十月大赦天下三年自五月至十二月月三入斗魁中四年五月庚戌七月己巳又如之六年二月又犯斗魁第二星占曰其國大人憂不出三年七月丁未十月丙申月再犯心大星自四年正月至六年二月又五干之斗為爵祿之柄心為布政之宮月行干而之亦以荐矣其占曰月犯心亂臣在側有亡君之戒人主以善事除殃是時馮太后將危少主者數矣帝春秋方富而承事孝敬動無違禮故竟得無咎至六年三月而齊主殂焉或曰月犯斗其國兵憂心又豫州也時比歲連兵南討五年二月大破齊師于淮陽又擊齊下蔡軍大敗之先是三年八月金犯軒轅四年二月又犯軒轅第二星六年正月又犯軒轅大星八月又犯軒轅左角左角后宗也是時太后淫亂而幽后之姪娣又將薄德天若言曰是無周南之風不足訓也故月太白驟于之三年九月庚子太白犯左執法十二月丙戌月犯之四年二月辛巳月又犯之九月壬戌太白又犯之五年二月癸卯月犯太微西蕃上將至六年十月乙酉熒惑又犯之夫南宮執法所以糾淫忒成肅雍而上將朝庭之輔也天象若曰王化將薥淫風幾興固不足以令天下矣而廷臣莫之糾弼安用之文明太后雖獨厚幸臣而公卿坐受榮賜者費亦巨億蓋近乎素餐焉其三年九月安樂王長樂下獄死隴西王源賀薨四年正月廣川王略薨襄城王韓頹徙邊七月頓丘王李鍾葵賜死其後任城王雲中山王叡又薨比年死黜相繼蓋天謫存焉四年春月又掩火亦大臣死黜之祥也又比年月再犯昴亦為獄事與白衣之會也五年九月辛巳填犯辰星于軫占曰為饑為內亂且有壅川溢水之變是歲京師大霖雨州鎮十二饑至六年七月丙申又大流星起東壁光明燭地尾長二丈餘東壁土功之政也是月發卒五萬通靈丘道十月己酉有流星入翼尾長五丈餘七星中州之羽儀翼南國也天象若曰將擇文明之士使于楚邦焉明年員外散騎常侍李彪使齊始通二國之好焉四年正月丁未月在畢暈參井五車赦祥也四月幸廷尉獄錄囚徒明年二月大赦是月月在翼有偏日暈侵五車東井軒轅北河鬼至北斗紫垣攝提六年正月癸亥月在畢暈參兩肩五車胃昴畢至甲戌天下大赦江南嗣君即位亦大赦改元七年六月庚午辰時東北有流星一大如太白北流破為三段十月己亥星隕如虹是時太后專朝且多外嬖雖天子由倚附之故有干明之謫焉破而為三席勢者衆也昔春秋星隕如雨而羣陰起霸其後漢成帝時旰日晦冥衆星行隕燿燿如雨而王氏之禍萌至是天妖復見又與元后同符矣十年八月辰時有星落如流火三道戊寅又有流星出日西南一丈所西北流大如太白至午西破為二段尾長五尺復分為二入雲間仍見者事荐也後代其踵而行之以至於分崩離析乎先是七年十月有客星大如斗在參東似孛占曰大臣有執主之命者且歲旱糴貴十年九月熒惑犯歲星歲主農事火星以亂氣干之五稼旱傷之象也占曰元陽以饉人不安自八年至十一年黎人阻饑且仍歲災旱八年正月辛巳月在畢暈井歲星觜參五車占曰有赦糴貴其年六月大赦冬州鎮十五水旱人饑九年正月月在參暈觜參兩肩五車為大赦為水戊申月犯井為水祥也是歲冀定數州大水人有鬻男女者京師及州鎮十三水旱傷稼明年大赦十一年三月丁亥火土合于南斗填為履霜之漸斗為經始之謀而天視由之所以為大人之戒也占曰其國內亂不可舉事用兵是時齊主持諸侯王酷甚雖酒食之饋猶裁之有司故天若言曰, krp: 猥湊}
