  - {type: variant, offset: 2359, length: 0, content: '', WYG: 讃之弟自云宼恂之十三世孫早好仙道有絶俗之心少修張魯之術服食餌藥歴年無效幽誠}
  - {type: variant, offset: 2359, length: 0, content: '', krp: 讃之弟自云宼恂之十三世孫早好仙道有絶俗之心少修張魯之術服食餌藥歴年無效幽誠}
  - {type: variant, offset: 2360, length: 0, content: '', WYG: 達有仙人成公興不知何許人至謙之從母家傭賃謙之常覲其姨見興形貌甚彊力作不倦請回賃興代已使役乃將還令其開舎南辣田謙之樹下坐算興懇一發致勤時來看算謙之謂曰汝但力作何為看此二三日後復來看之如此不已後謙之算七曜有所不了惘然自失興謂謙之曰先生何為不懌謙之曰我學算累年而近算周髀不合以此自愧且非汝所知何勞問也興曰先生試隨興語布之俄然便決謙之歎伏不測興之淺深請師事之興固辭不肯但求為謙之弟子未幾謂謙之曰先生有意學道豈能與興隠遁謙之欣然從之興乃令謙之絜齋三日共入華山令謙之居一石室自出採藥還與謙之食藥不復飢乃將謙之入嵩山有三重石室令謙之住第二重歴年興謂謙之曰興出後當有人將藥來得但食之莫為疑怪尋有人將藥而至皆是毒蟲臭惡之物謙之大懼出走興還問状謙之具對興歎息曰先生未便得仙政可為帝王師耳興事謙之七年而謂之曰興不得乆留明日中應去興亡後先生幸為沐浴自當有人見迎興乃入第三重石室而卒謙之躬自沐浴明日中有叩石室者謙之出視見兩童子一持法服一持鉢及錫杖謙之引入至興尸所興欻然而起著衣持鉢執杖而去先是有京兆灞城人王胡兒其叔父亡頗有靈異曽將胡兒至嵩髙别嶺同行觀望見金室玉堂有一舘尤珍麗空而無人題曰成公興之舘胡兒怪而問之其叔父曰此是仙人成公興舘坐失火燒七間屋被讁為宼謙之作弟子七年始知謙之精誠遠通興乃仙者讁滿而去謙之守志嵩岳精專不懈以神瑞二年十月乙卯忽遇大神乗雲駕龍導從百靈仙人玉女左右侍衞集止山頂稱太上老君謂謙之曰往辛亥年嵩岳鎮靈集仙宮主表天曹稱自天師張陵去世已來地上曠誠修善之人無所師授嵩岳道士上谷宼謙之立身直理行合自然才任軌範首處師位吾故來觀汝授汝天師之位賜汝雲中音誦新科之誡二十卷號曰並進}
