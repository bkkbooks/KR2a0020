  - {type: variant, offset: 1159, length: 388, content: 官守也而今自殘之君於何有焉是冬十月客星白若粉絮出自南宮之西十二月入太微亂氣所由也以距乏之氣而乘粹陽之天庭適足以驅除焉爾明年竟篡晉室得諸侯而不終是歲五月丙申月犯太微十月乙卯又如之月者太陰臣象太微正陽之庭不當橫行其中是謂朝庭間隙強臣不制亦桓玄之誡也又占曰貴人有坐之者明年七月鎮西大將軍毗陵王順以罪還第亦是也五年七月己亥月犯歲星在鶉火鳥帑南國之墟也至天賜元年二月甲辰又掩之在角角為外朝而歲星君也又象若曰有強大之臣干君之庭以挾其主而播遷于外是歲桓玄之師敗績于劉裕玄劫晉帝以奔江陵至五月玄死桓氏之黨復攻江陵陷之凡再劫天子云先是六年六月甲辰月掩斗魁第四星至天賜元年五月壬申又掩斗魁第三星二年八月丁巳又犯斗第一星斗為吳分大人憂將相戮宮中有自賊者及桓玄伏誅貴臣多戮死者江南兵革十餘歲乃定故謫見于斗天賜二年四月己卯月犯鎮星在東壁七月己未又如之十月丁巳又掩之在室夫室星所以造宮廟而鎮司空也占曰土功, WYG: 色殊常}
