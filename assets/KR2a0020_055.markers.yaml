  - {type: variant, offset: 757, length: 5, content: 飢色求運冀, WYG: 明據但先朝置立已久且可從舊先是高祖於代都詔中書監高閭太常少卿陸琇并公孫崇等十餘人修理金石及八音之器後崇為太樂令乃上請尚書僕射高肇更共營理世宗詔芳共主之芳表以禮樂事大不容輒決自非博延公卿廣集儒彦討論得失研窮是非則無以垂之萬葉為不朽之式被報聼許數旬之間頻煩三議于時朝士頗以崇專綜既久不應乖謬各嘿然無發論者芳乃探引經誥搜括舊文共}
