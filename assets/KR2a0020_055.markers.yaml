  - {type: variant, offset: 2285, length: 943, content: 戍彭城又以中州鮮卑增實兵數於事為宜詔曰公之所陳甚合事機其年頻表以老乞身八月詔曰元年尊識遠屢表告退朕以公秉德清挹體懷平隱仁雅淵廣謀猷是仗方委之民政用康億兆故頻文累札仍違沖志而謙光逾固三請彌切若不屈從高謨復何以成其美德也已許其致仕主者可出表付外如禮申遂元詣闕謝老引見於庭命昇殿勞宴賜玄冠素服又詔曰夫大道凝虛至德沖挹故后王法玄猷以御世聖人崇謙光而降美是以天子父事三老兄事五更所以明孝悌於萬國垂教本于天下自非道高識博孰能處之是故五帝憲德三王乞言若求備一人同之古哲叔世之老孰能克堪師上聖則難為其舉傅中庸則易為其選朕既虛寡德謝曩哲更老之選差可有之前司徒山陽郡開國公尉元前大鴻臚卿新泰伯游明根並元亨利貞明允誠素少著英風老敷雅迹位顯台宿歸終私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選於是養三老五更於明堂國老庶老於階下高祖再拜三老親袒割牲執爵而饋於五更行肅拜之禮賜國老庶老衣服有差既而元言曰自天地分判五行施則人之所崇莫重於孝順然五孝六順天下之所先願陛下重之以化四方臣既衰老不究遠趣心耳所及敢不盡誠高祖曰孝順之道天地之經今承三老明言銘之于懷明根言曰夫至孝通靈至順感幽故詩云孝悌之至通於神明光於四海如此則孝順之道無所不格願陛下念之以濟黎庶臣年志朽弊識見昧然在於心慮不敢不盡高祖曰五更助三老以言至範敷展德音當克己復禮以行來授禮畢乃賜步挽一乘詔曰夫尊老更列聖同致欽年敬德綿哲齊軌朕雖道謝玄風識昧叡則仰禀先誨企遵猷旨故推老以德立更以元父焉斯彰兄焉斯顯矣前司徒公元前鴻臚卿明根並以沖德懸車懿量歸老故尊公以三事更以五雖更老非官耄耋罔祿然況事既高宜加殊養三老可給上公之祿五更可食元卿之俸供食之味亦同其例十七年七月元疾篤高祖親幸省疾八月元薨時年八十一詔曰元至行寬純仁風美富內秉越羣之武外挺溫懿之容自少暨長勳勤備至歷奉五朝美隆四葉南曜河淮之功北光燕然之効魯宋懷仁中鉉載德所謂立身備於本末行道著於終始勳書玉牒惠結民志者也爰及五福攸集懸車歸老謙損既彰遠近流詠陟茲父事儀我萬方謂極眉壽彌贊王業天不遺老奄爾薨逝念功惟善抽怛于懷但戎事致奪恨不盡禮耳可賜布帛綵物二千匹溫明祕器朝衣一襲并為營造墳域諡曰景桓公葬以殊禮給羽葆鼓吹假黃鉞班劍四十人賜帛一千匹子羽名犯肅宗廟諱頗有器望起家祕書中散駕部令轉主客給事加, WYG: ''}
