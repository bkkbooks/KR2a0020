  - {type: variant, offset: 3587, length: 2673, content: 申纂屯無鹽并州刺史房崇吉屯升城遏絕王使皇興初加白曜使持節都督諸軍事征南大將軍上黨公屯於碻磝以為諸軍後繼白曜攻纂於無鹽城拔其東郭其夜纂遁遣兵追執之獲其男女數千口先是劉彧青州刺史沈文秀冀州刺史崔道固並遣使內附既而彧遣招慰復歸於彧白曜既拔無鹽回攻升城肥城戍主聞軍至棄城遁走獲粟三十萬斛既至升城垣苗麋溝二戍拒守不下白曜以千餘騎襲麋溝麋溝潰自投濟水死者千餘人擊垣苗又破之得粟十餘萬斛由是軍糧充足先是淮陽公皮豹子等再征垣苗不克白曜以一旬之內頻拔四城威震齊土顯祖嘉焉詔曰卿總率戎旅討除不賓霜戈所向無不摧靡旬日之內克拔四城韓白之功何以加此雖升城戍將房崇吉守遠不順危亡已形潰在旦夕宜勉崇威略務存長轡不必窮兵極武以為勞頓且伐罪弔民國之令典當招懷以德使來蘇之澤加於百姓升城不降白曜忿之縱兵陵城殺數百人崇吉夜遁白曜撫慰其民無所殺戮百姓懷之獲崇吉母妻待之以禮劉彧遣其將吳憘公率衆數萬欲寇彭城鎮南大將軍尉元表請濟師顯祖詔白曜赴之白曜到瑕丘遇患時泗水暴竭船不得進憘公退白曜因停瑕丘會崇吉與從弟法壽盜彧盤陽城以贖母妻白曜自瑕丘遣將軍長孫觀等率騎入自馬耳關赴之觀至盤陽諸縣悉降平東將軍長孫陵寧東將軍尉眷東討青州白曜自瑕丘進攻歷城白曜乃為書以喻之曰天棄劉彧禍難滋興骨肉兄弟自相誅戮君臣上下靡復紀綱徐州刺史薛安都豫州刺史常珍奇兗州刺史畢衆敬等深覩存亡翻然歸義故朝廷納其誠發委以南蕃皆目前之見事東西所備聞也彼無鹽戍主申纂敢縱姦慝劫奪行人官軍始臨一時授首房崇吉固守升城尋即潰散自襄陽以東至于淮海莫不風靡服從正化謂東陽歷城有識之士上思安都之榮顯下念申纂之死亡追悔前惑改圖後悟然執守愚迷不能自革猥總戎旅掃定北方濟黃河知十二之虛說臨齊境想一變之清風踟蹰周覽依然何極故先馳書以喻成敗夫見機而動周易所稱去危就安人事常理若以一介為高不悛為美則微子負嫌於時紀季受譏於世我皇魏重光累葉德懷無外軍威所拂無不披靡固非三吳弱卒所能擬抗況於今者勢已土崩劉彧威不制秣陵政不出閫外豈復能浮江越海赴危救急恃此為援何異於蹄涔之魚冀拯江海夫蝮蛇螫手則斷手螫足則斷足誠忍肌體以救性命若推義而行之無割身之痛也而可以保家寧宗長守安樂此智士所宜深思重慮自求多福道固固守不降白曜築長圍以攻之長孫陵等既至青州沈文秀遣使請降軍人入其西郛頗有採掠文秀悔之遂嬰城拒守二年崔道固及兗州刺史梁鄒守將劉休賓並面縛而降白曜皆釋而禮之送道固休賓及其僚屬于京師後乃徙二城民望於下館朝廷置平齊郡懷寧歸安二縣以居之自餘悉為奴婢分賜百官白曜雖在軍旅而接待人物寬和有禮獲崇吉母妻申纂婦女皆別營安置不令士卒諠雜乃進討東陽冬入其西郭三年春克東陽擒沈文秀凡獲倉粟八十五萬斛米三千斛弓九千張箭十八萬八千刀二萬二千四百甲冑各三千三百銅五千斤錢十五萬城內戶八千六百口四萬一千吳蠻戶三百餘始末三年築圍攻擊日日交兵雖士卒死傷無多怨叛督上土人租絹以為軍資不至侵苦三齊欣然安堵樂業克城之日以沈文秀抗倨不為之拜忿而箠撻唯以此見譏以功拜使持節都督青齊東徐州諸軍事開府儀同三司青州刺史濟南王將軍如故四年冬見誅初乙渾專權白曜頗所俠附緣此追以為責及將誅也云謀反叛時論寃之白曜少子真安年十一聞父被執將自殺家人止之曰輕重未可知真安曰王位高功重若有小罪終不至此我何忍見父之死遂自縊焉白曜弟如意亦從白曜平歷下與白曜同誅太和中著作佐郎成淹上表理白曜曰臣聞經疆啟宇實良將之功褒德酬庸乃聖王之務昔姜公杖鉞開隆周之基韓生秉旄興鴻漢之業故能賞超當時名垂前史若閫外功成而流言內作人主猜疑良將懷懼樂毅所以背燕章邯所以奔楚至如鄧艾懷忠矯命寧國赤心皎然幽顯同見而橫受屠戮良可悲哀及士治伐吳奮不顧命萬里浮江應機直指使孫皓君臣輿櫬入洛大功亦舉讒書驟至內外唱和貝錦將成微晉武之鑒亦幾於顛沛矣每覽其事常為痛心聖主明王固宜深察臣伏見故征南大將軍開府儀同三司青州刺史濟南王慕容白曜祖父相資世酋東裔值皇運廓被委節臣妾白曜生長王國飲服道教爵列上階位登帝伯去天安初江陰夷楚敢拒王命三方阻兵連城岳峙海岱蒼生翹首拯援聖朝乃眷南顧思救荒黎大議廟堂顯舉元將百僚同音僉曰惟允遂推轂委誠授以專征之任握兵十萬杖鉞一方威陵河濟則淮徐震懼師出無鹽而申纂授首濟北太原同時消潰麋溝垣苗相尋奔走及回麾東掃道固銜璧盤陽梁鄒肉袒請命于時東陽未平人懷去就沈文靜高崇仁擁衆不朝扇擾邊服崔僧祐蓋次陽陳顯達連兵淮海水陸鋒起揚旌而至規援青齊士民汹汹莫不南顧時兵役既久咸有歸心而白曜外宣皇風內盡方略身擐甲冑與士卒同安撫初附示以恩厚三軍懷挾纊之溫新民欣來蘇之澤遂使僧祐擁徒弭旆効順軍門文靜崇仁棄城竄海次陽顯達望塵南奔聲震江吳風偃荊漢及青州克平文秀面縛海波清靜三齊克定逖彼東南永為國有使天府納六州之貢濟泗息烽警之虞開岱宗封禪之略闢山川望秩之序斯誠宗廟之靈神算所授然抑亦白曜與有力矣及氛翳既靜爵命亦隆榮燭當時聲譽日遠而民惡其上妄生尤隙因其功高流言惑聽巧偽亂真朱紫難辨傷夷未瘳合門屠戮鴻勳盛德蔑爾無聞有識之徒能不悽愴臣謂白曜策名王庭累荷榮授歷司出內世載忠美秉鉞啟蕃折衝敵國開疆千里拔城十二辛勤於戎旅之際契闊於矢石之間登鋒履危志存靜亂及方難既夷身膺高賞受胙河山與國昇降六十之年寵靈已極觀其立功足明機運豈容僥倖更邀非望者乎且於時國家士馬屯積京南跨州連鎮勢侔雲岳主將驍雄按鉀在所莫不殉忠死難効節奉時此之不可生心白曜足知之矣況潛逆阻兵營岱厭亂加以王師仍舉州郡屠裂齊民勞止神膽俱喪亡燼之衆不可與圖存離敗之民不可與語勇哉白曜果毅習戎體閑兵勢寧不知士民之不可藉將士之不同己據強兵之勢因塗炭之民而欲立非常之事此愚夫之所弗為也料此推之事可知矣伏惟陛下聖鑒自天仁孝宰世風冠宇宙道超百王開國以來諸有罪犯極刑不得骸骨者悉聽收葬大造之恩振古未有而白曜人舊功高嬰禍淪覆名滅國除爵命無紹天下衆庶咸共哀憐方之餘流應有差異願陛下揚日月之光明勳臣之績垂天地之施慰僵屍之魂使合棺定諡歿有餘稱選其宗近才堪驅策錫以微爵繼其絕世進可以奬勸將來退可以顯國恩澤使存者荷莫大之恩死者受骨肉之惠豈不美哉仰惟聖明霈然昭覽狂瞽之言伏待刑憲高祖覽表嘉愍之白曜弟子契輕薄無檢太和初以名家子擢為中散遷宰官南安王楨有貪暴之響遣中散閭文祖詣長安察之文祖受楨金寶之賂為楨隱而不言事發坐之文明太后引見羣臣謂之曰前論貪清皆云克修文祖時亦在中後竟犯法以此言之人心信不可知高祖曰古有待放之臣亦有離俗之士卿等自審不勝貪心者聽辭位歸第契進曰臣卑微小人聞識不遠過蒙曲照虛忝令職小人之心無定帝王之法有常以無之心奉有常之法非所克堪乞垂退免高祖曰昔鄭相嗜魚人有獻魚者相曰若取此魚恐削名祿遂不肯受契若知心不可常即知貪之惡矣何為求退遷宰官令微好碎事頗曉工作主司宰稍以見知及營, WYG: ''}
  - {type: variant, offset: 3587, length: 2673, content: 申纂屯無鹽并州刺史房崇吉屯升城遏絕王使皇興初加白曜使持節都督諸軍事征南大將軍上黨公屯於碻磝以為諸軍後繼白曜攻纂於無鹽城拔其東郭其夜纂遁遣兵追執之獲其男女數千口先是劉彧青州刺史沈文秀冀州刺史崔道固並遣使內附既而彧遣招慰復歸於彧白曜既拔無鹽回攻升城肥城戍主聞軍至棄城遁走獲粟三十萬斛既至升城垣苗麋溝二戍拒守不下白曜以千餘騎襲麋溝麋溝潰自投濟水死者千餘人擊垣苗又破之得粟十餘萬斛由是軍糧充足先是淮陽公皮豹子等再征垣苗不克白曜以一旬之內頻拔四城威震齊土顯祖嘉焉詔曰卿總率戎旅討除不賓霜戈所向無不摧靡旬日之內克拔四城韓白之功何以加此雖升城戍將房崇吉守遠不順危亡已形潰在旦夕宜勉崇威略務存長轡不必窮兵極武以為勞頓且伐罪弔民國之令典當招懷以德使來蘇之澤加於百姓升城不降白曜忿之縱兵陵城殺數百人崇吉夜遁白曜撫慰其民無所殺戮百姓懷之獲崇吉母妻待之以禮劉彧遣其將吳憘公率衆數萬欲寇彭城鎮南大將軍尉元表請濟師顯祖詔白曜赴之白曜到瑕丘遇患時泗水暴竭船不得進憘公退白曜因停瑕丘會崇吉與從弟法壽盜彧盤陽城以贖母妻白曜自瑕丘遣將軍長孫觀等率騎入自馬耳關赴之觀至盤陽諸縣悉降平東將軍長孫陵寧東將軍尉眷東討青州白曜自瑕丘進攻歷城白曜乃為書以喻之曰天棄劉彧禍難滋興骨肉兄弟自相誅戮君臣上下靡復紀綱徐州刺史薛安都豫州刺史常珍奇兗州刺史畢衆敬等深覩存亡翻然歸義故朝廷納其誠發委以南蕃皆目前之見事東西所備聞也彼無鹽戍主申纂敢縱姦慝劫奪行人官軍始臨一時授首房崇吉固守升城尋即潰散自襄陽以東至于淮海莫不風靡服從正化謂東陽歷城有識之士上思安都之榮顯下念申纂之死亡追悔前惑改圖後悟然執守愚迷不能自革猥總戎旅掃定北方濟黃河知十二之虛說臨齊境想一變之清風踟蹰周覽依然何極故先馳書以喻成敗夫見機而動周易所稱去危就安人事常理若以一介為高不悛為美則微子負嫌於時紀季受譏於世我皇魏重光累葉德懷無外軍威所拂無不披靡固非三吳弱卒所能擬抗況於今者勢已土崩劉彧威不制秣陵政不出閫外豈復能浮江越海赴危救急恃此為援何異於蹄涔之魚冀拯江海夫蝮蛇螫手則斷手螫足則斷足誠忍肌體以救性命若推義而行之無割身之痛也而可以保家寧宗長守安樂此智士所宜深思重慮自求多福道固固守不降白曜築長圍以攻之長孫陵等既至青州沈文秀遣使請降軍人入其西郛頗有採掠文秀悔之遂嬰城拒守二年崔道固及兗州刺史梁鄒守將劉休賓並面縛而降白曜皆釋而禮之送道固休賓及其僚屬于京師後乃徙二城民望於下館朝廷置平齊郡懷寧歸安二縣以居之自餘悉為奴婢分賜百官白曜雖在軍旅而接待人物寬和有禮獲崇吉母妻申纂婦女皆別營安置不令士卒諠雜乃進討東陽冬入其西郭三年春克東陽擒沈文秀凡獲倉粟八十五萬斛米三千斛弓九千張箭十八萬八千刀二萬二千四百甲冑各三千三百銅五千斤錢十五萬城內戶八千六百口四萬一千吳蠻戶三百餘始末三年築圍攻擊日日交兵雖士卒死傷無多怨叛督上土人租絹以為軍資不至侵苦三齊欣然安堵樂業克城之日以沈文秀抗倨不為之拜忿而箠撻唯以此見譏以功拜使持節都督青齊東徐州諸軍事開府儀同三司青州刺史濟南王將軍如故四年冬見誅初乙渾專權白曜頗所俠附緣此追以為責及將誅也云謀反叛時論寃之白曜少子真安年十一聞父被執將自殺家人止之曰輕重未可知真安曰王位高功重若有小罪終不至此我何忍見父之死遂自縊焉白曜弟如意亦從白曜平歷下與白曜同誅太和中著作佐郎成淹上表理白曜曰臣聞經疆啟宇實良將之功褒德酬庸乃聖王之務昔姜公杖鉞開隆周之基韓生秉旄興鴻漢之業故能賞超當時名垂前史若閫外功成而流言內作人主猜疑良將懷懼樂毅所以背燕章邯所以奔楚至如鄧艾懷忠矯命寧國赤心皎然幽顯同見而橫受屠戮良可悲哀及士治伐吳奮不顧命萬里浮江應機直指使孫皓君臣輿櫬入洛大功亦舉讒書驟至內外唱和貝錦將成微晉武之鑒亦幾於顛沛矣每覽其事常為痛心聖主明王固宜深察臣伏見故征南大將軍開府儀同三司青州刺史濟南王慕容白曜祖父相資世酋東裔值皇運廓被委節臣妾白曜生長王國飲服道教爵列上階位登帝伯去天安初江陰夷楚敢拒王命三方阻兵連城岳峙海岱蒼生翹首拯援聖朝乃眷南顧思救荒黎大議廟堂顯舉元將百僚同音僉曰惟允遂推轂委誠授以專征之任握兵十萬杖鉞一方威陵河濟則淮徐震懼師出無鹽而申纂授首濟北太原同時消潰麋溝垣苗相尋奔走及回麾東掃道固銜璧盤陽梁鄒肉袒請命于時東陽未平人懷去就沈文靜高崇仁擁衆不朝扇擾邊服崔僧祐蓋次陽陳顯達連兵淮海水陸鋒起揚旌而至規援青齊士民汹汹莫不南顧時兵役既久咸有歸心而白曜外宣皇風內盡方略身擐甲冑與士卒同安撫初附示以恩厚三軍懷挾纊之溫新民欣來蘇之澤遂使僧祐擁徒弭旆効順軍門文靜崇仁棄城竄海次陽顯達望塵南奔聲震江吳風偃荊漢及青州克平文秀面縛海波清靜三齊克定逖彼東南永為國有使天府納六州之貢濟泗息烽警之虞開岱宗封禪之略闢山川望秩之序斯誠宗廟之靈神算所授然抑亦白曜與有力矣及氛翳既靜爵命亦隆榮燭當時聲譽日遠而民惡其上妄生尤隙因其功高流言惑聽巧偽亂真朱紫難辨傷夷未瘳合門屠戮鴻勳盛德蔑爾無聞有識之徒能不悽愴臣謂白曜策名王庭累荷榮授歷司出內世載忠美秉鉞啟蕃折衝敵國開疆千里拔城十二辛勤於戎旅之際契闊於矢石之間登鋒履危志存靜亂及方難既夷身膺高賞受胙河山與國昇降六十之年寵靈已極觀其立功足明機運豈容僥倖更邀非望者乎且於時國家士馬屯積京南跨州連鎮勢侔雲岳主將驍雄按鉀在所莫不殉忠死難効節奉時此之不可生心白曜足知之矣況潛逆阻兵營岱厭亂加以王師仍舉州郡屠裂齊民勞止神膽俱喪亡燼之衆不可與圖存離敗之民不可與語勇哉白曜果毅習戎體閑兵勢寧不知士民之不可藉將士之不同己據強兵之勢因塗炭之民而欲立非常之事此愚夫之所弗為也料此推之事可知矣伏惟陛下聖鑒自天仁孝宰世風冠宇宙道超百王開國以來諸有罪犯極刑不得骸骨者悉聽收葬大造之恩振古未有而白曜人舊功高嬰禍淪覆名滅國除爵命無紹天下衆庶咸共哀憐方之餘流應有差異願陛下揚日月之光明勳臣之績垂天地之施慰僵屍之魂使合棺定諡歿有餘稱選其宗近才堪驅策錫以微爵繼其絕世進可以奬勸將來退可以顯國恩澤使存者荷莫大之恩死者受骨肉之惠豈不美哉仰惟聖明霈然昭覽狂瞽之言伏待刑憲高祖覽表嘉愍之白曜弟子契輕薄無檢太和初以名家子擢為中散遷宰官南安王楨有貪暴之響遣中散閭文祖詣長安察之文祖受楨金寶之賂為楨隱而不言事發坐之文明太后引見羣臣謂之曰前論貪清皆云克修文祖時亦在中後竟犯法以此言之人心信不可知高祖曰古有待放之臣亦有離俗之士卿等自審不勝貪心者聽辭位歸第契進曰臣卑微小人聞識不遠過蒙曲照虛忝令職小人之心無定帝王之法有常以無之心奉有常之法非所克堪乞垂退免高祖曰昔鄭相嗜魚人有獻魚者相曰若取此魚恐削名祿遂不肯受契若知心不可常即知貪之惡矣何為求退遷宰官令微好碎事頗曉工作主司宰稍以見知及營, krp: ''}
