  - {type: variant, offset: 3421, length: 1, content: 慕, WYG: 時人嗟惜之追贈本將軍南青州刺史廞弟悅永安中開府記室悅弟戫武定中鎮南将軍金紫光祿大夫戫弟粹徐州别駕朱衣直閤粹少尚氣俠兄廞死粹招合部曲就兗州刺史樊子鵠謀應關西大將軍攻討城陷殺之芳叔撫之孫思祖勇健有將略高祖末入朝歴羽林監梁沛二郡太守員外常侍屢為統軍南征累著功㨗任城王之圍鍾離也蕭衍遣其冠軍将軍張惠紹及彭瓮張豹子等率衆一萬送糧鍾離時思祖為平逺将軍領兵數千邀衍餉軍於邵陽遣其長史元少騎一千於鍾離之北遏其前鋒錄事參軍繆琰掩其後思祖身率精銳橫衝其陳三軍合擊大破之擒惠紹及衍驍騎將軍祁陽縣開國男趙景悅悅弟寧逺将軍景脩寧逺将軍梅世和屯騎校尉任景攸長水校尉邊欣越騎校尉賈慶真龍驤将軍徐敞等俘斬數千人尚書論功擬封千户侯思祖有二婢羙􅐾}
