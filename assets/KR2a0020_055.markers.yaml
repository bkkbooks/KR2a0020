  - {type: variant, offset: 749, length: 1, content: 彭, WYG: 夫為國家者罔不崇儒尊道學斆為先誠復政有質文兹範不易諒由萬端資始衆務禀法故也唐虞已往典籍無據隆周以降任居虎門周禮大司樂云師氏掌以媺詔王居虎門之左司王朝掌國中之事以教國子弟蔡氏勸學篇云周之師氏居虎門左敷陳六藝以教國子今之祭酒即周師氏洛陽記國子學宫與天子宫對太學在開陽門外案學記云古之王者建國親民教學為先鄭氏注云内則設師保以教使國子學焉外則有太學庠序之官由斯而言國學在内太學在外明矣案如洛陽記猶有仿像臣愚謂今既徙縣崧瀍皇居伊洛宫闕府寺僉復故趾至於國學豈可舛替校量舊事應在宫門之左至如太學基所炳在仍舊營構又云太和二十年發敕立四門博士於四門置學臣案自周已上學惟以二或尚西或尚東或貴在國或貴在郊爰暨周室學蓋有六師氏居内太學在國四小在郊禮記云周人養庶老於虞庠虞庠在國之西郊禮又云天子設四學當入學而太子齒注云四學周四郊之虞庠也案大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴徳帝入北學尚貴而尊爵帝入太學承師而問道周之五學於此彌彰案鄭注學記周則六學所以然者注云内則設師保以教使國子學焉外則有太學庠序之官此其證也漢魏已降無復四郊謹尋先㫖宜在四門案王肅注云天子四郊有學去王都五十里考之鄭氏不云逺近今太學故坊基趾寛曠四郊别置相去遼濶檢督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌且今時制置多循中代未審四學應從古不求集名儒禮官議其定所從之遷中書令祭酒如故出除安東將軍青州刺史為政儒緩不能禁止姦盜廉清寡欲無犯公私還朝議定律令芳斟酌古今為大議之主其中損益多芳意也世宗以朝儀多闕其一切諸議悉委芳修正於是朝廷吉凶大事皆就諮訪焉轉太常卿芳以所置五郊及日月之位去}
