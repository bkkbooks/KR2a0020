  - {type: variant, offset: 380, length: 220, content: 以張永仍據險要攻守勢倍懼傷士卒乃命安都與璨等固守身率精銳揚兵於外分擊呂梁絕其糧運善居遁奔茱萸仍與張引東走武原馳騎追擊斬首八百餘級武原窮寇八千餘人拒戰不下元親擐甲胄四面攻之破穆之外營殺傷太半獲其輜重五百餘乘以給彭城諸軍然後收師緩戰開其走路穆之率餘燼奔于永軍永勢挫力屈元乘勝圍之攻其南門永遂捐城夜遁伯恭安都乘勢追擊時大雨雪泗水冰合永棄船而走元豫測永必將奔亡身率衆軍邀其走路南北奮擊大破於呂梁之東斬首數萬級追北六十餘里死者相枕手足凍斷者十八九生擒, WYG: 慶為}
