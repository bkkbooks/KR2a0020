  - {type: variant, offset: 3418, length: 0, content: '', WYG: 復領國子祭酒出帝於顯陽殿講孝經廞為執經雖訓答論難未能精盡而風采音制足有可觀尋兼都官尚書又兼殿中尚書及出帝入關齊獻武王至洛責廞而誅之時年五十二子騭字子昇少有風氣頗涉文史弱冠州辟主簿奉使詣闕見莊帝於顯陽殿問以邊事騭應對閑敏帝善之遂敕除員外散騎侍郎出補徐州開府從事中郎父廞之死騭率勒鄉部赴兗州與刺史樊子鵠抗禦王師每戰流涕突陳城陷擒送晉陽齊獻武王矜而赦之文襄王之為儀同開府以騭為屬本州大中正武定初轉中書舍人加安東将軍於時與蕭衍和通騭前後受敕接對其使十六人出為司徒右}
