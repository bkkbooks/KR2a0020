  - {type: variant, offset: 1704, length: 580, content: 晉王扇惑百姓元遣將追斬之四年詔徵元還京赴西郊尋還所鎮延興元年五月假元淮陽王三年劉昱將蕭順之王勑懃等領衆三萬入寇淮北諸城元分遣諸將逆擊走之元表淮陽郡上黨令韓念祖始臨之初舊民南叛全無一人令撫綏招集愛民如子南來民費係先等前後歸附戶至二百有餘南濟陰郡睢陵縣人趙憐等辭稱念祖善於綏撫清身潔己請乞念祖為睢陵令若得其人必能招集離叛成立一縣顯祖詔曰樹君為民民情如此可聽如請元好申下人之善皆此類也太和初徵為內都大官既而出為使持節鎮西大將車開府統萬鎮都將甚得夷民之心三年進爵淮陽王以舊老見禮聽乘步挽杖於朝蕭道成既自立多遣間諜扇動新民不逞之徒所在蜂起以元威名夙振徵為使持節侍中都督南征諸軍事征西大將軍大都將餘官如故總率諸軍以討之元討五固賊桓和等皆平之東南清晏遠近帖然入為侍中都曹尚書遷尚書令十三年進位司徒十六年例降庶姓王爵封山陽郡國公食邑六百戶元表曰臣以天安之初奉律總戎廓寧淮右海內既平仍忝徐岳素餐尸祿積有年歲彼土安危竊所具悉每惟彭城水陸之要江南用兵莫不因之威陵諸夏夫國之大計豫備為先且臣初克徐方青齊未定從河以南猶懷彼此時劉彧遣張永沈攸之陳顯達蕭順之等前後數度規取彭城勢連青兗唯以彭城既固而永等摧屈今計彼戍兵多是胡人臣前鎮徐州之日胡人子都將呼延籠達因於負罪便爾叛亂鳩引胡類一時扇動賴威靈遐被罪人斯戮又團城子都將胡人王敕懃負釁南叛每懼姦圖狡誘同黨愚誠所見宜以彭城胡軍換取南豫州徙民之兵, WYG: ''}
