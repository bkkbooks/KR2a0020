  - {type: variant, offset: 6298, length: 231, content: 定陶男正始初除征虜將軍營州刺史徙都督沃野薄骨律二鎮諸軍事沃野鎮將轉都督禦夷懷荒二鎮諸軍事平城鎮將將軍並如故轉都督朔州沃野懷朔武川三鎮三道諸軍事後將軍朔州刺史熙平元年卒贈鎮北將軍并州刺史諡曰克初慕容破後種族仍繁天賜末頗忌而誅之時有遺免不敢復姓皆以輿為氏延昌末詔復舊姓而其子女先入掖庭者猶號慕容特多於他族契長子昇字僧度建興太守遷鎮遠將軍沃野鎮將進號征虜將軍甚得邊民情和第二子僧濟自奉朝請稍轉至五校耽淫酒色不事名行契弟暉歷涇州長史新平太守有惠政景明中大使于忠賞粟二百石, WYG: 雲陽伯}
