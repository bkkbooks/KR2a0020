  - {type: 'tls:seg', offset: 131, content: '', id: KR2a0020_ZHSJ_055-d55p2s27}
  - {type: variant, offset: 131, length: 0, content: '', WYG: 清約恭謹號為稱職後王師南討詔假安南將軍儀曹尚書廣平公與梁郡王嘉參謀軍計後兗州民叛詔明根慰喻敕南征沔西仇城連口三道諸軍禀明根節度還都正尚書仍加散騎常侍詔以與蕭􅄨絶使多年今宜通否羣臣㑹議尚書陸叡曰先以三吴不靖荆梁有難故權停之將觀釁而動今彼方既靖宜還通使明根曰中絶行人是朝廷之事深築醴陽侵彼境土二三之理直在蕭􅄨我今遣使於理為長高祖從之文明太后崩羣臣固請公除高祖與明根徃復事在禮志遷大鴻臚卿河南王幹師尚書如故隨例降侯為伯又參定律令屢}
  - {type: page-break, offset: 131, content: '', id: KR2a0020_WYG_055-2a, image: WYG0261/WYG0261-0743a.png}
  - {type: page-break, offset: 131, content: '', id: KR2a0020_WYG_055-2b, image: WYG0261/WYG0261-0743b.png}
  - {type: variant, offset: 131, length: 0, content: '', krp: 清約恭謹號為稱職後王師南討詔假安南將軍儀曹尚書廣平公與梁郡王嘉參謀軍計後兗州民叛詔明根慰喻敕南征沔西仇城連口三道諸軍禀明根節度還都正尚書仍加散騎常侍詔以與蕭賾絶使多年今宜通否羣臣㑹議尚書陸叡曰先以三吴不靖荆梁有難故權停之將觀釁而動今彼方既靖宜還通使明根曰中絶行人是朝廷之事深築醴陽侵彼境土二三之理直在蕭賾我今遣使於理為長高祖從之文明太后崩羣臣固請公除高祖與明根徃復事在禮志遷大鴻臚卿河南王幹師尚書如故隨例降侯為伯又參定律令屢}
  - {type: variant, offset: 132, length: 0, content: '', WYG: 讜言明根以年踰七十表求致仕詔不許頻表固請乃詔曰明根風度清幹志尚貞敏温恭静密乞言是寄故抑其高蹈之操至于再三表請殷勤不容違奪便已許其告辨可出前後表付外依禮施行引明根入見高祖曰卿年耆徳茂服勤累朝歴職内外並著顯績逮于耆年履道不渝是以釐革之始委以禮任遲能迂徳匡贊於朕然高尚悠邈便爾言歸君臣之禮於斯而畢眷徳思仁情何可已夫七十致仕典禮所稱位隆固辭賢者達節但季俗陵遲斯道弗繼卿獨秉冲操居今行古有魏以來首振頽俗進可以光我朝化退可以榮慰私門明根對曰臣桑榆之年鍾鳴漏盡蒙陛下之澤首領獲全待盡私庭下奉先帝陛下大恩臣之願也但犬馬之戀不勝悲塞因泣不自勝高祖命之令進言别殷勤仍為流涕賜青紗單衣委貎冠被褥錦袍等物其年以司徒尉元為三老明根為五更行禮辟雍語在元傳賜步挽一乘給上卿之祿供食之味太官就第月送之以定律令之勤賜布帛一千匹穀一千斛後明根歸廣平賜絹五百匹安車一乘馬二匹幄帳被褥車駕幸鄴明根朝于行宫詔曰游五更光素蓬簷歸終衡里可謂朝之舊徳國之老成可賜帛五百匹穀五百斛敕太官備送珍羞後車駕幸鄴又朝行宫賜榖帛如前為造甲第國有大事恒璽書訪之舊疹發動手詔問疾太醫送藥太和二十三年卒於家年八十一世宗遣使弔祭賻錢一十萬絹三百匹布二百匹贈光祿大夫加金章紫綬諡靖侯明根歴官内外五十餘年處身以仁和接物以禮讓時論貴之高祖初明根與高閭以儒老學業特被禮遇公私出入每相追隨而閭以才筆時侮明根世號高游焉子肇襲}
