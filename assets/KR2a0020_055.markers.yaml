  - {type: variant, offset: 733, length: 0, content: '', WYG: 俱為中書侍郎俄而詔芳與産入授皇太子經遷太子庶子兼員外散騎常侍從駕洛陽自在路及旋京師恒侍坐講讀芳才思深敏特精經義博聞强記兼覽蒼雅尤長音訓辨析無疑於是禮遇日隆賞賚豐渥正除員外散騎常侍俄兼通直常侍從駕南廵撰述行事尋而除正王肅之來奔也高祖雅相器重朝野屬目芳未及相見高祖宴羣臣於華林肅語次云古者唯婦人有笄男子則無芳曰推經禮正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此專謂凶事也禮初遭䘮男子免時則婦人髽男子冠時則婦人笄言俱時變而男子婦人免髽冠笄之不同也又冠尊故奪其笄稱且互言也非謂男子無笄又禮内則稱子事父母雞初鳴櫛纚笄總以兹而言男子有笄明矣高祖稱善者久之肅亦以芳言為然曰此非劉石經邪昔漢世造三字石經於太學學者文字不正多往質焉芳音義明辨疑者}
  - {type: page-break, offset: 733, content: '', id: KR2a0020_WYG_055-10b, image: WYG0261/WYG0261-0747b.png}
  - {type: page-break, offset: 733, content: '', id: KR2a0020_WYG_055-11a, image: WYG0261/WYG0261-0747c.png}
  - {type: variant, offset: 733, length: 0, content: '', krp: 俱為中書侍郎俄而詔芳與産入授皇太子經遷太子庶子兼員外散騎常侍從駕洛陽自在路及旋京師恒侍坐講讀芳才思深敏特精經義博聞强記兼覽蒼雅尤長音訓辨析無疑於是禮遇日隆賞賚豐渥正除員外散騎常侍俄兼通直常侍從駕南廵撰述行事尋而除正王肅之來奔也高祖雅相器重朝野屬目芳未及相見高祖宴羣臣於華林肅語次云古者唯婦人有笄男子則無芳曰推經禮正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此專謂凶事也禮初遭䘮男子免時則婦人髽男子冠時則婦人笄言俱時變而男子婦人免髽冠笄之不同也又冠尊故奪其笄稱且互言也非謂男子無笄又禮内則稱子事父母雞初鳴櫛纚笄總以兹而言男子有笄明矣高祖稱善者久之肅亦以芳言為然曰此非劉石經邪昔漢世造三字石經於太學學者文字不正多往質焉芳音義明辨疑者}
  - {type: variant, offset: 734, length: 0, content: '', WYG: 往詢訪故時人號為劉石經酒闌芳與肅俱出肅執芳手曰吾少來留意三禮在南諸儒亟共討論皆謂此義如吾向言今聞往釋頓祛平生之惑芳理義精通類皆如是高祖遷洛路由朝歌見殷比干墓愴然悼懐為文以弔之芳為注解表上之詔曰覧卿注殊為富博但文非屈宋理慙張賈既有雅致便可付之集書詔以芳經學精洽超遷國子祭酒以母憂去官高祖南征宛鄧起為輔國將軍太尉長史從太尉咸陽王禧攻南陽蕭鸞將裴叔業入冦徐州疆場之民頗懐去就高祖憂之以芳為散騎常侍國子祭酒徐州大中正行徐州事後兼侍中從征馬圈高祖崩於行宫及世宗即位芳手加衮冕高祖自襲歛暨于啟祖山陵練除始末喪事皆芳撰定咸陽王禧等奉申遺㫖令芳入授世宗經及南徐州刺史沈陵外叛徐州大水}
  - {type: page-break, offset: 734, content: '', id: KR2a0020_WYG_055-11b, image: WYG0261/WYG0261-0747d.png}
