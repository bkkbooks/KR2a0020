  - {type: variant, offset: 133, length: 0, content: '', WYG: 肇字伯始高祖賜名焉幼為中書學生博通經史及蒼雅林說高祖初為内祕書侍御中散司州初建為都官從事轉通直郎祕閣令遷散騎侍郎典命中大夫車駕南伐肇上表諫止高祖不納尋遷}
