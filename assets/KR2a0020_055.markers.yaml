  - {type: variant, offset: 3410, length: 2, content: 通直, WYG: 盛及清河王懌為宰輔廞皆與其子姪交逰往來靈太后臨朝又與太后兄弟往還相好太后令廞以詩賦授弟元吉歴尚書郎太尉屬中書侍郎冠軍將軍行南青州事尋徵安南将軍光祿大夫孝莊初除國子祭酒復以本官行徐州事前廢帝時除驃騎将軍左光祿大夫出帝初除}
