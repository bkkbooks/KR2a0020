  - {type: variant, offset: 241, length: 136, content: 遂長驅而進賊將周凱望聲遁走彧遣將張永沈攸之等率衆討安都屯于下磕永乃分遣羽林監王穆之領卒五千守輜重於武原龍驤將軍謝善居領卒二千據呂梁散騎侍郎張引領卒二千守茱萸督上租糧供其軍實安都出城見元元依朝旨授其徐州刺史遣中書侍郎高閭李璨等與安都俱還入城別令孔伯恭精甲二千撫安內外然後元入, WYG: 事身死}
