  - {type: variant, offset: 3421, length: 1, content: 慕, krp: 時人嗟惜之追贈本將軍南青州刺史廞弟悅永安中開府記室悅弟戫武定中鎮南将軍金紫光祿大夫戫弟粹徐州别駕朱衣直閤粹少尚氣俠兄廞死粹招合部曲就兗州刺史樊子鵠謀應關西大將軍攻討城陷殺之芳叔撫之孫思祖勇健有將略高祖末入朝歴羽林監梁沛二郡太守員外常侍屢為統軍南征累著功㨗任城王之圍鍾離也蕭衍遣其冠軍将軍張惠紹及彭瓮張豹子等率衆一萬送糧鍾離時思祖為平逺将軍領兵數千邀衍餉軍於邵陽遣其長史元少騎一千於鍾離之北遏其前鋒錄事參軍繆琰掩其後思祖身率精銳橫衝其陳三軍合擊大破之擒惠紹及衍驍騎將軍祁陽縣開國男趙景悅悅弟寧逺将軍景脩寧逺将軍梅世和屯騎校尉任景攸長水校尉邊欣越騎校尉賈慶真龍驤将軍徐敞等俘斬數千人尚書論功擬封千户侯思祖有二婢羙􅐾}
  - {type: variant, offset: 3423, length: 0, content: '', WYG: 善歌舞侍中元暉求之不得事遂停寢後除揚烈将軍遼西太守思祖於路叛奔蕭衍衍以思祖為輔國将軍北徐州刺史領冦淮北數年而死纘子晰歴蕭衍琅邪東莞二郡太守戍朐山朐山人王萬夀斬晰送首以朐山内附并晰子翐於京師數年後以翐為給事中汝陽太守正光初自郡南叛芳從子懋字仲華祖泰之父承伯仕於劉彧並有名位懋聰敏好學博綜經史善草𨽻書多識奇字世宗初入朝拜員外郎遷尚書外兵郎中加輕車將軍芳甚重之凡所撰制朝廷軌儀皆與參量尚書博議懋與殿中郎袁翻常為議主達於從政臺中疑事咸所訪決受詔參議新令性沉雅厚重善與人交器宇淵曠風流甚羙時論高之尚書李平與之結莫逆之友遷步兵校尉領郎中兼東宫中舍人轉員外常侍鎮逺将軍領考功郎中立考課之科明黜陟之法甚有條貫肅宗初大軍攻硤石懋為李平行臺郎中城拔懋頗有大功太傅清河王懌愛其風雅常目而送之曰劉生堂堂搢紳領袖若天假之年必為魏朝宰輔詔懋與諸才學之士撰成儀令懌為宰相積年禮懋尤重令諸子師之遷太尉司馬熙平二年冬暴病卒家甚清貧亡之日徒四壁而已太傅懌及當時才儁莫不痛惜之贈持節前將軍南秦州刺史諡曰宣簡懋詩誄賦頌及諸文筆見稱於時又撰諸品物造作之始十五卷名曰物祖子筠字士貞司員外散騎侍郎歴河南郡丞中散大夫徐州大中正祕書丞天平初卒贈前將軍徐州刺史子規早卒筠弟筟字士文少而聰惠年十二詣尚書王衍衍與語大竒之遂與太傅李延寔祕書李凱上疏薦之拜祕書郎筟亦善士興和元年卒年二十八無子兄子矩繼懋從叔元孫養志丘園不求聞逹高祖幸彭城起家拜蘭陵太守治以清}
