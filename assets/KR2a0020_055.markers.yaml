  - {type: variant, offset: 3444, length: 1, content: 都, WYG: 祖為太子恂納其女為孺子卒子敬先襲爵敬先弟徽奉朝請徐州治中長文弟永字履南頗有将略累著征戰之勤歴位中散大夫龍驤將軍神龜中兼大鴻臚卿持䇿拜高麗王安還除范陽太守芳族兄僧利輕財通俠甚得鄉情高祖幸徐州引見善之拜徐州别駕遷沛郡太守後遂從容鄉里不樂臺官積十餘年朝議慮其有二志徵拜輕車将軍羽林監卒官長子世雄至太山太守世雄弟世明字伯楚頗涉書傳自奉朝請稍遷蘭陵太守彭城内史屬刺史元法僧以城外叛遂送蕭衍衍欲加封爵世明固辭不受頻請衍乞還衍聼之肅宗時徵為諫議大夫孝莊末除征虜將軍南兗州刺史時尒朱世龍等威權自已四方怨叛城民王乞得逼劫世明據州歸蕭衍衍封世明開國縣}
