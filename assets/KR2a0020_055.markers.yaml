  - {type: variant, offset: 732, length: 0, content: '', WYG: 建威府司馬為文秀所殺芳母子入梁鄒城慕容白曜南討青齊梁鄒降芳北徙為平齊民時年十六南部尚書李敷妻司徒崔浩之弟女芳祖母浩之姑也芳至京師詣敷門崔恥芳流播拒不見之芳雖處窮窘之中而業尚貞固聰敏過人篤志墳典晝則傭書以自資給夜則讀誦終夕不寢至有易衣併日之敝而澹然自守不汲汲於榮利不慼慼於賤貧乃著窮通論以自慰焉芳常為諸僧傭寫經論筆迹稱善卷直以一縑歲中能入百餘匹如此數十年頼以頗振由是與徳學大僧多有還往時有南方沙門恵度以事被責未㡬暴亡芳因緣聞知文明太后召入禁中鞭之一百時中官李豐主其始末知芳篤學有志行言之於太后太后微愧於心㑹蕭賾使劉纘至芳之族兄也擢芳兼主客郎與纘相接尋拜中書博士後與崔光宋弁邢産}
