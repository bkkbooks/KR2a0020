  - {type: variant, offset: 6536, length: 4, content: 善儀同開, WYG: 因此遂家彭泗子長猷以父勲起家拜寧逺将軍東平太守尋轉沛郡入為南主客郎中太尉屬襲爵雲陽伯車駕南伐既剋宛城拜長猷南陽太守及鑾輿将反詔長猷曰昔曹公剋荆州留滿寵於後朕今委卿此郡兼統戎馬非直綏初附以扞城相託特賜縑二百疋高祖崩於南陽歛於其郡尋徵䕶軍長史世宗初夀春歸欵兼給事黃門侍郎持節宣慰及任城王為揚州刺史詔長猷為諮議參軍帶安豐太守轉徐州武昌王}
