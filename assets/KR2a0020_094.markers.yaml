  - {type: variant, offset: 734, length: 0, content: '', WYG: 太府卿肅宗踐極之始以騰預在宫衞封開國子食邑三百戸是年靈太后臨朝以與于忠保護之勲除崇訓太僕加中侍中改封長樂縣開國公食邑一千五百戸拜其妻魏氏爲鉅}
  - {type: variant, offset: 734, length: 0, content: '', krp: 太府卿肅宗踐極之始以騰預在宫衞封開國子食邑三百戸是年靈太后臨朝以與于忠保護之勲除崇訓太僕加中侍中改封長樂縣開國公食邑一千五百戸拜其妻魏氏爲鉅}
  - {type: variant, offset: 735, length: 0, content: '', WYG: 郡君每引入内受賞賚亞於諸主外戚所養二子爲郡守尚書郎騰會疾篤靈太后慮或不救遷衞將軍儀同三司餘官仍舊後疾瘳騰之拜命肅宗嘗爲臨軒㑹其日大風寒甚而罷乃遣使持節授之騰㓜充宫役手不解書裁知署名而已姦謀有餘善射人意靈太后臨朝特蒙進寵多所干託内外碎密栖栖不倦洛北永橋太上公太上君及城東三寺皆主脩營吏部嘗望騰意奏其弟爲郡帶戍人資乖越清河王懌抑而不與騰以爲恨遂與領軍元义害懌廢靈太后於宣光殿宫門晝夜長閉内外斷絶騰自執管鑰肅宗亦不得見裁聽傳食而已太后服膳俱廢不免飢寒又使中常侍賈粲假言持肅宗書密令防察义以騰爲司空公表裏擅權共相樹置义爲外禦騰爲内防迭直禁闥共裁刑賞騰遂與崔光同受詔乘歩挽出入殿門四年之中}
