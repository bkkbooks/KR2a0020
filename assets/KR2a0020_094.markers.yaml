  - {type: variant, offset: 8, length: 3, content: 良吏第, WYG: 髙宗立誅愛周等皆具五刑夷三族仇洛齊中山人本姓侯氏外祖父仇欵始出馮翊重泉欵石虎末徙鄴南枋頭仕慕容暐為烏丸護軍長水校尉生二子長曰嵩小曰騰嵩仕慕容垂遷居中山位殿中侍御史嵩有二子長曰廣小曰盆嵩妹子洛齊生而非男嵩養為子因為之姓仇初嵩長女有姿色充冉閔宫闈閔破入慕容儁又轉賜盧豚生子魯元有寵於世祖而知外祖嵩已死唯有三舅每言於世祖世祖為訪其舅是時東方罕有仕者廣盆皆不樂入平城洛齊獨請行曰我養子兼人道不全當為兄弟試禍福也乃乘驢赴京魯元候知將至結從者百餘騎迎於桑乾河見而下拜從者亦同致敬入言于世祖世祖問其才用所宜將授之以官魯元曰臣舅不幸生為閹人唯合與陛下守宫闈耳而不言其養子世祖矜焉賜以奴馬引見尋拜武衛將軍俄而賜爵文安子稍遷給事黄門侍郎魏初禁網疏闊民戸隱匿漏脱者多東州既平綾羅户民樂葵因是請採漏戸供為綸綿自後逃戸占為細繭羅縠者非一於是雜營户帥遍於天下不屬守宰發賦輕易民多私附户口錯亂不可檢括洛齊奏議罷之一屬郡縣從平涼州以功超遷散騎常侍又加中書令寧南將軍進爵零陵公拜侍中平逺將軍冀州刺史為内都大官興安二年卒諡曰康養子儼襲柔和敦敏有長者風太和中為虎牢鎮將初洛齊貴盛之後廣盆坐他事誅世祖以其非仇氏子不與焉還取侯家近屬以儼為子後欲還本而廣有女孫配南安王楨生章武王彬即中山王英弟也仇妃聞而請儼曰由我仇家富貴至此奈何一旦孤背恩養也禎時在内都主司品臣儼𨽻於楨畏憚之遂不敢九年卒諡曰靜子振襲稍遷至中堅將軍長水校尉廣盆並善營産業家于中山號為巨富子孫仕進至州主簿騰曽孫儁位至龍驤將軍驍騎將軍樂平男段覇鴈門原平人父乾慕容垂廣武令太祖初遣騎畧地至鴈門霸年㓜見執因被宫刑乾尋率鄉部歸化雲中霸少以謹敏見知稍遷至中常侍中䕶軍將軍殿中尚書領夀安少府賜爵武陵公出為安東將軍定州刺史世祖親考内外大眀黜陟前定州治中張渾屯告霸前在定州濁貨貪穢便道致財歸之鄉里召霸定對霸不首引世祖以霸近臣而不盡實由此益怒欲斬之恭宗進請遂免霸為庶人霸從弟榮雍州别駕兄弟諸從遂世居廣武城修飾有士風王琚髙平人自云本太原人髙祖始晉豫州刺史琚以泰常中被刑入宮禁小心守節久乃見敘用稍遷為禮部尚書賜爵廣平公加寧南將軍髙祖以琚歴奉先朝志在公正授散騎常侍後為侍中征南將軍冀州刺史假廣平王徴還進為征南將軍進爵髙平王侍中如故遣還冀州髙祖文眀太后東廵冀州親幸其家存問周至還京以其年老拜散騎常侍養老於家前後賜以車馬衣服雜物不可稱計後降爵為公扶老自平城從遷洛邑髙祖以其朝舊遣左右勞問之琚附表自陳初至家多乏蒙賜帛二百疋常飲牛乳色如處子太和二十年冬卒時年九十贈征南將軍冀州刺史諡曰靖養子寄生未襲而亡子蓋海襲祖琚爵初琚年}
