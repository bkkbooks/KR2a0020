  - {type: variant, offset: 13, length: 4, content: 六張恂鹿, WYG: 餘賜得世祖時宫人郭氏本鍾離人眀嚴有母德内外婦孫百口奉之肅若嚴君家内以治蓋海官至青州樂陵太守趙黒字文靜初名海本涼州𨽻户自云其先河内溫人也五世祖術晉末為平逺將軍西夷校尉因居酒泉安彌縣海}
