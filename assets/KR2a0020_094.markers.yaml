  - {type: variant, offset: 5, length: 2, content: 八列, WYG: 二宗愛仇洛齊段霸王琚趙黒孫小張宗之劇鵬張祐抱嶷王遇苻承祖王質李堅秦松白整劉騰賈粲楊範成軌王溫孟鸞平季封津劉思逸夫宮腐之族置於閽寺取則天象事歴百王身乖全品任事宮掖親由褻狎恩生趨走便僻俯仰當寵擅權斯則伊戾豎刁因而禍兩國石顯張讓所以翦二京也豈非形質既虧生命易忽譬之胥靡不懼登髙此亦茍且之事由變不已也王者殷鑒宜改徃轍而後庭婉孌遊宴之地椒壺留連終見任使巧佞由之而自達權幸俄然而復歸斯蓋其由來逺矣非一朝一世也魏氏則宗愛殺帝害王劉騰廢后戮相其間竊官爵盗財賄乘勢使氣爲朝野之患者何可勝舉今謹錄其尤顯焉宗愛不知其所由來以罪爲閹人歴碎職至中常侍正平元年正月世祖大會於江上班賞羣臣以愛爲秦郡公恭宗之監國也每事精察愛天性險暴行多非法恭宗每銜之給事仇尼道盛侍郎任平城等任事東宮微為權勢世祖頗聞之二人與愛並不睦爲懼道盛等案其事遂構告其罪詔斬道盛等於都街時世祖震怒恭宗遂以憂薨是後世祖追悼恭宗愛懼誅遂謀逆二年春世祖暴崩愛所為也尚書左僕射蘭延侍中吳興公和疋侍中太原公薛提等祕不發喪延疋二人議以髙宗沖幼欲立長子徵秦王翰置之祕室提以髙宗有世嫡之重不可廢所宜立而更求君延等猶豫未決愛知其謀始愛負罪於東宫而與呉王余素協乃宻迎余自中宫便門入矯皇后令徵延等延等以愛素賤弗之疑皆隨之入愛先使閹豎三十人持仗於宫内及延等入以次收縛斬於殿堂執秦王翰殺之於永巷而立余余以愛為大司馬大將軍太使都督中外諸軍事領中祕書封馮翊王愛旣立余位居元輔録三省兼摠戎禁坐召公卿權恣日甚内外憚之羣情咸以為愛必有趙髙閻樂之禍余疑之遂謀奪其權愛憤怒使小黄門賈周等夜殺余事在余}
