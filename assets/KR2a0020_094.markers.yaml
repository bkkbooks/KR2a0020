  - {type: variant, offset: 741, length: 10, content: 父壽興沮渠牧犍庫部郎, WYG: 騰之初治宅也奉車都尉周特爲之筮不吉深諫止之騰怒而不用特告人曰必困於三月四月之交至是果死廳事甫成陳屍其下追贈使持節驃騎大將軍太尉公冀州刺史騰之葬日閹官爲義服杖絰衰縞者以百數朝貴皆從軒蓋填塞相屬郊野魏初以来權閹存亡之盛莫及焉靈太后反政追奪爵位發其冢散露骸骨没入財産後騰所養一子叛入蕭衍太后大怒因徙騰餘養於北裔尋遣密使追殺之於汲郡賈粲字季宣酒泉人也太和中坐事腐刑頗涉書記世宗末漸被知識得充内侍自崇訓丞爲長兼中給事中中嘗藥典御轉長兼中常遷光祿少卿光祿大夫靈太后之廢粲與元又劉騰等伺帝動靜右衞奚康}
  - {type: page-break, offset: 741, content: '', id: KR2a0020_WYG_094-22b, image: WYG0262/WYG0262-0337d.png}
