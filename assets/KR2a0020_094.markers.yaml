  - {type: variant, offset: 509, length: 1, content: 恂, WYG: 贈建節將軍懷州刺史諡曰敬宗之兄鸞旗中書侍郎東宫中庶子兼宿衛給事加寧逺將軍賜爵洛陽男轉殿中給事出為散騎常侍冠軍將軍涇州刺史進爵為侯復為殿中給事中常侍卒贈洛州刺史諡曰靖始宗之納南來殷孝祖妻蕭氏劉義隆儀同三司思話弟思度女也多悉婦人儀飾故事太和中初制六宫服章蕭被命在内預見訪採數蒙賜賚蕭兄子超業後名彦㓜隨姑入國娶李洪之女頼其給贍以自濟歴位太尉長史武衛將軍齊州刺史散騎常侍中軍將軍金紫光禄大夫彦時來徃蕭寶夤致敬稱名呼之為尊彦於河隂遇害贈車騎將軍儀同三司徐州刺史子百年西河太守宗之養兄子襲紹爵襲字子業髙祖初除主文中散稍遷員外郎京兆王大農久之除義陽太守為司空劉騰諮議參軍散騎常侍平東將軍光禄大夫太昌初卒年七十七贈驃騎大將軍儀同三司冀州刺史子顥邵郡太守卒贈荆州刺史顥弟璟中散大夫璟弟瑋武定中豫州征西府長史諸中官皆世衰唯趙黑及宗之後家僮數百通於士流劇鵬髙陽人粗覽經史閑曉吏事與王質等俱充宦官}
