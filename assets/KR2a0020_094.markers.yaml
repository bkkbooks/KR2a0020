  - {type: variant, offset: 3116, length: 403, content: 加平南將軍蠻酋田盤石田敬宗等部落萬餘家恃衆阻險不賓王命前後牧守雖屢征討未能降款佗至州單使宣慰示以禍福敬宗等聞佗宿德相率歸附於是闔境清晏寇盜寢息邊民懷之襁負而至者千餘家尋加撫軍將軍又遷中軍將軍在州數載以疾乞還永安二年卒遺令不聽請贈不受賻襚諸子皆遵行之佗性剛直不好俗人交游其投分者必當時名勝清白任真不事家產宅不過三十步又無田園暑不張蓋寒不衣裘其貞儉若此六子讓之字士禮武定末中書侍郎讓之弟諏之字士正早有才學司徒記室參軍天平末入於關西竇瑗字世珍遼西遼陽人自言本扶風平陵人漢大將軍竇武之曾孫崇為遼西太守子孫遂家焉曾祖堪慕容氏漁陽太守祖表馮文通成周太守入國父冏舉秀才早卒普泰初瑗啟以身階級為父請贈詔贈征虜將軍平州刺史瑗年十七便荷帙從師遊學十載始為御史轉奉朝請兼太常博士拜大將軍太原王尒朱榮官因是為榮所知遂表留瑗為北道大行臺左丞以軍功賜爵陽洛男除員外散騎常侍瑗以拜榮官賞新昌男因從榮東討葛榮事平封容城縣開國伯食邑五百戶後, WYG: ''}
