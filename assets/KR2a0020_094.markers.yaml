  - {type: variant, offset: 1548, length: 345, content: 文弔嵇康甚有理致後夜寢室壞壓殞年二十五時人咸傷惜之路邕陽平清淵人世宗時積功勞除齊州東魏郡太守有惠政靈太后詔曰邕莅政清勤善綏民俗比經年儉郡內饑饉羣庶嗷嗷將就溝壑而邕自出家粟賑賜貧窘民以獲濟雖古之良守何以尚茲宜見霑錫以垂奬勸可賜龍竹罒戊馬一匹衣一襲被褥一具班宣州鎮咸使聞知邕以善治民稍遷至南青州刺史而卒閻慶胤不知何許人為東秦州敷城太守在政五年清勤厲俗頻年饑饉慶胤歲常以家粟千石賑恤貧窮民賴以濟其部民楊寶龍等一千餘人申訟美政有司奏曰案慶胤自莅此郡惠政有聞又能自以己粟贍恤饑饉乃有子愛百姓之義如不少加優賚無以厲彼貪殘又案齊州東魏郡太守路邕在郡治能與之相埒語其分贍又亦不殊而聖旨優隆賜以衣馬求情即理謂合同賞靈太后卒無褒賞焉明亮字文德平原人性方厚有識幹自給事中歷員外常侍延昌中世宗臨朝堂親自黜陟授亮勇武, WYG: 車騎}
