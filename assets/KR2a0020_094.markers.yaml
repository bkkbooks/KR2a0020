  - {type: variant, offset: 2711, length: 347, content: 太府少卿除平陽太守後將軍太中大夫正光末清河人房通等三百人頌纂德政乞重臨郡詔許之孝昌中為葛榮圍逼纂以郡降榮榮令纂入信都慰喻都督李瑾欲斬刺史元孚德纂還出又勸榮以水灌城榮遂以纂為常山太守至郡未幾榮滅定州刺史薛曇尚以纂老舊令護博陵鉅鹿二郡纂以疾辭少時卒於家纂所歷任好行小惠蔬食弊衣多涉誣矯而輕財潔己終無受納為百姓所思號為良守永熙中贈平北將軍殷州刺史天平四年重贈本將軍定州刺史裴佗字元化河東聞喜人其先因晉亂避地涼州苻堅平河西東歸桑梓因居解縣焉父景惠州別駕佗容貌魁偉隤然有器望少治春秋杜氏毛詩周易並舉其宗致舉秀才以高第除中書博士轉司徒參軍司空記室揚州任城王澄開府倉曹參軍入為尚書倉部郎中行河東郡事所在有稱績還拜尚書考功郎中河東邑中正世宗親臨朝堂拜員外散騎常侍中正如故轉司州治中以風聞為御史所彈尋會赦免轉征虜, WYG: 龍驤}
