  - {type: variant, offset: 517, length: 1, content: 身, WYG: 稍復其舊奴婢尚六七百人三女並嬪貴室為老壽祖父皆造碑銘自洛就鄉而建之西方云直谷出二貴人石榮者從主書稍進為州自被劾後遂便廢頓子長宣武定中南兖州刺史與侯景反伏法王遇字慶時本名他惡馮翊李潤鎮羌也與雷党不蒙俱為羌中彊族自云其先姓王後改氏鉗耳世宗時復改為王焉自晉世已來恒為渠長父守貴為郡功曹卒遇既貴追贈安西將軍秦州刺史澄城公遇坐事腐刑為中散遷内行令中曹給事中加員外散騎常侍右將軍賜爵富平子遷散騎常侍安西將軍進爵宕昌公拜尚書轉吏部尚書仍常侍例降為侯出為安西將軍華州刺史加散騎常侍幽后之前廢也遇頗言其過及後進幸髙祖對李沖等申后無咎而稱遇謗議之罪沖言果爾遇合死也髙祖曰遇舊人未忍盡之當止黜廢耳遂遣御史馳驛免遇官奪其爵收衣冠以民還私第世宗初兼將作大匠未㡬拜光禄大夫復奪爵廢后馮氏之為尼也公私罕相供恤遇自以常更奉接徃來祗謁不替舊敬衣食雜物每有薦奉后皆受而不讓又至其館遇夫妻迎送謁伏侍立執臣妾之禮遇性巧彊於部分北都方山靈泉道俗居宇及文明太后陵崩洛京東郊馬射壇殿脩廣文昭太后墓園太極殿及東西兩堂内外諸門制度皆遇監作雖年在耆老朝夕不倦跨鞍驅馳與少壯者均其勞逸又長於人事留意酒食之間每逢寮舊具設餚果觴膳精豐然競於榮利趨求勢門趙脩之寵也遇徃還宗承受勑為之監作第宅増於本㫖笞撃作人莫不嗟怒卒於宮初遇之疾也太傅北海王與太妃俱徃臨問視其危惙為之泣下其善奉諸貴致相悲悼如此贈使持節鎮西將軍雍州刺史侯如故始遇與抱嶷並為文明太后所寵前後賜以奴婢數百人馬牛羊他物稱是二人俱號富室遇養弟子厲本郡太守稍遷至右軍將軍襲爵宕昌侯産業有過於遇時苻承祖畧陽氐人也因事為閹人為文明太后所寵自御廐令遷中部給事中散騎常侍輔國將軍賜爵畧陽侯兼典選部事中部如故轉吏部尚書仍領中部髙祖為造甲第數臨幸之進爵畧陽公安南將軍加侍中知都曹事初太后以承祖居腹心之任許以不}
