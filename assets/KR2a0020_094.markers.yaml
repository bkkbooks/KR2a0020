  - {type: variant, offset: 752, length: 1, content: 再, WYG: 之謀殺义也靈太后肅宗同升於宣光殿左右侍臣俱立西階下康生既被囚執粲紿太后曰侍臣懐恐不安陛下宜親安慰太后信之適下殿粲便扶肅宗於東序前御顯陽還閉太后於宣光殿粲既义黨威福亦震於京邑自云本出武威魏太尉文和之後遂移家屬焉時武威太守韋景承粲意以其兄緒爲功曹緒時年向七十未幾又以緒為西平太守比景代下已轉武威太守靈太后反政欲誅粲以又騰黨與不一恐驚動内外乃止出粲}
