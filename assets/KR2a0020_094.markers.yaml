  - {type: variant, offset: 736, length: 4, content: 濟陰乘氏, WYG: 殺之威決於騰又之手八座九卿旦造騰宅參其顔色然後方赴省府亦有歴日不能見者公私屬請唯在財貨舟車之利水陸無遺山澤之饒所在固護剝削六鎭交通互市歲入利息以巨萬計又頗役嬪御時有徴求婦女器物公然受納逼奪隣居廣開室宇天下咸患苦之正光四年三月薨于位年六十賜帛七百匹錢四十萬蠟二百斤鴻臚少卿護喪事中官爲義息衰絰者四十餘}
