  - {type: variant, offset: 380, length: 9, content: 幃幄密謀頗預參議從, WYG: 崔鑒為東徐州北部主書郎公孫處顯為荆州選部監公孫蘧為幽州皆曰有能也實有私焉黒疾其虧亂選體遂爭於殿庭曰以功授官因爵與禄國之常典中書侍郎尚書主書郎諸曹監勲能俱立不過列郡今訢皆用為方州臣實為惑顯祖疑之曰公孫蘧且止蘧最為訢厚於是黒與訢遂為深隙訢竟列黒為監藏時多所截沒先是法禁寛緩百司所典與官並食故多所損折遂黜為門士黒自以為訢所陷歎恨終日廢寢忘食䂓報前怨踰年還入為侍御散騎常侍侍中尚書左僕射復兼選部如昔黒告訢專恣訢遂出為徐州及其將獲罪也黒構成以誅之然後食甘寢安志在於職事出為假節鎮南大}
