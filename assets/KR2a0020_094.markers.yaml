  - {type: variant, offset: 514, length: 2, content: 營產, WYG: 以閽閹為恥文眀太后時亦見眷遇為給事中髙祖遷洛常為宫官事幽后后之惑薛菩薩也鵬宻諫止之不從遂發憤而卒兄買奴亦為宦者歴位幽州刺史才志逺不及鵬是時有季豐之徒數人皆被眷寵出入禁闈並致名位積貲巨萬第宅華壯文眀太后崩後乃漸衰矣張祐字安福安定石唐人父成扶風太守世祖末坐事誅祐充腐刑積勞至曹監中給事賜爵黎陽男稍遷散騎常侍都綰内藏曹時文眀太后臨朝中官用事祐以左右供承合㫖寵幸冠諸閹官特遷為尚書加安南將軍進爵隴東公仍綰内藏曹未㡬監督曹加侍中與王叡等俱入八議太后嘉其忠誠為造甲宅宅成髙祖太后親率文武徃燕會焉拜散騎常侍鎮南將軍尚書左僕射進爵新平王受職於大華庭備威儀于宫城之南觀者以為榮髙祖太后親幸其宅饗會百官祐性恭宻出入機禁二十餘年未曾有過由是特被恩寵嵗月賞賜家累巨萬與王質等十七人俱賜金券許以不死太和十年薨時年四十九髙祖親臨之詔鴻臚典護䘮事賜帛千匹贈征南大將軍司空公諡曰恭葬日車駕親送出郊祐養子顯眀後名慶少歴内職有姿貌江陽王繼以女妻之襲爵降為隴東公又降為侯遷洛廢替二十餘年虚爵而已熙平初為員外常侍兼衞尉少卿以元义姊壻故越次而授焉神龜二年冬靈太后為肅宗采名家女慶女入充世婦未幾為嬪即义甥也正光三年正少卿尋出為將軍髙平鎮將卒子逈洛襲抱嶷字道德安定石唐人居於直谷自言其先姓把將靈帝時把匡為安定太守董卓時懼誅由是易氏即家焉無得而知也幼時隴東人張乾王反叛家染其逆及乾王敗父睹生逃逸得免嶷獨與母没入京都遂為宦人小心慎宻恭以奉上沉跡冗散經十九年後以忠謹被擢累遷為中常侍安西將軍中曹侍御尚書賜爵安定公自總納言職當機近諸所奏議必致抗直髙祖文明太后嘉之以為殿中侍御尚書領中曹如故以統宿衛俄加散騎常侍髙祖太后每出遊幸嶷多驂乘入則後宫導引太后既寵之乃徴其父睹生拜太中大夫賞賜衣馬睹生將退見於皇信堂髙祖執手謂之曰老人歸途㡬日可達好慎行路太和十二年遷都曹加侍中祭酒尚書領中曹侍御後降爵為侯睹生卒贈秦州刺史諡曰靖賜黄金八十斤繒綵及絹八百疋以供䘮用并别使勞慰加嶷大長秋卿嶷老疾請乞外禄乃以為鎮西將軍涇州刺史特加右光禄大夫將之州髙祖餞於西郊樂陽殿以御白羽扇賜之十九年被詔赴洛以刺史從駕南征常參侍左右以嶷耆舊每見勞問數追稱嶷之正直命乗馬出入行禁之閒與司徒馮誕同例軍回還州自以故老前宦為政多守徃法不能遵用新制侮慢舊族簡於接禮天性酷薄雖弟姪甥壻畧無存潤後數年卒於州先以從弟老壽為後又養太師馮熙子次興嶷死後二人爭立嶷妻張氏致訟經年得以熙子為後老壽亦仍陳訴終獲紹爵次興還於本族給奴婢三十口嶷前後賜賞奴婢牛馬蓋數百千他物稱是老壽凡薄酒色肆情御史中尉王顯奏言風聞前洛州刺史隂平子石榮積射將軍抱老壽恣蕩非軌易室而姦臊聲布於朝野醜音被於行路即攝鞫問皆與風聞無差犯禮傷化老壽等即主謹案石榮籍貫兵伍地隔宦流處世無入朝之期在生絶冠冕之望遭時之運逢非次之擢以犬馬延慈簮履恩念自微至貴位階方岳不能懷恩感德上酬天施廼咎彰遐邇嚮穢京墟老壽種類無聞氏姓莫紀丐乞刑餘之家覆養閹人之室蒙國殊澤預班爵序正宜治家假内疑敎誡閨庭方恣其淫姦換妻易妾榮前在洛州逺迎老壽妻常氏兵人千里疲於道路老壽同敝笱之在梁若其原疑之無别男女三人莫知誰子人理所未聞鳥獸之不若請以見事免官付廷尉理罪鴻臚削爵詔可老壽妻常氏萬敵弟女也老壽死後收紀家}
