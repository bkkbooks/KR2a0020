  - {type: variant, offset: 3732, length: 1695, content: 中山太守加征東將軍聲譽甚美為吏民所懷及齊獻武王班書州郡誡約牧守令長稱瑗政績以為勸厲焉後授使持節本將軍平州刺史在州政如治郡又為齊獻武王丞相府右長史瑗無軍府斷割之才不甚稱職又行晉州事既還京師上表曰臣在平州之日蒙班麟趾新制即依朝命宣示所部士庶忻仰有若三章臣聞法象巍巍乃大舜之事政道郁郁亦隆周之軌故元首股肱可否相濟聲教之聞於此為證伏惟陛下應圖臨宇握紀承天克構洪基會昌寶歷式張琴瑟且調宮羽去甚刪泰革弊遷澆俾高祖之德不墜於地畫一既歌萬國歡躍臣伏讀至三公曹第六十六條母殺其父子不得告告者死再三返覆之未得其門何者案律子孫告父母祖父母者死又漢宣云子匿父母孫匿大父母皆勿論蓋謂父母祖父母小者攘羊甚者殺害之類恩須相隱律抑不言法理如是足見其直未必指母殺父止子不言也若父殺母乃是夫殺妻母卑於父此子不告是也而母殺父不聽子告臣誠下愚輒以為惑昔楚康王欲殺令尹子南其子棄疾為王御士而上告焉對曰泄命重刑臣不為也王遂殺子南其徒曰行乎吾與殺吾父行將焉入曰臣乎曰殺父事讎吾不忍乃縊而死注云棄疾自謂不告父為與殺謂王為讎皆非禮春秋譏焉斯蓋門外之治以義斷恩知君殺父而子不告是也母之於父同在門內恩無可掩義無斷割知母將殺理應告父如其已殺宜聽告官今母殺父而子不告便是知母而不知父識比野人義近禽獸且母之於父作合移天既殺己之天復殺子之天二天頓毀豈容頓默此母之罪義在不赦下手之日母恩即離仍以母道不告鄙臣所以致惑今聖化淳洽穆如韶夏食椹懷音梟鏡猶變況承風禀教識善知惡之民哉脫下愚不移事在言外如或有之可臨時議罪何用豫制斯條用為訓誡誠恐千載之下談者諠譁以明明大朝有尊母卑父之論以臣管見實所不取如在淳風厚俗必欲行之且君父一也父者子之天被殺事重宜附父謀反大逆子得告之條父一而已至情可見竊惟聖主有作明賢贊成光國寧民厥用為大非下走頑蔽所能上測但受恩深重輒獻瞽言儻蒙收察乞付評議詔付尚書三公郎封君義立判云身體髮膚受之父母生我勞悴續莫大焉子於父母同氣異息終天靡報在情一也今忽欲論其尊卑辨其優劣推心未忍訪古無據母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將欲何之案春秋莊公元年不稱即位文姜出故服虔注云文姜通兄齊襄與殺公而不反父殺母出隱痛深諱期而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理且聖人設法所以防淫禁暴極言善惡使知而避之若臨事議刑則陷罪多矣惡之甚者殺父害君著之律令百王罔革此制何嫌獨求削去既於法無違於事非害宣布有年謂不宜改瑗復難云尋局判云子於父母同氣異息終天靡報在情一也今欲論其尊卑辨其優劣推心未忍訪古無據瑗以為易曰天尊地卑乾坤定矣又曰乾天也故稱父坤地也故稱母又曰乾為天為父坤為地為母禮喪服經曰為父斬衰三年為母齊衰期尊卑優劣顯在典章何言訪古無據局判云母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將欲何之瑗案典律未聞母殺其父而子有隱母之義既不告母便是與殺父天下豈有無父之國此子獨得有所之乎局判又云案春秋莊公元年不稱即位文姜出故服虔注云文姜通於兄齊襄與殺公而不反父殺母出隱痛深諱期而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理瑗尋注義隱痛深諱者以父為齊所殺而母與之隱痛父死深諱母出故不稱即位非為諱母與殺也是以下文以義絕其罪不為與殺明矣公羊傳曰君殺子不言即位隱之也期而中練父憂少衰始念於母略書夫人遜於齊是內諱出奔猶為罪文傳曰不稱姜氏絕不為親禮也注云夫人有與殺桓之罪絕不為親得尊父之義善莊公思大義絕有罪故曰禮也以大義絕有罪得禮之衷明有讎疾告列之理但春秋桓莊之際齊為大國通于文姜魯公謫之文姜以告齊襄使公子彭生殺之魯既弱小而懼於齊是時天子衰微又無賢霸故不敢讎之又不敢告列惟得告於齊曰無所歸咎惡於諸侯請以公子彭生除之齊人殺公子彭生案郎此斷雖有援引即以情推理尚未遣惑事遂停寢除大宗正卿尋加衞將軍宗室以其寒士相與輕之瑗案法推治無所顧避甚見讎疾官雖通顯貧窘如初清尚之操為時所重領本州大中正以本官兼廷尉卿卒官贈本將軍太僕卿濟州刺史諡曰明羊敦字元禮太山鉅平人梁州刺史祉弟子也性尚閑素學涉書史以父靈引死王事除給事中出為本州別駕公平正直見有非法敦終不判署後為尚書左侍郎徐州撫軍長史永安中轉廷尉司直不拜拜洛陽令後為, WYG: ''}
