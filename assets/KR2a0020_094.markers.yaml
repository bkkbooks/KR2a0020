  - {type: variant, offset: 865, length: 2, content: 張應, WYG: 中官侍貴者靈太后皆許其方岳以範年長拜跪為難所司非要故得早遂其請父子納貨勞役兵民為御史所紏子遂逃竄範事得散赴京師遂廢於家後靈太后念範勤舊乃以範為中侍中安南將軍尋進鎮南將軍崇訓太僕華州太中正卒贈征西將軍秦州刺史成軌字洪義上谷居庸人少以罪刑入事宫掖以謹厚稱除中謁者僕射髙祖意有所欲軌瞻候容色時有奏發輙合帝心從駕南征專進御食于時髙祖不豫常居禁中晝夜無懈車駕還賜帛百匹景明中嘗食典御丞僕射如故轉中給事中歩兵校尉勑侍東宫延昌末遷中常侍中嘗食典御光禄大夫賜始平伯統京染都將轉崇訓太僕少卿遭母憂詔遣主書常顯景弔慰又起為本官進安東將軍崇訓衛尉卿久之超遷中侍中撫軍將軍典御崇訓如故尋除中軍將軍燕州大中正孝昌二年以勤舊封始平縣開國伯食邑三百户肅宗所幸潘嬪以軌為假父頗為中官之所敬憚建義初軌迎於河隂詔令安慰宫内進爵為侯増户三百并前六百户遷衛將軍其年八月卒贈車騎大將軍雍州刺史諡曰孝惠養弟子仲慶襲歴位鎮軍將軍光禄大夫卒子朏襲齊受禪列降王溫字桃湯趙郡欒城人父冀髙邑令坐事被誅溫與兄繼叔俱充宦者髙祖以其謹慎補中謁者小黄門轉中黄門鈎盾令稍遷中嘗食典御中給事中給事東宮加左中郎將世宗之崩羣官迎肅宗於東宫溫於臥中起肅宗與保母扶抱肅宗入踐帝位髙陽王雍既居冢宰慮中人朋黨出為鉅鹿太守加龍驤將軍靈太后臨朝徵還為中常侍光禄大夫賜爵欒城伯安東將軍領崇訓太僕少卿特除使持節散騎常侍撫軍將軍瀛州刺史還除中侍中進號鎮東將軍金紫光禄大夫遷軍騎將軍左光禄大夫光禄勲卿侍中如故孝昌二年封欒城縣開國侯邑六百户溫後自陳本陽平武陽人於是改封武陽縣開國食邑如故建義初於河隂遇害年六十六永安初贈驃騎大將軍儀同三司雍州刺史養子冏哲襲齊受禪例降孟鸞字龍兒}
