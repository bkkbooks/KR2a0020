  - {type: variant, offset: 1258, length: 203, content: 鄭尚弟遠慶先為苑陵令多所受納百姓患之世景下車召而謂之曰與卿親宜假借吾未至之前一不相問今日之後終不相捨而遠慶行意自若世景繩之以法遠慶懼棄官亡走於是僚屬畏威莫不改肅終日坐於廳事未嘗寢息縣史三正及諸細民至即見之無早晚之節來者無不盡其情抱皆假之恩顏屏人密語民間之事巨細必知發姦摘伏有若神明嘗有一吏休滿還郡食人鷄䄡又有一幹受人一帽又食二鷄世景叱之曰汝何敢食甲乙鷄䄡取丙丁之帽吏幹叩頭伏罪於是上下震悚莫敢犯禁坐弟道璵事, WYG: 尋}
