  - {type: variant, offset: 391, length: 9, content: 奚牧略地晉川拜鎮遠, WYG: 儀同三司定州刺史進爵為王克已清儉憂濟公私時有人欲行私賂黒曰髙官禄厚足以自給賣公營私本非情願終無所納髙祖文眀太后幸中山聞之賜帛五百匹榖一千五百石轉冀州刺史太和六年秋薨於官詔賜絹四百五十匹榖一千斛車牛二十乗致柩至都追贈司空公諡曰康黒養族弟趙奴第四子熾為後熾字貴樂初為中散襲黒爵後降為公官至揚州安南府長史加平逺將軍元嵩之死壽春也熾處分安輯微有聲稱神龜中卒贈光州刺史黒為定州與熾納鉅鹿魏幹女有二子長子揆字景則襲父侯爵官至樂陵太守卒贈左將軍滄州刺史揆弟儁之字仲彦輕薄無行為給事中轉謁者僕射為劉騰養息猶以閹官餘資賂遺權門頻歴顯官而卒孫小字茂翹咸陽石安人父瓚姚泓安定護軍為赫連屈丐所侵人懷危懼亡奔者相屬瓚獨率衆拒守見殺小没入宫刑㑹魏平統萬遂徙平城内侍東宫以聰識有智畧稱未㡬轉西臺中散每從征伐屢有戰功多獲賞賜世祖幸𤓰歩慮有北宼之虞乃加小左衛}
