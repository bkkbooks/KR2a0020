  - {type: variant, offset: 5994, length: 3, content: 齊獻武, WYG: 與元瑾等謀反伏誅又有張景嵩毛暢者咸以閽寺在肅宗左右而並黠了甚見知遇俱為小黄門每承間陳元义之惡於肅宗元义之出景嵩暢頗有力焉靈太后反政未即戮义時内外喧喧云义還入知政事暢等恐禍及已乃啓肅宗欲詔右衛將軍楊津宻徃殺义詔書已成未及出义妻知之告太后云景嵩暢與清河}
