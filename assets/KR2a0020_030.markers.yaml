  - {type: 'tls:seg', offset: 196, content: '', id: KR2a0020_ZHSJ_030-d30p3s22}
  - {type: variant, offset: 196, length: 0, content: '', WYG: 伏樹覆按虚實得數十事遂斬斤以徇建孫度太宗時為虎牢鎮監軍世祖即位徵拜殿中給事遷尚書從征赫連昌討蠕蠕並有功賜爵濟陽公加散騎常侍平南將軍詔度率五千騎與叔孫建合擊劉義隆兖州刺史竺靈秀於湖陸大破之後出鎮長安假節都督秦涇梁益雍五州諸軍事開府卒諡曰莊子安都襲降爵為侯世祖拜為太子庶子出為鄯善鎮將高宗時為内都大官卒子買得襲建曾孫樹以善射有寵於顯祖為内侍長稍遷尚書賜爵歴陽侯加龍驤將軍員外常侍出為平西將軍涇州刺史卒安同遼東胡人也其先祖曰世高漢時以安息王侍子入洛歴魏至晉避亂遼東遂家焉父屈仕慕容暐為殿中郎將苻堅滅暐屈友人公孫眷之妹没入苻氏宫出賜劉庫仁為妻庫仁貴寵之同因随眷商販見太祖有濟世之才遂留奉侍性端嚴明惠好長者之言登國初太祖徵兵於慕容垂事在窟咄傳同頻使稱㫖遂見寵異以為外朝大人與和䟦等出入禁中迭典庶事太祖班賜功臣同以使功居多賜以妻妾及隸戸三十馬二匹羊五十口加廣武將軍從征姚平於柴壁姚興悉衆救平太祖乃増築重圍以拒興同進計曰臣受遣詣絳督租見汾東有蒙坑東西三百餘里徑路不通姚興來必從汾西乘高臨下直至柴壁如此則寇内外勢接重圍難固不可制也宜截汾曲為南北浮橋乘西岸築圍西圍既固賊至無}
