  - {type: variant, offset: 1073, length: 0, content: '', krp: 卒贈鎮西大將軍秦州刺史諡曰康王賜綿絹雜綵五百匹衣二十七襲葬禮依盧魯元故事歇襲爵皇興末拜使持節平西將軍豫州刺史延興三年卒子伯主襲爵波利天安二年拜立節將軍樂官侯皇興三年卒兄子洛都襲爵宿石朔方人也赫連屈孑弟文陳之曾孫也天興四年文陳父子歸闕太祖嘉之以宗女妻焉賜奴婢數十口拜為上將軍祖若豆根太宗時賜姓宿氏襲上將軍父㳫干世祖時虎賁幢將從征平涼有功拜虎威將軍侍御郎賜爵漢安男轉中散遷給事兼領工曹從駕討和龍以功賜奴婢十七戸真君四年從駕討蠕蠕戰沒世祖悼惜之詔求㳫干子時石年甫十一引見以㓜聽歸年十三襲爵擢為中散從駕至江拜宣威將軍興光中遷侍御史拜中壘將軍進爵蔡陽子典宜官曹遷内行令從幸苑中遊獵石於髙宗前走馬道峻馬倒殞絶乆之乃蘇由是御馬得制髙宗嘉之賜綿一百斤帛五十匹駿馬一匹改爵義陽子嘗從獵髙宗親欲射虎石叩馬而諌引髙宗至髙原上後虎騰躍殺人詔曰石為忠臣鞚馬切諫免虎之害後有犯罪宥而勿坐賜駿馬一匹尚上谷公主拜駙馬都尉天安初遷散騎常侍吏部尚書進爵太山公為北中道都大將延興元年卒追贈太原王諡曰康葬禮依盧魯元故事太和初子倪襲爵比部侍御來大千代人也父初真從太祖避難叱候山參創業之功官至後將軍武原侯與在}
  - {type: variant, offset: 1074, length: 0, content: '', WYG: 議大千驍果善騎射為騎都尉永興初襲爵遷中散至於朝賀之日大千常著御鎧盤馬殿前朝臣莫不嗟歎遷内幢將典宿衞禁旅大千用法嚴明上下齊肅嘗從太宗校獵見虎在髙巖上大千持矟直前刺之應手而死太宗嘉其勇壯又為殿中給事世祖踐祚與襄城公盧魯元等七人俱為常侍持仗侍衞晝夜不離左右從討赫連昌共長孫道生與賊交戰道生馬倒為賊所擊大千馳救賊衆散走大千扶道生上馬遂得免從討蠕蠕戰功居多遷征北大將軍賜爵廬陵公鎮雲中兼統白道軍事闕賊北叛大千前後追擊莫不乎殄延和初車駕北伐大千為前鋒大破虜軍世祖以其壯勇數有戰功兼悉北境險要詔大千廵撫六鎮以防寇虜經畧布置甚得事宜後吐京胡反以大千為都將討平之在吐京卒喪還停於平城南世祖出還見而問之左右以對世祖悼歎者良乆詔曰大千忠勇盡節功在可嘉今聽喪入殯城内贈司空諡曰莊公子邱頽襲爵降為晉興侯拜安逺將軍從駕到江進右將軍和平中遷中散轉相曹都典奉事皇興四年卒贈寧南將軍陳留公諡曰簡子蕇襲爵邱頺弟提官至監御曹給事冠軍將軍兗州刺史濮陽侯太和十年卒周幾代人也父千有功太祖之世賜爵順陽侯坐事死幾少以善騎射為獵郎太祖即位為殿中侍御史掌宿衛禁兵斷決稱職遷左民尚書神瑞中并州飢民遊食山東詔幾領衆鎮博陵之魯口以安集之泰常初白澗行唐民數千家負嶮不供輸税幾與安康子長孫道生宣示禍福逃民遂還於時郡縣斬叛胡翟猛雀於林慮山猛雀遺種竄於行唐及襄國幾追討盡誅之後為寧朔將軍拒司馬徳宗將劉裕於南破毛徳祖於土樓以功賜爵交趾侯世祖以幾有智勇遣鎮河南威信著於外境幾常嫌奚斤等綏撫關中失和百姓不附每至言論形於聲色斤等憚焉進號宗兵將軍率洛州刺史于栗磾以萬人襲陜城卒於軍軍人無不歎惜之歸葬京師追贈交阯公諡曰桓子歩襲爵卒子安國襲爵太和中討蠕蠕失利伏法爵除豆代田代人也太宗時以善騎射為内細射從攻虎牢詔代田登樓射賊矢不虚發與奚斤前鋒先入擒劉義隆將毛徳祖并長史司馬三人以功遷内三郎從討赫連昌乘勝追賊入其宫門門閉代田踰宫而出世祖壯之拜勇武將軍後從駕平昌以戰功賜奴婢十五口黄金百斤銀百斤神䴥中討蠕蠕賜爵關中侯從討平涼擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田敕斤曰全爾身命者代田功也改爵井陘侯加散騎常侍右衞將軍領内都幢將從討和龍戰功居多遷殿中尚書賜奴婢六十口以前後軍功進爵長廣公加平東將軍從駕南討轉太子太保出為統萬鎮大將興安中卒贈侍中安東大將軍長廣王諡曰恭子求周為内三郎從駕到江賜爵五等子又進爵為侯後襲父爵為吏部尚書皇興二年卒贈征北大將軍長廣王諡曰簡子多侯襲爵周觀代人也驍勇有膂力每在軍陳必應募先登以功進為軍將長史尋轉軍將擊赫連屈丐有功賜爵安川子遷北鎮軍將世祖即位從討蠕蠕以軍功進為都副將鎮雲中神䴥中又討蠕蠕大獲増爵為侯從征平涼進爵金城公遷為都將從破離石胡加散騎常侍轉高平鎮將觀善撫士卒號有威名真君初詔觀統五軍西討秃髪保周於張掖徙其民數百家將置於京師至武威輙與諸將私分之世祖大怒黜觀為金城侯改授内都大官出除平南將軍秦州刺史復爵金城公撫馭失和民薛永宗聚衆於汾曲以叛觀討永宗為流矢所中世祖幸蒲坂觀聞帝至驚怖而起瘡重遂卒世祖怒絶其爵子豆初為三郎遷軍將卒於長樂太守閭大肥蠕蠕人也太祖時與其弟大埿倍頤率宗族歸國太祖善之尚華隂公主賜爵其思子與其弟並為上賔入八議太宗即位進大肥為内都大官増爵為侯神瑞中為都將討越勒部於䟦那山大破之泰常初復為都將領禁兵討蠕蠕獲其大將莫孤渾宜城王奚斤之攻虎牢也大肥與娥清領}
