  - {type: variant, offset: 1392, length: 4, content: 幼承家業, WYG: 勲臣子補龍牧曹奏事中散以牧産不滋坐徙於武川鎮後文祖以舊語譯注皇誥辭義通辨超授陽平太守未拜轉為外都曹奏事中散後坐事伏法史臣曰仁人之言必有博利參合之役威罸實行蓋王建之罪歟安同異類之人智識入用任等時俊當有由哉頡擒赫連昌摧義隆衆遂為名將未易輕也樓伏連邱堆娥清俱以壯勇征伐四克劉尼忠國翼主豈徒驍猛之用乎奚眷將畧致位不能以功名自終車伊洛自逺宅心異凡戎矣宿石等並忠勤勇畧有將帥之才自致青雲豈徒然也魏書卷三十魏書卷三十考證安同傳同長子屈本卷安同父屈仕慕容暐為殿中郎將此云同長子屈是祖孫同一名也當有誤邱堆傳可}
