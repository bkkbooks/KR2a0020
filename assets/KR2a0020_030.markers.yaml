  - {type: punctuation, offset: 1567, content: 、, id: KR2a0020_ZHSJ_030-bkkpn344}
  - {type: variant, offset: 1569, length: 408, content: 李憲等三都督外聲助稚內實防之會鮮于脩禮反於中山以稚為大都督北討尋以本使達鄴城詔稚解行臺罷大使遣河間王琛為大都督酈道元為行臺稚遣子子裕奉表稱與琛同在淮南俱當國難琛敗臣全遂生私𨻶且臨機奪帥非算所長書奏不納琛與稚前到呼沱稚未欲戰而琛不從行達五鹿為脩禮邀擊琛不赴之賊總至遂大敗稚與琛並除名尋而正平郡蜀反復假稚鎮西將軍討蜀都督頻戰有功除平東將軍復本爵後除尚書右僕射未幾雍州刺史蕭寶夤據州反復以稚為行臺討之稚時背疽未愈靈太后勞之曰卿疹源如此朕欲相停更無可寄如何稚答曰死而後已敢不自力時子彥亦患脚痺扶杖入辭尚書僕射元順顧相謂曰吾等備位大臣各居寵位危難之日病者先行無乃不可乎莫有對者時薛鳳賢反於正平薛脩義屯聚河東分據鹽池攻圍蒲坂東西連結以應寶夤稚乃據河東時有詔廢鹽池稅稚上表曰鹽池天資賄貨密邇京畿唯須寶而護之均贍以理今四境多虞府藏罄竭然冀定二州且亡且亂常調之絹不復可收仰惟府庫有出無入必須經綸出入相補略論鹽稅一年之中準絹而言猶不應減, WYG: 卷}
