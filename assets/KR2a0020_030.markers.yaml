  - {type: variant, offset: 1073, length: 0, content: '', WYG: 卒贈鎮西大將軍秦州刺史諡曰康王賜綿絹雜綵五百匹衣二十七襲葬禮依盧魯元故事歇襲爵皇興末拜使持節平西將軍豫州刺史延興三年卒子伯主襲爵波利天安二年拜立節將軍樂官侯皇興三年卒兄子洛都襲爵宿石朔方人也赫連屈孑弟文陳之曾孫也天興四年文陳父子歸闕太祖嘉之以宗女妻焉賜奴婢數十口拜為上將軍祖若豆根太宗時賜姓宿氏襲上將軍父㳫干世祖時虎賁幢將從征平涼有功拜虎威將軍侍御郎賜爵漢安男轉中散遷給事兼領工曹從駕討和龍以功賜奴婢十七戸真君四年從駕討蠕蠕戰沒世祖悼惜之詔求㳫干子時石年甫十一引見以㓜聽歸年十三襲爵擢為中散從駕至江拜宣威將軍興光中遷侍御史拜中壘將軍進爵蔡陽子典宜官曹遷内行令從幸苑中遊獵石於髙宗前走馬道峻馬倒殞絶乆之乃蘇由是御馬得制髙宗嘉之賜綿一百斤帛五十匹駿馬一匹改爵義陽子嘗從獵髙宗親欲射虎石叩馬而諌引髙宗至髙原上後虎騰躍殺人詔曰石為忠臣鞚馬切諫免虎之害後有犯罪宥而勿坐賜駿馬一匹尚上谷公主拜駙馬都尉天安初遷散騎常侍吏部尚書進爵太山公為北中道都大將延興元年卒追贈太原王諡曰康葬禮依盧魯元故事太和初子倪襲爵比部侍御來大千代人也父初真從太祖避難叱候山參創業之功官至後將軍武原侯與在}
