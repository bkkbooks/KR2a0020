  - {type: variant, offset: 792, length: 0, content: '', WYG: 入長安詔頡鎮蒲坂以拒之劉義隆遣將到彦之率衆寇河南以援赫連定世祖以兵少乃攝河南三鎮北渡彥之遂列守南岸至於衡關世祖西征赫連定以頡為冠軍將軍督諸軍擊彦之彦之遣將姚縱夫渡河攻冶坂頡督諸軍擊之斬首三千餘級投水者甚衆遂濟河攻洛陽㧞之擒義隆將二十餘人斬首五千級進攻虎牢虎牢潰義隆司州刺史尹沖墜城死又與琅邪王司馬楚之平滑臺擒義隆將朱脩之李元徳及東郡太守申謨俘獲萬餘人乃振旅還京師神䴥四年卒贈征南大將軍儀同三司進}
