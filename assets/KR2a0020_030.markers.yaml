  - {type: variant, offset: 927, length: 1, content: 取, WYG: 例降為侯出除使持節鎮東將軍定州刺史時太極殿成將行考室之禮引集羣臣而雪不克饗高祖曰朕經始正殿功構初成將集百寮考行大禮然同雲仍結霏雪驟零將由寡昧未能仰答天心此之不德咎竟焉在卿等宜各陳所懐以匡不逮毅稽首對曰雪霜風雨天地之常夏霖冬霰四時恒節今隆冬雪降固是其時又禮云雨沾服失容則廢禮自古而然不足為異高祖曰昔劉秀將濟滹沱為之氷合但朕徳謝古}
