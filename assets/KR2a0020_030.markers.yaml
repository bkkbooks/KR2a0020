  - {type: variant, offset: 195, length: 0, content: '', krp: 北將軍時并州胡酋田卜謀反誅餘衆不安遣斤鎮慮虒以撫慰之斤綏静胡魏甚收聲稱劉義隆遣將到彦之寇河南世祖西征赫連定以斤為衞兵將軍鎮蒲坂關隴平斤徙鎮長安假節鎮西將軍斤遂驕矜不順法度信用左右調役百姓民不堪之南奔漢川者數千家而委罪於雍州刺史陽文祖秦州刺史任延明世祖召問二人各以狀對世祖知為斤所誣遣宜陽}
