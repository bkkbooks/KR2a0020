  - {type: variant, offset: 1077, length: 0, content: '', WYG: 中山王子賀早卒大肥弟驎襲爵出為仇池鎮將卒無子弟鳯襲爵髙宗時為内都大官出為鎮南將軍肆州刺史卒無子爵除尉撥代人也父那濮陽}
  - {type: variant, offset: 1077, length: 0, content: '', krp: 中山王子賀早卒大肥弟驎襲爵出為仇池鎮將卒無子弟鳯襲爵髙宗時為内都大官出為鎮南將軍肆州刺史卒無子爵除尉撥代人也父那濮陽}
  - {type: variant, offset: 1078, length: 1, content: 尉, WYG: 守撥為太學生募從兗州刺史羅忸擊賊於陳汝有功賜爵介休男從討和龍遷虎賁帥轉千人軍將又從樂平王丕討和龍除涼州軍將擊吐谷渾獲其人一千餘落後吐谷渾小將率三百餘落來降尋復亡叛撥率騎追之盡獲而還以功進為子遷晉昌鎮將綏懐邉民甚著稱績入為知臣監出為杏城鎮將在任九年大收民和山民一千餘家上郡徒各盧水胡八百餘落盡附為民高宗以撥清平有惠績賜以衣服顯祖即位為北征都將復為都將南攻懸瓠破劉彧將朱湛之水軍三千人拜懸瓠鎮將加員外散騎常侍進爵安城侯顯祖嘉其聲效復賜衣服轉平南將軍北豫州刺史後洛州民田智度聚黨謀逆詔撥乘傳發豫州兵與洛州刺史邱頓擊之獲智度送京師撥卒贈冠軍將軍諡敬侯陸真代人也父洛侯秦州刺史真少善騎射世祖初以真膂力過人拜内三郎數從征伐所在摧鋒䧟陳前後以功屢受賞賜真君中從討蠕蠕以功賜爵關内侯後攻懸瓠登樓臨射城中弦不虛發劉義隆將王𤣥謨衆數萬人寇滑臺真從世祖討之夜與數人乘小舩突𤣥謨軍入城撫慰登城廵行賊營中乃還渡河至明𤣥謨敗走從駕至江真再破賊軍拜建武將軍石城子還攻盱眙真功居多遷給事中典太倉事髙宗即位拜冠軍將軍進爵都昌侯遷散騎常侍選部尚書時丁零數千家寇竊并定真與并州刺史乞伏成龍自樂平東入與定州刺史許崇之併力討滅從駕廵東海以真為寧西將軍尋遷安西將軍長安鎮將假建平公胡賊帥賀畧孫聚衆千餘人叛於石樓真擊破之殺五百餘人是時初置長虵鎮真率衆築城未訖而氐豪仇傉檀等反叛氐民咸應其衆甚盛真擊平之殺四千餘人卒城長虵而還東平王道符反於長安殺雍州刺史魚𤣥明關中草草以真為長安鎮將賜爵河南公長安兵民素伏威信真到撫慰之皆怡然安静咸陽民趙昌受劉彧署龍驤將軍扇動鄠􅉦厔二縣聚黨數百人據赤谷以叛真與雍州刺史劉邈討平之昌單騎走免後鄠縣民王稚兄弟聚一千餘人招引趙昌始平石安池陽靈武四縣人皆應之衆至五千據治谷堡時詔南郡王李惠等領歩騎六千討昌真以大軍未至慮昌滋蔓與雍州刺史劉邈討昌昌出營拒戰真擊破之斬昌及賊首三千餘級傳首京師并誅其黨與七百餘人獲男女一千餘口雍州民夷莫不震伏在鎮數年甚著威稱延興二年卒歸葬京師}
