  - {type: variant, offset: 1076, length: 0, content: '', WYG: 軍出中道畧地髙平金鄉東至泰山假大肥使持節安陽公鎮撫陳汝世祖初復與奚斤出雲中白道討大檀破之還為内都大官出除使持節冀青二州刺史假滎陽公尋徵還位特進復出為冀青二州刺史尋入為内都大官從討赫連昌以功授滎陽公公主薨復尚濩澤公主又為都將擊大檀大破之還至渇侯山遂討東部高車於己尼陂又征平涼並有功世祖將拜大肥為王遇疾卒追}
