  - {type: variant, offset: 1068, length: 0, content: '', WYG: 為王出為征南將軍定州刺史在州清慎然率多酒醉治日甚少徵為殿中尚書加侍中特進高宗末遷司徒顯祖即位以尼有大功於先朝彌加尊重賜别戸三十皇興四年車駕北征帝親誓衆而尼昏醉兵陳不整顯祖以其功重特恕之免官而已延興四年薨子杜生襲爵世宗時寧朔將軍歩兵校尉熙平初卒贈龍驤將軍朔州刺史諡曰克奚眷代人也少有將畧太祖時有戰功太宗時為尚書假安南將軍虎牢鎮將為寇所憚世祖初為中軍都曹尚書復鎮虎牢賜爵南陽公加使持節侍中都督豫洛二州河内諸軍事鎮南將軍開府尋徙鎮長安世祖幸美稷眷受詔督諸軍共討山胡白龍於西河破之屠其城斬首數千級虜其妻子而還世祖平姑臧遣眷討沮渠牧犍弟私署張掖太守宜得宜得奔酒泉酒泉太守無諱與宜得奔髙昌獲其二城後沮渠天周復據酒泉眷討平之虜男女四千餘人世祖征蠕蠕以眷為尚書督偏將出别道詔㑹陸渾海眷與中山王辰等諸大將俱後期斬於都南爵除車伊洛焉耆胡也世為東境部落帥恒修職貢世祖錄其誠款延和中授伊洛平西將軍封前部王賜絹一百匹綿一百斤繡衣一具金帶鞾帽伊洛大悦規欲歸闕沮渠無諱斷路伊洛與無諱連戰破之時無諱卒其弟天周奪無諱子乾夀兵規領部曲伊洛前後遣使招喻乾夀等率戸五百餘家來奔伊洛送之京師又招喻李寶弟欽等五十餘人送詣敦煌伊洛又率部衆二千餘人伐髙昌討破焉耆東關七城虜獲男女二百人駞千頭馬千匹以金一百斤奉獻先是伊洛征焉耆留其子歇守城而安周乘虚引蠕蠕三道圍歇并遣使謂歇曰爾父已投大魏爾速歸首當賜爾爵號歇固守連戰乆之外無救援為安周所䧟走奔伊洛伊洛收集遺散一千餘家歸焉耆鎮世祖嘉之正平元年詔伊洛曰歇年尚㓜能固守城邑忠節顯著朕甚嘉之可遣歇詣闕伊洛令歇將弟波利等十餘人赴都正平二年伊洛朝京師賜以妻妾奴婢田宅牛羊拜}
