  - {type: variant, offset: 984, length: 0, content: '', WYG: 堆與常山王素督歩兵三萬人為後繼昌戰敗南奔世祖遣堆與宗正娥清率五千騎畧地關右昌貳城守將堅守不下堆與清攻拔之詔堆班師宜城王奚斤表留堆等進平昌許之堆斤合軍與昌相拒擊士馬之糧堆與義兵將軍封禮督租於民間士卒暴掠為昌所襲敗績堆將數百騎還城斤追擊赫連定留堆守輜重斤為定所擒堆聞而棄甲走長安復將髙涼王禮棄守東走蒲坂世祖大怒遣西平公安頡斬堆延和初詔曰堆國之肺腑勲著先朝西征喪師遂從軍法國除祀絶朕甚愍之可賜其子䟦爵淮陵侯加安逺將軍後征蓋吳戰沒子麟襲爵歴位駕部令出為瑕邱鎮將假平南將軍東海公遷東兖州刺史卒官娥清代人也少有將畧累著戰功稍遷振威將軍劉裕遣將朱超石寇平原至畔城遁還清與長孫}
