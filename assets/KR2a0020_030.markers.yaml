  - {type: variant, offset: 788, length: 1, content: 戍, WYG: 内侍長令察舉百寮糾刺姦慝無所回避嘗告其父隂事太宗以為忠特親寵之宜城王奚斤自長安追擊赫連昌至於安定頡為監軍侍御史斤以馬多疫死士衆之糧乃深壘自固遣太僕邱堆等督租於民間為昌所敗昌遂驕矜日來侵掠芻牧者不得出士卒患之頡進計曰本奉詔誅賊今乃退守窮城若不為賊殺當以法誅進退安有生路而王公諸將晏然無謀將何以報恩塞責斤曰今若出戰則馬力不足以歩擊騎終無㨗理當須京師救騎至然後歩陳擊於内騎}
