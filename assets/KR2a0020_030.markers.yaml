  - {type: variant, offset: 790, length: 1, content: 後, WYG: 襲其外所謂萬全之計也頡曰今猛冦遊逸於外而吾等兵疲力屈士有飢色不一决戰則死在旦夕何救兵之可待也等死當戰死寧可坐受困乎斤猶以馬為辭頡曰今兵雖無馬但將帥所乘足得二百騎頡請募壯勇出擊之就不能破可以折其鋭且昌狷而無謀每好挑戰衆皆識之若伏兵掩擊昌可擒也斤猶難之頡乃隂與尉眷等謀選騎待焉昌來攻壘頡出應之昌於陳前自接戰軍士識昌争往赴之會天大風揚塵晝昏衆亂昌退頡等追擊昌馬蹶而墜頡擒昌送於京師世祖大悦拜頡建節將軍賜爵西平公代堆統攝諸軍斤恥功不在已輕追昌弟定於平涼敗績定將}
