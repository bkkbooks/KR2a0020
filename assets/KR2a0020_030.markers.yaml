  - {type: variant, offset: 784, length: 0, content: '', WYG: 從征赫連昌入其城而還車駕北伐蠕蠕遁走世祖聞東部髙車在己尼陂人畜甚衆將遣襲之諸將皆以為難世祖不從遣原與侍中古弼率萬騎討之大獲而還車駕征昌黎原與建寜王崇屯於漠南以備蠕蠕原在朝無所比周然恃寵驕恣多所排抑為子求襄城公盧魯元女魯元不許原告其罪狀事相連逮歴時不决原懼不勝遂謀為逆事洩伏誅臨刑上疏曰臣聞聖不獨明而治鼎不單足而立是以螢火之光猶増日月之曜先臣同往因聖運歸身太祖竭誠戮力立效於險難之中臣以頑闇忝備股肱陛下恩育委以朝政思展㣲誠仰報恩澤而魯元姦佞構成貝錦天威遂加合門俱戮此乃命也非臣之枉但魯元外類忠貞内懐姦詐而陛下任以腹心恐釁發肘腋臣與魯元生為怨人死為讐鬼非以私故謗毁魯元不復眷眷披露誠款原弟頡頡弟聰為内侍聰弟蕯為龍驤將軍給事黄門侍郎賜爵廣宗侯原兄弟外節儉而内實積衆及誅後籍其財至數萬頡辨慧多䇿畧最}
