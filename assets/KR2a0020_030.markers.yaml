  - {type: variant, offset: 793, length: 0, content: '', WYG: 為王諡曰襄頡為將善綏士衆及卒義隆士卒降者無不歎惜同弟䐗太宗時為樂陵太守卒長子國位至冠軍將軍賜爵北平侯杏城鎮將國弟難有巧思陽平王杜超督諸將擊劉義隆難參征南軍事以功表為清河太守世祖時諸將頻征和龍皆以難為長史鑿山堙谷省力兼功遷給事中從駕南征造浮橋於河以功賜爵清河子卒子平城襲爵官至虞曹令為乙渾所殺樓伏連代人也世為酋帥伏連忠厚有器量年十三襲父位領部落太祖初從破賀蘭部又從平中山為太守斬逆賊張翹從征姚平於柴壁以功賜爵安邑侯太祖時為晉兵將軍并州刺史伏連招誘西河胡曹成等七十餘人襲殺赫連屈孑吐京䕶軍及其守士三百餘人并擒叛胡阿度支等二百餘家太宗嘉之拜成等將軍賜爵列侯徵伏連為内都大官世祖即位進爵廣陵公轉衞尉徙光祿勲世祖征蠕蠕伏連留鎮京師進爵為王加平南大將軍又除假節督河西諸軍鎮西大將軍出鎮統萬真君十年}
