  - {type: variant, offset: 1979, length: 541, content: 萬匹也便是移冀定二州置於畿甸今若廢之事同再失臣前仰違嚴旨不先討關賊而解河東者非是閑長安而急蒲坂蒲坂一陷沒失鹽池三軍口命濟贍理絕天助大魏茲計不爽昔高祖昇平之年無所乏少猶創置鹽官而加典護非為物而競利恐由利而亂俗也況今王公素餐百官尸祿租徵六年之粟調折來歲之資此皆出人私財奪人膂力豈是願言事不獲已臣輒符司監將尉還率所部依常收稅更聽後敕稚克寶夤將侯終德寶夤出走雍州平除雍州刺史莊帝初封上黨王尋改馮翊王後降為郡公遷司徒公加侍中兼尚書令大行臺仍鎮長安前廢帝立遷太尉公錄尚書事及韓陵之敗斛斯椿先據河橋謀誅尒朱使稚入洛啟帝誅世隆兄弟之意出帝初轉太傅錄尚書事以定策功更封開國子稚表請回授其姨兄廷尉卿元洪超次子惲初稚生而母亡為洪超母所撫養是以求讓許之出帝入關稚時鎮虎牢亦隨赴長安稚妻張氏生二子子彥子裕後與羅氏私通遂殺其夫棄張納羅羅年大稚十餘歲妒忌防限稚雅相愛敬旁無姻妾僮侍之中嫌疑致死者乃有數四羅生三子紹遠士亮季亮兄弟皆廉武稚少輕俠鬬鷄走馬力爭殺人因亡抵龍門將陳興德家會赦乃免因以後妻羅前夫女呂氏妻興德兄興恩以報之子彥本名儁有膂力以累從父征討功封槐里縣子出帝與齊獻武王構𨻶加子彥中軍大都督行臺僕射鎮弘農以為心膂後從帝入關子彥少嘗墜馬折臂肘上骨起寸餘乃命開肉鋸骨流血數升言戲自若時以為踰於關羽子裕位衞尉少卿, WYG: 考證}
