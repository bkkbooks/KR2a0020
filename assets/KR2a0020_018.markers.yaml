  - {type: variant, offset: 4835, length: 3, content: 妹復繼, WYG: 凡為四卷奏之遷左丞蠕蠕王阿那瓌既得返國其人大飢相率入塞阿那瓌上表請臺賑給詔孚為北道行臺詣彼賑恤孚陳便宜表曰皮服之人未嘗粒食宜從俗因利拯其所無昔漢建武中單于款塞時轉河東米糒二萬五千斛牛羊三萬六千頭以給之斯即前代和戎撫新柔逺之長策也乞以牸牛産羊餬其口命且畜牧繁息是其所便毛血之利惠兼衣食又}
