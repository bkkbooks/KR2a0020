  - {type: variant, offset: 4846, length: 0, content: '', WYG: 世漢與胡通亦立關市今北人阻飢命懸溝壑公給之外必求市易彼若願求宜見聼許又云營大者不計小名圖逺者弗拘近利雖戎狄衰盛歴代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下策昔在代京恒為重備将帥勞止甲士疲力前世苦之計未能致今天祚大魏亂亡在彼朝廷垂天覆之恩廓大造之徳鳩其散亡禮送令返宜因此時善思逺策竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓欵塞漢遣董忠韓昌}
  - {type: page-break, offset: 4846, content: '', id: KR2a0020_WYG_018-11b, image: WYG0261/WYG0261-0267b.png}
  - {type: variant, offset: 4846, length: 0, content: '', krp: 世漢與胡通亦立關市今北人阻飢命懸溝壑公給之外必求市易彼若願求宜見聼許又云營大者不計小名圖逺者弗拘近利雖戎狄衰盛歴代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下策昔在代京恒為重備将帥勞止甲士疲力前世苦之計未能致今天祚大魏亂亡在彼朝廷垂天覆之恩廓大造之徳鳩其散亡禮送令返宜因此時善思逺策竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓欵塞漢遣董忠韓昌}
  - {type: variant, offset: 4847, length: 0, content: '', WYG: 邊郡士馬送出朔方因留衞助又光武時亦令中郎将叚彬置安集掾史隨單于所在參察動静斯皆守吉之元龜安邊之勝策計今朝廷成功不減曩時蠕蠕國敝亦同疇日宜凖昔成謨畧依舊事借其所閑地聼使田牧粗置官屬示相慰撫嚴戒邊兵以見保衞馭以寛仁縻以久策使親不至矯詐疎不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也又云先人有奪人之心待降如受彊敵武非專外亦以防内若從䖏分割配諸州鎮遼逺非轉輸可到悔叛之情變起難測又居人畜業布在原野戎夷性貪見則思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州内徙復不肯從既其如此為費必大朝廷不許孚持白虎幡勞阿那瓌於柔𤣥懐荒二鎮間阿那瓌衆號三十萬隂有異意遂拘留孚載以輼車日給酪一升肉一叚每集其衆坐孚東廂稱為行臺甚加禮敬阿那瓌遂南過至舊京後遣孚等還因上表謝罪有司以孚事下廷尉丞高謙之云孚辱命處孚流罪後拜冀州刺史孚勸課農桑境内稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八家皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力後為葛榮所陷為榮所執兄祐為防城都督兄子子禮為錄事參}
