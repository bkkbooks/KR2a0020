  - {type: variant, offset: 2365, length: 2458, content: 率北中郎將撫冥鎮將光祿卿出除平北將軍幽州刺史卒諡曰貞長子浩字洪達太尉長史他弟渾繼叔父廣平王連渾弟比陵太延五年為司空賜爵嚑公除安遠將軍懷荒鎮大將卒子天琚襲高祖時征虜將軍青州刺史從駕南征拜後將軍尋降公為侯除西中郎將世祖時征虜將軍夏州刺史卒贈本將軍濟州刺史子延伯襲卒河南王曜天興六年封五歲嘗射雀於太祖前中之太祖驚歎焉及長武藝絕人與陽平王熙等並督諸軍講武衆咸服其勇泰常七年薨時年二十二有七子長子提驍烈有父風世祖時襲爵改封潁川王迎昭儀于塞北時年十六有夙成之量殊域敬焉後改封武昌拜使持節鎮東大將軍平原鎮都大將在任十年大著威名後與淮南王他討平吐京叛胡遷使持節車騎大將軍統萬鎮都大將賜馬百匹羊千口甚見寵待太安元年薨年四十七諡曰成王長子平原襲爵忠果有智略顯祖時蠕蠕犯塞從駕擊之平原戰功居多拜假節都督齊兗二州諸軍事鎮南將軍齊州刺史善於懷撫邊民歸附者千有餘家高祖時妖賊司馬小君自稱晉後聚黨三千餘人屯聚平陵號年聖君攻破郡縣殺害長吏平原身自討擊殺七人擒小君送京師斬之又有妖人劉舉自稱天子扇惑百姓復討斬之時歲穀不登齊民飢饉平原以私米三千餘斛為粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓凝之等千餘人詣闕頌之高祖覽而嘉歎及還京師每歲率諸軍屯於漠南以備蠕蠕遷都督雍秦梁益四州諸軍事征南大將軍開府雍州刺史鎮長安太和十一年薨贈以本官加羽葆鼓吹諡曰簡王有五子長子和為沙門捨其子顯以爵讓其次弟鑒鑒固辭詔許鑒身終之後令顯襲爵鑒乃受之鑒字紹達少有父風頗覽書傳沉重少言寬和好士拜通直散騎常侍尋加冠軍將軍守河南尹車駕南伐以鑒為平南將軍還除左衞將軍出為征虜將軍齊州刺史時革變之始百度惟新鑒上遵高祖之旨下釆齊之舊風軌制粲然皆合規矩高祖覽其所上嗟美者久之顧謂侍臣曰諸州刺史皆能如此變風易俗更有何難下詔褒美班之天下一如鑒所上齊人愛詠咸曰耳目更新高祖崩後和罷沙門歸俗棄其妻子納一寡婦曹氏為妻曹氏年齒已長攜男女五人隨鑒至歷城干亂政事和與曹及五子七處受納鑒皆順其意言無不從於是獄以賄成取受狼籍齊人苦之鑒治名大損世宗初以本將軍轉徐州刺史屬徐兗大水民多飢饉鑒表加賑恤民賴以濟先是京兆王愉為徐州王既年少長史盧淵寬以馭下郡縣多不奉法鑒表曰梁郡太守程靈虬唯酒是耽貪財為事虐政殘民寇盜並起黷音悖響盈於道路部境呼嗟僉焉怨酷梁郡密邇偽畿醜聲易布非直有點清風臣恐取嗤荒遠請免所居官以明刑憲詔免靈虬郡徵還京師於是徐境肅然蕭衍角城戍主柴慶宗以城內附鑒遣淮陽太守吳秦生率兵千餘赴之衍淮陰援軍已來斷路秦生屢戰破之乘勝而進遂克角城世宗詔鑒曰知摧角城威謀展稱良以欣然此城襟帶淮滸川路衝要自昔經算未能克之蟻固積紀每成邊害將軍淵規潛運妙略克宣闢境克城功著不日據要扼喉津徑勢阻可謂勳高三捷朕甚嘉焉守御諸宜善以量度矜慰之使尋當別遣年四十二薨贈衞大將軍齊州刺史王如故諡曰悼王長子伯宗員外郎次仲淵蘭陵太守並早卒仲淵弟季偉武定中太尉中兵參軍和字善意鑒薨之後與鑒子伯宗競求承襲尚書令肇奏和太和中出為沙門讓爵於鑒鑒後以和子顯年在弱冠宜承基緒求遜王爵以歸正胤先朝詔終鑒身聽如其請鑒既薨逝和求襲封謹尋詔旨聽傳子顯不許其身和先讓後求有乖道素請令伯宗承襲世宗詔曰和初以讓鑒而鋻還讓其子交讓之道於是乎著其子早終可聽和襲尋拜諫議大夫兼太子率更令轉通直散騎常侍兼東中郎將肅宗時出為輔國將軍涼州刺史坐事免久之除東郡太守正光四年薨贈安東將軍相州刺史子謙字思義襲爵後拜前軍將軍征蠻都督莊帝初於河陰遇害贈散騎常侍征東大將軍儀同三司相州刺史子棽襲齊受禪爵例降鑒弟榮字生高祖時直寢從駕征新野終於羽林監榮弟亮字辟邪威遠將軍羽林監卒贈河間太守亮弟馗字道明太尉府行參軍司徒掾鎮遠將軍太僕少卿出除安西將軍東秦州刺史建義初卒於州贈征東將軍青州刺史河間王脩天賜四年封泰常元年薨無子世祖繼絕世詔河南王曜之子羯兒襲脩爵改封略陽後與永昌王健督諸軍討禿髮保周於番和徙張掖民數百家於武威遂與諸將私自沒入坐貪暴降爵為公後統河西諸軍襲蠕蠕至於漠南仍復王爵加征西大將軍正平初有罪賜死爵除長樂王處文天賜四年封聰辯夙成年十四泰常元年薨太宗悼傷之自小斂至葬常親臨哀慟陪葬金陵無子爵除廣平王連天賜四年封始光四年薨無子世祖繼絕世以陽平王熙之第二子渾為南平王以繼連後加平西將軍渾好弓馬射鳥輒歷飛而殺之時皆歎異焉世祖嘗命左右分射勝者中的籌滿詔渾解之三發皆中世祖大悅器其藝能常引侍左右賜馬百匹僮僕數十人後拜假節都督平州諸軍事領護東夷校尉鎮東大將軍儀同三司平州刺史鎮和龍在州綏導有方民夷悅之徙涼州鎮將都督西戎諸軍事領護西域校尉賜御馬二匹臨鎮清慎恩著涼土更滿還京父老皆涕泣追送若違所親太和十一年從駕巡方山道薨子飛龍襲後賜名霄身長九尺腰帶十圍容貌魁偉雅有風則貞白卓然好直言正諫朝臣憚之高祖特垂欽重除宗正卿右光祿大夫詔曰自今奏事諸臣相稱可云姓名惟南平王一人可直言其封遷左光祿大夫太和十七年薨賜朝服一具衣一襲東園第一祕器絹千匹高祖緦衰臨霄喪哀慟左右醼不舉樂贈衞將軍定州刺史賜帛五百匹諡曰安王子纂襲纂亦有譽於時除恢武將軍進平西將軍領西中郎將出為安北將軍平州刺史景明元年薨於平城子伯和襲永平三年薨贈散騎侍郎諡曰哀王闕統卒贈涼州刺史子思略武定末瀛州治中思略弟叔略武定中太尉主簿京兆王黎天賜四年封神元年薨子根襲改封江陽王加平北將軍薨無子顯祖以南平王霄第二子繼為根後繼字世仁襲封江陽王加平北將軍高祖時除使持節安北將軍撫冥鎮都大將轉都督柔玄撫冥懷荒三鎮諸軍事鎮北將軍柔玄鎮大將入為左衞將軍兼侍中又兼中領軍留守洛京尋除持節平北將軍鎮攝舊都高車酋帥樹者擁部民反叛詔繼都督北討諸軍事自懷朔已東悉禀繼節度繼表高車頑黨不識威憲輕相合集背役逃歸計其兇戾事合窮極若悉追戮恐遂擾亂請遣使鎮別推檢斬愆首一人自餘加以慰喻若悔悟從役者即令赴軍詔從之於是叛徒往往歸順高祖善之顧謂侍臣曰江陽良足大任也車駕北巡至鄴而高車悉降朔清定繼以高車擾叛頻表請罪高祖優詔喻之世宗時除征虜將軍青州刺史轉平北將軍州刺史入為度支尚書繼在青州之日民飢餒為家僮取民女為婦妾又以良人為婢為御史所彈坐免官爵後大將軍高肇伐蜀世宗以繼為平東將軍鎮遏徐揚世宗崩班師及, WYG: 丞}
