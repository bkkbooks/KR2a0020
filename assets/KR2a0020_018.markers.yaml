  - {type: variant, offset: 4841, length: 4, content: 封尋除侍, WYG: 寧肯徙内若依臣請給賑雜畜愛本重鄉必還舊土如其不然禁留益損假令逼徙事非久計何者人面獸心去留難測既易水草痾恙将多憂愁致困死亡必甚兼其餘類尚在沙磧脱出狂悖翻歸舊巢必殘掠邑里遺毒百姓亂而方塞未若杜其未萌又貿遷起於上古交易行於}
