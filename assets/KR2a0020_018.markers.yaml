  - {type: variant, offset: 1350, length: 0, content: '', WYG: 崔光見彧退而謂人曰黑頭三公當此人也少與從兄安豐王延眀中山王熙並以宗室博古文學齊名時人莫能定其優劣尚書郎范陽盧道将謂吏部清河崔休曰三人才學雖無優劣然安豐少於造次中山皂白太多未若濟南風流沉雅時人為之語曰三王楚琳琅未若濟南備圓方彧姿制閑裕吐發流靡琅邪王誦有名人也見之未嘗不心醉忘疲拜前軍将軍中書侍郎奏郊廟歌辭時稱其羙除給事黄門侍郎彧本名亮字仕眀時侍中穆紹與彧同署避紹父諱啟求改名詔曰仕眀風神運吐常自以比荀文若可名彧以取定體相倫之羙彧求復本封詔許復封臨淮寄食相州魏郡又長兼御史中尉彧以為倫叙得之不謝領軍于忠忿言之朝廷曰臨淮雖復風流可觀而無骨鯁之操中尉之任恐非所堪遂去威儀單}
