  - {type: variant, offset: 7806, length: 0, content: '', WYG: 五王列傳魏收書闕後人所補太武皇帝十一男臣照按本書所載景穆帝晉王東平王臨淮王楚王南安王小兒猫兒虎頭龍頭凡十人而云十一男者蓋其一不特闕母氏而并未有名故不可得紀也臨淮王譚傳所替成也替北史作贊臣人龍按文義當以贊字為順然唐書文藝傳杜審言曰我在久壓公等但恨不見替人今諺猶以替字作代字解或魏宗間語以代作為替成亦未可}
