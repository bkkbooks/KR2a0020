  - {type: variant, offset: 5627, length: 355, content: 靈太后所信委太傅清河王懌以親賢輔政參決機事以叉恃寵驕盈志欲無限懌裁之以法叉輕其為人每欲斥黜之叉遂令通直郎宋維告司染都尉韓文殊欲謀逆立懌懌坐禁止後窮治無實懌雖得免猶以兵衞守於宮西別館久之叉恐懌終為己害乃與侍中劉騰密謀靈太后時在嘉福未御前殿騰詐取主食中黃門胡玄度胡定列誣懌云許度等金帛令以毒藥置御食中以害帝自望為帝許度兄弟以富貴騰以具奏肅宗聞而信之乃御顯陽殿騰閉永巷門靈太后不得出懌入遇叉於含章殿後欲入徽章東閤叉厲聲不聽懌曰汝欲反邪叉曰元叉不反正欲縛反人叉命宗士及直齋等三十人執懌衣袂將入含章東省使數十人防守之騰稱詔召集公卿議以大逆論咸畏憚叉無敢異者唯僕射游肇執意不同語在其傳叉騰持公卿議入奏俄而事可夜中殺懌於是假為靈太后辭遜之詔叉遂與太師高陽王雍等輔政常直禁中肅宗呼為姨父自後專綜機要巨細決之威振於內外百僚重跡相, WYG: 恒}
