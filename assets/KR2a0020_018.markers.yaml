  - {type: variant, offset: 295, length: 270, content: 公已下皆驚愕失色莫有對者良久南平公長孫嵩曰從王羣臣乃知宮車晏駕而不審登遐之狀唯陰平公元烈哭泣而去於是朝野兇兇人懷異志肥如侯賀護舉烽於安陽城北故賀蘭部人皆往赴之其餘舊部亦率子弟招集族人往往相聚紹聞人情不安乃出布帛班賜王公以下上者數百匹下者十匹先是太宗在外聞變乃還潛于山中使人夜告北新侯安同衆皆響應太宗至城西衞士執送紹於是賜紹母子死誅帳下閹官宮人為內應者十數人其先犯乘輿者羣臣於城南都街生臠割而食之紹時年十六紹母即獻明皇后妹也美而麗初太祖如賀蘭部見而悅之告獻明后請納焉后曰不可此過美不善且已有夫太祖密令人殺其夫而納之生紹終致大逆焉陽平王熙天興六, WYG: 譚真君三}
