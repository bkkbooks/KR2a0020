  - {type: variant, offset: 6784, length: 326, content: 叉雖去兵權然總任內外殊不慮有黜廢之理也後叉出宿遂解其侍中旦欲入宮門者不納尋除名為民初咸陽王禧以逆見誅其子樹奔蕭衍衍封為鄴王及法僧反叛後樹遺公卿百僚書曰魏室不造姦豎擅朝社稷阽危綴旒非譬元叉險慝狼戾人倫不齒屬籍疏遠素無問望特以太后姻婭早蒙寵擢曾不懷音公行反噬肆茲悖逆人神同憤自頃境土所傳皆云叉狼心蠆毒藉權位而日滋含忍諂詐與日月而彌甚無君之心非復一日篡逼之事旦暮必行抑又聞之夫名以出信信以制義山川隱疾且猶不以名成師兆亂巨君不臣求之史籍有自來矣元叉本名夜叉弟羅實名羅剎夜叉羅剎此鬼食人非遇黑風事同飄墮嗚呼魏境離此二災惡木盜泉不息不飲勝名梟稱不入不為況昆季此名表能噬物日露久矣始信斯言況乃母后幽辱繼主蒙塵釋位揮戈言謀王室不在今日何謂人臣諸賢或弈世載德或將相繼踵或, WYG: 都督並}
