  - {type: variant, offset: 7807, length: 226, content: 末太子中庶子爽弟蠻武定末光祿卿爪字景邕給事中與兄叉同以罪誅繼弟羅侯遷洛之際以墳陵在北遂家於燕州之昌平郡內豐資產唯以意得為適不入京師有賓客往來者必厚相禮遣豪據北方甚有聲稱叉權重以羅侯不樂入仕就拜昌平太守正光末逆賊大俄佛保陷郡見害子景遵直寢太常丞史臣曰梟鏡為物天實生之知母忘父蓋亦禽獸元紹其人此之不若乎陽平以下降年夭促英才武略未顯於時靜簡二王為時稱首鑒既有聲渾亦見器霄荷遇高祖繼受任太和苟無其才名位豈徒及也叉階緣寵私智小謀大任重才弱遂亂天下殺身全祀不亦幸哉, WYG: 魏書卷十八考證}
