  - {type: variant, offset: 4916, length: 3, content: 勳增邑, WYG: 磬十四雖噐名黄鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太蔟編於西北蕤賓列於西南並皆噐象差位調律不和又有儀鍾十四虚懸架首初不叩擊今便删廢以從正則臣今據周禮鳬氏修廣之規磬氏倨句之法吹律求聲叩鍾求音損除繁雜討論實錄依十二月為十二宫各凖辰次當位懸設月聲既備隨用撃奏則會還相為宫之義又得律吕相生之體今量鍾磬之數各以十二架為定奏可于時搢紳之士咸往觀聼靡不咨嗟歎服而返太傅錄尚書長孫承業妙解聲律特復稱善後從出帝入關廣陽王建閭真君三年封楚王後改封廣陽王薨諡曰簡王子石侯襲薨諡曰哀王子遺興襲薨諡曰定王無子石侯弟嘉少沉敏喜愠不形於色兼有武略高祖初拜徐州刺史甚有威惠後封廣陽王以紹建閭後高祖南伐詔嘉斷均口嘉違失指授令賊得免帝怒責之曰叔祖定非世孫何太不上類也及将大漸遺詔以嘉為尚書左僕射與咸陽王禧等輔政遷司州牧嘉表請於京四面築坊三百二十各周}
