  - {type: variant, offset: 1875, length: 133, content: 法壽先令所親微服入境觀察風俗下車便大行賞罰於是境內肅然更滿還朝吏人詣闕訴乞肅宗嘉之詔復州任後徵為太中大夫加左將軍遷平東將軍光祿大夫建義初於河陰遇害贈車騎將軍相州刺史子慶始大司農丞與父同時見害贈前將軍廣州刺史慶始弟慶遵武定末瀛州騎府司馬慶遵弟慶智美容貌有几案才著作佐郎, WYG: 高聰}
