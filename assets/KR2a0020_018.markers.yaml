  - {type: variant, offset: 4847, length: 0, content: '', krp: 邊郡士馬送出朔方因留衞助又光武時亦令中郎将叚彬置安集掾史隨單于所在參察動静斯皆守吉之元龜安邊之勝策計今朝廷成功不減曩時蠕蠕國敝亦同疇日宜凖昔成謨畧依舊事借其所閑地聼使田牧粗置官屬示相慰撫嚴戒邊兵以見保衞馭以寛仁縻以久策使親不至矯詐疎不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也又云先人有奪人之心待降如受彊敵武非專外亦以防内若從䖏分割配諸州鎮遼逺非轉輸可到悔叛之情變起難測又居人畜業布在原野戎夷性貪見則思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州内徙復不肯從既其如此為費必大朝廷不許孚持白虎幡勞阿那瓌於柔𤣥懐荒二鎮間阿那瓌衆號三十萬隂有異意遂拘留孚載以輼車日給酪一升肉一叚每集其衆坐孚東廂稱為行臺甚加禮敬阿那瓌遂南過至舊京後遣孚等還因上表謝罪有司以孚事下廷尉丞高謙之云孚辱命處孚流罪後拜冀州刺史孚勸課農桑境内稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八家皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力後為葛榮所陷為榮所執兄祐為防城都督兄子子禮為錄事參}
