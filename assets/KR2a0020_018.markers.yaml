  - {type: variant, offset: 1767, length: 2, content: 封鄄, WYG: 兼尚書左僕射攝選是時蕭衍遣将圍逼温湯進彧以本官為東道行臺㑹尒朱榮入洛殺害元氏彧撫膺慟哭遂奔蕭衍衍遣其舍人陳建孫迎接并觀彧為人建孫還報稱彧風神閑儁衍亦先聞名深相器待見彧於樂逰園因設宴樂彧聞樂聲歔欷涕淚交下悲感傍人衍為之不樂自前後奔叛皆希㫖稱魏為偽唯彧上表啟常云魏臨淮王衍體彧雅性不以為責及知荘帝踐阼彧以母老請還辭㫖懇切衍惜其人才又難違其意遣其僕射徐勉私勸彧曰昔王陵在漢姜維相蜀在所成名何必本土彧曰死猶願北況於生也衍乃以禮遣彧性至孝事父母盡禮自經違離不進酒肉容貌憔悴見者傷之累除位尚書令大司馬兼錄尚書荘帝追崇武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后將遷神主於太廟以高祖為伯考彧表諌曰漢祖創業香街有太上之廟光武中興南頓立舂陵之寝元帝之於光武疏為絶服猶尚身奉子道入繼大宗高祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義斯奪及金徳将興宣王受寄自兹而降世秉威權景王意存毁冕文王心規裂冠雖祭則魏王而權歸晉室昆之與季實傾曹氏且子元宣王冢𦙍文王成其大業故晉武繼文祖宣景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典禘祫失序著譏前經高祖徳溢寰中道超無外肅祖雖勲格宇宙猶曽奉贄稱臣穆皇后禀徳坤元復将配享乾位此乃君臣竝筵嫂叔同室歴觀墳籍未有其事時荘帝意銳朝臣無敢言者唯彧與吏部尚書李神儁並有表聞詔報曰文穆皇帝勲格四表道邁百王是用考循舊軌恭上尊號王表云漢太上於香街南頓於舂陵漢高不因𤓰瓞之緒光武又無世及之徳皆身受符命不由父祖别廟異寝於理何差文穆皇帝天睠人宅歴數有歸朕忝承下武遂主神噐既帝業有統漢氏非倫若以昔況今不當移寝則魏太祖晉景帝雖王跡已顯皆以人臣而終豈得與餘帝别廟有闕餘序疑漢郡國立廟者欲尊高祖之徳使饗遍天下非關太廟神主獨在外祠薦漢宣之父亦非勲徳所出雖不追尊不亦可乎伯考之名自是尊卑之稱何必凖古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不得同室乎且晉文景共為一代議者云世限七主無定數昭穆既同眀有共室之理禮既有祔嫂叔何嫌禮士祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毁荘帝既逼諸妹之請此辭意黄門侍郎常景中書侍郎邢子才所替成也又追尊兄彭}
