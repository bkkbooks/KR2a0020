  - {type: variant, offset: 1825, length: 0, content: '', WYG: 為政温和好行小惠不能清白而無所侵犯百姓亦以此便之孝静帝宴齊文襄王於華林園孝友因醉自譽又云陛下許賜臣能帝笑曰朕恒聞王自道清文襄曰臨淮王雅㫖舍罪於是君臣俱笑而不罪孝友眀於政理嘗奏表曰令制百家為黨族二十家為閭五家為比隣百家之内有帥二十五徴發皆免苦樂不均羊少狼多復有蠶食此之為弊久矣京邑諸坊或七八百家唯一里正二史庶事無闕而況外州乎請依舊置三正之名不改而百家為四閭閭二比計族省十二丁得十二疋貲絹畧計見管之戸應二萬餘族一歲出貲絹二十四萬疋十五丁出一番兵計得一萬六千兵此富國安人之道也古諸侯娶九女士有一妻二妾晉令諸王置妾八人郡公侯妾六人官品令第一第二品有四妾第三第四有三妾第五第六有二妾第七第八有一妾所以隂教聿脩繼嗣有廣廣繼嗣孝也脩隂教禮也而聖朝忽棄此數由來漸久将相多尚公主王侯亦娶后族故無妾媵習以為常婦人多幸生逢今世舉朝略是無妾天下殆皆一妻設令人彊志廣娶則家道離索身事迍邅内外親知共相嗤怪凡今之人通無凖節父母嫁女則教之以妒姑姊逢迎必相勸以忌持制夫為婦徳以能妬為女工自云受人欺畏他笑我王公猶自一心已下何敢二意夫妬忌之心生則妻妾之禮廢妻妾之禮廢則姦淫之兆興斯臣之所以毒恨者也請以王公第一品娶八通妻以備九女稱事二品備七三品四品備五五品六品則一妻二妾限以一周悉令充數若不充數及待妾非禮使妻妒加捶撻免所居官其妻無子而不娶妾斯則自絶無以血食祖父請科不孝之罪離遣其妻臣之赤心義唯家國欲使吉凶無不合禮貴賤各有其宜省人帥以出兵丁立倉儲以豐穀食設賞格以擒姦盜行典令以示朝章庶使足食足兵人信之矣又冒申妻妾之數正欲使王侯將相功臣子弟苗𦙍滿朝傳祚無窮此臣之志也詔付有司議奏不同孝友又言今人生為皂隸葬擬王侯存沒異途無復節制崇壮丘壠盛飾祭儀隣里相榮稱為至孝又夫婦之始王化所先共食合瓢足以成禮而今之富者彌奢同牢之設甚於祭槃累魚成山山有林木林木之上鸞鳳斯存徒有煩勞終成委棄仰惟天意其或不然請自兹以後若婚葬過者以違㫖論官司不加糾劾即與同罪孝友在郡積年以法自守甚著聲稱然性無骨鯁善事權勢為正直者所譏}
