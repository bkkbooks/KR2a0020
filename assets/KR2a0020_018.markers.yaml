  - {type: variant, offset: 1403, length: 360, content: 以河梁立義之功封安康縣開國伯食邑五百戶除散騎常侍平東將軍卒贈使持節征東將軍青州刺史出帝時復贈驃騎大將軍儀同三司冀州刺史均六子長子忻之性粗武幼有氣力釋褐定州平北府中兵參軍稍遷尚書右中兵郎以河渚起義之勳賜爵東阿侯初孝莊之圖尒朱榮元天穆也忻之密啟臨事之日乞得侍立手斬二人及榮之死百僚入賀忻之獨蒙勞問莊帝崩於晉陽忻之內懼及齊獻武王起義河北忻之奔赴後廢帝時除散騎常侍大丞相右長史出帝初襲先封安康縣開國伯除撫軍將軍北徐州刺史便道之州屬樊子鵠據瑕丘反遂於中途遇害以死王事追贈使持節都督定殷二州諸軍事驃騎大將軍司空公定州刺史諡曰文貞忻之弟慶鸞武定末司徒諮議參軍慶鸞弟慶哲終於司農少卿贈中軍將軍濟州刺史均弟禹容貌魁偉起家司空參軍轉符璽郎太常丞鎮遠將軍東海太守帶峒峿戍主禹頗好內學每云晉地有福孝昌末遂詣尒朱榮建義元年與榮同入洛除中軍將軍金紫, WYG: 左}
