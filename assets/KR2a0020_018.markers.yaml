  - {type: variant, offset: 7324, length: 0, content: '', WYG: 臣昔不在其後自此以來飜成陵谷徽遂一歲八遷位居宰相臣乃積年淹滯有功不錄自徽執政以來非但抑臣而已北征之勲皆被擁塞将士告捷終無片賞雖為表請多不蒙遂前留元摽據于盛樂後被重圍析骸易子倒懸一隅嬰城二載賊散之後依階乞官徽乃盤退不允所請而徐州下邳戍主賈勲法僧叛後蹔被圍逼固守之勲比之}
  - {type: page-break, offset: 7324, content: '', id: KR2a0020_WYG_018-19b, image: WYG0261/WYG0261-0271b.png}
  - {type: variant, offset: 7324, length: 0, content: '', krp: 臣昔不在其後自此以來飜成陵谷徽遂一歲八遷位居宰相臣乃積年淹滯有功不錄自徽執政以來非但抑臣而已北征之勲皆被擁塞将士告捷終無片賞雖為表請多不蒙遂前留元摽據于盛樂後被重圍析骸易子倒懸一隅嬰城二載賊散之後依階乞官徽乃盤退不允所請而徐州下邳戍主賈勲法僧叛後蹔被圍逼固守之勲比之}
  - {type: variant, offset: 7325, length: 1, content: 幾, WYG: 重乃立得州即授開國天下之事其流一也功同賞異不平謂何又驃騎李崇北征之日啟募八州之人聼用關西之格及臣在後依此科賞復言北道征者不得同於關西定襄陵廟之至重平城守國之要鎮若計此而論功亦何負於秦楚但以嫉臣之故便欲望風排抑然其當途以來何直退勲而已但是隨臣征者即便為所嫉統軍袁叔和曽經省訴徽初言有理又聞北征隸臣為統應時變色復令臣兄子仲顯異端訟臣緝緝翩翩謀相誹謗言臣惡者接以恩顔稱臣善者即被嫌責甄琛曽理臣屈乃視之若仇讐徐紇頗言臣短即待之如親戚又驃騎長史祖瑩昔在軍中妄増首級矯亂戎行蠧害軍府獲罪有司避命山澤直以謗臣之故徽乃還雪其罪臣府司馬劉敬比送降人既到定州飜然背叛賊如決河豈其能擁且以臣府參寮不免身首異處徽既怒遷捨其元惡闕及胥徒從臣行者莫不悚懼頃恒州之人乞臣為刺史徽乃斐然言不可測及降戸結謀臣頻表啟徽乃因執言此事及向定州逺彼姦惡又復論臣将有異志飜覆如此欲相陷沒致令國朝遽賜遷代賊起之由誰使然也徽既優幸任隆一世慕勢之徒於臣何有是故餘人攝選車駕填門及臣居邊賓逰罕至臣近比為慮其為梗是以孜孜乞赴京闕屬流人舉斧元戎垂翅復從後命自安無所僶俛先驅不敢辭事及臣出都行塵未滅已聞在後復生異議言臣將兒自隨證為可疑之兆忽稱此以構亂悠悠之人復傳音響言左軍臣融右軍臣衍皆受密勑伺察臣事徽既用心如此臣将何以自安竊以天步未夷國難猶梗方伯之任於斯為急徽昔臨藩乃}
