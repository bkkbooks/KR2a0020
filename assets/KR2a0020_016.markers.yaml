  - {type: variant, offset: 449, length: 411, content: 容進止可觀使迎左昭儀於蠕蠕進爵為公卒曲陽侯素延桓帝之後也以小統從太祖征討諸部初定并州為刺史太祖之驚於栢肆也并州守將封竇真為逆素延斬之時太祖意欲撫悅新附悔參合之誅而素延殺戮過多坐免官中山平拜幽州刺史豪奢放逸左遷上谷太守後賜爵曲陽侯時太祖留心黃老欲以純風化俗雖乘輿服御皆去彫飾咸尚質儉而素延奢侈過度太祖深銜之積其過因徵坐賜死順陽公郁桓帝之後也少忠正亢直初以羽林中郎內侍勤幹有稱高宗時位殿中尚書從高宗東巡臨海以勞賜爵順陽公高宗崩乙渾專權隔絕內外百官震恐計無所出郁率殿中衞士數百人從順德門入欲誅渾渾懼逆出問郁曰君入何意郁曰不見天子羣臣憂懼求見主上渾窘怖謂郁曰今大行在殯天子諒闇故未接百官諸君何疑遂奉顯祖臨朝後渾心規為亂朝臣側目郁復謀殺渾為渾所誅顯祖錄郁忠正追贈順陽王諡曰簡宜都王目辰桓帝之後也初以羽林郎從太祖南伐至江高宗即位以勞累遷侍中尚書左僕射封南平公乙渾之謀亂也目辰與兄郁議欲殺渾事泄被誅目辰逃隱得免顯祖傳位有定策勳高祖即位遷, WYG: 同三}
