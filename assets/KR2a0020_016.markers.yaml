  - {type: variant, offset: 2548, length: 0, content: '', WYG: 頃境土所傳皆云义狼心蠆毒藉權位而日滋含忍諂詐與日月而彌甚無君之心非復一日簒逼之事旦暮必行抑又聞之夫名以出信信以制義山川隠疾且猶不以名成師兆亂巨君不臣求之史籍有自来矣元义本名夜义弟羅實名羅刹夜义羅刹此鬼食人非遇黑風事同飄堕嗚呼魏境離此二災惡木盜泉不息不飲}
