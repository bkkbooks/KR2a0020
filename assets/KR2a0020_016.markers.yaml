  - {type: page-break, offset: 2492, content: '', id: KR2a0020_WYG_016-12b, image: WYG0261/WYG0261-0251b.png}
  - {type: variant, offset: 2492, length: 0, content: '', krp: 皆能如此變風易俗更有何難下詔褒羙班之天下一如鑒所上齊人愛詠咸曰耳目更新髙祖崩後和罷沙門歸俗棄其妻子納一寡婦曹氏為妻曹氏年齒已長攜男女五人隨鑒至歴城干亂政事和與曹及五子七處受納鑒皆順其意言無不從於是獄以賄成取受狼籍齊人苦之鑒治名大損世宗初以本將軍轉徐州刺史屬徐兗大水民多飢饉鑒表加賑恤民賴以濟先是京兆王愉為徐州王既年少長史盧淵寛以馭下郡縣多不奉法鑒表曰梁郡太守程靈虬唯酒是躭貪財為事虐政殘民寇盗並起黷音悖響盈於道路部境呼嗟僉焉怨酷梁郡宻邇偽畿醜聲易布非直有點清風臣恐取嗤荒逺請免所居官以明刑憲詔免靈虬郡徴還京師於是徐境肅然蕭衍角城戍主柴慶宗以城内附鑒遣淮陽太守呉秦生率兵千餘赴之衍淮隂援軍已來斷路秦生屢戰破之乘勝而進遂剋角城世宗詔鑒曰知摧角城威謀展稱良以欣然此城襟帶淮滸川路衝要自昔經算未能剋之蟻固積紀每成邊害將軍淵䂓潛運妙略克宣闢境剋城功著不日據要扼喉津徑勢阻可謂勲髙三捷朕甚嘉焉守御諸宜善以量度矜慰之使尋當别遣年四十二薨贈衞大將軍齊州刺史王如故諡曰悼王長子伯宗員外郎次仲淵蘭陵太守並早卒仲淵}
  - {type: variant, offset: 2493, length: 0, content: '', WYG: 季偉武定中太尉中兵參軍和字善意鑒薨之後與鑒子伯宗競求承襲尚書令肇奏和太和中出為沙門讓爵於鑒鑒後以和子顯年在弱冠宜承基緒求遜王爵以歸正𦙍先朝詔終鑒身聽如其請鑒既薨逝和求襲封謹尋詔㫖聽傳子顯不許其身和先讓後求有乖道素請令伯宗承襲世宗詔曰和初以讓鑒而鑒還讓其子交讓之道於是乎著其子早終可聽和襲尋拜諫議大夫兼太子率更令轉通直散騎常侍兼東中郎將肅宗時出為輔國將軍涼州刺史坐事免久之除東郡太守正光四年薨贈安東將軍相州刺史子謙字思義襲爵後拜前軍將軍征蠻都督莊帝初於河隂遇害贈散騎常侍征東大將軍儀同三司相州刺史子棽襲齊受禪爵例降鑒弟榮字瓫生髙祖時直寢從駕征新野終於羽林監榮弟亮字辟邪威遠將軍羽林監卒贈河間太守亮弟馗字道明太尉府行參軍司徒掾鎮遠將軍太僕少卿出除安西將軍東秦州刺史建義初卒於州贈征東將軍青州刺史河間王修天賜四年封泰常元年薨無子世祖繼絶世詔河南王曜之子羯兒襲修爵改封略陽後與永昌王健督諸軍討秃髪保周於番和徙張掖民數百家於武威遂與諸將私自沒入坐貪暴降爵為公後統河西諸軍襲蠕蠕至於漠南仍復王爵加征西大將軍正平初有罪賜死爵除長樂王處文天賜四年封聰辯夙成年十四泰常元年薨太宗悼傷之自小斂至葬常親臨哀慟陪葬金陵無子爵除廣平王連天賜四年封始光四年薨無子世祖繼絶世以陽平王熙之第二子渾為南平王以繼連後加平西將軍渾好弓馬射鳥輒歴飛而殺之時皆歎異焉世祖嘗命左右分射勝者中的籌滿詔渾解之三發皆中世祖大悅器其藝能常引侍左右賜馬百匹僮僕數十人後拜假節都督平州諸軍事領護東夷校尉鎮東大將軍儀同三司平州刺史鎮和龍在州綏導有方民夷悅之徙涼州鎮將都督西戎諸軍事領護西域校尉賜御馬二匹臨鎮清慎恩著涼土更滿還京父老皆涕泣追送若違所親太和十一年從駕廵方山道薨子飛龍襲後賜名霄身長九尺腰帶十圍容貌魁偉雅有風則貞白卓然好直言正諫朝臣憚之髙祖特垂欽重除宗正卿右光祿大夫詔曰自今奏事諸臣相稱可云姓名惟南平王一人可直言其封遷左光祿大夫太和十七年薨賜朝服一具衣一襲東園第一祕器絹千匹髙祖緦衰臨霄喪哀動左右醼不舉樂贈衛將軍定州刺史賜帛五百匹諡曰安王子纂襲纂亦有譽於時除恢武將軍進平西將軍領西中郎將出為安北將軍平州刺史景明元年薨於平城子伯和襲永平三年薨贈散騎侍郎諡曰哀王闕一版統卒贈涼州刺史}
