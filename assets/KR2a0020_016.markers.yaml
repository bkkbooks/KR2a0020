  - {type: variant, offset: 1476, length: 0, content: '', WYG: 拜侍中轉征西大將軍遷司徒賜安車几杖入朝不趨太和十二年薨年七十三時髙祖有事宗廟始薦聞薨為之廢祭輿駕親臨哀慟詔有司監護喪事禮賵有加追贈平東大將軍定州牧司徒如故諡曰靖王他三子世子吐萬早卒贈冠軍并州刺史晉陽順侯子顯襲祖爵薨諡曰僖王子世遵襲世宗時拜前軍將軍行幽州事兼西中郎將又行青州事尋遷}
