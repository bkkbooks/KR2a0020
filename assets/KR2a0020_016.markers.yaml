  - {type: variant, offset: 26, length: 6, content: 之曾孫也初從, WYG: 賀夫人生清河王紹大王夫人生陽平王熙王夫人生河南王曜河間王修長樂王處文二王母氏闕段夫人生廣平王連京兆王黎皇子渾及聰母氏並闕皆早薨無後清河王紹天興六年封兇狠險悖不遵教訓好輕遊里巷刼剝行人斫射犬豕以為戲樂}
