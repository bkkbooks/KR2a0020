  - {type: variant, offset: 2719, length: 2965, content: 臣順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啟云尚書百揆之本令僕納言之貴不宜下隸中尉送名御史尋亦蒙敕聽如其奏從此迄今使無準一臣初上臺具見其事意欲申請決議但以權兼未宜便爾日復一日遂歷炎涼去月朔旦臺移尚書索應朝名帳而省稽留不送尋復移催并主吏忽為尚書郎中裴獻伯後注云案舊事御史中尉逢臺郎於複道中尉下車執板郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕旋省二三未解所以正謂都省別被新式改易高祖舊命即遣移問事何所依又獲尚書郎中王元旭報出蔡氏漢官似非穿鑿始知裴王亦規壞典謨兩人心欲自矯臣案漢書宣秉傳云詔徵秉為御史中丞與司隸校尉尚書令俱會殿庭並專席而坐京師號之為三獨坐又尋魏書崔琰傳晉文陽傅嘏傳皆云既為中丞百僚震悚以此而言則中丞不揖省郎蓋已久矣憲臺不屬都堂亦非今日又尋職令云朝會失時即加彈糾則百官簿帳應送上臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宜付御史又亦彰矣不付名至否臧何驗臣順專執未為平通先朝曲遂豈是正法謹案尚書郎中臣裴獻伯王元旭等望班士流早參清宦輕弄短札斐然若斯苟執異端忽焉至此此而不綱將隳朝令請以見事免獻伯等所居官付法科處尚書納言之本令僕百揆之要同彼浮虛助之乖失宜明首從節級其罪詔曰國異政不可據之古事付司檢高祖舊格推處得失以聞尋從子思奏仍為元天穆所忿遂停元顥之敗封安定縣子孝靜時位侍中而死萇弟珍字金雀襲爵艾陵男世宗時曲事高肇遂為帝寵昵彭城王勰之死珍率壯士害之後卒於尚書左僕射平弟長生位游騎擊將軍卒孝莊時以子天穆貴盛贈司空天穆性和厚美形貌善射有能名年二十起家員外郎六鎮之亂尚書令李崇廣陽王深北討天穆奉使慰勞諸軍路出秀容尒朱榮見其法令齊整有將領氣深相結託約為兄弟未幾榮請天穆為行臺朝廷不許改授別將令赴秀容是時北鎮紛亂所在蜂起六鎮蕩然無復蕃捍惟榮當職路衝招聚散亡天穆為榮腹心除并州刺史及榮赴洛天穆參其始謀乃令天穆留後為之繼援莊帝踐阼天穆以榮之眷昵特除太尉封上黨王徵赴京師榮之討葛榮詔天穆為前軍都督率京師之衆以赴之榮擒葛榮天穆增封通前三萬戶尋監國史錄尚書事開府世襲并州刺史初杜洛周鮮于脩禮為寇瀛冀諸州人多避亂南向幽州前北平府主簿河間邢杲擁率部曲屯據鄚城以拒洛周葛榮垂將三載及廣陽王深等敗後杲南渡居青州北海界靈太后詔流人所在皆置命屬郡縣選豪右為守令以撫鎮之時青州刺史元世儁表置新安郡以杲為太守未報會臺申汰簡所授郡縣以杲從子子瑤資蔭居前乃授河間太守杲深恨於是遂反所在流人先為土人凌忽聞杲起逆率來從之旬朔之間衆踰十萬劫掠村塢毒害民人齊人號之為崯榆賊先是河南人常笑河北人好食榆葉故因以號之杲東掠光州盡海而還又破都督李叔仁軍詔天穆與齊獻武王討大破之杲乃請降傳送京師斬之增天穆邑萬戶時元顥乘虛陷滎陽天穆聞莊帝北巡自畢公壘北渡會車駕於河內尒朱榮以天時炎熱欲還師天穆苦執不可榮乃從之莊帝還宮加太宰羽葆鼓吹增邑通前七萬戶天穆以疏屬本無德望憑藉尒朱爵位隆極當時燻灼朝野傾悚王公已下每旦盈門受納財貨珍寶充積而寬柔容物不甚見疾於時莊帝以其榮黨外示寵敬詔天穆乘車馬出入大司馬門天穆與榮相倚情寄特甚榮常以兄禮事之而尒朱世隆等雖榮子姪位遇已重畏憚天穆俯仰承迎天穆曾言世隆之失榮即加杖其相親任如此莊帝內畏惡之與榮同時見殺前廢帝初贈丞相柱國大將軍雍州刺史假黃鉞諡曰武昭子儼襲美才貌位都官尚書及齊受禪聞敕召假病遂怖而卒西河公敦平文帝之曾孫也太祖初從征被堅執銳名冠諸將後從征中山所向無前太宗時拜中都大官世祖時進爵西河公寵遇彌篤卒子撥襲司徒石平文帝之玄孫也忠勇有膽略尤善騎射從世祖南討至瓜步位尚書令雍州刺史歷比部侍郎華州刺史累遷征南大將軍卒贈司徒公武衞將軍謂烈帝之第四子也寬雅有將略常從太祖征討有功除武衞將軍後謝老歸家顯祖善禮遇之賜几杖服物致膳於第卒賜祕器子烏真膂力絕人隨太祖征伐屢有戰功官至鉅鹿太守子興都聰敏剛毅高宗時為河間太守賜爵樂城子為政嚴猛百姓憚之顯祖初以子丕貴重進爵樂城侯謝老歸家顯祖益禮之賜几杖服物致膳於第其妻婁氏為東陽王太妃卒追贈定州刺史河間公諡曰宣子提襲父侯爵提弟丕世祖擢拜羽林中郎從駕臨江賜爵興平子顯祖即位累遷侍中丞相乙渾謀反丕以奏聞詔丕帥元賀牛益得收渾誅之遷尚書令改封東陽公高祖時封東陽王拜侍中司徒公時有諸疑事三百餘條敕丕制決率皆平允丕子超生車駕親幸其第特加賞賜以執心不二詔賜丕入八議傳示子孫犯至百聽責數恕之放其同籍丁口雜使役調永受復除若有姦邪人方便讒毀者即加斬戮尋遷太尉錄尚書事時淮南王他淮陽王尉元河東王苟頹並以舊老見禮每有大事引入禁中乘步挽杖于朝進退相隨丕他元三人皆容貌壯偉腰帶十圍大耳秀眉鬚鬢斑白百僚觀瞻莫不祗聳唯苟頹小為短劣姿望亦不逮之高祖文明太后重年敬舊存問周渥賜以珍寶丕聲氣高朗博記國事饗讌之際居坐端必抗音大言列既往成敗帝后敬納焉然諂事要人驕侮輕賤每見王叡苻承祖常傾身下之時文明太后為王叡造宅故亦為丕造甲第第成帝后親幸之率百官文武饗落焉使尚書令王叡宣詔賜丕金印一紐太后親造勸戒歌辭以賜羣官丕上疏贊謝太后令曰臣哉隣哉隣哉臣哉君則亡逸於上臣則履冰於下若能如此太平豈難致乎及丕妻段氏卒諡曰恭妃又特賜丕金券高祖文明太后引見公卿於皇信堂太后曰今京師旱儉欲聽飢貧之人出關逐食如欲給過所恐稽延時日不救災窘若任其外出復慮姦良難辨卿等可議其所宜丕議諸曹下大夫以上人各將二吏別掌給過所州郡亦然不過三日給之便訖有何難也高祖從之四日而訖丕請立東宮詔曰年尚幼小有何急之丕曰臣年在西夕思觀盛禮於臣實急不許後例降王爵封平陽郡公求致任詔不許及車駕南伐丕與廣陵王羽留守京師並加使持節詔丕羽曰留守非賢莫可太尉年尊德重位總阿衡羽朕之懿弟溫柔明斷故使二人留守京邑授以二節賞罰在手其祗允成憲以稱朕心丕對曰謹以死奉詔羽對曰太尉宜專節度臣但可副貳而已高祖曰老者之智少者之決何得辭也及高祖還代丕請作歌詔許之歌訖高祖曰公傾朕還車故親歌述志今經構既有次第故暫還舊京願後時亦同茲適及高祖欲遷都臨太極殿引見留守之官大議乃詔丕等如有所懷各陳其志燕州刺史穆羆進曰移都事大如臣愚見謂為未可高祖曰卿便言不可之理羆曰北有獫狁之寇南有荊揚未賓西有吐谷渾之阻東有高句麗之難四方未平九區未定以此推之謂為不可征伐之舉要須戎馬如其無馬事不可克高祖曰卿言無馬此理粗可馬常出北方廄在此置卿何慮無馬今代在山之北為九州之外以是之故遷于中原羆曰臣聞黃帝都涿鹿以此言之古昔聖王不必悉居中原高祖曰黃帝以天下未定居于涿鹿既定之後亦遷于河南尚書于果曰臣誠不識古事如聞百姓之言先皇建都於此無何欲移以為不可中原其如是所由擬數有篡奪自建邑平城以來與天地並固日月齊明臣雖管見膚淺性不昭達終不以代之地而擬伊洛之美但以安土重遷物之常性一旦南移懼不樂也丕曰陛下去歲親御六軍討蕭氏至洛遣任城王澄宣旨敕臣等議都洛初奉恩旨心情惶越凡欲遷移當訊之卜筮審定吉否然後可高祖謂丕曰往在鄴中司徒公誕咸陽王禧尚書李沖等皆欲請龜占移洛吉凶之事朕時謂誕等曰昔周邵卜宅伊洛乃識至兆今無若斯之人卜亦無益然卜者所以決疑此既不疑何須卜也昔軒轅卜兆龜焦卜者請訪諸賢哲軒轅乃問天老天老謂為善遂從其言終致昌吉然則至人之量未然審於龜矣朕既以四海為家或南或北遲速無常南移之民朕自多積倉儲不令窘乏丕曰臣仰奉慈詔不勝喜舞高祖詔羣官曰卿等或以朕無為移徙也昔平文皇帝棄背率土昭成營居盛樂太祖道武皇帝神武應天遷居平城朕雖虛寡幸屬勝殘之運故移宅中原肇成皇宇卿等當奉先君令德光迹洪規前懷州刺史青龍前, WYG: ''}
  - {type: variant, offset: 2719, length: 2965, content: 臣順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啟云尚書百揆之本令僕納言之貴不宜下隸中尉送名御史尋亦蒙敕聽如其奏從此迄今使無準一臣初上臺具見其事意欲申請決議但以權兼未宜便爾日復一日遂歷炎涼去月朔旦臺移尚書索應朝名帳而省稽留不送尋復移催并主吏忽為尚書郎中裴獻伯後注云案舊事御史中尉逢臺郎於複道中尉下車執板郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕旋省二三未解所以正謂都省別被新式改易高祖舊命即遣移問事何所依又獲尚書郎中王元旭報出蔡氏漢官似非穿鑿始知裴王亦規壞典謨兩人心欲自矯臣案漢書宣秉傳云詔徵秉為御史中丞與司隸校尉尚書令俱會殿庭並專席而坐京師號之為三獨坐又尋魏書崔琰傳晉文陽傅嘏傳皆云既為中丞百僚震悚以此而言則中丞不揖省郎蓋已久矣憲臺不屬都堂亦非今日又尋職令云朝會失時即加彈糾則百官簿帳應送上臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宜付御史又亦彰矣不付名至否臧何驗臣順專執未為平通先朝曲遂豈是正法謹案尚書郎中臣裴獻伯王元旭等望班士流早參清宦輕弄短札斐然若斯苟執異端忽焉至此此而不綱將隳朝令請以見事免獻伯等所居官付法科處尚書納言之本令僕百揆之要同彼浮虛助之乖失宜明首從節級其罪詔曰國異政不可據之古事付司檢高祖舊格推處得失以聞尋從子思奏仍為元天穆所忿遂停元顥之敗封安定縣子孝靜時位侍中而死萇弟珍字金雀襲爵艾陵男世宗時曲事高肇遂為帝寵昵彭城王勰之死珍率壯士害之後卒於尚書左僕射平弟長生位游騎擊將軍卒孝莊時以子天穆貴盛贈司空天穆性和厚美形貌善射有能名年二十起家員外郎六鎮之亂尚書令李崇廣陽王深北討天穆奉使慰勞諸軍路出秀容尒朱榮見其法令齊整有將領氣深相結託約為兄弟未幾榮請天穆為行臺朝廷不許改授別將令赴秀容是時北鎮紛亂所在蜂起六鎮蕩然無復蕃捍惟榮當職路衝招聚散亡天穆為榮腹心除并州刺史及榮赴洛天穆參其始謀乃令天穆留後為之繼援莊帝踐阼天穆以榮之眷昵特除太尉封上黨王徵赴京師榮之討葛榮詔天穆為前軍都督率京師之衆以赴之榮擒葛榮天穆增封通前三萬戶尋監國史錄尚書事開府世襲并州刺史初杜洛周鮮于脩禮為寇瀛冀諸州人多避亂南向幽州前北平府主簿河間邢杲擁率部曲屯據鄚城以拒洛周葛榮垂將三載及廣陽王深等敗後杲南渡居青州北海界靈太后詔流人所在皆置命屬郡縣選豪右為守令以撫鎮之時青州刺史元世儁表置新安郡以杲為太守未報會臺申汰簡所授郡縣以杲從子子瑤資蔭居前乃授河間太守杲深恨於是遂反所在流人先為土人凌忽聞杲起逆率來從之旬朔之間衆踰十萬劫掠村塢毒害民人齊人號之為崯榆賊先是河南人常笑河北人好食榆葉故因以號之杲東掠光州盡海而還又破都督李叔仁軍詔天穆與齊獻武王討大破之杲乃請降傳送京師斬之增天穆邑萬戶時元顥乘虛陷滎陽天穆聞莊帝北巡自畢公壘北渡會車駕於河內尒朱榮以天時炎熱欲還師天穆苦執不可榮乃從之莊帝還宮加太宰羽葆鼓吹增邑通前七萬戶天穆以疏屬本無德望憑藉尒朱爵位隆極當時燻灼朝野傾悚王公已下每旦盈門受納財貨珍寶充積而寬柔容物不甚見疾於時莊帝以其榮黨外示寵敬詔天穆乘車馬出入大司馬門天穆與榮相倚情寄特甚榮常以兄禮事之而尒朱世隆等雖榮子姪位遇已重畏憚天穆俯仰承迎天穆曾言世隆之失榮即加杖其相親任如此莊帝內畏惡之與榮同時見殺前廢帝初贈丞相柱國大將軍雍州刺史假黃鉞諡曰武昭子儼襲美才貌位都官尚書及齊受禪聞敕召假病遂怖而卒西河公敦平文帝之曾孫也太祖初從征被堅執銳名冠諸將後從征中山所向無前太宗時拜中都大官世祖時進爵西河公寵遇彌篤卒子撥襲司徒石平文帝之玄孫也忠勇有膽略尤善騎射從世祖南討至瓜步位尚書令雍州刺史歷比部侍郎華州刺史累遷征南大將軍卒贈司徒公武衞將軍謂烈帝之第四子也寬雅有將略常從太祖征討有功除武衞將軍後謝老歸家顯祖善禮遇之賜几杖服物致膳於第卒賜祕器子烏真膂力絕人隨太祖征伐屢有戰功官至鉅鹿太守子興都聰敏剛毅高宗時為河間太守賜爵樂城子為政嚴猛百姓憚之顯祖初以子丕貴重進爵樂城侯謝老歸家顯祖益禮之賜几杖服物致膳於第其妻婁氏為東陽王太妃卒追贈定州刺史河間公諡曰宣子提襲父侯爵提弟丕世祖擢拜羽林中郎從駕臨江賜爵興平子顯祖即位累遷侍中丞相乙渾謀反丕以奏聞詔丕帥元賀牛益得收渾誅之遷尚書令改封東陽公高祖時封東陽王拜侍中司徒公時有諸疑事三百餘條敕丕制決率皆平允丕子超生車駕親幸其第特加賞賜以執心不二詔賜丕入八議傳示子孫犯至百聽責數恕之放其同籍丁口雜使役調永受復除若有姦邪人方便讒毀者即加斬戮尋遷太尉錄尚書事時淮南王他淮陽王尉元河東王苟頹並以舊老見禮每有大事引入禁中乘步挽杖于朝進退相隨丕他元三人皆容貌壯偉腰帶十圍大耳秀眉鬚鬢斑白百僚觀瞻莫不祗聳唯苟頹小為短劣姿望亦不逮之高祖文明太后重年敬舊存問周渥賜以珍寶丕聲氣高朗博記國事饗讌之際居坐端必抗音大言列既往成敗帝后敬納焉然諂事要人驕侮輕賤每見王叡苻承祖常傾身下之時文明太后為王叡造宅故亦為丕造甲第第成帝后親幸之率百官文武饗落焉使尚書令王叡宣詔賜丕金印一紐太后親造勸戒歌辭以賜羣官丕上疏贊謝太后令曰臣哉隣哉隣哉臣哉君則亡逸於上臣則履冰於下若能如此太平豈難致乎及丕妻段氏卒諡曰恭妃又特賜丕金券高祖文明太后引見公卿於皇信堂太后曰今京師旱儉欲聽飢貧之人出關逐食如欲給過所恐稽延時日不救災窘若任其外出復慮姦良難辨卿等可議其所宜丕議諸曹下大夫以上人各將二吏別掌給過所州郡亦然不過三日給之便訖有何難也高祖從之四日而訖丕請立東宮詔曰年尚幼小有何急之丕曰臣年在西夕思觀盛禮於臣實急不許後例降王爵封平陽郡公求致任詔不許及車駕南伐丕與廣陵王羽留守京師並加使持節詔丕羽曰留守非賢莫可太尉年尊德重位總阿衡羽朕之懿弟溫柔明斷故使二人留守京邑授以二節賞罰在手其祗允成憲以稱朕心丕對曰謹以死奉詔羽對曰太尉宜專節度臣但可副貳而已高祖曰老者之智少者之決何得辭也及高祖還代丕請作歌詔許之歌訖高祖曰公傾朕還車故親歌述志今經構既有次第故暫還舊京願後時亦同茲適及高祖欲遷都臨太極殿引見留守之官大議乃詔丕等如有所懷各陳其志燕州刺史穆羆進曰移都事大如臣愚見謂為未可高祖曰卿便言不可之理羆曰北有獫狁之寇南有荊揚未賓西有吐谷渾之阻東有高句麗之難四方未平九區未定以此推之謂為不可征伐之舉要須戎馬如其無馬事不可克高祖曰卿言無馬此理粗可馬常出北方廄在此置卿何慮無馬今代在山之北為九州之外以是之故遷于中原羆曰臣聞黃帝都涿鹿以此言之古昔聖王不必悉居中原高祖曰黃帝以天下未定居于涿鹿既定之後亦遷于河南尚書于果曰臣誠不識古事如聞百姓之言先皇建都於此無何欲移以為不可中原其如是所由擬數有篡奪自建邑平城以來與天地並固日月齊明臣雖管見膚淺性不昭達終不以代之地而擬伊洛之美但以安土重遷物之常性一旦南移懼不樂也丕曰陛下去歲親御六軍討蕭氏至洛遣任城王澄宣旨敕臣等議都洛初奉恩旨心情惶越凡欲遷移當訊之卜筮審定吉否然後可高祖謂丕曰往在鄴中司徒公誕咸陽王禧尚書李沖等皆欲請龜占移洛吉凶之事朕時謂誕等曰昔周邵卜宅伊洛乃識至兆今無若斯之人卜亦無益然卜者所以決疑此既不疑何須卜也昔軒轅卜兆龜焦卜者請訪諸賢哲軒轅乃問天老天老謂為善遂從其言終致昌吉然則至人之量未然審於龜矣朕既以四海為家或南或北遲速無常南移之民朕自多積倉儲不令窘乏丕曰臣仰奉慈詔不勝喜舞高祖詔羣官曰卿等或以朕無為移徙也昔平文皇帝棄背率土昭成營居盛樂太祖道武皇帝神武應天遷居平城朕雖虛寡幸屬勝殘之運故移宅中原肇成皇宇卿等當奉先君令德光迹洪規前懷州刺史青龍前, krp: ''}
