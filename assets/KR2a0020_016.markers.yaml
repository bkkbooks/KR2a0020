  - {type: variant, offset: 7548, length: 0, content: '', krp: 法僧據城反害行臺高諒又高祐傳祐孫顥顥弟雅雅弟諒為徐州行臺屬元法僧反叛逼諒同之諒不許為法僧所害謨自是諒字之訛今改正廣平王連傳子伯和襲下闕一版伯和霄之孫也本書目錄廣平王連下注云南平王渾渾子霄霄曽孫仲冏而無下文統統子思略思略弟叔略等名疑所闕者為仲冏事蹟而統者其子也目錄世系不可詳故并删去耳京兆王黎傳太傅清河王懌以親賢輔政參决機事以义持寵驕盈志欲無限懌裁之法义輕其為人每欲斥黜之义輕其為人句义疑當作又推尋文義蓋言懌輕义非义輕懌也魏書卷十}
  - {type: variant, offset: 7549, length: 120, content: 頭荒淫怠事乃赦屈令攝州事屈縱酒頗廢政事太宗積其前後失檻車徵還斬於市子磨渾少為太宗所知元紹之逆也太宗潛隱於外磨渾與叔孫俊詐云太宗所在紹使帳下二人隨磨渾往規為逆磨渾既得出便縛帳下詣太宗斬之太宗得磨渾大喜因為羽翼以勳賜爵長沙公拜尚書出為定州刺史卒, WYG: 考證}
