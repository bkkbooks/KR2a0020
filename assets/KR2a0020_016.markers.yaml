  - {type: variant, offset: 2496, length: 0, content: '', WYG: 直散騎侍郎义妻封新平郡君後遷馮翊郡君拜女侍中义以此意勢日盛尋遷散騎常侍光祿少卿領嘗食典御轉光祿卿义女夭靈太后詔曰义長女年垂弱笄奄致夭喪悼念兼懷可贈鄉主尋遷侍中餘官如故加領軍將軍既在門下兼總禁兵深為靈太后所信委太傅清河王懌以親賢輔政參决機事以义恃寵驕盈志欲無限懌裁之以法义輕其為人每欲斥黜之义遂令通直郎宋維告司染都尉韓文殊欲謀逆立懌懌坐禁止後窮治無實懌雖得免猶以兵衛守於宮西别館久之义恐懌終為已害乃與侍中劉騰宻謀靈太后時在嘉福未御前殿騰詐取主食中黄門胡𤣥度胡定列誣懌云許度等金帛令以毒藥置御食中以害帝自望為帝許度兄弟以富貴騰以具奏肅宗聞而信之乃御顯陽殿騰閉永巷門靈太后不得出懌入遇义於含章殿後欲入徽章東閤义厲聲不聼懌曰汝欲反邪义曰元义不反正欲縛反人义命宗士及直齋等三十人執懌衣袂將入含章東省}
