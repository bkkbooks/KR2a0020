  - {type: 'tls:seg', offset: 6411, content: '', id: KR2a0020_ZHSJ_016-d16p79s6}
  - {type: variant, offset: 6411, length: 636, content: 並有軍功儁封新安縣男邕封涇縣男淮陵侯大頭烈帝之曾孫也善騎射擢為內三郎從世祖有戰功賜爵高宗初封淮陵性謹密帝甚重之位寧北將軍遷右將軍卒贈高平公諡曰烈河間公齊烈帝之玄孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍決死擊賊賊乃退世祖得上馬是日微齊世祖幾至危殆世祖以微服入其城齊固諫不許乃與數人從世祖入城內既覺諸門悉閉世祖及齊等因入其宮中得婦人裙繫之槊上世祖乘而上因此得拔齊有力焉賜爵浮陽侯從征和龍以功拜尚書進爵為公後與新興王俊討禿髮保周坐事免官爵劉義隆將裴方明陷仇池世祖復授齊前將軍與建興公古弼討之遂克仇池威振羌氐復賜爵河間公與武都王楊保宗對鎮駱谷時保宗弟文德說保宗閉險自固有期矣秦州主簿邊因知之密告齊齊晨詣保宗呼曰古弼至欲宣詔保宗出齊叱左右扶保宗上馬馳驛送臺諸氐遂推文德為主求援於劉義隆義隆遣將房亮之苻昭啖龍等率衆助文德齊擊斬殺龍擒亮之氐遂平以功拜內都大官卒諡曰敬長子陵襲爵陵性抗直天安初為乙渾所害陵弟蘭以忠謹見寵高祖初賜爵建陽子卒於武川鎮將子志字猛略少清辯強幹歷覽書傳頗有文才為洛陽令不避強禦與御史中尉李彪爭路俱入見面陳得失彪言御史中尉避承華車蓋駐論道劍鼓安有洛陽縣令與臣抗衡志言神鄉縣主普天之下誰不編戶豈有俯同衆官避中尉高祖曰洛陽我之豐沛自應分路揚鑣自今以後可分路而行及出與彪折尺量道各取其半高祖謂邢巒曰此兒竟可所謂王孫公子不鏤自雕巒曰露枝霜條故多勁節非鸞則鳳其在本枝也員外郎馮俊昭儀之弟恃勢恣撾所部里正志令主吏收繫處刑除官由此忤旨左遷太尉主簿俄為從, WYG: 給}
