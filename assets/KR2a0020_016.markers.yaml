  - {type: variant, offset: 2492, length: 0, content: '', WYG: 皆能如此變風易俗更有何難下詔褒羙班之天下一如鑒所上齊人愛詠咸曰耳目更新髙祖崩後和罷沙門歸俗棄其妻子納一寡婦曹氏為妻曹氏年齒已長􅂝男女五人隨鑒至歴城干亂政事和與曹及五子七處受納鑒皆順其意言無不從於是獄以賄成取受狼籍齊人苦之鑒治名大損世宗初以本將軍轉徐州刺史屬徐兗大水民多飢饉鑒表加賑恤民賴以濟先是京兆王愉為徐州王既年少長史盧淵寛以馭下郡縣多不奉法鑒表曰梁郡太守程靈虬唯酒是躭貪財為事虐政殘民寇盗並起黷音悖響盈於道路部境呼嗟僉焉怨酷梁郡宻邇偽畿醜聲易布非直有點清風臣恐取嗤荒逺請免所居官以明刑憲詔免靈虬郡徴還京師於是徐境肅然蕭衍角城戍主柴慶宗以城内附鑒遣淮陽太守呉秦生率兵千餘赴之衍淮隂援軍已來斷路秦生屢戰破之乘勝而進遂剋角城世宗詔鑒曰知摧角城威謀展稱良以欣然此城襟帶淮滸川路衝要自昔經算未能剋之蟻固積紀每成邊害將軍淵䂓潛運妙略克宣闢境剋城功著不日據要扼喉津徑勢阻可謂勲髙三捷朕甚嘉焉守御諸宜善以量度矜慰之使尋當别遣年四十二薨贈衞大將軍齊州刺史王如故諡曰悼王長子伯宗員外郎次仲淵蘭陵太守並早卒仲淵}
  - {type: page-break, offset: 2492, content: '', id: KR2a0020_WYG_016-11b, image: WYG0261/WYG0261-0250d.png}
