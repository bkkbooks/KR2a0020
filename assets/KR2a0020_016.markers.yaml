  - {type: variant, offset: 2538, length: 0, content: '', WYG: 出家我當永絶人間脩道於嵩髙閑居寺先帝聖鑒鑒於未然本營此寺者正為我今日欲自下髪肅宗與羣臣大懼叩頭泣涕殷勤苦請靈太后聲色甚厲意殊不回肅宗乃宿於嘉福殿積數日遂與太后宻謀圖义肅宗内雖圖之外形彌宻靈太后瞋忿之言欲得往來顯陽之意皆以告义又對义流涕叙太后欲出家憂怖之心}
