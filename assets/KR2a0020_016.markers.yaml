  - {type: variant, offset: 2511, length: 1, content: 思, WYG: 亮平原郡開國公食邑一千戸及拜肅宗御南門臨觀并賜御馬帛千匹初义之專政矯情自飾勞謙待士時事得失頗以闗懷而才術空淺終無逺致得志之後便驕愎躭酒好色與奪任情乃於禁中自作别庫掌握之寳充牣其中又曽臥婦人於食輿以帊覆之令人轝入禁内出亦如之直衛雖知莫敢言者輕薄趣勢之徒以酒色事之姑姊婦女朋滛無别政事怠惰綱紀不舉州鎮守宰多非其人於是天下遂亂矣從劉騰死後防衛微緩义頗亦自寛時宿於外每日出遊留連他邑靈太后微察知之义積習生常無復虞慮其所親諫义义又不納正光五年秋靈太后對肅宗}
