  - {type: variant, offset: 2547, length: 0, content: '', WYG: 慮天下諸賊唯慮元义何者义總握禁旅兵皆屬之父率百萬之衆虎視京西弟為都督總三齊之衆元义無心則已若其有心聖朝將何以抗义雖曰不反誰見其心而不可不懼太后曰然元郎若忠於朝廷而無反心何故不去此領軍以餘官輔政义聞之甚懼免冠求解乃以义為驃騎大將軍儀同三司尚書令侍中領左右义雖去兵權然總任内外殊不慮有黜廢之理也後义出宿遂解其侍中旦欲入宮門者不納尋除名為民初咸陽王禧以逆見誅其子樹奔蕭衍衍封為鄴王及法僧反叛後樹遺公卿百寮書曰魏室不造姦豎擅朝社稷阽危綴旒非譬元义險慝狼戾人倫不齒屬籍疎逺素無問望特以太后姻婭早蒙寵擢曽不懷音公行反噬肆兹悖逆人神同憤}
  - {type: page-break, offset: 2547, content: '', id: KR2a0020_WYG_016-23a, image: WYG0261/WYG0261-0256c.png}
