  - {type: variant, offset: 34, length: 3, content: 自獨孤, WYG: 嘗怒之倒懸井中垂死乃出太宗常以義方責之遂與不協恒懼其為變而紹母夫人賀氏有譴太祖幽之於宮將殺之會日暮未決賀氏宻告紹曰汝将何以救吾紹乃夜與帳下及宦者數人踰宫犯禁左右侍御呼曰賊至太祖驚起求弓刀不獲遂暴崩明日宮門至日中不開紹稱詔召百寮於西宮端門前北面而立紹從門扇間謂羣臣曰我有父亦有兄公卿欲從誰也王公已下皆驚愕失色莫有對者良久南平公長孫嵩曰從王羣臣乃知宮車晏駕而不審登遐之狀唯隂平公元烈哭泣而去於是朝野兇兇人懐異志肥如侯賀護舉烽於安陽城北故賀蘭部人皆往赴之其餘舊部亦率子弟招集族人往往相聚紹聞人情不安乃出布帛班賜王公以下上者數百匹下者十匹先是太宗在外聞變乃還潛于山中使人夜告北新侯安同衆皆響應太宗至城西衞士執送紹於是賜紹母子死誅帳下閹官宮人為内應者十數人其先犯乘輿者羣臣於城南都街生臠割而食之紹時年十六紹母即獻明皇后妹也羙而麗初太祖}
