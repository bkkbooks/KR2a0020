  - {type: variant, offset: 5685, length: 701, content: 州刺史呂受恩等仍守愚固帝皆撫而答之辭屈而退帝又將北巡丕遷太傅錄尚書事頻表固讓詔斷表啟就家拜授及車駕發代丕留守詔曰中原始構須朕營視在代之事一委太傅賜上所乘車馬往來府省丕雅愛本風不達新式至於變俗遷洛改官制服禁絕舊言皆所不願高祖知其如此亦不逼之但誘示大理令其不生同異至於衣冕已行朱服列位而丕猶常服列在坐隅晚乃稍加弁帶而不能修飾容儀高祖以丕年衰體重亦不強責及罷降非太祖子孫及異姓王者雖較於公爵而利享封邑亦不快疑高祖南征丕表乞少留思更圖後舉會司徒馮誕薨詔六軍反斾丕又以熙薨于代都表求鑾駕親臨詔曰今洛邑肇構跂望成勞開闢暨今豈有以天子之重遠赴舅國之喪朕縱欲為孝其如大孝何縱欲為義其如大義何天下至重君臣道懸豈宜苟相誘引陷君不德令僕已下可付法官貶之又詔以丕為都督領并州刺史後詔以平陽畿甸改封新興公初李沖又德望所屬既當時貴要有杖情遂與子超娶沖兄女即伯尚妹也丕前妻子隆同產數人皆與別居後得宮人所生同宅共產父子情因此偏丕父子大意不樂遷洛高祖之發平城太子恂留於舊京及將還洛隆與超等密謀留恂因舉兵斷關規據陘北時丕以老居并州雖不預其始計而隆超咸以告丕丕外慮不成口雖致難心頗然之及高祖幸平城推穆泰等首謀隆兄弟並是黨丕亦隨駕至平城每於測問令丕坐觀隆超與元業等兄弟並以謀逆伏誅有司奏處孥戮詔以丕應連坐但以先許不死之詔躬非染逆之身聽免死仍為太原百姓其後妻二子聽隨隆超母弟及餘庶兄弟皆徙敦煌丕時年垂八十猶自平城力載隨駕至洛陽高祖每遣左右慰勉之乃還晉陽高祖崩丕自并州來赴世宗引見之以丕舊老禮有加焉尋敕留洛陽後宴于華林都亭特令二子扶侍坐起丕仕歷六世垂七十年位極公輔而還為民庶然猶心戀京邑不能自絕人事尋詔以丕為三老景明四年薨年八十二詔贈左光祿大夫冀, WYG: ''}
