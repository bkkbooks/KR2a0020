  - {type: variant, offset: 2497, length: 1, content: 關, WYG: 數十人防守之騰稱詔召集公卿議以大逆論咸畏憚义無敢異者唯僕射游肈執意不同語在其傳义騰持公卿議入奏俄而事可夜中殺懌於是假為靈太后辭遜之詔义遂與太師高陽王雍等輔政常直禁中肅宗呼為姨父自後専綜機要巨細決之威振於内外百寮重跡相州刺史中山王熙抗表起義以討义為名不果見誅义尋遷衛將軍餘如故後靈太后與肅宗醼於}
