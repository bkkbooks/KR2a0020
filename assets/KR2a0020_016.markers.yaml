  - {type: variant, offset: 2495, length: 0, content: '', WYG: 略武定末瀛州治中思略弟叔略武定中太尉主簿京兆王黎天賜四年封神䴥元年薨子根襲改封江陽王加平北將軍薨無子顯祖以南平王霄第二子繼為根後繼字世仁襲封江陽王加平北將軍髙祖時除使持節安北將軍撫冥鎮都大將轉都督柔𤣥撫冥懷荒三鎮諸軍事鎮北將軍柔𤣥鎮大將入為左衞將軍兼侍中又兼中領軍留守洛京尋除持節平北將軍鎮攝舊都髙車酋帥樹者擁部民反叛詔繼都督北討諸軍事自懷朔已東悉禀繼節度繼表髙車頑黨不識威憲輕相合集背役逃歸計其兇戾事合窮極若悉追戮恐遂擾亂請遣使鎮别推檢斬諐首一人自餘加以慰喻若悔悟從役者即令赴軍詔從之於是叛徒往往歸順髙祖善之顧謂侍臣曰江陽良足大任也車駕北廵至鄴而髙車悉降恒朔清定繼以髙車擾叛頻表請罪髙祖優詔喻之世宗時除征虜將軍青州刺史轉平北將軍恒州刺史入為度支尚書繼在青州之日民飢餒為家僮取民女為婦妾又以良人為婢為御史所彈坐免官爵後大將軍髙肇伐蜀世宗以繼為平東將軍鎮遏徐揚世宗崩班師及靈太后臨朝繼子义先納太后妹復繼尚書本封尋除侍中領軍將軍又除特進驃騎將軍侍中領軍如故繼頻表固讓許之又詔還依前授太師髙陽王雍太傅清河王懌太保廣平王懷及門下八座奏追論繼太和中慰喻髙車安輯四鎮之勲増邑一千五百户繼又上表陳讓詔聼减户五百靈太后以子义姻戚數與肅宗幸繼宅置酒髙㑹班賜有加尋加侍中驃騎大將軍儀同三司特進領軍如故徙封京兆王繼疾患積年枕養于家每至靈太后與肅宗遊幸於外時令扶入居守禁内及節慶宴饗皆力疾參焉遷司空公侍中如故寛和容裕號為長者神龜末子义得志轉司徒公仍加侍中繼以蕃王宿宦舊貴髙祖時歴内外顯任意遇已隆靈太后臨朝入居心膂兼處門下歴轉台司义又居權重榮赫一世繼頻表遜位乞以司徒授崔光詔遣侍中安豐王延明給事黄門侍郎盧同敦勸繼又啟固讓轉太保侍中如故加後部鼓吹頻表陳辭不許詔曰至節嘉辰禮有朝慶親尊戚老理宜優異王位髙年宿可依齊郡王簡故事朝訖引坐免其拜伏轉太傅侍中如故頻讓不許又遣使敦勸乃受之時义執殺生之柄威福自己門生故吏遍於省闥拜受之日送者傾朝當世以為榮有識者為之致懼太官給酒膳供賔客又詔令乘歩挽至殿庭兩人扶侍禮秩與丞相髙陽王相埒後除使持節侍中太師大將軍錄尚書事大都督節度西道諸軍及出師之日車駕臨餞傾朝祖送賞賜萬計轉太尉公侍中太師錄尚書都督並如故尋詔班師繼啟求還復江陽詔從之繼晚更貪婪聚斂無已牧守令長新除赴官無不受納貨賄以相託付妻子各别請屬至乃郡縣微吏亦不得平心選舉憑义威勢法官不敢紏擿天下患之义黜繼廢於家初尒朱榮之為直寢也數以名馬奉义义接以恩意榮甚徳之建義初復以繼為太師司州牧永安二年薨贈假黄鉞都督雍華涇邠秦岐河梁益九州諸軍事大將軍錄尚書大丞相雍州刺史王如故諡曰武烈义繼長子字伯儁小字夜义世宗時拜員外郎靈太后臨朝以义妹夫除}
