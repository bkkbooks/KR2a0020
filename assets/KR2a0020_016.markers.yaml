  - {type: variant, offset: 1477, length: 5, content: 猛善攻戰正, WYG: 騎將軍出為征虜將軍幽州刺史世遵性清和推誠化導百姓樂之肅宗時以本將軍為荆州刺史尋加前將軍初在漢陽復有聲迹後頗行貨賄散費邊儲由是聲望有損沔南蠻首及襄陽民望入宻信引世遵請以襄陽内附世遵表求赴應朝議從之詔加世遵持節都督荆州及沔南諸軍事}
