  - {type: variant, offset: 5736, length: 0, content: '', WYG: 追封趙郡公世承弟弼字輔伯前廢帝初爲散騎常侍左衞將軍封朝陽縣開國伯又除車騎將軍左光禄大夫領左右改封河間郡公尋爲驃騎大將軍開府儀同三司青州刺史天光等之赴韓陵也世隆以其府長史房謨兼尚書爲齊州行臺召募士馬以趣四瀆闕弼總東陽之衆亦赴亂城疑揚聲北渡以爲掎角之勢及天光等敗弼乃還州世隆既擒弼欲奔蕭衍數與左右割臂爲約弼帳下都督馮紹隆爲弼信待乃説弼曰今方同契闊湏更約盟宜可當心瀝血示衆以信弼乃從之遂大集部下弼乃踞胡牀令紹隆持刀披心紹隆因推刃殺之𫝊首京師尒朱度律榮從父弟也鄙朴少言爲統軍從榮征伐莊帝初除安西將軍光禄大夫封樂鄉縣開國伯尋轉安北將軍朔州刺史復除軍州刺史後加散騎常侍右衞將軍又除衞將軍左光禄大夫兼京畿大都督榮死與世隆赴晉陽元曄之立以度律爲太尉公四面大都督封常山王與尒朱兆入洛兆還晉陽留度律鎮京師前廢帝時爲使持節侍中大將軍太尉兼尚書令東北道大行臺與仲逺出拒義旗齊獻武王間之與尒朱兆遂相疑貳自敗而還度律雖在軍戎聚歛無厭所至之處爲百姓患毒其母山氏聞度律敗遂恚憤而發病及度律至母責之曰汝既荷國恩無狀反叛我何忍見他屠戮汝也言終而卒時人怪異之後解大行臺總𨽻長孫稚戰於韓陵敗還斛斯椿先據河梁度律欲攻之會大雨晝夜不止士馬疲頓弓矢不得施用遂西走於灅波津爲人擒執椿囚之送於齊獻武王王送於洛斬之都市尒朱天光榮從祖兄}
