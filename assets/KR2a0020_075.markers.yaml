  - {type: variant, offset: 8, length: 0, content: '', WYG: 六十三尒朱兆尒朱彦伯尒朱度律尒朱天光尒朱兆字萬仁榮從子也少驍猛善騎射手格猛獸蹻㨗過人數從榮遊獵至於窮巗絶澗人所不能升降者兆先之榮以此特加賞愛任爲爪牙榮曾送臺使見二鹿乃命兆前止授二箭曰可取此鹿供今食也遂停馬構火以待之俄然兆獲其一榮欲矜夸使人責兆曰何不盡取杖之}
