  - {type: variant, offset: 5741, length: 5, content: 受禪爵例降, WYG: 獻武王起兵信都内懐憂恐不復北事伊利等但微遣備之而已又除大司馬於時獻武王義軍轉盛尒朱兆仲逺等既經敗退世隆累使徵天光天光不從後令斛斯椿苦要天光云非王無以能定豈可坐看宗家之滅也天光不得已而東下與仲逺等敗於韓陵斛斯椿等先還於河梁拒之天光既不得渡西北走遇雨不可前進乃執獲之與度律送於獻武王王致於洛斬於都市年三十七尒朱專恣分裂天下各據一方天光有定關西之功差不酷暴比之兆與仲逺爲不同矣}
