  - {type: variant, offset: 1238, length: 201, content: 左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虛實足喪其膽俘此足矣何假逐之獲叔業傘扇鼓幕甲仗萬餘兩月之中遂獻再捷高祖嘉之遣謁者就豫州策拜永安遠將軍鎮南府長史汝南太守貝丘縣開國男食邑二百戶高祖每歎曰上馬能擊賊下馬作露布唯傅脩期耳裴叔業又圍渦陽時高祖在豫州遣永為統軍與高聰劉藻成道益任莫問等往救之軍將逼賊永曰先深溝固壘然後圖之聰等不從裁營輜重便擊之一戰而敗聰等棄甲徑奔懸瓠永獨收散卒徐, WYG: 莊帝}
