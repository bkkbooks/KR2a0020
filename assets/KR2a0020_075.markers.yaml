  - {type: variant, offset: 5732, length: 0, content: '', krp: 増邑五百户尋改封清河郡又加車騎大將軍左光禄大夫轉使持節本將軍徐州刺史兼尚書左僕射三徐州大行臺尋進督三徐州諸軍事餘如故仲逺上言曰將統參佐人數不足事湏在道更僕以充其員竊見比來行臺採募者皆得權立中正在軍定第斟酌授官今求兼置權濟軍要詔從之於是隨情補授肆意聚歛尒朱榮死仲逺勒衆來向京師攻陷西兖州將逼東郡莊帝詔諸督將絡繹進討並爲仲逺所敗又詔都督鄭先䕶及右衞將軍賀拔勝共討之勝戰不利仍降仲逺尋尒朱兆入洛先䕶衆散而走前廢帝立除使持節侍中都督三徐二兗諸軍事驃騎大將軍開府儀同三司徐州刺史東道大都督大行臺進爵彭城王尋加大將軍又兼尚書令竟不之州遂鎮於大梁仲逺遣使請準朝式在軍鳴騶帝覽啓笑而許之其肆情如此復進督東道諸軍本將軍兗州刺史餘如故仲逺天性貪暴大宗富族誣之以反殁其家口簿籍財物皆以入已丈夫死者投之河流如此者不可勝數諸將婦有羙色者莫不被其淫亂自滎陽以東輸税悉入其軍不送京師時天光控關右仲逺在大梁兆據并州世隆居京邑各自專恣權彊莫比焉所在並以貪虐爲事於是四方解體又加太宰解大行臺仲逺專恣尤劇方之彦伯世隆最爲無禮東南牧守下至民俗比之豺狼特爲患苦後移屯東郡率衆與度律等拒齊獻武王尒朱兆領騎數千自晉陽來會軍次陽平王縱以間説仲逺等迭相猜疑狼狽遁走後與天光等於韓陵戰敗南走東郡仍奔蕭衍死於江南仲逺弟世隆字榮宗肅宗末爲直齋轉直寢後兼直閤加前將軍尒朱榮表請入朝靈太后惡之令世隆詣晉陽慰喻榮榮因欲留之世隆曰朝廷疑兄故令世隆來今若遂住便有内備非計之善者榮乃遣之榮舉兵南出世隆遂遁走會榮於上黨建義初除給事黄門侍郎莊帝即位乃特除侍中領軍將軍左衞將軍領左右肆州大中正封樂平郡開國公食邑一千二百户又除車騎將軍兼領軍俄授左光禄大夫兼尚書右僕射尋即真元顥逼大梁詔假儀同三司前軍都督鎮虎牢世隆不關世事無將帥之略顥既剋滎陽擒行臺陽回世隆懼而遁還莊帝倉卒北廵世隆之罪也駕在河内假驃騎大將軍行臺右僕射都督相州諸軍事相州刺史當州都督及車駕還宫除驃騎大將軍尚書左僕射攝選左右廂出入又以停年格取士頗爲猥滯所稱又請解侍中詔加散騎常侍莊帝之將圖尒朱榮也或有牓世隆門以陳其狀者世隆封以呈榮勸其不入榮自恃威彊不以爲意遂手毁密書唾地曰世隆無膽誰敢生心及榮死世隆奉榮妻燒西陽門率衆夜走北攻河橋殺武衞將軍奚毅率衆還戰大夏門外朝野震懼憂在不測莊帝遣前華陽太守叚育慰喻世隆斬之以狥會李苖燒絶河梁世隆乃北遁建州刺史陸希質閉城拒守世隆攻剋之盡殺城人以肆其忿及至長子與度律等共推長廣王曄爲主曄以世隆爲開府儀同三司尚書令樂平郡王加太傅行司州牧增邑五千户先赴京師會兆於河陽兆既平京邑自以爲功讓世隆曰叔父在朝多時耳目應廣如何不知不聞令天柱受禍按劔瞋目聲色甚厲世隆遜辭拜謝然後得已世隆深恨之時仲遠亦自滑臺入京世隆與兄弟密謀以元曄疎逺欲推立前廢帝而尒朱度律意在寳炬乃曰廣陵不言何以主天下世隆兄彦伯密相敦喻乃與度律同往龍花佛寺觀之後知能語遂行廢立初世隆之爲僕射自憂不了乃取尚書文簿在家省閲性聰解積十餘日然後視事又畏尒朱榮威深自克勉留心几案傍接賔客遂有解了之名榮死之後無所顧憚及爲尚書令常使尚書郎宋遊道邢昕在其宅聴視事東西别坐受納訴訟稱命施行其專恣如此既總朝政生殺自由公行淫佚無復畏避信任羣小隨其與奪又欲収軍人之意加汎除授皆以將軍而兼散職督將兵吏無虚號者自此五等大夫遂致猥濫又無員限天下賤之武定中齊文襄奏皆罷於是始革其弊世隆兄弟羣從各擁彊兵割剥四海極其暴虐姦諂蛆酷多見信用温良名士罕預腹心於是天下之人莫不厭毒世隆尋讓太傅改授太保又固辭前廢帝特置儀同三師之官次上公之下以世隆爲之贈其父買珍使持節侍中相國録尚書事都督定相青齊濟五州諸軍事大司馬定州刺史及齊獻武王起義兵仲逺度律等愚戅恃彊不以爲慮而世隆獨深憂恐及天光戰敗世隆請出收兵前廢帝不許世隆令其外兵參軍陽叔淵單騎馳赴北中簡閲敗衆以次内之而斛斯椿未得入城詭説叔淵曰天光部下皆是西人聞其欲掠京邑遷都長安宜先内我以爲其備叔淵信而内之椿既至橋盡殺世隆黨附令行臺長孫稚詣闕奏狀别使都督賈智張勸率騎掩執世隆與兄彦伯俱斬之時年三十三初世隆曾與吏部尚書元世儁握槊忽聞局上歘然有聲一局之子盡皆倒立世隆甚惡之世隆又曾晝寢其妻奚氏忽見有一人持世隆首去奚氏驚怖就視而世隆寢如故也既覺謂妻曰向夢人斷我頭去意殊不適又此年正月晦日令僕並不上省西門不開忽有河内太守田怗家奴告省門亭長云今且爲令王借車牛一乘終日於洛濵遊觀至晚王還省將軍出東掖門始覺車上無褥請爲記識時世隆封王故呼爲令王亭長以令僕不上西門不開無車入省兼無車跡此奴固陳不己公文列訴尚書都令史謝逺疑謂妄有假借白世隆付曹推檢時都官郎穆子容窮究之奴言初來時至司空府西欲向省令王嫌遲遣二防閤捉儀刀催車車入到省西門王嫌牛小繫於闕下槐樹更將一青牛駕車令王著白紗高頂㡌短黑色儐從皆裙襦袴褶握板不似常時章服遂遣一吏將奴送入省中廰事東閤内東廂第一屋中其屋先常閉籥子容以西門不開忽言從入此屋常閉奴言在中詰其虛罔奴云此屋若閉求得開看屋中有一板牀牀上無席大有塵土兼有一甕米奴拂牀而坐兼畫地戲弄甕中之米亦握看之定其閉者應無事驗子容與謝逺自入看之户閉極乆全無開跡及入拂牀畫地蹤緒歴然米亦符同方知不謬具以此對世隆悵然意以爲惡未幾見誅世隆弟世承莊帝初爲寧朔將軍歩兵校尉欒城縣開國伯又特除撫軍將軍金紫光禄大夫左衞將軍尋加侍中領御史中尉世承人才猥劣備員而已及元顥内逼詔世承守轘轅世隆棄虎牢不暇追告尋爲元顥所擒臠殺之莊帝還宮贈使持節都督冀州諸軍事驃騎大將軍司徒}
