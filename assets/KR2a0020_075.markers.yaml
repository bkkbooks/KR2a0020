  - {type: variant, offset: 5737, length: 0, content: '', krp: 少勇決善弓馬榮親愛之每有軍戎事要常預謀䇿孝昌末榮將擁衆南轉與天光密議既據并肆仍以天光爲都將總統肆州兵馬肅宗崩榮向京師以天光攝行肆州委以後事建義初特除撫軍將軍肆州刺史長安縣開國公食邑一千户榮將討葛榮留天光在州鎮其根本謂之曰我身不得至處非汝無以稱我心永安中加侍中金紫光禄大夫北秀容第一酋長尋轉衞將軍大將軍元天穆東征邢杲詔天光以本官爲使持節假鎮東將軍都督𨽻天穆討破之元顥入洛天光與天穆會榮於河内榮發之後并肆不安詔天光以本官兼尚書僕射爲并肆雲恒朔燕蔚顯汾九州行臺仍行并州委以安静之天光至并州部分約勒所在寧輯顥破尋還京師遷驃騎將軍加散騎常侍改封廣宗郡公增邑一千户仍爲左衞將軍建義元年夏万俟醜奴僭大號朝廷憂之乃除天光使持節都督雍岐二州諸軍事驃騎大將軍雍州刺史率大都督武衛將軍賀㧞岳大都督侯莫陳悦等以討醜奴天光初行唯配軍}
  - {type: variant, offset: 5738, length: 1, content: 約, WYG: 千人詔發京城已西路次民馬以給之時東雍赤水蜀賊斷路詔侍中楊侃先行曉慰并徴其馬侃雖入慰勞而蜀持疑不下天光遂入關擊破之簡取壯健以充軍士悉收其馬至雍又税民馬合得萬餘匹以軍人寡少停留未進榮遣責之杖天光一百榮復遣軍士二千人以赴天光令賀㧞岳率千騎先驅至岐州界長城西與醜奴行臺尉遲菩薩相遇遂破擒之獲騎士三千歩卒萬餘醜奴棄岐州走還安定置柵於平亭天光發雍至岐與岳合勢於汧渭之間停軍牧馬宣言逺近曰今時將熱非可征討待至秋凉别量進止醜奴每遣窺覘有執送者天光寛而問之仍便放遣免者𫝊其待秋之言醜奴謂以爲實分遣諸軍散營農稼在岐州之北百里涇川使其太尉侯伏侯元進領兵五千據險立柵且耕且守在其左右千人已下爲一柵者乃復數處天光知其勢分遂密嚴備晡時濳遣輕騎先行斷路以防賊知於後諸軍盡發昧旦攻圍元進大柵拔之諸所俘執並皆放散須臾之間左右諸柵悉來歸款前去涇州百八十里通夜徑進後日至城賊涇州刺史侯幾長貴疑仍以城降醜奴棄平亭而走欲趨高平天光遣岳輕騎急追明日及醜奴於平涼長平坑一戰擒之天光明便共逼高平城内執送蕭寶夤而降賊行臺万俟道洛率衆六千人入山不下時高平大旱天光以馬乏草乃退於城東五十許里息衆牧馬於是涇豳二夏北至靈州賊黨結聚之類並來歸降天光遣都督長孫邪利率二百人行原州事以鎮之道洛招誘城人來掩}
