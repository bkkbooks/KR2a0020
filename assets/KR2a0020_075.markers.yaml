  - {type: variant, offset: 1440, length: 737, content: 賊追至又設伏擊之挫其鋒銳四軍之兵多賴之以免永至懸瓠高祖俱鎖之聰藻徙為邊民永免官爵而已不經旬日詔曰脩期在後少有擒殺可揚武將軍汝陰鎮將帶汝陰太守景明初裴叔業將以壽春歸國密通於永永具表聞及將迎納詔永為統軍與楊大眼奚康生等諸軍俱入壽春同日而永在後故康生大眼二人並賞列土永唯清河男蕭寶卷將陳伯之侵逼壽春沿淮為寇時司徒彭城王勰廣陵侯元衍同鎮壽春以九江初附人情未洽兼臺援不至深以為憂詔遣永為統軍領汝陰之兵三千人先援之永總勒士卒水陸俱下而淮水口伯之防之甚固永去二十餘里牽船上汝南岸以水牛挽之直南趨淮下船便渡適上南岸賊軍亦及會時已夜永乃潜進曉達壽春城下勰衍聞外有軍共上門樓觀望然不意永至永免冑乃信之遂引永上勰謂永曰北望以久恐洛陽難復可見不意卿能至也勰令永引軍入城永曰執兵被甲固敵是求若如教旨便共殿下同被圍守豈是救援之意遂孤軍城外與勰并勢以擊伯之頻有克捷中山王英之征義陽永為寧朔將軍統軍當長圍遏其南門蕭衍將馬仙琕連營稍進規解城圍永謂英曰凶豎豕突意在決戰雅山形要宜早據之英沉吟未决永曰機者如神難遇易失今日不往明朝必為賊有雖悔無及英乃分兵通夜築城於山上遣統軍張懷等列陳於山下以防之至曉仙琕果至懷等戰敗築城者悉皆奔退仙琕乘勝直趨長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將馬步千人南逆仙琕擐甲揮戈單騎先入唯有軍主蔡三虎副之餘人無有及者突陳橫過賊射永洞其左股永拔箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陳謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而返時年七十餘矣三軍莫不壯之義陽既平英使司馬陸希道為露板意謂不可令永改之永亦不增文彩直與之改陳列軍儀處置形要而已而英深賞之歎曰觀此經算雖有金城湯池亦不能守矣還京復封永先有男爵至是以品不累加賜帛二千匹, WYG: 宫論功}
