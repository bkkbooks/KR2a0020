  - {type: variant, offset: 812, length: 422, content: 肅之為豫州以永為建武將軍平南長史咸陽王禧慮肅難信言於高祖高祖曰已選傅脩期為其長史雖威儀不足而文武有餘矣肅以永宿士禮之甚厚永亦以肅為高祖眷遇盡心事之情義至穆蕭鸞遣將魯康祚趙公政衆號一萬侵豫州之太倉口肅令永勒甲士三千擊之時康祚等軍於淮南永舍淮北十有餘里永量吳楚之兵好以斫營為事即夜分兵二部出於營外又以賊若夜來必應於渡淮之所以火記其淺處永既設伏乃密令人以瓠盛火渡淮南岸當深處置之教之云若有火起即亦然之其夜康祚公政等果親率領來斫永營東西二伏夾擊之康祚等奔趨淮水火既競起不能記其本濟遂望永所置之火而爭渡焉水深溺死斬首者數千級生擒公政康祚人馬墜淮曉而獲其屍斬首并公政送京師公政岐州刺史超宗之從兄也時裴叔業率王茂先李定等來侵楚王戍永適還州肅復令永討之永將心腹一人馳詣楚王戍至即令填塞外塹夜伏戰士一千人於城外曉而叔業等至頓於城東列陳將置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陳自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖, WYG: 延明顥}
