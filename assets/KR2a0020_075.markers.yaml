  - {type: variant, offset: 5731, length: 0, content: '', WYG: 于時炎旱有勸彦伯解司徒者乃上表遜位詔許之俄除儀同三司侍中彦伯於兄弟之中差無過患天光等敗於韓陵彦伯欲領兵屯河橋以爲聲勢世隆不從及張勸等掩襲世隆彦伯時在禁直從長孫稚等於神虎門啓陳齊獻武王義功既振將除尒朱廢帝令舍人郭崇報彦伯知彦伯狼狽出走爲人所執尋與世隆同斬於閶闔門外懸首於斛斯椿門樹𫝊首於齊獻武王先是洛中謡曰三月末四月初揚灰簸土覔真珠又曰頭去項脚根齊驅上樹不湏梯至是並驗彦伯弟仲逺頗知書計肅宗末年尒朱榮兵威稍盛諸有啓謁率多見從而仲逺摹寫榮書又刻榮印與尚書令史通爲姦詐造榮啓表請人爲官大得財貨以資酒色落魄無行及孝莊即阼除直寢寧遠將軍歩兵校尉尋特除平北將軍建興太守頓丘縣開國侯邑五百戸後加散騎常侍及改郡立州遷使持節車騎將軍建州刺史加侍中進爵爲}
