  - {type: variant, offset: 50, length: 494, content: 藻涉獵羣籍美談笑善與人交飲酒至一石不亂永安中與姊夫李嶷俱來歸國賜爵易陽子擢拜南部主書號為稱職時北地諸羌數萬家恃險作亂前後牧守不能制姦暴之徒並無名實朝廷患之以藻為北地太守藻推誠布信諸羌咸來歸附藻書其名籍收其賦稅朝廷嘉之遷龍驤將軍雍城鎮將先是氐豪徐成楊黑等驅逐鎮將故以藻代之至鎮擒獲成黑等斬之以徇羣氐震慴雍州人王叔保等三百人表乞藻為騃奴戍主詔曰選曹已用人藻有惠政自宜他在任八年遷離城鎮將太和中改鎮為岐州以藻為岐州刺史轉秦州刺史秦人恃嶮率多粗暴或拒課輸或害長吏自前守宰率皆依州遙領不入郡縣藻開示恩信誅戮豪橫羌氐憚之守宰於是始得居其舊所遇車駕南伐以藻為東道都督秦人紛擾詔藻還州人情乃定仍與安南將軍元英征漢中頻破賊軍長驅至南鄭垂平梁州奉詔還軍乃不果克後車駕南伐以藻為征虜將軍督統軍高聰等四軍為東道別將辭於洛水之南高祖曰與卿石頭相見藻對曰臣雖才非古人庶亦不留賊虜而遺陛下輒當釃曲阿之酒以待百官高祖大笑曰今未至曲阿且以河東數石賜卿後與高聰等戰敗俱徙平州景明初世宗追錄舊功以藻為太尉司馬是年六月卒年六十七贈錢六萬子紹珍無他才用善附會好飲酒結託劉騰騰啟為其國郎中令襲子爵稍遷本州別駕司空屬以事免官建義初詔復, WYG: ''}
