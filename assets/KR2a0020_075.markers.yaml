  - {type: variant, offset: 5091, length: 606, content: 騎將軍司空公相州刺史開國如故長子敬和敬和弟敬仲並好酒薄行傾側勢家敬和歷青州鎮遠府長史孝莊時復為益州刺史朝廷以其父有遺惠故也至州聚斂無已好酒嗜色遠近失望仍為蕭衍將樊文熾攻圍敬和以城降送於江南後衍以齊獻武王威德日廣令敬和還國以申和通之意久之除北徐州刺史復以耽酒為土賊掩襲棄城走徵詣廷尉遇恩免遂廢棄卒於家乾愛子三寶與房法壽等同効盤陽賜爵貝丘子三寶弟法獻高祖初南叛為蕭鸞右中郎將直閤將軍從崔慧景至鄧城為官軍所殺琰曾孫文驥勇果有將領之才隨豎眼征伐累有軍功自強弩將軍出為琅邪戍主朐山內附徐州刺史盧昶遣文驥守朐山樵米既竭而昶軍不進文驥遂棄母妻以城降蕭衍後大以南貨賂光州刺史羅衡衡為渡其母妻李神農人父洪之秦益二州刺史神少有膽略以氣尚為名早從征役其從兄崇深所知賞累遷威遠將軍新蔡太守領建安戍主轉寧遠將軍陳留太守領狄丘戍主頻有軍功封長樂縣開國男食邑二百戶遷征虜將軍驍騎將軍直閤將軍蕭衍將趙祖悅率衆據硤石神為別將率揚州水軍受刺史李崇節度與都督崔亮行臺僕射李平等攻硤石克之進平北將軍太中大夫孝昌中行相州事尋正加撫軍將軍假鎮東將軍大都督建義初除衞將軍時葛榮充斥民多逃散先是州將元鑒反叛引賊後都督源子邕裴衍戰敗被害朝野憂惶人不自保而神志氣自若撫勞兵民小大用命既而葛榮盡銳攻之久不能克會尒朱榮擒葛榮於鄴西事平除車騎將軍以功進爵為公增邑八百通前一千戶元顥入洛莊帝北巡以神為侍中又除殿中尚書仍行相州事車駕還宮改封安康郡開國公加封五百戶普泰元年進驃, WYG: ''}
