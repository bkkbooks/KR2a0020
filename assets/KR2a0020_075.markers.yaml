  - {type: variant, offset: 5737, length: 0, content: '', WYG: 少勇決善弓馬榮親愛之每有軍戎事要常預謀䇿孝昌末榮將擁衆南轉與天光密議既據并肆仍以天光爲都將總統肆州兵馬肅宗崩榮向京師以天光攝行肆州委以後事建義初特除撫軍將軍肆州刺史長安縣開國公食邑一千户榮將討葛榮留天光在州鎮其根本謂之曰我身不得至處非汝無以稱我心永安中加侍中金紫光禄大夫北秀容第一酋長尋轉衞將軍大將軍元天穆東征邢杲詔天光以本官爲使持節假鎮東將軍都督𨽻天穆討破之元顥入洛天光與天穆會榮於河内榮發之後并肆不安詔天光以本官兼尚書僕射爲并肆雲恒朔燕蔚顯汾九州行臺仍行并州委以安静之天光至并州部分約勒所在寧輯顥破尋還京師遷驃騎將軍加散騎常侍改封廣宗郡公增邑一千户仍爲左衞將軍建義元年夏万俟醜奴僭大號朝廷憂之乃除天光使持節都督雍岐二州諸軍事驃騎大將軍雍州刺史率大都督武衛將軍賀㧞岳大都督侯莫陳悦等以討醜奴天光初行唯配軍}
