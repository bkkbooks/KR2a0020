  - {type: variant, offset: 5729, length: 0, content: '', WYG: 又增邑五百戸及尒朱榮死也兆自汾州率騎據晉陽元暉立授兆大將軍爵爲王兆與世隆等定謀攻洛兆遂率衆南出進達太行大都督源子恭下都督史仵龍開壘降兆子恭退走兆輕兵倍道從河梁西渉渡掩襲京邑先是河邊人夢神謂已曰尒朱家欲渡河用爾作灅波津令爲之縮水脉月餘夢者死及兆至有行人自言知水淺處以草往往表揷而導道焉忽失其所在兆遂策馬涉渡是日暴風鼓怒黄塵漲天騎叩宫門宿衞乃覺彎弓欲射袍撥弦矢不得發一時散走帝歩出雲龍門外爲兆騎所繫幽於永寧佛寺兆撲殺皇子汙辱妃嬪縱兵虜掠停洛旬餘先令衞送莊帝於晉陽兆後於河梁監閲財貨遂害帝於五級寺初兆將向洛也遣使招齊獻武王欲與同舉王時爲晉州刺史謂長史孫騰曰臣而伐君其逆已甚我今不往彼必致恨卿可往申吾意但云山蜀未平今方攻討不可委之而去致有後憂定蜀之日當隔河爲掎角之勢如此報之以觀其趣騰乃詣兆及之於并州大谷具申王言兆殊不悦且曰還白高兄弟有吉夢今叚之行必有剋獲騰問王夢如何兆荅曰吾比夢吾亡父登一高堆堆旁之地悉皆耕熟唯有馬藺草株往往猶在吾父問言何故不拔左右云堅不可去吾父顧我令下拔之吾手所至無不盡出以此而言往必有利騰還具報王曰兆等猖狂舉兵犯上吾今不同猜忌成矣勢不可反事尒朱今也南行天子列兵河上兆進不能渡退不得還吾乘山東下出其不意此徒可以一舉而擒俄而兆剋京師孝莊幽縶都督尉景從兆南行以書報王王得書大驚召騰示之曰卿可馳驛詣兆示以謁賀密觀天子今在何處爲隨兆軍府爲别送晉陽脱其送并卿宜馳報吾當於路邀迎唱大義於天下騰晨夜驅馳已遇帝於中路王時率騎東轉聞帝已渡於是西還仍與兆書陳其福禍不宜害天子受惡名兆怒不納帝遂暴崩初榮既死莊帝詔河西人紇豆陵歩蕃等令襲秀容兆入洛後歩蕃兵勢甚盛南逼晉陽兆所以不暇留洛回師禦之兆雖驍果本無策略頻爲歩蕃所敗於是部勒士馬謀出山東令人頻徵獻武王於晉州乃分三州六鎮之人令王統領既分兵别營乃引兵南出以避歩蕃之鋭歩蕃至於樂平郡王與兆還討破之斬歩蕃於秀容之石鼓山其衆退走兆將數十騎詣王通夜宴飲後還營招王王知兆難信未能顯示將欲詣之臨上馬長史孫騰牽衣而止兆乃隔水責罵騰等於是各去王還自襄垣東出兆歸晉陽及前廢帝立授兆使持節侍中都督中外諸軍事柱國大將軍領軍將軍領左右并州刺史兼録尚書事大行臺又以兆爲天柱大將軍兆謂人曰此是叔父終官我何敢受遂固辭不拜尋加都督十州諸軍事世襲并州刺史齊獻武王之剋殷州也兆與仲逺度律約共討之仲逺度律次於陽平北出井陘屯於廣阿衆號十萬王廣縱反間或云世隆兄弟謀欲害兆復言兆與王同圖仲逺等於是兩不相信各致猜疑徘徊不進仲遠等頻使斛斯椿賀拔勝往喻之兆輕騎三百來就仲逺同坐幕下兆性麤獷意色不平手舞馬鞭長嘯凝望深疑仲逺等有變遂趨出馳還仲逺遣椿勝等追而曉譬兆遂拘縛將還經日放遣仲逺等於是奔退王乃進擊兆兆軍大敗兆與仲逺度律遂相疑阻乆而不和世隆請前廢帝納兆女爲后兆乃大喜世隆厚禮喻兆赴洛深示卑下隨其所爲無敢違者兆與天光度律更自信約然後大會於韓陵山戰敗復奔晉陽遂大掠并州城内獻武王自鄴進討之兆遂走於秀容王又追擊度赤洪嶺破之衆並降散兆竄於窮山殺所乗馬自縊於樹王收而葬之兆果於戰鬭每有征伐常居鋒首當時諸將伏其材力而麤脱少智無將領之能榮雖竒其膽決然每云兆不過將三千騎多則亂矣兆弟智虎前廢帝封爲安定王驃騎大將軍肆州刺史開府儀同三司與兆俱走獻武王擒之於梁郡岢嵐南山赦之後死於晉陽尒朱彦伯榮從弟也祖侯真高祖時并安二州刺史始昌侯父買珍世宗時武衞將軍出爲華州刺史彦伯性和厚釋褐奉朝請累遷奉車都尉爲榮府長史元曄立以爲侍中前廢帝濳默龍花佛寺彦伯敦喻往來尤有勤款廢帝既立尒朱兆以已不預謀大爲忿恚將攻世隆詔令華山王鷙兼尚書僕射北道大使慰喻兆兆猶不釋世隆復遣彦伯自往喻之兆乃止及還帝醼彦伯於顯陽殿時侍中源子恭黄門郎竇瑗並侍坐彦伯曰源侍中比爲都督與臣相持於河内當爾之時旗鼓相望𦕈如天隔寧期同事陛下今日之歡也子恭曰蒯通有言犬吠非其主他日之事永安猶今日之事陛下耳帝曰源侍中可謂有射鈎之心也遂令二人極醉而罷尋除使持節驃騎大將軍右光禄大夫馬場大都督封博陵郡開國公後進爵爲王又遷}
