  - {type: 'tls:seg', offset: 5740, content: '', id: KR2a0020_ZHSJ_075-d75p37s3}
  - {type: variant, offset: 5740, length: 0, content: '', WYG: 殺邪利并其所部天光與岳悦等馳赴之道洛出城拒戰暫交便退追殺千餘人道洛還走入山城復降附天光遣慰喻道洛不從乃率衆西依牽屯山據險自守榮責天光失邪利不獲道洛復遣使杖之一百詔降爲散騎常侍撫軍將軍雍州刺史削爵爲侯天光與岳悦等復向牽屯討之天光身討道洛道洛戰敗牽數千騎而走追之不及遂得入隴投略陽賊帥王慶雲慶雲以道洛驍果絶倫得之甚喜便謂大事可圖乃自稱皇帝以道洛爲大將軍天光欲討之而莊帝頻勑榮復有書以隴中險邃兼天盛暑令待冬月而天光知其可制乃率諸軍入隴至慶雲所居永洛城慶雲道洛出城拒戰天光復射中道洛臂失弓還走破其東城賊遂併趨西城城中無水衆聚熱渴有人走降言慶雲道洛欲突出死戰天光恐失賊帥燼釁未已乃遣謂慶雲曰力屈如此可以早降若未敢決當聴諸人今夜共議明晨早報而慶雲等冀得小緩待夜突出報天光云請待明日天光因謂曰相知須水今爲小退任取河飲賊衆安悦無復走心天光密使軍人多作木槍各長七尺至黄昏時布立人馬爲防衞之勢周匝立槍要路加厚又伏人槍中備其衝突兼令密縛長梯於城北其夜慶雲道洛果便突出馳馬先進不覺至槍馬各傷倒伏兵便起同時擒獲餘衆皆出城南遇槍而止城北軍士登梯上城賊徒路窮乞降至明盡收其仗天光岳悦等議悉坑之死者萬七千人分其家口於是三秦河渭𤓰涼鄯善咸來款順天光頓軍略陽詔復天光前官爵尋加侍中儀同三司增邑至三千户秦州城民謀殺刺史駱超超覺走歸天光天光復與岳悦等討平之南秦滑城人謀害刺史辛琛顯琛顯走赴天光天光遣帥臨之往皆尅定初賊帥夏州人宿勤明達降天光於平涼後復北走收聚部類謀爲逆攻降人叱干麒麟欲并其衆麒麟請救於天光天光遣岳討之未至明達走於東夏岳聞榮死故不追之仍還涇州以待天光天光亦下隴與岳圖入洛之䇿進至雍州比破叛已疑詔遣侍中朱瑞詣天光慰喻天光與岳謀欲令帝外奔别更推立乃頻啓云臣實無異心惟仰奉天顔以申宗門之罪又其下寮屬啓云天光密有異圖願思勝筭以防微意既而莊帝進天光爵爲廣宗王元曄又以爲隴西王及聞尒朱兆已入京師天光乃輕騎向都見世隆等尋便還雍世隆等議廢元曄更舉親賢遣使告天光天光與定䇿立前廢帝加開府儀同三司兼尚書令關西大行臺天光出夏州遣將討宿勤明達擒之送洛時費也頭帥紇豆陵伊利万俟受洛于等據有河西未有所附天光以}
