  - {type: variant, offset: 2178, length: 2908, content: 太中大夫行秦梁二州事代邢巒鎮漢中後還京師於路除農太守非心所樂時英東征鍾離連表請永求以為將朝廷不聽永每言曰文淵充國竟何人哉吾獨白首見拘此郡深用扼腕然於治民非其所長故在任無多聲稱未幾解郡還為太中大夫行南青州事遷左將軍南兗州刺史猶能馳射盤馬奮矟時年踰八十常諱言老每自稱六十九還京拜平東將軍光祿大夫熙平元年卒年八十三贈安東將軍齊州刺史永嘗登北邙於平坦處奮矟躍馬盤旋瞻望有終焉之志遠慕杜預近好李沖王肅欲葬附其墓遂買左右地數頃遺敕子叔偉曰此吾之永宅也永妻賈氏留於本鄉永至代都娶妾馮氏生叔偉及數女賈後歸平城無男唯一女馮恃子事賈無禮叔偉亦奉賈不順賈常忿之馮先永亡及永之卒叔偉稱父命欲葬北邙賈疑叔偉將以馮合葬賈遂求歸葬永於所封貝丘縣事經司徒司徒胡國珍本與永同經征役感其所慕許叔偉葬焉賈乃邀訴靈太后靈太后遂從賈意事經朝堂國珍理不能得乃葬於東清河又永昔營宅兆葬父母於舊鄉賈於此強徙之與永同處永宗親不能抑葬已數十年矣棺為桑棗根所遶束去地尺餘甚為周固以斧斬斫出之於坎時人咸怪未三年而叔偉亡叔偉九歲為州主簿及長膂力過人彎弓三百斤左右馳射又能立馬上與人角騁見者以為得永之武而不得永文也正光中叔偉子豐生襲封傅豎眼本清河人七世祖伷伷子遘石虎太常祖父融南徙渡河家于磐陽為鄉閭所重性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乘者人曰何由得人乘之有一人對曰唯有傅靈慶堪乘此馬又有弓一張亦無人堪引人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解人曰唯傅靈越可解此文融意謂其三子文武才幹堪以駕馭當世常密謂鄉人曰汝聞之不鬲虫之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附劉駿將蕭斌王玄謨寇碻磝時融始死玄謨強引靈慶為軍主將攻城攻車為城內所燒靈慶懼軍法詐云傷重令左右輿之還營遂與壯士數十騎遁還斌玄謨命追之左右諫曰靈慶兄弟並有雄才兼其部曲多是壯勇如彭超戶生之徒皆一當數十人援不虛發不可逼也不如緩之玄謨乃止靈慶至家遂與二弟匿於山澤之間時靈慶從叔乾愛為斌法曹參軍斌遣乾愛誘呼之以腰刀為信密令壯健者隨之而乾愛不知斌之欲圖靈慶也既至靈慶間對坐未久斌所遣壯士執靈慶殺之靈慶將死與母崔訣言法曹殺人不可忘也靈根靈越奔河北靈越至京師高宗見而奇之靈越因說齊民慕化青州可平高宗大悅拜靈越鎮遠將軍青州刺史貝丘子鎮羊蘭城靈根為臨齊副將鎮明潛壘靈越北入之後母崔氏遇赦免劉駿恐靈越在邊擾動三齊乃以靈越叔父琰為冀州治中乾愛為樂陵太守樂陵與羊蘭隔河相對命琰遣其門生與靈越婢詐為夫婦投化以招之靈越與母分離思積遂與靈根相要南走靈越與羊蘭奮兵相擊乾愛遣船迎之得免靈根差期不得俱渡臨齊人覺知剉斬殺之乾愛出郡迎靈越問靈根愆期之狀而靈越殊不應答但言不知而已乾愛不以為惡敕左右出匣中烏皮袴褶令靈越代所常服靈越言不須乾愛云汝豈可著體上衣服見垣公也時垣護之為刺史靈越奮聲言垣公垣公著此當見南方國主豈垣公也竟不肯著及至丹陽劉駿見而禮之拜員外郎兗州司馬帶魯郡而乾愛亦遷青冀司馬帶魏郡後二人俱還建康靈越意欲為兄復讎而乾愛初不疑防知乾愛嗜雞肉葵菜食乃為作之下以毒藥乾愛飯還而卒後數年而靈越為太原太守戍升城後舉兵同劉駿子子勛子勛以靈越為前軍將軍子勛敗靈越軍衆散亡為劉彧將王廣之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺廣之生送詣彧輔國府司馬劉勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加以大恩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末備皆參預人生歸於一死實無面求活勔壯其意送詣建康劉彧欲加原宥靈越辭對如一終不回改乃殺之豎眼即靈越子也沉毅壯烈少有父風入國鎮南王肅見而異之且奇其父節傾心禮敬表為參軍從肅征伐累有戰功稍遷給事中步兵校尉左中郎將常為統軍東西征伐世宗時為建武將軍討揚州賊破之仍鎮於合肥蕭衍民歸之者數千戶後武興氐楊集義反叛推其兄子紹先為主攻圍關城梁州刺史邢巒遣豎眼討之集義衆逆戰頻破走之乘勝追北仍克武興還洛詔假節行南兗州事豎眼善於綏撫南人多歸之轉昭武將軍益州刺史以州初置境逼巴獠給羽林虎賁三百人進號冠軍將軍及高肇伐蜀假豎眼征虜將軍持節領步兵三萬先討北巴蕭衍聞大軍西伐遣其寧州刺史任太洪從陰平偷路入益州北境欲擾動氐蜀以絕運路乘國諱班師遂扇誘土民奄破東洛除口二戍因此詐言南軍繼至氐蜀信之翕然從逆太洪率氐蜀數千圍逼關城豎眼遣寧朔將軍成興孫討之軍次白護太洪遣其輔國將軍任碩北等率衆一千邀險拒戰在虎徑南山連置三營興孫分遣諸統隨便掩擊皆破之太洪又遣軍主邊昭等率氐蜀三千攻逼興孫柵興孫力戰為流矢所中死豎眼又遣統軍姜喜季元度從東木岺潛入回出西崗邀賊之後表𩹉合擊大破之斬邊昭及太洪前部王隆護首於是太洪及關城五柵一時逃散豎眼性既清素不營產業衣食之外俸祿粟帛皆以饗賜夷首賑恤士卒撫蜀人以恩信為本保境安民不以小利侵竊有掠蜀民入境者皆移送還本土撿勒部下守宰肅然遠近雜夷相率款謁仰其德化思為魏民矣是以蜀民請軍者旬月相繼世宗甚嘉之肅宗初屢請解州乃以元法僧代之益州民追隨戀泣者數百里至洛拜征虜將軍太中大夫蕭衍遣將趙祖悅入屯硤石以逼壽春鎮南將軍崔亮討之以豎眼為持節鎮南軍司法僧既至大失民和蕭衍遣其信武將軍衡州刺史張齊因民心之怨入寇晉壽頻陷葭萌小劍諸戍進圍州城朝廷以西南為憂乃驛徵豎眼於淮南既至以為右將軍益州刺史尋加散騎常侍平西將軍假安西將軍西征都督率步騎三千以討張齊給銅印千餘須有假職者聽六品已下板之豎眼既出梁州衍冠軍將軍勾道侍梁州刺史王太洪等十餘將所在拒塞豎眼三日之中轉戰二百餘里甲不去身頻致九捷土民統軍席廣度等處處邀擊斬太洪及衍征虜將軍楊伏錫等首張齊引兵西退遂奔葭萌蜀民聞豎眼復為刺史人人喜悅迎於路者日有百數豎眼至州白水已東民皆寧業先是蕭衍信義將軍都統白水諸軍事楊興起征虜將軍李光宗襲據白水舊城豎眼遣虎威將軍強虬與陰平王楊太赤率衆千餘夜渡白水旦而交戰大敗賊軍斬興起首克復舊城又遣統軍傅曇表等大破衍寧朔將軍王光昭於陰平張齊仍阻白水屯寇葭萌豎眼分遣諸將水陸討之齊遣其寧朔將軍費忻督步騎二千逆來拒戰軍主陳洪起力戰破之乘勝追奔遂臨夾谷三柵統軍胡小虎四面攻之三柵俱潰張齊親率驍勇二萬餘人與諸軍交戰豎眼命諸統帥同時奮擊軍主許暢斬衍雄信將軍牟興祖軍主孔領周射齊中足於是大破賊軍斬獲甚衆齊乃柵於虎頭山下賊帥任令崇屯據西郡豎眼復遣討之令崇棄衆夜遁乃進討齊破其二柵斬首萬餘齊被重創奔竄而退小劍大劍賊亦捐城西走益州平靈太后璽書慰勞賜驊騮馬一匹寶劍一口豎眼表求解州不許復轉安西將軍岐州刺史常侍如故仍轉梁州刺史常侍將軍如故梁州之人既得豎眼為牧人咸自賀而豎眼至州遇患不堪綜理其子敬紹險暴不仁聚貨耽色甚為民害遠近怨望焉尋假鎮軍將軍都督梁西益巴三州諸軍事蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等十軍率衆三萬入寇直城豎眼遣敬紹總衆赴之倍道而進至直城而賊襲據直口敬紹以賊斷歸路督兼統軍高徹吳和等與賊決戰大破之擒斬三千餘人休儒等走還魏興敬紹頗覽書傳微有膽力而奢淫倜儻輕為殘害又見天下多事陰懷異圖欲杜絕四方擅據南鄭令其妾兄唐崐崙扇攪於外聚衆圍城敬紹謀為內應賊圍既合其事泄露在城兵武執敬紹白豎眼而殺之豎眼恚發疾遂卒永安中贈征東將軍吏部尚書齊州刺史出帝初重贈, WYG: ''}
  - {type: variant, offset: 2178, length: 2908, content: 太中大夫行秦梁二州事代邢巒鎮漢中後還京師於路除農太守非心所樂時英東征鍾離連表請永求以為將朝廷不聽永每言曰文淵充國竟何人哉吾獨白首見拘此郡深用扼腕然於治民非其所長故在任無多聲稱未幾解郡還為太中大夫行南青州事遷左將軍南兗州刺史猶能馳射盤馬奮矟時年踰八十常諱言老每自稱六十九還京拜平東將軍光祿大夫熙平元年卒年八十三贈安東將軍齊州刺史永嘗登北邙於平坦處奮矟躍馬盤旋瞻望有終焉之志遠慕杜預近好李沖王肅欲葬附其墓遂買左右地數頃遺敕子叔偉曰此吾之永宅也永妻賈氏留於本鄉永至代都娶妾馮氏生叔偉及數女賈後歸平城無男唯一女馮恃子事賈無禮叔偉亦奉賈不順賈常忿之馮先永亡及永之卒叔偉稱父命欲葬北邙賈疑叔偉將以馮合葬賈遂求歸葬永於所封貝丘縣事經司徒司徒胡國珍本與永同經征役感其所慕許叔偉葬焉賈乃邀訴靈太后靈太后遂從賈意事經朝堂國珍理不能得乃葬於東清河又永昔營宅兆葬父母於舊鄉賈於此強徙之與永同處永宗親不能抑葬已數十年矣棺為桑棗根所遶束去地尺餘甚為周固以斧斬斫出之於坎時人咸怪未三年而叔偉亡叔偉九歲為州主簿及長膂力過人彎弓三百斤左右馳射又能立馬上與人角騁見者以為得永之武而不得永文也正光中叔偉子豐生襲封傅豎眼本清河人七世祖伷伷子遘石虎太常祖父融南徙渡河家于磐陽為鄉閭所重性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乘者人曰何由得人乘之有一人對曰唯有傅靈慶堪乘此馬又有弓一張亦無人堪引人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解人曰唯傅靈越可解此文融意謂其三子文武才幹堪以駕馭當世常密謂鄉人曰汝聞之不鬲虫之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附劉駿將蕭斌王玄謨寇碻磝時融始死玄謨強引靈慶為軍主將攻城攻車為城內所燒靈慶懼軍法詐云傷重令左右輿之還營遂與壯士數十騎遁還斌玄謨命追之左右諫曰靈慶兄弟並有雄才兼其部曲多是壯勇如彭超戶生之徒皆一當數十人援不虛發不可逼也不如緩之玄謨乃止靈慶至家遂與二弟匿於山澤之間時靈慶從叔乾愛為斌法曹參軍斌遣乾愛誘呼之以腰刀為信密令壯健者隨之而乾愛不知斌之欲圖靈慶也既至靈慶間對坐未久斌所遣壯士執靈慶殺之靈慶將死與母崔訣言法曹殺人不可忘也靈根靈越奔河北靈越至京師高宗見而奇之靈越因說齊民慕化青州可平高宗大悅拜靈越鎮遠將軍青州刺史貝丘子鎮羊蘭城靈根為臨齊副將鎮明潛壘靈越北入之後母崔氏遇赦免劉駿恐靈越在邊擾動三齊乃以靈越叔父琰為冀州治中乾愛為樂陵太守樂陵與羊蘭隔河相對命琰遣其門生與靈越婢詐為夫婦投化以招之靈越與母分離思積遂與靈根相要南走靈越與羊蘭奮兵相擊乾愛遣船迎之得免靈根差期不得俱渡臨齊人覺知剉斬殺之乾愛出郡迎靈越問靈根愆期之狀而靈越殊不應答但言不知而已乾愛不以為惡敕左右出匣中烏皮袴褶令靈越代所常服靈越言不須乾愛云汝豈可著體上衣服見垣公也時垣護之為刺史靈越奮聲言垣公垣公著此當見南方國主豈垣公也竟不肯著及至丹陽劉駿見而禮之拜員外郎兗州司馬帶魯郡而乾愛亦遷青冀司馬帶魏郡後二人俱還建康靈越意欲為兄復讎而乾愛初不疑防知乾愛嗜雞肉葵菜食乃為作之下以毒藥乾愛飯還而卒後數年而靈越為太原太守戍升城後舉兵同劉駿子子勛子勛以靈越為前軍將軍子勛敗靈越軍衆散亡為劉彧將王廣之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺廣之生送詣彧輔國府司馬劉勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加以大恩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末備皆參預人生歸於一死實無面求活勔壯其意送詣建康劉彧欲加原宥靈越辭對如一終不回改乃殺之豎眼即靈越子也沉毅壯烈少有父風入國鎮南王肅見而異之且奇其父節傾心禮敬表為參軍從肅征伐累有戰功稍遷給事中步兵校尉左中郎將常為統軍東西征伐世宗時為建武將軍討揚州賊破之仍鎮於合肥蕭衍民歸之者數千戶後武興氐楊集義反叛推其兄子紹先為主攻圍關城梁州刺史邢巒遣豎眼討之集義衆逆戰頻破走之乘勝追北仍克武興還洛詔假節行南兗州事豎眼善於綏撫南人多歸之轉昭武將軍益州刺史以州初置境逼巴獠給羽林虎賁三百人進號冠軍將軍及高肇伐蜀假豎眼征虜將軍持節領步兵三萬先討北巴蕭衍聞大軍西伐遣其寧州刺史任太洪從陰平偷路入益州北境欲擾動氐蜀以絕運路乘國諱班師遂扇誘土民奄破東洛除口二戍因此詐言南軍繼至氐蜀信之翕然從逆太洪率氐蜀數千圍逼關城豎眼遣寧朔將軍成興孫討之軍次白護太洪遣其輔國將軍任碩北等率衆一千邀險拒戰在虎徑南山連置三營興孫分遣諸統隨便掩擊皆破之太洪又遣軍主邊昭等率氐蜀三千攻逼興孫柵興孫力戰為流矢所中死豎眼又遣統軍姜喜季元度從東木岺潛入回出西崗邀賊之後表𩹉合擊大破之斬邊昭及太洪前部王隆護首於是太洪及關城五柵一時逃散豎眼性既清素不營產業衣食之外俸祿粟帛皆以饗賜夷首賑恤士卒撫蜀人