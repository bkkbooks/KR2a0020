  - {type: variant, offset: 577, length: 221, content: 出為黎陽太守所在無政績天平中坐子尚書郎洪業入於關中率衆侵擾伏法傅永字脩期清河人也幼隨叔父洪仲與張幸自青州入國尋復南奔有氣幹拳勇過人能手執鞍橋倒立馳騁年二十餘有友人與之書而不能答請於洪仲洪仲深讓之而不為報永乃發憤讀書涉獵經史兼有才筆自東陽禁防為崔道固城局參軍與道固俱降入為平齊民父母並老飢寒十數年賴其強於人事勠力傭丐得以存立晚乃被召兼治禮郎詣長安拜文明太后父燕宣王廟賜爵貝丘男加伏波將軍未幾除中書博士又改為議郎轉尚書考功郎中為大司馬從事中郎尋轉, WYG: ''}
