  - {type: variant, offset: 3931, length: 244, content: 江陵為唐興所斬其餘親從或當時擒獲或奔散外境數年之間並敗滅之海夷馮跋字文起小名乞直伐本出長樂信都慕容永僭號長子以跋父安為將永為垂所滅安東徙昌黎家于長谷跋飲酒至一石不亂母弟素弗次丕次洪皆任俠放逸不修行業跋恭慎勤稼穡既家昌黎遂同夷俗後慕容熙僭號以跋為殿中左監稍遷衞中郎將後坐事逃亡既而熙政殘虐民不堪命跋乃與從兄萬泥等二十三人結謀跋與二弟乘車使婦人御潛入龍城匿於孫護之室以誅熙乃立夕陽公高雲為主以跋為侍中征北大將軍開府儀同三司封武邑公事皆決跋兄弟太宗初雲為左右所殺跋乃自立為燕王置百官號年太平于時, WYG: 邊}
