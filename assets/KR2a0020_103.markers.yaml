  - {type: variant, offset: 9162, length: 0, content: '', WYG: 求婚獻武王方招四遠以常山王妹樂安公主許之改為蘭陵公主瓌遣奉馬千匹為娉禮迎公主詔宗正元夀送公主往北自是朝貢相尋瓌以齊獻武王威徳日盛請致愛女於王靜帝詔王納之自是塞外無塵矣匈奴宇文莫槐出於遼東塞外其先南單于遠屬也世為東部大人其語與鮮卑頗異人皆翦髪而留其頂上以為首飾長過數寸則截短之婦女披長􅃭及足而無裳焉秋收烏頭為毒藥以射禽獸莫槐虐用其民為部人所殺更立其弟普撥為大人普撥死子丘不勤立尚平文女丘不勤死子莫廆立本名犯太祖諱莫廆遣弟屈雲攻慕容廆廆撃破之又遣别部素延伐慕容廆於棘城復為慕容廆所破時莫廆部衆彊盛自稱單于塞外諸部咸畏憚之莫廆死子遜昵延立率衆攻慕容廆於棘城廆子翰先戍於外遜昵延謂其衆曰翰素果勇必為人患宜先取之城不足憂也乃分騎數千襲翰聞之使人詐為叚末波使者逆謂遜昵延曰翰數為吾患乆思除之今聞來討其善戒嚴相待宜兼路早赴翰設伏待之遜昵延以為信然長驅不備至於伏所為翰所虜翰馳使告廆乗勝遂進及晨而至廆亦盡銳應之遜昵延見而方嚴率衆逆戰前鋒始交而翰已入其營縱火燎之衆乃大潰遜昵延單馬奔還悉俘其衆遜昵延父子世雄漠北又先得玉璽三紐自言為天所相每自誇大及此敗也乃卑辭厚幣遣使朝獻于昭帝帝嘉之以女妻焉遜昵延死子乞得龜立復伐慕容廆廆拒之惠帝三年乞得龜屯保澆水固壘不戰遣其兄悉跋堆襲廆子仁于栢林仁逆擊斬悉跋堆廆又攻乞得龜克之乞得龜單騎夜奔悉虜其衆乘勝長驅入其國城收資財億計徙部民數萬户以歸先是海出大龜枯死於平郭至是而乞得龜敗别部人逸豆歸殺乞得龜而自立與慕容晃相攻撃遣其國相莫渾伐晃而莫渾荒酒縱獵為晃所破死者萬餘人建國八年晃伐逸豆歸逸豆歸拒之為晃所敗殺其驍將涉亦干逸豆歸遠遁漢北遂奔髙麗晃徙其部衆五千餘落於昌黎自此散滅矣徒河叚就}
