  - {type: variant, offset: 95, length: 2696, content: 迹故抑玄兄弟出為義興太守不得志少時去職皇始初司馬德宗立其會稽王道子擅權信任尚書僕射王國寶為時所疾玄說荊州刺史殷仲堪令推德宗兗州刺史王恭為盟主以討國寶仲堪從之會恭使亦上相逢於中路約同大舉並抗表起兵尋平王國寶等天興初德宗以玄為使持節督交廣二州諸軍事建威將軍平越中郎將廣州刺史後王恭復與德宗豫州刺史庾楷共起兵以討其江州刺史王愉司馬尚之兄弟玄及龍驤將軍揚佺期荊州刺史殷仲堪等率軍應恭玄等造於石頭於時德宗征虜將軍司馬元顯一軍仍守石頭列舟艦斷淮口道子出軍將屯中堂忽有馬驚軍中擾亂人馬赴江者甚衆良久乃定玄等不知建業危弱且王恭尋敗玄甚惶懼乃回軍于蔡洲王恭司馬劉牢之率北府軍來次新亭於是德宗以桓脩為荊州仲堪為廣州玄為江州佺期為雍州刺史郗恢為尚書仲堪回師南旋乃使人徇于玄等軍曰若不各散歸大軍至江陵當悉戮餘口仲堪偏將劉系先領兵二千隸于佺期輒率衆而歸玄等大懼乃狼狽而走庾楷亦棄衆奔于南軍玄並趣輕舟追仲堪至尋陽而推玄為盟主鎮於夏口德宗加玄都督荊州四郡以玄兄西昌公偉為輔國將軍南蠻校尉寵玄兄弟欲以侵削荊雍先是荊州大水仲堪倉廩空竭玄乘其虛而伐之先遣軍襲巴陵梁州刺史郭銓當之鎮路逢玄玄遣銓為前驅玄發夏口與仲堪書云今當入沔討除佺期頓兵江口若相與無貳可殺楊廣若其不爾便當率軍入江別與桓偉書令剋期為內應偉惶遽以書示仲堪仲堪慰喻遣歸夜乃執之仲堪遣龍驤將軍殷邁振威將軍劉山民等統衆七千至西江口玄聞邁至復與其黨苻永道領帳下擊之邁等敗走玄頓巴陵收其兵而館其穀復破楊廣於夏口仲堪既失巴陵之積又諸將皆敗江陵駭震城內大飢皆以胡麻為廩初仲堪之得玄書也急召佺期佺期曰江陵無食何以待敵可來見就共守襄陽仲堪猶以全軍無緣棄城迸走甚憂佺期弗來乃紿之曰比來收集已有儲矣可有數萬人百日糧佺期信之乃率步騎八千既至仲堪惟以飯餉其軍佺期大怒曰今茲敗矣不過見仲堪使人於艦上橫射玄玄軍亦射之佺期乃退玄乃渡軍於馬頭命其諸軍進破殺仲堪殺楊廣佺期殷道護及仲堪參軍羅企生等德宗以玄為持節都督荊司雍秦梁益寧江八州及揚豫并八郡諸軍事後將軍荊江二州刺史玄大論功賞以長史卞範之領南郡相委以心膂之任乃斷上流禁商旅德宗下書曰豎子桓玄故大司馬不腆之息少懷狡惡長而不悛遂與王恭協同姦謀阻兵內侮三方雲集志在問鼎窺擬神器賴祖宗威靈宰傅神略忠義奮發罪人斯殞玄等猖狂失圖回舟鳥逝便宜乘會殲除姦源于時同異之論用惑廟策遂使王憲廢撓寵授非所猶冀玄當洗濯胸腑小懲大誡而狼心弗革悖慢愈甚割據江湘擅威荊郢矯命稱制與奪在手又對侍中王謐放肆醜言欲縱凶毒陵陷上京無君之心形於音翰不臣之迹日月彌著是可忍也孰不可懷宜明九伐以寧西夏尚書令後將軍元顯可為征討大都督督十八州諸軍事驃騎大將軍儀同三司以劉牢之為前鋒行征西將軍權領江州命司馬尚之入沔水玄聞元顯處分甚駭懼欲保江陵長史卞範之說玄東下玄甚狐疑範之苦勸玄乃留桓偉守江陵率軍東下至夏口乃建牙傳檄曰案揚州刺史元顯凶暴之性自幼加長犯禮毀教發蒙如備居喪無一日之哀衰絰為宵征之服絃觴於殷憂之時窮色於罔極之日劫略王國寶妓妾一朝空房此基惡之始駭愕視聽者矣相王有疾情無悚懼幸災擅命揚州篡授遂乃父子同錄比肩連案既專權重多行險暴恐相王知之杜絕視聽惡聲無聞佞譽日至萬機之重委之厮孽國典朝政紛紜淆亂又諷旨尚書使普敬錄公錄公之位非盡敬之所苟自尊貴遂悖朝禮又妖賊陵縱破軍殄民之後己為都督親則刺史於宜降之日輒加崇進弱冠之年古今莫比宰相懲惡己獨解錄推禍委罰歸之有在自古僭逆未有若斯之甚者取妾之僭殆同六禮及使尚書僕射為媒人長史為迎客嬖媵饕餮賀同長秋所謂無君之心觸事而發八日觀佛略人子女至人家宿唐突婦妾慶封迄今甫見易室之飲晉靈以來忽有支解之刑喜怒輕戮人士割裂治城之暴一睡而斬又以四歲孽子興東海之封吳興殘暴之後橫復若斯之調妖賊之興實由此竪居喪極味孫泰供其膳在夜思遊亦孫泰延其駕泰承其勢得行威福雖加誅戮所染既多加之以苦發樂屬枉濫者衆驅逐徙撥死叛殆盡改號元興以為己瑞莽之符命於斯尤著否極必亨天盈其毒不義不昵勢必崩喪取亂侮亡實在斯會三軍文武憤踊即路玄亦失荊楚人情而師出不順其兵雖強慮弗為用有回師之計既過尋陽不見東軍玄意乃定於是遂鼓行而進徑至姑熟又克歷陽劉牢之遣子敬宣詣玄請降玄大喜與敬宣置酒宴集玄至新亭元顯棄船退入國子堂列陳宣陽門前元顯欲挾德宗出戰而軍中相驚言玄已及南桁乃回軍赴宮既至中堂一時崩散元顯奔東府惟張法順一騎隨之玄乃為侍中都督中外諸軍丞相錄尚書事揚州牧領徐州刺史持節荊江二州公如故假黃鉞羽葆鼓吹班劍二十人置左右長史從事中郎四人甲仗二百人入殿於是收道子付廷尉免為庶人徙于安城郡殺元顯并其子及豫州刺史司馬尚之吏部郎袁遵張法順等又滅庾楷於豫章徙尚之弟丹楊尹恢之輔國將軍允之及國寶王緒諸子于交廣州以劉牢之為會稽內史將欲解其兵也初敬宣既降隨入東府至是求歸玄冀牢之受命乃遣之敬宣既至牢之知將不免欲襲玄衆皆離散乃於班瀆北走縊於新洲傳首建鄴敬宣奔於江北玄白德宗大赦改年為大亨玄讓丞相荊江徐三州及錄尚書事乃改授太尉都督中外揚州牧領平西將軍豫州刺史綠綟綬加袞冕之服劍履之禮入朝不趨讚拜不名增班劍六十人甲仗二百人入殿玄乃鎮姑熟既而大築府第田遊無度政令屢改驕侈肆欲朋黨翕習沮亂內外朝政皆諮焉小事則決於左僕射桓謙及丹陽尹卞範之玄大賦三吳富室以賑飢民猶不能濟也東郡既由兵掠因以飢饉死者甚衆三吳戶口減半會稽則十三四臨海永嘉死散殆盡諸舊富室皆衣羅縠佩金玉相守閉門而死玄自封豫章郡公食安成七千五百戶後封桂陽郡公邑二千五百戶本封南郡如故既而鴆殺道子玄削奪德宗供奉之具務盡約陋殆至飢寒雖殺逆未至君臣之體盡矣進位大將軍加前後部羽葆鼓吹奏事不名又表請自率諸軍命諸蕃方兵掃平關洛德宗不許之玄本無資力但好為大言既不辦行乃云奉詔故止玄既無他處分先作征行服玩并制裝書畫之具或諫曰今日之行必有征無戰輜重自足相運不煩復有制造玄曰書畫服玩宜在左右且兵凶戰危脫有意外當使輕而易運衆咸笑之玄所親仗惟桓偉而已先欲徵還以自副貳偉既死玄甚恇懼初玄常以其父王業垂成以己弱年不昌前構常懷恨憤及昌明死便有四方之計既克建業無復居下之心及偉死慮一己單危益欲速成大業卞範之之徒既慮事變且幸其利咸共催促於是殷仲文等並已撰集策命矣德宗加玄相國總百揆封南郡南平宜都天門零陵桂陽營陽衡陽義陽建平十郡為楚王備九錫之禮揚州牧領平西將軍豫州刺史如故遣司徒王謐授相國印綬光祿大夫武陵王司馬遵授楚王璽策德宗先遣百僚固請又云當親幸敦喻十二月德宗禪位於玄大赦所部稱永始元年初欲改年為建始左丞王納之曰建始者晉趙王倫之號也於是易為永始復同王莽始貴之年玄入建鄴宮逆風迅激旌旗服章儀飾一皆傾偃是月酷寒此日尤甚多行苛政而時施小惠迎溫神主進于太廟玄遊行無度至此不出殿上施金額流蘇絳帳頗類車王莽仙蓋太廟郊齋皆二日而已又其廟祭, WYG: ''}
  - {type: variant, offset: 95, length: 2696, content: 迹故抑玄兄弟出為義興太守不得志少時去職皇始初司馬德宗立其會稽王道子擅權信任尚書僕射王國寶為時所疾玄說荊州刺史殷仲堪令推德宗兗州刺史王恭為盟主以討國寶仲堪從之會恭使亦上相逢於中路約同大舉並抗表起兵尋平王國寶等天興初德宗以玄為使持節督交廣二州諸軍事建威將軍平越中郎將廣州刺史後王恭復與德宗豫州刺史庾楷共起兵以討其江州刺史王愉司馬尚之兄弟玄及龍驤將軍揚佺期荊州刺史殷仲堪等率軍應恭玄等造於石頭於時德宗征虜將軍司馬元顯一軍仍守石頭列舟艦斷淮口道子出軍將屯中堂忽有馬驚軍中擾亂人馬赴江者甚衆良久乃定玄等不知建業危弱且王恭尋敗玄甚惶懼乃回軍于蔡洲王恭司馬劉牢之率北府軍來次新亭於是德宗以桓脩為荊州仲堪為廣州玄為江州佺期為雍州刺史郗恢為尚書仲堪回師南旋乃使人徇于玄等軍曰若不各散歸大軍至江陵當悉戮餘口仲堪偏將劉系先領兵二千隸于佺期輒率衆而歸玄等大懼乃狼狽而走庾楷亦棄衆奔于南軍玄並趣輕舟追仲堪至尋陽而推玄為盟主鎮於夏口德宗加玄都督荊州四郡以玄兄西昌公偉為輔國將軍南蠻校尉寵玄兄弟欲以侵削荊雍先是荊州大水仲堪倉廩空竭玄乘其虛而伐之先遣軍襲巴陵梁州刺史郭銓當之鎮路逢玄玄遣銓為前驅玄發夏口與仲堪書云今當入沔討除佺期頓兵江口若相與無貳可殺楊廣若其不爾便當率軍入江別與桓偉書令剋期為內應偉惶遽以書示仲堪仲堪慰喻遣歸夜乃執之仲堪遣龍驤將軍殷邁振威將軍劉山民等統衆七千至西江口玄聞邁至復與其黨苻永道領帳下擊之邁等敗走玄頓巴陵收其兵而館其穀復破楊廣於夏口仲堪既失巴陵之積又諸將皆敗江陵駭震城內大飢皆以胡麻為廩初仲堪之得玄書也急召佺期佺期曰江陵無食何以待敵可來見就共守襄陽仲堪猶以全軍無緣棄城迸走甚憂佺期弗來乃紿之曰比來收集已有儲矣可有數萬人百日糧佺期信之乃率步騎八千既至仲堪惟以飯餉其軍佺期大怒曰今茲敗矣不過見仲堪使人於艦上橫射玄玄軍亦射之佺期乃退玄乃渡軍於馬頭命其諸軍進破殺仲堪殺楊廣佺期殷道護及仲堪參軍羅企生等德宗以玄為持節都督荊司雍秦梁益寧江八州及揚豫并八郡諸軍事後將軍荊江二州刺史玄大論功賞以長史卞範之領南郡相委以心膂之任乃斷上流禁商旅德宗下書曰豎子桓玄故大司馬不腆之息少懷狡惡長而不悛遂與王恭協同姦謀阻兵內侮三方雲集志在問鼎窺擬神器賴祖宗威靈宰傅神略忠義奮發罪人斯殞玄等猖狂失圖回舟鳥逝便宜乘會殲除姦源于時同異之論用惑廟策遂使王憲廢撓寵授非所猶冀玄當洗濯胸腑小懲大誡而狼心弗革悖慢愈甚割據江湘擅威荊郢矯命稱制與奪在手又對侍中王謐放肆醜言欲縱凶毒陵陷上京無君之心形於音翰不臣之迹日月彌著是可忍也孰不可懷宜明九伐以寧西夏尚書令後將軍元顯可為征討大都督督十八州諸軍事驃騎大將軍儀同三司以劉牢之為前鋒行征西將軍權領江州命司馬尚之入沔水玄聞元顯處分甚駭懼欲保江陵長史卞範之說玄東下玄甚狐疑範之苦勸玄乃留桓偉守江陵率軍東下至夏口乃建牙傳檄曰案揚州刺史元顯凶暴之性自幼加長犯禮毀教發蒙如備居喪無一日之哀衰絰為宵征之服絃觴於殷憂之時窮色於罔極之日劫略王國寶妓妾一朝空房此基惡之始駭愕視聽者矣相王有疾情無悚懼幸災擅命揚州篡授遂乃父子同錄比肩連案既專權重多行險暴恐相王知之杜絕視聽惡聲無聞佞譽日至萬機之重委之厮孽國典朝政紛紜淆亂又諷旨尚書使普敬錄公錄公之位非盡敬之所苟自尊貴遂悖朝禮又妖賊陵縱破軍殄民之後己為都督親則刺史於宜降之日輒加崇進弱冠之年古今莫比宰相懲惡己獨解錄推禍委罰歸之有在自古僭逆未有若斯之甚者取妾之僭殆同六禮及使尚書僕射為媒人長史為迎客嬖媵饕餮賀同長秋所謂無君之心觸事而發八日觀佛略人子女至人家宿唐突婦妾慶封迄今甫見易室之飲晉靈以來忽有支解之刑喜怒輕戮人士割裂治城之暴一睡而斬又以四歲孽子興東海之封吳興殘暴之後橫復若斯之調妖賊之興實由此竪居喪極味孫泰供其膳在夜思遊亦孫泰延其駕泰承其勢得行威福雖加誅戮所染既多加之以苦發樂屬枉濫者衆驅逐徙撥死叛殆盡改號元興以為己瑞莽之符命於斯尤著否極必亨天盈其毒不義不昵勢必崩喪取亂侮亡實在斯會三軍文武憤踊即路玄亦失荊楚人情而師出不順其兵雖強慮弗為用有回師之計既過尋陽不見東軍玄意乃定於是遂鼓行而進徑至姑熟又克歷陽劉牢之遣子敬宣詣玄請降玄大喜與敬宣置酒宴集玄至新亭元顯棄船退入國子堂列陳宣陽門前元顯欲挾德宗出戰而軍中相驚言玄已及南桁乃回軍赴宮既至中堂一時崩散元顯奔東府惟張法順一騎隨之玄乃為侍中都督中外諸軍丞相錄尚書事揚州牧領徐州刺史持節荊江二州公如故假黃鉞羽葆鼓吹班劍二十人置左右長史從事中郎四人甲仗二百人入殿於是收道子付廷尉免為庶人徙于安城郡殺元顯并其子及豫州刺史司馬尚之吏部郎袁遵張法順等又滅庾楷於豫章徙尚之弟丹楊尹恢之輔國將軍允之及國寶王緒諸子于交廣州以劉牢之為會稽內史將欲解其兵也初敬宣既降隨入東府至是求歸玄冀牢之受命乃遣之敬宣既至牢之知將不免欲襲玄衆皆離散乃於班瀆北走