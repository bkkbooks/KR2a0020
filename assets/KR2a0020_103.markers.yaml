  - {type: variant, offset: 13152, length: 3095, content: 建業子業謂法生曰義陽謀反我正欲誅之法生懼禍走還彭城子業遣沈慶之率師伐昶法生至彭城昶便繕甲諸郡不從昶知事不捷遂來奔子業淫其姑稱為謝氏為貴嬪夫人加以殊禮虎賁劍戟出警入蹕鑾輅龍旂在貴妃之上即義隆第十女其新蔡長公主也子業矯云主喪空設喪事而實納之時其姊山陰主大見愛狎淫恣過度謂子業曰妾與陛下男女雖殊俱託體先帝陛下六宮百數而妾惟一駙馬事不均平乃可如此子業為主置面首左右三十人進爵會稽郡長公主秩同郡王食湯沐邑二千戶給鼓吹一部加班劍二十人每出遊與羣臣陪乘吏部褚淵以有風貌子業使淵侍主子業皆令廟別畫其祖父形像曾入裕廟指裕像曰此渠大英雄生擒數天子次入義隆廟指義隆像曰此渠亦不惡但暮年中不免兒斫去頭次入其父駿廟指駿像曰此渠大好色不擇尊卑顧謂左右曰渠大鼻如何不之即令畫工駿像鼻其父子淫悖書契所無也子業又殺沈慶之撫軍諮議參軍何邁即其新蔡主壻其湘東王彧及建安王休仁山陽王休祐常被猜忌並欲誅之休仁每以調謔悅之故得推遷不死彧休祐形體肥大遂以籠盛稱之彧尤肥號曰猪王廷尉劉矇妾懷孕子業迎入宮冀其生男立為太子及其生子遂為大赦子業召其南平王鑠妃江氏偶諸左右江不從子業曰若不從當殺汝三子江猶不從乃鞭一百殺其子敬猷等巫覡云湘州有天子氣子業將南行以厭之未行前欲悉誅諸叔時彧被拘祕書省與子業左右阮佃夫等謀廢子業子業出華林園共巫竹林堂前射鬼佃夫時為內監乃以告外監典事朱幼主衣壽寂之細鎧主姜產之等寂之抽刃而前產之繼進子業引弓射寂之不中寂之乃斬其首彧既誅子業憂遽不知所為休仁推立彧彧時失履徒跣登西堂備天子儀服呼諸大臣入見事無巨細稱令施行彧以豫章王子尚及山陰主為子業所狎殺之十二月僭即帝位改年為泰始先是子業敕其弟子勛曰聞汝與何邁謀共廢我汝自量體氣何如孝武尋當遣使送藥與汝子勛長史鄧琬與錄事參軍陶亮等起兵遣其黨俞伯奇出頓大雷巴東太守孫仲之至于平石與陶亮並統前軍始彧未知子勛起兵加子勛車騎將軍儀同三司符至尋陽鄧琬乃投於地攘袂而起曰殿下當開端門何黃閤之有與陶亮等徵兵馳檄建牙於桑厄時雍州刺史袁顗便勸子勛即位琬乃立宗廟設壇場造乘輿法服立子勛為天子即位江州號義嘉元年子勛以袁顗為尚書左僕射鄧琬為尚書右僕射左司馬張悅為領軍將軍吏部尚書州郡並加爵號彧乃遣領軍將軍王玄謨討之復遣其將沈攸之劉靈出據虎檻初彧聞四方反亂憂遽不知所為休仁請前鋒決勝於是始有防禦之軍攸之軍至江州斬子勛彧慮子勛弟松滋侯子房等年大終不相服休仁遂勸除之因誅駿舅子路休之等以陷子房兄弟於是殺駿子安陸王子綏及子房臨海王子頊永嘉王子仁始安王子真邵陵王子元淮南王子孟臨賀王子產晉熙王子輿及子起子期子悅子頓初駿二十八男其餘先早夭及子業殺子鸞等至是盡殪之矣其骨肉相殘若此之甚彧南新蔡太守常珍奇奉啟請降顯祖詔遣西河公元石京兆侯張窮奇率軍援之皇興元年正月彧遣其散騎常侍貝思散騎侍郎崔小白朝貢初彧遣其鎮軍張永領軍沈攸之以大衆迎其徐州刺史薛安都安都聞永將發乃遣信請降顯祖詔博陵公尉元城陽公孔伯恭率騎二萬救之永等前後奮擊斬首凍沒死者不可勝數又其兗州刺史畢衆敬亦來降款至是徐兗及淮西諸郡青齊二州相尋歸附彧又遣其中領軍沈攸之太子左衞率劉勔寇彭城兗州刺史申纂守無鹽時薛安都略有廣平順陽義成扶風諸郡沈攸之至下邳與元等戰敗而走初彧青州刺史沈文秀冀州刺史崔道固並請歸順詔遣征南大將軍慕容白曜率衆援之文秀等復叛歸彧白曜進軍圍城二年克歷城獲道固彧遣其員外散騎常侍李豐朝貢彧遣沈文秀弟文靜海道救青州文靜至東萊之不期城白曜遣軍克之尋獲東陽城彧遣其員外散騎常侍王希涓朝貢四年六月彧又遣員外散騎常侍劉航朝貢延興元年彧於巖山射雉休祐從在後與其左右相失彧遣壽寂之率諸壯士追躡休祐蹴令墜馬拉而殺之乃揚聲曰驃騎墮馬死召司徒休仁宿尚書下省鴆而殺之自彧立之後民庶凋弊而宮殿器服多更興造初其即位軍人多被超越或有不與戎勤寄名受賞阮佃夫等並被信委凡所談笑言無不行抽進阿黨咸受不次之位故佃夫左右乃有四軍五校羽林給事等官皆市井傭販之人諂附而獲至綱紀不立風政頹弊境內多難民庶嗷然遂廣募義勇置為部曲於是官品淪褫士人渾亂民衆顒顒咸願來奔矣彧遣其司州刺史垣叔通為益州刺史叔通極為聚斂蜀還之貨過數千金知彧好財先送家資之半彧猶嫌少及叔通至建業遣詣廷尉彧先令獄官留之於訊堂彌旬不得出叔通於是悉送其財然後原遣凡蠻夷不受鞭罰輸財贖罪謂之賧時人謂叔通被賧刺史彧嘗宮內大集而裸婦人觀之以為忻笑其妻王氏以扇鄣面獨無所言彧怒曰外舍家寒乞今共為笑樂何獨不視王曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以此為樂外舍之為忻適與此不同彧大怒遣王起去彧末年好事鬼神多所忌諱言語文書有禍敗凶喪及疑似之言應回避者數百千品有犯必加罪戮改騧馬字為馬邊瓜以騧似禍字故也嘗以南苑借張永言且給三百年期訖更申其事皆如此又以宣陽門之名不善甚諱之其太后停屍漆牀移出東宮見之怒甚免中庶子官職局以下坐死者數十人內外常慮犯誤人不自保移牀治壁必祭土神文士為辭祝事如大祭又更忍虐好殺左右失旨忤意往往有刳斮斷截者時遣窺覘淮泗軍旅不息荒弊積久府藏空虛內外百官普斷祿俸而彧奢費過度務為彫侈每所造制必為正御三十副御三十次副三十須一物輒造九十枚境內騷然人不堪命彧又以壽寂之有膽決乃殺之又追降休仁休祐為庶人絕其屬籍諸子徙遠郡休祐母邢妻江付廷尉殺之遣員外散騎侍郎田廉員外散騎侍郎祖德朝貢又殺其巴陵王休若改年為泰豫又遣田廉及員外散騎侍郎劉惠秀朝貢彧又殺太子太傅王景文畏其族盛故也彧死子昱僭立改為元徽昱遣員外散騎常侍田惠紹員外散騎侍郎劉惠秀朝貢其司空桂陽王休範奔尋陽舉兵右衞將軍蕭道成率衆軍出頓新亭越騎校尉張苟兒斬休範首其左右皆散道成遣送其首塗中遇賊遂棄於水中休範之徒乃詐曰殿下猶在新亭於是士庶奔馳候迎是夜休範將杜墨騾等又攻新亭東廂休範參軍江珉等破二縣六署竊掠金帛放諸徒隸由是徒衆復盛燒東宮津陽門乃領軍右府昱將陳顯達率所領至杜姥宅破墨騾軍主全景淵進平白壁宣陽津陽二門斬墨騾等昱遣其員外散騎常侍明曇徽員外散騎侍郎江山圖朝貢五年又遣員外散騎常侍李祖員外散騎侍郎魚長耀朝貢承明初昱建平王景素據京口叛昱昱遣蕭道成前軍將軍周盤龍殿中將軍張倪奴討之攻陷京口斬景素太和初昱以其母數諫責之遂使太醫煮藥欲鴆之左右止之曰若行此事官便應作孝豈復得出入狡獪昱曰汝語大有理乃止初昱母陳氏本李道兒妾彧納之生昱故世中皆呼昱為李氏子昱每自稱李將軍或自名為李統昱直閤將軍申伯宗步兵校尉朱幼司徒左長史沈勃等欲廢昱昱親率羽林兵掩之乃躬運矛鋋手殺勃等闔門嬰稚莫不臠截昱狂走逸遊不捨晝夜腹心所寄數十許人並執兵刃為人之牙爪路行逢人便加斫刺或入人家劫略財賄往來忽狀若鬼魅建業惶振並重關自守又搥拍鍼鑿錐鋸之屬常以自隨或有忤意輒加酷暴搥陰刺心剖腹之誅日有十數常見臥屍流血然後為樂無所誅害則憂思草草於耀靈殿上養驢數十頭造露車以銀為校具或乘以出入著小袴衫帶挾刀劍與營署女子通好自齎私服贈之常入壚肆飲酒輒與左右歌唱略民鷄犬躬自屠割內外畏惡人不自保昱往新安寺夕乃還殿寢於氈幄昱左右楊玉夫楊萬年等見其醉眠乃於幄斬之左右陳奉伯稱敕開承明門出送首於直閤王敬則夜送昱首與中領軍蕭道成道成率左右數十人稱昱行還開承明門入殿云其皇太后令廢昱為蒼梧王立昱弟揚州刺史安成王準初彧晚年痿疾不能內御諸弟姬人有懷孕者輒取以入宮及生男皆殺其母而與其宮人所愛者養之準即桂陽王休範子也荊州刺史沈攸之興兵討道成準改年為昇明遣其員外散騎常侍李祖員外散騎侍郎陶貞寶赴國訃并貢方物準司徒袁粲丹陽尹劉秉中領軍劉韞前湘州刺史王蘊等以道成專恣潛謀圖之共推粲為主要引沈攸之以為外援丹陽丞王遜告道成並斬之準遣員外散騎常侍何僴員外散騎侍郎孔逷朝貢三年正月準遣其員外散騎常侍殷靈誕員外散騎侍郎苟昭先朝貢準尋禪位於道成居于東邸道成僭立封準汝陰郡王尋死於丹陽, WYG: ''}
  - {type: variant, offset: 13152, length: 3095, content: 建業子業謂法生曰義陽謀反我正欲誅之法生懼禍走還彭城子業遣沈慶之率師伐昶法生至彭城昶便繕甲諸郡不從昶知事不捷遂來奔子業淫其姑稱為謝氏為貴嬪夫人加以殊禮虎賁劍戟出警入蹕鑾輅龍旂在貴妃之上即義隆第十女其新蔡長公主也子業矯云主喪空設喪事而實納之時其姊山陰主大見愛狎淫恣過度謂子業曰妾與陛下男女雖殊俱託體先帝陛下六宮百數而妾惟一駙馬事不均平乃可如此子業為主置面首左右三十人進爵會稽郡長公主秩同郡王食湯沐邑二千戶給鼓吹一部加班劍二十人每出遊與羣臣陪乘吏部褚淵以有風貌子業使淵侍主子業皆令廟別畫其祖父形像曾入裕廟指裕像曰此渠大英雄生擒數天子次入義隆廟指義隆像曰此渠亦不惡但暮年中不免兒斫去頭次入其父駿廟指駿像曰此渠大好色不擇尊卑顧謂左右曰渠大鼻如何不之即令畫工駿像鼻其父子淫悖書契所無也子業又殺沈慶之撫軍諮議參軍何邁即其新蔡主壻其湘東王彧及建安王休仁山陽王休祐常被猜忌並欲誅之休仁每以調謔悅之故得推遷不死彧休祐形體肥大遂以籠盛稱之彧尤肥號曰猪王廷尉劉矇妾懷孕子業迎入宮冀其生男立為太子及其生子遂為大赦子業召其南平王鑠妃江氏偶諸左右江不從子業曰若不從當殺汝三子江猶不從乃鞭一百殺其子敬猷等巫覡云湘州有天子氣子業將南行以厭之未行前欲悉誅諸叔時彧被拘祕書省與子業左右阮佃夫等謀廢子業子業出華林園共巫竹林堂前射鬼佃夫時為內監乃以告外監典事朱幼主衣壽寂之細鎧主姜產之等寂之抽刃而前產之繼進子業引弓射寂之不中寂之乃斬其首彧既誅子業憂遽不知所為休仁推立彧彧時失履徒跣登西堂備天子儀服呼諸大臣入見事無巨細稱令施行彧以豫章王子尚及山陰主為子業所狎殺之十二月僭即帝位改年為泰始先是子業敕其弟子勛曰聞汝與何邁謀共廢我汝自量體氣何如孝武尋當遣使送藥與汝子勛長史鄧琬與錄事參軍陶亮等起兵遣其黨俞伯奇出頓大雷巴東太守孫仲之至于平石與陶亮並統前軍始彧未知子勛起兵加子勛車騎將軍儀同三司符至尋陽鄧琬乃投於地攘袂而起曰殿下當開端門何黃閤之有與陶亮等徵兵馳檄建牙於桑厄時雍州刺史袁顗便勸子勛即位琬乃立宗廟設壇場造乘輿法服立子勛為天子即位江州號義嘉元年子勛以袁顗為尚書左僕射鄧琬為尚書右僕射左司馬張悅為領軍將軍吏部尚書州郡並加爵號彧乃遣領軍將軍王玄謨討之復遣其將沈攸之劉靈出據虎檻初彧聞四方反亂憂遽不知所為休仁請前鋒決勝於是始有防禦之軍攸之軍至江州斬子勛彧慮子勛弟松滋侯子房等年大終不相服休仁遂勸除之因誅駿舅子路休之等以陷子房兄弟於是殺駿子安陸王子綏及子房臨海王子頊永嘉王子仁始安王子真邵陵王子元淮南王子孟臨賀王子產晉熙王子輿及子起子期子悅子頓初駿二十八男其餘先早夭及子業殺子鸞等至是盡殪之矣其骨肉相殘若此之甚彧南新蔡太守常珍奇奉啟請降顯祖詔遣西河公元石京兆侯張窮奇率軍援之皇興元年正月彧遣其散騎常侍貝思散騎侍郎崔小白朝貢初彧遣其鎮軍張永領軍沈攸之以大衆迎其徐州刺史薛安都安都聞永將發乃遣信請降顯祖詔博陵公尉元城陽公孔伯恭率騎二萬救之永等前後奮擊斬首凍沒死者不可勝數又其兗州刺史畢衆敬亦來降款至是徐兗及淮西諸郡青齊二州相尋歸附彧又遣其中領軍沈攸之太子左衞率劉勔寇彭城兗州刺史申纂守無鹽時薛安都略有廣平順陽義成扶風諸郡沈攸之至下邳與元等戰敗而走初彧青州刺史沈文秀冀州刺史崔道固並請歸順詔遣征南大將軍慕容白曜率衆援之文秀等復叛歸彧白曜進軍圍城二年克歷城獲道固彧遣其員外散騎常侍李豐朝貢彧遣沈文秀弟文靜海道救青州文靜至東萊之不期城白曜遣軍克之尋獲東陽城彧遣其員外散騎常侍王希涓朝貢四年六月彧又遣員外散騎常侍劉航朝貢延興元年彧於巖山射雉休祐從在後與其左右相失彧遣壽寂之率諸壯士追躡休祐蹴令墜馬拉而殺之乃揚聲曰驃騎墮馬死召司徒休仁宿尚書下省鴆而殺之自彧立之後民庶凋弊而宮殿器服多更興造初其即位軍人多被超越或有不與戎勤寄名受賞阮佃夫等並被信委凡所談笑言無不行抽進阿黨咸受不次之位故佃夫左右乃有四軍五校羽林給事等官皆市井傭販之人諂附而獲至綱紀不立風政頹弊境內多難民庶嗷然遂廣募義勇置為部曲於是官品淪褫士人渾亂民衆顒顒咸願來奔矣彧遣其司州刺史垣叔通為益州刺史叔通極為聚斂蜀還之貨過數千金知彧好財先送家資之半彧猶嫌少及叔通至建業遣詣廷尉彧先令獄官留之於訊堂彌旬不得出叔通於是悉送其財然後原遣凡蠻夷不受鞭罰輸財贖罪謂之賧時人謂叔通被賧刺史彧嘗宮內大集而裸婦人觀之以為忻笑其妻王氏以扇鄣面獨無所言彧怒曰外舍家寒乞今共為笑樂何獨不視王曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以此為樂外舍之為忻適與此不同彧大怒遣王起去彧末年好事鬼神多所忌諱言語文書有禍敗凶喪及疑似之言應回避者數百千品有犯必加罪戮改騧馬字為馬邊瓜以騧似禍字故也嘗以南苑借張永言且給三百年期訖更申其事皆如此又以宣陽門之名不善甚諱之其太后停屍漆牀移出東宮見之怒甚免中庶子官職局以下坐死者數十人內外