  - {type: variant, offset: 4720, length: 0, content: '', WYG: 陽平王頤左僕射陸叡並為都督領軍斛律桓等十二將七萬騎討豆崘部内髙車阿伏至羅率衆十餘萬落西走自立為主豆崘與叔父那盖為二道追之豆崘出自浚稽山北而西那盖出自金山豆崘頻為阿伏至羅所敗那盖累有勝㨗國人咸以那盖為天所助欲推那盖為主那盖不從衆彊之那盖曰我為臣不可焉能為主衆乃殺豆崘母子以屍示那盖那盖乃襲位那盖號候其伏代庫者可汗魏言悦樂也自稱太安元年那盖死子伏圗立號他汗可汗魏言緒也自稱始平元年正始三年伏圗遣使紇奚勿六跋朝獻請求通和世宗不報其使詔有司勑勿六跋曰蠕蠕遠祖社崘是大魏叛臣往者包容暫時通使今蠕蠕衰微有損疇日大魏之德方隆周漢跨據中原指清八表正以江南未平權寛北掠通和之事未容相許若修藩禮款誠昭著者當不孤爾也永平元年伏圗又遣勿六跋奉函書一封并獻貂裘世宗不納依前喻遣伏圗西征髙車為髙車王彌俄突所殺子醜奴立號豆羅伏跋豆伐可汗魏言彰制也自稱建昌元年永平四年九月醜奴遣沙門洪宣奉獻珠像延昌三年冬世宗遣驍騎將軍馬義舒使於醜奴未發而崩事遂停寢醜奴壯健善用兵四年遣使侯斤尉比建朝貢熙平元年西征髙車大破之禽其王彌俄突殺之盡并叛者國遂彊盛二年又遣侯斤尉比建紇奚勿六跋鞏顧禮等朝貢神龜元年二月肅宗臨顯陽殿引顧禮等二十人於殿下遣中書舍人徐紇宣詔讓以蠕蠕藩禮不備之意初豆崘之死也那盖為主伏圖納豆崘之妻候呂陵氏生醜奴阿那瓌等六人醜奴立後忽亡一子字祖惠求募不能得有尼引副升牟妻是豆渾地萬年二十許為醫巫假託神鬼先常為醜奴所信出入去來乃言此兒今在天上我能呼得醜奴母子欣悦後嵗仲秋在大澤中施帳屋齋潔七日祈請天神經一宿祖惠忽在帳中自云恒在天上醜奴母子抱之悲喜大㑹國人號地萬為聖女納為可賀敦授夫副升牟爵位賜牛馬羊三千頭地萬既挾左道亦有姿色醜奴甚加重愛信用其言亂其國政如是積嵗祖惠年長其母問之祖惠言我恒在地萬家不嘗上天上天者地萬教也其母具以狀告醜奴醜奴言地萬懸鑒遠事不可不信勿用讒言也既而地萬恐懼譖祖惠於醜奴醜奴陰殺之正光初醜奴母遣莫何去汾李具列等絞殺地萬醜奴怒欲誅具列等又阿伏至羅侵醜奴醜奴擊之軍敗還為母與其大臣所殺立醜奴弟阿那瓌立經十日其族兄俟力發示發率衆數萬以伐阿那瓌阿那瓌戰敗將弟乙居伐輕騎南走歸國阿那瓌母候呂陵氏及其二弟尋為示發所殺而阿那瓌未之知也九月阿那瓌将至肅宗遣}
