  - {type: variant, offset: 4581, length: 6, content: 通尚書郭淵勸, WYG: 説止世祖世祖從崔浩計而行㑹江南使還稱劉義隆欲犯河南謂行人曰汝疾還告魏主歸我河南地即當罷兵不然盡我将士之力世祖聞而大笑告公卿曰龜鼈小䜿自救不暇何能為也就使能來若不先滅蠕蠕便是坐待寇至腹背受敵非上䇿也吾行决矣於是車駕出東道向黒山平陽王長孫翰從西道向大娥山同㑹賊庭五月次于沙漠南舍輜重輕襲之至栗水大檀衆西奔弟匹黎先典東落将赴大檀遇翰軍翰縱騎擊之殺}
