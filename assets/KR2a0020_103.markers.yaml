  - {type: variant, offset: 16250, length: 9, content: 桓玄侏張馮劉乃厥疑, WYG: 周之獫狁漢之匈奴其作害中國固亦久矣魏晉之世種族𤓰分去來沙漠之陲窺擾鄣塞之際猶皆東胡之餘緒冐頓之枝葉至如蠕蠕者匈奴之裔根本莫尋逃形集醜自小為大風馳鳥赴倐來忽往代京由之屢駭戎車所以不寧是故魏氏祖宗揚威曜武驅其畜産收其部落翦之}
