  - {type: variant, offset: 8114, length: 741, content: 年義符改年為景平奚斤進攻金墉義符河南太守王涓之出奔太宗南巡至鄴奚斤自金墉還圍虎牢太宗又詔安平公叔孫建等東擊青州其刺史竺夔守東陽城濟南太守垣苗自梁鄒奔夔奚斤分軍攻潁川太守李元德奔還項城斤又遣騎破高平郡所統五縣略居人二千餘家叔孫建以時暑班師檀道濟王仲德向青州遂不敢進太宗至虎牢因幸洛陽乃北渡河斤克虎牢擒德祖及其滎陽太守翟廣廣武將軍竇霸等義符豫州刺史劉粹屯項城不敢進斤遣步騎至許昌潁川太守索元德奔項城遂圍汝陽太守王公度突圍而出仍破邵陵掠萬餘口而還始光初義符司空徐羨之尚書令傅亮領軍謝晦等專其朝政收其廬陵王義真徙于新安郡殺之義符昏暴失德羨之等勒兵入殿時義符在華林舟中兵士競進殺其侍者扶義符出東閤廢為營陽王遂徙于吳郡於金昌亭殺之亮等立義符弟荊州刺史義隆號年元嘉遣使趙道生朝貢二年徐羨之傅亮等歸政於義隆不許三年義隆信其侍中王華之言誅羨之傅亮遣其將檀道濟等討荊州刺史謝晦晦率衆東下謀廢義隆以討王華為辭破義隆將到彥之及聞道濟將至晦衆崩散晦走江陵乃攜其弟遁等北走至安陸延頭為戍主光順之所執斬于建業八月義隆使其殿中將軍吉朝貢神二年又遣殿中將軍孫橫之朝貢三年又遣殿中將軍田奇朝貢尋遣其右將軍到彥之安北將軍王仲德兗州刺史竺靈秀舟師入河驍騎將軍段橫寇虎牢又遣其豫州刺史劉德武後將軍長沙王義欣至彭城為後繼到彥之寇碻磝分軍向虎牢及洛陽世祖詔河南諸軍收衆北渡以驕之尋詔冠軍將軍安頡等率衆自盟津渡攻金墉義隆建武將軍杜驥出奔遂乘勝進攻虎牢陷之斬其司州刺史尹沖叔孫建大破竺靈秀追至湖陸四年頡攻滑臺彥之與王仲德等焚舟棄甲走歸彭城義隆又遣檀道濟救滑臺叔孫建長孫道生擊之道濟至高梁山頡等攻克滑臺擒其司徒從事中郎朱脩之等道濟走奔歷城夜乃遁還義隆青州刺史蕭思話亦棄鎮奔于平昌其東陽積粟為百姓所焚延和元年五月義隆又遣趙道生朝貢二年二, WYG: ''}
