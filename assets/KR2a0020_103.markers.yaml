  - {type: variant, offset: 9210, length: 0, content: '', WYG: 宗人跋利延為主嵗餘嚈噠伐髙車將納彌俄突國人殺跋利延迎彌俄突而立之彌俄突既立復遣朝貢又奉表獻金方一銀方一金杖二馬七匹駝十頭詔使者慕容坦賜彌俄突雜綵六十匹世祖詔之曰卿遠據沙外頻申誠款覽揖忠志特所欽嘉蠕蠕嚈噠吐谷渾所以交通者皆路由髙昌掎角相接今髙昌内附遣使迎引蠕蠕往來路絶姦勢不得妄令羣小敢有陵犯擁塞王人罪在不赦彌俄突尋與蠕蠕主伏圗戰於蒲類海北為伏圖所敗西走三百餘里伏圖次於伊吾北山先是髙昌王麴嘉表求内徙世宗遣孟威迎之至伊吾蠕蠕見威軍怖而遁走彌俄突聞其離駭追撃大破之殺伏圖於蒲類海北割其髪送於孟威又遣使獻龍馬五匹金銀貂皮及諸方物詔東城子于亮報之賜樂器一部樂工八十人赤紬十四雜綵六十匹彌俄突遣其莫何去汾屋引叱賀真貢其方物肅宗初彌俄突與蠕蠕主醜奴戰敗被禽醜奴繋其両脚於駑馬之上頓曳殺之漆其頭為飲器其部衆悉入嚈噠經數年嚈噠聽彌俄突}
