  - {type: variant, offset: 6944, length: 1169, content: 謝邵等裕本寒微不參士伍及擅時政便肆意殺戮以威懼下初以刁逵縛之之怨誅其兄弟又以王愉謝混郗僧施之徒並皆時望遂悉害之分荊州為湘州裕自總督裕還於東府召諸葛長民屏人閑語密令壯士丁旿等出自幔後於座拉之長民墜地死於牀側亦以才雄見忌也荊州刺史司馬休之頗得衆心裕內懷忌憚神二年率衆討之遣龍驤將軍蒯恩等為前軍裕進領荊州刺史加黃鉞雍州刺史魯宗之率其子軌會休之于江陵軌等軍敗乃與休之俱奔襄陽裕自領南蠻校尉休之等奔姚興裕為太傅揚州牧劍履上殿入朝不趨讚拜不名置左右長史司馬從事中郎四人餘如故裕又領平北將軍徐兗二州刺史增督南秦州尋督中外諸軍事裕志傾僭晉若不外立功名恐人望不許乃西伐姚泓自領征西將軍司豫二州刺史尋領北雍州刺史加前後部羽葆鼓吹增班劍為四十人子義符為中軍將軍監太尉留府事給鼓吹一部右僕射劉穆之為左僕射領軍中軍二府軍司入居東府總攝內外穆之謂龍驤將軍王鎮惡曰公今委卿以關中卿其勉之鎮惡曰吾今不克咸陽誓不濟江而公九錫不至者亦卿之責矣裕率衆軍至彭城加鎮北將軍徐州刺史遣中兵參軍沈林子自汴入河冠軍檀道濟與王鎮惡步出淮肥裕將王仲德汎濟入河德宗封裕十郡為宋公加相國九錫僭擬魏晉故事王鎮惡進至宜陽獨取潼關沈林子自襄邑屯于陝城姚泓諸將不能抗始裕入河西上太宗遣將軍娥清長孫嵩等屯於河畔裕遣朱超石劉榮祖等渡河長孫道生破之擒斬其將楊豐等裕遣將軍王仲德趙倫之率沈田子等入武關屯軍青泥沈林子由秦嶺會田子於堯柳城姚泓率衆數萬不戰而還裕至關頭鎮惡至渭橋破泓軍於橫門裕至長安執姚泓以歸斬于建業市裕以其子義真為雍州刺史鎮咸陽進裕為宋王增十郡置百官一擬舊制裕還彭城赫連屈丐掠渭陽義真遣沈田子率軍討之田子退軍陘上鎮惡往就田子議之田子斬鎮惡於幕下又殺其兄弟羣從七人田子馳還云鎮惡有異志義真長史王脩執而斬之義真與左右多為不法王脩每裁割之左右咸怨白義真曰王脩以關中阻險兵食又足欲謀反叛宜早圖之義真遂遣左右殺脩裕聞之以朱齡石為雍州刺史義真發自長安將走江東諸將競收財貨次於灞上赫連昌率衆追之既至青泥義真大敗蒯恩與安西司馬毛脩之並被擒獲參軍段橫名犯高祖廟諱單馬負義真走歸朱齡石亦棄長安奔就龍驤將軍王敬先于曹公故壘既而城陷被執見殺德宗死裕立德宗弟德文裕又自增十郡裕遣司馬傅亮赴建業令徵己入輔德文禪其位遂自號為宋改年為永初時泰常五年也裕既僭立頻請和通太宗許之六年裕遣其中軍將軍沈範索季孫等朝貢七年五月裕死子義符僭立太宗以其禮敬不足遣山陽公奚斤等率步騎二萬於滑臺渡河南討義符司州刺史毛德祖遣司馬翟廣領步騎三千來拒司空奚斤以千餘騎徇陳留太守嚴稜率衆降仍攻滑臺其東郡太守王景度奔走斬其司馬陽瓚德祖又遣其將竇應明攻輜重于石濟奚斤於土樓大破廣等乘勝徑至虎牢義符遣其將杜垣等與徐州刺史王仲德次湖陸太宗詔安平公叔孫建等軍於泗瀆口義符兗州刺史徐琰委尹卯城奔退於是泰山諸郡悉棄戍而走太宗詔蒼梧子公孫表等復攻虎牢義符遣將檀道濟率師赴救, WYG: ''}
