  - {type: variant, offset: 6243, length: 0, content: '', krp: 及阿那瓌等入就庭中北面位定謁者引王公以下升殿阿那瓌位於藩王之下又引將命之官及阿那瓌弟并二叔位於羣官之下遣中書舍人曹道宣詔勞問阿那瓌啟云陛下優隆命臣弟叔等升殿預㑹但臣有從兄在北之日官高於二叔乞命升殿詔聽之乃位於阿那瓌弟之下二叔之上宴將罷阿那瓌執啓立於座後詔遣舎人常景問所欲言阿那瓌求詣殿前詔引之阿那瓌再拜跪曰臣先世源由出於大魏詔曰朕已具之阿那瓌起而言曰臣之先逐草放牧遂居漠北詔曰卿言未盡可具陳之阿那瓌又言曰臣先祖以來世居北土雖復隔越山津而乃恭心慕化未能時宣者正以髙車悖逆臣國擾攘不暇遣使以宣遠誠自頃年以前漸定髙車及臣兄為主故遣鞏顧禮等使來大魏實欲虔修藩禮是以曹道芝北使之日臣與主兄即遣大臣五人拜受詔命臣兄弟本心未及上徹但髙車從而侵暴中有姦臣因亂作逆殺臣兄立臣為主裁過旬日臣以陛下恩慈如天是故倉卒輕身投國歸命陛下詔曰具卿所陳理猶未盡可更言之阿那瓌再拜受詔起而言曰臣以家難輕來投闕老母在彼萬里分張本國臣民皆已迸散陛下隆恩有過天地求乞兵馬還向本國誅翦叛逆收集亡散陛下慈念賜借兵馬老母若在得生相見以申母子之恩如其死也即得報讎以雪大恥臣當統臨餘人奉事陛下四時之貢不敢闕絶陛下聖顔難覩敢有披陳但所欲言者口不能盡言别有辭啓謹以仰呈願垂昭覽仍以啓付舍人常景具以奏聞尋封阿那瓌朔方郡公蠕蠕主賜以衣冕加之軺蓋禄從儀衛同于戚藩十二月肅宗以阿那瓌國無定主思還綏集啓請切至詔議之時朝臣意有同異或言聽還或言不可領軍元义為宰相阿那瓌私以金百斤貨之遂歸北二年正月阿那瓌等五十四人請辭肅宗臨西堂引見阿那瓌及其伯叔兄弟五人升階賜坐遣中書舍人穆弼宣勞阿那瓌等拜辭詔賜阿那瓌細明光人馬鎧二具鐵人馬鎧六具露絲銀纒槊二張并白眊赤漆槊十張并白眊黒漆槊十張并幡露絲弓二張并箭朱漆柘弓六張并箭黑漆弓十張并箭赤漆楯六幡并刀黒漆楯六幡并刀赤漆鼓角二十具五色錦被二領黄紬被褥}
