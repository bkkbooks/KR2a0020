  - {type: variant, offset: 3098, length: 430, content: 厭勝之法乃謂衆曰朕其敗乎黃門郎曹靖對曰神怒民怨臣實憂懼玄曰民怨可然神何為怒對曰移晉宗廟飄泊無所大楚之祭不及於祖此其所以怒也玄曰卿何不諫對曰輦上諸君子皆以為堯舜之世臣何敢諫玄使桓謙何澹之屯于東掖門卞範之屯覆舟山西衆合二萬又遣武衞庾賾之配以精卒利器援助謙等謙等大敗玄聲云赴戰將子姪出南掖門西至石頭先使殷仲文具船於津遂相與南走經日不得食左右進以粗粥咽不能下玄子昇五六歲抱玄胸而撫之玄悲不自勝玄挾德宗發尋陽至江陵西中郎將桓石康納之張幔屋止城南署置百官以卞範之為尚書僕射殷仲文為徐州其餘各顯用玄謂諸侍臣曰卿等並升清塗翼從朕躬都下竊位者方應謝罪軍門其見卿等入石頭無異雲霄中人也玄以奔敗之後懼法令不肅遂輕怒妄殺逾甚暴虐殷仲文諫之玄大怒曰漢高魏武幾遇敗但諸將失利耳以天文惡故還都舊楚而羣小愚惑妄生是非方當糾之以猛未宜施之以恩也荊江郡守以玄播越咸遣使通表有匪寧之辭玄悉不受乃更令所在表賀遷都玄在道自作起居注其拒劉裕事自謂算略無失諸將違節度以至於敗不暇謀議軍事惟誦述寫傳之劉裕遣其, WYG: ''}
