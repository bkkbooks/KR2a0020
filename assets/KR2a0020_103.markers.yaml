  - {type: variant, offset: 12, length: 4, content: 島夷桓玄, WYG: 人歸于太祖社崘既殺匹候跋懼王師討之乃掠五原以西諸部北度大漠太祖以拔頡為安遠将軍平棘侯社崘與姚興和親太祖遣材官将軍和突襲黜弗素古延諸部社崘遣騎救素古延突逆擊破之社崘遠遁漠北侵髙車深入其地遂并諸部凶勢益振北徙弱洛水始立軍法千人為軍軍置将一人百人為幢幢置帥一人先登者賜以虜獲退懦者以石擊首殺之或臨時捶撻無文記将帥以羊屎粗計兵數後頗知刻木為記其西北有匈奴餘種國尤富彊部帥曰拔也稽舉兵擊社崘社崘逆戰於頞根河大破之後盡為社崘所并號為彊盛隨水草畜牧其西則焉耆之地東則朝鮮之地北則渡沙漠窮瀚}
