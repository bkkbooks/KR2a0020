  - {type: variant, offset: 12609, length: 542, content: 人情驚怨並不服役逃竄山湖聚為寇盜侍中沈懷文苦諫不納三年三月駿使其散騎常侍嚴靈護朝貢以沈懷文數直諫付廷尉殺之駿寵姬殷死贈貴妃諡曰宣及葬龍山給鑾輅九旒黃屋左纛羽葆鼓吹班劍虎賁龍之麗功妙萬端山池雲鳳之屬皆裝以衆寶繡帷珠帶重鈴疊眊儀服之盛古今尠有駿自殷死常懷悲惻神情罔罔廢棄政事或親至殷靈牀酌奠酒飲之既而慟哭流連不能自反其耽昏若此四年獵于烏江之榜口又游湖縣之滿山並與母同行宣淫肆意五年三吳大飢人食草木皮葉親屬互相販鬻劫掠蜂起死者不可勝數是年駿死子子業立性尤凶悖其母疾篤遣呼子業子業曰病人間多鬼那可往其母怒語侍者曰將刀來破我腹那得生如馨兒六年改為永光以奄人華願兒為散騎常侍遊止必同越騎校尉戴法興屢相裁割願兒深以為隙或謂法興為真天子子業為天子願兒具以聞子業乃殺法興驃騎將軍柳元景尚書左僕射顏師伯欲廢子業立太宰義恭以告沈慶之慶之告子業子業出兵誅義恭遂刳剔支體抽裂心藏挑其眼睛投之蜜中謂之鬼目粽又殺柳元景顏師伯並諸子及弟姪乃改年為景和子業除去喪禮服錦縠之衣以石頭城為長樂宮東城為未央宮北邸為建章宮南宅為長楊宮子業自以昔在東宮不為駿所愛及即位常欲毀其墓乃遣發駿所寵殷氏冢殷死駿為之造新安寺於是壞之復欲誅諸遠近尼僧遣使殺其新安王子鸞臨死歎曰惟願後身不復生天王家義恭既誅徐州刺史義陽王昶大懼遣典籤蘧法生啟求, WYG: ''}
