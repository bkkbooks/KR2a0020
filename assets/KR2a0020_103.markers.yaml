  - {type: variant, offset: 17, length: 13, content: 夷馮跋島夷劉裕島夷桓玄字敬, WYG: 南則臨大磧其常所㑹庭則敦煌張掖之北小國皆苦其寇抄羈縻附之於是自號丘豆伐可汗丘豆伐猶魏言駕馭開張也可汗猶魏言皇帝也蠕蠕之俗君及大臣因其行能即為稱號若中國立謚既死之後不復追稱太祖謂尚書崔元伯曰蠕蠕之人昔來號為頑嚚每來抄掠駕㹀牛奔遁驅犍牛隨之㹀牛伏不能前異部人有教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂為敵所虜今社崘學中國立法置戰陳卒成邊害}
