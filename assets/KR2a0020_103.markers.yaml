  - {type: variant, offset: 9163, length: 0, content: '', krp: 眷本出於遼西其伯祖日陸眷因亂被賣為漁陽烏丸大庫辱官家奴諸大人集㑹幽州皆持唾壺唯庫辱官獨無乃唾日陸眷口中日陸眷因咽之西向拜天曰願使主君之智慧禄相盡移入我腹中其後漁陽大饑庫辱官以日陸眷為健使將之詣遼西逐食招誘亡叛遂至彊盛日陸眷死弟乞珍代立乞珍死子務目塵代立即就六眷父也據有遼西之地而臣於晉其所統三萬餘家控弦上馬四五萬騎穆帝時幽州刺史王浚以叚氏數為已用深德之乃表封務目塵為遼西公假大單于印綬浚使務目塵率萬餘騎伐石勒於常山封龍山下大破之務目塵死就陸眷立就陸眷與弟匹殫從弟末波等率五萬餘騎圍石勒於襄國勒登城望之見將士皆釋仗寢卧無警備之意勒因其懈怠選募勇健穿城突出直衝末波生禽之置之座上與飲宴盡歡約為父子盟誓而遣之末波既得免就陸眷等遂攝軍而還不復報浚歸於遼西自此以後末波常不敢南向溲焉人問其故末波曰吾父在南其感勒不害已也如此就陸眷死其子幼弱匹磾與劉琨世子羣奔喪匹磾隂卷甲而往欲殺其從叔羽鱗及末波而奪其國末波等知之遣軍逆撃匹磾劉羣為末波所獲匹磾走還薊懼琨禽已請琨宴㑹因執而害之匹磾既殺劉琨與羽鱗末波自相攻撃部衆乖離欲擁其衆徙保上谷阻軍都之險以拒末波等平文帝聞之隂嚴精騎將撃之匹磾恐懼南奔樂陵後石勒遣石虎撃叚文鴦於樂陵破之生擒文鴦匹磾遂率其属及諸塢壁降于石勒末波自稱幽州刺史屯遼西末波死國人立日陸眷弟䕶遼為主烈帝時假䕶遼驃騎大將軍幽州刺史大單于北平公弟鬱蘭撫軍將軍冀州刺史渤海公建國元年石虎征䕶遼於遼西䕶遼奔平岡山遂投慕容晃晃殺之鬱蘭奔石虎以所徙鮮卑五千人配之使屯令支鬱蘭死子龕代之及冉閔之亂龕率衆南移遂據齊地慕容儁使弟𤣥恭帥衆伐龕於廣固執龕送之薊儁毒其目而殺之坑其徒三千餘人髙車蓋古赤狄之餘種也初號為狄厯北方以為勑勒諸夏以為髙車丁零其語略與匈奴同而時有小異或云其先匈奴之甥也其種有狄氏表紇氏斛律氏解批氏䕶骨氏異竒斤氏俗云匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國北無人之地築髙䑓置二女其上曰請天自迎之經三}
