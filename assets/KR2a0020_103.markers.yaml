  - {type: variant, offset: 4866, length: 802, content: 劉訓言於文通曰雖結婚和通而未遣侍子魏若大舉將有危亡之慮夫以重山之隘劉禪銜璧長江之難孫皓歸命況魏強於晉氏燕弱于吳蜀願時遣世子以恭大國之命然後收離集散厚布恩澤分賑倉廩以濟民乏勸督農桑以邀秋稔庶大業危而更安社稷可以永保文通大怒殺之世祖又詔樂平王丕等討之日就蹙削上下危懼文通太常陽復勸文通請罪乞降速令王仁入侍文通曰吾未忍為此若事不幸且欲東次高麗以圖後舉曰魏以天下之衆擊一隅之地以臣愚見勢必土崩且高麗夷狄難以信期始雖相親終恐為變若不早裁悔無及也文通不聽乃密求迎於高麗太延二年高麗遣將葛盧等率衆迎之入和龍城脫其弊褐取文通精仗以賦其衆文通乃擁其城內士女入于高麗先是其國有狼夜繞城羣嘷如是終歲又有鼠集於城西闐滿數里西行至水則在前者銜馬矢迭相齧尾而渡宿軍地燃一旬而滅觸地生蛆月餘乃止和龍城生白毛長一尺二寸文通至遼東高麗遣使勞之曰龍城王馮君爰適野次士馬勞乎文通慚怒稱制答讓之高麗乃處之於平郭尋徙北豐文通素侮高麗政刑賞罰猶如其國高麗乃奪其侍人質任王仁文通忿怨之謀將南奔世祖又徵文通於高麗高麗乃殺之於北豐子孫同時死者十餘人文通子朗邈朗子熙在外戚傳島夷劉裕字德輿晉陵丹徒人也其先不知所出自云本彭城彭城人或云本姓項改為劉氏然亦莫可尋也故其與叢亭安上諸劉了無宗次裕家本寒微住在京口以賣履為業意氣楚剌僅識文字樗蒲傾產為時賤薄嘗負驃騎諮議刁逵社錢三萬經時不還逵以其無行錄而徵責驃騎長史王謐以錢代還事方得了落魄不修廉隅天興二年僭晉司馬德宗遣其輔國將軍劉牢之東討孫恩裕應募始為牢之參軍恩北寇海鹽裕追勝之以功稍遷建武將軍下邳太守劉牢之討桓玄裕參其軍事牢之降裕為玄從兄桓脩中兵參軍孫恩死餘衆推恩妹夫盧循為主玄遣裕征之裕破循于東陽永嘉循浮海奔逸加裕彭城內史及桓玄廢德宗而自立裕與弟道規劉毅何無忌潛謀舉兵桓脩弟思祖鎮廣陵道規劉毅先為之佐天賜初裕與何無忌等旦候城門開率衆斬玄徐州刺史桓脩於京口其日劉毅道規等亦斬思祖因收衆濟江河內太守辛扈興農太守王元德振, WYG: 孟}
