  - {type: variant, offset: 11304, length: 577, content: 出臧質子敦逃走劭乃悉聚諸王及大臣徙入城內移南岸百姓渡淮貴賤皆被驅逼建業淆亂駿等發尋陽檄至劭乃移駿數子於侍中省義宣諸男於大倉屋以兵守之使其將魯秀王羅漢等為水陸之備休明及蕭斌為之謀主焚除淮中船舫駿至南洲頓漂洲令柳元景等擊劭劭衆崩潰奔走還宮義恭單馬奔駿勸即位劭大怒遣休明就西省殺義恭子南豐王朗等十二人駿乃僭即大位于新亭於是擒劭休明並梟首大桁暴屍於市經日壞爛投之水中男女妃妾一皆從戮時人為之語曰遙望建康城小江逆流縈前見子殺父後見弟殺兄興光元年駿改年曰孝建其中軍府錄事參軍周朗啟駿曰今士大夫父母在而兄弟異計十家而七庶人父子殊產八家而五凡甚者乃危亡不相知飢寒不相恤又疾讒害其間不可稱數宜明其禁以易其風俗弊如此駿不能革臧質遣使說荊州刺史南郡王義宣曰有大負大功挾震主威自古尠有全者宜在人前早有處分義宣使要豫州刺史魯爽兗州刺史徐遺寶司州刺史魯秀等剋秋起兵爽時昏醉即日便戴黃標稱建平元年板義宣為天子遣信至建業迎弟瑜由是駿知爽反惶懼欲遣迎義宣其竟陵王誕執議不許乃遣左衞將軍王玄謨率衆討爽領軍將軍柳元景鎮軍將軍沈慶之討義宣臧質下戍大雷馳報義宣抗表以誅元景為名遣軍就質使爽與質會于江上玄謨屯兵梁山義宣率衆至尋陽與質俱下雍州刺史朱脩之不從義宣臧質進計曰今萬人取南州則梁山中絕萬人守梁山玄謨必不敢動下官浮舟外江直向石頭此上策也義宣將從之其諮議劉諶之曰質不求前驅凶志難測不如盡銳攻梁山事, WYG: ''}
