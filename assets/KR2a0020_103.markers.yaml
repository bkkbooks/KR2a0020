  - {type: variant, offset: 4626, length: 0, content: '', krp: 北鄙候騎獲吳提南偏邏者二十餘人世祖賜之衣服遣歸吳提上下感德故朝貢焉世祖厚賓其使而遣之延和三年二月以吳提尚西海公主又遣使人納吳提妹為夫人又進為左昭儀吳提遣其兄秃鹿傀及左右數百人來朝獻馬二千匹世祖大悦班賜甚厚至太延二年乃絶和犯塞四年車駕幸五原遂征之樂平王丕河東公賀多羅督十五將出東道永昌王健宜都王穆夀督十五將出西道車駕出中道至浚稽山分中道復為二道陳留王崇從大澤向涿邪山車駕從浚稽北向天山西登白阜刻石記行不見蠕蠕而還時漠北大旱無水草軍馬多死五年車駕西伐沮渠牧犍宜都王穆夀輔景穆居守長樂王嵇敬建寧王崇二萬人鎮漠南以備蠕蠕吳提果犯塞夀素不設備賊至七介山京邑大駭争奔中城司空長孫道生拒之於吐頽山吳提之冦也留其兄乞列歸與北鎮諸軍相守敬崇等破乞列歸於陰山之北獲之乞列歸歎曰沮渠䧟我也獲其伯父他吾無鹿胡及其将帥五百人斬首萬餘級吳提聞而遁走道生追之至于漠南而還真君四年車駕幸漠南分四道樂安王範建寧王崇各統十五将出東道樂平王督十五将出西道車駕出中道中山王辰領十五将為中軍後繼車駕至鹿渾谷與賊相遇吳提遁走追至頞根河撃破之車駕至石水而還五年復幸漠南欲襲吳提吳提遠遁乃還吳提死子吐賀真立號處可汗魏言唯也十年正月車駕北伐髙昌王那出東道略陽王羯兒出西道車駕與景穆自中道出涿邪山吐賀真别部帥爾綿他抜等率千餘家來降是時軍行數千里吐賀真新立恐懼遠遁九月車駕北伐髙昌王那出東道略陽王羯兒出中道與諸軍期㑹於地弗池吐賀真悉國精鋭軍資甚盛圍那數十重那掘長圍堅守相持數日吐賀真數挑戰輙不利以那衆少而固疑大軍將至觧圍夜遁那引軍追之九日九夜吐賀真益懼棄輜重踰穹隆嶺遠遁那収其輜重引軍還與車駕㑹於廣澤略陽王羯兒盡收其人戸畜産百餘萬自是吐賀真遂單弱遠竄邊疆息警矣太安四年車駕北征騎十萬車十五萬両旌旗千里遂渡大漠吐賀真遠遁其莫弗烏朱駕頺率衆數千落來降乃刋石記功而還世祖征伐之後意存休息蠕蠕亦怖威北竄不敢復南和平五年吐賀真死子予成立號受羅部真可汗魏言惠也自稱永康元年率部侵塞北鎮遊軍大破其衆皇興四年予成犯塞車駕北討京兆王子推東陽公元丕督諸軍出西道任城王雲等督軍出東道汝隂王賜濟南公羅烏拔督軍為前鋒隴西王源賀督諸軍為後繼諸將㑹車駕于女水之濱顯祖親誓衆詔諸將曰用兵在竒不在衆也卿等為朕力戰方略已在朕心乃選精兵五千人挑戰多設竒兵以惑之虜衆奔潰逐北三十餘里斬首五萬級降者萬餘人戎馬器械不可稱計旬有九日往返六千餘里改女水曰武川遂作北征頌刋石紀功延興五年予成求通婚娉有司以予成數犯邊塞請絶其使發兵討之顯祖曰蠕蠕譬若禽獸貪而亡義朕要當以信誠待物不可抑絶也予成知悔前非遣使請和求結姻援安可孤其款意乃詔報曰所論婚事今始一反尋覽事理未允厥中夫男而下女爻象所明初婚之吉敦崇禮娉君子所以重人倫之本不敬其初令終難矣予成每懐譎詐終顯祖世更不求婚太和元年四月遣莫河去汾比拔等來獻良馬貂裘比拔等稱伏承天朝珍寳華麗甚積求一觀之乃勑有司出御府珍玩金玉}
