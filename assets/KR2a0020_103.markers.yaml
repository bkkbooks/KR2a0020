  - {type: variant, offset: 9, length: 1, content: 八, WYG: 九十一蠕蠕匈奴宇文莫槐徒河叚就六眷髙車蠕蠕東胡之苗裔也姓郁久閭氏始神元之末掠騎有得一奴髪始齊眉忘本姓名其主字之曰木骨閭木骨閭者首秃也木骨閭與郁久閭聲相近故後子孫因以為氏木骨閭既壯免奴為騎卒穆帝時坐後期當斬亡匿廣漠谿谷間收合逋逃得百餘人依純突隣部木骨閭死子車鹿㑹雄健始有部衆自號柔然而役屬於國後世祖以其無知狀類於蟲故改其號為蠕蠕車鹿㑹既為部帥嵗貢馬畜貂豽皮冬則徙度漠南夏則還居漠北車鹿㑹死子吐奴傀立吐奴傀死子跋提立跋提死子地粟袁立地粟袁死其部分為二地粟袁長子匹候跋繼父居東邊次子緼紇提别居西邊及昭成崩緼紇提附衛辰而貳於我登國中討之蠕蠕移部遁走追之及於大磧南牀山下大破之虜其半部匹候跋及部帥屋擊各收餘落遁走遣長孫嵩及長孫肥追之渡磧嵩至平望川大破屋擊禽之斬以徇肥至涿邪山及匹候跋跋舉落請降獲緼紇提子曷多汗及曷多汗兄詰歸之社崘斛律等并宗黨數百人分配諸部緼紇提西遁将歸衛辰太祖追之至跋那山緼紇提復降太祖撫慰如舊九年曷多汗與社崘率部衆棄其父西走長孫肥輕騎追之至上郡跋那山斬曷多汗盡殪其衆社崘與數百人奔匹候跋匹候跋處之南鄙去其庭五百里令其子四人監之既而社崘率其私屬執匹候跋四子而叛襲匹候跋諸子收餘衆亡依髙車斛律部社崘兇狡有權變月餘乃釋匹候跋歸其諸子欲聚而殱之密舉兵襲匹候跋殺匹候跋子啟拔吳頡等}
