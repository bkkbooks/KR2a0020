  - {type: variant, offset: 9165, length: 0, content: '', WYG: 母欲迎之單于曰不可未徹之間耳復一年乃有一老狼晝夜守臺嘷呼因穿臺下為空穴經時不去其小女曰吾父處我於此欲以與天而今狼來或是神物天使之然將下就之其姊大驚曰此是畜生無乃辱父母也妹不從下為狼妻而産子後遂滋繁成國故其人好引聲長歌又似狼噑無都統大帥當種各有君長為性麤猛黨類同心至於冦難翕然相依鬭無行陳頭别衝突乍出乍入不能堅戰其俗蹲倨䙝黷無所忌避婚姻用牛馬納聘以為榮結言既定男黨營車闌馬令女黨恣取上馬袒乘出闌馬主立於闌外振手驚馬不墜者即取之墜則更取數滿乃止俗無榖不作酒迎婦之日男女相將持馬酪熟肉節解主人延賓亦無行位穹廬前叢坐飲宴終日復留其宿明日将婦歸既而將夫黨還入其家馬羣極取良馬父母兄弟雖惜終無言者頗諱取寡婦而優憐之其畜産自有記識雖闌縱在野終無妄取俗不清潔喜致震霆每震則呌呼射天而棄之移去至來嵗秋馬肥復相率候於震所埋羖羊然火拔刀女巫祝説似如中國祓除而羣隊馳馬旋繞百帀乃止人持一束柳桋回豎之以乳酪灌焉婦人則以皮褁羊骸戴之首上縈屈髪鬢而綴之有似軒冕其死亡葬送掘地作坎坐屍於中張臂引弓佩刀挾矟無異於生而露坎不掩時有震死及疫癘則為之祈福若安全無佗則為報賽多殺雜畜燒骨以燎走馬遶旋多者數百帀男女無小大皆集㑹平吉之人則歌舞作樂死喪之家則悲吟哭泣其遷徙隨水草衣皮食肉牛羊畜産盡與蠕蠕同唯車輪髙大輻數至多後徙於鹿渾海西北百餘里部落彊大常與蠕蠕為敵亦每侵盗于國家太祖親襲之大破其諸部後太祖復度弱洛水西行至鹿渾海停駕簡輕騎西北行百餘里襲破之虜獲生口馬牛羊二十餘萬復討其餘種於狼山大破之車駕廵幸分命諸將為東西二道太祖親勒六軍從中道自駮髯水西北徇略其部諸軍同時雲合破其雜種三十餘落衛王儀别督將從西北絶漠千餘里復破其遺迸七部於是髙車大懼諸部震駭太祖自牛川南引大校獵以髙車為圍騎徒遮列周七百餘里聚雜獸於其中因驅至平城即以髙車衆起鹿苑南因䑓陰北距長城東包白登屬之西山尋而髙車姪利曷莫弗勑力犍率其九百餘落内附拜勑力犍為揚威將軍置司馬參軍賜榖二萬斛後髙車解批莫弗幡豆建復率其部三十餘落内附亦拜為威遠將軍置司馬參軍賜衣服嵗給廪食蠕蠕社崘破敗之後收拾部落轉徙廣漠之北侵入髙車之地斛律部部帥倍侯利患之曰社崘新集兵貧馬少易與耳乃舉衆掩撃入其國落髙車昧利不顧後患分其廬室妻其婦女安息寢卧不起社崘登髙望見乃招集亡散得千人晨掩殺之走而脫者十二三倍侯利遂來奔賜爵孟都公倍侯利質直勇徤過人奮戈陷陳有異於衆北方之人畏嬰兒啼者語曰倍侯利來便止處女歌謠云求良夫當如倍侯其服衆如此善用五十蓍筮吉凶每中故得親幸賞賜豐厚命其少子曷堂内侍及倍侯利卒大祖悼惜葬以國禮諡曰忠壯王後詔將軍伊謂帥二萬騎北襲髙車餘種袁紇烏頻破之太祖時分散諸部唯髙車以類麤獷不任使役故得别為部落後世祖征蠕蠕破之而還至漠南聞髙車東部在已尼陂人畜甚衆去官軍千餘里將遣左僕射安原等討之司徒長孫翰尚書令劉潔等諌世祖不聽乃遣原等并發新附髙車合萬騎至于已尼陂髙車諸部望軍而降者數十萬落獲馬牛羊亦百餘萬皆徙置漠南千里之地乗髙車逐水草畜牧蕃息數年之後漸知粒食嵗致獻貢由是國家馬及牛羊遂至于賤氊皮委積髙宗時五部髙車合聚祭天衆至數萬大㑹走馬殺牲遊遶歌吟忻忻其俗稱自前世以來無盛於此㑹車駕臨幸莫不忻悦後髙祖召髙車之衆隨車駕南討髙車不願南行遂推表紇樹者為主相率北叛逰踐金陵都督宇文福追討大敗而還又詔平北將軍江陽王繼為都督討之繼先遣人慰勞樹者樹者入蠕蠕尋悔相率而降髙車之族又有十二姓一曰泣伏利氏二曰吐盧氏三曰乙㫋氏四曰大連氏五曰窟賀氏六曰逹簿干氏七曰阿崘氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏先是副伏羅部為蠕蠕所役屬豆崘之世蠕蠕亂離國部分散副伏羅阿伏至羅與從弟窮竒俱統領髙車之衆十餘萬落太和十一年豆崘犯塞阿伏至羅等固諌不從怒率所部之衆西叛至前部西北自立為王國人號之曰候婁匐勒猶魏言大天子也窮竒號候倍猶魏言儲主也二人和穆分部而立阿伏至羅居北窮竒在南豆崘追討之頻為阿伏至羅所敗乃引衆東徙十四年阿伏至羅遣商胡越者至京師以二箭奉貢云蠕蠕為天子之賊臣諌之不從遂叛來至此而自豎立當為天子討除蠕蠕髙祖未之信也遣使者于提往觀虚實阿伏至羅與窮竒遣使者簿頡隨于提來朝貢其方物詔}
