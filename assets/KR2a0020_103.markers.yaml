  - {type: variant, offset: 6370, length: 442, content: 乃自殺裕發居人治石頭城道覆等至即欲於新亭白石渚焚舟而上盧循曰大軍未至孟昶便逆自殺以此而推建業尋應有變但按甲守之不憂不濟也乃屯軍於蔡洲循乃率衆數萬上南岸至于丹陽郡遂遣焚京口金城姑熟寇掠塗中及江寧蕪湖循以阮賜為豫州刺史裕中軍參軍尚靖宣城內史毛脩之破賜於姑熟獲其輜重賜乃退又加裕太尉中書監黃鉞裕受黃鉞盧循既不戰乃告道覆曰師老矣可還據尋陽并力取荊州徐以三分有二之勢與下流爭衡猶可以濟也乃自蔡洲南退裕遣輔國將軍王仲德等追之裕又遣建威將軍孫季高率衆自海道襲番禺裕自以舟師南伐季高乘海兼行奄至番禺循不以海道為防既至而覺衆乃大驚季高悉力而上四面攻之仍屠其城盧循父嘏及長史孫建之並以輕舟奔始興循與道覆率衆而下裕衆軍擊之循等還尋陽循欲遁於豫章乃悉力柵斷左里裕諸軍乘勝而擊之循單舸徑還廣州道覆還始興裕還為大將軍揚州牧班劍二十人本官如故徐道覆至始興猶據山澗劉蕃等攻之道覆先鴆妻子然後自殺盧循至番禺收衆攻季高劉蕃遣沈田子討之循奔走餘衆從嶺道襲合浦克之進攻交阯交州刺史杜惠度屢戰克捷循投水而死裕自為太尉中書監裕殺, WYG: 詔付}
