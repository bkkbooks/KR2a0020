  - {type: variant, offset: 9683, length: 1557, content: 吉趣泗瀆蕭斌至碻磝王玄謨遣軍主王寶惠攻滑臺右軍蕭鑠遣中兵參軍梁坦等進軍小索世祖詔諸軍援滑臺大敗王寶惠等王玄謨走還碻磝蕭斌遣申坦與梁坦垣護之據兩當城斌退還歷下及車駕渡河梁坦退走棄甲山積車駕發滑臺過碻磝義隆又遣雍州刺史竟陵王誕率其將薛安都柳元景等入盧氏進攻弘農詔洛州刺史張提率衆度崤蒲城鎮將何難於風陵堆濟河秦州刺史杜道生至閿鄉元景退走十一月車駕從東安山出下邳義隆鄒山戍主魯陽陽平二郡太守崔邪利降楚王建南康侯杜道儁進軍清西至留城義隆鎮軍劉駿參軍馬文恭至蕭城軍主嵇玄敬至留城並為覘候見官軍俱時退走永昌王仁攻懸瓠拔之獲義隆守將趙淮過定項城破尉武戍執其戍主進攻壽陽屯兵於孫叔敖冢掠馬頭鍾離二郡義隆遣左軍將軍劉康祖赴壽陽與仁相遇仁大破之盡坑其衆斬康祖傳首示壽春獲其將胡盛之王羅漢等以所斬首使軍士曳之遶城三匝積之城西高與城齊劉鑠乃焚四郭廬舍嬰城固守車駕至盱眙淮泗義隆遣輔國將軍臧質率師至盱眙頓軍城北六軍於上流濟淮質遣司馬胡崇之等率所領於山上立營建威將軍毛熙祚據城前大浦詔攻二軍斬崇之熙祚等及他首數千級衆悉赴水死淮南之民皆詣軍降高梁王那出山陽永昌王仁於壽陽出橫江凡所經過莫不風靡車駕登於瓜步伐葦結筏示欲渡江義隆大懼欲走吳會建業士女咸荷擔而立義隆遣黃延年朝於行宮獻百牢貢其方物并請和求進女於皇孫世祖以師婚非禮許和而不許婚初義隆欲遣軍侵境其臣江湛徐湛之贊成其事而義隆太子劭與蕭思話沈慶之謂義隆曰昔檀道濟到彥之無利而反今將帥士衆不及於前不可輕動兵甲時湛等在坐義隆使與慶之謀議慶之曰治國如治家耕當問奴織當問婢今欲伐國而與白面書生輩謀之事何由濟義隆大笑遂不納慶之言至是登石頭城樓而望甚有憂色歎曰若檀道濟在豈應至此邵乃委罪於江徐義隆曰此自吾意不關二人也正平元年正月世祖饗會於瓜步既許和好詔班師其江北之民歸降者數十萬計凡克南兗豫徐兗青冀六州其軍鋒殺掠不可勝算時義隆江北蕭條境內搔擾義隆慮義康為亂遣使殺之葬以侯禮義隆慚恚歸罪於下降義恭為儀同三司蕭斌王玄謨並免所居職十月義隆遣其將軍孫蓋等朝貢興安元年義隆遣撫軍將軍蕭思話率其將張永等攻碻磝詔諸軍擊破之永等退走思話遣建武將軍垣護之至梁山逆軍尚書韓茂率騎逆擊之思話退還麋溝義隆又遣雍州刺史臧質向崤陝梁州刺史劉秀之輔國將軍楊文德出子午豫州刺史長孫蘭遣騎破之秀之等僅以身免臧質柳元景薛安都等至關城並相繼敗走是年義隆太子劭及始興王休明令女巫嚴道育呪詛義隆事發義隆憤愧自失廢於政事乃議黜劭殺休明屢召尚書僕射徐湛之吏部尚書江湛侍中王僧綽等謀議僧綽曰當斷不斷反受其亂惟願以義割恩略小不忍不爾便應坦懷如初無煩疑論不可使難生慮表取笑千載義隆曰卿可謂能斷大事此不可不殷勤三思義康始死人謂我無復慈愛之道僧綽又云臣恐千載之後言陛下易於裁弟難於廢子義隆默然休明母潘有寵於義隆義隆以廢立之謀告之潘請赦弗許遂告休明休明馳報劭劭知己當廢遂夜召左右隊主陳叔兒詹叔兒齋帥張超之任建之等總二千餘人被甲自衞又召左衞率袁淑中舍人殷仲素左積弩將軍王正見又呼左軍長史蕭斌劭曰朝廷信讒當見罪廢內省無過不能受枉明當入殿卿等必不得異乃遍拜告哀衆皆驚不得答袁淑良久曰自古無此類願加善思劭怒變色於左右咸云伏聽令旨明晨斬淑劭守萬春門乃告門者曰我受敕入有所收可助我督後隊令速劭又詐義隆敕云魯秀謀反汝明可守關將兵入討也故士卒信之超之等率十餘人走入雲龍門拔刃徑登含章殿義隆夜與徐湛之屏人閑語時猶未訖門戶並無侍衞義隆迫急以几自鄣兵刃交下五指俱落超之斬義隆徐湛之為亂兵所害劭分遣掩江湛之斬之休明時在西州來屯中堂劭又使兵殺休明母是日劭登殿受璽綬下書曰徐湛之江湛殺逆無狀吾勒兵入殿已無所及號惋崩衂心肝破裂今罪人斯得元凶克殄卜世靈祚永享無窮思與億兆覃茲更始可大赦天下改元嘉三十年為太初元年劭弟駿時為江州刺史先以西陽蠻反義隆令東宮步兵校尉沈慶之襄陽太守柳元景司空中兵參軍宗売心並, WYG: 順}
