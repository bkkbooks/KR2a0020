  - {type: variant, offset: 11882, length: 583, content: 然後長驅萬安之計也義宣乃止義宣遣劉諶之就質步攻東壘義宣進自蕪湖赴梁山屯兵西岸玄謨拒質駿將軍垣護之薛安都又摧破之義宣衆潰因風放火焚其舟艦義宣閉船大泣因而迸逸走至江陵荊州司馬竺超民具儀服迎之左右相率潰叛超民送付刺姦朱脩之於獄殺之太安二年駿改年為大明駿於新亭造中興佛寺設齋忽有一僧形貌有異衆皆愕然問其名答云名惠明從天安寺來言竟然而滅乃改為天安寺至天安初而彭城歸國四年駿遣其將殷孝祖寇濟州高宗遣清水公封敕文等擊走之又詔征西將軍皮豹子擊孝祖於清東五年豹子還遂掠地至高平大獲而還駿以其南兗州刺史竟陵王誕得士庶之心內畏忌之誕不自安乃治城多聚糧仗駿大怒貶誕爵為侯遣兗州刺史垣閬給事中戴明寶討之誕遣衆出戰斬垣閬誕表駿曰往年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相構難臧魯協從朝野怳忽咸懷憂懼陛下欲建百官羽儀星馳推奉臣前後固執末方賜從社稷獲全是誰之力陛下接遇殷勤屢加崇寵驃騎揚州旬月移授恩秩頻煩復賜徐兗仰屈皇輿遠相餞送臣一遇之感此何以忘庶希偕老永相娛慰豈謂陛下信用讒言遂令小人來相掩襲不任枉酷即加誅揃雀鼠貪生仰違詔敕今親勒部曲鎮扞徐兗昔緣何福同生皇家今有何罪便成胡越陵鋒奮戈萬沒豈顧定蕩之期冀在旦夕右軍宣簡爰及武昌皆以無罪並遇枉酷臣有何過復致於此陛下宮闈之醜豈可一二臨紙悲塞不止所言駿以沈慶之前軍討之親勞軍人賜以金帛慶之軍敗退傷者十四五駿大怒將自往久乃拔之斬誕傳首誕母殷妻徐並自殺城內誅, WYG: 死}
