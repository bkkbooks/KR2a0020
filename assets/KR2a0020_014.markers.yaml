  - {type: variant, offset: 5884, length: 3, content: 軍事錄, WYG: 賢哲軒轅乃問天老天老謂為善遂從其言終致昌吉然則至人之量未然審於龜矣朕既以四海為家或南或北遲速無常南移之民朕自多積倉儲不令窘乏丕曰臣仰奉慈詔不勝喜舞髙祖詔羣官曰卿等或以朕無為移徙也昔平文皇帝棄背率土昭成營居盛樂太祖道武皇帝神武應天遷居平城朕雖虚寡幸屬勝殘之運故移宅中原肇成皇宇卿等當奉先君令徳光迹洪規前懐州刺史青龍前秦州刺史呂受恩等仍守愚固帝皆撫而答之辭屈而退帝又将北廵丕遷太傅録}
