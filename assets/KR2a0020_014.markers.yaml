  - {type: variant, offset: 5874, length: 0, content: '', WYG: 短劣姿望亦不逮之髙祖文明太后重年敬舊存問周渥賜以珍寶丕聲氣髙朗愽記國事饗讌之際恒居坐端必抗音大言叙列既往成敗帝后敬納焉然諂事要人驕侮輕賤每見王叡苻承祖常傾身下之時文明太后為王叡造宅故亦為丕造甲第第成帝后親幸之率百官文武饗落焉使尚書令王叡宣詔賜丕金印一紐太后親造勸戒歌辭以賜羣官丕上疏贊謝太后令曰臣哉隣哉隣哉臣哉君則亡逸於上臣則履冰於下若能如此太平豈難致乎及丕妻段氏卒諡曰恭妃又特賜丕金券髙祖文明太后引見公卿於皇信堂太后曰今京師旱儉欲聽飢貧之人出闗逐食如欲給過所恐稽延時日不救災窘若任其外出復慮姦良難辨卿等可議其所宜丕議諸曹下大夫以上人各将二吏别掌給過所州郡亦然不過三日給之便訖有何難也髙祖從之四日而訖丕請立東宮詔曰年尚幼小有何急之丕曰臣年在西夕思觀盛禮於臣實急不許後例降王爵封平陽郡公求致仕詔不許及車駕南伐丕與廣陵王羽留守京師並加}
  - {type: page-break, offset: 5874, content: '', id: KR2a0020_WYG_014-16b, image: WYG0261/WYG0261-0228d.png}
