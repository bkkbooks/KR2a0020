  - {type: variant, offset: 6008, length: 745, content: 郡二十萬戶備九錫之禮以齊國太妃為王太后王妃為王后丙辰詔歸帝位於齊國即日遜於別宮齊天保元年五月己未封帝為中山王邑一萬戶上書不稱臣答不稱詔載天子旌旗行魏正朔乘五時副車封王諸子為縣公邑各一千戶奉絹三萬匹錢一千萬粟二萬石奴婢三百人水碾一具田百頃園一所於中山國立魏宗廟二年十二月己酉中山王殂時年二十八三年二月奉諡曰孝靜皇帝葬于漳西山崗其後發之陵崩死者六十人帝好文學美容儀力能挾石師子以踰牆射無不中嘉辰宴會多命羣臣賦詩從容沉雅有孝文風齊文襄王嗣事甚忌焉以大將軍中兵參軍崔季舒為中書黃門侍郎令監察動靜小大皆令季舒知文襄與季舒書曰癡人復何似癡勢小差未帝嘗與獵於鄴東馳逐如飛監衞都督烏那羅受工伐從後呼帝曰天子莫走馬大將軍怒文襄嘗侍飲大舉觴曰臣澄勸陛下酒帝不悅曰自古無不亡之國朕亦何用此活文襄怒曰朕朕狗脚朕文襄使季舒毆帝三拳奮衣而出明日文襄使季舒勞帝帝亦謝焉賜絹季舒未敢受以啟文襄文襄使取一段帝束百匹以與之曰亦一段耳帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連本自江海人忠義動君子常侍侍講荀濟知帝意乃與華山王大器元瑾密謀於宮內為山而作地道向北城至千秋門門者覺地下響動以告文襄文襄勒兵入宮曰陛下何意反邪臣父子功存社稷何負陛下邪將殺諸妃嬪帝正色曰王自欲反何關於我我尚不惜身何況妃嬪文襄下牀叩頭大啼謝罪於是酣飲夜久乃出居三日幽帝於含章堂大器瑾等皆見烹於市及將禪位於文宣襄城王旭及司徒潘相樂侍中張亮黃門郎趙彥琛等求入奏事帝在昭陽殿見之旭曰五行遞運有始有終齊王聖德欽明萬姓歸仰臣等昧死聞奏願陛下則堯禪舜帝便斂容答曰此事推挹已久謹當遜避又云若爾須作詔書侍郎崔劭裴讓之奏云詔已作訖即付楊愔進於帝凡十條書訖帝曰將安朕何所復若為而去楊愔對曰在北城別有館宇還備法駕依常仗衞而去帝乃下御座步就東廊口詠范蔚宗後漢書贊云獻生不辰身播國屯終我, WYG: ''}
