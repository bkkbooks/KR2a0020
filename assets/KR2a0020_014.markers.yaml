  - {type: variant, offset: 4929, length: 0, content: '', WYG: 矜功與尚書令長孫渴侯爭權並伏法望都公頽昭帝之後也隨太祖平中原賜爵望都侯世祖以頽美儀容進止可觀使迎左昭儀於蠕蠕進爵為公卒曲陽侯素延桓帝之後也以小綂從太祖征討諸部初定并州為刺史太祖之驚於柏肆也并州守將封竇眞為逆素延斬之時太祖意欲撫悅新附悔參合之誅而素延殺戮過多坐免官中山平拜幽州刺史豪奢放逸左遷上谷太守後賜爵曲陽侯時太祖留心黃老欲以純風化俗雖乗輿服御皆去彫飾咸尚質儉而素延奢侈過度太祖深銜之積其過因徵坐賜死順陽公郁桓帝之後也少忠正亢直初以羽林中郎内侍勤幹有稱髙宗時位殿中尚書從髙宗東廵臨海以勞賜爵順陽公髙宗崩乙渾專權隔絶内外百官震恐計無所出郁率殿中衞士數百人從順徳門入欲誅渾渾懼逆出問郁曰君入何意郁曰不見天子羣臣憂懼求見主上渾窘怖謂郁曰今}
