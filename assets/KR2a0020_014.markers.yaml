  - {type: variant, offset: 5932, length: 0, content: '', WYG: 丕年衰體重亦不强責及罷降非太祖子孫及異姓王者雖駮於公爵而利享封邑亦不快疑髙祖南征丕表乞少留思更圖後舉會司徒馮誕薨詔六軍反斾丕又以熙薨于代都表求鑾駕親臨詔曰今洛邑肇構跂望成勞開闢暨今豈有以天子之重遠赴舅國之喪朕縱欲為孝其如大孝何縱欲為義其如大義何天下至重君臣道懸豈宜茍相誘引陷君不義令僕已下可付法官貶之又詔以丕為都督領并州刺史後詔以平陽畿甸改封新興公初李冲又徳望所屬既當時貴要有杖情疑遂與子超娶冲兄女即伯尚妹也丕前妻子隆同産數人皆與别居後得宮人所生同宅共産父子情因此偏丕父子大意不樂遷洛髙祖之發平城太子恂留於舊京及将還洛隆與超等密謀留恂因舉兵斷闗規據陘北時丕以老居并州雖不預其始計而隆超咸以告丕丕外慮不成口雖致難心頗然之及髙祖幸平城推穆泰等首謀隆兄弟並是黨丕亦隨駕至平城每於測問令丕坐觀隆超與元業等兄弟並以謀逆伏誅有司奏處孥戮詔以丕應連坐但以先許不死之詔躬非染逆之身聽免死仍為太原百姓其後妻二子聽隨隆超母弟及餘庶兄弟皆徙敦煌丕時年垂八十猶自平城力載隨駕至洛陽髙祖每遣左右慰勉之乃還晉陽髙祖崩丕自并州來赴世宗引見之以丕舊老禮有加焉尋勅留洛陽後宴于華林都亭特令二子扶侍坐起丕仕歴六世垂七十年位極公輔而還為民庶然猶心戀京邑不能自絶人事尋詔以丕為三老景明四年薨年八十二詔贈左光禄大夫冀州刺史諡曰平長子隆先以反誅隆弟乙升超亦同誅超弟儁邕並有軍功儁封新安縣男邕封涇縣男淮陵侯大頭烈帝之曾孫也善騎射擢為内三郎從世祖有戰功賜爵髙宗初封淮陵性謹密帝甚重之位寧北將軍遷右將軍卒贈髙平公諡曰烈河間公齊烈帝之𤣥孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍決死擊賊賊乃退世祖得上馬是日微齊世祖幾至危殆世祖以微服入其城齊固諫不許乃與數人從世祖入城内既覺諸門悉閉世祖及齊等因入其宮中得婦人裙繫之槊上世祖乗而上因此得拔齊有力焉賜爵浮陽侯從征和龍以功拜}
