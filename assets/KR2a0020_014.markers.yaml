  - {type: page-break, offset: 5865, content: '', id: KR2a0020_WYG_014-14b, image: WYG0261/WYG0261-0227d.png}
  - {type: variant, offset: 5865, length: 0, content: '', krp: 武昭子儼襲美才貌位都官尚書及齊受禪聞勅召假病遂怖而卒西河公敦平}
  - {type: variant, offset: 5866, length: 1, content: 襄, WYG: 帝之曾孫也太祖初從征被堅執銳名冠諸將後從征中山所向無前太宗時拜中都大官世祖時進爵西河公寵遇彌篤卒子撥襲司徒石平文帝之𤣥孫也忠勇有膽略尤善騎射從世祖南討至𤓰步位尚書令雍州刺史歴比部侍郎華州刺史累遷征南大將軍卒贈司徒公武衞將軍謂烈帝之第四子也寛雅有將略常從太祖征討有功除武衞將軍後謝老歸家顯祖善禮遇之賜几杖服物致膳於第卒賜祕器子烏眞膂力絶人隨太祖征伐屢有戰功官至鉅鹿太守子興都聰敏剛毅髙宗時為河間太守賜爵樂城子為政嚴猛百姓憚之顯祖初以子丕貴重進爵樂城侯謝老歸家顯祖益禮之賜几杖服物致膳於第其妻婁氏為東陽}
