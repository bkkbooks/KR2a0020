  - {type: variant, offset: 5880, length: 1, content: 督, WYG: 臨太極殿引見留守之官大議乃詔丕等如有所懐各陳其志燕州刺史穆羆進曰移都事大如臣愚見謂為未可髙祖曰卿便言不可之理羆曰北有獫狁之寇南有荆揚未賔西有吐谷渾之阻東有髙句麗之難四方未平九區未定以此推之謂為不可征伐之舉要須戎馬如其無馬事不可克髙祖曰卿言無馬此理粗可馬常出北方廐在此置卿何慮無馬今代在恒山之北為九州之外以是之故遷于}
  - {type: page-break, offset: 5880, content: '', id: KR2a0020_WYG_014-18a, image: WYG0261/WYG0261-0229c.png}
  - {type: variant, offset: 5880, length: 1, content: 督, krp: 臨太極殿引見留守之官大議乃詔丕等如有所懐各陳其志燕州刺史穆羆進曰移都事大如臣愚見謂為未可髙祖曰卿便言不可之理羆曰北有獫狁之寇南有荆揚未賔西有吐谷渾之阻東有髙句麗之難四方未平九區未定以此推之謂為不可征伐之舉要須戎馬如其無馬事不可克髙祖曰卿言無馬此理粗可馬常出北方廐在此置卿何慮無馬今代在恒山之北為九州之外以是之故遷于}
  - {type: variant, offset: 5882, length: 1, content: 外, WYG: 原羆曰臣聞黃帝都涿鹿以此言之古昔聖王不必悉居中原髙祖曰黃帝以天下未定居于涿鹿既定之後亦遷于河南尚書于果曰臣誠不識古事如聞百姓之言先皇建都於此無何欲移以為不可中原其如是所由擬數有簒奪自建邑平城以來與天地並固日月齊明臣雖管見膚淺性不昭逹終不以恒代之地而擬伊洛之美但以安土重遷物之常性一旦南移懼不樂也丕曰陛下去歲親御六軍討蕭氏至洛遣任城王澄宣旨勅臣等議都洛初奉恩㫖心情惶越凡欲遷移當訊之卜筮審定吉否然後可髙祖謂丕曰往在鄴中司徒公誕咸陽王禧尚書李冲等皆欲請龜占移洛吉凶之事朕時謂誕等曰昔周召卜宅伊洛乃識至兆今無若斯之人卜亦無益然卜者所以決疑此既不疑何須卜也昔軒轅卜兆龜焦卜者請訪}
  - {type: page-break, offset: 5882, content: '', id: KR2a0020_WYG_014-18b, image: WYG0261/WYG0261-0229d.png}
