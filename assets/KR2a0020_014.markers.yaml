  - {type: variant, offset: 5940, length: 9, content: 保三月庚申進齊郡王, WYG: 宗所知元紹之逆也太宗濳隠於外磨渾與叔孫俊詐云太宗所在紹使帳下二人隨磨渾往規為逆磨渾既得出便縛帳下詣太宗斬之太宗得磨渾大喜因為羽翼以勲賜}
