  - {type: variant, offset: 5873, length: 0, content: '', WYG: 拜侍中司徒公時有諸疑事三百餘條勅丕制決率皆平允丕子超生車駕親幸其第特加賞賜以執心不二詔賜丕入八議傳示子孫犯至百聽責數恕之放其同籍丁口雜使役調求受復除若有姦邪人方便讒毁者即加斬戮尋遷太尉録尚書事時淮南王他淮陽王尉元河東王茍頽並以舊老見禮每有大事引入禁中乗步挽杖于朝進退相隨丕他元三人皆容貌壯偉腰帶十圍大耳秀眉鬚鬢斑白百寮觀瞻莫不祗聳唯茍頽小}
