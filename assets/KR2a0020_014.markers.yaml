  - {type: variant, offset: 1218, length: 121, content: 大行臺大都督以鮮卑高車酋庶皆隸之三月甲寅以開府儀同三司華山王鷙為大司馬丁卯陽夏太守盧公纂據郡南叛大都督元整破之夏四月丁酉昌樂王誕薨五月癸卯賜魚眾寡孤獨貧窮者衣物各有差丙辰以錄尚書事西河王悰為司州牧戊辰太尉高盛薨六月辛巳趙郡王諶薨秋七月庚子大赦, WYG: 時}
