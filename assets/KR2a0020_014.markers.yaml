  - {type: variant, offset: 5935, length: 2, content: 高隆, krp: 不避强禦與御史中尉李彪爭路俱入見面陳得失彪言御史中尉避承華車盖駐論道劒鼓安有洛陽縣令與臣抗衡志言神鄉縣主普天}
  - {type: variant, offset: 5938, length: 0, content: '', WYG: 下誰不編户豈有俯同衆官避中尉髙祖曰洛陽我之豐沛自應分路揚鑣自今以後可分路而行及出與彪折尺量道各取其半髙祖謂邢巒曰此兒竟可所謂王孫公子不鏤自彫巒曰露竹霜條故多勁節非鸞則鳯其在本枝也員外郎馮俊昭儀之弟恃勢恣撾所部里正志令主吏收繫處刑除官由此忤㫖左遷太尉主簿俄為從事中郎車駕南征髙祖微服觀戰所有箭欲犯帝志以身障之髙祖便得免矢中志目因此一目喪明以志行恒州事世宗時除荆州刺史還朝御史中尉王顯奏志在州日抑買良人為婢兼乗請供朝會赦免肅宗初兼廷尉卿後除揚州刺史賜爵建忠伯志在州威名雖減李崇亦為荆楚所憚尋為雍州刺史晚年躭好聲伎在揚州日侍側将百人器服珍麗冠於一時及在雍州逾尚華侈聚斂無極聲名遂損及莫折念生反詔志為西征都督討之念生遣其弟天生屯龍口與志相持為賊所乗遂棄大衆奔還岐州賊遂攻城刺史裴芬之疑城人與賊潛通将盡出之志不聽城人果開門引賊鏁志及芬之送念生見害前廢帝初贈尚書僕射太保扶風公處眞烈帝之後也少以壯烈聞位殿中尚書賜爵扶風公委以大政甚見尊禮吐京胡曹僕渾等叛招引朔方胡為援處眞與髙涼王那等討滅之性貪婪在軍烈暴坐事伏法文安公泥國之疎族也性忠直壯烈有智畫太祖厚遇之賜爵文安公拜安東將軍卒子屈襲爵太宗時居門下出納詔命性明敏善奏事每合上㫖賜爵元城侯加功勞將軍與南平公長孫嵩白馬侯崔𤣥伯等並決獄訟太宗東廵命屈行右丞相山陽侯奚斤行左丞相命掌軍國甚有聲譽後吐京胡與離石胡出以兵等叛置立將校外引赫連屈丐屈督會稽公劉潔永安侯魏勤捍之勤没於陳潔墜馬胡執送屈丐唯屈衆猶存太宗以屈沒失二將欲斬之時并州刺史元六頭荒淫怠事乃赦屈令攝州事屈縱酒頗廢政事太宗積其前後失檻車徵還斬於市子磨渾少}
