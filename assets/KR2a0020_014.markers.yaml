  - {type: variant, offset: 5046, length: 2, content: 行臺, WYG: 都將戰没江夏公呂太祖族弟也從世祖平涼州有功封江夏公位外都大官委以朝政大見尊重卒贈江夏王陪葬金陵髙涼王孤平文皇帝之第四子也多才藝有志畧烈帝之前元年國有内難昭成如襄國後烈帝臨崩顧命迎昭成立之社稷可安及崩羣臣咸以新有大故内外未安昭成在南來未可果比至之間恐生變詐宜立長君以鎭衆望次弟屈剛猛多變不如孤之寛和柔順於是大人梁盖等殺屈共推孤孤曰吾兄居長自應繼位我安可越次而處大業乃自詣鄴奉迎請身留為質石虎義而從之昭成即位乃分國半部以}
