  - {type: variant, offset: 5877, length: 2, content: 丞相, WYG: 詔丕羽曰留守非賢莫可太尉年尊徳重位總阿衡羽朕之懿弟温柔明斷故使二人留守京邑授以二節賞罰在手其祗允成憲以稱朕心丕對曰謹以死奉詔羽對曰太尉宜專節度臣但可副貳而已髙祖曰老者之智少者之決何得辭也及髙祖還代丕請作歌詔許之歌訖髙祖曰公傾朕還車故親歌述志今經構既有次第故暫還舊京願後時亦同兹適及髙祖欲遷}
