  - {type: variant, offset: 5038, length: 4, content: 慕容紹宗, WYG: 封南平公乙渾之謀亂也目辰與兄郁議欲殺渾事泄被誅目辰逃隠得免顯祖傳位有定策勲髙祖即位遷司徒封宜都王除雍州刺史鎭長安目辰性亢直耿介不}
  - {type: variant, offset: 5038, length: 4, content: 慕容紹宗, krp: 封南平公乙渾之謀亂也目辰與兄郁議欲殺渾事泄被誅目辰逃隠得免顯祖傳位有定策勲髙祖即位遷司徒封宜都王除雍州刺史鎭長安目辰性亢直耿介不}
  - {type: variant, offset: 5043, length: 1, content: 東, WYG: 朋黨朝臣咸憚之然好財利在州政以賄成有罪伏法爵除穆帝長子六脩少而兇悖穆帝五年遣六脩為前鋒與輔相衞雄范班及姬澹等救劉琨帝躬綂大兵為後繼劉粲懼焚燒輜重突圍遁走縱騎追之殺傷甚衆帝因大獵於壽陽山陳閲皮肉山為變赤及晉懐帝為劉聰所執穆帝遣六脩與桓帝子普根率精騎助劉琨初穆帝少子比延有寵欲以為後六脩出居新平城而黜其母六脩有驊騮駿馬日行五百里穆帝欲取以給比延後六脩來朝穆帝又命拜比延六脩不從穆帝乃坐比延於已所乗步輦使人導從出遊六脩望見以為穆帝謁伏路左及至乃是比延慙怒而去召之不逮穆帝怒率衆伐之帝軍不利六脩殺比延帝改服微行民間有賤婦人識帝遂暴崩普根先守于外聞難率衆來赴攻六脩滅之吉陽男比干太祖族弟也以司衛監討白澗丁零有功賜爵吉陽男後為}
  - {type: page-break, offset: 5043, content: '', id: KR2a0020_WYG_014-4b, image: WYG0261/WYG0261-0222d.png}
