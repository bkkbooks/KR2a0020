  - {type: variant, offset: 3674, length: 596, content: 下囚乙未以吏部尚書侯景為司空六月乙亥蕭衍遣使朝貢戊寅封前員外散騎侍郎元長春為南郡王秋八月乙未以汾州刺史斛律金為大司馬壬午遣兼散騎常侍李渾使于蕭衍是月齊獻武王召夫五萬於肆州北山築城西自馬陵戍東至土櫊四十日罷冬十有一月甲午車駕狩于西山乙巳還宮是歲吐谷渾高麗蠕蠕國並遣使朝貢二年春正月地豆于國遣使朝貢二月丁卯徐州人劉烏黑聚衆反遣行臺慕容紹宗討平之三月蕭衍遣使朝貢以旱故宥死罪以下囚丙午以開府儀同三司孫騰為太保壬子以齊文襄王為大將軍領侍中其文武職事賞罰衆典詢稟之中書監元弼為錄尚書左僕射司馬子如為尚書令以今上為右僕射夏四月室韋國遣使朝貢五月甲午遣散騎常侍魏季景使于蕭衍丁酉太尉廣陽王湛薨秋八月癸酉尚書令司馬子如坐事免九月甲申以開府儀同三司濟陰王暉業為太尉太師咸陽王坦坐事免以王還第冬十月丁巳太保孫騰大司馬高隆之各為括戶大使凡獲逃戶六十餘萬十有一月西河地陷有火出甲申以司徒高隆之為尚書令以前大司馬婁昭為司徒齊文襄王如晉陽庚子車駕有事於圓丘辛丑蕭衍遣使朝貢壬寅齊文襄王從獻武王討山胡破之俘獲一萬餘戶分配諸州是歲吐谷渾高麗蠕蠕勿吉國並遣使朝貢三年春正月丙申遣兼散騎常侍李奬使于蕭衍丁未齊獻武王請於并州置晉陽宮以處配沒之口二月庚申吐谷渾國奉其從妹以備後庭納為容華嬪夏五月甲辰大赦天下秋七月庚子蕭衍遣使朝貢冬十月遣中書舍人尉瑾使于蕭衍乙未齊獻武王請邙山之俘釋其桎梏配以人間寡婦十有二月以司空侯景為司徒以中書令韓, WYG: ''}
