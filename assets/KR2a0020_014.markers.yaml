  - {type: variant, offset: 5320, length: 3, content: 慕容紹, WYG: 臣順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啓云尚書百揆之本令僕納言之貴不宜下隷中尉送名御史尋亦蒙勅聽如其奏從此迄今使無準一臣初上臺具見其事意欲申請決議但以權兼未宜便爾日復一日遂歴炎涼去月朔旦臺移尚書索應朝名帳而省稽留不送尋復移催并主吏忽為尚書郎中裴獻伯後注云案舊事御史中尉逄臺郎於複道中尉下車執板郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕旋省二三未解所以正謂都省别被新式改易髙祖舊命即遣移問事何所依又獲尚書郎中王元旭報出蔡氏漢官似非穿鑿始知裴王亦規壊典謨兩人心欲自矯臣案漢書宣秉傳云詔徴秉為御史中丞與司隷校尉尚書令俱會殿庭並專席而坐京師號之為三獨坐又尋魏書崔琰傳晉文陽闕傅嘏傳皆云既為中丞百寮震悚以此而言則中丞不揖省郎盖已久矣憲臺不屬都堂亦非今日又尋職令云朝會失時即加彈糾則百官簿帳應送上臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宜付御史又亦彰矣不付名至否臧何驗臣順專執未為平通先朝曲遂豈是正法謹案尚書郎中臣裴獻伯王元旭等望班士流早參清宦輕弄短札斐然若斯茍執異端忽焉至此此而不綱将隳朝令請以見事免獻伯等所居官付法科處尚書納言之本令僕百揆之要同彼浮虚助兹乖失宜明首從節級其罪詔曰國異政不可據之古事付司檢髙祖舊格推處得失以聞尋從子思奏仍為元天穆所忿遂停元顥之敗封安定縣子孝靜時位侍中而死萇弟珍字金省襲爵艾陵男世}
