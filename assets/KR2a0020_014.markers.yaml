  - {type: punctuation, offset: 4293, content: 、, id: KR2a0020_ZHSJ_014-bkkpn789}
  - {type: variant, offset: 4299, length: 451, content: 朝貢四年夏五月壬寅蕭衍遣使朝貢六月庚子以司徒侯景為河南大行臺應機討防秋七月壬寅遣兼散騎常侍元廓使于蕭衍八月移洛陽漢魏石經于鄴齊獻武王自鄴帥衆西伐文襄王會于晉州九月圍玉壁以挑之寶炬黑獺不敢應冬十有一月齊獻武王有疾班師文襄王如晉陽是歲室韋勿吉地豆于高麗蠕蠕國並遣使朝貢五年春正月丙午齊獻武王薨於晉陽祕不發喪辛亥司徒侯景反潁州刺史司馬世雲以城應之景入據潁城誘執豫州刺史高元成襄州刺史李密廣州刺史暴顯等遣司空韓軌驃騎大將軍儀同三司賀拔勝可朱渾道元左衞將軍劉豐等帥衆討之景乃遣使降於寶炬請師救援寶炬遣其將李景和王思政帥騎赴之思政等入據潁川景乃出走豫州乙丑蕭衍遣使朝貢二月侯景復背寶炬歸於蕭衍衍署景河南大將軍承制夏四月壬申大將軍齊文襄王來朝甲午遣兼散騎常侍李緯使于蕭衍五月丁酉朔大赦天下戊戌以尚書右僕射襄城王旭為太尉甲辰以太原公今上為尚書令領中書監餘如故詢以政事以青州刺史尉景為大司馬以開府儀同三司厙狄干為太師以錄尚書事孫騰為太傅以汾州刺史賀仁為太保以司空韓軌為司徒以領軍將軍可朱渾道元為司空以司徒高隆之錄尚書事以, WYG: 除}
