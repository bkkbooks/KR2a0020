  - {type: variant, offset: 5831, length: 2, content: 中外, krp: 率京師之衆以赴之榮擒葛榮天穆增封通前三萬戸尋監修國史録尚書事開府世襲并州刺史初杜洛周鮮于修禮為宼瀛冀}
  - {type: variant, offset: 5834, length: 0, content: '', WYG: 州人多避亂南向幽州前北平府主簿河間邢杲擁率部曲屯據鄭城以拒洛周葛榮垂将三載及廣陽王深等敗後杲南度居青州北海界靈太后詔流人所在皆置命屬郡縣選豪右為守令以撫鎭之時青州刺史元世儁表置新安郡以杲為太守未報會臺申休疑簡授郡縣以杲從子子瑶資蔭居前乃授河間太守杲深恥恨於是遂反所在流人先為土人凌忽聞杲起逆率來從之旬朔之間衆踰十萬劫掠村塢毒害民人齊人號之為􅞌榆賊先是河南人常笑河北人好食榆葉故因以號之杲東掠光州盡海而還又破都督李叔仁}
