  - {type: variant, offset: 6754, length: 210, content: 百永作虞賓所司奏請發帝曰古人念遺簪弊履欲與六宮別可乎高隆之曰今天下猶陛下之天下況在後宮乃與夫人妃嬪已下訣莫不欷歔掩涕嬪趙國李氏誦陳思王詩云王其愛玉體俱享黃髮期皇后已下皆哭直長趙德以故犢車一乘候於東上閤帝上車德超上車持帝帝肘之曰朕畏天順人授位相國何物奴敢逼人趙德尚不下及出雲龍門王公百僚衣冠拜辭帝曰今日不減常道鄉公漢獻帝衆皆悲愴高隆之泣灑遂入北城下司馬子如南宅及文宣行幸常以帝自隨帝后封太原公主常為帝嘗食以護視焉竟遇酖而崩, WYG: 考證}
