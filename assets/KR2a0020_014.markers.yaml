  - {type: punctuation, offset: 129, content: 、, id: KR2a0020_ZHSJ_014-bkkpn23}
  - {type: variant, offset: 131, length: 779, content: 王坦為太尉以開府儀同三司高盛為司徒以開府儀同三司高昂為司空壬申有事于太廟詔曰安安能遷自古之明典所居靡定往昔之成規是以殷遷八城周卜三地吉凶有數隆替無事由於變通理出於不得已故也高祖孝文皇帝式觀乾象俯協人謀發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國步孔𣗥喪亂不已寇賊交侵俾我生民無所措手今遠遵古式深驗時事考龜襲吉遷宅漳滏庶克隆洪基再昌寶曆主者明為條格及時發邁丙子車駕北遷于鄴詔齊獻武王留後部分改司州為洛州以衞大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽詔從遷之戶百官給復三年安居人五年十有一月兗州刺史樊子鵠南青州刺史大野拔據瑕丘反庚寅車駕至鄴居北城相州之廨改相州刺史為司州牧魏郡太守為魏尹徙鄴舊人西徑百里以居新遷之人分鄴置臨漳縣以魏郡林慮廣平陽丘汲郡黎陽東濮陽清河廣宗等郡為皇畿十有二月丁卯燕郡王賀拔允薨庚午詔內外解嚴百司悉依舊章從容雅服不得以矛釤從事丙子遣侍中封隆之等五人為大使巡諭天下丁丑赦畿內閏月蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉宇文黑獺既害出帝乃以南陽王寶炬僭尊號初置四中郎將於礓石橋置東中蒲泉置西中濟北置南中洺水置北中二年春正月寶炬渭州刺史可朱渾道元擁部來降齊獻武王迎納之賑其廩食己巳詔以齊獻武王為相國假黃鉞劍履上殿入朝不趨餘悉如故王固讓不受乙亥兼尚書右僕射東南道行臺元晏討元慶和破走之二月壬午以太尉咸陽王坦為太傅以司州牧西河王悰為太尉己丑前南青州刺史大野拔斬樊子鵠以降兗州平戊戌蕭衍司州刺史陳慶之寇豫州刺史堯雄擊走之三月辛酉以司徒高盛為太尉以司空高昂為司徒濟陰王暉業為司空齊獻武王討平山胡劉蠡升斬之其子南海王復僭帝號獻武王進擊破擒之及其弟西海王皇后夫人已下四百人并逋逃之人二萬餘戶辛未以旱故詔京邑及諸州郡縣收瘞骸骨是春高麗契丹並遣使朝貢夏四月前青州刺史侯淵反攻掠青齊癸未濟州刺史蔡儁討平之壬辰降京師見囚五月大旱勒城門殿門及省府寺署門澆人不簡王, WYG: ''}
