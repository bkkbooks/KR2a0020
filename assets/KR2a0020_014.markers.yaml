  - {type: variant, offset: 5935, length: 2, content: 高隆, WYG: 不避强禦與御史中尉李彪爭路俱入見面陳得失彪言御史中尉避承華車盖駐論道劒鼓安有洛陽縣令與臣抗衡志言神鄉縣主普天}
