  - {type: variant, offset: 5049, length: 1, content: 驃, WYG: 之薨子斤失職懐怒構寔君為逆死於長安太祖時以孤勲髙追封髙涼王諡曰神武斤子眞樂頻有戰功後襲祖封太宗初改封平陽王薨子禮襲本爵髙涼王薨諡懿王子那襲爵拜中都大官驍猛善攻戰正平初坐事伏法顯祖即位追那功命子紇紹封薨子大曹性愿直髙祖時諸王非太祖子孫者例降爵為公以大曹先世讓國功重髙祖真樂勲著前朝改封太原郡公卒無子國除世宗又以大曹從兄子洪威紹恭謙好學為潁川太守有政績孝靜初在潁川聚衆應闗西齊獻武王遣將討平之禮弟陵世祖賜爵襄邑男進爵為子卒子瓌位柔𤣥鎭司馬瓌子鷙字孔雀容貌魁壯腰帶十圍為羽林隊仗副髙祖末以征討有功賜爵晉陽男累遷領軍畿部都督武泰元年尒朱榮至河陰殺戮朝士鷙與榮共登髙塜俯而觀之自此後與榮合元顥之逼也鷙從駕北迎既到河内欲入城鷙奏曰河内晝則閉門夜引駕入此之意趣難以測量本圖有在願便發邁帝從之前至長子以尒朱榮赴援除鷙車}
