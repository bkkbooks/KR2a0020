  - {type: variant, offset: 5348, length: 257, content: 潁川引洧水灌其城九月乙酉蕭衍遣使朝貢冬十月戊申侯景濟江推蕭衍弟子臨賀王正德為主以攻建業是歲高麗室韋蠕蠕吐谷渾國並遣使朝貢七年春正月戊辰蕭衍弟子北徐州刺史封山侯蕭正表以鍾離內屬封蘭陵郡開國公吳郡王三月丁卯侯景克建業還以蕭衍為主衍弟子北兗州刺史定襄侯蕭祗相譚侯蕭退來降衍江北郡國皆內屬夏四月大行臺慕容紹宗大都督劉豐遇暴風溺水死甲辰詔以齊文襄王為相國齊王綠綟綬讚拜不名入朝不趨劍履上殿食冀州之勃海長樂安德武邑瀛州之河間五郡邑十五萬戶餘如故王固讓是月侯景殺蕭衍立子綱為主五月齊文襄王帥衆自鄴赴潁川六月丙申克潁州擒寶炬大將軍, WYG: ''}
