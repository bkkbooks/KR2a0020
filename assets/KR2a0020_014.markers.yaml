  - {type: variant, offset: 5934, length: 0, content: '', WYG: 進爵為公後與新興王俊討秃髪保周坐事免官爵劉義隆將裴方明陷仇池世祖復授齊前將軍與建興公古弼討之遂尅仇池威振羌氐復賜爵河間公與武都王楊保宗對鎭駱谷時保宗弟文徳說保宗閉險自固有期矣秦州主簿邊因知之密告齊齊晨詣保宗呼曰古弼至欲宣詔保宗出齊叱左右扶保宗上馬馳驛送臺諸氐遂推文徳為主求援於劉義隆義隆遣將房亮之苻昭啖龍等率衆助文徳齊擊斬殺龍擒亮之氐遂平以功拜内都大官卒諡曰敬長子陵襲爵陵性抗直天安初為乙渾所害陵弟蘭以忠謹見寵髙祖初賜爵建陽子卒於武川鎭將子志字猛略少清辯强幹歴覽書傳頗有文才為洛陽}
