  - {type: variant, offset: 1361, length: 2309, content: 州內附八月并肆汾建四州隕霜大飢九月壬寅以定州刺史侯景兼尚書右僕射南道行臺節度諸軍南討丙辰陽平人路季禮聚衆反辛酉御史中尉竇泰討平之冬十有一月戊申詔尚書可遣使巡檢河北流移飢人邢陘滏口所經之處若有死屍即為藏掩勿使靈臺枯骨有感於通夢廣漢露骸時聞於夜哭侯景攻克蕭衍楚州獲刺史桓和十有二月以并州刺史尉景為太保辛未遣使者板假老人官百歲已下各有差壬申大司馬清河王亶薨丁丑齊獻武王自晉陽西討次於蒲津司徒公大都督高敖曹趨上洛車騎大將軍竇泰入自潼關癸未以太傅咸陽王坦為太師乙酉勿吉國遣使朝貢是歲高麗國遣使朝貢四年春正月禁十五日相偷戲竇泰失利自殺丁巳高敖曹攻上洛克之擒寶炬驃騎大將軍洛州刺史泉企以汝陽王暹為錄尚書事夏四月辛未遷七帝神主入新廟大赦天下內外百官普進一階先是滎陽人張儉等聚衆反於大騩山通寶炬壬辰武衞將軍高元盛討破之六月己巳幸華林園理訟辛未詔尚書掩骼埋胾推錄囚徒壬午閶闔門災先是蕭衍因益州刺史傅和請通好秋七月甲辰遣兼散騎常侍李諧兼吏部郎中盧元明兼通直散騎常侍李鄴使于蕭衍八月寶炬宇文黑獺寇陝州城陷刺史李徽伯為黑獺所殺九月侍中元子思與其弟子華謀西入並賜死閏月乙丑衞將軍右光祿大夫蔣天樂謀反伏誅禁京師酤酒冬十月以咸陽王坦為錄尚書事壬辰齊獻武王西討至沙苑不克而還己酉寶炬行臺宮景壽都督楊白駒寇洛州大都督韓延大破之寶炬又遣其子大行臺元季海大都督獨孤如願逼洛州刺史廣陽王湛棄城退還季海如願遂據金墉潁州長史賀若微執刺史田迅西叛引寶炬都督梁回據城寶炬又遣其都督趙繼宗右丞韋孝寬等攻陷豫州十有一月丙子以驃騎大將軍儀同三司万俟普為太尉十有二月甲寅蕭衍遣使朝貢河間人邢摩納范陽人盧仲禮等各聚衆反是歲高麗蠕蠕國並遣使朝貢元象元年春正月有巨象自至碭郡陂中南兗州獲送于鄴丁卯大赦改元大都督賀拔仁攻寶炬南汾州己卯拔之擒其刺史韋子粲行臺任祥率豫州刺史堯雄等與大行臺侯景司徒高敖曹大都督万俟受洛干等於北豫相會俱討潁州梁回等棄城遁走潁州平二月豫州刺史堯雄攻揚州拔之擒寶炬義州刺史韓顯揚州長史丘岳送京師丙辰遣兼散騎常侍鄭伯猷使于蕭衍三月齊獻武王固請解大丞相詔從之夏四月庚寅曲赦畿內壬辰齊獻武王還晉陽請開酒禁六月壬辰帝幸華林都堂聽訟是夏山東大水蝦蟆鳴于樹上秋七月乙亥高麗國遣使朝貢行臺侯景司徒公高敖曹圍寶炬將獨孤如願於金墉寶炬宇文黑獺並來赴救大都督厙狄干率諸將前驅齊獻武王總衆繼進八月辛卯戰于河陰大破之斬其大都督儀同三司寇洛生等二十餘人俘獲數萬司徒公高敖曹大都督李猛宋顯並戰沒寶炬留其將長孫子彥守金墉壬辰齊獻武王濟河子彥棄城走九月大都督賀拔仁擊邢摩納盧仲禮等破平之冬十月蕭衍遣使朝貢十有一月庚寅遣陸操使于蕭衍齊獻武王來朝十有二月甲辰還晉陽興和元年春正月辛酉以尚書令孫騰為司徒三月甲寅朔封常山郡王召己第二子曜為陳郡王夏五月齊文襄王來朝甲戌立皇后高氏乙亥大赦天下是月高麗國遣使朝貢六月乙酉以尚書左僕射司馬子如為山東黜陟大使尋為東北道大行臺差選勇士庚寅前潁州刺史奚思業為河南大使簡發勇士丁酉蕭衍遣使朝貢戊申開府儀同三司汝陽王暹薨秋七月丁丑詔以齊獻武王為相國錄尚書事大行臺固辭相國八月壬辰兼散騎常侍王元景兼通直散騎常侍魏收使于蕭衍九月甲子發畿內民夫十萬人城鄴城四十日罷辛未曲赦畿內死罪以下各有差冬十有一月癸亥以新宮成大赦天下改元八十以上賜綾帽及杖七十以上賜帛及有疾廢者賜粟帛築城之夫給復一年二年春正月壬申以太保尉景為太傅以驃騎大將軍開府儀同三司厙狄干為太保丁丑徙御新宮大赦內外百官普進一階營構主將別優一階三月己卯蕭衍遣使朝貢夏五月己酉西魏行臺宮延和陝州刺史宮元慶率戶內屬置之河北新附賑廩各有差壬子遣兼散騎常侍李象使于蕭衍閏月己丑封皇兄景植為宜陽王皇弟威為清河王謙為潁川王六月壬子大司馬華山王鷙薨冬十月丁未蕭衍遣使朝貢十有二月乙卯遣兼散騎常侍崔長謙使於蕭衍是歲蠕蠕高麗勿吉國並遣使朝貢三年春二月甲辰阿至羅出吐拔那渾大率部來降三月己酉梁州人公孫貴賓聚衆反自號天王陽夏鎮將討擒之夏四月戊申阿至羅國主副伏羅越居子去賓來降封為高車王六月乙丑蕭衍遣使朝貢秋七月齊文襄王如晉陽己卯宜陽王景植薨八月甲子遣兼散騎常侍李騫使于蕭衍冬十月癸卯齊文襄王自晉陽來朝先是詔文襄王與羣臣於麟趾閣議定新制甲寅班於天下己巳發夫五萬人築漳濱堰三十五日罷癸亥車駕狩于西山十有一月戊寅還宮丙戌以開府儀同三司彭城王韶為太尉以度支尚書胡僧敬為司空是歲蠕蠕高麗勿吉國並遣使朝貢四年春正月丙辰蕭衍遣使朝貢夏四月丙寅遣兼散騎常侍李繪使于蕭衍乙酉以侍中廣陽王湛為太尉以尚書右僕射高隆之為司徒以太尉彭城王韶為錄尚書事丁亥太傅尉景坐事降為驃騎大將軍開府儀同三司辛卯以太保厙狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射五月辛巳齊獻武王來朝請令百官月一面敷政事明揚仄陋納諫屏邪親理獄訟褒黜勤怠牧守有愆節級相坐椒掖之內進御以序後園鷹犬悉皆放棄六月還晉陽丙申復前侍中樂浪王忠爵丁酉復陳留王景皓常山王紹宗高密王永業爵秋八月庚戌以開府儀同三司吏部尚書侯景為兼尚書僕射河南行臺隨機討防冬十月甲寅蕭衍遣使朝貢齊獻武王圍寶炬玉壁十有一月壬午班師驃騎大將軍開府儀同三司青州刺史西河王悰薨十有二月辛亥遣兼散騎常侍陽斐使于蕭衍是歲蠕蠕高麗吐谷渾國並遣使朝貢武定元年春正月壬戌朔大赦天下改元己巳車駕蒐于邯鄲之西山癸酉還宮二月壬申北豫州刺史高仲密據虎牢西叛三月寶炬遣其子突與宇文黑獺率衆來援仲密庚子圍河橋南城丙午帝親納訟戊申齊獻武王討黑獺戰於邙山大破之擒寶炬兄子臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮驃騎大將軍儀同三司太子詹事趙善督將參僚等四百餘人俘斬六萬餘甲仗牛馬不可勝數豫洛二州平齊獻武王追奔至農而還夏四月封彭城王韶弟襲為武安王五月壬辰以克復虎牢降天, WYG: 深刻遇}
