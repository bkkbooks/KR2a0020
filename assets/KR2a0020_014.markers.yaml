  - {type: variant, offset: 5194, length: 0, content: '', WYG: 往便利近橋諸郡無復勞擾公私頼之歴位度支尚書侍中雍州刺史卒諡曰成萇中年以後官位微逹乃自尊倨閨門無禮昆季不穆性又貪虐論者鄙之萇子子華字伏榮襲爵孝莊初除齊州刺史先是州境數經反逆邢杲之亂人不自保而子華撫集豪右委之管籥衆皆感悅境内帖然而性甚褊急當其急也口不擇言手自捶擊長史鄭子湛子華親友也見侮罵遂即去之子華雖自悔厲終不能改在官不為矯潔之行凡有餽贈者辭多受少故人不厭其取鞫獄訊囚務加仁恕齊人樹碑頌徳後除濟州刺史尒朱兆之入洛也齊州城人趙洛周逐刺史丹陽王蕭贊表濟南太守房士逹攝行州事洛周子元顯先隨子華在濟州邀路改表請子華復為齊州刺史子華母房氏曾就親人飲食夜還大吐人以為中毒甚憂懼子華遂掬吐盡噉之其母乃安尋以母憂還都孝靜初除南兗州刺史弟子思通使闗西}
