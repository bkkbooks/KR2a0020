  - {type: variant, offset: 332, length: 6, content: 騎常侍前將軍, WYG: 如此則休聲日至謗議可除恭宗不納恭宗之崩也允久不進見後世祖召允升階歔欷悲不能止世祖流淚命允使出左右莫知其故相謂曰髙允無何悲泣令至尊哀傷何也世祖聞之召而謂曰汝不知髙允悲乎左右曰臣等見允無言而泣陛下為之悲傷是以竊言耳世祖曰崔浩誅時允亦應死東宫苦諫是以得免今無東宫允見朕因悲耳允表曰往年被勑令臣集天文災異使事類相從約而可觀臣聞箕子陳謨而洪範作宣尼述史而春秋著皆所以章明列辟景測皇天者也故先其善惡而驗以災異隨其失得而效以禍福天人誠逺而報速如響甚可懼也自古帝王莫不尊崇其道而稽其法數以自修飭厥後史官並載其事以為鑒誡漢成時}
