  - {type: variant, offset: 380, length: 0, content: '', WYG: 斯乎宗愛之任勢也威振四海嘗召百司於都坐王公以下望庭畢拜髙子獨升階長揖由此觀之汲長孺可臥見衞青何抗禮之有向之所謂風節者得不謂此乎知人固不易人亦不易知吾既失之於心内崔亦漏之於形外鍾期止聽於伯牙夷吾見明於鮑叔良有以也其為人物所推如此髙宗重允常不名之恒呼為令公令公之號播於四逺矣髙宗崩顯祖居諒闇乙渾專擅朝命謀危社稷文明}
