  - {type: variant, offset: 645, length: 2, content: 挾恨, WYG: 假靡矜于髙莫恥于下乃謝朱門歸迹林野宗敬延譽號為四儁華藻雲飛金聲夙振中遇沉疴賦詩以訊忠顯于辭理出于韻髙滄朗達默識淵通領新悟異發自心胷質侔和璧文炳雕龍燿姿天邑衣錦舊邦士元先覺介焉不惑振袂來庭始賓王國蹈方履正好是繩墨淑人君子其儀不忒孔稱游夏漢美淵雲越哉伯度出類踰羣司言祕閣作牧河汾移風易俗理亂解紛融彼滯義渙此潛文儒道以析九流以分崔宋二賢誕性英偉擢類閭閻聞名象魏蹇蹇儀形邈邈風氣達而不矜素而能賁潘符標尚杜熙好和清不潔流渾不同波絶希龍津止分常科幽而逾顯損而逾多張綱柔謙叔術正直道雅洽聞弼為兼識㧞萃衡門俱漸鴻翼發憤忘餐豈要斗食率禮從仁罔愆于式失不繫心得不形色郎苗始舉用均已試智足周身言足為治性協於時情敏於事與今而同與古曷異物以利移人以酒昏侯生潔已唯義是敦日縱醇醪逾敬逾溫其在私室如渉公門季才}
