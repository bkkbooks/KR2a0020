  - {type: variant, offset: 3168, length: 877, content: 孤抑以人廢勳高祖曰卿訴父賞而卿父無勳歷城齊之西關歸命請順梁鄒小戍豈能獲全何足以為功也文曄對曰誠如聖旨愚臣所見猶有未申何者昔樂毅破齊七十餘城唯有即墨獨在此豈非根亡而條立且夫降順之人驗之古今未有不由危逼者故黃權無路歸款列地封侯且薛安都畢衆敬危急投命並受茅土之爵論古則如彼語今則如此明明之世不及比流竊惟梁鄒嚴固地據中齊粟支十載控弦數千萬方之升城不可同日而語升城猶能抗兵累旬傷殺甚衆若臣亡父固守孤城則非一朝可克高祖曰歷城既陷梁鄒便是掌中何煩兵力對曰若如聖旨白曜便應窮兵極意取勝俯仰何為上假赤虎之信下衒知變之民高祖曰卿父此勳本自至少以卿才地豈假殷勤對曰臣愚六蔽文武無施響絕九皐聞天無日遭逢聖運萬死猶生但臣竊見徐兗是賊藩要徐兗既降諸戍皆應國有而東徐州刺史張讜所戍團城領二郡而已徐兗降後猶閉門拒命授以方嶽始乃歸降父子二人並蒙侯爵論功比勤不先臣父高祖曰卿引張讜讜事小異對曰臣未識異狀高祖曰張讜始來送款終不差信卿父進非先覺退又拒守何得不異對曰張讜父子始有歸順之名後有閉門之罪以功補過免罪為幸臣又見崔僧祐母弟隨其叔父道固在歷城僧祐遙聞王威遠及恐母弟淪亡督率鄉閭來欲救援既至郁洲歷城已沒束手歸誠救母弟之命聖朝嘉其附化賞以三品亡父之誠豈後僧祐高祖曰僧祐身居東海去留任意來則有位去則他人是故賞之卿父被圍孤城已是己物所以不賞對曰亡父據城歸國至公也僧祐意計而來為私也為私蒙賞至公不酬臣未見其可高祖笑而不言比部尚書陸叡叱文曄曰假令先朝謬賞僧祐豈可謬相賞也文曄曰先帝中代聖主與日月等曜比隆堯舜宰相則十亂五臣今言謬賞豈不仰誣先朝乎尚書高閭曰卿謂母弟與妻子何者為重文曄曰母弟為重閭曰卿知母弟為重朝廷賞僧祐是也卿父為妻子而來事何相反對曰僧祐若無母弟來歸以不閭曰不來文曄曰若僧祐赴母弟之難此是其私而亡父本為大丈夫立身處世豈可顧妻子而虧高節也昔樂羊食子有顧以不亡父本心實不垂顧所以歸化者自知商周不敵天命有所歸高祖謂文曄曰卿之所訴頗亦有途賞從重罰從輕尋敕酬文曄泣曰臣愚頓理極再見無期陛下既垂慈澤願敕有司特賜矜理高祖曰王者無戲何待懃懃既而賜文曄爵都昌子深見待遇拜協律中郎改授羽林監世宗世除高陽太守延昌中, WYG: ''}
