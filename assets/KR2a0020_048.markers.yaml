  - {type: variant, offset: 681, length: 0, content: '', WYG: 行勿有辭也後允從顯祖北伐大㨗而還至武川鎮上北伐頌其詞曰皇矣上天降鑒惟徳眷命有魏照臨萬國禮化丕融王猷允塞靜亂以威穆民以則北虜舊𨽻禀政在蕃往因時闕逃命北轅世襲凶軌背忠食言招亡聚盗醜類實繁敢率犬羊圖縱猖獗乃詔訓師興戈北伐躍馬裹糧星馳電發撲討䖍劉肆陳斧鉞斧鉞暫陳馘翦厥旅積骸填谷流血成浦元凶狐奔假息窮墅爪牙既摧腹心亦阻周之忠厚存及行葦翼翼聖明有兼斯美澤被京觀垂此仁㫖封尸野獲惠加生死生死蒙惠人欣覆育理貫幽㝠澤漸殊域物歸其誠神獻其福遐邇斯懷無思}
