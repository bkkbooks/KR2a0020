  - {type: variant, offset: 4948, length: 210, content: 叔祖弟幼愍安豐新蔡二郡太守坐事奪官居家忽聞有客聲出無所見還至庭中為家群犬所噬遂卒初長孫觀之將至盤陽也城中稍以震懼時劉彧給事中崔平仲欲歸江南自歷下至圍城軍中與十餘騎遙共法壽語靈賓密遣人捕執之始法壽克盤陽之後常禁靈賓於別齋既得平仲引與同室致酒食國軍明將入意夜中北城上縋出平仲靈賓等十餘人厥明官軍至城靈賓遂歸梁鄒靈賓文藻不如兄靈建而辯悟過之靈建在南官至州治中勃海太守以才名見稱兄弟俱入國為平齊民雖流漂屯圮操尚卓然並卒於平齊靈建, WYG: ''}
