  - {type: variant, offset: 360, length: 0, content: '', krp: 覽而善之曰髙允之明災異亦豈減崔浩乎及髙宗即位允頗有謀焉司徒陸麗等皆受重賞允既不蒙襃異又終身不言其忠而不伐皆此類也給事中郭善明性多機巧欲逞其能勸髙宗大起宫室允諫曰臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宫室已備永安前殿足以朝會萬國西堂溫室足以安御聖躬紫樓臨望可以觀望逺近若廣修壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其飢一婦不織或受其寒況數萬之衆其所損廢亦已多矣推之於古驗之於今必然之效也誠聖主所宜思量髙宗納之允以髙宗纂承平之業而風俗仍舊婚娶喪葬不依古式允乃諫曰前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謠鼓舞殺牲燒葬一切禁斷雖條㫖久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至於斯昔周文以百里之地修徳布政先於寡妻及於兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥效矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給伎以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆揀擇徳義之門妙選貞閑之女先之以媒聘繼之以禮物集寮友以重其別}
  - {type: variant, offset: 361, length: 0, content: '', WYG: 御輪以崇其敬婚姻之際如此之難今諸王十五便賜妻別居然所配者或長少差舛或罪人掖庭而作合宗王妃嬪藩懿失禮之甚無復此過往年及今頻有檢効誠是諸王過酒致責跡其元起亦由色衰相棄致此紛紜今皇子娶妻多出宫掖令天下小民必依禮限此二異也萬物之生靡不有死古先哲王作為禮制所以養生送死折諸人情若毁生以奉死則聖人所禁也然葬者藏也死者不可再見故深藏之昔堯葬穀林農不易畝舜葬蒼梧市不改肆秦始皇作為地市下錮三泉金玉寶貨不可計數死不旋踵尸焚墓掘由此推之堯舜之儉始皇之奢是非可見今國家營葬費損巨億一旦焚之以為灰燼茍靡費有益於亡者古之臣奚獨不然今上為之不輟而禁下民之必止此三異也古者祭必立尸序其昭穆使亡者有憑致食饗之禮今已葬之魂人直求貌類者事之如父母燕好如夫妻損敗風化瀆亂情理莫此之甚上未禁之下不改絶此四異也夫饗者所以定禮儀訓萬國故聖王重之至乃爵盈而不飲肴乾而不食樂非雅聲則不奏物非正色則不列今之大會内外相混酒醉喧譊罔有儀式又俳優鄙藝汚辱視聽朝廷積習以為美而責風俗之清純此五異也今陛下當百王之末踵晉亂之弊而不矯然釐改以厲頽俗臣恐天下蒼生永不聞見禮教矣允言如此非一髙宗從容聽之或有觸迕帝所不忍聞者命左右扶出事有不便允輒求見髙宗知允意逆屏左右以}
