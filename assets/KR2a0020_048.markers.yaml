  - {type: variant, offset: 266, length: 1, content: 司, WYG: 魏厯以示允允曰天文厯數不可空論夫善言逺者必先驗於近且漢元年冬十月五星聚於東井此乃厯術之淺今譏漢史而不覺此謬恐後人譏今猶今之譏古浩曰所謬云何允曰案星傳金水二星常附日而行冬十月日在尾箕昏没於申南而東井方出於寅北二星何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑三星之聚而怪二星之來允曰此不可以空言爭宜更審之時坐者咸怪唯東宫少傅游雅曰髙君長于厯數當不虛也後歲餘浩謂允曰先所論者本不注心及更考究果如君語以前三月聚于東井非十月也又謂雅曰髙允之術陽元之射也衆乃歎服允雖明於厯數初不推歩有所論說唯游雅數以災異問允允曰昔人有言知之甚難既知復恐漏泄不如不知也天下妙理至多何遽問此雅乃止尋以本官為秦王翰傅後勑以經授恭宗甚見禮待又詔允與侍郎公孫質李虚胡方回共定律令世祖引允與論刑政言甚稱㫖因問允曰萬機之務何者為先是時多禁封良田又京師遊食者衆允因言曰臣少也賤所知唯田請言農事古人云方一里則為田三頃七十畝百里則田三萬七千頃若勤之則畝益三升不勤則畝損三升方百里損益之率為粟二百二十二萬斛況以天下之廣乎若公私有儲雖遇饑年復何憂哉世祖善之遂除田禁悉以授民初崔浩薦冀定相幽并五州之士數十人各起家郡守恭宗謂浩曰先召之人亦州郡選也在職已久勞勤未答今可先補前召外任郡縣以新召者代為郎吏又守令宰民宜使便事者浩固爭而遣之允聞之謂東宫博士管恬曰崔公其不免乎茍逞其非而校勝於上何以能濟遼東公翟黑子有寵於世祖奉使并州受布千疋事尋發覺黑子請計於允曰主上問我為首為諱乎允曰公帷幄寵臣答詔宜實又自告忠誠罪必無慮中書侍郎崔覽公孫質等咸言首實罪不可測宜諱之黑子以覽等為親已而反怒允曰如君言誘我死何其不直遂與允絶黑子以不實對竟為世祖所疎終獲罪戮是時著作令史閔湛郄檦性巧佞為浩信待見浩所注詩論語尚書易遂上疏言}
