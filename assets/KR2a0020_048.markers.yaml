  - {type: variant, offset: 4047, length: 882, content: 平遠將軍光州刺史諡曰貞子元襲拜員外郎襄威將軍青州別駕卒文顥性仁孝篤厚徐州安豐王府騎兵參軍季友南青州左軍府錄事參軍聞慰博識有才思至延興中南叛休賓叔父旋之其妻許氏二子法鳳法武而旋之早亡東陽平許氏攜二子入國孤貧不自立並疏薄不倫為時人所棄母子皆出家為尼既而反俗太和中高祖選盡物望河南人士才學之徒咸見申擢法鳳兄弟無可收用不蒙選授後俱奔南法武後改名孝標云房法壽小名烏頭清河繹幕人也幼孤少好射獵輕率勇果結群小而為劫盜從叔元慶範鎮等坐法壽被州郡切責時月相繼宗族甚患之弱冠州迎主簿後以母老不復應州郡之命常盜殺猪牛以共其母招集壯士常有百數母亡歲餘遇沈文秀崔道固起兵應劉子勛明僧暠劉乘民起兵應劉彧攻討文秀法壽亦與清河太守王玄邈起兵西屯合討道固玄邈以法壽為司馬累破道固軍甚為歷城所憚加法壽綏邊將軍魏郡太守子勛死道固文秀悉復歸彧乃罷兵道固慮其扇亂百姓遂切遣之而法壽外託裝辦而內不欲行會從弟崇吉在升城為慕容白曜所破母妻沒於白曜軍崇吉奔還舊宅法壽與崇吉年志粗相諧協而親則從祖兄弟也崇吉以母妻見獲託法壽為計法壽既不欲南行恨道固逼切又矜崇吉情理時道固以兼治中房靈賓督清河廣川郡事戍盤陽法壽遂與崇吉潛謀襲靈賓克之仍歸款於白曜以贖母妻白曜遣將軍長孫觀等自大山南入馬耳關以赴盤陽還崇吉母妻初道固遣軍圍盤陽法壽等拒守二十餘日觀軍至賊乃散走觀軍入城詔以法壽為平遠將軍與韓騏驎對為冀州刺史督上租糧以法壽從父弟靈民為清河太守思順為濟南太守靈悅為平原太守伯憐為廣川太守叔玉為高陽太守叔玉兄伯玉為河間太守伯玉從父弟思安為樂陵太守思安弟幼安為高密太守以安初附及歷城梁鄒降法壽崇吉等與崔道固劉休賓俱至京師以法壽為上客崇吉為次客崔劉為下客法壽供給亞於安都等以功賜爵壯武侯加平遠將軍給以田宅奴婢性好酒愛施親舊賓客率同飢飽坎壈常不豐足畢衆敬等皆尚其通愛太和中卒贈平東將軍青州刺史諡敬侯子伯祖襲例降為伯歷齊郡內史伯祖闇弱委事於功曹張僧皓僧皓大有受納伯祖衣食不充後廣陵王羽為青州伯祖為從事中郎平原相轉幽州輔國長史坐公事免官卒子翼襲宣威將軍大城戍主永安中青州太傅開府從事中郎伯祖弟叔祖別以功賜爵魏昌子歷廣陵王國郎中令長廣東萊二郡太守, WYG: ''}
