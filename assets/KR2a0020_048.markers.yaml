  - {type: variant, offset: 1108, length: 227, content: 以內職以宗室女妻之而佞巧輕薄為人士所賤為雲中鎮將及入馮文通文通送之江南唐和字稚起晉昌冥安人也父繇以涼土喪亂民無所歸推隴西李暠於敦煌以寧一州李氏為沮渠蒙遜所滅和與兄契攜外甥李寶避難伊吾招集民衆二千餘家臣於蠕蠕蠕蠕以契為伊吾王經二十年和與契遣使來降為蠕蠕所逼遂擁部落至于高昌蠕蠕遣部帥阿若率騎討和至白力城和率騎五百先攻高昌契與阿若戰歿和收餘衆奔前部王國時沮渠安周屯橫截城和攻拔之斬安周兄子樹又克高寧白力二城斬其戍主遣使表狀世祖嘉其誠款屢賜和和後與前部王車伊洛, WYG: 游}
