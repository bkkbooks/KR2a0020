  - {type: punctuation, offset: 7829, content: 、, id: KR2a0020_ZHSJ_048-bkkpn1661}
  - {type: variant, offset: 7831, length: 1798, content: 將軍洛州刺史諡曰文景先作五經疑問百餘篇其言該典今行於時文多略舉其切於世教者問王者受命木火相生曰五精代感禀靈者興金德方隆禎發華渚水運告昌瑤光啟祚人道承天天理應實受謝既彰玄命若契相生之義有允不違至如湯武革命殺伐是用水火為次遵而不改既事乖代終而數同納麓逆順且殊禎運宜異而兆徵不差有疑符應問禹以鯀配天舜不尊父曰明明上天下土是冒道高者負扆四方神積者郊原斯主是以則天不能私其子紹堯不敢尊其父鯀既罪彰於山川受殛於羽裔化質與鱗甲為群銘精不能上乘箕尾而厚尊配於國陽當升煙之大禮苟存及躬以亂祀典降上帝為罪鬼之賓奏夾鍾為介蟲之樂奉天之道不乃有淪乎問湯尊稷廢柱曰神積道存異世同尊列山見享綿紀前代成湯革命承天當愆陽之運不思理數之有時黜元功於百世且畢箕感應風雨異徵尊播殖之靈而邀滂澍之潤升廢之道無乃謬與若柱不合薦虞夏應失之於前如以歲久宜遷百神可計日而代求之二三未究往旨問湯克桀欲遷夏社為不可武王滅紂以亳社為亡國之誡曰神無定方唯人為主道協無為天地是依棄德弗崇百靈更祀周武承天禮存咸秩升后稷當四圭之尊貶土祇隔牲幣之享就如言之稷禀靈威誠允聿追之宜社非商祖孝孚乃考之咎殷鑒致誡何獨在斯問易著革命之爻而無揖讓之象曰玄黃剖別人道為尊含靈佇化故義始元首是以飛龍啟徵大人載就及理運相推帝圖異序虞賓以為善終順守有慚未盡不顯揖讓之象而著已日之美豈可兆巨釁為貽厥之謀訓萬世而開安忍之求之反衷未識理恕問周禮秋官司烜氏邦若屋誅為明竁焉曰王道貴產法理尚恩舊德見食八象載其美五宥三刺禮經寶其仁是以祿父巨釁殷禮不輟三監亂德蔡胤猶存罪莫極於無上逆莫甚於違天行大辟禍不及族理正刑愆止於身何惡當參夷之禍何戾受淪殄之辜問儀禮繼母出嫁從為之服傳云貴終其恩曰繼母配父本非天屬與尊合德名義以興兼鞠育有加禮服是重既體違義盡棄節毀慈作嬪異門為鬼他族神道不全何終恩之有方齊服是追哭於野次苟存降重無乃過猶不及乎問禮記生不及祖父母父母稅喪己則否曰服以恩制禮由義立慈母三年孫無緦葛者以戚非天屬報養止身祖雖異域恩不及己但正體於下可無服乎且縞冠玄武子姓之服縓練之後纕絰已除猶懷慘素未忍從吉況斬焉初之創巨方始復弔之賓尚改緇襲奉哀苫次而無追變孝子孝孫豈天理是與問左氏傳齊人殺哀姜君子以為不可曰受醮從天人倫所重保育異宗承奉郊奠而乃肆極昏淫禍傾合卺之尊怙亂無終殄滅誕鞠之愛齊桓匡翼四方正存刑矩割不忍之恩行至公之法方生貶違以殺為甚而神道幽默禍降未期雖窮勃履朝臣不宜糾既事反人靈咎將有所施之取衷孰為優允問公羊傳王者之後郊天曰神不謬享帝無妄尊介丘偏祀猶不歆季氏之旅昊天至重豈可納廢饗之虔唐虞已往事無斯典三后已降始見其文揖讓之冑禮不上通昏瘉後燼四圭是主此便至道相承乾無二統純風既詖玄牡肆尊禮不虛革庶昭異聞問穀梁傳魯僖三十一年夏四月卜郊不從乃免牲傳曰乃者亡乎人之辭也曰樂以觀風禮為教本其細已甚民不堪命齊不加兵屈於周典僖公魯之盛君告誡虔祀穆卜迎吉而休徵不至若推咎於天則神不棄鑒歸愆於人則頌聲宜替既命龜失辰靈威弗眷郊享不從配天斯缺即傳所言殆非虛美何承而制問尚書胤征羲和詰其罪乃季秋月朔辰弗合於房曰衡紀不移日月有度炎涼啟辰次舍無代履端屢臻歸餘成閏是以爰命羲和升準徂節使晷數應時火流協運致望舒後律耀靈爽次即官闕永容可為愆玄象一差未成巨戾且杪秋豈回星之辰授衣非合璧之月食弗當積失加誅律度暫差便遘殄絕仁者之兵義不妄興王赫斯舉將有異說問毛詩十月之交朔日辛卯日有食之亦孔之醜曰日月次周行舍有常分至之候不為愆咎今同之辰而為深戾者專以金木相殘指日成釁推步不一容可如之若謫見正陽日維戊午生育相因猶子歸母但以陰陽得無深忌乎若為忌也朔亦應為災如不忌也辛卯豈獨成醜且舉凡之始以屬月時繫之在日有爽明例義不妄構理用何依問論語河不出圖泣麟自傷曰聖人禀靈天地資識未形齊生死於一同等榮辱於彼我孔子自生不辰從心告齒樂正既修素王斯著方興吾已之歎結反袂之悲進涉無上之心退深負杖之懼聖達之理無乃缺如符璽郎王神貴答之名為辯疑合成十卷亦有可觀前廢帝時奏上之帝親自執卷與神貴往復嘉其用心特除神貴子鴻彥為奉朝請景先子延祐武定末太子家令景遠字叔遐重然諾好施與頻歲凶儉分贍宗親又於通衢以食餓者存濟甚衆平原劉郁行經齊兗之境忽遇劫賊已殺十餘人次至郁郁呼曰與君鄉近何忍見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是景遠小字賊曰我食其粥得活何得殺其親遂還衣服蒙活者二十餘人景遠好史傳不為章句天性小急不類家風然事二兄至謹撫養兄孤恩訓甚篤益州刺史傅豎眼慕其名義啟為昭武, WYG: ''}
