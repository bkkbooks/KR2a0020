  - {type: variant, offset: 995, length: 5, content: 蠕蠕犯塞從, krp: 遇犬驚倒扶者大懼允慰免之不令聞徹興壽稱共允接事三年未嘗見其忿色恂恂善誘誨人不倦晝夜手常執書吟詠尋覧篤親念故虛已存納雖處貴重志同貧素性好音樂每至伶人弦歌皷舞常擊節稱善又雅信佛道時設齋講好生惡殺性又簡至不妄交遊}
