  - {type: variant, offset: 325, length: 3, content: 征平涼, krp: 召允謂曰國書皆崔浩作不允對曰太祖記前著作郎鄧淵所撰先帝記及今記臣與浩同作然浩綜務處多總裁而已至於注疏臣多於浩世祖大怒曰此甚於浩安}
  - {type: variant, offset: 329, length: 2, content: 功遷, WYG: 生路恭宗曰天威嚴重允是小臣迷辭失次耳臣向備問皆云浩作世祖問如東宫言不允曰臣以下才謬參著作犯逆天威罪應滅族今已分死不敢虚妄殿下以臣侍講日久哀臣乞命耳實不問臣臣無此言臣以實對不敢迷亂世祖謂恭宗曰直哉此亦人情所難而能臨死不移不亦難乎且對君以實貞臣也如此言寧失一有罪宜宥之允竟得免於是召浩前使人詰浩浩惶惑不能對允事事申明皆有條理時世祖怒甚勑允為詔自浩已下僮吏已上百二十八人皆夷五族允持疑不為頻詔催切允乞更一見然後為詔詔引前允曰浩之所坐若更有餘釁非臣敢知直以犯觸罪不至死世祖怒命介士執允恭宗拜請世祖曰無此人忿朕當有數千口死矣浩竟族滅餘皆身死宗欽臨刑歎曰髙允其殆聖乎恭宗後讓允曰人當知機不知機學復何益當爾之時吾導卿端緒何故不從人言怒帝如此每一念之使人心悸允曰臣東野凡生本無宦意屬休延之會應旌弓之舉釋褐鳳池仍參麟閣尸素官榮妨賢已久夫史籍者帝王之實錄將來之炯戒今之所以觀往後之所以知今是以言行舉動莫不備載故人君慎焉然浩世受殊遇榮曜當時孤負聖恩自貽灰滅即浩之跡時有可論浩以蓬蒿之才荷棟梁之重在朝無謇諤之節退私無委蛇之稱私欲沒其公廉愛憎蔽其直理此浩之責也至於書朝廷起居之跡言國家得失之事此亦為史之大體未為多違然臣與浩實同其事死生榮辱義無獨殊誠荷殿下大造之慈違心茍免非臣之意恭宗動容稱歎允後與人言我不奉東宫導㫖者恐負翟黑子恭宗季年頗親近左右營立田園以取其利允諫曰天地無私故能覆載王者無私故能包養昔之明王以至公宰物故藏金於山藏珠於淵示天下以無私訓天下以至儉故美聲盈溢千載不衰今殿下國之儲貳四海屬心言行舉動萬方所則而營立私田畜養雞犬乃至販酤市鄽與民爭利議聲流布不可追掩夫天下者殿下之天下富有四海何求而不獲何欲而弗從而與販夫販婦競此尺寸昔虢之將亡神乃下降賜之土田卒喪其國漢之靈帝不修人君之重好與宫人列肆販賣私立府藏以營小利卒有顛覆傾亂之禍前鑒若此甚可畏懼夫為人君者必審於擇人故稱知人則哲惟帝難之商書云無爾小人孔父有云小人近之則不遜逺之則怨矣武王愛周召齊畢所以王天下殷紂愛飛廉惡來所以喪其國歴觀古今存亡之際莫不由之今東宫誠曰乏人儁乂不少頃來侍御左右者恐非在朝之選故願殿下少察愚言斥出佞邪親近忠良所在田園分給貧下畜產販賣以時收}
