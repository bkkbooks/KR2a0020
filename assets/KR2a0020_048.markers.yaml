  - {type: variant, offset: 363, length: 1, content: 進, WYG: 禮敬甚重晨入暮出或積日居中朝臣莫知所論或有上事陳得失者髙宗省而謂羣臣曰君父一也父有是非子何為不作書於人中諫之使人知惡而於家内隱處也豈不以父親恐惡彰於外也今國家善惡不能面陳而上表顯諌此豈不彰君之短明已之美至如髙允者真忠臣矣朕有是非常正言面論至朕所不樂聞者皆侃侃言說無所避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曾不聞一正言但伺朕喜時求官乞職汝等把弓刀侍朕左右徒立勞耳皆至公王此人把筆匡我國家不過著作郎汝等不自愧乎於是拜允中書令著作如故司徒陸麗曰髙允雖蒙寵待而家貧布衣妻子不立髙宗怒曰何不先言今見朕用之方言其貧是日幸允第惟草屋數間布被縕袍㕑中鹽菜而已髙宗歎息曰古人之清貧豈有此乎即賜帛五百匹粟千斛拜長子忱為綏逺將軍長樂}
