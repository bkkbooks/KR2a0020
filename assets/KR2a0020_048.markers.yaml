  - {type: variant, offset: 7236, length: 593, content: 輔國長史值刺史死敕行州事政存寬簡百姓安之後值清河太守杜昶外叛郡居山險盜賊羣起除清河太守郡民劉簡虎曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣捕擒之即署其子為西曹掾命喻山賊賊以景伯不念舊惡一時俱下論者稱之舊守令六年為限限滿將代郡民韓靈和等三百餘人表訴乞留復加二載後遷太尉中郎司徒諮議參軍輔國將軍司空長史以母疾去官景伯性淳和涉獵經史諸弟宗之如事嚴親及弟妓亡蔬食終喪期不內御憂毀之容有如居重其次弟景先亡其幼弟景遠期年哭臨亦不內寢鄉里為之語曰有義有禮房家兄弟廷尉卿崔光韶好標牓人物無所推尚每云景伯有士大夫之行業及母亡景伯居喪不食鹽菜因此遂為水病積年不愈孝昌三年卒于家時年五十贈左將軍齊州刺史子文烈武定中尚書三公郎中景先字光冑幼孤貧無資從師其母自授毛詩曲禮年十二請其母曰豈可使兄傭賃以供景先也請自求衣然後就學母哀其小不許苦請從之遂得一羊裘忻然自足晝則樵蘇夜誦經史自是精勤遂大通贍太和中例得還鄉郡辟功曹州舉秀才值州將卒不得對策解褐太學博士時太常劉芳侍中崔光當世儒宗歎其精博光遂奏兼著作佐郎修國史尋除司徒祭酒員外郎侍中穆紹又啟景先撰世宗起居注累遷步兵校尉領尚書郎齊州中正所歷皆有當官之稱景先沉敏方正事兄恭謹出告反面晨昏參省側立移時兄亦危坐相敬如對賓客兄曾寢疾景先侍湯藥衣冠不解形容毀瘁親友見者莫不哀之神龜元年蕭衍龍驤將軍田申能據東義陽城內屬敕景先為行臺發二荊兵以援之在軍遇疾而還其年卒於家時年四十三贈持節, WYG: ''}
