  - {type: variant, offset: 1002, length: 0, content: '', WYG: 平青齊徙其族望於代時諸士人流移逺至率皆飢寒徙人之中多允姻媾皆徒歩造門允散財竭產以相贍賑慰問周至無不感其仁厚收其才能表奏申用時議者皆以新附致異允謂取材任能無宜抑屈先是允被召在方山作頌志氣猶不多損談說舊事了無所遺十一年正月卒年九十八初允每謂人曰吾在中書時有陰徳濟救民命若陽報不差吾壽應享百年矣先卒旬外微有不適猶不寢臥呼醫請藥出入行止吟詠如常髙祖文明太后聞而遣醫李脩往脉視之告以無恙脩入宻陳允榮衞有異懼其不久於是遣使備賜御膳珍羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被几杖羅列於庭王官往還慰問相屬允喜形於色語人曰天恩以我篤老大有所賚得以贍客矣表謝而已不有他慮如是數日夜中卒家人莫覺詔給絹一千匹布二千匹綿五百斤錦五十匹雜綵百匹穀千斛以周喪用魏初以來存亡蒙賚者莫及焉朝廷榮之將葬贈侍中司空公冀州刺史將軍公如故諡曰文賜命服一襲允所製詩賦誄頌箴論表讚左氏公羊釋毛詩拾遺論雜解議何鄭膏盲事凡百餘篇別有集行於世允明算法為算術三卷子忱襲忱字士和以父任除綏逺將軍長樂太守為政寛惠民庶安之後例降爵為侯尋卒孫貴賓襲除州治中卒官忱弟懷字士仁任城王雲郎中令大將軍從事中郎授中散怡淡退靜不競世利在散軰十八年不易官太和中除太尉東陽王諮議參軍而卒子綽字僧裕少孤恭敏自立身長八尺腰帶十圍沉雅有度量博渉經史太和十五年拜奉朝請太尉法曹行參軍尋兼尚書祠部郎以母憂去職久之除治書侍御史轉洛陽令綽為政強直不避豪貴邑人憚之又詔參議律令遷長兼國子博士行潁川郡事詔假節行涇州刺史延昌初遷尚書右丞參議壬子歴肅宗初司徒清河王懌司馬冠軍又隨懌遷太尉司馬其年秋大乘賊起於冀州都督元遙率衆}
