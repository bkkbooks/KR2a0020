  - {type: variant, offset: 5225, length: 285, content: 千秋少有才名亦內徙為平齊民太和初高祖擢為祕書郎遷司空諮議齊州大中正高祖臨朝令諸州中正各舉所知千秋與幽州中正陽尼各舉其子高祖曰昔有一祁名垂往史今有二奚當聞來牒出為濮陽太守世宗時復為司空諮議加立忠將軍卒贈南青州刺史諡曰懿長子祖淵羽林監從章武王融討葛榮沒於陳贈安東將軍濟州刺史祖淵弟祖皓長水校尉後討蕭衍將於九山戰歿贈撫軍將軍兗州刺史崔平仲自東陽南奔妻子於歷城入國太和中高祖聽其還南思安有勇力伯玉果敢有將略思安賜爵西安子建威將軍北平太守遷大司馬司馬齊州武昌王府司馬高祖南伐徵為步兵校尉直閤將軍中統軍善撫士衆高祖嘉之漢陽既平復為武昌王司馬帶東魏郡太守加寧朔將軍改爵清河子卒官子敬寶, WYG: 徳舒}
