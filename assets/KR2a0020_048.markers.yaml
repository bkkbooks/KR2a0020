  - {type: variant, offset: 325, length: 3, content: 征平涼, WYG: 召允謂曰國書皆崔浩作不允對曰太祖記前著作郎鄧淵所撰先帝記及今記臣與浩同作然浩綜務處多總裁而已至於注疏臣多於浩世祖大怒曰此甚於浩安}
