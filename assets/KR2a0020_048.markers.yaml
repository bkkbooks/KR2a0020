  - {type: variant, offset: 379, length: 0, content: '', WYG: 呼為文子崔公謂余云髙生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起於纖微及於詔責崔公聲嘶股戰不能言宗欽已下伏地流汗都無人色髙子敷陳事理申釋是非辭義清辯音韻髙亮明主為之動容聽者無不稱善仁及寮友保兹元吉向之所為矯矯者更}
