  - {type: variant, offset: 360, length: 0, content: '', WYG: 覽而善之曰髙允之明災異亦豈減崔浩乎及髙宗即位允頗有謀焉司徒陸麗等皆受重賞允既不蒙襃異又終身不言其忠而不伐皆此類也給事中郭善明性多機巧欲逞其能勸髙宗大起宫室允諫曰臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宫室已備永安前殿足以朝會萬國西堂溫室足以安御聖躬紫樓臨望可以觀望逺近若廣修壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其飢一婦不織或受其寒況數萬之衆其所損廢亦已多矣推之於古驗之於今必然之效也誠聖主所宜思量髙宗納之允以髙宗纂承平之業而風俗仍舊婚娶喪葬不依古式允乃諫曰前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謠鼓舞殺牲燒葬一切禁斷雖條㫖久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至於斯昔周文以百里之地修徳布政先於寡妻及於兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥效矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給伎以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆揀擇徳義之門妙選貞閑之女先之以媒聘繼之以禮物集寮友以重其別}
  - {type: page-break, offset: 360, content: '', id: KR2a0020_WYG_048-9b, image: WYG0261/WYG0261-0659d.png}
