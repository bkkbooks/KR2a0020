  - {type: variant, offset: 2568, length: 210, content: 曰汝語劉休賓何由遣文達頻造僕射許送降文歸誠大化何得無信違期不來於是門人唱告城內悉知遂相維持欲降不得皆云劉休賓父子欲以我城內人易榮位也尋被攻逼經冬至春歷城降白曜遣道固子景業與文曄至城下休賓知道固降乃出請命白曜送休賓及宿有名望者十餘人俱入代都為客及立平齊郡乃以梁鄒民為懷寧縣休賓為縣令延興二年卒文曄有志尚綜覽羣書輕財重義太和中坐從兄聞慰南叛與二弟文顥季友被徙北邊高祖特聽還代高祖曾幸方山文曄大言於路側曰求見聖明申宣久屈高祖遣, WYG: ''}
