  - {type: variant, offset: 1557, length: 914, content: 南將軍長安鎮副將轉陝州刺史將軍如故後降爵為侯二十年卒子景宣襲爵歷并州城陽王徽後軍府長史加中堅將軍遷東郡太守普泰中卒贈撫軍將軍秦州刺史景宣弟季弼武定中滄州別駕契子玄達性果毅有父風與叔父和歸闕俱為上客拜安西將軍晉昌公顯祖時出為華州刺史將軍如故杏城民蓋平定聚衆為逆顯祖遣給事楊鍾葵擊平定不克而還詔玄達討平之杏城民成赤李又聚黨自號為王逼掠郡縣殘害百姓玄達率騎二百邀其狹路擊破之叛民曹平原復聚為亂玄達追擊悉平之延興三年有罪免官太和十六年降爵為侯卒子崇字繼祖襲爵盛樂太守崇弟興業定陽闡熙二郡太守劉休賓字處幹本平原人祖昶從慕容德度河家于北海之都昌縣父奉伯劉裕時北海太守休賓少好學有文才兄弟六人乘民延和等皆有時譽休賓為劉彧虎賁中郎將稍遷幽州刺史鎮梁鄒及慕容白曜軍至升城遣人說之令降休賓不從劉彧龍驤將軍崔靈延行勃海郡房靈建等數十家皆入梁鄒同舉休賓為征虜兗州會劉彧遣使授休賓輔國將軍兗州刺史休賓妻崔邪利女也生一男字文曄崔氏先歸寧在魯郡邪利之降也文曄母子遂與俱入國至是白曜表請崔與文曄既至白曜以報休賓又於北海執延和妻子送至梁鄒巡視城下休賓答白曜許歷城降當即歸順密遣兼主簿尹文達向歷城觀國軍形勢文達詣白曜詐言聞王臨境故來祗候私謂白曜曰劉休賓父子兄弟累郡連州今若識運知機束手歸化不審明王加何賞白曜曰休賓仕南爵寵如此今若不勞兵甲望風自降者非直處卿富貴兼還其婦兒休賓縱令不畏攻圍豈不憐其妻子也今在升城卿自往見文達乃至升城見休賓妻子文曄攀援文達哭泣號咷以爪髮為信文達回還復經白曜誓約而去白曜曰卿是休賓耳目腹心親見其妻子又知我衆旅少多善共量議自求多褔文達還見休賓出其妻兒爪髮兼宣白曜所言及國軍形勢謂休賓曰升城已敗歷城非朝則夕公可早圖之休賓撫爪髮泣涕曰妻子幽隔誰不愍乎吾荷南朝厚恩受寄邊任今顧妻子而降於臣節足乎然而密與其兄子聞慰議為降計聞慰曰此故當文達誑詐耳年常抄掠豈有多軍也但可撫強兵勤肅衞方城狹嶮何為便生憂怯示人以弱也休賓又謂文達曰卿勿憚危苦更為吾作一返善觀形勢於是遣文達偷道而出令與白曜為期剋日許送降款文達既至白曜喜曰非直休賓父子荷榮城內賢豪亦隨人補授卿便即為梁鄒城主以酒灌地啟告山河曰若負休賓使我三軍覆沒初白曜之表取休賓妻子也顯祖以道固既叛詔授休賓持節平南, WYG: 逺}
