  - {type: variant, offset: 984, length: 2, content: 初襲, krp: 中書舍人河南常景追思允帥郡中故老為允立祠於野王之南樹碑紀徳焉太和二年又以老乞還鄉里十餘章上卒不聽許遂以疾告歸其年詔以安車徵允𠡠州郡發遣至都拜鎮將軍領中書監固辭不許又扶引就内改定皇誥允上酒訓曰臣被𠡠論集往世酒之敗徳以為酒訓臣以朽邁遭人倫所棄而殊恩故隆錄臣於將殁之年朂臣於已墜之地奉命驚惶喜懼兼甚不知何事可以上答伏惟陛下以叡哲之姿撫臨萬國太皇太后以聖徳之廣濟育羣生普天之下罔不稱頼然日昃憂勤虚求不已思監往事以為警戒此之至誠悟通百靈而況於百官士民不勝踴躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀採伏願聖慈體臣悾悾之情恕臣狂瞽之意其詞曰自古聖王其為饗也𤣥酒在堂而􅟍酒在下所以崇本重原降於滋味雖汎}
  - {type: punctuation, offset: 987, content: ，, id: KR2a0020_ZHSJ_048-bkkpn199}
  - {type: 'tls:seg', offset: 987, content: '', id: KR2a0020_ZHSJ_048-d48p9s7}
  - {type: variant, offset: 987, length: 0, content: '', WYG: 旅行不及於亂故能禮章而敬不虧事畢而儀不忒非由斯致是失其道將何以範時軌物垂之於世歴觀往代成敗之效吉凶由人不在數也商辛眈酒殷道以之亡公旦陳誥周徳以之昌子反昏酣而致斃穆生不飲而身光或長世而}
  - {type: page-break, offset: 987, content: '', id: KR2a0020_WYG_048-25b, image: WYG0261/WYG0261-0667d.png}
  - {type: variant, offset: 987, length: 0, content: '', krp: 旅行不及於亂故能禮章而敬不虧事畢而儀不忒非由斯致是失其道將何以範時軌物垂之於世歴觀往代成敗之效吉凶由人不在數也商辛眈酒殷道以之亡公旦陳誥周徳以之昌子反昏酣而致斃穆生不飲而身光或長世而}
  - {type: variant, offset: 988, length: 0, content: '', WYG: 戒或百代而流芳酒之為状變惑情性雖曰哲人孰能自競在官者殆於政也為下者慢於令也聰達之士荒於聼也柔順之倫興於諍也久而不悛致於病也豈止於病乃損其命諺亦有云其益如毫其損如刀言所益者止於一味之益不亦寡乎言所損者夭年亂志夭亂之損不亦夥乎無以酒荒而䧟其身無以酒狂而喪其倫迷邦失道流浪漂津不師不遵反將何因詩不言乎如切如磋如琢如磨朋友之義也作官以箴之申謨以禁之君臣之道也其言也善則三覆而被之言之不善則哀矜而貸之此實先王納規之意往者有晉士多失度肆散誕以為不羇縱長酣以為髙達調酒之頌以相眩曜稱堯舜有千鍾百觚之飲著非法之言引大聖為譬以則天之明豈其然乎且子思有云夫子之飲不能一升以此推之千鍾百觚皆為妄也今大魏應圖重明御世化之所暨無思不服仁風敦洽於四海太皇太后以至徳之隆誨而不倦憂勤備於皇情誥訓行於無外故能道協兩儀功同覆載仁恩下逮罔有不遵普天率土靡不蒙頼在朝之士有志之人宜克已從善履正存貞節酒以為度順徳以為經悟昏飲之美疾審敬慎之彌榮遵孝道以致養顯父母而揚名蹈閔曾之前軌遺仁風於後生仰以答所授俯以保其成可不勉歟可不勉歟髙祖悅之常置左右詔允乘車入殿朝賀不拜明年詔允議定律令雖年漸期頤而志識無損猶心存舊職披考史書又詔曰允年渉危境而家貧養薄可令樂部絲竹十人五日一詣允以娛其志特賜允蜀牛一頭四望蜀車一乘素几杖各一蜀刀一口又賜珍味每春秋常致之尋詔朝晡給膳朔望致牛酒衣服綿絹每月送給允皆分之親故是時貴臣之門皆羅列顯官而允子弟皆無官爵其廉退若此遷尚書}
