  - {type: variant, offset: 384, length: 2, content: 御膳, WYG: 修之業有所津寄卿儒宗元老朝望舊徳宜與中祕二省參議以聞允表曰臣聞經綸大業必以教養為先咸秩九疇亦由文徳成務故辟雍光於周詩泮宫顯於魯頌自永嘉以來舊章殄滅鄉閭蕪没雅頌之聲京邑杜絶釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思纂成洪烈萬國咸寧百揆時叙申祖宗之遺志興周禮之絶業爰發徳音惟新文教搢紳黎獻莫不幸甚臣承㫖勑並集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔𤣥同古義宜如聖㫖崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博關經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡髙門次及中第顯祖}
