  - {type: variant, offset: 644, length: 0, content: '', WYG: 頌詞曰紫氣干霄羣雄亂夏王龔徂征戎車屢駕掃盪遊氛克剪妖霸四海從風八垠漸化政教無外既寧且一偃武櫜兵唯文是恤帝乃旁求搜賢舉逸巖隠投竿異人並出亹亹盧生量逺思純鑽道據徳遊藝依仁旌弓既招釋褐投巾攝齊升堂嘉謀日陳自東徂南躍馬馳輪僭憑影附劉以和親茂祖焭單夙罹不造克己勉躬聿隆家道敦心六經遊思文藻終辭寵命以之自保燕常篤信百行靡遺位不茍進任理栖遲居沖守約好讓善推思賢樂古如渴如飢子翼致遠道賜悟深相期以義相和若琴並參幕府俱發徳音優游卒歲聊以寄心祖根運會克光厥猷仰緣朝恩俯因徳友功雖後建祿實先受班同舊臣位並羣后士衡孤立内省靡疚言不崇華交不遺舊以産則貧論道則富所謂伊人實邦之秀卓矣友規禀兹淑量存彼大方擯此細讓神與理宜形隨流浪雖屈王侯莫廢其尚趙實名區世多竒士山岳所鍾挺生三李矯矯清風抑抑容止初九而潛望雲而起詵尹西都靈惟作傅垂訓皇宫載理雲霧熙雖中夭迹階郎署餘塵可挹終亦顯著仲業淵長雅性清到憲章古式綢繆典誥時值險艱常一其操納衆以仁訓下以孝化被龍川民歸其教邁則英賢侃亦稱選聞達邦家名行素顯志在兼濟豈伊獨善繩匠弗顧功不獲展劉許履忠竭力致躬出能騁說入獻其功輶軒一舉撓燕下崇名彰魏世享業亦隆道茂夙成弱冠播名與朋以信行物以誠怡怡昆弟穆穆家庭發響九臯翰飛紫㝠頻在省闥亦司于京刑以之中政以之平猗歟彦鑒思參文雅率性任真器成}
