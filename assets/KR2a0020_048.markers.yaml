  - {type: variant, offset: 378, length: 0, content: '', WYG: 初允與游雅及太原張偉同業相友雅嘗論允曰夫喜怒者有生所不能無也而前史載卓公寛中文饒洪量褊心者或之弗信余與髙子遊處四十年矣未嘗見其是非慍喜之色不亦信哉髙子内文明而外柔弱其言呐呐不能出口余}
