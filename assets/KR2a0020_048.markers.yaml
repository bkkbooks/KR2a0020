  - {type: variant, offset: 368, length: 1, content: 賜, WYG: 竇瑾坐事誅瑾子遵亡在山澤遵母焦沒入縣官後焦以老得免瑾之親故莫有恤者允愍焦年老保護在家積六年遵始蒙赦其篤行如此轉太常卿本官如故允上代都賦因以規諷亦二京之流也文多不載時中書博士索敞與侍郎傅黙梁祚論名字貴賤著議紛紜允遂著名字論以釋其惑甚有典證復以本官領祕書監解太常卿進}
