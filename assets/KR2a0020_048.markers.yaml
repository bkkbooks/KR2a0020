  - {type: variant, offset: 984, length: 2, content: 初襲, WYG: 中書舍人河南常景追思允帥郡中故老為允立祠於野王之南樹碑紀徳焉太和二年又以老乞還鄉里十餘章上卒不聽許遂以疾告歸其年詔以安車徵允𠡠州郡發遣至都拜鎮將軍領中書監固辭不許又扶引就内改定皇誥允上酒訓曰臣被𠡠論集往世酒之敗徳以為酒訓臣以朽邁遭人倫所棄而殊恩故隆錄臣於將殁之年朂臣於已墜之地奉命驚惶喜懼兼甚不知何事可以上答伏惟陛下以叡哲之姿撫臨萬國太皇太后以聖徳之廣濟育羣生普天之下罔不稱頼然日昃憂勤虚求不已思監往事以為警戒此之至誠悟通百靈而況於百官士民不勝踴躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀採伏願聖慈體臣悾悾之情恕臣狂瞽之意其詞曰自古聖王其為饗也𤣥酒在堂而􅟍酒在下所以崇本重原降於滋味雖汎}
