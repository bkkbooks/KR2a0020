  - {type: variant, offset: 992, length: 1, content: 皇, WYG: 時延入備几杖問以政治十年加光祿大夫金章紫綬朝之大議皆咨訪焉魏初法嚴朝士多見杖罰允歴事五帝出入三省五十餘年初無譴咎初真君中以獄訟留滯始令中書以經義斷諸疑事允據律評刑三十餘載内外稱平允以獄者民之命也常歎曰臯陶至徳也其後英蓼先亡劉項之際英布黥而王經世雖久猶有刑之餘釁況凡人能無咎乎其年四月有事西郊詔以御馬車迎允就郊所板殿觀矚馬忽驚奔車覆傷眉三處髙祖文明太后遣醫藥䕶治存問相望司駕將處重坐允啓陳無恙乞免其罪先是命中黄門蘇}
