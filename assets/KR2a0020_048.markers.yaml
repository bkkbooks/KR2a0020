  - {type: variant, offset: 5511, length: 1131, content: 爵敬寶亦壯健奉朝請征北中兵參軍北征統軍寧遠將軍每有戰功早卒子去病襲伯玉坐弟叔玉南奔徙於北邊後亦南叛為蕭鸞南陽太守高祖南伐克宛外城命舍人公孫延景宣詔於伯玉曰天無二日土無兩王是以躬總六師蕩一四海宛城小戍豈足以禦抗王威深可三思封侯胙土事在俯仰伯玉對曰外臣荷國厚恩奉任疆境為臣之道未敢聽命伏惟遊鑾遠涉願不損神高祖又遣謂曰朕親率麾斾遠清江沔此之小戍豈足徘徊王師但戎輅所經纖介須殄宜量力三思自求多褔且卿早蒙蕭賾殊常之眷曾不懷恩報以塵露蕭鸞妄言入繼道成賾子無孑遺卿不能建忠於前君方立節於逆豎卿之罪一又頃年傷我偏師卿之罪二今鑾斾親戎清一南服不先面縛待罪麾下卿之罪三卿之此戍多則一年中則百日少則三旬克殄豈遠宜善思之後悔無及伯玉對曰昔蒙武帝愷悌之恩忝侍左右此之厚遇無忘夙夜但繼主失德民望有歸主上龍飛踐極光紹大宗非直副億兆之深望實兼武皇之遺敕是以懃懃懇懇不敢失墜往者北師深入寇擾邊民輒厲將士以救蒼生此乃邊戍常事陛下不得垂責及克宛伯玉面縛而降高祖引見伯玉并其參佐二百人詔伯玉曰朕承天馭宇方欲清一寰域卿蕞爾小戍敢拒六師卿之愆罪理在不赦伯玉對曰臣既小人備荷驅使緣百口在南致拒皇略罪合萬死高祖曰凡立忠抱節皆應有所至若奉逆君守迷節古人所不為卿何得事逆賊蕭鸞自貽伊譴伯玉對曰臣愚癡晚悟罪合萬斬今遭陛下願乞生命高祖曰凡人惟有兩途知機獲褔背機受禍勞我王師彌歷歲月如此為降何人有罪且朕前遣舍人公孫延景城西共卿語云天無二日土無二王卿答云在此不在彼天道攸遠變化無方卿寧知今日在此不在彼乎伯玉乞命而已更無所言高祖以思安頻為伯玉泣請故特宥之伯玉在南之日放妾楊氏為尼入國遂令還俗復愛幸焉為有司所奏高祖聽之世宗即位拜長史兼游擊將軍出為馮翊相卒官崇吉少驍勇為沈文秀中兵參軍及太原戍守傅靈越率衆棄郡南赴子勛文秀以崇吉督郡事既而背文秀同於劉彧母叔在歷城為崔道固所拘繫又將致刑於市以恐之而崇吉卒無所顧會道固歸彧乃出其母彧以崇吉為龍驤將軍并州刺史領太原太守戍升城崇吉以其從兄靈獻為長史姨兄賈延年為司馬未幾而白曜軍至白曜遣人招之崇吉不降遂閉門固守升城至小人力不多勝仗者不過七百人而白曜侮之乃遣衆陵城崇吉設土蕇方梁下相舂擊不時克殄白曜遂築長城圍三重更造攻具日夜攻擊自二月至四月糧矢俱盡崇吉突圍出走遁藏民舍母妻見獲道固遣治中房靈賓慰引之崇吉不肯見道固遂東歸舊村陰募壯士欲以偷母還奔河南白曜慮其如此守備嚴固後與法壽取盤陽俱降及立平齊郡以歷城民為歸安縣崇吉為縣令頗懷昔憾與道固接事意甚不平後委縣出臺訟道固罪狀數條會赦不問崇吉乞解縣許之停京師半歲乃南奔崇吉夫婦異路剃髮為沙門改名僧達投其族叔法延住歲餘清河張略之亦豪俠士也崇吉遺其金帛得以自遣妻從幽州南出亦得相會崇吉至江東尋病死崇吉從父弟三益字敬安於南陽內附高祖與語善之曰三益了了殊不惡拜, WYG: 釋褐}
