  - {type: variant, offset: 7385, length: 0, content: '', WYG: 次晉夀世宗晏駕班師後以客例除員外散騎侍郎加襄威將軍苗有文武才幹以大功不就家恥未雪常懷慷慨乃上書曰昔晉室數否華戎鼎沸三燕兩秦咆勃中夏九服分崩五方圯裂皇祚承歴自北而南誅滅姦雄定鼎河洛唯獨荆揚尚阻聲教今令徳廣被於江漢威風逺振於吴楚國富兵彊家給人足以九居八之形有兼弱攻昧之勢而欲逸豫遺疾子孫違髙祖之本圖非社稷之深慮誠宜商度東西戍防輕重之要計量壃場險易安危之理探測南人攻守窺覦之情籌算卒乘器械征討之備然後去我所短避彼所長釋其至難攻其甚易奪其險要割其膏壤數年之内荆揚可并若捨舟檝即平原斂後疎前則江淮之所短棄車馬游飛浪乘流馳逐非中國之所長彼不敢入平陸而爭衡猶我不能越巨川而趣利若俱去其短各恃其長則東南未見可滅之機而淮沔方有相持之勢且夫滿昃相傾隂陽恒理盛衰遞襲五徳常運今以至彊攻至弱必見吞并之理如以至弱禦至彊焉有全濟之術故明王聖主皆欲及時立功為萬世之業去髙而就下百川以之常流取易而避難兵家以之恒勝今巴蜀孤懸去建鄴遼逺偏兵獨戍泝流十千牧守無良專行劫剝官由財進獄以貨成士民思化十室而九延頸北望日覬王師若命一偏將弔民伐罪風塵不接可傳檄而定守白帝之阨據上流之險循士治之迹蕩建鄴之逋然後偃武修文制禮作樂天下幸甚豈不盛哉於時肅宗幼沖無遠略之意竟不能納正光末二秦反叛侵及三輔時承平既久民不習戰苗以隴兵彊悍且羣聚無資乃上書曰臣聞食少兵精利於速戰糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城本無徳義其勢在於疾攻日有降納遲則人情離阻坐受崩潰夫飊至風起逆者求萬一之功髙壁深壘王師有全制之策但天下久泰人不曉兵奔利不相待逃難不相顧將無法令士非教習以憍將御惰卒不思長久之計務竒正之通必有莫敖輕敵之志恐無充國持重之規如令隴東不守汧軍敗散則二秦遂彊三輔危弱國之右臂於斯廢矣今且宜勒大将深溝髙壘堅守勿戰别命偏師精兵數千出麥積崖以襲其後則汧岐之下羣妖自散於是詔苗為統軍與别將淳于誕俱出梁益隸行臺魏子建子建以苗為郎中仍領軍深見知待孝昌中還朝鎮遠將軍歩兵校尉俄兼尚書右丞為西北道行臺與大都督宗正珍孫討汾絳蜀賊平之還除司徒司馬轉太府少卿加龍驤將軍於時蕭衍巴西民何難尉等豪姓相率請討巴蜀之間詔苗為通直散騎常侍冠軍將軍西南道慰勞大使未發會殺尒朱榮榮從弟世隆擁榮部曲屯據河橋還逼都邑孝荘親幸大夏門集羣臣博議百寮恇懼計無所出苗獨奮衣而起曰今小賊唐突如此朝廷有不測之危正是忠臣烈士效節之日臣雖不武竊所庶幾請以一旅之衆為陛下徑斷河梁城陽王徽中尉髙道穆贊成其計荘帝壮而許焉苗乃募人於馬渚上流以舟師夜下去橋數里便放火船河流既駛倐忽而至賊於南岸望見火下相䠞爭橋俄然橋絶沒水死者甚衆苗身率士卒百許人泊於小渚以待南援既而官軍不至賊乃渉水與苗死鬬衆寡不敵左右死盡苗浮河而殁時年四十六帝聞苗死哀傷久之曰苗若不死當應更立竒功贈使持節都督梁益巴東梁四州諸軍事車騎大将軍儀同三司梁州刺史河陽縣開國侯邑一千户賵帛五百疋粟五百石諡忠烈侯苗少有節操志尚功名每讀蜀書見魏延請出長安諸葛不許常歎息謂亮無竒計及覽周瑜𫝊未曽不咨嗟絶倒太保城陽王徽司徒臨淮王彧重之二王頗或不穆苗毎諌之及徽寵勢隆極猜忌彌甚苗謂人曰城陽蜂目先見豺聲今轉彰矣解鼓琴好文詠尺牘之敏當世罕及死之日朝野悲壮之及荘帝幽崩世隆入洛主者追苗贈封以白世隆世隆曰吾爾時羣議更一二日便欲大縱兵士焚燒都邑任其採掠賴苗京師獲全天下之善士也不宜追之子曇}
