  - {type: variant, offset: 943, length: 0, content: '', WYG: 靈珍斬其父子并送使者五首於京師江悅之等推道遷為持節冠軍将軍梁秦二州刺史道遷表曰臣聞知機其神趨利如響臣雖不武敢忘機利伏惟陛下澤被區宇徳濟蒼生八表同忻品物咸頼臣頃亡蟻賊匹馬歸闕自斯搏噬罄竭丹欵但中於夀陽横為韋纘所謗理之曲直並是楊集朗王秉所悉臣實愚短豈能自安便逃竄江呉茍存視息蕭衍梁州刺史荘邱黒與臣早舊申臣為長史值黒亡殁専任天時素願機㑹在兹遇武興私署侍郎鄭洛生來此臣即披露誠欵與其共契機要報武興王楊紹先并其中叔集起等請其遣軍以為腹背卽遣左天長由寒山路馳啓復㑹通直散騎常侍臣集朗還至武興臣聞其至知事必剋集朗果遣鄭右留使至臣閒宻參機舉㑹有蕭衍使人吴公之至知臣懐誠將歸大化遂與府司馬嚴思臧恭典籖吴宗肅王勝等共楊靈珍父子宻相構結期當取臣臣幸先覺悉得戮思恭等臣即遣鄭猥馳告集朗急求軍援而武興軍未到之間蕭衍白馬戍主尹天寶不識天命固執愚迷乃率部曲驅掠民丁敢為不逞臣即遣軍主江悦之率諸軍主席靈坦龎樹等領義勇應時}
