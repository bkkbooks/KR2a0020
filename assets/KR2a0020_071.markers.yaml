  - {type: variant, offset: 3349, length: 195, content: 和歲稔當敕有司別議經始除中書監驃騎大將軍儀同如故又授右光祿大夫出為使持節侍中都督定幽燕瀛四州諸軍事本將軍定州刺史儀同如故徵拜尚書左僕射加散騎常侍驃騎儀同如故遷尚書令加侍中崇在官和厚明於決斷受納辭訟必理在可推始為下筆不徒爾收領也然性好財貨販肆聚斂家資巨萬營求不息子世哲為相州刺史亦無清白狀鄴洛市收擅其利為時論所鄙蠕蠕主阿那瓌率衆犯塞詔崇以本官都督北討諸軍事以討之崇辭於顯陽殿戎服武飾志氣奮揚時, WYG: 病卒}
