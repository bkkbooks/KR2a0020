  - {type: variant, offset: 932, length: 1, content: 共, WYG: 假署寇亂三齊粲唯髙談虚論不事防禦之術翔乘其無備掩襲州城左右白言賊至粲云豈有此理左右又言已入州門粲乃徐云耿王可引上廳事自餘部衆且付城外其不逹時變如此尋}
