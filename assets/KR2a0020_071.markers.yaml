  - {type: variant, offset: 7564, length: 283, content: 和為廣陵王國常侍尋敕光韶兼祕書郎掌校華林御書肅宗初除青州治中後為司空騎兵參軍又兼司徒戶曹出為濟州輔國府司馬刺史高植甚知之政事多委訪焉遷青州平東府長史府解敕知州事光韶清直明斷民吏畏愛之入為司空從事中郎以母老解官歸養賦詩展意朝士屬和者數十人久之徵為司徒諮議固辭不拜光韶性嚴毅聲韻抗烈與人平談常若震厲至於兄弟議論外聞謂為忿怒然孔懷雍睦人少逮之孝莊初河間邢杲率河北流民十餘萬衆攻逼州郡刺史元儁憂不自安州人乞光韶為長史以鎮之時陽平路回寓居齊土與杲潛相影響引賊入郭光韶臨機處分在難確然賊退之後刺史表光韶忠毅朝廷嘉之發使慰勞焉尋為東道軍司及元顥入洛自河以南莫不風靡而刺史廣陵王欣集, WYG: ''}
