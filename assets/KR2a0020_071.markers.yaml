  - {type: variant, offset: 124, length: 561, content: 然易帖但須一宣詔旨而已不勞發兵自防使懷懼也高祖從之乃輕將數十騎馳到上洛宣詔綏慰當即帖然尋勒邊戍掠得蕭賾人者悉令還之南人感德仍送荊州之口二百許人兩境交和無復烽燧之警在治四年甚有稱績召還京師賞賜隆厚以本將軍除兗州刺史兗土舊多劫盜崇乃村置一樓樓懸一鼓盜發之處雙槌亂擊四面諸村始聞者撾鼓一通次復聞者以二為節次後聞者以三為節各擊數千槌諸村聞鼓皆守要路是以盜發俄頃之間聲布百里之內其中險要悉有伏人盜竊始發便爾擒送諸州置樓懸鼓自崇始也後例降為侯改授安東將軍東駕南征驃騎大將軍咸陽王禧都督左翼諸軍事詔崇以本官副焉徐州降人郭陸聚黨作逆人多應之搔擾南北崇遣高平人卜冀州詐稱犯罪逃亡歸陸陸納之以為謀主數月冀州斬陸送之賊徒潰散入為河南尹後車駕南討漢陽崇行梁州刺史氐楊靈珍遣弟婆羅與子雙領步騎萬餘襲破武興與蕭鸞相結詔崇為使持節都督隴右諸軍事率衆數萬討之崇槎山分進出其不意表𩹉以襲羣氐皆棄靈珍散歸靈珍衆減太半崇進據赤土靈珍又遣從弟建率五千人屯龍門躬率精勇一萬據鷲硤龍門之北數十里中伐樹塞路鷲硤之口積大木聚礌石臨崖下之以拒官軍崇乃命統軍慕容拒率衆五千從他路夜襲龍門破之崇乃自攻靈珍靈珍連戰敗走俘其妻子崇多設疑兵襲克武興蕭鸞梁州刺史陰廣宗遣參軍鄭猷王思考率衆援靈珍崇大破之并斬婆羅首殺千餘人俘獲猷等靈珍走奔漢中高祖在南陽覽表大悅曰使朕無西顧之憂者李崇之功, WYG: 立}
