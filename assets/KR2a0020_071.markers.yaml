  - {type: variant, offset: 921, length: 0, content: '', WYG: 廣汝陽二郡太守卒叔業長兄子彦先少有志尚叔業以夀春入國彦先景明二年逃遁歸魏朝廷嘉之除通直散騎常侍封雍邱縣開國子食邑三百户出為趙郡太守為政舉大綱而已正始中轉渤海相屬元愉作逆徴兵郡縣彦先不從為愉拘執踰獄得免仍為沙門濳行至洛愉平勑還郡延昌中卒時年六十一熙平中贈持節左将軍南青州刺史諡曰惠恭子約字元儉性頗剛鯁起家員外郎轉給事中永平中丹陽太守後襲爵兾州大乘賊起勑為别将行渤海郡事後州軍為賊所敗遂圍郡城城䧟見害年三十六神龜中贈平原太守出帝時復贈前將軍揚州刺史長子英起武定末洛州刺史英起弟威起卒於齊王開府中兵參軍年三十二贈鴻臚少卿彦先弟絢揚州治中時揚州霖雨水入州城刺史李崇居於城上繫船憑焉絢率城南民數千家汎舟南走避水髙原謂崇還北遂與别駕鄭祖起等送子十四人於蕭衍自號豫州刺史衍将馬仙琕遣軍赴之崇聞絢反未測虛實乃遣國侍郎韓萬興單舸召之絢聞崇在悵然驚恨報崇曰比因大水蹎䟺不免羣情所逼推為盟首今大計已爾勢不可追恐民非公民吏非公吏願早行無犯将士崇遣從弟寧朔将軍神丹陽太守謝靈寳勒水軍討絢絢率衆逆戰神等大破之斬其将帥十餘人絢衆奔營神乘勝剋柵衆皆潰散絢匹馬單逃為村民所獲至尉升湖絢曰吾為人吏反而見擒有何靣目得視公也投水而死并鄭祖起等皆斬之植字文遠叔業兄叔寶子也少而好學覽綜經史尤長釋典善談理義仕蕭寳卷以軍勲至長水校尉随叔業在夀春叔業卒寮佐同謀者多推司馬李元護監州一二日謀不决定唯席法友栁元逹楊令寳等數人慮元護非其鄉曲恐有異志共舉植監州祕叔業喪問教命處分皆出於植於是開門納國軍城庫管籥悉付康生詔以植為征虜将軍兗州刺史崇義縣開國侯食邑千户尋進號平東将軍入為大鴻臚卿後以長子昕南叛有司處之大辟詔曰植闔門歸欵子昕愚昧為人誘䧟雖刑書有常理宜矜恤可特恕其罪以表勲誠尋除揚州大中正出為安東将軍瀛州刺史罷州復除大鴻臚卿遷度支尚書加金紫光禄大夫植性非柱石所為無恒兗州還也表請解官隐於嵩山世宗不許深以為怪然公私集論自言人門不後王肅怏怏朝廷處之不髙及為尚書志意頗滿欲以政事為己任謂人曰非我湏尚書尚書亦湏我辭氣激揚見於言色入參議論時對衆官面有譏毁又表毁征南将軍田益宗言華夷異類不應在百世衣冠之上率多侵侮皆此類也侍中于忠黄門元昭覽之切齒寝而不奏會韋伯昕告植欲謀廢黜尚書又奏羊祉告植姑子皇甫仲逹云受植㫖詐稱被詔率合部曲欲圖領軍于忠臣等窮治辭不伏引然衆證明昞案律在邊合率部衆不滿百人以下身猶尚斬况仲逹公然在京稱詔}
