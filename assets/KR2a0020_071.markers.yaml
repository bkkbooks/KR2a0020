  - {type: variant, offset: 698, length: 206, content: 本將軍梁州刺史高祖手詔曰今仇隴克清鎮捍以德文人威惠既宣實允遠寄故敕授梁州用寧邊服便可善思經略去其可除安其可育公私所患悉令芟夷及靈珍偷據白水崇擊破之靈珍遠遁世宗初徵為右衞將軍兼七兵尚書尋加撫軍將軍正尚書轉左衞將軍相州大中正魯陽蠻柳北喜魯北燕等聚衆反叛諸蠻悉應之圍逼湖陽游擊將軍李暉先鎮此城盡力捍禦賊勢甚盛詔以崇為使持節都督征蠻諸軍事以討之蠻衆數萬屯據形要以拒官軍崇累戰破之斬北燕等徙萬餘戶於幽并諸州世宗追賞平氐之功, WYG: 黄門侍郎}
