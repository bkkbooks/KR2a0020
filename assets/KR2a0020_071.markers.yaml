  - {type: variant, offset: 7382, length: 0, content: '', WYG: 姦劫息止治為雍州諸郡之最徴拜驍騎将軍輔國将軍進號征虜将軍肅宗初拜平原太守在郡六年政理如在咸陽遷後将軍安州刺史文遙善於綏納甚得物情時杜洛周葛榮等相繼叛逆自幽燕以南悉皆淪䧟唯文遙介在羣賊之外孤城獨守鳩集荒餘且耕且戰百姓皆樂為用建義元年七月遘疾卒於州年五十五長史許思祖等以文遥遺愛在民復推其}
  - {type: variant, offset: 7382, length: 0, content: '', krp: 姦劫息止治為雍州諸郡之最徴拜驍騎将軍輔國将軍進號征虜将軍肅宗初拜平原太守在郡六年政理如在咸陽遷後将軍安州刺史文遙善於綏納甚得物情時杜洛周葛榮等相繼叛逆自幽燕以南悉皆淪䧟唯文遙介在羣賊之外孤城獨守鳩集荒餘且耕且戰百姓皆樂為用建義元年七月遘疾卒於州年五十五長史許思祖等以文遥遺愛在民復推其}
  - {type: variant, offset: 7383, length: 0, content: '', WYG: 果行州事既攝州任乃遺使奉表荘帝嘉之除果通直散騎侍郎假節龍驤将軍行安州事當州都督既而賊勢轉盛臺援不接果以阻隔彊寇内徙無由乃攜諸弟并率城民東奔髙麗太平中詔髙麗送果等元象中乃得還朝果弟昴武定三年襲爵齊受禪例降文遠善騎射勇於攻戰以軍勲致效自給事中稍遷中散大夫龍驤將軍龎樹南安人世宗追錄謀勲封其子景亮襄邑縣開國男食邑二百户李忻榮漢中人與樹俱擊天寳同時戰殁封其子建為清水縣開國子食邑二百户張元亮漢中人便弓馬善戰鬭以勲封撫夷縣開國子食邑二百户拜東萊太守入為平遠将軍左中郎將遷中散大夫加龍驤将軍卒贈左将軍巴州刺史士孫天與扶風人以勲封莫西縣開國男食邑二百户拜武功太守又襄陽羅道珍北海王安世潁川辛諶漢中姜永等皆參其勲末道珍除齊州東平原相有治稱卒於鎮遠將軍屯騎校尉安世苻堅丞相王猛之𤣥孫也歴涉書𫝊敏於人間自羽林監稍遷安西将軍北華州刺史卒贈本將軍梁州刺史諶魏衛尉辛毗之後有文學歴步兵校尉濮陽上黨二郡太守卒贈征虜將軍梁州刺史子儒之濟州司馬永善彈琴有文學員外郎梁州别駕漢中太守永弟漾亦善士性亦至孝為漢中所歎服元羅之陷也永入於建鄴遂死焉時有潁川庾導者亦與道遷俱入國雖不參謀亦為竒士歴覽史𫝊善草隸書輕財重義仕蕭衍右中郎将助戍漢中及至洛陽環堵敝廬多與㑺秀交舊積二十餘歲殊無宦情正光中乃除幽州左將軍府主簿饒安令罷縣後仍客遊齊魯之間天平中卒於青州時有皇甫徽字子𤣥安定朝那人仕蕭衍歴諸王參軍郡守及道遷之入國也徽亦因地内屬徽妻即道遷之兄女道遷列上勲書欲以徽為元謀徽曰創謀之始本不闗預雖貪榮賞内愧於心遂拒而不許後刺史羊祉表授征虜府司馬卒官子和武定末司空司馬和弟亮儀曹郎中淳于誕字靈逺其先太山愽人後世居於蜀漢或家安國之桓陵縣父興宗蕭頤南安太守誕年十二隨父向揚州父於路為羣盗所害誕雖童稚而哀感奮發傾資結客旬朔之内遂得復讐由是州里歎異之賾益州刺史劉悛召為主簿蕭衍除歩兵校尉景明中自漢中歸國既達京師陳伐蜀之計世宗嘉納之延昌末王師大舉除驍騎將軍假冠軍將軍都督别部司馬領鄉導統軍誕不願先受榮爵乃固讓實官止參戎號及奉辭之日詔遣主書趙桃弓宣旨勞勉若剋成都即以益州許之師次晉夀蜀人大震屬世宗晏駕不果而還後以客例起家除羽林監蕭衍遣將張齊攻圍益州詔誕為統軍與刺史傅豎眼赴援事寜還朝正光中秦隴反叛詔誕為西南道軍司假冠軍將軍别將從子午南出斜谷趣建安與行臺魏子建共參經略時衍益州刺史蕭淵猷遣將樊文熾蕭世澄等率衆數萬圍小劒戍益州刺史邴虬令子建拒之因轉營為文熾所掩統軍胡小虎崔珍寶並見俘執子建遣誕助討之誕勒兵馳赴相對月餘未能摧殄文熾軍行之谷東峯名龍鬚山置柵其上以防歸路誕以賊衆難可角力乃宻募壮士二百餘人令夜登山攻其柵及時火赴煙熖漲天賊以還途不守連營震怖誕率諸軍鳴鼓攻擊文熾大敗俘斬萬計擒世澄等十一人文熾為元帥先走獲免孝昌初子建以誕行華陽郡帶白馬戍二年復以誕行巴州刺史三年朝議以梁州安康郡阻帶江山要害之所分置東梁州仍以誕為鎮遠将軍梁州刺史永安二年四月卒時年六十贈安西將軍益州刺史諡曰荘長子亢亢弟允字闕館武定末梁州驃騎府司馬李苗字子宣梓橦涪人父膺蕭衍尚書郎太僕卿苗出後叔父略略為蕭衍寧州刺史大著威名王足伐蜀也衍命略拒足於涪許其益州及足還退衍遂改授略怒将有異圖衍使人害之苗年十五有報雪之心延昌中遂歸闕仍陳圖蜀之計於是大將軍髙}
