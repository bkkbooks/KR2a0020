  - {type: variant, offset: 7378, length: 0, content: '', WYG: 元護為齊州經拜舊墓廵省故宅饗賜村老莫不欣暢及將亡謂左右曰吾嘗以方伯簿伍至青州士女屬目若喪過東陽不可不好設儀衛哭泣盡哀令觀者改容也家人遵其誡子會襲正始中降爵為子邑五百户延昌中除宣威将軍給事中會頑騃好酒其妻南陽太守清河房伯玉女也甚有姿色會不荅之房乃通於其弟機因會飲醉殺之子景宣襲天平中除給事中齊受禪例降機與房遂如夫婦積十餘年房氏色衰乃更婚娶元護弟静景明初以歸誠勲拜前将軍性甚貪忍兄亡未斂便剝脫諸妓服玩及餘財物歴齊州内史天水太守静子鉉羽林監元護從叔恤卒於東代郡太守子曠之席法友安定人也祖父南奔法友仕蕭鸞以膂力自効軍勲稍遷至安豐新蔡二郡太守建安戍主蕭寳卷遣胡景略代之法友遂留夀春與叔業同謀歸國景明初拜冠軍将軍豫州刺史苞信縣開國伯食邑千户始叔業卒後法友與裴植追成叔業志淮南剋定法友有力焉尋轉冠軍将軍華州刺史未拜改授并州刺史歲餘代還蕭衍遣将楊公則寇揚州假法友征虜将軍以討之法友未至而公則敗走後假法友前將軍持節為别将出淮南欲解朐山之圍法友始渡淮而朐山敗没遂停散十年恬静自處不競勢利世宗末以本将軍除濟州刺史在州廉和著稱又徙封乘氏肅宗初拜光祿大夫熙平二年卒贈平西将軍秦州刺史贈帛三百匹諡襄侯子景通襲善事元义兼以貨賂义父繼繼為司空引景通為掾後加右軍将軍鎮軍将軍卒官贈輔國将軍衞尉少卿子鶠襲永安末尚書郎走闗西王世弼京兆霸城人也劉裕滅姚泓其祖父從裕南遷世弼身長七尺八寸魁岸有壮氣善草隸書好愛墳典仕蕭鸞以軍勲至游擊将軍為軍主助戍夀春遂與叔業同謀歸誠景明初除冠軍将軍南徐州刺史擬戍鍾離懸封慎縣開國伯食邑七百户後以本将軍除東徐州刺史治任於刑為民所怨有受納之響歲餘為御史中尉李平所彈會赦免久之拜太中大夫加征虜将軍尋以本将軍出為河北太守治有清稱轉渤海相尋遷中山内史加平北将軍直閤元羅領軍义弟也曽行過中山謂世弼曰二州刺史飜復為郡亦當恨恨耳世弼曰儀同之號起自鄧騭平北為郡始在下官正光元年卒官贈本将軍豫州刺史}
