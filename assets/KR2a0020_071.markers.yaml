  - {type: variant, offset: 924, length: 1, content: 龍, krp: 後祚儁事雪加贈而植追復封爵而已植故吏渤海刁沖上疏訟之於是贈植征南将軍尚書僕射揚州刺史乃改葬植母夏侯道遷之姊也性甚剛峻於諸子皆如嚴君長成之後非衣幍不見小有罪過必束帶伏閣經五三日乃引見之督以嚴訓唯少子衍得以常服見之旦夕溫凊植在瀛州也其母年踰七十以身為婢自施三寶布衣麻菲手執箕菷於沙門寺洒掃植弟瑜粲衍並亦奴僕之服泣涕而從有感道俗諸子各以布帛數百贖免其母於是出家為比丘尼入嵩髙積歲乃還家植雖自州送祿奉母及贍諸弟而各别資財同居異爨一門數竈蓋亦染江南之俗也植母既老身又長嫡其臨州也妻子随去分違數歲論者譏焉子惔字道則襲爵植弟颺壮果有謀略常随叔業征伐以軍功為寳卷驍騎将軍叔業之歸誠也遣颺率軍於外外以討蠻楚為名内實備寳卷之衆景明初以颺為輔國将軍南司州刺史擬戍義陽封義安縣開國伯邑千户詔命未至為賊所殺贈冠軍将軍進爵縣侯餘如故世宗以颺勲効未立而卒其子烱不得襲封肅宗初烱行貨於執事乃封城平縣開國伯食邑八百户烱字休光小字黄頭頗有文學善事權門領軍元义納其金帛除鎮遠将軍散騎侍郎揚州大中正進伯為侯改封髙城縣増邑一千户尋兼尚書右丞出為東郡太守孝昌三年為城民所害贈散騎常侍鎮東将軍青州刺史開國如故諡曰簡子斌襲武定中廣州長流參軍齊受禪爵例降颺弟瑜字文琬初拜通直散騎常侍封下宻縣開國子食邑三百户尋試守滎陽郡坐虐暴殺人免官後徙封灌津子卒於渤海太守年四十五贈平南将軍豫州刺史諡曰定子堪字靈淵襲爵歴尚書郎興和中坐事死爵除瑜弟粲字文亮景明初賜爵舒縣子沉重善風儀頗以驕豪為失歴正平恒農二郡太守髙陽王雍曽以事屬粲粲不從雍甚為恨後因九日馬射勑畿内太守皆赴京師雍時為州牧粲往脩謁雍含怒待之粲神情閑邁舉止抑揚雍目之不覺解顔及坐定謂粲曰相愛舉動可更為一行粲便下席為行從容而出坐事免官後世宗聞粲善自􅋆置欲觀其風度忽令傳詔就家急召之湏臾之間使者相屬合家恇懼不測所以粲更恬然神色不變世宗歎異之時僕射髙肇以外戚之貴勢傾一時朝士見者咸望塵拜謁粲候肇惟長揖而已及還家人尤責之粲曰何可自同凡俗也又曽詣清河王懌下車始進便屬暴雨粲容歩舒雅不以霑濡改節懌乃令人持蓋覆之歎謂左右曰何代無竒人性好釋學親升講座雖持義未精而風韻可重但不渉經史終為知音所輕世宗末除前将軍太中大夫揚州大中正遷安南将軍中書令肅宗釋奠以為侍講轉金紫光祿大夫後兀顥入洛以粲為西兗州刺史尋為濮陽太守崔巨倫所逐棄州入嵩髙}
