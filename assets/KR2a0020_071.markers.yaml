  - {type: variant, offset: 942, length: 0, content: '', WYG: 謀獻欵元達贊成其計前後表啓皆元達之詞景明初除輔國将軍司徒諮議參軍封南頓縣開國子邑二百户二年秋卒時年四十三後改封夏陽縣邑户如先元達曽著大夫論備陳叔業背逆歸順契闊危難之旨又著喪服論約而易尋文多不錄子絺襲武定中東太原太守齊受禪爵例降絺弟遠字季雲性麤疎無拘檢時人或謂之栁瘨好彈琴耽酒時有文詠為肅宗挽郎出帝初除儀同開府參軍事放情琴酒之間每出返家人或問有何消息荅云無所聞縱聞亦不解元象二年客遊項城遇患卒時年四十元逹弟元瑜景明初除正員郎轉鎮南大將軍開府從事中郎帶汝隂太守延昌二年卒年五十五子諧頗有文學善鼓琴以新聲手勢京師士子翕然從學除著作佐郎建義初於河隂遇害時年二十六又武都人楊令寶有膂力善射仕蕭鸞數為小将征戰著效至譙郡太守遂參叔業歸誠之謀景明初除輔國将軍南兗州刺史擬戍淮隂封寗陵縣開國子食邑五百户在淮南征戰累著勞捷徴拜冠軍將軍試守京兆内史卒追封邵陵縣開國子邑二百户賜帛二百匹贈征虜将軍華州刺史子彪襲爵永熙中征虜将軍中散大夫齊受禪例降令寳弟令仁亦随令寳立效前将軍汝南内史又京兆杜陵人韋伯昕學尚有壮氣自以才智優於裴植常輕之植疾之如讐即彦先之妹婿也叔業以其有大志故遣送子芬之為質景明初封雲陵縣開國男食邑二百户拜南陽太守數歲坐事免久之拜員外散騎常侍加中壘將軍延昌末告尚書裴植謀為廢黜植坐死後百餘日伯昕亦病卒臨亡見植為祟口云裴尚書死不獨見由何以見怒也其叔業爪牙心膂所寄者裴智淵左中郎将封浚儀縣王昊左軍将軍封南汝隂縣趙革右中郎将封西宋縣並開國男食邑各二百户李道真右軍将軍封雎陽縣開國子食邑五百户胡文盛右軍将軍封剛陽縣魏承祖右軍将軍封平春縣並開國子食邑各三百户承祖廣陵寒人也依随叔業為趨走左右壮健善事人叔業待之甚厚及出為州以為防閤善撫士卒兼有将用自景明以後常為統軍南北征伐累有戰功歴太原太守至光祿大夫安南将軍蕭衍遣将圍義陽士民應之三闗既䧟州城時甚縣急以承祖持節行撫軍将軍率師討之大破賊衆解義陽之圍還復三闗遂為名将終於并州刺史衣冠之士預叔業勲者安定皇甫光北地梁祐清河崔髙客天水閻慶允河東栁僧習等光羙鬚髯善言笑仕蕭鸞以軍勲至右軍将軍入國為輔國将軍假南兗州刺史卒於渤海太守兄椿齡薛安都壻也随安都於彭城内附歴位司徒諮議岐州刺史光未入朝而椿齡先卒椿齡子璋鄉郡相璋弟瑒為司徒胡國珍所㧞自太尉記室超遷吏部郎性貪婪多所受納鬻賣吏官皆有定價後以丞相高陽王雍之壻超拜持節冠軍将軍豫州刺史為政殘暴百姓患之罷州後仍遇風病久之除安南将軍光祿大夫太昌初卒年五十八贈衛大将軍尚書左僕射雍州刺史子長卿司州主簿祕書郎中太尉司馬祐叔業之從姑子也好學便弓馬随叔業征伐身被五十餘創景明初拜右軍将軍賜爵山桑子出為北地太守清身率下甚有治稱歴驍騎将軍太中大夫右将軍從容風雅好為詩詠常與朝廷名賢汎舟洛水以詩酒自娱遷光祿大夫加平北将軍端然養志不歴權門出為平西将軍京兆内史當世歎其抑屈卒官贈本将軍涇州刺史髙客博學善文札羙風流景明初拜散騎侍郎出為揚州開府掾帶陳留太守卒官慶允父汪參薛安都平北将軍事安都入國聽汪還南慶允博識洽聞善於談論聽其言說不覺忘疲景明初為李元談輔國府司馬卒於敷城太守僧習善隸書敏於當世景明初為裴植征虜府司馬稍遷北地太守為政寛平氐羌悅愛肅宗時至太中大夫加前将軍出為潁川太守卒官夏侯道遷譙國人少有志操年十七父母為結婚韋氏道遷云欲懷四方之志不願取婦家人咸謂戲言及至婚日求覔不知所在於後訪問乃云逃入益州仕蕭鸞以軍勲稍遷至前軍将軍輔國将軍随裴叔業至夀春為南譙太守兩家雖為姻好而親情不恊遂單騎歸國拜驍騎将軍随王肅至夀春遣道遷守合肥肅薨道遷棄戍南叛㑹蕭衍以荘丘黑為征虜将軍梁秦二州刺史鎮南鄭黒請道遷為長史帶漢中郡㑹黒死衍以王鎮國為刺史未至而道遷隂圗歸順先是仇池鎮将楊靈珍阻兵反叛戰敗南奔衍以靈珍為征虜将軍假武都王助戍漢中有部曲六百餘人道遷憚之衍時又遣其左右吴公之等十餘人使南鄭道遷乃偽㑹使者請靈珍父子靈珍疑而不赴道遷乃殺使者五人馳}
