  - {type: variant, offset: 929, length: 1, content: 號, WYG: 夫復為中書令後正月晦帝出臨洛濵粲起於御前再拜曰今年還節羙聖駕出遊臣幸參陪從豫奉醼樂不勝忻戴敢上夀酒帝曰昔歲北海入朝暫竊神器具聞爾日卿戒之以酒今欲使我飲何異於徃情粲曰北海志在沉湎故諌其所失陛下齊聖溫克臣敢獻微誠帝曰實乃寡徳甚愧来譽仍為命酌出帝初出為驃騎大将軍膠州刺史屬時亢旱士民勸令禱於海神粲憚違衆心乃為祈請直據胡床舉杯而言曰僕白君左右云前後例皆拜謁粲曰五嶽視三公四瀆視諸侯安有方伯而致禮海神也卒不肯拜時青州叛賊耿翔受}
