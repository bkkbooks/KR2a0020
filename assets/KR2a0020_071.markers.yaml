  - {type: variant, offset: 8945, length: 217, content: 方董攝萬里而經略大事不與國士圖之所共腹心皆趨走羣小既不能綏遏以杜其萌又不能坐觀待其衰挫蹙迫小弟從為無名之行若單騎獨往或見拘縶若以衆臨之勢必相拒敵懸見無益也貴平逼之不得已光伯遂出城數里城民以光伯兄弟羣情所繫慮人劫留防衞者衆外人疑其欲戰未及曉諭為飛矢所中卒贈征東將軍青州刺史子滔武定末殷州別駕史臣曰李崇以風質英重毅然秀立任當將相望高朝野美矣崔亮既明達後事動有名迹於斷年之選失之逾遠救弊未聞終為國蠹無所苟而已其若是乎光韶居雅仗正有國士之風矣, WYG: 考證}
