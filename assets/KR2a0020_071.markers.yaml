  - {type: variant, offset: 2405, length: 240, content: 至舉用不戰解下又於樓船之北連覆大船東西竟水防賊火又於八公山之東南更起一城以備大水州人號曰魏昌城崇累表解州前後十餘上肅宗乃以元志代之尋除都督冀定瀛三州諸軍事驃騎大將軍冀州刺史儀同如故不行崇上表曰臣聞世室明堂顯於周夏二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黃髮以詢格言育青襟而敷典式用能享國久長風徽萬祀者也故孔子稱巍巍乎其有成功郁郁乎其有文章此其盛矣爰暨亡秦政失其道坑儒滅學以蔽黔首國無黌序之風野有非時之役故九服分崩祚終二世炎漢勃興更修儒術文景已降禮樂復彰化致昇, WYG: 熙}
