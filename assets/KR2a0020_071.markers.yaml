  - {type: variant, offset: 2646, length: 702, content: 治幾刑措故西京有六學之美東都有三本之盛莫不紛綸掩藹響流無已逮自魏晉撥亂相因兵革之中學校不絕遺文燦然方軌前代仰惟高祖孝文皇帝稟聖自天道鏡今古徙馭嵩河光宅函洛模唐虞以革軌儀規周漢以新品制列教序於鄉黨敦詩書於郡國使揖讓之禮橫被於崎嶇歌詠之音聲溢於仄陋但經始事殷戎軒屢駕未遑多就弓劍弗追世宗統曆聿遵先緒永平之中大興板築續以水旱戎馬生郊雖逮為山還停一簣竊惟皇遷中縣垂二十祀而明堂禮樂之本乃鬱荊棘之林膠序德義之基空盈牧竪之跡城隍嚴固之重闕塼石之工墉堞顯望之要少樓榭之飾加以風雨稍侵漸致虧墜又府寺初營頗亦壯美然一造至今更不修繕廳宇凋朽牆垣頹壞皆非所謂追隆堂構儀形萬國者也伏聞朝議以高祖大造區夏道侔姬文擬祀明堂式配上帝今若基宇不修仍同丘畎即使高皇神享闕於國陽宗事之典有聲無實此臣子所以匪寧億兆所以失望也臣又聞官方授能所以任事事既任矣酬之以祿如此上無曠官之譏下絕尸素之謗今國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗哉昔劉向有言王者宜興辟雍陳禮樂以風化天下夫禮樂所以養人刑法所以殺人而有司勤勤請定刑法至於禮樂則曰未敢是則敢於殺人不敢於養人也臣以為當今四海清平九服寧晏經國要重理應先營脫復稽延則劉向之言徵矣但事不兩興須有進退以臣愚量宜罷尚方雕靡之作頗省永寧土木之功并減瑤光材瓦之力兼分石窟鐫琢之勞及諸事役非急者三時農隙修此數條使辟雍之禮蔚爾而復興諷誦之音煥然而更作美榭高墉嚴壯於外槐宮棘宇顯麗於中道發明令重遵鄉飲敦進郡學精課經業如此則元凱可得之於上序游夏可致之於下國豈不休歟誠知佛理淵妙含識所宗然比之治要容可小緩苟使魏道熙緝元首唯康爾乃經營未為晚也靈太后令曰省表具悉體國之誠配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧, WYG: ''}
