  - {type: variant, offset: 8003, length: 637, content: 監祖瑩以贓罪被劾光韶必欲致之重法太尉陽城王徽尚書令臨淮王彧吏部尚書李神儁侍中李彧並勢望當時皆為瑩求寬光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎其執意不回如此永安末擾亂之際遂還鄉里光韶博學強辯尤好理論至於人倫名教得失之間搉而論之不以一毫假物家足於財而性儉吝衣馬弊瘦食味粗薄始光韶在都同里人王蔓於夜遇盜害其二子孝莊詔黃門高道穆令加檢捕一坊之內家別搜索至光韶宅綾絹錢布匱篋充積議者譏其矯嗇其家資產皆光伯所營光伯亡悉焚其契河間邢子才曾貸錢數萬後送還之光韶曰此亡弟相貸僕不知也竟不納刺史元弼前妻是光韶之繼室兄女而弼貪婪多諸不法光韶以親情亟相非責弼銜之時耿翔反於州界弼誣光韶子通與賊連結囚其合家考掠非理而光韶與之辯爭辭色不屈會樊子鵠為東道大使知其見枉理出之時人勸令詣樊陳謝光韶曰羊舌大夫已有成事何勞往也子鵠亦歎尚之後刺史侯淵代下疑懼停軍益都謀為不軌令數百騎夜入南郭劫光韶以兵脅之責以謀略光韶曰凡起兵者須有名義使君今日舉動直是作賊耳父老知復何計淵雖恨之敬而不敢害尋除征東將軍金紫光祿大夫不起光韶以世道屯邅朝廷屢變閉門却掃吉凶斷絕誡子孫曰吾自謂立身無慚古烈但以祿命有限無容希世取進在官以來不冒一級官雖不達經為九卿且吾平生素業足以遺汝官閥亦何足言也吾既運薄便經三娶而汝之兄弟各不同生合葬非古吾百年之後不須合也然贈諡之及出自君恩豈容子孫自求之也勿須求贈若違吾志如有神靈不享汝祀吾兄弟自幼及老衣服飲食未曾一片不同至於兒女官婚榮利之事未嘗不先以推弟弟頃橫禍權作松櫬亦可為吾作松棺使吾見之卒年, WYG: 卷}
