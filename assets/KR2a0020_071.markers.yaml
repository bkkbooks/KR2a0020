  - {type: variant, offset: 1093, length: 710, content: 事坐敦威重遙運聲算延昌初加侍中車騎將軍都督江西諸軍事刺史如故先是壽春縣人苟泰有子三歲遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言己子並有隣證郡縣不能斷崇曰此易知耳令二父與兒各在別處禁經數旬然後遣人告之曰君兒遇患向已暴死有教解禁可出奔哀也苟泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇察知之乃以兒還泰詰奉伯詐狀奉伯乃款引云先亡一子故妄認之又定州流人解慶賓兄弟坐事俱徙揚州弟思安背役亡歸慶賓懼後役追責規絕名貫乃認城外死尸詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫陽氏自云見鬼說思安被害之苦飢渴之意慶賓又誣疑同軍兵蘇顯甫李蓋等所殺經州訟之二人不勝楚毒各自款引獄將決竟崇疑而停之密遣二人非州內所識者為從外來詣慶賓告曰僕住在此州去此三百比有一人見過寄宿夜中共語疑其有異便即詰問迹其由緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賓今住揚州相國城內嫂姓徐君脫矜愍為往報告見申委曲家兄聞此必重相報所有資財當不愛惜今但見質若往不獲送官何晚是故相造指申此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賓悵然失色求其少停當備財物此人具以報崇攝慶賓問曰爾弟逃亡何故妄認他尸慶賓伏引更問蓋等乃云自誣數日之間思安亦為人縛送崇召女巫視之鞭笞一百崇斷獄精審皆此類也時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨羣飛入城與鵲爭巢五月大霖雨十有三日大水入城屋宇皆沒崇與兵泊於城上水增未已乃乘船附於女牆城不沒者二板而已州府勸崇棄壽春保北山崇曰吾受國重恩忝守藩岳德薄招災致此大水淮南萬里繫于吾身一旦動脚百姓瓦解揚州之地恐非國物昔王尊慷慨義感黃河吾豈愛一軀取愧千載但憐茲士庶無辜同死可桴筏隨高人規自脫吾必守死此城幸諸君勿言時州人裴絢等受蕭衍假豫, WYG: 瀛}
