  - {type: variant, offset: 3548, length: 511, content: 幹力如少肅宗目而壯之朝廷莫不稱善崇遂出塞三千餘里不及賊而還後北鎮破落汗拔陵反叛所在響應征北將軍臨淮王彧大敗於五原安北將軍李叔仁尋敗於白道賊衆日甚詔引丞相令僕尚書侍中黃門於顯陽殿詔曰朕比以鎮人搆逆登遣都督臨淮王克時除翦軍屆五原前鋒失利二將殞命兵士挫衂又武川乖防復陷凶手恐賊勢侵淫寇連朔金陵在彼夙夜憂惶諸人宜陳良策以副朕懷吏部尚書元脩義曰強寇充斥事須得討臣謂須得重貴鎮壓朔總彼師旅備衞金陵詔曰去歲阿那瓌叛逆遣李崇令北征崇遂長驅塞北返旆榆關此亦一時之盛崇乃上表求改鎮為州罷削舊貫朕于時以舊典難革不許其請尋李崇此表開諸鎮非異之心致有今日之事但既往難追為復略論此耳朕以李崇國戚望重器識英斷意欲還遣崇行總督三軍揚旌朔除彼羣盜諸人謂可爾以不僕射蕭寶夤等曰陛下以舊都在北憂慮金陵臣等實懷悚息李崇德位隆重社稷之臣陛下此遣實合羣望崇啟曰臣實無用猥蒙殊寵位妨賢路遂充北伐徒勞將士無勳而還慚負聖朝於今莫已臣以六鎮幽垂與賊接對鳴柝聲弦弗離旬朔州名差重於鎮謂實可悅彼心使聲教日揚微塵去塞豈敢導此凶源開生賊意臣之愆負死有餘責屬陛下慈寬賜全腰領今更遣臣北行正是報恩改過所不敢辭但臣年七十自惟老疾不堪敵場更願英賢收功盛日於是詔崇以本官加使持節開府北討大都督, WYG: 贈}
