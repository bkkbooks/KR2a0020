  - {type: variant, offset: 1931, length: 425, content: 養壯士數千人寇賊侵邊所向摧破號曰臥虎賊甚憚之蕭衍惡其久在淮南屢設反間無所不至世宗雅相委重衍無以措其姦謀衍乃授崇車騎大將軍開府儀同三司萬戶郡公諸子皆為縣侯欲以構崇崇表言其狀世宗屢賜璽書慰勉之賞賜珍異歲至五三親待無與為比衍每歎息服世宗之能任崇也肅宗踐祚褒賜衣馬及蕭衍遣其游擊將軍趙祖悅襲據西硤石更築外城逼徙緣淮之人於城內又遣二將昌義之王神念率水軍泝淮而上規取壽春田道龍寇邊城路長平寇五門胡興茂寇開霍揚州諸戍皆被寇逼崇分遣諸將與之相持密裝船艦二百餘艘教之水戰以待臺軍蕭衍霍州司馬田休等率衆寇建安崇遣統軍李神擊走之又命邊城戍主邵申賢要其走路破之於濡水俘斬三千餘人靈太后璽書勞勉許昌縣令兼紵麻戍主陳平玉南引衍軍以戍歸之崇自秋請援表至十餘詔遣鎮南將軍崔亮救硤石鎮東將軍蕭寶夤於衍堰上流決淮東注朝廷以諸將乖角不相順赴乃以尚書李平兼右僕射持節節度之崇遣李神乘鬬艦百餘艘沿淮與李平崔亮合攻硤石李神水軍克其東北外城祖悅力屈乃降語在平傳朝廷嘉之進號驃騎將軍儀同三司刺史都督, WYG: 侍}
