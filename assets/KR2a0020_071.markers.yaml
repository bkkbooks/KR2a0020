  - {type: variant, offset: 5480, length: 0, content: '', WYG: 贈帛五百匹諡曰明侯初道遷以㧞漢中歸誠本由王潁興之計求分邑户五百封之世宗不許靈太后臨朝道遷重求分封太后大竒其意議欲更以三百户封潁興會卒遂寢道遷不娉正室唯有庶子數人長子夬字元廷歴位前軍将軍鎮逺將軍南兗州大中正夬性好酒居䘮不戚醇醪肥鮮不離於口沽買飲噉多所費用父時田園貨賣略盡人間債負數猶千餘匹榖食至常不足弟妹不免飢寒初道遷知夬好酒不欲傳授國封夬未亡前忽夢見征虜将軍房世寳來至其家直上廰事與其父坐屏人宻言夬心驚懼謂人曰世寶至官間必撃我也尋有人至云官呼郎随召即去遣左右杖之二百不勝楚痛大呌良久乃寤流汗徹於寝具至明前涼}
