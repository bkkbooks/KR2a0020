  - {type: variant, offset: 940, length: 0, content: '', WYG: 大路斷絶都督崔暹率數萬之衆盤桓魯陽不能前討荆州危急朝廷憂之詔衍為别將假前将軍與恒農太守王羆率軍一萬出武關以救荆州賊逆戰於浙陽衍大破之賊遂退走荆州圍解除使持節散騎常侍平東将軍假安東将軍北道都督鎮鄴西之武城封安陽縣開國子食邑三百户時相州刺史安樂王鑒濳圖叛逆衍覺其有異宻表陳之尋而鑒所部别将嵇宗馳驛告變乃詔衍與都督源子邕李神軌等討鑒平之除撫軍将軍相州刺史假鎮北将軍北道大都督進封臨汝縣開國公増邑千二百户常侍如故仍詔衍與子邕北討葛榮軍次陽平之東北漳曲賊來拒戰衍軍敗見害朝野人情莫不駭惋贈使持節車騎大将軍司空相州刺史子嵩襲武定中河内太守齊受禪爵例降又天水冀人尹挺仕蕭鸞以軍勲至陳郡太守遂與叔業參謀歸誠景明初除輔國将軍南司州刺史擬戍義陽亦封宋縣開國伯食邑八百户轉冠軍将軍東郡太守未拜而卒賜布帛一百匹贈本将軍涇州刺史子循歴太原太守循弟彖饒安令遼西太守兄弟皆有政事才時河東南解人栁元達頗涉經史仕蕭鸞歴}
