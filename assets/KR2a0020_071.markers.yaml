  - {type: variant, offset: 914, length: 1, content: 戶, WYG: 户髙祖南廵車駕次鍾離鸞拜叔業持節冠軍將軍徐州刺史以水軍入淮去王師數十里髙祖令尚書郎中裴聿往與之語叔業盛飾左右服翫以夸聿曰我在南富貴正如此豈若卿彼之險陋也聿云伯父儀服誠為羙麗但恨不晝遊耳徙輔國将軍豫州刺史屯夀陽鸞死子寶卷自立遷叔業本将軍南兗州刺史會陳顯逹圍建鄴叔業遣司馬李元護率軍赴寶卷其實應顯逹也顯逹敗而還叔業慮内難未已不願為南兗以其去建業近受制於人寶卷嬖人茹法珍王咺之等疑其有異去來者並云叔業北入叔業兄子植颺粲等棄母奔夀陽法珍等以其既在疆場急則引魏力不能制且欲羈縻之白寳卷遣中書舎人裴長穆慰誘之許不復回換叔業雖云得停而憂懼不已遣親人馬文範以自安之計訪之於寳卷雍州刺史蕭衍曰天下之事大勢可知恐無復自立理雍州若能堅據襄陽輒當勠力自保若不爾回面向北不失作河南公衍遣文範報曰羣小用事豈能及遠多遣人相代力所不辦少遣人又於事不足意計回惑自無所成唯應送家還都以安慰之自然無患若意外相逼當勒馬歩二萬直至横江以斷其後則天下之事一舉可定也若欲北向彼必遣人相代以河北一地相處河南公寧復可得如此則南歸之望絶矣叔業沉疑未決遣信詣豫州刺史薛真度具訪入國可否之宜真度答書盛陳朝廷風化惟新之羙知卿非無欵心自不能早決捨南耳但恐臨迫而來便不獲多賞叔業遲遲數反真度亦遣使與相報復乃遣子芬之及兄女夫韋伯昕奉表内附景明元年正月世宗詔曰叔業明敏秀發英欵早悟馳表送誠忠髙振古宜加褒授以彰先覺可使持節散騎常侍都督豫雍兗徐司五州諸軍事征南将軍豫州刺史封蘭陵郡開國公食邑三千户又賜叔業璽書曰前後使返有勑想卿具一二寳卷昏狂日月滋甚虐遍宰輔暴加戚屬淫刑既逞朝無孑遺國有瓦解之形家無自安之計卿兼兹智勇深懼禍萌飜然髙舉去彼危亂朕興居在念深嘉乃勲前即勑豫州緣邊諸鎮兵馬行往赴援楊大眼奚康生鐵騎五千星言即路彭城王勰尚書令肅精卒十萬絡繹繼發将以長驅淮海電擊衡巫卿其并心勠力同斯大舉殊勲茂績職爾之由崇名厚秩非卿孰賞并有勑與州佐吏及彼土人士其有微功片效必加褒異軍未渡淮叔業病卒年六十三李元護席法友等推叔業兄子植監州事乃贈開府儀同三司餘如故諡忠武公給}
