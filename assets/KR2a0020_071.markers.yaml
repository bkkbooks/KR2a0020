  - {type: variant, offset: 923, length: 0, content: '', WYG: 諠惑都邑駭動人情量其本意不可測度按詐偽律詐稱制者死今依衆證處仲逹入死金紫光祿大夫尚書崇義縣開國侯裴植身居納言之任為禁司大臣仲逹又稱其姓名募集人衆雖名仲逹切讓無忿懼之心衆證雖不見植皆言仲逹為植所使召仲逹責問而不告列推論情状不同之理不可分明不得同之常獄有所降減計同仲逹處植死刑又植親率城衆附從王化依律上議唯恩裁處詔曰凶謀既爾罪不合恕雖有歸化之誠無容上議亦不湏待秋分也時于忠專擅朝權既構成其祻又矯為此詔朝野怨之臨終神志自若遺令子弟命盡之後剪落鬚髮被以法服以沙門禮葬于嵩髙之隂年五十初植與僕躬郭祚都水使者韋儁等同時見害}
