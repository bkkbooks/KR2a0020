  - {type: variant, offset: 7380, length: 0, content: '', WYG: 康長子會汝陽太守次子由字茂道好學有}
  - {type: variant, offset: 7380, length: 0, content: '', krp: 康長子會汝陽太守次子由字茂道好學有}
  - {type: variant, offset: 7381, length: 0, content: '', WYG: 才尤善草隸性方厚有名士之風义工摹畫為時人所服歴給事中尚書郎東萊太守罷郡後寓居潁川天平初元洪威搆逆大軍攻討為亂兵所害時年四十三名流悼惜之江悦之字彦和濟陽考城人也七世祖統晉散騎常侍劉淵石勒之亂南徙渡江祖興之父範之並為劉裕所誅悅之少孤仕劉駿歴諸王參軍好兵書有将略善待士有部曲數百人蕭道成初以悦之為荆州征西府中兵參軍領臺軍主遷屯騎校尉轉後軍将軍部曲稍衆千有餘人蕭頤遣戍漢中就遷輔國将軍蕭衍初劉季連據蜀反叛悅之率部曲及梁秦之衆討滅之以功進號冠軍将軍武興氐破白馬進圖南鄭悅之率軍拒戰大破氐衆還復白馬衍秦梁二州刺史荘邱黑死夏侯道遷與悅之及龎樹軍主李忻榮張元亮士孫天與等謀以梁州内附既殺蕭衍使者及楊靈珍衍華陽太守尹天寳率衆向州城悅之與樹忻榮勒衆逆戰為天寳所敗遂圍南鄭戰經四日衆心危沮咸懷離貳悅之盡以家財散賞士卒身當矢刃晝夜督戰㑹武興軍至天寳敗走道遷之克全勲欵悅之實有力焉正始二年夏與道遷俱至洛陽尋卒年六十一贈輔國將軍梁州刺史追封安平縣開國子食邑三百户諡曰荘悅之二子文遙文遠文遙少有大度輕財好士士多歸之道遷之圖楊靈珍也文遙奮劒請行遂手斬靈珍正始二年除步兵校尉遭父憂解官永平初襲封拜前軍出為咸陽太守勤於禮接終日坐聽事至者見之假以恩顔屏人宻問於是民所疾苦大盗姓名姦猾吏長無不知悉郡中震}
