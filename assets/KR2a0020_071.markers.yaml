  - {type: variant, offset: 4061, length: 1414, content: 將軍崔暹鎮軍將軍廣陵王淵皆受崇節度又詔崇子光祿大夫神軌假平北將軍隨崇北討崇至五原崔暹大敗于白道之北賊遂并力攻崇崇與廣陵王淵力戰累破賊衆相持至冬乃引還平城淵表崇長史祖瑩詐增功級盜沒軍資崇坐免官爵徵還以後事付淵後徐州刺史元法僧以彭城南叛時除安樂王鑒為徐州刺史以討法僧為法僧所敗單馬奔歸乃詔復崇官爵為徐州大都督節度諸軍事會崇疾篤乃以衞將軍安豐王延明代之改除開府相州刺史侍中將軍儀同並如故孝昌元年薨於位時年七十一贈侍中驃騎大將軍司徒公雍州刺史諡曰武康後重贈太尉公增邑一千戶餘如故長子世哲性輕率供奉豪侈少經征役頗有將用自司徒中兵參軍超為征虜將軍驍騎將軍尋遷後將軍為三關別將討羣蠻大破之斬蕭衍龍驤將軍文思之等還拜鴻臚少卿性傾巧善事人亦以貨賂自達高肇劉騰之處勢也皆與親善故世號為李錐肅宗末遷宗正卿加平南將軍轉大司農卿仍本將軍又改授太僕卿加鎮東將軍尋出為相州刺史將軍如故世哲至州斥逐細人遷徙佛寺逼買其地廣興第宅百姓患之崇北征之後徵兼太常卿御史高道穆毀發其宅表其罪過後除鎮西將軍涇州刺史賜爵衞國子正光五年七月卒賻帛五百匹朝服一襲贈散騎常侍衞將軍吏部尚書冀州刺史子如故世哲弟神軌受父爵陳留侯自給事中稍遷員外常侍光祿大夫累出征討頗有將領之氣孝昌中為靈太后寵遇勢傾朝野時云見幸帷幄與鄭儼為雙時人莫能明也頻遷征東將軍武衞將軍給事黃門侍郎常領中書舍人時相州刺史安樂王鑒據州反詔神軌與都督源子邕等討平之武泰初蠻帥李洪扇動諸落伊闕已東至於鞏縣多被燒劫詔神軌為都督破平之尒朱榮之向洛也復為大都督率衆禦之出至河橋值北中不守遂便退還尋與百官候駕於河陰仍遇害焉建義初贈侍中驃騎大將軍司空公相州刺史諡曰烈崔亮字敬儒清河東武城人也父元孫劉駿尚書郎劉彧之僭立也彧青州刺史沈文秀阻兵叛之彧使元孫討文秀為文秀所害亮母房氏攜亮依冀州刺史崔道固於歷城道固即亮之叔祖也及慕容白曜之平三齊內徙桑乾為平齊民時年十歲常依季父幼孫居家貧傭書自業時隴西李沖當朝任事亮從兄光往依之謂亮曰安能久事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書於市安能看人眉睫乎光言之於沖沖召亮與語因謂亮曰比見卿先人相命論使人胸中無復怵迫之念今遂亡本卿能記之不亮即為誦之涕淚交零聲韻不異沖甚奇之迎為館客沖謂其兄子彥曰大崔生寬和篤雅汝宜友之小崔生峭整清徹汝宜敬之二人終將大至沖薦之為中書博士轉議郎尋遷尚書二千石郎高祖在洛欲創革舊制選置百官謂羣臣曰與朕舉一吏部郎必使才望兼允者給卿三日假又一日高祖曰朕已得之不煩卿輩也馳驛徵亮兼吏部郎俄為太子中舍人遷中書侍郎兼尚書左丞亮雖歷顯任其妻不免親事舂簸高祖聞之嘉其清貧詔帶野王令世宗親政遷給事黃門侍郎仍兼吏部郎領青州大中正亮自參選事垂將十年廉慎明決為尚書郭祚所委每云非崔郎中選事不辦尋除散騎常侍仍為黃門遷度支尚書領御史中尉自遷都之後經略四方又營洛邑費用甚廣亮在度支別立條格歲省億計又議修汴蔡二渠以通邊運公私賴焉侍中廣平王懷以母弟之親左右不遵憲法敕亮推治世宗禁懷不通賓客者久之後因宴集懷恃親使忿欲陵突亮亮乃正色責之即起於世宗前脫冠請罪遂拜辭欲出世宗曰廣平粗疏向來又醉卿之所悉何乃如此也遂詔亮復坐令懷謝焉亮外雖方正內亦承候時情宣傳左右郭神安頗被世宗識遇以弟託亮亮引為御史及神安敗後因集禁中世宗令兼侍中盧昶宣旨責亮曰在法官何故受左右囑請亮拜謝而已無以上對轉都官尚書又轉七兵領廷尉卿加散騎常侍中正如故徐州刺史元昞撫御失和詔亮馳驛安撫亮至劾昞處以大辟勞賚綏慰百姓帖然除安西將, WYG: 将}
