  - {type: variant, offset: 944, length: 1, content: 不, WYG: 撲而樹鋭氣難裁違悦之節度輕進失脫天寳因此直到南鄭重圍州城梁秦士庶僉云危棘以義逼臣勸為刺史湏藉此威鎮靖内外臣赤誠奉國茍取濟事輒捐小跡且從權宜假當州位重遣皇甫選由斜谷道以事啓聞臣即親率士卒四日三夜交鋒苦戰武興之軍乘虚躡後天寳兇徒因宵鳥散進既摧破退失巢穴濳捨軍衆依山傍險突入白馬集朗與二弟躬擐甲胄率其所領登即擒斬戍内户口即放還民斯由皇威遐振罪人授首凶狡時殄公私慶快非但梁秦竭力實關集朗赴接之機臣前已遣軍主杜法先還洵陽構合徒黨誘結鄉落令晉夀土豪王僧承王文粲等還至西闗共興大義當今庸蜀虛弱楚鄧懸危開拓九區掃清六合形要之}
