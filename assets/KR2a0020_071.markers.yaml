  - {type: variant, offset: 5481, length: 4, content: 北渭水淺, WYG: 太守趙卓詣之見其衣濕謂夬曰卿昨夕當大飲溺衣如此夬乃具陳所夢先是旬餘祕書監鄭道昭暴病卒夬聞謂卓曰人生何常唯當縱飲耳於是昏酣遂甚夢後二日}
  - {type: variant, offset: 5481, length: 4, content: 北渭水淺, krp: 太守趙卓詣之見其衣濕謂夬曰卿昨夕當大飲溺衣如此夬乃具陳所夢先是旬餘祕書監鄭道昭暴病卒夬聞謂卓曰人生何常唯當縱飲耳於是昏酣遂甚夢後二日}
