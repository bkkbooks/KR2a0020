  - {type: variant, offset: 934, length: 2, content: 脣齒, WYG: 翔所害送首蕭衍時年六十五子含字文若員外散騎侍郎粲弟衍字文舒學識優於諸兄才行亦過之事親以孝聞兼有将略仕蕭寳卷至隂平太守景明二年始得歸國授通直郎衍欲辭朝命請隐嵩髙乃上表曰臣幸乘昌運得奉盛化沐藉炎風餐佩唐徳於生於運已溢已榮但攝性乖和恒苦虚弱比風露増加精形侵耗小人愚懷有願閑養伏見嵩岑極天苞育名草脩生救疾多遊此岫臣質無靈分性乖山水非敢追踪輕舉髣髴髙蹤誠希藥此沉疴全飬禀氣耳若所療微痊庶偶影風雲永歌至徳荷衣葛屨裁營已整摇策納屣便陟山途謹附陳聞乞垂昭許詔曰知欲養疴中岳練石嵩嶺栖素雲根餌芝清壑騰跡之操深用嘉焉但治缺古風有愧山客耳既志往難裁豈容有抑便從來請世宗之末衍稍以出山干祿執事肅宗除散騎侍郎行河内郡事尋除建興太守轉河内太守加征虜将軍遭母憂解任衍歴二郡廉貞寡欲善撫百姓民吏追思之孝昌初蕭衍}
