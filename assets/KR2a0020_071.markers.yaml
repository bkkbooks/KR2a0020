  - {type: variant, offset: 916, length: 1, content: 荊, WYG: 園温明祕器朝服一襲錢三十萬絹一千匹布五百匹蠟三百觔子蒨之字文聰仕蕭鸞為随郡王左常侍先卒子譚紹封譚麤險好殺所乘牛馬為小驚逸手自殺之然孝事諸叔盡於子道國祿歲入每以分贍世以此稱之世宗以譚及髙皇后弟貞王肅子紹俱為太子洗馬肅宗踐祚轉員外常侍遷輔國將軍中散大夫卒贈平南将軍豫}
  - {type: page-break, offset: 916, content: '', id: KR2a0020_WYG_071-4b, image: WYG0262/WYG0262-0067b.png}
  - {type: variant, offset: 916, length: 1, content: 荊, krp: 園温明祕器朝服一襲錢三十萬絹一千匹布五百匹蠟三百觔子蒨之字文聰仕蕭鸞為随郡王左常侍先卒子譚紹封譚麤險好殺所乘牛馬為小驚逸手自殺之然孝事諸叔盡於子道國祿歲入每以分贍世以此稱之世宗以譚及髙皇后弟貞王肅子紹俱為太子洗馬肅宗踐祚轉員外常侍遷輔國將軍中散大夫卒贈平南将軍豫}
  - {type: variant, offset: 918, length: 2, content: 蠻樊, WYG: 刺史諡曰敬子測字伯源襲厯通直散騎侍郎天平中走於關西蒨之弟芬之字文馥長者好施篤愛諸弟仕蕭鸞歴位羽林監入國以父勲授通直散騎常侍上蔡縣開國伯食邑七百户除廣平内史固辭不拜轉輔國将軍東秦州刺史在州有清静之稱入為征虜将軍太中大夫徙封山茌縣出為後将軍岐州刺史正光末元志西討隴賊軍敗退守岐州為賊所圍城䧟志與芬之並為賊擒送於上邽為莫折念生所害贈平東将軍青州刺史子渉字仲昇襲卒子僑尼襲武定中員外羽林監齊受禪爵例降芬之弟簡之英之並早卒英之弟藹之字幼重性輕率好琴書其内弟栁諧善鼓琴藹之師諧而微不及也歴通直散騎侍郎平東将軍}
