  - {type: variant, offset: 5693, length: 1402, content: 王蕭寶夤鎮東將軍章武王融安南將軍並使持節都督諸軍事以討之靈太后勞遣亮等賜戎服雜物亮至硤石祖悅出城逆戰大破之賊復於城外置二柵欲拒官軍亮焚擊破之殺三千餘人亮與李崇為水陸之期日日進攻而崇不至及李平至崇乃進軍共平硤石語在平傳靈太后賜亮璽書曰硤石既平大勢全舉淮堰孤危自將奔遁若仍敢遊魂此當易以立計擒翦蟻徒應在旦夕將軍推轂所憑親對其事處分經略宜共協齊必令得掃盪之理盡彼遺燼也隨便守禦及分渡掠截扼其咽喉防塞走路期之全獲無令漏逸若畏威降首者自加蠲宥以仁為本任之雅算一二往使別宣以功進號鎮北將軍李平部分諸軍將水陸兼進以討堰賊亮違平節度以疾請還隨表而發平表曰臣以蕭衍將湛僧珍田道龍遊魂境內猶未收跡義之神念尚住梁城令都督崔亮權據下蔡別將生即往東岸與亮接勢以防橋道臣發引向堰舍人曹道至奉敕更有處分而亮已輒還京按亮受付東南推轂是託誠應憂國忘家致命為限而始屆汝陰磐桓不進暨到寇所停淹八旬所營土山攻道並不克就損費糧力坐延歲序賴天威遠被士卒憤激東北騰上垂至北門而亮遲回仍不肯上臣逼以白刃甫乃登陟及平硤石宜聽處分方更肆其專恣輕輒還歸此而不糾法將焉寄按律臨軍征討而故留不赴者死又云軍還先歸者流軍罷先還尚有流坐況亮被符令停委棄而反失乘勝之機闕水陸之會緣情據理咎深故留今處亮死上議靈太后令曰亮為臣不忠去留自擅既損威稜違我經略雖有小捷豈免大咎但吾攝御萬幾庶茲惡殺可特聽以功補過及平至亮與爭功於禁中形於聲色尋除殿中尚書遷吏部尚書時羽林新害張彝之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢人百姓大為嗟怨亮乃奏為格制不問士之賢愚專以停解日月為斷雖復官須此人停日後者終於不得庸才下品年月久者灼然先用沉滯者皆稱其能亮外甥司空諮議劉景安書規亮曰殷周以鄉塾貢士兩漢由州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美足應十收六七而朝廷貢秀才止求其文不取其理察孝廉唯論章句不及治道立中正不考人才行業空辨氏姓高下至於取士之途不溥沙汰之理未精而舅屬當銓衡宜須改張易調如之何反為停年格以限之天下士子誰復修厲名行哉亮答書曰汝所言乃有深致吾乘時邀幸得為吏部尚書當其壯也尚不如人況今朽老而居帝難之任常思同昇舉直以報明主之恩盡忠竭力不為貽厥之累昨為此格有由而然今已為汝所怪千載之後誰知我哉可靜念吾言當為汝論之吾兼正六為吏部郎三為尚書銓衡所宜頗知之矣但古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃與天下羣賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七況今日之選專歸尚書以一人之鑒照察天下劉毅所云一吏部兩郎中而欲究竟人物何異以管闚天而求其博哉今勳人甚多又羽林入選武夫崛起不解書計唯可彍弩前驅指蹤捕噬而已忽令垂組乘軒求其烹鮮之效未曾操刀而使專割又武人至多官員至少不可周溥設令十人共一官猶無官可授況一人望一官何由可不怨哉吾近面執不宜使武人入選請賜其爵厚其祿既不見從是以權立此格限以停年耳昔子產鑄刑書以救弊叔向譏之以正法何異汝以古禮難權宜哉仲尼云德我者亦春秋罪我者亦春秋吾之此指其由是也但令當來君子知吾意焉後甄琛元脩義城陽王徽相繼為吏部尚書利其便己踵而行之自是賢愚同貫涇渭無別魏之失才從亮始也轉侍中太常卿尋遷左光祿大夫尚書右僕射時劉騰擅權亮託妻劉氏傾身事之故頻年之中名位隆赫有識者譏之轉尚書僕射加散騎常侍正光二年秋疽發於背肅宗遣舍人問疾亮上表乞解僕射送所負荷及印綬詔不許尋卒詔給東園祕器朝服一襲賵物七百段蠟三百斤贈使持節散騎常侍車騎大將軍儀同三司冀, WYG: ''}
