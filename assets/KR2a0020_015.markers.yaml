  - {type: variant, offset: 7119, length: 237, content: 方懸賞募賊又於禁中殺領左右鴻臚少卿谷會紹達並帝所親也母子之間嫌𨻶屢起鄭儼慮禍乃與太后計因潘充華生女太后詐以為男便大赦改年肅宗之崩事出倉卒時論咸言鄭儼徐紇之計於是朝野憤歎太后乃奉潘嬪女言太子即位經數日見人心已安始言潘嬪本實生女今宜更擇嗣君遂立臨洮王子釗為主年始三歲天下愕然及武泰元年尒朱榮稱兵渡河太后盡召肅宗六宮皆令入道太后亦自落髮榮遣騎拘送太后及幼主於河陰太后對榮多所陳說榮拂衣而起太后及幼主並沉於河太后妹馮翊君收瘞於雙靈佛寺出帝時始葬以后禮而追加諡孝明皇后胡氏靈太后從兄冀, WYG: 拜并}
