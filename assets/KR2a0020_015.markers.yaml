  - {type: variant, offset: 7576, length: 1, content: 始, krp: 靈公子受洛襲進爵武邑公卒子叱奴武川鎭將叱奴子洪超頗有學涉大乗賊亂之後詔洪超持節兼黃門侍郎綏慰冀部還上言冀土寛廣界去州六七百里負海險遠宜分置一州鎭遏海曲朝議從之後遂立滄州卒於北軍將光禄大夫意烈弟勃善射御以勲賜爵彭城公卒陪葬金陵長子粟襲世}
  - {type: variant, offset: 7578, length: 1, content: 生, WYG: 時督諸軍屯漠南蠕蠕闕表聞粟亮直善馭衆撫恤將士必與之同勞逸征和龍以功進封為王薨陪葬金陵粟弟渾少善弓馬世祖嘉之會有諸方使命渾射獸三頭發皆中之舉坐咸以為善及為宰官尚書頗以驕縱為失坐事免徙長社為人所害子庫汗為羽林中郎將從北廵有兔起乗輿前命庫汗射之應絃而斃世祖悅賜一金兔以旌其能髙宗起恭宗廟賜爵陽豐侯顯祖即位復造髙宗廟拜殿中給事進爵為公庫汗明於斷決每奉使察行州鎭折獄以情所歴皆稱之秦州父老詣闕乞庫汗為刺史者前後千餘人朝廷許之未及遣遇病卒子古辰襲昭成子窟咄昭成崩後苻洛以其年長逼徙長安苻堅禮之敎以書學因亂隨慕容永東遷永以為新興太守劉顯之敗遣弟亢埿等迎窟咄遂逼南界於是諸部騷動太祖左右于桓等謀應之同謀人單烏干以告太祖慮駭人心沉吟未發後三日桓以謀白其舅穆崇崇又告之太祖乃誅桓等五人餘莫題等七姓悉原不問太祖慮内難乃北踰陰山幸賀蘭部遣安同及長孫賀徴兵於慕容垂賀亡奔窟咄安同間行遂逹中山慕容垂遣子賀驎步騎六千以隨之安同與垂使人蘭紇俱還逹牛川窟咄兄子意烈捍之安同乃隠藏於商賈囊中至暮乃入空井得免仍奔賀驎軍既不至而稍前逼賀染干染干陰懐異端乃為窟咄來侵北部人皆驚駭莫有固志於是北部大人叔孫普洛節及諸烏丸亡奔衞辰賀驎聞之遽遣安同朱譚等來既知賀驎軍近衆乃少定太祖}
