  - {type: variant, offset: 5910, length: 417, content: 司徒國珍女也母皇甫氏產后之日赤光四照京兆山北縣有趙胡者善於卜相國珍問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也后姑為尼頗能講道世宗初入講禁中積數歲諷左右稱后姿行世宗聞之乃召入掖庭為承華世婦而椒掖之中以國舊制相與祈祝皆願生諸王公主不願生太子唯后每謂夫人等言天子豈可獨無兒子何緣畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后固意確然幽夜獨誓云但使所懷是男次第當長子子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻喪皇子自以春秋長矣深加慎護為擇乳保皆取良家宜子者養於別宮皇后及充華嬪皆莫得而撫視焉及肅宗踐阼尊后為皇太妃後尊為皇太后臨朝聽政猶稱殿下下令行事後改令稱詔羣臣上書曰陛下自稱曰朕太后以肅宗沖幼未堪親祭欲傍周禮夫人與君交獻之義代行祭禮訪尋故式門下召禮官博士議以為不可而太后欲以幃幔自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后薦祭故事太后大悅遂攝行初祀太后性聰悟多才藝姑既為尼幼相依託略得佛經大義親覽萬機手筆斷決幸西, WYG: 羽}
