  - {type: variant, offset: 2062, length: 1530, content: 昭葬於廣寧磨笄山俗謂之鳴雞山太后遺志也依惠太后故事別立寢廟置守陵二百家樹碑頌德文成文明皇后馮氏長樂信都人也父朗秦雍二州刺史西城郡公母樂浪王氏后生於長安有神光之異朗坐事誅后遂入宮世祖左昭儀后之姑也雅有母德撫養教訓年十四高宗踐極以選為貴人後立為皇后高宗崩故事國有大喪三日之後御服器物一以燒焚百官及中宮皆號泣而臨之后悲叫自投火中左右救之良久乃蘇顯祖即位尊為皇太后丞相乙渾謀逆顯祖年十二居于諒闇太后密定大策誅渾遂臨朝聽政及高祖生太后躬親撫養是後罷令不聽政事太后行不正內寵李弈顯祖因事誅之太后不得意顯祖暴崩時言太后為之也承明元年尊曰太皇太后復臨朝聽政太后性聰達自入宮掖粗學書計及登尊極省決萬機高祖詔曰朕以虛寡幼纂寶歷仰恃慈明緝寧四海欲報之德正覺是憑諸鷙鳥傷生之類宜放之山林其以此地為太皇太后經始靈塔於是罷鷹師曹以其地為報德佛寺太后與高祖遊于方山顧瞻川阜有終焉之志因謂羣臣曰舜葬蒼梧二妃不從豈必遠祔山陵然後為貴哉吾百年之後神其安此高祖乃詔有司營建壽陵於方山又起永固石室將終為清廟焉太和五年起作八年而成刊石立碑頌太后功德太后以高祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇文多不載太后立文宣王廟於長安又立思燕佛圖於龍城皆刊石立碑太后又制內屬五廟之孫外戚六親緦麻皆受復除性儉素不好華飾躬御縵繒而已宰人上膳案裁徑尺羞膳滋味減於故事十分之八太后嘗以體不安服菴子宰人昏而進粥有蝘蜓在焉后舉匕得之高祖侍側大怒將加極罰太后笑而釋之自太后臨朝專政高祖雅性孝謹不欲參決事無巨細一禀於太后太后多智略猜忍能行大事生殺賞罰決之俄頃多有不關高祖者是以威福兼作震動內外故嵵道德王遇張祐苻承祖等拔自微閹歲中而至王公王叡出入臥內數年便為宰輔賞賚財帛以千萬億計金書鐵券許以不死之詔李沖雖以器能受任亦由見寵帷幄密加錫賚不可勝數后性嚴明假有寵待亦無所縱左右纖介之愆動加捶楚多至百餘少亦數十然性不宿憾尋亦待之如初或因此更加富貴是以人人懷於利欲至死而不思退太后曾與高祖幸靈泉池燕羣臣及藩國使人諸方渠帥各令為其方舞高祖帥羣臣上壽太后忻然作歌帝亦和歌遂命羣臣各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至褒美叡等皆引丕等參之以示無私又自以過失懼人議己小有疑忌便見誅戮迄后之崩高祖不知所生至如李訢李惠之徒猜嫌覆滅者十餘家死者數百人率多枉濫天下寃之十四年崩於太和殿時年四十九其日有雄雉集于太華殿高祖酌飲不入口五日毀慕過禮諡曰文明太皇太后葬于永固陵日中而反虞於鑒玄殿詔曰尊旨從儉不申罔極之痛稱情允禮仰損儉訓之德進退思惟倍用崩感又山陵之節亦有成命內則方丈外裁揜坎脫於孝子之心有所不盡者室中可二丈墳不得過三十餘步今以山陵萬世所仰復廣為六十步辜負遺旨益以痛絕其幽房大小棺槨質約不設明器至於素帳縵茵瓷瓦之物亦皆不置此則遵先志從冊令俱奉遺事而有從有違未達者或以致怪梓宮之𩹉玄堂之內聖靈所憑是以一一奉遵仰昭儉德其餘外事有所不從以盡痛慕之情其宣示遠近著告羣司上明儉誨之善下彰違命之失及卒哭孝文服衰近臣從服三司已下外臣衰服者變服就練七品已下盡除即吉設祔祭於太和殿公卿已下始親公事高祖毀瘠絕酒肉不內御者三年初高祖孝於太后乃於永固陵東北里餘豫營壽宮有終焉瞻望之志及遷洛陽乃自表西以為山園之所而方山虛宮至今猶存號曰萬年堂云文成元皇后李氏梁國蒙縣人頓丘王峻之妹也后之生也有異於常父方叔言此女當大貴及長姿質美麗世祖南征永昌王仁出壽春軍至后宅因得后及仁鎮長安遇事誅后與其家人送平城宮高宗登白樓望見美之謂左右曰此婦人佳乎左右咸曰然乃下臺后得幸於齋庫中遂有娠常太后後問后后云為帝所幸仍有娠時守庫者亦私書壁記之別加驗問皆相符同及生顯祖拜貴人太安二年太后令依故事令后具條記在南兄弟及引所結宗兄洪之悉以付託臨訣每一稱兄弟輒拊胸慟泣遂薨後諡曰元皇后, WYG: 康陪}
