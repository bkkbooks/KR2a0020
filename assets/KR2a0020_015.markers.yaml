  - {type: variant, offset: 5361, length: 366, content: 宗踐阼追尊配饗后先葬城西長陵東南陵制卑局因就起山陵號終寧陵置邑戶五百家肅宗詔曰文昭皇太后德協坤儀美符文姒作合高祖實誕英聖而夙世淪暉孤塋弗祔先帝孝感自衷遷奉未遂永言哀恨義結幽明廢呂尊薄禮伸漢代又詔曰文昭皇太后尊配高祖祔廟定號促令遷奉自終及始太后當主可更上尊號稱太皇太后以同漢晉之典正姑婦之禮廟號如舊文昭遷靈櫬於長陵兆西北六十步初開終寧陵數丈於梓宮上獲大蛇長丈餘黑色頭有王字蟄而不動靈櫬既遷置蛇舊處宣武順皇后于氏太尉烈弟勁之女也世宗始親政事烈時為領軍總心膂之任以嬪御未備因左右諷諭稱后有容德世宗乃迎入為貴人時年十四甚見寵愛立為皇后謁于太廟后靜默寬容性不妬忌生皇子昌三歲夭歿其後暴崩宮禁事祕莫能知悉而世議歸咎于高夫人葬永泰陵諡曰順皇后宣武皇后高氏文昭皇后弟偃之女也世宗納為貴人生皇子早夭又生建德公主後拜為皇后甚見禮重性妬忌宮人希得進御及肅, WYG: ''}
