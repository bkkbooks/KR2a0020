  - {type: variant, offset: 1516, length: 3, content: 密貴嬪, WYG: 熹子裘襲烈弟觚勇畧有膽氣少與兄儀從太祖侍衛左右使於慕容垂垂末年政在羣下遂止觚以求賂太祖絶之觚率左右數十騎殺其衛將走歸為慕容寶所執歸中山垂待之逾厚觚因留心學業誦讀經書數十萬言垂之國人咸稱重之太祖之討中山慕容普驎既自立遂害觚以固衆心太祖聞之哀慟及平中山發普驎柩斬其尸收議害觚者傅髙霸程同等皆夷五族以大刃剉殺之乃改}
