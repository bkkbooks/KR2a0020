  - {type: variant, offset: 4056, length: 248, content: 貴寵乃簡熙二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未幾疾病文明太后乃遣還家為尼高祖猶留念焉歲餘而太后崩高祖服終頗存訪之又聞后素疹痊除遣閹官雙三念璽書勞問遂迎赴洛陽及至寵愛過初專寢當夕宮人稀復進見拜為左昭儀後立為皇后始以疾歸頗有失德之聞高祖頻歲南征后遂與中官高菩薩私亂及高祖在汝南不豫后便公然醜恣中常侍雙蒙等為其心腹中常侍劇鵬諫而不從憤懼致死是時彭城公主宋王劉昶子婦也年少嫠居北平公馮夙后之同母弟也后求婚於高祖高祖許之公主志不願后欲強之婚有日矣公主密與侍婢及家僮十餘人乘輕車冒霖雨赴懸瓠奉謁高祖, WYG: 宗}
