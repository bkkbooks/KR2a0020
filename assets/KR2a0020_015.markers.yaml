  - {type: variant, offset: 4857, length: 0, content: '', WYG: 賤因公事夀興杖之三十及顯有寵為御史中尉奏夀興在家每有怨言誹謗朝廷因帝極飲}
  - {type: variant, offset: 4857, length: 0, content: '', krp: 賤因公事夀興杖之三十及顯有寵為御史中尉奏夀興在家每有怨言誹謗朝廷因帝極飲}
  - {type: variant, offset: 4858, length: 0, content: '', WYG: 所覺悟遂奏其事命帝注可直付壽興賜死帝書半不成字當時見者亦知非本心但懼暉等威不敢申拔及行刑日顯自往看之壽興命筆自作墓誌銘曰洛陽男子姓元名景有道無時其年不永餘文多不載顧謂其子曰我棺中可著百張紙筆兩枚吾欲訟顯於地下若髙祖之靈有知百日内必取顯如遂無知亦何足戀及世宗崩顯尋被殺壽興之死時論亦以為前任中尉彈髙闕讒諷所致靈太后臨}
  - {type: page-break, offset: 4858, content: '', id: KR2a0020_WYG_015-12a, image: WYG0261/WYG0261-0239c.png}
  - {type: variant, offset: 4858, length: 0, content: '', krp: 所覺悟遂奏其事命帝注可直付壽興賜死帝書半不成字當時見者亦知非本心但懼暉等威不敢申拔及行刑日顯自往看之壽興命筆自作墓誌銘曰洛陽男子姓元名景有道無時其年不永餘文多不載顧謂其子曰我棺中可著百張紙筆兩枚吾欲訟顯於地下若髙祖之靈有知百日内必取顯如遂無知亦何足戀及世宗崩顯尋被殺壽興之死時論亦以為前任中尉彈髙闕讒諷所致靈太后臨}
  - {type: variant, offset: 4859, length: 67, content: 謁之事高祖疾甚謂彭城王勰曰後宮久乖陰德自絕於天若不早為之所恐成漢末故事吾死之後可賜自盡別宮葬以后禮庶掩馮門之大過高祖崩梓宮達魯陽乃行遺, WYG: 三公郎中崔鴻上疏理壽興}
