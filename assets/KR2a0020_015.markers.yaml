  - {type: variant, offset: 4927, length: 97, content: 北海王詳奉宣遺旨長秋卿白整等入授后藥后走呼不肯引決曰官豈有此也是諸王輩殺我耳整等執持強之乃含椒而盡殯以后禮梓宮次洛南咸陽王禧等知審死相視曰若無遺詔我兄弟亦當作計去之豈可令失行婦人宰制天下殺我輩也, WYG: 追雪贈豫州刺史}
