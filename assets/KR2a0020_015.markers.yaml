  - {type: variant, offset: 4652, length: 202, content: 令入坐言昔是汝嫂今乃他人但入勿避二王固辭不獲命及入高祖云此老嫗乃欲白刃插我肋上可窮問本末勿有所難高祖深自引過致愧二王又云馮家女不能復相廢逐且使在宮中空坐有心乃能自死汝等勿謂吾猶有情也高祖素至孝猶以文明太后故未便行廢良久二王出乃賜后辭死訣再拜稽首涕泣歔欷令入東房及入宮後帝命閹人有所問於后后罵曰天子婦親面對豈令汝傳也高祖怒敕后母常入與后杖常撻之百餘乃止高祖尋南伐后留京師雖以罪失寵而夫人嬪妾奉之如法惟令世宗, WYG: 顯}
