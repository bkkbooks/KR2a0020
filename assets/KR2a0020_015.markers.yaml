  - {type: variant, offset: 5749, length: 0, content: '', WYG: 委悉縱有簡舉良未平當愚謂宜令三司八座侍中黃門各布耳目外訪州鎭牧將治人守令能不若徳敎有方清白獨著宜以名聞即加襃陟若治績無効貪暴遠聞亦便示牒登加貶退如此則不出庭户坐知四方端委垂拱明賞審罰矣又表以御史之職鷹鸇是任必逞爪牙有所噬搏若選後生年少血氣方剛者恐其輕肆勁直傷物處廣愚謂宜簡宿官經事忠良平愼者為之詔付外依此施行後詔暉與任城王澄京兆王愉東平王匡共決門下大事暉又上書論政要其一曰御史之職務使得賢必得其人不拘階秩久於其事責其成功其二曰安人寧邊觀時而動頃來邊將亡遠大之略貪萬一之功楚梁之好未聞而蠶婦之怨屢結斯乃庸人所為鋭於姦利之所致也平吳之計自有良圖不在於一城一戍也又河北數州國之基本飢荒多年户口流散方今境上兵復徵發即如此日何易舉動愚謂數年以來唯宜靜邊以息召役安人勸農惠此中夏請嚴勑邊將自今有賊戍求内附者不聽輒遣援接皆須表聞違者雖有功請以違詔書論三曰國之資儲唯藉河北饑饉積年户口逃散生長姦詐因生隠藏出縮老小妄注死失收人租調割}
