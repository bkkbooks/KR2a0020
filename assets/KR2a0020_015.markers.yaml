  - {type: variant, offset: 4392, length: 259, content: 妖祠假言祈福專為左道母常或自詣宮中或遣侍婢與相報答高祖自豫州北幸鄴后慮還見治檢彌懷危怖驟令閹人託參起居皆賜之衣裳殷勤託寄勿使漏洩亦令雙蒙充行省其信不然惟小黃門蘇興壽密陳委曲高祖問其本末敕以勿洩至洛執問菩薩雙蒙等六人迭相證舉具得情狀高祖以疾臥含溫室夜引后并列菩薩等於戶外后臨入令閹人搜衣中稍有寸刃便斬后頓首泣謝乃賜坐東楹去御筵二丈餘高祖令菩薩等陳狀又讓后曰汝母有妖術可具言之后乞屏左右有所密啟高祖敕中侍悉出唯令長秋卿白整在側取衞直刀柱之后猶不言高祖乃以綿堅塞整耳自小語呼整再三無所應乃令后言事隱人莫知之高祖乃喚彭城北海二, WYG: 庶子時}
