  - {type: variant, offset: 5044, length: 306, content: 肇之妹也父颺母蓋氏凡四男三女皆生於東裔高祖初乃舉室西歸達龍城鎮鎮表后德色婉豔任充宮掖及至文明太后親幸北部曹見后姿貌奇之遂入掖庭時年十三初后幼曾夢在堂內立而日光自窗中照之灼灼而熱后東西避之光猶斜照不已如是數夕后自怪之以白其父颺颺以問遼東人閔宗宗曰此奇徵也貴不可言颺曰何以知之宗曰夫日者君人之德帝王之象也光照女身必有恩命及之女避猶照者主上來求女不獲已也昔有夢月入懷猶生天子況日照之徵此女必將被帝命誕育人君之象也遂生世宗後生廣平王懷次長樂公主及馮昭儀寵盛密有母養世宗之意后自代如洛陽暴薨於汲郡之共縣或云昭儀遣人賊后也世宗之為皇太子三日一朝幽后后拊念慈愛有加高祖出征世宗入朝必久留后宮親視櫛沐母道隆備其後有司奏請加昭儀號, WYG: ''}
