  - {type: variant, offset: 1507, length: 3, content: 貴嬪泰, WYG: 内將軍都將入備禁中太宗出遊於白登之東北幹以騎從有雙鴟飛鳴於上太宗命左右射之莫能中鴟旋飛稍髙幹自請射之以二箭下雙鴟太宗嘉之賜御馬弓矢金帶一以旌其能軍中於是號曰射鴟都將從世祖南廵進爵新蔡公髙宗即位拜都官尚書卒諡曰昭子禎通解諸方之語便騎射世祖時為司衛監從征蠕蠕忽遇賊别部多少不敵禎乃就山解鞍放馬以示有伏賊果疑而避之髙祖初賜爵沛郡公後拜南豫州刺史太胡山蠻時時鈔掠前後守牧多羈縻而已禎乃設畫召新蔡襄城蠻魁三十餘人禎盛武裝於州西為置酒使之觀射先選左右能射者二十餘人禎自發數箭皆中然後命左右以次而射並中先出一囚犯死罪者使服軍衣亦參射限命射不中禎即責而斬之蠻魁等伏伎畏威相視股慄又豫教左右取死囚十人皆著蠻衣云是鈔賊禎乃臨坐偽舉目瞻天微有風動禎謂蠻曰風氣少暴似有鈔賊入境不過十人當在西南五十里許即命騎追掩果縛送十人禎告諸蠻曰爾鄉里作賊如此合死以不蠻等皆叩頭曰合萬死禎即斬之乃遣蠻還并加慰諭諸蠻大服自是境無暴掠淮南之人相率投附者三千餘家置之城東汝水之側名曰歸義坊初豫州城豪胡丘生數與外交通及禎為刺史丘生嘗有犯懷恨圖為不軌詐以婚進城人告云刺史欲遷城中大家送之向代共謀翻城城人石道起以事密告禎速掩丘生并諸預謀者禎曰吾不負人人何以叛但丘生誑誤若即收掩衆必大懼吾靜以待之不久自當悔服語未訖而城中三百人自縛詣州門陳丘生譎誑之罪丘生單騎逃走禎恕而不問後徵為都牧尚書薨贈侍中儀同三司諡簡公有八子第五子瑞初瑞母尹氏有娠致傷後晝寝夢一老翁具衣冠告之曰吾賜汝一子汝勿憂也寤而私喜又問筮者筮者曰大吉未幾而生瑞禎以為恊夢故名瑞字天賜位太中大夫卒贈太}
