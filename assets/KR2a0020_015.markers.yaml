  - {type: variant, offset: 5730, length: 2, content: 上尊, WYG: 拜尚書主客郎廵省風俗還奏事稱㫖為給事黃門侍郎初髙祖遷洛而在位舊貴皆難於移徙時欲和合衆情遂許冬則居南夏便居北世宗頗惑左右之言外人遂有還北之問至乃牓賣田宅不安其居暉乃請間言事世宗曰先皇遷都之日本期冬南夏北朕欲聿遵成詔故有外人之論暉曰先皇移都為百姓戀土故發冬夏二居之詔權寧物意耳乃是當時之言實非先皇深意且北來遷人安居歲久公私計立無復還情陛下終髙祖定鼎之業勿信邪臣不然之說世宗從之再遷侍中領右衞將軍雖無補益深被親寵凡在禁中要密之事暉别奉㫖藏之於櫃唯暉入乃開其餘侍中黃門莫有知者侍中盧昶亦蒙恩眄故時人}
