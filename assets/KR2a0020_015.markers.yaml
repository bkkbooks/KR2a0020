  - {type: variant, offset: 1313, length: 189, content: 加以鑄金人不成故不得登后位魏故事後宮產子將為儲貳其母皆賜死太祖末年后以舊法薨太宗即位追尊諡號配饗太廟自此後宮人為帝母皆正位配饗焉明元昭哀皇后姚氏姚興女也興封西平長公主太宗以后禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸之出入居處禮秩如后焉是後猶欲正位而后謙讓不當泰常五年薨帝追恨之贈皇后璽綬而後加諡焉葬雲中金陵明元密皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宮有寵生世祖及, WYG: 父風}
