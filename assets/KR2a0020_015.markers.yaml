  - {type: variant, offset: 194, length: 539, content: 為吉不成則不得立也又世祖高宗緣保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁高祖改定內官左右昭儀位視大司馬三夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典內事內司視尚書令僕作司大監女侍中三官視二品監女尚書美人女史女賢人書史書女小書女五官視三品中才人供人中使女生才人恭使宮人視四品春衣女酒女饗女食奚官女奴視五品神元皇后竇氏沒鹿回部大人賓之女也賓臨終誡其二子速侯回題令善事帝及賓卒速侯等欲因帝會喪為變語頗漏泄帝聞之知其終不奉順乃先圖之於是伏勇士於宮中晨起以佩刀殺后馳使告速侯等言后暴崩速侯等驚走來赴因執而殺之文帝皇后封氏生桓穆二帝早崩桓帝立乃葬焉高宗初穿天淵池獲一石銘稱桓帝葬母封氏遠近赴會二十餘萬人有司以聞命藏之太廟次妃蘭氏生二子長子曰藍早卒次子思帝也桓帝皇后祁氏生三子長曰普根次惠帝次煬帝平文崩后攝國事時人謂之女國后性猛忌平文之崩后所為也平文皇后王氏廣寧人也年十三因事入宮得幸於平文生昭成帝平文崩昭成在襁褓時國有內難將害諸皇子后匿帝於袴中懼人知呪曰若天祚未終者汝便無聲遂良久不啼得免於難昭成初欲定都於灅源川築城郭起宮室議不決后聞之曰國自上世遷徙為業今事難之後基業未固若城郭而居一旦寇來難卒遷動乃止烈帝之崩國祚殆危興復大業后之力也十八年崩葬雲中金陵太祖即位配饗太廟, WYG: ''}
