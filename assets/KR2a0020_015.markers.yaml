  - {type: variant, offset: 7574, length: 0, content: '', WYG: 進爵隴西公卒諡定公子琛襲爵毗陵王順昭成子地干之子也性疎佷登國初賜爵南安公及太祖討中山留順守京師柏肆之敗軍人有亡歸者言大軍奔散不知太祖所在順聞之欲自立納莫題諫乃止時賀力眷等聚衆作亂於陰館順討之不剋乃從留宮自白登南入繁畤故城阻灅水為固以寧人心太祖善之進封為王位司隸校尉太祖好黃老數召諸王及朝}
  - {type: page-break, offset: 7574, content: '', id: KR2a0020_WYG_015-19a, image: WYG0261/WYG0261-0243a.png}
  - {type: variant, offset: 7574, length: 0, content: '', krp: 進爵隴西公卒諡定公子琛襲爵毗陵王順昭成子地干之子也性疎佷登國初賜爵南安公及太祖討中山留順守京師柏肆之敗軍人有亡歸者言大軍奔散不知太祖所在順聞之欲自立納莫題諫乃止時賀力眷等聚衆作亂於陰館順討之不剋乃從留宮自白登南入繁畤故城阻灅水為固以寧人心太祖善之進封為王位司隸校尉太祖好黃老數召諸王及朝}
  - {type: variant, offset: 7575, length: 0, content: '', WYG: 親為說之在坐莫不祇肅順獨坐寐欠伸不顧而唾太祖怒廢之以王薨於家遼西公意烈昭成子力眞之子也先没於慕容垂太祖征中山棄妻子迎於井陘及平中原有戰獲勲賜爵遼西公除廣平太守時和跋為鄴行臺意烈性雄耿自以帝屬耻居跋下遂陰結徒黨將襲鄴發覺賜死子抜干愽知古今父雖有罪太祖以拔干宗親委之心腹有計畧屢效忠勤太宗踐阼除渤海太守吏人樂之賜爵武遂子轉平原鎮將得將士心卒諡}
