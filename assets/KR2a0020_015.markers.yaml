  - {type: variant, offset: 7570, length: 3, content: 楊遵彥, WYG: 虔兄顗性嚴重少言太祖常敬之雅有謀策從平中山以功賜爵蒲城侯平盧太守特見寵厚給鼓吹羽儀禮同岳牧莅政以威信著稱居官七年乃以元易干代顗為郡時易干子萬言得寵於太祖易干恃其子輕忽於顗不告其狀輕騎卒至排顗墜牀而據顗坐顗不知代已謂以罪見捕既而知之耻其侮慢謂易干曰我更滿被代常也汝無禮見辱豈可容哉遂搏而殺之以狀具聞太祖壯之萬言累以訴請乃詔顗輸贖顗乃自請罪太祖赦之復免其贖病卒子崘世祖時襲父爵以功除統萬鎮將後從永昌王仁南征别出汝陰濟淮劉義隆將劉康祖屯於慰武亭以邀軍路師人患之崘曰今大風既勁若令推草車方軌並進乗風縱煙火以精兵自後乗之破之必矣從之斬康祖傳首行宮髙宗即位除秦州刺}
  - {type: page-break, offset: 7570, content: '', id: KR2a0020_WYG_015-18b, image: WYG0261/WYG0261-0242d.png}
