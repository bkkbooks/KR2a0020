  - {type: variant, offset: 7576, length: 1, content: 始, WYG: 靈公子受洛襲進爵武邑公卒子叱奴武川鎭將叱奴子洪超頗有學涉大乗賊亂之後詔洪超持節兼黃門侍郎綏慰冀部還上言冀土寛廣界去州六七百里負海險遠宜分置一州鎭遏海曲朝議從之後遂立滄州卒於北軍將光禄大夫意烈弟勃善射御以勲賜爵彭城公卒陪葬金陵長子粟襲世}
