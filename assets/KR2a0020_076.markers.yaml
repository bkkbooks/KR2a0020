  - {type: variant, offset: 7849, length: 549, content: 去遣左右杖之二百不勝楚痛大叫良久乃寤流汗徹於寢具至明前涼城太守趙卓詣之見其衣濕謂夬曰卿昨夕當大飲溺衣如此夬乃具陳所夢先是旬餘祕書監鄭道昭暴病卒夬聞謂卓曰人生何常唯當縱飲耳於是昏酣遂甚夢後二日不能言針之乃得語而猶虛劣其從兄奐比等並營視之皆言危而獲振俄而心悶旋轉而死為洗浴者視其尸體大有杖處青赤隱起二百下許贈鉅鹿太守初夬與南人辛諶庾道江文遙等終日遊聚酣飲之際相謂曰人生局促何殊朝露坐上相看先後之間耳脫有先亡者當於良辰美景靈前飲宴儻或有知庶共歆饗及夬亡後三月上巳諸人相率至夬靈前酌飲時日晚天陰室中微闇咸見夬在坐衣服形容不異平昔時執杯酒似若獻酬但無語耳時夬家客雍僧明心有畏恐披簾欲出便即僵仆狀若被毆夬從兄欣宗云今是節日諸人憶弟疇昔之言故來共飲僧明何罪而被瞋責僧明便寤而欣宗鬼語如夬平生并怒家人皆得其罪又發摘陰私竊盜咸有次緒夬妻裴植女也與道遷諸妾不穆訟徹公庭子籍年十餘歲襲祖封已數年而夬弟等言其眇目疾不任承繼自以與夬同庶己應紹襲尚書奏籍承封元象中平東將軍太中大夫齊受禪例降奐比道遷兄子也位至咸陽太守李元護遼東襄平人八世祖胤晉司徒廣陸侯胤子順璠及孫沉志皆有名宦沉孫根慕容寶中書監根子後智等隨慕容德南渡河居青州數世無名位三齊豪門多輕之元護以國家平齊後隨父懷慶南奔身長八尺美鬚髯少有武力仕蕭道成歷官馬頭太守後軍將軍, WYG: ''}
