  - {type: variant, offset: 2673, length: 312, content: 爵而已植故吏勃海刁沖上疏訟之於是贈植征南將軍尚書僕射揚州刺史乃改葬植母夏侯道遷之姊也性甚剛峻於諸子皆如嚴君長成之後非衣不見小有罪過必束帶伏閣經五三日乃引見之督以嚴訓唯少子衍得以常服見之旦夕溫凊植在瀛州也其母年踰七十以身為婢自施三寶布衣麻菲手執箕箒於沙門寺洒掃植弟瑜粲衍並亦奴僕之服泣涕而從有感道俗諸子各以布帛數百贖免其母於是出家為比丘尼入嵩高積歲乃還家植雖自州送祿奉母及贍諸弟而各別資財同居異爨一門數竈蓋亦染江南之俗也植母既老身又長嫡其臨州也妻子隨去分違數歲論者譏焉子惔字道則襲爵植弟颺壯果有謀略常隨叔業征伐以軍功為寶卷驍騎將軍叔業之歸誠也遣颺率軍於外外以討蠻楚為名內實備寶卷之衆景明初以颺為輔國將軍南司州刺史擬戍義陽封義安, WYG: 章武}
