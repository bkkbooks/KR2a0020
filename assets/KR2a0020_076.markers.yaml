  - {type: variant, offset: 3129, length: 0, content: '', WYG: 隨慕容徳南渡因居齊郡之臨淄烈少孤貧渉獵經史有氣槩時青州有崔徽伯房徽叔與烈竝有令譽時人號曰三徽髙祖時入官代都歴侍御主又中散遷洛除尚書儀曹即彭城王功曹史太子歩兵校尉蕭寶卷將陳顯達治兵漢南謀將入宼時順陽太守王青石世官江南荆州刺史廣陽王嘉慮其有異表請代之高祖詔侍臣各舉所知互有申薦者髙祖曰此郡今當必爭之地湏得堪濟之才何容汎舉也太子歩兵張烈每論軍國之事時有會人意處朕欲用之何如彭城王勰稱贊之遂勅除陵江將軍順陽大守烈到郡二日便爲寶卷將崔慧景攻圍七十餘日烈撫厲將士甚得軍人之和會車駕南討慧景遁走髙祖親勞烈曰卿定可遂能不負所寄烈拜謝曰若不值鑾輿親駕臣將不免困於犬羊自是陛下不負臣非臣能不負陛下髙祖善其對世宗即位追録先勲封清河縣開國子邑二百户尋以母老歸飬積十餘年頻值凶儉烈爲粥以食飢人䝉濟者甚衆鄉黨以此稱之肅宗初除龍驤將軍司徒右長史又轉征虜將軍司空長史先是元义父江陽王繼曾爲青州刺史及义當權烈託故義之懐遂相謟附除前將軍給事黄門侍即尋加平南將軍光禄大夫後靈太后反政以烈义黨出爲}
