  - {type: variant, offset: 268, length: 3, content: 南富貴, WYG: 軍虛詐猶未可盡請自今在軍閲簿之日行臺軍司監軍都督各明立文按處處記之斬首成一階已上即令給劵一紙之上當中大書起行臺統軍位號勳人甲乙斬三賊及被傷成階已上亦具書於劵各盡一行當行豎裂其劵前後皆起年號日月破某處陳某官某勳印記爲驗一支付勳人一支付行臺記至京即送門下别函守録又自遷都以來戎車屢㨗所以征勳轉多叙不可盡者良由嵗乆生姦積年長僞巧吏階縁偷增遂甚請自今爲始諸有勳簿已經奏賞者即廣下逺近云某處勳判咸令知聞立格酬叙以三年爲斷其職人及出身限内悉令銓除實官及外號隨才加授庶使酬勤者速申立功者勸事不經乆僥倖易息或遭窮難州無中}
