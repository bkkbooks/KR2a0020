  - {type: variant, offset: 9152, length: 2, content: 熙平, krp: 正光五年以國子博士徵之孝昌}
  - {type: variant, offset: 9156, length: 880, content: 卒贈平西將軍秦州刺史贈帛三百匹諡襄侯子景通襲善事元叉兼以貨賂叉父繼繼為司空引景通為掾後加右軍將軍鎮軍將軍卒官贈輔國將軍衞尉少卿子鶠襲永安末尚書郎走關西王世弼京兆霸城人也劉裕滅姚泓其祖父從裕南遷世弼身長七尺八寸魁岸有壯氣善草隸書好愛墳典仕蕭鸞以軍勳至游擊將軍為軍主助戍壽春遂與叔業同謀歸誠景明初除冠軍將軍南徐州刺史擬戍鍾離懸封慎縣開國伯食邑七百戶後以本將軍除東徐州刺史治任於刑為民所怨有受納之響歲餘為御史中尉李平所彈會赦免久之拜太中大夫加征虜將軍尋以本將軍出為河北太守治有清稱轉勃海相尋遷中山內史加平北將軍直閤元羅領軍叉弟也曾行過中山謂世弼曰二州刺史翻復為郡亦當恨恨耳世弼曰儀同之號起自鄧隲平北為郡始在下官正光元年卒官贈本將軍豫州刺史諡曰康長子會汝陽太守次子由字茂道好學有文才尤善草隸性方厚有名士之風又工摹畫為時人所服歷給事中尚書郎東萊太守罷郡後寓居潁川天平初元洪威構逆大軍攻討為亂兵所害時年四十三名流悼惜之江悅之字彥和濟陽考城人也七世祖統晉散騎常侍劉淵石勒之亂南徙渡江祖興之父範之並為劉裕所誅悅之少孤仕劉駿歷諸王參軍好兵書有將略善待士有部曲數百人蕭道成初以悅之為荊州征西府中兵參軍領臺軍主遷屯騎校尉轉後軍將軍部曲稍衆千有餘人蕭賾遣戍漢中就遷輔國將軍蕭衍初劉季連據蜀反叛悅之率部曲及梁秦之衆討滅之以功進號冠軍將軍武興氐破白馬進圖南鄭悅之率軍拒戰大破氐衆還復白馬衍秦梁二州刺史莊丘黑死夏侯道遷與悅之及龐樹軍主李忻榮張元亮士孫天與等謀以梁州內附既殺蕭衍使者及楊靈珍衍華陽太守尹天寶率衆向州城悅之與樹忻榮勒衆逆戰為天寶所敗遂圍南鄭戰經四日衆心危沮咸懷離貳悅之盡以家財散賞士卒身當矢刃晝夜督戰會武興軍至天寶敗走道遷之克全勳款悅之實有力焉正始二年夏與道遷俱至洛陽尋卒年六十一贈輔國將軍梁州刺史追封安平縣開國子食邑三百戶諡曰莊悅之二子文遙文遠文遙少有大度輕財好士士多歸之道遷之圖楊靈珍也文遙奮劍請行遂手斬靈珍正始二年除步兵校尉遭父憂解官永平初襲封拜前軍出為咸陽太守勤於禮接終日坐廳事至者見之假以恩顏屏人密問於是民所疾苦大盜姓名姦猾吏長無不知悉郡中震肅姦劫息止治為雍州諸郡之最, WYG: ''}
