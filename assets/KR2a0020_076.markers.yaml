  - {type: variant, offset: 12885, length: 137, content: 肩髀成都之喉嗌裴叔業夏侯道遷體運知機翻然鵲起舉地而來功誠兩茂其所以大啟茅賦兼列旐旟固其宜矣植不其德器小志大斯所以顛覆也衍才行將略不遂其終惜哉李席王江雖復因人成事亦為果決之士淳于誕好立功名有志者竟能遂也李苗以文武幹局沉斷過人臨難慨然奮其大節蹈忠履義歿而後已仁必有勇其斯人之謂乎, WYG: 魏書卷七十六考證}
