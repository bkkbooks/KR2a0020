  - {type: variant, offset: 3152, length: 342, content: 長流參軍齊受禪爵例降颺弟瑜字文琬初拜通直散騎常侍封下密縣開國子食邑三百戶尋試守滎陽郡坐虐暴殺人免官後徙封灌津子卒於勃海太守年四十五贈平南將軍豫州刺史諡曰定子堪字靈淵襲爵歷尚書郎興和中坐事死爵除瑜弟粲字文亮景明初賜爵舒縣子沉重善風儀頗以驕豪為失歷正平農二郡太守高陽王雍曾以事屬粲粲不從雍甚為恨後因九日馬射敕畿內太守皆赴京師雍時為州牧粲往修謁雍含怒待之粲神情閑邁舉止抑揚雍目之不覺解顏及坐定謂粲曰相愛舉動可更為一行粲便下席為行從容而出坐事免官後世宗聞粲善自標置欲觀其風度忽令傳詔就家急召之須臾之間使者相屬合家恇懼不測所以粲更恬然神色不變世宗歎異之時僕射高肇以外戚之貴勢傾一時朝士見者咸望塵拜謁粲候肇惟長揖而已及還家人尤責之粲曰何可自同凡俗也又曾詣清河王懌下車始進便屬暴雨粲容步舒雅不以霑濡, WYG: ''}
