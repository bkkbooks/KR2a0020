  - {type: variant, offset: 372, length: 374, content: 其去建鄴近受制於人寶卷嬖人茹法珍王咺之等疑其有異去來者並云叔業北入叔業兄子植颺粲等棄母奔壽陽法珍等以其既在疆埸急則引魏力不能制且欲羈縻之白寶卷遣中書舍人裴長穆慰誘之許不復回換叔業雖云得停而憂懼不已遣親人馬文範以自安之計訪之於寶卷雍州刺史蕭衍曰天下之事大勢可知恐無復自立理雍州若能堅據襄陽輒當勠力自保若不爾回面向北不失作河南公衍遣文範報曰羣小用事豈能及遠多遣人相代力所不辦少遣人又於事不足意計回惑自無所成唯應送家還都以安慰之自然無患若意外相逼當勒馬步二萬直出橫江以斷其後則天下之事一舉可定也若欲北向彼必遣人相代以河北一地相處河南公寧復可得如此則南歸之望絕矣叔業沉疑未決遣信詣豫州刺史薛真度具訪入國可否之宜真度答書盛陳朝廷風化惟新之美知卿非無款心自不能早決捨南耳但恐臨迫而來便不獲多賞叔業遲遲數反真度亦遣使與相報復乃遣子芬之及兄女夫韋伯昕奉表內附景明元, WYG: 同义黨除名孝昌三}
