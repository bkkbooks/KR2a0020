  - {type: variant, offset: 1086, length: 195, content: 常侍先卒子譚紹封譚粗險好殺所乘牛馬為小驚逸手自殺之然孝事諸叔盡於子道國祿歲入每以分贍世以此稱之世宗以譚及高皇后弟貞王肅子紹俱為太子洗馬肅宗踐祚轉員外常侍遷輔國將軍中散大夫卒贈平南將軍豫州刺史諡曰敬子測字伯源襲歷通直散騎侍郎天平中走於關西蒨之弟芬之字文馥長者好施篤愛諸弟仕蕭鸞歷位羽林監入國以父勳授通直散騎常侍上蔡縣開國伯食邑七百戶除廣平內史固辭不拜轉輔國將軍東秦州刺史在州有清靜之稱入為征虜, WYG: ''}
