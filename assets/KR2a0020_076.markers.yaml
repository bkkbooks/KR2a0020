  - {type: variant, offset: 50, length: 1, content: 徽, WYG: 奚康生徵民歳調皆七八十尺以邀奉公之譽部内患之同於歳禄官給長絹同乃舉按康生度外徵調書奏詔科康生之罪兼襃同在公之績肅宗世朝政稍衰人多竊冐軍功同閲吏部勳書因加檢覆覈得竊階者三百餘人同乃表言竊見吏部勳簿多皆改換乃校中兵奏按竝復乖舛臣聊爾揀練已得三百餘人明知隠而未露者動有千數愚謂罪雖恩免猶湏刋定請遣一都令史與令僕省事各一人總集吏部中兵二局勳簿對勾奏按若名級相應者即於黄素楷書大字具件階級數令本曹尚書以朱印印之明造兩通一關吏部一留兵局與奏按對掌進則防揩洗之僞退則無改易之理從前以來勳書上省唯列姓名不載本屬致令竊濫之徒輕爲茍且今請征職白民具列本州郡縣三長之所其實官正職者亦列名貫别録歴階仰本軍印記其上然後印縫各上所司統將都督竝皆印記然後列上行臺行臺關太尉太尉檢練精實乃始關刺省重究括然後奏申奏出之日黄素朱印關付吏部頃來非但偷階冐名改換勳簿而已或一階再取或易名受級凡如此者其人不少良由吏部無簿防塞失方何者吏部加階}
