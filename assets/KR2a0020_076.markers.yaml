  - {type: variant, offset: 10701, length: 2169, content: 饒安令罷縣後仍客遊齊魯之間天平中卒於青州時有皇甫徽字子玄安定朝那人仕蕭衍歷諸王參軍郡守及道遷之入國也徽亦因地內屬徽妻即道遷之兄女道遷列上勳書欲以徽為元謀徽曰創謀之始本不關預雖貪榮賞實內愧於心遂拒而不許後刺史羊祉表授征虜府司馬卒官子和武定末司空司馬和弟亮儀曹郎中淳于誕字靈遠其先太山博人後世居於蜀漢或家安固之桓陵縣父興宗蕭賾南安太守誕年十二隨父向揚州父於路為羣盜所害誕雖童稚而哀感奮發傾資結客旬朔之內遂得復讎由是州里歎異之賾益州刺史劉悛召為主簿蕭衍除步兵校尉景明中自漢中歸國既達京師陳伐蜀之計世宗嘉納之延昌末王師大舉除驍騎將軍假冠軍將軍都督別部司馬領鄉導統軍誕不願先受榮爵乃固讓實官止參戎號及奉辭之日詔遣主書趙桃弓宣旨勞勉若克成都即以益州許之師次晉壽蜀人大震屬世宗晏駕不果而還後以客例起家除羽林監蕭衍遣將張齊攻圍益州詔誕為統軍與刺史傅豎眼赴援事寧還朝正光中秦隴反叛詔誕為西南道軍司假冠軍將軍別將從子午南出斜谷趣建安與行臺魏子建共參經略時衍益州刺史蕭淵猷遣將樊文熾蕭世澄等率衆數萬圍小劍戍益州刺史邴虬令子達拒之因轉營為文熾所掩統軍胡小虎崔珍寶並見俘執子建遣誕助討之誕勒兵馳赴相對月餘未能摧殄文熾軍行之谷東峯名龍鬚山置柵其上以防歸路誕以賊衆難可角力乃密募壯士二百餘人令夜登山攻其柵及時火起煙焰漲天賊以還途不守連營震怖誕率諸軍鳴鼓攻擊文熾大敗俘斬萬計擒世澄等十一人文熾為元帥先走獲免孝昌初子建以誕行華陽郡帶白馬戍二年復以誕行巴州刺史三年朝議以梁州安康郡阻帶江山要害之所分置東梁州仍以誕為鎮遠將軍梁州刺史永安二年四月卒時年六十贈安西將軍益州刺史諡曰莊長子亢亢弟胤字館武定末梁州驃騎府司馬李苗字子宣梓潼涪人父膺蕭衍尚書郎太僕卿苗出後叔父略略為蕭衍寧州刺史大著威名王足伐蜀也衍命略拒足於涪許其益州及足還退衍遂改授略怒將有異圖衍使人害之苗年十五有報雪之心延昌中遂歸闕仍陳圖蜀之計於是大將軍高肇西伐詔假苗龍驤將軍鄉導統軍師次晉壽世宗晏駕班師後以客例除員外散騎侍郎加襄威將軍苗有文武才幹以大功不就家未雪常懷慷慨乃上書曰昔晉室數否華戎鼎沸三燕兩秦咆勃中夏九服分崩五方圮裂皇祚承歷自北而南誅滅姦雄定鼎河洛唯獨荊揚尚阻聲教今令德廣被於江漢威風遠振於吳楚國富兵強家給人足以九居八之形有兼弱攻昧之勢而欲逸豫遺疾子孫違高祖之本圖非社稷之深慮誠宜商度東西戍防輕重之要計量疆埸險易安危之理探測南人攻守窺覦之情籌算卒乘器械征討之備然後去我所短避彼所長釋其至難攻其甚易奪其險要割其膏壤數年之內荊揚可并若捨舟檝即平原斂後疏前則江淮之所短棄車馬游飛浪乘流馳逐非中國之所長彼不敢入平陸而爭衡猶我不能越巨川而趣利若俱去其短各恃其長則東南未見可滅之機而淮沔方有相持之勢且夫滿昃相傾陰陽理盛衰遞襲五德常運今以至強攻至弱必見吞并之理如以至弱禦至強焉有全濟之術故明王聖主皆欲及時立功為萬世之業去高而就下百川以之常流取易而避難兵家以之勝今巴蜀孤懸去建鄴遼遠偏兵獨戍泝流十千牧守無良專行劫剝官由財進獄以貨成士民思化十室而九延頸北望日覬王師若命一偏將弔民伐罪風塵不接可傳檄而定守白帝之阨據上流之險循士治之迹蕩建鄴之逋然後偃武修文制禮作樂天下幸甚豈不盛哉於時肅宗幼沖無遠略之意竟不能納正光末二秦反叛侵及三輔時承平既久民不習戰苗以隴兵強悍且羣聚無資乃上書曰臣聞食少兵精利於速戰糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城本無德義其勢在於疾攻日有降納遲則人情離阻坐受崩遺夫飈至風起逆者求萬一之功高壁深壘王師有全制之策但天下久泰人不曉兵奔利不相待逃難不相顧將無法令士非教習以驕將御惰卒不思長久之計務奇正之通必有莫敖輕敵之志恐無充國持重之規如令隴東不守汧軍敗散則二秦遂強三輔危弱國之右臂於斯廢矣今且宜勒大將深溝高壘堅守勿戰別命偏師精兵數千出麥積崖以襲其後則汧岐之下羣妖自散於是詔苗為統軍與別將淳于誕俱出梁益隸行臺魏子建子建以苗為郎中仍領軍深見知待孝昌中還朝除鎮遠將軍步兵校尉俄兼尚書右丞為西北道行臺與大都督宗正珍孫討汾絳蜀賊平之還除司徒司馬轉太府少卿加龍驤將軍於時蕭衍巴西民何難尉等豪姓相率請討巴蜀之間詔苗為通直散騎常侍冠軍將軍西南道慰勞大使未發會殺尒朱榮榮從弟世隆擁榮部曲屯據河橋還逼都邑孝莊親幸大夏門集羣臣博議百僚恇懼計無所出苗獨奮衣而起曰今小賊唐突如此朝廷有不測之危正是忠臣烈士效節之日臣雖不武竊所庶幾請以一旅之衆為陛下徑斷河梁城陽王徽中尉高道穆讚成其計莊帝壯而許焉苗乃募人於馬渚上流以舟師夜下去橋數里便放火船河流既駛倏忽而至賊於南岸望見火下相蹙爭橋俄然橋絕沒水死者甚衆苗身率士卒百許人泊於小渚以待南援既而官軍不至賊乃涉水與苗死鬬衆寡不敵左右死盡苗浮河而歿時年四十六帝聞苗死哀傷久之曰苗若不死當應更立奇功贈使持節都督梁益巴東梁四州諸軍事車騎大將軍儀同三司梁州刺史河陽縣開國侯邑一千戶賵帛五百匹粟五百石諡忠烈侯苗少有節操志尚功名每讀蜀書見魏延請出長安諸葛不許常歎息謂亮無奇計及覽周瑜傳未曾不咨嗟絕倒太保城陽王徽司徒臨淮王彧重之二王頗或不穆苗每諫之及徽寵勢隆極猜忌彌甚苗謂人曰城陽蜂目先見豺聲今轉彰矣解鼓琴好文詠尺牘之敏當世罕及死之日朝野悲壯之及莊帝幽崩世隆入洛主者追苗贈封以白世隆世隆曰吾爾時羣議更一二日便欲大縱兵士焚燒都邑任其採掠賴苗京師獲全天下之善一也不宜追之子曇襲爵武定末冀州儀同府刑獄參軍齊受禪爵例降, WYG: ''}
