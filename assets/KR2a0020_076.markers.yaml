  - {type: variant, offset: 1469, length: 698, content: 通直散騎常侍封雍丘縣開國子食邑三百戶出為趙郡太守為政舉大綱而已正始中轉勃海相屬元愉作逆徵兵郡縣彥先不從為愉拘執踰獄得免仍為沙門潛行至洛愉平敕還郡延昌中卒時年六十一熙平中贈持節左將軍南青州刺史諡曰惠恭子約字元儉性頗剛鯁起家員外郎轉給事中永平中丹陽太守後襲爵冀州大乘賊起敕為別將行勃海郡事後州軍為賊所敗遂圍郡城城陷見害年三十六神龜中贈平原太守出帝時復贈前將軍揚州刺史長子英起武定末洛州刺史英起弟威起卒於齊王開府中兵參軍年三十二贈鴻臚少卿彥先弟絢揚州治中時揚州霖雨水入州城刺史李崇居於城上繫船憑焉絢率城南民數千家汎舟南走避水高原謂崇還北遂與別駕鄭祖起等送子十四人於蕭衍自號豫州刺史衍將馬仙琕遣軍赴之崇聞絢反未測虛實乃遣國侍郎韓方興單舸召之絢聞崇在悵然驚恨報崇曰比因大水蹎𣛮不免羣情所逼推為盟首今大計已爾勢不可追恐民非公民吏非公吏願早行無犯將士崇遣從弟寧朔將軍神丹陽太守謝靈寶勒水軍討絢絢率衆逆戰神等大破之斬其將帥十餘人絢衆奔營神乘勝克柵衆皆潰散絢匹馬單逃為村民所獲至尉升湖絢曰吾為人吏反而見擒有何面目得視公也投水而死并鄭祖起等皆斬之植字文遠叔業兄叔寶子也少而好學覽綜經史尤長釋典善談理義仕蕭寶卷以軍勳至長水校尉隨叔業在壽春叔業卒僚佐同謀者多推司馬李元護監州一二日謀不決定唯席法友柳玄達楊令寶等數人慮元護非其鄉曲恐有異志共舉植監州祕叔業喪問教命處分皆出於植於是開門納國軍城庫管籥悉付康生詔以植為征虜將軍兗州刺史崇義縣開國侯食邑千戶尋進號平東將軍入為大鴻臚卿後以長子昕南叛有司處之大辟詔曰植闔門歸款子昕愚昧為人誘陷雖刑書有常理宜矜恤可特恕其罪以表勳誠尋除揚州大中正出為安東將軍瀛州刺史罷州復除大鴻臚卿遷度支, WYG: 都官}
