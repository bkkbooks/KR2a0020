  - {type: variant, offset: 2223, length: 449, content: 不高及為尚書志意頗滿欲以政事為己任謂人曰非我須尚書尚書亦須我辭氣激揚見於言色入參議論時對衆官面有譏毀又表毀征南將軍田益宗言華夷異類不應在百世衣冠之上率多侵侮皆此類也侍中于忠黃門元昭覽之切齒寢而不奏會韋伯昕告植欲謀廢黜尚書又奏羊祉告植姑子皇甫仲達云受植旨詐稱被詔率合部曲欲圖領軍于忠臣等窮治辭不伏引然衆證明昞案律在邊合率部衆不滿百人以下身猶尚斬況仲達公然在京稱詔聚衆諠惑都邑駭動人情量其本意不可測度按詐偽律詐稱制者死今依衆證處仲達入死金紫光祿大夫尚書崇義縣開國侯裴植身居納言之任為禁司大臣仲達又稱其姓名募集人衆雖名仲達切讓無忿懼之心衆證雖不見植皆言仲達為植所使召仲達責問而不告列推論情狀不同之理不可分明不得同之常獄有所降減計同仲達處植死刑又植親率城衆附從王化依律上議唯恩裁處詔曰凶謀既爾罪不合恕雖有歸化之誠無容上議亦不須待秋分也時于忠專擅朝權既構成其禍又矯為此詔朝野怨之臨終神志自若遺令子弟命盡之後翦落鬚髮被以法服以沙門禮葬于嵩高之陰年五十初植與僕射郭祚都水使者韋儁等同時見害於後祚儁事雪加贈而植追復, WYG: 功}
