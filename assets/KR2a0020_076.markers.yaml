  - {type: variant, offset: 1299, length: 137, content: 刺史正光末元志西討隴賊軍敗退守岐州為賊所圍城陷志與芬之並為賊擒送於上邽為莫折念生所害贈平東將軍青州刺史子涉字仲昇襲卒子僑尼襲武定中員外羽林監齊受禪爵例降芬之弟簡之英之並早卒英之弟藹之字幼重性輕率好琴書其內弟柳諧善鼓琴藹之師諧而微不及也歷通直散騎侍郎平東將軍安廣汝陽二郡太守卒, WYG: 行臺節度大都督李}
