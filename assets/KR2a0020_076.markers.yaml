  - {type: variant, offset: 8983, length: 167, content: 拜冠軍將軍豫州刺史苞信縣開國伯食邑千戶始叔業卒後法友與裴植追成叔業志淮南克定法友有力焉尋轉冠軍將軍華州刺史未拜改授并州刺史歲餘代還蕭衍遣將楊公則寇揚州假法友征虜將軍以討之法友未至而公則敗走後假法友前將軍持節為別將出淮南欲解朐山之圍法友始渡淮而朐山敗沒遂停散十年恬靜自處不競勢利世宗末以本將軍除濟州刺史在州廉和著稱又徙封乘氏肅宗初拜光祿, WYG: 徵爲諫議}
