  - {type: variant, offset: 8429, length: 481, content: 為蕭鸞徐州刺史蕭惠休奉使詣軍高祖見而善之後為裴叔業司馬帶汝陰太守叔業歸順元護贊同其謀及叔業疾病外內阻貳元護督率上下以俟援軍壽春克定元護頗有力焉景明初以元護為輔國將軍齊州刺史廣饒縣開國伯食邑一千戶便道述職其年入朝尋以州民柳世明圖為不軌元護馳還歷城至即擒殄誅戮所加微為濫酷值州內飢儉民人困弊志存隱恤表請賑貸蠲其賦役但多有部曲時為侵擾城邑苦之故不得為良刺史也三年夏卒年五十一病前月餘京師無故傳其凶問又城外送客亭柱有人書曰李齊州死綱佐餞別者見而拭之後復如此元護妾妓十餘聲色自縱情慾既甚支骨消削鬚長二尺一時落盡贈平東將軍青州刺史元護為齊州經拜舊墓巡省故宅饗賜村老莫不欣暢及將亡謂左右曰吾嘗以方伯簿伍至青州士女屬目若喪過東陽不可不好設儀衞哭泣盡哀令觀者改容也家人遵其誡子會襲正始中降爵為子邑五百戶延昌中除宣威將軍給事中會頑騃好酒其妻南陽太守清河房伯玉女也甚有姿色會不答之房乃通於其弟機因會飲醉殺之子景宣襲天平中除給事中齊受禪例降機與房遂如夫婦積十餘年房氏色衰乃更婚娶元護弟靜景明初以歸誠勳拜前將軍性甚貪忍兄亡未斂便剝脫諸妓服玩及餘財物歷齊州內史天水太守靜子鉉羽林監元護從叔恤, WYG: ''}
