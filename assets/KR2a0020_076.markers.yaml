  - {type: variant, offset: 747, length: 338, content: 正月世宗詔曰叔業明敏秀發英款早悟馳表送誠忠高振古宜加褒授以彰先覺可使持節散騎常侍都督豫雍兗徐司五州諸軍事征南將軍豫州刺史封蘭陵郡開國公食邑三千戶又賜叔業璽書曰前後使返有敕想卿具一二寶卷昏狂日月滋甚虐遍宰輔暴加戚屬淫刑既逞朝無孑遺國有瓦解之形家無自安之計卿兼茲智勇深具禍萌翻然高舉去彼危亂朕興居在念深嘉乃勳前即敕豫州緣邊諸鎮兵馬行往赴援楊大眼奚康生鐵騎五千星言即路彭城王勰尚書令肅精卒十萬絡繹繼發將以長驅淮海電擊衡巫卿其并心勠力同斯大舉殊勳茂績職爾之由崇名厚秩非卿孰賞并有敕與州佐吏及彼土人士其有微功片效必加褒異軍未渡淮叔業病卒年六十三李元護席法友等推叔業兄子植監州事乃贈開府儀同三司餘如故諡忠武公給東園溫明祕器朝服一襲錢三十萬絹一千匹布五百匹蠟三百斤子蒨之字文聰仕蕭鸞為隨郡王, WYG: 除}
