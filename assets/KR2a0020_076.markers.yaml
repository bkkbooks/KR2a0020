  - {type: variant, offset: 10201, length: 498, content: 事當州都督既而賊勢轉盛臺援不接果以阻隔強寇內徙無由乃攜諸弟并率城民東奔高麗天平中詔高麗送果等元象中乃得還朝果弟昴武定三年襲爵齊受禪例降文遠善騎射勇於攻戰以軍勳致效自給事中稍遷中散大夫龍驤將軍龐樹南安人世宗追錄謀勳封其子景亮襄邑縣開國男食邑二百戶李忻榮漢中人與樹俱擊天寶同時戰歿封其子建為清水縣開國子食邑二百戶張元亮漢中人便弓馬善戰鬬以勳封撫夷縣開國子食邑二百戶拜東萊太守入為平遠將軍左中郎將遷中散大夫加龍驤將軍卒贈左將軍巴州刺史士孫天與扶風人以勳封莫西縣開國男食邑二百戶拜武功太守又襄陽羅道珍北海王安世潁川辛諶漢中姜永等皆參其勳末道珍除齊州東平原相有治稱卒於鎮遠將軍屯騎校尉安世苻堅丞相王猛之玄孫也歷涉書傳敏於人間自羽林監稍遷安西將軍北華州刺史卒贈本將軍梁州刺史諶魏衞尉辛毗之後有文學歷步兵校尉濮陽上黨二郡太守卒贈征虜將軍梁州刺史子儒之濟州司馬永善彈琴有文學員外郎梁州別駕漢中太守永弟漾亦善士性亦至孝為漢中所歎服元羅之陷也永入於建鄴遂死焉時有潁川庾道者亦與道遷俱入國雖不參謀亦為奇士歷覽史傳善草隸書輕財重義仕蕭衍右中郎將助戍漢中及至洛陽環堵弊廬多與儁秀交舊積二十餘歲殊無宦情正光中乃除幽州左將軍府, WYG: ''}
