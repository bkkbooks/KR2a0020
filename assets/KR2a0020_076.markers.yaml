  - {type: variant, offset: 41, length: 6, content: 聞喜人也魏冀, WYG: 府長史遭父憂解任後除司空諮議叅軍兼司馬爲營構東宫都將延昌中秦州民反詔同兼通直常侍持節慰諭之多所降下還轉尚書右丞進號輔國將軍以父諱不拜改授龍驤熙平初轉左丞加征虜將軍時相}
