  - {type: variant, offset: 3680, length: 3908, content: 海入朝暫竊神器具聞爾日卿戒之以酒今欲使我飲何異於往情粲曰北海志在沉湎故諫其所失陛下齊聖溫克臣敢獻微誠帝曰實乃寡德甚愧來譽仍為命酌出帝初出為驃騎大將軍膠州刺史屬時亢旱士民勸令禱於海神粲憚違衆心乃為祈請直據胡床舉杯而言曰僕白君左右云前後例皆拜謁粲曰五嶽視三公四瀆視諸侯安有方伯而致禮海神也卒不肯拜時青州叛賊耿翔受蕭衍假署寇亂三齊粲唯高談虛論不事防禦之術翔乘其無備掩襲州城左右白言賊至粲云豈有此理左右又言已入州門粲乃徐云耿王可引上廳事自餘部衆且付城外其不達時變如此尋為翔所害送首蕭衍時年六十五子舍字文若員外散騎侍郎粲弟衍字文舒學識優於諸兄才行亦過之事親以孝聞兼有將略仕蕭寶卷至陰平太守景明二年始得歸國授通直郎衍欲辭朝命請隱嵩高乃上表曰臣幸乘昌運得奉盛化沐藉炎風餐佩唐德於生於運已溢已榮但攝性乖和苦虛弱比風露增加精形侵耗小人愚懷有閑養伏見嵩岑極天苞育名草修生救疾多遊此岫臣質無靈分性乖山水非敢追踵輕舉髣髴高蹤誠希藥此沉痾全養禀氣耳若所療微痊庶偶影風雲永歌至德荷衣葛屨裁營已整搖策納屣便陟山途謹附陳聞乞垂昭許詔曰知欲養痾中岳練石嵩嶺栖素雲根餌芝清壑騰跡之操深用嘉焉但治缺古風有愧山客耳既志往難裁豈容有抑便從來請世宗之末衍稍以出山干祿執事肅宗除散騎侍郎行河內郡事尋除建興太守轉河內太守加征虜將軍遭母憂解任衍歷二郡廉貞寡欲善撫百姓民吏追思之孝昌初蕭衍遣將曹敬宗寇荊州山蠻應之大路斷絕都督崔暹率數萬之衆盤桓魯陽不能前討荊州危急朝廷憂之詔衍為別將假前將軍與農太守王羆率軍一萬出武關以救荊州賊逆戰於浙陽衍大破之賊遂退走荊州圍解除使持節散騎常侍平東將軍假安東將軍北道都督鎮鄴西之武城封安陽縣開國子食邑三百戶時相州刺史安樂王鑒潛圖叛逆衍覺其有異密表陳之尋而鑒所部別將嵇宗馳驛告變乃詔衍與都督源子邕李神軌等討鑒平之除撫軍將軍相州刺史假鎮北將軍北道大都督進封臨汝縣開國公增邑千二百戶常侍如故仍詔衍與子邕北討葛榮軍次陽平之東北漳曲賊來拒戰衍軍敗見害朝野人情莫不駭惋贈使持節車騎大將軍司空相州刺史子嵩襲武定中河內太守齊受禪爵例降又天水冀人尹挺仕蕭鸞以軍勳至陳郡太守遂與叔業參謀歸誠景明初除輔國將軍南司州刺史擬戍義陽亦封宋縣開國伯食邑八百戶轉冠軍將軍東郡太守未拜而卒賜布帛一百匹贈本將軍涇州刺史子循歷太原太守循弟彖饒安令遼西太守兄弟皆有政事才時河東南解人柳玄達頗涉經史仕蕭鸞歷諸王參軍與叔業姻婭周旋叔業之鎮壽春委以管記及叔業之被猜疑將謀獻款玄達贊成其計前後表啟皆玄達之詞景明初除輔國將軍司徒諮議參軍封南頓縣開國子邑二百戶二年秋卒時年四十三後改封夏陽縣邑戶如先玄達曾著大夫論備陳叔業背逆歸順契闊危難之旨又著喪服論約而易尋文多不錄子絺襲武定中東太原太守齊受禪爵例降絺弟遠字季雲性粗疏無拘撿時人或謂之柳癲好彈琴耽酒時有文詠為肅宗挽郎出帝初除儀同開府參軍事放情琴酒之間每出返家人或問有何消息答云無所聞縱聞亦不解元象二年客遊項城遇患卒時年四十玄達弟玄瑜景明初除正員郎轉鎮南大將軍開府從事中郎帶汝陰太守延昌二年卒年五十五子諧頗有文學善鼓琴以新聲手勢京師士子翕然從學除著作佐郎建義初於河陰遇害時年二十六又武都人楊令寶有膂力善射仕蕭鸞數為小將征戰著效至譙郡太守遂參叔業歸誠之謀景明初除輔國將軍南兗州刺史擬戍淮陰封寧陵縣開國子食邑五百戶在淮南征戰累著勞捷徵拜冠軍將軍試守京兆內史卒追封邵陵縣開國子邑二百戶賜帛三百匹贈征虜將軍華州刺史子彪襲爵永熙中征虜將軍中散大夫齊受禪例降令寶弟令仁亦隨令寶立效前將軍汝南內史又京兆杜陵人韋伯昕學尚有壯氣自以才智優於裴植常輕之植疾之如讎即彥先之妹壻也叔業以其有大志故遣送子芬之為質景明初封雲陵縣開國男食邑二百戶拜南陽太守數歲坐事免久之拜員外散騎常侍加中壘將軍延昌末告尚書裴植謀為廢黜植坐死後百餘日伯昕亦病卒臨亡見植為祟口云裴尚書死不獨見由何以見怒也其叔業爪牙心膂所寄者裴智淵左中郎將封浚儀縣王昊左軍將軍封南汝陰縣趙革右中郎將封西宋縣並開國男食邑各二百戶李道真右軍將軍封睢陽縣開國子食邑五百戶胡文盛右軍將軍封剛陽縣魏承祖右軍將軍封平春縣並開國子食邑各三百戶承祖廣陵寒人也依隨叔業為趨走左右壯健善事人叔業待之甚厚及出為州以為防閤善撫士卒兼有將用自景明以後常為統軍南北征伐累有戰功歷太原太守至光祿大夫安南將軍蕭衍遣將圍義陽士民應之三關既陷州城時甚縣急以承祖持節行撫軍將軍率師討之大破賊衆解義陽之圍還復三關遂為名將終於并州刺史衣冠之士預叔業勳者安定皇甫光北地梁祐清河崔高客天水閻慶胤河東柳僧習等光美鬚髯善言笑仕蕭鸞以軍勳至右軍將軍入國為輔國將軍假南兗州刺史卒於勃海太守兄椿齡薛安都壻也隨安都於彭城內附歷位司徒諮議岐州刺史光未入朝而椿齡先卒椿齡子璋鄉郡相璋弟瑒為司徒胡國珍所拔自太尉記室超遷吏部郎性貪婪多所受納鬻賣吏官皆有定價後以丞相高陽王雍之壻超拜持節冠軍將軍豫州刺史為政殘暴百姓患之罷州後仍遇風病久之除安南將軍光祿大夫太昌初卒年五十八贈衞大將軍尚書左僕射雍州刺史子長卿司州主簿祕書郎中太尉司馬祐叔業之從姑子也好學便弓馬隨叔業征伐身被五十餘創景明初拜右軍將軍賜爵山桑子出為北地太守清身率下甚有治稱歷驍騎將軍太中大夫右將軍從容風雅好為詩詠常與朝廷名賢汎舟洛水以詩酒自娛遷光祿大夫加平北將軍端然養志不歷權門出為平西將軍京兆內史當世歎其抑屈卒官贈本將軍涇州刺史高客博學善文札美風流景明初拜散騎侍郎出為楊州開府掾帶陳留太守卒官慶胤父汪參薛安都平北將軍事安都入國聽汪還南慶胤博識洽聞善於談論聽其言說不覺忘疲景明初為李元談輔國府司馬卒於敷城太守僧習善隸書敏於當世景明初為裴植征虜府司馬稍遷北地太守為政寬平氐羌悅愛肅宗時至太中大夫加前將軍出為潁川太守卒官夏侯道遷譙國人少有志操年十七父母為結婚韋氏道遷云欲懷四方之志不願取婦家人咸謂戲言及至婚日求覓不知所在於後訪問乃云逃入益州仕蕭鸞以軍勳稍遷至前軍將軍輔國將軍隨裴叔業至壽春為南譙太守兩家雖為姻好而親情不協遂單騎歸國拜驍騎將軍隨王肅至壽春遣道遷守合肥肅薨道遷棄戍南叛會蕭衍以莊丘黑為征虜將軍梁秦二州刺史鎮南鄭黑請道遷為長史帶漢中郡會黑死衍以王鎮國為刺史未至而道遷陰圖歸順先是仇池鎮將楊靈珍阻兵反叛戰敗南奔衍以靈珍為征虜將軍假武都王助戍漢中有部曲六百餘人道遷憚之衍時又遣其左右吳公之等十餘人使南鄭道遷乃偽會使者請靈珍父子靈珍疑而不赴道遷乃殺使者五人馳擊靈珍斬其父子并送使者五首於京師江悅之等推道遷為持節冠軍將軍梁秦二州刺史道遷表曰臣聞知機其神趨利如響臣雖不武敢忘機利伏惟陛下澤被區宇德濟蒼生八表同忻品物咸賴臣頃亡蟻賊匹馬歸闕自斯搏噬罄竭丹款但中於壽陽橫為韋纘所謗理之曲直並是楊集朗王秉所悉臣實愚短豈能自安便逃竄江吳苟存視息蕭衍梁州刺史莊丘黑與臣早舊申臣為長史值黑亡歿專任天時素願機會在茲遇武興私署侍郎鄭洛生來此臣即披露誠款與其共契機要報武興王楊紹先并其中叔集起等請其遣軍以為腹背即遣左天長由寒山路馳啟復會通直散騎常侍臣集朗還至武興臣聞其至知事必克集朗果遣鄭右留使至臣間密參機舉會有蕭衍使人吳公之至知臣懷誠將歸大化遂與府司馬嚴思臧恭典籤吳宗肅王勝等共楊靈珍父子密相構結期當取臣臣幸先覺悉得戮思恭等臣即遣鄭猥馳告集朗急求軍援而武興軍未到之間蕭衍白馬戍主尹天寶不識天命固執愚迷乃率部曲驅掠民丁敢為不逞臣即遣軍主江悅之率諸軍主席靈坦龐樹等領義勇應時討撲而樹銳氣難裁違悅之節度輕進失脫天寶因此直到南鄭重圍州城梁秦士庶僉云危棘以義逼臣勸為刺史須藉此威鎮靖內外臣赤誠奉國苟取濟事輒捐小跡且從權宜假當州位重遣皇甫選由斜谷道以事啟聞臣即親率士卒四日三夜交鋒苦戰武興之軍乘虛躡後天寶兇徒因宵鳥散進既摧破退失巢穴潛捨軍衆依山傍險突入白馬集朗與二弟躬擐甲冑率其所領登即擒斬戍內戶口即放還民斯由皇威遐振罪人授首凶狡時殄公私慶快非但梁秦竭力實關集朗赴接之機臣前已遣軍主杜法先還洵陽構合徒黨誘結鄉落令晉壽土豪王僧承王文粲等還至西關共興大義當今庸蜀虛弱楚鄧懸危開拓九區掃清六合形要之利在於此時進趣之略願速處分臣以愚陋猥當推舉事定之後便即束身馳歸天闕但物情草創猶有參差蕭衍魏興太守范珣安康太守范泌共前巴西太守姜脩屯聚川東尚規舉斧登遣討襲具於別啟集朗兄弟並議留臣權相綏奬須得撲滅珣等便即首路伏願聖慈特垂鑒照謹遣兼長史臣張天亮奉表略聞詔曰得表聞之將軍前識機運已投誠款而中逢猜間致有播越復翻然風返建茲殊效忠貫古烈義動遐邇漢鄭既開勢翦庸蜀混同之略方自斯始擒凶掃惡何快如之想餘黨悉平西南清盪經算淹朔當有劬勞所請軍宜別敕一二又賜道遷璽書曰得表具誠節之懷卿忠義夙挺期委自昔中有事因以致乖舛知能乘機豹變翻然改圖奬率同心萬里投順遠舉漢中為開蜀之始洪規茂略深有嘉焉今授卿持節散騎常侍平南將軍豫州刺史豐縣開國侯食邑一千戶并同義諸人尋有別授王師數道絡繹電邁遣使持節散騎常侍都督征梁漢諸軍事鎮西將軍尚書邢巒指授節度卿其善建殊效稱朕意焉道遷表受平南常侍而辭豫州豐縣侯引裴叔業公爵為例世宗不許道遷自南鄭來朝京師引見於太極東堂免冠徒跣謝曰臣往日歸誠誓盡心力超蒙榮奬灰殞匪報但比在壽春遭韋纘之酷申控無所致此猖狂是段之來希酬昔遇勳微恩重有靦心顏世宗曰卿建為山之功一簣之玷何足謝也道遷以賞報為微逡巡不拜詔曰道遷至止既淹未恭州封可敕吏部速令召拜道遷拜日詔給百五十人供尋改封濮陽縣開國侯邑戶如先歲餘頻表解州世宗許之除南兗州大中正不拜道遷雖學不淵洽而歷覽書史閑習尺牘札翰往還甚有意理好言宴務口實京師珍羞罔不畢有於京城之西水次之地大起園池殖列蔬果延致秀彥時往遊適妓妾十餘常自娛興國秩歲入三千餘匹專供酒饌不營家產每誦孔融詩曰坐上客滿樽中酒不空餘非吾事也識者多之出為散騎常侍平西將軍華州刺史轉安東, WYG: ''}
  - {type: variant, offset: 3680, length: 3908, content: 海入朝暫竊神器具聞爾日卿戒之以酒今欲使我飲何異於往情粲曰北海志在沉湎故諫其所失陛下齊聖溫克臣敢獻微誠帝曰實乃寡德甚愧來譽仍為命酌出帝初出為驃騎大將軍膠州刺史屬時亢旱士民勸令禱於海神粲憚違衆心乃為祈請直據胡床舉杯而言曰僕白君左右云前後例皆拜謁粲曰五嶽視三公四瀆視諸侯安有方伯而致禮海神也卒不肯拜時青州叛賊耿翔受蕭衍假署寇亂三齊粲唯高談虛論不事防禦之術翔乘其無備掩襲州城左右白言賊至粲云豈有此理左右又言已入州門粲乃徐云耿王可引上廳事自餘部衆且付城外其不達時變如此尋為翔所害送首蕭衍時年六十五子舍字文若員外散騎侍郎粲弟衍字文舒學識優於諸兄才行亦過之事親以孝聞兼有將略仕蕭寶卷至陰平太守景明二年始得歸國授通直郎衍欲辭朝命請隱嵩高乃上表曰臣幸乘昌運得奉盛化沐藉炎風餐佩唐德於生於運已溢已榮但攝性乖和苦虛弱比風露增加精形侵耗小人愚懷有閑養伏見嵩岑極天苞育名草修生救疾多遊此岫臣質無靈分性乖山水非敢追踵輕舉髣髴高蹤誠希藥此沉痾全養禀氣耳若所療微痊庶偶影風雲永歌至德荷衣葛屨裁營已整搖策納屣便陟山途謹附陳聞乞垂昭許詔曰知欲養痾中岳練石嵩嶺栖素雲根餌芝清壑騰跡之操深用嘉焉但治缺古風有愧山客耳既志往難裁豈容有抑便從來請世宗之末衍稍以出山干祿執事肅宗除散騎侍郎行河內郡事尋除建興太守轉河內太守加征虜將軍遭母憂解任衍歷二郡廉貞寡欲善撫百姓民吏追思之孝昌初蕭衍遣將曹敬宗寇荊州山蠻應之大路斷絕都督崔暹率數萬之衆盤桓魯陽不能前討荊州危急朝廷憂之詔衍為別將假前將軍與農太守王羆率軍一萬出武關以救荊州賊逆戰於浙陽衍大破之賊遂退走荊州圍解除使持節散騎常侍平東將軍假安東將軍北道都督鎮鄴西之武城封安陽縣開國子食邑三百戶時相州刺史安樂王鑒潛圖叛逆衍覺其有異密表陳之尋而鑒所部別將嵇宗馳驛告變乃詔衍與都督源子邕李神軌等討鑒平之除撫軍將軍相州刺史假鎮北將軍北道大都督進封臨汝縣開國公增邑千二百戶常侍如故仍詔衍與子邕北討葛榮軍次陽平之東北漳曲賊來拒戰衍軍敗見害朝野人情莫不駭惋贈使持節車騎大將軍司空相州刺史子嵩襲武定中河內太守齊受禪爵例降又天水冀人尹挺仕蕭鸞以軍勳至陳郡太守遂與叔業參謀歸誠景明初除輔國將軍南司州刺史擬戍義陽亦封宋縣開國伯食邑八百戶轉冠軍將軍東郡太守未拜而卒賜布帛一百匹贈本將軍涇州刺史子循歷太原太守循弟彖饒安令遼西太守兄弟皆有政事才時河東南解人柳玄達頗涉經史仕蕭鸞歷諸王參軍與叔業姻婭周旋叔業之鎮壽春委以管記及叔業之被猜疑將謀獻款玄達贊成其計前後表啟皆玄達之詞景明初除輔國將軍司徒諮議參軍封南頓縣開國子邑二百戶二年秋卒時年四十三後改封夏陽縣邑戶如先玄達曾著大夫論備陳叔業背逆歸順契闊危難之旨又著喪服論約而易尋文多不錄子絺襲武定中東太原太守齊受禪爵例降絺弟遠字季雲性粗疏無拘撿時人或謂之柳癲好彈琴耽酒時有文詠為肅宗挽郎出帝初除儀同開府參軍事放情琴酒之間每出返家人或問有何消息答云無所聞縱聞亦不解元象二年客遊項城遇患卒時年四十玄達弟玄瑜景明初除正員郎轉鎮南大將軍開府從事中郎帶汝陰太守延昌二年卒年五十五子諧頗有文學善鼓琴以新聲手勢京師士子翕然從學除著作佐郎建義初於河陰遇害時年二十六又武都人楊令寶有膂力善射仕蕭鸞數為小將征戰著效至譙郡太守遂參叔業歸誠之謀景明初除輔國將軍南兗州刺史擬戍淮陰封寧陵縣開國子食邑五百戶在淮南征戰累著勞捷徵拜冠軍將軍試守京兆內史卒追封邵陵縣開國子邑二百戶賜帛三百匹贈征虜將軍華州刺史子彪襲爵永熙中征虜將軍中散大夫齊受禪例降令寶弟令仁亦隨令寶立效前將軍汝南內史又京兆杜陵人韋伯昕學尚有壯氣自以才智優於裴植常輕之植疾之如讎即彥先之妹壻也叔業以其有大志故遣送子芬之為質景明初封雲陵縣開國男食邑二百戶拜南陽太守數歲坐事免久之拜員外散騎常侍加中壘將軍延昌末告尚書裴植謀為廢黜植坐死後百餘日伯昕亦病卒臨亡見植為祟口云裴尚書死不獨見由何以見怒也其叔業爪牙心膂所寄者裴智淵左中郎將封浚儀縣王昊左軍將軍封南汝陰縣趙革右中郎將封西宋縣並開國男食邑各二百戶李道真右軍將軍封睢陽縣開國子食邑五百戶胡文盛右軍將軍封剛陽縣魏承祖右軍將軍封平春縣並開國子食邑各三百戶承祖廣陵寒人也依隨叔業為趨走左右壯健善事人叔業待之甚厚及出為州以為防閤善撫士卒兼有將用自景明以後常為統軍南北征伐累有戰功歷太原太守至光祿大夫安南將軍蕭衍遣將圍義陽士民應之三關既陷州城時甚縣急以承祖持節行撫軍將軍率師討之大破賊衆解義陽之圍還復三關遂為名將終於并州刺史衣冠之士預叔業勳者安定皇甫光北地梁祐清河崔高客天水閻慶胤河東柳僧習等光美鬚髯善言笑仕蕭鸞以軍勳至右軍將軍入國為輔國將軍假南兗州刺史卒於勃海太守兄椿齡薛安都壻也隨安都於彭城內附歷位司徒諮議岐州刺史光未入朝而椿齡先卒椿齡子璋鄉郡相璋弟瑒為司徒胡國珍所拔自太尉記室超遷吏部郎性貪婪多所受納鬻賣吏官皆有定價後以丞相高陽王雍之壻超拜持節冠軍將軍豫州刺史為政殘暴百姓患之罷州後仍遇風病久之除安南將軍光祿大夫太昌初卒年五十八贈衞大將軍尚書左僕射雍州刺史子長卿司州主簿祕書郎中太尉司馬祐叔業之從姑子也好學便弓馬隨叔業征伐身被五十餘創景明初拜右軍將軍賜爵山桑子出為北地太守清身率下甚有治稱歷驍騎將軍太中大夫右將軍從容風雅好為詩詠常與朝廷名賢汎舟洛水以詩酒自娛遷光祿大夫加平北將軍端然養志不歷權門出為平西將軍京兆內史當世歎其抑屈卒官贈本將軍涇州刺史高客博學善文札美風流景明初拜散騎侍郎出為楊州開府掾帶陳留太守卒官慶胤父汪參薛安都平北將軍事安都入國聽汪還南慶胤博識洽聞善於談論聽其言說不覺忘疲景明初為李元談輔國府司馬卒於敷城太守僧習善隸書敏於當世景明初為裴植征虜府司馬稍遷北地太守為政寬平氐羌悅愛肅宗時至太中大夫加前將軍出為潁川太守卒官夏侯道遷譙國人少有志操年十七父母為結婚韋氏道遷云欲懷四方之志不願取婦家人咸謂戲言及至婚日求覓不知所在於後訪問乃云逃入益州仕蕭鸞以軍勳稍遷至前軍將軍輔國將軍隨裴叔業至壽春為南譙太守兩家雖為姻好而親情不協遂單騎歸國拜驍騎將軍隨王肅至壽春遣道遷守合肥肅薨道遷棄戍南叛會蕭衍以莊丘黑為征虜將軍梁秦二州刺史鎮南鄭黑請道遷為長史帶漢中郡會黑死衍以王鎮國為刺史未至而道遷陰圖歸順先是仇池鎮將楊靈珍阻兵反叛戰敗南奔衍以靈珍為征虜將軍假武都王助戍漢中有部曲六百餘人道遷憚之衍時又遣其左右吳公之等十餘人使南鄭道遷乃偽會使者請靈珍父子靈珍疑而不赴道遷乃殺使者五人馳擊靈珍斬其父子并送使者五首於京師江悅之等推道遷為持節冠軍將軍梁秦二州刺史道遷表曰臣聞知機其神趨利如響臣雖不武敢忘機利伏惟陛下澤被區宇德濟蒼生八表同忻品物咸賴臣頃亡蟻賊匹馬歸闕自斯搏噬罄竭丹款但中於壽陽橫為韋纘所謗理之曲直並是楊集朗王秉所悉臣實愚短豈能自安便逃竄江吳苟存視息蕭衍梁州刺史莊丘黑與臣早舊申臣為長史值黑亡歿專任天時素願機會在茲遇武興私署侍郎鄭洛生來此臣即披露誠款與其共契機要報武興王楊紹先并其中叔集起等請其遣軍以為腹背即遣左天長由寒山路馳啟復會通直散騎常侍臣集朗還至武興臣聞其至知事必克集朗果遣鄭右留使至臣間密參機舉會有蕭衍使人吳公之至知臣懷誠將歸大化遂與府司馬嚴思臧恭典籤吳宗肅王勝等共楊靈珍父子密相構結期當取臣臣幸先覺悉得戮思恭等臣即遣鄭猥馳告集朗急求軍援而武興軍未到之間蕭衍白馬戍主尹天寶不識天命固執愚迷乃率部曲驅掠民丁敢為不逞臣即遣軍主江悅之率諸軍主席靈坦龐樹等領義勇應時討撲而樹銳氣難裁違悅之節度輕進失脫天寶因此直到南鄭重圍州城梁秦士庶僉云危棘以義逼臣勸為刺史須藉此威鎮靖內外臣赤誠奉國苟取濟事輒捐小跡且從權宜假當州位重遣皇甫選由斜谷道以事啟聞臣即親率士卒四日三夜交鋒苦戰武興之軍乘虛躡後天寶兇徒因宵鳥散進既摧破退失巢穴潛捨軍衆依山傍險突入白馬集朗與二弟躬擐甲冑率其所領登即擒斬戍內戶口即放還民斯由皇威遐振罪人授首凶狡時殄公私慶快非但梁秦竭力實關集朗赴接之機臣前已遣軍主杜法先還洵陽構合徒黨誘結鄉落令晉壽土豪王僧承王文粲等還至西關共興大義當今庸蜀虛弱楚鄧懸危開拓九區掃清六合形要之利在於此時進趣之略願速處分臣以愚陋猥當推舉事定之後便即束身馳歸天闕但物情草創猶有參差蕭衍魏興太守范珣安康太守范泌共前巴西太守姜脩屯聚川東尚規舉斧登遣討襲具於別啟集朗兄弟並議留臣權相綏奬須得撲滅珣等便即首路伏願聖慈特垂鑒照謹遣兼長史臣張天亮奉表略聞詔曰得表聞之將軍前識機運已投誠款而中逢猜間致有播越復翻然風返建茲殊效忠貫古烈義動遐邇漢鄭既開勢翦庸蜀混同之略方自斯始擒凶掃惡何快如之想餘黨悉平西南清盪經算淹朔當有劬勞所請軍宜別敕一二又賜道遷璽書曰得表具誠節之懷卿忠義夙挺期委自昔中有事因以致乖舛知能乘機豹變翻然改圖奬率同心萬里投順遠舉漢中為開蜀之始洪規茂略深有嘉焉今授卿持節散騎常侍平南將軍豫州刺史豐縣開國侯食邑一千戶并同義諸人尋有別授王師數道絡繹電邁遣使持節散騎常侍都督征梁漢諸軍事鎮西將軍尚書邢巒指授節度卿其善建殊效稱朕意焉道遷表受平南常侍而辭豫州豐縣侯引裴叔業公爵為例世宗不許道遷自南鄭來朝京師引見於太極東堂免冠徒跣謝曰臣往日歸誠誓盡心力超蒙榮奬灰殞匪報但比在壽春遭韋纘之酷申控無所致此猖狂是段之來希酬昔遇勳微恩重有靦心顏世宗曰卿建為山之功一簣之玷何足謝也道遷以賞報為微逡巡不拜詔曰道遷至止既淹未恭州封可敕吏部速令召拜道遷拜日詔給百五十人供尋改封濮陽縣開國侯邑戶如先歲餘頻表解州世宗許之除南兗州大中正不拜道遷雖學不淵洽而歷覽書史閑習尺牘札翰往還甚有意理好言宴務口實京師珍羞罔不畢有於京城之西水次之地大起園池殖列蔬果延致秀彥時往遊適妓妾十餘常自娛興國秩歲入三千餘匹專供酒饌不營家產每誦孔融詩曰坐上客滿樽中酒不空餘非吾事也識者多之出為散騎常侍平西將軍華州刺史轉安東, krp: ''}
