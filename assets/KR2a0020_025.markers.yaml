  - {type: variant, offset: 363, length: 1387, content: 曰皇太后平日以朝儀闕然遂命百官更欲撰緝今將畢修遺志卿等謂可行不當各盡對無以面從禧對曰儀制之事用捨各隨其時而民可使由之不可使知之臣謂宜述元志備行朝式高祖然之詔曰仲尼在鄉黨猶尚恂恂周文王為世子卑躬求道禧等雖連艹口咢宸暉得不尊尚師傅也故為置之以加令德廷尉卿李沖可咸陽王師禧將還州高祖親餞之賦詩叙意加禧都督冀相兗東兗南豫東荊六州諸軍事於時王國舍人應取八族及清修之門禧取任城王隸戶為之深為高祖所責詔曰夫婚姻之義曩葉攸崇求賢擇偶緜代斯慎故剛柔著於易經鵲巢載于詩典所以重夫婦之道美尸鳩之德作配君子流芳後昆者也然則婚者合二姓之好結他族之親上以事宗廟下以繼後世必敬慎重正而後親之夫婦既親然後父子君臣禮義忠孝於斯備矣太祖龍飛九五始稽遠則而撥亂創業日昃不暇至於諸王娉合之儀宗室婚姻之戒或得賢淑或乖好逑自茲以後其風漸缺皆人乏窈窕族非百兩擬匹卑濫舅氏輕微違典滯俗深用為歎以皇子茂年宜簡令正前者所納可為妾媵將以此年為六弟娉室長弟咸陽王禧可娉故潁川太守隴西李輔女次弟河南王幹可娉故中散代郡穆明樂女次弟廣陵王羽可娉驃騎諮議參軍滎陽鄭平城女次弟潁川王雍可娉故中書博士范陽盧神寶女次弟始平王勰可娉廷尉卿隴西李沖女季弟北海王詳可娉吏部郎中滎陽鄭懿女有司奏冀州人蘇僧瓘等三千人稱禧清明有惠政請世胙冀州詔曰利建雖古未必今宜經野由君理非下請邑采之封自有別式入除司州牧都督司豫荊郢洛東荊六州諸軍事開府如故賜帛二千匹粟五千斛詔以禧元弟之重食邑三千戶自餘五王皆食邑二千戶高祖引見朝臣詔之曰卿等欲令魏朝齊美於殷周為令漢晉獨擅於上代禧曰陛下聖明御運實願邁迹前王高祖曰若然將以何事致之為欲修身改俗為欲仍染前事禧對曰宜應改舊以成日新之美高祖曰為欲止在一身為欲傳之子孫禧對曰既卜世靈長願欲傳之來葉高祖曰若然必須改作卿等當各從之不得違也禧對曰上命下從如風靡草高祖曰自上古以來及諸經籍焉有不先正名而得行禮乎今欲斷諸北語一從正音年三十以上習性已久容或不可卒革三十以下見在朝廷之人語音不聽仍舊若有故為當降爵黜官各宜深戒如此漸習風化可新若仍舊俗恐數世之後伊洛之下復成被髮之人王公卿士咸以然不禧對曰實如聖旨宜應改易高祖曰朕嘗與李沖論此沖言四方之語竟知誰是帝者言之即為正矣何必改舊從新沖之此言應合死罪乃謂沖曰卿實負社稷合令御史牽下沖免冠陳謝又引見王公卿士責留京之官曰昨望見婦女之服仍為夾領小袖我徂東山雖不三年既離寒暑卿等何為而違前詔禧對曰陛下聖過堯舜光化中原臣雖仰禀明規每事乖互將何以宣布皇經敷贊帝則舛違之罪實合刑憲高祖曰若朕言非卿等當須庭論如何入則順旨退有不從昔舜語禹汝無面從退有後言其卿等之謂乎尋以禧長兼太尉公後高祖幸禧第謂司空穆亮僕射李沖曰既有天地又有君臣太尉位居台鉉在冢宰之上三槐九棘不可久空元弟禧雖在事不長而戚連皇極且長兼太尉以和鼎朕常恐君有空授之名臣貽彼己之刺今幸其宅徒屈二賓良以為愧高祖有事於方澤質明羣臣問起居高祖曰昨日方澤殊自大暑遇天雲蔭密行人差得無弊禧對曰陛下德感天地故雲物凝彩雖復雨師灑掃風伯清塵豈過於此高祖曰伊洛南北之中此乃天地氤氳陰陽風雨之所交會自然之應非寡德所能致此高祖篤於兄弟以禧次長禮遇優隆然亦知其性貪每加切誡雖當時遵奉而終不改操禧表曰國朝偃武崇文偏捨來久州鎮兵人或有雄勇不閑武藝今取歲暮之暇番上之日訓其兵法弓矢干矟三分並教使人閑其能臨事無闕詔曰雖云教武未練其方既逼北行卒聞教武脫生羣惑且可停之後從平漢陽以克南陽之勳加, WYG: 歴}
