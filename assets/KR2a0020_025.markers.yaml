  - {type: variant, offset: 116, length: 207, content: 驃騎大將軍中都大官文明太后令曰自非生知皆由學誨皇子皇孫訓教不立溫故求新蓋有闕矣可於閒靜之所別置學舘選忠信博聞之士為之師傅以匠成之高祖以諸弟典三都誡禧等曰汝等國之至親皆幼年任重三都折獄特宜用心夫未能操刀而使割錦非傷錦之尤實授刀之責皆可修身慎行勿有乖爽文明太后亦誡禧等曰汝兄繼承先業統御萬機戰戰兢兢恐不稱汝所治雖小亦宜克念高祖又曰周文王小心翼翼聿懷多福如有周公之才使驕且吝其餘不足觀汝等宜小心畏慎勿自驕怠出為使持節開府, WYG: 山除}
