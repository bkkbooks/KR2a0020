  - {type: variant, offset: 5264, length: 2472, content: 又為太子太保錄尚書事高祖將南討遣羽持節安撫六鎮發其突騎夷人寧悅還領廷尉卿車駕既發羽與太尉丕留守加使持節語在丕傳高祖友愛諸弟及將別不忍早分詔羽從至雁門乃令羽歸望其稱効故賜如意以表心遷都議定詔羽兼太尉告于廟社遷京之後北蕃人夷多有未悟羽鎮撫代京內外肅然高祖嘉之十八年春羽表辭廷尉不許羽奏外考令文每歲終州鎮列牧守治狀及至再考隨其品第以彰黜陟去十五年中在京百僚盡已經考為三等此年便是三載雖外有成令而內令未班內外考察理應同等臣輒推準外考以定京官治行詔曰雖內考未宣績已久著故明堂月令載公卿大夫論考屬官之治職區分著三公疑尚書三載殿最之義此之考內已為明矣但論考之事理在不輕問績之方應關朕聽輒爾輕發殊為躁也每考之義應在年終既云此年何得春初也今始維夏且待至秋後高祖臨朝堂議政事謂羽曰遷都洛陽事格天地但汝之迷徒未開沉鄣耳朕家有四海往來何難朕初發洛陽教示永壽皆謂分別比自來後諸處分之事已差前敕今舉大功寧為虛費且朕無周召之弟豈容晏安日逸今便北巡遷留之事當稱朕懷後高祖臨朝堂謂羣臣曰兩儀既闢人生其間故上天不言樹君以代是以書稱三考之績禮云考成之章自皇王以降斯道靡易朕以寡德猥荷洪基思與百辟允釐庶務然朕識乏知人不能使朝絕素餐之譏野無考盤之刺夙宵寤寐載懷怵惕卿等皆是朝賢國彥匡弼是寄各率乃心以旌考績之義如乖忠正國有常刑賢者雖疏必進不肖者雖親必黜顧謂羽曰上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髮之美中等守本事可大通羽先呈廷尉五局司直高祖曰夫刑獄之難實惟自古必也斷訟夫子所稱然五局所司專主刑獄比聞諸風聽多論五局不精知人之難朕豈獨決當與羣臣同之卿等各陳所聞高祖謂羽及少卿鄧述曰五局司直卿等以何為品羽對曰諸司直並簡聖心往者百官初置擢為獄官聽訟察辭無大差越所以為二等者或以視事甫爾或以見機遲速朝廷既有九品之制故計其絲髮之差以為品第統論所得大得相似高祖曰朕頃年以其人識見可取故簡司獄官小優劣不足為差然廷尉所司人命之本事須心平性正抑強哀弱不避貴勢直情折獄者可為上等今正欲聽採風謠虛實難悉正欲不採事無所據然人言惡者未必是惡言善者不必是善所以然者或斷訟不避豪貴故人以為惡或將勢抑賤貴人以為好然關朕之聽皆貴者言是以遲迴三復良由於此局事須冰清玉潔明揚褒貶卿等既是親典邪正得失悉所具之可精辨以聞鄧述對曰陛下行賞得人餘者甘心若賞不盡能無以勸勵如臣愚見願不行賞高祖曰朕昔置此官許三年考績必行賞罰既經今考若無黜陟恐正直者莫肯用心邪曲者無以改肅自非釋之于公何能盡其至理雖不可精其微致且望粗有殿最諸尚書更與羣官善量所以高祖謂尚書等曰朕仰纂乾構君臨萬宇往者稽古典章樹茲百職然尚書之任樞機是司豈惟總括百揆緝和人務而已朕之得失實在於斯自卿等在任年垂二周未嘗言朕之一失獻可否之片規又不嘗進一賢而退一不肖此二事罪之大者高祖又謂羽曰汝之淺薄固不足以況晉之巨源考之今世民斯下矣汝始為廷尉及初作尚書內外瞻望以吾有弟自往秋南斾之後近小人遠君子在公阿黨虧我皇憲出入無章動乖禮則計汝所行應在下下之第高祖又謂羽曰汝既是宸極之弟而居樞端之任汝自在職以來功勤之績不聞於朝阿黨之音頻干朕聽汝之過失已備積於前不復能別叙今黜汝錄尚書廷尉但居特進太保又謂尚書令陸叡曰叔翻在省之初甚有善稱自近以來偏頗懈怠豈不由卿等隨其邪偽之心不能相導以義雖不成大責已致小罰今奪卿尚書令祿一周謂左僕射元贊曰卿夙德老成久居機要不能光贊物務奬勵同僚賊人之謂豈不在卿計叔翻之黜卿應大辟但以咎歸一人不復相罪又為少師未允所授今解卿少師之任削祿一周詔吏部尚書澄曰叔父既非端右又非座元豈宜濫歸衆過也然觀叔父神志驕傲少保之任似不能存意可解少保謂長兼尚書于果曰卿履歷卑淺超昇名任不能勤謹夙夜數辭以疾長兼之職位亞正員今解卿長兼可光祿大夫守尚書削祿一周又謂守尚書尉羽曰卿在集書殊無憂存左史之事今降為長兼常侍亦削祿一周又謂守尚書盧淵曰卿始為守尚書未合考績然卿在集書雖非高功為一省文學之士嘗不以左史在意如此之咎罪無所歸今降卿長兼王師守常侍尚書如故奪常侍祿一周謂左丞公孫良右丞乞伏義受曰二丞之任所以協贊尚書光宣出納而卿等不能正心直言規佐尚書論卿之罪進合大辟但以尚書之失事鍾叔翻故不能別致貶責二丞可以白衣守本官冠服祿恤盡皆削奪若三年有成還復本任如其無成則永歸南畝又謂散騎常侍元景曰卿等自任集書合省逋墮致使王言遺滯起居不修如此之咎責在於卿今降為中大夫守常侍奪祿一周謂諫議大夫李彥曰卿雖處諫議之官實人不稱職可去諫議退為元士又謂中庶子游肇等曰自建承華已經一稔然東宮之官無直言之士雖未經三載事須考黜肇及中舍人李平識學可觀可為中安樂王詮可為下中解東華之任退為員外散騎常侍馮夙可為下下免中庶子免爵兩任員外常侍如故中舍人閭賢保可為下下退為武騎常侍又謂公孫良曰頃年用人多乖觀才之授實是武人而授以文官黜同大例於理未均諸如此比黜官如初高祖引陸叡元贊等於前曰北人每言北人何用知書朕聞此深用憮然今知書者甚衆豈皆聖人朕自行禮九年置官三載正欲開導兆人致之禮教朕為天子何假中原欲令卿等子孫博見多知若永居北值不好文主卿等子孫不免面牆也陸叡對曰實如明詔金氏若不入仕漢朝七世知名亦不可得也高祖大悅及五等開建羽食勃海之東光二千戶車駕南伐羽進號衞將軍除使持節都督青齊光南青四州諸軍事征東大將軍開府青州刺史以留守代京之功增邑五百戶高祖幸羽第與諸弟言曰朕昨親受人訟始知廣陵之明了咸陽王禧對曰臣年為廣陵兄明為廣陵弟高祖曰我為汝兄汝為羽昆汝復何恨又曰叔翻沉疴緜惙遂有辰歲我每為深憂恐其不振今得痊愈晚成婚媾且喜其吉慶故命駕耳高祖親餞之華林園後詔羽曰吾因天歷運乘時樹功開荊拓沔威振楚越時暨三炎息駕汝潁勢臨荊徐聲遏江外未容解甲凱入三川纂兵修律俟秋方舉海服之寄故惟宗良善開經策寧我東夏敬慎汝儀勿墜嘉問唯酒唯田可不戒歟加散騎常侍進號車騎大將軍餘如故世宗即位遷司州牧常侍如故羽頻表辭牧至于三四詔不許世宗覽政引羽入內面授司徒羽辭曰彥和本自不願而陛下強與今新去此官而以臣代之必招物議季豫既轉取之無嫌請為司空世宗猶強焉固辭乃許之羽先淫員外郎馮俊興妻夜因私遊為俊興所擊積日祕匿薨於府年三十二世宗親臨哀慟詔給東園溫明祕器朝服一具衣一襲錢六十萬布一千匹蠟, WYG: 彎弓}
