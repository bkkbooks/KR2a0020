  - {type: variant, offset: 13357, length: 560, content: 得行顥令遵權停於鄴顥既懷異謀乃遣遵行相州事代前刺史李神為己表𩹉之援相州行臺甄密先受朝旨委其守鄴知顥異圖恐遵為變遂相率廢遵還推李神攝理州事然後遣軍候顥逆順之勢顥以事意不諧遂與子冠受率左右奔於蕭衍顥見衍泣涕自陳言辭壯烈衍奇之遂以顥為魏主假之兵將令其北入永安二年四月於梁國城南登壇燔燎號孝基元年莊帝詔濟陰王暉業為都督於考城拒之為顥所擒又克行臺楊昱於滎陽尒朱世隆自虎牢走退莊帝北幸顥遂入洛改稱建武元年顥以數千之衆轉戰輒克據有都邑號令自己天下人情想其風政而自謂天之所授頗懷驕怠宿昔賓客近習之徒咸見寵待干擾政事又日夜縱酒不恤軍國所統南兵凌竊市里朝野莫不失望時又酷斂公私不安莊帝與尒朱榮還師討顥自於河梁拒戰王師渡於馬渚冠受戰敗被擒因相繼而敗顥率帳下數百騎及南兵勇健者自轘轅而出至臨潁顥部騎分散為臨潁縣卒所斬出帝初贈使持節侍中都督冀定相殷四州諸軍事驃騎大將軍大司馬冀州刺史武定中子娑羅襲齊受禪爵例降顥弟頊字寶意起家為通直郎轉中書郎歷武衞將軍光祿少卿黃門郎出除平北將軍相州刺史為大宗正卿封平樂縣開國公食邑八百戶莊帝初拜侍中車騎將軍封東海王食邑千戶俄遷中書監左光祿大夫兼尚書右僕射又拜車騎大將軍加侍中頊無他才幹以親屬早居重任兄顥入洛成敗未分便以意氣自得為時人所笑顥敗潛竄為人執送斬於都市出帝初贈侍中都督雍華岐三州諸軍事驃騎大將軍太尉公尚書令, WYG: 幾}
