  - {type: variant, offset: 8000, length: 0, content: '', WYG: 安王子敦字孝友位北鎮都將坐黷貨降為公髙祖時自頌先世勲重復其王爵薨諡簡王子道字念僧襲爵久之隨例降為公位右衛將軍卒諡慎子悦襲爵建義初復本王爵尋降為公位光禄少卿卒贈司空長孫道生嵩從子也忠厚廉謹太祖愛其慎重使掌幾密與賀毗等四人内侍左右出入詔命太宗即位除南統將軍冀州刺史後取人美女以獻太宗切責之以舊臣不加罪黜世祖即位進爵汝隂公遷廷尉卿從征蠕蠕與尉眷等率衆出白黑兩漠間大㨗而還世祖征赫連昌道生與司徒長孫翰宗正娥清為前驅遂平其國昌弟定走保平凉劉義隆遣將到彦之王仲徳寇河南以救定詔道生與丹陽王太之屯河上以禦之遂誘義隆將檀道濟邀其前後追至歴城而還除司空加侍中進封上黨王薨年八十二贈太尉諡曰靖道生廉約身為三司而衣不華飾食不兼味一熊皮鄣泥數十年不易時人比之晏嬰第宅卑陋出鎮後其子弟頗更修繕起堂廡道生還歎曰昔霍去病以匈奴未滅無用家為今彊寇尚遊魂漠北吾豈可安坐華美也乃切責子弟令毁宅其恭慎如此世祖世所在著績毎建大議多合時機為將有權略善待士衆帝命歌工歴頌羣臣曰智如崔浩廉如道生及年老頗惑其妻孟氏以此見譏與從父嵩俱為三公當世以為榮子抗位少卿早卒抗子觀少以壯勇知名後襲祖爵上黨王時異姓}
