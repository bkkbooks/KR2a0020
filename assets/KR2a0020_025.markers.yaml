  - {type: variant, offset: 3265, length: 1512, content: 公尚書令揚州刺史貞既葬還於江南曄字世茂衍封為桑乾王拜散騎常侍卒於秣陵初正光中詔曰周德崇厚蔡仲享國漢道仁恕淮南畢王皆所以申恩懿戚蠲盪舊釁義彰曩葉詠流前史頃者咸陽京兆王自貽禍敗事由間惑猶有可矜兩門諸子並可聽附屬籍後復禧王爵葬以王禮詔曄弟坦襲改封敷城王邑八百戶坦傲佷兇粗從叔安豐王延明責之曰汝兇悖性與身而長昔有宋東海王禕志性凡劣時人號曰驢王我熟觀汝所作亦恐不免驢號莊帝初還復本封武定中為太師齊受禪爵例降坦弟昶起家通直散騎常侍琅邪縣開國公邑五百戶莊帝初特封太原王累遷鴻臚卿超拜車騎大將軍儀同三司天平二年薨贈太尉公子善慧襲齊受禪爵例降趙郡王幹字思直太和九年封河南王加衞大將軍除侍中中都大官尋授車騎將軍左光祿大夫領吏部尚書所生母薨高祖詔曰太妃韓氏薨逝情以傷慟太妃先朝之世位擬九嬪豫班上族誕我同氣念此孤稚但用感惻明當暫往臨哭可勅外備辦遣侍御史假節監護喪事贈綵八百匹詔曰季世多務情緣理奪幹既居要任銓衡是荷豈容遂其私志致曠所司可遣黃門郎敦諭令勉從王事朕尋當與之相見拜使持節都督南豫郢東荊三州諸軍事征南大將軍開府豫州刺史及車駕南伐以幹為使持節車騎大將軍都督關右諸軍事給銅虎符十別賜詩書高祖篤愛諸弟以幹總戎別道誡之曰司空穆亮年器可師散騎常侍盧淵才堪詢訪汝其師之尋以蕭賾死班師遷洛改封趙郡王除都督冀定瀛三州諸軍事征東大將軍冀州刺史開府如故賜雜物五百段又密賜黃金十斤高祖親餞於近郊詔幹曰夫刑獄之理先哲所難然既有邦國得不自勵也汝我之懿弟當聿修厥德光崇有魏深思遠圖如臨深履薄若恃親重不務世政國有常憲方增悲感高祖詔以李憑為長史唐茂為司馬盧尚之為諮議參軍以匡弼之而憑等諫諍幹殊不納州表斬盜馬人於律過重而尚書以幹初臨縱而不劾詔曰夫刑以節人罪必無濫故刑罰不中民無措足若必以威殺為良則應汎通衆牧苟須有禁何得不稽之正典又律令條憲無聽新君加戮之文典禮舊章不著始臨專威之美尚書曲阿朕意實傷皇度幹闇於治理律外重刑並可推聞後轉特進司州牧車駕南討詔幹都督中外諸軍事給鼓吹一部甲士三百人出入殿門幹貪淫不遵典法御史中尉李彪將糾劾之會遇幹於尚書下舍因屏左右而謂幹曰殿下比有風聞即欲起彈恐損聖明委託之旨若改往修來彪當不言脫不悛改夕聞旦發而幹悠然不以為意彪乃表彈之高祖省之忿惋詔幹與北海王詳俱隨太子詣行在所既至詳獨得朝見幹不蒙引接密令左右察其意色知無憂悔乃親數其過杖之一百免所居官以王還第二十三年薨年三十一給東園祕器斂服十五稱賵帛三千匹諡曰靈王陪葬長陵子謐世宗初襲封幹妃穆氏表謐母趙等悖禮愆常不遜日甚尊卑義阻母子道絕詔曰妾之於女君猶婦人事舅姑君臣之禮義無乖二妾子之於君母禮加如子之恭何得黷我風政可付宗正依禮治罪謐在母喪聽音聲飲戲為御史中尉李平所彈遇赦復封除通直散騎常侍加龍驤將軍遷太子中庶子出為冠軍將軍岐州刺史謐性嚴暴虐下人肅宗初臺使元延到其州界以驛邏無兵攝帥檢覈隊主高保願列言所有之兵王皆私役謐聞而大怒鞭保願等五人各二百數日之間謐召近州夫閉城四門內外嚴固搜掩城中楚掠備至又無事而斬六人合城兇懼衆遂大呼屯門謐怖登樓毀梯以自固土人散走城人分守四門靈太后遣游擊將軍王靖馳驛諭之城人既見靖至開門謝罪奉送管籥乃罷謐州還除大司農卿又除散騎尚侍平北將軍幽州刺史謐妃胡氏靈太后從女也未發坐毆其妃免官後除都官尚書加安南將軍正光四年薨給東園祕器朝服一具衣一襲賵帛五百匹高陽王雍幹之母弟啟論謐故超贈假侍中征南將軍司州牧諡曰貞景子毓字子春襲莊帝初河陰遇害贈衞大將軍儀同三司青州刺史諡曰宣恭無子詔以謐弟讞子寘字景融為後襲爵及寘伯諶復封趙郡改封平昌王齊受禪爵例降謐兄諶字興伯性平和自通直正員郎遷太子庶子司空司馬鴻臚少卿遷後將軍肆州刺史固辭不拜改授平南將軍光祿少卿轉黃門侍郎進號安南將軍光祿大夫出為散騎常侍中軍將軍, WYG: ''}
