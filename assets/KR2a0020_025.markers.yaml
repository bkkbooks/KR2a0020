  - {type: variant, offset: 1752, length: 1511, content: 正太尉及高祖崩禧受遺輔政雖為宰輔之首而從容推委無所是非而潛受賄賂陰為威惠者禧特甚焉是年八座奏增邑千戶世宗從之固辭不受禧性驕奢貪淫財色姬妾數十意尚不已衣被繡綺車乘鮮麗猶遠有簡娉以恣其情由是昧求貨賄奴婢千數田業鹽鐵徧於遠近臣吏僮隸相繼經營世宗頗惡之景明二年春禧等為將礿祭入齋世宗詔領軍于烈率左右召禧等入於光極殿詔曰恪雖寡昧忝承寶曆比疹實憑諸父苟延視息奄涉三齡父等歸遜殷勤今便親攝百揆且還府司當別處分尋詔曰朕以寡昧夙罹閔凶憂煢在疚罔知攸濟實賴先帝聖德遺澤所覃宰輔忠賢劬勞王室用能撫和上下肅清內外乃式遵復子歸政告遜辭理懇至邈然難奪便當勵茲空乏親覽機務王尊惟元叔道性淵凝可進位太保領太尉司空北海王季父英明聲略茂舉可大將軍錄尚書事世宗既覽政禧意不安而其國齋帥劉小苟每稱左右言欲誅禧禧聞而歎曰我不負心天家豈應如此由是常懷憂懼加以趙脩專寵王公罕得進見禧遂與其妃兄兼給事黃門侍郎李伯尚謀反時世宗幸小平津禧在城西小宅初欲勒兵直入金墉衆懷沮異禧心因緩自旦達晡計不能決遂約不洩而散武興王楊集始出便馳告而禧意不疑乃與臣妾向洪池別墅遣小苟奉啟云檢行田牧小苟至邙嶺已逢軍人怪小苟赤衣將欲殺害小苟困迫言欲告反乃緩之禧是夜宿於洪池大風暴雨拔樹折木禧不知事露其夜或說禧曰殿下集衆圖事見意而停恐必漏洩今夕何宜自寬恐危禍將至禧曰有此軀命應知自惜豈待人言又說曰殿下兒婦已渡河兩頭不相知今俛眉自安不其危乎禧曰初遣去日令如行人渡河聽我動靜我久已遣人追之計今應還而尹仵期與禧長子通已入河內郡列兵仗放囚徒而將士所在追禧禧自洪池東南走僮僕不過數人左右從禧者唯兼防閤尹龍虎禧憂迫不知所為謂龍虎曰吾憒憒不能堪試作一謎當思解之以釋毒悶龍虎欻憶舊謎云眠則俱眠起則俱起貪如豺狼贓不入己都不有心於規刺也禧亦不以為諷己因解之曰此是眼也而龍虎謂之是箸渡洛水至栢谷塢從者唯禧二舅及龍虎而已顧謂龍虎曰凡夫尚有節義相為取死汝可勉心作與太尉公同死計龍虎曰龍虎東野常人遭殿下寬明接處左右今屬危難恨無遠計匡濟聖躬若與殿下同命雖死猶生俄而禧被擒獲送華林都亭世宗親問事源著千斤鎖格龍虎羽林掌衞之初高祖閑宴從容言於禧等我後子孫邂逅不逮汝等觀望輔取之理無令他人有也禧臨盡雖言不次第猶尚泣涕追述先旨然畏迫喪志不能慷慨有所感激也及與諸妹公主等訣言及一二愛妾公主哭且罵之云坐多取此婢輩貪逐財物畏罪作反致今日之事何復囑問此等禧愧而無言遂賜死私第其宮人歌曰可憐咸陽王奈何作事誤金床玉几不能眠夜蹋霜與露洛水湛湛彌岸長行人那得渡其歌遂流至江表北人在南者雖富貴絃管奏之莫不灑泣同謀誅斬者數十人潛瘞禧於北邙絕其諸子屬籍禧之諸女微給資產奴婢自餘家財悉以分賚高肇趙脩二家其餘賜內外百官逮于流外多者百餘匹下至十匹於後禧諸子每乏衣食獨彭城王勰歲中再三賑給之禧有子八人長子通字曇和竊入河內太守陸琇初與通情既聞禧敗乃殺之通弟翼字仲和後會赦詣闕上書求葬其父頻年泣請世宗不許翼乃與弟昌曄奔於蕭衍翼與昌申屠氏出曄李妃所生也翼容貌魁壯風制可觀衍甚重之封為咸陽王翼讓其嫡弟曄衍不許後以為信武將軍青冀二州刺史鎮郁州翼謀舉州入國為衍所移昌為衍直閤將軍翼弟顯和昌弟樹後亦奔於衍顯和卒於江南樹字秀和美姿貌善吐納兼有將略衍尤器之封為魏郡王後改封鄴王數為將領窺覦邊服時揚州降衍兵武既衆衍將湛僧珍慮其翻異盡欲殺之樹以家國遂皆聽還衍以樹為鎮西將軍郢州刺史尒朱榮之害百官也樹聞之乃請衍討榮衍乃資其士馬侵擾境上前廢帝時竊據譙城出帝初詔御史中尉樊子鵠為行臺率徐州刺史大都督杜德以討之樹城守不下子鵠使金紫光祿大夫張安期往說之樹乃請委城還南子鵠許之樹恃誓約不為戰備杜德襲擊之擒樹送京師禁於永寧佛寺未幾賜死孝靜時其子貞自建業赴鄴啟求葬樹許之詔贈樹侍中都督青徐兗揚豫五州諸軍事太師, WYG: ''}
