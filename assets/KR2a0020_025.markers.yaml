  - {type: variant, offset: 4787, length: 2, content: 都官, WYG: 赫連蠕蠕征討何先嵩與平陽王長孫翰司空奚斤等曰赫連居上未能為患蠕蠕世為邊害宜先討大檀及則收其畜産足以富國不及則校獵隂山多殺禽獸皮肉筋角以充軍實亦愈於破一小國太常崔浩曰大檀遷徙鳥逝疾追則不足經久大衆則不能及之赫連屈丐土宇不過千里其刑政殘虐人神所弃宜先討之}
