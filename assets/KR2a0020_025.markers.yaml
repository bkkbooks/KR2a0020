  - {type: variant, offset: 13955, length: 4, content: 咸陽望重, WYG: 病者先行無乃不可乎莫有對者時薛鳳賢反於正平薛脩義屯聚河東分據鹽池攻圍蒲坂東西連結以應寳夤稚乃據河東時有詔廢鹽池税稚上表曰鹽池天資賄貨密邇京畿唯須寳而護之均贍以理今四境多虞府蔵罄竭然冀定二州且亡且亂常調之絹不復可收仰惟府庫有出無入必須經綸出入相補略論鹽稅一年之中凖絹而言猶不應減三十萬匹也便是移冀定二州置於畿甸今若廢之事同再失臣前仰違嚴㫖不先討關賊而解河東者非是閑長安而急蒲坂蒲坂一陷沒失鹽池三軍口命濟贍理絶天助大魏兹計不爽昔髙祖昇平之年無所乏少猶創置鹽官而加典護非為物而競利恐由利而亂俗也况今王公素餐百官尸禄租徵六年之粟調折來嵗之資此皆出人私財奪人膂力豈是願言事不獲已臣輙符司堅將尉還率所部依常收稅更聴後𠡠稚克寳夤將侯終徳寳夤出走雍州平除雍州刺史莊帝初封上黨王尋改馮翊王後降為郡公遷司徒公加侍中兼尚書令大行臺仍鎮長安前廢帝立遷大尉公録尚書事及韓陵之敗斛斯椿先據河橋謀誅尒朱使稚八洛啟帝誅世隆兄弟之意出帝初轉太傅録尚書事以定䇿功更封開國子稚表請回授其姨兄廷尉卿元洪超次子惲初稚生而母亡為洪超母所撫養是以求讓許之出帝入關稚時鎮虎牢亦隨赴長安稚妻張氏生二子子彦子裕後與羅氏私通遂殺其夫棄張納羅羅年大稚十餘嵗妬忌防限稚雅相愛敬旁無姻妾僮侍之中嫌疑致死者乃有數四羅生三子紹逺士亮季亮兄弟皆廉武稚少輕俠闘鷄走馬力争殺人因亡抵龍門將陳興徳家㑹赦乃免因以後妻羅前夫女吕氏妻興徳兄興恩以報之子彦本名儁有膂力以累從父征討功封槐里縣子出帝與齊獻武王構隙加子彦中軍大都督行臺僕射鎮𢎞農以為心膂後從帝入關子彦少常墜馬折臂肘上骨起寸餘乃命開肉鋸骨流血數升言戲自若時以為踰於關羽子裕}
