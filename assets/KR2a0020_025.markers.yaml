  - {type: variant, offset: 4944, length: 204, content: 煒襲齊受禪爵例降謐弟譚頗強立少為宗室所推敬自羽林監出為高陽太守為政嚴斷豪右畏之肅宗初入為直閤將軍歷太僕宗正少卿加冠軍將軍元法僧外叛詔譚為持節假左將軍別將以討之徐州平遷光祿少卿行南兗州事征虜將軍涇州刺史入為武衞將軍尋詔譚為都督以討杜洛周次於軍都為洛周所敗還除安西將軍秦州刺史卒贈撫軍將軍儀同三司青州刺史諶弟讞為人貪暴無禮自羽林監遷司徒主簿肅宗時除正員郎稍遷左將軍太中大夫封平鄉縣開國男邑二百戶莊帝初河陰遇害贈車, WYG: 頽善}
