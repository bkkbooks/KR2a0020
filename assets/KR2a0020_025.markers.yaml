  - {type: variant, offset: 4781, length: 1, content: 罷, WYG: 封南平公所在著稱太宗即位與山陽侯奚斤北新侯安同白馬侯崔宏等八人坐止車門右聴理萬幾故世號八公晉將劉裕之伐姚泓太宗假嵩節督山東諸軍事𫝊詣平原縁河北岸列軍次於畔城軍頗失利詔假裕道裕於舟中望嵩麾蓋遺以酃酒及江南食物嵩皆送京師詔嵩厚答之又𠡠簡精兵為戰備若裕西過者便率精銳南出彭沛如不時過但引軍隨之彼至崤陜間必與姚泓相持一死一傷衆力疲敝比及秋月徐乃乗之則裕首可不戰而懸於是叔孫建等尋河趣洛遂入關嵩與建等自成臯南濟晉諸屯戍皆望塵奔潰裕剋長安嵩乃班師太宗寢疾問後事於嵩嵩曰立長則順以徳則人服今長皇子賢而世嫡天所命也請立乃定䇿禁中於是詔世祖臨朝監國嵩為左輔世祖即位進爵北平王司}
