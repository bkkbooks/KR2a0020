  - {type: variant, offset: 13214, length: 142, content: 持節行臺都督如故尋遷車騎大將軍儀同三司餘如故值蕭寶夤等大敗於平涼顥亦奔還京師於時葛榮南進稍逼鄴城武泰初以顥為侍中驃騎大將軍開府儀同三司相州刺史以禦榮顥至汲郡屬尒朱榮入洛推奉莊帝詔授顥太傅開府侍中刺史王並如故顥以葛榮南侵尒朱縱害遂盤桓顧望圖自安之策先是顥啟其舅范遵為殷州刺史遵以葛榮充逼, WYG: ''}
