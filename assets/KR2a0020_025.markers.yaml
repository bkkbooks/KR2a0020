  - {type: variant, offset: 8281, length: 4805, content: 太保領太尉侍中如故世宗行考陟之法雍表曰竊惟三載考績百王通典今任事上中者三年昇一階散官上第者四載登一級閑冗之官本非虛置或以賢能而進或因累勤而舉如其無能不應忝茲高選既其以能進之朝伍或任官外戍遠使絕域催督逋懸察檢州鎮皆是散官以充劇使及於考陟排同閑伍檢散官之人非才皆劣稱事之輩未必悉賢而考閑以多年課煩以少歲上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明參差之考非聖慈之心改典易常乃有司之意又尋考級之奏委於任事之手涉議科勤絕於散官之筆遂使在事者得展自勤之能散輩者獨絕披衿之所抑以上下之閑限以旨格之判致使近侍禁職抱槃屈之辭禁衞武夫懷不申之恨欲克平四海何以獲諸又散官在直一玷成尤銜使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以祿微加賞罪殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啟處又曰豈不懷歸畏此簡書依依楊柳以叙治兵之役霏霏雨雪又申振旅之勤若折往來日月便是採薇之詩廢杕杜之歌罷又任事之官吉凶請假定省掃拜動歷十旬或因患重請動輒經歲征役在途勤泰百倍苦樂之勢非任事之倫在家私閑非理務之日論優語劇先宜折之武人本挽上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不涉或帶甲連年負重千里或經戰損傷或年老衰竭今試以本格責其如初有爽於先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彥或歷嶮千餘或履危萬里登有死亡之憂咸懷不返之戚魂骨奉忠以尸將命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以奬勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年昇一階檢無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上陟上第之士由汎而退臣又見部尉資品本居流外刊諸明令行之已久然近為里巷多盜以其威輕不肅欲進品清流以壓姦宄甄琛啟云為法者施而觀之不便則改竊謂斯言有可採用聖慈昭覽更高宰尉之秩今考格始宣懷怨者衆臣竊觀之亦謂不可有光國典改之何難世宗乃引雍共論時務肅宗初詔雍入居太極西栢堂諮決大政給親信二十人又詔雍為宗師進太傅侍中領太尉公王如故別敕將作營國子學寺給雍居之領軍于忠擅權專恣僕射郭祚勸雍出之忠怒矯詔殺祚及尚書裴植廢雍以王歸第朝有大事使黃門郎就諮訪之忠尋復矯詔將欲殺雍以問侍中崔光光拒之乃止未幾靈太后臨朝出忠為冀州刺史雍表曰臣初入栢堂見詔旨之行一由門下而臣出君行不以悛意每覽傷矜視之慘目深知不可不能禁制臣之罪一也臣近忝內樞兼尸師傅宜保護聖躬溫凊晨夕而于忠身居武司禁勒自在限以內外朝謁簡絕皇居寢食所在不知社稷安危又亦不預出入栢堂尸立而已臣之罪二也忠規欲殺臣賴在事執拒又令僕卿相任情進黜遷官授職多不經旬斥退賢良專納心腹威振百僚勢傾朝野臣見其如此欲出忠為雍州刺史鎮撫關右在心未行反為忠廢忝官尸祿孤負恩私臣之罪三也先帝昇遐儲宮纂統斯乃君父之謨臣子之永則加賞之義自古無之忠既人臣受恩先帝喪禍之際竭節是常迎陛下於東宮臣下之事如其不爾更欲何為而忠意氣凌雲坐要封爵爾日抑之交恐為禍臣以權臣所欲不敢輒違即集王公卿士議其多少清河王臣懌先帝懿弟識度寬明臨衆唱議非以勤而賞之憚違權臣之旨望顏而授臣知不可因而從之臣之罪四也忠秉權門下且居宰執又總禁旅為崇訓衞尉身兼內外橫干宮掖臣之罪五也古者重罪必令三公會期至旬日所以重死刑也先帝登極十有七年細人犯刑猶寬憲墨朝廷貴仕不戮一人今陛下踐阼年未半周殺僕射尚書如夭一草是忠秉權矯旨擅行誅戮臣知不能救臣之罪六也臣位荷師相年未及終難恕之罪顯露非一何情以處何顏以生雖經恩宥猶有餘責謹反私門伏聽司敗靈太后感忠保護之勳不問其罪增雍封一千戶除侍中太師又加使持節以本官領司州牧雍表請王公以下賤妾悉不聽用織成錦繡金玉珠璣違者以違旨論奴婢悉不得衣綾綺纈止於縵繒而已奴則布服並不得以金銀為釵帶犯者鞭一百太后從之而不能久行也詔雍乘步挽出入掖門又以本官錄尚書事雍頻表辭遜優答不許詔侍中敦諭詔雍朝夕侍講肅宗覽政除使持節司州牧侍中太師錄尚書如故肅宗加元服雍兼太保與兼太尉崔光攝行冠禮詔雍乘車出入大司馬門進位丞相給羽葆鼓吹倍加班劍餘悉如故又賜帛八百匹與一千人供具催令速拜詔雍依齊郡順王簡太和故事朝訖引坐特優拜伏之禮總攝內外與元叉同決庶政歲祿萬餘粟至四萬伎侍盈房諸子璫冕榮貴之盛昆弟莫及焉元妃盧氏薨後更納博陵崔顯妹甚有色寵欲以為妃世宗初以崔氏世號東崔地寒望劣難之久乃聽許延昌已後多幸妓侍近百許人而疏棄崔氏別房幽禁不得關豫內政僅給衣食而已至乃左右無復婢使子女欲省其母必啟聞許乃得見未幾崔暴薨多云雍毆殺之也靈太后許賜其女妓未及送之雍遣其閹竪丁鵝自至宮內料簡四口冒以還第太后責其專擅追停之孝昌初詔曰比相府弗開陰陽未變王秉哲居宗勳望隆重道庇蒼生威被華裔體國猶家匪躬在節可開府置佐史尋罷司徒以為丞相府孝莊初尒朱榮欲害朝士遂云雍將謀逆於河陰遇害贈假黃鉞相國諡文穆王雍識懷短淺又無學業雖位居朝首不為時情所推既以親尊地當宰輔自熙平以後朝政褫落不能守正匡弼唯唯而已及清河王懌之死元叉專政天下大責歸焉嫡子泰字昌頗有時譽為中書侍郎尋遷通直散騎常侍鎮東將軍太常卿與雍同時遇害追贈侍中特進驃騎大將軍太尉公武州刺史高陽王諡曰文孝子斌襲武定中官至尚書右僕射齊受禪爵例降泰兄端字宣雅美容貌頗涉書史起家散騎侍郎累遷通直常侍鴻臚太常少卿散騎常侍出為安東將軍青州刺史是時蕭衍遣將寇逼徐揚除端撫軍將軍金紫光祿大夫使持節東南道大使處分軍機賊平拜鎮軍將軍兗州刺史俄而衍將復寇徐兗圍逼州城端率在州文武拒守得全以功封安德縣開國公食邑五百戶還除都官尚書與雍俱遇害贈車騎大將軍儀同三司相州刺史子峻襲爵齊受禪例降泰弟叡字子哲輕忽榮利愛玩琴書起家拜通直散騎侍郎遷衞尉少卿轉光祿少卿封濟北郡王與雍俱遇害贈車騎大將軍司空公雍州刺史子徽普泰中襲爵起家通直郎武定五年坐與元瑾等謀反伏法叡弟誕字文發少聰惠有風儀起家通直郎遷中書侍郎通直散騎常侍封新陽縣開國伯食邑三百戶加龍驤將軍進封昌樂王食邑七百戶遷平南將軍散騎常侍黃門侍郎孝靜初拜侍中車騎大將軍儀同三司司州牧天平三年薨贈使持節侍中太保司徒公尚書令將軍牧如故諡曰文獻無子以斌第二子子亮為後誕弟勒叉勒叉弟亘亘弟伏陀伏陀弟彌陀彌陀弟僧育僧育弟居羅出帝初勒叉封陽平縣亘封濮陽縣伏陀封武陽縣彌陀封新陽縣僧育封頓丘縣居羅封衞縣並開國伯食邑四百戶天平中並除鎮遠將軍散騎侍郎僧育走關西國除其餘齊受禪爵例降北海王詳字季豫美姿容善舉止太和九年封加侍中征北大將軍後拜光祿大夫解侍中將軍又兼侍中從高祖南伐為散騎常侍高祖自洛北巡詳常與侍中彭城王勰並在輿輦陪侍左右至高宗射銘之所高祖停駕詔諸弟及侍臣皆試射遠近唯詳箭不及高宗箭所十餘步高祖嘉之拊掌欣笑遂詔勒銘親自為制五等開建食邑二千戶遷侍中轉祕書監車駕南伐詳行中領軍留守給鼓吹一部甲仗三百人兼督營構之務高祖賜詳璽書曰比遊神何業也丘墳六籍何事非娛善正風猷肅是禁旅詳後朝於行宮高祖引見之詳慶平沔北高祖曰朕以畿南未清神麾暫動沔北數城並皆柔服此乃將士之効非朕之功詳對曰陛下德邁唐虞功微周漢自南之風於是乎始詳還洛高祖餞之詔詳曰昔者淮夷叛命故有三年之舉鬼方不令乃致淹載之師況江吳竊命于今十紀朕必欲蕩滌南海然後言歸今夏停此故與汝相見善守京邑副我所懷趙郡王幹薨以詳行司州牧除護軍將軍兼尚書左僕射高祖臨崩顧命詳為司空輔政世宗即位以詳有營構之勤增邑一千戶詳以帝居諒闇不受世宗覽政遷侍中大將軍錄尚書事咸陽王禧之謀反也詳表求解任詔曰一人之身愆不累德形乖性別忠逆固殊是以父殛子興義高唐世弟戮兄登迹顯周魯禧之與國異體同氣既肆無君之逆安顧弟友之親叔父忠顯二朝誠貫廟社實勗贊沖昧保鴻猷豈容以微介之慮忘阿衡之重貂章即已敕還願不再述祚屬眇躬言及斯事臨紙慚恨惋慨兼深詳重表陳解詔復不許除太傅領司徒侍中錄尚書事如故詳固辭詔遣敦勸乃受詳與八座奏曰竊惟姦劫難除為蠹日久羣盜作患有國攸病故五刑為用猶陷觸網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治本整網提目政之大要謹尋奪祿事條班已周歲然京邑尹令善惡易聞邊州遠守或難聽審皆上下同情迭相掩沒設有賊發隱而不言或以劫為偷或遏掠成盜更令賊發難知攘竊惟甚臣等參議若依制削奪則縣無期月之宰附條貶黜郡靡歲稔之守此制必行所謂法令滋章盜賊多有昔黃龔變風不由削祿張趙稱美豈憚貶退然綏導之體得失在人乃可重選慎官依律劾禁不宜輕改法令削黜羣司今請改制條還附律處其勵己公清賞有常典風謠黷賄案為考第世宗從之詳之拜命其夜暴風震電拔其庭中桐樹大十圍倒立本處初世宗之覽政也詳聞彭城王勰有震主之慮而欲奪其司徒大懼物議故為大將軍至是乃居之天威如此識者知其不終世宗講武於鄴詳與右僕射高肇領軍于勁留守京師初太和末詳以少弟延愛景明初復以季父崇寵位望兼極百僚憚之而貪冒無厭多所取納公私營販侵剝遠近嬖狎羣小所在請託珍麗充盈聲色侈縱建飾第宇開起山池所費巨萬矣又於東掖門外大路之南驅逼細人規占第宅至有喪柩在堂請延至葬而不見許乃令輿櫬巷次行路哀嗟詳母高太妃頗亦助為威虐親命毆擊怨響嗷嗷妃宋王劉昶女不見答禮寵妾范氏愛等伉儷及其死也痛不自勝乃至葬訖猶毀要視之表請贈平昌縣君詳又蒸於安定王爕妃高氏高氏即茹皓妻姊嚴禁左右閉密始末詳既素附於皓又緣淫好往來綢密皓之取妻也詳親至其家忻飲極醉詳雖貪侈聚斂朝野所聞而世宗禮敬尚隆憑寄無替軍國大事總而裁決每所敷奏事皆協允詳常別住華林園之西隅與都亭宮館密邇相接亦通後門世宗每潛幸其所肆飲終日其寵如此又詳拜受因其私慶啟請世宗世宗頻幸南第御其後堂與高太妃相見呼為阿母伏而上酒禮若家人臨出高每拜送舉囇祝言願官家千萬歲壽歲歲一至妾母子舍也初世宗之親政也詳與咸陽王禧彭城王勰並被召入共乘犢車防衞嚴固高時惶迫以為詳必死亦乘車傍路哭而送至金墉及詳得免高云自今而後不願富貴但令母子相保共汝掃市作活也至此貴寵崇盛不復言有禍敗之理後為高肇所譖云詳與皓等謀為逆亂于時詳在南第世宗召中尉崔亮入禁敕糾詳貪淫及茹皓劉冑常季賢陳掃靜等專恣之狀亮乃奏詳貪害公私淫亂典禮朝廷比以軍國費廣禁斷諸蕃雜獻而詳擅作威令命寺署酬直驅奪人業崇侈私第蒸穢無道失尊卑之節塵敗憲章虧風教之紀請以見事免所居官爵付鴻臚削奪輒下禁止付廷尉治罪并劾皓等夜即收禁南臺又虎賁百人圍守詳第慮其驚懼奔越遣左右郭翼開金墉門馳出諭之示以中尉彈狀詳母高見翼頓首號泣不自勝詳言審如中尉所糾何憂也正恐更有大罪橫至耳人奉我珍異貨物我實愛之果為取受吾何憂乎私以自寬至明皓等皆賜死引高陽王雍等五王入議詳罪單車防守還華林之館母妻相與哭入所居小奴弱婢數人隨從官防甚嚴終夜擊柝列坐圍守外內不通世宗為此不幸園十餘日徙詳就太府寺圍禁彌切詔曰王位兼台輔親懿莫二朝野屬賴具瞻所歸不能勵德存道宣融軌訓方乃肆茲貪靦穢暴顯聞遠負先朝友愛之寄近乖家國推敬所期理官執憲實合刑典天下為公豈容私抑但朕諸父傾落存者無幾便極逮坐情有未安可免為庶人別營坊館如法禁衞限以終身邦家不造言尋感慨遂別營館於洛陽縣東北隅二旬而成將徙詳居之會其家奴數人陰結黨輩欲以劫出詳密抄名字潛託侍婢通於詳詳始得執省而門防主司遙見突入就詳手中攬得呈奏至夜守者以聞詳哭數聲而暴死詳自至太府令其母妻還居南宅五日一來與其相見此夜母妻不在死於婢手中至明告其凶問詔曰北海叔奄至傾背痛慕抽慟情不自任明便舉哀可敕備辦喪還南宅諸王皇宗悉令奔赴給東園祕器賵物之數一依廣陵故事詳之初禁也乃以蒸高事告母母大怒詈之苦切曰汝自有妻妾侍婢少盛如花何忽共許高麗婢姦通令致此罪我得高麗當噉其肉乃杖詳背及兩脚百餘下自行杖力疲乃令奴代高氏素嚴詳每有微罪常加責罰以絮裹杖至是去絮皆至瘡膿詳苦杖十餘日乃能立又杖其妃劉氏數十云新婦大家女門戶匹敵何所畏也而不檢校夫婿婦人皆妬獨不妬也劉笑而受罰卒無所言詳貪淫之失雖聞遠近而死之日罪無定名遠近歎怪之停殯五載永平元年十月詔曰故太傅北海王體自先皇特鍾友愛受遺訓輔沖昧攸記不圖暮節晦德終缺哀榮便可追復王封克日營厝少慰幽魂以旌陰疑戚諡曰平王子顥字子明襲少慷慨有壯氣除龍驤將軍通直散騎常侍轉宗正卿光祿大夫長兼宗正卿散騎常侍, WYG: ''}
  - {type: variant, offset: 8281, length: 4805, content: 太保領太尉侍中如故世宗行考陟之法雍表曰竊惟三載考績百王通典今任事上中者三年昇一階散官上第者四載登一級閑冗之官本非虛置或以賢能而進或因累勤而舉如其無能不應忝茲高選既其以能進之朝伍或任官外戍遠使絕域催督逋懸察檢州鎮皆是散官以充劇使及於考陟排同閑伍檢散官之人非才皆劣稱事之輩未必悉賢而考閑以多年課煩以少歲上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明參差之考非聖慈之心改典易常乃有司之意又尋考級之奏委於任事之手涉議科勤絕於散官之筆遂使在事者得展自勤之能散輩者獨絕披衿之所抑以上下之閑限以旨格之判致使近侍禁職抱槃屈之辭禁衞武夫懷不申之恨欲克平四海何以獲諸又散官在直一玷成尤銜使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以祿微加賞罪殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啟處又曰豈不懷歸畏此簡書依依楊柳以叙治兵之役霏霏雨雪又申振旅之勤若折往來日月便是採薇之詩廢杕杜之歌罷又任事之官吉凶請假定省掃拜動歷十旬或因患重請動輒經歲征役在途勤泰百倍苦樂之勢非任事之倫在家私閑非理務之日論優語劇先宜折之武人本挽上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不涉或帶甲連年負重千里或經戰損傷或年老衰竭今試以本格責其如初有爽於先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彥或歷嶮千餘或履危萬里登有死亡之憂咸懷不返之戚魂骨奉忠以尸將命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以奬勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年昇一階檢無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上陟上第之士由汎而退臣又見部尉資品本居流外刊諸明令行之已久然近為里巷多盜以其威輕不肅欲進品清流以壓姦宄甄琛啟云為法者施而觀之不便則改竊謂斯言有可採用聖慈昭覽更高宰尉之秩今考格始宣懷怨者衆臣竊觀之亦謂不可有光國典改之何難世宗乃引雍共論時務肅宗初詔雍入居太極西栢堂諮決大政給親信二十人又詔雍為宗師進太傅侍中領太尉公王如故別敕將作營國子學寺給雍居之領軍于忠擅權專恣僕射郭祚勸雍出之忠怒矯詔殺祚及尚書裴植廢雍以王歸第朝有大事使黃門郎就諮訪之忠尋復矯詔將欲殺雍以問侍中崔光光拒之乃止未幾靈太后臨朝出忠為冀州刺史雍表曰臣初入栢堂見詔旨之行一由門下而臣出君行不以悛意每覽傷矜視之慘目深知不可不能禁制臣之罪一也臣近忝內樞兼尸師傅宜保護聖躬溫凊晨夕而于忠身居武司禁勒自在限以內外朝謁簡絕皇居寢食所在不知社稷安危又亦不預出入栢堂尸立而已臣之罪二也忠規欲殺臣賴在事執拒又令僕卿相任情進黜遷官授職多不經旬斥退賢良專納心腹威振百僚勢傾朝野臣見其如此欲出忠為雍州刺史鎮撫關右在心未行反為忠廢忝官尸祿孤負恩私臣之罪三也先帝昇遐儲宮纂統斯乃君父之謨臣子之永則加賞之義自古無之忠既人臣受恩先帝喪禍之際竭節是常迎陛下於東宮臣下之事如其不爾更欲何為而忠意氣凌雲坐要封爵爾日抑之交恐為禍臣以權臣所欲不敢輒違即集王公卿士議其多少清河王臣懌先帝懿弟識度寬明臨衆唱議非以勤而賞之憚違權臣之旨望顏而授臣知不可因而從之臣之罪四也忠秉權門下且居宰執又總禁旅為崇訓衞尉身兼內外橫干宮掖臣之罪五也古者重罪必令三公會期至旬日所以重死刑也先帝登極十有七年細人犯刑猶寬憲墨朝廷貴仕不戮一人今陛下踐阼年未半周殺僕射尚書如夭一草是忠秉權矯旨擅行誅戮臣知不能救臣之罪六也臣位荷師相年未及終難恕之罪顯露非一何情以處何顏以生雖經恩宥猶有餘責謹反私門伏聽司敗靈太后感忠保護之勳不問其罪增雍封一千戶除侍中太師又加使持節以本官領司州牧雍表請王公以下賤妾悉不聽用織成錦繡金玉珠璣違者以違旨論奴婢悉不得衣綾綺纈止於縵繒而已奴則布服並不得以金銀為釵帶犯者鞭一百太后從之而不能久行也詔雍乘步挽出入掖門又以本官錄尚書事雍頻表辭遜優答不許詔侍中敦諭詔雍朝夕侍講肅宗覽政除使持節司州牧侍中太師錄尚書如故肅宗加元服雍兼太保與兼太尉崔光攝行冠禮詔雍乘車出入大司馬門進位丞相給羽葆鼓吹倍加班劍餘悉如故又賜帛八百匹與一千人供具催令速拜詔雍依齊郡順王簡太和故事朝訖引坐特優拜伏之禮總攝內外與元叉同決庶政歲祿萬餘粟至四萬伎侍盈房諸子璫冕榮貴之盛昆弟莫及焉元妃盧氏薨後更納博陵崔顯妹甚有色寵欲以為妃世宗初以崔氏世號東崔地寒望劣難之久乃聽許延昌已後多幸妓侍近百許人而疏棄崔氏別房幽禁不得關豫內政僅給衣食而已至乃左右無復婢使子女欲省其母必啟聞許乃得見未幾崔暴薨多云雍毆殺之也靈太后許賜其女妓未及送之雍遣其閹竪丁鵝自至宮內料簡四口冒以還第太后責其專擅追停之孝昌初詔曰比相府弗開陰陽未變王秉哲居宗勳望隆重道庇蒼生威被華裔體國猶家匪躬在節可開府置佐史尋罷司徒以為丞相府孝莊初尒朱榮欲害朝士遂云雍將謀逆於河陰遇害贈假黃鉞相國諡文穆王雍識懷短淺又無學業雖位居朝首不為時情所推既以親尊地當宰輔自熙平以後朝政褫落不能守正匡弼唯唯而已及清河王懌之死元叉專政天下大責歸焉嫡子泰字昌頗有時譽為中書侍郎尋遷通直散騎常侍鎮東將軍太常卿與雍同時遇害追贈侍中特進驃騎大將軍太尉公武州刺史高陽王諡曰文孝子斌襲武定中官至尚書右僕射齊受禪爵例降泰兄端字宣雅美容貌頗涉書史起家散騎侍郎累遷通直常侍鴻臚太常少卿散騎常侍出為安東將軍青州刺史是時蕭衍遣將寇逼徐揚除端撫軍將軍金紫光祿大夫使持節東南道大使處分軍機賊平拜鎮軍將軍兗州刺史俄而衍將復寇徐兗圍逼州城端率在州文武拒守得全以功封安德縣開國公食邑五百戶還除都官尚書與雍俱遇害贈車騎大將軍儀同三司相州刺史子峻襲爵齊受禪例降泰弟叡字子哲輕忽榮利愛玩琴書起家拜通直散騎侍郎遷衞尉少卿轉光祿少卿封濟北郡王與雍俱遇害贈車騎大將軍司空公雍州刺史子徽普泰中襲爵起家通直郎武定五年坐與元瑾等謀反伏法叡弟誕字文發少聰惠有風儀起家通直郎遷中書侍郎通直散騎常侍封新陽縣開國伯食邑三百戶加龍驤將軍進封昌樂王食邑七百戶遷平南將軍散騎常侍黃門侍郎孝靜初拜侍中車騎大將軍儀同三司司州牧天平三年薨贈使持節侍中太保司徒公尚書令將軍牧如故諡曰文獻無子以斌第二子子亮為後誕弟勒叉勒叉弟亘亘弟伏陀伏陀弟彌陀彌陀弟僧育僧育弟居羅出帝初勒叉封陽平縣亘封濮陽縣伏陀封武陽縣彌陀封新陽縣僧育封頓丘縣居羅封衞縣並開國伯食邑四百戶天平中並除鎮遠將軍散騎侍郎僧育走關西國除其餘齊受禪爵例降北海王詳字季豫美姿容善舉止太和九年封加侍中征北大將軍後拜光祿大夫解侍中將軍又兼侍中從高祖南伐為散騎常侍高祖自洛北巡詳常與侍中彭城王勰並在輿輦陪侍左右至高宗射銘之所高祖停駕詔諸弟及侍臣皆試射遠近唯詳箭不及高宗箭所十餘步高祖嘉之拊掌欣笑遂詔勒銘親自為制五等開建食邑二千戶遷侍中轉祕書監車駕南伐詳行中領軍留守給鼓吹一部甲仗三百人兼督營構之務高祖賜詳璽書曰比遊神何業也丘墳六籍何事非娛善正風猷肅是禁旅詳後朝於行宮高祖引見之詳慶平沔北高祖曰朕以畿南未清神麾暫動沔北數城並皆柔服此乃將士之効非朕之功詳對曰陛下德邁唐虞功微周漢自南之風於是乎始詳還洛高祖餞之詔詳曰昔者淮夷叛命故有三年之舉鬼方不令乃致淹載之師況江吳竊命于今十紀朕必欲蕩滌南海然後言歸今夏停此故與汝相見善守京邑副我所懷趙郡王幹薨以詳行司州牧除護軍將軍兼尚書左僕射高祖臨崩顧命詳為司空輔政世宗即位以詳有營構之勤增邑一千戶詳以帝居諒闇不受世宗覽政遷侍中大將軍錄尚書事咸陽王禧之謀反也詳表求解任詔曰一人之身愆不累德形乖性別忠逆固殊是以父殛子興義高唐世弟戮兄登迹顯周魯禧之與國異體同氣既肆無君之逆安顧弟友之親叔父忠顯二朝誠貫廟社實勗贊沖昧保鴻猷豈容以微介之慮忘阿衡之重貂章即已敕還願不再述祚屬眇躬言及斯事臨紙慚恨惋慨兼深詳重表陳解詔復不許除太傅領司徒侍中錄尚書事如故詳固辭詔遣敦勸乃受詳與八座奏曰竊惟姦劫難除為蠹日久羣盜作患有國攸病故五刑為用猶陷觸網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治本整網提目政之大要謹尋奪祿事條班已周歲然京邑尹令善惡易聞邊州遠守或難聽審皆上下同情迭相掩沒設有賊發隱而不言或以劫為偷或遏掠成盜更令賊發難知攘竊惟甚臣等參議若依制削奪則縣無期月之宰附條貶黜郡靡歲稔之守此制必行所謂法令滋章盜賊多有昔黃龔變風不由削祿張趙稱美豈憚貶退然綏導之體得失在人乃可重選慎官依律劾禁不宜輕改法令削黜羣司今請改制條還附律處其勵己公清賞有常典風謠黷賄案為考第世宗從之詳之拜命其夜暴風震電拔其庭中桐樹大十圍倒立本處初世宗之覽政也詳聞彭城王勰有震主之慮而欲奪其司徒大懼物議故為大將軍至是乃居之天威如此識者知其不終世宗講武於鄴詳與右僕射高肇領軍于勁留守京師初太和末詳以少弟延愛景明初復以季父崇寵位望兼極百僚憚之而貪冒無厭多所取納公私營販侵剝遠近嬖狎羣小所在請託珍麗充盈聲色侈縱建飾第宇開起山池所費巨萬矣又於東掖門外大路之南驅逼細人規占第宅至有喪柩在堂請延至葬而不見許乃令輿櫬巷次行路哀嗟詳母高太妃頗亦助為威虐親命毆擊怨響嗷嗷妃宋王劉昶女不見答禮寵妾范氏愛等伉儷及其死也痛不自勝乃至葬訖猶毀要視之表請贈平昌縣君詳又蒸於安定王爕妃高氏高氏即茹皓妻姊嚴禁左右閉密始末詳既素附於皓又緣淫好往來綢密皓之取妻也詳親至其家忻飲極醉詳雖貪侈聚斂朝野所聞而世宗禮敬尚隆憑寄無替軍國大事總而裁決每所敷奏事皆協允詳常別住華林園之西隅與都亭宮館密邇相接亦通後門世宗每潛幸其所肆飲終日其寵如此又詳拜受因其私慶啟請世宗世宗頻幸南第御其後堂與高太妃相見呼為阿母伏而上酒禮若家人臨出高每拜送舉囇祝言願官家千萬歲壽歲歲一至妾母子舍也初世宗之親政也詳與咸陽王禧彭城王勰並被召入共乘犢車防衞嚴固高時惶迫以為詳必死亦乘車傍路哭而送至金墉及詳得免高云自今而後不願富貴但令母子相保共汝掃市作活也至此貴寵崇盛不復言有禍敗之理後為高肇所譖云詳與皓等謀為逆亂于時詳在南第世宗召中尉崔亮入禁敕糾詳貪淫及茹皓劉冑常季賢陳掃靜等專恣之狀亮乃奏詳貪害公私淫亂典禮朝廷比以軍國費廣禁斷諸蕃雜獻而詳擅作威令命寺署酬直驅奪人業崇侈私第蒸穢無道失尊卑之節塵敗憲章虧風教之紀請以見事免所居官爵付鴻臚削奪輒下禁止付廷尉治罪并劾皓等夜即收禁南臺又虎賁百人圍守詳第慮其驚懼奔越遣左右郭翼開金墉門馳出諭之示以中尉彈狀詳母高見翼頓首號泣不自勝詳言審如中尉所糾何憂也正恐更有大罪橫至耳人奉我珍異貨物我實愛之果為取受吾何憂乎私以自寬至明皓等皆賜死引高陽王雍等五王入議詳罪單車防守還華林之館母妻相與哭入所居小奴弱婢數人隨從官防甚嚴終夜擊柝列坐圍守外內不通世宗為此不幸園十餘日徙詳就太府寺圍禁彌切詔曰王位兼台輔親懿莫二朝野屬賴具瞻所歸不能勵德存道宣融軌訓方乃肆茲貪靦穢暴顯聞遠負先朝友愛之寄近乖家國推敬所期理官執憲實合刑典天下為公豈容私抑但朕諸父傾落存者無幾便極逮坐情有未安可免為庶人別營坊館如法禁衞限以終身邦家不造言尋感慨遂別營館於洛陽縣東北隅二旬而成將徙詳居之會其家奴數人陰結黨輩欲以劫出詳密抄名字潛託侍婢通於詳詳始得執省而門防主司遙見突入就詳手中攬得呈奏至夜守者以聞詳哭數聲而暴死詳自至太府令其母妻還居南宅五日一來與其相見此夜母妻不在死於婢手中至明告其凶問詔曰北海叔奄至傾背痛慕抽慟情不自任明便舉哀可敕備辦喪還南宅諸王皇宗悉令奔赴給東園祕器賵物之數一依廣陵故事詳之初禁也乃以蒸高事告母母大怒詈之苦切曰汝自有妻妾侍婢少盛如花何忽共許高麗婢姦通令致此罪我得高麗當噉其肉乃杖詳背及兩脚百餘下自行杖力疲乃令奴代高氏素嚴詳每有微罪常加責罰以絮裹杖至是去絮皆至瘡膿詳苦杖十餘日乃能立又杖其妃劉氏數十云新婦大家女門戶匹敵何所畏也而不檢校夫婿婦人皆妬獨不妬也劉笑而受罰卒無所言詳貪淫之失雖聞遠近而死之日罪無定名遠近歎怪之停殯五載永平元年十月詔曰故太傅北海王體自先皇特鍾友愛受遺訓輔沖昧攸記不圖暮節晦德終缺哀榮便可追復王封克日營厝少慰幽魂以旌陰疑戚諡曰平王子顥字子明襲少慷慨有壯氣除龍驤將軍通直散騎常侍轉宗正卿光祿大夫長兼宗正卿散騎常侍, krp: ''}
