  - {type: variant, offset: 5100, length: 1, content: 子, WYG: 超宗之從兄也時裴叔業率王茂先李定等来侵楚王戍永適還州肅復令大討之永將心腹一人馳詣楚王戍至即令填塞外塹夜伏戰士一千人於城外曉而叔業等至江於城東列陳将置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陳自率精甲數千救之永上門樓觀叔業南行五六里許更開門奮擊遂摧破之叔業進退失圗於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虛實足䘮其膽存此足矣何假逐之獲叔業傘扇鼓幕甲仗萬餘兩月之中遂獻再㨗髙}
