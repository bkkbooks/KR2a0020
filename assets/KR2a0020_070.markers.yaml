  - {type: variant, offset: 519, length: 192, content: 國育民之方金玉是虛華損德之物故先皇深觀古今去諸奢侈服御尚質不貴雕鏤所珍在素不務奇綺至乃以紙絹為帳扆銅鐵為轡勒訓朝廷以節儉示百姓以憂務日夜孜孜小大必慎輕賤珠璣示其無設府藏之金裁給而已更不買積以費國資逮景明之初承升平之業四疆清晏遠邇來同於是蕃貢繼路商賈交入諸所獻貿倍多於常雖加以節約猶歲損萬計珍貨常有餘國用不足若不裁其分限便恐無以支歲自今非為要須者請皆不受世宗從之尋正尚書常侍如故蕭衍梁秦, WYG: ''}
