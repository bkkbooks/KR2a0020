  - {type: variant, offset: 5595, length: 327, content: 朝廷嗟惜焉贈建威將軍平州刺史樂城子諡曰定祐從子虬字神虎少為三禮鄭氏學明經有文思舉秀才上第為中書議郎尚書殿中郎高祖因公事與語問朝覲宴饗之禮虬以經對大合上旨轉司徒屬國子博士高祖崩尚書令王肅多用新儀虬往往折以五經正禮轉尚書右丞徙左丞多所糾正臺閣肅然時雁門人有害母者八座奏轘之而潴其室宥其二子虬駁奏云君親無將將而必誅今謀逆者戮及期親害親者今不及子既逆甚梟鏡禽獸之不若而使禋祀不絕遺育永傳非所以勸忠孝之道存三綱之義若聖教含容不加孥戮使父子罪不相及惡止於其身不則宜投之四裔敕所在不聽配匹盤庚言無令易種於新邑漢法五月食梟羹皆欲絕其類也奏入世宗從之尋除司徒右長史遷龍驤將軍光祿少卿虬母在鄉遇患請假歸值秋水暴長河梁破絕虬得一小船而渡漏而不沒時人異之母喪哀毀過禮為時所稱年四, WYG: ''}
