  - {type: variant, offset: 7781, length: 1, content: 吏, WYG: 鎮於合肥蕭衍民歸之者數千户後武興氐楊集義反叛推其兄子紹先為主攻圍關城梁州刺史邢巒遣豎眼討之集義衆逆戰頻破走之乗勝追北仍剋武興還洛詔假節行南兖州事豎眼善於綏撫南人多歸之轉昭武将軍益州刺史以州初置境逼巴獠給羽林虎賁三百人進號冠軍将軍及髙肇伐蜀假豎眼征虜將軍持節領歩兵三萬先討北巴蕭衍聞大軍西伐遣其寧州刺史任太洪從隂平偷路入益州北境欲擾動氐蜀以絶運路乗國諱班師遂扇誘土民奄破東洛除口二戍因此詐言南軍繼至氐蜀信之翕然從逆太洪率氐蜀數千圍逼關城豎眼遣寜朔将軍成興孫討之軍次白護太洪遣其輔國將軍任碩北等率衆一千邀險拒戰在虎徑南山連置三營興孫分遣諸統隨便掩擊皆破之太洪又遣軍主邊昭等率氐蜀三千攻逼興孫柵興孫力戰為流矢所中死豎眼又遣統軍姜喜季元度從東嵠潛入回出西崗邀賊之後表裏合擊大破之斬邊昭及太洪前}
