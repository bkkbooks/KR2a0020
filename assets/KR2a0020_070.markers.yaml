  - {type: variant, offset: 5924, length: 1076, content: 卒贈征虜將軍幽州刺史諡曰威虬善與人交清河崔亮頓丘李平並與親善所作碑頌雜筆三十餘篇有二子長子臧在文苑傳臧弟子才武定末太常卿虬從子策亦有才學卒於齊王儀同開府主簿李平字曇定頓丘人也彭城王嶷之長子少有大度及長涉獵羣書好禮易頗有文才太和初拜通直散騎侍郎高祖禮之甚重頻經大憂居喪以孝稱後以例降襲爵彭城公拜太子中舍人遷散騎侍郎舍人如故遷太子中庶子平因侍從容請自效一郡高祖曰卿復欲以吏事自試也拜長樂太守政務清靜吏民懷之車駕南伐以平兼冀州儀同開府長史甚著聲稱仍除正長史太守如故未幾遂行河南尹豪右權貴憚之世宗即位除黃門郎遷司徒左長史行尹如故尋以稱職正尹長史如故車駕將幸鄴平上表諫曰伏見己丑詔書雲軒鑾輅行幸有期鳳服龍驂剋駕近日將欲講武淇陽大習鄴魏馳驌騻於綠竹之區騁驎驥於漳滏之壤斯誠幽顯同忻人靈共悅臣之愚管竊有惑焉何者嵩京創構洛邑俶營雖年跨十稔根基未就代民至洛始欲向盡資產罄於遷移牛畜斃於輦運陵太行之險越長津之難辛勤備經得達京闕富者猶損太半貧者可以意知兼歷歲從戎不遑啟處自景明已來差得休息事農者未積二年之儲築室者裁有數間之屋莫不肆力伊人急其務實宜安靜新人勸其稼穡令國有九年之糧家有水旱之備若乘之以羈紲則所廢多矣一夫從役舉家失業今復秋稼盈田禾菽遍野鑾駕所幸騰踐必殷未若端拱中天坐招四海耀武崧原禮射伊洛士馬無跋涉之勞兆民有康哉之詠可不美歟不從詔以本官行相州事世宗至鄴親幸平第見其諸子尋正刺史加征虜將軍平勸課農桑修飾太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二子於堂親為立讚前來臺使頗好侵取平乃畫履虎尾踐薄冰於客館注頌其下以示誡焉加平東將軍徵拜長兼度支尚書尋正尚書領御史中尉冀州刺史京兆王愉反於信都以平為使持節都督北討諸軍事鎮北將軍行冀州事以討之世宗臨式乾殿勞遣平曰愉朕之元弟居不疑之地豺狼之心不意而發欲上傾社稷下殘萬姓大義滅親夫豈獲止周公行之於古朕亦當行之於今委卿以專征之任必令應期摧殄務盡經略之規勿虧推轂之寄也何圖今日言及斯事因歔欷流涕平對曰臣愉天迷其心構此梟悖陛下不以臣不武委以總督之任今大宥既敷便應有征無戰脫守迷不悟者當仰憑天威抑厲將士譬猶太陽之消微露巨海之蕩熒燭天時人事滅在昭然如其稽顙軍門則送之大理若不悛待戮則鳴鼓釁鍾非陛下之事平進次經縣諸軍大集夜有蠻兵數千斫平前壘矢及平帳平堅臥不動俄而乃定遂至冀州城南十六里賊攻圍濟州軍拔柵填塹未滿者數尺諸將合戰無利而還憚於更進平親入行間勸以重賞士卒乃前大破逆衆愉時墜馬乃有一人下馬授愉止而鬬死乘勝逐北至於城門斬首數萬級遂圍城燒門愉與百餘騎突門出走遣統軍叔孫頭追之去信都十里擒愉冀州平世宗遣兼給事黃門侍郎祕書丞元梵宣旨慰勞徵, WYG: ''}
