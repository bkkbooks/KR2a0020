  - {type: variant, offset: 7786, length: 5, content: 以本官兼尚, WYG: 遣統軍傅曇表等大破衍寜朔將軍王光昭於隂平張齊仍阻白水屯寇葮萌豎眼分遣諸将水陸討之齊遣其寧朔将軍費忻督歩騎二千逆來拒戰軍主陳洪起力戰破之乗勝追奔遂臨夾谷三柵統軍胡小虎四面攻之三柵俱潰張齊親率驍勇二萬餘人與諸軍交戰豎眼命諸統帥同時奮擊軍主許暢斬衍雄信將軍牟興祖軍主孔領周射齊中足於是大破賊軍斬獲甚衆齊乃柵於虎頭山下賊帥任令崇屯據西郡豎眼復遣討之令崇棄衆夜遁乃進討齊破其二柵斬首萬餘齊被重創奔􅇡而退小劒大劒賊亦捐城西走益州平靈太后璽}
