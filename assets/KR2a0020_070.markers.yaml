  - {type: variant, offset: 7783, length: 1, content: 郎, WYG: 王隆護首於是太洪及關城五柵一時逃散豎眼性既清素不營産業衣食之外俸祿粟帛皆以饗賜夷首賑恤士卒撫蜀人以恩信為本保境安民不以小利侵竊有掠蜀民入境者皆移送還本土撿勒部下守宰肅然逺近雜夷相率欵謁仰其徳化思為魏民矣是以蜀民請軍者旬月相繼世宗甚嘉之肅宗初屢請解州乃以元法僧代之益州民追隨戀泣者數百里至洛拜征虜將軍太}
