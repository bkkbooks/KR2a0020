  - {type: variant, offset: 7013, length: 760, content: 先為尚書令高肇侍御史王顯所恨後顯代平為中尉平加散騎常侍顯劾平在冀州隱截官口肇又扶成其狀奏除平名延昌初詔復官爵除其定冀之勳前來良賤之訟多有積年不決平奏不問真偽一以景明年前為限於是諍訟止息武川鎮民飢鎮將任款請貸未許擅開倉賑恤有司繩以費散之條免其官爵平奏款意在濟人心無不善世宗原之遷中書令尚書如故肅宗初轉吏部尚書加撫軍將軍平高明強濟所在有聲但以性急為累尚書令任城王澄奏理平定冀之勳請酬以山河之賞靈太后乃封武邑郡開國公食邑一千五百戶縑二千五百匹先是蕭衍遣其左游擊將軍趙祖悅偷據西硤石衆至數萬以逼壽春鎮南崔亮攻之未克又與李崇乖貳詔平以本官使持節鎮軍大將軍兼尚書右僕射為行臺節度諸軍東西州將一以禀之如有乖異以軍法從事詔平長子奬以通直郎從賜平縑帛百段紫納金裝衫甲一領賜奬縑布六十段絳衲襖一領父子重列拜受家庭觀者榮之於是率步騎二千以赴壽春平巡視硤石內外知其盈虛之所嚴勒崇亮令水陸兼備剋期齊舉崇亮憚之無敢乖互頻日交戰屢破賊軍安南將軍崔延伯立橋於下蔡以拒賊之援軍賊將王神念昌義之等不得進救祖悅守死窮城平乃部分攻之令崔亮督陸卒攻其城西李崇勒水軍擊其東面然後鼓噪南北俱上賊衆周章東西赴戰屠賊外城賊之將士相率歸附袓悅率其餘衆固保南城通夜攻守至明乃降斬袓悅送首於洛俘獲甚衆以功遷尚書右僕射加散騎常侍將軍如故平還京師靈太后見於宣光殿賜以金裝刀杖一口時南徐州表云蕭衍堰淮水為患詔公卿議之平以為不假兵力終自毀壞及淮堰破靈太后大悅引群臣入宴敕平前鳴簫管肅宗手賜縑布百段熙平元年冬卒遺令薄葬詔給東園祕器朝服一具衣一襲帛七百匹靈太后為舉哀於東堂贈侍中驃騎大將軍儀同三司冀州刺史諡文烈公平自在度支至於端副夙夜在公孜孜匪懈凡處機密十有餘年有獻替之稱所製詩賦箴諫詠頌別有集錄平長子奬字遵穆襲容貌魁偉有當世才度自太尉參軍事稍遷通直郎中書侍郎直閤將軍吏部郎中征虜將軍遷安, WYG: ''}
