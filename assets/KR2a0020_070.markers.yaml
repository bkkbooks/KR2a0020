  - {type: variant, offset: 7785, length: 0, content: '', WYG: 大夫蕭衍遣將趙祖悦入屯硤石以逼夀春鎮南將軍崔亮討之以豎眼為持節鎮南軍司法僧既至大失民和蕭衍遣其信武将軍衡州刺史張齊因民心之怨入寇晉夀頻陷葮萌小劒諸戍進圍州城朝廷以西南為憂乃驛徴豎眼於淮南既至以為右將軍益州刺史尋加散騎常侍平西將軍假安西將軍西征都督率歩騎三千以討張齊給銅印千餘湏有假職者聼六品以下板之豎眼既出梁州衍冠軍将軍勾道侍梁州刺史王太洪等十餘將所在拒塞豎眼三日之中轉戰二百餘里甲不去身頻致九㨗土民統軍席廣度等處處邀擊斬太洪及衍征虜將軍楊伏錫等首張齊引兵西退遂奔葮萌蜀民聞豎眼復為刺史人人喜悦迎於路者日有百數豎眼至州白水以東民皆寜業先是蕭衍信義將軍都統白水諸軍事楊興起征虜將軍李光宗襲據白水舊城豎眼遣虎威将軍强虬與隂平王楊太赤率衆千餘夜渡白水旦而交戰大敗賊軍斬興起首剋復舊城}
