  - {type: variant, offset: 166, length: 1, content: 諡, WYG: 轉秦州刺史秦人恃嶮率多麤暴或拒課輸或害長吏自前守宰率皆依州遙領不入郡縣藻開示恩信誅戮豪横羌氐憚之守宰於是始得居其舊所遇車駕南伐以藻為東道都督秦人紛擾詔藻還州人情乃定仍與安南將軍元英征漢中頻破賊軍長驅至南鄭垂平梁州奉詔還軍乃不果克後車駕南伐以藻為征虜將軍督統軍髙聰等四軍為東道别將辭於洛水之南髙祖}
