  - {type: variant, offset: 8386, length: 2339, content: 構弟訓太尉默曹參軍奬弟諧字虔和風流閑潤博學有文辯當時才俊咸相欽賞受父前爵彭城侯自太尉參軍歷尚書郎徐州北海王顥撫軍府司馬入為長兼中書侍郎崔光引為兼著作郎諧在史職無所歷意加輔國將軍相州大中正光祿大夫除金紫光祿大夫加衞將軍元顥入洛以為給事黃門侍郎顥敗除名乃為述身賦曰夫休咎相躡禍福相生龜筮迷其兆聖達蔽其萌覽成敗於前迹料趣捨於人情咸爭途以走利罕外己以逃名連從車以載禍多馬以取刑豈知夫一介獨往乃千乘所不能傾伊薄躬之悔吝無性命之淑靈藉休庸於祖武仰餘烈於家聲徒從師以下學乏遊道於上京洎方年之四五實始筮之弱齡爰釋巾而從吏謬邀寵於時明彼之赫赫乃陋周而小漢帝文篤其成功我武治其未亂掩四奧而同軌穆三辰而貞觀威北暢而武戢鼎南遷而文煥異人相趨於絳闕鴻生接武於儒館總羣雅而同歸果方員而殊貫伊濫吹之所從初竊服於宰旅奉盛王之高義遊兔園而容與綴鴻鷺之末行連英髦之茂序及伯舅之西伐赫靈旗之東舉復奉役於前轅仍執覊於後距迫玄冬之暮歲歷關山之遐阻風激沙而破石雪浮河而漫野樂在志其無端悲涉物而多緒俄宮車之晏駕改乘轅而歸予屬推恩之在今自傍枝而禔福既獻以命宗叨微躬於侯服禮空文於覜饗賦無征於湯沐思守位而匪懈每屏居而自肅忽忝命於建禮遊丹綺之重複信茲選之為難乃上應於列宿陽源猶且自免何稱仲治與太叔余生之蕭散本寓名而為仕好不存於吏法才實疏於政理竟火燭之不事徒博弈其賢已竊自託於諸生頗馳騁於文史通人假其餘論士林察於理乃妄涉於風流遂飾輩於士子且以自託雖邇傒塵滓而賞許雲霞栖閑虛以築館背城闕而為家帶二學之高宇遠三市之狹邪事雖儉而未陋製有度而不奢山隱勢於複石水回流於激沙樹先春而動色草迎歲而發花座有清談之客門交好事之車或林嬉於月夜或水宴於景斜肆雕章之腴旨咀文藝之英華羞綠芰與丹藕薦朱李及甘瓜雖慚洛水之名致有類金谷之諠譁聊自足於所好豈留連於或號思炯戒而自反勗身名於所蹈奉哲后之淵猷讚崇麾於華奧豈千乘之乏使感一眄之相勞竟不留於三月因病滿而休告彼東觀之清華乃任隆於載筆蔡一去而貽恨張再還而有述忽牽短而濫官司惇史於藏室慚班子之繁麗微馬生之簡實復通籍而延寵陪帝扃之華密信儀鳳之所栖乃絲文之自出歷五載而徘徊猶官命之不改謝能飛於無翼故同滯於有待晚加秩於戎章乃號之斯在屬運道之將季諒冠屨之無礙奄昇御於鼎湖忽流哀於四海昔漢命之中微皇統於是三絕暨孝昌之陵陂亦繼而禍結將小雅之詩廢復三綱之道滅思跼蹐於時昏獨沉吟於運閉遂退處於窮里不外交於人世及數反於中興驅時雄而電逝既籍取亂之權方乘轉圓之勢俄隙開而守廢遂冠冕之毀裂彼膏原而塗野嗟衞肝與嵇血何古今之一揆每治少而亂多盧遁身於東掖荀窘迹於南羅時獲逃於阜仍竄宿於巖阿首丘急於明發東路長其如何遽登舟而鼓柂乃沿洛而汎河騖寸陰於不測競征鳥於歸波時在所而放命連百萬於山東何信都之巨猾若封豕與大風肆吞噬於觜距咸邑燼而野空徑黎陽之寇聚迫崖壘之渢隆躁通川而鼎沸矢交射於舟中備百罹於茲日諒陳蔡之非窮乘虎口而獲濟陵陽侯而迅往得投憩於濮陽實陶衞之舊壤望鄉村而佇立曾不遙之河廣聞虜馬之夕嘶見胡塵之晝上王略恢而廟勝車徒發而雷響扇風師之猛氣張天之層網裁一鼓而冰銷俄氛祲之廓蕩昔蘧生之出奔覩亡徵於亂政及季子之來反乃君立而位定伊吾人之蕞爾本無傒於衰盛忻草茅而偃伏且優遊於辰慶復推斥於宦流延光華於璽命甫聞內侍之忝復奉優加之令何金紫之陸離鬱貂玉之相映時權定之云初尚民心之易擾何建武之明傑茂雄姿於天表忽靈命之有歸藉親均而爭紹師出楚而飈發旆陵江而雲矯闢閶闔之崢嶸端冕旒於億兆神駕逝以流越翠華飈而繚繞苟命舛而數違雖功深而祚天時難忽然已及網羅周其四張非五三之親暱罕狥節於漢陽彼百僚之冠帶咸北面於西王矧恩疏而任遠固身存而義亡及宸居之反正振天網於頹綱甄大義以明罰虛半列於周行乃褫帶而來反驅下澤於故鄉探宿志以內求撫身途而自計不詭遇以邀合豈釣名以干世獨浩然而任己同虛舟之不繫既未識其所以來亦豈知其所以逝於是得喪同遣忘懷自深遇物栖息觸地山林雖因西浮之迹何異東都之心願自託於魚鳥永得性於飛沉庶保此以獲沒不再罪於當今孝靜初遭母憂還鄉里徵為魏尹將軍如故以禫制未終表辭朝議亦以為優仍許其讓蕭衍求通和好朝廷盛選行人以諧兼散騎常侍為聘使主諧至石頭蕭衍遣其主客郎范胥當接諧問胥曰主客在郎官幾時胥答曰我本訓冑虎門適復今任諧言國子博士不應左轉為郎胥答曰特為應接遠賓故權兼耳諧言屈己濟務誠得事宜由我一介行人令卿左轉胥答曰自顧菲薄不足對揚盛美豈敢言屈胥問曰今猶尚暖北間當小寒於此諧答曰地居陰陽之正寒暑適時不知多少胥曰所訪鄴下豈是測影之地諧答曰皆是皇居帝里相去不遠可得統而言之胥曰洛陽既稱盛美何事遷鄴諧答曰不常厥邑于茲五邦王者無所在關河復何所怪胥曰殷人否危故遷相耿貴朝何為而遷諧答聖人藏往知來相時而動何必俟於隆替胥曰金陵王氣兆於先代黃旗紫蓋本出東南君臨萬邦故宜在此諧答曰帝王符命豈得與中國比隆紫蓋黃旗終於入洛無乃自害也有口之說乃是俳諧亦何足道蕭衍親問諧曰魏朝人士德行四科之徒凡有幾人諧對曰本朝多士義等如林文武賢才布在列位四科之美非無其人庸短造次無以備啟衍曰武王有亂臣十人魏雖人物之盛豈得頓如卿言諧曰愚謂周稱十人本舉佐命至於濟濟多士實是文王之詩皇朝廊廟之才足與周人有競衍曰若爾文足標異武有冠絕者便可指陳諧曰大丞相勃海王秉文經武左右皇極畫一九州懸衡四海錄尚書汝陽王元叔昭尚書令元世儁宗室之秀綰政朝端左僕射司馬子如右僕射高隆之並時譽民英勠力匡輔侍中高岳侍中孫騰勳賢忠亮宣讚王猷自餘才美不可具悉衍曰故宜輔弼幼主永固基業深不可言江南稱其才辯使還除大司農卿加驃騎將軍轉祕書監遇偏風廢頓武定二年卒年四十九時人悼惜之贈驃騎大將軍衞尉卿齊州刺史所著文集別有集錄行於世長子嶽武定末司徒祭酒嶽弟庶尚書南主客郎諧弟邕字修穆幼而儁爽有逸才著作佐郎高陽王雍友凡所交遊皆倍年儁秀才藻之美為時所稱年二十五卒贈鎮遠將軍洛州刺史諡曰文, WYG: ''}
