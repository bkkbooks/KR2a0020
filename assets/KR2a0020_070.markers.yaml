  - {type: variant, offset: 1020, length: 3821, content: 斬景民巴西悉平蕭衍遣其冠軍將軍孔陵等率衆二萬屯據深坑冠軍將軍魯方達固南安冠軍將軍任僧褒輔國將軍李畎戍石同巒統軍王足所在擊破之梟衍輔國將軍樂保明寧朔將軍李伯度龍驤將軍李思賢賊遂保回車柵足又進擊衍輔國將軍范峻自餘斬獲殆將萬數孔陵等收集遺衆奔保梓潼足又破之斬衍輔國將軍符伯度其殺傷投溺者萬有餘人開地定民東西七百南北千里獲郡十四二部護軍及諸縣戍遂逼涪城巒表曰揚州成都相去萬里陸途既絕唯資水路蕭衍兄子淵藻去年四月十三日發揚州今歲四月四日至蜀水軍西上非周年不達外無軍援一可圖也益州頃經劉季連反叛鄧元起攻圍資儲散盡倉庫空竭今猶未復兼民人喪膽無復固守之意二可圖也蕭淵藻是裙屐少年未洽治務及至益州便戮鄧元起曹亮宗臨戎斬將則是駕馭失方范國惠津渠退敗鎖執在獄今之所任並非宿將重名皆是左右少年而已既不厭民望多行殘暴民心離解三可圖也蜀之所恃唯劍閣今既克南安已奪其險據彼界內三分已一從南安向涪方軌任意前軍累破後衆喪魂四可圖也昔劉禪據一國之地姜維為佐鄧艾既出綿竹彼即投降及苻堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓溫西征不旬月而平蜀地昔來多不守況淵藻是蕭衍兄子骨肉至親若其逃亡當無死理脫軍克涪城淵藻復何宜城中坐而受困若其出鬬庸蜀之卒唯便刀矟弓箭至少假有遙射弗至傷人五可圖也臣聞乘機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在於今矣是以踐極之初壽春馳款先歲命將義陽克闢淮外謐以風清荊沔於焉肅晏方欲偃甲息兵候機而動而天贊休明時來斯速雖欲靖戎理不獲已至使道遷歸誠漢境佇拔臣以不才屬當戎寄內省文吏不以軍謀自許指臨漢中惟規保疆守界事屬艱途東西寇竊上憑國威下仗將士邊帥用命頻有薄捷藉勢乘威經度大劍既克南安據彼要險前軍長邁已至梓潼新化之民翻然懷惠瞻望涪益旦夕可屠正以兵少糧匱未宜前出為爾稽緩懼失民心則更為寇今若不取後圖便難輒率愚管庶幾殄克如其無功分受憲坐且益州殷實戶餘十萬比壽春義陽三倍非匹可乘可利實在于茲若朝廷志存保民未欲經略臣之在此便為無事乞歸侍養微展烏鳥詔曰若賊敢闚觀機翦撲如其無也則安民保境以悅邊心子蜀之舉更聽後敕方將席卷岷蜀電掃西南何得辭以戀親中途告退宜勗令圖務申高略巒又表曰昔鄧艾鍾會率十八萬衆傾中國資給裁得平蜀所以然者鬬實力故也況臣才絕古人智勇又闕復何宜請二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可克今王足前進已逼涪城脫得涪城則益州便是成擒之物但得之有早晚耳且梓潼已附民戶數萬朝廷豈得不守之也若守也直保境之兵則已一萬臣今請二萬伍千所增無幾又劍閣天險古來所稱張載銘云世亂則逆世清斯順此之一言良可惜矣臣誠知征戎危事不易可為自軍度劍閣以來鬢髮中白憂慮戰懼寧可一日為心所以勉強者既得此地而自退不守恐辜先皇之恩遇負陛下之爵祿是以孜孜頻有陳請且臣之意算正欲先圖涪城以漸而進若克涪城便是中分益州之地斷水陸之衝彼外無援軍孤城自守復何能持久哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大克不得則自全又巴西南鄭相離一千四百去州迢遞多生動昔在南之日以其統綰勢難故增立巴州鎮靜夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯五三族落雖在山居而多有豪右文學箋啟往往可觀冠帶風流亦為不少但以去州既遠不能仕進至於州綱無由厠迹巴境民豪便是無梁州之分是以鬱怏多生動靜比建議之始嚴玄思自號巴州刺史克城以來仍使行事巴西廣袤一千戶餘四萬若彼立州鎮攝華獠則大帖民情從墊江已還不復勞征自為國有世宗不從又王足於涪城輒還遂不定蜀巒既克巴西遣軍主李仲遷守之仲遷得蕭衍將張法養女有美色甚惑之散費兵儲專心酒色公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城降衍將譙希遠巴西遂沒武興氐楊集起等反叛巒遣統軍傅豎眼討平之語在豎眼傳巒之初至漢中從容風雅接豪右以禮撫細民以惠歲餘之後頗因百姓去就誅滅齊民藉為奴婢者二百餘口兼商販聚歛清論鄙之徵授度支尚書時蕭衍遣兵侵軼徐兗緣邊鎮戍相繼陷沒朝廷憂之乃以巒為使持節都督東討諸軍事安東將軍尚書如故世宗勞遣巒於東堂曰蕭衍寇邊旬朔滋甚諸軍舛互規致連戍陷沒宋魯之民尤罹湯炭誠知將軍旋京未久膝下難違然東南之寄非將軍莫可將軍其勉建殊績以稱朕懷自古忠臣亦非無孝也巒對曰賊雖送死連城犬羊衆盛然逆順理殊滅當無遠況臣仗陛下之神算奉律以摧之平殄之期可指辰而待願陛下勿以東南為慮世宗曰漢祖有云金吾擊郾吾無憂矣今將軍董戎朕何慮哉先是蕭衍輔國將軍蕭及先率衆二萬寇陷固城冠軍將軍魯顯文驍騎將軍相文玉等率衆一萬屯於孤山衍將角念等率衆一萬擾亂龜蒙土民從逆十室而五巒遣統軍樊魯討文玉別將元攻固城統軍畢祖朽討角念樊魯大破文玉等追奔八十餘里斬首四千餘級元又破固城畢祖朽復破念等兗州悉平巒破賊將藍懷恭於睢口進圍宿豫而懷恭等復於清南造城規斷水陸之路巒身率諸軍自水南而進遣平南將軍楊大眼從北逼之統軍劉思祖等夾水造筏燒其船舫衆軍齊進拔柵填塹登其城火起中流四面俱擊仍陷賊城俘斬數萬在陳別斬懷恭擒其列侯列將直閤直後三十餘人俘斬一萬宿豫既平蕭昞亦於淮陽退走二戍獲米四十餘萬石世宗賜巒璽書曰知大龕醜虜威振賊庭淮外霧披徐方卷壒王略遠恢混一維始公私慶泰何快如之賊衍此舉實為傾國比者宿豫陷歿淮陽嬰城凶狡侜張規抗王旅將軍忠規協著火烈霜摧電動岱陰風掃沂嶧遂令逋誅之寇一朝殲夷元鯨大憝千里折首殊勳茂捷自古莫二但揚區未安餘燼宜盪乘勝掎角勢不可遺便可率厲三軍因時經略申威東南清彼江介忘此仍勞用圖永逸進退規度委之高算又詔巒曰淮陽宿豫雖已清復梁城之賊猶敢聚結事宜乘勝并勢摧殄可率二萬之衆渡淮與征南掎角以圖進取之計及梁城賊走中山王英乘勝攻鍾離又詔巒帥衆會之巒表曰奉被詔旨令臣濟淮與征南掎角乘勝長驅實是其會但愚懷所量竊有未盡夫圖南因於積風伐國在於資給用兵治戎須先計校非可抑為必勝幸其無能若欲掠地誅民必應萬勝如欲攻城取邑未見其果得之則所益未幾不獲則虧損必大蕭衍傾竭江東為今歲之舉疲兵喪衆大敗而還君臣失計取笑天下雖野戰非人敵守城足有餘今雖攻之未易可克又廣陵懸遠去江四十里鍾離淮陰介在淮外假其歸順而來猶恐無糧艱守況加攻討勞兵士乎且征南軍士從戎二時疲弊死病量可知已雖有乘勝之資懼無遠用之力若臣之愚見謂宜修復舊戍牢實邊方息養中州擬之後舉又江東之釁不患久無畜力待機謂為勝計詔曰濟淮掎角事如前敕何容猶爾磐桓方有此請可速進軍經略之宜聽征南至要巒又表曰蕭衍侵境久勞王師今者奔走實除邊患斯由靈贊皇魏天敗寇豎非臣等弱劣所能克勝若臣之愚見今正宜修復邊鎮俟之後動且蕭衍尚在凶身未除螳蜋之志何能自息唯應廣備以待其來實不宜勞師遠入自取疲困今中山進軍鍾離實所未解若能為得失之計不顧萬全直襲廣陵入其內地出其不備或未可知正欲屯兵蕭密餘軍猶自在彼欲言無糧運船復至而欲以八十日糧圖城者臣未之前聞且廣陵任城可為前戒豈容今者復欲同之今若往也彼牢城自守不與人戰城水深非可填塞空坐至春則士自弊苦遣臣赴彼糧何以致夏來之兵不齎冬服脫遇冰雪取濟何方臣寧荷怯懦不進之責不受敗損空行之罪鍾離天險朝貴所具若有內應則所不知如其無也必無克狀若其不復其辱如何若信臣言也願賜臣停若謂臣難行求回臣所領兵統悉付中山任其處分臣求單騎隨逐東西且俗諺云耕則問田奴絹則問織婢臣雖不武忝備征將前宜可否頗實知之臣既謂難何容強遣詔曰安東頻請罷軍遲回未往阻異戎規殊乖至望士馬既殷無容停積宜務神速東西齊契乘勝掃殄以赴機會巒累表求還世宗許之英果敗退時人伏其識略初侍中盧昶與巒不平昶與元暉俱世宗所寵御史中尉崔亮昶之黨也昶暉令亮糾巒事成許言於世宗以亮為侍中亮於是奏劾巒在漢中掠良人為奴婢巒懼為昶等所陷乃以漢中所得巴西太守龐景民女化生等二十餘口與暉化生等數人奇色也暉大悅乃背昶為巒言於世宗云巒新有大功已經赦宥不宜方為此獄也世宗納之高肇以巒有克敵之效而為昶等所排助巒申釋故得不坐豫州城民白早生殺刺史司馬悅以城南入蕭衍遣其冠軍將軍齊苟仁率衆入據懸瓠詔巒持節率羽林精騎以討之封平舒縣開國伯食邑五百戶賞宿豫之功也世宗臨東堂勞遣巒曰司馬悅不慎重門之戒智不足以謀身匪直喪元隸豎乃大虧王略懸瓠密邇近畿東南藩捍度公之在彼憂慮尤深早生理不獨立必遠引吳楚士民同惡勢或交兵卿文昭武烈朝之南仲故令卿星言電邁出其不意卿言早生走也守也何時可以平之巒對曰早生非有深謀大智能構成此也但因司馬悅虐於百姓乘衆怒而為之民為凶威所懾不得已而苟附假蕭衍軍入應水路不通糧運不繼亦成擒耳不能為害也早生得衍軍之接溺於利欲之情必守而不走今王師若臨士民必翻然歸順圍之窮城奔走路絕不度此年必傳首京師願陛下不足垂慮世宗笑曰卿言何其壯哉深會朕遣卿之意知卿親老頻勞於外然忠孝不俱才宜救世不得辭也於是巒率騎八百倍道兼行五日次於鮑口賊遣大將軍胡孝智率衆七千去城二百逆來拒戰巒擊破孝智乘勝長驅至於懸瓠賊出城逆戰又大破之因即渡汝既而大兵繼至遂長圍之詔加巒使持節假鎮南將軍都督南討諸軍事征南將軍中山王英南討三關亦次於懸瓠以後軍未至前寇稍多憚不敢進乃與巒分兵掎角攻之衍將齊苟仁等二十一人開門出降即斬早生等同惡數十人豫州平巒振旅還京師世宗臨東堂勞之曰卿役不踰時克清妖醜鴻勳碩美可謂無愧古人巒對曰此自陛下聖略威靈英等將士之力臣何功之有世宗笑曰卿匪直一月三捷所足稱奇乃存士伯欲功成而不處巒自宿豫大捷及平懸瓠志行修正不復以財賄為懷戎資軍實絲毫無犯遷殿中尚書加撫軍將軍延昌三年暴疾卒年五十一巒才兼文武朝野瞻望上下悼惜之詔賻帛四百匹朝服一襲贈車騎大將軍瀛州刺史初世宗欲贈冀州黃門甄琛以巒前曾劾己乃云瀛州巒之本邦人情所欲乃從之及琛為詔乃云優贈, WYG: 拜}
  - {type: variant, offset: 1020, length: 3821, content: 斬景民巴西悉平蕭衍遣其冠軍將軍孔陵等率衆二萬屯據深坑冠軍將軍魯方達固南安冠軍將軍任僧褒輔國將軍李畎戍石同巒統軍王足所在擊破之梟衍輔國將軍樂保明寧朔將軍李伯度龍驤將軍李思賢賊遂保回車柵足又進擊衍輔國將軍范峻自餘斬獲殆將萬數孔陵等收集遺衆奔保梓潼足又破之斬衍輔國將軍符伯度其殺傷投溺者萬有餘人開地定民東西七百南北千里獲郡十四二部護軍及諸縣戍遂逼涪城巒表曰揚州成都相去萬里陸途既絕唯資水路蕭衍兄子淵藻去年四月十三日發揚州今歲四月四日至蜀水軍西上非周年不達外無軍援一可圖也益州頃經劉季連反叛鄧元起攻圍資儲散盡倉庫空竭今猶未復兼民人喪膽無復固守之意二可圖也蕭淵藻是裙屐少年未洽治務及至益州便戮鄧元起曹亮宗臨戎斬將則是駕馭失方范國惠津渠退敗鎖執在獄今之所任並非宿將重名皆是左右少年而已既不厭民望多行殘暴民心離解三可圖也蜀之所恃唯劍閣今既克南安已奪其險據彼界內三分已一從南安向涪方軌任意前軍累破後衆喪魂四可圖也昔劉禪據一國之地姜維為佐鄧艾既出綿竹彼即投降及苻堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓溫西征不旬月而平蜀地昔來多不守況淵藻是蕭衍兄子骨肉至親若其逃亡當無死理脫軍克涪城淵藻復何宜城中坐而受困若其出鬬庸蜀之卒唯便刀矟弓箭至少假有遙射弗至傷人五可圖也臣聞乘機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在於今矣是以踐極之初壽春馳款先歲命將義陽克闢淮外謐以風清荊沔於焉肅晏方欲偃甲息兵候機而動而天贊休明時來斯速雖欲靖戎理不獲已至使道遷歸誠漢境佇拔臣以不才屬當戎寄內省文吏不以軍謀自許指臨漢中惟規保疆守界事屬艱途東西寇竊上憑國威下仗將士邊帥用命頻有薄捷藉勢乘威經度大劍既克南安據彼要險前軍長邁已至梓潼新化之民翻然懷惠瞻望涪益旦夕可屠正以兵少糧匱未宜前出為爾稽緩懼失民心則更為寇今若不取後圖便難輒率愚管庶幾殄克如其無功分受憲坐且益州殷實戶餘十萬比壽春義陽三倍非匹可乘可利實在于茲若朝廷志存保民未欲經略臣之在此便為無事乞歸侍養微展烏鳥詔曰若賊敢闚觀機翦撲如其無也則安民保境以悅邊心子蜀之舉更聽後敕方將席卷岷蜀電掃西南何得辭以戀親中途告退宜勗令圖務申高略巒又表曰昔鄧艾鍾會率十八萬衆傾中國資給裁得平蜀所以然者鬬實力故也況臣才絕古人智勇又闕復何宜請二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可克今王足前進已逼涪城脫得涪城則益州便是成擒之物但得之有早晚耳且梓潼已附民戶數萬朝廷豈得不守之也若守也直保境之兵則已一萬臣今請二萬伍千所增無幾又劍閣天險古來所稱張載銘云世亂則逆世清斯順此之一言良可惜矣臣誠知征戎危事不易可為自軍度劍閣以來鬢髮中白憂慮戰懼寧可一日為心所以勉強者既得此地而自退不守恐辜先皇之恩遇負陛下之爵祿是以孜孜頻有陳請且臣之意算正欲先圖涪城以漸而進若克涪城便是中分益州之地斷水陸之衝彼外無援軍孤城自守復何能持久哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大克不得則自全又巴西南鄭相離一千四百去州迢遞多生動昔在南之日以其統綰勢難故增立巴州鎮靜夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯五三族落雖在山居而多有豪右文學箋啟往往可觀冠帶風流亦為不少但以去州既遠不能仕進至於州綱無由厠迹巴境民豪便是無梁州之分是以鬱怏多生動靜比建議之始嚴玄思自號巴州刺史克城以來仍使行事巴西廣袤一千戶餘四萬若彼立州鎮攝華獠則大帖民情從墊江已還不復勞征自為國有世宗不從又王足於涪城輒還遂不定蜀巒既克巴西遣軍主李仲遷守之仲遷得蕭衍將張法養女有美色甚惑之散費兵儲專心酒色公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城降衍將譙希遠巴西遂沒武興氐楊集起等反叛巒遣統軍傅豎眼討平之語在豎眼傳巒之初至漢中從容風雅接豪右以禮撫細民以惠歲餘之後頗因百姓去就誅滅齊民藉為奴婢者二百餘口兼商販聚歛清論鄙之徵授度支尚書時蕭衍遣兵侵軼徐兗緣邊鎮戍相繼陷沒朝廷憂之乃以巒為使持節都督東討諸軍事安東將軍尚書如故世宗勞遣巒於東堂曰蕭衍寇邊旬朔滋甚諸軍舛互規致連戍陷沒宋魯之民尤罹湯炭誠知將軍旋京未久膝下難違然東南之寄非將軍莫可將軍其勉建殊績以稱朕懷自古忠臣亦非無孝也巒對曰賊雖送死連城犬羊衆盛然逆順理殊滅當無遠況臣仗陛下之神算奉律以摧之平殄之期可指辰而待願陛下勿以東南為慮世宗曰漢祖有云金吾擊郾吾無憂矣今將軍董戎朕何慮哉先是蕭衍輔國將軍蕭及先率衆二萬寇陷固城冠軍將軍魯顯文驍騎將軍相文玉等率衆一萬屯於孤山衍將角念等率衆一萬擾亂龜蒙土民從逆十室而五巒遣統軍樊魯討文玉別將元攻固城統軍畢祖朽討角念樊魯大破文玉等追奔八十餘里斬首四千餘級元又破固城畢祖朽復破念等兗州悉平巒破賊將藍懷恭於睢口進圍宿豫而懷恭等復於清南造城規斷水陸之路巒身率諸軍自水南而進遣平南將軍楊大眼從北逼之統軍劉思祖等夾水造筏燒其船舫衆軍齊進拔柵填塹登其城火起中流四面俱擊仍陷賊城俘斬數萬在陳別斬懷恭擒其列侯列將直閤直後三十餘人俘斬一萬宿豫既平蕭昞亦於淮陽退走二戍獲米四十餘萬石世宗賜巒璽書曰知大龕醜虜威振賊庭淮外霧披徐方卷壒王略遠恢混一維始公私慶泰何快如之賊衍此舉實為傾國比者宿豫陷歿淮陽嬰城凶狡侜張規抗王旅將軍忠規協著火烈霜摧電動岱陰風掃沂嶧遂令逋誅之寇一朝殲夷元鯨大憝千里折首殊勳茂捷自古莫二但揚區未安餘燼宜盪乘勝掎角勢不可遺便可率厲三軍因時經略申威東南清彼江介忘此仍勞用圖永逸進退規度委之高算又詔巒曰淮陽宿豫雖已清復梁城之賊猶敢聚結事宜乘勝并勢摧殄可率二萬之衆渡淮與征南掎角以圖進取之計及梁城賊走中山王英乘勝攻鍾離又詔巒帥衆會之巒表曰奉被詔旨令臣濟淮與征南掎角乘勝長驅實是其會但愚懷所量竊有未盡夫圖南因於積風伐國在於資給用兵治戎須先計校非可抑為必勝幸其無能若欲掠地誅民必應萬勝如欲攻城取邑未見其果得之則所益未幾不獲則虧損必大蕭衍傾竭江東為今歲之舉疲兵喪衆大敗而還君臣失計取笑天下雖野戰非人敵守城足有餘今雖攻之未易可克又廣陵懸遠去江四十里鍾離淮陰介在淮外假其歸順而來猶恐無糧艱守況加攻討勞兵士乎且征南軍士從戎二時疲弊死病量可知已雖有乘勝之資懼無遠用之力若臣之愚見謂宜修復舊戍牢實邊方息養中州擬之後舉又江東之釁不患久無畜力待機謂為勝計詔曰濟淮掎角事如前敕何容猶爾磐桓方有此請可速進軍經略之宜聽征南至要巒又表曰蕭衍侵境久勞王師今者奔走實除邊患斯由靈贊皇魏天敗寇豎非臣等弱劣所能克勝若臣之愚見今正宜修復邊鎮俟之後動且蕭衍尚在凶身未除螳蜋之志何能自息唯應廣備以待其來實不宜勞師遠入自取疲困今中山進軍鍾離實所未解若能為得失之計不顧萬全直襲廣陵入其內地出其不備或未可知正欲屯兵蕭密餘軍猶自在彼欲言無糧運船復至而欲以八十日糧圖城者臣未之前聞且廣陵任城可為前戒豈容今者復欲同之今若往也彼牢城自守不與人戰城水深非可填塞空坐至春則士自弊苦遣臣赴彼糧何以致夏來之兵不齎冬服脫遇冰雪取濟何方臣寧荷怯懦不進之責不受敗損空行之罪鍾離天險朝貴所具若有內應則所不知如其無也必無克狀若其不復其辱如何若信臣言也願賜臣停若謂臣難行求回臣所領兵統悉付中山任其處分臣求單騎隨逐東西且俗諺云耕則問田奴絹則問織婢臣雖不武忝備征將前宜可否頗實知之臣既謂難何容強遣詔曰安東頻請罷軍遲回未往阻異戎規殊乖至望士馬既殷無容停積宜務神速東西齊契乘勝掃殄以赴機會巒累表求還世宗許之英果敗退時人伏其識略初侍中盧昶與巒不平昶與元暉俱世宗所寵御史中尉崔亮昶之黨也昶暉令亮糾巒事成許言於世宗以亮為侍中亮於是奏劾巒在漢中掠良人為奴婢巒懼為昶等所陷乃以漢中所得巴西太守龐景民女化生等二十餘口與暉化生等數人奇色也暉大悅乃背昶為巒言於世宗云巒新有大功已經赦宥不宜方為此獄也世宗納之高肇以巒有克敵之效而為昶等所排助巒申釋故得不坐豫州城民白早生殺刺史司馬悅以城南入蕭衍遣其冠軍將軍齊苟仁率衆入據懸瓠詔巒持節率羽林精騎以討之封平舒縣開國伯食邑五百戶賞宿豫之功也世宗臨東堂勞遣巒曰司馬悅不慎重門之戒智不足以謀身匪直喪元隸豎乃大虧王略懸瓠密邇近畿東南藩捍度公之在彼憂慮尤深早生理不獨立必遠引吳楚士民同惡勢或交兵卿文昭武烈朝之南仲故令卿星言電邁出其不意卿言早生走也守也何時可以平之巒對曰早生非有深謀大智能構成此也但因司馬悅虐於百姓乘衆怒而為之民為凶威所懾不得已而苟附假蕭衍軍入應水路不通糧運不繼亦成擒耳不能為害也早生得衍軍之接溺於利欲之情必守而不走今王師若臨士民必翻然歸順圍之窮城奔走路絕不度此年必傳首京師願陛下不足垂慮世宗笑曰卿言何其壯哉深會朕遣卿之意知卿親老頻勞於外然忠孝不俱才宜救世不得辭也於是巒率騎八百倍道兼行五日次於鮑口賊遣大將軍胡孝智率衆七千去城二百逆來拒戰巒擊破孝智乘勝長驅至於懸瓠賊出城逆戰又大破之因即渡汝既而大兵繼至遂長圍之詔加巒使持節假鎮南將軍都督南討諸軍事征南將軍中山王英南討三關亦次於懸瓠以後軍未至前寇稍多憚不敢進乃與巒分兵掎角攻之衍將齊苟仁等二十一人開門出降即斬早生等同惡數十人豫州平巒振旅還京師世宗臨東堂勞之曰卿役不踰時克清妖醜鴻勳碩美可謂無愧古人巒對曰此自陛下聖略威靈英等將士之力臣何功之有世宗笑曰卿匪直一月三捷所足稱奇乃存士伯欲功成而不處巒自宿豫大捷及平懸瓠志行修正不復以財賄為懷戎資軍實絲毫無犯遷殿中尚書加撫軍將軍延昌三年暴疾卒年五十一巒才兼文武朝野瞻望上下悼惜之詔賻帛四百匹朝服一襲贈車騎大將軍瀛州刺史初世宗欲贈冀州黃門甄琛以巒前曾劾己乃云瀛州巒之本邦人情所欲乃從之及琛為詔乃云優贈, krp: 拜}
