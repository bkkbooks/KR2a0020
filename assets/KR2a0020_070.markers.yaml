  - {type: variant, offset: 7798, length: 0, content: '', krp: 都督梁西益巴三州諸軍事蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等十軍率衆三萬入寇直城豎眼遣敬紹總衆赴之倍道而進至直城而賊襲據直口敬紹以賊斷歸路督兼統軍高徹吴和等與賊決戰大破之擒斬三千餘人休儒等走還魏興敬紹頗覽書傳微有膽力而奢淫倜儻輕為殘害又見天下多事隂懷異圖欲杜絶四方擅據南鄭令其妾兄唐崐崘扇攪於外聚衆圍城敬紹謀為内應賊圍既合其事泄露在城兵武執敬紹白豎眼而殺之豎眼耻恚發疾遂卒永安中贈征東將軍吏部尚書齊州刺史出帝初重贈散騎常侍車騎将軍司徒三公}
