  - {type: variant, offset: 5232, length: 4, content: 兼吏部郎, WYG: 賈思祖令守營壘自將馬歩千人南逆仙琕擐甲揮戈單騎先入唯有軍主蔡三虎副之餘人無有及者突陳横過賊射永洞其左股永㧞箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陳謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖㣲國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而返時年七十餘矣三軍莫不壮之義陽既平英使司馬陸希道為露板意謂不可令永改之永亦不増文彩直與之改陳列軍儀處置形要而已而英深賞之歎曰觀此經算雖有金城湯池亦不能守矣還京復封永先有男爵至是以品不累加賜帛二千疋除太}
