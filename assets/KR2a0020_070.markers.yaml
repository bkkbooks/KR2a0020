  - {type: variant, offset: 8008, length: 358, content: 卿士俛眉從事而奬闔門百口同居京洛既被覊縶自拔無由託使東南情存避難當時物論謂其得所然北海未敗之日徐州刺史元孚為其純臣莫之敢距表啟相望遲速唯命及皇輿返正神器斯復輕薄之徒共生僥倖詭言要賞曲道求通濫及善人稱為己力若以奬受命賊朝語跡成罪便與天下共當此責于時朝旨唯命免官亦既經恩方加酷濫伊昔具臣比肩賊所身臨河上日尋干戈時逢寬政任遇不改一介使人獨嬰斯戮凡在有心孰不嗟悼前朝所以論功者見其邊人且相慰悅其猶郭默生亂劉胤懸首事乃權宜蓋非實錄昔鄧艾下世段灼理其寃馬援物故朱勃申其屈臣雖小人趣事君子有懷舊恩義兼人故見其若此久欲陳辭含言未吐遂至今日幽泉已閉壟樹成行內手捫心顧懷愧慨幸逢興聖理運唯新雖曰纂戎事同創革頻有大恩被於率土亡官失爵者悉蒙追復而奬雜木猶存牛車未改士感知己懷此無忘輕率瞽言干犯輦轂伏願天鑒賜垂矜覽加其贈秩慰此幽魂詔贈衞將軍冀, WYG: 兾}
