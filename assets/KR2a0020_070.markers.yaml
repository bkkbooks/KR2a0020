洛無乃自害也有口之說乃是俳諧亦何足道蕭衍親問諧曰魏朝人士德行四科之徒凡有幾人諧對曰本朝多士義等如林文武賢才布在列位四科之美非無其人庸短造次無以備啟衍曰武王有亂臣十人魏雖人物之盛豈得頓如卿言諧曰愚謂周稱十人本舉佐命至於濟濟多士實是文王之詩皇朝廊廟之才足與周人有競衍曰若爾文足標異武有冠絕者便可指陳諧曰大丞相勃海王秉文經武左右皇極畫一九州懸衡四海錄尚書汝陽王元叔昭尚書令元世儁宗室之秀綰政朝端左僕射司馬子如右僕射高隆之並時譽民英勠力匡輔侍中高岳侍中孫騰勳賢忠亮宣讚王猷自餘才美不可具悉衍曰故宜輔弼幼主永固基業深不可言江南稱其才辯使還除大司農卿加驃騎將軍轉祕書監遇偏風廢頓武定二年卒年四十九時人悼惜之贈驃騎大將軍衞尉卿齊州刺史所著文集別有集錄行於世長子嶽武定末司徒祭酒嶽弟庶尚書南主客郎諧弟邕字修穆幼而儁爽有逸才著作佐郎高陽王雍友凡所交遊皆倍年儁秀才藻之美為時所稱年二十五卒贈鎮遠將軍洛州刺史諡曰文, krp: ''}
