  - {type: variant, offset: 7780, length: 0, content: '', WYG: 熙平元年卒年八十三贈安東将軍齊州刺史永甞登北邙於平坦處奮矟躍馬盤旋瞻望有終焉之志遠慕杜預近好李沖王肅欲葬附其墓遂買左右地數頃遺勅子叔偉曰此吾之永宅也永妻賈氏留於本鄉永至代都娶妾馮氏生叔偉及數女賈後歸平城無男唯一女馮恃子事賈無禮叔偉亦奉賈不順賈常忿之馮先永亡及永之卒叔偉稱父命欲葬北邙賈疑叔偉将以馮合葬賈遂求歸葬永於所封貝丘縣事經司徒司徒胡國珍本與永同經征役感其所慕許叔偉葬焉賈乃邀訴靈太后靈太后遂從賈意事經朝堂國珍理不能得乃葬於東清河又永昔營宅兆葬父母於舊鄉賈於此彊徙之與永同處永宗親不能抑葬已數十年矣棺為桑棗根所遶束去地尺餘甚為周固以斧斬斫出之於坎時人咸怪未三年而叔偉亡叔偉九歳為州主簿及長膂力過人彎弓三百斤左右馳射又能立馬上與人角騁見者以為得永之武而不得永之文也正光中叔偉子豊生襲封傅豎眼本清河人七世祖伷伷子遘石虎太常祖父融南徙渡河家于磐陽為鄉閭所重性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乗者人曰何由得人乗之有一人對曰唯有傅靈慶堪乗此馬又有弓一張亦無人堪引人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解人曰唯𫝊靈越可解此文融意謂其三子文武才幹堪以駕馭當世常宻謂鄉人曰汝聞之不鬲蟲之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附劉駿將蕭斌王元謨寇碻磝時融始死元謨彊引靈慶為軍主將攻城攻車為城内所燒靈慶懼軍法詐云傷重令左右輿之還營遂與壮士數十騎遁還斌元謨命追之左右諫曰靈慶兄弟並有雄才兼其部曲多是壮勇如彭超户生之徒皆一當數十人援不虛發不可逼也不如緩之元謨乃止靈慶至家遂與二弟匿於山澤之間時靈慶從叔乾愛為斌法曹參軍斌遣乾愛誘呼之以腰刀為信宻令壮健者隨之而乾愛不知斌之欲圖靈慶也既至靈慶間對坐未久斌所遣壮士執靈慶殺之靈慶將死與母崔訣言法曹殺人不可忘也靈根靈越奔河北靈越至京師髙宗見而竒之靈越因說齊民慕化青州可平髙宗大悅拜靈越鎮逺將軍青州刺史貝丘子鎮羊蘭城靈根為臨齊副將鎮明潛壘靈越北入之後母崔氏遇赦免劉駿恐靈越在邊􅅰動三齊乃以靈越叔父琰為兾州治中乾愛為樂陵太守樂陵與羊蘭隔河相對命琰遣其門生與靈越婢詐為夫婦投化以招之靈越與母分離思積遂與靈根相要南走靈越與羊蘭奮兵相擊乾愛遣船迎之得免靈根差期不得俱渡臨齊人覺知剉斬殺之乾愛出郡迎靈越問靈根愆期之狀而靈越殊不應答但言不知而已乾愛不以為惡勑左右出匣中烏皮袴褶令靈越代所常服靈越言不須乾愛云汝豈可著體上衣服見垣公也時垣護之為刺史靈越奮聲言垣公垣公著此當見南方國主豈垣公也竟不肻著及至丹陽劉駿見而禮之拜員外郎兖州司馬帶魯郡而乾愛亦遷青兾司馬帶魏郡後二人俱還建康靈越意恒欲為兄復讐而乾愛初不疑防知乾愛嗜雞肉葵菜食乃為作之下以毒藥乾愛飯還而卒後數年而靈越為太原太守戍升城後舉兵同劉駿子子勛子勛以靈越為前軍将軍子勛敗靈越軍衆散亡為劉彧將王廣之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺廣之生送詣彧輔國府司馬劉勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加以大恩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末備皆參預人生歸於一死實無面求活勔壮其意送詣建康劉彧欲加原宥靈越辭對如一終不回改乃殺之豎眼即靈越子也沉毅壮烈少有父風入國鎮南王肅見而異之且竒其父節傾心禮敬表為參軍從肅征伐累有戰功稍遷給事中歩兵校尉左中郎将常為統軍東西征伐世宗時為建武将軍討揚州賊破之}
