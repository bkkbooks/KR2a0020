  - {type: variant, offset: 4845, length: 176, content: 瀛州刺史議者笑琛淺薄諡曰文定子遜字子言貌雖陋短頗有風氣解褐司徒行參軍襲爵後遷國子博士本州中正因謁靈太后自陳功名之子久抱沉屈臣父屢為大將而臣身無軍功階級臣父唯為忠臣不為慈父靈太后慨然以遜為長兼吏部郎中出為安遠將軍平州刺史時北蕃多難稽留不進免孝莊初除輔國將軍通直散騎常侍東道軍司討逆賊劉舉於濮陽不克還除散騎常侍加前將軍永安二年坐受任元顥除名尋除撫軍將軍金紫, WYG: 左}
