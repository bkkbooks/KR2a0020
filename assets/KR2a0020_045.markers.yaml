  - {type: variant, offset: 6601, length: 224, content: 操弟楚高貴弟順宗員外郎祕書中散子概之武定末東莞太守俟族弟宜雲中鎮將子雋高宗世歷侍中給事顯祖初侍御長以謀誅乙渾拜侍中樂部尚書遷散騎常侍吏部尚書賜爵安樂公甚見委任尋拜尚書令後除安東將軍定州刺史轉征東大將軍相州刺史政尚寬惠民吏安定卒諡貞公子登澄城太守子匡司空倉曹參軍登弟子景元元象初衞將軍儀同三司南青州刺史史臣曰陸俟威略智器有過人者戨識幹明厲不替家風麗忠國奉主為時梁棟蹈忠履義制於一豎惜哉叡琇以沉雅顯達而釁逆陷禍深山大澤實有龍蛇希道風度有聲子彰令終之美也, WYG: 卷四十五考證}
