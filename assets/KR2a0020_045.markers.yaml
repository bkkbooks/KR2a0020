  - {type: variant, offset: 6370, length: 230, content: 假樂安公愛民恤下百姓稱之卒子昶字細文襲爵正始中為太尉屬加寧遠將軍以本官行滎陽郡事被劾會赦免久之進號廣武將軍遷司空司馬尋拜光祿大夫昶無他才能唯飲酒為事出為平西將軍京兆內史固辭不拜轉平北將軍肆州刺史入為衞將軍大鴻臚卿仍除車騎將軍左光祿大夫天平中進號驃騎大將軍加散騎常侍領左右兼給事黃門侍郎仍兼太僕卿復以本將軍為東徐州刺史尋卒贈本將軍衞尉卿青州刺史龍成季弟騏驎侍御中散轉侍御長太和初新平太守銀青光祿大夫以彭城勳除夏州刺史子高貴孝昌中兗州鎮東府法曹參軍子操武定末度支尚, WYG: 魏}
