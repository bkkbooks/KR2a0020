  - {type: variant, offset: 2667, length: 280, content: 義與殿中尚書長孫渴侯尚書源賀羽林郎劉尼奉迎高宗於苑中立之社稷獲安麗之謀矣由是受心膂之任在朝者無出其右興安初封平原王加撫軍將軍麗辭曰陛下以正統之重承基繼業至於奉迎守順臣職之常豈敢昧冒以干大典頻讓再三詔不聽麗乃啟曰臣父歷奉先朝忠勤著稱今年至西夕未登王爵臣幼荷寵榮於分已過愚款之情未申犬馬之効未展願裁過恩聽遂所請高宗曰朕為天下主豈不能得二王封卿父子也乃以其父俟為東平王麗尋遷侍中撫軍大將軍司徒公復其子孫賜妻妃號麗以優寵既頻固辭不受高宗益重之領太子太傅麗好學愛士常以講習為業其所待者皆篤行之流士多稱之性又至孝遭父憂毀瘠過禮和平六年高宗崩先是麗療疾於代郡溫泉聞諱欲赴左右, WYG: 哭儉遽}
