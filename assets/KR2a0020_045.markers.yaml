  - {type: variant, offset: 5947, length: 0, content: '', WYG: 前将軍雍州刺史祥弟少雍字季和少聰穎有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝性仁厚有禮義門内之法為時所重釋褐奉朝請太學博士員外散騎侍郎司空高陽王雍引為田曹參軍少雍性清正不憚彊禦積年久訟造次決之請託路絕時稱賢明正始中詔百官各舉所知高陽王雍及吏部郎中李憲俱以少雍為舉首遷給事中侍中游肇後亦薦之會卒年四十二少雍妻王氏有徳義與其從子懷仁兄弟同居懷仁等事之甚謹閨門禮讓人無比焉士大夫以此稱美子元植武定中儀同府司馬元植弟士遜太師開府功曹參軍鳳達弟穆字叔宗舉茂才東雍州别駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不反敬文病臨卒以雜綾二十匹託穆與敬武穆久訪不得經二十餘年始於洛陽見敬武以物還之封題如故世稱其廉信歴東荆州司馬轉長史帶義陽太守領戍雅有恤民之稱轉汝陽太守值水澇民飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹為調遷中散大夫加龍驤将軍正光四年以老啟求致仕詔引見謂穆志力尚可除}
