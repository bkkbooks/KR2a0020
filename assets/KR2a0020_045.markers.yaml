  - {type: variant, offset: 902, length: 392, content: 詔以本官加都督秦雍諸軍事鎮長安世祖曰秦川險絕奉化日近吏民未被恩德故頃年已來頻有叛動今超等恃險不順王命朕若以重兵與卿則超等必合而為一據險拒戰未易攻也若以輕兵與卿則不制矣今使卿以方略定之於是俟單馬之鎮超等聞之大欣以為無能為也既至申揚威信示以成敗誘納超女外若姻親超猶自警初無降意俟乃率其帳下往見超觀其舉措設掩襲之計超使人逆曰三百人以外適當以弓馬相待三百人以內當以酒食相供俟乃將二百騎詣超超設備甚嚴俟遂縱酒盡醉而還後謂將士曰超可取也乃密選精兵五百人陳國恩德激厲將士言至懇切士卒奮勇各曰以死從公必無二也遂偽獵而詣超與士卒約曰今會發機當以醉為限俟於是詐醉上馬大呼手斬超首士卒應聲縱擊殺傷千數遂平之世祖大悅徵俟還京師轉外都大官散騎常侍如故高宗踐阼以子麗有策立之勳拜俟征西大將軍進爵東平王太安四年薨年六十七諡曰成有子十二人長子戨多智有父風高宗見戨而悅之謂朝臣曰吾常歎其父智過其軀是復踰於父矣少為內都下, WYG: ''}
