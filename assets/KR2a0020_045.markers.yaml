  - {type: variant, offset: 4926, length: 1, content: 將, WYG: 諡曰定尋改為穆子敬憲莊伯竝在文苑傳第四子獻伯武定末廷尉卿駿從弟安祖少而聰慧年八九歳就師講詩至􅎷鳴篇語諸兄云鹿雖禽獸得食相呼而況人也自此之後未曾獨食弱冠州辟主簿民有兄弟爭財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪内外欽服之復有人勸其入仕安祖曰高尚之事非敢庶幾且京師遼逺實憚於栖屑耳於是閑居養志不出城邑安祖曾行値天熱舎於樹下鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置陰地徐徐䕶視良久得蘇安祖喜而放之後夜忽夢一丈夫衣冠甚偉著繡衣曲領向安祖再拜安祖怪而問之此人云感君前日見放故來謝徳聞者異焉後高祖幸長安至河東存訪故老安祖朝於蒲坂高祖與語甚悦仍拜安邑令安祖以老病固辭詔給一時俸以供湯藥焉年八十三卒於家子思濟亦有志操早卒子宗賢思濟弟幼儁卒於猗氏令辛紹先隴西狄道人五世祖怡晉幽州刺史父淵私署涼王李暠驍騎将}
