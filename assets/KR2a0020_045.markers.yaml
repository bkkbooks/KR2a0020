  - {type: punctuation, offset: 1764, content: 「, id: KR2a0020_ZHSJ_045-bkkpn397}
  - {type: variant, offset: 1768, length: 485, content: 王有十二子我為嫡長承襲家業今已年老屬汝幼沖詎堪為陸氏宗首乎琇對曰苟非鬬力何患童稚戨奇之遂立琇為世子戨薨襲爵琇沉毅少言雅好讀書以功臣子孫為侍御長給事中遷黃門侍郎轉太常少卿散騎常侍太子左詹事領北海王師光祿大夫轉祠部尚書司州大中正會從兄叡事免官景明初試守河內郡咸陽王禧謀反令子曇和與尹仵期薛繼祖等先據河內琇聞禧敗斬曇和首時以琇不先送曇和禧敗始斬首責其通情徵詣廷尉廷尉少卿崔振窮治罪狀按琇大逆陸宗大小咸見收捕會將赦先薨於獄琇弟凱仍上書訴寃世宗詔復琇爵子景祚襲凱字智君謹重好學年十五為中書學生拜侍御中散轉通直散騎侍郎遷太子庶子給事黃門侍郎凱在樞要十餘年以忠厚見稱希言屢中高祖嘉之後遇患頻上書乞骸骨詔不許敕太醫給湯藥除正平太守在郡七年號為良吏初高祖將議革變舊風大臣並有難色又每引劉芳郭祚等密與規謨共論時政而國戚謂遂疏己怏怏有不平之色乃令凱私喻之曰至尊但欲廣知前事直當問其古式耳終無親彼而相疏也國戚舊人意乃稍解咸陽王禧謀逆凱兄琇陷罪凱亦被收遇赦乃免凱痛兄之死哭無時節目幾失明訴寃不已備盡人事至正始初世宗復琇官爵凱大喜置酒集諸親曰吾所以數年之中抱病忍死者顧門戶計耳逝者不追今願畢矣遂以其, WYG: 元}
