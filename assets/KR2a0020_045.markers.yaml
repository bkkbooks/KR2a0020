  - {type: variant, offset: 160, length: 3, content: 仍本將, WYG: 諡曰貞有子十三人長子榮緒字子光頗渉文史襲爵除員外散騎侍郎齊王蕭寳夤儀同開府屬因戰敗殁榮緒弟榮茂字子曄以幹局知名歴侍御史尚書考功郎中出為征虜将軍東秦州刺史永熙末兄弟竝殁關西榮茂弟子粲為寳炬南汾州刺史子粲少弟道諧為南汾州鎮城都督齊獻武王命将出討陷城克之武定末子桀官至南兗州刺史閬兄子真喜起家中書博士遷中書侍郎馮翊太守子祉卒於太府少卿祉子義遠出帝時為岐州刺史殁關西祉弟禎有識幹起家奉朝請尚書郎中司徒主簿太子中舍人廷尉少卿給事黃門侍郎光祿大夫卒贈安西将軍秦州刺史子文殊員外散騎侍郎早卒閬從叔道福父羆為苻堅丞相王猛所器重以女妻焉為堅東海太守堅滅奔江左仕劉裕為輔國将軍秦州刺史道福有志略歴劉駿盱眙南沛二郡太守領鎮北府錄事參}
