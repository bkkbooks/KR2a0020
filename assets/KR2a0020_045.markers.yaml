  - {type: variant, offset: 259, length: 291, content: 平東將軍懷荒鎮大將未期諸高車莫弗訟俟嚴急待下無恩還請前鎮將郎孤世祖詔許之徵俟還京既至朝見言於世祖曰陛下今以郎孤復鎮以臣愚量不過周年孤身必敗高車必叛世祖疑謂不實切責之以公歸第明年諸莫弗果殺郎孤而叛世祖聞之大驚即召俟問其知敗之意俟曰夫高車上下無禮無禮之人難為其上臣所以莅之以威嚴節之以憲網欲漸加訓導使知分限而惡直醜正實繁有徒故訟臣無恩稱孤之美孤獲還鎮欣其名譽必加恩於百姓譏臣為失專欲以惠治之仁恕待之無禮之人易生陵傲不過期年無復上下然後收之以威則人懷怨懟怨懟既多敗亂彰矣世祖笑曰卿身乃短慮何長也即日復除散騎常侍世祖征蠕蠕破涼州常隨駕別督輜重又與高涼王那渡河南略地至濟南東平陵徙其民六千家於, WYG: ''}
