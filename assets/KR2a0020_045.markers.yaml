  - {type: variant, offset: 1539, length: 0, content: '', krp: 崇年十嵗父卒母鄭氏以入國因寓居河洛少為舅兗州刺史鄭義所器賞解褐中書博士轉司徒從事中郎高祖納其女為充華嬪除南潁川太守不好發擿細事}
  - {type: variant, offset: 1540, length: 0, content: '', WYG: 云何用小察以傷大道吏民感之郡中大治高祖聞而嘉賞賜帛二百匹遷洛以崇為司州中正尋除右将軍咸陽王禧開府從事中郎復為河南邑中正崇頻居衡品以平直見稱出為鄉郡太守更滿應代吏民詣闕乞留復延三年在郡九年轉司徒諮議久之除華山太守卒子猷之釋褐奉朝請轉給事中歩兵校尉稍遷前将軍太中大夫卒猷之弟休之起家安州左将軍府城局參軍轉給事中河南邑中正稍遷安西将軍光祿大夫休之貞和自守未嘗以言行忤物卒子道建武定末定州儀同開府長史帶中山太守道建弟道儒齊文襄王大将軍府東閤祭酒閬族弟}
