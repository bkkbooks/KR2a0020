  - {type: variant, offset: 4900, length: 8, content: 疾病土溫則甚請州, WYG: 逆順孟孫感恩即遣子詣闕武興氐姜謨等千餘人上書乞延更限世宗嘉焉宣家世以儒學為業常慕廉退每歎曰以賈誼之才仕漢文之世不歴公卿将非運也乃謂親賓曰吾本閭閻之士素無當世之志直隨牒推移遂至於此祿後養親道不光國瞻言往哲可以言歸矣因表求解世宗不許乃作懷田賦以叙心焉永平四年患篤世宗遣太醫令馳驛就視并賜御藥宣素明陰陽之書}
