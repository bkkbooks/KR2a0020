  - {type: variant, offset: 1617, length: 1, content: 任, WYG: 常侍轉尚書南部郎高祖初蠻首桓誕歸欵朝廷思安邊之略以誕為東荆州刺史令珍為使與誕招慰蠻左珍自懸瓠西入三百餘里至桐栢山窮淮源宣揚恩澤莫不降附淮源舊有祠堂蠻俗恒用人祭之珍乃曉告曰天地明靈即是民之父母豈有父母甘子肉味自今已後悉宜以酒脯代用羣蠻從約至今行之凡所招降七萬餘户置郡縣而還以奉使稱㫖除左将軍樂陵鎮将賜爵霸城子蕭道成司州民謝天蓋自署司州刺史規欲以州内附事泄為道成将崔慧景攻圍詔珍率在鎮士馬渡淮援接時道成聞珍將至遣将茍元賓據淮逆拒珍乃分遣鐵馬於上流潛渡親率歩士與賊對接旗鼓始交甲騎奄至腹背奮擊破之天蓋尋為左右所殺降於慧景珍乘勝馳進又破慧景擁降民七千餘户内徙表置城陽剛陵義陽三郡以處之高祖詔珍移鎮北陽蕭賾遣其雍州刺史陳顯達率衆來寇城中将士咸欲出戰珍曰彼初至氣鋭未可便挫且共堅守待其攻我疲敝擊之未晚於是憑城拒戰殺傷甚衆相持旬有二日夜開城門掩擊之賊遂奔潰以功進爵為侯車駕南討珍上便宜并自陳在邊嵗久悉其要害願為前驅詔珍為隴西公源懷衛大将軍府長史轉太保齊郡王長史遷顯武将軍郢州刺史在州有聲績朝廷嘉之遷龍驤将軍賜驊騮二匹帛五十匹穀三百斛珍乃召集州内孤貧者謂曰天子以我能綏撫卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之尋加平南将軍荆州刺史與尚書盧淵征赭陽為蕭鸞将垣厯生蔡道貴所敗免歸鄉里臨別謂淵曰主上聖明志吞吳會用兵機要在於上流若有事荆楚恐老夫復不得停耳後車駕征樊郢復起珍為中軍大将軍彭}
