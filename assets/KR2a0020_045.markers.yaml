  - {type: variant, offset: 5950, length: 0, content: '', krp: 軍員外散騎常侍仍領郎中太宰元天穆征邢杲引為行臺郎中尋除平原相子馥父子竝為此郡吏民懷安之元顥入洛子馥不受其赦刺史元仲景附顥拘子馥并禁家口莊帝反政詔封三門縣開國男食邑二百户天平中為東南道行臺左丞徐州開府長史入除太尉府司馬長白山連接三齊瑕邱數州之界多有盜賊子馥受使檢覆因辨山谷要害宜立鎮戍之所又諸州豪右在山鼓鑄姦黨多依之又得密造兵仗亦請破罷諸冶朝廷善而從之還除尚書右丞出為清河太守武定八年卒於郡子馥以三傳經同説異遂總為一部傳注竝出校比短長㑹亡未就子德維武定末司徒行參軍子馥弟子華字仲夷天平中右光祿大夫柳崇字僧生河東解人也七世祖軌晉廷尉卿崇方雅有器量身長八尺美鬚明目兼有學行舉秀才射䇿高第解褐太尉主簿尚書右外兵郎中于時河東河北二郡爭境其間有鹽池之饒虞坂之便守宰及民皆恐外割公私朋競紛囂臺府高祖乃遣崇檢斷民官息訟屬荆郢新附南寇窺擾又詔崇持節與州郡經略兼加慰喻還遷太子洗馬本郡邑中正轉中壘将軍散騎侍郎遷司空司馬兼衛尉少卿又領邑中正出為河北太守崇初届郡郡民張明失馬疑十餘人崇見之不問賊事人人别借以温顔更問其親老存不農桑多少而微察其辭色即獲真賊吕穆等二人餘皆放遣郡中畏服境内帖然卒於官年五十六贈輔國将軍岐州刺史諡曰穆崇所製文章寇亂遺失長子慶和性沉靜不競於時起家奉朝請稍遷輕車将軍給事中本郡邑中正卒子德逸武定末齊王丞相府主簿慶和弟楷字孝則身長八尺善草書頗涉文史解褐員外散騎侍郎蕭闕西征引為車騎主簿仍為行臺郎中征還以員外郎領殿中侍御史轉太尉記室參軍遷寜逺将軍通直散騎侍郎本郡邑中正普泰初簡定集書省官出除征虜將軍司徒從事中書郎轉儀同開府長史天平中為肆州驃騎府長史頗有聲譽又加中軍将軍興和中撫軍司馬遇病卒崇從父弟元章姿貌魁偉歴太尉中兵參軍司空錄事司徒從事中郎遷相州平東府長史屬刺史元熙起兵欲除元义元章與魏郡太守李孝怡等執熙賜爵猗氏伯除正平太守後靈太后反政削除官爵卒於家崇族弟敬起字華之起家中書博士轉城陽王文學除寧逺将軍尚書儀曹郎中龍驤将軍平陽太守卒有五子長子永字神護性麤率解褐奉朝請轉員外散騎侍郎除太尉記室參軍諫議大夫又轉征虜將軍太中大夫本郡邑中正以母老解官歸養卒於家贈征西將軍秦州刺史永弟暢字叔智自奉朝請三遷伏波将軍岐州征虜府長史遷征虜将軍魯陽太守還除左将軍太中大夫轉安東将}
