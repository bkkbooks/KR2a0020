  - {type: variant, offset: 5300, length: 354, content: 謀反之外皎如白日耳沖烈表曰臣等邀逢幸會生遇昌辰才非利用坐班位列功無汗馬猥受山河叨忝之寵終古無比莫大之施萬殞靡酬而叡丕識乖犬馬心同梟獍潛引童稚構茲妖逆違悖天常罪踰萬殞叡結釁在心陰構不息間說戚蕃擬窺乾象雖覩休平未懷疑惑何嘗片辭披露宿志原心語跡實為賊首丕之二子從惡累年交扇東西規擾并夏測觀此狀無容不知雖聖慈含育恕其生命其若天地何其若神祇何夫効誠盡節為下之分刑茲無捨在上之常法況曲蒙莫大之恩奬以忠貞之義而更違天背道包藏姦逆求情推理罪乃常誅而慈造寬渥更流恩貸續叡三斷之骸還丕已絕之魄二三縱宥實虧憲典猶復上延天眷言念疇日不以臣等背負餘黨別垂明詔再申齊信之恩重喻畑日之旨伏讀悲慚惟深愧惕叡長子希道字洪度有風貌美鬚髯歷覽經史頗有文致初拜中散遷通直郎坐父事徙於遼西於後得還從征自效以軍功拜給事中遷司徒記室司空主簿征南將軍元英攻, WYG: ''}
