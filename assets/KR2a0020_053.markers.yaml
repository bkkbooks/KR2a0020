  - {type: variant, offset: 9900, length: 7, content: 德舒襲釋褐員外, WYG: 思順隴西人敦煌公寳少子也少孤為長兄滎陽太守承所擕訓承常言此兒器量非恒方為門户所寄沖沉雅有大量隨兄至官是時牧守子弟多侵亂民庶輕有乞奪沖與承長子韶獨清簡皎然無所求取時人美焉顯祖末為中書學生沖善交遊不妄戲雜流輩重之高祖初以例遷祕書中散典禁中文事以修整敏惠漸見寵待遷内祕書令南部給事中舊無三長惟立宗主督䕶所以民多隠冒五十三十家方為一户沖以三正治民所由來逺於是創三長之制而上之文明太后覽而稱善引見公卿議之中書令鄭羲祕書令高祐等曰沖求立二長者乃欲混天下一法言似可用事實難行羲又曰不信臣言但試行之事敗之後當知愚言之不謬太尉元丕曰臣謂此法若行於公私有益咸稱方今有事之月校比民户新舊未分民必勞怨請過今秋至冬閑月徐乃遣使於事為宜沖曰民者㝠也可使由之不可使知之若不因調時百姓徒知立長校户之勤未見均徭省賦之益心必生怨宜及課調之月令知賦税之均既識其事又得其利因民之欲為之易行著作郎傅思益進曰民俗既異險易不同九品差調為日已久一旦改法恐成擾亂太后曰立三長則課有常準賦有恒分苞蔭之戸可出僥倖之人可止何為而不可羣議雖有乖異然惟以變法為難更無異義遂立三長公私便之遷中書令加}
