  - {type: variant, offset: 1093, length: 334, content: 君言誘我死何其不直遂與允絕黑子以不實對竟為世祖所疏終獲罪戮是時著作令史閔湛郄襀性巧佞為浩信待見浩所注詩論語尚書易遂上疏言馬鄭王賈雖注述六經並多疏謬不如浩之精微乞收境內諸書藏之祕府班浩所注命天下習業并求敕浩注禮傳令後生得觀正義浩亦表薦湛有著述之才既而勸浩刊所撰國史于石用垂不朽欲以彰浩直筆之跡允聞之謂著作郎宗欽曰閔湛所營分寸之間恐為崔門萬世之禍吾徒無類矣未幾而難作初浩之被收也允直中書省恭宗使東宮侍郎吳延召允仍留宿宮內翌日恭宗入奏世祖命允驂乘至宮門謂曰入當見至尊吾自導卿脫至尊有問但依吾語允請曰為何等事也恭宗曰入自知之既入見帝恭宗曰中書侍郎高允自在臣宮同處累年小心密慎臣所委悉雖與浩同事然允微賤制由於浩請赦其命世祖召允謂曰國書皆崔浩作不允對曰太祖記前著作郎鄧淵所撰先帝記, WYG: 流暢}
