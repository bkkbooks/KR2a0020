  - {type: variant, offset: 295, length: 0, content: '', WYG: 明旦復登亞父冡遣孝伯至小市駿亦遣其長史張暢對孝伯孝伯遥問暢姓暢曰姓張孝伯曰是張長史也暢曰君何得見識孝伯曰既渉此境何容不悉暢問孝伯曰君復何姓居何官也孝伯曰我戎行一夫何足致問然足與君相敵孝伯曰主上有詔太尉安北可暫出門欲與相見朕亦不攻彭城何為勞苦將士城上嚴傋今遣賜駱駞及貂裘雜物暢曰有詔}
  - {type: page-break, offset: 295, content: '', id: KR2a0020_WYG_053-3a, image: WYG0261/WYG0261-0716a.png}
  - {type: variant, offset: 295, length: 0, content: '', krp: 明旦復登亞父冡遣孝伯至小市駿亦遣其長史張暢對孝伯孝伯遥問暢姓暢曰姓張孝伯曰是張長史也暢曰君何得見識孝伯曰既渉此境何容不悉暢問孝伯曰君復何姓居何官也孝伯曰我戎行一夫何足致問然足與君相敵孝伯曰主上有詔太尉安北可暫出門欲與相見朕亦不攻彭城何為勞苦將士城上嚴傋今遣賜駱駞及貂裘雜物暢曰有詔}
  - {type: variant, offset: 296, length: 1, content: 寵, WYG: 言政可施於彼國何得稱之於此孝伯曰卿家太尉安北是人臣不暢曰是也孝伯曰我朝廷奄有萬國率土之濵莫敢不臣縱為隣國之君何為不稱詔於隣國之臣孝伯又問暢曰何至忽遽杜門絶橋暢曰二王以魏帝壁壘未立將士疲勞此精甲十萬人思致命恐輕相凌踐故且閉城耳待休息士馬然後共治戰塲尅日交戲孝伯曰令行禁止主將常事宜當以法裁物何用廢橋杜門窮城之中復何以十萬誇大我亦有良馬百萬復可以此相矜暢曰王侯設險何但法令而已也我若誇君當言百萬所以言十萬者正是二王左右素所畜飬者耳此城内有數州士庶工徒營伍猶所未論我本鬬人不鬬馬足且冀之北土馬之所生君復何以逸足見誇也孝伯曰王侯設險誠如來言開閉有常何為杜塞絶橋之意義在何也此城守君之所習野戰我之所長我之恃馬猶如君之恃城耳城内有具思者嘗至京師義恭遣視之思識是孝伯思前問孝伯曰李尚書行途有勞孝伯曰此事應相與共知思答曰縁共知所以仰勞孝伯曰感君至意既開門暢屏人却伏出受賜物孝伯曰詔以貂裘賜太尉駱駞騾馬賜安北蒲萄酒及諸食味當相與同進暢曰二王敬白魏帝知欲垂見常願面接但受命本朝忝居藩任人臣無境外之交故無容私覿義恭獻皮袴褶一具駿奉酒二器甘蔗百梃孝伯曰又有詔太尉安北久絶南信殊當憂悒若欲遣信者當為獲送脱湏騎者亦當以馬送之暢曰此方閒路甚多使命日夕往復不復以此勞魏帝也孝伯曰亦知有水路似為白賊所斷暢曰君著白衣稱白賊也孝伯大笑曰今之白賊似異黄巾赤眉暢曰黄巾赤眉不在江南孝伯曰雖不在江南亦不離徐方也孝伯曰向與安北相聞何以久而不報暢曰二王貴遠啓聞為難孝伯曰周公握髪吐餔二王何獨貴遠暢曰握髪吐餐不謂隣國之人也孝伯曰本邦尚爾隣國彌應盡恭且賔至有禮主人宜以禮接暢曰昨見衆賔至門未為有禮孝伯曰非是賔至無禮直是主人怱怱無待賔調度耳孝伯又言有詔程天祚一介常人誠知非江南之選近於汝陽身被九槍落在溵水我使牽而出之凡人骨肉分張並思集聚聞其}
