  - {type: variant, offset: 10023, length: 6, content: 引劉模者長樂, WYG: 出頗相忿䦧及沖之貴封禄恩賜皆以共之内外輯睦父亡後同居二十餘年至洛乃别第宅更相友愛久無間然皆沖之徳也始沖之見私寵也兄子韶恒有憂色慮致傾敗後榮名日顯稍乃自安而沖明目當官圖為已任自始迄終無所避屈其體時推運皆此類也子延實等語在外戚傳史臣曰燕趙}
