  - {type: variant, offset: 9912, length: 1, content: 殿, WYG: 將作大匠司空長樂公亮可與大匠共監興繕其去故崇新之宜脩復太極之制朕當别加指授車駕南伐加沖輔國大將軍統衆翼從自發都至於洛陽霖雨不霽仍詔六軍發軫高祖戎服執鞭御馬而出羣臣啓顙於馬首之前高祖曰長驅之謀廟算已定今大將軍進公等更欲何云沖進曰臣等不能折衝帷幄坐制四海而令南有竊號之渠實臣等之咎陛下以文軌未一親勞聖駕臣等誠思亡軀盡命効死戎行然自離都淫雨士馬困弊前路尚遥水潦方甚且伊洛境内小水猶尚致難況長江浩汗越在南境若營舟檝必湏停滯師老糧乏進退為難矜喪反斾於義為允高祖曰一同之意前已具論卿等正以水雨為難然天時頗亦可知何者夏既炎旱秋故雨多𤣥冬之初必當開爽比後月十閒若雨猶不已此乃天也脱於此而晴行則無害古不伐喪謂諸侯同軌之國非王者統一之文已至於此何容停駕沖又進曰今者之舉天下所不願惟陛下欲之漢文言吾獨乘千里馬竟何至也臣有意而無其辭敢以死請高祖大怒曰方欲經營宇宙一同區域而卿等儒生屢疑大計斧鉞有常卿勿復言策馬將出於是大司馬安定王休兼左僕射任城王澄等竝殷勤泣諌高祖乃諭羣臣曰今者興動不小動而無成何以示後茍欲班師無以垂之千載朕仰惟遠祖世居幽漠違衆南遷以享無窮之美豈其無心輕遺陵壤今之君子寜獨有懐當由天工人代王業湏成故也若不南鑾即當移都於此光宅土}
