  - {type: variant, offset: 4342, length: 3000, content: 文子崔公謂余云高生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起於纖微及於詔責崔公聲嘶股戰不能言宗欽已下伏地流汗都無人色高子敷陳事理申釋是非辭義清辯音韻高亮明主為之動容聽者無不稱善仁及僚友保茲元吉向之所謂矯矯者更在斯乎宗愛之任勢也威振四海嘗召百司於都坐王公以下望庭畢拜高子獨昇階長揖由此觀之汲長孺可臥見衞青何抗禮之有向之所謂風節者得不謂此乎知人固不易人亦不易知吾既失之於心內崔亦漏之於形外鍾期止聽於伯牙夷吾見明於鮑叔良有以也其為人物所推如此高宗重允常不名之呼為令公令公之號播於四遠矣高宗崩顯祖居諒闇乙渾專擅朝命謀危社稷文明太后誅之引允禁中參決大政又詔允曰自頃以來庠序不建為日久矣道肆陵遲學業遂廢子衿之歎復見于今朕既篡統大業八表晏寧稽之舊典欲置學官於郡國使進修之業有所津寄卿儒宗元老朝望舊德宜與中祕二省參議以聞允表曰臣聞經綸大業必以教養為先咸秩九疇亦由文德成務故辟雍光於周詩泮宮顯於魯頌自永嘉以來舊章殄滅鄉閭蕪沒雅頌之聲京邑杜絕釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思纂成洪烈萬國咸寧百揆時申祖宗之遺志興周禮之絕業爰發德音惟新文教搢紳黎獻莫不幸甚臣承旨敕並集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔玄同古義宜如聖旨崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博關經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡高門次及中第顯祖從之郡國立學自此始也後允以老疾頻上表乞骸骨詔不許於是乃著告老詩又以昔歲同徵零落將盡感逝懷人作徵士頌蓋止於應命者其有命而不至則闕焉羣賢之行舉其梗概矣今著之於左中書侍郎固安伯范陽盧玄子真郡功曹史博陵崔綽茂祖河內太守下樂侯廣寧燕崇玄略上黨太守高邑侯廣寧常陟公山征南大將軍從事中郎勃海高毗子翼征南大將軍從事中郎勃海李欽道賜河西太守饒陽子博陵許堪祖根中書郎新豐侯京兆杜銓士衡征西大將軍從事中郎京兆韋閬友規京兆太守趙郡李詵令孫太常博士鉅鹿公趙郡李靈虎符中書郎中即丘子趙郡李遐仲熙營州刺史建安公太原張偉仲業輔國大將軍從事中郎范陽祖邁征東大將軍從事中郎范陽祖侃士倫東郡太守蒲縣子中山劉策濮陽太守真定子常山許琛行司隸校尉中都侯西河宋宣道茂中書郎燕郡劉遐彥鑒中書郎武子河間邢穎宗敬滄水太守浮陽侯勃海高濟叔民太平太守平原子雁門李熙士元祕書監梁郡公廣平游雅伯度廷尉正安平子博陵崔建興祖廣平太守列人侯西河宋愔州主簿長樂潘天符郡功曹長樂杜熙征東大將軍從事中郎中山張綱中書郎上谷張誕叔術祕書郎雁門王道雅祕書郎雁門閔弼衞大將軍從事中郎中山郎苗大司馬從事中郎上谷侯辯陳留郡太守高邑子趙郡呂季才夫百王之御士也莫不資伏羣才以隆治道故周文以多士克寧漢武以得賢為盛此載籍之所記由來之常義魏自神已後宇內平定誅赫連積世之僭掃窮髮不羇之寇南摧江楚西盪涼域殊方之外慕義而至於是偃兵息甲修立文學登延儁造酬諮政事夢想賢哲思遇其人訪諸有司以求名士咸稱范陽盧玄等四十二人皆冠冕之冑著問州邦有羽儀之用親發明詔以徵玄等乃曠官以待之懸爵以縻之其就命三十五人自餘依例州郡所遣者不可稱記爾乃髦士盈朝而濟濟之美興焉昔與之俱蒙斯舉或從容廊廟或游集私門上談公務下盡忻娛以為千載一時始於此矣日月推移吉凶代謝同徵之人凋殲殆盡在者數子然復分張往昔之忻變為悲戚張仲業東臨營州遲其還返一于懷齊衿于垂歿之年寫情於桑榆之末其人不幸復至殞歿在朝者皆後進之士居里者非疇昔之人進涉無寄心之所出入無解顏之地顧省形骸所以永歎而不已夫頌者美盛德之形容亦可以長言寄意不為文二十年矣然事切於心豈可默乎遂為之頌詞曰紫氣干霄羣雄亂夏王龔徂征戎車屢駕掃盪遊氛克剪妖霸四海從風八垠漸化政教無外既寧且一偃武櫜兵唯文是恤帝乃旁求搜賢舉逸巖隱投竿異人並出亹亹盧生量遠思純鑽道據德遊藝依仁旌弓既招釋褐投巾攝齊升堂嘉謀日陳自東徂南躍馬馳輪僭馮影附劉以和親茂祖煢單夙離不造克己勉躬聿隆家道敦心六經遊思文藻終辭寵命以之自保燕常篤信百行靡遺位不苟進任理栖遲居沖守約好讓善推思賢樂古如渴如飢子翼致遠道賜悟深相期以義相和若琴並參幕府俱發德音優遊卒歲聊以寄心祖根運會克光厥猷仰緣朝恩俯因德友功雖後建祿實先受班同舊臣位並羣后士衡孤立內省靡疚言不崇華交不遺舊以產則貧論道則富所謂伊人實邦之秀卓矣友規禀茲淑亮存彼大方擯此細讓神與理冥形隨流浪雖屈王侯莫廢其尚趙實名區世多奇士山岳所鍾挺生三李矯矯清風抑抑容止初九而潛望雲而起詵尹西都靈惟作傳垂訓皇宮載理雲霧熙雖中夭迹階郎署餘塵可挹終亦顯著仲業淵長雅性清到憲章古式綢繆典誥時值險難常一其操納衆以仁訓下以孝化被龍川民歸其教邁則英賢侃亦稱選聞達邦家名行素顯志在兼濟豈伊獨善繩匠弗顧功不獲展劉許履忠竭力致躬出能騁說入獻其功輶軒一舉撓燕下崇名彰魏世享業亦隆道茂夙成弱冠播名與朋以信行物以誠怡怡昆弟穆穆家庭發響九臯翰飛紫冥頻在省闥亦司于京刑以之中政以之平猗歟彥鑒思參文雅率性任真器成非假靡矜于高莫于下乃謝朱門歸迹林野宗敬延譽號為四儁華藻雲飛金聲夙振中遇沈痾賦詩以訊忠顯于辭理出于韻高滄朗達默識淵通領新悟異發自心胸質侔和璧文炳雕龍燿姿天邑衣錦舊邦士元先覺介焉不惑振袂來庭始賓王國蹈方履正好是繩墨淑人君子其儀不忒孔稱游夏漢美淵雲越哉伯度出類踰羣司言祕閣作牧河汾移風易俗理亂解紛融彼滯義渙此潛文儒道以析九流以分崔宋二賢誕性英偉擢穎閭閻聞名象魏謇謇儀形邈邈風氣達而不矜素而能賁潘符摽尚杜熙好和清不潔流渾不同波絕希龍津止分常科幽而逾顯損而逾多張綱柔謙叔術正直道雅洽聞弼為兼識拔萃衡門俱漸鴻翼發憤忘餐豈要斗食率禮從仁罔愆于式失不繫心得不形色郎苗始舉用均已試智足周身言足為治性協於時情敏於事與今而同與古曷異物以利移人以酒昏侯生潔己唯義是敦日縱醇醪逾敬逾溫其在私室如涉公門季才之性柔而執競屆彼南秦申威致命誘之以權矯之以正帝道用光邊土納慶羣賢遭世顯名有代志竭其忠才盡其概體襲朱裳腰紐雙佩榮曜當時風高千載君臣相遇理實難偕昔因朝命舉之克諧披衿散想解帶舒懷此忻如昨存亡奄乖靜言思之中心九摧揮毫頌德漼爾增哀皇興中詔允兼太常至兗州祭孔子廟謂允曰此簡德而行勿有辭也後允從顯祖北伐大捷而還至武川鎮上北伐頌其詞曰皇矣上天降鑒惟德眷命有魏照臨萬國禮化丕融王猷允塞靜亂以威穆民以則北虜舊隸禀政在蕃往因時逃命北轅世襲凶軌背忠食言招亡聚盜醜類實繁敢率犬羊圖縱猖蹶乃詔訓師興戈北伐躍馬裹糧星馳電發撲討虔劉肆陳斧鉞斧鉞暫陳馘翦厥旅積骸填谷流血成浦元兇狐奔假息窮墅爪牙既摧腹心亦阻周之忠厚存及行葦翼翼聖明有兼斯美澤被京觀垂此仁旨封尸野獲惠加生死生死蒙惠人欣覆育理貫幽冥澤漸殊域物歸其誠神獻其福遐邇斯懷無思不服古稱善兵歷時始捷今也用師辰不及浹六軍克合萬邦以協義著春秋功銘玉牒載興頌聲播之來葉顯祖覽而善之又顯祖時有不豫以高祖沖幼欲立京兆王子推集諸大臣以次召問允進跪上前涕泣曰臣不敢多言以勞神聽願陛下上思宗廟託付之重追念周公抱成王之事顯祖於是傳位於高祖賜帛千匹以標忠亮又遷中書監加散騎常侍雖久典史事然而不能專勤屬述時與校書郎劉模有所緝綴大較續崔浩故事準春秋之體而時有刊正自高宗迄于顯祖軍國書檄多允文也末年乃薦高閭以自代以定議之勳進爵咸陽公加鎮東將軍尋授, WYG: ''}
  - {type: variant, offset: 4342, length: 3000, content: 文子崔公謂余云高生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起於纖微及於詔責崔公聲嘶股戰不能言宗欽已下伏地流汗都無人色高子敷陳事理申釋是非辭義清辯音韻高亮明主為之動容聽者無不稱善仁及僚友保茲元吉向之所謂矯矯者更在斯乎宗愛之任勢也威振四海嘗召百司於都坐王公以下望庭畢拜高子獨昇階長揖由此觀之汲長孺可臥見衞青何抗禮之有向之所謂風節者得不謂此乎知人固不易人亦不易知吾既失之於心內崔亦漏之於形外鍾期止聽於伯牙夷吾見明於鮑叔良有以也其為人物所推如此高宗重允常不名之呼為令公令公之號播於四遠矣高宗崩顯祖居諒闇乙渾專擅朝命謀危社稷文明太后誅之引允禁中參決大政又詔允曰自頃以來庠序不建為日久矣道肆陵遲學業遂廢子衿之歎復見于今朕既篡統大業八表晏寧稽之舊典欲置學官於郡國使進修之業有所津寄卿儒宗元老朝望舊德宜與中祕二省參議以聞允表曰臣聞經綸大業必以教養為先咸秩九疇亦由文德成務故辟雍光於周詩泮宮顯於魯頌自永嘉以來舊章殄滅鄉閭蕪沒雅頌之聲京邑杜絕釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思纂成洪烈萬國咸寧百揆時申祖宗之遺志興周禮之絕業爰發德音惟新文教搢紳黎獻莫不幸甚臣承旨敕並集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔玄同古義宜如聖旨崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博關經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡高門次及中第顯祖從之郡國立學自此始也後允以老疾頻上表乞骸骨詔不許於是乃著告老詩又以昔歲同徵零落將盡感逝懷人作徵士頌蓋止於應命者其有命而不至則闕焉羣賢之行舉其梗概矣今著之於左中書侍郎固安伯范陽盧玄子真郡功曹史博陵崔綽茂祖河內太守下樂侯廣寧燕崇玄略上黨太守高邑侯廣寧常陟公山征南大將軍從事中郎勃海高毗子翼征南大將軍從事中郎勃海李欽道賜河西太守饒陽子博陵許堪祖根中書郎新豐侯京兆杜銓士衡征西大將軍從事中郎京兆韋閬友規京兆太守趙郡李詵令孫太常博士鉅鹿公趙郡李靈虎符中書郎中即丘子趙郡李遐仲熙營州刺史建安公太原張偉仲業輔國大將軍從事中郎范陽祖邁征東大將軍從事中郎范陽祖侃士倫東郡太守蒲縣子中山劉策濮陽太守真定子常山許琛行司隸校尉中都侯西河宋宣道茂中書郎燕郡劉遐彥鑒中書郎武子河間邢穎宗敬滄水太守浮陽侯勃海高濟叔民太平太守平原子雁門李熙士元祕書監梁郡公廣平游雅伯度廷尉正安平子博陵崔建興祖廣平太守列人侯西河宋愔州主簿長樂潘天符郡功曹長樂杜熙征東大將軍從事中郎中山張綱中書郎上谷張誕叔術祕書郎雁門王道雅祕書郎雁門閔弼衞大將軍從事中郎中山郎苗大司馬從事中郎上谷侯辯陳留郡太守高邑子趙郡呂季才夫百王之御士也莫不資伏羣才以隆治道故周文以多士克寧漢武以得賢為盛此載籍之所記由來之常義魏自神已後宇內平定誅赫連積世之僭掃窮髮不羇之寇南摧江楚西盪涼域殊方之外慕義而至於是偃兵息甲修立文學登延儁造酬諮政事夢想賢哲思遇其人訪諸有司以求名士咸稱范陽盧玄等四十二人皆冠冕之冑著問州邦有羽儀之用親發明詔以徵玄等乃曠官以待之懸爵以縻之其就命三十五人自餘依例州郡所遣者不可稱記爾乃髦士盈朝而濟濟之美興焉昔與之俱蒙斯舉或從容廊廟或游集私門上談公務下盡忻娛以為千載一時始於此矣日月推移吉凶代謝同徵之人凋殲殆盡在者數子然復分張往昔之忻變為悲戚張仲業東臨營州遲其還返一于懷齊衿于垂歿之年寫情於桑榆之末其人不幸復至殞歿在朝者皆後進之士居里者非疇昔之人進涉無寄心之所出入無解顏之地顧省形骸所以永歎而不已夫頌者美盛德之形容亦可以長言寄意不為文二十年矣然事切於心豈可默乎遂為之頌詞曰紫氣干霄羣雄亂夏王龔徂征戎車屢駕掃盪遊氛克剪妖霸四海從風八垠漸化政教無外既寧且一偃武櫜兵唯文是恤帝乃旁求搜賢舉逸巖隱投竿異人並出亹亹盧生量遠思純鑽道據德遊藝依仁旌弓既招釋褐投巾攝齊升堂嘉謀日陳自東徂南躍馬馳輪僭馮影附劉以和親茂祖煢單夙離不造克己勉躬聿隆家道敦心六經遊思文藻終辭寵命以之自保燕常篤信百行靡遺位不苟進任理栖遲居沖守約好讓善推思賢樂古如渴如飢子翼致遠道賜悟深相期以義相和若琴並參幕府俱發德音優遊卒歲聊以寄心祖根運會克光厥猷仰緣朝恩俯因德友功雖後建祿實先受班同舊臣位並羣后士衡孤立內省靡疚言不崇華交不遺舊以產則貧論道則富所謂伊人實邦之秀卓矣友規禀茲淑亮存彼大方擯此細讓神與理冥形隨流浪雖屈王侯莫廢其尚趙實名區世多奇士山岳所鍾挺生三李矯矯清風抑抑容止初九而潛望雲而起詵尹西都靈惟作傳垂訓皇宮載理雲霧熙雖中夭迹階郎署餘塵可挹終亦顯著仲業淵長雅性清到憲章古式綢繆典誥時