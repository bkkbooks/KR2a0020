  - {type: variant, offset: 10019, length: 3, content: 恭初允, WYG: 文穆葬於覆舟山近杜預冡高祖之意也後車駕自鄴還洛路經沖墓左右以聞高祖卧疾望墳掩泣久之詔曰司空文穆公徳為時宗勲簡朕心不幸徂逝託墳邙嶺旋鑾覆舟躬睇塋域悲仁惻舊有慟朕衷可遣太牢之祭以申吾懐及與留京百官相見皆叙沖亡沒之故言及流涕高祖得留臺啓知沖患狀謂右衛宋弁曰僕射執我樞衡總釐朝務清儉居躬知寵已乆朕以仁明忠雅委以台司之寄使我出境無後顧之憂一朝忽有此患朕甚懐愴慨其相痛惜如此沖兄弟六人四母}
