  - {type: variant, offset: 1456, length: 2442, content: 怒曰此甚於浩安有生路恭宗曰天威嚴重允是小臣迷亂失次耳臣向備問皆云浩作世祖問如東宮言不允曰臣以下才謬參著作犯逆天威罪應滅族今已分死不敢虛妄殿下以臣侍講日久哀臣乞命耳實不問臣臣無此言臣以實對不敢迷亂世祖謂恭宗曰直哉此亦人情所難而能臨死不移不亦難乎且對君以實貞臣也如此言寧失一有罪宜宥之允竟得免於是召浩前使人詰浩浩惶惑不能對允事事申明皆有條理時世祖怒甚敕允為詔自浩已下僮吏已上百二十八人皆夷五族允持疑不為頻詔催切允乞更一見然後為詔詔引前允曰浩之所坐若更有餘釁非臣敢知直以犯觸罪不至死世祖怒命介士執允恭宗拜請世祖曰無此人忿朕當有數千口死矣浩竟族滅餘皆身死宗欽臨刑歎曰高允其殆聖乎恭宗後讓允曰人當知機不知機學復何益當爾之時吾導卿端緒何故不從人言怒帝如此每一念之使人心悸允曰臣東野凡生本無宦意屬休延之會應旌弓之舉釋褐鳳池仍參麟閣尸素官榮妨賢已久夫史籍者帝王之實錄將來之烱戒今之所以觀往後之所以知今是以言行舉動莫不備載故人君慎焉然浩世受殊遇榮曜當時孤負聖恩自貽灰滅即浩之跡時有可論浩以蓬蒿之才荷棟梁之重在朝無謇諤之節退私無委蛇之稱私欲沒其公廉愛憎蔽其直理此浩之責也至於書朝廷起居之跡言國家得失之事此亦為史之大體未為多違然臣與浩實同其事死生榮辱義無獨殊誠荷殿下大造之慈違心苟免非臣之意恭宗動容稱歎允後與人言我不奉東宮導旨者恐負翟黑子恭宗季年頗親近左右營立田園以取其利允諫曰天地無私故能覆載王者無私故能包養昔之明王以至公宰物故藏金於山藏珠於淵示天下以無私訓天下以至儉故美聲盈溢千載不衰今殿下國之儲貳四海屬心言行舉動萬方所則而營立私田畜養鷄犬乃至販酤市與民爭利議聲流布不可追掩夫天下者殿下之天下富有四海何求而不獲何欲而弗從而與販夫販婦競此尺寸昔虢之將亡神乃下降賜之土田卒喪其國漢之靈帝不修人君之重好與宮人列肆販賣私立府藏以營小利卒有顛覆傾亂之禍前鑒若此甚可畏懼夫為人君者必審於擇人故稱知人則哲惟帝難之商書云無邇小人孔父有云小人近之則不遜遠之則怨矣武王愛周邵齊畢所以王天下殷紂愛飛廉惡來所以喪其國歷觀古今存亡之際莫不由之今東宮誠曰乏人儁不少頃來侍御左右者恐非在朝之選故願殿下少察愚言斥出佞邪親近忠良所在田園分給貧下畜產販賣以時收散如此則休聲日至謗議可除恭宗不納恭宗之崩也允久不進見後世祖召允昇階歔欷悲不能止世祖流淚命允使出左右莫知其故相謂曰高允無何悲泣令至尊哀傷何也世祖聞之召而謂曰汝不知高允悲乎左右曰臣等見允無言而泣陛下為之悲傷是以竊言耳世祖曰崔浩誅時允亦應死東宮苦諫是以得免今無東宮允見朕因悲耳允表曰往年被敕令臣集天文災異使事類相從約而可觀臣聞箕子陳謨而洪範作宣尼述史而春秋著皆所以章明列辟景測皇天者也故先其善惡而驗以災異隨其失得而效以禍福天人誠遠而報速如響甚可懼也自古帝王莫不尊崇其道而稽其法數以自修飭厥後史官並載其事以為鑒誡漢成帝時光祿大夫劉向見漢祚將危權歸外戚屢陳妖眚而不見納遂因洪範春秋災異報應者而為其傳覬以感悟人主而終不聽察卒以危亡豈不哀哉伏惟陛下神武則天叡鑒自遠欽若稽古率由舊章前言往行靡不究鑒前皇所不逮也臣學不洽聞識見寡薄懼無以裨廣聖聽仰酬明旨今謹依洪範傳天文志撮其事要略其文辭凡為八篇世祖覽而善之曰高允之明災異亦豈減崔浩乎及高宗即位允頗有謀焉司徒陸麗等皆受重賞允既不蒙褒異又終身不言其忠而不伐皆此類也給事中郭善明性多機巧欲逞其能勸高宗大起宮室允諫曰臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宮室已備永安前殿足以朝會萬國西堂溫室足以安御聖躬紫樓臨望可以觀望遠近若廣修壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其飢一婦不織或受其寒況數萬之衆其所損廢亦以多矣推之於古驗之於今必然之效也誠聖主所宜思量高宗納之允以高宗纂承平之業而風俗仍舊婚娶喪葬不依古式允乃諫曰前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謠鼓舞殺牲燒葬一切禁斷雖條旨久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至於斯昔周文以百里之地修德布政先於寡妻及於兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥効矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給伎以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆揀擇德義之門妙選貞閑之女先之以媒娉繼之以禮物集僚友以重其別親御輪以崇其敬婚姻之際如此之難今諸王十五便賜妻別居然所配者或長少差舛或罪入掖庭而作合宗王妃嬪藩懿失禮之甚無復此過往年及今頻有檢劾誠是諸王過酒致責跡其元起亦由色衰相棄致此紛紜今皇子娶妻多出宮掖令天下小民必依禮限此二異也萬物之生靡不有死古先哲王作為禮制所以養生送死折諸人情若毀生以奉死則聖人所禁也然葬者藏也死者不可再見故深藏之昔堯葬穀林農不易畝舜葬蒼梧市不改肆秦始皇作為地市下固三泉金玉寶貨不可計數死不旋踵尸焚墓掘由此推之堯舜之儉始皇之奢是非可見今國家營葬費損巨億一旦焚之以為灰燼苟靡費有益於亡者古之臣奚獨不然今上為之不輟而禁下民之必止此三異也古者祭必立尸序其昭穆使亡者有憑致食饗之禮今已葬之魂人直求貌類者事之如父母燕好如夫妻損敗風化瀆亂情禮莫此之甚上未禁之下不改絕此四異也夫饗者所以定禮儀訓萬國故聖王重之至乃爵盈而不飲肴乾而不食樂非雅聲則不奏物非正色則不列今之大會內外相混酒醉喧譊罔有儀式又俳優鄙藝樜辱視聽朝庭積習以為美而責風俗之清純此五異也今陛下當百王之末踵晉亂之弊而不矯然釐改以厲頹俗臣恐天下蒼生永不聞見禮教矣允言如此非一高宗從容聽之或有觸迕帝所不忍聞者命左右扶出事有不便允輒求見高宗知允意逆屏左右以待之禮敬甚重晨入暮出或積日居中朝臣莫知所論或有上事陳得失者高宗省而謂羣臣曰君父一也父有是非子何為不作書於人中諫之使人知惡而於家內隱處也豈不以父親恐惡彰於外也今國家善惡不能面陳而上表顯諫此豈不彰君之短明己之美至如高允者真忠臣矣朕有是非常正言面論至朕所不樂聞者皆侃侃言說無所避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曾不聞一正言但伺朕, WYG: ''}
