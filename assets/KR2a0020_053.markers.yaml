  - {type: variant, offset: 338, length: 243, content: 王丕西討上邽復以本官參丕軍事語在丕傳涼州平以參謀之勳賜爵汶陽子加建武將軍後詔允與司徒崔浩述成國記以本官領著作郎時浩集諸術士考校漢元以來日月薄蝕五星行度并識前史之失別為魏曆以示允允曰天文曆數不可空論夫善言遠者必先驗於近且漢元年冬十月五星聚於東井此乃曆術之淺今譏漢史而不覺此謬恐後人譏今猶今之譏古浩曰所謬云何允曰案星傳金水二星常附日而行冬十月日在尾箕昏沒於申南而東井方出於寅北二星何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑三星之聚而怪二星之來允曰此不可以空言爭宜更審, WYG: ''}
