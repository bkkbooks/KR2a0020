  - {type: variant, offset: 803, length: 269, content: 言農事古人云方一里則為田三頃七十畝百里則田三萬七千頃若勤之則畝益三斗不勤則畝損三斗方百里損益之率為粟二百二十二萬斛況以天下之廣乎若公私有儲雖遇飢年復何憂哉世祖善之遂除田禁悉以授民初崔浩薦冀定相幽并五州之士數十人各起家郡守恭宗謂浩曰先召之人亦州郡選也在職已久勤勞未答今可先補前召外任郡縣以新召者代為郎吏又守令宰民宜使更事者浩固爭而遣之允聞之謂東宮博士管恬曰崔公其不免乎苟逞其非而校勝於上何以勝濟遼東公翟黑子有寵於世祖奉使并州受布千匹事尋發覺黑子請計於允曰主上問我為首為諱乎允曰公帷幄寵臣答詔宜實又自告忠誠罪必無慮中書侍郎崔覽公孫質等咸言首實, WYG: ''}
