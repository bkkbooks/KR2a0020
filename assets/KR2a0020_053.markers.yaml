  - {type: variant, offset: 9914, length: 0, content: '', WYG: 機亦時矣王公等以為何如議之所決不得旋踵欲遷者左不欲者右安定王休等相率如右南安王楨進曰夫愚者闇於成事智者見於未萌行至徳者不議於俗成大功者不謀於衆非常之人乃能非常之事廓神都以延王業度土中以制帝京周公啓之於前陛下行之於後固其宜也且天下至重莫若皇居人之所貴寜如遺體請上安聖躬下慰民望光宅中原輟彼南伐此臣等願言蒼生幸甚羣臣咸唱萬嵗高祖初謀南遷恐衆心戀舊乃示為大舉因以協定羣情外名南伐其實遷也舊人懐土多所不願内憚南征無敢言者於是定都洛陽沖言於高祖曰陛下方脩周公之制定鼎成周然營建六寢不可遊駕待就興築城郛難以馬上營訖願暫還北都令臣下經造功成事訖然後備文物之章和玉鑾之響巡時南徙軌儀土中高祖曰朕將巡省方岳至鄴小停春始便還未宜遂不歸北尋以沖為鎮南將軍侍中少傅如故委以營構之任改封陽平郡開國侯邑户如先車駕南伐以沖兼左僕射留守洛陽車駕渡淮别詔安南大將軍元英平南將軍劉藻討漢中召雍涇岐二州兵六千人擬戍南鄭剋城則遣沖表諫曰秦州險阨地接羗夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄今未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脱終攻不剋徒動民情連胡結夷事或難測輒依㫖密下刺史待軍剋鄭城然後差遣如臣愚見猶謂未足何者西道險阨單徑千里今欲深戍絶界之外孤據羣賊之口敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷冦所守意在惜地校之二義徳有淺深惠聲已逺何遽於一城哉且魏境所掩九州過八民人所臣十分而九所未民者惟漢北之與江外耳羈之在近豈急急於今日也宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹將為吞幷之舉今鍾離壽陽密邇未拔諸城新野跬步弗降所尅者舎之而不取所降者撫之而旋戮東道既未可以近力守西蕃寜可以逺兵固若果欲置者臣恐終以資敵也又今建都土中地接冦壤方湏大收死士平蕩江㑹輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死効未易可獲推此而論不戍為上高祖從之車駕還都引見沖等謂之曰本所以多置官者慮有令僕闇弱百事稽壅若明獨聰專則權勢大倂今朕雖不得為聰明又不為劣闇卿等不為大賢亦不為大惡且可一兩年許少置官司高祖自鄴還京汎舟洪池乃從容謂沖曰朕欲從此通渠於洛南伐之日何容不從此入洛從洛入河從河入汴從汴入清以至於淮下船而戰猶開户而鬬此乃軍國之大計今溝渠若湏二萬人以下六十日有成者宜以漸脩之沖對曰若爾便是士無遠渉之勞戰有兼人之力遷尚書僕射仍領少傅改封清淵縣開國侯邑户如前及太子恂廢沖罷少傅高祖引見公卿於清徽堂高祖曰聖人之大寳惟位與功是以功成作樂治定制禮今徙極中天創居嵩洛雖大構未成要自條紀略舉但南有未賔之豎兼兇蠻密邇朕夙夜悵惋良在於兹取南之計決矣朕行之謀必矣若依近代也則天子下帷深宫之内準上古也則有親行祚延七百魏晉不征旋踵而殞祚之脩短在徳不在征今但以行期未知早晚知幾其神乎朕既非神焉能知也而頃來隂陽卜術之士咸勸朕今征必剋此既家國大事宜共君臣各盡所見不得以朕先言便致依違退有同異沖對曰夫征戰之法先之人事然後卜筮今卜筮雖吉猶恐人事未備今年秋稔有損常實又京師始遷衆業未定加之征戰以為未可宜至來秋髙祖曰僕射之言非為不合朕意之所慮乃有社稷之憂然咫尺冦戎無宜自安理湏如此僕射言人事未從亦不必如此朕去十七年擁二十萬衆行不出畿甸此人事之盛而非天時往年乘機天時乃可而闕人事又致不㨗若待人事備復非天時若之何如僕射之言便終無征理朕若秋行無尅㨗三君子並付司宼不可不人盡其心罷議而出後世宗為太子高祖醼於清徽堂高祖曰皇儲所以纂厯三才光昭七祖斯乃億兆咸悦天人同泰故延卿就此一醼以暢忻情高祖又曰天地之道一盈一虛豈有常泰天道猶爾況人事乎故有升有黜自古而然悼徃欣今良用深歎沖對曰東暉承儲蒼生咸幸但臣前忝師傅弗能弼諧仰慙天日慈造寛含得預此醼慶愧交深高祖曰朕尚不能革其昬師傅何勞愧謝也後尚書疑元拔穆泰罪事沖奏曰前彭城鎮將元拔與穆泰同逆養子降壽宜從拔罪而太尉咸陽王禧等以為律文養子而為罪父及兄弟不知情者不坐謹審律意以養子於父非天性於兄弟非同氣敦薄既差故刑典有降是以養子雖為罪而兄弟不預然父兄為罪養子不知謀易地均情豈獨從戮乎理固不然臣以為依據律文追戮於所生則從坐於所養明矣又律惟言父不從子稱子不從父當是優尊厲卑之義臣禧等以為律雖不正見互文起制於乞也舉父之罪於養也見子坐是為互起互起兩明無罪必矣若以嫡繼養與生同則父子宜均祗明不坐且繼養之注云若有别制不同此律又令文云諸有封爵若無親子及其身卒雖有養繼國除不襲是為有福不及已有罪便預坐均事等情律令之意便相矛盾伏度律㫖必不然也臣沖以為指例條尋罪在無疑準令語情頗亦同式詔曰僕射之議據律明矣太尉等論於曲矯也飬所以從戮者縁其已免所生故不得復甄於所飬此獨何福長處吞舟于國所以不襲者重列爵特立制因天之所絶推而除之耳豈復報對刑賞于斯則應死可特原之沖機敏有巧思北京明堂圜丘太廟及洛都初基安處郊兆新起堂寢皆資於沖勤志彊力孜孜無怠旦理文簿兼營匠制几案盈積剞劂在手終不勞厭也然顯貴門族務益六姻兄弟子姪皆有爵官一家歳禄萬匹有餘是其親者雖復癡聾無不超越官次時論亦以此少之年纔四十而鬢鬚班白姿貌豐美未有衰狀李彪之入京也孤微寡援而自立不羣以沖好士傾心宗附沖亦重其器學禮而納焉每言之於高祖公私共相援益及彪為中尉兼尚書為高祖知待便謂非復藉沖而更相輕背惟公坐歛袂而已無復宗敬之意也沖頗銜之後高祖南征沖與吏部尚書任城王澄並以彪倨傲無禮遂禁止之奏其罪狀沖手自作家人不知辭甚激切因以自劾高祖覽其表歎悵者久之既而曰道固可謂溢也僕射亦為滿矣沖時震恐數數責彪前後愆悖瞋目大呼投折几案盡收}
