  - {type: line-break, offset: 9547, content: '', id: ZHSJ__dup13261}
  - {type: variant, offset: 9547, length: 0, content: '', WYG: 其秀儁者欲為中書學生安世年十一高宗見其尚小引問之安世陳説祖父甚有次第即以為學生高宗每幸國學恒獨被引問詔曰汝但守此至大不慮不富貴居父憂以孝聞天安初拜中散以温敏敬慎高宗親愛之累遷主客令蕭賾使劉纘朝貢安世美容貌善舉止纘等自相謂曰不有君}
  - {type: page-break, offset: 9547, content: '', id: KR2a0020_WYG_053-12a, image: WYG0261/WYG0261-0720c.png}
  - {type: variant, offset: 9547, length: 0, content: '', krp: 其秀儁者欲為中書學生安世年十一高宗見其尚小引問之安世陳説祖父甚有次第即以為學生高宗每幸國學恒獨被引問詔曰汝但守此至大不慮不富貴居父憂以孝聞天安初拜中散以温敏敬慎高宗親愛之累遷主客令蕭賾使劉纘朝貢安世美容貌善舉止纘等自相謂曰不有君}
  - {type: variant, offset: 9548, length: 1, content: 炳, WYG: 其能國乎纘等呼安世為典客安世曰三代不共禮五帝各異樂安足以亡秦之官稱於上國纘曰世異之號凡有幾也安世曰周謂掌客秦改典客漢名鴻臚今曰主客君等不欲影響文武而殷勤亡秦纘又指方山曰此山去燕然逺近安世曰亦由石頭之於番禺耳國家有江南使至多出藏内珍物令都下富室好容服者貨之令使任情交易使至金玉肆問價纘曰北方金玉大賤當是山川所出安世曰聖朝不貴金玉所以賤同瓦礫又皇上徳通神明山不愛寳故無川無金無山無玉纘初將大市得安世言慙而罷遷主客給事中時民困飢流散豪方多有占奪安世乃上疏曰臣聞量地畫野經國大式邑地相參致治之本井税之興其來日久田萊之數制之以限蓋欲使土不曠功民罔游力雄擅之家不獨膏腴之美單陋之夫亦有頃畝之分所以恤彼貧微抑兹貪欲同富約之不均一齊民於編户竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事渉數世三長既立始返舊墟廬井荒毁桑榆改植事已歴遠易生假冐彊宗豪族肆其侵凌遠認魏晉之家近引親舊之驗又年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑爭訟遷延連紀不判良疇委而不開柔桑枯而不採僥倖之徒興繁多之獄作欲令家豐嵗儲人給資用其可得乎愚謂今雖桑井難復宜更均量審其徑術令分藝有準力業相稱細民獲資生之利豪方靡餘地之盈則無私之澤乃播均於兆庶如阜如山可有積於比戸矣又所爭之田宜限年斷事久難明悉屬今主然後虛妄之民絶望於覬覦守分之士永免於凌奪矣高祖深納之後均田之制起於此矣出為安平將軍相州刺史假節趙郡公敦勸農桑禁斷淫祀西門豹史起有功於民者為之修飾廟堂表薦廣平宋飜陽平路恃慶皆為朝廷善士初廣平人李波宗族彊盛殘掠生民前刺史薛道􅋆親往討之波率其宗族拒戰大破􅋆軍遂為逋逃之藪公私成患百姓為之語曰李波小妹}
