  - {type: variant, offset: 595, length: 1, content: 高, WYG: 知永昌已過淮南康祖為其所破比有信使無此消息王元謨南土偏將不謂為才但以其北人故為前驅引導耳大軍未至而河冰向合元謨量宜反斾未為失算但因夜回歸致戎馬驚亂耳我家懸瓠小城陳憲小將魏帝傾國攻圍累旬不剋胡盛之偏裨小帥衆無二旅始濟翮水魏國}
