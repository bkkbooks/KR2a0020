  - {type: variant, offset: 298, length: 1, content: 西, WYG: 在此如何不遣暫出尋自令反豈復茍留一人暢曰知欲程天祚兄弟集聚已勒遣之但其固辭不往孝伯曰豈有子弟聞其父兄而反不肯相見此便禽獸之不若貴土風俗何至如此世祖又遣賜義恭駿等氈各一領鹽各九種并胡豉孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自食黒鹽治腹脹氣滿末之六銖以酒而服胡鹽治目痛戎鹽治諸瘡赤鹽駿鹽臭鹽馬齒鹽四種竝非食鹽太尉安北何不遣人來至朕間彼此之情雖不可盡要復見朕小大知朕老少觀朕為人暢曰魏帝久為往來所具李尚書親自銜命不患彼此不盡故不復遣信義恭獻蠟燭十梃駿獻錦一匹孝伯曰君南土士人何為著屩君而著此將士云何暢曰士人之言誠為多愧但以不武受命統軍戎陳之閒不容緩服孝伯曰永昌王自頃恒}
