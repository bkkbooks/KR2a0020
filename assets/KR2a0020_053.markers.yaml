  - {type: variant, offset: 9559, length: 2, content: 征虜, WYG: 司徒長兼主簿太師高陽王雍表薦瑒為其友正主簿于時民多絶户而為沙門瑒上言禮以教世法導將來跡用既殊區流亦别故三千之罪莫大不孝不孝之大無過於絶祀然則絶祀之罪重莫甚焉安得輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶湏裁之以禮一身親老棄家絶養既非人理尤乖禮情堙滅大倫且闕王貫交缺當世之禮而求將來之益孔子云未知生焉知死斯言之至亦為備矣安有棄堂堂之政而從鬼敎乎又今南服未静衆役仍煩百姓之情方多避役若復聽之恐捐棄孝慈比屋而是沙門都統僧暹等忿瑒鬼教之言以瑒為謗毁佛法泣訴靈太后太后責之瑒自理曰竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毁且鬼神之名皆通靈達稱自百代正典叙三皇五帝皆號為鬼天地曰神祇人死曰鬼易曰知鬼神之情狀周公自美亦曰能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼教佛非天非地本出於人應世導俗其道幽隠名之為鬼愚謂非謗且心無不善以佛道為教者正可未達衆妙之門耳靈太后雖知瑒言為允然不免暹等之意獨罰瑒金一兩轉尚書郎加伏波}
