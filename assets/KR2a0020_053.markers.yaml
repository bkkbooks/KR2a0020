  - {type: variant, offset: 3899, length: 340, content: 時求官乞職汝等把弓刀侍朕左右徒立勞耳皆至公王此人把筆匡我國家不過作郎汝等不自愧乎於是拜允中書令著作如故司徒陸麗曰高允雖蒙寵待而家貧布衣妻子不立高宗怒曰何不先言今見朕用之方言其貧是日幸允第惟草屋數間布被縕袍中鹽菜而已高宗歎息曰古人之清貧豈有此乎即賜帛五百匹粟千斛拜長子忱為綏遠將軍長樂太守允頻表固讓高宗不許初與允同徵游雅等多至通官封侯及允部下吏百數十人亦至刺史二千石而允為郎二十七年不徙官時百官無祿允常使諸子樵采自給初尚書竇瑾坐事誅瑾子遵亡在山澤遵母焦沒入縣官後焦以老得免瑾之親故莫有恤者允愍焦年老保護在家積六年遵始蒙赦其篤行如此轉太常卿本官如故允上代都賦因以規諷亦二京之流也文多不載時中書博士索敞與侍郎傅默梁祚論名字貴賤著議紛紜允遂著名字論以釋其惑甚有典證復以本官領祕書監解太常卿, WYG: ''}
