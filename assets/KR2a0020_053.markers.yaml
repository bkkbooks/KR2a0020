  - {type: variant, offset: 9546, length: 0, content: '', WYG: 文昭公孝伯體度恢雅明達政事朝野貴賤咸推重之恭宗曽啓世祖廣徴俊秀世祖曰朕有一孝伯足治天下何用多為假復求訪此人輩亦何可得其見賞如此性方慎忠厚毎朝廷大事有不足必手自書表切言陳諫或不從者至於再三削滅藁草家人不見公庭論議常引綱紀或有言事者孝伯恣其所陳假有是非終不抑折及見世祖言其所長初不隠人姓名以為已善故衣冠之士服其雅正自崔浩誅後軍國之謀咸出孝伯世祖寵眷有亞於浩亦以宰輔遇之獻替補闕其迹不見時人莫得而知也卒之日遠近哀傷焉孝伯美名聞於遐邇李彪使於江南蕭賾謂之曰孝伯於卿遠近其為遠人所知若此孝伯妻崔賾女高明婦人生一子元顯崔氏卒後納翟氏不以為妻也憎忌元顯後遇劫元顯見害世云翟氏所為也元顯志氣甚高為時人所傷惜翟氏二子安民安上竝有風度安民襲爵壽光侯司徒司馬卒贈郢州刺史無子爵除安上鉅鹿太守亦早卒安民弟豹子正光三年上書曰竊惟庸勲賞勞有國恒典興滅繼絶哲后所先是以積徳累忠春秋許宥十世立功著節河山誓其永久伏惟世祖太武皇帝英叡自天籠罩日域東清遼海西定玉門凌滅漠北飲馬江水臣亡父故尚書宣城公先臣孝伯㝠基感㑹邀幸昌辰綢繆幃幄繾綣侍從廟算嘉謀每蒙顧採于時儲后監國奏請徴賢詔報曰朕有一孝伯足以治天下何用多為其見委遇乃至於此是用寵以元凱爵以公侯詔册曰江陽之廵竒謀屢進六師大㨗亦有勲焉出内勤王寵遇隆厚方開大賞而世祖登遐梓宫始遷外任名岳高宗沖年纂運未及追叙臣行舛百靈先臣棄世微績未甄誠志長奪搢紳僉傷早世朝野咸哀不永臣亡兄襲無子封除永惟宗構五情崩圯先臣榮寵前朝勲書王府同之常倫爵封堙墜準古量今實深茶苦竊惟朝例廣川王遵太原公元大曹等竝以勲重先朝世絶繼祀或以傍親或聽弟襲皆傳河山之功垂不世之賞況先臣在䝉委任運籌幃帟勲著於中聲傳於外事等功均今古無易是以漢賞信布裁重良平魏酬張徐不棄荀郭今數族追賞於先朝之世先臣絶封於聖明之時瞻流顧侣存亡永恨竊見正始中爰發存亡之詔襃賢報功之㫖熙平元年故任城王澄所請十事復新前澤成一時之盛事垂曠代之茂典凡在纓紱誰不感慶蓋以奬勸來今垂範萬古且劉氏偽書飜流上國尋其訕謗百無一實前後使人不書姓字亦無名爵至於張暢傳中略叙先臣對問雖改脱略盡自欲矜高然逸韻難虧猶見稱載非直存益於時沒亦有彰國美乞覽此書昭然可見則微微衰構重起一朝先臣潛魂結草於千載矣卒不得襲孝伯兄祥字元善學傳家業鄉黨宗之世祖詔州郡舉賢良祥應貢對䇿合旨除中書博士時南土未賔世祖親駕遣尚書韓元興率衆出青州以祥為軍司略地至于陳汝淮北之民詣軍降者七千餘尸遷之於兖豫之南置淮陽郡以撫之拜祥為太守加綏遠將軍流民歸之者萬餘家勸課農桑百姓安業世祖嘉之賜以衣馬遷河間太守有威恩之稱太安中徴拜中書侍郎民有千餘上書乞留數年高宗不許卒官追贈定州刺史平棘子諡曰憲子安世幼而聰悟興安二年高宗引見侍郎博士之子}
