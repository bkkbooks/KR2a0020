  - {type: variant, offset: 7523, length: 2018, content: 皇誥允上酒訓曰臣被敕論集往世酒之敗德以為酒訓臣以朽邁人倫所棄而殊恩過隆錄臣於將歿之年勗臣於已墜之地奉命驚惶喜懼兼甚不知何事可以上答伏惟陛下以叡哲之姿撫臨萬國太皇太后以聖德之廣濟育羣生普天之下罔不稱賴然日昃憂勤虛求不已思監往事以為警戒此之至誠悟通百靈而況於百官士民不勝踴躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀採伏願聖慈體臣悾悾之情恕臣狂瞽之意其詞曰自古聖王其為饗也玄酒在堂而鏥酒在下所以崇本重原降於滋味雖汎爵旅行不及於亂故能禮章而敬不虧事畢而儀不忒非由斯致是失其道將何以範時軌物垂之於世歷觀往代成敗之效吉凶由人不在數也商辛耽酒殷道以之亡公旦陳誥周德以之昌子反昏酣而致斃穆生不飲而身光或長世而為戒或百代而流芳酒之為狀變惑情性雖曰哲人孰能自競在官者殆於政也為下者慢於令也聰達之士荒於聽也柔順之倫興於諍也久而不悛致於病也豈止於病乃損其命諺亦有云其益如毫其損如刀言所益者止於一味之益不亦寡乎言所損者夭年亂志夭亂之損不亦夥乎無以酒荒而陷其身無以酒狂而喪其倫迷邦失道流浪漂津不師不遵反將何因詩不言乎如切如瑳如琢如磨朋友之義也作官以箴之申謨以禁之君臣之道也其言也善則三覆而佩之言之不善則哀矜而貸之此實先王納規之意往者有晉士多失度肆散誕以為不羇縱長酣以為高達調酒之頌以相眩曜稱堯舜有千鍾百觚之飲著非法之言引大聖為譬以則天之明豈其然乎且子思有云夫子之飲不能一升以此推之千鍾百觚皆為妄也今大魏應圖重明御世化之所暨無思不服仁風敦洽於四海太皇太后以至德之隆誨而不倦憂勤備於皇情誥訓行於無外故能道協兩儀功同覆載仁恩下逮罔有不遵普天率土靡不蒙賴在朝之士有志之人宜克己從善履正存貞節酒以為度順德以為經悟昏飲之美疾審敬慎之彌榮遵孝道以致養顯父母而揚名蹈閔曾之前軌遺仁風於後生仰以答所授俯以保其成可不勉歟可不勉歟高祖悅之常置左右詔允乘車入殿朝賀不拜明年詔允議定律令雖年漸期頤而志識無損猶心存舊職披考史書又詔曰允年涉危境而家貧養薄可令樂部絲竹十人五日一詣允以娛其志特賜允蜀牛一頭四望蜀車一乘素几杖各一蜀刀一口又賜珍味每春秋常致之尋詔朝晡給膳朔望致牛酒衣服綿絹每月送給允皆分之親故是時貴臣之門皆羅列顯官而允子弟皆無官爵其廉退若此遷尚書散騎常侍時延入備几杖問以政治十年加光祿大夫金章紫綬朝之大議皆咨訪焉魏初法嚴朝士多見杖罰允歷事五帝出入三省五十餘年初無譴咎初真君中以獄訟留滯始令中書以經義斷諸疑事允據律評刑三十餘載內外稱平允以獄者民之命也常歎曰臯陶至德也其後英蓼先亡劉項之際英布黥而王經世雖久猶有刑之餘釁況凡人能無咎乎其年四月有事西郊詔以御馬車迎允就郊所板殿觀矚馬忽驚奔車覆傷眉三處高祖文明太后遣醫藥護治存問相望司駕將處重坐允啟陳無恙乞免其罪先是命中黃門蘇興壽扶持允曾雪中遇犬驚倒扶者大懼允慰勉之不令聞徹興壽稱共允接事三年未嘗見其忿色恂恂善誘誨人不倦晝夜手常執書吟詠尋覽篤親念故虛己存納雖處貴重志同貧素性好音樂每至伶人弦歌鼓舞常擊節稱善又雅信佛道時設齋講好生惡殺性又簡至不妄交遊顯祖平青齊徙其族望於代時諸士人流移遠至率皆飢寒徙人之中多允姻媾皆徒步造門允散財竭產以相贍賑慰問周至無不感其仁厚收其才能表奏申用時議者皆以新附致異允謂取材任能無宜抑屈先是允被召在方山作頌志氣猶不多損談說舊事了無所遺十一年正月卒年九十八初允每謂人曰吾在中書時有陰德濟救民命若陽報不差吾壽應享百年矣先卒旬外微有不適猶不寢臥呼醫請藥出入行止吟詠如常高祖文明太后聞而遣醫李脩往脉視之告以無恙脩入密陳允榮衞有異懼其不久於是遣使備賜御膳珍羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被几杖羅列於庭王官往還慰問相屬允喜形於色語人曰天恩以我篤老大有所賚得以贍客矣表謝而已不有他慮如是數日夜中卒家人莫覺詔給絹一千匹布二千匹綿五百斤錦五十匹雜綵百匹穀千斛以周喪用魏初以來存亡蒙賚者莫及焉朝庭榮之將葬贈侍中司空公冀州刺史將軍公如故諡曰文賜命服一襲允所製詩賦誄頌箴論表讚左氏公羊釋毛詩拾遺論雜解議何鄭膏肓事凡百餘篇別有集行於世允明算法為算術三卷子忱襲忱字士和以父任除綏遠將軍長樂太守為政寬惠民庶安之後例降爵為侯尋卒孫貴賓襲除州治中卒官忱弟懷字士仁任城王雲郎中令大將軍從事中郎授中散恬淡退靜不競世利在散輩十八年不易官太和中除太尉東陽王諮議參軍而卒子綽字僧裕少孤恭敏自立身長八尺腰帶十圍沉雅有度量博涉經史太和十五年拜奉朝請太尉法曹行參軍尋兼尚書祠部郎以母憂去職久之除治書侍御史轉洛陽令綽為政強直不避豪貴邑人憚之又詔參議律令遷長兼國子博士行潁川郡事詔假節行涇州刺史延昌初遷尚書右丞參議壬子曆肅宗初司徒清河王懌司馬冠軍又隨懌遷太尉司馬其年秋大乘賊起於冀州都督元遙率衆討之詔綽兼散騎常侍持節以白虎幡軍前招慰綽信著州里降者相尋軍還除汲郡太守固辭不拜御史中尉元匡奏高聰及綽等朋附高肇詔並原罪俄行滎陽郡事以本將軍出除豫州刺史為政清平抑強扶弱百姓愛之流民歸附者二千餘戶遷後將軍并州刺史正光三年冬暴疾卒年四十八四年九月詔贈安東將軍冀, WYG: ''}
