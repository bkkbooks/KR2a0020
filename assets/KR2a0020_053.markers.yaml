  - {type: variant, offset: 597, length: 1, content: 長, WYG: 臣奔散僅得免脱滑臺之師無所多愧鄒山小戍雖有微險河畔之民多是新附始慕政化姦盜未息示使崔邪利撫之而已今雖陷没何損}
  - {type: variant, offset: 597, length: 1, content: 長, krp: 臣奔散僅得免脱滑臺之師無所多愧鄒山小戍雖有微險河畔之民多是新附始慕政化姦盜未息示使崔邪利撫之而已今雖陷没何損}
  - {type: variant, offset: 599, length: 2, content: 曆數, WYG: 國魏帝自以十萬之師而制一崔邪利乃復足言也近聞蕭縣百姓竝依山險聊遣馬文恭以十隊迎之耳文恭前以三隊出還走彼大營嵇𤣥敬以百舸至留城魏軍奔敗輕敵致此亦非所卹王境人民列居河畔二國交兵當互加撫飬而魏師入境事生意外官不負民民亦何怨知入境七百里無相捍拒此自上由太尉神算次在武陵聖略軍國之要雖不預聞然用兵有機閒亦不容相語孝伯曰君藉此虚談支離相對可謂遁辭知其所窮且主上}
