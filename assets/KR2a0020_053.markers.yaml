  - {type: variant, offset: 9909, length: 0, content: '', krp: 常}
  - {type: variant, offset: 9910, length: 0, content: '', WYG: 給事中如故尋轉南部尚書賜爵順陽侯沖為文明太后所幸恩寵日盛賞賜月至數十萬進爵隴西公密致珍寳御物以充其第外人莫得而知焉沖家素清貧於是始為富室而謙以自牧積而能散近自姻族逮于鄉閭莫不分及虚已接物垂念覉寒衰舊淪屈由之躋叙者亦以多矣時以此稱之初沖兄佐與河南太守來崇同自涼州入國素有微嫌佐因縁成崇罪餓死獄中後崇子護又糾佐贓罪佐及沖等悉坐幽繫㑹赦乃免佐甚銜之至沖寵貴綜攝内外護為南部}
  - {type: page-break, offset: 9910, content: '', id: KR2a0020_WYG_053-19a, image: WYG0261/WYG0261-0724a.png}
  - {type: variant, offset: 9910, length: 0, content: '', krp: 給事中如故尋轉南部尚書賜爵順陽侯沖為文明太后所幸恩寵日盛賞賜月至數十萬進爵隴西公密致珍寳御物以充其第外人莫得而知焉沖家素清貧於是始為富室而謙以自牧積而能散近自姻族逮于鄉閭莫不分及虚已接物垂念覉寒衰舊淪屈由之躋叙者亦以多矣時以此稱之初沖兄佐與河南太守來崇同自涼州入國素有微嫌佐因縁成崇罪餓死獄中後崇子護又糾佐贓罪佐及沖等悉坐幽繫㑹赦乃免佐甚銜之至沖寵貴綜攝内外護為南部}
  - {type: punctuation, offset: 9911, content: ，, id: KR2a0020_ZHSJ_053-bkkpn2112}
  - {type: 'tls:seg', offset: 9911, content: '', id: KR2a0020_ZHSJ_053-d53p157s5}
  - {type: variant, offset: 9911, length: 0, content: '', WYG: 深慮為沖所陷常求退避而沖每慰撫之護後坐贓罪懼必不濟沖乃具奏與護本末嫌隙乞原恕之遂得不坐沖從甥隂始孫孤貧徃來沖家至如子姪有人求官因其納馬於沖始孫輒受而不為言後假方便借沖此馬馬主見沖乘馬而不得官後乃自陳始末沖聞之大驚執始孫以狀款奏始孫坐死其處要自厲不念愛惡皆此類也是時循舊王公重臣皆呼其名高祖常謂沖為中書而不名之文明太后崩後高祖居喪引見待接有加及議禮儀律令潤飾辭㫖刋定輕重高祖雖自下筆無不訪決焉沖竭忠奉上知無不盡出入憂勤形於顔色雖舊臣戚輔莫能逮之無不服其明斷慎密而歸心焉於是天下翕然及殊方聽望咸宗竒之高祖亦深相仗信親敬彌甚君臣之間情義莫二及改置百司開建五等以沖參定典式封滎陽郡開國侯食邑八百户拜廷尉卿尋遷侍中吏部尚書咸陽王師東宫既建拜太子少傅高祖初依周禮置夫嬪之列以沖女為夫人詔曰昔軒皇誕御垂棟宇之構爰歴三代興宫觀之式然茅茨土階昭徳於上代層臺廣厦崇威於中業良由文質異宜華朴殊禮故也是以周成繼業營明堂於東都漢祖聿興建未央於咸鎬蓋所以尊嚴皇威崇重帝徳豈好奢惡儉茍敝民力者哉我皇運統天協纂乾厯鋭意四方未遑建制宫室之度頗為未允太祖初基雖粗有經式自兹厥後復多營改至於三元慶饗萬國充庭觀光之使具瞻有闕朕以寡徳猥承洪緖運屬休期事鍾昌運宜遵遠度式兹宫宇指訓規模事昭於平日明堂太廟已成於昔年又因往嵗之豐資藉民情之安逸將以今春營改正殿違犯時令行之惕然但朔土多寒事殊南夏自非裁度當春興役徂暑則廣制崇基莫由克就成功立事非委賢莫可改制規模非任能莫濟尚書沖器懐淵博經度明遠可}
