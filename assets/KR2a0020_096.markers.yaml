  - {type: variant, offset: 3851, length: 551, content: 矣於是鳩集諸經廣校同異比三傳事例名春秋叢林十有二卷為璠等判析隱伏垂盈百條滯無常滯纖毫必舉通不長通有枉斯屈不苟言以違經弗飾辭而背理辭氣磊落觀者忘疲每曰丈夫擁書萬卷何假南面百城遂絕跡下幃杜門却掃棄產營書手自刪削卷無重複者四千有餘矣猶括次專家搜比讜議隆冬達曙盛暑通宵雖仲舒不闚園君伯之閉戶高氏之遺漂張生之忘食方之斯人未足為喻謐嘗詣故太常卿劉芳推問音義語及中代興廢之由芳乃歎曰君若遇高祖侍中太常非僕有也前河南尹黃門侍郎甄琛內贊近機朝野傾目于時親識求官者答云趙郡李謐耽學守道不悶于時常欲致言但未有次耳諸君何為輕自媒衒謂其子曰昔鄭玄盧植不遠數千里詣扶風馬融今汝明師甚邇何不就業也又謂朝士曰甄琛行不媿時但未薦李謐以此負朝廷耳又結宇依巖憑崖鑿室方欲訓彼青衿宣揚墳典冀西河之教重興北海之風不墜而祐善空聞暴疾而卒邦國銜殄悴之哀儒生結摧梁之慕況璠等或服議下風或親承音旨師儒之義其可默乎事奏詔曰謐屢辭徵辟志守沖素儒隱之操深可嘉美可遠傍惠康近準玄晏諡曰貞靜處士并表其門閭以旌高節遣謁者奉冊於是表其門曰文德里曰孝義云鄭脩北海人也少隱於岐南几谷中依巖結宇獨處淡然屏迹人事不交世俗耕食水飲皮冠草服雅好經史專意玄門前後州將每徵不至岐州刺史魏蘭根頻遣致命脩不得已暫出見蘭根尋還山舍蘭根申表薦脩肅宗詔付雍州刺史蕭寶夤訪實以聞會寶夤作逆事不行, WYG: ''}
