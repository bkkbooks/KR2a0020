  - {type: variant, offset: 503, length: 276, content: 坐經年送夸本騾兼遺以所乘馬為書謝之夸更不受其騾馬亦不復書及浩誅為之素服受鄉人弔唁經一時乃止歎曰崔公既死誰能更容眭夸遂作朋友篇辭義為時人所稱婦父鉅鹿魏攀當時名達之士未嘗備壻之禮情同朋好或人謂夸曰吾聞有大才者必居貴仕子何獨在桑榆乎遂著知命論以釋之年七十五卒葬日赴會者如市無子馮亮字靈通南陽人蕭衍平北將軍蔡道恭之甥也少博覽諸書又篤好佛理隨道恭至義陽會中山王英平義陽而獲焉英素聞其名以禮待接亮性清淨至洛隱居崧高感英之德以時展勤及英亡亮奔赴盡其哀慟世宗嘗召以為羽林監領中書舍人將令侍講十地諸經固辭不拜又欲使衣幘入見亮苦求以幅巾就朝遂不強逼還山數年與僧徒禮誦為業蔬, WYG: 皮毛飲}
