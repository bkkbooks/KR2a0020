  - {type: variant, offset: 209, length: 0, content: '', WYG: 桓修與劉毅等舉兵討𤣥𤣥敗走尋陽擕徳宗兄弟至於江陵又走荆州荆州别駕王康産南郡相王騰之迎徳宗入南郡府桓𤣥死𤣥將桓振復襲江陵斬王康産及騰之將殺徳宗𤣥揚州刺史新安王桓謙苦禁之乃止時盧循執徳宗廣州刺史吳隠之自號平南將軍廣州刺史令其黨徐道覆據始興餘郡皆以親黨居之徳宗復僣立於江陵改年義熙尚書陶夔迎徳宗達于板橋大風暴起龍舟沉沒死者十餘人徳宗發江陵至尋陽其益州刺史毛璩參軍譙縱反攻涪城剋之遂以益州叛徳宗徳宗發姑孰還建業六月太祖遣軍攻徳宗鉅鹿太守賀申申舉城降永興二年盧循復起於嶺南殺徳宗江州刺史何無忌於石城咸欲以徳宗北走知循未下乃止裕令撫軍劉毅討循敗於桑落洲步走而還裕黨孟昶諸葛長民等勸裕擁徳宗過江裕不從神瑞二年徳宗遣廣武將軍𤣥文石齊朝貢太宗初劉裕征姚泓三年太宗遣長孫道生娥清破其將朱超石於石河擒騎將楊豐斬首千七百餘級三年徳宗死弟徳文僣立四年改年曰元熙五年徳文禪位於裕裕封徳文為零陵王徳文后河南褚氏兄季之弟淡之雖徳文姻戚而盡心於裕徳文每生男輙令方便殺焉或誘内人密加毒害前後非一及徳文被廢囚於秣陵宫常懼見禍與褚氏共止一室慮有鴆毒自煮食於前六年劉裕將殺之不欲遣人入内令淡之兄弟視褚氏褚氏出别宫於是兵乃踰垣而入進藥於徳文徳文不肯飲曰佛教自殺者不復人身乃以被掩殺之自叡之僣江南至於徳文之死君弱臣彊不相羈制賞罰號令皆出權寵危亡廢奪釁故相尋所謂夷狄之有君不若諸夏之亡也賨李雄字仲儁蓋廩君之苗裔也其先居於巴西宕渠秦并天下為黔中郡薄賦其民口出錢三十巴人謂賦為賨因為名焉後徙櫟陽祖慕魏東羌獵將慕有五子輔特庠流驤晉恵時關西擾亂頻嵗大饑特兄弟率流民數萬家就榖漢中遂入巴蜀時晉益州刺史趙廞反叛特兄弟起兵誅之晋拜特宣威將軍長樂鄉侯流奮威將軍武陽侯流民閻式等推特行鎮北大將軍承制封拜流行鎮東將軍後與晋益州刺史羅尚相攻昭帝七年特自稱大將軍大都督號年建初戰敗為尚所殺流代統兵事流字元通自號大都督大將軍流病將死以後事屬雄雄特少子也雄自稱大都督大將軍十年僣稱成都王號年建興置百官時涪陵人范長生頗有術數雄篤信之勸雄即真十二年僣稱皇帝號大成改年為晏平拜長生為天地太師領丞相西山王又改年為玉衡雄以中原喪亂乃頻遣使朝貢與穆帝請分天下雄捨其子而立兄盪第四子班為太子烈帝六年雄死班代統任雄子期殺班而自立期字世運雄第四子也改年為玉恒驤子壽自涪城襲剋成都廢期為卭都公期自殺夀字武考初為雄大將軍封建寧王以南中十二郡為建寧國至期徙封漢王既廢期自立改年為漢興又改號曰漢時建國元年也夀廣漢太守李乾與大臣謀欲廢夀夀懼令子廣與大臣盟於殿前夀聞鄴中殷實宫觀美麗石虎以殺罰御下控制邦域城鎮深用欣慕吏民有小過輙殺之以立威名又以郊甸未實城邑空虚工匠器械事用不足乃徙民三丁巳上於成都興尚方御府發州都工巧以充之廣修宫室引水入城務於奢侈百姓疲於使役民多嗟怨思亂者十室而九其尚書左僕射蔡興直言切諌夀以為謗訕誅之其臣龔壮作詩七首託言應璩以諷夀夀報曰省詩知意若今人所作賢哲之話言古人所作死鬼之常辭耳動慕漢武魏明政法恥聞}
