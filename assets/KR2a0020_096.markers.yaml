  - {type: variant, offset: 2052, length: 1683, content: 禮與玉藻既同夏殷又符周秦雖乖衆儒儻或在斯矣考工記曰周人明堂度以九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵余謂記得之於五室而謬於堂之修廣何者當以理推之令愜古今之情也夫明堂者蓋所以告月朔布時令宗文王祀五帝者也然營構之範自當因宜創制耳故五室者合於五帝各居一室之義且四時之祀皆據其方之正又聽朔布令咸得其月之辰可謂施政及祀二三俱允求之古義竊為當矣鄭康成漢末之通儒後學所宗正釋五室之位謂土居中木火金水各居四維然四維之室既乖其正施令聽朔各失厥衷左右之个棄而不顧乃反文之以美說飾之以巧辭言水木用事交於東北木火用事交於東南火土用事交於西南金水用事交於西北既依五行當從其方用事之交出何經典可謂攻於異端言非而博疑誤後學非所望於先儒也禮記玉藻曰天子聽朔於南門之外閏月則闔門左扉立於其中鄭玄注曰天子之廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月聽其朔於明堂門下還處路寢門終月也而考工記周人明堂玄注曰或舉王寢或舉明堂互言之以明其制同也其同制之言皆出鄭注然則明堂與寢不得異矣而尚書顧命篇曰迎子釗南門之外延入翼室此之翼室即路寢矣其下曰大貝賁鼓在西房垂之竹矢在東房此則路寢有左右房見於經史者也禮記喪大記曰君夫人卒於路寢小斂婦人髽帶麻於房中鄭玄注曰此蓋諸侯禮帶麻於房中則西房天子諸侯左右房見於注者也論路寢則明其左右房言明堂則闕其左右个同制之說還相矛盾通儒之注何其然乎使九室之徒奮筆而爭鋒者豈不由處室之不當哉記云東西九筵南北七筵五室凡室二筵置五室於斯堂雖使班倕構思王爾營度則不能令三室不居其南北也然則三室之間便居六筵之地而室壁之外裁有四尺五寸之堂焉豈有天子布政施令之所宗祀文王以配上帝之堂周公負扆以朝諸侯之處而室戶之外僅餘四尺而已哉假在儉約為陋過矣論其堂宇則偏而非制求之道理則未愜人情其不然一也余恐為鄭學者苟求必勝競生異端以相訾抑云二筵者乃室之東西耳南北則狹焉余故備論之曰若東西二筵則室戶之外為丈三尺五寸矣南北戶外復如此則三室之中南北裁各丈二尺耳記云四旁兩夾窗若為三尺之戶二尺之窗窗戶之間裁盈一尺繩樞甕牖之室蓽門圭竇之堂尚不然矣假令復欲小廣之則四面之外闊狹不齊東西既深南北更淺屋宇之制不為通矣驗之衆塗略無算焉且凡室二筵丈八地耳然則戶牖之間不踰二尺也禮記明堂天子負斧扆南向而立鄭玄注曰設斧於戶牖之間而鄭氏禮圖說扆制曰縱廣八尺畫斧文於其上今之屏風也以八尺扆置二尺之間此之叵通不待智者較然可見矣且若二筵之室為四尺之戶則戶之兩頰裁各七尺耳全以置之猶自不容矧復戶牖之間哉其不然二也又復以世代檢之即虞夏尚朴殷周稍文制造之差每加崇飾而夏后世室堂修二七周人之制反更促狹豈是夏禹卑宮之意周監郁郁之美哉以斯察之其不然三也又云堂崇一筵便基高九尺而壁戶之外裁四尺五寸於營制之法自不相稱其不然四也又云室中度以几堂上度以筵而復云凡室二筵而不以几還自相違其不然五也以此驗之記者之謬抑可見矣盛德篇云明堂凡九室三十六戶七十二牖上員下方東西九仞南北七筵堂高三尺也余謂盛德篇得之於戶牖失之於九室何者五室之制傍有夾房面各有戶戶有兩牖此乃因事立則非拘異術戶牖之數固自然矣九室者論之五帝事既不合施之時令又失其辰左右之个重置一隅兩辰同處參差出入斯乃義無所據未足稱也且又堂之修廣裁六十三尺耳假使四尺五寸為外之基其中五十四尺便是五室之地計其一室之中僅可一丈置其戶牖則於何容之哉若必小而為之以容其數則令帝王側身出入斯為怪矣此匪直不合典制抑亦可哂之甚也余謂其九室之言誠亦有由然竊以為戴氏聞三十六戶七十二牖弗見其制靡知所置便謂一室有四戶之窗計其戶牖之數即以為九室耳或未之思也蔡伯喈漢末之時學士而見重於當時即識其修廣之不當而必未思其九室之為謬更修而廣之假其法像可謂因偽飾辭順非而澤諒可歎矣余今省彼衆家委心從善庶探其衷不為苟異但是古非今俗間之常情愛遠惡近世中之事而千載之下獨論古制驚俗之談固延多誚脫有深賞君子者覽而揣之儻或存焉謐不飲酒好音律愛樂山水高尚之情長而彌固一遇其賞悠爾忘歸乃作神士賦歌曰周孔重儒教莊老貴無為二途雖如異一是買聲兒生乎意不愜死名用何施可心聊自樂終不為人移脫尋余志者陶然正若斯延昌四年卒年, WYG: 亡}
