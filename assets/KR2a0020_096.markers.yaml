  - {type: variant, offset: 201, length: 1, content: 沒, WYG: 平東府事當遷鎮江東屬陳敏作亂叡以兵少因留下邳永嘉元年春敏死秋叡始到建業五年進鎮東将軍開府儀同三司又以㑹稽戸二萬増封加督揚江湘交廣五州諸軍事六月王彌劉曜宼洛陽懐帝幸平陽晋司空荀蕃司隷校尉荀組推叡為盟主於是輙改易郡縣假置名號江州刺史華軼北中郎将裴憲並不從之憲自稱鎮東将軍都督江北五郡軍事與軼連和叡遣左将軍王敦将軍甘卓周訪等擊軼斬之憲奔于}
