  - {type: variant, offset: 1192, length: 757, content: 璠還就謐請業同門生為之語曰青成藍藍謝青師何常在明經謐以公子徵拜著作佐郎辭以授弟郁詔許之州再舉秀才公府二辟並不就惟以琴書為業有絕世之心覽考工記大戴禮盛德篇以明堂之制不同遂著明堂制度論曰余謂論事辨物當取正於經典之真文援證定疑必有驗於周孔之遺訓然後可以稱準的矣今禮文殘缺聖言靡存明堂之制誰使正之是以後人紛糾競興異論五九之說各信其習是非無準得失相半故歷代紛紜靡所取正乃使裴頠云今羣儒紛糾互相掎摭就令其象可得而圖其所以居用之禮莫能通也為設虛器耳況漢氏所作四維之个復不能令各處其辰愚以為尊祖配天其儀明著廟宇之制理據未分直可為殿屋以崇嚴父之祀其餘雜碎一皆除之斯豈不以羣儒舛互並乖其實據義求衷莫適可從哉但恨典文殘滅求之靡據而已矣乃復遂去室牖諸制施之於教未知其所隆政求之於情未可喻其所以必須惜哉言乎仲尼有言曰賜也爾愛其羊我愛其禮余以為隆政必須其禮豈彼一羊哉推此而論則聖人之於禮殷勤而重之裴頠之於禮任意而忽之是則頠賢於仲尼矣以斯觀之裴氏之子以不達而失禮之旨也余竊不自量頗有鄙意據理尋義以求其真貴合雅衷不苟偏信乃藉之以禮傳考之以訓注博採先賢之言廣搜通儒之說量其當否參其同異棄其所短收其所長推義察圖以折厥衷豈敢必善聊亦合其言志矣凡論明堂之制者雖衆然校其大略則二途而已言五室者則據周禮考工之記以為本是康成之徒所執言九室者則案大戴盛德之篇以為源是伯喈之倫所持此之二書雖非聖言然是先賢之中博見洽通者也但各記所聞未能全正可謂既盡美矣未盡善也而先儒不能考其當否便各是所習卒相非毀豈達士之確論哉小戴氏傳禮事四十九篇號曰禮記雖未能全當然多得其衷方之前賢亦無愧矣而月令玉藻明堂三篇頗有明堂之義余故採掇二家參之月令以為明堂五室古今通則其室居中者謂之太室太室之東者謂之青陽當太室之南者謂之明堂當太室之西者謂之總章當太室之北者謂之玄堂四面之室各有夾房謂之左右个, WYG: ''}
