  - {type: variant, offset: 3816, length: 973, content: 樹屯兵梁國欲來逆戰見子鵠軍盛夜退還譙子鵠引兵追躡樹又背城為陳子鵠勒兵直趣城下縱騎衝突樹衆大敗奔入城門城門隘塞多自殺害於是斬千餘級獲馬數百匹大收鎧仗遂圍城加儀同三司樹勒兵出戰輒被摧衄遂不敢出自守而已子鵠恐蕭衍遣救乃分兵擊衍苞州然州宕州大澗蒙縣等五城並望風逃散樹既無外援計無所出子鵠又令人說之樹遂請率衆歸南以地還國子鵠等許之共結盟約及樹衆半出子鵠中擊破之擒樹及衍譙州刺史朱文開俘馘甚多班師出帝賚馬匹遷吏部尚書轉尚書右僕射尋加驃騎大將軍開府典選初青州人耿翔聚衆反亡奔蕭衍衍資其兵偷據膠州除子鵠使持節侍中青膠大使督濟州刺史蔡雋討之師達青州翔拔城奔走在軍遇病詔遣醫給藥仍除兗州刺史餘官如故便道之州子鵠先遣腹心緣歷民間採察得失及入境太山太守彭穆參候失儀子鵠責讓穆并數其罪狀穆皆引伏於是州內震悚及出帝入關子鵠據城為逆南青州刺史大野拔徐州人劉粹各率衆就子鵠天平初遣儀同三司婁昭等率衆討之子鵠先使前膠州刺史嚴思達鎮東平郡昭攻陷之仍引兵圍子鵠城久不拔昭以水灌城靜帝欲招慰下之遣散騎常侍陸琛兼黃門郎張景徵齎璽書勞子鵠而大野拔因與相見左右斬子鵠以降賀拔勝字破胡神武尖山人祖爾逗選充北防家於武川以窺覘蠕蠕兼有戰功顯祖賜爵龍城男為本鎮軍主父度拔襲爵正光末沃野人破落汗拔陵聚衆反度拔與三子鄉中豪勇援懷朔鎮殺賊王衞可瓌度拔尋為賊所害孝昌中追贈安遠將軍肆州刺史度拔之死也勝與兄弟俱奔州刺史廣陽王淵勝便弓馬有武幹淵厚待之表為強弩將軍充帳內軍主州陷歸尒朱榮轉積射將軍為別將又兼都督及榮入洛以預義之勳封易陽縣開國伯邑四百戶除直閤將軍尋加通直散騎常侍平南將軍光祿大夫進號安南將軍尋除撫軍將軍為大都督出井陘鎮中山元顥入洛勝從東路率騎三百赴行宮於河梁榮命勝與尒朱兆先渡破擒顥息冠受及顥大都督陳思保莊帝還宮以功增邑六百戶復加通直散騎常侍征北將軍金紫光祿大夫武衞將軍改封真定縣開國公尋除衞將軍加散騎常侍尒朱榮之死也勝與田怙等奔走榮第於時宮殿之門未加嚴防怙等議即攻門勝止之曰天子既行大事必當更有奇謀吾等衆旅不多何可輕爾但得出城更為他計怙乃止及世隆夜走勝遂不從莊帝甚嘉之仲遠逼東郡詔勝以本官假驃騎大將軍為東征都督率衆會鄭先護以討之為先護所疑置之營外人馬未得休息俄而仲遠兵至勝與交戰不利乃降之普泰初除右衞將軍進號車騎大將軍右光祿大夫儀同三司共尒朱仲遠度律北拒義旗相與奔退事在尒朱兆傳後俱敗於韓陵勝因降齊, WYG: 作}
