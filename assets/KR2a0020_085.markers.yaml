  - {type: variant, offset: 105, length: 4, content: 末尒朱榮, WYG: 中蜀賊陳雙熾所過殘暴至敬憲宅輙相約束不得焚燒為物所伏如此永興三年贈中書侍郎諡曰文盧觀字伯舉范陽涿人也少好學有儁才舉秀才射策甲科除太學博士著作佐郎與太常少卿李神儶光祿大夫王誦等在尚書上省撰定朝儀拜尚書儀曹郎中孝昌元年卒封肅字元邕渤海人尚書回之兄子也早有文思博渉經史太傅崔光見而賞焉位太學博士修起居注兼廷尉監為還園賦其辭甚美正光中京兆王西征}
