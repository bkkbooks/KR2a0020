  - {type: variant, offset: 6321, length: 1700, content: 逆亂遂歸尒朱榮榮引為都督府長流參軍稍遷大都督莊帝初除征西將軍金紫光祿大夫封栢人縣開國侯邑五百戶尒朱天光之討關西榮以悅為天光右廂大都督本官如故西伐克獲皆與天光賀拔岳略同勞效以本將軍除鄯州刺史餘如故尒朱榮死後亦隨天光下隴元曄立除車騎大將軍渭州刺史進爵為公改封白水郡增邑五百戶及天光向洛使悅行華州事普泰中除驃騎大將軍儀同三司秦州刺史天光之東出將抗義旗悅與岳下隴以應齊獻武王至雍州會尒朱覆敗永熙初加開府都督隴右諸軍事仍秦州刺史永熙三年正月岳召悅共討靈州悅誘岳斬之岳左右奔散悅遣人安慰云我別禀意旨止在一人諸君勿怖衆皆畏服無敢拒違悅心猶豫不即撫納乃還入隴止水洛城岳之所部聚於平涼規還圖悅遣追夏州刺史宇文黑獺黑獺至遂總岳部衆并家口入高平城以自安固乃勒衆入隴征悅悅聞之棄城南據山水之險設陳候戰黑獺至遙望見悅欲待明日決鬬悅先召南秦州刺史李景和其夜景和遣人詣黑獺密許翻降至暮景和乃勒其所部使上驢駝云儀同有教欲還秦州守以拒賊令軍人嚴備景和復紿悅帳下云儀同欲還秦州汝等何不裝辦衆謂為實以次相驚人情惶惑不可復止皆散走而趣秦州景和先驅至城據門以慰輯之悅部衆離散猜畏傍人不聽左右近己與其二弟并兒及謀殺岳者八九人棄軍迸走數日之中盤回往來不知所趣左右勸向靈州而悅不決言下隴之後恐有人所見乃於山中令從者悉步自乘一騾欲向靈州中路追騎將及望見之遂縊死野中弟息部下悉見擒殺唯先謀殺岳者悅中兵參軍豆盧光走至靈州後奔晉陽悅自殺岳後神情恍惚不復如常言我僅睡即夢見岳語我兄欲何處去隨我不相置因此彌不自安而致敗滅侯淵神武尖山人也機警有膽略肅宗末年六鎮飢亂淵隨杜洛周南寇後與妻兄念賢背洛周歸尒朱榮路中遇寇身披苫褐榮賜其衣帽厚待之以淵為中軍副都督常從征伐屢有戰功孝莊即位除領左右封厭次縣開國子邑四百戶後從榮討葛榮於滏口戰功尤多榮啟淵為驃騎將軍燕州刺史時葛榮別帥韓樓郝長等有衆數萬屯據薊城尒朱榮令淵與賀拔勝討之會元顥入洛榮徵勝南赴大軍留淵獨鎮中山及莊帝還宮榮令淵進討韓樓配卒甚少或以為言榮曰侯淵臨機設變是其所長若總大衆未必能用今擊此賊故當不足定也止給騎七百淵遂廣張軍聲多設供具親率數百騎深入樓境欲執行人以問虛實去薊百餘里值賊帥陳周馬步萬餘淵遂潛伏以乘其背大破之虜其卒五千餘人尋還其馬仗縱令入城左右諫曰既獲賊衆何為復資遣之也淵曰我兵既少不可力戰事須為計以離隙之淵度其已至遂率騎夜集昧旦叩其城門韓樓果疑降卒為淵內應遂遁走追擒之以勳進爵為侯增邑八百戶尋詔淵以本將軍為平州刺史大都督仍鎮范陽及尒朱榮之死也范陽太守盧文偉誘淵出獵閉門拒之淵率部曲屯於郡南為榮舉哀勒兵南向莊帝使東萊王貴平為大使慰勞燕薊淵乃詐降貴平信之遂執貴平自隨進至中山行臺僕射魏蘭根邀擊之為淵所敗會元曄立淵欲歸之常山太守甄楷屯據井陘淵又擊破之曄乃授淵驃騎大將軍儀同三司定州刺史左軍大都督漁陽郡開國公邑一千戶前廢帝立仍加開府餘如故幽州刺史劉靈助舉義兵屯於安國城淵與叱列延慶等破擒之後隨尒朱兆拒義旗於廣阿兆既敗走淵降齊獻武王後從王破尒朱於韓陵永熙初除齊州刺史餘如故出帝末淵與兗州刺史樊子鵠青州刺史東萊王貴平密信往來以相連結又遣間使通誠於獻武王及出帝入關復懷顧望汝陽王暹既除齊州刺史次於城西淵擁部據城不時迎納民劉桃符等潛引暹入據西城淵爭門不克率騎出奔妻兒部曲為暹所虜行達廣里會承制以淵行青州事齊獻武王又遺淵書曰卿勿以部曲輕少難於東邁齊人澆薄唯利是從齊州城民尚能迎汝陽王青州之人豈不能開門待卿也但當勉之淵乃復還暹始歸其部曲而貴平自以斛斯椿黨亦不受代淵進襲高陽郡克之置部曲家累於城中身率輕騎遊掠於外貴平使其長子率衆攻高陽南青州刺史茹懷朗遣兵助之時青州城人餽糧者首尾相繼淵親率騎夜趣青州詐餽糧人曰臺軍已至殺戮都盡我是世子下人今已走還城汝何為復去也人信其言棄糧奔走比曉復謂行人曰臺軍昨夜已至高陽我是前鋒今始到此頗知侯公竟在何處城人兇懼遂執貴平出降淵自惟反覆慮不獲安遂斬貴平傳首京師欲明不同於斛斯椿也及子鵠平詔以封延之為青州刺史淵既不獲州任情又恐懼行達廣川遂劫光州庫兵反遣騎詣平原執前膠州刺史賈璐夜襲青州南郭劫前廷尉卿崔光韶以惑人情攻掠郡縣其部下督帥叛拒之淵率騎奔蕭衍途中亡散行達南青州南境為賣漿者斬之傳首京師家口配沒, WYG: ''}
