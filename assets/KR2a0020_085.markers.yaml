  - {type: variant, offset: 2151, length: 558, content: 虎牢椿弟豫州刺史元壽與都督賈顯智守滑臺獻武王令相州刺史竇泰擊破之椿懼己不免復啟出帝假說遊聲以劫脅帝信之遂入關椿亦西走長安椿狡猾多事好亂樂禍干時敗國朝野莫不讎疾之元壽尋為部下所殺賈顯度中山無極人父道監沃野鎮長史顯度形貌偉壯有志氣初為別將防守薄骨律鎮正光末北鎮擾亂為賊攻圍顯度拒守多時以賊勢轉熾不可久立乃率鎮民浮河而下既達秀容為尒朱榮所留尋表授直閤將軍左中郎將建義初除汲郡太守假平東將軍隨尒朱榮破葛榮又除撫軍將軍光祿大夫都督封石艾縣開國公邑一千戶從上黨王天穆破邢杲值元顥入洛仍與天穆渡河赴行宮於河內顥平以本將軍除廣州刺史假鎮南將軍轉南兗州刺史尒朱榮之死也顯度情不自安南奔蕭衍衍厚待之普泰初還朝授衞大將軍儀同三司左光祿大夫又行濟州事復隨尒朱度律等北拒義旗敗於韓陵與斛斯椿及弟顯智等率衆先據河橋誅尒朱氏出帝初除尚書左僕射尋加驃騎大將軍開府儀同三司定州大中正未幾以本官行徐州刺史東道大行臺永熙三年五月轉雍州刺史西道大行臺歿於關中弟智字顯智少有膽決孝昌中告毛謐等逆靈太后嘉之除伏波將軍冗從僕射領直齋蕭衍將夏侯夔攻郢州以智為龍驤將軍別將討之至則夔退智仍入城及刺史元顯達以城降於蕭衍智勒城人不欲叛者與顯達交戰相率歸闕後為都督隸太宰上黨王天穆征邢杲臨陳流矢中胸仍戰不已元顥入洛仍隨天穆渡河朝莊帝於河內與尒朱兆同先渡河破顥軍以勳除持節征, WYG: ''}
