  - {type: variant, offset: 4944, length: 209, content: 擒衍將莊思延又攻馮翊安定沔陽酇陽城並平之續遣將柳仲禮於穀城拒守勝攻之不克乃班師沔北盪為丘墟矣衍書敕續云賀拔勝北間驍將汝宜慎之勿與爭鋒其見憚如此進爵琅邪郡公出帝末詔勝統衆北赴京師軍次汝水出帝入關勝率所部欲從武關趣長安行至析陽聞齊獻武王平潼關擒毛鴻賓勝懼復走荊州城人閉門不納時獻武王已遣行臺侯景大都督高敖曹討之勝戰敗為流矢所中乃率左右五百餘騎奔蕭衍明年從間道投寶炬勝好行小數志大膽薄周章南北終無所成致歿於賊中勝兄可泥永熙中, WYG: ''}
