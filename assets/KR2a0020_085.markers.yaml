  - {type: variant, offset: 872, length: 508, content: 僕射山東行臺北海郡開國公邑五百戶時幽州刺史劉靈助以莊帝幽崩遂舉兵唱義諸州豪右咸相結附靈助進屯於定州之安固世隆白前廢帝以延慶與大都督侯淵於定州相會以討靈助淵謂延慶曰靈助善於卜占百姓信惑所在響應未易可圖若萬一戰有利鈍則大事去矣未若還師西入據關拒險以待其變延慶曰劉靈助庸人也天道深遠豈其所識大兵一臨彼皆恃其妖術坐看符厭寧肯戮力致死與吾爭勝負哉如吾計者政欲出營城外詭言西歸靈助聞之必信而自寬潛軍往襲可一往而擒淵從之乃出頓城西聲云將還簡精騎一千夜發詰朝造靈助壘戰於城北遂破擒之仍兼尚書左僕射為雲燕朔四州行臺又除使持節侍中都督雲燕朔定五州諸軍事定州刺史餘如故與尒朱兆等拒義旗於韓陵戰敗延慶與尒朱仲遠走渡石濟仲遠南竄延慶北降齊獻武王王與之入洛仍從王於并州後赴洛出帝以為中軍大都督延慶既尒朱親昵又黨於權佞出帝之西齊獻武王入洛以罪誅之延慶兄子平武定末儀同三司右衞將軍廮陶縣開國侯斛斯椿字法壽廣牧富昌人也父敦肅宗時為左牧令時河西賊起牧民不安椿乃將家投尒朱榮榮以椿兼其都督府鎧曹參軍從榮征伐有功表授厲威將軍稍遷中散大夫署外兵事椿性佞巧甚得榮心軍之密謀頗亦關預及肅宗崩椿從榮入洛莊帝初封陽曲縣開國公食邑千戶遷散騎常侍平北將軍司馬尋除尒朱榮大, WYG: ''}
