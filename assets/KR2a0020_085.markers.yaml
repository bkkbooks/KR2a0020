  - {type: variant, offset: 1954, length: 196, content: 則無信犬馬尚識恩養汝今犬馬之不如遂斬之椿自以數為反覆見寧等之死意常不安遂密構間勸出帝置閤內都督部曲又增武直人數自直閤已下員別數百皆選天下輕剽者以充之又說帝數出遊幸號令部曲別為行陳椿自約勒指麾其間從此以後軍謀朝政一決於椿又勸帝徵兵詭稱南討將以伐齊獻武王帝從之遂陳兵城西北接邙山南至洛水帝詰旦戎服與椿臨閱焉獻武王以椿亂政欲誅之椿譖說既行因此遂相恐動出帝勒兵河橋令椿為前軍營於邙山北尋遣椿率步騎數千, WYG: ''}
