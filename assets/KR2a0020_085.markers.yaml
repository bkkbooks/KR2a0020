  - {type: variant, offset: 195, length: 4, content: 丁父憂去, WYG: 復究覽莊生具體齊物物我兩忘是非俱遣斯人之達吾所師焉故作是賦所以托名豁情寄之風謠矣天平初遷鄴又為遷都賦文多不載二年因内宴伯茂侮慢殿中尚書章武王景哲景哲遂申啓稱伯茂棄其本列與監同行以梨撃桉傍汙冠服禁庭之内令人挈衣詔付所司後竟無坐伯茂先出後其伯仲規與兄景融别居景融貧窘伯茂了無賑恤殆同行路世以此貶薄之卒年三十九知舊歎惜焉伯茂永年劇飲不已乃至傷性多有愆失未亡前數日忽云吾得密信将被收掩乃與婦乘車西逃避後因顧指壁中言有}
