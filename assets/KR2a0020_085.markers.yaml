  - {type: variant, offset: 128, length: 3, content: 親任建, WYG: 附永安初徴為金部郎中以疾不赴轉除東牟太守時天下多事在職少能廉白臧獨清慎奉法吏民愛之隴西李延寔莊帝之舅以太傅出除青州啓臧為屬領樂安内史有惠政後除濮陽太守尋加安東將軍臧和雅信厚有長者之風為時人所愛敬為特進甄琛行狀世稱其工與裴敬憲盧觀兄弟並結交分曾共讀回文集臧獨先通之撰古來文章幷叙作者氏族號曰文譜未就病卒時賢悼惜之其文筆凡百餘篇贈鎮北將軍定州刺史諡曰文子恕渉學有識悟裴伯茂河東人司空中郎叔}
