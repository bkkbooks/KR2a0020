  - {type: variant, offset: 3541, length: 248, content: 招子鵠欲與同趣京師子鵠不從以母在晉陽啟求移鎮河南莊帝嘉之除車騎大將軍豫州刺史假驃騎大將軍都督二豫郢三州諸軍事兼尚書右僕射二豫郢潁四州行臺子鵠到相州又敕賚絹五百匹行達汲郡聞尒朱兆入洛乃渡河見仲遠仲遠遣鎮汲郡兆徵子鵠赴洛既見責以乖異之意奪其部衆將還晉陽及紇豆陵步藩起以子鵠為都督徵發糧仗元曄以為侍中御史中尉中軍大都督隨曄向洛普泰初仍除舊任及趙脩延叛於荊州詔子鵠通三餢道而還遭母憂去職前廢帝聞其在洛無宅凶費不周賚絹四百匹粟五百石以本官起之太昌初兼尚書左僕射東南道大行臺總大都督杜德等追討尒朱仲遠仲遠已奔, WYG: 郎嘗詣}
