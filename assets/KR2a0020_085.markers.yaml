  - {type: variant, offset: 5681, length: 639, content: 遺遂渡渭北降步兵萬餘收其輜重其有土民普皆勞遣醜奴尋棄岐州北走安定其後破侯伏侯元進降侯機長貴擒醜奴蕭寶夤王慶雲万俟道洛走宿勤明達事在尒朱天光傳天光雖為元帥而岳功效居多加車騎將軍增邑二千戶進封樊城縣開國伯尋詔岳都督涇北豳二夏四州諸軍事本將軍涇州刺史進爵為公改封清水郡公天光入洛使岳行雍州事元曄立除驃騎大將軍增邑五百戶餘如故普泰初都督二岐東秦三州諸軍事儀同三司岐州刺史尋加侍中給後部鼓吹仍詔開府俄兼尚書左僕射隴右行臺仍停高平後以隴中猶有土民不順岳助侯莫陳悅所在討平二年加岳都督三雍三秦二岐二華諸軍事雍州刺史關西行臺餘如故及尒朱天光率衆赴洛將抗齊獻武王岳與侯莫陳悅下隴赴雍以應義旗永熙初仍開府兼僕射大行臺雍州刺史增邑千戶二年詔岳都督雍華北華東雍二岐豳四梁二益巴二夏蔚寧南益涇二十州諸軍事大都督岳自詣北境安置邊防率部趣涇州平涼西界布營數十里使諸軍士田殖涇州身將壯勇託以牧馬於原州北招万俟受洛干等并遠近州鎮聚結者靈州刺史曹泥身詣岳軍請代岳以前洛州刺史元季海為州彼民不促擊破季海部下獨聽季海闕三年正月岳召侯莫陳悅會於高平將討之令悅前驅北趣靈州聞渴波隘中河水未解將往趣之岳既總大衆據制關右憑強驕恣有不臣之心齊獻武王惡其專擅令悅圖之悅素服威略既承密旨便潛為計時岳遣悅先行悅乃通夜東進達明晦日岳行軍前與悅相見悅誘岳入營坐論兵事悅詐云腹痛起而徐行悅女夫元洪景抽刀斬岳後岳部下收岳尸葬於雍州北石安原六月贈大將軍太保錄尚書事都督刺史開國並如故侯莫陳悅代郡人也父婆羅門為駝牛都尉故悅長於河西好田獵便騎射會牧, WYG: ''}
