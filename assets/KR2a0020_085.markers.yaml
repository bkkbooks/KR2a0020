  - {type: variant, offset: 1759, length: 194, content: 行椿入北中城收尒朱部曲盡殺之令長孫稚賈顯智等率數百騎襲尒朱世隆彥伯兄弟斬於閶闔門外椿入洛懸世隆兄弟首於其門樹椿父出見謂椿曰汝與尒朱約為兄弟今何忍懸其頭於家門寧不愧負天地乎椿乃傳世隆等首并囚度律天光送於齊獻武王出帝拜椿侍中儀同開府初獻武王之入洛頓於邙山尒朱仲遠帳下都督橋寧張子期自滑臺而至獻武王責寧等曰汝事仲遠擅其榮利盟契百重許同生死前仲遠自徐為逆汝為戎首今仲遠南走汝復背之於臣節則不忠論事, WYG: 舎}
