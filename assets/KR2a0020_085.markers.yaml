  - {type: variant, offset: 3040, length: 349, content: 將軍開府儀同三司滄州刺史在州貪縱甚為民害出帝徵還京師尋加授侍中以本將軍除濟州刺史率衆達東郡仍停不進於長壽津為相州刺史竇泰所破還洛天平初赴晉陽智去就多端後坐事死時年四十五子羅侯祕書郎樊子鵠代郡平城人其先荊州蠻酋被遷於代父興平城鎮長史歸義侯普泰中子鵠貴顯乃贈征虜將軍荊州刺史子鵠值北鎮擾亂南至并州尒朱榮引為都督府倉曹參軍孝昌三年冬榮使子鵠詣京師靈太后見之問榮兵勢子鵠應對稱旨太后嘉之除直齋封南和縣開國子邑三百戶令還赴榮榮以為行臺郎中行上黨郡及榮向洛以為假節假平南將軍都督河東正平軍事行唐州事刺史崔元珍閉門拒守子鵠攻克之建義初拜平北將軍晉州刺史封永安縣開國伯食邑千戶又兼尚書行臺治有威信山胡率服元顥入洛薛脩義及降蜀陳雙熾等受顥處分率衆攻州城子鵠出與戰大破之又破脩義等於土門以功拜撫軍將軍尋徵授都官尚書西荊, WYG: ''}
