  - {type: variant, offset: 1387, length: 0, content: '', WYG: 初中尉東平王匡博召辭人以充御史同時射策者八百餘人子昇與盧仲宣孫搴等二十四人為高第於是預選者爭相引決匡使子昇當之皆受屈而去搴謂人曰朝來靡旗亂轍者皆子昇逐北遂補御史時年二十二臺中文筆皆子昇為之以憂去任服闋還為朝請後李神儁行荆州事引兼錄事參軍被徴赴省神儁表畱不遣吏部郎中李奬退表不許曰昔伯瑜之不應留王朗所以發歎宜速遣赴無踵彦雲前失於是還員正光末廣陽王淵為東北道行臺召為郎中軍國文翰皆出其手於是才名轉盛黄門郎徐紇受四方表啓答之敏速於淵獨沉思曰彼有溫郎中才藻可畏高車破走珍寳盈滿子昇取絹四十疋及淵為}
