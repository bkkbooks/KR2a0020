  - {type: variant, offset: 5246, length: 429, content: 初除安北將軍光祿大夫武衞將軍賜爵樊城鄉男坐事失官爵二年詔並復之尋除使持節假衞將軍西道都督隸尒朱天光為左廂大都督討万俟醜奴天光先知岳喜得同行每事論訪尋加衞將軍假車騎將軍餘如故岳屆長安榮遣兵續至時万俟醜奴遣其大行臺尉遲菩薩向武功南渡渭水攻圍趣柵天光遣岳率騎一千馳往赴救菩薩攻柵已克還向岐州岳以輕騎八百北渡渭水擒賊令殺掠其民以挑菩薩菩薩果率步騎二萬餘人至渭水北岳以輕騎數十與菩薩隔水交言岳稱揚國威菩薩自言強盛往復數返菩薩乃自驕令省事傳語岳怒曰我與菩薩言卿是何人與我對語省事恃水應答不遜岳舉弓射之應弦而倒時已逼暮於此各還岳密於渭南傍水分置精騎四十五十以為一所隨地形便駱驛置之明日自將百餘騎隔水與賊相見並且東行岳漸前進先所置騎隨岳而集騎既漸增賊不復測其多少行二十里許便至淺可濟岳便馳馬東出以示奔遁賊謂岳走乃棄步兵南渡渭水輕騎追岳岳東行十餘里依橫崗伏兵以待之賊以路險不得前進前後繼至半度崗東岳乃回戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲, WYG: 記}
