  - {type: variant, offset: 7625, length: 0, content: '', krp: 陳伯之啟為司馬還除奉車都尉大都督中山王英征義陽引為錄事參軍尋轉司馬及英敗於鍾離逰坐徙秦州久而得還大将軍高肇西征引為統軍除歩兵校尉遷豫州征虜府長史未幾除征虜将軍北趙郡太守竝有政績熙平末轉河東太守郡有鹽戸常供州郡為兵子孫見丁從役逰矜其勞苦乃表聞請聼更代郡内感之太學舊在城内逰乃移置城南閑敞之處親自說經當時學者莫不勸慕號為良守以本将軍遷涼州刺史以母憂解任正光中起除右将軍南秦州刺史固辭不免先是州人楊松柏楊洛徳兄弟數為反叛逰至州深加招慰松柏歸款引為主簿稍以辭色誘之兄弟俱至松柏既州之豪帥感逰恩遇奨諭羣氐咸來歸款且以過在前政不復自疑逰乃因宴會一時俱斬於是外人以其不信合境皆反正光五年夏秦州城人殺刺史李彦據州為逆數日之後逰知必不定謀欲出外尋為城人韓祖香孫􅀈攻於州館逰事窘登樓慷慨悲歎乃推下小女而殺之義不為羣小所辱也尋為祖香等所執害時年五十二永安中贈散騎侍郎鎮北将軍定州刺史子伏䕶開府參軍}
