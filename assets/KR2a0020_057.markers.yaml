  - {type: variant, offset: 5196, length: 759, content: 今將欲歸煩子厚贈無以報德子後位至常伯封侯非報也且以為好言終乘木馬騰空而去暉乃自知必將貴也乞伏熾磐以暉為輔國大將軍涼州刺史御史大夫西海侯磐子暮末襲位國政衰亂暉父子奔吐谷渾暮璝暮璝內附暉與承根歸國世祖素聞其名頗重之以為上客後暉從世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市曝尸數日時有儒生京兆林白奴欽暉德音夜竊其尸置之枯井女為敦煌張氏婦久而聞之乃向長安收葬承根好學機辯有文思而性行疏薄有始無終司徒崔浩見而奇之以為才堪注述言之世祖請為著作郎引與同事世咸重其文而薄其行甚為敦煌公李寶所敬待承根贈寶詩曰世道衰陵淳風殆緬衢交問鼎路盈訪瓕徇競爭馳天機莫踐不有真宰榛棘誰揃其一於皇我后重明襲煥文以息煩武以靜亂剖蚌求珍搜巖采幹野無投綸朝盈逸翰其二自昔涼季林焚淵涸矯矯公子鱗羽靡託靈慧雖奮祅氛未廓鳳戢崐丘龍潛玄漠其三數不常擾艱極則夷奮翼幽裔翰飛京師珥蟬紫闥杖節方畿弼我王度庶績緝熙其四自余幽淪眷參舊契庶庇餘光優游卒歲忻路未淹離轡已際顧難分歧載張載繼其五聞諸交舊累聖疊曜淳源雖漓民懷餘劭思樂哲人靜以鎮躁藹彼繁音和此清調其六詢下曰文辨訐曰明化由禮洽政以寬成勉崇仁教播德簡刑傾首景風遲聞休聲其七浩誅承根與宗欽等俱死承根外孫長水校尉南陽張令言美鬚髯言談舉止有異武人李琰之李神儁一時名士並稱美之闞駰字玄陰敦煌人也祖倞有名於西土父玟為一時秀士官至會稽令駰博通經傳聰敏過人三史羣言經目則誦時人謂之宿讀注王朗易傳學者藉以通經撰十三州志行於世蒙遜甚重之常侍左右訪以政治損益拜祕書考課郎中給文吏三十人典校經籍刊定諸子三千餘卷加奉車都尉牧犍待之彌重拜大行遷尚書姑臧平樂平王丕鎮涼州引為從事中郎王薨之後還京師家甚貧弊不免飢寒性能多食一飯至三升乃飽卒無後劉昞字延明敦煌人也父寶字子玉以儒學稱昞年十四就, WYG: ''}
