  - {type: variant, offset: 1243, length: 0, content: '', WYG: 光祿大夫仍尚書後加儀同三司兼吏部尚書出帝入關齊獻武王至洛與尚書辛雄劉廞等並誅時年五十沒其家口天平中乃免之孝芬博文口辨善談論愛好後進終日忻然商確古今間以嘲謔聼者忘疲所著文章數十篇有子八人長子勉字宣祖頗渉史𫝊有几案才正光初除太學博士荘帝之為御史中尉啟除侍御史永安初除建節將}
