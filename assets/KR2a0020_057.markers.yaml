  - {type: variant, offset: 1506, length: 376, content: 律制司徒崔浩及當時朝賢並愛重之清貧守道以壽終子始昌亦長者有父風歷位至南部主書子醜孫中書學生祕書郎中散世不治產業家甚貧約兄弟並早亡胡叟字倫許安定臨涇人也世有冠冕為西夏著姓叟少聰敏年十三辨疑釋理知名鄉國其意之所悟與成人交論尠有屈焉學不師受友人勸之叟曰先聖之言精義入神者其唯易乎猶謂可思而過半末世腐儒粗別剛柔之位寧有探賾未兆者哉就道之義非在今矣及披讀羣籍再閱於目皆誦於口好屬文既善為典雅之詞又工為鄙俗之句以姚政將衰遂入長安觀風化隱匿名行懼人見知時京兆韋祖思少閱典墳多蔑時輩知叟至召而見之祖思習常待叟不足叟聊與溫涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡久矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八矣其述前載無違舊美中世有協時事而末及鄙黷人皆奇其才畏其筆世猶傳誦之以為笑狎叟孤飄坎罎未有仕路遂入漢中劉義隆梁秦二, WYG: ''}
