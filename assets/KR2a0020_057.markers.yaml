  - {type: variant, offset: 562, length: 288, content: 尚書郎超宗弟令勝亦長八尺疏狂有膂力歷河北農二郡太守並坐貪暴為御史所彈遇赦免神龜末自後將軍太中大夫出為農太守卒官令勝寵惑妾潘離棄其妻羊氏夫妻相訟迭發陰私醜穢之事彰於朝野遐初為軍主從高祖征南陽景明初為梁城戍主被蕭衍將攻圍以固守及戰功封牟平縣開國子食邑二百戶後以左軍將軍假征虜將軍督巴東諸軍事鎮南鄭時蕭衍冠軍將軍軍主姜脩衆二萬屯羊口輔國將軍姜白龍據南城龍驤將軍泉建率土民北入桑坯姜脩又分軍據興勢龍驤將軍譚思文據夾石司州刺史王僧炳頓南安並扇動夷獠規翻南鄭遐率甲士九千所在衝擊數百里中莫不摧靡前後斬首五千餘級還以輔國將軍出為滎陽太守時蕭衍將馬仙琕率衆攻圍朐城戍主傅文驥嬰城固守以遐持節假, WYG: ''}
