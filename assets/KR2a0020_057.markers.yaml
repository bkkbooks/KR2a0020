  - {type: variant, offset: 1241, length: 0, content: '', WYG: 壊遂莫能立衆以為善化所感時以犯罪配邉者多有逃越遂立重制一人犯罪逋亡合門充役挺上書以為周書父子罪不相及天下善人少惡人多以一人犯罪延及合門司馬牛受桓魋之罰栁下惠嬰盜跖之誅豈不哀哉辭甚雅切高祖納之先是州内少鐵噐用皆求之他境挺表復鐵官公私有頼諸州中正本在論人髙祖将辨天下氏族仍亦訪定乃遥授挺本州大中正掖縣有人年踰九十板輿造州自稱少曽充使林邑得一羙玉方尺四寸甚有光彩藏之海島垂六十歲忻逢眀治今願奉之挺曰吾雖徳謝古人未能以玉為寳遣舩隨取光潤果然竟不􅈕受仍表送京都世宗即位累表乞還景眀初見代老幼泣涕追隨縑帛贈送挺悉不納散騎常侍趙脩得幸世宗挺雖同州壤未嘗詣門北海王詳為司徒錄尚書事以挺為司馬挺固辭不免世人皆歎其屈而挺處之夷然於後詳攝選衆人競稱考第以求}
