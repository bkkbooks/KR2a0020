  - {type: variant, offset: 3585, length: 1499, content: 書郎世子洗馬欽上東宮侍臣箴曰恢恢玄古悠悠生民五才迭用經彝倫匡父維子弼君伊臣顛而能扶屈而能申昔在上聖妙鑒厥趣不曰我明而乖其度不曰我新而忽其故如彼在泉臨深是懼如彼覆車望途改步是以令問宣流英風遠布及於三季道喪純遷桀起瓊臺紂醊糟山周滅妖姒羿喪以田險詖蔽其耳目鄭衞陳於其前怙才肆虐異端是纏豈伊害身厥胤殲焉茫茫禹跡畫為九區昆蟲鳥獸各有巢居雲歌唐后垂橫美虞疏網改祝殷道攸敷龍盤應德隨蛇銜珠勿謂無心識命不殊勿謂理絕千載同符爰在子桓靈數攸臻儀形徐阮左右劉陳披文採友叩典問津用能重離襲曜魏鼎維新於昭儲后運應玄籙夕惕乾乾虛衿遠屬外撫幽荒內懷焭獨猶懼思不逮遠明不遐燭君有諍臣庭立謗木本枝克昌永符天祿微臣作箴敢告在僕世祖平涼州入國賜爵臥樹男加鷹揚將軍拜著作郎欽與高允書曰昔皇綱未振華裔殊風九服分隔金蘭莫遂希懷寄契延想積久天遂其願爰遘京師才非季札而眷深孫喬德乖程子而義均傾蓋曠齡罕遇會之一朝比公私理異詶諮路塞端拱蓬宇歎慨如何不量鄙拙貢詩數韻若夫泉江相忘之談遺言存意之美雖莊生之所尚非淺識所宜循愛敬既深情期往返思遲德意以袪鄙吝若能紆鳳彩以燿榛薈迴連城以映瓦礫者是所望也詩曰嵬峨嶺滉瀁滄溟山挺其和水燿其精啟茲令族應期誕生華冠衆彥偉邁羣英其一於穆吾子含貞藉茂如彼松竹陵霜擢秀味老思沖玩易體復戢翼九臯聲溢宇宙其二我皇龍興重離疊映剛德外彰柔明內鏡乾象奄氣坤厚山競風無殊音俗無異徑其三經緯曰文著述曰史斟酌九流錯綜幽旨帝用詶諮明發虛擬廣闢四門披延髦士其四爾應其求翰飛東觀口吐瓊音手揮霄翰彈毫珠零落紙錦粲墳無疑割典無滯泮其五山降則謙含柔為信林崇日漸明升斯進有邈夫子兼茲四慎弱而難勝通而不峻其六南董邈矣史功不申固傾佞竇雄穢美新遷以陵腐邕由卓泯時無逸勒路盈摧輪其七尹佚謨周孔明述魯抑揚羣致憲章三五昂昂高生纂我遐武勿謂古今建規易矩其八自昔索居沉淪西藩風馬既殊標榜莫緣開通有運闇遇當年披衿暫面定交一言其九諮疑祕省訪滯京都水鏡叔度洗吝田蘇望儀神婉即象心虛悟言禮樂採研詩書其十履霜悼遷撫節感變嗟我年邁迅踰激電進乏田賜退非回憲素髮掩玄枯顏落蒨其十一文以會友友由知己詩以明言言以通理盻坎迷流覿艮闇止伊爾虬光四鱗曲水其十二允答書曰頃因行李承足下高問延佇之勞為日久矣王途一啟得其懷欣於相遇情無有已足下兼愛為心每能存顧養之以風味惠之以德音執玩反覆銘於心抱吾少乏尋常之操長無老成之致憑賴賢勝以自克勉而來喻褒飾有過其分既承雅贈即應有答但唱高則難和理深則難詶所以留連日月以至於今今往詩一篇誠不足標明來旨且表以心幸恕其鄙滯領其至意詩曰湯湯流漢藹藹南都載稱多士載擢靈珠邈矣高族世記丹圖啟基郢城振彩涼區其一吾生朗到誕發英風紹熙前緒奕世克隆方圓備體淑德斯融望傾羣儁響駭華戎其二響駭伊何金聲允著匡贊西藩拯厥時務肅志琴書恬心初素潛思淵渟秀藻雲布其三上天降命祚鍾有代協燿紫宸與乾作配仁邁春陽功隆覆載招延隱叟永貽大賚其四伊余櫟散才至庸微遭緣幸會忝與樞機竊名華省厠足丹墀愧無螢燭少益天暉其五明升非諭信漸難兼體卑處下豈曰能謙進不弘道退失淵潛既慚朱闕亦愧閭閻其六史班稱達楊蔡致深負荷典策載蹈於心四轍同軌覆車相尋敬承嘉誨永佩明箴其七遠思古賢內尋諸己仰謝丘明長揖南史遐武雖存高蹤難擬夙興夕惕豈獲恬止其八世之圮矣靈運未通風馬殊隔區域異封有懷西望路險莫從王澤遠灑九服來同其九在昔平吳二陸稱寶今也克涼吾生獨矯道映儒林義為羣表我思與之均於紵縞其十仁乏田蘇量非叔度韓生屬降林宗仍顧千載曠遊遘茲一遇藻詠風流鄙心已悟其十一年時迅邁物我俱逝任之斯通擁之則滯結駟貽塵屢空亦弊兩間可守安有回賜其十二詩以言志志以表丹慨哉刎頸義已中殘雖曰不敏請事金蘭爾其勵之無忘歲寒崔浩之誅也欽亦賜死欽在河西撰蒙遜記十卷無足可稱弟舒字景, WYG: ''}
