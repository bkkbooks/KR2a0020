  - {type: variant, offset: 1968, length: 774, content: 於蜀法成感之遺其珍物價直千餘匹叟謂法成曰緯蕭何人能棄明珠吾為德請財何為也一無所受在益土五六載北至楊難當乃西入沮渠牧犍遇之不重叟亦本無附之之誠乃為詩示所知廣平程伯達其略曰羣犬吠新客佞闇排疏賓直途既以塞曲路非所遵望衞惋祝鮀眄楚悼靈均何用宣憂懷託翰寄輔仁伯達見詩謂叟曰涼州雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝鮀之有也叟曰古人有言君子聞鞞鼓之聲則思戰爭之士貴主奉正朔而弗淳慕仁義而未允地陋僻而僭徽號居小事大寧若茲乎徐偃之轍故不旋踵矣吾之擇木夙在大魏與子暫違非久闊也歲餘牧犍破降叟既先歸國朝廷以其識機拜虎威將軍賜爵始復男家於密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所栖謝其高矣後叟被徵至謝恩并獻詩一篇高宗時召叟及舒並使作檄劉駿蠕蠕文舒文劣於叟舒尋歸家叟不治產業常苦飢貧然不以為養子字螟蛉以自給養每至貴勝之門乘一牸牛弊韋袴褶而已作布囊容三四斗飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華者視之蔑如也尚書李敷嘗遺之以財都無所取初叟一見高允曰吳鄭之交以紵縞為美談吾之於子以弦韋為幽贄以此言之彼可無愧也於允館見中書侍郎趙郡李璨璨被服華靡叟貧老衣褐璨頗忽之叟謂之曰老子今若相許脫體上袴褶衣帽君欲作何計也譏其惟假盛服璨惕然失色叟少孤每言及父母則淚下若孺子之號春秋當祭之前則先求旨酒美膳將其所知廣寧常順陽馮翊田文宗上谷侯法儁攜壺執榼至郭外空靜處設坐奠拜盡孝思之敬時敦煌氾潛家善釀酒每節送一壺與叟著作佐郎博陵許赤虎河東裴定宗等謂潛曰再三之惠以為過厚子惠於叟何其也潛曰我給祭者以其於孝思也論者以潛為君子矣順陽等數子禀叟奬示頗涉文流高閭曾造其家值叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辦集其館宇卑陋園疇褊局而飯菜精潔醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以物直十餘匹贈之亦無辭愧閭作宣命賦叟為之序密雲左右皆祗仰其德歲時奉以麻布穀麥叟隨分散之家無餘財年八十, WYG: 鄉}
