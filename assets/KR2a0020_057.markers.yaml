  - {type: variant, offset: 5957, length: 1583, content: 郭瑀學時瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心於昞遂別設一席於坐前謂諸弟子曰吾有一女年向成長欲覓一快女壻誰坐此席者吾當婚焉昞遂奮衣來坐神志肅然曰向聞先生欲求快女壻昞其人也瑀遂以女妻之昞後隱居酒泉不應州郡之命弟子受業者五百餘人李暠私署徵為儒林祭酒從事中郎暠好尚文典書史穿落者親自補治昞時侍側前請代暠暠曰躬自執者欲人重此典籍吾與卿相值何異孔明之會玄德遷撫夷護軍雖有政務手不釋卷暠曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將至孔聖稱焉昞何人斯敢不如此昞以三史文繁著略記百三十篇八十四卷涼書十卷敦煌實錄二十卷方言三卷靖恭堂銘一卷注周易韓子人物志黃石公三略並行於世蒙遜平酒泉拜祕書郎專管注記築陸沉觀於西苑躬往禮焉號玄處先生學徒數百月致羊酒牧犍尊為國師親自致拜命官屬以下皆北面受業焉時同郡索敞陰興為助教並以文學見舉每巾衣而入世祖平涼州士民東遷夙聞其名拜樂平王從事中郎世祖詔諸年七十以上聽留本鄉一子扶養昞時老矣在姑臧歲餘思鄉而返至涼州西四百里韭谷窟遇疾而卒昞六子長子僧衍早亡次仲禮留鄉里次字仲次貳歸少歸仁並遷代京後分屬諸州為城民歸仁有二子長買奴次顯宗太和十四年尚書李沖奏昞河右碩儒今子孫沉屈未有祿潤賢者子孫宜蒙顯異於是除其一子為郢州雲陽令正光三年太保崔光奏曰臣聞太上立德其次立功立言死而不朽前哲所尚思人愛樹自古稱美故樂平王從事中郎敦煌劉昞著業涼城遺文茲在篇籍之美頗足可觀如或愆釁當蒙數世之宥況乃維祖逮孫相去未遠而令久淪皂隸不獲收異儒學之士所為竊歎臣忝職史教冒以聞奏乞敕尚書推檢所屬甄免碎役用廣聖朝旌善繼絕敦化厲俗於是乎在四年六月詔曰昞德冠前世蔚為儒宗太保啟陳深合勸善其孫等三家特可聽免河西人以為榮趙柔字元順金城人也少以德行才學知名河右沮渠牧犍時為金部郎世祖平涼州內徙京師高宗踐阼拜為著作郎後以歷効有績出為河內太守甚著仁惠柔嘗在路得人所遺金珠一貫價直數百縑柔呼主還之後有人與柔鏵數百枚者柔與子善明鬻之於市有從柔買索絹二十匹有商人知其賤與柔三十匹善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之搢紳之流聞而敬服焉其推誠秉信皆此類也隴西王源賀採佛經幽旨作祗洹精舍圖偈六卷柔為之注解咸得理衷為當時儁僧所欽味焉又憑立銘讚頗行于世子默字沖明武威太守索敞字巨振敦煌人為劉昞助教專心經籍盡能傳昞之業涼州平入國以儒學見拔為中書博士篤勤訓授肅而有禮京師大族貴遊之子皆敬憚威嚴多所成益前後顯達位至尚書牧守者數十人皆受業於敞敞遂講授十餘年敞以喪服散在衆篇遂撰比為喪服要記其名字論文多不載後出補扶風太守在位清貧未幾卒官時舊同學生等為請詔贈平南將軍涼州刺史諡曰獻敞子僧養中書議郎京兆太守僧養子演貴征東府參軍演貴子懷真字公道武定末侍御史初敞在州之日與鄉人陰世隆文才相友世隆至京師被罪徙和龍屆上谷困不前達土人徐能抑掠為奴五年敞因行至上谷遇見世隆語其由狀對泣而別敞為訴理得免世隆子孟貴性至孝每向田耘耨早朝拜父來亦如之鄉人欽其篤於事親陰仲達武威姑臧人祖訓字處道仕李暠為武威太守父華字季文姑臧令仲達少以文學知名世祖平涼州內徙代都司徒崔浩啟仲達與段承根云二人俱涼土才華同修國史除祕書著作郎卒華次子周達徐州平南司馬太山太守周達子遵和小名虎頭好音律尚武事初為高祖挽郎拜奉朝請後廣平王懷取為國常侍遵和便辟善事人深為懷所親愛轉司空法曹太尉中兵參軍又為汝南王悅郎中令復被愛信稍遷龍驤將軍驍騎將軍豫州都督鎮懸瓠孝莊末除左將軍行豫州刺史時前行州事元崇禮被徵將還既聞尒朱兆入洛遂矯殺遵和擅攝州任後追贈平南將軍涼州刺史遵和兄子道方性和雅頗涉書傳深為李神儁所知賞神儁為前將軍荊州刺史請道方為其府長流參軍神儁曾使道方詣蕭衍雍州刺史蕭綱論邊事道方風神沉正為綱所稱正光末蕭綱遣其軍主曹義宗等擾動邊蠻神儁令道方馳傳向新野處分軍事於路為土因村蠻所掠送於義宗義宗又傳致襄陽仍送於蕭衍囚之尚方孝昌中始得還國既至拜奉朝請, WYG: ''}
