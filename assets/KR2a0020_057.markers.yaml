  - {type: variant, offset: 1242, length: 0, content: '', WYG: 敘挺終獨無言詳曰崔光州考級並未加授宜投一牒當為申請蘧伯玉恥獨為君子亦何故嘿然挺對曰階級是聖朝大例考課亦國之恒典下官雖慙古賢不伐之羙至於自􅃷求進竊以羞之詳大相稱歎自為司馬詳未曽呼名常稱州號以示優禮四年卒時年五十九其年冬贈輔國将軍幽州刺史諡曰景光州故吏聞凶問莫不悲感共鑄八尺銅像於城東廣因寺起八關齋追奉㝠福其遺愛若此初崔光之在貧賤也挺贍遺衣食常親敬焉又識邢巒宋弁於童稚之中竝謂終當逺致世稱其知人歴官二十餘年家資不益食不重味室無綺羅閨門之内雍雍如也舊故多有贈賵諸子推挺素心一無所受有子六人長子孝芬字恭梓早有才識博學好文章髙祖召見甚嗟賞之李彪謂挺曰比見賢子謁帝㫖諭殊優今當為羣拜紀挺曰卿自欲善處人父子之間然斯言吾所不敢聞也司徒彭城王勰板為行參軍後除著作郎襲父爵尚書令髙肇親寵權盛子植除青州刺史啟孝芬為司馬後除司徒記室參軍司空屬定州大中正長扵剖判甚有能名府主任城王澄雅重之熙平中澄奏地制八條孝芬所參定也在府久之除龍驤将軍廷尉少卿孝昌初蕭衍遣将裴邃等宼淮南詔行臺酈道元都督河間王琛討之停師城父累月不進勑孝芬持節齎齊庫刀催令赴接賊退而還荆州刺史李神儁為蕭衍遣将攻圍詔加孝芬通直散騎常侍以将軍為荆州刺史兼尚書南道行臺領軍司率諸将以援神儁因代焉扵時州郡内戍悉已陷沒且路由三鵶賊已先據孝芬所統既少不得徑進遂從𢎞農堰渠山道南入遣弟孝直輕兵在前出賊不意賊便奔散人還安堵肅宗嘉勞之并賚馬及綿絹等物後以元义之黨與盧同李奨等竝除名徵還又孝芬為廷尉之日章武王融以贓貨被劾孝芬按以重法及融為都督北討鮮于脩禮於時孝芬弟孝演率勒宗從避賊於博陵郡城為賊攻陷尋為賊所害融乃密啟云孝演入賊為王遂見收捕合家逃竄遇赦乃出孝昌三年蕭衍将成景儁率衆逼彭城除孝芬寜朔将軍員外常侍兼尚書右丞為徐州行臺孝芬将發入辭靈太后謂孝芬曰卿女今事我兒與卿便是親舊曽何相負而内頭元义車中稱此老嫗㑹須却之孝芬曰臣蒙國厚恩義無斯語假實有此誰能得聞若有聞知此於元义親密過臣逺矣乞對言者足辨虚實靈太后悵然意解乃有愧色景儁築柵造堰謀斷泗水以灌彭城孝芬率大都督李叔仁柴集等起戰景儁等力屈退走除孝芬安南将軍光祿大夫兼尚書為徐兗行臺建義初太山太守羊侃據郡反逺引南賊圍逼兗州除孝芬散騎常侍鎮東將軍金紫光祿大夫仍兼尚書東道行臺大都督刁宣馳往救援與行臺于暉接至便圍之侃突圍奔蕭衍餘悉平定永安二年荘帝聞元顥有内侵之計勅孝芬南赴徐州顥遂潜師向考城擒大都督濟隂王暉業乗勝徑進遣其後軍都督侯暄守梁國城以為後援孝芬勒諸将馳往圍暄恐顥遣援乃急攻之晝夜不息五日暄遂突出擒斬之俘其卒三千餘人荘帝還宫授西兖州刺史将軍如故孝芬久倦外役固辭不行乃除太常卿普泰元年南陽太守趙脩賢襲據荆州城囚刺史李琰之招引南宼除孝芬衛将軍荆州刺史兼尚書南道行䑓又除都督三荆諸軍事車騎将軍假驃騎将軍孝芬己出次改授散騎常侍驃騎将軍西兖州刺史太昌初兼殿中尚書尋除車騎大將軍}
