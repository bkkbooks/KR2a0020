  - {type: variant, offset: 1240, length: 0, content: '', WYG: 轉征虜将軍仍中散卒時年四十九贈平東将軍滄州刺史諡曰惠子徳正襲武定中黄門侍郎顥弟雅字興賢有風度自給事中稍遷司徒府錄事參軍定州撫軍府長史卒年三十四天平中追贈散騎常侍平北将軍冀州刺史子徳乾早有令問任城太守卒雅弟諒字修賢少好學多識強記居喪以孝聞太和末京兆王愉開府辟召高祖妙簡行佐諒與隴西李仲尚趙郡李鳯起等同時應選稍遷太尉主簿國子博士正光中加驍騎将軍為徐州行臺至彭城屬元法僧反叛逼諒同之諒不許為法僧所害時年四十一朝廷痛惜之贈左将軍滄州刺史又下詔以諒臨危授命誠節可重復贈使持節平北将軍幽州刺史贈帛二百匹優一子出身諡曰忠侯三子長惠勝武定中司徒外兵參軍諒造親表譜錄四十許卷自五世已下内外曲盡覽者服其博記祐弟欽幼隨從叔濟使於劉義隆還為中書學生遷祕書中散年四十餘卒子法永諸王從事中郎亦早亡祐從父弟次同永安末撫軍将軍定州刺史子乾邕永熙中司空公長樂郡開國公乾邕弟敖曹天平中司徒公京兆郡開國公崔挺字雙根博陵安平人也六世祖贊魏尚書僕射五世祖洪晉吏部尚書父鬰濮陽太守挺幼居喪盡禮少敦學業多所覽究推人愛士州閭親附焉每四時與鄉人父老書相存慰辭㫖款備得者榮之三世同居門有禮讓扵後頻值饑年家始分析挺與弟振推讓田宅舊資惟守墓田而已家徒壁立兄弟怡然手不釋卷時穀糴踊貴鄉人或有贍者遺挺辭讓而受仍亦散之貧困不為畜積故鄉邑更欽歎焉舉秀才射策高第拜中書博士轉中書侍郎以工書受勑於長安書文眀太后父燕宣王碑賜爵泰昌子轉登聞令遷典屬國下大夫以參議律令賜布帛八百匹穀八百石馬牛各二尚書李沖甚重之高祖以挺女為嬪太和十八年大将軍宋王劉昶南鎮彭城詔假立義將軍為昶府長史以疾辭免乃以王肅為長史其被寄遇如此後除昭武将軍光州刺史威恩竝著風化大行十九年車駕幸兗州召挺赴行在所及見引諭優厚又問挺治邉之略因及文章高祖甚悅謂挺曰别卿已來倐焉二載吾所綴文已成一集今當給卿副本時可觀之又顧謂侍臣曰擁旄者悉皆如此吾何憂哉復還州及散騎常侍張彜兼侍中廵行風俗見挺政化之羙謂挺曰彜受使省方採察謠訟入境觀政實愧清使之名州治舊掖城西北數里有斧山峰嶺高峻北臨滄海南望岱嶽一邦逰觀之地也挺於頂上欲營觀宇故老曰此嶺秋夏之際常有暴雨迅風巖石盡落相𫝊云是龍道恐此觀不可久立挺曰人神相去何逺之有虬龍倐忽豈唯一路乎遂營之數年間果無風雨之異挺既代即為風雹所毁於後作復}
