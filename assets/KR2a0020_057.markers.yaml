  - {type: variant, offset: 1147, length: 3, content: 第四弟, WYG: 之京師時人咸無識者詔以問祐祐曰此是三吴所出厥名鯪鯉餘域率無今我獲之吴楚之地其有歸國者乎又有人於零丘得玉印一以獻詔以示祐祐曰印上有籀書二字文曰宋夀夀者命也我獲其命亦是歸我之徵顯祖初劉義隆}
  - {type: page-break, offset: 1147, content: '', id: KR2a0020_WYG_057-2a, image: WYG0261/WYG0261-0772a.png}
  - {type: variant, offset: 1147, length: 3, content: 第四弟, krp: 之京師時人咸無識者詔以問祐祐曰此是三吴所出厥名鯪鯉餘域率無今我獲之吴楚之地其有歸國者乎又有人於零丘得玉印一以獻詔以示祐祐曰印上有籀書二字文曰宋夀夀者命也我獲其命亦是歸我之徵顯祖初劉義隆}
  - {type: variant, offset: 1151, length: 1, content: 素, WYG: 義陽王昶來奔薛安都等以五州降附時謂祐言有驗高祖拜祕書令後與丞李彪等奏曰臣等聞典謨興話言所以光著載籍作成事所以昭揚然則尚書者記言之體春秋者錄事之辭尋覽前志斯皆言動之實錄也夏殷以前其文弗具自周以降典章備舉史官之體文質不同立書之旨隨時有異至若左氏屬詞比事兩致竝書可謂存史意而非全史體逮司馬遷班固皆博識大才論敘今古曲有條章雖周逹未兼斯實前史之可言者也至於後漢魏晉咸以放焉惟聖朝創制上古開基長發自始均以後至於成帝其間世數久逺是以史弗能傳臣等疎陋忝當史職披覽國記竊有志焉愚謂自王業始基庶事草創皇始以降光宅中土宜依遷固大體令事類相從紀傳區别表志殊貫如此修綴事可備盡伏惟陛下先天開物洪宣帝命太皇太后淳曜二儀惠和王度聲教之所漸洽風譯之所覃加固己義振前王矣加太和以降年未一紀然嘉符禎瑞備臻於往時洪功茂徳事萃於曩世㑹稽佇玉牒之章岱宗想石記之列而祕府策勲述羙未盡将令皇風大猷或闕而不載功臣懿績或遺而弗傳著作郎已下請取有才用者參造國書如得其人三年有成矣然後大明之徳功光于帝篇聖后之勲業顯于皇策佐命忠貞之倫納言司直之士咸以備著載籍矣高祖從之高祖從容問祐曰比水旱不調五穀不熟何以止災而致豐稔祐對曰昔堯湯之運不能去陽九之㑹陛下道同前聖其如小旱何但當旌賢佐政敬授民時則災消穰至矣又問止盜之方祐曰昔宋均樹徳害獸不過其鄉卓茂善敎蝗蟲不入其境彼盜賊者人也苟訓之有方寜不易息當須宰守貞良則盜止矣祐又上疏云今之選舉不採職治之優劣專簡年勞之多少斯非盡才之謂宜停此薄藝棄彼朽勞唯才是舉則官方斯穆又勲舊之臣雖年勤可錄而才非撫人者則可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也高祖皆善之加給事中冀州大中正餘如故時李彪專統著作祐為令時相關預而已出為持節輔國将軍西兗州刺史假東光侯鎮滑臺祐以郡國雖有太學縣黨宜有黌序乃縣立講學黨立敎學村立小學又令一家之中自立一碓五家之外共造一井以供行客不聼婦人寄舂取水又設禁賊之方令五五相保若盜發則連其坐初雖似煩碎後風化大行宼盜止息轉宋王劉昶傅以昔參定律令之勤賜帛五百匹粟五百石馬一匹昶以其官舊年耆雅相祗重妓妾之屬多以遺之拜光祿大夫傅如故昶薨後徵為宗正卿而祐留連彭城久而不赴於是尚書僕射李沖奏祐散逸淮徐無事稽命處刑三歲以贖論詔免卿任還復光祿太和二十三年卒太常議諡曰煬侯詔曰不遵上命曰靈可諡為靈子和璧字僧夀有學問中書博士早卒和璧子顥字門賢學渉有時譽自}
