  - {type: variant, offset: 2969, length: 595, content: 通經史諸子羣言靡不覽綜呂光時舉秀才除郎中後奔段業業拜繇中散常侍繇以業無經濟遠略西奔李暠歷位通顯家無餘財雅好儒學雖在兵難之間講誦不廢每聞儒士在門常倒屣出迎停寢政事引談經籍尤明斷決時事亦無滯也沮渠蒙遜平酒泉於繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜克李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任蒙遜之將死也以子牧犍委託之牧犍以繇為左丞送其妹興平公主於京師世祖拜繇為河西王右丞相賜爵清水公加安遠將軍世祖并涼州從牧犍至京師卒諡曰恭長子巖襲爵改為西平侯巖子蔭中書議郎樂安王範從事中郎卒贈輔國將軍咸陽太守子超尚書度支郎超弟稚字季預師事安邑李紹伯受諸經傳性清嚴治家如官府太和中拜司徒屬又以例降除西中府戶曹參軍轉并州城陽王鸞城局參軍景明二年拜白水縣令在縣十一年頗得民和遷青州勃海太守正光三年卒子遊道武定末太尉長史張湛字子然一字仲玄敦煌人魏執金吾恭九世孫也湛弱冠知名涼土好學能屬文沖素有大志仕沮渠蒙遜黃門侍郎兵部尚書涼州平入國年五十餘矣賜爵南浦男加寧遠將軍司徒崔浩識而禮之浩注易曰國家西平河右敦煌張湛金城宗欽武威段承根三人皆儒者並有儁才見稱於西州每與余論易余以左氏傳卦解之遂相勸為注故因退朝之餘暇而為之解焉其見稱如此湛至京師家貧不粒操尚無虧浩常給其衣食每歲贈浩詩頌浩常報答及浩被誅湛懼悉燒之兄懷義閑粹有才幹遭母憂哀毀過人服制雖除而蔬糲弗改卒于征西參軍長子廣平高平令宗欽字景若金城人也父燮字文友呂光太常卿欽少而好, WYG: ''}
