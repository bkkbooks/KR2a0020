  - {type: variant, offset: 854, length: 226, content: 為別將與劉思祖等救之次於鮑口去朐城五十里夏雨頻降厲涉長驅將至朐城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陳奔退遐孤軍奮擊獨破仙琕斬其直閤將軍軍主李魯生直後軍主葛景羽等仙琕先分軍於朐城之西阻水列柵以圍固城遐身自潛行觀水深淺結草為筏銜枚夜進破其六柵遂解固城之圍進救朐城都督盧昶率大軍繼之未幾而文驥力竭以城降賊衆軍大崩昶棄其節傳輕騎而走惟遐獨握節而還時仲冬寒盛兵士凍死者朐山至於郯城二百里間僵尸相屬昶儀衞失盡於郯城借假節以為軍威遐坐失利免官延昌中起為光祿大夫, WYG: 蓨縣侯}
