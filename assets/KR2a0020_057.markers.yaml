  - {type: variant, offset: 1244, length: 0, content: '', WYG: 尚書右中兵郎中後太尉豫章王蕭贊啟為諮議參軍郎中如故以舉人失衷為中尉高道穆奏免其官普泰中兼尚書左丞勉善附㑹世論以浮競譏之為尚書令尒朱世隆所親待而尚書郎魏季景尤為世隆知任勉與季景内頗不穆季景隂求右丞奪勉所兼世隆啟用季景勉遂悵怏自失尋除安南}
  - {type: variant, offset: 1244, length: 0, content: '', krp: 尚書右中兵郎中後太尉豫章王蕭贊啟為諮議參軍郎中如故以舉人失衷為中尉高道穆奏免其官普泰中兼尚書左丞勉善附㑹世論以浮競譏之為尚書令尒朱世隆所親待而尚書郎魏季景尤為世隆知任勉與季景内頗不穆季景隂求右丞奪勉所兼世隆啟用季景勉遂悵怏自失尋除安南}
  - {type: variant, offset: 1245, length: 0, content: '', WYG: 軍光祿大夫兼國子祭酒典儀注太昌初除散騎常侍征東將軍金紫光祿大夫定州大中正敇左右廂出入其家被收之際在外逃免於後乃出見齊獻武王於晉陽王勞撫之天平末王遣勉送勲貴妻子赴定州因得還家屬母李氏喪亡勉哀號過性遇病卒時年四十七無子弟宣度以子龍後之勉弟宣猷司徒中郎走於關西宣猷弟宣度齊王儀同開府司馬宣度弟宣軌頗有才學尚書考功郎中與弟宣質宣静宣略竝死於晉陽孝芬弟孝暐字敬業少寛雅早著長者之風彭城王勰之臨定州辟為主簿釋褐冀州安東府外兵參軍厯員外散騎侍郎寜朔將軍員外散騎常侍武泰初蠻首李洪扇動諸蠻詔孝暐持節為别将隷都督李神軌討平之尒朱榮之害朝士孝暐與弟孝直攜家避難定陶孝荘初徵拜通直散騎常侍加征虜將軍尋除趙郡太守郡經葛榮離亂之後民戸喪亡六畜無遺斗粟乃至數縑民皆賣鬻兒女夏椹大熟孝暐勸民多收之郡内無牛教其人種招撫遺散先恩後威一周之後流民大至興立學校親加勸篤百姓頼之卒扵郡時年四十九贈通直散騎常侍平東将軍瀛州刺史諡曰簡朝議謂為未申復贈安北将軍定州刺史子昻武定中尚書左丞兼度支尚書孝暐弟孝演字則伯出繼伯父性通率羙鬚髯姿貎魁傑少無宦情沉浮鄉里河間王琛為定州刺史以為治中晚除瀛州安西府外兵參軍因罷歸及鮮于脩禮起逆孝演率宗屬保郡城為賊攻陷賊以孝演民望恐移衆心乃害之時年四十無子弟孝直以子士逰為後士逰儀同開府倉曹參軍孝演弟孝直字叔廉身八尺眉目疎朗早有志尚起家司空行參軍尋為員外散騎侍郎宣威将仍以本官入領直後轉寜逺将軍汝南王開府掾領直寝兄孝芬除荆州詔孝直假征虜将軍别將總羽林二千騎與孝芬俱行孝直潜師徑進賊遂破走孝芬入城後蕭衍将曹義宗仍在馬圈鼓動順陽蠻夷緣邊宼竊孝直率衆禦之賊皆退散還轉直閤将軍通直散騎常侍尒朱兆入洛孝直以天下未寜去職歸鄉里勸督宗人務行禮義後除安東将軍光祿大夫太昌中又除衛将軍右光祿大夫竝辭不赴宗親勸孝直曰榮華人之所願何故陸沉孝直不答年五十八卒於鄉里顧命諸子曰吾才疎效薄於國無功若朝廷復加贈諡宜循吾意不得祗受若致干求則非吾子斂以時服祭勿殺生其子皆遵行之有四子長子士順儀同開府行參軍孝直弟孝政字季讓十歲挺亡號哭不絶見者為之悲傷操尚貞立博洽經史雅好辭賦喪紀之禮特所留情衣服制度手能執造太尉汝南王悅辟行參軍年四十九卒子巖武定中員外常侍孝芬兄弟孝義慈厚弟孝演孝政先亡孝芬等哭泣哀慟絶内蔬食容貌損瘠見者傷之孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也雞鳴而起旦參顔色一錢尺帛不入私房吉凶有須聚對分給諸婦亦相親愛有無共之始挺兄弟同居孝芬叔振既亡之後孝芬等奉承叔母李氏若事所生旦夕温凊出入啟覲家事巨細一以諮決每兄弟出行有獲財物尺寸已上皆内李氏之庫四時分賚李自裁之如此者二十餘歳撫從弟宣伯子朗如同氣焉挺弟振字延根少有學行居家孝友為宗族所稱自中書學生為祕書中散在内謹勑為髙祖所知出為冀州咸陽王禧驃騎府司馬在任乆之太和二十年遷建威将軍平陽太守不拜轉髙陽内史髙祖南討徵兼尚書左丞留京振既才幹被擢當世以為榮後改定職令振本資惟擬五品詔曰振在郡著績宜有褒升除太子庶子景眀初除長兼廷尉少卿振有公斷以眀察稱河内太守陸琇與咸陽王禧同謀為逆禧敗事發振窮治之時琇内外親黨及當朝貴要咸為之言振研覈切至終無縱緩遂斃之扵獄其奉法如此正始初除龍驤將軍肆州刺史在任有政績還朝除河東太守永平中卒扵郡時年五十九贈本將軍南兗州刺史諡曰定振歴官四十餘載考課恒為稱職議者善之長子宣伯早喪子勁字仲括驃騎參軍宣伯弟子朗羙容貌渉獵經史少温厚有風尚以軍功起家襄威将軍員外散騎侍郎普泰中從兄孝芬為荆州請為車騎府司馬孝芬轉西兗州為驃騎府司馬太昌初冠軍将軍北徐州撫軍府長史固辭不獲免興和二年中尉髙仲密引為侍御史尋加平西将軍武定中卒子道綱挺從父弟元珍釋褐司徒行參軍稍遷司徒主簿趙郡王幹開府屬景眀中荆州長史久之為司徒從事中郎有公平稱後遷中散大夫加征虜将軍正光末山胡作逆除平陽太守假右将軍為别将以討之頻破胡賊郡内以安武泰初改郡為唐州仍除元珍為刺史加右将軍以破胡勲賜爵涼城侯爾朱榮之趣洛也遣其都督樊子鵠取唐州元珍與行臺酈惲拒守不從為子鵠所陷被害世咸痛之子叔恭挺從父弟瑜之字仲璉少孤有學業太和中釋褐奉朝請廣陵王羽常侍累厯蕃佐入為司空功曹參軍事太尉主簿遷冀州撫軍府長史後為揚州平東府長史帶南梁太守蕭衍義州刺史文僧眀來降瑜之迎接有勲賜爵髙邑男孝昌初除鴻臚少卿三年卒年五十六贈平北将軍瀛州刺史有三子長子孟舒字長才襲父爵累遷平東将}
