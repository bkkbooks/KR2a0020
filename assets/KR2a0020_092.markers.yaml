  - {type: variant, offset: 1514, length: 0, content: '', WYG: 樹碑旌美茍金龍妻劉氏平原人也廷尉少卿劉叔宗之姊世宗時金龍為梓潼太守郡帶關城戍主蕭衍遣衆攻圍值金龍疾病不堪部分衆甚危懼劉遂率厲城民修理戰具一夜悉成拒戰百有餘日兵士死傷過半戍副髙景隂圖叛逆劉斬之及其黨與數十人自餘將士分衣減食勞逸必同莫不畏而懷之井在外城尋為賊陷城中絶水渴死者多劉乃集諸長幼喻以忠節遂相率告訴於天俱時號呌俄而澍雨劉命出公私布絹及至衣服懸之城中絞而取水所有雜器悉儲之於是人心益固㑹益州刺史傅䜿眼將至賊乃退散䜿眼歎異具狀}
