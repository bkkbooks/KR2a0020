  - {type: variant, offset: 1608, length: 243, content: 門閭倉跋滎陽京縣人也喪母水漿不入口五日吐血數升居憂毀瘠見稱州里有司奏聞出帝詔標門閭王崇字乾邕陽夏雍丘人也兄弟並以孝稱身勤稼穡以養二親仕梁州鎮南府主簿母亡杖而後起鬢髮墮落未及葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至有一小鳥素質墨眸形大如雀栖於崇廬朝夕不去母喪始闋復丁父憂哀毀過禮是年陽夏風雹所過之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃竟無損落及過崇地風雹如初咸稱至行所感崇雖除服仍居墓側於其室前生草一根莖葉甚茂人莫能識至冬中復有烏巢於崇屋乳養三子毛羽成長馴而不驚守令聞之親自臨視州以聞奏標, WYG: ''}
