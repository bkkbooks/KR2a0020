  - {type: variant, offset: 660, length: 5, content: 申撫養伏保, WYG: 及大斂房氏操刀割左耳投之棺中仍曰鬼神有知相期泉壤流血滂然助䘮者咸皆哀懼姑劉氏輟哭而謂曰新婦何至於此房對曰新婦少年不幸實慮父母未量至情覬持此自誓耳聞知者莫不感愴於時子緝生未十旬鞠育於後房之内未曽出門遂終身不聽絲竹不預座席緝年十二房父母仍存於是歸寜父兄尚有異議緝竊聞之以啓母房命駕紿云他行因而遂歸其家弗知之也行數十里方覺兄弟來追房哀歎而不反其執意如此訓導一子有母儀法度緝所交游有名勝者則身具酒飯有不及已者輒屏卧不餐須其悔謝乃食善誘嚴訓類皆如是年六十五而終緝事在序𫝊緝子悦為濟隂太守吏民立碑頌德金紫光祿大夫髙閭為其文序云祖母房年在弱笄艱貞守志秉恭妻之操著自毁之誠又頌曰爰及處士遘疾夙凋伉儷秉志識茂行髙殘形顯操誓敦乆要誕兹令𦙍幽感乃昭溥未仕而卒故云處士焉樂部郎胡長命妻張氏事姑王氏甚謹太安中京師禁酒張以姑老且患私為醖之為有司所糾王氏詣曹自告曰老病須酒在家私釀王所為也張氏曰姑老抱患張主家事姑不知釀其罪在張主司疑其罪不知所處平原王陸麗以狀奏髙宗義而赦之平原鄃縣女子孫氏男玉者夫為靈縣民所殺追執讐人男玉欲自殺之其弟止而不聽男玉曰女人出適以夫為天當親自復雪云何假人之手遂以杖毆殺之有司處死以聞顯祖詔曰男玉重節輕身以義犯法縁情定罪理在可原其特恕之清河房愛親妻崔氏者司郡崔元孫之女}
