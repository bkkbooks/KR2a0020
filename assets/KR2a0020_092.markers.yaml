  - {type: variant, offset: 162, length: 442, content: 父溫為楊難當司馬初苻氏亂琰為乳母攜奔壽春年十四乃歸孝心色養飪熟之節必親調之皇興中京師儉婢簡粟糶之琰遇見切責敕留輕粃嘗送子應冀州娉室從者於路偶得一羊行三十里而琰知之令送於本處又過路傍主人設羊羹琰訪知盜殺卒辭不食遣人買耜刃得剩六耜即令送還刃主刃主高之義而不受琰命委之而去初為兗州司馬轉團城鎮副將還京為淮南王他府長史時禁制甚嚴不聽越關葬於舊兆琰積三十餘年不得葬二親及蒸嘗拜獻未曾不嬰慕卒事每於時節不受子孫慶賀年餘耳順而孝思彌篤慨歲月推移遷窆無期乃絕鹽粟斷諸滋味食麥而已年八十卒遷都洛陽遷都洛陽子應等乃還鄉葬焉應弟煦字賓育好音律以善歌聞於世位秦州刺史長孫慮代人也母因飲酒其父真呵叱之誤以杖擊便即致死真為縣囚執處以重坐慮列辭尚書云父母忿爭本無餘惡直以謬誤一朝橫禍今母喪未殯父命旦夕慮兄弟五人並各幼稚慮身居長今年十五有一女弟始向四歲更相鞠養不能保全父若就刑交墜溝壑乞以身代老父命使嬰弱衆孤得蒙存立尚書奏云慮於父為孝子於弟為仁兄尋究情狀特可矜感高祖詔特恕其父死罪以從遠流乞伏保高車部人也父居顯祖時為, WYG: ''}
