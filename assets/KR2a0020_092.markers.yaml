  - {type: variant, offset: 715, length: 248, content: 鄯善鎮將申年餘八十伏保手製馬輿親自扶接申欣然隨之申亡伏保解官奉喪還洛復為長兼南中郎將卒孫益德樂安人也其母為人所害益德童幼為母復仇還家哭於殯以待縣官高祖文明太后以其幼而孝決又不逃罪特免之董洛生代人也居父喪過禮詔遣祕書中散溫紹伯奉璽書慰之令自抑割以全孝道又詔其宗親使相喻奬勿令有滅性之譏楊引鄉郡襄垣人也三歲喪父為叔所養母年九十三卒引年七十五哀毀過禮三年服畢恨不識父追服斬衰食粥粗服誓終身命終十三年哀慕不改為郡縣鄉閭三百餘人上狀稱美有司奏宜旌賞復其一門樹其純孝詔別敕集書標楊引至行又可假以散員之名閻元明, WYG: 清}
