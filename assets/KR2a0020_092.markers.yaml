  - {type: variant, offset: 656, length: 1, content: 歲, WYG: 有才識聰辯彊記多所究知於時婦人莫能及李敷公孫文叔雖已貴重近世故事有所不達皆就而諮請焉渤海封卓妻彭城劉氏女也成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣不輟諸嫂喻之不止經旬凶問果至遂憤歎而死時人比之秦嘉妻中書令髙允念其義髙而名不著為之詩曰兩儀正位人倫肈甄爰制夫婦統業承先雖曰異族氣猶自然生則同室終契黄泉其一封生令達卓為時彦内協黄中外兼三變誰能作配克應其選實有華宗挺生淑媛其二京野勢殊山川乖互乃奉王命載馳在路公務既𢎞私義獲著因媒致幣遘止一暮其三率我初冠眷彼弱笄形由禮比情以趣諧忻願難常影跡易乖悠悠言邁戚戚長懐其四時值險屯横離塵網伏鑕就刑身分土壤千里雖遐應如影響良嬪洞感發於夢想其五仰惟親命俯尋嘉好誰謂㑹淺義深情到畢志守窮誓不二醮何以驗之殞身是効其六人之處世孰不厚生必存於義所重則輕結忿鍾心甘就幽冥永捐堂宇長辭母兄其七茫茫中野翳翳孤邱葛虆寘蒙荆棘四周理茍不昧神必俱游異哉貞婦曠世靡儔其八鉅鹿魏溥妻常山房氏女也父堪慕容垂貴鄉太守房氏婉順髙眀幼有烈操年十六而溥遇病且卒顧謂之曰人生如白駒過隙死不足恨但夙心徃志不聞於沒世矣良痛母老家貧供奉無寄赤子矇眇血祀孤危所以抱怨於黄墟耳房垂泣而對曰幸承先人}
