  - {type: variant, offset: 13, length: 2, content: 二梁, WYG: 八眭夸馮亮李謐鄭修蓋兼濟獨善顯晦之殊其事不同由來久矣昔夷齊獲全於周武華矞不容於太公何哉求其心者許以激貪之用督其迹者以爲束敎之風而肥遁不反代有人矣夷情得喪忘懷累有比夫邁德𢎞道匡俗庇民可得而小不可得而忽也自叔世澆浮淳風殆盡錐刀之末競入成羣而能𡨕心物表介然離俗望古獨適求友千齡亦異人矣何必御霞乘雲而追日月窮極天地始爲超遠哉今錄眭夸等爲逸士𫝊眭夸一名昶趙郡高邑人也祖邁晉東海王}
