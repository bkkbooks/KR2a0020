  - {type: variant, offset: 179, length: 0, content: '', WYG: 子聽朔於南門之外閏月則闔門左扉立於其中鄭𤣥注曰天子之廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月聽其朔於明堂門}
  - {type: page-break, offset: 179, content: '', id: KR2a0020_WYG_090-8b, image: WYG0262/WYG0262-0283b.png}
  - {type: variant, offset: 179, length: 0, content: '', krp: 子聽朔於南門之外閏月則闔門左扉立於其中鄭𤣥注曰天子之廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月聽其朔於明堂門}
  - {type: variant, offset: 180, length: 4, content: 可馬上取, WYG: 還處路寢門終月也而考工記周人明堂𤣥注曰或舉王寢或舉明堂互言之以明其制同也其同制之言皆出鄭注然則明堂與寢不得異矣而尚書顧命篇曰迎子釗南門之外延入翼室此之翼室即路寢矣其下曰大貝賁鼓在西房垂之竹矢在東房此則路寢有左右房見於經史者也禮記喪大記曰君夫人卒於路寢小斂婦人髽帶麻於房中鄭𤣥注曰此蓋諸侯禮帶麻於房中則西南天子諸侯左右房見於注者也論路寢則明其左右言明堂則闕其左右个同制之説還相矛楯通儒之注何其然乎使九室之徒奮筆而爭鋒者豈不由處室}
  - {type: page-break, offset: 180, content: '', id: KR2a0020_WYG_090-9a, image: WYG0262/WYG0262-0283c.png}
