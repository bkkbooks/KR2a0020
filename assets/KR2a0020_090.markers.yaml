  - {type: variant, offset: 158, length: 0, content: '', WYG: 絶世之心覽考工記大戴禮盛德篇以明堂之制不同遂著明堂制度論曰余謂論事辨物當取正於經典之眞文援證定疑必有驗於周孔之遺訓然後可以稱準的矣今禮文殘缺聖言靡存明堂之制誰使正之是以後人紛糾競興異論五九之説各信其習是非無準得失相半故歴代紛紜靡所取正乃使裴頠云今羣儒紛糾互相掎摭就令其象可得而圖其所以居用之禮莫能通也爲設虛器耳況漢氏所作四維之个復不能令各處其辰愚以爲尊祖配天其義明著廟宇之制理據未分直可爲殿屋以崇嚴父之祀其}
