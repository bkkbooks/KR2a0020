  - {type: variant, offset: 3319, length: 2502, content: 歷官至鎮西司馬南天水太守西翼校尉文通子景別有傳劉獻之博陵饒陽人也少而孤貧雅好詩傳曾受業於勃海程玄後遂博觀衆籍見名法之言掩卷而笑曰若使楊墨之流不為此書千載誰知其小也曾謂其所親曰觀屈原離騷之作自是狂人死其宜矣何足惜也吾常謂濯纓洗耳有異人之迹哺糟歠醨有同物之志而孔子曰我則異於是無可無不可誠哉斯言實獲我心時人有從獻之學者獻之輒謂之曰人之立身雖百行殊途準之四科要以德行為首君若能入孝出悌忠信仁讓不待出戶天下自知儻不能然雖復下帷針股躡屩從師正可博聞多識不過為土龍乞雨眩惑將來其於立身之道有何益乎孔門之徒初亦未悟見臯魚之歎方歸而養親嗟乎先達何自覺之晚也束脩不易受之亦難敢布心腹子其圖之由是四方學者莫不高其行義而希造其門獻之善春秋毛詩每講左氏盡隱公八年便止云義例已了不復須解由是弟子不能究竟其說後本郡舉孝廉非其好也逼遣之乃應命至京稱疾而還高祖幸中山詔徵典內校書獻之喟然歎曰吾不如莊周散木遠矣一之謂甚其可再乎固以疾辭時中山張吾貴與獻之齊名海內皆曰儒宗吾貴每一講唱門徒千數其行業可稱者寡獻之著錄數百而已皆經通之士於是有識者辨其優劣魏承喪亂之後五經大義雖有師說而海內諸生多有疑滯咸決於獻之六藝之文雖不悉注然所標宗旨頗異舊義撰三禮大義四卷三傳略例三卷注毛詩序義一卷今行於世并章句疏三卷注涅槃經未就而卒有四子放古爰古參古脩古放古幼有人才為州從事早亡爰古參古並傳父詩而不能精通也張吾貴字吳子中山人少聰惠口辯身長八尺容貌奇偉年十八本郡舉為太學博士吾貴先未多學乃從酈詮受禮牛天祐受易詮祐粗為開發而吾貴覽讀一遍便即別構戶牖世人競歸之曾在夏學聚徒千數而不講傳生徒竊云張生之於左氏似不能說吾貴聞之謂其徒曰我今夏講暫罷後當說傳君等來日皆當持本生徒怪之而已吾貴謂劉蘭云君曾讀左氏為我一說蘭遂為講三旬之中吾貴兼讀杜服隱括兩家異同悉舉諸生後集便為講之義例無窮皆多新異蘭乃伏聽學者以此益奇之而以辯能飾非好為詭說由是業不久傳而氣陵牧守不屈王侯竟不仕而終劉蘭武邑人年三十餘始入小學書急就篇家人覺其聰敏遂令從師受春秋詩禮於中山王保安家貧無以自資且耕且學三年之後便白其兄蘭欲講書其兄笑而聽之為立黌舍聚徒二百蘭讀左氏五日一遍兼通五經先是張吾貴以聰辨過人其所解說不本先儒之旨唯蘭推經傳之由本注者之意參以緯候及先儒舊事甚為精悉自後經義審博皆由於蘭蘭又明陰陽博物多識為儒者所宗瀛州刺史裴植徵蘭講書於州城南館植為學主故生徒甚盛海內稱焉又特為中山王英所重英引在館令授其子熙誘略等蘭學徒前後數千成業者衆而排毀公羊又非董仲舒由是見譏於世永平中為國子助教延昌中靜坐讀書有人叩門門人通焉蘭命引入其人葛巾單衣入與蘭坐謂蘭曰君自是學士何為每見毀辱理義長短竟知在誰而過無禮見陵也今欲相召當與君正之言終而出出後蘭告家人少時而患卒孫惠蔚字叔炳武邑武遂人也小字陀羅自言六世祖道恭為晉長秋卿自道恭至惠蔚世以儒學相傳惠蔚年十三粗通詩書及孝經論語十八師董道季講易十九師程玄讀禮經及春秋三傳周流儒肆有名於冀方太和初郡舉孝廉對策於中書省時中書監高閭宿聞惠蔚稱其英辯因相談薦為中書博士轉皇宗博士閭被敕理定雅樂惠蔚參其事及樂成閭上疏請集朝貴於太樂共研是非祕書令李彪自以才辯立難於其間閭命惠蔚與彪抗論彪不能屈黃門侍郎張彝常與遊處每表疏論事多參訪焉十七年高祖南征上議告類之禮及太師馮熙薨惠蔚監其喪禮上書令熙未冠之子皆服成人之服惠蔚與李彪以儒學相知及彪位至尚書惠蔚仍太廟令高祖曾從容言曰道固既登龍門而孫蔚猶沉涓澮朕常以為負矣雖久滯小官深體通塞無孜孜之望儒者以是尚焉二十二年侍讀東宮先是七廟以平文為太祖高祖議定祖宗以道武為太祖祖宗雖定然昭穆未改及高祖崩祔神主於廟時侍中崔光兼太常卿以太祖既改昭穆以次而易兼御史中尉黃門侍郎邢巒以為太祖雖改昭穆仍不應易乃立彈草欲按奏光光謂惠蔚曰此乃禮也而執法欲見彈劾思獲助於碩學惠蔚曰此深得禮變尋為書以與光讚明其事光以惠蔚書呈宰輔乃召惠蔚與巒庭議得失尚書令王肅又助巒而巒理終屈彈事遂寢世宗即位之後仍在左右敷訓經典自冗從僕射遷祕書丞武邑郡中正惠蔚既入東觀見典籍未周乃上疏曰臣聞聖皇之御世也必幽贊人經參天二地憲章典故述遵鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圖書祕籍乃承天之正術治人之貞範是以溫柔疏遠詩書之教恭儉易良禮樂之道爻彖以精微為神春秋以屬辭為化故大訓炳於東序藝文光於麟閣斯實太平之樞宗勝殘之要道有國之靈基帝王之盛業安上靖民敦風美俗其在茲乎及秦棄學術禮經泯絕漢興求訪典文載舉先王遺訓燦然復存暨光武撥亂日不暇給而入洛之書二千餘兩魏晉之世尤重典墳收亡集逸九流咸備觀其鳩閱史篇訪購經論紙竹所載略盡無遺臣學闕通儒思不及遠徒循章句片義無立而慈造曲覃厠班祕省忝官承乏唯書是司而觀閣舊典先無定目新故雜糅首尾不全有者累帙數十無者曠年不寫或篇第褫落始末淪殘或文壞字誤謬爛相屬篇目雖多全定者少臣今依前丞臣盧昶所撰甲乙新錄欲裨殘補闕損併有無校練句讀以為定本次第均寫永為常式其省先無本者廣加推尋搜求令足然經記浩博諸子紛綸部帙既多章篇紕繆當非一二校書歲月可了今求令四門博士及在京儒生四十人在祕書省專精校考參定字義如蒙聽許則典文允正羣書大集詔許之又兼黃門侍郎遷中散大夫仍兼黃門久之正黃門侍郎代崔光為著作郎才非文史無所撰著唯自披其傳注數行而已遷國子祭酒祕書監仍知史事延昌二年追賞侍講之勞封棗強縣開國男食邑二百戶肅宗初出為平東將軍濟州刺史還京除光祿大夫魏初已來儒生寒宦惠蔚最為顯達先單名蔚正始中侍講禁內夜論佛經有愜帝旨詔使加惠號惠蔚法師焉神龜元年卒于官時年六十七賜帛五百匹贈大將軍瀛州刺史諡曰戴子伯禮襲封伯禮善隸書拜奉朝請員外散騎侍郎寧朔將軍步兵校尉國子博士卒贈輔國將軍巴州刺史子產同襲少有才學早亡時人惜之徐遵明字子判華陰人也身長八尺幼孤好學年十七隨鄉人毛靈和等詣山東求學至上黨乃師屯留王聰受毛詩尚書禮記一年便辭聰詣燕趙師事張吾貴吾貴門徒甚盛遵明伏膺數月乃私謂其友人曰張生名高而義無檢格凡所講說不愜吾心請更從師遂與平原田猛略就范陽孫買德受業一年復欲去之猛略謂遵明曰君年少從師每不終業千里負帙何去就之甚如此用意終恐無成遵明曰吾今始知真師所在猛略曰何在遵明乃指心曰正在於此乃詣平原唐遷納之居於蠶舍讀, WYG: ''}
