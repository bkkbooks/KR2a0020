  - {type: variant, offset: 178, length: 0, content: '', WYG: 羣儒舛互並乖其實據義求𠂻莫適可從哉但恨典文殘滅求之靡據而已矣乃復遂去室牖諸制施之於敎未知其所隆政求之於情未可喻其所以必須惜哉言乎仲尼有言曰賜也爾愛其羊我愛其禮余以爲隆政必須其禮豈彼一羊哉推此而論則聖人之於禮殷勤而重之裴頠之於禮任意而忽之是則頠賢於仲尼矣以斯觀之裴氏之子以不達而失禮之㫖也余竊不自量頗有鄙意據理尋義以求其眞貴合雅衷不茍偏信乃藉之以禮𫝊考之以訓注博採先賢之言廣搜通儒之説量其當否叅其同異棄其所短收其所長推義察圖以折厥衷豈敢必善聊亦合其言志矣凡論明堂之制者雖衆然校其大略則二途而已言五室者則據周禮考工之記以爲本是康成之徒所執言九室者則案大戴盛德之篇以爲源是伯喈之倫所持此之二書雖非聖言然是先賢之中博見洽通者也但各記所聞未能全正可謂既盡美矣未盡善也而先儒不能考其當否便各是所習卒相非毁豈逹士之確論哉小戴氏傳禮事四十九篇號曰禮記雖未能全當然多得其衷方之前賢亦無愧矣而月令玉藻明堂三篇頗有明堂之義余故採掇二家參之月令以爲明堂五室古今通則其室居中者謂之太廟太室之東者謂之青陽當太室之南者謂之明堂當太室之西者謂之總章當太室之北者謂之𤣥堂四面之室各有夾房謂之左右个三十六户七十二牖矣室个之形今之殿前是其遺像耳个者即寢之房也但明堂與寢施用既殊故房个之名亦隨事而遷耳今粗書其像以見鄙意案圖察義略可驗矣故檢之五室則義明於考工校之戸牖則數協於盛德考之施用則事著於月令求之閏也合周禮與玉藻既同夏殷又符周秦雖乖衆儒儻或在斯矣考工記曰周人明堂度以九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵余謂記得之於五室而謬於堂之修廣何者當以理推之令惬古今之情也夫明堂者蓋所以告月朔布時令宗文王祀五帝者也然營構之範自當因宜創制耳故五室者合於五帝各居一室之義且四時之祀皆據其方之正又聽朔布令咸得其月之辰可請施政及記二三俱允求之古義竊爲當矣鄭康成漢末之通儒後學所宗正釋五室之位謂土居中木火金水各居四維然四維之室既乖其正施令聽朔各失厥衷左右之个棄而不顧乃反文之以美説飾之以巧辭言水木用事交於東北木火用事交於東南火木用事交於西南金水用事交於西北既依五行當從其用事之交出何經典可謂攻於異端言非而博疑誤後學非所望於先儒也禮記玉藻曰}
