  - {type: variant, offset: 875, length: 483, content: 太祖以其謹厚舉動可則拜上大夫命授諸皇子經書太宗即祚以師傅之恩賜爵祝阿侯後出為雁門太守獲白雀以獻拜光祿大夫卒子弼早卒弼子恭襲降為雲中子無子爵除盧醜昌黎徒河人襄城王魯元之族也世祖之為監國醜以篤學博聞入授世祖經後以師傅舊恩賜爵濟陰公除鎮軍將軍拜尚書加散騎常侍出為河內太守延和二年冬卒闕初中山襲爵太和中以老疾自免子升頭襲爵後例降張偉字仲業小名翠螭太原中都人也高祖敏晉祕書監偉學通諸經講授鄉里受業者常數百人儒謹汎納勤於教訓雖有頑固不曉問至數十偉告喻殷勤曾無慍色常依附經典教以孝悌門人感其仁化事之如父性恬平不以夷嶮易操清雅篤慎非法不言世祖時與高允等俱被辟命拜中書博士轉侍郎大將軍樂安王範從事中郎馮翊太守還仍為中書侍郎本國大中正使酒泉慰勞沮渠無諱還遷散騎侍郎聘劉義隆還拜給事中建威將軍賜爵成臯子出為平東將軍營州刺史進爵建安公卒贈征南將軍并州刺史諡曰康在州郡以仁德為先不任刑罰清身率下宰守不敢為非子仲慮太和初假給事中高麗副使尋假散騎常侍高麗使後出為章武太守加寧遠將軍仲慮弟仲繼學尚有父風善倉雅林說太和中官至侍御長坐事徙西裔道死梁祚北地泥陽人父劭皇始二年歸國拜吏部郎出為濟陽太守至祚居, WYG: ''}
