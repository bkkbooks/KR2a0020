  - {type: variant, offset: 196, length: 0, content: '', krp: 理則未惬人情其不然一也余恐爲鄭學者茍求必勝競生異端以相訾抑云二筵者乃室之東西耳南北則狭焉余故備論之曰若東西二筵則室戸之外爲丈三尺五寸矣南北戸外復如此則三室之中南北裁各丈二尺耳記云四房兩夾窻若爲三尺之户二尺之窻窻戸之間裁盈一尺繩樞甕牖之室蓽門圭竇之堂尚不然矣假令復欲小廣之則四面之外闊狹不齊東西既深南北更淺屋宇之制不爲通矣驗之衆塗略無算焉且凡室二筵丈八地耳然則戸牖之間不踰二尺也禮記明堂天子負斧扆南向而立鄭元注曰設斧於戸牖之間而鄭氏禮圖説扆制曰縱廣八尺畵斧}
  - {type: variant, offset: 197, length: 2, content: 武兼, WYG: 於其上今之屏風也以八尺扆置二尺之間此之叵通不待智者較然可見矣且若二筵之室爲四尺之戸則戸之兩頰裁各七尺耳全以置之猶自不容矧復戸牖之間哉其不然二也又復以世代驗之即虞夏尚朴殷周稍文制造之差每加崇飾而夏后世室堂修二七周人之制反更促狹豈是夏禹卑宫之意周監郁郁之美哉以斯察之其不然三也又云堂崇一筵便基高九尺而壁户之外裁四尺五寸於營制之法自不相稱其不然四也又云室中度以几堂上度以筵而復云凡室二筵而不以几還自相違其不然五也以此驗之記者之謬抑可見矣盛德篇云明堂凡九室三十六戸七十二牖上圓下方東西九仞南北七筵堂高三尺也余謂盛德篇得之於戸牖失之於九室何者五室之制傍有夾房面各有戸户有兩牖此乃因事立則非拘異術戸牖之數固自然矣九室者論之五帝事既不合施之時令又失其辰左右之个重置一隅兩辰同處參差出入斯乃義無所據未足稱也且又堂之修廣裁六十三尺耳假使四尺五寸爲外之基其中五十四尺便是五室之地計其一室之中僅可一丈置其戸牖則於何容之哉若必小而爲之以容其數則令帝王側身出入斯爲怪矣此匪直不合典制抑亦可哂之甚也余謂其九室之言誠亦有由然竊以爲戴氏聞三十六户七十二牖弗見其制靡知所置便謂一室有四戸之窻計其戸牖之數即以爲九室耳或未之思也蔡伯喈漢末之儒學士而見重於當時即識其修廣之不當而必未思其九室之爲謬更修而廣之假其法象可謂因僞飾辭順非而澤諒可歎矣余今省彼衆家委心從善庶探其衷不爲茍異但是古非今俗間之常情愛遠惡近世中之恒事而千載之下獨論古制驚俗之談固延多誚脱有深賞君子者覽而揣之儻或存焉謐不飲酒好音律愛樂山水高尚之情長而彌固一遇其賞悠爾忘歸乃作神士賦歌曰周孔重儒敎莊老貴無爲二途雖如異一是買聲兒生乎意不愜死名}
