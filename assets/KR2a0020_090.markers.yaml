  - {type: variant, offset: 2975, length: 336, content: 性也經典者身之文也皆以陶鑄神情啟悟耳目未有不由學而能成其器不由習而能利其業是故季路勇士也服道以成忠烈之概甯越庸夫也講藝以全高尚之節蓋所由者習也所因者本也本立而道生身文而德備焉昔者先王之訓天下也莫不導以詩書教以禮樂移其風俗和其人民故恭儉莊敬而不煩者教深於禮也廣博易良而不奢者教深於樂也溫柔敦厚而不愚者教深於詩也疏通知遠而不誣者教深於書也潔靜精微而不賊者教深於易也屬辭比事而不亂者教深於春秋也夫樂以和神詩以正言禮以明體書以廣聽春秋以斷事五者蓋五常之道相須而備而易為之源故曰易不可見則乾坤其幾乎息矣由是言之六經者先王之遺烈聖人之盛事也安可不遊心寓目習性文身哉頃因暇日屬意藝林略撰所聞討論其本名曰六經略注以訓門徒焉其略注行於世爽不事王侯獨守閑靜講肄經典二十餘年時人號為儒林先生年六, WYG: 誠}
