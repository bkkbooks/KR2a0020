  - {type: variant, offset: 7682, length: 2704, content: 著驛馬特徵既而舍之使教諸子在館十日一歸家隨以鼎食景裕風儀言行雅見嗟賞先是景裕注周易尚書孝經論語禮記老子其毛詩春秋左氏未訖齊文襄王入相於第開講招延時儁令景裕解所注易景裕理義精微吐發閑雅時有問難或相詆訶大聲厲色言至不遜而景裕神彩儼然風調如一從容往復無際可尋由是士君子嗟美之初元顥入洛以為中書郎普泰初復除國子博士進退其間未曾有得失之色性清靜淡於榮利弊衣粗食恬然自安終日端嚴如對賓客興和中補齊王開府屬卒於晉陽齊獻武王悼惜之景裕雖不聚徒教授所注易大行於世又好釋氏通其大義天竺胡沙門道悕每論諸經論輒託景裕為之序景裕之敗也繫晉陽獄至心誦經枷鎖自脫是時又有人負罪當死夢沙門教講經覺時如所夢默誦千遍臨刑刀折主者以聞赦之此經遂行於世號曰高王觀世音李同軌趙郡高邑人陽夏太守義深之弟體貌魁岸腰帶十圍學綜諸經多所治誦兼讀釋氏又好醫術年二十二舉秀才射策除奉朝請領國子助教轉著作郎典儀注修國史遷國子博士加征虜將軍永熙二年出帝幸平等寺僧徒講法敕同軌論難音韻閑朗往復可觀出帝善之三年春釋菜詔延公卿學官於顯陽殿敕祭酒劉廞講孝經黃門李郁講禮記中書舍人盧景宣解大戴禮夏小正篇時廣招儒學引令預聽同軌經義素優辯析兼美而不得執經深為慨恨天平中轉中書侍郎興和中兼通直散騎常侍使蕭衍衍深耽釋學遂集名僧於其愛敬同泰二寺講盤大品經引同軌預席衍兼遣其朝臣並共觀聽同軌論難久之道俗咸以為善盧景裕卒齊獻武王引同軌在館教諸公子甚加禮之每旦入授日暮始歸緇素請業者同軌夜為說解四時爾不以為倦武定四年夏卒年四十七時人傷惜之齊獻武王亦殊嗟悼贈襚甚厚贈驃騎大將軍瀛州刺史諡曰康李業興上黨長子人也祖虬父玄紀並以儒學舉孝廉玄紀卒於金鄉令業興少耿介志學精力負帙從師不憚勤苦耽思章句好覽異說晚乃師事徐遵明於趙魏之間時有漁陽鮮于靈馥亦聚徒教授而遵明聲譽未高著錄尚寡業興乃詣靈馥黌舍類受業者靈馥乃謂曰李生久逐羌博士何所得也業興默爾不言及靈馥說左傳業興問其大義數條靈馥不能對於是振衣而起曰羌弟子正如此耳遂便徑還自此靈馥生徒傾學而就遵明遵明學徒大盛業興之為也後乃博涉百家圖緯風角天文占候無不詳練尤長算歷雖在貧賤常自矜負若禮待不足縱於權貴不為之屈後為王遵業門客舉孝廉為校書郎以世行趙畗曆節氣後辰下算延昌中業興乃為戊子元曆上之於時屯騎校尉張洪盪寇將軍張龍祥等九家各獻新曆世宗詔令共為一曆洪等後遂共推業興為主成戊子曆正光三年奏行之事在律曆志累遷奉朝請臨淮王彧征蠻引為騎兵參軍後廣陵王淵北征復為外兵參軍業興以殷曆甲寅黃帝辛卯徒有積元術數亡缺業興又修之各為一卷傳於世建義初敕典儀注未幾除著作佐郎永安二年以前造曆之勳賜爵長子伯遭憂解任尋起復本官元曄之竊號也除通直散騎侍郎普泰元年沙汰侍官業興仍在通直加寧朔將軍又除征虜將軍中散大夫仍在通直太昌初轉散騎侍郎仍以典儀之勤特賞一階除平東將軍光祿大夫尋加安西將軍後以出帝登極之初預行禮事封屯留縣開國子食邑五百戶轉中軍將軍通直散騎常侍永熙三年二月出帝釋奠業興與魏季景溫子昇竇瑗為摘句後入為侍讀遷鄴之始起部郎中辛術奏曰今皇居徙御百度創始營構一興必宜中制上則憲章前代下則模寫洛京今鄴都雖舊基址毀滅又圖記參差事宜審定臣雖曰職司學不稽古國家大事非敢專之通直散騎常侍李業興碩學通儒博聞多識萬門千戶所宜訪詢今求就之披圖案記考定是非參古雜今折中為制召畫工并所須調度具造新圖申奏取定庶經始之日執事無疑詔從之天平二年除鎮南將軍尋為侍讀於時尚書右僕射營構大將高隆之被詔繕治三署樂器衣服及百戲之屬乃奏請業興共參其事四年與兼散騎常侍李諧兼吏部郎盧元明使蕭衍衍散騎常侍朱䌇問業興曰魏洛中委粟山是南郊邪業興曰委粟是圓丘非南郊䌇曰北間郊丘異所是用鄭義我此中用王義業興曰然洛京郊丘之處專用鄭解䌇曰若然女子逆降傍親亦從鄭以不業興曰此之一事亦不專從若卿此間用王義除禫應用二十五月何以王儉喪禮禫用二十七月也䌇遂不答業興曰我昨見明堂四柱方屋都無五九之室當是裴頠所制明堂上圓下方裴唯除室耳今此上不圓何也䌇曰圓方之說經典無文何怪於方業興曰圓方之言出處甚明卿自不見見卿錄梁主孝經義亦云上圓下方卿言豈非自相矛盾䌇曰若然圓方竟出何經業興曰出孝經援神契䌇曰緯候之書何用信也業興曰卿若不信靈威仰叶光紀之類經典亦無出者卿復信不䌇不答蕭衍親問業興曰聞卿善於經義儒玄之中何所通達業興曰少為書生止讀五典至於深義不辨通釋衍問詩周南王者之風繫之周公邵南仁賢之風繫之邵公何名為繫業興對曰鄭注儀禮云昔大王王季居于岐陽躬行邵南之教以興王業及文王行今周南之教以受命作邑於酆分其故地屬之二公名為繫衍又問若是故地應自統攝何由分封二公業興曰文王為諸侯之時所化之本國今既登九五之尊不可復守諸侯之地故分封二公衍又問乾卦初稱潛龍二稱見龍至五飛龍初可名為虎問意小乖業興對學識膚淺不足仰酬衍又問尚書正月上日受終文祖此是何正業興對此是夏正月衍言何以得知業興曰案尚書中候運行篇云日月營始故知夏正衍又問堯時以何月為正業興對自堯以上書典不載實所不知衍又云寅賓出日即是正月日中星鳥以殷仲春即是二月此出堯典何得云堯時不知用何正也業興對雖三正不同言時節者皆據夏時正月周禮仲春二月會男女之無夫家者雖自周書月亦夏時堯之日月亦當如此但所見不深無以辨析明問衍又曰禮原壤之母死孔子助其沐椁原壤叩木而歌曰久矣夫予之不託於音也狸首之班然執女手之卷然孔子聖人而與原壤為友業興對孔子即自解言親者不失其為親故者不失其為故又問原壤何處人業興對曰鄭注云原壤孔子幼少之舊故是魯人衍又問孔子聖人所存必可法原壤不孝有逆人倫何以存故舊之小節廢不孝之大罪業興對曰原壤所行事自彰著幼少之交非是今始既無大故何容棄之孔子深敦故舊之義於理無失衍又問孔子聖人何以書原壤之事垂法萬代業興對曰此是後人所錄非孔子自制猶合葬於防如此之類禮記之中動有百數衍又問易曰太極是有無業興對所傳太極是有素不玄學何敢輒酬還兼散騎常侍加中軍大將軍後罷議事省詔右僕射高隆之及諸朝士與業興等在尚書省議定五禮興和初又為甲子元曆時見施用復預議麟趾新制武定元年除國子祭酒仍侍讀三年出除太原太守齊獻武王每出征討時有顧訪五年齊文襄王引為中外府諮議參軍後坐事禁止業興乃造九宮行曆以五百為章四千四十為部九百八十七為斗分還以己未為元始終相維不復移轉與今曆法術不同至於氣序交分景度盈縮不異也七年死於禁所年六十六業興愛好墳籍鳩集不已手自補治躬加題帖其家所有垂將萬卷覽讀不息多有異聞諸儒服其淵博性豪俠重意氣人有急難委之歸命便能容匿與其好合傾身無吝若有相乖忤便即疵毀乃至聲色加以謗罵性又躁隘至於論難之際高聲攘振無儒者之風每語人云但道我好雖知妄言故勝道惡務進忌前不顧後患時人以此惡之至於學術精微當時莫及子崇祖武定中太尉外兵參軍崇祖弟遵祖太昌中業興傳其長子伯以授之齊受禪例降, WYG: ''}
