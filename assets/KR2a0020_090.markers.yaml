  - {type: variant, offset: 111, length: 0, content: '', WYG: 涕高尚不仕寄情邱壑同郡李順願與之交夸拒而不許邦國少長莫不憚之少與崔浩爲莫逆之交浩爲司徒奏徴爲其中郞辭疾不赴州郡逼遣不得已入京都與浩相見延留數日惟飲酒談敘平生不及世利浩每欲論屈之竟不能發言其見敬憚如此浩後遂投詔書於夸懷亦不開口夸曰桃簡卿已爲司徒何足以此勞國士也吾便於此將别桃簡浩小名也浩慮夸即還時乘一騾更無兼騎浩乃以夸騾内之廐中冀相維縶夸遂託鄉人輸租者謬爲御車乃得出闗浩知而歎曰眭夸獨行士本不應以小職辱之又使其人仗䇿復路吾當何辭以謝也時朝法甚峻夸既私還將有私歸之咎浩仍相左右始得無坐經年送夸本騾兼遺以所乘馬為書謝之夸更不受其騾馬亦不復書及浩誅爲之素服受鄉人弔唁經一時乃止歎曰崔公既死誰能更容眭夸遂作朋友篇辭義爲時人所稱婦父鉅鹿魏攀當時名達之士未嘗備壻之禮情同朋好或人謂夸曰吾聞有大才者必居貴仕子何獨在桑榆乎遂著知命論以釋之年七十五卒葬日赴㑹者如市無子馮亮字靈通南陽人蕭衍平北將軍蔡道恭之甥也少博覽諸書又篤好佛理隨道恭至義陽㑹中山王英平義陽而獲焉英素聞其名以禮待接亮性清淨至洛隱居崧高感英之德以時展勤及英亡亮奔赴盡其哀慟世宗嘗召以爲羽林監領中書舍人將令侍講十地諸經固辭不拜又欲使衣幘入見亮苦求以幅巾就朝遂不彊逼還山數年與僧徒禮誦爲業蔬食飲水有終焉之志㑹逆人王敞事發連山中沙門而亮被執赴尚書省十餘日詔特免雪亮不敢還山遂寓居景明寺勑給衣食及其從者數人後思其舊居復還山室亮既雅愛山水又兼巧思結架巖林甚得栖游之適頗以此聞世祖給其工力令與沙門統僧暹何南尹甄琛等周視崧高形勝之處遂造閑居佛寺林泉既竒營製又美曲盡山居之妙亮時出京師延昌二年冬因遇篤疾世宗勑以馬輿送令還山居崧高道塲寺數日而卒詔贈帛二百匹以供凶事遺誡兄子綜斂以衣㡊左手持板右手執孝經一卷置尸盤石上去人數里外積十餘日乃焚於山以灰燼處起佛塔經藏初亮以盛冬喪時連日驟雪窮山荒澗鳥獸飢窘僵尸山野無所防護時壽春道人惠需每旦往看其屍拂去塵霰禽蟲之迹交横左右而初無侵毁衣服如本惟風吹㡊巾又以亮識舊南方法師信大栗十枚言期之將來十地果報開亮手以置把中經宿乃爲蟲鳥盗食皮殻在地而亦不傷肌體焚燎之日有素霧蓊鬱廻繞其傍}
