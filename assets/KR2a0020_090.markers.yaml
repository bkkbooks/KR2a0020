  - {type: variant, offset: 1597, length: 1364, content: 曰略注合百餘篇好事者覽之咸以為善焉安貧樂道不以屢空改操徵為中書博士久之出為幽州別駕廉貞寡欲不營資產衣食至常不足妻子不免飢寒後拜著作佐郎遷祕書丞時高允為監河間邢祐北平陽嘏河東裴定廣平程駿金城趙元順等為著作佐郎雖才學互有短長然俱為稱職並號長者允每稱博通經籍無過也即劉彧將軍王玄謨舅子三子並不率父業好酒自棄常忿其世衰植杖巡舍側崗而哭不為營事婚宦任意官娶故仕聘濁碎不得及其門流婦弟鄧宗慶及外生孫玄明等每以為言曰此輩會是衰頓何煩勞我乃別構精廬并置經籍於其中一奴自給妻子莫得而往酒食亦不與同時有珍美呼時老東安公刁雍等共飲噉之家人無得嘗焉太和十年以為祕書令而固請為郡未授而卒時年七十六贈平東將軍幽州刺史都昌侯諡曰康子壽昌太和初祕書令史稍遷荊州征虜府錄事參軍陳奇字脩奇河北人也自云晉涼州刺史驤之八世孫祖刃仕慕容垂奇少孤家貧而奉母至孝齠聰識有夙成之美性氣剛亮與俗不羣愛玩經典博通墳籍常非馬融鄭玄解經失旨志在著述五經始注孝經論語頗傳於世為搢紳所稱與河間邢祐同召赴京時祕書監游雅素聞其名始頗好之引入祕省欲授以史職後與奇論典誥及詩書雅贊扶馬鄭至於易訟卦天與水違行雅曰自葱嶺以西水皆西流推此而言易之所及自葱嶺以東耳奇曰易理綿廣包含宇宙若如公言自葱嶺以西豈東向望天哉奇執義非雅每如此類終不苟從雅性護短因以為嫌嘗衆辱奇或爾汝之或指為小人奇曰公身為君子奇身且小人耳雅曰君言身且小人君祖父是何人也奇曰祖燕東部侯釐雅質奇曰侯釐何官也奇曰三皇不傳禮官名豈同哉故昔有雲師火正鳥師之名以斯而言世革則官異時易則禮變公為皇魏東宮內侍長侍長竟何職也由是雅深憾之先是敕以奇付雅令銓補祕書雅既惡之遂不復用焉奇冗散數年高允與奇讎溫古籍嘉其遠致稱奇通識非凡學所窺允微勸雅曰君朝望具瞻何為與野儒辨簡牘章句雅謂允有私於奇曰君寧黨小人也乃取奇所注論語孝經焚於坑內奇曰公貴人不乏樵薪何乃燃奇論語雅愈怒因告京師後生不聽傳授而奇無降志亦評雅之失雅製昭皇太后碑文論后名字之美比諭前魏之甄后奇刺發其非遂聞於上詔下司徒檢對碑史事乃郭后雅有屈焉有人為謗書多怨時之言頗稱奇不得志雅乃諷在事云此書言奇不遂當是奇假人為之如依律文造謗書者皆及孥戮遂抵奇罪時司徒平原王陸麗知奇見枉惜其才學故得遷延經年冀有寬宥但執以獄成竟致大戮遂及其家奇於易尤長在獄嘗自筮卦未及成乃擥破而歎曰吾不度來年冬季及奇受害如其所占奇初被召夜夢星墜壓脚明而告人曰星則好風星則好雨夢星壓脚必無善徵但時命峻切不敢不赴耳奇妹適常氏有子曰矯之仕歷郡守神龜中上書陳時政所宜言頗忠至清河王懌稱美之奇所注論語矯之傳掌未能行於世其義多異鄭玄往往與司徒崔浩同常爽字仕明河內溫人魏太常卿林六世孫也祖珍苻堅南安太守因世亂遂居涼州父坦乞伏世鎮遠將軍大夏鎮將顯美侯爽少而聰敏嚴正有志概雖家人僮隸未嘗見其寬誕之容篤志好學博聞強識明習緯候五經百家多所研綜州郡禮命皆不就世祖西征涼土爽與兄仕國歸款軍門世祖嘉之賜仕國爵五品顯美男爽為六品拜宣威將軍是時戎車屢駕征伐為事貴遊子弟未遑學術爽置館溫水之右教授門徒七百餘人京師學業翕然復興爽立訓甚有勸罰之科弟子事之若嚴君焉尚書左僕射元贊平原太守司馬真安著作郎程靈虬皆是爽教所就崔浩高允並稱爽之嚴教奬厲有方允曰文翁柔勝先生剛克立教雖殊成人一也其為通識歎服如此因教授之暇述六經略注以廣制作甚有條貫其序曰傳稱立天之道曰陰與陽立地之道曰柔與剛立, WYG: 罷隣}
