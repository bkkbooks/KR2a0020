  - {type: variant, offset: 5863, length: 8, content: 是晉世永嘉舊本遵, WYG: 叢林十有二卷爲璠等判析隱伏垂盈百條滯無常滯纖毫必舉通不長通有枉斯屈不茍言以違經弗飾辭而背理辭氣磊落觀者忘疲每曰丈夫擁書萬卷何假南面百城遂絶跡下幃杜門却掃棄産營書手自刪削卷無重複者四千有餘矣猶括次專家搜比讜議隆冬達曙盛暑通宵雖仲舒不闚園君伯之閉戸高氏之遺漂張生之忘食方之斯人未足爲喻謐嘗詣故太常卿劉芳推問音義語及中代興廢之由芳乃歎曰君若遇高祖侍中太常非僕有也前河南尹黄門侍郎甄琛内賛近機朝野傾目于時親識求官者答云趙郡李謐躭學守道不悶于時常欲致言但未有次耳諸君何爲輕自媒衒謂其子曰昔鄭元盧植不遠數千里詣扶風馬融今汝}
