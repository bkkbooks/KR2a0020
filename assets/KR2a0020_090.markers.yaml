  - {type: variant, offset: 7050, length: 602, content: 其盛名訪以疑義沖應機解辯無不祛其久惑後太守范陽盧尚之刺史河東裴植並徵沖為功曹主簿非所好也受署而已不關事務惟以講學為心四方學徒就其受業者歲有數百沖雖儒生而執心壯烈不畏強禦延昌中世宗舅司徒高肇擅恣威權沖乃抗表極言其事辭旨懇直文義忠憤太傅清河王懌覽而歎息先是沖曾祖雍作行孝論以誡子孫稱古之葬者衣之以薪不封不樹後世聖人易之棺椁其有生則不能致養死則厚葬過度及於末世至蘧蒢裹尸倮而葬者確而為論並非折衷既知二者之失豈宜同之當令所存者棺厚不過三寸高不過三尺弗用繒綵斂以時服車止用白布為幔不加畫飾名為清素車又去挽歌方相并盟器雜物及沖祖遵將卒敕其子孫令奉雍遺旨河南尹丞張普惠謂為太儉貽書於沖叔整議其進退整令與通學議之沖乃致書國學諸儒以論其事學官竟不能答沖以嫡傳祖爵東安侯京兆王繼為司空也並以高選頻辟記室參軍肅宗將親釋奠於是國子助教韓神固與諸儒詣國子祭酒崔光吏部尚書甄琛舉其才學奏而徵焉及卒國子博士高涼及范陽盧道侃盧景裕等復上狀陳沖業行議奏諡曰安憲先生祭以太牢子欽字志儒早亡盧景裕字仲儒小字白頭范陽涿人也章武伯同之兄子少聰敏專經為學居拒馬河將一老婢作食妻子不自隨從又避地大寧山不營世事居無所業惟在注解其叔父同職居顯要而景裕止於園舍情均郊野謙恭守道貞素自得由是世號居士前廢帝初除國子博士參議正聲甚見親遇待以不臣之禮永熙初以例解天平中還鄉里與邢子才魏季景魏收邢昕等同徵赴鄴景裕寓託僧寺講聽不已未幾歸本郡河間邢摩納與景裕從兄仲禮據鄉, WYG: 㑹寶夤}
