  - {type: variant, offset: 535, length: 339, content: 燕齊趙魏之間橫經著錄不可勝數大者千餘人小者猶數百州舉茂異郡貢孝廉對揚王庭每年逾衆神龜中將立國學詔以三品已上及五品清官之子以充生選未及簡置仍復停寢正光二年乃釋奠於國學命祭酒崔光講孝經始置國子生三十六人暨孝昌之後海內淆亂四方校學所存無幾永熙中復釋奠於國學又於顯陽殿詔祭酒劉廞講孝經黃門李郁說禮記中書舍人盧景宣講大戴禮夏小正篇復置生七十二人及遷都於鄴國子置生三十六人至於興和武定之世寇難既平儒業復光矣漢世鄭玄並為衆經注解服虔何休各有所說玄易書詩禮論語孝經虔左氏春秋休公羊傳大行於河北王肅易亦間行焉晉世杜預注左氏預玄孫坦坦弟驥於劉義隆世並為青州刺史傳其家業故齊地多習之自梁越以下傳受講說者甚衆今舉其知名者附列於後云梁越字玄覽新興人也少而好學博綜經傳無所不通性純和篤信行無擇善國初為禮經博, WYG: 處}
