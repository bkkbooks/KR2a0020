  - {type: variant, offset: 196, length: 0, content: '', WYG: 理則未惬人情其不然一也余恐爲鄭學者茍求必勝競生異端以相訾抑云二筵者乃室之東西耳南北則狭焉余故備論之曰若東西二筵則室戸之外爲丈三尺五寸矣南北戸外復如此則三室之中南北裁各丈二尺耳記云四房兩夾窻若爲三尺之户二尺之窻窻戸之間裁盈一尺繩樞甕牖之室蓽門圭竇之堂尚不然矣假令復欲小廣之則四面之外闊狹不齊東西既深南北更淺屋宇之制不爲通矣驗之衆塗略無算焉且凡室二筵丈八地耳然則戸牖之間不踰二尺也禮記明堂天子負斧扆南向而立鄭元注曰設斧於戸牖之間而鄭氏禮圖説扆制曰縱廣八尺畵斧}
