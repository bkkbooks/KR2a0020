  - {type: variant, offset: 6879, length: 170, content: 諡曰文烈子仲曜武定末儀同開府屬刁沖字文朗勃海饒安人也鎮東將軍雍之曾孫十三而孤孝慕過人其祖母司空高允女聰明婦人也哀其早孤撫養尤篤沖免喪後便志學他方高氏泣涕留之沖終不止雖家世貴達乃從師於外自同諸生於時學制諸生悉日直監沖雖有僕隸不令代己身自炊爨每師受之際發情精專不捨晝夜殆忘寒暑學通諸經偏修鄭說陰陽圖緯算數天文風氣之書莫不關綜當世服其精博刺史郭祚, WYG: 蕭寶夤訪實以}
