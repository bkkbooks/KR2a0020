  - {type: variant, offset: 254, length: 161, content: 春別起太學於城東後徵盧玄高允等而令州郡各舉才學於是人多砥尚儒林轉興顯祖天安初詔立鄉學郡置博士二人助教二人學生六十人後詔大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人太和中改中書學為國子學建明堂辟雍尊三老五更又開皇子之學及遷都洛邑詔立國子太學, WYG: ''}
