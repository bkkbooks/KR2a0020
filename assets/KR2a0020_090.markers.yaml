  - {type: variant, offset: 6750, length: 126, content: 家云胡不樂因誡二三子弟曰此之富貴匪自天降乃勤學所致耳時人榮之入為司農少卿光祿大夫徵出州入卿匪唯學業所致亦由汝南王悅以其師資之義為之啟請焉永安初加平東將軍尋以老解職永熙二年卒出帝以徵昔授父業故優贈散騎常侍都督相殷滄三州諸軍事車騎大將軍儀同三司尚書左僕射相, WYG: 山舍蘭根申表薦修肅宗詔付雍}
