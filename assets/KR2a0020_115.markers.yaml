  - {type: variant, offset: 280, length: 801, content: 大有聲其事昭盛至十四年三月填星守哭泣占曰將以女君有哭泣之事四月丙申火犯鬼喪祥也六月有大流星從紫宮出西行天象又曰人主將以喪事而出其宮八月月太白皆犯軒轅九月癸丑而太皇太后崩帝哭三日不絕聲勺飲不入口者七日納菅屨徒行至陵其反亦如之哀毀骨立杖而後起雖殊俗之萌矯然知感焉自九月至于歲終凡四謁陵又荐出紫宮之驗也十四年十一月月犯填星十二月月犯軒轅十五年十月月犯填又犯軒轅八月又犯之九月月掩填星十七年正月月又犯軒轅皆女君之象也是時林貴人以故事薨及馮貴人為后而其姊譖之至二十年竟坐廢黜以憂死幽后繼立又以淫亂不終十三年十二月戊戌填星辰星合于須女女齊吳分占曰是為雍沮主令不行且有陰親者至十四年三月庚申歲星守牛占曰其君不愛親戚貴人多喪又饉祥也是歲太白三犯熒惑十月太白入氐十一月有大流星從南行入氐甲申齊邦之物也金火相鑠為兵喪為大人之謫天象若曰宿宮有兵喪之故盛大者循而殘之處其寢廟之中矣至十五年三月壬子歲犯填在虛三月癸巳木火土三星合宿于虛甲午火土相犯虛齊也占曰其國亂專政內外兵喪故立侯王九月乙丑太白犯斗第四星戊子有大流星起少微入南宮至帝坐主有盛大之臣乘賢以侮其君者且占曰大人易政至十七年正月戊辰金木合于危危亦齊也是為人君且罹兵喪之變四月戊子太白犯五諸侯占曰有擅刑以殘賊諸侯者至七月齊武帝殂西昌侯以從子干政竟殺二君而自立是為齊明帝於是高武諸子王侯數十人相次誅夷殆無遺育矣雖繼體相循實有準命之禍故天謫仍見云自十五年至十七年月行七犯建星建星為忠臣之輔經代之謀又吳之分也十五年再犯牽牛十六年至十七年又四犯南斗是謂臣干天祿且曰大人多死者又十五年七月金入太微十七年火入太微宮反臣之戒是歲月行四入太微十七年六入太微比歲凡十干之而齊君夷其宗室亦積忍酷甚也十五年四月癸亥熒惑入羽林十六年二月壬子太白入羽林占曰天下兵起三月己卯四月丙午五月甲戌十月辛卯月行皆入羽林十七年四月壬寅八月辛卯十二月辛巳又如之先是陽平王頤統十二將軍騎士七萬北討蠕蠕是歲八月上勒兵, WYG: ''}
