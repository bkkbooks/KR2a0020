  - {type: variant, offset: 1566, length: 182, content: 定沔漢諸郡時江南偽立雍州於襄陽以總牧西土遺黎故與東井同候十八年四月甲寅熒惑入軒轅后妃之戒也是時左昭儀得幸方譖訴馮后上蠱而惑之故天若言曰夫膚受之微不可不察亦自我天視而降鑒焉至十九年三月月犯軒轅二十年七月辛巳又掩填星是月馮后竟廢尋以憂死而立左昭儀是為幽后明年追廢林貞后為庶人二十二年正月月又掩軒轅十一月又彗星起軒轅歷鬼南及天漢天又若曰是固多穢德宜其彗除矣行歷鬼又強死之, WYG: 心檢覈信則}
