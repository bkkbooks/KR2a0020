  - {type: variant, offset: 11874, length: 320, content: 之謫也先是九月大丞相歡圍玉壁不克是月歡薨于晉陽辛亥侯景反僕射慕容紹宗擊之八月淮南三王謀反誅明年紹宗攻王思政于潁川竟溺四年九月月在翼暈軒轅太微帝坐五年二月暈昴畢參井五車五月在張又暈軒轅太微時兵革屢動東西帝皆比歲大赦七年九月戊午月掩歲星在斗斗為天廟帝王壽命之期月由之以干歲星是為大人有篡殺死亡之禍是歲梁武帝以憂逼殂明年而齊帝後年西主文帝及梁簡文又終天下皆有大故而江表尤甚八年三月甲午歲鎮太白在虛虛齊分是為驚立絕行改立王公熒惑又從而入之四星聚焉五月丙寅帝禪位于齊是歲西主大統十六年也是時兩主立而東帝得全魏之墟於天官為正昔宋武北伐四星聚奎及西伐秦四星聚井四星聚參而勃海始霸四星聚危而文宣受終由是言之帝王之業其有徵矣其後六年西帝禪于周室天文史失其傳也, WYG: 龍謹識}
