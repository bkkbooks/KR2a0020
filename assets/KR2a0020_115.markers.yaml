  - {type: variant, offset: 1749, length: 476, content: 明年幽后賜死也十九年六月壬寅熒惑出于端門占曰邦有大獄君子惡之又更紀立王之戒也明年皇太子恂坐不軌黜為庶人至二十一年十月壬午熒惑歲星合於端門之內歲為人君火主死喪之禮而陳于門庭大喪之象也二十二年二月乙丑木火合于掖門內是夕月行逮之三月丙午木火俱出掖門外再合一相犯月行逮之后妃預有咎焉明年四月宮車晏駕夫太微禮樂之庭也時帝方修禮儀正喪服以經人倫之化竟未就而崩少君嗣立其事復寢縉紳先生咸哀慟焉故天視奉而修之是以徘徊南宮蓋皇天有以著慎終歸厚之情或曰合于天庭南方有反臣之戒是時齊明帝殂比及三年而亂兵四交宮掖既而蕭衍戡之竟覆齊室云二十一年十一月有流星照地至天津而滅占曰將有樓船之攻人君以大衆行二十二年而上南伐是歲之正月有流星大如三斗瓶起貫索東北流光燭地經天棓乃滅有聲如雷天棓天子先驅也占曰國中貴人有死者且大赦至三月上南征不豫詔武衞元嵩詣洛陽賜皇后死世宗景明元年四月壬辰有大流星起軒轅左角東南流色黃赤破為三段狀如連珠相隨至翼左角后宗也占曰流星起軒轅女主後宮多讒死者翼為天庭之羽儀王室之蕃衞彭城國焉又占曰流星于翼貴人有憂繫是時彭城王忠賢且以懿親輔政借使世宗諒陰恭己而修成王之業, WYG: 信疑}
