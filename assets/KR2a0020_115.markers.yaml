  - {type: variant, offset: 2226, length: 333, content: 高祖之道庶幾興焉而阿倚母族納高肇之譖明年彭城王竟廢後數年高氏又鴆于后而以貴嬪代之由是小人道長讒亂之風作矣夫天之風戒肇于履端之始而沒身不悟以傷魏道豈不哀哉或曰軒轅主后土之養氣而庇祐下人也故左角謂之少人焉天象若曰人將喪其所以致養幾至流亡離析矣是歲北鎮及十七州大饉人多就食云是歲十二月癸未月暈太微既而有白氣長一丈許南抵七星俄而月復暈北斗大角為君以兵自衞又赦祥也且為立君之戒時蕭衍立少主於江陵改元大赦尋伐金陵以長圍逼之又二年正月月暈井參觜昴五車占曰貴人死大赦是歲廣陵王羽薨二月至秋再大赦二年正月己未金火俱在奎光芒相掩為兵喪為逆謀大人憂之野有破軍殺將奎徐方也三月丁巳有流星起五諸侯入五車至天潢散絕為三光明燭地五車所以輔衰替之君也流星自五諸侯干之諸侯且霸而修兵車之會分而為二距乏, WYG: 𫝊}
