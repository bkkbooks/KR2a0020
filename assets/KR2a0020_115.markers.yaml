  - {type: variant, offset: 1218, length: 319, content: 以制宮廟也熒惑天視填為司空聚而謀之其相宅之兆也且緯曰人君不失善政則火土相扶卜洛之業庶幾興矣是歲九月上罷擊齊始大議遷都冬十月詔司空穆亮將作董邇繕洛陽宮室明年而徙都之於是更服色殊徽號文物大備得南宮之應焉凡五星分野熒惑統朱鳥之宿而填以軒鼓寓之皆周鶉火之分室又并州之分是為步自并州而經始洛邑之祥也十七年二月丁丑太白犯井辛丑又犯鬼五月戊午晝見九月又如之是謂兵祥雍州也是月火木合于婁婁為徐州占曰其地有亂萬人不安八月辛巳熒惑入井占曰兵革起明年十二月詔征南將軍薛真度督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉藻出南鄭皆兩雍徐方之分後年正月平南王肅大敗齊師于義陽降者萬餘己亥上絕淮登八公山並淮而東及鍾離乃還至十九年六月庚申金木合于井七月火犯井, WYG: 刻}
