  - {type: variant, offset: 479, length: 152, content: 明敏鞫獄稱平太和四年薨諡曰莊子諧字仲和襲十九年薨詔曰朕宗室多故從弟諧喪逝悲痛摧割不能已已古者大臣之喪有三臨之禮此蓋三公已上至於卿司已下故應闕自漢已降多無此禮朕欲遵古典哀感從情雖以尊降伏私痛寧爽欲令諸王有期親者為之三臨大功之親者為之再臨小功緦麻為之一臨廣川王於朕大功必欲再臨再臨者欲於大殮之日親臨盡哀成服之, WYG: 尤雅直初與髙允同時被徵}
