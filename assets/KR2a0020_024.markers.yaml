  - {type: variant, offset: 146, length: 2, content: 鞭撻, krp: 髙陽公諡曰文子洛陽襲從征慕容寳為冠軍司馬後為祁令太宗追録謙功以洛陽為鴈門太守洛陽家田三生嘉禾皆異壟合穎世祖善之進爵北地公加鎮南將軍出為明壘鎮將居八年卒諡曰恭子寄生襲爵降為侯皇興元年卒洛陽弟安國中山太守安國弟安都廣甯滄水二郡太守加揚威將軍賜爵東光子天安初卒贈平逺將軍冀州刺史東光侯諡曰烈子白虎襲爵為侍御中散後以罪免官奪爵張衮字洪龍上谷沮陽人也祖翼遼東太守父卓昌黎太守衮初為郡五官掾純厚篤實好學有文才太祖為代王選為左長史從太祖征蠕蠕蠕蠕遁走追之五六百里諸部帥因衮言於太祖曰今賊逺糧盡不宜深入請速還軍太祖令衮問諸部帥若殺副馬足三日食否皆言足也太祖乃倍道追之及於廣漠赤地南床山下大破之既而太祖問衮卿曹外人知我前問三日糧意乎對曰皆莫知也太祖曰此易知耳蠕蠕奔走數日畜産之餘至水必留計其道程三日足及輕騎卒至出其不意彼必驚散其勢然矣衮以太祖言出告部帥咸曰聖䇿長逺非愚近所及也衮常參大謀决䇿幃幄太祖器之禮遇優厚衮每告人曰昔樂毅杖䇿於燕昭公逺委身於魏武蓋命世難可期千載不易遇主上天姿傑邁逸志凌霄必能囊括六合混一四海夫遭風雲之會不建騰躍之功者非人}
  - {type: variant, offset: 149, length: 6, content: 右頓辱衣冠多, WYG: 也遂䇿名委質竭誠伏事時劉顯地廣兵彊跨有朔裔㑹其兄弟乖離共相疑阻衮言於太祖曰顯志大意髙希冀非望乃有參天貳地籠罩宇宙之規吳}
