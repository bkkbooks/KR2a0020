  - {type: variant, offset: 1686, length: 0, content: '', WYG: 除懐荒鎮金城戍將陵弟延散騎常侍左將軍庫部尚書賜爵永寧侯延弟孫白澤年十一遭母憂居䘮以孝聞世祖聞而嘉之長而好學博通敏於當世髙宗初除中散遷殿中曹給事中甚見寵任參預幾密後蠕蠕犯塞顯祖引見羣臣議之尚書僕射元目辰進曰若車駕親行恐京師危懼不如持重固守自安虜懸軍深入糧無繼運以臣量之自退不久遣將追擊破之必矣白澤曰陛下欽明則天比蹤前聖而蠢爾荒愚輕犯王略寇乃顛沛於逺圖我將宴安於近毒仰惟神略則不然矣今若鑾輿親動賊必望麾崩散寧容仰挫神兵坐而縱敵萬乗之尊嬰城自守進失可乗之機退非無前之義惟陛下留神顯祖從之遂大破虜衆白澤本字鍾葵顯祖賜名白澤納其女為嬪出行雍州刺史清心少欲吏民安之顯祖詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以從坐論糾告得尚書已下罪狀者各隨所糾官輕重而}
  - {type: page-break, offset: 1686, content: '', id: KR2a0020_WYG_024-9a, image: WYG0261/WYG0261-0381a.png}
