  - {type: variant, offset: 1686, length: 0, content: '', krp: 除懐荒鎮金城戍將陵弟延散騎常侍左將軍庫部尚書賜爵永寧侯延弟孫白澤年十一遭母憂居䘮以孝聞世祖聞而嘉之長而好學博通敏於當世髙宗初除中散遷殿中曹給事中甚見寵任參預幾密後蠕蠕犯塞顯祖引見羣臣議之尚書僕射元目辰進曰若車駕親行恐京師危懼不如持重固守自安虜懸軍深入糧無繼運以臣量之自退不久遣將追擊破之必矣白澤曰陛下欽明則天比蹤前聖而蠢爾荒愚輕犯王略寇乃顛沛於逺圖我將宴安於近毒仰惟神略則不然矣今若鑾輿親動賊必望麾崩散寧容仰挫神兵坐而縱敵萬乗之尊嬰城自守進失可乗之機退非無前之義惟陛下留神顯祖從之遂大破虜衆白澤本字鍾葵顯祖賜名白澤納其女為嬪出行雍州刺史清心少欲吏民安之顯祖詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以從坐論糾告得尚書已下罪狀者各隨所糾官輕重而}
  - {type: variant, offset: 1687, length: 0, content: '', WYG: 之白澤上表諫曰伏見詔書禁尚書以下受禮者刑身糾之者代職伏惟三載考績黜陟幽明斯乃不易之令軌百王之通式今之都曹古之公卿也皆翊扶萬幾讚徽百揆風化藉此而平治道由兹而穆且周之下士尚有代耕况皇朝貴仕而服勤無報豈所謂祖襲堯舜憲章文武者乎羊酒之罰若行不已臣恐姦人闚望忠臣懈節而欲使事静民安治清務簡至於委任責成下民難辯如臣愚量請依律令舊法稽同前典班禄酬廉首去亂羣常刑無赦茍能如此則升平之軌朞月可望刑措之風三年必致矣顯祖納之太和初懐州民伊祁茍初三十餘人謀反將殺刺史文明太后欲盡誅一城之民白澤諫曰臣聞上天愛物之生明王重民之命故殺一人而取天下仁者不為且周書父子兄弟罪不相及今羣凶肆虐轘裂誅盡合城無辜奈何極辟不誣十室而况一州或有忠焉或有仁者若淫刑濫及殺忠與仁斯乃西伯所以歎息於九侯孔子所以回輪於河上伏惟聖徳昭明殷鑒水鏡前禮止迅烈之怒抑雷霆之威則溥天知幸矣昔厲防民口卒滅宗姬文聴輿頌終摧彊楚願不以人廢言留神省察太后從之轉散騎常侍遷殿中尚書太和五年卒詔賜帛一千疋粟三千石遣侍御史營護䘮事册贈鎮南將軍相州刺史廣平公諡曰簡長子倫字天念年十餘嵗入侍左右稍遷護軍長史員外常侍轉大司農少卿燕州大中正熙平中蠕蠕主醜奴遣使來朝抗敵國之書不修臣敬朝議將依漢荅匈奴故事遣使報之倫表曰臣聞古之聖王疆理物土辨章要甸荒遐之俗政所不及故禮有壹見之文書著羈縻之事太祖以神武之姿聖明之略經略帝圖日有不暇遂令豎子遊魂一方亦由中國多虞急諸華而緩夷狄也髙祖光宅土中業隆卜世赫雷霆之威振熊羆之旅方役南轅未遑北伐昔舊京烽起虜使在郊主上按劒璽書不出世宗運籌帷幄開境揚旌衣裳所及舟車萬里于時醜類欵關上亦述尊遺志今大明臨朝澤及行葦國富兵彊能言率職何憚而為之何求而行此往日蕭衍通敬求和以誠肅未純抑而不許先帝棄戎於前陛下交夷於後無乃上乖髙祖之心下違世宗之意且虜雖慕徳亦來觀我懼之以彊倘即歸附示之以弱窺覦或起春秋所謂以我卜也又小人難近夷狄無親疎之則怨狎之則侮其所由來久矣是以髙祖世宗知其若此來既莫逆去又不追不一之義於是乎在必其委贄玉帛之辰屈膝蕃方之禮則可豐其勞賄籍以珍物至於王人逺役銜命虜庭優以匹敵之尊加之相望之寵恐徒生虜慢無益聖朝假令選衆而舉使乎稱職資酈生之辯騁終軍之辭憑軾下齊長纓繫越茍異曩時猶為不願而况極之以隆崇申之以宴好臣雖下愚輙敢固執若事不獲已應頒制詔示其上下之儀宰臣致書諷以歸順之道若聴受忠誨明我話言則萬乘之盛不失位於域中天子之聲必籠罩於無外脱或未從焉能損益徐舞干戚以招之敷文徳而懐逺如迷心不已或肆犬羊則當命辛李之將勒衛霍之師蕩定雲沙埽清逋孽飲馬瀚海之濵鏤石燕然之上開都護置戊巳斯亦陛下之髙功不世之盛事如思按甲養民務農安邊之術經國之防豈可以戎夷兼并而遽虧典制將取笑於當時貽醜於來葉昔文公請隧襄后有言荆莊問鼎王孫是抑以古方今竊為陛下不取又陛下方欲禮神岷瀆致禮衡山登稽嶺窺蒼梧而反與夷虜之君酋渠之長結昆弟之忻抗分庭之義將何以瞰文命之遐景迹重華之髙風者哉臣以為報使甚失如彼不報甚得如此願留須臾之聴察愚臣之言不從出為後將軍肆州刺史還朝除燕州大中正孝莊初退太常少卿不拜轉大司農卿卒官倫弟恩奉朝請員外郎白澤弟庫瀛州刺史宜陽侯庫長子蘭累遷龍驤將軍行光州事蘭弟修虎都牧駕部二曹給事中上谷公司農少卿奉使柔𤣥察民疾苦遷平北將軍燕州刺史度弟太平西將軍荆州刺史俎陽侯大弟那寧逺將軍雍城鎮將崔𤣥伯清河東武城人也名犯髙祖廟諱魏司空林六世孫也祖悦仕石虎官至司徒左長史關内侯父潛仕慕容暐為黄門侍郎竝有才學之稱𤣥伯少有雋才號曰冀州神童苻融牧冀州虚心禮敬拜陽平公侍郎領冀州從事管征東記室出總庶事入為賔友衆務修理處斷無滯苻堅聞而竒之徵為太子舍人辭以母疾不就左遷著作佐郎苻丕牧冀州為征東功曹太原郝軒世名知人稱𤣥伯有王佐之才近代所未有也堅亡避難於齊魯之間為丁零翟釗及司馬昌明叛將張願所留縶郝軒歎曰斯人而遇斯時不因扶摇之勢而與鷃雀飛沉豈不惜哉慕容垂以為吏部郎尚書左丞髙陽内史所歴著稱立身雅正與世不羣雖在兵亂猶勵志篤學不以資産為意妻子不免飢寒太祖征慕容寳次於常山𤣥伯棄郡東走海濵太祖素聞其名遣騎追求執送於軍門引見與語恱之以為黄門侍郎與張衮對總機要草創制度時司馬徳宗遣使來朝太祖將報之詔有司博議國號𤣥伯議曰三皇五帝之立號也或因所生之土或即封國之名故虞夏商周始皆諸侯及聖徳既隆萬國宗戴稱號隨本不復更立唯商人屢徙改號曰殷然猶兼行不廢始基之稱故詩云殷商之旅又云天命𤣥鳥降而生商宅殷土茫茫此其義也昔漢髙祖以漢王定三秦滅彊楚故遂以漢為號國家雖統北方廣漠之土逮于陛下應運龍飛雖曰舊邦受命惟新是以登極之初改代曰魏又慕容永亦奉進魏土夫魏者大名神州之上國斯乃革命之徵驗利見之𤣥符也臣愚以為宜號為魏太祖從之於是四方賔王之貢咸稱大魏矣太祖幸鄴歴問故事於𤣥伯應對若流太祖善之及車駕還京師次於恒嶺太祖親登山頂撫慰新民適遇𤣥伯扶老母登嶺太祖嘉之賜以牛米因詔諸徙人不能自進者給以車牛遷吏部尚書命有司制官爵撰朝儀協音樂定律令申科禁𤣥伯總而裁之以為永式及置八部大夫以擬八坐𤣥伯通署三十六曹如令僕統事深為太祖所任勢傾朝廷而儉約自居不營産業家徒四壁出無車乗朝晡步上母年七十供養無重膳太祖嘗使人密察聞而益重之厚加饋賜時人亦或譏其過約而𤣥伯為之踰甚太祖常引問古今舊事王者制度治世之則𤣥伯陳古人制作之體及明君賢臣往代廢興之由甚合上意未嘗謇諤忤㫖亦不諂諛茍容及太祖季年大臣多犯威怒𤣥伯獨無譴者由於此也太祖曾引𤣥伯講漢書至婁敬說漢祖欲以魯元公主妻匈奴善之嗟歎者良久是以諸公主皆釐降于賔附之國朝臣子弟雖名族美彦不得尚焉尚書職罷賜𤣥伯爵白馬侯加周兵將軍與舊功臣庾岳奚斤等同班而信寵過之太祖崩太宗未即位清河王紹聞人心不安大出財帛班賜朝士𤣥伯獨不受太宗即位命𤣥伯居門下虚已訪問以不受紹財帛特賜帛二百匹長孫嵩已下咸愧焉詔遣使者廵行郡國糾察守宰不如法者令𤣥伯與宜都公穆觀等按之太宗稱其平當又詔𤣥伯與長孫嵩等坐朝堂决刑獄太宗以郡國豪右大為民蠧乃優詔徵之民多戀本而長吏逼遣於是輕薄少年因相扇動所在聚結西河建興盗賊竝起守宰討之不能禁太宗乃引𤣥伯及北新侯安同夀光侯叔孫建元城侯元屈等問曰前以兇俠亂民故徵之京師而守宰失於綏撫令有逃竄今犯者已多不可悉誅朕欲大赦以紓之卿等以為何如屈對曰民逃不罪而反赦之似若有求於下不如先誅首惡赦其黨類𤣥伯曰王者治天下以安民為本何能顧小曲直也譬琴瑟不調必改而更張法度不平亦須蕩而更制夫赦雖非正道而可以權行自秦漢以來莫不相踵屈言先誅後赦會於不能兩去孰與一行便定若其赦而不改者誅之不晚太宗從之神瑞初詔元伯與南平公嵩等坐止車門右聴理萬幾事并州胡數萬家南掠河内遣將軍公孫表等率師討之敗績太宗問羣臣曰胡冦縱暴人衆不少表等已不能制若不早誅則良民大受其禍今既盛秋不可為此小盗而復興衆以廢民業將若之何𤣥伯對曰表等諸軍不為不足但失於處分故使小盗假息耳胡衆雖盛而無猛健主將所謂千奴共一膽也宜得大將軍為胡所服信者將數百騎就攝表軍以討之賊聞之必望風震怖夀光侯建前在并州號為威猛胡醜畏服諸將莫及太宗從之遂平胡冦尋拜天部大人進爵為公泰常三年夏𤣥伯病篤太宗遣侍中宜都公穆觀就受遺言更遣侍臣問疾一夜數返及卒下詔痛惜贈司空諡文貞公䘮禮一依安城王叔孫俊故事詔羣臣及附國渠帥皆㑹葬自親王以外盡令拜送太和中髙祖追録先朝功臣以𤣥伯配饗廟庭𤣥伯自非朝廷文誥四方書檄初不染翰故世無遺文尤善草𨽻行押之書為世摹楷𤣥伯祖恱與范陽盧諶竝以博藝著名諶法鍾繇恱法衛瓘而俱習索靖之草皆盡其妙諶𫝊子偃偃𫝊子邈悦𫝊子潛潛𫝊𤣥伯世不替業故魏初重崔盧之書又𤣥伯之行押特盡精巧而不見遺迹子浩襲爵别有𫝊次子簡字沖亮一名覽好學少以善書知名太祖初歴位中書侍郎征虜將軍爵五等侯參著作事卒簡弟恬字叔元小名白歴給事中賜爵繹幕子出為上黨太守平南將軍豫州刺史進爵陽武侯坐浩伏誅始𤣥伯因苻堅亂欲避地江南於泰山為張願所獲本圖不遂乃作詩以自傷而不行於時蓋懼罪也及浩誅中書侍郎髙允受𠡠收浩家始見此詩允知其意允孫綽録於允集始元伯父潛為兄渾誅手筆草本延昌初著作佐郎王遵業買書於市而遇得之計誅至今將二百載寶其書迹深藏祕之武定中遵業子松年以遺黄門郎崔季舒人多摹搨之左光禄大夫姚元標以工書知名於時見潛書謂為過於已也元伯弟徽字元猷少有文才與渤海髙演俱知名初徵相州别駕中書侍郎稍遷祕書監賜爵貝邱侯加龍驤將軍樂安王範鎮長安世祖以範年少而三秦民夷恃險多變乃選忠清舊徳之士與範俱鎮以徽為散騎常侍督雍涇梁秦四州諸軍事平西將軍副將行樂安王傅進爵濟南公徽為政務存大體不親小事性好人倫引接賔客或談及平生或講論道義誨誘後進終日不止以疾徵還京師真君四年卒諡曰元公士類無不歎惜時清河崔寛字景仁祖彤隨晉南陽王保避地隴右遂仕於沮渠李暠父剖字伯宗每慷慨有懐東土常歎曰風雨如晦鷄鳴不已吾所庶幾及世祖西廵剖乃總率同義使寛送欵世祖嘉之拜寛威逺將軍岐陽令賜爵沂水男遣使與寛俱西撫慰初附徵剖詣京師未至病卒髙宗以剖誠著先朝贈散騎常侍鎮西將軍凉州刺史武陵公諡曰元寛還京拜散騎侍郎寧朔將軍安國子未幾出為𢎞農太守初寛之通欵也見司徒浩浩與相齒次厚存撫之及浩誅以逺來疎族獨得不坐遂家于武城居司空林舊墟以一子繼浩弟覽妻封氏相奉如親寛後襲爵武陵公鎮西將軍拜陜城鎮西將崤地嶮民多寇刧寛性滑稽誘接豪右宿盗魁帥與相交結傾衿待遇不逆微細是以能得民庶忻心莫不感其意氣時官無禄力唯取給於民寛善撫納招致禮遺大有受取而與之者無恨又𢎞農出漆蠟竹木之饒路與南通販貿來往家産豐富而百姓樂之諸鎮之中號為能政及解鎮還京民多追戀詣闕上章者三百餘人書奏髙祖嘉之延興二年卒年六十三遺命薄𦵏斂以時服長子衡字伯玉少以孝行著稱學崔浩書頗亦類焉天安元年擢為内祕書中散班下詔命及御所覽書多其迹也衡舉李冲李元愷程駿等終為名器世以是稱之承明元年遷内都坐令善折獄髙祖嘉之太和二年襲爵武陵公鎮西將軍遷給事中車駕廵狩以衡為大都督長史衡涉獵書史陳備禦之方便國利民之䇿凡五十餘條以本將軍除秦州刺史徙爵齊郡公先是河東年饑刧盗大起衡至脩龔遂之法勸課農桑周年之間冦盗止息十二年卒年五十四贈散騎常侍左光禄大夫本將軍冀州刺史帛一千匹糓一千斛諡曰惠公衡有五子長子敞字公世襲爵例降為侯自謁者僕射出為平原相敞性狷急與刺史楊椿迭相表列敞坐免官世宗初為鉅鹿太守弟朏之逆敞為黄木軍主韓文殊所藏其家悉見籍沒唯敞妻李氏以公主之甥自隨奴婢田宅二百餘口得免正光中普釋禁錮敞復爵齊郡侯拜龍驤將軍中散大夫孝昌中趙郡太守卒敞弟鍾字公禄奉朝請弟朏之逆以出後被原歴尚書郎國子博士司徒右長史征北將軍金紫光禄大夫冀州大中正敞亡後鍾貪其財物誣敞息子積等三人非兄之㣧辭訴累嵗人士嫉之尒朱世隆為尚書令奏除其官終身不齒朏好學有文才歴治書侍御史京兆王愉録事參軍與愉同逆伏法衡弟恕尚書郎又有崔模字思範魏中尉崔琰兄霸後也父遵慕容垂少府卿叔父整廣川太守模慕容熙末南渡河外為劉裕滎陽太守戍虎牢神䴥中平滑臺模歸降後賜爵武陵男加寧逺將軍始模在南妻張氏有二子冲智季柔模至京師賜妻金氏生子㓜度冲智等以父隔逺乃聚貨物閒託開境規贖模歸其母張氏每謂之曰汝父性懐本自無決必不能來也行人遂以財賄至都當竊模還模果顧念㓜度等指㓜度謂行人曰吾何忍捨此輩令坐致刑辱當為爾取一人使名位不減於我乃授以申謨謨劉義隆東郡太守與朱脩之守滑臺神䴥中被執入國俱得賜妻生子靈度申謨聞此乃棄妻子走還江外靈度刑為閹人模長者篤厚不營榮利頗為崔浩輕侮而守志確然不為浩屈與崔頤相親往來如家和平中卒皇興初㓜度隨慕容白曜為將時季柔為崔道固長史帶濟南太守城將降先馳馬赴白曜軍㓜度亦豫令左右覘迎之而差互不相值為亂兵所害初真君末車駕南克鄒山模兄協子邪利為劉義隆魯郡太守以郡降賜爵臨淄子拜廣甯太守卒於郡邪利二子懐順以父入國故不出仕及國家克青州懐順迎邪利䘮還𦵏青州次恩累政州主簿至刺史陸龍成時謀叛聚城北髙栁村將攻州城龍成討斬之懐順與冲智子徽伯等俱奔江外始邪利與二女俱入國一女為張氏婦一女為劉休賔妻生子文華邪利後生庶子法始邪利亡後二女侮法始庶孽常欲令文華襲外祖爵臨淄子法始恨忿無所不為後懐順歸化迎䘮始與法始相見未幾法始得襲爵𫝊至孫延族正光中為冠軍將軍中散大夫季柔孫睦正光三年自郁州歸降模孫景茂冀州别駕青州長史隨郡太守武城男景茂子彦逺襲武定中北徐州司馬始睦來降也與髙陵張炅郭緼俱至陵蕭寳夤西討開府西閣祭酒寳夤反陵其黄門侍郎關中平還洛歴尚書郎定州别駕齊文襄王作相以陵頗有文學引參賔客終於征南將軍司空長史贈驃騎大將軍大司農卿顯祖時有崔道固字季堅琰八世孫也祖瓊慕容垂車騎屬父輯南徙青州為泰山太守道固賤出適母兄攸之目連等輕侮之輯謂攸之曰此兒姿識如此或能興人門戸汝等何以輕之攸之等遇之彌薄略無兄弟之禮時劉義隆子駿為徐兖二州刺史得辟他州民為從事輯乃資給道固令其南仕既至彭城駿以為從事道固美形容善舉止便弓馬好武事駿稍嘉之㑹青州刺史新除過彭城駿謂之曰崔道固人身如此豈可為寒士至老乎而世人以其偏庶便相陵侮可為歎息青州刺史至州辟為主簿轉治中後為義隆諸子參軍事被遣向青州募人長史已下皆詣道固道固諸兄等遍道固所生母自致酒炙於客前道固驚起接取謂客曰家無人力老親自執劬勞諸客皆知其兄弟所作咸起拜謝其母母謂道固曰我賤不足以報貴賔汝宜答拜諸客皆歎美道固母子賤其諸兄後為寧朔將軍冀州刺史移鎮歴城劉彧既殺子業自立徐州刺史薛安都與道固等舉兵推立子業弟子勛子勛敗乃遣表歸誠顯祖以為安南將軍南冀州刺史清河公劉彧遣說道固以為前將軍徐州刺史復叛受彧命皇興初顯祖詔征南大將軍慕容白曜固築長圍以守之及白曜攻其城東郭道固面縛請罪表曰臣資生南境限隔大化本朝不以卑末委授藩任而劉氏蕭牆内侮懼貽大戮前遣崔啟之奉表歸誠幸蒙陛下過垂矜納并賜爵寵慶佩罔極應奔闕庭但劉彧尋續遣使恕臣百死愚以世奉劉氏深愆蒙宥若猶違背則是不忠於本朝而欲求忠於大魏雖曰希生懼大魏之所不許是用迷回孤負天日冐萬死之艱固執拒守僕臣白曜振曜威靈漸經二載大將臨城以今月十四日臣東郭失守於臣欵彧之誠庶可以彰於大魏矣臣勢窮力屈以十七日面縛請罪白曜奉宣皇恩恕臣生命斯實陛下起臣死尸肉臣枯骨天地造物所不能行而陛下育之雖虞舜之格有苗姬文之宥崇壘方之聖澤未足以喻既未奉朝㫖無由親馳道路謹遣大息景徽束骸歸闕伏聴刑斧既而白曜送道固赴都有司案劾奏聞詔恕其死乃徙青齊士望共道固守城者數百家於桑乾立平齊郡於平城西北北新城以道固為太守賜爵臨淄子加寧朔將軍尋徙治京城西南二百餘里舊隂館之西是時頻嵗不登郡内飢敝道固雖在任積年撫慰未能周盡是以多有怨叛延興中卒年五十初道固之在客邸與薛安都畢衆敬鄰館時以朝集相見本既同由武達頗結寮舊時安都志已衰朽於道固情乃疎略而衆敬每盡殷勤道固謂劉休賔房法夀曰古人云非我族類其心必異信不虚也安都視人殊自蕭索畢捺固依依也子景徽字文叡襲父爵臨淄子加寧朔將軍出為青州廣陵王羽征東府司馬大鴻臚少卿出除龍驤將軍平州刺史卒贈本將軍南青州刺史諡曰定子休纂襲爵景徽弟景業字文季别有功太和中賜爵昌國子加建威將軍卒子休緒襲爵員外郎景業弟景淵亦有别功贈爵武城男鷹揚將軍平齊太守卒於郡道固兄目連子僧祐白曜之圍歴城也僧祐母明氏弟僧淵竝在城内劉彧授僧祐輔國將軍領衆數千與青齊人家口在歴城梁鄒者明同慶明菩薩等為將佐從淮海揚聲救援將至不其聞道固已敗母弟入國徘徊不進白曜圍東陽時表請景徽往喻僧祐乃歸降白曜送之在客數載賜爵層城侯與房法夀畢薩諸人皆不穆法夀等訟其歸國無誠拘之嵗餘因赦乃釋後坐與沙門法秀謀反伏法子道寧給事中僧淵入國坐兄弟徙於薄骨律鎮太和初得還髙祖聞其有文學又問佛經善談論勅以白衣賜褠幘入聴于永樂經武殿後以僧淵為尚書儀曹郎遷洛之後為青州中正尋出為征東大將軍廣陵王羽諮議參軍加顯武將軍討海戒於黄郭大破之蕭鸞乃遣其族兄惠景遺僧淵書説以入國之屈規令改圖僧淵復書曰主上之為人也無幽不照無細不存仁則無逺不及博則無典不究殫三墳之微盡九邱之極至於文章錯綜煥然蔚炳猶夫子之牆矣遂乃開獨悟之明尋先王之迹安遷靈荒兆變帝基惟新中壤宅臨伊域三光起重輝之照庶物蒙再化之始分氏定族料甲乙之科班官命爵清九流之貫禮俗之敘粲然復興河洛之間重隆周道巷歌邑頌朝熙門穆濟濟之盛非可備陳矣加以累葉重光地兼四岳士馬彊富人神欣仰道徳仁義民不能名且大人出本無所在况從上聖至天子天孫者乎聖上諸弟風度相類咸陽王已下莫不英越枝葉扶疎遍在天下所稱稍蝎殊為未然文士競謀於廟堂武夫效通於疆場若論事勢此為實矣計彼主簒殺之迹人鬼同知疑親猜貴早暴遐邇兄投心逆節千載何名物患無施器非時用生不振世沒無令聲先師以為鄙君子以為恥此則事困伎殫自勉無益故其宜矣以兄之才夙超鄉士如弟之徒誰不瞻仰每尋昔念未敢忘懐雖復途遥二千心想若對敬遵軌範以資一生今名可揚矣而不能顯親事可變矣而不能離辱故世之所未解也且君子在家也不過孝於其親入朝也不過忠於其君主上之於兄恩則不可酬義則不可背身可殺也故非其酬功不逮也故非其報今可以效矣而又弗為非孝也即實而言兄之不變得為忠乎至於講武争彊不敵者久矣論安與危不同者驗矣羣情背去獨留者謬矣願深察之王晏道絶外交器非雄朗専華保望便就屠割方之於兄其全百倍且淮蕃海捍本出北豪夀春之任兄何由免以是而言猜嫌已决又宗門未幾南北莫寄先構之重非兄何託受社之榮鄙心之相望矣今執志不寤忠孝兩忘王晏之辜安能自保見機而作其在兹乎國家西至長安東盡即墨營造器甲必盡堅精晝夜不息者於兹數載今秋中月雲羅必舉賈不及時雖貴不用若不早圖况枉連城矣枚乗有言欲出不出間不容髪精哉斯談弟中於北京身罹事譴大造之及有獲為幸比蒙清舉起崖疑非一犬馬之心誠有在矣雖復彼此為異猶昔情不移也况於今日哉如兄之誨如弟之規改張易調易於反掌萬一乖情此將運也出除龍驤將軍南青州刺史久之坐擅出師無據檢覈幽禁後乃獲免僧淵元妻房氏生二子伯驎伯驥後薄房氏更納平原杜氏僧淵之徙也與杜俱去生四子伯鳳祖龍祖螭祖虬得還之後棄絶房氏遂與杜氏及四子家於青州伯驥與母房氏居于冀州雖往來父閒而心存母氏孝慈之道頓阻一門僧淵卒年七十餘伯驎雖往奔赴不敢入家哭沙門寺伯驎自奉朝請稍遷步兵校尉樂陵太守加中堅將軍後兼冀州長史大乗賊起伯驎率州軍討之於煮棗城為賊所殺贈龍驤将軍洛州刺史伯驥為京兆王愉法曹參軍愉反伯驥不從見害詔贈東海太守伯鳳少便弓馬壯勇有膂力自奉朝請員外郎稍遷鎮逺將軍前將軍數為將帥永安末與都督源子恭守單父戰殁祖龍司空行參軍性剛躁父亡後與兄伯驎訟競嫡庶竝以刀劒自衛若怨讎焉祖螭小字社客麤武有氣力刺史元羅板為兼統軍率衆討海賊普泰初與張僧皓俱反圍青州爾朱仲逺遣將討平之𫝊首京師祖虬少而好學下帷誦書不驅競當世舉秀才不就僧淵從弟和平昌太守家巨富而性吝嗇埋錢數百斛其母李春思堇惜錢不買子軌字啟則盗錢百萬背和亡走後為儀同開府鎧曹參軍坐貪汙死於晉陽元伯同郡董謐謐父京與同郡崔康時廣陽霍原等俱以碩學播名遼海謐好學𫝊父業中山平入朝拜儀曹郎撰朝覲饗宴郊廟社稷之儀鄧淵字彦海安定人也祖羌苻堅車騎將軍父翼河間相慕容垂之圍鄴以翼為後將軍冀州刺史真定侯翼泣對使者曰先君忠于秦室翼豈可先叛乎忠臣不事二主自古通義未敢聞命垂遣使喻之曰吾與車騎結異姓兄弟卿亦猶吾之子弟安得辭乎翼曰冀州宜任親賢翼請他役效命垂乃用為建武將軍河間太守尚書左丞皆有聲稱卒於趙郡内史淵性貞素言行可復博覽經書長於易筮太祖定中原擢為著作郎出為蒲丘令誅剪姦猾盗賊肅清入為尚書吏部郎淵明解制度多識舊事與尚書崔元伯參定朝儀律令音樂及軍國文記詔䇿多淵所為從征平陽以功賜爵漢昌子改下博子加中壘將軍太祖詔淵撰國記淵造十餘卷惟次年月起居行事而已未有體例淵謹於朝事未嘗忤㫖其從父弟暉為尚書郎兇俠好竒與定陵侯和跋厚善跋有罪誅其子弟奔長安或告暉將送出之由是太祖疑淵知情遂賜淵死既而恨之時人咸愍惜焉子頴襲爵為太學生稍遷中書侍郎世祖詔太常崔浩集諸文學撰述國書頴與浩弟覽等俱參著作事駕幸漠南髙車莫弗庫若干率騎數萬餘驅鹿百餘萬詣行在所詔潁為文銘于漠南以紀功徳兼散騎常侍使於劉義隆進爵為侯加龍驤將軍延和三年從征胡賊白龍還卒於路諡曰文恭子怡襲爵官至荆州刺史假寧南將軍賜爵南陽公和平中卒長子良奴襲爵良奴弟侍髙祖賜名述歴吏職以貞謹見稱遷中大夫守廷尉少卿出為建忠將軍齊州刺史初改置百官始重公府元佐時太傅元丕出為并州刺史以述為太傅長史帶太原太守尋徵為司空長史卒官詔賜錢十萬布五十匹諡曰貞長子纂奉朝請累遷中散大夫纂弟獻奉朝請司空西閤祭酒員外常侍河隂令尋遷鎮逺將軍諫議大夫肅宗末除冠軍將軍潁州刺史建義初聞尒朱榮入洛朝士見害遂奔蕭衍怡弟宗慶以中書學士入為中散稍遷尚書加散騎常侍賜爵定安侯轉典南部宗慶在南部積年多所敷奏州鎮憚之號為稱職進爵南陽公除安南將軍涇州刺史徙趙郡公宗慶在州為民所訟雖訊鞫獲情上下大不相得轉徐州刺史仍本將軍未幾坐妻韓巫蠱伏誅宗慶子伯忻與父俱死伯忻子儼逃越得免後歴尚書郎除常山太守轉安南將軍光禄大夫持節兼尚書左丞郢州行臺又加撫軍將軍卒贈鎮南將軍荆州刺史頴弟權從世祖征伐官至龍驤將軍豫州刺史賜爵新野侯從征蠕蠕坐法死弟顥卒於中書侍郎顥長子靈珍中學生祕書中散卒贈員外散騎常侍子羡歴中書學生侍御史以明謹見知出為青州武昌王征虜長史後李元護之為齊州仍為長史帶東魏郡太守在治十年經三刺史以清勤著稱齊人懐其恩徳號曰艮二千石及代還大受民故送遺頗以此為損中山王英攻義陽羡為軍司罷除諫議大夫兼給事黄門侍郎副侍中游肇為畿内大使後行貨於録尚書北海王詳轉大司農少卿出行荆州事轉征虜將軍郢州刺史鎮義陽在州銳於聚斂又納賄於于忠徵為給事黄門侍郎尋加後將軍河南尹黄門如故未拜而靈太后臨朝以元昭為河南尹羡仍黄門加平南將軍羡以義陽軍司之勲封安陽縣開國子邑三百戸羡曲附左右故獲封焉時幽瀛滄冀大水頻經宼難民飢詔羡兼尚書假散騎常侍持節詣州隨方賑恤多有所濟神龜初發疽卒年五十四詔賻帛三百匹朝服一襲贈鎮東將軍青州刺史諡曰恭長子躋字伯昇頗有意尚祕書郎朝議以羡本不合山河之賞故不許躋襲躋訴訟久之始聴紹封稍遷前将軍}
