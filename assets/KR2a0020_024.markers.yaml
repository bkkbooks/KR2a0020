  - {type: variant, offset: 142, length: 1, content: 定, WYG: 代王郎中令兼掌文記與燕鳳俱授獻明帝經從征衛辰以功賜僮𨽻三十戸昭成崩後謙徙長安苻堅從弟行唐公洛鎮和龍請謙之鎮未幾以繼母老辭還登國初遂歸太祖太祖悅以為右司馬與張衮等參贊初基慕容寳來宼也太祖使謙告難於姚興興遣將楊佛嵩率衆來援而佛嵩稽緩太祖命謙為書以遺佛嵩曰夫杖順以翦逆乗義而攻昧未有非其運而顯功無其時而著業慕容無道侵我疆場師老兵疲天亡期至是以遣使命軍必望克赴將軍據方邵之任總熊虎之師事與機㑹今其時也因此而舉役不再駕千載之勲一朝可立然後髙㑹雲中進師三魏舉觴稱夀不亦綽乎佛嵩乃倍道兼行太祖大悦賜謙爵關内侯重遣謙與佛嵩盟曰昔殷湯有鳴條之誓周武有河陽之盟所以藉神靈昭忠信夫親仁善鄰古之令軌歃血割牲以敦永穆今既盟之後言歸其好分災恤患休戚是同有違此盟神祇斯殛寳敗佛嵩乃還明年慕容垂復來寇太祖謂謙曰今事急矣非卿豈能復致姚師卿其行也謙未發而垂退乃止及聞垂死謙上書勸進太祖善之并州平以謙為陽曲護軍賜爵平舒侯安逺將軍皇始元年卒官時年六十三贈平東將軍左光禄大夫幽}
