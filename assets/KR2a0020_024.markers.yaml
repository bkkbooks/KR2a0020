  - {type: variant, offset: 701, length: 374, content: 高聰等議曰三臨之事乃自古禮爰及漢魏行之者稀陛下至聖慈仁方遵前軌志必哀喪慮同寧戚臣等以為若期親三臨大功宜再始喪之初哀之至極既以情降宜從始喪大殮之臨伏如聖旨詔曰魏晉已來親臨多闕至於戚臣必於東堂哭之頃大司馬安定王薨朕既臨之後復更受慰於東堂今日之事應更哭否光等議曰東堂之哭蓋以不臨之故今陛下躬親撫視羣臣從駕臣等參議以為不宜復哭詔曰若大司馬戚尊位重必哭於東堂而廣川既是諸王之子又年位尚幼卿等議之朕無異焉諧將大殮高祖素服深衣哭之入室哀慟撫尸而出有司奏廣川王妃薨於代京未審以新尊從於卑舊為宜卑舊來就新尊詔曰遷洛之人自茲厥後悉可歸骸邙嶺皆不得就塋代其有夫先葬在北婦今喪在南婦人從夫宜還代葬若欲移父就母亦得任之其有妻墳於代夫死於洛不得以尊就卑欲移母就父宜亦從之若異葬亦從之若不在葬限身在代喪葬之彼此皆得任之其戶屬燕身官京洛去留之宜亦從所擇其屬諸州者各得任意詔贈諧武衞, WYG: 通直散騎常侍建威}
