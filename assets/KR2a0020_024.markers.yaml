  - {type: variant, offset: 475, length: 0, content: '', WYG: 夏雖平九域未一西有不賔之羌南有逆命之虜岷蜀殊風遼海異教雖天挺明聖撥亂乗時而因幾撫㑹實須經略介焉易失功在人謀伏願恢崇叡道克廣徳心使揖讓與干戈竝陳文徳與武功俱運則太平之化康哉之美復隆於今不獨前世昔子囊將終寄言城郢荀偃辭唅遺恨在齊臣雖闇劣敢忘前志魂而有靈結草泉壤後數日卒年七十二後世祖追録舊勲遣大鴻臚即墓䇿贈太保諡曰文康公子温外}
