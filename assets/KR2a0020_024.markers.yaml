  - {type: variant, offset: 1112, length: 333, content: 官簡母沮渠牧犍女也簡性貌特類外祖後為內都大官高祖嘗與簡俱朝文明太后於皇信堂簡居帝之右行家人禮遷太保高祖仁孝以諸父零落存者唯簡每見立以待之俟坐致敬問起居停簡拜伏簡性好酒不能理公私之事妻常氏燕郡公常喜女也文明太后以賜簡性幹綜家事頗節斷簡酒乃至盜竊求乞婢侍卒不能禁二十三年薨時高祖不豫詔曰叔父薨背痛慕摧絕不自勝任但虛頓床枕未堪奉赴當力疾發哀諡曰靈王世宗時改諡曰順子祐字伯授襲母常氏高祖以納不以禮不許其為妃世宗以母從子貴詔特拜為齊國太妃祐位涇州刺史薨諡曰敬河間王若字叔儒年十六未封而薨追封河間諡曰孝詔京兆康王子太安為後太安於若為從弟非相後之義廢之以齊郡王子琛繼琛字曇寶幼而敏慧高祖愛之世宗時拜定州刺史琛妃世宗舅女高皇后妹琛憑恃內外多所受納貪惏之極及還朝靈太后詔曰琛在定州惟不, WYG: ''}
