  - {type: variant, offset: 5, length: 4, content: 文成五王, WYG: 四齊魏收撰}
  - {type: variant, offset: 5, length: 4, content: 文成五王, krp: 四齊魏收撰}
  - {type: variant, offset: 12, length: 1, content: 八, WYG: 十二燕鳳許謙張衮崔𤣥伯鄧淵燕鳳字子章代人也好學博綜經史明習隂陽纎緯昭成素聞其名使人以禮迎致之鳳不應聘乃命諸軍圍代城謂城人曰燕鳳不來吾將屠汝代人懼送鳳昭成與語大恱待以賔禮後拜代王左長史參决國事又以經授獻明帝苻堅遣使牛恬朝貢令鳳報之堅問鳳代主何如人鳳對曰寛和仁愛經略髙逺一時之雄主常有并吞天下之志堅曰卿輩北人無剛甲利器敵弱則進彊即退走}
