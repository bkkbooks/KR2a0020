  - {type: variant, offset: 14, length: 3, content: 樂王廣, WYG: 能并兼鳳曰北人壮悍上馬持三仗驅馳若飛主上雄雋率服北土控弦百萬號令若一軍無輜重樵爨之苦輕行速㨗因敵取資此南方所以疲敝而北方之所常勝也堅曰彼國人馬實為多少鳳曰控弦之士數十萬馬百萬匹堅曰卿言人衆可爾説馬太多是虚辭耳鳳曰雲中}
