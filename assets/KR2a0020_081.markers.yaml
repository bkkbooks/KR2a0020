  - {type: variant, offset: 1702, length: 244, content: 王青石世官江南荊州刺史廣陽王嘉慮其有異表請代之高祖詔侍臣各舉所知互有申薦者高祖曰此郡今當必爭之地須得堪濟之才何容汎舉也太子步兵張烈每論軍國之事時有會人意處朕欲用之何如彭城王勰稱贊之遂敕除陵江將軍順陽太守烈到郡二日便為寶卷將崔慧景攻圍七十餘日烈撫厲將士甚得軍人之和會車駕南討慧景遁走高祖親勞烈曰卿定可遂能不負所寄烈拜謝曰若不值鑾輿親駕臣將不免困於犬羊自是陛下不負臣非臣能不負陛下高祖善其對世宗即位追錄先勳封清河縣開國子邑二百戶尋以母老歸養積十餘年頻值凶儉烈為粥以食飢人蒙濟者甚衆鄉黨以此稱之, WYG: ''}
