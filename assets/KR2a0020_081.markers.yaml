  - {type: variant, offset: 2298, length: 4, content: 獲譏於世, WYG: 儁偉等更主大籍守舊而巳初無述著故自崔鴻死後迄終偉身二十許載時事蕩然萬不記一後人執筆無所憑據史之遺闕偉之由也外示沉厚内實矯競與綦儁少甚相得晚以名位之間遂若水火與宇文忠之之徒代人為黨時賢畏惡之而愛尚文史老而彌篤偉弟少亡偉撫寡訓孤同居二十餘載恩義甚篤不營産業身亡之後賣宅營葬妻子不免飄泊士友歎愍之長子昻襲爵劉仁之字山靜河南洛陽人其先代人徙于洛父爾頭在外戚傳仁之少有操尚粗涉書史眞草書迹頗號工便御史中尉元昭引為御史}
