  - {type: variant, offset: 1178, length: 220, content: 琇琇遂除安州刺史論者稱之營州城民就德興謀反除同度支尚書黃門如故持節使營州慰勞聽以便宜從事同頻遣使人皆為賊害乃遣賊家口三十人并免家奴為良齎書諭德興德興乃降安輯其民而還德興復反詔同以本將軍為幽州刺史兼尚書行臺慰勞之同慮德興難信勒衆而往為德興所擊大敗而還靈太后反政以同叉黨除名孝昌三年除左將軍太中大夫兼左丞為齊兗二州行臺節度大都督李叔仁闕莊帝踐祚詔復本秩除都官尚書復兼七兵以同前慰勞德興之功封章武縣開國伯邑四百戶正除七兵尋轉殿中加征南將軍普泰初除, WYG: 散騎常}
