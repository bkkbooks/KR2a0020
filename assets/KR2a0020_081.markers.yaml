  - {type: variant, offset: 2331, length: 3, content: 訴復業, WYG: 為著作郎兼中書令既非其才在史未嘗執筆出除衛將軍西兗州刺史在州有當時之譽武定二年卒贈衛大將軍吏部尚書青州刺史諡曰敬仁之外示長者内懐矯詐其對賔客破牀敝席麤飯冷菜衣服故敗乃過逼下善候當途能為詭激每於稠人廣衆之中或撾一姦吏或縱一孤貧大言自眩示巳髙明矜物無知淺識皆稱其美公能之譽動過其實性又酷虐在晉陽曾營城雉仁之統監作役以小稽緩遂杖前殷州刺史裴瑗并州刺史王綽齊獻武王大加譴責性好文字吏書失體便加鞕撻言韻微訛亦見捶楚吏民苦之而愛好文史敬重人流與齊帥馮元興交款元興死後積年仁之營視其家常出隆厚時人以此尚之宇文忠之河南洛陽人也其先南單于之逺屬世據東部後入居代都祖阿生安南將軍巴西公父侃卒於治書侍御史忠之獵涉文史頗有筆札釋褐太學博士天平初除中書侍郎裴伯茂與之同省常侮忽之以忠之色黒呼為黑宇後勅修國史元象初兼通直散騎常侍副鄭伯猷使蕭衍武定初為安南將軍尚書右丞仍修史未幾以事除名忠之好榮利自為中書郎六七年矣遇尚書省選右丞預選者皆射䇿忠之入試焉既獲丞職大為忻滿志氣囂然有驕物之色識者笑之既失官爵怏怏發病卒}
