  - {type: variant, offset: 213, length: 254, content: 奚康生徵民歲調皆七八十尺以邀奉公之譽部內患之同於歲祿官給長絹同乃舉按康生度外徵調書奏詔科康生之罪兼褒同在公之績肅宗世朝政稍衰人多竊冒軍功同閱吏部勳書因加檢覆覈得竊階者三百餘人同乃表言竊見吏部勳簿多皆改換乃校中兵奏按並復乖舛臣聊爾揀練已得三百餘人明知隱而未露者動有千數愚謂罪雖恩免猶須刊定請遣一都令史與令僕省事各一人總集吏部中兵二局勳簿對勾奏按若名級相應者即於黃素楷書大字具件階級數令本曹尚書以朱印印之明造兩通一關吏部一留兵局與奏按對掌進則防揩洗之偽退則無改易之理從前以來勳書上省唯列姓名不載本屬致令竊濫之徒輕, WYG: 儁莊帝時仕累遷}
