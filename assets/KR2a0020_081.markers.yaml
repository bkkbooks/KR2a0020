  - {type: variant, offset: 468, length: 583, content: 苟且今請征職白民具列本州郡縣三長之所其實官正職者亦列名貫別錄歷階仰本軍印記其上然後印縫各上所司統將都督並皆印記然後列上行臺行臺關太尉太尉檢練精實乃始關刺省重究括然後奏申奏出之日黃素朱印關付吏部頃來非但偷階冒名改換勳簿而已或一階再取或易名受級凡如此者其人不少良由吏部無簿防塞失方何者吏部加階之後簿不注記緣此之故易生僥倖自今階之後名簿具注加補日月尚書印記然後付曹郎中別作抄目印記一如尚書郎中自掌遞代相付此制一行差止姦罔詔從之同又奏曰臣頃奏以黃素為勳具注官名戶屬及吏部換勳之法事目三條已蒙旨許臣伏思黃素勳簿政可粗止姦偽然在軍虛詐猶未可盡請自今在軍閱簿之日行臺軍司監軍都督各明立文按處處記之斬首成一階已上即令給券一紙之上當中大書起行臺統軍位號勳人甲乙斬三賊及被傷成階已上亦具書於券各盡一行當行豎裂其券前後皆起年號日月破某處陳某官某勳印記為驗一支付勳人一支付行臺記至京即送門下別函守錄又自遷都以來戎車屢捷所以征勳轉多不可盡者良由歲久生姦積年長偽巧吏階緣偷增遂甚請自今為始諸有勳簿已經奏賞者即廣下遠近云某處勳判咸令知聞立格酬以三年為斷其職人及出身限內悉令銓除實官及外號隨才加授庶使酬勤者速申立功者勸事不經久僥倖易息或遭窮難州無中正者不在此限又勳簿之法征還之日即應申送頃來行臺督將至京始造或一年二歲方上勳書姦偽之原實自由此於今以後軍還之日便通勳簿不聽隔月詔復依行元叉之廢靈太后也相, WYG: 滄}
