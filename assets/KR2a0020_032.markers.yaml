  - {type: variant, offset: 6406, length: 0, content: '', WYG: 回族叔軌字廣度沉謹好學博通經𫝊與光祿大夫武邑孫恵蔚同志友善恵蔚每推軌曰封生之於經義非但章句可竒其標明綱格統括大歸吾所弗如者多矣善自修潔儀容甚偉或曰學士不事修飾此賢何獨如此軌聞笑曰君子整其衣冠尊其瞻視何必蓬頭垢面然後為賢言者慙退太和中拜著作佐郎稍遷尚書儀曹郎中兼員外散騎常侍銜命髙麗髙麗王雲恃其偏逺稱疾不親受詔軌正色詰之喻以大義雲乃北面受詔先是契丹虜掠邊民六十餘口又為髙麗擁掠東歸軌具聞其狀移書徵之雲悉資給遣還有司奏軌逺使絶域不辱朝命權宜曉慰邊民来蘇宜加爵賞世宗詔曰權宜徵口使人常體但光揚有稱宜賞一階轉考功郎中除本郡中正渤海太守崔休入為吏部郎以兄考事干軌軌曰法者天下之平不可以舊君故虧之也休歎其守正軌在臺中稱為儒雅奏請遣四門博士明經學者檢試諸州學生詔從之尋除國子博士加揚武將軍假通直散騎常侍慰勞汾州山胡司空清河王懌表修明堂辟雍詔百寮集議軌議曰明堂者布政之宫在國之陽所以嚴父配天聼朔設教其經構之式葢已尚矣故周官匠人職云夏后氏世室殷人重屋周人明堂五室九階四户八窻鄭𤣥曰或舉宗廟或舉王寢或舉明堂互之以見同制然則三代明堂其制一也案周與夏殷損益不同至於明堂因而弗革明五室之義得天數矣是以鄭元又曰五室者象五行也然則九階者法九土四户者逹四時八窻者通八風誠不易之大範有國之恒式若其上圓下方以則天地通水環宫以節觀省茅葢白盛為之質飾赤綴白綴為之户牖皆典籍所具載制度之明義也在秦之世焚滅五典毁黜三代變更先聖不依舊憲故呂氏月令見九室之義大戴之禮著十二堂之論漢承秦法亦未能改東西二京俱為九室是以黄圖白虎通蔡邕應劭等咸稱九室以象九州十二堂以象十二辰夫室以祭天堂以布政依天而祭故室不過五依時布政故堂不踰四州之與辰非所可法九與十二其用安在今聖朝欲尊道訓民備禮化物宜則五室以為永制至如廟學之嫌臺沼之雜袁凖之徒已論正矣遺論具在不復須載尋以本官行東郡太守遷前軍將軍行夏州事好立條教所在有績轉太子僕射遷廷尉少卿加征虜將軍卒贈右將軍濟州刺史初軌深為郭祚所知祚常謂子景尚曰封軌髙綽二人並幹國之才必應逺至吾平生不妄進舉而每薦此二公非直為國進賢亦為汝等將来之津梁也其見重如此軌既以方直自業髙綽亦以風概立名尚書令髙肇拜司徒綽送迎往来軌竟不詣綽顧不見軌乃遽歸曰吾一生自謂無愆規矩今日舉措不如封生逺矣軌以務徳慎言修身之本姦回讒佞世之巨害乃為務徳慎言逺佞防姦四戒文多不載軌長子偉伯字君良博學有才思弱冠除太學博士毎朝廷大議偉伯皆預焉雅為太保崔光僕射游肇所知賞太尉清河王懌辟參軍事懌親為孝經解詁命偉伯為難例九條皆發起隐漏偉伯又討論禮𫝊詩易疑事數十條儒者咸稱之尋將經始明堂廣集儒學議其制度九五之論久而不定偉伯乃搜撿經緯上明堂圖説六卷正光末尚書僕射蕭寳夤以為闗西行臺郎及寳夤為逆偉伯乃與南平王冏潛結闗中豪右韋子粲等謀舉義兵事發見殺年三十六時人惜之永安中追贈散騎常侍征虜將軍瀛州刺史聼一子出身偉伯無子轉授第三弟翼偉伯撰封氏本錄六卷并詩賦碑誄雜文數十篇偉伯弟業字君修奉朝請領殿中侍御史早卒業弟翼字君贊羙容貌腰帶十圍以兄偉伯立節之勲除給事中後加揚烈將軍武定初卒翼弟述字君義武定末廷尉少卿述弟詢字景文尚書起部郎}
