  - {type: variant, offset: 40, length: 208, content: 事太祖之居獨孤部崇常往來奉給時人無及者後劉顯之謀逆也平文皇帝外孫梁眷知之密遣崇告太祖眷謂崇曰顯若知之問汝者丈夫當死節雖刀劍別割勿泄也因以寵妻及所乘良馬付崇曰事覺吾當以此自明崇來告難太祖馳如賀蘭部顯果疑眷泄其謀將囚之崇乃唱言曰梁眷不顧恩義奬顯為逆今我掠得其妻馬足以雪忿顯聞而信之窟咄之難崇外甥于桓等謀執太祖以應之告崇曰今窟咄已立衆咸歸附富貴不可失願舅圖之崇乃夜告太祖太祖誅桓等北踰陰山復幸賀蘭部崇甚見寵待太祖為魏王拜崇, WYG: ''}
