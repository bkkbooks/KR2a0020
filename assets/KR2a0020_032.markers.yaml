  - {type: variant, offset: 6522, length: 0, content: '', WYG: 叡小名須拔當係叡弟但叡生三旬而孤未必有弟又叡於武定末為太子庶子而䐗兒於皇興中早為主仗令相隔數十年今以下文陽川縣開國公永樂推而上之似䐗兒乃永樂祖而拔其伯祖也永樂為神武從祖兄子是拔與䐗兒皆神武從父行䐗兒弟徽北齊書徽附見於其子平秦王歸彦傳中傳稱歸彦字仁英神武族弟也詔徽仍行河州事久無救援力屈城䧟為賊所害北齊書髙徽魏末坐事以解胡言為西域大使以功得河東守尋即死焉此傳云力屈城䧟為賊所害則北齊書所為死焉者死王事也眞弟各拔北齊書中各拔之}
  - {type: page-break, offset: 6522, content: '', id: KR2a0020_WYG_032-23b, image: WYG0261/WYG0261-0476b.png}
