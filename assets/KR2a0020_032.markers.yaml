  - {type: variant, offset: 1160, length: 0, content: '', WYG: 相滄瀛殷定六州諸軍事大將軍太師錄尚書事冀州刺史追封渤海王諡曰文穆妻韓氏為渤海王國太妃永熙中後贈假黄鉞侍中都督中外諸軍事加後部羽葆鼓吹餘如故長子即齊獻武王也王弟琛字永寳天平中驃騎大將軍開府儀同三司御史中尉南趙郡開國公子叡襲武定末太子庻子樹生弟飜字飛雀亦以器度知名卒於侍御中散元象中贈假黄鉞使持節侍中都督冀定洛瀛并肆燕恒雲朔十州諸軍事大將軍太傅太尉公錄尚書事冀州刺史諡曰孝宣子嶽武定末侍中太傅公清河郡開國公謐長兄真有志行兄弟俱至孝父亡治喪墓次甘露白雉降集焉有司以聞詔􅎎閭里自涇州别駕稍遷安定太守甚著聲績卒贈龍驤將軍涇州刺史帶金城太守神龜初卒太昌元年贈使持節侍中都督定}
