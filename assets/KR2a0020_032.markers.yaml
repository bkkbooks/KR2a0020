  - {type: variant, offset: 4905, length: 0, content: '', WYG: 安西將軍營州刺史安陵縣開國男䐗兒弟徽字榮顯小字茍兒聰敏有氣幹為任城王澄所知賞景明中起家奉朝請延昌中假員外散騎常侍使於嚈噠西域諸國莫不敬憚之破洛侯烏孫竝因之以獻名馬還拜冗從僕射神龜中遷射聲校尉左中郎將游擊將軍又假平西將軍員外散騎常侍使嚈噠還至枹䍐屬莫折念生反於秦隴時河州刺史元祚為前刺史梁釗息景進等招引念生攻河州祚以憂死長史元永平治中孟賔臺使元湛共推徽行河州事綏接有方兵士用命别駕乞伏世則潛通景進徽殺之徵兵於吐谷渾吐谷渾率衆救之景進敗退走奔秦州景進尋率羌夷復来攻逼徽遣統軍六景相馳表請師詔徽仍行河州事久無援救力屈城䧟為賊所害永熙中喪還洛陽贈使持節侍中都督冀定相瀛滄五州諸軍事}
