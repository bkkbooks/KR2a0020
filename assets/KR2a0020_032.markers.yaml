  - {type: variant, offset: 6166, length: 1, content: 郎, WYG: 後入代都名出懿子元之右俱坐司馬氏事死愷妻盧元姊也愷子伯逹棄母及妻李氏南奔河表改婚房氏顯祖末伯逹子休傑内入祖母盧猶存垂百嵗矣而李已死休傑髙祖時以歸國勲為河間太守兼冀州咸陽王府諮議參軍休傑從弟靈祐仕劉義隆為青州治中渤海太守慕容白曜平三齊靈祐率二百人詣白曜降賜爵下密子後除建威將軍渤海太守卒子進夀襲爵肅宗時為揚州治中以失義州為刺史元志所殺事具志𫝊}
