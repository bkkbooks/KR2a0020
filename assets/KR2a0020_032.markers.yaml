  - {type: variant, offset: 6523, length: 4, content: 不乏名位, WYG: 為齊襄樂王顯國則各拔乃神武從祖而顯國其從祖弟也各拔少子盛北齊書盛封廣平郡公與本書合但以世系考之則盛當為神武從叔而北齊書與北史俱稱為從叔祖子子瑗北齊書盛無子以兄子瑗嗣乃神武兄弟行也若以盛為從叔祖則舛矣封懿傳子孝琬一本無孝字北史}
