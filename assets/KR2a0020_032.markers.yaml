  - {type: variant, offset: 356, length: 239, content: 惜其功而祕之及有司奏諡太祖親覽諡法至述義不克曰丁太祖曰此當矣乃諡曰丁公初太祖避窟咄之難遣崇還察人心崇夜至民中留馬與從者乃微服入其營會有火光為舂妾所識賊皆驚起崇求從者不得因匿於坑中徐乃竊馬奔走宿於大澤有白狼向崇而號崇乃覺悟馳馬隨狼而走適去賊黨追者已至遂得免難太祖異之命崇立祀子孫世奉焉太和中追錄功臣以崇配饗崇長子遂留歷顯官討蠕蠕有功賜爵零陵侯後以罪廢子乙九內行長者以功賜爵富城公加建忠將軍遷散騎常侍內乘黃令侍中卒諡曰靜子真起家中散轉侍東宮尚長城公主拜駙馬都尉後敕離婚納文明太后姊尋, WYG: 時}
