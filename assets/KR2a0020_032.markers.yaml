  - {type: variant, offset: 5148, length: 2, content: 假寧, WYG: 湖弟恒字叔宗慕容垂鉅鹿太守太祖時率郡降賜爵涇縣侯加龍驤將軍仍守鉅鹿卒贈安}
  - {type: page-break, offset: 5148, content: '', id: KR2a0020_WYG_032-8a, image: WYG0261/WYG0261-0468a.png}
  - {type: variant, offset: 5148, length: 2, content: 假寧, krp: 湖弟恒字叔宗慕容垂鉅鹿太守太祖時率郡降賜爵涇縣侯加龍驤將軍仍守鉅鹿卒贈安}
  - {type: punctuation, offset: 5153, content: 、, id: KR2a0020_ZHSJ_032-bkkpn1110}
  - {type: variant, offset: 5153, length: 382, content: 濮陽公子常貴南陽太守伏真弟多侯歷位殿中給事左將軍賜爵長寧子遷司衞監高宗崩乙渾專權時司徒陸麗在代郡溫湯療病渾忌之遣多侯追麗多侯謂麗曰渾有無君之心大王衆所望也去必危宜徐歸而圖之麗不從遂為渾所害多侯亦見殺諡曰烈子胡兒襲爵觀弟翰平原鎮將西海王薨子龍仁襲爵降為公卒子豐國襲爵豐國弟子弼有風格善自位置涉獵經史與長孫稚陸希道等齊名於世矜己陵物頗以損焉高祖初定氏族欲以弼為國子助教弼辭曰先臣以來蒙恩累世比校徒流實用慚屈高祖曰朕欲敦厲冑子故屈卿光之白玉投泥豈能相污弼曰既遇明時沉泥滓會司州牧咸陽王禧入高祖謂禧曰朕與卿作州都舉一主簿即命弼謁之因為高祖所知輿駕南征特敕隨從世宗初除尚書郎以選為廣平王懷國郎中令數有匡諫之益世宗善之除中書舍人轉司州治中別駕歷任有稱肅宗時河州羌却鐵怱反敕兼黃門慰喻怱以功加前將軍賜以錢帛尋以本將軍行揚州事追拜平西將軍華州刺史卒於州時年五十一贈使持節征北將軍定, WYG: 幽}
