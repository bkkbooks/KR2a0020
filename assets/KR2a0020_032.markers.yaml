  - {type: variant, offset: 5961, length: 3, content: 陵侯卒, WYG: 戍戌將郗恢馳使乞師於常山王遵遵以聞太祖詔逞與張袞為遵書以荅初恢與遵書云賢兄虎歩中原太祖以言悖君臣之體勅逞袞亦貶其主號以報之逞袞乃云貴主太祖怒曰使汝貶其主以荅乃稱貴主何若賢兄也遂賜死後司馬徳宗荆州刺史司馬休之等數十人為桓元所逐皆將来奔至陳留南分為二軰一奔長安一歸廣固太祖初聞休之等降大悦後怪其不至詔兗州尋訪獲其從者問故皆曰國家威聲逺被是以休之等咸欲歸闕及聞崔逞被殺故奔二處太祖深悔之自是士人有過者多見優容逞七}
