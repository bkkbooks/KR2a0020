  - {type: variant, offset: 1587, length: 617, content: 徒崔浩尚書李順世祖謂壽曰蠕蠕吳提與牧犍連和今聞朕征涼州必來犯塞若伏兵漠南殄之為易朕故留壯兵肥馬使卿輔佐太子收田既訖便可分伏要害以待虜至引使深入然後擊之擒之必矣涼州路遠朕不得救卿若違朕指授為虜侵害朕還斬卿崔浩李順為證非虛言也壽頓首受詔壽信卜筮之言謂賊不來竟不設備而吳提果至侵及善無京師大駭壽不知所為欲築西郭門請恭宗避保南山惠太后不聽乃止遣司空長孫道生等擊走之世祖還以無大損傷故不追咎恭宗監國壽與崔浩等輔政人皆敬浩壽獨凌之又自恃位任以為人莫己及謂其子師曰但令吾兒及我亦足勝人不須苦教之遇諸父兄弟有如僕隸夫妻並坐共食而令諸父餕餘其自矜無禮如此為時人所鄙笑真君八年薨贈太尉諡曰文宣子平國襲爵尚城陽長公主拜駙馬都尉侍中中書監為太子四輔正平元年卒子伏干襲爵尚濟北公主拜駙馬都尉和平二年卒諡曰康無子伏干弟羆襲爵尚新平長公主拜駙馬都尉又除虎牢鎮將頻以不法致罪高祖以其勳德之冑讓而赦之轉征東將軍吐京鎮將羆賞善罰惡深自克勵時西河胡叛羆欲討之而離石都將郭洛頭拒違不從羆遂上表自劾以威不攝下請就刑戮高祖乃免洛頭官山胡劉什婆寇掠郡縣羆討滅之自是部內肅然莫不敬憚後改吐京鎮為汾州仍以羆為刺史前吐京太守劉升在郡甚有威惠限滿還都胡民八百餘人詣羆請之前定陽令吳平仁亦有恩信戶增數倍羆以吏民懷之並為表請高祖皆從焉羆既頻薦升等所部守令咸自砥礪威化大行百姓安之州民李軌郭及祖等七百餘人詣闕頌羆恩德高祖以羆政和民悅增秩延限後徵為光祿勳隨例降王為魏郡開國公邑五百戶又除鎮北將軍燕, WYG: 青}
