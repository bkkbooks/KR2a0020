  - {type: variant, offset: 6169, length: 165, content: 琳舉秀才為安戎令頗有吏幹隨長孫稚征蜀有功除尚書屯田郎中出帝即位以攝儀曹事封高唐縣開國男邑二百戶孝靜初鎮東將軍司州別駕以占奪民田免官爵久之阿至羅國主副羅越居為蠕蠕所破其子去賓來奔齊獻武王奏去賓為安北將軍肆州刺史封高車王招慰夷虜表子琳為去賓長史復其前封尋遷儀同開府長史齊獻武王丞相司馬卒時年五十三贈驃騎大將軍都官尚書瀛州刺史子伯昱弟朏, WYG: 游}
