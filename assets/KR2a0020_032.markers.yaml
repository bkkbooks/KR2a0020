  - {type: variant, offset: 6036, length: 1, content: 盛, WYG: 子恒官至征虜將軍魯郡太守早卒子恒弟子安冠軍將軍西兗州司馬子安弟子昇開府參軍武定中坐連元瑾事兄弟竝伏法封懿字處徳渤海蓨人也曾祖釋晉東夷校尉父放慕容暐吏部尚書兄孚慕容超太尉懿雋偉有才氣能屬文與孚雖器行有長短然名位略齊仕慕容寳位至中書令民部尚書寳敗歸闕除給事黄門侍郎都坐大官寧朔將軍章安子太祖數引見問以慕容舊事懿應對疎慢廢還家太宗初復徵拜都坐大官進爵為侯泰常二年卒懿撰燕書頗行於世子元之坐與司馬國璠温楷等謀亂伏誅臨刑太宗謂之曰終不令絶汝種也將宥爾一子元之請曰弟虔之子磨奴字君明早孤乞全其命乃殺元之四子而赦磨奴磨奴被刑為宦人崔浩之誅也世祖謂磨奴曰汝本應全所以致刑者事由浩之故後為中曹監西使張掖賜爵富城子加建威將軍給事中久之出為冠軍將軍懐州刺史太和七年卒贈平東將軍冀州刺史渤海公諡曰定以族子叔念為後髙祖賜名回回父鑒即慕容暐太尉弈之後也回皇興初為中書學生}
