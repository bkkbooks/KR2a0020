  - {type: variant, offset: 683, length: 377, content: 進爵為公出為鎮南將軍洛州刺史例降為侯尋徵為右光祿大夫尚書右僕射又出為使持節鎮北將軍定州刺史改封馮翊縣開國侯食邑五百戶進征北將軍初文明太后幽高祖於別室將謀黜廢泰切諫乃止高祖德之錫以山河寵待隆至泰自陳病久乞為州遂轉陸叡為定州以泰代焉泰不願遷都叡未及發而泰已至遂濳相扇誘圖為叛乃與叡及安樂侯元隆撫冥鎮將魯郡侯元業驍騎將軍元超陽平侯賀頭射聲校尉元樂平前彭城鎮將元拔代郡太守元珍鎮北將軍樂陵王思譽等謀推朔州刺史陽平王頤為主頤不從偽許以安之密表其事高祖乃遣任城王澄率并肆兵以討之澄先遣治書侍御史李煥單車入代出其不意泰等驚駭計無所出煥曉諭逆徒示以禍福於是凶黨離心莫為之用泰自度必敗乃率麾下數百人攻煥郭門冀以一捷不克單馬走出城西為人擒送澄亦尋到窮治黨與高祖幸代親見罪人問其反狀泰等伏誅子伯智八歲侍學東宮十歲拜太子洗馬散騎侍郎尚饒陽公主拜駙馬都尉早卒子喈伯智弟士儒字叔賢徙, WYG: ''}
