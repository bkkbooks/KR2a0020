  - {type: variant, offset: 4349, length: 534, content: 都督冀瀛二州諸軍事本將軍冀州刺史以母老固辭忤旨免官除中書令轉七兵尚書徙殿中尚書遭所生憂免居喪以孝聞又除衞大將軍左光祿大夫中書監復為侍中領本邑中正紹無他才能而資性方重罕接賓客希造人門領軍元叉當權熏灼曾往候紹紹迎送下階而已時人歎尚之及靈太后欲黜叉猶豫未決紹贊成之以功加特進又拜其次子巖為給事中尋加儀同三司領左右時侍中元順與紹同直順嘗因醉入其寢所紹擁被而起正色讓順曰身二十年侍中與卿先君亟連職事縱卿後進何宜相排突也遂謝事還家詔喻久乃起除車騎大將軍開府定州刺史固辭不拜又除侍中託疾未起河陰之役故得免害莊帝立尒朱榮遣人徵之紹以為必死哭辭家廟及往見榮於邙山捧手不拜榮亦矯意禮之顧謂人曰穆紹不虛大家兒車駕入宮尋授尚書令司空公進爵為王給班劍四十人仍加侍中時河南尹李奬往詣紹奬以紹郡民謂必加敬紹又恃封邑是奬國主待之不為動膝奬憚其位望致拜而還議者兩譏焉尒朱榮之討葛榮也詔上黨王天穆為前鋒次於懷縣司徒公楊椿為右軍紹為後繼未發會擒葛榮乃止未幾降王復本爵元顥入洛以紹為兗州刺史行達東郡顥敗而反普泰元年除都督青齊兗光四州諸軍事驃騎大將軍開府青州刺史未行其年九月薨時年五十二贈侍中都督冀相殷三州諸軍事大將軍尚書令太保冀州刺史諡曰文獻子長嵩字子岳起家通直郎再遷散騎常侍襲爵轉鎮東將軍光祿少卿興和中卒贈, WYG: ''}
