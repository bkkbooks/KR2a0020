  - {type: variant, offset: 6116, length: 0, content: '', WYG: 纈四百匹得為安州刺史除書旦出暮往詣回坐未定謂回曰我為安州卿知之否彼土治生何事為便回荅之曰卿荷國寵靈位至方伯雖不能拔園葵去織婦宜思方略以濟百姓如何見造而問治生乎封回不為商賈何以相示雲慙媿失色靈太后臨朝召百官問得失羣臣莫敢言回對曰昔孔丘為司寇十日而誅少正卯魯國肅然欺巧自息姬旦行戮不避兄弟周道用隆徐偃専行仁義其國乃滅自古及今未有不厲威刑而能治者頃来頗由長吏寛怠侵剝百姓盗賊羣起請肅刑書以懲未犯太后意納之而不能用轉為七兵尚書領御史中尉尚書右僕射元欽與從父兄麗妻崔氏姦通回乃劾奏時人稱之除鎮東將軍冀州刺史肅宗末徵為殿中尚書頻表遜職以為右}
