  - {type: variant, offset: 5542, length: 193, content: 季齊釋褐司徒參軍事開府騎兵參軍翰弟顗忠謹有材力太宗時為中散轉侍御郎從世祖征赫連昌勇冠一時世祖嘉之遷侍輦郎殿中將軍賜爵泥陽子從征和龍功超諸將拜司衞監加龍驤將軍進爵長樂侯曾從世祖田於崞山有虎突出顗搏而獲之世祖歎曰詩所謂有力如虎顗乃過之後從駕西征白龍北討蠕蠕以功加散騎常侍鎮北將軍進爵建安公出為北鎮都將徵拜殿中尚書出鎮涼州所在著稱還加散騎常侍領太倉尚書高宗時為征西大將軍督諸軍事西征吐谷渾出南, WYG: ''}
