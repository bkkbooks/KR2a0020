  - {type: variant, offset: 5959, length: 1, content: 假, WYG: 未及之職卒仍以為贈諡曰莊子幹字干奴好學寛厚有雅度襲爵涇縣侯後例降為伯歴南青州征虜府司馬威逺將軍鄯善鎮逺府長史仍轉汾州後軍府長史白水太守所在以亷平著稱太昌初卒贈使持節都督秦雍二州諸軍事車騎大將軍司空公雍州刺史諡曰孝穆子偘字伯欣襲除南秦州長史卒贈輔國將軍涼州刺史諡曰宣子紹字廣祖襲爵興和初征虜將軍滄州刺史偘弟騰字伏興卒於安東將軍光州刺史襄城縣開國公子陟字祖遷司空中郎太尉主簿陟弟憬通直郎憬弟翽襲父爵騰弟隆之武定末太保尚書令平原郡開國公崔逞字叔祖清河東武城人也魏中尉琰之六世孫曾祖諒晉中書令祖遇仕石虎為特進父瑜黄門郎逞少好學有文才遭亂孤貧躬耕于野而講誦不廢慕容暐時郡舉上計掾補著作郎撰燕記遷黄門侍郎及苻堅并慕容暐以為齊郡太守堅敗司馬昌明以逞為清河平原二郡太守為翟遼所虜授以中書令慕容垂滅翟釗以為祕書監慕容寳東走和龍為留臺吏部尚書及慕容驎立逞攜妻子亡歸太祖張袞先稱羙逞及見禮遇甚重拜為尚書任以政事錄三十六曹别給吏屬居門下省尋除御史中丞太祖攻中山未克六軍乏糧民多匿榖問羣臣以取粟方略逞曰取椹可以助糧故飛鴞食椹而改音詩稱其事太祖雖銜其侮慢然兵既湏食乃聼以椹當租逞又曰可使軍人及時自取過時則落盡太祖怒曰内賊未平兵人安可解甲仗入林野而收椹乎是何言歟以中山未㧞故不加罪天興初姚興侵司馬徳宗襄}
