  - {type: variant, offset: 2427, length: 1853, content: 郎封新興縣開國子稍遷通直常侍行雲州事羆弟亮字幼輔初字老生早有風度顯祖時起家為侍御中散尚中山長公主拜駙馬都尉封趙郡王加侍中征南大將軍徙封長樂王高祖初除使持節秦州刺史在州未期大著聲稱徵為殿中尚書又遷使持節征西大將軍西戎校尉敦煌鎮都大將政尚寬簡賑恤窮乏被徵還朝百姓追思之除都督秦梁益三州諸軍事征南大將軍領護西戎校尉仇池鎮將時宕昌王梁彌機死子彌博立為吐谷渾所逼來奔仇池亮以彌機蕃發素著矜其亡滅彌博凶悖氐羌所棄彌機兄子彌承戎民歸樂表請納之高祖從焉於是率騎三萬次于龍鵠擊走吐谷渾立彌承而還是時階陵比谷羌董耕奴斯卑等率衆數千人寇仇池屯于陽遐嶺亮副將楊靈珍率騎擊走之氐豪楊卜自延興以來從軍征伐二十一戰前來鎮將抑而不聞亮表卜為廣業太守豪右咸悅境內大安徵為侍中尚書右僕射于時復置司州高祖曰司州始立未有僚吏須立中正以定選舉然中正之任必須德望兼資者世祖時崔浩為冀州中正長孫嵩為司州中正可謂得人公卿等宜自相推舉必令稱允尚書陸叡舉亮為司州大中正時蕭賾遣將陳顯達攻陷醴陽加亮使持節征南大將軍都督懷洛南北豫徐兗六州諸軍事以討之顯達遁走乃還尋遷司空參議律令例降爵為公時文明太后崩已過期月高祖毀瘠猶甚亮表曰王者居極至尊至重父天母地懷柔百靈是以古先哲王制禮成務施政立治必順天而後動宣憲垂範必依典而後行用能四時不忒陰陽和暢若有過舉咎徵必集故大舜至慕事在納麓之前孔子至聖喪無過瘠之紀堯書稽古之美不錄在服之痛禮備諸侯之喪而無天子之式雖有上達之言未見居喪之典然則位重者為世以屈己居聖者達命以忘情伏惟陛下至德參二儀惠澤覃河海宣禮明刑動遵古式以至孝之痛服期年之喪練事既闋號慕如始統重極之尊同衆庶之制廢越紼之大敬闕宗祀之舊軌誠由文明太皇太后聖略超古惠訓深至欲報之德昊天罔極比之前代戚為過甚豈所謂順帝之則約躬隨衆者也陛下既為天地所子又為萬民父母子過哀父則為之慘悴父過戚子則為之憂傷近蒙接見咫尺旒冕聖容哀毀駭感無止況神祇至靈而不久虧和氣微致風旱者哉書稱一人有慶兆民賴之今一人過哀黎元焉繫羣官所以顛殞震懼率土所以危惶悚慄百姓何仰而不憂嘉禾何由而播殖願陛下上承金冊遺訓下稱億兆之心時襲輕服數御常膳修崇郊祠垂惠咸秩輿駕時動以釋憂煩博採廣諮以導性氣息無益之戀行利見之德則休徵可致嘉應必臻禮教並宣孝慈兼備普天蒙賴含生幸甚詔曰苟孝悌之至無所不通今飄風亢旱時雨不降實由誠慕未濃幽顯無感也所言過哀之咎諒為未衷省啟以增悲愧尋領太子太傅時將建太極殿引見羣臣於太華殿高祖曰朕仰遵先意將營殿宇役夫既至興功有日今欲徙居永樂以避囂埃土木雖復無心毀之能不悽愴今故臨對卿等與之取別此殿乃高宗所制爰歷顯祖逮朕冲年受位於此但事來奪情將有改制仰惟疇昔惟深悲感亮稽首對曰臣聞稽之卜筮載自典經占以決疑古今攸尚興建之功事在不易願陛下訊之蓍龜以定可否又去歲役作為功甚多太廟明堂一年便就若仍歲頻興恐民力凋弊且材幹新伐為功不固願得逾年小康百姓高祖曰若終不為可如卿言後必為之逾年何益朕遠覽前王無不興造故有周創業經建靈臺洪漢受終未央是作草創之初猶尚若此況朕承累聖之運屬太平之基且今八表清晏年穀又登爰及此時以就大功人生定分修短命也蓍蔡雖智其如之何當委之大分豈假卜筮遂移御永樂宮後高祖臨朝堂謂亮曰三代之禮日出視朝自漢魏已降禮儀漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共議可否遂命讀奏案高祖親自決之又謂亮曰徐州表給歸化人稟王者民之父母誠宜許之但今荊揚不賓書軌未一方欲親御六師問罪江介計萬戶投化歲食百萬若聽其給也則蕃儲虛竭雖得戶千萬猶未成一同且欲隨貧賑恤卿意何如亮對曰所存遠大實如聖旨及車駕南遷遷武衞大將軍以本官董攝中軍事高祖南伐以亮錄尚書事留鎮洛陽後高祖將自小平汎舟幸石濟亮諫曰臣聞垂堂之誨振古成規於安思危著於周易是以憑險弗防沒而不弔匹夫之賤猶不自輕況萬乘之尊含生所仰而可忽乎是故處則深宮廣廈行則萬騎千乘昔漢帝欲乘舟渡渭廣德將以首血汙車輪帝乃感而就橋夫一渡小水猶尚若斯況洪河浩汗有不測之慮且車乘由人猶有奔逸致敗之害況水之緩急非人所制脫難出慮表其如宗廟何高祖曰司空言是也及亮兄羆預穆泰反事亮以府事付司馬慕容契上表自劾高祖優詔不許還令攝事亮頻煩固請久乃許之尋除使持節征北大將軍開府儀同三司冀州刺史徙封頓丘郡開國公食邑五百戶以紹崇爵世宗即位遷定州刺史尋除驃騎大將軍尚書令俄轉司空公景明三年薨時年五十二給東園溫明祕器朝服一具衣一襲錢四十萬布七百匹蠟二百斤世宗親臨小斂贈太尉公領司州牧諡曰匡子紹字永業高祖以其貴臣世冑顧念之九歲除員外郎侍學東宮轉太子舍人十一尚琅邪長公主拜駙馬都尉, WYG: ''}
