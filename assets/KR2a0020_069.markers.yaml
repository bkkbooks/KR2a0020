  - {type: variant, offset: 2354, length: 1, content: 凡, krp: 免降責其謬薦罸其偽薄如此則舉人不得挾其私受任不得孤其舉善惡既審沮勸亦明庻邊患永消譏議攸息矣遭母憂去職熙平初除冠軍將軍廷尉少卿尋加征虜將軍後出為平陽太守飜為廷尉頗有不平之論及之郡甚不自得遂作思歸賦曰日色黯兮髙山之岑月逄霞而未晈霞值月而成隂望他鄉之阡陌非舊國之池林山有木而蔽月川無梁而復深悵浮雲之弗限何此恨之難禁於是雜石為峯諸烟共色秀出無窮烟起不極錯飜花而似繡網遊絲其如織蝶兩戲以相追燕雙飛而鼓翼怨驅馬之悠悠歎征夫之未息爾乃臨峻壑坐層阿北眺羊膓詰屈南望龍門嵯峨疊千重以聳翠横萬里而揚波逺􅏈鼯與麏麝走鰩鼈及龜鼉彼暧然兮鞏洛此邈矣兮關河心鬱鬱兮徒傷思摇摇兮空滿思故人兮不見神翻覆兮魂斷斷魂兮如亂憂來兮不散俯鏡兮白水水流兮漫漫異色兮縱横奇光兮爛爛下對兮碧沙上覩兮青岸岸上兮氤氲駮霞兮絳氛風摇枝而為弄日照水以成文行復行兮川之畔望復望兮望夫君君之門兮九重門余之别兮千里分願一見兮導我意我不見兮君不聞魄惝怳兮知何語氣繚戾兮獨縈緼彼鳥馬之無知尚有情於南北雖吾人之固鄙豈忘懐於上國去上國之美人對下邦之鬼蜮形既同於魍魎心匪殊於蝥賊欲修之而難化何不殘之云剋知進退之非可徒終朝以黙黙願生還於洛濵荷天地之厚德神龜末遷冠軍將軍涼州刺史時蠕蠕主阿那瓌後主婆羅門並以國亂來降朝廷問飜安置之所飜表曰謬以非才忝荷邊任偎垂訪逮安置蠕蠕主阿那瓌婆羅門等處所逺近利害之宜竊惟匈奴為患其來乆矣雖隆周盛漢莫能障服衰弱則降富彊則叛是以方叔召虎不遑自息衛青去病勤亦勞止或修文德以來之或興干戈以伐之而一得一失利害相侔故呼韓來朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆場自卜惟洛食定鼎伊瀍髙車蠕蠕迭相吞噬始則蠕蠕衰㣲髙車彊盛蠕蠕則自救靡暇髙車則僻逺西北及蠕蠕復振反破髙車王䘮民離不絶如綫而髙車今能終雪其恥復摧蠕蠕者正由種類繁多不可頓滅故也然鬬此兩敵即卞莊之算得使境上無塵數十年中者抑此之由也今蠕蠕為髙車所討滅外憑大國之威靈兩主投身一朞而至百姓歸誠萬里相屬進希朝廷哀矜剋復宗社退望庇身有道保其妻兒雖乃逺夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絶列聖同規撫降䘏附綿經共軌若棄而不受則虧我大德若納而禮待則損我資儲來者既多全徙内地非直其情不願迎送艱難然夷不亂華殷鑒無逺覆車在於劉石毁轍固不可尋且蠕蠕尚存則髙車猶有内顧之憂未暇窺窬上國若蠕蠕全滅則髙車跋扈之計豈易可知今蠕蠕雖主奔於上民散於下而餘黨實繁部落猶衆處處碁布以望今主耳髙車亦未能一時并兼盡令率附又髙車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦彊敵唯涼州敦煌而已涼州土廣民希糧仗素闕敦煌酒泉空虛尤甚若蠕蠕無復竪立令髙車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主皆宜存之居阿那瓌於東偏處婆羅門於西裔分其降民各有攸屬那瓌住所非}
  - {type: variant, offset: 2357, length: 2, content: 履咸, WYG: 見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡本屬涼州今在酒泉直抵張掖西北千二百里去髙車所住金山一千餘里正是北虜往來之衝要漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事}
