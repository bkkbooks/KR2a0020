  - {type: variant, offset: 2335, length: 12, content: 忠聞而大怒矯詔殺祚時年六, WYG: 郡官至便登壃場統戍階當即用或值穢德凡人或遇貪家惡子不識字民温恤之方唯知重役殘忍之法廣開戍邏多置帥領或用其左右姻親或受人財貨請屬皆無防寇禦賊之心唯有通商聚斂之意其勇力之兵驅令抄掠若値彊敵即為奴虜如有執獲奪為已富其羸弱老小之輩㣲觧金鐵之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或耘草平陸販貿往還相望道路此等禄既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬歴夏加之疾苦死於溝瀆者常}
