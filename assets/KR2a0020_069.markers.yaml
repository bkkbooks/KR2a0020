  - {type: variant, offset: 2131, length: 0, content: '', WYG: 宫官例免頃之除太尉掾兼太子中舎人世宗初為散騎侍郎尋除雍州平西府長史加建威將軍入為中書侍郎時世宗專心釋典不事墳籍延儁上疏諌曰臣聞有堯文思欽明稽古媯舜體道慎典作聖漢光神叡軍中讀書魏武英規馬上翫籍先帝天縱多能克文克武營遷謀伐手不釋卷良以經史義深補益處廣雖則劬勞不可暫輟斯乃}
