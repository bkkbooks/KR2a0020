  - {type: variant, offset: 2349, length: 2, content: 祚達, WYG: 八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乗擾故驅率犬羊屢犯壃場頻年以來甲胄生蟣十萬在郊千金日費為弊之深一至}
  - {type: variant, offset: 2349, length: 2, content: 祚達, krp: 八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乗擾故驅率犬羊屢犯壃場頻年以來甲胄生蟣十萬在郊千金日費為弊之深一至}
  - {type: variant, offset: 2352, length: 1, content: 政, WYG: 此皆由邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本既失之在始庸可止乎愚謂自今以後荆揚徐豫梁益諸蕃及所統郡縣府佐統軍至於戍主皆令朝臣王公已下各舉所知必選其才不拘階級若能統御有方清髙獨著威足臨戎信能懷逺撫循將士得其忻心不營私潤専修公利者則就加爵賞使乆於其任以時襃賚厲其忠欵所舉之人亦垂優異奬其得士嘉其誠節若不能一心奉公才非捍禦貪惏日富經畧無聞人不見德兵厭其勞者即加顯戮用彰其罪所舉之人隨}
  - {type: page-break, offset: 2352, content: '', id: KR2a0020_WYG_069-19b, image: WYG0262/WYG0262-0050d.png}
