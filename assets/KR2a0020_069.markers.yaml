  - {type: variant, offset: 2334, length: 0, content: '', krp: 一代之法故鄭𤣥云周人明堂五室是帝一室也合於五行之數周禮依數以為之室德行疑於今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也於今不同是漢異周也漢為九室畧可知矣但就其此制猶竊有懵焉何者張衡東京賦云乃營三宮布敎班常複廟重屋八達九房此乃明堂之文也而薛綜注云房室也謂堂後有九室堂後九室之制非巨異乎裴頠又云漢氏作四維之个不能令各據其辰就使其像可圖莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘於載籍且鄭𤣥之詁訓三禮及釋五經異義並盡思窮神故得之逺矣覽其明堂圖義皆有悟人意察察著明確乎難奪諒足以扶㣲闡幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易𤣥之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可準觀夫今之基址猶或髣髴髙卑廣狹頗與戴禮不同何得以意抑心便謂九室可明且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難明故有一屋之論並非經典正義皆以意妄作兹為不典學家常談不足以範時軌世皇代既乗乾統厯得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏放篇之浮說徒損經紀雅誥之遺訓而欲以支離横議指畫妄圖儀刑宇宙而貽來葉者也又北京制置未皆允怗繕修草創以意良多事移禮變所存者無幾理苟宜革何必仍舊且遷都之始日不遑給先朝規度毎事循古是以數年之中悛換非一良以永法為難數改為易何為宮室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言明堂五室請同周制郊建三雍求依故所庻有會經誥無失典刑識偏學疎退慙謬浪後議選邊戍事飜議曰臣聞兩漢警於西北魏晉備在東南是以鎮邊守塞必寄威重伐叛柔服寔頼温良故田叔魏尚聲髙於沙漠當陽鉅平績流於江漢紀籍用為美談今古以為盛德自皇上以叡明纂御風凝化逺威厲秋霜惠霑春露故能使淮海輸誠華陽即序連城請面北屋歸仁懸車劒閣豈伊曩載鼓譟金陵復在兹日然荆揚之牧宜盡一時才望梁郢之君无須當今秀異自比縁邊}
