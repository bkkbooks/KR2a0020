  - {type: variant, offset: 2256, length: 1, content: 令, WYG: 郎中元直弟敬猷員外常侍兄弟並有學尚與父同時遇害元直贈光州刺史敬猷妻丞相髙陽王雍外孫超贈尚書僕射延儁從叔桃弓亦見稱於鄉里子夙字買興沉雅有器識儀望甚偉髙祖見而異之自司空主簿轉尚書左主客郎中時吏部尚書}
  - {type: page-break, offset: 2256, content: '', id: KR2a0020_WYG_069-7b, image: WYG0262/WYG0262-0044d.png}
  - {type: variant, offset: 2256, length: 1, content: 令, krp: 郎中元直弟敬猷員外常侍兄弟並有學尚與父同時遇害元直贈光州刺史敬猷妻丞相髙陽王雍外孫超贈尚書僕射延儁從叔桃弓亦見稱於鄉里子夙字買興沉雅有器識儀望甚偉髙祖見而異之自司空主簿轉尚書左主客郎中時吏部尚書}
  - {type: punctuation, offset: 2257, content: 、, id: KR2a0020_ZHSJ_069-bkkpn497}
  - {type: variant, offset: 2261, length: 0, content: '', WYG: 有知人鑒毎歎美夙以逺大許之髙祖南伐為行臺吏部郎仍除征北大將軍穆亮從事中郎轉為河北太守以忠恕接下百姓感之卒於郡年四十三長子範字宗模早卒範子凝字長儒卒於武平鎮將範弟昇之鑒武定末昇之太尉掾鑒司徒右長史延儁從祖弟良字元賔起家今朝請轉北中府功曹參軍世宗初南絳縣令稍遷并州安北府長史入為中散大夫領尚書考功郎中時汾州吐京羣胡薛羽等作逆以良兼尚書左丞為西北道行臺値别將李德龍為羽所破良入汾州與刺史汝隂王景和及德龍率兵數千憑城自守賊併力攻逼詔遣行臺裴延儁大都督章武王融都督宗正珍孫等赴援時有五城郡山胡馮宜都賀悅回成等以妖妄惑衆假稱帝號服素衣持白傘白幡率諸逆衆於雲臺郊抗拒王師融等與戰敗績賊乗勝圍城良率將士出戰大破之於陣斬回成復誘導諸胡令斬送宜都首又山胡劉蠡升自云聖術胡人信之咸相影附旬日之間逆徒還振德龍議欲拔城良不許徳龍等乃止景和薨以良為汾州刺史加輔國將軍行臺如故都督髙防來援復敗於百里候先是官粟貸民未及收聚仍値寇亂至是城民大飢人相食賊知倉庫空虛攻圍日甚死者十三四良以飢窘因與城人奔赴西河汾州之治西河自良始也時南絳蜀陳雙熾等聚衆反自號建始王與大都督長孫雅宗正珍孫等相持不下詔良觧州為慰勞使轉太中大夫本部中正孝莊末除光禄大夫尒朱榮死榮從子天光擁衆闗西乃詔良持節假安西將軍潼關都督又兼尚書為河東恒農河北宜陽行臺以備之前廢帝時除征東將軍金紫光禄大夫尋轉衛將軍又加散騎常侍車騎將軍右光禄大夫轉驃騎將軍左光禄大夫出帝末除汲郡太守孝静初衛大將軍太府卿天平二年秋卒時年六十一贈使持節都督雍華二州諸軍事吏部尚書本將軍雍州刺史諡曰貞又重贈侍中驃騎大將軍尚書僕射餘如故子叔祉武定末太子洗馬良從父兄子慶孫字紹逺少孤性倜儻重然諾釋褐員外散騎侍郎正光末汾州吐京羣胡薛悉公馬牒騰並自立為王聚黨作逆衆至數萬詔慶孫為募人别將招率鄉豪得戰士數千人以討之胡賊屢來逆戰慶孫身先士卒毎摧其鋒遂深入至雲臺郊諸賊更相連結大戰郊西自旦及夕慶孫身自突陳賊王闕郭康兒賊衆大潰勑徵赴都除直後於後賊復鳩集北連蠡升南通絳蜀凶徒轉盛復以慶孫為别將從軹關入討至齊子嶺東賊帥范多范安族等率衆來拒慶孫與戰復斬多首乃深入二百餘里至陽胡城朝廷以此地被山帶河衿要之所肅宗末遂立邵郡因以慶孫為太守假節輔國將軍當郡都督民經賊亂之後率多逃竄慶孫務安緝之咸來歸業永安中還朝除太中大夫尒朱榮之死也世隆擁衆北渡詔慶孫為大都督與行臺源子恭率衆追擊軍次太行而慶孫與世隆宻通事泄追還河内而斬之時年三十六慶孫任俠有氣鄉曲壯士及好事者多相依附撫養咸有恩紀在郡之日值歳饑凶四方遊客常有百餘慶孫自以家糧贍之性雖麤武愛好文流與諸才學之士咸相交結輕財重義座客常滿是以為時所稱子子瑩永安中太尉行參軍延儁從祖弟仲規少好經史頗有志節起家奉朝請領侍御咸陽王禧為司州牧辟為主簿仍表行建興郡事車駕自代還洛次於郡境仲規備供帳朝於路側髙祖詔仲規曰朕開置神畿郡望闕一字重卿既首應司隸美舉復督我名邦何能自致也仲規對曰陛下窮神盡聖應天順民棄彼𤣥壤來宅紫縣臣方罄心力躍馬呉會冀功銘帝籍勲書王府豈一郡而已髙祖笑曰冀卿必副此言車駕達河梁見咸陽王謂曰昨得汝主簿為南道主人六軍豐贍元弟之寄殊副所望尋除司徒主簿仲規父在鄉疾病棄官奔赴以違制免乆之中山王英征義陽引為統軍奏復本資於陳戰殁時年四十八贈河東太守諡曰貞無子弟叔義以第二子伯茂}
