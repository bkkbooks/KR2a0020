  - {type: variant, offset: 2134, length: 0, content: '', WYG: 座於宸闈釋覺善於日宇凡在聼矚塵蔽俱開然五經治世之模六籍軌俗之本蓋以訓物有漸應時匪妙必須先麤後精乗近即逺伏願經書互覽孔釋兼存則内外俱周真俗斯暢後除司州别駕加鎮逺將軍及詔立明堂羣官博議延儁獨著一堂之論太傅清河王懌時典衆議讀而笑曰子故欲逺符僕射也兼太子中庻子尋即正别駕如故加冠軍將軍肅宗初還散騎常侍監起居注加前將軍又加平西將軍除廷尉卿轉平北將軍幽州刺史范陽郡有舊督亢渠徑五十里漁陽燕郡有故戾陵諸堰廣袤三十里皆廢毁多時莫能修復時水旱不調民多飢餒延儁謂疏通舊跡勢必可成乃表求營造遂躬自履行相度水形隨力分督未幾而就溉田百萬餘畝為利十倍百姓至今頼之又命主簿酈惲修起學校禮敎大行民歌謡之在州五年考績為天下最廷儁繼母隨延儁在薊時遇重患延儁啓求侍母還京療治至都未幾拜太常卿時汾州山胡恃險冦竊正平平陽二郡}
  - {type: page-break, offset: 2134, content: '', id: KR2a0020_WYG_069-6a, image: WYG0262/WYG0262-0044a.png}
  - {type: page-break, offset: 2134, content: '', id: KR2a0020_WYG_069-6b, image: WYG0262/WYG0262-0044b.png}
