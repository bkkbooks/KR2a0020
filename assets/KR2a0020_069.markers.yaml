  - {type: variant, offset: 2406, length: 0, content: '', WYG: 書令下於臣庸朽誠為叨濫凖之倫匹或有未盡竊惟安南之與金紫雖是異品之隔實有半階之校加以尚書清要位遇通顯準秩論資似加少進語望比官人不願易臣自揆自顧力極求此伏願天地成造有始有終矜臣疲病乞臣骸骨願以安南尚書換一金紫時天下多事飜雖外請閑秩而内有求進之心識者怪之於是加撫軍將軍肅宗靈太后曾燕於華林園舉觴謂羣臣曰袁尚書朕之杜預欲以此杯敬屬元凱今為盡之侍座者莫不羡仰飜名位俱重當時賢達咸推與之然獨善其身無所奬拔排抑後進懼其凌已論者鄙之建義初遇害於河隂年五十三所著文筆百餘篇行於世}
