  - {type: variant, offset: 2317, length: 0, content: '', krp: 以軍功稍遷}
  - {type: variant, offset: 2323, length: 0, content: '', WYG: 轉諮議參軍孝静初徙司空長史在官貪穢武定二年為中尉崔暹所劾事下廷尉遇疾死於獄年四十五仲規弟子伯珍歴襄威將軍員外散騎郎西河太守孝静初為平東將軍滎陽太守卒官時年三十二贈本將軍雍州刺史延儁族子禮和觧褐員外散騎侍郎遷謁者僕射身長九尺腰帶十圍於羣衆之中魁然有異出為陳留太守卒於金紫光禄大夫延儁族兄聿字外興以操尚貞立為髙祖所知自著作佐郎出為北中府長史時髙祖以聿與中書侍郎崔亮並清貧欲以幹禄優之乃以亮帶野王縣聿帶温縣時人榮之轉尚書郎遷太尉諮議參軍出為平秦太守卒贈冠軍將軍洛州刺史子子袖殁關西延儁族人瑗字珍寶太和中析屬河北郡少孤貧而清苦自立太守司馬悅召為中正悅為别將軍征義陽引為中兵參軍瑗夙夜恭勤為悅所知軍還除奉朝請轉給事中汝南王悅郎中令悅散費無常毎國俸初入一日之中分賜極意瑗毎隨例恒辭多受少伺悅虛竭還來奉貢悅雖性理不恒然亦相賞愛悅遷太尉請為從事中郎轉驍騎將軍肅宗末出為汝南太守不行轉太原太守屬肅宗崩尒朱榮初謀赴洛瑗預其事封五原縣開國子邑三百户尋行并州事轉平北將軍殷州刺史孝静初除衛將軍東雍州刺史興和元年卒年七十三子夷吾武定末徐州驃騎府長流參軍袁飜字}
