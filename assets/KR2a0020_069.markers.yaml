  - {type: variant, offset: 2325, length: 2, content: 說高, WYG: 書殿中郎正始初詔尚書門下於金墉中書外省考論律令飜與門下録事常景孫紹廷尉監張虎律博士侯堅固治書侍御史髙綽前軍將軍邢苗奉車都尉程靈虬羽林監王元龜尚書郎祖瑩宋世景員外郎李琰之太樂令公孫崇等並在議限又詔太師彭城王勰司州牧髙}
