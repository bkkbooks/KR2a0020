  - {type: variant, offset: 2742, length: 3023, content: 父靈真早卒彝性公強有風氣歷覽經史高祖初襲祖侯爵與盧淵李安民等結為親友往來朝會常相追隨淵為主客令安民與彝並為散令彝少而豪放出入殿庭步眄高上無所顧忌文明太后雅尚恭謹因會次見其如此遂召集百僚督責之令其修悔而猶無悛改善於督察每東西馳使有所巡檢彝充其選清慎嚴猛所至人皆畏伏儔類亦以此高之遷主客令例降侯為伯轉太中大夫仍行主客曹事尋為黃門後從駕南征母憂解任彝居喪過禮送葬自平城達家千里徒步不乘車馬顏貌毀瘠當世稱之高祖幸冀州遣使弔慰詔以驍騎將軍起之還復本位以參定遷都之勳進爵為侯轉太常少卿遷散騎常侍兼侍中持節巡察陝東河南十二州甚有聲稱使還以從征之勤遷尚書坐舉元昭為兼郎中黜為守尚書世宗初除正尚書兼侍中尋正侍中世宗親政罷六輔彝與兼尚書邢巒聞處分非常出京奔走為御史中尉甄琛所彈云非虎非兕率彼曠野詔書切責之尋除安西將軍秦州刺史彝務尚典式考訪故事及臨隴右彌加討習於是出入直衞方伯威儀赫然可觀羌夏畏伏憚其威整一方肅靜號為良牧其年冬太極初就彝與郭祚等俱以勤舊被徵及還州進號撫軍將軍彝表解州任詔不許彝敷政隴右多所制立宣布新風革其舊俗民庶愛仰之為國造佛寺名曰興皇諸有罪咎者隨其輕重謫為土木之功無復鞭杖之罰時陳留公主寡居彝意願尚主主亦許之僕射高肇亦望尚主主意不可肇怒譖彝於世宗稱彝擅立刑法勞役百姓詔遣直後萬貳興馳驛撿察貳興肇所親愛必欲致彝深罪彝清身奉法求其愆過遂無所得見代還洛猶停廢數年因得偏風手脚不便然志性不移善自將攝稍能朝拜久之除光祿大夫加金章紫綬彝愛好知己輕忽下流非其意者視之蔑爾雖疹疾家庭而志氣彌亮上表曰臣聞元天高朗尚假列星以助明洞庭淵湛猶藉衆流以增大莫不以孤照不詣其幽獨深未盡其廣先聖識其若此必取物以自誡故堯稱則天設謗木以曉未明舜稱盡善懸諫鼓以規政闕虞人獻箴規之旨盤盂著舉動之銘庶幾見善而思齊聞惡以自改眷眷於悔往之衢孜孜於不逮之路用能聲高百王卓絕中古經十氏而不渝歷二千以孤鬱伏惟太祖撥亂弈代重光世祖以不世之才開盪函夏顯祖以溫明之德潤沃九區高祖大聖臨朝經營云始未明求衣日昃忘食開翦荊棘徙御神縣更新風軌冠帶朝流海東雜種之渠衡南異服之帥沙西頭之戎漠北辮髮之虜重譯納貢請吏稱藩積德懋於夏殷富仁盛於周漢澤教既周武功亦匝猶且發明詔思求直士信是蒼生薦言之秋祝史陳辭之日況臣家自奉國八十餘年紆金鏘玉及臣四世過以小才藉蔭出仕學慚專門武闕方略早荷先帝眷仗之恩末蒙陛下不遺之施侍則出入兩都官歷納言常伯忝牧秦藩號兼安撫實思碎首膏原仰酬二朝之惠輕塵碎石遠增嵩岱之高輒私訪舊書竊觀圖史其帝皇興起之元配天隆家之業修造益民之奇龍麟雲鳳之瑞卑宮愛物之仁釋網改祝之澤前歌後舞之應囹圄寂寥之美可為輝風景行者輒謹編丹青以標睿範至如太康好田遇窮后迫禍武乙逸禽罹震雷暴酷夏桀淫亂南巢有非命之誅殷紂昏酣牧野有倒戈之陳周厲逐獸滅不旋踵幽王遇惑死亦相尋暨於漢成失御亡新篡奪桓靈不綱魏武遷鼎晉惠闇弱骨肉相屠終使聰曜鴞視并州勒虎狼據燕趙如此之輩罔不畢載起元庖犧終於晉末凡十六代百二十八帝歷三千二百七年雜事五百八十九合成五卷名曰歷帝圖亦謗木諫鼓虞人盤盂之類脫蒙置御坐之側時復披覽冀或起予左右上補未萌伏願陛下遠惟宗廟之憂近存黎民之念取其賢君棄其惡主則微臣雖沉淪地下無異乘雲登天矣世宗善之彝又表曰竊惟皇王統天必以窮幽為美盡理作聖亦假廣採成明故詢於芻蕘著之周什輿人獻箴流於夏典不然則美刺無以得彰善惡有時不達逮於兩漢魏晉雖道有隆樜而被繡傳檄未始闕也及惠帝失御中夏崩離劉苻專據秦西燕趙獨制關左姚夏繼起五涼競立致使九服搖搖民無定主禮儀典制此焉堙滅暨大魏應歷撥亂登皇翦彼鯨鯢龕靖神縣數紀之間天下寧一傳輝七帝積聖如神高祖遷鼎成周永茲八百偃武修文憲章斯改實所謂加五帝登三王民無德而名焉猶且慮獨見之不明欲廣訪於得失乃命四使觀察風謠臣時忝常伯充一使之列遂得仗節揮金宣恩東夏周歷於齊魯之間遍馳於梁宋之域詢採詩頌研撿獄情實庶片言之不遺美刺之俱顯而才輕任重多不遂心所採之詩並始申目而值鑾輿南討問罪宛鄧臣復忝行軍樞機是務及輦駕之返膳御未和續以大諱奄臻四海崩慕遂爾推遷不及聞徹未幾改牧秦蕃違離闕下繼以譴疾相纏寧丁八歲常恐所採之詩永淪丘壑是臣夙夜所懷以為深憂者也陛下垂日月之明行雲雨之施察臣往罪之濫矜臣貧病之切既蒙崇以祿養復得拜掃丘墳明目友朋無所負愧且臣一二年來所患不劇尋省本書粗有髣髴凡有七卷今寫上呈伏願昭覽敕付有司使魏代所採之詩不堙於丘井臣之願也肅宗初侍中崔光表曰彝及李韶朝列之中唯此二人出身官次本在臣右器能幹世又並為多近來參差便成替後計其階途雖應遷陟然恐班秩猶未賜等昔衞之公叔引下同舉晉之士丐推長伯游古人所高當時見許敢緣斯義乞降臣位一階授彼汎級齊行聖庭帖穆選詔加征西將軍冀州大中正雖年向六十加之風疾而自強人事孜孜無怠公私法集衣冠從事延請道俗修營齋講好善欽賢愛獎人物南北新舊莫不多之大起第宅微號華侈頗侮其疏宗舊戚不甚存紀時有怨憾焉榮宦之間未能止足屢表在秦州預有開援漢中之勳希加賞報積年不已朝廷患之第二子仲瑀上封事求銓別選格排抑武人不使預在清品由是衆口喧喧謗讟盈路立榜大巷剋期會集屠害其家彝殊無畏避之意父子安然神龜二年二月羽林虎賁幾將千人相率至尚書省詬罵求其長子尚書郎始均不獲以瓦石擊打公門上下畏懼莫敢討抑遂便持火虜掠道中薪蒿以杖石為兵器直造其第曳彝堂下捶辱極意唱呼焚其屋宇始均仲瑀當時踰北垣而走始均回救其父拜伏羣小以請父命羽林等就加毆擊生投之於烟火之中及得尸骸不復可識唯以髻中小釵為驗仲瑀傷重走免彝僅有餘命沙門寺與其比隣輿致於寺遠近聞見莫不惋駭彝臨終口占左右上啟曰臣自奉國及孫六世尸祿素餐負恩唯靦徒思竭智盡誠終然靡効臣第二息仲瑀所上之事益治實多既曰有益寧容默爾通呈有日未簡神聽豈圖衆忿乃至於此臣不能禍防未萌慮絕殃兆致令軍衆橫囂攻焚臣宅息始均仲瑀等叩請流血乞代臣死始均即陷塗炭仲瑀經宿方蘇臣年已六十宿被榮遇垂暮之秋忽見此苦顧瞻災酷古今無比臣傷至重殘氣假延望景顧時推漏就盡頃刻待終臣之命也知復何言若所上之書少為益國臣便是生以理全死與義合不負二帝於地下臣無餘恨矣一歸泉壤長離紫庭戀仰天顏誠痛無已不勝眷眷力喘奉辭伏願二聖加御珍膳覆露黔首壽保南嶽德與日昇臣夙被芻豢先後銜恩欲報之期昊天罔極亡魂有知不忘結草彝遂卒時年五十九官為收掩羽林凶強者八人斬之不能窮誅羣豎即為大赦以安衆心有識者知國紀之將墜矣喪還所焚宅與始均東西分斂於小屋仲瑀遂以創重避居滎陽至五月創得漸瘳始奔父喪詔賜布帛千匹靈太后以其累朝大臣特垂矜惻數月猶追言泣下謂諸侍臣曰吾為張彝飲食不御乃至首髮微有虧落悲痛之苦以至於此初彝曾祖幸所招引河東民為州裁千餘家後相依合至於罷入冀州積三十年析別有數萬戶故高祖比校天下民戶最為大州彝為黃門每侍坐以為言高祖謂之曰終當以卿為刺史酬先世誠效彝追高祖往旨累乞本州朝議未許彝亡後靈太后云彝屢乞冀州吾欲用之有人違我此意若從其請或不至是悔之無及乃贈使持節衞將軍冀州刺史諡文侯始均字子衡端潔好學有文才司徒行參軍遷著作佐郎世宗以彝先朝勤舊不幸疹廢特除始均長兼左民郎中遷員外常侍仍領郎始均才幹有美於父改陳壽魏志為編年之體廣益異聞為三十卷又著冠帶錄及諸賦數十篇今並亡失初大乘賊起於冀瀛之間遣都督元遙討平之多所殺戮積尸數萬始均以郎中為行臺忿軍士重以首級為功乃令檢集人首數千一時焚爇至於灰燼用息僥倖見者莫不傷心及始均之死也始末在於烟炭之間有燋爛之痛論者或亦推咎焉贈樂陵太守諡曰孝子暠襲祖爵武定中開府主簿齊受禪爵例降暠弟晏之武定中儀同開府中兵參軍仲瑀司空祭酒給事中子台儀同開府參軍事仲瑀弟珉著作佐郎, WYG: ''}
  - {type: variant, offset: 2742, length: 3023, content: 父靈真早卒彝性公強有風氣歷覽經史高祖初襲祖侯爵與盧淵李安民等結為親友往來朝會常相追隨淵為主客令安民與彝並為散令彝少而豪放出入殿庭步眄高上無所顧忌文明太后雅尚恭謹因會次見其如此遂召集百僚督責之令其修悔而猶無悛改善於督察每東西馳使有所巡檢彝充其選清慎嚴猛所至人皆畏伏儔類亦以此高之遷主客令例降侯為伯轉太中大夫仍行主客曹事尋為黃門後從駕南征母憂解任彝居喪過禮送葬自平城達家千里徒步不乘車馬顏貌毀瘠當世稱之高祖幸冀州遣使弔慰詔以驍騎將軍起之還復本位以參定遷都之勳進爵為侯轉太常少卿遷散騎常侍兼侍中持節巡察陝東河南十二州甚有聲稱使還以從征之勤遷尚書坐舉元昭為兼郎中黜為守尚書世宗初除正尚書兼侍中尋正侍中世宗親政罷六輔彝與兼尚書邢巒聞處分非常出京奔走為御史中尉甄琛所彈云非虎非兕率彼曠野詔書切責之尋除安西將軍秦州刺史彝務尚典式考訪故事及臨隴右彌加討習於是出入直衞方伯威儀赫然可觀羌夏畏伏憚其威整一方肅靜號為良牧其年冬太極初就彝與郭祚等俱以勤舊被徵及還州進號撫軍將軍彝表解州任詔不許彝敷政隴右多所制立宣布新風革其舊俗民庶愛仰之為國造佛寺名曰興皇諸有罪咎者隨其輕重謫為土木之功無復鞭杖之罰時陳留公主寡居彝意願尚主主亦許之僕射高肇亦望尚主主意不可肇怒譖彝於世宗稱彝擅立刑法勞役百姓詔遣直後萬貳興馳驛撿察貳興肇所親愛必欲致彝深罪彝清身奉法求其愆過遂無所得見代還洛猶停廢數年因得偏風手脚不便然志性不移善自將攝稍能朝拜久之除光祿大夫加金章紫綬彝愛好知己輕忽下流非其意者視之蔑爾雖疹疾家庭而志氣彌亮上表曰臣聞元天高朗尚假列星以助明洞庭淵湛猶藉衆流以增大莫不以孤照不詣其幽獨深未盡其廣先聖識其若此必取物以自誡故堯稱則天設謗木以曉未明舜稱盡善懸諫鼓以規政闕虞人獻箴規之旨盤盂著舉動之銘庶幾見善而思齊聞惡以自改眷眷於悔往之衢孜孜於不逮之路用能聲高百王卓絕中古經十氏而不渝歷二千以孤鬱伏惟太祖撥亂弈代重光世祖以不世之才開盪函夏顯祖以溫明之德潤沃九區高祖大聖臨朝經營云始未明求衣日昃忘食開翦荊棘徙御神縣更新風軌冠帶朝流海東雜種之渠衡南異服之帥沙西頭之戎漠北辮髮之虜重譯納貢請吏稱藩積德懋於夏殷富仁盛於周漢澤教既周武功亦匝猶且發明詔思求直士信是蒼生薦言之秋祝史陳辭之日況臣家自奉國八十餘年紆金鏘玉及臣四世過以小才藉蔭出仕學慚專門武闕方略早荷先帝眷仗之恩末蒙陛下不遺之施侍則出入兩都官歷納言常伯忝牧秦藩號兼安撫實思碎首膏原仰酬二朝之惠輕塵碎石遠增嵩岱之高輒私訪舊書竊觀圖史其帝皇興起之元配天隆家之業修造益民之奇龍麟雲鳳之瑞卑宮愛物之仁釋網改祝之澤前歌後舞之應囹圄寂寥之美可為輝風景行者輒謹編丹青以標睿範至如太康好田遇窮后迫禍武乙逸禽罹震雷暴酷夏桀淫亂南巢有非命之誅殷紂昏酣牧野有倒戈之陳周厲逐獸滅不旋踵幽王遇惑死亦相尋暨於漢成失御亡新篡奪桓靈不綱魏武遷鼎晉惠闇弱骨肉相屠終使聰曜鴞視并州勒虎狼據燕趙如此之輩罔不畢載起元庖犧終於晉末凡十六代百二十八帝歷三千二百七年雜事五百八十九合成五卷名曰歷帝圖亦謗木諫鼓虞人盤盂之類脫蒙置御坐之側時復披覽冀或起予左右上補未萌伏願陛下遠惟宗廟之憂近存黎民之念取其賢君棄其惡主則微臣雖沉淪地下無異乘雲登天矣世宗善之彝又表曰竊惟皇王統天必以窮幽為美盡理作聖亦假廣採成明故詢於芻蕘著之周什輿人獻箴流於夏典不然則美刺無以得彰善惡有時不達逮於兩漢魏晉雖道有隆樜而被繡傳檄未始闕也及惠帝失御中夏崩離劉苻專據秦西燕趙獨制關左姚夏繼起五涼競立致使九服搖搖民無定主禮儀典制此焉堙滅暨大魏應歷撥亂登皇翦彼鯨鯢龕靖神縣數紀之間天下寧一傳輝七帝積聖如神高祖遷鼎成周永茲八百偃武修文憲章斯改實所謂加五帝登三王民無德而名焉猶且慮獨見之不明欲廣訪於得失乃命四使觀察風謠臣時忝常伯充一使之列遂得仗節揮金宣恩東夏周歷於齊魯之間遍馳於梁宋之域詢採詩頌研撿獄情實庶片言之不遺美刺之俱顯而才輕任重多不遂心所採之詩並始申目而值鑾輿南討問罪宛鄧臣復忝行軍樞機是務及輦駕之返膳御未和續以大諱奄臻四海崩慕遂爾推遷不及聞徹未幾改牧秦蕃違離闕下繼以譴疾相纏寧丁八歲常恐所採之詩永淪丘壑是臣夙夜所懷以為深憂者也陛下垂日月之明行雲雨之施察臣往罪之濫矜臣貧病之切既蒙崇以祿養復得拜掃丘墳明目友朋無所負愧且臣一二年來所患不劇尋省本書粗有髣髴凡有七卷今寫上呈伏願昭覽敕付有司使魏代所採之詩不堙於丘井臣之願也肅宗初侍中崔光表曰彝及李韶朝列之中唯此二人出身官次本在臣右器能幹世又並為多近來參差便成替後計其階途雖應遷陟然恐班秩猶未賜等昔衞之公叔引下同舉晉之士丐推長伯游古人所高當時見許敢緣斯義乞降臣位一階授彼汎級齊行聖庭帖穆選詔加征西將軍冀州大中正雖年向六十加之風疾而自強人事孜孜無怠公私法集衣冠從事延請道俗修營齋講好善欽賢愛獎人物南北新舊莫不多之大起第宅微號華侈頗侮其疏宗舊戚不甚存紀時有怨憾焉榮宦之間未能止足屢表在秦州預有開援漢中之勳希加賞報積年不已朝廷患之第二子仲瑀上封事求銓別選格排抑武人不使預在清品由是衆口喧喧謗讟盈路立榜大巷剋期會集屠害其家彝殊無畏避之意父子安然神龜二年二月羽林虎賁幾將千人相率至尚書省詬罵求其長子尚書郎始均不獲以瓦石擊打公門上下畏懼莫敢討抑遂便持火虜掠道中薪蒿以杖石為兵器直造其第曳彝堂下捶辱極意唱呼焚其屋宇始均仲瑀當時踰北垣而走始均回救其父拜伏羣小以請父命羽林等就加毆擊生投之於烟火之中及得尸骸不復可識唯以髻中小釵為驗仲瑀傷重走免彝僅有餘命沙門寺與其比隣輿致於寺遠近聞見莫不惋駭彝臨終口占左右上啟曰臣自奉國及孫六世尸祿素餐負恩唯靦徒思竭智盡誠終然靡効臣第二息仲瑀所上之事益治實多既曰有益寧容默爾通呈有日未簡神聽豈圖衆忿乃至於此臣不能禍防未萌慮絕殃兆致令軍衆橫囂攻焚臣宅息始均仲瑀等叩請流血乞代臣死始均即陷塗炭仲瑀經宿方蘇臣年已六十宿被榮遇垂暮之秋忽見此苦顧瞻災酷古今無比臣傷至重殘氣假延望景顧時推漏就盡頃刻待終臣之命也知復何言若所上之書少為益國臣便是生以理全死與義合不負二帝於地下臣無餘恨矣一歸泉壤長離紫庭戀仰天顏誠痛無已不勝眷眷力喘奉辭伏願二聖加御珍膳覆露黔首壽保南嶽德與日昇臣夙被芻豢先後銜恩欲報之期昊天罔極亡魂有知不忘結草彝遂卒時年五十九官為收掩羽林凶強者八人斬之不能窮誅羣豎即為大赦以安衆心有識者知國紀之將墜矣喪還所焚宅與始均東西分斂於小屋仲瑀遂以創重避居滎陽至五月創得漸瘳始奔父喪詔賜布帛千匹靈太后以其累朝大臣特垂矜惻數月猶追言泣下謂諸侍臣曰吾為張彝飲食不御乃至首髮微有虧落悲痛之苦以至於此初彝曾祖幸所招引河東民為州裁千餘家後相依合至於罷入冀州積三十年析別有數萬戶故高祖比校天下民戶最為大州彝為黃門每侍坐以為言高祖謂之曰終當以卿為刺史酬先世誠效彝追高祖往旨累乞本州朝議未許彝亡後靈太后云彝屢乞冀州吾欲用之有人違我此意若從其請或不至是悔之無及乃贈使持節衞將軍冀州刺史諡文侯始均字子衡端潔好學有文才司徒行參軍遷著作佐郎世宗以彝先朝勤舊不幸疹廢特除始均長兼左民郎中遷員外常侍仍領郎始均才幹有美於父改陳壽魏志為編年之體廣益異聞為三十卷又著冠帶錄及諸賦數十篇今並亡失初大乘賊起於冀瀛之間遣都督元遙討平之多所殺戮積尸數萬始均以郎中為行臺忿軍士重以首級為功乃令檢集人首數千一時焚爇至於灰燼用息僥倖見者莫不傷心及始均之死也始末在於烟炭之間有燋爛之痛論者或亦推咎焉贈樂陵太守諡曰孝子暠襲祖爵武定中開府主簿齊受禪爵例降暠弟晏之武定中儀同開府中兵參軍仲瑀司空祭酒給事中子台儀同開府參軍事仲瑀弟珉著作佐郎, krp: ''}
