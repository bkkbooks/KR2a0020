  - {type: variant, offset: 2393, length: 12, content: 臨朝遣使弔慰追復伯爵正光, WYG: 所信待是時蠻賊充斥六軍將親討之飜乃上表諌止後蕭寳夤大敗於關西飜上表請為西軍死亡將士舉哀存而還者并加賑賚後拜度支尚書尋轉都官飜表曰臣往忝門下翼侍帳幄同時流輩皆以出離左右蒙數階之陟唯臣奉辭非但直去黄門今為尚書後更在}
