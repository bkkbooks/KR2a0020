  - {type: variant, offset: 2360, length: 0, content: '', WYG: 便即可永為重戍鎮防西北宜遣一良將加以配衣疑仍令監護婆羅門凡諸州鎮應徙之兵隨宜割配且田且戍雖外為置蠕蠕之舉内實防髙車之策一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙渡流沙即是我之外蕃髙車勍敵西北之虞可無過慮如其姦囬返覆孤恩背德者此不過為逋逃之冦於我何損今不早圖戎心一啓脫先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州燉煌及於西海躬行山谷要害之所親閱亭障逺近之宜商量士馬校練糧仗部分見定處置得所入春西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為羣正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度㣲似小損歳終大計其利實多髙車豺狼之心何可專信假令}
