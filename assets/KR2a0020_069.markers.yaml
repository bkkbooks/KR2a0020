  - {type: variant, offset: 2324, length: 0, content: '', WYG: 翔陳郡項人也父宣有才筆為劉彧青州刺史沈文秀府主簿皇興中東陽州平隨文秀入國而大將軍劉昶毎提引之言是其外祖淑之近親令與其府諮議參軍袁濟為宗宣時孤寒甚相依附及飜兄弟官顯與濟子洸演遂各凌競洸等乃經公府以相排斥飜少以才學擅美一時初為奉朝請景明初李彪在東觀飜為徐紇所薦彪引兼著作佐郎以參史事及紇被徙尋觧後遷司徒祭酒揚烈將軍}
