  - {type: variant, offset: 2418, length: 309, content: 雍州刺史諡文貞公初高祖之置中正從容謂祚曰并州中正卿家故應推王瓊也祚退謂密友曰瓊真偽今自未辨我家何為減之然主上直信李沖吹噓之說耳祚死後三歲而于忠死咸以祚為祟祚長子思恭弱冠州辟為主簿早卒思恭弟慶禮以第二子延伯繼延伯襲祖爵東光伯武定中驃騎大將軍將作大匠齊受禪爵例降思恭弟景尚字思和涉歷書傳曉星歷占候言事頗驗初為彭城王中軍府參軍遷員外郎司徒主簿太尉從事中郎公強當世善事權寵世號之曰郭尖肅宗時遷輔國將軍中散大夫轉中書侍郎未拜而卒年五十一子季方武定中膠州驃騎府長流參軍景尚弟慶禮字叔為祚所愛著作佐郎通直郎卒贈征虜將軍瀛州刺史子元貞武定末定州驃騎府長史張彝字慶賓清河東武城人曾祖幸慕容超東牟太守後率戶歸國世祖嘉之賜爵平陸侯拜平遠將軍, WYG: ''}
