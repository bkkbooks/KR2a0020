  - {type: variant, offset: 9397, length: 0, content: '', krp: 子思韶從亮征硤石以軍功賜爵武城子為冀州别駕敬默弟隠處青州州都亮以其賤出殊不經紀論者譏焉亮從父弟光韶事親以孝聞初除奉朝請光韶與弟光伯雙生操業相侔特相友愛遂經吏部尚書李沖讓官於光伯辭色懇至沖為奏聞髙祖嘉而許之太和二十年以光韶為司空行參軍復請讓從叔和曰臣誠㣲賤未登讓品屬逄皇朝恥無讓德和亦謙退辭而不當髙祖善之遂以和為廣陵王國常侍尋勑光韶兼祕書郎掌校華林御書肅宗初除青州治中後為司空騎兵參軍又兼司徒户曹出為濟州輔國府司馬刺史髙植甚知之政事多委訪焉遷青州平東府長史府觧勑知州事光韶清直明斷民吏畏愛之入為司空從事中郎以母老觧官歸養賦詩展意朝士屬和者數十人乆之徵為司徒諮議固辭不拜光韶性嚴毅聲韻抗烈與人平談常若震厲至於兄弟議論外聞謂為忿怒然孔懷雍睦人少逮之孝莊初河間邢杲率河北流民十餘萬衆攻逼州郡刺史元雋憂不自安州人乞光韶為長史以鎮之時陽平路回寓居齊土與杲潛相影響引賊入郭光韶臨機處分在難確然賊退之後刺史表光韶忠毅朝廷嘉之發使慰勞焉尋為東道軍司及元顥入洛自河以南莫不風靡而刺史廣陵王欣集文武以議所從欣曰北海長樂俱是同堂兄弟今宗祏不移我欲受赦諸君意各何如在坐之人莫不失色光韶獨抗言曰元顥受制梁國稱兵本朝拔本塞源以資讎敵賊臣亂子曠代少儔何但大王家事所宜切齒等荷朝眷未敢仰從長史崔景茂前瀛州刺史張烈前郢州刺史房叔祖徵士張僧皓咸云軍司議是欣乃斬顥使尋徵輔國將軍廷尉少卿未至除太尉長史加左將軍俄遷廷尉卿時祕書監祖瑩以贓罪被劾光韶必欲致之重法太尉陽城王徽尚書令臨淮王彧吏部尚書李神儁侍中李彧並勢望當時皆為瑩求寛光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎其執意不回如此永安末擾亂之際遂還鄉里光韶博學彊辯尤好理論至於人倫名教得失之間㩁而論之不以一毫假物家足於財而性儉吝衣馬敝痩食味麤薄始光韶在都同里人王蔓於夜遇盜害其二子孝莊詔黄門髙道穆令加檢捕一坊之内家别搜索至光韶宅綾絹錢布匱篋充積議者譏其矯嗇其家資産皆光伯所營光伯亡悉焚其契河間邢子才曾貸錢數萬後送還之光韶曰此亡弟相貸僕不知也竟不納刺史元弼前妻是光韶之繼室兄女而弼貪惏多諸不法光韶以親情亟相非責弼銜之時耿翔反於州界弼誣光韶子通與賊連結囚其合家考掠非理而光韶與之辯爭辭色不屈會樊子鵠為東道大使知其見枉理出之時人勸令詣樊陳謝光韶曰羊舌大夫已有成事何勞往也子鵠亦歎尚之後刺史侯淵代下疑懼停軍益都謀為不軌令數百騎夜入南郭劫光韶以兵愶之責以謀略光韶曰凡起兵者須有名義使君今日舉動直是作賊耳父老知復何計淵雖恨之敬而不敢害尋除征東將軍金紫光禄大夫不起光韶以世道屯邅朝廷屢變閉門却掃吉凶斷絶誡子孫曰吾自謂立身無慙古烈但以禄命有限無容希世取進在官以來不冒一級官雖不達經為九卿且吾平生素業足以遺汝官閥亦何足言也吾既運薄便經三娶而汝之兄弟各不同生合葬非古吾百年之後不須合也然贈諡之及出自君恩豈容子孫自求之也勿須求贈若違吾志如有神靈不享汝祀吾兄弟自幼及老衣服飲食未曾一片不同至於兒女官婚榮利之事未甞不先以推弟弟頃横禍權作松櫬亦可為吾作松棺使吾見之卒年七十一孝静初侍中賈思同申啓稱述光韶贈散騎常侍驃騎將軍青州刺史光韶弟光伯尚書郎青州别駕後以族弟休臨州遂申牃求觧尚書奏按禮始封之君不臣諸父昆弟封君之子臣昆弟不臣諸父封君之孫得盡臣計始封之君即是世繼之祖尚不得臣況今之刺史既非世繼而得行臣吏之節執笏稱名者乎檢光伯請觧率禮不愆請宜許遂以明道敎靈太后令從之尋除北海太守有司以其更滿依例奏代肅宗詔曰光伯自莅海沂清風逺著兼其兄光韶復能辭榮侍養兄弟忠孝宜有甄録可更申三年以厲風化後歴太傅諮議參軍前廢帝時崔祖螭張僧皓起逆攻東陽旬日之間衆十餘萬刺史東萊王貴平欲令光伯出城慰勞兄光韶曰城民陵縱為日已乆人人恨之其氣甚盛古人有言衆怒如水火焉以此觀之今日非可慰諭止也貴平彊之光韶曰使君受委一方董攝萬里而經略大事不與國士圖之所共腹心皆趨走羣小既不能綏遏以杜其萌又不能坐觀待其衰挫蹙迫小弟從為無名之行若單騎獨往或見拘縶若以衆臨之勢必相拒敵懸見無益也貴平逼之不得已光伯遂出城數里城民以光伯兄弟羣情所繫慮人劫留防衛者衆外人疑其欲戰未及曉諭為飛矢所中卒贈征東將軍青州刺史子滔武定末殷州别駕}
