  - {type: variant, offset: 7907, length: 0, content: '', krp: 驃騎儀同如故遷尚書令加侍中崇在官和厚明於決斷受納辭訟必理在可推始為下筆不徒爾收領也然性好財貨販肆聚斂家資巨萬營求不息子世哲為相州刺史亦無清白狀鄴洛市鄽收擅其利為時論所鄙蠕蠕主阿那瓌率衆犯塞詔崇以本官都督北討諸軍事以討之崇辭於顯陽殿戎服武飾志氣奮揚時年六十九幹力如少肅宗目而壯之朝廷莫不稱善崇遂出塞三千餘里不及賊而還後北鎮破落汗拔陵反叛所在響應征北將軍臨淮王彧大敗於五原安北將軍李叔仁尋敗於白道賊衆日甚詔引丞相令僕尚書侍中黄門於顯陽殿詔曰朕比以鎮人搆逆登遣都督臨淮王剋時除翦軍屇五原前鋒失利二將殞命兵士挫􅀈又武川乖防復陷凶手恐賊勢侵滛寇連恒朔金陵在彼夙夜憂惶諸人宜陳良策以副朕懷吏部尚書元脩義曰彊寇充斥事須得討臣謂須得重貴鎮壓恒朔總彼師旅備衛金陵詔曰去歳阿那瓌叛逆遣李崇令北征崇遂長驅塞北返斾榆闗此亦一時之盛崇乃上表求}
  - {type: variant, offset: 7908, length: 2, content: 封曲, WYG: 鎮為州罷削舊貫朕于時以舊典難革不許其請尋李崇此表開諸鎮非異之心致有今日之事但既往難追為復略論此耳朕以李崇國戚望重器識英斷意欲還遣崇行總督三軍揚旌恒朔除彼羣盜諸人謂可爾以不僕射蕭寶夤等曰陛下以舊都在北憂慮金陵臣等實懷悚息李崇德位隆重社稷之臣陛下此遣實合羣望崇啟曰臣實無用猥蒙殊寵位妨賢路遂充北伐徒勞將士無勲而還慙負聖朝於今莫已臣以六鎮幽垂與賊接對鳴柝聲弦弗離旬朔州名差重於鎮謂實可悅彼心使聲敎日揚㣲塵去塞豈敢導此凶源開生賊意臣之愆負死有餘責屬陛下慈寛賜全腰領今更遣臣北行正是報恩改過所不敢辭但臣年七十自惟老疾不堪敵塲更願英賢收功盛日於是詔崇以本官加使持節開府北討大都督撫軍將軍崔暹鎮軍將軍廣陵王淵皆受崇節度又詔崇子光禄大夫神軌假平北將軍隨崇北討崇至五原崔暹大敗于白道之北賊遂并力攻崇崇與廣陵王淵力戰累破賊衆相持至冬乃引還平城淵表崇長史祖瑩詐増功級盜没軍資崇坐免官爵徵還以後事付淵後徐州刺史元法僧以彭城南叛時除安樂王鑒為徐州刺史以討法僧為法僧所敗單馬奔歸乃詔復崇官爵為徐州大都督節度諸軍事㑹崇疾篤乃以衛將軍安豐王延明代之除改開府相州刺史侍中將軍儀同並如故孝昌元年薨於位時年七十一贈侍中驃騎大將軍司徒公雍州刺史諡曰武康後重贈太尉公增邑一千户餘如故長子世哲性輕率供奉豪侈少經征役頗有將用自司徒中兵參軍超為征虜將軍驍騎將軍尋遷後將軍為三闗别將討羣蠻大破之斬蕭衍龍驤將軍文思之等還拜鴻臚少卿性傾巧善事人亦以貨賂自達髙肇劉騰之處勢也皆與親善故世號為李錐肅宗末遷宗正卿加平南將軍轉大司農卿仍本將軍又改授太僕卿加鎮東將軍尋出為相州刺史將軍如故世哲至州斥逐細人遷徙佛寺逼買其地廣興第宅百姓患之崇北征之後徵兼太常卿御史髙道穆毁發其宅表其罪過後除鎮西將軍涇州刺史賜爵衛國子正光五年七月卒賻帛五百疋朝服一襲贈散騎常侍衛將軍吏部尚書冀州刺史子如故世哲弟神軌受父爵陳留侯自給事中稍遷員外常侍光禄大夫累出征討頗有將領之氣孝昌中為靈太后寵遇勢傾朝野時云見幸帷幄與鄭儼為雙時人莫能明也頻遷征東將軍武衛將軍給事黄門侍郎常領中書舎人時相州刺史安樂王鑒據州反詔神軌與都督源子邕等討平之武泰初蠻帥李洪扇動諸落伊闕已東至於鞏縣多被燒劫詔神軌為都督破平之尒朱榮之向洛也復為大都督率衆禦之出至河橋値北中不守遂便退還尋與百官候駕於河隂仍遇害焉建義初贈侍中驃騎大將軍司空公相州刺史諡曰烈崔亮字敬儒清河東武城人也父元孫劉駿尚書郎劉彧之僭立也彧青州刺史沈文秀阻兵叛之彧使元孫討文秀為文秀所害亮母房氏擕亮依冀州刺史崔道固於歴城道固即亮之叔祖也及慕容白曜之平三齊内徙桑乾為平齊民時年十歳常依季父幼孫居家貧傭書自業時隴西李沖當朝任事亮從兄光往依之謂亮曰安能乆事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書於市安能看人眉睫乎光言之於沖沖召亮與語因謂亮曰比見卿先人相命論使人胷中無復怵廹之念今遂亡本卿能記之不亮即為誦之涕淚交零聲韻不異沖甚奇之迎為館客沖謂其兄子彦曰大崔生寛和篤雅汝宜友之小崔生峭整清徹汝宜敬之二人終將大至沖薦之為中書博士轉議郎尋遷尚書二千石郎髙祖在洛欲創革舊制選置百官謂羣臣曰與朕舉一吏部郎必使才望兼允者給卿三日假又一日髙祖曰朕已得之不煩卿輩也馳驛徵亮兼吏部郎俄為太子中舎人遷中書侍郎兼尚書左丞亮雖歴顯任其妻不免親事舂簸髙祖聞之嘉其清貧詔帶野王令世宗親政遷給事黄門侍郎仍兼吏部郎領青州大中正亮自參選事垂將十年廉慎明决為尚書郭祚所委毎云非崔郎中選事不辦尋除散騎常侍仍為黄門遷度支尚書領御史中尉自遷都之後經略四方又營洛邑費用甚廣亮在度支别立條格歳省億計又議修汴蔡二渠以通邊運公私頼焉侍中廣平王懷以母弟之親左右不遵憲法勑亮推治世宗禁懷不通賓客者乆之後因宴集懷恃親使忿欲陵突亮亮乃正色責之即起於世宗前脫冠請罪遂拜辭欲出世宗曰廣平麤疎向來又醉卿之所悉何乃如此也遂詔亮復坐令懷謝焉亮外雖方正内亦承候時情宣𫝊左右郭神安頗被世宗識遇以弟託亮亮引為御史及神安敗後因集禁中世宗令兼侍中盧昶宣㫖責亮曰在法官何故受左右囑請亮拜謝而已無以上對轉都官尚書又轉七兵領廷尉卿加散騎常侍中正如故徐州刺史元昞撫御失和詔亮馳驛安撫亮至劾昞處以大辟勞賚綏慰百姓怗然除安西將軍雍州刺史城北渭水淺不通船行人艱阻亮謂寮佐曰昔杜預乃造河梁況此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可為浮橋汎長無恒又不可施柱恐難成立亮曰昔秦居咸}
