  - {type: 'tls:seg', offset: 7818, content: '', id: KR2a0020_ZHSJ_066-d66p85s31}
  - {type: variant, offset: 7818, length: 0, content: '', WYG: 不行崇上表曰臣聞世室明堂顯於周夏二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黄髮以詢格言育青襟而敷典式用能享國乆長風徽萬祀者也故孔子稱巍巍乎其有成功郁郁乎其有文章此其盛矣爰曁亡秦政失其道坑儒滅學以蔽黔首國無黌序之風野有非時之役故九服分崩祚終二世炎漢勃興更修儒術文景已降禮樂復彰化致昇平治幾刑措故西京有六學之美東都有三本之盛莫不紛綸掩藹響流無已逮自魏晋撥亂相因兵革之中學校不絶遺文燦然方軌前代仰惟髙祖孝文皇帝禀聖自天道鏡今古徙馭嵩河光宅函洛模唐虞以革軌儀規周漢以新品制列敎序於鄉黨敦詩書於郡國使揖讓之禮横被於崎嶇歌詠之音聲溢於仄陋但經始事殷戎軒屢駕未遑多就弓劔弗追}
