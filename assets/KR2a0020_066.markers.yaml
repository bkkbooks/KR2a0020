  - {type: variant, offset: 7718, length: 0, content: '', WYG: 屢賜璽書慰勉之賞賜珍異歳至五三親待無與為比衍毎歎息服世宗之能任崇也肅宗踐祚褒賜衣馬及蕭衍遣其遊擊將軍趙祖悅襲據西硤石更築外城逼徙緣淮之人於城内又遣二將昌義之王神念率水軍泝淮而上規取壽春田道龍寇邊城路長平寇五門胡興茂寇開霍揚州諸戍皆被寇逼崇分遣諸將與之相持密裝船艦二百餘艘敎之水戰以待臺軍蕭衍霍州司馬田休等率衆寇建安崇遣統軍李神擊走之又命邊城戍主邵申賢要其走路破之於濡水俘斬三千餘人靈太后璽書勞勉許昌縣令兼紵麻戌主陳平玉南引衍軍以戌歸之崇自秋請援表至十餘}
