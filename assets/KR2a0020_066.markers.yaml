  - {type: variant, offset: 8958, length: 197, content: 平南將軍江州刺史曲江縣開國公邑一千戶虎牙為冠軍將軍員外散騎常侍豫寧縣開國伯邑五百戶正始初蕭衍征虜將軍趙祖悅築城於水東與潁川接對置兵數千欲為攻討之本伯之進軍討祖悅大破之乘勝長驅入城刺祖悅三創賊衆大敗進討南城破賊諸部斬獲數千二年夏除伯之光祿大夫虎牙遷前軍將軍孟表字武達濟北蛇丘人也自云本屬北地號索里諸孟青徐內屬後表因事南渡仕蕭鸞為馬頭太守太和十八年表據郡歸誠除輔國將軍南兗州刺史領馬頭太守賜爵譙縣侯, WYG: ''}
