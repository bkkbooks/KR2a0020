  - {type: variant, offset: 5763, length: 328, content: 清貧然為政寬緩不能禁止盜賊而大興水田於公私頗有利益在州數年年六十一卒子保沖太和中奉朝請大將軍宋王外兵參軍後為南徐州冠軍長史二十一年坐援漣口退敗有司處之死刑高祖詔曰保沖文秀之子可特原命配洛陽作部終身既而獲免世宗時卒於下邳太守房天樂者清河人滑稽多智先為青州別駕文秀拔為長史督齊郡州府之事一以委之卒于京師弟子嘉慶漁陽太守嘉慶從弟瑚璉長廣太守文秀族子嵩聰敏有筆札文秀以為司馬甚器任之隨文秀至懷州文秀卒後依宋王劉昶昶遇之無禮憂愧飢寒未幾而卒文秀族子陵字道通太和十八年高祖南伐陵攜族孫智度歸降引見於行宮陵姿質妍偉辭氣辯暢高祖奇之禮遇亞於王肅授前軍將軍後監南徐州諸軍事中壘將軍南徐州刺史尋假節龍驤將軍二十二年秋進持節冠軍將軍及高祖崩陵陰有叛心長史趙儼密言于朝廷尚書令王肅, WYG: 矣崇沉}
