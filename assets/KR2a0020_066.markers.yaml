  - {type: 'tls:seg', offset: 1808, content: '', id: KR2a0020_ZHSJ_066-d66p22s3}
  - {type: variant, offset: 1809, length: 512, content: 懷吉以本任為巒軍司永平初分梁州晉壽為益州除征虜將軍益州刺史以元愉未平中山王英為征東將軍討之詔懷吉為英軍司未發而愉平蕭衍遣將寇陷郢州之三關詔英南討懷吉仍為軍司以義陽危急令懷吉馳驛先赴時豫州城民白早生殺刺史以懸瓠入蕭衍衍將齊苟仁率衆守城於是自懸瓠以南至于安陸惟義陽一城而已懷吉與郢州刺史婁悅督厲將士且守且戰卒全義陽與英討復三關諸戍後鎮東將軍盧昶救朐山與賊相持詔懷吉為昶軍司及昶敗懷吉得不坐延昌中以本將軍除梁州刺史南秦氐反攻逼武興懷吉遣長史崔纂司馬韋弼別駕范珦擊平之進號右將軍正光初除後將軍汾州刺史四年卒贈平北將軍并州刺史懷吉本不厲清節及為汾州偏有聚納之響自以支庶餌誘勝己共為婚姻多攜親戚悉令同行兼為之彌縫恣其取受而將勞賓客曲盡物情送去迎來不避寒熱性少言每有接對但默然而退既指授先期人馬之數左右密已記錄俄而酒饌相尋芻粟繼至逮于將別贈以錢縑下及厮傭咸過本望其延納貴賤若此懷吉弟懷直京兆內史衞大將軍左光祿大夫懷直弟懷朴農太守襄陵男懷朴弟懷景征南將軍河東太守安定男卒贈持節都督北徐兗東徐三州諸軍事驃騎大將軍儀同三司徐州刺史懷景弟懷儁撫軍將軍光祿大夫汾陰男出為征南將軍益州刺史天平初代還至梁州與刺史元羅俱為蕭衍將蘭欽所擒送江南衍見懷儁謂之, WYG: ''}
