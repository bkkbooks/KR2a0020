  - {type: variant, offset: 6987, length: 568, content: 亂常君臣交爭江外州鎮中分為兩東西抗峙已淹歲時民庶窮於轉輸甲兵疲於戰鬬事救於目前力盡於麾下無暇外維州鎮綱紀庶方藩𣏬立孤存而已不乘機電掃廓彼蠻疆恐後之經略未易於此且壽春雖平三面仍梗鎮守之宜實須豫設義陽差近淮源利涉津要朝廷行師必由此道若江南一平有事淮外須乘夏水汎長列舟長淮師赴壽春須從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼衆不過須精卒一萬二千然行師之法貴張形勢請使兩荊之衆西擬隨雍揚州之卒頓于建安得捍三關之援然後二豫之軍直據南關對抗延頭遣一都督總諸軍節度季冬進師迄于春末弗過十旬克之必矣世宗納之遣鎮南元英攻義陽益宗遣其息魯生領步騎八千斷賊粮運并焚其鈞城積聚衍戍主趙文舉率衆拒戰魯生破之獲文舉及小將胡建興古皓莊元仲等斬五千餘級溺死千五百人倉米運舟焚燒蕩盡後賊寧朔將軍楊僧遠率衆二千寇逼蒙籠益宗命魯生與戍主奇道顯逆擊破之追奔十里俘斬千餘進號平南將軍又詔益宗率其部曲并州鎮文武與假節征虜將軍太僕少卿宇文福綏防蠻楚加安南將軍增封一百戶賜帛二千匹白早生反於豫州詔益宗曰懸瓠要藩密邇崧潁南疆之重所寄不輕而羣小猖狂忽構釁逆殺害鎮主規成反叛此而可忍孰不可容即遣尚書邢巒總精騎五萬星馳電驅征南將軍中山王英統馬步七萬絡繹繼發量此蟻寇唯當逃奔知將軍志翦犲狼以清邊境節義慷慨良在可嘉非蹇蹇之至何以能爾深戢誠款方相委託故遣中書舍人趙文相具宣朕懷往還之規口別指, WYG: 乃}
