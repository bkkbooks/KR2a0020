  - {type: variant, offset: 7907, length: 0, content: '', WYG: 驃騎儀同如故遷尚書令加侍中崇在官和厚明於決斷受納辭訟必理在可推始為下筆不徒爾收領也然性好財貨販肆聚斂家資巨萬營求不息子世哲為相州刺史亦無清白狀鄴洛市鄽收擅其利為時論所鄙蠕蠕主阿那瓌率衆犯塞詔崇以本官都督北討諸軍事以討之崇辭於顯陽殿戎服武飾志氣奮揚時年六十九幹力如少肅宗目而壯之朝廷莫不稱善崇遂出塞三千餘里不及賊而還後北鎮破落汗拔陵反叛所在響應征北將軍臨淮王彧大敗於五原安北將軍李叔仁尋敗於白道賊衆日甚詔引丞相令僕尚書侍中黄門於顯陽殿詔曰朕比以鎮人搆逆登遣都督臨淮王剋時除翦軍屇五原前鋒失利二將殞命兵士挫􅀈又武川乖防復陷凶手恐賊勢侵滛寇連恒朔金陵在彼夙夜憂惶諸人宜陳良策以副朕懷吏部尚書元脩義曰彊寇充斥事須得討臣謂須得重貴鎮壓恒朔總彼師旅備衛金陵詔曰去歳阿那瓌叛逆遣李崇令北征崇遂長驅塞北返斾榆闗此亦一時之盛崇乃上表求}
