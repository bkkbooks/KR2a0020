  - {type: variant, offset: 9156, length: 200, content: 渦陽後蕭鸞遣其豫州刺史裴叔業攻圍六十餘日城中食盡唯以朽革及草木皮葉為粮表撫循將士勠力固守會鎮南將軍王肅解義陽之圍還以救之叔業乃退初有一南人自云姓邊字叔珍攜妻息從壽春投表云慕化歸國未及送闕便值叔業圍城表後察叔珍言色頗疑有異即加推覈乃云是叔業姑兒為叔業所遣規為內應所攜妻子並亦假妄表出叔珍於北門外斬之於是人情乃安高祖嘉其誠績封汶陽縣開國伯邑五百戶遷征虜將軍濟州刺史為散騎常侍光祿大夫進號平西將軍世宗末降平, WYG: ''}
