  - {type: variant, offset: 212, length: 1, content: 彭, krp: 上洛勑發陜秦二州兵送崇至治崇辭曰邊人失和本怨刺史奉詔代之自然易帖但須一宣詔㫖而已不勞發兵自防使懷懼也髙祖從之乃輕將數十騎馳到上洛宣詔綏慰當即帖然尋勒邊戍掠得蕭賾人者悉令還之南人感德仍送荆州之口二百許人兩境交和無復烽燧之警在治四年甚有稱績召還京師賞賜隆厚以本將軍除兗州刺史兗土舊多劫盜崇乃村置一樓樓懸一鼓盜發之處雙槌亂擊四面諸村始聞者撾鼓一通次復聞者以二為節次後聞者以三為節各擊數千槌諸村聞鼓皆守要路是以盜發俄頃之間聲布百里之内其中險要悉有伏人盜竊始發便爾擒送諸州置樓懸鼓自崇始也後例降為侯改授安東將軍車駕南征驃騎大將軍咸陽王禧都督左翼諸軍事詔崇以本官副焉徐州降人郭陸聚黨作逆人多應之搔擾南北崇遣髙平人卜冀州詐稱犯罪逃亡歸陸陸納之以為謀主數月冀州斬陸送之賊徒潰散入為河南尹後車駕南討漢陽崇行梁州刺史氐楊靈珍遣弟婆羅與子雙領步騎萬餘襲破武興與蕭鸞相結詔崇為使持節都督隴右諸軍事率衆數萬討之崇槎山分進出其不意表裏以襲羣氐皆棄靈珍散歸靈珍衆減大半崇進據赤土靈珍又遣從弟建率五千人屯龍門躬率精勇一萬據鷲硤龍門之北數十里中伐樹塞路鷲硤之口積大木聚礌石臨崖下之以拒官軍崇乃命綂軍慕容拒率衆五千從他路夜襲龍門破之崇乃自攻靈珍靈珍連戰敗走俘其妻子崇多設疑兵襲剋武興蕭鸞梁州刺史隂廣宗遣參軍鄭猷王思考率衆援靈珍崇大破之并斬婆羅首殺千餘人俘獲猷等靈珍走奔漢中髙祖在南陽覽表大悅曰使朕無西顧之憂者李崇之功也以崇為都督梁秦二州諸軍事本將軍梁州刺史髙祖手詔曰今仇隴剋清鎮捍以德文人威惠既宣寔允逺寄故勑受梁州用寧邊服便可善思經略去其可除安其可育公私所患悉令芟夷及靈珍偷據白水崇擊破之靈珍逺遁世宗初徵為右衛將軍兼七兵尚書尋加撫軍將軍正尚書轉左衛將軍相州大中正魯陽蠻柳北喜魯北燕等聚衆反叛諸蠻悉應之圍逼湖陽遊擊將軍李暉先鎮此}
