  - {type: variant, offset: 1545, length: 0, content: '', WYG: 詔曰應敵制變算非一途救左擊右疾雷均勢今朐山蟻寇乆結未殄賊衍狡詐或生詭劫宜遣銳兵備其不意崇可都督淮南諸軍事坐敦威重遙運聲算延昌初加侍中車騎將軍都督江西諸軍事刺史如故先是壽春縣人茍泰有子三歳遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言已子並有隣證郡縣不能斷崇曰此易知耳令二父與兒各在别處禁經數旬然後遣人告之曰君兒遇患向已暴死有敎觧禁可出奔哀也茍泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇察知之乃以兒還泰詰奉伯詐狀奉伯乃款引云先亡一子故妄認之}
