義雲尚書騎兵郎中祖歸官至建寧太守子義遠武定中平原太守義遠弟義顯義儁性並豪率天平已後蕭衍使人還往經歷兗城前後州將以義儁兄弟善營鮭膳器物鮮華常兼長史接宴賓客義顯左將軍太中大夫義儁歷司空主簿兗州別駕而卒祖旋太尉行參軍鎮遠將軍卒贈都官尚書齊兗二州刺史子義真太尉行參軍衆敬弟衆愛隨兄歸國以勳為第一客賜爵鉅平侯卒贈冠軍將軍徐州刺史諡曰康子聞慰字子安有器幹襲爵例降為伯拜泰山太守入為尚書郎本州中正加威遠將軍出為徐州平東府長史帶彭城內史永平中遷中散大夫加龍驤將軍延昌初除清河內史因以疾辭復為龍驤中散又試守廣平內史正光初相州刺史中山王熙起兵謀誅元叉聞慰斬其使發兵拒之在任寬謹百姓愛附後叉以聞慰忠於己遷持節平東將軍滄州刺史甚有政績後以本軍除散騎常侍東道行臺尋為都督安樂王鑒軍司孝昌元年春徐州刺史元法僧反聞慰與鑒攻之為法僧所敗奔還京師被劾遇赦免其年卒年五十七贈散騎常侍安東將軍兗州刺史伯如故諡曰恭子祖彥字脩賢涉獵書傳風度閑雅為時所知以侍御史為元法僧監軍法僧反逼祖彥南入永安中得還歷中書侍郎襲爵鉅平伯中軍將軍光祿大夫天平四年卒年五十贈都督兗濟二州諸軍事征東將軍尚書左僕射兗州刺史祖彥弟哲永安末祕書郎諸畢當朝不乏榮貴但幃薄不修為時所鄙申纂者本魏郡人申鍾曾也皇始初太祖平中山纂宗室南奔家于濟陰及在無鹽劉彧用為兗州刺史顯祖曰申纂既不識機又不量力進不能歸正朔退不能還江南守孤城於危亡之地欲建功立節豈可得乎纂既敗子景義入國太和中為散員士宋王劉昶國侍郎景明初試守濟陰郡揚州車騎府錄事參軍右司馬常珍奇者汝南人也為劉駿司州刺史亦與薛安都等推立劉子勛子勛敗遣使馳告長社鎮請降顯祖遣殿中尚書元石為都將率衆赴之中書博士鄭羲參石軍事進至上蔡珍奇率文武來迎羲說石令徑入城語在羲傳事定以珍奇為持節平南將軍豫州刺史河內公珍奇表曰臣昔蒙劉氏生成之恩感義亡身志陳報答遂與雍州刺史袁顗豫州刺史殷琰等共唱大義奉戴子勛纂承彼曆大運未集遂至分崩而劉彧滔天殺主篡立蒼生殄悴危於綴旒伏惟陛下龍姿鳳儀光格四表凡在黔黎延屬象魏所願天地垂仁亟圖南服宜遣文檄喻以吉凶使江東之地離心草靡荊雍九州北面請吏乞高臣官名更遣雄將秣馬五千助臣經討并賜威儀震動江外長江已北必可定矣臣雖不武乞備前驅進據之宜更在處分敢冒愚款推誠上聞機運可乘實在茲日珍奇雖有虛表而誠款未純歲餘徵其子超超母胡氏不欲超赴京師密懷南叛時汝徐未平元石自出攻之珍奇乘虛於懸瓠反叛燒城東門斬三百餘人虜掠上蔡安城平輿三縣居民屯于灌水石馳往討擊大破之會日闇放火燒其營珍奇乃匹馬逃免其子超走到苦城為人所殺小子沙彌囚送京師刑為閹人沈文秀字仲遠吳興武康人伯父慶之劉駿司空公文秀初為郡主簿稍遷建威將軍青州刺史和平六年劉子業為其叔彧所殺文秀遂與諸州推立劉子勛及子勛敗皇興初文秀與崔道固俱以州降請師應接顯祖遣平東將軍長孫陵等率騎赴之會劉彧遣文秀弟文炳來喻之文秀復歸於彧彧以文秀為輔國將軍刺史如故後慕容白曜既克升城引軍向歷下白曜復遣陵等率萬餘人長驅至東陽文秀始欲降以軍人虜掠遂有悔心乃嬰城固守陵乃引師軍於清西白曜既下歷城乃率大衆并力攻討長圍數匝自夏至春始克文秀取所持節衣冠儼然坐於齋內亂兵入曰文秀何在文秀厲聲曰身是執而裸送于白曜左右令拜文秀曰各二國大臣無相拜之禮白曜忿之乃至撾撻後還其衣為之設饌遂與長史房天樂司馬沈嵩等鎖送京師面縛數罪宥死待為下客給以粗衣蔬食顯祖重其節義稍亦加禮之拜為外都下大夫太和三年遷外都大官高祖嘉文秀忠於其國賜絹綵二百匹後為南征都將臨發賜以戎服尋除持節平南將軍懷州刺史假吳郡公, krp: 聼}
