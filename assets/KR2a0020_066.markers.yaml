  - {type: variant, offset: 8431, length: 2, content: 處遇, WYG: 貢才止求其文不取其理察孝亷唯論章句不及治道立中正不考人才行業空辨氏姓髙下至於取士之途不溥沙汰之理未精而舅屬當銓衡宜須改張易調如之何反為停年格以限之天下士子誰復修厲名行哉亮答書曰汝所言乃有深致吾乗時邀幸得為吏部尚書當其壯也尚不如人況今朽老而居帝難之任常思同升舉直以報明主之恩盡忠竭力不為貽厥之累昨為此格有由而然今已為汝所恠千載之後誰知我哉可静念吾言當為汝論之吾兼正六為吏部郎三為尚書銓衡所宜頗知之矣但古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃與天下羣賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七況今日之選専歸尚書以一人之鑒照察天下劉毅所云一吏部兩郎中而欲究竟人物何異以管闚天而求其博哉今勲人甚多}
