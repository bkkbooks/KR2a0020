  - {type: variant, offset: 8663, length: 286, content: 行宮巒字仲舒營陽人真君末隨父南叛雖長自江外言語風氣猶同華夏性疏武不多識文字高祖引巒於庭問其南事巒怖不能對數顧景曜景曜進代父答申蕭鸞篡襲始終辭理橫出言非而辯高祖異焉以巒為越騎校尉景曜為員外郎謀欲南叛坐徙朔州及車駕南討漢陽召巒從軍景曜至洛陽密啟其父必當奔叛軍次魯陽巒單騎南走過南陽新野歷告二城以魏軍當至戒之備防房伯玉劉忌並云無足可慮巒曰不然軍勢甚盛至境首北向哭呼景曜云吾百口在彼事理須還不得顧汝一子也景曜鎖詣行在所數而斬之又有陳伯之者下邳人也以勇力自効仕於江南為鎮南大將軍江州刺史豐城縣開國公景明三年伯之遣使密表請降并遣其子冠軍將軍徐州刺史永昌縣開國侯虎牙為質四年以伯之為持節, WYG: 河隂贈}
