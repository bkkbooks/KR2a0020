  - {type: variant, offset: 7911, length: 5, content: 縣開國伯益, WYG: 横橋渡渭以像閣道此即以柱為橋今唯慮長柱不可得耳會天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋亮性公清敏于斷決所在並號稱職三輔服其德政世}
