  - {type: variant, offset: 2375, length: 3370, content: 可言懷儁便乞歸衍聽還國興和中卒子湛儒襲武定中司空水曹參軍齊受禪爵例降真度諸子既多其母非一同產相朋因有憎愛興和中遂致訴列云以毒藥相害顯在公府發揚疵釁時人焉畢衆敬小名捺東平須昌人少好弓馬射獵交結輕果常於疆境盜掠為業劉駿為徐兗刺史辟為部從事駿既竊號歷其泰山太守冗從僕射及劉彧殺子業而自立遣衆敬出詣兗州募人到彭城刺史薛安都召與密謀云晉安有上流之名且孝武第三子當共卿為計西從乃矯彧命以衆敬行兗州事衆敬從之時兗州刺史殷孝祖留其妻子率文武二千人赴彧使司馬劉文石守城衆敬率衆取瑕丘殺文石安都與孝祖先不相協命衆敬誅孝祖諸子衆敬不得已遂殺之州內悉附唯東平太守申纂據無鹽城不與之同及彧平子勛授纂兗州刺史會安都引國授軍經其城下纂閉門城守深恨衆敬會有人發衆敬父墓遂令其母骸首散落衆敬發哀行服拷掠近墓細民死者十餘人又疑纂所為弟衆愛為安都長史亦遣人密至濟陰掘纂父墓以相報答及安都以城入國衆敬不同其謀子元賓以母并百口悉在彭城恐交致禍日夜啼泣遣請衆敬衆敬猶未從之衆敬先已遣表謝彧彧授衆敬兗州刺史而以元賓有他罪獨不捨之衆敬拔刀斫柱曰皓首之年唯有此子今不原貸何用獨全及尉元至遂以城降元遣將入城事定衆敬悔恚數日不食皇興初就拜散騎常侍寧南將軍兗州刺史賜爵東平公與中書侍郎李璨對為刺史慕容白曜攻克無鹽申纂為亂兵所傷走出被擒送於白曜白曜無殺纂之意而城中火起纂創重不能避為火所燒死衆敬聞克無鹽懼不殺纂乃與白曜書并表朝廷云家之禍酷皆由於纂聞纂死乃悅二年與薛安都朝于京師因留之賜甲第一區後復為兗州刺史將軍如故徵還京師衆敬善自奉養食膳豐華必致他方遠味年已七十鬢髮皓白而氣力未衰跨鞍馳騁有若少壯篤於姻類深有國士之風張讜之亡躬往營視有若至親太和中高祖賓禮舊老衆敬與咸陽公高允引至方山雖文武奢儉好尚不同然亦與允甚相愛敬接膝談款有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具銀裝劍一口刺虎矛一枚仙人文綾一百匹文明太后高祖引見於皇信堂賜以酒饌車一乘馬三匹絹二百匹勞遣之十五年十月卒詔於兗州賜絹一千匹以供葬事子元賓少而豪俠有武幹涉獵書史為劉駿正員將軍與父同建勳誠及至京師俱為上客賜爵須昌侯加平遠將軍後以元賓勳重拜使持節平南將軍兗州刺史假彭城公父子相代為本州當世榮之時衆敬以老還鄉常呼元賓為使君每於元賓聽政之時乘輿出至元賓所先遣左右敕不聽起觀其斷決忻忻然喜見顏色衆敬善持家業尤能督課田產大致儲積元賓為政清平善撫民物百姓愛樂之以父憂解任喪中遙授長兼殿中尚書其年冬末卒贈撫軍將軍衞尉卿諡曰平賜帛八百匹元賓入國初娶東平劉氏有四子祖朽祖髦祖歸祖旋賜妻元氏生二子祖榮祖暉祖朽最長祖暉次祖髦故事前妻雖先有子後賜之妻子皆承嫡所以劉氏先亡祖暉不服重元氏後卒祖朽等三年終禮祖榮早卒子義允襲祖爵東平公例降為侯陵江將軍給事中卒子僧安襲祖朽身長八尺腰帶十圍歷涉經史好為文詠性寬厚善與人交襲父爵須昌侯例降為伯起家員外郎尚書郎治書侍御史加寧遠將軍本州中正正始三年蕭衍將蕭及先率步騎二萬入寇兗州及先令別帥角念屯于蒙山以祖朽為統軍假寧朔將軍隸邢巒討之祖朽開誘有方降者相繼賊出逆戰祖朽大破之賊走還柵祖朽夜又焚擊賊徒潰散追討百餘里斬獲及赴沂水死者四千餘人斬龍驤將軍矯道儀寧朔將軍王季秀以功封南城縣開國男食邑二百戶歷散騎侍郎中書侍郎加龍驤將軍延昌末安南王志出討荊沔以祖朽為志軍司兼給事黃門侍郎尋遷司空長史神龜末除持節東豫州刺史將軍如故祖朽善撫邊人清平有信務在安靜百姓稱之還除前將軍太尉長史兼尚書北道行臺孝昌初除持節本將軍南兗州刺史尋授度支尚書行定州未之職改授安東將軍瀛州刺史為賊帥鮮于脩禮攻圍積旬拒守自固病卒於州贈衞將軍吏部尚書兗州刺史祖朽無子以弟祖歸子義暢為後襲爵義暢傾巧無士業善通時要歷尚書郎中侍郎兗州刺史大中正中軍將軍通直散騎常侍太昌初車騎將軍尋除散騎常侍天平中坐與北豫州山賊張儉通伏法祖髦起家奉朝請兄祖朽別封南城以須昌侯回授之神龜初累遷揚烈將軍東平太守後為本州別駕卒於官子義和襲卒於右將軍太中大夫贈散騎常侍安東將軍兗州刺史子仁超義和第六弟義亮性豪疏歷尚書郎中書舍人天平中與舍人韋鴻坐泄密賜盡於宅祖暉早有器幹自奉朝請稍遷鎮遠將軍前軍將軍直後正始中除龍驤將軍東郡太守入為驍騎將軍加征虜將軍後試守勃海郡熙平中拜潁川太守神龜初除右將軍豳州刺史入為平東將軍光祿大夫正光五年豳州民反招引隴賊攻逼州城以祖暉前在州日得民情和復授平西將軍豳州刺史假安西將軍為別將以討之祖暉且戰且前突圍入治孝昌初北海王顥救至城圍始解以全城之勳封新昌縣開國子食邑四百戶後值蕭寶夤退敗祖暉乃拔城東趣華州坐免官爵尋假征虜將軍行豳州事建義中詔復州爵加撫軍將軍永安中祖暉從大嶺柵規入州城于時賊帥叱干騏驎保太子壁祖暉擊破之而賊宿勤明達復攻祖暉祖暉兵少糧竭軍援不至為賊所乘遂歿時年五十長子義勰襲爵武定中開府中郎齊受禪爵例降義勰弟義雲尚書騎兵郎中祖歸官至建寧太守子義遠武定中平原太守義遠弟義顯義儁性並豪率天平已後蕭衍使人還往經歷兗城前後州將以義儁兄弟善營鮭膳器物鮮華常兼長史接宴賓客義顯左將軍太中大夫義儁歷司空主簿兗州別駕而卒祖旋太尉行參軍鎮遠將軍卒贈都官尚書齊兗二州刺史子義真太尉行參軍衆敬弟衆愛隨兄歸國以勳為第一客賜爵鉅平侯卒贈冠軍將軍徐州刺史諡曰康子聞慰字子安有器幹襲爵例降為伯拜泰山太守入為尚書郎本州中正加威遠將軍出為徐州平東府長史帶彭城內史永平中遷中散大夫加龍驤將軍延昌初除清河內史因以疾辭復為龍驤中散又試守廣平內史正光初相州刺史中山王熙起兵謀誅元叉聞慰斬其使發兵拒之在任寬謹百姓愛附後叉以聞慰忠於己遷持節平東將軍滄州刺史甚有政績後以本軍除散騎常侍東道行臺尋為都督安樂王鑒軍司孝昌元年春徐州刺史元法僧反聞慰與鑒攻之為法僧所敗奔還京師被劾遇赦免其年卒年五十七贈散騎常侍安東將軍兗州刺史伯如故諡曰恭子祖彥字脩賢涉獵書傳風度閑雅為時所知以侍御史為元法僧監軍法僧反逼祖彥南入永安中得還歷中書侍郎襲爵鉅平伯中軍將軍光祿大夫天平四年卒年五十贈都督兗濟二州諸軍事征東將軍尚書左僕射兗州刺史祖彥弟哲永安末祕書郎諸畢當朝不乏榮貴但幃薄不修為時所鄙申纂者本魏郡人申鍾曾也皇始初太祖平中山纂宗室南奔家于濟陰及在無鹽劉彧用為兗州刺史顯祖曰申纂既不識機又不量力進不能歸正朔退不能還江南守孤城於危亡之地欲建功立節豈可得乎纂既敗子景義入國太和中為散員士宋王劉昶國侍郎景明初試守濟陰郡揚州車騎府錄事參軍右司馬常珍奇者汝南人也為劉駿司州刺史亦與薛安都等推立劉子勛子勛敗遣使馳告長社鎮請降顯祖遣殿中尚書元石為都將率衆赴之中書博士鄭羲參石軍事進至上蔡珍奇率文武來迎羲說石令徑入城語在羲傳事定以珍奇為持節平南將軍豫州刺史河內公珍奇表曰臣昔蒙劉氏生成之恩感義亡身志陳報答遂與雍州刺史袁顗豫州刺史殷琰等共唱大義奉戴子勛纂承彼曆大運未集遂至分崩而劉彧滔天殺主篡立蒼生殄悴危於綴旒伏惟陛下龍姿鳳儀光格四表凡在黔黎延屬象魏所願天地垂仁亟圖南服宜遣文檄喻以吉凶使江東之地離心草靡荊雍九州北面請吏乞高臣官名更遣雄將秣馬五千助臣經討并賜威儀震動江外長江已北必可定矣臣雖不武乞備前驅進據之宜更在處分敢冒愚款推誠上聞機運可乘實在茲日珍奇雖有虛表而誠款未純歲餘徵其子超超母胡氏不欲超赴京師密懷南叛時汝徐未平元石自出攻之珍奇乘虛於懸瓠反叛燒城東門斬三百餘人虜掠上蔡安城平輿三縣居民屯于灌水石馳往討擊大破之會日闇放火燒其營珍奇乃匹馬逃免其子超走到苦城為人所殺小子沙彌囚送京師刑為閹人沈文秀字仲遠吳興武康人伯父慶之劉駿司空公文秀初為郡主簿稍遷建威將軍青州刺史和平六年劉子業為其叔彧所殺文秀遂與諸州推立劉子勛及子勛敗皇興初文秀與崔道固俱以州降請師應接顯祖遣平東將軍長孫陵等率騎赴之會劉彧遣文秀弟文炳來喻之文秀復歸於彧彧以文秀為輔國將軍刺史如故後慕容白曜既克升城引軍向歷下白曜復遣陵等率萬餘人長驅至東陽文秀始欲降以軍人虜掠遂有悔心乃嬰城固守陵乃引師軍於清西白曜既下歷城乃率大衆并力攻討長圍數匝自夏至春始克文秀取所持節衣冠儼然坐於齋內亂兵入曰文秀何在文秀厲聲曰身是執而裸送于白曜左右令拜文秀曰各二國大臣無相拜之禮白曜忿之乃至撾撻後還其衣為之設饌遂與長史房天樂司馬沈嵩等鎖送京師面縛數罪宥死待為下客給以粗衣蔬食顯祖重其節義稍亦加禮之拜為外都下大夫太和三年遷外都大官高祖嘉文秀忠於其國賜絹綵二百匹後為南征都將臨發賜以戎服尋除持節平南將軍懷州刺史假吳郡公, WYG: 聼}
