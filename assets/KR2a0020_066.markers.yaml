  - {type: variant, offset: 1547, length: 9, content: 年老聽子懷吉以本官, WYG: 報崇攝慶賓問曰爾弟逃亡何故妄認他尸慶賓伏引更問蓋等乃云自誣數日之間思安亦為人縛送崇召女巫視之鞭笞一百崇斷獄精審皆此類也時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨羣飛入城與鵲爭巢五月大霖雨十有三日大水入城屋宇皆沒崇與兵泊於城上水増未已乃乗船附於女牆城不没者二板而已州府勸崇棄壽春保北山崇曰吾受國重恩忝守藩岳德薄招災致此大水淮南萬里繫於吾身一旦動脚百姓瓦觧揚州之地恐非國物昔王尊慷慨義感黄河吾豈愛一軀取愧千載但憐兹士庶無辜同死可桴筏}
