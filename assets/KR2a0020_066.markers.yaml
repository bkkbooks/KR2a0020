  - {type: variant, offset: 6092, length: 575, content: 保明之切責儼既而果叛殺數十人驅掠城中男女百餘口夜走南入智度於彭城知之從清中單舸奔陵為下邳戍人所射殺張讜字處言清河東武城人也六世祖名犯顯祖諱晉長秋卿父華為慕容超左僕射讜仕劉駿歷給事中泰山太守青冀二州輔國府長史帶魏郡太守劉彧之立遙授冠軍將軍東徐州刺史及革徐兗讜乃歸順於尉元元亦表授冠軍東徐州刺史遣中書侍郎高閭與讜對為刺史後至京師禮遇亞於薛畢以勳賜爵平陸侯加平遠將軍讜性開通篤於撫恤青齊之士雖疏族末姻咸相敬視李敷李訢等寵要勢家亦推懷陳款無所顧避畢衆敬等皆敬重之高允之徒亦相器待延興四年卒贈平南將軍青州刺史諡康侯子敬伯求致父喪出葬冀州清河舊墓久不被許停柩在家積五六年第四子敬叔先在徐州初聞父喪不欲奔赴而規南叛為徐州所勒送至乃自理後得襲父爵敬伯自以隨父歸國之功賜爵昌安侯出為樂陵太守敬叔武邑太守父喪得葬舊墓還屬清河初讜兄弟十人兄忠字處順在南為合鄉令世祖南征忠歸降賜爵新昌男拜新興太守卒官贈冀州刺史初讜妻皇甫氏被掠賜中官為婢皇甫遂乃詐癡不能梳沐後讜為劉駿冀州長史因貨千餘匹購求皇甫高宗怪其納財之多也引見之時皇甫年垂六十矣高宗曰南人奇好能重室家之義此老母復何所任乃能如此致費也皇甫氏歸讜令諸妾境上奉迎數年卒卒後十年而讜入國讜兄子安世正始中自梁漢同夏侯道遷歸款為客積年出為東河間太守卒官元茂為信都令遷冀州治中元茂弟子讓洛州安西府長史都水使者田益宗光城蠻也身長八尺雄果, WYG: ''}
