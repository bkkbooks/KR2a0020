  - {type: variant, offset: 7810, length: 1, content: 濟, WYG: 蕭寳夤於衍堰上流決淮東注朝廷以諸將乖角不相順赴乃以尚書李平兼右僕射持節節度之崇遣李神乗鬬艦百餘艘㳂淮與李平崔亮合攻硤石李神水軍剋其東北外城祖悅力屈乃降語在平𫝊朝廷嘉之進號驃騎將軍儀同三司刺史都督如故衍淮堰未破水勢日增崇乃於硤石戌間編舟為橋北更立船樓十各髙三丈十歩置一籬至兩岸蕃板裝治四箱觧合賊至舉用不戰觧下又於樓船之北連覆大船東西竟水防賊火栰又於八公山之東南更起一城以備大水州人號曰魏昌城崇累表觧州前後十餘上肅宗乃以元志代之尋除都督冀定瀛三州諸軍事驃騎大將軍冀}
