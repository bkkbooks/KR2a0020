  - {type: variant, offset: 1545, length: 0, content: '', krp: 詔曰應敵制變算非一途救左擊右疾雷均勢今朐山蟻寇乆結未殄賊衍狡詐或生詭劫宜遣銳兵備其不意崇可都督淮南諸軍事坐敦威重遙運聲算延昌初加侍中車騎將軍都督江西諸軍事刺史如故先是壽春縣人茍泰有子三歳遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言已子並有隣證郡縣不能斷崇曰此易知耳令二父與兒各在别處禁經數旬然後遣人告之曰君兒遇患向已暴死有敎觧禁可出奔哀也茍泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇察知之乃以兒還泰詰奉伯詐狀奉伯乃款引云先亡一子故妄認之}
  - {type: variant, offset: 1546, length: 0, content: '', WYG: 定州流人觧慶賓兄弟坐事俱徙揚州弟思安背役亡歸慶賓懼後役追責規絶名貫乃認城外死尸詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫楊氏自云見鬼說思安被害之苦飢渴之意慶賓又誣疑同軍兵蘇顯甫李蓋等所殺經州訟之二人不勝楚毒各自款引獄將决竟崇疑而停之密遣二人非州内所識者偽從外來詣慶賓告曰僕住在此州去此三百比有一人見過寄宿夜中共語疑其有異便即詰問迹其由緒乃云是流兵背役逃走姓觧字思安時欲送官苦見求及稱有兄慶賓今住揚州相國城内嫂姓徐君脫矜慜為徃報告見申委曲家兄聞此必重相報所有資財當不愛惜今但見質若往不獲送官何晚是故相造指申此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賓悵然失色求其少停當備財物此人具}
  - {type: page-break, offset: 1546, content: '', id: KR2a0020_WYG_066-5b, image: WYG0262/WYG0262-0004d.png}
