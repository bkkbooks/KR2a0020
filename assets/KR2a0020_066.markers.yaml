  - {type: variant, offset: 950, length: 588, content: 西大將軍雍州刺史子如故安都兄子碩明隨安都入國賜爵蒲坂侯清河太守太中大夫安都從祖弟真度初與安都南奔及安都為徐州真度為長史頗有勇幹為其爪牙從安都來降為上客太和初賜爵河北侯加安遠將軍為鎮遠將軍平州刺史假陽平公後降侯為伯除冠軍將軍隨駕南討假平南將軍久之除護南蠻校尉平南將軍荊州刺史蕭賾雍州刺史曹虎之詐降也詔真度督四將出襄陽無功而還後征赭陽為房伯玉所敗有司奏免官爵高祖詔曰真度之罪誠如所奏但頃與安都送款彭方開闢徐宋外捍沈攸道成之師內寧邊境烏合之衆淮海來服功頗在茲言念厥績每用嘉美赭陽百敗何足計也宜異羣將更申後效可還其元勳之爵復除荊州刺史自餘徽號削奪進足彰忠退可明失尋除假節假冠軍將軍東荊州刺史初遷洛後真度每獻計於高祖勸先取樊鄧後攻南陽故為高祖所賞賜帛一百匹又加持節正號冠軍改封臨晉縣開國公食邑三百戶詔曰獻忠盡心人臣令節標善賞功有國徽範故一言可以興邦片辭可以喪國得無遠錄前謀以褒厥善真度爰自遷京每在戎役沔北之計所與聞知無不言頗見採納及六師南邁朕欲超據新野羣情皆異真度獨與朕同撫蠻寧夷實有勤績可增邑二百戶轉征虜將軍豫州刺史景明初豫州大飢真度表曰去歲不收飢饉十五今又災雪三尺民人萎餧無以濟之臣輒日別出州倉米五十斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在拯卹陳郡儲粟雖復不多亦可分贍尚書量賑以聞及裴叔業以壽春內附詔真度率衆赴之尋遷華州刺史將軍如故未幾轉荊州刺史仍本將軍入為大司農卿正始初除平, WYG: ''}
