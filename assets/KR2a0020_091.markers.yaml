  - {type: variant, offset: 33, length: 0, content: '', WYG: 離宮可即漸臺離宫皆天宮臺之名漸臺四星在織女東足下離宫六星與營室相連言天帝或昇漸臺而觀或就離宫而游即就也禮記曰即宫于宗周也酒旗建醇醪之旌女牀列窈窕之色酒旗三星在軒轅左角天設置酒官爲飲燕之事故建牙旗爲􅋆女牀二星在紀星東北端奉侍天王之女侍衛天王必有關雎窈窕之美無妬忌之心乃可侍衛天王左右故言列窈窕之色也輦道屈曲以微煥附路立于雲閣之側輦道五星在織女西足屈曲而細小故言微煥也附路一星在闇道傍言天帝出入由閣道附路豫防敗傷故言立於雲閣之側其列星之表五車之間乃有咸池鴻沼玉井天淵建樹百果竹林在焉列宿之外謂之表咸池三星在天潢東鴻沼二十三星在須女北玉井四星在參左足下天淵十星在龜星東南建樹百果星在胃南竹林二十五星在園西南江河炳著於上穹素氣霏霏其帶天江天江星天江四星在尾北言天江星乃炳然著見於天上素氣者天河白氣素白霏霏然帶著於天也神龜矅甲於清冷龍魚摛光以暎連神龜龜星也有五星在尾南龜知來事故稱神在河中故言清冷魚龍謂魚一星在尾後河中尾爲龍宿故言龍魚此星在河中以魚星之暎水有光曜也又有南門鼓吹器府之官奏彼絲竹爲帝娛懽南門鼓吹二星在庫樓南翼西南器府三十二星在軫南器府典掌絲竹之事以娛樂天帝也熊羆綿絡於天際虎豹儵煜而暉爛虎豹熊羆四星在狼星傍弧精引弓以持滿狼星摇動於霄端狼一星在參東南弧九星在狼東南星𫝊云天下兵起則弧弓張天其外則有燕秦齊趙列國之名外謂列宿之外復有諸國之名齊一星在九坎東趙二星在齊北鄭一星在趙北越一星在鄭北周二星在越東秦二星在周東代二星在秦南晉一星在代南韓一星在晉西魏一星在韓北楚一星在韓西燕一星在楚南諸列國之名凡有十二星也雷電霹靂雨落雲征征行也雷電六星在營室南霹靂五星在土公西南雲雨四星在霹靂南陳車䇿駕於氐南天駟騁歩於太清陳車三星在氐南房星一名天駟園苑周回以曲列倉廩區别而殊形天園十四星在苑南天苑十六星在昴畢南天倉六星在婁南天廩四星在昴南言形象殊别不同也内則尚書大理太一天一之宮尚書五星在紫微宮門内東南維大理二星在紫微宫中太一天一各一星相近在紫宮門南柱下著術𫝊示無窮柱下史一星在北極東六甲候大帝之所須内厨進御膳於皇躬六甲在華蓋下内厨二星在紫宫西南角外天船横漢以普濟積水候災于其中天船九星在大陵北積水一星在天船中隂德播洪施以恤不足四輔翼皇極而闡𤣥風隂徳二星在尚書西四輔四星俠北極播布洪大𤣥天也隂德之官必冇陽報}
