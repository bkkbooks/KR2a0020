  - {type: variant, offset: 3246, length: 2, content: 好預, WYG: 時有短篇遂留寄平城以慵寫書為業而名猶在鎮後被召爲中書寫書生與髙聰俱依髙允允愛}
  - {type: variant, offset: 3246, length: 2, content: 好預, krp: 時有短篇遂留寄平城以慵寫書為業而名猶在鎮後被召爲中書寫書生與髙聰俱依髙允允愛}
  - {type: variant, offset: 3249, length: 1, content: 間, WYG: 文用遂竝薦之與聰俱補中書博士自在中書恒庇李沖兄弟子姪之門始北方不悉青州蔣族或謂少游本非人士又少游微因工藝自逹是以公私人望不至相重唯髙允李沖曲為體練由少游舅氏崔光與李沖從叔衍對門婚姻也髙祖文明太后常因宻宴謂百官曰本謂少游作師耳髙允老公乃言其人士眷識如此然猶驟被引命屑屑禁闥以規矩刻繢為務因此大蒙恩錫超等備位而亦不遷陟也及詔尚書李沖與馮誕游明根髙閭等議定衣冠於禁中少游巧思令主其事亦訪於劉昶二意相乖時致諍競積六載乃成始班賜百官冠服之成少游有效焉後於平城將營太廟太極殿遣少游乗𫝊詣洛量凖魏晉基趾後為散騎侍郎副李彪使江南髙祖修船乘以其多有思力除都水使者遷前將軍兼將作大匠仍領水池湖泛戲舟檝之具及華林殿沼修舊増新改作金墉門樓皆}
