  - {type: variant, offset: 1254, length: 1, content: 廣, WYG: 下及庶人又貴賤階級尊卑差别吉凶所用罔不畢備未及内呈先帝晏駕臣時狼狽㡬至不測停廢以來逕由八載思欲上聞莫能自徹加年夕齒頽餘齡旦暮每懼殂殞填仆溝壑先帝遺志不得宣行夙夜悲憤理難違匿依先撰錄奏謹以上聞請付中祕通儒達士定其得失事若可施乞即班用其四序堪輿遂大行於世王早勃海南皮人也明隂陽九宫及兵法尤善風角太宗時䘮亂之後多相殺害有人詣早求問勝術早爲設法令各無咎由是州里稱之時有東莞鄭氏因爲同縣趙氏所殺其後鄭氏執得讐人趙氏又剋明晨㑹宗族當就墓所刑之趙氏求救於早早爲占候并授以一符曰君今且還選壯士七人令一人爲主者佩此符於雞鳴時伏在仇家宅東南二里許}
