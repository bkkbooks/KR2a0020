  - {type: variant, offset: 14, length: 6, content: 袁躍裴敬憲盧, WYG: 極雖殊妙本同一顯昧雖遐契齊影響尋其應感之符則乎㝠通之數天人之際可見明矣夫機象㝠􅃡至理幽𤣥豈伊管智所能䆒暢然歌咏之來偶同風人目閲羣宿能不歌吟是時也嵗次析木之津日在翼星之分閶闔晨鼓而蕭瑟流火夕暵以摧頽游氣眇其高搴辰宿煥焉華布覩時逝懷川上之感歩秋林同宋生之戚歎巨艱之未終抱殷憂而不寐遂彷徨於窮谷之裏杖䇿陟神巖之側乃仰}
