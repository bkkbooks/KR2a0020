  - {type: variant, offset: 1256, length: 0, content: '', WYG: 旦當有十人跟隨向西北行中有二人乗黒牛一黒牛最在前一黒牛應第七但促取第七者將還事必無他趙氏從之果如其言乃如鄭氏五男父也諸子竝爲其族所宗敬故和解二家趙氏竟免後早與客清晨立於門内遇有卒風振樹早語客曰依法當有千里外急使日中將有兩匹馬一白一赤從西南來至即取我逼我不聽與妻子别語訖便入召家人隣里辭别語訖浴帶書囊日中出門候使如期果有二馬一白一赤從涼州而至即促早上馬遂詣行宮時世祖圍涼州未㧞故許彦薦之早彦師也及至詔問何時當得此城早對曰陛下但移據西北角三日内必剋世祖從之如期而剋輿駕還都時久不雨世祖問早曰何時當雨早曰今日申時必大雨比至未時猶無片雲世祖召早詰之早曰願更少時至申時雲氣四合遂大雨滂沲世祖甚善之而早苦以疾辭乞歸鄉里詔許之遂終於家或言許彦以其術勝恐終妨已故譎令歸耳耿元鉅鹿宋子人也善卜占坐於室内有客扣門元已知其姓字并所齎持及來問之意其所卜筮十中八九别有林占世或傳之而性不和俗時有}
