  - {type: variant, offset: 2922, length: 0, content: '', WYG: 昌安縣開國侯王顯字世滎陽平樂平人自言本東海郯人王朗之後也祖父延和中南奔居于魯郊又居彭城伯父安上劉義隆時板行館陶縣世祖南討安上棄縣歸命與父母俱徙平城例敘陽都子除廣寗太守顯父安道少與季亮同師俱學醫藥粗究其術而不及亮也安上還家樂平頗參士流顯少歴本州從事雖以醫術自通而明敏有决斷才用初文昭皇太后之懷世宗也夢為日所逐化而為龍而繞后后寤而驚悸遂成心疾文明太后勑召徐謇及顯等為后診脉謇云是微風入藏宜進湯加針顯云案三部脉非有心疾將是懷孕生男之象果如顯言久之召補侍御師尚書儀曹郎號稱幹事世宗自幼有微疾久未差愈顯攝療有効因是稍蒙眄識又罷六輔之初顯為領軍于烈間通規䇿頗有宻功累}
