  - {type: variant, offset: 2118, length: 0, content: '', WYG: 爻觀鳥獸之跡别創文字以代結繩用書契以維事宣之王庭則百工以敘載之方冊則萬品以明迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八嵗入小學保氏敎國子以六書一曰指事二曰象形三曰諧聲四曰㑹意五曰轉注六曰假借蓋是史頡之遺法也及宣王太史史籕著大篆十五篇與古文或同或異時人即謂之籕書至孔子定六經左丘明述春秋皆以古文厥意可得而言其}
