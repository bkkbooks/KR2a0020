  - {type: variant, offset: 1257, length: 13, content: 贊盛選賓僚以伯茂為文學後加, WYG: 公欲求其筮者元則拒而不許每云今既貴矣更何所求而復卜也欲望意外乎代京法禁嚴切王公聞之莫不驚悚而退故元多見憎忿不爲貴勝所親官至鉅鹿太守顯祖高祖時有渤海高道埏清河趙法逞竝有名於世世宗肅宗時奉車都尉清河魏道䖍奉車都尉周恃魏郡太守章武高月光月光弟明月任元智雍州人潘捺竝長於隂陽卜筮故元於日者之}
