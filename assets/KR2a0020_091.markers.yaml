  - {type: variant, offset: 2165, length: 0, content: '', WYG: 領太醫令後數年卒贈威逺將軍青州刺史子天授襲汶陽令醫術又不逮父徐謇字成伯丹陽人家本東莞與兄文伯等皆善醫藥謇因至青州慕容白曜平東陽獲之表送京師顯祖欲驗其所能乃置諸病人於幕中使謇隔而脉之深得病形兼知色候遂被寵遇為中散稍遷内侍長文明太后時問治方而不及李修之見任用也謇合和藥劑攻救之驗精妙於修而性甚祕忌承奉不得其意者雖貴為王公不為措療也髙祖後知其能及遷洛稍加眷幸體小不平及所寵馮昭儀有疾皆令處治又除中散大夫轉右軍將軍侍御師謇欲為髙祖合金丹致延年之法乃入居崧髙採營其物歴嵗無所成遂罷二十二年髙祖幸懸瓠其疾大漸乃馳驛召謇令水路赴行所一日一夜行數百里至診省下治果有大驗髙祖體少瘳内外稱慶九月車駕發豫州次于汝濵乃大為謇設太官珍膳因集百官特坐謇於上席遍陳餚觴于前命左右宣謇救攝危篤振濟之功宜加酬賚乃下詔曰夫神出無方形禀有礙憂喜乖適理必傷生朕覽萬幾長鍾革運思芒芒而無怠身忽忽以興勞仲秋動痾心容頓竭氣體羸瘠玉几在慮侍御師右軍將軍徐成伯馳輪大室進療汝蕃方窮丹英藥盡芝石誠術兩輸忠妙俱至乃令況勞勝愈篤療克痊論勤語效實宜褒錄昔晉武暴疾程和應増封辛疚數朝錢爵大墜況疾深於曩辰業難於疇日得不重加陟賞乎宜順羣望錫以山河且其舊逕髙秩中暫解退比雖銓用猶未闕二字準舊量今事合顯進可鴻臚卿金鄉縣開國伯食邑五百戸賜錢一萬貫又詔曰錢府未充須以雜物絹二千匹雜物一百匹四十匹出御府穀二千斛奴婢十口馬十匹一匹出驊騮牛十頭所賜雜物奴婢牛馬皆經内呈諸親王咸陽王禧等各有别賚竝至千匹從行至鄴髙祖猶自發動謇日夕左右明年從詣馬圈髙祖疾勢遂甚戚戚不怡每加切誚又欲加之鞭捶幸而獲免髙祖崩謇隨梓宮還洛謇常有藥餌及吞服道符年垂八十􅁂髮不白力未多衰正始元年以老為光禄大夫加平北將軍卒延昌初贈安東將軍齊州刺史諡曰靖子踐字景升小名靈寶襲爵歴官兖州平東}
