  - {type: variant, offset: 2125, length: 0, content: '', krp: 太延中皇威西被牧犍内附臣亡祖文威杖䇿歸國奉獻五世𫝊掌之書古篆八體之法時蒙褒録敘列於儒林官班文省家號世業暨臣闇短識學庸薄漸漬家風有忝無顯但逢時來恩出願外每承澤雲津厠霑漏潤驅馳文閣參預史官題篆宮禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎説文爲主爰採孔氏尚書五經音注籕篇爾雅三倉凡將方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次類編聯文無復重糾爲一部其古籕竒惑俗隸諸體咸使班於篆下各有區别詁訓假借之誼僉隨文而解音讀楚夏之聲竝逐字而注其所不知者則闕如也脱蒙遂許冀省百氏之觀而同文字之域典書祕書所須之書乞垂敕給并學士五人嘗習文字者助臣披覽書生五人專令抄寫侍中黄門國子祭酒一月一監評議疑隱庶無紕繆所撰名目伏聽明㫖詔曰可如所請并就太常冀兼敎八書史也其有所須依請給之名目待書成重聞式於是撰集字書號曰古今文字凡四十卷大體依許字説文爲本上篆下隸又除宣威將軍符璽郎尋加輕車將軍正光中除驍騎將軍兼著作佐郎正史中字疑四年卒贈右將軍巴州刺史其書竟未能成式兄子征虜將軍順和亦工篆書先是太和中兗州人沈法㑹能隸書世宗之在東宮敕法㑹侍書已後隸迹見知於閭里者甚衆未有如崔浩之妙周澹京兆鄠人也爲人多方術尤善醫藥爲太醫令太宗嘗苦風頭眩澹治得愈由此見寵位至特進賜爵成德侯神瑞二年京師饑朝議將遷都於鄴澹與博士祭酒崔浩進計論不可之意太宗大然之曰唯此二人與朕意同也詔賜澹浩妾各一人御衣一襲絹五十匹綿五十斤泰常四年卒諡曰}
  - {type: variant, offset: 2126, length: 1, content: 之, WYG: 時有河南人隂貞家世爲醫與澹竝受封爵清河李潭亦以善鍼見知子驢駒襲𫝊術延興中位至散令李修字思祖本陽平舘陶人父亮少學醫術未能精究世祖時奔}
