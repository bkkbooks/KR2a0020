  - {type: variant, offset: 2582, length: 188, content: 修起居注曾一日不直上黨王天穆時錄尚書事將加捶撻子昇遂逃遁天穆甚怒奏人代之莊帝曰當世才子不過數人豈容為此便相放黜乃寢其奏及天穆將討邢杲召子昇同行子昇未敢應天穆謂人曰吾欲收其才用豈懷前忿也今復不來便須南走越北走胡耳子昇不得已而見之加伏波將軍為行臺郎中天穆深加賞之元顥入洛天穆召子昇問曰即欲向京師為隨我北渡對曰主上以虎牢失守致此狼狽元顥新入人情未安今往討之必有征無戰王若克復京師奉迎, WYG: ''}
