  - {type: variant, offset: 1442, length: 203, content: 竟無坐伯茂先出後其伯仲規與兄景融別居景融貧窘伯茂了無賑恤殆同行路世以此貶薄之卒年三十九知舊歎惜焉伯茂末年劇飲不已乃至傷性多有愆失未亡前數日忽云吾得密信將被收掩乃與婦乘車西逃避後因顧指壁中言有官人追逐其妻方知其病卒後殯於家園友人常景李渾王元景盧元明魏季景李騫等十許人於墓傍置酒設祭哀哭涕泣一飲一酹曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏收亦與之友寄以示收收時在晉陽乃同其作論伯茂其十字云臨風想玄度對酒思公, WYG: 從}
