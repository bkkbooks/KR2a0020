  - {type: variant, offset: 13, length: 0, content: '', WYG: 九晁崇張淵殷紹王早耿元劉靈助江式周澹李修徐謇王顯崔彧蔣少游蓋小道必有可觀況徃聖摽厯數之術先王垂卜筮之典論察有法占候相傳觸類長之其流遂廣工藝紛綸理非抑止今列於篇亦所以廣聞見也晁崇字子業遼東襄平人也家世史官崇善天文術數知名於時爲慕容垂太史郎從慕容寶敗於參合獲崇後乃赦之太祖愛其伎術甚見親待從平中原拜太史令詔崇造渾儀歴象日月星辰遷中書侍郎令如故天興五年月暈左角蝕將盡崇奏曰占爲角蟲將死時太祖既剋姚平於柴壁以崇言之徵遂令諸軍焚車而反牛果大疫輿駕所乘巨犗數百頭亦同日斃於路側自餘首尾相繼是嵗天下之牛死者十七八麋鹿亦多死崇弟懿明辯而才不及崇也以善北人語内侍左右爲黄門侍郎兄弟竝顯懿好矜容儀被服僭度言音類太祖左右每聞其聲莫不驚竦太祖知而惡之後其家奴告崇與懿叛又與臣王次多潛通招引姚興太祖銜之及興㓂平陽車駕擊破之太祖以奴言爲實還次晉陽執崇兄弟竝賜死崇兄子暉太祖時給事諸曹稍遷給事中賜爵長平侯征虜將軍濟州刺史假寧東將軍潁川公劉駿鎭東平郡徙戍近境暉上表求擊之尚宗不許暉乃爲書以大義責之卒子林襲爵林卒子清襲事在節義𫝊暉從弟繼太祖時稍遷中書侍郎給事中中堅將軍賜爵襄平子除魏郡太守卒子世宗襲爵卒子元和襲卒張淵不知何許人明占候曉内外星分自云嘗事苻堅堅欲南征司馬昌明淵勸不行堅不從果敗又仕姚興父子爲靈臺令姚泓滅入赫連昌昌復以淵及徐辯對爲太史令世祖平綂萬淵與辯俱見獲世祖以淵爲太史令數見訪問神䴥二年世祖將討蠕蠕淵與徐辯皆謂不宜行與崔浩爭於世祖前語在浩𫝊淵專守常占而不能鈎深致遠故不及浩後爲驃騎軍謀祭酒嘗著觀象賦曰易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下然則}
