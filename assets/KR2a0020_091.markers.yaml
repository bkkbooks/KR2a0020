  - {type: variant, offset: 32, length: 0, content: '', WYG: 良一名郵無正爲趙簡子御死精記於星爲天帝之馭官傅説登天而乘尾奚仲託精於津陽傅説一星在尾後傅説殷時隱於巖中殷王武丁夢得賢人圖畫其象求而得之即立爲相死精上爲星乗尾在龍駟之間奚仲四星在天津北近河傍太古時造車輿者死而精上爲星水北曰陽在河北故曰津陽也織女郎列於河湄牽牛煥然而舒光織女三星在紀星東端牽牛六星在河鼓南世人復以河鼓爲牽牛五車亭柱於畢隂兩河俠井而相望五車三柱都十四星在畢東北在宿北故謂之隂兩河南河北河六星俠東井東西遙相對故曰相望也灼灼羣位落落幽紀設官分職罔不悉置灼灼落落皆星光明希疎之貌羣位謂天設三公九卿之官皇后嬪御之位分謂分其所司而各有所典罔無悉盡言無不盡備官職亦有之也儲貳副天庭延三吏儲貳謂太子一星在帝座北三吏三公星在太微宫中也論道納言各有攸司論道謂三公坐而論道納言謂尚書獻可替否將相次序以衛守九卿珠連而内侍太微宮十星皆有上將上相次將次相之位九卿三星在太微庭中行列似珠之相連而内侍天街分中外之境四七列九土之異天街二星昴畢間近月星隂陽之所分中國之境界天街以西屬外國旄頭氈褐引弓之民皆屬焉天街以東屬中國縉紳之士冠帶之倫皆屬焉四七二十八宿角亢鄭國兗州氐房心陳國豫州尾箕燕國幽州斗牛吳國揚州女虚危齊國青州營室東壁衛國并州奎婁魯國徐州胃昴畢趙國冀州觜參魏國益州并鬼秦國雍州栁星張周國洛陽三河翼軫楚國荆州天有十二次日月之所經歴地有十二州王侯之所國方土所出之物各有殊異不同者左則天紀槍棓攝提大角二咸防奢七公理獄天紀九星在貫索東天槍三星在北斗杓東天棓五星在女牀東北攝提六星俠大角大角一星在攝提間二咸東咸四星在房東北西咸四星在房西北此星主防奢淫諂佞之事七公七星在招摇東接近貫索貫索爲天獄刑獄失中則七公評議理其寃枉庫樓烱烱以灼明騎官騰驤而奮足庫樓十星在大角南騎官二十七星在氐南騎官典乘故曰騰驤也天市建肆於房心帝座磥落而電燭天市二十四星在房心北帝座一星在天市中心於前則老人天社清廟所居老人一星在弧南常以春秋分候之天社六星亦在弧南清廟十四星在張南明堂配帝靈臺考符明堂三星在太微西南角外靈臺三星在明堂西丈人極陽而慌忽子孫嘒嘒於參嵎丈人二星在軍市西南星在南方故稱極陽慌忽謂星細小逺邈難見老子曰忽兮慌兮其中有象慌兮忽兮其中有物子二星在丈人東嘒小貌孫二星在子東詩曰嘒彼小星三五在東此之謂乎天狗接狼以吠守野鷄伺晨於參墟天狗七星在狼北野鷄一星在參東南天市中街主警怖故曰吠守鷄能候時故曰伺晨右則少微軒轅皇后之位嬪御相次尊卑有秩少微四星在太微西南北列白衣處士之位軒轅十七星在七星北有皇后嬪御之位尊卑相次皆秩序之也御宮典儀女史執筆御宫四星在鈎陳左傍此星主典史禮儀威容歩趨之事女史一星在柱下史北女史記識晝夜昏明節漏省時在鈎陳右傍内平秉禮以伺邪天牢禁愆而察失内平四星在中宫南有邪媚之事以禮正之天牢六星在北斗魁下有過失則懲其愆也於後則有車府傳舍匏瓜天津車府七星在天津東傳舍五星在華蓋上匏𤓰五星在麗珠北天津九星在匏􅆶北扶匡照曜麗珠珮珍扶匡七星在天津東麗珠五星在須女北麗桂衣珠珮珍后夫人之盛飾其星主皇后之服也人星麗𤣥以閑逸哭泣連屬而趨墳人星五星在車府南麗附𤣥天言人星近於閑逸易曰日月星辰麗於天石氏經曰人星優游人乃安寜哭二星在虚南泣三星在哭東墳墓四星在危南哭泣星行列趣向墳墓故曰連屬河鼓震雷以􅗟磕騰虵蟠縈而輪菌河鼔十二星在南斗北此星昏中南方而震雷易曰鼔之以雷霆此之謂也此星主聲音故曰􅗟磕騰虵二十二星在營室北形狀似虵故曰輪菌於是周章高眄還旋辰極辰極北極既覿鈎陳中禁復覩天帝休息鈎陳六星在紫宮中天皇大帝之所居諸宮别館及天牀星皆是休息寢卧而游也漸臺可}
