  - {type: variant, offset: 36, length: 0, content: '', WYG: 榮言星辰布曜若春日之榮華也覩夫天官之羅布故作則於華京言天官羅布於上王者法效於下論語曰惟天}
  - {type: variant, offset: 36, length: 0, content: '', krp: 榮言星辰布曜若春日之榮華也覩夫天官之羅布故作則於華京言天官羅布於上王者法效於下論語曰惟天}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 大惟堯則之也及其災異之興出無常所言災異出無常宿隨其善惡而處之假使鄰國有事則變見角亢也歸邪繽紛飛流電舉如星非星如雲非雲謂之歸邪夾以微氣故稱繽紛飛飛星也流流星也飛星與流星各異飛星焱去而迹絶流星迹存而不滅電舉者似焱電長妖星起則殃及晉平虵乘龍則禍連周楚春秋魯昭公十年春正月戊子妖星出於婺女見於申維婺氏屬齊申為晋分梓慎見妖星出知晉侯以戊子日死虵乘龍謂襄公二十八年嵗星次天津於𤣥􅑎十五度在虚下嵗星主木位在東體合房心故名龍虚在坎坎子位次𤣥枵龜虵之類嵗星失次行虚之外出其下故曰虵乗龍龍位壽星宋鄭之分梓慎見虵乗龍知饑在宋鄭然裨竈以為周王及楚子皆死二人推變不同所見各異梓慎裨竈古之良史也或取證於逢公或推變於衝午逢公齊邑姜之先言逢公死時亦有此星見梓慎推星以此方之知晉平公將死􅓘午謂虚宿對午午為張翼張翼周楚之分裨竈占知周王楚子死故言推變於􅓘午乃有欽明光被填逆水府昔堯遭洪水填星逆行入水府書曰欽明文思光被萬邦洪波滔天功隆大禹言洪水既出堯命鮌治之而功不成乃復命禹治而平之禹有濟世之難治水之功書曰洪水滔天又曰禹錫𤣥圭告厥成功此則㝠數之大運非治綱之失緒言堯遭洪水致填星逆行之異非不徳所致此乃運數應爾也蓋象外之妙不可以麤理尋重𤣥之内難以熒燎覩言𤣥理微妙不可知見也至於精靈所感迅踰駭嚮荆軻慕丹則白虹貫日而不徹昔荆軻慕燕太子丹之義入秦為刺客雖至精感上而事竟不㨗衛生畫䇿則太白食􅄧而摛朗昔衛先生為秦畫䇿於長平昭主疑而不信太白有食昴之變魯陽指麾而曜靈爲之回駕魯陽古之賢人以手麾日能再回也嚴陵來游而客氣著於乾象昔光武為白衣時與嚴陵相厚善及登帝位陵來入見太史奏曰客星犯帝座光武詔曰乃嚴子陵非客斯皆至感動於神祗誠應効於既徃爾乃四氣鱗次斗建辰移雖無聲言三光是知言四時代謝不常每月斗移建一辰天無聲言語止以星辰見變譴以示人也星中定於昏明影度以之不差測水早於未然占方來之安危孟春正月昬參中旦尾中仲春之月昬弧中旦建星中季春之月昬七星中旦牽牛中孟夏之月昬翼中旦婺女中仲夏之月昬亢中旦危中季夏之月昬心中旦奎中孟秋之月昬建星中旦畢中仲秋之月昬牽牛中旦觜觿中季秋之月昬虚中旦栁中孟冬之月昬危中旦七星中仲冬之月昬東壁中旦軫中季冬之月昬婁中旦氐中冬至之日建八尺之標影長一丈三尺五寸也夏至之日影長一尺六寸也影長為水影短為旱也隂精乘箕則大飈暮鼔西南入畢則淫雨滂沲隂精月也東北失道入箕則多風移而西南失道入畢則多雨雨三日為淫雨詩云月麗于畢俾滂沲矣書曰星有好風星有好雨此之謂也譬有晉鍾之應銅山風雲之從班螭言雲從龍風從虎同氣相求同類相應蜀山崩而晉鍾鳴也若夫㝠車濳駕時乘六虬大儀回運萬象俱流六虬六龍易曰時乘六龍以御天此皆是天回運轉北斗俄其西傾羣星忽以匿幽幽暗也望舒縱轡以騁度靈輪浹旦而過周望舒月也月日行十三度十九分度之七周天凡三百六十五度四分度之一天一日一夜運轉過周一度浹匝也至旦曉而過匝故曰浹旦而過周也爾乃凝神逺矚曬目八荒察之無象視之𦕈茫狀若渾元之未判别又似浮海而覩滄浪幽遐逈以希夷寸眸焉能究其傍疑神精不動也言極逺傍視茫然若造化之始元氣未分似浮海逺望而不見其邊論語曰乘桴浮於海老子曰聽之不聞其聲名曰希視之不見其形名曰夷於是乎夜對山水栖心高鏡逺尋終古攸然獨詠美景星之繼晝大唐堯之徳盛瑞㦄圖曰景星大如半月生於晦朔助月光明當堯之時有此星見故美堯之德能致之也嘉黄星之靡鋒明虞舜之不競昔舜將受禪于堯先有星見員而無鋒芒言舜當}
