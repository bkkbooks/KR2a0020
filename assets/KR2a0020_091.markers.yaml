  - {type: variant, offset: 805, length: 442, content: 監為還園賦其辭甚美正光中京兆王西征引為大行臺郎中委以書記還除尚書左中兵郎中卒肅性恭儉不妄交遊唯與崔勵勵從兄鴻尤相親善所製文章多亡失存者十餘卷邢臧字子良河間人光祿少卿虬長孫也幼孤早立操尚博學有藻思年二十一神龜中舉秀才問策五條考上第為太學博士正光中議立明堂臧為裴頠一室之議事雖不行當時稱其理博出為本州中從事雅為鄉情所附永安初徵為金部郎中以疾不赴轉除東牟太守時天下多事在職少能廉白臧獨清慎奉法吏民愛之隴西李延寔莊帝之舅以太傅出除青州啟臧為屬領樂安內史有惠政後除濮陽太守尋加安東將軍臧和雅信厚有長者之風為時人所愛敬為特進甄琛行狀世稱其工與裴敬憲盧觀兄弟並結交分曾共讀回文集臧獨先通之撰古來文章并作者氏族號曰文譜未就病卒時賢悼惜之其文筆凡百餘篇贈鎮北將軍定州刺史諡曰文子恕涉學有識悟裴伯茂河東人司空中郎叔義第二子少有風望學涉羣書文藻富贍釋褐奉朝請大將軍京兆王繼西討引為鎧曹參軍南討絳蜀陳雙熾為行臺長孫承業行臺郎中承業還京師留伯茂仍知行臺事以平薛鳳賢等賞平陽伯再遷散騎常侍典起居注太昌初為中書侍郎, WYG: 免官}
