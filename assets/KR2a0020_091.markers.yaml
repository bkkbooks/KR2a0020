  - {type: variant, offset: 40, length: 0, content: '', krp: 投齊地也歎熒惑之舍心高宋景之守政當春秋時熒惑守心景公不從史韋之言熒惑退舍而延二十年壯漢祖之入秦竒五緯之聚映昔漢祖入秦五星聚於東井秦之分爾乃歴象既周相佯巖際相佯倘佯也尚書曰歴象}
  - {type: variant, offset: 41, length: 1, content: 久, WYG: 月星辰尋圖籍之所記著星變乎書契覽前代之將淪咸譴告於昬世言先代之君將淪亡天必告災異之徴也桀斬諫以星孛紂酖荒而致彗夫景星見則太平應彗孛作而禍亂興天之常也昔夏桀無道斬闗龍逢而極惡孛星見湯伐之放于鳴條之野殷紂設炮烙之形彗星出武王懸之白旗也恒不見以周衰枉虵行而秦滅昔魯莊公七年夏四月恒星不見自是以後周室衰微枉矢出虵行而無尾}
