  - {type: variant, offset: 3222, length: 1, content: 昇, WYG: 詹事委任甚厚世宗每幸東宮顯常近侍出入禁中仍奉醫藥賞賜累加為立館宇寵振當時延昌二年秋以營療之功封衛南伯四年正月世宗夜崩肅宗踐祚顯參奉璽䇿隨從臨哭微為憂懼顯既蒙任遇兼為法官恃勢使威為時所疾朝宰託以侍療無效執之禁中詔削爵位臨執呼寃直閤以刀鐶撞其掖下傷中吐血至右衛府一宿死始顯布衣為諸生有沙門相顯後當富貴誡其勿為吏官吏官必敗由是世宗時或欲令其遂攝吏部每殷勤避之及世宗崩肅宗夜即位受璽册於儀須兼太尉乃吏部倉卒百官不具以顯兼吏部行事矣崔彧字文若清河東武城人父勲之字寧國位夫司馬}
