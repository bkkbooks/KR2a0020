  - {type: variant, offset: 38, length: 1, content: 其, WYG: 土徳王天下星見而無芒角者示揖讓而受不以兵事爭競也疇呂尚之宵夢善登輔而翼聖昔太公未遇文王時釣魚於磻溪夜夢得北斗輔星神告尚以伐紂之意事見尚書中候篇也欽管仲之察微見虛危而知命昔管仲與鮑叔牙啇賈於南陽見三星聚虚危之分知齊將有霸王遂共戮力}
  - {type: variant, offset: 38, length: 1, content: 其, krp: 土徳王天下星見而無芒角者示揖讓而受不以兵事爭競也疇呂尚之宵夢善登輔而翼聖昔太公未遇文王時釣魚於磻溪夜夢得北斗輔星神告尚以伐紂之意事見尚書中候篇也欽管仲之察微見虛危而知命昔管仲與鮑叔牙啇賈於南陽見三星聚虚危之分知齊將有霸王遂共戮力}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 投齊地也歎熒惑之舍心高宋景之守政當春秋時熒惑守心景公不從史韋之言熒惑退舍而延二十年壯漢祖之入秦竒五緯之聚映昔漢祖入秦五星聚於東井秦之分爾乃歴象既周相佯巖際相佯倘佯也尚書曰歴象}
