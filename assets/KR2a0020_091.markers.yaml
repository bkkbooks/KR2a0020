  - {type: variant, offset: 518, length: 285, content: 榮利風氣俊遠郡徵功曹不就諸府辟命先進其弟世人歎美之司州牧高陽王雍舉秀才射策高第除太學博士性和雅未嘗失色於人工隸草解音律五言之作獨擅於時名聲甚重後進共宗慕之中山王將之部朝賢送於河梁賦詩言別皆以敬憲為最其文不能贍逸而有清麗之美少有氣病年三十三卒人物甚悼之敬憲世有仁義於鄉里孝昌中蜀賊陳雙熾所過殘暴至敬憲宅輒相約束不得焚燒為物所伏如此永興三年贈中書侍郎諡曰文盧觀字伯舉范陽涿人也少好學有儁才舉秀才射策甲科除太學博士著作佐郎與太常少卿李神儁光祿大夫王誦等在尚書上省撰定朝儀拜尚書儀曹郎中孝昌元年卒封肅字元邕勃海人尚書回之兄子也早有文思博涉經史太傅崔光見而賞焉位太學博士修起居注兼, WYG: ''}
