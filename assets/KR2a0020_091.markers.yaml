  - {type: variant, offset: 1252, length: 1, content: 兄, WYG: 召僧化與中散大夫孫安都共撰兵法未就而帝入闗遂罷元象中死於晉陽時有河間信都芳字王琳好學善天文算數甚爲安豐王延明所知延明家有羣書欲抄集五經算事爲五經宗及古今樂事爲樂書又聚渾天欹器地動銅烏漏刻候風諸巧事并圖畫爲器凖竝令芳算之㑹延明南奔芳乃自撰注後隐於并州樂平之東山太守慕容保樂聞而召之芳不得已而見焉於是保樂弟紹宗薦之於齊獻武王以爲中外府田曹參軍芳性清儉質樸不與物和紹宗給其騾馬不肯乘騎夜遣婢侍以試之芳忿呼毆撃不聽近已狷介自守無求於物後亦注重差勾股復撰史宗仍自注之合數十卷武定中卒殷紹長樂人也少聰敏好隂陽術數游學諸方達九章七曜世祖時爲算生博士給事東宮西曹以藝術爲㳟宗所知太安四年夏上四序堪輿表曰臣以姚氏之世行學伊川時遇游遁大儒成公興從求九章要術興字廣明自云膠東人也山居隱跡希在人間興時將臣南到陽翟九崖巖沙門釋曇影間興即北還臣獨留住依止影所求請九章影復將臣向長廣東山見道人法穆法穆時共影爲臣開述九章數家雜要披釋章次意況大㫖又演隱審五藏六府心髓血脉商功大算端部變化𤣥象土圭周髀練精鋭思藴習四年從穆所聞粗皆髣髴穆等仁矜特垂憂閔復以先師和公所注黄帝四序經文三十六卷合有三百二十四章專説天地隂陽之本其第一孟序九卷八十一章説隂陽配合之原第二仲序九卷八十一章解四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交㑹相生爲表裏第四季序九卷八十一章具釋六甲刑禍福德以此等文𫝊授於臣山神禁嚴不得齎出尋究經年粗舉綱要山居險難無以自供不堪窘廹心生懈怠以甲寅之年日維鶉火月呂林鍾景氣鬱盛感物懷歸奉辭影等自爾至今四十五載歴觀時俗堪輿入㑹逕世已久傳寫謬誤吉凶禁忌不能備悉或考良日而值惡㑹舉吉用凶多逢殃咎又史遷郝振中吉大儒亦各撰注流行於世配㑹大小序述隂陽依如本經猶有所闕臣前在東宮以狀奏聞奉被景穆皇帝聖詔敕臣撰錄集其要最仰奉明㫖謹審先所見四序經文抄撮要略當世所須吉凶舉動集成一卷上至天}
