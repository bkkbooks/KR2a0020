  - {type: variant, offset: 1275, length: 125, content: 伯茂好飲酒頗涉疏傲久不徙官曾為豁情賦其序略曰余攝養舛和服餌寡術自春徂夏三嬰湊疾雖桐君上藥有時致効而草木下性實縈衿抱故復究覽莊生具體齊物物我兩忘是非俱遣斯人之達吾所師焉故作是賦所以託名豁情寄之風謠矣天平初遷鄴又為遷都賦文多不載二年因內宴伯茂侮慢殿中尚書, WYG: 濮陽賈元紹}
