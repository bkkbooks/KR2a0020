  - {type: variant, offset: 2254, length: 321, content: 士淵由是稍知之熙平初中尉東平王匡博召辭人以充御史同時射策者八百餘人子昇與盧仲宣孫搴等二十四人為高第於時預選者爭相引決匡使子昇當之皆受屈而去搴謂人曰朝來靡旗亂轍者皆子昇逐北遂補御史時年二十二臺中文筆皆子昇為之以憂去任服闋還為朝請後李神儁行荊州事引兼錄事參軍被徵赴省神儁表留不遣吏部郎中李奬退表不許曰昔伯瑜之不應留王朗所以發歎宜速遣赴無踵彥雲前失於是還省正光末廣陽王淵為東北道行臺召為郎中軍國文翰皆出其手於是才名轉盛黃門郎徐紇受四方表啟答之敏速於淵獨沉思曰彼有溫郎中才藻可畏高車破走珍實盈滿子昇取絹四十匹及淵為葛榮所害子昇亦見羈執榮下都督和洛興與子昇舊識以數十騎潛送子昇得達冀州還京李楷執其手曰卿今得免足使夷甫慚德自是無復宦情閉門讀書厲精不已建義, WYG: 孝昌}
