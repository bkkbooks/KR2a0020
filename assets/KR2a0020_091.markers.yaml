  - {type: variant, offset: 21, length: 10, content: 封肅邢臧裴伯茂邢昕溫, WYG: 太虚縱目逺覽吟嘯之頃懔然増懷不覽至理㧞自近情常韻發於宵夜不任咏歌之末遂援管而爲賦其辭曰陟秀峯以遐眺望靈象於九霄陟昇遐逺九霄九天也覩紫宮之環周嘉帝坐之獨標紫宮垣十五星在北斗北天皇大帝一星在紫宮中天帝位尊故言獨標也瞻華蓋之蔭藹何虛中之迢迢華蓋七星杠九星合十六星在大帝上迢迢髙逺之貌觀閣道之穹隆想靈駕之電飄間道六星在王良東北天帝之所乘躡靈駕之所由從電飄疾也爾乃縱目逺覽傍極四維北鑒機衡南覩太微四維四方之維機衡謂北斗星太微宮十星在翼軫北三台皦皦以雙列皇座冏冏以垂暉三台凡六星兩兩而居起文昌極太微皇座一星在太微星中皦皦冏冏皆星光明之貎也虎賁執鋭於前階常陳屯聚於後闈三台謂之太階虎賁一星在下台南故言前階常陳七星如畢狀在皇座北皆宿衛天帝前後備非常闈門宮中之門也遂回情旋首次目文昌文昌七星在北斗魁前别一宮之名皆相位次也仰見造父爰及王良造父五星在傳舍河中造父周穆王御死精上爲星王良五星在奎北王良者晉大夫善御九方湮之}
  - {type: page-break, offset: 21, content: '', id: KR2a0020_WYG_091-4b, image: WYG0262/WYG0262-0288d.png}
