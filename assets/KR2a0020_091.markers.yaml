  - {type: variant, offset: 2118, length: 0, content: '', krp: 爻觀鳥獸之跡别創文字以代結繩用書契以維事宣之王庭則百工以敘載之方冊則萬品以明迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八嵗入小學保氏敎國子以六書一曰指事二曰象形三曰諧聲四曰㑹意五曰轉注六曰假借蓋是史頡之遺法也及宣王太史史籕著大篆十五篇與古文或同或異時人即謂之籕書至孔子定六經左丘明述春秋皆以古文厥意可得而言其}
  - {type: variant, offset: 2119, length: 0, content: '', WYG: 七國殊軌文字乖别暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙高作爰厯篇太史令胡母敬作博學篇皆取史籕大篆或頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附於小篆所作也以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復敎以籕書又習八體試之課最以爲尚書史吏民上書省字不正輙舉劾焉又有草書莫知誰始考其書形雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者獨張敞從之受涼州刺史杜鄴沛人爰禮講學大夫秦近亦能言之孝平時徴禮等百餘人説文字於未央宮中以禮爲小學元士黄門侍郎揚雄採以作訓纂篇及亡新居攝自以應運制作使大司空甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰篆書云小也四曰佐書秦隸書也五曰繆所以摹印也六曰鳥蟲所以幡信也壁中書者魯恭王壞孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏𫝊書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王敎一端茍有可以加於國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好竒歎儒俗之穿鑿惋文毁於譽痛字敗於訾更詭任情變亂於世故撰説文解字十五篇首一終亥各有部屬包括六藝羣書之話評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物竒怪珍異王制禮儀世間人事莫不畢載可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎將陳留蔡邕採李斯曹喜之法爲古今雜形詔於太學立石碑刋載五經題書楷法多是邕書也後開鴻都書畫竒能莫不雲集于時諸方獻篆無出邕者魏初博士清河張揖著埤倉廣雅古今字詁究諸埤廣綴拾遺漏増長事類抑亦於文爲益者然其字詁方之許慎篇古今體用或得或失矣陳留邯戰淳亦與揖同時博古開藝特善倉雅許氏字指八體六書精究閑理有名於揖以書敎諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣校之説文篆隸大同而古字少異又有京兆韋誕河東衛覬二家竝號能篆當時臺觀榜題寶器之銘悉是誕書咸𫝊之子孫世稱其妙晉世義陽王典祠令任城呂忱表上字林六卷尋其況趣附託許慎說文而按偶章句隱别古籕竒惑之字文得正隸不差篆意也忱弟靜别放故左校令李登聲類之法作韻集五卷宮商龣徴羽各爲一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變形謬錯隸體失真俗學鄙習復加虚巧談辯之士又以意説炫惑於時難以釐改故傳曰以衆非非行正信哉得之於斯情矣乃曰追來爲歸巧言爲辯小兒爲􅀈神虫爲蠶如斯甚衆皆不合孔氏古書史籕大篆許字説文石經三字也凡所關古莫不惆悵焉嗟夫文字者六藝之宗王敎之始前人所以垂今今人所以識古故曰本立而道生孔子曰必也正名乎又曰述而不作書曰予欲觀古人之象皆言遵修舊史而不敢穿鑿也臣六世祖瓊家世陳留往晉之初與從父兄應元俱受學於衛覬古篆之法倉雅方言説文之誼當時竝收善譽而祖官至太子洗馬出爲馮翊郡值洛陽之亂避地河西數世𫝊習斯業所以不墜}
