  - {type: variant, offset: 2927, length: 0, content: '', WYG: 乙丑朔詔尚書拯義陽初附之戸丙寅詔曰掩骼埋胔古之令典順辰修令朝之􅁪式今時澤未降春稼已旱或有孤老餒疾無人贍救因以致死暴露溝塹者洛陽部尉依法棺埋壬申蕭衍將張惠紹入宼陷宿豫乙亥衍將蕭容陷梁城辛巳衍將韋叡陷合肥城壬午詔尚書元遙率衆南討癸未以秦隴未平詔征西將軍于勁節度諸軍己丑衍將又陷羊石霍丘二城六月辛丑又陷小峴戍乙巳安西將軍元麗大破秦賊斬賊帥王智五人梟首六千丁未假平南將軍奚康生破蕭衍將張惠紹斬其徐州刺史宋黑丁巳詔尚書邢巒出討徐兗秋七月丙寅衍將桓和宼孤山陷固城庚辰元麗大破秦賊降吕茍兒及其王公三十餘人秦涇二州平戊子中山王英大破衍徐州刺史王伯敖於隂陵斬其將二十五人首虜五千有餘己丑詔發定}
