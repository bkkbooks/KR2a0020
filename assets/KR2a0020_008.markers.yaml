  - {type: variant, offset: 3682, length: 372, content: 庫莫奚國各遣使朝獻三月庚子徵征西大將軍雍州刺史東陽王丕為司徒丙午詔曰朕政治多闕災眚屢興去年牛疫死傷太半耕墾之利當有虧損今東作既興人湏肄業其敕在所督課田農有牛者加勤於常歲無牛者倍庸於餘年一夫制治田四十畝中男二十畝無令人有餘力地有遺利庫莫奚契丹國各遣使朝獻夏四月丙寅蠕蠕國遣使朝貢丁卯幸白登山壬申幸崞山樂安王良薨詔復前東郡王陸定國官爵五月乙酉車駕祈雨於武州山俄而澍雨大洽蠕蠕國遣使朝貢秋七月壬辰侍中開府儀同三司青州刺史京兆王子推薨庚子定三等死刑己酉太和安昌二殿成起朱明思賢門是月劉昱死弟準僭立八月壬子大赦天下丙子詔曰工商皂隸各有厥分而有司縱濫或染清流自今戶內有工役者推上本部丞已下準次而授若階藉元勳以勞定國者不從此制戊寅劉準遣使朝貢九月癸未蠕蠕國遣使朝貢乙酉詔羣臣定律令於太華殿辛卯高麗國遣使朝貢庚子起永樂遊觀殿於北苑穿神淵池車多羅西天竺舍衞疊伏羅, WYG: 勿吉}
