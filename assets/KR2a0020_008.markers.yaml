  - {type: variant, offset: 2960, length: 6, content: 外戒嚴分京師, WYG: 猶有卒能自守無豫釁亂疾風知勁良在可嘉尚書可甄量報賞以表誠義是月梁州再破反獠四年春二月丙午吐谷渾宕昌國並遣使朝獻己未勿吉國貢楛矢三月丙子疊伏羅國遣使朝貢夏四月戊戌鍾離大水中山王英敗績而還壬寅吐谷渾鳩磨羅阿拔磨抜切磨勒悉萬斤諸國並遣使朝獻夏六月己丑朔詔曰髙祖徳格兩儀明並日月播文教以懷逺人調禮學以旌儁造徙縣中區光宅天邑總霜露之所均一姬卜於洛涘戎繕兼興未遑儒教朕纂承鴻緒君臨寳厯思模聖規述遵先志今天平地寧方隅無事可勅有司準訪前式置國子立太學樹小學於四門丙午蕭衍龍驤將軍馮翊太守宇文子生等七郡相率内附丁未社蘭逹那羅舎彌比羅直諸國並遣使朝獻秋八月辛卯契丹國遣使朝獻己亥中山王英齊王蕭寳夤坐鍾離敗退並除名爲民庚子厙莫奚宕昌吐谷渾諸國遣使朝獻辛丑敦煌民饑開倉賑恤九月己未詔曰朕秉厯承天履年將紀徙正宫極歲浹歸餘台懿茂親祗勤已久列司英彦庸績未酬非所謂有功}
