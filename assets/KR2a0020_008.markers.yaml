  - {type: variant, offset: 3216, length: 0, content: '', WYG: 等諸國並遣使朝獻十有二月己卯髙麗比沙杖國遣使朝獻辛巳江陽王繼坐事除名甲申詔於青州立髙祖廟殿中侍御史王敞謀反伏誅四年春正月丁巳汾州劉龍駒聚衆反詔諫議大夫薛和率衆討之甲子阿悦陁不數羅國並遣使朝獻二月壬午青齊徐兗四州民饑甚遣使賑恤三月癸卯婆比幡彌烏萇比地乾達諸國並遣使朝獻壬戌司徒廣陽王嘉薨夏四月琅邪民王萬夀斬蕭衍輔國將軍琅邪東莞二郡太守劉晰首以朐山來降徐州刺史盧昶遣琅邪戍主傅文驥率衆據之甲戌薛和大破山胡蕭衍遣其鎮北將軍張稷及馬仙琕宼朐山詔盧昶率衆赴之五月己亥遷代京銅龍置天淵池丙辰詔禁天文之學六月乙亥乾達阿婆羅達舎越伽使密不流沙諸國並遣使朝獻秋七月辛酉吐谷渾}
