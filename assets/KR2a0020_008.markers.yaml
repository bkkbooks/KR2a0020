  - {type: variant, offset: 4600, length: 531, content: 子皇叔若薨秋七月戊辰龜茲國遣使獻名駝七十頭劉準遣將寇仇池陰平太守楊廣香擊走之八月分遣使者考察守宰問民疾苦丙戌詔罷諸州禽獸之貢丁亥勿吉國遣使朝獻九月丙辰曲赦京師龜茲國遣使獻大馬名駝珍寶甚衆冬十月壬辰詔員外散騎常侍鄭羲使於劉準十有一月庚戌詔曰懸爵於朝而有功者必縻其賞懸刑於市而有罪者必罹其辜斯乃古今之成典治道之實要諸州刺史牧民之官自頃以來遂各怠慢縱姦納賂背公緣私致令賊盜並興侵劫茲甚姦宄之聲屢聞朕聽朕承太平之運屬千載之期思光洪緒惟新庶績亦望蕃翰羣司敷德宣惠以助沖人共成斯美幸克己復禮思愆改過使寡昧無愧於祖宗百姓見德於當世有司明為條禁稱朕意焉十有二月癸巳誅南郡王李惠是歲州鎮二十餘水旱民飢開倉賑恤三年春正月癸丑坤德六合殿成庚申詔罷行察官二月辛巳帝太皇太后幸代郡溫泉問民疾苦魚眾貧者以宮女妻之己亥還宮壬寅乾象六合殿成三月甲辰曲赦京師戊午吐谷渾高麗國各遣使朝獻夏四月壬申劉準遣使朝獻癸未樂良王樂平薨辛卯蠕蠕國遣使朝獻丙申幸崞山己亥還宮庚子淮陽公尉元進爵為王吐谷渾國遣使獻氂牛五十頭雍州刺史宜都王目辰有罪賜死五月丁巳帝祈雨於北苑閉陽門是日澍雨大洽辛酉詔曰昔四代養老問道乞言朕雖沖昧每尚其美今賜國老各衣一襲綿五斤絹布各五匹六月辛未以雍州民飢開倉賑恤起文石室靈泉殿於方山秋七月壬, WYG: ''}
