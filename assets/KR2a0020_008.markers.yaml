  - {type: variant, offset: 4274, length: 325, content: 壬寅懽喜攻陷葭蘆斬文度傳首京師甲辰員闊吐谷渾國並遣使朝貢丁未詔以州郡八水旱蝗民飢開倉賑恤以安定王休為儀同三司二年春正月丁巳封昌黎王馮熙第二子始興為北平王戊午吐谷渾遣使朝獻二月丁亥行幸代之湯泉所過問民疾苦以宮人賜貧民無妻者戊戌蠕蠕國遣使朝獻癸卯車駕還宮三月丙子以河南公梁彌機為宕昌王夏四月甲申幸崞山丁亥還宮己丑劉準遣使朝貢京師旱甲辰祈天災於北苑親自禮焉減膳避正殿丙午澍雨大洽曲赦京師五月詔曰婚娉過禮則嫁娶有失時之弊厚葬送終則生者有糜費之苦聖王知其如此故申之以禮數約之以法禁迺者民漸奢尚婚葬越軌致貧富相高貴賤無別又皇族貴戚及士民之家不惟氏族下與非類婚偶先帝親發明詔為之科禁而百姓習常仍不肅改朕今憲章舊典祗案先制著之律令永為定準犯者以違制論六月己丑幸鹿野苑, WYG: ''}
