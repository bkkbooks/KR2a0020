  - {type: variant, offset: 5544, length: 1340, content: 月遣尚書游明根率騎二千南討癸巳詔曰朕承乾緒君臨海內夙興昧旦如履薄冰今東作方興庶類萌動品物資生膏雨不降歲一不登百姓飢乏朕甚懼焉其敕天下祀山川羣神及能興雲雨者修飾祠堂薦以牲璧民有疾苦所在存問三月丙午詔車騎大將軍馮熙督衆迎還假梁郡王嘉等諸軍乙卯蠕蠕國遣使朝貢四月己卯幸廷尉籍坊二獄引見諸囚詔曰廷尉者天下之平民命之所懸也朕得惟刑之恤者仗獄官之稱其任也一夫不耕將或受其餒一婦不織將或受其寒今農時要月百姓肆力之秋而愚民陷罪者甚衆宜隨輕重決遣以赴耕耘之業辛巳幸白登山甲申賜天下貧人一戶之內無雜財穀帛者廩一年五月丙申朔幸火山壬寅還宮六月丁卯以澍雨大洽曲赦京師以紬綾絹布百萬匹及南伐所俘賜王公已下秋七月辛亥行幸火山壬子改作東明觀詔會京師耆老賜錦綵衣服几杖稻米蜜麵復家人不徭役悉萬斤國遣使朝貢閏月丁亥幸虎圈親錄囚徒輕者皆免之壬辰頓丘王李鍾葵有罪賜死蕭道成角城戍主請舉城內屬八月丁酉詔徐州刺史假梁郡王嘉赴接之又遣平南將軍郎大檀三將出朐城將軍白吐頭二將出海西將軍元泰二將出連口將軍封匹三將出角城鎮南將軍賀羅出下蔡甲辰幸方山戊申幸武州山石窟寺庚戌還宮乙卯詔諸州置冰室蕭道成梁州刺史崔慧景遣長史裴叔保率衆寇武興關城氐帥楊鼠擊破之叔保還南鄭九月蕭道成汝南太守常元真龍驤將軍胡青苟率戶內屬乙亥思義殿成壬午東明觀成戊子詔曰隆寒雪降諸在徽纆及轉輸在都或有凍餒朕用愍焉可遣侍臣詣廷尉獄及有囚之所周巡省察飢寒者給以衣食桎梏者代以輕鎖假梁郡王嘉破蕭道成將盧紹之玄元度於朐山其下蔡戍主棄城遁走冬十月丁未詔昌黎王馮熙為西道都督與征南將軍桓誕出義陽鎮南將軍賀羅自下蔡東出鍾離蘭陵民桓富殺其縣令與昌慮桓和北連太山羣盜張和顏等聚黨保五固推司馬朗之為主詔淮陽王尉元等討之是歲詔以州鎮十八水旱民飢開倉賑恤五年春正月己卯車駕南巡丁亥至中山親見高年問民疾苦二月辛卯朔大赦天下賜孝悌力田孤貧不能自存者穀帛有差免宮人年老者還其所親丁酉車駕幸信都存問如中山癸卯還中山己酉講武于唐水之陽庚戌車駕還都沙門法秀謀反伏誅南征諸將擊破蕭道成游擊將軍桓康於淮陽道成豫州刺史垣崇祖寇下蔡昌黎王馮熙擊破之假梁郡王嘉大破道成將俘獲三萬餘口送京師三月辛酉朔車駕幸肆州癸亥講武于雲水之陽所經考察守宰加以黜陟己巳車駕還宮詔曰法秀妖詐亂常妄說符瑞蘭臺御史張求等一百餘人招結奴隸謀為大逆有司科以族誅誠合刑憲且矜愚重命猶所弗忍其五族者降止同祖三族止一門門誅止身夏四月己亥行幸方山建永固石室於山上立碑於石室之庭又銘太皇太后終制于金冊又起鑒玄殿壬子以南俘萬餘口班賜羣臣甲寅詔曰時雨不霑春苗萎悴諸有骸骨之處皆敕埋藏勿令露見有神祇之所悉可禱祈任城王雲薨五月庚申朔詔曰廼者邊兵屢動勞役未息百姓因之輕陷刑網獄訟煩興四民失業朕每念之用傷懷抱農時要月民須肆力其敕天下勿使有留獄久囚壬戌鄧至國遣使朝貢庚午青州主簿崔次恩聚衆謀叛州軍擊之次恩走郁洲六月甲辰中山王叡薨戊午封皇叔簡為齊郡王猛為安豐王秋七月甲子蕭道成遣使朝貢辛酉蠕蠕別帥他稽率衆內附甲戌班乞養雜戶及戶籍之制五條九月庚子閱武於南郊大饗羣臣蕭道成使車僧朗以班在劉準使殷靈誕之後辭不就席劉準降人解奉君刃僧朗於會中詔誅奉君等乙亥封昌黎王馮熙世子誕為南平王兗州斬司馬朗之傳首京師冬十月癸卯蠕蠕國遣使朝貢十有二月癸巳詔以州鎮十二民飢開倉賑恤六年春正, WYG: ''}
