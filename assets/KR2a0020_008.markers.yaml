  - {type: variant, offset: 3450, length: 230, content: 乙酉朔詔曰朕夙承寶業懼不堪荷而天貺具臻地瑞並應風和氣晼天人交協豈朕沖昧所能致哉實賴神祇七廟降福之助今三正告初祗感交切宜因陽始崙頁典革元其改今號為太和元年辛亥詔曰今牧民者與朕共治天下也宜簡以徭役先之勸奬相其水陸務盡地利使農夫外布桑婦內勤若輕有徵發致奪民時以侵擅論民有不從長教惰於農桑者加以罪刑起太和安昌二殿己酉秦州略陽民王元壽聚衆五千餘家自號為衝天王雲中飢開倉賑恤二月丙寅漢川民泉會譚酉等相率內屬處之并州辛未秦益二州刺史武都公尉洛侯討破元壽獲其妻子送京師癸未高麗, WYG: 吐谷渾}
