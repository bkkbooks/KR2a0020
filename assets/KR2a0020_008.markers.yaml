  - {type: variant, offset: 2525, length: 0, content: '', WYG: 壬戌以太保咸陽王禧領太尉大將軍廣陵王羽爲司徒詔曰朕幼承寳厯艱憂在疚庶事不親風化未洽今始覽政務義協惟新思使四方風從率善可分遣大使黜陟幽明二月庚午宿衞之官進位一級甲戌大赦天下三月乙未朔詔曰比年以來連有軍旅役務既多百姓彫敝宜時矜量以拯民瘼正調之外諸妨害損民一時蠲罷辛亥詔曰諸州刺史不親民事緩於督察郡縣稽逋旬月之間纔一覽決淹獄久訟動延時序百姓怨嗟方成困敝尚書可明條制申下四方令日親庶事嚴勒守宰不得因循寛怠虧政壬戌詔曰治尚簡静任貴應事州府佐史除板稍多方成損敝無益政道又京師百司寮局殷雜官有閑長者亦同此例茍非稱要悉從蠲省青齊徐兗四州大饑民死者萬餘口是月蕭衍立寳卷弟南康王寳融爲主年號中興東赴建業夏五月壬子廣陵王羽薨壬戌太保咸陽王禧謀反賜死六月丁亥考諸州刺史加以黜陟秋七月乙巳蠕蠕犯塞乙未東豫州刺史田益宗破蕭寳卷將黄天賜於赤亭辛酉大赦天下壬戌車騎將軍儀同三司王肅薨九月丁酉發畿内夫五萬五千人築京師三百二十三坊四旬而罷己亥立皇后于氏乙卯免夀春營戸爲揚州民}
