  - {type: variant, offset: 3230, length: 0, content: '', WYG: 貸饑民自二月不雨至於是晦六月壬申澍雨大洽戊寅通河南牝馬之禁己卯詔曰去歲水災今春炎旱百姓饑餒救命靡寄雖經蠶月不能養績今秋輸將及郡縣期於責辦尚書可嚴勒諸州量民資産明加檢校以救艱敝庚辰詔出太倉粟五十}
  - {type: variant, offset: 3230, length: 0, content: '', krp: 貸饑民自二月不雨至於是晦六月壬申澍雨大洽戊寅通河南牝馬之禁己卯詔曰去歲水災今春炎旱百姓饑餒救命靡寄雖經蠶月不能養績今秋輸將及郡縣期於責辦尚書可嚴勒諸州量民資産明加檢校以救艱敝庚辰詔出太倉粟五十}
  - {type: variant, offset: 3231, length: 1, content: 斤, WYG: 石以賑京師及州郡饑民秋七月吐谷渾契丹國並遣使朝獻八月壬戌吐谷渾國遣使朝貢丁亥勿吉國貢楛矢冬十月乙亥立皇子詡爲皇太子是月嚈噠于闐髙昌及厙莫奚諸國並遣使朝獻十有一月丙申詔曰朕運承天休統御宸宇太子體藉靈明肇建宫華明兩既孚三善方洽宜澤均率壤榮汎庶𦙍其賜天下爲父後者爵一級孝子順孫廉夫節婦旌表門閭量給粟帛十有二月己巳詔守宰爲御史所彈遇赦免者及考在中第皆代之二年春正月戊戌帝御申訟車親理寃訟髙麗國遣使朝獻二月丙辰朔賑恤京師貧民甲戌以六鎮大饑開倉賑贍己卯太尉髙陽王雍進位太保庚辰蕭衍郁州民徐𤣥明等斬送衍鎮北將軍青冀二州刺史張稷首以州内附詔前南兗州刺史樊魯率衆赴之閏二月辛丑以苑牧之地賜代遷民無田者癸卯定奴良之制以景明爲斷三月丙寅髙昌國遣使朝獻是春民饑餓死者數萬口夏四月庚子以絹十五萬匹賑恤河南郡饑民五月夀春大水遣平東將軍奚康生等步騎數千赴之髙麗國遣使朝獻六月乙酉青州民饑詔使者開倉賑恤甲午曲赦揚州辛亥帝御申訟車親理寃訟是夏州郡十三大水秋八月辛卯詔曰頃水旱㸦侵頻年饑儉百姓窘弊多陷罪辜煩刑之愧朕用懼矣其殺人掠賣人羣彊盜首及雖非首而殺傷財主曾經再犯公斷道路劫奪行人者依法行決自餘恕死徒流已下各準減降庚戌嚈噠于闐槃陁及契丹厙莫奚諸國並遣使朝獻九月丙辰以貴族豪門崇習奢侈詔尚書嚴立限級節其流宕是月勿吉吐谷渾鄧至}
