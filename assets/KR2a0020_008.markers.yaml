  - {type: variant, offset: 3207, length: 2, content: 曲赦, WYG: 詔以冀定二州旱儉開倉賑恤六月壬寅詔重求遺書於天下丁卯名皇子曰詡閏月己亥吐谷渾髙麗契丹諸國各遣使朝貢秋七月己未吐谷渾國遣使朝貢八月己卯勿吉國遣使朝貢九月壬寅烏萇伽秀沙尼諸國並遣使朝獻丙辰髙車别帥可略汗等率衆一千七百内屬冬十月辛卯中山王英薨丙申詔曰朕乘乾御厯年周一紀而道謝擊壤教慙刑厝至於下民之煢鰥疾苦心常愍之此而不恤豈爲民父母之意也可勅太常於閑敞之處别立一館使}
