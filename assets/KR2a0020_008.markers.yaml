  - {type: variant, offset: 3229, length: 0, content: '', WYG: 國遣使朝獻己亥詔李崇奚康生等治兵夀春以分朐山之宼戊申難地伏羅國並遣使朝獻朐城陷盧昶大敗而還十有二月壬申詔曰進善退惡治之通規三載考察政之明典正始二年以來于今未考功過難齊寧無昇降從景明二年至永平四年通考以聞戊子大羅汗婆來伽國遣使朝獻延昌元年春正月乙巳以頻水旱百姓饑敝分遣使者開倉賑恤戊申疏勒國遣使朝獻丙辰以車騎大將軍尚書令高肇爲司徒公光祿大夫清河王懌爲司空司州牧廣平王懐進號驃騎大將軍儀同三司二月辛卯朔渴槃陁國遣使朝獻甲午州郡十一大水詔開倉賑恤以京師穀貴出倉粟八十萬石以賑貧者己未安樂王詮薨夏四月詔以旱故食粟之畜皆斷之丁卯詔曰遷京嵩縣年將二紀虎闈闕唱演之音四門絶講誦之業博士端然虗祿歲祀貴遊之胄歎同子衿靖言念之有兼愧慨可嚴勅有司國子學孟冬使成太學四門明年暮春令就戊辰以旱詔尚書與羣司鞫理獄訟詔河北民就穀燕恒二州辛未詔饑民就穀六鎮丁丑帝以旱故減膳徹懸癸未詔曰肆州地震陷裂死傷甚多言念毁没有酸懷抱亡者不可復追生病之徒宜加療救可遣太醫折傷醫幷給所須之藥就治之乙酉大赦改年詔立理訴殿申訟車以盡寃窮之理五月辛卯疏勒及髙麗國並遣使朝獻丙午詔天下有粟之家供年之外}
