  - {type: variant, offset: 2907, length: 0, content: '', WYG: 河州大饑死者二千餘口四年春正月乙亥車駕籍田於千畝梁州氐楊會反詔行梁州事楊椿左將軍羊祉討之三月己巳皇后先蠶於北郊庚辰揚州破蕭衍將於隂山斬其龍驤將軍吳道爽等數千級夏四月癸未朔以蕭寳夤爲鎮東將軍東揚州刺史封丹陽郡開國公齊王庚寅南天竺國獻辟支佛牙戊戌詔曰酷吏爲禍綿古同患孝婦淫刑東海燋壤今不雨十旬意者其有寃獄乎尚書鞫京師見囚務盡聽察之理己亥帝以旱減膳徹懸辛丑澍雨大洽五月甲戌楊椿羊祉大破反氐斬首數千級六月壬午朔封皇弟悦爲汝南王丙戌發冀定瀛相并濟六州二萬人馬千疋增配夀春秋七月乙卯三老平陽公元丕薨庚午詔還収鹽池利以入公辛未以彭城王勰爲太師八月庚子以史部尚書元英假鎭南將軍攻蕭衍義陽勿吉國貢楛矢辛丑行幸河南城離宫冬十有一月壬子揚州大破蕭衍軍斬其徐州刺史潘佃憐擒司馬明素己未以武興國世子楊紹先爲其國王癸亥詔尚書左僕射源懷撫勞代都北鎭隨方拯恤乙亥鎮南將軍元英大破蕭衍將吳子陽於白沙擒斬千數十有二月庚寅詔鎮南將軍李崇討東荆反蠻丙申詔曰先朝制立軌式庶事惟允但歲積人移物情乖惰比或擅有增損廢墜不行或守舊遺宜時有舛妨或職分錯亂互相推委其下百司列其疑闕速以奏聞癸卯蕭衍梁州刺史平陽縣開國侯翟逺徐州刺史永昌縣開國侯陳虎牙降正始元年春正月庚戌江州刺史曲江公陳伯之破蕭衍將趙祖悦於東闕丙辰東荆州刺史楊大眼大破羣蠻樊季安等丙寅大赦改年二月戊子蕭衍將姜慶真襲陷夀春外郭州軍擊走之丁酉揚州統軍劉思祖大破衍衆於邵陽擒其冠軍將軍邵陽縣開國侯張惠紹驍騎將軍祁陽縣開國男趙景悦等十將斬獲數千級三月壬申元英破衍將王僧炳於樊城夏四月辛卯髙麗國遣使朝獻五月丁未朔太傅北海王詳以罪廢爲庶人六月以旱徹樂減膳癸巳詔曰朕以匪德政刑多舛陽旱歴旬京甸枯瘁在予之責夙宵疚懐有司可循案舊典祗行六事囹圄寃滯平處決之庶尹廢職重加脩舉鰥寡困窮在所存恤役賦殷煩咸加蠲省賢良讜直以禮進之貪殘佞諛時加屏黜男女怨曠務令媾會稱朕意焉甲午帝以旱親薦享於太廟戊戌詔立周旦夷齊廟於首陽山庚子以旱見公卿已下引咎責躬又錄京師見囚殊死已下皆減一等鞭杖之坐悉皆原之秋七月癸丑蕭衍角城戍主柴慶宗以城來降李崇大破諸蠻帥樊素安八月丙子元英破蕭衍將馬仙琕於義陽詔洛陽令有大事聽面敷奏乙酉元英攻義陽拔之擒送蕭衍冠軍將軍蔡靈恩等十餘將辛卯英又大破衍將仍清三闗丁酉封元英爲中山王戊戌西𦍑宋萬率戸四千内附九月丙午詔緣淮南北所在鎮戍皆令及秋播麥春種粟稻隨其土宜水陸兼用必使地無遺利兵無餘力比及來稔令公私俱濟也又詔諸州蠲停徭役不得横有徴發甲子詔中山王英所執蕭衍冠軍將軍監司州事蔡靈恩等隨才擢叙乙丑蕭衍霍州刺史田道龍義州刺史張宗之遣使内附蠕蠕犯塞詔左僕射源懷討之冬十月乙未詔斷羣官白衣募吏十有一月戊午詔曰古之哲王剏業垂統安民立化莫不崇建膠序開訓國胄昭宣三禮崇明四術使道暢羣邦風流萬宇自皇基徙構光宅中區軍國務殷未遑經建靖言思之有慙古烈可勅有司依漢魏舊章營繕國學十有二月丙子以苑牧公田分賜代遷之戸己卯詔羣臣議定律令己亥行幸伊闕閏月癸卯朔蕭衍行梁州事夏侯道遷據漢中來降假尚書邢巒鎮西將軍率衆以赴之乙丑驃騎大將軍髙陽王雍爲司空尚書令廣陽王嘉加儀同三司二年春正月丙子以宕昌國世子梁彌博爲其國王鄧至國遣使朝貢二月梁州氐反絶漢中運路刺史邢巒頻大破之夏四月己未城陽王鸞薨乙丑詔曰任賢明治自昔通規宣風賛務實惟多士而中正所銓但存門第吏部彜倫仍不才舉遂使英德罕昇司務多滯不精厥選將何考陟八座可審議往代貢士之方擢賢之體必令才學並申資望兼致丙寅以仇池氐叛詔光祿大夫楊椿假平西將軍率衆以討之邢巒遣統軍王足西伐頻破蕭衍諸軍遂入劒閣執衍輔國將軍范始男送京師五月辛巳氐賊闕字一虎率衆降六月己丑詔曰先朝勲臣或身罹譴黜子孫沉滯或宦途失次有替舊流因而弗採何以獎勸言念前績情有親疎宗及庶族祖曾功績可紀而無朝官有官而才堪優引者隨才銓授甲寅蕭衍冠軍將軍李畋等置營始平郡東涪水之北王足逆擊敗之斬衍冠軍將軍張湯輔國將軍馬市寧朔將軍李當姜見祖輔國將軍馮文豪龍驤將軍何營之等甲子詔尚書李崇太府卿于忠散騎常侍游肇諫議大夫鄧羡崇忠使持節並兼侍中羡兼黄門俱爲大使糾斷外州畿内其守令之徒咎失彰露者卽便施決州鎮重職聽爲表聞乙丑蕭衍冠軍將軍王景允輔國將軍魯方逹等攻竹亭王足大破之斬其輔國將軍王明達龍驤將軍張方熾丁卯揚州刺史薛真度大破蕭衍將王超宗俘斬三千級戊辰蕭衍將魯方逹屯戍新城足又遣統軍盧祖遷等擊敗之斬衍冠軍將軍楊伯仁寧朔將軍任安定秋七月甲戌詔曰朕纂馭寳厯於今七載德澤未敷鑒不燭逺人之寃瘼所在猶滋而糾察之獄未暢于下賢愚靡分皂白均貫非所以革民耳目使善惡勵心今分遣大使省方廵檢隨其愆負與風響相符者卽加糾黜以明雷霆之威以申旄軒之舉因以觀風辨俗採訪功過襃賞賢者糾罰淫慝理窮恤弊以稱朕心戊子王足擊破蕭衍軍斬其龍驤將軍喻增暉寧朔將軍庫保夀輔國將軍魯天惠建武將軍王文摽王足逼涪城壬辰蕭衍巴西太守庾域冠軍將軍統軍主李畋等逆戰足擊破之俘斬千數八月壬寅詔中山王英南討襄沔庚戌王足遣統軍紀洪雅盧祖遷等攻破衍軍斬其秦梁二州刺史魯方逹等十五人壬子王足又遣統軍盧祖遷等擊破衍軍斬其都督冠軍將軍梓潼縣開國子王景𦙍劉逹等二十四將軍甲寅揚州擊衍將姜慶真於羊石破之}
