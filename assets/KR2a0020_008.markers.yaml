  - {type: variant, offset: 2909, length: 0, content: '', WYG: 衍沔東太守田青喜率郡七縣三十一户萬九十内附九月己巳揚州刺史元嵩擊破衍湘州刺史楊公則等斬獲數千冬十有一月戊辰朔武興國王楊紹先叔父集起謀反詔光祿大夫楊椿討之王足圍涪城益州諸郡戍降者十二三民送編籍者五萬餘戸旣而足引軍而退十有二月庚申又詔驃騎大將軍源懐慎令討武興反氐三年春正月丁卯朔皇子生大赦天下壬申梁秦二州刺史邢巒連破氐賊克武興蕭衍冀州刺史桓和入宼南青州州軍擊走之秦州民王智等聚衆二千自號王公尋推秦州主簿吕茍兒爲主年號建明己卯楊集起兄弟相率降二月丙辰詔曰昔虞戒面從昌言屢進周任諫輔王闕必箴朕仰纉鴻基伏膺寳厯思康庶績一日萬幾是以側望忠言虗求讜直而良策弗進規畫無聞豈所謂弼諧元首匡救不逮者乎可詔王公已下其有嘉謀深圖直言忠諫利國便民矯時厲俗者咸令指事陳奏無或依違戊午詔右衞將軍元麗等討吕茍兒乙丑平南將軍陳伯之破蕭衍徐州刺史昌義之於梁城是月衍將蕭昞率衆五萬宼淮陽三月己巳以戎旅大興詔罷諸作己卯詔荆州刺史趙怡平南將軍奚康生赴淮陽樂浪王長命坐殺人賜死國除戊子名皇子曰昌庚寅平南將軍曲江縣開國公陳伯之自梁城南奔夏四月乙未詔罷鹽池禁甲辰詔遣使者廵慰北邉酋庶庚戌以中山王英爲征南將軍都督揚徐二道諸軍事指授邉將蕭衍江州刺史王茂先宼荆州屯於河南城詔平南將軍楊大眼討之辛酉大破之斬其輔國將軍王花首虜二千餘進攻河南城茂先逃潰追奔至於漢水㧞其五城將軍宇文福略衍}
