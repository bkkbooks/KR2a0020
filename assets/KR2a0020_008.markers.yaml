  - {type: variant, offset: 1009, length: 1304, content: 國遣使朝貢壬寅詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗八月丙辰百濟國遣使奉表請師伐高麗辛酉地豆于庫莫奚國遣使朝貢昌亭國遣使獻蜀馬河西費也頭反薄骨律鎮將擊走之九月辛巳車駕還宮戊申統萬鎮將河間王閭虎皮坐貪殘賜死己酉詔以州鎮十一水丐民田租開倉賑恤又詔流迸之民皆令還本違者配徙邊鎮冬十月蠕蠕犯塞及於五原十有一月太上皇帝親討之將度漠襲擊蠕蠕聞軍至大懼北走數千里以窮寇遠遁不可追乃止丁亥封皇叔略為廣川王壬辰分遣使者巡省風俗問民疾苦帝每月一朝崇光宮十有二月庚戌詔曰書云三載一考三考黜陟幽明頃者已來官以勞升未久而代牧守無恤民之心競為聚斂送故迎新相屬於路非所以固民志隆治道也自今牧守溫仁清儉克己奉公者可久於其任歲積有成遷位一級其有貪殘非道侵削黎庶者雖在官甫爾必加黜罰著之於令永為彝準詔以代郡事同豐沛代民先配邊戍者皆免之三年春正月庚辰詔員外散騎常侍崔演使於劉昱丁亥改崇光宮為寧光宮戊戌太上皇帝還至雲中是月相州執送妖人榮永安於京師斬之詔赦其支黨二月戊申高麗契丹國並遣使朝貢癸丑詔牧守令長勤率百姓無令失時同部之內貧富相通家有兼牛通借無者若不從詔一門之內終身不仕守宰不督察免所居官戊午太上皇帝至自北討飲至策勳告於宗廟死王事者復其家詔畿內民從役死事者郡縣為迎喪給以葬費甲戌詔縣令能靜一縣劫盜者兼治二縣即食其祿能靜二縣者兼治三縣三年遷為郡守二千石能靜二郡上至三郡亦如之三年遷為刺史三月壬午詔諸倉囤穀麥充積者出賜貧民夏四月戊申詔假司空上黨王長孫觀等討吐谷渾拾寅壬子契丹國遣使朝貢詔以孔子二十八世孫魯郡孔乘為崇聖大夫給十戶以供洒掃六月甲子詔曰往年縣召民秀二人問以守宰治狀善惡具聞將加賞罰而賞者未幾罪者衆多肆法傷生情所未忍今特垂寬恕之恩申以解網之惠諸為民所列者特原其罪盡可貸之秋七月詔河南六州之民戶收絹一匹綿一斤租三十石乙亥行幸陰山蠕蠕寇敦煌鎮將樂洛生擊破之事具蠕蠕傳劉昱遣將寇緣淮諸鎮徐州刺史淮陽公尉元擊走之八月己酉高麗庫莫奚國並遣使朝獻庚申帝從太上皇帝幸河西拾寅謝罪請降許之九月辛巳車駕並還宮乙亥劉昱遣使朝貢己亥詔曰自今京師及天下之囚罪未分判在獄致死無近親者公給衣衾棺櫝葬埋之不得曝露辛丑詔遣使者十人循行州郡檢括戶口其有仍隱不出者州郡縣戶主並論如律庫莫奚國遣使朝獻冬十月太上皇帝親將南討詔州郡之民十丁取一以充行戶收租五十石以備軍糧悉萬斤國遣使朝獻武都王反攻仇池詔長孫觀仍回師討之十有一月戊寅詔以河南七州牧守多不奉法致新邦之民莫能上達遣使者觀風察獄黜陟幽明其有魚眾寡孤獨貧不自存者復其雜徭年八十已上一子不從役力田孝悌才器有益於時信義著於鄉閭者具以名聞癸巳太上皇帝南巡至於懷州所過問民疾苦賜高年孝悌力田布帛十有二月庚戌詔關外苑囿聽民樵採壬子蠕蠕犯邊柔玄鎮二部敕勒叛應之癸丑沙門慧隱謀反伏誅是歲州鎮十一水旱丐民田租開倉賑恤相州民餓死者二千八百四十五人吐谷渾部內羌民鍾豈渴干等二千三百戶內附是年妖人劉舉自稱天子齊州刺史武昌王平原捕斬之四年春正月丁丑侍中太尉隴西王源賀以病辭位辛巳粟特國遣使朝獻二月甲辰太上皇帝至自南巡辛亥吐谷渾拾寅遣子費斗斤入侍并獻方物辛未禁斷寒食三月丁亥詔員外散騎常侍許赤虎使於劉昱高麗吐谷渾曹利諸國各遣使朝貢夏五月甲戌蠕蠕, WYG: ''}
