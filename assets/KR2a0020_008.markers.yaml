  - {type: variant, offset: 8085, length: 996, content: 月甲辰詔曰帝業至重非廣詢無以致治王務至繁非博採無以興功先王知其如此故虛己以求過明恕以思咎是以諫鼓置於堯世謗木立於舜庭用能耳目四達庶類咸熙朕承累聖之洪基屬千載之昌運每布遐風景行前式承明之初班下內外聽人各盡規以補其闕中旨雖宣允稱者少故變時法遠遵古典班制俸祿改更刑書寬猛未允人或異議思言者莫由申情求諫者無因自達故令上明不周下情壅塞今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世事之要使言之者無罪聞之者足以為戒九月甲午蕭賾遣使朝貢戊戌詔曰俸制已立宜時班行其以十月為首每季一請於是內外百官受祿有差冬十月高麗國遣使朝貢蕭賾雙城戍主王繼宗內屬十有一月乙未詔員外散騎常侍李彪員外郎蘭英使於蕭賾十有二月詔以州鎮十五水旱民飢遣使者循行問所疾苦開倉賑恤九年春正月戊寅詔曰圖讖之興起於三季既非經國之典徒為妖邪所憑自今圖讖祕緯及名為孔子閉房記者一皆焚之留者以大辟論又諸巫覡假稱神鬼妄說吉凶及委巷諸卜非墳典所載者嚴加禁斷癸未大饗羣臣于太華殿班賜皇誥二月己亥制皇子封王者皇孫及曾孫紹封者皇女封者歲祿各有差以廣陽王建第二子嘉紹建後為廣陽王乙巳詔曰昔之哲王莫不博採下情勤求箴諫建設旌鼓詢納芻蕘朕班祿刪刑慮不周允虛懷讜直思顯洪猷百司卿士及工商吏民其各上書極諫靡有所隱三月丙申宕昌國遣使朝貢封皇弟禧為咸陽王幹為河南王羽為廣陵王雍為潁川王勰為始平王詳為北海王夏四月癸丑幸方山甲寅還宮五月高麗國及蕭賾並遣使朝貢六月辛亥幸方山遂幸靈泉池丁巳還宮秋七月丙寅朔新作諸門癸未遣使拜宕昌王梁彌機兄子彌承為其國王戊子幸魚池登青原岡甲午還宮八月己亥行幸彌澤甲寅登牛頭山庚申詔曰數州災水飢饉荐臻致有賣鬻男女者天之所譴在予一人而百姓無辜橫罹艱毒朕用殷憂夕惕忘食與寢今自太和六年已來買定冀幽相四州飢民良口者盡還所親雖娉為妻妾遇之非理情不樂者亦離之甲子還宮冬十月丁未詔曰朕承乾在位十有五年每覽先王之典經綸百氏儲畜既積黎元永安爰暨季葉斯道陵替富強者并兼山澤貧弱者望絕一致令地有遺利民無餘財或爭畝畔以亡身或因飢饉以棄業而欲天下太平百姓豐足安可得哉今遣使者循行州郡與牧守均給天下之田還受以生死為斷勸課農桑興富民之本戊申高麗吐谷渾國並遣使朝貢辛酉侍中司徒魏郡王陳建薨詔員外散騎常侍李彪尚書郎公孫阿六頭使蕭賾十有二月乙卯侍中淮南王他為司徒蠕蠕犯塞詔任城王澄率衆討之是年京師及州鎮十三水旱傷稼宕昌高麗吐谷渾等國並遣使朝貢, WYG: 考證}
