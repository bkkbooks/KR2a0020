  - {type: variant, offset: 3188, length: 0, content: '', WYG: 定州刺史安樂王詮大破元愉於信都北戊戌殺侍中太師彭城王勰辛丑詔赦冀州民雜工役爲元愉所詿誤者其能斬獲逆黨别加優賞癸卯李平克信都元愉北走斬其所署冀州牧韋超右衛將軍睦雅尚書僕射劉子直吏部尚書崔朏等統軍叔孫頭執愉送信都羣臣請誅愉帝弗許詔送京師冀州平庚子郢州司馬彭珍治中督榮祖等謀叛潛引蕭衍衆入義陽郢州刺史婁悦擊走之詔將軍胡季智屈祖等南赴義陽三闗戍主侯登陽鳳省等以城南叛婁悦嬰城固守遣中山王英督步騎三萬以赴之冬十月丁巳詔復故北海王詳本封葬以王禮豫州彭城人白早生殺刺史司馬悦據城南叛蕭衍遣將齊茍仁等四將以助之詔尚書邢巒行豫州事督將軍崔暹率騎討之丙子邢巒大破早生及茍仁軍於鮑口丁丑前宿豫戍主成安樂子景儁殺宿豫戍主嚴仲賢以城南叛十有一月庚寅詔安東將軍楊椿率衆四萬攻宿豫十有二月己未邢巒克懸瓠斬白早生擒齊茍仁等俘蕭衍卒三千餘人分賜王公已下癸亥中山王英破衍將於楚城擒衍寧朔將軍張疑等郢州刺史婁悦破衍將馬仙琕於金山壬申漢東巒民一萬七千戸相率内附丙子髙麗國遣使朝獻是歲髙昌國王麴嘉遣其兄子私署左衛將軍孝亮奉表來朝因求内徙乞師迎接二年春正月蕭衍遣王神念宼南兗詔輔國將軍長孫稚假平南將軍爲都督率統軍邴虬等五軍以討之丁亥胡密步就磨忸密槃是悉萬斤辛豆那越抜忸諸國並遣使朝獻壬辰嚈噠薄知國遣使來朝貢白象一乙未髙昌國遣使朝貢丙申中山王英進逼蕭衍長薄戍戊戌宵潰殺傷千數丁酉抜武陽闗擒衍雲騎將軍松滋縣開國侯馬廣冠軍將軍遷陵縣開國子彭瓫生驍騎將軍當陽縣開國伯徐元季等二十六將俘獲七千餘人進攻黄峴西闗衍將馬仙琕棄西闗李元履棄黄峴遁走是月涇州沙門劉惠汪聚衆反詔華州刺史奚康生討之二月乙卯詔曰比軍役頻興仗多毁敗在庫戎器見有無幾安不忘危古人所戒五兵之器事須充積經造既殷非衆莫舉今可量造四萬人雜仗三月癸未磨豆羅阿曜社蘇突闍地伏羅諸國並遣使朝獻夏四月己酉詔以武川鎮饑開倉賑恤甲子詔曰聖人濟世隨物汙隆或正或權理無恒在先朝以雲駕甫遷嵩基始構河洛民庶徙舊未安代來新宅尚不能就伊闕西南羣蠻填聚沔陽賊城連邑作戍蠢爾愚巴心未純欵故暫抑造育之仁權緩肅姦之法今京師天固與昔不同揚郢荆益皆悉我有保險諸蠻罔不歸附商洛民情誠倍往日唯樊襄已南仁乖道政被拘隔化非民之咎而無頼之徒輕相劫掠屠害良善離人父兄衍之爲酷實亦深矣便可放彼掠民示其大惠捨此殘賊未令之愆并勅緣邉州鎮自今已後不聽境外宼盜犯者罪同境内若州鎮主將知容不糾坐之如律五月髙麗國遣使朝獻辛丑帝以旱故減膳徹懸禁斷屠殺甲辰幸華林都亭親錄囚徒犯死罪已下降一等六月髙昌國遣使朝獻辛亥詔曰江海方同車書宜一諸州軌轍南北不等今可申勅四方使逺近無二秋七月癸未契丹國遣使朝獻八月丁未鄧至國遣使朝獻戊申以鄧至國世子像覽蹄爲其國王高昌勿吉厙莫奚諸國並遣使朝獻九月辛巳封故北海王子顥爲北海王壬午詔定諸門闥名冬十月癸丑以司空廣陽王嘉爲司徒庚午郢州獻七寳牀詔不納十有一月}
