  - {type: variant, offset: 7483, length: 233, content: 大赦天下五月戊寅朔幸武州山石窟佛寺六月定州上言為粥給飢人所活九十四萬七千餘口秋七月丁丑帝太皇太后幸神淵池甲申幸方山詔假員外散騎常侍李彪員外郎蘭英使於蕭賾濟南王羅拔改封趙郡王九月壬寅詔曰朕承祖宗夙夜惟懼然聽政之際猶慮未周至於案文審獄思聞己過自今羣官奏事當獻可替否無或面從俾朕之過彰於遠近冀州上言為粥給飢民所活七十五萬一千七百餘口冬十月戊午皇信堂成十有一月辛丑蕭賾遣使朝貢十有二月癸丑詔曰淳風行於上古禮化用乎近葉是以夏殷不嫌一族之婚周世始絕同姓之娶斯皆教隨時設治因事改者, WYG: 亦謂恂}
