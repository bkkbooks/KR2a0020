  - {type: variant, offset: 157, length: 696, content: 傷化悉心以聞壬午青州高陽民封辯自號齊王聚黨千餘人州軍討滅之高麗民奴久等相率來降各賜田宅冬十月丁亥沃野統萬二鎮敕勒叛詔太尉隴西王源賀追擊至枹罕滅之斬首三萬餘級徙其遺迸於冀定相三州為營戶庚寅以征東大將軍南安王楨為假節都督涼州及西戎諸軍事領護西域校尉儀同三司鎮涼州朔方民曹平原招集不逞破石樓堡殺軍將劉彧將垣崇祖率衆二萬自郁洲寇東兗州屯于南城固十有一月刺史于洛侯討破之崇祖還郁洲妖賊司馬小君聚衆反於平陵齊州刺史武昌王平原討擒之十有二月乙酉以駙馬都尉穆亮為趙郡王壬辰詔訪舜後獲東萊郡民媯苟之復其家畢世以彰盛德之不朽復前濮陽王孔雀本封辛丑趙郡王穆亮徙封長樂王二年春正月乙卯統萬鎮胡民相率北叛詔寧南將軍交阯公韓拔等追滅之大陽蠻酋桓誕率戶內屬拜征南將軍封襄陽王曲赦京師及河西南至秦涇西至枹罕北至涼州諸鎮詔假員外散騎常侍邢祐使於劉彧二月乙巳詔曰尼父稟達聖之姿體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所致令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生鼓舞倡優媟狎豈所以尊明神敬聖道者也自今已後有祭孔子廟制用酒脯而已不聽婦女合雜以祈非望之福犯者以違制論其公家有事自如常禮犧牲粢盛務盡豐潔臨事致敬令肅如也牧司之官明糾不法使禁令必行蠕蠕犯塞太上皇帝次於北郊詔諸將討之虜遁走其別帥阿大干率千餘落來降東部敕勒叛奔蠕蠕太上皇帝追之至石磧不及而還壬子高麗國遣使朝貢三月太上皇帝至自北討戊辰以散騎常侍駙馬都尉萬安國為大司馬大將軍封安城王庚午車駕耕於藉田石城郡獲曹平原送京師斬之連川敕勒謀叛徙配青徐齊兗四州為營戶夏四月庚子詔工商雜伎盡聽赴農諸州郡課民益種菜果辛亥劉彧遣使朝貢癸酉詔沙門不得去寺浮遊民間行者仰以公文是月劉彧死子昱僭立, WYG: 宰輔}
