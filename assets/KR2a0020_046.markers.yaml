  - {type: variant, offset: 3291, length: 311, content: 庭始為使人撿鎮將罪狀之處尼須揮淚而已無以對之懷既而表劾尼須其奉公不撓皆此類也懷又表曰景明以來北蕃連年災旱高原陸野不任營殖唯有水田少可菑畝然主將參僚專擅腴美瘠土荒疇給百姓因此困弊日月滋甚諸鎮水田請依地令分給細民先貧後富若分付不平令一人怨訟者鎮將已下連署之官各奪一時之祿四人已上奪祿一周北鎮邊蕃事異諸夏往日置官全不差別沃野一鎮自將已下八百餘人黎庶怨嗟僉曰煩猥邊隅事尠實少畿服請主帥吏佐五分減二詔曰省表具恤民之懷已敕有司一依所上下為永準如斯之比不便於民損化害政者其備列以聞時細民為豪強陵壓積年枉滯一朝見申者日有百數所上事宜便於北邊者凡四十餘條皆見嘉納正始元年九月有告蠕蠕率十二萬騎六道並進欲直趨沃野懷朔南寇代詔懷以本官加使持節侍, WYG: ''}
