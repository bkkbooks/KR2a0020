  - {type: variant, offset: 1772, length: 995, content: 善於撫恤劫盜息止流民皆相率來還歲餘復拜殿中尚書加侍中參都曹事又督諸軍征蠕蠕六道大將咸受節度遷尚書令參議律令後例降為公除司州刺史從駕南征加衞大將軍領中軍事以母憂去職賜帛三百匹穀千石十九年除征北大將軍夏州刺史轉都督雍岐東秦諸軍事征西大將軍雍州刺史景明二年徵為尚書左僕射加特進時有詔以姦吏犯罪每多逃遁因眚乃出並皆釋然自今已後犯罪不問輕重而藏竄者悉遠流若永避不出兄弟代徙懷乃奏曰謹按條制逃吏不在赦限竊惟聖朝之恩事異前宥諸流徙在路尚蒙旋反況有未發而仍遣邊戍按守宰犯罪逃走者衆祿潤既優尚有茲失及蒙恩宥卒然得還今獨苦此等恐非均一之法如臣管執謂宜免之書奏門下以成式既班駁奏不許懷重奏曰臣以為法貴經通治尚簡要刑憲之設所以網羅罪人苟理之所備不在繁典行之可通豈容峻制此乃古今之達政救世之規伏尋條制勳品已下罪發逃亡遇恩不宥仍流妻子雖欲抑絕姦途匪為通式謹按事條侵官敗法專據流外豈九品已上人皆貞白也其諸州守宰職任清流至有貪濁事發逃竄而遇恩免罪勳品已下獨乖斯例如此則寬縱上流法切下吏育物有差惠罸不等又謀逆滔天輕恩尚免吏犯微罪獨不蒙赦使大宥之經不通開生之路致壅進違古典退乖今律輒率愚見以為宜停書奏世宗納之其年除車騎大將軍涼州大中正懷奏曰南賊遊魂江揚職為亂逆肆厥淫昏月滋日甚貴臣重將靡有孑遺崇信姦回昵比閹豎內外離心骨肉猜叛蕭寶融僭號於荊郢其雍州刺史蕭衍勒兵而東襲上流之衆已逼其郊廣陵京口各持兵而懷兩望鍾離淮陰並鼎峙而觀得失秣陵孤危制不出門君子小人並罹災禍延首北望朝不及夕斯實天啟之期吞并之會乘厥蕭牆之釁藉其分崩之𨻶東據歷陽兼指瓜步緣江鎮戍達於荊郢然後奮雷電之威布山河之信則江西之地不刃自來吳會之鄉指期可舉昔士治有言皓若暴死更立賢主文武之官各得其任則勁敵也若蕭衍克就上下同心非直後圖之難實亦揚境危逼何則壽春之去建鄴七百而已山川水陸彼所諳利脫江湘無波君臣效職藉水憑舟忽而至壽春容不自保江南䝏若之何今寶卷邑居有土崩之形邊城無繼援之兆清蕩江區實在今日臣受恩既重不敢不言詔曰不君不臣江南常弊有粟不食其在斯矣上天䝏欲亡之諸蕃又願取之人事天道孰云匪會但以養害仁者不為且十月五日衍軍已達大航其大傷小亡之勢久應有決假令天罰寶卷衍兵獲進則衍之主佐又是亂亡遺孽皇靈其能久祐之乎今之所矜者正以南黔企德邊書繼至殄悴之氓理須救接若爾者揚州兵力配積不少但可速遣任城委以處分別加慰勉令妙盡邊算也以衍事克遂停懷又表曰昔世祖昇遐南安在位出拜東廟為賊臣宗愛所弒時, WYG: ''}
