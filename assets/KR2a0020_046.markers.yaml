  - {type: variant, offset: 4513, length: 857, content: 玄諒弟子雍字靈和少好文雅篤志於學推誠待士士多歸之自祕書郎除太子舍人涼州中正肅宗踐阼以宮臣例轉奉車都尉遷司徒屬轉太中大夫司徒司馬除農太守遷夏州刺史時沃野鎮人破落汗拔陵首為反亂所在蜂起統萬逆胡與相應接子雍嬰城自守城中糧盡煮馬皮而食之子雍善綏撫得士心人人戮力無有離貳以飢饉轉切欲自出求糧留子延伯據守僚屬僉云今天下分析寇賊萬重四方音信莫不斷絕俄頃之間變在不意何宜父子如此分張未若棄城俱去更展規略子雍泣而謂衆曰吾世荷國恩早受藩寄此是吾死地更欲何求然守禦以來歲月不淺所患乏糧不得制勝吾今向東州得數月之食還與諸人保全必矣遂自率羸弱向東夏運糧延伯與將士送出城外哭而拜辭三軍莫不嗚咽子雍行數日為朔方胡帥曹阿各拔所邀力屈見執子雍乃密遣人齎書間行與城中文武云大軍在近努力圍守必令諸人福流苗裔又敕延伯令共固守子雍雖被囚執雅為胡人所敬常以民禮事之子雍為陳安危禍福之理勸阿各拔令降阿各拔將從之未果而死拔弟桑生代總部衆竟隨子雍降時北海王顥為大行臺子雍具陳賊可滅之狀顥給子雍兵馬令其先行時東夏合境反叛所在屯結子雍轉鬬而前九旬之中凡數十戰仍平東夏徵稅租粟運於統萬於是二夏漸寧及蕭寶夤等為賊所敗賊帥宿勤明達遣息阿非率衆邀路華州白水被圍逼關右騷擾咫尺不通時子雍新平黑城遂率士馬并夏州募義之民攜家席卷鼓行南出賊帥康維摩擁率羌胡守鋸谷斷鱡棠橋子雍與交戰大破之生禽維摩又攻賊帥契官斤於楊氏堡破之子雍出自西夏漸至於東轉戰千里至是朝廷始得其委問除散騎常侍使持節假撫軍將軍都督兼行臺尚書復破賊帥紇單步胡提於曲沃堡肅宗璽書勞勉之子雍在白水郡復破阿非軍多所斬獲詔遣侍中尚書令城陽王徽於潼關宣旨慰勞除中軍將軍金紫光祿大夫給事黃門侍郎封樂平縣開國公邑一千戶還洛以葛榮久逼信都詔假子雍征北將軍為北討都督時相州刺史安樂王鑒據鄴反敕子雍與都督李神軌先討之子雍行達湯陰鑒遣弟斌之夜襲子雍軍不克奔敗而返子雍乘機繼進徑圍鄴城與裴衍神軌等攻鑒平之改封陽平縣開國公增邑千五百戶進號鎮東將軍遂與裴衍發鄴以討葛榮而信都城陷除子雍冀州刺史餘官如故子雍以冀州不守上書曰賊中甚飢專仰野掠今朝廷足食兵, WYG: ''}
