  - {type: variant, offset: 1068, length: 568, content: 乃徵拜太尉蠕蠕寇邊賀從駕追討破之顯祖將傳位于京兆王子推時賀都督諸軍屯漠南乃馳傳徵賀賀既至乃命公卿議之賀正色固執不可即詔賀持節奉皇帝璽綬以授高祖是歲河西敕勒叛遣賀率衆討之降二千餘落倍道兼行追賊黨郁朱于等至枹罕大破之斬首五千餘級虜男女萬餘口雜畜三萬餘頭復追統萬高平上邽三鎮叛敕勒至于金城斬首三千級賀依古今兵法及先儒耆舊之說略採至要為十二陳圖以上之顯祖覽而嘉焉賀以年老辭位詔不許又詔都督三道諸軍屯于漠南是時每歲秋冬遣軍三道並出以備北寇至春中乃班師賀以勞役京都又非禦邊長計乃上言請募諸州鎮有武健者三萬人復其徭賦厚加賑恤分為三部二鎮之間築城城置萬人給強弩十二床武衞三百乘弩一床給牛六頭武衞一乘給牛二頭多造馬槍及諸器械使武略大將二人以鎮撫之冬則講武春則種殖並戍並耕則兵未勞而有盈畜矣又於白道南三處立倉運近州鎮租粟以充之足食足兵以備不虞於宜為便不可歲常舉衆連動京師令朝庭有北顧之慮也事寢不報又上書稱病篤乞骸骨至于再三乃許之朝有大議皆就詢訪又給衣藥珍羞太和元年二月療疾於溫湯高祖文明太后遣使者屢問消息太醫視疾患篤還京師賀乃遺令敕諸子曰吾頃以老患辭事不悟天慈降恩爵逮於汝汝其毋傲吝毋荒怠毋奢越毋嫉妬疑思問言思審行思恭服思度遏惡揚善親賢遠佞目觀必真耳屬必正誠勤以事君清約以行己吾終之後所葬時服單櫝足申孝心芻靈明器一無用也三年秋薨年七十三贈侍中太尉隴西王印綬, WYG: 卒}
