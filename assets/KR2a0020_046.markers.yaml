  - {type: variant, offset: 7972, length: 5, content: 以母老解官, WYG: 卒贈幽州刺史容成侯諡曰簡侯恭弟瓘字元衡營丘太守襲父爵固安侯平西将軍卒贈兖州刺史諡曰康侯子長生襲長生卒子元宗襲廣平郡丞陳郡太守璞字季真性惇厚多識人物歴中書博士侍郎漁陽王尉眷傅左将軍長安副将賜爵宜陽侯太常卿承明元年年五十一先訢卒贈安西将軍雍州刺史諡曰穆子暉中書議郎暉弟固太學博士高密太守固弟欽州主簿欽子奭字元熾武定末鎮西将軍南營州别駕奭弟盛字仲炎安東将軍開府諮議參軍盛弟叔樊平西将軍太中大夫欽弟蘊字宗令有器幹中書學生祕書中散侍御中散出為燕郡范陽二郡太守入為員外散騎常侍尚書右丞中堅将軍遷左丞延昌三年卒贈平逺将軍南青州刺史諡曰敬初崇之}
