  - {type: variant, offset: 3961, length: 191, content: 中韓貞宋世量等檢行要險防遏形便謂準舊鎮東西相望令形勢相接築城置戍分兵要害勸農積粟警急之日隨便翦討如此則威形增廣兵勢亦盛且北方沙漠夏乏水草時有小泉不濟大衆脫有非意要待秋冬因雲而動若至冬日冰沙凝厲遊騎之寇終不敢攻城亦不敢越城南出如此北方無憂矣世宗從之今北鎮諸戍東西九城是也遷驃騎大將軍時武興氐王楊紹先叔集起反叛詔懷使持節侍中都督平氐諸軍事以討之須有興廢任從權計其邢巒李煥並禀節度三年六月, WYG: 早}
