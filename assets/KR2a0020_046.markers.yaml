  - {type: variant, offset: 748, length: 319, content: 臣受恩深重無以仰答將違闕庭豫增係戀敢上瞽言唯加裁察高宗納之已後入死者皆恕死徙邊久之高宗謂羣臣曰源賀勸朕宥諸死刑徙充北番諸戍自爾至今一歲所活殊為不少生濟之理既多邊戍之兵有益卿等事朕致何善意也苟人人如賀朕治天下復何憂哉顧憶誠言利實廣矣羣臣咸曰非忠臣不能進此計非聖明不能納此言賀之臨州鞫獄以情徭役簡省武邑郡姦人石華告沙門道可與賀謀反有司以聞高宗謂羣臣曰賀誠心事國朕為卿等保之無此明矣乃精加訊檢華果引誣於是遣使者詔賀曰卿以忠誠款至著自先朝以丹青之潔而受蒼蠅之汙朕登時研檢已加極法故遣宣意其善綏所莅勿以囂謗之言致損慮也賀上書謝書奏高宗顧謂左右曰以賀之忠誠尚致其誣不若是者可無慎乎時考殿最賀治為第一賜衣馬器物班宣天下賀上表請代朝議以賀得民情不許在州七, WYG: 真君二}
