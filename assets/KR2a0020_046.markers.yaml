  - {type: variant, offset: 3603, length: 356, content: 出據北蕃指授規略隨須徵發諸所處分皆以便宜從事又詔懷子直寢徽隨懷北行詔賜馬一匹細鎧一具御矟一枚懷拜受訖乃於其庭跨鞍執矟躍馬大呼顧謂賓客曰氣力雖衰尚得如此蠕蠕雖畏壯輕老我亦未便可欺今奉廟勝之規總驍捍之衆足以擒其酋帥獻俘闕下耳時年六十一懷至雲中蠕蠕亡遁懷旋至代案視諸鎮左右要害之地可以築城置戍之處皆量其高下揣其厚薄及儲糧積仗之宜犬牙相救之勢凡表五十八條表曰蠕蠕不覊自古而爾遊魂鳥集水草為家中國患者皆斯類耳歷代驅逐莫之能制雖北拓榆中遠臨瀚海而智臣勇將力算俱竭胡人頗遁中國以疲于時賢哲思造化之至理推生民之習業量夫中夏粒食邑居之民蠶衣儒步之士荒表茹毛飲血之類鳥宿禽居之徒親校短長因宜防制知城郭之固暫勞永逸自皇魏統極都於平城威震天下德籠宇宙今定鼎成周去北遙遠代表諸蕃北固高車外叛尋遭旱儉戎馬甲兵十分闕八去歲復鎮陰山庶事蕩盡遣尚, WYG: ''}
