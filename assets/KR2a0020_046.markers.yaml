  - {type: variant, offset: 2927, length: 325, content: 朝廷追錄封叡鉅鹿郡開國公臣時丁艱草土不容及例至二十年除臣雍州刺史臨發奉辭面奏先帝申先臣舊勳時敕旨但赴所臨尋當別判至二十一年車駕幸雍臣復陳聞時蒙敕旨征還當授自宮車晏駕遂爾不白竊惟先臣遠則援立高宗寶曆不墜近則陳力顯祖神器有歸如斯之勳超世之事麗以父功而獲河山之賞臣有家勳不霑茅社之賜得否相懸請垂裁處詔曰宿老元丕云如所訴訪之史官頗亦言此可依比授馮翊郡開國公邑百戶又詔為使持節加侍中行臺巡行北邊六鎮燕朔三州賑給貧乏兼採風俗考論殿最事之得失皆先決後聞自京師遷洛邊朔遙遠加連年旱儉百姓困弊懷銜命巡撫存恤有方便宜運轉有無通濟時后父于勁勢傾朝野勁兄于祚與懷宿昔通婚時為沃野鎮將頗有受納懷將入鎮祚郊迎道左懷不與語即劾祚免官懷朔鎮將元尼須與懷少舊亦貪穢狼藉置酒請懷謂懷曰命, WYG: ''}
