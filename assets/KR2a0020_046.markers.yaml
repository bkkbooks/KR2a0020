  - {type: variant, offset: 6548, length: 1150, content: 震統極總宙馭宇革制土中垂式無外自北徂南同卜維於洛食定鼎遷民均氣候於寒暑高祖所以始基世宗於是恢構按功成作樂治定制禮乃訪遺文修廢典建明堂立學校興一代之茂矩標千載之英規永平之中始創雉構基趾草昧迄無成功故尚書令任城王臣澄按故司空臣沖所造明堂樣并連表詔答兩京模式奏求營起緣期發旨即加葺繕侍中領軍臣叉總動作官宣贊授令自茲厥後方配兵人或給一千或與數百進退節縮曾無定準欲望速了理在難克若使專役此功長得營造委成責辦容有就期但所給之夫本自寡少諸處競借動即千計雖有繕作之名終無就功之實爽塏荒茫淹積年載結架崇構指就無兆仍令肄冑之禮掩仰而不進養老之儀寂寥而不返構厦止於尺土為山頓於一匱良可惜歟愚謂召民經始必有子來之歌興造勿亟將致不日之美況本兵不多兼之牽役廢此與彼循環無極便是輟創禮之重資不急之費廢經國之功供寺館之役求之遠圖不亦闕矣今諸寺大作稍以粗舉並可徹減專事經綜嚴勒工匠務令克成使祖宗有薦配之期蒼生覩禮樂之富書奏從之除冠軍將軍中散大夫又領治書侍御史秦益氐反詔子恭持節為都督河間王琛軍司以討之事平仍行南秦州事及六鎮反以子恭兼給事黃門郎持節慰勞還拜河內太守加後將軍平絳蜀反丹谷清廉二路險澀不通以子恭為當郡別將俄而建興蜀復反相與連勢進子恭為持節散騎常侍假平北將軍征建興都督仍兼尚書行臺與正平都督長孫稚合勢進討大破之正平賊帥范明遠與賊帥劉牙奴並面縛請降事平除平南將軍豫州刺史尋加散騎常侍撫軍將軍武泰初郢州刺史元願達以城降蕭衍詔徵都督尉慶賓還京師回衆隸子恭以討之衍將夏侯夔率衆數萬來寇遠近不安夔乘勢分兵遂逼新蔡自攻毛城子恭隨方應援賊並破走蕭衍豫州刺史夏侯亶復遣四將率衆三萬入圍南頓北攻陳項子恭遣軍禦之賊復奔退加鎮南將軍又兼尚書行臺子恭勒衆渡淮徙民於淮北立郡縣置戍而還蕭衍直閤將軍軍主胡智達等八將與其監軍閻次洪入寇屯於州城東北四十餘里子恭擊破之斬智達生擒次洪元顥之入洛也加子恭車騎將軍子恭不敢拒之而頻遣間使參莊帝動靜未幾顥敗車駕還洛進征南將軍兼右僕射假車騎將軍後加散騎常侍板橋蠻文石活石忌麤受蕭衍印節扇誘黨類據險寇竊子恭躬率將士徑襲其柵數日之中殲殪略盡諸蠻款服咸求輸稅徵拜右光祿大夫給事黃門侍郎仍本將軍錄其前後征討功封臨潁縣開國侯食邑六百戶加散騎常侍俄遷侍中尒朱榮之死也世隆度律據斷河橋詔子恭為都督以討之出頓於大夏門北尋而太府卿李苗夜燒河橋世隆退走仍以子恭兼書僕射為大行臺大都督尋遷衞將軍假車騎將軍率諸將於太行築壘以防之既而尒朱兆率衆南出子恭所部都督史仵龍羊文義開柵降兆子恭退走為兆所破衆既退散兆因入洛子恭竄于緱氏仍被執送俄而見釋前廢帝初除驃騎將軍左光祿大夫侍中如故尋授散騎侍郎都督三州諸軍事本將軍假車騎大將軍行臺僕射荊州刺史以與定策之勳封臨汝縣開國子食邑三百戶時叛蠻雷亂清受蕭衍兗州刺史章綬入為寇掠諸蠻從之置立郡縣子恭討平之永熙中入為, WYG: ''}
