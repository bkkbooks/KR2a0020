  - {type: variant, offset: 5940, length: 380, content: 待郎朝士翕然咸共信待子恭奏曰徐州表投化人許團并其弟周等究其牒狀周列云己蕭衍黃門侍郎又稱心存山水不好榮宦屢曾辭讓貽彼赫怒遂被出為齊康郡因爾歸國願畢志嵩嶺比加採訪略無證明尋其表狀又復莫落案牒推理實有所疑何者昔夷齊獨往周王不屈其志伯況辭祿漢帝因成其美斯實古先哲王必有不臣之人者也蕭衍雖復崎嶇江左竊號一隅至於處物未甚悖禮豈有士辭榮祿而苟不聽之哉推察情理此則孟浪假蕭衍昏狂不存雅道逼士出郡未為死急何宜輕去生養之土長辭父母之邦乎若言不好榮官志願嵩嶺者初屆之日即應杖策尋山負帙沿水而乃廣尋知己遍造執事希榮之心已見逃宦之志安在昔梁鴻去鄉終傭吳會逄萌浮海遠客遼東並全志養性逍遙而已考之事實何其懸哉又其履歷清華名位高達計其家累應在不輕今者歸化何其孤迥設使當時怱遽不得攜將及其來後家貲產業應見簿斂尊卑口累亦當從法而周兄弟怡然嘗無憂戚若無種族理或可通如有不坐便應是衍故遣非周投化推究二, WYG: 雍睦}
