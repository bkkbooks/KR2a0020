  - {type: variant, offset: 7950, length: 0, content: '', WYG: 起家拜盧奴令延興末詔曰尚書李訢著勲先朝弼諧皇極讜言嘉謀旬日屢進實國家之楨幹當今之老成也是以擢授南部綜理煩務自在厥位夙夜惟寅乃心匪懈克己復禮退食自公利上之事知無不為賞罰所加不避疎戚雖孝子之思慈母鷹鸇之逐鳥雀何以方之若鄭之子産魯之季文亦未加也然惡直醜正盗憎主人自徃年以来羣姦不息劫訢宗人李英等四家焚燒舎宅傷害良善此而可忍孰不可恕有司可明加購募必令擒殄六月顯祖崩訢}
  - {type: page-break, offset: 7950, content: '', id: KR2a0020_WYG_046-10a, image: WYG0261/WYG0261-0640a.png}
  - {type: variant, offset: 7950, length: 0, content: '', krp: 起家拜盧奴令延興末詔曰尚書李訢著勲先朝弼諧皇極讜言嘉謀旬日屢進實國家之楨幹當今之老成也是以擢授南部綜理煩務自在厥位夙夜惟寅乃心匪懈克己復禮退食自公利上之事知無不為賞罰所加不避疎戚雖孝子之思慈母鷹鸇之逐鳥雀何以方之若鄭之子産魯之季文亦未加也然惡直醜正盗憎主人自徃年以来羣姦不息劫訢宗人李英等四家焚燒舎宅傷害良善此而可忍孰不可恕有司可明加購募必令擒殄六月顯祖崩訢}
  - {type: variant, offset: 7951, length: 0, content: '', WYG: 司空進爵范陽公七月以訢為侍中鎮南大将軍開府儀同三司徐州刺史范􅋆知文明太后忿訢也又知内外疾之太和元年二月希㫖告訢外叛文明太后徵訢至京師言其叛状訢曰無之引􅋆證訢訢言爾妄云知我吾又何言雖然爾不顧余之厚德而忍為此不仁甚矣􅋆曰公德於􅋆何若李敷之德於公公昔忍於敷􅋆今敢不忍於公乎訢慨然曰吾不用璞言自貽伊戚方悔於心何嗟及矣遂見誅訢有三子長子邃起家拜侍御}
