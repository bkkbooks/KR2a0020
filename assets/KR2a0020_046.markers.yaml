  - {type: variant, offset: 7949, length: 0, content: '', WYG: 謂超曰李訢後必宦達益人門户可以女妻之勿許他貴也遂勸成婚南人李哲嘗言訢必當貴達杜超之死也世祖親哭三日訢以超壻得在喪位出入帝目而指之謂左右曰觀此人舉動豈不有異於衆必為朕家幹事之臣訢聰敏機辯彊記明察初李靈為高宗博士諮議詔崔浩選中書學生器業優者為助敎浩舉其弟子箱子與盧度世李敷三人應之給事高讜子祐尚書叚霸兒姪等以為浩阿其親戚言於恭宗恭宗以浩為不平聞之於世祖世祖意在於訢曰云何不取幽州刺史李崇老翁兒也浩對曰前亦言訢合選但以其先行在外故不取之世祖曰可待訢還箱子等罷之訢為世祖所識如此遂除中書助敎博士稍見任用入授高宗經高宗即位訢以舊恩親寵遷儀曹尚書領中祕書賜爵扶風公加安東将軍贈其母孫氏為容城君高宗顧謂羣臣曰朕始學之嵗情未能專既總萬機溫習靡暇是故儒道實有闕焉豈惟予咎抑亦師傅之不勤所以爵賞仍隆者蓋不遺舊也訢免冠拜謝出為使持節安南將軍相州刺史為政清簡明於折獄姦盗止息百姓稱之訢上疏求立學校曰臣聞至治之隆非文德無以經綸王道太平之美非良才無以光贊皇化是以昔之明主建庠序於京畿立學官於郡邑敎國子弟習其道藝然後選其俊異以為造士今聖治欽明道隆三五九服之民咸仰徳化而所在州土學校未立臣雖不敏誠願備之使後生聞雅頌之音童幼覩經敎之本臣昔蒙恩寵長管中祕時課修學有成立之人髦俊之士已蒙進用臣今重荷榮遇顯任方岳思闡帝猷光宣於外自到以來訪諸文學舊德已老後生未進嵗首所貢雖依制遣對問之日懼不克堪臣愚欲仰依先典於州郡治所各立學官使士望之流冠冕之胄就而受業庶必有成其經藝通明者貢之王府則郁郁之文於是不墜書奏顯祖從之以訢治為諸州之最加賜衣服自是遂有驕矜自得之志乃受納民財及商胡珍寳兵民告言尚書李敷與訢少長相好每左右之或有勸以奏聞敷不許顯祖聞訢罪状檻車徵訢拷劾抵罪時敷兄弟將見疎斥有司諷訢以中㫖嫌敷兄弟之意令訢告列敷等隠罪可得自全訢深所不欲且弗之知也乃謂其女壻裴攸曰吾宗與李敷族世雖逺情如一家在事既有此勸竟如何也昨來每欲為此取死引簪自刺以帶自絞而不能致絶且亦不知其事攸曰何為為他死也敷兄弟事釁可知有馮闡者先為敷所敗其家切恨之但呼闡弟問之足知委曲訢從其言又趙郡范􅋆具條列敷兄弟事状有司以聞敷坐得罪詔列訢貪冒罪應死以糾李敷兄弟故得降免百鞭髠刑配為厮役訢之廢也平壽侯張讜見訢與語竒之謂人曰此佳士也終不久屈未幾而復為太倉尚書攝南部事用范􅋆陳端等計令千里之外户别轉運詣倉輸之所在委滯停延嵗月百姓競以貨賂各求在前於是逺近大為困敝道路羣議曰畜聚歛之臣未若盗臣訢弟左将軍璞謂訢曰范􅋆善能降人以色假人以辭未聞德義之言但有勢利之説聽其言也甘察其行也賊所謂諂諛讒慝貪冒姦佞不早絶之後悔無及訢不從彌信之腹心之事皆以告􅋆訢既寵於顯祖參決軍國大議兼典選舉權傾内外百寮莫不曲節以事之􅋆以無}
