  - {type: variant, offset: 5371, length: 491, content: 飽暖高壁深壘勿與爭鋒彼求戰則不得野掠無所獲不盈數旬可坐制凶醜時裴衍復表求行詔子雍與衍速進子雍重表固請如謂不可乞令裴衍獨行若不賜解求停裴衍苟逼同行取敗旦夕詔不聽遂與衍俱進至陽平郡東北漳曲榮率賊十萬來逼官軍子雍戰敗被害年四十朝野痛惜之贈車騎大將軍儀同三司雍州刺史公如故永安中重贈司空諡曰莊穆長子延伯出後從伯次子士則早亡士則弟士正士規並坐事死次楷字士質小字那延襲武定中齊文襄王府參軍齊受禪例降延伯初為司空參軍事時南秦民吳富反叛詔以河間王琛為都督延伯叔父子恭為軍司延伯為統軍隨子恭西討戰必先鋒子恭見其年幼常訶制之而不能禁子雍在夏州表乞兵援詔延伯率羽林一千人赴之城鬬野戰勇冠三軍子雍之向東夏留延伯城守付以後事延伯與兵士共分湯菜防固城隍及子雍為胡所執合城憂懼延伯乃人人曉喻曰吾父吉凶不測方寸焦爛實難裁割但奉命守城所為處重若以私害公誠孝並闕諸君幸得此心無虧所寄於是衆感其義莫不勵憤朝廷聞而嘉之除龍驤將軍行夏州事封五城縣開國子食邑三百戶卒能固守及後刺史至延伯率領義衆還赴子雍共平黑城在鱡棠橋戰先鋒陷陳身擒維摩及至白水首摧阿非隨子雍至都進爵浮陽伯增封百戶為諫議大夫假冠軍將軍別將隨子雍北討與葛榮戰歿時, WYG: ''}
