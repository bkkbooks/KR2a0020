  - {type: variant, offset: 4170, length: 220, content: 錢二十萬布七百匹蠟三百斤贈司徒冀州刺史兼吏部尚書盧昶奏太常寺議諡曰懷體尚寬柔器操平正依諡法柔直考終曰靖宜諡靖公司徒府議懷作牧陝西民餘惠化入總端貳朝列歸仁依諡法布德執義曰穆宜諡穆公二諡不同曰府寺所執並不克允愛民好與曰惠可諡惠公懷性寬容簡約不好煩碎語人曰為貴人理世務當舉綱維何必須太子細也譬如為屋但外望高顯楹棟平正基壁完牢風雨不入足矣斧斤不平斲削不密非屋之病也又性不飲酒而喜以飲人好接賓友雅善音律雖在白首至宴居之暇常自操絲竹懷有七子長子規字靈度, WYG: 除}
