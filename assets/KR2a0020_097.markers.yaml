  - {type: variant, offset: 531, length: 506, content: 淵勸不行堅不從果敗又仕姚興父子為靈臺令姚泓滅入赫連昌昌復以淵及徐辯對為太史令世祖平統萬淵與辯俱見獲世祖以淵為太史令數見訪問神二年世祖將討蠕蠕淵與徐辯皆謂不宜行與崔浩爭於世祖前語在浩傳淵專守常占而不能鈎深致遠故不及浩後為驃騎軍謀祭酒嘗著觀象賦曰易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下然則三極雖殊妙本同一顯昧雖遐契齊影響尋其應感之符測乎冥通之數天人之際可見明矣夫機象冥緬至理幽玄豈伊管智所能究暢然歌咏之來偶同風人目閱群宿能不歌吟是時也歲次析木之津日在翼星之分閶闔晨鼓而蕭瑟流火夕暵以摧頹游氣眇其高搴辰宿煥焉華布覩時逝懷川上之感步秋林同宋生之戚歎巨艱之未終抱殷憂而不寐遂彷徨於窮谷之𩹉杖策陟神巖之側乃仰觀太虛縱目遠覽吟嘯之頃懍然增懷不覽至理拔自近情常韻發於宵夜不任咏歌之末遂援管而為賦其辭曰陟秀峰以遐眺望靈象於九霄陟昇遐遠九霄九天也覩紫宮之環周嘉帝坐之獨標紫宮垣十五星在北斗北天皇大帝一星在紫宮中天帝位尊故言獨標也瞻華蓋之蔭藹何虛中之迢迢華蓋七星杠九星合十六星在大帝上迢迢高遠之貌觀閣道之穹隆想靈駕之電飄閣道六星在王良東北天帝之所乘躡靈駕之所由從電飄疾也爾乃縱目遠覽傍極四維北鑒機衡南覩太微四維, WYG: 死便有}
