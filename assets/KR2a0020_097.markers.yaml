  - {type: variant, offset: 12724, length: 470, content: 兵郎贈通直郎彧與兄相如俱自南入國相如以才學知名早卒彧少嘗詣青州逢隱逸沙門教以素問九卷及甲乙遂善醫術中山王英子略曾病王顯等不能療彧針之抽針即愈後位冀州別駕累遷寧遠將軍性仁恕見疾苦好與治之廣教門生令多救療其弟子清河趙約勃海郝文法之徒咸亦有名彧子景哲豪率亦以醫術知名為太中大夫司徒長史蔣少游樂安博昌人也慕容白曜之平東陽見俘入於平城充平齊戶後配雲中為兵性機巧頗能畫刻有文思吟咏之際時有短篇遂留寄平城以傭寫書為業而名猶在鎮後被召為中書寫書生與高聰俱依高允允愛其文用遂並薦之與聰俱補中書博士自在中書庇李沖兄弟子姪之門始北方不悉青州蔣族或謂少游本非人士又少游微因工藝自達是以公私人望不至相重唯高允李沖曲為體練由少游舅氏崔光與李沖從叔衍對門婚姻也高祖文明太后常因密宴謂百官曰本謂少游作師耳高允老公乃言其人士眷識如此然猶驟被引命屑屑禁闥以規矩刻繢為務因此大蒙恩錫超等備位而亦不遷陟也及詔尚書李沖與馮誕游明根高閭等議定衣冠於禁中少游巧思令主其事亦訪於劉昶二意相乖時致諍競積六載乃成始班賜百官冠服之成少游有效焉後於平城將營太廟太極殿遣少游乘傳詣洛量準魏晉基趾後為, WYG: ''}
