  - {type: variant, offset: 9296, length: 3, content: 秦近亦, WYG: 父母在而兄弟異計十家而七庶人父子殊産八家而五凡甚者乃危亡不相知飢寒不相恤又疾讒害其間不可稱數宜明其禁以易其風俗弊如此駿不}
