  - {type: variant, offset: 9371, length: 57, content: 古文孔子壁中書也二曰奇字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以幡信也壁中書者魯, WYG: 惟願後身不復生天王家義}
