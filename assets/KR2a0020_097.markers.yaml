  - {type: variant, offset: 8887, length: 170, content: 倉頡覽二象之爻觀鳥獸之跡別創文字以代結繩用書契以維事宣之王庭則百工以載之方冊則萬品以明迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八歲入小學保氏教國子以六書一曰指事二曰象形三曰諧聲四曰會意五曰轉注六曰假借蓋是史頡之遺法也及宣王太史史籀著大篆十五篇與古文或同或異時人即謂之書至孔子定六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖別暨, WYG: 張提率衆度崤蒲城鎮将何難於風陵堆濟河}
