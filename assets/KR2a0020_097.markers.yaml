  - {type: variant, offset: 10278, length: 407, content: 蒙褒錄列於儒林官班文省家號世業暨臣闇短識學庸薄漸漬家風有忝無顯但逢時來恩出願外每承澤雲津厠霑漏潤驅馳文閣參預史官題篆宮禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎說文為主爰採孔氏尚書五經音注篇爾雅三倉凡將方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次類編聯文無復重糾為一部其古奇惑俗隸諸體咸使班於篆下各有區別詁訓假借之誼僉隨文而解音讀楚夏之聲並逐字而注其所不知者則闕如也脫蒙遂許冀省百氏之觀而同文字之域典書祕書所須之書乞垂敕給并學士五人嘗習文字者助臣披覽書生五人專令抄寫侍中黃門國子祭酒一月一監評議疑隱庶無紕繆所撰名目伏聽明旨詔曰可如所請并就太常冀兼教八書史也其有所須依請給之名目待書成重聞式於是撰集字書號曰古今文字凡四十卷大體依許氏說文為本上篆下隸又除宣威將軍符璽郎尋加輕車將軍正光中除驍騎將軍兼著作佐郎正史中字四年卒贈右將軍巴, WYG: 雍}
