  - {type: variant, offset: 8642, length: 2, content: 屬齊, WYG: 如故永興初慕容超大掠淮北執徳宗陽平太守劉千載濟南太守趙元驅掠千餘家而歸裕乃伐超遂屠廣固執超斬其王公以下三千人納口萬餘馬二千匹夷其城隍送超于建業斬之裕是行也徐道覆勸盧循令乘虚而出循從之於是南康廬陵豫章諸郡守皆奔走江州刺史何無忌率軍至豫章戰殁于時羣議欲令徳宗北徙渡江循遂宼湘中破劉道規于長沙敗劉毅於桑落洲席卷而下裕將孟昶諸葛長民勸裕擁徳宗過江裕不從昶謂事必不濟乃自殺裕發居人治石頭城道覆等至即欲於新亭白石渚焚舟而上盧循曰大軍未至孟昶便逆自殺以此而推建業尋應有變但按甲守之不憂不濟也乃屯軍於蔡洲循乃率衆數萬上南岸至于丹陽郡遂遣焚京口金城姑孰宼掠塗中及江寧蕪湖循以阮賜為豫州刺史裕中軍參軍尚靖宣城内史毛修之破賜於姑孰獲其輜重賜乃退又加裕太尉中書監黄鉞裕}
