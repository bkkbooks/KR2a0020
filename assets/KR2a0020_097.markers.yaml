  - {type: variant, offset: 6598, length: 261, content: 九章數家雜要披釋章次意況大旨又演隱審五藏六府心髓血脉商功大算端部變化玄象土圭周髀練精銳思蘊習四年從穆所聞粗皆髣髴穆等仁矜特垂憂閔復以先師和公所注黃帝四序經文三十六卷合有三百二十四章專說天地陰陽之本其第一孟序九卷八十一章說陰陽配合之原第二仲序九卷八十一章解四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交會相生為表𩹉第四季序九卷八十一章具釋六甲刑禍福德以此等文傳授於臣山神禁嚴不得齎出尋究經年粗舉綱要山居險難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火月呂林鍾景氣鬱盛感物懷歸奉辭影等自爾至今四十五載歷觀時俗堪輿八會逕世已久傳, WYG: ''}
