  - {type: variant, offset: 416, length: 0, content: '', krp: 録公之位非盡敬之所茍自尊貴遂悖朝禮又妖賊陵縱破軍殄民之後已為都督親則刺史於宜降之日輙加崇進弱冠之年古今莫比宰相懲惡已獨觧録推禍委罰歸之有在自古僣逆未有若斯之甚者取妾之僭殆同六禮乃使尚書僕射為媒人長史為迎客嬖媵饕餮賀同長秋所謂無君之心觸事而發八日觀佛略人子女至人家宿唐突婦妾慶封迄今甫見易室之飲晉靈以來忽有支解之刑喜怒輕戮人士割裂治城之暴一睡而斬又以四嵗孽子興東海之封吳興殘暴之後横復若斯之調妖賊之興實由此豎居䘮極味孫泰供其膳在夜思逰亦孫泰延其駕泰承其勢得行威福雖加誅戮所染既多加之以苦發樂屬枉濫者衆驅逐徙撥死叛殆盡改號元興以為已瑞莽之符命於斯尤著否極必亨天盈其毒不義不昵勢必崩䘮取亂侮亡寔在斯㑹三軍文武憤踊即路𤣥亦失荆楚人情而師出不順其兵雖彊慮弗為用恒有回師之計既過尋陽不見東軍𤣥意乃定於是遂鼓行而進徑至姑孰又克歴陽}
  - {type: variant, offset: 417, length: 1, content: 駿, WYG: 牢之遣子敬宣詣𤣥請降𤣥大喜與敬宣置酒宴集𤣥至新亭元顯棄船退入國子堂列陳宣陽門前元顯欲挾徳宗出戰而軍中相驚言𤣥已及南桁乃回軍赴宫既至中堂一時崩散元顯奔東府惟張法順一騎随之𤣥乃為侍中都督中外諸軍丞相録尚書事揚州牧領徐州刺史持節荆江二州公如故假黄鉞羽葆鼓吹班剱二十人置左右長史従事中郎四人甲仗二百人入殿於是收道子付廷尉免為庶人徙于安城郡殺元􅂋并其子及豫州刺史司馬尚之吏部郎袁遵張法順等又滅庾楷於豫章徙尚之弟丹陽尹恢之輔國将軍允之及國寳王緒諸子于交廣州以劉牢之為㑹稽内史将欲觧其兵也初敬宣既降随入東府至是求歸𤣥冀牢之受命乃遣之敬宣既至牢之知將不免欲襲𤣥衆皆離散乃於班瀆北走縊於新洲𫝊首建業敬宣奔於江北𤣥白徳宗大赦改年為大亨𤣥讓丞相荆江徐三州及録尚書事乃改授太尉都督中外揚州牧領平西将軍豫州刺史緑綟綬加衮冕之服劔履之禮入朝不趨讃拜不名増班剱六十人甲仗二百人入殿𤣥乃}
