  - {type: variant, offset: 1234, length: 2, content: 善御, WYG: 武陵王司馬遵授楚王璽䇿徳宗先遣百寮固請又云當親幸敦喻十二月徳宗禪位於𤣥大赦所部稱永始元年初欲改年為建始左丞王納之曰建始者晋趙王倫之號也於是易為永始復同王莾始貴之年𤣥入建鄴宫逆風迅激旌旗服章儀飾一皆傾偃是月酷寒此日尤甚多行苛政而時施小恵迎温神主進于太廟元逰行無度至此不出殿上施金額流蘇絳帳頗類轜車王莽仙蓋太廟郊齋皆二日而已又其廟祭不及於祖以𤣥曽祖已上名位不顯故不列序且以王莽立}
  - {type: page-break, offset: 1234, content: '', id: KR2a0020_WYG_097-9b, image: WYG0262/WYG0262-0395b.png}
  - {type: variant, offset: 1234, length: 2, content: 善御, krp: 武陵王司馬遵授楚王璽䇿徳宗先遣百寮固請又云當親幸敦喻十二月徳宗禪位於𤣥大赦所部稱永始元年初欲改年為建始左丞王納之曰建始者晋趙王倫之號也於是易為永始復同王莾始貴之年𤣥入建鄴宫逆風迅激旌旗服章儀飾一皆傾偃是月酷寒此日尤甚多行苛政而時施小恵迎温神主進于太廟元逰行無度至此不出殿上施金額流蘇絳帳頗類轜車王莽仙蓋太廟郊齋皆二日而已又其廟祭不及於祖以𤣥曽祖已上名位不顯故不列序且以王莽立}
