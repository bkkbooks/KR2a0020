  - {type: variant, offset: 9287, length: 2, content: 鄴沛, WYG: 道生至閿鄉元景退走十一月車駕從東安山出下邳義隆鄒山戍主魯陽陽平二郡太守崔邪利降椘王建南康侯杜道儁進軍清西至留城義隆鎮軍劉駿參軍馬文恭至蕭城軍主嵇元敬至留城並為覘候見官軍俱時退走永昌王仁攻懸瓠拔之獲義隆守將趙淮過定項城破尉武戍執其戍主進攻夀陽屯兵於孫叔敖家掠馬頭鍾離二郡義隆遣左軍將軍劉康祖赴夀陽與仁相遇仁大破之盡坑其衆斬康祖傳首示夀春獲其將胡盛之王羅漢等以所斬首使軍士曵之遶城三匝積之城西髙與城齊劉鑠乃焚四郭廬舎嬰城固守車駕至盱眙淮泗義隆遣輔國將軍臧質率師至盱眙頓軍城北六軍於上流濟淮質遣司馬胡崇之等率所領於山上立營建威将軍毛熙祚據城前大浦詔攻二軍斬崇之熙祚等及佗首數千級衆􅊖赴水死淮南之民皆詣軍降髙梁王那出山陽永昌王仁於夀陽出横江凡所經過莫不風靡車駕登於𤓰步伐葦結筏示欲渡江義隆大懼欲走吳㑹建業士女咸荷擔而立義隆遣黄延年朝於行宫獻百牢貢其方物并請和求進女於皇孫世祖以師婚非禮許和而不許婚初義隆欲遣軍侵境其臣江湛徐湛之贊成其事而義隆太子劭與蕭思話沈慶之謂義隆曰昔檀道濟到彦之無利而反今將帥士衆不及於前不可輕動兵甲時湛等在坐義隆使與慶之謀議慶之曰治國如治家耕當問奴織當問婢今欲伐國而與白面書生軰謀之事何由濟義隆大笑遂不納慶之言至是登石頭城樓而望甚有憂色歎曰若檀道濟在豈應至此劭乃委罪於江徐義隆曰此自吾意不關二}
