  - {type: variant, offset: 9304, length: 2, content: 時徵, WYG: 大獲而還駿以其南兗州刺史竟陵王誕得士庶之心内畏忌之誕不自安乃治城多聚糧仗駿大怒貶誕爵為侯遣兖州刺史垣閬給事中戴明寳討之誕遣衆出戰斬垣閬誕表駿曰徃年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相搆難臧魯協從朝野怳忽咸懐憂懼陛下欲建百官羽儀星馳推奉臣前後固執末方賜從社稷獲全是誰之力陛下接遇殷勤屢加崇寵驃騎揚州旬月移受恩秩頻煩復賜徐兖仰屈皇輿逺相餞送臣一遇之感此何以忘庶希偕老永相娛慰豈謂陛下信用讒言遂令小人来相掩襲不任枉酷即加誅揃雀䑕貪生仰違詔敕今親勒部曲鎮扞徐兖昔縁何福同生皇家今有何罪便成胡越陵鋒奮戈萬沒豈顧定蕩之期冀在旦夕右軍宣簡爰及武昌皆以無罪並遇枉酷臣有何過復致於此陛下宫闈之醜豈可一二臨紙悲塞不止所言駿以沈慶之前軍討之親勞軍人賜以金帛慶之軍敗退傷者十四五駿大怒将自徃久乃拔之斬誕傳首誕母殷妻徐並自殺城内誅者數千人或先鞭殺而行戮並移首於石頭南岸以為京觀至於風晨雨夜輙聞哀號之響駿滛亂無度蒸其母路氏穢汙之聲布扵歐越東揚州刺史顔竣恃舊每戱㺯之駿慙怒殺竣和平元年七月駿使其散騎常侍明僧暠朝貢二年三月又使其散騎常侍尹顯朝貢駿雍州刺史海陵王休茂謀将除駿參軍尹元慶斬休茂是嵗凡諸郡士族婚宦㸃雜者􅊖黜為将吏而人情驚怨並不服役逃竄山湖聚為宼盗侍中沈懐文苦諌不納三年三月駿使其散騎常侍嚴靈護朝貢以沈懐文數直諌付廷尉殺之駿寵姬殷死贈貴妃諡曰宣及𦵏龍山給鑾輅九旒黄屋左纛羽葆鼓吹班劍虎賁龍轜之麗功妙萬端山池雲鳯之屬皆裝以衆寳繡帷珠帶重鈴疊眊儀服之盛古今尠有駿自殷死常懐悲惻神情罔罔廢棄政事或親至殷靈牀酌奠酒飲之既而慟哭流連不能自反其耽惽若此四年獵于烏江之榜口又逰湖縣之滿山並與母同行宣滛肆意五年三呉大飢人食草木皮葉親屬互相販鬻劫掠蜂起死者不可勝數是年駿死子子業立性尤凶悖其母疾篤遣呼子業子業曰病人間多鬼那可徃其母怒語侍者曰将刀來破我腹那得生如馨兒六年改為永光以奄人華願兒為散騎常侍逰止必同越騎校尉戴法興屢相裁割願兒深以為隙或謂法興為真天子子業為贗天子願兒具以聞子業乃殺法興驃騎将軍栁元景尚書左僕射顔師伯欲廢子業立太宰義恭以告沈慶之慶之告子業子業出兵誅義恭遂刳剔支體抽裂心藏挑其眼睛投之蜜中謂之鬼目粽又殺栁元景顔師伯并諸子及弟姪乃改年為景和子業除去䘮}
