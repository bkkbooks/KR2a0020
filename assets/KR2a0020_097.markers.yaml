  - {type: punctuation, offset: 416, content: ．, id: KR2a0020_ZHSJ_097-bkkpn76}
  - {type: 'tls:seg', offset: 416, content: '', id: KR2a0020_ZHSJ_097-d97p5s7}
  - {type: variant, offset: 416, length: 0, content: '', WYG: 録公之位非盡敬之所茍自尊貴遂悖朝禮又妖賊陵縱破軍殄民之後已為都督親則刺史於宜降之日輙加崇進弱冠之年古今莫比宰相懲惡已獨觧録推禍委罰歸之有在自古僣逆未有若斯之甚者取妾之僭殆同六禮乃使尚書僕射為媒人長史為迎客嬖媵饕餮賀同長秋所謂無君之心觸事而發八日觀佛略人子女至人家宿唐突婦妾慶封迄今甫見易室之飲晉靈以來忽有支解之刑喜怒輕戮人士割裂治城之暴一睡而斬又以四嵗孽子興東海之封吳興殘暴之後横復若斯之調妖賊之興實由此豎居䘮極味孫泰供其膳在夜思逰亦孫泰延其駕泰承其勢得行威福雖加誅戮所染既多加之以苦發樂屬枉濫者衆驅逐徙撥死叛殆盡改號元興以為已瑞莽之符命於斯尤著否極必亨天盈其毒不義不昵勢必崩䘮取亂侮亡寔在斯㑹三軍文武憤踊即路𤣥亦失荆楚人情而師出不順其兵雖彊慮弗為用恒有回師之計既過尋陽不見東軍𤣥意乃定於是遂鼓行而進徑至姑孰又克歴陽}
