  - {type: variant, offset: 3832, length: 228, content: 孝經援神契曰並設神靈集謀此之謂也乃命熒惑伺彼驕盈熒惑常以十月十一月入太微受制伺無道之國故曰伺彼驕盈也執法刺舉於南端五侯議疑於水衡太微南門謂之執法刺舉者刺姦惡舉有功五侯五星在東北東井為水衡辨疑獄五侯議而評之也金火時出以成緯七宿匡衞而為經金火熒惑太白也七宿謂一方七宿天文謂五星為緯二十八宿為經故舉金火七宿為言則五星二十八宿可知也言五星出入伏見有時不常出也暐曄昱其並曜粲若三春之榮言星辰布曜若春日之榮華也覩夫天官之羅布故作則於華京言天官羅布於上王者法效於下論語曰, WYG: ''}
