  - {type: variant, offset: 13213, length: 0, content: '', WYG: 理乃止初昱母陳氏本李道兒妾彧納之生昱故世中皆呼昱為李氏子昱每自稱李将軍或自名為李統昱直閤将軍申伯宗步兵校尉朱幼司徒左長史沈勃等欲廢昱昱親率羽林兵掩之乃躬運矛鋌手殺勃等闔門嬰稚莫不臠截昱狂走逸逰不捨晝夜腹心所寄數十許人並執兵刅為人之牙爪路行逢人便加斫刺或入人家劫略財賄徃来倐忽状若鬼魅建業惶振並重關自守又搥拍鍼鑿錐鋸之屬常以自随或有忤意輙加酷暴搥隂刺心剖腹之誅日有十數常見卧屍流血然後為樂無所誅害則憂}
