  - {type: variant, offset: 9058, length: 225, content: 兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙高作爰歷篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附於小篆所作也以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復教以書又習八體試之課最以為尚書史吏民上書省字不正輒舉劾焉又有草書莫知誰始考其書形雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者獨張敞從之受涼, WYG: ''}
