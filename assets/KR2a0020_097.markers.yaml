  - {type: 'tls:seg', offset: 9427, content: '', id: KR2a0020_ZHSJ_097-d97p174s8}
  - {type: variant, offset: 9429, length: 455, content: 王壞孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好奇歎儒俗之穿鑿惋文毀於譽痛字敗於訾更詭任情變亂於世故撰說文解字十五篇首一終亥各有部屬包括六藝羣書之詁評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物奇怪珍異王制禮儀世間人事莫不畢載可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎將陳留蔡邕採李斯曹喜之法為古今雜形詔於太學立石碑刊載五經題書楷法多是邕書也後開鴻都書畫奇能莫不雲集于時諸方獻篆無出邕者魏初博士清河張揖著埤倉廣雅古今字詁究諸埤廣綴拾遺漏增長事類抑亦於文為益者然其字詁方之許慎篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博古開藝特善倉雅許氏字指八體六書精究閑理有名於揖以書教諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣校之說文篆隸大同而古字少異又有京兆韋誕河東衞覬二家並號能篆當時臺觀榜題寶器之銘悉是誕書咸傳之子孫世稱其妙晉世, WYG: 既誅徐州刺史}
