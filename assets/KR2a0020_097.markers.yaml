  - {type: variant, offset: 8859, length: 8, content: 式上表曰臣聞庖羲, WYG: 義隆遣其散騎常侍劉熙伯朝貢且論納幣六月義隆女死不果為婚五年十一月義隆遣黄延年獻馴象真君初義隆徙其弟大將軍義康於豫章二年其龍􅋮參軍巴東扶令育詣義隆理義康義隆大怒收育殺之四月義隆遣使黄延年朝貢十二月義隆又遣黄延年朝貢是嵗義隆梁州刺史劉真道將裴方明攻擊楊難當難當捨仇池將妻子來奔三年世祖詔琅邪王司馬椘之等討之西安將軍古弼平西將軍元濟等邀義隆秦州刺史胡崇之於濁水破擒之餘衆奔漢中義隆立難當兄子文徳為秦州刺史武都王戍茄蘆弼等討平之義隆遂殺真道方明五年義隆復遣使朝貢六年其員外散騎侍郎孔熙先以才學而不見用太子詹事范曄以家門滛汙為世所薄與熙先及外生謝綜謀殺義隆立其弟前大將軍義康丹陽尹徐湛之告之乃誅曄等徙義康於安成郡御史監守七年詔諸軍掠濟隂金鄉等七縣并驅其青冀二州民户而還北地人蓋吳聚衆反義隆以吳為安西將軍雍州刺史封北地公規亂雍州詔諸軍討平之義隆好行小計扇動邉民内起山苑窮侈極麗役使百姓江南苦之九年正月義隆遣使獻孔雀十一年二月世祖欲獵於雲夢發使告義隆勿相猜阻義隆請奉詔世祖南廵義隆邉城閉門拒守世祖忿之乃攻懸瓠分遣使者安慰降民其不服者誅戮之義隆汝南南頓汝陽潁川太守並棄城奔走義隆安北將軍武陵王駿遣參軍劉泰之臧肇之殿中將軍尹懐義程天祚等以千餘騎至汝陽永昌王位擊破之斬泰之肇之執天祚等義隆又遣寧朔將軍王元謨率其太子步兵校尉沈慶之鎮軍諮議參軍申坦等入河青冀二州刺史蕭斌及駿水陸並進太子左衛率臧質統驍騎將軍王方回安蠻司馬劉康祖右軍參軍梁坦造許洛右將軍豫州刺史南平王鑠太尉江夏王義恭為諸軍節度梁南秦二州刺史劉秀之統輔國將軍楊文徳宣威將軍劉洪宗向汧隴護軍將軍蕭思話部龍驤將軍杜坦竟陵太守劉徳願向武關義隆令王公妃主及其朝士牧守下逮富人通出私財以助軍費士庶怨之南兖及青冀兖豫三吳簡發以配戎行揚南徐兖江州富民並四分之一建威司馬申元吉趣泗瀆蕭斌至碻磝王元謨遣軍主王寳惠攻滑臺右軍蕭鑠遣中兵參軍梁坦等進軍小索世祖詔諸軍援滑臺大敗王寳惠等王元謨走還碻磝蕭斌遣申坦與梁坦垣護之據兩當城斌退還厯下及車駕渡河梁坦退走棄甲山積車駕發滑臺過碻磝義隆又遣雍州刺史竟陵王誕率其將薛安都栁元景等入盧}
