  - {type: variant, offset: 8621, length: 1, content: 府, WYG: 率衆斬元徐州刺史桓脩扵京口其日劉毅道規等亦斬思祖因收衆濟江河内太守辛扈興恒農太守王元徳振威將軍童厚之亦與裕剋是日取元毅兄邁時在建業毅遣周安要之邁懼而告𤣥𤣥遣頓丘太守吳甫之右衛將軍皇甫敷北拒裕率衆宿于竹里遇甫之於江乘裕執長刀直入其陳斬甫之進至羅落橋又斬敷首𤣥使桓謙屯東陵卞範之屯覆舟山西裕又破之𤣥大懼乃携子姪浮江南走裕入鎮石頭以徳宗司徒王謐為録尚書領揚州刺史立留臺總百官裕為使持節都督揚徐兗豫青冀幽并八州鎮軍將軍徐州刺史令道規等率衆追𤣥裕因是相署名位遣尚書王嘏等迎徳宗燔桓温神主于宣陽門外尋殺尚書左僕射王愉及其子綏納等裕以司馬遵為大將軍承制入居東宫公卿以下莫不畢拜乃大赦惟𤣥等不在例是夜司徒王謐逃走劉毅以其手解徳宗璽綬宜誅之裕以其償錢之恵固請免之乃遣丹陽尹孟昶迎焉無忌道規至于桑落洲破桓𤣥諸將進據尋陽加裕都督江州劉毅復敗桓𤣥于崢嶸洲𤣥乃棄衆單舸奔走挾徳宗奔于江陵裕領青州刺史甲仗百人入殿毅等平巴陵徳宗復位於江陵改年曰義熙及還建業裕進侍中車騎將軍都督中外諸軍事飾讓不受加録尚書事又詐不受乃出鎮丹徒改授都督十六州餘如故又領兗州乃解青州盧循破廣州裕仍以循為廣州刺史其黨琅邪人徐道覆為始興相裕又都督交廣二州又封裕豫章郡公邑萬户絹三萬匹加侍中進號驃騎將軍}
