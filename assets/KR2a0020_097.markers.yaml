  - {type: variant, offset: 404, length: 1, content: 濟, WYG: 司馬元顯一軍仍守石頭列舟艦斷淮口道子出軍將屯中堂忽有馬驚軍中擾亂人馬赴江者甚衆良久乃定𤣥等不知建業危弱且王恭尋敗𤣥甚惶懼乃回軍于蔡洲王恭司馬劉牢之率北府軍來次新亭於是徳宗以桓脩為荆州仲堪為廣州𤣥為江州佺期為雍}
  - {type: variant, offset: 404, length: 1, content: 濟, krp: 司馬元顯一軍仍守石頭列舟艦斷淮口道子出軍將屯中堂忽有馬驚軍中擾亂人馬赴江者甚衆良久乃定𤣥等不知建業危弱且王恭尋敗𤣥甚惶懼乃回軍于蔡洲王恭司馬劉牢之率北府軍來次新亭於是徳宗以桓脩為荆州仲堪為廣州𤣥為江州佺期為雍}
