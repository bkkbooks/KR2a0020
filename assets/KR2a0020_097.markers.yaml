  - {type: variant, offset: 4061, length: 2536, content: 天為大惟堯則之也及其災異之興出無常所言災異出無常宿隨其善惡而處之假使鄭國有事則變見角亢也歸邪繽紛飛流電舉如星非星如雲非雲謂之歸邪夾以微氣故稱繽紛飛飛星也流流星也飛星與流星各異飛星焱去而迹絕流星迹存而不滅電舉者似焱電長妖星起則殃及晉平蛇乘龍則禍連周楚春秋魯襄公十年春正月戊子妖星出於婺女見於申維婺女屬齊申為晉分梓慎見妖星出知晉侯以戊子日死蛇乘龍謂襄公二十八年歲星次天津於玄枵十五度在虛下歲星主木位在東體合房心故名龍虛在坎坎子位次玄枵龜蛇之類歲星失次行虛之外出其下故曰蛇乘龍龍位壽星宋鄭之分梓慎見蛇乘龍知飢在宋鄭然裨竈以為周王及楚子皆死二人推變不同所見各異梓慎裨竈古之良史也或取證於逢公或推變於衝午逢公齊邑姜之先言逢公死時亦有此星見梓慎推星以此方之知晉平公將死衝午謂虛宿對午午為張翼張翼周楚之分裨竈占知周王楚子死故言推變於衝午乃有欽明光被填逆水府昔堯遭洪水填星逆行入水府書曰欽明文思光被萬邦洪波滔天功隆大禹言洪水既出堯命治之而功不成乃復命禹治而平之禹有濟世之難治水之功書曰洪水滔天又曰禹錫玄圭告厥成功此則冥數之大運非治綱之失緒言先遭洪水致填星逆行之異非不德所致此乃運數應爾也蓋象外之妙不可以粗理尋重玄之內難以熒燎覩言玄理微妙不可知見也至於精靈所感迅踰駭嚮荊軻慕丹則白虹貫日而不徹昔荊軻燕太子丹之義入秦為刺客雖至精感上而事竟不捷衞生畫策則太白食昴而摛朗昔衞先生為秦畫策於長平昭王疑而不信太白有食昴之變魯陽指麾而曜靈為之回駕魯陽古之賢人以手麾日能再回也嚴陵來游而客氣著於乾象昔光武為白衣時與嚴陵相厚善及登帝位陵來入見太史奏曰客星犯帝座光武詔曰乃嚴子陵非客斯皆至感動於神祇誠應效於既往爾乃四氣鱗次斗建辰移雖無聲言三光是知言四時代謝不常每月斗移建一辰天無聲言語止以星辰見變譴以示人也星中定於昏明影度以之不差測水旱於未然占方來之安危孟春正月昏參中旦尾中仲春之月昏弧中旦建星中季春之月昏七星中旦牽牛中孟夏之月昏翼中旦婺女中仲夏之月昏亢中旦危中季夏之月昏心中旦奎中孟秋之月昏建星中旦畢中仲秋之月昏牽牛中旦觜觿中季秋之月昏虛中旦柳中孟冬之月昏危中旦七星中仲冬之月昏東壁中旦軫中季冬之月昏婁中旦氐中冬至之日建八尺之標影長一丈三尺五寸也夏至之日影長一尺六寸也影長為水影短為旱也陰精乘箕則大飊暮鼓西南入畢則淫雨滂陰精月也東北失道入箕則多風移而西南失道入畢則多雨雨三日為淫雨詩云月麗于畢俾滂矣書曰星有好風星有好雨此之謂也譬猶晉鍾之應銅山風雲之從班螭言雲從龍風從虎同氣相求同類相應蜀山崩而晉鍾鳴也若夫冥車潛駕時乘六虬大儀回運萬象俱流六虬六龍易曰時乘六龍以御天此皆是天回運轉北斗俄其西傾羣星忽以匿幽幽暗也望舒縱轡以騁度靈輪浹旦而過周望舒月也月日行十三度十九分度之七周天凡三百六十五度四分度之一天一日一夜運轉過周一度浹匝也至旦曉而過匝故曰浹旦而過周也爾乃凝神遠矚曬目八荒察之無象視之眇茫狀若渾元之未判別又似浮海而覩滄浪幽遐迥以希夷寸眸焉能究其傍凝神精不動也言極遠傍視茫然若造化之始元氣未分似浮海遠望而不見其邊論語曰乘桴浮於海老子曰聽之不聞其聲名曰希視之不見其形名曰夷於是乎夜對山水栖心高鏡遠尋終古攸然獨詠美景星之繼晝大唐堯之德盛瑞應圖曰景星大如半月生於晦朔助月光明當堯之時有此星見故美堯之德能致之也嘉黃星之靡鋒明虞舜之不競昔舜將受禪於堯先有星見圓而無鋒芒言舜當用土德王天下星見而無芒角者示揖讓而受不以兵事爭競也疇呂尚之宵夢善登輔而翼聖昔太公未遇文王時釣魚於磻溪夜夢得北斗輔星神告尚以伐紂之意事見尚書中候篇也欽管仲之察微見虛危而知命昔管仲與鮑叔牙商賈於南陽見三星聚虛危之分知齊將有霸主遂共戮力來投齊地也歎熒惑之舍心高宋景之守政當春秋時熒惑守心景公不從史韋之言熒惑退舍而延二十年壯漢祖之入秦奇五緯之聚映昔漢祖入秦五星聚於東井秦之分爾乃歷象既周相佯巖際相佯倘佯也尚書曰歷象日月星辰尋圖籍之所記著星變乎書契覽前代之將淪咸譴告於昏世言先代之君將淪亡天必告災異之徵也桀斬諫以星孛紂酖荒而致彗夫景星見則太平應彗孛作而禍亂興天之常也昔夏桀無道斬關龍逢而極惡孛星見湯伐之放於鳴條之野殷紂設炮烙之形彗星出武王懸之白旗也不見以周衰枉蛇行而秦滅昔魯莊公十年夏四月星不見自是以後周室衰微枉矢出蛇行而無尾自昔項羽入關有此變見漢書諒人事之有由豈妖災之虛設言天以冥應玄象為變要由人事豈妖災而已誠庸主之難悛故明君之所察言庸君闇主玄象譴告不能改行自新以答天變賢君明主則不然見天災異懼而修德也堯無為猶觀象而況德非乎先哲夫唐堯至治猶歷象璇璣闚七政況德不及古而不觀之乎先是太祖太宗時太史令王亮蘇坦世祖後破和龍得馮文通太史令閔盛高祖時太史令趙樊生並知天文後太史趙勝趙翼趙洪慶胡世榮胡法通等二族世業天官者又有容城令徐路善占候世宗時坐事繫冀州獄別駕崔隆宗就禁慰問路曰昨夜驛馬星流計赦即時應至隆宗先信之遂遣人試出城候焉俄而赦至時人重之永安中詔以州民高崇祖善天文每占吉凶有驗特除中散大夫永熙中詔通直散騎常侍孫僧化與太史令胡世榮張龍趙洪慶及中書舍人孫子良等在門下外省校比天文書集甘石二家星經及漢魏以來二十三家經占集為五十五卷後集諸家撮要前後所上雜占以類相從日月五星二十八宿中外官圖合為七十五卷僧化者東莞人識星分案天占以言災異時有所中普泰中尒朱世隆惡其多言遂繫於廷尉免官永熙中出帝召僧化與中散大夫孫安都共撰兵法未就而帝入關遂罷元象中死於晉陽時有河間信都芳字王琳好學善天文算數甚為安豐王延明所知延明家有羣書欲抄集五經算事為五經宗及古今樂事為樂書又聚渾天欹器地動銅烏漏刻候風諸巧事并圖畫為器準並令芳算之會延明南奔芳乃自撰注後隱於并州樂平之東山太守慕容保樂聞而召之芳不得已而見焉於是保樂弟紹宗薦之於齊獻武王以為中外府田曹參軍芳性清儉質樸不與物和紹宗給其騾馬不肯乘騎夜遣婢侍以試之芳忿呼毆擊不聽近己狷介自守無求於物後亦注重差勾股復撰史宗仍自注之合數十卷武定中卒殷紹長樂人也少聰敏好陰陽術數游學諸方達九章七曜世祖時為算生博士給事東宮西曹以藝術為恭宗所知太安四年夏上四序堪輿表曰臣以姚氏之世行學伊川時遇游遁大儒成公興從求九章要術興字廣明自云膠東人也山居隱跡希在人間興時將臣南到陽翟九崖巖沙門釋曇影間興即北還臣獨留住依止影所求請九章影復將臣向長廣東山見道人法穆法穆時共影為臣開, WYG: 誦}
