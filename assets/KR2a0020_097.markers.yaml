  - {type: variant, offset: 9290, length: 1, content: 爰, krp: 也正平元年正月世祖饗㑹於𤓰步既許和好詔班師其江北之民歸降者數十萬計凡克南兖豫徐兖青冀六州其軍鋒殺掠不可勝算時義隆江北蕭條境内搔擾義隆慮義康為亂遣使殺之葬以侯}
  - {type: punctuation, offset: 9292, content: 、, id: KR2a0020_ZHSJ_097-bkkpn2087}
  - {type: variant, offset: 9292, length: 2, content: 講學, WYG: 義隆慙恚歸罪扵下降義恭為儀同三司蕭斌王元謨並免所居職十月義隆遣其将軍孫蓋等朝貢興安九年義隆遣撫軍将軍蕭思話率其将張永等攻碻磝詔諸軍擊破之永等退走思話遣建武将軍垣護之至梁山逆軍尚書韓茂率騎逆擊之思話退還麋溝義隆又遣雍州刺史臧質向崤陜梁州刺史劉秀之輔國将軍楊文徳出子午豫州刺史長孫蘭遣騎破之秀之等僅以身免臧質栁元景薛安都等至關城並相繼敗走是年義隆太子劭及始興王休明令女巫嚴道育呪詛義隆事發義隆憤愧自失廢於政事乃議黜劭殺休明屢召尚書僕射徐湛之吏部尚書江湛侍中王僧綽等謀議僧綽曰當㫁不㫁反受其亂惟願以義割恩略小不忍不爾便應坦懐如初無煩疑論不可使難生慮表取笑千載義隆曰卿可謂能㫁大事此不可不殷勤三思義康始死人謂我無復慈愛之道僧綽又云臣恐千載之後言陛下易扵裁弟難扵廢子義隆黙然休明母潘有寵於義隆義隆以廢立之謀告之潘請赦弗許遂告休明休明馳報劭劭知己當廢遂夜召左右隊主陳叔兒詹齋帥張超之任建之等總二千餘人被甲自衛又召左衛率袁淑中舎人殷仲素左積弩将軍王正見又呼左軍長史蕭斌劭曰朝廷信讒當見罪廢内省無過不能受枉明當入殿卿等必不得異乃遍拜告哀衆皆驚不得答袁淑良久曰自古無此類願加善思劭怒變色扵是左右咸云伏聴令㫖明晨斬淑劭守萬春門乃告門者曰我受敕入有所收可助我督後隊令速劭又詐義隆敕云魯秀謀反汝明可守關將兵入討也故士卒信之超之等率十餘人走入雲龍門拔刃徑登含章殿義隆夜與徐湛之屏人閑語時猶未訖門户並無侍衛義隆廹急以几自障兵刃交下五指俱落超之斬義隆徐湛之為亂兵所害劭分遣掩江湛之斬之休明時在西州来屯中堂劭又使兵殺休明母是日劭登殿受璽綬下書曰徐湛之江湛殺逆無状吾勒兵入殿已無所及號惋崩衂心肝破裂今罪人斯得元凶克殄卜世靈祚永享無窮思與億兆覃兹更始可大赦天下改元嘉三十年為太初元年劭弟駿時為江州刺史先以西陽蠻反義隆令東宫步兵校尉沈慶之襄陽太守栁元景司空中兵參軍宗慤並討之駿出次五洲斬劭使於軍門司徒義宣雍州刺史臧質司州刺史魯爽同舉兵駿以沈慶之栁元景宗慤為前軍駿諮議參軍顔竣專主軍謀劭葬義隆託疾不出臧質子敦逃走劭乃􅊖聚諸王及大臣徙入城内移南岸百姓渡淮貴賤皆被驅逼建業淆亂駿等發尋陽檄至劭乃移駿數子扵侍中省義宣諸男於大倉屋以兵守之使其将魯秀王羅漢等為水陸之備休明及蕭斌為之謀主焚除淮中船舫駿至南州頓漂洲令栁元景等擊劭劭衆崩潰奔走還宫義恭單馬奔駿勸即位劭大怒遣休明就西省殺義恭子南豐王朗等十二人駿乃僣即大位于新亭於是擒劭休明竝梟首大桁暴屍扵市經日壊爛投之水中男女妃妾一皆從戮時人為之語曰遥望建康城小江逆流縈前見子殺父後見弟殺兄興光元年駿改年曰孝建其中軍府録事參軍周殷啟駿曰今士}
