  - {type: variant, offset: 124, length: 276, content: 為慕容垂太史郎從慕容寶敗於參合獲崇後乃赦之太祖愛其伎術甚見親待從平中原拜太史令詔崇造渾儀歷象日月星辰遷中書侍郎令如故天興五年月暈左角蝕將盡崇奏曰占為角蟲將死時太祖既克姚平於柴壁以崇言之徵遂命諸軍焚車而反牛果大疫輿駕所乘巨犗數百頭亦同日斃於路側自餘首尾相繼是歲天下之牛死者十七八麋鹿亦多死崇弟懿明辯而才不及崇也以善北人語內侍左右為黃門侍郎兄弟並顯懿好矜容儀被服僭度言音類太祖左右每聞其聲莫不驚竦太祖知而惡之後其家奴告崇與懿叛又與臣王次多潛通招引姚興太祖銜之及興寇平陽車駕擊破之太祖以奴言為實還次晉陽執崇兄弟並賜死崇兄子暉太祖時給事諸曹稍遷給事中賜爵長平侯, WYG: 徳宗}
