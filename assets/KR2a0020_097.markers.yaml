  - {type: variant, offset: 6860, length: 755, content: 謬誤吉凶禁忌不能備悉或考良日而值惡會舉吉用凶多逢殃咎又史遷郝振中古大儒亦各撰注流行於世配會大小序述陰陽依如本經猶有所闕臣前在東宮以狀奏聞奉被景穆皇帝聖詔敕臣撰錄集其要最仰奉明旨謹審先所見四序經文抄撮要略當世所須吉凶舉動集成一卷上至天子下及庶人又貴賤階級尊卑差別吉凶所用罔不畢備未及內呈先帝晏駕臣時狼狽幾至不測停廢以來逕由八載思欲上聞莫能自徹加年夕齒頹餘齡旦暮每懼殂殞填仆溝壑先帝遺志不得宣行夙夜悲憤理難違匿依先撰錄奏謹以上聞請付中祕通儒達士定其得失事若可施乞即班用其四序堪輿遂大行於世王早勃海南皮人也明陰陽九宮及兵法尤善風角太宗時喪亂之後多相殺害有人詣早求問勝術早為設法令各無咎由是州里稱之時有東莞鄭氏因為同縣趙氏所殺其後鄭氏執得讎人趙氏又剋明晨會宗族當就墓所刑之趙氏求救於早早為占候并授以一符曰君今且還選壯士七人令一人為主者佩此符於雞鳴時伏在仇家宅東南二里許平旦當有十人相隨向西北行中有二人乘黑牛一黑牛最在前一黑牛應第七但捉取第七者將還事必無他趙氏從之果如其言乃是鄭氏五男父也諸子並為其族所宗敬故和解二家趙氏竟免後早與客清晨立於門內遇有卒風振樹早語客曰依法當有千里外急使日中將有兩匹馬一白一赤從西南來至即取我逼我不聽與妻子別語訖便入召家人隣里辭別語訖浴帶書囊日中出門候使如期果有二馬一白一赤從涼州而至即捉早上馬遂詣行宮時世祖圍涼州未拔故許彥薦之早彥師也及至詔問何時當得此城早對曰陛下但移據西北角三日內必克世祖從之如期而克輿駕還都時久不雨世祖問早曰何時當雨早曰今日申時必大雨比至未時猶無片雲世祖召早詰之早曰願更少時至申時雲氣四合遂大雨滂世祖甚善之而早苦以疾辭乞歸鄉里詔許之遂終於家或言許彥以其術勝恐終妨己故譎令歸耳耿玄鉅鹿宋子人也善卜占坐於室內有客扣門玄已知其姓字并所齎持及來問之意其所卜筮十中八九別有林占世或, WYG: ''}
