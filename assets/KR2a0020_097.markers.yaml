  - {type: variant, offset: 12, length: 6, content: 十九晁崇張淵, WYG: 嵗襲封南郡公登國五年為司馬昌明太子洗馬元志氣不倫欲以雄豪自許朝議以温有陵虐之跡故抑𤣥兄弟出為義興太守不得志少時去職皇始初司馬徳宗立其㑹稽王道子擅權信任尚書僕射王國寳為時所疾𤣥說荆州刺史}
