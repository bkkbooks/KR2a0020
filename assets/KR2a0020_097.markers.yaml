  - {type: variant, offset: 419, length: 0, content: '', WYG: 姑孰既而大築府第田逰無度政令屢改憍侈肆欲朋黨翕習沮亂内外朝政皆諮焉小事則决於左僕射桓謙及丹陽尹卞範之𤣥大賦三吳富室以賑飢民猶不能濟也}
