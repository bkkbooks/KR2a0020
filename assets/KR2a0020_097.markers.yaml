  - {type: variant, offset: 13214, length: 9, content: 力除都水使者遷前將, WYG: 草草於耀靈殿上養驢數十頭造露車以銀為校具或乗以出入著小袴衫帶挾刀劔與營署女子通好自齎私服贈之常入壚肆飲酒輙與左右歌唱略民雞犬躬自屠割内外畏惡人不自保昱徃新安寺夕乃還殿寝於氈幄昱左右楊玉夫楊萬年等見其醉眠乃扵幄斬之左右陳奉伯稱敕開承明門出送首於直閤王敬則夜送昱首與中領}
