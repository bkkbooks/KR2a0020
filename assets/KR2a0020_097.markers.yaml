  - {type: 'tls:seg', offset: 408, content: '', id: KR2a0020_ZHSJ_097-d97p5s6}
  - {type: variant, offset: 408, length: 3, content: 假寧東, WYG: 郗恢為尚書仲堪回師南旋乃使人狥于𤣥等軍曰若不各散歸大軍至江陵當􅊖戮餘口仲堪偏將劉系先領兵二千隸于佺期輙率衆而歸𤣥等大懼乃狼狽而走庾楷亦棄衆奔于南軍𤣥並趣輕舟追仲堪至尋陽而推元為盟主鎮於夏口徳宗加𤣥都督荆州四郡以𤣥兄西昌公偉為輔國}
  - {type: page-break, offset: 408, content: '', id: KR2a0020_WYG_097-2b, image: WYG0262/WYG0262-0391d.png}
  - {type: variant, offset: 408, length: 3, content: 假寧東, krp: 郗恢為尚書仲堪回師南旋乃使人狥于𤣥等軍曰若不各散歸大軍至江陵當􅊖戮餘口仲堪偏將劉系先領兵二千隸于佺期輙率衆而歸𤣥等大懼乃狼狽而走庾楷亦棄衆奔于南軍𤣥並趣輕舟追仲堪至尋陽而推元為盟主鎮於夏口徳宗加𤣥都督荆州四郡以𤣥兄西昌公偉為輔國}
