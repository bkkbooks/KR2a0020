  - {type: variant, offset: 1311, length: 264, content: 相死精上為星乘尾在龍駟之間奚仲四星在天津北近河傍太古時造車輿者死而精上為星水北曰陽在河北故曰津陽也織女朗列於河湄牽牛煥然而舒光織女三星在紀星東端牽牛六星在河鼓南世人復以河鼓為牽牛五車亭柱於畢陰兩河俠井而相望五車三柱都十四星在畢東北在宿北故謂之陰兩河南河北河六星俠東井東西遙相對故曰相望也灼灼羣位落落幽紀設官分職罔不悉置灼灼落落皆星光明希疏之貌羣位謂天設三公九卿之官皇后嬪御之位分謂分其所司而各有所典罔無悉盡言無不盡備官職亦有之也儲貳副天庭延三吏儲貳謂太子一星在帝座北三吏三公星在太微宮中也論道納言各有攸司論道謂三公坐而論道納言謂, WYG: ''}
