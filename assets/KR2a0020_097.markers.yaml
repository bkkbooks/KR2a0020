  - {type: variant, offset: 13198, length: 1, content: 副, WYG: 田廉員外散騎侍郎祖徳朝貢又殺其巴陵王休若改年為泰豫又遣田廉及員外散騎侍郎劉恵秀朝貢彧又殺太子太傅王景文畏其族盛故也彧死子昱僣立改為元徽昱遣員外散騎常侍田恵紹員外散騎侍郎劉惠秀朝貢其司空桂陽王休範奔尋陽舉兵右衛將軍蕭道成率衆軍出頓新亭越騎校尉張茍兒斬休範首其左右皆散道成遣送其首塗中遇賊遂棄於水中休範之徒乃詐曰殿下猶在新亭於是士庶奔馳候迎是夜休範将杜墨騾等又攻新亭東廂休範參軍江珉等破二縣六署竊掠金帛放諸徒𨽻由是徒衆復盛燒東宫津陽門乃領軍右府昱将陳顯達率所領至杜姥宅破墨騾軍主全景淵進平白壁宣陽津陽二門斬墨騾等昱遣其員外散騎常侍明曇徽員外散騎侍郎江山圖朝貢五年又遣員外散騎常侍}
  - {type: page-break, offset: 13198, content: '', id: KR2a0020_WYG_097-47a, image: WYG0262/WYG0262-0414a.png}
