  - {type: variant, offset: 9296, length: 3, content: 秦近亦, krp: 父母在而兄弟異計十家而七庶人父子殊産八家而五凡甚者乃危亡不相知飢寒不相恤又疾讒害其間不可稱數宜明其禁以易其風俗弊如此駿不}
  - {type: variant, offset: 9300, length: 0, content: '', WYG: 革臧質遣使説荆州刺史南郡王義宣曰有大才負大功挾震主威自古尠有全者宜在人前早有處分義宣使要豫州刺史魯爽兗州刺史徐遺寳司州刺史魯秀等剋秋起兵爽時昏醉即日便戴黄摽稱建平元年板義宣為天子遣信至建業迎弟瑜由是駿知爽反惶懼欲遣迎義宣其竟陵王誕執議不許乃遣左衛将軍王元謨率衆討爽領軍将軍栁元景鎮軍将軍沈慶之討義宣臧質下戍大雷馳報義宣抗表以誅元景為名遣軍就質使爽與質㑹于江上元謨屯兵梁山義宣率衆至尋陽與質俱下雍州刺史朱修之不從義宣臧質進計曰今萬人取南州則梁山中絶萬人守梁山元謨必不敢動下官浮舟外江直向石頭此上筞也義宣将從之其諮議劉諶之曰質不求前驅凶志難測不如盡鋭攻梁山事克然後長驅萬安之計也義宣乃止義宣遣劉諶之就質步攻東壘義宣進自蕪湖赴梁山屯兵西岸元謨拒質駿将軍䕶之薛安都又摧破之義宣衆潰因風放火焚其舟艦義宣閉船大泣因而迸逸走至江陵荆州司馬竺超民具儀服迎之左右相率潰叛超民送付刺姦朱修之扵獄殺之太安二年駿改年為大明駿于新亭造中興佛寺設齋忽有一僧形貌有異衆皆愕然問其名答云名恵明從天安寺来}
