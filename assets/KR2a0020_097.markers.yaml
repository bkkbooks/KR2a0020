  - {type: variant, offset: 1237, length: 2, content: 方湮, WYG: 廟見譏前史遂以一廟矯}
  - {type: variant, offset: 1237, length: 2, content: 方湮, krp: 廟見譏前史遂以一廟矯}
  - {type: variant, offset: 1240, length: 0, content: '', WYG: 又毁僣晋小廟以崇臺榭其庶母蒸嘗未有定所慢祖忘親時人知其不永是月𤣥出逰水南飄風飛其儀蓋又欲造大輦使容三十人坐以二百人輿之𤣥憍逸荒縱不恤時事奏案停積了不省覽或親細事手注直官自用令史制度亂出主司奉答不暇晨夜逰獵文武困乏直侍之官皆繫馬省中休下之吏留供土木之役朝士勞瘁百姓力盡民之思亂十室而八徳宗彭城内史劉裕因是斬徐州刺史桓修於京口與沛國劉毅東海何無忌收衆濟江𤣥加桓謙征討都督召侍官皆入止省中𤣥移還上宫百僚步從赦揚豫徐兗青冀六州遣頓丘太守吳甫之右衛將軍皇甫敷北拒劉裕於江乘裕斬甫之進至羅落橋又梟敷首𤣥外麤猛内恇怯及聞二將已沒志慮荒窘計無所出日與巫術道士為厭勝之法乃謂衆曰朕其敗乎黄門郎曹靖對曰神怒民怨臣實憂懼𤣥曰民怨可然神何為怒對曰移晋宗廟飄泊無所大楚之祭不及於祖此其所以怒也𤣥曰卿何不諌對曰輦上諸君}
  - {type: page-break, offset: 1240, content: '', id: KR2a0020_WYG_097-10a, image: WYG0262/WYG0262-0395c.png}
  - {type: page-break, offset: 1240, content: '', id: KR2a0020_WYG_097-10b, image: WYG0262/WYG0262-0395d.png}
