  - {type: variant, offset: 8790, length: 7, content: 寤每有記識初拜, WYG: 携其弟遁等北走至安陸延頭為戍主光順之所執斬于建業八月義隆使其殿中將軍吉恒朝貢神䴥二年又遣殿中將軍孫横之朝貢三年又遣殿中將軍田竒朝貢尋遣其右將軍到彦之安北將軍王仲徳兗州刺史竺靈秀舟師入河驍騎將軍段横寇虎牢又遣其豫州刺史劉徳武後將軍長沙王義欣至彭城為後繼到彦之宼碻磝分軍向虎牢及洛陽世祖詔河南諸軍收衆北渡以驕之尋詔冠軍將軍安頡等率衆自盟津渡攻金墉義隆建武將軍杜驥出奔遂乘勝進攻虎牢䧟之斬其司州刺史尹沖叔孫建大破竺靈秀追至湖陸四年頡攻滑臺彦之與王仲徳等焚舟棄甲走歸彭城義隆又遣檀道濟救滑臺叔孫建長孫道生擊之道濟至髙梁山頡等攻剋滑臺擒其}
