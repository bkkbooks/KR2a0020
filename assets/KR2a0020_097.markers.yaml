  - {type: variant, offset: 8772, length: 2, content: 式少, WYG: 王景度奔走斬其司馬陽瓚徳祖又遣其將竇應明攻輜重于石濟奚斤於土樓大破廣等乘勝徑至虎牢義符遣其將杜垣等與徐州刺史王仲徳次湖陸太宗詔安平公叔孫建等軍於泗瀆口義符兗州刺史徐琰委尹卯城奔退於是泰山諸郡􅊖棄戍而走太宗詔蒼梧子公孫表等復攻虎牢義符遣將檀道濟率師赴救八年義符改年為景平奚斤進攻金墉義符河南太守王涓之出奔太宗南廵至鄴奚斤自金墉還圍虎牢太宗又詔安平公叔孫建等東擊青州其刺史竺夔守東陽城濟南太守垣苗自梁鄒奔夔奚斤分軍攻潁川太守李元徳奔還項城斤又遣騎破髙平郡所統五縣略居人二千餘家叔孫建以時暑班師檀道濟王仲徳向青州遂不敢進太宗至虎牢因幸洛陽乃北渡河斤克虎牢擒徳祖及其滎陽太守翟廣廣武將軍竇霸等義符豫州刺史劉粹屯項城不敢進斤遣步騎至許昌潁川太守李元徳奔項城遂圍汝陽太守王公度突圍而出仍破邵陵掠萬餘口而還始光初義符司空徐羡之尚書令傅亮領軍謝晦等}
