  - {type: variant, offset: 8620, length: 0, content: '', WYG: 改封中山仍為領軍内掌禁衛外總朝政厯位司徒及自立乃與劉義隆交通延和元年世祖親討之文通嬰城固守文通營丘遼東成周樂浪帶方元莬六郡皆降世祖徙其三萬餘户于幽州文通尚書郭淵勸其歸誠進女乞為附庸保守宗廟文通曰負釁在前忿形己露降附取死不如守志更圖所適也先是文通廢其元妻王氏黜世子崇令鎮肥如以後妻慕容氏子王仁為世子崇母弟廣平公朗樂陵公邈相謂曰大運有在家國已亡又慕容之譖禍將至矣於是遂出奔遼西勸崇來降崇納之㑹世祖使給事中王徳陳示成敗崇遣邈入朝世祖遣兼鴻臚李繼持節拜崇假節侍中都督幽平二州東夷諸軍事車騎大將軍領護東夷校尉幽平二州牧封遼西王録其國尚書事食遼西十郡承制假授文官尚書刺史武官征虜已下文通遣其將封羽率衆圍崇世祖詔永昌王健督諸軍救之封羽又以凡城降徙其三千餘家而還文通遣其尚書髙顒請罪乞以季女充掖庭世祖許之徴其子王仁入朝文通不遣其散騎常侍劉訓言於文通曰雖結婚和通而未遣侍子魏若大舉將有危亡之慮夫以重山之隘劉禪衘璧長江之難孫皓歸命况魏彊於晋氏燕弱于吳蜀願時遣世子以恭大國之命然後收離集散厚布恩澤分賑倉廪以濟民乏勸督農桑以邀秋稔庶大業危而更安社稷可以永保文通大怒殺之世祖又詔樂平王丕等討之日就蹙削上下危懼文通太常陽㟭復勸文通請罪乞降速令王仁入侍文通曰吾未忍為此若事不幸且欲東次髙麗以圖後舉㟭曰魏以天下之衆擊一隅之地以臣愚見勢必土崩且髙麗夷狄難以信期始雖相親終恐為變若不早裁悔無及也文通不聴乃密求迎於高麗太延二年髙麗遣將葛盧等率衆迎之入和龍城脱其敝褐取文通精仗以賦其衆文通乃擁其城内士女入于髙麗先是其國有狼夜繞城羣嘷如是終嵗又有鼠集於城西闐滿數里西行至水則在前者銜馬矢迭相齧尾而渡宿軍地然一旬而滅觸地生蛆月餘乃止和龍城生白毛長一尺二寸文通至遼東髙麗遣使勞之曰龍城王馮君爰適野次士馬勞乎文通慙怒稱制答讓之高麗乃處之於平郭尋徙北豐文通素侮高麗政刑賞罰猶如其國高麗乃奪其侍人質任王仁文通忿怨之謀將南奔世祖又徴文通於高麗髙麗乃殺之於北豐子孫同時死者十餘人文通子朗邈朗子熙在外戚傳島夷劉裕字徳輿晋陵丹徒人也其先不知所出自云本彭城彭城人或云本姓項改為劉氏然亦莫可尋也故其與叢亭安上諸劉了無宗次裕家本寒㣲住在京口恒以賣履為業意氣楚刺僅識文字樗蒲傾産為時賤薄嘗負驃騎諮議刁逵社錢三萬經時不還逵以其無行録而徴責驃騎長史王謐以錢代還事方得了落魄不修廉隅天興二年僣晉司馬徳宗遣其輔國將軍劉牢之東討孫恩裕應募始為牢之參軍恩北㓂海鹽裕追勝之以功稍遷建武將軍下邳太守劉牢之討桓𤣥裕參其軍事牢之降裕為𤣥從兄桓脩中兵參軍孫㤙死餘衆推㤙妹夫盧循為主𤣥遣裕征之裕破循于東陽永嘉循浮海奔逸加裕彭城内史及桓𤣥廢徳宗而自立裕與弟道規劉毅何無忌濳謀舉兵桓脩弟思祖鎮廣陵道規劉毅先為之佐天賜初裕與何無忌等旦候城門}
