  - {type: variant, offset: 9290, length: 1, content: 爰, WYG: 也正平元年正月世祖饗㑹於𤓰步既許和好詔班師其江北之民歸降者數十萬計凡克南兖豫徐兖青冀六州其軍鋒殺掠不可勝算時義隆江北蕭條境内搔擾義隆慮義康為亂遣使殺之葬以侯}
