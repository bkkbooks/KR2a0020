  - {type: variant, offset: 11968, length: 380, content: 蕭衍豫章王蕭綜北府主簿從綜鎮彭城綜降其下僚屬並奔散之才因入國武定中大將軍金紫光祿大夫昌安縣開國侯王顯字世榮陽平樂平人自言本東海郯人王朗之後也祖父延和中南奔居于魯郊又居彭城伯父安上劉義隆時板行館陶縣世祖南討安上棄縣歸命與父母俱徙平城例陽都子除廣寧太守顯父安道少與李亮同師俱學醫藥粗究其術而不及亮也安上還家樂平頗參士流顯少歷本州從事雖以醫術自通而明敏有決斷才用初文昭皇太后之懷世宗也夢為日所逐化而為龍而繞后后寤而驚悸遂成心疾文明太后敕召徐謇及顯等為后診脉謇云是微風入藏宜進湯加針顯云案三部脉非有心疾將是懷孕生男之象果如顯言久之召補侍御師尚書儀曹郎稱幹事世宗自幼有微疾久未差愈顯攝療有效因是稍蒙眄識又罷六輔之初顯為領軍于烈間通規策頗有密功累遷游擊將軍拜廷尉少卿仍在侍御營進御藥出入禁內乞臨本州世宗曾許之積年未授因是聲問傳于遠近顯每語人言時旨已決必為刺史遂除平北將軍相, WYG: 益}
