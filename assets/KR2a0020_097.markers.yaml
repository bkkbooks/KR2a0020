  - {type: punctuation, offset: 413, content: 、, id: KR2a0020_ZHSJ_097-bkkpn75}
  - {type: variant, offset: 413, length: 2, content: 穎川, WYG: 南蠻校尉寵𤣥兄弟欲以侵削荆雍先是荆州大水仲堪倉廪空竭𤣥乗其虚而伐之先遣軍襲巴陵梁州刺史郭銓當之鎮路逢𤣥𤣥遣銓為前驅𤣥發夏口與仲堪書云今當入沔討除佺期頓兵江口若相與無貳可殺楊廣若其不爾便當率軍入江别與桓偉書令剋期為内應偉惶遽以書示仲堪仲堪慰喻遣歸夜乃執之仲堪遣龍驤將軍殷邁振威將軍劉山民等統衆七千至西江口𤣥聞邁至復與其黨苻永道領帳下撃之邁等敗走𤣥頓巴陵收其兵而館其榖復破楊廣於夏口仲堪既失巴陵之積又諸將皆敗江陵駭震城内大飢皆以胡麻為廩初仲堪之得𤣥書也急召佺期佺期曰江陵無食何以待敵可来見就共守㐮陽仲堪猶以全軍無縁棄城迸走甚憂佺期弗來乃紿之曰北来收集已有儲矣可有數萬人百日糧佺期信之乃率步騎八千既至仲堪惟以飯餉其軍佺期大怒曰今兹敗矣不過見仲堪使人於艦上横射𤣥𤣥軍亦射之佺期乃退𤣥乃渡軍於馬頭命其諸軍進破殺仲堪殺楊廣佺期殷道護及仲堪參軍羅企生等徳宗以𤣥為持節都督荆司雍秦梁益寧江八州及揚豫并八郡諸軍事後將軍荆江二州刺史𤣥大論功賞以長史卞範之領南郡相委以心膂之任乃斷上流禁商旅徳宗下書曰豎子桓𤣥故大司馬不腆之息少懐狡惡長而不悛遂與王恭協同奸謀阻兵内侮三方雲集志在問鼎闚擬神器賴祖宗威靈宰傅神略忠義奮發罪人斯殞𤣥等猖狂失圖回舟鳥逝便宜乘㑹殱除奸源于時同異之論用惑廟䇿遂使王憲廢撓寵授非所猶冀𤣥當洗濯胷腑小懲大誡而狼心弗革悖慢愈甚割據江湘擅威荆郢矯命稱制與奪在手又對侍中王謐放肆醜言欲縱凶毒陵陷上京無君之心形於音翰不臣之迹日月彌著是可忍也孰不可懐宜明九伐以寧西夏尚書令後將軍元顯可為征討大都督督十八州諸軍事驃騎大將軍儀同三司以劉牢之為前鋒行征西將軍權領江州命司馬尚之入沔水𤣥聞元顯處分甚駭懼欲保江陵長史卞範之説𤣥東下𤣥甚狐疑範之苦勸元乃留桓偉守江陵率軍東下至夏口乃建牙傳􅊾曰案揚州刺史元顯凶暴之性自幼加長犯禮毁教發䝉如備居䘮無一日之哀衰絰為宵征之服絃觴於殷憂之時窮色於罔極之日劫略王國寳妓妾一朝空房此基惡之始駭愕視聴者矣相王有疾情無悚懼幸災擅命揚州簒授遂乃父子同録比肩連案既專權重多行險暴恐相王知之杜絶視聴惡聲無聞佞譽日至萬幾之重委之厮孽國典朝政紛紜淆亂又諷㫖尚書使普敬録}
