  - {type: variant, offset: 8642, length: 2, content: 屬齊, krp: 如故永興初慕容超大掠淮北執徳宗陽平太守劉千載濟南太守趙元驅掠千餘家而歸裕乃伐超遂屠廣固執超斬其王公以下三千人納口萬餘馬二千匹夷其城隍送超于建業斬之裕是行也徐道覆勸盧循令乘虚而出循從之於是南康廬陵豫章諸郡守皆奔走江州刺史何無忌率軍至豫章戰殁于時羣議欲令徳宗北徙渡江循遂宼湘中破劉道規于長沙敗劉毅於桑落洲席卷而下裕將孟昶諸葛長民勸裕擁徳宗過江裕不從昶謂事必不濟乃自殺裕發居人治石頭城道覆等至即欲於新亭白石渚焚舟而上盧循曰大軍未至孟昶便逆自殺以此而推建業尋應有變但按甲守之不憂不濟也乃屯軍於蔡洲循乃率衆數萬上南岸至于丹陽郡遂遣焚京口金城姑孰宼掠塗中及江寧蕪湖循以阮賜為豫州刺史裕中軍參軍尚靖宣城内史毛修之破賜於姑孰獲其輜重賜乃退又加裕太尉中書監黄鉞裕}
  - {type: variant, offset: 8645, length: 0, content: '', WYG: 黄鉞盧循既不戰乃告道覆曰師老矣可還據尋陽并力取荆州徐以三分有二之勢與下流爭衡猶可以濟也乃自蔡洲南退裕遣輔國將軍王仲徳等追之裕又遣建威將軍孫季髙率衆自海道襲番禺裕自以舟師南伐季髙乘海兼行奄至番禺循不以海道為防既至而覺衆乃大驚季髙悉力而上四面攻之仍屠其城盧循父嘏及長史孫建之並以輕舟奔始興循與道覆率衆而下裕衆軍撃之循等還尋陽循欲遁於豫章乃悉力柵斷左里裕諸軍乘勝而擊之循單舸徑還廣州道覆還始興裕還為大將軍揚州牧班劔二十人本官如故徐道覆至始興猶據山澗劉蕃等攻之道覆先鴆妻子然後自殺盧循至番禺收衆攻季髙劉蕃遣沈田子討之循奔走餘衆從嶺道襲合浦克之進攻交阯交州刺史杜恵度屢戰克㨗循投水而死裕自為太尉中書監裕殺尚書左僕射謝混兗州刺史劉蕃裕既權重便懐異志以荆州刺史劉毅頗有勇略又據上流之所心畏惡之遂自討毅遣參軍王鎮惡等襲江陵鎮惡至豫章口焚毅舟艦毅兵逆戰不能抗鎮惡馳入外城于時毅病乃阻内城鎮惡焚諸門攻之其徒乃潰毅自北門出走縊于道側斬屍於市誅其子姪裕至江陵誅南蠻校尉郗僧施衛軍諮議謝邵等裕本寒㣲不參士伍及擅時政便肆意殺戮以威懼下初以刁逵縛之之怨誅其兄弟又以王愉謝混郗僧施之徒並皆時望遂悉害之分荆州為湘州裕自總督裕還於東府召諸葛長民屏人閑語密令壮士丁旿等出自幔後於座拉之長民墜地死於牀側亦以才雄見忌也荆州刺史司馬休之頗得衆心裕内懐忌憚神䴥二年率衆討之遣龍驤將軍蒯恩等為前軍裕進領荆州刺史加黄鉞雍州刺史魯宗之率其子軌㑹休之于江陵軌等軍敗乃與休之俱奔襄陽裕自領南蠻校尉休之等奔姚興裕為太傅揚州牧劔履上殿入朝不趨讃拜不名置左右長史司馬從事中郎四人餘如故裕又領平北將軍徐兗二州刺史増督南秦州尋督中外諸軍事裕志傾僭晋若不外立功名恐人望不許乃西伐姚泓自領征西將軍司豫二州刺史尋領北雍州刺史加前後部羽葆鼔吹増班劔為四十人子義符為中軍將軍監太尉留府事給鼔吹一部左僕射劉穆之為左僕射領軍中軍二府軍司入居東府總攝内外穆之謂龍􅋮將軍王鎮惡曰公今委卿以闗中卿其勉之鎮惡曰吾今不克咸陽誓不濟江而公九錫不至者亦卿之責矣裕率衆軍至彭城加鎮北將軍徐州刺史遣中兵參軍沈林子自汴入河冠軍檀道濟與王鎮惡步出淮肥裕將王仲徳汎濟入河徳宗封裕十郡為宋公加相國九錫僣擬魏晋故事王鎮惡進至宜陽獨取潼關沈林子自㐮邑屯于陜城姚泓諸將不能抗始裕入河西上太宗遣將軍娥清長孫嵩等屯於河畔裕遣朱超石劉榮祖等渡河長孫道生破之擒斬其將楊豐等裕遣將軍王仲徳趙倫之率沈田子等入武關屯軍青泥沈林子由秦嶺㑹田子於堯栁城姚泓率衆數萬不戰而還裕至關頭鎮惡至渭橋破泓軍於横門裕至長安執姚泓以歸斬于建業市裕以其子義真為雍州刺史鎮咸陽進裕為宋王増十郡置百官一擬舊制裕還彭城赫連屈丐掠渭陽義真遣沈田子率軍討之田子退軍陘上鎮惡徃就田子議之田子斬鎮惡於幕下又殺其兄弟羣從七人田子馳還云鎮惡有異志義真長史王脩執而斬之義真與左右多為不法王脩每裁割之左右咸怨白義真曰王脩以關中阻險兵食又足欲謀反叛宜早圖之義真遂遣左右殺脩裕聞之以朱齡石為雍州刺史義真發自長安將走江東諸將競收財貨次扵灞上赫連昌率衆追之既至青泥義真大敗蒯恩與安西司馬毛脩之並被擒獲參軍段横名犯髙祖廟諱單馬負義真走歸朱齡石亦棄長安奔就龍驤將軍王敬先于曹公故壘既而城䧟被執見殺徳宗死裕立徳宗弟徳文裕又自増十郡裕遣司馬𫝊亮赴建業令徴已入輔徳文}
