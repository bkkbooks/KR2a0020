后以昇中岳而三禮闕於唐辰象舞替於周日夫君舉必書古之典也柴望之禮帝王盛事臣今以為有其時而無其禮有其徳而無其樂史闕封石之文工絶清頌之饗良由禮樂不興王政有缺致也臣聞樂由禮所以象徳禮由樂所以防滛五帝殊時不相沿三王異世不相襲事與時竝名與功偕故也臣識昧儒先管窺不逺謂宜修禮正樂以光大聖之治詔令公卿集議㑹髙宗崩遂寝皇興中雍與隴西王源賀及中書監髙允等竝以耆年特見優禮錫雍几杖劒履上殿月致珍羞焉雍性寛柔好尚文典手不釋書明敏多智凡所為詩賊頌論并雜文百有餘篇又汎施愛士恬静寡欲篤信佛道著敎誡二十餘篇以訓𨗳子孫太和八年冬卒年九十五賜命服一襲賵帛五百疋贈儀同三司冀州刺史將軍如故}
