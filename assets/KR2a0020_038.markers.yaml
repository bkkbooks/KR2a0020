  - {type: variant, offset: 3953, length: 177, content: 帥入其府藏各令任意取金玉諸將取之盈懷軌獨不探把世祖乃親探金賜之謂軌曰卿可謂臨財不苟得朕所以增賜者欲顯廉於衆人後兼大鴻臚持節拜氐王楊玄為南秦王及境玄不郊迎軌數玄曰昔尉他跨據及陸賈至匍匐奉順故能垂名竹帛今君王無肅恭之禮非蕃臣也玄使其屬趙客子對曰天子以六合為家孰非王庭是以敢請入國然後受謁軌答曰大夫入境尚有郊勞而況王命者乎請奉策以還玄懼詣郊受命軌使還稱旨拜尚書, WYG: 軍}
