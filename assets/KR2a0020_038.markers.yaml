  - {type: variant, offset: 4724, length: 613, content: 賜爵范陽侯加左將軍高祖詔邃與內都幢將上谷公張儵率衆討蕭賾舞陰戍後高祖與文明太后引見王公以下高祖曰比年方割畿內及京城三部於百姓頗有益否邃對曰先者人民離散主司猥多至於督察實難齊整自方割以來衆賦易辦實有大益太后曰諸人多言無益卿言可謂識治機矣詔醴陽被掠之兵有得還者賜絹二十匹邃奏為貴賤等級高祖稱善依例降侯改為襄平伯出為使持節安東將軍青州刺史以邃在公遺迹可紀下詔褒述加鎮東將軍領東夷校尉刺史如故太和十九年卒於官高祖在鄴宮為之舉哀時百度唯新青州佐吏疑為所服詔曰今古時殊禮或隆殺專古也理與今違專今也大乖曩義當斟酌兩途商量得失吏民之情亦不可苟順也主簿近代相承服斬過葬便除可如故事自餘無服大成寥落可準諸境內之民為齊衰三月子同始襲爵卒於給事中同始弟同慶篤厚廉慎為司徒田曹參軍李崇驃騎府外兵參軍隨崇北征有方直之稱邃叡為從父兄弟而叡才器小優又封氏之生崔氏之壻邃母雁門李氏地望縣隔鉅鹿太守祖季真多識北方人物每云士大夫當須好婚親二公孫同堂兄弟耳吉凶會集便有士庶之異張濟字士度西河人也父千秋慕容永驍騎將軍永滅來奔太祖善之拜建節將軍賜爵成紀侯隨從征伐累著功績登國末卒濟涉獵書傳清辯美儀容太祖愛之引侍左右與公孫表等俱為行人拜散騎侍郎襲爵先是姚興遣將攻洛陽司馬德宗雍州刺史楊佺期遣使乞師於常山王遵遵以狀聞太祖遣濟為遵從事中郎報之濟自襄陽還太祖問濟江南之事濟對曰司馬昌明死子德宗代立所部州鎮迭相攻擊今雖小定君弱臣強全無綱紀臣等既至襄陽佺期問臣魏初伐中山幾十萬衆臣答, WYG: 卷}
