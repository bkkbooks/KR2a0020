  - {type: variant, offset: 3183, length: 0, content: '', WYG: 子山髙祖藪晉齊郡太守藪因晉亂居青州之樂安父道覆皇興初除平原太守至雙始還本鄉雙少好學兼渉文史雅為中山王英所知賞拜西河太守正光初中山王熈之誅也熈弟略投命於雙雙䕶之周年時購略甚切略乃謂雙曰我兄弟屠滅已盡唯我一身漏刃相託卿雖厚恩久見容蔽但事留變生終恐難保脱萬一發覺我死分也無事相累卿若送吾出境便是再生之恵如其不爾輒欲自裁雙曰人生㑹有一死死所難遇耳今遭知己視死如歸願不以為慮略後苦求南轉雙乃遣從子昌送達江左}
