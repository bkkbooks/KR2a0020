  - {type: variant, offset: 809, length: 0, content: '', WYG: 東光侯給五萬騎使别立義軍建先攻東陽雍至招集義衆得五千人遣撫慰郡縣土人盡下送租供軍是時攻東陽平其北城三十許歩劉義符青州刺史竺夔於城内鑿地道南下入澠水澗以為退路雍謂建曰此城已平宜時入取不者走盡建懼傷兵士難之雍曰若懼傷官兵者雍今請將義兵先入建不聼夔欲東走㑹義符遣其將檀道濟等救青州雍謂建曰賊畏官軍突騎以鎻連車為函陣大峴已南處處狹隘不得方軌雍求將義兵五千要嶮破之建不聼曰兵人不宜水土疫病過半若相持不休兵自死盡何湏復戰今不損大軍安全而返計之上也建乃引還雍遂鎮尹卯固又詔令南入以亂賊境雍攻克項城㑹有勑追令隨機立効雍於是招集譙梁彭沛民五千餘家置二十七營遷鎮濟隂延和二年立徐州於外黄城置譙梁彭沛四郡九縣以雍為平南將軍徐州刺史賜爵東安侯在鎮七年太延四年徴還京師頻嵗為邊民所請世祖嘉之真君二年復授使持節侍中都督揚豫兖徐四州諸軍事征南將軍徐豫二州刺史三年劉義隆將裴方明宼䧟仇池詔雍與建興公古弼等十餘將討平之五年以本將軍為薄骨律鎮將至鎮表曰臣䝉寵出鎮奉辭西藩總統諸軍户口殷廣又揔勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寜處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口累率皆飢儉略加檢行知此土稼穡艱難夫欲育民豐國事湏大田此土乏雨正以引河為用觀舊渠堰乃是上古所制非近代也富平西南三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘歩山南引水入此渠中計昔為之髙於水不過一丈河水激急沙土漂流今日此渠髙於河水二丈三尺又河水激射往往崩頽渠溉髙懸水不得上雖復諸處按舊引水水亦難求今艾山北河中有洲渚水分為二西河小狹水廣百四十歩臣今求入來年正月於河西髙渠之北八里分河之下五里平地鑿渠廣十五歩深五尺築其兩岸令髙一丈北行四十里還入古髙渠即循髙渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十歩廣十歩髙二丈絶斷小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則水一遍水凡四溉榖得成實官課常充民亦豐贍詔曰卿憂國愛民知欲更引河水勸課大田宜便興立以克就為功何必限其日數也有可以便國利民者動静以聞七年雍表曰奉詔髙平安定統萬及臣所守四鎮出車五千乘運屯榖五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車來往猶以為難設令載榖不過二十石每渉深沙必致滯䧟又榖在河西轉至沃野越渡大河計車五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一嵗不過二運五十萬斛乃經三年臣前被詔有可以便國利民者動静以聞臣聞鄭白之渠逺引淮海之粟泝流數千周年乃得一至猶稱國有儲糧民用安樂今求於牽屯山河水之次造船二百艘二船為一舫一船勝榖二千斛一舫十人計湏千人臣鎮内之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人功輕於車運十倍有餘不費牛力又不廢田詔曰知欲造船運榖一冬即成大省民力既不費牛又不廢田甚善非但一運自可永以為式令别下統萬鎮出兵以供運榖卿鎮可出百兵為船工豈可專廢千人湏遣船匠猶湏卿指授未可專主也諸有益國利民如此者續復以聞九年雍表曰臣聞安不忘亂先聖之政也况綏服之外帶接邊城防守不備無以禦敵者也臣鎮所綰河西爰在邊表常懼不虞平地積榖實難守䕶兵人散居無所依恃脱有妖姧必致狼狽雖欲自固無以得全今求造城儲榖置兵備守鎮自建立更不煩官又於三時之隙不令廢農一嵗二嵗不訖三嵗必成立城之所必在水陸之次大小髙下量力取辦詔許之至十年三月城訖詔曰卿深思逺慮憂勤盡思知城已周訖邊境無不虞之憂千載有永安之固朕甚嘉焉即名此城為刁公城以旌爾功也興光二年詔雍還都拜特進將軍如故和平六年表曰臣聞有國有家者莫不禮樂為先故樂記云禮所以制外樂所以修内和氣中釋恭敬温文是以安上治民莫善於禮易俗移風莫善於樂且於一民一俗尚湏崇而用之况統御八方陶鈞六合者哉故帝堯修五禮以明典章作咸池以諧萬類顯皇軌於云岱揚鴻化於介丘令木石革心鳥獸率舞包天地之情達神明之徳夫感天動神莫近於禮樂故大樂與天地同和大禮與天地同節和故百物阜生節故報天祭地禮行於郊則上下和肅肅者禮之情和者樂之致樂至則無怨禮至則不違揖讓而治天下者禮樂之謂歟唯聖人知禮樂之不可以已故作樂以應天制禮以配地所以承天之道治人之情故王者治定制禮功成作樂虞夏殷周易代而起及周之末王政陵遲仲尼傷禮樂之崩亡痛文武之將墜自衛返魯各得其中逮乎秦皇剪棄道術灰滅典籍坑燼儒士肓天下之目絶象魏之章簫韶來儀不可復矣賴大漢之興改正朔易服色恊音樂制禮儀正聲古禮粗欲周備至於孝章每以三代損益優劣殊軌歎其薄徳無以易民視聼愽士曹襃覩斯詔也知上有制作之意乃上疏求定諸儀以為漢禮終於休廢寝而不行及魏晉之日修而不備伏惟陛下無為以恭已使賢以御世方鳴和鸞以陟岱宗陪羣后以昇中岳而三禮闕於唐辰象舞替於周日夫君舉必書古之典也柴望之禮帝王盛事臣今以為有其時而無其禮有其徳而無其樂史闕封石之文工絶清頌之饗良由禮樂不興王政有缺致也臣聞樂由禮所以象徳禮由樂所以防滛五帝殊時不相沿三王異世不相襲事與時竝名與功偕故也臣識昧儒先管窺不逺謂宜修禮正樂以光大聖之治詔令公卿集議㑹髙宗崩遂寝皇興中雍與隴西王源賀及中書監髙允等竝以耆年特見優禮錫雍几杖劒履上殿月致珍羞焉雍性寛柔好尚文典手不釋書明敏多智凡所為詩賊頌論并雜文百有餘篇又汎施愛士恬静寡欲篤信佛道著敎誡二十餘篇以訓𨗳子孫太和八年冬卒年九十五賜命服一襲賵帛五百疋贈儀同三司冀州刺史將軍如故}
