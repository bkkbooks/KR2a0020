  - {type: variant, offset: 1911, length: 1191, content: 臣子拜營州刺史卒子永興襲爵張蒲字玄則河內脩武人本名謨後改為蒲漢太尉延之後父攀慕容垂御史中丞兵部尚書以清方稱蒲少有父風頗涉文史以端謹見知為慕容寶陽平河間二郡太守尚書左丞太祖定中山寶之官司用者多降品秩既素聞蒲名仍拜為尚書左丞天興中以蒲清謹方正遷東部大人後拜太中大夫太宗即位為內都大官賜爵泰昌子參決庶獄私謁不行號為公正泰常初丁零翟猛雀驅逼吏民入白酶山謀為大逆詔蒲與冀州刺史長孫道生等往討道生等欲徑以大兵擊之蒲曰良民所以從猛雀者非樂亂而為皆逼凶威強服之耳今若直以大軍臨之吏民雖欲返善其道無由又懼誅夷必并勢而距官軍然後入山恃阻誑惑愚民其變未易圖也不如先遣使喻之使民不與猛雀同謀者無坐則民必喜而俱降矣道生甚以為然具以奏聞太宗詔蒲軍前慰喻乃下數千家還其本屬蒲皆安集之猛雀與親黨百餘人奔逃蒲與道生等追斬猛雀首送京師後劉裕寇竊河表以蒲為南中郎將南蠻校尉隸平南大將軍長孫嵩往禦之裕入長安乃還後改為壽張子與安平公叔孫建將兵自平原東渡徇下劉義符青兗諸郡詔加陳兵將軍濟州刺史又與建攻青州不克而還世祖即位以蒲清貧妻子衣食不給乃出為相州刺史扶弱抑強進善黜惡教化大行始光三年卒於州年七十二吏民痛惜之蒲在謀臣之列屢出為將朝廷清論常為稱首贈平東將軍廣平公諡曰文恭子昭有志操天興中以功臣子為太學生太宗即位為內主書後襲父爵神中從征蠕蠕以功進爵脩武侯加平遠將軍延和二年出為幽州刺史開府加寧東將軍時幽州年穀不登州廩虛罄民多菜色昭謂民吏曰何我之不德而遇其時乎乃使富人通濟貧乏車馬之家糴運外境貧弱者勸以農桑歲乃大熟士女稱頌之在任三年卒子昶襲爵早卒昶弟靈符真君八年補中書博士和平中咸陽郡民趙昌聚黨作逆百姓騷動詔靈符宣旨慰喻民乃復業天安初遷中書侍郎賜爵昌國子延興中使南豫州觀察風俗太和四年除建威將軍廣平太守還為尚書左丞司州大中正後除鎮遠將軍齊州刺史十六年轉光州刺史加立忠將軍卒谷渾字元沖昌黎人也父袞膂力兼人彎弓三百斤勇冠一時仕慕容垂至廣武將軍渾少有父風任俠好氣以父母在常自退抑晚乃折節受經業遂覽群籍被服類儒者太祖時以善隸書為內侍左右太宗世遷前鋒將軍從幸河南還以選給事東宮世祖即位為中書侍郎加振威將軍從征赫連昌為驍騎將軍遷侍中安南將軍領儀曹尚書賜爵濮陽公渾正直有操行性不苟合趣舍不與己同者視之蔑如也然愛重舊故不以富貴驕人時人以此稱之在官廉直為世祖所器重詔以渾子孫十五以上悉補中書學生延和二年春卒世祖悼惜之親臨其喪贈賜豐厚諡曰文宣子闡字崇基小字長命襲爵少侍東宮稍遷平南將軍相州刺史入為外都大官延興四年卒諡曰簡公闡弟季孫襲爵中書學生入為祕書中散遷中部大夫出為吐京鎮將闡子洪字元孫少受學中書世祖以洪機敏有祖風令入授高宗經高宗即位以舊恩為散騎常侍南部長遷尚書賜爵滎陽公洪性貪奢僕妾衣服錦綺貲累千金而求欲滋劇時顯祖舅李峻等初至京師官給衣服洪輒截沒為有司所糾并窮其前後贓罪坐以伏法子穎青州征東大將軍廣陵王羽田曹參軍員外散騎侍郎給事中尚書郎加威遠將軍, WYG: ''}
