  - {type: variant, offset: 3402, length: 214, content: 子從入中山慕容寶走乃歸闕以使江南稱旨拜尚書郎後為博士初太祖以慕容垂諸子分據勢要權柄推移遂至亡滅且國俗敦樸嗜欲寡少不可啟其機心而導其巧利深非之表承指上韓非書二十卷太祖稱善太宗初表參功勞將軍元屈軍事討吐京叛胡為胡所敗表以先諫止屈太宗善之賜爵固安子河西飢胡劉虎聚結流民反於上黨南寇河內詔表討虎又令表與姚興洛陽戍將結期使備河南岸然後進軍討之時胡內自疑阻更相殺害表以其有解散之勢遂不與戍將相聞率衆討之法令不整為胡所敗軍人大被傷殺太宗深銜之, WYG: 史}
