  - {type: variant, offset: 1282, length: 272, content: 伐車駕幸魯口博陵太守申永南奔河外高陽太守崔玄伯東走海濱屬城長吏率多逃竄遵獨告其吏民曰往年寶師大敗今茲垂征不還天之棄燕人弗支也魏帝神武命世寬仁善納御衆百萬號令若一此湯武之師吾欲歸命爾等勉之勿遇嘉運而為禍先遂歸太祖太祖素聞其名厚加禮焉拜中書令出納王言兼總文誥中原既平賜爵下蔡子從駕還京師卒時年七十子須襲除長樂太守加鎮遠將軍進爵信都侯卒贈寧北將軍昌黎公諡曰恭少子處珍襲爵處珍卒子車渠襲爵高祖初出為東陽鎮將卒贈青州刺史諡曰莊須長子垣字長生沉深有局量少纂家業尤善書計太祖初給事諸曹太宗世遷將作監統京師諸署世祖即位稍遷尚書右僕射加侍中以破平涼功賜爵濟北公加, WYG: 境}
