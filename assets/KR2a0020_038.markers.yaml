  - {type: variant, offset: 4166, length: 13, content: 遣軌屯壺關會上黨丁零叛軌討, WYG: 洛兄弟在父䘮中以於荘帝有從姨兄弟之親相率奉迎俱見害河隂議者惜其人才而譏其躁競贈并州刺史著三晉記十卷遵業子松年尚書庫部郎韓延之字顯宗南陽赭陽人魏司徒暨之後也司馬徳宗}
