  - {type: variant, offset: 4181, length: 0, content: '', krp: 未至江陵密使與延之書招之延之報曰聞親率戎馬逺履西畿闔境士庶莫不怪駭何者莫知師}
  - {type: variant, offset: 4182, length: 0, content: '', WYG: 之名故也司馬平西體國忠貞欵愛待物當於古人中求耳劉裕足下海内之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣今伐人之君㗖人以利真可謂處懐期物自有由來者矣以平西之至徳寧無授命之臣乎假令天長䘮亂九流渾濁當與臧洪遊於地下不復多言裕得書歎息以示諸佐曰事人當應如此劉裕父名翹字顯宗於是延之字顯宗名子為翹盖示不臣劉氏也後奔姚興泰常二年與司馬文思來入國以延之}
