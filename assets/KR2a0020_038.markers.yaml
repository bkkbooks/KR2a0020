  - {type: variant, offset: 5869, length: 2654, content: 表龍顏挺特臣安敢不識太祖又問曰卿祖父及身官悉歷何官先對曰臣大父重晉平陽太守大將軍右司馬父樊石虎樂安太守左中郎將臣苻丕尚書右主客郎慕容永祕書監高密侯太祖曰卿既宿士屢歷名官經學所通何典為長先對曰臣才識愚闇少習經史年荒廢忘十猶通六又問兵法風角卿悉通不先曰亦曾習讀不能明解太祖曰慕容永時卿用兵不先曰臣時蒙顯任實參兵事太祖後以先為丞相衞王府左長史從儀平鄴到義臺破慕容驎軍回定中山先每一進策所向克平車駕還代以先為尚書右中兵郎太祖謂先曰今蠕蠕屢來犯塞朕欲討之卿以為何如先曰蠕蠕不識天命竄伏荒朔屢來偷竊驚動邊民陛下神武威德遐振舉兵征之必將摧殄車駕於是北伐大破蠕蠕賞先奴婢三口馬牛羊五十頭轉七兵郎遷博士定州大中正太祖問先曰天下何書最善可以益人神智先對曰唯有經書三皇五帝治化之典可以補王者神智又問曰天下書籍凡有幾何朕欲集之如何可備對曰伏羲創制帝王相承以至於今世傳國記天文祕緯不可計數陛下誠欲集之嚴制天下諸州郡縣搜索備送主之所好集亦不難太祖於是班制天下經籍稍集太祖之討姚興於柴壁也問先曰興屯天渡平據柴壁相為表𩹉今欲殄之計將安出先對曰臣聞兵以正合戰以奇勝如聞姚興欲屯兵天渡利其糧道及其未到之前遣奇兵先邀天渡柴壁左右嚴設伏兵備其表𩹉以陛下神策觀時而動興欲進不得退又乏糧夫高者為敵所棲深者為敵所囚兵法所忌而興居之可不戰而取太祖從其計興果敗歸太宗即位問左右舊臣之中為先帝所親信者有誰時新息公王洛兒對曰有李先者最為先帝所知太宗召先引見問曰卿有何功行而蒙先帝所識先對曰臣愚細才行無聞適以忠直奉上更無異能太宗曰卿試言舊事先對曰臣聞堯舜之教化民如子三王任賢天下懷服今陛下躬秉勞謙六合歸德士女能言莫不慶抃俄而召先讀韓子連珠二十二篇太公兵法十一事詔有司曰先所知者皆軍國大事自今常宿於內賜先絹五十匹絲五十斤雜綵五十匹御馬一匹拜安東將軍壽春侯賜隸戶二十二詔先與上黨王長孫道生率師襲馮跋乙連城克之悉虜其衆乃進討和龍先言於道生曰宜密使兵人人備青草一束各五尺圍用填城塹攻其西南絕其外援勒兵急攻賊必可擒道生不從遂掠民而還後出為武邑太守有治名世祖即位徵為內都大官神二年卒年九十五詔賜金縷命服一襲贈定州刺史中山公諡曰文懿子冏襲爵為京兆濟陰二郡太守卒子鍾葵襲爵降為子鍾葵弟鳳子鳳子弟虬子並中書博士鳳子子預字元愷少為中書學生聰敏強識涉獵經史太和初歷祕書令齊郡王友出為征西大將軍長史帶馮翊太守積數年府解罷郡遂居長安每羨古人餐玉之法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘稍得粗黑者亦篋盛以還而至家觀之皆光潤可玩預乃椎七十枚為屑日服食之餘多惠人後預及聞者更求於故處皆無所見馮翊公源懷等得其玉琢為器佩皆鮮明可寶預服經年云有效驗而世事寢食不禁節又加之好酒損志及疾篤謂妻子曰服玉屏居山林排棄嗜欲或當大有神力而吾酒色不絕自致於死非藥過也然吾尸體必當有異勿便速殯令後人知餐服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云餐玉有神驗何故不受唅也言訖齒啟納珠因噓屬其口都無穢氣舉斂於棺堅直不傾委死時猶有遺玉屑數斗橐盛納諸棺中初天興中先子密問於先曰子孫永為魏臣將復事他主也先告曰未也國家政化長遠不可卒窮自皇始至齊受禪實百五十餘歲矣賈彝字彥倫本武威姑臧人也六世祖敷魏幽州刺史廣川都亭侯子孫因家焉父為苻堅鉅鹿太守坐訕謗繫獄彝年十歲詣長安訟父獲申遠近歎之僉曰此子英俊賈誼之後莫之與京弱冠為慕容垂驃騎大將軍遼西王農記室參軍太祖先聞其名嘗遣使者求彝於垂垂彌增器敬更加寵秩遷驃騎長史帶昌黎太守垂遣其太子寶來寇大敗於參合陂執彝及其從兄代郡太守潤等太祖即位拜尚書左丞參預國政加給事中於鄴置行臺與尚書和跋鎮鄴招攜初附久乃召還天賜末彝請詣溫湯療病為叛胡所拘執送於姚興積數年遁歸又為屈丐所執與語悅之拜祕書監年六十一卒世祖平赫連昌子秀迎其尸柩葬于代南秀歷中書博士遷中書侍郎太子中庶子揚烈將軍賜爵陽都男本州大中正恭宗崩以爵還第既而掌吏曹事高宗以秀東宮舊臣進爵陽都子加振威將軍時丞相乙渾擅作威福多所殺害渾妻庶姓而求公主之號屢言於秀秀默然渾曰公事無所不從我請公主不應何意秀慷慨大言對曰公主之稱王姬之號尊寵之極非庶族所宜若假竊此號當必自咎秀寧死於今朝不取笑於後日渾左右莫不失色為之震懼而秀神色自若渾夫妻默然含忿他日乃書太醫給事楊惠富臂作老奴官慳字令以示秀渾每欲伺𨻶陷之會渾伏誅遂得免難秀執正守志皆此類也時秀與中書令勃海高允俱以儒舊見重於時皆選擬方岳以詢訪見留各聽長子出為郡守秀辭曰爰自愚微承乏累紀少而受恩老無成效恐先草露無報殊私豈直無功之子超齊先達雖仰感聖慈而俯深驚懼乞收成命以安微臣遂固讓不受自始及終歷奉五帝雖不至大官常掌機要而廉清儉約不營資產年七十三遇疾給醫藥賜几杖時朝廷舉動及大事不決每遣尚書高平公李敷就第訪決皇興三年卒贈本將軍冀州刺史武邑公諡曰簡子儁字異隣襲爵拜祕書中散軍曹令出為顯武將軍荊州刺史依例降爵為伯先是上洛置荊州後改為洛州在重山中民不知學儁乃表置學官選聰悟者以教之在州五載清靖寡事吏民亦安遷洛後儁朝京師賞以素帛景明初卒贈本將軍光州刺史子叔休襲爵除給事中卒子興襲爵興弟賓歷尚書郎以清素稱出為黎陽太守卒官潤曾孫禎字叔願學涉經史居喪以孝聞太和中為中書博士副中書侍郎高聰使於江左還以母老患輒過家定省坐免官久之徵為京兆王愉郎中令行洛陽令轉治書侍御史國子博士加威遠將軍行魯陽太守清素善撫接得百姓情稍遷司徒諮議參軍通直散騎常侍加冠軍將軍正光中卒贈平北將軍齊州刺史子子儒司空田曹參軍禎兄子景儁亦以學識知名奉朝請遷京兆王愉府外兵參軍愉起逆於冀州將授其官景儁不受愉殺之永平中贈東清河太守諡曰貞景儁弟景興清峻鯁正少為州主簿遂栖遲不仕後葛榮陷冀州為榮所虜稱疾不拜景興每捫膝而言曰吾不負汝以不拜葛榮故也薛提太原人也皇始中補太學生拜侍御史累遷散騎常侍太子太保賜爵歷陽侯加晉兵將軍出為鎮東大將軍冀州刺史進爵太原公所在有聲績徵為侍中治都曹事世祖崩秘不發喪尚書左僕射蘭延侍中和匹等議以為皇孫幼冲宜立長君徵秦王翰置之祕室提曰皇孫有世嫡之重民望所係春秋雖少令問聞於天下成王孝昭所以隆周漢廢所宜立而更求君必不可延等猶豫未決中常侍宗愛知其謀矯皇后令徵提等入遂殺之提弟浮子高宗即位以提有謀立之誠詔襲兄爵太原公有司奏降為侯皇興元年卒提孫令保太和中襲爵歷陽侯史臣曰宋隱操行貞白遺略榮利王憲名祖之孫老見優禮屈遵學藝知機垣乃局量受遇張蒲谷渾文武為用人世仍顯公孫表初則一介見知終以輕薄致戾軌始受授金之賞末陷財利之徵鮮克有終固不虛也張濟使於四方有延譽之美李先學術嘉謀荷遇三世賈彝早播時學秀則不畏強禦薛提正議忠謀見害姦閹悲夫, WYG: 考證}
