  - {type: variant, offset: 4188, length: 1, content: 世, WYG: 延之曾來徃柏谷塢省魯宗之墓有終焉之志因謂子孫云河洛三代所都必有治於此者我死不勞向北代𦵏也即可就此及卒子從其言遂葬於宗之墓次延之死後五十餘年而髙}
