  - {type: variant, offset: 5339, length: 529, content: 餘萬佺期曰魏國被甲戎馬可有幾匹臣答中軍精騎十有餘萬外軍無數佺期曰以此討羌豈足滅也又曰魏定中山徙幾戶於北臣答七萬餘家佺期曰治在何城臣答定都平城佺期曰有如許大衆亦何用城為又曰魏帝為欲久都平城將復遷乎臣答非所知也佺期聞朝廷不都山東貌有喜色曰晉魏通和乃在往昔非唯今日羌寇狡猾頻侵河洛夙夜憂危今此寡弱倉庫空竭與君便為一家義所無諱洛城救援仰恃於魏若獲保全當必厚報如其為羌所乘寧使魏取臣等欲分向揚州佺期曰蠻賊互起水行甚難魏之軍馬已據滑臺於此而還從北道東下乃更便直晉之法制有異於魏今都督襄陽委以外事有欲征討輒便興發然後表聞令朝廷知之而已如其事勢不舉亦不承臺命太祖嘉其辭順乃厚賞其使許救洛陽後遷謁者僕射報使姚興以累使稱旨拜勝兵將軍頻從車駕北伐濟謀功居多賞賜奴婢百口馬牛數百羊二十餘口天賜五年卒子多羅襲爵坐事除李先字容仁中山盧奴人也本字犯高祖廟諱少好學善占相之術師事清河張御御奇之仕苻堅尚書郎後慕容永聞其名迎為謀主先勸永據長子城永遂稱制以先為黃門郎祕書監垂滅永徙於中山皇始初先於井陘歸順太祖問先曰卿何國人先曰臣本趙郡平棘人太祖曰朕聞中山土廣民殷信爾以不先曰臣少官長安仍事長子後乃還鄉觀望民士實自殷廣又問先曰朕聞長子中有李先者卿其是乎先曰小臣是也太祖曰卿識朕不先曰陛下聖德膺符澤被, WYG: ''}
