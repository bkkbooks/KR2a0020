  - {type: variant, offset: 4162, length: 1, content: 慮, WYG: 聞曰此必不然是齊人忌樂毅耳乃賜慧龍璽書曰義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意也劉義隆計既不行復遣刺客呂𤣥伯購慧龍首二百户男絹一千匹𤣥伯偽為反間來求屏人有所論慧龍疑之使人探其懐有尺刀𤣥伯叩頭請死慧龍曰各為其主也吾不忍害此人左右皆言義隆賊心未已不殺𤣥伯無以制將來慧龍曰死生有命彼亦安能害我且吾方以仁義為干鹵又何憂乎刺客遂捨之時人服其寛恕慧龍自以遭難流離常懐憂悴乃作祭伍子胥文以寄意焉生一男一女遂絶房室布衣蔬食不參吉事舉動必以禮太子少傅游雅言於朝曰慧龍古之遺孝也撰帝王制度十八篇號曰國典真君元年拜使持節寧南將軍虎牢鎮都副將未至鎮而卒臨没謂功曹鄭曄曰吾覊旅南人恩非舊結䝉聖朝殊特之慈得在疆場効命誓願鞭屍吳市戮墳江隂不謂嬰此重疾有心莫遂非唯仰愧國靈實亦俯慙后土修短命也夫復何言身殁後乞𦵏河内州縣之東鄉依古墓而不墳足藏髪齒而已庶魂而有知猶希結草之報時制南人入國者皆葬桑乾曄等申遺意詔許之贈安南將軍荆州刺史諡穆侯吏人及將士共於墓所起佛寺圖慧龍及僧彬象讚之吕元伯感全宥之恩留守墓側終身不去子寳興襲爵寳興少孤事母至孝尚書盧遐妻崔浩女也初寳興母及遐妻俱孕浩謂曰汝等將來所生皆我之自出可指腹為親及㛰浩為撰儀躬自監視謂諸客曰此家禮事宜盡其美及浩被誅盧遐後妻寳興從母也緣坐没官寳興亦逃避未㡬得出盧遐妻時官賜度河鎮髙車滑骨寳興盡賣貨産自出塞贖之以歸州辟治中從事别駕舉秀才皆不就閉門不交人事襲爵長社侯龍驤將軍卒子瓊襲爵瓊字世珍髙祖賜名焉太和九年為典寺令十六年降侯為伯髙祖納其長女為嬪拜前軍將軍并州太中正正始中為光州刺史有受納之響為中尉王顯所劾终得雪免神龜中除左將軍兖州刺史去州歸京多年沉滯所居在司空劉騰宅西騰雖勢傾朝野初不候之騰既權重吞并隣宅増廣舊居唯瓊終不肯與以此久見抑屈瓊女適范陽盧道亮不聼歸其夫家及女卒哀慟無已瓊仍𦵏之别所冡不即塞常於壙内哭泣久之乃掩當時深恠疑其穢行加以聾疾每見道俗乞丐無已造次見之令人笑愕道逢太保廣平王懐據鞍抗禮自言馬瘦懐即以誕馬并乘具與之嘗詣尚書令李崇騎馬至其黄閤見崇子世哲直問繼伯在否崇趨出瓊乃下崇儉而好以紙帖衣領瓊哂而掣去之崇小子青肫嘗盛服闕寵勢亦不足恨領軍元又使奴遺瓊馬并留奴王誦聞之笑曰東海之風於兹墜矣孝昌三年除鎮東將軍金紫光祿大夫中書令時瓊子遵業為黄門郎故有此授卒年七十四贈征北將軍中書監并州刺史自慧龍入國三世一身至瓊始有四子長子遵業風儀清秀渉歴經史位著作佐郎與司徒左長史崔鴻同撰起居注遷右軍將軍兼散騎常侍慰勞蠕蠕乃詣代京採拾遺文以補起居所闕與崔光安豐王延眀等參定服章及光為肅宗講孝經遵業預講延眀錄義並應詔作釋奠侍宴詩時人語曰英英濟濟王家兄弟轉司徒左長史黄門郎監典儀注遵業有譽當時與中書令陳郡袁翻尚書瑯邪王誦並領黄門郎號曰三哲時政歸門下世謂侍中黄門為小宰相而遵業從容恬素若處邱園嘗著穿角履好事者多毁新履以學之以胡太后臨朝天下方亂謀避地自求徐州太后曰王誦罷幽州始作黄門卿何乃欲徐州}
