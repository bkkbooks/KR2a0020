  - {type: variant, offset: 4190, length: 0, content: '', WYG: 徙都其孫即居於墓北柏谷塢延之前妻羅氏生子措措隨父入國又以淮南王女妻延之生道仁措推道仁為嫡襲父爵位至殿中尚書進爵西平公袁式字季祖陳郡陽夏人漢司徒滂之後父淵司馬昌明侍中式在南歴武陵王遵諮議參軍與司馬文思等歸姚興泰常二年歸國為上客賜爵陽夏子與司徒崔浩一面便盡國士之交是時朝儀典章悉出於浩浩以式愽於古事每所草創恒顧訪之性長者雖羈旅飃泊而清貧守度不失士節時人甚敬重之皆呼曰袁諮議延和三年衛大}
