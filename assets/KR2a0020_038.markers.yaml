  - {type: variant, offset: 3235, length: 1, content: 營, WYG: 興和三年卒贈車騎大將軍儀同三司齊州刺史諡曰清穆王慧龍自云太原晉陽人司馬徳宗尚書僕射愉之孫散騎侍郎緝之子也㓜聰慧愉以為諸孫之龍故名焉初劉裕㣲時愉不為禮及得志愉合家見誅慧龍年十四為沙門僧彬所匿百餘日將慧龍過江為津人所疑曰行意怱怱徬徨得非王氏諸子乎僧彬曰貧道從師有年止西岸今暫欲定省還期無逺此隨吾受業者何至如君言既濟遂西上江陵依叔祖忱故吏荆州前治中習辟疆時刺史魏詠之卒辟疆與江陵令羅脩前别駕劉期公土人王騰等謀舉兵推慧龍為盟主尅日襲州城而劉裕聞詠之卒亦懼江陵有變遣其弟道規為荆州衆遂不果羅脩將慧龍又與僧彬北詣襄陽司馬徳宗雍州刺史魯宗之資給慧龍送渡江遂自虎牢奔于姚興其自言也如此泰常二年姚泓滅慧龍歸國太宗引見與言慧龍請効力南討言終俯而流涕天子為之動容謂曰朕方混一車書席卷吳㑹卿情計如此豈不能相資以衆乎然亦未之用後拜洛城鎮將配兵三千人鎮金墉既拜十餘日太宗崩世祖初即位咸謂南人不宜委以師旅之任遂停前授初崔浩弟恬聞慧龍王氏子以女妻之浩既㛰姻及見慧龍曰信王家兒也王氏世齇鼻江東謂之齇王慧龍鼻大浩曰真貴種矣數向諸公稱其美司徒長孫嵩聞之不悦言於世祖以其嘆服南人則有訕鄙國化之意世祖怒召浩責之浩免冠陳謝得釋及魯宗之子軌奔姚興後歸國云慧龍是王愉家豎僧彬所通生也浩雖聞之以女之故成贊其族慧龍由是不調久之除樂安王範傅領并荆揚三}
