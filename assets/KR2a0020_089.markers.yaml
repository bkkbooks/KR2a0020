  - {type: variant, offset: 2567, length: 326, content: 公司州牧號太上秦公加九錫葬以殊禮給九旒鑾輅虎賁班劍百人前後部羽葆鼓吹轀輬車諡文宣公賜物三千段粟一千五百石又詔贈國珍祖父兄父兄下逮從子皆有封職持節就安定監護喪事靈太后迎太上君神柩還第與國珍俱葬贈襚一與國珍同及國珍神主入廟詔太常權給以軒懸之樂六佾之舞初國珍無男養兄真子僧洗為後後納趙平君生子祥祥字元吉襲封故事世襲例皆減邑唯祥獨得全封趙平君薨給東園祕器肅宗服小功服舉哀于東堂靈太后服齊衰期葬於太上君墓左不得祔合祥歷位殿中尚書中書監侍中改封東平郡公薨贈開府儀同三司雍州刺史諡曰孝景僧洗字湛輝封爰德縣公位中書監侍中改封濮陽郡公僧洗自永安後廢棄不預朝政天平四年薨詔給東園祕器贈太師太尉公錄尚書事雍州刺史諡曰孝真長子寧字惠歸襲國珍先爵改為臨涇伯後進為公歷岐涇二州刺史, WYG: ''}
