  - {type: variant, offset: 2894, length: 409, content: 諡曰孝穆女為清河王亶妃生孝靜皇帝武定初贈太師太尉公錄尚書事諡曰孝昭子虔字僧敬元叉之廢靈太后虔時為千牛備身與備身張車渠等謀殺叉事發叉殺車渠等虔坐遠徙靈太后反政徵為吏部郎中太后好以家人禮與親族宴戲虔常致諫由是後宴謔多不預焉出為涇州刺史封安陽縣侯興和三年以帝元舅超遷司空公薨贈太傅太尉公尚書僕射徐州刺史諡曰宣葬日百官會葬乘輿送於郭外子長粲李延寔字禧隴西人尚書僕射沖之長子性溫良少為太子舍人世宗初襲父爵清泉縣侯累遷左將軍光州刺史莊帝即位以元舅之尊超授侍中太保封濮陽郡王延寔以太保犯祖諱又以王爵非庶姓所宜抗表固辭徙封濮陽郡公改授太傅尋轉司徒公出為使持節侍中太傅錄尚書事青州刺史尒朱兆入洛乘輿幽縶以延寔外戚見害於州館出帝初歸葬洛陽贈使持節侍中太師太尉公錄尚書事都督雍州刺史諡曰孝懿長子彧字子文尚莊帝姊豐亭公主封東平郡公位侍中左光祿大夫中書監驃騎大將軍開府儀同三司廣州刺史彧任俠交遊輕薄無行尒朱榮之死也武毅之士皆彧所進孝靜初以罪棄市, WYG: ''}
