  - {type: variant, offset: 99, length: 330, content: 客禮賜奴婢牛馬綵帛遂納颺女是為文昭皇后生世宗颺卒景明初世宗追思舅氏徵肇兄弟等錄尚書事北海王詳等奏颺宜贈左光祿大夫賜爵勃海公諡曰敬其妻蓋氏宜追封清河郡君詔可又詔颺嫡孫猛襲勃海公爵封肇平原郡公肇弟顯澄城郡公三人同日受封始世宗未與舅氏相接將拜爵乃賜衣幘引見肇顯于華林都亭皆甚惶懼舉動失儀數日之間富貴赫弈是年咸陽王禧誅財物珍寶奴婢田宅多入高氏未幾肇為尚書左僕射領吏部冀州大中正尚世宗姑高平公主遷尚書令肇出自夷土時望輕之及在位居要留心百揆孜孜無倦世咸謂之為能世宗初六輔專政後以咸陽王禧無事構逆由是遂委信肇肇既無親族頗結朋黨附之者旬月超昇背之者陷以大罪以北海王詳位居其上構殺之又說世宗防衞諸王殆同囚禁時順皇后暴崩世議言肇為之皇子昌薨僉謂王顯失於醫療承肇意旨及京兆王愉出為冀, WYG: 勞舊爲秦}
