  - {type: variant, offset: 1448, length: 0, content: '', WYG: 與游明根高閭李沖入議律令親對御坐時有陳奏以積年之勞賜粟帛牛馬出爲立忠將軍齊州刺史建節歴本州宗鄉改觀而矯等彌妬毁之遵性不亷清在中書時每假歸山東必借備騾馬將從百餘屯逼民家求絲縑不滿意則詬罵不去彊相徴求旬月之間縑布千數邦邑苦之遵旣臨州本意未弭選召寮吏多所取納又其妻明氏家在齊州母弟舅甥共相憑屬爭求貨利嚴暴非理殺害甚多貪酷之響帝頗聞之及車駕幸鄴遵自州來朝會有赦宥遵臨還州請辭帝於行宫引見誚讓之遵自陳無負帝厲聲曰若無遷都赦必無高遵矣又卿非惟貪惏又虐於刑法謂何如濟隂王猶不免於法卿何人而爲此行自今宜自謹約還州仍不悛革齊州人孟僧振至洛訟遵詔廷尉少卿劉述窮鞫皆如所訴先是沙門道登過遵遵以道登荷寵於高祖多奉以貨深託仗之道登屢因言次申啓救遵帝不省納遂詔述賜遵死時遵子元榮詣洛訟寃猶恃道登不時還赴道登知事決方乃遣之遵恨其妻不與訣别處沐浴引椒而死元榮學尚有文才長於几案位}
