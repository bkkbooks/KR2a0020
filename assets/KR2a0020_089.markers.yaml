  - {type: variant, offset: 2012, length: 477, content: 守今秦太上君未有尊諡陵寢孤立即秦君名宜上終稱兼設掃衞以慰情典請上尊諡曰孝穆權置園邑三十戶立長丞奉守太后從之封國珍繼室梁氏為趙平郡君元叉妻拜為女侍中封新平郡君又徙封馮翊君國珍子祥妻長安縣公主即清河王懌女也國珍年雖篤老而雅敬佛法時事齋潔自強禮拜至於出入侍從猶能跨馬據鞍神龜元年四月七日步從所建佛像發第至閶闔門四五里八日又立觀像晚乃肯坐勞熱增甚因遂寢疾靈太后親侍藥膳十二日薨年八十給東園溫明祕器五時朝服各一具衣一襲贈布五千匹錢一百萬蠟千斤大鴻臚持節監護喪事太后還宮成服於九龍殿遂居九龍寢室肅宗服小功服舉哀於太極東堂又詔自始薨至七七皆為設千僧齋令七人出家百日設萬人齋二七人出家先是巫覡言將有凶勸令為厭勝之法國珍拒而不從云吉凶有定分唯修德以禳之臨死與太后訣云母子善治天下以萬人之心勿視大臣面也殷勤至於再三又及其子祥云我唯有一子死後勿如比來威抑之靈太后以其好戲時加威訓國珍故以為言始國珍欲就祖父西葬舊鄉後緣前世諸胡多在洛葬有終洛之心崔光嘗對太后前問國珍公萬年後為在此安厝為歸長安國珍言當陪葬天子山陵及病危太后請以後事竟言還安定語遂昏忽太后問清河王懌與崔光等議去留懌等, WYG: 使}
