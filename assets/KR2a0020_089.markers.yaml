  - {type: variant, offset: 1424, length: 1, content: 暉, WYG: 封汲郡公徵拜内都大官河西羌胡領部落反叛顯祖親征命洪之與侍中東郡王陸定總綂諸軍輿駕至并州詔洪之爲河西都將討山胡皆保險拒戰洪之築壘於石樓南白鷄原以對之諸將悉欲進攻洪之乃開以大信聽其復業胡人遂降顯祖嘉之遷拜尚書外都大官後爲使持節安南將軍秦益二州刺史至治設禁姧之制有帶刃行者罪與劫同輕重品格各有條章於是大饗州中豪傑長老示之法制乃夜密遣騎分部覆諸要路有犯禁者輒捉送州宣告斬決其中枉見殺害者百數赤葩渴郞羌深居山谷雖相羈縻王人罕到洪之芟山爲道廣十餘歩示以軍行之勢乃興軍臨其境山人驚駭洪之將數十騎至其里閭撫其妻子問其疾苦因資遺之衆羌喜悅求編課調所入十倍於常洪之}
