  - {type: variant, offset: 1770, length: 0, content: '', WYG: 東武城人也世家于滎陽潁川之間性猛酷少仁恕姧猾好利能事勢家初以秀才累遷南兗州刺史盜用官瓦贓汚狼籍爲御史中尉李平所糾免官後行豫州事尋即真坐遣子析戸分隷三縣廣占田宅藏匿官奴障吝陂葦侵盜公私爲御史中尉}
  - {type: variant, offset: 1770, length: 0, content: '', krp: 東武城人也世家于滎陽潁川之間性猛酷少仁恕姧猾好利能事勢家初以秀才累遷南兗州刺史盜用官瓦贓汚狼籍爲御史中尉李平所糾免官後行豫州事尋即真坐遣子析戸分隷三縣廣占田宅藏匿官奴障吝陂葦侵盜公私爲御史中尉}
  - {type: variant, offset: 1771, length: 1, content: 懌, WYG: 顯所彈免官後累遷平北將軍瀛州刺史貪暴安忍民庶患之嘗出獵州北單騎至於民村井有汲水婦人暹令飲馬因問曰崔瀛州何如婦人不知其暹也答曰百姓何罪得如此癩兒刺史暹黙然而去以不稱職被解還京武川鎭反詔暹爲都督𨽻大都督李崇討之違崇節度爲賊所敗單騎潛還禁於廷尉以女妓園田貨元义獲免建義初遇害於河隂贈司徒公冀州刺史追封武津縣公子瓉字紹珍位兼尚書左丞卒瓉妻莊帝妹也後封襄城長公主故特贈瓉冀州刺史子茂字祖昻襲祖爵酈道元字善長范陽人也青州刺史範之子}
