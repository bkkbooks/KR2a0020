  - {type: variant, offset: 759, length: 374, content: 相視直至闕下衰服號哭昇太極殿奉喪盡哀太尉高陽王先居西柏堂專決庶事與領軍于忠密欲除之潛備壯士直寢邢豹伊生等十餘人於舍人省下肇哭梓宮訖於百官前引入西廊清河王懌任城王澄及諸王等皆竊言目之肇入省壯士搤而拉殺之下詔暴其罪惡又云刑書未及便至自盡自餘親黨悉無追問削除職爵葬以士禮及昏乃於厠門出其尸歸家初肇西征行至函谷車軸中折從者皆以為不獲吉還也靈太后臨朝令特贈營州刺史永熙二年出帝贈使持節侍中中外諸軍事太師大丞相太尉公錄尚書事冀州刺史肇子植自中書侍郎為濟州刺史率州軍討破元愉別將有功當蒙封賞不受云家荷重恩為國致效是其常節何足以應進陟之報懇惻發於至誠歷青相朔四州刺史卒植頻莅五州皆清能著稱當時號為良刺史贈安北將軍冀州刺史肇長兄琨早卒襲颺封勃海郡公贈都督五州諸軍事鎮東大將軍冀州刺史詔其子猛嗣猛字豹兒尚長樂公主即世宗同母妹也拜駙馬都尉歷位中書令出為雍州刺史有能名入為, WYG: 憚豪貴}
