  - {type: variant, offset: 1438, length: 0, content: '', WYG: 大臣聽在家自裁洪之志性慷慨多所堪忍疹疾炙療艾炷圍將二寸首足十餘處一時俱下而言笑自若接賔不輟及臨自盡沐浴換衣防卒扶持將出却入遍遶家庭如是再三泣歎良久乃卧而引藥始洪之託爲元后兄公私自同外戚至此罪後高祖乃稍對百官辨其誣假而諸李猶善相視恩紀如親洪之始見元后計年爲兄及珍之等至洪之以元后素定長幼其呼拜坐皆如家人暮年數延􅂝之宴飲醉酣之後攜之時或言及本末洪之則起而加敬笑語自若富貴赫弈當舅戚之家遂棄宗專附珍之等後頗存振本屬而猶不顯然劉氏四}
