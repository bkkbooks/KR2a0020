  - {type: variant, offset: 1458, length: 0, content: '', WYG: 至高平鎮遇城飜被害遵弟次文雖無位宦而貲財巨萬遵每責其財又結憾於遵吉凶不相往反時論責之張赦提中山安喜人也性雄武有規畫初爲虎賁中郞時京畿盜魁自稱豹子虎子並善弓馬遂領逃連及諸畜牧者各爲部帥於靈丘鴈門間聚為劫害至乃斬人首射其口刺人臍引膓遶樹而共射之以爲戲笑其爲暴酷如此軍騎掩捕久弗能獲行者患焉赦提設防遏追窮之計宰司善之以赦提爲逐賊軍將乃求驍勇追之未幾而獲虎子豹子及其黨}
