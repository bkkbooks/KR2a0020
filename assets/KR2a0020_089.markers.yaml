  - {type: variant, offset: 1680, length: 0, content: '', WYG: 銓衡是司釐品庶物若狀與迹乖應抑而不受錄其實狀然後下寺依諡法準狀科上豈有捨其行迹外有所求去狀去稱將何所準檢祉以母老辭藩乃降手詔云卿綏撫有年聲實兼著安邊寧境實稱朝望及其殁也又加顯贈言祉誠著累朝效彰内外作牧岷區字萌之績驟聞詔册襃美無替倫望然君子使人器之義無求備德有數德優劣不同剛而能克亦爲德焉謹依諡法布德行剛曰景謂前議爲允司徒右長史張烈主簿李瑒刺稱按祉歴宦累朝當官允稱委捍西南邊隅靖遏準行易名奬誡攸在竊謂無虧體例尚書李韶又述奏以府寺爲允靈太后可其奏祉自當官不憚彊禦朝廷以爲剛斷時有檢覆每}
