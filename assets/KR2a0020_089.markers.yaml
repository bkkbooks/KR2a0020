  - {type: variant, offset: 1632, length: 0, content: '', WYG: 假平南將軍持節領歩騎三萬先驅趣涪未至世宗崩班師夜中引軍山有二徑軍人迷而失路祉便斬隊副楊明達梟首路側爲中尉元昭所劾會赦免後加平北將軍未拜而卒贈安東將軍兗州刺史太常少卿元端博士劉臺龍議諡曰祉志存埋輪不避彊禦及贊戎律熊武斯裁仗節撫藩邊夷識德化沾殊類襁負懷仁謹依諡法布德行剛曰景宜諡爲景侍中侯剛給事黄門侍郞元纂等駮曰臣聞惟名與器弗可妄假定諡準行必當其迹按祉志性急酷所在過威布德罕聞暴聲屢發而禮官虛述諡之爲景非直失於一人實毁朝則請還付外準行更量虛實}
