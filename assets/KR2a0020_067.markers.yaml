  - {type: variant, offset: 607, length: 299, content: 久壯制第宅美飾車馬僕妾衣綾綺土木被文繡僭度違衷者衆矣古先哲王之為制也自天子以至公卿下及抱關擊柝其宮室車服各有差品小不得踰大賤不得踰貴夫然故上下序而人志定今時浮華相競情無常守大為消功之物巨制費力之事豈不謬哉消功者錦繡彫文是也費力者廣宅高宇壯制麗飾是也其妨男業害女工者焉可勝言哉漢文時賈誼上疏云今之王政可為長太息者六此即是其一也夫上之所好下必從之故越王好勇而士多輕死楚靈好瘠而國有飢人今二聖躬行儉素詔令殷勤而百姓之奢猶未革者豈楚越之人易變如彼大魏之士難化如此蓋朝制弗宣人未見德使之然耳臣愚以為第宅車服自百官以至于庶人宜為其等制使貴不逼賤卑不僭高不可以稱其侈意用違經典今或者以為習俗日久不可卒革臣謹言古人, WYG: ''}
