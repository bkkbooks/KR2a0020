  - {type: variant, offset: 149, length: 0, content: '', WYG: 後靈太后廢遂寢二年八月靈太后幸永寕寺躬登九層佛圖光表諫曰伏見親昇上級佇蹕表刹之下祗心圖搆誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可按禮記為人子者不登髙不臨深古賢有言䇿畫失於廟堂大人蹷於中野漢書上欲西馳下峻坂袁盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚奈髙廟太后何又云上酎祭廟出欲御樓船薛廣徳免冠頓首曰宜從橋陛下不聼臣臣以血汙車輪樂正子春曾參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寜累級閣道囬隘以柔懦之寳體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齋七日致齋三日然後入祀神明可得而通今雖容像未建已為神明之宅方加雕繢飾麗丹青人心所衹鋭觀滋甚登者既衆異懐若面縱一人之身恒盡誠潔豈左右闕妾各竭䖍仰不可獨昇必有扈侍懼或忘慎非飲酒茹葷而已昨風霾暴興紅塵四塞白日晝昬特可驚畏春秋宋衞陳鄭同日而災伯姬待姆致焚如之禍去皇興中青州七級亦號崇壮夜為上火所焚雖梓慎裨竈之明尚不能逆剋端兆變起倉卒預偹不虞天道幽逺自昔深誡墟墓必哀廟社致敬望塋悽慟入門聳慄適墓不登隴未有昇陟之事傳云公既視朔遂登觀臺其下無天地先祖之神故可得而乘也内經寳塔髙華堪室千萬唯盛言香花禮拜豈有登上之義獨稱三寳階從上而下人天交接兩得相見超世竒絶莫可而擬恭敬拜跽悉在下級逺存矚眺周見山河因其所眄增發嬉笑未能級級加䖍步步崇慎徒使京邑士女公私湊集上行下從理勢以然迄於無竆豈長世競慕一登而可抑斷哉盖心信為本形敬乃末重實輕根靖寔躁君恭已正南面者豈月乘峻極旬御層階今經始既就子來自勸基構已興雕絢漸起紫山華䑓即其宫也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂汙永歸清寂下竭肅穆之誠上展瞻仰之敬勿踐勿履顯固億齡融教闡悟不其博歟九月靈太后幸嵩髙光上表諌曰伏聞明后當親幸嵩髙往還累宿鑾遊近旬存省民物誠足為善雖漸農隙所獲棲畝飢貧之家指為珠玉遺秉滯穟莫不寳惜步騎萬餘來去經踐駕輦雜遝競騖交馳縱加禁護猶有侵耗士女老㓜㣲足傷心秋末久旱塵壤委深風霾一起紅埃四塞轅闗峭嶮山路危狹聖駕清道當務萬安乘履澗壑䝉犯霜露出入半旬途越數百飄曝彌日仰虧和豫七廟上靈容或未許億兆下心寔用悚慄且藏蟄節逺昆蟲布列蠉蠕之類盈於川原車馬輾蹈必有類殺慈矜好生應垂未測誠恐悠悠之議将謂為福興罪厮役困於負檐爪牙窘於賃乗供頓候迎公私擾費厨兵幕士衣履敗穿晝暄夜凄罔所覆藉監帥驅捶泣呼相望霜旱為災所在不稔饑饉薦臻方成儉敝為民父母所宜存恤靖以撫之猶懼離散乃於收斂初辰致此行舉自近及逺交興怨嗟伏願逺覽虞舜恭已無為近遵老易不出戶牖罷勞形之遊息傷財之駕動循典防納諸軌儀委司責成寄之耳目人神幸甚朝野忭悅靈太后不從正光元年冬賜光几杖衣服二年春肅宗親釋奠國學光執經南面百寮陪列司徒京兆王繼頻上表以位讓光夏四月以光為司徒侍中國子祭酒領著作如故光表固辭歴年終不肯受八月獲秃鶖鳥於宫内詔以示光光表曰䝉示十四日所得大鳥此即詩所謂有鶖在梁觧云秃鶖也貪惡之鳥野澤所育不應入殿庭昔魏氏黄初中有鵜鶘集於靈芝池文帝下詔以曹恭公逺君子近小人博求賢俊太尉華歆由此遜位而讓管寜者也臣聞野物入舍古人以為不善是以張臶惡鵀賈誼忌鵩鵜鶘蹔集而去前王猶為至誡況今親入宫禁為人所獲方被畜飬晏然不以為懼準諸往義信有殊矣且饕餮之禽必資魚肉菽麥稻梁時或餐啄一食之費容過斤鎰今春夏陽旱穀糴稍貴竆窘之家時有菜色陛下為民父母撫之如傷豈可棄人飬鳥留意於醜形惡聲哉衞侯好鶴曹伯爱鴈身死國滅可為寒心陛下學通春秋親覽前事何得口詠其言行違其道誠願逺師殷宗近法魏祖修徳延賢消災集􅂟放無用之物委之川澤取樂琴書頤飬神性肅宗覽表大悅即棄之池澤詔召光與安豐王延明議定服章三年六月詔光乘步挽至東西上閣九月進位太保光又固辭光年耆多務疾病稍增而自彊不已常在著作疾篤不歸四年十月肅宗親臨省疾詔斷賔客中使相望為止聲樂罷諸遊眺拜長子勵為齊州刺史十一月疾甚勑子姪等曰諦聼吾言聞曾子有云人之将死其言也善啓予手啓予足而今而後吾知免夫吾荷先帝厚恩位至於此史功不成殁有遺恨汝等以吾之故並得名位勉之勉之以死報國修短命也夫復何言速可送我還宅氣力雖㣲神明不亂至第而薨年七十三肅宗聞而悲泣中使相尋詔給東園温明祕器朝服一具衣一襲錢六十萬布一千匹蠟四百斤大鴻臚監護喪事車駕親臨撫屍慟哭御輦還宫流涕於路為減常膳言則追傷每至光坐誦讀之處未曾不改容悽悼五年正月贈太傅領尚書令驃騎大将軍開府冀州刺史侍中如故又勑加後部鼓吹班劔依太保廣陽王故事諡文宣公肅宗祖䘮建春門外望轜哀感儒者榮之初光太和中依宫商角徴羽本音而為五韻詩以贈李彪彪為十二次詩以報光光又為百三}
