  - {type: variant, offset: 221, length: 8, content: 至于太和崔浩高允, WYG: 考格三年成一考一考轉一階貴賤内外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如黄龔儒學如王鄭史才如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一槩不曾甄别琴瑟不調改而更張雖明㫖已行猶宜消息世宗不從三年鴻以父憂觧任甘露降其廬前樹十一月世宗以本官徵鴻四年復有甘露降其京兆宅之庭樹復加中堅将軍常侍領郎如故遷中散大夫髙陽王友仍領郎中其年為司徒長史正光元年加前将軍修髙祖世宗起居注光撰魏史徒有卷目初未考正闕略尤多每云此史㑹非我世所成但須記錄時事以待後人臨薨言鴻於肅宗五年正月詔鴻以本官修緝國史孝昌初拜給事黄門侍郎尋加散騎常侍齊州大中正鴻在史甫爾未有所就尋卒贈鎮東将軍度支尚書青州刺史鴻弱冠便有}
