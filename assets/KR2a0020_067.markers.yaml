  - {type: variant, offset: 1248, length: 236, content: 傳曰太子奉冢嫡之粢盛然則祭亡主則宗廟無所饗冢嫡廢則神器無所傳聖賢知其如此故垂誥以為長世之法昔姬王得斯道也故恢崇儒術以訓世嫡世嫡於是乎習成懿德用大協於黎蒸是以世統生人載祀八百逮嬴氏之君於秦也殆棄德政坑焚儒典弗以義方教厥冢子於是習成凶德肆虐以臨黔首是以饗年不永二世而亡亡之與興其道在於師傅師傅之損益可得而言益者周公傅成王教以孝仁禮義逐去邪人不使見惡人選天下之端士孝悌博聞有道術者以為衞翼衞翼良成王正周道之所以長久也損者趙高傅胡亥教以刑戮斬劓及夷人族逐去正人不得見善士諂佞讒賊者, WYG: 元後謀反事發逃竄會赦免尋}
