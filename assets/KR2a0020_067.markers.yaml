  - {type: variant, offset: 126, length: 0, content: '', WYG: 崔道固共拒國軍慕容白曜之平三齊光年十七隨父徙代家貧好學晝耕夜誦傭書以飬父母太和六年拜中書}
  - {type: variant, offset: 126, length: 0, content: '', krp: 崔道固共拒國軍慕容白曜之平三齊光年十七隨父徙代家貧好學晝耕夜誦傭書以飬父母太和六年拜中書}
  - {type: variant, offset: 127, length: 1, content: 陵, WYG: 士轉著作郎與祕書丞李彪參撰國書遷中書侍郎給事黄門侍郎甚為髙祖所知待常曰孝伯之才浩浩如黄河東注固今日之文宗也以參賛遷都之謀賜爵朝陽子拜散騎常侍黄門著作如故又兼太子少傅尋以本官兼侍中使持節為陜西大使廵方省察所經述叙古事因而賦詩三十八篇還仍兼侍中以謀謨之功進爵為伯光少有大度喜怒不見於色有毁惡之者必善言以報之雖見誣謗終不自申曲直皇興初有同郡二人並被掠為奴婢後詣光求哀光乃以二口贖免髙祖聞而嘉之雖處機近曾不留心文案唯從容論議參賛大政而已髙祖每對群臣曰以}
  - {type: page-break, offset: 127, content: '', id: KR2a0020_WYG_067-2a, image: WYG0262/WYG0262-0018a.png}
  - {type: variant, offset: 127, length: 1, content: 陵, krp: 士轉著作郎與祕書丞李彪參撰國書遷中書侍郎給事黄門侍郎甚為髙祖所知待常曰孝伯之才浩浩如黄河東注固今日之文宗也以參賛遷都之謀賜爵朝陽子拜散騎常侍黄門著作如故又兼太子少傅尋以本官兼侍中使持節為陜西大使廵方省察所經述叙古事因而賦詩三十八篇還仍兼侍中以謀謨之功進爵為伯光少有大度喜怒不見於色有毁惡之者必善言以報之雖見誣謗終不自申曲直皇興初有同郡二人並被掠為奴婢後詣光求哀光乃以二口贖免髙祖聞而嘉之雖處機近曾不留心文案唯從容論議參賛大政而已髙祖每對群臣曰以}
  - {type: variant, offset: 129, length: 0, content: '', WYG: 光之髙才大量若無意外咎譴二十年後當作司空其見重如是又從駕破陳顯達世宗即位正除侍中初光與李彪共撰國書太和之末彪觧著作專以史事任光彪尋以罪廢世宗居諒闇彪上表求成魏書詔許之彪遂以白衣於祕書省著述光雖領史官以彪意在專功表觧侍中著作以讓彪世宗不許遷太常卿領齊州大中正正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙邕以問光光表答曰臣謹按漢書五行志宣帝黄龍元年未央殿路軨中雌雞化為雄毛變而不鳴不將無距元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角劉向以為雞者小畜主司時起居小臣執事為政之象也言小臣将乗君之威以害政事指石顯也竟寜元年石顯伏辜此其效也靈帝光和元年南宫寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡邕邕對曰貌之不恭則有雞禍臣竊推之頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黄巾賊遂破壊四方疲於賦役民多叛者上不改政遂至天下大亂今之雞狀雖與漢不同而其應頗相類矣向邕並博達之士考物驗事信而有證誠可畏也臣以邕言推之翅足衆多亦群下相扇助之象雛而未大脚羽差小亦其勢尚㣲易制御也臣聞災異之見皆所以示吉凶明君覩之而懼乃能招福闇主視之彌慢所用致禍詩書春秋秦漢之事多矣此陛下所觀者也今或有自賤而貴闗預政事殆亦前代君房之匹比者南境死亡千計白骨横野存有酷恨之痛殁為怨傷之魂義陽屯師盛夏未返荆蠻狡猾征人淹次東州轉輸往多無還百姓困窮絞縊以殞北方霜降蠶婦輟事群生憔悴莫甚於今此亦賈誼哭歎谷永切諫之時司寇行戮君為之不舉陛下為民父母所宜矜恤國重戎戰用兵猶火内外怨敝易以亂離陛下縱欲忽天下豈不仰念太祖取之艱難先帝經營劬勞也誠願陛下留聰明之}
