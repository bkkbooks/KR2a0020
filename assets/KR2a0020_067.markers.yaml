  - {type: variant, offset: 185, length: 1, content: 教, WYG: 監讓汝南王悅為太常讓劉芳為少傅讓元暐穆紹甄琛為國子祭酒讓清河王懌任城王澄為車騎儀同讓江陽王繼又讓靈太后父胡國珍皆顧望時情議者以為矯飾崇信佛法禮拜讀誦老而逾甚終日怡怡未曾恚忿曾於門下省書坐讀經有鴿飛集膝前遂入於懐縁臂上肩久之乃去道俗賛詠詩頌者數十人每為沙門朝貴請講維摩十地經聼者常數百人即為二經義疏三十餘卷識者知其疎略以貴重為後坐疑於講次凡所為詩賦銘賛誄頌表啓數百篇五十餘卷别有集光十一子勵朂勔勸劼勊勍劬􅀈勦勉勵字彦徳器}
