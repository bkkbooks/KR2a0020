  - {type: variant, offset: 3911, length: 397, content: 久我皇孝性自天追慕罔極故有今者喪除之議去三月晦朝臣始除衰裳猶以素服從事裴謝在此固應具此我今辭樂想卿無怪繪答言辭樂之事向以不異請問魏朝喪禮竟何所依彪曰高宗三年孝文踰月今聖上追鞠育之深恩感慈訓之厚德執於殷漢之間可謂得禮之變繪復問若欲遵古何為不終三年彪曰萬機不可久曠故割至慕俯從羣議服變不異三年而限同一期可謂亡禮之禮繪言汰哉叔氏專以禮許人彪曰聖朝自為曠代之制何關許人繪言百官總己聽於冢宰萬機何慮於曠彪曰我聞載籍五帝之臣臣不若君故君親攬其事三王君臣智等故共理機務五霸臣過於君故事決於下我朝官司皆五帝之臣主上親攬蓋遠軌軒唐彪將還賾親謂曰卿前使還日賦阮詩云但願長閑暇後歲復來遊果如今日卿此還也復有來理否彪答言使臣請重賦阮詩曰宴衍清都中一去永矣哉賾惘然曰清都可爾一去何事觀卿此言似成長闊朕當以殊禮相送賾遂親至琅邪城登山臨水命羣臣賦詩以送別其見重如此彪前後六度銜命南人奇其謇諤後車駕南征假彪冠軍將軍東道副將尋假, WYG: 老拜}
