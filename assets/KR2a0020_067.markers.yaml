  - {type: variant, offset: 279, length: 0, content: '', WYG: 帝王之興也雖誕應圖籙然必有驅除葢所以翦彼厭政成此樂推故戰國紛紜年過十紀而漢祖夷殄群豪開四百之業歴文景之懐柔蠻夏世宗之奮揚威武始得涼朔同文牂越一軌於是談遷感漢徳之盛痛諸史放絶乃鈐括舊書著成太史所謂緝兹人事光彼天時之義也}
