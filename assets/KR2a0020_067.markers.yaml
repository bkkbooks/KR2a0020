  - {type: variant, offset: 130, length: 0, content: '', WYG: 警天地之意禮處左右節其貴越往者鄧通董賢之盛愛之正所以害之又躬饗加罕宴宗或闕時應親肅郊廟延敬諸父檢訪四方務加休息爰發慈㫖撫賑貧瘼簡費山池減撤聲飲晝存政道夜以安身博採芻蕘進賢黜佞則兆庶幸甚妖弭􅂟進禎祥集矣世宗覽之大悅後數日而茹皓等並以罪失伏法於是禮光愈重加撫軍将軍二年八月光表曰去二十八日有物出於太極之西序勑以示臣臣按其形即荘子所謂蒸成菌者也又云朝菌不終晦朔雍門周所稱磨蕭斧而伐朝菌皆指言蒸氣鬱長非有根種柔脆之質凋殞速易不延旬月無擬斧斤又多生墟落穢濕之地罕起殿堂髙華之所今極宇崇麗牆築工密糞朽弗加沾濡不及而兹菌歘構厥狀扶疎誠足異也夫野木生朝野鳥入廟古人以為敗亡之象然懼災修徳者咸致休􅂟所謂家利而怪先國興而妖豫是故桑穀拱庭太戊以昌雊雉集鼎武丁用熙自比鴟鵲巢於廟殿梟鵩鳴於宫寢菌生賔階軒坐之正準諸往記信可為誡且東南未靜兵革不息郊甸之内大旱跨時民勞物悴莫此之甚承天子育者所宜矜恤伏願陛下追殷二宗感變之意側躬聳誠惟新聖道節夜飲之忻彊朝御之膳飬方冨之年保金玉之性則魏祚可以永隆皇夀等於山岳四年秋除中書令進號鎮東将軍永平元年秋将刑元愉妾李氏群官無敢言者勑光為詔光逡廵不作奏曰伏聞當刑元愉妾李加之屠割妖惑扇亂誠合此罪但外人竊云李今懐姙例待分産且臣尋諸舊典兼推近事戮至刳胎謂之虐刑桀紂之主乃行斯事君舉必書義無隐昧酷而乖法何以示後陛下春秋已長未有儲體皇子襁褓至有夭失臣之愚識知無不言乞停李獄以俟育孕世宗納之延昌元年春遷中書監侍中如故二年世宗幸東宫召光與黄門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣今當為太子師傅光起拜固辭詔不許即命肅宗出從者十餘人勑以光為傅之意令肅宗拜光光又拜辭不當受太子拜復不蒙許肅宗遂南面再拜詹事王顯啓請從太子拜於是宫臣畢拜光北面立不敢答拜唯西面拜謝而出於是賜光繡綵一百匹琛淵等各有差尋授太子少傅三年遷右光禄大夫侍中監如故四年正月世宗夜崩光與侍中領軍将軍于忠迎肅宗於東宫安撫内外光有力焉帝崩後二日廣平王懐扶疾入臨以母弟之親徑至太極西廡哀慟禁内呼侍中黄門領軍二衞云身欲上殿哭大行又湏入見主上諸人皆愕然相視無敢抗對者光獨攘衰振杖引漢光武初崩太尉趙憙横劔當階推下親王故事辭色甚厲聞者莫不稱善壮光理義有據懐聲淚俱止云侍中以古事裁我我不敢不服於是遂還頻遣左右致謝初永平四年以黄門郎孫惠蔚代光領著作惠蔚首尾五載無所厝意至是三月尚書令任城王澄表光宜還史任於是詔光還領著作四月遷特進五月以奉迎肅宗之功封光博平縣開國公食邑二千戸七月領國子祭酒八月詔光乗歩挽於雲龍門出入尋遷車騎大將軍儀同三司靈太后臨朝之後光累表遜位于忠擅權光依附之及忠稍被疎黜光并送章綬冠服茅土表至十餘上靈太后優答不許有司奏追于忠及光封邑熙平元年二月太師髙陽王雍等奏舉光授肅宗經初光有徳於靈太后語在于忠傳四月更封光平恩縣開國侯食邑一千戶以朝陽伯轉授第二子朂其月勑賜羊車一乘時靈太后臨朝每於後園親執弓矢光乃表上中古婦人文章因以致諫曰孔子云士志於道據於徳依於仁游於藝藝謂禮樂書數射御明前四業丈夫婦人所同修者若射御唯主男子事不及}
