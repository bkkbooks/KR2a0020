  - {type: variant, offset: 4613, length: 459, content: 觀綢繆恩眷繩直憲臺左加金璫右珥蟬冕闕東省宜感恩厲節忠以報德而竊名忝職身為違傲矜勢高亢公行僭逸坐輿禁省冒取官材輒駕乘黃無所憚懾肆志傲然愚聾視聽此而可忍誰不可懷臣輒集尚書已下令史已上并治書侍御史臣酈道元等於尚書都座以彪所犯罪狀告彪訊其虛實若或不知須訊部下彪答臣言事見在目實如所劾皆彪所知何須復召部下臣今請以見事免彪所居職付廷尉治獄沖又表曰臣與彪相識以來垂二十載彪始南使之時見其色厲辭辯才優學博臣之愚識謂是拔萃之一人及彪位宦升達參與言燕聞彪評章古今商略人物興言於侍筵之次啟論於衆英之中賞忠識正發言懇惻惟直是語辭無隱避雖復諸王之尊近侍之要至有是非多面抗折酷疾矯詐毒愆非違厲色正辭如鷹鸇之逐鳥雀懍懍然實似公清之操臣雖下才輒亦尚其梗概欽其正直微識其褊急之性而不以為瑕及其初登憲臺始居司直首復騶唱之儀肇正直繩之體當時識者僉以為難而彪秉志信行不避豪勢其所彈劾應弦而倒赫赫之威振於下國肅肅之稱著自京師天下改目貪暴斂手臣時見其所行信謂言行相符忠清內發然時有私於臣云其威暴者臣以直繩之官人所忌疾風謗之際易生音謠心不承信往年以河陽事曾與彪在領, WYG: 将}
