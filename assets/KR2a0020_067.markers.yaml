  - {type: variant, offset: 187, length: 0, content: '', WYG: 才行最有父風舉秀才中軍彭城王參軍祕書郎中以父光為著作固辭不拜歴員外郎騎侍郎太尉記室散騎侍郎以繼母憂去職神龜中除司空從事中郎正光二年拜中書侍郎領軍將軍元义為明堂大將以勵為長史與從兄鴻俱知名於世四年十月父光疾甚詔拜征虜将軍齊州刺史以父寢疾衣不觧帶及光薨肅宗每加存慰五年春光葬於本鄉又詔遣主書張文伯宣弔焉孝昌元年十二月詔除太尉長史仍為齊州大中正襲父爵建義初遇害河隂時年四十八贈侍中衞将軍儀同三司青州刺史子挹襲武定末太尉屬齊受禪爵例降挹弟損儀同開府主簿朂武定末征虜将軍安州刺史朝陽伯齊受禪例降勔字彦儒亦有父風司空記室通直散騎侍郎寜逺将軍清河太守帶槃陽鎮将為逆賊崔景安所害贈征虜将軍齊州刺史子權太尉參軍事劼武定中中書郎光弟敬友本州治中頗有受納御史案之乃與守者俱逃後除梁郡太守㑹遭所生母憂不拜敬友精心佛道晝夜誦經免䘮之後遂菜食終世恭寛接下修身厲節自景明已降頻歲不登飢寒請丐者皆取足而去又置逆旅於肅然山南大路之北設食以供行者延昌三年二月卒年五十九子鴻字彦鸞少好讀書}
