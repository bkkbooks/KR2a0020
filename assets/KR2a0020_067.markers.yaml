  - {type: variant, offset: 394, length: 212, content: 乏饗矣舉賢才以酬諮則多士盈朝矣開至誠以軌物則朝無佞人矣敦六順以教人則四門無凶人矣制冠服以明秩則典式復彰矣作雅樂以協人倫則人神交慶矣深慎罰以明刑則庶獄得衷矣薄服味以示約則儉德光昭矣單宮女以配魚眾則人無怨曠矣傾府藏以賑錫則大賚周渥矣省賦役以育人則編戶巷歌矣宣德澤以懷遠邇則華荒抃舞矣垂至德以暢幽顯則禎瑞效質矣生生得所事事惟新巍巍乎猶造物之曲成也然臣愚以為行儉之道猶自闕如何者今四人豪富之家習華既深敦樸情淺未識儉素之易長而行奢靡之, WYG: 勉彊}
