  - {type: variant, offset: 131, length: 1, content: 路, WYG: 古之賢妃烈媛母儀家國垂訓四海宣教九宗可秉道懐疑率遵仁禮是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通於神明和風溢於區宇因時暇豫清暑林園逺藐姑射眷言矍相弦矢所發必中正鵠威靈遐暢義震上下文武懾心左右悅目吾王不遊吾何以休不窺重仭安見富美天情沖謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章錄一帙其集具在内伏願以時披覽仰裨未聞息彎挾之勞納閑拱之泰頤精飬夀棲神翰林是秋靈太后頻幸王公第宅光表諌曰禮記云諸侯非問疾弔䘮而入諸臣之家是謂君臣為謔不言王后夫人明無適臣家之義夫人父母在有時歸寜親沒使卿大夫聘春秋紀陳宋齊之女並為周王后無適本國之事是制深於士大夫許嫁唁兄又義不得衞女思歸以禮自抑載馳竹竿所為作也漢上官皇后将廢昌邑霍光外祖也親為宰輔后猶御武帷以接群臣示男女之别國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流傳皆綴集以垂來詠昨軒駕頻出幸馮翊君任城王第雖漸中秋餘熱尚蒸衡蓋往還聖躬煩倦豐厨嘉醴罄竭時羞上夀弗限一觴方丈甘踰百品旦及日斜接對不憩非謂順時而遊奉飬有度縱雲輦崇涼御筵安暢左右僕侍衆過千百扶衞跋涉袍鉀在身蒙曝塵日渙汗流離致時飢渴餐飯不贍賃馬假乘交費錢帛昔人稱陛下甚樂臣等至苦惑其事也伏惟皇太后月靈炳曜坤儀挺茂誕育帝躬維興魏道徳踰文母仁邁和憙親以天至逺異莫間爱}
