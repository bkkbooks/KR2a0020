  - {type: variant, offset: 2971, length: 830, content: 大臣有罪皆自殺不受刑至孝武時稍復入獄良由孝文行之當時不為永制故耳伏惟聖德慈恵豈與漢文比隆哉今天下有道庶人不議之時臣安可陳瞽言於朝但恐萬世之後繼體之主有若漢武之事焉夫道貴長久所以樹之風聲也法尚不虧所以貽厥孫謀也焉得行恩當時而不著長世之制乎其六曰孝經稱父子之道天性書云孝乎惟孝友于兄弟二經之旨蓋明一體而同氣可共而不可離者也及其有罪罪不相及者乃君上之厚恩也至若有懼懼應相連者固自然之理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色宴安榮位遊從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也昔秦伯以楚人圍江素服而示懼宋仲子以失舉桓譚免冠而謝罪然則子弟之於父兄父兄之於子弟惟其情至豈與結盟相知者同年語其深淺哉二聖清簡風俗孝慈是先臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦厲凡薄使人知有所矣其七曰禮云臣有大喪君三年不呼其門此聖人緣情制禮以終孝子之情者也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮于虐秦殆皆泯矣漢初軍旅屢興未能遵古至宣帝時民當從軍屯者遭大父母父母死未滿三月皆弗徭役其朝臣喪制未有定聞至後漢元初中大臣有重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢而不行晉時鴻臚鄭默喪親固請終服武帝感其孝誠遂著令以為常聖魏之初撥亂返正未遑建終喪之制今四方無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懷竊有未盡伏見朝臣丁父憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂緌同節慶之醼傷人子之道虧天地之經愚謂如有遭大父母父母喪者皆聽終服若無其人有曠庶官者則優旨慰喻起令視事但綜司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆於禮事所宜行也如臣之言少有可採願付有司別為條制高祖覽而善之尋皆施行彪稍見禮遇加中壘將軍及文明太后崩羣臣請高祖公除高祖不許與彪往復語在禮志高祖詔曰歷觀古事求能非一或承藉微蔭著德當時或見拔幽陋流名後葉故毛遂起賤奮抗楚之辯苟有才能何必拘族也彪雖宿非清第本闕華資然識性嚴聰學博墳籍剛辯之才頗堪時用, WYG: ''}
