  - {type: variant, offset: 131, length: 1, content: 路, krp: 古之賢妃烈媛母儀家國垂訓四海宣教九宗可秉道懐疑率遵仁禮是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通於神明和風溢於區宇因時暇豫清暑林園逺藐姑射眷言矍相弦矢所發必中正鵠威靈遐暢義震上下文武懾心左右悅目吾王不遊吾何以休不窺重仭安見富美天情沖謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章錄一帙其集具在内伏願以時披覽仰裨未聞息彎挾之勞納閑拱之泰頤精飬夀棲神翰林是秋靈太后頻幸王公第宅光表諌曰禮記云諸侯非問疾弔䘮而入諸臣之家是謂君臣為謔不言王后夫人明無適臣家之義夫人父母在有時歸寜親沒使卿大夫聘春秋紀陳宋齊之女並為周王后無適本國之事是制深於士大夫許嫁唁兄又義不得衞女思歸以禮自抑載馳竹竿所為作也漢上官皇后将廢昌邑霍光外祖也親為宰輔后猶御武帷以接群臣示男女之别國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流傳皆綴集以垂來詠昨軒駕頻出幸馮翊君任城王第雖漸中秋餘熱尚蒸衡蓋往還聖躬煩倦豐厨嘉醴罄竭時羞上夀弗限一觴方丈甘踰百品旦及日斜接對不憩非謂順時而遊奉飬有度縱雲輦崇涼御筵安暢左右僕侍衆過千百扶衞跋涉袍鉀在身蒙曝塵日渙汗流離致時飢渴餐飯不贍賃馬假乘交費錢帛昔人稱陛下甚樂臣等至苦惑其事也伏惟皇太后月靈炳曜坤儀挺茂誕育帝躬維興魏道徳踰文母仁邁和憙親以天至逺異莫間爱}
  - {type: variant, offset: 133, length: 1, content: 冀, WYG: 真固非俟虚隆紆屈鑾駕降臨闉里榮光帝京士女藻悅白首之耋欣遇犧年青衿之童慶屬唐日千載之所難一朝之為易非至明超古忘驕釋吝孰能若斯者哉魏元以來莫正斯美興居出入自當坦然豈同往嫌曲有矯避但帝族方衍勲貴增遷祗請遂多將成彛式陛下遵酌前王貽厥後矩天下為公億兆已任專薦郊廟止決大政輔飬神和簡息遊幸以徳為車以樂為御考仁聖之風習治國之道則率土屬頼含生仰悅矣臣過荷恩榮所知必盡嘿嘿唯唯愚竊未敢輕陳狂瞽分貽憲坐神龜元年夏光表曰詩稱蔽芾甘棠勿翦勿伐召伯所茇又云雖無老成人尚有典刑傳曰思其人猶爱其樹況用其道不恤其人是以書始稽古易本山火觀於天文以察時變觀於人文以化成天下孟子闕實匡張訓説安世記篋於汾南伯山抱卷於河右元始孤論充漢帝之坐孟皇片字懸魏王之帳前哲之寳重墳籍珍爱分猶若此之至也矧廼聖典鴻經炳勒金石理為國楷義成家範迹實世模事則人軌千載之格言百王之盛烈而令焚荒汙毁積榛棘而弗掃為鼯鼬之所栖宿童豎之所登踞者哉誠可為痛心疾首拊膺扼腕伏惟皇帝陛下孝敬日休自天縱睿垂心初學儒業方熙皇太后欽明慈淑臨制統化崇道重教留神翰林将披雲臺而問禮拂麟閣以招賢誠宜逺開闕里清彼孔堂而使近在城闉面接宫廟舊校為墟子衿永替豈所謂建國君民教學為先京邑翼翼四方是則也尋石經之作起自炎劉繼以曹氏典論初乃三百餘載計末向二十紀矣昔來雖屢經戎亂猶未大崩侵如聞往者刺史臨州多構圖寺道俗諸用稍有發掘基蹗泥灰或出於此皇都始遷尚可補復軍國務殷遂不存檢官私顯隐漸加剥撤播麥納菽秋春}
