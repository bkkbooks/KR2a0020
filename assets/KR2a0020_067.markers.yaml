  - {type: variant, offset: 135, length: 5, content: 聞彪名而詣, WYG: 因闕生蒿杞時致火燎由是經石彌減文字增缺職忝胄教參掌經訓不能繕修頽墜興復生業倍深慙耻今求遣國子博士一人堪任幹事者專主周視驅禁田牧制其踐穢料閱碑牒所失次第量厥補綴詔曰此乃學者}
