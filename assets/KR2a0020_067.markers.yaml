  - {type: variant, offset: 5073, length: 1400, content: 府共太尉司空及領軍諸卿等集閱廷尉所問囚徒時有人訴枉者二公及臣少欲聽採語理未盡彪便振怒東坐攘袂揮赫口稱賊奴叱吒左右高聲大呼云南臺中取我木手去撘奴肋折雖有此言終竟不取即言南臺所問唯恐枉活終無枉死但可依此時諸人以所枉至重有首實者多又心難彪遂各默爾因緣此事臣遂心疑有濫審加情察知其威虐猶未體其採訪之由訊檢之狀商略而言酷急小罪肅禁為大會而言之猶謂益多損少故懷寢所疑不以申徹實失為臣知無不聞之義及去年大駕南行以來彪兼尚書日夕共事始乃知其言與行舛是己非人專恣無忌尊身忽物安己凌上以身作之過深劾他人己方事人好人佞己聽其言同振古忠恕之賢校其行是天下佞暴之賊臣與任城卑躬曲己若順弟之奉暴兄其所欲者事雖非理無不屈從依事求實悉有成驗如臣列得實宜殛彪於有北以除姦矯之亂政如臣無證宜投臣於四裔以息青蠅之白黑高祖在懸瓠覽表歎愕曰何意留京如此也有司處彪大辟高祖恕之除名而已彪尋歸本鄉高祖自懸瓠北幸鄴彪拜迎於鄴南高祖曰朕之期卿每以貞松為志歲寒為心卿應報國盡身為用而近見彈文殊乖所以卿罹此譴為朕與卿為宰事與卿為卿自取彪對曰臣愆由己至罪自身招實非陛下橫與臣罪又非宰事無辜濫臣臣罪既如此宜伏東皐之下不應遠點屬車之塵但伏承聖躬不豫臣肝膽塗地是以敢至非謝罪而來高祖納宋弁言將復採用會留臺表言彪與御史賈尚往窮庶人恂事理有誣抑奏請收彪彪自言事枉高祖明彪無此遣左右慰勉之聽以牛車散載送之洛陽會赦得免高祖崩世宗踐祚彪自託於王肅又與邢巒詩書往來迭相稱重因論求復舊職修史官之事肅等許為左右彪乃表曰臣聞龍圖出而皇道明龜書見而帝德昶斯實冥中之書契也自瑞官文而卑高陳民師建而賤貴序此乃人間之繩式也是以唐典篆欽明之冊虞書銘慎徽之篇傳著夏氏之箴詩錄商家之頌斯皆國史明乎得失之迹也逮于周姬鑒乎二代文王開之以兩經公旦申之以六聯郁乎其文典章大略也故觀雅頌識文武之丕烈察歌音辨周公之至孝是以季札聽風而知始基聽頌而識盛德至若尼父之別魯籍丘明之辨孔志可謂婉而成章盡而不樜者矣自餘乘志之比其亦有趣焉暨史班之錄乃文窮於秦漢事盡於哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類三代炎崇道冠來事降及華馬陳干咸有放焉四敷贊弗遠不可力致豈虛也哉其餘率見而書覩事而作者多矣尋其本末可往來焉唯我皇魏之奄有中華也歲越百齡年幾十紀太祖以弗違開基武皇以奉時拓業虎嘯域中龍飛宇外小往大來品物咸亨自茲以降世濟其光史官錄未充其盛加以東觀中圮冊勳有闕美隨日落善因月稀故諺曰一日不書百事荒蕪至于太和之十一年先帝先后遠惟景業綿綿休烈若不恢史闡錄懼上業茂功始有缺矣於是召名儒博達之士充麟閣之選于時忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓高祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢制作於此者恐閨門既異出入生疑弦柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢簡牘弗張其於書功錄美不其闕歟伏惟孝文皇帝承天地之寶崇祖宗之業景功未就奄焉崩殞凡百黎萌若無天地賴遇陛下體明叡之真應保合之量恢大明以燭物履靜恭以安邦天清其氣地樂其靜不愆不忘率由舊章可謂重明疊聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理於有象盡性於衆變可謂日月出矣無幽不燭也記曰善流者欲以繼其行善歌者欲人繼其聲故傳曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖達今王之懿美洞鑒準之前代其聽靡悔也時哉時哉可不光昭哉合德二儀者先皇之陶鈞也, WYG: ''}
