  - {type: variant, offset: 4384, length: 228, content: 綏慰事寧還京除散騎常侍仍領御史中尉解著作事高祖宴羣臣於流化池謂僕射李沖曰崔光之博李彪之直是我國家得賢之基車駕南伐彪兼度支尚書與僕射李沖任城王等參理留臺事彪素性剛豪與沖等意議乖異遂形於聲色殊無降下之心自謂身為法官莫能糾劾己者遂多專恣沖積其前後罪過乃於尚書省禁止彪上表曰臣聞範國匡人光化昇治輿服典章理無暫失故晉文功建九合猶見抑於請隧季氏藉政三世尚受譏於璵璠固知名器之重不可以妄假先王既憲章於古陛下又經綸於今用能車服有叙禮物無墜案臣彪昔於凡品特以才拔等望清華司文, WYG: 征}
