  - {type: variant, offset: 6474, length: 1251, content: 明日月者先皇之洞照也慮周四時者先皇之茂功也合契鬼神者先皇之玄燭也遷都改邑者先皇之達也變是協和者先皇之鑒也思同書軌者先皇之遠也守在四夷者先皇之略也海外有截者先皇之威也禮田岐陽者先皇之義也張樂岱郊者先皇之仁也鑾幸幽漠者先皇之智也燮伐南荊者先皇之禮也升中告成者先皇之肅也親虔宗社者先皇之敬也袞實無闕者先皇之充也開物成務者先皇之貞也觀乎人文者先皇之蘊也革弊創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功二十加以謙尊而光為而弗有可謂四三皇而六五帝矣誠宜功書於竹素聲播於金石臣竊謂史官之達者大則與日月齊明小則與四時並茂其大者孔子左丘是也小者史遷班固是也故能聲流於無窮義昭於來裔是以金石可滅而流風不泯者其唯載籍乎諺曰相門有相將門有將斯不唯其性蓋言習之所得也竊謂天文之官太史之職如有其人宜其世矣故尚書稱羲和世掌天地之官張衡賦曰學乎舊史氏斯蓋世傳之義也若夫良冶之子善知為裘良弓之子善知為箕物豈有定習貫則知耳所以言及此者史職不修事多淪曠天人之際不可須臾闕載也是以談遷世事而功立彪固世事而名成此乃前鑒之軌轍後鏡之蓍龜也然前代史官之不終業者有之皆陵遲之世不能容善是以平子去史而成賦伯喈違閣而就志近僭晉之世有佐郎王隱為著作虞預所毀亡官在家晝則樵薪供爨夜則觀文屬綴集成晉書存一代之事司馬紹敕尚書唯給筆札而已國之大籍成於私家末世之弊乃至如此史官之不遇時也今大魏之史職則身貴祿則親榮優哉游哉式穀爾休矣而典謨弗恢者其有以也而故著作漁陽傅毗北平陽尼河門邢產廣平宋弁昌黎韓顯宗等並以文才見舉注述是同皆登年不永弗終茂績前著作程靈虬同時應舉共掌此務今從他職官非所司唯崔光一人雖不移任然侍官兩兼故載述致闕臣聞載籍之興由於大業雅頌垂薦起於德美雖時有文質史有備略然歷世相仍不改此度也昔史談誡其子遷曰當世有美而不書汝之罪也是以久而見美孔明在蜀不以史官留意是以久而受譏取之深衷史談之志賢亮遠矣書稱無曠庶官詩有職思其憂臣雖今非所司然昔忝斯任故不以草茅自疏敢言及於此語曰患為之者不必知知之者不得為臣誠不知強欲為之耳竊尋先朝賜臣名彪者遠則擬漢史之叔皮近則準晉史之紹統推名求義欲罷不能荷恩佩澤死而後已今求都下乞一靜處綜理國籍以終前志官給事力以充所須雖不能光啟大錄庶不為飽食終日耳近則期月可就遠也三年有成正本蘊之麟閣副貳藏之名山時司空北海王詳尚書令王肅以其無祿頗相賑餉遂在祕書省同王隱故事白衣修史世宗親政崔光表曰伏見前御史中尉臣李彪夙懷美意創刊魏典臣昔為彪所致與之同業積年其志力貞強考述無倦督勸羣僚注綴略舉雖頃來契闊多所廢離近蒙收起還綜厥事老而彌厲史才日新若克復舊職專功不殆必能昭明春秋闡成皇籍既先帝厚委宿歷高班纖負微愆應從滌洗愚謂宜申以常伯正綰著作停其外役展其內思研積歲月紀冊必就鴻聲巨迹蔚乎有章盛軌懋詠鑠焉無泯矣世宗不許詔彪兼通直散騎常侍行汾州事非彪好也固請不行有司切遣之會遘疾累旬景明二年秋卒於洛陽年五十八始彪為中尉號為嚴酷以姦款難得乃為木手擊其脇腋氣絕而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪之病也體上往往瘡潰痛毒備極詔賜帛一百五十匹贈鎮遠將軍汾, WYG: ''}
