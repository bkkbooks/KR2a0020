  - {type: variant, offset: 1761, length: 990, content: 之日年尚幼沖情未能專既臨萬機不遑溫習今而思之豈唯予咎抑亦師傅之不勤尚書李訢免冠而謝此則近日之可鑒也伏惟太皇太后翼贊高宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬之躋及儲宮誕育復親撫誥日省月課實勞神慮今誠宜準古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈畜倉廩故堯湯水旱人無菜色者蓋由備之有漸積之有素暨于漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畝不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農相切若此頃年山東饑去歲京師儉內外人庶出入就豐既廢營產疲而乃達又於國體實有虛損若先多積穀安而給之豈有驅督老弱餬口千里之外以今況古誠可懼也臣以為宜析州郡常調九分之二京都度支歲用之餘各立官司年豐糴積於倉時儉則加私之二糶之於人如此民必力田以買官絹又務貯財以取官粟年登則常積歲凶則直給又別立農官取州郡戶十分之一以為屯民相水陸之宜料頃畝之數以贓贖雜物餘財市牛科給令其肆力一夫之田歲責六十斛蠲其正課并征戍雜役行此二事數年之中則穀積而人足雖災不為害臣又聞前代明主皆務懷遠人禮賢引滯故漢高過趙求樂毅之胄晉武廓定旌吳蜀之彥臣謂宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義二可以懷江漢歸有道之情其四曰昔帝舜命咎繇惟刑之恤周公誥成王勿誤于庶獄斯皆君臣相誡重刑之至也今二聖哀矜罪辜小大二情讞決之日多從降恕時不得已必垂惻隱雖前王之勤聽肆赦亦如斯而已至若行刑犯時愚臣竊所未安漢制舊斷獄報重常盡季冬至孝章時改盡十月以育三微後歲旱論者以十月斷獄陰氣微陽氣泄以故致旱事下公卿尚書陳寵議冬至陽氣始萌故十一月有射干芸荔之應周以為春十二月陽氣上通雉雊雞乳殷以為春十三月陽氣已至蟄蟲皆震夏以為春三微成著以通三統三統之月斷獄流血是不稽天意也月令仲冬之月身欲寧事欲靜以起隆怒不可謂寧以行大刑不可謂靜章帝善其言卒以十月斷今京都及四方斷獄報重常竟季冬不推三正以育三微寬宥之情每過於昔遵時之憲猶或闕然豈所謂助陽發生垂奉微之仁也誠宜遠稽周典近採漢制天下斷獄起自初秋盡於孟冬不於三統之春行斬絞之刑如此則道協幽顯仁垂後昆矣其五曰古者大臣有坐不廉而廢者不謂之不廉乃曰簠簋不飾此君之所以禮貴臣不明言其過也臣有大譴則白冠氂纓盤水加劍造請室而請死此臣之所以知罪而不敢逃刑也聖朝賓遇大臣禮同古典自, WYG: 識}
