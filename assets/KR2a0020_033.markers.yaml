  - {type: variant, offset: 661, length: 690, content: 賜爵任城公州與姚興接界興頗寇邊牧乃與興書稱頓首鈞禮抗之責興侵邊不直之意興以與國通和恨之有言於太祖太祖戮之莫題代人也多智有才用初為幢將領禁兵太祖之征慕容寶也寶夜來犯營車人驚駭遂有亡還京師者言官軍敗於栢肆京師不安南安公元順因之欲攝國事題謂順曰此大事不可輕爾宜審待後要不然禍將及矣順乃止以功拜平遠將軍賜爵扶柳公進號左將軍改為高邑公出除中山太守督司州之山東七郡事車駕征姚興次於晉陽而上黨羣盜秦頗丁零翟都等聚衆於壺關詔題帥衆三千以討之上黨太守捕頗斬之都走林慮詔題搜山窮討盡平之初昭成末太祖季父窟咄徙于長安苻堅敗從慕容永東遷及永自立以窟咄為新興太守登國初劉顯遣弟亢碸等迎窟咄寇南鄙題時貳於太祖遺箭於窟咄謂之曰三歲犢豈勝重載言窟咄長而太祖少也太祖既銜之天賜五年有告題居處倨傲擬則人主太祖乃使人示之箭告之曰三歲犢能勝重載不題奉詔父子對泣詰朝乃刑之庾業延代人也後賜名岳其父及兄和辰世典畜牧稍轉中部大人昭成崩氐寇內侮事難之間收斂畜產富擬國君劉顯謀逆太祖外幸和辰奉獻明太后歸太祖又得其資用以和辰為內侍長和辰分別公私舊畜頗不會旨太祖由是恨之岳獨恭慎修謹善處危難之間太祖喜之與王建等俱為外朝大人參預軍國太祖既絕慕容垂以岳為大人使詣慕容永永服其辭義垂圍永於長子永告急求援岳與陳留王虔以五萬騎東渡河救之次於秀容破山胡部高車門等徙其部落會永滅乃班師從平中原拜安遠將軍官軍之驚於栢肆也賀蘭部帥附力眷紇突隣部帥匿物尼紇奚部帥叱奴根等聞之聚黨反於陰館南安公元順討之不克死者數千人太祖聞之詔岳率萬騎還討叱奴根等殄之百姓乃安離石胡帥呼延鐵西河胡帥張崇等不樂內徙聚黨反叛岳率騎三千討破之斬鐵擒崇搜山窮討散其餘黨以功賜爵西昌公, WYG: 尋}
