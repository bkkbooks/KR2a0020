  - {type: variant, offset: 4865, length: 214, content: 廣平公管綜機要世祖以其功舊任以輔弼除大司農卿軍國大議黎常與焉加鎮北將軍以征赫連定功進號征北大將軍與樂安王範濟南公崔徽鎮長安清約公平甚著聲稱代下之日家無餘財世祖詔黎領兵一萬二千人通莎泉道車駕征涼州蠕蠕吳提乘虛入寇黎與司空道生拒擊之恭宗初總百揆黎與東郡公崔浩等輔政忠於奉上非公事不言詔曰侍中廣平公黎東郡公浩等保傅東宮有老成之勤朕甚嘉焉其賜布帛各千匹以褒舊勳恭宗薨於東宮黎兼太尉持節奉策諡焉吳王余立以黎為太尉後以議不合旨免仍與古弼並誅, WYG: 歴陽侯}
