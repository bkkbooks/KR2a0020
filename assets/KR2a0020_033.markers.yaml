  - {type: variant, offset: 1596, length: 0, content: '', WYG: 至京師官給衣服洪輒截沒為有司所糾幷窮其前後贓罪坐以伏法子頴青州征東大將軍廣陵王羽田曹參軍員外散騎侍郎給事中尚書郎加威逺將軍除員外散騎常侍尋轉中散大夫大軍伐蜀時益州刺史傅豎眼出為别將以頴權行州事後除假節鎮逺將軍涼州刺史不行改授太府少卿又加前將軍神龜二年卒贈平東將軍營州刺史諡曰貞長子纂字靈紹頗有學渉解褐太學博士領侍御史稍遷著作郎司州治中黃門郎散騎常侍又為侍中兼殿中尚書遷驃騎大將軍左光禄大夫營州大中正纂前為著作又監國史不能有所緝綴纂弟士恢字紹逹少好琴書初為世宗挽郎除奉朝請正光中入侍甚為肅宗寵待元义之出靈太后反政紹逹預有力焉遷諌議大夫俄轉通直散騎常侍直閤將軍鴻臚少卿封元城縣開國侯邑七百戸太后嬖幸鄭儼懼紹逹閒構於帝每因言次導紹達為州紹達躭寵不願出外太后誣其罪而殺之公孫表字元元燕郡廣陽人也遊學為諸生慕容沖以為尚書郎慕容垂破長子}
