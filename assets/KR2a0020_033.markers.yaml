  - {type: variant, offset: 2293, length: 2, content: 又獻, WYG: 欲顯㢘於衆人後兼大鴻臚持節拜氐王楊元為南秦王及境元不郊迎軌數元曰昔尉他跨據及陸賈至匍匐奉順故能垂名竹帛今君王無肅恭之禮非蕃臣也元使其屬趙客子對曰天子以六合為家孰非王庭是以敢請入國然後受謁軌答曰大夫入境尚有郊勞而況王命者乎請奉䇿以還𤣥懼詣郊受命軌使還稱旨拜尚書賜爵燕郡公加平南將軍及劉義隆將到彦之遣其部將姚縱夫濟河攻冶坂世祖慮更北入遣軌屯壺關㑹上黨丁零叛軌討平之出為虎牢鎮將初世祖將北征發民驢以運糧使軌部詣雍州軌令驢主皆加絹一疋乃與受之百姓為之語曰驢無彊弱輔脊自壯衆共嗤之坐徵還真君二年卒時年五十一軌既死世祖謂崔浩曰吾行過上黨父老皆曰公孫軌為受貨縱賊使至今餘姦不除軌之咎也其初來單馬執鞭返去從車百兩載物而南丁零渠帥乗山罵軌軌怒取罵者之母以矛刺其隂而殺之曰何以生此逆子從下到擘分磔四支於山樹上以肆其忿是忍行不忍之事軌幸而早死至今在者吾必族而誅之軌終得娶於封氏生二子斌叡斌襲爵拜内都大官正光二年卒贈幽州刺史叡字文叔初為東宫吏稍遷儀曹長賜爵陽平公時顯祖於苑内立殿勑中秘羣官制名叡曰臣聞至尊至貴莫崇於帝王天人挹損莫大於謙光伏惟陛下躬唐虞之徳存道頤神逍遥物外宫居之名當協叡㫖臣愚以為宜曰崇光奏可後卒於南部尚書贈安東將軍幽州刺史諡曰宣叡妻崔浩弟女也生子良字遵伯聰明好學為尚書左丞雅有幹用為高祖所知遇良弟衡字道津良推爵譲之仕至司}
