  - {type: variant, offset: 4515, length: 282, content: 君使畋獵不適盤遊其罪小也不備不虞使戎寇恣逸其罪大也今北狄孔熾南虜未滅狡焉之志窺伺邊境是吾憂也故選肥馬備軍實為不虞之遠慮苟使國家有利吾何避死乎明主可以理干此自吾罪非卿等之咎世祖聞而歎曰有臣如此國之寶也賜衣一襲馬二匹鹿十頭後車駕畋於山北大獲麋鹿數千頭詔尚書發車牛五百乘以運之世祖尋謂從者曰筆公必不與我汝輩不如馬運之速遂還行百餘里而弼表至曰今秋穀懸黃麻菽布野猪鹿竊食鳥雁侵費風波所耗朝夕參倍乞賜矜緩使得收載世祖謂左右曰筆公果如朕所卜可謂社稷之臣初楊難當之來也詔弼悉送其子弟於京師楊玄小子文德以黃金四十斤賂弼弼受金留文德而遇之無禮文德亡入劉義隆世祖以其正直有戰功弗加罪責也, WYG: ''}
