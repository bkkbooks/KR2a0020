  - {type: variant, offset: 2262, length: 2, content: 寢疾, WYG: 善之賜爵固安子河西饑胡劉虎聚結流民反於上黨南寇河内詔表討虎又令表與姚興洛陽戍將結期使備河南岸然後進軍討之時胡内自疑阻更相殺害表以其有解散之勢遂不與戍將相聞率衆討之法令不整為胡所敗軍人大被傷殺太宗深銜之及劉裕征姚興兖州刺史尉建聞寇至棄滑䑓北走詔表随夀光侯叔孫建屯枋頭泰常七年劉裕死議取河南侵地太宗以為掠地至淮滑䑓等三城自然面縳表固執宜先攻城太宗從之於是以奚斤為都督以表為吳兵將軍廣州刺史斤等濟河表攻滑䑓歴時不㧞太宗乃南廵為之聲援表等既剋滑䑓引師西伐大破劉義隆將翟廣等於王樓遂圍虎牢車駕次汲郡始昌子蘓坦太史令王亮奏表置軍虎牢東不得利便之地故令賊不時滅太宗雅好術數又積前忿及攻虎牢士卒多傷乃使人夜就帳中縊而殺之時年六十四太宗以賊未退秘而不宣初表與渤海封愷友善後為子求愷從女愷不許表甚銜之及封氏為司馬國璠所逮太宗以舊族欲原之表固證其罪乃誅封氏表為人外和内忌時人以此薄之表本與王亮同營署及其出也輕侮亮故至於死第二子軌字元慶少以文學知名太宗時為中書郎出從征討補諸軍司馬}
