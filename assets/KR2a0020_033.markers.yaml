  - {type: variant, offset: 1375, length: 1, content: 鄴, krp: 尚書加散騎常侍善騎射機辯有辭氣世祖甚器之從征蓋吳遷尚書右僕射加侍中還至鴈門暴疾卒諡曰哀公子拔襲爵拔少好隂陽學世祖追思其父祖年十四以為南部大人時世祖南伐擒劉義隆將胡盛之以付㧞㧞酒醉不覺盛之逃去世祖大怒命斬之將伏鑕世祖愴然曰若鬼而有知長生問其子孫朕何以應之乃赦拔免為散大夫後顯祖以其功臣子拜營州刺史卒子永興襲爵張蒲字元則河南修武人本名謨後改為蒲漢太尉延之後父攀慕容垂御史中丞兵部尚書以清方稱蒲少有父風頗渉文史以端謹見知為慕容寶陽平河間二郡太守尚書左丞太祖定中山寶之官司叙用者多降品秩既素聞蒲名仍拜為尚書左丞天興中以蒲清謹方正遷東部大人後拜太中大夫太宗即位為内都大官賜爵㤗昌子參决庶獄私謁不}
  - {type: variant, offset: 1377, length: 2, content: 臺岳, WYG: 號為公正㤗常初丁零翟猛雀驅逼吏民入白􅔠山謀為大逆詔蒲與冀州刺史長孫道生等往討道生等欲徑以大兵擊之蒲曰良民所以從猛雀者非樂亂而為皆逼凶威彊服之耳今若直以大軍臨之吏民雖欲返善其道無由又懼誅夷必并勢而距官軍然後入山恃阻誑惑愚民其變未易圖也不如先遣使喻之使民不與猛雀同謀者無坐則民必喜而俱降矣道生甚以為然具以奏聞太宗詔蒲軍前慰喻乃下數千家還其本屬蒲皆安集之猛雀與親黨百餘人奔逃蒲與道生等追斬猛雀首送京師後劉裕寇竊河表以蒲為南中郎將南蠻校尉隸平南大將軍長孫嵩往禦之裕入長安乃還後改為夀張子與安平公叔建將兵自平原東渡徇下劉義符青兖諸郡詔加陳兵將軍濟州刺史又與建攻青州不剋而還世祖即位以蒲清貧妻子衣食不給乃出為相州刺史扶弱抑彊進善黜惡教化大行始光三年卒於州年七十二吏民痛惜之蒲在謀臣之列屢出}
