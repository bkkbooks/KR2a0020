  - {type: variant, offset: 3931, length: 320, content: 等討仇池遣永安侯賀純攻義隆塞狹道守將姜道祖退守狹亭諸將以山道嶮峻時又雪深用馬不便皆遲留不進弼獨進軍使元齊賀純等擊狹亭道祖南走仇池平未幾諸氐復推楊文德為主圍仇池弼發上邽高平汧城諸軍討之仇池圍解文德走漢川時豹子督關中諸軍次於下辨聞仇池圍解議欲還軍弼使謂豹子曰比連破賊軍恐彼君臣未體大分其負敗或來報復若其班師寇衆復至後舉為難不如繕兵練甲蓄力待之不出秋冬南寇必來以逸待勞百勝之策豹子乃止世祖聞之曰弼之言長策也制南秦弼謀多矣恭宗總攝萬幾徵為東宮四輔與宜都王穆壽等並參政事詔以弼保傅東宮有老成之勤賜帛千匹綿千斤遷尚書令弼雖事務殷湊而讀書不輟端謹慎密口不言禁中之事功名等於張黎而廉不及也上谷民上書言苑囿過度民無田業乞減太半以賜貧人弼覽見之入欲陳奏遇世祖與, WYG: 叔休襲爵除}
