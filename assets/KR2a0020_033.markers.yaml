  - {type: variant, offset: 1911, length: 271, content: 隨太祖幸賀蘭部在元從二十一人中太祖愛其藝能時王業草創爪牙心腹多任親近唯栗一介遠寄兼非戚舊當世榮之數有戰功拜左軍將軍太祖征慕容寶栗督五萬騎為前驅軍之所至莫不降下遷左將軍慕容寶棄中山東走也栗以輕騎追之不及而還栗性簡慢矜寵不率禮度每在太祖前舒放倨傲不自祗肅咳唾任情太祖積其宿過天興三年遂誅之於是威嚴始厲制勒羣下盡卑謙之禮自栗始也劉潔長樂信都人也祖父生頗解卜筮昭成時慕容氏來獻女為公主家臣仍隨入朝賜以妻生子父提太祖時官至樂陵太守賜爵信都男卒潔性強力多智數從征討有功進爵會稽公河西胡張外建興王紹等聚黨為逆潔與永安侯魏勤率衆三千人屯于西河以鎮撫之又與勤及, WYG: 表參}
