  - {type: variant, offset: 3488, length: 1, content: 進, WYG: 太祖問濟江南之事濟對曰司馬昌明死子徳宗代立所部州鎮迭相攻擊今雖小定君弱臣彊全無綱紀臣等既至襄陽佺期問臣魏初伐中山幾十萬衆臣答三十餘萬佺期曰魏國被甲戎馬可有幾匹臣答中軍精騎十有餘萬外軍無數佺期曰以此討羌豈足滅也又曰魏定中山徙幾戸於北臣答七萬餘家佺期曰治在何城臣答定都平城佺期曰有如許大衆亦何用城}
