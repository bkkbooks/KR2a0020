  - {type: variant, offset: 52, length: 1, content: 擢, WYG: 平中山拜隐尚書吏部郎車駕還北詔隐以本官輔衞王儀鎭中山尋轉行䑓右丞領選如故屢以老病乞骸骨太祖不許尋以母䘮歸列人既葬被徵固辭以病而州郡切以期㑹隐乃棄妻子間行避焉後匿於長樂之經縣數年而卒臨終謂其子姪等曰茍能入順父兄出悌鄉黨仕郡幸而至功曹史以忠清奉之則足矣不勞逺詣䑓閣恐汝不能富貴而徒延門戸之累耳若忘吾言是}
  - {type: page-break, offset: 52, content: '', id: KR2a0020_WYG_033-2a, image: WYG0261/WYG0261-0478a.png}
  - {type: variant, offset: 52, length: 1, content: 擢, krp: 平中山拜隐尚書吏部郎車駕還北詔隐以本官輔衞王儀鎭中山尋轉行䑓右丞領選如故屢以老病乞骸骨太祖不許尋以母䘮歸列人既葬被徵固辭以病而州郡切以期㑹隐乃棄妻子間行避焉後匿於長樂之經縣數年而卒臨終謂其子姪等曰茍能入順父兄出悌鄉黨仕郡幸而至功曹史以忠清奉之則足矣不勞逺詣䑓閣恐汝不能富貴而徒延門戸之累耳若忘吾言是}
  - {type: variant, offset: 54, length: 0, content: '', WYG: 無若父也使鬼而有知吾不歸食矣有五子第三子温世祖時徵拜中書博士卒追贈建威將軍豫州刺史列人定侯温弟演顯祖初從征彭城有功拜明威將軍濟北太守演子鲋字伯魚州别駕隐弟輔字處仁少慷慨有大操博覽羣書州辟别駕早卒隐叔父洽為慕容垂尚書太祖之圍中山也洽率所領專守北圍當洽所統官軍多被傷殺太祖特深忿恨及城平遂殺之子順訓並下腐刑洽第四子宣字道茂時年數歲親人竊逃以免後與范陽盧元渤海髙允及從子愔俱被徵拜中書博士尋兼散騎常侍使劉義隆加冠軍將軍賜爵中都侯領中書侍郎行司隸校尉真君七年卒贈司隸諡簡侯子謨字乾仁襲爵卒於遼西太守子鸞字珍和襲爵東莞太守鸞弟瓊字普賢少以孝行稱母曽病季秋之月思𤓰不己瓊夢想見之求而遂獲時人稱異母終州郡屢辟皆不就卒於家子仲美武定末尚書水部郎王憲字顯則北海劇人也祖猛苻堅丞相父休河東太守憲㓜孤随伯父永在鄴苻丕稱尊號復以永為丞相永為慕容永所殺憲奔清河匿於民家皇始中輿駕次趙郡之髙邑憲乃歸誠太祖見之曰此王猛孫也厚禮待之以為本州中正領選曹事兼掌門下世祖即位行廷尉卿出為上谷太守加中壘將軍賜爵髙唐子清身率下風化大行尋拜}
