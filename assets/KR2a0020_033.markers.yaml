  - {type: variant, offset: 3751, length: 0, content: '', WYG: 屑日服食之餘多惠人後預及聞者更求於故處皆無所見馮翊公源懐等得其玉琢為器佩皆鮮明可寶預服經年云有效驗而世事寢食不禁節又加之好酒損志及疾篤謂妻子曰服玉屏居山林排棄嗜欲或當大有神力而吾酒色不絶自致於死非藥過也然吾尸體必當有異勿便速殯令後人知餐服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云餐玉有神驗何故不受唅也言訖齒啟納珠因嘘屬其口都無穢氣舉斂於棺堅直不傾委死時猶有遺玉屑數斗槖盛納諸棺中初天興中先子宻問於先曰子孫永為魏臣將復事他主也先告曰未也國家政化長逺不可卒窮自皇始至齊受禪實百五十餘歲矣賈彝字彦倫本武威姑臧人也六世祖敷魏幽州刺史}
