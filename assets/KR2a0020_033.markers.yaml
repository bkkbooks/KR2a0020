  - {type: variant, offset: 1372, length: 0, content: '', krp: 涼功賜爵濟北公加平南將軍後轉中領軍恭宗在東宫恒領太子少傅後督諸軍東伐進號征東大將軍師次和龍馮文通致牛酒}
  - {type: variant, offset: 1373, length: 1, content: 岳, WYG: 犒軍獻甲三千恒責其不送侍子數之以王命遂掠男女六千口而還恒在宫公正内外稱其平當世祖信任之委以大政車駕出征常居中留鎮與襄城公盧魯元俱賜甲第世祖數臨幸賞賜隆厚真君四年墜馬卒時年五十五時世祖幸隂山恭宗遣使乗傳奏狀世祖甚悼惜之謂使人曰汝等殺朕良臣何用乗馬遂令歩歸贈征西大將軍諡曰成公長子觀早卒世祖愍之賜其子男爵觀弟道賜襲祖爵道賜少以父任内侍左右稍遷主客進}
