  - {type: variant, offset: 2328, length: 1, content: 令, WYG: 真君九年卒追贈中護軍將軍光禄勲幽州刺史廣陽侯諡曰恭第二子邃字文慶初為選部吏以積勤稍遷南部長敷奏有稱遷南部尚書賜爵范陽侯加左將軍高祖詔邃與内都幢將上谷公張儵率衆討蕭賾舞隂戍後高祖與文明太后引見王公以下高祖曰比年方割畿内及京城三部於百姓頗有益否邃對曰先者人民離散主司猥多至於督察實難齊整自方割以來衆賦易辦實有大益太后曰諸人多言無益卿言可謂識治機矣詔醴陽被掠之兵有得還者賜絹二十匹邃奏為貴賤等級高祖稱善依例降侯}
