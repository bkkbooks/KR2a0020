  - {type: variant, offset: 1375, length: 1, content: 鄴, WYG: 尚書加散騎常侍善騎射機辯有辭氣世祖甚器之從征蓋吳遷尚書右僕射加侍中還至鴈門暴疾卒諡曰哀公子拔襲爵拔少好隂陽學世祖追思其父祖年十四以為南部大人時世祖南伐擒劉義隆將胡盛之以付㧞㧞酒醉不覺盛之逃去世祖大怒命斬之將伏鑕世祖愴然曰若鬼而有知長生問其子孫朕何以應之乃赦拔免為散大夫後顯祖以其功臣子拜營州刺史卒子永興襲爵張蒲字元則河南修武人本名謨後改為蒲漢太尉延之後父攀慕容垂御史中丞兵部尚書以清方稱蒲少有父風頗渉文史以端謹見知為慕容寶陽平河間二郡太守尚書左丞太祖定中山寶之官司叙用者多降品秩既素聞蒲名仍拜為尚書左丞天興中以蒲清謹方正遷東部大人後拜太中大夫太宗即位為内都大官賜爵㤗昌子參决庶獄私謁不}
