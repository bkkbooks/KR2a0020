  - {type: variant, offset: 3503, length: 4, content: 原降東部, WYG: 出先對曰臣問兵以正合戰以竒勝如聞姚興欲屯兵天渡利其糧道及其未到之前遣竒兵先邀天渡柴壁左右嚴設伏兵備其表裏以陛下神䇿觀時而動興欲進不得退又乏糧夫}
  - {type: variant, offset: 3503, length: 4, content: 原降東部, krp: 出先對曰臣問兵以正合戰以竒勝如聞姚興欲屯兵天渡利其糧道及其未到之前遣竒兵先邀天渡柴壁左右嚴設伏兵備其表裏以陛下神䇿觀時而動興欲進不得退又乏糧夫}
  - {type: variant, offset: 3508, length: 1, content: 車, WYG: 者為敵所棲深者為敵所囚兵法所忌而興居之可不戰而取太祖從其計興果敗歸太宗即位問左右舊臣之中為先帝所親信者有誰時新息公王洛兒對曰有李先者最為先帝所知太宗召先引見問曰卿有何功行而蒙先帝所識先對曰臣愚細才行無聞適以忠直奉上更無異能太宗曰卿試言舊事先對曰臣聞堯舜之教化民如子三王任賢天下懐服今陛下躬秉勞謙六合歸徳士女能言莫不慶抃俄而召先讀韓子連珠二十二篇太公兵法十一事詔有司曰先所知者皆軍國大事自今常宿}
