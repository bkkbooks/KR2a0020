  - {type: variant, offset: 3496, length: 0, content: '', WYG: 郎後慕容永聞其名迎為謀主先勸永據長子城永遂稱制以先為黄門郎秘書監垂滅永徙於中山皇始初先於井陘歸順太祖問先曰卿何國人先曰臣本趙郡平棘人太祖曰朕聞中山土廣民殷信爾以不先曰臣少官長安仍事長子後乃還鄉觀望民士實自殷廣又問先曰朕聞長子中有李先者卿其是乎先曰小臣是也太祖曰卿識朕不先曰陛下聖徳膺符澤被八表龍顔挺特臣安敢不識太祖又問曰卿祖父及身官悉歴何官先對曰臣大父重晉平陽太守大將軍右司馬父樊石虎樂安太守左中郎將臣符丕尚書右主客郎慕容永秘書監髙宻侯太祖曰卿既宿士屢歴名官經學所通何}
