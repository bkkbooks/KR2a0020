  - {type: variant, offset: 3501, length: 1, content: 與, WYG: 太祖後以先為丞相衞王府左長史從儀平鄴到義䑓破慕容驎軍回定中山先每一進䇿所向剋平車駕還代以先為尚書右中兵郎太祖謂先曰今蠕蠕屢來犯塞朕欲討之卿以為何如先曰蠕蠕不識天命竄伏荒朔屢來偷竊驚動邉民陛下神武威徳遐振舉兵征之必將摧殄車駕於是北伐大破蠕蠕賞先奴婢三口馬牛羊五十頭轉七兵郎遷博士定州大中正太祖問先曰天下何書最善可以益人神智先對曰唯有經書三皇五帝治化之典可以補王者神智又問曰天下書籍凡有幾何朕欲集之如何可備對曰伏羲創制帝王相承以至於今世傳國記天文秘緯不可計數陛下誠欲集之嚴制天下諸州郡縣搜索備送主之所好集亦不難太祖於是班制天下經籍稍集太祖之討姚興於柴壁也問先曰興屯天渡平據柴壁相為表裏今欲殄之計將}
