  - {type: variant, offset: 2439, length: 955, content: 冰未解徙之河西冰解之後不得北遁世祖曰不然此等習俗放散日久有似園中之鹿急則衝突緩之則定吾自處之有道不煩徙也潔等固執乃聽分徙三萬餘落於河西西至白鹽池新民驚駭皆曰圈我於河西之中是將殺我也欲西走涼州潔與侍中古弼屯五原河北左僕射安原屯悅拔城北備之既而新民數千騎北走潔追討之走者糧絕相枕而死時南州大水百姓阻飢潔奏曰臣聞天地至公故萬物咸育帝王無私而黎民戴賴伏惟陛下以神武之姿紹重光之緒恢隆大業育濟羣生威之所振無思不服澤之所洽無遠不懷太平之治於是而在自頃邊寇內侵戎車屢駕天資聖明所在克殄方難既平皆蒙酬錫勳高者受爵功卑者獲賞寵賜優崇有過古義而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資自山以東偏遇水害頻年不收就食他所臣聞率土之濱莫非王臣應加哀矜以鴻覆育今南摧強寇西敗醜虜四海晏如人神協暢若與兆民共饗其福則惠感和氣蒼生悅樂矣世祖從之於是復天下一歲租賦潔與樂平王丕督諸軍取上邽軍至啟陽百姓爭致牛酒潔至上邽諸將咸欲斬其豪帥以示王威潔不聽撫慰秦隴秋毫無犯人皆安業世祖將發隴右騎卒東伐高麗潔進曰隴土新民始染大化宜賜優復以饒實之兵馬足食然後可用世祖深納之車駕西伐潔為前鋒沮渠牧犍弟董來率萬餘人拒戰於城南潔信卜者之言日辰不協擊鼓却陳故後軍不進董來得入城世祖微嫌之後潔與建寧王崇督諸軍於三城胡部中簡兵六千將以戍姑臧胡不從命千餘人叛走潔與崇擊誅之虜男女數千人潔朝夕在樞密深見委任性既剛直恃寵自專世祖心稍不平時議伐蠕蠕潔意不欲言於世祖曰虜非有邑居遷徙無常前來出軍無所擒獲不如廣農積穀以待其來羣臣皆從其議世祖決行乃問於崔浩浩固言可伐世祖從浩議既出與諸將期會鹿渾谷而潔恨其計不用欲沮諸將乃矯詔更期故諸將不至時虜衆大亂恭宗欲擊之潔執不可語在帝紀停鹿渾谷六日諸將猶不進賊已遠遁追至石水不及而還師次漠中糧盡士卒多死潔陰使人驚軍勸世祖棄軍輕還世祖不從潔以軍行無功奏歸罪於崔浩世祖曰諸將後期及賊不擊罪在諸將豈在於浩浩又言潔矯詔事遂發輿駕至五原收潔幽之世祖之征也潔私謂親人曰若軍出無功車駕不返者吾當立樂平王潔又使右丞張嵩求圖讖問劉氏應王繼國家後我審有名姓否嵩對曰有姓而無名窮治款引搜嵩家果得讖書潔與南康公狄隣及嵩等皆夷三族死者百餘人潔既居勢要擅作威福諸阿附者登進忤恨者黜免內外憚之側目而視拔城破國者聚斂財貨與潔分之籍其家產財盈巨萬世祖追忿言則切齒古弼代, WYG: ''}
