  - {type: variant, offset: 3746, length: 2, content: 怒徵, WYG: 官神䴥二年卒年九十五詔賜金縷命服一襲贈定州刺史中山公諡曰文懿子冏襲爵為京兆濟隂二郡太守卒子鍾葵襲爵降為子鍾葵弟鳯子鳯子弟虬子並中書博士鳯子子預字元愷少為中書學生聰敏彊識渉獵經史太和初歴秘書令齊郡王友出為征西大將軍長史帶馮翊太守積數年府解罷郡遂居長安每羡古人餐玉之法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘稍得麤黑者亦篋盛以}
