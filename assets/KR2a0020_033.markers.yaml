  - {type: variant, offset: 192, length: 248, content: 山王遵率衆五萬討賀蘭部別帥木易于破之出為平原太守太祖寵遇跋冠於諸將時羣臣皆敦尚恭儉而跋好修虛譽眩曜於時性尤奢淫太祖戒之弗革後車駕北狩豺山收跋刑之路側妻劉氏自殺以從初將刑跋太祖命其諸弟毗等視訣跋謂毗曰灅北地瘠可居水南就耕良田廣為產業各相勉勵務自纂修令之背己曰汝曹何忍視吾之死也毗等解其微意詐稱使者云奔長安追之不及太祖怒遂誅其家後世祖西巡五原回幸犲山校獵忽遇暴風雲霧四塞世祖怪而問之羣下僉言跋世居此土祠冢猶存其或者能致斯變帝遣建興公古弼祭以三牲霧即除散後世祖蒐狩之日每先祭之少子歸從征赫連昌有功拜統萬, WYG: 侍右}
