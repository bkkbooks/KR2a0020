  - {type: variant, offset: 2331, length: 0, content: '', WYG: 襄平伯出為使持節安東將軍青州刺史以邃在公遺迹可紀下詔襃述加鎮東將軍領東夷校尉刺史如故太和十九年卒於官高祖在鄴宫為之舉哀時百度唯新青州佐吏疑為所服詔曰今古時殊禮或隆殺專古也理與今違專今也大乖曩義當斟酌兩途商量得失吏民之情亦不可茍順也主簿近代相承服斬過葬便除可如故事自餘無服大成寥落可凖諸境内之民為齊衰三月子同始襲爵卒於給事中同始弟同慶篤厚㢘慎為司徒田曹參軍李崇驃騎府外兵參軍随崇北征有方直之稱邃叡為從父兄弟而叡才器小優又封氏之甥崔氏之壻邃母鴈門李氏地望縣隔}
