  - {type: variant, offset: 3490, length: 1, content: 侍, WYG: 又曰魏帝為欲乆都平城將復遷乎臣答非所知也佺期聞朝廷不都山東貎有喜色曰晉魏通和乃在往昔非唯今日羌寇狡猾頻侵河洛夙夜憂危今此寡弱倉庫空竭與君便為一家義所無諱洛城救援仰恃於魏若獲保全當必厚報如其為羌所乗寧使魏取臣等欲分向揚州佺期曰蠻賊互起水行甚難魏之車馬已據滑䑓於此而還從北道東下乃更便直晉之法制有異於魏今都督襄陽委以外事有欲征討輒便興發然後表聞令朝廷知之而已如其事勢不舉亦不承䑓命太祖嘉其辭順乃厚賞其使許救洛陽後遷謁者僕射報使姚興以累使稱㫖拜勝兵將軍頻從車駕北伐濟謀功居多賞賜奴婢百口馬牛數百羊二十餘口天賜五年卒子多羅襲爵坐事除李先字容仁}
