  - {type: variant, offset: 1592, length: 3, content: 路皇始, WYG: 少侍東宫稍遷平南將軍相州刺史入為外都大官延興四年卒諡曰簡公闡弟季孫襲爵中書學生入為秘書中散遷中部大夫出為吐京鎮將闡子洪字元孫少受學中書世祖以洪機敏有祖風令入授高宗經髙宗即位以舊恩為散騎常侍南部長遷尚書賜爵滎陽公洪性貪奢僕妾衣服錦綺貲累千金而求欲滋劇時顯祖舅李峻等}
