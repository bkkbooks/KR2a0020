  - {type: variant, offset: 7205, length: 6, content: 仲宣贈都督青, WYG: 穎前妻鄧氏亡後十五年穎夢見之向穎拜曰新婦今被處分為高崇妻故來辭君泫然流涕穎旦而見崇言之崇後數日而卒穎族弟燮字崇和廣平王懐郎中令員外常侍為征北李平司馬北殄元愉頗有贊謀之功燮族弟鴻貴為定州平北府參軍送兵於荆州坐取兵絹四百匹兵欲告之乃斬十人又疎凡不達律令見律有梟首之罪乃生斷兵手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚史臣曰古人有云才未半古功以過之非徒語也王肅流寓之人見知一面雖器業自致抑亦逢時榮仕赫然寄同舊列美矣誦翊繼軌不殞}
