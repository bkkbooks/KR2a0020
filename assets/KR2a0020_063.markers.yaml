  - {type: variant, offset: 1285, length: 433, content: 克愚計可錄請為明公前驅稚曰薛脩義已圍河東薛鳳賢又保安邑都督宗正珍孫停師虞坂久不能進雖有此計猶用為疑侃曰珍孫本行陳一夫因緣進達可為人使未可使人一旦受元帥之任處分三軍精神亂矣寧堪圍賊河東治在蒲坂西帶河湄所部之民多在東境脩義驅率壯勇西圍郡邑父老妻弱尚保舊村若率衆一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彥等領騎與侃於弘農北渡所領悉是騎士習於野戰未可攻城便據石錐壁侃乃班告曰今且停軍於此以待步卒兼觀民情向背然後可行若送降名者各自還村候臺軍舉烽火各亦應之以明降款其無應烽者即是不降之村理須殄戮賞賚軍士民遂轉相告報未實降者亦詐舉烽一宿之間火光遍數百里內圍城之寇不測所以各自散歸脩義亦即逃遁長安平侃頗有力建義初除冠軍將軍東雍州刺史其年州罷除中散大夫為都督鎮潼關還朝除右將軍岐州刺史屬元顥內逼詔以本官假撫軍將軍為都督率衆鎮大梁未發詔行北中郎將孝莊徙御河北執侃手曰朕停卿蕃寄移任此者正為今日但卿尊卑百口若隨朕行所累處大卿可還洛寄之後圖侃曰此誠陛下曲恩寧可以臣微族頓廢, WYG: 謂}
