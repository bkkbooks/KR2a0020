  - {type: variant, offset: 7077, length: 1, content: 辯, WYG: 顯襲爵弁伯父世顯無子養弁為後弁父叔珍李敷妹夫因敷事而死弁才學儁贍少有美名高祖初曽至京師見尚書李沖因言論移日沖竦然異之退而言曰此人一日千里王佐才也顯卒弁襲爵弁與李彪州里迭相祗好彪為祕書丞弁自中散彪請為著作佐郎尋除尚書殿中郎中高祖曽因朝㑹之次歴訪治道弁年少官微自下而對聲姿清亮進止可觀高祖稱善者久之因是大被知遇賜名為弁意取弁和獻玉楚王不知寳之也遷中書侍郎兼員外常侍使於蕭賾賾司徒蕭子良祕書丞王融等皆稱矣之以為志氣謇愕不逮李彪而體韻和雅舉止閑邃過之轉散騎侍郎時散騎位在中書之右高祖曽論江左事因問弁曰卿比南行入其隅隩彼政道云何興亡之數可得知不弁對曰蕭氏父子無大功於天下既以逆取不能順守徳政不理徭役滋劇内無股肱之助外有怨叛之民以臣觀之必不能貽厥孫謀保有南海若物憚其威身免為幸後車駕南征以弁為司徒司馬曜武將軍東道副將軍人有盜馬靽者斬而徇之於是三軍振懼莫敢犯法黄門郎崔光薦弁自代高祖不許然亦賞光知人未幾以弁兼黄門尋即正兼司徒左長史時大選内外羣官并定四海士族弁専參銓量之任事多稱㫖然好言人之隂短高門大族意所不便者弁因毁之至於舊族淪滯人非可忌者又申達之弁又為本州大中正姓族多所降抑頗為時人所怨從駕南討詔弁於豫州都督所部及東荆領葉皆滅戍士營農水陸兼作遷散騎常侍尋遷右衛將軍領黄門弁屢自陳讓高祖曰吾為相知者卿亦不可有辭豈得專守一官不助朕為治且常侍者黄門之麤冗領軍者二衛之假攝不足空存推讓以棄大委其被知遇如此始高祖北都之選也李沖多所參預頗抑宋氏弁有恨於沖而與李彪交結雅相知重及彪之抗沖沖謂彪曰爾如狗耳為人所嗾及沖劾彪不至大罪弁之力也彪除名為民弁大相嗟慨密圖申復高祖在汝南不豫大漸旬有餘日不見侍臣左右唯彭城王勰等數人而已小瘳乃引見門下及宗室長幼諸人入者未能知致悲泣弁獨進及御牀歔欷流涕曰臣不謂陛下聖顔毁瘠乃爾由是益重之車駕征馬圈留弁以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祠與戎故令卿綰攝二曹可不自勉弁頓首辭謝弁劬勞王事夙夜在公恩遇之甚輩流莫及名重朝野亞於李沖高祖每稱弁可為吏部尚書及崩遺詔以弁為之與咸陽王禧等六人輔政而弁已先卒年四十八詔賜錢十萬布三百疋贈安東将軍瀛州刺史諡曰貞順弁性好矜伐自許膏腴高祖以郭祚晉魏名門從容謂弁曰卿固應推郭祚之門也弁笑曰臣家未肯推祚高祖曰卿自漢魏以來既無高官又無儁秀何得不推弁曰臣清素自立要爾不推侍臣出後高祖謂彭城王勰曰弁人身良自不惡乃復欲以門户自矜殊為可怪長子維}
