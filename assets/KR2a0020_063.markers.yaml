  - {type: variant, offset: 652, length: 194, content: 葬披訴積年至熙平中乃贈鎮西將軍雍州刺史并復其爵諡曰壯侃字士業頗愛琴書尤好計畫時播一門貴滿朝廷兒姪早通而侃獨不交遊公卿罕有識者親朋勸其出仕侃曰苟有良田何憂晚歲但恨無才具耳年三十一襲爵華陰伯釋褐太尉汝南王悅騎兵參軍揚州刺史長孫稚請為錄事參軍蕭衍豫州刺史裴邃治合肥城規相掩襲密購壽春郭人李瓜花袁建等令為內應邃已纂勒兵士有期日矣而慮壽春疑覺遂謬移云魏始於馬頭置戍如聞復欲修白捺舊城若爾便稍相侵逼此, WYG: 罷肅}
