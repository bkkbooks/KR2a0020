  - {type: variant, offset: 4090, length: 0, content: '', WYG: 豫州刺史揚州大中正肅善於撫接治有聲稱尋徴肅入朝高祖手詔曰不見君子中心如醉一日三嵗我勞如何飾館華林拂席相待卿欲以何日發汝墳也故復此勑又詔曰肅丁荼虣世志等伍胥自拔吳州膺求魏縣躬操忘禮之本而同無數之喪誓雪怨恥方展申復窮諭再朞蔬緼不改誠季世之高風末代之孝節也但聖人制禮必均愚智先王作則理齊盈虛過之者俯而就之不及者企而行之曽參居罰寜其哀終吳員處酷豈聞四載夫三年者天下之達喪古今之所一其雖欲過禮朕得不制之以禮乎有司可依禮諭之為裁練􅎭之制二十年七月高祖以久旱不雨輟膳三日百寮詣闕引在中書省高祖在崇虛樓遣舎人問曰朕知卿等至不獲相見卿何為而來肅對曰伏承陛下輟膳已經三日羣臣焦怖不敢自寜臣聞堯水湯旱自然之數湏聖人以濟世不由聖以致災是以國儲九年以禦九年之變臣又聞至於八月不雨然後君不舉膳昨四郊之外已蒙滂澍唯京城之内微為少澤蒸民未闕一餐陛下輟膳三日臣庶惶惶無復情地高祖遣舎人答曰昔堯水湯旱頼聖人以濟民朕雖居羣黎之上道謝前王今日之旱無以救恤應待立秋克躬自咎但此月十日已來炎熱焦酷人物同悴而連雲數日高風蕭條雖不食數朝猶自無感朕誠心未至之所致也肅曰臣聞聖人與凡同者五常異者神明昔姑射之神不食五穀臣常謂矯今見陛下始知其驗且陛下自輟膳以來若天全無應臣亦謂上天無知陛下無感一昨之前外有滂澤此有密雲臣即謂天有知陛下有感矣高祖遣舎人答曰昨内外貴賤咸云四郊有雨朕恐此軰皆勉勸之辭三覆之慎必欲使信而有徴比當遣人徃行若果雨也便命大官欣然進膳豈可以近郊之内而慷慨要天乎若其無也朕之無感安用朕身以擾民庶朕志確然死而後己是夜澍雨大降以破蕭鸞將裴叔業功進號鎮南將軍加都督豫南兖東荆東豫四州諸軍事封汝陽縣開國子食邑三百户持節中正刺史如故肅頻表固讓不許詔加鼔吹一部二十二年既平漢陽詔肅曰夫知己貴義君臣務恩不能矜災䘏禍恩義焉措卿情同伍員懷酷歸朕然未能翦一讎人馘彼凶帥何嘗不興言憤歎羡吳閭而長息比獲蕭鸞輔國將軍黄瑶起乃知是卿怨也尋當相付微望紓泄使吾見卿之日差得緩懐初賾之收肅父奐也司馬黄瑶起攻奐殺之故詔云然高祖之伐淮北令肅討義陽未剋而蕭鸞遣將裴叔業冦渦陽劉藻等救之為叔業所敗肅表求更遣軍援渦陽詔曰得表覽之憮然觀卿意非專在水當是以藻等鋭兵新敗於前事往勢難故也朕若分兵遣之非多㑹無所制多遣則禁旅難闕今日之計唯當作必剋之舉不可為狐疑之師徒失南兖也卿便息意停彼以圖義陽之㓂宜止則止還取義陽宜下則下鎮軍淮北深量二途勿致重爽若孟表糧盡軍不及至致失渦陽卿之過也肅乃解義陽之圍以赴渦陽叔業乃引師而退肅坐劉藻等敗黜為平南將軍中正刺史如故高祖崩遣詔以肅為尚書令與咸陽王禧等同為宰輔徴肅㑹駕魯陽肅至遂與禧等參同謀謨自魯陽至於京洛行途喪紀委肅參量憂勤經綜有過舊戚禧兄弟並敬而昵之上下稱為和輯唯任城王澄以其起自覉逺一旦在已之上以為憾焉每謂人曰朝廷以王肅加我上尚可從叔廣陵宗室尊宿厯任内外云何一朝令肅居其右也肅聞其言恒降而避之尋為澄所奏劾稱肅謀叛言尋申釋詔肅尚陳留長公主本劉昶子婦彭城公主也賜錢二十萬帛三千疋肅奏考以顯能陟由績著昇明退闇於是乎在自百寮曠察四稔于茲諸依舊式考檢能否從之裴叔業以壽春内附拜肅使持節都督江西諸軍事車騎將軍與驃騎大將軍彭城王勰率歩騎十萬以赴之蕭寳卷豫州刺史蕭懿率衆三萬屯於小峴交州刺史李叔獻屯合肥將圖壽春懿遣將胡松李居士等領衆萬餘屯據死虎肅進師討擊大破之擒其將橋珉等斬首數千進討合肥生擒叔獻蕭懿棄小峴南走肅還京師世宗臨東堂引見勞之又問江左有何息耗肅曰如聞崔慧景已死寳卷所仗非邪即佞天殆以此資陛下廓定之期勢將不久以肅淮南累㨗賞帛四千七百五十疋進位}
