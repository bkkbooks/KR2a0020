  - {type: variant, offset: 1877, length: 437, content: 大王發并州之日已知有夏州義士指來相應為欲廣申經略寧復帝基乎夫兵散而更合瘡愈而更戰持此收功自古不少豈可以一圖不全而衆慮頓廢今事不果乃是兩賊相殺則大王之利矣若今即還民情失望去就之心何由可保未若召發民材惟多縛筏間以舟楫沿河廣布令數百里中皆為渡勢首尾既遠顥復知防何處一旦得渡必立大功榮大笑曰黃門即奏行此計於是尒朱兆與侃等遂與馬渚諸楊南渡破顥子領軍將軍冠受擒之顥便南走車駕入都侃解尚書正黃門加征東將軍金紫光祿大夫以濟河之功進爵濟北郡開國公增邑五百戶復除其長子師沖為祕書郎時所用錢人多私鑄稍就薄小乃至風飄水浮米斗幾直一千侃奏曰昔馬援至隴西嘗上書求復五銖錢事下三府不許及援徵入為虎賁中郎親對光武申釋其趣事始施行臣頃在雍州亦表陳其事聽人與官並鑄五銖錢使人樂為而俗弊得改旨下尚書八座不許以今況昔即理不殊求取臣前表經御披析侃乃隨事剖辨孝莊從之乃鑄五銖錢如侃所奏万俟醜奴陷東秦遂圍岐州扇誘巴蜀大都督尒朱天光率衆西伐詔侃以本官使持節兼尚書僕射為關右慰勞大使還朝除侍中加衞將軍右光祿大夫莊帝將圖尒朱榮, WYG: ''}
