  - {type: variant, offset: 6711, length: 177, content: 百餘人伏顥帳前請曰陛下渡江三千里無遺鏃之費昨日一朝殺傷五百餘人求乞楊昱以快意顥曰我在江東嘗聞梁主言初下都日袁昂為吳郡不降稱其忠節奈何殺楊昱自此之外任卿等所請於是斬昱下統帥三十七人皆令蜀兵刳腹取心食之顥既入洛除昱名為民孝莊還宮還復前官及父椿辭老請解官從養詔不許尒朱榮之死也昱為東道行臺率衆拒尒朱仲遠會尒朱兆入洛昱還京師後歸鄉里亦為天光所害太昌初贈都督瀛定二, WYG: ''}
