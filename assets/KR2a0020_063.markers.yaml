  - {type: variant, offset: 2315, length: 473, content: 侃與其內弟李晞城陽王徽侍中李彧等咸預密謀尒朱兆之入洛也侃時休沐遂得潛竄歸於華陰普泰初天光在關西遣侃子婦父韋義遠招慰之立盟許恕其罪侃從兄昱恐為家禍令侃出應假其食言不過一人身歿冀全百口侃往赴之秋七月為天光所害太昌初贈車騎將軍儀同三司幽州刺史子純陀襲播弟椿字延壽本字仲考太和中與播俱蒙高祖賜改性寬謹初拜中散典御曹以端慎小心專司醫藥遷內給事與兄播並侍禁闈又領蘭臺行職改授中部曹析訟公正高祖嘉之及文明太后崩高祖五日不食椿進諫曰陛下至性孝過有虞居哀五朝水漿不御羣下惶灼莫知所言陛下荷祖宗之業臨萬國之重豈可同匹夫之節以取僵仆且聖人之禮毀不滅性縱陛下欲自賢於萬代其若宗廟何高祖感其言乃一進粥轉授宮輿曹少卿加給事中出為安遠將軍豫州刺史高祖自洛向豫幸其州館信宿賜馬十匹縑千匹遷冠軍將軍濟州刺史高祖自鍾離趣鄴至碻磝幸其州館又賜馬二匹縑千五百匹坐為平原太守崔敞所訟廷尉論輒收市利費用官炭免官後降為寧朔將軍梁州刺史初武興王楊集始為楊靈珍所破降於蕭鸞至是率賊萬餘自漢中而北規復舊土椿領步騎五千出頓下辨貽書集始開以利害集始執書對使者曰楊使君此書除我心腹之疾遂領其部曲千餘人來降, WYG: ''}
