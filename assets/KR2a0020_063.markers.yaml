  - {type: variant, offset: 4343, length: 235, content: 給扶傳詔二人仰所在郡縣時以禮存問安否方乖詢訪良用憮然椿奉詔於華林園帝下御座執椿手流淚曰公先帝舊臣實為元老今四方未寧理須諮訪但高尚其志決意不留既難相違深用悽愴椿亦歔欷欲拜莊帝親執不聽於是賜以絹布給羽林衞送羣公百僚餞於城西張方橋行路觀者莫不稱歎椿臨行誡子孫曰我家入魏之始即為上客給田宅賜奴婢馬牛羊遂成富室自爾至今二十年二千石方伯不絕祿恤甚多至於親姻知故吉凶之際必厚加贈襚來往賓僚必以酒肉飲食是故親姻朋友無憾焉國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾見翁著布衣韋帶, WYG: 員外}
