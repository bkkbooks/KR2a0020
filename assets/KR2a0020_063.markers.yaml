  - {type: variant, offset: 7441, length: 1365, content: 宗族姻表罕相祗候司徒馮誕與津少結交遊而津見其貴寵每退避及相招命多辭疾不往誕以為恨而津逾遠焉人或謂之曰司徒君之少舊宜蒙進達何遽自外也津曰為勢家所厚復何容易但全吾今日亦以足矣轉振威將軍領監曹奏事令又為直寢遷太子步兵校尉高祖南征以津為都督征南府長史至懸瓠徵加直閤將軍後從駕濟淮司徒誕薨高祖以津送柩還都遷長水校尉仍直閤景明中世宗遊於北邙津時陪從太尉咸陽王禧謀反世宗馳入華林時直閤中有同禧謀皆在從限及禧平帝顧謂朝臣曰直閤半為逆黨非至忠者安能不預此謀因拜津左中郎將遷驍騎將軍仍直閤出除征虜將軍岐州刺史津巨細躬親孜孜不倦有武功民齎絹三匹去城十里為賊所劫時有使者馳驛而至被劫人因以告之使者到州以狀白津津乃下教云有人著某色衣乘某色馬在城東十里被殺不知姓名若有家人可速收視有一老母行出而哭云是己子於是遣騎追收幷絹俱獲自是闔境畏服至於守令僚佐有瀆貨者未曾公言其罪常以私書切責之於是官屬感厲莫有犯法以母憂去職延昌末起為右將軍華州刺史與兄播前後皆牧本州當世榮之先是受調絹匹度尺特長在事因緣共相進退百姓苦之津乃令依公尺度其輸物尤好者賜以杯酒而出所輸少劣亦為受之但無酒以示其於是人競相勸官調更勝舊日還除北中郎將帶河內太守太后疑津貳己不欲使其處河山之要轉平北將軍肆州刺史仍轉幷州刺史將軍如故徵拜右衞將軍孝昌初加散騎常侍尋以本官行定州事既而近鎮擾亂侵逼舊京乃加津安北將軍假撫軍將軍北道大都督右衞尋轉左衞加撫軍將軍始津受命出據靈丘而賊帥鮮于脩禮起於博陵定州危急遂回師南赴始至城下營壘未立而州軍新敗津以賊既乘勝士衆勞疲柵壘未安不可擬敵賊必夜至則萬無一全欲移軍入城更圖後舉刺史元固稱賊既逼城不可示弱閉門不內津揮刀欲斬門者軍乃得入城賊果夜至見柵空而去其後賊攻州城東面已入羅城刺史閉小城東門城中慅擾不敢出戰津欲禦賊長史許被守門不聽津手劍擊被不中被乃走津開門出戰斬賊帥一人殺賊數百賊退人心少安詔除衞尉卿征官如故以津兄衞尉卿椿代為左衞尋加鎮軍將軍討虜都督兼吏部尚書北道行臺初津兄椿得罪此州由鉅鹿人趙略投書所致及津之至略舉家逃走津乃下教慰喻令其還業於是闔州愧服遠近稱之時賊帥薛脩禮杜洛周殘掠州境孤城獨立在兩寇之間津貯積柴粟脩理戰具更營雉堞賊每來攻機械競起又於城中去城十步掘地至泉廣作地道潛兵涌出置爐鑄鐵持以灌賊賊遂相語曰不畏利槊堅城唯畏楊公鐵星津與賊帥元洪業及與賊中督將尉靈根程殺鬼潘法顯等書曉喻之幷授鐵券許以爵位令圖賊帥毛普賢洪業等感悟復書云今與諸人密議欲殺普賢願公聽之又賊欲圍城正為取北人耳城中所有北人必須盡殺公若置之恐縱敵為患矣願公察之津以城內北人雖是惡黨然掌握中物未忍便殺但收內子城防禁而已將吏無不感其仁恕朝廷初以鐵券二十枚委津分給津隨賊中首領間行送之脩禮普賢頗亦由此而死既而杜洛周圍州城津盡力捍守詔加衞將軍封開國縣侯邑一千戶將士有功者任津科賞兵民給復八年葛榮以司徒說津津大怒斬其使以絕之自受攻圍經涉三稔朝廷不能拯赴乃遣長子遁突圍而出詣蠕蠕主阿那瓌令其討賊遁日夜泣論阿那瓌遣其從祖吐豆發率精騎一萬南出前鋒已達廣昌賊防塞隘口蠕蠕持疑遂還津長史李裔引賊踰城賊入轉衆津苦戰不敵遂見拘執洛周脫津衣服置地牢下數日欲將烹之諸賊還相諫止遂得免害津曾與裔相見對諸賊帥以大義責之辭淚俱發裔大慚典守者以相告洛周弗之責也及葛榮吞洛周復為榮所拘守榮破始得還洛永安初詔除津本將軍荊州刺史加散騎常侍當, WYG: 豫}
