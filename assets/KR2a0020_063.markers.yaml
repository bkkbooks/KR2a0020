  - {type: variant, offset: 161, length: 257, content: 擢為中散累遷給事領中起部曹以外親優賜亟加前後萬計進北部給事中詔播巡行北邊高祖親送及戶戒以軍略未幾除龍驤將軍員外常侍轉衞尉少卿常侍如故與陽平王頤等出漠北擊蠕蠕大獲而還高祖嘉其勳賜奴婢十口遷武衞將軍復擊蠕蠕至居然山而還除左將軍尋假前將軍隨車駕南討至鍾離師回詔播領步卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴陳南岸身自居後諸軍渡盡賊衆遂集於是圍播乃為圓陳以禦之身自搏擊斬殺甚多相拒再宿軍人食盡賊圍更急高祖在北而望之既無舟船不得救援水勢稍減播領精騎三百歷其舟船大呼曰今我欲渡能戰者來賊莫敢動遂擁衆而濟, WYG: ''}
