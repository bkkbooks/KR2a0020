  - {type: variant, offset: 7079, length: 3, content: 僧達歷, WYG: 伯緒維弟紀字仲烈維少襲父爵自員外郎遷給事中坐諂事高肇出為益州龍驤府長史辭疾不行太尉清河王懌輔政以維名臣之子薦為通直郎辟其弟紀行參軍靈太后臨政委任元义而义恃寵驕盈懌每以分理裁斷义甚忿恨思以害懌遂與維為計以富貴許之維見义寵勢日隆便至乾沒乃告司染都尉韓文殊父子欲謀逆立懌懌坐被録禁中文殊父子懼而逃遁鞫無反狀以文殊亡走懸處大辟置懌於宫西别館禁兵守之維應反坐义言於太后欲開將來告者之路乃黜為燕州昌平郡守紀為秦州大羌令維及紀頗渉經史而浮薄無行懌親尊懿望朝野瞻屬維受懌眷賞而無狀搆間天下人士莫不怪忿而賤薄之及义殺懌專斷朝政以維兄弟前者告懌徴維為散騎侍郎紀為太學博士領侍御史甚昵之維超遷}
