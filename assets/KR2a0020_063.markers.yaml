  - {type: variant, offset: 5075, length: 261, content: 四歷九卿十為刺史光祿大夫儀同開府司徒太保津今復為司空者正由忠貞小心謹慎口不嘗論人過無貴無賤待之以禮以是故至此耳聞汝等學時俗人乃有坐而待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來高祖以下乃有七郡太守三十二州刺史內外顯職時流少比汝等若能存禮節不為奢淫驕慢假不勝人足免尤誚足成名家吾今年始七十五自惟氣力尚堪朝覲天子所以孜孜求退者正欲使汝等知天下滿足之義為一門法耳非是苟求千載之名也汝等能記吾言百年之後終無恨矣椿還華陰踰年普泰元年七月為尒朱天光所害年七十七時人莫不寃痛之太昌初, WYG: 侍郎卒}
