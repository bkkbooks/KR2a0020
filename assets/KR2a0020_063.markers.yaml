  - {type: variant, offset: 9110, length: 1762, content: 太昌初贈都督秦華雍三州諸軍事大將軍太傅雍州刺史諡曰孝穆將葬本鄉詔大鴻臚持節監護喪事津有六子長子遁字山才其家貴顯諸子弱冠咸縻王爵而遁性澹退年近三十方為鎮西府主簿累遷尚書郎莊帝北巡奉詔慰勞山東車駕入洛除尚書左丞又為光祿大夫仍左丞永安末父津受委河北兼黃門郎詣鄴參行省事尋遷征東將軍金紫光祿大夫亦被害於洛時年四十二太昌初贈車騎大將軍儀同三司幽州刺史諡曰恭定遁弟逸字遵道有當世才度起家員外散騎侍郎以功賜爵華陰男轉給事中父津在中山為賊攻逼逸請使於尒朱榮徵師赴救詔許之建義初莊帝猶在河陽逸獨往謁帝特除給事黃門侍郎領中書舍人及朝士濫禍帝益憂怖詔逸晝夜陪侍數日之內常寢宿於御床前帝曾夜中謂逸曰昨來舉目唯見異人賴得卿差以自慰尋除吏部郎中出為平西將軍南秦州刺史加散騎常侍時年二十九於時方伯之少未有先之者仍以路阻不行改除平東將軍光州刺史逸折節綏撫乃心民務或日昃不食夜分不寢至於兵人從役必親自送之或風日之中雨雪之下人不堪其勞逸曾無倦色又法令嚴明寬猛相濟於是合境肅然莫敢干犯時災儉連歲人多餓死逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為命百姓不足君孰與足假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅以下謂公儲難闕並執不許尚書令臨淮王彧以為宜貸二萬詔聽二萬逸既出粟之後其老小殘疾不能自存活者又於州門煮粥飯之將死而得濟者以萬數帝聞而善之逸為政愛人尤憎豪猾廣設耳目其兵吏出使下邑皆自持糧人或為設食者雖在闇室終不進咸言楊使君有千里眼那可欺之在州政績尤美及其家禍尒朱仲遠遣使於州害之時年三十二吏人如喪親戚城邑村落為營齋供一月之中所在不絕太昌初贈都督豫郢二州諸軍事衞將軍尚書僕射豫州刺史諡曰貞逸弟謐字遵智辟太尉行參軍歷員外散騎常侍以功賜爵弘農伯鎮軍將軍金紫光祿大夫衞將軍在晉陽為尒朱兆所害太昌初贈驃騎將軍兗州刺史謐弟遵彥武定中吏部尚書華陰縣開國侯津弟暐字延季性雅厚頗有文學起家奉朝請稍遷散騎侍郎直閤將軍本州大中正兼武衞將軍尚食典御孝昌初正武衞將軍加散騎常侍安南將軍莊帝初遇害於河陰贈衞將軍儀同三司雍州刺史子元讓武定末尚書祠部郎中播家世純厚並敦義讓昆季相事有如父子播剛毅椿津恭謙與人言自稱名字兄弟旦則聚於廳堂終日相對未曾入內有一美味不集不食廳堂間往往幃幔隔障為寢息之所時就休偃還共談笑椿年老曾他處醉歸津扶侍還室仍假寐閤前承候安否椿津年過六十並登台鼎而津嘗旦暮參問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙箸味皆先嘗椿命食然後食津為司空於時府主皆引僚佐人就津求官津曰此事須家兄裁之何為見問初津為肆州椿在京宅每有四時嘉味輒因使次附之若或未寄不先入口椿每得所寄輒對之下泣兄弟皆有孫唯椿有曾孫年十五六矣椿常欲為之早娶望見玄孫自昱已下率多學尚時人莫不欽羨焉一家之內男女百口緦服同爨庭無間言魏世以來唯有盧淵兄弟及播昆季當世莫逮焉世隆等將害椿家誣其為逆奏請收治前廢帝不許世隆復苦執不得已下詔付有司檢聞世隆遂遣步騎夜圍其宅天光亦同日收椿於華陰東西兩家無少長皆遇禍籍其家世隆後乃奏云楊家實反夜拒軍人遂盡格殺廢帝惋悵久之不言而已知世隆縱擅無如之何永熙中椿合家歸葬華陰衆咸觀而悲傷焉播族弟鈞祖暉庫部給事稍遷洛州刺史卒贈弘農公諡曰簡父恩河間太守鈞頗有幹用自廷尉正為長水校尉中壘將軍洛陽令出除中山太守入為司徒左長史又除徐州東荊州刺史還為廷尉卿拜州刺史轉懷朔鎮將所居以強濟稱後為撫軍將軍七兵尚書北道行臺卒贈使持節散騎常侍車騎大將軍左光祿大夫華州刺史長子暄卒於尚書郎暄弟穆華州別駕穆弟儉寧遠將軍頓丘太守建義初除太府少卿尋為華州中正加左將軍儉與元顥有舊及顥入洛受其位任莊帝還宮坐免後以本將軍潁州刺史尋加散騎常侍平南將軍州罷不行普泰初除征南將軍金紫光祿大夫永熙中以本將軍除北雍州刺史仍陷關西儉弟寬自宗正丞建義初為通直散騎侍郎領河南尹丞稍遷散騎常侍安東將軍永安二年除中軍將軍太府卿後為散騎常侍驃騎將軍右光祿大夫澄城縣開國伯太昌初除給事黃門侍郎尋加驃騎大將軍除華州大中正監內典書事坐事去官永熙三年兼武衞將軍又除黃門郎隨出帝入關西儉寬皆輕薄無行為人流所鄙史臣曰楊播兄弟俱以忠毅謙謹荷內外之任公卿牧守榮赫累朝所謂門生故吏遍於天下而言色恂恂出於誠至恭德慎行為世師範漢之萬石家風陳紀門法所不過也諸子秀立青紫盈庭其積善之慶歟及胡逆擅朝淫刑肆毒以斯族而遇斯禍報施之理何相及哉, WYG: 考證}
