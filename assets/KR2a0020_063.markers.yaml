  - {type: variant, offset: 8832, length: 275, content: 又除車騎將軍左光祿大夫仍除吏部元顥內逼莊帝將親出討以津為中軍大都督兼領軍將軍未行顥入及顥敗津乃入宿殿中掃洒宮掖遣第二子逸封閉府庫各令防守及帝入也津迎於北邙流涕謝罪帝深嘉慰之尋以津為司空加侍中尒朱榮死也以津為都督幷肆燕雲朔顯汾蔚九州諸軍事驃騎大將軍兼尚書令北道大行臺幷州刺史侍中司空如故委津以討胡經略津馳至鄴手下唯羽林五百人士馬寡弱始加招募將從滏口而入值尒朱兆等便已克洛相州刺史李神等議欲與津舉城通款津不從以子逸既為光州刺史兄子昱時為東道行臺鳩率部曲在於梁沛津規欲東轉更為方略乃率輕騎望於濟州渡河而尒朱仲遠已陷東郡所圖不遂乃還京師普泰元年亦遇害於洛時年, WYG: 卷}
