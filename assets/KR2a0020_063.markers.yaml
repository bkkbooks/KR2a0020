  - {type: variant, offset: 5468, length: 555, content: 出頓於洛陽東亭朝貴畢集詔令諸王送別昱伯父播同在餞席酒酣之後廣陽王嘉北海王詳等與播論議競理播不為之屈北海顧謂昱曰尊伯性剛不伏理大不如尊使君也昱前對曰昱父道隆則從其隆道洿則從其洿伯父剛則不吐柔亦不茹一坐歎其能言肅曰非此郎何得申二公之美也延昌三年以本官帶詹事丞于時肅宗在懷抱之中至於出入左右乳母而已不令宮僚聞知昱諫曰陛下不以臣等凡淺備位宮臣太子動止宜令翼從然自此以來輕爾出入進無二傅輔導之美退闕羣僚陪侍之式非所謂示民軌儀著君臣之義陛下若召太子必降手敕令臣下咸知為後世法於是詔曰自今已後若非朕手敕勿令兒輒出宮臣在直者從至萬歲門久之轉太尉掾兼中書舍人靈太后嘗從容謂昱曰今帝年幼朕親萬機然自薄德化不能感親姻在外不稱人心卿有所聞慎勿諱隱昱於是奏揚州刺史李崇五車載貨州刺史楊鈞造銀食器十具並餉領軍元叉靈太后召叉夫妻泣而責之叉深恨之昱第六叔舒妻武昌王和之妹和即叉之從祖父舒早喪有一男六女及終喪而元氏頻請別居昱父椿乃集親姻泣而謂曰我弟不幸早終今男未婚女未嫁何怱怱便求離居不聽遂懷憾焉神龜二年瀛州民劉宣明謀反事覺逃竄叉乃使和及元氏誣告昱藏隱宣明云父定州刺史椿叔華州刺史津並送甲仗三百具謀圖不逞叉又構成其事乃遣左右御仗五百人夜圍昱宅而收之並無所獲靈太后問其狀昱具對元氏遘釁之端言至哀切太后乃解昱縛和及元氏並處死刑而叉相左右和直免官元氏, WYG: ''}
