  - {type: variant, offset: 4579, length: 492, content: 約敕諸父曰汝等後世脫若富貴於今日者慎勿積金一斤綵帛百匹已上用為富也又不聽治生求利又不聽與勢家作婚姻至吾兄弟不能遵奉今汝等服乘以漸華好吾是以知恭儉之德漸不如上世也又吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍別食也又願畢吾兄弟世不異居異財汝等眼見非為虛假如聞汝等兄弟時有別齋獨食者此又不如吾等一世也吾今日不為貧賤然居住舍宅不作壯麗華飾者正慮汝等後世不賢不能保守之方為勢家作奪北都時朝法嚴急太和初吾兄弟三人並居內職兄在高祖左右吾與津在文明太后左右于時口敕責諸內官十日仰密得一事不列便大瞋嫌諸人多有依敕密列者亦有太后高祖中間傳言構間者吾兄弟自相誡曰今忝二聖近臣母子間甚難宜深慎之又列人事亦何容易縱被瞋責慎勿輕言十餘年中不嘗言一人罪過當時大被嫌責答曰臣等非不聞人言正恐不審仰誤聖聽是以不敢言於後終以不言蒙賞及二聖間言語終不敢輒爾傳通太和二十一年吾從濟州來朝在清徽堂豫讌高祖謂諸王諸貴曰北京之日太后嚴明吾每得杖左右因此有是非言語和朕母子者唯楊椿兄弟遂舉賜四兄及我酒汝等脫若萬一蒙時主知遇宜深慎言語不可輕論人惡也吾自惟文武才藝門望姻援不勝他人一旦位登, WYG: ''}
