  - {type: variant, offset: 847, length: 391, content: 須營歐陽設交境之備今板卒已集唯聽信還佐僚咸欲以實答之云無修白捺意而侃曰白捺小城本非形勝邃好小黠今集兵遣移虛搆是言得無有別圖也稚深悟之乃云錄事可造移報侃移曰彼之纂兵想別有意何為妄構白捺也他人有心予忖度之勿謂秦無人也邃得移謂已知覺便爾散兵瓜花等以期契不會便相告發伏辜者十數家邃後竟襲壽春入羅城而退遂列營於黎漿梁城日夕鈔掠稚乃奏侃為統軍侃叔椿為雍州刺史又請為其府錄事參軍帶長安令府州之務多所委決及蕭寶夤等軍敗北地功曹毛洪賓據郡引寇抄掠渭北侃啟椿自出討之遂購募戰士信宿之間得三千餘人銜枚夜進至馮翊郡西賊見大軍卒至衆情離解洪賓遂通書送質乞求自效於是擒送宿勤明達兄子賊署南平王烏過仁後雍州刺史蕭寶夤據州反尚書僕射長孫稚討之除侃鎮遠將軍諫議大夫為稚行臺左丞尋轉通直散騎常侍軍次弘農侃白稚曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類算略抗行當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦, WYG: 盡忠輸誠}
