  - {type: variant, offset: 2789, length: 851, content: 以母老解還後武都氐楊會反假椿節冠軍將軍都督西征諸軍事行梁州刺史與軍司羊祉討破之於後梁州運糧為羣氐劫奪詔椿兼征虜將軍持節招慰尋以氐叛拜光祿大夫假平西將軍督征討諸軍事以討之還兼太僕卿秦州羌呂苟兒涇州屠各陳瞻等聚衆反詔椿為別將隸安西將軍元麗討之賊入隴守蹊自固或謀伏兵山徑斷其出入待糧盡而攻之或云斬除山木縱火焚之然後進討椿曰並非計也此本規盜非有經略自王師一至無戰不摧所以深竄者正避死耳今宜勒三軍勿更侵掠賊必謂我見險不前心輕我軍然後掩其不備可一舉而平矣乃緩師不進賊果出掠乃以軍中驢馬餌之不加討逐如是多日陰簡精卒銜枚夜襲斬瞻傳首入正太僕卿加安東將軍初顯祖世有蠕蠕萬餘戶降附居於高平薄骨律二鎮太和之末叛走略盡唯有一千餘家太中大夫王通高平鎮將郎育等求徙置淮北防其叛走詔許之慮不從命乃使椿持節往徙焉椿以為徙之無益上書曰臣以古人有言裔不謀夏夷不亂華荒忽之人覊縻而已是以先朝居之於荒服之間者正欲悅近來遠招附殊俗亦以別華戎異內外也今新附者衆若舊者見徙新者必不安不安必思土思土則走叛狐死首丘其害方甚又此族類衣毛食肉樂冬便寒南土濕熱往必將盡進失歸伏之心退非藩衞之益徙在中夏而生後患愚心所見謂為不可時八座議不從遂徙於濟州緣河居之冀州元愉之難果悉浮河赴賊所在鈔掠如椿所策永平初徐州城人成景儁以宿預叛詔椿率衆四萬討之不克而返久之除都督朔州撫冥武川懷朔三鎮三道諸軍事平北將軍朔州刺史在州為廷尉奏椿前為太僕卿日招引細人盜種牧田三百四十頃依律處刑五歲尚書邢巒據正始別格奏椿罪應除名為庶人注籍盜門同籍合門不仕世宗以新律既班不宜雜用舊制詔依寺斷聽以贖論尋加撫軍將軍入除都官尚書監修白溝堤堰復以本將軍除定州刺史自太祖平中山多置軍府以相威攝凡有八軍軍各配兵五千食祿主帥軍各四十六人自中原稍定八軍之兵漸割南戍一軍兵纔千餘然主帥如故費祿不少椿表罷四軍減其帥百八十四人州有宗子稻田屯兵八百戶年常發夫三千草三百車修補畦堰椿以屯兵惟輸此田課更無徭役及至閑月即應修治不容復勞百姓椿亦表罷朝廷從之椿在州因治黑山道餘功伐木私造佛寺役使兵力為御史所劾除名為庶人正光五年, WYG: ''}
