  - {type: variant, offset: 155, length: 233, content: 平陽太守及裕失長安辯來歸國仍立功於河際太宗授平西將軍雍州刺史賜爵汾陰侯泰常七年卒於位年四十四子謹字法順容貌魁偉頗覽史傳劉裕擒泓辟相府行參軍隨裕渡江尋轉記室參軍辯將歸國密使報謹遂自彭城來奔朝廷嘉之授河東太守後襲爵平西將軍汾陰侯謹所治與屈丐連接結士抗敵甚有威惠始光中世祖詔奚斤討赫連昌敕謹領偏師前鋒鄉導既克蒲坂世祖以新舊之民并為一郡謹仍為太守遷秦州刺史將軍如故山胡白龍憑險作逆世祖詔鎮南將軍奚眷與謹自太平北入討平之除安西將軍涪陵公刺史如故太延初征吐沒骨平之謹自郡遷州威惠, WYG: ''}
