  - {type: variant, offset: 1585, length: 1214, content: 猗氏令早卒景茂弟孝通頗有文學永安中中尉高道穆引為御史歷中書舍人中書侍郎常山太守遇惡疾而卒聰弟道智尚書郎卒子長瑜天平中為征東將軍洛州刺史擊賊潼關沒於陳贈都督冀定太三州諸軍事車騎將軍冀州刺史道智弟仙智郡功曹仙智弟曇賢卒於國子博士小子景淵尚書左民郎曇賢弟和字導穆解褐大將軍劉昶府行參軍轉司空長流參軍除太尉府主簿遷諫議大夫永平四年正月山賊劉龍駒擾亂夏州詔和發汾華東秦夏四州之衆討龍駒平之和因表立東夏州世宗從之又行正平潁川二郡事除通直散騎常侍蕭衍遣將張齊寇晉壽詔和兼尚書左丞為西道行臺節度都督傅豎眼諸軍大破齊軍正光初除左將軍南青州刺史卒於州年五十五贈安北將軍瀛州刺史長子元信武定末中軍將軍儀同開府長史和弟季令奉朝請破胡弟破氐為本州別駕早卒四子長子敬賢為鉅鹿太守破氐弟積善為中書博士臨淮王提友子隆宗太原太守寇讚字奉國上谷人因難徙馮翊萬年父脩之字延期苻堅東萊太守讚弟謙之有道術世祖敬重之故追贈脩之安西將軍秦州刺史馮翊公賜命服諡曰哀公詔秦雍二州為立碑於墓又贈脩之母為馮翊夫人及宗從追贈太守縣令侯子男者十六人其臨民者七郡五縣讚少以清素知名身長八尺姿容嚴嶷非禮不動苻堅僕射韋華州里高達雖年時有異以風味相待華為馮翊太守召為功曹後除襄邑令姚泓滅秦雍人千有餘家推讚為主歸順拜綏遠將軍魏郡太守其後秦雍之民來奔河南滎陽河內者戶至萬數拜讚安遠將軍南雍州刺史軹縣侯治于洛陽立雍州之郡縣以撫之由是流民繈負自遠而至參倍於前賜讚爵河南公加安南將軍領護南蠻校尉仍刺史分洛豫二州之僑郡以益之雖位高爵重而接待不倦初讚之未貴也嘗從相者唐文相文曰君額上黑子入幘位當至方伯封公及貴也文以民禮拜謁仍曰明公憶民疇昔之言乎爾日但知公當貴然不能自知得為州民也讚曰往時卿言杜瓊不得官長人咸謂不然及瓊被選為盩厔令卿猶言相中不見而瓊果以暴疾未拜而終昔魏舒見主人兒死自知己必至公吾常以卿言瓊之驗亦復不息此望也乃賜文衣服良馬讚在州十七年甚獲公私之譽年老表求致仕真君九年卒年八十六遺令薄葬斂以時服世祖悼惜之諡曰宣穆長子元寶襲爵為豫州別駕與安元年卒贈安南將軍豫州刺史子祖襲爵高祖時為安南將軍東徐州刺史卒子靈孫襲赭陽太守元寶弟虎皮有才器本縣令虎皮弟臻字仙勝年十二遭父憂居喪以孝稱輕財好士顯祖末為中川太守時馮熙為洛州刺史政號貪虐仙勝微能附之甚得其意轉弘農太守後以母老屢求解任久乃從之高祖初母憂未闋以農大盜張煩等賊害良善徵為都將與荊州刺史公孫初頭等追揃之拜振武將軍比陽鎮將有威惠之稱遷建威將軍郢州刺史及高祖南遷郢州地為王畿除弘農太守坐受納為御史所彈遂廢卒於家長子祖訓順陽太守祖訓弟治字祖禮自洛陽令稍遷鎮遠將軍東荊州刺史代下之後蠻民以刺史酈道元峻刻請治為刺史朝議以邊民宜悅乃以治代道元進號征虜將軍坐遣戍兵送道元免官治兄弟並孝友敦穆白首同居父亡雖久而猶於平生所處堂宇備設幃帳几杖以時節開堂列拜垂淚陳薦若宗廟然吉凶之事必先啟告遠出行反亦如之治世宗末遷前將軍河州刺史在任數年遇却鐵怱反又為城民詣都列其貪狀十六條會赦免, WYG: 囚繫}
