  - {type: variant, offset: 885, length: 672, content: 假平南將軍為幹副軍行達裒父以蕭賾死班師又為都將共討秦州反敗支酉生擒斬之除立忠將軍河北太守郡帶山河路多盜賊有韓馬兩姓各二千餘家恃強憑險最為狡害劫掠道路侵暴鄉閭胤至郡之日即收其姦魁二十餘人一時戮之於是羣盜懾氣郡中清肅二十三年秋遇疾卒於郡時年四十四諡曰敬子裔字豫孫襲爵性豪爽盛營園宅賓客聲伎以恣嬉遊歷尚書左外兵郎左軍將軍遷征虜將軍中散大夫出為洛州刺史卒贈平西將軍岐州刺史子孝紳襲爵稍遷前將軍太中大夫孝紳立行險薄坐事為河南尹元世儁所劾死後贈征西將軍華州刺史胤弟字崇業廣平王懷郎中令汝陰太守子修仁司空行參軍修仁弟玄景陳留太守拔弟洪隆字菩提解褐陽平王國常侍稍遷河東太守長子驎駒好讀書舉秀才除中書博士太和九年蕭賾使至乃詔驎駒兼主客郎以接之十年秋遇疾卒時年三十五贈寧朔將軍河東太守諡曰宣長子慶之字慶集頗以學業聞解褐奉朝請領侍御史遷廷尉丞廷尉寺隣接北城曾夏日於寺傍執得一狐慶之與廷尉正博陵崔纂或以城狐狡害宜速殺之或以長育之月宜待秋分二卿裴廷儁袁翻互有同異雖曰戲謔詞義可觀事傳於世轉尚書郎兼尚書左丞為并肆行臺賜爵龍丘子行并州事遷征虜將軍滄州刺史為葛榮攻圍城陷尋患卒後贈右將軍華州刺史慶之弟英集性通率隨舅李崇在揚州積年以軍功歷司徒鎧曹參軍稍遷治書侍御史通直散騎常侍卒驎駒弟鳳子自徙都洛邑鳳子兄弟移屬華州河西郡焉太和二年為太子詹事丞本州中正世宗登阼轉太尉府鎧曹參軍稍遷治書侍御史正始初為持節征義陽軍司還京其年秋卒時年四十九贈陵江將軍光城太守鳳子弟驥奴州主簿洪隆弟破胡州治中別駕稍遷河東太守征仇池都將有六子長子聰字延智有世譽累遷治書侍御史直閣將軍為高祖所知世宗踐阼除輔國, WYG: 鎮逺}
