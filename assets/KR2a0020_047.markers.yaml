  - {type: variant, offset: 4435, length: 417, content: 州刺史惲後與唐州刺史崔元珍固守平陽武泰中尒朱榮稱兵赴洛惲與元珍不從其命為榮行臺郎中樊子鵠所攻城陷被害時年三十六世咸痛惜之所作文章頗行於世撰慕容氏書不成子懷則武定末司空長流參軍夔弟神期中書博士神期弟顯度司州秀才尚書庫部郎韓秀字白虎昌黎人也祖宰慕容儁謁者僕射父昞皇始初歸國拜宣威將軍騎都尉秀歷吏任稍遷尚書郎賜爵遂昌子拜廣武將軍高宗稱秀聰敏清辨才任喉舌遂命出納王言并掌機密行幸遊獵隨侍左右顯祖踐阼轉給事中參征南慕容白曜軍事延興中尚書奏以敦煌一鎮介遠西北寇賊路衝慮或不固欲移就涼州羣官會議僉以為然秀獨謂非便曰此蹙國之事非闢土之宜愚謂敦煌之立其來已久雖土隣強寇而兵人素習縱有姦竊不能為害循常置戍足以自全進斷北狄之覘途退塞西夷之闚路若徙就姑臧慮人懷異意或貪留重遷情不願徙脫引寇內侵深為國患且敦煌去涼州及千餘里捨遠就近遙防有闕一旦廢罷是啟戎心則夷狄交構互相來往恐醜徒協契侵竊涼土及近諸戍則關右荒擾烽警不息邊役煩興艱難方甚乃從秀議太和初遷內侍長後為平, WYG: ''}
