  - {type: variant, offset: 4140, length: 0, content: '', WYG: 幽州刺史尋加衞大將軍卒於官贈都督幽瀛二州諸軍事驃騎大將軍尚書右僕射司空公瀛州刺史諡曰恭文公主二子昌㝢昌仁昌㝢不慧昌仁早卒道䖍又娶司馬氏有子昌裕及司馬見出之後更娶元氏生二子昌期昌衡兄弟競父爵至今未襲道䖍弟道偘字希祖州主簿沉雅有學尚孝昌末卒二子早夭以弟道約子正達為後武定中征虜將軍太尉記室參軍道偘弟道和字叔維兄弟之中人望最下冀州中軍府中兵參軍卒子景豫景豫弟景熙武定中儀同開府諮議道和弟道約字季恭起家員外郎累遷司空錄事參軍司徒屬幽州大中正輔國將軍光禄大夫轉司徒右長史太傅李延實出除青州延實先被病道約延實之妻弟詔以道約為延實長史加散騎常侍寄以匡維也永熙中車騎將軍左光禄大夫領廣平王贊儀同開府長史天平中開府儀同髙岳請為長史岳轉除青冀二州道約仍為長史隨岳兩藩有毗佐之稱興和末除衞大將軍兗州刺史在州頗得民和武定元年卒年五十八贈使持節驃騎大將軍儀同三司幽州刺史子正通開府諮議少有令譽徵赴晉陽遇患卒妻鄭氏與正通弟正思淫亂武定中為御史所劾人士疾之道約弟道舒字幼安襲父爵自尚書左主客郎中為冠軍將軍中書侍郎卒淵弟敏字仲通小字紅崖少有大量太和初拜議郎早卒贈威逺將軍范陽太守諡曰靖髙祖納其女為嬪敏五子義僖字逺慶早有學尚識度沉雅年九歲喪父便有至性少為僕射李沖所歎美起家祕書郎歴太子舍人司徒中郎神龜初任城王澄奏舉義僖除散騎侍郎轉冠軍將軍中散大夫以母憂去職幽州刺史王誦與義僖交款每與舊故李神儁等書曰盧冠軍在此時復惠好輒留連數日得諮詢政道其見重若此齊王蕭寳夤啓為開府諮議參軍辭疾不赴尋兼司空長史拜征虜將軍太中大夫散秩多年澹然自得李神儁勸其干謁當途義僖曰學先王之道貴行先王之志何能茍求富貴也孝昌中除散騎常侍時靈太后臨朝黄門侍郎李神軌勢傾朝野求結㛰姻義僖慮其必敗拒而不許王誦謂義僖曰昔人不以一女易五男卿豈易之也義僖曰所以不從正為此耳從之恐禍大而速誦乃堅握義僖之手曰我聞有命不敢以告人遂適他族臨㛰之夕靈太后遣中常侍服景就家勑停内外惶怖義僖夷然自若建義初兼都官尚書尋除安東將軍衛尉卿普泰中除都官尚書加驃騎大將軍左光祿大夫義僖少時幽州頻遭水旱先有穀數萬石貸民義僖以年穀不熟乃燔其契州閭悅其恩徳性寛和畏慎不妄交款與魏子建情好尤篤言無所隱義僖性清儉不營財利雖居顯位每至困乏麥飯蔬食忻然甘之永熙中風疾頓發興和中卒年六十四贈大將軍儀同三司瀛州刺史諡孝簡子遜之武定中太尉記室參軍遜之弟世猷齊王開府集曹參軍義僖弟義悰字叔預司空行參軍本州治中散騎侍郎司徒諮議參軍子孝章儀同開府行參軍早亡義悰弟義敦字季和征北府黙曹參軍子景開字子達武定中儀同開府屬義敦弟義安字幼仁不仕義僖諸弟竝逺不逮兄也敏弟昶字叔達小字師顔學涉經史早有時譽太和初為太子中舍人兼員外散騎常侍使於蕭昭業髙祖詔昶曰卿便至彼勿存彼我宻邇江揚不早當晚會是朕物卿等欲言便無相疑難又勑副使王清石曰卿莫以本是南人言語致慮若彼先有所知所識欲見便見須論即論盧昶正是寛柔君子無多文才或主客命卿作詩可率卿所知莫以昶不作便復罷也凡使人之體以和為貴勿遞相矜誇見於色貌失將命之體卿等各率所知以相規誨及昶至彼値蕭鸞僭立於是髙祖南討之昶兄淵為別道將而蕭鸞以朝廷加兵遂酷遇昶等昶本非骨鯁聞南人云兄既作將弟為使者乃大恐怖淚汗交横鸞以腐米臭魚莝豆供之而謁者張思寧辭氣謇諤曾不屈撓遂以壯烈死於舘中昶還髙祖責之曰銜命之禮有死無辱雖流放海隅猶宜抱節致殞卿不能長纓羇首已是可恨何乃俛眉飲啄自同犬馬有生必死修短幾何卿若殺身成名貽之竹素如何甘彼芻菽以辱君父乎縱不逺慙蘇武寧不近愧思寧昶對曰臣器乏陸隨忝使閩越屬蕭鸞昬狂誅戮無道恐不得仰奉明時歸養老母茍存尺蠖屈以求伸負辱朝命罪宜萬死乞歸司㓂伏聴斧鉞遂見罷黜久之復除彭城王友轉祕書丞景明初除中書侍郎遷給事黄門侍郎本州大中正昶請外禄世宗不許遷散騎常侍兼尚書時洛陽縣獲白䑕昶奏曰謹案瑞典外鎮刺史二千石令長不祗上命刻暴百姓人民怨嗟則白䑕至臣聞禎不虛見徳合必符妖不妄出咎彰則至是以古之人君或怠瑞以失徳或祗變而立功斯乃萬古之殷鑒千齡之炯誡比者災氣作沴恒陽虧度陛下流如傷之慈降納隍之㫖哀百姓之無辜引在予之深責舉賢黜佞之詔道映於堯先進思納諫之言事光於舜右伏讀明㫖俯觀徵譴敢布庸瞽以陳萬一竊惟一夫之耕食裁充口一婦之織衣止蔽形年租歲調則惟常理此外徵求於何取足然自比年以來兵革屢動荆揚二州屯戍不息鍾離義陽師旅相繼兼荆蠻凶狡王師薄伐暴露原野經秋淹夏汝潁之地率户從戎河冀之境連丁轉運又戰不必勝加之退負死喪離曠十室而九細役煩徭日月滋甚苛兵酷吏因逞威福至使通原遥畛田蕪罕耘連村接閈蠶飢莫食而監司因公以貪求豪彊恃私而逼掠遂令鬻短褐以益千金之資制口腹而充一朝之急此皆由牧守令長多失其人郡闕黄霸之君縣無魯恭之宰不思所以安民正思所以潤屋故士女呼嗟相望於道路守宰暴貪風聞於魏闕往歲法官案騐多挂刑網謂必顯戮以明勸誡然後遣使覆訊公違憲典或承風俠請輕樹私恩或容情受賄輒施已惠御史所劾皆言誣枉申雪罪人更云清白長侮上之源滋陵下之路忠清之人見之而自怠犯暴之夫聞之以益快白䑕之至信而有徵矣伏願陛下垂叡喆之鑒察妖災之起延對公卿廣詢庶政引見樞納博求民隱存問孤寡去其苛碎輕徭省賦與民休息貞良忠讜置之於朝姦回貪佞棄之於市則九官勿戒而恒敬百縣不嚴而自肅士女欣欣人有望矣詔曰朕纂承鴻緒伏膺寳厯思靖八方惠康四海當必世之期麟鳳不降屬勝殘之會白䑕告咎萬邦有罪實唯朕躬尚書敷納機猷獻替是寄讜言有聞朕實嘉美轉侍中又兼吏部尚書尋即正仍侍中昶守職而已無所激揚也與侍中元暉等更相朋附為世宗所寵時論鄙之出除鎮東將軍徐州刺史永平四年夏昶表曰蕭衍琅邪郡民王萬壽等款誠内結濳來詣臣云胊山戍今將交換有可圖之機臣即許以旌賞遣其還入至三月二十四夜萬壽等奬率同盟攻掩胊城斬衍輔國將軍琅邪東莞二郡太守帶朐山戍主劉晰并將士四十餘人傳首至州臣即遣兼郯城戍副張天惠率驍勇二百徑往赴之琅邪諸戍絡繹繼援而衍郁洲已遣二軍以拒天惠天惠與萬夀等内外齊擊俘斬數百便即據城詔昶曰彭宋地接邊疆勢連淮海威禦之術功在不易朐山險塞宼之要防水陸交湊揚郁路衝畜聚凶徒䖍劉邊鄙青光齊兗每罹其患卿妙算既敷克城殄衆展疆闢土何善如之庸勲之懋朕用嘉止故遣左右直長閻遵業具宣往懷此戍郁洲之本存亡所繫今既失守有不存之心彼見扼喉將圖救援之計今水雨盛行宜須防守卿可深思擬捍之規攘敵之略使還具聞昶又表蕭衍將張稷馬仙琕陰䖍和等各領精兵分屯諸堰昌義之張惠紹王神念王茂光承彼傳信續發建鄴自存之計并歸於此量力準宼事恐不輕何者此兵九千賊衆四萬名將健士逺近畢集邀憑兩熱決死來戰藉衆乗凶希固巢穴所以傾國而舉非為朐山將恐王師固六里據湖衝南截淮浦勢崩難測海利鹽物交闕常貢所慮在大有必爭之心若皇家經略方有所討必須簡將增兵加益糧仗與之亢擬相持至秋天麾一動開拓為易圖南之計事本在今請增兵六千米十萬石如其不也伏聽朝議昶又表賊徒大集衆旅彊盛置柵朐山屯守門井幷圍固城晝夜連戰恐狡勢既彊後難除揃輙欲令征虜將軍趙遐率勒見兵與之決勝遐慮衆少不敵若一舉失利則衆心挫怯求待大衆俱至奮銳擊之竊謂此謀非為孟浪具臣本奉朝規令相拒守以待涼月今歲已云秋髙風漸舉經算大圖時事既至且鮑口以東陸連無閡朐固之間本無停潦宜時掩擊邊陲而賊自夏以來貫甲不歇從六里以北城柵相連役使兵人便已疲殆若大衆臨之必可禽㨗一城退潰衆壘土崩乘勝圖之易於振朽脫兵不速至長彼熾心軍士憂惶自生異議請速簡配以及事機詔曰克獲朐山計本於昶乘勝之規終宜有寄是以起兵之始即委處分前機經略一以任之今既請兵理宜速遂可遣冀定瀛相四州中品羽林虎賁四千人赴之又詔昶曰朐山之克寔由於卿開疆拓土實為長策然經討未服非卿而誰而蟻徒送死規侵王略天亡小賊數在無逺故前者命卿親臨指授尋以卿疾未瘳且待消息今既痊復宜遵前㫖秉戈揮銳殄宼為懷已發虎旅五萬應機電赴指辰而至遂卿本請截彼東南亮委髙算又詔昶曰取朐置戍並是卿計始終成敗悉歸於卿卿以兵少請益今已遂卿本意如聞東唐陸道甚狹一軌之外皆是大水彼必據之以斷軍路若已如此更設何策其軍竒兵變遽以表聞又聞衍軍將帥每有流言云魏博淮陽宿豫乃是兩宜若實有此卿可量朐山薪水得支幾時脫事容往返馳驛速聞如薪水少急即可量計若理不可爾亦將軍裁决昶既儒生本少將略又羊祉子燮為昶司馬專征戎事掩昶耳目將士怨之朐山戍主傅文驥糧樵俱罄以城降衍昶見城降於是先走退諸軍相尋奔遁遇大寒雪軍人凍死及落手足者三分而二自國家經略江左唯有中山王英敗於鍾離昶於朐山失利最為甚焉世宗遣黄門甄琛馳驛鏁昶窮其敗狀詔曰朐山之敗傷損實深推始究末罪鍾元帥雖經大宥輕重宜別昶一人可以免官論坐自餘將統以下悉聽依赦復任未幾拜太常卿仍除安西將軍雍州刺史又進號鎮西將軍加散騎常侍熙平元年卒於官贈征北將軍冀州刺史諡曰穆昶寛和矜恕善於綏撫其在徐州戍兵疾親自檢恤至番兵年滿不歸容充後役終昶一政然後始還人庶稱之子元聿字仲訓無他才能尚髙祖女義陽長公主拜駙馬都尉位太尉司馬光禄大夫卒贈中書監子士晟儀同開府掾元聿第五弟元明字幼章渉歴羣書兼有文義風彩閒潤進退可觀永安初長兼尚書令臨淮王彧欽愛之及彧開府引為兼屬仍領部曲出帝登阼以郎任行禮封城陽縣子遷中書侍郎永熙末居洛東緱山乃作幽居賦焉於時元明友人王由居潁川忽夢由攜酒就之言別賦詩為贈及明憶其詩十字云自兹一去後市朝不復遊元明歎曰由性不狎俗旅寄人間乃今有夢又復如此必有他故經三日果聞由為亂兵所害尋其亡日乃是得夢之夜天平中兼吏部郎中副李諧使蕭衍南人稱之還拜尚書右丞轉散騎常侍監起居積年在史館了不厝意又兼黄門郎本州大中正元明善自標置不妄交遊飲酒賦詩遇興忘返性好𤣥理作史子新論數十篇文筆別有集錄少時常從鄉還洛途遇相州刺史中山王熙熙博識之士見而歎曰盧郎有如此風神唯須誦離騷飲美酒自為佳器遂留之數日贈帛及馬而別元明凡三娶次妻鄭氏與元明兄子士啓淫汙元明不能離絶又好以世地自矜時論以此貶之元明弟元緝字幼緒凶率好酒曾於婦氏飲宴小有不平手刃其客起家祕書郎轉司徒祭酒稍遷輔國將軍司徒司馬卒於官贈散騎常侍都督幽瀛二州諸軍事驃騎大將軍吏部尚書幽州刺史諡曰宣子士深開府行參軍昶弟尚之字季儒小字羡夏亦以儒素見重太和中拜議郎轉趙郡王征東諮議參軍母憂去官後為太尉主簿司徒屬范陽太守章武内史兼司徒右長史加冠軍將軍轉左長史}
