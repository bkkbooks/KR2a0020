  - {type: variant, offset: 4128, length: 1, content: 領, WYG: 尚書奪常侍禄一周尋除豫州刺史以母老固辭會蕭昭業雍州刺史曹虎遺使請降乃以淵為使持節安南將軍督前鋒諸軍徑赴樊鄧淵面辭曰臣本儒生頗聞爼豆軍旅之事未之學也惟陛下栽之軍期已逼髙祖不許淵曰但恐曹虎為周魴耳陛下宜審之虎果偽降淵至葉具曹虎譎詐之問兼陳其利害詔淵進取南陽淵以兵少糧乏表求先攻赭陽以近葉倉故也髙祖許焉乃進攻赭陽蕭鸞遣將垣歴生來救淵素無將略為賊所敗坐免官爵為民尋遭母憂髙祖遣謁者詣宅宣慰服闋兼太尉長史髙祖南討又兼彭城王中軍府長史尋為徐州京兆王愉兼長史賜絹百疋愉既年少事無巨細多決於淵淵以誠信御物甚得東南民和南徐州刺史沈陵密謀外叛淵覺其萌漸濳勑諸戍微為之備屢有表聞朝廷不納陵果殺將佐勒宿豫之衆逃叛濱淮諸戍由備得全陵在邊歴年陰結既廣二州人情咸相扇惑陵之餘黨頗見執送淵皆撫而赦之惟歸罪於陵由是衆心乃安景明初除祕書監二年卒官年四十八贈安北將軍幽州刺史復本爵固安伯諡曰懿初湛父志法鍾繇書傳業累世有能名至邈以上兼善草迹淵習家法代京宫殿多淵所題白馬公崔元伯亦善書世傳衞瓘體魏初工書者崔盧二門淵與僕射李沖特相友善沖重淵門風而淵私沖才官故結為㛰姻往來親密至於淵荷髙祖意遇頗亦由沖淵有八子長子道將字祖業應襲父爵而讓其第八弟道舒有司奏聞詔曰長嫡承重禮之大經何得輒授也而道將引清河國王常侍韓子熙讓弟仲穆魯陽男之例尚書李平重申奏詔乃聽許道將涉獵經史風氣謇諤頗有文才為一家後來之冠諸父竝敬憚之彭城王勰任城王澄皆虛襟相待勰為中軍大將軍辟行參軍遷司徒東閤祭酒尚書左外兵}
