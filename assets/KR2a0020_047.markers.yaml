  - {type: variant, offset: 2824, length: 669, content: 遷金紫光祿大夫是時蠻反於三餢治為都督追討戰沒贈持節都督雍華岐三州諸軍事衞大將軍七兵尚書雍州刺史昌平男治弟彌兼尚書郎為城陽王徽所親待永安末徽避尒朱兆脫身南走歸命於彌彌不納遣人加害時論深責之後沒關西治長子朏之字長明自直後奉朝請再遷鎮遠將軍諫議大夫仍直後建義中出除冠軍將軍東荊州刺史兼尚書為荊郢行臺代遷除征虜將軍普泰中襲爵又為東荊州刺史永熙中鎮東將軍金紫光祿大夫武定四年卒年五十八酈範字世則小名記祖范陽涿鹿人祖紹慕容寶濮陽太守太祖定中山以郡迎降授兗州監軍父嵩天水太守範世祖時給事東宮高宗踐阼追錄先朝舊勳賜爵永寧男加寧遠將軍以治禮郎奉遷世祖恭宗神主於太廟進爵為子征南大將軍慕容白曜南征範為左司馬師次無鹽劉彧戍主申纂憑城拒守識者僉以攻具未周不宜便進範曰今輕軍遠襲深入敵境無宜淹留久稽機候且纂必以我軍來速不去攻守謂方城可憑弱卒可恃此天亡之時也今若外潛威形內整戎旅密厲將士出其非意可一攻而克之白曜曰一日縱敵數世之患今若舒遲民心固矣司馬之策是也遂潛軍偽退示以不攻纂果不設備於是即夜部分旦便騰城崇朝而克白曜將盡以其人為軍實範曰齊四履之地世號東秦不遠為經略恐未可定也今皇威始被民未霑澤連城有懷貳之將比邑有拒守之夫宜先信義示之軌物然後民心可懷二州可定白曜曰此良策也乃免之進次肥城白曜將攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且見無鹽之卒死者塗炭成敗之機足為鑒矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰白曜目範於衆曰此行也得卿三齊不足定矣軍達升城劉彧太原太守房崇吉棄母妻東走彧青州刺史沈文秀遣其寧朔將軍張元孫奉牋歸款請軍接援白曜將遣偏師, WYG: 徵}
