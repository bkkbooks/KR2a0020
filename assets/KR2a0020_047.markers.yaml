  - {type: variant, offset: 3957, length: 4, content: 勤能致遠, WYG: 同軌無征守庸之君或緣志劣寢伐今若喻之英皇時非昔類比之庸后意有恧焉脫元極之尊本不宜駕二公之徒革輅之戎寧非謬歟尋夫昔人若必須已而濟世豈不克廣先業也定火之雄未聞不武世祖之行匪皆疑懾且曹操勝袁蓋由徳義内舉苻堅瓦解當縁立政未至定非敝卒之力彊十萬之衆寡也今則驅馳先天之術駕用仁義之師審觀成敗庶免斯咎長江之阻未足可憚踰紀之略何必可師洞庭彭蠡竟非殷固奮臂一呼或成漢業經略之義當付之臨機足食之籌望寄之蕭相將希混一豈好輕動利見之事何得委人也又水旱之運未必由兵堯湯之難詎因興旅頗豐之後}
