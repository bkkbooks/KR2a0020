  - {type: variant, offset: 675, length: 172, content: 平陽公三年拔與南兗州刺史游明根南陽平太守許含等以治民著稱徵詣京師顯祖親自勞勉復令還州太和六年改爵為河東公八年三月詔拔入朝暴病卒年五十八贈左光祿大夫諡曰康長子胤字寧宗少有父風弱冠拜中散襲爵鎮西大將軍河東公除懸瓠鎮將蕭賾遣將寇邊詔胤為都將與穆亮等拒於淮上尋授持節義陽道都將十四年文明太后公除高祖詔諸刺史鎮將曾經近侍者皆聽赴闕胤隨例入朝屬開革五等降公, WYG: ''}
