  - {type: variant, offset: 4132, length: 0, content: '', WYG: 祕書丞出為燕郡太守道將下車表樂毅霍原之墓而為之立祠優禮儒生勵勤學業敦課農桑墾田歲倍入為司徒司馬卒贈龍驤將軍太常少卿諡曰獻所為文章數十篇子懷祖太學博士員外散騎侍郎卒懷祖弟懷仁武定中太尉鎧曹參軍道將弟亮字仁業不仕而終子思道亮弟道裕字寧祖少以學尚知名風儀兼美尚顯祖女樂浪長公主拜駙馬都尉太子舍人尋轉洗馬遷散騎侍郎轉安逺將軍中書侍郎兼祕書丞尋以母憂去官服終復拜中書侍郎遷龍驤將軍太子中庶子幽州大中正轉長兼散騎侍郎加左將軍神龜二年除左將軍涇州刺史其年七月卒官年四十四贈撫軍將軍青州刺史賜帛三百匹諡曰文侯子景緒武定中儀同開府錄事參軍道裕弟道䖍字慶祖粗閑經史兼通算術尚髙祖女濟南長公主公主驕淫聲穢遐邇先無疹患倉卒暴薨時云道䖍所害世宗祕其醜惡不苦窮治尚書嘗奏道䖍為國子博士靈太后追主薨事乃黜道䖍為民終身不仕孝昌末臨淮王彧因將出征啓除道䖍奉車都尉道䖍外生李彧尚莊帝姊豐亭公主因相藉託永安中除}
