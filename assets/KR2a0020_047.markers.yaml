  - {type: variant, offset: 3936, length: 2, content: 身非, WYG: 意以為何如對曰此自古所慎如臣愚意宜更簡卜髙祖曰以先后之姪朕意已定淵曰雖奉勑如此然於臣心實有未盡及朝臣集議執意如前馮誕有盛寵深以為恨淵不以介懷及髙祖議伐蕭賾淵表曰臣誠識不周覽頗尋篇籍自魏晉以前承平之世未有皇輿親御六軍決勝行陣之間者勝不足為武弗勝有虧威徳明千鈞之弩不為鼷鼠發機故也昔魏武以敝卒一萬而袁紹土崩謝元以歩兵三千而苻堅瓦解勝負不由衆寡成敗在於須臾若用田豐之謀則坐制孟徳矣魏既并蜀迄于晉世吳介有江水居其上流大小勢殊徳政理絶然猶君臣協謀垂數十載逮孫皓暴戾上下攜爽水陸俱進一舉始克今蕭氏以簒殺之燼政虐役繁又支屬相屠人神同棄吳㑹之民延踵皇澤正是齊軌之期一同之會若大駕南巡必左袵革面閩越倒戈其猶運山壓卵有征無戰然愚謂萬乗親戎轉漕難繼千里饋糧士有饑色大軍之後必有凶年不若命將簡銳盪滌江右然後鳴鸞巡省告成東岳則天下幸甚率土戴頼臣又聞流言關右之民自比年以來競設齋會假稱豪貴以相扇惑顯然於衆坐之中以謗朝廷無上之心莫此之甚愚謂宜速懲絶戮其魁帥不爾懼成黄巾赤眉之禍育其微萌不芟之毫末斧斤一加恐蹈害者衆臣世奉皇家義均休戚誠知干忤之愆實深然不忠之罪莫大詔曰至徳雖一樹}
