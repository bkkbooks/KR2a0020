  - {type: variant, offset: 3494, length: 336, content: 之範曰桑梓之戀有懷同德文秀家在江南青土無墳栢之累擁衆數萬勁甲堅城強則拒戰勢屈則走師未逼之朝夕無患竟何所畏已求援軍且觀其使詞煩而顏愧視下而志怯幣厚言甘誘我也若不遠圖懼虧軍勢既進無所取退逼強敵羝羊觸蕃羸角之謂未若先守歷城平盤陽下梁鄒克樂陵然後方軌連鑣揚旌直進何患不壺漿路左以迎明公者哉白曜曰卿前後納策皆不失衷今日之算吾所不取何者道固孤城裁能自守盤陽諸戍勢不野戰文秀必克殄意在先誠天與不取後悔何及範曰短見猶謂不虛歷城足食足兵非一朝可拔文秀既據東陽為諸城根本多遣軍則歷城之固不立少遣衆則無以懼敵心脫文秀還叛閉門拒守偏師在前為其所挫梁鄒諸城追擊其後文秀身率大軍必相乘迫腹背受敵進退無途雖有韓白恐無全理願更思審勿入賊計中白曜乃止遂表範為青州刺史以撫新民後進爵為侯加冠軍將軍遷尚書右丞後, WYG: 京}
