  - {type: variant, offset: 4120, length: 1, content: 款, WYG: 者數萬口唯梟首惡餘悉不問詔兼侍中初淵年四十嘗詣長安將還諸相餞送者五十餘人別於渭北有相者扶風人王伯達曰諸君皆不如此盧郎雖位不副實然徳聲甚盛望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言叙平生未幾拜儀曹尚書髙祖考課在位降淵}
