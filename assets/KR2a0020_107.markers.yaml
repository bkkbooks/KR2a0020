  - {type: variant, offset: 8960, length: 2, content: 擊走, WYG: 井咸姤六月鼎豐渙履遯七月恒節同人損否八月巽萃大畜賁觀九月歸妹无妄明夷困剥十月艮既濟噬嗑大過坤四正為方伯中孚為三公復為天子屯為諸侯謙為大夫睽為九卿升還從三公周而復始九三應上九清浄微温陽風九三應上六絳赤決温隂雨六三應上六白濁微寒隂雨六三應上九麴塵決寒陽風諸卦上有陽爻者陽風上有隂爻者隂雨推七十二候術曰因冬至大小餘即虎始交日加大餘五小餘四百四十一小分八微分一微分滿三從小分小分滿氣法從小餘小餘滿蔀從大餘命以紀算外所候日冬至虎始交芸始生荔挺出小寒蚯蚓結麈角解水泉動大寒鴈北向鵲始巢雉始雊立春鷄始乳東風解凍蟄蟲始振雨水魚上冰獺祭魚鴻鴈來驚蟄始雨水桃始華倉庚鳴春分鷹化鳩𤣥鳥至雷始發聲清明電始見蟄蟲咸動蟄蟲啓戸穀雨桐始花田鼠為鴽虹始見立夏萍始生戴勝降於桑螻蟈鳴小滿蚯蚓出王瓜生苦菜秀芒種靡草死小暑至螳蜋生夏至鵙始鳴反舌無聲鹿角解小暑蟬始鳴半夏生木槿榮大暑温風至蟋蟀居壁鷹乃學習立秋腐草為螢土潤溽暑凉風至處暑白露降寒蟬鳴鷹祭鳥白露天地始肅暴風至鴻鴈來秋分𤣥鳥歸羣鳥養羞雷始收聲寒露蟄蟲附戸殺氣浸盛陽氣始衰霜降水始涸鴻鴈來賓雀入大水化為蛤立冬菊有黄華豺祭獸水始冰小雪地始凍雉入大水化為蜃虹藏不見大雪冰始壯地始坼鶡旦不鳴術曰因冬至虎始交後五日一候推上朔法置入紀年減一加八以六律乗}
