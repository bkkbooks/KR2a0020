  - {type: variant, offset: 8863, length: 8, content: 姓擾動蠻自相督率, WYG: 五十算外壬子歳入甲申紀以來至今孝昌二年歳在丙午積四萬六千五百五十四算外從壬子元以來至今大魏孝昌三年歳次丁未積十六萬七千七百五十六算上壬子歳入甲寅紀以來至今大魏孝昌三年歳次丁未積四萬六千五百五十六算上章歳五百五古十九年七閏閏餘盡為章積至多年月盡之日月見東方日蝕先晦輒復變厯以同天象二百年多一日三百年多一日半晦朔失故先儒及緯文皆言二百年斗厯改憲候天減閏五百五年減閏餘一九千五百九十五年減一閏月則從僖公五年至今日蝕不失晦與二日合朔者多閏餘成月餘盡為章章閏一百八十六五百五年閏月之數其中減舊十九分之一章月六千二百四十六五百五年所有月之數并閏月蔀法六千六十十二章為一蔀至此年小餘成日為度法斗分一千四百七十七四分度法得一千五百一十五為古法今減三十八者從僖公五年以來減七日有竒謂為最近一百二十三歳減闕日減之太深是以三十餘年改徙四子也紀法六萬六百十蔀成紀大餘十也統法十}
