  - {type: variant, offset: 9094, length: 2, content: 官德, WYG: 曹參軍信都芳芳關通厯術駮業興曰今年十二月二十日新厯在營室十二度順疾天上歳星在營室十一度今月二十日新厯鎮星在角十一度留天上鎮星在亢四度留今月二十日新厯太白在斗二十五度晨見逆行天上太白在斗二十一度逆行便為差殊業興對曰歳星行天伺候以來八九餘年恒不及二度今新厯加二度至於夕伏晨見纎毫無爽今日仰看如覺二度及其出沒還應如術鎮星自造壬子元以來歳常不及故加壬子七度亦知猶不及五度適欲并加恐出沒頓校十度十日將來永用不合處多太白之行頓疾頓遲取其㑹歸而已近十二月二十日晨見東方新舊二厯推之分寸不異行星三日頓校四度如此之事無年不有至其伏見還依術法又芳唯嫌十二月二十日星有前却業興推步已來三十餘載上算千載之日月星辰有見經史者與涼州趙􅜫劉義隆廷尉卿何承天劉駿南徐州從事史祖冲之參校業興甲子元厯長於三厯一倍考洛京已來四十餘歳五星出沒歳星鎮星太白業興厯首尾恒中及有差處不過一日二日一度兩度三厯之失動校十日十度熒惑一星㐲見體自無常或不應度祖沖之厯多甲子厯十日六度何承天厯不及三十日二十九度今厯還與壬子同不有加增辰星一星沒多見少及其見時與厯無舛今此亦依壬子元不改太白辰星唯起夕合為異業興以天道髙逺測步難積五行伏留推考不易入目仰闚未能盡宻但取其見伏大歸略其中間小謬如此厯便可行若專據所見之驗不取出沒之效則厯數之道其幾廢矣夫造厯者節之與朔貫穿於千年之間閠餘斗分推之於毫釐之内必使盈縮得𠂻間限數合周日小分不殊錙銖陽厯隂厯纎芥無爽損益之數驗之交㑹日所居度考之月蝕上推下減先定衆條然後厯元可求猶甲子難值又雖值甲子復有差分如此踳駮參錯不}
