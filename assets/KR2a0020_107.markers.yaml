  - {type: variant, offset: 8886, length: 1, content: 統, krp: 年之閏分周天分二百二十一萬三千三百七十七以度法通三百六十五度内斗分氣法二十四歳中十三年一十二次次有初中分二十四經月大餘二十九小餘三萬九千七百六十九日法除周天分得之日法者一蔀之月數周天分者一蔀之日數以用月除衆日得一月二十九及餘是周天分即為月通㑹數百七十三餘二萬三千二百八五月二十三分月之二十為一會以二十三乗五月内二十得一百三十五以乗周天分以二十三乗日法除之得一百七十三及餘㑹通一千二百九十八萬九千九百四以日法乗㑹數内㑹餘周日二十七餘四萬一千五百六十二以月一日行除周天得二十七日及餘通周二百六萬五千二百六十六日法乗周日二十七内周餘小周六千七百五十一月一日行十三度乗章歳内章閏也月周八萬一千一十二以十二乗小周即得與度同推月朔術第一推積月術曰置入紀年算外以章月乗之如章歳為積月不盡為閏餘閏餘滿三百一十九以上其歳有閏推朔積日術曰以通數乗積月為朔積分分滿日法為積日不盡為小餘六旬去積日不盡為大餘命以紀算外則所求年天正十一月朔日推上下弦望術曰加朔大餘七小餘二萬八千六百八十小分一小分滿四從小餘小餘滿日法從大餘一大餘滿六十去之即上弦日又加得望又加得下弦又加得後月朔推二十四氣術第二推二十四氣術曰置入紀年以來算外以餘數乗之為實以蔀法除之所得為積沒不盡為小餘以六旬去積沒不盡為大餘命以紀算外所求年天正十一月冬至日求次氣加大餘十五小餘一千三百二十四小分一小分滿氣法二十四從小餘一小餘滿蔀法從大餘一大餘滿六十去之命如上即次氣日推閏術曰以閏餘減章歳五百五餘以歳中十二乗之滿章閏一百八十六得一月餘半法已上亦得一月數天正十一月算外即閏月閏月有進即以無中氣定之冬至十一月中小寒十二月節大寒十二月中立春正月中雨水正月中驚蟄二月節春分二月中清明三月節穀雨三月中立夏四月節小滿四月中芒種五月節夏至五月中小暑六月節大暑六月中立秋七月節處暑七月中白露八月節秋分八月中寒露九月節霜降九月中立冬十月節小雪十月中大雪十一月節推合又交㑹月蝕去交度術曰置入紀朔積分朔以交㑹差分}
