  - {type: variant, offset: 1470, length: 241, content: 山王辰迎之赴行宮方明既克仇池以保宗弟保熾守之河間公齊擊走之先是詔保宗鎮上邽又詔鎮駱谷復其本國保宗弟文德先逃氐中乃說保宗令叛事泄齊執保宗送京師詔難當殺之氐羌立文德屯于濁水文德自號征西將軍秦河梁三州牧仇池公求援於義隆義隆封文德為武都王遣偏將房亮之等助之齊逆擊禽亮之文德奔守葭蘆武都陰平氐多歸之詔淮陽公皮豹子等率諸軍討之文德走漢中收其妻子僚屬資糧及保宗妻公主送京師賜死初公主勸保宗反人問曰背父母之邦若何公主曰禮婦人外成因夫而榮事立據守一方我亦一國之母豈比小縣之主以此得罪高宗時拜難當營州刺, WYG: 修}
