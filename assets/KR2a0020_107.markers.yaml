  - {type: variant, offset: 5126, length: 2, content: 上黨, krp: 尚書令任城}
  - {type: variant, offset: 5129, length: 454, content: 長孫觀為大都督以討之觀等軍入拾寅境芻其秋稼拾寅窘怖遣子詣軍表求改過觀等以聞顯祖以重勞將士乃下詔切責之徵其任子拾寅遣子斤入侍顯祖尋遣斤還拾寅後復擾掠邊人遣其將良利守洮陽枹罕所統枹罕鎮將西郡公楊鍾葵貽拾寅書以責之拾寅表曰奉詔聽臣還舊土故遣良利守洮陽若不追前恩求令洮陽貢其土物辭旨懇切顯祖許之自是歲修職貢太和五年拾寅死子度易侯立遣其侍郎時真貢方物提上表稱嗣事後度易侯伐宕昌詔讓之賜錦綵一百二十匹喻令悛改所掠宕昌口累部送時還易侯並奉詔死子伏連籌立高祖欲令入朝表稱疾病輒修洮陽泥和城而置戍焉文明太后崩使人告凶伏連籌拜命不恭有司請伐之高祖不許羣臣以其受詔不敬不宜納所獻高祖曰拜受失禮乃可加以告責所獻土毛乃是臣之常道杜棄所獻便是絕之縱欲改悔其路無由矣詔曰朕在哀疚之中未有征討而去春枹罕表取其洮陽泥和二戍時以此既邊將之常即便聽許及偏師致討二戍望風請降執訊二千餘人又得婦女九百口子婦可悉還之伏連籌乃遣世子賀魯頭朝于京師禮錫有加拜伏連籌使持節都督西垂諸軍事征西將軍領護西戎中郎將西海郡開國公吐谷渾王麾旗章綬之飾皆備給之後遣兼員外, WYG: 澄}
