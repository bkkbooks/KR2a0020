  - {type: variant, offset: 3252, length: 580, content: 華言父也碎奚遂以憂死視連立以父憂思不遊娛酣宴十五年死弟視羆立死子樹洛干等並幼弟烏紇提立而妻樹洛干母生二子慕璝利延烏紇提一名大孩死樹洛干立自號車騎將軍是歲晉義熙初也樹洛干死弟阿豺立自號驃騎將軍沙州刺史部內有黃沙周回數百里不生草木因號沙州阿豺兼并羌氐地方數千里號為強國田于西強山觀墊江源問於羣臣曰此水東流有何名由何郡國入何水也其長史曾和曰此水經仇池過晉壽出宕渠號墊江至巴郡入江度廣陵會於海阿豺曰水尚知有歸吾雖塞表小國而獨無所歸乎遣使通劉義符獻其方物義符封為澆河公未及拜受劉義隆元嘉三年又加除命又將遣使朝貢會暴病臨死召諸子弟告之曰先公車騎捨其子虔以大業屬吾吾豈敢忘先公之舉而私於緯代其以慕璝繼事阿豺有子二十人緯代長子也阿豺又謂曰汝等各奉吾一隻箭折之地下俄而命母弟慕利延曰汝取一隻箭折之慕利延折之又曰汝取十九隻箭折之延不能折阿豺曰汝曹知否單者易折衆則難摧戮力一心然後社稷可固言終而死兄子慕璝立先是阿豺時劉義隆命竟未至而死慕璝又奉表通義隆義隆又授隴西公慕璝招集秦涼亡業之人及羌戎雜夷衆至五六百落南通蜀漢北交涼州赫連部衆轉盛世祖時慕璝始遣其侍郎謝大寧奉表歸國尋討禽赫連定送之京師世祖嘉之遣使者策拜慕璝為大將軍西秦王慕璝表曰臣誠庸弱敢竭情款俘禽僭逆獻捷王府爵秩雖崇而土不增廓車旗既飾而財不周賞願垂鑒察亮其單款臣頃接寇逆疆境之人為賊所抄流轉東下今皇化混一求還鄉土乞佛日連窟略寒, WYG: ''}
