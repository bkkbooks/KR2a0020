  - {type: variant, offset: 8963, length: 1, content: 斬, WYG: 以六千去之餘為大餘以甲子算外上朔日推五星六通術第七上元壬子以來至春秋隱公元年已未積十六萬六千五百七算外至今大魏熙平二年嵗次丁酉積十六萬七千七百四十五算外木精曰嵗星其數二百四十一萬六千六百六十火精曰熒惑星其數四百七十二萬五千八百四十八土精曰鎮星其數三百二十九萬一千二十一金精曰太白其數三百五十三萬八千一百三十一水精曰辰星其數七十萬二千一百八十二推五星置上元以來盡所求年減一以周天二百二十一萬三千三百七十七乗之名為六通之實以蔀法除之所得為冬至積日不盡為小餘以旬六去積日不盡為大餘命以甲子算外即冬至日以章嵗五百五除冬至小餘所得命子算外即律氣加時五星各以其數為法除六通實所得為積合不盡為合餘以合餘減法餘為入嵗度分以日度約之所得即所求天正十一月冬至後晨夕合度算及餘其金水以一合日數及合餘減合度算及餘得一者為夕見無所得為晨見若度餘不足減減合度算一加日度法乃減之命起牛前十二度宿次除之不滿宿者算外即天正十一月冬至後晨夕合度及餘求星合月及日置冬至朔日數減一以加合度算以冬至小餘及度餘度餘滿日度法去之加度一合度算變成合日算餘為日餘命起天正十一月如厯月大小除之不滿月者算外星合月及日有閏計之求後合月及日以合終日數及餘如前入月算及餘餘滿日度從日厯月大小除之起前合月算外即後合月及日其金水以一合日數及餘加晨得夕加夕得晨求後合度以行星度及餘加前合度算及餘餘滿日度從度命起前合度宿次除之不滿宿者算外即後合度及餘逕斗去其分一千四百七十七嵗星合終日數三百九十八合終日餘四千七百八十行星三十三度度餘三千三百三周虚一千二百八十嵗星晨與日合在日後伏十六日餘二千三百九十行星二度餘四千六百八十一半去日十三度半晨見東方順疾日行五十七分之十一五十七日行十一度順遲日行九分五十七日行九度而留不行二十七日而旋逆日行七分之一八十四日退十三度復留二十七日復順遲日行九分五十七日行九度復疾日行十一分五十七日行十一度在日前夕伏西方順遲十六日日餘二千三百九十行星二度餘四千六百八十一半與日合凡一見三百六十六日行星二十八度在日前後伏三十二日餘四千七百八行星五度度餘三千三百三復終於晨見熒惑合終日數七百七十九合終日餘五千一十八周虛九百五十二行星四十九度度餘三千一百五十四熒惑晨與日合在日後伏七十一日餘五千五百八十四行星五十五度餘四千八百四十五半去日十六度晨見東方順疾日行二十三分之十四一百八十四日行一百一十二度順遲日行二十三分之十二九十二日行四十八度而留不行十一日而旋逆日行六十二分之十七六十二日退十度復留十一日復順疾日行十四分一百八十四日行一百一十二度在日前夕伏西方順七十一日餘五千五百八十四行星五十五度度餘四千八百四十五半而與日合凡一見六百三十六日行星三百三度在日前後伏一百四十三日餘五千一百八行星一百一十一度餘三千六百四十一過周四十九度度餘二千一百五十四復終於晨見鎮星合終日數三百七十八日餘三百四十一行星十二度餘四千九百二十四周虚五千七百一十九鎮星晨與日合在日後伏十八日日餘一百七十半行星二度餘二千四百六十二去日十五度半晨見東方順日行十二分之一八十四日行七度而留不行三十六日而旋逆行十七分之一一百二日退六度復留三十六日復順日行十二分之一八十四日行七度在日前伏西方順十八日日餘一百七十半行星二度餘二千四百六十二而與日合凡見三百四十二日行星八度在日前後伏三十六日日餘三百四十一行星四度度餘四千九百二十四復終於晨見太白金再合終日數五百八十三日日餘五千一百五十一周虚九百九行星二百九十一度亦曰一合日數度餘五千六百五半亦曰一合日餘太白晨與日合在日後伏六日退四度去日十度晨見東方逆日行三分之二九日退六度留不行八日順遲日行十五分之十一四十五日行三十三度順疾日行一疾十三分之二九十一日行一百五度太疾日行一度十三分之三九十一日行一百一十二度在日後晨伏東方順四十一日餘五千六百五半行星五十一度度餘五千六百五半而與日合凡見東方二百四十四日行星二百四十度在日後伏四十一日餘五千六百五半行星五十一度餘五千六百五半而與日合見西方亦如之夕與日合在前伏四十一日餘五千六百五半行星五十一度餘三千六百五半去日十度夕見西方順疾日行一度十二分之三九十一日行一百一十二疾順遲日行一度十三分之二九十一日行一百五疾順遲日行十五分之十一四十五日行三十三度而留不行八日而旋逆日行三分之二九日退六度在日前夕伏西方六日退四度而與日合凡再見四百八十日行星四百八十度在日前後伏八十三日餘五千一百五十一行星一百三度度餘五千一百五十一過周二百一十八度度餘三千六百七十四復終於晨見水星辰星再合終日數一百一十五餘五千二百八十二行星五十七度亦曰一合日數餘五千六百七十一亦曰一合日餘周虚七百七十八辰星與日合在日後伏十一日退六度去日十七度晨見東方而留不行四日順遲日行七分之五七日行五度順度日行一度三分之一