  - {type: variant, offset: 2256, length: 503, content: 征虜將軍漢中郡公武興王贈集始車騎大將軍開府儀同三司諡安王紹先年幼委事二叔集起集義夏侯道遷以漢中歸順也蕭衍白馬戍主尹天保率衆圍之道遷求援於集起集義二人貪保邊藩不欲救之唯集始弟集朗心願立功率衆破天保全漢川集朗之力也集義見梁益既定恐武興不得久為外藩遂扇動諸氐推紹先僭稱大號集起集義並稱王外引蕭衍為援安西將軍邢巒遣建武將軍傅竪眼攻武興克之執紹先送于京師遂滅其國以為武興鎮復改鎮為東益州前後鎮將唐法樂刺史杜纂邢豹以威惠失衷氐豪仇石柱等相率反叛朝廷以西南為憂正光中詔魏子建為刺史以恩信招撫風化大行遠近款附如內地焉後唐永代子建為州未幾氐人悉反永棄城東走自此復為氐地其後紹先奔還武興復自立為王吐谷渾本遼東鮮卑徒河涉歸子也涉歸一名弈洛韓有二子庶長曰吐谷渾少曰若洛廆涉歸死若洛廆代統部落別為慕容氏涉歸之存也分戶七百以給吐谷渾吐谷渾與若洛廆二部馬鬬相傷若洛廆怒遣人謂吐谷渾曰先公處分與兄異部何不相遠而馬鬬相傷吐谷渾曰馬是畜耳食草飲水春氣發動所以鬬鬬在馬而怒及人乖別甚易今當去汝萬里之外若洛廆悔遣舊老及長史七那樓追謝留之吐谷渾曰我乃祖以來樹德遼右先公之世卜筮之言云有二子當享福祚並流子孫我是卑庶理無並大今以馬致乖殆天所啟諸君試驅馬, WYG: ''}
