  - {type: variant, offset: 565, length: 671, content: 空百頃之地宋奴之死二子佛奴佛狗逃奔苻堅堅以女妻佛奴子定拜為尚書領軍苻堅之敗關右擾亂定盡力於堅堅死乃率衆奔隴右徙治歷城去仇池百二十里置倉儲於百頃招夷夏得千餘家自稱龍驤將軍仇池公稱藩於晉孝武即以其自號假之後以為秦州刺史登國四年遂有秦州之地自號隴西王後為乞伏乾歸所殺無子佛狗子盛先為監國守仇池乃統事自號征西將軍秦州刺史仇池公諡定為武王分諸氐羌為二十部護軍各為鎮戍不置郡縣遂有漢中之地仍稱藩于晉天興初遣使朝貢詔以盛為征南大將軍仇池王隔礙姚興不得歲通貢使盛以兄子撫為平南將軍梁州刺史守漢中劉裕永初中封盛為武都王盛死私諡曰惠文王子玄統位玄字黃眉號征西大將軍開府儀同三司秦州刺史武都王雖稱藩於劉義隆仍奉晉義熙之號後始用義隆元嘉正朔初盛謂玄曰吾年已老當終為晉臣汝善事宋帝故玄奉焉玄善於待士為流舊所懷始光四年世祖遣大鴻臚公孫軌拜玄為征南大將軍都督梁州刺史南秦王玄上表請比內藩許之玄死私諡孝昭王子保宗統位初玄臨終謂弟難當曰今境候未寧方須撫慰保宗沖昧吾授卿國事其無墜先勳難當固辭請立保宗以輔之保宗既立難當妻姚氏謂難當曰國險宜立長君反事孺子非久計難當從之廢保宗而自立稱藩于劉義隆難當拜保宗為鎮南將軍鎮石昌以次子順為鎮東將軍秦州刺史守上邽保宗謀襲難當事泄被繫先是四方流人以仇池豐實多往依附流人有許穆之郝惔之二人投難當並改姓為司馬穆之自云名飛龍惔之自云名康之云是晉室近戚康之尋為人所殺時劉義隆梁州刺史甄法護刑政不理義隆遣刺史蕭思話代任難當以思話未至遣將舉兵襲梁州破白馬遂有漢中之地尋而思話使其司馬蕭承之先驅進討所向克捷遂平梁州因又附義隆難當後釋保宗遣鎮董亭保宗與兄保顯歸, WYG: ''}
