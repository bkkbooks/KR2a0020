  - {type: variant, offset: 5587, length: 0, content: '', WYG: 尚書僕射元暉侍中領軍江陽王繼奏天道至逺非人情可量厯數幽微豈以意輒度而議者紛紜競起端緒争指虚逺難可求衷自非建標凖影無以驗其真偽頃永平中雖有考察之利而不累歳窮究遂不知影之至否差失少多臣等參詳謂宜今年至日更立表木明伺晷度三載之中足知當否令是非有歸争者息競然後採其長者更議所從神龜初光復表曰春秋載天子有日官諸侯有日御又曰履端于始歸餘于終皆所以推二氣考五運成六位定七曜審八卦立三才正四序以授百官于朝萬民于野隂陽剛柔仁義之道罔不畢備繇是先代重之垂於典籍及史遷班固司馬彪著立書志所論備矣謹案厯之作也始自黄帝辛夘為元迄于大魏甲寅歴數千有餘代歴祀數千軌憲不等逺近殊術其消息盈虚覘歩疏宻莫得而識焉去延昌四年冬中堅将軍屯騎校尉}
