  - {type: variant, offset: 2874, length: 377, content: 阿干歌徒河以兄為阿干也子孫僭號以此歌為輦後鼓吹大曲吐谷渾遂徙上隴止於枹罕暨甘松南界昂城龍涸從洮水西南極白蘭數千里中逐水草廬帳而居以肉酪為糧西北諸種謂之阿柴虜吐谷渾死有子六十人長子吐延身長七尺八寸勇力過人性刻暴為昂城羌酋姜聰所刺劍猶在體呼子葉延語其大將紇拔碸曰吾氣絕棺斂訖便速去保白蘭地既險遠又土俗懦弱易控御葉延小兒欲授餘人恐倉卒終不能相制今以葉延付汝竭股肱之力以輔之孺子得立吾無恨也抽劍而死有子十二人葉延少而勇果年十歲縛草為人號曰姜聰每旦輒射之射中則嘷叫泣涕其母曰讎賊諸將已屠膾之汝年小何煩朝朝自苦葉延嗚咽若不自勝答母曰誠知無益然罔極之心不勝其痛性至孝母病三日不食葉延亦不食頗視書傳自謂曾祖弈洛韓始封昌黎公吾為公孫之子案禮公孫之子得以王父字為氏遂以吐谷渾為氏焉葉延死子碎奚立性淳謹三弟專權碎奚不能制諸大將共誅之奚憂哀不復攝事遂立子視連為世子委之事號曰莫賀, WYG: 佐}
