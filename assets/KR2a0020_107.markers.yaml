  - {type: variant, offset: 10164, length: 204, content: 諸獠以始欣貪暴相率反叛攻圍巴州山南行臺勉諭即時散罷自是獠諸頭王相率詣行臺者相繼子建厚勞賚之始欣見中國多事又失彼心慮獲罪譴時蕭衍南梁州刺史陰子春扇惑邊陲始欣謀將南叛始欣族子愷時為隆城鎮將密知之嚴設邏候遂禽蕭衍使人并封始欣詔書鐵券刀劍衣冠之屬表送行臺子建乃啟以鎮為南梁州愷為刺史發使執始欣囚於南鄭遇子建見代梁州刺史傅豎眼仍為行臺豎眼久病其子敬紹納始欣重賂使得還州始欣乃起衆攻愷屠滅之據城南叛蕭衍將蕭玩率衆援接時梁, WYG: 二日十四度三百三十十四分益六百八十九盈七百五十盈積分二萬一千一十一三日十四度二百四十六十一分益六百一十七盈一千四百三十六盈積分四萬一百三十五四日十四度一百九十分益五百四十五盈二千六十二盈積分五萬七千二百三十二五日十四度一百一十一分益四百六十六盈二千六百七盈積分七萬二千三百六十六日十三度五百二十二分}
