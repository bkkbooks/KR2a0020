  - {type: variant, offset: 10400, length: 1, content: 羅, WYG: 以來盡所求年減一如法算之合度餘滿日度法加合度算一合度算滿合終日數去之亦以合終日餘減合度若不足減者減合度算一加周虚積年盡所得即所求年天正十一月冬至後晨夕合度笇及度餘其求水及命度皆如上法求星合月及日術曰置冬至去朔日數減一加合度算冬至小餘以加合度餘合度餘滿日度法去之加合度算一合度笇變成合日算合度餘為日餘命日起天正十一月如厯月大小除之不滿月者算外即星合月及日有閏以閏計之求後合月及日術曰以合終日數及合終日餘加前入月算及餘餘滿日度法後日一日如厯月大小除之起前合月算外即後合月及日其金水以合日數及一合日餘加之加夕得晨加晨得夕也求後合度術曰以行星度餘加前合度及度餘度餘滿日度法從度命起前合度宿次除之不滿宿者算外即後合度餘逕斗除其分其分四千一百一十七歳星合終日數三百九十八合終日餘一萬二千六百八周虛三千二百五十二行星三十三度度餘九千四百九十一歳星晨與日合}
