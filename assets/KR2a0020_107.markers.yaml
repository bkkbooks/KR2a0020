  - {type: variant, offset: 10, length: 0, content: '', WYG: 律厯三上大聖通天地之至理極生民之能事體妙繫於神機作範留於器象然則制物成法故冥賾可尋推變有因而化生以驗昔黄帝採竹昆崘之隂聽鳳岐陽之下斷自然之物寫自然之音音既協矣黄鍾以立數既生矣氣亦徴之於是乎備數和聲審度嘉量權衡之用皆出於兹矣三古所共行百王不能易漢孝武置協律之官元帝時京房明六十律事為宻矣王莽世徴天下通鍾律之士劉歆總而條奏之最為該博故班固取以為志後漢待詔嚴崇頗為知律至其子宣不𫝊遂罷魏世杜夔亦以通樂制律晉中書監荀朂持夔律校練八音以謂後漢至魏尺長古尺四分有餘又得古玉律朂以新律命之謂其應合遂改晉調而散騎侍郎阮咸譏其聲髙永嘉以後中原䘮亂考正鍾律所未聞焉其存於夷裔聲器而已魏氏平諸僣偽頗獲古樂髙祖慮其永爽太和中詔中書監髙閭修正音律久未能定閭出為相州刺史十八年閭表曰書稱同律度量衡論語謹權量審法度此四者乃是王者之要務生民之所由四者何先以律為首豈不以取法之始求天地之氣故也孔子曰移風易俗莫尚於樂然則樂之所感其致遠矣今調音制樂非律無以克和然則律者樂之本也臣前被敇理樂與皇宗博士孫惠蔚大樂祭酒公孫崇等考周官國語及後漢律厯志案京房法作凖以定律吹律以調絲案律寸以孔竹八音之别事以粗舉書既三奏備在前文臣年垂七十日就衰頺恐一朝先犬馬竟無絲髪之益使律法長絶遺恨沒世是以慺悽惓惓不敢忘怠近在鄴見崇臣先以其聰敏精勤有挈瓶之智雖非經國之才頗長推考之術故臣舉以敎樂令依臣先共所論樂事自作鐘磬志議二卷器數為備可謂世不乏賢今崇徒敎樂童書學而已不恭樂事臣恐音律一曠精賞實難習業差怠轉乖本意今請使崇參知律吕鐘磬之事觸類而長之成益必深求持臣先所奏三表勘後漢律厯志陛下親覽以求厥衷俱然易了又著作郎韓顯宗博聞彊識頗有史才粗解音律亦求令時往參知臣雖在外官竊慕古人舉善之義愚意所及不能自己雖則越分志在補益願不以言廢人詔許之景明四年并州獲古銅權詔付崇以為鍾律之凖永平中崇更造新尺以一黍之長累為寸法尋太常卿劉芳受詔修樂以秬黍中者一黍之廣即為一分而中尉元匡以一黍之廣度黍二縫以取一分三家紛競久不能決太和}
