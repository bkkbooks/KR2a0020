餘以日度法約之為度不盡為度分命度起牛前十二度宿次除之不滿宿者算外即所求年天正十一月朔夜半月所在度及分推月度又一法術曰以小周乗朔小餘為實以章嵗來日法為法實如法得一為度不滿法者以章月除之為大分不盡為小所得以減合朔度及分餘即所求年天正十一月朔夜半月所在度及分求次月度術曰小月加度二十二分二千六百五十一大月加度三十五分四千八百八十三分滿日度法從度宿次除之不滿宿者算次月所在度求次日月行度術曰加度十三分二千二百三十二分滿日度法從度宿次除之逕斗去其分求弦望日所在度術曰加合朔度七大分二千三百一十八小分五千二百九十八微分微分滿四從小分小分滿章月從大分大分滿日度法從度命如上則上弦日所在度又加得望下弦月合朔斗二十六度牛八度女十二度虚十度危十七度室十六度壁九度北方𤣥武七宿九十八度一千四百七十七分奎十六度婁十二度胃十四度昴十一度畢十六度觜二度參九度西方白虎七宿八十度井三十三度鬼四度栁十五度星七度張十八度翼十八度軫十七度南方朱鳥七宿一百一十二度角十二度亢九度氐十五度房五度心五度尾十八度箕十一度東方蒼龍七宿七十五度周天三百六十五度六千六十分度之一千四百七十七通分得二百二十一萬三千七百七十七名曰周天分五行沒滅易卦氣候上朔術第六推五行用事日水火木金土各王七十三日小餘二百九十五小分九微分三春木夏火秋金冬水四立即其用事始求土者置立春大小餘及分以木王七十三日小餘二百九十五小分九微分三加之微分滿五從小分一小分滿氣法二十四從小餘一小餘滿蔀法從大餘一大餘滿六十去之命以紀得季春上王日又加土王十八日小餘一千五百八十八小分二十微分二滿從命如上即得立夏日求次如法又一法求土王用事日各置四立大小餘及分各減大餘十八小餘一千五百八十八小分二十微分二命以紀算外即四立土王日若大餘不足減者加六十而後減之小餘不足減者減取大餘一加蔀法乃減之推沒滅術曰因冬至積沒有小餘者加積一以沒分乘之如沒法而一為積日不盡為沒餘以六旬去積日餘為沒日命以紀算外即所求年天正十一月冬至後沒日求次沒術曰加沒日六十九沒餘二萬七百六十四沒餘滿沒法三萬一千七百七從沒日一沒日滿六十去之命以紀算外即次沒月一嵗常有五沒或六沒小餘盡者為滅日又以冬至去朔日加沒日冬至小餘滿蔀法從沒日命日起天正十一月如厯月大小除之不足除者入月算命以朔算外即冬至後沒日求次沒加沒沒日六十九沒餘三千九百五十九沒分二萬四千六百九十七分滿沒法從沒餘滿蔀從沒日命起前沒凡厯日大小除之即後沒日及餘推四正卦術曰因冬至大小餘即坎卦用事日春分即震卦用事日夏至即離卦用事日秋分即兊卦用事日求中孚卦加冬至小餘五千五百三十小分九微分一微分滿五從小分小分滿氣法從小餘小餘滿蔀法從大餘命以紀算外即中孚卦用事日其解加震咸加離賁加兊亦如中孚加坎求次卦加坎大餘六小餘五百二十九小分十四微分四微分滿五從小分小分滿氣法從小餘小餘滿蔀法從大餘命以紀算外即復卦用事日大壯加震姤加離觀加兊如中孚加坎十一月未濟蹇頤中孚復十二月屯謙睽升臨正月小過蒙益漸泰二月需隨晉解大壯三月訟豫蠱革夬四月旅師比小畜乾五月大有家}
