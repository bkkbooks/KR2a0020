  - {type: variant, offset: 10385, length: 3, content: 破玩軍, WYG: 小餘即虎始交日加大餘五小餘一千二百二十八微分一微分滿三從小分小分滿小分法從小餘小餘滿蔀法從大餘大餘滿六十去之命以紀算外依次候日冬至虎始交芸始生荔挺生小寒蚯蚓結麈角解水泉動大寒鴈北向鵲始巢雉始雊立春鷄始乳東風解凍蟄蟲始振雨水魚上負氷獺祭魚鴻鴈來驚蟄始雨水桃始華倉庚鳴春分鷹化為鳩𤣥鳥至雷始發聲淸明電始見蟄蟲咸動蟄蟲啓户穀雨桐始華田䑕化為鴽虹始見立夏萍始生戴勝降桑螻蟈鳴小滿蚯蚓出王瓜生苦菜秀芒種靡草死小暑至螗蜋生夏至鵙始鳴反舌無聲鹿角解小暑蟬始鳴半夏生木槿榮大暑温風至蟋蟀居壁鷹乃學習立秋腐草為螢土潤溽暑涼風至處暑白露降寒蟬鳴鷹祭鳥白露天地始肅暴風至鴻鴈來秋分𤣥鳥歸羣鳥養羞雷始收聲寒露蟄蟲附戸殺氣浸盛陽氣日衰霜降水始涸鴻鴈來賓雀入大水化為蛤立冬菊有黄華豺祭獸水始冰小雪地始凍雉入大水為蜃虹藏不見大雪冰始壯地始坼鶡旦鳴推上朔術曰置入紀以來盡所求年減一以六律乗之以六旬去之不盡者命以甲子算上即上朔日推五星見伏術第七上元甲子以來至春秋魯隱公元年歳在己未積二十九萬二千七百三十六算上元甲子以來至今大魏興和二年歳在庚申積二十九萬三千九百九十七算木精曰歳星其數六百七十二萬二千八百八十八火精曰熒惑其數一千三百一十四萬九千八十三土精曰鎮星其數六百三十七萬四千六十一金精曰太白其數九百八十四萬三千八百八十二水精曰辰星其數一百九十五萬三千七百一十七推五星術曰置上元以來盡所求年減一以周天乗之為五星之實各以其數為法除之所得為積合不盡為合餘以合餘減法餘為入歳度分以日度法約之所得即所求年天正十一月冬至後晨夕合度算}
