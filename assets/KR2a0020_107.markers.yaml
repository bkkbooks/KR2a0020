  - {type: variant, offset: 3833, length: 1124, content: 華等三人家弱在此分乖可愍願并敕遣使恩洽遐荒存亡感戴世祖詔公卿朝會議答施行太尉長孫嵩及議郎博士二百七十九人議曰前者有司處以為秦王荒外之君本非政教所及來則受之去則不禁皇威遠被西秦王慕義畏威稱臣納貢求受爵號議者以為古者要荒之君雖人土衆廣而爵不擬華夏陛下加寵王官及越常分容飾車旗班同上國至於繒絮多少舊典所無皆當臨時以制豐寡自漢魏以來撫接荒遐頗有故事呂后遺單于御車二乘馬二駟單于答馬千匹其後匈奴和親敵國遺繒絮不過數百呼韓邪稱臣身自入朝始至萬匹今西秦王若以土無桑蠶便當上請不得言財不周賞昔周室衰微齊侯小白一匡天下有賜胙之命無益土之賞晉侯重耳破楚城濮唯受南陽之田為朝宿之邑西秦所致唯定而已塞外之人因時乘便侵入秦涼未有經略拓境之勳爵登上國統秦涼河沙四州之地而云土不增廓比聖朝於弱周而自同於五霸無厭之情其可極乎西秦王忠款於朝廷原其本情必不至此或左右不敏因致斯累檢西秦流人賊時所抄悉在蒲坂今既稱藩四海咸泰天下一家可敕秦州送詣京師隨後遣還所請乞佛三人昔為賓國之使來在王庭國破家遷即為臣妾可勿聽許制曰公卿之議未為失體西秦王所收金城枹罕隴西之地彼自取之朕即與之便是裂土何須復廓西秦款至綿絹隨使疏數增益之非一匹而已自是慕璝貢獻頗簡又通于劉義隆義隆封為隴西王太延二年慕璝死弟慕利延立詔遣使者策諡慕璝曰惠王後拜慕利延鎮西大將軍儀同三司改封西平王以慕璝子元緒為撫軍將軍時慕利延又通劉義隆義隆封為河南王世祖征涼州慕利延懼遂率其部人西遁沙漠世祖以慕利延兄有禽赫連定之功遣使宣喻之乃還後慕利延遣使表謝書奏乃下詔褒奬之慕利延兄子緯代懼慕利延害己與使者謀欲歸國慕利延覺而殺之緯代弟叱力延等八人逃歸京師請兵討慕利延世祖拜叱力延歸義王詔晉王伏羅率諸將討之軍至大母橋慕利延兄子拾寅走河西伏羅遣將追擊之斬首五千餘級慕利延走白蘭慕利延從弟伏念長史昸鳩黎部大崇娥等率衆一萬三千落歸降後復遣征西將軍高涼王那等討之於白蘭慕利延遂入于闐國殺其王死者數萬人南征罽賓遣使通劉義隆求援獻烏丸帽女國金酒器胡王金釧等物義隆賜以牽車七年遂還舊土慕利延死樹洛干子拾寅立始邑於伏羅川其居止出入竊擬王者拾寅奉修貢職受朝廷正朔又受劉義隆封爵號河南王世祖遣使拜為鎮西大將軍沙州刺史西平王後拾寅自恃險遠頗不恭命通使于劉彧獻善馬四角羊彧加之官號高宗時定陽侯曹安表拾寅今保白蘭多有金銀牛馬若擊之可以大獲議者咸以先帝忿拾寅兄弟不穆使晉王伏羅高涼王那再征之竟不能克拾寅雖復遠遁軍亦疲勞今在白蘭不犯王塞不為人患非國家之所急也若遣使招慰必求為臣妾可不勞而定也王者之於四荒羈縻而已何必屠其國有其地安曰臣昔為澆河戍將與之相近明其意勢若分軍出其左右拾寅必走保南山不過十日牛馬草盡人無所食衆必潰叛可一舉而定也從之詔陽平王新成建安王穆六頭等出南道南郡公李惠, WYG: 洪}
