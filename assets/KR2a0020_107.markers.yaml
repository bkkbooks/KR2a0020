  - {type: variant, offset: 6113, length: 2700, content: 突厥俗同至于婚貧不能備財者輒盜女去死者亦皆埋殯其服制葬訖則除之性貪婪忍於殺害好射獵以肉酪為糧亦知種田大麥粟豆然其北界氣候多寒唯得蕪菁大麥故其俗貧多富少青海周回千餘里海內有小山每冬冰合後以良牝馬置此山至來春收之馬皆有孕所生得駒號為龍種必多駿異吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里世傳青海驄者是也土出犛牛馬多鸚鵡饒銅鐵朱沙地兼鄯善且末興和中齊獻武王作相招懷荒遠蠕蠕既附於國夸呂遣使致敬獻武王喻以大義徵其朝貢夸呂乃遣使人趙吐骨真假道蠕蠕頻來又薦其從妹靜帝納以為嬪遣員外散騎常侍傅靈葕使於其國夸呂又請婚乃以濟南王匡孫女為廣樂公主以妻之此後朝貢不絕吐谷渾北有乙弗勿敵國俗風與吐谷渾同不識五穀唯食魚及蘇子蘇子狀若中國苟嵵子北又有阿蘭國與鳥獸同不知鬬戰忽見異人舉國便走土無所出大養羣畜體輕工走逐之不可得北又有女王國以女為主人所不至其傳云然宕昌羌者其先蓋三苗之胤周時與庸蜀微盧等八國從武王滅商漢有先零燒當等世為邊患其地東接中華西通西域南北數千里姓別自為部落酋帥皆有地分不相統攝宕昌即其一也俗皆土著居有屋宇其屋織犛牛尾及羖羊毛覆之國無法令又無徭賦惟戰伐之時乃相屯聚不然則各事生業不相往來皆衣裘褐牧養犛牛羊豕以供其食父子伯叔兄弟死者即以繼母世叔母及嫂弟婦等為妻俗無文字但候草木榮落記其歲時三年一相聚殺牛羊以祭天有梁懃者世為酋帥得羌豪心乃自稱王焉懃孫彌忽世祖初遣子彌黃奉表求內附世祖嘉之遣使拜彌忽為宕昌王賜彌黃爵甘松侯彌忽死孫虎子立其地自仇池以西東西千里席水以南南北八百里地多山阜人二萬餘落世修職貢頗為吐谷渾所斷絕虎子死彌治立虎子弟羊子先奔吐谷渾吐谷渾遣兵送羊子欲奪彌治位彌治遣使請救顯祖詔武都鎮將宇文生救之羊子退走彌治死子彌機立遣其司馬利住奉表貢方物楊文度之叛圍武都彌機遣其二兄率衆救武都破走文度高祖時遣使子橋表貢朱沙雌黃白石膽各一百斤自此後歲以為常朝貢相繼後高祖遣鴻臚劉歸謁者張察拜彌機征南大將軍西戎校尉梁益二州牧河南公宕昌王後朝于京師殊無風禮朝罷高祖顧謂左右曰夷狄之有君不如諸夏之亡也宕昌王雖為邊方之主乃不如中國一吏於是改授領護西戎校尉靈州刺史王如故賜以車騎戎馬錦綵等遣還國高昌者車師前王之故地漢之前部地也東西二千里南北五百里四面多大山或云昔漢武遣兵西討師旅頓弊其中尤困者因住焉地勢高敞人庶昌盛因云高昌亦云其地有漢時高昌壘故以為國號東去長安四千九百里漢西域長史戊己校尉並居於此晉以其地為高昌郡張軌呂光沮渠蒙遜據河西皆置太守以統之去敦煌十三日行國有八城皆有華人地多石磧氣候溫暖厥土良沃穀麥一歲再熟宜蠶多五果又饒漆有草名羊刺其上生蜜而味甚佳引水溉田出赤鹽其味甚美復有白鹽其形如玉高昌人取以為枕貢之中國多蒲萄酒俗事天神兼信佛法國中羊馬牧在隱僻處以避寇非貴人不知其處北有赤石山七十里有貪汗山夏有積雪此山北鐵勒界也世祖時有闞爽者自為高昌太守太延中遣散騎侍郎王恩生等使高昌為蠕蠕所執真君中爽為沮渠無諱所襲奪據之無諱死弟安周代立和平元年為蠕蠕所并蠕蠕以闞伯周為高昌王其稱王自此始也太和初伯周死子義成立歲餘為其兄首歸所殺自立為高昌王五年高車王可至羅殺首歸兄弟以敦煌人張孟明為王後為國人所殺立馬儒為王以鞏顧禮麴嘉為左右長史二十一年遣司馬王體玄奉表朝貢請師迎接求舉國內徙高祖納之遣明威將軍韓安保率騎千餘赴之割伊吾五百里以儒居之至羊榛水儒遣禮嘉率步騎一千五百迎安保去高昌四百里而安保不至禮等還高昌安保亦還伊吾安保遣使韓興安等十二人使高昌儒復遣顧禮將其世子義舒迎安保至白棘城去高昌百六十里而高昌舊人情戀本土不願東遷相與殺儒而立麴嘉為王嘉字靈鳳金城榆中人既立又臣于蠕蠕那蓋顧禮與義舒隨安保至洛陽及蠕蠕主伏圖為高車所殺嘉又臣高車初前部胡人悉為高車所徙入於焉耆焉耆又為肽噠所破滅國人分散衆不自立請王於嘉嘉遣第二子為焉耆王以主之永平元年嘉遣兄子私署左衞將軍田地太守孝亮朝京師仍求內徙乞軍迎援於是遣龍驤將軍孟威發涼州兵三千人迎之至伊吾失期而反於後十餘遣使獻珠像白黑貂裘名馬鹽枕等款誠備至惟賜優旨卒不重迎三年嘉遣使朝貢世宗又遣孟威使詔勞之延昌中以嘉為持節平西將軍瓜州刺史泰臨縣開國伯私署王如故熙平初遣使朝獻詔曰卿地隔關山境接荒漠頻請朝援徙國內遷雖來誠可嘉即於理未帖何者彼之甿庶是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懷戀舊今若動之恐異同之變爰在肘腋不得便如來表神龜元年冬孝亮復表求援內徙朝廷不許正光元年肅宗遣假員外將軍趙義等使於嘉嘉朝貢不絕又遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉變以為博士肅宗許之嘉死贈鎮西將軍涼州刺史子堅立於後關中賊亂使命遂絕普泰初堅遣使朝貢除平西將軍瓜州刺史泰臨縣伯王如故又加衞將軍至永熙中特除儀同三司進為郡公後遂隔絕鄧至者白水羌也世為羌豪因地名號自稱鄧至其地自亭街以東平武以西汶嶺以北宕昌以南土風習俗亦與宕昌同其王像舒治遣使內附高祖拜龍驤將軍鄧至王遣貢不絕鄧至之西有赫羊等二十國時遣使朝貢朝廷皆授以雜號將軍子男渠帥之名蠻之種類蓋盤瓠之後其來自久習俗叛服前史具之在江淮之間依託險阻部落滋蔓布於數州東連壽春西通上洛北接汝潁往往有焉其於魏氏之時不甚為患至晉之末稍以繁昌漸為寇暴矣自劉石亂後諸蠻無所忌憚故其族類漸得北遷陸渾以南滿於山谷宛洛蕭條略為丘墟矣太祖既定中山聲教被于河表泰常八年蠻王梅安率渠帥數千朝京師求留質子以表忠款始光中拜安侍子豹為安遠將軍江州刺史順陽公興光中蠻王文武龍請降詔褒慰之拜南雍州刺史魯陽侯延興中大陽蠻酋桓誕擁沔水以北滍葉以南八萬餘落遣使內屬高祖嘉之拜誕征南將軍東荊州刺史襄陽王聽自選郡縣誕字天生桓玄之子也初玄西奔至枚回洲被殺誕時年數歲流竄大陽蠻中遂習其俗及長多智謀為羣蠻所歸誕既內屬治於朗陵太和四年王師南伐誕請為前驅乃授使持節南征西道大都督討義陽不果而還十年移居潁陽十六年依例降王為公十七年加征南將軍中道大都督征竟陵遇遷洛師停是時蕭賾征虜將軍直閤將軍蠻酋田益宗率部曲四千餘戶內屬襄陽酋雷婆思等十一人率戶千餘內徙求居大和川詔給廩食後開南陽令有沔北之地蠻人安堵不為寇賊十八年誕入朝賞遇隆厚卒諡曰剛子暉字道進位龍驤將軍東荊州刺史襲爵景明初大陽蠻酋田育丘等二萬八千戶內附詔置四郡十八縣暉卒贈冠軍將軍三年魯陽蠻魯北鷰等聚衆攻逼潁川詔左衞將軍李崇討平之徙萬餘家於河北諸州及六鎮尋叛南走所在追討比及河殺之皆盡四年東荊州蠻樊素安反僭帝號正始元年素安弟秀安復反李崇楊大眼悉討平之二年蕭衍沔東太守田清喜擁七郡三十一縣戶萬九千遣使內附乞師討衍其雍州以東石城以西五百餘里水陸援路請率部曲斷之四年蕭衍永寧太守文雲生六部自漢東遣使歸附永平初東荊州表囗囗太守桓叔興前後招慰大陽蠻歸附者一萬七百戶請置郡十六縣五十詔, WYG: ''}
  - {type: variant, offset: 6113, length: 2700, content: 突厥俗同至于婚貧不能備財者輒盜女去死者亦皆埋殯其服制葬訖則除之性貪婪忍於殺害好射獵以肉酪為糧亦知種田大麥粟豆然其北界氣候多寒唯得蕪菁大麥故其俗貧多富少青海周回千餘里海內有小山每冬冰合後以良牝馬置此山至來春收之馬皆有孕所生得駒號為龍種必多駿異吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里世傳青海驄者是也土出犛牛馬多鸚鵡饒銅鐵朱沙地兼鄯善且末興和中齊獻武王作相招懷荒遠蠕蠕既附於國夸呂遣使致敬獻武王喻以大義徵其朝貢夸呂乃遣使人趙吐骨真假道蠕蠕頻來又薦其從妹靜帝納以為嬪遣員外散騎常侍傅靈葕使於其國夸呂又請婚乃以濟南王匡孫女為廣樂公主以妻之此後朝貢不絕吐谷渾北有乙弗勿敵國俗風與吐谷渾同不識五穀唯食魚及蘇子蘇子狀若中國苟嵵子北又有阿蘭國與鳥獸同不知鬬戰忽見異人舉國便走土無所出大養羣畜體輕工走逐之不可得北又有女王國以女為主人所不至其傳云然宕昌羌者其先蓋三苗之胤周時與庸蜀微盧等八國從武王滅商漢有先零燒當等世為邊患其地東接中華西通西域南北數千里姓別自為部落酋帥皆有地分不相統攝宕昌即其一也俗皆土著居有屋宇其屋織犛牛尾及羖羊毛覆之國無法令又無徭賦惟戰伐之時乃相屯聚不然則各事生業不相往來皆衣裘褐牧養犛牛羊豕以供其食父子伯叔兄弟死者即以繼母世叔母及嫂弟婦等為妻俗無文字但候草木榮落記其歲時三年一相聚殺牛羊以祭天有梁懃者世為酋帥得羌豪心乃自稱王焉懃孫彌忽世祖初遣子彌黃奉表求內附世祖嘉之遣使拜彌忽為宕昌王賜彌黃爵甘松侯彌忽死孫虎子立其地自仇池以西東西千里席水以南南北八百里地多山阜人二萬餘落世修職貢頗為吐谷渾所斷絕虎子死彌治立虎子弟羊子先奔吐谷渾吐谷渾遣兵送羊子欲奪彌治位彌治遣使請救顯祖詔武都鎮將宇文生救之羊子退走彌治死子彌機立遣其司馬利住奉表貢方物楊文度之叛圍武都彌機遣其二兄率衆救武都破走文度高祖時遣使子橋表貢朱沙雌黃白石膽各一百斤自此後歲以為常朝貢相繼後高祖遣鴻臚劉歸謁者張察拜彌機征南大將軍西戎校尉梁益二州牧河南公宕昌王後朝于京師殊無風禮朝罷高祖顧謂左右曰夷狄之有君不如諸夏之亡也宕昌王雖為邊方之主乃不如中國一吏於是改授領護西戎校尉靈州刺史王如故賜以車騎戎馬錦綵等遣還國高昌者車師前王之故地漢之前部地也東西二千里南北五百里四面多大山或云昔漢武遣兵西討師旅頓弊其中尤困者因住焉地勢高敞人庶昌盛因云高昌亦云其地有漢時高昌壘故以為國號東去長安四千九百里漢西域長史戊己校尉並居於此晉以其地為高昌郡張軌呂光沮渠蒙遜據河西皆置太守以統之去敦煌十三日行國有八城皆有華人地多石磧氣候溫暖厥土良沃穀麥一歲再熟宜蠶多五果又饒漆有草名羊刺其上生蜜而味甚佳引水溉田出赤鹽其味甚美復有白鹽其形如玉高昌人取以為枕貢之中國多蒲萄酒俗事天神兼信佛法國中羊馬牧在隱僻處以避寇非貴人不知其處北有赤石山七十里有貪汗山夏有積雪此山北鐵勒界也世祖時有闞爽者自為高昌太守太延中遣散騎侍郎王恩生等使高昌為蠕蠕所執真君中爽為沮渠無諱所襲奪據之無諱死弟安周代立和平元年為蠕蠕所并蠕蠕以闞伯周為高昌王其稱王自此始也太和初伯周死子義成立歲餘為其兄首歸所殺自立為高昌王五年高車王可至羅殺首歸兄弟以敦煌人張孟明為王後為國人所殺立馬儒為王以鞏顧禮麴嘉為左右長史二十一年遣司馬王體玄奉表朝貢請師迎接求舉國內徙高祖納之遣明威將軍韓安保率騎千餘赴之割伊吾五百里以儒居之至羊榛水儒遣禮嘉率步騎一千五百迎安保去高昌四百里而安保不至禮等還高昌安保亦還伊吾安保遣使韓興安等十二人使高昌儒復遣顧禮將其世子義舒迎安保至白棘城去高昌百六十里而高昌舊人情戀本土不願東遷相與殺儒而立麴嘉為王嘉字靈鳳金城榆中人既立又臣于蠕蠕那蓋顧禮與義舒隨安保至洛陽及蠕蠕主伏圖為高車所殺嘉又臣高車初前部胡人悉為高車所徙入於焉耆焉耆又為肽噠所破滅國人分散衆不自立請王於嘉嘉遣第二子為焉耆王以主之永平元年嘉遣兄子私署左衞將軍田地太守孝亮朝京師仍求內徙乞軍迎援於是遣龍驤將軍孟威發涼州兵三千人迎之至伊吾失期而反於後十餘遣使獻珠像白黑貂裘名馬鹽枕等款誠備至惟賜優旨卒不重迎三年嘉遣使朝貢世宗又遣孟威使詔勞之延昌中以嘉為持節平西將軍瓜州刺史泰臨縣開國伯私署王如故熙平初遣使朝獻詔曰卿地隔關山境接荒漠頻請朝援徙國內遷雖來誠可嘉即於理未帖何者彼之甿庶是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懷戀舊今若動之恐異同之變爰在肘腋不得便如來表神龜元年冬孝亮復表求援內徙朝廷不許正光元年肅宗遣假員外將軍趙義等使於嘉嘉朝貢不絕又遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉變以為博士肅宗許之嘉死贈鎮西將軍涼州刺史子堅立於後關中賊亂使命遂絕普泰初堅遣使朝貢除平西將軍瓜州刺史泰臨縣伯王如故又加衞將軍至永熙中特除儀同三司進為郡公後遂隔絕鄧至者白水羌也世為羌豪因地名號自稱鄧至其地自亭街以東平武以西汶嶺以