  - {type: variant, offset: 5879, length: 232, content: 伏連籌伏連籌親率大衆救之遂獲保全自爾以後關徼不通貢獻路絕伏連籌死子夸呂立始自號為可汗居伏俟城在青海西十五里雖有城郭而不居處穹廬隨水草畜牧其地東西三千里南北千餘里官有王公僕射尚書及郎將將軍之號夸呂椎髻毦珠以皂為帽坐金師子牀號其妻為恪尊衣織成裙披錦大袍辮髮於後首戴金花冠其俗丈夫衣服略同於華夏多以羅冪為冠亦以繒為帽婦人皆貫珠貝束髮以多為貴兵器有弓刀甲矟國無常賦須則稅富室商人以充用焉其刑罰殺人及盜馬者死餘則徵物以贖罪亦量事決杖刑人必以氈蒙頭持石從高擊之父兄死妻後母及嫂, WYG: 是洪}
