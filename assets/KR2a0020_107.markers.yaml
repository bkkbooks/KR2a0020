  - {type: variant, offset: 9532, length: 432, content: 一狗以謝其母母得狗謝不復嫌恨若報怨相攻擊必殺而食之平常劫掠賣取猪狗而已親戚比隣指授相賣被賣者號哭不服逃竄避之乃將買人捕逐指若亡叛獲便縛之但經被縛者即服為賤隸不敢稱良矣亡失兒女一哭便止不復追思惟執盾持矛不識弓矢用竹為簧羣聚鼓之以為音節能為細布色至鮮凈大狗一頭買一生口其俗畏鬼神尤尚淫祀所殺之人美鬢髯者必剝其面皮籠之於竹及燥號之曰鬼鼓舞祀之以求福利至有賣其昆季妻奴盡者乃自賣以供祭焉鑄銅為器大口寬腹名曰銅爨既薄且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣為益州大患勢內外受敵所以亡也自桓溫破蜀之後力不能制又蜀人東流山險之地多空獠遂挾山傍谷與夏人參居者頗輸租賦在深山者仍不為編戶蕭衍梁益二州歲歲伐獠以自裨潤公私頗藉為利正始中夏侯道遷舉漢中內附世宗遣尚書邢巒為梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢為寇後以羊祉為梁州傅豎眼為益州祉性酷虐不得物情蕭衍輔國將軍范季旭與獠王趙清荊率衆屯孝子谷祉遣統軍魏胡擊走之後蕭衍寧朔將軍姜白復擁夷獠入屯南城梁州人王, WYG: 此數日}
