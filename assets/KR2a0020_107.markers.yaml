  - {type: variant, offset: 10376, length: 5, content: 攻陷巴州執, krp: 所得損益盈縮積分為定積分積分盛者以減本朔望小餘縮者加之加之滿日法者交㑹加時在後日減之不足減者減一日加日法乃減之交㑹加時在前日月蝕者隨定大小蝕餘為定日加時推加時術曰以歳中乗定小餘日法除之所得命以子算外朔望加時有餘不盡者四之如法得一為少二為半三為太半又有餘者三之如法得一為彊半法以上排成一不滿半法棄之以彊并少為少彊并半為半彊并太為太彊得二彊者為少弱以之并少為半弱以之并半為太弱以之并太為一辰弱隨所在辰而命之即其彊弱日之衝為破月常在破下蝕推日月合朔弦望度第五推日度術曰置入紀以來朔積日以日度法一萬六千八百六十乗之滿周天去之餘以日度法約之為度餘命起牛前十二度宿次除之不滿宿者算外即所求年天正十一月朔夜半日所在度及分推日度又法術曰置周天三百六十五度斗分四千一百一十七以冬至去朔日數減一以減周天度冬至小餘減斗分斗分不足減者減一度加日度法乃減之命起如上算外即所求年天正十一月朔夜半日所在度及分求日次月次日所在度術曰月大者加度三十月小者加度二十九次日者加度一宿次除之遥斗除其分推合朔日月共度術曰以章歳五百六十二乗朔小餘以章月六千九百五十一除之所得為大分不盡為小分以加夜半日度分分滿日度法從度命如上算外即所求年天正十一月合朔日月共度推合朔日月共度又法術曰加度二十九大分八千九百四十五小分六千九百一十九小分滿章月從大分大分滿日度法從度宿次除之逕斗去其分算外即次月合朔日月共度推月度術曰置入紀以來朔積日以周二十二萬五千三百九十乘之滿周天去之餘以日度法約之為度餘為度分命起牛前十二度宿次除之不滿宿者算外即所求年天正十一月朔夜半月所在度及分推月度又法術曰以小周乗朔小餘為實章歳乗日法為法實如法得一為度不滿法者以章月除之為大分餘為小分所得以減合朔度及度分算外即所求年天正十一月朔夜半月所在度及分求月次月度術曰月小加度二十二分七千三百七十三月大加度三十五分一萬三千五百八十三分滿日度法從度宿次除之不滿宿者算外即月次月所在度求月次日度術曰加度十三分六千二百一十分滿日度法從度除如上算外即月次日所在度求弦望日所在度術曰加合朔度七大分六千四百五十一小分三千四百六十一微分二微分滿四從小分小分滿章月從大分大分滿日度法從度命如上算外即上弦日所在度又如得望下弦後月合朔求弦望月所在度術曰加合朔度九十八大分一萬一千六百九十五小分五千二百二十五微分一滿除如上算外即上弦日月所在度又加得望下弦後月合朔斗二十六度牛八度女十二度虛十度危十七度室十六度壁九度北方𤣥武七宿九十八度分四千一百一十七奎十六度婁十二度胃十四度昴十一度畢十六度觜二度參九度西方白虎七宿八十度井三十三度鬼四度柳十五度星七度張十八度翼十八度軫十七度南方朱鳥七宿一百一十二度角十二度亢九度氐十五度房五度心五度尾十八度箕十一度東方蒼龍七宿七十五度周天三百六十五度一萬六千八百六十分度之四千一百一十七通之得六百一十五萬八千一十七名曰周天推土王滅沒卦候上朔日術第六推土王日術曰置四立大小餘各減其大餘十八小餘四千四百二十小分十八微分二大餘不足減者加六十乃減之小餘不足減者減一日加蔀法乃減之小分不足減者減小餘一加小分法二十四乃減之微分不足減者減小分一加五然後皆減之命以紀算外即四立前土王日推土王又法術曰加冬至大餘二十七小餘六千六百三十一小分六微分三微分滿五從小分小分滿小分法從小餘小餘滿蔀法從大餘一命以紀算外即季冬土王日求次季土王日術曰加大餘九十一小餘五千二百四十四小分六小分滿小分法從小餘小餘滿蔀法從大餘大餘滿六十去之命以紀算外即次季土王日推滅沒術曰因冬至積沒有小餘者加積沒一以沒分乗之以沒法八萬八千四百一十七除之所得為積日不盡為沒餘六旬去積日不盡為沒日命以紀算外即所求天正十一月冬至後沒日求次滅術曰加沒日六十九沒餘五萬七千二百四十四沒餘滿沒法從沒日沒日滿六十去之命以紀算外即次沒日餘盡者為滅求次沒術曰加沒日六十九沒餘一萬九百一十五沒分六萬二千二百八十五沒分滿沒法從沒餘沒餘滿蔀法從沒日命起前沒月厯月大小除之不滿月者即後沒日及沒餘沒分命曰如上算外即次沒日推四正卦術曰因冬至大小餘即坎卦用事日春分即震卦用事日夏至即離卦用事日秋分即兌卦用事日中孚因坎卦求次卦術曰加坎卦大餘六小餘一千四百七十三小分十四微分四微分滿五從小分小分滿小分法從小餘小餘滿蔀法從大餘大餘滿六十去之命以紀算外即復卦用事日十一月未濟蹇頤中孚復十二月屯謙睽升臨正月小過蒙益漸泰二月需隨晉解大壯三月豫訟蠱革夬四月旅師比小畜乾五月大有家人井咸姤六月鼎豐渙履遯七月恒節同人損否八月巽萃大畜賁觀九月歸妹无妄明夷困剥十月艮既濟噬嗑大過坤四正為方伯中孚為三公復為天子屯為諸侯謙為大夫睽為九卿升還從三公周而復}
