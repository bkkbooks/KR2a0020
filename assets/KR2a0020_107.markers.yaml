  - {type: variant, offset: 9092, length: 1, content: 守, WYG: 尉府長史臣陸操尚書右丞城陽縣開國子臣盧元明中書侍郎臣李同軌前中書侍郎臣邢子明中書侍郎臣宇文忠之前司空府長史建康伯臣元仲悛大丞相法曹參軍臣杜弼尚書左中兵郎中定陽伯臣李溥濟尚書起部郎中臣辛術尚書祠部郎中臣元長和前青州驃騎府司馬安定子臣胡世榮太史令盧鄉縣開國男臣趙洪慶太史令臣胡法通應詔左右臣張喆員外司馬督臣曹魏祖太史丞郭慶太史博士臣胡仲和等或器􅋆民譽或術兼世業並能顯微闡幽表同録異詳考古今共成此厯甲為日始子實天正命厯置元宜從此起運屬興和以年號為目豈獨太初表於漢代景初冠於魏厯而已謹以封呈乞付有司依術施用詔以新厯示齊獻武王}
