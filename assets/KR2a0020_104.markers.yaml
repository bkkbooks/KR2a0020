  - {type: variant, offset: 2988, length: 361, content: 都督揚南徐二州驃騎大將軍開府錄尚書事揚州刺史加班劍三十人封宣城郡公二千戶以兵五千人出鎮東城殺其鄱陽王鏘隨王子隆遣中護軍王玄邈殺昭文南兗州刺史安陸王子敬豫州刺史王廣之殺江州刺史晉安王子懋又殺湘州刺史南平王銳郢州刺史晉熙王銶南豫州刺史宜都王鑑鸞加黃鉞進授都督中外諸軍太傅領大將軍揚州牧增班劍四十人前後部羽葆鼓吹劍履上殿入朝不趨贊拜不名封宣城郡王食邑五千戶使持節中書監錄尚書並如故又殺昭文桂陽王鑠衡陽王鈞江夏王鋒廬陵王子卿建安王子真巴陵王子倫乃廢昭文為海陵王尋死鸞僭立焉鸞字景栖其叔父道成寵愛之過於諸子蕭賾末為尚書左僕射甚親委之賾死遂秉朝政既殺昭業專權酷暴屠滅賾等子孫既而自立時太和十八年也號年建武其宣德太僕劉朗之游擊將軍劉璩之坐不贍給兄子致使隨母他嫁免官禁錮時論者謂薄義之由實自鸞始鸞雍州刺史曹虎據襄陽請降高祖詔行征南將軍薛真, krp: ''}
