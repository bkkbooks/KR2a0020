  - {type: variant, offset: 11247, length: 315, content: 州授景封為壽陽王遣其朝貢與部下歃血盟訖景詐引軍還石頭衍乃敕援軍令下諸軍初不受詔後重敕乃從衍又令援軍以船三百艘給景景猶嫌其少又敕付二百衍永安侯蕭確直閤將軍趙威方頗有勇略為景所憚景乃謂衍曰確與威方頻隔岸見罵云天子自與汝和我終不置汝我今便不敢去若召此二人入城者吾當解圍衍復遣使徵確等確等不從衍又為手書與諸軍云確若不入者宜以軍法送之確等不得已乃赴衍景復謂衍曰始有西信至北軍已克壽春鍾離我今便無委足處求權借廣陵譙州待征復兩城還以此州相歸衍又許之景外云欲和伺其懈怠衍君臣上下信景欺詐所有戰具悉皆收去後知非實更狼狽設備有甚於初城轉危急衍等計窮乃復遣使詣景景又詭云今時既熱便不能得去正當乞留京師為朝廷立效耳而悉力大攻七年三月遂拔之景自至建業縱軍士, WYG: 論}
