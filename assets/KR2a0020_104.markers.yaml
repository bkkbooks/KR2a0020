  - {type: variant, offset: 978, length: 1691, content: 元琛等攻其馬頭戍克之道成遣其徐州刺史崔文仲攻陷茬眉戍詔遣尚書游明根討之又遣平南將軍郎大檀三將出昫城將軍白吐頭二將出海西將軍元泰二將出漣口將軍封延三將出角城鎮南將軍賀羅出下蔡道成梁州刺史崔慧景遣長史裴叔保率衆寇武興關城氐帥楊鼠擊破之叔保還南鄭梁郡王嘉破道成將盧紹之玄元度於昫山下蔡戍主棄城遁走又詔昌黎王馮熙為西道都督與征南將軍桓誕出義陽鎮南將軍賀羅自下蔡東出鍾離道成游擊將軍桓康於淮陽破之道成豫州刺史垣崇祖寇下蔡昌黎王馮熙擊破之梁郡王嘉大破道成將俘獲二萬餘口送京師道成遣後軍參軍車僧朗朝貢先是劉準遣使殷靈誕苟昭先未反而道成僭立及僧朗至朝廷處之靈誕之下僧朗與靈誕競前後降人解奉君遂於朝會刃僧朗詔加殯斂送喪令還道成死子賾僭立改年為永明賾遣其驍騎將軍劉纘前將軍張謨朝貢八年又遣兼員外散騎常侍司馬憲兼員外散騎侍郎庾習朝獻九年遣輔國將軍劉纘通直郎裴昭明朝貢十年又遣昭明與冠軍參軍司馬迪之朝貢賾初為太子時特奢侈道成每欲廢之賴王敬則和諧賾性貪惏常謂人曰唯崔慧景知我貧賾嘗至其益州刺史劉悛宅晝臥覺悛自捧金澡盤面廣三尺愛姬執金澡灌受四升以充沃盥因以奉獻賾納之其好利若此賾遊獵無度其殿中將軍邯鄲超上表諫賾殺之十三年遣平南參軍顏幼明冗從僕射劉思效朝貢十四年賾巴東王子響殺長史劉寅司馬席恭穆謀殺賾賾遣丹陽尹蕭順之討殺之十五年二月遣員外散騎常侍裴昭明員外散騎侍郎謝竣朝貢九月又遣司徒參軍蕭琛范縝朝貢十六年復遣琛與司徒參軍范雲朝貢又遣車騎功曹庾蓽南豫州別駕何憲朝貢十七年賾雍州刺史王奐與南蠻長史劉興祖論衆罪賾以興祖付獄令送還建業奐輙於獄殺之而云自死賾怒遣其直閤將軍曹道剛梁州刺史曹虎收奐奐閉門拒戰司馬黃瑤起於城內起兵攻奐殺之奐子祕書丞肅肅弟秉來降賾子長懋死立其孫南郡王昭業為太孫賾遇疾暫絕其子竟陵王子良在殿內昭業未入中書郎王融戎服於中書省閤口斷東宮仗不得進欲立子良賾既蘇昭業入殿融知子良不得立乃釋服還省賾死昭業立十數日收融付廷尉殺之昭業生而為其叔子良所養而矯情飾詐陰懷鄙慝與左右無賴羣小二十許人共衣食同臥起妻何氏擇其中美貌者與交通密就富商大賈取錢無數既與子良同居未得肆意子良移西邸昭業獨住西州每至昏夜輒開後閤與諸小人共至諸營署恣淫宴凡諸不逞皆迭加爵位許以南面之日便即施行皆疏官位名號於黃牋紙與之各各囊盛帶之肘後昭業師史仁祖侍書胡天翼聞之相與謀曰若言之二宮則其事未易若於營署為異人所毆打及為犬物所傷殘豈直罪止一身亦當盡室及禍年各已七十餘生寧足吝也數日仁祖天翼皆自殺昭業父長懋自患及死昭業侍奉憂哀號毀過禮及還私室與所親愛欣笑酣飲備諸甘滋葬畢立為皇太孫截壁為閤於母房內往何氏間每入輒彌時不出賾至東宮昭業迎拜號慟絕而後蘇賾自下輿抱持之寵愛隆重初昭業在西州令女巫楊氏禱祝速求天位及其父死謂由楊氏之力倍加敬信楊氏子珉亦有美貌何氏尤愛悅之昭業呼楊氏為婆劉氏以來民間亦作楊婆兒歌蓋為此也及在東宮賾有疾令楊氏日夕祈禱令賾早死與何氏書於紙中作一大喜字作小喜三十六字遶之賾謂其必能負荷大業謂曰五年已來一委宰相汝多庴意五年以後勿復委人臨死執昭業手曰阿奴若憶翁當好作如此者再而死子良時在中書省昭業疑畏使虎賁中郎將潘淑領百人屯太極殿西階以防之大斂之始呼賾伎人備舉衆樂諸伎雖畏威從事莫不哽咽流涕及成服悉遣諸王還第子良固乞留過賾葬不許昭業素好狗馬立未十日便毀賾所起招婉殿以殿材乞閹人徐龍駒造宅於其處為馬埒馳走墜馬面額並傷稱疾不出者數日多聚名鷹快犬以粱肉奉之賾將葬喪車未出端門昭業便稱疾還內裁入閤便於內奏胡伎鞞鐸之聲震響內外時司空王敬則問射聲校尉蕭坦之曰便如此不當怱怱邪坦之曰此政當是內人哭聲響徹耳自賾葬後昭業微服而出遊走里市又多往其父母陵隧中與羣小共作鄙藝擲塗賭跳放鷹走狗諸雜狡獪日日輒往以此為常朝事大小皆斷於尚書令蕭鸞初蕭賾聚錢上庫至五億萬齋庫亦出三億萬金銀布帛絲綿不可稱計至此歲末所用過半皆賜與左右厮卒之徒及至廢黜府庫空盡昭業在內常着紫綿紅繡雜衣或錦帽改年為隆昌以黃門郎周奉叔為冠軍將軍青州刺史奉叔諂諛為事昭業甚悅之而專恣跋扈無所忌憚常從單刀二十口出入禁闥門衞莫敢訶止每語人云周郎刀不識君徐龍駒自東宮齋師以便佞見寵構造姦邪以取容媚凡諸鄙黷雜, WYG: ''}
