  - {type: variant, offset: 11614, length: 587, content: 海辭不獲免權總萬機今景既入輔乞解僭濫以王還邸自景圍建業城中多有腫病死者相繼無復板木乃刳柱為棺自雲龍神虎門外橫屍重沓血汁漂流無復行路及景入城悉聚尸焚之煙氣張天臭聞數十里初城中男女十餘萬人及陷存者纔二三千人又皆帶疾病蓋天亡之也衍尋為景所餓殺自衍為景攻圍歷百餘日衍子荊州刺史湘東王繹益州刺史武陵王紀各擁兵自守坐看衍之懸危竟不奔赴始景渡江至陷城之後江南之民及衍王侯妃主世冑子弟為景軍人所掠或自相賣鬻漂流入國者蓋以數十萬口加以飢饉死亡所在塗地江左遂為丘墟矣初衍崇信佛道於建業起同泰寺又於故宅立光宅寺於鍾山立大愛敬寺兼營長干二寺皆窮工極巧殫竭財力百姓苦之曾設齋會自以身施同泰寺為奴其朝臣三表不許於是內外百官共斂珍寶而贖之衍每禮佛捨其法服著乾陀袈裟令其王侯子弟皆受佛誡有事佛精苦者輒加以菩薩之號其臣下奏表上書亦稱衍為皇帝菩薩衍所部刺史郡守初至官者皆責其上禮獻物多者便云稱職所貢微少言為弱惰故其牧守在官皆競事聚斂劫剝細民以自封殖多妓妾粱肉金綺百姓怨苦咸不聊生又發召兵士皆須鎖械不爾便即逃散其王侯貴人奢淫無度弟兄子姪侍妾或及千數至乃回相贈遺其風俗頹喪綱維不舉若此衍自以持戒乃至祭其祖禰不設牢牲時人皆竊云雖僭司王者然其宗廟實不血食矣衍未敗前災其同泰寺衍祖父墓前石麟一旦亡失識者咸知其將滅也景又立衍子綱尋復殺之衍之親屬並見屠害矣史臣曰二蕭競塗泥之中同蝸角之戰或年纔三紀或身不獲終而偷名江徼自擬王者, WYG: ''}
