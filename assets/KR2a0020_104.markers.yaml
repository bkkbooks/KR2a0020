  - {type: variant, offset: 7731, length: 0, content: '', WYG: 入朝薰灼於世收初不詣門㥄為帝登祚赦云朕託體孝文收嗤其率直正員郎李慎以告之㥄深忿忌時前廢帝殂令收為詔㥄乃宣言收普泰世出入幃幄一日造詔優為詞㫖然則義旗之士盡為逆人又收父老合解官歸侍南䑓將加弹劾頼尚書辛雄為言於中尉綦儁乃觧收有賤生弟仲同先未齒錄因此怖懼上籍遣還鄉扶侍出帝嘗大發士卒狩於嵩少之南旬有六日時既寒苦朝野嗟怨帝與從官皆胡服而騎宮人及諸妃主雜其間竒伎異飾多非禮度收欲言則畏懼欲默不能已乃上南狩賦以諷焉年二十七雖富言淫麗而終歸雅正帝手詔報焉甚見褒美鄭伯謂曰卿不遇老夫猶應逐兎初齊獻武王固讓天柱大將軍帝勑收為詔令遂所請欲加相國問收相國品秩收以實對帝遂止收既未測主相之意以前事不安}
