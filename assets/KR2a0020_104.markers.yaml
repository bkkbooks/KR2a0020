  - {type: variant, offset: 7732, length: 0, content: '', WYG: 解詔許焉久之除帝兄子廣平王贊開府從事中郎收不敢辭乃為庭竹賦以致已意尋兼中書舍人與濟陰温子昇河間邢子才齊譽世號三才時出帝猜忌獻武内有間隙收遂以疾固辭而免其舅崔孝芬怪而問之收曰懼有晉陽之甲尋而獻武南上帝西入關收兼}
