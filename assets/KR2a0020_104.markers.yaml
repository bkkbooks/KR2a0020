  - {type: variant, offset: 3350, length: 3670, content: 督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉藻出南鄭車駕南伐十九年鸞龍陽縣開國侯王朗自渦陽來降左將軍元麗大破鸞將擒其寧州刺史董蠻車駕濟淮幸八公山巡淮而東發鍾離將臨江水司徒馮誕薨乃詔班師遣使臨江數鸞罪惡鸞殺其西陽王子明南海王子罕邵陵王子真二十一年車駕討鸞鸞前將軍韓季方弋陽太守王嗣之後將軍趙祖悅等十五將來降大破鸞軍於江北獲其將軍王伏保等車駕遂巡沔東而還鸞將王曇紛等萬餘人寇南青州黃郭戍主崔僧淵擊破之悉虜其衆又克新野城斬鸞輔國將軍新野太守劉忌鸞湖陽戍主蔡道福赭陽戍主成公期及軍主胡松舞陰戍主輔國將軍西汝南北義陽二郡太守黃瑤起及直閤將軍軍主鮑舉南鄉太守席謙並委戍走擒瑤起鮑舉鸞又殺其河東王鉉臨賀王子岳西陽王子文衡陽王子珉湘東王子建南郡王子夏巴陵王昭秀桂陽王昭粲車駕幸南陽進攻宛北城拔之冠軍將軍南陽太守房伯玉以城降又大敗鸞平北將軍崔慧景黃門郎蕭衍於鄧城斬獲首虜二萬有餘鸞憂怖遂疾甚乃大赦改年為永泰其大司馬王敬則於會稽舉兵將以誅鸞鎮北諮議謝眺敬則女夫也告之敬則敗而死鸞死子寶卷僭立二十三年春寶卷改元為永元遣其太尉陳顯達率崔慧景攻馬圈城詔前將軍元英討之寶卷遣將寇順陽詔振威將軍慕容平城率騎討之顯達攻陷馬圈城車駕南伐詔鎮南大將軍廣陽王嘉斷均口顯達戰敗潰圍夜走斬其左軍將軍張子順賊將蔡道福成公期等數萬人棄順陽遁走寶卷昏狂政出羣竪其始安王遙光據東府反不克見殺并殺其右僕射蕭坦之左衞將軍曹虎領軍將軍劉暄尋殺司空徐孝嗣左僕射沈文季前撫軍長史沈昭略其太尉江州刺史陳顯達舉兵襲建業不果而死景明初寶卷豫州刺史裴叔業以壽陽降寶卷遣其衞尉蕭懿為征虜將軍豫州刺史步道伐壽陽頓軍小峴詔遣軍司李煥及統軍奚康生楊大眼等率衆入壽陽驃騎大將軍彭城王勰車騎將軍王肅率步騎十萬赴之寶卷遣將胡松李居士率衆萬餘屯死虎陳伯之水軍泝淮而上以逼壽春勰肅大破之斬首萬數陳伯之又寇淮南勰破之肥口豫州刺史田益宗破寶卷將吳子陽鄧元起於長風寶卷遣侍中崔慧景率諸軍自廣陵水路欲赴壽陽慧景見寶卷狂虐不復自保及得專征欣然即路慧景子覺時為直閤與之密期慧景至廣陵覺遂出奔慧景過廣陵數十里便回軍還時廣陵闕鎮司馬崔恭納之因率衆濟江遂攻建業寶卷嬰城自守寶卷豫州刺史蕭懿擊破慧景擒殺之慧景既死寶卷便自得志無所忌憚日日出遊愛幸茹法珍梅虫兒等及左右應敕捉御刀之徒並專國命民間謂之刀敕寶卷每常輕騎戎服往此諸家與之讌飲此等每有吉凶寶卷輒往弔慶不欲令人見之驅斥百姓惟置空宅而已所往之處既無定所官司常慮得罪東行驅西面人南出驅北面人旦或應出夜便驅遣吏司奔馳叫呼盈路老少震驚啼號塞路處處禁斷不知所適疾患困篤者悉輿去之其有無人輿者匍匐道側主司又加捶打絕命者相繼還宮之時常至半夜左右輒入富室取物蕩盡前魏興太守王敬賓新死未斂家人被驅不得守視及家人還鼠食敬賓兩眼都盡如此者非一寶卷酷亂逾甚其尚書令蕭懿雖有大勳忌而殺之并殺其弟衞尉卿蕭暢世宗詔冠軍將軍南豫州刺史席法友三萬人圍寶卷輔國將軍北新蔡安豐二郡太守胡景略於建安城克之擒景略寶卷雍州刺史蕭衍據襄陽舉兵伐之荊州行事蕭穎冑應衍三月穎冑叛寶卷以南康王寶融為天子於是寶融僭即帝位穎冑為侍中尚書令衍為左僕射都督征討諸軍征東大將軍使持節如故穎冑請封寶卷為虞陽縣侯寶融不許又封涪陵王穎冑監八州諸軍事行荊州刺史假衍黃鉞蕭衍軍至沔口郢州嬰城自守寶卷又殺巴陵王昭冑永新侯昭秀黃門郎蕭寅寶卷昏暴日甚內外不堪其前南譙太守王靈秀等於石頭迎寶卷弟寶夤率城內文武向其臺城百姓空手隨從者萬數會日暮城門閉不克衍兵至建業所在棄寶卷降之衍兵入宮寶卷在含德殿吹笙歌作女兒子臥未及睡聞兵入趨出北戶欲還後宮清曜閤已閉閹人禁防黃泰平刀傷其膝仆地顧曰奴反也直後張齊斬首送衍衍追封東昏侯廢其皇后太子為庶人衍殺寶卷弟湘東王寶晊衍又殺邵陵王寶攸晉熙王寶松桂陽王寶貞其建安王寶夤來奔尋逼寶融禪位於己封為巴陵王宮于姑熟寶融尋暴死島夷蕭衍字叔達亦晉陵武進楚也父順之蕭賾光祿大夫衍少輕薄有口辯歷王儉衞軍府戶曹屬累遷為蕭鸞黃門侍郎太子中庶子太和二十二年高祖南伐詔諸軍圍襄陽衍時率衆來援為武衞將軍宇文福所破單騎走免蕭鸞末出為輔國將軍雍州刺史鸞死子寶卷立殺衍兄懿遣巴西梓潼二郡太守劉山陽西上聲云之郡實令襲衍山陽至荊州為蕭頴冑所殺景明二年衍乃與頴冑推寶卷弟荊州刺史寶融為主號年中興舉兵伐寶卷其年十二月克建業殺寶卷及其妻子衍為大司馬錄尚書事揚州刺史建安郡公邑萬戶三年又自為相國揚州牧封十郡為梁王衍尋僭立自稱曰梁號年天監五月揚州小峴戍主党法宗襲衍大峴戍破之擒其龍驤將軍邾菩薩送京師衍又遣將張囂寇揚州州軍擊破之斬二千餘級四年三月揚州刺史任城王澄遣長風戍主奇道顯攻衍陰山戍破之斬其龍驤將軍都亭侯梅興祖仍攻白藁戍又破之斬其寧朔將軍吳道爽等獲數千級衍又遣其徐州長史潘伯憐屯軍淮陵徐州刺史司馬明素又據九山澄遣軍並擊破