  - {type: variant, offset: 7032, length: 1, content: 衆, WYG: 斷道主簿楊僧覆先行曉喻諸氐忿曰我留刺史爾送出也斫之數創㡬死子建徐加慰譬旬日方得前行吏人贈遺一無所受而東益氐蜀尋反攻逼唐永永棄城而走乃喪一藩矣初永之走子建客有沙門曇璨及鉅鹿人耿顯皆没落氐手及知子建之客垂泣追衣物還之送出白馬遺愛所被如此自國家開華陽等郡梁州邢巒益州傅豎眼及子建為最初子建為前軍將軍十年不徙在洛閑暇與吏部尚書李韶韶從弟延寔頗為奕棊時人謂為耽好子建每曰棊於機權㢘勇之際得之深矣且吾未為時用博奕可也及一臨邊事凡經五年未曽對局還洛後俄拜常侍衛尉卿初元顥内逼莊帝北幸子建謂所親盧義僖曰北海自絶社稷稱藩蕭衍吾老矣豈能為陪臣遂擕家口居洛南顥平乃歸先苦風痺及此遂甚以卿任有務屢上書乞身特除右光祿}
  - {type: page-break, offset: 7032, content: '', id: KR2a0020_WYG_104-3a, image: WYG0262/WYG0262-0508a.png}
