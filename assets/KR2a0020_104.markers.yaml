  - {type: variant, offset: 7036, length: 4, content: 擒斬三千, WYG: 平太傅李延寔子侍中彧為大使撫慰東土時外戚貴盛送客填門子建亦往候别延寔曰小兒今行何以相朂子建曰益以盈滿為誡延寔悵然久之及莊帝殺尒朱榮遇禍於河陰者其家率相弔賀太尉李䖍第二子仁曜子建之女壻往亦見害子建謂姨弟盧道䖍曰朝廷誅翦權彊凶徒尚梗未聞有竒謀異略恐不可濟此乃李門禍始弔賀無乃怱怱及永安之後李氏宗族流離或遇誅夷如其所慮後歴左光禄大夫加散騎常侍驃騎大將軍子建自出為藩牧董司山南居脂膏之中遇天下多事正身潔已不以財利經懐及歸京師家}
