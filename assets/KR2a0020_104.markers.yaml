  - {type: variant, offset: 392, length: 305, content: 事尋解衞尉加侍中戍石頭城劉休範舉兵以討王道隆等為名治嚴數日便率大衆席卷而下道成等率衆拒戰事平以道成為散騎常侍中領軍都督南兗兗徐青冀五州鎮軍將軍南兗州刺史持節侯如故後進爵為公增邑二千戶劉昱凶虐日甚道成與直閤王敬則昱左右楊玉夫同謀殺昱迎弟準立之改年為昇明時太和元年也道成移鎮東城以甲仗五十人入殿進位侍中司空錄尚書事驃騎大將軍持節都督刺史加故封竟陵郡公五千戶給班劍三十人又進督豫司二州荊州刺史沈攸之舉兵討道成道成率衆入鎮朝堂司徒袁粲先鎮石頭據城與尚書令劉秉前湘州刺史王蘊謀討道成密信要攸之速下將為內應不克粲與子最俱死秉父子踰城走於檐湖王蘊走向鬬場並見擒攸之至于夏口敗走與第三子中書郎太和單騎南奔華容縣俱自縊死道成又為, WYG: 請累遷}
