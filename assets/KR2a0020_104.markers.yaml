  - {type: variant, offset: 10529, length: 369, content: 萬其凍溺燒之而死不可勝數衍既慚悔六年復遣使羊珍孫款關乞和并修弔書於齊文襄王文襄王欲以威德懷之許其通而不復其書衍於是遣其散騎常侍謝珽通直常侍徐陵詣闕朝貢珽等未及還而侯景舉兵襲衍密與衍弟子臨賀王正德交通許推為主景至橫江衍令正德率軍拒景正德因而迎之景濟江立以為主以趣建業衍好人佞己末年尤甚或有云國家強盛者即便忿怒有云朝廷衰弱者因致喜悅是以其朝臣左右皆承其風旨莫敢正言初景之將渡江也衍沿道軍戍皆有啟列而中領軍朱䌇恐忤衍意且謂景不能渡遂不為聞景至嵫湖方大驚駭乃令其太子綱守中書省軍事悉以委之又逼居民入城百姓因相剝掠不可禁止衍令直從監俞景茂赦二冶尚方錢署罪人及建康廷尉諸囚欲押令入城以充防捍諸徒囚放火燒冶一時散走衍憂懣無計唯令其王公已下分屯諸門攝諸寺藏錢皆入聚德陽堂以充軍實景既至便圍其城縱火燒爇掘長圍築土山以攻衍衍亦於城內起山以應之衍令文武運土人責, WYG: 例}
