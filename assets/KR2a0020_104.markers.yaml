  - {type: variant, offset: 8103, length: 2403, content: 聲援仍堰泗水以灌彭城齊文襄王遣行臺慕容紹宗儀同三司高岳潘相樂等率衆討之紹宗檄衍境內曰夫乾坤交泰明聖興作有冥運行之力俱盡變化之途抱識含靈融然並至呈形賦命混而同往所以玄功潛運至德旁通百姓日用而不知萬國受賜而無迹豈徒鑿其耳目易其心慮悟以風雲一其文軌使夫日月之照不私雨露之施均洽運諸仁壽之域納於福祿之林自晉政多僻金行淪蕩中原作戰鬬之場生民為鳥獸之餌則我皇魏握玄帝之圖納水靈之祉駕雲車而自北策龍御以圖南致符上帝援溺下土怪物殛死淫水不作運神器於顧眄定寶命於踟蹰恢之以武功振之以文德宇內反可封之俗員首識堯舜之心沙海荒忽之外瀚漠羈縻之表方志所不傳荒經所不綴莫不繩谷釣山依風託水共仰中國之聖同欣大道之行唯夫三吳百越獨阻聲教匪民之咎責有由焉自偽晉之後劉蕭作慝擅僭一隅號令自己惟我祖宗馭宇愛民重戰未極謀臣之畫不窮節將之兵聊遣行人降以尺一圓臺已築黃屋輒去賜其几杖置之度外蕭衍輕險有素士操蔑聞睥睨君親自少而長好亂樂禍惡直醜正巧用其短以少為多月斗惑愚淺大言以驚俗驅扇邪僻口兵以作威曲體脅肩搖脣鼓舌候當朝之顧指邀在位之餘論遂汙辱冠帶偷竊藩維及寶卷昏狂下不堪命曾無北面有犯之節遽滅人倫在三之禮憑妖假怪鬼語神言稱兵指闕傾朝鴆主陵虐孤寡聾愚士民天不悔禍姦醜得志內恣彫靡外逞殘賊驅羸國之兵迫糊口之衆南出五嶺北防九江屯戍不解役無寧歲死亡矢刃之下夭折霧露之中哭泣者無已傷痍者不絕託身人上忽下如草遂使頑嚚子弟肆行淫虐狡猾羣小縱極貪惏剝割蒼生肌肉略盡刳剔黔首骨髓俱罄猛虎未方其害餓狼詎侔其禍惵惵周餘救死無地至於矯情飾詐事非一緒毒螫滿懷妄敦戒業躁競盈胸謬治清靜至乃大興寺塔廣繕臺堂昭陽到景垂珠銜璧崢嶸刻削千門萬戶鞭撻疲民盡其筋骨延壤運石悲歌掩途死而可祈甘同仙化智淺謀疏曾不自揆遏桐柏之流翻為己害子亡齊之胤忽為戎首書契迄茲罕聞其事至於廢捐冢嫡崇樹愚子朋黨路開彼我側目疾視扼腕十室而九翹足有待良亦多人二紀於茲王家多故始則車馳之警終有驚墜之哀神祇痛憤宇縣崩震於是故相國齊獻武高王感天壤之慘黷激雲雷以慨然仗高義而率民奮大節以成務爰有匡國定霸之圖非直討賊雪之舉於是叡略紛紜靈武冠世盪滌逋孽尊主康邦皇上秉歷受圖天臨日鏡道隨玄運德與神行既而元首懷舞戚之風上宰薄兵車之會遂解縶南冠喻以好睦舟車遵溯川陸光華亭徼相望欣然自泰反肉還童不待羊陸雖嘉謀長算爰自我始罷戰息民兩獲其泰王者之信明如四時豈或為人君父二三其德書而不法可不惜哉侯景一介役夫出自凡賤身名淪蔽無或可紀直以趨馳便習見愛尒朱小人叨竊遂忝名位及中興之際義旗四指元惡不赦實在羣胡景荷人成拔藉其股肱主人有丹頸之期所天蹈族滅之釁雖不能蔽捍左右以命酬恩猶當慘顏後至義形於色而趣利改圖速如覆手投身麾下甘為僕隸獻武王棄其瑕穢錄其小誠得厠五命之末預在一隊之後參跡驅馳庶其來效長鞭利鎩術以制之既關隴逋誅每事經略以河南空虛之地非兵戰之衝薄存掎角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋唯景任總兵統旅別有司存而愚褊有積驕愎遂甚犯違軍紀仍自猜貳禍心潛構翻為亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母如脫屣棄少弟如遺土羣子陸陸妻姪成行慕姜兒之爽言蔑伯春之宛轉跳梁猖蹶夫欲誰欺比之梟鏡異類同醜欲擬蛇鼠顧匪其倫及遠託關右委命寇逆寶炬定君臣之分黑獺結兄弟之親授以名器之尊救其重圍之死憑人繫援假人鼻息俄而忘恩背惠親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流禦之地甘辭卑體進熟圖身詭言浮說抑可知矣叛豎救命豈將擇音偽朝大夫幸災忘義主耄於上臣蔽於下逐雀去草曾不是圖竊寶叛邑椒蘭比好人而無禮其能國乎夫安危有大勢成敗有兆不假離朱之目不藉子野之聽聊陳刺心之說且吐伐謀之言今帝道休明皇猷允塞四民樂業百靈效祉雖上相云亡而伊陟繼事秉文經武虎視龍驤驅日下之俊雄收一世之英銳擊刺猶雷電合戰如風雨控弦躍馬固敵是求蠕蠕昔遭離亂輻分瓦裂匹馬孤征告困於我國家深敦隣附愍其入懷盡憂人之禮極繼絕之義保衞出於故地資給唯其多少存其已亡之業成其莫大之基深仁厚德鏤其骨髓引領思報義如手足吐谷渾深執忠孝膠漆不渝萬里仰德奏款屬路並申以婚好行李如歸蠕蠕境斜界黃河望通豳夏飛雪千里層冰洞積北風轉勁實筋角之時沍寒方猛正氈裘之利吐谷渾疾彼凶逆強兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方候隙企其移踵加以獨孤如願擁衆秦中治兵劫脅黑獺北備西擬內營腹心救首救尾疲於奔命豈暇稱兵東指出師函谷且秋風揚塵國有防關河形勝之際山川襟帶之所猛將精兵基跱岳立又寶炬河陰之北黑獺芒山之走衆無一旅僅以身歸就其不顧根本輕懷進趣斯則一勞永逸天贊我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虛誕夫景繩樞席牖之子阡陌鄙俚之夫遭風塵之會逢馳騖之日遂位在三吏邑啟千社揣身量分久當止足而乃周章去就離跂不已夫豈徒爾事可搉揚度其衆叛親離守死不暇乃聞將棄懸瓠遠赴彭城老賊姦謀復將作矣固揚聲赴助計在圖襲吞淵明之衆招厭虐之民舉長淮以為斷仍鵄張歲月南面假名死而後已此蓋蚌鷸之禍我承其弊且偽主昏悖不惟善隣賊忍之心老而彌篤納逋叛之詭譎蔑信義以猖狂天喪其神人重其怨將踐瓜圃之蹤且追兒侯之轍今徵發犬羊侵軼徐部築壘擁川覬覦小利此而可忍孰不可懷兵凶戰危出不得已謬奉朝規肅茲九伐扛鼎拔樹之衆超乘投石之旅練甲爭途波聚霧合虎班龍文之逸蘭池蒲梢之駔噓天陸野躡影追風振旅南轅長驅討蹙非直三吳鼠面一麾魚駭乘此而往青蓋將歸且衍虐網蚩兵權在外持險躁之風俗兼輕薄之子孫蕭綸兇狡之魁豈無商臣之佷蕭譽失志之憤當召專諸之客外崩中潰今也其時幕府師行以禮兵動以義弔民伐罪理有存焉其有知機審變翻然鵲起立功立事去危就安賞典未忘事必加等若軍威所至敢有拒違尺兒已上咸從梟戮今三禮四義之將豹虎熊羆之士深銜逋偽信納叛亡違卜愎諫實興伐役莫不含怒作色如赴私讎茹肝涉血義不旋踵攻戰之日事若有神莽積麻亂匪旦伊夕以彼曲師危卒望我軍鋒何異蛣蜣被甲蝍蛆舉尾正恐旗鼓一接芝藋俱摧先事喻懷備知翰墨王侯無種禍福由人斯蓋丈夫肉食之秋壯士封侯之會冬冰可折時不再來凡百君子勉求多福檄之所到咸共申省知我國行師之意冬, WYG: ''}
