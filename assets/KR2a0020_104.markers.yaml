  - {type: variant, offset: 7754, length: 2, content: 張臯, krp: 副王昕聘蕭衍昕風流文辯收辭藻富逸衍及其羣臣咸加敬異先是南北初和李諧盧元明首通使命二人才器並為隣國所重至此衍稱曰盧李命世王魏中興未知後來復何如耳文襄啓收兼散騎常侍修國史武定二年除正常侍領兼中書侍郎仍修史帝宴百寮問何故名人日皆莫能知收對曰晉議郎董勛答問稱俗云正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人時邢邵亦在側甚恧焉自南北和好書下紙每云想彼境内寧静此率土安和蕭衍後使其書乃去彼字自稱猶著此欲示無外之意收定報書云想境内清晏今萬國安和南人復書依以為體後獻武入朝靜帝授相國固讓令收為啓啓成呈上文襄時侍側獻武指收曰此人當復為崔光四年獻武於西門豹祠宴集謂司馬子如曰魏收為史官書吾善惡聞北伐時諸貴常餉史官飲食司馬僕射頗曽餉不因共大笑仍謂收曰卿勿見元康等在吾目下趨走謂吾以為勤勞我後世身名在卿手勿謂我不知尋加兼著作郎静帝曽季秋大射普令賦詩收詩末云尺書徴建鄴折簡召長安文襄壯之顧謂人曰在朝今有魏收便是國之光采雅俗文墨通逹縱横我亦使子才子昇時有所作至於詞氣並不及之吾或意有所懐忘而不語語而不盡意有未及及收呈草皆以周悉此亦難有又勑兼主客郎接蕭衍使謝珽徐陵侯景既䧟臺城衍鄱陽王範時為合州刺史文襄勑收以書喻之範得書乃率部伍西上闕州刺史崔聖念入據其城文襄謂收曰今定一州卿有其力猶恨尺書徴建業未效耳文襄崩文宣如晉陽令與黄門郎崔季舒髙德正吏部郎中尉瑾於北第參掌機密轉祕書監兼著作郎又除定州大中正時齊将受禪楊愔奏收置之别館令撰禪代詔冊諸文遣徐之才守門不聽出天保元年除中書令仍兼著作郎封富平縣子二年授詔撰魏史除魏尹故優以祿力專在史閣不知郡事初帝令羣臣各言志收曰臣願得直筆東觀早出魏書故帝使收專其任又詔平原王髙隆之總監之隆之署名而已帝勑収曰好直筆我終不作魏太武誅史官始魏初鄧淵撰代記十餘卷其後崔浩典史游雅髙允程駿李彪崔光李琰之世修其業浩為編年體彪始分作紀表志𫝊書猶未出世宗時命邢巒追撰髙祖起居注書至太和十四年又命崔鴻王遵業補續焉下訖肅宗事甚委悉濟陰王暉業撰辨宗室錄三十卷收於是與}
