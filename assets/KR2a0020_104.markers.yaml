  - {type: variant, offset: 2671, length: 2, content: 龍駒, krp: ''}
  - {type: variant, offset: 2674, length: 313, content: 勸誘也昭業為龍駒置美女伎樂常住含章殿著黃綸帽被貂裘南面向案代昭業畫敕左右侍直與昭業不異蕭鸞固請誅之楊珉及母亦並下獄死珉及母為昭業所寵恩情特隆賞賜傾府藏珉為何氏所幸常居中內侍蕭鸞初令衞尉蕭諶征北諮議蕭坦之請誅珉何氏與昭業同席坐流涕覆面謂坦之曰楊郎好年少無罪何可枉殺坦之乃耳語於昭業曰此事別有一意不可令人聞昭業呼何氏曰阿奴暫起去坦之乃曰外間並云楊珉與皇后有情聞彰遐邇此事自古所無恐必誤官事昭業不得已乃許之俄敕原之已行刑矣益州刺史劉悛罷任還昭業以其饋奉不豐收付廷尉將加大辟悛弟中書郎繪乞以身代得不死禁錮終身昭業與其父寵姬霍氏淫通納之後宮蕭鸞謀廢之率衆而入時昭業裸身與霍氏相對聞兵至拔劍起拒鸞鸞自殺之左右死者十餘人鸞立其弟昭文自為使持, WYG: ''}
