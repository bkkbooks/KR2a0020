  - {type: variant, offset: 7411, length: 316, content: 開入據譙城東南道行臺樊子鵠率諸軍攻克之擒元樹文開等送於京師天平元年十月衍雄信將軍紀耕率衆入寇𣑯嵣都督曹仲尼破走之斬其軍主沈達閔莊等二年正月衍將湛僧珍寇南兗州州軍擊破之行臺元晏又破湛僧珍等於項城虜其刺史楊壜二月衍司州刺史陳慶之郢州刺史田朴特等寇邊豫州刺史堯雄擊走之五月衍仁州刺史黃道始寇北濟陰徐州刺史任祥討破之十月衍將梁秉儁寇單父祥又大敗之俘斬萬餘人十一月衍雍州刺史蕭恭遣將柳仲禮寇荊州刺史王元軌破之於牛飲斬其將張殖王世興是年衍又改號為中大通三年五月豫州刺史堯雄攻衍白苟堆鎮克之擒其北平太守苟元曠十月行臺侯景攻陷衍楚城獲其楚州刺史桓和兄弟四年九月衍青冀二州刺史徐子彥寇圉城南青州刺史陸景元擊走之先是益州刺史傅和以城降衍衍資送和令申意於, WYG: 誥填積事咸稱㫖黄門郎崔㥄從}
