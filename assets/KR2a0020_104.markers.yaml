之斬伯憐擒明素衍將吳子陽寇白沙中山王英大破之擒斬千數衍梁州刺史平陽縣開國侯翟遠徐州刺史永昌縣開國侯陳虎牙來降正始元年正月衍將趙祖悅屯據東關江州刺史陳伯之擊破之二月衍將姜慶真襲陷壽春外郭州軍擊走之中山王英圍衍鍾離衍遣冠軍張惠紹率衆軍送糧於鍾離任城王澄遣統軍王足劉思祖邀擊於邵陽大破之生擒惠紹并其驍騎將軍祁陽縣開國男趙景悅等十將斬獲數千級惠紹衍舅子也衍乃移書求之朝議欲示威懷遂聽惠紹等還三月元英破衍將王僧炳於樊城八月英又攻衍義陽克之破衍將馬仙琕擒其冠軍將軍蔡靈恩等十餘將九月衍霍州刺史田道龍義州刺史張宗之遣使內附十二月衍梁秦二州行事夏侯道遷據漢中內附詔尚書邢巒率衆赴之二年四月巒頻破衍軍遂入劍閣執其輔國將軍范始男送京師巒又遣統軍王足破衍諸將斬其輔國將軍馮文豪等六月衍遣將王超宗寇邊揚州刺史薛真度大破之俘斬三千級七月王足又大破衍衆斬其秦梁二州刺史魯方達王明達等三十餘將俘虜二千五百人九月衍湘州刺史楊公則率衆寇壽春揚州刺史元嵩擊破之斬獲數千級三年正月衍徐州刺史昌義之寇梁城江州刺史王茂先寇荊州屯河南城平南將軍陳伯之擊義之平南將軍楊大眼擊茂先並大之斬其輔國將軍王花俘斬二千茂先逃潰追奔至於漢水拔其五城將軍宇文福略衍司州俘獲千餘口而還五月衍將蕭昞寇淮陽張惠紹寇宿豫蕭密寇梁城韋叡寇合肥平南將軍奚康生破惠紹斬其徐州刺史宋黑七月衍徐州刺史王伯敖入寇陰陵中山王英大破之斬將二十五人首虜五千衍又遣將桓和屯孤山冠軍將軍桓方慶屯固城龍驤將軍矯道儀屯蒙山八月安東將軍邢巒擊桓和破之將軍元攻克固城統軍畢祖朽攻克蒙山斬獲及赴沂水死者四千有餘衍又遣張惠紹屯宿豫蕭昞屯淮陽九月都督邢巒大破之斬其大將藍懷恭等三十餘人惠紹蕭昞並棄戍南走追斬數萬級衍中軍大將軍臨川王蕭密右僕射柳惔徐州刺史昌義之等屯據梁城中山王英大破之密等棄城沿淮東走追奔至於馬頭衍冠軍將軍馬頭戍主朱思遠棄城走擒衍將三十餘人斬獲五萬有餘十月衍征虜將軍馬仙琕率衆三萬寇義陽郢州刺史婁悅以州軍擊走之永平元年十月懸瓠城民白早生據州反叛衍遣將齊苟仁等四將以助之詔尚書邢巒率騎討之巒攻克懸瓠斬早生擒苟仁俘衍衆三千餘人初早生之反也世宗遣主書董紹銜詔宣慰紹為早生所執送之於衍衍乃厚資遣紹今奉書朝廷請割宿豫內屬以求和好時朝議或有異同世宗以衍辭雖款順而不稱藩詔有司不許十二月衍寧朔將軍張凝等率衆寇楚城中山王英破擒之衍將馬仙琕據金山郢州刺史婁悅擊走之二年正月中山王英攻克衍長薄戍殺傷數萬仍攻拔武陽關擒衍雲騎將軍松滋縣開國侯馬廣冠軍將軍遷陵縣開國子彭驍騎將軍當陽縣開國伯徐元秀等二十六將俘獲七千餘人又進攻黃峴西關衍將軍馬仙琕棄西關李元履棄黃峴遁走四年春三月衍琅邪郡民王萬壽等斬衍輔國將軍琅邪東莞二郡太守帶昫山戍主劉晣并將士四十餘人以城內屬徐州刺史盧昶遣兼郯城戍副張天惠率衆赴之而衍郁洲已遣二軍以拒天惠天惠與萬壽等內外齊擊俘斬數百昶仍遣琅邪戍主傅文驥入城據守衍又遣將張稷馬仙琕等攻圍文驥詔昶率衆赴之而文驥以糧盡降衍昶遂失利而還延昌二年二月郁洲徐玄明斬送衍鎮北將軍青冀二州刺史張稷首以州內附三年六月衍遣衆寇九山荊州刺史桓叔興大破之斬其虎旅將軍蔡令孫冠軍將軍席世興貞義將軍藍次孫四年二月衍寧州刺史任太洪率衆寇關城益州長史成興孫擊破之熙平元年正月衍遣其農太守王定世等寇邊都督元志破之斬定世悉俘其衆衍豫州刺史趙祖悅率衆數萬偷據硤石詔鎮南將軍崔亮鎮軍將軍李平討克之斬祖悅傳首京師衍衡州刺史張齊寇益州刺史傅豎眼討之斬其將任太洪齊遁走初衍每欲稱兵境上窺伺邊隙常為諸將摧破雖懷進趣之計而勢力不從遂於浮山堰淮規為壽春之害肅宗詔征南蕭寶夤率諸將討之大破衍衆於淮北秋九月堰自潰決漂其緣淮城戍居民村落十餘萬口流入於海正光元年衍改稱普通至三年其弟子西豐侯正德棄衍來奔尋復亡歸衍初忿之改其姓為背氏既而復焉封為臨賀王五年九月衍將裴邃虞鴻襲據壽春外郭刺史長孫稚擊走之孝昌元年正月徐州刺史元法僧據城南叛衍遣豫章王綜鎮彭城綜蕭寶卷之遺腹子也初衍平建業因納其母吳氏吳氏先有孕後生綜衍謂為己子甚寵愛之綜既長母密告綜綜遂潛圖叛衍既鎮彭城及大軍往討綜乃拔身來奔餘將退走國軍追躡所獲萬計衍初聞之慟哭氣絕甚為慚惋猶云其子言其病風所致時人咸笑之三月衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入寇直城, krp: ''}
