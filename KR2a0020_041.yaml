body:
  text: 魏書卷三十六列傳第二十四李順李順字德正趙郡平棘人也父系慕容垂散騎侍郎東武城令治有能名太祖定中原以系為平棘令年老卒於家贈寧朔將軍趙郡太守平棘男順博涉經史有才策知名於世神瑞中中書博士轉中書侍郎始光初從征蠕蠕以籌略之功拜後軍將軍仍賜爵平棘子加奮威將軍世祖將討赫連昌謂崔浩曰朕前北征李順獻策數事實合經略大謀今欲使總攝前驅之事卿以為何如浩對曰順智足周務實如聖旨但臣與之婚姻深知其行然性果於去就不可專委世祖乃止初浩弟娶順妹又以弟子娶順女雖二門婚媾而浩頗輕順順又弗之伏也由是潛相猜忌故浩毀之至統萬大破昌軍順謀功居右轉拜左軍將軍後征統萬遷前將軍授之以兵昌出逆戰順督勒士衆破其左軍及克統萬世祖賜諸將珍寶雜物順固辭唯取書數千卷世祖善之至京論功以順為給事黃門侍郎賜奴婢十五戶帛千匹又從擊赫連定於平涼三秦平遷散騎常侍進爵為侯加征虜將軍遷四部尚書甚見寵待沮渠蒙遜以河西內附世祖欲精簡行人崔浩曰蒙遜稱蕃款著河右若俾遐域流通殊荒畢至宜令清德重臣奉詔褒慰尚書李順即其人也世祖曰順納言大臣固不宜先為此使若蒙遜身執玉帛而朝於朕復何以加之浩曰邢貞使吳亦魏之太常苟事是宜無嫌於重爾日之行豈吳王入覲也世祖從之以順為太常策拜蒙遜為太傅涼王使還拜使持節都督秦雍梁益四州諸軍事寧西將軍開府長安鎮都大將進爵高平公未幾復徵為四部尚書加散騎常侍延和初復使涼州蒙遜遣中兵校郎楊定歸白順曰年衰多疹舊患發動腰腳不隨不堪拜伏比三五日消息小差當相見順曰王之年老朝廷所知以王祗執臣禮別有詔旨豈得自安不見上使也蒙遜翌日延順入至庭中而蒙遜箕坐隱几無動起之狀順正色大言曰不謂此叟無禮乃至於是今則覆亡之不恤而敢陵侮天地魂神逝矣何用見之將握節而出蒙遜使定歸追順於庭曰太常既雅恕衰疾傳云朝廷有不拜之詔是以敢自安耳若太常曰爾拜爾𢔛而不祗命斯乃小臣之罪矣順益怒曰齊桓公九合諸侯一匡天下周王賜胙命曰伯舅無下拜而桓公奉遵臣節降而拜受今君雖功高勳厚未若小白之勤朝廷雖相崇重未有不拜之詔如便偃蹇自大此乃速禍之道非圖久安之計若朝廷震怒遂相吞滅悔何及哉蒙遜曰太常規之以古烈懼之以天威敢不翹悚敬聽休命遂拜伏盡禮禮畢蒙遜曰夫恃德者昌恃力者亡朝廷頃來征伐屢克境宇已博但當循理此民亦足興治然專務討擊恐不可常勝順曰昔太祖廓定洪基造有區夏太宗承統王業惟新自聖上臨御志寧四海是以戎車屢駕親冒風霜滅赫連於三秦走蠕蠕於漠北闢土開邊隸首不紀僵尸截馘所在成觀除蕩暴虐存恤黎庶威震八荒聲被九域自古以來用兵之美未有今日之盛是以遐方荒俗之氓莫不翹足抗手斂衽屈膝天兵四臨昭德罰罪何云恃力夫聖王之用兵也征南蠻則北狄怨討西戎則東夷恨天子安得已哉蒙遜曰誠如來言則涼土之民亦願魏帝遠至何為復遽驛告警不舍晝夜意君之所言殆為虛事順曰苗民叛帝舜而親暴君有扈違后啓而從逆主咸懾逼於近地牽制於凶威自古而然豈獨涼民也順既使還世祖問與蒙遜往復之辭及蒙遜政教得失順曰蒙遜專威河右三十許年經涉艱難粗識機變又綏集荒陬遠人頗亦畏服雖不能貽厥孫謀猶足以終其一世前歲表許十月送曇無讖及臣往迎便乖本意不忠不信於是而甚禮者身之輿敬者行之本未有無禮不敬而能久享福祿以臣觀之不復周矣世祖曰若如卿言則效在無遠其子必復襲世襲世之後早晚當滅順對曰臣略見其子並非才俊能保一隅如聞敦煌太守牧犍器性粗立若繼蒙遜者必此人也然比之於父僉云不逮殆天所用資聖明也世祖曰朕今方事于東未暇營西如卿所言三五年間不足為晚且停前計以為後圖既而蒙遜死問至世祖謂順曰卿言蒙遜死今則驗矣又言牧犍立何其妙哉朕克涼州亦當不遠於是賜絹千匹馬一乘進號安西將軍寵待彌厚政之巨細無所不參崔浩惡之順凡使涼州十有二返世祖稱其能而蒙遜數與順遊宴頗有悖慢之言恐順東還泄之朝廷尋以金寶納順懷中故蒙遜罪釁得不聞徹浩知之密言於世祖世祖未之信太延三年順復使涼州及還世祖曰昔與卿密圖期之無遠但以頃年東伐未遑西顧荏苒之間遂及于此今和龍既平三方無事比繕甲治兵指營河右掃蕩萬里今其時也卿往復積歲洞鑒廢興若朕此年行師當克以不順對曰臣疇日所啓私謂如然但民勞既久未獲寧息不可頻動以增勞悴願待他年世祖從之五年議征涼州順議以涼州乏水草不宜遠征與崔浩庭諍浩固執以為宜征世祖從浩議及至姑臧甚豐水草世祖與恭宗書以言其事頗銜順後謂浩曰卿昔所言今果驗矣浩曰臣之所言虛實皆如此類初蒙遜有西域沙門曇無讖微有方術世祖詔順令蒙遜送之京邑順受蒙遜金聽其殺之世祖克涼州後聞而嫌順涼土既平詔順差次羣臣賜以爵位順頗受納品第不平涼州人徐桀發其事浩又毀之云順昔受牧犍父子重賂每言涼州無水草不可行師及陛下至姑臧水草豐足其詐如此幾誤國事不忠若是反言臣讒之於陛下世祖大怒真君三年遂刑順於城西順死後數年其從父弟孝伯為世祖知重居中用事及浩之誅世祖怒甚謂孝伯曰卿從兄往雖誤國朕意亦未便至此由浩譖毀朕忿遂盛殺卿從兄者浩也皇興初順子敷等貴寵顯祖追贈順侍中鎮西大將軍太尉公高平王諡曰宣王妻邢氏曰孝妃順四子長子敷字景文真君二年選入中書教學以忠謹給侍東宮又為中散與李欣盧遐度世等並以聰敏內參機密出入詔命敷性謙恭加有文學高宗寵遇之遷祕書下大夫典掌要切加前軍將軍賜爵平棘子後兼録南部遷散騎常侍南部尚書中書監領內外祕書襲爵高平公朝政大議事無不關及劉彧徐州刺史薛安都司州刺史常珍奇以彭城懸瓠降附于時朝議謂彼誠僞未可信保敷乃固執必然曰劉氏喪亂釁起蕭牆骨肉內離藩屏外叛今以皇朝之靈兵馬之力兼并之會宜在於今況安都珍奇識機歸命奉誠萬里小民元元企仰皇化今之事機安可復失於是衆議乃同遣師接援淮海寧輯敷有力焉敷既見待二世兄弟親戚在朝者十有餘人弟奕又有寵於文明太后李欣列其隱罪二十餘條顯祖大怒皇興四年冬誅敷兄弟削順位號為庶人敷從弟顯德妹夫廣平宋叔珍等皆坐關亂公私同時伏法敷兄弟敦崇孝義家門有禮至於居喪法度吉凶書記皆合典則為北州所稱美既致斯禍時人歎惜之敷長子伯和次仲良與父俱死伯和走竄歲餘為人執送殺之伯和有庶子孝祖年小藏免後敷妻崔氏得出宮養之至平涼太守敷弟式字景則學業知名歷散騎常侍平東將軍西兗州刺史濮陽侯式自以家據權要心慮危禍常敕津吏臺有使者必先啓告然後渡之既而使人平曉卒至津吏欲先告式使者紿云我須南過不停此州不煩令刺史知也津人信之與使俱渡使者既濟突入執式赴都與兄俱死式子憲字仲軌清粹善風儀好學有器度太和初襲爵又降為伯拜祕書中散雅為高祖所賞稍遷散騎侍郎接對蕭衍使蕭琛范雲以母老乞歸養拜趙郡太守趙修與其州里修歸葬父母也牧守以下畏之纍跡惟憲不為之屈時人高之轉授驍騎將軍尚書左丞長兼吏部郎中遷長兼司徒左長史定州大中正尋遷河南尹參議新令於尚書上省永平三年出為左將軍兗州刺史四年坐事除名後以黨附高肇為御史所劾事具高聰傳正光二年二月肅宗講於國子堂召憲預聽又以子騫為國子生四年拜光祿大夫復本爵濮陽伯五年除持節安西將軍行雍州刺史尋除七兵尚書加撫軍將軍孝昌初元法僧據徐州反叛詔憲為使持節假鎮東將軍徐州都督與安豐王延明臨淮王彧等討之會蕭衍遣其豫章王綜據彭城俄而綜降徐州既平詔遣兼黃門侍郎常景詣軍慰勞賜憲驊騮馬一匹仍除征東將軍揚州刺史淮南大都督二年蕭衍遣其平北將軍元樹右衛將軍胡龍牙護軍將軍夏侯亶等來寇壽陽樹等從下蔡軍於城之東北亶從黎漿而屯於城南憲謂不先破元樹等則夏侯亶無由可克乃遣子長鈞率衆逆戰軍敗長鈞見執樹等乘之憲力屈以城降因求還國衍聽歸既至敕付廷尉三年秋憲女壻安樂王鑒據相州反靈太后謂鑒心懷劫脅遂詔賜憲死時年五十八永熙中贈使持節侍中都督定冀相殷四州諸軍事驃騎大將軍儀同三司尚書令定州刺史諡曰文靜子希遠字景冲早卒子祖悛襲祖爵齊受禪例降希遠兄長鈞興和中梁州驃騎府長史希遠第二弟希宗字景玄出後憲兄性和儀貌雅麗涉獵書傳有文才起家太尉參軍事轉直後領侍御史遷通直散騎常侍尋為東南道行臺邸珍右丞與諸軍討賊於彭沛克之轉齊獻武王大行臺郎中遷散騎常侍中軍大將軍金紫光祿大夫獻武王擢為中外府長史為齊王納其第二女希宗以人望兼美深見禮遇出行上黨太守尋而遘疾興和二年四月卒於郡年四十贈使持節都督定冀滄瀛殷五州諸軍事驃騎大將軍司空公殷州刺史諡曰文簡長子祖升武定末太子洗馬希宗弟希仁字景山武定末國子祭酒兼給事黃門侍郎希仁弟騫字希義博涉經史文藻富盛年十四國子學生以聰達見知歷大將軍府法曹參軍太宰府主簿轉中散大夫遷中書舍人加通直散騎常侍曾為釋情賦曰單閼之年無射之月余承乏攝官直於本省對九重之清切望八襲之崢嶸感代序以長懷觀爽氣而軫慮籠樊之念既多寥廓之想彌切含毫有思斐然成賦猶潘生之秋興王子之登閣也厠鄭璞於周寶編魚目於隨珠未敢自同作者蓋亦各言爾志云荷峻極之層構導積石之洪流有馬形而謨舜亦龍德而史周爰相趙之鴻烈逮藩魏之優遊為衢樽於上葉號木鐸於前修若豢龍之不隕似窮桑之世濟故抱玉而懷珠且滋蘭而樹蕙或舟楫以匡時或棲遲以卒歲尚無忝於先人諒貽厥於來裔書金冊以葳蕤布銀繩而昭晣清風忽其緬邈啓皇祖於庚寅李伯仁上東門銘曰上東少陽厥位在寅條風動物月值孟春王武子詩曰於顯我王緝乘斯民俊明有德嚴恭惟夤逢軒教之方洽遇周命之惟新譬龍虎其有合信山川而降神若勝庭之五傑似不速之三人協嗜欲於將至豈物色而方臻荷天寵以來儀步康衢而騁力如乾元之利貞若坤四之方直內弼諧於本朝外闢土於殊域乘紫氛以厲羽負青天而鼓翼既公侯之必復亦慶緒之所融績並樹於八凱道俱升於二宮遂遵流以至海且因嶽而為嵩同羽儀於班氏均載德於楊公何日月之逾邁引寒暑而相終委晉會於弱齒遺堂構於微躬嗟蒙昧之無取故告舍而不及已濩落而少成又擁腫而無立愧精堅於百鍊慚忠信於十邑非圭璋之特達詎芳菲之易襲未砥礪以自進寧琢磨而成章乖宋子之萬字異應生之五行不請觀於石室豈借書於晉皇求班莊而不遂況蔡文之可望參四科其未獲入三選而誰許本無聲於梁魏故未聞於陳汝居玉石以多迷宅顯晦而乖所既無懷於四至安有情於再舉雖衣冠之末胄而世祿之緒餘等渤澥之乘雁類九罭之逃魚處江淮而不變對朝市而間居空闔門以靖軌非論道而修書少賓客於季彥謝朋交於太初在正光之御曆實明皇之拱己曾問政於上學著為君而我齒叫閽人以望豫遂陟降於庭止同崔駰之謁帝若謝兼之來仕逮孝莊之入統乃道喪而時昏水羣飛於溟海火載燎於中原延膠船而越水若朽索而乘奔玉羊失而無御金雞亡而不存天步忽其多難橫流且其云始既雲擾而海沸亦嶽立而峙睇三綱之日紊見四維之不理顧茂草以傷懷視匪車而思起雖風雨之如晦亮膠喈而不已自牽役於宰朝實有懷於胥在下僚而栖屑願奮迅於泥滓眷故鄉以臨睨悵有動於思歸越來流以鼓枻遡北風而結騑入成都之舊宅反觀津之故扉乃曲肱而不悶信抱甕而無機且耕而食且蠶而衣一日以自省亦三月而無違遊仁義之肴核採墳素之精微誠因間而養拙亦有樂於嘉肥及勾芒御節姑洗之首散遲遲於麗日發依依於弱柳鳥間關以呼庭花芬披而落牖聽乃越於笙簧望有踰於新婦襲成服以逍遙願良辰而聊厚乃席壠而踞石遂嘯儔而命偶同浴沂之五六似禊洛之八九或促膝以持肩或援笙而鼓缶賓奉萬年之觴主報千金之壽各笑語而卒獲傳禮儀於不朽斯蓋先民之所樂而余心之所守也至於少昊為帝庚辛處躔視墟里之蕭蕭過寒夜之綿綿積霜靄於近援起泬寥於遠天思多端以類長若臨水而登山幸出遊之或寫冀觀濤之可蠲遂杖策緩步或漁或田弋鳧雁於清溪釣魴鯉於深泉張廣幕布長筵酌濁酒割芳鮮起白雪於促柱奉緑水於危弦賦湛露而不已歌驪駒而未旋跌蕩世俗之外疏散造化之間人生行樂聊用永年悟柱下之稱工聞首陽之為拙既有惜於苽懸且自悲於井泄訪鄭詹之格言求季主之高說去衡門以策駟望象魏而投轍服毳衣以從務乘大車而就列比汗海而無紀喻江河而有缺眷重地而懼深念索米而慚結運有折於玉斗時忽亡於金鏡始蒙塵以播蕩卒流彘而居鄭彼上天之降鑒實下民之請命因艱難以隆基據殷憂而啓聖調南風以負扆居北辰而為政創彝倫於九疇班平章於百姓喻繩契以論蹤援成昭而比盛酌徙鎬之故典究遷亳之遺令奄四海以為家開七百而增慶覩禮樂之方隆信光華之始映百揆鬱以時序四門穆其惟清如得人於漢世比多士於周庭有一匡以作相或十亂而為楨各秉文而經武故天平而地成伊余身之忝穢得再入於承明執綸言之猶紼戴會辨之如星非巡潰以窺井信夕惕而懷驚承周任之有言攬老子之知足奉炯誡以周旋抱徽猷而與屬每有偃於唯塵興言於寵辱思散髮以抽簪願全真而守朴眷疏傅以徘徊望申公而躑躅冀鄙志之獲展庶微願之逢時歌致命而可卜詠歸田而有期揖帝城以高逝與人事而長辭擊壤而頌結草而嬉援巢父以戲潁追許子而升箕供暮餐於沆瀣給朝餌於瓊芝同糟醨而無別混名實而不治放言肆欲無慮無思何鷦鷯之可賦鴻鵠之為詩哉尋加散騎常侍殷州大中正鎮南將軍尚書左丞仍以本官兼散騎常侍使蕭衍後坐事免論者以為非罪騫嘗贈親友盧元明魏收詩曰幽棲多暇日總駕萃荒坰南瞻帶宮雉北睇拒畦瀛流火時將末懸炭漸云輕寒風率已厲秋水寂無聲層陰蔽長野凍雨暗窮汀侶浴浮還沒孤飛息且驚三褫俄終歲一丸曾未營間居同洛涘歸身款武城稍旅原思藋坐夢尹勤荊監河愛斗水蘇子惜餘明益州達友趣廷尉辨交情豈若欣蓬蓽收志偶沉冥後詔兼太府少卿尋除征南將軍給事黃門侍郎死於晉陽所著詩賦碑誄別有集録贈本將軍太常殷州刺史齊受禪重贈使持節侍中都督殷滄二州諸軍事車騎大將軍儀同三司仍殷州刺史諡曰文惠騫弟希禮字景節武定末通直散騎常侍希遠庶長兄長劍興和中梁州驃騎府長史式弟奕字景世美容貌有才藝早歷顯職散騎常侍宿衛監都官尚書安平侯與兄敷同死太和初文明太后追念奕兄弟乃誅李欣存問憲等一二家歲時賜以布帛奕別生弟冏字道度少為中散逃避得免太和中拜下大夫南部給事出為龍驤將軍南豫州刺史還拜冠軍將軍尋除光祿大夫守度支尚書二十一年高祖幸長安冏以咸陽山河險固秦漢舊都古稱陸海勸高祖去洛陽而都之後高祖引見笑而謂之曰卿一昨有啓欲朕都此昔婁敬一說漢祖即日西駕尚書今以西京說朕仍使朕不廢東轅當是獻可理殊所以今古相反耳冏對曰昔漢祖起於布衣欲藉嶮以自固婁敬之言合於本旨今陛下百世重光德洽四海事同隆周均其職貢是以愚臣獻說不能上動高祖大悅其年冏卒賜錢二十萬布百匹朝服一具衣一襲冏性鯁烈敢直言常面折高祖彈駁公卿無所回避百僚皆憚之高祖常加優禮故車駕巡幸兼尚書右僕射雖才學不及諸兄然公強當世堪濟過之子祐字長禧篤穆友于見稱於世歷位給事中尚書祠部郎相州撫軍府長史司空從事中郎博陵太守所在亦以清幹著稱祐弟太字季寧涉歷書傳太尉行軍員外郎順弟修基陳留太守卒子探幽探幽兄子洪鸞河間太守洪鸞孫悕傑樂陵太守武定中以貪汙賜死修基季弟惲字善祖小字藥囊少有高名為中書侍郎從世祖征涼州戰沒時人咸惜焉初順與從兄靈從弟孝伯並以學識器業見重於時故能砥礪宗族競各修尚靈與族叔詵族弟熙等俱被徵事在高允高士頌詵字令孫京兆太守詵後繼闕秀林小名榼性強直太和中自中書博士為頓丘相豪右畏之景明初試守博陵郡批強扶弱政以威嚴為名以母憂去職後為太尉咨議參軍假節行荊州事拜司徒司馬加冠軍將軍定州大中正太中大夫正光中卒年六十三贈左將軍齊州刺史子裔字徽伯出後秀林兄鳳林裔初除汝南王悅常侍稍遷定州別駕孝昌中為定州鎮軍長史加輔國將軍帶博陵太守于時逆賊杜洛周侵亂州界尋假平北將軍防城都督賊既圍城裔潛引洛周州遂陷沒洛周僭竊特無綱紀至於市令驛帥咸以為王呼曰市王驛王乃封裔為定州王洛周尋為葛榮所滅裔仍事榮永安初爾朱榮既擒葛榮遂縶裔及高敖曹薛修義李無為等於晉陽從榮至洛榮死乃免普泰初以裔為持節散騎常侍安北將軍兼給事黃門侍郎慰勞山東大使永熙中除鎮東將軍金紫光祿大夫齊獻武王大丞相咨議參軍天平初以預定策之功封固安縣開國伯食邑四百戶加征東將軍車駕遷鄴為大行臺右丞留在洛陽監修宮殿尋除使持節大將軍陝州刺史四年八月宇文黑獺攻陷州城被執見害年五十詔贈使持節都督定冀瀛殷四州諸軍事驃騎大將軍尚書令司徒公定州刺史子直襲武定末司徒屬齊受禪例降裔弟景義大司馬咨議參軍殷州大中正景義弟伯穆武定末合州刺史秀林從弟煥字仲文小字醜瓌有幹用少與酈道元俱為李彪所知自給事中轉治書侍御史州刺史穆泰據代都謀反高祖詔煥與任城王澄推治之煥先驅至州宣旨曉喻仍誅泰等景明初遷司空從事中郎蕭寶卷豫州刺史裴叔業以壽春歸附詔煥以本官為軍司與楊大眼奚康生等率衆迎接煥至淮西叔業兄子植遣使送質煥等濟師入城撫慰民咸欣悅仍行揚州事賜爵容城伯軍還行河內郡事拜司徒右長史以荊蠻擾動敕煥兼散騎常侍慰勞之降者萬餘家除輔國將軍梁州刺史時武興氐楊集起舉兵作逆令弟集義邀斷白馬戍敕假煥平西將軍督別將石長樂統軍王祐等與軍司苟金養俱討之大破集起軍會秦州民呂苟兒反煥仍令長樂等由麥積崖赴援屬都督元麗至遂共平之時氐王楊定進猶據方山與苟兒影響煥密募氐趙芒路斬定進還朝遇患卒時年四十四贈征虜將軍幽州刺史諡曰昭子密武定中襄州刺史秀林族子肅字彥雍歷奉朝請清河王懌郎中令稍遷洛陽令步兵校尉員外常侍初諂附侍中元暉後以左道事侍中穆紹常裸身被髮畫腹銜刀於隱屏之處為紹求福故紹愛之延昌四年薦肅為黃門郎加光祿大夫肅為性酒狂熙平初從靈太后幸江陽王繼第肅時侍飲頗醉言辭不遜抗辱太傅清河王懌為有司彈劾靈太后怒之出為章武內史歲餘遷右將軍夏州刺史卒贈左將軍齊州刺史肅從弟曒字景林有學識初除奉朝請太學博士司空主簿以母憂去職服闋拜左軍將軍正光中元叉以其弟羅為青州刺史曒為羅平東府長史遷廷尉少卿殷州大中正孝昌二年冬卒年五十七贈平東將軍齊州刺史諡曰宣子慎武定中東平太守曒從弟仲琁奉朝請定雍二州長史太尉咨議中散太中大夫東郡汲郡二郡太守司徒左長史弘農太守先是宮牛二姓阻嶮為害仲琁示以威惠並即歸伏還除衛將軍金紫光祿大夫仍除北雍州刺史將軍如故轉車騎將軍左光祿大夫天平初遷都於鄴以仲琁為營構將作進號衛大將軍出除車騎大將軍兗州刺史仲琁以孔子廟牆宇頗有頽毀遂修改焉還除將作大匠所歷並清勤有聲年六十六卒贈驃騎大將軍儀同三司青州刺史子希良侍御史詵從子善犯孝靜諱趙郡太守子顯進州主簿顯進子映字輝道南安王國常侍光州征虜府主簿相州治中寧朔將軍步兵校尉孝昌三年冬卒年四十二天平中贈通直散騎常侍輔國將軍殷州刺史子普濟武定中北海太守映弟育字仲遠奉朝請稍遷揚烈將軍奉車都尉都督相州防城別將以拒葛榮之勳賜爵趙郡公後除征東將軍金紫光祿大夫天平四年夏卒年五十七贈驃騎大將軍都官尚書定州刺史諡曰貞子惜襲武定末齊文襄王大將軍府記室參軍齊受禪爵例降顯進弟恃顯位至左中郎將卒贈中壘將軍安州刺史恃顯養京兆王愈妾楊氏為女愈改楊姓為李而親念恃顯恃顯子道舒與愈同逆愈敗走免第三子道璩武定末范陽太守道璩弟道瓘少以父譴被刑位至中常侍恃顯弟曄字季顯涉歷書史司徒行參軍稍遷濟州輔國府長史坐兄事免後除尚書中兵郎遷冠軍中散大夫正光二年南荊州刺史桓叔興驅掠城民叛入蕭衍衍資以兵糧令築谷陂城以立洛州逼土山戍詔曄持節兼尚書左丞為行臺督諸軍討叔興大破之乘勝拔谷陂叔興退走軍還仍除尚書左丞出除洛州刺史將軍如故未拜卒贈左將軍齊州刺史子暉賓美容貌和沉雅太學博士暉賓弟山儒少而清立學涉羣書山儒少弟大蓋並早卒曄族弟孝怡字悅宗中書學生相州高陽王雍主簿廣陵王羽掾新蔡太守別將蕭寶夤長史從中山王英破蕭衍臨川王蕭宏於梁城除朔州安北府長史又為中堅將軍相州鎮北府長史遷冠軍將軍魏郡太守相州刺史中山王熙據鄴起兵也孝怡陰結募城民與熙長史柳元章別駕游荊之等率衆擒熙賞爵昌樂伯靈太后反政以孝怡叉黨除名為民後安樂王鑒鎮鄴起孝怡為別將永安初除左將軍太中大夫仍為防城都督以拒葛榮之勳賜爵趙郡公拜撫軍將軍光祿大夫永安三年行殷州事遷驃騎大將軍左光祿大夫武定六年卒八十子思道儀同開府中兵參軍武城縣公熙字仲熙神中與高允等俱被徵拜中書博士轉侍郎以使沮渠有功賜爵元氏子加中壘將軍卒贈鎮東將軍豫州刺史諡曰莊子季主襲卒贈青州刺史諡曰貞子遺元襲初除冀州趙郡王幹東閣祭酒纍轉尚書左民郎中冀州京兆王愈功曹參軍帶扶柳令為愈所親逼與同反愈敗遺元逃竄會赦乃雪復除兗州平東府長史後拜中堅將軍殷州征北將軍長史卒年六十三贈征北將軍定州刺史子恃寧以父事被刑武定末官至中尹恃寧弟子寧襲爵開府默曹參軍齊受禪爵例降熙族孫蘭和自右軍將軍歷平陽勃海二郡太守蘭和弟蘭集平昌太守熙族孫同軌體貌魁岸腰帶十圍學綜諸經多所治誦兼讀釋氏又好醫術年二十二舉秀才射策除奉朝請領國子助教轉著作郎典儀注修國史遷國子博士加征虜將軍永熙二年出帝幸平等寺僧徒講說敕同軌論難音韻閒朗往復可觀出帝善之三年春釋菜詔延公卿學官於顯陽殿敕祭酒劉廞講孝經黃門李郁講禮記中書舍人盧景宣解大戴禮夏小正篇時廣招儒學引令預聽同軌經義素優辨析兼美而不得執經深為慨恨天平中轉中書侍郎興和中兼通直散騎常侍使蕭衍衍深耽釋學遂集名僧於其愛敬同泰二寺講涅槃大品經引同軌預席衍兼遣其臣並共觀聽同軌論難久之道俗咸以為善盧景裕卒齊獻武王引同軌在館教諸公子甚嘉禮之每旦入授日暮始歸緇素請業者同軌夜為解說四時爾不以為倦武定四年夏卒年四十七時人傷惜之齊獻武王亦殊嗟悼賻襚甚厚贈驃騎大將軍瀛州刺史諡曰康同軌兄義深武定中齊州刺史同軌弟幼舉安德太守武定中以在郡貪汙輒召部曲還京師棄市幼舉弟之良有幹用前將軍尚書金部郎卒之良弟稚廉武定末并州儀同開府長史史臣曰李順器宇才識一時推重謀宣中國氣折外蕃所以世祖垂心而崔浩側目敷式兄弟位望並高憲風度恢雅夙重朝列而遭隨有命報施俱爽嗚呼以茲盛德克廣其猷宗緒扶疏人位盛顯可謂李雖舊族其世唯新矣
