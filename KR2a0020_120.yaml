body:
  text: 魏書卷一百七下律曆志三下第九孝靜世壬子曆氣朔稍違熒惑失次四星出伏曆亦乖舛興和元年十月齊獻武王入鄴復命李業興令其改正立甲子元曆事訖尚書左僕射司馬子如右僕射隆之等表曰自天地剖判日月運行剛柔相摩寒暑交謝分之以氣序紀之以星辰弦望有盈缺明晦有修短古先哲王則之成化迎日推策各有司存以天下之至王盡生民之能事先天而天弗違後天而奉天時及卯金受命年曆屢改當塗啓運日官變業分路揚鑣異門馳騖回互靡定交錯不等豈是人情淺深苟相違異蓋亦天道盈縮欲止不能正光之曆既行於世發元壬子置差令朔測影清臺懸炭之期或爽候氣重室布灰之應少差伏惟陛下當璧膺符大橫崙頁兆乘機虎變撫運龍飛苞括九隅牢籠萬宇四海來王百靈受職大丞相勃海王降神挺生固天縱德負圖作宰知機成務撥亂反正決江疏河效顯勤王勳彰濟世功成治定禮樂惟新以履端歸餘術數未盡乃命兼散騎常侍執讀臣李業興大丞相府東閣祭酒夷安縣開國公臣王春大丞相府戶曹參軍臣和貴興等委其刊正但回舍有疾徐推步有疏密不可以一方知難得以一途揆大丞相主簿臣孫搴驃騎將軍左光祿大夫臣曄前給事黃門侍郎臣季景勃海王世子開府咨議參軍事定州大中正臣崔暹業興息國子學生屯留縣開國子臣子述等並令參豫定其是非臣等職司其憂猶恐未盡竊以蒙戎為飾必藉衆腋之華輪奐成宇寧止一枝之用必集名勝更共修理左光祿大夫臣盧道約大司農卿彭城侯臣李諧左光祿大夫東雍州大中正臣裴獻伯散騎常侍西兗州大中正臣溫子升太尉府長史臣陸操尚書右丞城陽縣開國子臣盧元明中書侍郎臣李同軌前中書侍郎臣邢子明中書侍郎臣宇文忠之前司空府長史建康伯臣元仲悛大丞相法曹參軍臣杜弼尚書左中兵郎中定陽伯臣李溥濟尚書起部郎中臣辛術尚書祠部郎中臣元長和前青州驃騎府司馬安定子臣胡世榮太史令盧鄉縣開國男臣趙洪慶太史令臣胡法通應詔左右臣張哲員外司馬督臣曹魏祖太史丞郭慶太史博士臣胡仲和等或器標民譽或術兼世業並能顯微闡幽表同録異詳考古今共成此曆甲為日始子實天正命曆置元宜從此起運屬興和以年號為目豈獨太初表於漢代景初冠於魏曆而已謹以封呈乞付有司依術施用詔以新曆示齊獻武王田曹參軍信都芳芳關通曆術駁業興曰今年十二月二十日新曆歲星在營室十三度順疾天上歲星在營室十一度今月二十日新曆鎮星在角十一度留天上鎮星在亢四度留今月二十日新曆太白在斗二十五度晨見逆行天上太白在斗二十一度逆行便為差殊業興對曰歲星行天伺候以來八九餘年不及二度今新曆加二度至於夕伏晨見纖毫無爽今日仰看如覺二度及其出沒還應如術鎮星自造壬子元以來歲常不及故加壬子七度亦知猶不及五度適欲并加恐出沒頓校十度十日將來永用不合處多太白之行頓疾頓遲取其會歸而已近十二月二十日晨見東方新舊二曆推之分寸不異行星三日頓校四度如此之事無年不有至其伏見還依術法又芳唯嫌十二月二十日星有前却業興推步已來三十餘載上算千載之日月星辰有見經史者與涼州趙畗劉義隆廷尉卿何承天劉駿南徐州從事史祖沖之參校業興甲子元曆長於三曆一倍考洛京已來四十餘歲五星出沒歲星鎮星太白業興曆首尾中及有差處不過一日二日一度兩度三曆之失動校十日十度熒惑一星伏見體自無常或不應度祖沖之曆多甲子曆十日六度何承天曆不及三十日二十九度今曆還與壬子同不有加增辰星一星沒多見少及其見時與曆無舛今此亦依壬子元不改太白辰星唯起夕合為異業興以天道高遠測步難精五行伏留推考不易人目仰窺未能盡密但取其見伏大歸略其中間小謬如此曆便可行若專據所見之驗不取出沒之效則曆數之道其幾廢矣夫造曆者節之與朔貫穿於千年之間閏餘斗分推之於毫釐之內必使盈縮得衷間限數合周日小分不殊錙銖陽曆陰曆纖芥無爽損益之數驗之交會日所居度考之月蝕上推下減先定衆條然後曆元可求猶甲子難值又雖值甲子復有差分如此踳駁參錯不等今曆發元甲子七率同遵合璧連珠其言不失法理分明情謂為可如芳所言信亦不謬但一合之𩹉星度不驗者至若合終必還依術鎮星前年十二月二十日見差五度今日差三度太白前差四度今全無差以此準之見伏之驗尋效可知將來永用大體無失芳又云以去年十二月中算新曆其鎮星以十二月二十日在角十一度留天上在亢四度留是新曆差天五度太白歲星並各有差校於壬子舊曆鎮星差天五度太白歲星亦各有差是舊曆差天為多新曆差天為少凡造曆者皆須積年纍日依法候天知其疏密然後審其近者用作曆術不可一月兩月之間能正是非若如熒惑行天七百七十九日一遲一疾一留一逆一順一伏一見之法七頭一終太白行天五百八十三日晨夕之法七頭一終歲星行天三百九十八日七頭一終鎮星行天三百七十八日七頭一終辰星行天一百一十五日晨夕之法七頭一終造曆者必須測知七頭然後作術得七頭者造曆為近不得頭者其曆甚疏皆非一二日能知是非自五帝三代以來及秦漢魏晉造曆者皆積年久測術乃可觀其倉卒造者當時或近不可久行若三四年作者初雖近天多載恐失今甲子新曆業興潛構積年雖有少差校於壬子元曆近天者多若久而驗天十年二十年間比壬子元曆三星行天其差為密獻武王上言之詔付外施行上元甲子以來至春秋魯隱公元年歲在己未積二十九萬二千七百三十六算上甲子之歲入甲戌紀已來積十二萬四千一百三十六算上上元甲子以來至大魏興和二年歲在庚申積二十九萬三千九百九十七算上甲子之歲入甲戌紀至今庚申積十二萬五千三百九十七算上元法一百一萬一千六百三統之數統法三十三萬七千二百二紀之數紀法十六萬八千六百十蔀成紀日數至十蔀法一萬六千八百六十三十乘章歲得日月餘皆盡之年數度法一萬六千八百六十三十乘章歲得此數日法二十萬八千五百三十三十乘章月得此數氣時法一千四百五十二分度法得一時之數章歲五百六十二二十九章十一年減閏餘一一萬六百七十八年減一閏月章閏二百七五百六十二年之閏月數章月六千九百五十一五百六十二年之月數并閏章中六千七百四十四五百六十二年月除閏月數周天六百一十五萬八千一十七度法通度內斗分之數通數六百一十五萬八千一十七日法通二十九日內經月餘之數沒分六百一十五萬八千一十七餘數通經沒六十九內分五萬七千二百四十四得此數餘數八萬八千四百一十七度法通一年下五內斗分之數沒法八萬八千四百一十七一年之內成甲之外分數斗分四千一百一十七從斗量周天至此不成度之分虛分九萬七千八百八十三經月二十九日外少此不滿三十日小分法二十四二十四氣除周天分之數也歲中十二十二月之中氣會數一百七十三月一出一入黃道之日數五月二十三分月之二十也會餘六萬七千一百一十七百七十三日外不成日之分會通三千六百一十四萬二千八百七以日法通百七十三內會餘之數會虛十四萬一千四百一十三會餘之外不成度之數周日二十七周天用一日月行數除周餘十一萬五千六百三十一周天用日外及本處之分數通周五百七十四萬五千九百四十一日法通二十七內分周虛九萬二千八百九十九周餘外不成日之數小周七千五百一十三月一日行之數月周二十二萬五千三百九十通小周內度數朔望合數十四半經月日數度餘十五萬九千五百八十八半半經月日餘入交限數一百五十八度月出入黃道減半月之數度餘十一萬六千五十八半減半月小餘之外推月朔弦望術第一推積月術曰置入紀以來盡所求年減一以章月乘之章歲如一所得為積月不盡為閏餘閏餘三百五十五以上其年有閏餘五百一十五以上進退在天正十一月前後以冬至定之推積日術曰以通數乘積月為朔積分日法如一為積日不盡為小餘以六旬去積日不盡為大餘命大餘以紀今命以甲戌紀算外即所求年天正十一月朔日求次月朔術曰加大餘二十九小餘十一萬六百四十七滿除如上命以紀算外即次月朔日其小餘滿虛分九萬七千八百八十三者其月大減者其月小求上下弦望術曰加朔大餘七小餘七萬九千七百九十四小分一小分滿四從小餘小餘滿日法從大餘大餘滿六十去之命以紀算外即上弦日又加得望下弦後月朔推二十四氣閏術第二推二十四氣術曰置入紀以來盡所求年減一以餘數乘之蔀法如一為積沒不盡為小餘以六旬去積沒不盡為大餘命以紀算外即所求年天正十一月冬至日求次氣術術曰加大餘十五小餘三千六百八十四小分一小分滿小分法二十四從小餘小餘滿蔀法從大餘一命如上算外即次氣日推閏術曰以閏餘減章歲餘以歲中十二乘之滿章閏二百七得一月餘半法以上亦得一月數起天正十一月算外即閏月閏月有進退以無中氣定之推閏又法術曰以歲中乘閏餘如章閏得一盈章中六千七百四十四數起冬至算外中氣終閏月也盈中氣在朔若二日即前月閏冬至十一月中小寒十二月節大寒十二月中立春正月節雨水正月中驁蟄二月節春分二月中清明三月節雨三月中立夏四月節小滿四月中芒種五月節夏至五月中小暑六月節大暑六月中立秋七月節處暑七月中白露八月節秋分八月中寒露九月節霜降九月中立冬十月節小雪十月中大雪十一月節推合朔却去度表𩹉術第三推合朔却去交度術曰置入紀以來朔積分又以所入紀交會差分并之甲戌紀交會差分二千六百五十二萬二千六百四十九以會通去之所得為積交不盡者以日法約之為度不盡者為度餘即所求年天正十一月朔却去交度及度餘甲子紀紀首合朔日月合璧交中甲戌紀紀首合朔月在日道表交會差一百二十七度度餘三萬九千三百三十九甲申紀紀首合朔月在日道𩹉交會差八十一度度餘一萬一千五百六十一甲午紀紀首合朔月在日道𩹉交會差三十四度度餘十九萬二千三百一十三甲辰紀紀首合朔月在日道表交會差一百六十二度度餘二萬三千一百二十二甲寅紀紀首合朔月在日道表交會差一百一十五度度餘二十萬三千八百七十四求次月却去交度術曰加度二十九度餘十一萬六百四十七度餘滿日法從度度滿會數去之亦除其會餘即次月朔却去交度及度餘求望却去交度術曰加度十四度餘十五萬九千五百八十八半滿除如上即望却去交度及度餘推月在日道表𩹉術曰置入紀以來朔積分又以紀交會差分并之倍會通去之餘以會通減之得一減者為月在日道𩹉無所得者為月在日道表求次月表𩹉術曰加次月度及度餘加表滿會數及會數餘則在𩹉加𩹉滿會數及會餘則在表推交道所在日術曰以十一月朔却去交度及餘減會數及會餘會餘若不足減者減一度加日法乃減之又以十一月朔小餘加之滿日法從度餘為度餘即是天正十一月朔前去交度及餘如曆月大小除之起天正月十一月不滿月者為入月算外交道所在日又以歲中乘入月小餘日法除之所得命以子算外即交道所在辰其交在望前者其月朔則交會望則月蝕交在望後者其月月蝕後朔交會交正在望者其