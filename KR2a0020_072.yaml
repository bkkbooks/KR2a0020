body:
  text: 魏書卷六十七列傳第五十五崔光崔光本名孝伯字長仁高祖賜名焉東清河鄃人也祖曠從慕容德南渡河居青州之時水慕容氏滅仕劉義隆為樂陵太守父靈延劉駿龍驤將軍長廣太守與劉彧冀州刺史崔道固共拒國軍慕容白曜之平三齊光年十七隨父徙代家貧好學晝耕夜誦傭書以養父母太和六年拜中書博士轉著作郎與祕書丞李彪參撰國書遷中書侍郎給事黃門侍郎甚為高祖所知待常曰孝伯之才浩浩如黃河東注固今日之文宗也以參贊遷都之謀賜爵朝陽子拜散騎常侍黃門著作如故又兼太子少傅尋以本官兼侍中使持節為陝西大使巡方省察所經述古事因而賦詩三十八篇還仍兼侍中以謀謨之功進爵為伯光少有大度喜怒不見於色有毀惡之者必善言以報之雖見誣謗終不自申曲直皇興初有同郡二人並被掠為奴婢後詣光求哀光乃以二口贖免高祖聞而嘉之雖處機近曾不留心文案唯從容論議參贊大政而已高祖每對羣臣曰以崔光之高才大量若無意外咎譴二十年後當作司空其見重如是又從駕破陳顯達世宗即位正除侍中初光與李彪共撰國書太和之末彪解著作專以史事任光彪尋以罪廢世宗居諒暗彪上表求成魏書詔許之彪遂以白衣於祕書省著述光雖領史官以彪意在專功表解侍中著作以讓彪世宗不許遷太常卿領齊州大中正正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙雍以問光光表答曰臣謹按漢書五行志宣帝黃龍元年未央殿路軨中雌雞化為雄毛變而不鳴不將無距元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角劉向以為雞者小畜主司時起居小臣執事為政之象也言小臣將乘君之威以害政事猶石顯也竟寧元年石顯伏辜此其效也靈帝光和元年南宮寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡雍雍對曰貌之不恭則有雞禍臣竊推之頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黃巾賊遂破壞四方疲於賦役民多叛者上不改政遂至天下大亂今之雞狀雖與漢不同而其應頗相類矣向雍並博達之士考物驗事信而有證誠可畏也臣以雍言推之翅足衆多亦羣下相扇助之象雛而未大腳羽差小亦其勢尚微易制御也臣聞災異之見皆所以示吉凶明君覩之而懼乃能招福暗主視之彌慢所用致禍詩書春秋秦漢之事多矣此陛下所觀者也今或有自賤而貴關預政事殆亦前代君房之匹比者南境死亡千計白骨橫野存有酷恨之痛歿為怨傷之魂義陽屯師盛夏未返荊蠻狡猾征人淹次東州轉輸往多無還百姓困窮絞縊以殞北方霜降蠶婦輟事羣生憔悴莫甚於今此亦賈誼哭歎谷永切諫之時司寇行戮君為之不舉陛下為民父母所宜矜恤國重戎戰用兵猶火內外怨弊易以亂離陛下縱欲忽天下豈不仰念太祖取之艱難先帝經營劬勞也誠願陛下留聰明之鑒警天地之意禮處左右節其貴越往者鄧通董賢之盛愛之正所以害之又躬饗加罕宴宗或闕時應親肅郊廟延敬諸父檢訪四方務加休息爰發慈旨撫賑貧瘼簡費山池減撤聲飲晝存政道夜以安身博釆芻蕘進賢黜佞則兆庶幸甚妖弭慶進禎祥集矣世宗覽之大悅後數日而茹皓等並以罪失伏法於是禮光愈重加撫軍將軍二年八月光表曰去二十八日有物出于太極之西序敕以示臣臣按其形即莊子所謂蒸成菌者也又云朝菌不終晦朔雍門周所稱磨蕭斧而伐朝菌皆指言蒸氣鬱長非有根種柔脆之質凋殞速易不延旬月無擬斧斤又多生墟落穢濕之地罕起殿堂高華之所今極宇崇麗牆築工密糞朽弗加沾濡不及而茲菌歘構厥狀扶疏誠足異也夫野木生朝野鳥入廟古人以為敗亡之象然懼災修德者咸致休慶所謂家利而怪先國興而妖豫是故桑穀拱庭太戊以昌雊雉集鼎武丁用熙自比鴟鵲巢于廟殿梟鵩鳴於宮寢菌生賓階軒坐之正準諸往記信可為誡且南西未靜兵革不息郊甸之內大旱跨時民勞物悴莫此之甚承天子育者所宜矜恤伏願陛下追殷二宗感變之意側躬聳誠惟新聖道節夜飲之欣強朝御之膳養方富之年保金玉之性則魏祚可以永隆皇壽等於山嶽四年秋除中書令進號鎮東將軍永平元年秋將刑元愈妾李氏羣官無敢言者敕光為詔光逡巡不作奏曰伏聞當刑元愈妾李加之屠割妖惑扇亂誠合此罪但外人竊云李今懷妊例待分産且臣尋諸舊典兼推近事戮至刳胎謂之虐刑桀紂之主乃行斯事君舉必書義無隱昧酷而乖法何以示後陛下春秋已長未有儲體皇子襁褓至有夭失臣之愚識知無不言乞停李獄以俟育孕世宗納之延昌元年春遷中書監侍中如故二年世宗幸東宮召光與黃門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣今當為太子師傅光起拜固辭詔不許即命肅宗出從者十餘人敕以光為傅之意令肅宗拜光光又拜辭不當受太子拜復不蒙許肅宗遂南面再拜詹事王顯啓請從太子拜於是宮臣畢拜光北面立不敢答拜唯西面拜謝而出於是賜光繡綵一百匹琛淵等各有差尋授太子少傅三年遷右光祿大夫侍中監如故四年正月世宗夜崩光與侍中領軍將軍于忠迎肅宗於東宮安撫內外光有力焉帝崩後二日廣平王懷扶疾入臨以母弟之親徑至太極西廡哀慟禁內呼侍中黃門領軍二衛云身欲上殿哭大行又須入見主上諸人皆愕然相視無敢抗對者光獨攘衰振杖引漢光武初崩太尉趙喜橫劍當階推下親王故事辭色甚厲聞者莫不稱善壯光理義有據懷聲淚俱止云侍中以古事裁我我不敢不服於是遂還頻遣左右致謝初永平四年以黃門郎孫惠蔚代光領著作惠蔚首尾五載無所厝意至是三月尚書令任城王澄表光宜還史任於是詔光還領著作四月遷特進五月以奉迎肅宗之功封光博平縣開國公食邑二千戶七月領國子祭酒八月詔光乘步挽於雲龍門出入尋遷車騎大將軍儀同三司靈太后臨朝之後光纍表遜位于忠擅權光依附之及忠稍被疏黜光并送章綬冠服茅土表至十餘上靈太后優答不許有司奏追于忠及光封邑熙平元年二月太師高陽王雍等奏舉光授肅宗經初光有德於靈太后語在于忠傳四月更封光平恩縣開國侯食邑一千戶以朝陽伯轉授第二子勗其月敕賜羊車一乘時靈太后臨朝每於後園親執弓矢光乃表上中古婦人文章因以致諫曰孔子云士志於道據於德依於仁遊於藝藝謂禮樂書數射御明前四業丈夫婦人所同修者若射御唯主男子事不及女古之賢妃烈媛母儀家國垂訓四海宣教九宗可秉道懷德率遵仁禮是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通於神明和風溢于區宇因時暇豫清暑林園遠藐姑射眷言矍相弦矢所發必中正鵠威靈遐暢義震上下文武懾心左右悅目吾王不遊吾何以休不窺重仞安見富美天情沖謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章録一帙其集具在內伏願以時披覽仰裨未聞息彎挾之勞納間拱之泰頤精養壽栖神翰林是秋靈太后頻幸王公第宅光表諫曰禮記云諸侯非問疾弔喪而入諸臣之家是謂君臣為謔不言王后夫人明無適臣家之義夫人父母在有時歸寧親沒使卿大夫聘春秋紀陳宋齊之女並為周王后無適本國之事是制深於士大夫許嫁唁兄又義不得衛女思歸以禮自抑載馳竹竿所為作也漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帷以接羣臣示男女之別國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流傳皆綴集以垂來詠昨軒駕頻出幸馮翊君任城王第雖漸中秋餘熱尚蒸衡蓋往還聖躬煩倦豐嘉醴罄竭時羞上壽弗限一觴方丈甘踰百品旦及日斜接對不非謂順時而遊奉養有度縱雲輦崇涼御筵安暢左右僕侍衆過千百扶衛跋涉袍鉀在身蒙曝塵日渙汗流離致時飢渴餐飯不贍賃馬假乘交費錢帛昔人稱陛下甚樂臣等至苦或其事也伏惟皇太后月靈炳曜坤儀挺茂誕育帝躬維興魏道德踰文母仁邁和喜親以天至遠異莫間愛由真固非俟虛隆紆屈鑾駕降臨闉里榮光帝京士女藻悅白首之耋欣遇犧年青襟之童慶屬唐日千載之所難一朝之為易非至明超古忘驕釋吝孰能若斯者哉魏元已來莫正斯美興居出入自當坦然豈同往嫌曲有矯避但帝族方衍勳貴增遷祗請遂多將成彝式陛下遵酌前王貽厥後矩天下為公億兆己任專薦郊廟止決大政輔養神和簡息遊幸以德為車以樂為御考仁聖之風習治國之道則率土屬賴含生仰悅矣臣過荷恩榮所知必盡默默唯唯愚竊未敢輕陳狂瞽分貽憲坐神龜元年夏光表曰詩稱蔽芾甘棠勿翦勿伐邵伯所茇又云雖無老成人尚有典刑傳曰思其人猶愛其樹況用其道不恤其人是以書始稽古易本山泉觀於天文以察時變觀於人文以化成天下孟子實匡張訓說安世記篋於汾南伯山抱卷於河右元始孤論充漢帝之坐孟皇片字懸魏王之帳前哲之寶重墳籍珍愛分篆猶若此之至也矧乃聖典鴻經炳勒金石理為國楷義成家範迹實世模事則人軌千載之格言百王之盛烈而令焚荒汙毀積榛棘而弗掃為鼯鼬之所栖宿童豎之所登踞者哉誠可為痛心疾首拊膺扼腕伏惟皇帝陛下孝敬日休自天縱睿垂心初學儒業方熙皇太后欽明慈淑臨制統化崇道重教留神翰林將披雲臺而問禮拂麟閣以招賢誠宜遠開闕里清彼孔堂而使近在城闉面接宮廟舊校為墟子襟永替豈所謂建國君民教學為先京邑翼翼四方是則也尋石經之作起自炎劉繼以曹氏典論初乃三百餘載計末向二十紀矣昔來雖屢經戎亂猶未大崩侵如聞往者刺史臨州多構圖寺道俗諸用稍有發掘基跖泥灰或出於此皇都始遷尚可補復軍國務殷遂不存檢官私顯隱漸加剝撤播麥納菽秋春相因生蒿杞時致火燎由是經石彌減文字增缺職忝胄教參掌經訓不能繕修頽墜興復生業倍深慚今求遣國子博士一人堪任幹事者專主周視驅禁田牧制其踐穢料閲碑牒所失次第量厥補綴詔曰此乃學者之根源不朽之永格垂範將來憲章之本便可一依公表光乃令國子博士李郁與助教韓神固劉燮等勘校石經其殘缺者計料石功并字多少欲補治之於後靈太后廢遂寢二年八月靈太后幸永寧寺躬登九層佛圖光表諫曰伏見親升上級佇蹕表剎之下祗心圖構誠為福善聖躬玉趾非所踐陟臣庶恇惶竊謂未可按禮記為人子者不登高不臨深古賢有言策畫失於廟堂大人蹶於中野漢書上欲西馳下峻坂爰盎攬轡停輿曰臣聞千金之子不垂堂百金之子不倚衡如有車敗馬驚奈高廟太后何又云上酎祭宗廟出欲御樓船薛廣德免冠頓首曰宜從橋陛下不聽臣臣以血汙車輪樂正子春曾參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寧纍級閣道回隘以柔懦之寶體乘至峻之重峭萬一差跌千悔何追禮將祭宗廟必散齊七日致齊三日然後入祀神明可得而通今雖容像未建已為神明之宅方加雕繢飾麗丹青人心所祗鋭觀滋甚登者既衆異懷若面縱一人之身盡誠潔豈左右臣妾各竭虔仰不可獨升必有扈侍懼或忘慎非飲酒茹葷而已昨風霾暴興紅塵四塞白日晝昏特可驚畏春秋宋衛陳鄭同日而災伯姬待姆致焚如之禍去皇興中青州七級亦號崇壯夜為上火所焚雖梓慎裨竈之明尚不能逆剋端兆變起倉卒預備不虞天道幽遠自昔深誡墟墓必哀廟社致敬望塋棲慟入門聳栗適墓不登隴未有升陟之事傳云公既視朔遂登觀臺其下無天地先祖之神故可得而乘也內經寶塔高華堪室千萬唯盛言香花禮拜豈有登上之義獨稱三寶階從上而下人天交接兩得相見超世奇絶莫可而擬恭敬拜跽悉在下級遠存矚眺周見山河因其所眄增發嬉笑未能級級加虔步步崇慎徒使京邑士女公私湊集上行下從理勢以然迄於無窮豈長世競慕一登而可抑斷哉蓋心信為本形敬乃末重實輕根靖實躁君恭己正南面者豈月乘峻極旬御層階今經始既就子來自勸基構已興雕絢漸起紫山華臺即其宮也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂汙永歸清寂下竭肅穆之誠上展瞻仰之敬勿踐勿履顯固億齡融教闡悟不其博歟九月靈太后幸嵩高光上表諫曰伏聞明後當親幸嵩高往還纍宿鑾遊近甸存省民物誠足為善雖漸農隙所獲栖畝飢貧之家指為珠玉遺秉滯穟莫不寶惜步騎萬餘來去經踐駕輦雜競騖交馳縱加禁護猶有侵耗士女老幼微足傷心秋末久旱塵壤委深風霾一起紅埃四塞轅關峭嶮山路危狹聖駕清道當務萬安乘履澗壑蒙犯霜露出入半旬途越數百飄曝彌日仰虧和豫七廟上靈容或未許億兆下心實用悚栗且藏蟄節遠昆蟲布列蠉蠕之類盈於川原車馬輾蹈必有殘殺慈矜好生應垂未測誠恐悠悠之議將謂為福興罪厮役困於負檐爪牙窘於賃乘供頓候迎公私擾費兵幕士方履敗穿晝暄夜淒罔所覆藉監帥驅捶泣呼相望霜旱為災所在不稔飢饉荐臻方成儉弊為民父母所宜存恤靖以撫之猶懼離散乃於收斂初辰致此行舉自近及遠交興怨嗟伏願遠覽虞舜恭己無為近遵老易不出戶牖罷勞形之遊息傷財之駕動循典防納諸軌儀委司責成寄之耳目人神幸甚朝野抃悅靈太后不從正光元年冬賜光几杖衣服二年春肅宗親釋奠國學光執經南面百僚陪列司徒京兆王繼頻上表以位讓光夏四月以光為司徒侍中國子祭酒領著作如故光表固辭歷年終不肯受八月獲禿鶖鳥於宮內詔以示光光表曰蒙示十四日所得大鳥此即詩所謂有鶖在梁解云禿鶖也貪惡之鳥野澤所育不應入殿庭昔魏氏黃初中有鵜鶘集于靈芝池文帝下詔以曹恭公遠君子近小人博求賢俊太尉華歆由此遜位而讓管寧者也臣聞野物入舍古人以為不善是以張臶惡䢽賈誼忌鵩鵜鶘暫集而去前王猶為至誡況今親入宮禁為人所獲方被畜養晏然不以為懼準諸往義信有殊矣且叨餮之禽必資魚肉菽麥稻粱時或餐啄一食之費容過斤鎰今春夏陽旱穀糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意於醜形惡聲哉衛侯好鶴曹伯愛雁身死國滅可為寒心陛下學通春秋親覽前事何得口詠其言行違其道誠願遠師殷宗近法魏祖修德延賢消災集慶放無用之物委之川澤取樂琴書頤養神性肅宗覽表大悅即棄之池澤詔召光與安豐王延明議定服章三年六月詔光乘步挽至東西上閣九月進位太保光又固辭光年耆多務疾病稍增而自強不已常在著作疾篤不歸四年十月肅宗親臨省疾詔斷賓客中使相望為止聲樂罷諸遊眺拜長子勵為齊州刺史十一月疾甚敕子姪等曰諦聽吾言聞曾子有云人之將死其言也善啓豫手啓豫足而今而後吾知免夫吾荷先帝厚恩位至於此史功不成歿有遺恨汝等以吾之故並得名位勉之勉之以死報國修短命也夫復何言速可送我還宅氣力雖微神明不亂至第而薨年七十三肅宗聞而悲泣中使相尋詔給東園溫明祕器朝服一具衣一襲錢六十萬布一千匹蠟四百斤大鴻臚監護喪事車駕親臨撫尸慟哭御輦還宮流涕於路為減常膳言則追傷每至光坐講讀之處未曾不改容悽悼五年正月贈太傅領尚書令驃騎大將軍開府冀州刺史侍中如故又敕加後部鼓吹班劍依太保廣陽王故事諡文宣公肅宗祖喪建春門外望哀感儒者榮之初光太和中依宮商角徵羽本音而為五韻詩以贈李彪彪為十二次詩以報光光又為百三郡國詩以答之國別為卷為百三卷焉光寬和慈善不逆於物進退沉浮自得而已常慕胡廣黃瓊之為人故為氣概者所不重始領軍于忠以光舊德甚信重焉每事籌決光亦傾身事之元叉於光亦深宗敬及郭祚裴植見殺清河王懌遇禍光隨時俯仰竟不匡救於是天下譏之自從貴達罕所申薦曾啓其女壻彭城劉敬徽云敬徽為荊州五隴戍主女隨夫行常慮寇抄南北分張乞為徐州長史兼別駕暫集京師肅宗許之時人比之張禹光初為黃門則讓宋辨為中書監讓汝南王悅為太常讓劉芳為少傅讓元暉穆紹甄琛為國子祭酒讓清河王懌任城王澄為車騎儀同讓江陽王繼又讓靈太后父胡國珍皆顧望時情議者以為矯飾崇信佛法禮拜讀誦老而逾甚終日怡怡未曾恚忿曾於門下省晝坐讀經有鴿飛集膝前遂入於懷緣臂上肩久之乃去道俗贊詠詩頌者數十人每為沙門朝貴請講維摩十地經聽者常數百人即為二經義疏三十餘卷識者知其疏略以貴重為後坐疑於講次凡所為詩賦銘贊詠頌表啓數百篇五十餘卷別有集光十一子勵勗勔勸劼勀勍劬勩勦勉勵字彥德器學才行最有父風舉秀才中軍彭城王參軍祕書郎中以父光為著作固辭不拜歷員外郎騎侍郎太尉記室散騎侍郎以繼母憂去職神龜中除司空從事中郎正光二年拜中書侍郎領軍將軍元叉為明堂大將以勵為長史與從兄鴻俱知名於世四年十月父光疾甚詔拜征虜將軍齊州刺史以父寢疾衣不解帶及光薨肅宗每加存慰五年春光葬於本鄉又詔遣主書張文伯宣弔焉孝昌元年十二月詔除太尉長史仍為齊州大中正襲父爵建義初遇害河陰時年四十八贈侍中衛將軍儀同三司青州刺史子挹襲武定末太尉屬齊受禪爵例降挹弟損儀同開府主簿勗武定末征虜將軍安州刺史朝陽伯齊受禪例降勔字彥儒亦有父風司空記室通直散騎侍郎寧遠將軍清河太守帶槃陽鎮將為逆賊崔景安所害贈征虜將軍齊州刺史子權太尉參軍事劼武定中中書郎光弟敬友本州治中頗有受納御史案之乃與守者俱逃後除梁郡太守會遭所生母憂不拜敬友精心佛道晝夜誦經免喪之後遂菜食終世恭寬接下修身厲節自景明已降頻歲不登飢寒請丐者皆取足而去又置逆旅於肅然山南大路之北設食以供行者延昌三年二月卒年五十九子鴻字彥鸞少好讀書博綜經史太和二十年拜彭城王國左常侍景明三年遷員外郎兼尚書虞曹郎中敕撰起居注遷給事中兼祠部郎轉尚書都兵郎中詔太師彭城王協以下公卿朝士儒學才明者三十人議定律令於尚書上省鴻與光俱在其中時論榮之永平初豫州城人白早生殺刺史司馬悅據懸瓠叛詔鎮南將軍邢巒討之以鴻為行臺鎮南長史徙三公郎中加輕車將軍遷員外散騎常侍領郎中延昌二年將大考百僚鴻以考令於體例不通乃建議曰竊惟王者為官求才使人以器黜陟幽明揚清激濁故績效能官才必稱位者朝升夕進年歲數遷豈拘一階半級閡以僚等位者哉二漢以降太和以前苟必官須此人人稱此職或超騰升陟數歲而至公卿或長兼試守稱允而遷進者披卷則人人而是舉目則朝貴皆然故能時收多士之譽國號豐賢之美竊見景明以來考格三年成一考一考轉一階貴賤內外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如黃龔儒學如王鄭史才如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一概不曾甄別琴瑟不調改而更張雖明旨已行猶宜消息世宗不從三年鴻以父憂解任甘露降其廬前樹十一月世宗以本官徵鴻四年復有甘露降其京兆宅之庭樹復加中堅將軍常侍領郎如故遷中散大夫高陽王友仍領郎中其年為司徒長史正光元年加前將軍修高祖世宗起居注光撰魏史徒有卷目初未考正闕略尤多每云此史會非我世所成但須記録時事以待後人臨薨言鴻於肅宗五年正月詔鴻以本官修緝國史孝昌初拜給事黃門侍郎尋加散騎常侍齊州大中正鴻在史甫爾未有所就尋卒贈鎮東將軍度支尚書青州刺史鴻弱冠便有著述之志見晉魏前史皆成一家無所措意以劉淵石勒慕容俊苻健慕容垂姚萇慕容德赫連屈孑張軌李雄呂光乞伏國仁禿髮烏孤李皓沮渠蒙遜馮跋等並因世故跨僭一方各有國書未有統一鴻乃撰為十六國春秋勒成百卷因其舊記時有增損褒貶焉鴻二世仕江左故不録僭晉劉蕭之書又恐識者責之未敢出行於外世宗聞其撰録遣散騎常侍趙雍詔鴻曰聞卿撰定諸史甚有條貫便可隨成者送呈朕當於機事之暇覽之鴻以其書有與國初相涉言多失體且既未訖迄不奏聞鴻後典起居乃妄載其表曰臣聞帝王之興也雖誕應圖籙然必有驅除蓋所以翦彼厭政成此樂推故戰國紛紜年過十紀而漢祖夷殄羣豪開四百之業歷文景之懷柔蠻夏世宗之奮揚威武始得涼朔同文牂越一軌於是談遷感漢德之盛痛諸史放絶乃鈐括舊書著成太史所謂緝茲人事光彼天時之義也昔晉惠不競華戎亂起三帝受制於姦臣二皇晏駕於非所五都蕭條鞠為煨燼趙燕既為長蛇遼海緬成殊域窮兵鋭進以力相雄中原無主八十餘年遺晉僻遠勢略孤微民殘兵革靡所歸控皇魏龍潛幽代世篤公劉內修德政外抗諸僞并冀之民懷寶之士襁負而至者日月相尋雖邠岐之赴太王謳歌之歸西伯實可同年而語矣太祖道武皇帝以神武之姿接金行之運應天順民龍飛受命太宗必世重光業隆玄默世祖雄才睿略闡曜威靈農戰兼修掃清氛穢歲垂四紀而寰宇一同儋耳文身之長卉服斷髮之酋莫不請朔率職重譯來庭隱愍鴻濟之澤三樂擊壤之歌百姓始得陶然蘇息欣於堯舜之世自晉永寧以後雖所在稱兵競自尊樹而能建邦命氏成為戰國者十有六家善惡興滅之形用兵乖會之勢亦足以垂之將來昭明勸戒但諸史殘缺體例不全編録紛謬繁略失所宜審正不同定為一書伏惟高祖以大聖應期欽明御運合德乾坤同光日月建格天之功創不世之法開鑿生民惟新大造陛下以青陽繼統睿武承天應符屈己則道高三五頤神至境則洞彼玄宗剖判百家斟酌六籍遠邁石渠美深白虎至如導禮革俗之風昭文變性之化固以感彼禽魚穆茲寒暑而況愚臣沐浴太和懷音正始而可不勉強難革之性砥礪木石之心哉誠知敏謝允南才非承祚然國志史考之美竊亦輒所庶幾始自景明之初搜集諸國舊史屬遷京甫爾率多分散求之公私驅馳數歲又臣家貧祿薄唯任孤力至於紙盡書寫所資每不周接暨正始元年寫乃向備謹於吏按之暇草構此書區分時事各繫本録破彼異同凡為一體約損煩文補其不足三豕五門之類一事異年之流皆稽以長曆考諸舊志刪正差謬定為實録商校大略著春秋百篇至三年之末草成九十五卷唯常璩所撰李雄父子據蜀時書尋訪不獲所以未及繕成輟筆私求七載于今此書本江南撰録恐中國所無非臣私力所能終得其起兵僭號事之始末乃亦頗有但不得此書懼簡略不成久思陳奏乞敕緣邊求採但愚賤無因不敢輕輒散騎常侍太常少卿荊州大中正臣趙雍忽宣明旨敕臣送呈不悟九臯微志乃得上聞奉敕欣惶慶懼兼至今謹以所訖者附臣雍呈奏臣又別作序例一卷年表一卷仰表皇朝統括大義俯明愚臣著録微體徒竊慕古人立言美意文致疏鄙無一可觀簡御之日伏深慚悸鴻意如此然自正光以前不敢顯行其書自後以其伯光貴重當朝知時人未能發明其事乃頗相傳讀亦以光故執事者遂不論之鴻經綜既廣多有違謬至如太祖天興二年姚興改號鴻以為改在元年太宗永興二年慕容超擒於廣固鴻又以為事在元年太常二年姚泓敗於長安而鴻亦以為滅在元年如此之失多不考正子子元祕書郎後永安中乃奏其父書曰臣亡考故散騎常侍給事黃門侍郎前將軍齊州大中正鴻不殞家風式纘世業古學克明在新必鏡多識前載博極羣書史才富洽號稱籍甚年止壯立便斐然懷著述意正始之末任屬記言撰緝餘暇乃刊著趙燕秦夏涼蜀等遺載為之贊序褒貶評論先朝之日草構悉了唯有李雄蜀書搜索未獲闕茲一國遲留未成去正光三年購訪始得討論適訖而先臣棄世凡十六國名為春秋一百二卷近代之事最為備悉未曾奏上弗敢宣流今繕寫一本敢以仰呈儻或淺陋不回睿賞乞藏祕閣以廣異家子元後謀反事發逃竄會赦免尋為其叔鵾所殺光從祖弟長文字景翰少亦徙於代都聰敏有學識太和中除奉朝請遷洛拜司空參軍事營構華林園後兼員外散騎常侍為宕昌使主還授給事中本國中正尚書庫部郎正始中大修器械為諸州造仗都使齊州太原太守雍州撫軍府長史以廉慎稱遷輔國將軍中散大夫轉太府少卿丞相高陽王雍咨議參軍太中大夫永安中以老拜征虜將軍平州刺史還家專讀佛經不關世事年七十九天平初卒贈使持節征東將軍齊州刺史諡曰貞子慈懋字德林永熙初征虜將軍徐州征東府長史長文從弟庠字文序有幹用初除侍御史員外散騎侍郎給事中頻使高麗轉步兵校尉又轉司空掾領左右直長出除相州長史還拜河陰洛陽令以強直稱遷東郡太守元皓寇逼郡界庠拒不從命棄郡走還鄉里孝莊還宮賜爵平原伯拜潁川太守二年五月為城民王早蘭寶等所害後贈驃騎將軍吏部尚書齊州刺史子罕襲爵齊受禪例降光族弟榮先字隆祖涉歷經史州辟主簿子鐸有文才冠軍將軍中散大夫鐸弟覲寧遠將軍羽林監史臣曰崔光風素虛遠學業淵長高祖歸其才博許其大至明主固知臣也歷事三朝師訓少主不出宮省坐致台傅斯亦近世之所希有但顧懷大雅託迹中庸其於容身之譏斯乃胡廣所不免也鴻博綜古今立言為事亦才志之士乎
