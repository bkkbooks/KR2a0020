body:
  text: 魏書卷九十四列傳閹官第八十二宗愛仇洛齊段霸王琚趙黑孫小張宗之劇鵬張祐抱嶷王遇苻承祖王質李堅秦松白整劉騰賈粲楊範成軌王溫孟鸞平季封津劉思逸夫宮腐之族置於閽寺取則天象事歷百王身乖全品任事宮掖親由褻狎恩生趨走便僻俯仰當寵擅權斯則伊戾豎刁因而禍兩國石顯張讓所以翦二京也豈非形質既虧生命易忽譬之胥靡不懼登高此亦苟且之事由變不已也王者殷鑒宜改往轍而後庭婉孌遊宴之地椒壼留連終見任使巧佞由之而自達權幸俄然而復歸斯蓋其由來遠矣非一朝一世也魏氏則宗愛殺帝害王劉騰廢后戮相其間竊官爵盜財賄乘勢使氣為朝野之患者何可勝舉今謹録其尤顯焉宗愛不知其所由來以罪為閹人歷碎職至中常侍正平元年正月世祖大會於江上班賞羣臣以愛為秦郡公恭宗之監國也每事精察愛天性險暴行多非法恭宗每銜之給事仇尼道盛侍郎任平城等任事東宮微為權勢世祖頗聞之二人與愛並不睦為懼道盛等案其事遂構告其罪詔斬道盛等於都街時世祖震怒恭宗遂以憂薨是後世祖追悼恭宗愛懼誅遂謀逆二年春世祖暴崩愛所為也尚書左僕射蘭延侍中吳興公和匹侍中太原公薛提等祕不發喪延匹二人議以高宗沖幼欲立長子徵秦王翰置之祕室提以高宗有世嫡之重不可廢所宜立而更求君延等猶豫未決愛知其謀始愛負罪於東宮而與吳王余素協乃密迎余自中宮便門入矯皇后令徵延等延等以愛素賤弗之疑皆隨之入愛先使閹豎三十人持仗於宮內及延等入以次收縛斬於殿堂執秦王翰殺之於永巷而立余余以愛為大司馬大將軍太師都督中外諸軍事領中祕書封馮翊王愛既立余位居元輔録三省兼總戎禁坐召公卿權恣日甚內外憚之羣情咸以為愛必有趙高閻樂之禍余疑之遂謀奪其權愛憤怒使小黃門賈周等夜殺余事在余傳高宗立誅愛周等皆具五刑夷三族仇洛齊中山人本姓侯氏外祖父仇款始出馮翊重泉款石虎末徙鄴南枋頭仕慕容暐為烏丸護軍長水校尉生二子長曰嵩小曰騰嵩仕慕容垂遷居中山位殿中侍御史嵩有二子長曰廣小曰盆洛齊生而非男嵩養為子因為之姓仇初嵩長女有姿色充冉閔宮闈閔破入慕容俊又轉賜盧豚生子魯元有寵於世祖而知外祖嵩已死唯有三舅每言於世祖世祖為訪其舅是時東方罕有仕者廣盆皆不樂入平城洛齊獨請行曰我養子兼人道不全當為兄弟試禍福也乃乘驢赴京魯元候知將至結從者百餘騎迎于桑乾河見而下拜從者亦同致敬入言于世祖世祖問其才用所宜將授之以官魯元曰臣舅不幸生為閹人唯合與陛下守宮闈耳而不言其養子世祖矜焉賜以奴馬引見尋拜武衛將軍俄而賜爵文安子稍遷給事黃門侍郎魏初禁網疏闊民戶隱匿漏脫者多東州既平綾羅戶民樂葵因是請採漏戶供為綸綿自後逃戶占為細繭羅縠者非一於是雜營戶帥遍於天下不屬守宰發賦輕易民多私附戶口錯亂不可檢括洛齊奏議罷之一屬郡縣從平涼州以功超遷散騎常侍又加中書令寧南將軍進爵零陵公拜侍中平遠將軍冀州刺史為內都大官興安二年卒諡曰康養子儼襲柔和敦敏有長者風太和中為虎牢鎮將初洛齊貴盛之後廣盆坐他事誅世祖以其非仇氏子不與焉還取侯家近屬以儼為子後欲還本而廣有女孫配南安王楨生章武王彬即中山王英弟也仇妃聞而請儼曰由我仇家富貴至此奈何一旦孤背恩養也楨時在內都主司品臣儼隸於楨畏憚之遂不敢九年卒諡曰靜子振襲稍遷至中堅將軍長水校尉廣盆並善營産業家于中山號為巨富子孫仕進至州主簿騰曾孫俊位至龍驤將軍驍騎將軍樂平男段霸雁門原平人父乾慕容垂廣武令太祖初遣騎略地至雁門霸年幼見執因被宮刑乾尋率鄉部歸化雲中霸少以謹敏見知稍遷至中常侍中護軍將軍殿中尚書領壽安少府賜爵武陵公出為安東將軍定州刺史世祖親考內外大明黜陟前定州治中張渾屯告霸前在定州濁貨貪穢便道致財歸之鄉里召霸定對霸不首引世祖以霸近臣而不盡實由此益怒欲斬之恭宗進請遂免霸為庶人霸從弟榮雍州別駕兄弟諸從遂世居廣武城修飾有士風王琚高平人自云本太原人高祖始晉豫州刺史琚以泰常中被刑入宮禁小心守節久乃見用稍遷為禮部尚書賜爵廣平公加寧南將軍高祖以琚歷奉先朝志在公正授散騎常侍後為侍中征南將車冀州刺史假廣平王徵還進為征南將軍進爵高平王侍中如故遣還冀州高祖文明太后東巡冀州親幸其家存問周至還京以其年老拜散騎常侍養老於家前後賜以車馬衣服雜物不可稱計後降爵為公扶老自平城從遷洛邑高祖以其朝舊遣左右勞問之琚附表自陳初至家多乏蒙賜帛二百匹常飲牛乳色如處子太和二十年冬卒時年九十贈征南將軍冀州刺史諡曰靖養子寄生未襲而亡子蓋海襲祖琚爵初琚年七十餘賜得世祖時宮人郭氏本鍾離人明嚴有母德內外婦孫百口奉之肅若嚴君家內以治蓋海官至青州樂陵太守趙黑字文靜初名海本涼州隸戶自云其先河內溫人也五世祖術晉末為平遠將軍西夷校尉因居酒泉安彌縣海生而涼州平沒入為閹人因改名為黑有容貌恭謹小心世祖使進御膳出入承奉初無過行遷侍御典監藏拜安遠將軍賜爵睢陽侯轉選部尚書能自謹厲當官任舉頗得其人加侍中進爵河內公顯祖將傳位京兆王子推訪諸羣臣百官唯唯莫敢先言者唯源賀等詞義正直不肯奉詔顯祖怒變色復以問黑黑曰臣愚無識信情率意伏惟陛下春秋始富如日方中天下說其盛明萬物懷其光景元元之心願終萬歲若聖性淵遠欲頤神味道者臣黑以死奉戴皇太子不知其他顯祖默然良久遂傳祚于高祖黑得幸兩宮祿賜優厚是時尚書李欣亦有寵於顯祖與黑對綰選部欣奏中書侍郎崔鑒為東徐州北部主書郎公孫處顯為荊州選部監公孫蘧為幽州皆曰有能也實有私焉黑疾其虧亂選體遂爭於殿庭曰以功授官因爵與祿國之常典中書侍郎尚書主書郎諸曹監勳能俱立不過列郡今欣皆用為方州臣實為惑顯祖疑之曰公孫蘧且止蘧最為欣厚於是黑與欣遂為深隙欣竟列黑為監藏時多所截沒先是法禁寬緩百司所典與官並食故多所損折遂黜為門士黑自以為欣所陷歎恨終日廢寢忘食規報前怨踰年還入為侍御散騎常侍侍中尚書左僕射復兼選部如昔黑告欣專恣欣遂出為徐州及其將獲罪也黑構成以誅之然後食甘寢安志在於職事出為假節鎮南大將軍儀同三司定州刺史進爵為王克己清儉憂濟公私時有人欲行私賂黑曰高官祿厚足以自給賣公營私本非情願終無所納高祖文明太后幸中山聞之賜帛五百匹穀一千五百石轉冀州刺史太和六年秋薨於官詔賜絹四百五十匹穀一千斛車牛二十乘致柩至都追贈司空公諡曰康黑養族弟趙奴第四子熾為後熾字貴樂初為中散襲黑爵後降為公官至揚州安南府長史加平遠將軍元嵩之死壽春也熾處分安輯微有聲稱神龜中卒贈光州刺史黑為定州與熾納巨鹿魏幹女有二子長子揆字景則襲父侯爵官至樂陵太守卒贈左將軍滄州刺史揆弟俊之字仲彥輕薄無行為給事中轉謁者僕射為劉騰養息猶以閹官餘資賂遺權門頻歷顯官而卒孫小字茂翹咸陽石安人父瓚姚泓安定護軍為赫連屈丐所侵人懷危懼亡奔者相屬瓚獨率衆拒守見殺小沒入宮刑會魏平統萬遂徙平城內侍東宮以聰識有智略稱未幾轉西臺中散每從征伐屢有戰功多獲賞賜世祖幸瓜步慮有北寇之虞乃加小左衛將軍賜爵泥陽子除留臺將軍車駕還都遷給事中綰太僕曹乃請父瓚贈諡求更改葬詔贈振威將軍秦州刺史石安縣子諡曰戴轉小領駕部課理有方畜牧蕃息出為冠軍將軍并州刺史進爵中都侯州內四郡百餘人詣闕頌其政化後遷冀州刺史聲稱微少於前然所在清約當時牧伯無能及也性頗忍酷所養子息驅馳鞭撻視如仇讎小之為并州以郭祚為主簿重祚門才兼任之以書記時人多之張宗之字益宗河南鞏人家世寒微父孟舒劉裕西征假洛陽令及宗之貴幸高宗贈孟舒平南將軍洛州刺史鞏縣侯諡曰貞初緱氏宗文雍聚黨於伊闕謀反逼脅孟舒等文雍敗孟舒走免宗之被執入京充腐刑以忠厚謹慎擢為侍御中散賜爵鞏縣侯遂歷右將軍中常侍儀曹庫部二曹尚書領中祕書進爵彭城公出為散騎常侍寧西將軍東雍州刺史以在官有稱入為內都大官出除散騎常侍鎮東將軍冀州刺史又例降為侯太和二十年卒年六十九贈建節將軍懷州刺史諡曰敬宗之兄鸞旗中書侍郎東宮中庶子兼宿衛給事加寧遠將軍賜爵洛陽男轉殿中給事出為散騎常侍冠軍將軍涇州刺史進爵為侯復為殿中給事中常侍卒贈洛州刺史諡曰靖始宗之納南來殷孝祖妻蕭氏劉義隆儀同三司思話弟思度女也多悉婦人儀飾故事太和中初制六宮服章蕭被命在內預見訪採數蒙賜賚蕭兄子超業後名彥幼隨姑入國娶李洪之女賴其給贍以自濟歷位太尉長史武衛將軍齊州刺史散騎常侍中軍將軍金紫光祿大夫彥時來往蕭寶夤致敬稱名呼之為尊彥於河陰遇害贈車騎將軍儀同三司徐州刺史子百年西河太守宗之養兄子襲紹爵襲字子業高祖初除主文中散稍遷員外郎京兆王大農久之除義陽太守為司空劉騰咨議參軍散騎常侍平東將軍光祿大夫太昌初卒年七十七贈驃騎大將軍儀同三司冀州刺史子皓邵郡太守卒贈荊州刺史皓弟璟中散大夫璟弟瑋武定中豫州征西府長史諸中官皆世衰唯趙黑及宗之後家僮數百通於士流劇鵬高陽人粗覽經史間曉吏事與王質等俱充宦官性通率不以閽閹為文明太后時亦見眷遇為給事中高祖遷洛常為宮官事幽后后之惑薩菩薩也鵬密諫止之不從遂發憤而卒兄買奴亦為宦者歷位幽州刺史才志遠不及鵬是時有李豐之徒數人皆被眷寵出入禁闈並致名位積資巨萬第宅華壯文明太后崩後乃漸衰矣張祐字安福安定石唐人父成扶風太守世祖末坐事誅祐充腐刑積勞至曹監中給事賜爵黎陽男稍遷散騎常侍都綰內藏曹時文明太后臨朝中官用事祐以左右供承合旨寵幸冠諸閹官特遷為尚書加安南將軍進爵隴東公仍綰內藏曹未幾監都曹加侍中與王睿等俱入八議太后嘉其忠誠為造甲宅宅成高祖太后親率文武往燕會焉拜散騎常侍鎮南將軍尚書左僕射進爵新平王受職于太華庭備威儀於宮城之南觀者以為榮高祖太后親幸其宅饗會百官祐性恭密出入機禁二十餘年未曾有過由是特被恩寵歲月賞賜家纍巨萬與王質等十七人俱賜金券許以不死太和十年薨時年四十九高祖親臨之詔鴻臚典護喪事賜帛千匹贈征南大將軍司空公諡曰恭葬日車駕親送出郊祐養子顯明後名慶少歷內職有姿貌江陽王繼以女妻之襲爵降為隴東公又降為侯遷洛廢替二十餘年虛爵而已熙平初為員外常侍兼衛尉少卿以元叉姊壻故越次而授焉神龜二年冬靈太后為肅宗采名家女慶女入充世婦未幾為嬪即叉甥也正光三年正少卿尋出為將軍高平鎮將卒子䄄洛襲抱嶷字道德安定石唐人居於直谷自言其先姓杞漢靈帝時杞匡為安定太守董卓時懼誅由是易氏即家焉無得而知也幼時隴東人張乾王反叛家染其逆及乾王敗父睹生逃逸得免嶷獨與母沒內京都遂為宦人小心慎密恭以奉上沉跡冗散經十九年後以忠謹被擢纍遷為中常侍安西將軍中曹侍御尚書賜爵安定公自總納言職當機近諸所奏議必致抗直高祖文明太后嘉之以為殿中侍御尚書領中曹如故以統宿衛俄加散騎常侍高祖太后每出遊幸嶷多驂乘入則後宮導引太后既寵之乃徵其父睹生拜太中大夫賞賜衣馬睹生將還見於皇信堂高祖執手謂之曰老人歸途幾日可達好慎行路太和十二年遷都曹加侍中祭酒尚書領中曹侍御後降爵為侯睹生卒贈秦州刺史諡曰靖賜黃金八十斤繒綵及絹八百匹以供喪用并別使勞慰加嶷大長秋卿嶷老疾請乞外祿乃以為鎮西將軍涇州刺史特加右光祿大夫將之州高祖餞於西郊樂陽殿以御白羽扇賜之十九年被詔赴洛以刺史從駕南征常參侍左右以嶷耆舊每見勞問數追稱嶷之正直命乘馬出入行禁之間與司徒馮誕同例軍回還州自以故老前宦為政多守往法不能遵用新制侮慢舊族簡於接禮天性酷薄雖弟姪甥壻略無存潤後數年卒於州先以從弟老壽為後又養太師馮熙子次興嶷死後二人爭立嶷妻張氏致訟經年得以熙子為後老壽亦仍陳訴終獲紹爵次興還於本族給奴婢三十口嶷前後賜賞奴婢牛馬蓋數百千他物稱是老壽凡薄酒色肆情御史中尉王顯奏言風聞前洛州刺史陰平子石榮積射將軍抱老壽恣蕩非軌易室而姦臊聲布於朝野醜音被於行路即攝鞫問皆與風聞無差犯禮傷化老壽等即主謹案石榮籍貫兵伍地隔宦流處世無入朝之期在生絶冠冕之望遭時之運逢非次之擢以犬馬延慈簪履恩念自微至貴位階方嶽不能懷恩感德上酬天施乃咎彰遐邇嚮穢京墟老壽種類無聞氏姓莫紀丐乞刑餘之家覆養閹人之室蒙國殊澤預班爵序正宜治家假內疑教誡閨庭方恣其淫姦換妻易妾榮前在洛州遠迎老壽妻常氏兵人千里疲於道路老壽同敝笱之在梁若其原疑之無別男女三人莫知誰子人理所未聞鳥獸之不若請以見事免官付廷尉理罪鴻臚削爵詔可老壽妻常氏萬敵弟女也老壽死後收紀家業稍復其舊奴婢尚六七百人三女並嬪貴室為老壽祖父皆造碑銘自洛就鄉而建之西方云直谷出二貴人石榮者從主書稍進為州自被劾後遂便廢頓子長宣武定中南兗州刺史與侯景反伏法王遇字慶時本名他惡馮翊李潤鎮羌也與雷党不蒙俱為羌中強族自云其先姓王後改氏鉗耳世宗時復改為王焉自晉世已來為渠長父守貴為郡功曹卒遇既貴追贈安西將軍秦州刺史澄城公遇坐事腐刑為中散遷內行令中曹給事中加員外散騎常侍右將軍賜爵富平子遷散騎常侍安西將軍進爵宕昌公拜尚書轉吏部尚書仍常侍例降為侯出為安西將軍華州刺史加散騎常侍幽后之前廢也遇頗言其過及後進幸高祖對李沖等申后無咎而稱遇謗議之罪沖言果爾遇合死也高祖曰遇舊人未忍盡之當止黜廢耳遂遣御史馳驛免遇官奪其爵收衣冠以民還私第世宗初兼將作大匠未幾拜光祿大夫復奪爵廢后馮氏之為尼也公私罕相供恤遇自以常更奉接往來祗謁不替舊敬衣食雜物每有薦奉后皆受而不讓又至其館遇夫妻迎送謁伏侍立執臣妾之禮遇性巧強於部分北都方山靈泉道俗居宇及文明太后陵廟洛京東郊馬射壇殿修廣文昭太后墓園太極殿及東西兩堂內外諸門制度皆遇監作雖年在耆老朝夕不倦跨鞍驅馳與少壯者均其勞逸又長於人事留意酒食之間每逢僚舊具設肴果觴膳精豐然競於榮利趨求勢門趙修之寵也遇往還宗承受敕為之監作第宅增於本旨笞擊作人莫不嗟怒卒于官初遇之疾也太傅北海王與太妃俱往臨問視其危惙為之泣下其善奉諸貴致相悲悼如此贈使持節鎮西將軍雍州刺史侯如故始遇與抱嶷並為文明太后所寵前後賜以奴婢數百人馬牛羊他物稱是二人俱號富室遇養弟子厲本郡太守稍遷至右軍將軍襲爵宕昌侯産業有過于遇時苻承祖略陽氐人也因事為閹人為文明太后所寵自御竹罒戊令遷中部給事中散騎常侍輔國將軍賜爵略陽侯兼典選部事中部如故轉吏部尚書仍領中部高祖為造甲第數臨幸之進爵略陽公安南將軍加侍中知都曹事初太后以承祖居腹心之任許以不死之詔後承祖坐贓應死高祖原之削職禁錮在家授悖義將軍佞濁子月餘遂死王質字紹奴高陽易人也其家坐事幼下蠶室頗解書學為中曹吏內典監稍遷祕書中散加寧朔將軍賜爵永昌子領監御遷為侍御給事又領選部監御二曹事復特加前將軍進爵魏昌侯轉選部尚書加員外散騎常侍出為鎮遠將軍瀛州刺史質在州十年風化粗行察姦糾慝究其情狀民庶畏服之而刑政刻峻多所笞戮號為威酷高祖頗念其忠勤宿舊每行留大故馮司徒亡廢馮后陸睿穆泰等事皆賜質以璽書手筆莫不委至同之戚貴質皆寶掌以為榮入為大長秋卿未幾而卒李堅字次壽高陽易人也高宗初因事為閹人文明太后臨朝稍遷至中給事中賜爵魏昌伯小心謹慎常在左右雖不及王遇王質等而亦見任用高祖遷洛轉被委授為太僕卿檢課牧産多有滋息世宗初出為安東將軍瀛州刺史本州之榮同於王質所在受納家産巨萬值京兆王愈反於冀州堅勒衆征愈為愈所破代還遇風疾拜光祿大夫數年卒贈撫軍將軍相州刺史賵帛五百匹以弟子曇景為後襲爵魏昌伯為羽林監直後秦松不知其所由太和末為中尹遷長秋卿賜爵高都子有罪免世宗復其爵起為光祿大夫領中常侍遷平北將軍領長秋卿出為散騎常侍安北將軍并州刺史卒贈大將軍肆州刺史諡曰定白整者亦因事腐刑少掌宮掖碎職以恭敏著稱稍遷至中常侍太和末為長秋卿賜爵雲陽男世宗封其妻王氏為縣君卒贈平北將軍并州刺史劉騰字青龍本平原城民徙屬南兗州之譙郡幼時坐事受刑補小黃門轉中黃門高祖之在懸瓠騰使詣行所高祖問其中事騰具言幽后私隱與陳留公主所告符協由是進冗從僕射仍中黃門後與茹皓使徐兗采召民女及還遷中給事稍遷中尹中常侍特加龍驤將軍後為大長秋卿金紫光祿大夫太府卿肅宗踐極之始以騰預在宮衛封開國子食邑三百戶是年靈太后臨朝以與于忠保護之勳除崇訓太僕加中侍中改封長樂縣開國公食邑一千五百戶拜其妻時為巨鹿郡君每引入內受賞賚亞於諸主外戚所養二子為郡守尚書郎騰曾疾篤靈太后慮或不救遷衛將軍儀同三司餘官仍舊後疾瘳騰之拜命肅宗當為臨軒會其日大風寒甚而罷乃遣使持節授之騰幼充宮役手不解書裁知署名而已姦謀有餘善射人意靈太后臨朝特蒙進寵多所干託內外碎密栖栖不倦洛北永橋太上公太上君及城東三寺皆主修營吏部嘗望騰意奏其弟為郡帶戍人資乖越清河王懌抑而不與騰以為恨遂與領軍元叉害懌廢靈太后於宣光殿宮門晝夜長閉內外斷絶騰自執管鑰肅宗亦不得見裁聽傳食而已太后服膳俱廢不免飢寒又使中常侍賈粲假言侍肅宗書密令防察叉以騰為司空公表𩹉擅權共相樹置叉為外禦騰為內防迭直禁闥共裁刑賞騰遂與崔光同受詔乘步挽出入殿門四年之中生殺之威決於叉騰之手八坐九卿旦造騰宅參其顏色然後方赴省府亦有歷日不能見者公私屬請唯在財貨舟車之利水陸無遺山澤之饒所在固護剝削六鎮交通互市歲入利息以巨萬計又頗役嬪御時有徵求婦女器物公然受納逼奪鄰居廣開室宇天下咸患苦之正光四年三月薨于位年六十賵帛七百匹錢四十萬蠟二百斤鴻臚少卿護喪事中官為義息衰絰者四十餘人騰之初治宅也奉車都尉周特為之筮不吉深諫止之騰怒而不用特告人曰必困於三月四月之交至是果死廳事甫成陳尸其下追贈使持節驃騎大將軍太尉公冀州刺史騰之葬日閹官為義服杖絰衰縞者以百數朝貴皆從軒蓋填塞相屬郊野魏初以來權閹存亡之盛莫及焉靈太后反政追奪爵位發其冢散露骸骨沒入財産後騰所養一子叛入蕭衍太后大怒因徙騰餘養於北裔尋遣密使追殺之於汲郡賈粲字季宣酒泉人也太和中坐事腐刑頗涉書記世宗末漸被知識得充內侍自崇訓丞為長兼中給事中中嘗藥典御轉長兼中常侍遷光祿少卿光祿大夫靈太后之廢粲與元叉劉騰等伺帝動靜右衛奚康生之謀殺叉也靈太后肅宗同升於宣光殿左右侍臣俱立西階下康生既被囚執粲紿太后曰侍官懷恐不安陛下宜親安慰太后信之適下殿粲便扶肅宗於東序前御顯陽還閉太后於宣光殿粲既叉黨威福亦震於京邑自云本出武威魏太尉文和之後遂移家屬焉時武威太守韋景承粲意以其兄緒為功曹緒時年向七十未幾又以緒為西平太守比景代下已轉武威太守靈太后反政欲誅粲以叉騰黨與不一恐驚動內外乃止出粲為濟州刺史未幾遣武衛將軍刁宣馳驛殺之資財沒於縣官楊範字法僧長樂廣宗人也高宗時坐宗人劫賊被誅範宮刑為王琚所養恩若父子往來出入其家範為中謁者轉黃門中謁者僕射中給事中射聲校尉加寧遠將軍為中尹世宗崩高陽王雍總政出為白水太守加龍驤將軍靈太后臨朝徵為常侍崇訓太僕卿領中嘗藥典御賜爵華陰子為平西將軍華州刺史中官內侍貴者靈太后皆許其方嶽以範年長拜跪為難所司非要故得早遂其請父子納貨勞役兵民為御史所糾子遂逃竄範事得散赴京師遂廢於家後靈太后念範勤舊乃以範為中侍中安南將軍尋進鎮南將軍崇訓太僕華州大中正卒贈征西將軍秦州刺史成軌字洪義上谷居庸人少以罪刑入事宮掖以謹厚稱除中謁者僕射高祖意有所欲軌瞻候容色時有奏發輒合帝心從駕南征專進御食于時高祖不豫常居禁中晝夜無懈車駕還賜帛百匹景明中嘗食典御丞僕射如故轉中給事中步兵校尉敕侍東宮延昌末遷中常侍中嘗食典御光祿大夫賜始平伯統京染都將轉崇訓太僕少卿遭母憂詔遣主書常顯景弔慰又起為本官進安東將軍崇訓衛尉卿久之超遷中侍中撫軍將軍典御崇訓如故尋除中軍將軍燕州大中正孝昌二年以勤舊封始平縣開國伯食邑三百戶肅宗所幸潘嬪以軌為假父頗為中官之所敬憚建義初軌迎於河陰詔令安慰宮內進爵為侯增戶三百并前六百戶遷衛將軍其年八月卒贈車騎大將軍雍州刺史諡曰孝惠養弟子仲慶襲歷位鎮軍將軍光祿大夫卒子朏襲齊受禪例降王溫字桃湯趙郡欒城人父冀高邑令坐事被誅溫與兄繼叔俱充宦者高祖以其謹慎補中謁者小黃門轉中黃門鈎盾令稍遷中嘗食典御中給事中給事東宮加左中郎將世宗之崩羣官迎肅宗於東宮溫於臥中起肅宗與保母扶抱肅宗入踐帝位高陽王雍既居冢宰慮中人朋黨出為巨鹿太守加龍驤將軍靈太后臨朝徵還為中常侍光祿大夫賜爵欒城伯安東將軍領崇訓太僕少卿特除使持節散騎常侍撫軍將軍瀛州刺史還除中侍中進號鎮東將軍金紫光祿大夫遷車騎將軍左光祿大夫光祿勳卿侍中如故孝昌二年封欒城縣開國侯邑六百戶溫後自陳本陽平武陽人於是改封武陽縣開國侯邑如故建義初於河陰遇害年六十六永安初贈驃騎大將軍儀同三司雍州刺史養子冏哲襲齊受禪例降孟鸞字龍兒不知何許人坐事充閹人文明太后時王遇有寵鸞以謹敏為遇左右往來方山營諸寺舍由是漸見眷識靈太后臨朝為左中郎將中給事中素被病面常黯黑於九龍殿下暴疾半身不攝扶載歸家其夜亡鸞初出靈太后聞之曰鸞必不濟我為之憂及奏其死為之下淚曰其事我如此不見我一日欣樂時也遂賜帛三百匹黃絹十匹以供喪用七日靈太后為設二百僧齊賜助施五十匹同類榮焉平季字稚穆燕國薊人祖濟武威太守父雅州秀才與沙門法秀謀反伏誅季坐腐刑入事宮掖久之除小黃門以忤旨出為潞縣令不拜仍除奉朝請靈太后反政授寧朔將軍長水校尉領黃門令轉前軍將軍中給事中時四方多事太后每令季出使於外後慰勞西軍還至潼關華州羌人舜明等據嶮作逆都督姜道明不能進討會舜明遣十餘人詐降入道明軍闕遂散出為新興太守肅宗崩與爾朱榮等議立莊帝莊帝即位起拜平北將軍肆州刺史尋除撫軍將軍中侍中以參謀之勳封元城縣開國侯食邑七百戶仍加金紫光祿大夫幽州大中正尋攝燕安平營中正前廢帝以為車騎將軍右光祿大夫中侍中如故永熙中加驃騎將軍季遇疾詔遣使存問三年九月卒天平初贈使持節都督幽燕安平四州諸軍事儀同三司幽州刺史中侍中將軍侯如故初季以兄叔良為襲季爵卒子世胄襲齊受禪例降封津字醜漢勃海蓨人也祖羽真君中為薄骨律鎮副將以貪汙賜死父令德娶党寶女寶伏誅令德以連坐從法津受刑給事宮掖積官久之除中謁者僕射遷奉車都尉肅宗初冀州大乘賊起詔津慰勞津世不居桑梓故不為州鄉所歸靈太后令津侍肅宗書遷常山太守孝昌初除中侍中加征虜將軍仍除崇訓太僕領宮室都將冀州大中正超拜金紫光祿大夫二年封東光縣開國子食邑二百戶鎮南將軍兼中關右慰勞大傳出為散騎常侍征東將軍濟州刺史永安初中侍中衛將軍尋轉大長秋左光祿大夫太昌初驃騎大將軍儀同三司津少長宮闈給事左右善候時情號為機悟天平初除開府儀同三司本將軍懷州刺史元象初復為中侍中大長秋卿仍開府儀同夏薨年六十二贈都督冀瀛幽安四州諸軍事本將軍司徒公冀州刺史諡曰孝惠養兄子長業襲爵齊受禪例降津兄憑字元寄當時逃竄後會赦免太和中奉朝請冀州趙郡王幹田曹參軍定州彭城王協水曹參軍給事中越騎校尉以討大乘功除左中郎將遷龍驤將軍中散大夫孝昌中歷農武邑二郡太守尋除征虜將軍光州刺史還為平東將軍光祿大夫轉鎮南將軍金紫光祿大夫除衛將軍右光祿大夫初津被敕營出帝父廣平王陵永熙中以營陵功封津城陽縣開國子邑三百戶津自有封乃啓轉於憑後除衛大將軍左光祿大夫興和三年夏卒年六十七憑無他才伎始終資歷皆由於津津卒之後憑亦無贈子靈素襲齊受禪例降津從兄答光祿大夫子宗顯司徒掾劉思逸平原人父直武邑太守與元愈反於信都伏誅思逸少充腐刑初為中小史轉寺人久之除小黃門拜奉朝請坐事免後除東莞太守思逸雖身在閹寺而性頗豪率輕薄無行好結朋遊又除左將軍大長秋卿遷中侍中平東將軍武定中與元瑾等謀反伏誅又有張景嵩毛暢者咸以閽寺在肅宗左右而並黠了甚見知遇俱為小黃門每承間陳元叉之惡於肅宗元叉之出景嵩暢頗有力焉靈太后反政未即戮叉時內外喧喧云叉還入知政事暢等恐禍及己乃啓肅宗欲詔右衛將軍楊津密往殺叉詔書已成未及出叉妻知之告太后云景嵩暢與清河王息召己欲廢太后太后信之責暢暢出詔書草以呈太后太后讀之知無廢己狀意為小解然叉妻構之不已遂致疑惑未幾出暢為頓丘太守後復出景嵩為魯郡太守乃密令御史掩暢暢走免尋捕殺之景嵩因入都太后數其與暢同計之事大致嫌責後為陽城滎陽二郡太守孝靜時位至中侍中坐事死史臣曰闕
