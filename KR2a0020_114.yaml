body:
  text: 魏書卷一百五之三天象志一之三第三太祖皇始元年夏六月有星彗于髦頭彗所以去穢布新也皇天以黜無道建有德故或憑之以昌或由之以亡自五胡蹂生人力正諸夏百有餘年莫能建經始之謀而底定其命是秋太祖啓冀方之地實始芟夷滌除之有德教之音人倫之象焉終以錫類長代修復中朝之舊物故將建元立號而天街彗之蓋其祥也先是有大黃星出于昴畢之分五十餘日慕容氏太史丞王先曰當有真人起於燕代之間大兵鏘鏘其鋒不可當冬十一月黃星又見天下莫敵是歲六月木犯哭星木人君也君有哭泣之事是月太后賀氏崩至秋晉帝殂二年六月庚戌月奄金于端門之外戰祥也變及南宮是謂朝庭有兵時燕王慕容寶已走和龍秋九月其弟賀麟復糾合三萬衆寇新市上自擊之大敗燕師于義臺悉定河北而晉桓玄等連衡內侮其朝庭日夕戒嚴是歲正月火犯哭星占有死喪哭泣事秋八月又守井鉞占曰大臣誅十月襄城王題薨明年正月右軍將軍尹國於冀州謀反被誅天興元年八月戊辰木晝見胃胃趙代墟也天之事歲為有國之君晝見者並明而干陽也天象若曰且有負海君實能自濟其德而行帝王事是月始正封畿定權量肆禮樂頒官秩十二月羣臣上尊號正元日遂禋上帝于南郊由是魏為北帝而晉氏為南帝元年十月至二年五月月再掩東蕃上相相所以蕃輔王室而定君臣位天象若曰今下凌上替而莫之或振將焉用之哉且曰中坐成刑貴人奪勢是歲桓玄專殺殷仲堪等制上流之衆晉室由是遂卑是歲五月辰星犯軒轅大星占曰女主當之三年三月至七月月再犯鎮星于牽牛又犯哭星為兵喪女憂或曰月為強大之臣鎮所以正綱紀也是為強臣有干犯者在吳越既而晉太后李氏殂桓玄擅命江南仍有艱故云三年三月有星孛于奎歷閣道至紫微西蕃入北斗魁犯太陽守循下台南宮履帝坐遂由端門以出奎是封豨剝氣所由生也又殷徐州之次桓玄國焉劉裕興焉天象若曰君德之不建人之無援且有權其列蕃盜其名器之守而荐食之者矣又將由其天步席其帝庭而出號施令焉至四年二月甲寅有大流星衆多西行歷牛虛危絶漢津貫太微紫微虛危主靜人牽牛主農政皆負海之陽國也天象若曰黎元喪其所食失其所係命卒至流亡矣上不能恤又將播遷以從之其後晉人有孫恩之難而桓玄踵之三吳連兵荐饑西奔死亡者萬計竟篡晉主而流之尋陽既又劫之以奔江陵是歲三月甲子月生齒占曰有賊臣七月丁卯月犯天關關所以制畿封國也月犯之是為兵起于郊甸十月甲子月又犯東蕃上相占同二年既而桓玄戡金陵殺司馬元顯太傅道子是歲秀容胡帥亦聚衆反伏誅五年四月辛丑月掩辰星在東井月為陰國之兵辰象戰鬬占曰所直野軍大起戰不勝亡地家臣死冬十月帝伐秦師于蒙坑大敗之遂舉乾壁關中大震其上將姚平赴水死是月戊申月暈左角太史令朝崇奏角蟲將死上慮牛疫乃命諸將併重焚車丙戌車駕北引牛大疫死者十有八九官車所御巨犗數百同日斃於路側首尾相屬麋鹿亦多死者五年三月戊子太白犯五諸侯晝見經天九月己未又犯進賢太白為強侯之誡犯五諸侯所以興霸形也是時桓玄擅征伐之柄專殺諸侯以弱其本朝卒以干君之明而代奪之故皇天著誡焉若曰夫進賢興功大司馬之官守也而今自殘之君於何有焉是冬十月客星白若粉絮出自南宮之西十二月入太微亂氣所由也以距乏之氣而乘粹陽之天庭適足以驅除焉爾明年竟篡晉室得諸侯而不終是歲五月丙申月犯太微十月乙卯又如之月者太陰臣象太微正陽之庭不當橫行其中是謂朝庭間隙強臣不制亦桓玄之誡也又占曰貴人有坐之者明年七月鎮西大將軍毗陵王順以罪還第亦是也五年七月己亥月犯歲星在鶉火鳥帑南國之墟也至天賜元年二月甲辰又掩之在角角為外朝而歲星君也又象若曰有強大之臣干君之庭以挾其主而播遷于外是歲桓玄之師敗績于劉裕玄劫晉帝以奔江陵至五月玄死桓氏之黨復攻江陵陷之凡再劫天子云先是六年六月甲辰月掩斗魁第四星至天賜元年五月壬申又掩斗魁第三星二年八月丁巳又犯斗第一星斗為吳分大人憂將相戮宮中有自賊者及桓玄伏誅貴臣多戮死者江南兵革十餘歲乃定故謫見于斗天賜二年四月己卯月犯鎮星在東壁七月己未又如之十月丁巳又掩之在室夫室星所以造宮廟而鎮司空也占曰土功之事興明年六月發八部人自五百里內繕修都城魏於是始有邑居之制度或曰北宮後庭人主所以庇衛其身也鎮主后妃之位存亡之基而是時堅冰之漸著矣故犯又掩再三焉占曰臣賊君邦大喪是歲三月丁酉月犯心前星三年二月月犯心後星四年二月又如之心主嫡庶之禮占曰亂臣犯主儲君失位庶子惡之先是天興六年冬十月至元年四月月再掩軒轅占曰有亂易政后妃執其咎三年五月壬寅熒惑犯氐氐宿宮也天戒若曰是時蠱惑人主而興內亂之萌矣亦自我天視而修省焉及六年七月宣穆后以強死太子微行人間既而有清河萬人之難二年八月火犯斗丁亥又犯建斗為大人之事建為經綸之始此天所以建創業君時劉裕且傾晉祚而清河之釁方作矣帝猶不悟至是歲九月火犯哭星其象若曰將以內亂至于哭泣之事焉由是言之皇天所以訓劫殺之主熟矣而罕能敦復以自悟悲夫二年八月甲子熒惑犯少微庚寅犯右執法癸卯犯左執法十一月丙戌太白掩釣鈐皆南邦之謫也火象方伯金為強侯少微以官賢材而輔南宮之化執法者威令所由行也天象若曰夫祿去公室所由來漸矣始則奮其賢材以為其本朝終以干其鈐而席其威令焉至三年十二月丙午月掩太白于危危齊分也占曰其國以戰亡丁未金火皆入羽林四年正月太白晝見奎是謂或稱王師而干君明者占曰天下兵起魯邦受之二月癸亥金火土水聚于奎婁徐魯之分也四神聚謀所以革衰替之政定霸王之命五月己丑金晝見于參天意若曰是將自植攻伐以震其主而代奪之云爾八月辛丑熒惑犯執法九月遂犯進賢與桓氏同占是時南燕慕容氏兼有齊魯之墟不務修德而驟侵晉淮泗六年四月劉裕以晉師伐之大敗燕師于臨朐進克廣固執慕容超以歸戕諸建康於是專其兵威荐食藩輔篡奪之形由此而著云二年三月月掩左執法三年四月又犯西蕃上將己未犯房次相六月火犯房次將三年七月太尉穆崇薨四年誅定陵公和跋殺司空庾嶽又四年六月火犯水左翼八月金掩火犯左執法占曰大兵在楚執法當之至五年火犯天江占曰水賊作亂六月金犯上將又犯左執法其後廬循作亂於上流晉將何無忌戰死左僕射孟昶仰藥卒劉裕自伐齊奔命僅乃克之六年六月金火再入太微犯帝座蓬孛客星及他不可勝紀太史上言且有骨肉之禍更政立君語在帝紀冬十月太祖崩夫前事之感大即後事之災深故帝之季年妖怪特甚是歲二月至九月月三犯昴昴為白衣會宮車晏駕之徵也十二月辛丑金犯木於奎占曰其君有兵死者既而慕容超戮于晉是歲四月火犯水于東井其冬赫連氏攻安定秦主興自將救之自是侵伐不息或曰水火之合內亂之形也時朱提王悅謀反賜死太宗永興二年五月己亥月掩昴昴為髦頭之兵虜君憂之是月蠕蠕社崘圍長孫嵩于牛川上自將擊之社崘遁走道死六月甲午太白晝見占曰為不臣七月月犯鬼占曰亂臣在內明年五月昌黎王慕容伯兒謀反誅之是歲三月至秋八月月三掩南斗第五星斗吳分也且曰強大之臣有干天祿者大人憂之是月乙未太白犯少微晝見九月甲寅進犯左執法占曰且有杖其霸刑以戮社稷之衛而專威令者徵在南朔先是三月丁卯月掩房次將六月己丑又如之八月甲申犯心前星占曰服軛者當之君失馭徵在豫州時劉裕謀弱晉室四年九月專殺僕射謝混因襲荊州刺史劉毅于江陵夷之明年三月又誅晉豫州刺史諸葛長人其君託食而已是歲八月壬子太白犯軒轅大星占曰有亂易政女君憂三年十一月丙午金犯哭星午秦地四年八月戊申月犯哭星申晉地是月晉后王氏死其後姚主薨三年六月庚子月犯歲星在畢八月乙未又犯之在參四年正月又蝕在畢直徼垣之陽參在山河之右歲星所以阜農事安萬人也占曰月仍犯之邊萌阻兵而荐饑是歲六月癸巳金木合于東井七月甲申金犯土于井占曰其國內兵有白衣之會十一月土犯井十二月癸卯土犯鉞土主疆理之政存亡之機也是為土地分裂有戮死之君徵在秦邦至五年二月丙午火土皆犯井占曰國有兵喪之禍主出走是月壬辰歲鎮熒惑太白聚于井將以建霸國之命也其地君子憂小人流又自三年四月至五年三月熒惑三干鬼主命者將夭而國徙焉是時雍州假王霸之號者六國而赫連氏據朔方之地尤為強暴荐食關中秦人奔命者殆路間歲姚興薨而難作于內明年劉裕以晉師伐之秦師連戰敗績執姚泓以歸戕諸建康既而遺守內攜長安淪覆焉或曰自上黨並河山之北皆鬼星參畢之郊也五年四月上黨羣盜外叛六月濩澤人劉逸自稱三巴王七月河西胡曹龍入蒲子號大單于十月將軍劉潔魏勤擊吐京叛胡失利勤力戰死潔為所虜明年赫連屈孑寇蒲子三城諸將擊走之其餘災波及晉魏仍其兵革之禍二年九月土犯畢為疆埸之兵三年七月木犯土于參占曰戰敗亡地國君死四年十月月掩天關其災同上參外主巴蜀其後晉師伐蜀戮其主譙縱先是四年閏月月犯熒惑在昴七月又蝕之五年將軍奚斤討越勤大破之明年禿髮氏降于西秦其君檀戮死神瑞元年二月填入東井犯天尊旱祥也天象若曰土失其性水源將壅焉施于天尊所以福矜寡之萌也先是去年九月至于五月歲再犯軒轅大星八月庚寅至二年三月填再犯鬼積尸歲星主農事軒轅主雪霜風雨之神返覆由之所以告黃祇也土爰稼穡鬼為物之精氣是謂稼穡潛耗人將以饉而死焉一曰大旱是後京師比歲霜旱五穀不登詔人就食山東以粟帛賑乏語在崔浩傳先是月犯歲于畢占曰饑在晉代亦其徵又鬼主秦旱在秦邦至二年太史奏熒惑在匏瓜中一夜忽亡失之後出東井語在崔浩傳既而關中大旱昆明枯涸是歲四月癸丑流星晝見中天西行占曰營頭所首野有覆軍流血西行謫在秦邦而魏人覿之亦王師之戒也天若戒魏師曰是擁衆而西固欲干君之明而代奪之爾姑息人以觀變無庸禦焉先是五年三月月犯太白于參八月庚申又犯之參魏分野占曰強侯作難國戰不勝九月己丑月犯左角是歲三月壬申又蝕之是謂以剛晉之兵合戰而偏將戮徵在兗州二年四月太白入畢月犯畢而再入之占曰大戰不勝邊將憂魏邦受之六月己巳有星孛于昴南天象若曰且有驅除之雄勿用距之于朔方矣明年七月劉裕以舟師泝河九月裕陷我滑臺兗州刺史尉建以畏懦斬時崔浩欲勿戰上難違衆議詔司徒嵩率師迓之及晉人戰于畔城魏師敗績語在崔浩傳裕既定關中遽歸受禪既而赫連氏并之遂竊尊號云自元年正月至泰常元年十月月三犯畢再入之再犯畢陽星占曰邊兵起貴人有死者元年十二月蠕蠕犯塞上自將大破之二年上黨胡反詔五將討平之泰常元年長樂河間南陽王皆薨二年豫章王又薨常山霍季聚衆反伏誅二年四月辛巳有星孛于天市五月甲申彗星出天市掃帝座在房心北市所以建國均人心宋分也國且殊號人將更主其革而為宋乎先是往歲七月月犯鈎鈐十一月月食房上相至元年二月又如之天象若曰尚尸鈐鍵之位君憑而尊之者又將及矣是歲八月金木合于翼占曰且有內兵楚邦受之至泰常二年正月晉荊州刺史司馬休之雍州刺史魯宗之為劉裕所襲皆出奔走是歲十月鎮星守太微七十餘日占曰易代立王其三年三月癸丑太白犯五諸侯如桓氏之占七月有流星孛于少微以入太微自劉氏之霸三變少微以加南宮矣始以方伯專之中則霸形干之又今孛政除之馴而三積堅冰至焉是月辰星見東方在翼甚明大翼楚邦也是為冢臣干明賊人其昌先是五年十一月壬子辰星出而明盛非常至泰常二年十二月庚戌辰星過時而見光色明盛是為強臣有不還令者至是又如之亦三至焉或曰辰星以負北海亦魏將大興之兆九月長彗星孛于北斗轢紫微辛酉入南宮凡八十餘日十二月彗星出自天津入太微徑北斗干紫宮犯天棓八十餘日及天漢乃滅語在崔浩傳是歲晉安帝殂後年而宋篡之夫晉室雖微泰始之遺俗也蓋皇天有以原始篤終以哀王道之淪喪故猶著二微之戒焉神瑞二年四月木入南宮加右執法五月火又如之八月金入自掖門掩左執法泰常元年六月又由掖門入太微五月火犯執法是冬土守天尊而月掩之三年八月土又入太微犯執法因留二百餘日九月金又犯右執法十月火犯上將因留左掖門內二十日乃逆行四年三月出西蕃又還入之繞填星成句己四月丙午行端門出皆晉氏之謫也自晉滅之後太微有變多應魏國也泰常三年十月辛巳有大流星出昴歷天津乃分為三須臾有聲占曰車騎滿野非喪即會明年四月帝有事于東廟蕃服之君以其職來祭者蓋數百國也是歲正月己酉月犯軒轅四月壬申又犯填星在張四年五月辰星又犯軒轅占曰國有喪女君受之明年五月貴人姚氏薨是為昭哀皇后六月貴嬪杜氏薨是為密后先是二年九月火犯軒轅三年八月金又犯之占同也四年自正月至秋七月月行四犯太微天象若曰太微粹陽之天庭月者臣也今橫行之不已甚乎先是元年五月月犯歲星在角是歲七月月又犯歲星明年宋始建國後年而晉主殂裕鴆之也昔桓氏之難月再干歲星再劫其主至是亦再犯之而再勦其君極其幽逼之患而濟以篡殺之禍斯謂之甚矣先是三年九月月犯火于鶉尾十二月又犯火于太微是歲五月月犯太白在井十月又犯之在斗且再犯井星皆有兵水大喪諸侯有死者七月雁門河內大水五年三月南陽王意文死十一月西涼李歆為沮渠所滅晉君亦殂秦吳亡之應五年十一月乙卯熒惑犯填星在角角外朝也土為紀綱火主內亂會于天門王綱將紊焉占曰有死君逐主后妃憂之十二月月蝕熒惑在亢亢內庭也占曰君薨而亂作于內貴臣以兵死是月客星見于翼翼楚邦也占曰國更服邊有急將軍或謀反者六年二月月食南斗杓星十月乙酉金土鬬于亢占曰內兵且喪更立王公又兗州陳鄭之墟也有攻城野戰之象焉至七年正月犯南斗三月壬戌又犯之斗為人君受命又吳分是歲五月宋武殂秋九月魏師侵宋北鄙十一月攻滑臺克之明年拔虎牢陷金墉屠許昌遂啓河南之地八年宋太后蕭氏死既大臣專權遷殺其主卒皆伏誅自五年八月至七年十二月熒惑一守軒轅再犯進賢再犯房星月一犯軒轅及房皆女君大臣之戒是時陽平河南王太尉穆觀相次薨而宋氏廷臣乘釁以侮其主竟以誅死云或曰火犯土亢為饑疾時官軍陷武牢會軍大疫死者十二三是冬詔稟饑人六年六月壬午有大流星出紫宮占曰上且行幸若有大君之使明年駕幸橋山祠黃帝東過幽州命使者觀省風俗十月上南征八年春步自鄴宮遂絶靈昌至東郡觀兵成臯反自河內登太行山幸高都飲至晉陽焉七年二月辛巳有星孛于虛危向河津占曰玄枵所以飾喪紀也宗廟並起司人疑更謀有易政之象十一月甲寅彗星出室掃北斗及于門占曰內宮幾室主命將易塞垣有土功之事其地又齊衛也八年正月彗星出奎南長三丈東南掃河奎為荐食之兵徐方之地占曰西北之兵伐之君絶嗣天下饑七年十二月帝命壽光侯叔孫建徇定齊地八年春築長城距五原二千餘里置守卒以備蠕蠕冬十月大饑十一月己巳上崩于西宮明年宋廢其主由是南邦日蹙齊衛之地盡為兵衝及世祖即政遂荒淮沂以負東海云八年二月丙寅火守斗亦南邦之謫也十一月彗星孛于土司空司空主疆理邦域且曰有土功哭泣事後年赫連屈孑薨太武征之取新秦之地由是征伐四克提封萬里云世祖始光元年正月壬午月犯心大星心為宋分中星者君也月為大臣主刑事是歲五月宋權臣徐羡之謝晦傅亮放殺其主而立其弟宜都王是為宋文帝至十月火犯心天戒若曰是復作亂以干其君矣十月壬寅大流星出天將軍西南行殷殷有聲占曰有禁暴之兵上將督戰以所首名之三年正月歲星食月在張張南國之分歲之於月少君之象今反食之且誅強大之臣是月羡之等戮死謝晦興江陵之甲以伐其君宋將檀道濟帥師禦之晦又奔潰伏誅或曰是歲上伐赫連氏入其郛夏都直代西南亦奔星應也二年五月太白晝見經天占曰時謂亂紀革人更王六月己丑火入羽林守六十餘日占曰禁兵大起且有反臣之戒三年十月有流星出西南而東北行光明燭地有聲如雷鳥獸盡駭占曰所發之野有破國遷君西南直夏而首于代都焉著而有聲盛怒也四年五月辛酉金水合于西方占曰兵起大戰先是三年正月宋人有謝氏之難王卒盡出冬十一月上伐赫連昌入其郛徙萬餘家以歸是歲復攻之六月大敗昌于城下昌奔上邽遂拔統萬盡收夏器用虜其母弟妻子由是威加四鄰北夷讋焉神元年五月癸未太白犯天街占曰六夷髦頭滅二年五月太白晝見占曰大兵且興強國有弱者是月上北征蠕蠕大破之虜獲以巨萬計遂降高車以實漠南闢地數千里云三年六月火犯井鬼入軒轅占曰秦憂兵亂有死君又旱饑之應丙子有大流星出危南入羽林占曰兵起負海國與王師合戰是歲自三月至十月太白再犯歲星月又犯之占曰有國之君或罹兵刑之難者且歲饉十二月丙戌流星首如甕長二十餘丈大如數十斛船色正赤光燭人面自天船及河抵奎大星及于壁占曰天船以濟兵車奎為徐方東壁衛也是為宋師之祥昭盛者事大也是歲六月宋將到彥之等侵魏自南鄙清水入河泝流而西列屯二千餘里九月帝用崔浩策行幸統萬遂擊赫連定於平涼十二月克之悉定三秦地明年大師涉河攻滑臺屠之宋人宵遁是時赫連定轉攻西秦戮其君乞伏慕末吐谷渾慕容璝又襲擊定虜之以強死者再君焉是歲二月定州大饉詔開倉賑乏或曰奎星羽獵理兵象也流星抵之而著大是為大人之事冬十月上大閲于漠南甲騎五十萬旌旗二千餘里又明盛之徵四年金火入東井火又犯天戶明年正月又犯鬼占曰秦有兵喪而至秦夏出夷威沮渠蒙遜又死氐主楊難當陷宋之漢中地云四年三月有大流星東南行光燭地長六七丈食頃乃滅後有聲占曰大兵從之是時諸將方逐宋師至歷城不及有聲駿奔之象也四月辛未太白晝見于胃胃為趙分五月太白犯天關十月丙辰月又掩之天關外主勃碣山河之險窮焉占曰兵革起九月丙寅有流星大如斗赤色發太微至北斗而滅太微禮樂之庭且有昭德之舉而述宣王命是以帝車受之是月壬申有詔徵范陽盧玄等三十六人郡國察秀孝數百人且命以禮宣喻申其出處之節明年六月上伐北燕舉燕十餘郡進圍和龍徙豪傑三萬餘家以歸四年八月金入太微亦君自將兵象明年正月庚午火入鬼占曰秦有死君四月己丑太白晝見為不臣其後秦王赫連昌叛走伏誅之應也延和元年七月有大流星出參左肩東北入河乃滅參主兵政晉魏墟也山河所首推之大兵將發于魏以加燕國八月癸未太白犯心前星乙酉又犯心明堂占曰有亡國近期二年十二月有流星大如甕尾長二十餘丈奔君之象比歲連兵東討至太延二年三月燕後主馮文通去國奔高麗元年四月月犯左角五月月掩斗七月月食左角皆占曰兵大起其後征西將軍金崖安定鎮將延普涇州刺史狄子玉爭權崖及子玉舉兵攻普不克據胡空谷反平西將軍陸俟討獲之三年三月丙辰金晝見在參魏邦戒也閏月戊寅金犯五諸侯占曰四滑起官兵起亂疑己丑月入井犯太白占曰兵起合戰秦邦受之七月上幸隰城詔諸軍討山胡白龍入西河九月克之伏誅者數千人而宋大將軍彭城王義康方擅威福後竟幽廢是歲二月庚午月犯畢口而出因暈昴及五車占曰貴人死五月甲子陰平王求薨太延元年五月月犯右執法九月火犯太微上將又犯左執法十月丙午月犯右執法二年二月月犯東蕃上相三月月及太白俱犯右執法及上相三年八月火犯左執法及上將五年二月木逆行犯執法皆大臣謫也元年十月左僕射安原謀反誅三年正月征東大將軍中山王纂太尉北平王長孫嵩鎮南大將軍丹陽王叔孫建皆薨其後宋大將軍義康坐徙豫章誅其黨與僕射殷景仁亦尋卒焉元年五月彗出軒轅二年正月月犯火月后妃也三年七月木犯軒轅至五年七月月掩填星並女主謫也真君元年太后竇氏殂宋氏皇后亦終或曰彗出軒轅女主有為寇者其後沮渠氏失國實公主潛啓魏師二年五月壬申有星孛于房占曰名山崩有亡國八月丁亥木入鬼守積尸十一月辛亥又犯鬼鬼秦分天戒若曰涼君淫奢無度財力窮矣將喪國身為戮焉二年正月四年十一月月皆犯井亦為秦有兵刑三年正月壬午有星晡前晝見東北在井左右色黃大如橘魏師之應也黃星出于燕墟而慕容氏滅今復見東井涼室亡乎四年四月己酉華山崩華山西鎮也天又若曰星孛于房既有徵矣鎮傾而國從之先是元年十二月金犯羽林二年十二月至四年十一月火再入之五年五月太白晝見胃昴入羽林遂犯畢畢又邊兵也六月上自將西征秋八月進圍姑臧九月丙戌沮渠牧犍帥文武將吏五千餘人面縛來降明年悉定涼地或曰星孛于房為大臣之事又饉祥也火入鬼犯軒轅又稼穡不成自元年已來將相薨尤衆至真君元年州鎮十五盡饑四年十月壬戌大流星出文昌入紫宮聲如雷天象若曰將相或以全師禦衛帝宮者其事密近有震驚之象焉明年六月帝西征詔大將軍嵇敬等帥衆二萬屯漠南以備暴寇九月蠕蠕乘虛犯塞遂至七介山京師大駭司空長孫道生等并力拒之虜乃退走是月壬午有大流星出紫微入貫索長六丈餘占曰有大君之命貫索賤人牢也明年帝命侍臣行郡國觀風俗問其所疾苦云真君二年七月壬寅填星犯鉞鎮者國家所安危而為之綱紀者也其嬰鈇鉞之戮而君及焉自元年十一月至此月歲星三犯房上相歲星為人君今反覆由之循省鈎鈐之備也天若戒輔臣曰涼邦卒滅敵國殫矣而猶挾震主之威負百勝之計盍思盈亢之戒乎是時司徒崔浩方持國鈞且有寵於上明年安西李順備五刑之誅而由浩鍛成之後八年竟族滅無後夫天哀賢良而示以明訓夙矣罕能省躬以先覺豈不悲哉浩誅之明年卒有景穆之禍後年而亂作三年三月癸未月犯太白占曰大兵起合戰九月乙丑有星孛于天牢入文昌五車經昴畢之間至天苑百餘日與宿俱入西方天象若曰且有王者之兵彗除髦頭之域矣貴臣預有戮焉明年正月征西將軍皮豹子大敗宋師于樂鄉九月上北伐樂平王丕統十五將為左軍中山王辰統十五將為右軍上自將中軍蠕蠕可汗不敢戰亡追至頓根河虜二萬餘騎而還中山王辰等八將軍坐後期皆斬或曰彗由昴畢貴人多死十一月太保盧魯元薨五年二月樂平王丕薨六年二月太白熒惑歲星聚于東井占曰三星合是為驚立絶行其國內外有兵與喪改立王公九月盧水胡蓋吳據杏城反僭署百官雜虜皆響從關內大震十一月將軍叔孫拔敗吳師于渭北至七年正月太白犯熒惑占曰兵起有大戰時上討吳黨於河東屠之遂幸長安二月吳軍敗績于杏城棄馬遁去復收合餘燼八月乃夷之五年五月月犯心六年四月又如之占曰兵犯宋邦是月太白入軒轅占曰有反臣是冬宋太子詹事范曄謀反誅詔高涼王那徇淮泗徙其人河北焉九年正月火水皆入羽林占曰禁兵大起四月太白晝見經天十年五月彗星出于昴北此天所以滌除天街而禍髦頭之國也時間歲討蠕蠕是秋九月上復自將征之所捕虜凡百餘萬矣是歲七月太白犯哭星占曰天子有哭泣事明年春皇子真薨十年十月辛巳彗星見于太微占曰兵喪並興國亂易政臣賊主至十一年正月甲子太白晝見經天四月又如之占曰中歲而再干明兵事尤大且革人更王之應也是歲十月甲辰熒惑入太微十二月辛未又犯之癸卯又如之占曰臣將戮主君將惡之仍犯事荐也先是八年正月庚午月犯心大星九年正月犯歲星是歲九月太白又犯歲星至正平元年五月彗星見卷舌入太微卷舌讒言之戒六月辛酉彗星進逼帝坐七月乙酉犯上相拂屏出端門滅于翼軫辛酉直陰國翼軫為楚邦于屏者蕭牆之亂也天象若曰夫膚受之譖實為亂階卒至芟夷主相而專其大號雖南國之君由遷及焉先是去年十月上南征絶河十二月六師涉淮登瓜步山觀兵騎士六十萬列屯三千餘里宋人凶懼饋百牢焉是年正月盡舉淮南地俘之以歸所夷滅甚衆六月帝納宗愛之言皇太子以強死明年二月愛殺帝于永安宮左僕射蘭延等以建議不同見殺愛立吳王余為主尋又賊之荐災之驗也間歲宋太子劭坐蠱事泄亦殺其君而僭立劭弟武陵王駿以上流之師討平之滅於翼軫之徵也先是七年八月月犯熒惑八月至十一月又犯軒轅是歲正月太白經天九月火犯太微十月宗愛等伏誅高宗踐阼至十一月録尚書元壽尚書令長孫渴侯以爭權賜死太尉黎司徒弼又忤旨左遷孛于屏相之應出明年五月太后崩高宗興安二年二月有星孛于西方占曰凡孛者非常惡氣所生也內不有大亂外且有大兵至興光元年二月有流星大如月西行占曰奔星所墜其野有兵光盛者事大先是京兆王杜元寶建康王崇濟南王麗濮陽王閭文若永昌王仁相次謀反伏誅是歲宋南郡王義宣及魯爽臧質以荊豫之師構逆大將王玄謨等西討盡夷之或曰彗加太微翼軫之餘禍也春秋星之大變或災連三國之君其流炎之所及二十餘年而後弭至是彗干天庭二太子首亂三君為戮侯王辜死者幾數十人由此言之皇天疾威之誡不可不惕也太安元年六月辛酉有星起河鼓東流有尾跡光明燭地河鼓為履險之兵負海之象也昭盛為人君之事星之所往君且從之間二歲帝幸遼西登碣石以臨滄海復所過郡國一年又尾迹之徵是歲五月火入斗斗主形命之養其後三吳荐饑仍歲疾疫三年夏四月熒惑犯太白占曰是謂相鑠不可舉事用兵成師以出而禍其雄之象也明年宋將殷孝祖侵魏南鄙詔征南將軍皮豹子擊之宋軍大敗或曰金火合主喪事明年十月金又犯哭星十二月征東將軍中山王託真薨三年十一月熒惑犯房鈎鈐星是謂強臣不御王者憂之至四年正月月入太微犯西蕃三月又犯五諸侯占曰諸侯大臣有謀反伏誅者是月太白犯房月入南斗皆宋分占曰國有變臣為亂十一月長星出於奎色白蛇行有尾跡既滅變為白雲奎為徐方又魯分也占曰下有流血積骨明年宋兗州刺史竟陵王誕據廣陵作亂宋主親戎自夏涉秋無日不戰及城陷悉屠之四年八月熒惑守畢直徼垣之南占曰歲饉至五年二月又入東井占曰旱兵飢疫大臣當之六月太白犯鉞占曰兵起更正朔是歲二月司空伊戨薨十二月六鎮雲中高平雍秦饑旱明年改年為和平至六月諸將討吐谷渾什寅遂絶河窮躡之會軍大疫乃還是歲三月流星數萬西行占曰小流星百數四面行者庶人遷之象既而吐谷渾舉國西遁大軍又隨躡之四年九月月犯軒轅十二月犯氐至五年正月月掩軒轅又掩氐東南星皆后妃之府也和平元年正月丁未歲犯鬼鬼為死喪歲星人君也是為君有喪事三月月掩軒轅四月戊戌皇太后崩於壽安宮宋志云人間宣言人主帷箔不修故謫見軒轅又五年十一月月犯左執法明年十一月又犯之占曰大臣有憂和平二年征東將軍河東王閭毗薨十月廣平王洛侯薨和平元年十月有長星出於天倉長丈餘饉祥也二年三月熒惑入鬼是謂稼穡不成且曰萬人相食其後定相阻飢宥其田租時三吳亦仍歲凶旱死者十二三先是元年四月太白犯東井井鬼皆秦分雍州有兵亂自元年六月月犯心大星三犯前後于房心宋分時宋君虐其諸弟後宮多喪子女繼夭哭泣之聲相再是歲詔諸將討雍州叛氐大破之宋雍州刺史海陵王休茂亦稱兵作亂間歲而宋主殂嗣子淫昏政刑紊焉先是元年十月太白入氐占曰兵起後宮有白衣會三年五月歲星犯上將占曰上將憂之三年八月月犯哭星皆宋祥也是歲樂良王萬壽及征東大將軍常山王素並薨二年三月辛巳有長星出天津色赤長匹餘滅而復出大小百數天津帝之都船所以渡神通四方光大且衆為人君之事天象若曰是將有千乘萬騎之舉而絶逾大川矣是月發卒五千餘通河西獵道後年八月帝校獵于河西宋主亦大閲舟師巡狩江右云二年九月太白犯南斗斗吳分占曰君死更政大臣有誅者十一月太白犯填填女君也且曰有內兵白衣會至三年九月火犯積尸占曰貴人憂之斧鉞用十月太白犯歲星歲為人君而以兵喪干之且有死君篡殺之禍是月熒惑守軒轅占曰女主憂之宮中兵亂十一月歲入氐氐為正寢歲為有國之君占曰諸侯王有來入宮者五年二月月入南斗魁中犯第四星占曰大人憂太子傷宮中有自賊者又大赦既而宋孝武及宋后相繼崩殂少主荐誅輔臣釁連戚屬羣下相與殺之而立宋明帝江南大饑且仍有肆眚之令焉先是三年六月太白犯東井七月火入井四年五月金火皆犯上相五年六月火又入井占曰大臣憂斧鉞用六年七月月犯心前星是月宋殺少主其後有乙渾之難五年七月丁未歲星守心心為明堂歲為諸侯為長子入而守之立君之象占曰凡五星守心皆為宮中亂賊羣下有謀立天子者七月己酉有流星長丈餘入紫微經北辰第三星而滅占曰有大喪九月丁酉火入軒轅十一月長星出織女色正白彗之象也女主專制將由此始是以天視由之長星彗之著易政之漸焉冬熒惑入太微犯上將十二月遂守之占曰公侯謀上且有斬臣六年正月乙未有流星長丈餘自五車抵紫宮西蕃乃滅天象若曰羣臣或修霸刑而干蕃輔之任矣且占曰政亂有奇令四月太白犯五諸侯占曰有專殺諸侯者五月癸卯上崩于太華殿車騎大將軍乙渾矯詔殺尚書楊寶年等于禁中戊申又害司徒平原王陸麗明年皇太后定策誅之太后臨朝自馮氏始也或曰心為宋分是歲六月歲星晝見于南斗斗為天祿吳分也天象若曰或以諸侯干君而代奪之是冬宋明帝以皇弟踐阼孝武諸子舉兵攻之四方響應尋皆伏誅有太白之刑與歲星之祐焉是歲三月有流星西行不可勝數至明乃止至六月己卯又有流星多西南行星衆而小庶人象也星之所首人將從之及宋討孝武諸子大兵首自尋陽進平荊雍其後張永之師敗績于呂梁魏師盡舉淮右俘其人又西流之效也顯祖天安元年正月戊子太白犯歲星歲農事也肅殺干之是為稼穡不登六月熒惑犯鬼占曰旱饑疾疫金革用八月丁亥太白犯房占曰霜雨失節馬牛多死九月甲寅熒惑犯上將太白犯南斗第三星占曰貴人將相有誅者十一月己酉太白又犯歲星或曰歲為諸侯太白主兵刑之政再干之事洊也是歲九月州鎮十一旱饑十月宋氏六王皆戮死明年宋師敗于呂梁江南阻饑牛且大疫其後東平王道符擅殺副將及雍州刺史據長安反詔司空和其奴討滅之九月詔賜六鎮孤貧布帛宋主以後宮服御賜征北將士後歲夏旱河決州鎮二十七皆饑尋又天下大疫元年六月太白犯左執法十月火又犯之占曰大臣有憂霸者之刑用是歲六月月犯井十月又掩之皇興元年正月月犯井北轅第二星八月又蝕之占曰貴人當之有將死水旱祥也道符作亂之明年司空和其奴太宰李峻皆薨皇興元年四月太白犯鎮星占曰有攻城略地之事六月壬寅太白犯鬼秦分也二年正月太白犯熒惑占曰大兵起是時鎮南大將軍尉元征南大將軍慕容白曜略定淮泗明年徐州羣盜作亂元又討平之後歲正月上黨王觀西征吐谷渾又大破之二年九月癸卯火犯太微上將占曰上將誅先是元年六月熒惑犯氐是歲十一月太白又犯之是為內宮有憂逼之象占曰天子失其宮四年十月誅濟南王慕容白曜明年上迫於太后傳位太子是為孝文帝宋志以為先是比年月頻犯左角占曰天子筂之及上遜位而宋明帝亦殂高祖延興元年十月庚子月入畢口畢魏分占曰小人罔上大人易位國有拘主反臣十二月辛卯火犯鈎鈐鈎鈐以統天駟火為內亂天象若曰人君失馭或以亂政乘之矣乙巳鎮星犯井夫井者天下之平也而女君以干之是為后竊刑柄占曰天下無主大人憂之有過賞之事焉二年正月月犯畢丙子月犯東井庚子又如之占曰天下有變令貴人多死者三年八月月犯太微又羣陰不制之象也是時馮太后宣淫于朝昵近小人而附益之所費以巨萬億計天子徒尸位而已二年九月河間王閭虎皮以貪殘賜死其後司空東平郡王陸麗坐事廢為兵既而宮車晏駕或曰月入畢口為赦令二年正月曲赦京師及秦涼諸鎮星及月犯井皆為水災且旱祥也是歲九月州鎮十一水旱詔免其田租開倉賑乏四年九月己卯月犯畢七月丙申太白犯歲星在角丁卯太白又入氐太白有母后之幾主兵喪之政以干君於外朝而及其宿宮是將有劫殺之虞矣二月癸丑月犯軒轅甲寅又犯歲星月為強大之臣為主女之象始由后妃之府而干少陽之君示人主以戒敬之備也五年三月甲戌月掩填星天象若曰是又僻行不制而棄其紀綱矣且占曰貴人強死天下亂三月癸未金火皆入羽林占曰臣欲賊主諸侯之兵盡發八月乙亥月掩畢十一月月入軒轅食第二星至承明元年四月月食尾五月己亥金火皆入軒轅庚子相逼同光皆后妃之謫也天若言曰母后之釁幾貫盈矣人君忘祖考之業慕匹夫之孝其如宗祀何是時獻文不悟至六月暴崩實有鴆毒之禍焉由是言之皇天有以覩履霜之萌而為之成象久矣其後文明皇太后崩孝文皇帝方修諒陰之儀篤孺子之慕竟未能述宣春秋之義而懲供人之黨是以胡氏循之卒傾魏室豈不哀哉或曰太白犯歲於天門以臣伐君之象金火同光又兵亂之徵時宋主昏狂公侯近戚寃死相繼既而桂陽建平王並稱兵內侮矢及宮闕僅乃戡之尋為左右楊玉夫等所殺或曰月犯歲鎮金火入軒轅皆饉祥也月掩畢主邊兵四年州鎮十三饑又比歲蝗旱太和元年雲中又饑開倉賑之先是四年四月丙午有大星西流殷殷有聲十一月辛未又如之是歲五月宋桂陽王反于江州間歲沈攸之反于江陵皆為大兵西伐時以江南內攜又詔五將伐蜀太和元年五月庚子太白犯熒惑在張南國之次也占曰其國兵喪並興有軍大戰人主死壬申水土合于翼皆入太微主令不行之象也占曰女主持政大夫執綱國且內亂羣臣相殺九月丁亥太白晝見經天光色尤盛更姓之祥也二年九月火犯鬼占曰主以淫泆失政相死之三年三月月犯心心為天王又宋分三月填星逆行入太微留左掖門內占曰土守南宮必有破國易代逆行者事逆也自元年三月至二年六月月行五犯太微與劉氏篡晉同占又自元年八月至三年五月月行六犯南斗入魁中斗為大人壽命且吳分是時馮太后專政而宋將蕭道成亦擅威福之權方圖劉氏宋司徒袁粲起兵石頭沈攸之起兵江陵將誅之不克皆為所殺三年四月竟篡其君而自立是為齊帝是年五月又害宋君于丹陽宮又元年十月月犯昴為刑獄事二年六月月犯房占曰貴人有誅者或曰月犯斗亦大臣之謫也其後李惠伏誅宜都長樂王並賜死又元年二月壬戌月在井暈參畢兩河五車占曰大赦至八月大赦天下三年正月壬子又暈觜參昴畢五車東井至十月大赦天下三年自五月至十二月月三入斗魁中四年五月庚戌七月己巳又如之六年二月又犯斗魁第二星占曰其國大人憂不出三年七月丁未十月丙申月再犯心大星自四年正月至六年二月又五干之斗為爵祿之柄心為布政之宮月行干而之亦以荐矣其占曰月犯心亂臣在側有亡君之戒人主以善事除殃是時馮太后將危少主者數矣帝春秋方富而承事孝敬動無違禮故竟得無咎至六年三月而齊主殂焉或曰月犯斗其國兵憂心又豫州也時比歲連兵南討五年二月大破齊師于淮陽又擊齊下蔡軍大敗之先是三年八月金犯軒轅四年二月又犯軒轅第二星六年正月又犯軒轅大星八月又犯軒轅左角左角后宗也是時太后淫亂而幽后之姪娣又將薄德天若言曰是無周南之風不足訓也故月太白驟于之三年九月庚子太白犯左執法十二月丙戌月犯之四年二月辛巳月又犯之九月壬戌太白又犯之五年二月癸卯月犯太微西蕃上將至六年十月乙酉熒惑又犯之夫南宮執法所以糾淫忒成肅雍而上將朝庭之輔也天象若曰王化將薥淫風幾興固不足以令天下矣而廷臣莫之糾弼安用之文明太后雖獨厚幸臣而公卿坐受榮賜者費亦巨億蓋近乎素餐焉其三年九月安樂王長樂下獄死隴西王源賀薨四年正月廣川王略薨襄城王韓頽徙邊七月頓丘王李鍾葵賜死其後任城王雲中山王睿又薨比年死黜相繼蓋天謫存焉四年春月又掩火亦大臣死黜之祥也又比年月再犯昴亦為獄事與白衣之會也五年九月辛巳填犯辰星于軫占曰為饑為內亂且有壅川溢水之變是歲京師大霖雨州鎮十二饑至六年七月丙申又大流星起東壁光明燭地尾長二丈餘東壁土功之政也是月發卒五萬通靈丘道十月己酉有流星入翼尾長五丈餘七星中州之羽儀翼南國也天象若曰將擇文明之士使于楚邦焉明年員外散騎常侍李彪使齊始通二國之好焉四年正月丁未月在畢暈參井五車赦祥也四月幸廷尉獄録囚徒明年二月大赦是月月在翼有偏日暈侵五車東井軒轅北河鬼至北斗紫垣攝提六年正月癸亥月在畢暈參兩肩五車胃昴畢至甲戌天下大赦江南嗣君即位亦大赦改元七年六月庚午辰時東北有流星一大如太白北流破為三段十月己亥星隕如虹是時太后專朝且多外嬖雖天子由倚附之故有干明之謫焉破而為三席勢者衆也昔春秋星隕如雨而羣陰起霸其後漢成帝時旰日晦冥衆星行隕耀耀如雨而王氏之禍萌至是天妖復見又與元后同符矣十年八月辰時有星落如流火三道戊寅又有流星出日西南一丈所西北流大如太白至午西破為二段尾長五尺復分為二入雲間仍見者事荐也後代其踵而行之以至於分崩離析乎先是七年十月有客星大如斗在參東似孛占曰大臣有執主之命者且歲旱糴貴十年九月熒惑犯歲星歲主農事火星以亂氣干之五稼旱傷之象也占曰元陽以饉人不安自八年至十一年黎人阻饑且仍歲災旱八年正月辛巳月在畢暈井歲星觜參五車占曰有赦糴貴其年六月大赦冬州鎮十五水旱人饑九年正月月在參暈觜參兩肩五車為大赦為水戊申月犯井為水祥也是歲冀定數州大水人有鬻男女者京師及州鎮十三水旱傷稼明年大赦十一年三月丁亥火土合于南斗填為履霜之漸斗為經始之謀而天視由之所以為大人之戒也占曰其國內亂不可舉事用兵是時齊主持諸侯王酷甚雖酒食之饋猶裁之有司故天若言曰非所以保根固本以貽長代之謀也內亂由是興焉五月丁酉太白經天晝見庚子遂犯畢畢又邊兵也是歲蠕蠕寇邊明年齊將陳達伐我南鄙陷澧陽間歲而齊君子子響為有司所御遂憤怒而反伏誅及齊主殂而西昌侯篡之高武子孫所在布皆拱手就戮亦齊君自為之焉十一年六月乙丑月犯斗丙寅遂犯建星亦圖始之謀也十二年七月月犯牛十三年六月又掩之明年八月又犯之牛主吳分占曰國有憂大將戮亦江南兵饉之徵也七月癸丑太白犯軒轅大星八月甲寅又犯之皆女君之謫也天象若曰軒轅以母萬物由后妃之母兆人也是固多穢復將安用之其物類之感又稼穡之不滋候也是歲年穀不登聽人出關就食明年州鎮十五皆大饑詔開倉賑乏間歲太后崩是歲月三入井金又犯之占曰陰陽不和不為水患且大旱其後連年亢陽而吳中比歲霖雨傷稼也十二年三月甲申歲星逆行入氐甲申皆齊分也占曰諸侯王而升為天子者逆行者其事逆也先是去年十月歲辰太白合于氐是謂驚立絶行改立王公是歲四月月犯氐與歲同舍六月丁巳月又入氐犯歲星月為強大之臣歲為少君也與歲同心內宮而干犯之強宗擅命逼奪其君之象也再干之其事荐至十三年三月庚申月犯歲十五年六月又犯之歲星不在宿宮是為強侯之譴江南太子賢王相次薨歿既而齊武帝殂太孫幼沖西昌輔政竟殺二君而篡之月再犯于氐及逆行之效也或曰月犯木饑祥也時比歲稼穡不登又十二年正月戊戌月犯左角十一月丙寅又如之七月金又犯左角角為外朝且兵政也占曰不出三年天下有兵主子死大君惡之至十四年有子響誅間歲而齊室亂十二年四月癸丑月火金會于井辛酉金犯火甲戌火水又俱入井皆雨暘失節萬物不成候也且曰王業將易諸侯貴人多死是歲月行四入氐十月辰星入之閏月丁丑火犯氐乙卯又入之占曰大旱歲荒人且相食國易政君失宮遠期五年氐又女君之府也是歲兩雍及豫州旱饑明年州鎮十五大饉至十四年太后崩時江南北連歲災雨至十七年有劫殺之禍誅死相踵焉是歲月三犯房十三年四月又犯之七月至十月再犯鍵閉占曰有亂臣不出三年伐其主自十二年七月至十四年八月月再犯牛又再掩之凡六犯牛且掩之牛為吳越饉祥也畢魏分且曰貴人多死免者十二年九月司徒淮南王他薨十三年光州人王泰反章武汝陰南安三王皆坐贓廢安豐王猛司空荀頽並薨十四年地豆于及庫莫奚頻犯塞京兆王廢為庶人
