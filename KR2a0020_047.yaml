body:
  text: 魏書卷四十二列傳第三十薛辨寇讚酈範韓秀堯暄薛辨字允白其先自蜀徙於河東之汾陰因家焉祖陶與薛祖薛落等分統部衆故世號三薛父強復代領部落而祖落子孫微劣強遂總攝三營善綏撫為民所歸歷石虎苻堅常憑河自固仕姚興為鎮東將軍入為尚書強卒辨復襲統其營為興尚書郎建威將軍河北太守辨稍驕傲頗失民心劉裕平姚泓辨舉營降裕司馬德宗拜為寧朔將軍平陽太守及裕失長安辨來歸國仍立功於河際太宗授平西將軍雍州刺史賜爵汾陰侯泰常七年卒於位年四十四子謹字法順容貌魁偉頗覽史傳劉裕擒泓辟相府行參軍隨裕渡江尋轉記室參軍辨將歸國密使報謹遂自彭城來奔朝廷嘉之授河東太守後襲爵平西將軍汾陰侯謹所治與屈丐連接結士抗敵甚有威惠始光中世祖詔奚斤討赫連昌敕謹領偏師前鋒鄉導既克蒲坂世祖以新舊之民并為一郡謹仍為太守遷秦州刺史將軍如故山胡白龍憑險作逆世祖詔鎮南將軍奚眷與謹自太平北入討平之除安西將軍涪陵公刺史如故太延初征吐沒骨平之謹自郡遷州威惠兼備風化大行時兵荒之後儒雅道息謹命立庠教以詩書三農之暇悉令受業躬巡邑里親加考試於是河汾之地儒道興焉真君元年徵還京師除內都坐大官五年為都將從駕北討以後期與中山王辰等斬於都南時年四十四尋贈鎮西將軍秦雍二州刺史諡曰元公長子初古拔一曰車輅拔本名洪祚世祖賜名沉毅有器識年始弱冠司徒崔浩見而奇之真君中蓋吳擾動關右薛永宗屯據河側世祖親討之乃詔拔糾合宗鄉壁於河際斷二寇往來之路事平除中散賜爵永康侯世祖南討以拔為都將從駕臨江而還又共陸真討反氐仇檀強免生平之皇興三年除散騎常侍尚西河長公主拜駙馬都尉其年拔族叔劉彧徐州刺史安都據城歸順敕拔詣彭城勞迎除冠軍將軍南豫州刺史延興二年除鎮西大將軍開府進爵平陽公三年拔與南兗州刺史遊明根南陽平太守許含等以治民著稱徵詣京師顯祖親自勞勉復令還州太和六年改爵為河東公八年三月詔拔入朝暴病卒年五十八贈左光祿大夫諡曰康長子胤字寧宗少有父風弱冠拜中散襲爵鎮西大將軍河東公除懸瓠鎮將蕭賾遣將寇邊詔胤為都將與穆亮等拒於淮上尋授持節義陽道都將十四年文明太后公除高祖詔諸刺史鎮將曾經近侍者皆聽赴闕胤隨例入朝屬開革五等降公為侯十七年高祖南討詔趙郡王幹司空穆亮為西道都將時幹年少未涉軍旅高祖乃除胤假節假平南將軍為幹副軍行達裒父以蕭賾死班師又為都將共討秦州反敗支酉生擒斬之除立忠將軍河北太守郡帶山河路多盜賊有韓馬兩姓各二千餘家恃強憑險最為狡害劫掠道路侵暴鄉閭胤至郡之日即收其姦魁二十餘人一時戮之於是羣盜懾氣郡中清肅二十三年秋遇疾卒於郡時年四十四諡曰敬子裔字豫孫襲爵性豪爽盛營園宅賓客聲伎以恣嬉遊歷尚書左外兵郎左軍將軍遷征虜將軍中散大夫出為洛州刺史卒贈平西將軍岐州刺史子孝紳襲爵稍遷前將軍太中大夫孝紳立行險薄坐事為河南尹元世俊所劾死後贈征西將軍華州刺史胤弟字崇業廣平王懷郎中令汝陰太守子修仁司空行參軍修仁弟玄景陳留太守拔弟洪隆字菩提解褐陽平王國常侍稍遷河東太守長子驎駒好讀書舉秀才除中書博士太和九年蕭賾使至乃詔驎駒兼主客郎以接之十年秋遇疾卒時年三十五贈寧朔將軍河東太守諡曰宣長子慶之字慶集頗以學業聞解褐奉朝請領侍御史遷廷尉丞廷尉寺鄰接北城曾夏日於寺傍執得一狐慶之與廷尉正博陵崔纂或以城狐狡害宜速殺之或以長育之月宜待秋分二卿裴廷俊袁翻互有同異雖曰戲謔詞義可觀事傳於世轉尚書郎兼尚書左丞為并肆行臺賜爵龍丘子行并州事遷征虜將軍滄州刺史為葛榮攻圍城陷尋患卒後贈右將軍華州刺史慶之弟英集性通率隨舅李崇在揚州積年以軍功歷司徒鎧曹參軍稍遷治書侍御史通直散騎常侍卒驎駒弟鳳子自徙都洛邑鳳子兄弟移屬華州河西郡焉太和二年為太子詹事丞本州中正世宗登阼轉太尉府鎧曹參軍稍遷治書侍御史正始初為持節征義陽軍司還京其年秋卒時年四十九贈陵江將軍光城太守鳳子弟驥奴州主簿洪隆弟破胡州治中別駕稍遷河東太守征仇池都將有六子長子聰字延智有世譽纍遷治書侍御史直閣將軍為高祖所知世宗踐阼除輔國將軍齊州刺史卒於州贈征虜將軍華州刺史長子景茂司州記室從事猗氏令早卒景茂弟孝通頗有文學永安中中尉高道穆引為御史歷中書舍人中書侍郎常山太守遇惡疾而卒聰弟道智尚書郎卒子長瑜天平中為征東將軍洛州刺史擊賊潼關沒於陳贈都督冀定太三州諸軍事車騎將軍冀州刺史道智弟仙智郡功曹仙智弟曇賢卒於國子博士小子景淵尚書左民郎曇賢弟和字導穆解褐大將軍劉昶府行參軍轉司空長流參軍除太尉府主簿遷諫議大夫永平四年正月山賊劉龍駒擾亂夏州詔和發汾華東秦夏四州之衆討龍駒平之和因表立東夏州世宗從之又行正平潁川二郡事除通直散騎常侍蕭衍遣將張齊寇晉壽詔和兼尚書左丞為西道行臺節度都督傅豎眼諸軍大破齊軍正光初除左將軍南青州刺史卒於州年五十五贈安北將軍瀛州刺史長子元信武定末中軍將軍儀同開府長史和弟季令奉朝請破胡弟破氐為本州別駕早卒四子長子敬賢為巨鹿太守破氐弟積善為中書博士臨淮王提友子隆宗太原太守寇讚字奉國上谷人因難徙馮翊萬年父修之字延期苻堅東萊太守讚弟謙之有道術世祖敬重之故追贈修之安西將軍秦州刺史馮翊公賜命服諡曰哀公詔秦雍二州為立碑於墓又贈修之母為馮翊夫人及宗從追贈太守縣令侯子男者十六人其臨民者七郡五縣讚少以清素知名身長八尺姿容嚴嶷非禮不動苻堅僕射韋華州里高達雖年時有異以風味相待華為馮翊太守召為功曹後除襄邑令姚泓滅秦雍人千有餘家推讚為主歸順拜綏遠將軍魏郡太守其後秦雍之民來奔河南滎陽河內者戶至萬數拜讚安遠將軍南雍州刺史軹縣侯治于洛陽立雍州之郡縣以撫之由是流民繈負自遠而至參倍於前賜讚爵河南公加安南將軍領護南蠻校尉仍刺史分洛豫二州之僑郡以益之雖位高爵重而接待不倦初讚之未貴也嘗從相者唐文相文曰君額上黑子入幘位當至方伯封公及貴也文以民禮拜謁仍曰明公憶民疇昔之言乎爾日但知公當貴然不能自知得為州民也讚曰往時卿言杜瓊不得官長人咸謂不然及瓊被選為盩厔令卿猶言相中不見而瓊果以暴疾未拜而終昔魏舒見主人兒死自知己必至公吾常以卿言瓊之驗亦復不息此望也乃賜文衣服良馬讚在州十七年甚獲公私之譽年老表求致仕真君九年卒年八十六遺令薄葬斂以時服世祖悼惜之諡曰宣穆長子元寶襲爵為豫州別駕與安元年卒贈安南將軍豫州刺史子祖襲爵高祖時為安南將軍東徐州刺史卒子靈孫襲赭陽太守元寶弟虎皮有才器本縣令虎皮弟臻字仙勝年十二遭父憂居喪以孝稱輕財好士顯祖末為中川太守時馮熙為洛州刺史政號貪虐仙勝微能附之甚得其意轉弘農太守後以母老屢求解任久乃從之高祖初母憂未闋以農大盜張煩等賊害良善徵為都將與荊州刺史公孫初頭等追揃之拜振武將軍比陽鎮將有威惠之稱遷建威將軍郢州刺史及高祖南遷郢州地為王畿除弘農太守坐受納為御史所彈遂廢卒於家長子祖訓順陽太守祖訓弟治字祖禮自洛陽令稍遷鎮遠將軍東荊州刺史代下之後蠻民以刺史酈道元峻刻請治為刺史朝議以邊民宜悅乃以治代道元進號征虜將軍坐遣戍兵送道元免官治兄弟並孝友敦穆白首同居父亡雖久而猶於平生所處堂宇備設幃帳几杖以時節開堂列拜垂淚陳薦若宗廟然吉凶之事必先啓告遠出行反亦如之治世宗末遷前將軍河州刺史在任數年遇却鐵匆反又為城民詣都列其貪狀十六條會赦免久之兼廷尉卿又兼尚書畏避勢家承顏候色不能有所執據尋遷金紫光祿大夫是時蠻反於三餢治為都督追討戰沒贈持節都督雍華岐三州諸軍事衛大將軍七兵尚書雍州刺史昌平男治弟彌兼尚書郎為城陽王徽所親待永安末徽避爾朱兆脫身南走歸命於彌彌不納遣人加害時論深責之後沒關西治長子朏之字長明自直後奉朝請再遷鎮遠將軍諫議大夫仍直後建義中出除冠軍將軍東荊州刺史兼尚書為荊郢行臺代遷除征虜將軍普泰中襲爵又為東荊州刺史永熙中鎮東將軍金紫光祿大夫武定四年卒年五十八酈範字世則小名記祖范陽涿鹿人祖紹慕容寶濮陽太守太祖定中山以郡迎降授兗州監軍父嵩天水太守範世祖時給事東宮高宗踐阼追録先朝舊勳賜爵永寧男加寧遠將軍以治禮郎奉遷世祖恭宗神主於太廟進爵為子征南大將軍慕容白曜南征範為左司馬師次無鹽劉彧戍主申纂憑城拒守識者僉以攻具未周不宜便進範曰今輕軍遠襲深入敵境無宜淹留久稽機候且纂必以我軍來速不去攻守謂方城可憑弱卒可恃此天亡之時也今若外潛威形內整戎旅密厲將士出其非意可一攻而克之白曜曰一日縱敵數世之患今若舒遲民心固矣司馬之策是也遂潛軍偽退示以不攻纂果不設備於是即夜部分旦便騰城崇朝而克白曜將盡以其人為軍實範曰齊四履之地世號東秦不遠為經略恐未可定也今皇威始被民未霑澤連城有懷二之將比邑有拒守之夫宜先信義示之軌物然後民心可懷二州可定白曜曰此良策也乃免之進次肥城白曜將攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且見無鹽之卒死者塗炭成敗之機足為鑒矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰白曜目範於衆曰此行也得卿三齊不足定矣軍達升城劉彧太原太守房崇吉棄母妻東走彧青州刺史沈文秀遣其寧朔將軍張元孫奉箋歸款請軍接援白曜將遣偏師赴之範曰桑梓之戀有懷同德文秀家在江南青土無墳柏之纍擁衆數萬徑甲堅城強則拒戰勢屈則走師未逼之朝夕無患竟何所畏已求援軍且觀其使詞煩而顏愧視下而志怯幣厚言甘誘我也若不遠圖懼虧軍勢既進無所取退逼強敵羝羊觸蕃羸角之謂未若先守歷城平盤陽下梁鄒克樂陵然後方軌連鑣揚旌直進何患不壺漿路左以迎明公者哉白曜曰卿前後納策皆不失衷今日之算吾所不取何者道固孤城裁能自守盤陽諸戍勢不野戰文秀必克殄意在先誠天與不取後悔何及範曰短見猶謂不虛歷城足食足兵非一朝可拔文秀既據東陽為諸城根本多遣軍則歷城之固不立少遣衆則無以懼敵心脫文秀還叛閉門拒守偏師在前為其所挫梁鄒諸城追擊其後文秀身率大軍必相乘迫腹背受敵進退無途雖有韓白恐無全理願更思審勿入賊計中白曜乃止遂表範為青州刺史以撫新民後進爵為侯加冠軍將軍遷尚書右丞後除平東將軍青州刺史假范陽公範前解州還京也夜夢陰毛拂踝他日説之時齊人有占夢者曰史武進云豪盛於齊下矣使君臨撫東秦道光海岱必當重牧全齊再祿營丘矣範笑而答曰吾將為卿必驗此夢果如其言是時鎮將元伊利表範與外賊交通高祖詔範曰卿身非功舊位無重班所以超遷顯爵任居方夏者正以勤能致遠雖外無殊效亦未有負時之愆而鎮將伊利妄生姦撓表卿造船市玉與外賊交通規陷卿罪窺覦州任有司推驗虛實自顯有罪者今伏其辜矣卿其明為算略勿復懷疑待卿別犯處刑及鞭今恕刑罷鞭止罰五十卿宜克循綏輯邊服稱朕意也還朝年六十二卒於京師諡曰穆範五子道元在酷吏傳道元第四弟道慎字善季涉歷史傳有幹略自奉朝請遷尚書二千石郎中加威遠將軍為漢川行臺迎接降款以功除員外常侍領郎中轉輔國將軍驍騎將軍出為正平太守治有能名遷長樂相正光五年卒年三十八贈後將軍平州刺史子中字伯偉武定初司徒刑獄參軍道慎弟約字善禮起家奉朝請再遷冠軍將軍司徒咨議參軍朴質遲鈍頗愛琴書性多造請好以榮利干謁乞丐不已多為人所笑弄坎壈於世不免飢寒晚歷東萊魯郡二郡太守為政清靜吏民安之年六十三武定七年卒範弟神虎尚書左民郎中神虎弟夔子惲字幼和好學有文才尤長吏幹正光中刺史裴延俊用為主簿令其修起學校又舉秀才射策高第為奉朝請後延俊為討胡行臺尚書引為行臺郎以招撫有稱除尚書外兵郎仍行臺郎及延俊解還行臺長孫稚又引為行臺郎加征虜將軍惲頗兼武用常以功名自許每進計於稚多見納用以功賞魏昌縣開國子邑三百戶惲在軍啓求減身官爵為父請贈詔贈夔征虜將軍安州刺史惲後與唐州刺史崔元珍固守平陽武泰中爾朱榮稱兵赴洛惲與元珍不從其命為榮行臺郎中樊子鵠所攻城陷被害時年三十六世咸痛惜之所作文章頗行於世撰慕容氏書不成子懷則武定末司空長流參軍夔弟神期中書博士神期弟顯度司州秀才尚書庫部郎韓秀字白虎昌黎人也祖宰慕容俊謁者僕射父昞皇始初歸國拜宣威將軍騎都尉秀歷吏任稍遷尚書郎賜爵遂昌子拜廣武將軍高宗稱秀聰敏清辨才任喉舌遂命出納王言并掌機密行幸遊獵隨侍左右顯祖踐阼轉給事中參征南慕容白曜軍事延興中尚書奏以敦煌一鎮介遠西北寇賊路衝慮或不固欲移就涼州羣官會議僉以為然秀獨謂非便曰此蹙國之事非闢土之宜愚謂敦煌之立其來已久雖土鄰強寇而兵人素習縱有姦竊不能為害循常置戍足以自全進斷北狄之覘途退塞西夷之窺路若徙就姑臧慮人懷異意或貪留重遷情不願徙脫引寇內侵深為國患且敦煌去涼州及千餘里捨遠就近遙防有闕一旦廢罷是啓戎心則夷狄交構互相來往恐醜徒協契侵竊涼土及近諸戍則關右荒擾烽警不息邊役煩興艱難方甚乃從秀議太和初遷內侍長後為平東將軍青州刺史假漁陽公在州數年卒子務襲爵務字道世性端謹有治幹初為中散稍遷太子翊軍校尉時高祖南征行梁州刺史楊靈珍謀叛以務為統軍受都督李崇節度以討靈珍有戰功授後軍長史徵赴行在所還遷長水校尉景明初假節行肆州事轉左中郎將寧朔將軍試守常山郡又為征蠻都督李崇司馬崇揃蕩羣蠻除近畿之患務有力焉後除鎮北府司馬初試守常山府解復為平北長史務頗有受納為御史中尉李平所劾付廷尉會赦免後除龍驤將軍郢州刺史務獻七寶牀象牙席詔曰晉武帝焚雉頭裘朕常嘉之今務所獻亦此之流也奇麗之物有乖風素可付其家人邊人李旻馬道進等許殺蕭衍黃坂戍主率戶來降務信之遣兵千餘人迎接戶既不至而詐表破賊坐以免官久之拜冠軍將軍太中大夫進號左將軍神龜初卒堯暄字辟邪上黨長子人也本名鍾葵後賜為暄祖僧賴太祖平中山與趙郡呂舍首來歸國暄聰了美容貌為千人軍將東宮吏高宗以其恭謹擢為中散奉使齊州檢平原鎮將及長史貪暴事推情診理皆得其實除太尉中給事兼北部曹事後轉南部太和中遷南部尚書于時始立三長暄為東道十三州使更比戶籍賜獨車一乘馬四匹時蕭賾遣其將陳顯達寇邊以暄為使持節假中護軍都督南征諸軍事平陽公軍次許昌會陳顯達遁走暄乃班師暄前後從征及出使檢察三十餘許度皆有克己奉公之稱賞賜衣服二十具綵絹十匹細絹千餘段奴婢十口賜爵平陽伯及改置百官授太僕卿車駕南征加安南將軍轉大司農卿太和十九年卒於平城高祖為之舉哀贈安北將軍相州刺史賻帛七百匹初暄使徐州見州城樓觀嫌其華盛乃令往往毀撤由是後更損落及高祖幸彭城聞之曰暄猶可追斬暄長子洪襲爵鎮北府録事參軍子桀字永壽元象中開府儀同三司樂城縣開國公洪弟遵伏波將軍河州冠軍府長史臨洮太守卒贈龍驤將軍諡曰思遵弟榮員外散騎侍郎子雄字休武元象中儀同三司豫州刺史城平縣開國公雄弟奮字彥舉興和中驃騎將軍潁州刺史奮弟難宗武定中征西將軍南岐州刺史征羌縣開國伯呂舍既歸國從至京師給賜田宅子方生機識明辨卒於主書郎贈建武將軍定州刺史高邑子諡曰敬子受恩為侍御中散典宜官曹纍遷外都曹令轉北部給事秦州刺史卒於官史臣曰薛辨寇讚歸身有道並以款效見嘉議敦煌得馭遠之算務武夫鄙詐貢牀飾寶棄而不御斯乃人主之盛德堯暄聰察奉公以致名位禮加存歿有餘榮矣
