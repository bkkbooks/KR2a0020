body:
  text: 魏書卷一百五之一天象志一之一第一夫在天成象聖人是觀日月五星象之著者變常舛度徵咎隨焉然則明晦暈蝕疾餘犯守飛流欻起彗孛不或皇靈降臨示譴以戒下或王化有虧感達於天路易稱天垂象見吉凶觀乎天文以察時變書曰曆象日月星辰敬授民時是故有國有家者之所祗畏也百王興廢之驗萬國禍福之來兆勤雖微罔不必至著於前載不可得而備舉也班史以日暈五星之屬列天文志薄蝕彗孛之比入五行說七曜一也而分為二志故陸機云學者所疑也今以在天諸異咸入天象其應徵符合隨而條載無所顯驗則闕之云太祖天興五年八月天鳴六年九月天鳴皇始二年十月壬辰日暈有佩璚占曰兵起天興元年九月烏丸張超收合亡命聚黨三千餘家據勃海之南皮自號征東大將軍烏丸王鈔掠諸郡詔將軍庾嶽討之天興三年六月庚辰朔日有蝕之占曰外國侵土地分五年五月姚興遣其弟義陽公平率衆四萬來侵平陽乾壁為平所陷六年四月癸巳朔日有蝕之占曰兵稍出十月太祖詔將軍伊謂率騎二萬北襲高車大破之天賜五年七月戊戌朔日有蝕之占曰后死六年七月夫人劉氏薨後諡為宣穆皇后太宗神瑞二年八月庚辰晦日有蝕之世祖始光四年六月癸卯朔日有蝕之占曰諸侯非其人神元年二月司空奚斤監軍侍御史安頡討赫連昌擒之於安定其餘衆立昌弟定為主走還平涼斤追之為定所擒將軍丘堆棄甲與守將高涼王禮東走蒲坂世祖怒斬堆神元年十一月乙未朔日有蝕之太延元年正月己未朔日有蝕之四年十一月丁卯朔日有蝕之太平真君元年四月戊午朔日有蝕之三年八月甲戌晦日有蝕之六年六月戊子朔日有蝕之占曰有九族夷滅七年正月戊辰世祖車駕次東雍州庚午圍薛永宗營壘永宗出戰大敗六軍乘之永宗衆潰斬永宗男女無少長皆赴汾水而死七年六月癸未朔日有蝕之占曰不臣欲殺八年三月河西王沮渠牧犍謀反伏誅十年夏四月丙申朔日有蝕之六月庚寅朔日有蝕之占曰將相誅十一年六月己亥誅司徒崔浩十一年十二月辛未日南北有珥高宗興安元年十一月己卯日出赤如血二年三月日暈興光元年七月丙申朔日有蝕之和平元年九月庚申朔日有蝕之三年二月壬子朔日有蝕之占曰有白衣之會六年五月癸卯高宗崩顯祖皇興元年十月己卯朔日有蝕之二年四月丙子朔日有蝕之占曰將誅四年十月誅濟南王慕容白曜十月癸酉朔日有蝕之占曰尊后有憂三年夫人李氏薨後諡思皇后三年十月丁酉朔日有蝕之高祖延興元年十二月癸卯日有蝕之占曰有兵二年正月乙卯統萬鎮胡民相率北叛遣寧南將軍交址公韓拔等滅之三年十二月癸卯朔日有蝕之四年正月癸酉朔日有蝕之占曰有崩主天下改服有大臣死五年十二月己丑征北大將軍城陽王壽薨六年六月辛未顯祖崩七月丙寅日有背珥五年正月丁酉白虹貫日直珥一承明元年三月辛卯日暈五重有二珥太和元年冬十月辛亥朔日有蝕之二年正月辛亥日暈東西有珥二月乙酉晦日有蝕之占曰有欲反者近三月遠三年四年正月癸卯洮陽羌叛枹罕鎮將討平之九月乙巳朔日有蝕之占曰東邦發兵四年十月丁未蘭陵民桓富殺其縣令與昌慮桓和北連太山羣盜張和顏等聚黨保五固推司馬朗之為主詔淮陽王尉元等討之三年春正月癸丑日暈東西有珥有佩戟一重北有偃戟四重後有白氣貫日珥狀如車輪京師不見雍州以聞三月癸卯朔日有蝕之占曰大臣誅四月雍州刺史宜都王目辰有罪賜死四年正月辛酉日東西有珥北有佩日暈貫兩珥五年正月庚辰日暈東西有珥南北並白氣長一丈廣二尺許北有連環暈又貫珥內復有直氣長三丈許內黃中青外白暈乍成散乃滅七月庚申朔日有蝕之七年十二月乙巳朔日有蝕之八年正月戊寅有白氣貫日占曰近臣亂十年三月丁亥中散梁衆保等謀反伏誅十一年十一月丁亥日失色十二年三月戊戌白虹貫日十三年二月乙亥朔日十五分蝕八占曰有白衣之會十一月己未安豐王猛薨十四年二月己巳朔未時雲氣班駁日十五分蝕一占曰有白衣之會九月癸丑文明太皇太后馮氏崩十五年正月癸亥晦日有蝕之占曰王者將兵天下擾動十七年六月丙戌高祖南伐十七年六月庚辰朔日有蝕之十八年五月甲戌朔日有蝕之二十年九月庚寅晦日有蝕之二十三年六月己卯日中有黑氣占曰內有逆謀八月癸亥南徐州刺史沈陵南叛十二月甲申日中有黑氣大如桃世宗景明元年正月辛丑朔日有蝕之七月己亥朔日有蝕之二年四月癸酉日自午及未再暈內黃外白七月癸巳朔日有蝕之八月戊辰日赤無光中有黑子一三年正月乙巳日中有黑氣如鵝子申酉復見又有二黑氣橫貫日二月辛卯日中有黑氣大如鵝子七月丁巳朔日有蝕之正始元年十二月丙戌黑氣貫日壬子日有冠珥內黃外青占曰天下喜三年正月丁卯皇子生大赦天下三年二月甲辰日左右有珥內赤外黃辛亥日暈外白內黃十月乙巳日赤無光十二月乙卯日暈內黃外青東西有珥北有背巳時白虹貫日永平元年三月己酉日南北有珥外青內黃暈不匝西北有直氣長尺餘北有白虹貫日八月壬子朔日有蝕之二年八月丙午朔日有蝕之丁卯旦日旁有黑氣形如月從東南來衝日如此者一辰乃滅三年二月甲子日中有黑氣二十二月乙未日交暈中赤外黃東西有珥南北白暈貫日皆匝四年十一月癸卯日中有黑氣二大如桃占曰天子崩延昌四年正月丁巳世宗升遐十二月壬戌朔日有蝕之在牛四度占曰其國叛兵發延昌二年二月庚辰蕭衍郁洲民徐玄明等斬送衍鎮北將軍青冀二州刺史張稷首以州內附延昌元年二月甲戌至于辛巳日初出及將沒赤白無光明五月己未晦日十五分蝕九占曰大旱民流千里二年春京師民饑死者數萬口二年閏月辛亥日中有黑氣占曰內有逆謀三年十一月丁巳幽州沙門劉僧紹聚衆反自號淨居國明法王州郡捕斬之五月甲寅朔日有蝕之京師不見州以聞三年三月庚申日交暈其色內赤黃外青白南北有佩可長二丈許內赤黃外青白西有白暈貫日又日東有一抱長二丈許內赤黃外青肅宗熙平元年三月戊辰朔日有蝕之丁丑日出無光至于酉時占曰兵起神龜元年正月秦州羌反二月己酉東益州氐反七月河州民却鐵匆聚衆反自稱水池王四月甲辰卯時日暈匝西有一背內赤外黃南北有珥內赤外黃漸滅十二月己酉日暈北有一抱內赤外白兩傍有珥北有白虹貫日神龜元年三月丁丑白虹貫日占曰天下有來臣之衆不三年十一月乙酉蠕蠕莫緣梁賀侯豆率男女七百口來降二年正月辛巳朔日有蝕之正光元年正月乙亥朔日有蝕之占曰有大臣亡七月丙子殺太傅領太尉清河王懌二年五月丁酉日有蝕之夏州以聞三年正月甲寅日交暈內赤外青有白虹貫暈外有直氣長二丈許內赤外青五月壬辰朔日有蝕之占曰秦邦不臣五年六月秦州城人莫折大提據城反自稱秦王十月己巳太史奏自八月已來黃埃掩日日出三丈色赤如赭無光曜十一月己丑朔日有蝕之占曰有小兵在西北四年二月己卯蠕蠕主阿那瓌率衆犯塞四年十一月癸未朔日有蝕之五年閏月乙酉日暈內赤外青南有珥上有一抱兩背內赤外青三月丁卯日暈三重外青內赤占曰有謀其主孝昌元年正月庚申徐州刺史元法僧據城反自稱宋王十二月丙申日暈南北有珥上有兩抱一背孝昌元年十二月丙戌白虹刺日不過虹中有一背占曰有臣背其主一曰有反城三年九月己卯東豫州刺史元慶和據城南叛三年十一月戊寅辰時日暈東面不合其色內赤外黃東西有珥內赤外黃西北去暈一尺餘有一背長二丈餘廣三尺許內赤外黃莊帝永安二年三月甲戌未時日暈三重內黃赤外青白暈東西兩處不合其狀如抱五月辛酉日暈東西兩處不合辛未申時日南有珥去一尺餘有一背長三丈許廣五尺餘內赤外青七月丙寅直東去日三尺許有一背長二丈餘內赤外青半食頃從北頭漸滅至半須臾還如初見內赤外青其色分炳十月己酉朔日從地下蝕出十五分蝕七虧從西南角起占曰西夷欲殺後有大兵必西行三年四月丁卯雍州刺史爾朱天光討擒万俟醜奴蕭寶夤於安定送京師斬之三年五月戊戌辰時日暈匝內赤外白暈內有兩珥西有白虹貫日東北有一背內赤外青南有一背內赤外青東有一抱內青外赤京師不見青州表聞六月辛丑日暈白虹貫日前廢帝普泰元年三月丁亥日月並赤赭色天地溷濁六月己亥朔日蝕從西南角起雲陰不見定相二州表聞占曰主弱小人持政時爾朱世隆兄弟專擅威福後廢帝中興二年二月辛丑辰時日暈東西不合其色內赤外青南北有珥西北去暈一尺餘有一背長二丈許可廣三尺內赤外青十一月日暈再重上有背長三丈餘內青外赤出帝太昌元年五月日暈再重上有兩背一尺許癸丑午時日南有珥去日一尺餘有一背長三丈許廣五尺內赤外青十月辛酉朔日從地下蝕出虧從西南角起占曰有兵大行永熙二年正月甲午齊獻武王自晉陽出討爾朱兆丁酉大破之於赤洪嶺兆遁走自殺永熙二年四月己未朔日有蝕之在丙虧從正南起占曰君陰謀三年五月辛卯出帝為斛斯椿等諸佞關構猜於齊獻武王託討蕭衍盛暑徵發河南諸州之兵天下怪惡之語在斛斯椿傳三年四月癸丑日有蝕之占曰有亂殺天子者七月丁未出帝為斛斯椿等迫脅遂出於長安孝靜元象元年春正月辛丑朔日有蝕之占曰大臣死八月辛卯司徒公高敖曹戰歿於河陰六月己丑日暈一重有兩珥上有背長二丈餘十一月己巳辰時日暈南面不合東西有珥背有白虹至珥不徹二年二月己丑巳時日暈匝白虹貫日不徹興和二年閏月丁丑朔日有蝕之占曰有小兵七月癸巳元寶炬廣豫二州行臺趙繼宗南青州刺史崔康寇陽翟鎮將擊走之武定三年冬十一月壬申日暈兩重東南角不合西南東北有珥西北有兩重背東北西北有白氣并有兩珥中間有一白氣東西撗至珥十二月乙酉竟天微有白雲日暈東南角不合西南東北有珥西北有一背去日一尺五年正月己亥朔日有蝕之從西南角起占曰不有崩喪必有臣亡天下改服丙午齊獻武王薨三月辛丑日暈匝西北交暈貫日并有一珥一抱六年七月庚寅朔日有蝕之虧從西北角起
