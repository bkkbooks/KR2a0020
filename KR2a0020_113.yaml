body:
  text: 魏書卷一百五之二天象志一之二第二太祖皇始二年六月庚戌月掩太白在端門外占曰國受兵九月慕容賀驎率三萬餘人出寇新市十月太祖破之於義臺塢斬首九千餘級天興元年十一月丁丑月犯東上相二年五月辛酉月掩東上相八月壬辰月犯牽牛占曰國有憂三年二月丁亥皇子聰薨三年三月乙丑月犯鎮星在牽牛七月己未月犯鎮星在牽牛辛酉月犯哭星四年三月甲子月生齒占曰有賊臣五年十一月秀容胡帥前平原太守劉曜聚衆為盜遣騎誅之七月丁卯月犯天關十月甲子月犯東次相五年四月辛丑月掩辰星在東井五月丙申月犯太微七月己亥月犯歲星在左角十月戊申月暈左角時帝討姚興弟平於乾壁克之太史令朝崇奏角蟲將死上慮牛疫乃命諸軍併重焚車丙戌車駕北引牛大疫死者十八九官車所馭巨犗數百同日斃於路側首尾相屬麋鹿亦多死乙卯月犯太微占曰貴人憂六年七月鎮西大將軍司隸校尉毗陵王順有罪以王還第十二月庚申月與太白同入羽林六年正月月掩氐西南星六月甲辰月掩北斗魁第四星十月乙巳月犯軒轅第四星十一月辛巳月犯熒惑天賜元年二月甲辰月掩歲星在角占曰天下兵起三年四月蠕蠕寇邊夜召兵將旦賊走乃罷四月甲午月掩軒轅第四星占曰女主惡之六年七月夫人劉氏薨後諡宣穆皇后五月壬申月掩斗魁第二星二年三月壬辰月掩左執法丁酉月掩心前星四月己卯月犯鎮星在東壁占曰貴人死四年五月常山王遵有罪賜死七月己未月掩鎮星八月丁巳月犯斗第一星占曰大臣憂三年七月太尉穆崇薨十月丁巳月掩鎮星在營室三年二月己丑月犯心後星四月癸丑月犯太微西上將己未月犯房南第二星占曰將相有憂四年五月誅定陵公和跋五月癸未月犯左角占曰左將軍死六年三月左將軍曲陽侯元素延死十二月丙午月掩太白在危四年二月庚申月掩心後星五年五月丁未月掩斗第二星占曰大人憂六年十月戊辰太祖崩太宗永興元年二月甲子月犯昴占曰胡不安天子破胸奴二年五月太宗討蠕蠕社崘社崘遁走九月壬寅月犯昴閏月丁酉月犯昴二年三月丁卯月掩房南第二星又掩斗第五星五月甲子月掩斗第五星己亥月掩昴六月己丑月犯房南第二星七月乙亥月犯輿鬼八月甲申月犯心前星三年六月庚子月犯歲星在畢占曰有邊兵五年四月上黨民勞聰士臻羣聚為盜殺太守令長相率外奔八月乙未月犯歲星在參四年春正月壬戌月行畢蝕歲星癸亥月掩房北第二星閏月庚申月行昴犯熒惑七月月蝕熒惑八月戊申月犯泣星十月辛亥月掩天關占曰有兵五年六月濩澤民劉逸自號征東將軍三巴王署置官屬攻逼建興郡元城侯元屈等討平之五年三月戊辰月行參犯太白四月癸卯月暈翼軫角七月庚午月掩鈎鈐占曰喉舌臣憂五年三月散騎常侍王洛兒卒八月庚申月犯太白占曰憂兵神瑞元年二月赫連屈丐入寇河東殺掠吏民三城護軍張昌等要擊走之九月己丑月犯左角占曰天下有兵神瑞元年十二月蠕蠕犯塞十月乙巳月犯畢占曰貴人有死者泰常元年三月長樂王處文薨十一月丙戌月蝕房第一星十二月甲辰月三暈東井神瑞元年正月丁卯月犯畢占曰貴人有死者泰常元年四月庚申河間王修薨二月戊申月蝕房第一星三月壬申月蝕左角五月壬寅月犯牽牛南星六月丙申月掩氐七月庚辰月犯天關八月丁酉月蝕牽牛中大星己酉月犯西咸占曰有陰謀神瑞二年三月河西飢胡屯聚上黨推白亞栗斯為盟主號大單于稱建平元年四月詔將軍公孫表等五將討之二年三月丁巳月入畢占曰天下兵起泰常元年三月常山民霍季自言名載圖讖持一黑石以為天賜玉印誑惑聚黨入山為盜州郡捕斬之四月己卯月犯畢陽星七月辛丑月犯畢占曰貴人有死者泰常元年十二月南陽王良薨八月壬子月犯氐十月甲子月暈畢十一月月暈軒轅戊午月犯畢陽星泰常元年五月甲申月犯歲星在角六月己巳月犯畢占曰貴人死二年十月豫章王夔薨七月月犯牛十月丙戌月入畢占曰有邊兵二年二月司馬德宗譙王司馬文思自江東遣使詣闕上書請軍討劉裕太宗詔司徒長孫嵩率諸將邀擊之二年五月丙子月犯軒轅八月己酉月犯牽牛占曰其地有憂三年司馬德宗死丁卯月犯太微十一月癸未月犯東井南轅西頭第一星占曰諸侯貴人死一曰有水三年八月雁門河內大雨水復其租稅五年三月南陽王意文薨三年正月戊申月犯輿鬼積尸己酉月犯軒轅爟星占曰女主有憂五年六月丁卯貴嬪杜氏薨後諡密皇后四月壬申月犯鎮星在張五月癸亥月犯太白於東井七月丁巳月犯東井九月丙寅月犯熒惑在張翼十一月庚申月犯太白在斗十二月庚辰月犯熒惑於太微四年正月丙午月犯太微三月壬寅月犯太微五月丙申月犯太微占曰人君憂八年十一月太宗崩十二月丁巳月犯太白入羽林五年十一月辛亥月蝕熒惑在亢占曰韓鄭地大敗八年九月劉義符潁川太守李元德竊入許昌太宗詔交趾侯周幾擊之元德遁走六年二月己亥月蝕南斗杓星五月丙辰月暈在角亢七年正月丁卯月犯南斗占曰大臣憂三月河南王曜薨三月壬戌月犯南斗五月丙午月犯軒轅六月辛巳月犯房占曰將相有憂八年六月己亥太尉宜都公穆觀薨世祖始光元年正月壬午月犯心中央大星二年三月丙子月犯熒惑在虛十二月丁酉月犯軒轅神三年夏四月壬戌月犯軒轅六月月犯歲星四年十月丙辰月掩天關占曰有兵延和元年七月世祖討馮文通於和龍十二月月犯房鈎鈐延和元年三月月犯軒轅四月月犯左角占曰天下有兵二年二月征西將軍金崖與安定鎮將延普及涇州刺史狄子玉爭權舉兵攻普不克退保胡空谷驅掠平民據險自固世祖詔平西將軍安定鎮將陸俟討獲之五月月犯軒轅掩南斗第六星七月丙午月蝕左角三年二月庚午月犯畢口而出月暈昴五車及參占曰貴人死五月甲子陰平王求薨閏月己丑月入東井犯太白占曰憂兵七月辛巳世祖行幸隰城命諸軍討山胡白龍于西河克之太延元年五月壬子月犯右執法占曰執法有憂十月尚書左僕射安原謀反伏誅十月丙午月犯右執法二年正月庚午月犯熒惑占曰貴人死三年正月癸未征東大將軍中山王纂薨二月月犯太微東蕃第一星三月癸亥月犯太微右執法又犯上相占曰將相有免者真君二年三月庚戌新興王俊略陽王羯兒有罪並黜為公三年正月月犯東井占曰將相死戊子太尉北平王長孫嵩薨乙巳鎮南大將軍丹陽王叔孫建薨九月丙申月暈太微十一月戊戌月掩太白四年四月己卯月犯氐十一月丁未月犯東井占曰將軍死真君二年九月戊戌撫軍大將軍永昌王健薨五年六月甲午朔月見西方七月月掩鎮星真君元年十二月月犯太微二年六月壬子朔月見西方三年三月癸未月犯太白占曰憂兵四年正月征西將軍皮豹子等大破劉義隆將於樂鄉擒其將王奐之王長卿等五年五月甲辰月犯心後星六年四月月犯心占曰有亡國是月征西大將軍高涼王那討吐谷渾慕利延於陰平軍到曼頭城慕利延驅其部落西渡流沙那急追之故西秦王慕璝世子被囊逆軍距戰那擊破之慕利延遂西入于闐七年八月癸卯月犯熒惑又犯軒轅十一月月犯軒轅八年正月庚午月犯心大星九年正月月犯歲星十一年正月甲子月入羽林正平元年正月月入羽林高宗太安四年正月己未月入太微犯西蕃三月月犯五諸侯六月癸酉朔月生西方八月月入南斗九月月犯軒轅十二月月犯氐五年正月月掩軒轅又掩氐東南星六月月犯心前星十二月月犯左執法占曰大臣有憂和平二年四月侍中征東大將軍河東王閭毗薨和平元年正月丁未月入南斗三月月掩軒轅占曰女主惡之四月保皇太后常氏崩六月戊子月犯心前星十一月壬辰月犯右執法二年正月月犯心後星九月月犯心大星三年三月壬寅月犯心後星八月月犯哭星四年四月月掩軒轅女御星五年二月甲申月入南斗魁中犯第三星三月庚子月入輿鬼積尸六年七月月犯心前星九月月犯軒轅右角顯祖天安元年六月甲辰月犯東井十月癸巳月掩東井皇興元年正月丙辰月犯東井北轅東頭第三星八月辛酉月蝕東井南轅第二星占曰有將死三年正月司空平昌公和其奴薨十月癸巳月在參蝕二年四月丙辰月犯牽牛中星三年十二月乙酉月犯氐五年七月辛巳月犯東井高祖延興元年十月庚子月入畢口占曰有赦二年正月乙卯曲赦京師及河西南至秦涇西至枹罕北至涼州及諸鎮二年正月壬戌月犯畢占曰天子用法九月辛巳統萬鎮將河間王閭虎皮坐貪殘賜死閏月丙子月犯東井占曰有水是年以州鎮十一水旱免民田租開倉賑恤庚子月犯東井北轅三年八月己未月犯太微占曰將相有免者期不出三年承明元年二月司空東郡王陸定國坐事免官爵十二月戊午月蝕在七星京師不見統萬鎮以聞四年正月己卯月犯畢占曰貴人死五年十二月城陽王長壽薨二月癸丑月犯軒轅甲寅月犯歲星占曰饑太和元年正月雲中饑詔開倉賑恤九月乙卯月犯右執法占曰大臣有憂承明元年六月大司馬大將軍安成王萬安國坐矯詔殺部長奚買奴於苑中賜死五年三月甲戌月掩鎮星八月乙亥月掩畢占曰有邊兵太和元年正月秦州略陽民王元壽聚衆五千餘家自號為衝天王二月詔秦益二州刺史武都公尉洛侯討破元壽獲其妻子送京師十一月癸卯月入軒轅中蝕第三星承明元年四月甲戌月蝕尾太和元年二月壬戌月在井暈參南北河五車二星三柱熒惑三月甲午月犯太微戊辰月蝕尾下入濁氣不見五月丁亥月犯軒轅大星丙午月入太微八月庚申月入南斗犯第三星戊寅月入太微犯屏南星十月乙丑月蝕昴京師不見雍州以聞占曰貴臣誅是月誅徐州刺史李欣十二月癸卯月犯南斗二年六月庚辰月犯太微東蕃南頭第一星京師不見定州以聞甲申月犯房又犯太微八月壬午月入南斗占曰大臣誅十二月誅南郡王李惠九月庚申陰雲開合月在昴蝕十月戊戌月入南斗口中占曰大臣誅三年四月雍州刺史宜都王目辰有罪賜死十一月甲子月犯鎮星十二月戊戌月入南斗口中三年正月壬子月暈觜參兩肩五車五星畢東井占曰有赦十月大赦天下二月庚寅月犯心三月庚戌月入南斗口中占曰大臣誅九月定州刺史安樂王長樂有罪徵詣京師賜死乙卯月入南斗口中七月癸未月犯心十月月犯心十二月丙戌月犯太微左執法占曰大臣有憂四年正月襄城王韓頽有罪削爵徙邊四年正月丁未月在畢暈參兩肩五車東井丁巳月犯心占曰人伐其主五年二月沙門法秀謀反伏誅戊午月又犯心二月己卯月犯軒轅北第二星辛巳月犯太微左執法占曰大臣有憂閏月頓丘王李鍾葵有罪賜死壬午月蝕乙酉月掩熒惑五年二月癸卯月犯太微西蕃南頭第一星二月甲辰月在翼暈東南不匝須臾西北有偏白暈侵五車二星東井北河北河輿鬼柳北斗紫微宮攝提翼星戊戌月犯心京師不見濟州以聞七月戊寅月犯昴占曰有白衣之六年正月任城王雲薨六年正月癸亥月在畢暈參兩肩五車三星胃昴畢京師不見營州以聞己巳月在張犯軒轅大星辛未月蝕五月戊申月入南斗口中戊寅月犯昴七月丁卯月蝕十一月辛亥朔月寅見東方京師不見平州以聞七年五月辛卯月犯南斗八年正月辛巳月在畢暈東井歲星觜參兩肩五車三月己丑月犯心四月丁亥月蝕斗癸亥月