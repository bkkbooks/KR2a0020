body:
  text: 魏書卷五十二列傳第四十趙逸胡方回胡叟宋繇張湛宗欽段承根闞駰劉昞趙柔索敞陰仲達趙逸字思羣天水人也十世祖融漢光祿大夫父昌石勒黃門郎逸好學夙成仕姚興歷中書侍郎為興將齊難軍司征赫連屈丐難敗為屈丐所虜拜著作郎世祖平統萬見逸所著曰此豎無道安得為此言乎作者誰也其速推之司徒崔浩進曰彼之謬述亦猶子雲之美新皇王之道固宜容之世祖乃止拜中書侍郎神三年三月上巳帝幸白虎殿命百僚賦詩逸製詩序時稱為善久之拜寧朔將軍赤城鎮將綏和荒服十有餘年百姓安之頻表乞免久乃見許性好墳素白首彌勤年踰七十手不釋卷凡所著述詩賦銘頌五十餘篇逸兄溫字思恭博學有高名姚泓天水太守劉裕滅泓遂沒於氐氐王楊盛盛子難當既有漢中以溫為輔國將軍秦梁二州刺史及難當稱蕃世祖以溫為難當府司馬卒于仇池長子廣夏中書博士第三子琰語在孝感傳初姚萇以逸伯父遷為尚書左僕射卒于長安劉裕滅姚泓徙遷子孫於建業遷玄孫翼翼從子超宗令勝遐叔隆穆等太和景明中相尋歸降翼粗涉書傳通率有器藝初為平昌太守甚有治稱入歷軍校加鎮遠將軍長史深為領軍元叉所知待遷光祿大夫卒贈左將軍齊州刺史超宗身長八尺頗有將略太和末為豫州平南府長史帶汝南太守加建威將軍賜爵尋陽伯入為驍騎將軍超宗在汝南多所受納貨賂太傅北海王詳詳言之於世宗除持節征虜將軍岐州刺史徙河東太守卒官超宗在河東更自修厲清靖愛民百姓追思之贈本將軍華州刺史諡曰成伯子懿襲爵歷員外常侍尚書郎超宗弟令勝亦長八尺疏狂有膂力歷河北農二郡太守並坐貪暴為御史所彈遇赦免神龜末自後將軍太中大夫出為農太守卒官令勝寵惑妾潘離棄其妻羊氏夫妻相訟迭發陰私醜穢之事彰於朝野遐初為軍主從高祖征南陽景明初為梁城戍主被蕭衍將攻圍以固守及戰功封牟平縣開國子食邑二百戶後以左軍將軍假征虜將軍督巴東諸軍事鎮南鄭時蕭衍冠軍將軍軍主姜脩衆二萬屯羊口輔國將軍姜白龍據南城龍驤將軍泉建率土民北入桑坯姜脩又分軍據興勢龍驤將軍譚思文據夾石司州刺史王僧炳頓南安並扇動夷獠規翻南鄭遐率甲士九千所在衝擊數百里中莫不摧靡前後斬首五千餘級還以輔國將軍出為滎陽太守時蕭衍將馬仙琕率衆攻圍朐城戍主傅文驥嬰城固守以遐持節假平東將軍為別將與劉思祖等救之次於鮑口去朐城五十里夏雨頻降厲涉長驅將至朐城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陳奔退遐孤軍奮擊獨破仙琕斬其直閤將軍軍主李魯生直後軍主葛景羽等仙琕先分軍於朐城之西阻水列柵以圍固城遐身自潛行觀水深淺結草為筏銜枚夜進破其六柵遂解固城之圍進救朐城都督盧昶率大軍繼之未幾而文驥力竭以城降賊衆軍大崩昶棄其節傳輕騎而走惟遐獨握節而還時仲冬寒盛兵士凍死者朐山至於郯城二百里間僵尸相屬昶儀衞失盡於郯城借假節以為軍威遐坐失利免官延昌中起為光祿大夫使持節假前將軍為別將防捍西荊又為別將隸蕭寶夤東征淮堰熙平初出為平西將軍汾州刺史在州貪濁聞於遠近卒贈安南將軍豫州刺史諡曰襄子子獻襲爵子獻第四弟子素司空長流參軍叔隆步兵校尉永平初同懸瓠城民白早生之逆鎮南邢巒平豫州獲而宥之後以貨自通得為秦州闕西府長史加鎮遠將軍秦州殷富去京懸遠叔隆與敕使元脩義同心聚斂納貨巨萬拜冠軍將軍中散大夫尋遷左軍將軍太中大夫賂司空劉騰出為中山內史在郡無德政專以貨賄為事叔隆姦詐無行忘背恩義懸瓠之免是其族人前軍將軍趙文相之力後無報德之意更與文相斷絕文相長者不以為恨及文相為汝南內史猶經紀其家後文相卒叔隆了不恤其子弟時論賤薄之穆善書記有刀筆之用為汾州平西府司馬翼臨亡以穆託領軍元叉以穆為汝南內史胡方回安定臨涇人父義周姚泓黃門侍郎方回赫連屈丐中書侍郎涉獵史籍辭彩可觀為屈丐統萬城銘蛇祠碑諸文頗行於世世祖破赫連昌方回入國雅有才尚未為時所知也後為北鎮司馬為鎮修表有所稱慶世祖覽之嗟美問誰所作既知方回召為中書博士賜爵臨涇子遷侍郎與太子少傅游雅等改定律制司徒崔浩及當時朝賢並愛重之清貧守道以壽終子始昌亦長者有父風歷位至南部主書子醜孫中書學生祕書郎中散世不治產業家甚貧約兄弟並早亡胡叟字倫許安定臨涇人也世有冠冕為西夏著姓叟少聰敏年十三辨疑釋理知名鄉國其意之所悟與成人交論尠有屈焉學不師受友人勸之叟曰先聖之言精義入神者其唯易乎猶謂可思而過半末世腐儒粗別剛柔之位寧有探賾未兆者哉就道之義非在今矣及披讀羣籍再閱於目皆誦於口好屬文既善為典雅之詞又工為鄙俗之句以姚政將衰遂入長安觀風化隱匿名行懼人見知時京兆韋祖思少閱典墳多蔑時輩知叟至召而見之祖思習常待叟不足叟聊與溫涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡久矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八矣其述前載無違舊美中世有協時事而末及鄙黷人皆奇其才畏其筆世猶傳誦之以為笑狎叟孤飄坎罎未有仕路遂入漢中劉義隆梁秦二州刺史馮翊吉翰以叟才士頗相禮接授叟末佐不稱其懷未幾翰遷益州叟隨入蜀多為豪儁所尚時蜀沙門法成鳩率僧旅幾于千人鑄丈六金像劉義隆惡其聚衆將加大辟叟聞之即赴丹陽啟申其美遂得免焉復還於蜀法成感之遺其珍物價直千餘匹叟謂法成曰緯蕭何人能棄明珠吾為德請財何為也一無所受在益土五六載北至楊難當乃西入沮渠牧犍遇之不重叟亦本無附之之誠乃為詩示所知廣平程伯達其略曰羣犬吠新客佞闇排疏賓直途既以塞曲路非所遵望衞惋祝鮀眄楚悼靈均何用宣憂懷託翰寄輔仁伯達見詩謂叟曰涼州雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝鮀之有也叟曰古人有言君子聞鞞鼓之聲則思戰爭之士貴主奉正朔而弗淳慕仁義而未允地陋僻而僭徽號居小事大寧若茲乎徐偃之轍故不旋踵矣吾之擇木夙在大魏與子暫違非久闊也歲餘牧犍破降叟既先歸國朝廷以其識機拜虎威將軍賜爵始復男家於密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所栖謝其高矣後叟被徵至謝恩并獻詩一篇高宗時召叟及舒並使作檄劉駿蠕蠕文舒文劣於叟舒尋歸家叟不治產業常苦飢貧然不以為養子字螟蛉以自給養每至貴勝之門乘一牸牛弊韋袴褶而已作布囊容三四斗飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華者視之蔑如也尚書李敷嘗遺之以財都無所取初叟一見高允曰吳鄭之交以紵縞為美談吾之於子以弦韋為幽贄以此言之彼可無愧也於允館見中書侍郎趙郡李璨璨被服華靡叟貧老衣褐璨頗忽之叟謂之曰老子今若相許脫體上袴褶衣帽君欲作何計也譏其惟假盛服璨惕然失色叟少孤每言及父母則淚下若孺子之號春秋當祭之前則先求旨酒美膳將其所知廣寧常順陽馮翊田文宗上谷侯法儁攜壺執榼至郭外空靜處設坐奠拜盡孝思之敬時敦煌氾潛家善釀酒每節送一壺與叟著作佐郎博陵許赤虎河東裴定宗等謂潛曰再三之惠以為過厚子惠於叟何其也潛曰我給祭者以其於孝思也論者以潛為君子矣順陽等數子禀叟奬示頗涉文流高閭曾造其家值叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辦集其館宇卑陋園疇褊局而飯菜精潔醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以物直十餘匹贈之亦無辭愧閭作宣命賦叟為之序密雲左右皆祗仰其德歲時奉以麻布穀麥叟隨分散之家無餘財年八十而卒叟元妻敦煌宋氏先亡無子後庶養者亦皆早夭竟以絕後叟死無有家人營主凶事胡始昌迎而殯之于家葬於墓次即令一弟繼之襲其爵始復男虎威將軍叟與始昌雖為宗室而性氣殊詭不相好附於其存也往來乃簡及亡而收恤至厚議者以為非必敦哀疏宗或緣求利品秩也宋繇字體業敦煌人也曾祖配祖悌世仕張軌子孫父張玄靚龍驤將軍武興太守繇生而為張邕所誅五歲喪母事伯母張氏以孝聞八歲而張氏卒居喪過禮繇少而有志尚喟然謂妹夫張彥曰門戶傾覆負荷在繇不銜膽自厲何以繼承先業遂隨彥至酒泉追師就學閉室誦書晝夜不倦博通經史諸子羣言靡不覽綜呂光時舉秀才除郎中後奔段業業拜繇中散常侍繇以業無經濟遠略西奔李暠歷位通顯家無餘財雅好儒學雖在兵難之間講誦不廢每聞儒士在門常倒屣出迎停寢政事引談經籍尤明斷決時事亦無滯也沮渠蒙遜平酒泉於繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜克李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任蒙遜之將死也以子牧犍委託之牧犍以繇為左丞送其妹興平公主於京師世祖拜繇為河西王右丞相賜爵清水公加安遠將軍世祖并涼州從牧犍至京師卒諡曰恭長子巖襲爵改為西平侯巖子蔭中書議郎樂安王範從事中郎卒贈輔國將軍咸陽太守子超尚書度支郎超弟稚字季預師事安邑李紹伯受諸經傳性清嚴治家如官府太和中拜司徒屬又以例降除西中府戶曹參軍轉并州城陽王鸞城局參軍景明二年拜白水縣令在縣十一年頗得民和遷青州勃海太守正光三年卒子遊道武定末太尉長史張湛字子然一字仲玄敦煌人魏執金吾恭九世孫也湛弱冠知名涼土好學能屬文沖素有大志仕沮渠蒙遜黃門侍郎兵部尚書涼州平入國年五十餘矣賜爵南浦男加寧遠將軍司徒崔浩識而禮之浩注易曰國家西平河右敦煌張湛金城宗欽武威段承根三人皆儒者並有儁才見稱於西州每與余論易余以左氏傳卦解之遂相勸為注故因退朝之餘暇而為之解焉其見稱如此湛至京師家貧不粒操尚無虧浩常給其衣食每歲贈浩詩頌浩常報答及浩被誅湛懼悉燒之兄懷義閑粹有才幹遭母憂哀毀過人服制雖除而蔬糲弗改卒于征西參軍長子廣平高平令宗欽字景若金城人也父燮字文友呂光太常卿欽少而好學有儒者之風博綜羣言聲著河右仕沮渠蒙遜為中書郎世子洗馬欽上東宮侍臣箴曰恢恢玄古悠悠生民五才迭用經彝倫匡父維子弼君伊臣顛而能扶屈而能申昔在上聖妙鑒厥趣不曰我明而乖其度不曰我新而忽其故如彼在泉臨深是懼如彼覆車望途改步是以令問宣流英風遠布及於三季道喪純遷桀起瓊臺紂醊糟山周滅妖姒羿喪以田險詖蔽其耳目鄭衞陳於其前怙才肆虐異端是纏豈伊害身厥胤殲焉茫茫禹跡畫為九區昆蟲鳥獸各有巢居雲歌唐后垂橫美虞疏網改祝殷道攸敷龍盤應德隨蛇銜珠勿謂無心識命不殊勿謂理絕千載同符爰在子桓靈數攸臻儀形徐阮左右劉陳披文採友叩典問津用能重離襲曜魏鼎維新於昭儲后運應玄籙夕惕乾乾虛衿遠屬外撫幽荒內懷焭獨猶懼思不逮遠明不遐燭君有諍臣庭立謗木本枝克昌永符天祿微臣作箴敢告在僕世祖平涼州入國賜爵臥樹男加鷹揚將軍拜著作郎欽與高允書曰昔皇綱未振華裔殊風九服分隔金蘭莫遂希懷寄契延想積久天遂其願爰遘京師才非季札而眷深孫喬德乖程子而義均傾蓋曠齡罕遇會之一朝比公私理異詶諮路塞端拱蓬宇歎慨如何不量鄙拙貢詩數韻若夫泉江相忘之談遺言存意之美雖莊生之所尚非淺識所宜循愛敬既深情期往返思遲德意以袪鄙吝若能紆鳳彩以燿榛薈迴連城以映瓦礫者是所望也詩曰嵬峨嶺滉瀁滄溟山挺其和水燿其精啟茲令族應期誕生華冠衆彥偉邁羣英其一於穆吾子含貞藉茂如彼松竹陵霜擢秀味老思沖玩易體復戢翼九臯聲溢宇宙其二我皇龍興重離疊映剛德外彰柔明內鏡乾象奄氣坤厚山競風無殊音俗無異徑其三經緯曰文著述曰史斟酌九流錯綜幽旨帝用詶諮明發虛擬廣闢四門披延髦士其四爾應其求翰飛東觀口吐瓊音手揮霄翰彈毫珠零落紙錦粲墳無疑割典無滯泮其五山降則謙含柔為信林崇日漸明升斯進有邈夫子兼茲四慎弱而難勝通而不峻其六南董邈矣史功不申固傾佞竇雄穢美新遷以陵腐邕由卓泯時無逸勒路盈摧輪其七尹佚謨周孔明述魯抑揚羣致憲章三五昂昂高生纂我遐武勿謂古今建規易矩其八自昔索居沉淪西藩風馬既殊標榜莫緣開通有運闇遇當年披衿暫面定交一言其九諮疑祕省訪滯京都水鏡叔度洗吝田蘇望儀神婉即象心虛悟言禮樂採研詩書其十履霜悼遷撫節感變嗟我年邁迅踰激電進乏田賜退非回憲素髮掩玄枯顏落蒨其十一文以會友友由知己詩以明言言以通理盻坎迷流覿艮闇止伊爾虬光四鱗曲水其十二允答書曰頃因行李承足下高問延佇之勞為日久矣王途一啟得其懷欣於相遇情無有已足下兼愛為心每能存顧養之以風味惠之以德音執玩反覆銘於心抱吾少乏尋常之操長無老成之致憑賴賢勝以自克勉而來喻褒飾有過其分既承雅贈即應有答但唱高則難和理深則難詶所以留連日月以至於今今往詩一篇誠不足標明來旨且表以心幸恕其鄙滯領其至意詩曰湯湯流漢藹藹南都載稱多士載擢靈珠邈矣高族世記丹圖啟基郢城振彩涼區其一吾生朗到誕發英風紹熙前緒奕世克隆方圓備體淑德斯融望傾羣儁響駭華戎其二響駭伊何金聲允著匡贊西藩拯厥時務肅志琴書恬心初素潛思淵渟秀藻雲布其三上天降命祚鍾有代協燿紫宸與乾作配仁邁春陽功隆覆載招延隱叟永貽大賚其四伊余櫟散才至庸微遭緣幸會忝與樞機竊名華省厠足丹墀愧無螢燭少益天暉其五明升非諭信漸難兼體卑處下豈曰能謙進不弘道退失淵潛既慚朱闕亦愧閭閻其六史班稱達楊蔡致深負荷典策載蹈於心四轍同軌覆車相尋敬承嘉誨永佩明箴其七遠思古賢內尋諸己仰謝丘明長揖南史遐武雖存高蹤難擬夙興夕惕豈獲恬止其八世之圮矣靈運未通風馬殊隔區域異封有懷西望路險莫從王澤遠灑九服來同其九在昔平吳二陸稱寶今也克涼吾生獨矯道映儒林義為羣表我思與之均於紵縞其十仁乏田蘇量非叔度韓生屬降林宗仍顧千載曠遊遘茲一遇藻詠風流鄙心已悟其十一年時迅邁物我俱逝任之斯通擁之則滯結駟貽塵屢空亦弊兩間可守安有回賜其十二詩以言志志以表丹慨哉刎頸義已中殘雖曰不敏請事金蘭爾其勵之無忘歲寒崔浩之誅也欽亦賜死欽在河西撰蒙遜記十卷無足可稱弟舒字景太蒙遜庫部郎中與兄同歸國賜爵句町男加威遠將軍名亞於兄子孫皆衰替段承根武威姑臧人自云漢太尉熲九世孫也父暉字長祚身長八尺餘師事歐陽湯湯甚器愛之有一童子與暉同志後二年童子辭歸從暉請馬暉戲作木馬與之童子甚悅謝暉曰吾太山府君子奉敕遊學今將欲歸煩子厚贈無以報德子後位至常伯封侯非報也且以為好言終乘木馬騰空而去暉乃自知必將貴也乞伏熾磐以暉為輔國大將軍涼州刺史御史大夫西海侯磐子暮末襲位國政衰亂暉父子奔吐谷渾暮璝暮璝內附暉與承根歸國世祖素聞其名頗重之以為上客後暉從世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市曝尸數日時有儒生京兆林白奴欽暉德音夜竊其尸置之枯井女為敦煌張氏婦久而聞之乃向長安收葬承根好學機辯有文思而性行疏薄有始無終司徒崔浩見而奇之以為才堪注述言之世祖請為著作郎引與同事世咸重其文而薄其行甚為敦煌公李寶所敬待承根贈寶詩曰世道衰陵淳風殆緬衢交問鼎路盈訪瓕徇競爭馳天機莫踐不有真宰榛棘誰揃其一於皇我后重明襲煥文以息煩武以靜亂剖蚌求珍搜巖采幹野無投綸朝盈逸翰其二自昔涼季林焚淵涸矯矯公子鱗羽靡託靈慧雖奮祅氛未廓鳳戢崐丘龍潛玄漠其三數不常擾艱極則夷奮翼幽裔翰飛京師珥蟬紫闥杖節方畿弼我王度庶績緝熙其四自余幽淪眷參舊契庶庇餘光優游卒歲忻路未淹離轡已際顧難分歧載張載繼其五聞諸交舊累聖疊曜淳源雖漓民懷餘劭思樂哲人靜以鎮躁藹彼繁音和此清調其六詢下曰文辨訐曰明化由禮洽政以寬成勉崇仁教播德簡刑傾首景風遲聞休聲其七浩誅承根與宗欽等俱死承根外孫長水校尉南陽張令言美鬚髯言談舉止有異武人李琰之李神儁一時名士並稱美之闞駰字玄陰敦煌人也祖倞有名於西土父玟為一時秀士官至會稽令駰博通經傳聰敏過人三史羣言經目則誦時人謂之宿讀注王朗易傳學者藉以通經撰十三州志行於世蒙遜甚重之常侍左右訪以政治損益拜祕書考課郎中給文吏三十人典校經籍刊定諸子三千餘卷加奉車都尉牧犍待之彌重拜大行遷尚書姑臧平樂平王丕鎮涼州引為從事中郎王薨之後還京師家甚貧弊不免飢寒性能多食一飯至三升乃飽卒無後劉昞字延明敦煌人也父寶字子玉以儒學稱昞年十四就博士郭瑀學時瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心於昞遂別設一席於坐前謂諸弟子曰吾有一女年向成長欲覓一快女壻誰坐此席者吾當婚焉昞遂奮衣來坐神志肅然曰向聞先生欲求快女壻昞其人也瑀遂以女妻之昞後隱居酒泉不應州郡之命弟子受業者五百餘人李暠私署徵為儒林祭酒從事中郎暠好尚文典書史穿落者親自補治昞時侍側前請代暠暠曰躬自執者欲人重此典籍吾與卿相值何異孔明之會玄德遷撫夷護軍雖有政務手不釋卷暠曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將至孔聖稱焉昞何人斯敢不如此昞以三史文繁著略記百三十篇八十四卷涼書十卷敦煌實錄二十卷方言三卷靖恭堂銘一卷注周易韓子人物志黃石公三略並行於世蒙遜平酒泉拜祕書郎專管注記築陸沉觀於西苑躬往禮焉號玄處先生學徒數百月致羊酒牧犍尊為國師親自致拜命官屬以下皆北面受業焉時同郡索敞陰興為助教並以文學見舉每巾衣而入世祖平涼州士民東遷夙聞其名拜樂平王從事中郎世祖詔諸年七十以上聽留本鄉一子扶養昞時老矣在姑臧歲餘思鄉而返至涼州西四百里韭谷窟遇疾而卒昞六子長子僧衍早亡次仲禮留鄉里次字仲次貳歸少歸仁並遷代京後分屬諸州為城民歸仁有二子長買奴次顯宗太和十四年尚書李沖奏昞河右碩儒今子孫沉屈未有祿潤賢者子孫宜蒙顯異於是除其一子為郢州雲陽令正光三年太保崔光奏曰臣聞太上立德其次立功立言死而不朽前哲所尚思人愛樹自古稱美故樂平王從事中郎敦煌劉昞著業涼城遺文茲在篇籍之美頗足可觀如或愆釁當蒙數世之宥況乃維祖逮孫相去未遠而令久淪皂隸不獲收異儒學之士所為竊歎臣忝職史教冒以聞奏乞敕尚書推檢所屬甄免碎役用廣聖朝旌善繼絕敦化厲俗於是乎在四年六月詔曰昞德冠前世蔚為儒宗太保啟陳深合勸善其孫等三家特可聽免河西人以為榮趙柔字元順金城人也少以德行才學知名河右沮渠牧犍時為金部郎世祖平涼州內徙京師高宗踐阼拜為著作郎後以歷効有績出為河內太守甚著仁惠柔嘗在路得人所遺金珠一貫價直數百縑柔呼主還之後有人與柔鏵數百枚者柔與子善明鬻之於市有從柔買索絹二十匹有商人知其賤與柔三十匹善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之搢紳之流聞而敬服焉其推誠秉信皆此類也隴西王源賀採佛經幽旨作祗洹精舍圖偈六卷柔為之注解咸得理衷為當時儁僧所欽味焉又憑立銘讚頗行于世子默字沖明武威太守索敞字巨振敦煌人為劉昞助教專心經籍盡能傳昞之業涼州平入國以儒學見拔為中書博士篤勤訓授肅而有禮京師大族貴遊之子皆敬憚威嚴多所成益前後顯達位至尚書牧守者數十人皆受業於敞敞遂講授十餘年敞以喪服散在衆篇遂撰比為喪服要記其名字論文多不載後出補扶風太守在位清貧未幾卒官時舊同學生等為請詔贈平南將軍涼州刺史諡曰獻敞子僧養中書議郎京兆太守僧養子演貴征東府參軍演貴子懷真字公道武定末侍御史初敞在州之日與鄉人陰世隆文才相友世隆至京師被罪徙和龍屆上谷困不前達土人徐能抑掠為奴五年敞因行至上谷遇見世隆語其由狀對泣而別敞為訴理得免世隆子孟貴性至孝每向田耘耨早朝拜父來亦如之鄉人欽其篤於事親陰仲達武威姑臧人祖訓字處道仕李暠為武威太守父華字季文姑臧令仲達少以文學知名世祖平涼州內徙代都司徒崔浩啟仲達與段承根云二人俱涼土才華同修國史除祕書著作郎卒華次子周達徐州平南司馬太山太守周達子遵和小名虎頭好音律尚武事初為高祖挽郎拜奉朝請後廣平王懷取為國常侍遵和便辟善事人深為懷所親愛轉司空法曹太尉中兵參軍又為汝南王悅郎中令復被愛信稍遷龍驤將軍驍騎將軍豫州都督鎮懸瓠孝莊末除左將軍行豫州刺史時前行州事元崇禮被徵將還既聞尒朱兆入洛遂矯殺遵和擅攝州任後追贈平南將軍涼州刺史遵和兄子道方性和雅頗涉書傳深為李神儁所知賞神儁為前將軍荊州刺史請道方為其府長流參軍神儁曾使道方詣蕭衍雍州刺史蕭綱論邊事道方風神沉正為綱所稱正光末蕭綱遣其軍主曹義宗等擾動邊蠻神儁令道方馳傳向新野處分軍事於路為土因村蠻所掠送於義宗義宗又傳致襄陽仍送於蕭衍囚之尚方孝昌中始得還國既至拜奉朝請轉員外散騎侍郎孝莊初遷尚書左民郎中修起居注永安二年詔道方與儀曹郎中王元旭使於蕭衍至南兗州有詔追還轉安東將軍光祿大夫領右民郎中太昌初卒年四十二人士咸嗟惜之贈撫軍將軍荊州刺史史臣曰趙逸等皆通涉經史才志不羣價重西州有聞東國故於流播之中拔泥滓之上人之不可以無能信也胡叟顯晦之間優遊無悶亦一世之異人乎
