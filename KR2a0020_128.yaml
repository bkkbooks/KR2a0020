body:
  text: 魏書卷一百一十二上靈徵志八上第十七帝王者配德天地協契陰陽發號施令動關幽顯是以克躬修政畏天敬神雖休勿休而不敢怠也化之所感其徵必至善惡之來報應如響斯蓋神祇眷顧告示禍福人主所以仰瞻俯察戒德慎行弭譴咎致休禎圓首之類咸納於仁壽然則治世之符亂邦之孽隨方而作厥迹不同眇自百王不可得而勝數矣今錄皇始之後災祥小大總為靈徵志地震洪範論曰地陰類大臣之象陰靜而不當動動者臣下強盛將動而為害之應也太宗泰常四年二月甲子司州地震屋室盡搖動世祖太延二年十一月丁卯并州地震四年三月乙未京師地震十一月丁亥幽兗二州地震真君元年五月丙午河東地震高祖延興四年五月雁門崎城有聲如雷自上西引十餘聲聲止地震十月己亥京師地震太和元年四月辛酉京師地震五月統萬鎮地震有聲如雷閏月秦州地震殷殷有聲四年正月雍州氐民齊男王反二年二月丙子兗州地震四年十月蘭陵民桓富反殺其縣令七月丁卯并州地震有聲三年三月戊辰平州地震有聲如雷野雉皆雊七月丁卯京師地震五年二月沙門法秀謀反四年五月己酉并州地震五年二月戊戌秦州地震六年五月癸未秦州地震有聲八月甲午秦州地震有聲如雷乙未又震七年三月甲子秦州地震有聲四月丁卯肆州地震有聲六月甲子東雍州地震有聲八年十一月丙申并州地震十年正月辛未并州地震殷殷有聲閏月丙午秦州地震二月甲子京師地震丙寅又震丙午秦州地震有聲三月壬子京師及營州地震十二年三月中散梁衆保謀反十九年二月己未光州地震東萊之牟平虞丘山陷五所一處有水二十年正月辛未并州地震四月乙未營州地震十二月州刺史穆泰等在州謀反誅二十二年三月癸未營州地震八月戊子兗州地震九月辛卯并州地震二十三年六月乙未京師地震世宗景明元年六月庚午秦州地震四年正月辛酉涼州地震壬申并州地震六月丁亥秦州地震十二月辛巳秦州地震正始三年正月秦州民王智等聚衆二千自號王公尋推秦州主簿呂苟兒為主正始元年四月庚辰京師地震六月乙巳京師地震二年九月己丑州地震三年七月己丑涼州地震殷殷有聲城門崩八月庚申秦州地震九月夏州長史曹明謀反永平元年春正月庚寅秦州地震三年二月秦州沙門劉光秀謀反九月壬辰青州地震殷殷有聲二年正月壬寅青州地震四年五月庚戌定二州地震殷殷有聲十月己巳州地震有聲如雷延昌元年四月庚辰京師及并朔相冀定瀛六州地震州之繁畤桑乾靈丘肆州之秀容雁門地震陷裂山崩泉湧殺五千三百一十人傷者二千七百二十二人牛馬雜畜死傷者三千餘後尒朱榮強擅之徵也十月壬申秦州地震有聲十一月己酉定肆二州地震十二月辛未京師地震東北有聲二年三月己未濟州地震有聲月丙戌京師地震三年正月辛亥有司奏肆州上言秀容郡敷城縣自延昌二年四月地震於今不止尒朱榮徵也四年正月癸丑華州地震十一月甲午地震從西北來殷殷有聲丁酉又地震從東北來肅宗熙平二年十二月乙巳秦州地震有聲正光二年六月秦州地震有聲東北引五年莫折念生反三年六月庚辰徐州地震孝昌元年元法僧反孝靜武定三年冬并州地震七年夏并州鄉郡地震山崩洪範論曰山陽君也水陰民也天戒若曰君道崩壞百姓將失其所也太祖天賜六年春三月山崩世祖太延四年四月己酉華山崩其占曰山岳配天猶諸侯之係天子山岳崩諸侯有亡者沮渠牧犍將滅之應世宗景明元年五月乙丑齊州山茌縣太陰山崩飛泉湧出殺一百五十九人四年十一月丁巳山崩正始元年十一月癸亥山崩延昌三年八月辛巳兗州上言泰山崩頹石湧泉十七處泰山帝王告成封禪之所也而山崩泉湧陽黜而陰盛岱又齊地也天意若曰當有繼齊而興受禪讓者齊代魏之徵也大風京房易傳曰衆逆同志至德乃潛厥異風太宗永興三年二月甲午京師大風五月己巳昌黎王慕容伯兒謀反伏誅十一月丙午又大風五年河西叛胡曹龍張大頭等各領部衆二萬入蒲子四年正月癸卯元會而大風晦冥乃罷五年十一月庚寅京師大風起自西方神瑞元年四月京師大風二年正月京師大風三月河西飢胡反屯聚上黨推白亞栗斯為盟主世祖太延二年四月甲申京師暴風宮牆倒殺數十人三年十二月京師大風揚沙折樹真君元年二月京師有黑風竟天廣五丈餘四月庚辰沮渠無諱寇張掖禿髮保周屯於刪丹嶺高宗和平二年三月壬午京師大風晦暝高祖延興五年五月京師赤風太和二年七月庚申武川鎮大風吹失六家羊角而上不知所在壬戌雍州赤風三年六月壬辰相州大風從酉上來發屋折樹七年四月相豫二州大風八年三月冀定相三州暴風四月濟光幽肆雍齊六州暴風九年六月庚戌濟洛肆相四州及靈丘廣昌鎮暴風折木十二年五月壬寅京師連日大風甲辰尤甚發屋拔樹六月壬申京師大風十四年七月丁酉朔京師大風拔樹發屋二十三年八月徐州自甲寅至己未大風拔樹閏月庚申河州暴風大雨雹世宗景明元年二月癸巳幽州暴風殺一百六十一人三年閏月甲午京師大風拔樹發屋吹折閶闔門關九月丙辰幽岐梁東秦州暴風昏霧拔樹發屋四年三月己未司州之河北河東正平平陽大風拔樹正始元年七月戊辰東秦州暴風拔樹發屋二年二月癸卯有黑風羊角而上起於柔玄鎮蓋地一頃所過拔樹甲辰至於營州東入於海四年五月甲子京師大風永平元年四月壬申京師大風拔樹八月癸亥冀州刺史京兆王愉據州反三年五月己亥南秦州廣業仇池郡大風發屋拔樹延昌四年三月癸亥京師暴風從西北來發屋折樹肅宗熙平二年九月瀛州暴風大雨自辛酉至於乙丑正光三年四月癸酉京師暴風大雨發屋拔樹四年四月辛巳京師大風孝昌二年五月丙寅京師暴風拔樹發屋吹平昌門扉壞永寧九層撜折於時天下所在兵亂前廢帝普泰元年夏大風雨吹普光寺門屋於地孝靜武定七年三月潁川大風大水洪範論曰大水者皆君臣治失而陰氣積盛強生水雨之災也太祖天賜三年八月霖雨大震山谷水溢太宗泰常三年八月河內大水世祖延和元年六月甲戌京師水溢壞民廬舍數百家真君八年七月平州大水高祖太和二年夏四月南豫徐兗州大霖雨六年七月青雍二州大水八月徐東徐兗濟平豫光七州平原枋頭廣阿臨濟四鎮大水九年九月南豫朔二州各大水殺千餘人二十二年戊午兗豫二州大霖雨二十三年六月青齊光南青徐豫兗東豫八州大水世宗景明元年七月青齊南青光徐兗豫東豫司州之潁川汲郡大水平隰一丈五尺民居全者十四五正始二年三月青徐州大雨霖海水溢出於青州樂陵之隰沃縣流漂一百五十二人永平三年七月州郡二十大水延昌元年夏京師及四方大水二年五月壽春大水肅宗熙平元年六月徐州大水二年九月冀瀛滄三州大水正光二年夏定冀瀛相四州大水孝昌三年秋京師大水出帝太昌元年六月庚午京師大水穀水汎溢壞三百餘家孝靜元象元年定冀瀛滄四州大水興和四年滄州大水湧泉太宗泰常五年十二月壬辰湧泉出於平城高宗和平五年十一月雁門泉水穿石湧出前廢帝普泰元年秋司徒府太倉前井並溢占曰民遷流之象永熙三年十月都遷於鄴孝靜天平四年七月泰州井溢元象元年二月鄴城西南有枯井溢雨雹洪範論曰陽之專氣為雹陰之專氣為霰此言陽專而陰脅之陰專而陽薄之不能相入則轉而為雹猶臣意不合於君心也高祖延興四年四月庚午涇州大雹傷稼承明元年四月辛酉青齊徐兗大風雹八月庚申并州鄉郡大雹平地尺草木禾稼皆盡癸未定州大雹殺人大者方圓二尺世宗景明元年六月雍青二州大雨雹殺麞鹿四年五月癸酉汾州大雨雹六月乙巳汾州大雨雹草木禾稼雉兔皆死七月甲戌暴風大雨雹起自汾州經并相司兗至徐州而止廣十里所過草木無遺正始二年三月丁丑齊濟二州大雹雨雪永平三年五月庚子南秦廣業郡大雨雹殺鳥獸禾稼雪洪範論曰春秋之大雨雪猶庶徵之雨也然尤甚焉夫雨陰也雪又陰也大雪者陰之積盛甚也一曰與大水同冬故為雪耳世祖始光二年十月大雪數尺真君八年五月北鎮寒雪人畜凍死是時為政嚴急高祖太和四年九月甲子朔京師大風雨雪三尺世宗正始元年五月壬戌武川鎮大雨雪四年二月乙卯司相二州暴風大雨雪九月壬申大雪肅宗正光二年四月柔玄鎮大雪霜京房易傳曰興兵妄誅茲謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁夏先大霜太祖天賜五年七月冀州霣霜世祖太延元年七月庚辰大霣霜殺草木高宗和平六年四月乙丑霣霜高祖太和三年七月雍朔二州及枹罕吐京薄骨律敦煌仇池鎮並大霜禾豆盡死六年四月潁川郡霣霜七年三月肆州風霜殺菽九年四月雍青二州霣霜六月洛肆相三州及司州靈丘廣昌鎮霣霜十四年八月乙未汾州霣霜世宗景明元年四月丙子夏州霣霜殺草六月丁亥建興郡霣霜殺草八月乙亥雍并朔夏汾五州司州之正平平陽頻暴風霣霜二年三月辛亥齊州霣霜殺桑麥四年三月壬戌雍州霣霜殺桑麥辛巳青州霣霜殺桑麥正始元年五月壬戌武川鎮霣霜六月辛卯懷朔鎮霣霜七月戊辰東秦州霣霜八月庚子河州霣霜殺稼二年四月齊州霣霜五月壬申汾二州霣霜殺稼七月辛巳豳岐二州霣霜乙未敦煌霣霜戊戌州霣霜三年六月丙申安州霣霜四年三月乙丑豳州頻霣霜四月乙卯敦煌頻霣霜八月河州霣霜永平元年三月乙酉岐豳二州霣霜己丑并州霣霜四月戊午敦煌霣霜二年四月辛亥武州鎮霣霜延昌四年三月癸亥河南八州霣霜肅宗熙平元年七月河南北十一州霜無雲而雷洪範論曰雷陽也雲陰也有雲然後有雷有臣然後有君也雷託於雲君託於臣陰陽之合也故無雲而雷示君獨處無臣民也顯祖皇興元年七月東北無雲而雷二年七月東北有聲如雷世宗延昌元年二月己酉有聲起東北南引殷殷如雷二聲而止鼓妖世祖太延四年十月辛酉北有聲如大鼓西北行雷洪範論曰陽用事百八十三日而終陰用事亦百八十三日而終雷出地百八十三日而入地入地百八十三日而復出地是其常經也故雷安萬物安雷害萬物害猶國也君安國亦安君害國亦害不當雷而雷皆失節也世祖神元年十月己酉雨雷電太延三年十月癸丑雷四年十一月丁亥雷高祖太和三年十一月庚戌豫州雷雨戊申豫州大雷雨平地水三寸四年十月戊戌雷七年十一月辛巳幽州雷電城內盡赤世宗景明二年十一月辛卯涼州雷七發聲三年十二月己巳夜雷九發聲正始元年十一月甲寅秦齊荊朔四州雷電肅宗正光元年正月壬寅雷震春秋震夷伯之廟左丘明謂展氏有隱慝焉劉向以為夷伯世大夫天戒若曰勿使大夫世官將專事也太祖天賜六年四月震天安殿東序帝惡之令左校以衝車攻殿東西兩序屋毀之帝竟暴崩顯祖皇興二年十一月夜震電高祖太和三年五月戊午震東廟東中門屋南鴟尾霧班固說上不寬大包容臣下則不能居聖位貌言視聽以心為主四者皆失則區瞀無識故其咎霧世祖太延四年正月庚子雨土如霧於洛陽高祖太和十二年十一月丙戌土霧竟天六日不開到甲夜仍復濃密勃勃如火煙辛慘人鼻世宗景明三年二月己丑秦州黃霧雨土覆地八月己酉濁氣四塞四年八月辛巳涼州雨土覆地亦如霧正始二年正月己丑夜陰霧四塞初黑後赤三年正月辛丑土霧四塞九月壬申黑霧四塞延昌元年二月甲戌黃霧蔽塞時高肇以外戚見寵兄弟受封同漢之五侯也桃李花庶徵之燠劉向班固以冬亡冰及霜不殺草之應京房易傳曰夏暑殺人冬則物華實世祖真君五年八月華林園諸果盡花高祖延興五年八月中山桃李花承明元年九月幽州民齊淵家杜樹結實既成一朝盡落花葉復生七日之中蔚如春狀世宗景明四年十一月齊州東清河郡桃李花延昌四年閏十月辛亥京師柰樹花火不炎上洪範傳曰棄法律逐功臣殺太子以妾為妻則火不炎上謂火失其性而為災高宗太安五年春三月肥如城內大火官私廬舍焚燒略盡唯有東西二寺佛圖像舍火獨不及高祖太和八年五月戊寅河內沁縣澤自燃稍增至百餘步五日乃滅世宗景明元年三月乙巳岳祠災肅宗正光元年五月鈎盾禁災孝昌二年夏幽州遒縣地燃三年春瀛州城內大火燒三千餘家出帝永熙三年二月永寧寺九層佛圖災既而時人咸言有人見佛圖飛入東海中永寧佛圖靈像所在天意若曰永寧見災魏不寧矣勃海齊獻武王之本封也神靈歸海則齊室將興之驗也三月并州三級寺南門災孝靜天平四年秋鄴閶闔門東闕火武定三年冬汾州西河北山有火潛行地下熱氣上出黑眚黑祥世祖始光二年正月甲寅夜天東南有黑氣廣一丈長十丈占有兵二月慕容渴悉隣反於北平顯祖皇興三年正月河濟起黑雲廣數里掩東陽城上昏暗如夜既而東陽城潰世宗景明三年九月己卯黑氣四塞甲辰揚州破蕭衍將張囂之斬級二千赤眚高祖太和二年十一月丁未夜有三白氣從地出須臾變為黃赤光明照地十六年九月丁巳昏時赤氣見於西北長二十丈廣八九尺食頃乃滅世宗延昌元年三月丙申有赤氣見於天自卯至戌肅宗正光元年十一月辛未西北赤氣竟天畔似火氣京師不見涼州以聞三年九月甲辰夜西北有赤氣似火焰東西一匹餘北鎮反亂之徵五年五月癸酉申時北有赤氣東西竟天如火焰莊帝永安三年十一月己丑有赤氣如霧從顯陽殿階西南角斜屬步廊高一丈許連地如絳紗幔自未至戌不滅帝見而惡之終有幽崩之禍孝靜天平三年正月己亥戌時東方有赤氣可三丈餘三食頃而滅青眚莊帝永安三年六月甲子申時辰地有青氣廣四尺東頭緣山西北引至天半止西北戌地有黑赤黃雲如山峯頭有青氣廣四尺許東南引至天半二氣相接東南氣前散西北氣後滅亦帝執崩之徵也夜妖班固說夜妖者雲風並起而杳冥故與常風同象也溫而風則生螟螣之孽世宗正始元年六月乙巳晦八月甲辰晝晦人痾劉歆說貌之不恭是謂不肅上嫚下暴則陰氣勝水傷百穀衣食不足姦宄並作故其極惡也一曰民多被刑貌醜惡也班固以為六畜謂之禍言其著也及人謂之痾痾病貌言寢深也太宗永興三年民烏蘭喉下生骨狀如羊角長一尺餘高祖太和十六年五月書李沖奏定州中山郡毋極縣民李班虎女獻容以去年九月二十日右手大拇指甲下生毛九莖至十月二十日長一尺二寸肅宗熙平二年十一月己未并州表送祁縣民韓僧真女令姬從母右脅而生靈太后令付掖庭正光元年五月戊戌南兗州下蔡郡有大人跡見行七步跡長一尺八寸廣七寸五分高祖延興三年秋秀容郡婦人一產四男四產十六男莊帝永安三年十一月丁卯京師民家妻產男一頭二身四手四脚三耳太和十六年十一月乙亥高祖與沙門道登幸侍中省日入六鼓見一鬼衣黃褶袴當戶欲入帝以為人叱之而退問諸左右咸言不見唯帝與道登見之顯祖皇興二年十月豫州疫民死十四五萬世宗永平三年四月平陽之禽昌襄陵二縣大疫自正月至是月死者二千七百三十人金沴太和十九年六月徐州表言丈八銅像汗流於地永安普泰永熙中京師平等寺定光金像每流汗國有事變時咸畏異之永安三年二月京師民家有二銅像各長尺餘一頤下生白毫四一頰傍生黑毛一龍蛇之孽洪範論曰龍鱗蟲也生於水雲亦水之象陰氣盛故其象至也人君下悖人倫上亂天道必有篡殺之禍世祖神三年三月有白龍二見於京師家人井中真君六年二月丙辰有白龍見於京師家人井中龍神物也而屈於井中皆世祖暴崩之徵也肅宗正光元年八月有黑龍如狗南走至宣陽門躍而上穿門樓下而出魏衰之徵也莊帝永安二年晉陽龍見於井中久不去莊帝暴崩晉陽之徵也前廢帝普泰元年四月甲寅有龍跡自宣陽門西出復入城乙卯羣臣入賀帝曰國將興聽於民將亡聽於神但當君臣上下克己為治未足恃此為慶馬禍洪範論曰馬者兵象也將有寇戎之事故馬為怪也肅宗熙平二年十一月辛未州送馬駒肉尾長一尺騣處不生毛正光元年九月沃野鎮官馬為蟲入耳死者十四五蟲似螝長五寸已下大如箸牛禍洪範論易曰坤為牛坤土也土氣亂則牛為怪一曰牛禍其象宗廟將滅一曰轉輸煩則牛生禍世宗景明二年五月冀州上言長樂郡牛生犢一頭二面二口三目三耳羊禍洪範論曰君不明失政之所致高祖太和二十三年三月肆州上言陽曲縣羊生羔一頭二身一牝一牡三耳八足尋高祖崩六輔專事世宗正始元年七月鄯善鎮送羊羔一頭兩身八脚二年正月鄯善鎮送八脚羊延昌四年五月薄骨律鎮上言羊羔一頭六足兩尾豕禍京房傳曰凡妖象其類足多者所任邪也京房易妖曰豕生人頭豕身者邑且亂亡高祖延興元年九月有司奏豫州刺史臨淮公王讓表有猪生子一頭二身八足世宗景明四年九月梁州上言犬豕交正始四年八月京師猪生子一頭四耳兩身八足延昌四年七月徐州上言陽平戍猪生子頭面似人頂有肉髻體無毛靈太后幼主傾覆之徵也鷄禍洪範論曰京房傳曰鷄小畜猶小臣也角者兵之象在上君之威也此小臣執事者將秉君之威以生亂不治之害高祖太和元年夏五月有司奏京師有雌鷄二頭上生冠如角與衆鷄異是時文明太后臨朝信用羣小之徵世宗正始元年四月河南有鷄雛四足四翼語在崔光傳八月司州上言河內民席衆家鷄雛近尾上復有一頭口目具二頭皆從頸後各有二翼二足旁行是時世宗頗任羣小更有朋黨邪佞干政之驗延昌四年十二月洛州上言魏興太守常矯家黃雌鷄頭上肉角大如棗長寸三分角上生聚毛長寸半肅宗正光元年正月虎賁中郎將蘭兠家鷄雄雌二各頭上生兩角其毛雜色上聳過冠時靈太后臨朝專政羽蟲之孽洪範論曰視不明聽不聰之罰也太宗泰常三年十一月京師獲白梟肅宗正光二年八月己卯獲禿鶖鳥於殿內孝昌二年四月民有送死鴨雛一頭兩身四足四翅兩尾孝靜天平二年三月雄雉飛入尚書省殿中獲之蝗蟲螟洪範論曰刑罰暴虐取利於下貪饕無厭以興師動衆取邑治城而失衆心則蟲為害矣高祖太和五年七月敦煌鎮蝗秋稼略盡六年七月青雍二州刟繕害稼八月徐東徐兗濟平豫光七州平原枋頭廣阿臨濟四鎮蝗害稼七年四月相豫二州蝗害稼八年三月冀州相三州刟繕害稼四月濟光幽肆雍齊平七州蝗六月乙巳相齊光青四州刟繕害稼十六年十月癸巳枹罕鎮蝗害稼世宗景明元年五月青齊徐兗光南青六州刟繕害稼四年三月壬午河州大螟二麥無遺五月光州刟繕害稼六月河州大蝗七月東萊郡刟繕害稼正始元年六月夏司二州蝗害稼四年四月青州步屈蟲害棗花八月涇州黃鼠蝗蟲班蟲河州刟繕班蟲涼州司州農郡蝗蟲並為災永平元年六月己巳涼州蝗害稼五年五月青州步屈蟲害棗花七月蝗蟲京師刟繕八月青齊光三州刟繕害稼三分食二肅宗熙平元年六月青齊光南青四州刟繕害稼顯祖天安元年六月兗州有黑蟻與赤蟻交鬬長六十步廣四寸赤蟻斷頭而死黑主北赤主南十一月劉彧兗州刺史畢衆敬遣使內屬詔鎮南大將軍尉元納之大破賊將周凱等高祖太和十年七月并州治中張萬壽表建興濩澤縣民賈日成以去四月中養蠶有絲網成幕中有卷物似絹帶長四尺廣三寸薄上復得黃繭二狀如履形世宗正始二年三月徐州蠶蛾喫人殘者一百一十餘人死者二十二人毛蟲之孽謂變常而為異也太祖登國中河南有虎七臥於河側三月乃去後一年蚍蜉白鹿盡渡河北後一年河水赤如血此衞辰滅亡之應及誅其族類悉投之河中其地遂空孝靜元象元年正月有狼入城至硤石曹獲之武定五年十二月北城銅爵臺上獲豹一高祖太和元年五月辛亥有狐魅截人髮時文明太后臨朝行多不正之徵也肅宗熙平二年自春京師有狐魅截人髮人相驚恐六月壬辰靈太后召諸截髮者使崇訓衞尉劉騰鞭之於千秋門外事同太和也瑞圖外鎮王公刺史二千石令長酷暴百姓人民怨嗟則白鼠至太宗永興三年二月京師民趙溫家有白鼠以獻三年春於北苑獲白鼠一尋死割之腹中有三子盡白四年三月上幸西宮獲白鼠一八月御府民張安獲白鼠一神瑞二年五月帝獵於凁崙山獲白鼠一平城獲白鼠三六月平城獲白鼠二八月豫章王夔獲白鼠一泰常元年十一月京師民獲白戶多一以獻二年六月中山獲白鼠二三年三月京師獲白鼠一十一月京師獲白鼠一世祖始光三年八月相州魏郡獲白鼠太延元年八月雁門獻白鼠高祖太和二十三年八月京師獲白鼠世宗景明四年五月京師獲白鼠正始元年六月京師獲白鼠肅宗熙平元年四月肆州表送白鼠
