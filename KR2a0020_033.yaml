body:
  text: 魏書卷二十八列傳第十六和跋奚牧莫題庾業延賀狄干李栗劉潔古弼張黎和跋代人也世領部落為國附臣跋以才辨知名太祖擢為外朝大人參軍國大謀雅有智算頻使稱旨拜龍驤將軍未幾賜爵日南公從平中原以功進為尚書鎮鄴慕容德使兄子和守滑臺和長史李辨殺和求援於跋跋率輕騎赴之既至辨悔閉門拒守跋使尚書郎鄧暉説之辨乃開門跋入收其府藏德聞之遣將率三千騎擊跋跋逆擊大破之擒其將士千餘人而還於是陳潁之民多來向化改封定陵公與常山王遵率衆五萬討賀蘭部別帥木易于破之出為平原太守太祖寵遇跋冠於諸將時羣臣皆敦尚恭儉而跋好修虛譽眩曜於時性尤奢淫太祖戒之弗革後車駕北狩豺山收跋刑之路側妻劉氏自殺以從初將刑跋太祖命其諸弟毗等視訣跋謂毗曰灅北地瘠可居水南就耕良田廣為産業各相勉勵務自纂修令之背己曰汝曹何忍視吾之死也毗等解其微意詐稱使者云奔長安追之不及太祖怒遂誅其家後世祖西巡五原回幸豺山校獵忽遇暴風雲霧四塞世祖怪而問之羣下僉言跋世居此土祠冢猶存其或者能致斯變帝遣建興公古弼祭以三牲霧即除散後世祖搜狩之日每先祭之少子歸從征赫連昌有功拜統萬將軍賜爵成皋男與西平公安頡攻虎牢拔之進爵高陽侯後以罪徙配涼州為民蓋吳作亂於關中復拜歸龍驤將軍往討之還拜使持節冠軍將軍雍城鎮都大將高陽侯卒子度襲爵尚書都官郎昌平太守卒度子延穆司州部郡從事早卒子安武定末給事黃門侍郎奚牧代人也重厚有智謀太祖寵遇之稱之曰仲兄初劉顯謀害太祖梁眷知其謀潛使牧與穆崇至七介山以告語在崇傳太祖録先帝舊臣又以牧告顯之功拜為治民長敷奏政事參與計謀太祖征慕容寶加輔國將軍略地晉川獲寶丹陽王買得及離石護軍高秀和於平陶以軍功拜并州刺史賜爵任城公州與姚興接界興頗寇邊牧乃與興書稱頓首鈞禮抗之責興侵邊不直之意興以與國通和恨之有言於太祖太祖戮之莫題代人也多智有才用初為幢將領禁兵太祖之征慕容寶也寶夜來犯營車人驚駭遂有亡還京師者言官軍敗於柏肆京師不安南安公元順因之欲攝國事題謂順曰此大事不可輕爾宜審待後要不然禍將及矣順乃止以功拜平遠將軍賜爵扶柳公進號左將軍改為高邑公出除中山太守督司州之山東七郡事車駕征姚興次於晉陽而上黨羣盜秦頗丁零翟都等聚衆於壺關詔題帥衆三千以討之上黨太守捕頗斬之都走林慮詔題搜山窮討盡平之初昭成末太祖季父窟咄徙于長安苻堅敗從慕容永東遷及永自立以窟咄為新興太守登國初劉顯遣弟亢碸等迎窟咄寇南鄙題時二於太祖遺箭於窟咄謂之曰三歲犢豈勝重載言窟咄長而太祖少也太祖既銜之天賜五年有告題居處倨傲擬則人主太祖乃使人示之箭告之曰三歲犢能勝重載不題奉詔父子對泣詰朝乃刑之庾業延代人也後賜名嶽其父及兄和辰世典畜牧稍轉中部大人昭成崩氐寇內侮事難之間收斂畜産富擬國君劉顯謀逆太祖外幸和辰奉獻明太后歸太祖又得其資用以和辰為內侍長和辰分別公私舊畜頗不會旨太祖由是恨之嶽獨恭慎修謹善處危難之間太祖喜之與王建等俱為外朝大人參預軍國太祖既絶慕容垂以嶽為大人使詣慕容永永服其辭義垂圍永於長子永告急求援嶽與陳留王虔以五萬騎東渡河救之次於秀容破山胡部高車門等徙其部落會永滅乃班師從平中原拜安遠將軍官軍之驚於柏肆也賀蘭部帥附力眷紇突鄰部帥匿物尼紇奚部帥叱奴根等聞之聚黨反於陰館南安公元順討之不克死者數千人太祖聞之詔嶽率萬騎還討叱奴根等殄之百姓乃安離石胡帥呼延鐵西河胡帥張崇等不樂內徙聚黨反叛嶽率騎三千討破之斬鐵擒崇搜山窮討散其餘黨以功賜爵西昌公進號征虜將軍又討反人張超清河太守傅世並破平以嶽為鄴行臺嶽為將有謀略治軍清整常以少擊多士衆服其智勇名冠諸將及罷鄴行臺以所統六郡置相州即拜嶽為刺史公廉平當百姓稱之舊有園池時果初熟丞吏送之嶽不受曰果未進御吾何得先食其謹如此後遷司空嶽兄子路有罪諸父兄弟悉誅特赦嶽父子天賜四年詔賜嶽舍地於南宮嶽將家僮治之候官告嶽衣服鮮麗行止風采擬儀人君太祖時既不豫多所猜惡遂誅之時人咸寃惜焉嶽葬在代西善無之界後世祖討赫連氏經其墓宅愴然動容遂下詔為立廟令一州之民四時致祭求其子孫任為將帥者得其子陵從征有功聽襲爵路皇始初從征慕容寶為城門校尉遷司隸校尉爵高平公而誅賀狄干代人也家本小族世忠厚為將以平當稱稍遷北部大人登國初與長孫嵩為對明於聽察為人愛敬太祖遣狄干致馬千匹結婚於姚萇會萇死興立因止狄干而絶婚興弟平率衆寇平陽太祖討平之擒其將狄伯支唐小方等三十餘人天賜中詔北新侯安同送唐小方於長安後蠕蠕社崘與興和親送馬八千匹始濟河赫連屈孑忿興與國交好乃叛興邀留社崘馬興乃遣使請以駿馬千匹贖伯支而遣狄干還太祖意在離間二寇於是許之狄干在長安幽閉因習讀書史通論語尚書諸經舉止風流有似儒者初太祖普封功臣狄干雖為姚興所留遙賜爵襄武侯加秦兵將軍及狄干至太祖見其言語衣服有類羌俗以為慕而習之故忿焉既而殺之弟歸亦剛直方雅與狄干俱死李栗雁門人也昭成時父祖入國少辨捷有才能兼有將略初隨太祖幸賀蘭部在元從二十一人中太祖愛其藝能時王業草創爪牙心腹多任親近唯栗一介遠寄兼非戚舊當世榮之數有戰功拜左軍將軍太祖征慕容寶栗督五萬騎為前驅軍之所至莫不降下遷左將軍慕容寶棄中山東走也栗以輕騎追之不及而還栗性簡慢矜寵不率禮度每在太祖前舒放倨傲不自祗肅咳唾任情太祖積其宿過天興三年遂誅之於是威嚴始厲制勒羣下盡卑謙之禮自栗始也劉潔長樂信都人也祖父生頗解卜筮昭成時慕容氏來獻女為公主家臣仍隨入朝賜以妻生子父提太祖時官至樂陵太守賜爵信都男卒潔性強力多智數從征討有功進爵會稽公河西胡張外建興王紹等聚黨為逆潔與永安侯魏勤率衆三千人屯于西河以鎮撫之又與勤及功勞將軍元屈等擊吐京叛胡時離石胡出以眷引屈丐騎斷截山嶺邀潔潔失馬登山力戰矢刃俱盡為胡所執送詣屈丐潔聲氣不撓呼其字而與之言神色自若屈丐壯而釋之後得還國典東部事太宗寢疾世祖監國潔與古弼等選侍東宮對綜機要敷奏百揆世祖即位以告反者又獻直言所在合旨奇其有柱石之用委以大任及議軍國朝臣咸推其能於是超遷尚書令改為巨鹿公世祖破蠕蠕大檀于雲中潔言於世祖曰大檀恃衆雖破膽奔北恐不懼往敗將復送死請收田訖復一大舉東西並進為二道討之世祖然其言後大議征討潔言宜先平馮跋世祖不從敕勒新民以將吏侵奪咸出怨言期牛馬飽草當赴漠北潔與左僕射安原奏欲及河冰未解徙之河西冰解之後不得北遁世祖曰不然此等習俗放散日久有似園中之鹿急則衝突緩之則定吾自處之有道不煩徙也潔等固執乃聽分徙三萬餘落於河西西至白鹽池新民驚駭皆曰圈我於河西之中是將殺我也欲西走涼州潔與侍中古弼屯五原河北左僕射安原屯悅拔城北備之既而新民數千騎北走潔追討之走者糧絶相枕而死時南州大水百姓阻飢潔奏曰臣聞天地至公故萬物咸育帝王無私而黎民戴賴伏惟陛下以神武之姿紹重光之緒恢隆大業育濟羣生威之所振無思不服澤之所洽無遠不懷太平之治於是而在自頃邊寇內侵戎車屢駕天資聖明所在克殄方難既平皆蒙酬錫勳高者受爵功卑者獲賞寵賜優崇有過古義而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資自山以東偏遇水害頻年不收就食他所臣聞率土之濱莫非王臣應加哀矜以鴻覆育今南摧強寇西敗醜虜四海晏如人神協暢若與兆民共饗其福則惠感和氣蒼生悅樂矣世祖從之於是復天下一歲租賦潔與樂平王丕督諸軍取上邽軍至啓陽百姓爭致牛酒潔至上邽諸將咸欲斬其豪帥以示王威潔不聽撫慰秦隴秋毫無犯人皆安業世祖將發隴右騎卒東伐高麗潔進曰隴土新民始染大化宜賜優復以饒實之兵馬足食然後可用世祖深納之車駕西伐潔為前鋒沮渠牧犍弟董來率萬餘人拒戰於城南潔信卜者之言日辰不協擊鼓却陳故後軍不進董來得入城世祖微嫌之後潔與建寧王崇督諸軍於三城胡部中簡兵六千將以戍姑臧胡不從命千餘人叛走潔與崇擊誅之虜男女數千人潔朝夕在樞密深見委任性既剛直恃寵自專世祖心稍不平時議伐蠕蠕潔意不欲言於世祖曰虜非有邑居遷徙無常前來出軍無所擒獲不如廣農積穀以待其來羣臣皆從其議世祖決行乃問於崔浩浩固言可伐世祖從浩議既出與諸將期會鹿渾谷而潔恨其計不用欲沮諸將乃矯詔更期故諸將不至時虜衆大亂恭宗欲擊之潔執不可語在帝紀停鹿渾谷六日諸將猶不進賊已遠遁追至石水不及而還師次漠中糧盡士卒多死潔陰使人驚軍勸世祖棄軍輕還世祖不從潔以軍行無功奏歸罪於崔浩世祖曰諸將後期及賊不擊罪在諸將豈在於浩浩又言潔矯詔事遂發輿駕至五原收潔幽之世祖之征也潔私謂親人曰若軍出無功車駕不返者吾當立樂平王潔又使右丞張嵩求圖讖問劉氏應王繼國家後我審有名姓否嵩對曰有姓而無名窮治款引搜嵩家果得讖書潔與南康公狄鄰及嵩等皆夷三族死者百餘人潔既居勢要擅作威福諸阿附者登進忤恨者黜免內外憚之側目而視拔城破國者聚斂財貨與潔分之籍其家産財盈巨萬世祖追忿言則切齒古弼代人也少忠謹好讀書又善騎射初為獵郎使長安稱旨轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其輔佐材也令弼典西部與劉潔等分綰機要敷奏百揆世祖即位以功拜立節將軍賜爵靈壽侯征并州叛胡還進為侍中吏部尚書典南部奏事與安原降東部高車於巳尼陂又與劉潔屯五原河北以備叛民拜安西將軍從征赫連定駕至平涼次于涇南遣弼與侍中張黎擊平涼赫連定自安定率步騎二萬來救與弼等相遇弼偽退以誘之世祖使高車敕勒馳擊定斬首數千級弼乘勝取安定又與永昌王健等討馮文通文通嬰城固守弼芟其禾而還後又征文通文通求救於高麗高麗救至文通將東奔民多難之其大臣古碸因民心之不欲遂率衆攻文通開城門以引官軍弼疑古碸譎詐不入城高麗軍至文通乃隨之文通之奔也令婦人被甲居中其精卒及高麗陳兵於外弼部將高苟子率騎衝擊賊軍弼酒醉拔刀止之故文通得東奔將士皆怨弼不擊世祖大怒徵還黜為廣夏門卒尋復為侍中與尚書李順使于涼州拜安西將軍賜爵建興公鎮長安甚著威名及議征涼州弼與順咸言涼州乏水草不宜行師世祖不從既克姑臧微嫌之以其有將略故弗之責也劉義隆遣將裴方明等擊南秦王楊難當難當遣使請救兵未至難當奔上邽方明克仇池立楊玄庶子保熾於是假弼節督隴右諸軍義隆遣其秦州刺史胡崇之屯仇池弼與平西將軍元齊邀崇之於濁水臨陳擒之其衆走還漢中弼等從祥郊山南入與東道將皮豹子等討仇池遣永安侯賀純攻義隆塞狹道守將薑道祖退守狹亭諸將以山道嶮峻時又雪深用馬不便皆遲留不進弼獨進軍使元齊賀純等擊狹亭道祖南走仇池平未幾諸氐復推楊文德為主圍仇池弼發上邽高平汧城諸軍討之仇池圍解文德走漢川時豹子督關中諸軍次於下辨聞仇池圍解議欲還軍弼使謂豹子曰比連破賊軍恐彼君臣未體大分其負敗或來報復若其班師寇衆復至後舉為難不如繕兵練甲蓄力待之不出秋冬南寇必來以逸待勞百勝之策豹子乃止世祖聞之曰弼之言長策也制南秦弼謀多矣恭宗總攝萬幾徵為東宮四輔與宜都王穆壽等並參政事詔以弼保傅東宮有老成之勤賜帛千匹綿千斤遷尚書令弼雖事務殷湊而讀書不輟端謹慎密口不言禁中之事功名等於張黎而廉不及也上谷民上書言苑囿過度民無田業乞減太半以賜貧人弼覽見之入欲陳奏遇世祖與給事中劉樹志不聽事弼侍坐良久不獲申聞乃起於世祖前捽樹頭掣下床以手搏其耳以拳毆其背曰朝廷不治實爾之罪世祖失容放曰不聽奏事實在朕躬樹何罪置之弼具狀以聞世祖奇弼公直皆可其所奏以丐百姓弼曰為臣而逞其志於君前者非無罪也乃詣公車免冠徒跣自劾請罪世祖遣使者召之及至世祖曰卿其冠履吾聞築社之役蹇蹶而築之端冕而事之神與之福然則卿有何罪自今以後苟利社稷益國便民者雖復顛沛造次卿則為之無所顧也世祖大閲將校獵於河西弼留守詔以肥馬給騎人弼命給弱者世祖大怒曰尖頭奴敢裁量朕也朕還臺先斬此奴弼頭尖世祖常名之曰筆頭是以時人呼為筆公弼屬官惶怖懼誅弼告之曰吾以為事君使畋獵不適盤遊其罪小也不備不虞使戎寇恣逸其罪大也今北狄孔熾南虜未滅狡焉之志窺伺邊境是吾憂也故選肥馬備軍實為不虞之遠慮苟使國家有利吾何避死乎明主可以理干此自吾罪非卿等之咎世祖聞而歎曰有臣如此國之寶也賜衣一襲馬二匹鹿十頭後車駕畋於山北大獲麋鹿數千頭詔尚書發車牛五百乘以運之世祖尋謂從者曰筆公必不與我汝輩不如馬運之速遂還行百餘里而弼表至曰今秋穀懸黃麻菽布野豬鹿竊食鳥雁侵費風波所耗朝夕參倍乞賜矜緩使得收載世祖謂左右曰筆公果如朕所卜可謂社稷之臣初楊難當之來也詔弼悉送其子弟於京師楊玄小子文德以黃金四十斤賂弼弼受金留文德而遇之無禮文德亡入劉義隆世祖以其正直有戰功弗加罪責也世祖崩吳王立以弼為司徒高宗即位與張黎並坐議不合旨俱免有怨謗之言其家人告巫蠱俱伏法時人寃之張黎雁門平原人也善書計太祖知待之太宗器其忠亮賜爵廣平公管綜機要世祖以其功舊任以輔弼除大司農卿軍國大議黎常與焉加鎮北將軍以征赫連定功進號征北大將軍與樂安王範濟南公崔徽鎮長安清約公平甚著聲稱代下之日家無餘財世祖詔黎領兵一萬二千人通莎泉道車駕征涼州蠕蠕吳提乘虛入寇黎與司空道生拒擊之恭宗初總百揆黎與東郡公崔浩等輔政忠於奉上非公事不言詔曰侍中廣平公黎東郡公浩等保傅東宮有老成之勤朕甚嘉焉其賜布帛各千匹以褒舊勳恭宗薨於東宮黎兼太尉持節奉策諡焉吳王余立以黎為太尉後以議不合旨免仍與古弼並誅史臣曰和跋奚牧莫題賀狄干李栗劉潔等並有忠勤征伐之效任遇仍優俱至誅滅嶽見紀危難之中受事草創之際智勇既申功名尤舉乃將之材弼謀軍輔國遠略正情有柱石之量張黎誠謹兼方功舊見重纖介之間一朝殞覆宥及十世乃徒言爾惜乎
