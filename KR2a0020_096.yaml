body:
  text: 魏書卷九十列傳逸士第七十八眭夸馮亮李謐鄭脩蓋兼濟獨善顯晦之殊其事不同由來久矣昔夷齊獲全於周武華矞不容於太公何哉求其心者許以激貪之用督其迹者以為束教之風而肥遁不反代有人矣夷情得喪忘懷累有比夫邁德弘道匡俗庇民可得而小不可得而忽也自叔世澆浮淳風殆盡錐刀之末競入成羣而能冥心物表介然離俗望古獨適求友千齡亦異人矣何必御霞乘雲而追日月窮極天地始為超遠哉今錄眭夸等為逸士傳眭夸一名昶趙郡高邑人也祖邁晉東海王越軍謀掾後沒石勒為徐州刺史父邃字懷道慕容寶中書令夸少有大度不拘小節耽志書傳未曾以世務經心好飲酒浩然物表年二十遭父喪鬚鬢致白每一悲哭聞者為之流涕高尚不仕寄情丘壑同郡李順願與之交夸拒而不許邦國少長莫不憚之少與崔浩為莫逆之交浩為司徒奏徵為其中郎辭疾不赴州郡逼遣不得已入京都與浩相見延留數日惟飲酒談平生不及世利浩每欲論屈之竟不能發言其見敬憚如此浩後遂投詔書於夸懷亦不開口夸曰桃簡卿已為司徒何足以此勞國士也吾便於此將別桃簡浩小名也浩慮夸即還時乘一騾更無兼騎浩乃以夸騾內之中冀相維縶夸遂託鄉人輸租者謬為御車乃得出關浩知而歎曰眭夸獨行士本不應以小職辱之又使其人仗策復路吾當何辭以謝也時朝法甚峻夸既私還將有私歸之咎浩仍相左右始得無坐經年送夸本騾兼遺以所乘馬為書謝之夸更不受其騾馬亦不復書及浩誅為之素服受鄉人弔唁經一時乃止歎曰崔公既死誰能更容眭夸遂作朋友篇辭義為時人所稱婦父鉅鹿魏攀當時名達之士未嘗備壻之禮情同朋好或人謂夸曰吾聞有大才者必居貴仕子何獨在桑榆乎遂著知命論以釋之年七十五卒葬日赴會者如市無子馮亮字靈通南陽人蕭衍平北將軍蔡道恭之甥也少博覽諸書又篤好佛理隨道恭至義陽會中山王英平義陽而獲焉英素聞其名以禮待接亮性清淨至洛隱居崧高感英之德以時展勤及英亡亮奔赴盡其哀慟世宗嘗召以為羽林監領中書舍人將令侍講十地諸經固辭不拜又欲使衣幘入見亮苦求以幅巾就朝遂不強逼還山數年與僧徒禮誦為業蔬食飲水有終焉之志會逆人王敞事發連山中沙門而亮被執赴尚書省十餘日詔特免雪亮不敢還山遂寓居景明寺敕給衣食及其從者數人後思其舊居復還山室亮既雅愛山水又兼巧思結架巖林甚得栖游之適頗以此聞世宗給其工力令與沙門統僧暹河南尹甄琛等周視崧高形勝之處遂造閑居佛寺林泉既奇營製又美曲盡山居之妙亮時出京師延昌二年冬因遇篤疾世宗敕以馬輿送令還山居崧高道場寺數日而卒詔贈帛二百匹以供凶事遺誡兄子綜斂以衣左手持板右手執孝經一卷置尸盤石上去人數里外積十餘日乃焚於山以灰燼處起佛塔經藏初亮以盛冬喪時連日驟雪窮山荒澗鳥獸飢窘僵尸山野無所防護時壽春道人惠需每旦往看其屍拂去塵霰禽蟲之迹交橫左右而初無侵毀衣服如本惟風吹巾又以亮識舊南方法師信大栗十枚言期之將來十地果報開亮手以置把中經宿乃為蟲鳥盜食皮殼在地而亦不傷肌體焚燎之日有素霧蓊鬱迴繞其傍自地屬天彌朝不絕山中道俗營助者百餘人莫不異焉李謐字永和趙郡人相州刺史安世之子少好學博通諸經周覽百氏初師事小學博士孔璠數年後璠還就謐請業同門生為之語曰青成藍藍謝青師何常在明經謐以公子徵拜著作佐郎辭以授弟郁詔許之州再舉秀才公府二辟並不就惟以琴書為業有絕世之心覽考工記大戴禮盛德篇以明堂之制不同遂著明堂制度論曰余謂論事辨物當取正於經典之真文援證定疑必有驗於周孔之遺訓然後可以稱準的矣今禮文殘缺聖言靡存明堂之制誰使正之是以後人紛糾競興異論五九之說各信其習是非無準得失相半故歷代紛紜靡所取正乃使裴頠云今羣儒紛糾互相掎摭就令其象可得而圖其所以居用之禮莫能通也為設虛器耳況漢氏所作四維之个復不能令各處其辰愚以為尊祖配天其儀明著廟宇之制理據未分直可為殿屋以崇嚴父之祀其餘雜碎一皆除之斯豈不以羣儒舛互並乖其實據義求衷莫適可從哉但恨典文殘滅求之靡據而已矣乃復遂去室牖諸制施之於教未知其所隆政求之於情未可喻其所以必須惜哉言乎仲尼有言曰賜也爾愛其羊我愛其禮余以為隆政必須其禮豈彼一羊哉推此而論則聖人之於禮殷勤而重之裴頠之於禮任意而忽之是則頠賢於仲尼矣以斯觀之裴氏之子以不達而失禮之旨也余竊不自量頗有鄙意據理尋義以求其真貴合雅衷不苟偏信乃藉之以禮傳考之以訓注博採先賢之言廣搜通儒之說量其當否參其同異棄其所短收其所長推義察圖以折厥衷豈敢必善聊亦合其言志矣凡論明堂之制者雖衆然校其大略則二途而已言五室者則據周禮考工之記以為本是康成之徒所執言九室者則案大戴盛德之篇以為源是伯喈之倫所持此之二書雖非聖言然是先賢之中博見洽通者也但各記所聞未能全正可謂既盡美矣未盡善也而先儒不能考其當否便各是所習卒相非毀豈達士之確論哉小戴氏傳禮事四十九篇號曰禮記雖未能全當然多得其衷方之前賢亦無愧矣而月令玉藻明堂三篇頗有明堂之義余故採掇二家參之月令以為明堂五室古今通則其室居中者謂之太室太室之東者謂之青陽當太室之南者謂之明堂當太室之西者謂之總章當太室之北者謂之玄堂四面之室各有夾房謂之左右个三十六戶七十二牖矣室个之形今之殿前是其遺像耳个者即寢之房也但明堂與寢施用既殊故房个之名亦隨事而遷耳今粗書其像以見鄙意案圖察義略可驗矣故檢之五室則義明於考工校之戶牖則數協於盛德考之施用則事著於月令求之閏也合周禮與玉藻既同夏殷又符周秦雖乖衆儒儻或在斯矣考工記曰周人明堂度以九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵余謂記得之於五室而謬於堂之修廣何者當以理推之令愜古今之情也夫明堂者蓋所以告月朔布時令宗文王祀五帝者也然營構之範自當因宜創制耳故五室者合於五帝各居一室之義且四時之祀皆據其方之正又聽朔布令咸得其月之辰可謂施政及祀二三俱允求之古義竊為當矣鄭康成漢末之通儒後學所宗正釋五室之位謂土居中木火金水各居四維然四維之室既乖其正施令聽朔各失厥衷左右之个棄而不顧乃反文之以美說飾之以巧辭言水木用事交於東北木火用事交於東南火土用事交於西南金水用事交於西北既依五行當從其方用事之交出何經典可謂攻於異端言非而博疑誤後學非所望於先儒也禮記玉藻曰天子聽朔於南門之外閏月則闔門左扉立於其中鄭玄注曰天子之廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月聽其朔於明堂門下還處路寢門終月也而考工記周人明堂玄注曰或舉王寢或舉明堂互言之以明其制同也其同制之言皆出鄭注然則明堂與寢不得異矣而尚書顧命篇曰迎子釗南門之外延入翼室此之翼室即路寢矣其下曰大貝賁鼓在西房垂之竹矢在東房此則路寢有左右房見於經史者也禮記喪大記曰君夫人卒於路寢小斂婦人髽帶麻於房中鄭玄注曰此蓋諸侯禮帶麻於房中則西房天子諸侯左右房見於注者也論路寢則明其左右房言明堂則闕其左右个同制之說還相矛盾通儒之注何其然乎使九室之徒奮筆而爭鋒者豈不由處室之不當哉記云東西九筵南北七筵五室凡室二筵置五室於斯堂雖使班倕構思王爾營度則不能令三室不居其南北也然則三室之間便居六筵之地而室壁之外裁有四尺五寸之堂焉豈有天子布政施令之所宗祀文王以配上帝之堂周公負扆以朝諸侯之處而室戶之外僅餘四尺而已哉假在儉約為陋過矣論其堂宇則偏而非制求之道理則未愜人情其不然一也余恐為鄭學者苟求必勝競生異端以相訾抑云二筵者乃室之東西耳南北則狹焉余故備論之曰若東西二筵則室戶之外為丈三尺五寸矣南北戶外復如此則三室之中南北裁各丈二尺耳記云四旁兩夾窗若為三尺之戶二尺之窗窗戶之間裁盈一尺繩樞甕牖之室蓽門圭竇之堂尚不然矣假令復欲小廣之則四面之外闊狹不齊東西既深南北更淺屋宇之制不為通矣驗之衆塗略無算焉且凡室二筵丈八地耳然則戶牖之間不踰二尺也禮記明堂天子負斧扆南向而立鄭玄注曰設斧於戶牖之間而鄭氏禮圖說扆制曰縱廣八尺畫斧文於其上今之屏風也以八尺扆置二尺之間此之叵通不待智者較然可見矣且若二筵之室為四尺之戶則戶之兩頰裁各七尺耳全以置之猶自不容矧復戶牖之間哉其不然二也又復以世代檢之即虞夏尚朴殷周稍文制造之差每加崇飾而夏后世室堂修二七周人之制反更促狹豈是夏禹卑宮之意周監郁郁之美哉以斯察之其不然三也又云堂崇一筵便基高九尺而壁戶之外裁四尺五寸於營制之法自不相稱其不然四也又云室中度以几堂上度以筵而復云凡室二筵而不以几還自相違其不然五也以此驗之記者之謬抑可見矣盛德篇云明堂凡九室三十六戶七十二牖上員下方東西九仞南北七筵堂高三尺也余謂盛德篇得之於戶牖失之於九室何者五室之制傍有夾房面各有戶戶有兩牖此乃因事立則非拘異術戶牖之數固自然矣九室者論之五帝事既不合施之時令又失其辰左右之个重置一隅兩辰同處參差出入斯乃義無所據未足稱也且又堂之修廣裁六十三尺耳假使四尺五寸為外之基其中五十四尺便是五室之地計其一室之中僅可一丈置其戶牖則於何容之哉若必小而為之以容其數則令帝王側身出入斯為怪矣此匪直不合典制抑亦可哂之甚也余謂其九室之言誠亦有由然竊以為戴氏聞三十六戶七十二牖弗見其制靡知所置便謂一室有四戶之窗計其戶牖之數即以為九室耳或未之思也蔡伯喈漢末之時學士而見重於當時即識其修廣之不當而必未思其九室之為謬更修而廣之假其法像可謂因偽飾辭順非而澤諒可歎矣余今省彼衆家委心從善庶探其衷不為苟異但是古非今俗間之常情愛遠惡近世中之事而千載之下獨論古制驚俗之談固延多誚脫有深賞君子者覽而揣之儻或存焉謐不飲酒好音律愛樂山水高尚之情長而彌固一遇其賞悠爾忘歸乃作神士賦歌曰周孔重儒教莊老貴無為二途雖如異一是買聲兒生乎意不愜死名用何施可心聊自樂終不為人移脫尋余志者陶然正若斯延昌四年卒年三十二遐邇悼惜之其年四門小學博士孔璠等學官四十五人上書曰竊見故處士趙郡李謐十歲喪父哀號罷隣人之相幼事兄瑒恭順盡友于之誠十三通孝經論語毛詩尚書歷數之術尤盡其長州閭鄉黨有神童之號年十八詣學受業時博士即孔璠也覽始要終論端究緒授者無不欣其言矣於是鳩集諸經廣校同異比三傳事例名春秋叢林十有二卷為璠等判析隱伏垂盈百條滯無常滯纖毫必舉通不長通有枉斯屈不苟言以違經弗飾辭而背理辭氣磊落觀者忘疲每曰丈夫擁書萬卷何假南面百城遂絕跡下幃杜門却掃棄產營書手自刪削卷無重複者四千有餘矣猶括次專家搜比讜議隆冬達曙盛暑通宵雖仲舒不闚園君伯之閉戶高氏之遺漂張生之忘食方之斯人未足為喻謐嘗詣故太常卿劉芳推問音義語及中代興廢之由芳乃歎曰君若遇高祖侍中太常非僕有也前河南尹黃門侍郎甄琛內贊近機朝野傾目于時親識求官者答云趙郡李謐耽學守道不悶于時常欲致言但未有次耳諸君何為輕自媒衒謂其子曰昔鄭玄盧植不遠數千里詣扶風馬融今汝明師甚邇何不就業也又謂朝士曰甄琛行不媿時但未薦李謐以此負朝廷耳又結宇依巖憑崖鑿室方欲訓彼青衿宣揚墳典冀西河之教重興北海之風不墜而祐善空聞暴疾而卒邦國銜殄悴之哀儒生結摧梁之慕況璠等或服議下風或親承音旨師儒之義其可默乎事奏詔曰謐屢辭徵辟志守沖素儒隱之操深可嘉美可遠傍惠康近準玄晏諡曰貞靜處士并表其門閭以旌高節遣謁者奉冊於是表其門曰文德里曰孝義云鄭脩北海人也少隱於岐南几谷中依巖結宇獨處淡然屏迹人事不交世俗耕食水飲皮冠草服雅好經史專意玄門前後州將每徵不至岐州刺史魏蘭根頻遣致命脩不得已暫出見蘭根尋還山舍蘭根申表薦脩肅宗詔付雍州刺史蕭寶夤訪實以聞會寶夤作逆事不行史臣曰古之所謂隱逸者非伏其身而不見也非閉其言而不出也非藏其智而不發也蓋以恬淡為心不曒不昧安時處順與物無私者也眭夸輩忘懷纓冕畢志丘園或隱不違親貞不絕俗或不教而勸虛往實歸非有自然純德其孰能至於此哉
