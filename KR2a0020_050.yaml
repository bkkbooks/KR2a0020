body:
  text: 魏書卷四十五列傳第三十三韋閬杜銓裴駿辛紹先柳崇韋閬字友觀京兆杜陵人世為三輔冠族袓楷晉建威將軍長樂清河二郡太守父逵慕容垂吏部郎大長秋卿閬少有器望值慕容氏政亂避地於薊城世祖徵拜咸陽太守轉武都太守屬杏城鎮將郝溫及蓋吳反關中擾亂閬盡心撫納所部獨全在郡十六年卒子範歷鎮西大將軍府司馬試守華山郡高宗時賜爵興平男卒子俊字穎超早有學識少孤事祖母以孝聞性溫和廉讓為州里所稱太和中襲爵除荊州治中轉梁州寧朔府長史還為太尉外兵參軍本州中正遷都水使者所在有聲世宗崩領軍于忠矯擅威刑與左僕射郭祚尚書裴植同時遇害語在植傳時年五十七俊與祚婚家為忠所惡故及於難臨終俊訴枉於尚書元欽欽知而不敢申理俊歎曰吾一生為善未蒙善報常不為惡今為惡終悠悠蒼天抱直無訴時人咸怨傷焉熙平元年追贈中壘將軍洛州刺史諡曰貞有子十三人長子榮緒字子光頗涉文史襲爵除員外散騎侍郎齊王蕭寶夤儀同開府屬因戰敗歿榮緒弟榮茂字子曄以幹局知名歷侍御史尚書考功郎中出為征虜將軍東秦州刺史永熙末兄弟並歿關西榮茂弟子粲為寶炬南汾州刺史子粲少弟道諧為南汾州鎮城都督齊獻武王命將出討陷城克之武定末子粲官至南兗州刺史閬兄子真喜起家中書博士遷中書侍郎馮翊太守子祉卒於太府少卿祉子義遠出帝時為岐州刺史沒關西祉弟禎有識幹起家奉朝請尚書郎中司徒主簿太子中舍人廷尉少卿給事黃門侍郎光祿大夫卒贈安西將軍秦州刺史子文殊員外散騎侍郎早卒閬從叔道福父羆為苻堅丞相王猛所器重以女妻焉為堅東海太守堅滅奔江左仕劉裕為輔國將軍秦州刺史道福有志略歷劉駿盱眙南沛二郡太守領鎮北府録事參軍時徐州刺史薛安都謀欲擁州內附道福參贊其事以功除安遠將軍賜爵高密侯因此仍家於彭城卒贈征虜將軍兗州刺史諡曰簡子欣宗以歸國勳別賜爵杜縣侯高祖初拜彭城內史遷大將軍宋王劉昶咨議參軍廣陵侯元衍為徐州刺史又請為長史帶彭城內史撫綏內外甚得民和世宗初除通直散騎常侍出為河北太守不行尋轉太中大夫行幽州事卒贈龍驤將軍南兗州刺史諡曰簡子元睿武定中潁州驃騎府長史欣宗從父弟合宗卒於東海太守子元恢有氣幹孝昌初值刺史元法僧據州外叛元恢招聚同志潛規克復事泄為法僧所害時人傷惜之閬從子崇字洪基父肅字道壽劉義真鎮關中辟為主簿仍隨義真度江歷魏郡弋陽二郡太守豫州刺史崇年十歲父卒母鄭氏以入國因寓居河洛少為舅兗州刺史鄭羲所器賞解褐中書博士轉司徒從事中郎高祖納其女為充華嬪除南潁川太守不好發摘細事常云何用小察以傷大道吏民感之郡中大治高祖聞而嘉賞賜帛二百匹遷洛以崇為司州中正尋除右將軍咸陽王禧開府從事中郎復為河南邑中正崇頻居衡品以平直見稱出為鄉郡太守更滿應代吏民詣闕乞留復延三年在郡九年轉司徒咨議久之除華山太守卒子猷之釋褐奉朝請轉給事中步兵校尉稍遷前將軍太中大夫卒猷之弟休之起家安州左將軍府城局參軍轉給事中河南邑中正稍遷安西將軍光祿大夫休之貞和自守未嘗以言行忤物卒子道建武定末定州儀同開府長史帶中山太守道建弟道儒齊文襄王大將軍府東閣祭酒閬族弟珍字靈智高祖賜名焉父尚字文叔樂安王良安西府從事中郎卒贈安遠將軍雍州刺史珍少有志操解褐京兆王子推常侍轉尚書南部郎高祖初蠻首桓誕歸款朝廷思安邊之略以誕為東荊州刺史令珍為使與誕招慰蠻左珍自懸瓠西入三百餘里至桐柏山窮淮源宣揚恩澤莫不降附淮源舊有祠堂蠻俗用人祭之珍乃曉告曰天地明靈即是民之父母豈有父母甘子肉味自今已後悉宜以酒脯代用羣蠻從約至今行之凡所招降七萬餘戶置郡縣而還以奉使稱旨除左將軍樂陵鎮將賜爵霸城子蕭道成司州民謝天蓋自署司州刺史規欲以州內附事泄為道成將崔慧景攻圍詔珍率在鎮士馬渡淮援接時道成聞珍將至遣將苟元賓據淮逆拒珍乃分遣鐵馬於上流潛渡親率步士與賊對接旗鼓始交甲騎奄至腹背奮擊破之天蓋尋為左右所殺降於慧景珍乘勝馳進又破慧景擁降民七千餘戶內徙表置城陽剛陵義陽三郡以處之高祖詔珍移鎮比陽蕭賾遣其雍州刺史陳顯達率衆來寇城中將士咸欲出戰珍曰彼初至氣鋭未可便挫且共堅守待其攻我疲弊擊之未晚於是憑城拒戰殺傷甚衆相持旬有二日夜開城門掩擊之賊遂奔潰以功進爵為侯車駕南討珍上便宜并自陳在邊歲久悉其要害願為前驅詔珍為隴西公源懷衛大將軍府長史轉太保齊郡王長史遷顯武將軍郢州刺史在州有聲績朝庭嘉之遷龍驤將軍賜驊騮二匹帛五十匹穀三百斛珍乃召集州內孤貧者謂曰天子以我能綏撫卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之尋加平南將軍荊州刺史與尚書盧淵征赭陽為蕭鸞將垣歷生蔡道貴所敗免歸鄉里臨別謂淵曰主上聖明志吞吳會用兵機要在於上流若有事荊楚恐老夫復不得停耳後車駕征樊郢復起珍為中軍大將軍彭城王協長史沔北既平以珍為建威將軍試守魯陽郡高祖復南伐路經珍郡加中壘將軍正太守珍從至濟水高祖曰朕頃戎車再駕卿常翼務中軍今日之舉亦欲與卿同行但三餢險惡非卿無以守也因敕珍辭還及高祖崩於行宮祕匿而還至珍郡始發大諱還除中散大夫尋加鎮遠將軍太尉咨議參軍永平元年卒時年七十四贈本將軍南青州刺史諡曰懿長子纘字遵彥年十三補中書學生聰敏明辨為博士李彪所稱除祕書中散遷侍御中散高祖每與名德沙門談論往復纘掌綴録無所遺漏頗見知賞轉散騎侍郎徙太子中舍人仍兼黃門又兼司徒右長史尋轉長兼尚書左丞壽春內附尚書令王肅出鎮揚州請纘為長史加平遠將軍帶梁郡太守肅薨敕纘行州事任城王澄代肅為州復啓纘為長史澄出征之後蕭衍將薑慶真乘虛攻襲遂據外郭雖尋克復纘坐免官永平三年卒年四十五纘弟彧字遵慶亦有學識解褐奉朝請遷太尉騎兵參軍出為雍州治中轉別駕入為司徒掾尋轉散騎侍郎稍遷平遠將軍東豫州刺史彧綏懷蠻左頗得其心蠻首田益宗子魯生魯賢先叛父南入數為寇掠自彧至州魯生等咸箋啓修敬不復為害彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教又於城北置宗武館以習武焉境內清肅還遇大將軍京兆王繼西征請為長史拜通直散騎常侍尋以本官兼尚書為豳夏行臺以功封陰盤縣開國男邑二百戶孝昌元年秋卒於長安贈撫軍將軍雍州刺史諡曰文子彪襲歷本州治中轉別駕孝莊末藍田太守沒於關西彪弟融解褐員外散騎侍郎以軍功賜爵長安伯稍遷大司馬開府司馬融娶司農卿趙郡李瑾女天平中疑其妻與章武王景哲姦通乃刺殺之懼不免仍亦自害彧弟朏字遵顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活甚衆解褐太學博士遷祕書郎中稍遷左軍將軍為荊郢和糴大使南郢州刺史田夷啓稱朏父珍往任荊州恩洽夷夏乞朏充南道別將領荊州驍勇共為腹背詔從之未幾行南荊州事肅宗末除征虜將軍東徐州刺史尋遷安東將軍加散騎常侍蕭衍遣其郢州刺史田粗憘率衆來寇朏於石羊岡破斬之以功封杜縣開國子邑二百戶永安三年卒於州贈侍中車騎將軍雍州刺史諡曰宣長子鴻字道衍頗有幹用解褐奉朝請遷尚書令吏部郎中中書舍人天平三年坐漏泄賜死於家時年三十二鴻弟道植武定末儀同開府中兵參軍太祖時有安定梁穎先仕慕容寶歷黃門郎入國拜建德太守賜爵朝那男孫景俊起家趙郡王幹行參軍稍遷治書侍御史司徒中兵參軍卒子師禮早卒師禮族弟嵩遵少有氣俠起家奉朝請歷司空外兵參軍後蕭寶夤為雍州刺史引為中兵參軍深見信任寶夤反令嵩遵率衆出征嵩遵偽受其署既行之後遂與侯終德等還來襲城以功封烏氏縣開國伯邑五百戶後除光州平東府長史轉荊州驃騎府司馬卒官年四十四嵩遵弟嵩景武定中燕郡太守又有武功蘇湛字景俊魏侍中則之後也晉亂避地河右世祖平涼州還鄉里父擁字天祐秦州撫軍府司馬湛少有器行頗涉羣書年二十餘舉秀才除奉朝請領侍御史轉員外散騎侍郎蕭寶夤之討關西以湛為行臺郎中深見委任孝昌中寶夤大敗東還朝廷以為雍州刺史後自猜懼害中尉酈道元乃稱兵反時湛臥疾於家寶夤令薑儉報湛云元略受蕭衍意旨乃欲見除酈道元之來事不可測吾不能坐受死亡今便為身計不復作魏臣也與卿契闊故以相報死生榮辱與君共之湛聞之舉聲大哭儉遽止之曰何得便爾湛曰百口居家即時屠滅云何不哭哭數十聲徐謂儉曰為我白齊王王本以窮鳥投人賴朝廷假王羽翼榮寵至此屬國步多虞不能竭忠報德乃欲乘人間隙有不臧之心信惑行路無識之語欲以羸敗之兵守關問鼎今魏德雖衰天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口居家為王族滅寶夤復報曰此自救命之計不得不爾所以不先相白者恐沮吾計故爾湛復曰凡為大事當得天下奇士今但共長安博徒小兒輩計校辦有成理不湛恐荊棘必生庭閣願乞骸骨還鄉里脫得因此病死可以下見先人寶夤素重之以湛病且知不為己用聽還武功寶夤敗莊帝即位徵補尚書郎既至莊帝曰前聞卿答蕭寶夤甚有美辭為我説也湛頓首謝曰臣雖言辭不如伍被始終不易自謂過之然臣與寶夤周遊契闊言得盡心而不能令其不反臣之罪也莊帝悅拜散騎都尉仍領郎尋遷中書侍郎出帝初病還鄉里終於家贈散騎常侍鎮西將軍雍州刺史湛從母弟天水薑儉字文簡父昭自平憲司直出為兗州安東長史帶高平太守卒於營構都將儉少有幹用勤濟過人起家徐州車騎府田曹參軍轉太尉外兵參軍蕭寶夤出討關西引為開府屬軍機謀略多所參預儉亦自謂遭逢知己遂竭誠委託寶夤為雍州仍請為開府從事中郎帶長安令及寶夤反以為左丞尤見信任為羣下所讎疾寶夤敗城人殺之時年三十九蘇湛每謂人曰以薑儉才志堪致富貴惜其不遇命也如何儉弟素武定末中散大夫杜銓字士衡京兆人晉征南將軍預五世孫也祖胄苻堅太尉長史父嶷慕容垂祕書監仍僑居趙郡銓學涉有長者風與盧玄高允等同被徵為中書博士初密太后父豹喪在濮陽世祖欲命迎葬於鄴謂司徒崔浩曰天下諸杜何處望高浩對京兆為美世祖曰朕今方改葬外祖意欲取京兆中長老一人以為宗正命營護凶事浩曰中書博士杜銓其家今在趙郡是杜預之後於今為諸杜之最即可取之詔召見銓器貌瓌雅世祖感悅謂浩曰此真吾所欲也以為宗正令與杜超子道生迎豹喪柩致葬鄴南銓遂與超如親超謂銓曰既是宗近何緣復僑居趙郡乃迎引同屬魏郡焉遷散騎侍郎轉中書侍郎賜爵新豐侯卒贈平南將軍相州刺史魏縣侯諡曰宣子振字季元太和初舉秀才卒於中書博士子遇字慶期起家奉朝請轉員外散騎侍郎尚書起部郎中竊官材瓦起立私宅清論鄙之遷龍驤將軍中散大夫出為河東太守卒贈中軍將軍都官尚書豫州刺史諡曰惠子鴻永熙中司徒倉曹參軍銓族子洪太字道廓延興中為中書博士後使高麗除安遠將軍下邳太守轉梁郡太守太和中除鷹揚將軍絳城鎮將帶新昌陽平二郡太守卒年五十二子祖悅字士豁頗有識尚大將軍劉昶參軍事稍遷天水仇池二郡太守行南秦州事正光中入為太尉汝南王悅咨議參軍出除高陽太守卒於郡子長文字子儒肅宗挽郎員外散騎侍郎稍遷尚書郎以隨叔顒守岐州勳賜爵始平伯加平東將軍天平末卒於安西將軍光祿大夫贈中軍將軍度支尚書雍州刺史長文第四弟子達武定中齊文襄王大都督府戶曹參軍祖悅弟顒字思顏頗有幹用解褐北中府録事參軍正光中稍遷厲威將軍盱眙太守帶大徐戍主元法僧之叛也顒逃竄獲免後為諫議大夫孝昌二年為西征軍司行岐州事蕭寶夤起逆顒據州不從還除征虜將軍東荊州刺史以守岐州勳封平陽縣開國伯邑五百戶武泰中轉授岐州刺史永安中除涇州刺史時万俟醜奴充斥關右不行乃為都督防守岐州醜奴攻之不克事寧除鎮西將軍光祿大夫以勳又賞安平縣開國伯食邑五百戶以平陽伯轉授弟二子景仲後為征西將軍金紫光祿大夫沒於關西裴駿字神駒小名皮河東聞喜人父雙碩本縣令假建威將軍農太守安邑子卒贈平南將軍東雍州刺史聞喜侯駿幼而聰慧親表異之稱為神駒因以為字弱冠通涉經史好屬文性方檢有禮度鄉里宗敬焉蓋吳作亂於關中汾陰人薛永宗聚衆應之屢殘破諸縣來襲聞喜縣中先無兵仗人情駭動縣令憂惶計無所出駿在家聞之便率厲鄉豪曰在禮君父有危臣子致命府縣今為賊所逼是吾等徇節之秋諸君可不勉乎諸豪皆奮激請行駿乃簡騎驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以狀表聞會世祖親討蓋吳引見駿駿陳事宜甚會機理世祖大悅顧謂崔浩曰裴駿有當世才具且忠義可嘉補中書博士浩亦深器駿目為三河領袖轉中書侍郎劉駿遣使明僧皓朝貢以駿有才學乃假給事中散騎常侍於境上勞接皇興二年卒贈平南將軍秦州刺史聞喜侯諡曰康子修字元寄清辨好學年十三補中書學生遷祕書中散轉主客令以婦父李欣事出為張掖子都大將張掖境接胡夷前後數致寇掠修明設烽候以方略禦之在邊六年關塞清靜高祖嘉之徵為中部令轉中大夫兼祠部曹事職主禮樂每有疑議修斟酌故實咸有條貫太和十六年卒時年五十一高祖悼惜之賻帛一百匹諡曰恭伯世宗時追贈輔國將軍東秦州刺史修早孤居喪以孝聞二弟三妹並在幼弱撫養訓誨甚有義方次弟務早喪修哀傷之感於行路愛育孤姪同於己子及將異居奴婢田宅悉推與之時人以此稱焉子詢字敬叔美儀貌多藝能音律博奕咸所開解起家奉朝請太尉集曹參軍轉長流尚書起部郎中平昌太守時太原長公主寡居與詢私姦肅宗仍詔詢尚焉尋以主壻特除散騎常侍時本邑中正闕司徒召詢為之詢族叔昞自陳情願此官詢遂讓焉時論善之尋監起居事遷祕書監出為平南將軍郢州刺史詢以凡司戍主蠻酋田朴特地居要險衆踰數萬足為邊捍遂表朴特為西郢州刺史朝議許之蕭衍遣將李國興寇邊時四方多事朝廷未遑外略緣境城戍多為國興所陷賊既乘勝遂向州城詢率厲固守垂將百日援軍既至賊乃退走加散騎常侍安南將軍朴特自國興來寇便與詢掎角為表𩹉聲援郢州獲全朴特頗有力焉徵為七兵尚書至都未幾除豫州刺史尋進號撫軍將軍加散騎常侍未之州還為七兵尚書常侍如故武泰初詔詢以本官兼侍中為關右大使賞擢慕義之徒未及發會爾朱榮入洛於河陰遇害年五十一贈侍中車騎大將軍司空公雍州刺史諡曰貞烈無子修弟務字陽仁少而聰慧舉秀才州辟主簿早卒子美字師伯少有美名舉秀才州主簿太尉咸陽王雅相賞愛欲以女妻之美拒而不納除奉朝請亦早卒無子務弟宣字叔令通辨博物早有聲譽少孤事母兄以孝友稱舉秀才至都見司空李欣與言自旦及夕欣嗟善不已司空李沖有人倫鑒識見而重之高祖初徵為尚書主客郎與蕭賾使顏幼明劉思效蕭琛范雲等對接轉都官郎遷員外散騎侍郎舊令與吏部郎同班闕高祖曾集沙門講佛經因命宣論難甚有理詣高祖稱善遷都洛陽以宣為採材副將奉使稱旨遙除司空咨議參軍府解轉司州治中兼司徒右長史又轉別駕仍長史宣明敏有器幹總攝州府事無凝滯遠近稱之世宗初除太中大夫領本郡中正仍別駕又為司州都督遷太尉長史宣上言曰自遷都已來凡戰陳之處及軍罷兵還之道所有骸骼無人覆藏者請悉令州郡戍邏檢行埋掩并符出兵之鄉其家有死於戎役者使皆招魂復魄祔祭先靈復其年租調身被傷痍者免其兵役朝廷從之出為征虜將軍益州刺史宣善於綏撫甚得羌戎之心復晉壽更置益州改宣所蒞為南秦州先是有陰平氐酋楊孟孫擁戶數萬自立為王通引蕭衍數為邊患宣乃遣使招喻曉以逆順孟孫感恩即遣子詣闕武興氐薑謨等千餘人上書乞延更限世宗嘉焉宣家世以儒學為業常慕廉退每歎曰以賈誼之才仕漢文之世不歷公卿將非運也乃謂親賓曰吾本閭閻之士素無當世之志直隨牒推移遂至於此祿後養親道不光國瞻言往哲可以言歸矣因表求解世宗不許乃作懷田賦以心焉永平四年患篤世宗遣太醫令馳驛就視并賜御藥宣素明陰陽之書自始患便知不起因自剋亡日果如其言時年五十八世宗悼惜之贈左將軍豫州刺史諡曰定尋改為穆子敬憲莊伯並在文苑傳第四子獻伯武定末廷尉卿駿從弟安祖少而聰慧年八九歲就師講詩至鹿鳴篇語諸兄云鹿雖禽獸得食相呼而況人也自此之後未曾獨食弱冠州辟主簿民有兄弟爭財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪內外欽服之復有人勸其入仕安祖曰高尚之事非敢庶幾且京師遼遠實憚於栖屑耳於是間居養志不出城邑安祖曾行值天熱舍於樹下鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置陰地徐徐護視良久得蘇安祖喜而放之後夜忽夢一丈夫衣冠甚偉著繡衣曲領向安祖再拜安祖怪而問之此人云感君前日見放故來謝德聞者異焉後高祖幸長安至河東存訪故老安祖朝於蒲坂高祖與語甚悅仍拜安邑令安祖以老病固辭詔給一時俸以供湯藥焉年八十三卒於家子思濟亦有志操早卒子宗賢思濟弟幼俊卒於猗氏令辛紹先隴西狄道人五世祖怡晉幽州刺史父淵私署涼王李皓驍騎將軍皓子歆亦厚遇之歆與沮渠蒙遜戰於蓼泉軍敗失馬淵以所乘馬援歆而身死於難以義烈見稱西土世祖之平涼州紹先內徙家於晉陽明敏有識量與廣平遊明根范陽盧度世同郡李承等甚相友善有至性丁父憂三年口不甘味頭不櫛沐髮遂落盡故常著垂裙皂帽自中書博士轉神部令皇興中薛安都以彭城歸國時朝廷欲綏安初附以紹先為下邳太守加寧朔將軍為政不苟激察舉其大綱而已唯教民治産禦賊之備及劉彧將陳顯達蕭道成蕭順之來寇道成謂順之曰辛紹先未易侵也宜共慎之於是不歷郡境遂徑屯呂梁太和十三年卒贈冠軍將軍并州刺史晉陽公諡曰惠子鳳達耽道樂古有長者之名卒於京兆王子推國常侍鳳達子祥字萬褔舉司州秀才司空行參軍遷主簿太傅元丕為并州刺史祥為丕府屬敕行建興郡咸陽王禧妃即祥妻妹及禧構逆親知多罹塵謗祥獨蕭然不預轉并州平北府司馬會刺史喪朝廷以其公清遂越長史敕行州事祥初在司馬有白壁還兵藥道顯被誣為賊官屬推處咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊後除郢州龍驤府長史帶義陽太守白早生之反也蕭衍遣衆來援因此緣淮鎮戍相繼降沒唯祥堅城獨守蕭衍遣將胡武城陶平虜於州南金山之上連營侵逼衆情大懼祥從容曉喻人心遂安時出挑戰偽退以驕賊賊果日來攻逼不復自備乃夜出襲其營將曉矢刃交下賊大崩散潰擒平虜斬武城以送京師州境獲全論功方有賞授而刺史婁悅勳出其下聞之執政事竟不行胡賊劉龍駒作逆華州敕除祥華州永安王燮征虜府長史仍為別將與討胡使薛和討滅之神龜元年卒時年五十五永安二年贈冠軍將軍南青州刺史長子琨字懷玉少聰敏解褐相州倉曹參軍稍遷陳郡太守輕車將軍濟州征虜府長史卒年四十六琨弟懷仁武定末長樂太守懷仁弟賁字叔文少有文學識度沉雅起家北中府中兵參軍員外散騎侍郎建義初修起居注除濟州撫軍府長史出帝時轉膠州車騎府長史遷平東將軍太師咸陽王坦開府長史武定中中尉崔暹表薦賁除闕太守吏民懷其恩惠還卒於鄴時年五十八賁弟烈字季武歷太傅東閣祭酒卒於梁州鎮南府長史烈弟匡字季政頗有文學永安初釋褐封丘令加威烈將軍時經河陰之役朝士多求出外故匡為之後除平遠將軍符璽郎中卒於龍驤將軍通直散騎侍郎時年三十五贈散騎常侍前將軍雍州刺史祥弟少雍字季仲少聰穎有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝性仁厚有禮義門內之法為時所重釋褐奉朝請太學博士員外散騎侍郎司空高陽王雍引為田曹參軍少雍性清正不憚強禦積年久訟造次決之請託路絶時稱賢明正始中詔百官各舉所知高陽王雍及吏部郎中李憲俱以少雍為舉首遷給事中侍中遊肇後亦薦之會卒年四十二少雍妻王氏有德義與其從子懷仁兄弟同居懷仁等事之甚謹閨門禮讓人無比焉士大夫以此稱美子元植武定中儀同府司馬元植弟士遜太師開府功曹參軍鳳達弟穆字叔宗舉茂才東雍州別駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不反敬文病臨卒以雜綾二十匹託穆與敬武穆久訪不得經二十餘年始於洛陽見敬武以物還之封題如故世稱其廉信歷東荊州司馬轉長史帶義陽太守領戍雅有恤民之稱轉汝陽太守值水潦民飢上表請輕租賦帝從之遂敕汝陽一郡聽以小絹為調遷中散大夫加龍驤將軍正光四年以老啓求致仕詔引見謂穆志力尚可除平原相穆善撫導民吏懷之孝昌二年徵為征虜將軍太中大夫未發卒於郡年七十七贈後將軍幽州刺史諡曰貞長子子馥字元穎早有學行孝昌初釋褐南司州龍驤府録事參軍丁父艱居喪有禮後除給事中南冀州防城都督素為莊帝所知識及即位除宣威將軍尚書右主客郎中持節為南濟冀濟青四州慰勞使尋除寧朔將軍員外散騎常侍仍領郎中太宰元天穆征邢杲引為行臺郎中尋除平原相子馥父子並為此郡吏民懷安之元皓入洛子馥不受其赦刺史元仲景附皓拘子馥并禁家口莊帝反政詔封三門縣開國男食邑二百戶天平中為東南道行臺左丞徐州開府長史入除太尉府司馬長白山連接三齊瑕丘數州之界多有盜賊子馥受使檢覆因辨山谷要害宜立鎮戍之所又諸州豪右在山鼓鑄姦黨多依之又得密造兵仗亦請破罷諸冶朝廷善而從之還除尚書右丞出為清河太守武定八年卒於郡子馥以三傳經同説異遂總為一部傳注並出校比短長會亡未就子德維武定末司徒行參軍子馥弟子華字仲夷天平中右光祿大夫柳崇字僧生河東解人也七世祖軌晉廷尉卿崇方雅有器量身長八尺美鬚明目兼有學行舉秀才射策高第解褐太尉主簿尚書右外兵郎中于時河東河北二郡爭境其間有鹽池之饒虜坂之便守宰及民皆恐外割公私朋競紛囂臺府高祖乃遣崇檢斷民官息訟屬荊郢新附南寇窺擾又詔崇持節與州郡經略兼加慰喻還遷太子洗馬本郡邑中正轉中壘將軍散騎侍郎遷司空司馬兼衛尉少卿又領邑中正出為河北太守崇初屆郡郡民張明失馬疑十餘人崇見之不問賊事人人別借以溫顏更問其親老存不農桑多少而微察其辭色即獲真賊呂穆等二人餘皆放遣郡中畏服境內帖然卒於官年五十六贈輔國將軍岐州刺史諡曰穆崇所製文章寇亂遺失長子慶和性沉靜不競於時起家奉朝請稍遷輕車將軍給事中本郡邑中正卒子德逸武定末齊王丞相府主簿慶和弟楷字孝則身長八尺善草書頗涉文史解褐員外散騎侍郎蕭闕西征引為車騎主簿仍為行臺郎中征還以員外郎領殿中侍御史轉太尉記室參軍遷寧遠將軍通直散騎侍郎本郡邑中正普泰初簡定集書省官出除征虜將軍司徒從事中書郎轉儀同開府長史天平中為肆州驃騎府長史頗有聲譽又加中軍將軍興和中撫軍司馬遇病卒崇從父弟元章姿貌魁偉歷太尉中兵參軍司空録事司徒從事中郎遷相州平東府長史屬刺史元熙起兵欲除元叉元章與魏郡太守李孝怡等執熙賜爵猗氏伯除正平太守後靈太后反政削除官爵卒於家崇族弟敬起字華之起家中書博士轉城陽王文學除寧遠將軍尚書儀曹郎中龍驤將軍平陽太守卒有五子長子永字神護性粗率解褐奉朝請轉員外散騎侍郎除太尉記室參軍遷諫議大夫又轉征虜將軍太中大夫本郡邑中正以母老解官歸養卒於家贈征西將軍秦州刺史永弟暢字叔智自奉朝請三遷伏波將軍岐州征虜府長史遷征虜將軍魯陽太守還除左將軍太中大夫轉安東將軍光祿大夫卒贈衛大將軍雍州刺史諡曰穆暢弟範字洪禮卒於前將軍給事中本州大中正範弟粹字季義出後叔仲起武定末平東後軍遷遼西太守敬起弟仲起字紹隆舉秀才咸陽王禧為牧辟西曹書佐無子兄子粹繼之崇族子俊起少有志尚解褐奉朝請轉太尉默曹參軍伏波將軍司徒倉曹參軍卒長子達摩武定末陽城太守俊起從父弟援字乾護身長八尺儀望甚偉解褐太尉鎧曹參軍轉護軍司馬稍遷冠軍將軍司空長史轉廷尉少卿出除安西將軍南秦州刺史尋為散騎常侍鎮軍將軍轉征西將軍金紫光祿大夫遷車騎將軍右光祿大夫卒贈本將軍秦州刺史子長粲武定末青州驃騎府中兵參軍援從父弟仲景汝南王悅常侍史臣曰韋杜舊族門風名亦不殞裴辛柳氏素業有資器行仍世所以布於列位不替其美
