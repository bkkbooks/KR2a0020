body:
  text: 魏書卷十五昭成子孫列傳第三實君者昭成皇帝之庶長子也性愚戇安忍不仁昭成季年苻堅遣其行唐公苻洛等來寇南境昭成遣劉庫仁逆戰於石子嶺昭成時不勝不能親勒衆軍乃率諸部避難陰山度漠北高車四面寇抄復度漠南苻洛軍退乃還雲中初昭成以弟孤讓國乃以半部授孤孤卒子斤失職懷怨欲伺隙為亂是時獻明皇帝及秦明王翰皆先終太祖年六歲昭成不豫慕容后子閼婆等雖長而國統未定斤因是說實君曰帝將立慕容所生而懼汝為變欲先殺汝是以頃日以來諸子戎服夜持兵仗繞汝廬舍伺便將發吾愍而相告時苻洛等軍猶在君子津夜常警備諸皇子挾仗倣徨廬舍之間實君視察以斤言為信乃率其屬盡害諸皇子昭成亦暴崩其夜諸皇子婦及宮人奔告苻洛軍堅將李柔張蚝勒兵內逼部衆離散苻堅聞之召燕鳳問其故以狀對堅曰天下之惡一也乃執實君及斤轘之於長安西市實君孫勿期位定州刺史賜爵林慮侯卒子六狀真定侯秦明王翰昭成皇帝第三子少有高氣年十五便請率騎征討帝壯之使領二千騎及長統兵號令嚴信周旋征討多有克捷建國十年卒太祖即位追贈秦王諡曰明子儀長七尺五寸容貌甚偉美鬚髯有算略少能舞劍騎射絶人太祖幸賀蘭部侍從出入登國初賜爵九原公從破諸部有謀戰功及太祖將圖慕容垂遣儀觀釁垂問儀太祖不自來之意儀曰先人以來世據北土子孫相承不失其舊乃祖受晉正朔爵稱代王東與燕世為兄弟儀之奉命理謂非失垂壯其對因戲曰吾威四海卿主不自見吾云何非失儀曰燕若不修文德欲以兵威自強此乃本朝將帥之事非儀所知也及還報曰垂死乃可圖今則未可太祖作色問之儀曰垂年已暮其子寶弱而無威謀不能決慕容德自負才氣非弱主之臣釁將內起是可計之太祖以為然後改封平原公太祖征衛辰儀出別道獲衛辰尸傳首行宮太祖大喜徙封東平公命督屯田於河北自五原至棝楊塞外分農稼大得人心慕容寶之寇五原儀攝據朔方要其還路及并州平儀功多遷尚書令從圍中山慕容德之敗也太祖以普驎妻周氏賜儀并其僮僕財物尋遷都督中外諸軍事左丞相進封衛王中山平復遣儀討鄴平之太祖將還代都置中山行臺詔儀守尚書令以鎮之遠近懷附尋徵儀以丞相入輔又從征高車儀別從西北破其別部又從討姚平有功賜以絹布綿牛馬羊等儀膂力過人弓力將十石陳留公虔矟大稱異時人云衛王弓桓王矟世祖之初育也太祖喜夜召儀入太祖曰卿聞夜喚乃不怪懼乎儀曰臣推誠以事陛下陛下明察臣輒自安忽奉夜詔怪有之懼實無也太祖告以世祖生儀起拜而歌舞遂對飲申旦召羣臣入賜儀御馬御帶縑錦等先是上谷侯岌張兗代郡許謙等有名于時學博今古初來入國聞儀待士先就儀儀並禮之共談當世之務指畫山河分別城邑成敗要害造次備舉謙等歎服相謂曰平原公有大才不世之略吾等當附其尾太祖以儀器望待之尤重數幸其第如家人禮儀矜功恃寵遂與宜都公穆崇謀為亂伏武士伺太祖欲為逆崇子遂留在伏士中太祖召之將有所使遂留聞召恐發踰牆告狀太祖祕而恕之天賜六年天文多變占者云當有逆臣伏尸流血太祖惡之頗殺公卿欲以厭當天災儀內不自安單騎遁走太祖使人追執之遂賜死葬以庶人禮儀十五子子纂五歲太祖命養於宮中少明敏動止有禮太祖愛之恩與諸皇子同世祖踐阼除定州刺史封中山公進爵為王賜步挽几以優異之纂好酒愛佞政以賄成世祖殺其親嬖人後悔過修謹拜內大將軍居官清約簡慎更稱廉平纂於宗屬最長宗室有事咸就咨焉薨諡曰簡纂弟良性忠篤太宗追録儀功封南陽王以紹儀後良弟幹機悟沉勇善弓馬少有父風太宗即位拜內將軍都將入備禁中太宗出遊於白登之東北幹以騎從有雙鴟飛鳴於上太宗命左右射之莫能中鴟旋飛稍高幹自請射之以二箭下雙鴟太宗嘉之賜御馬弓矢金帶一以旌其能軍中於是號曰射鴟都將從世祖南巡進爵新蔡公高宗即位拜都官尚書卒諡曰昭子禎通解諸方之語便騎射世祖時為司衛監從征蠕蠕忽遇賊別部多少不敵禎乃就山解鞍放馬以示有伏賊果疑而避之高祖初賜爵沛郡公後拜南豫州刺史大胡山蠻時時鈔掠前後守牧多羈縻而已禎乃設畫召新蔡襄城蠻魁三十餘人禎盛武裝於州西為置酒使之觀射先選左右能射者二十餘人禎自發數箭皆中然後命左右以次而射並中先出一囚犯死罪者使服軍衣亦參射限命射不中禎即責而斬之蠻魁等伏伎畏威相視股栗又預教左右取死囚十人皆著蠻衣云是鈔賊禎乃臨坐僞舉目瞻天微有風動禎謂蠻曰風氣少暴似有鈔賊入境不過十人當在西南五十里許即命騎追掩果縛送十人禎告諸蠻曰爾鄉里作賊如此合死以不蠻等皆叩頭曰合萬死禎即斬之乃遣蠻還并加慰諭諸蠻大服自是境無暴掠淮南之人相率投附者三千餘家置之城東汝水之側名曰歸義坊初豫州城豪胡丘生數與外交通及禎為刺史丘生嘗有犯懷恨圖為不軌詐以婚進城人告云刺史欲遷城中大家送之向代共謀翻城城人石道起以事密告禎速掩丘生并諸預謀者禎曰吾不負人人何以叛但丘生誑誤若即收掩衆必大懼吾靜以待之不久自當悔服語未訖而城中三百人自縛詣州門陳丘生譎誑之罪丘生單騎逃走禎恕而不問後徵為都牧尚書薨贈侍中儀同三司諡簡公有八子第五子瑞初瑞母尹氏有娠致傷後畫寢夢一老翁具衣冠告之曰吾賜汝一子汝勿憂之寤而私喜又問筮者筮者曰大吉未幾而生瑞禎以為協夢故名瑞字天賜位太中大夫卒贈太常卿儀弟烈剛武有智略元紹之逆百僚莫敢有聲惟烈行出外詐附紹募執太宗紹信之自延秋門出遂迎立太宗以功進爵陰平王薨諡曰熹子裘襲烈弟觚勇略有膽氣少與兄儀從太祖侍衛左右使於慕容垂垂末年政在羣下遂止觚以求賂太祖絶之觚率左右數十騎殺其衛將走歸為慕容寶所執歸中山垂待之逾厚觚因留心學業誦讀經書數十萬言垂之國人咸稱重之太祖之討中山慕容普驎既自立遂害觚以固衆心太祖聞之哀慟及平中山發普驎柩斬其尸收議害觚者高霸程同等皆夷五族以大刃銼殺之乃改葬觚追諡秦愍王封子夔為豫章王以紹觚常山王遵昭成子壽鳩之子也少而壯勇不拘小節太祖初有佐命勳賜爵略陽公慕容寶之敗也別率騎七百邀其歸路由是有參合之捷及平中山拜尚書左僕射加侍中領勃海之合口及博陵勃海羣盜起遵討平之遷州牧封常山王遵好酒天賜四年坐醉亂失禮於太原公主賜死葬以庶人禮子素太宗從母所生特見親寵少引內侍頻歷顯官賜爵尚安公拜外都大官世祖初復襲爵休屠郁原等叛素討之斬渠率徙千餘家於涿鹿之陽立平原郡以處之及平統萬以素有威懷之略拜假節征西大將軍以鎮之後拜內都大官高宗即位務崇寬征罷諸雜調有司奏國用不足固請復之惟素曰臣聞百姓不足君孰與足帝善而從之詔羣臣議定皇子名素及司徒陸麗議曰古帝王之制名其體有五有信有義有象有假有類伏惟陛下當盛明之運應昌發之期誕生皇子宜以德命高宗從之素宗屬之懿又年老帝每引入訪以治國政事固辭疾歸第雅性方正居官五十載終始如一時論賢之薨諡曰康陪葬金陵配饗廟庭長子可悉陵年十七從世祖獵遇一猛虎陵遂空手搏之以獻世祖曰汝才力絶人當為國立事勿如此也即拜內行阿干又從平涼州沮渠茂虔令一驍將與陵相擊兩槊皆折陵抽箭射之墜馬陵恐其救至未及拔劍以刀子戾其頸使身首異處世祖壯之即日拜都幢將封暨陽子卒于中軍都將弟陪斤襲爵坐事國除陪斤子昭小字阿倪尚書張彝引兼殿中郎高祖將為齊郡王簡舉哀而昭乃作宮懸高祖大怒詔曰阿倪愚騃誰引為郎於是黜彝白衣守尚書昭遂停廢世宗時昭從弟暉親寵用事稍遷左丞世宗崩于忠執政昭為黃門郎又曲事之忠專權擅威枉陷忠賢多昭所指導也靈太后臨朝為尚書河南尹聾而佷戾理務峭急所在患之尋出為雍州刺史在州貪虐大為人害後入為尚書諂事劉騰進號征西將軍卒贈尚書左僕射納貨元叉所以贈禮優越昭子玄字彥道以節儉知名莊帝時為洛陽令及前廢帝即位玄上表乞葬莊帝時議善之後除尚書左丞出帝即位以孫騰為左僕射騰即齊獻武王心膂仗入省玄依法舉劾當時咸為玄懼出帝重其強正封臨淄縣子後從帝入關昭弟紹字醜倫少聰慧遷尚書右丞紹斷決不避強禦世宗詔令檢趙修獄以修佞幸因此遂加杖罰令其致死帝責紹不重聞紹曰修姦佞甚於董賢臣若不因釁除之恐陛下復被哀帝之名以其言正遂不罪焉及出廣平王懷拜紹賀曰阿翁乃皇家之正直雖朱雲汲黯何以仰過紹曰但恨戮之稍晚以為愧耳卒於涼州刺史陪斤弟忠字仙德少沉厚以忠謹聞高祖時纍遷右僕射賜爵城陽公加侍中鎮西將軍有翼贊之勤百僚咸敬之太和四年病篤辭退養疾於高柳輿駕親送都門之外賜雜綵二百匹羣僚侍臣執別者莫不涕泣及卒皆悼惜之諡曰宣命有司為立碑銘有十七子子盛字始興襲爵位謁者僕射卒盛弟壽興少聰慧好學世宗初為徐州刺史在官貪虐失於人心其從兄侍中暉深害其能因譖之於帝詔尚書崔亮馳驛檢覆亮發日受暉旨遂鞭撻三寡婦令其自誣稱壽興壓己為婢壽興終恐不免乃令其外弟中兵參軍薛修義將車十乘運小麥經其禁之旁壽興因踰牆出修義以大木函盛壽興其上加麥載之而出遂至河東匿修義家逢赦乃出見世宗自陳為暉所譖世宗亦更無所責初壽興為中庶子時王顯在東官賤因公事壽興杖之三十及顯有寵為御史中尉奏壽興在家每有怨言誹謗朝廷因帝極飲無所覺悟遂奏其事命帝注可直付壽興賜死帝書半不成字當時見者亦知非本心但懼暉等威不敢申拔及行刑日顯自往看之壽興命筆自作墓志銘曰洛陽男子姓元名景有道無時其年不永餘文多不載顧謂其子曰我棺中可著百張紙筆兩枚吾欲訟顯於地下若高祖之靈有知百日內必取顯如遂無知亦何足戀及世宗崩顯尋被殺壽興之死時論亦以為前任中尉彈高闕讒諷所致靈太后臨朝三公郎中崔鴻上疏理壽興詔追雪贈豫州刺史諡曰莊壽興弟益生少亡忠弟德封河間公卒於鎮南將軍贈曹州刺史德子悝潁川太守卒於光州刺史諡曰恭子嶷字子仲出帝初授兗州刺史于時城人王奉伯等相扇謀逆棄城出走懸門發斷嶷要闕而出詔齊州刺史尉景本州刺史蔡俊各部在州士往討之嶷返復任封濮陽縣伯孝靜時轉尚書令攝選部嶷雖居重任隨時而已薨於瀛州刺史贈司徒公諡曰靖懿忠子暉字景襲少沉敏頗涉文史世宗即位拜尚書主客郎巡省風俗還奏事稱旨為給事黃門侍郎初高祖遷洛而在位舊貴皆難於移徙時欲和合衆情遂許冬則居南夏便居北世宗頗惑左右之言外人遂有還北之問至乃榜賣田宅不安其居暉乃請間言事世宗曰先皇遷都之日本期冬南夏北朕欲聿遵成詔故有外人之論暉曰先皇移都為百姓戀土故發冬夏二居之詔權寧物意耳乃是當時之言實非先皇深意且北來遷人安居歲久公私計立無復還情陛下終高祖定鼎之業勿信邪臣不然之說世宗從之再遷侍中領右衛將軍雖無補益深被親寵凡在禁中要密之事暉別奉旨藏之於匱唯暉入乃開其餘侍中黃門莫有知者侍中盧昶亦蒙恩眄故時人號曰餓虎將軍飢鷹侍中遷吏部尚書納貨用官皆有定價大郡二千匹次郡一千匹下郡五百匹其餘受職各有差天下號曰市曹出為冀州刺史下州之日連車載物發信都至湯陰間首尾相繼道路不斷其車少脂角即於道上所逢之牛生截取角以充其用暉檢括丁戶聽其歸首出調絹五萬匹然聚斂無極百姓患之肅宗初徵拜尚書左僕射詔攝吏部選事上疏曰臣聞治人之本實委牧守之官得其才則政平物理失其人則訟興怨結自非察訪善惡明加貶賞將何以黜彼貪怠陟此清勤也竊以大使巡省必廣迎送之費御史馳糾頗回威濫之刑且暫爾往還理不委悉縱有簡舉良未平當愚謂宜令三司八座侍中黃門各布耳目外訪州鎮牧將治人守令能不若德教有方清白獨著宜以名聞即加褒陟若治績無效貪暴遠聞亦便示牒登加貶退如此則不出庭戶坐知四方端委垂拱明賞審罰矣又表以御史之職鷹鸇是任必逞爪牙有所噬搏若選後生年少血氣方剛者恐其輕肆徑直傷物處廣愚謂宜簡宿官經事忠良平慎者為之詔付外依此施行後詔暉與任城王澄京兆王愈東平王匡共決門下大事暉又上書論政要其一曰御史之職務使得賢必得其人不拘階秩久於其事責其成功其二曰安人寧邊觀時而動頃來邊將亡遠大之略貪萬一之功楚梁之好未聞而蠶婦之怨屢結斯乃庸人所為鋭於姦利之所致也平吳之計自有良圖不在於一城一戍也又河北數州國之基本飢荒多年戶口流散方今境上兵復徵發即如此日何易舉動愚謂數年以來唯宜靜邊以息占役安人勸農惠此中夏請嚴敕邊將自今有賊戍求內附者不聽輒遣援接皆須表聞違者雖有功請以違詔書論三曰國之資儲唯藉河北飢饉積年戶口逃散生長姦詐因生隱藏出縮老小妄注死失收人租調割入於己人困於下官損於上自非更立權制善加檢括損耗之來方在未已請求其議明宣條格帝納之暉頗愛文學招集儒士崔鴻等撰録百家要事以類相從名為科録凡二百七十卷上起伏羲迄於晉宋凡十四代暉疾篤表上之神龜元年卒賜東園祕器贈使持節都督中外諸軍事司空公諡曰文憲將葬給羽葆班劍鼓吹二十人羽林百二十人陳留王虔昭成子紇根之子也少以壯勇知名登國初賜爵陳留公與衛王儀破黜弗部從攻衛辰慕容寶來寇虔絶其左翼寶敗垂恚憤來桑乾虔勇而輕敵於陳戰沒虔姿貌魁傑武力絶倫每以常矟細短大作之猶患其輕復綴鈴於刃下其弓力倍加常人以其殊異於世代京武庫常存而志之虔常臨陳以矟剌人遂貫而高舉又嘗以一手頓矟於地馳馬僞退敵人爭取引不能出虔引弓射之一箭殺二三人搖矟之徒亡魂而散徐乃令人取矟而去每從征討常先登陷陳勇冠當時敵無衆寡莫敢抗其前者及薨舉國悲歎為之流涕太祖追惜傷慟者數焉追諡陳留桓王配饗廟庭封其子悅為朱提王悅外和內佷太祖常以桓王死王事特加親寵為左將軍襲封後為宗師悅恃寵驕矜每謂所親王洛生之徒言曰一旦宮車晏駕吾止避衛公除此誰在吾前衛王儀美髯為內外所重悅故云初姚興之贖狄伯支悅送之路由雁門悅因背誘姦豪以取其意後遇事譴逃亡投雁門規收豪傑欲為不軌為土人執送太祖恕而不罪太宗即位引悅入侍仍懷姦計說帝云京師雜人不可保信宜誅其非類者又雁門人多詐并可誅之欲以雪其私忿太宗不從悅內自疑懼懷刀入侍謀為大逆叔孫俊疑之竊視其懷有刀執而賜死弟崇世祖詔令襲桓王爵崇性沉厚初衛王死後太祖欲敦宗親之義詔引諸王子弟入宴常山王素等三十餘人咸謂與衛王相坐疑懼皆出逃遁將奔蠕蠕唯崇獨至太祖見之甚悅厚加禮賜遂寵敬之素等於是亦安久之拜并州刺史有政績從征蠕蠕別督諸軍出大澤越涿邪山威懾漠北薨諡曰景王子建襲降爵為公位鎮北將軍懷荒鎮大將卒建子琛位朔二州刺史琛子翌尚書左僕射虔兄顗性嚴重少言太祖常敬之雅有謀策從平中山以功賜爵蒲城侯平盧太守特見寵厚給鼓吹羽儀禮同嶽牧蒞政以威信著稱居官七年乃以元易干代顗為郡時易干子萬言得寵於太祖易干恃其子輕忽於顗不告其狀輕騎卒至排顗墜牀而據顗坐顗不知代己謂以罪見捕既而知之其侮慢謂易干曰我更滿被代常也汝無禮見辱豈可容哉遂搏而殺之以狀具聞太祖壯之萬言纍以訴請乃詔顗輸贖顗乃自請罪太祖赦之復免其贖病卒子崘世祖時襲父爵以功除統萬鎮將後從永昌王仁南征別出汝陰濟淮劉義隆將劉康祖屯於慰武亭以邀軍路師人患之崘曰今大風既徑若令推草車方軌並進乘風縱煙火以精兵自後乘之破之必矣從之斬康祖傳首行宮高宗即位除秦州刺史進爵隴西公卒諡定公子琛襲爵毗陵王順昭成子地干之子也性疏佷登國初賜爵南安公及太祖討中山留順守京師柏肆之敗軍人有亡歸者言大軍奔散不知太祖所在順聞之欲自立納莫題諫乃止時賀力眷等聚衆作亂於陰館順討之不克乃從留宮自白登南入繁畤故城阻灅水為固以寧人心太祖善之進封為王位司隸校尉太祖好黃老數召諸王及朝臣親為說之在坐莫不祗肅順獨坐寐缺伸不顧而唾太祖怒廢之以王薨於家遼西公意烈昭成子力真之子也先沒於慕容垂太祖征中山棄妻子迎於井陘及平中原有戰獲勳賜爵遼西公除廣平太守時和跋為鄴行臺意烈性雄耿自以帝屬居跋下遂陰結徒黨將襲鄴發覺賜死子拔干博知古今父雖有罪太祖以拔干宗親委之心腹有計略屢效忠勤太宗踐阼除勃海太守吏人樂之賜爵武遂子轉平原鎮將得將士心卒諡曰靈公子受洛襲進爵武邑公卒子叱奴武川鎮將叱奴子洪超頗有學涉大乘賊亂之後詔洪超持節兼黃門侍郎綏慰冀部還上言冀土寬廣界去州六七百里負海險遠宜分置一州鎮遏海曲朝議從之後遂立滄州卒於北軍將光祿大夫意烈弟勃善射御以勳賜爵彭城公卒陪葬金陵長子粟襲世祖時督諸軍屯漠南蠕蠕闕表聞粟亮直善馭衆撫恤將士必與之同勞逸征和龍以功進封為王薨陪葬金陵粟弟渾少善弓馬世祖嘉之會有諸方使命渾射獸三頭發皆中之舉坐咸以為善及為宰官尚書頗以驕縱為失坐事免徙長社為人所害子庫汗為羽林中郎將從北巡有兔起乘輿前命庫汗射之應絃而斃世祖悅賜一金兔以旌其能高宗起恭宗廟賜爵陽豐侯顯祖即位復造高宗廟拜殿中給事進爵為公庫汗明於斷決每奉使察行州鎮折獄以情所歷皆稱之秦州父老詣闕乞庫汗為刺史者前後千餘人朝廷許之未及遣遇病卒子古辰襲昭成子窟咄昭成崩後苻洛以其年長逼徙長安苻堅禮之教以書學因亂隨慕容永東遷永以為新興太守劉顯之敗遣弟亢碸等迎窟咄遂逼南界於是諸部騷動太祖左右于桓等謀應之同謀人單烏干以告太祖慮駭人心沉吟未發後三日桓以謀白其舅穆崇崇又告之太祖乃誅桓等五人餘莫題等七姓悉原不問太祖慮內難乃北踰陰山幸賀蘭部遣安同及長孫賀徵兵於慕容垂賀亡奔窟咄安同間行遂達中山慕容垂遣子賀驎步騎六千以隨之安同與垂使人蘭紇俱還達牛川窟咄兄子意烈捍之安同乃隱藏於商賈囊中至暮乃入空井得免仍奔賀驎軍既不至而稍前逼賀染干陰懷異端乃為窟咄來侵北部人皆驚駭莫有固志於是北部大人叔孫普洛節及諸烏丸亡奔衛辰賀驎聞之遽遣安同朱談等來既知賀驎軍近衆乃小定太祖自弩山幸牛川窟咄進屯高柳太祖復使安同詣賀驎因克會期安同還太祖踰參合出代北與賀驎會於高柳窟咄困迫望旗奔走遂為衛辰殺之帝悉收其衆賀驎別帝歸於中山
