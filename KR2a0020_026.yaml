body:
  text: 魏書卷二十一下獻文六王列傳第九下彭城王彭城王勰字彥和少而歧嶷姿性不羣太和九年封始平王加侍中征西大將軍勰生而母潘氏卒其年顯祖崩及有所知啟求追服文明太后不許乃毀瘠三年弗參吉慶高祖大奇之敏而耽學不捨晝夜博綜經史雅好屬文高祖革創解侍中將軍拜光祿大夫復除侍中長直禁內參決軍國大政萬機之事無不預焉及車駕南伐以勰行撫軍將軍領宗子軍宿衞左右開建五等食邑二千戶轉中書令侍中如故改封彭城王高祖與侍臣昇金墉城顧見堂後梧桐竹曰鳳皇非梧桐不栖非竹實不食今梧桐竹並茂詎能降鳳乎勰對曰鳳皇應德而來豈竹梧桐能降高祖曰何以言之勰曰昔在虞舜鳳皇來儀周之興也鸑鷟鳴於岐山未聞降桐食竹高祖笑曰朕亦未望降之也後宴侍臣於清徽堂日晏移於流化池芳林之下高祖曰向宴之始君臣肅然及將末也觴情始暢而流景將頹竟不盡適戀戀餘光故重引卿等因仰觀桐葉之茂曰其桐其椅其實離離愷悌君子莫不令儀今林下諸賢足敷歌詠遂令黃門侍郎崔光讀暮春羣臣應詔詩至勰詩高祖仍為之改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中令之舉非私也勰對曰臣露此拙方見聖朝之私賴蒙神筆賜刊得有令譽高祖曰雖琢一字猶是玉之本體勰曰臣聞詩三百一言可蔽今陛下賜刊一字足以價等連城勰表解侍中詔曰蟬貂之美待汝而光人乏之秋何容方退也克念作聖庶必有資耳後幸代都次于上黨之銅鞮山路旁有大松樹十數根時高祖進傘遂行而賦詩令人示勰曰吾始作此詩雖不七步亦不言遠汝可作之比至吾所令就之也時勰去帝十餘步遂且行且作未至帝所而就詩曰問松林松林經幾冬山川何如昔風雲與古同高祖大笑曰汝此詩亦調責吾耳詔曰弟勰所生母潘早齡謝世顯號未加勰禍與身具痛隨形起今因其展思有足悲矜可贈彭城國太妃以慰存亡又除中書監侍中如故高祖南討漢陽假勰中軍大將軍加鼓吹一部勰以寵受頻煩乃面陳曰臣聞兼親疏而兩並異同而建此既成文於昔臣願誦之於後陳思求而不允愚臣不請而得豈但今古云殊遇否大異非獨曹植遠羨於臣是亦陛下踐魏文而不顧高祖大笑執勰手曰二曹才名相忌吾與汝以道德相親緣此而言無慚前烈汝但克己復禮更何多及高祖親講喪服於清徽堂從容謂羣臣曰彥和季豫等年在蒙稚早登纓紱失過庭之訓並未習禮每欲令我一解喪服自審義解浮疏抑而不許頃因酒醉坐脫爾言從故屈朝彥遂親傳說將臨講坐慚戰交情御史中尉李彪對曰自古及今未有天子講禮陛下聖叡淵明事超百代臣得親承音旨千載一時從征沔北賜帛三千匹除使持節都督南征諸軍事中軍大將軍開府又詔曰明便交敵可敕將士肅爾軍儀勰於是親勒大衆須臾有二大鳥從南而來一向行宮一向府幕各為人所獲勰言於高祖曰始有一鳥望旗顛仆臣謂大吉高祖戲之曰鳥之畏威豈獨中軍之略也吾亦分其一爾此乃大善兵法咸說至明便大破崔慧景蕭衍其夜大雨高祖曰昔聞國軍獲勝每逢雲雨今破新野南陽及摧此賊果降時潤誠哉斯言勰對曰水德之應遠稱天心高祖令勰為露布勰辭曰臣聞露布者布於四海露之耳目必須宣揚威略以示天下臣小才豈足大用高祖曰汝豈獨親詔亦為才達但可為之及就尤類帝文有人見者咸謂御筆高祖曰汝所為者人謂吾製非兄則弟誰能辨之勰對曰子夏被蚩於先聖臣又荷責於來今及至豫州高祖為家人書於勰曰教風密微禮政嚴嚴若不深心日勸何以敬諸每欲立一宗師肅我元族汝親則宸極位乃中監風標才器實足師範屢有口敕仍執沖遜難違清挹荏苒至今宗制之重捨汝誰寄便委以宗儀責成汝躬有不遵教典隨事以聞吾別肅治之若宗室有愆隱而不舉鍾罰汝躬綱維相厲庶有勸改吾朝聞夕逝不為恨也勰翌日面陳曰奉詔令專主宗制糾舉非違臣聞其身正不令而行其身不正雖令不從臣處宗乏長幼之順接物無國士之禮每因啟請已蒙哀借不謂今詔終不矜免猶願聖慈賜垂蠲遂高祖曰汝諧往欽哉勰表以一歲國秩職俸親恤以裨軍國詔曰割身存國理為遠矣但汝以我親乃減己助國職俸便停親國二事聽三分受一高祖不豫勰內侍醫藥外總軍國之務遐邇肅然人無異議徐謇當世之上醫也先是假還洛陽及召至勰引之別所泣涕執手而謂之曰君今世元化至尊氣力危惙願君竭心專思方治若聖體日康令四海有賴當獲意外之賞不然便有不測之誅非但榮辱乃存亡由此君其勉之左右見者莫不嗚咽及引入謇便欲進治勰以高祖神力虛弱唯令以食味消息勰乃密為壇於汝水之濱依周公故事告天地顯祖請命乞以身代高祖翊日有瘳損自懸瓠幸鄴勰常侍坐輿輦晝夜不離於側飲食必先嘗之而後手自進御車駕還京會百僚於宣極堂行飲至策勳之禮命舍人宣旨勰翼弼六師纂戎荊楚沔北之勳每毗廟算從討新野有克城之謀受命鄧城致大捷之效功為羣將之最也別當授賞不替厥庸高祖謂勰曰吾與汝等早罹艱苦中逢契闊每謂情義隨事而疏比纏患經歲危如寒葉非汝孔懷情敦忠孝孰能動止躬親必先藥膳每尋此事感思殊遠勰悲泣對曰臣等宿遭不天酷恨長世賴陛下撫育得參人伍豈謂上靈無鑒復使聖躬違和萬國所懸蒼生繫氣寢興之勞豈申荼蓼以破慧景等勳增邑五百戶又詔曰朕形疲稚年心勞長歲積思成疴頓發汝潁第六弟勰孝均周弟感侔姬旦遺食捨寐動止必親敦醫勸膳誠力俱竭致茲保康實賴同氣又秉務緝政百司是憑綱維折衷萬揆獲濟撫師於霖浩之辰處戎於薦逼之日安外靜內功臣大道侍省之績可以孔懷無褒翼亮之勤實乃勳存社稷宜有酬賞以旌國功可增邑一千戶勰辭曰臣受遇緣親榮枯事等以此獲賞殊乖情願乞追成旨用息謗言詔曰汝在私能孝處公必忠比來勤憂足布朝野但可祗膺尋以勰為司徒太子太傅侍中如故俄而蕭寶卷將陳顯達內寇高祖復親討之詔勰使持節都督中外諸軍事總攝六師是時高祖不豫勰辭曰臣侍疾無暇六軍須有所託事不兩興情力又竭更請一王總當軍要高祖曰戎務侍疾皆憑於汝牽痾如此吾深慮不濟安六軍保社稷者捨汝而誰何容方便請人以違心寄宗祏所賴唯在於汝諸葛孔明霍子孟異姓受託而況汝乎行次淯陽高祖謂勰曰吾患轉惡汝其努力車駕至馬圈去賊營數里顯達等出戰諸將大破之勰部分諸軍將攻賊壘其夜奔退高祖疾甚謂勰曰修短命也死生大分今吾氣力危惙當成不濟矣雖敗顯達國家安危在此一舉社稷所仗唯在汝身霍子孟以異姓受付況汝親賢可不勉也勰泣曰士於布衣猶為知己盡命況臣託靈先皇聯暉陛下誠應竭股肱之力加之以忠貞但臣出入喉膂每跨時要及於寵靈輝赫聞之遐邇復參宰匠機政畢歸震主之聲見忌必矣此乃周旦遁逃成王疑惑陛下愛臣便為未盡始終之美臣非所以惡華捐勢非所以辭勤請逸正希仰成陛下日鏡之明下念愚臣忘退之禍高祖久之曰吾尋思汝言理實難奪乃手詔世宗曰汝第六叔父勰清規懋賞與白雲俱潔厭榮捨紱以松竹為心吾少與綢繆提攜道趣每請解朝纓恬真丘壑吾以長兄之重未忍離遠何容仍屈素業長嬰世網吾百年之後其聽勰辭蟬捨冕遂其沖挹之性無使成王之朝翻疑姬旦之聖不亦善乎汝為孝子勿違吾敕及高祖崩于行宮遏祕喪事獨與右僕射任城王澄及左右數人為計奉遷高祖於安車中勰等出入如平常視疾進膳可決外奏累日達宛城乃夜進安車於郡廳事得加斂櫬還載臥輿六軍內外莫有知者遣中書舍人張儒奉詔徵世宗會駕梓宮至魯陽乃發喪行服世宗即位勰跪授高祖遺敕數紙咸陽王禧疑勰為變停在魯陽郡外久之乃入謂勰曰汝非但辛勤亦危險至極勰恨之對曰兄識高年長故知有夷險彥和握蛇騎虎不覺艱難禧曰汝恨吾後至耳自高祖不豫勰常居中親侍醫藥夙夜不離左右至於衣帶罕解亂首垢面帝患久多忿因之以遷怒勰每被誚詈言至厲切威責近侍動將誅斬勰承顏悉心多所匡濟及高祖昇遐陳顯達奔遁始爾慮凶問洩漏致有逼迫勰內雖悲慟外示吉容出入俯仰神貌無異及至魯陽也東宮官屬多疑勰有異志竊懷防懼而勰推誠盡禮卒無纖介勰上高祖諡議謹案諡法協時肇享曰孝五宗安之曰孝道德博聞曰文經緯天地曰文仰惟大行皇帝義實該之宜上尊號為孝文皇帝廟曰高祖陵曰長陵世宗從之既葬世宗固以勰為宰輔勰頻口陳遺旨請遂素懷世宗對勰悲慟每不許之勰頻煩表聞辭義懇切世宗難違遺敕遂其雅情猶逼以外任乃以勰為使持節侍中都督冀定幽瀛營安平七州諸軍事驃騎大將軍開府定州刺史勰仍陳讓又面申前意世宗固執不許乃述職尚書令王肅等奏臣等聞旌功表德道貴前王庸勳親親義高盛典是故姬旦翼周光宅曲阜東平宰漢寵絕列蕃彭城王勰景思內昭英風外發協廓乾規掃氛漢沔屬先帝在天鳳旌旋斾靜一六師肅寧南服登聖皇於天衢開有魏之靈祐論道中鉉王猷以穆七德丕宣九功在詠臣等參詳宜增邑一千五百戶詔曰覽奏倍增崩絕未足以上酬勳德且可如奏勰頻表固讓世宗許之世宗與勰書曰恪奉辭暨今悲戀哽咽歲月易遠便迫暮冬每思聞道奉承風教父既辭榮閑外無容頓違至德出蕃累朔荒馳實深今遣主書劉道斌奉宣悲戀願父來望必當屆京展洩哀窮指不云遠勰乃朝於京師景明初蕭寶卷豫州刺史裴叔業以壽春內屬詔勰都督南征諸軍事餘官如故與尚書令王肅迎接壽春詔曰五教治樞古難其選自非親賢兼切莫應斯舉王以明德懋親任屬保傅出居蕃陝入御袞章內外克諧民神攸屬今董率戎麾威號宜重可復授司徒以光望實又詔勰以本官領揚州刺史勰簡刑導禮與民休息州境無虞遐邇安靜揚州所統建安戍主胡景略猶為寶卷拒守不下勰水陸討之景略面縛出降自勰之至壽春東定城戍至於陽石西降建安山蠻順命斬首獲生以數萬計進位大司馬領司徒餘如故增邑八百戶又寶卷遣將陳伯之屯於肥口胡松又據梁城水軍相繼二百餘里勰部分將士分攻諸營伯之胡松率衆出戰諸將擊之斬首九千俘獲一萬伯之等僅以身免屯於烽火勰又分命諸將頻戰伯之計窮宵遁淮南平詔曰王戚尊上輔德勳莫二孤心昧識訓保攸憑比以壽春初開鎮壓任重故令王親董元戎遠撫淮外冒茲炎蒸衡蓋飄颻經略踰時必有虧損淹違詣覿夙夜係情兼制勝宣規威效兼著公私允稱義所欽嘉雖凱旋有期無申延屬可遣給事黃門侍郎鄭道昭就彼祗勞徵勰還朝勰政崇寬裕絲毫不犯淮南士庶追其餘惠至今思之初勰之定壽春也獲蕭寶卷汝陰太守王果豫州治中庾禝等數人勰傾衿禮之常參坐席果承間進曰果等契闊生平皓首播越顧瞻西夕餘光幾何今遭聖化正應力茲愚老申展尺寸但在南百口生死分張乞還江外以申德澤勰矜而許之果又謝曰殿下賜處有過國士果等今還仰負慈澤請聽仁駕振旅反跡江外至此乃還其為遠人所懷如此勰至京師世宗臨東堂引見詔勰曰比鳳皇未至蒼黎二化故仰屈尊謨綏懷邊附而寇豎昏迷敢鬬淮楚叔父英略高明應機殄定凱旋今辰伏慰悲佇勰謝曰臣忝充戍帥撫安新故而不能宣武導恩威懷遐邇致小豎伯之驅率蟻徒侵擾邊堡非唯仰慚天顏實亦俯愧朝列春秋責帥臣實當之賴陛下慈深捨過故使愚臣獲免罪責勰頻表辭大司馬領司徒及所增邑乞還中山有詔不許乃除錄尚書侍中司徒如故固辭不免勰雅好恬素不以勢利嬰心高祖重其事幹縶維不許雖臨崩遺詔復世宗留連每乖情願常悽然歎息以詔旨殷勤僶俛應命時咸陽王禧漸以驕矜頗有不法北海王詳陰言於世宗世宗深忌之又言勰大得人情不宜久在宰輔勸世宗遵高祖遺敕禧等又出領軍于烈為州非烈情願固強之烈深以為忿烈子忠嘗在左右密令忠言於世宗云諸王等意不可測宜廢之早自覽政時將礿祭王公並齋於廟東坊世宗遣于烈將宿衞壯士六十餘人召禧勰詳等引入見之於光極殿世宗謂勰曰頃來南北務殷不容仰遂沖操恪是何人而敢久違先敕今遂叔父高蹈之意勰謝曰先帝不以臣虛薄曲垂罔己之澤出入綢繆公私無捨自陛下龍飛九五屢求解落既為宰輔所抑亦不為陛下所許先歲夏中重塵天聽時蒙優借出為定州往年還洛陽敕總戎淮肥雖無功效幸免罪戾云歸未幾復委臣以非據之任臣頻煩干請具簡聖聽陛下孝深無改仰遵先詔上成睿明之美下遂微臣之志感惟今往悲喜交深乃詔曰王宿尚閑靜志捐世務先帝愛亮之至弗奪此情遺敕炳然許遂沖退雅操不移朕亦未敢違奪今乃釋位歸第丘園是營高尚之節確爾貞固賁履之操邈焉難追而王宅初構財力多闕成立之期歲月莫就可量遣工役分給材瓦禀王所好速令制辦務從簡素以稱王心勰因是作蠅賦以諭懷惡讒構也又以勰為太師勰遂固辭詔曰蓋二儀分象君臣之位形焉上下既位唱和之義生焉自古統天位主曷常不賴明師仗賢輔而後燮和陰陽彝倫民物者哉往而不返者先民誠有之斯所謂獨善其身而亂大倫山林之士耳賢人君子則不然也屈己以安民艱身以濟物所謂以先知覺後知同塵而與天下俱潔者也朕猥以沖年纂臨寶曆實賴叔父匡濟之功誠宜永兼將相以綱維內外但逼奪先旨憚違沖挹俛志割心以遂高素自比水旱乖和陰陽失序是以屈王論道庶燮茲玉燭且師宰從容無廢清尚故周旦復辟而居之尚父期頤以終位王義兼家國理絕獨高可遣侍中敦諭世宗又修家人書於勰曰恪言奉還告承猶執沖遜恪實闇寡政術多粃匡弼之寄仰屬親尊父德望兼重師訓所歸豈得近遺家國遠崇清尚也便願紆降時副傾注之心勰不得已而應命世宗後頻幸勰第及京兆廣平暴虐不法詔宿衞隊主率羽林虎賁幽守諸王於其第勰上表切諫世宗不納勰既無山水之適又絕知己之遊唯對妻子鬱鬱不樂議定律令勰與高陽王雍八座朝士有才學者五日一集參論軌制應否之宜而勰夙侍高祖兼聰達博聞凡所裁決時彥歸仰加以美容貌善風儀端嚴若神折旋合度出入言笑觀者忘疲又加侍中勰敦尚文史物務之暇披覽不輟撰自古帝王賢達至於魏世子孫三十卷名曰要略小心謹慎初無過失雖閑居宴處亦無慢色惰容愛敬儒彥傾心禮待清正儉素門無私謁性仁孝言於朝廷以其舅潘僧固為冀州樂陵太守京兆王愉搆逆僧固見逼從之尚書令高肇性既凶愎賊害賢俊又肇之兄女入為夫人順皇后崩世宗欲以為后勰固執以為不可肇於是屢譖勰於世宗世宗不納因僧固之同愉逆肇誣勰北與愉通南招蠻賊勰國郎中令魏偃前防閤高祖珍希肇提攜搆成其事肇初令侍中元暉以奏世宗暉不從令左衞元珍言之世宗訪之於暉暉明勰無此世宗更以問肇肇以魏偃祖珍為證世宗乃信之永平元年九月召勰及高陽王雍廣陽王嘉清河王懌廣平王懷及高肇等入時勰妃方產勰乃固辭不赴中使相繼不得已乃令命駕意甚憂懼與妃訣而登車入東掖門度一小橋牛不肯進遂擊之良久更有使者責勰來遲乃令去牛人挽而進宴於禁中至夜皆醉各就別所消息俄而元珍將武士齎毒酒而至勰曰吾忠於朝廷何罪見殺一見至尊死無恨也珍曰至尊何可復見王但飲酒勰曰至尊聖明不應無事殺我求與告我罪者一對曲直武士以刀鐶築勰二下勰大言曰皇天忠而見殺武士又以刀鐶築勰勰乃飲毒酒武士就殺之向晨以褥裹屍輿從屏門而出載屍歸第云王因飲而薨勰妃李氏司空沖之女也號哭大言曰高肇枉理殺人天道有靈汝還當惡死及肇以罪見殺論者知有報應焉世宗為舉哀於東堂給東園第一祕器朝服一襲賻錢八十萬布二千匹蠟五百斤大鴻臚護喪事勰既有大功於國無罪見害百姓寃之行路士女流涕而言曰高令公枉殺如此賢王在朝貴賤莫不喪氣追崇假黃鉞使持節都督中外諸軍事司徒公侍中太師王如故給鑾輅九旒虎賁班劍百人前後部羽葆鼓吹轀輬車有司奏太常卿劉芳議勰諡曰王挺德弱齡誕資至孝睿性過人學不師授卓爾之操發自天然不羣之美幼而獨出及入參政務綸綍有光爰登中鉉敷明五教漢北告危皇赫問罪王內親藥膳外總六師及宮車晏駕上下哀慘奮猛銜戚英略潛通翼衞靈輿整戎振斾歷次宛謝迄于魯陽送往奉居無慚周霍禀遺作輔遠至邇安分陝方流詠燕趙廓靖江西威懾南越入釐百揆庶績咸熙履勤不憚在功愈挹溫恭愷悌忠雅寬仁興居有度善終篤始高尚厥心功成身退義亮聖衷美光世典依諡法保大定功曰武善問周達曰宣諡曰武宣王及莊帝即位追號文穆皇帝妃李氏為文穆皇后遷神主於太廟廟稱肅祖語在臨淮王彧傳前廢帝時去其神主嫡子劭字子訥襲封善武藝少有氣節肅宗初蕭衍遣將犯邊劭上表曰偽豎遊魂闚覦邊境勞兵兼時日有千金之費臣仰籍先資紹饗厚秩思以埃塵用裨山海臣國封徐州去軍差近謹奉粟九千斛絹六百匹國吏二百人以充軍用靈太后嘉其至意而不許之起家宗正少卿又除使持節假散騎常侍平東將軍青州刺史于時齊州民劉均房頃等扇動三齊蕭衍遣將彭群王辯等搔擾邊陲劭頻有防拒之效孝昌末靈太后失德四方紛擾劭遂有異志為安豐王延明所啟乃徵入為御史中尉莊帝即位尊為無上王尋遇害河陰追諡曰孝宣皇帝妻李氏為文恭皇后有二子韶字世冑襲武定末司州牧齊受禪爵例降韶弟襲字世紹武定初封武安王邑一千戶武定末中書侍郎齊受禪爵例降劭兄子直字方言少知名為清河文獻王所賞愛起家除散騎侍郎轉中書侍郎後除通直散騎常侍遷給事黃門侍郎靈太后詔曰故太師彭城武宣王道隆德盛功高微管協契先朝導揚末命扶痾濟難效漢北之誠送往奉居盡魯南之節宗社賴之以安皇基由之永固而謙光守約屢撝增邑之賞辭多受少終保初錫之封非所謂追舊報恩念勳酬德者也可以前後所封戶別封三子為縣公食邑各一千戶庶以少慰仁魂微申朝典子直封真定縣開國公出為冠軍將軍梁州刺史未幾遇患優遊南鄭無他政績徵還京師病卒贈散騎常侍安南將軍都官尚書冀州刺史孝莊踐阼追封陳留王邑二千戶贈假黃鉞太師大司馬太尉加前後部羽葆鼓吹子寬字思猛襲王爵除散騎常侍平南將軍尋除侍中撫軍將軍永安三年尒朱兆害之於晉陽無後國除出帝初追贈使持節散騎常侍都督青齊濟三州諸軍事衞大將軍青州刺史重贈司徒公弟剛字金明莊帝初封浮陽王邑千戶武定末宗正少卿齊受禪爵例降剛弟質莊帝初林慮王邑千戶永安三年薨出帝時贈車騎大將軍左光祿大夫儀同三司劭弟子正美貌性寬和肅宗初封霸城縣公邑一千戶歷散騎侍郎太常少卿莊帝即位除尚書令封始平王與兄劭俱遇害贈假黃鉞侍中都督中外諸軍事大將軍錄尚書事相王如故鸞輅九旒黃屋左纛前後部羽葆鼓吹虎賁班劍一百人諡曰貞子欽字世道襲武定中散騎侍郎齊受禪爵例降史臣曰武宣王孝以為質忠而樹行文謀武略自得懷抱綢繆太和之世豈徒然哉至夫在安處危之操送往事居之節周旦匪他之義霍光異姓之誠事兼之矣功高震主德隆動俗間言一入卒不全志烏呼周成漢昭亦未易遇也
