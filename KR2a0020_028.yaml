body:
  text: 魏書卷二十三列傳第十一衛操莫含劉庫仁衛操字德元代人也少通俠有才略晉征北將軍衛瓘以操為牙門將數使於國頗自結附始祖崩後與從子雄及其宗室鄉親姬淡等十數人同來歸國説桓穆二帝招納晉人於是晉人附者稍衆桓帝嘉之以為輔相任以國事及劉淵石勒之亂勸桓帝匡助晉氏東瀛公司馬騰聞而善之表加將號稍遷至右將軍封定襄侯桓帝崩後操立碑於大城南以頌功德云魏軒轅之苗裔言桓穆二帝馳名域外九譯宗焉治國御衆威禁大行聲著華裔齊光純靈智深謀遠窮幽極明治則清斷沉浮得情仁如春陽威若秋零強不淩弱隱恤孤煢道教仁行化而不刑國無姦盜路有頌聲自西訖東變化無形威武所向下無交兵南一王室北服丁零招諭六狄咸來歸誠超前絶後致此有成奉承晉皇扞禦邊疆王室多難天網弛綱豪心遠濟靡離其殃歲翦逆命姦盜豺狼永安元年歲次甲子姦黨猶逆東西狼跱敢逼天王兵甲屢起怙衆肆暴虐用將士鄴洛遘隙棄親求疏乃招暴類屠各胸奴劉淵姦賊結黨同呼敢擊并土殺害無辜殘破狼籍城邑丘墟交刃千里長蛇塞塗晉道應天言展良謨使持節平北將軍并州刺史護胸奴中郎將東瀛公司馬騰才神絶世規略超遠時逢多難懼損皇祀欲引兵駕獫狁孔熾造設權策濟難奇思欲招外救朝臣莫應高算獨斷決謀盟意爰命外國引軍內備簡賢選士命茲良使遣參軍壺倫牙門中行嘉義陽亭侯衛謨協義亭侯衛鞬等馳奉檄書至晉陽城又稱桓穆二帝心在宸極輔相二衛對揚毗翼操展文謀雄奮武烈承命會議咨論奮發昔桓文匡佐功著周室顯名載籍列賞備物大衆回動熙同靈集興軍百萬期不經日兄弟齊契決勝廟算鼓譟南征平夷險難又云二帝到鎮言若合符引接款密信義不渝會盟汾東銘篆丹書永世奉承慎終如初契誓命將精鋭先驅南救涅縣東解壽陽窘迫之邑幽而復光太原西河樂平上黨遽遭寇暴白骨交橫羯賊肆虐六郡凋傷羣惡相應圖及華堂旌旗輕指羯黨破喪遣騎十萬前臨淇漳鄴遂振潰凶逆奔亡軍據州南曜鋒太行翼衛內外鎮靜四方志在竭力奉戴天王忠恕用暉外動亦攘於是曜武振旅而旋長路匪夷出入經年毫毛不犯百姓稱傳周覽載籍自古及今未聞外域奔救內患棄家憂國以危易安惟公遠略臨難能權應天順人恩德素宣和戎靜朔危邦復存又云非桓天挺忠孝自然孰能超常不為異端回動大衆感公之言功濟方州勳烈光延升平之日納貢充蕃憑瞻鑾蓋步趾三川有德無祿大命不延年三十有九以永興二年六月二十四日寢疾薨殂背棄華殿雲中名都國失惠主哀感欷歔悲痛煩寃載號載呼舉國崩絶攀援靡訴遠近齊軌奔赴梓廬人百其身盈塞門塗高山其頽茂林凋枯仰訴造化痛延悲夫又云桓帝忠於晉室駿奔長衢隆冬凄凄四出行誅蒙犯霜雪疹入脈膚用致薨殞不永桑榆以死勤事經勳同模垂名金石載美晉書平北哀悼祭以豐考行論勳諡曰義烈功施於人祀典所説又云桓帝經濟存亡繼絶荒服是賴祚存不輟金龜簫鼓軺蓋殊制反及二代莫與同列并域嘉歎北國感榮各竭其心思揚休名刊石紀圖像存形靡輟享祀饗以犧牲永垂于後沒有餘靈長存不朽延於億齡其頌又稱桓帝金堅玉剛應期順會王有北方行能濟國武平四荒無思不服區域大康世路紛糾運遭播揚羯胡因釁敢害并土哀痛下民死亡失所率衆百萬平夷險阻存亡繼絶一州蒙祜功烈桓桓龍文虎武朱邑小善遺愛桐鄉勳攘大患六郡無闕悉之來由功而存刊石勒銘垂示後昆時晉光熙元年秋也皇興初雍州別駕雁門段榮於大邗掘得此碑文雖非麗事宜載焉故録於傳桓穆二帝並禮重操穆帝三年卒始操所與宗室鄉親入國者衛勤安樂亭侯衛崇衛清並都亭侯衛泥段繁並信義將軍都亭侯王發建武將軍都亭侯范班折衝將軍廣武亭侯賈慶建武將軍上洛亭侯賈循都亭侯李一關中侯郭乳關內侯皆為桓帝所表授也六修之難存者多隨劉琨任子遵南奔衛雄姬淡莫含等名皆見碑雄字世遠淡字世雅並勇健多計畫晉世州從事既與衛操俱入國桓帝壯其膂力並以為將常隨征伐大著威名桓帝之赴難也表晉列其勳效皆拜將軍雄連有戰功稍遷至左將軍雲中侯淡亦以勇績著名桓帝末至信義將軍樓煩侯穆帝初並見委任衛操卒後俱為左右輔相六修之逆國內大亂新舊猜嫌迭相誅戮雄淡並為羣情所附謀欲南歸言於衆曰聞諸舊人忌新人悍戰欲盡殺之吾等不早為計恐無種矣晉人及烏丸驚懼皆曰死亡隨二將軍於是雄淡與劉琨任子遵率烏丸晉人數萬衆而叛琨聞之大悅率數百騎馳如平城撫納之會石勒攻琨樂平太守韓據請救於琨琨以得雄淡之衆欲因其鋭以滅石勒雄淡諫曰亂民飢疲未可便用宜休息觀釁而動琨不從使雄淡率衆討勒琨屯廣牧為之聲援勒率輕騎與雄淡戰淡大敗率騎千餘奔于代郡勒遣孔萇追滅之莫含雁門繁畤人也家世貨殖資纍巨萬劉琨為并州辟含從事含居近塞下常往來國中穆帝愛其才器善待之及為代王備置官屬求含於琨琨遣入國含心不願琨諭之曰當今胡寇滔天泯滅諸夏百姓流離死亡塗地主上幽執沉溺醜虜唯此一州介在羣胡之間以吾薄德能自存立者賴代王之力是以傾身竭寶長子遠質覬滅殘賊報雪大卿為忠節亦是奮義之時何得苟惜共事之小誠以忘出身之大益入為代王腹心非但吾願亦一州所賴含乃入代參國官後琨徙五縣之民於陘南含家獨留含甚為穆帝所重常參軍國大謀卒於左將軍關中侯其故宅在桑乾川南世稱莫含壁或音訛謂之莫回城云子顯知名於時昭成世為左常侍顯子題亦有策謀太祖使題與將軍王建等三軍討慕容寶廣寧太守劉亢碸斬之徙亢碸部落于平城寶上谷太守驎捐郡逃走太祖追討題為大將別出東道以功賜爵東宛侯及還京師常與李栗侍宴栗坐不敬獲罪題亦被黜為濟陽太守後太祖欲廣宮室規度平城四方數十里將模鄴洛長安之制運材數百萬根以題機巧徵令監之召入與論興造之宜題久侍頗怠賜死題弟雲好學善射太祖時常典選曹轉給事中以功賜爵安德侯遷執金吾常參軍國謀議世祖之克赫連昌詔雲與常山王素留鎮統萬進爵安定公加平西將軍後遷鎮西大將軍時初并河西人心未一雲撫慰新舊皆得其所神中卒諡曰敬公劉庫仁本字沒根劉虎之宗也一名洛垂少豪爽有智略母平文皇帝之女昭成皇帝復以宗女妻之為南部大人建國三十九年昭成暴崩太祖未立苻堅以庫仁為陵江將軍關內侯令與衛辰分國部衆而統之自河以西屬衛辰自河以東屬庫仁於是獻明皇后攜太祖及衛秦二王自賀蘭部來居焉庫仁盡忠奉事不以興廢易節撫納離散恩信甚彰苻堅進庫仁廣武將軍給幢麾鼓蓋儀比諸侯處衛辰在庫仁之下衛辰怒殺堅五原太守而叛攻庫仁西部庫仁又伐衛辰破之追至陰山西北千餘里獲其妻子盡收其衆庫仁西征庫狄部大獲畜産徙其部落置之桑乾川苻堅賜庫仁妻公孫氏厚其資送庫仁又詣堅加庫仁振威將軍後慕容垂圍苻丕于鄴又遣將平規攻堅幽州刺史王永于薊庫仁自以受堅爵命遣妻兄公孫希率騎三千助永擊規大破之坑規降卒五千餘人乘勝長驅進據唐城與垂子麟相持庫仁聞希破規復將大舉以救丕發雁門上谷代郡兵次於繁畤先是慕容文等當徙長安遁依庫仁部常思東歸其計無由至是役也知人不樂文等乃夜率三郡人攻庫仁庫仁匿於馬文執殺之乘其駿馬奔慕容垂公孫希聞亂自唐城走於丁零庫仁弟眷繼攝國事白部大人潔佛叛眷力不能討乃引苻堅并州刺史張蚝擊佛破之眷又破賀蘭部于善無又擊蠕蠕別帥肺渥于意親山破之獲牛羊數十萬頭眷第二子羅辰性機警有智謀謂眷曰比來行兵所向無敵心腹之疾願早圖之眷曰誰也曰從兄顯忍人也為亂非旦則夕耳眷不以為意其後徙牧于牛川庫仁子顯果殺眷而代立羅辰奔太祖事在外戚傳顯本名醜伐既殺眷代立又欲謀逆語在太祖紀太祖即位顯自善無南走馬邑族人奴真領部來附奴真兄犍先居賀蘭部至是奴真請召犍而讓部焉太祖義而許之犍既領部自以久託賀訥德之乃使弟去斤遺之金馬訥弟染干因謂之曰我待汝兄弟厚汝今領部宜來從我去斤請之奴真奴真曰父為國家附臣世效忠貞我志全名節是故推讓今汝等無狀乃欲叛主懷二於是殺犍及去斤染干聞其殺兄率騎討之奴真懼徙部來奔太祖太祖自迎之遣使責止染干奴真感恩請奉妹充後宮太祖納之後太祖討顯于馬邑追至彌澤大破之衛辰與慕容垂通好送馬三千匹於垂垂遣慕容良迎之顯擊敗良軍掠馬而去垂怒遣子麟兄子楷討之顯奔馬邑西山麟輕騎追之遂奔慕容永於長子部衆悉降於麟麟徙之中山顯弟亢碸事在皇后傳史臣曰始祖及桓穆之世也王迹初基風德未展操含託身馳驟之秋自立功名之地可謂志識之士矣劉庫仁兄弟忠以為心盛衰不二純節所存其意蓋遠而並貽非命惜乎
