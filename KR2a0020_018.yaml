body:
  text: 魏書卷十六道武七王列傳第四清河王陽平王河南王河間王長樂王廣平王京兆王道武皇帝十男宣穆劉皇后生明元皇帝賀夫人生清河王紹大王夫人生陽平王熙王夫人生河南王曜河間王修長樂王處文二王母氏闕段夫人生廣平王連京兆王黎皇子渾及聰母氏並闕皆早薨無後清河王紹天興六年封凶佷險悖不遵教訓好輕遊里巷劫剝行人斫射犬豕以為戲樂太祖嘗怒之倒懸井中垂死乃出太宗常以義方責之遂與不協懼其為變而紹母夫人賀氏有譴太祖幽之於宮將殺之會日暮未決賀氏密告紹曰汝將何以救吾紹乃夜與帳下及宦者數人踰宮犯禁左右侍御呼曰賊至太祖驚起求弓刀不獲遂暴崩明日宮門至日中不開紹稱詔召百僚於西宮端門前北面而立紹從門扇間謂羣臣曰我有父亦有兄公卿欲從誰也王公已下皆驚愕失色莫有對者良久南平公長孫嵩曰從王羣臣乃知宮車晏駕而不審登遐之狀唯陰平公元烈哭泣而去於是朝野凶凶人懷異志肥如侯賀護舉烽於安陽城北故賀蘭部人皆往赴之其餘舊部亦率子弟招集族人往往相聚紹聞人情不安乃出布帛班賜王公以下上者數百匹下者十匹先是太宗在外聞變乃還潛于山中使人夜告北新侯安同衆皆響應太宗至城西衛士執送紹於是賜紹母子死誅帳下閹官宮人為內應者十數人其先犯乘輿者羣臣於城南都街生臠割而食之紹時年十六紹母即獻明皇后妹也美而麗初太祖如賀蘭部見而悅之告獻明后請納焉后曰不可此過美不善且已有夫太祖密令人殺其夫而納之生紹終致大逆焉陽平王熙天興六年封聰達有雅操為宗屬所欽重太宗治兵於東部詔熙督十二軍校閲甚得軍儀太宗嘉之賞賜隆厚後討西部越勤有功泰常六年薨時年二十三太宗哀慟不已賜溫明祕器禮物備焉熙有七子長子他襲爵身長八尺美姿貌性謹厚武藝過人從世祖討山胡白龍於西河屠其城別破餘黨斬首數千級改封臨淮王拜鎮東將軍尋改封淮南王除使持節都督豫洛河南諸軍事鎮南大將軍開府儀同三司鎮虎牢威名甚著後與武昌王提率并州諸軍討吐京叛胡曹僕渾於河西平之拜使持節前鋒大將軍都督諸軍事北討蠕蠕破之運軍儲於比干城劉義隆遣將寇邊他從征於懸瓠破之拜使持節都督雍秦二州諸軍事鎮西大將軍開府儀同三司雍州刺史鎮長安綏撫秦土得民夷之心時義隆寇南鄙以他威信素著復為虎牢鎮都大將高宗時轉使持節都督涼州諸軍事鎮西大將軍儀同如故高祖初入為中都大官拜侍中轉征西大將軍遷司徒賜安車几杖入朝不趨太和十二年薨年七十三時高祖有事宗廟始薦聞薨為之廢祭輿駕親臨哀慟詔有司監護喪事禮賵有加追贈平東大將軍定州牧司徒如故諡曰靖王他三子世子吐萬早卒贈冠軍并州刺史晉陽順侯子顯襲祖爵薨諡曰僖王子世遵襲世宗時拜前軍將軍行幽州事兼西中郎將又行青州事尋遷驍騎將軍出為征虜將軍幽州刺史世遵性清和推誠化導百姓樂之肅宗時以本將軍為荊州刺史尋加前將軍初在漢陽復有聲迹後頗行貨賄散費邊儲由是聲望有損沔南蠻首及襄陽民望入密信引世遵請以襄陽內附世遵表求赴應朝議從之詔加世遵持節都督荊州及沔南諸軍事平南將軍加散騎常侍餘如故遣洛州刺史伊生冠軍將軍魯陽太守崔模為別將率步騎二萬受世遵節度軍至漢水模等皆疑不渡世遵怒臨之以兵模乃濟而內應者謀泄為蕭衍雍州刺史所殺築門以自固模焚襄陽邑郭燒殺數萬口會是夜大風雨雪模等班師士卒凍死十二三世遵及生模並坐免官後除散騎常侍平北將軍定州刺史百姓安之孝昌元年薨於州贈散騎常侍征西將軍雍州刺史諡曰康王子敬先襲歷諫議大夫散騎常侍領主衣都統元皓入洛莊帝北巡敬先與叔父均等於河梁起義為皓所害追贈侍中車騎大將軍太尉公定州刺史子宣洪襲歷諫議大夫光祿少卿武定中與元瑾謀反誅國除世遵弟均字世平纍遷通直常侍征虜將軍以河梁立義之功封安康縣開國伯食邑五百戶除散騎常侍平東將軍卒贈使持節征東將軍青州刺史出帝時復贈驃騎大將軍儀同三司冀州刺史均六子長子欣之性粗武幼有氣力釋褐定州平北府中兵參軍稍遷尚書右中兵郎以河渚起義之勳賜爵東阿侯初孝莊之圖爾朱榮元天穆也欣之密啓臨事之日乞得侍立手斬二人及榮之死百僚入賀欣之獨蒙勞問莊帝崩於晉陽欣之內懼及齊獻武王起義河北欣之奔赴後廢帝時除散騎常侍大丞相右長史出帝初襲先封安康縣開國伯除撫軍將軍北徐州刺史便道之州屬樊子鵠據瑕丘反遂於中途遇害以死王事追贈使持節都督定殷二州諸軍事驃騎大將軍司空公定州刺史諡曰文貞欣之弟慶鸞武定末司徒咨議參軍慶鸞弟慶哲終於司農少卿贈中軍將軍濟州刺史均弟禹容貌魁偉起家司空參軍轉符璽郎太常丞鎮遠將軍東海太守帶峒峿戍主禹頗好內學每云晉地有福孝昌末遂詣爾朱榮建義元年與榮同入洛除中軍將軍金紫光祿大夫封鄄城縣開國伯邑五百戶為并州東面大都督鎮樂平榮死之後為土民王惡氈起義殺之後贈征西將軍雍州刺史子長淵襲武定中南青州長史齊受禪爵例降禹弟菩薩給事中卒贈濟南太守吐萬弟鍾葵早卒長子法壽侍御中散纍遷中散大夫出除龍驤將軍安州刺史法壽先令所親微服入境觀察風俗下車便大行賞罰於是境內肅然更滿還朝吏人詣闕訴乞肅宗嘉之詔復州任後徵為太中大夫加左將軍遷平東將軍光祿大夫建義初於河陰遇害贈車騎將軍相州刺史子慶始大司農丞與父同時見害贈前將軍廣州刺史慶始弟慶遵武定末瀛州騎府司馬慶遵弟慶智美容貌有几案才著作佐郎司徒中兵參軍卒於太尉主簿法壽弟法僧自太尉行參軍稍轉通直郎寧遠將軍司徒司馬掾龍驤將軍益州刺史素無治幹加以貪虐殺戮自任威怒無王賈諸姓州內人士法僧皆召為卒伍無所假縱於是合境皆反招引外寇蕭衍遣將張齊率衆攻逼城門晝閉行旅不通法僧上表曰臣忝守遐方變生慮表賊衆侜張所在強盛統內城戍悉已陷沒近州之民亦皆擾叛唯獨州治僅存而已亡滅之期非旦則夕臣自思忖必是死人但恐不得謝罪闕庭既忝宗枝纍辱不淺若死為鬼永曠天顏九泉之下實深重恨今募使間行偷路奔告若臺軍速至猶希全保哭送使者不知所言肅宗詔曰比敕傅竪眼倍道兼行而猶未達可更遣尚書郎堪幹者一人馳驛催遣庶令拔彼倒懸救茲危急竪眼頻破張齊於是獲全徵拜光祿大夫出為平東將軍兗州刺史轉安東將軍徐州刺史孝昌元年法僧殺行臺高諒反於彭城自稱尊號號年天啓大軍致討法僧攜諸子擁掠城內及文武南奔蕭衍鍾葵弟篤字阿成太子右率北中郎將撫冥鎮將光祿卿出除平北將軍幽州刺史卒諡曰貞長子浩字洪達太尉長史他弟渾繼叔父廣平王連渾弟比陵太延五年為司空賜爵嚑公除安遠將軍懷荒鎮大將卒子天琚襲高祖時征虜將軍青州刺史從駕南征拜後將軍尋降公為侯除西中郎將世祖時征虜將軍夏州刺史卒贈本將軍濟州刺史子延伯襲卒河南王曜天興六年封五歲嘗射雀於太祖前中之太祖驚歎焉及長武藝絶人與陽平王熙等並督諸軍講武衆咸服其勇泰常七年薨時年二十二有七子長子提驍烈有父風世祖時襲爵改封潁川王迎昭儀于塞北時年十六有夙成之量殊域敬焉後改封武昌拜使持節鎮東大將軍平原鎮都大將在任十年大著威名後與淮南王他討平吐京叛胡遷使持節車騎大將軍統萬鎮都大將賜馬百匹羊千口甚見寵待太安元年薨年四十七諡曰成王長子平原襲爵忠果有智略顯祖時蠕蠕犯塞從駕擊之平原戰功居多拜假節都督齊兗二州諸軍事鎮南將軍齊州刺史善於懷撫邊民歸附者千有餘家高祖時妖賊司馬小君自稱晉後聚黨三千餘人屯聚平陵號年聖君攻破郡縣殺害長吏平原身自討擊殺七人擒小君送京師斬之又有妖人劉舉自稱天子扇惑百姓復討斬之時歲穀不登齊民飢饉平原以私米三千餘斛為粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓凝之等千餘人詣闕頌之高祖覽而嘉歎及還京師每歲率諸軍屯於漠南以備蠕蠕遷都督雍秦梁益四州諸軍事征南大將軍開府雍州刺史鎮長安太和十一年薨贈以本官加羽葆鼓吹諡曰簡王有五子長子和為沙門捨其子顯以爵讓其次弟鑒鑒固辭詔許鑒身終之後令顯襲爵鑒乃受之鑒字紹達少有父風頗覽書傳沉重少言寬和好士拜通直散騎常侍尋加冠軍將軍守河南尹車駕南伐以鑒為平南將軍還除左衛將軍出為征虜將軍齊州刺史時革變之始百度惟新鑒上遵高祖之旨下釆齊之舊風軌制粲然皆合規矩高祖覽其所上嗟美者久之顧謂侍臣曰諸州刺史皆能如此變風易俗更有何難下詔褒美班之天下一如鑒所上齊人愛詠咸曰耳目更新高祖崩後和罷沙門歸俗棄其妻子納一寡婦曹氏為妻曹氏年齒已長攜男女五人隨鑒至歷城干亂政事和與曹及五子七處受納鑒皆順其意言無不從於是獄以賄成取受狼籍齊人苦之鑒治名大損世宗初以本將軍轉徐州刺史屬徐兗大水民多飢饉鑒表加賑恤民賴以濟先是京兆王愈為徐州王既年少長史盧淵寬以馭下郡縣多不奉法鑒表曰梁郡太守程靈虬唯酒是耽貪財為事虐政殘民寇盜並起黷音悖響盈於道路部境呼嗟僉焉怨酷梁郡密邇僞畿醜聲易布非直有點清風臣恐取嗤荒遠請免所居官以明刑憲詔免靈虬郡徵還京師於是徐境肅然蕭衍角城戍主柴慶宗以城內附鑒遣淮陽太守吳秦生率兵千餘赴之衍淮陰援軍已來斷路秦生屢戰破之乘勝而進遂克角城世宗詔鑒曰知摧角城威謀展稱良以欣然此城襟帶淮滸川路衝要自昔經算未能克之蟻固積紀每成邊害將軍淵規潛運妙略克宣闢境克城功著不日據要扼喉津徑勢阻可謂勳高三捷朕甚嘉焉守御諸宜善以量度矜慰之使尋當別遣年四十二薨贈衛大將軍齊州刺史王如故諡曰悼王長子伯宗員外郎次仲淵蘭陵太守並早卒仲淵弟季偉武定中太尉中兵參軍和字善意鑒薨之後與鑒子伯宗競求承襲尚書令肇奏和太和中出為沙門讓爵於鑒鑒後以和子顯年在弱冠宜承基緒求遜王爵以歸正胤先朝詔終鑒身聽如其請鑒既薨逝和求襲封謹尋詔旨聽傳子顯不許其身和先讓後求有乖道素請令伯宗承襲世宗詔曰和初以讓鑒而鋻還讓其子交讓之道於是乎著其子早終可聽和襲尋拜諫議大夫兼太子率更令轉通直散騎常侍兼東中郎將肅宗時出為輔國將軍涼州刺史坐事免久之除東郡太守正光四年薨贈安東將軍相州刺史子謙字思義襲爵後拜前軍將軍征蠻都督莊帝初於河陰遇害贈散騎常侍征東大將軍儀同三司相州刺史子棽襲齊受禪爵例降鑒弟榮字生高祖時直寢從駕征新野終於羽林監榮弟亮字辟邪威遠將軍羽林監卒贈河間太守亮弟馗字道明太尉府行參軍司徒掾鎮遠將軍太僕少卿出除安西將軍東秦州刺史建義初卒於州贈征東將軍青州刺史河間王修天賜四年封泰常元年薨無子世祖繼絶世詔河南王曜之子羯兒襲修爵改封略陽後與永昌王健督諸軍討禿髮保周於番和徙張掖民數百家於武威遂與諸將私自沒入坐貪暴降爵為公後統河西諸軍襲蠕蠕至於漠南仍復王爵加征西大將軍正平初有罪賜死爵除長樂王處文天賜四年封聰辨夙成年十四泰常元年薨太宗悼傷之自小斂至葬常親臨哀慟陪葬金陵無子爵除廣平王連天賜四年封始光四年薨無子世祖繼絶世以陽平王熙之第二子渾為南平王以繼連後加平西將軍渾好弓馬射鳥輒歷飛而殺之時皆歎異焉世祖嘗命左右分射勝者中的籌滿詔渾解之三發皆中世祖大悅器其藝能常引侍左右賜馬百匹僮僕數十人後拜假節都督平州諸軍事領護東夷校尉鎮東大將軍儀同三司平州刺史鎮和龍在州綏導有方民夷悅之徙涼州鎮將都督西戎諸軍事領護西域校尉賜御馬二匹臨鎮清慎恩著涼土更滿還京父老皆涕泣追送若違所親太和十一年從駕巡方山道薨子飛龍襲後賜名霄身長九尺腰帶十圍容貌魁偉雅有風則貞白卓然好直言正諫朝臣憚之高祖特垂欽重除宗正卿右光祿大夫詔曰自今奏事諸臣相稱可云姓名惟南平王一人可直言其封遷左光祿大夫太和十七年薨賜朝服一具衣一襲東園第一祕器絹千匹高祖緦衰臨霄喪哀慟左右宴不舉樂贈衛將軍定州刺史賜帛五百匹諡曰安王子纂襲纂亦有譽於時除恢武將軍進平西將軍領西中郎將出為安北將軍平州刺史景明元年薨於平城子伯和襲永平三年薨贈散騎侍郎諡曰哀王闕統卒贈涼州刺史子思略武定末瀛州治中思略弟叔略武定中太尉主簿京兆王黎天賜四年封神元年薨子根襲改封江陽王加平北將軍薨無子顯祖以南平王霄第二子繼為根後繼字世仁襲封江陽王加平北將軍高祖時除使持節安北將軍撫冥鎮都大將轉都督柔玄撫冥懷荒三鎮諸軍事鎮北將軍柔玄鎮大將入為左衛將軍兼侍中又兼中領軍留守洛京尋除持節平北將軍鎮攝舊都高車酋帥樹者擁部民反叛詔繼都督北討諸軍事自懷朔已東悉禀繼節度繼表高車頑黨不識威憲輕相合集背役逃歸計其凶戾事合窮極若悉追戮恐遂擾亂請遣使鎮別推檢斬愆首一人自餘加以慰喻若悔悟從役者即令赴軍詔從之於是叛徒往往歸順高祖善之顧謂侍臣曰江陽良足大任也車駕北巡至鄴而高車悉降朔清定繼以高車擾叛頻表請罪高祖優詔喻之世宗時除征虜將軍青州刺史轉平北將軍州刺史入為度支尚書繼在青州之日民飢餒為家僮取民女為婦妾又以良人為婢為御史所彈坐免官爵後大將軍高肇伐蜀世宗以繼為平東將軍鎮遏徐揚世宗崩班師及靈太后臨朝繼子叉先納太后妹復繼尚書本封尋除侍中領軍將軍又除特進驃騎將軍侍中領軍如故繼頻表固讓許之又詔還依前授太師高陽王雍太傅清河王懌太保廣平王懷及門下八座奏追論繼太和中慰喻高車安輯四鎮之勳增邑一千五百戶繼又上表陳讓詔聽減戶五百靈太后以子叉姻戚數與肅宗幸繼宅置酒高會班賜有加尋加侍中驃騎大將軍儀同三司特進領軍如故徙封京兆王繼疾患積年枕養于家每至靈太后與肅宗遊幸於外時令扶入居守禁內及節慶宴饗皆力疾參焉遷司空公侍中如故寬和容裕號為長者神龜末子叉得志轉司徒公仍加侍中繼以蕃王宿宦舊貴高祖時歷內外顯任意遇已隆靈太后臨朝入居心膂兼處門下歷轉台司叉又居權重榮赫一世繼頻表遜位乞以司徒授崔光詔遣侍中安豐王延明給事黃門侍郎盧同敦勸繼又啓固讓轉太保侍中如故加後部鼓吹頻表陳辭不許詔曰至節嘉辰禮有朝慶親尊戚老理宜優異王位高年宿可依齊郡王簡故事朝訖引坐免其拜伏轉太傅侍中如故頻讓不許又遣使敦勸乃受之時叉執殺生之柄威福自己門生故吏遍於省闥拜受之日送者傾朝當世以為榮有識者為之致懼太官給酒膳供賓客又詔令乘步挽至殿庭兩人扶侍禮秩與丞相高陽王相埒後除使持節侍中太師大將軍録尚書事大都督節度西道諸軍及出師之日車駕臨餞傾朝祖送賞賜萬計轉太尉公侍中太師録尚書都督並如故尋詔班師繼啓求還復江陽詔從之繼晚更貪婪聚斂無已牧守令長新除赴官無不受納貨賄以相託付妻子各別請屬至乃郡縣微吏亦不得平心選舉憑叉威勢法官不敢糾摘天下患之叉黜繼廢於家初爾朱榮之為直寢也數以名馬奉叉叉接以恩意榮甚德之建義初復以繼為太師司州牧永安二年薨贈假黃鉞都督雍華涇邠秦岐河梁益九州諸軍事大將軍録尚書大丞相雍州刺史王如故諡曰武烈叉繼長子字伯俊小字夜叉世宗時拜員外郎靈太后臨朝以叉妹夫除通直散騎侍郎叉妻封新平郡君後遷馮翊郡君拜女侍中叉以此意勢日盛尋遷散騎常侍光祿少卿領嘗食典御轉光祿卿叉女夭靈太后詔曰叉長女年垂弱笄奄致夭喪悼念兼懷可贈鄉主尋遷侍中餘官如故加領軍將軍既在門下兼總禁兵深為靈太后所信委太傅清河王懌以親賢輔政參決機事以叉恃寵驕盈志欲無限懌裁之以法叉輕其為人每欲斥黜之叉遂令通直郎宋維告司染都尉韓文殊欲謀逆立懌懌坐禁止後窮治無實懌雖得免猶以兵衛守於宮西別館久之叉恐懌終為己害乃與侍中劉騰密謀靈太后時在嘉福未御前殿騰詐取主食中黃門胡玄度胡定列誣懌云許度等金帛令以毒藥置御食中以害帝自望為帝許度兄弟以富貴騰以具奏肅宗聞而信之乃御顯陽殿騰閉永巷門靈太后不得出懌入遇叉於含章殿後欲入徽章東閣叉厲聲不聽懌曰汝欲反邪叉曰元叉不反正欲縛反人叉命宗士及直齊等三十人執懌衣袂將入含章東省使數十人防守之騰稱詔召集公卿議以大逆論咸畏憚叉無敢異者唯僕射游肇執意不同語在其傳叉騰持公卿議入奏俄而事可夜中殺懌於是假為靈太后辭遜之詔叉遂與太師高陽王雍等輔政常直禁中肅宗呼為姨父自後專綜機要巨細決之威振於內外百僚重跡相州刺史中山王熙抗表起義以討叉為名不果見誅叉尋遷衛將軍餘如故後靈太后與肅宗宴於西林園日暮還宮右衛將軍奚康生復欲圖叉不克而誅語在其傳是後肅宗徙御徽音殿叉亦入居殿右既在密近曲盡佞媚以承上旨遂蒙寵信出入禁中令勇士持刀劍以自先後公私行止彌加威防叉於千秋門外廠下施木闌檻有時出入止息其中腹心防守以備竊發人物求見者遙對之而已乃封其子亮平原郡開國公食邑一千戶及拜肅宗御南門臨觀并賜御馬帛千匹初叉之專政矯情自飾勞謙待士時事得失頗以關懷而才術空淺終無遠致得志之後便驕愎耽酒好色與奪任情乃於禁中自作別庫掌握之寶充牣其中又曾臥婦人於食輿以帊覆之令人輿入禁內出亦如之直衛雖知莫敢言者輕薄趣勢之徒以酒色事之姑姊婦女朋淫無別政事怠惰綱紀不舉州鎮守宰多非其人於是天下遂亂矣從劉騰死後防衛微緩叉頗亦自寬時宿於外每日出遊留連他邑靈太后微察知之叉積習生常無復虞慮其所親諫叉叉又不納正光五年秋靈太后對肅宗謂羣臣曰隔絶我母子不聽我往來兒間復何用我為放我出家我當永絶人間修道於嵩高間居寺先帝聖鑒鑒於未然本營此寺者正為我今日欲自下髮肅宗與羣臣大懼叩頭泣涕殷勤苦請靈太后聲色甚厲意殊不回肅宗乃宿於嘉福殿積數日遂與太后密謀圖叉肅宗內雖圖之外形彌密靈太后瞋忿之言欲得往來顯陽之意皆以告叉又對叉流涕太后欲出家憂怖之心如此密言日有數四叉殊不為疑乃勸肅宗從太后意於是太后數御顯陽二宮無復禁礙叉舉其親元法僧為徐州刺史法僧據州反叛靈太后數以為言叉深愧悔丞相高陽王雍雖位重於叉而甚畏憚欲進言於肅宗而事無因會太后與肅宗南遊洛水雍邀請車駕遂幸雍第日晏肅宗及太后至雍內室從者莫得而入遂定圖叉之計後雍從肅宗朝太后乃進言曰臣不慮天下諸賊唯慮元叉何者叉總握禁旅兵皆屬之父率百萬之衆虎視京西弟為都督總三齊之衆元叉無心則已若其有心聖朝將何以抗叉雖曰不反誰見其心而不可不懼太后曰然元郎若忠於朝廷而無反心何故不去此領軍以餘官輔政叉聞之甚懼免冠求解乃以叉為驃騎大將軍儀同三司尚書令侍中領左右叉雖去兵權然總任內外殊不慮有黜廢之理也後叉出宿遂解其侍中旦欲入宮門者不納尋除名為民初咸陽王禧以逆見誅其子樹奔蕭衍衍封為鄴王及法僧反叛後樹遺公卿百僚書曰魏室不造姦豎擅朝社稷阽危綴旒非譬元叉險慝狼戾人倫不齒屬籍疏遠素無問望特以太后姻婭早蒙寵擢曾不懷音公行反噬肆茲悖逆人神同憤自頃境土所傳皆云叉狼心蠆毒藉權位而日滋含忍諂詐與日月而彌甚無君之心非復一日篡逼之事旦暮必行抑又聞之夫名以出信信以制義山川隱疾且猶不以名成師兆亂巨君不臣求之史籍有自來矣元叉本名夜叉弟羅實名羅剎夜叉羅剎此鬼食人非遇黑風事同飄墮嗚呼魏境離此二災惡木盜泉不息不飲勝名梟稱不入不為況昆季此名表能噬物日露久矣始信斯言況乃母后幽辱繼主蒙塵釋位揮戈言謀王室不在今日何謂人臣諸賢或奕世載德或將相繼踵或受任纍朝或職居機要或姻戚匪他或忠義是秉俯眉逆手見制凶威臣節未申徒有勤悴又聞自叉專政億兆離德重以歲時災厲年年水旱牛馬殪踣桑柘焦枯饑饉相仍菜色滿道妖災告譴人皆歎息瀍澗西北羌戎陸梁泗汴左右戍漕流離加以剖斫忠賢殲殄宗室哀彼本邦一朝橫潰今既率師將除君側區區之懷庶令冠屨得所大憝同必誅之戮魏祀無忽諸之非叉為遠近所惡如此其後靈太后顧謂侍臣曰劉騰元叉昔邀朕索鐵券望得不死朕賴不與中書舍人韓子熙曰事關殺活豈計與否陛下昔雖不與何解今日不殺靈太后憮然未幾有人告叉及其弟爪謀反欲令其黨攻近京諸縣破市燒邑郭以驚動內外先遣其從弟洪業率六鎮降戶反於定州又令人勾魯陽諸蠻侵擾伊闕叉兄弟為內應起事有日得其手書靈太后以妹壻之故未忍便決黃門侍郎李琰之曰元叉之罪具騰遐邇豈容復停以惑視聽黃門徐紇趨前欲諫逡巡未敢羣臣固執不已肅宗又以為言太后乃從之於是叉及弟爪並賜死於家太后猶以妹故復追贈叉侍中驃騎大將軍儀同三司尚書令冀州刺史叉子亮襲祖爵齊受禪例降叉庶長子稚祕書郎中叉死之後遂亡奔蕭衍叉弟羅字仲綱以儉素著稱起家司空參軍事轉司徒主簿領嘗食典御散騎侍郎散騎常侍雖父兄貴盛而虛己謙退恂恂接物遷平東將軍青州刺史叉當朝專政羅望傾四海于時才名之士王元景邢子才李奬等咸為其賓客從遊青土時蕭衍遣將寇邊以羅行撫軍將軍都督青光南青三州諸軍事罷州入為宗正卿孝莊初除尚書右僕射東道大使出帝時遷尚書令尋除使持節驃騎大將軍開府儀同三司梁州刺史羅既懦怯孝靜初蕭衍遣將圍逼羅以州降叉死之後羅逼叉妻時人穢之或云其救命之計也羅弟爽字景哲少而機警尤為父所寵愛解褐祕書郎稍遷給事黃門侍郎金紫光祿大夫永熙二年卒贈使持節都督涇岐秦三州諸軍事衛將軍尚書左僕射秦州刺史諡曰懿爽子德隆武定末太子中庶子爽弟蠻武定末光祿卿爪字景雍給事中與兄叉同以罪誅繼弟羅侯遷洛之際以墳陵在北遂家於燕州之昌平郡內豐資産唯以意得為適不入京師有賓客往來者必厚相禮遣豪據北方甚有聲稱叉權重以羅侯不樂入仕就拜昌平太守正光末逆賊大俄佛保陷郡見害子景遵直寢太常丞史臣曰梟鏡為物天實生之知母忘父蓋亦禽獸元紹其人此之不若乎陽平以下降年夭促英才武略未顯於時靜簡二王為時稱首鑒既有聲渾亦見器霄荷遇高祖繼受任太和苟無其才名位豈徒及也叉階緣寵私智小謀大任重才弱遂亂天下殺身全祀不亦幸哉
