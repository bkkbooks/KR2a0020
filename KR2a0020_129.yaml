body:
  text: 魏書卷一百一十二下靈徵志八下第十八魏氏世居幽朔至獻帝世有神人言應南遷於是傳位於子聖武帝命令南徙山谷阻絶仍欲止焉復有神獸其形似馬其聲類牛先行導引積年乃出始居胸奴之故地高祖延興元年十一月肆州秀容民獲麟以獻王者不刳胎剖卵則至世祖神三年七月冀州獻白龜王者不私人以官尊耆任舊無偏黨之應高宗興安二年六月營州送大龜高祖延興元年十二月徐州竹邑戍士邢德於彭城南一百二十里得蓍一株四十九枝下掘得大龜獻之詔曰龜蓍與經文相合所謂靈物也德可賜爵五等三年六月京師獲大龜肅宗神龜元年二月獲龜於九龍殿靈芝池大赦改元孝靜武定三年十月有司奏南兗州陳留郡民賈興達於家庭得毛龜一天平四年八月有巨象至於南兗州碭郡民陳天愛以告送京師大赦改年王者自養有節則至高祖太和二年十一月徐州獻黑狐周成王時治致太平而黑狐見三年五月獲白狐王者仁智則至六月撫冥獲白狐以獻八年六月徐州獲黑狐以獻十年三月冀州獲九尾狐以獻王者六合一統則見周文王時東夷歸之曰王者不傾於色則至德至鳥獸亦至十一年十一月冀州獲九尾狐以獻二十三年正月司州河州各獻白狐狸十九年六月司州平陽郡獲白狐以獻世宗景明三年二月河州獻白狐永平三年十月白狐見於汲郡延昌四年四月兗州獻白狐九月相州獻白狐閏月汾州獻白狐二肅宗正光二年三月南青州獻白狐二三年六月平陽郡獻白狐八月光州獻九尾狐四年五月平陽郡獻白狐孝靜天平四年四月西兗州獻白狐七月光州獻九尾狐元象元年四月光州獻九尾狐二年二月光州獻九尾狐興和三年五月司州獻九尾狐十二月魏郡獻白狐四年四月瀛州獻白狐二武定元年七月幽州獲白狐以獻上三年七月瀛州獻白狐二牡一牝九月西兗州獻白狐太和二年十一月辛未泰州獻五色狗三年三月齊州獻五色狗其五色如畫太祖天興四年五月魏郡斥丘縣獲白鹿王者惠及下則至太宗永興四年九月建興郡獻白鹿世祖神元年二月定州獲白白鹿又見於樂陵因以改元三年二月白鹿見於代郡倒剌山太延四年十二月相州獻白鹿真君八年五月洛州送白鹿高宗太安二年十月白鹿見於京師西苑高祖承明元年六月秦州獻白鹿太和元年正月白鹿見於秦州三月白鹿見於青州四年正月南豫州獻白鹿十九年七月司州獲白鹿麑以獻二十年六月司州獻白鹿世宗景明元年四月荊州獻白鹿永平四年八月平州獻白鹿延昌二年五月齊州獻白鹿四年六月司州獻白鹿肅宗熙平元年五月濟州獻白鹿二年五月司州獻白鹿神龜二年六月徐州獻白鹿孝靜元象元年六月齊獻武王獲白鹿以獻武定元年六月兗州獻白鹿太祖登國六年十二月上獵親獲鹿一角召問羣臣皆曰鹿當二角今一是諸國將并之應也高祖太和三年三月肆州獻一角鹿神龜元年七月徐州獻一角鹿世宗正始二年九月後軍將軍爾朱新興獻一角獸天下平一則至肅宗熙平元年十一月肆州獻一角獸神龜二年九月徐州獻一角獸高宗太安三年三月有白狼一見於太平郡議者曰古今瑞應多矣然白狼見於成湯之世故殷道用興太平嘉名也又先帝本封之國而白狼見焉無窮之徵也周宣王得之而犬戎服太宗永興四年十二月章安子封懿獻白麞王者刑罰理則至高祖太和二年十二月懷州獻白麞三年五月白麞見於豫州二十三年正月華州獻白肅宗熙平二年三月徐州獻白麞神龜二年七月徐州獻白麞孝靜武定七年七月瀛州獻白麞高祖太和七年六月青州獻三足烏王者慈孝天地則至十三年十一月滎陽獻三足烏十四年六月懷州獻三足烏十五年閏月濟州獻三足烏十七年五月冀州獻三足烏二十年六月豫州獻三足烏二十三年六月冀州獻三足烏世宗景明元年五月徐州獻三足烏三年二月豫州獻三足烏四年六月幽州獻四足烏正始元年二月冀州獻三足烏五月幽州獻三足烏是月相州獻三足烏六月定州獻三足烏二年五月肆州獻三足烏三年三月豫州獻三足烏是月豫州又獻三足烏永平元年四月豫州獻三足烏延昌三年二月冀州獻三足烏肅宗熙平元年四月汲郡獻三足烏二年四月東郡獻三足烏是月豫州獻三足烏南兗州又獻三足烏神龜元年八月雍州獻三足烏二年五月潁川郡獻三足烏正光元年四月濟州獻三足烏是月濟州又獻三足烏二年閏月東郡獻三足烏三年五月東郡獻三足烏潁川郡許昌縣獻三足烏肆州獻三足烏六月冀州獻三足烏四年六月瀛州獻三足烏出帝太昌元年五月齊獻武王獲三足烏以獻孝靜元象二年四月京師獲三足烏武定三年五月瀛州獻三足烏四年四月潁州獻三足烏五月潁州又獻三足烏高祖太和二年七月白烏見於涼州王者宗廟肅敬則至九月白烏見於京師三年五月白烏見於豫州九月白烏見於秦州十七年六月兗州獻白烏二十三年十二月司州獻白烏世宗正始二年五月司州獻白烏三年九月潁川郡獻白烏四年七月潁川又獻白烏永平元年四月潁川獻白烏延昌二年八月平陽郡獻白烏三年六月冀州獻白烏肅宗正光元年十月幽州獻白烏孝靜天平二年七月齊獻武王獲白烏以獻元象元年五月冀州獲白烏二年八月徐州表濟陰郡廳事前槐樹烏巢於上烏母死有鵲銜食餔烏兒不失其時並皆長大賞太守帛十匹興和四年四月魏郡貴鄉縣獲白烏雛五月京師獲白烏是月陽夏郡獻白烏七月北豫州獻白烏十月瀛州獻白烏武定元年六月東郡民獻白烏三年五月北豫州獻白烏是月廣宗郡獻白烏潁州又獻白烏六月滄州獻白烏四年四月梁州獻白烏五月濟州獻白烏八月陽夏郡獻白