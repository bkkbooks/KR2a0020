body:
  text: 魏書卷一百一列傳第八十九氐吐谷渾宕昌高昌鄧至蠻獠氐者西夷之別種號曰白馬三代之際蓋自有君長而世一朝見故詩稱自彼氐羌莫敢不來王也秦漢以來世居岐隴以南漢川以西自立豪帥漢武帝遣中郎將郭昌衞廣滅之以其地為武都郡自汧渭抵於巴蜀種類實繁或謂之白氐或謂之故氐各有侯王受中國封拜漢建安中有楊騰者為部落大帥騰勇健多計略始徙居仇池仇池方百頃因以為號四面斗絕高七里餘羊腸蟠道三十六回其上有豐水泉煮土成鹽騰後有名千万者魏拜為百頃氐王千万孫名飛龍漸強盛晉武帝假平西將軍無子養外甥令狐茂搜為子惠帝元康中茂搜自號輔國將軍右賢王羣氐推以為主關中人士流移者多依之愍帝以為驃騎將軍左賢王茂搜死子難敵統位與弟堅頭分部曲難敵自號左賢王屯下辨堅頭號右賢王屯河池難敵死子毅立自號使持節龍驤將軍左賢王下辨公以堅頭子盤為使持節冠軍將軍右賢王河池公臣晉晉以毅為征南將軍三年毅族兄初襲殺毅并有其衆自立為仇池公臣於石虎後稱藩於晉永和十年改初為天水公十一年毅小弟宋奴使姑子梁三王因侍直手刃殺初初子國率左右誅三王及宋奴復自立為仇池公桓溫表國為秦州刺史國子安為武都太守十二年國從叔俊復殺國自立國子安叛苻生殺俊復稱藩於晉安死子世自立為仇池公晉太和三年以世為秦州刺史弟統為武都太守世死統廢世子纂自立統一名德纂聚黨襲殺統自立為仇池公遣使詣簡文帝以纂為秦州刺史晉咸安元年苻堅遣楊安伐纂克之徙其民於關中空百頃之地宋奴之死二子佛奴佛狗逃奔苻堅堅以女妻佛奴子定拜為尚書領軍苻堅之敗關右擾亂定盡力於堅堅死乃率衆奔隴右徙治歷城去仇池百二十里置倉儲於百頃招夷夏得千餘家自稱龍驤將軍仇池公稱藩於晉孝武即以其自號假之後以為秦州刺史登國四年遂有秦州之地自號隴西王後為乞伏乾歸所殺無子佛狗子盛先為監國守仇池乃統事自號征西將軍秦州刺史仇池公諡定為武王分諸氐羌為二十部護軍各為鎮戍不置郡縣遂有漢中之地仍稱藩于晉天興初遣使朝貢詔以盛為征南大將軍仇池王隔礙姚興不得歲通貢使盛以兄子撫為平南將軍梁州刺史守漢中劉裕永初中封盛為武都王盛死私諡曰惠文王子玄統位玄字黃眉號征西大將軍開府儀同三司秦州刺史武都王雖稱藩於劉義隆仍奉晉義熙之號後始用義隆元嘉正朔初盛謂玄曰吾年已老當終為晉臣汝善事宋帝故玄奉焉玄善於待士為流舊所懷始光四年世祖遣大鴻臚公孫軌拜玄為征南大將軍都督梁州刺史南秦王玄上表請比內藩許之玄死私諡孝昭王子保宗統位初玄臨終謂弟難當曰今境候未寧方須撫慰保宗沖昧吾授卿國事其無墜先勳難當固辭請立保宗以輔之保宗既立難當妻姚氏謂難當曰國險宜立長君反事孺子非久計難當從之廢保宗而自立稱藩于劉義隆難當拜保宗為鎮南將軍鎮石昌以次子順為鎮東將軍秦州刺史守上邽保宗謀襲難當事泄被繫先是四方流人以仇池豐實多往依附流人有許穆之郝惔之二人投難當並改姓為司馬穆之自云名飛龍惔之自云名康之云是晉室近戚康之尋為人所殺時劉義隆梁州刺史甄法護刑政不理義隆遣刺史蕭思話代任難當以思話未至遣將舉兵襲梁州破白馬遂有漢中之地尋而思話使其司馬蕭承之先驅進討所向克捷遂平梁州因又附義隆難當後釋保宗遣鎮董亭保宗與兄保顯歸京師世祖拜保宗征南大將軍秦州牧武都王尚公主保顯為鎮西將軍晉壽公後遣大鴻臚崔賾拜難當為征南大將軍儀同三司領護西羌校尉秦梁二州牧南秦王難當後自立為大秦王號年曰建義立妻為王后世子為太子置百官具擬天朝然猶貢獻于劉義隆不絕尋而其國大旱多災異降大秦王復為武都王太延初難當立鎮上邽世祖遣車騎大將軍樂平王丕等督河西高平諸軍取上邽又詔諭難當難當奉詔攝守尋而傾國南寇規有蜀土襲義隆益州攻涪城又伐巴西獲雍州流人七千餘家還于仇池義隆怒遣將裴方明等伐之難當為方明所敗棄仇池與千餘騎奔上邽世祖遣中山王辰迎之赴行宮方明既克仇池以保宗弟保熾守之河間公齊擊走之先是詔保宗鎮上邽又詔鎮駱谷復其本國保宗弟文德先逃氐中乃說保宗令叛事泄齊執保宗送京師詔難當殺之氐羌立文德屯于濁水文德自號征西將軍秦河梁三州牧仇池公求援於義隆義隆封文德為武都王遣偏將房亮之等助之齊逆擊禽亮之文德奔守葭蘆武都陰平氐多歸之詔淮陽公皮豹子等率諸軍討之文德走漢中收其妻子僚屬資糧及保宗妻公主送京師賜死初公主勸保宗反人問曰背父母之邦若何公主曰禮婦人外成因夫而榮事立據守一方我亦一國之母豈比小縣之主以此得罪高宗時拜難當營州刺史還為外都大官卒諡曰忠子和隨父歸國別賜爵仇池公子德襲難當爵早卒子小眼襲例降為公拜天水太守卒子大眼別有傳小眼子公熙襲爵正光中尚書右丞張普惠為行臺送租於南秦東益普惠啟公熙俱行至南秦以氐反不得進遣公熙先慰氐東益州刺史魏子建以公熙險薄密令訪察公熙果有潛謀將為叛亂子建仍報普惠令其攝錄普惠急追公熙竟不肯赴東出漢中普惠表列其事公熙大行賄賂終得免罪後為假節別將與都督元志同守岐州為秦賊莫折天生所虜死於秦州文德後自漢中入統汧隴遂有陰平武興之地後為劉義隆荊州刺史劉義宣所殺保宗之執也子元和奔義隆以為武都白水太守元和據城歸順高宗嘉之拜征南大將軍武都王內徙京師元和從叔僧嗣復自稱武都王於葭蘆僧嗣死從弟文度自立為武興王遣使歸順顯祖授文度武興鎮將既而復叛高祖初征西將軍皮歡喜攻葭蘆破之斬文度首文度弟弘小名鼠犯顯祖廟諱以小名稱鼠自為武興王遣使奉表謝罪貢其方物高祖納之鼠遣子苟奴入侍拜鼠都督南秦州刺史征西將軍西戎校尉武都王鼠死從子後起統任高祖復以鼠爵授之鼠子集始為白水太守後起死以集始為征西將軍武都王集始後朝于京師拜都督南秦州刺史安南大將軍領護南蠻校尉漢中郡侯武興王賜以車旗戎馬錦綵繒纊等尋還武興進號鎮南將軍加督寧湘等五州諸軍事後仇池鎮將楊靈珍襲破武興集始遂入蕭賾景明初集始來降還授爵位歸守武興死子紹先立拜都督南秦州刺史征虜將軍漢中郡公武興王贈集始車騎大將軍開府儀同三司諡安王紹先年幼委事二叔集起集義夏侯道遷以漢中歸順也蕭衍白馬戍主尹天保率衆圍之道遷求援於集起集義二人貪保邊藩不欲救之唯集始弟集朗心願立功率衆破天保全漢川集朗之力也集義見梁益既定恐武興不得久為外藩遂扇動諸氐推紹先僭稱大號集起集義並稱王外引蕭衍為援安西將軍邢巒遣建武將軍傅竪眼攻武興克之執紹先送于京師遂滅其國以為武興鎮復改鎮為東益州前後鎮將唐法樂刺史杜纂邢豹以威惠失衷氐豪仇石柱等相率反叛朝廷以西南為憂正光中詔魏子建為刺史以恩信招撫風化大行遠近款附如內地焉後唐永代子建為州未幾氐人悉反永棄城東走自此復為氐地其後紹先奔還武興復自立為王吐谷渾本遼東鮮卑徒河涉歸子也涉歸一名弈洛韓有二子庶長曰吐谷渾少曰若洛廆涉歸死若洛廆代統部落別為慕容氏涉歸之存也分戶七百以給吐谷渾吐谷渾與若洛廆二部馬鬬相傷若洛廆怒遣人謂吐谷渾曰先公處分與兄異部何不相遠而馬鬬相傷吐谷渾曰馬是畜耳食草飲水春氣發動所以鬬鬬在馬而怒及人乖別甚易今當去汝萬里之外若洛廆悔遣舊老及長史七那樓追謝留之吐谷渾曰我乃祖以來樹德遼右先公之世卜筮之言云有二子當享福祚並流子孫我是卑庶理無並大今以馬致乖殆天所啟諸君試驅馬令東馬若還東我當隨去即令從騎擁馬令回數百步欻然悲鳴突走而西聲若頹山如是者十餘輩一回一迷樓力屈乃跪曰可汗此非復人事渾謂其部落曰我兄弟子孫並應昌盛廆當傳子及曾玄孫其間可百餘年我及玄孫間始當顯耳於是遂西附陰山後假道上隴若洛廆追思吐谷渾作阿干歌徒河以兄為阿干也子孫僭號以此歌為輦後鼓吹大曲吐谷渾遂徙上隴止於枹罕暨甘松南界昂城龍涸從洮水西南極白蘭數千里中逐水草廬帳而居以肉酪為糧西北諸種謂之阿柴虜吐谷渾死有子六十人長子吐延身長七尺八寸勇力過人性刻暴為昂城羌酋姜聰所刺劍猶在體呼子葉延語其大將紇拔碸曰吾氣絕棺斂訖便速去保白蘭地既險遠又土俗懦弱易控御葉延小兒欲授餘人恐倉卒終不能相制今以葉延付汝竭股肱之力以輔之孺子得立吾無恨也抽劍而死有子十二人葉延少而勇果年十歲縛草為人號曰姜聰每旦輒射之射中則嘷叫泣涕其母曰讎賊諸將已屠膾之汝年小何煩朝朝自苦葉延嗚咽若不自勝答母曰誠知無益然罔極之心不勝其痛性至孝母病三日不食葉延亦不食頗視書傳自謂曾祖弈洛韓始封昌黎公吾為公孫之子案禮公孫之子得以王父字為氏遂以吐谷渾為氏焉葉延死子碎奚立性淳謹三弟專權碎奚不能制諸大將共誅之奚憂哀不復攝事遂立子視連為世子委之事號曰莫賀郎華言父也碎奚遂以憂死視連立以父憂思不遊娛酣宴十五年死弟視羆立死子樹洛干等並幼弟烏紇提立而妻樹洛干母生二子慕璝利延烏紇提一名大孩死樹洛干立自號車騎將軍是歲晉義熙初也樹洛干死弟阿豺立自號驃騎將軍沙州刺史部內有黃沙周回數百里不生草木因號沙州阿豺兼并羌氐地方數千里號為強國田于西強山觀墊江源問於羣臣曰此水東流有何名由何郡國入何水也其長史曾和曰此水經仇池過晉壽出宕渠號墊江至巴郡入江度廣陵會於海阿豺曰水尚知有歸吾雖塞表小國而獨無所歸乎遣使通劉義符獻其方物義符封為澆河公未及拜受劉義隆元嘉三年又加除命又將遣使朝貢會暴病臨死召諸子弟告之曰先公車騎捨其子虔以大業屬吾吾豈敢忘先公之舉而私於緯代其以慕璝繼事阿豺有子二十人緯代長子也阿豺又謂曰汝等各奉吾一隻箭折之地下俄而命母弟慕利延曰汝取一隻箭折之慕利延折之又曰汝取十九隻箭折之延不能折阿豺曰汝曹知否單者易折衆則難摧戮力一心然後社稷可固言終而死兄子慕璝立先是阿豺時劉義隆命竟未至而死慕璝又奉表通義隆義隆又授隴西公慕璝招集秦涼亡業之人及羌戎雜夷衆至五六百落南通蜀漢北交涼州赫連部衆轉盛世祖時慕璝始遣其侍郎謝大寧奉表歸國尋討禽赫連定送之京師世祖嘉之遣使者策拜慕璝為大將軍西秦王慕璝表曰臣誠庸弱敢竭情款俘禽僭逆獻捷王府爵秩雖崇而土不增廓車旗既飾而財不周賞願垂鑒察亮其單款臣頃接寇逆疆境之人為賊所抄流轉東下今皇化混一求還鄉土乞佛日連窟略寒張華等三人家弱在此分乖可愍願并敕遣使恩洽遐荒存亡感戴世祖詔公卿朝會議答施行太尉長孫嵩及議郎博士二百七十九人議曰前者有司處以為秦王荒外之君本非政教所及來則受之去則不禁皇威遠被西秦王慕義畏威稱臣納貢求受爵號議者以為古者要荒之君雖人土衆廣而爵不擬華夏陛下加寵王官及越常分容飾車旗班同上國至於繒絮多少舊典所無皆當臨時以制豐寡自漢魏以來撫接荒遐頗有故事呂后遺單于御車二乘馬二駟單于答馬千匹其後匈奴和親敵國遺繒絮不過數百呼韓邪稱臣身自入朝始至萬匹今西秦王若以土無桑蠶便當上請不得言財不周賞昔周室衰微齊侯小白一匡天下有賜胙之命無益土之賞晉侯重耳破楚城濮唯受南陽之田為朝宿之邑西秦所致唯定而已塞外之人因時乘便侵入秦涼未有經略拓境之勳爵登上國統秦涼河沙四州之地而云土不增廓比聖朝於弱周而自同於五霸無厭之情其可極乎西秦王忠款於朝廷原其本情必不至此或左右不敏因致斯累檢西秦流人賊時所抄悉在蒲坂今既稱藩四海咸泰天下一家可敕秦州送詣京師隨後遣還所請乞佛三人昔為賓國之使來在王庭國破家遷即為臣妾可勿聽許制曰公卿之議未為失體西秦王所收金城枹罕隴西之地彼自取之朕即與之便是裂土何須復廓西秦款至綿絹隨使疏數增益之非一匹而已自是慕璝貢獻頗簡又通于劉義隆義隆封為隴西王太延二年慕璝死弟慕利延立詔遣使者策諡慕璝曰惠王後拜慕利延鎮西大將軍儀同三司改封西平王以慕璝子元緒為撫軍將軍時慕利延又通劉義隆義隆封為河南王世祖征涼州慕利延懼遂率其部人西遁沙漠世祖以慕利延兄有禽赫連定之功遣使宣喻之乃還後慕利延遣使表謝書奏乃下詔褒奬之慕利延兄子緯代懼慕利延害己與使者謀欲歸國慕利延覺而殺之緯代弟叱力延等八人逃歸京師請兵討慕利延世祖拜叱力延歸義王詔晉王伏羅率諸將討之軍至大母橋慕利延兄子拾寅走河西伏羅遣將追擊之斬首五千餘級慕利延走白蘭慕利延從弟伏念長史昸鳩黎部大崇娥等率衆一萬三千落歸降後復遣征西將軍高涼王那等討之於白蘭慕利延遂入于闐國殺其王死者數萬人南征罽賓遣使通劉義隆求援獻烏丸帽女國金酒器胡王金釧等物義隆賜以牽車七年遂還舊土慕利延死樹洛干子拾寅立始邑於伏羅川其居止出入竊擬王者拾寅奉修貢職受朝廷正朔又受劉義隆封爵號河南王世祖遣使拜為鎮西大將軍沙州刺史西平王後拾寅自恃險遠頗不恭命通使于劉彧獻善馬四角羊彧加之官號高宗時定陽侯曹安表拾寅今保白蘭多有金銀牛馬若擊之可以大獲議者咸以先帝忿拾寅兄弟不穆使晉王伏羅高涼王那再征之竟不能克拾寅雖復遠遁軍亦疲勞今在白蘭不犯王塞不為人患非國家之所急也若遣使招慰必求為臣妾可不勞而定也王者之於四荒羈縻而已何必屠其國有其地安曰臣昔為澆河戍將與之相近明其意勢若分軍出其左右拾寅必走保南山不過十日牛馬草盡人無所食衆必潰叛可一舉而定也從之詔陽平王新成建安王穆六頭等出南道南郡公李惠給事中公孫拔及安出北道以討之拾寅走南山諸軍濟河追之時軍多病諸將議賊已遠遁軍容已振今驅疲病之卒要難冀之功不亦過乎衆以為然乃引還獲駝馬二十餘萬顯祖復詔上黨王長孫觀等率州郡兵討拾寅軍至曼頭山拾寅來逆戰觀等縱兵擊敗之拾寅宵遁於是思悔復修藩職遣別駕康盤龍奉表朝貢顯祖幽之不報其使拾寅部落大饑屢寇澆河詔平西將軍廣川公皮歡喜率敦煌枹罕高平諸軍為前鋒司空上黨王長孫觀為大都督以討之觀等軍入拾寅境芻其秋稼拾寅窘怖遣子詣軍表求改過觀等以聞顯祖以重勞將士乃下詔切責之徵其任子拾寅遣子斤入侍顯祖尋遣斤還拾寅後復擾掠邊人遣其將良利守洮陽枹罕所統枹罕鎮將西郡公楊鍾葵貽拾寅書以責之拾寅表曰奉詔聽臣還舊土故遣良利守洮陽若不追前恩求令洮陽貢其土物辭旨懇切顯祖許之自是歲修職貢太和五年拾寅死子度易侯立遣其侍郎時真貢方物提上表稱嗣事後度易侯伐宕昌詔讓之賜錦綵一百二十匹喻令悛改所掠宕昌口累部送時還易侯並奉詔死子伏連籌立高祖欲令入朝表稱疾病輒修洮陽泥和城而置戍焉文明太后崩使人告凶伏連籌拜命不恭有司請伐之高祖不許羣臣以其受詔不敬不宜納所獻高祖曰拜受失禮乃可加以告責所獻土毛乃是臣之常道杜棄所獻便是絕之縱欲改悔其路無由矣詔曰朕在哀疚之中未有征討而去春枹罕表取其洮陽泥和二戍時以此既邊將之常即便聽許及偏師致討二戍望風請降執訊二千餘人又得婦女九百口子婦可悉還之伏連籌乃遣世子賀魯頭朝于京師禮錫有加拜伏連籌使持節都督西垂諸軍事征西將軍領護西戎中郎將西海郡開國公吐谷渾王麾旗章綬之飾皆備給之後遣兼員外散騎常侍張禮使於伏連籌伏連籌謂禮曰昔與宕昌通和見稱大王己則自名今忽名僕而拘執此使將命偏師往問其意禮曰君與宕昌並為魏藩而比輒有興動殊違臣節當發之日宰輔以為君若反迷知罪則克保藩業脫守愚不改則禍難將至伏連籌遂默然及高祖崩遣使赴哀盡其誠敬伏連籌內修職貢外并戎狄塞表之中號為強富準擬天朝樹置官司稱制諸國以自誇大世宗初詔責之曰梁州表送卿報宕昌書梁彌邕與卿並為邊附語其國則隣藩論其位則同列而稱書為表名報為旨有司以國有常刑殷勤請討朕慮險遠多虞輕相構惑故先宣此意善自三思伏連籌上表自申辭誠懇至終世宗世至于正光犛牛蜀馬及西南之珍無歲不至後秦州城人莫折念生反河西路絕涼州城人萬于菩提等東應念生囚刺史宋穎穎密遣求援於伏連籌伏連籌親率大衆救之遂獲保全自爾以後關徼不通貢獻路絕伏連籌死子夸呂立始自號為可汗居伏俟城在青海西十五里雖有城郭而不居處穹廬隨水草畜牧其地東西三千里南北千餘里官有王公僕射尚書及郎將將軍之號夸呂椎髻毦珠以皂為帽坐金師子牀號其妻為恪尊衣織成裙披錦大袍辮髮於後首戴金花冠其俗丈夫衣服略同於華夏多以羅冪為冠亦以繒為帽婦人皆貫珠貝束髮以多為貴兵器有弓刀甲矟國無常賦須則稅富室商人以充用焉其刑罰殺人及盜馬者死餘則徵物以贖罪亦量事決杖刑人必以氈蒙頭持石從高擊之父兄死妻後母及嫂等與突厥俗同至于婚貧不能備財者輒盜女去死者亦皆埋殯其服制葬訖則除之性貪婪忍於殺害好射獵以肉酪為糧亦知種田大麥粟豆然其北界氣候多寒唯得蕪菁大麥故其俗貧多富少青海周回千餘里海內有小山每冬冰合後以良牝馬置此山至來春收之馬皆有孕所生得駒號為龍種必多駿異吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里世傳青海驄者是也土出犛牛馬多鸚鵡饒銅鐵朱沙地兼鄯善且末興和中齊獻武王作相招懷荒遠蠕蠕既附於國夸呂遣使致敬獻武王喻以大義徵其朝貢夸呂乃遣使人趙吐骨真假道蠕蠕頻來又薦其從妹靜帝納以為嬪遣員外散騎常侍傅靈葕使於其國夸呂又請婚乃以濟南王匡孫女為廣樂公主以妻之此後朝貢不絕吐谷渾北有乙弗勿敵國俗風與吐谷渾同不識五穀唯食魚及蘇子蘇子狀若中國苟嵵子北又有阿蘭國與鳥獸同不知鬬戰忽見異人舉國便走土無所出大養羣畜體輕工走逐之不可得北又有女王國以女為主人所不至其傳云然宕昌羌者其先蓋三苗之胤周時與庸蜀微盧等八國從武王滅商漢有先零燒當等世為邊患其地東接中華西通西域南北數千里姓別自為部落酋帥皆有地分不相統攝宕昌即其一也俗皆土著居有屋宇其屋織犛牛尾及羖羊毛覆之國無法令又無徭賦惟戰伐之時乃相屯聚不然則各事生業不相往來皆衣裘褐牧養犛牛羊豕以供其食父子伯叔兄弟死者即以繼母世叔母及嫂弟婦等為妻俗無文字但候草木榮落記其歲時三年一相聚殺牛羊以祭天有梁懃者世為酋帥得羌豪心乃自稱王焉懃孫彌忽世祖初遣子彌黃奉表求內附世祖嘉之遣使拜彌忽為宕昌王賜彌黃爵甘松侯彌忽死孫虎子立其地自仇池以西東西千里席水以南南北八百里地多山阜人二萬餘落世修職貢頗為吐谷渾所斷絕虎子死彌治立虎子弟羊子先奔吐谷渾吐谷渾遣兵送羊子欲奪彌治位彌治遣使請救顯祖詔武都鎮將宇文生救之羊子退走彌治死子彌機立遣其司馬利住奉表貢方物楊文度之叛圍武都彌機遣其二兄率衆救武都破走文度高祖時遣使子橋表貢朱沙雌黃白石膽各一百斤自此後歲以為常朝貢相繼後高祖遣鴻臚劉歸謁者張察拜彌機征南大將軍西戎校尉梁益二州牧河南公宕昌王後朝于京師殊無風禮朝罷高祖顧謂左右曰夷狄之有君不如諸夏之亡也宕昌王雖為邊方之主乃不如中國一吏於是改授領護西戎校尉靈州刺史王如故賜以車騎戎馬錦綵等遣還國高昌者車師前王之故地漢之前部地也東西二千里南北五百里四面多大山或云昔漢武遣兵西討師旅頓弊其中尤困者因住焉地勢高敞人庶昌盛因云高昌亦云其地有漢時高昌壘故以為國號東去長安四千九百里漢西域長史戊己校尉並居於此晉以其地為高昌郡張軌呂光沮渠蒙遜據河西皆置太守以統之去敦煌十三日行國有八城皆有華人地多石磧氣候溫暖厥土良沃穀麥一歲再熟宜蠶多五果又饒漆有草名羊刺其上生蜜而味甚佳引水溉田出赤鹽其味甚美復有白鹽其形如玉高昌人取以為枕貢之中國多蒲萄酒俗事天神兼信佛法國中羊馬牧在隱僻處以避寇非貴人不知其處北有赤石山七十里有貪汗山夏有積雪此山北鐵勒界也世祖時有闞爽者自為高昌太守太延中遣散騎侍郎王恩生等使高昌為蠕蠕所執真君中爽為沮渠無諱所襲奪據之無諱死弟安周代立和平元年為蠕蠕所并蠕蠕以闞伯周為高昌王其稱王自此始也太和初伯周死子義成立歲餘為其兄首歸所殺自立為高昌王五年高車王可至羅殺首歸兄弟以敦煌人張孟明為王後為國人所殺立馬儒為王以鞏顧禮麴嘉為左右長史二十一年遣司馬王體玄奉表朝貢請師迎接求舉國內徙高祖納之遣明威將軍韓安保率騎千餘赴之割伊吾五百里以儒居之至羊榛水儒遣禮嘉率步騎一千五百迎安保去高昌四百里而安保不至禮等還高昌安保亦還伊吾安保遣使韓興安等十二人使高昌儒復遣顧禮將其世子義舒迎安保至白棘城去高昌百六十里而高昌舊人情戀本土不願東遷相與殺儒而立麴嘉為王嘉字靈鳳金城榆中人既立又臣于蠕蠕那蓋顧禮與義舒隨安保至洛陽及蠕蠕主伏圖為高車所殺嘉又臣高車初前部胡人悉為高車所徙入於焉耆焉耆又為肽噠所破滅國人分散衆不自立請王於嘉嘉遣第二子為焉耆王以主之永平元年嘉遣兄子私署左衞將軍田地太守孝亮朝京師仍求內徙乞軍迎援於是遣龍驤將軍孟威發涼州兵三千人迎之至伊吾失期而反於後十餘遣使獻珠像白黑貂裘名馬鹽枕等款誠備至惟賜優旨卒不重迎三年嘉遣使朝貢世宗又遣孟威使詔勞之延昌中以嘉為持節平西將軍瓜州刺史泰臨縣開國伯私署王如故熙平初遣使朝獻詔曰卿地隔關山境接荒漠頻請朝援徙國內遷雖來誠可嘉即於理未帖何者彼之甿庶是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懷戀舊今若動之恐異同之變爰在肘腋不得便如來表神龜元年冬孝亮復表求援內徙朝廷不許正光元年肅宗遣假員外將軍趙義等使於嘉嘉朝貢不絕又遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉變以為博士肅宗許之嘉死贈鎮西將軍涼州刺史子堅立於後關中賊亂使命遂絕普泰初堅遣使朝貢除平西將軍瓜州刺史泰臨縣伯王如故又加衞將軍至永熙中特除儀同三司進為郡公後遂隔絕鄧至者白水羌也世為羌豪因地名號自稱鄧至其地自亭街以東平武以西汶嶺以北宕昌以南土風習俗亦與宕昌同其王像舒治遣使內附高祖拜龍驤將軍鄧至王遣貢不絕鄧至之西有赫羊等二十國時遣使朝貢朝廷皆授以雜號將軍子男渠帥之名蠻之種類蓋盤瓠之後其來自久習俗叛服前史具之在江淮之間依託險阻部落滋蔓布於數州東連壽春西通上洛北接汝潁往往有焉其於魏氏之時不甚為患至晉之末稍以繁昌漸為寇暴矣自劉石亂後諸蠻無所忌憚故其族類漸得北遷陸渾以南滿於山谷宛洛蕭條略為丘墟矣太祖既定中山聲教被于河表泰常八年蠻王梅安率渠帥數千朝京師求留質子以表忠款始光中拜安侍子豹為安遠將軍江州刺史順陽公興光中蠻王文武龍請降詔褒慰之拜南雍州刺史魯陽侯延興中大陽蠻酋桓誕擁沔水以北滍葉以南八萬餘落遣使內屬高祖嘉之拜誕征南將軍東荊州刺史襄陽王聽自選郡縣誕字天生桓玄之子也初玄西奔至枚回洲被殺誕時年數歲流竄大陽蠻中遂習其俗及長多智謀為羣蠻所歸誕既內屬治於朗陵太和四年王師南伐誕請為前驅乃授使持節南征西道大都督討義陽不果而還十年移居潁陽十六年依例降王為公十七年加征南將軍中道大都督征竟陵遇遷洛師停是時蕭賾征虜將軍直閤將軍蠻酋田益宗率部曲四千餘戶內屬襄陽酋雷婆思等十一人率戶千餘內徙求居大和川詔給廩食後開南陽令有沔北之地蠻人安堵不為寇賊十八年誕入朝賞遇隆厚卒諡曰剛子暉字道進位龍驤將軍東荊州刺史襲爵景明初大陽蠻酋田育丘等二萬八千戶內附詔置四郡十八縣暉卒贈冠軍將軍三年魯陽蠻魯北鷰等聚衆攻逼潁川詔左衞將軍李崇討平之徙萬餘家於河北諸州及六鎮尋叛南走所在追討比及河殺之皆盡四年東荊州蠻樊素安反僭帝號正始元年素安弟秀安復反李崇楊大眼悉討平之二年蕭衍沔東太守田清喜擁七郡三十一縣戶萬九千遣使內附乞師討衍其雍州以東石城以西五百餘里水陸援路請率部曲斷之四年蕭衍永寧太守文雲生六部自漢東遣使歸附永平初東荊州表囗囗太守桓叔興前後招慰大陽蠻歸附者一萬七百戶請置郡十六縣五十詔前鎮東府長史酈道元檢行置之叔興即暉弟也延昌元年拜南荊州刺史居安昌隸於東荊三年蕭衍遣兵討江沔破掠諸蠻百姓擾動蠻自相督率二萬餘人頻請統帥為聲勢叔興給一統并威儀為之節度蠻人遂安其年蕭衍雍州刺史蕭藻遣其將蔡令孫等三將寇南荊之西南沿襄沔上下破掠諸蠻蠻酋衍龍驤將軍楚石廉叛衍來請援叔興與石廉督集蠻夏二萬餘人擊走之斬令孫等三將藻又遣其新陽太守邵道林於沔水之南石城東北立清水戍為抄掠之基叔興遣諸蠻擊破之四年叔興上表請不隸東荊許之蕭衍每有寇抄叔興必摧破之正光中叔興擁所部南叛蠻首成龍強率戶數千內附拜為刺史蠻帥田午生率戶二千內徙揚州拜為郡守蕭衍義州刺史邊城王文僧明鐵騎將軍邊城太守田官德等率戶萬餘舉州內屬拜僧明平南將軍西豫州刺史封開封侯官德龍驤將軍義州刺史自餘封授各有差僧明官德並入朝蠻出山至邊城建安者八九千戶義州尋為蕭衍將裴邃所陷衍定州刺史田超秀亦遣使求附請援歷年朝廷恐輕致邊役未之許會超秀死其部曲相率內附徙之六鎮秦隴所在反叛二荊西郢蠻大擾動斷三餢路殺都督寇盜至於襄城汝水百姓多被其害蕭衍遣將圍廣陵樊城諸蠻並為前驅自汝水以南處處鈔劫恣其暴掠連年攻討散而復合其暴滋甚又有冉氏向氏者陬落尤盛餘則大者萬家小者千戶更相崇僭稱王侯屯據三峽斷遏水路荊蜀行人至有假道者獠者蓋南蠻之別種自漢中達于卭笮川洞之間所在皆有種類甚多散山谷略無氏族之別又無名字所生男女唯以長幼次第呼之其丈夫稱阿阿段婦人阿夷阿等之類皆語之次第稱謂也依樹積木以居其上名曰干蘭干蘭大小隨其家口之數往往推一長者為王亦不能遠相統攝父死則子繼若中國之貴族也獠王各有鼓角一雙使其子弟自吹擊之好相殺害多不敢遠行能臥水底持刀刺魚其口嚼食並鼻飲死者豎棺而埋之性同禽獸至於忿怒父子不相避惟手有兵刃者先殺之若殺其父走避求得一狗以謝其母母得狗謝不復嫌恨若報怨相攻擊必殺而食之平常劫掠賣取猪狗而已親戚比隣指授相賣被賣者號哭不服逃竄避之乃將買人捕逐指若亡叛獲便縛之但經被縛者即服為賤隸不敢稱良矣亡失兒女一哭便止不復追思惟執盾持矛不識弓矢用竹為簧羣聚鼓之以為音節能為細布色至鮮凈大狗一頭買一生口其俗畏鬼神尤尚淫祀所殺之人美鬢髯者必剝其面皮籠之於竹及燥號之曰鬼鼓舞祀之以求福利至有賣其昆季妻奴盡者乃自賣以供祭焉鑄銅為器大口寬腹名曰銅爨既薄且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣為益州大患勢內外受敵所以亡也自桓溫破蜀之後力不能制又蜀人東流山險之地多空獠遂挾山傍谷與夏人參居者頗輸租賦在深山者仍不為編戶蕭衍梁益二州歲歲伐獠以自裨潤公私頗藉為利正始中夏侯道遷舉漢中內附世宗遣尚書邢巒為梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢為寇後以羊祉為梁州傅豎眼為益州祉性酷虐不得物情蕭衍輔國將軍范季旭與獠王趙清荊率衆屯孝子谷祉遣統軍魏胡擊走之後蕭衍寧朔將軍姜白復擁夷獠入屯南城梁州人王法慶與之通謀衆屯於固門川祉遣征虜將軍囗囗討破之豎眼施恩布信大得獠和後以元法僧代傅豎眼為益州法僧在任貪殘獠遂反叛勾引蕭衍軍圍逼晉壽朝廷憂之以豎眼先得物情復令乘傳往撫獠聞豎眼至莫不欣然拜迎道路於是而定及元元子真相繼為梁州並無德績諸獠苦之其後朝廷以梁益二州控攝險遠乃立巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所綰獠二十萬戶彼謂北獠歲輸租布又與外人交通貿易巴州生獠並皆不順其諸頭王每於時節謁見刺史而已孝昌初諸獠以始欣貪暴相率反叛攻圍巴州山南行臺勉諭即時散罷自是獠諸頭王相率詣行臺者相繼子建厚勞賚之始欣見中國多事又失彼心慮獲罪譴時蕭衍南梁州刺史陰子春扇惑邊陲始欣謀將南叛始欣族子愷時為隆城鎮將密知之嚴設邏候遂禽蕭衍使人并封始欣詔書鐵券刀劍衣冠之屬表送行臺子建乃啟以鎮為南梁州愷為刺史發使執始欣囚於南鄭遇子建見代梁州刺史傅豎眼仍為行臺豎眼久病其子敬紹納始欣重賂使得還州始欣乃起衆攻愷屠滅之據城南叛蕭衍將蕭玩率衆援接時梁益二州並遣將討之攻陷巴州執始欣遂大破玩軍及斬玩以傅曇表為刺史後元羅在梁州為所陷自此遂絕史臣曰氐羌蠻獠風俗各異嗜欲不同言語不通聖人因時設教所以達其志而通其俗也然而外寧必有內憂覽之者不可不誡慎也
