body:
  text: 魏書卷八十三下列傳外戚第七十一下高肇于徑胡國珍李延實高肇字首文文昭皇太后之兄也自云本勃海蓨人五世祖顧晉永嘉中避亂入高麗父揚字法修高祖初與弟乘信及其鄉人韓內冀富等入國拜厲威將軍河間子乘信明威將軍俱待以客禮賜奴婢牛馬綵帛遂納揚女是為文昭皇后生世宗揚卒景明初世宗追思舅氏徵肇兄弟等録尚書事北海王詳等奏揚宜贈左光祿大夫賜爵勃海公諡曰敬其妻蓋氏宜追封清河郡君詔可又詔揚嫡孫猛襲勃海公爵封肇平原郡公肇弟顯澄城郡公三人同日受封始世宗未與舅氏相接將拜爵乃賜衣幘引見肇顯于華林都亭皆甚惶懼舉動失儀數日之間富貴赫奕是年咸陽王禧誅財物珍寶奴婢田宅多入高氏未幾肇為尚書左僕射領吏部冀州大中正尚世宗姑高平公主遷尚書令肇出自夷土時望輕之及在位居要留心百揆孜孜無倦世咸謂之為能世宗初六輔專政後以咸陽王禧無事構逆由是遂委信肇肇既無親族頗結朋黨附之者旬月超升背之者陷以大罪以北海王詳位居其上構殺之又説世宗防衛諸王殆同囚禁時順皇后暴崩世議言肇為之皇子昌薨僉謂王顯失於醫療承肇意旨及京兆王愈出為冀州刺史畏肇恣擅遂至不軌肇又譖殺彭城王協由是朝野側目咸畏惡之因此專權與奪任己又嘗與清河王懌於雲龍門外廡下忽忿諍大至紛紜太尉高陽王雍和止之高后既立愈見寵信肇既當衡軸每事任己本無學識動違禮度好改先朝舊制出情妄作減削封秩抑黜勳人由是怨聲盈路矣延昌初遷司徒雖貴登台鼎猶以去要怏怏形乎辭色衆咸嗤笑之父兄封贈雖久竟不改瘞三年乃詔令遷葬肇不自臨赴唯遣其兄子猛改服詣代遷葬於鄉時人以肇無識哂而不責也其年大舉征蜀以肇為大將軍都督諸軍為之節度與都督甄琛等二十餘人俱面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒轉臥渠中鞍具瓦解衆咸怪異肇出惡焉四年世宗崩赦罷征軍肅宗與肇及征南將軍元遙等書稱諱言以告凶問肇承變哀愕非唯仰慕亦私憂身禍朝夕悲泣至于羸悴將至宿澗驛亭家人夜迎省之皆不相視直至闕下衰服號哭升太極殿奉喪盡哀太尉高陽王先居西柏堂專決庶事與領軍于忠密欲除之潛備壯士直寢邢豹伊生等十餘人於舍人省下肇哭梓宮訖於百官前引入西廊清河王懌任城王澄及諸王等皆竊言目之肇入省壯士扼而拉殺之下詔暴其罪惡又云刑書未及便至自盡自餘親黨悉無追問削除職爵葬以士禮及昏乃於厠門出其尸歸家初肇西征行至函谷車軸中折從者皆以為不獲吉還也靈太后臨朝令特贈營州刺史永熙二年出帝贈使持節侍中中外諸軍事太師大丞相太尉公録尚書事冀州刺史肇子植自中書侍郎為濟州刺史率州軍討破元愈別將有功當蒙封賞不受云家荷重恩為國致效是其常節何足以應進陟之報懇惻發於至誠歷青相朔四州刺史卒植頻蒞五州皆清能著稱當時號為良刺史贈安北將軍冀州刺史肇長兄琨早卒襲揚封勃海郡公贈都督五州諸軍事鎮東大將軍冀州刺史詔其子猛嗣猛字豹兒尚長樂公主即世宗同母妹也拜駙馬都尉歷位中書令出為雍州刺史有能名入為殿中尚書卒贈司空冀州刺史出帝時復贈太師大丞相録尚書事公主無子猛先在外有男不敢令主知臨終方言之年幾三十矣乃召為喪主尋卒無後琨弟偃字仲遊太和十年卒正始中贈安東將軍都督青州刺史諡曰莊侯景明四年世宗納其女為貴嬪及于順皇后崩永平元年立為皇后二年八座奏封后母王氏為武邑郡君偃弟壽早卒壽弟即肇也肇弟顯侍中高麗國大中正早卒于徑字鍾葵太尉拔之子頗有武略以功臣子又以功績位沃野鎮將賜爵富昌子拜征虜將軍世宗納其女為后封太原郡公妻劉氏為章武郡君後拜征北將軍定州刺史卒贈司空諡曰恭莊公自栗磾至徑纍世貴盛一皇后四贈公三領軍二尚書令三開國公徑雖以后父但以順后早崩竟不居公輔子暉字宣明后母弟也少有氣幹襲爵位汾州刺史暉善事人為爾朱榮所親以女妻其子長孺歷侍中河南尹後兼尚書僕射東南道行臺與齊獻武王討平羊侃於兗州元皓入洛害之徑弟天恩位內行長遼西太守卒贈平東將軍燕州刺史天恩子仁生位太中大夫仁生子安定平原郡太守高平郡都將卒胡國珍字世玉安定臨涇人也祖略姚興渤海公姚逵平北府咨議參軍父淵赫連屈丐給事黃門侍郎世祖克統萬淵以降款之功賜爵武始侯後拜河州刺史國珍少好學雅尚清儉太和十五年襲爵例降為伯女以選入掖庭生肅宗即靈太后也肅宗踐祚以國珍為光祿大夫靈太后臨朝加侍中封安定郡公給甲第賜帛布綿縠奴婢車馬牛甚厚追崇國珍妻皇甫氏為京兆郡君置守冢十戶尚書令任城王澄奏安定公屬尊望重親賢羣矚宜出入禁中參咨大務詔可乃令入決萬幾尋進位中書監儀同三司侍中如故賞賜纍萬又賜絹歲八百匹妻梁四百匹男女姊妹兄弟各有差皆極豐贍國珍與太師高陽王雍太傅清河王懌太保廣平王懷入居門下同釐庶政詔依漢車千秋晉安平王故事給步挽一乘自掖門至于宣光殿得以出入并備几杖後與侍中崔光俱授帝經侍直禁中國珍尋上表陳刑政之宜詔皆施行熙平初加國珍使持節都督雍州刺史驃騎大將軍開府靈太后以國珍年老不欲令其在外且欲示以方面之榮竟不行遷司徒公侍中如故就宅拜之靈太后肅宗率百僚幸其第宴會極歡又追京兆郡君為秦太上君太上君景明三年薨於洛陽於此十六年矣太后以太上君墳瘞卑局更增廣為起塋域門闕碑表侍中崔光等奏案漢高祖母始諡曰昭靈夫人後為昭靈后薄太后母曰靈文夫人皆置園邑三百家長丞奉守今秦太上君未有尊諡陵寢孤立即秦君名宜上終稱兼設掃衛以慰情典請上尊諡曰孝穆權置園邑三十戶立長丞奉守太后從之封國珍繼室梁氏為趙平郡君元叉妻拜為女侍中封新平郡君又徙封馮翊君國珍子祥妻長安縣公主即清河王懌女也國珍年雖篤老而雅敬佛法時事齋潔自強禮拜至於出入侍從猶能跨馬據鞍神龜元年四月七日步從所建佛像發第至閶闔門四五里八日又立觀像晚乃肯坐勞熱增甚因遂寢疾靈太后親侍藥膳十二日薨年八十給東園溫明祕器五時朝服各一具衣一襲贈布五千匹錢一百萬蠟千斤大鴻臚持節監護喪事太后還宮成服於九龍殿遂居九龍寢室肅宗服小功服舉哀於太極東堂又詔自始薨至七七皆為設千僧齋令七人出家百日設萬人齋二七人出家先是巫覡言將有凶勸令為厭勝之法國珍拒而不從云吉凶有定分唯修德以禳之臨死與太后訣云母子善治天下以萬人之心勿視大臣面也殷勤至於再三又及其子祥云我唯有一子死後勿如比來威抑之靈太后以其好戲時加威訓國珍故以為言始國珍欲就祖父西葬舊鄉後緣前世諸胡多在洛葬有終洛之心崔光嘗對太后前問國珍公萬年後為在此安厝為歸長安國珍言當陪葬天子山陵及病危太后請以後事竟言還安定語遂昏忽太后問清河王懌與崔光等議去留懌等皆以病亂請從先言太后猶記崔光昔與國珍言遂營墓於洛陽太后雖外從衆議而深追臨終之語云我公之遠慕二親亦吾之思父母也追崇假黃鉞使持節侍中相國都督中外諸軍事太師領太尉公司州牧號太上秦公加九錫葬以殊禮給九旒鑾輅虎賁班劍百人前後部羽葆鼓吹轀輬車諡文宣公賜物三千段粟一千五百石又詔贈國珍祖父兄父兄下逮從子皆有封職持節就安定監護喪事靈太后迎太上君神柩還第與國珍俱葬贈襚一與國珍同及國珍神主入廟詔太常權給以軒懸之樂六佾之舞初國珍無男養兄真子僧洗為後後納趙平君生子祥祥字元吉襲封故事世襲例皆減邑唯祥獨得全封趙平君薨給東園祕器肅宗服小功服舉哀于東堂靈太后服齊衰期葬於太上君墓左不得祔合祥歷位殿中尚書中書監侍中改封東平郡公薨贈開府儀同三司雍州刺史諡曰孝景僧洗字湛輝封爰德縣公位中書監侍中改封濮陽郡公僧洗自永安後廢棄不預朝政天平四年薨詔給東園祕器贈太師太尉公録尚書事雍州刺史諡曰孝真長子寧字惠歸襲國珍先爵改為臨涇伯後進為公歷岐涇二州刺史卒諡曰孝穆女為清河王亶妃生孝靜皇帝武定初贈太師太尉公録尚書事諡曰孝昭子虔字僧敬元叉之廢靈太后虔時為千牛備身與備身張車渠等謀殺叉事發叉殺車渠等虔坐遠徙靈太后反政徵為吏部郎中太后好以家人禮與親族宴戲虔常致諫由是後宴謔多不預焉出為涇州刺史封安陽縣侯興和三年以帝元舅超遷司空公薨贈太傅太尉公尚書僕射徐州刺史諡曰宣葬日百官會葬乘輿送於郭外子長粲李延實字禧隴西人尚書僕射沖之長子性溫良少為太子舍人世宗初襲父爵清泉縣侯纍遷左將軍光州刺史莊帝即位以元舅之尊超授侍中太保封濮陽郡王延實以太保犯祖諱又以王爵非庶姓所宜抗表固辭徙封濮陽郡公改授太傅尋轉司徒公出為使持節侍中太傅録尚書事青州刺史爾朱兆入洛乘輿幽縶以延實外戚見害於州館出帝初歸葬洛陽贈使持節侍中太師太尉公録尚書事都督雍州刺史諡曰孝懿長子彧字子文尚莊帝姊豐亭公主封東平郡公位侍中左光祿大夫中書監驃騎大將軍開府儀同三司廣州刺史彧任俠交遊輕薄無行爾朱榮之死也武毅之士皆彧所進孝靜初以罪棄市史臣曰三五哲王深防遠慮舅甥之國罕執鈞衡母后之家無聞傾敗爰及後世顛覆繼軌蓋由進不以禮故其斃亦速其間或不泯舊基弗虧先構者蓋處之以道遠權之所致也
