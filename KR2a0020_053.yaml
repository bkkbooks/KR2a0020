body:
  text: 魏書卷四十八列傳第三十六高允高允字伯恭勃海人也祖泰在叔父湖傳父韜少以英朗知名同郡封懿雅相敬慕為慕容垂太尉從事中郎太祖平中山以韜為丞相參軍早卒允少孤夙成有奇度清河崔玄伯見而異之歎曰高子黃中內潤文明外照必為一代偉器但恐吾不見耳年十餘奉祖父喪還本郡推財與二弟而為沙門名法淨未久而罷性好文學擔笈負書千里就業博通經史天文術數尤好春秋公羊郡召功曹神三年世祖舅陽平王杜超行征南大將軍鎮鄴以允為從事中郎年四十餘矣超以方春而諸州囚多不決乃表允與中郎呂熙等分詣諸州共評獄事熙等皆以貪穢得罪唯允以清平獲賞府解還家教授受業者千餘人四年與盧玄等俱被徵拜中書博士遷侍郎與太原張偉並以本官領衛大將軍樂安王範從事中郎範世祖之寵弟西鎮長安允甚有匡益秦人稱之尋被徵還允曾作塞上翁詩有混欣戚遺得喪之致驃騎大將軍樂平王丕西討上邽復以本官參丕軍事語在丕傳涼州平以參謀之勳賜爵汶陽子加建武將軍後詔允與司徒崔浩述成國記以本官領著作郎時浩集諸術士考校漢元以來日月薄蝕五星行度并識前史之失別為魏曆以示允允曰天文曆數不可空論夫善言遠者必先驗於近且漢元年冬十月五星聚於東井此乃曆術之淺今譏漢史而不覺此謬恐後人譏今猶今之譏古浩曰所謬云何允曰案星傳金水二星常附日而行冬十月日在尾箕昏沒於申南而東井方出於寅北二星何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑三星之聚而怪二星之來允曰此不可以空言爭宜更審之時坐者咸怪唯東宮少傅遊雅曰高君長於曆數當不虛也後歲餘浩謂允曰先所論者本不注心及更考究果如君語以前三月聚於東井非十月也又謂雅曰高允之術陽元之射也衆乃歎服允雖明於曆數初不推步有所論説唯遊雅數以災異問允允曰昔人有言知之甚難既知復恐漏泄不如不知也天下妙理至多何遽問此雅乃止尋以本官為秦王翰傅後敕以經授恭宗甚見禮待又詔允與侍郎公孫質李虛胡方回共定律令世祖引允與論刑政言甚稱旨因問允曰萬機之務何者為先是時多禁封良田又京師遊食者衆允因言曰臣少也賤所知唯田請言農事古人云方一里則為田三頃七十畝百里則田三萬七千頃若勤之則畝益三斗不勤則畝損三斗方百里損益之率為粟二百二十二萬斛況以天下之廣乎若公私有儲雖遇飢年復何憂哉世祖善之遂除田禁悉以授民初崔浩薦冀定相幽并五州之士數十人各起家郡守恭宗謂浩曰先召之人亦州郡選也在職已久勤勞未答今可先補前召外任郡縣以新召者代為郎吏又守令宰民宜使更事者浩固爭而遣之允聞之謂東宮博士管恬曰崔公其不免乎苟逞其非而校勝於上何以勝濟遼東公翟黑子有寵於世祖奉使并州受布千匹事尋發覺黑子請計於允曰主上問我為首為諱乎允曰公帷幄寵臣答詔宜實又自告忠誠罪必無慮中書侍郎崔覽公孫質等咸言首實罪不可測宜諱之黑子以覽等為親己而反怒允曰如君言誘我死何其不直遂與允絶黑子以不實對竟為世祖所疏終獲罪戮是時著作令史閔湛郤襀性巧佞為浩信待見浩所注詩論語尚書易遂上疏言馬鄭王賈雖注述六經並多疏謬不如浩之精微乞收境內諸書藏之祕府班浩所注命天下習業并求敕浩注禮傳令後生得觀正義浩亦表薦湛有著述之才既而勸浩刊所撰國史于石用垂不朽欲以彰浩直筆之迹允聞之謂著作郎宗欽曰閔湛所營分寸之間恐為崔門萬世之禍吾徒無類矣未幾而難作初浩之被收也允直中書省恭宗使東宮侍郎吳延召允仍留宿宮內翌日恭宗入奏世祖命允驂乘至宮門謂曰入當見至尊吾自導卿脫至尊有問但依吾語允請曰為何等事也恭宗曰入自知之既入見帝恭宗曰中書侍郎高允自在臣宮同處纍年小心密慎臣所委悉雖與浩同事然允微賤制由於浩請赦其命世祖召允謂曰國書皆崔浩作不允對曰太祖記前著作郎鄧淵所撰先帝記及今記臣與浩同作然浩綜務處多總裁而已至於注疏臣多於浩世祖大怒曰此甚於浩安有生路恭宗曰天威嚴重允是小臣迷亂失次耳臣向備問皆云浩作世祖問如東宮言不允曰臣以下才謬參著作犯逆天威罪應滅族今已分死不敢虛妄殿下以臣侍講日久哀臣乞命耳實不問臣臣無此言臣以實對不敢迷亂世祖謂恭宗曰直哉此亦人情所難而能臨死不移不亦難乎且對君以實貞臣也如此言寧失一有罪宜宥之允竟得免於是召浩前使人詰浩浩惶惑不能對允事事申明皆有條理時世祖怒甚敕允為詔自浩已下僮吏已上百二十八人皆夷五族允持疑不為頻詔催切允乞更一見然後為詔詔引前允曰浩之所坐若更有餘釁非臣敢知直以犯觸罪不至死世祖怒命介士執允恭宗拜請世祖曰無此人忿朕當有數千口死矣浩竟族滅餘皆身死宗欽臨刑歎曰高允其殆聖乎恭宗後讓允曰人當知機不知機學復何益當爾之時吾導卿端緒何故不從人言怒帝如此每一念之使人心悸允曰臣東野凡生本無宦意屬休延之會應旌弓之舉釋褐鳳池仍參麟閣尸素官榮妨賢已久夫史籍者帝王之實録將來之炯戒今之所以觀往後之所以知今是以言行舉動莫不備載故人君慎焉然浩世受殊遇榮曜當時孤負聖恩自貽灰滅即浩之迹時有可論浩以蓬蒿之才荷棟梁之重在朝無謇諤之節退私無委蛇之稱私欲沒其公廉愛憎蔽其直理此浩之責也至於書朝廷起居之迹言國家得失之事此亦為史之大體未為多違然臣與浩實同其事死生榮辱義無獨殊誠荷殿下大造之慈違心苟免非臣之意恭宗動容稱歎允後與人言我不奉東宮導旨者恐負翟黑子恭宗季年頗親近左右營立田園以取其利允諫曰天地無私故能覆載王者無私故能包養昔之明王以至公宰物故藏金於山藏珠於淵示天下以無私訓天下以至儉故美聲盈溢千載不衰今殿下國之儲二四海屬心言行舉動萬方所則而營立私田畜養雞犬乃至販酤市與民爭利議聲流布不可追掩夫天下者殿下之天下富有四海何求而不獲何欲而弗從而與販夫販婦競此尺寸昔虢之將亡神乃下降賜之土田卒喪其國漢之靈帝不修人君之重好與宮人列肆販賣私立府藏以營小利卒有顛覆傾亂之禍前鑒若此甚可畏懼夫為人君者必審於擇人故稱知人則哲惟帝難之商書云無邇小人孔父有云小人近之則不遜遠之則怨矣武王愛周邵齊畢所以王天下殷紂愛飛廉惡來所以喪其國歷觀古今存亡之際莫不由之今東宮誠曰乏人俊不少頃來侍御左右者恐非在朝之選故願殿下少察愚言斥出佞邪親近忠良所在田園分給貧下畜産販賣以時收散如此則休聲日至謗議可除恭宗不納恭宗之崩也允久不進見後世祖召允升階歔欷悲不能止世祖流淚命允使出左右莫知其故相謂曰高允無何悲泣令至尊哀傷何也世祖聞之召而謂曰汝不知高允悲乎左右曰臣等見允無言而泣陛下為之悲傷是以竊言耳世祖曰崔浩誅時允亦應死東宮苦諫是以得免今無東宮允見朕因悲耳允表曰往年被敕令臣集天文災異使事類相從約而可觀臣聞箕子陳謨而洪範作宣尼述史而春秋著皆所以章明列辟景測皇天者也故先其善惡而驗以災異隨其失得而效以禍福天人誠遠而報速如響甚可懼也自古帝王莫不尊崇其道而稽其法數以自修飭厥後史官並載其事以為鑒誡漢成帝時光祿大夫劉向見漢祚將危權歸外戚屢陳妖眚而不見納遂因洪範春秋災異報應者而為其傳覬以感悟人主而終不聽察卒以危亡豈不哀哉伏惟陛下神武則天睿鑒自遠欽若稽古率由舊章前言往行靡不究鑒前皇所不逮也臣學不洽聞識見寡薄懼無以裨廣聖聽仰酬明旨今謹依洪範傳天文志撮其事要略其文辭凡為八篇世祖覽而善之曰高允之明災異亦豈減崔浩乎及高宗即位允頗有謀焉司徒陸麗等皆受重賞允既不蒙褒異又終身不言其忠而不伐皆此類也給事中郭善明性多機巧欲逞其能勸高宗大起宮室允諫曰臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宮室已備永安前殿足以朝會萬國西堂溫室足以安御聖躬紫樓臨望可以觀望遠近若廣修壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其飢一婦不織或受其寒況數萬之衆其所損廢亦以多矣推之於古驗之於今必然之效也誠聖主所宜思量高宗納之允以高宗纂承平之業而風俗仍舊婚娶喪葬不依古式允乃諫曰前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謠鼓舞殺牲燒葬一切禁斷雖條旨久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至於斯昔周文以百里之地修德布政先於寡妻及於兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥效矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給伎以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆揀擇德義之門妙選貞間之女先之以媒娉繼之以禮物集僚友以重其別親御輪以崇其敬婚姻之際如此之難今諸王十五便賜妻別居然所配者或長少差舛或罪入掖庭而作合宗王妃嬪藩懿失禮之甚無復此過往年及今頻有檢劾誠是諸王過酒致責迹其元起亦由色衰相棄致此紛紜今皇子娶妻多出宮掖令天下小民必依禮限此二異也萬物之生靡不有死古先哲王作為禮制所以養生送死折諸人情若毀生以奉死則聖人所禁也然葬者藏也死者不可再見故深藏之昔堯葬穀林農不易畝舜葬蒼梧市不改肆秦始皇作為地市下固三泉金玉寶貨不可計數死不旋踵尸焚墓掘由此推之堯舜之儉始皇之奢是非可見今國家營葬費損巨億一旦焚之以為灰燼苟靡費有益於亡者古之臣奚獨不然今上為之不輟而禁下民之必止此三異也古者祭必立尸序其昭穆使亡者有憑致食饗之禮今已葬之魂人直求貌類者事之如父母燕好如夫妻損敗風化瀆亂情禮莫此之甚上未禁之下不改絶此四異也夫饗者所以定禮儀訓萬國故聖王重之至乃爵盈而不飲肴乾而不食樂非雅聲則不奏物非正色則不列今之大會內外相混酒醉喧譊罔有儀式又俳優鄙藝樜辱視聽朝庭積習以為美而責風俗之清純此五異也今陛下當百王之末踵晉亂之弊而不矯然釐改以厲頽俗臣恐天下蒼生永不聞見禮教矣允言如此非一高宗從容聽之或有觸忤帝所不忍聞者命左右扶出事有不便允輒求見高宗知允意逆屏左右以待之禮敬甚重晨入暮出或積日居中朝臣莫知所論或有上事陳得失者高宗省而謂羣臣曰君父一也父有是非子何為不作書於人中諫之使人知惡而於家內隱處也豈不以父親恐惡彰於外也今國家善惡不能面陳而上表顯諫此豈不彰君之短明己之美至如高允者真忠臣矣朕有是非常正言面論至朕所不樂聞者皆侃侃言説無所避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曾不聞一正言但伺朕喜時求官乞職汝等把弓刀侍朕左右徒立勞耳皆至公王此人把筆匡我國家不過作郎汝等不自愧乎於是拜允中書令著作如故司徒陸麗曰高允雖蒙寵待而家貧布衣妻子不立高宗怒曰何不先言今見朕用之方言其貧是日幸允第惟草屋數間布被縕袍中鹽菜而已高宗歎息曰古人之清貧豈有此乎即賜帛五百匹粟千斛拜長子忱為綏遠將軍長樂太守允頻表固讓高宗不許初與允同徵遊雅等多至通官封侯及允部下吏百數十人亦至刺史二千石而允為郎二十七年不徙官時百官無祿允常使諸子樵采自給初尚書竇瑾坐事誅瑾子遵亡在山澤遵母焦沒入縣官後焦以老得免瑾之親故莫有恤者允愍焦年老保護在家積六年遵始蒙赦其篤行如此轉太常卿本官如故允上代都賦因以規諷亦二京之流也文多不載時中書博士索敞與侍郎傅默梁祚論名字貴賤著議紛紜允遂著名字論以釋其惑甚有典證復以本官領祕書監解太常卿進爵梁城侯加左將軍初允與遊雅及太原張偉同業相友雅嘗論允曰夫喜怒者有生所不能無也而前史載卓公寬中文饒洪量褊心者或之弗信余與高子遊處四十年矣未嘗見其是非慍喜之色不亦信哉高子內文明而外柔弱其言訥訥不能出口余常呼為文子崔公謂余云高生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起於纖微及於詔責崔公聲嘶股戰不能言宗欽已下伏地流汗都無人色高子敷陳事理申釋是非辭義清辨音韻高亮明主為之動容聽者無不稱善仁及僚友保茲元吉向之所謂矯矯者更在斯乎宗愛之任勢也威振四海嘗召百司於都坐王公以下望庭畢拜高子獨升階長揖由此觀之汲長孺可臥見衛青何抗禮之有向之所謂風節者得不謂此乎知人固不易人亦不易知吾既失之於心內崔亦漏之於形外鍾期止聽於伯牙夷吾見明於鮑叔良有以也其為人物所推如此高宗重允常不名之呼為令公令公之號播於四遠矣高宗崩顯祖居諒暗乙渾專擅朝命謀危社稷文明太后誅之引允禁中參決大政又詔允曰自頃以來庠序不建為日久矣道肆陵遲學業遂廢子襟之歎復見于今朕既篡統大業八表晏寧稽之舊典欲置學官於郡國使進修之業有所津寄卿儒宗元老朝望舊德宜與中祕二省參議以聞允表曰臣聞經綸大業必以教養為先咸秩九疇亦由文德成務故辟雍光於周詩泮宮顯於魯頌自永嘉以來舊章殄滅鄉閭蕪沒雅頌之聲京邑杜絶釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思纂成洪烈萬國咸寧百揆時申祖宗之遺志興周禮之絶業爰發德音惟新文教搢紳黎獻莫不幸甚臣承旨敕並集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔玄同古義宜如聖旨崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博關經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡高門次及中第顯祖從之郡國立學自此始也後允以老疾頻上表乞骸骨詔不許於是乃著告老詩又以昔歲同徵零落將盡感逝懷人作徵士頌蓋止於應命者其有命而不至則闕焉羣賢之行舉其梗概矣今著之於左中書侍郎固安伯范陽盧玄子真郡功曹史博陵崔綽茂祖河內太守下樂侯廣寧燕崇玄略上黨太守高邑侯廣寧常陟公山征南大將軍從事中郎勃海高毗子翼征南大將軍從事中郎勃海李欽道賜河西太守饒陽子博陵許堪祖根中書郎新豐侯京兆杜銓士衡征西大將軍從事中郎京兆韋閬友規京兆太守趙郡李詵令孫太常博士巨鹿公趙郡李靈虎符中書郎中即丘子趙郡李遐仲熙營州刺史建安公太原張偉仲業輔國大將軍從事中郎范陽祖邁征東大將軍從事中郎范陽祖侃士倫東郡太守蒲縣子中山劉策濮陽太守真定子常山許琛行司隸校尉中都侯西河宋宣道茂中書郎燕郡劉遐彥鑒中書郎武子河間邢穎宗敬滄水太守浮陽侯勃海高濟叔民太平太守平原子雁門李熙士元祕書監梁郡公廣平遊雅伯度廷尉正安平子博陵崔建興祖廣平太守列人侯西河宋愔州主簿長樂潘天符郡功曹長樂杜熙征東大將軍從事中郎中山張綱中書郎上谷張誕叔術祕書郎雁門王道雅祕書郎雁門閔弼衛大將軍從事中郎中山郎苗大司馬從事中郎上谷侯辨陳留郡太守高邑子趙郡呂季才夫百王之御士也莫不資伏羣才以隆治道故周文以多士克寧漢武以得賢為盛此載籍之所記由來之常義魏自神已後宇內平定誅赫連積世之僭掃窮髮不羇之寇南摧江楚西蕩涼域殊方之外慕義而至於是偃兵息甲修立文學登延俊造酬咨政事夢想賢哲思遇其人訪諸有司以求名士咸稱范陽盧玄等四十二人皆冠冕之胄著問州邦有羽儀之用親發明詔以徵玄等乃曠官以待之懸爵以縻之其就命三十五人自餘依例州郡所遣者不可稱記爾乃髦士盈朝而濟濟之美興焉昔與之俱蒙斯舉或從容廊廟或遊集私門上談公務下盡欣娛以為千載一時始於此矣日月推移吉凶代謝同徵之人凋殲殆盡在者數子然復分張往昔之欣變為悲戚張仲業東臨營州遲其還返一于懷齊襟于垂歿之年寫情於桑榆之末其人不幸復至殞歿在朝者皆後進之士居里者非疇昔之人進涉無寄心之所出入無解顏之地顧省形骸所以永歎而不已夫頌者美盛德之形容亦可以長言寄意不為文二十年矣然事切於心豈可默乎遂為之頌詞曰紫氣干霄羣雄亂夏王龔徂征戎車屢駕掃蕩遊氛克剪妖霸四海從風八垠漸化政教無外既寧且一偃武櫜兵唯文是恤帝乃旁求搜賢舉逸巖隱投竿異人並出亹亹盧生量遠思純鑽道據德遊藝依仁旌弓既招釋褐投巾攝齊升堂嘉謀日陳自東徂南躍馬馳輪僭馮影附劉以和親茂祖煢單夙離不造克己勉躬聿隆家道敦心六經遊思文藻終辭寵命以之自保燕常篤信百行靡遺位不苟進任理栖遲居沖守約好讓善推思賢樂古如渴如飢子翼致遠道賜悟深相期以義相和若琴並參幕府俱發德音優遊卒歲聊以寄心祖根運會克光厥猷仰緣朝恩俯因德友功雖後建祿實先受班同舊臣位並羣后士衡孤立內省靡疚言不崇華交不遺舊以産則貧論道則富所謂伊人實邦之秀卓矣友規稟茲淑亮存彼大方擯此細讓神與理冥形隨流浪雖屈王侯莫廢其尚趙實名區世多奇士山嶽所鍾挺生三李矯矯清風抑抑容止初九而潛望雲而起詵尹西都靈惟作傳垂訓皇宮載理雲霧熙雖中夭迹階郎署餘塵可挹終亦顯著仲業淵長雅性清到憲章古式綢繆典誥時值險難常一其操納衆以仁訓下以孝化被龍川民歸其教邁則英賢侃亦稱選聞達邦家名行素顯志在兼濟豈伊獨善繩匠弗顧功不獲展劉許履忠竭力致躬出能騁説入獻其功輶軒一舉撓燕下崇名彰魏世享業亦隆道茂夙成弱冠播名與朋以信行物以誠怡怡昆弟穆穆家庭發響九臯翰飛紫冥頻在省闥亦司于京刑以之中政以之平猗歟彥鑒思參文雅率性任真器成非假靡矜于高莫于下乃謝朱門歸迹林野宗敬延譽號為四俊華藻雲飛金聲夙振中遇沈痾賦詩以訊忠顯于辭理出于韻高滄朗達默識淵通領新悟異發自心胸質侔和璧文炳雕龍耀姿天邑衣錦舊邦士元先覺介焉不惑振袂來庭始賓王國蹈方履正好是繩墨淑人君子其儀不忒孔稱遊夏漢美淵雲越哉伯度出類踰羣司言祕閣作牧河汾移風易俗理亂解紛融彼滯義渙此潛文儒道以析九流以分崔宋二賢誕性英偉擢穎閭閻聞名象魏謇謇儀形邈邈風氣達而不矜素而能賁潘符摽尚杜熙好和清不潔流渾不同波絶希龍津止分常科幽而逾顯損而逾多張綱柔謙叔術正直道雅洽聞弼為兼識拔萃衡門俱漸鴻翼發憤忘餐豈要斗食率禮從仁罔愆于式失不繫心得不形色郎苗始舉用均已試智足周身言足為治性協於時情敏於事與今而同與古曷異物以利移人以酒昏侯生潔己唯義是敦日縱醇醪逾敬逾溫其在私室如涉公門季才之性柔而執競屆彼南秦申威致命誘之以權矯之以正帝道用光邊土納慶羣賢遭世顯名有代志竭其忠才盡其概體襲朱裳腰紐雙佩榮曜當時風高千載君臣相遇理實難偕昔因朝命舉之克諧披襟散想解帶舒懷此欣如昨存亡奄乖靜言思之中心九摧揮毫頌德漼爾增哀皇興中詔允兼太常至兗州祭孔子廟謂允曰此簡德而行勿有辭也後允從顯祖北伐大捷而還至武川鎮上北伐頌其詞曰皇矣上天降鑒惟德眷命有魏照臨萬國禮化丕融王猷允塞靜亂以威穆民以則北虜舊隸稟政在蕃往因時逃命北轅世襲凶軌背忠食言招亡聚盜醜類實繁敢率犬羊圖縱猖蹶乃詔訓師興戈北伐躍馬裹糧星馳電發撲討虔劉肆陳斧鉞斧鉞暫陳馘翦厥旅積骸填谷流血成浦元凶狐奔假息窮墅爪牙既摧腹心亦阻周之忠厚存及行葦翼翼聖明有兼斯美澤被京觀垂此仁旨封尸野獲惠加生死生死蒙惠人欣覆育理貫幽冥澤漸殊域物歸其誠神獻其福遐邇斯懷無思不服古稱善兵歷時始捷今也用師辰不及浹六軍克合萬邦以協義著春秋功銘玉牒載興頌聲播之來葉顯祖覽而善之又顯祖時有不豫以高祖沖幼欲立京兆王子推集諸大臣以次召問允進跪上前涕泣曰臣不敢多言以勞神聽願陛下上思宗廟託付之重追念周公抱成王之事顯祖於是傳位於高祖賜帛千匹以標忠亮又遷中書監加散騎常侍雖久典史事然而不能專勤屬述時與校書郎劉模有所緝綴大較續崔浩故事準春秋之體而時有刊正自高宗迄于顯祖軍國書檄多允文也末年乃薦高閭以自代以定議之勳進爵咸陽公加鎮東將軍尋授使持節散騎常侍征西將軍懷州刺史允秋月巡境問民疾苦至邵縣見邵公廟廢毀不立乃曰邵公之德闕而不禮為善者何望乃表聞修葺之允於時年將九十矣勸民學業風化頗行然儒者優遊不以斷決為事後正光中中散大夫中書舍人河內常景追思允帥郡中故老為允立祠於野王之南樹碑紀德焉太和二年又以老乞還鄉里十餘章上卒不聽許遂以疾告歸其年詔以安車徵允敕州郡發遣至都拜鎮軍大將軍領中書監固辭不許又扶引就內改定皇誥允上酒訓曰臣被敕論集往世酒之敗德以為酒訓臣以朽邁人倫所棄而殊恩過隆録臣於將歿之年勗臣於已墜之地奉命驚惶喜懼兼甚不知何事可以上答伏惟陛下以睿哲之姿撫臨萬國太皇太后以聖德之廣濟育羣生普天之下罔不稱賴然日昃憂勤虛求不已思監往事以為警戒此之至誠悟通百靈而況於百官士民不勝踴躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀採伏願聖慈體臣悾悾之情恕臣狂瞽之意其詞曰自古聖王其為饗也玄酒在堂而鏽酒在下所以崇本重原降於滋味雖泛爵旅行不及於亂故能禮章而敬不虧事畢而儀不忒非由斯致是失其道將何以範時軌物垂之於世歷觀往代成敗之效吉凶由人不在數也商辛耽酒殷道以之亡公旦陳誥周德以之昌子反昏酣而致斃穆生不飲而身光或長世而為戒或百代而流芳酒之為狀變惑情性雖曰哲人孰能自競在官者殆於政也為下者慢於令也聰達之士荒於聽也柔順之倫興於諍也久而不悛致於病也豈止於病乃損其命諺亦有云其益如毫其損如刀言所益者止於一味之益不亦寡乎言所損者夭年亂志夭亂之損不亦夥乎無以酒荒而陷其身無以酒狂而喪其倫迷邦失道流浪漂津不師不遵反將何因詩不言乎如切如瑳如琢如磨朋友之義也作官以針之申謨以禁之君臣之道也其言也善則三覆而佩之言之不善則哀矜而貸之此實先王納規之意往者有晉士多失度肆散誕以為不羇縱長酣以為高達調酒之頌以相眩曜稱堯舜有千鍾百觚之飲著非法之言引大聖為譬以則天之明豈其然乎且子思有云夫子之飲不能一升以此推之千鍾百觚皆為妄也今大魏應圖重明御世化之所暨無思不服仁風敦洽於四海太皇太后以至德之隆誨而不倦憂勤備於皇情誥訓行於無外故能道協兩儀功同覆載仁恩下逮罔有不遵普天率土靡不蒙賴在朝之士有志之人宜克己從善履正存貞節酒以為度順德以為經悟昏飲之美疾審敬慎之彌榮遵孝道以致養顯父母而揚名蹈閔曾之前軌遺仁風於後生仰以答所授俯以保其成可不勉歟可不勉歟高祖悅之常置左右詔允乘車入殿朝賀不拜明年詔允議定律令雖年漸期頤而志識無損猶心存舊職披考史書又詔曰允年涉危境而家貧養薄可令樂部絲竹十人五日一詣允以娛其志特賜允蜀牛一頭四望蜀車一乘素几杖各一蜀刀一口又賜珍味每春秋常致之尋詔朝晡給膳朔望致牛酒衣服綿絹每月送給允皆分之親故是時貴臣之門皆羅列顯官而允子弟皆無官爵其廉退若此遷尚書散騎常侍時延入備几杖問以政治十年加光祿大夫金章紫綬朝之大議皆咨訪焉魏初法嚴朝士多見杖罰允歷事五帝出入三省五十餘年初無譴咎初真君中以獄訟留滯始令中書以經義斷諸疑事允據律評刑三十餘載內外稱平允以獄者民之命也常歎曰臯陶至德也其後英蓼先亡劉項之際英布黥而王經世雖久猶有刑之餘釁況凡人能無咎乎其年四月有事西郊詔以御馬車迎允就郊所板殿觀矚馬忽驚奔車覆傷眉三處高祖文明太后遣醫藥護治存問相望司駕將處重坐允啓陳無恙乞免其罪先是命中黃門蘇興壽扶持允曾雪中遇犬驚倒扶者大懼允慰勉之不令聞徹興壽稱共允接事三年未嘗見其忿色恂恂善誘誨人不倦晝夜手常執書吟詠尋覽篤親念故虛己存納雖處貴重志同貧素性好音樂每至伶人弦歌鼓舞常擊節稱善又雅信佛道時設齋講好生惡殺性又簡至不妄交遊顯祖平青齊徙其族望於代時諸士人流移遠至率皆飢寒徙人之中多允姻媾皆徒步造門允散財竭産以相贍賑慰問周至無不感其仁厚收其才能表奏申用時議者皆以新附致異允謂取材任能無宜抑屈先是允被召在方山作頌志氣猶不多損談説舊事了無所遺十一年正月卒年九十八初允每謂人曰吾在中書時有陰德濟救民命若陽報不差吾壽應享百年矣先卒旬外微有不適猶不寢臥呼醫請藥出入行止吟詠如常高祖文明太后聞而遣醫李修往脈視之告以無恙修入密陳允榮衛有異懼其不久於是遣使備賜御膳珍羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被几杖羅列於庭王官往還慰問相屬允喜形於色語人曰天恩以我篤老大有所賚得以贍客矣表謝而已不有他慮如是數日夜中卒家人莫覺詔給絹一千匹布二千匹綿五百斤錦五十匹雜綵百匹穀千斛以周喪用魏初以來存亡蒙賚者莫及焉朝庭榮之將葬贈侍中司空公冀州刺史將軍公如故諡曰文賜命服一襲允所製詩賦誄頌針論表讚左氏公羊釋毛詩拾遺論雜解議何鄭膏肓事凡百餘篇別有集行於世允明算法為算術三卷子忱襲忱字士和以父任除綏遠將軍長樂太守為政寬惠民庶安之後例降爵為侯尋卒孫貴賓襲除州治中卒官忱弟懷字士仁任城王雲郎中令大將軍從事中郎授中散恬淡退靜不競世利在散輩十八年不易官太和中除太尉東陽王咨議參軍而卒子綽字僧裕少孤恭敏自立身長八尺腰帶十圍沉雅有度量博涉經史太和十五年拜奉朝請太尉法曹行參軍尋兼尚書祠部郎以母憂去職久之除治書侍御史轉洛陽令綽為政強直不避豪貴邑人憚之又詔參議律令遷長兼國子博士行潁川郡事詔假節行涇州刺史延昌初遷尚書右丞參議壬子曆肅宗初司徒清河王懌司馬冠軍又隨懌遷太尉司馬其年秋大乘賊起於冀州都督元遙率衆討之詔綽兼散騎常侍持節以白虎幡軍前招慰綽信著州里降者相尋軍還除汲郡太守固辭不拜御史中尉元匡奏高聰及綽等朋附高肇詔並原罪俄行滎陽郡事以本將軍出除豫州刺史為政清平抑強扶弱百姓愛之流民歸附者二千餘戶遷後將軍并州刺史正光三年冬暴疾卒年四十八四年九月詔贈安東將軍冀州刺史諡曰簡子炳字仲彰太尉行參軍稍遷征虜將軍開府掾早卒允弟推字仲讓小名檀越早有名譽太延中以前後南使不稱妙簡行人遊雅薦推應選詔兼散騎常侍使劉義隆南人稱其才辨遇疾卒於建業朝廷悼惜之喪還贈輔國將軍臨邑子諡曰恭賜命服衣冠允為之作誄推弟燮字季和小字淳于亦有文才世祖每詔徵辭疾不應譏笑允屈折久宦栖泊京邑常從容於家州辟主簿卒孫市賓奉朝請冀州京兆王愈城局參軍愈構逆市賓逃歸京後除青州安南府司馬永熙中冠軍將軍開府從事中郎始神中允與從叔濟族兄毗及同郡李金俱被徵濟字叔民初補中書博士又為楚王傅真君中假員外常侍賜爵浮陽子使於劉義隆世祖臨江於行所除盱眙太守後超授遊擊將軍尋出除滄水太守卒年六十七贈鎮遠將軍冀州刺史諡曰宣子矯襲卒子師襲師字孝則有學識歷詹事丞太子舍人尚書主客郎轉通直散騎侍郎從事正員郎纍遷光祿少卿行涇州事卒贈龍驤將軍河州刺史子和仁字德舒襲釋褐員外散騎侍郎領殿中御史少清簡有文才曾為五言詩贈太尉屬盧仲宣仲宣甚歎重之常有高尚之志後為洛州録事參軍不赴服餌於汲郡白鹿山未幾卒時人悼惜之和仁弟德偉武定末東宮齋帥矯弟遵自有傳毗字子翼鄉邑稱為長者官至從事中郎孫當尚書郎卒贈樂陵太守諡曰恭初允所引劉模者長樂信都人也少時竊遊河表遂至河南尋復潛歸頗涉經籍微有注疏之用允領祕書典著作選為校書郎允修撰國記與俱緝著常令模持管籥每日同入史閣接膝對筵屬述時事允年已九十目手稍衰多遣模執筆而指授裁斷之如此者五六歲允所成篇卷著論上下模預有功焉太和初模遷中書博士與李彪為僚友並相愛好至於訓導國胄甄明風範遠不及彪也出除潁州刺史王肅之歸闕路經懸瓠羇旅窮悴時人莫識模獨給所須弔待以禮肅深感其意及肅臨豫州模猶在郡微報復之由是為新蔡太守在二郡積十年寬猛相濟頗有治稱正始元年復出為陳留太守時年七十餘矣而飾老隱年昧禁自效遂家於南潁川不復歸其舊鄉矣子懷恕聰率多甚收潁川情和至襄威將軍本州冠軍府功曹參軍懷恕弟懷遜頗解醫術歷位給事中卒於左軍將軍鎮遠將軍史臣曰依仁遊藝執義守哲其司空高允乎蹈危禍之機抗雷電之氣處死夷然忘身濟物卒悟明主保己全身自非體鄰知命鑒照窮達亦何能以若此宜其光寵四世終享百齡有魏以來斯人而已僧裕學治有聞聿修之義也
