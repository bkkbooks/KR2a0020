body:
  text: 魏書卷十二孝靜紀第十二孝靜皇帝諱善見清河文宣王亶之世子也母曰胡妃永熙三年拜通直散騎侍郎八月為驃騎大將軍開府儀同三司出帝既入關齊獻武王奉迎不克乃與百僚會議推帝以奉肅宗之後時年十一冬十月丙寅即位于城東北大赦天下改永熙三年為天平元年庚午以太師趙郡王諶為大司馬以司空咸陽王坦為太尉以開府儀同三司高盛為司徒以開府儀同三司高昂為司空壬申有事于太廟詔曰安安能遷自古之明典所居靡定往昔之成規是以殷遷八城周卜三地吉凶有數隆替無事由於變通理出於不得已故也高祖孝文皇帝式觀乾象俯協人謀發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國步孔𣗥喪亂不已寇賊交侵俾我生民無所措手今遠遵古式深驗時事考龜襲吉遷宅漳滏庶克隆洪基再昌寶曆主者明為條格及時發邁丙子車駕北遷于鄴詔齊獻武王留後部分改司州為洛州以衞大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽詔從遷之戶百官給復三年安居人五年十有一月兗州刺史樊子鵠南青州刺史大野拔據瑕丘反庚寅車駕至鄴居北城相州之廨改相州刺史為司州牧魏郡太守為魏尹徙鄴舊人西徑百里以居新遷之人分鄴置臨漳縣以魏郡林慮廣平陽丘汲郡黎陽東濮陽清河廣宗等郡為皇畿十有二月丁卯燕郡王賀拔允薨庚午詔內外解嚴百司悉依舊章從容雅服不得以矛釤從事丙子遣侍中封隆之等五人為大使巡諭天下丁丑赦畿內閏月蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉宇文黑獺既害出帝乃以南陽王寶炬僭尊號初置四中郎將於礓石橋置東中蒲泉置西中濟北置南中洺水置北中二年春正月寶炬渭州刺史可朱渾道元擁部來降齊獻武王迎納之賑其廩食己巳詔以齊獻武王為相國假黃鉞劍履上殿入朝不趨餘悉如故王固讓不受乙亥兼尚書右僕射東南道行臺元晏討元慶和破走之二月壬午以太尉咸陽王坦為太傅以司州牧西河王悰為太尉己丑前南青州刺史大野拔斬樊子鵠以降兗州平戊戌蕭衍司州刺史陳慶之寇豫州刺史堯雄擊走之三月辛酉以司徒高盛為太尉以司空高昂為司徒濟陰王暉業為司空齊獻武王討平山胡劉蠡升斬之其子南海王復僭帝號獻武王進擊破擒之及其弟西海王皇后夫人已下四百人并逋逃之人二萬餘戶辛未以旱故詔京邑及諸州郡縣收瘞骸骨是春高麗契丹並遣使朝貢夏四月前青州刺史侯淵反攻掠青齊癸未濟州刺史蔡儁討平之壬辰降京師見囚五月大旱勒城門殿門及省府寺署門澆人不簡王公無限日得雨乃止六月元慶和寇南豫州刺史堯雄大破之秋七月甲戌封汝南王悅孫綽為琅邪王八月辛卯司空濟陰王暉業坐事免甲午發衆七萬六千人營新宮九月齊獻武王以治民之官多不奉法請選朝士清正者州別遣一人問疾苦丁巳以開府儀同三司襄城王旭為司空冬十有一月丁未蕭衍將柳仲禮寇荊州刺史王元擊破之癸丑祀圓丘甲寅閶闔門災龍見并州人家井中丙寅詔齊文襄王起家為散騎常侍驃騎大將軍左光祿大夫儀同三司太原郡開國公食邑三千戶十有二月壬午車駕狩于鄴東甲午文武百官量事各給祿三年春正月癸卯朔饗羣臣於前殿戊申詔百官舉士舉不稱才者兩免之齊獻武王襲寶炬西夏州克之詔加齊獻武王九錫之禮侍中元子思敦諭固讓乃止二月丁未蕭衍光州刺史郝樹以州內附丁酉詔加齊文襄王使持節尚書令大行臺大都督以鮮卑高車酋庶皆隸之三月甲寅以開府儀同三司華山王鷙為大司馬丁卯陽夏太守盧公纂據郡南叛大都督元整破之夏四月丁酉昌樂王誕薨五月癸卯賜魚眾寡孤獨貧窮者衣物各有差丙辰以錄尚書事西河王悰為司州牧戊辰太尉高盛薨六月辛巳趙郡王諶薨秋七月庚子大赦天下蕭衍夏州刺史田獨鞞潁川防城都督劉鸞慶並以州內附八月并肆汾建四州隕霜大飢九月壬寅以定州刺史侯景兼尚書右僕射南道行臺節度諸軍南討丙辰陽平人路季禮聚衆反辛酉御史中尉竇泰討平之冬十有一月戊申詔尚書可遣使巡檢河北流移飢人邢陘滏口所經之處若有死屍即為藏掩勿使靈臺枯骨有感於通夢廣漢露骸時聞於夜哭侯景攻克蕭衍楚州獲刺史桓和十有二月以并州刺史尉景為太保辛未遣使者板假老人官百歲已下各有差壬申大司馬清河王亶薨丁丑齊獻武王自晉陽西討次於蒲津司徒公大都督高敖曹趨上洛車騎大將軍竇泰入自潼關癸未以太傅咸陽王坦為太師乙酉勿吉國遣使朝貢是歲高麗國遣使朝貢四年春正月禁十五日相偷戲竇泰失利自殺丁巳高敖曹攻上洛克之擒寶炬驃騎大將軍洛州刺史泉企以汝陽王暹為錄尚書事夏四月辛未遷七帝神主入新廟大赦天下內外百官普進一階先是滎陽人張儉等聚衆反於大騩山通寶炬壬辰武衞將軍高元盛討破之六月己巳幸華林園理訟辛未詔尚書掩骼埋胾推錄囚徒壬午閶闔門災先是蕭衍因益州刺史傅和請通好秋七月甲辰遣兼散騎常侍李諧兼吏部郎中盧元明兼通直散騎常侍李鄴使于蕭衍八月寶炬宇文黑獺寇陝州城陷刺史李徽伯為黑獺所殺九月侍中元子思與其弟子華謀西入並賜死閏月乙丑衞將軍右光祿大夫蔣天樂謀反伏誅禁京師酤酒冬十月以咸陽王坦為錄尚書事壬辰齊獻武王西討至沙苑不克而還己酉寶炬行臺宮景壽都督楊白駒寇洛州大都督韓延大破之寶炬又遣其子大行臺元季海大都督獨孤如願逼洛州刺史廣陽王湛棄城退還季海如願遂據金墉潁州長史賀若微執刺史田迅西叛引寶炬都督梁回據城寶炬又遣其都督趙繼宗右丞韋孝寬等攻陷豫州十有一月丙子以驃騎大將軍儀同三司万俟普為太尉十有二月甲寅蕭衍遣使朝貢河間人邢摩納范陽人盧仲禮等各聚衆反是歲高麗蠕蠕國並遣使朝貢元象元年春正月有巨象自至碭郡陂中南兗州獲送于鄴丁卯大赦改元大都督賀拔仁攻寶炬南汾州己卯拔之擒其刺史韋子粲行臺任祥率豫州刺史堯雄等與大行臺侯景司徒高敖曹大都督万俟受洛干等於北豫相會俱討潁州梁回等棄城遁走潁州平二月豫州刺史堯雄攻揚州拔之擒寶炬義州刺史韓顯揚州長史丘岳送京師丙辰遣兼散騎常侍鄭伯猷使于蕭衍三月齊獻武王固請解大丞相詔從之夏四月庚寅曲赦畿內壬辰齊獻武王還晉陽請開酒禁六月壬辰帝幸華林都堂聽訟是夏山東大水蝦蟆鳴于樹上秋七月乙亥高麗國遣使朝貢行臺侯景司徒公高敖曹圍寶炬將獨孤如願於金墉寶炬宇文黑獺並來赴救大都督厙狄干率諸將前驅齊獻武王總衆繼進八月辛卯戰于河陰大破之斬其大都督儀同三司寇洛生等二十餘人俘獲數萬司徒公高敖曹大都督李猛宋顯並戰沒寶炬留其將長孫子彥守金墉壬辰齊獻武王濟河子彥棄城走九月大都督賀拔仁擊邢摩納盧仲禮等破平之冬十月蕭衍遣使朝貢十有一月庚寅遣陸操使于蕭衍齊獻武王來朝十有二月甲辰還晉陽興和元年春正月辛酉以尚書令孫騰為司徒三月甲寅朔封常山郡王召己第二子曜為陳郡王夏五月齊文襄王來朝甲戌立皇后高氏乙亥大赦天下是月高麗國遣使朝貢六月乙酉以尚書左僕射司馬子如為山東黜陟大使尋為東北道大行臺差選勇士庚寅前潁州刺史奚思業為河南大使簡發勇士丁酉蕭衍遣使朝貢戊申開府儀同三司汝陽王暹薨秋七月丁丑詔以齊獻武王為相國錄尚書事大行臺固辭相國八月壬辰兼散騎常侍王元景兼通直散騎常侍魏收使于蕭衍九月甲子發畿內民夫十萬人城鄴城四十日罷辛未曲赦畿內死罪以下各有差冬十有一月癸亥以新宮成大赦天下改元八十以上賜綾帽及杖七十以上賜帛及有疾廢者賜粟帛築城之夫給復一年二年春正月壬申以太保尉景為太傅以驃騎大將軍開府儀同三司厙狄干為太保丁丑徙御新宮大赦內外百官普進一階營構主將別優一階三月己卯蕭衍遣使朝貢夏五月己酉西魏行臺宮延和陝州刺史宮元慶率戶內屬置之河北新附賑廩各有差壬子遣兼散騎常侍李象使于蕭衍閏月己丑封皇兄景植為宜陽王皇弟威為清河王謙為潁川王六月壬子大司馬華山王鷙薨冬十月丁未蕭衍遣使朝貢十有二月乙卯遣兼散騎常侍崔長謙使於蕭衍是歲蠕蠕高麗勿吉國並遣使朝貢三年春二月甲辰阿至羅出吐拔那渾大率部來降三月己酉梁州人公孫貴賓聚衆反自號天王陽夏鎮將討擒之夏四月戊申阿至羅國主副伏羅越居子去賓來降封為高車王六月乙丑蕭衍遣使朝貢秋七月齊文襄王如晉陽己卯宜陽王景植薨八月甲子遣兼散騎常侍李騫使于蕭衍冬十月癸卯齊文襄王自晉陽來朝先是詔文襄王與羣臣於麟趾閣議定新制甲寅班於天下己巳發夫五萬人築漳濱堰三十五日罷癸亥車駕狩于西山十有一月戊寅還宮丙戌以開府儀同三司彭城王韶為太尉以度支尚書胡僧敬為司空是歲蠕蠕高麗勿吉國並遣使朝貢四年春正月丙辰蕭衍遣使朝貢夏四月丙寅遣兼散騎常侍李繪使于蕭衍乙酉以侍中廣陽王湛為太尉以尚書右僕射高隆之為司徒以太尉彭城王韶為錄尚書事丁亥太傅尉景坐事降為驃騎大將軍開府儀同三司辛卯以太保厙狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射五月辛巳齊獻武王來朝請令百官月一面敷政事明揚仄陋納諫屏邪親理獄訟褒黜勤怠牧守有愆節級相坐椒掖之內進御以序後園鷹犬悉皆放棄六月還晉陽丙申復前侍中樂浪王忠爵丁酉復陳留王景皓常山王紹宗高密王永業爵秋八月庚戌以開府儀同三司吏部尚書侯景為兼尚書僕射河南行臺隨機討防冬十月甲寅蕭衍遣使朝貢齊獻武王圍寶炬玉壁十有一月壬午班師驃騎大將軍開府儀同三司青州刺史西河王悰薨十有二月辛亥遣兼散騎常侍陽斐使于蕭衍是歲蠕蠕高麗吐谷渾國並遣使朝貢武定元年春正月壬戌朔大赦天下改元己巳車駕蒐于邯鄲之西山癸酉還宮二月壬申北豫州刺史高仲密據虎牢西叛三月寶炬遣其子突與宇文黑獺率衆來援仲密庚子圍河橋南城丙午帝親納訟戊申齊獻武王討黑獺戰於邙山大破之擒寶炬兄子臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮驃騎大將軍儀同三司太子詹事趙善督將參僚等四百餘人俘斬六萬餘甲仗牛馬不可勝數豫洛二州平齊獻武王追奔至農而還夏四月封彭城王韶弟襲為武安王五月壬辰以克復虎牢降天下死罪以下囚乙未以吏部尚書侯景為司空六月乙亥蕭衍遣使朝貢戊寅封前員外散騎侍郎元長春為南郡王秋八月乙未以汾州刺史斛律金為大司馬壬午遣兼散騎常侍李渾使于蕭衍是月齊獻武王召夫五萬於肆州北山築城西自馬陵戍東至土櫊四十日罷冬十有一月甲午車駕狩于西山乙巳還宮是歲吐谷渾高麗蠕蠕國並遣使朝貢二年春正月地豆于國遣使朝貢二月丁卯徐州人劉烏黑聚衆反遣行臺慕容紹宗討平之三月蕭衍遣使朝貢以旱故宥死罪以下囚丙午以開府儀同三司孫騰為太保壬子以齊文襄王為大將軍領侍中其文武職事賞罰衆典詢稟之中書監元弼為錄尚書左僕射司馬子如為尚書令以今上為右僕射夏四月室韋國遣使朝貢五月甲午遣散騎常侍魏季景使于蕭衍丁酉太尉廣陽王湛薨秋八月癸酉尚書令司馬子如坐事免九月甲申以開府儀同三司濟陰王暉業為太尉太師咸陽王坦坐事免以王還第冬十月丁巳太保孫騰大司馬高隆之各為括戶大使凡獲逃戶六十餘萬十有一月西河地陷有火出甲申以司徒高隆之為尚書令以前大司馬婁昭為司徒齊文襄王如晉陽庚子車駕有事於圓丘辛丑蕭衍遣使朝貢壬寅齊文襄王從獻武王討山胡破之俘獲一萬餘戶分配諸州是歲吐谷渾高麗蠕蠕勿吉國並遣使朝貢三年春正月丙申遣兼散騎常侍李奬使于蕭衍丁未齊獻武王請於并州置晉陽宮以處配沒之口二月庚申吐谷渾國奉其從妹以備後庭納為容華嬪夏五月甲辰大赦天下秋七月庚子蕭衍遣使朝貢冬十月遣中書舍人尉瑾使于蕭衍乙未齊獻武王請邙山之俘釋其桎梏配以人間寡婦十有二月以司空侯景為司徒以中書令韓軌為司空戊子以太保孫騰為錄尚書事是歲高麗吐谷渾蠕蠕國並遣使朝貢四年夏五月壬寅蕭衍遣使朝貢六月庚子以司徒侯景為河南大行臺應機討防秋七月壬寅遣兼散騎常侍元廓使于蕭衍八月移洛陽漢魏石經于鄴齊獻武王自鄴帥衆西伐文襄王會于晉州九月圍玉壁以挑之寶炬黑獺不敢應冬十有一月齊獻武王有疾班師文襄王如晉陽是歲室韋勿吉地豆于高麗蠕蠕國並遣使朝貢五年春正月丙午齊獻武王薨於晉陽祕不發喪辛亥司徒侯景反潁州刺史司馬世雲以城應之景入據潁城誘執豫州刺史高元成襄州刺史李密廣州刺史暴顯等遣司空韓軌驃騎大將軍儀同三司賀拔勝可朱渾道元左衞將軍劉豐等帥衆討之景乃遣使降於寶炬請師救援寶炬遣其將李景和王思政帥騎赴之思政等入據潁川景乃出走豫州乙丑蕭衍遣使朝貢二月侯景復背寶炬歸於蕭衍衍署景河南大將軍承制夏四月壬申大將軍齊文襄王來朝甲午遣兼散騎常侍李緯使于蕭衍五月丁酉朔大赦天下戊戌以尚書右僕射襄城王旭為太尉甲辰以太原公今上為尚書令領中書監餘如故詢以政事以青州刺史尉景為大司馬以開府儀同三司厙狄干為太師以錄尚書事孫騰為太傅以汾州刺史賀仁為太保以司空韓軌為司徒以領軍將軍可朱渾道元為司空以司徒高隆之錄尚書事以徐州刺史慕容紹宗為尚書左僕射高陽王斌為右僕射戊午大司馬尉景薨六月司徒韓軌司空可朱渾道元等自潁州班師乙酉帝為齊獻武王舉哀於東堂服緦縗詔尚書右僕射高陽王斌兼大鴻臚卿赴晉陽監護喪事太尉襄城王旭兼尚書令奉詔宣慰秋七月戊戌詔贈王假黃鉞使持節相國都督中外諸軍事齊王璽紱轀輬車黃屋左纛前後羽葆鼓吹輕車介士兼備九錫之禮諡曰獻武王以齊文襄王為使持節大丞相都督中外諸軍事錄尚書事大行臺勃海王壬寅詔王攝理軍國遣中使敦諭八月齊文襄王入朝固辭丞相詔復授大將軍餘如故甲申葬齊獻武王於鄴城西北車駕祖於漳濱九月齊文襄王還晉陽辛酉蕭衍遣其兄子貞陽侯淵明帥衆寇徐州堰泗水於寒山灌彭城以應侯景冬十月乙酉以尚書左僕射慕容紹宗為東南道行臺與驃騎大將軍儀同三司大都督高岳潘相樂討淵明十有一月大破之擒淵明及其二子瑀道將帥二百餘人俘斬五萬級凍乏赴水死者不可勝數十有二月乙亥蕭淵明至闕帝御閶闔門讓而宥之岳等回師討侯景是歲高麗勿吉國並遣使朝貢六年春正月己亥大都督高岳等於渦陽大破侯景俘斬五萬餘人其餘溺死於渦水水為之不流景走淮南己未齊文襄王來朝請以寒山獲士賜百官及督將等各有差二月己卯蕭衍遣使款闕乞和并修書弔齊文襄王文襄王還晉陽三月癸巳以太尉襄城王旭為大司馬以開府儀同三司高岳為太尉辛亥以冬春亢旱赦罪人各有差夏四月甲子吏部令史張永和青州人崔闊等偽假人官事覺糾檢首者六萬餘人秋八月甲戌以尚書左僕射慕容紹宗為大行臺與太尉高岳司徒韓軌大都督劉豐等討王思政於潁川引洧水灌其城九月乙酉蕭衍遣使朝貢冬十月戊申侯景濟江推蕭衍弟子臨賀王正德為主以攻建業是歲高麗室韋蠕蠕吐谷渾國並遣使朝貢七年春正月戊辰蕭衍弟子北徐州刺史封山侯蕭正表以鍾離內屬封蘭陵郡開國公吳郡王三月丁卯侯景克建業還以蕭衍為主衍弟子北兗州刺史定襄侯蕭祗相譚侯蕭退來降衍江北郡國皆內屬夏四月大行臺慕容紹宗大都督劉豐遇暴風溺水死甲辰詔以齊文襄王為相國齊王綠綟綬讚拜不名入朝不趨劍履上殿食冀州之勃海長樂安德武邑瀛州之河間五郡邑十五萬戶餘如故王固讓是月侯景殺蕭衍立子綱為主五月齊文襄王帥衆自鄴赴潁川六月丙申克潁州擒寶炬大將軍尚書左僕射東道大行臺太原郡開國公王思政潁州刺史皇甫僧顯等及戰士一萬餘人男女數萬口齊文襄王遂如洛州秋七月齊文襄王至自南討請宥思政之罪八月辛卯詔立皇子長仁為皇太子齊文襄王薨於第祕不發喪癸巳大赦天下內外百官並加二級甲午齊王如晉陽冬十月癸未以開府儀同三司咸陽王坦為太傅甲午以開府儀同三司潘相樂為司空十有二月甲辰吳郡王蕭正表薨己酉以并州刺史彭樂為司徒是歲蠕蠕地豆于室韋高麗吐谷渾國並遣使朝貢八年春正月辛酉帝為齊文襄王舉哀於東堂丁卯詔贈齊文襄王假黃鉞使持節相國都督中外諸軍事齊王璽綬轀輬車黃屋左纛前後部羽葆鼓吹輕車介士備九錫之禮諡曰文襄王戊辰詔齊王為使持節丞相都督中外諸軍事錄尚書事大行臺齊郡王食邑一萬戶甲戌地豆于契丹國並遣使朝貢二月甲申葬齊文襄王車駕祖於漳濱庚寅以尚書令高隆之為太保三月庚申進齊郡王爵為齊王夏四月乙巳蠕蠕遣使朝貢五月甲寅詔齊王為相國總百揆封冀州之勃海長樂安德武邑瀛州之河間高陽章武定州之中山常山博陵十郡二十萬戶備九錫之禮以齊國太妃為王太后王妃為王后丙辰詔歸帝位於齊國即日遜於別宮齊天保元年五月己未封帝為中山王邑一萬戶上書不稱臣答不稱詔載天子旌旗行魏正朔乘五時副車封王諸子為縣公邑各一千戶奉絹三萬匹錢一千萬粟二萬石奴婢三百人水碾一具田百頃園一所於中山國立魏宗廟二年十二月己酉中山王殂時年二十八三年二月奉諡曰孝靜皇帝葬于漳西山崗其後發之陵崩死者六十人帝好文學美容儀力能挾石師子以踰牆射無不中嘉辰宴會多命羣臣賦詩從容沉雅有孝文風齊文襄王嗣事甚忌焉以大將軍中兵參軍崔季舒為中書黃門侍郎令監察動靜小大皆令季舒知文襄與季舒書曰癡人復何似癡勢小差未帝嘗與獵於鄴東馳逐如飛監衞都督烏那羅受工伐從後呼帝曰天子莫走馬大將軍怒文襄嘗侍飲大舉觴曰臣澄勸陛下酒帝不悅曰自古無不亡之國朕亦何用此活文襄怒曰朕朕狗脚朕文襄使季舒毆帝三拳奮衣而出明日文襄使季舒勞帝帝亦謝焉賜絹季舒未敢受以啟文襄文襄使取一段帝束百匹以與之曰亦一段耳帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連本自江海人忠義動君子常侍侍講荀濟知帝意乃與華山王大器元瑾密謀於宮內為山而作地道向北城至千秋門門者覺地下響動以告文襄文襄勒兵入宮曰陛下何意反邪臣父子功存社稷何負陛下邪將殺諸妃嬪帝正色曰王自欲反何關於我我尚不惜身何況妃嬪文襄下牀叩頭大啼謝罪於是酣飲夜久乃出居三日幽帝於含章堂大器瑾等皆見烹於市及將禪位於文宣襄城王旭及司徒潘相樂侍中張亮黃門郎趙彥琛等求入奏事帝在昭陽殿見之旭曰五行遞運有始有終齊王聖德欽明萬姓歸仰臣等昧死聞奏願陛下則堯禪舜帝便斂容答曰此事推挹已久謹當遜避又云若爾須作詔書侍郎崔劭裴讓之奏云詔已作訖即付楊愔進於帝凡十條書訖帝曰將安朕何所復若為而去楊愔對曰在北城別有館宇還備法駕依常仗衞而去帝乃下御座步就東廊口詠范蔚宗後漢書贊云獻生不辰身播國屯終我四百永作虞賓所司奏請發帝曰古人念遺簪弊履欲與六宮別可乎高隆之曰今天下猶陛下之天下況在後宮乃與夫人妃嬪已下訣莫不欷歔掩涕嬪趙國李氏誦陳思王詩云王其愛玉體俱享黃髮期皇后已下皆哭直長趙德以故犢車一乘候於東上閤帝上車德超上車持帝帝肘之曰朕畏天順人授位相國何物奴敢逼人趙德尚不下及出雲龍門王公百僚衣冠拜辭帝曰今日不減常道鄉公漢獻帝衆皆悲愴高隆之泣灑遂入北城下司馬子如南宅及文宣行幸常以帝自隨帝后封太原公主常為帝嘗食以護視焉竟遇酖而崩
