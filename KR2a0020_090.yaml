body:
  text: 魏書卷八十四列傳儒林第七十二梁越盧醜張偉梁祚平陳奇常爽劉獻之張吾貴劉蘭孫惠蔚徐遵明董徵刁沖盧景裕李同軌李業興自晉永嘉之後運鍾喪亂宇內分崩羣凶肆禍生民不見俎豆之容黔首唯覩戎馬之跡禮樂文章掃地將盡而契之所感斯道猶存高才有德之流自強蓬蓽鴻生碩儒之輩抱器晦己太祖初定中原雖日不暇給始建都邑便以經術為先立太學置五經博士生員千有餘人天興二年春增國子太學生員至三千豈不以天下可馬上取之不可以馬上治之為國之道文武兼用育才成務意在茲乎聖達經猷蓋為遠矣四年春命樂師入學習舞釋菜于先聖先師太宗世改國子為中書學立教授博士世祖始光三年春別起太學於城東後徵盧玄高允等而令州郡各舉才學於是人多砥尚儒林轉興顯祖天安初詔立鄉學郡置博士二人助教二人學生六十人後詔大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人太和中改中書學為國子學建明堂辟雍尊三老五更又開皇子之學及遷都洛邑詔立國子太學四門小學高祖欽明稽古篤好墳典坐輿據鞍不忘講道劉芳李彪諸人以經書進崔光邢巒之徒以文史達其餘涉獵典章關歷詞翰莫不縻以好爵動貽賞眷於是斯文鬱然比隆周漢世宗時復詔營國學樹小學於四門大選儒生以為小學博士員四十人雖黌宇未立而經術彌顯時天下承平學業大盛故燕齊趙魏之間橫經著録不可勝數大者千餘人小者猶數百州舉茂異郡貢孝廉對揚王庭每年逾衆神龜中將立國學詔以三品已上及五品清官之子以充生選未及簡置仍復停寢正光二年乃釋奠於國學命祭酒崔光講孝經始置國子生三十六人暨孝昌之後海內淆亂四方校學所存無幾永熙中復釋奠於國學又於顯陽殿詔祭酒劉廞講孝經黃門李郁說禮記中書舍人盧景宣講大戴禮夏小正篇復置生七十二人及遷都於鄴國子置生三十六人至於興和武定之世寇難既平儒業復光矣漢世鄭玄並為衆經注解服虔何休各有所說玄易書詩禮論語孝經虔左氏春秋休公羊傳大行於河北王肅易亦間行焉晉世杜預注左氏預玄孫坦坦弟驥於劉義隆世並為青州刺史傳其家業故齊地多習之自梁越以下傳受講說者甚衆今舉其知名者附列於後云梁越字玄覽新興人也少而好學博綜經傳無所不通性純和篤信行無擇善國初為禮經博士太祖以其謹厚舉動可則拜上大夫命授諸皇子經書太宗即祚以師傅之恩賜爵祝阿侯後出為雁門太守獲白雀以獻拜光祿大夫卒子弼早卒弼子恭襲降為雲中子無子爵除盧醜昌黎徒河人襄城王魯元之族也世祖之為監國醜以篤學博聞入授世祖經後以師傅舊恩賜爵濟陰公除鎮軍將軍拜尚書加散騎常侍出為河內太守延和二年冬卒闕初中山襲爵太和中以老疾自免子升頭襲爵後例降張偉字仲業小名翠螭太原中都人也高祖敏晉祕書監偉學通諸經講授鄉里受業者常數百人儒謹泛納勤於教訓雖有頑固不曉問至數十偉告喻殷勤曾無慍色常依附經典教以孝悌門人感其仁化事之如父性恬平不以夷嶮易操清雅篤慎非法不言世祖時與高允等俱被辟命拜中書博士轉侍郎大將軍樂安王範從事中郎馮翊太守還仍為中書侍郎本國大中正使酒泉慰勞沮渠無諱還遷散騎侍郎聘劉義隆還拜給事中建威將軍賜爵成臯子出為平東將軍營州刺史進爵建安公卒贈征南將軍并州刺史諡曰康在州郡以仁德為先不任刑罰清身率下宰守不敢為非子仲慮太和初假給事中高麗副使尋假散騎常侍高麗使後出為章武太守加寧遠將軍仲慮弟仲繼學尚有父風善倉雅林說太和中官至侍御長坐事徙西裔道死梁祚北地泥陽人父劭皇始二年歸國拜吏部郎出為濟陽太守至祚居趙郡祚篤志好學歷治諸經尤善公羊春秋鄭氏易常以教授有儒者風而無當世之才與幽州別駕平有舊又姊先適范陽李氏遂攜家人僑居於薊積十餘年雖羈旅貧窘而著述不倦時相請屈與論經史辟祕書中散稍遷祕書令為李欣所排擯退為中書博士後出為統萬鎮司馬徵為散令撰并陳壽三國志名曰國統又作代都賦頗行於世清貧守素不交勢貴年八十七太和十二年卒子元吉有父風少子重歷碎職後為相州鎮北府參軍事平字繼叔燕國薊人祖視父儒並仕慕容為通宦耽勤讀誦研綜經籍鉤深致遠多所博聞自周以降暨於魏世帝王傳代之由貴臣升降之緒皆撰録品第商略是非號曰略注合百餘篇好事者覽之咸以為善焉安貧樂道不以屢空改操徵為中書博士久之出為幽州別駕廉貞寡欲不營資産衣食至常不足妻子不免飢寒後拜著作佐郎遷祕書丞時高允為監河間邢祐北平陽嘏河東裴定廣平程駿金城趙元順等為著作佐郎雖才學互有短長然俱為稱職並號長者允每稱博通經籍無過也即劉彧將軍王玄謨舅子三子並不率父業好酒自棄常忿其世衰植杖巡舍側岡而哭不為營事婚宦任意官娶故仕聘濁碎不得及其門流婦弟鄧宗慶及外生孫玄明等每以為言曰此輩會是衰頓何煩勞我乃別構精廬并置經籍於其中一奴自給妻子莫得而往酒食亦不與同時有珍美呼時老東安公刁雍等共飲噉之家人無得嘗焉太和十年以為祕書令而固請為郡未授而卒時年七十六贈平東將軍幽州刺史都昌侯諡曰康子壽昌太和初祕書令史稍遷荊州征虜府録事參軍陳奇字修奇河北人也自云晉涼州刺史驤之八世孫祖刃仕慕容垂奇少孤家貧而奉母至孝齠聰識有夙成之美性氣剛亮與俗不羣愛玩經典博通墳籍常非馬融鄭玄解經失旨志在著述五經始注孝經論語頗傳於世為搢紳所稱與河間邢祐同召赴京時祕書監游雅素聞其名始頗好之引入祕省欲授以史職後與奇論典誥及詩書雅贊扶馬鄭至於易訟卦天與水違行雅曰自葱嶺以西水皆西流推此而言易之所及自葱嶺以東耳奇曰易理綿廣包含宇宙若如公言自葱嶺以西豈東向望天哉奇執義非雅每如此類終不苟從雅性護短因以為嫌嘗衆辱奇或爾汝之或指為小人奇曰公身為君子奇身且小人耳雅曰君言身且小人君祖父是何人也奇曰祖燕東部侯釐雅質奇曰侯釐何官也奇曰三皇不傳禮官名豈同哉故昔有雲師火正鳥師之名以斯而言世革則官異時易則禮變公為皇魏東宮內侍長侍長竟何職也由是雅深憾之先是敕以奇付雅令銓補祕書雅既惡之遂不復用焉奇冗散數年高允與奇讎溫古籍嘉其遠致稱奇通識非凡學所窺允微勸雅曰君朝望具瞻何為與野儒辨簡牘章句雅謂允有私於奇曰君寧黨小人也乃取奇所注論語孝經焚於坑內奇曰公貴人不乏樵薪何乃燃奇論語雅愈怒因告京師後生不聽傳授而奇無降志亦評雅之失雅製昭皇太后碑文論后名字之美比諭前魏之甄后奇刺發其非遂聞於上詔下司徒檢對碑史事乃郭后雅有屈焉有人為謗書多怨時之言頗稱奇不得志雅乃諷在事云此書言奇不遂當是奇假人為之如依律文造謗書者皆及孥戮遂抵奇罪時司徒平原王陸麗知奇見枉惜其才學故得遷延經年冀有寬宥但執以獄成竟致大戮遂及其家奇於易尤長在獄嘗自筮卦未及成乃攬破而歎曰吾不度來年冬季及奇受害如其所占奇初被召夜夢星墜壓腳明而告人曰星則好風星則好雨夢星壓腳必無善徵但時命峻切不敢不赴耳奇妹適常氏有子曰矯之仕歷郡守神龜中上書陳時政所宜言頗忠至清河王懌稱美之奇所注論語矯之傳掌未能行於世其義多異鄭玄往往與司徒崔浩同常爽字仕明河內溫人魏太常卿林六世孫也祖珍苻堅南安太守因世亂遂居涼州父坦乞伏世鎮遠將軍大夏鎮將顯美侯爽少而聰敏嚴正有志概雖家人僮隸未嘗見其寬誕之容篤志好學博聞強識明習緯候五經百家多所研綜州郡禮命皆不就世祖西征涼土爽與兄仕國歸款軍門世祖嘉之賜仕國爵五品顯美男爽為六品拜宣威將軍是時戎車屢駕征伐為事貴遊子弟未遑學術爽置館溫水之右教授門徒七百餘人京師學業翕然復興爽立訓甚有勸罰之科弟子事之若嚴君焉尚書左僕射元贊平原太守司馬真安著作郎程靈虬皆是爽教所就崔浩高允並稱爽之嚴教奬厲有方允曰文翁柔勝先生剛克立教雖殊成人一也其為通識歎服如此因教授之暇述六經略注以廣制作甚有條貫其序曰傳稱立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義然則仁義者人之性也經典者身之文也皆以陶鑄神情啓悟耳目未有不由學而能成其器不由習而能利其業是故季路勇士也服道以成忠烈之概寧越庸夫也講藝以全高尚之節蓋所由者習也所因者本也本立而道生身文而德備焉昔者先王之訓天下也莫不導以詩書教以禮樂移其風俗和其人民故恭儉莊敬而不煩者教深於禮也廣博易良而不奢者教深於樂也溫柔敦厚而不愚者教深於詩也疏通知遠而不誣者教深於書也潔靜精微而不賊者教深於易也屬辭比事而不亂者教深於春秋也夫樂以和神詩以正言禮以明體書以廣聽春秋以斷事五者蓋五常之道相須而備而易為之源故曰易不可見則乾坤其幾乎息矣由是言之六經者先王之遺烈聖人之盛事也安可不遊心寓目習性文身哉頃因暇日屬意藝林略撰所聞討論其本名曰六經略注以訓門徒焉其略注行於世爽不事王侯獨守間靜講肄經典二十餘年時人號為儒林先生年六十三卒於家子文通歷官至鎮西司馬南天水太守西翼校尉文通子景別有傳劉獻之博陵饒陽人也少而孤貧雅好詩傳曾受業於勃海程玄後遂博觀衆籍見名法之言掩卷而笑曰若使楊墨之流不為此書千載誰知其小也曾謂其所親曰觀屈原離騷之作自是狂人死其宜矣何足惜也吾常謂濯纓洗耳有異人之迹哺糟啜醨有同物之志而孔子曰我則異於是無可無不可誠哉斯言實獲我心時人有從獻之學者獻之輒謂之曰人之立身雖百行殊途準之四科要以德行為首君若能入孝出悌忠信仁讓不待出戶天下自知儻不能然雖復下帷針股躡屩從師正可博聞多識不過為土龍乞雨眩惑將來其於立身之道有何益乎孔門之徒初亦未悟見臯魚之歎方歸而養親嗟乎先達何自覺之晚也束修不易受之亦難敢布心腹子其圖之由是四方學者莫不高其行義而希造其門獻之善春秋毛詩每講左氏盡隱公八年便止云義例已了不復須解由是弟子不能究竟其說後本郡舉孝廉非其好也逼遣之乃應命至京稱疾而還高祖幸中山詔徵典內校書獻之喟然歎曰吾不如莊周散木遠矣一之謂甚其可再乎固以疾辭時中山張吾貴與獻之齊名海內皆曰儒宗吾貴每一講唱門徒千數其行業可稱者寡獻之著録數百而已皆經通之士於是有識者辨其優劣魏承喪亂之後五經大義雖有師說而海內諸生多有疑滯咸決於獻之六藝之文雖不悉注然所標宗旨頗異舊義撰三禮大義四卷三傳略例三卷注毛詩序義一卷今行於世并章句疏三卷注涅槃經未就而卒有四子放古爰古參古修古放古幼有人才為州從事早亡爰古參古並傳父詩而不能精通也張吾貴字吳子中山人少聰惠口辨身長八尺容貌奇偉年十八本郡舉為太學博士吾貴先未多學乃從酈詮受禮牛天祐受易詮祐粗為開發而吾貴覽讀一遍便即別構戶牖世人競歸之曾在夏學聚徒千數而不講傳生徒竊云張生之於左氏似不能說吾貴聞之謂其徒曰我今夏講暫罷後當說傳君等來日皆當持本生徒怪之而已吾貴謂劉蘭云君曾讀左氏為我一說蘭遂為講三旬之中吾貴兼讀杜服隱括兩家異同悉舉諸生後集便為講之義例無窮皆多新異蘭乃伏聽學者以此益奇之而以辨能飾非好為詭說由是業不久傳而氣陵牧守不屈王侯竟不仕而終劉蘭武邑人年三十餘始入小學書急就篇家人覺其聰敏遂令從師受春秋詩禮於中山王保安家貧無以自資且耕且學三年之後便白其兄蘭欲講書其兄笑而聽之為立黌舍聚徒二百蘭讀左氏五日一遍兼通五經先是張吾貴以聰辨過人其所解說不本先儒之旨唯蘭推經傳之由本注者之意參以緯候及先儒舊事甚為精悉自後經義審博皆由於蘭蘭又明陰陽博物多識為儒者所宗瀛州刺史裴植徵蘭講書於州城南館植為學主故生徒甚盛海內稱焉又特為中山王英所重英引在館令授其子熙誘略等蘭學徒前後數千成業者衆而排毀公羊又非董仲舒由是見譏於世永平中為國子助教延昌中靜坐讀書有人叩門門人通焉蘭命引入其人葛巾單衣入與蘭坐謂蘭曰君自是學士何為每見毀辱理義長短竟知在誰而過無禮見陵也今欲相召當與君正之言終而出出後蘭告家人少時而患卒孫惠蔚字叔炳武邑武遂人也小字陀羅自言六世祖道恭為晉長秋卿自道恭至惠蔚世以儒學相傳惠蔚年十三粗通詩書及孝經論語十八師董道季講易十九師程玄讀禮經及春秋三傳周流儒肆有名於冀方太和初郡舉孝廉對策於中書省時中書監高閭宿聞惠蔚稱其英辨因相談薦為中書博士轉皇宗博士閭被敕理定雅樂惠蔚參其事及樂成閭上疏請集朝貴於太樂共研是非祕書令李彪自以才辨立難於其間閭命惠蔚與彪抗論彪不能屈黃門侍郎張彝常與遊處每表疏論事多參訪焉十七年高祖南征上議告類之禮及太師馮熙薨惠蔚監其喪禮上書令熙未冠之子皆服成人之服惠蔚與李彪以儒學相知及彪位至尚書惠蔚仍太廟令高祖曾從容言曰道固既登龍門而孫蔚猶沉涓澮朕常以為負矣雖久滯小官深體通塞無孜孜之望儒者以是尚焉二十二年侍讀東宮先是七廟以平文為太祖高祖議定祖宗以道武為太祖祖宗雖定然昭穆未改及高祖崩祔神主於廟時侍中崔光兼太常卿以太祖既改昭穆以次而易兼御史中尉黃門侍郎邢巒以為太祖雖改昭穆仍不應易乃立彈草欲按奏光光謂惠蔚曰此乃禮也而執法欲見彈劾思獲助於碩學惠蔚曰此深得禮變尋為書以與光讚明其事光以惠蔚書呈宰輔乃召惠蔚與巒庭議得失尚書令王肅又助巒而巒理終屈彈事遂寢世宗即位之後仍在左右敷訓經典自冗從僕射遷祕書丞武邑郡中正惠蔚既入東觀見典籍未周乃上疏曰臣聞聖皇之御世也必幽贊人經參天二地憲章典故述遵鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圖書祕籍乃承天之正術治人之貞範是以溫柔疏遠詩書之教恭儉易良禮樂之道爻彖以精微為神春秋以屬辭為化故大訓炳於東序藝文光於麟閣斯實太平之樞宗勝殘之要道有國之靈基帝王之盛業安上靖民敦風美俗其在茲乎及秦棄學術禮經泯絶漢興求訪典文載舉先王遺訓燦然復存暨光武撥亂日不暇給而入洛之書二千餘兩魏晉之世尤重典墳收亡集逸九流咸備觀其鳩閲史篇訪購經論紙竹所載略盡無遺臣學闕通儒思不及遠徒循章句片義無立而慈造曲覃厠班祕省忝官承乏唯書是司而觀閣舊典先無定目新故雜糅首尾不全有者纍帙數十無者曠年不寫或篇第褫落始末淪殘或文壞字誤謬爛相屬篇目雖多全定者少臣今依前丞臣盧昶所撰甲乙新録欲裨殘補闕損併有無校練句讀以為定本次第均寫永為常式其省先無本者廣加推尋搜求令足然經記浩博諸子紛綸部帙既多章篇紕繆當非一二校書歲月可了今求令四門博士及在京儒生四十人在祕書省專精校考參定字義如蒙聽許則典文允正羣書大集詔許之又兼黃門侍郎遷中散大夫仍兼黃門久之正黃門侍郎代崔光為著作郎才非文史無所撰著唯自披其傳注數行而已遷國子祭酒祕書監仍知史事延昌二年追賞侍講之勞封棗強縣開國男食邑二百戶肅宗初出為平東將軍濟州刺史還京除光祿大夫魏初已來儒生寒宦惠蔚最為顯達先單名蔚正始中侍講禁內夜論佛經有愜帝旨詔使加惠號惠蔚法師焉神龜元年卒于官時年六十七賜帛五百匹贈大將軍瀛州刺史諡曰戴子伯禮襲封伯禮善隸書拜奉朝請員外散騎侍郎寧朔將軍步兵校尉國子博士卒贈輔國將軍巴州刺史子産同襲少有才學早亡時人惜之徐遵明字子判華陰人也身長八尺幼孤好學年十七隨鄉人毛靈和等詣山東求學至上黨乃師屯留王聰受毛詩尚書禮記一年便辭聰詣燕趙師事張吾貴吾貴門徒甚盛遵明伏膺數月乃私謂其友人曰張生名高而義無檢格凡所講說不愜吾心請更從師遂與平原田猛略就范陽孫買德受業一年復欲去之猛略謂遵明曰君年少從師每不終業千里負帙何去就之甚如此用意終恐無成遵明曰吾今始知真師所在猛略曰何在遵明乃指心曰正在於此乃詣平原唐遷納之居於蠶舍讀孝經論語毛詩尚書三禮不出門院凡經六年時彈箏吹笛以自娛慰又知陽平館陶趙世業家有服氏春秋是晉世永嘉舊本遵明乃往讀之復經數載因手撰春秋義章為三十卷是後教授門徒蓋寡久之乃盛遵明每臨講坐必持經執疏然後敷陳其學徒至今浸以成俗遵明講學於外二十餘年海內莫不宗仰頗好聚斂有損儒者之風後廣平王懷聞而徵焉至而尋退不好京輦孝昌末南渡河客於任城以兗州有舊因徙居焉永安初東道大使元羅表薦之竟無禮辟二年元皓入洛任城太守李湛將舉義兵遵明同其事夜至民間為亂兵所害時年五十五永熙二年遵明弟子通直散騎常侍李業興表曰臣聞行道樹德非求利於當年服義履仁豈邀恩於沒世但天爵所存果致式閭之禮民望攸屬終有祠墓之榮伏見故處士兗州徐遵明生在衡泌弗因世族之基長於原野匪乘雕鏤之地而託心淵曠置情恬雅處靜無悶居約不憂故能垂簾自精下帷獨得鑽經緯之微言研聖賢之妙旨莫不入其門戶踐其堂奧信以稱大儒於海內擅明師於日下矣是故眇眇四方知音之類延首慕德跂踵依風每精廬暫闢杖策不遠千里束修受業編録將踰萬人固已企盛烈於西河擬高蹤於北海若慕奇好士愛客尊賢罷吏遊梁紛而成列遵明以碩德重名首蒙禮命曳裾雅步眷同置醴黃門李郁具所知明方申薦奏之恩處心守壑之志潛居樂道遂往不歸故北海王入洛之初率土風靡遵明確然守志忠潔不渝遂與太守李湛將誅叛逆時有邂逅受斃凶險至誠高節堙沒無聞朝野人士相與嗟悼伏惟陛下遠應龍序俯執天衷每端聽而忘昃常坐思而候曉雖微功小善片言一行莫不衣裳加室玉帛在門況遵明冠蓋一時師表當世溘焉冥沒旌紀寂寥逝者長辭無論榮價文明物敦厲斯在臣託跡諸生親承顧眄惟伏膺之義感在三之重是以越分陳愚上喧幄座特乞加以顯諡追以好爵仰申朝廷尚德之風下示學徒稽古之利若宸鑒昭回曲垂矜採則荒墳千載式貴生平卒無贈諡董徵字文發頓丘衛國人也祖英高平太守父虬郡功曹徵身長七尺二寸好古學尚雅素年十七師清河監伯陽受論語毛詩春秋周易就河內高望崇受周官後於博陵劉獻之遍受諸經數年之中大義精練講授生徒太和末為四門小學博士後世宗詔徵入琁華宮令孫惠蔚問以六經仍詔徵教授京兆清河廣平汝南四王後特除員外散騎侍郎清河王懌之為司空司徒引徵為長流參軍懌遷太尉徵為倉曹參軍出為沛郡太守加揚烈將軍入為太尉司馬俄加輔國將軍未幾以本將軍除安州刺史徵因述職路次過家置酒高會大享邑老乃言曰腰龜返國昔人稱榮仗節還家云胡不樂因誡二三子弟曰此之富貴匪自天降乃勤學所致耳時人榮之入為司農少卿光祿大夫徵出州入卿匪唯學業所致亦由汝南王悅以其師資之義為之啓請焉永安初加平東將軍尋以老解職永熙二年卒出帝以徵昔授父業故優贈散騎常侍都督相殷滄三州諸軍事車騎大將軍儀同三司尚書左僕射相州刺史諡曰文烈子仲曜武定末儀同開府屬刁沖字文朗勃海饒安人也鎮東將軍雍之曾孫十三而孤孝慕過人其祖母司空高允女聰明婦人也哀其早孤撫養尤篤沖免喪後便志學他方高氏泣涕留之沖終不止雖家世貴達乃從師於外自同諸生於時學制諸生悉日直監沖雖有僕隸不令代己身自炊爨每師受之際發情精專不捨晝夜殆忘寒暑學通諸經偏修鄭說陰陽圖緯算數天文風氣之書莫不關綜當世服其精博刺史郭祚聞其盛名訪以疑義沖應機解辨無不祛其久惑後太守范陽盧尚之刺史河東裴植並徵沖為功曹主簿非所好也受署而已不關事務惟以講學為心四方學徒就其受業者歲有數百沖雖儒生而執心壯烈不畏強禦延昌中世宗舅司徒高肇擅恣威權沖乃抗表極言其事辭旨懇直文義忠憤太傅清河王懌覽而歎息先是沖曾祖雍作行孝論以誡子孫稱古之葬者衣之以薪不封不樹後世聖人易之棺椁其有生則不能致養死則厚葬過度及於末世至蘧蒢裹尸倮而葬者確而為論並非折衷既知二者之失豈宜同之當令所存者棺厚不過三寸高不過三尺弗用繒綵斂以時服車止用白布為幔不加畫飾名為清素車又去挽歌方相并盟器雜物及沖祖遵將卒敕其子孫令奉雍遺旨河南尹丞張普惠謂為太儉貽書於沖叔整議其進退整令與通學議之沖乃致書國學諸儒以論其事學官竟不能答沖以嫡傳祖爵東安侯京兆王繼為司空也並以高選頻辟記室參軍肅宗將親釋奠於是國子助教韓神固與諸儒詣國子祭酒崔光吏部尚書甄琛舉其才學奏而徵焉及卒國子博士高涼及范陽盧道侃盧景裕等復上狀陳沖業行議奏諡曰安憲先生祭以太牢子欽字志儒早亡盧景裕字仲儒小字白頭范陽涿人也章武伯同之兄子少聰敏專經為學居拒馬河將一老婢作食妻子不自隨從又避地大寧山不營世事居無所業惟在注解其叔父同職居顯要而景裕止於園舍情均郊野謙恭守道貞素自得由是世號居士前廢帝初除國子博士參議正聲甚見親遇待以不臣之禮永熙初以例解天平中還鄉里與邢子才魏季景魏收邢昕等同徵赴鄴景裕寓託僧寺講聽不已未幾歸本郡河間邢摩納與景裕從兄仲禮據鄉作逆逼其同反以應元寶炬齊獻武王命都督賀拔仁討平之聞景裕經明行著驛馬特徵既而舍之使教諸子在館十日一歸家隨以鼎食景裕風儀言行雅見嗟賞先是景裕注周易尚書孝經論語禮記老子其毛詩春秋左氏未訖齊文襄王入相於第開講招延時俊令景裕解所注易景裕理義精微吐發間雅時有問難或相詆訶大聲厲色言至不遜而景裕神彩儼然風調如一從容往復無際可尋由是士君子嗟美之初元皓入洛以為中書郎普泰初復除國子博士進退其間未曾有得失之色性清靜淡於榮利弊衣粗食恬然自安終日端嚴如對賓客興和中補齊王開府屬卒於晉陽齊獻武王悼惜之景裕雖不聚徒教授所注易大行於世又好釋氏通其大義天竺胡沙門道悕每論諸經論輒託景裕為之序景裕之敗也繫晉陽獄至心誦經枷鎖自脫是時又有人負罪當死夢沙門教講經覺時如所夢默誦千遍臨刑刀折主者以聞赦之此經遂行於世號曰高王觀世音李同軌趙郡高邑人陽夏太守義深之弟體貌魁岸腰帶十圍學綜諸經多所治誦兼讀釋氏又好醫術年二十二舉秀才射策除奉朝請領國子助教轉著作郎典儀注修國史遷國子博士加征虜將軍永熙二年出帝幸平等寺僧徒講法敕同軌論難音韻間朗往復可觀出帝善之三年春釋菜詔延公卿學官於顯陽殿敕祭酒劉廞講孝經黃門李郁講禮記中書舍人盧景宣解大戴禮夏小正篇時廣招儒學引令預聽同軌經義素優辨析兼美而不得執經深為慨恨天平中轉中書侍郎興和中兼通直散騎常侍使蕭衍衍深耽釋學遂集名僧於其愛敬同泰二寺講盤大品經引同軌預席衍兼遣其朝臣並共觀聽同軌論難久之道俗咸以為善盧景裕卒齊獻武王引同軌在館教諸公子甚加禮之每旦入授日暮始歸緇素請業者同軌夜為說解四時爾不以為倦武定四年夏卒年四十七時人傷惜之齊獻武王亦殊嗟悼贈襚甚厚贈驃騎大將軍瀛州刺史諡曰康李業興上黨長子人也祖虬父玄紀並以儒學舉孝廉玄紀卒於金鄉令業興少耿介志學精力負帙從師不憚勤苦耽思章句好覽異說晚乃師事徐遵明於趙魏之間時有漁陽鮮于靈馥亦聚徒教授而遵明聲譽未高著録尚寡業興乃詣靈馥黌舍類受業者靈馥乃謂曰李生久逐羌博士何所得也業興默爾不言及靈馥說左傳業興問其大義數條靈馥不能對於是振衣而起曰羌弟子正如此耳遂便徑還自此靈馥生徒傾學而就遵明遵明學徒大盛業興之為也後乃博涉百家圖緯風角天文占候無不詳練尤長算歷雖在貧賤常自矜負若禮待不足縱於權貴不為之屈後為王遵業門客舉孝廉為校書郎以世行趙畗曆節氣後辰下算延昌中業興乃為戊子元曆上之於時屯騎校尉張洪蕩寇將軍張龍祥等九家各獻新曆世宗詔令共為一曆洪等後遂共推業興為主成戊子曆正光三年奏行之事在律曆志纍遷奉朝請臨淮王彧征蠻引為騎兵參軍後廣陵王淵北征復為外兵參軍業興以殷曆甲寅黃帝辛卯徒有積元術數亡缺業興又修之各為一卷傳於世建義初敕典儀注未幾除著作佐郎永安二年以前造曆之勳賜爵長子伯遭憂解任尋起復本官元曄之竊號也除通直散騎侍郎普泰元年沙汰侍官業興仍在通直加寧朔將軍又除征虜將軍中散大夫仍在通直太昌初轉散騎侍郎仍以典儀之勤特賞一階除平東將軍光祿大夫尋加安西將軍後以出帝登極之初預行禮事封屯留縣開國子食邑五百戶轉中軍將軍通直散騎常侍永熙三年二月出帝釋奠業興與魏季景溫子升竇瑗為摘句後入為侍讀遷鄴之始起部郎中辛術奏曰今皇居徙御百度創始營構一興必宜中制上則憲章前代下則模寫洛京今鄴都雖舊基址毀滅又圖記參差事宜審定臣雖曰職司學不稽古國家大事非敢專之通直散騎常侍李業興碩學通儒博聞多識萬門千戶所宜訪詢今求就之披圖案記考定是非參古雜今折中為制召畫工并所須調度具造新圖申奏取定庶經始之日執事無疑詔從之天平二年除鎮南將軍尋為侍讀於時尚書右僕射營構大將高隆之被詔繕治三署樂器衣服及百戲之屬乃奏請業興共參其事四年與兼散騎常侍李諧兼吏部郎盧元明使蕭衍衍散騎常侍朱䌇問業興曰魏洛中委粟山是南郊邪業興曰委粟是圓丘非南郊䌇曰北間郊丘異所是用鄭義我此中用王義業興曰然洛京郊丘之處專用鄭解䌇曰若然女子逆降傍親亦從鄭以不業興曰此之一事亦不專從若卿此間用王義除禫應用二十五月何以王儉喪禮禫用二十七月也䌇遂不答業興曰我昨見明堂四柱方屋都無五九之室當是裴頠所制明堂上圓下方裴唯除室耳今此上不圓何也䌇曰圓方之說經典無文何怪於方業興曰圓方之言出處甚明卿自不見見卿録梁主孝經義亦云上圓下方卿言豈非自相矛盾䌇曰若然圓方竟出何經業興曰出孝經援神契䌇曰緯候之書何用信也業興曰卿若不信靈威仰叶光紀之類經典亦無出者卿復信不䌇不答蕭衍親問業興曰聞卿善於經義儒玄之中何所通達業興曰少為書生止讀五典至於深義不辨通釋衍問詩周南王者之風繫之周公邵南仁賢之風繫之邵公何名為繫業興對曰鄭注儀禮云昔大王王季居于岐陽躬行邵南之教以興王業及文王行今周南之教以受命作邑於酆分其故地屬之二公名為繫衍又問若是故地應自統攝何由分封二公業興曰文王為諸侯之時所化之本國今既登九五之尊不可復守諸侯之地故分封二公衍又問乾卦初稱潛龍二稱見龍至五飛龍初可名為虎問意小乖業興對學識膚淺不足仰酬衍又問尚書正月上日受終文祖此是何正業興對此是夏正月衍言何以得知業興曰案尚書中候運行篇云日月營始故知夏正衍又問堯時以何月為正業興對自堯以上書典不載實所不知衍又云寅賓出日即是正月日中星鳥以殷仲春即是二月此出堯典何得云堯時不知用何正也業興對雖三正不同言時節者皆據夏時正月周禮仲春二月會男女之無夫家者雖自周書月亦夏時堯之日月亦當如此但所見不深無以辨析明問衍又曰禮原壤之母死孔子助其沐椁原壤叩木而歌曰久矣夫豫之不託於音也狸首之班然執女手之卷然孔子聖人而與原壤為友業興對孔子即自解言親者不失其為親故者不失其為故又問原壤何處人業興對曰鄭注云原壤孔子幼少之舊故是魯人衍又問孔子聖人所存必可法原壤不孝有逆人倫何以存故舊之小節廢不孝之大罪業興對曰原壤所行事自彰著幼少之交非是今始既無大故何容棄之孔子深敦故舊之義於理無失衍又問孔子聖人何以書原壤之事垂法萬代業興對曰此是後人所録非孔子自制猶合葬於防如此之類禮記之中動有百數衍又問易曰太極是有無業興對所傳太極是有素不玄學何敢輒酬還兼散騎常侍加中軍大將軍後罷議事省詔右僕射高隆之及諸朝士與業興等在尚書省議定五禮興和初又為甲子元曆時見施用復預議麟趾新制武定元年除國子祭酒仍侍讀三年出除太原太守齊獻武王每出征討時有顧訪五年齊文襄王引為中外府咨議參軍後坐事禁止業興乃造九宮行曆以五百為章四千四十為部九百八十七為斗分還以己未為元始終相維不復移轉與今曆法術不同至於氣序交分景度盈縮不異也七年死於禁所年六十六業興愛好墳籍鳩集不已手自補治躬加題帖其家所有垂將萬卷覽讀不息多有異聞諸儒服其淵博性豪俠重意氣人有急難委之歸命便能容匿與其好合傾身無吝若有相乖忤便即疵毀乃至聲色加以謗罵性又躁隘至於論難之際高聲攘振無儒者之風每語人云但道我好雖知妄言故勝道惡務進忌前不顧後患時人以此惡之至於學術精微當時莫及子崇祖武定中太尉外兵參軍崇祖弟遵祖太昌中業興傳其長子伯以授之齊受禪例降史臣曰古語云容體不足觀勇力不足恃族姓不足道先祖不足稱然而顯聞四方流聲後裔者其惟學乎信哉斯言也梁越之徒篤志不倦自求諸己遂能聞道下風稱珍席上或聚徒千百或服冕乘軒咸稽古之力也
