body:
  text: 魏書卷七十列傳第五十八劉藻傅永傅豎眼李神劉藻字彥先廣平易陽人也六世祖遐從司馬睿南渡父宗之劉裕廬江太守藻涉獵羣籍美談笑善與人交飲酒至一石不亂永安中與姊夫李嶷俱來歸國賜爵易陽子擢拜南部主書號為稱職時北地諸羌數萬家恃險作亂前後牧守不能制姦暴之徒並無名實朝廷患之以藻為北地太守藻推誠布信諸羌咸來歸附藻書其名籍收其賦稅朝廷嘉之遷龍驤將軍雍城鎮將先是氐豪徐成楊黑等驅逐鎮將故以藻代之至鎮擒獲成黑等斬之以徇羣氐震懾雍州人王叔保等三百人表乞藻為騃奴戍主詔曰選曹已用人藻有惠政自宜他在任八年遷離城鎮將太和中改鎮為岐州以藻為岐州刺史轉秦州刺史秦人恃嶮率多粗暴或拒課輸或害長吏自前守宰率皆依州遙領不入郡縣藻開示恩信誅戮豪橫羌氐憚之守宰於是始得居其舊所遇車駕南伐以藻為東道都督秦人紛擾詔藻還州人情乃定仍與安南將軍元英征漢中頻破賊軍長驅至南鄭垂平梁州奉詔還軍乃不果克後車駕南伐以藻為征虜將軍督統軍高聰等四軍為東道別將辭於洛水之南高祖曰與卿石頭相見藻對曰臣雖才非古人庶亦不留賊虜而遺陛下輒當釃曲阿之酒以待百官高祖大笑曰今未至曲阿且以河東數石賜卿後與高聰等戰敗俱徙平州景明初世宗追録舊功以藻為太尉司馬是年六月卒年六十七贈錢六萬子紹珍無他才用善附會好飲酒結託劉騰騰啓為其國郎中令襲子爵稍遷本州別駕司空屬以事免官建義初詔復尋除太中大夫永安二年除安西將軍河北太守還朝久之拜車騎將軍左光祿大夫出為黎陽太守所在無政績天平中坐子尚書郎洪業入於關中率衆侵擾伏法傅永字修期清河人也幼隨叔父洪仲與張幸自青州入國尋復南奔有氣幹拳勇過人能手執鞍橋倒立馳騁年二十餘有友人與之書而不能答請於洪仲洪仲深讓之而不為報永乃發憤讀書涉獵經史兼有才筆自東陽禁防為崔道固城局參軍與道固俱降入為平齊民父母並老飢寒十數年賴其強於人事勠力傭丐得以存立晚乃被召兼治禮郎詣長安拜文明太后父燕宣王廟賜爵貝丘男加伏波將軍未幾除中書博士又改為議郎轉尚書考功郎中為大司馬從事中郎尋轉都督任城王澄長史兼尚書左丞王肅之為豫州以永為建武將軍平南長史咸陽王禧慮肅難信言於高祖高祖曰已選傅修期為其長史雖威儀不足而文武有餘矣肅以永宿士禮之甚厚永亦以肅為高祖眷遇盡心事之情義至穆蕭鸞遣將魯康祚趙公政衆號一萬侵豫州之太倉口肅令永勒甲士三千擊之時康祚等軍於淮南永舍淮北十有餘里永量吳楚之兵好以斫營為事即夜分兵二部出於營外又以賊若夜來必應於渡淮之所以火記其淺處永既設伏乃密令人以瓠盛火渡淮南岸當深處置之教之云若有火起即亦然之其夜康祚公政等果親率領來斫永營東西二伏夾擊之康祚等奔趨淮水火既競起不能記其本濟遂望永所置之火而爭渡焉水深溺死斬首者數千級生擒公政康祚人馬墜淮曉而獲其尸斬首并公政送京師公政岐州刺史超宗之從兄也時裴叔業率王茂先李定等來侵楚王戍永適還州肅復令永討之永將心腹一人馳詣楚王戍至即令填塞外塹夜伏戰士一千人於城外曉而叔業等至頓於城東列陳將置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陳自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虛實足喪其膽俘此足矣何假逐之獲叔業傘扇鼓幕甲仗萬餘兩月之中遂獻再捷高祖嘉之遣謁者就豫州策拜永安遠將軍鎮南府長史汝南太守貝丘縣開國男食邑二百戶高祖每歎曰上馬能擊賊下馬作露布唯傅修期耳裴叔業又圍渦陽時高祖在豫州遣永為統軍與高聰劉藻成道益任莫問等往救之軍將逼賊永曰先深溝固壘然後圖之聰等不從裁營輜重便擊之一戰而敗聰等棄甲徑奔懸瓠永獨收散卒徐還賊追至又設伏擊之挫其鋒鋭四軍之兵多賴之以免永至懸瓠高祖俱鎖之聰藻徙為邊民永免官爵而已不經旬日詔曰修期在後少有擒殺可揚武將軍汝陰鎮將帶汝陰太守景明初裴叔業將以壽春歸國密通於永永具表聞及將迎納詔永為統軍與楊大眼奚康生等諸軍俱入壽春同日而永在後故康生大眼二人並賞列土永唯清河男蕭寶卷將陳伯之侵逼壽春沿淮為寇時司徒彭城王協廣陵侯元衍同鎮壽春以九江初附人情未洽兼臺援不至深以為憂詔遣永為統軍領汝陰之兵三千人先援之永總勒士卒水陸俱下而淮水口伯之防之甚固永去二十餘里牽船上汝南岸以水牛挽之直南趨淮下船便渡適上南岸賊軍亦及會時已夜永乃潛進曉達壽春城下協衍聞外有軍共上門樓觀望然不意永至永免胄乃信之遂引永上協謂永曰北望以久恐洛陽難復可見不意卿能至也協令永引軍入城永曰執兵被甲固敵是求若如教旨便共殿下同被圍守豈是救援之意遂孤軍城外與協并勢以擊伯之頻有克捷中山王英之征義陽永為寧朔將軍統軍當長圍遏其南門蕭衍將馬仙琕連營稍進規解城圍永謂英曰凶豎豕突意在決戰雅山形要宜早據之英沉吟未決永曰機者如神難遇易失今日不往明朝必為賊有雖悔無及英乃分兵通夜築城於山上遣統軍張懷等列陳於山下以防之至曉仙琕果至懷等戰敗築城者悉皆奔退仙琕乘勝直趨長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將馬步千人南逆仙琕擐甲揮戈單騎先入唯有軍主蔡三虎副之餘人無有及者突陳橫過賊射永洞其左股永拔箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陳謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而返時年七十餘矣三軍莫不壯之義陽既平英使司馬陸希道為露板意謂不可令永改之永亦不增文彩直與之改陳列軍儀處置形要而已而英深賞之歎曰觀此經算雖有金城湯池亦不能守矣還京復封永先有男爵至是以品不纍加賜帛二千匹除太中大夫行秦梁二州事代邢巒鎮漢中後還京師於路除農太守非心所樂時英東征鍾離連表請永求以為將朝廷不聽永每言曰文淵充國竟何人哉吾獨白首見拘此郡深用扼腕然於治民非其所長故在任無多聲稱未幾解郡還為太中大夫行南青州事遷左將軍南兗州刺史猶能馳射盤馬奮矟時年踰八十常諱言老每自稱六十九還京拜平東將軍光祿大夫熙平元年卒年八十三贈安東將軍齊州刺史永嘗登北邙於平坦處奮矟躍馬盤旋瞻望有終焉之志遠慕杜預近好李沖王肅欲葬附其墓遂買左右地數頃遺敕子叔偉曰此吾之永宅也永妻賈氏留於本鄉永至代都娶妾馮氏生叔偉及數女賈後歸平城無男唯一女馮恃子事賈無禮叔偉亦奉賈不順賈常忿之馮先永亡及永之卒叔偉稱父命欲葬北邙賈疑叔偉將以馮合葬賈遂求歸葬永於所封貝丘縣事經司徒司徒胡國珍本與永同經征役感其所慕許叔偉葬焉賈乃邀訴靈太后靈太后遂從賈意事經朝堂國珍理不能得乃葬於東清河又永昔營宅兆葬父母於舊鄉賈於此強徙之與永同處永宗親不能抑葬已數十年矣棺為桑棗根所繞束去地尺餘甚為周固以斧斬斫出之於坎時人咸怪未三年而叔偉亡叔偉九歲為州主簿及長膂力過人彎弓三百斤左右馳射又能立馬上與人角騁見者以為得永之武而不得永文也正光中叔偉子豐生襲封傅豎眼本清河人七世祖胄胄子遘石虎太常祖父融南徙渡河家于磐陽為鄉閭所重性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乘者人曰何由得人乘之有一人對曰唯有傅靈慶堪乘此馬又有弓一張亦無人堪引人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解人曰唯傅靈越可解此文融意謂其三子文武才幹堪以駕馭當世常密謂鄉人曰汝聞之不鬲蟲之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附劉駿將蕭斌王玄謨寇碻磝時融始死玄謨強引靈慶為軍主將攻城攻車為城內所燒靈慶懼軍法詐云傷重令左右輿之還營遂與壯士數十騎遁還斌玄謨命追之左右諫曰靈慶兄弟並有雄才兼其部曲多是壯勇如彭超戶生之徒皆一當數十人援不虛發不可逼也不如緩之玄謨乃止靈慶至家遂與二弟匿於山澤之間時靈慶從叔乾愛為斌法曹參軍斌遣乾愛誘呼之以腰刀為信密令壯健者隨之而乾愛不知斌之欲圖靈慶也既至靈慶間對坐未久斌所遣壯士執靈慶殺之靈慶將死與母崔訣言法曹殺人不可忘也靈根靈越奔河北靈越至京師高宗見而奇之靈越因説齊民慕化青州可平高宗大悅拜靈越鎮遠將軍青州刺史貝丘子鎮羊蘭城靈根為臨齊副將鎮明潛壘靈越北入之後母崔氏遇赦免劉駿恐靈越在邊擾動三齊乃以靈越叔父琰為冀州治中乾愛為樂陵太守樂陵與羊蘭隔河相對命琰遣其門生與靈越婢詐為夫婦投化以招之靈越與母分離思積遂與靈根相要南走靈越與羊蘭奮兵相擊乾愛遣船迎之得免靈根差期不得俱渡臨齊人覺知銼斬殺之乾愛出郡迎靈越問靈根愆期之狀而靈越殊不應答但言不知而已乾愛不以為惡敕左右出匣中烏皮袴褶令靈越代所常服靈越言不須乾愛云汝豈可著體上衣服見垣公也時垣護之為刺史靈越奮聲言垣公垣公著此當見南方國主豈垣公也竟不肯著及至丹陽劉駿見而禮之拜員外郎兗州司馬帶魯郡而乾愛亦遷青冀司馬帶魏郡後二人俱還建康靈越意欲為兄復讎而乾愛初不疑防知乾愛嗜雞肉葵菜食乃為作之下以毒藥乾愛飯還而卒後數年而靈越為太原太守戍升城後舉兵同劉駿子子勛子勛以靈越為前軍將軍子勛敗靈越軍衆散亡為劉彧將王廣之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺廣之生送詣彧輔國府司馬劉勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加以大恩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末備皆參預人生歸於一死實無面求活勔壯其意送詣建康劉彧欲加原宥靈越辭對如一終不回改乃殺之豎眼即靈越子也沉毅壯烈少有父風入國鎮南王肅見而異之且奇其父節傾心禮敬表為參軍從肅征伐纍有戰功稍遷給事中步兵校尉左中郎將常為統軍東西征伐世宗時為建武將軍討揚州賊破之仍鎮於合肥蕭衍民歸之者數千戶後武興氐楊集義反叛推其兄子紹先為主攻圍關城梁州刺史邢巒遣豎眼討之集義衆逆戰頻破走之乘勝追北仍克武興還洛詔假節行南兗州事豎眼善於綏撫南人多歸之轉昭武將軍益州刺史以州初置境逼巴獠給羽林虎賁三百人進號冠軍將軍及高肇伐蜀假豎眼征虜將軍持節領步兵三萬先討北巴蕭衍聞大軍西伐遣其寧州刺史任太洪從陰平偷路入益州北境欲擾動氐蜀以絶運路乘國諱班師遂扇誘土民奄破東洛除口二戍因此詐言南軍繼至氐蜀信之翕然從逆太洪率氐蜀數千圍逼關城豎眼遣寧朔將軍成興孫討之軍次白護太洪遣其輔國將軍任碩北等率衆一千邀險拒戰在虎徑南山連置三營興孫分遣諸統隨便掩擊皆破之太洪又遣軍主邊昭等率氐蜀三千攻逼興孫柵興孫力戰為流矢所中死豎眼又遣統軍薑喜季元度從東木岺潛入回出西岡邀賊之後表𩹉合擊大破之斬邊昭及太洪前部王隆護首於是太洪及關城五柵一時逃散豎眼性既清素不營産業衣食之外俸祿粟帛皆以饗賜夷首賑恤士卒撫蜀人以恩信為本保境安民不以小利侵竊有掠蜀民入境者皆移送還本土撿勒部下守宰肅然遠近雜夷相率款謁仰其德化思為魏民矣是以蜀民請軍者旬月相繼世宗甚嘉之肅宗初屢請解州乃以元法僧代之益州民追隨戀泣者數百里至洛拜征虜將軍太中大夫蕭衍遣將趙祖悅入屯硤石以逼壽春鎮南將軍崔亮討之以豎眼為持節鎮南軍司法僧既至大失民和蕭衍遣其信武將軍衡州刺史張齊因民心之怨入寇晉壽頻陷葭萌小劍諸戍進圍州城朝廷以西南為憂乃驛徵豎眼於淮南既至以為右將軍益州刺史尋加散騎常侍平西將軍假安西將軍西征都督率步騎三千以討張齊給銅印千餘須有假職者聽六品已下板之豎眼既出梁州衍冠軍將軍勾道侍梁州刺史王太洪等十餘將所在拒塞豎眼三日之中轉戰二百餘里甲不去身頻致九捷土民統軍席廣度等處處邀擊斬太洪及衍征虜將軍楊伏錫等首張齊引兵西退遂奔葭萌蜀民聞豎眼復為刺史人人喜悅迎於路者日有百數豎眼至州白水已東民皆寧業先是蕭衍信義將軍都統白水諸軍事楊興起征虜將軍李光宗襲據白水舊城豎眼遣虎威將軍強虬與陰平王楊太赤率衆千餘夜渡白水旦而交戰大敗賊軍斬興起首克復舊城又遣統軍傅曇表等大破衍寧朔將軍王光昭於陰平張齊仍阻白水屯寇葭萌豎眼分遣諸將水陸討之齊遣其寧朔將軍費欣督步騎二千逆來拒戰軍主陳洪起力戰破之乘勝追奔遂臨夾谷三柵統軍胡小虎四面攻之三柵俱潰張齊親率驍勇二萬餘人與諸軍交戰豎眼命諸統帥同時奮擊軍主許暢斬衍雄信將軍牟興祖軍主孔領周射齊中足於是大破賊軍斬獲甚衆齊乃柵於虎頭山下賊帥任令崇屯據西郡豎眼復遣討之令崇棄衆夜遁乃進討齊破其二柵斬首萬餘齊被重創奔竄而退小劍大劍賊亦捐城西走益州平靈太后璽書慰勞賜驊騮馬一匹寶劍一口豎眼表求解州不許復轉安西將軍岐州刺史常侍如故仍轉梁州刺史常侍將軍如故梁州之人既得豎眼為牧人咸自賀而豎眼至州遇患不堪綜理其子敬紹險暴不仁聚貨耽色甚為民害遠近怨望焉尋假鎮軍將軍都督梁西益巴三州諸軍事蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守薑平洛等十軍率衆三萬入寇直城豎眼遣敬紹總衆赴之倍道而進至直城而賊襲據直口敬紹以賊斷歸路督兼統軍高徹吳和等與賊決戰大破之擒斬三千餘人休儒等走還魏興敬紹頗覽書傳微有膽力而奢淫倜儻輕為殘害又見天下多事陰懷異圖欲杜絶四方擅據南鄭令其妾兄唐昆崙扇攪於外聚衆圍城敬紹謀為內應賊圍既合其事泄露在城兵武執敬紹白豎眼而殺之豎眼恚發疾遂卒永安中贈征東將軍吏部尚書齊州刺史出帝初重贈散騎常侍車騎將軍司空公相州刺史開國如故長子敬和敬和弟敬仲並好酒薄行傾側勢家敬和歷青州鎮遠府長史孝莊時復為益州刺史朝廷以其父有遺惠故也至州聚斂無已好酒嗜色遠近失望仍為蕭衍將樊文熾攻圍敬和以城降送於江南後衍以齊獻武王威德日廣令敬和還國以申和通之意久之除北徐州刺史復以耽酒為土賊掩襲棄城走徵詣廷尉遇恩免遂廢棄卒於家乾愛子三寶與房法壽等同效盤陽賜爵貝丘子三寶弟法獻高祖初南叛為蕭鸞右中郎將直閣將軍從崔慧景至鄧城為官軍所殺琰曾孫文驥勇果有將領之才隨豎眼征伐纍有軍功自強弩將軍出為琅邪戍主朐山內附徐州刺史盧昶遣文驥守朐山樵米既竭而昶軍不進文驥遂棄母妻以城降蕭衍後大以南貨賂光州刺史羅衡衡為渡其母妻李神農人父洪之秦益二州刺史神少有膽略以氣尚為名早從征役其從兄崇深所知賞纍遷威遠將軍新蔡太守領建安戍主轉寧遠將軍陳留太守領狄丘戍主頻有軍功封長樂縣開國男食邑二百戶遷征虜將軍驍騎將軍直閣將軍蕭衍將趙祖悅率衆據硤石神為別將率揚州水軍受刺史李崇節度與都督崔亮行臺僕射李平等攻硤石克之進平北將軍太中大夫孝昌中行相州事尋正加撫軍將軍假鎮東將軍大都督建義初除衛將軍時葛榮充斥民多逃散先是州將元鑒反叛引賊後都督源子雍裴衍戰敗被害朝野憂惶人不自保而神志氣自若撫勞兵民小大用命既而葛榮盡鋭攻之久不能克會爾朱榮擒葛榮於鄴西事平除車騎將軍以功進爵為公增邑八百通前一千戶元皓入洛莊帝北巡以神為侍中又除殿中尚書仍行相州事車駕還宮改封安康郡開國公加封五百戶普泰元年進驃騎大將軍儀同三司相州大中正永熙中薨天平元年賜使持節侍中驃騎大將軍司徒公冀州刺史子士約襲齊受禪爵例降史臣曰劉藻傅永豎眼文武器幹知名於時豎眼加以撫邊導俗風化尤美方之二子固以優乎抑又魏世之良牧李神據危城當大難其氣概亦足稱焉
