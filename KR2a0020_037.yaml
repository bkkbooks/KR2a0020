body:
  text: 魏書卷三十二列傳第二十高湖崔逞封懿高湖字大淵勃海蓨人也漢太傅裒之後祖慶慕容垂司空父泰吏部尚書湖少機敏有器度與兄韜俱知名於時雅為鄉人崔逞所敬異少歷顯職為散騎常侍登國十年垂遣其太子寶來伐也湖言於垂曰魏燕之與國彼有內難此遣赴之此有所求彼無違者和好多年行人相繼往求馬不得遂留其弟曲在於此非彼之失政當敦修舊好乂寧國家而復令太子率衆遠伐且魏主雄略兵馬精強險阻艱難備嘗之矣太子富於春秋意果心鋭輕敵好勝難可獨行兵凶戰危願以深慮言頗切厲垂怒免湖官既而寶果敗於參合寶立乃起湖為征虜將軍燕郡太守寶走和龍兄弟交爭湖見其衰亂遂率戶三千歸國太祖賜爵東阿侯加右將軍總代東諸部世祖時除寧西將軍涼州鎮都大將鎮姑臧甚有惠政年七十卒贈鎮西將軍秦州刺史諡曰敬有四子第三子謐字安平有文武才度天安中以功臣子召入禁中除中散專典祕閣肅勤不倦高宗深重之拜祕書郎謐以墳典殘缺奏請廣訪羣書大加繕寫由是代京圖籍莫不審正顯祖之御寧光宮也謐侍講讀拜蘭臺御史尋轉治書掌攝內外彈糾非法當官而行無所畏避甚見稱賞延興二年九月卒時年四十五太昌初追贈使持節侍中都督青徐齊濟兗五州諸軍事驃騎大將軍太尉公青州刺史諡武貞公妻叔孫氏陳留郡君長子樹生性通達重節義交結英雄不事生産有識者並宗奇之蠕蠕侵掠高祖詔懷朔鎮將陽平王頤率衆討之頤假樹生鎮遠將軍都將先驅有功樹生尚氣俠意在浮沉自適不願職位辭不受賞論者高之居宅數有赤光紫氣之異鄰伍驚恐僉謂怪變宅不可居樹生曰何往非善安之自若雅好音律常以絲竹自娛孝昌初北州大亂詔發衆軍廣開募賞以樹生有威略授以大都督令率徑勇鎮捍舊蕃二年卒時年五十五太昌初追贈使持節都督冀相滄瀛殷定六州諸軍事大將軍太師録尚書事冀州刺史追封勃海王諡曰文穆妻韓氏為勃海王國太妃永熙中後贈假黃鉞侍中都督中外諸軍事加後部羽葆鼓吹餘如故長子即齊獻武王也王弟琛字永寶天平中驃騎大將軍開府儀同三司御史中尉南趙郡開國公子睿襲武定末太子庶子樹生弟翻字飛雀亦以器度知名卒於侍御中散元象中贈假黃鉞使持節侍中都督冀定洛瀛并肆燕雲朔十州諸軍事大將軍太傅太尉公録尚書事冀州刺史諡曰孝宣子嶽武定末侍中太傅公清河郡開國公謐長兄真有志行兄弟俱至孝父亡治喪墓次甘露白雉降集焉有司以聞詔標閭里自涇州別駕稍遷安定太守甚著聲績卒贈龍驤將軍涇州刺史闕帶金城太守神龜初卒太昌元年贈使持節侍中都督定相殷三州諸軍事驃騎大將軍儀同三司定州刺史諡曰武康子仁正光中卒於河州別駕太昌初贈使持節侍中都督青齊濟三州諸軍事儀同三司青州刺史諡曰明穆子貫字小胡永興末通直散騎常侍金紫光祿大夫尚食典御拔弟月者兒美容貌膂力過人尤善弓馬顯祖時羽林幢將皇興中主仗令高祖初給事中纍遷散騎常侍內侍長坐事死子昋字明珍有器尚初除侍御史拜奉朝請員外散騎侍郎與叔徽俱使西域還至河州遇賊攻圍城陷見害太昌初贈使持節都督冀滄二州諸軍事征東將軍冀州刺史永熙中重贈侍中都督青徐光三州諸軍事驃騎大將軍儀同三司青州刺史諡曰文景子永樂興和中驃騎大將軍儀同三司濟州刺史陽川縣開國公永樂弟弼武定中安西將軍營州刺史安陵縣開國男月者兒弟徽字榮顯小字苟兒聰敏有氣幹為任城王澄所知賞景明中起家奉朝請延昌中假員外散騎常侍使於肽噠西域諸國莫不敬憚之破洛侯烏孫並因之以獻名馬還拜冗從僕射神龜中遷射聲校尉左中郎將遊擊將軍又假平西將軍員外散騎常侍使肽噠還至枹罕屬莫折念生反於秦隴時河州刺史元祚為前刺史梁釗息景進等招引念生攻河州祚以憂死長史元永平治中孟賓臺使元湛共推徽行河州事綏接有方兵士用命別駕乞伏世則潛通景進徽殺之徵兵於吐谷渾吐谷渾率衆救之景進敗退走奔秦州景進尋率羌夷復來攻逼徽遣統軍六景相馳表請師詔徽仍行河州事久無援救力屈城陷為賊所害永熙中喪還洛陽贈使持節侍中都督冀定相瀛滄五州諸軍事司徒公冀州刺史諡曰文宣子歸義有志烈初除奉朝請加威烈將軍與父徽俱使西域還都稍遷龍驤將軍中散大夫西征都督每有戰功後沒於陳太昌初贈侍中驃騎大將軍儀同三司雍州刺史諡曰孝貞子普武定末安南將軍太子左衛率歸義弟歸彥武定末驃騎大將軍開府儀同三司徐州刺史安喜縣開國男真弟各拔廣昌鎮將卒贈燕州刺史子猛虎鄯善鎮録事及居喪以至性稱遂絶宦情子元國早卒次顯國武定末撫軍將軍汶陽男顯國弟達武定中驃騎將軍行滄州事達弟永國征虜將軍中散大夫永國弟子國武衛將軍各拔少子盛天平中侍中太尉公廣平郡開國公子子瑗武定末兼武衛將軍謐弟稚字幼寧薄骨律鎮將營州刺史子陀字難陀沃野鎮長卒贈琅邪太守子雍字景雲司徒從事後與少子思義俱奔蕭衍卒於江南元象初喪還特贈使持節散騎常侍都督冀定瀛滄幽五州諸軍事驃騎大將軍尚書令司徒公冀州刺史子思宗武定末中軍將軍儀同三司兗州刺史上洛郡開國男思義特贈使持節散騎常侍都督青兗齊三州諸軍事車騎大將軍尚書僕射儀同三司青州刺史陀弟興早卒興子貴孫晉州刺史湖弟字叔宗慕容垂巨鹿太守太祖時率郡降賜爵涇縣侯加龍驤將軍仍守巨鹿卒贈安東將軍幽州刺史諡曰惠子道字始愔襲爵拜都牧令遷鎮南將軍相州刺史未及之職卒仍以為贈諡曰莊子幹字干奴好學寬厚有雅度襲爵涇縣侯後例降為伯歷南青州征虜府司馬威遠將軍鄯善鎮遠府長史仍轉汾州後軍府長史白水太守所在以廉平著稱太昌初卒贈使持節都督秦雍二州諸軍事車騎大將軍司空公雍州刺史諡曰孝穆子侃字伯欣襲除南秦州長史卒贈輔國將軍涼州刺史諡曰宣子紹字廣祖襲爵興和初征虜將軍滄州刺史侃弟騰字伏興卒於安東將軍光州刺史襄城縣開國公子陟字祖遷司空中郎太尉主簿陟弟憬通直郎憬弟翽襲父爵騰弟隆之武定末太保尚書令平原郡開國公崔逞字叔祖清河東武城人也魏中尉琰之六世孫曾祖諒晉中書令祖遇仕石虎為特進父瑜黃門郎逞少好學有文才遭亂孤貧躬耕于野而講誦不廢慕容暐時郡舉上計掾補著作郎撰燕記遷黃門侍郎及苻堅并慕容暐以為齊郡太守堅敗司馬昌明以逞為清河平原二郡太守為翟遼所虜授以中書令慕容垂滅翟釗以為祕書監慕容寶東走和龍為留臺吏部尚書及慕容驎立逞攜妻子亡歸太祖張袞先稱美逞及見禮遇甚重拜為尚書任以政事録三十六曹別給吏屬居門下省尋除御史中丞太祖攻中山未克六軍乏糧民多匿穀問羣臣以取粟方略逞曰取椹可以助糧故飛梟食椹而改音詩稱其事太祖雖銜其侮慢然兵既須食乃聽以椹當租逞又曰可使軍人及時自取過時則落盡太祖怒曰內賊未平兵人安可解甲仗入林野而收椹乎是何言歟以中山未拔故不加罪天興初姚興侵司馬德宗襄陽戍戍將郗恢馳使乞師於常山王遵遵以聞太祖詔逞與張袞為遵書以答初恢與遵書云賢兄虎步中原太祖以言悖君臣之體敕逞袞亦貶其主號以報之逞袞乃云貴主太祖怒曰使汝貶其主以答乃稱貴主何若賢兄也遂賜死後司馬德宗荊州刺史司馬休之等數十人為桓玄所逐皆將來奔至陳留南分為二輩一奔長安一歸廣固太祖初聞休之等降大悅後怪其不至詔兗州尋訪獲其從者問故皆曰國家威聲遠被是以休之等咸欲歸闕及聞崔逞被殺故奔二處太祖深悔之自是士人有過者多見優容逞七子二子早亡第三子義義弟諲諲弟禕禕弟嚴嚴弟賾逞之內徙也終慮不免乃使其妻張氏與四子留冀州令歸慕容德遂奔廣固逞獨與小子賾在平城及逞之死亦以此為譴賾字泰沖初為太子洗馬後稍遷散騎常侍賜爵清河侯後世祖聞劉義隆以諲為冀州刺史乃曰義隆知用其兄我豈無冀州也乃以賾為平東將軍冀州刺史又為大鴻臚持節策拜楊難當為南秦王奉使數返光揚朝命世祖善之及驃騎大將軍樂平王丕等督諸軍取上邽使賾齎詔於丕前喻難當奉詔後與方士韋文秀詣王屋山造金丹不就真君初卒賾五子長子秉字公禮早終無子秉弟廣字公淵襲爵拜平東將軍子法度早終廣弟軌字公則太子中舍人鎮南司馬軌弟穆字公和早終穆弟睿字哲小字男季高祖初以交通境外伏誅從兄景真以子思叔繼睿思叔少為中書學生遷中書博士世宗時歷上黨巨鹿太守自逞之死至睿之誅三世積五十餘年而在北一門盡矣初三齊平禕孫相如入國以才學知名舉冀州秀才早卒相如弟彧在術藝傳逞兄適字寧祖亦有名於時慕容垂尚書左丞范陽昌黎二郡太守適曾孫延壽冀州主簿輕財好施甚收鄉曲之譽延壽子隆宗簡率愛友居喪以孝聞歷位冀州別駕蘭陵燕郡二郡太守司空咨議參軍冀州中正中軍大將軍府長史仁信待物出於至誠故見重於世卒贈前將軍齊州刺史諡曰孝子敬保員外散騎侍郎冀州儀同府從事中郎卒贈冀州刺史子子官至征虜將軍魯郡太守早卒子弟子安冠軍將軍西兗州司馬子安弟子升開府參軍武定中坐連元瑾事兄弟並伏法封懿字處德勃海蓨人也曾祖釋晉東夷校尉父放慕容暐吏部尚書兄孚慕容超太尉懿俊偉有才氣能屬文與孚雖器行有長短然名位略齊仕慕容寶位至中書令民部尚書寶敗歸闕除給事黃門侍郎都坐大官寧朔將軍章安子太祖數引見問以慕容舊事懿應對疏慢廢還家太宗初復徵拜都坐大官進爵為侯泰常二年卒懿撰燕書頗行於世子玄之坐與司馬國璠溫楷等謀亂伏誅臨刑太宗謂之曰終不令絶汝種也將宥爾一子玄之請曰弟虔之子磨奴字君明早孤乞全其命乃殺玄之四子而赦磨奴磨奴被刑為宦人崔浩之誅也世祖謂磨奴曰汝本應全所以致刑者事由浩之故後為中曹監西使張掖賜爵富城子加建威將軍給事中久之出為冠軍將軍懷州刺史太和七年卒贈平東將軍冀州刺史勃海公諡曰定以族子叔念為後高祖賜名回回父鑒即慕容暐太尉奕之後也回皇興初為中書學生襲爵富城子纍遷太子家令世宗即位以回行華州事回在州鞭中散大夫黨智孫為尚書左丞韋績糾奏免尋除鎮遠將軍安州刺史山民願朴父子賓旅同寢一室回下車勒令別處其俗遂改徵為太尉長史頻行定州徐州事尋除後將軍汾州刺史肅宗初轉涼州刺史加右將軍固辭不拜仍授平北將軍瀛州刺史時大乘寇亂之後加以水潦百姓困乏回表求賑恤免其兵調州內甚賴之又為度支尚書尋轉都官尚書冀州大中正滎陽鄭雲諂事長秋卿劉騰貨騰紫纈四百匹得為安州刺史除書旦出暮往詣回坐未定謂回曰我為安州卿知之否彼土治生何事為便回答之曰卿荷國寵靈位至方伯雖不能拔園葵去織婦宜思方略以濟百姓如何見造而問治生乎封回不為商賈何以相示雲慚愧失色靈太后臨朝召百官問得失羣臣莫敢言回對曰昔孔丘為司寇十日而誅少正卯魯國肅然欺巧自息姬旦行戮不避兄弟周道用隆徐偃專行仁義其國乃滅自古及今未有不厲威刑而能治者頃來頗由長吏寬怠侵剝百姓盜賊羣起請肅刑書以懲未犯太后意納之而不能用轉為七兵尚書領御史中尉尚書右僕射元欽與從父兄麗妻崔氏姦通回乃劾奏時人稱之除鎮東將軍冀州刺史肅宗末徵為殿中尚書頻表遜職以為右光祿大夫莊帝初遇害於河陰時年七十七贈侍中車騎大將軍司空公定州刺史諡曰孝宣長子隆之武定中開府儀同三司齊州刺史安德郡開國公子子繪武定中勃海太守隆之弟興之字祖胄經明行修恬素清靜起家太學博士員外郎出為瀛冀二州平北府長史所歷有當官之譽孝昌中卒天平中追贈散騎常侍撫軍將軍雍州刺史尋重贈殿中尚書諡曰文子孝琬字子倩武定末開府中郎孝琬弟孝琰祕書郎興之弟延之字祖業天平中驃騎大將軍青州刺史剡縣開國子磨奴既以回為後請於顯祖贈鑒寧遠將軍滄水太守鑒長子琳字彥寶顯祖末本州表貢拜中書博士高祖初大軍南討琳參鎮南軍事後為河南七州大使還拜中書侍郎與侍中南平王馮誕等議定律令賜布帛六百匹粟六百石馬牛各一遷太尉長史轉司宗下大夫有長者之稱行東兗州事及改定百官除司空長史出為立忠將軍南青州刺史兼散騎常侍持節西道大使還為長兼太中大夫轉廣平內史又為光祿大夫世宗末除後將軍夏州刺史徵為安東將軍光祿大夫神龜二年卒贈使持節撫軍將軍相州刺史子元稱元稱弟子盛並早卒子盛弟子施武定末沛郡太守琳子肅在文苑傳懿從兄子愷字思悌奕之孫也父勸慕容垂侍中太常卿愷給事黃門侍郎散騎常侍後入代都名出懿子玄之右俱坐司馬氏事死愷妻盧玄姊也愷子伯達棄母及妻李氏南奔河表改婚房氏顯祖末伯達子休傑內入祖母盧猶存垂百歲矣而李已死休傑高祖時以歸國勳為河間太守兼冀州咸陽王府咨議參軍休傑從弟靈祐仕劉義隆為青州治中勃海太守慕容白曜平三齊靈祐率二百人詣白曜降賜爵下密子後除建威將軍勃海太守卒子進壽襲爵肅宗時為揚州治中以失義州為刺史元志所殺事具志傳子子遊武定中開府中兵參軍進壽弟蚌卒於冀州別駕蚌弟粲起家荊州長流參軍司空水曹參軍殿中侍御史纍遷征東將軍廣州長史還除光祿大夫卒贈衛將軍冀州刺史回族叔軌字廣度沉謹好學博通經傳與光祿大夫武邑孫惠蔚同志友善惠蔚每推軌曰封生之於經義非但章句可奇其標明綱格統括大歸吾所弗如者多矣善自修潔儀容甚偉或曰學士不事修飾此賢何獨如此軌聞笑曰君子整其衣冠尊其瞻視何必蓬頭垢面然後為賢言者慚退太和中拜著作佐郎稍遷尚書儀曹郎中兼員外散騎常侍銜命高麗高麗王雲恃其偏遠稱疾不親受詔軌正色詰之喻以大義雲乃北面受詔先是契丹虜掠邊民六十餘口又為高麗擁掠東歸軌具聞其狀移書徵之雲悉資給遣還有司奏軌遠使絶域不辱朝命權宜曉慰邊民來蘇宜加爵賞世宗詔曰權宜徵口使人常體但光揚有稱宜賞一階轉考功郎中除本郡中正勃海太守崔休入為吏部郎以兄考事干軌軌曰法者天下之平不可以舊君故虧之也休歎其守正軌在臺中稱為儒雅奏請遣四門博士明經學者檢試諸州學生詔從之尋除國子博士加揚武將軍假通直散騎常侍慰勞汾州山胡司空清河王懌表修明堂辟雍詔百僚集議軌議曰明堂者布政之宮在國之陽所以嚴父配天聽朔設教其經構之式蓋已尚矣故周官匠人職云夏后氏世室殷人重屋周人明堂五室九階四戶八窗鄭玄曰或舉宗廟或舉王寢或舉明堂互之以見同制然則三代明堂其制一也案周與夏殷損益不同至於明堂因而弗革明五室之義得天數矣是以鄭玄又曰五室者象五行也然則九階者法九土四戶者達四時八窗者通八風誠不易之大範有國之式若其上圓下方以則天地通水環宮以節觀者茅蓋白盛為之質飾赤綴白綴為之戶牖皆典籍所具載制度之明義也在秦之世焚滅五典毀黜三代變更先聖不依舊憲故呂氏月令見九室之義大戴之禮著十二堂之論漢承秦法亦未能改東西二京俱為九室是以黃圖白虎通蔡雍應劭等咸稱九室以象九州十二堂以象十二辰夫室以祭天堂以布政依天而祭故室不過五依時布政故堂不踰四州之與辰非所可法九與十二其用安在今聖朝欲尊道訓民備禮化物宜則五室以為永制至如廟學之嫌臺沼之雜袁準之徒已論正矣遺論具在不復須載尋以本官行東郡太守遷前軍將軍行夏州事好立條教所在有績轉太子僕遷廷尉少卿加征虜將軍卒贈右將軍濟州刺史初軌深為郭祚所知祚常謂子景尚曰封軌高綽二人並幹國之才必應遠至吾平生不妄進舉而每薦此二公非直為國進賢亦為汝等將來之津梁也其見重如此軌既以方直自業高綽亦以風概立名尚書令高肇拜司徒綽送迎往來軌竟不詣綽顧不見軌乃遽歸曰吾一生自謂無愆規矩今日舉措不如封生遠矣軌以務德慎言修身之本姦回讒佞世之巨害乃為務德慎言遠佞防姦四戒文多不載軌長子偉伯字君良博學有才思弱冠除太學博士每朝廷大議偉伯皆預焉雅為太保崔光僕射遊肇所知賞太尉清河王懌辟參軍事懌親為孝經解詁命偉伯為難例九條皆發起隱漏偉伯又討論禮傳詩易疑事數十條儒者咸稱之尋將經始明堂廣集儒學議其制度九五之論久而不定偉伯乃搜檢經緯上明堂圖説六卷正光末尚書僕射蕭寶夤以為關西行臺郎及寶夤為逆偉伯乃與南平王冏潛結關中豪右韋子粲等謀舉義兵事發見殺年三十六時人惜之永安中追贈散騎常侍征虜將軍瀛州刺史聽一子出身偉伯無子轉授第三弟翼偉伯撰封氏本録六卷并詩賦碑誄雜文數十篇偉伯弟業字君修奉朝請領殿中侍御史早卒業弟翼字君贊美容貌腰帶十圍以兄偉伯立節之勳除給事中後加揚烈將軍武定初卒翼弟述字君義武定末廷尉少卿述弟詢字景文尚書起部郎史臣曰高敬侯才鑒明遠見機而作身名俱劭世載人英天所贊也崔逞文學器識當年之俊慮遠忽微俱以為禍賾有茲休烈厥世不延封懿獲全為幸回乃克光家世不乏人矣
