body:
  text: 魏書卷八十二列傳第七十李琰之祖瑩常景李琰之字景珍小字默蠡隴西狄道人司空韶之族弟早有盛名時人號曰神童從父司空沖雅所歎異每曰興吾宗者其此兒乎資給所須愛同己子弱冠舉秀才不行曾遊河內北山便欲有隱遁意會彭城王協辟為行臺參軍苦相敦引尋為侍中李彪啓兼著作郎修撰國史稍遷國子博士領尚書儀曹郎中轉中書侍郎司農少卿黃門郎修國史遷國子祭酒轉祕書監兼七兵尚書遷太常卿孝莊初太尉元天穆北討葛榮以琰之兼御史中尉為北道軍司還除征東將軍仍兼太常出為衛將軍荊州刺史頃之兼尚書左僕射三荊二郢大行臺尋加散騎常侍琰之雖以儒素自業而每語人言吾家世將種自云猶有關西風氣及至州後大好射獵以示威武爾朱兆入洛南陽太守趙修延以琰之莊帝外戚誣琰之規奔蕭衍襲州城遂被囚執修延仍自行州事城內人斬修延還推琰之釐州任出帝初徵兼侍中車騎大將軍左光祿大夫儀同三司永熙二年薨贈侍中驃騎大將軍司徒公雍州刺史諡曰文簡琰之少機警善談經史百家無所不覽朝廷疑事多所訪質每云崔博而不精劉精而不博我既精且博學兼二子謂崔光劉芳也論者許其博未許其精當時物議咸共宗之又自誇文章從姨兄常景笑而不許每休間之際閉門讀書不交人事嘗謂人曰吾所以好讀書不求身後之名但異見異聞心之所願是以孜孜搜討欲罷不能豈為聲名勞七尺也此乃天性非為力強前後再居史職無所編緝安豐王延明博聞多識每有疑滯就琰之辨析自以為不及也二子綱惠並從出帝入關祖瑩字元珍范陽遒人也曾祖敏仕慕容垂為平原太守太祖定中山賜爵安固子拜尚書左丞卒贈并州刺史祖嶷字元達以從征平原功進爵為侯位馮翊太守贈幽州刺史父季真多識前言往行位中書侍郎卒於安遠將軍巨鹿太守瑩年八歲能誦詩書十二為中書學生好學耽書以晝繼夜父母恐其成疾禁之不能止常密於灰中藏火驅逐僮僕父母寢睡之後燃火讀書以衣被蔽塞窗戶恐漏光明為家人所覺由是聲譽甚盛內外親屬呼為聖小兒尤好屬文中書監高允每歎曰此子才器非諸生所及終當遠至時中書博士張天龍講尚書選為都講生徒悉集瑩夜讀書勞倦不覺天曉催講既切遂誤持同房生趙郡李孝怡曲禮卷上座博士嚴毅不敢還取乃置禮於前誦尚書三篇不遺一字講罷孝怡異之向博士説舉學盡驚後高祖聞之召入令誦五經章句並陳大義帝嗟賞之瑩出後高祖戲盧昶曰昔流共工於幽州北裔之地那得忽有此子昶對曰當是才為世生以才名拜太學博士徵署司徒彭城王協法曹行參軍高祖顧謂協曰蕭賾以王元長為子良法曹今為汝用祖瑩豈非倫匹也敕令掌協書記瑩與陳郡袁翻齊名秀出時人為之語曰京師楚楚袁與祖洛中翩翩祖與袁再遷尚書三公郎尚書令王肅曾於省中詠悲平城詩云悲平城驅馬入雲中陰山常晦雪荒松無罷風彭城王協甚嗟其美欲使肅更詠乃失語云王公吟詠情性聲律殊佳可更為誦悲彭城詩肅因戲協云何意悲平城為悲彭城也協有慚色瑩在座即云所有悲彭城王公自未見耳肅云可為誦之瑩應聲云悲彭城楚歌四面起尸積石梁亭血流睢水𩹉肅甚嗟賞之協亦大悅退謂瑩曰即定是神口今日若不得卿幾為吳子所屈為冀州鎮東府長史以貨賄事發除名後侍中崔光舉為國子博士仍領尚書左戶部李崇為都督北討引瑩為長吏坐截沒軍資除名未幾為散騎侍郎孝昌中於廣平王第掘得古玉印敕召瑩與黃門侍郎李琰之令辨何世之物瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時人稱為博物纍遷國子祭酒領給事黃門侍郎幽州大中正監起居事又監議事元皓入洛以瑩為殿中尚書莊帝還宮坐為皓作詔罪狀爾朱榮免官後除祕書監中正如故以參議律曆賜爵容城縣子坐事繫於廷尉前廢帝遷車騎將軍初莊帝末爾朱兆入洛軍人焚燒樂署鍾石管弦略無存者敕瑩與録尚書事長孫稚侍中元孚典造金石雅樂三載乃就事在樂志遷車騎大將軍及出帝登阼瑩以太常行禮封文安縣子天平初將遷鄴齊獻武王因召瑩議之以功遷儀同三司進爵為伯薨贈尚書左僕射司徒公冀州刺史瑩以文學見重常語人云文章須自出機杼成一家風骨何能共人同生活也蓋譏世人好偷竊他文以為己用而瑩之筆札亦無乏天才但不能均調玉石兼有製裁之體減於袁常焉性爽俠有節氣士有窮厄以命歸之必見存拯時亦以此多之其文集行於世子珽字孝徵襲常景字永昌河內人也父文通天水太守景少聰敏初讀論語毛詩一受便覽及長有才思雅好文章廷尉公孫良舉為律博士高祖親得其名既而用之後為門下録事太常博士正始初詔尚書門下於金墉中書外省考論律令敕景參議世宗季舅護軍將軍高顯卒其兄右僕射肇私託景及尚書邢巒並州刺史高聰通直郎徐紇各作碑銘並以呈御世宗悉付侍中崔光簡之光以景所造為最乃奏曰常景名位乃處諸人之下文出諸人之上遂以景文刊石肇尚平陽公主未幾主薨肇欲使公主家令居廬制服付學官議正施行尚書又以訪景景以婦人無專國之理家令不得有純臣之義乃執議曰喪紀之本實稱物以立情輕重所因亦緣情以制禮雖理關盛衰事經今古而制作之本降殺之宜其實一焉是故臣之為君所以資敬而崇重為君母妻所以從服而制義然而諸侯大夫之為君者謂其有地土有吏屬無服文者言其非世爵也今王姬降適雖加爵命事非君邑理異列土何者諸王開國備立臣吏生有趨奉之勤死盡致喪之禮而公主家令唯有一人其丞已下命之屬官既無接事之儀實闕為臣之禮原夫公主之貴所以立家令者蓋以主之內事脫須關外理無自達必也因人然則家令唯通內外之職及典主家之事耳無關君臣之理名義之分也由是推之家令不得為純臣公主不可為正君明矣且女人之為君男子之為臣古禮所不載先朝所未議而四門博士裴道廣孫榮乂等以公主為之君以家令為之臣制服以斬乖謬彌甚又張虛景吾難羈等不推君臣之分不尋致服之情猶同其議準母制齊求之名實理未為允竊謂公主之爵既非食菜之君家令之官又無純臣之式若附如母則情義罔施若準小君則從服無據案如經禮事無成文即之愚見謂不應服朝廷從之景淹滯門下積歲不至顯官以蜀司馬相如王褒嚴君平揚子雲等四賢皆有高才而無重位乃託意以讚之其讚司馬相如曰長卿有艷才直致不羣性鬱若春煙舉皎如秋月映遊梁雖好仁仕漢常稱病清貞非我事窮達委天命其讚王子淵曰王子挺秀質逸氣干青雲明珠既絶俗白鵠信驚羣才世苟不合遇否途自分空枉碧雞命徒獻金馬文其讚嚴君平曰嚴公體沉靜立志明霜雪味道綜微言端蓍演妙説才屈羅仲口位結李強舌素尚邁金貞清標陵玉徹其讚揚子雲曰蜀江導清流揚子挹餘休含光絶後彥覃思邈前修世輕久不賞玄談物無求當途謝權寵置酒獨間遊景在樞密十有餘年為侍中崔光盧昶遊肇元暉尤所知賞纍遷積射將軍給事中延昌初東宮建兼太子屯騎校尉録事皆如故其年受敕撰門下詔書凡四十卷尚書元萇出為安西將軍雍州刺史請景為司馬以景階次不及除録事參軍襄威將軍帶長安令甚有惠政民吏稱之先是太常劉芳與景等撰朝令未及班行別典儀注多所草創未成芳卒景纂成其事及世宗崩召景赴京還修儀注拜謁者僕射加寧遠將軍又以本官兼中書舍人後授步兵校尉仍舍人又敕撰太和之後朝儀已施行者凡五十餘卷時靈太后詔依漢世陰鄧二后故事親奉廟祀與帝交獻景乃據正以定儀注朝廷是之正光初除龍驤將軍中散大夫舍人如故時肅宗行講學之禮於國子寺司徒崔光執經敕景與董紹張徹馮元興王延業鄭伯猷等俱為録義事畢又行釋奠之禮並詔百官作釋奠詩時以景作為美是年九月蠕蠕主阿那瓌歸闕朝廷疑其位次高陽王雍訪景景曰昔咸寧中南單于來朝晉世處之王公特進之下今日為班宜在蕃王儀同三司之間雍從之朝廷典章疑而不決則時訪景而行初平齊之後光祿大夫高聰徙於北京中書監高允為之娉妻給其資宅聰後為允立碑每云吾以此文報德足矣豫州刺史常綽以未盡其美景尚允才器先為遺德頌司徒崔光聞而觀之尋味良久乃云高光祿平日每矜其文自許報允之德今見常生此頌高氏不得獨擅其美也侍中崔光安豐王延明受詔議定服章敕景參修其事尋進號冠軍將軍阿那瓌之還國也境上遷延仍陳窘乏遣尚書左丞元孚奉詔振恤阿那瓌執孚過柔玄奔于漠北遣尚書令李崇御史中尉兼右僕射元纂追討不及乃令景出塞經山臨瀚海宣敕勒衆而返景經涉山水悵然懷古乃擬劉琨扶風歌十二首進號征虜將軍孝昌初兼給事黃門侍郎尋除左將軍太府少卿仍舍人固辭少卿不拜改授散騎常侍將軍如故徐州刺史元法僧叛入蕭衍衍遣其豫章王蕭綜入據彭城時安豐王延明為大都督大行臺率臨淮王彧等衆軍討之既而蕭綜降附徐州清復遣景兼尚書持節馳與行臺都督觀機部分景經洛汭乃作銘焉是時尚書令蕭寶夤都督崔延伯都督北海王皓都督車騎將軍元芝等並各出討詔景詣軍宣旨勞問還以本將軍授徐州刺史杜洛周反於燕州仍以景兼尚書為行臺與幽州都督平北將軍元談以禦之景表求勒幽州諸縣悉入古城山路有通賊之處權發兵夫隨宜置戍以為防遏又以頃來差兵不盡強壯今之三長皆是豪門多丁為之今求權發為兵肅宗皆從之進號平北將軍別敕談西至軍都關北從盧龍塞據此二嶮以杜賊出入之路又詔景山中嶮路之處悉令捍塞景遣府録事參軍裴智成發范陽三長之兵以守白墳都督元談據居庸下口俄而安州石離冗城斛鹽三戍兵反結洛周有衆二萬餘落自松岍赴賊談勒別將崔仲哲等截軍都關以待之仲哲戰沒洛周又自外應之腹背受敵談遂大敗諸軍夜散詔以景所部別將李琚為都督代談征下口降景為後將軍解州任仍詔景為幽安玄四州行臺賊既南出鈔掠薊城景命統軍梁仲禮率兵士邀擊破之獲賊將禦夷鎮軍主孫念都督李琚為賊所攻薊城之北軍敗而死率屬城人禦之賊不敢逼洛周還據上谷授景平北將軍光祿大夫行臺如故洛周遣其都督王曹紇真馬叱斤等率衆薊南以掠人穀乃遇連雨賊衆疲勞景與都督于榮刺史王延年置兵粟園邀其走路大敗之斬曹紇真洛周率衆南趨范陽景與延年及榮復破之又遣別將重破之於州西虎眼泉擒斬及溺死者甚衆後洛周南圍范陽城人翻降執刺史延年及景送於洛周洛周尋為葛榮所吞景又入榮榮破景得還朝永安初詔復本官兼黃門侍郎又攝著作固辭不就二年除中軍將軍正黃門先是參議正光壬子曆至是賜爵高陽子元皓內逼莊帝北巡景與侍中大司馬安豐王延明在禁中召諸親賓安慰京師皓入洛景仍居本位莊帝還宮解黃門普泰初除車騎將軍右光祿大夫祕書監以預詔命之勤封濮陽縣子後以例追永熙二年監議事景自少及老居事任清儉自守不營産業至於衣食取濟而已耽好經史愛玩文詞若遇新異之書殷勤求訪或復質買不問價之貴賤必以得為期友人刁整每謂曰卿清德自居不事家業雖儉約可尚將何以自濟也吾恐摯太常方餧於柏谷耳遂與衛將軍羊深矜其所乏乃率刁雙司馬彥雍李諧畢祖彥畢義顯等各出錢千文而為買馬焉天平初遷鄴景匹馬從駕是時詔下三日戶四十萬狼狽就道收百官馬尚書丞郎已下非陪從者盡乘驢齊獻武王以景清貧特給車牛四乘妻孥方得達鄴後除儀同三司仍本將軍武定六年以老疾去官詔曰几杖為禮安車致養敬齒尊賢其來尚矣景藝業該通文史淵洽歷事三京年彌五紀朝章言歸祿俸無餘家徒壁立宜從哀恤以旌元老可特給右光祿事力終其身八年薨景善與人交終始若一其遊處者皆服其深遠之度未曾見其矜吝之心好飲酒淡於榮利自得懷抱不事權門性和厚恭慎每讀書見韋弦之事深薄之危乃圖古昔可以鑒戒指事為象讚而述之曰周雅云謂天蓋高不敢不局謂地蓋厚不敢不蹐有朝隱大夫監戒斯文乃惕焉而懼曰夫道喪則性傾利重則身輕是故乘和體遜式銘方册防微慎獨載象丹青信哉辭人之賦文晦而理明仰瞻高天聽卑視諦俯測厚地嶽峻川渟誰其戴之不私不畏誰其踐之不陷不墜故善惡是徵物罔同異論亢匪久人咸敬忌嗟乎唯地厚矣尚亦兢兢浩浩名位孰識其親搏之弗得聆之無聞故有戒於顯而急乎微好爵是冒聲奢是基身陷於祿利言溺於是非或求欲而未厭或知足而不辭是故位高而勢愈迫正立而邪愈欺安有位極而危不萃邪榮而正不凋故悔多於地厚禍甚於天高夫悔未結誰肯曲躬夫禍未加誰肯纍足固機發而後思圖車覆而後改躅改之無及故狡兔失穴思之在後故逆鱗易觸君子則不然體舒則懷卷視溺則思濟原夫人之度足蘭於無階之天勢位之危深於不測之地餌厚而躬不競爵降而心不係守善於已成懼愆於未敗雖盈而戒沖通而慮滯以知命為遐齡以樂天為大惠以戢智而從時以懷愚而遊世曲躬焉纍足焉苟行之晝已決矣猶夜則思其計誦之口亦明矣故心必賞其契故能不同不誘而弭謗於羣小無毀無譽而貽信於上帝託身與金石俱堅立名與天壤相弊囂競無侵優遊獨逝夫如是故綺閣金門可安其宅錦衣玉食可頤其形柳下三黜不慍其色子文三陟不喜其情而惑者見居高可以持勢欲乘高以據榮見直道可以修己欲專道以邀聲夫去聲然後聲可立豈矜道之所宣慮危然後安可固豈假道之所全是以君子鑒恃道不可以流聲故去聲而懷道鑒專道不可以守勢故去勢以崇道何者履道雖高不得無亢求聲雖道不得無悔然則聲奢繁則實儉凋功業進則身迹退如此則精靈遂越驕侈自親情與道絶事與勢鄰方欲役思以持勢乘勢以求津故利欲誘其情禍難嬰其身利欲交則幽明以之變禍難構則智術無所陳若然者雖縻爵帝扃焉得而寧之雖結珮皇庭焉得而榮之故身道未究而崇邪之徑已形成功未立而修正之術已生福祿交蹇於人事屯難頓萃於時情忠介剖心於白日耿節沉骨於幽靈因斯愚智之所機倚伏之所係全亡之所依其在遜順而已哉嗚呼鑒之嗚呼鑒之景所著述數百篇見行於世刪正晉司空張華博物志及撰儒林列女傳各數十篇云長子昶少學識有文才早卒昶弟彪之永安中司空行參軍史臣曰琰之好學博聞鬱為邦彥祖瑩幹能藝用實曰時良常景以文義見宗著美當代覽其遺稿可稱尚哉
