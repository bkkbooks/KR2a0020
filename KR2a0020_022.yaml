body:
  text: 魏書卷十九中景穆十二王列傳第七中任城王任城王雲年五歲恭宗崩號哭不絶聲世祖聞之而呼抱之泣曰汝何知而有成人之意也和平五年封拜使持節侍中征東大將軍和龍鎮都大將顯祖時拜都督中外諸軍事中都坐大官聽理民訟甚收時譽延興中顯祖集羣僚欲禪位於京兆王子推王公卿士莫敢先言雲進曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民父子相傳其來久矣皇魏之興未之有革皇儲正統聖德夙章陛下必欲割捐塵務頤神清曠者冢副之寄宜紹寶曆若欲捨儲輕移宸極恐非先聖之意駭動人情又天下是祖宗之天下而陛下輒改神器上乖七廟七靈下長姦亂之道此是禍福所由願深思慎之太尉源賀又進曰陛下今欲外選諸王而禪位于皇叔者臣恐春秋蒸嘗昭穆有亂脫萬世之後必有逆饗之譏深願思任城之言東陽公元丕等進曰皇太子雖聖德夙彰然實沖幼陛下富於春秋始覽機政普天景仰率土傒心欲隆獨善不以萬物為意其若宗廟何其若億兆何顯祖曰儲宮正統受終文祖羣公相之有何不可於是傳位於高祖後蠕蠕犯塞雲為中軍大都督從顯祖討之遇於大磧事具蠕蠕傳後仇池氐反以雲為征西大將軍討平之除都督徐兗二州緣淮諸軍事征東大將軍開府徐州刺史雲以太妃蓋氏薨表求解任顯祖不許雲悲號動疾乃許之性善撫綏得徐方之心為百姓所追戀送遺錢貨一無所受顯祖聞而嘉之復拜侍中中都大官賜帛千匹羊千口出為冀州刺史仍本將軍雲留心政事甚得下情於是合州請戶輸絹五尺粟五升以報雲恩高祖嘉之遷使持節都督陝西諸軍事征南大將軍長安鎮都大將雍州刺史雲廉謹自修留心庶獄挫抑豪強羣盜息止州民頌之者千有餘人文明太后嘉之賜帛千匹太和五年薨於州遺令薄葬勿受賵禭諸子奉遵其旨喪至京師車駕親臨哭之哀慟贈以本官諡曰康陪葬雲中之金陵雲長子澄字道鎮少而好學及康王薨澄居喪以孝聞襲封加征北大將軍高祖時蠕蠕犯塞加澄使持節都督北討諸軍事以討之蠕蠕遁走又以氐羌反叛除都督梁益荊三州諸軍事征南大將軍梁州刺史文明太后引見澄誡厲之顧謂中書令李沖曰此兒風神吐發德音間婉當為宗室領袖是行使之必稱我意卿但記之我不妄談人物也梁州氐帥楊仲顯婆羅楊卜兄弟及符叱盤等自以居邊地險世為山狡澄至州量彼風俗誘導懷附表送婆羅授仲顯循城鎮副將楊卜廣業太守叱盤固道鎮副將自餘首帥各隨才而用之款附者賞違命加誅於是仇池帖然西南款順加侍中賜衣一襲乘馬一匹以旌其能後轉征東大將軍開府徐州刺史甚有聲績朝於京師引見於皇信堂高祖詔澄曰昔鄭子産鑄刑書而晉叔向非之此二人皆是賢士得失竟誰對曰鄭國寡弱攝於強鄰民情去就非刑莫制故鑄刑書以示威雖乖古式合今權道隨時濟世子産為得而叔向譏議示不忘古可與論道未可語權高祖曰任城當欲為魏之子産也澄曰子産道合當時聲流竹素臣既庸近何敢庶幾今陛下以四海為家宣文德以懷天下但江外尚阻車書未一季世之民易以威伏難以禮治愚謂子産之法猶應暫用大同之後便以道化之高祖心方革變深善其對笑曰非任城無以識變化之體朕方創改朝制當與任城共萬世之功耳後徵為中書令改授尚書令蕭賾使庾蓽來朝蓽見澄音韻遒雅風儀秀逸謂主客郎張彝曰往魏任城以武著稱今魏任城乃以文見美也時詔延四廟之子下逮玄孫之胄申宗宴於皇信堂不以爵秩為列悉序昭穆為次用家人之禮高祖曰行禮已畢欲令宗室各言其志可率賦詩特令澄為七言連韻與高祖往復賭賽遂至極歡際夜乃罷後高祖外示南討意在謀遷齋於明堂左個詔太常卿王諶親令龜卜易筮南伐之事其兆遇革高祖曰此是湯武革命順天應人之卦也羣臣莫敢言澄進曰易言革者更也將欲應天順人革君臣之命湯武得之為吉階下帝有天下重光纍葉今曰卜征乃可伐叛不得云革命此非君人之卦未可全為吉也高祖厲聲曰象云大人虎變何言不吉也澄曰陛下龍興既久豈可方同虎變高祖勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣子豫參顧問敢盡愚衷高祖既鋭意必行惡澄此對久之乃解曰各言其志亦復何傷車駕還宮便召澄未及升階遙謂曰向者之革卦今更欲論之明堂之忿懼衆人競言阻我大計故厲色怖文武耳想解朕意也乃獨謂澄曰今日之行誠知不易但國家興自北土徙居平城雖富有四海文軌未一此間用武之地非可文治移風易俗信為甚難崤函帝宅河洛王里因茲大舉光宅中原任城意以為何如澄曰伊洛中區均天下所據陛下制御華夏輯平九服蒼生聞此應當大慶高祖曰北人戀本忽聞將移不能不驚擾也澄曰此既非常之事當非常人所知唯須決之聖懷此輩亦何能為也高祖曰任城便是我之子房加撫軍大將軍太子少保又兼尚書左僕射及駕幸洛陽定遷都之策高祖詔曰遷移之旨必須訪衆當遣任城馳驛向代問彼百司論擇可否近日論革今真所謂革也王其勉之既至代都衆聞遷詔莫不驚駭澄援引今古徐以曉之衆乃開伏澄遂南馳還報會車駕於滑臺高祖大悅曰若非任城朕事業不得就也從幸鄴宮除吏部尚書及幸代車駕北巡留澄銓簡舊臣初魏自公侯以下迄于選臣動有萬數冗散無事澄品為三等量其優劣盡其能否之用咸無怨者駕還洛京復兼右僕射高祖至北邙遂幸洪池命澄侍升龍舟因賦詩以序懷高祖曰朕昨夜夢一老公頭鬢皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂嵇紹以身衛主殞命御側亦是晉之忠臣比干遭紂凶虐忠諫剖心可謂殷之良士二人俱死於王事墳塋並在於道周然陛下徙御經殷墟而弔比干至洛陽而遺嵇紹當是希恩而感夢高祖曰朕何德能幽感達士也然實思追禮先賢標揚忠懿比干嵇紹皆是古之誠烈而朕務濃於比干禮略於嵇紹情有愧然既有此夢或如任城所言於是求其兆域遣使弔祭焉蕭鸞既殺蕭昭業而自立昭業雍州刺史曹虎請以襄陽內附分遣諸將車駕將自赴之豫州又表虎奉誠之使不復重來高祖引澄及咸陽王禧彭城王協司徒馮誕司空穆亮鎮南李沖等議之高祖曰比得邊州表云襄陽慕化朕將鳴鑾江沔為彼聲勢今復表稱更無後信於行留之計竟欲如何禧等或云宜行或言宜止高祖曰衆人紛紜意見不等朕莫知所從必欲盡行留之勢使言理俱暢者宜有客主共相起發任城與鎮南為應留之議朕當為宜行之論諸公俱坐聽得失長者從之於是高祖曰二賢試言留計也沖對曰臣等正以徒御草創人斯樂安內而應者未審不宜輕爾動發高祖曰襄陽款問似當是虛亦知初遷之民無宜勞役脫歸誠有實即當乘其悅附遠則有會稽之會近則略平江北如其送款是虛且可遊巡淮楚問民之瘼使彼土蒼生知君德之所在復何所損而惜此一舉脫降問是實而停不撫接不亦稽阻款誠毀朕大略也澄曰降問若審應有表質而使人一返靜無音問其詐也可見今代遷之衆人懷戀本細纍相攜始就洛邑居無一椽之室家闕儋石之糧而使怨苦即戎泣當白刃恐非歌舞之師也今茲區宇初構又東作方興正是子來百堵之日農夫肆力之秋宜寬彼逋誅惠此民庶且三軍已援無稽赴接苟其款實力足納撫待克平襄沔然後動駕今無故勞涉空為往返恐挫損天威更成賊膽願上覽盤庚始遷之艱難下矜詩人由庚之至詠輯寧新邑惠康億兆而司空亮以為宜行公卿皆同之澄謂亮曰公在外見旌鉞既張而有憂色每聞談論不願此行何得對聖顏更如斯之語也面背不同事涉欺佞非所謂論道之德更失國士之體或有傾側當由公輩佞臣李沖曰任城王可謂忠於社稷願陛下深察其言臣等在外皆憚征行唯貴與賤不謀同辭仰願聖心裁其可否高祖曰任城適以公等從朕有如此論不從朕者何必皆忠而通識安危也小忠是大忠之賊無乃似諸澄曰臣既愚暗不識大理所可言者雖涉小忠要是竭盡微款不知大忠者竟何據高祖曰任城脫居台鼎之任欲令大忠在己也澄曰臣誠才非台弼智闕和鼎脫得濫居公鉉庶當官而行不負愚志高祖大笑澄又謂亮曰昔汲黯於漢武前面折公孫食脫粟飯臥布被云其詐也于時公孫謙讓下之武帝歎汲黯至忠公孫長者二人稱賢公既道均昔士願思長者之言高祖笑曰任城欲自比汲黯也且所言是公未知得失所在何便謝司空也駕遂南伐五等開建食邑一千戶後從征至懸瓠以篤疾還京駕餞之汝濆賦詩而別車駕還洛引見王公侍臣於清徽堂高祖曰此堂成來未與王公行宴樂之禮後東閣廡堂粗復始就故今與諸賢欲無高而不升無小而不入因之流化渠高祖曰此曲水者亦有其義取乾道曲成萬物無滯次之洗煩池高祖曰此池中亦有嘉魚澄曰此所謂魚在在藻有頒其首高祖曰且取王在靈沼於牣魚躍次之觀德殿高祖曰射以觀德故遂命之次之凝間堂高祖曰名目要有其義此蓋取夫子間居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李沖曰此東曰步元廡西曰遊凱廡此堂雖無唐堯之君卿等當無愧於元凱沖對曰臣既遭唐堯之君不敢辭元凱之譽高祖曰光景垂落朕同宗則有載考之義卿等將出無遠何得默爾不示德音即命黃門侍郎崔光郭祚通直郎邢巒崔休等賦詩言志燭至公卿辭退李沖再拜上千萬歲壽高詛曰卿向以燭至致辭復獻千萬之壽朕報卿以南山之詩高祖曰燭至辭退庶姓之禮在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲又從幸鄴還洛以出納之勞增邑五百戶坐公事免官尋兼吏部尚書州刺史穆泰在州謀反推朔州刺史陽平王頤為主頤表其狀高祖召澄入見凝間堂曰適得陽平表曰穆泰謀為不軌招誘宗室脫或必然遷京甫爾北人戀舊南北紛擾朕洛陽不立也此事非任城不辦可為我力疾向北如其弱也直往擒翦若其勢強可承制發并肆兵以殄之雖知王患既是國家大事不容辭也澄曰泰等愚惑正戀本為此非有遠圖臣誠怯弱不憚是輩雖復患惙豈敢有辭謹當罄盡心力繼之以死願陛下勿憂高祖笑曰得任城此行朕復何憂也遂授節銅虎竹使符御仗左右仍行州事行達雁門太守夜告泰已握衆西就陽平城下聚結唯見弓仗澄聞便速進時右丞孟斌曰事不可量須依敕召并肆兵然後徐動澄曰泰既構逆應據堅城而更迎陽平度其所為似當勢弱泰既不相拒無故發兵非宜也但速往鎮之民心自定遂倍道兼行出其不意又遣治書侍御史李煥先赴至即擒泰民情怡然窮其黨與罪人皆得巨鹿公陸睿安樂侯元隆等百餘人皆獄禁具狀表聞高祖覽表大悅召集公卿以下以表示之曰我任城可謂社稷臣也尋其罪案正復臯陶斷獄豈能過之顧謂咸陽王等曰汝等脫當其處不能辦此車駕尋幸平城勞澄曰任城此行深副遠寄對曰陛下威靈遠被罪人無所逃刑臣何勞之有引見逆徒無一人稱枉時人莫不歎之高祖顧謂左右曰昔仲尼云聽訟吾猶人也必也使無訟乎然聖人之聽訟殆非常人所匹必也無訟今日見之矣以澄正尚書車駕南伐留澄居守復兼右僕射澄表請以國秩一歲租布帛助供軍資詔受其半高祖幸鄴值高車樹者反叛車駕將親討之澄表諫不宜親行會江陽王繼平之乃止高祖還洛引見公卿高祖曰營國之本禮教為先朕離京邑以來禮教為日新以不澄對曰臣謂日新高祖曰朕昨入城見車上婦人冠帽而著小襦襖者若為如此尚書何為不察澄曰著猶少於不著者高祖曰深可怪也任城意欲令全著乎一言可以喪邦者斯之謂歟可命史官書之又曰王者不降佐於蒼昊皆拔才而用之朕失於舉人任許一羣婦人輩奇事當更銓簡耳任城在省為舉天下綱維為當署事而已澄曰臣實署事而已高祖曰如此便一令史足矣何待任城又曰我遣舍人宣詔何為使小人聞之澄曰時雖有幹吏去榜亦遠高祖曰遠則不聞聞則不遠既得聞詔理故可知於是留守羣臣遂免冠謝罪尋除尚書右僕射蕭寶卷遣其太尉陳顯達入寇漢陽是時高祖不豫引澄入見清徽堂詔曰顯達侵亂沔陽不安朕不親行莫攘此賊朕疾患淹年氣力惙弊如有非常委任城大事是段任城必須從朕澄涕泣對曰臣謹當竭股肱之力以命上報遂從駕南伐高祖崩澄受顧命世宗初有降人嚴叔懋告尚書令王肅遣孔思達潛通寶卷圖為叛逆寶卷遣俞公喜送敕於肅公喜還南肅與裴叔業馬為信澄信之乃表肅將叛輒下禁止咸陽北海二王奏澄擅禁宰輔免官歸第尋出為平西將軍梁州刺史辭以母老除安東將軍相州刺史復固辭改授安西將軍雍州刺史尋徵赴季秋講武除都督淮南諸軍事鎮南大將軍開府揚州刺史下車封孫叔敖之墓毀蔣子文之廟頻表南伐世宗不許又辭母老乞解州任寢而不報加散騎常侍澄表曰臣參訓先朝藉規有日前言舊軌頗亦聞之又昔在代親習皇宗熟祕序疑庭無闕日臣每於侍坐先帝未常不以書典在懷禮經為事周旋之則不輟於時自鳳舉中京方隆禮教宗室之範每蒙委及四門之選負荷銓量自先皇升遐未遑修述學宮虛荷四門之名宗人有闕四時之業青襟之緒於茲將廢臣每惟其事竊所傷懷伏惟聖略宏遠四方罕務宴安之辰於是乎在何為太平之世而令子襟之歎興焉聖明之日而使宗人之訓闕焉愚謂可敕有司修復皇宗之學開闢四門之教使將落之族日就月將詔曰胄子崇業自古盛典國均之訓無應久廢尚書更可量宜修立澄又表母疾解州任不聽蕭衍將張囂之寇陷夷陵戍澄遣輔國將軍成興步騎赴討大破之復夷陵囂之遁走又遣長風戍主奇道顯攻蕭衍陰山戍破之斬其戍主龍驤將軍都亭侯梅興祖仍引攻白戍又破之斬其寧朔將軍關內侯吳道爽澄表曰蕭衍頻斷東關欲令巢湖泛溢湖周回四百餘里東關合江之際廣不過數十步若賊計得成大湖傾注者則淮南諸戍必同晉陽之事矣又吳楚便水且灌且掠淮南之地將非國有壽陽去江五百餘里衆庶惶惶並懼水害脫乘民之願攻敵之虛豫勒諸州纂集士馬首秋大集則南瀆可為飲馬之津霍嶺必成徙倚之觀事貴應機經略須早縱混一不可必果江西自是無虞若猶豫緩圖不加除討關塞既成襄陵方及平原民戍定為魚矣詔發冀定瀛相并濟六州二萬人馬一千五百匹令仲秋之中畢會淮南并壽陽先兵三萬委澄經略先是朝議有南伐之意以蕭寶夤為東揚州刺史據東城陳伯之為江州刺史戍陽石以澄總督二鎮授之節度至是勒兵進討以東關水衝大峴險要東關縱水陽石合肥有急懸之切不圖大峴則歷陽有乘險之援淮陵陸道九山水路並宜經略於是遣統軍傅豎眼王神念等進次大峴東關九山淮陵皆分部諸將倍道據之總勒大衆絡繹相接而神念克其關要潁川二城斬衍軍主費尼而寧朔將軍韋惠龍驤將軍李伯由仍固大峴澄遣統軍黨法宗傅豎眼等進軍克之遂圍白塔牽城數日之間便即逃潰衍清溪戍望風散走衍徐州刺史司馬明素率衆三千欲援九山徐州長史潘伯鄰規固淮陵寧朔將軍王燮負險焦城法宗進克焦城破淮陵擒明素斬伯鄰其濟陰太守王厚強廬江太守裴邃即亦奔退詔澄曰將軍文德內昭武功外暢奮揚大略將蕩江吳長旌始舒賊徒懾氣鋭旅方馳東關席卷想江湖弭波在旦夕耳所送首虜並已聞之初澄出討之後衍將薑慶真襲據壽春外郭齊王蕭寶夤擊走之長史韋纘坐免官澄以在外無坐遂攻鍾離又詔鍾離若食盡三月已前固有可克如至四月淮水泛長舟行無礙宜善量之前事捷也此實將軍經略勳有常焉如或以水盛難圖亦可為萬全之計不宜昧利無成以貽後悔也蕭衍冠軍將軍張惠紹遊擊將軍殷暹驍騎將軍趙景悅龍驤將軍張景仁等率衆五千送糧鍾離澄遣統軍王足劉思祖等邀擊惠紹等大破之獲惠紹殷暹景仁及其屯騎校尉史文淵等軍主以上二十七人既而遇雨淮水暴長引歸壽春還既狼狽失兵四千餘人頻表解州世宗不許有司奏軍還失路奪其開府又降三階時蕭衍有移求換張惠紹澄表請不許詔付八座會議尚書令廣陽王嘉等奏宜還之詔乃聽還後果復寇邊轉澄鎮北大將軍定州刺史初民中每有橫調百姓煩苦前後牧守未能蠲除澄多所省減民以欣賴又明黜陟賞罰之法表減公園之地以給無業貧口禁造布絹不任衣者母孟太妃薨居喪毀瘠當世稱之服闋除太子太保於時高肇當朝猜忌賢戚澄為肇間構常恐不全乃終日昏飲以示荒敗所作詭越時謂為狂世宗夜崩時事倉卒高肇擁兵於外肅宗沖幼朝野不安澄疏斥不預機要而朝望所屬領軍于忠侍中崔光等奏澄為尚書令於是衆心欣服又加散騎常侍驃騎大將軍尋遷司空加侍中俄詔領尚書令初正始之末詔百司普升一級而執事者不達旨意刺史守令限而不及澄奏曰竊惟雲構鬱起澤及百司企春望榮內外同慶至於賞陟不及守宰爾來十年寃訟不絶封回自鎮遠安州入為太尉長史元匡自征虜州入作宗卿二人遷授並在先詔應蒙之理備在於斯兼州佐停私之徒陪臣郡丞之例尚蒙天澤下降榮及當時然參佐之來皆因府主今府主不霑佐官獨預棄本賞末愚謂未允今計刺史守宰之官請準回匡悉同泛限上允初旨百司之章下覆訟者元元之心詔曰自今已後內外之事嘗經先朝者不得重聞澄奏曰臣聞堯懸諫諍之鼓舜置誹謗之木皆所以廣耳目於芻蕘達四聰於天下伏惟太祖開基化隆自遠纍聖相承於今九帝重光疊照樜隆必同與奪隨時道無體思過如渴言重千金故稱無諱之朝邁蹤三五高祖沖年纂曆文明協統變官易律未為違典及慈聖臨朝母儀宇縣爰發慈令垂心滯獄深枉者仰日月於九泉微屈者希曲照於盆下今乃格以先朝限以一例斯誠奉遵之本心實乖元元之至望在于謙挹有乖舊典謹尋抱枉求直或經纍朝毫釐之差正之宜速謬若千里駟馬弗追故禮有損益事有可否父有諍子君有諫臣琴瑟不調理宜改作是以防川之論小決則通鄉校之言擁則敗國矧伊陳屈而可抑以先朝且先朝屈者非故屈之或有司愛憎或執事濁僻空文致法以誤視聽如此寃塞彌在可哀僭之與濫寧失不經乞收今旨還依前詔詔曰省奏深體毗贊之情三皇異軌五代殊風一時之制何必詮改必謂虛文設旨理在可申者何容不同來執可依往制澄表上皇誥宗制并訓詁各一卷意欲皇太后覽之思勸戒之益又奏利國濟民所宜振舉者十條一曰律度量衡公私不同所宜一之二曰宜興學校以明黜陟之法三曰宜興滅繼絶各舉所知四曰五調之外一不煩民任民之力不過三日五曰臨民之官皆須黜陟以旌賞罰六曰逃亡代輸去來年久者若非伎作任聽即住七曰邊兵逃走或實陷沒皆須精檢三長及近親若實隱之徵其代輸不隱勿論八曰工商世業之戶復徵租調無以堪濟今請免之使專其業九曰三長禁姦不得隔越相領戶不滿者隨近并合十曰羽林虎賁邊方有事暫可赴戰常戍宜遣蕃兵代之靈太后下其奏百僚議之事有同否時四中郎將兵數寡弱不足以襟帶京師澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶農郡北中帶河內郡選二品三品親賢兼稱者居之省非急之作配以強兵如此則深根固本強幹弱枝之義也靈太后初將從之後議者不同乃止澄又重奏曰固本宜強防微在豫故雖有文事不忘武功況今南蠻仍獷北妖頻結來事難圖勢同往變脫暴勃忽起振動關畿四府羸卒何以防擬平康之世可以寄安遺之久長恐非善策如臣愚見郎將領兵兼總民職省官實祿於是乎在求還依前增兵益號將位既重則念報亦深軍郡相依則表𩹉俱濟朝廷無四顧之憂姦宄絶窺覦之望矣卒不納又以流人初至遠鎮衣食無資多有死者奏并其妻子給糧一歲從之尋以疾患求解任不許蕭衍於浮山斷淮為堰以灌壽春乃除使持節大將軍大都督南討諸軍事勒衆十萬將出宋尋淮堰自壞不行澄以北邊鎮將選舉彌輕恐賊虜窺邊山陵危迫奏求重鎮將之選修警備之嚴詔不從賊虜入寇至於舊都鎮將多非其人所在叛亂犯逼山陵如澄所慮澄奏都城府寺猶未周悉今軍旅初寧無宜發衆請取諸職人及司州郡縣犯十杖已上百鞭已下收贖之物絹一匹輸磚二百以漸修造詔從之太傅清河王懌表奏其事遂寢不行澄又奏曰臣聞賞必以道用防淫人之姦罰不濫及以戒良士之困刑者侀也每垂三宥秉律執請不得已而用之是故小大之獄察之以情一人呼嗟或虧王道刑罰得失乃興廢之所由也竊聞司州牧高陽王臣雍栲殺奉朝請韓元昭前門下録事姚敬賢雖因公事理實未盡何者太平之世草不橫伐行葦之感事驗隆周若昭等狀彰死罪以定應刑於都市與衆棄之如其疑似不分情理未究不宜以三清九流之官杖下便死輕絶民命傷理敗法往年州於大市鞭殺五人及檢贓狀全無寸尺今復酷害一至於此朝野云云咸懷驚愕若殺生在下虐專於臣人君之權安所復用自開古以來明明之世未聞斯比也武王曰吾不以一人之命而易天下蓋重民命也請以見事付廷尉推究驗其為劫之狀察其栲殺之理使是非分明幽魂獲雪詔從之澄當官而行無所回避又奏墾田授受之制八條甚有綱貫大便於時前來尚書文簿諸曹須則出借時公車署以理寃事重奏請真案澄執奏以尚書政本特宜遠慎故凡所奏事閣道通之蓋以袐要之切防其宣露寧有古制所重今反輕之內猶設禁外更寬也宜繕寫事意以付公車詔從之西域肽噠波斯諸國各因公使並遺澄駿馬一匹澄請付太僕以充國間詔曰王廉貞之德有過楚相可敕付以成君子大哉之美御史中尉東平王匡奏請取景明元年以來內外考簿吏部除書中兵勳案并諸殿最欲以案校竊階盜官之人靈太后許之澄表曰臣聞三季之弊由於煩刑火德之興在於三約是以老聃云法令滋彰盜賊多有又曰其政察察其民缺缺又曰天網恢恢疏而不漏是故欲求治本莫若省事清心昔漢文斷獄四百幾致刑措省事所致也蕭曹為相載其清靜畫一之歌清心之本也今欲求之於本宜以省事為先使在位羣官纂蕭曹之心以毗聖化如此則上下相安遠近相信百司不怠事無愆失豈宜擾世教以深文烹小鮮以煩手哉臣竊惟景明之初暨永平之末內外羣官三經考課逮延昌之始方加黜陟五品以上引之朝堂親決聖目六品以下例由敕判自世宗晏駕大宥三行所以蕩除故意與物更始革世之事方相窮核以臣愚見謂為不可又尚書職分樞機出納昔魏明帝卒至尚書門陳矯亢辭帝慚而返夫以萬乘之重非所宜行猶屈一言慚而回駕羣官百司而可相亂乎故陳平不知錢穀之數邴吉不問僵道之死當時以為達治歷代用為美談但宜各守其職思不出位潔己以勵時靖恭以致節又尋御史之體風聞是司至於冒勳妄考皆有處別若一處有風謠即應攝其一簿研檢虛實若差舛不同偽情自露然後繩以典刑人孰不服豈有移一省之案取天下之簿尋兩紀之事窮革世之尤如此求過誰堪其罪斯實聖朝所宜重慎也靈太后納之乃止後遷司徒公侍中尚書令如故澄又表曰伏惟世宗宣武皇帝命將授旗隨陸啓顙運籌制勝淮漢自賓節用勞心志清六合是故纘武修文仍世彌盛陛下當周康靖治之時豈得晏安於玄默然取外之理要由內強圖人之本先在自備蕭衍雖虐使其民而窺覦不已若遇我虛疲士民淍窘賊衍年老志張思播虺毒此之弗圖恐受其病伏惟陛下妙齡在位聖德方升皇太后總御天機乾乾夕惕若留意於負荷忿車書之未一進賢拔能重官人之舉標賞忠清旌養人之器修干戈之用畜熊虎之士愛時鄙財輕寶重穀七八年間陛下聖略方剛親王德幹壯茂將相膂力未衰愚臣猶堪戎伍荷戈帶甲之衆蓄鋭於今燕弧冀馬之盛充牣在昔又賊衍惡積禍盈勢不能久子弟暗悖釁逆已彰亂亡之兆灼然可見兼弱有徵天與不遠大同之機宜須蓄備昔漢帝力疾討滅英布高皇臥病親除顯達夫以萬乘之主豈忘宴安實以侵名亂正計不得已今宜慕二帝之遠圖以肅寧為大任然頃年以來東西難寇艱虞之興首尾連接雖尋得翦除亦大損財力且飢饉之氓散亡莫保收入之賦不增出用之費彌衆不愛力以悅民無豐資以待敵此臣所以夙夜懷憂悚息不寧者也易曰何以守位曰仁何以聚人曰財故曰財者非天不生非地不長非時不成非人不聚生聚之由如此其難集人守位若此之重興替之道焉可不慮又古者使民歲不過三日食壯者之糧任老者之智此雖太平之法難卒而因然妨民害財不亦宜戒今墉雉素修庫崇列雖府寺膠孰少有未周大抵省府粗得庇理務諸寺靈塔俱足致虔講道唯明堂辟雍國禮之大來冬司徒兵至請籌量減徹專力經營務令早就其廣濟數施之財酬商互市之弊凡所營造自非供御切須戎仗急要亦宜微減以務阜積庶府無橫損民有全力夫食土簋而媯德昭寢卑室而禹功盛章臺麗而楚力衰阿宮壯而秦財竭存亡之由灼然可覩願思前王一同之功畜力聚財以待時會靈太后鋭於繕興在京師則起永寧太上公等佛寺功費不少外州各造五級佛圖又數為一切齋會施物動至萬計百姓疲於土木之功金銀之價為之踊上削奪百官事力費損庫藏兼曲賚左右日有數千澄故有此表雖卒不從常優答禮之政無大小皆引參決澄亦盡心匡輔事有不便於民者必於諫諍雖不見用殷勤不已內外咸敬憚之神龜二年薨年五十三賻布一千二百匹錢六十萬蠟四百斤給東園溫明祕器朝服一具衣一襲大鴻臚監護喪事詔百僚會喪贈假黃鉞使持節都督中外諸軍事太傅領太尉公加以殊禮備九錫依晉大司馬齊王攸故事諡曰文宣王澄之葬也凶飾甚盛靈太后親送郊外停輿悲哭哀動左右百官會赴千餘人莫不歔欷當時以為哀榮之極第四子彝襲彝字子倫繼室馮氏所生頗有父風拜通直散騎常侍及元叉專權而彝於託附故不得顯職莊帝初河陰遇害贈車騎將軍儀同三司青州刺史諡曰文子度世襲武定中金紫光祿大夫齊受禪爵例降彝兄順字子和九歲師事樂安陳豐初書王羲之小學篇數千言晝夜誦之旬有五日一皆通徹豐奇之白澄曰豐十五從師迄于白首耳目所經未見此比江夏黃童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋集門生討論同異于時四方無事國富民康豪貴子弟率以朋遊為樂而順下帷讀書篤志愛古性謇諤淡於榮利好飲酒解鼓琴能長吟永歎吒詠虛室世宗時上魏頌文多不載起家為給事中時尚書令高肇帝舅權重天下人士望塵拜伏順曾懷刺詣肇門門者以其年少答云在坐大有貴客不肯為通順叱之曰任城王兒可是賤也及見直往登牀捧手抗禮王公先達莫不怪懾而順辭吐傲然若無所覩肇謂衆賓曰此兒豪氣尚爾況其父乎及出肇加敬送之澄聞之大怒杖之數十後超轉中書侍郎俄遷太常少卿以父憂去職哭泣嘔血身自負土時年二十五便有白髮免喪抽去不復更生世人以為孝思所致尋除給事黃門侍郎時領軍元叉威勢尤盛凡有遷授莫不造門謝謁順拜表而已曾不詣叉叉謂順曰卿何謂聊不見我順正色曰天子富於春秋委政宗輔叔父宜以至公為心舉士報國如何賣恩責人私謝豈所望也至於朝論得失順常鯁言正議曾不阿旨由此見憚出除平北將軍州刺史順謂叉曰北鎮紛紜方為國梗桑乾舊都根本所繫請假都督為國捍屏叉心疑難不欲授以兵官謂順曰此朝廷之事非我所裁順曰叔父既握國柄殺生由己自言天之歷數應在我躬何得復有朝廷也叉彌忿憚之轉為安東將軍齊州刺史順自負有才不得居內每懷鬱怏形於言色遂縱酒歡娛不親政事叉解領軍徵為給事黃門侍郎親友郊迎賀其得入順曰不患不入正恐入而復出耳俄兼殿中尚書轉侍中初中山王熙起兵討元叉不果而誅及靈太后反政方得改葬順侍坐西遊園因奏太后曰臣昨往看中山家葬非唯宗親哀其寃酷行路士女見其一家七喪皆為口自本然莫不酸泣叉妻時在太后側順指之曰陛下奈何以一妹之故不伏元叉之罪使天下懷寃太后默然不語就德興反於營州使尚書盧同往討之大敗而返屬侍中穆紹與順侍坐因論同之罪同先有近宅借紹紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同有好宅與要勢侍中豈慮罪也紹慚不敢復言靈太后頗事妝飾數出遊幸順面諍曰禮婦人夫喪自稱未亡人首去珠玉衣不被綵陛下母臨天下年垂不惑過甚修飾何以示後世靈太后慚而不出還入宮責順曰千里相徵豈欲衆中見辱也順曰陛下盛服炫容不畏天下所笑何臣之一言乎初城陽王徽慕順才名偏相結納而廣陽王淵姦徽妻于氏大為嫌隙及淵自定州被徵入為吏部尚書兼中領軍順為詔書辭頗優美徽疑順為淵左右由是與徐紇間順於靈太后出順為護軍將軍太常卿順奉辭於西遊園徽紇侍側順指之謂靈太后曰此人魏之宰嚭魏國不滅終不死亡紇脅肩而出順遂抗聲叱之曰爾刀筆小人正堪為几案之吏寧應忝茲執虧我彝倫遂振衣而起靈太后默而不言時追論順父顧託之功增任城王彝邑二千戶又析彝邑五百戶以封順為東阿縣開國公順疾徽等間之遂為蠅賦曰余以仲秋休沐端坐衡門寄想琴書託情紙翰而蒼蠅小蟲往來牀几疾其變白聊為賦云遐哉大道廓矣洪氛肇立秋夏爰啓冬春既含育於萬性又芻狗而不仁隨因緣以授體齊美惡而無分生茲穢類靡益於人名備羣品聲損衆倫欹脛纖翼紫首蒼身飛不能迥聲若遠聞點緇成素變白為黑寡愛蘭芳偏貪穢食集桓公之尸居平叔之側亂雞鳴之響毀皇宮之飾習習戶庭營營榛棘反覆往還譬彼讒賊膚受既通譖潤罔極緝緝幡幡交亂四國於是妖姬進邪士來聖賢擁忠孝摧周昌拘於牖里天乙囚於夏臺伯奇為之痛結申生為之蒙災鴟梟悲其室採葛懼其懷小辨隕其涕靈均表其哀自古明哲猶如此何況中庸與凡才若夫天生地養各有所親獸必依地鳥亦憑雲或來儀以呈祉或自擾而見文或負圖而歸德或銜書以告真或夭胎而奉味或殘軀以獻珍或主皮而興禮或牢豢以供神雖死生之異質俱有益於國人非如蒼蠅之無用唯構亂於蒸民遂屬疾在家杜絶慶弔後除吏部尚書兼右僕射及上省登階向榻見榻甚故問都令史徐仵起仵起曰此榻曾經先王坐順即哽塞涕泗交流久而不能言遂令換之時三公曹令史朱暉素事録尚書高陽王雍雍欲以為廷尉評頻請託順順不為用雍遂下命用之順投之於地雍聞之大怒昧爽坐都廳召尚書及丞郎畢集欲待順至於衆挫之順日高方至雍攘袂撫几而言曰身天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投棄於地順鬚鬢俱張仰面看屋憤氣奔涌長歔而不言久之搖一白羽扇徐而謂雍曰高祖遷宅中土創定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成旨自有短垣而復踰之也雍曰身為丞相録尚書如何不得用一人為官順曰庖人雖不治庖尸祝不得越樽俎而代之未聞有別旨令殿下參選事順又厲聲曰殿下必如是順當依事奏聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也後除征南將軍右光祿大夫轉兼左僕射爾朱榮之奉莊帝召百官悉至河陰素聞順數諫諍惜其亮直謂朱瑞曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走為陵戶鮮于康奴所害家徒四壁無物斂尸止有書數千卷而已門下通事令史王才達裂裳覆之莊帝還宮遣黃門侍郎山偉巡喻京邑偉臨順喪悲慟無已既還莊帝怪而問曰黃門何為聲散偉以狀對莊帝敕侍中元祉曰宗室喪亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百匹餘不得例贈驃騎大將軍尚書令司徒公定州刺史諡曰文烈順撰帝録二十卷詩賦表頌數十篇今多亡失長子朗時年十七枕戈潛伏積年乃手刃康奴以首祭於順墓然後詣闕請罪朝廷嘉而不問朗涉歷書記為司徒屬天平中為奴所害贈都督瀛冀二州諸軍事將軍尚書右僕射冀州刺史順弟淑淑弟悲並早卒悲弟紀字子綱永熙中給事黃門侍郎隨出帝沒於關中澄弟嵩字道嶽高祖時自中大夫遷員外常侍轉步兵校尉大司馬安定王休薨未及卒哭嵩便遊田高祖聞而大怒詔曰嵩不能克己復禮企心典憲大司馬薨殂甫爾便以鷹鷂自娛有如父之痛無猶子之情捐心棄禮何其太速便可免官後從平沔北纍有戰功除左中郎將兼武衛將軍高祖南伐蕭寶卷將陳顯達率衆拒戰嵩身備三仗免胄直前將士從之顯達奔潰斬獲萬計嵩於爾日勇冠三軍高祖大悅而言曰任城康王大有褔德文武頓出其門以功賜爵高平縣侯賚帛二千五百匹初高祖之發洛也馮皇后以罪幽於宮內既平顯達回次穀唐原高祖疾甚將賜后死曰使人不易可得顧謂任城王澄曰任城必不負我嵩亦當不負任城可使嵩也於是引嵩入內親詔遣之世宗即位以武衛將軍兼侍中出為平南將軍荊州刺史嵩表曰蕭寶卷骨肉相殘忠良先戮臣下囂然莫不離背君臣攜二干戈日尋流聞寶卷雍州刺史蕭衍兄懿於建業阻兵與寶卷相持荊郢二州刺史並是寶卷之弟必有圖衍之志臣若遣書相聞迎其本謀冀獲同心并力除衍平衍之後彼必旋師赴救丹陽當不能復經營疆陲全固襄沔臣之軍威已得臨據則沔南之地可一舉而收緣漢曜兵示以威德思歸有道者則引而納之受疑告危者則援而接之總兵佇鋭觀釁伺隙若其零落之形已彰怠懈之勢已著便可順流摧鋒長驅席卷詔曰所陳嘉謀深是良計如當機形可進任將軍裁之既而蕭衍尋克建業乃止除平北將軍州刺史轉平東將軍徐州刺史又轉安南將軍揚州刺史蕭衍湘州刺史楊公則率衆二萬屯軍洛口薑慶真領卒五千據於首陂又遣其左軍將軍騫小眼軍主何天祚張俊興等率衆七千攻圍陸城嵩乃遣統軍封邁王會等步騎八千討之邁達陸城賊皆夜遁追擊破之斬獲數千公則慶真退還馬頭衍徐州刺史昌義之屯據高皇遣三軍潛寇陰陵以淮水淺竭不通船艦屯於馬頭衍將田道龍何景先等領卒三千已至衡山規寇陸城寇並充逼嵩遣兼統軍李叔仁等援合肥小峴楊石頻戰破之衍征虜將軍趙草屯於黃口嵩遣軍司趙熾等往討之先遣統軍安伯醜潛師夜渡伏兵下蔡草率卒四千逆來拒戰伯醜與下蔡戍主王虎等前後夾擊大敗之俘斬溺死四千餘人統軍李叔仁等夜襲硤石之賊又破之衍將薑慶真專據肥汭冠軍將軍曹天寶屯於雞口軍主尹明世屯東硤石嵩遣別將羊引次于淮西去賊營十里司馬趙熾率兵一萬為表𩹉聲勢衆軍既會分擊賊之四壘四壘之賊戰敗奔走斬獲數千溺死萬數統軍牛敬賓攻硤石明世宵遁慶真合餘燼浮淮下下蔡戍主王略截流擊之俘斬太半於是威名大振後為蒼頭李太伯等同謀害嵩并妻穆氏及子世賢世宗為嵩舉哀於東堂賻絹一千匹贈車騎將軍領軍諡曰剛侯第二子世俊頗有幹用而無行業襲爵除給事中東宮舍人伯父澄表求轉階授之於是除員外散騎常侍肅宗時追論嵩勳封世俊衛縣開國男食邑二百戶遷冠軍將軍宗正少卿又為散騎常侍安南將軍武衛將軍河南尹尋除鎮東將軍青州刺史轉征東將軍加散騎常侍邢杲之亂圍逼州城世俊憑城拒守遂得保全孝莊時除衛將軍吏部尚書爾朱兆寇京師詔世俊以本官為都督防守河橋及兆至河世俊初無拒守意便隔岸遙拜時論疾之前廢帝世為驃騎將軍仍加尚書尤為爾朱世隆所昵出帝初加儀同三司改封武陽縣開國子食邑五百戶世俊居選曹不能厲心多所受納為中尉彈糾坐免官尋復本職孝靜初加侍中尚書右僕射遷尚書令世俊輕薄好去就詔送晉陽興和中薨贈侍中都督冀定瀛殷四州諸軍事驃騎大將軍太傅定州刺史尚書令開國公如故諡曰躁戾子景遠襲散騎侍郎世賢弟世哲武定中吏部郎嵩弟贍字道周高祖時自大夫稍遷宗正少卿龍驤將軍光州刺史散騎常侍左將軍遷平東將軍兗州刺史頗愛書史而貪暴好殺澄忿之絶其往來有四子長子遠尚書郎史臣曰顯祖之將禪讓可謂國之大節康王毅然庭諍德音孔昭一言興邦其斯之謂歟文宣貞固俊遠鬱為宗傑身因纍朝寧濟夷險既社稷是任其梁棟之望也順謇諤俶儻有汲黯之風不用於時橫招非命惜矣嵩有行陳之氣俊則裂冠之徒歟
