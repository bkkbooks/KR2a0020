body:
  text: 魏書卷三十八列傳第二十六刁雍王慧龍韓延之袁式刁雍字淑和勃海饒安人也高祖攸晉御史中丞曾祖協從司馬睿渡江居于京口位至尚書令父暢司馬德宗右衛將軍初暢兄逵以劉裕輕狡薄行負社錢三萬違時不還執而徵焉及裕誅桓玄以嫌故先誅刁氏雍為暢故吏所匿奔姚興豫州牧姚紹於洛陽後至長安雍博覽書傳姚興以雍為太子中庶子泰常二年姚泓滅與司馬休之等歸國上表陳誠於南境自效太宗許之假雍建義將軍雍遂於河濟之間招集流散得五千餘人南阻大闕擾動徐兗建牙誓衆傳檄邊境劉裕遣將李嵩等討雍雍斬之於蒙山於是衆至二萬進屯固山七年三月雍從弟彌亦率衆入京口規共討裕裕遣兵破之六月雍又侵裕青州雍敗乃收散卒保於馬耳山又為裕青州軍所逼遂入大鄉山八年太宗南幸鄴朝於行觀問先聞卿家縛劉裕於卿親疏雍曰是臣伯父太宗笑曰劉裕父子當應憚卿又謂之曰朕先遣叔孫建等攻青州民盡藏避城猶未下彼既素憚卿威士民又相信服今欲遣卿助建等卿宜勉之於是假雍鎮東將軍青州刺史東光侯給五萬騎使別立義軍建先攻東陽雍至招集義衆得五千人遣撫慰郡縣土人盡下送租供軍是時攻東陽平其北城三十許步劉義符青州刺史竺夔於城內鑿地道南下入澠水澗以為退路雍謂建曰此城已平宜時入取不者走盡建懼傷兵士難之雍曰若懼傷官兵者雍今請將義兵先入建不聽夔欲東走會義符遣其將檀道濟等救青州雍謂建曰賊畏官軍突騎以鎖連車為函陳大峴已南處處狹隘不得方軌雍求將義兵五千要嶮破之建不聽曰兵人不宜水土疫病過半若相持不休兵自死盡何須復戰今不損大軍安全而返計之上也建乃引還雍遂鎮尹卯固又詔令南入以亂賊境雍攻克項城會有敕追令隨機立效雍於是招集譙梁彭沛民五千餘家置二十七營遷鎮濟陰延和二年立徐州於外黃城置譙梁彭沛四郡九縣以雍為平南將軍徐州刺史賜爵東安侯在鎮七年太延四年徵還京師頻歲為邊民所請世祖嘉之真君二年復授使持節侍中都督揚豫兗徐四州諸軍事征南將軍徐豫二州刺史三年劉義隆將裴方明寇陷仇池詔雍與建興公古弼等十餘將討平之五年以本將軍為薄骨律鎮將至鎮表曰臣蒙寵出鎮奉辭西藩總統諸軍戶口殷廣又總勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寧處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口纍率皆飢儉略加檢行知此土稼穡艱難夫欲育民豐國事須大田此土乏雨正以引河為用觀舊渠堰乃是上古所制非近代也富平西南三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入此渠中計昔為之高於水不過一丈河水激急沙土漂流今日此渠高於河水二丈三尺又河水浸射往往崩頽渠溉高懸水不得上雖復諸處案舊引水水亦難求今艾山北河中有洲渚水分為二西河小狹水廣百四十步臣今求入來年正月於河西高渠之北八里分河之下五里平地鑿渠廣十五步深五尺築其兩岸令高一丈北行四十里還入古高渠即循高渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十步廣十步高二丈絶斷小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則水一遍水凡四溉穀得成實官課常充民亦豐贍詔曰卿憂國愛民知欲更引河水勸課大田宜便興立以克就為功何必限其日數也有可以便國利民者動靜以聞七年雍表曰奉詔高平安定統萬及臣所守四鎮出車五千乘運屯穀五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車來往猶以為難設令載穀不過二十石每涉深沙必致滯陷又在河西轉至沃野越度大河計車五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一歲不過二運五十萬斛乃經三年臣前被詔有可以便國利民者動靜以聞臣聞鄭白之渠遠引淮海之粟泝流數千周年乃得一至猶稱國有儲糧民用安樂今求於牽屯山河水之次造船二百艘二船為一舫一船勝穀二千斛一舫十人計須千人臣鎮內之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人功輕於車運十倍有餘不費牛力又不廢田詔曰知欲造船運穀一冬即成大省民力既不費牛又不廢田甚善非但一運自可永以為式今別下統萬鎮出兵以供運穀卿鎮可出百兵為船工豈可專廢千人雖遣船匠猶須卿指授未可專任也諸有益國利民如此者續復以聞九年雍表曰臣聞安不忘亂先聖之政也況綏服之外帶接邊城防守不備無以禦敵者也臣鎮所綰河西爰在邊表常懼不虞平地積穀實難守護兵人散居無所依恃脫有妖姦必致狼狽雖欲自固無以得全今求造城儲穀置兵備守鎮自建立更不煩官又於三時之隙不令廢農一歲二歲不訖三歲必成立城之所必在水陸之次大小高下量力取辦詔許之至十年三月城訖詔曰卿深思遠慮憂勤盡思知城已周訖邊境無不虞之憂千載有永安之固朕甚嘉焉即名此城為刁公城以旌爾功也興光二年詔雍還都拜特進將軍如故和平六年表曰臣聞有國有家者莫不禮樂為先故樂記云禮所以制外樂所以修內和氣中釋恭敬溫文是以安上治民莫善於禮易俗移風莫善於樂且於一民一俗尚須崇而用之況統御八方陶鈞六合者哉故帝堯修五禮以明典章作咸池以諧萬類顯皇軌於云岱揚鴻化於介丘令木石革心鳥獸率舞包天地之情達神明之德夫感天動神莫近於禮樂故大樂與天地同和大禮與天地同節和故百物阜生節故報天祭地禮行於郊則上下和肅肅者禮之情和者樂之致樂至則無怨禮至則不違揖讓而治天下者禮樂之謂歟唯聖人知禮樂之不可以已故作樂以應天制禮以配地所以承天之道治人之情故王者治定制禮功成作樂虞夏殷周易代而起及周之末王政陵遲仲尼傷禮樂之崩亡痛文武之將墜自衛返魯各得其中逮乎秦皇翦棄道術灰滅典籍坑燼儒士盲天下之目絶象魏之章簫韶來儀不可復矣賴大漢之興改正朔易服色協音樂制禮儀正聲古禮粗欲周備至於孝章每以三代損益優劣殊軌歎其薄德無以易民視聽博士曹褒覩斯詔也知上有制作之意乃上疏求定諸儀以為漢禮終於休廢寢而不行及魏晉之日修而不備伏惟陛下無為以恭己使賢以御世方鳴和鸞以陟岱宗陪羣后以升中嶽而三禮闕於唐辰象舞替於周日夫君舉必書古之典也柴望之禮帝王盛事臣今以為有其時而無其禮有其德而無其樂史闕封石之文工絶清頌之饗良由禮樂不興王政有闕所致也臣聞樂由禮所以象德禮由樂所以防淫五帝殊時不相沿三王異世不相襲事與時並名與功偕故也臣識昧儒先管窺不遠謂宜修禮正樂以光大聖之治詔令公卿集議會高宗崩遂寢皇興中雍與隴西王源賀及中書監高允等並以耆年特見優禮錫雍几杖劍履上殿月致珍羞焉雍性寬柔好尚文典手不釋書明敏多智凡所為詩賦頌論并雜文百有餘篇又泛施愛士怡靜寡欲篤信佛道著教誡二十餘篇以訓導子孫太和八年冬卒年九十五賜命服一襲賵帛五百匹贈儀同三司冀州刺史將軍如故諡曰簡雍長子纂字奉宗中書侍郎早卒纂弟遵字奉國襲爵遵弟紹字奉世武騎侍郎汝陰王天賜涼州征西府司馬紹弟獻字奉章祕書郎獻弟融字奉業汝陰太守融弟肅字奉誠中書博士遵少不拘小節長更修改太和中例降為侯景明中除相州魏郡太守還為太尉咨議參軍年七十志力不衰嘗經篤疾幾死見神明救免言是福門之子當享長年延昌三年遷司農少卿尋拜龍驤將軍洛州刺史遵招誘有方蕭衍新化太守杜性新化令杜龍振平陽令杜臺定等率戶三千據地內附熙平元年七月卒年七十六贈平東將軍兗州刺史諡曰惠侯有子十三人長子楷字景伯州舉秀才早卒子沖字文助在儒林傳楷弟尚字景勝本州治中早卒尚弟整字景智少有大度頗涉書史郡功曹太和十五年奉朝請高祖都洛親自臨選除司空法曹參軍高祖南討以廣陽王嘉鎮荊州整為嘉外兵參軍事尋轉太尉咸陽王禧外兵參軍景明中除給事中領本州中正尋除書左中兵郎中正始中蕭衍江州刺史王茂先來寇南境平南將軍楊大眼討之詔整持節為大眼軍司大破茂先斬衍輔國將軍王花等永平初以軍功除員外散騎常侍仍除郎中延昌三年秋世宗親選百官於朝堂拜右軍將軍仍除郎中尋轉驍騎將軍未幾丁父憂相州刺史中山王熙在鄴起兵將誅元叉等事敗傳首京師熙之親故莫敢視整弟婦即熙姊遂收其尸藏之後乃還熙所親叉聞而致憾因以熙弟略南走蕭衍誣整將叛送整與弟宣及子恭等幽繫之賴御史王基前軍將檢事使魏子建理雪獲免後自征虜將軍出除范陽太守時已兵亂整郡獲全去郡之後尋被陷沒靈太后反政除安南將軍光祿大夫元略曾於整坐泣謂黃門王誦尚書袁翻曰刁公收斂我家卿等宜知整以母老河北喪亂時整族弟雙為西兗州刺史整遂攜家依焉永安初拜金紫光祿大夫二年兼黃門元皓入洛用為滄州刺史莊帝還朝坐免官後歸鄉里及莊帝殺爾朱榮就除鎮東將軍行滄州事普泰初假征東大將軍滄冀瀛三州刺史大都督將軍如前尋加車騎將軍右光祿大夫逢本鄉賊亂奉母客於齊州加衛大將軍天平四年卒於鄴贈司空公諡曰文獻整解音律輕財好施交結名勝聲酒自娛然貪而好色為議者所貶初雍與從弟寶惠俱入國寶惠字道明太祖以為上客卒有六子子連城為冀州開府掾刁氏世有榮祿而門風不甚修潔為時所鄙雍族孫雙字子山高祖藪晉齊郡太守藪因晉亂居青州之樂安父道履皇興初除平原太守至雙始還本鄉雙少好學兼涉文史雅為中山王英所知賞拜西河太守正光初中山王熙之誅也熙弟略投命於雙雙護之周年時購略甚切略乃謂雙曰我兄弟屠滅已盡唯我一身漏刃相託卿雖厚恩久見容蔽但事留變生終恐難保脫萬一發覺我死分也無事相纍卿若送吾出境便是再生之惠如其不爾輒欲自裁雙曰人生會有一死死所難遇耳今遭知己視死如歸願不以為慮略後苦求南轉雙乃遣從子昌送達江左靈太后返政知略因雙獲免徵拜光祿大夫時略姊饒安公主刁宣妻也頻訴靈太后乞徵略還朝廷乃以徐州所獲俘江革祖耳幾二人易之以雙與略有舊乃令至境迎接略肅宗末除西兗州刺史時賊盜蜂起州人張桃弓等招聚亡命公行劫掠雙至境先遣使諭桃弓陳示禍福桃弓即隨使歸罪雙捨而不問後有盜發之處令桃弓追捕咸悉擒獲於是州境清肅莊帝初行濟州刺史以功封曲城鄉男出帝初遷驃騎大將軍左光祿大夫興和三年卒贈車騎大將軍儀同三司齊州刺史諡曰清穆王慧龍自云太原晉陽人司馬德宗尚書僕射愈之孫散騎侍郎緝之子也幼聰慧愈以為諸孫之龍故名焉初劉裕微時愈不為禮及得志愈合家見誅慧龍年十四為沙門僧彬所匿百餘日將慧龍過江為津人所疑曰行意匆匆倣徨得非王氏諸子乎僧彬曰貧道從師有年止西岸今暫欲定省還期無遠此隨吾受業者何至如君言既濟遂西上江陵依叔祖忱故吏荊州前治中習辟疆時刺史魏詠之卒辟疆與江陵令羅修前別駕劉期公土人王騰等謀舉兵推慧龍為盟主剋日襲州城而劉裕聞詠之卒亦懼江陵有變遣其弟道規為荊州衆遂不果羅修將慧龍又與僧彬北詣襄陽司馬德宗雍州刺史魯宗之資給慧龍送渡江遂自虎牢奔于姚興其自言也如此泰常二年姚泓滅慧龍歸國太宗引見與言慧龍請效力南討言終俯而流涕天子為之動容謂曰朕方混一車書席卷吳會卿情計如此豈不能相資以衆乎然亦未之用後拜洛城鎮將配兵三千人鎮金墉既拜十餘日太宗崩世祖初即位咸謂南人不宜委以師旅之任遂停前授初崔浩弟恬聞慧龍王氏子以女妻之浩既婚姻及見慧龍曰信王家兒也王氏世鼻江東謂之王慧龍鼻大浩曰真貴種矣數向諸公稱其美司徒長孫嵩聞之不悅言於世祖以其嘆服南人則有訕鄙國化之意世祖怒召浩責之浩免冠陳謝得釋及魯宗之子軌奔姚興後歸國云慧龍是王愈家豎僧彬所通生也浩雖聞之以女之故成贊其族慧龍由是不調久之除樂安王範傅領并荊揚三州大中正慧龍抗表願得南垂自效崔浩固言之乃授南蠻校尉安南大將軍左長史及劉義隆荊州刺史謝晦起兵江陵引慧龍為援慧龍督司馬靈壽等一萬人拔其思陵戍進圍項城晦敗乃班師後劉義隆將王玄謨寇滑臺詔假慧龍楚兵將軍與安頡等同討之相持五十餘日諸將以賊盛莫敢先慧龍設奇兵大破之世祖賜以劍馬錢帛授龍驤將軍賜爵長社侯拜滎陽太守仍領長史在任十年農戰並修大著聲績招攜邊遠歸附者萬餘家號為善政其後劉義隆將到彥之檀道濟等頻頓淮潁大相侵掠慧龍力戰屢摧其鋒彥之與友人蕭斌書曰魯軌頑鈍馬楚粗狂亡人之中唯王慧龍及韓延之可為深憚不意儒生懦夫乃令老子訝之劉義隆縱反間云慧龍自以功高而位不至欲引寇入邊因執安南大將軍司馬楚之以叛世祖聞曰此必不然是齊人忌樂毅耳乃賜慧龍璽書曰義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意也劉義隆計既不行復遣刺客呂玄伯購慧龍首二百戶男絹一千匹玄伯僞為反間來求屏人有所論慧龍疑之使人探其懷有尺刀玄伯叩頭請死慧龍曰各為其主也吾不忍害此人左右皆言義隆賊心未已不殺玄伯無以制將來慧龍曰死生有命彼亦安能害我且吾方以仁義為干鹵又何憂乎刺客遂捨之時人服其寬恕慧龍自以遭難流離常懷憂悴乃作祭伍子胥文以寄意焉生一男一女遂絶房室布衣蔬食不參吉事舉動必以禮太子少傅游雅言於朝曰慧龍古之遺孝也撰帝王制度十八篇號曰國典真君元年拜使持節寧南將軍虎牢鎮都副將未至鎮而卒臨沒謂功曹鄭曄曰吾羈旅南人恩非舊結蒙聖朝殊特之慈得在疆埸效命誓願鞭尸吳市戮墳江陰不謂嬰此重疾有心莫遂非唯仰愧國靈實亦俯慚后土修短命也夫復何言身歿後乞葬河內州縣之東鄉依古墓而不墳足藏髮齒而已庶魂而有知猶希結草之報時制南人入國者皆葬桑乾曄等申遺意詔許之贈安南將軍荊州刺史諡穆侯吏人及將士共於墓所起佛寺圖慧龍及僧彬象讚之呂玄伯感全宥之恩留守墓側終身不去子寶興襲爵寶興少孤事母至孝尚書盧遐妻崔浩女也初寶興母及遐妻俱孕浩謂曰汝等將來所生皆我之自出可指腹為親及婚浩為撰儀躬自監視謂諸客曰此家禮事宜盡其美及浩被誅盧遐後妻寶興從母也緣坐沒官寶興亦逃避未幾得出盧遐妻時官賜度河鎮高車滑骨寶興盡賣貨産自出塞贖之以歸州辟治中從事別駕舉秀才皆不就閉門不交人事襲爵長社侯龍驤將軍卒子瓊襲爵瓊字世珍高祖賜名焉太和九年為典寺令十六年降侯為伯高祖納其長女為嬪拜前軍將軍并州大中正正始中為光州刺史有受納之響為中尉王顯所劾終得雪免神龜中除左將軍兗州刺史去州歸京多年沉滯所居在司空劉騰宅西騰雖勢傾朝野初不候之騰既權重吞并鄰宅增廣舊居唯瓊終不肯與以此久見抑屈瓊女適范陽盧道亮不聽歸其夫家及女卒哀慟無已瓊仍葬之別所冢不即塞常於壙內哭泣久之乃掩當時深怪疑其穢行加以聾疾每見道俗乞丐無已造次見之令人笑愕道逢太保廣平王懷據鞍抗禮自言馬瘦懷即以誕馬并乘具與之嘗詣尚書令李崇騎馬至其黃閣見崇子世哲直問繼伯在否崇趨出瓊乃下崇儉而好以紙帖衣領瓊哂而掣去之崇小子青肫嘗盛服闕寵勢亦不足恨領軍元叉使奴遺瓊馬并留奴王誦聞之笑曰東海之風於茲墜矣孝昌三年除鎮東將軍金紫光祿大夫中書令時瓊子遵業為黃門郎故有此授卒年七十四贈征北將軍中書監并州刺史自慧龍入國三世一身至瓊始有四子長子遵業風儀清秀涉歷經史位著作佐郎與司徒左長史崔鴻同撰起居注遷右軍將軍兼散騎常侍慰勞蠕蠕乃詣代京採拾遺文以補起居所闕與崔光安豐王延明等參定服章及光為肅宗講孝經遵業預講延業録義並應詔作釋奠侍宴詩時人語曰英英濟濟王家兄弟轉司徒左長史黃門郎監典儀注遵業有譽當時與中書令陳郡袁翻尚書琅琊王誦並領黃門郎號曰三哲時政歸門下世謂侍中黃門為小宰相而遵業從容恬素若處丘園嘗著穿角履好事者多毀新履以學之以胡太后臨朝天下方亂謀避地自求徐州太后曰王誦罷幽州始作黃門卿何乃欲徐州更待一二年當有好處分遵業兄弟並交遊時俊乃為當時所美及爾朱榮入洛兄弟在父喪中以於莊帝有從姨兄弟之親相率奉迎俱見害河陰議者惜其人才而譏其躁競贈并州刺史著三晉記十卷遵業子松年尚書庫部郎韓延之字顯宗南陽赭陽人魏司徒暨之後也司馬德宗平西府録事參軍劉裕率伐司馬休之未至江陵密使與延之書招之延之報曰聞親率戎馬遠履西畿闔境士庶莫不怪駭何者莫知師出之名故也司馬平西體國忠貞款愛待物當於古人中求耳劉裕足下海內之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣今伐人之君啖人以利真可謂處懷期物自有由來者矣以平西之至德寧無授命之臣乎假令天長喪亂九流渾濁當與臧洪遊於地下不復多言裕得書歎息以示諸佐曰事人當應如此劉裕父名翹字顯宗於是延之字顯宗名子為翹蓋示不臣劉氏也後奔姚興泰常二年與司馬文思來入國以延之為虎牢鎮將爵魯陽侯初延之曾來往柏谷塢省魯宗之墓有終焉之志因謂子孫云河洛三代所都必有治於此者我死不勞向北代葬也即可就此及卒子從其言遂葬於宗之墓次延之死後五十餘年而高祖徙都其孫即居於墓北柏谷塢延之前妻羅氏生子措措隨父入國又以淮南王女妻延之生道仁措推道仁為嫡襲父爵位至殿中尚書進爵西平公袁式字季祖陳郡陽夏人漢司徒滂之後父淵司馬昌明侍中式在南歷武陵王遵咨議參軍與司馬文思等歸姚興泰常二年歸國為上客賜爵陽夏子與司徒崔浩一面便盡國士之交是時朝儀典章悉出於浩浩以式博於古事每所草創顧訪之性長者雖羈旅飄泊而清貧守度不失士節時人甚敬重之皆呼曰袁咨議延和二年衛大將軍樂安王範為雍州刺史詔式與中書侍郎高允俱為從事中郎辭而獲免式沉靖樂道周覽書傳至於詁訓倉雅偏所留懷作字釋未就以天安二年卒贈豫州刺史諡肅侯子濟襲位魏郡太守政有清稱加寧遠將軍子姪遂居潁川之陽夏史臣曰刁雍才識恢遠著聲立事禮遇優隆世有人爵堂構之義也王慧龍拔難自歸頗歷夷險撫人督衆見憚嚴敵世珍實有令子克播家聲韓延之報書劉裕國體在焉袁式贊禮崔浩時稱長者一時有稱信為美哉
