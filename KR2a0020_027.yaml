body:
  text: 魏書卷二十二孝文五王列傳第十廢太子京兆王清河王廣平王汝南王孝文皇帝七男林皇后生廢太子恂文昭皇后生宣武皇帝廣平文穆王懷袁貴人生京兆王愈羅夫人生清河文獻王懌汝南文宣王悅鄭充華生皇子恌未封早夭廢太子庶人恂字元道生而母死文明太后撫視之常置左右年四歲太皇太后親為立名恂字元道於是大赦太和十七年七月癸丑立恂為皇太子及冠恂於廟高祖臨光極東堂引恂入見誡以冠義曰夫冠禮表之百代所以正容體齊顏色順辭令容體正顏色齊辭令順故能正君臣親父子和長幼然母見必拜兄弟必敬責以成人之禮字汝元道所寄不輕汝當尋名求義以順吾旨二十年改字宣道遷洛詔恂詣代都其進止儀禮高祖皆為定及恂入辭高祖曰今汝不應向代但太師薨於壤朕既居皇極之重不容輕赴舅氏之喪欲使汝展哀舅氏拜汝母墓一寫為子之情汝至彼太師事畢後日宜一拜山陵拜訖汝族祖南安可一就問訊在途當溫讀經籍今日親見吾也後高祖每歲征幸恂常留守主執廟祀恂不好書學體貌肥大深忌河洛暑熱意每追樂北方中庶子高道悅數苦言致諫恂甚銜之高祖幸嵩嶽恂留守金墉於西掖門內與左右謀欲召牧馬輕騎奔代手刃道悅於禁中領軍元儼勒門防遏夜得寧靜厥明尚書陸琇馳啓高祖於南高祖聞之駭惋外寢其事仍至汴口而還引恂數罪與咸陽王禧等親杖恂又令禧等更代百餘下扶曳出外不起者月餘拘於城西別館引見羣臣於清徽堂議廢之司空太子太傅穆亮尚書僕射少保李沖並免冠稽首而謝高祖曰卿所謝者私也我所議者國也古人有言大義滅親今恂欲違父背尊跨據朔天下未有無父國何其包藏心與身俱此小兒今日不滅乃是國家之大禍脫待我無後恐有永嘉之亂乃廢為庶人置之河陽以兵守之服食所供粗免飢寒而已恂在困躓頗知咎悔讀佛經禮拜歸心於善高祖幸代遂如長安中尉李彪承間密表告恂復與左右謀逆高祖在長安使中書侍郎邢巒與咸陽王禧奉詔齎椒酒詣河陽賜恂死時年十五殮以粗棺常服瘞於河陽城二十二年冬御史臺令史龍文觀坐法當死告廷尉稱恂前被攝左右之日有手書自理不知狀而中尉李彪侍御史賈尚寢不為聞賈坐繫廷尉時彪免歸高祖在鄴尚書表收彪赴洛會赦遂不窮其本末賈尚出繫暴病數日死初高祖將為恂娶司徒馮誕長女以女幼待年長先為娉彭城劉長文滎陽鄭懿女為左右孺子時恂年十三四高祖泛舟天淵池謂郭祚崔光宋辨曰人生須自放不可終朝讀書我欲使恂旦出省經傳食後還內晡時復出日夕而罷卿等以為何如光曰孔子稱血氣未定戒之在色傳曰晝以訪事夜以安身太子以幼年涉學之日不宜於正晝之時捨書御內又非所以安柔弱之體固永年之命高祖以光言為然乃不令恂晝入內無子京兆王愈字宣德太和二十一年封拜都督徐州刺史以彭城王中軍府長史盧陽烏兼長史州事巨細委之陽烏世宗初為護軍將軍世宗留愛諸弟愈等常出入宮掖晨昏寢處若家人焉世宗每日華林戲射衣衫騎從往來無間遷中書監世宗為納順皇后妹為妃而不見禮答愈在徐州納妾李氏本姓楊東郡人夜聞其歌悅之遂被寵嬖罷州還京欲進貴之託右中郎將趙郡李恃顯為之養父就之禮逆産子寶月順皇后召李入宮毀擊之強令為尼於內以子付妃養之歲餘后父于徑以后久無所誕乃上表勸廣嬪侍因令后歸李於愈舊愛更甚愈好文章頗著詩賦時引才人宋世景李神俊祖瑩邢晏王遵業張始均等共申宴喜招四方儒學賓客嚴懷真等數十人館而禮之所得穀帛率多散施又崇信佛道用度常至不接與弟廣平王懷頗相夸尚競慕奢麗貪縱不法於是世宗攝愈禁中推案杖愈五十出為冀州刺史始愈自以職求侍要既勢劣二弟潛懷愧恨頗見言色又以幸妾屢被頓辱內外離抑及在州謀逆愈遂殺長史羊靈引及司馬李遵稱得清河王密疏云高肇謀殺害主上於是遂為壇於信都之南柴燎告天即皇帝位赦天下號建平元年立李氏為皇后世宗詔尚書李平討愈愈出拒王師頻敗遂嬰城自守愈知事窮攜李及四子數十騎出門諸軍追之見執以送詔徵赴京師申以家人之訓愈每止宿亭傳必攜李手盡其私情雖鎖縶之中飲食自若略無愧懼之色至野王愈語人曰雖主上慈深不忍殺我吾亦何面目見於至尊於是歔欷流涕絶氣而死年二十一或云高肇令人殺之斂以小棺瘞之諸子至洛皆赦之後靈太后令愈之四子皆附屬籍追封愈臨洮王子寶月襲乃改葬父母追服三年寶月弟寶炬輕躁薄行耽淫酒色孝莊時特封南陽王從出帝沒於關西宇文黑獺害出帝寶炬乃僭大號清河王懌字宣仁幼而敏惠美姿貌高祖愛之彭城王協甚器異之並曰此兒風神外偉黃中內潤若天假之年比二南矣博涉經史兼綜羣言有文才善談理寬仁容裕喜怒不形於色太和二十一年封世宗初拜侍中轉尚書僕射懌才長從政明於斷決割判衆務甚有聲名司空高肇以帝舅寵任既擅威權謀去良宗屢譖懌及愈等愈不勝其忿怒遂舉逆冀州因愈之逆又構殺協懌恐不免肇又録囚徒以立私惠懌因侍宴酒酣乃謂肇曰天子兄弟詎有幾人而炎炎不息昔王莽頭禿亦藉渭陽之資遂篡漢室今君曲形見矣恐復終成亂階又言於世宗曰臣聞唯器與名不可以假人是故季氏旅泰宣尼以為深譏仲叔軒懸丘明以為至誡諒以天尊地卑君臣道別宜杜漸防萌無相僭越至於減膳録囚人君之事今乃司徒行之詎是人臣之義且陛下修政教解獄訟則時雨可降玉燭知和何使明君失之於上姦臣竊之於下長亂之基於此在矣世宗笑而不應肅宗初遷太尉侍中如故詔懌裁門下之事又典經義注時有沙門惠憐者自云呪水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力優重使於城西之南治療百姓病懌表諫曰臣聞律深惑衆之科禮絶妖淫之禁皆所以大明居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能月斗誘生人致黃巾之禍天下塗炭數十年間角之由也昔新垣姦不登於明堂五利僥終嬰於顯戮靈太后以懌肅宗懿叔德先具瞻委以朝政事擬周霍懌竭力匡輔以天下為己任領軍元叉太后之妹夫也恃寵驕盈懌裁之以法每抑黜之為叉所疾叉黨人通直郎宋維希叉旨告懌謀反禁懌門下訊問左右及朝貴貴人分明乃得雪釋焉懌以忠而獲謗乃鳩集昔忠烈之士為顯忠録二十卷以見意焉正光元年七月叉與劉騰逼肅宗於顯陽殿閉靈太后於後宮囚懌於門下省誣懌罪狀遂害之時年三十四朝野貴賤知與不知含悲喪氣驚振遠近夷人在京及歸聞懌之喪為之劈面者數百人廣平王懷闕有魏諸王召入華林別館禁其出入令四門博士董徵授以經傳世宗崩乃得歸汝南王悅好讀佛經覽書史為性不倫俶儻難測悅妃閭氏即東海公之女也生一子不見禮答有崔延夏者以左道與悅遊合服仙藥松朮之屬時輕與出採芝宿於城外小人之所遂斷酒肉粟稻唯食麥飯又絶房中而更好男色輕忿妃妾至加捶撻同之婢使悅之出也妃住於別第靈太后敕檢問之引入窮悅事故妃病杖伏床蓐瘡尚未愈太后因悅之杖妃乃下令禁斷令諸親王及三蕃其有正妃疾患百日已上皆遣奏聞若有猶行捶撻就削封位及清河王懌為元叉所害悅了無讎恨之意乃以桑落酒候伺之盡其私佞叉大喜以悅為侍中太尉臨拜日就懌子亶求懌服玩之物不時稱旨乃召亶杖之百下亶居廬未葬形氣羸弱暴加威撻殆至不濟闕仍呼阿兒親自循撫闕悅為大銼碓置於州門盜者便欲斬其手時人懼其無常能行異事姦偷畏之而暫息及爾朱榮舉兵向洛既憶入間疑俄而聞榮肆毒於河陰遂南奔蕭衍衍立為魏主號年更興衍遣其將軍王辨送置於境上以覬侵逼及齊獻武王既誅榮以悅高祖子宜承大業乃令人示意悅既至清狂如故動為罪失不可扶持乃止出帝初除大司馬卒
