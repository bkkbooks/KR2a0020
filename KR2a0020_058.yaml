body:
  text: 魏書卷五十三列傳第四十一李孝伯李沖李孝伯趙郡人也高平公順從父弟父曾少治鄭氏禮左氏春秋以教授為業郡三辟功曹不就門人勸之曾曰功曹之職雖曰鄉選高第猶是郡吏耳北面事人亦何容易州辟主簿到官月餘乃歎曰梁叔敬有云州郡之職徒勞人耳道之不行身之憂也遂還家講授太祖時徵拜博士出為趙郡太守令行禁止劫盜奔竄太宗嘉之并州丁零數為山東之害知曾能得百姓死力憚不入境賊於常山界得一死鹿謂趙郡地也賊長責之還令送鹿故處隣郡為之謠曰詐作趙郡鹿猶勝常山粟其見憚如此卒贈平南將軍荊州刺史栢仁子諡曰懿孝伯少傳父業博綜羣言美風儀動有法度從兄順言之於世祖徵為中散世祖見而異之謂順曰真卿家千里駒也遷祕書奏事中散轉侍郎光祿大夫賜爵南昌子加建威將軍委以軍國機密甚見親寵謀謨切祕時人莫能知也遷比部尚書以頻從征伐規略之功進爵壽光侯加建義將軍真君末車駕南伐將出彭城劉義隆子安北將軍徐州刺史武陵王駿遣將馬文恭率步騎萬餘至蕭城前軍擊破之文恭走免執其隊主蒯應義隆聞大駕南巡又遣其弟太尉江夏王義恭率衆赴彭城世祖至彭城登亞父冢以望城內遣送蒯應至小市門宣世祖詔勞問義恭等并遣自陳蕭城之敗義恭等問應魏帝自來以不應曰自來又問今在何處應曰在城西南又問士馬多少應曰中軍四十餘萬駿遣人獻酒二器甘蔗百梃并請駱駝世祖明旦復登亞父冢遣孝伯至小市駿亦遣其長史張暢對孝伯孝伯遙問暢姓暢曰姓張孝伯曰是張長史也暢曰君何得見識孝伯曰既涉此境何容不悉暢問孝伯曰君復何姓居何官也孝伯曰我戎行一夫何足致問然足與君相敵孝伯曰主上有詔太尉安北可暫出門欲與相見朕亦不攻彭城何為勞苦將士城上嚴備今遣賜駱駝及貂裘雜物暢曰有詔之言政可施於彼國何得稱之於此孝伯曰卿家太尉安北是人臣不暢曰是也孝伯曰我朝廷奄有萬國率土之濱莫敢不臣縱為隣國之君何為不稱詔於隣國之臣孝伯又問暢曰何至忽遽杜門絕橋暢曰二王以魏帝壁壘未立將士疲勞此精甲十萬人思致命恐輕相凌踐故且閉城耳待休息士馬然後共治戰場剋日交戲孝伯曰令行禁止主將常事宜當以法裁物何用發橋杜門窮城之中復何以十萬誇大我亦有良馬百萬復可以此相矜暢曰王侯設險何但法令而已也我若誇君當言百萬所以言十萬者正是二王左右素所畜養者耳此城內有數州士庶工徒營伍猶所未論我本鬬人不鬬馬足且冀之北土馬之所生君復何以逸足見誇也孝伯曰王侯設險誠如來言開閉有常何為杜塞絕橋之意義在何也此城守君之所習野戰我之所長我之恃馬猶如君之恃城耳城內有貝思者嘗至京師義恭遣視之思識是孝伯思前問孝伯曰李尚書行途有勞孝伯曰此事應相與共知思答曰緣共知所以仰勞孝伯曰感君至意既開門暢屏人却仗出受賜物孝伯曰詔以貂裘賜太尉駱駝騾馬賜安北蒲萄酒及諸食味當相與同進暢曰二王敬白魏帝知欲垂見常願面接但受命本朝忝居藩任人臣無境外之交故無容私覿義恭獻皮袴褶一具駿奉酒二器甘蔗百梃孝伯曰又有詔太尉安北久絕南信殊當憂悒若欲遣信者當為護送脫須騎者亦當以馬送之暢曰此方間路甚多使命日夕往復不復以此勞魏帝也孝伯曰亦知有水路似為白賊所斷暢曰君著白衣稱白賊也孝伯大笑曰今之白賊似異黃巾赤眉暢曰黃巾赤眉不在江南孝伯曰雖不在江南亦不離徐方也孝伯曰向與安北相聞何以久而不報暢曰二王貴遠啟聞為難孝伯曰周公握髮吐餔二王何獨貴遠暢曰握髮吐餐不謂隣國之人也孝伯曰本邦尚爾隣國彌應盡恭且賓至有禮主人宜以禮接暢曰昨見衆賓至門未為有禮孝伯曰非是賓至無禮直是主人怱怱無待賓調度耳孝伯又言有詔程天祚一介常人誠知非江南之選近於汝陽身被九槍落在水我使牽而出之凡人骨肉分張並思集聚聞其弟在此如何不遣暫出尋自令反豈復苟留一人暢曰知欲程天祚兄弟集聚已勒遣之但其固辭不往孝伯曰豈有子弟聞其父兄而反不肯相見此便禽獸之不若貴土風俗何至如此世祖又遣賜義恭駿等氈各一領鹽各九種并胡豉孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自食黑鹽治腹脹氣滿末之六銖以酒而服胡鹽治目痛戎鹽治諸瘡赤鹽駁鹽臭鹽馬齒鹽四種並非食鹽太尉安北何不遣人來至朕間彼此之情雖不可盡要復見朕小大知朕老少觀朕為人暢曰魏帝久為往來所具李尚書親自銜命不患彼此不盡故不復遣信義恭獻蠟燭十梃駿獻錦一匹孝伯曰君南土士人何為著屩君而著此將士云何暢曰士人之言誠為多愧但以不武受命統軍戎陳之間不容緩服孝伯曰永昌王自頃鎮長安今領精騎八萬直造淮南壽春亦閉門自固不敢相禦向送劉康祖首彼之所見王玄謨甚是所悉亦是常才耳何意作如此任使以致奔敗自入境七百餘里主人竟不能一相拒抗鄒山之險彼之所憑前鋒始得接手崔邪利便爾入穴將士倒曳出之主上丐其生命今從在此復何以輕脫遣馬文恭至蕭縣使望風退撓也彼之民人甚相忿怨言清平之時賦我租帛至有急難不能相拯暢曰知永昌已過淮南康祖為其所破比有信使無此消息王玄謨南土偏將不謂為才但以其北人故為前驅引導耳大軍未至而河冰向合玄謨量宜反旆未為失算但因夜回歸致戎馬驚亂耳我家懸瓠小城陳憲小將魏帝傾國攻圍累旬不克胡盛之偏裨小帥衆無三旅始濟翮水魏國君臣奔散僅得免脫滑臺之師無所多愧鄒山小戍雖有微險河畔之民多是新附始慕政化姦盜未息示使崔邪利撫之而已今雖陷沒何損於國魏帝自以十萬之師而制一崔邪利乃復足言也近聞蕭縣百姓並依山險聊遣馬文恭以十隊迎之耳文恭前以三隊出還走彼大營嵇玄敬以百舸至留城魏軍奔敗輕敵致此亦非所卹王境人民列居河畔二國交兵當互加撫養而魏師入境事生意外官不負民民亦何怨知入境七百里無相捍拒此自上由太尉神算次在武陵聖略軍國之要雖不預聞然用兵有機間亦不容相語孝伯曰君藉此虛談支離相對可謂遁辭知其所窮且主上當不圍此城自率衆軍直造瓜步南事若辦城故不待攻圍南行不捷彭城亦非所欲也我今當南欲飲馬江湖耳暢曰去留之事自適彼懷若魏帝遂得飲馬長江便為無復天道孝伯曰自北而南實惟人化飲馬長江豈獨天道暢將還城謂孝伯曰冀蕩定有期相見無遠君若得還宋朝今為相識之始孝伯曰今當先至建業以待君耳恐爾日君與二王面縛請罪不暇為容孝伯風容閑雅應答如流暢及左右甚相嗟歎世祖大喜進爵宣城公興安二年出為使持節散騎常侍平西將軍秦州刺史太安五年卒高宗甚悼惜之贈鎮南大將軍定州刺史諡曰文昭公孝伯體度恢雅明達政事朝野貴賤咸推重之恭宗曾啟世祖廣徵俊秀世祖曰朕有一孝伯足治天下何用多為假復求訪此人輩亦何可得其見賞如此性方慎忠厚每朝廷大事有不足必手自書表切言陳諫或不從者至於再三削滅稿草家人不見公庭論議常引綱紀或有言事者孝伯恣其所陳假有是非終不抑折及見世祖言其所長初不隱人姓名以為己善故衣冠之士服其雅正自崔浩誅後軍國之謀咸出孝伯世祖寵眷有亞於浩亦以宰輔遇之獻替補闕其迹不見時人莫得而知也卒之日遠近哀傷焉孝伯美名聞於遐邇李彪使於江南蕭賾謂之曰孝伯於卿遠近其為遠人所知若此孝伯妻崔賾女高明婦人生一子元顯崔氏卒後納翟氏不以為妻也憎忌元顯後遇劫元顯見害世云翟氏所為也元顯志氣甚高為時人所傷惜翟氏二子安民安上並有風度安民襲爵壽光侯司徒司馬卒贈郢州刺史無子爵除安上鉅鹿太守亦早卒安民弟豹子正光三年上書曰竊惟庸勳賞勞有國典興滅繼絕哲后所先是以積德累忠春秋許宥十世立功著節河山誓其永久伏惟世祖太武皇帝英叡自天籠罩日域東清遼海西定玉門凌滅漠北飲馬江水臣亡父故尚書宣城公先臣孝伯冥基感會邀幸昌辰綢繆幃幄繾綣侍從廟算嘉謀每蒙顧採于時儲后監國奏請徵賢詔報曰朕有一孝伯足以治天下何用多為其見委遇乃至於此是用寵以元凱爵以公侯詔冊曰江陽之巡奇謀屢進六師大捷亦有勳焉出內勤王寵遇隆厚方開大賞而世祖登遐梓宮始遷外任名岳高宗沖年纂運未及追臣行舛百靈先臣棄世微績未甄誠志長奪搢紳僉傷早世朝野咸哀不永臣亡兄襲無子封除永惟宗構五情崩圮先臣榮寵前朝勳書王府同之常倫爵封堙墜準古量今實深荼苦竊惟朝例廣川王遵太原公元大曹等並以勳重先朝世絕繼祀或以傍親或聽弟襲皆傳河山之功垂不世之賞況先臣在蒙委任運籌幃帟勳著於中聲傳於外事等功均今古無易是以漢賞信布裁重良平魏酬張徐不棄荀郭今數族追賞於先朝之世先臣絕封於聖明之時瞻流顧侶存亡永恨竊見正始中爰發存亡之詔褒賢報功之旨熙平元年故任城王澄所請十事復新前澤成一時之盛事垂曠代之茂典凡在纓紱誰不感慶蓋以奬勸來今垂範萬古且劉氏偽書翻流上國尋其訕謗百無一實前後使人不書姓字亦無名爵至於張暢傳中略先臣對問雖改脫略盡自欲矜高然逸韻難虧猶見稱載非直存益於時沒亦有彰國美乞覽此書昭然可見則微微衰構重起一朝先臣潛魂結草於千載矣卒不得襲孝伯兄祥字元善學傳家業鄉黨宗之世祖詔州郡舉賢良祥應貢對策合旨除中書博士時南土未賓世祖親駕遣尚書韓元興率衆出青州以祥為軍司略地至于陳汝淮北之民詣軍降者七千餘戶遷之於兗豫之南置淮陽郡以撫之拜祥為太守加綏遠將軍流民歸之者萬餘家勸課農桑百姓安業世祖嘉之賜以衣馬遷河間太守有威恩之稱太安中徵拜中書侍郎民有千餘上書乞留數年高宗不許卒官追贈定州刺史平棘子諡曰憲子安世幼而聰悟興安二年高宗引見侍郎博士之子簡其秀儁者欲為中書學生安世年十一高宗見其尚小引問之安世陳說父祖甚有次第即以為學生高宗每幸國學獨被引問詔曰汝但守此至大不慮不富貴居父憂以孝聞天安初拜中散以溫敏敬慎顯祖親愛之累遷主客令蕭賾使劉纘朝貢安世美容貌善舉止纘等自相謂曰不有君子其能國乎纘等呼安世為典客安世曰三代不共禮五帝各異樂安足以亡秦之官稱於上國纘曰世異之號凡有幾也安世曰周謂掌客秦改典客漢名鴻臚今曰主客君等不欲影響文武而殷勤亡秦纘又指方山曰此山去燕然遠近安世曰亦由石頭之於番禺耳國家有江南使至多出藏內珍物令都下富室好容服者貨之令使任情交易使至金玉肆問價纘曰北方金玉大賤當是山川所出安世曰聖朝不貴金玉所以賤同瓦礫又皇上德通神明山不愛寶故無川無金無山無玉纘初將大市得安世言慚而罷遷主客給事中時民困飢流散豪右多有占奪安世乃上疏曰臣聞量地畫野經國大式邑地相參致治之本井稅之興其來日久田萊之數制之以限蓋欲使土不曠功民罔游力雄擅之家不獨膏腴之美單陋之夫亦有頃畝之分所以恤彼貧微抑茲貪欲同富約之不均一齊民於編戶竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事涉數世三長既立始返舊墟廬井荒毀桑榆改植事已歷遠易生假冒強宗豪族肆其侵凌遠認魏晉之家近引親舊之驗又年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑爭訟遷延連紀不判良疇委而不開柔桑枯而不採僥倖之徒興繁多之獄作欲令家豐歲儲人給資用其可得乎愚謂今雖桑井難復宜更均量審其徑術令分藝有準力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均於兆庶如阜如山可有積於比戶矣又所爭之田宜限年斷事久難明悉屬今主然後虛妄之民絕望於覬覦守分之士永免於凌奪矣高祖深納之後均田之制起於此矣出為安平將軍相州刺史假節趙郡公敦勸農桑禁斷淫祀西門豹史起有功於民者為之修飾廟堂表薦廣平宋翻陽平路恃慶皆為朝廷善士初廣平人李波宗族強盛殘掠生民前刺史薛道襀親往討之波率其宗族拒戰大破襀軍遂為逋逃之藪公私成患百姓為之語曰李波小妹字雍容褰裙逐馬如卷蓬左射右射必疊雙婦女尚如此男子那可逢安世設方略誘波及諸子姪三十餘人斬于鄴市境內肅然以病免太和十七年卒于家安世妻博陵崔氏生一子瑒崔氏以妬悍見出又尚滄水公主生二子謐郁瑒字琚羅涉歷史傳頗有文才氣尚豪爽公強當世延昌末司徒行參軍遷司徒長兼主簿太師高陽王雍表薦瑒為其友正主簿于時民多絕戶而為沙門瑒上言禮以教世法導將來跡用既殊區流亦別故三千之罪莫大不孝不孝之大無過於絕祀然則絕祀之罪重莫甚焉安得輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶須裁之以禮一身親老棄家絕養既非人理尤乖禮情堙滅大倫且闕王貫交缺當世之禮而求將來之益孔子云未知生焉知死斯言之至亦為備矣安有棄堂堂之政而從鬼教乎又今南服未靜衆役仍煩百姓之情方多避役若復聽之恐捐棄孝慈比屋而是沙門都統僧暹等忿瑒鬼教之言以瑒為謗毀佛法泣訴靈太后太后責之瑒自理曰竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毀且鬼神之名皆通靈達稱自百代正典三皇五帝皆號為鬼天地曰神祇人死曰鬼易曰知鬼神之情狀周公自美亦云能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼教佛非天非地本出於人應世導俗其道幽隱名之為鬼愚謂非謗且心無不善以佛道為教者正可未達衆妙之門耳靈太后雖知瑒言為允然不免暹等之意猶罰瑒金一兩轉尚書郎加伏波將軍隨蕭寶夤西征以瑒為統軍假寧遠將軍瑒德洽鄉閭招募雄勇其樂從者數百騎瑒傾家賑恤率之西討寶夤見瑒至乃拊瑒肩曰子遠來吾事辦矣故其下每有戰功軍中號曰李公騎寶夤又啟瑒為左丞仍為別將軍機戎政皆與參決寶夤又啟為中書侍郎還朝除鎮遠將軍岐州刺史坐辭不赴任免官建義初於河陰遇害時年四十五初贈鎮東將軍尚書右僕射殷州刺史太昌中重贈散騎常侍驃騎大將軍儀同三司冀州刺史瑒俶儻有大志好飲酒篤於親知每謂弟郁曰士大夫學問稽博古今而罷何用專經為老博士也與弟謐特相友愛謐在鄉物故瑒慟哭絕氣久而方蘇不食數日期年之中形骸毀悴人倫哀歎之瑒三子長子義盛武定中司徒倉曹參軍瑒弟謐字永和在逸士傳謐弟郁字永穆好學沉靜博通經史自著作佐郎為廣平王懷友懷深相禮遇時學士徐遵明教授山東生徒甚盛懷徵遵明在館令郁問其五經義例十餘條遵明所答數條而已稍遷國子博士自國學之建諸博士率不講說朝夕教授惟郁而已謙虛雅寬甚有儒者之風遷廷尉少卿加冠軍將軍轉通直散騎常侍建義中以兄瑒卒遂撫育孤姪歸於鄉里永熙初除散騎常侍大將軍左光祿大夫兼都官尚書尋領給事黃門侍郎三年春於顯陽殿講禮詔郁執經解說不窮羣難鋒起無廢談笑出帝及諸王公凡預聽者莫不嗟善尋病卒贈散騎常侍都督定冀相滄殷五州軍事驃騎大將軍尚書左僕射儀同三司定州刺史子士謙儀同開府參軍事李沖字思順隴西人敦煌公寶少子也少孤為長兄滎陽太守承所攜訓承常言此兒器量非方為門戶所寄沖沈雅有大量隨兄至官是時牧守子弟多侵亂民庶輕有乞奪沖與承長子韶獨清簡皎然無所求取時人美焉顯祖末為中書學生沖善交遊不妄戲雜流輩重之高祖初以例遷祕書中散典禁中文事以修整敏惠漸見寵待遷內祕書令南部給事中舊無三長惟立宗主督護所以民多隱冒五十三十家方為一戶沖以三正治民所由來遠於是創三長之制而上之文明太后覽而稱善引見公卿議之中書令鄭羲祕書令高祐等曰沖求立三長者乃欲混天下一法言似可用事實難行羲又曰不信臣言但試行之事敗之後當知愚言之不謬太尉元丕曰臣謂此法若行於公私有益咸稱方今有事之月校比民戶新舊未分民必勞怨請過今秋至冬閑月徐乃遣使於事為宜沖曰民者冥也可使由之不可使知之若不因調時百姓徒知立長校戶之勤未見均徭省賦之益心必生怨宜及課調之月令知賦稅之均既識其事又得其利因民之欲為之易行著作郎傅思益進曰民俗既異險易不同九品差調為日已久一旦改法恐成擾亂太后曰立三長則課有常準賦有分苞蔭之戶可出僥倖之人可止何為而不可羣議雖有乖異然惟以變法為難更無異義遂立三長公私便之遷中書令加散騎常侍給事中如故尋轉南部尚書賜爵順陽侯沖為文明太后所幸恩寵日盛賞賜月至數千萬進爵隴西公密致珍寶御物以充其第外人莫得而知焉沖家素清貧於是始為富室而謙以自牧積而能散近自姻族逮于鄉閭莫不分及虛己接物垂念羇寒衰舊淪屈由之躋者亦以多矣時以此稱之初沖兄佐與河南太守來崇同自涼州入國素有微嫌佐因緣成崇罪餓死獄中後崇子護又糾佐贓罪佐及沖等悉坐幽繫會赦乃免佐甚銜之至沖寵貴綜攝內外護為南部郎深慮為沖所陷常求退避而沖每慰撫之護後坐贓罪懼必不濟沖乃具奏與護本末嫌隙原恕之遂得不坐沖從甥陰始孫孤貧往來沖家至如子姪有人求官因其納馬於沖始孫受輒而不為言後假方便借沖此馬馬主見沖乘馬而不得官後乃自陳始末沖聞之大驚執始孫以狀款奏始孫坐死其處要自厲不念愛惡皆此類也是時循舊王公重臣皆呼其名高祖常謂沖為中書而不名之文明太后崩後高祖居喪引見待接有加及議禮儀律令潤飾辭旨刊定輕重高祖雖自下筆無不訪決焉沖竭忠奉上知無不盡出入憂勤形於顏色雖舊臣戚輔莫能逮之無不服其明斷慎密而歸心焉於是天下翕然及殊方聽望咸宗奇之高祖亦深相杖信親敬彌甚君臣之間情義莫二及改置百司開建五等以沖參定典式封滎陽郡開國侯食邑八百戶拜廷尉卿尋遷侍中吏部尚書咸陽王師東宮既建拜太子少傅高祖初依周禮置夫嬪之列以沖女為夫人詔曰昔軒皇誕御垂棟宇之構爰歷三代興宮觀之式然茅茨土堦昭德於上代層臺廣厦崇威於中葉良由文質異宜華樸殊禮故也是以周成繼業營明堂於東都漢祖聿興建未央於咸鎬蓋所以尊嚴皇威崇重帝德豈好奢惡儉苟弊民力者哉我皇運統天協纂乾曆銳意四方未遑建制宮室之度頗為未允太祖初基雖粗有經式自茲厥後復多營改至於三元慶饗萬國充庭觀光之使具瞻有闕朕以寡德猥承洪緒運屬休期事鍾昌運宜遵遠度式茲宮宇指訓規模事昭於平日明堂太廟已成於昔年又因往歲之豐資藉民情之安逸將以今春營改正殿違犯時令行之惕然但朔土多寒事殊南夏自非裁度當春興役徂暑則廣制崇基莫由克就成功立事非委賢莫可改制規模非任能莫濟尚書沖器懷淵博經度明遠可領將作大匠司空長樂公亮可與大匠共監興繕其去故崇新之宜修復太極之制朕當別加指授車駕南伐加沖輔國大將軍統衆翼從自發都至於洛陽霖雨不霽仍詔六軍發軫高祖戎服執鞭御馬而出羣臣啟顙於馬首之前高祖曰長驅之謀廟算已定今大軍將進公等更欲何云沖進曰臣等不能折衝帷幄坐制四海而令南有竊號之渠實臣等之咎陛下以文軌未一親勞聖駕臣等誠思亡軀盡命効死戎行然自離都淫雨士馬困弊前路尚遙水潦方甚且伊洛境內小水猶尚致難況長江浩汗越在南境若營舟檝必須停滯師老糧乏進退為難矜喪反旆於義為允高祖曰一同之意前已具論卿等正以水雨為難然天時頗亦可知何者夏既炎旱秋故雨多玄冬之初必當開爽比後月十間若雨猶不已此乃天也脫於此而晴行則無害古不伐喪謂諸侯同軌之國非王者統一之文已至於此何容停駕沖又進曰今者之舉天下所不願唯陛下欲之漢文言吾獨乘千里馬竟何至也臣有意而無其辭敢以死請高祖大怒曰方欲經營宇宙一同區域而卿等儒生屢疑大計斧鉞有常卿勿復言策馬將出於是大司馬安定王休兼左僕射任城王澄等並殷勤泣諫高祖乃諭羣臣曰今者興動不小動而無成何以示後苟欲班師無以垂之千載朕仰惟遠祖世居幽漠違衆南遷以享無窮之美豈其無心輕遺陵壤今之君子寧獨有懷當由天工人代王業須成故也若不南鑾即當移都於此光宅土中機亦時矣王公等以為何如議之所決不得旋踵欲遷者左不欲者右安定王休等相率如右前南安王楨進曰夫愚者闇於成事智者見於未萌行至德者不議於俗成大功者不謀於衆非常之人乃能建非常之事廓神都以延王業度土中以制帝京周公啟之於前陛下行之於後故其宜也且天下至重莫若皇居人之所貴寧如遺體請上安聖躬下慰民望光宅中原輟彼南伐此臣等願言蒼生幸甚羣臣咸唱萬歲高祖初謀南遷恐衆心戀舊乃示為大舉因以脅定羣情外名南伐其實遷也舊人懷土多所不願內憚南征無敢言者於是定都洛陽沖言於高祖曰陛下方修周公之制定鼎成周然營建六寢不可遊駕待就興築城郛難以馬上營訖願暫還北都令臣下經造功成事訖然後備文物之章和玉鑾之響巡時南徙軌儀土中高祖曰朕將巡省方岳至鄴小停春始便還未宜遂不歸北尋以沖為鎮南將軍侍中少傅如故委以營構之任改封陽平郡開國侯邑戶如先車駕南伐以沖兼左僕射留守洛陽車駕渡淮別詔安南大將軍元英平南將軍劉藻討漢中召雍涇岐三州兵六千人擬戍南鄭克城則遣沖表諫曰秦州險阨地接羌夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄茲未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脫終攻不克徒動民情連胡結夷事或難測輒依旨密下刺史待軍克鄭城然後差遣如臣愚見猶謂未足何者西道險阨單徑千里今欲深戍絕界之外孤據羣賊之中敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷寇所守意在惜地校之二義德有淺深惠聲已遠何遽於一城哉且魏境所掩九州過八民人所臣十分而九所未民者惟漠北之與江外耳羈之在近豈急急於今日也宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹將為吞并之舉今鍾離壽陽密邇未拔赭城新野跬步弗降所克者舍之而不取所降者撫之而旋戮東道既未可以近力守西蕃寧可以遠兵固若果欲置者臣恐終以資敵也又今建都土中地接寇壤方須大收死士平蕩江會輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死効未易可獲推此而論不戍為上高祖從之車駕還都引見沖等謂之曰本所以多置官者慮有令僕闇弱百事稽壅若明獨聰專則權勢大併今朕雖不得為聰明又不為劣闇卿等不為大賢亦不為大惡且可一兩年許少置官司高祖自鄴還京汎舟洪池乃從容謂沖曰朕欲從此通渠於洛南伐之日何容不從此入洛從洛入河從河入汴從汴入清以至於淮下船而戰猶出戶而鬬此乃軍國之大計今溝渠若須二萬人以下六十日有成者宜以漸修之沖對曰若爾便是士無遠涉之勞戰有兼人之力遷尚書僕射仍領少傅改封清淵縣開國侯邑戶如前乃太子恂廢沖罷少傅高祖引見公卿於清徽堂高祖曰聖人之大寶惟位與功是以功成作樂治定制禮今徙極中天創居嵩洛雖大構未成要自條紀略舉但南有未賓之豎兼兇蠻密邇朕夙夜悵惋良在於茲取南之計決矣朕行之謀必矣若依近代也則天子下帷深宮之內準上古也則有親行祚延七百魏晉不征旋踵而殞祚之修短在德不在征今但以行期未知早晚知幾其神乎朕既非神焉能知也而頃來陰陽卜術之士咸勸朕今征必克此既家國大事宜共君臣各盡所見不得以朕先言便致依違退有同異沖對曰夫征戰之法先之人事然後卜筮今卜筮雖吉猶恐人事未備今年秋稔有損常實又京師始遷衆業未定加之征戰以為未可宜至來秋高祖曰僕射之言非為不合朕意之所慮乃有社稷之憂然咫尺寇戎無宜自安理須如此僕射言人事未從亦不必如此朕去十七年擁二十萬衆行不出畿甸此人事之盛而非天時往年乘機天時乃可而闕人事又致不捷若待人事備復非天時若之何如僕射之言便終無征理朕若秋行無克捷三君子並付司寇不可不人盡其心罷議而出後世宗為太子高祖醼於清徽堂高祖曰皇儲所以纂歷三才光昭七祖斯乃億兆咸悅天人同泰故延卿就此一醼以暢忻情高祖又曰天地之道一盈一虛豈有常泰天道猶爾況人事乎故有升有黜自古而然悼往欣今良用深歎沖對曰東暉承儲蒼生咸幸但臣前忝師傅弗能弼諧仰慚天日慈造寬含得預此醼慶愧交深高祖曰朕尚弗能革其昏師傅何勞愧謝也後尚書疑元拔穆泰罪事沖奏曰前彭城鎮將元拔與穆泰同逆養子降壽宜從拔罪而太尉咸陽王禧等以為律文養子而為罪父及兄弟不知情者不坐謹審律意以養子於父非天性於兄弟非同氣敦薄既差故刑典有降是以養子雖為罪而父兄不預然父兄為罪養子不知謀易地均情豈獨從戮乎理固不然臣以為依據律文不追戮於所生則從坐於所養明矣又律惟言父不從子不稱子不從父當是優尊厲卑之義臣禧等以為律雖不正見互文起制於乞也舉父之罪於養也見子坐是為互起互起兩明無罪必矣若以嫡繼養與生同則父子宜均祇明不坐且繼養之注云若有別制不同此律又令文云諸有封爵若無親子及其身卒雖有養繼國除不襲是為有福不及己有罪便預坐均事等情律令之意便相矛盾伏度律旨必不然也臣沖以為指例條尋罪在無疑準令語情頗亦同式詔曰僕射之議據律明矣太尉等論於典矯也養所以從戮者緣其已免所生故不得復甄於所養此獨何福長處吞舟于國所以不襲者重列爵特立制因天之所絕推而除之耳豈復報對刑賞于斯則應死可特原之沖機敏有巧思北京明堂圓丘太廟及洛都初基安處郊兆新起堂寢皆資於沖勤志強力孜孜無怠旦理文簿兼營匠制几案盈積剞劂在手終不勞厭也然顯貴門族務益六姻兄弟子姪皆有爵官一家歲祿萬匹有餘是其親者雖復癡聾無不超越官次時論亦以此少之年纔四十而鬢髮班白姿貌豐美未有衰狀李彪之入京也孤微寡援而自立不羣以沖好士傾心宗附沖亦重其器學禮而納焉每言之於高祖公私共相援益及彪為中尉兼尚書為高祖知待便謂非復藉沖而更相輕背惟公坐斂袂而已無復宗敬之意也沖頗銜之後高祖南征沖與吏部尚書任城王澄並以彪倨傲無禮遂禁止之奏其罪狀沖手自作家人不知辭甚激切因以自劾高祖覽其表歎悵者久之既而曰道固可謂溢也僕射亦為滿矣沖時震怒數數責彪前後愆悖瞋目大呼投折几案盡收御史皆泥首面縛詈辱肆口沖素性溫柔而一旦暴恚遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人醫藥所不能療或謂肝藏傷裂旬有餘日而卒時年四十九高祖為舉哀於懸瓠發聲悲泣不能自勝詔曰沖貞和資性德義樹身訓業自家道素形國太和之始朕在弱齡早委機密實康時務鴻漸洛朝選開清升冠端右惟允出納忠肅柔明足敷睿範仁恭信惠有結民心可謂國之賢也朝之望也方昇寵秩以旌功舊奄致喪逝悲痛于懷既留勤應陟兼良宿宜褒可贈司空公給東園祕器朝服一具衣一襲贈錢三十萬布五百匹蠟二百斤有司奏諡曰文穆葬於覆舟山近杜預冢高祖之意也後車駕自鄴還洛路經沖墓左右以聞高祖臥疾望墳掩泣久之詔曰司空文穆公德為時宗勳簡朕心不幸徂逝託墳邙嶺旋鑾覆舟躬睇塋域悲仁惻舊有慟朕衷可遣太牢之祭以申吾懷及與留京百官相見皆沖亡沒之故言及流淚高祖得留臺啟知沖患狀謂右衞宋弁曰僕射執我樞衡總釐朝務清儉居躬知寵已久朕以仁明忠雅委以台司之寄使我出境無後顧之憂一朝忽有此患朕甚懷愴慨其相痛惜如此沖兄弟六人四母所出頗相忿及沖之貴封祿恩賜皆以共之內外輯睦父亡後同居二十餘年至洛乃別第宅更相友愛久無間然皆沖之德也始沖之見私寵也兄子韶有憂色慮致傾敗後榮名日顯稍乃自安而沖明目當官圖為己任自始迄終無所避屈其體時推運皆此類也子延寔等語在外戚傳史臣曰燕趙信多奇士李孝伯風範鑒略蓋亦過人遠甚世祖雄猜嚴斷崔浩已見誅夷而入參心膂出幹政事獻可替否無際可尋故能從容任遇以功名始卒其智器固以優乎安世識具通雅時幹之良瑒以豪俊達郁則儒博顯李沖早延寵眷入幹腹心風流識業固乃一時之秀終協契聖主佐命太和位當端揆身任梁棟德洽家門功著王室蓋有魏之亂臣也
