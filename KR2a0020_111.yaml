body:
  text: 前上十志啓臣收等啓昔子長命世偉才孟堅冠時特秀憲章前哲裁勒墳史紀傳之間申以書志緒言餘迹可得而聞叔峻刪緝後劉紹統削撰季漢十志實範遷固表蓋闕焉曹氏一代之籍了無具體典午終世之筆罕云周洽假復事播四夷盜聽間有小道俗言要奇好異考之雅舊咸乖實録自永嘉喪圮中原淆然偏僞小書殆無可取魏有天下跨蹤前載順末克讓善始令終階下極聖窮神奉天屈己顧眄百王指掌萬世深存有魏撫運之業永念神州人倫之緒臣等肅奉明詔刊著魏籍編紀次傳備聞天旨竊謂志之為用網羅遺逸載紀不可附傳非宜理切必在甄明事重尤應標著搜獵上下總括代終置之衆篇之後一統天人之迹褊心末識輒在於此是以晚始撰録彌歷炎涼採舊增新今乃斷筆時移世易理不刻船登閣含毫論殊致河溝往時之切釋老當今之重藝文前志可尋官氏魏代之急去彼取此敢率愚心謹成十志二十卷請續於傳末并前例目合一百三十一卷臣等妨官秉筆迄無可採塵黷旒冕墮深冰谷謹啓十一月持節都督梁州諸軍事驃騎將軍梁州刺史前著作郎富平縣開國子臣魏收啓平南將軍司空司馬修史臣辛元植冠軍將軍國子博士修史臣刁柔陵江將軍尚書左主客郎中修史臣高孝幹前西河太守修史臣綦母懷文
