body:
  text: 魏書卷六十六列傳第五十四李崇崔亮李崇字繼長小名繼伯頓丘人也文成元皇后第二兄誕之子年十四召拜主文中散襲爵陳留公鎮西大將軍高祖初為大使巡察冀州尋以本官行梁州刺史時巴氐擾動詔崇以本將軍為荊州刺史鎮上洛敕發陝秦二州兵送崇至治崇辭曰邊人失和本怨刺史奉詔代之自然易帖但須一宣詔旨而已不勞發兵自防使懷懼也高祖從之乃輕將數十騎馳到上洛宣詔綏慰當即帖然尋勒邊戍掠得蕭賾人者悉令還之南人感德仍送荊州之口二百許人兩境交和無復烽燧之警在治四年甚有稱績召還京師賞賜隆厚以本將軍除兗州刺史兗土舊多劫盜崇乃村置一樓樓懸一鼓盜發之處雙槌亂擊四面諸村始聞者撾鼓一通次復聞者以二為節次後聞者以三為節各擊數千槌諸村聞鼓皆守要路是以盜發俄頃之間聲布百里之內其中險要悉有伏人盜竊始發便爾擒送諸州置樓懸鼓自崇始也後例降為侯改授安東將軍東駕南征驃騎大將軍咸陽王禧都督左翼諸軍事詔崇以本官副焉徐州降人郭陸聚黨作逆人多應之搔擾南北崇遣高平人卜冀州詐稱犯罪逃亡歸陸陸納之以為謀主數月冀州斬陸送之賊徒潰散入為河南尹後車駕南討漢陽崇行梁州刺史氐楊靈珍遣弟婆羅與子雙領步騎萬餘襲破武興與蕭鸞相結詔崇為使持節都督隴右諸軍事率衆數萬討之崇槎山分進出其不意表𩹉以襲羣氐皆棄靈珍散歸靈珍衆減太半崇進據赤土靈珍又遣從弟建率五千人屯龍門躬率精勇一萬據鷲硤龍門之北數十里中伐樹塞路鷲硤之口積大木聚礌石臨崖下之以拒官軍崇乃命統軍慕容拒率衆五千從他路夜襲龍門破之崇乃自攻靈珍靈珍連戰敗走俘其妻子崇多設疑兵襲克武興蕭鸞梁州刺史陰廣宗遣參軍鄭猷王思考率衆援靈珍崇大破之并斬婆羅首殺千餘人俘獲猷等靈珍走奔漢中高祖在南陽覽表大悅曰使朕無西顧之憂者李崇之功也以崇為都督梁秦二州諸軍事本將軍梁州刺史高祖手詔曰今仇隴克清鎮捍以德文人威惠既宣實允遠寄故敕授梁州用寧邊服便可善思經略去其可除安其可育公私所患悉令芟夷及靈珍偷據白水崇擊破之靈珍遠遁世宗初徵為右衛將軍兼七兵尚書尋加撫軍將軍正尚書轉左衛將軍相州大中正魯陽蠻柳北喜魯北燕等聚衆反叛諸蠻悉應之圍逼湖陽游擊將軍李暉先鎮此城盡力捍禦賊勢甚盛詔以崇為使持節都督征蠻諸軍事以討之蠻衆數萬屯據形要以拒官軍崇纍戰破之斬北燕等徙萬餘戶於幽并諸州世宗追賞平氐之功封魏昌縣開國伯邑五百戶東荊州蠻樊安聚衆於龍山僭稱大號蕭衍共為脣齒遣兵應之諸將擊討不利乃以崇為使持節散騎常侍都督征蠻諸軍事進號鎮南將軍率步騎以討之崇分遣諸將攻擊賊壘連戰克捷生擒樊安進討西荊諸蠻悉降詔以崇為使持節兼侍中東道大使黜陟能否著賞罰之稱轉中護軍出除散騎常侍征南將軍揚州刺史詔曰應敵制變算非一途救左擊右疾雷均勢今朐山蟻寇久結未殄賊衍狡詐或生詭劫宜遣鋭兵備其不意崇可都督淮南諸軍事坐敦威重遙運聲算延昌初加侍中車騎將軍都督江西諸軍事刺史如故先是壽春縣人苟泰有子三歲遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言己子並有鄰證郡縣不能斷崇曰此易知耳令二父與兒各在別處禁經數旬然後遣人告之曰君兒遇患向已暴死有教解禁可出奔哀也苟泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇察知之乃以兒還泰詰奉伯詐狀奉伯乃款引云先亡一子故妄認之又定州流人解慶賓兄弟坐事俱徙揚州弟思安背役亡歸慶賓懼後役追責規絶名貫乃認城外死尸詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫陽氏自云見鬼說思安被害之苦飢渴之意慶賓又誣疑同軍兵蘇顯甫李蓋等所殺經州訟之二人不勝楚毒各自款引獄將決竟崇疑而停之密遣二人非州內所識者為從外來詣慶賓告曰僕住在此州去此三百比有一人見過寄宿夜中共語疑其有異便即詰問迹其由緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賓今住揚州相國城內嫂姓徐君脫矜愍為往報告見申委曲家兄聞此必重相報所有資財當不愛惜今但見質若往不獲送官何晚是故相造指申此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賓悵然失色求其少停當備財物此人具以報崇攝慶賓問曰爾弟逃亡何故妄認他尸慶賓伏引更問蓋等乃云自誣數日之間思安亦為人縛送崇召女巫視之鞭笞一百崇斷獄精審皆此類也時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨羣飛入城與鵲爭巢五月大霖雨十有三日大水入城屋宇皆沒崇與兵泊於城上水增未已乃乘船附於女牆城不沒者二板而已州府勸崇棄壽春保北山崇曰吾受國重恩忝守藩嶽德薄招災致此大水淮南萬里繫于吾身一旦動腳百姓瓦解揚州之地恐非國物昔王尊慷慨義感黃河吾豈愛一軀取愧千載但憐茲士庶無辜同死可桴筏隨高人規自脫吾必守死此城幸諸君勿言時州人裴絢等受蕭衍假豫州刺史因乘大水謀欲為亂崇皆擊滅之崇以洪水為災請罪解任詔曰卿居藩纍年威懷兼暢資儲豐溢足制徑寇然夏雨泛濫斯非人力何得以此辭解今水涸路通公私復業便可繕甲積糧修復城雉勞恤士庶務盡綏懷之略也崇又表請解州詔報不聽是時非崇則淮南不守矣崇沉深有將略寬厚善御衆在州凡經十年常養壯士數千人寇賊侵邊所向摧破號曰臥虎賊甚憚之蕭衍惡其久在淮南屢設反間無所不至世宗雅相委重衍無以措其姦謀衍乃授崇車騎大將軍開府儀同三司萬戶郡公諸子皆為縣侯欲以構崇崇表言其狀世宗屢賜璽書慰勉之賞賜珍異歲至五三親待無與為比衍每歎息服世宗之能任崇也肅宗踐祚褒賜衣馬及蕭衍遣其游擊將軍趙祖悅襲據西硤石更築外城逼徙緣淮之人於城內又遣二將昌義之王神念率水軍泝淮而上規取壽春田道龍寇邊城路長平寇五門胡興茂寇開霍揚州諸戍皆被寇逼崇分遣諸將與之相持密裝船艦二百餘艘教之水戰以待臺軍蕭衍霍州司馬田休等率衆寇建安崇遣統軍李神擊走之又命邊城戍主邵申賢要其走路破之於濡水俘斬三千餘人靈太后璽書勞勉許昌縣令兼紵麻戍主陳平玉南引衍軍以戍歸之崇自秋請援表至十餘詔遣鎮南將軍崔亮救硤石鎮東將軍蕭寶夤於衍堰上流決淮東注朝廷以諸將乖角不相順赴乃以尚書李平兼右僕射持節節度之崇遣李神乘鬬艦百餘艘沿淮與李平崔亮合攻硤石李神水軍克其東北外城祖悅力屈乃降語在平傳朝廷嘉之進號驃騎將軍儀同三司刺史都督如故衍淮堰未破水勢日增崇乃於硤石戍間編舟為橋北更立船樓十各高三丈十步置一籬至兩岸蕃板裝治四箱解合賊至舉用不戰解下又於樓船之北連覆大船東西竟水防賊火又於八公山之東南更起一城以備大水州人號曰魏昌城崇纍表解州前後十餘上肅宗乃以元志代之尋除都督冀定瀛三州諸軍事驃騎大將軍冀州刺史儀同如故不行崇上表曰臣聞世室明堂顯於周夏二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黃髮以詢格言育青襟而敷典式用能享國久長風徽萬祀者也故孔子稱巍巍乎其有成功郁郁乎其有文章此其盛矣爰暨亡秦政失其道坑儒滅學以蔽黔首國無黌序之風野有非時之役故九服分崩祚終二世炎漢勃興更修儒術文景已降禮樂復彰化致升平治幾刑措故西京有六學之美東都有三本之盛莫不紛綸掩藹響流無已逮自魏晉撥亂相因兵革之中學校不絶遺文燦然方軌前代仰惟高祖孝文皇帝稟聖自天道鏡今古徙馭嵩河光宅函洛模唐虞以革軌儀規周漢以新品制列教序於鄉黨敦詩書於郡國使揖讓之禮橫被於崎嶇歌詠之音聲溢於仄陋但經始事殷戎軒屢駕未遑多就弓劍弗追世宗統曆聿遵先緒永平之中大興板築續以水旱戎馬生郊雖逮為山還停一簣竊惟皇遷中縣垂二十祀而明堂禮樂之本乃鬱荊棘之林膠序德義之基空盈牧竪之跡城隍嚴固之重闕磚石之工墉堞顯望之要少樓榭之飾加以風雨稍侵漸致虧墜又府寺初營頗亦壯美然一造至今更不修繕廳宇凋朽牆垣頽壞皆非所謂追隆堂構儀形萬國者也伏聞朝議以高祖大造區夏道侔姬文擬祀明堂式配上帝今若基宇不修仍同丘畎即使高皇神享闕於國陽宗事之典有聲無實此臣子所以匪寧億兆所以失望也臣又聞官方授能所以任事事既任矣酬之以祿如此上無曠官之譏下絶尸素之謗今國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗哉昔劉向有言王者宜興辟雍陳禮樂以風化天下夫禮樂所以養人刑法所以殺人而有司勤勤請定刑法至於禮樂則曰未敢是則敢於殺人不敢於養人也臣以為當今四海清平九服寧晏經國要重理應先營脫復稽延則劉向之言徵矣但事不兩興須有進退以臣愚量宜罷尚方雕靡之作頗省永寧土木之功并減瑤光材瓦之力兼分石窟鐫琢之勞及諸事役非急者三時農隙修此數條使辟雍之禮蔚爾而復興諷誦之音煥然而更作美榭高墉嚴壯於外槐宮棘宇顯麗於中道發明令重遵鄉飲敦進郡學精課經業如此則元凱可得之於上序游夏可致之於下國豈不休歟誠知佛理淵妙含識所宗然比之治要容可小緩苟使魏道熙緝元首唯康爾乃經營未為晚也靈太后令曰省表具悉體國之誠配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧年和歲稔當敕有司別議經始除中書監驃騎大將軍儀同如故又授右光祿大夫出為使持節侍中都督定幽燕瀛四州諸軍事本將軍定州刺史儀同如故徵拜尚書左僕射加散騎常侍驃騎儀同如故遷尚書令加侍中崇在官和厚明於決斷受納辭訟必理在可推始為下筆不徒爾收領也然性好財貨販肆聚斂家資巨萬營求不息子世哲為相州刺史亦無清白狀鄴洛市收擅其利為時論所鄙蠕蠕主阿那瓌率衆犯塞詔崇以本官都督北討諸軍事以討之崇辭於顯陽殿戎服武飾志氣奮揚時年六十九幹力如少肅宗目而壯之朝廷莫不稱善崇遂出塞三千餘里不及賊而還後北鎮破落汗拔陵反叛所在響應征北將軍臨淮王彧大敗於五原安北將軍李叔仁尋敗於白道賊衆日甚詔引丞相令僕尚書侍中黃門於顯陽殿詔曰朕比以鎮人搆逆登遣都督臨淮王克時除翦軍屆五原前鋒失利二將殞命兵士挫衄又武川乖防復陷凶手恐賊勢侵淫寇連朔金陵在彼夙夜憂惶諸人宜陳良策以副朕懷吏部尚書元修義曰強寇充斥事須得討臣謂須得重貴鎮壓朔總彼師旅備衛金陵詔曰去歲阿那瓌叛逆遣李崇令北征崇遂長驅塞北返旆榆關此亦一時之盛崇乃上表求改鎮為州罷削舊貫朕于時以舊典難革不許其請尋李崇此表開諸鎮非異之心致有今日之事但既往難追為復略論此耳朕以李崇國戚望重器識英斷意欲還遣崇行總督三軍揚旌朔除彼羣盜諸人謂可爾以不僕射蕭寶夤等曰陛下以舊都在北憂慮金陵臣等實懷悚息李崇德位隆重社稷之臣陛下此遣實合羣望崇啓曰臣實無用猥蒙殊寵位妨賢路遂充北伐徒勞將士無勳而還慚負聖朝於今莫已臣以六鎮幽垂與賊接對鳴柝聲弦弗離旬朔州名差重於鎮謂實可悅彼心使聲教日揚微塵去塞豈敢導此凶源開生賊意臣之愆負死有餘責屬陛下慈寬賜全腰領今更遣臣北行正是報恩改過所不敢辭但臣年七十自惟老疾不堪敵場更願英賢收功盛日於是詔崇以本官加使持節開府北討大都督撫軍將軍崔暹鎮軍將軍廣陵王淵皆受崇節度又詔崇子光祿大夫神軌假平北將軍隨崇北討崇至五原崔暹大敗于白道之北賊遂并力攻崇崇與廣陵王淵力戰纍破賊衆相持至冬乃引還平城淵表崇長史祖瑩詐增功級盜沒軍資崇坐免官爵徵還以後事付淵後徐州刺史元法僧以彭城南叛時除安樂王鑒為徐州刺史以討法僧為法僧所敗單馬奔歸乃詔復崇官爵為徐州大都督節度諸軍事會崇疾篤乃以衛將軍安豐王延明代之改除開府相州刺史侍中將軍儀同並如故孝昌元年薨於位時年七十一贈侍中驃騎大將軍司徒公雍州刺史諡曰武康後重贈太尉公增邑一千戶餘如故長子世哲性輕率供奉豪侈少經征役頗有將用自司徒中兵參軍超為征虜將軍驍騎將軍尋遷後將軍為三關別將討羣蠻大破之斬蕭衍龍驤將軍文思之等還拜鴻臚少卿性傾巧善事人亦以貨賂自達高肇劉騰之處勢也皆與親善故世號為李錐肅宗末遷宗正卿加平南將軍轉大司農卿仍本將軍又改授太僕卿加鎮東將軍尋出為相州刺史將軍如故世哲至州斥逐細人遷徙佛寺逼買其地廣興第宅百姓患之崇北征之後徵兼太常卿御史高道穆毀發其宅表其罪過後除鎮西將軍涇州刺史賜爵衛國子正光五年七月卒賻帛五百匹朝服一襲贈散騎常侍衛將軍吏部尚書冀州刺史子如故世哲弟神軌受父爵陳留侯自給事中稍遷員外常侍光祿大夫纍出征討頗有將領之氣孝昌中為靈太后寵遇勢傾朝野時云見幸帷幄與鄭儼為雙時人莫能明也頻遷征東將軍武衛將軍給事黃門侍郎常領中書舍人時相州刺史安樂王鑒據州反詔神軌與都督源子雍等討平之武泰初蠻帥李洪扇動諸落伊闕已東至於鞏縣多被燒劫詔神軌為都督破平之爾朱榮之向洛也復為大都督率衆禦之出至河橋值北中不守遂便退還尋與百官候駕於河陰仍遇害焉建義初贈侍中驃騎大將軍司空公相州刺史諡曰烈崔亮字敬儒清河東武城人也父元孫劉駿尚書郎劉彧之僭立也彧青州刺史沈文秀阻兵叛之彧使元孫討文秀為文秀所害亮母房氏攜亮依冀州刺史崔道固於歷城道固即亮之叔祖也及慕容白曜之平三齊內徙桑乾為平齊民時年十歲常依季父幼孫居家貧傭書自業時隴西李沖當朝任事亮從兄光往依之謂亮曰安能久事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書於市安能看人眉睫乎光言之於沖沖召亮與語因謂亮曰比見卿先人相命論使人胸中無復怵迫之念今遂亡本卿能記之不亮即為誦之涕淚交零聲韻不異沖甚奇之迎為館客沖謂其兄子彥曰大崔生寬和篤雅汝宜友之小崔生峭整清徹汝宜敬之二人終將大至沖薦之為中書博士轉議郎尋遷尚書二千石郎高祖在洛欲創革舊制選置百官謂羣臣曰與朕舉一吏部郎必使才望兼允者給卿三日假又一日高祖曰朕已得之不煩卿輩也馳驛徵亮兼吏部郎俄為太子中舍人遷中書侍郎兼尚書左丞亮雖歷顯任其妻不免親事舂簸高祖聞之嘉其清貧詔帶野王令世宗親政遷給事黃門侍郎仍兼吏部郎領青州大中正亮自參選事垂將十年廉慎明決為尚書郭祚所委每云非崔郎中選事不辦尋除散騎常侍仍為黃門遷度支尚書領御史中尉自遷都之後經略四方又營洛邑費用甚廣亮在度支別立條格歲省億計又議修汴蔡二渠以通邊運公私賴焉侍中廣平王懷以母弟之親左右不遵憲法敕亮推治世宗禁懷不通賓客者久之後因宴集懷恃親使忿欲陵突亮亮乃正色責之即起於世宗前脫冠請罪遂拜辭欲出世宗曰廣平粗疏向來又醉卿之所悉何乃如此也遂詔亮復坐令懷謝焉亮外雖方正內亦承候時情宣傳左右郭神安頗被世宗識遇以弟託亮亮引為御史及神安敗後因集禁中世宗令兼侍中盧昶宣旨責亮曰在法官何故受左右囑請亮拜謝而已無以上對轉都官尚書又轉七兵領廷尉卿加散騎常侍中正如故徐州刺史元昞撫御失和詔亮馳驛安撫亮至劾昞處以大辟勞賚綏慰百姓帖然除安西將軍雍州刺史城北渭水淺不通船行人艱阻亮謂僚佐曰昔杜預乃造河梁況此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可為浮橋泛長無又不可施柱恐難成立亮曰昔秦居咸陽橫橋渡渭以像閣道此即以柱為橋今唯慮長柱不可得耳會天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋亮性公清敏于斷決所在並號稱職三輔服其德政世宗嘉之詔賜衣馬被褥後納其女為九嬪徵為太常卿攝吏部事肅宗初出為撫軍將軍定州刺史蕭衍左游擊將軍趙祖悅率衆偷據硤石詔亮假鎮南將軍齊王蕭寶夤鎮東將軍章武王融安南將軍並使持節都督諸軍事以討之靈太后勞遣亮等賜戎服雜物亮至硤石祖悅出城逆戰大破之賊復於城外置二柵欲拒官軍亮焚擊破之殺三千餘人亮與李崇為水陸之期日日進攻而崇不至及李平至崇乃進軍共平硤石語在平傳靈太后賜亮璽書曰硤石既平大勢全舉淮堰孤危自將奔遁若仍敢遊魂此當易以立計擒翦蟻徒應在旦夕將軍推轂所憑親對其事處分經略宜共協齊必令得掃蕩之理盡彼遺燼也隨便守禦及分渡掠截扼其咽喉防塞走路期之全獲無令漏逸若畏威降首者自加蠲宥以仁為本任之雅算一二往使別宣以功進號鎮北將軍李平部分諸軍將水陸兼進以討堰賊亮違平節度以疾請還隨表而發平表曰臣以蕭衍將湛僧珍田道龍遊魂境內猶未收跡義之神念尚住梁城令都督崔亮權據下蔡別將生即往東岸與亮接勢以防橋道臣發引向堰舍人曹道至奉敕更有處分而亮已輒還京按亮受付東南推轂是託誠應憂國忘家致命為限而始屆汝陰磐桓不進暨到寇所停淹八旬所營土山攻道並不克就損費糧力坐延歲序賴天威遠被士卒憤激東北騰上垂至北門而亮遲回仍不肯上臣逼以白刃甫乃登陟及平硤石宜聽處分方更肆其專恣輕輒還歸此而不糾法將焉寄按律臨軍征討而故留不赴者死又云軍還先歸者流軍罷先還尚有流坐況亮被符令停委棄而反失乘勝之機闕水陸之會緣情據理咎深故留今處亮死上議靈太后令曰亮為臣不忠去留自擅既損威稜違我經略雖有小捷豈免大咎但吾攝御萬幾庶茲惡殺可特聽以功補過及平至亮與爭功於禁中形於聲色尋除殿中尚書遷吏部尚書時羽林新害張彝之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢人百姓大為嗟怨亮乃奏為格制不問士之賢愚專以停解日月為斷雖復官須此人停日後者終於不得庸才下品年月久者灼然先用沉滯者皆稱其能亮外甥司空咨議劉景安書規亮曰殷周以鄉孰貢士兩漢由州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美足應十收六七而朝廷貢秀才止求其文不取其理察孝廉唯論章句不及治道立中正不考人才行業空辨氏姓高下至於取士之途不溥沙汰之理未精而舅屬當銓衡宜須改張易調如之何反為停年格以限之天下士子誰復修厲名行哉亮答書曰汝所言乃有深致吾乘時邀幸得為吏部尚書當其壯也尚不如人況今朽老而居帝難之任常思同升舉直以報明主之恩盡忠竭力不為貽厥之纍昨為此格有由而然今已為汝所怪千載之後誰知我哉可靜念吾言當為汝論之吾兼正六為吏部郎三為尚書銓衡所宜頗知之矣但古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃與天下羣賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七況今日之選專歸尚書以一人之鑒照察天下劉毅所云一吏部兩郎中而欲究竟人物何異以管窺天而求其博哉今勳人甚多又羽林入選武夫崛起不解書計唯可彍弩前驅指蹤捕噬而已忽令垂組乘軒求其烹鮮之效未曾操刀而使專割又武人至多官員至少不可周溥設令十人共一官猶無官可授況一人望一官何由可不怨哉吾近面執不宜使武人入選請賜其爵厚其祿既不見從是以權立此格限以停年耳昔子産鑄刑書以救弊叔向譏之以正法何異汝以古禮難權宜哉仲尼云德我者亦春秋罪我者亦春秋吾之此指其由是也但令當來君子知吾意焉後甄琛元修義城陽王徽相繼為吏部尚書利其便己踵而行之自是賢愚同貫涇渭無別魏之失才從亮始也轉侍中太常卿尋遷左光祿大夫尚書右僕射時劉騰擅權亮託妻劉氏傾身事之故頻年之中名位隆赫有識者譏之轉尚書僕射加散騎常侍正光二年秋疽發於背肅宗遣舍人問疾亮上表乞解僕射送所負荷及印綬詔不許尋卒詔給東園祕器朝服一襲賵物七百段蠟三百斤贈使持節散騎常侍車騎大將軍儀同三司冀州刺史諡曰貞烈亮在雍州讀杜預傳見為八磨嘉其有濟時用遂教民為碾及為僕射奏於張方橋東堰穀水造水碾磨數十區其利十倍國用便之亮有三子士安士和士泰並強幹善於當世士安歷尚書比部郎卒於諫議大夫贈左將軍光州刺史無子弟士和以子乾亨繼乾亨武定中尚書都兵郎中士和歷司空主簿通直郎從亮征硤石以軍勳拜冠軍將軍中散大夫西道行臺元修義左丞行涇州事蕭寶夤之在關中高選遼佐以為督府長史時莫折念生遣使詐降寶夤表士和兼度支尚書為隴右行臺令入秦撫慰為念生所害士泰歷給事中司空從事中郎諫議大夫司空司馬肅宗末荊蠻侵斥以士泰為龍驤將軍征蠻別將事平以功賜爵五等男建義初遇害於河陰贈都督青兗二州諸軍事鎮東將軍青州刺史諡曰文肅子肇師襲爵武定末中書舍人亮弟敬默奉朝請卒於征虜長史贈南陽太守子思韶從亮征硤石以軍功賜爵武城子為冀州別駕敬默弟隱處青州州都亮以其賤出殊不經紀論者譏焉亮從父弟光韶事親以孝聞初除奉朝請光韶與弟光伯雙生操業相侔特相友愛遂經吏部尚書李沖讓官於光伯辭色懇至沖為奏聞高祖嘉而許之太和二十年以光韶為司空行參軍復請讓從叔和曰臣誠微賤未登讓品屬逢唐朝無讓德和亦謙退辭而不當高祖善之遂以和為廣陵王國常侍尋敕光韶兼祕書郎掌校華林御書肅宗初除青州治中後為司空騎兵參軍又兼司徒戶曹出為濟州輔國府司馬刺史高植甚知之政事多委訪焉遷青州平東府長史府解敕知州事光韶清直明斷民吏畏愛之入為司空從事中郎以母老解官歸養賦詩展意朝士屬和者數十人久之徵為司徒咨議固辭不拜光韶性嚴毅聲韻抗烈與人平談常若震厲至於兄弟議論外聞謂為忿怒然孔懷雍睦人少逮之孝莊初河間邢杲率河北流民十餘萬衆攻逼州郡刺史元俊憂不自安州人乞光韶為長史以鎮之時陽平路回寓居齊土與杲潛相影響引賊入郭光韶臨機處分在難確然賊退之後刺史表光韶忠毅朝廷嘉之發使慰勞焉尋為東道軍司及元皓入洛自河以南莫不風靡而刺史廣陵王欣集文武以議所從欣曰北海長樂俱是同堂兄弟今宗祏不移我欲受赦諸君意各何如在坐之人莫不失色光韶獨抗言曰元皓受制梁國稱兵本朝拔本塞源以資讎敵賊臣亂子曠代少儔何但大王家事所宜切齒等荷朝眷未敢仰從長史崔景茂前瀛州刺史張烈前郢州刺史房叔祖徵士張僧皓咸云軍司議是欣乃斬皓使尋徵輔國將軍廷尉少卿未至除太尉長史加左將軍俄遷廷尉卿時祕書監祖瑩以贓罪被劾光韶必欲致之重法太尉陽城王徽尚書令臨淮王彧吏部尚書李神俊侍中李彧並勢望當時皆為瑩求寬光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎其執意不回如此永安末擾亂之際遂還鄉里光韶博學強辨尤好理論至於人倫名教得失之間榷而論之不以一毫假物家足於財而性儉吝衣馬弊瘦食味粗薄始光韶在都同里人王蔓於夜遇盜害其二子孝莊詔黃門高道穆令加檢捕一坊之內家別搜索至光韶宅綾絹錢布匱篋充積議者譏其矯嗇其家資産皆光伯所營光伯亡悉焚其契河間邢子才曾貸錢數萬後送還之光韶曰此亡弟相貸僕不知也竟不納刺史元弼前妻是光韶之繼室兄女而弼貪婪多諸不法光韶以親情亟相非責弼銜之時耿翔反於州界弼誣光韶子通與賊連結囚其合家考掠非理而光韶與之辨爭辭色不屈會樊子鵠為東道大使知其見枉理出之時人勸令詣樊陳謝光韶曰羊舌大夫已有成事何勞往也子鵠亦歎尚之後刺史侯淵代下疑懼停軍益都謀為不軌令數百騎夜入南郭劫光韶以兵脅之責以謀略光韶曰凡起兵者須有名義使君今日舉動直是作賊耳父老知復何計淵雖恨之敬而不敢害尋除征東將軍金紫光祿大夫不起光韶以世道屯邅朝廷屢變閉門却掃吉凶斷絶誡子孫曰吾自謂立身無慚古烈但以祿命有限無容希世取進在官以來不冒一級官雖不達經為九卿且吾平生素業足以遺汝官閥亦何足言也吾既運薄便經三娶而汝之兄弟各不同生合葬非古吾百年之後不須合也然贈諡之及出自君恩豈容子孫自求之也勿須求贈若違吾志如有神靈不享汝祀吾兄弟自幼及老衣服飲食未曾一片不同至於兒女官婚榮利之事未嘗不先以推弟弟頃橫禍權作松櫬亦可為吾作松棺使吾見之卒年七十一孝靜初侍中賈思同申啓稱述光韶贈散騎常侍驃騎將軍青州刺史光韶弟光伯尚書郎青州別駕後以族弟休臨州遂申牒求解尚書奏按禮始封之君不臣諸父昆弟封君之子臣昆弟不臣諸父封君之孫得盡臣計始封之君即是世繼之祖尚不得臣況今之刺史既非世繼而得行臣吏之節執笏稱名者乎檢光伯請解率禮不愆請宜許遂以明道教靈太后令從之尋除北海太守有司以其更滿依例奏代肅宗詔曰光伯自蒞海沂清風遠著兼其兄光韶復能辭榮侍養兄弟忠孝宜有甄録可更申三年以厲風化後歷太傅咨議參軍前廢帝時崔祖螭張僧皓起逆攻東陽旬日之間衆十餘萬刺史東萊王貴平欲令光伯出城慰勞兄光韶曰城民陵縱為日已久人人恨之其氣甚盛古人有言衆怒如水火焉以此觀之今日非可慰諭止也貴平強之光韶曰使君受委一方董攝萬里而經略大事不與國士圖之所共腹心皆趨走羣小既不能綏遏以杜其萌又不能坐觀待其衰挫蹙迫小弟從為無名之行若單騎獨往或見拘縶若以衆臨之勢必相拒敵懸見無益也貴平逼之不得已光伯遂出城數里城民以光伯兄弟羣情所繫慮人劫留防衛者衆外人疑其欲戰未及曉諭為飛矢所中卒贈征東將軍青州刺史子滔武定末殷州別駕史臣曰李崇以風質英重毅然秀立任當將相望高朝野美矣崔亮既明達後事動有名迹於斷年之選失之逾遠救弊未聞終為國蠹無所苟而已其若是乎光韶居雅仗正有國士之風矣
