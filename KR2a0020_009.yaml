body:
  text: 魏書卷七下高祖紀第七下十年春正月癸亥朔帝始服袞冕朝饗萬國壬午蠕蠕犯塞二月甲戌初立黨里鄰三長定民戶籍三月丙申蠕蠕國遣使朝貢庚申蕭賾遣使朝貢夏四月辛酉朔始制五等公服甲子帝初以法服御輦祀於西郊癸酉幸靈泉池戊寅車駕還宮是月高麗吐谷渾國並遣使朝貢六月辛酉幸方山己卯名皇子曰恂大赦天下秋七月戊戌幸方山八月乙亥給尚書五等品爵已上朱衣玉珮大小組綬九月辛卯詔起明堂辟雍冬十月癸酉有司議依故事配始祖於南郊十有一月議定州郡縣官依戶給俸十有二月壬申蠕蠕犯塞癸未勿吉國遣使朝貢乙酉詔以汝南潁川大飢丐民田租開倉賑恤十有一年春正月丁亥朔詔定樂章非雅者除之二月甲子詔以肆州之雁門及代郡民飢開倉賑恤夏四月己未吐谷渾國遣使朝貢五月壬辰幸靈泉池遂幸方山癸巳南平王渾薨甲午車駕還宮詔復七廟子孫及外戚緦服已上賦役無所與詔南部尚書公孫文慶上谷張伏千率衆南討舞陰山闕高麗吐谷渾國遣使朝貢六月辛巳秦州民飢開倉賑恤癸未詔曰春旱至今野無青草上天致譴實由匪德百姓無辜將罹飢饉寤寐思求罔知所益公卿內外股肱之臣謀猷所寄其極言無隱以救民瘼秋七月己丑詔曰今年穀不登聽民出關就食遣使者造籍分遣去留所在開倉賑恤八月壬申蠕蠕犯塞遣平原王陸睿討之事具蠕蠕傳庚辰大議北伐進策者百有餘人辛巳罷山北苑以其地賜貧民悉萬斤國遣使朝獻九月庚戌詔曰去夏以歲旱民飢須遣就食舊籍雜亂難可分簡故依局割民閲戶造籍欲令去留得實賑貸平均然乃者以來猶有餓死衢路無人收識良由本部不明籍貫未實廩恤不周以至於此朕猥居民上聞用慨然可重遣精檢勿令遺漏冬十月辛未詔罷起部無益之作出宮人不執機杼者甲戌詔曰鄉飲禮廢則長幼之叙亂孟冬十月民間歲隙宜於此時導以德義可下諸州黨里之內推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞十有一月丁未詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡太官雜器太僕乘具內庫弓矢出其太半班賚百官及京師士庶下至工商皂隸逮於六鎮戍士各有差戊申詔曰朕惟上政不明令民陷身罪戾今寒氣徑切杖捶難任自今月至來年孟夏不聽拷問罪人又歲既不登民多飢窘輕繫之囚宜速決了無令薄罪久留獄犴十有二月詔祕書丞李彪著作郎崔光改析國記依紀傳之體是歲大飢詔所在開倉賑恤十有二年春正月辛巳朔初建五牛旌旗乙未詔曰鎮戍流徙之人年滿七十孤單窮獨雖有妻妾而無子孫諸如此等聽解名還本諸犯死刑者父母祖父母年老更無成人子孫旁無期親者具狀以聞二月壬戌高麗國遣使朝貢三月丁亥宕昌國遣使朝獻中散梁衆保等謀反伏誅夏四月高麗吐谷渾國並遣使朝貢蕭賾將陳顯達等寇邊甲寅詔豫州刺史元斤率衆禦之甲子大赦天下乙丑幸靈泉池丁卯遂幸方山己巳還宮陳顯達攻陷醴陽左僕射長樂王穆亮率騎一萬討之五月丁酉詔六鎮雲中河西及關內六郡各修水田通渠溉灌壬寅增置彝器於太廟六月甲寅宕昌國遣使朝貢秋七月己丑幸靈泉池遂幸方山己亥還宮八月甲子勿吉國貢楛矢石砮九月吐谷渾宕昌國遣使朝貢甲午詔曰日月薄蝕陰陽之度耳聖人懼人君之放怠因之以設誡故稱日蝕修德月蝕修刑乃癸巳夜月蝕盡公卿已下宜慎刑罰以答天意丁酉起宣文堂經武殿癸卯侍中司徒淮南王他薨吐谷渾宕昌武興諸國各遣使朝貢閏月甲子帝觀築圓丘於南郊乙丑高麗國遣使朝貢辛未幸靈泉池癸酉還宮十有一月詔以二雍豫三州民飢開倉賑恤梁州刺史臨淮王提坐貪縱徙配北鎮十有二月蠕蠕伊吾戍主高羔子率衆三千以城內附以侍中安豐王猛為開府儀同三司十有三年春正月辛亥車駕有事於圓丘於是初備大駕乙丑兗州民王伯恭聚衆勞山自稱齊王東萊鎮將孔伯孫討斬之戊辰蕭賾遣衆寇邊淮陽太守王僧俊擊走之二月壬午高麗國遣使朝獻庚子引羣臣訪政道得失損益之宜三月甲子吐谷渾國遣使朝獻夏州刺史章武王彬以貪賕削封夏四月丁丑詔曰升樓散物以賚百姓至使人馬騰踐多有毀傷今可斷之以本所費之物賜窮老貧獨者丁亥幸靈泉池遂幸方山己丑還宮吐谷渾國遣使朝貢州鎮十五大飢詔所在開倉賑恤五月庚戌車駕有事於方澤六月汝陰王天賜南安王楨並坐贓賄免為庶人高麗國遣使朝貢秋七月甲辰陰平國遣使朝貢丙寅幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師八月乙亥詔兼員外散騎常侍邢産兼員外散騎侍郎侯靈紹使於蕭賾戊子詔諸州鎮有水田之處各通溉灌遣匠者所在指授中尺國遣使朝貢九月丁未吐谷渾武興宕昌諸國各遣使朝獻出宮人以賜北鎮人貧魚衆無妻者冬十月甲申高麗國遣使朝貢十有一月己未安豐王猛薨十有二月丙子侍中司空河東王苟頽薨甲午蕭賾遣使朝貢己亥以尚書令尉元為司徒左僕射穆亮為司空是歲蠕蠕別帥叱呂勤率衆內附十有四年春正月乙丑行幸方山二月辛未行幸靈泉池壬申還宮戊寅初詔定起居注制己卯詔遣侍臣循行州郡問民疾苦三月壬申吐谷渾宕昌武興陰平諸國並遣使朝貢夏四月地豆于頻犯塞甲戌征西大將軍陽平王頤擊走之甲午詔兼員外散騎常侍邢産兼員外散騎侍郎蘇季連使於蕭賾五月己酉庫莫奚犯塞安州都將樓龍兒擊走之沙門司馬惠御自言聖王謀破平原郡擒獲伏誅秋七月甲辰詔罷都牧雜制丙午行幸方山丙辰遂幸靈泉池高麗國遣使朝八月丙寅朔車駕還宮辛卯宕昌國遣使朝貢詔議國之行次九月癸丑太皇太后馮氏崩壬戌高麗國遣使朝貢詔聽蕃鎮曾經內侍者前後奔赴冬十月戊辰詔曰自丁荼苦奄踰晦朔仰遵遺旨祖奠有期朕將親侍龍輿奉訣陵隧諸常從之具悉可停之其武衛之官防侍如法癸酉葬文明太皇太后於永固陵甲戌車駕謁永固陵羣臣固請公除帝不許己卯車駕謁永固陵庚辰帝居廬引見羣僚於太和殿太尉東陽王丕等據權制固請帝引古禮往復羣臣乃止語在禮志京兆王太興有罪免官削爵詔曰公卿屢依金冊遺旨中代權式請過葬即吉朕思遵遠古終三年之制依禮既虞卒哭此月二十一日授服以葛易麻既衰服在上公卿不得獨釋於下故於朕之授服變從練禮已下復為節降斟酌今古以制厥衷且取遺旨速除之一端粗申臣子罔極之巨痛癸未詔曰朕遠遵古式欲終三年之禮百辟羣官據金冊顧命將奪朕心從先朝之制朕仰惟金冊俯自推省取諸二衷不許衆議以衰服過期終四節之慕又奉聖訓聿修誥旨不敢暗默自居以曠機政庶不愆遺令之意差展哀慕之情普下州鎮長至三元絶告慶之禮甲申車駕謁永固陵辛卯詔曰羣官以萬機事重請求聽政朕仰祗遺命亦思無怠但哀慕纏綿心神迷塞未堪自力以親政事近侍先掌機衡者皆謀猷所寄且可任之如有疑事當時與論決十有一月甲寅詔曰垂及至節感慕崩摧凡在臣列誰不哽切內外職人先朝班次及諸方雜客冬至之日盡聽入臨三品已上衰服者至夕復臨其餘唯旦臨而已其拜哭之節一依別儀丁巳蕭賾遣使朝貢十有二月壬午詔依準丘井之式遣使與州郡宣行條制隱口漏丁即聽附實若朋附豪勢陵抑孤弱罪有常刑十五年春正月丁卯帝始聽政於皇信東室初分置左右史官吐谷渾國遣使朝貢二月乙亥枹罕鎮將長孫百年請討吐谷渾所置洮陽泥和二戍許之己丑蕭賾遣使朝貢三月甲辰車駕謁永固陵己酉悉萬斤等五國遣使朝貢夏四月癸亥帝始進蔬食乙丑謁永固陵自正月不雨至于癸酉有司奏祈百神詔曰昔成湯遇旱齊景逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在豫一人今普天喪恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便欲祀事唯當考躬責己以待天譴甲戌詔員外散騎常侍李彪尚書郎公孫阿六頭使於蕭賾己卯經始明堂改營太廟五月己亥議改律令於東明觀折疑獄乙卯百年攻洮陽泥和二戍克之俘獲三千餘人詔悉免歸高麗國遣使朝獻丙辰詔造五輅六月丁未濟陰王鬱以貪殘賜死秋七月乙丑謁永固陵規建壽陵戊寅吐谷渾國遣使朝貢己卯詔議祖宗以道武為太祖乙酉車駕巡省京邑聽訟而還八月壬辰議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之戊戌移道壇於桑乾之陰改曰崇虛寺己亥詔諸州舉秀才先盡才學乙巳親定禘祫之禮丁巳議律令事仍省雜祀九月辛巳蕭賾遣使朝貢壬午吐谷渾高麗宕昌鄧至諸國並遣使朝獻冬十月庚寅車駕謁永固陵是月明堂太廟成十有一月丁卯遷七廟神主於新廟乙亥大定官品戊寅考諸牧守詔假通直散騎常侍李彪假散騎侍郎蔣少遊使蕭賾丙戌初罷小歲賀丁亥詔二千石考在上上者假四品將軍賜乘黃馬一匹上中者五品將軍上下者賜衣一襲十有二月壬辰遷社於內城之西癸巳頒賜刺史已下衣冠以安定王休為太傅齊郡王簡為太保帝為高麗王璉舉哀於城東行宮己酉車駕迎春於東郊辛亥詔簡選樂官十有六年春正月戊午朔饗羣臣於太華殿帝始為王公興懸而不樂己未宗祀顯祖獻文皇帝於明堂以配上帝遂升靈臺以觀雲物降居青陽左個布政事每朔依以為常辛酉始以太祖配南郊壬戌詔定行次以水承金甲子詔罷祖祼疑乙丑制諸遠屬非太祖子孫及異姓為王皆降為公公為侯侯為伯子男仍舊皆除將軍之號戊辰帝臨思義殿策問秀孝丙子始以孟月祭廟二月戊子帝移御永樂宮庚寅壞太華殿經始太極辛卯罷寒食饗壬辰幸北部曹歷觀諸省巡省京邑聽理寃訟甲午初朝日于東郊遂以為常丁酉詔祀唐堯於平陽虞舜於廣寧夏禹於安邑周文於洛陽丁未改諡宣尼曰文聖尼父告諡孔廟三月丁卯巡省京邑癸酉省西郊郊天雜事乙亥車駕初迎氣南郊自此為常辛巳以高麗王璉孫雲為其國王蕭賾遣使朝貢是月高麗鄧至國並遣使朝貢四月丁亥朔班新律令大赦天下癸巳契齧國遣使朝貢甲寅幸皇宗學親問博士經義五月癸未詔羣臣於皇信堂更定律條流徒限制帝親臨決之六月己丑高麗國遣使朝貢甲辰詔曰務農重穀王政所先勸率田疇君人常事今四氣休序時澤滂潤宜用天分地悉力東畝然京師之民遊食者衆不加督勸或藝耨失時可遣明使檢察勤惰以聞秋七月庚申吐谷渾世子賀虜頭來朝壬戌詔曰王者設官分職垂拱責成振網舉綱衆目斯理朕德謝知人豈能一見鑒識徒乖為君委授之義自今選舉每以季月本曹與吏部銓簡甲戌詔兼員外散騎常侍宋辨兼員外散騎侍郎房亮使於蕭賾八月庚寅車駕初夕月於西郊遂以為常辛卯高麗國遣使朝貢乙未詔陽平王頤左僕射陸睿督十二將七萬騎北討蠕蠕丙午宕昌王梁彌承來朝司徒尉元以老遜位己酉以尉元為三老游明根為五更又養國老庶老將行大射之禮雨不克成癸丑詔曰文武之道自古並行威福之施必也相藉故三五至仁尚有征伐之事夏殷明睿未捨兵甲之行然則天下雖平忘戰者殆不教民戰可謂棄之是以周立司馬之官漢置將軍之職皆所以輔文強武威肅四方者矣國家雖崇文以懷九服修武以寧八荒然於習武之方猶為未盡今則訓文有典教武闕然將於馬射之前先行講武之式可敕有司豫修場埒其列陳之儀五戎之數別俟後敕九月甲寅朔大序昭穆於明堂祀文明太皇太后於玄室辛未帝以文明太皇太后再周忌日哭於陵左絶膳二日哭不輟聲辛巳武興王楊集始來朝冬十月乙酉鄧至國遣使朝獻己亥以太傅安定王休為大司馬特進馮誕為司徒甲辰詔以功臣配饗太廟丙午高麗國遣使朝獻庚戌太極殿成大饗羣臣十有一月乙卯依古六寢權制三室以安昌殿為內寢皇信堂為中寢四下疑為外寢十有二月賜京邑老人鳩杖是月蕭賾遣使朝貢十有七年春正月壬子朔帝饗百僚於太極殿乙丑詔曰夫駿奔入覲臣下之常式錫馬賜車君人之惠今諸邊君蕃胤皆虔集象魏趨鏘紫庭貢饗既畢言旋無遠各可依秩賜車旗衣馬務令優厚其武興宕昌各賜錦繒纊一千吐谷渾世子八百鄧至世子雖因緣至都亦宜賚及可賜三百命數之差皆依別牒詔兼員外散騎侍郎劉承叔使於蕭賾乙亥勿吉國遣使朝獻丙子以吐谷渾伏連籌為其國王庚辰蠲大司馬安定王休太保齊郡王簡朔望之朝二月乙酉詔賜議律令之官各有差己丑車駕始籍田於都南三月戊辰改作後宮帝幸永興園徙御宣文堂吐谷渾國遣使朝獻夏四月戊戌立皇后馮氏是月蕭賾征虜將軍直閣將軍蠻酋田益宗率部落四千餘戶內屬五月乙卯宕昌陰平契丹庫莫奚諸國並遣使朝獻壬戌宴四廟子孫於宣文堂帝親與之齒行家人之禮甲子帝臨朝堂引見公卿已下決疑政録囚徒丁丑以旱撤膳襄陽蠻酋雷婆思等率一千三百餘戶內徙居於太和川六月丙戌帝將南伐詔造河橋己丑詔免徐南豫陝岐東徐洛豫七州軍糧丁未講武乙巳詔曰六職備于周經九列炳於漢晉務必有人守其職比百秩雖陳事典未自八元樹位躬加省覽遠依往籍近採時宜作職員令二十一卷事迫戎期未善周悉雖不足綱範萬度永垂不朽且可釋滯目前釐整時務須待軍回更論所闕權可付外施行其有當局所疑而令文不載者隨事以聞當更附之立皇子恂為皇太子戊申高麗國遣使朝獻秋七月癸丑以皇太子立詔賜民為人後者爵一級為公士曾為吏屬者爵二級為上造魚衆寡孤獨不能自存者人粟五斛戊午中外戒嚴是月蕭賾死孫昭業僭立八月乙酉三老山陽郡公尉元薨丙戌車駕類於上帝遂臨尉元喪丁亥帝辭永固陵己丑車駕發京師南伐步騎百餘萬太尉丕奏請以宮人從詔曰臨戎不語內事宜停來請壬寅車駕至肆州民年七十已上賜爵一級路見眇跛者停駕親問賜衣食終身戊申幸并州親見高年問所疾苦九月壬子詔兼員外散騎常侍高聰兼員外散騎侍郎賈禎使於蕭昭業丁巳詔以車駕所經傷民秋稼者畝給穀五斛戊辰濟河詔洛懷并肆所過四州之民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級魚衆寡孤獨不能自存者粟人五斛帛二匹孝悌廉義文武應求者皆以名聞又詔廝養之戶不得與士民婚有文武之才積勞應進者同庶族例聽之庚午幸洛陽周巡故宮基趾帝顧謂侍臣曰晉德不修早傾宗祀荒毀至此用傷朕懷遂詠黍離之詩為之流涕壬申觀洛橋幸太學觀石經乙亥鄧至王像舒彭遣子舊詣闕朝貢并奉表求以位授舊詔許之丙子詔六軍發軫丁丑戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月戊寅朔幸金墉城詔徵司空穆亮與尚書李沖將作大匠董爵經始洛京己卯幸河南城乙酉幸豫州癸巳次於石濟乙未解嚴設壇於滑臺城東告行廟以遷都之意大赦天下起滑臺宮又詔京師及諸州從戎者賜爵一級應募者加二級主將三級癸卯幸鄴城乙巳詔安定王休率從官迎家於代京車駕送於漳水上初帝之南伐也起宮殿於鄴西十有一月癸亥宮成徙御焉十有二月戊寅巡省六軍庚寅陰平國遣使朝貢乙未詔隱恤軍士死亡疾病務令優給十有八年春正月丁未朔朝羣臣於鄴宮澄鸞殿丁巳高麗國遣使朝獻癸亥車駕南巡詔相兗豫三州百年以上假縣令九十以上賜爵二級七十以上賜爵一級孤老魚衆寡不能自存者賜粟五石帛二匹孝悌廉義文武應求者皆以名聞戊辰經殷比干之墓祭以太牢乙亥幸洛陽西宮二月乙丑行幸河陰規建方澤之所丙申河南王幹徙封趙郡潁川王雍徙封高陽壬寅車駕北巡癸卯濟河蕭昭業遣使朝貢甲辰詔天下喻以遷都之意閏月癸亥次句注陘南皇太子朝于蒲池壬申至平城宮癸酉臨朝堂部分遷留甲戌謁永固陵三月庚辰罷西郊祭天壬辰帝臨太極殿諭在代羣臣以遷移之略夏五月乙亥詔罷五月五日七月七日饗六月己巳詔兼員外散騎常侍盧昶兼員外散騎侍郎王清石使於蕭昭業秋七月乙亥以宋王劉昶為大將軍壬午侍中大司馬安定王休薨辛卯高麗國遣使朝貢壬辰車駕北巡戊戌謁金陵辛丑幸朔州是月島夷蕭鸞殺其主蕭昭業立昭業弟昭文八月癸卯皇太子朝於行宮甲辰行幸陰山觀雲川丁未幸閲武臺臨觀講武癸丑幸懷朔鎮己未幸武川鎮辛酉幸撫冥鎮甲子幸柔玄鎮乙丑南還所過皆親見高年問民疾苦貧窘孤老賜以粟帛丙寅詔六鎮及禦夷城人年八十以上而無子孫兄弟終身給其廩粟七十以上家貧者各賜粟十斛又詔諸北城人年滿七十以上及廢疾之徒校其元犯以準新律事當從坐者聽一身還鄉又令一子扶養終命之後乃遣歸邊自餘之處如此之犯年八十以上皆聽還戊辰車駕次旋鴻池庚午謁永固陵辛未還平城宮九月壬申朔詔曰三載考績自古通經三考黜陟以彰能否今若待三考然後黜陟可黜者不足為遲可進者大成賒緩是以朕今三載一考考即黜陟欲令愚滯無妨於賢者才能不壅於下位各令當曹考其優劣為三等六品以下尚書重問五品以上朕將親與公卿論其善惡上上者遷之下下者黜之中中者守其本任壬午帝臨朝堂親加黜陟壬辰陰平王楊炅來朝冬十月甲辰以太尉東陽王丕為太傅戊申親告太廟奉遷神主辛亥車駕發平城宮壬戌次於中山之唐湖乙丑分遣侍臣巡問民所疾苦己巳幸信都庚午詔曰比聞緣邊之蠻多有竊掠致有父子乖離室家分絶既虧和氣有傷仁厚方一區宇子育萬姓若苟如此南人豈知朝德哉可詔荊郢東荊三州勒敕蠻民勿有侵暴是月蕭鸞廢殺其主蕭昭文而僭立十有一月辛未朔詔冀定二州民百年以上假以縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級魚衆寡孤獨不能自存者賜以穀帛孝義廉貞文武應求者具以名聞丁丑車駕幸鄴甲申經比干之墓傷其忠而獲戾親為弔文樹碑而刊之己丑車駕至洛陽蕭鸞雍州刺史曹虎據襄陽請降十有二月辛丑朔遣行征南將軍薛真度督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉藻出南鄭壬寅革衣服之制癸卯詔中外戒嚴戊申優復代遷之戶租賦三歲己酉詔王公侯伯子男開國食邑者王食半公三分食一侯伯四分食一子男五分食一辛亥車駕南伐丁卯詔郢豫二州之民百齡以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡魚衆老不能自存者賜以穀帛緣路之民復田租一歲孝悌廉義文武應求具以名聞戊辰車駕至懸瓠己巳詔壽陽鍾離馬頭之師所獲男女之口皆放還南十有九年春正月辛未朔朝饗羣臣於懸瓠癸酉詔禁淮北之民不得侵掠犯者以大辟論甲戌檄喻蕭鸞丙子鸞龍陽縣開國侯王朗自渦陽來降壬午講武於汝水之西大賚六軍丙申平南將軍王肅頻破蕭鸞將擒其寧州刺史董巒己亥車駕濟淮二月甲辰幸八公山路中雨甚詔去蓋見軍士病者親隱恤之戊申車駕巡淮而東民皆安堵租運屬路壬子高麗國遣使朝獻丙辰車駕至鍾離戊午軍士擒蕭鸞三千卒帝曰在君為君其民何罪於是免歸辛酉車駕發鍾離將臨江水司徒馮誕薨壬戌乃詔班師丁卯遣使臨江數蕭鸞殺主自立之罪惡三月戊寅幸邵陽戊子太師馮熙薨乙未幸下邳鄧至國遣使朝貢夏四月庚子車駕幸彭城辛丑帝為太師馮熙舉哀於行在所丁未曲赦徐豫二州其運漕之士復租賦三年辛亥詔賜百歲以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡老疾不能自存者賜以穀帛德著丘園者具以名聞蕭鸞民降者給復十五年癸丑幸小沛遣使以太牢祭漢高祖廟己未行幸瑕丘遣使以太牢祠岱嶽詔宿衛武官增位一級庚申行幸魯城親祠孔子廟辛酉詔拜孔氏四人顏氏二人為官詔兗州刺史舉部內士人才堪軍國及守宰治行具以名聞又詔賜兗州民爵及粟帛如徐州又詔選諸孔宗子一人封崇聖侯邑一百戶以奉孔子之祀又詔兗州為孔子起園柏修飾墳壠更建碑銘褒揚聖德戊辰行幸碻磝太和廟成五月己巳城陽王鸞赭陽失利降為定襄縣王廣川王諧薨庚午遷文成皇后馮氏神主于太和廟甲戌行幸滑臺丙子次于石濟庚辰皇太子朝平桃城高麗吐谷渾國並遣使朝貢癸未車駕至自南伐告于太廟甲申減間官祿以裨軍國之用乙酉行飲至之禮班賜有差甲午皇太子冠於廟六月己亥詔不得以北俗之語言於朝廷若有違者免所居官辛丑詔復軍士從駕渡淮者租賦三年癸卯詔皇太子赴平城宮壬子詔濟州東郡滎陽及河南諸縣車駕所經者百年以上賜假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤老魚衆寡不能自存賜以穀帛孝悌廉義文武應求者具以名聞癸丑詔求天下遺書祕閣所無有裨益時用者加以優賞乙卯曲赦梁州復民田租三歲丙辰詔遷洛之民死葬河南不得還北於是代人南遷者悉為河南洛陽人戊午詔改長尺大斗依周禮制度班之天下八月甲辰幸西宮路見壞冢露棺駐輦殣之乙巳詔選天下武勇之士十五萬人為羽林虎賁以充宿衛丁巳詔諸從兵從征被傷者皆聽還本金墉宮成甲子引羣臣歷宴殿堂九月庚午六宮及文武盡遷洛陽丙戌行幸鄴丁亥詔曰諸有舊墓銘記見存昭然為時人所知者三公及位從公者去墓三十步尚書令僕九列十五步黃門五校十步各不聽墾殖壬辰遣黃門郎以太牢祭比干之墓乙未車駕還宮冬十月甲辰曲赦相州民百年以上假郡守九十以上假縣令八十以上賜爵三級七十以上賜爵二級孤老痼疾不能自存者賜以穀帛丙辰車駕至自鄴辛酉詔州郡諸有士庶經行修敏文思遒逸才長吏治堪幹政事者以時發遣壬戌詔諸州牧精品屬官考其得失為三等之科以聞將親覽而升降焉詔徐兗光南青荊洛六州纂嚴戎備應須赴集十有一月行幸委粟山議定圓丘甲申有事於圓丘丙戌大赦天下十有二月乙未朔引見羣臣於光極堂宣示品令為大選之始辛酉驃騎大將軍司州牧咸陽王禧為長兼太尉前南安王楨復本封以特進廣陵王羽為征東大將軍開府儀同三司青州刺史甲子引見羣臣於光極堂班賜冠服二十年春正月丁卯詔改姓為元氏壬辰改封始平王協為彭城王以定襄縣王鸞復封城陽王二月辛丑帝幸華林聽訟於都亭壬寅詔自非金革聽終三年喪丙午詔畿內七十以上暮春赴京師將行養老之禮庚戌幸華林聽訟於都亭癸丑詔介山之邑聽為寒食自餘禁斷三月丙寅宴羣臣及國老庶老於華林園詔曰國老黃耇以上假中散大夫郡守耆年以上假給事中縣令庶老直假郡縣各賜鳩杖衣裳丁丑詔諸州中正各舉其鄉之民望年五十以上守素衡門者授以令長夏四月甲辰廣州刺史薛法護南叛五月丙子詔曰農惟政首稷實民先澍雨豐洽所宜敦勵其令畿內嚴加課督惰業者申以楚撻力田者具以名聞丙戌初營方澤於河陰遣使者以太牢祭漢光武及明章三帝陵又詔漢魏晉諸帝陵各禁方百步不得樵蘇踐踏丁亥車駕有事於方澤七月廢皇后馮氏戊寅帝以久旱咸秩羣神自癸未不食至于乙酉是夜澍雨大洽丁亥詔曰炎陽爽節秋零卷澍在豫之責實深悚栗故輟膳三晨以命上訴靈鑒誠款曲流雲液雖休勿休寧敢愆怠將有賢人湛德高士凝棲雖加銓採未能招致其精訪幽谷舉茲賢彥直言極諫匡豫不及又邪佞毀朝固唯治蠹貪夫竊位大政以虧主者彈劾不肖明黜盜祿又法為治要民命尤重在京之囚悉命條奏朕將親案以時議決又疾苦六極人神所矜宜時訪恤以拯窮廢魚衆寡困乏不能自存者明加矜恤令得存濟又輕徭薄賦君人常理歲中役具以狀聞又夫婦之道生民所先仲春奔會禮有達式男女失時者以禮會之又京民始業農桑為本田稼多少課督以不具以狀言八月壬辰朔幸華林園親録囚徒咸降本罪二等決遣之戊戌車駕幸嵩高甲寅還宮丁巳南安王楨薨幸華林園聽訟九月戊辰車駕閲武於小平津癸酉還宮丁亥將通洛水入穀帝親臨觀冬十月戊戌以代遷之士皆為羽林虎賁司州之民十二夫調一吏為四年更卒歲開番假以供公私力役己酉曲赦京師十有一月乙酉復封前汝陰王天賜孫景和為汝陰王前京兆王太興為西河王閏月丙辰右將軍元隆大破汾州叛胡十有二月甲子以西北州郡旱儉遣侍臣循察開倉賑恤乙丑開鹽池之禁與民共之丙寅廢皇太子恂為庶人丁卯告太廟戊辰置常平倉州刺史穆泰等在州謀反遣行吏部尚書任城王澄案治之樂陵王思譽坐知泰陰謀不告削爵為庶人二十有一年春正月丙申立皇子恪為皇太子賜天下為父後者爵一級己亥遣兼侍中張彝崔光兼散騎常侍劉藻巡方省察問民疾苦黜陟守宰宣揚風化乙巳車駕北巡二月壬戌次於太原親見高年問所不便乙丑詔并州士人年六十已上假以郡守先是定州民王金鈎訛言惑衆自稱應王丙寅州郡捕斬之癸酉車駕至平城甲戌謁永固陵癸未行幸雲中三月庚寅車駕至自雲中辛卯謁金陵乙未車駕南巡己酉次離石叛胡歸罪宥之甲寅詔汾州民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級丙辰車駕次平陽遣使者以太牢祭唐堯夏四月庚申幸龍門遣使者以太牢祭夏禹癸亥行幸蒲坂遣使者以太牢祭虞舜戊辰詔修堯舜夏禹廟辛未行幸長安壬申武興王楊集始來朝乙亥親見高年問所疾苦丙子遣侍臣分省縣邑賑賜穀帛戊寅幸未央殿阿房宮遂幸昆明池癸未大將軍宋王劉昶薨丙戌遣使者以太牢祀漢帝諸陵五月丁亥朔衛大國遣使朝貢己丑車駕東旋泛渭入河庚寅詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣令七十以上假荒縣庶老以年各減一等七十以上賜爵三級其營船之夫賜爵一級孤寡魚衆貧窮痾廢疾各賜帛二匹穀五斛其孝友德義文學才幹悉仰貢舉壬辰遣使者以太牢祭周文王於酆祭武王於鎬癸卯遣使祭華嶽六月庚申車駕至自長安壬戌詔冀定瀛相濟五州發卒二十萬將以南討癸亥司空穆亮遜位丁卯部分六師以定行留秋七月甲午立昭儀馮氏為皇后戊辰以前司空穆亮為征北大將軍開府儀同三司冀州刺史甲寅帝親為羣臣講喪服於清徽堂八月丙辰詔中外戒嚴壬戌立皇子愈為京兆王懌為清河王懷為廣平王壬申行幸河南城甲戌講武於華林園庚辰車駕南討九月丙申詔曰哀貧恤老王者所先魚衆寡六疾尤宜矜愍可敕司州洛陽之民年七十已上無子孫六十以上無期親貧不自存者給以衣食及不滿六十而有廢痼之疾無大功之親窮困無以自療者皆於別坊遣醫救護給醫師四人豫請藥物以療之丁酉詔河南尹李崇討梁州叛羌受征西源懷節度辛丑帝留諸將攻赭陽引師而南癸卯至宛城夜襲其郛克之丁未車駕發南陽留太尉咸陽王禧前將軍元英攻之己酉車駕至新野冬十月丁巳四面進攻不克詔左右軍築長圍以守之乙亥追廢貞皇后林氏為庶人十有一月甲午蕭鸞前軍將軍韓秀方弋陽太守王副之後軍將軍趙祖悅等十五將來降丁酉大破賊軍於沔北獲其將軍王伏保等於是民皆復業九十以上假以郡守六十五以上假以縣令新野民張暏柵萬餘家拒守不下十有二月庚申破之俘斬萬餘丁卯詔流徒之囚皆勿決遣有登城之際令其先鋒自效庚午車駕臨沔遂巡沔東還戊寅車駕還新野己卯親行營壘隱恤六軍蕭鸞將王曇紛等萬餘人寇南青州黃郭戍戍主崔僧淵擊破之悉虜其衆以齊郡王子琛紹河間王若後高昌國遣使朝貢二十有二年春正月癸未朔朝饗羣臣於新野行宮丁亥拔新野獲蕭鸞輔國將軍新野太守劉忌斬之於宛戊子鸞湖陽戍主蔡道福棄城遁走辛卯鸞赭陽戍主成公期軍主胡松棄城遁走壬辰鸞輔國將軍舞陰戍主黃瑤起及直閣將軍臺軍主鮑舉南鄉太守席謙相尋遁走瑤起鮑舉為軍人所獲送庚戌行幸南陽二月乙卯進攻宛北城甲子拔之鸞冠軍將軍南陽太守房伯玉面縛出降庚午車駕幸新野辛未詔以穰民首歸大順終始若一者給復三十年標其所居曰歸義鄉次降者給復十五年三月壬午朔大破鸞平北將軍崔惠景黃門郎蕭衍軍於鄧城斬獲首虜二萬有餘庚寅行幸樊城觀兵襄沔耀武而還曲赦二荊魯陽郡鎮南將軍王肅攻鸞義陽鸞遣將裴叔業寇渦陽乙未詔將軍鄭思明嚴虛敬宇文福等三軍繼援辛丑行幸湖陽乙未次比陽戊申詔荊州諸郡之民初降次附復同穰縣辛亥行幸懸瓠夏四月甲寅從征武直之官進位三階文官二級外官一階庚午發州郡兵二十萬人限八月中旬集懸瓠趙郡王幹薨五月丙午詔在征身喪者四品已下及卑兼之職給帛有差六月庚申詔諸王將士戰沒皆加優贈秋七月壬午詔曰朕以寡德屬茲靖亂實賴羣英凱清南夏宜約躬賞效以勸茂績后之私府便可損半六宮嬪御五服男女常恤供亦令減半在戎之親三分省一是月蕭鸞死子寶卷僭立八月辛亥皇太子自京師來朝壬子蕭寶卷奉朝請鄧學擁其齊興郡內屬敕勒樹者相率反叛詔平北將軍江陽王繼都督北討諸軍事以討之壬午高麗國遣使朝獻九月己亥帝以蕭鸞死禮不伐喪乃詔反斾庚子仍將北伐叛虜丙午車駕發懸瓠冬十月己酉朔曲赦二豫殊死已下復民田租一歲十有一月辛巳幸鄴十有二月甲寅以江陽王繼定敕勒乃詔班師二十有三年春正月戊寅朔朝羣臣以帝疾瘳上壽大饗於澄鸞殿壬午幸西門豹祠遂歷漳水而還蕭寶卷遣太尉陳顯達寇荊州癸未詔前將軍元英討之乙酉車駕發鄴戊戌至自鄴庚子告於廟社癸卯行飲至策勳之禮甲辰大赦天下太保齊郡王簡薨二月辛亥以長兼太尉咸陽王禧為正太尉癸亥以中軍大將軍彭城王協為司徒復樂陵王思譽本封癸酉顯達攻陷馬圈戍三月庚辰車駕南伐癸未次梁城甲申以順陽被圍危急詔振武將軍慕容平城率騎五千赴之丙戌帝不豫司徒彭城王協侍疾禁中且攝百揆丁酉車駕至馬圈詔鎮南大將軍廣陽王嘉斷均口邀顯達歸路戊戌頻戰破之其夜顯達及崔惠景曹虎等宵遁己亥收其戎資億計班賜六軍諸將追奔及於漢水斬獲及赴水而死者十八九斬寶卷左軍將軍張于達等賊將蔡道福成公期率數萬人棄順陽遁走庚子帝疾甚車駕北次穀塘原甲辰詔賜皇后馮氏死詔司徒協徵太子於魯陽踐阼詔以侍中護軍將軍北海王詳為司空公鎮南將軍王肅為尚書令鎮南大將軍廣陽王嘉為尚書左僕射尚書宋辨為吏部尚書與侍中太尉公禧尚書右僕射任城王澄等六人輔政顧命宰輔曰粵爾太尉司空尚書令左右僕射吏部尚書惟我太祖丕丕之業與四象齊茂纍聖重明屬鴻曆於寡昧兢兢業業思纂乃聖之遺蹤遷都嵩極定鼎河庶南蕩甌吳復禮萬國以仰光七廟俯濟蒼生困窮早滅不永乃志公卿其善毗繼子隆我魏室不亦善歟可不勉之夏四月丙午朔帝崩于穀塘原之行宮時年三十三祕諱至魯陽發哀還京師上諡曰孝文皇帝廟曰高祖五月丙申葬長陵帝幼有至性年四歲顯祖曾患癰帝親自吮膿五歲受禪悲泣不能自勝顯祖問帝帝曰代親之感內切於心顯祖甚歎異之文明太后以帝聰聖後或不利於馮氏將謀廢帝乃於寒月單衣閉室絶食三朝召咸陽王禧將立之元丕穆泰李冲固諫乃止帝初不有憾唯深德丕等撫念諸弟始終曾無纖介惇睦九族禮敬俱深雖於大臣持法不縱然性寬慈每垂矜捨進食者曾以熱羹傷帝手又曾於食中得蟲穢之物並笑而恕之宦者先有譖帝於太后太后大怒杖帝數十帝默然而受不自申明太后崩後亦不以介意聽覽政事莫不從善如流哀矜百姓思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑為倦尚書奏案多自尋省百官大小無不留心務於周洽每言凡為人君患於不均不能推誠御物苟能均誠胡越之人亦可親如兄弟常從容謂史官曰直書時事無諱國惡人君威福自己史復不書將何所懼南北征巡有司奏請治道帝曰粗修橋梁通輿馬便止不須去草剗令平也凡所修造不得已而為之不為不急之事損民力也巡幸淮南如在內地軍事須伐民樹者必留絹以酬其直民稻粟無所傷踐諸有禁忌禳厭之方非典籍所載者一皆除罷雅好讀書手不釋卷五經之義覽之便講學不師受探其精奧史傳百家無不該涉善談莊老尤精釋義才藻富贍好為文章詩賦銘頌任興而作有大文筆馬上口授及其成也不改一字自太和十年已後詔冊皆帝之文也自餘文章百有餘篇愛奇好士情如飢渴待納朝賢隨才輕重常寄以布素之意悠然玄邁不以世務嬰心又少而善射有膂力年十餘歲能以指彈碎羊髆骨及射禽獸莫不隨所志斃之至年十五便不復殺生射獵之事悉止性儉素常服浣濯之衣鞍勒鐵木而已帝之雅志皆此類也史臣曰有魏始基代朔廓平南夏闢壤經世咸以威武為業文教之事所未遑也高祖幼承洪緒早著睿聖之風時以文明攝事優游恭己玄覽獨得著自不言神契所標固以符於冥化及躬總大政一日萬機十許年間曾不暇給殊途同歸百慮一致至夫生民所難行人倫之高迹雖尊居黃屋盡蹈之矣若乃欽明稽古協御天人帝王制作朝野軌度斟酌用捨煥乎其有文章海內生民咸受耳目之賜加以雄才大略愛奇好士視下如傷役己利物亦無得而稱之其經緯天地豈虛諡也
