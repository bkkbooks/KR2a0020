body:
  text: 魏書卷六十一列傳第四十九薛安都畢衆敬沈文秀張讜田益宗孟表薛安都字休達河東汾陰人也父廣司馬德宗上黨太守安都少驍勇善騎射頗結輕俠諸兄患之安都乃求以一身分出不取片資兄許之居於別遠近交遊者爭有送遺馬牛衣服什物充牣其庭真君五年與東雍州刺史沮渠秉謀逆事發奔於劉義隆後自盧氏入寇弘農執太守李拔等遂逼陝城時秦州刺史杜道生討安都仍執拔等南遁及世祖臨江拔乃得還安都在南以武力見值劉駿起江州遂以為將位至左衛率劉昶歸降子業以安都為平北將軍徐州刺史鎮彭城和平六年劉彧殺其主子業而自立羣情不協共立子業弟晉安王子勛安都與沈文秀崔道固常珍奇等舉兵應之彧遣將張永討安都安都遣使來降請兵救援顯祖召羣臣議之羣官咸曰昔世祖常有并義隆之心故親御六軍遠臨江浦今江南阻亂內外離心安都今者求降千載一會機事難遇時不可逢取亂侮亡於是乎在顯祖納之安都又遣第四子道次為質并與李敷等書絡繹相繼乃遣鎮東大將軍博陵公尉元城陽公孔伯恭等率騎一萬赴之拜安都使持節散騎常侍都督徐南北兗青冀五州豫州之梁郡諸軍事鎮南大將軍徐州刺史賜爵河東公安都以事窘歸國元等既入彭城安都乃中悔謀圖元等欲還以城叛會元知之遂不果發安都因重貨元等委罪於女壻裴祖隆元乃殺祖隆而隱安都謀皇興二年與畢衆敬朝于京師大見禮重子姪羣從並處上客皆封侯至于門生無不收焉又為起第宅館宇崇麗資給甚厚三年卒贈本將軍秦州刺史河東王諡曰康子道標襲爵太和初出為鎮南將軍平州刺史治有聲稱轉相州刺史將軍如故復以本將軍為秦州刺史十三年卒子達字宗胤襲例降為侯及開建五等以安都著勳先朝封達河東郡開國侯食邑八百戶後以河東畿甸改封華陰縣侯熙平初拜奉車都尉出為漢陽太守達不樂為郡詔聽解卒子承華襲爵稍遷司徒從事中郎河東邑中正卒於安南將軍光祿大夫子羅漢襲齊受禪爵例降道標弟道異亦以勳為第一客早卒贈寧西將軍秦州刺史安邑侯道異弟道次既質京師拜南中郎將給事中賜爵安邑侯加安遠將軍出為安西將軍秦州刺史假河南公太和十五年為光祿大夫卒子巒襲爵降為平溫子尚書郎秦州刺史鎮遠將軍隴西鎮將帶隴西太守後為滎陽太守遷平北將軍肆州刺史所在貪穢在州彌甚納賄於司空劉騰以求美官未得而騰死正光五年莫折念生反於秦州遣其別帥卜胡王慶雲等衆寇涇州肅宗以巒為持節光祿大夫假安南將軍西道別將與伊生等討之進及平涼郡東與賊交戰不利巒等退還後為撫軍將軍汧城大都督鎮北隴孝昌二年春卒於軍贈征西大將軍雍州刺史子如故安都兄子碩明隨安都入國賜爵蒲坂侯清河太守太中大夫安都從祖弟真度初與安都南奔及安都為徐州真度為長史頗有勇幹為其爪牙從安都來降為上客太和初賜爵河北侯加安遠將軍為鎮遠將軍平州刺史假陽平公後降侯為伯除冠軍將軍隨駕南討假平南將軍久之除護南蠻校尉平南將軍荊州刺史蕭賾雍州刺史曹虎之詐降也詔真度督四將出襄陽無功而還後征赭陽為房伯玉所敗有司奏免官爵高祖詔曰真度之罪誠如所奏但頃與安都送款彭方開闢徐宋外捍沈攸道成之師內寧邊境烏合之衆淮海來服功頗在茲言念厥績每用嘉美赭陽百敗何足計也宜異羣將更申後效可還其元勳之爵復除荊州刺史自餘徽號削奪進足彰忠退可明失尋除假節假冠軍將軍東荊州刺史初遷洛後真度每獻計於高祖勸先取樊鄧後攻南陽故為高祖所賞賜帛一百匹又加持節正號冠軍改封臨晉縣開國公食邑三百戶詔曰獻忠盡心人臣令節標善賞功有國徽範故一言可以興邦片辭可以喪國得無遠録前謀以褒厥善真度爰自遷京每在戎役沔北之計所與聞知無不言頗見採納及六師南邁朕欲超據新野羣情皆異真度獨與朕同撫蠻寧夷實有勤績可增邑二百戶轉征虜將軍豫州刺史景明初豫州大飢真度表曰去歲不收飢饉十五今又災雪三尺民人萎餧無以濟之臣輒日別出州倉米五十斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在拯恤陳郡儲粟雖復不多亦可分贍尚書量賑以聞及裴叔業以壽春內附詔真度率衆赴之尋遷華州刺史將軍如故未幾轉荊州刺史仍本將軍入為大司農卿正始初除平南將軍揚州刺史又以年老聽子懷吉以本官隨行蕭衍豫州刺史王超宗率衆圍逼小峴真度遣兼統軍李叔仁等率步騎擊之超宗逆來拒戰叔仁擊破之俘斬三千還朝除金紫光祿大夫加散騎常侍又改封敷西縣永平中卒年七十四賻帛四百匹朝服一襲贈左光祿大夫常侍如故諡曰莊有子十二人嫡子懷徹襲封自太常丞稍遷征虜將軍中散大夫又除左將軍太中大夫卒於車騎將軍左光祿大夫初真度有女妓數十人每集賓客輒命奏之絲竹歌舞不輟於前盡聲色之適庶長子懷吉居喪過周以父妓十餘人并樂器獻之世宗納焉懷吉好勇有膂力雖不善書學亦解達世事自奉朝請歷直後寢領太官令正始初為驃騎將軍後試守農郡蕭衍遣衆入寇徐兗安東邢巒討之詔懷吉以本任為巒軍司永平初分梁州晉壽為益州除征虜將軍益州刺史以元愈未平中山王英為征東將軍討之詔懷吉為英軍司未發而愈平蕭衍遣將寇陷郢州之三關詔英南討懷吉仍為軍司以義陽危急令懷吉馳驛先赴時豫州城民白早生殺刺史以懸瓠入蕭衍衍將齊苟仁率衆守城於是自懸瓠以南至于安陸惟義陽一城而已懷吉與郢州刺史婁悅督厲將士且守且戰卒全義陽與英討復三關諸戍後鎮東將軍盧昶救朐山與賊相持詔懷吉為昶軍司及昶敗懷吉得不坐延昌中以本將軍除梁州刺史南秦氐反攻逼武興懷吉遣長史崔纂司馬韋弼別駕范珦擊平之進號右將軍正光初除後將軍汾州刺史四年卒贈平北將軍并州刺史懷吉本不厲清節及為汾州偏有聚納之響自以支庶餌誘勝己共為婚姻多攜親戚悉令同行兼為之彌縫恣其取受而將勞賓客曲盡物情送去迎來不避寒熱性少言每有接對但默然而退既指授先期人馬之數左右密已記録俄而酒饌相尋芻粟繼至逮于將別贈以錢縑下及厮傭咸過本望其延納貴賤若此懷吉弟懷直京兆內史衛大將軍左光祿大夫懷直弟懷朴農太守襄陵男懷朴弟懷景征南將軍河東太守安定男卒贈持節都督北徐兗東徐三州諸軍事驃騎大將軍儀同三司徐州刺史懷景弟懷俊撫軍將軍光祿大夫汾陰男出為征南將軍益州刺史天平初代還至梁州與刺史元羅俱為蕭衍將蘭欽所擒送江南衍見懷俊謂之曰卿父先為魏荊州我于時猶在襄陽且州壤連接極相知練卿今至此當能住乎若欲還者亦以禮相遣顧謂左右曰此家在北富貴極不可言懷俊便乞歸衍聽還國興和中卒子湛儒襲武定中司空水曹參軍齊受禪爵例降真度諸子既多其母非一同産相朋因有憎愛興和中遂致訴列云以毒藥相害顯在公府發揚疵釁時人焉畢衆敬小名捺東平須昌人少好弓馬射獵交結輕果常於疆境盜掠為業劉駿為徐兗刺史辟為部從事駿既竊號歷其泰山太守冗從僕射及劉彧殺子業而自立遣衆敬出詣兗州募人到彭城刺史薛安都召與密謀云晉安有上流之名且孝武第三子當共卿為計西從乃矯彧命以衆敬行兗州事衆敬從之時兗州刺史殷孝祖留其妻子率文武二千人赴彧使司馬劉文石守城衆敬率衆取瑕丘殺文石安都與孝祖先不相協命衆敬誅孝祖諸子衆敬不得已遂殺之州內悉附唯東平太守申纂據無鹽城不與之同及彧平子勛授纂兗州刺史會安都引國授軍經其城下纂閉門城守深恨衆敬會有人發衆敬父墓遂令其母骸首散落衆敬發哀行服拷掠近墓細民死者十餘人又疑纂所為弟衆愛為安都長史亦遣人密至濟陰掘纂父墓以相報答及安都以城入國衆敬不同其謀子元賓以母并百口悉在彭城恐交致禍日夜啼泣遣請衆敬衆敬猶未從之衆敬先已遣表謝彧彧授衆敬兗州刺史而以元賓有他罪獨不捨之衆敬拔刀斫柱曰皓首之年唯有此子今不原貸何用獨全及尉元至遂以城降元遣將入城事定衆敬悔恚數日不食皇興初就拜散騎常侍寧南將軍兗州刺史賜爵東平公與中書侍郎李璨對為刺史慕容白曜攻克無鹽申纂為亂兵所傷走出被擒送於白曜白曜無殺纂之意而城中火起纂創重不能避為火所燒死衆敬聞克無鹽懼不殺纂乃與白曜書并表朝廷云家之禍酷皆由於纂聞纂死乃悅二年與薛安都朝于京師因留之賜甲第一區後復為兗州刺史將軍如故徵還京師衆敬善自奉養食膳豐華必致他方遠味年已七十鬢髮皓白而氣力未衰跨鞍馳騁有若少壯篤於姻類深有國士之風張讜之亡躬往營視有若至親太和中高祖賓禮舊老衆敬與咸陽公高允引至方山雖文武奢儉好尚不同然亦與允甚相愛敬接膝談款有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具銀裝劍一口刺虎矛一枚仙人文綾一百匹文明太后高祖引見於皇信堂賜以酒饌車一乘馬三匹絹二百匹勞遣之十五年十月卒詔於兗州賜絹一千匹以供葬事子元賓少而豪俠有武幹涉獵書史為劉駿正員將軍與父同建勳誠及至京師俱為上客賜爵須昌侯加平遠將軍後以元賓勳重拜使持節平南將軍兗州刺史假彭城公父子相代為本州當世榮之時衆敬以老還鄉常呼元賓為使君每於元賓聽政之時乘輿出至元賓所先遣左右敕不聽起觀其斷決欣欣然喜見顏色衆敬善持家業尤能督課田産大致儲積元賓為政清平善撫民物百姓愛樂之以父憂解任喪中遙授長兼殿中尚書其年冬末卒贈撫軍將軍衛尉卿諡曰平賜帛八百匹元賓入國初娶東平劉氏有四子祖朽祖髦祖歸祖旋賜妻元氏生二子祖榮祖暉祖朽最長祖暉次祖髦故事前妻雖先有子後賜之妻子皆承嫡所以劉氏先亡祖暉不服重元氏後卒祖朽等三年終禮祖榮早卒子義允襲祖爵東平公例降為侯陵江將軍給事中卒子僧安襲祖朽身長八尺腰帶十圍歷涉經史好為文詠性寬厚善與人交襲父爵須昌侯例降為伯起家員外郎尚書郎治書侍御史加寧遠將軍本州中正正始三年蕭衍將蕭及先率步騎二萬入寇兗州及先令別帥角念屯于蒙山以祖朽為統軍假寧朔將軍隸邢巒討之祖朽開誘有方降者相繼賊出逆戰祖朽大破之賊走還柵祖朽夜又焚擊賊徒潰散追討百餘里斬獲及赴沂水死者四千餘人斬龍驤將軍矯道儀寧朔將軍王季秀以功封南城縣開國男食邑二百戶歷散騎侍郎中書侍郎加龍驤將軍延昌末安南王志出討荊沔以祖朽為志軍司兼給事黃門侍郎尋遷司空長史神龜末除持節東豫州刺史將軍如故祖朽善撫邊人清平有信務在安靜百姓稱之還除前將軍太尉長史兼尚書北道行臺孝昌初除持節本將軍南兗州刺史尋授度支尚書行定州未之職改授安東將軍瀛州刺史為賊帥鮮于修禮攻圍積旬拒守自固病卒於州贈衛將軍吏部尚書兗州刺史祖朽無子以弟祖歸子義暢為後襲爵義暢傾巧無士業善通時要歷尚書郎中侍郎兗州刺史大中正中軍將軍通直散騎常侍太昌初車騎將軍尋除散騎常侍天平中坐與北豫州山賊張儉通伏法祖髦起家奉朝請兄祖朽別封南城以須昌侯回授之神龜初纍遷揚烈將軍東平太守後為本州別駕卒於官子義和襲卒於右將軍太中大夫贈散騎常侍安東將軍兗州刺史子仁超義和第六弟義亮性豪疏歷尚書郎中書舍人天平中與舍人韋鴻坐泄密賜盡於宅祖暉早有器幹自奉朝請稍遷鎮遠將軍前軍將軍直後正始中除龍驤將軍東郡太守入為驍騎將軍加征虜將軍後試守勃海郡熙平中拜潁川太守神龜初除右將軍豳州刺史入為平東將軍光祿大夫正光五年豳州民反招引隴賊攻逼州城以祖暉前在州日得民情和復授平西將軍豳州刺史假安西將軍為別將以討之祖暉且戰且前突圍入治孝昌初北海王皓救至城圍始解以全城之勳封新昌縣開國子食邑四百戶後值蕭寶夤退敗祖暉乃拔城東趣華州坐免官爵尋假征虜將軍行豳州事建義中詔復州爵加撫軍將軍永安中祖暉從大嶺柵規入州城于時賊帥叱干騏驎保太子壁祖暉擊破之而賊宿勤明達復攻祖暉祖暉兵少糧竭軍援不至為賊所乘遂歿時年五十長子義協襲爵武定中開府中郎齊受禪爵例降義協弟義雲尚書騎兵郎中祖歸官至建寧太守子義遠武定中平原太守義遠弟義顯義俊性並豪率天平已後蕭衍使人還往經歷兗城前後州將以義俊兄弟善營鮭膳器物鮮華常兼長史接宴賓客義顯左將軍太中大夫義俊歷司空主簿兗州別駕而卒祖旋太尉行參軍鎮遠將軍卒贈都官尚書齊兗二州刺史子義真太尉行參軍衆敬弟衆愛隨兄歸國以勳為第一客賜爵巨平侯卒贈冠軍將軍徐州刺史諡曰康子聞慰字子安有器幹襲爵例降為伯拜泰山太守入為尚書郎本州中正加威遠將軍出為徐州平東府長史帶彭城內史永平中遷中散大夫加龍驤將軍延昌初除清河內史因以疾辭復為龍驤中散又試守廣平內史正光初相州刺史中山王熙起兵謀誅元叉聞慰斬其使發兵拒之在任寬謹百姓愛附後叉以聞慰忠於己遷持節平東將軍滄州刺史甚有政績後以本軍除散騎常侍東道行臺尋為都督安樂王鑒軍司孝昌元年春徐州刺史元法僧反聞慰與鑒攻之為法僧所敗奔還京師被劾遇赦免其年卒年五十七贈散騎常侍安東將軍兗州刺史伯如故諡曰恭子祖彥字修賢涉獵書傳風度間雅為時所知以侍御史為元法僧監軍法僧反逼祖彥南入永安中得還歷中書侍郎襲爵巨平伯中軍將軍光祿大夫天平四年卒年五十贈都督兗濟二州諸軍事征東將軍尚書左僕射兗州刺史祖彥弟哲永安末祕書郎諸畢當朝不乏榮貴但幃薄不修為時所鄙申纂者本魏郡人申鍾曾也皇始初太祖平中山纂宗室南奔家于濟陰及在無鹽劉彧用為兗州刺史顯祖曰申纂既不識機又不量力進不能歸正朔退不能還江南守孤城於危亡之地欲建功立節豈可得乎纂既敗子景義入國太和中為散員士宋王劉昶國侍郎景明初試守濟陰郡揚州車騎府録事參軍右司馬常珍奇者汝南人也為劉駿司州刺史亦與薛安都等推立劉子勛子勛敗遣使馳告長社鎮請降顯祖遣殿中尚書元石為都將率衆赴之中書博士鄭羲參石軍事進至上蔡珍奇率文武來迎羲説石令徑入城語在羲傳事定以珍奇為持節平南將軍豫州刺史河內公珍奇表曰臣昔蒙劉氏生成之恩感義亡身志陳報答遂與雍州刺史袁顗豫州刺史殷琰等共唱大義奉戴子勛纂承彼曆大運未集遂至分崩而劉彧滔天殺主篡立蒼生殄悴危於綴旒伏惟陛下龍姿鳳儀光格四表凡在黔黎延屬象魏所願天地垂仁亟圖南服宜遣文檄喻以吉凶使江東之地離心草靡荊雍九州北面請吏乞高臣官名更遣雄將秣馬五千助臣經討并賜威儀震動江外長江已北必可定矣臣雖不武乞備前驅進據之宜更在處分敢冒愚款推誠上聞機運可乘實在茲日珍奇雖有虛表而誠款未純歲餘徵其子超超母胡氏不欲超赴京師密懷南叛時汝徐未平元石自出攻之珍奇乘虛於懸瓠反叛燒城東門斬三百餘人虜掠上蔡安城平輿三縣居民屯于灌水石馳往討擊大破之會日暗放火燒其營珍奇乃匹馬逃免其子超走到苦城為人所殺小子沙彌囚送京師刑為閹人沈文秀字仲遠吳興武康人伯父慶之劉駿司空公文秀初為郡主簿稍遷建威將軍青州刺史和平六年劉子業為其叔彧所殺文秀遂與諸州推立劉子勛及子勛敗皇興初文秀與崔道固俱以州降請師應接顯祖遣平東將軍長孫陵等率騎赴之會劉彧遣文秀弟文炳來喻之文秀復歸於彧彧以文秀為輔國將軍刺史如故後慕容白曜既克升城引軍向歷下白曜復遣陵等率萬餘人長驅至東陽文秀始欲降以軍人虜掠遂有悔心乃嬰城固守陵乃引師軍於清西白曜既下歷城乃率大衆并力攻討長圍數匝自夏至春始克文秀取所持節衣冠儼然坐於齋內亂兵入曰文秀何在文秀厲聲曰身是執而裸送于白曜左右令拜文秀曰各二國大臣無相拜之禮白曜忿之乃至撾撻後還其衣為之設饌遂與長史房天樂司馬沈嵩等鎖送京師面縛數罪宥死待為下客給以粗衣蔬食顯祖重其節義稍亦加禮之拜為外都下大夫太和三年遷外都大官高祖嘉文秀忠於其國賜絹綵二百匹後為南征都將臨發賜以戎服尋除持節平南將軍懷州刺史假吳郡公是時河南富饒人好奉遺文秀一無所納卒守清貧然為政寬緩不能禁止盜賊而大興水田於公私頗有利益在州數年年六十一卒子保沖太和中奉朝請大將軍宋王外兵參軍後為南徐州冠軍長史二十一年坐援漣口退敗有司處之死刑高祖詔曰保沖文秀之子可特原命配洛陽作部終身既而獲免世宗時卒於下邳太守房天樂者清河人滑稽多智先為青州別駕文秀拔為長史督齊郡州府之事一以委之卒于京師弟子嘉慶漁陽太守嘉慶從弟瑚璉長廣太守文秀族子嵩聰敏有筆札文秀以為司馬甚器任之隨文秀至懷州文秀卒後依宋王劉昶昶遇之無禮憂愧飢寒未幾而卒文秀族子陵字道通太和十八年高祖南伐陵攜族孫智度歸降引見於行宮陵姿質妍偉辭氣辨暢高祖奇之禮遇亞於王肅授前軍將軍後監南徐州諸軍事中壘將軍南徐州刺史尋假節龍驤將軍二十二年秋進持節冠軍將軍及高祖崩陵陰有叛心長史趙儼密言于朝廷尚書令王肅深保明之切責儼既而果叛殺數十人驅掠城中男女百餘口夜走南入智度於彭城知之從清中單舸奔陵為下邳戍人所射殺張讜字處言清河東武城人也六世祖名犯顯祖諱晉長秋卿父華為慕容超左僕射讜仕劉駿歷給事中泰山太守青冀二州輔國府長史帶魏郡太守劉彧之立遙授冠軍將軍東徐州刺史及革徐兗讜乃歸順於尉元元亦表授冠軍東徐州刺史遣中書侍郎高閭與讜對為刺史後至京師禮遇亞於薛畢以勳賜爵平陸侯加平遠將軍讜性開通篤於撫恤青齊之士雖疏族末姻咸相敬視李敷李欣等寵要勢家亦推懷陳款無所顧避畢衆敬等皆敬重之高允之徒亦相器待延興四年卒贈平南將軍青州刺史諡康侯子敬伯求致父喪出葬冀州清河舊墓久不被許停柩在家積五六年第四子敬叔先在徐州初聞父喪不欲奔赴而規南叛為徐州所勒送至乃自理後得襲父爵敬伯自以隨父歸國之功賜爵昌安侯出為樂陵太守敬叔武邑太守父喪得葬舊墓還屬清河初讜兄弟十人兄忠字處順在南為合鄉令世祖南征忠歸降賜爵新昌男拜新興太守卒官贈冀州刺史初讜妻皇甫氏被掠賜中官為婢皇甫遂乃詐癡不能梳沐後讜為劉駿冀州長史因貨千餘匹購求皇甫高宗怪其納財之多也引見之時皇甫年垂六十矣高宗曰南人奇好能重室家之義此老母復何所任乃能如此致費也皇甫氏歸讜令諸妾境上奉迎數年卒卒後十年而讜入國讜兄子安世正始中自梁漢同夏侯道遷歸款為客積年出為東河間太守卒官元茂為信都令遷冀州治中元茂弟子讓洛州安西府長史都水使者田益宗光城蠻也身長八尺雄果有將略貌狀舉止有異常蠻世為四山蠻帥受制於蕭賾太和十七年遣使張超奉表歸款十九年拜員外散騎常侍都督光城弋陽汝南新蔡宋安五郡諸軍事冠軍將軍南司州刺史光城縣開國伯食蠻邑一千戶所統守宰任其銓置後以益宗既渡淮北不可仍為司州乃於新蔡立東豫州以益宗為刺史尋改封安昌縣伯食實邑五百戶二十二年進號征虜將軍景明初蕭衍遣軍主吳子陽率衆寇三關益宗遣光城太守梅興之步騎四千進至陰山關南八十餘里據長風城逆擊子陽大破之斬獲千餘級蕭衍建寧太守黃天賜築城赤亭復遣其將黃公賞屯於漴城與長風相持益宗命安蠻太守梅景秀為之掎角擊討破天賜等斬首數百獲其二城上表曰臣聞機之所在聖賢弗之疑兼弱攻昧前王莫之捨皆拯羣生於湯炭盛武功於方來然霜葉將淪非徑飈無以速其籜天之所棄非假手無以殲其人竊惟蕭衍亂常君臣交爭江外州鎮中分為兩東西抗峙已淹歲時民庶窮於轉輸甲兵疲於戰鬬事救於目前力盡於麾下無暇外維州鎮綱紀庶方藩𣏬立孤存而已不乘機電掃廓彼蠻疆恐後之經略未易於此且壽春雖平三面仍梗鎮守之宜實須豫設義陽差近淮源利涉津要朝廷行師必由此道若江南一平有事淮外須乘夏水泛長列舟長淮師赴壽春須從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼衆不過須精卒一萬二千然行師之法貴張形勢請使兩荊之衆西擬隨雍揚州之卒頓于建安得捍三關之援然後二豫之軍直據南關對抗延頭遣一都督總諸軍節度季冬進師迄于春末弗過十旬克之必矣世宗納之遣鎮南元英攻義陽益宗遣其息魯生領步騎八千斷賊糧運并焚其鈞城積聚衍戍主趙文舉率衆拒戰魯生破之獲文舉及小將胡建興古皓莊元仲等斬五千餘級溺死千五百人倉米運舟焚燒蕩盡後賊寧朔將軍楊僧遠率衆二千寇逼蒙籠益宗命魯生與戍主奇道顯逆擊破之追奔十里俘斬千餘進號平南將軍又詔益宗率其部曲并州鎮文武與假節征虜將軍太僕少卿宇文福綏防蠻楚加安南將軍增封一百戶賜帛二千匹白早生反於豫州詔益宗曰懸瓠要藩密邇嵩潁南疆之重所寄不輕而羣小猖狂忽構釁逆殺害鎮主規成反叛此而可忍孰不可容即遣尚書邢巒總精騎五萬星馳電驅征南將軍中山王英統馬步七萬絡繹繼發量此蟻寇唯當逃奔知將軍志翦豺狼以清邊境節義慷慨良在可嘉非蹇蹇之至何以能爾深戢誠款方相委託故遣中書舍人趙文相具宣朕懷往還之規口別指授便可善盡算略隨宜追掩勿令此豎得有竄逸遲近清蕩更有別旨時自樂口已南郢豫二州諸城皆沒於賊唯有義陽而已蕭衍招益宗以車騎大將軍開府儀同三司五千戶郡公當時安危在益宗去就而益宗守節不移郢豫克平益宗之力也益宗年稍衰老聚斂無厭兵民患其侵擾諸子及孫競規賄貨部內苦之咸言欲叛世宗深亦慮焉乃遣中書舍人劉桃符宣旨慰喻庶以安之桃符還啓益宗侵掠之狀世宗詔之曰風聞卿息魯生淮南貪暴擾亂細民又橫殺梅伏生為爾不已損卿誠效可令魯生與使赴闕當加任使如欲外祿便授中畿一郡魯生久未至延昌中詔曰益宗先朝耆艾服勤邊境不可以地須其人遂令久屈可使持節鎮東將軍濟州刺史常侍如故世宗慮其不受代遣後將軍李世哲與桃符率衆襲之出其不意奄入廣陵益宗子魯生魯賢等奔於關南招引賊兵襲逐諸戍光城已南皆為賊所保世哲討擊破之復置郡戍而以益宗還授征南將軍金紫光祿大夫加散騎常侍改封曲陽縣開國伯益宗生長邊地不願內榮雖位秩崇重猶以為恨上表曰臣昔在南仰餐皇化擁率部曲三千餘家棄彼邊榮歸投樂土兄弟荼炭釁結賊朝高祖孝文皇帝録臣乃誠授以藩任方欲仰憑國威冀雪寃豈容背寵向讎就險危命昔郢豫紛擾臣躬率義兵擁絶賊路竊謂誠心仰簡朝野但任重據邊易招塵謗致使桃符橫加讒毀説臣欲投南暴亂非一乞檢事原以何為驗復云虐害番兵殺賣過半如其所言未審死失之家所訟有幾又云耗官粟帛倉庫傾盡御史覆檢曾無損折初代之日二子魯生魯賢從子超秀等並在城中安然無二而桃符密遣積射將軍鹿永固私將甲士打息魯生僅得存命唱云我被面敕若能得魯生魯賢首者各賞本郡士馬圍繞騰城唱殺二息戰怖實由於此殘敗居業為生蕩然乃復毀發墳墓露泄枯骸存者罹生離之苦亡魂遭粉骨之痛昔歲朝廷頻遣桃符數加慰勞而桃符凶姦擅生禍福云唯我相申致降恩旨及返京師復欺朝廷説臣父子全無忠誠誣陷貞良惑亂朝聽乞攝桃符與臣並對若臣罪有狀分從憲網如桃符是謬坐宜有歸詔曰既經大宥不容方更為獄熙平初益宗又表乞東豫以招二子靈太后令曰卿誠著二朝勳光南服作藩萬里列土承家前朝往恩酬不淺兼子弟荷榮中表被澤相輕重卿所知悉先帝以卿勞舊州小祿薄故遷牧華壤爰登顯級于時番兵交換不生猜疑而卿息魯賢等無事外叛忠孝俱乖翻為戎首以卿誠重不復相計今臥護征南榮以金紫朝廷處遇又甚於先且卿年老方就間養焉得以本州為念魯賢來否豈待自往也但遣慰納足相昭亮若審遣信當更啓聞別敕東豫聽卿喻曉魯賢二年卒年七十三贈征東大將軍郢州刺史諡曰莊少子纂襲封位至征虜將軍中散大夫卒贈左將軍東豫州刺史益宗長子隨興冠軍將軍平原太守隨興情貪邊官不願內地改授弋陽汝南二郡太守益宗兄興祖太和末亦來歸附景明中假郢州刺史及義陽置郢州改授征虜將軍江州刺史詔賜朝服劍舄一具治麻城興祖卒益宗請隨興代之世宗不許罷并東豫初益州內附之後蕭鸞遣寧州刺史董巒追討之官軍進擊執巒并其子景曜送於行宮巒字仲舒營陽人真君末隨父南叛雖長自江外言語風氣猶同華夏性疏武不多識文字高祖引巒於庭問其南事巒怖不能對數顧景曜景曜進代父答申蕭鸞篡襲始終辭理橫出言非而辨高祖異焉以巒為越騎校尉景曜為員外郎謀欲南叛坐徙朔州及車駕南討漢陽召巒從軍景曜至洛陽密啓其父必當奔叛軍次魯陽巒單騎南走過南陽新野歷告二城以魏軍當至戒之備防房伯玉劉忌並云無足可慮巒曰不然軍勢甚盛至境首北向哭呼景曜云吾百口在彼事理須還不得顧汝一子也景曜鎖詣行在所數而斬之又有陳伯之者下邳人也以勇力自效仕於江南為鎮南大將軍江州刺史豐城縣開國公景明三年伯之遣使密表請降并遣其子冠軍將軍徐州刺史永昌縣開國侯虎牙為質四年以伯之為持節都督江郢二州諸軍事平南將軍江州刺史曲江縣開國公邑一千戶虎牙為冠軍將軍員外散騎常侍豫寧縣開國伯邑五百戶正始初蕭衍征虜將軍趙祖悅築城於水東與潁川接對置兵數千欲為攻討之本伯之進軍討祖悅大破之乘勝長驅入城刺祖悅三創賊衆大敗進討南城破賊諸部斬獲數千二年夏除伯之光祿大夫虎牙遷前軍將軍孟表字武達濟北蛇丘人也自云本屬北地號索里諸孟青徐內屬後表因事南渡仕蕭鸞為馬頭太守太和十八年表據郡歸誠除輔國將軍南兗州刺史領馬頭太守賜爵譙縣侯鎮渦陽後蕭鸞遣其豫州刺史裴叔業攻圍六十餘日城中食盡唯以朽革及草木皮葉為糧表撫循將士勠力固守會鎮南將軍王肅解義陽之圍還以救之叔業乃退初有一南人自云姓邊字叔珍攜妻息從壽春投表云慕化歸國未及送闕便值叔業圍城表後察叔珍言色頗疑有異即加推核乃云是叔業姑兒為叔業所遣規為內應所攜妻子並亦假妄表出叔珍於北門外斬之於是人情乃安高祖嘉其誠績封汶陽縣開國伯邑五百戶遷征虜將軍濟州刺史為散騎常侍光祿大夫進號平西將軍世宗末降平東將軍齊州刺史延昌四年卒年八十一贈安東將軍兗州刺史諡曰恭子崇襲官至昌黎濟北二郡太守史臣曰薛安都一武夫耳雖輕於去就實啓東南事窘圖變而竟保寵秩優矣真度一謀見賞明主衆敬舉地納誠榮曜朝國人位並列無乏於時文秀不回有死節之氣非但身蒙嘉禮乃至子免刑戮在我欲其罵人忠義可不勉也張讜觀機委質篤恤流離亦仁智矣田益宗蠻夷荒帥翻然效款終懷金曳紫不其美歟孟表之致名位非徒然也
