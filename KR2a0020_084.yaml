body:
  text: 魏書卷七十九列傳第六十七成淹范紹劉桃符劉道斌董紹馮元興鹿悆張熠成淹字季文上谷居庸人也自言晉侍中粲之六世孫祖升家於北海父洪名犯顯祖廟諱仕劉義隆為撫軍府中兵參軍早卒淹好文學有氣尚劉子業輔國府刑獄參軍事劉彧以為員外郎假龍驤將軍領軍主令援東陽歷城皇興中降慕容白曜赴闕授兼著作郎時顯祖於仲冬之月欲巡漠北朝臣以寒甚固諫並不納淹上接輿釋遊論顯祖覽之詔尚書李欣曰卿等諸人不如成淹論通釋人意乃敕停行太和中文明太后崩蕭頤遣其散騎常侍裴昭明散騎侍郎謝竣等來弔欲以朝服行事主客執之云弔有常式何得以朱衣入山庭昭明等言本奉朝命不容改易如此者數四執志不移高祖敕尚書李沖令選一學識者更與論執沖奏遣淹昭明言未解魏朝不聽朝服行禮義出何典淹言吉凶不同禮有成數玄冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿遠自江南奉慰不能式遵成事方謂議出何典行人得失何其異哉昭明言二國交和既久南北皆須準望齊高帝崩魏遣李彪通弔於時初不素服齊朝亦不以為疑那得苦見要逼淹言彪通弔之日朝命以弔服自隨而彼不遵高宗追遠之慕乃踰月即吉彪行弔之時齊之君臣皆已鳴玉盈庭貂璫曜日百僚內外朱服煥然彪行人不被主人之命復何容獨以素服間衣冠之中來責雖高未敢聞命我皇帝仁孝之性侔於有虞處諒暗以來百官聽於冢宰卿豈得以此方彼也昭明乃搖膝而言三皇不同禮亦安知得失所歸淹言若如來談卿以虞舜高宗為非也昭明遂相顧而笑曰非孝者宣尼有成責行人亦弗敢言希主人裁以弔服使人唯齎袴褶比既戎服不可以弔幸借緇衣以申國命今為魏朝所逼違負指授還南之日必得罪本朝淹言彼有君子也卿將命折中還南之日應有高賞若無君子也但令有光國之譽雖復非理見罪亦復何嫌南史董孤自當直筆既而高祖遣李沖問淹昭明所言淹以狀對高祖詔沖曰我所用得人仍敕送衣給昭明等賜淹果食明旦引昭明等入皆令文武盡哀後正侍郎高祖以淹清貧賜絹百匹十六年蕭賾遣其散騎常侍庾蓽散騎侍郎何憲主書邢宗慶朝貢值朝廷有事明堂因登靈臺以觀雲物高祖敕淹引蓽等館南矚望行禮事畢還外館賜酒食宗慶語淹言南北連和既久而比棄信絶好為利而動豈是大國善鄰之義淹言夫為王者不拘小節中原有菽工採者獲多豈眷眷守尾生之信且齊先主歷事宋朝荷恩積世當應便爾欺奪宗慶庾蓽及行者皆相顧失色何憲知淹昔從南入而以手掩目曰卿何為不作于禁而作魯肅淹言我捨危效順欲追蹤陳韓何于禁之有憲亦不對王肅歸國也高祖以淹曾官江表詔觀是非乃造肅與語還奏言實時議紛紜猶謂未審高祖曰明日引入我與語自當知之及鑾輿行幸肅多扈從敕淹將引若有古迹皆使知之行到朝歌肅問此是何城淹言紂都朝歌城肅言故應有殷之頑民也淹言昔武王滅紂悉居河洛中因劉石亂華仍隨司馬東渡肅知淹寓於青州乃笑而謂淹曰青州間何必無其餘種淹以肅本隸徐州言青州本非其地徐州間今日重來非所知也肅遂伏馬上掩口而笑顧謂侍御史張思寧曰向者聊因戲言遂致辭溺思寧馳馬奏聞高祖大悅謂彭城王協曰淹此段足為制勝輿駕至洛肅因侍宴高祖戲肅曰近者行次朝歌聞成淹共卿殊有往覆卿試重之肅言臣前朝歌為淹所困不謂此事仰聞聽覽臣爾日失言一之已甚豈宜再説遂皆大笑高祖又謂肅曰淹能制卿其才亦不困肅言淹才詞便為難有聖朝宜應進高祖言若因此進淹恐辱卿轉甚肅言臣屈己達人正可顯臣之美高祖曰卿既為人所屈欲求屈己之名復於卿太優肅言淹既蒙進臣得屈己伸人此所謂陛下惠而不費遂酣笑而止乃賜淹龍上馬一匹并鞍勒宛具朝服一襲轉謁者僕射時遷都高祖以淹家無行資敕給事力送至洛陽并賜假日與家纍相隨行次靈丘屬蕭鸞遣使敕驛馬徵淹車駕濟淮淹於路左請見高祖佇駕而進之淹曰蕭鸞悖虐幽明同棄陛下俯應人神按劍江涘然敵不可小蜂蠆有毒而況國乎深願聖明保萬全之策詔曰此前車之轍得不慎乎淹曰伏聞發洛已來諸有諫者解官奪職恐非聖明納下之義高祖曰此是我命耳卿不得為干斧鉞淹曰昔文王詢於芻蕘晉文聽輿人之誦臣雖卑賤敢同匹夫高祖優而容之詔賜絹百匹高祖幸徐州敕淹與閭龍駒等主舟楫將泛泗入河泝流還洛軍次碻磝淹以黃河浚急慮有傾危乃上疏陳諫高祖敕淹曰朕以代無運漕之路故京邑民貧今移都伊洛欲通運四方而黃河急浚人皆難涉我因有此行必須乘流所以開百姓之心知卿至誠而今者不得相納敕賜驊騮馬一匹衣冠一襲除羽林監領主客令加威遠將軍于時宮殿初構經始務廣兵民運材日有萬計伊洛流澌苦於厲涉淹遂啓求敕都水造浮航高祖賞納之意欲榮淹於衆朔旦受朝百官在位乃賜帛百匹知左右二都水事世宗初司徒彭城王協曰先帝本有成旨淹有歸國之誠兼歷官著稱宜加優陟高祖雖崩詔猶在耳乃相聞選曹加淹右軍領左右都水仍主客令復授驍騎將軍加輔國將軍都水主客如故淹小心畏法典客十年四方貢聘皆有私遺毫釐不納乃至衣食不充遂啓乞外祿景明三年出除平陽太守將軍如故還朝病卒贈本將軍光州刺史諡曰定子霄字景鸞亦學涉好為文詠但詞彩不倫率多鄙俗與河東薑質等朋遊相好詩賦間起知音之士共所嗤笑閭巷淺識頌諷成羣乃至大行於世歷治書侍御史而卒范紹字始孫敦煌龍勒人少而聰敏年十二父命就學師事崔光以父憂廢業母又誡之曰汝父卒日令汝遠就崔生希有成立今已過期宜遵成命紹還赴學太和初充太學生轉算生頗涉經史十六年高祖選為門下通事令史遷録事令掌奏文案高祖善之又為侍中李沖黃門崔光所知出內文奏多以委之高祖曾謂近臣曰崔光從容范紹之力稍遷強弩將軍積弩將軍公車令加給事中遷羽林監揚州刺史任城王澄請征鍾離敕紹詣壽春共量進止澄曰須兵十萬往還百日渦陽鍾離廣陵廬江欲數道俱進但糧仗軍資須朝廷速遣紹曰計十萬之衆往還百日須糧百日頃秋以向末方欲徵召兵仗可集恐糧難至有兵無糧何以克敵願王善思為社稷深慮澄沉思良久曰實如卿言使還具以狀聞後澄遂征鍾離無功而返尋除長兼奉車都尉轉右都水使者録事如故丁母憂去職值義陽初復起紹除寧遠將軍郢州龍驤府長史帶義陽太守其年冬使還都值朝廷有南討之計發河北數州田兵二萬五千人通緣淮戍兵合五萬餘人廣開屯田八座奏紹為西道六州營田大使加步兵校尉紹勤於勸課頻歲大獲又詔紹詣鍾離與都督中山王英論攻鍾離形勢英固言必克紹觀其城隍防守恐不可陷勸令班師英不從紹還具以狀聞俄而英敗詔以徐豫二境民稀土曠令紹量度處所更立一州紹以譙城形要之所置州為便遂立南兗入為主衣都統加中堅將軍轉前軍將軍追賞營田之勤拜遊擊將軍遷龍驤將軍太府少卿都統如故轉長兼太府卿紹量功節用甄煩就簡凡有賜給千匹以上皆別覆奏然後出之靈太后嘉其用心敕紹每月入見諸有益國利民之事皆令面陳出除安北將軍并州刺史清慎守法頗得民和值山胡來寇不能擊以此損其聲望復入為太府卿莊帝初遇害河陰劉桃符中山盧奴人生不識父九歲喪母性恭謹好學舉孝廉射策甲科歷碎職景明中羽林監領主書蕭寶夤之降也桃符受詔迎接歷奉車都尉長水校尉遊擊將軍正始中除征虜將軍中書舍人以勤明見知久不遷職世宗謂之曰揚子雲為黃門頓歷三世卿居此任始十年不足辭也東豫州刺史田益宗居邊貪穢世宗頻詔桃符為使慰喻之桃符還具稱益宗既老耄而諸子非理處物世宗後欲代之恐其背叛拜桃符征虜將軍豫州刺史與後軍將軍李世哲領衆襲益宗語在益宗傳桃符善恤蠻左為民吏所懷久之徵還病卒年五十一贈後將軍洛州刺史子景均殿中侍御史劉道斌武邑灌津人自云中山靖王勝之後也幼而好學有器幹及長腰帶十圍鬚髯甚美舉孝廉入京拜校書郎轉主書頗為高祖所知從征南陽還加積射將軍給事中高祖謂黃門侍郎邢巒曰道斌是段之舉便異儕流矣世宗即位遷謁者僕射轉步兵校尉廣武將軍領中書舍人出為武邑太守時冀州新經元愈逆亂之後加以連年災儉道斌頻為表請蠲其租賦百姓賴之罷郡還除右將軍太中大夫又以本將軍出為農太守遷岐州刺史所在有清治之稱正光四年卒於州贈平東將軍滄州刺史改贈濟州諡曰康道斌在農修立學館建孔子廟堂圖畫形像去郡之後民故追思之乃復畫道斌形於孔子像之西而拜謁焉子士長武定中碭郡太守卒董紹字興遠新蔡鮦陽人也少好學頗有文義起家四門博士歷殿中侍御史國子助教積射將軍兼中書舍人辨於對問為世宗所賞豫州城人白早生以城南叛詔紹慰勞至上蔡為賊所襲囚送江東仍被鎖禁蕭衍領軍將軍呂僧珍暫與紹言便相器重衍聞之遣使勞紹云忠臣孝子不可無人今當聽卿還國紹對曰老母在洛無復方寸既奉恩貸實若更生衍又遣主書霍靈超謂紹曰今放卿還令卿通兩家之好彼此息民豈不善也對曰通好息民乃兩國之事既蒙命及輒當聞奏本朝衍賜紹衣物引入見之令其舍人周捨慰勞并稱戰爭多年民物塗炭是以不先言與魏朝通好比亦有書都無報旨卿宜備申此意故遣傳詔周靈秀送卿至國遲有嘉問又令謂紹曰卿知所以得不死不今者獲卿乃天意也夫千人之聚不散則亂故須立君以治天下不以天下養一人凡在民上胡不思此若欲通好今以宿豫還彼彼當以漢中見歸先是詔有司以所獲衍將齊苟兒等十人欲以換紹事在司馬悅傳及紹還世宗愍之永平中除給事中仍兼舍人紹雖陳説和計朝廷不許久之加輕車將軍正舍人又除步兵校尉肅宗初紹上御天馬頌帝賞其辭賜帛八十匹又除龍驤將軍中散大夫舍人如故加冠軍將軍出除右將軍洛州刺史紹好行小惠頗得民情蕭衍將軍曹義宗王玄真等寇荊州據順陽馬圈裴衍王羆討之既復順陽進圍馬圈城堅裴王糧少紹上書言其必敗未幾裴衍等果失利順陽復為義宗所據紹有氣病啓求解州詔不許蕭寶夤反於長安也紹上書求擊之云臣當出瞎巴三千生噉蜀子肅宗謂黃門徐紇曰此巴真瞎也紇曰此是紹之壯辭云巴人徑勇見敵無所畏懼非實瞎也帝大笑敕紹速行又加平西將軍以拒寶夤之功賞新蔡縣開國男食邑二百戶永安中代還於是除安西將軍梁州刺史假撫軍將軍兼尚書為山南行臺頗有清稱前廢帝以元孚代之紹至長安時爾朱天光為關右大行臺啓紹為大行臺從事兼吏部尚書又除征西將軍金紫光祿大夫天光赴洛留紹於後天光敗賀拔嶽復請紹為其開府咨議參軍永熙中加車騎將軍嶽後攜紹於高平牧馬紹悲而賦詩曰走馬山之阿馬渴飲黃河寧謂胡關下復聞楚客歌後為宇文黑獺所殺子敏永安中為太尉西閣祭酒馮元興字子盛東魏郡肥鄉人也其世父僧集官至東清河西平原二郡太守贈濟州刺史元興少有操尚隨僧集在平原因就中山張吾貴常山房虬學通禮傳頗有文才年二十三還鄉教授常數百人領僚孝廉對策高第又舉秀才時御史中尉王顯有權寵元興奏記於顯召為檢校御史尋轉殿中除奉朝請三使高麗江陽王繼為司徒元興為記室參軍遂為元叉所知叉秉朝政引元興為尚書殿中郎領中書舍人仍御史元興居其腹心預聞時事卑身克己人無恨焉家素貧約食客數十人同其飢飽曾無吝色時人歎尚之及太保崔光臨薨薦元興為侍讀尚書賈思伯為侍講授肅宗杜氏春秋於式乾殿元興常為摘句儒者榮之及叉欲解領軍以訪元興元興曰未知公意如何耳叉曰卿謂吾欲反也元興不敢言因勸之叉既賜死元興亦被廢乃為浮萍詩以自喻曰有草生碧池無根緑水上脆弱惡風波危微苦驚浪丞相高陽王雍召為兼屬未幾去任還鄉僕射元羅為東道大使以元興為本郡太守尋徵赴闕以母憂還家頻值鄉亂數為監軍元興多所賞罰鄉黨頗以此憾焉上黨王天穆之討邢杲引為大將軍從事中郎元皓入洛復為平北將軍光祿大夫領中書舍人莊帝還宮天穆以為太宰咨議參軍加征虜將軍普泰初安東將軍光祿大夫領中書舍人太昌初卒於家贈征東將軍齊州刺史文集百餘篇元興世寒因元叉之勢託其交道相用為州主簿論者以為非倫高祖時有譙郡曹道頗涉經史有幹用舉孝廉太和中東宮主書門下録事景明中尚書都令史領主書後轉中書舍人行使每稱旨出除東郡太守卒贈儀同三司又有北海曹升亦以學識清立見知歷治書侍御史永安中黃門郎散騎常侍出帝世國子祭酒不營家産至以餒卒於鄴時人傷歎之又齊郡曹昂有學識舉秀才永安中太學博士兼尚書郎而常徒步上省以示清貧忽遇盜大失綾縑時人鄙其矯詐鹿悆字永吉濟陰人父生在良吏傳悆好兵書陰陽釋氏之學太師彭城王協召為館客嘗詣徐州馬疫附船而至大梁夜睡從者上岸竊禾四束以飼其馬船行數里悆覺問得禾之處從者以告悆大忿即停船上岸至取禾處以縑三丈置禾束下而返初為真定公元子直國中尉勸以忠廉之節嘗賦五言詩曰嶧山萬丈樹雕鏤作琵琶由此材高遠弦響藹中華又曰援琴起何調幽蘭與白雪絲管韻未成莫使弦響絶子直少有令問悆欲其善終故以諷焉母憂去職服闋仍卒任子直出鎮梁州悆隨之州州有兵糧和糴和糴者靡不潤屋悆獨不取子直強之終不從命莊帝為御史中尉悆兼殿中侍御史監臨淮王彧軍時蕭衍遣其豫章王綜據徐州綜密信通彧云欲歸款綜時為蕭衍愛子衆議咸謂不然彧募人入報驗其虛實悆遂請行曰若綜有誠心與之盟約如其詐也豈惜一人命也時徐州始陷邊方騷擾綜部將成景俊胡龍牙並總強兵內外嚴固悆遂單馬間出徑趣彭城未至之間為綜軍主程兵潤所止問其來狀悆答曰兵交使在自昔通言我為臨淮王所使須有交易兵潤遂先遣人白龍牙等綜既有誠心聞悆被執語景俊等曰我每疑元略規欲叛城將驗其虛實且遣左右為元略使入魏軍中喚彼一人其使果至可令人詐作略身在一深室詭為患狀呼使戶外令人傳語時略始被衍追還綜又遣腹心梁話迎悆密語意狀令善酬答引悆入城詣龍牙所時日已暮龍牙列仗舉火引悆曰元中山甚欲相見故令喚卿又曰安豐臨淮將少弱卒規復此城容可得乎悆曰彭城魏之東鄙勢在必爭得否在天非人所測龍牙曰當如卿言復詣景俊住所停悆在外門久而未入時夜已久星月甚明有綜軍主薑桃來與悆語曰君年已長宿又充今使良有所達元法僧魏之微子拔城歸梁梁主待物有道乃舉手上指今歲星在斗斗吳之分野君何為不歸梁國我令君富貴悆答曰君徒知其一未知其二法僧者莒僕之流而梁納之無乃有愧於季孫也今月建鶉首斗牛受破歲星木也逆而克之君吳國敗喪不久且衣錦夜遊有識不許言未及盡引入見景俊景俊曰元中山雖曰相喚不懼而來何也答曰昔楚伐吳吳遣蹶由勞師今者此行略同於彼又曰遊歷多年與卿先經相識仍由緣景俊便記引悆同坐謂悆曰卿不為刺客也答曰今者為使欲返命本朝相刺之事更卜後圖為設飯食雜果悆強飲多食向敵數人微自夸矜諸人相謂曰壯士哉乃引向元略所一人引入戶內指床令坐一人別在室中出謂悆曰中山有教與君相聞悆遂起立使人謂悆曰君但坐悆曰家國王子豈有坐聽教命使人曰頓首君我昔有以向南旦遣相喚欲聞鄉事晚來患動不獲相見悆曰旦奉音旨冒險祇赴不得瞻見內懷反側遂辭而退須臾天曉綜軍主范勗景俊司馬楊壜等競問北朝士馬多少悆云秦隴既平三方靜晏今有高車白眼羌蜀五十萬齊王李陳留崔延伯李叔仁等分為三道徑趣江西安樂王鑒李神領冀相齊濟青光羽林十萬直向琅邪南出諸人相謂曰詎非華辭也悆曰可驗崇朝何華之有日晏令還景俊送悆上戲馬臺北望城壘曰何此城之固良非彼軍士所能圖擬卿可語二王回師改計悆曰金墉湯池衝甲彌巧貴守以人何論險害還軍於路與梁話誓盟契約既固未旬綜果降詔曰日者法僧父子頑固自天長惡不已竊城外叛職此亂階遂使彭宋名藩翻為賊有雖宗臣名將揮戈於泗濱虎士雄卒竦劍於汴渚然高墉峻堞非可易登廣涘深隍實為難踐是用日昃忘食中宵憤惋者也而衍都督豫章王蕭綜體運知機欲歸有道潛遣密信送款於都督臨淮王于時事同夜光能不按劍殿中侍御史監軍鹿悆不憚虎口視險若夷便能占募入驗虛實誓盟既固所圖遂果返地復城息我兵甲亦是悆之力焉若不酬以榮祿何以勸厲將來可封定陶縣開國子食邑三百戶除員外散騎常侍俄出為青州彭城王劭府長兼司馬尋解長兼廣川人劉鈞東清河人房須反劭遣悆監州軍討之戰於商山頗有所捷將統皆劭左右擅增首級妄請賞帛悆面執不與劭弗從悆勃然作色曰竭志立言為王為國豈悆家事不辭而出劭追而謝焉竊勳者放言噂欲加私害悆聞而笑之不以介意先是蕭衍遣將彭羣王辨率衆七萬圍逼琅邪自春及秋官軍不至而兩青士馬裁可萬餘師次鄖城久而未進劭乃遣悆南青州刺史胡平遣長史劉仁之並監勒諸將徑赴賊壘大破之斬羣首俘馘二千餘級肅宗嘉之璽書勞問永安中入為左將軍給事黃門侍郎又以前賞悆入徐之功未盡增邑二百戶進爵為侯雖任居通顯志在謙退迎送親賓加於疇昔而自無室宅常假賃居止布衣糲食寒暑不變莊帝嘉其清素時復賜以錢帛及東徐城民呂文欣殺刺史元大賓南引賊衆屯柵曲術詔悆使持節散騎常侍安東將軍為六州大使與行臺樊子鵠討破之文欣黨重以購之文欣同逆人韓端正斬文欣送首魁帥同死者十二人詔書褒慰還拜鎮東將軍金紫光祿大夫尋詔為使持節兼尚書左僕射東南道三徐行臺至東郡值爾朱仲遠陷西兗向滑臺詔與都督賀拔勝等拒仲遠軍敗還京普泰中加征東將軍轉衛將軍右光祿大夫兼度支尚書河北五州和糴大使天平中除梁州刺史時滎陽民鄭榮業等聚衆反圍逼州城悆不能固守遂以城降榮業送悆於關西張熠字景世自云南陽西鄂人漢侍中衡是其十世祖熠自奉朝請為揚州車騎府録事參軍入除步兵校尉永寧寺塔大興經營務廣靈太后曾幸作所凡有顧問熠敷陳指畫無所遺闕太后善之久之除冠軍將軍中散大夫後為別將隨長孫稚西征轉平西將軍太中大夫為關西都督以功封長平縣開國男食邑二百戶永安初除平西將軍岐州刺史假安西將軍尋加撫軍將軍矜恤貧弱為民所愛代還值元皓入洛仍令復州熠遂私還莊帝還宮出除鎮南將軍東荊州刺史尋加散騎常侍征蠻大都督轉荊州刺史值爾朱兆入洛不行普泰中衛將軍金紫光祿大夫天平初遷鄴草創右僕射高隆之吏部尚書元世俊奏曰南京宮殿毀撤送都連筏竟河首尾大至自非賢明一人專委受納則恐材木耗損有闕經構熠清貞素著有稱一時臣等輒舉為大將詔從之熠勤於其事尋轉營構左都將興和初衛大將軍宮殿成以本將軍除東徐州刺史三年卒於州時年六十贈驃騎大將軍司空公兗州刺史諡曰懿子孝直武定末司空騎兵參軍史臣曰成淹等身遭際會俱得效其所能以至於顯達苟曰非才亦何可以致
