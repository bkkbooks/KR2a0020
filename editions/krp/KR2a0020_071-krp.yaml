body:
  text: 魏書卷七十一齊魏收撰列傳第五十九裴叔業夏侯道遷李元護席法友王世弼江悅之淳于誕李苗裴叔業河東聞喜人也魏兾州刺史徽之後也五代祖苞晉秦州刺史祖邕自河東居于襄陽父順宗兄叔寶仕蕭道成並有名位叔業少有氣幹頗以将略自許仕蕭賾歴右軍将軍東中郎将諮議參軍蕭鸞見叔業而竒之謂之曰卿有如是志相何慮不大富貴深宜勉之鸞為豫州引為司馬帶陳留太守鸞輔政叔業常伏壯士數百人於建業及鸞廢昭文叔業率衆赴之鸞之自立也以叔業為給事黄門侍郎封武昌縣開國伯食邑五百户髙祖南廵車駕次鍾離鸞拜叔業持節冠軍將軍徐州刺史以水軍入淮去王師數十里髙祖令尚書郎中裴聿往與之語叔業盛飾左右服翫以夸聿曰我在南富貴正如此豈若卿彼之險陋也聿云伯父儀服誠為羙麗但恨不晝遊耳徙輔國将軍豫州刺史屯夀陽鸞死子寶卷自立遷叔業本将軍南兗州刺史會陳顯逹圍建鄴叔業遣司馬李元護率軍赴寶卷其實應顯逹也顯逹敗而還叔業慮内難未已不願為南兗以其去建業近受制於人寶卷嬖人茹法珍王咺之等疑其有異去來者並云叔業北入叔業兄子植颺粲等棄母奔夀陽法珍等以其既在疆場急則引魏力不能制且欲羈縻之白寳卷遣中書舎人裴長穆慰誘之許不復回換叔業雖云得停而憂懼不已遣親人馬文範以自安之計訪之於寳卷雍州刺史蕭衍曰天下之事大勢可知恐無復自立理雍州若能堅據襄陽輒當勠力自保若不爾回面向北不失作河南公衍遣文範報曰羣小用事豈能及遠多遣人相代力所不辦少遣人又於事不足意計回惑自無所成唯應送家還都以安慰之自然無患若意外相逼當勒馬歩二萬直至横江以斷其後則天下之事一舉可定也若欲北向彼必遣人相代以河北一地相處河南公寧復可得如此則南歸之望絶矣叔業沉疑未決遣信詣豫州刺史薛真度具訪入國可否之宜真度答書盛陳朝廷風化惟新之羙知卿非無欵心自不能早決捨南耳但恐臨迫而來便不獲多賞叔業遲遲數反真度亦遣使與相報復乃遣子芬之及兄女夫韋伯昕奉表内附景明元年正月世宗詔曰叔業明敏秀發英欵早悟馳表送誠忠髙振古宜加褒授以彰先覺可使持節散騎常侍都督豫雍兗徐司五州諸軍事征南将軍豫州刺史封蘭陵郡開國公食邑三千户又賜叔業璽書曰前後使返有勑想卿具一二寳卷昏狂日月滋甚虐遍宰輔暴加戚屬淫刑既逞朝無孑遺國有瓦解之形家無自安之計卿兼兹智勇深懼禍萌飜然髙舉去彼危亂朕興居在念深嘉乃勲前即勑豫州緣邊諸鎮兵馬行往赴援楊大眼奚康生鐵騎五千星言即路彭城王勰尚書令肅精卒十萬絡繹繼發将以長驅淮海電擊衡巫卿其并心勠力同斯大舉殊勲茂績職爾之由崇名厚秩非卿孰賞并有勑與州佐吏及彼土人士其有微功片效必加褒異軍未渡淮叔業病卒年六十三李元護席法友等推叔業兄子植監州事乃贈開府儀同三司餘如故諡忠武公給東園温明祕器朝服一襲錢三十萬絹一千匹布五百匹蠟三百觔子蒨之字文聰仕蕭鸞為随郡王左常侍先卒子譚紹封譚麤險好殺所乘牛馬為小驚逸手自殺之然孝事諸叔盡於子道國祿歲入每以分贍世以此稱之世宗以譚及髙皇后弟貞王肅子紹俱為太子洗馬肅宗踐祚轉員外常侍遷輔國將軍中散大夫卒贈平南将軍豫州刺史諡曰敬子測字伯源襲厯通直散騎侍郎天平中走於關西蒨之弟芬之字文馥長者好施篤愛諸弟仕蕭鸞歴位羽林監入國以父勲授通直散騎常侍上蔡縣開國伯食邑七百户除廣平内史固辭不拜轉輔國将軍東秦州刺史在州有清静之稱入為征虜将軍太中大夫徙封山茌縣出為後将軍岐州刺史正光末元志西討隴賊軍敗退守岐州為賊所圍城䧟志與芬之並為賊擒送於上邽為莫折念生所害贈平東将軍青州刺史子渉字仲昇襲卒子僑尼襲武定中員外羽林監齊受禪爵例降芬之弟簡之英之並早卒英之弟藹之字幼重性輕率好琴書其内弟栁諧善鼓琴藹之師諧而微不及也歴通直散騎侍郎平東将軍安廣汝陽二郡太守卒叔業長兄子彦先少有志尚叔業以夀春入國彦先景明二年逃遁歸魏朝廷嘉之除通直散騎常侍封雍邱縣開國子食邑三百户出為趙郡太守為政舉大綱而已正始中轉渤海相屬元愉作逆徴兵郡縣彦先不從為愉拘執踰獄得免仍為沙門濳行至洛愉平勑還郡延昌中卒時年六十一熙平中贈持節左将軍南青州刺史諡曰惠恭子約字元儉性頗剛鯁起家員外郎轉給事中永平中丹陽太守後襲爵兾州大乘賊起勑為别将行渤海郡事後州軍為賊所敗遂圍郡城城䧟見害年三十六神龜中贈平原太守出帝時復贈前將軍揚州刺史長子英起武定末洛州刺史英起弟威起卒於齊王開府中兵參軍年三十二贈鴻臚少卿彦先弟絢揚州治中時揚州霖雨水入州城刺史李崇居於城上繫船憑焉絢率城南民數千家汎舟南走避水髙原謂崇還北遂與别駕鄭祖起等送子十四人於蕭衍自號豫州刺史衍将馬仙琕遣軍赴之崇聞絢反未測虛實乃遣國侍郎韓萬興單舸召之絢聞崇在悵然驚恨報崇曰比因大水蹎䟺不免羣情所逼推為盟首今大計已爾勢不可追恐民非公民吏非公吏願早行無犯将士崇遣從弟寧朔将軍神丹陽太守謝靈寳勒水軍討絢絢率衆逆戰神等大破之斬其将帥十餘人絢衆奔營神乘勝剋柵衆皆潰散絢匹馬單逃為村民所獲至尉升湖絢曰吾為人吏反而見擒有何靣目得視公也投水而死并鄭祖起等皆斬之植字文遠叔業兄叔寶子也少而好學覽綜經史尤長釋典善談理義仕蕭寳卷以軍勲至長水校尉随叔業在夀春叔業卒寮佐同謀者多推司馬李元護監州一二日謀不决定唯席法友栁元逹楊令寳等數人慮元護非其鄉曲恐有異志共舉植監州祕叔業喪問教命處分皆出於植於是開門納國軍城庫管籥悉付康生詔以植為征虜将軍兗州刺史崇義縣開國侯食邑千户尋進號平東将軍入為大鴻臚卿後以長子昕南叛有司處之大辟詔曰植闔門歸欵子昕愚昧為人誘䧟雖刑書有常理宜矜恤可特恕其罪以表勲誠尋除揚州大中正出為安東将軍瀛州刺史罷州復除大鴻臚卿遷度支尚書加金紫光禄大夫植性非柱石所為無恒兗州還也表請解官隐於嵩山世宗不許深以為怪然公私集論自言人門不後王肅怏怏朝廷處之不髙及為尚書志意頗滿欲以政事為己任謂人曰非我湏尚書尚書亦湏我辭氣激揚見於言色入參議論時對衆官面有譏毁又表毁征南将軍田益宗言華夷異類不應在百世衣冠之上率多侵侮皆此類也侍中于忠黄門元昭覽之切齒寝而不奏會韋伯昕告植欲謀廢黜尚書又奏羊祉告植姑子皇甫仲逹云受植㫖詐稱被詔率合部曲欲圖領軍于忠臣等窮治辭不伏引然衆證明昞案律在邊合率部衆不滿百人以下身猶尚斬况仲逹公然在京稱詔聚衆諠惑都邑駭動人情量其本意不可測度按詐偽律詐稱制者死今依衆證處仲逹入死金紫光祿大夫尚書崇義縣開國侯裴植身居納言之任為禁司大臣仲逹又稱其姓名募集人衆雖名仲逹切讓無忿懼之心衆證雖不見植皆言仲逹為植所使召仲逹責問而不告列推論情状不同之理不可分明不得同之常獄有所降減計同仲逹處植死刑又植親率城衆附從王化依律上議唯恩裁處詔曰凶謀既爾罪不合恕雖有歸化之誠無容上議亦不湏待秋分也時于忠專擅朝權既構成其祻又矯為此詔朝野怨之臨終神志自若遺令子弟命盡之後剪落鬚髮被以法服以沙門禮葬于嵩髙之隂年五十初植與僕躬郭祚都水使者韋儁等同時見害於後祚儁事雪加贈而植追復封爵而已植故吏渤海刁沖上疏訟之於是贈植征南将軍尚書僕射揚州刺史乃改葬植母夏侯道遷之姊也性甚剛峻於諸子皆如嚴君長成之後非衣幍不見小有罪過必束帶伏閣經五三日乃引見之督以嚴訓唯少子衍得以常服見之旦夕溫凊植在瀛州也其母年踰七十以身為婢自施三寶布衣麻菲手執箕菷於沙門寺洒掃植弟瑜粲衍並亦奴僕之服泣涕而從有感道俗諸子各以布帛數百贖免其母於是出家為比丘尼入嵩髙積歲乃還家植雖自州送祿奉母及贍諸弟而各别資財同居異爨一門數竈蓋亦染江南之俗也植母既老身又長嫡其臨州也妻子随去分違數歲論者譏焉子惔字道則襲爵植弟颺壮果有謀略常随叔業征伐以軍功為寳卷驍騎将軍叔業之歸誠也遣颺率軍於外外以討蠻楚為名内實備寳卷之衆景明初以颺為輔國将軍南司州刺史擬戍義陽封義安縣開國伯邑千户詔命未至為賊所殺贈冠軍将軍進爵縣侯餘如故世宗以颺勲効未立而卒其子烱不得襲封肅宗初烱行貨於執事乃封城平縣開國伯食邑八百户烱字休光小字黄頭頗有文學善事權門領軍元义納其金帛除鎮遠将軍散騎侍郎揚州大中正進伯為侯改封髙城縣増邑一千户尋兼尚書右丞出為東郡太守孝昌三年為城民所害贈散騎常侍鎮東将軍青州刺史開國如故諡曰簡子斌襲武定中廣州長流參軍齊受禪爵例降颺弟瑜字文琬初拜通直散騎常侍封下宻縣開國子食邑三百户尋試守滎陽郡坐虐暴殺人免官後徙封灌津子卒於渤海太守年四十五贈平南将軍豫州刺史諡曰定子堪字靈淵襲爵歴尚書郎興和中坐事死爵除瑜弟粲字文亮景明初賜爵舒縣子沉重善風儀頗以驕豪為失歴正平恒農二郡太守髙陽王雍曽以事屬粲粲不從雍甚為恨後因九日馬射勑畿内太守皆赴京師雍時為州牧粲往脩謁雍含怒待之粲神情閑邁舉止抑揚雍目之不覺解顔及坐定謂粲曰相愛舉動可更為一行粲便下席為行從容而出坐事免官後世宗聞粲善自􅋆置欲觀其風度忽令傳詔就家急召之湏臾之間使者相屬合家恇懼不測所以粲更恬然神色不變世宗歎異之時僕射髙肇以外戚之貴勢傾一時朝士見者咸望塵拜謁粲候肇惟長揖而已及還家人尤責之粲曰何可自同凡俗也又曽詣清河王懌下車始進便屬暴雨粲容歩舒雅不以霑濡改節懌乃令人持蓋覆之歎謂左右曰何代無竒人性好釋學親升講座雖持義未精而風韻可重但不渉經史終為知音所輕世宗末除前将軍太中大夫揚州大中正遷安南将軍中書令肅宗釋奠以為侍講轉金紫光祿大夫後兀顥入洛以粲為西兗州刺史尋為濮陽太守崔巨倫所逐棄州入嵩髙山前廢帝初徴為驃騎将軍左光祿大夫復為中書令後正月晦帝出臨洛濵粲起於御前再拜曰今年還節羙聖駕出遊臣幸參陪從豫奉醼樂不勝忻戴敢上夀酒帝曰昔歲北海入朝暫竊神器具聞爾日卿戒之以酒今欲使我飲何異於徃情粲曰北海志在沉湎故諌其所失陛下齊聖溫克臣敢獻微誠帝曰實乃寡徳甚愧来譽仍為命酌出帝初出為驃騎大将軍膠州刺史屬時亢旱士民勸令禱於海神粲憚違衆心乃為祈請直據胡床舉杯而言曰僕白君左右云前後例皆拜謁粲曰五嶽視三公四瀆視諸侯安有方伯而致禮海神也卒不肯拜時青州叛賊耿翔受蕭衍假署寇亂三齊粲唯髙談虚論不事防禦之術翔乘其無備掩襲州城左右白言賊至粲云豈有此理左右又言已入州門粲乃徐云耿王可引上廳事自餘部衆且付城外其不逹時變如此尋為翔所害送首蕭衍時年六十五子含字文若員外散騎侍郎粲弟衍字文舒學識優於諸兄才行亦過之事親以孝聞兼有将略仕蕭寳卷至隂平太守景明二年始得歸國授通直郎衍欲辭朝命請隐嵩髙乃上表曰臣幸乘昌運得奉盛化沐藉炎風餐佩唐徳於生於運已溢已榮但攝性乖和恒苦虚弱比風露増加精形侵耗小人愚懷有願閑養伏見嵩岑極天苞育名草脩生救疾多遊此岫臣質無靈分性乖山水非敢追踪輕舉髣髴髙蹤誠希藥此沉疴全飬禀氣耳若所療微痊庶偶影風雲永歌至徳荷衣葛屨裁營已整摇策納屣便陟山途謹附陳聞乞垂昭許詔曰知欲養疴中岳練石嵩嶺栖素雲根餌芝清壑騰跡之操深用嘉焉但治缺古風有愧山客耳既志往難裁豈容有抑便從來請世宗之末衍稍以出山干祿執事肅宗除散騎侍郎行河内郡事尋除建興太守轉河内太守加征虜将軍遭母憂解任衍歴二郡廉貞寡欲善撫百姓民吏追思之孝昌初蕭衍遣將曹敬宗寇荆州山蠻應之大路斷絶都督崔暹率數萬之衆盤桓魯陽不能前討荆州危急朝廷憂之詔衍為别將假前将軍與恒農太守王羆率軍一萬出武關以救荆州賊逆戰於浙陽衍大破之賊遂退走荆州圍解除使持節散騎常侍平東将軍假安東将軍北道都督鎮鄴西之武城封安陽縣開國子食邑三百户時相州刺史安樂王鑒濳圖叛逆衍覺其有異宻表陳之尋而鑒所部别将嵇宗馳驛告變乃詔衍與都督源子邕李神軌等討鑒平之除撫軍将軍相州刺史假鎮北将軍北道大都督進封臨汝縣開國公増邑千二百户常侍如故仍詔衍與子邕北討葛榮軍次陽平之東北漳曲賊來拒戰衍軍敗見害朝野人情莫不駭惋贈使持節車騎大将軍司空相州刺史子嵩襲武定中河内太守齊受禪爵例降又天水冀人尹挺仕蕭鸞以軍勲至陳郡太守遂與叔業參謀歸誠景明初除輔國将軍南司州刺史擬戍義陽亦封宋縣開國伯食邑八百户轉冠軍将軍東郡太守未拜而卒賜布帛一百匹贈本将軍涇州刺史子循歴太原太守循弟彖饒安令遼西太守兄弟皆有政事才時河東南解人栁元達頗涉經史仕蕭鸞歴諸王參軍與叔業姻婭周旋叔業之鎮夀春委以管記及叔業之被猜疑將謀獻欵元達贊成其計前後表啓皆元達之詞景明初除輔國将軍司徒諮議參軍封南頓縣開國子邑二百户二年秋卒時年四十三後改封夏陽縣邑户如先元達曽著大夫論備陳叔業背逆歸順契闊危難之旨又著喪服論約而易尋文多不錄子絺襲武定中東太原太守齊受禪爵例降絺弟遠字季雲性麤疎無拘檢時人或謂之栁瘨好彈琴耽酒時有文詠為肅宗挽郎出帝初除儀同開府參軍事放情琴酒之間每出返家人或問有何消息荅云無所聞縱聞亦不解元象二年客遊項城遇患卒時年四十元逹弟元瑜景明初除正員郎轉鎮南大將軍開府從事中郎帶汝隂太守延昌二年卒年五十五子諧頗有文學善鼓琴以新聲手勢京師士子翕然從學除著作佐郎建義初於河隂遇害時年二十六又武都人楊令寶有膂力善射仕蕭鸞數為小将征戰著效至譙郡太守遂參叔業歸誠之謀景明初除輔國将軍南兗州刺史擬戍淮隂封寗陵縣開國子食邑五百户在淮南征戰累著勞捷徴拜冠軍將軍試守京兆内史卒追封邵陵縣開國子邑二百户賜帛二百匹贈征虜将軍華州刺史子彪襲爵永熙中征虜将軍中散大夫齊受禪例降令寳弟令仁亦随令寳立效前将軍汝南内史又京兆杜陵人韋伯昕學尚有壮氣自以才智優於裴植常輕之植疾之如讐即彦先之妹婿也叔業以其有大志故遣送子芬之為質景明初封雲陵縣開國男食邑二百户拜南陽太守數歲坐事免久之拜員外散騎常侍加中壘將軍延昌末告尚書裴植謀為廢黜植坐死後百餘日伯昕亦病卒臨亡見植為祟口云裴尚書死不獨見由何以見怒也其叔業爪牙心膂所寄者裴智淵左中郎将封浚儀縣王昊左軍将軍封南汝隂縣趙革右中郎将封西宋縣並開國男食邑各二百户李道真右軍将軍封雎陽縣開國子食邑五百户胡文盛右軍将軍封剛陽縣魏承祖右軍将軍封平春縣並開國子食邑各三百户承祖廣陵寒人也依随叔業為趨走左右壮健善事人叔業待之甚厚及出為州以為防閤善撫士卒兼有将用自景明以後常為統軍南北征伐累有戰功歴太原太守至光祿大夫安南将軍蕭衍遣将圍義陽士民應之三闗既䧟州城時甚縣急以承祖持節行撫軍将軍率師討之大破賊衆解義陽之圍還復三闗遂為名将終於并州刺史衣冠之士預叔業勲者安定皇甫光北地梁祐清河崔髙客天水閻慶允河東栁僧習等光羙鬚髯善言笑仕蕭鸞以軍勲至右軍将軍入國為輔國将軍假南兗州刺史卒於渤海太守兄椿齡薛安都壻也随安都於彭城内附歴位司徒諮議岐州刺史光未入朝而椿齡先卒椿齡子璋鄉郡相璋弟瑒為司徒胡國珍所㧞自太尉記室超遷吏部郎性貪婪多所受納鬻賣吏官皆有定價後以丞相高陽王雍之壻超拜持節冠軍将軍豫州刺史為政殘暴百姓患之罷州後仍遇風病久之除安南将軍光祿大夫太昌初卒年五十八贈衛大将軍尚書左僕射雍州刺史子長卿司州主簿祕書郎中太尉司馬祐叔業之從姑子也好學便弓馬随叔業征伐身被五十餘創景明初拜右軍将軍賜爵山桑子出為北地太守清身率下甚有治稱歴驍騎将軍太中大夫右将軍從容風雅好為詩詠常與朝廷名賢汎舟洛水以詩酒自娱遷光祿大夫加平北将軍端然養志不歴權門出為平西将軍京兆内史當世歎其抑屈卒官贈本将軍涇州刺史髙客博學善文札羙風流景明初拜散騎侍郎出為揚州開府掾帶陳留太守卒官慶允父汪參薛安都平北将軍事安都入國聽汪還南慶允博識洽聞善於談論聽其言說不覺忘疲景明初為李元談輔國府司馬卒於敷城太守僧習善隸書敏於當世景明初為裴植征虜府司馬稍遷北地太守為政寛平氐羌悅愛肅宗時至太中大夫加前将軍出為潁川太守卒官夏侯道遷譙國人少有志操年十七父母為結婚韋氏道遷云欲懷四方之志不願取婦家人咸謂戲言及至婚日求覔不知所在於後訪問乃云逃入益州仕蕭鸞以軍勲稍遷至前軍将軍輔國将軍随裴叔業至夀春為南譙太守兩家雖為姻好而親情不恊遂單騎歸國拜驍騎将軍随王肅至夀春遣道遷守合肥肅薨道遷棄戍南叛㑹蕭衍以荘丘黑為征虜将軍梁秦二州刺史鎮南鄭黒請道遷為長史帶漢中郡㑹黒死衍以王鎮國為刺史未至而道遷隂圗歸順先是仇池鎮将楊靈珍阻兵反叛戰敗南奔衍以靈珍為征虜将軍假武都王助戍漢中有部曲六百餘人道遷憚之衍時又遣其左右吴公之等十餘人使南鄭道遷乃偽㑹使者請靈珍父子靈珍疑而不赴道遷乃殺使者五人馳擊靈珍斬其父子并送使者五首於京師江悅之等推道遷為持節冠軍将軍梁秦二州刺史道遷表曰臣聞知機其神趨利如響臣雖不武敢忘機利伏惟陛下澤被區宇徳濟蒼生八表同忻品物咸頼臣頃亡蟻賊匹馬歸闕自斯搏噬罄竭丹欵但中於夀陽横為韋纘所謗理之曲直並是楊集朗王秉所悉臣實愚短豈能自安便逃竄江呉茍存視息蕭衍梁州刺史荘邱黒與臣早舊申臣為長史值黒亡殁専任天時素願機㑹在兹遇武興私署侍郎鄭洛生來此臣即披露誠欵與其共契機要報武興王楊紹先并其中叔集起等請其遣軍以為腹背卽遣左天長由寒山路馳啓復㑹通直散騎常侍臣集朗還至武興臣聞其至知事必剋集朗果遣鄭右留使至臣閒宻參機舉㑹有蕭衍使人吴公之至知臣懐誠將歸大化遂與府司馬嚴思臧恭典籖吴宗肅王勝等共楊靈珍父子宻相構結期當取臣臣幸先覺悉得戮思恭等臣即遣鄭猥馳告集朗急求軍援而武興軍未到之間蕭衍白馬戍主尹天寶不識天命固執愚迷乃率部曲驅掠民丁敢為不逞臣即遣軍主江悦之率諸軍主席靈坦龎樹等領義勇應時討撲而樹鋭氣難裁違悦之節度輕進失脫天寳因此直到南鄭重圍州城梁秦士庶僉云危棘以義逼臣勸為刺史湏藉此威鎮靖内外臣赤誠奉國茍取濟事輒捐小跡且從權宜假當州位重遣皇甫選由斜谷道以事啓聞臣即親率士卒四日三夜交鋒苦戰武興之軍乘虚躡後天寳兇徒因宵鳥散進既摧破退失巢穴濳捨軍衆依山傍險突入白馬集朗與二弟躬擐甲胄率其所領登即擒斬戍内户口即放還民斯由皇威遐振罪人授首凶狡時殄公私慶快非但梁秦竭力實關集朗赴接之機臣前已遣軍主杜法先還洵陽構合徒黨誘結鄉落令晉夀土豪王僧承王文粲等還至西闗共興大義當今庸蜀虛弱楚鄧懸危開拓九區掃清六合形要之利在於此時進趣之略願速處分臣以愚陋猥當推舉事定之後便即束身馳歸天闕但物情草創猶有參差蕭衍魏興太守范玽安康太守范泌共前巴西太守姜修屯聚川東尚規舉斧登遣討襲具於别啓集朗兄弟並議曰臣往日歸誠誓盡心力超䝉榮奨灰殞匪報但留臣權相綏奨湏得撲滅珣等便即首路伏願聖慈特垂鑒照謹遣兼長史臣張天亮奉表略聞詔曰得表聞之将軍前識機運已投誠欵而中途猜間致有播越復翻然風返建兹殊效忠貫古烈義動遐邇漢鄭既開勢剪庸蜀混同之略方自斯始擒凶掃惡何快如之想餘黨悉平西南清盪經算淹朔當有劬勞所請軍宜别勑一二又賜道遷璽書曰得表具誠節之懷卿忠義夙挺期委自昔中有事因以致乖舛知能乘機豹變翻然改圖奨率同心萬里投順逺舉漢中為開蜀之始洪規茂略深有嘉焉今授卿持節散騎常侍平南将軍豫州刺史豐縣開國侯食邑一千户并同義諸人尋有别授王師數道絡繹電邁遣使持節散騎常侍都督征梁漢諸軍事鎮西将軍尚書邢巒指授節度卿其善建殊効稱朕意焉道遷表受平南常侍而辭豫州豊縣侯引裴叔業公爵為例世宗不許道遷自南鄭來朝京師引見於太極東堂免冠徒跣謝曰比在夀春遭韋纘之酷申控無所致此猖狂是段之來希酬昔遇勲微恩重有靦心顔世宗曰卿建為山之功一簣之玷何足謝也道遷以賞報為微逡廵不拜詔曰道遷至止既淹未恭州封可勑吏部速令召拜道遷拜日詔給百五十人供尋改封濮陽縣開國侯邑户如先歲餘頻表解州世宗許之除南兗州大中正不拜道遷雖學不淵洽而歴覽書史閑習尺牘札翰往還甚有意理好言宴務口實京師珍羞罔不畢有於京城之西水次市地大起園池植列蔬果延致秀彦時往遊適妓妾十餘常自娛樂國秩歲入三千餘匹専供酒饌不營家産每誦孔融詩曰坐上客恒滿樽中酒不空餘非吾事也識者多之出為散騎常侍平西将軍華州刺史轉安東将軍瀛州刺史常侍如故為政清嚴善禁盗賊熙平年病卒年六十九贈撫軍将軍雍州刺史贈帛五百匹諡曰明侯初道遷以㧞漢中歸誠本由王潁興之計求分邑户五百封之世宗不許靈太后臨朝道遷重求分封太后大竒其意議欲更以三百户封潁興會卒遂寢道遷不娉正室唯有庶子數人長子夬字元廷歴位前軍将軍鎮逺將軍南兗州大中正夬性好酒居䘮不戚醇醪肥鮮不離於口沽買飲噉多所費用父時田園貨賣略盡人間債負數猶千餘匹榖食至常不足弟妹不免飢寒初道遷知夬好酒不欲傳授國封夬未亡前忽夢見征虜将軍房世寳來至其家直上廰事與其父坐屏人宻言夬心驚懼謂人曰世寶至官間必撃我也尋有人至云官呼郎随召即去遣左右杖之二百不勝楚痛大呌良久乃寤流汗徹於寝具至明前涼城太守趙卓詣之見其衣濕謂夬曰卿昨夕當大飲溺衣如此夬乃具陳所夢先是旬餘祕書監鄭道昭暴病卒夬聞謂卓曰人生何常唯當縱飲耳於是昏酣遂甚夢後二日不能言針之乃得語而猶虛劣其從兄㚟等並營視之皆言危而獲振俄而心悶旋轉而死為洗浴者視其尸體大有杖處青赤隐起二百下許贈鉅鹿太守初夬與南人辛諶庾道江文遙等終日遊聚酣飲之際恒相謂曰人生局促何殊朝露坐上相看先後之間耳脫有先亡者當於良辰羙景靈前飲宴儻或有知庶其歆饗及夬亡後三月上已諸人相率至夬靈前酌飲時日晚天隂室中微闇咸見夬在坐衣服形容不異平昔時執杯酒似若獻酬但無語耳時夬家客雍僧明心有畏恐披簾欲出便即僵仆狀若被毆夬從兄欣宗云今是節日諸人憶弟疇昔之言故來共飲僧明何罪而被瞋責僧明便寤而欣宗鬼語如夬平生并怒家人皆得其罪又發擿隂私竊盗咸有次緒夬妻裴植女也與道遷諸妾不穆訟鬩徹于公庭子籍年十餘歲襲祖封已數年而夬弟眘等言其眇目癎疾不任承繼自以與夬同庶已應紹襲尚書奏籍承封元象中平東將軍太中大夫齊受禪例降㚟道遷兄子也位至咸陽太守李元護遼東襄平人八世祖允晉司徒廣陸侯允子順璠及孫沉志皆有名宦沉孫根慕容寳中書監根子後智等随慕容徳南渡河居青州數世無名位三齊豪門多輕之元護以國家平齊後随父懷慶南奔身長八尺羙鬚髯少有武力仕蕭道成歴官馬頭太守後軍将軍龍驤將軍雖以將用自達然亦頗覽文史習於簡牘髙祖至鍾離元護時在城中為蕭鸞徐州刺史蕭惠休奉使詣軍髙祖見而善之後為裴叔業司馬帶汝隂太守叔業歸順元護贊同其謀及叔業疾病外内阻貳元護督率上下以俟援軍夀春剋定元護頗有力焉景明初以元護為輔國將軍齊州刺史廣饒縣開國伯食邑一千户便道述職其年入朝尋以州民栁世明圖為不軌元護馳還歴城至即擒殄誅戮所加微為濫酷值州内饑儉民人困敝志存隠䘏表請賑貸蠲其賦役但多有部曲時為侵擾城邑苦之故不得為良刺史也三年夏卒年五十一病前月餘京師無故傳其凶問又城外送客亭柱有人書曰李齊州死綱佐餞别者見而拭之後復如此元護妾妓十餘聲色自縱情慾既甚支骨消削鬚長二尺一時落盡贈平東將軍青州刺史元護為齊州經拜舊墓廵省故宅饗賜村老莫不欣暢及將亡謂左右曰吾嘗以方伯簿伍至青州士女屬目若喪過東陽不可不好設儀衛哭泣盡哀令觀者改容也家人遵其誡子會襲正始中降爵為子邑五百户延昌中除宣威将軍給事中會頑騃好酒其妻南陽太守清河房伯玉女也甚有姿色會不荅之房乃通於其弟機因會飲醉殺之子景宣襲天平中除給事中齊受禪例降機與房遂如夫婦積十餘年房氏色衰乃更婚娶元護弟静景明初以歸誠勲拜前将軍性甚貪忍兄亡未斂便剝脫諸妓服玩及餘財物歴齊州内史天水太守静子鉉羽林監元護從叔恤卒於東代郡太守子曠之席法友安定人也祖父南奔法友仕蕭鸞以膂力自効軍勲稍遷至安豐新蔡二郡太守建安戍主蕭寳卷遣胡景略代之法友遂留夀春與叔業同謀歸國景明初拜冠軍将軍豫州刺史苞信縣開國伯食邑千户始叔業卒後法友與裴植追成叔業志淮南剋定法友有力焉尋轉冠軍将軍華州刺史未拜改授并州刺史歲餘代還蕭衍遣将楊公則寇揚州假法友征虜将軍以討之法友未至而公則敗走後假法友前將軍持節為别将出淮南欲解朐山之圍法友始渡淮而朐山敗没遂停散十年恬静自處不競勢利世宗末以本将軍除濟州刺史在州廉和著稱又徙封乘氏肅宗初拜光祿大夫熙平二年卒贈平西将軍秦州刺史贈帛三百匹諡襄侯子景通襲善事元义兼以貨賂义父繼繼為司空引景通為掾後加右軍将軍鎮軍将軍卒官贈輔國将軍衞尉少卿子鶠襲永安末尚書郎走闗西王世弼京兆霸城人也劉裕滅姚泓其祖父從裕南遷世弼身長七尺八寸魁岸有壮氣善草隸書好愛墳典仕蕭鸞以軍勲至游擊将軍為軍主助戍夀春遂與叔業同謀歸誠景明初除冠軍将軍南徐州刺史擬戍鍾離懸封慎縣開國伯食邑七百户後以本将軍除東徐州刺史治任於刑為民所怨有受納之響歲餘為御史中尉李平所彈會赦免久之拜太中大夫加征虜将軍尋以本将軍出為河北太守治有清稱轉渤海相尋遷中山内史加平北将軍直閤元羅領軍义弟也曽行過中山謂世弼曰二州刺史飜復為郡亦當恨恨耳世弼曰儀同之號起自鄧騭平北為郡始在下官正光元年卒官贈本将軍豫州刺史諡曰康長子會汝陽太守次子由字茂道好學有文才尤善草隸性方厚有名士之風义工摹畫為時人所服歴給事中尚書郎東萊太守罷郡後寓居潁川天平初元洪威搆逆大軍攻討為亂兵所害時年四十三名流悼惜之江悦之字彦和濟陽考城人也七世祖統晉散騎常侍劉淵石勒之亂南徙渡江祖興之父範之並為劉裕所誅悅之少孤仕劉駿歴諸王參軍好兵書有将略善待士有部曲數百人蕭道成初以悦之為荆州征西府中兵參軍領臺軍主遷屯騎校尉轉後軍将軍部曲稍衆千有餘人蕭頤遣戍漢中就遷輔國将軍蕭衍初劉季連據蜀反叛悅之率部曲及梁秦之衆討滅之以功進號冠軍将軍武興氐破白馬進圖南鄭悅之率軍拒戰大破氐衆還復白馬衍秦梁二州刺史荘邱黑死夏侯道遷與悅之及龎樹軍主李忻榮張元亮士孫天與等謀以梁州内附既殺蕭衍使者及楊靈珍衍華陽太守尹天寳率衆向州城悅之與樹忻榮勒衆逆戰為天寳所敗遂圍南鄭戰經四日衆心危沮咸懷離貳悅之盡以家財散賞士卒身當矢刃晝夜督戰㑹武興軍至天寳敗走道遷之克全勲欵悅之實有力焉正始二年夏與道遷俱至洛陽尋卒年六十一贈輔國將軍梁州刺史追封安平縣開國子食邑三百户諡曰荘悅之二子文遙文遠文遙少有大度輕財好士士多歸之道遷之圖楊靈珍也文遙奮劒請行遂手斬靈珍正始二年除步兵校尉遭父憂解官永平初襲封拜前軍出為咸陽太守勤於禮接終日坐聽事至者見之假以恩顔屏人宻問於是民所疾苦大盗姓名姦猾吏長無不知悉郡中震肅姦劫息止治為雍州諸郡之最徴拜驍騎将軍輔國将軍進號征虜将軍肅宗初拜平原太守在郡六年政理如在咸陽遷後将軍安州刺史文遙善於綏納甚得物情時杜洛周葛榮等相繼叛逆自幽燕以南悉皆淪䧟唯文遙介在羣賊之外孤城獨守鳩集荒餘且耕且戰百姓皆樂為用建義元年七月遘疾卒於州年五十五長史許思祖等以文遥遺愛在民復推其子果行州事既攝州任乃遺使奉表荘帝嘉之除果通直散騎侍郎假節龍驤将軍行安州事當州都督既而賊勢轉盛臺援不接果以阻隔彊寇内徙無由乃攜諸弟并率城民東奔髙麗太平中詔髙麗送果等元象中乃得還朝果弟昴武定三年襲爵齊受禪例降文遠善騎射勇於攻戰以軍勲致效自給事中稍遷中散大夫龍驤將軍龎樹南安人世宗追錄謀勲封其子景亮襄邑縣開國男食邑二百户李忻榮漢中人與樹俱擊天寳同時戰殁封其子建為清水縣開國子食邑二百户張元亮漢中人便弓馬善戰鬭以勲封撫夷縣開國子食邑二百户拜東萊太守入為平遠将軍左中郎將遷中散大夫加龍驤将軍卒贈左将軍巴州刺史士孫天與扶風人以勲封莫西縣開國男食邑二百户拜武功太守又襄陽羅道珍北海王安世潁川辛諶漢中姜永等皆參其勲末道珍除齊州東平原相有治稱卒於鎮遠將軍屯騎校尉安世苻堅丞相王猛之𤣥孫也歴涉書𫝊敏於人間自羽林監稍遷安西将軍北華州刺史卒贈本將軍梁州刺史諶魏衛尉辛毗之後有文學歴步兵校尉濮陽上黨二郡太守卒贈征虜將軍梁州刺史子儒之濟州司馬永善彈琴有文學員外郎梁州别駕漢中太守永弟漾亦善士性亦至孝為漢中所歎服元羅之陷也永入於建鄴遂死焉時有潁川庾導者亦與道遷俱入國雖不參謀亦為竒士歴覽史𫝊善草隸書輕財重義仕蕭衍右中郎将助戍漢中及至洛陽環堵敝廬多與㑺秀交舊積二十餘歲殊無宦情正光中乃除幽州左將軍府主簿饒安令罷縣後仍客遊齊魯之間天平中卒於青州時有皇甫徽字子𤣥安定朝那人仕蕭衍歴諸王參軍郡守及道遷之入國也徽亦因地内屬徽妻即道遷之兄女道遷列上勲書欲以徽為元謀徽曰創謀之始本不闗預雖貪榮賞内愧於心遂拒而不許後刺史羊祉表授征虜府司馬卒官子和武定末司空司馬和弟亮儀曹郎中淳于誕字靈逺其先太山愽人後世居於蜀漢或家安國之桓陵縣父興宗蕭頤南安太守誕年十二隨父向揚州父於路為羣盗所害誕雖童稚而哀感奮發傾資結客旬朔之内遂得復讐由是州里歎異之賾益州刺史劉悛召為主簿蕭衍除歩兵校尉景明中自漢中歸國既達京師陳伐蜀之計世宗嘉納之延昌末王師大舉除驍騎將軍假冠軍將軍都督别部司馬領鄉導統軍誕不願先受榮爵乃固讓實官止參戎號及奉辭之日詔遣主書趙桃弓宣旨勞勉若剋成都即以益州許之師次晉夀蜀人大震屬世宗晏駕不果而還後以客例起家除羽林監蕭衍遣將張齊攻圍益州詔誕為統軍與刺史傅豎眼赴援事寜還朝正光中秦隴反叛詔誕為西南道軍司假冠軍將軍别將從子午南出斜谷趣建安與行臺魏子建共參經略時衍益州刺史蕭淵猷遣將樊文熾蕭世澄等率衆數萬圍小劒戍益州刺史邴虬令子建拒之因轉營為文熾所掩統軍胡小虎崔珍寶並見俘執子建遣誕助討之誕勒兵馳赴相對月餘未能摧殄文熾軍行之谷東峯名龍鬚山置柵其上以防歸路誕以賊衆難可角力乃宻募壮士二百餘人令夜登山攻其柵及時火赴煙熖漲天賊以還途不守連營震怖誕率諸軍鳴鼓攻擊文熾大敗俘斬萬計擒世澄等十一人文熾為元帥先走獲免孝昌初子建以誕行華陽郡帶白馬戍二年復以誕行巴州刺史三年朝議以梁州安康郡阻帶江山要害之所分置東梁州仍以誕為鎮遠将軍梁州刺史永安二年四月卒時年六十贈安西將軍益州刺史諡曰荘長子亢亢弟允字闕館武定末梁州驃騎府司馬李苗字子宣梓橦涪人父膺蕭衍尚書郎太僕卿苗出後叔父略略為蕭衍寧州刺史大著威名王足伐蜀也衍命略拒足於涪許其益州及足還退衍遂改授略怒将有異圖衍使人害之苗年十五有報雪之心延昌中遂歸闕仍陳圖蜀之計於是大將軍髙肇西伐詔假苗龍驤將軍鄉導統軍師次晉夀世宗晏駕班師後以客例除員外散騎侍郎加襄威將軍苗有文武才幹以大功不就家恥未雪常懷慷慨乃上書曰昔晉室數否華戎鼎沸三燕兩秦咆勃中夏九服分崩五方圯裂皇祚承歴自北而南誅滅姦雄定鼎河洛唯獨荆揚尚阻聲教今令徳廣被於江漢威風逺振於吴楚國富兵彊家給人足以九居八之形有兼弱攻昧之勢而欲逸豫遺疾子孫違髙祖之本圖非社稷之深慮誠宜商度東西戍防輕重之要計量壃場險易安危之理探測南人攻守窺覦之情籌算卒乘器械征討之備然後去我所短避彼所長釋其至難攻其甚易奪其險要割其膏壤數年之内荆揚可并若捨舟檝即平原斂後疎前則江淮之所短棄車馬游飛浪乘流馳逐非中國之所長彼不敢入平陸而爭衡猶我不能越巨川而趣利若俱去其短各恃其長則東南未見可滅之機而淮沔方有相持之勢且夫滿昃相傾隂陽恒理盛衰遞襲五徳常運今以至彊攻至弱必見吞并之理如以至弱禦至彊焉有全濟之術故明王聖主皆欲及時立功為萬世之業去髙而就下百川以之常流取易而避難兵家以之恒勝今巴蜀孤懸去建鄴遼逺偏兵獨戍泝流十千牧守無良專行劫剝官由財進獄以貨成士民思化十室而九延頸北望日覬王師若命一偏將弔民伐罪風塵不接可傳檄而定守白帝之阨據上流之險循士治之迹蕩建鄴之逋然後偃武修文制禮作樂天下幸甚豈不盛哉於時肅宗幼沖無遠略之意竟不能納正光末二秦反叛侵及三輔時承平既久民不習戰苗以隴兵彊悍且羣聚無資乃上書曰臣聞食少兵精利於速戰糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城本無徳義其勢在於疾攻日有降納遲則人情離阻坐受崩潰夫飊至風起逆者求萬一之功髙壁深壘王師有全制之策但天下久泰人不曉兵奔利不相待逃難不相顧將無法令士非教習以憍將御惰卒不思長久之計務竒正之通必有莫敖輕敵之志恐無充國持重之規如令隴東不守汧軍敗散則二秦遂彊三輔危弱國之右臂於斯廢矣今且宜勒大将深溝髙壘堅守勿戰别命偏師精兵數千出麥積崖以襲其後則汧岐之下羣妖自散於是詔苗為統軍與别將淳于誕俱出梁益隸行臺魏子建子建以苗為郎中仍領軍深見知待孝昌中還朝鎮遠將軍歩兵校尉俄兼尚書右丞為西北道行臺與大都督宗正珍孫討汾絳蜀賊平之還除司徒司馬轉太府少卿加龍驤將軍於時蕭衍巴西民何難尉等豪姓相率請討巴蜀之間詔苗為通直散騎常侍冠軍將軍西南道慰勞大使未發會殺尒朱榮榮從弟世隆擁榮部曲屯據河橋還逼都邑孝荘親幸大夏門集羣臣博議百寮恇懼計無所出苗獨奮衣而起曰今小賊唐突如此朝廷有不測之危正是忠臣烈士效節之日臣雖不武竊所庶幾請以一旅之衆為陛下徑斷河梁城陽王徽中尉髙道穆贊成其計荘帝壮而許焉苗乃募人於馬渚上流以舟師夜下去橋數里便放火船河流既駛倐忽而至賊於南岸望見火下相䠞爭橋俄然橋絶沒水死者甚衆苗身率士卒百許人泊於小渚以待南援既而官軍不至賊乃渉水與苗死鬬衆寡不敵左右死盡苗浮河而殁時年四十六帝聞苗死哀傷久之曰苗若不死當應更立竒功贈使持節都督梁益巴東梁四州諸軍事車騎大将軍儀同三司梁州刺史河陽縣開國侯邑一千户賵帛五百疋粟五百石諡忠烈侯苗少有節操志尚功名每讀蜀書見魏延請出長安諸葛不許常歎息謂亮無竒計及覽周瑜𫝊未曽不咨嗟絶倒太保城陽王徽司徒臨淮王彧重之二王頗或不穆苗毎諌之及徽寵勢隆極猜忌彌甚苗謂人曰城陽蜂目先見豺聲今轉彰矣解鼓琴好文詠尺牘之敏當世罕及死之日朝野悲壮之及荘帝幽崩世隆入洛主者追苗贈封以白世隆世隆曰吾爾時羣議更一二日便欲大縱兵士焚燒都邑任其採掠賴苗京師獲全天下之善士也不宜追之子曇襲爵武定末冀州儀同府刑獄參軍齊受禪爵例降史臣曰夀春形勝南鄭要險乃建鄴之肩髀成都之喉嗌裴叔業夏侯道遷體運知機翻然鵲起舉地而來功誠兩茂其所以大啓茅賦兼列旐旟固其宜矣植不恒其徳器小志大斯所以顛覆也衍才行将略不遂其終惜哉李席王江雖復因人成事亦為果决之士淳于誕好立功名有志者竟能遂也李苗以文武幹局沉斷過人臨難慨然奮其大節蹈忠履義殁而後已仁必有勇其斯人之謂乎魏書卷七十一魏書卷七十一考證裴叔業傳城庫管籥悉付康生臣人龍按康生當是奚康生本書奚康生傳裴叔業率衆圍渦陽髙祖勅王肅遣康生馳徃救援是也淳于誕傳及時火赴赴當作起李苗傳梓橦涪人橦應作潼魏書卷七十一考證
