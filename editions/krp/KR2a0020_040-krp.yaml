body:
  text: 魏書卷四十齊魏收撰列傳第二十八陸俟陸俟代人也曽祖幹祖引世領部落父突太祖時率部民隨從征伐數有戰功拜厲威將軍離石鎮將天興中為上黨太守闗内侯俟少聰慧有䇿略太宗踐阼拜侍郎遷内侍襲爵闗内侯轉龍驤將軍給事中典選部蘭臺事當官而行無所屈撓世祖親征赫連昌詔俟督諸軍鎮大磧以備蠕蠕車駕還復典選部蘭臺事與西平公安頡督諸軍攻虎牢尅之賜爵建業公拜冀州刺史仍本將軍時考州郡治功唯俟與河内太守丘陳為天下第一轉都督洛豫二州諸軍事本將軍虎牢鎮大將平凉休屠金崖羌狄子玉等叛復轉為使持節散騎常侍平西將軍安定鎮大將既至懐柔𦍑戎莫不歸附追討崖等皆獲之徴還拜散騎常侍出為平東將軍懐荒鎮大將未朞諸髙車莫弗訖訟俟嚴急待下無恩還請前鎮將郎孤世祖詔許之徴俟還京既至朝見言於世祖曰陛下今以郎孤復鎮以臣愚量不過周年孤身必敗髙車必叛世祖疑謂不實切責之以公歸第明年諸莫弗果殺郎孤而叛世祖聞之大驚即召俟問其知敗之意俟曰夫髙車上下無禮無禮之人難為其上臣所以莅之以威嚴節之以憲網欲漸加訓導使知分限而惡直醜正實繁有徒故訟臣無恩稱孤之美孤獲還鎮欣其名譽必加恩於百姓譏臣為失専欲以寛恵治之仁恕待之無禮之人易生陵慠不過朞年無復上下然後收之以威則人懐怨懟怨懟既多敗亂彰矣世祖笑曰卿身乃短慮何長也即日復除散騎常侍世祖征蠕蠕破凉州常隨駕别督輜重又與髙凉王那渡河南略地至濟南東平陵徙其民六千家於河北又以俟都督秦雍二州諸軍事平西將軍長安鎮大將與髙凉王那擊盖吳於杏城大破之獲吳二叔諸將欲送京師俟獨不許曰夫長安一都險絶之土民多剛彊類乃非一清平之時仍多叛動今雖良民猶以為懼况其黨與乎若不斬吳恐長安之變未已吳一身蔵竄非其親信誰能獲之若停十萬之衆以追一人非上䇿也不如私許吳叔免其妻子使自追吳擒之必也諸將咸曰今來討賊既破之獲其二叔唯吳一人何所復至俟曰吳之悖逆本自天性今若獲免必誑惑愚民稱王者不死妄相扇動為患必大諸君不見毒蛇乎斷其頭猶能為害况除腹心疾而曰必遺其類其可乎諸將曰公言是也但得賊不殺更有所求遂去不返其如罪何俟曰此罪我與諸君當之髙涼王那亦從俟計遂遣吳二叔與之期及期吳叔不至諸將各咎於俟俟曰此未得其便耳必不背也後數日果斬吳以至皆如其言俟之明略獨决皆此類也遷内都大官安定盧永劉超等聚黨萬餘以叛世祖以俟威恩被於闗中詔以本官加都督秦雍諸軍事鎮長安世祖曰秦川險絶奉化日近吏民未被恩徳故頃年己來頻有叛動今超等恃險不順王命朕若以重兵與卿則超等必合而為一據險拒戰未易攻也若以輕兵與卿則不制矣今使卿以方略定之於是俟單馬之鎮超等聞之大欣以為無能為也既至申揚威信示以成敗誘納超女外若姻親超猶自警初無降意俟乃率其帳下往見超觀其舉措設掩襲之計超使人逆曰三百人以外當以弓馬相待三百人以内當以酒食相供俟乃將二百騎詣超超設備甚嚴俟遂縱酒盡醉而還後謂將士曰超可取也乃密選精兵五百人陳國恩徳激厲將士言至懇切士卒奮勇各曰以死從公必無二也遂偽獵而詣超與士卒約曰今㑹發機當以醉為限俟於是詐醉上馬大呼手斬超首士卒應聲縱擊殺傷千數遂平之世祖大悦徴俟還京師轉外都大官散騎常侍如故髙宗踐阼以子麗有筞立之勲拜俟征西大將軍進爵東平王太安四年薨年六十七諡曰成王有子十二人長子馛多智有父風髙宗見馛而悅之謂朝臣曰吾常歎其父智過其軀是復踰於父矣少為内都下大夫奉上接下行止取與每能逆曉人意與其從事者無不愛之興安初賜爵聊城侯出為散騎常侍安南將軍相州刺史假長廣公為政清平抑彊扶弱州中有徳宿老名望重者以友禮待之詢之政事責以方略如此者十人號曰十善又簡取諸縣彊門百餘人以為假子誘接殷勤賜以衣服令各歸家為耳目於外於是發奸擿伏事無不驗百姓以為神明無敢刦盗者在州七年家至貧約徴為散騎常侍民乞留馛者千餘人顯祖不許謂羣臣曰馛之善政雖復古人何以加之賜絹五百疋奴婢十口馛之還也吏民大歛布帛以遺之馥一皆不受民亦不取於是以物造佛寺焉名長廣公寺後襲父爵改封建安王時劉彧司州刺史常珍奇以懸瓠内附而新民猶懐去就馛銜旨撫慰諸有陷軍為奴婢者馛皆免之百姓忻悦民情乃定車駕討蠕蠕詔馛為選部尚書錄留臺事督兵運糧一委處分顯祖將禪位於京兆王子推任城王雲隴西王源賀等竝皆固諫馛抗言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿庭有死無貳久之帝意乃解詔曰馛直臣也其能保吾子乎遂以馛為太保與太尉源賀持節奉皇帝璽紱傳位于髙祖延興四年薨贈以本官諡曰貞王馛有六子琇凱知名琇字伯琳馛第五子母赫連氏身長七尺九寸甚有婦徳馛有以爵𫝊琇之意琇年九嵗馛謂之曰汝祖東平王有十二子我為嫡長承襲家業今已年老屬汝㓜冲詎堪為陸氏宗首乎琇對曰茍非鬬力何患童稚馛奇之遂立琇為世子馛薨襲爵琇沉毅少言雅好讀書以功臣子孫為侍御長給事中遷黄門侍郎轉太常少卿散騎常侍太子左詹事領北海王師光禄大夫轉祠部尚書司州大中正㑹從兄叡事免官景明初試守河内郡咸陽王禧謀反令子曇和與尹仵期薛繼祖等先據河内琇聞禧敗斬曇和首時以琇不先送曇和禧敗始斬首責其通情徴詣廷尉廷尉少卿崔振窮治罪状按琇大逆陸宗大小咸見收捕㑹將叔先薨於獄琇弟凱仍上書訴寃世宗詔復琇爵子景祚襲凱字智君謹重好學年十七為中書學生拜侍御中散轉通直散騎侍郎遷太子庶子給事黄門侍郎凱在樞要十餘年以忠厚見稱希言屢中髙祖嘉之後遇患頻上書乞骸骨詔不許勑大醫給湯藥除正平太守在郡七年號為良吏初髙祖將議革變舊風大臣竝有難色又每引劉芳郭祚等密與規謨共論時政而國戚謂遂疎已怏怏有不平之色乃令凱私踰之曰至尊但欲廣知前事直當問其古式耳終無親彼而相疏也國戚舊人意乃稍解咸陽王禧謀逆凱兄琇䧟罪凱亦被收遇赦乃免凱痛兄之死哭無時節目㡬失明訴寃不己備盡人事至正始初世宗復琇官爵凱大喜置酒集諸親曰吾所以數年之中抱病忍死者顧門户計耳逝者不追今願畢矣遂以其年卒贈龍驤將軍南青州刺史諡曰恵長子暐字道暉與弟恭之竝有時譽洛陽令賈禎見其兄弟歎曰僕以老年更覩雙璧又嘗兄弟共候黄門郎孫恵蔚恵蔚謂諸賔曰不意二陸復在座隅吾徳謝張公無以延譽暐起家司徒行參軍太尉西閣祭酒兼尚書右民三公郎坐事免後除伏波將軍正光中卒贈司州治中孝昌中重贈冠軍將軍恒州刺史暐擬急就篇為悟䝉章及七誘十醉章表數十篇暐與恭之晚不睦為時所鄙子元規武定中尚書郎恭之字季順有操尚釋褐侍御史著作佐郎建義初除中書侍郎領著作郎尋除河北太守轉征虜將軍殷州刺史前廢帝初拜廷尉卿加鎮西將軍所歴竝有聲績後坐事免孝静初還復本位出除征南將軍東荆州刺史天平四年卒贈散騎常侍衛將軍吏部尚書定州刺史諡曰懿恭之所著文章詩賦凡千餘篇子曄開府中兵參軍馛弟石跋涇州刺史石跋弟歸東宫舍人駕部校尉歸弟尼内侍校尉東陽鎮都將尼弟麗少以忠謹入侍左右太武特親昵之舉動審慎而無愆失賜爵章安子稍遷南部尚書太武崩南安王余立既而為中常侍宗愛等所殺百寮憂惶莫知所立麗以髙宗世嫡之重民望所係乃首建大義與殿中尚書長孫渴侯尚書源賀羽林郎劉尼奉迎髙宗於苑中立之社稷獲安麗之謀矣由是受心膂之任在朝者無出其右興安初封平原王加撫軍將軍麗辭曰陛下以一統之重承基繼業至於奉迎守順臣闕二字常豈敢昧冒以干大典頻讓再三詔不聼麗乃啟曰臣父歴奉先朝忠勤著稱今年至西夕未登王爵臣叨荷寵榮於分已過愚款之情未申犬馬之効未展願裁過恩聼遂所請髙宗曰朕為天下主豈不能得二王封卿父子也乃以其父俟為東平王麗尋遷侍中撫軍大將軍司徒公復其子孫賜妻妃號麗以優寵既頻固辭不受髙宗益重之領太子太傅麗好學愛士常以講習為業其所待者皆篤行之流士多稱之性又至孝遭父憂毁瘠過禮和平六年髙宗崩先是麗療疾於代郡温泉聞諱欲赴左右止之曰宫車晏駕王徳望素重姧臣若疾民譽慮有不測之禍願少遲回朝廷寧静然後奔赴猶為未晚麗曰安有聞君父之䘮方慮禍難不即奔波者遂便馳赴乙渾尋擅朝政忌而害之初渾悖傲每為不法麗數諍之由是見忌顯祖甚追惜麗諡曰簡王陪葬金陵髙祖追錄先朝功臣以麗配饗廟庭麗二妻長曰杜氏次張氏長子定國杜氏所生次叡張氏所生定國在襁抱髙宗幸其第詔養宫内至於遊止常與顯祖同處年六嵗為中庶子及顯祖踐阼拜散騎常侍特賜封東郡王加鎮南將軍定國以承父爵頻辭不許又求以父爵讓弟叡乃聼之俄遷侍中儀曹尚書轉殿中尚書前後大駕征廵每擢為行臺錄都曹事超遷司空定國恃恩不循法度延興五年坐事免官爵為兵太和初復除侍中鎮南將軍秦益二州刺史復王爵八年薨於州贈以本官諡曰荘王賜命服一襲子昕之字慶始風望端雅襲爵例䧏為公尚顯祖女常山公主拜駙馬都尉歴通直郎景明中以從叔琇罪免官尋以主壻除通直散時常侍未㡬遷司徒司馬加輔國將軍出為兖州刺史尋進號安東將軍治有名績仍除青州刺史在州著寛平之稱轉安北將軍相州刺史永平四年夏卒贈鎮東將軍冀州刺史諡曰恵初定國娶河東栁氏生子安保後納范陽盧度世女生昕之二室俱為舊族而嫡妾不分定國亡後兩子争襲父爵僕射李冲有寵於時與度世子泉婚親相好沖遂左右申助昕之由是承爵尚主職位赫奕安保沉廢貧賤不免飢寒昕之容貌柔謹髙祖以其主壻特垂昵眷世宗時年未四十頻撫三蕃當世以此榮之昕之卒後母盧悼念過哀未㡬而亡公主奉姑有孝稱神龜初與穆氏頓邱長公主竝為女侍中又性不妬忌以昕之無子為納妾媵而皆育女公主有三女無男以昕之從兄希道第四子子彰為後子彰字明逺本名士沉年十六出後事公主盡禮丞相髙陽王雍嘗言曰常山妹雖無男以子彰為兒乃過自生矣正光中襲爵東郡公尋除散騎侍郎拜山陽太守莊帝即位徴拜給事黄門侍郎子彰妻即咸陽王禧女禧誅養於彭城王第荘帝親之略同諸姊建義初尒朱榮欲修舊事庶姓封王由是封子彰濮陽王食邑七百户尋而詔罷仍復先爵除安西將軍洛州刺史還拜征東將軍金紫光禄大夫領廣平王贊開府諮議參軍事天平中拜衛將軍頴州刺史以母憂去職元象中以本將軍除齊州刺史又加驃騎將軍行懐州事轉北豫州刺史仍除徐州刺史將軍竝如故一年歴三州當世榮之還朝除衛大將軍右光禄大夫又行瀛州事尋拜侍中復行滄州事進號驃騎大將軍行冀州事除侍讀兼七兵尚書行青州事子彰之為州以聚歛為事晚節修改自行青冀滄瀛甚有時譽加以虚已納物人敬愛之武定八年二月除中書監三月卒年五十四賻帛一百疋追贈都督青光齊三州諸軍事驃騎大將軍開府儀同三司青州刺史公如故諡曰文宣子彰崇好道術曽嬰重疾藥中湏桑螵蛸子彰不忍害物遂不服焉其仁恕如此敎訓六子雅有法度子昴武定中中書舍人昴弟駿太子洗馬駿弟杳尚書倉部郎叡字思弼其母張氏字黄龍本恭宗宫人以賜麗生叡麗之亡也叡始十餘嵗襲爵撫軍大將軍平原王沉雅好學折節下士年未二十時人便以宰輔許之娶徐州刺史博陵崔鑒女鑒謂所親云平原王才度不惡但恨其姓名殊為重複時髙祖未改其姓叡婚自東徐還經於鄴見李彪甚敬悦之仍與俱趨京師以為館客資給衣馬僮使待之甚厚為北征都督拜北部長轉尚書加散騎常侍太和八年正月叡與隴西公元琛竝持節為東西二道大使襃善罰惡聲稱聞於京師五月詔賜叡夏服一具後以叡為北征都督擊蠕蠕大破之遷侍中都曺尚書時蠕蠕又犯塞詔叡率騎五千以討之蠕蠕遁走追至石磧擒其帥赤阿突等數百人而還如散騎常侍遷尚書左僕射領北部尚書十六年降五等之爵以麗勲著前朝封叡鉅鹿郡開國公食邑三百户尋為使持節鎮北大將軍與陽平王頤竝為都督督領軍將軍斛律桓等北征三道諸軍事歩騎十萬以討蠕蠕叡以下各賜衣物有差闕二字親幸城北訓誓羣帥除尚書令衛將軍闕大破蠕蠕而還尋以母憂解令髙祖將有南伐之事以本官起之改授征南將軍叡固辭請終情禮詔曰叡猶執私痛致違往旨金革方馳何宜曲遂也加領衛尉可重勑有司速令敦喻後除使持節都督恒肆朔三州諸軍事本將軍恒州刺史行尚書令髙祖大考百官奪叡尚書令祿一周十九年叡表曰臣聞先天有弗違之略後天有順時之見今蕭鸞盗有名目竊據江左惡盈罪稔天人棄之取亂攻昧誠在兹日愚以長江浩蕩彼之巨防可以徳招難以力屈又南土昬霧暑氣鬱蒸師人經夏必多疾病而鼎遷草創庶事甫爾臺省無論政之館府寺靡聼治之所百寮居止事等行路沉雨炎陽自成癘疫且兵徭竝舉聖王所難今介胄之士外攻讐宼羸弱之夫内動土木運給之費日損千金驅罷敝之兵討堅城之虜將何以取勝乎陛下往冬之舉政欲曜武江漢示威衡湘自春㡬夏理宜釋甲願櫜旌卷斾為持久之方崇成帝居深重本之固聖懐無内念之虞兆庶休斤板之役修禮華區諷風洛浦然簡英略之將任猛毅之雄南取荆湘據其要府則梁秦以西覩機白服撫附振威回麾東指則義陽以左馳聲可制然後布仁化以綏近播恩施以懐逺凡在有情孰不思奮還遣慕徳之人効其餘力乘流而下勢勝萬倍蕞爾閩甌敢不稽顙豈必兹年競斯寸尺惟願顧存近勑納降而旋不紆鑾輿久臨炎暑髙祖從之叡表請車駕還代親臨太師馮熈之𦵏坐削奪都督三州諸軍事尋除都督恒朔二州諸軍事進號征北大將軍以有順遷之表加邑四百戸時穆泰為定州刺史辭以疾病上温則甚請恒州自効髙祖許之乃以叡為散騎常侍定州刺史將軍如故叡未發遂與泰等同謀搆逆賜死獄中聼免孥戮徙其妻子為遼西郡民詔僕射李冲領軍于烈曰陸叡元不早闕五字大臣自與卿等同受非常之詔朕許以不死之㫖思得上下齊信以保大義朕於卿等常忘短棄瑕務相含養豈謂陸叡無心之甚一年於斯乃與穆泰結禍數圖反噬以朕遷洛内外不可擬舉諸王議引子恂若斯之論前後非一始欲推故南安王次推陽平王若不肯從欲逼樂陵王訕謗朝廷書信炳然事既垂就叡以洛都休明勸令小緩於是之後兩人復競然猶隐而弗聞賴陽平王忠貞奮發獲泰之言便爾馳表得使正人紏慝恒岳無塵是以叡之愆失處入門誅朕諦尋前旨許不盡法反逆之志自負幽㝠違誓在彼不闗朕也反心逆意既異餘犯雖欲矜恕末如之何然猶憶先言兼以末頗異議聼自死别府免厥孥戮其門子孫永世不齒元丕二子一弟首為賊端其父無人明證理在可覩但以言無炳灼隐而弗窮以連坐應死特恕為民朕本期有終而彼自棄卿等之閒忽及今日違心乖念一何可悲故此别示想無致怪也謀反之外皎如白日耳冲烈表曰臣等邀逢幸㑹生遇昌辰才非利用坐班位列功無汗馬猥受山河叨忝之寵終古無比莫大之施萬殞靡酬而叡丕識乖犬馬心同梟獍潛引童稚搆兹妖逆違悖天常罪踰萬殞叡結釁在心隂搆不息閒説戚蕃擬窺乾象雖覩休平未懐疑惑何嘗片辭披露宿志原心語跡實為賊首丕之二子從惡累年交扇東西規擾并夏測觀此状無客不知雖聖慈含育恕其生命其若天地何其若神祇何夫効誠盡節為下之常分刑兹無捨在上之常法况曲䝉莫大之恩奨以忠貞之義而更違天背道包藏姧逆求情推理罪乃常誅而慈造寛渥更流恩貸續叡三斷之骸還丕已絶之魄二三縱宥實虧憲典猶復上延天眷言念疇日不以臣等背負餘黨别垂明詔再申齊信之恩重喻皎日之㫖伏讀悲慙惟深隗惕叡長子希道字洪度有風貌羙鬚髯歴覽經史頗有文致初拜中散遷通直郎坐父事徙於遼西於後得還從征自効以軍功拜給事中遷司徒記室司空主簿征南將軍元英攻蕭衍司州以希道為副及克義陽以功賜爵淮陽男拜諫議大夫以學闗今古參議新令轉廷尉少卿加龍驤將軍南青州刺史以本將軍轉梁州刺史希道頻表辭免又除東夏州刺史不拜轉北中郎將遷前將軍郢州刺史希道善於馭邊甚有威略轉平西將軍涇州刺史正光四年卒官贈撫軍將軍定州刺史希道有六子士懋字元偉天平中以其曽祖麗有翼戴之勲詔特復鉅鹿郡開國公邑三百户令士懋襲武定中平東將軍營州刺史士懋弟士宗字仲彦尚書左外兵郎中士宗弟士述字幼文符璽郎中士宗士述建義初竝於河隂遇害士述弟士沉出繼從叔昕之士沉弟士㢘字季脩建州平北府長史永安末為尒朱世隆攻䧟州城見害士㢘弟士佩字季偉武定中安東將軍司州治中希道弟希悦尚書外兵郎中驃騎諮議叅軍通直散騎常侍平南將軍光禄大夫遇害於河隂贈散騎常侍衛將軍相州刺史希悦弟希謐太尉叅軍早卒希謐弟希静字季黙司徒黙曹稍遷邵郡太守希静弟希質字幼成起家員外郎領侍御史稍遷散騎侍郎陽城太守孝莊初除龍驤將軍膠州刺史蕭衍遣將率衆數萬從郁洲浮海據島來侵州界希質討破之轉建州刺史將軍如故爾朱榮之死也世隆率衆北還晉陽希質固守拒之城陷兄子被害希質妻元氏榮妻之兄孫由是獲免天平初給事黄門侍郎遷魏尹轉太常卿衛大將軍都官尚書武定七年夏卒年五十八贈驃騎大將軍中書監青州刺史諡曰文希質名家子位宦又通不能平心於物唯與山偉宇文忠之等共為朋黨排毁朝俊有識者薄之子珣字子琰開府叅軍次瑾字子瑜性竝麤險乃為刦盜珣瑾俱死瑾弟瓘字子璧次悉達武定中竝儀同開府叅軍麗弟頽早卒子闕字清都性機巧歴位長水校尉賜爵廣牧子遷龍驤將軍游擊將軍北中郎將轉南中郎將帶魯陽太守進號前將軍卒贈本將軍夏州刺史諡曰順頽弟陵成中校尉河間太守祕書中散新城子陵成弟龍成有父兄之風少以功臣子為中散稍遷散騎常侍賜爵永安子加平逺將軍出為安南將軍青州刺史假樂安公愛民恤下百姓稱之卒子昶字細文襲爵正始中為太尉屬加寧逺將軍以本官行滎陽郡事被劾㑹赦免久之進號廣武將軍遷司空司馬尋拜光禄大夫昶無他才能唯飲酒為事出為平西將軍京兆内史固辭不拜轉平北將軍肆州刺史入為衛將軍大鴻臚卿仍除車騎將軍左光祿大夫天平中進號驃騎大將軍加散騎常侍領左右兼給事黄門侍郎仍兼太僕卿復以本將軍為東徐州刺史尋卒贈本將軍衛尉卿青州刺史龍成季弟騏驎侍郎中散轉侍御長太和初新平太守銀青光禄大夫以彭城勲除夏州刺史子髙貴孝昌中兖州鎮東府法曹叅軍子操武定末度支尚書操弟楚髙貴弟順宗員外郎秘書中散子槩之武定末東莞太守俟族弟宜雲中鎮將子雋髙宗世歴侍中給事顯祖初侍御長以謀誅乙渾拜侍中樂部尚書遷散騎常侍吏部尚書賜爵安樂公甚見委任尋拜尚書令後除安東將軍定州刺史轉征東大將軍相州刺史政尚寛恵民吏安定卒諡貞公子登澄城太守子匡司空倉曹叅軍登弟子景元元象初衛將軍儀同三司南青州刺史史臣曰陸俟威略智器有過人者馛識幹明厲不替家風麗忠國奉主為時梁棟蹈忠履義制於一豎惜哉叡琇以沉雅顯逹而釁逆陷禍深山大澤實有龍蛇希道風度有聲子彰令終之美也魏書卷四十魏書卷四十考證陸俟傳與度世子泉婚親相好泉北史作伯源臣照按本書盧度世傳度世子淵字伯源北史避唐髙祖諱書字知此則改淵為泉唐時例以泉代淵也然簡英略之將任猛毅之雄南取荆湘據其要府然字下疑脫後字上温則甚臣照按此四字北史無之汲古閣本則闕之盖以義不可曉也推尋文意上字乃土字之訛時己除叡都督恒朔二州諸軍事矣因定州刺史穆泰在定疾病辭稱居定土温則疾愈甚請恒州自効盖恒北而定南恒必凉于定故以叡與泰對調也魏書卷四十考證
