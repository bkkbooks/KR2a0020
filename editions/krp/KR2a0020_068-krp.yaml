body:
  text: 魏書卷六十八齊魏收撰列傳第五十六甄琛高聰甄琛字思伯中山毋極人漢太保甄邯後也父凝州主簿琛少敏悟閨門之内兄弟戱狎不以禮法自居頗學經史稱有刀筆而形貎短陋尠風儀舉秀才入都積歲頗以奕棊棄日至乃通夜不止手下蒼頭常令秉燭或時睡頓大加其杖如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭奴不敢辭罪乃以圍棊日夜不息豈是向京之意而賜加杖罰不亦非理琛惕然慙感遂從許叡李彪假書研習聞見益優太和初拜中書博士遷諌議大夫時有所陳亦為高祖知賞轉通直散騎侍郎出為本州征北府長史後為本州陽平王頤衛軍府長史世宗踐祚以琛為中散大夫兼御史中尉轉通直散騎常侍仍兼中尉琛表曰王者道同天壤施齊造化濟時拯物為民父母故年穀不登為民祈祀乾坤所惠天子順之山川秘利天子通之苟益生民損躬無吝如或所聚唯為賑恤是以月令稱山林藪澤有能取蔬食禽獸者皆野虞敎導之其迭相侵奪者罪之無赦此眀導民而弗禁通有無以相濟也周禮雖有川澤之禁正所以防其殘盡必令取之有時斯所謂障護雖在公更所以為民守之耳且一家之長惠及子孫一運之君澤周天下皆所以厚其所養以為國家之富未有尊居父母而醯醢是吝富有萬品而一物是規今者天為黔首生鹽國與黔首障護假獲其利是猶富專口齗不及四體也且天下夫婦歲貢粟帛四海之有備奉一人軍國之資取給百姓天子亦何患乎貧而茍禁一池也古之王者世有其民或水火以濟其用或巢宇以誨其居或敎農以去其飢或訓衣以除其敝故周詩稱敎之誨之飲之食之皆所以撫覆導養為之求利者也臣性昧知理識無逺尚每觀上古愛民之迹時讀中葉驟稅之書未嘗不歎彼逺大惜此近狭今偽弊相承仍崇關鄽之稅大魏恢博唯受穀帛之輸是使逺方聞者罔不歌徳昔亶父以棄寶得民碩鼠以受財失衆君王之義宜其高矣魏之簡稅惠實逺矣語稱出内之吝有司之福施惠之難人君之禍夫以府藏之物猶以不施而為災况府外之利而可吝之於黔首且善藏者藏於民不善藏者藏於府藏於民者民欣而君富藏於府者國怨而民貧國怨則示化有虧民貧則君無所取願弛兹鹽禁使沛然逺及依周禮置川衡之法使之監導而已詔曰民利在斯深如所陳付八座議可否以聞司徒録尚書彭城王勰兼尚書邢巒等奏琛之所列富乎有言首尾大備或無可貶但恐坐談則理高行之則事闕是用遲回未謂為可竊惟古之善為治者莫不昭其勝途悟其逺理及於救世升降稱時欲令豐無過溢儉不致敝役養消息備在厥中節約取足成其性命如不爾者焉用君為若任其生産隨其啄食便是芻狗萬物不相有矣自大道既往恩惠生焉下奉上施卑高理睦然恩惠既交思拯之術廣恒恐財不賙國澤不厚民故多方以逹其情立法以行其志至乃取貨山川輕在民之貢立稅關市裨十一之儲收此與彼非利已也回彼就此非為身也所謂集天地之産惠天地之民藉造物之富賑造物之貧徹商賈給戎戰賦四民贍軍國取乎用乎各有義已禁此淵池不専大官之御歛此匹帛豈為後宫之資既潤不在已彼我理一猶積而散之将焉所吝且稅之本意事有可求固以希濟生民非為富賄藏貨不爾者昔之君子何為然哉是以後來經圖未之或改故先朝商校小大以情降鑒之流疑興復鹽禁然自行以來典司多怠出入之間事不如法遂令細民怨嗟商販輕議此乃用之者無方非興之者有謬至使朝廷明識聼營其間今而罷之懼失前㫖一行一改法若易棊參論理要宜依前式詔曰司鹽之稅乃自古通典然興制利民亦代或不同茍可以富氓益化唯理所在甄琛之表實所謂助政毗治者也可從其前計使公私並宜川利無擁尚書嚴為禁豪彊之制也詔琛參八座議事尋正中尉常侍如故遷侍中領中尉琛俛眉畏避不能繩糾貴逰凡所劾治率多下吏於時趙修盛寵琛傾身事之琛父凝為中散大夫弟僧林為本州别駕皆託修申逹至修姦詐事露明當收考今日乃舉其罪及監決修鞭猶相隱惻然告人曰趙修小人背如土牛殊耐鞭杖有識以此非之修死之明日琛與黄門郎李憑以朋黨被召詣尚書兼尚書元英邢巒窮其阿附之狀琛曾拜官諸賔悉集巒乃晚至琛謂巒曰卿何處放蛆来今晚始顧雖以戲言巒變色銜忿及此大相推窮司徒公録尚書北海王詳等奏曰臣聞黨人為患自古所疾政之所忌雖寵必誅皆所以存天下之至公保靈基於永業者也伏惟陛下纂聖前暉淵鑒幽慝恩斷近習憲軌唯新大政蔚以增光鴻猷於焉永泰謹按侍中領御史中尉甄琛身居直法糾擿是司風邪響黷猶宜劾糾况趙修奢暴聲著内外侵公害私朝野切齒而琛嘗不陳奏方更往来綢繆結納以為朋黨中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之祿虧先皇之選典塵聖明之官人又與武衞將軍黄門郎李憑相為表裏憑兄叨封知而不言及修釁彰方加彈奏生則附其形勢死則就地排之竊天之功以為已力仰欺朝廷俯罔百司其為鄙詐於兹甚矣不實不忠寔合貶黜謹依律科徒請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李憑朋附趙修是親是仗交遊之道不依恒度或晨昏從就或吉凶往来至乃身拜其親妻見其子毎有家事必先請託緇點皇風塵鄙正化此而不糾將何以蕭整阿諛奬厲忠槩請免所居官川肅風軌奏可琛遂免歸本郡左右相連死黜者三十餘人始琛以父母年老常求解官扶侍故高祖授以本州長史及貴逹不復請歸至是乃還供養數年遭母憂母鉅鹿曹氏有孝性夫氏去家路踰百里每得魚肉菜果珍美口實者必令僮僕走奉其母乃後食焉琛母服未闋復䘮父琛於塋兆之内手種松栢隆冬之月負掘水土鄉老哀之咸助加力十餘年中墳成木茂與弟僧林誓以同居没齒專事産業親躬農圃時以鷹犬馳逐自娛朝廷有大事猶上表陳情久之復除散騎常侍領給事黄門侍郎定州大中正大見親寵委以門下庶事出參尚書入厠帷幄琛髙祖時兼主客郎迎送蕭賾使彭城劉纘琛欽其器貌常歎詠之纘子晣為朐山戍主晣死家屬入洛有女年未二十琛已六十餘矣乃納晣女為妻婚日詔給厨費琛深所好悦世宗時調戲之盧昶敗於胊山詔琛馳驛檢按遷河南尹加平南將軍黄門中正如故琛表曰詩稱京邑翼翼四方是則者京邑是四方之本安危所在不可不清是以國家居代患多盗竊世祖太武皇帝親自發憤廣置主司里宰皆以下代令長及五等散男有經畧者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都已来天下轉廣四逺赴㑹事過代都五方雜沓難可備簡寇盗公行劫害不絶此由諸坊混雜釐比不精主司闇弱不堪檢察故也凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精鋭無以治之今擇尹既非南金里尉鈆刀而割欲望清肅都邑不可得也里正乃流外四品職輕任碎多是下才人懷茍且不能督察故使盗得容姦百賦失理邊外小縣所領不過百户而令長皆以將軍居之京邑諸坊大者或千户五百户其中皆王公卿尹貴勢姻戚豪猾僕隸䕃養姦徒髙門邃宇不可干問又有州郡侠客䕃結貴遊附黨連羣隂為市劫比之邊縣難易不同今難彼易此實為未惬王者立法隨時從宜改弦易調明王所急先朝立品不必即定施而觀之不便則改今閑官静任猶聼長兼况煩劇要務不得簡能下領請取武官中八品將軍已下幹用貞濟者以本官俸恤領里尉之任各食其祿髙者領六部尉中者領經途尉下者領里正不爾請少髙里尉之品選下品中應遷之者進而為之則督貴有所輦轂可清詔曰里正可進至勲品經途從九品六部尉正九品諸職中簡取何必湏武人也琛又奏以羽林為遊軍於諸坊巷司察盗賊於是京邑清靜至今踵焉轉太子少保黄門如故大將軍髙肇伐蜀以琛為使持節假撫軍將軍領歩騎四萬為前驅都督琛次梁州獠亭會世宗崩班師髙肇既死以琛肇之黨也不宜復參朝政出為營州刺史加安北將軍歲餘以光祿大夫李思穆代之時年六十五矣遂停中山久之乃赴洛除鎮西將軍涼州刺史猶以琛髙氏之昵也不欲處之於内尋徴拜太常卿仍以本將軍出為徐州刺史及入辭肅宗琛辭以老詔除吏部尚書將軍如故未幾除征北將軍定州刺史衣錦晝遊大為稱滿治體嚴細甚無聲譽崔光辭司徒之授也琛與光書外相抑揚内實附㑹也光亦揣其意復書褒美以悦之徴為車騎將軍特進又拜侍中以其衰老詔賜御府杖朝直杖以出入正光五年冬卒詔給東園秘器朝服一具衣一襲錢十萬物七百段蠟三百斤贈司徒公尚書左僕射加後部鼓吹太常議諡文穆吏部郎袁翻奏曰案禮諡者行之迹也號者功之表也車服者位之章也是以大行受大名細行受細名行生於已名生於人故闔棺然後定諡皆累其生時美惡所以為將来勸戒身雖死使名常存也凡薨亡者屬所即言大鴻臚移本郡大中正條其行迹功過承中正移言公府下太常部博士評議為諡列上諡不應法者博士坐如選舉不以實論若行狀失實中正坐如博士自古帝王莫不殷勤重慎以為裦貶之實也今之行狀皆出自其家任其臣子自言君父之行無復相是非之事臣子之欲光揚君父但苦迹之不髙行之不美是以極辭肆意無復限量觀其狀也則周孔聯鑣伊顔接袵論其諡也雖窮文盡武罔或加焉然今之博士與古不同唯知依其行狀又先問其家人之意臣子所求便為議上都不復斟酌與奪商量是非致號諡之加與汎階莫異專以極美為稱無復貶降之名禮官之失一至於此案甄司徒行狀至徳與聖人齊蹤鴻名共大賢比跡文穆之諡何足加焉但比来贈諡於例普重如甄琛之流無不複諡謂宜依諡法慈惠愛民曰孝宜諡曰孝穆公自今已後明勒太常司徒有行狀如此言辭流宕無復節限者悉請裁量不聼為受必準人立諡不得甚加優越復仍踵前来之失者付法司科罪從之琛祖載肅宗親送降車就輿弔服哭之遣舍人慰其諸子琛性輕簡好嘲謔故少風望然明解有幹具在官清白自髙祖世宗咸相知待肅宗以師傅之義而加禮焉所著文章鄙碎無大體時有理詣磔四聲姓族廢興㑹通緇素三論及家誨二十篇篤學文一卷頗行於世琛長子侃字道正郡功曹釋褐秘書郎性險薄多與盗劫交通隨琛在京以酒色夜宿洛水亭舍歐擊主人為司州所劾淹在州獄琛大以慙慨廣平王懷為牧與琛先不協欲具案窮推琛託左右以聞世宗遣白衣吳仲安勑懷寛放懷固執治之久乃特㫖出之侃自此沉廢卒於家侃弟楷字徳方粗有文學頗習吏事太平中上髙祖頌十二篇文多不載優詔報之琛啓除秘書郎世宗崩未葬楷與河南尹丞張普惠等飲戲免官任城王澄為司徒引為功曹參軍稍遷尚書儀曹郎有當官之稱肅宗末定州刺史廣陽王淵被徴還朝時楷丁憂在鄉淵臨發召楷不兼長史委以州任尋値鮮于修禮毛普賢等率北鎮流民反於州西北之左人城屠村掠野引向州城州城之内先有燕恒雲三州避難之户皆依傍市鄽草廬攅住修禮等聲云欲收此輩共為舉動既外寇將逼恐有内應楷見人情不安慮有變起乃收州人中麤豪者皆殺之以威外賊固城民之心及刺史元冏大都督楊津等至楷乃還家後修禮等忿楷屠害北人遂掘其父墓載棺廵城示相報復孝莊時徴為中書侍郎尒朱榮之死帝以其堪率鄉義除試守常山太守賜絹二百疋出帝初除征東將軍金紫光禄大夫遷衛將軍右光禄大夫齊文襄王取為儀同府諮議參軍天平四年卒年四十六贈驃騎將軍秘書監滄州刺史楷弟寛字仁規自員外散騎侍郎本州别駕稍遷太尉從事中郎治書侍御史武定初謝病還鄉卒於家僧林終於鄉里琛從父弟宻字叔雍清謹少嗜欲頗渉書史太和中奉朝請密疾世俗貪競乾沒榮寵曾作風賦以見意後參中山王英軍事英鍾離敗退鄉人蘇良沒於賊手密盡私財以贖之良既歸傾資報密密一皆不受謂良曰濟君之日本不求貨豈相贖之意也歴太尉鎧曹遷國子博士肅宗末通直散騎常侍冠軍將軍時賊帥葛榮侵擾河北裴衍源子邕敗沒人情不安詔密為相州行臺援守鄴城莊帝以密全鄴之勲賞安市縣開國子食邑三百户遷平東將軍光祿大夫領廷尉少卿尋轉征東將軍金紫光祿大夫孝静初車騎將軍廷尉卿在官有平直之譽出為北徐州刺史將軍如故興和四年卒贈驃騎將軍儀同三司瀛州刺史諡曰靖長子儉字元恭官至前將軍太中大夫卒儉弟頤有才學亦早卒琛同郡張纂字伯業祖珍字文表慕容寶度支尚書太祖平中山入國世祖時拜中書侍郎真君元年關右慰勞大使二年拜使持節鎮西將軍涼州刺史卒贈征東將軍燕州刺史諡曰穆纂頗渉經史雅有氣尚交結勝流太和中釋褐奉朝請稍遷伏波將軍任城王澄鎮北府騎兵參軍帶魏昌縣令吏民安之後為北中府司馬久之除樂陵太守在郡多所受納聞御史至棄郡逃走於是除名乃卒天平初贈使持節都督冀定二州諸軍事驃騎將軍定州刺史纂叔感字崇仁有器業不應州郡之命子宣軌少孤事母以孝聞歴郡功曹州主簿延昌中釋褐奉朝請冀州征東府長流參軍轉相州中軍府錄事參軍定州别駕後除鎮逺將軍員外散騎常侍出為相州撫軍府司馬宣軌性通率輕財好施屬葛榮圍城與刺史李神有固守之効永安中以功賜爵中山公中興初坐事死於鄴子子瑜纂從弟元賔太和十六年出身奉朝請遷員外郎給事中正光中除中堅將軍射聲校尉永安三年卒永熙中外甥髙敖曹貴逹啓贈持節撫軍將軍瀛州刺史子辨天平中司徒行參軍髙聰字僧智本渤海蓚人曾祖軌隨慕容徳徙青州因居北海之劇縣父法昂劉駿車騎將軍王元謨甥也少隨元謨征伐以軍功至員外郎早卒聰生而䘮母祖母王撫育之大軍攻剋東陽聰徙入平城與蔣少遊為雲中兵户窘困無所不至族祖允視之若孫大加賙給聰渉獵經史頗有文才允嘉之數稱其美言之朝廷云青州蔣少遊與從孫僧智雖為孤弱然皆有文情由是與少遊同拜中書博士積十年轉侍郎以本官為髙陽王雍友稍為髙祖知賞太和十七年兼員外散騎常侍使於蕭昭業髙祖定都洛陽追詔聰等曰比於河陽𠡠卿仍届瀍洛周視舊業依然有懷固欲先之營之後乃薄伐且以賾䘮甫爾使通在昔乘危幸凶君子弗取是用輟兹前圖逺期来㑹爰息六師三川是宅將底居成周永恢皇宇今更造璽書以代往詔比所𠡠授隨宜變之善朂皇華無替指意使還遷通直散騎常侍兼太府少卿轉兼太子左率聰微習弓馬乃以將用自許髙祖鋭意南討專訪王肅以軍事聰託肅願以偏裨自効肅言之於髙祖故假聰輔國將軍統兵二千與劉藻傅永成道益任莫問俱受肅節度同援渦陽而聰躁怯少威重所經淫掠無禮及與賊交望風退敗與藻等同囚於懸瓠髙祖恕死徙平州為民行届瀛州屬刺史王質獲白兎將獻託聰為表髙祖見表顧為王肅曰在下那得復有此才而令朕不知也肅曰比髙聰北徙此文或其所製髙祖悟曰必應然也何應更有此輩世宗初聰復竊還京師六輔之廢聰之謀也世宗親政除給事黄門侍郎加輔國將軍遷散騎常侍黄門如故世宗幸鄴還於河内懷界帝親射矢一里五十餘歩侍中髙顯等奏伏見親御弧矢臨原弋逺弦動羽馳矢鏃所逮三百五十餘歩臣等伏惟陛下聖武自天神藝夙茂巧㑹騶虞之節妙盡矍圃之儀威稜攸疉甝兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事竒迹必宜表述請勒銘射宫永彰聖藝詔曰此乃弓弧小藝何足以示後葉而喉脣近侍茍以為然亦豈容有異便可如請遂刋銘於射所聰為之詞趙修嬖幸聰深朋附及詔追贈修父聰為碑文出入同載觀視碑石聰毎見修迎送盡禮聰又為修作表陳當時便宜敎其自安之術由是迭相親狎修死甄琛李憑皆被黜落聰亦深用危慮而聰先以疎宗之情曲事髙肇竟獲自免肇之力也修之任勢聰傾身事之及修之死言必毁惡茹皓之寵聰又媚附毎相招命言笑攜撫公私託仗無所不至毎稱皓才識明敏非趙修之儔乃因皓啓請青州鎮下治中公廨以為私宅又乞水田數十頃皆被遂許及皓見戮聰以為死之晚也其薄於情義類皆如此侍中髙顯出授護軍聰轉兼其處於時顯兄弟疑聰間搆而求之聰居兼十餘旬出入機要言即真無逺慮藉貴因權躭於聲色賄納之音聞於遐邇中尉崔亮知肇微恨遂靣陳聰罪世宗乃出聰為平北將軍并州刺史聰善於去就知肇嫌之側身承奉肇遂待之如舊聰在并州數嵗多不率法又與太原太守王椿有隙再為大使御史舉奏肇毎以宗私相援事得寢緩世宗末拜散騎常侍平北將軍肅宗踐祚以其素附髙肇出為幽州刺史將軍如故尋以髙肇之黨與王世義髙綽李憲崔楷蘭氛之為中尉元匡所彈靈太后並特原之聰遂停廢于家斷絶人事唯修營園果以聲色自娛久之拜光祿大夫加安北將軍聰心望中書令然後出作青州願竟不果正光元年夏卒年六十九靈太后聞其病遣主書問之聰對使者歔欷慟泣及聞其亡嗟悼良久言朕既無福大臣殞䘮且其與朕父南征契濶戎旅特可感念賵布帛三百匹氷一車贈撫軍將軍青州刺史諡曰獻聰有妓十餘人有子無子皆注籍為妾以悦其情及病不欲他人得之並令燒指吞炭出家為尼聰所作文筆二十卷别有集子長雲字彦鴻起家秘書郎太尉主簿稍遷輔國將軍中散大夫建義初於河隂遇害贈安東將軍兖州刺史長雲弟叔山字彦甫司徒行參軍稍遷寜朔將軍越騎校尉卒贈太常少卿史臣曰甄琛以學尚刀筆早樹聲名受遇三朝終至崇重髙聰才尚見知名位顯著而異軌同奔咸經於危覆之轍惜乎魏書卷六十八魏書卷六十八考證甄琛傳遂從許叡李彪假書研習聞見益優許叡李彪北史作許赤彪僧林終於鄉里臣照按僧林既不著為甄琛何人又止終於鄉里四字亦成一附傳史家荒率如此魏書卷六十八考證
