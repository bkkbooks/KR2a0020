body:
  text: 魏書卷八十三上齊魏收撰列傳外戚第七十一上賀訥劉羅辰姚黄眉杜超賀迷閭毗馮熙李峻李惠夫右賢左戚尚德尊功有國者所以治天下也殷肇王基不藉莘氏為佐周成大業未聞姒姓為輔及於漢世外戚尤重殺身傾族相繼於兩京乃至移其鼎璽亂其邦國魏文深以為誡明帝尚封頑騃晉之楊駿尋至夷宗居上不以至公任物在下徒用私寵要榮繭犢引大車弱質任厚棟所謂愛之所以害之矣太祖初賀訥有部衆之業翼成皇祚其餘或以勞勤或縁恩澤咸序其迹舉外親之盛衰云爾賀訥代人太祖之元舅獻明后之兄也其先世為君長四方附國者數十部祖紇始有勲於國尚平文女父野干尚昭成女遼西公主昭成崩諸部乖亂獻明后與太祖及衞秦二王依訥會苻堅使劉庫仁分攝國事於是太祖還居獨孤部訥總攝東部為大人遷居大寗行其恩信衆多歸之侔於庫仁苻堅假訥鷹揚將軍後劉顯之謀逆太祖聞之輕騎北歸訥訥見太祖驚喜拜曰官家復國之後當念老臣太祖笑答曰誠如舅言要不忘也訥中弟染干麤暴忌太祖常圖為逆每為皇姑遼西公主擁䕶故染干不得肆其禍心於是諸部大人請訥兄弟求舉太祖為主染干曰在我國中何得爾也訥曰帝大國之世孫興復先業於我國中之福常相持奬立繼統勲汝尚異議豈是臣節遂與諸人勸進太祖登代王位于牛川及太祖討吐突隣部訥兄弟遂懐異圖率諸部救之帝擊之大潰訥西遁衛辰遣子直力鞮征訥訥告急請降太祖簡精騎二十萬救之遂徙訥部落及諸弟處之東界訥又通於慕容垂垂以訥為歸善王染干謀殺訥而代立訥遂與染干相攻垂遣子麟討之敗染干於牛都破訥於赤城太祖遣師救訥麟乃引退訥從太祖平中原拜安逺將軍其後離散諸部分土定居不聽遷徙其君長大人皆同編户訥以元舅甚見尊重然無統領以壽終於家訥弟盧亦從平中原以功賜爵遼西公太祖遣盧會衛王儀伐鄴而盧自以太祖之季舅不肯受儀節度太祖遣使責之盧遂忿恨與儀司馬丁建構成其嫌彌加猜忌會太祖勑儀去鄴盧亦引歸太祖以盧為廣川太守盧性雄豪耻居冀州刺史王輔下襲殺輔奔慕容德德以為幷州刺史廣寧王廣固敗盧亦沒訥從父弟悅初太祖之居賀蘭部下人情未甚附唯悅舉部隨從又密為太祖祈禱天神請成大業出於誠至太祖嘉之甚見寵待後平中原以功賜爵鉅鹿侯進爵北新卒子泥襲爵後降為肥如侯太祖崩京師草草泥出舉烽於安陽城北賀蘭部人皆徃赴之太宗即位乃罷詔泥與元渾等八人拾遺左右與北新侯安同持節行幷定二州劾奏幷州刺史元六頭等皆伏罪州郡肅然後從世祖征赫連昌以功進爵為琅邪公軍國大議每參預焉又征蠕蠕為别道將坐逐賊不進詐增虜當斬贖為庶人久之拜光祿勲為外都大官復本爵卒於官子醜建襲劉羅辰代人宣穆皇后之兄也父眷為北部大人帥部落歸國羅辰有智謀謂眷曰從兄顯忍人也願早圖之眷不以為意後庫仁子顯殺眷而代立又謀逆及太祖即位討顯于馬邑追至彌澤大破之後奔慕容麟麟徙之中山羅辰率騎奔太祖顯恃部衆之彊每謀為逆羅辰輙先聞奏以此特蒙寵念尋拜南部大人從平中原以前後勲賜爵永安公以軍功除征東將軍定州刺史卒謚曰敬子殊暉襲爵位幷州刺史卒子求引位武衛將軍卒謚曰貞子爾頭位魏昌廮陶二縣令贈鉅鹿太守子仁之自有傳姚黄眉姚興之子太宗昭哀皇后之弟也姚泓滅黄眉間來歸太宗厚禮待之賜爵隴西公尚陽翟公主拜駙馬都尉賜隸户二百世祖即位遷内都大官後拜太常卿卒贈雍州刺史隴西王諡曰獻陪葬金陵黄眉寛和温厚希言得失世祖悼惜之故贈有加禮杜超字祖仁魏郡鄴人密皇后之兄也少有節操泰常中為相州别駕奉使京師時以法禁不得與后通問始光中世祖思念舅氏以超為陽平公尚南安長公主拜駙馬都尉位太鴻臚卿車駕數幸其第賞賜巨萬神䴥三年以超行征南大將軍太宰進爵為王鎮鄴追加超父豹鎮東大將軍陽平景王母曰鉅鹿惠君眞君五年超為帳下所害世祖臨其喪哀慟者久之諡曰威王長子道生賜爵城陽侯後為秦州刺史進爵河東公道生弟鳯皇襲超爵加侍中特進世祖追思超不巳欲以鳯皇為定州刺史鳯皇不願違離闕庭乃止鳯皇弟道儁賜爵發干侯鎮枋頭除兖州刺史超既薨復授超從弟遺侍中安南將軍開府相州刺史入為内都大官進爵廣平王遺性忠厚頻歴州郡所在著稱薨贈太傅諡曰宣王長子元寶位司空元寶弟允寳司隸校尉元寶又進爵京兆王及歸而父遺喪明當入謝元寶欲以表聞髙宗未知遺薨怪其遲召之元寶將入時人止之曰宜以家憂自辭元寶欲見其寵不從遂冐哀而入未幾以謀反伏誅親從皆斬唯元寶子世衡逃免時朝議欲追削超爵位中書令髙允上表理之後兖州故吏汲宗等以道儁遺愛在人前從坐受誅委骸土壤求得收葬書奏詔義而聽之贈散騎常侍安南將軍南康公諡曰昭世衡襲遺公爵賀迷代人從兄女世祖敬哀皇后皇后生恭宗初后少孤無父兄近親唯迷以從父故蒙賜爵長鄉子卒贈光禄大夫五原公閭毗代人本蠕蠕人世祖時自其國來降毗即恭皇后之兄也皇后生髙宗髙宗太安二年以毗為平北將軍賜爵河東公弟紇為寧北將軍賜爵零陵公其年竝加侍中進爵為王毗征東將軍評尚書事紇征西將軍中都大官自餘子弟賜爵為王者二人公五人侯六人子三人同時受拜所以隆崇舅氏當世榮之和平二年追諡后祖父延襄康公父辰定襄懿王毗薨贈太尉追贈毗妻河東王妃子惠襲紇薨贈司空子豆後賜名莊太和中初立三長以莊為定户籍大使甚有時譽十六年例降爵後為七兵尚書卒紇弟染位外都大官冀州刺史江夏公卒先是髙宗以乳母常氏有保䕶功既即位尊為保太后後尊為皇太后興安二年太后兄英字世華自肥如令超為散騎常侍鎭軍大將軍賜爵遼西公弟喜鎭東大將軍祠曹尚書帶方公三妹皆封縣君妹夫王睹為平州刺史遼西公追贈英祖父苻堅扶風太守亥為鎭西將軍遼西蘭公渤海太守澄為侍中征東大將軍太宰遼西獻王英母許氏博陵郡君遣兼太常盧度世持節改葬獻王於遼西樹碑立廟置守冡百家太安初英為侍中征東大將軍太宰進爵為王喜左光禄大夫改封燕郡從兄泰為安東將軍朝鮮侯訢子伯夫散騎常侍選部尚書次子員金部尚書喜子振太子庶子三年英領太師評尚書事内都大官伏寶泰等州刺史五年詔以太后母宋氏為遼西王太妃和平元年喜為洛州刺史初英事宋不能謹而睹奉宋甚至就食於和龍無車牛宋疲不進睹負宋於笈至是宋於英等薄不如睹之篤謂太后曰何不王睹而黜英太后曰英為長兄門户主也家内小小不順何足追計睹雖盡力故是他姓柰何在英上本州郡公亦足報耳天安中英為平州刺史訢為幽州刺史伯夫進爵范陽公英黷貨徙燉煌諸常自興公及疑至是皆以親疏受爵賜田宅時為隆盛後伯夫為洛州刺史以贓汙欺妄徴斬於京師承明元年徴英復官薨謚遼西平王始英之徴也夢日墜其所居黄山下水中村人以車牛挽致不能出英獨抱載而歸聞者異之後員與伯夫子禽可共為飛書誣謗朝政事發有司執憲刑及五族髙祖以昭太后故罪止一門訢年老赦免歸家恕其孫一人扶飬之給奴婢田宅其家僮入者百人金錦布帛數萬計賜尚書以下宿衛以上其女壻及親從在朝皆免官歸本鄉十一年髙祖文明太后以昭太后故悉出其家前後沒入婦女以喜子振試守正平郡卒馮熙字晉昌長樂信都人文明太后之兄也祖文通語在海夷傳世祖平遼海熙父朗内徙官至秦雍二州刺史遼西郡公坐事誅文明太后臨朝追贈假黄鉞太宰燕宣王立廟長安熙生於長安為姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母携熙逃避至氐羌中撫育年十二好弓馬有勇幹氐羌皆歸附之魏母見其如此將還長安始就博士學問從師受孝經論語好陰陽兵法及長游華陰河東二郡間性汎愛不拘小節人無士庶來則納之熙姑先入掖庭為始祖左昭儀妹為髙宗文成帝后即文明太后也使人外訪知熙所在徴赴京師拜冠軍將軍賜爵肥如侯尚恭宗女博陵長公主拜駙馬都尉出為定州刺史進爵昌黎王顯祖即位為太傅累拜内都大官髙祖即位文明太后臨朝王公貴人登進者衆髙祖乃承㫖皇太后以熙為侍中太師中書監領祕書事熙以頻履師𫝊又中宫之寵為羣情所駭心不自安乞轉外任文明太后亦以為然於是除車騎大將軍開府都督洛州刺史侍中太師如故洛陽雖經破亂而舊三字石經宛然猶在至熙與常伯夫相繼為州廢毁分用大至頽落熙為政不能仁厚而信佛法自出家財在諸州鎮建佛圖精舍合七十二處寫一十六部一切經筵致名德沙門日與講論精勤不倦所費亦不貲而在諸州營塔寺多在髙山秀阜傷殺人牛有沙門勸止之熙曰成就後人唯見佛圖焉知殺人牛也其北邙寺碑文中書侍郎賈元壽之詞髙祖頻登北邙寺親讀碑文稱為佳作熙為州因事取人子女為奴婢有容色者幸之為妾有子女數十人號為貪縱後求入朝授内都大官太師如故熙事魏母孝謹如事所生魏母卒乃散髪徒跣水漿不入口三日詔不聽服熙表求依趙氏之孤髙祖以熙情難奪聽服齊衰期後以例降改封京兆郡公髙祖納其女為后曰白虎通云王所不臣數有三焉妻之父母抑言其一此所謂供承宗廟不欲奪私心然吾季著於春秋無臣證於徃牒既許通體之一用開至尊之敬比長秋配極陰政既敷未聞有司陳奏斯式可詔太師輟臣從禮又勒集書造儀付外髙祖前後納熙三女二為后一為左昭儀由是馮氏寵貴益隆賞賜累巨萬髙祖每詔熙上書不臣入朝不拜熙上書如舊熙於後遇疾綿寢四載詔遣醫問道路相望車駕亦數臨幸焉將遷洛髙祖親與熙别見其困篤歔欷流涕密勅宕昌公王遇曰大師萬一即可監䕶喪事十九年薨於代車駕在淮南留臺表聞還至徐州乃舉哀為制緦服詔有司豫辦凶儀并開魏京之墓令公主之柩俱向伊洛凡所營送皆公家為備又勑代給綵帛前後六千匹以供凶用皇后詣代都赴哭太子恂亦赴代哭弔將葬贈假黄鉞侍中都督十州諸軍事大司馬太尉冀州刺史加黄屋左纛備九錫前後部羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威彊恢逺曰武奉諡於公柩至洛七里澗髙祖服衰徃迎叩靈悲慟而拜焉葬日送臨墓所親作誌銘主生二子誕修誕字思政修字寳業皆姿質妍麗年纔十餘歲文明太后俱引入禁中申以教誡然不能習讀經史故兄弟並無學術徒整飾容儀寛雅恭謹而已誕與髙祖同歲㓜侍書學仍蒙親待尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王修侍中鎮北大將軍尚書東平公又除誕議曹尚書知殿中事及罷庶姓王誕為待中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官髙祖立於庭遙受其拜既訖還室修降為侯誕與修雖並長宫禁而性趣乖别誕性淳篤修乃浮競誕亦未能誨督其過然時言於太后髙祖嚴責之至於楚捶由是陰懐毒恨遂結左右有憾於誕者求藥欲因食害誕事覺髙祖自詰之具得情状誕引過謝乞全修命髙祖以誕父老又重其意不致於法撻之百餘黜為平城百姓修妻司空穆亮女也求離㛰請免官髙祖引管蔡事皆不許髙祖寵誕每與誕同輿而載同案而食同席坐臥彭城王勰北海王詳雖直禁中然親近不及十六年以誕為司徒髙祖既深愛誕除官日親為制三讓表幷啟將拜又為其章謝尋加車騎大將軍太子太師十八年髙祖謂其無師傅奬道風誕深自誨責從駕南伐十九年至鍾離誕遇疾不能侍從髙祖日省問醫藥備加時髙祖銳意臨江乃命六軍發鍾離南轅與誕泣訣左右皆入無不掩涕時誕已惙然彊坐視髙祖悲而淚不能下言夢太后來呼臣髙祖嗚咽執手而出遂行是日去鍾離五十里許昬時告誕薨問髙祖哀不自勝時崔慧景裴叔業軍在中淮去所次不過百里髙祖乃輕駕西還從者數千人夜至誕薨所撫屍哀慟若喪至戚逹旦聲淚不絶從者亦迭舉音明告蕭鸞鍾離戍主蕭惠休惠休遣其太守奉慰詔求棺於城中及歛迭舉髙祖以所服衣幍充禭親自臨視撤樂去膳宣勑六軍止臨江之駕髙祖親北度慟哭極哀詔侍臣一人兼大鴻臚送柩至京禮物轜儀徐州備造陵兆葬事下洛候設喪至洛陽車駕猶在鍾離詔留守賜賻物布帛五千匹榖五千斛以供葬事贈假黄鉞使持節大司馬領司徒侍中都督太師駙馬公如故加以殊禮備錫九命依晉大司馬齊王攸故事有司奏諡詔曰案諡法善行仁德曰元柔克有光曰懿昔貞惠兼美受三諡之榮忠武雙徽錫兩號之茂式凖前迹宜契具瞻既自少綢繆知之惟朕案行定名諡曰元懿帝又親為作碑文及挽歌詞皆窮美盡哀事過其厚車駕還京詔曰馮大司馬已就墳塋永潛幽室宿草之哭何能忘之遂親臨誕墓停車而哭使彭城王勰詔羣官脫朱衣服單衣介幘陪哭司徒貴者示以朋友微者示如寮佐公主貞厚有禮度産二男長子穆穆字孝和襲熙爵避皇子愉封改扶風郡公尚髙祖女順陽長公主拜駙馬都尉歴員外通直散騎常侍穆與叔輔興不和輔興亡贈相州刺史祖載在庭而穆方髙車良馬㳟受職命言宴滿堂忻笑自若為御史中尉東平王匡所劾後位金紫光禄大夫遇害河陰贈司空雍州刺史子冏字景昭襲爵昌黎王尋以庶姓罷王仍襲扶風郡公子峭字子漢齊受禪例降穆弟顥襲父誕長樂郡公修弟聿字寶興廢后同産兄也位黄門郎信都伯後坐妹廢免為長樂百姓世宗時卒於河南尹聿同産弟風㓜養於宮文明太后特加愛念數歲賜爵至北平王拜太子中庶子出入禁闥寵侔二兄髙祖親政後恩寵少衰降爵為侯幽后立乃復敘用后死亦冗散卒贈青州刺史崔光之兼黄門也與聿俱直光每謂之曰君家富貴太盛終必衰敗聿云我家何負四海乃呪我也光云以古推之不可不愼時熙為太保誕司徒太子太傅脩侍中尚書聿黄門廢后在位禮愛未弛是後歲餘脩以罪棄熙誕喪亡后廢聿退時人以為盛必衰也李峻字珍之梁國蒙縣人元皇后兄也父方叔劉義隆濟隂太守髙宗遣間使諭之峻與五弟誕嶷雅白永等前後歸京師拜峻鎭西將軍涇州刺史頓丘公雅嶷誕等皆封公位顯後進峻爵為王徴為太宰薨李惠中山人思皇后之父也父蓋少知名歴位殿中都官二尚書左將軍南郡公初世祖妹武威長公主故涼王沮渠牧犍之妻世祖平涼州頗以公主通密計助之故寵遇差隆詔蓋尚焉蓋妻與氏以是而出是後蓋加侍中駙馬都尉殿中都官尚書左僕射卒官贈征南大將軍定州刺史中山王諡曰莊惠弱冠襲父爵妻襄城王韓頽女生二女長即后也惠歴位散騎常侍侍中征西大將軍秦益二州刺史進爵為王轉雍州刺史征南大將軍加長安鎭大將惠長於思察雍州㕔事有燕爭巢鬭已累日惠令人掩獲試命綱紀斷之並辭曰此乃上智所測非下愚所知惠乃使卒以弱竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無留心羣下伏其聰察人有負鹽負薪者同釋重檐息於樹隂二人將行爭一羊皮各言藉背之物惠遣爭者出顧謂州綱紀曰此羊皮可拷知主乎羣下以為戱言咸無答者惠令人置羊皮蓆上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所察究多如此類由是吏民莫敢欺犯後為開府儀同三司青州刺史王如故歴政有美績惠素為文明太后所忌誣惠將南叛誅之惠二弟初樂與惠諸子同戮後妻梁氏亦死青州盡沒其家財惠本無釁故天下寃惜焉惠從弟鳳為定州刺史安樂王長樂主簿後長樂以罪賜死時卜筮者河間邢瓚辭引鳳云長樂不軌鳳為謀主伏誅惟鳳弟道念與鳳子及兄弟之子皆逃免後遇赦乃出太和十二年髙祖將爵舅氏詔訪存者而惠諸從以再罹拏戮難於應命唯道念敢先詣闕乃申后妹及鳳兄弟子女之存者於是賜鳳子屯爵栢人侯安祖浮陽侯興祖安喜侯道念眞定侯從弟寄生髙邑子皆加將軍十五年安祖昆弟四人以外戚蒙見詔謂曰卿之先世内外有犯得罪於時然官必用才以親非興邦之選外氏之寵超於末葉從今已後自非竒才不得復外戚謬班抽舉既無殊能今且可還後例降爵安祖等改侯為伯並去軍號髙祖奉馮氏過厚於李氏過薄舅家了無叙用朝野人士所以竊議太常髙閭顯言於禁中及世宗寵隆外家並居顯位乃惟髙祖舅氏存已不霑恩澤景明末特詔興祖為中山太守正始初詔追崇惠為使持節驃騎將軍開府儀同三司定州刺史中山公太常考行上言案諡法武而不遂曰壯諡曰壯公興祖自中山遷燕州刺史卒以兄安祖子侃晞為後襲先封南郡王後以庶姓罷王改為博陵郡公侃晞為莊帝所親幸拜散騎常侍嘗食典御帝之圖爾朱榮侃晞與魯安等持刀於禁内殺榮及莊帝蒙塵侃晞奔蕭衍魏書卷八十三上魏書卷八十三上考證列傳第七十一上魏收書外戚𫝊上亡後人所補賀訥𫝊父野干干監本誤于今改正馮熙𫝊左右皆入入監本誤人今改正魏書卷八十三上考證欽定四庫全書魏書卷八十三下齊魏收撰列𫝊外戚第七十一下高肇于勁胡國珍李延寔高肇字首文文昭皇太后之兄也自云本渤海蓨人五世祖顧晉永嘉中避亂入高麗父颺字法修高祖初與弟乘信及其鄉人韓内冀富等入國拜厲威將軍河間子乘信明威將軍俱待以客禮賜奴婢牛馬綵帛遂納颺女是為文昭皇后生世宗颺卒景明初世宗追思舅氏徴肇兄弟等錄尚書事北海王詳等奏颺宜贈左光禄大夫賜爵渤海公謚曰敬其妻蓋氏宜追封清河郡君詔可又詔颺嫡孫猛襲渤海公爵封肇平原郡公肇弟顯澄城郡公三人同日受封始世宗未與舅氏相接将拜爵乃賜衣幘引見肇顯于華林都亭皆甚惶懼舉動失儀數日之間富貴赫奕是年咸陽王禧誅財物珍寳奴婢田宅多入高氏未㡬肇為尚書左僕射領吏部冀州大中正尚世宗姑高平公主遷尚書令肇出自夷土時望輕之及在位居要留心百揆孜孜無倦世咸謂之為能世宗初六輔專政後以咸陽王禧無事構逆由是遂委信肇肇既無親族頗結朋黨附之者旬月超昇背之者䧟以大罪以北海王詳位居其上構殺之又説世宗防衛諸王殆同囚禁時順皇后暴崩世譏言肇為之皇子昌薨僉謂王顯失於醫療承肇意㫖及京兆王愉出為冀州刺史畏肇恣擅遂至不軌肇又譖殺彭城王勰由是朝野側目咸畏惡之因此專權與奪任已又嘗與清河王懌於雲龍門外廡下忽忿諍大至紛紜太尉高陽王雍和止之高后既立愈見寵信肇既當衡軸每事任已本無學識動違禮度好改先朝舊制出情妄作減削封秩抑黜勲人由是怨聲盈路矣延昌初遷司徒雖貴登台鼎猶以去要怏怏形乎辭色衆咸嗤笑之父兄封贈雖久竟不改瘞三年乃詔令遷葬肇不自臨赴唯遣其兄子猛改服詣代遷葬於鄉時人以肇無識哂而不責也其年大舉征蜀以肇為大将軍都督諸軍為之節度與都督甄琛等二十餘人俱面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒轉卧渠中鞍具瓦解衆咸怪異肇出惡焉四年世宗崩赦罷征軍肅宗與肇及征南将軍元遥等書稱諱言以告凶問肇承變哀愕非唯仰慕亦私憂身禍朝夕悲泣至于羸悴将至宿瀍澗驛亭家人夜迎省之皆不相視直至闕下衰服號哭昇太極殿奉喪盡哀太尉髙陽王先居西柏堂專決庶事與領軍于忠密欲除之潛備壯士直寝邢豹伊瓮生等十餘人於舍人省下肇哭梓宮訖於百官前引入西廊清河王懌任城王澄及諸王等皆竊言目之肇入省壯士搤而拉殺之下詔暴其罪惡又云刑書未及便至自盡自餘親黨悉無追問削除職爵葬以士禮及昏乃於厠門出其尸歸家初肇西征行至函谷車軸中折從者皆以為不獲吉還也靈太后臨朝令特贈營州刺史永熙二年出帝贈使持節侍中中外諸軍事太師大丞相太尉公錄尚書事冀州刺史肇子植自中書侍郎為濟州刺史率州軍討破元愉别將有功當蒙封賞不受云家荷重恩為國致效是其常節何足以膺進陟之報懇惻發于至誠歴青相朔恒四州刺史卒植頻莅五州皆清能著稱當時號為良刺史贈安北将軍冀州刺史肇長兄琨早卒襲颺封渤海郡公贈都督五州諸軍事鎮東大將軍冀州刺史詔其子猛嗣猛字豹兒尚長樂公主即世宗同母妹也拜駙馬都尉歴位中書令出為雍州刺史有能名入為殿中尚書卒贈司空冀州刺史出帝時復贈太師大丞相錄尚書事公主無子猛先在外有男不敢令主知臨終方言之年㡬三十矣乃召為喪主尋卒無後琨弟偃字仲游太和十年卒正始中贈安東将軍都督青州刺史謚曰莊侯景明四年世宗納其女為貴嬪及于順皇后崩永平元年立為皇后二年八座奏封后母王氏為武邑郡君偃弟夀早卒夀弟即肇也肇弟顯侍中髙麗國大中早卒于勁字鍾葵太尉㧞之子頗有武略以功臣子又以功績位沃野鎮将賜爵富昌子拜征虜将軍世宗納其女為后封太原郡公妻劉氏為章武郡君後拜征北將軍定州刺史卒贈司空諡曰恭莊公自栗磾至勁累世貴盛一皇后四贈公三領軍二尚書令三開國公勁雖以后父但以順后早崩竟不居公輔子暉字宣明后母弟也少有氣幹襲爵位汾州刺史暉善事人為尒朱榮所親以女妻其子長孺歴侍中河南尹後兼尚書僕射東南道行臺與齊獻武王討平羊侃於兖州元顥入洛害之勁弟天恩位内行長遼西太守卒贈平東將軍燕州刺史天恩子仁生位太中大夫仁生子安定平原郡太守高平郡都將卒胡國珍字世玉安定臨涇人也祖略姚興渤海公姚逵平北府諮議參軍父淵赫連屈丐給事黄門侍郎世祖克統萬淵以降欵之功賜爵武始侯後拜河州刺史國珍少好學雅尚清儉太和十五年襲爵例降為伯女以選入掖庭生肅宗即靈太后也肅宗踐祚以國珍為光祿大夫靈太后臨朝加侍中封安定郡公給田第賜帛布綿縠奴婢車馬牛甚厚追崇國珍妻皇甫氏為京兆郡君置守冡十户尚書令任城王澄奏安定公屬尊望重親賢羣矚宜出入禁中參諮大務詔可乃令入決萬幾尋進位中書監儀同三司侍中如故賞賜累萬又賜絹歳八百疋妻梁四百匹男女姊妹兄弟各有差皆極豐贍國珍與太師髙陽王雍太傅清河王懌太保廣平王懐入居門下同釐庶政詔依漢車千秋晉安平王故事給歩挽一乘自掖門至於宣光殿得以出入幷備几杖後與侍中崔光俱授帝經侍直禁中國珍尋上表陳刑政之宜詔皆施行延和初加國珍使持節都督雍州刺史驃騎大将軍開府靈太后以國珍年老不欲令其在外且欲示以方面之榮竟不行遷司徒公侍中如故就宅拜之靈太后肅宗率百寮幸其第宴㑹極歡又追京兆郡君為秦太上君太上君景明三年薨於洛陽於此十六年矣太后以太上君墳瘞卑局更増廣為起塋域門闕碑表侍中崔光等奏案漢髙祖母始謚曰昭靈夫人後為昭靈后薄太后母曰靈文夫人皆置園邑三百家長丞奉守今秦太上君未有尊謚陵寝孤立即秦君名宜上終稱兼設掃衛以慰情典請上尊謚曰孝穆權置園邑三十户立長丞奉守太后從之封國珍繼室梁氏為趙平郡君元义妻拜為女侍中封新平郡君又徙封馮翊君國珍子祥妻長安縣公主即清河王懌女也國珍年雖篤老而雅敬佛法時事齋潔自彊禮拜至於出入侍從猶能跨馬據鞍神龜元年四月七日歩從所建佛像發第至閶闔門四五里八日又立觀像晚乃肯坐勞熱増甚因遂寝疾靈太后親侍藥膳十二日薨年八十給東園溫明祕器五時朝服各一具衣一襲贈布五千匹錢一百萬蠟千斤大鴻臚持節監䕶喪事太后還宮成服於九龍殿遂居九龍寝室肅宗服小功服舉哀於太極東堂又詔自始薨至七七皆為設千僧齋令七人出家百日設萬人齋二七人出家先是巫覡言將有凶勸令為厭勝之法國珍拒而不從云吉凶有定分唯修徳以禳之臨死與太后訣云母子善治天下以萬人之心勿視大臣面也殷勤至於再三又及其子祥云我唯有一子死後勿如比来威抑之靈太后以其好戲時加威訓國珍故以為言始國珍欲就祖父西葬舊鄉後緣前世諸胡多在洛葬有終洛之心崔光嘗對太后前問國珍公萬年後為在此安厝為歸長安國珍言當陪葬天子山陵及病危太后請以後事竟言還安定語遂惽忽太后問清河王懌與崔光等議去㽜懌等皆以病亂請從先言太后猶記崔光昔與國珍言遂營墓於洛陽太后雖外從衆議而深追臨終之語云我公之逺慕二親亦吾之思父母也追崇假黄鉞使持節侍中相國都督中外諸軍事太師領太尉公司州牧號太上秦公加九錫葬以殊禮給九旒鑾輅虎賁班劒百人前後部羽葆鼓吹輼輬車謚文宣公賜物三千叚粟一千五百石又詔贈國珍祖父兄父兄下逮從子皆有封職持節就安定監䕶喪事靈太后迎太上君神柩還第與國珍俱葬贈襚一與國珍同及國珍神主入廟詔太常權給以軒懸之樂六佾之舞初國珍無男養兄真子僧洗為後後納趙平君生子祥祥字元吉襲封故事世襲例皆減邑唯祥獨得全封趙平君薨給東園祕器肅宗服小功服舉哀于東堂靈太后服齊衰期葬於太上君墓左不得祔合祥歴位殿中尚書中書監侍中改封東平郡公薨贈開府儀同三司雍州刺史謚曰孝景僧洗字湛輝封爰徳縣公位中書監侍中改封濮陽郡公僧洗自永安後廢棄不預朝政天平四年薨詔給東園祕器贈太師太尉公錄尚書事雍州刺史謚曰孝真長子寧字恵歸襲國珍先爵改為臨涇伯後進為公歴岐涇二州刺史卒謚曰孝穆女為清河王亶妃生孝靜皇帝武定初贈太師太尉公錄尚書事謚曰孝昭子䖍字僧敬元义之廢靈太后䖍時為千牛備身與備身張車渠等謀殺义事發义殺車渠等䖍坐逺徙靈太后反政徴為吏部郎中太后好以家人禮與親族宴戲䖍常致諫由是後宴謔多不預焉出為涇州刺史封安陽縣侯興和三年以帝元舅超遷司空公薨贈太傅太尉公尚書僕射徐州刺史謚曰宣葬日百官會葬乘輿送於郭外子長粲李延寔字禧隴西人尚書僕射沖之長子性溫良少為太子舎人世宗初襲父爵清泉縣侯累遷左将軍光州刺史莊帝即位以元舅之尊超授侍中太保封濮陽郡王延寔以太保犯祖諱又以王爵非庶姓所宜抗表固辭徙封濮陽郡公改授太傅尋轉司徒公出為使持節侍中太傅録尚書事青州刺史尒朱兆入洛乘輿幽縶以延寔外戚見害於州館出帝初歸葬洛陽贈使持節侍中太師太尉公錄尚書事都督雍州刺史謚曰孝懿長子彧字子文尚莊帝姊豐亭公主封東平郡公位侍中左光祿大夫中書監驃騎大將軍開府儀同三司廣州刺史彧任俠交遊輕薄無行尒朱榮之死也武毅之士皆彧所進孝靜初以罪棄市史臣曰三五哲王深防逺慮舅甥之國罕執鈞衡母后之家無聞傾敗爰及後世顛覆繼軌葢由進不以禮故其斃亦速其間或不斃泯舊基弗虧先構者葢處之以道逺權之所致也魏書卷八十三下魏書卷八十三下考證列傳第七十一下魏收書外戚𫝊下亡史臣論全用隋書外戚𫝊高肇𫝊高麗國大中北史作高麗國大中正此脱去正字魏書卷八十三下考證
