  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0020_WYG_006-1a, image: WYG0261/WYG0261-0096c.png}
body:
  text: 魏書卷六齊魏収撰帝紀第六顯祖紀顯祖獻文皇帝諱𢎞髙宗文成皇帝之長子也母曰李貴人興光元年秋七月生於隂山之北太安二年二月立爲皇太子聰叡機悟幼而有濟民神武之規仁孝純至禮敬師友和平六年夏五月甲辰即皇帝位大赦天下尊皇后曰皇太后車騎大將軍乙渾矯詔殺尚書楊保年平陽公賈愛仁南陽公張天度于禁中戊申侍中司徒平原王陸麗自湯泉入朝渾又殺之己酉以侍中車騎大將軍乙渾爲太尉錄尚書事東安王劉尼爲司徒尚書左僕射和其奴爲司空壬子以淮南王他爲鎭西大將軍儀同三司鎭涼州六月封繁陽侯李嶷爲丹陽王征東大將軍馮熙爲昌黎王乙丑詔曰夫賦斂煩則民財匱課調輕則用不足是以十一而税頌聲作矣先朝𣙜其輕重以恵百姓朕承洪業上惟祖宗之休命夙興待旦惟民之恤欲令天下同於逸豫而徭賦不息將何以塞煩去苛拯濟黎元者哉今兵革不起畜積有餘諸有雜調一以與民秋七月癸巳太尉乙渾爲丞相位居諸王上事無大小皆決於渾九月庚子曲赦京師丙午詔曰先朝以州牧親民宜置良佐故勑有司班九條之制使前政選吏以待俊乂必謂銓衡允衷朝綱應敘然牧司寛惰不祗憲㫖舉非其人愆于典度今制刺史守宰到官之日仰自舉民望忠信以爲選官不聼前政共相干冐若簡任失所以罔上論是月劉子業征北大將軍義陽王劉昶自彭城來降冬十月徵陽平王新成京兆王子推濟隂王小新成汝隂王天賜任城王雲入朝是歲劉子業叔父彧殺子業僭立天安元年春正月己丑朔大赦改年二月庚申丞相太原王乙渾謀反伏誅乙亥以侍中元孔雀爲濮陽王侍中陸定國爲東郡王三月庚子以隴西王源賀爲太尉辛丑髙宗文成皇帝神主祔于太廟辛亥帝幸道壇親受符籙曲赦京師髙麗波斯于闐阿襲諸國遣使朝獻秋七月闕二字詔諸有詐取爵位罪特原之削其爵職其有祖父假爵號貨賕以正名者不聼繼襲諸非勞進超遷者亦各還初不以實聞者以大不敬論九月劉彧司州刺史常珍竒以懸瓠内屬己酉初立鄉學郡置博士二人助教二人學生六十人劉彧徐州刺史薛安都以彭城内屬彧將張永沈攸之擊安都詔北部尚書尉元爲鎮南大將軍都督諸軍事鎮東將軍城陽公孔伯恭爲副出東道救彭城殿中尚書鎮西大將軍西河公元石都督荆豫南雍州諸軍事給事中京兆侯張窮竒爲副出西道救懸瓠冬十月曹利彤曷國各遣使朝獻十有一月壬子劉彧兗州刺史畢衆敬遣使内屬十有二月己未尉元軍次于秺彧將周凱張永沈攸之相繼退走皇弟安平薨是歲州鎮十一旱民饑開倉賑恤皇興元年春正月癸巳尉元大破張永沈攸之於吕梁東斬首數萬級凍死者甚衆獲劉彧秦州刺史垣恭祖羽林監沈承伯永攸之單騎走免獲軍資器械不可勝數劉彧遣使朝貢庚子東平王道符謀反於長安殺副將駙馬都尉萬古真鉅鹿公李恢雍州刺史魚𤣥明丙午詔司空平昌公和其奴東陽公元丕等討道符丁未道符司馬叚太陽攻道符斬之傳首京師道符兄弟皆伏誅閏月以頓丘王李峻爲太宰劉彧青州刺史沈文秀冀州刺史崔道固並遣使請舉州内屬詔平東將軍長孫陵平南將軍廣陵公侯窮竒赴援之二月詔使持節都督諸軍事征南大將軍慕容白曜督騎五萬次於碻磝爲東道後援濟隂王小新成薨髙麗庫莫奚具伏弗郁羽陵日連匹黎爾于闐諸國各遣使朝貢劉彧東平太守申纂戍無鹽遏絶王使詔征南大將軍慕容白曜督諸軍以討之三月甲寅尅之沈文秀崔道固復叛歸劉彧白曜回師討之拔彧肥城垣苗糜溝三戍夏四月白曜攻升城戍主房崇吉遁走秋八月白曜攻歴城丁酉行幸武州山石窟寺戊申皇子宏生大赦改年九月壬子髙麗于闐普嵐粟特國各遣使朝獻丁巳進馮翊公李白爵梁郡王是月詔賜六鎮貧人布人三匹冬十月癸卯田於那男池濮陽王孔雀坐怠慢降爵爲公二年春二月癸未田于西山親射虎豹崔道固及劉彧梁鄒戍主平原太守劉休賔舉城降是月徐州羣盜司馬休符自稱晉王將軍尉元討平之三月白曜進圍東陽戊午劉彧遣使朝貢夏四月辛丑以南郡公李恵爲征南大將軍儀同三司都督闗右諸軍事雍州刺史進爵爲王髙麗庫莫奚契丹具伏弗郁羽陵日連匹黎爾叱六手悉萬丹阿大何羽眞侯于闐波斯國各遣使朝獻五月乙卯田于崞山遂幸繁畤辛酉還宫六月庚辰以河南闢地曲赦京師殊死以下以昌黎王馮熙爲太傅秋九月辛亥封皇叔楨爲南安王長夀爲城陽王太洛爲章武王休爲安定王冬十月辛丑上田於冷泉十有一月以州鎭二十七水旱開倉賑恤十有二月甲午詔曰頃張永迷擾敢拒王威暴骨原隰殘廢不少死生寃痛朕甚愍焉天下民一也可勑郡縣永軍殘廢之士聼還江南露骸草莾者収瘞之是月悉萬丹等十餘國各遣使朝貢三年春正月乙丑東陽潰虜沈文秀戊辰司空平昌公和其奴薨二月蠕蠕髙麗庫莫奚契丹國各遣使朝獻己卯以上黨公慕容白曜爲都督青齊東徐三州諸軍事征南大將軍開府儀同三司青州刺史進爵濟南王夏四月壬辰劉彧遣使朝貢丙申名皇子曰宏大赦天下丁酉田于崞山五月徙青州民於京師六月辛未立皇子宏爲皇太子秋七月蠕蠕國遣使朝貢冬十月侍中太宰頓丘王李峻薨十有一月吐谷渾别帥白楊提度汗率戸内附襄城公韓頽進爵爲王四年春正月詔州鎮十一民饑開倉賑恤二月以東郡王陸定國爲司空髙麗庫莫奚契丹各遣使朝獻吐谷渾拾寅不供職貢詔使持節征西大將軍上黨王長孫觀討之廣陽王石侯薨三月丙戌詔曰朕思百姓病苦民多非命明發不寐疚心疾首是以廣集良醫逺採名藥欲以救䕶兆民可宣告天下民有病者所在官司遣醫就家診視所須藥物任醫量給之夏四月辛丑大赦天下戊申長孫觀軍至曼頭山大破拾寅拾寅與麾下數百騎宵遁拾寅從弟豆勿來及其渠帥匹婁拔累等率所領降附五月封皇弟長樂爲建昌王六月劉彧遣使朝貢秋八月羣盜入彭城殺鎭將元解愁長史勒兵滅之蠕蠕犯塞九月丙寅輿駕北伐諸將俱會于女水大破虜衆事具蠕蠕傳司徒東安王劉尼坐事免壬申車駕至自北伐飲至䇿勲告于宗廟冬十月誅濟南王慕容白曜髙平公李敷十有一月詔弛山澤之禁十有二月甲辰幸鹿野苑石窟寺陽平王新成薨五年春三月乙亥詔曰天安以來軍國多務南定徐方北掃遺虜征戍之人亡竄非一雖罪合刑書毎加哀宥然寛政猶水逋逃遂多宜申明典刑以肅姦僞自今諸有逃亡之兵及下代守宰浮游不赴者限六月三十日悉聽歸首不首者論如律詔假員外散騎常侍邢祐使於劉彧夏四月西部勑勒叛詔汝隂王天賜給事中羅雲討之雲爲勑勒所襲殺死者十五六北平王長孫敦薨六月丁未行幸河西秋七月丙寅遂至隂山八月丁亥車駕還宫帝雅薄時務常有遺世之心欲禪位於叔父京兆王子推語在任城王雲傳羣臣固請帝乃止丙午冊命太子曰昔堯舜之禪天下也皆由其子不肖若丹朱商均能負荷者豈搜揚側陋而授之哉爾雖沖弱有君人之表必能恢隆王道以濟兆民今使太保建安王陸馛太尉源賀持節奉皇帝璽綬致位於爾躬其踐昇帝位克廣洪業以光祖宗之烈使朕優游履道頤神養性可不善歟丁未詔曰朕承洪業運屬太平淮岱率從四海清晏是以希心𤣥古志存澹泊躬覽萬務則損頤神之和一日或曠政有淹滯之失但子有天下歸尊於父父有天下傳之於子今稽協靈運考會羣心爰命儲官踐昇大位朕方優遊恭已栖心浩然社稷乂安克廣其業不亦善乎百官有司其祗奉𦙍子以答天休宣布㝢内咸使聞悉於是羣公奏曰昔三皇之世澹泊無爲故稱皇是以漢髙祖旣稱皇帝尊其父爲太上皇明不統天下今皇帝幼沖萬幾大政猶宜陛下總之謹上尊號太上皇帝乃從之己酉太上皇帝徙御崇光宫採椽不斲土階而已國之大事咸以聞承明元年年二十三崩於永安殿上尊諡曰獻文皇帝廟號顯祖葬雲中金陵史臣曰聰叡夙成兼資能斷其顯祖之謂乎故能更清漠野太啓南服而早懷厭世之心終致宫闈之變將天意哉魏書卷六魏書卷六考證顯祖紀廣陵公侯窮竒前云給事中京兆侯張窮竒此云廣陵公侯窮竒疑或有誤魏書卷六考證
