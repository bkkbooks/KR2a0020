body:
  text: 魏書卷一百二齊魏收撰列傳第九十西域夏書稱西戎即序班固云就而序之非盛威武致其貢物也漢氏初開西域有三十六國其後分立五十五王置校尉都䕶以撫納之王莾簒位西域遂絶至於後漢班超所通者五十餘國西至西海東西萬里皆來朝貢復置都䕶校尉以相綂攝其後或絶或通漢朝以為勞敝中國其官時置時廢暨魏晋之後互相吞㓕不可復詳記焉太祖初經營中原未暇及於四表既而西戎之貢不至有司奏依漢氏故事請通西域可以振威徳於荒外又可致竒貨於天府太祖曰漢氏不保境安人乃逺開西域使海内虚耗何利之有今若通之前獘復加百姓矣遂不從歴太宗世竟不招納太延中魏徳益以逺聞西域龜兹疏勒烏孫悦般渇槃陁鄯善焉耆車師粟特諸國王始遣使來獻世祖以西域漢世雖通有求則卑辭而來無欲則驕慢王命此其自知絶逺大兵不可至故也若報使往來終無所益欲不遣使有司奏九國不惮遐嶮逺貢方物當與其進安可豫抑後來乃從之於是始遣行人王恩生許綱等西使恩生出流沙為蠕蠕所執竟不果達又遣散騎侍郎董琬髙明等多齎錦帛出鄯善招撫九國厚賜之初琬等受詔便道之國可往赴之琬過九國北行至烏孫國其王得朝廷所賜拜受甚悦謂琬曰傳聞破洛那者舌皆思魏徳欲稱臣致貢但患其路無由耳今使君等既到此可往二國副其慕仰之誠琬於是自向破洛那遣明使者舌烏孫王為發導譯達二國琬等宣詔慰賜之已而琬明東還烏孫破洛那之屬遣使與琬俱來貢獻者十有六國自後相繼而來不間于歲國使亦數十輩矣初世祖毎遣使西域常詔河西王沮渠牧犍令䕶送至姑臧牧犍恒發使導路出於流沙後使者自西域還至武威牧犍左右謂使者曰我君承蠕蠕吳提妄説云去歲魏天子自來伐我士馬疫死大敗而還我禽其長弟樂平王丕我君大喜宣言國中又聞吳提遣使告西域諸國稱魏已削弱今天下唯我為彊若更有魏使勿復恭奉西域諸國亦有貳者牧犍事主稍以慢惰使還具以状聞世祖遂議討牧犍凉州既平鄯善國以為脣亡齒寒自然之道也今武威為魏所㓕次及我也若通其使人知我國事取亡必近不如絶之可以支久乃斷塞行路西域貢獻歴年不入後平鄯善行人復通始琬等使還京師具言凡所經見及傳聞傍國云西域自漢武時五十餘國後稍相并至太延中為十六國分其地為四域自葱嶺以東流沙以西為一域葱嶺以西海曲以東為一域者舌以南月氏以北為一域两海之間水澤以南為一域内諸小渠長蓋以百數其出西域本有二道後更為四出自玉門渡流沙西行二千里至鄯善為一道自玉門渡流沙北行一千二百里至車師為一道從莎車西行百里至葱嶺葱嶺西一千三百里至伽倍為一道自莎車西南五百里葱嶺西南一千三百里至波路為一道焉自琬所不傳而更有朝貢者紀其名不能具國俗也其與前使所異者錄之鄯善國都扜泥城古樓蘭國也去代七千六百里所都城方一里地多沙鹵少水草北即白龍堆路至太延初始遣使來獻四年遣其弟素延耆入侍及世祖平凉州沮渠牧犍弟無諱走保敦煌無諱後謀渡流沙遣其弟安周擊鄯善王比龍恐懼欲降會魏使者自天竺罽賓還俱會鄯善勸比龍拒之遂與連戰安周不能剋退保東城後比龍懼率衆西奔且末其世子乃應安周鄯善人頗剽刼之令不得通世祖詔散騎常侍成周公萬度歸乗𫝊𤼵凉州兵討之度歸到敦煌留輜重以輕騎五千渡流沙至其境時鄯善人衆布野度歸勅吏卒不得有所侵掠邉守感之皆望旗稽服其王真逹面縛出降度歸釋其縳留軍屯守與真達詣京都世祖大悦厚待之是歳拜交趾公韓牧為假節征西将軍領䕶西戎校尉鄯善王以鎮之賦役其人比之郡縣且末國都且末城在鄯善西去代八千三百二十里真君三年鄯善王比龍避沮渠安周之難率國人之半奔且末後役屬鄯善且末西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駝豫知之即鳴而聚立埋其口鼻於沙中人毎以為候亦即将氈擁蔽鼻口其風迅駛斯湏過盡若不防者必至危斃于闐國在且末西北葱嶺之北二百餘里東去鄯善千五百里南去女國二千里去朱俱波千里北去龜兹千四百里去代九千八百里其地方亘千里連山相次所都城方八九里部内有大城五小城數十于闐城東三十里有苜拔河中出玉石土冝五榖並桑麻山多美玉有好馬駝騾其刑法殺人者死餘罪各随輕重懲罰之自外風俗物産與龜兹略同俗重佛法寺塔僧尼甚衆王尤信尚毎設齋日必親自灑掃饋食焉城南五十里有贊摩寺即昔羅漢比丘盧旃為其王造覆盆浮圖之所石上有辟支佛跣處雙跡猶存于闐西五里有比摩寺云是老子化胡成佛之所俗無禮義多盗賊滛縱自髙昌以西諸國人等深目髙鼻唯此一國貌不甚胡頗類華夏城東二十里有大水北流號樹枝水即黄河也一名計式水城西五十五里亦有大水名達利水與樹枝水會俱北流真君中世祖詔髙凉王那擊吐谷渾慕利延慕利延懼驅其部落渡流沙那進軍急追之慕利延遂西入于闐殺其王死者甚衆顯祖末蠕蠕冦于闐于闐患之遣使素目伽上表曰西方諸國今皆已屬蠕蠕奴世奉大國至今無異今蠕蠕軍馬到城下奴聚兵自固故遣使奉獻延望救援顯祖詔公卿議之公卿奏曰于闐去京師幾萬里蠕蠕之性惟習野掠不能攻城若為所拒當已旋矣雖欲遣師勢無所及顯祖以公卿議示其使者亦以為然於是詔之曰朕承天理物欲令萬方各安其所應勅諸軍以拯汝難但去汝遐阻雖復遣援不救當時之急已停師不行汝宜知之朕今練甲飬卒一二歲間當躬率猛将為汝除患汝其謹警候以待大舉先是朝廷遣使者韓羊皮使波斯波斯王遣使獻馴象及珍物經于闐于闐中于王秋仁輙留之假言慮有冦不達羊皮言状顕祖怒又遣羊皮奉詔責譲之自後毎使朝獻蒲山國故皮山國也居皮城在于闐南去代一萬二千里其國西南三里有凍凌山後役屬于闐悉居半國故西夜國也一名子合其王號子治呼犍在于闐西去代萬二千九百七十里太延初遣使來獻自後貢使不絶權於摩國故烏秏國也其王居烏秏城在悉居半西南去代一萬二千九百七十里渠莎國居故莎車城在子合西北去代一萬二千九百八十里車師國一名前部其王居交河城去代萬五十里其地北接蠕蠕本通使交易世祖初始遣使朝獻詔行人王恩生許綱等出使恩生等始渡流沙為蠕蠕所執恩生見蠕蠕吳提持魏節不為之屈後世祖切譲呉提吳提懼乃遣恩生等歸許綱到敦煌病死朝廷壮其節賜諡曰貞初沮渠無諱兄弟之渡流沙也鳩集遺人破車師國真君十一年車師王車夷落遣使琢進薛直上書曰臣亡父僻處塞外仰慕天子威徳遣使表獻不空於歳天子降念賜遺甚厚及臣繼立亦不闕常貢天子垂矜亦不異前世敢緣至恩輙陳私艱臣國自無諱所攻擊經今八歳人民饑荒無以存活賊今攻臣甚急臣不能自全遂捨國東奔三分免一即日已到焉耆東界思歸天闕幸乖賑救於是下詔撫慰之開焉耆倉給之正平初遣子入侍自後毎使朝貢且彌國都天山東于大谷在車師北去代一萬五百七十里本役屬車師焉耆國在車師南都員渠城白山南七十里漢時舊國也去代一萬二百里其王姓龍名鳩尸卑那即前凉張軌所討龍熈之𦙍所都城方二里國内凡有九城國小人貧無綱紀法令兵有弓刀甲矟㛰姻略同華夏死亡者皆焚而後葬其服制滿七日則除之丈夫並剪髪以為首飾文字與婆羅門同俗事天神並崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉氣候寒土田良沃榖有稻粟菽麥畜有駝馬飬蠶不以為絲唯充綿纊俗尚蒲萄酒兼愛音樂南去海十餘里有魚鹽蒲葦之饒東去髙昌九百里西去龜兹九百里皆沙磧東南去𤓰州二千二百里恃地多險頗剽劫中國使世祖怒之詔成周公萬度歸討之約齎輕糧取食路次度歸入焉耆東界擊其邉守左回尉犁二城拔之進軍向員渠鳩尸卑那以四五萬人出城守險以拒度歸募壮勇短兵直往衝鳩尸卑那衆大潰盡虜之单騎走入山中度歸進屠其城四鄙諸戎皆降服焉耆為國斗絶一隅不亂日久獲其珍竒異翫殊方譎詭不識之物橐駝馬牛雜畜巨萬時世祖幸隂山北宫度歸破焉耆露板至世祖省訖賜司徒崔浩書曰萬度歸以五千騎經萬餘里拔焉耆三城獲其珍竒異物及諸委積不可勝數自古帝王雖云即序西戎有如指注不能控引也朕今手把而有之如何浩上書稱美遂命度歸鎮撫其人初鳩尸卑那走山中猶覬城不拔得還其國既見盡為度歸所剋乃奔龜兹龜兹以其壻厚待之龜兹國在尉犁西北白山之南一百七十里都延城漢時舊國也去代一萬二百八十里其王姓白即後凉吕光所立白震之後其王頭繫綵帶垂之於後坐金師子牀所居城方五六里其刑法殺人者死劫賊則斷其一臂并刖一足税賦凖地徴租無田者則税銀錢風俗婚姻喪葬物産與焉耆略同唯氣候少温為異又出細氈饒銅鐵鈆麖皮氍毹沙鹽綠雌黄胡粉安息香良馬犎牛等東有輪臺即漢貳師将軍李廣利所屠者其南三百里有大河東流號計式水即黄河也東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙帳六百餘里東南去𤓰州三百里其東闕城戍冦竊非一世祖詔萬度歸率騎一千以擊之龜兹遣烏羯目提等領兵三千距戰度歸擊走之斬二百餘級大獲駝馬而還俗性多淫置女市收男子錢入官土多孔雀羣飛山谷間人取飬而食之孳乳如鷄鶩其王家恒有千餘隻云其國西北大山中有如膏者流出成川行數里入地如䬾餬甚臭服之髮齒已落者能令更生病人服之皆愈自後毎使朝貢姑黙國居南城在龜兹西去代一萬五百里役屬龜兹温宿國居温宿城在姑黙西北去代一萬五百五十里役屬龜兹尉頭國居尉頭城在温宿北去代一萬六百五十里役屬龜兹烏孫國居赤谷城在龜兹西北去代一萬八百里其國數為蠕蠕所侵西徙葱嶺山中無城郭随畜牧逐水草太延三年遣使者董琬等使其國後毎使朝貢疏勒國在姑黙西白山南百餘里漢時舊國也去代一萬一千二百五十里髙宗末其王遣使送釋迦牟尼佛袈裟一長二丈餘髙宗以審是佛衣應有靈異遂燒之以騐虚實置於猛火之上經日不然觀者莫不悚駭心形俱肅其王戴金師子冠土多稻粟麻麥銅鐵錫雌黄錦綿毎歳常供送於突厥其都城方五里國内有大城十二小城數十人手足皆六指産子非六指者即不育勝兵二千人南有黄河西帶葱嶺東去龜兹千五百里西去鏺汗國千里南去朱俱波八九百里東北至突厥牙帳千餘里東南去𤓰州四千六百里悦般國在烏孫西北去代一萬九百三十里其先匈奴北單于之部落也為漢車騎将軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜兹北地方數千里衆可二十餘萬凉州人猶謂之單于王其風俗言語與髙車同而其人清潔於胡俗剪髮齊眉以醍醐塗之昱昱然光澤日三澡潄然後飲食其國南界有火山山傍石皆燋鎔流地數十里乃凝堅人取為藥即石流黄也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與大檀相見入其界百餘里見其部人不浣衣不絆髮不洗手婦人舌䑛噐物王謂其從臣曰汝曹誑我入此狗國中乃馳還大檀遣騎追之不及自是相仇讎數相征討真君九年遣使朝獻并送幻人稱能割人喉脉令斷擊人頭令骨䧟皆血出或數升或盈斗以草藥内其口中令嚼咽之湏臾血止飬瘡一月復常又無痕瘢世祖疑其虚乃取死罪囚試之皆騐云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕來抄掠術人能作霖雨狂風大雪及行潦蠕蠕凍死漂亡者十二三是歲再遣使朝貢求與官軍東西齊契討蠕蠕世祖嘉其意命中外諸軍戒嚴以淮南王他為前鋒襲蠕蠕仍詔有司以其鼓舞之節施於樂府自後毎使貢獻者至拔國都者至拔城在疏勒西去代一萬一千六百二十里其國東有潘賀那山出美鐵及師子迷密國都迷密城在者至拔西去代一萬二千六百里正平元年遣使獻一峯黑橐駝其國東有山名郁悉滿山出金玉亦多鐵悉萬斤國都悉萬斤城在悉密西去代一萬二千七百二十里其國南有山名伽色那山出師子毎使朝貢忸密國都忸密城在悉萬斤西去代二萬二千八百二十八里洛那國故大宛國也都貴山城在疏勒西北去代萬四千四百五十里太和三年遣使獻汗血馬自此毎使朝貢粟特國在葱嶺之西古之奄蔡一名温那沙居於大澤在康居西北去代一萬六千里先是匈奴殺其王而有其國至王忽倪已三世矣其國商人先多詣凉土販貨及克姑臧悉見虜髙宗初粟特王遣使請贖之詔聽焉自後無使朝獻波斯國都宿利城在忸密西古條支國也去代二萬四千二百二十八里城方十里户十餘萬河經其城中南流土地平正出金銀鍮石珊瑚琥珀車渠馬腦多大真珠頗棃瑠璃水精瑟瑟金剛火齊鑌鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及薰陸鬱金蘇合青木等香胡椒蓽撥石蜜千年棗香附子訶犂勒無食子鹽緑雌黄等物氣候暑熱家自藏氷地多沙磧引水溉灌其五榖及鳥獸等與中夏略同唯無稻及黍稷土出名馬大驢及駝往往有日行七百里者富室至有數千頭又出白象師子大鳥卵有鳥形如槖駝有两翼飛而不能髙食草與肉亦能噉火其王姓波氏名斯坐金羊牀戴金花冠衣錦袍織成帔飾以真珠寳物其俗丈夫剪髮戴白皮帽貫頭衫两廂近下開之亦有巾帔緣以織成婦女服大衫披大帔其髪前為髻後披之飾以金銀花仍貫五色珠落之於膊王於其國内别有小牙十餘所猶中國之離宫也毎年四月出遊處之十月乃還王即位以後擇諸子内賢者宻書其名封之於庫諸子及大臣皆莫之知也王死衆乃發書視之其封内有名者即立以為王餘子出各就邉任兄弟更不相見也國人號王曰醫囋妃曰防歩率王之諸子曰殺野大官有摸胡壇掌國内獄訟泥忽汗掌庫藏開禁地早掌文書及衆務次有遏羅訶地掌王之内事薛波勃掌四方兵馬其下皆有屬官分統其事兵有甲矟圓排劍弩弓箭戰兼乗象百人随之其刑法重罪懸諸竿上射殺之次則繫獄新王立乃釋之輕罪則劓刖若髠或剪半鬢及繫牌於項以為恥辱犯彊盗者繫之終身姦貴人妻者男子流婦人割其耳鼻賦税則凖地輸銀錢俗事火神天神文字與胡書異多以姊妹為妻妾自餘婚合亦不擇尊卑諸夷之中最為醜穢矣百姓女年十歲以上有姿貎者王收飬之有功勲人即以分賜死者多棄屍於山一月著服城外有人别居唯知䘮葬之事號為不淨人若入城市摇鈴自别以六月為歲首尤重七月七日十二月一日其日人庶以上各相命召設會作樂以極懽娛又毎年正月二十日各祭其先死者神龜中其國遣使上書貢物云大國天子天之所生願日出處常為漢中天子波斯國王居和多千萬敬拜朝廷嘉納之自此毎使朝獻伏盧尼國都伏盧尼城在波斯國北去代二萬七千三百二十里累石為城東有大河南流中有鳥其形似人亦有如槖駝馬者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥珀多師子色知顯國都色知顯城在悉萬斤西北去代一萬二千九百四十里土平多五果伽色尼國都伽色尼城在悉萬斤南去代一萬二千九百里出赤鹽多五果薄知國都薄知城在伽色尼南去代一萬三千三百二十里多五果牟知國都牟知城在忸宻西南去代二萬二千九百二十里土平禽獸草木類中國阿弗太汗國都阿弗太汗城在忸宻西去代二萬三千七百二十里土平多五果呼似宻國都呼似宻城在阿弗太汗西去代二萬四千七百里土平出銀琥珀有師子多五果諾色波羅國都波羅城在忸宻南去代二萬三千四百二十八里土平宜稻麥多五果早伽至國都早伽至城在忸宻西去代二萬三千七百二十八里土平少田植取稻麥於隣國有五果伽不單國都伽不單城在悉萬斤西北去代一萬二千七百八十里土平宜稻麥有五果者舌國故康居國在破洛那西北去代一萬五千四百五十里太延三年遣使朝貢自是不絶伽倍國故休宻翕侯都和墨城在莎車西去代一萬三千里人居山谷間折薛莫孫國故雙靡翕侯都雙靡城在伽倍西去代一萬三千五百里人居山谷間鉗敦國故貴霜翕侯都䕶澡城在折薛莫孫西去代一萬三千五百六十里人居山谷間弗敵沙國故肸頓翕侯都薄茅城在鉗敦西去代一萬三千六百六十里居山谷間閻浮謁國故髙附翕侯都髙附城在弗敵沙南去代一萬三千七百六十里居山谷間大月氏國都盧監氏城在弗敵沙西去代一萬四千五百里北與蠕蠕接數為所侵遂西徙都薄羅城去弗敵沙二千一百里其王寄多羅勇武遂興師越大山南侵北天竺自乾陁羅以北五國盡役屬之世祖時其國人商販京師自云能鑄石為五色琉璃於是採礦山中於京師鑄之既成光澤乃美於西方來者乃詔為行殿容百餘人光色映徹觀者見之莫不驚駭以為神明所作自此中國瑠璃遂賤人不復珍之安息國在葱嶺西都蔚搜城北與康居西與波斯相接在大月氏西北去代二萬一千五百里大秦國一名黎軒都安都城從條支西渡海曲一萬里去代三萬九千四百里其海傍出猶渤海也而東西與渤海相望盖自然之理地方六千里居两海之間其地平正人居星布其王都城分為五城各方五里周六十里王居中城城置八臣以主四方而王城亦置八臣分主四城若謀國事及四方有不决者則四城之臣集議王所王自聽之然後施行王三年一出觀風化人有寃枉詣王訴訟者當方之臣小則譲責大則黜退令其舉賢人以代之其人端正長大衣服車旗擬儀中國故外域謂之大秦其土宜五榖桑麻人務蠶田多璆琳琅玕神龜白馬朱鬛明珠夜光璧東南通交趾又水道通益州永昌郡多出異物大秦西海水之西有河河西南流河西有南北山山西有赤水西有白玉山玉山西有西王母山玉為堂云從安息西界循海曲亦至大秦四萬餘里於彼國觀日月星辰無異中國而前史云條支西行百里日入處失之逺矣阿鈎羌國在莎車西南去代一萬三千里國西有縣度山其間四百里中往往有棧道下臨不測之淵人行以䋲索相持而度因以名之土有五榖諸果市用錢為貨居止立宮室有兵噐土出金珠波路國在阿鈎羌西北去代一萬三千九百里其地濕熱有蜀馬土平物産國俗與阿鈎羌同小月氏國都富樓沙城其王本大月氏王寄多羅子也寄多羅為匈奴所逐西徙後令其子守此城因號小月氏焉在波路西南去代一萬六千六百里先居西平張掖之間被服頗與羌同其俗以金銀錢為貨随畜牧移徙亦類匈奴其城東十里有佛塔周三百五十歩髙八十丈自佛塔初建計至武定八年八百四十二年所謂百丈佛圖也罽賔國都善見城在波路西南去代一萬四千二百里居在四山中其地東西八百里南北三百里地平温和有苜蓿雜草竒木檀槐梓竹種五榖糞園田地下濕生稻冬食生菜其人工巧雕文刻鏤織罽有金銀銅錫以為噐物市用錢他畜與諸國同毎使朝獻吐呼羅國去代一萬二千里東至范陽國西至悉萬斤國中間相去二千里南至連山不知名北至波斯國中間相去一萬里國中有薄提城周帀六十里城南有西流大水名漢樓河土宜五榖有好馬駝騾其王會遣使朝貢副貨國去代一萬七千里東至阿副使且國西至没誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周帀七十里宜五榖葡桃唯有馬駝騾國王有黄金殿殿下金駝七頭各髙三尺其王遣使朝貢南天竺國去代三萬一千五百里有伏醜城周帀十里域中出麾尼珠珊瑚城東三百里有拔賴城城中出黄金白真檀石蜜蒲萄土宜五榖世宗時其國王婆羅化遣使獻駿馬金銀自此毎使朝貢疊伏羅國去代三萬一千里國中有勿悉城城北有鹽竒水西流有白象并有阿末黎木皮中織作布土宜五榖世宗時其國王伏陀末多遣使獻方物自是毎使朝貢拔豆國去代五萬一千里東至多勿當國西至旃那國中間相去七百五十里南至罽陵伽國北至弗那伏且國中間相去九百里國中出金銀雜寳白象水牛㲠牛蒲萄五果土宜五榖嚈噠國大月氏之種類也亦曰髙車之别種其原出於塞北自金山而南在于闐之西都馬許水南二百餘里去長安一萬一百里其王都拔底延城蓋王舍城也其城方十里餘多寺塔皆飾以金風俗與突厥略同其俗兄弟共一妻夫無兄弟者其妻戴一角帽若有兄弟者依其多少之數更加角焉衣服類加以纓絡頭皆剪髮其語與蠕蠕髙車及諸胡不同衆可十萬無城邑依随水草以氈為屋夏遷凉土冬逐煖處分其諸妻各在别所相去或二百三百里其王巡歴而行毎月一處冬寒之時三月不徙王位不必傳子子弟堪任死便授之其國無車有輿多駝馬用刑嚴急偷盗無多少皆腰斬盗一責十死者富者累石為藏貧者掘地而埋随身諸物皆置冢内其人凶悍能鬭戰西域康居于闐沙勒安息及諸小國三十許皆役屬之號為大國與蠕蠕婚姻自太安以後毎遣使朝貢正光末遣使貢師子一至髙平遇万俟醜奴反因留之醜奴平送京師永熈以後朝獻遂絶初熈平中肅宗遣王伏子綂宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數盖舉其略云其國去漕國千五百里去𤓰州六千五百里朱居國在于闐西其人山居有麥多林果咸事佛語與于闐相類役屬嚈噠渇槃陁國在葱嶺東朱駒波西河經其國東北流有髙山夏積霜雪亦事佛道附於嚈噠鉢和國在渇槃陁西其土尤寒人畜同居穴地而處又有大雪山望若銀峰其人唯食餅麨飲麥酒服氈裘有二道一道西行向嚈噠一道西南趣烏萇亦為嚈噠所統波知國在鉢和西南土狹人貧依託山谷其王不能總攝有三池𫝊云大池有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多遇風雪之困賖彌國在波知之南山居不信佛法專事諸神亦附嚈噠東有鉢盧勒國路嶮緣鐵銷而度下不見底熈平中宋雲等竟不能逹烏萇國在賖彌南北有葱嶺南至天竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪决焉土多林果引水灌田豐稻麥事佛多諸寺塔事極華麗人有争訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知往來也乾陁國在烏萇西本名業波為嚈噠所破因改焉其王本是勅勒臨國民二世矣好征戰與罽賔鬬三年不罷人怨苦之有鬭象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔髙七十丈周三百步即所謂雀離佛圖也康國者康居之後也遷徙無常不恒故地自漢以來相承不絶其王本姓温月氏人也舊居祁連山北昭武城因被匈奴所破西踰葱嶺遂有其國枝庶各分王故康國左右諸國並以昭武為姓示不忘本也王字世夫畢為人寛厚甚得衆心其妻突厥逹度可汗女也都於薩寳水上阿祿廸城多人居大臣三人共掌國事其王索髪冠七寳金花衣綾羅錦繡白疊其妻有髻幪以皂巾丈夫剪髪錦袍名為彊國西域諸國多歸之米國史國曹國何國安國小安國那色波國烏那曷國穆國皆歸附之有胡律置於袄祠将决罰則取而斷之重者族次罪者死賊盗截其足人皆深目髙鼻多髯善商賈諸夷交易多凑其國有大小鼔琵琶五弦箜篌婚姻䘮制與突厥同國立祖廟以六月祭之諸國皆助祭奉佛為胡書氣候温宜五榖勤修園蔬樹木滋茂出馬駝驢犎牛黄金碙沙􅀈香阿薛那香瑟瑟麞皮氍毹錦疊多蒲萄酒富家或致千石連年不敗太延中始遣使貢方物後遂絶焉史臣曰西域雖通魏氏而中原始平天子方以混一為心未遑征伐其信使往來深得覊縻勿絶之道耳魏書卷一百二魏書卷一百二考證西域魏收書亡此卷全冩北史西域傳而不錄安國以後又隋書西域傳云康國大業中始遣使貢方物後遂絶焉此改大業字為太延盖後人妄改罽賔國𫝊都善見城本書孝静帝紀帝名善見固應諱之而此不避者以文固北史也乾陁國傳臨國民二世矣民北史作已康國傳太延中太延北史作大業魏書卷一百二考證
