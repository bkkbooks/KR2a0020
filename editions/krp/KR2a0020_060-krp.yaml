body:
  text: 魏書卷六十齊魏收撰列傳第四十八韓麒麟程駿韓麒麟昌黎棘城人也自云漢大司馬増之後父瑚秀容平原二郡太守麒麟幼而好學美姿容善騎射恭宗監國為東曹主書高宗即位賜爵魯陽男加伏波將軍父亡在喪有禮邦族稱之後參征南慕容白曜軍事進攻升城師人多傷及城潰白曜將坑之麒麟諌曰今始踐偽境方圖進取宜寛威厚惠以示賊人此韓信降范陽之計勍敵在前而便坑其衆恐自此以東將人各為守攻之難剋日乆師老外民乘之以生變故則三齊未易圖也白曜從之皆令復業齊人大悦後白曜表麒麟為冠軍將軍與房法壽對為冀州刺史白曜攻東陽麒麟上義租六十萬斛并攻戰器械於是軍資無乏及白曜被誅麒麟亦徴還停滯多年高祖時拜給事黄門侍郎乘傳招慰徐兖叛民歸順者四千餘家尋除冠軍將軍齊州刺史假魏昌侯麒麟在官寡於刑罰從事劉普慶説麒麟曰明公仗節方夏而無所斬戮何以示威麒麟曰刑罰所以止惡蓋不得已而用之今民不犯法何所戮乎若必湏斬斷以立威名當以卿應之普慶慙懼而退麒麟以新附之人未階臺宦士人沉抑乃表曰齊土自屬偽方歴載久遠舊州府寮動有數百自皇威開被幷職從省守宰闕任不聽土人監督竊惟新人未階朝宦州郡扄任甚少沉塞者多願言冠冕輕為去就愚謂守宰有闕宜推用豪望増置吏員廣延賢喆則華族蒙榮良才獲叙懐徳安土庶或在兹朝議從之太和十一年京都大饑麒麟表陳時務曰古先哲王經國立治積儲九稔謂之太平故躬籍千畝以勵百姓用能衣食滋茂禮敎興行逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞實百王之常軌為治之所先今京師民庶不田者多逰食之口三分居二蓋一夫不耕或受其飢況於今者動以萬計故頃年山東遭水而民有餒終今秋京都遇旱穀價踊貴實由農人不勸素無儲積故也伏惟陛下天縱欽明道高三五昧旦憂勤思恤民敝雖帝虞一日萬幾周文昃不暇食蔑以為喻上垂覆載之澤下有凍餒之人皆由有司不為明制長吏不恤其本自承平日乆豐穰積年競相矜夸遂成侈俗車服第宅奢僭無限喪葬婚娶為費實多貴富之家童妾袨服工商之族玉食錦衣農夫餔糟糠蠶婦乏短褐故令耕者日少田有荒蕪穀帛罄於府庫寶貨盈於市里衣食匱於室麗服溢於路飢寒之本實在於斯愚謂凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴賤有别民歸朴素制天下男女計口受田宰司四時巡行臺使嵗一按檢勤相勸課嚴加賞罰數年之中必有盈贍雖遇災凶免於流亡矣往年校比戸貫租賦輕少臣所統齊州租粟纔可給俸略無入倉雖於民為利而不可長乆脱有戎役或遭天災恐供給之方無所取濟可减絹布増益穀租年豐多積嵗儉出賑所謂私民之穀寄積於官官有宿積則民無荒年矣十二年春卒於官年五十六遺敕其子殯以素棺事從儉約麒麟立性恭愼恒置律令於坐傍臨終之日唯有俸絹數十匹其清貧如此贈散騎常侍安東將軍燕郡公諡曰康長子興宗字茂先好學有文才年十五受道太學後司空高允奏為祕書郎參著作事中山王叡貴寵當世闕為文遷祕書中散太和十四年冬卒贈寧遠將軍漁陽太守子子熈字元雍少自修整頗有學識弱冠未能自通侍中崔光舉子熙為清河王懌常侍遷郎中令初子熙父以爵讓弟顯宗不受子熙縁父素懐卒亦不襲及顯宗卒子熙别蒙賜爵乃以其先爵讓弟仲穆兄弟友愛如此父亡居喪有禮子熙為懌所眷遇遂闕位待其畢喪後復用及元义害懌乆不得葬子熙為之憂悴屏處田野每言王若不得復封以禮遷葬誓以終身不仕後靈太后返政以元义為尚書令解其領軍子熙與懌中大夫劉定興學官令傅靈􅋆賔客張子慎伏闕上書曰竊惟故主太傅清河王職綜樞衡位居論道盡忠貞以奉公竭心膂以事國自先皇崩殂陛下冲幼負扆當朝義同分陜宋維反常小子性若青蠅汙白點黒䜛侫是務以元义皇姨之壻權勢攸歸遂相附託規求榮利共結圖謀坐生眉眼誣告國王枉以大逆頼明明在上赫赫臨下泥漬自消玉質還潔謹案律文諸告事不實以其罪罪之維遂無罪出為大郡刑賞僭差朝野怪愕若非宋維與义為計豈得全其身命方撫千里王以權在寵家塵謗紛雜恭慎之心逾深逾厲去其本宅移住殿西闔門静守親賔阻絶于時吏部諮禀劉騰奏其弟官郡戍兼補及經内呈為王駮退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宫栲闕胡定誣王行毒含齒戴髪莫不悲惋及㑹公卿議王之罪莫不俛眉飲氣唯諮是從僕射游肇亢言厲氣發憤成疾為王致死王之忠誠欵篤節義純貞非但蘊藏胷襟實乃形於文翰搜括史傳撰顯忠録區目十篇分卷二十既欲彰忠心於萬代豈可為逆亂於一朝迄追遺志足明丹欵义籍寵姻戚恃握兵馬無君之心實懷皁白擅廢太后枉害國王生殺之柄不由陛下賞罰之詔一出於义名藩重地皆其親黨京官要任必其心腹中山王熈本興義兵不圖神器戮其大逆合門滅盡遂令元略南奔為國臣患奚康生國之猛將盡忠弃市其餘枉被屠戮者不可稱數縁此普天喪氣匝地憤傷致使朔隴猖狂歴嵗為亂荆徐蠢動職是之由昔趙高秉秦令關東鼎沸今元义執權使四方雲擾自古及今竹帛所載賊子亂臣莫此為甚開逆之始起自宋維成禍之末良由騰矣而令凶徒姦黨迭相樹置高官厚禄任情自取非但臣等痛恨終身抑為聖朝懷慙負愧以臣赤心慺慺之見宜梟諸兩觀洿其舎盧騰合斵棺斬骸沉其五族上謝天人幽隔之憤下報忠臣寃酷之痛方乃崇亞三事委以樞端所謂虎也更傅其翼朝野切齒遐邇扼腕蔓草難除去之宜盡臣歴觀曠代緬追振古當斷不斷其禍更生況义猜忍更居衡要臣中宵九歎竊以寒心實願宸鑒早為之所臣等潛伏閭閻於兹六載旦號白日夕泣星辰叩地寂寥呼天無響衞野納肝秦庭夜哭千古之痛何足相比今幸遇陛下叡聖親覽萬幾太后仁明更撫四海臣等敢詣闕披陳乞報寃毒書奏靈太后義之乃引子熙為中書舎人後遂剖騰棺賜义死尋修國史加寜朔將軍未幾除著作郎又兼司州别駕轉輔國將軍鴻臚少卿建義初兼黄門尋正子熙清白自守不交人事又少孤為叔顯宗所撫養及顯宗卒顯宗子伯華又幼子熈友愛等於同生長猶共居車馬資財隨其費用未嘗見於言色又上書求析階與伯華於是除伯華東太原太守及伯華在郡為刺史元弼所辱子熙乃泣訴朝廷肅宗詔遣按檢弼遂大見詰讓尒朱榮之擒葛榮也送至京師莊帝欲面見數之子熙以為榮既元兇自知必死恐或不遜無宜見之尒朱榮聞而大怒請罪子熙莊帝恕而不責尋加征虜將軍及邢杲之起逆詔子熙慰勞杲詐降而子熙信之還至樂陵杲復反子熙遂還坐付廷尉論以大辟恕死免官未幾兼尚書吏部郎普泰初除通直散騎常侍撫軍將軍光禄大夫尋正吏部郎出帝初還領著作郎以奉冊之故封厯城縣開國子食邑五百户又加衞將軍右光禄大夫天平初為侍讀又除國子祭酒子熙儉素安貧常好退静遷鄴之始百司並給兵力時以祭酒閑務止給二人或有令其陳請者子熙曰朝廷自不給祭酒兵何關韓子熙事也論者高之尋除驃騎將軍元象中加衛大將軍先是子熙與弟聘王氏為妻姑之女也生二子子熙尚未婚後遂與寡嫗李氏姦合而生三子王李不穆迭相告言厯年不罷子熙因此慙恨遂以發疾興和中孝静欲行釋奠敕子熙為侍講尋卒遺戒不求贈諡其子不能遵奉遂至干謁武定初贈驃騎將軍儀同三司幽州刺史興宗弟顯宗字茂親性剛直能面折庭諍亦有才學沙門法撫三齊稱其聰悟常與顯宗校試抄百餘人名各讀一遍隨即覆呼法撫猶有一二舛謬顯宗了無誤錯法撫歎曰貧道生平以來唯服郎耳太和初舉秀才對策甲科除著作佐郎車駕南討兼中書侍郎既定遷都顯宗上書其一日竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可簡并功則洛京易就往冬輿駕停鄴是閑隙之時猶編户供奉勞費為劇聖鑒矜愍優㫖殷勤爵浹高年賚周鰥寡雖賑普霑今猶恐來夏菜色況三農要時六軍雲㑹其所損業實為不少雖調斂輕省未足稱勞然大駕親臨誰敢寜息往來承奉紛紛道路田蠶暫廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生癘疫此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功専力以營洛邑則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉爾如歸其二曰自古聖帝必以儉約為美亂主必以奢侈貽患仰惟先朝皆卑宫室而致力於經略故能基宇開廣業祚隆泰今洛陽基址魏明帝所營取譏前代伏願陛下損之又損頃來北都富室競以第宅相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝渠使寺署有别四民異居永垂百世不刋之範則天下幸甚矣三曰竊聞輿駕還洛陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂況萬乘之尊富有四海乎警蹕於闑闥之内者豈以為儀容而已蓋以戒不虞也清道而後行尚恐銜蹶之或失況履渉山河而不加三思哉此愚臣之所以悚息伏願少垂省察其四曰伏惟陛下耳聽法音目翫墳典口對百辟心虞萬幾晷昃而食夜分而寢加以孝思之至隨時而深文章之業口成篇卷雖叡明所用未足為煩然非所以嗇神養性頤無疆之祚莊周有言形有待而智無涯以有待之形役無涯之智殆矣此愚臣所不安伏願陛下垂拱司契委下責成唯冕旒垂纊而天下治矣高祖頗納之顯宗又上言曰進賢求才百王之所先也前代取士必先正名故有賢良方正之稱今之州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此則可令别貢門望以叙士人何假冒秀孝之名也夫門望者是其父祖之遺烈亦何益於皇家益於時者賢才而已茍有其才雖屠釣奴虜之賤聖皇不恥以為臣茍非其才雖三后之𦙍自墜於皁𨽻矣是以大才受大官小才受小官各得其所以致雍熈議者或云今世等無竒才不若取士於門此亦失矣豈可以世無周邵便廢宰相而不置哉但當校其有寸長銖重者即先叙之則賢才無遺矣又曰夫帝皇所以居尊以御下者威也兆庶所以徙惡以從善者法也是以有國有家必以刑法為治生民之命於是而在有罪必罰罰必當辜則雖箠撻之刑而人莫敢犯也有制不行人得僥倖則雖參夷之誅不足以肅自太和以來多坐盗弃市而遠近肅清由此言之止姦在於防檢不在嚴刑也今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盗迭相敦厲遂成風俗陛下居九重之内視人如赤子百司分萬務之要遇下如仇讐是則堯舜止一人而桀紂以千百和氣不至蓋由於此書曰與其殺不辜寜失不經實宜勑示百寮以惠元元之命又曰昔周王為犬戎所逐東遷河洛鎬京猶稱宗周以存本也光武雖曰中興實自創革西京尚置京尹亦不廢舊今陛下光隆先業遷宅中土稽古復禮於斯為盛豈若周漢出於不得已哉按春秋之義有宗廟曰都無則謂之邑此不刋之典也況北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福地實亦遠矣今便同之郡國臣竊不安愚謂代京宜建畿置尹一如故事崇本重舊以光萬葉又曰伏見洛京之制居民以官位相從不依族類然官位非常有朝榮而夕悴則衣冠淪於厮豎之邑臧獲騰於膏腴之里物之顚倒或至於斯古之聖王必令四民異居者欲其業定而志專業定則不偽志專則不淫故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居伎作屠沽各有攸處但不設科禁賣買任情販貴易賤錯居混雜假令一處彈箏吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童齔任意所從其走赴舞堂者萬數往就學館者無一此則伎作不可雜居士人不宜異處之明驗也故孔父云里仁之美孟母𢎞三徒之訓賢聖明誨若此之重今令伎作家習士人風禮則百年難成令士人兒童効伎作容態則一朝可得是以士人同處則禮教易興伎作雜居則風俗難改朝廷每選舉人士則校其一㛰一宦以為升降何其密也至與開伎作宦途得與膏粱華望接閈連甍何其略也此愚臣之所惑今稽古建極光宅中區凡所徙居皆是公地分别伎作在於一言有何為疑而闕盛美又曰自南偽相承竊有淮北欲擅中華之稱且以招誘邊民故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆疑惑書記錯亂區宇非所以疆域物土必也正名之謂也愚以為可依地理舊名一皆釐革小者幷合大者分置及中州郡縣昔以户少併省今人口既多亦不可復舊君人者以天下為家不得有所私也故倉庫儲貯以俟水旱之災供軍國之用至於有功徳者然後加賜爰及末代乃寵之所隆賜賚無限自比以來亦為太過在朝諸貴受禄不輕土木被錦綺僮妾厭粱肉而復厚賚屢加動以千計若分賜鰥寡贍濟實多如不悛革豈周給不繼富之謂也愚謂事有可賞則明㫖襃揚稱事加賜以勸為善不可以親近之昵猥損天府之儲又曰諸宿衞内直者宜令武官習弓矢文官諷書傳而今給其蒲博之具以成褻狎之容長矜争之心恣諠囂之慢徒損朝儀無益事實如此之類一宜禁止高祖善之後乃啓乞宋王劉昶府諮議参軍事欲立効南境高祖不許高祖曽謂顯宗及程靈虬曰著作之任國書是司卿等之文朕自委悉中省之品卿等所聞若欲取況古人班馬之徒固自遼闊若求之當世文學之能卿等應推崔孝伯又謂顯宗曰見卿所撰燕志及在齊詩詠大勝比來之文然著述之功我所不見當更訪之監令校卿才能可居中第又謂程靈虬曰卿比顯宗復有差降可居下上顯宗對曰臣才第短淺猥聞上天至乃比於崔光實為隆渥然臣竊謂陛下貴古而賤今臣學微才短誠不敢仰希古人然遭聖明之世覩惟新之禮染翰勒素實録時事亦未慙於後人昔揚雄著太𤣥經當時不免覆盎之談二百年外則越諸子今臣之所撰雖未足光述帝載禆暉日月然萬祀之後仰觀祖宗巍巍之功上覩陛下明明之徳亦何謝欽明於唐典慎徽於虞書高祖曰假使朕無愧於虞舜卿復何如於堯臣顯宗曰臣聞君不可以獨治故設百官以贊務陛下齊蹤堯舜公卿寜非二八之儔高祖曰卿為著作僅名奉職未是良史也顯宗曰臣仰遭明時直筆而無懼又不受金安眠美食此臣優於遷固也高祖哂之後與員外郎崔逸等參定朝儀高祖曽詔諸官曰自近代已來高卑出身恒有常分朕意一以為可復以為不可宜相與量之李沖對曰未審上古已來置官列位為欲為膏粱兒地為欲益治贊時高祖曰俱欲為治沖曰若欲為治陛下今日何為專崇門品不有拔才之詔髙祖曰茍有殊人之伎不患不知然君子之門假使無當世之用者要自徳行純篤朕是以用之沖曰傅巖吕望豈可以門見舉高祖曰如此濟世者希曠代有一兩人耳沖謂諸卿士曰適欲請諸賢救之祕書令李彪曰師旅寡少未足為援意有所懐不敢盡言於聖日陛下若専以門地不審魯之三卿孰若四科高祖曰猶如向解顯宗進曰陛下光宅洛邑百禮唯新國之興否指此一選臣既學識浮淺不能援引古今以證此議且以國事論之不審中祕書監令之子必為祕書郎頃來為監令者子皆可為不高祖曰卿何不論當世膏腴為監令者顯宗曰陛下以物不可類不應以貴承貴以賤襲賤高祖曰若有高明卓爾才具雋出者朕亦不拘此例後為本州中正一十一年車駕南伐顯宗為右軍府長史征虜將軍統軍軍次赭陽蕭鸞戍主成公期遣其軍主胡松高法援等并引蠻賊來擊軍營顯宗親率拒戰遂斬法援首顯宗至新野高祖詔曰卿破賊斬帥殊益軍勢朕方攻堅城何為不作露布也顯宗曰臣頃聞鎮南將軍王肅獲賊二三驢馬數匹皆為露布臣在東觀私每哂之近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脱復高曵長縑虚張功㨗尤而效之其罪彌甚臣所以歛毫卷帛解上而已高祖笑曰如卿此勲誠合茅社湏赭陽平定檢審相酬新野平以顯宗為鎮南廣陽王嘉諮議參軍顯宗後上表頗自矜伐訴前征勲詔曰顯宗斐然成章甚可怪責進退無檢虧我清風此而不糺成長敝俗可付尚書推列以聞兼尚書張彞奏免顯宗官詔曰顯宗雖浮矯致愆才猶可用豈得永棄之也可以白衣守諮議展其後效但鄙狠之性不足參華可奪見闕并禁問訊諸王顯宗既失意遇信向洛乃為五言詩贈御史中尉李彪曰賈生謫長沙董儒詣臨江愧無若人跡忽尋兩賢踪追昔渠閣游䇿駑厠羣龍如何情願奪飃然獨遠從痛哭去舊國銜淚届新邦哀哉無援民嗷然失侣鴻彼蒼不我聞千里告志同二十三年卒顯宗撰馮氏燕志孝友傳各十卷所作文章頗傳於世景明初追赭陽勲賜爵章武男子武華襲除討㓂將軍奉朝請太原太守程駿字驎駒本廣平曲安人也六世祖良晉都水使者坐事流于涼州祖父肇吕光民部尚書駿少孤貧居喪以孝稱師事劉昞性機敏好學晝夜無倦昞謂門人曰舉一隅而以三隅反者此子亞之也駿謂昞曰今世名教之儒咸謂老莊其言虛誕不切實要弗可以經世駿意以為不然夫老子著抱一之言莊生申性本之㫖若斯者可謂至順矣人若乖一則煩偽生爽性則沖真喪昞曰卿年尚稚言若老成美哉由是聲譽益播沮渠牧犍擢為東宫侍講太延五年世祖平涼遷于京師為司徒崔浩所知文成踐阼拜著作佐郎未幾遷著作郎為任城王雲郎中令進箴於王王納而嘉之皇興中除高密太守尚書李敷奏曰夫君之使臣必湏終效駿實史才方申直筆千里之任十室可有請留之數載以成前籍後授方伯愚以為允書奏從之顯祖屢引駿與論易老之義顧謂羣臣曰朕與此人言意甚開暢又問駿曰卿年幾何對曰臣六十有一顯祖曰昔太公既老而遭文王卿今遇朕豈非早也駿曰臣雖才謝吕望而陛下尊過西伯覬天假餘年竭六韜之効延興末高麗王璉求納女於掖庭顯祖許之假駿散騎常侍賜爵安豐男加伏波將軍持節如高麗迎女賜布帛百疋駿至平壤城或勸璉曰魏昔與燕婚既而伐之由行人具其夷險故也今若送女恐不異於馮氏璉遂謬言女喪駿與璉往復經年責璉以義方璉不勝其忿遂斷駿從者酒食璉欲逼辱之憚而不敢害㑹顯祖崩乃還拜祕書令初遷神主于太廟有司奏舊事廟中執事之官例皆賜爵今宜依舊詔百寮評議羣臣咸以為宜依舊事駿獨以為不可表曰臣聞名器為帝王所貴山河為區夏之重是以漢祖有約非功不侯必當屬有命於大君之辰展心力於戰謀之日然後可以應茅土之錫未見預事於宗廟而獲賞於疆土徒見晉鄭之后以夾輔為至勲吳鄧之儔以征伐為重績周漢既無文於遠代魏晉亦靡記於往年自皇道開符乾業創統務高三五之規思隆百王之軌罰頗減古賞實増昔時因神主改祔清廟致肅而授羣司以九品之命顯執事以五等之名雖復帝王制作弗相沿襲然當時恩澤豈足為長世之軌乎乖衆之愆伏待罪譴書奏從之文明太后謂羣臣曰言事固當正直而凖古典安可依附暫時舊事乎賜駿衣一襲帛二百匹駿又表曰春秋有云見有禮於其君者若孝子之養父母見無禮於其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳恒殺君宣尼請討雖欲晏逸其得已乎今廟算天回七州雲動將水蕩鯨鯢陸掃凶逆然戰貴不陳兵家所美宜先遣劉昶招喻淮南若應聲響悦同心齊舉則長江之險可朝服而濟道成之首可崇朝而懸茍江南之輕薄背劉氏之恩義則曲在彼矣何負神明哉直義檄江南振旅囘斾亦足以示救患之大仁揚義風於四海且攻難守易則力懸百倍不可不深思不可不熟慮今天下雖謐方外猶虞拾夤僥倖於西南狂虜伺釁於漠北脱攻不稱心恐兵不卒解兵不卒解則憂慮逾深夫為社稷之計者莫不先於守本臣愚以為觀兵江滸振曜皇威宜特加撫慰秋毫無犯則民知徳信民知徳信則襁負而來襁負而來則淮北可定淮北可定則吳宼異圖宼圖異則禍釁出然後觀釁而動則不晚矣請停諸州之兵且待後舉所謂守本者也伏惟陛下太皇太后英算神規彌綸百勝之外應機體變獨悟方寸之中臣影頽虞淵昬耄將及雖思憂國終無云補不從沙門法秀謀反伏誅駿表曰臣聞詩之作也蓋以言志邇之事父遠之事君關諸風俗靡不備焉上可以頌美聖徳下可以申厚風化言之者無罪聞之者足以誡此古人用詩之本意臣以垂没之年得逢盛明之運雖復昬耄將及猶慕廉頗强飯之風伏惟陛下太皇太后道合天地明侔日月則天與唐風斯穆順帝與周道通靈是以狂妖懷逆無隱謀之地㝠靈潛翦伏發覺之誅用能七廟幽贊人神扶助者已臣不勝喜躍謹竭老鈍之思上慶國頌十六章幷序巡狩甘雨之徳焉其頌曰乾徳不言四時迭序於皇大魏則天承祜疊聖三宗重明四祖豈伊殷周遐契三五明明在上聖敬日新汪汪叡后體治垂仁徳從風穆教與化津千載昌運道隆兹辰嵗惟巡狩應運遊田省方問苦訪政高年咸秩百靈柴望山川誰云禮滯遇聖則宣王業初定中山是由臨幸之盛情特綢繆仰歌祖業俯欣春柔大哉肆眚蕩民百憂百憂既蕩與之更初邕邕億兆户詠來蘇忽有狂豎謀逆聖都明靈幽告發覺伏誅羿浞為亂祖龍干紀狂華冬茂有自來矣美哉皇度道固千祀百靈潛翦姦不遑起姦不遑起罪人得情憲章刑律五秩猶輕於穆二聖仁等春生除棄周漢遐軌犧庭周漢奚棄忿彼苛刻犧庭曷軌希仁尚徳徽音一振聲敎四塞豈惟京甸化播萬國誠信幽贊隂陽以調谷風扇夕甘雨降朝嘉生含穎深盛熙苗鰥貧巷詠寡婦室謡聞諸詩者雲漢賦宣章句逈秀英昭雅篇矧乃盛明徳隆道𤣥豈唯雨施神徴豐年豐年盛矣化無不濃有禮有樂政莫不通咨臣延躍欣詠時邕誰云易遇曠齡一逢上天無親唯徳是在思樂盛明雖疲勿怠差之毫釐千里之倍願言勞謙求仁不悔人亦有言聖主慎微五國連兵踰年厯時鹿車而運廟算失思有司不惠蠶食役煩民不堪命將家逃山宜督厥守威徳是宣威徳如何聚衆盈川民之從令實賴衣食農桑失本誰耕誰織飢寒切身易子而食静言念之實懷歎息昔聞典論非位不謀漆室憂國遺芳載臭咨臣昏老偏蒙恩祐忽忘狂瞽敢獻愚陋文明太后令曰省詩表聞之歌頌宗祖之功徳可爾當世之言何其過也所箴下章戢之不忘駿又奏得一頌始於固業終於無為十篇文多不載文明太后令曰省表幷頌十篇聞之鑒戒既備良用欽翫養老乞言其斯之謂又詔曰程駿歴官清慎言事每愜又門無俠貨之賔室有懷道之士可賜帛六百匹旌其儉徳駿悉散之親舊性介直不競時榮太和九年正月病篤乃遺令曰吾存尚儉薄豈可没為奢厚哉昔王孫躶葬有感而然士安籧篨頗亦矯厲今世既休明百度循禮彼非吾志也可歛以時服器皿從古遂卒年七十二初駿病甚高祖文明太后遣使者更問其疾敕御史徐謇診視賜以湯藥臨終詔以小子公稱為中散從子靈虬為著作佐郎及卒高祖文明太后傷惜之賜東園祕器朝服一稱帛三百匹贈冠軍將軍兖州刺史曲安侯諡曰憲所制文筆自有集録駿六子元繼公達公亮公禮並無官公義侍御史謁者僕射都水使者武昌王司馬沛郡太守公稱主文中散給事中尚書郎並早卒公禮子畿字世伯好學頗有文才荆州府主簿始駿從祖弟伯達伯達名犯顯祖廟諱與駿同年亦以文辯闕沮渠牧犍時俱選與牧犍世子參乘出入時論美之伯達早亡弟子靈虬幼孤頗有文才而久淪末役在吏職十餘年坐事免會駿臨終啓請得擢為著作佐郎後坐稱在京無緦親而高祖知其與駿子公義為始族故致譴免至洛無官貧病久之崔光啓申為羽林監選補徐州梁郡太守以酗酒為刺史武昌王鑒所劾失官既下梁郡志力少衰猶時為酒困久去官禄不免飢寒屢詣尚書乞効舊任僕射高肇領選還申為著作郎以崔光領任勑令外叙史臣曰韓麒麟以才器識用遂見記於齊王顯宗文學立已屢陳時務至於實録之功所未聞也子熙清尚自守榮過其器程駿才業未多見知於世者蓋當時之長策乎魏書卷六十魏書卷六十考證韓麒麟傳節義純貞義監本誤乂今改正豈周給不繼富之謂也給應作急魏書卷六十考證
