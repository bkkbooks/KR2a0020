body:
  text: 魏書卷四十三齊魏收撰列傳第三十一嚴稜毛脩之唐和劉休賓房法壽嚴稜馮翊臨晉人遇亂避地河南劉裕以為廣威将軍陳留太守戍倉垣泰常中山陽公奚斤南討軍至潁川稜率文武五百人詣斤降驛送稜朝太宗於冀州嘉其誠款拜平逺将軍賜爵郃陽侯假荆州刺史隨駕南討還為上客及世祖踐祚以稜歸化之功除中山太守有清廉之稱年九十卒於家子稚玉襲爵真君中詔稚玉副長安鎮将元蘭率衆一萬迎漢川附化之民入自斜谷至甘亭劉義隆梁州刺史王元載遣将拒嶮路不得通班師太和二年太倉令五年出為平南将軍東兗州刺史假馮翊公卒子曇襲爵毛脩之字敬文滎陽陽武人也父瑾司馬徳宗梁秦二州刺史劉裕之擒姚泓留子義真鎮長安以脩之為司馬及赫連屈丐破義真於青泥脩之被俘遂沒綂萬世祖平赫連昌獲脩之神䴥中以脩之領吳兵討蠕蠕大檀以功拜吳兵将軍領歩兵校尉後從世祖征平涼有功遷散騎常侍前将軍光祿大夫脩之能為南人飲食手自煎調多所適意世祖親待之進太官尚書賜爵南郡公加冠軍将軍常在太官主進御膳從討和龍别破三堡賜奴婢牛羊是時諸軍攻城宿衛之士多在戰陳行宮人少雲中鎮将朱脩之劉義隆故将也時從在軍欲率吳兵謀為大逆因入和龍冀浮海南歸以告脩之脩之不聽乃止是日無脩之大變幾作朱脩之遂亡奔馮文通又以脩之收三堡功多遷特進撫軍大将軍金紫光祿大夫位次崔浩之下浩以其中國舊門雖學不博洽而猶渉獵書傳每推重之與共論説言次遂及陳壽三國志有古良史之風其所著述文義典正皆揚于王廷之言微而顯婉而成章班史以来無及壽者脩之曰昔在蜀中聞長老言壽曾為諸葛亮門下書佐被撻百下故其論武侯云應變将畧非其所長浩乃與論曰承祚之評亮乃有故義過美之譽案其迹也不為負之非挾恨之矣何以云然夫亮之相劉備當九州鼎沸之會英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荆州退入巴蜀誘奪劉璋偽連孫氏守窮踦􅛤之地僭號邊夷之間此策之下者可與趙他為偶而以為管蕭之亞匹不亦過乎謂壽貶亮非為失實且亮既據蜀恃山嶮之固不達時宜弗量勢力嚴威切決控勒蜀人矜才負能高自矯舉欲以邊夷之衆抗衡上國出兵隴右再攻祁山一攻陳倉疎遲失會摧衂而反後入秦川不復攻城更求野戰魏人知其意閉壘堅守以不戰屈之知窮勢盡憤結攻中發病而死由是言之豈合古之善将見可而進知難而退者乎脩之謂浩言為然太延二年為外都大官卒諡曰恭公脩之在南有四子唯子法仁入國高宗初為金部尚書襲爵後轉殿中尚書加散騎常侍法仁言聲壮大至於軍旅田狩唱呼處分振於山谷和平六年卒贈征東大将軍南郡王諡曰威長子猛虎太安中為東宫主書轉中舍人又遷中散大夫初襲爵為散騎常侍皇興中蠕蠕犯塞從顯祖討之有勇決之稱太和初卒贈豫州刺史諡曰康公子泰寳襲爵征虜長史例降為侯卒子乾祐襲朱脩之者劉義隆司徒從事中郎守滑臺安頡圍之其母在家乳汁忽出母號慟告家人曰我年老非復有乳汁之時今忽如此兒必殁矣果以其日為頡所擒世祖善其固守授以内職以宗室女妻之而佞巧輕薄為人士所賤為雲中鎮将及入馮文通文通送之江南唐和字稚起晉昌宜安人也父繇以涼土喪亂民無所歸推隴西李暠於敦煌以寧一州李氏為沮渠蒙遜所滅和與兄契攜外甥李寳避難伊吾招集民衆二千餘家臣於蠕蠕蠕蠕以契為伊吾王經二十年和與契遣使來降為蠕蠕所逼遂擁部落至于高昌蠕蠕遣部帥阿若率騎討和至白力城和率騎五百先攻高昌契與阿若戰殁和收餘衆奔前部王國時沮渠安周屯橫截城和攻㧞之斬安周兄子樹又剋高寧白力二城斬其戍主遣使表状世祖嘉其誠款屢賜和和後與前部王車伊洛擊破安周斬首三百世祖遣成周公萬度歸討焉耆詔和與伊洛率所領赴度歸和奉詔㑹度歸喻下栁驢以東六城因共擊波居羅城㧞之後同征龜兹度歸令和鎮焉耆時柳驢戍主乙真伽率諸胡將據城而叛和領輕騎一百匹入其城擒乙真伽斬之由是諸胡款附西域剋平和有力也正平元年和詣闕世祖優寵之待以上客高宗以和歸誠先朝拜鎮南将軍酒泉公太安中出為濟州刺史甚有稱績徵為内都大官評決獄訟不加捶楚察疑獲實者甚多世以是稱之皇興中卒年六十七贈征西大将軍太常卿酒泉王諡曰宣子欽字孟直中書學生襲爵太和中拜鎮南将軍長安鎮副将轉陜州刺史将軍如故後降爵為侯二十年卒子景宣襲爵歴并州城陽王徽後軍府長史加中堅将軍遷東郡太守普泰中卒贈撫軍将軍秦州刺史景宣弟季弼武定中滄州别駕契子𤣥逹性果毅有父風與叔父和歸闕俱為上客拜安西将軍晉昌公顯祖時出為華州刺史将軍如故杏城民蓋平定聚衆為逆顯祖遣給事楊鍾葵擊平定不剋而還詔𤣥達討平之杏城民成赤李又聚黨自號為王逼掠郡縣殘害百姓𤣥達率騎二百邀其狹路擊破之叛民曾平原復聚為亂𤣥達追擊悉平之延興二年有罪免官太和十六年降爵為侯卒子崇字繼祖襲爵盛樂太守崇弟興業定陽闡熙二郡太守劉休賓字處幹本平原人祖昶從慕容德度河家于北海之都昌縣父奉伯劉裕時北海太守休賓少好學有文才兄弟六人乘民延和等皆有時譽休賓為劉彧虎賁中郎将稍遷幽州刺史鎮梁鄒及慕容白曜軍至升城遣人説之令降休賓不從劉彧龍驤将軍崔靈延行渤海郡房靈建等數十家皆入梁鄒同舉休賓為征虜兗州會劉彧遣使授休賓輔國将軍兗州刺史休賓妻崔邪利女也坐一男字文曄崔氏先歸寧在魯郡邪利之降也文曄母子遂與俱入國至是白曜表請崔與文曄既至白曜以報休賓又於北海執延和妻子送至梁鄒巡視城下休賓答白曜許歴城降當即歸順密遣兼主簿尹文達向歴城觀國軍形勢文達詣白曜詐言聞王臨境故來祗候私謂白曜曰劉休賓父子兄弟累郡連州今若識運知機束手歸化不審明王加何賞敘白曜曰休賓仕南爵寵如此今若不勞兵甲望風自降者非直處卿富貴兼還其婦兒休賓縱令不畏攻圍豈不憐其妻子也今升城卿自徃見文達乃至升城見休賓妻子文曄攀援文逹哭泣號咷以爪髮為信文逹回還復經白曜誓約而去白曜曰卿是休賓耳目腹心親見其妻子又知我衆旅少多善共量議自求多福文逹還見休賓出其妻兒爪髪兼宣白曜所言及國軍形勢謂休賓曰升城已敗歴城非朝則夕公可早圖之休賓撫爪髮泣涕曰妻子幽隔誰不愍乎吾荷南朝厚恩受寄邊任今顧妻子而降於臣節足乎然而密與其兄子聞慰議為降計聞慰曰此故當文逹誑詐耳年常抄掠豈有多軍也但可撫彊兵勤肅衛方城狹嶮何為便生憂怯示人以弱也休賓又謂文逹曰卿勿憚危苦更為吾作一返善觀形勢於是遣文逹偷道而出令與白曜為期剋日許送降欵文逹既至白曜喜曰非直休賓父子荷榮城内賢豪亦隨人補授卿便即為梁鄒城主以酒灌地啟告山河曰若負休賓使我三軍覆没初白曜之表取休賓妻子也顯祖以道固既叛詔授休賓持節平南将軍冀州刺史平原公至是付文逹詔䇿文達還謂休賓曰白曜信誓如此公可早為決計恐攻逼之後降悔無由休賓於是告兄子聞慰曰事勢可知汝早作降書聞慰沉疑因執不作遂差本契白曜尋遣著作佐郎許赤虎夜至梁鄒南門下告城上人曰汝語劉休賓何由遣文逹頻造僕射許送降文歸誠大化何得無信違期不來於是門人唱告城内悉知遂相維持欲降不得皆云劉休賓父子欲以我城内人易榮位也尋被攻逼經冬至春歴城降白曜遣道固子景業與文曄至城下休賓知道固降乃出請命白曜送休賓及宿有名望者十餘人俱入代都為客及立平齊郡乃以梁鄒民為懷寧縣休賓為縣令延興二年卒文曄有志尚綜覽羣書輕財重義太和中坐從兄聞慰南叛與二弟文顥季友被徙北邊高祖特聽還代高祖曾幸方山文曄大言於路側曰求見聖明申宣久屈高祖遣尚書李沖宣詔問曰卿欲何言聽卿面自申盡於是引見文曄對曰臣之陋族出自平原徃因燕亂流離河表居齊以来八九十載真君十一年世祖太武皇帝廵江之日時年二歲隨外祖魯郡太守崔邪利於鄒山歸國邪利蒙賜四品除廣寗太守以臣年小不及齒錄至天安之初皇威逺被臣亡父休賓劉氏持節兗州刺史戍梁鄒時慕容白曜以臣父居全齊之要水陸道衝青冀二城往來要路三城岳跱竝拒王師白曜知臣母子先在代京表請臣母子慰勞臣即被先帝詔遣乘傳詣軍又賜亡父官爵白曜遣右司馬盧河内等送臣母子至鄒臣既見亡父備申皇澤云吾蒙本朝寵遇捍禦藩屏尊卑百口竝在二城吾若先降百口必被誅滅既不固誠於本朝又令尊卑塗炭豈堪為人臣以奉大魏乎汝且申吾意白僕射降意已判平歴城即率士衆送欵軍前既剋歴城白曜遣赤虎送臣并崔道固子景業等向梁鄒亡父既見赤虎之信仰感聖朝逺遣妻子又知天命有歸擁衆一萬以城降欵乘驛赴臺蒙為客例臣私釁深重亡父以延興二年孤背明世血誠微心未獲申展如臣等比竝蒙榮爵為在事孤抑以人廢勲高祖曰卿訴父賞而卿父無勲歴城齊之西關歸命請順梁鄒小戍豈能獲全何足以為功也文曄對曰誠如聖㫖愚臣所見猶有未申何者昔樂毅破齊七十餘城唯有即墨獨在此豈非根亡而條立且夫降順之人驗之古今未有不由危逼者故黄權無路歸欵列地封侯且薛安都畢衆敬危急投命竝受茅土之爵論古則如彼語今則如此明明之世不及比流竊惟梁鄒嚴固地據中齊粟攴十載控弦數千萬方之升城不可同日而語升城猶能抗兵累旬傷殺甚衆若臣亡父固守孤城則非一朝可剋高祖曰歴城既陷梁鄒便是掌中何煩兵力對曰若如聖㫖白曜便應窮兵極意取勝俯仰何為上假赤虎之信下衒知變之民高祖曰卿父此勲本自至少以卿才地豈假殷勤對曰臣尫愚六蔽文武無施響絶九臯聞天無日遭逢聖運萬死猶生但臣竊見徐兗是賊藩要徐兗既降諸戍皆應國有而東徐州刺史張讜所戍團城領二郡而已徐兗降後猶閉門拒命授以方嶽始乃歸降父子二人竝蒙侯爵論功比勤不先臣父高祖曰卿引張讜讜事小異對曰臣未識異状高祖曰張讜始来送欵終不差信卿父進非先覺退又拒守何得不異對曰張讜父子始有歸順之名後有閉門之罪以功補過免罪為幸臣又見崔僧祐母弟隨其叔父道固在歴城僧祐遙聞王威逺及恐母弟淪亡督率鄉閭來欲救援既至郁洲歴城已沒束手歸誠救母弟之命聖朝嘉其附化賞以三品亡父之誠豈後僧祐高祖曰僧祐身居東海去留任意來則有位去則他人是故賞之卿父被圍孤城已是已物所以不賞對曰亡父據城歸國至公也僧祐意計而來為私也為私蒙賞至公不酬臣未見其可高祖笑而不言比部尚書陸叡叱文曄曰假令先朝謬賞僧祐豈可謬相賞也文曄曰先帝中代聖主與日月等曜比隆堯舜宰相則十亂五臣今言謬賞豈不仰誣先朝乎尚書高閭曰卿謂母弟與妻子何者為重文曄曰母弟為重閭曰卿知母弟為重朝廷賞僧祐是也卿父為妻子而來事何相反對曰僧祐若無母弟來歸以不閭曰不來文曄曰若僧祐赴母弟之難此是其私而亡父本為大丈夫立身處世豈可顧妻子而虧高節也昔樂羊食子有顧以不亡父本心實不垂顧所以歸化者自知商周不敵天命有所歸高祖謂文曄曰卿之所許頗亦有途賞從重罰從輕尋勅酬叙文曄泣曰臣愚頓理極再見無期陛下既垂慈澤願勅有司特賜矜理高祖曰王者無戲何得懃懃既而賜文曄爵都昌子深見待遇拜協律郎中改授羽林監世宗世除高陽太守延昌中卒贈平逺将軍光州刺史諡曰貞子元襲拜員外郎襄威將軍青州别駕卒文顥性仁孝篤厚徐州安豊王府騎兵參軍季友南青州左軍府錄事參軍聞慰博識有才思至延興中南叛休賓叔父旋之其妻許氏二子法鳯法武而旋之早亡東陽平許氏攜二子入國孤貧不自立竝疎薄不淪為時人所棄母子皆出家為尼既而反俗太和中高祖選盡物望河南人士才學之徒咸見申擢法鳯兄弟無可收用不蒙選授後俱奔南法武後改名孝標云房法壽小名烏頭清河繹幕人也幼孤少好射獵輕率勇果結羣小而為劫盜從叔元慶範鎮等坐法壽被州郡切責時月相繼宗族甚患之弱冠州迎主簿後以母老不復應州郡之命常盜殺䐗牛以供其母招集壮士常有百數母亡歲餘遇沈文秀崔道固起兵應劉子勛明僧暠劉乘民起兵應劉彧攻討文秀法壽亦與清河太守王元邈起兵西屯合討道固元邈以法壽為司馬累破道固軍甚為歴城所憚加法壽綏邊将軍魏郡太守子勛死道固文秀悉復歸彧乃罷兵道固慮其扇亂百姓遂切遣之而法壽外託裝辦而内不欲行㑹從弟崇吉在升城為慕容白曜所破母妻沒於白曜軍崇吉奔還舊宅法壽與崇吉年志粗相諧協而親則從祖兄弟也崇吉以母妻見獲託法壽為計法夀既不欲南行恨道固逼切又矜崇吉情理時道固以兼治中房靈賓督清河廣川郡事戍盤陽法壽遂與崇吉潛謀襲靈賓克之仍歸款於白曜以贖母妻白曜遣将軍長孫觀等自大山南入馬耳關以赴盤陽還崇吉母妻初道固遣軍圍盤陽法壽等拒守二十餘日觀軍至賊乃散走觀軍入城詔以法壽為平逺将軍與韓騏驎對為冀州刺史督上租糧以法壽從父弟靈民為清河太守思順為濟南太守靈悦為平原太守伯憐為廣川太守叔玉為高陽太守叔玉兄伯玉為河間太守伯玉從父弟思安為樂陵太守思安弟幼安為高密太守以安初附及歴城梁鄒降法壽崇吉等與崔道固劉休賓俱至京師以法夀為上客崇吉為次客崔劉為下客法壽供給亞於安都等以功賜爵壮武侯加平逺将軍給以田宅奴婢性好酒愛施親舊賓客率同飢飽坎壈常不豐足畢衆敬等皆尚其通愛太和中卒贈平東将軍青州刺史諡敬侯子伯祖襲例降為伯歴齊郡内史伯祖闇弱委事於功曹張僧皓僧皓大有受納伯祖衣食不充後廣陵王羽為青州伯祖為從事郎中平原相轉幽州轉國長史坐公事免官卒子翼襲宣威将軍大城戍主永安中青州太傅開府從事中郎伯祖弟叔祖别以功賜爵魏昌子歴廣陵王國郎中令長廣東萊二郡太守龍驤将軍中散大夫永安中安東将軍郢州刺史叔祖弟幼愍安豐新蔡二郡太守坐事奪官居家忽聞有客聲出無所見還至庭中為家羣犬所噬遂卒初長孫觀之将至盤陽也城中稍以震懼時劉彧給事中崔平仲欲歸江南自歴下至圍城軍中與十餘騎遙共法壽語靈賓密遣人捕執之始法壽克盤陽之後常禁靈賓於别齋既得平仲引與同室致酒食叙國軍明将入意夜中北城上縋出平仲靈賓等十餘人厥明官軍至城靈賓遂歸梁鄒靈賓文藻不如兄靈建而辯悟過之靈建在南官至州治中渤海太守以才名見稱兄弟俱入國為平齊民雖流漂屯圯操尚卓然竝卒於平齊靈建子宣明亦文學著稱雅有父風高祖擢為中書博士遷洛轉議郎試守東清河郡正始中京兆王愉出除征東冀州以宣明為記室參軍愉反逼宣明為太守靈賓從父弟堅字千秋少有才名亦内徙為平齊民太和初高祖擢為袐書郎遷司空諮議齊州大中正高祖臨朝令諸州中正各舉所知千秋與幽州中正陽尼各舉其子高祖曰昔有一祁名垂往史今有二奚當聞來牒出為濮陽太守世宗時復為司空諮議加立忠将軍卒贈南青州刺史諡曰懿長子祖淵羽林監從章武王融討葛榮沒於陳贈安東将軍濟州刺史祖淵弟祖皓長水校尉後討蕭衍将於九山戰殁贈撫軍将軍兗州刺史崔平仲自東陽南奔妻子於歴城入國太和中髙祖聽其還南思安有勇力伯玉果敢有将畧思安賜爵西安子建威将軍北平太守遷大司馬司馬齊州武昌王府司馬高祖南伐徵為歩兵校尉直閤将軍中綂軍善撫士衆高祖嘉之漢陽既平復為武昌王司馬帶東魏郡太守加寧朔将軍改爵清河子卒官子敬寳襲爵敬寳亦壮健奉朝請征北中兵參軍北征綂軍寧逺府軍每有戰功早卒子去病襲伯玉坐弟叔玉南奔徙於北邊後亦南叛為蕭鸞南陽太守高祖南伐剋宛外城命舍人公孫延景宣詔於伯玉曰天無二日土無兩王是以躬總六師蕩一四海宛城小戍豈足以禦抗王威深可三思封侯胙土事在俯仰伯玉對曰外臣荷國厚恩奉任彊境為臣之道未敢聽命伏惟遊鑾逺渉願不損神高祖又遣謂曰朕親率麾斾逺清江沔此之小戍豈足徘徊王師但戎輅所經纖介須殄宜量力三思自求多福且卿早蒙蕭賾殊常之眷曾不懐恩報以塵露蕭鸞妄言入繼道成賾子無孑遺卿不能建忠於前君方立節於逆豎卿之罪一又頃年傷我偏師卿之罪二今鑾斾親戎清一南服不先面縛待罪麾下卿之罪三卿之此戍多則一年中則百日少則三旬剋殄豈逺宜善思之後悔無及伯玉對曰昔蒙武帝愷悌之恩忝侍左右此之厚遇無忘夙夜但繼主失德民望有歸主上龍飛踐極光紹太宗非直副億兆之深望實兼武皇之遺勅是以懃懃懇懇不敢失墜往者北師深入宼擾邊民輒厲将士以救蒼生此乃邊戍常事陛下不得垂責及剋宛伯玉面縛而降高祖引見伯玉并其參佐二百人詔伯玉曰朕承天馭宇方欲清一寰域卿蕞爾小戍敢拒六師卿之愆罪理在不赦伯玉對曰臣既小人備荷驅使緣百口在南致拒皇畧罪合萬死高祖曰凡立忠抱節皆應有所至若奉逆君守迷節古人所不為卿何得事逆賊蕭鸞自貽伊譴伯玉對曰臣愚癡晚悟罪合萬斬今遭陛下願乞生命高祖曰凡人惟有兩途知機獲福背機受禍勞我王師彌歴嵗月如此為降何人有罪且朕前遣舎人公孫廷景城西共卿語云天無二日土無二王卿答云在此不在彼天道攸逺變化無方卿寧知今日在此不在彼乎伯玉乞命而已更無所言高祖以思安頻為伯玉泣請故特宥之伯玉在南之日放妾楊氏為尼入國遂令還俗復愛幸焉為有司所奏高宗聽之世宗即位拜長史兼游擊将軍出為馮翊相卒官崇吉少驍勇為沈文秀中兵參軍及太原戍守傅靈越率衆棄郡南赴子勛文秀以崇吉督郡事既而背文秀同於劉彧母叔在歴城為崔道固所拘繫又将致刑於市以恐之而崇吉卒無所顧㑹道固歸彧乃出其母彧以崇吉為龍驤将軍并州刺史領太原太守戍升城崇吉以其從兄靈獻為長史姨兄賈延年為司馬未幾而白曜軍至白曜遣人招之崇吉不降遂閉門固守升城至小人力不多勝仗者不過七百人而白曜侮之乃遣衆陵城崇吉設土蕇方梁下相舂擊不時剋殄白曜遂築長城圍三重更造攻具日夜攻擊自二月至四月糧矢俱盡崇吉突圍出走遁藏民舎母妻見獲道固遣治中房靈賓慰引之崇吉不肯見道固遂東歸舊村隂募壮士欲以偷母還奔河南白曜慮其如此守備嚴固後與法壽取盤陽俱降及立平齊郡以歴城民為歸安縣崇吉為縣令頗懐昔憾與道固接事意甚不平後委縣出臺訟道固罪状數條會赦不問崇吉乞解縣許之停京師半歲乃南奔崇吉夫婦異路剃髪為沙門改名僧逹投其族叔法延住歲餘清河張畧之亦豪俠士也崇吉遺其金帛得以自遣妻從幽州南出亦得相會崇吉至江東尋病死崇吉從父弟三益字敬安於南陽内附高祖與語善之曰三益了了殊不惡拜員外散騎侍郎尋出為太山太守遷兗州左軍府司馬所在以清和著稱還除左将軍正光中卒年六十三九子長子士隆興和中東清河太守帶盤陽鎮将士隆弟士逹少有才氣其族兄景先有鑒識每曰此兒俶儻終當大其門户起家濟州左将軍府倉曹參軍時京兆王繼為大將軍出鎮關右聞其名徵補騎兵參軍領帳内綂軍孝昌中其鄉人劉蒼生劉鈞房須等作亂攻陷郡縣頻敗州軍時士達父憂在家刺史元欣欲逼其為将士達以禮固辭欣乃命其友人馮元興謂之曰今合境從逆賊徒轉熾若萬一陷州君家豈得獨全既急病如此安得顧名教也士逹不得已而起率州郭之人二千餘人東西討擊悉破平之武泰初就家拜平原太守抑挫豪彊境内肅然時邢杲寇亂憚其威名越郡城西度不敢攻逼永安末轉濟南太守士逹不入京師而頻為夲州郡時人榮之永安末尒朱兆入洛刺史蕭贊為城民趙洛周所逐城内無主洛周等以士逹鄉情所歸乃就郡請之命攝州事永熙二年卒年三十八時人傷惜之贈平東将軍齊州刺史諡曰武士逹弟士素武定末太尉諮議參軍士素弟士章尚書郎法夀族子景伯字長暉高祖諶避地渡河居於齊州之東清河繹幕焉祖元慶仕劉駿歴七郡太守後為沈文秀青州建威府司馬劉彧之殺子業自立也子業弟子勛起兵攻之文秀遣其将劉珍之率兵助彧後背彧歸于子勛元慶不同為文秀所害父愛親率勒鄉部攻文秀劉彧嘉之起家授龍驤将軍尋會文秀降彧乃止顯祖時三齊平隨例内徙為平齊民以父非命疏服終身景伯生於桑乾少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李沖沖時典選拔為奉朝請司空祭酒給事中尚書儀曹郎除齊州輔國長史值刺史死勅行州事政存寛簡百姓安之後値清河太守杜昶外叛郡居山嶮盜賊羣起除清河太守郡民劉簡虎曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣捕擒之即署其子為西曹掾命喻山賊賊以景伯不念舊惡一時俱下論者稱之舊守令六年為限限滿将代郡民韓靈和等三百餘人表訴乞留復加二載後遷太尉中郎司徒諮議參軍輔國将軍司空長史以母疾去官景伯性淳和渉獵經史諸弟宗之如事嚴親及弟妓亡蔬食終喪朞不内御憂毁之容有如居重其次弟景先亡其幼弟景逺朞年哭臨亦不内寢鄉里為之語曰有義有禮房家兄弟廷尉卿崔光韶好標牓人物無所推尚每云景伯有士大夫之行業及母亡景伯居喪不食鹽菜因此遂為水病積年不愈孝昌三年卒于家時年五十贈左将軍齊州刺史子文烈武定中尚書三公郎中景先字光胄幼孤貧無資從師其母自授毛詩曲禮年十二請其母曰豈可使兄傭賃以供景先也請自求衣然後就學母哀其小不許苦請從之遂得一羊裘忻然自足晝則樵蘇夜誦經史自是精勤遂大通贍太和中例得還鄉郡辟功曹州舉秀才値州将卒不得對策解褐太學博士時太常劉芳侍中崔光當世儒宗歎其精博光遂奏兼著作佐郎修國史尋除司徒祭酒員外郎侍中穆紹又啟景先撰世宗起居注累遷歩兵校尉領尚書郎齊州中正所歴皆有當官之稱景先沉敏方正事兄恭謹出告反面晨昬參省側立移時兄亦危坐相敬如對賓客兄會寢疾景先侍湯藥衣冠不解形容毁瘁親友見者莫不哀之神龜元年蕭衍龍驤将軍田甲能據東義陽城内屬勅景先為行臺發二荆兵以援之在軍遇疾而還其年卒於家時年四十三贈持節冠軍将軍洛州刺史諡曰文景先作五經疑問百餘篇其言該典今行於時文多略舉其切於世教者問王者受命木火相生曰五精代感稟靈者興金德方隆禎發華渚水運告昌瑤光啟祚人道承天天理應實受謝既彰𤣥命若契相生之義有允不違至如湯武革命殺伐是用水火為次遵而不改既事乖代終而數同納麓逆順且殊禎運宜異而兆徵不差有疑符應問禹以鮌配天舜不尊父曰明明在上下土是冒道高者負扆四方神積者郊原斯主是以則天不能私其子紹堯不敢尊其父鮌既罪彰於山川受殛於羽裔化質與鱗甲為羣銘精不能上乘箕尾而厚尊配於國陽當升煙之大禮茍存及躬以亂祀典降上帝為罪鬼之賓奏夾鍾為介蟲之樂奉天之道不乃有淪乎問湯尊稷廢柱曰神積道存異世同尊列山見享綿紀前代成湯革命承天當愆陽之運不思理數之有時黜元功於百世且畢箕感應風雨異徵尊播殖之靈而邀滂澍之潤升廢之道無乃謬與若柱不合薦虞夏應失之於前如以歲久宜遷百神可計日而代求之二三未究往㫖問湯尅桀欲遷夏社為不可武王滅紂以亳社為亡國之誡曰神無定方唯人為主道協無為天地是依棄德弗崇百靈更祀周武承天禮存咸秩升后稷當四圭之尊貶土祇隔牲幣之享就如言之稷稟靈威誠允聿追之宜社非商祖孝孚乃考之咎殷鑒致誡何獨在斯問易著革命之爻而無揖讓之象曰𤣥黃剖別人道為尊含靈佇化故義始元首是以飛龍啟徵大人載就及理運相推帝圖異序虞賓以為善終順守有慙未盡不顯揖讓之象而著已日之美豈可兆巨釁為貽厥之謀訓萬世而開安忍之闕一字求之反衷未識理恕問周禮秋官司烜氏邦若屋誅為明竁焉曰王道貴産法理尚恩舊徳見食八象載其美五宥三刺禮經寳其仁是以祿父巨釁殷禮不輟三監亂徳蔡𦙍猶存罪莫極於無上逆莫甚於違天行大辟禍不及族理正刑愆止於身何惡當參夷之禍何戾受淪殄之辜問儀禮繼母出嫁從為之服傳云貴終其恩曰繼母配父本非天屬與尊合德名義以興兼鞠育有加禮服是重既體違義盡棄節毁慈作嬪異門為鬼他族神道不全何終恩之有方齊服是追哭於野次茍存降重無乃過猶不及乎問禮記生不及祖父母父母税喪已則否曰服以恩制禮由義立慈母三年孫無緦葛者以戚非天屬報養止身祖雖異域恩不及已但正體於下可無服乎且縞冠𤣥武子姓之服縓練之後纕絰已除猶懷惨素未忍從吉況斬焉初之創巨方始復弔之賓尚改緇襲奉哀苦次而無追變孝子孝孫豈天理是與問左氏傳齊人殺哀姜君子以為不可曰受醮從天人倫所重保育異宗承奉郊奠而乃肆極昬淫禍傾合巹之尊怙亂無終殄滅誕鞠之愛齊桓匡翼四方正存刑矩割不忍之恩行至公之法方生貶違以殺為甚而神道幽黙禍降未期雖窮勃履朝臣不宜糾既事反人靈咎将有所施之取衷孰為優允問公羊傳王者之後郊天曰神不謬享帝無妄尊介丘偏祀猶不歆季氏之旅昊天至重豈可納廢饗之䖍唐虞已往事無斯典三后已降始見其文揖讓之胄禮不上通昬瘉後燼四圭是主此便至道相承乾無二綂純風既詖𤣥牡肆尊禮不虛革庶昭異聞問穀梁傳魯僖三十一年夏四月卜郊不從乃免牲傳曰乃者亡乎人之辭也曰樂以觀風禮為教本其細已甚民不堪命齊不加兵屈於周典僖公魯之盛君告誡䖍祀穆卜迎吉而休徵不至若推咎於天則神不棄鑒歸愆於人則頌聲宜替既命龜失辰靈威弗眷郊享不從配天斯缺即傳所言殆非虛美何承而制問尚書𦙍征羲和詰其罪乃季秋月朔辰弗合於房曰衡紀不移日月有度炎涼啟辰次舍無代履端屢臻歸餘成閏是以爰命羲和升準徂節使晷數應時火流協運致望舒後律耀靈爽次即官闕永容可為愆𤣥象一差未成巨戾且杪秋豈回星之辰授衣非合璧之月叙食弗當積失加誅律度暫差便遘殄絶仁者之兵義不妄興王赫斯舉将有異説問毛詩十月之交朔日辛卯日有食之亦孔之醜曰日月次周行舍有常分至之候不為愆咎今同之辰而為深戾者專以金木相殘指日成釁推歩不一容可如之若讁見正陽日維戊午生育相因猶子歸母但以陰陽得無深忌乎若為忌也朔亦應為災如不忌也卒卯豈獨成醜且舉凡之始以屬月時繋之在日有爽明例義不妄構理用何依問論語河不出圗泣麟自傷曰聖人稟靈天地資識未形齊生死於一同等榮辱於彼我孔子自生不辰從心告齒樂正既修素王斯著方興吾已之歎結反袂之悲進渉無上之心退深負杖之懼聖逹之理無乃缺如符璽郎王神貴答之名為辯疑合成十卷亦有可觀前廢帝時奏上之帝親自執卷與神貴往復嘉其用心特除神貴子鴻彥為奉朝請景先子延祐武定末太子家令景遠字叔遐重然諾好施與頻歲凶儉分贍宗親又於通衢以食餓者存濟甚衆平原劉郁行經齊兗之境忽遇劫賊已殺十餘人次至郁郁呼曰與君鄉近何忍見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是景逺小字賊曰我食其粥得活何得殺其親遂還衣服蒙活者二十餘人景逺好史傳不為章句天性小急不類家風然事二兄至謹撫養兄孤恩訓甚篤益州刺史傅豎眼慕其名義啟為昭武府功曹參軍以母老不應豎眼頗恨之卒於家子敬道永熙中開府參軍事史臣曰嚴稜夙款可嘉脩之晚有誠効唐和萬里慕義歸身著績休賓窮而委質法壽伯玉末能投命景伯兄弟儒風雅業良可稱焉魏書卷四十三魏書卷四十三考證劉休賓傳母子皆出家為尼北史母子皆出家為尼僧此少僧字房法壽傳法壽族子景伯字長暉長北史作良魏書卷四十三考證
