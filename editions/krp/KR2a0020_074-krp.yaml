body:
  text: 魏書卷七十四齊魏收撰列傳第六十二尒朱榮尒朱榮字天寳北秀容人也其先居於尒朱川因為氏焉常領部落世為酋帥髙祖羽健登國初為領民酋長率契胡武士千七百人從駕平晉陽定中山論功拜散騎常侍以居秀容川詔割方三百里封之長為世業太祖初以南秀容川原沃衍欲令居之羽健曰臣家世奉國給侍左右北秀容既在剗内差近京師豈以沃塉更遷逺地太祖許之所居之處曽有狗䑛地因而穿之得甘泉焉至今名狗舐泉羽健世祖時卒曽祖鬱德祖代勤繼為領民酋長代勤世祖敬哀皇后之舅以外親兼數征伐有功給復百年除立義将軍曽圍山而獵部民射獸誤中其髀代勤仍令拔箭竟不推問曰此既過誤何忍加罪部内聞之咸感其意髙宗末假寧南将軍除肆州刺史髙祖賜爵梁郡公以老致仕嵗賜帛百匹以為常年九十一卒賜帛五百匹布二百匹贈鎮南将軍并州刺史諡曰荘孝荘初榮有翼戴之勳追贈太師司徒公錄尚書事父新興太和中繼為酋長家世豪擅財貨豐嬴曽行馬羣見一白蛇頭有兩角遊於馬前新興異之謂曰爾若有神令我畜牧蕃息自是之後日覺滋盛牛羊駝馬色别為羣谷量而已朝廷每有征討輒獻私馬兼備資糧助裨軍用髙祖嘉之除右将軍光祿大夫及遷洛後特聽冬朝京師夏歸部落每入朝諸王公朝貴競以珍翫遺之新興亦報以名馬轉散騎常侍平北将軍秀容第一領民酋長新興每春秋二時恒與妻子閱畜牧於川澤射獵自娱肅宗世以年老啓求𫝊爵於榮朝廷許之正光中卒年七十四贈散騎常侍平北将軍恒州刺史諡曰簡孝荘初贈假黄鉞侍中太師相國西河郡王榮絜白美容貎幼而神機明決及長好射獵每設圍誓衆便為軍陳之法號令嚴肅衆莫敢犯秀容界有池三所在髙山之上清深不測相傳曰祁連池魏言天池也父新興曽與榮遊池上忽聞簫皷之音新興謂榮曰古老相傳凡聞此聲皆至公輔吾今年已衰暮當為汝耳汝其勉之榮襲爵後除直寝游擊将軍正光中四方兵起遂散畜牧招合義勇給其衣馬蠕蠕主阿那瓌宼掠北鄙詔假榮節冠軍将軍别将𨽻都督李崇北征榮率其新部四千人追擊度磧不及而還秀容内附胡民乞扶莫于破郡殺太守南秀容牧子萬子乞真反叛殺太僕卿陸延并州牧子素和婆崘嶮作逆榮並前後討平之遷直閤将軍冠軍将軍仍别将内附叛胡乞歩落堅胡劉阿如等作亂𤓰肆勅勒北列歩若反於沃陽榮並滅之以功封安平縣開國侯食邑一千户㝷加通直散騎常侍勅勒解律洛陽作逆桑乾西與費也頭牧子迭相掎角榮率騎破洛陽於深井逐牧子於河西進號平北将軍光祿大夫假安北将軍為北道都督㝷除武衛将軍俄加使持節安北将軍都督恒朔討虜諸軍假撫軍将軍進封博陵郡公増邑五百戸其梁郡前爵聽賜第二子時榮率衆至肆州刺史尉慶賔畏惡之閉城不納榮怒攻㧞之乃署其從叔羽生為刺史執慶賔於秀容自是榮兵威漸盛朝廷亦不能罪責也㝷除鎮北将軍鮮于修禮之反也榮表東討復進號征東将軍右衛将軍假車騎将軍都督并肆汾廣恒雲六州諸軍事進為大都督加金紫光祿大夫時杜洛周陷中山於時車駕聲将北討以榮為左軍不行及葛榮吞洛周凶勢轉盛榮恐其南逼鄴城表求遣騎三千東援相州肅宗不許又遷車騎将軍右光祿大夫㝷進位儀同三司榮以山東賊盛慮其西逸乃遣兵固守滏口以防之復上書曰臣前以二州頻反大軍喪敗河北無援實慮南侵故令精騎三千出援相州京師影響斷其南望賊聞此衆當亦息圖使還奉勑云念生裊勠寳夤受擒醜奴明逹並送誠款三輔告謐闗隴載寧費穆虎旅大翦妖蠻兩絳狂蜀漸已稽顙又承北海王顥率衆二萬出鎮相州北海皇孫名位崇重鎮撫鄴城實副羣望惟願廣其配衣及機早遣今闗西雖平兵未可役山南隣賊理無發召王師雖衆頻被摧北人情危怯實謂難用若不更思方略無以萬全如臣愚量蠕蠕主阿那瓌荷國厚恩未應忘報求乞一使慰喻那瓌即遣發兵東引直趣下口揚威振武以躡其背北海之軍鎮撫相部嚴加警備以當其前臣麾下雖少輒盡力命自井陘以北隘口以西分防險要攻其肘腋葛榮雖并洛周威恩未著人類差異形勢可分於是榮遂嚴勒部曲廣召義勇北捍馬邑東塞井陘㝷屬肅宗崩事出倉卒榮聞之大怒謂鄭儼徐紇為之與元天穆等密議稱兵入匡朝廷討定之乃抗表曰伏承大行皇帝背棄萬方奉諱號踴五内摧剝仰㝷詔㫖實用驚惋今海内草草異口一言皆云大行皇帝鴆毒致禍臣等外聽訟言内自追測去月二十五日聖體康悆至於二十六日奄忽昇遐卽事觀望實有所惑且天子寝疾侍臣不離左右親貴名醫瞻仰患状面奉音㫖親承顧託豈容不豫初不召醫崩棄曽無親奉欲使天下不為恠愕四海不為喪氣豈可得乎復皇后女生稱為儲兩疑惑朝野虛行慶宥宗廟之靈見欺兆民之望已失使七百危於累卵社稷墜於一朝方選君嬰孩之中寄治乳抱之日使姦豎專朝賊臣亂紀惟欲指影以行權假形而弄詔此則掩眼捕雀塞耳盜鐘今泰隴塵飛趙魏霧合寳夤醜奴勢逼豳雍葛榮就德憑陵河海楚兵吴卒密邇在郊古人有言邦之不臧隣之福也一旦聞此誰不闚𨵦竊惟大行皇帝聖德馭宇繼體正君猶邊烽迭舉妖宼不滅况今從佞臣之計随親戚之談舉潘嬪之女以誑百姓奉未言之兒而臨四海欲使海内安乂愚臣所未聞也伏願留聖善之慈回須臾之慮照臣忠誠錄臣至款聽臣赴闕預參大議問侍臣帝崩之由訪禁旅不知之状以徐鄭之徒付之司敗雪同天之恥謝遠近之怨然後更召宗親推其年德聲副遐邇改承寶祚則四海更蘇百姓幸甚於是遂勒所統将赴京師靈太后甚懼詔以李神軌為大都督将於大行杜防榮抗表之始遣從子天光親信奚毅及倉頭王相入洛與從弟世隆密議廢立天光乃見荘帝具論榮心帝許之天光等還北榮發晉陽猶疑所立乃以銅鑄髙祖及咸陽王禧等六王子孫像成者當奉為主惟荘帝獨就師次河内重遣王相密來奉迎帝與兄彭城王劭弟始平王子正於髙渚濳渡以赴之榮軍将士咸稱萬嵗於時武泰元年四月九日也十一日榮奉帝為主詔以榮為使持節侍中都督中外諸軍事大将軍開府兼尚書令領軍将軍領左右太原王食邑二萬户十二日百官皆朝於行宮十三日榮惑武衛将軍費穆之説乃引迎駕百官於行宫西北云欲祭天朝士既集列騎圍遶責天下喪亂明帝卒崩之由云皆緣此等貪虐不相匡弼所致因縱兵亂害王公卿士皆斂手就戮死者千三百餘人皇弟皇兄並亦見害靈太后少主其日暴崩榮遂有大志令御史趙元則造禪文遣數十人遷帝於河橋至夜四更中復奉帝南還營幕帝憂憤無計乃令人喻㫖於榮曰帝王迭襲盛衰無常旣屬屯運四方瓦解将軍仗義而起前無横陳此乃天意非人力也我本相投規存性命帝王重位豈敢妄希直是将軍見逼權順所請耳今璽運已移天命有在宜時即尊號将軍必若推而不居存魏社稷亦任更擇親賢共相輔戴榮旣有異圖遂鑄金為已像數四不成時幽州人劉靈助善卜占為榮所信言天時人事必不可爾榮亦精神恍惚不自支持乆而方悟遂便愧悔於是獻武王榮外兵參軍司馬子如等切諫陳不可之理榮曰愆誤若是惟當以死謝朝廷今日安危之機計将何出獻武王等曰未若還奉長樂以安天下於是還奉荘帝十四日輿駕入宮于時或云榮欲遷都晉陽或云欲肆兵大掠迭相驚恐人情駭震京邑士子不一存率皆逃竄無敢出者直衛空虚官守廢曠榮聞之上書曰臣世荷蕃寄征討累年奉忠王室志存效死直以太后滛亂孝明暴崩遂率義兵扶立社稷陛下登祚之始人情未安大兵交際難可齊一諸王朝貴横死者衆臣今粉軀不足塞徃責以謝亡者然追榮襃德謂之不朽乞降天慈㣲申私責無上王請追尊帝號諸王刺史乞贈三司其位班三品請贈令僕五品之官各贈方伯六品已下及白民贈以鎮郡諸死者無後聽繼即授封爵均其髙下節級别科使恩洽存亡有慰生死詔曰覽表不勝鯁塞朕德行無感致滋酷濫㝷繹徃事實切於懷可如所表自兹已後贈終叨濫庸人賤品動至大官為識者所不貴武定中齊文襄王始革其失追襃有典焉榮啓帝遣使循城勞問於是人情遂安朝士逃亡者亦稍來歸闕榮又奏請番直朔望之日引見三公令僕尚書九卿及司州牧河南尹洛陽河隂執事之官參論國治經綸王道以為常式五月榮還晉陽七月詔曰乾坤統物星象贊其功皇王御運股肱匡其業是以周道中缺齊晉立濟世之忠殷祚或虧彭韋振救時之節自前朝失御厄運荐臻太原王榮爰戴朕躬推臨萬國勳踰伊霍功格二儀王室不壞伊人是頼可柱國大将軍兼錄尚書事餘如故時葛榮将向京師衆號百萬相州刺史李神軌閉門自守賊鋒已過汲郡所在村塢悉被􅋊略榮啓求討之九月乃率精騎七千馬皆有副倍道兼行東出滏口葛榮為賊既乆横行河北時衆寡非敵議者謂無制賊之理葛榮聞之喜見於色乃令其衆曰此易與耳諸人俱辦長繩至便缚取葛榮自鄴以北列陳數十里箕張而進榮潛軍山谷為竒兵分督将已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士馬上各齎神棒一枚置於馬側至於戰時不聽斬級以棒棒之而已慮廢騰逐也乃分命壮勇所當衝突號令嚴明戰士同奮榮身自陷陳出於賊後表裏合擊大破之於陳擒葛榮餘衆悉降榮以賊徒既衆若即分割恐其疑懼或更結聚乃普告勒各從所樂親屬相隨任所居止於是羣情喜悦登即四散數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授用新附者咸安時人服其處分機速乃檻車送葛榮赴闕詔曰功格天地錫命之位必崇道濟生民襃賞之名宜大是以有莘贊亳不次之號爰歸渭叟翼周殊世之班載集况導源積石襲構崐山門踵英猷弼成鴻業抗髙天之摧柱振厚地之絶維德冠五侯勳髙九伯者哉太原王榮代荷蕃寵世載忠烈入匡頽運出勦元兇使積年之霧倐焉滌蕩數載之塵一朝清謐燕恒既泰趙魏還蘇比績況功古今莫二若不式稽舊典増是禮數将何以昭德報功遠明國範可大丞相都督河北畿外諸軍事増邑一萬户通前三萬餘官悉如故初榮之将討葛榮也軍次襄垣遂令軍士列圍大獵有雙兔起於馬前榮乃躍馬彎弓而誓之曰中之則擒葛榮不中則否既而並應弦而殪三軍咸悦及破賊之後即命立碑於其所號雙兔碑榮将戰之夜夢一人從葛榮索千牛刀而葛榮初不肯與此人自稱我是道武皇帝汝何敢違葛榮乃奉刀此人手持授榮既寤而喜自知必勝又詔曰我皇魏道契神元德光靈範源先二象化穆五才三歴與日月惟休金鼎共乾坤俱永而正光之末皇運時屯百揆咸亂九宮失叙朝野撫膺士女嗟怨遂使四海土崩九區瓦解逆賊杜周䖍劉燕代妖宼葛榮假噬魏趙常山易水戎鼓夜驚冰井叢臺胡塵晝合朔南乆已丘墟河北殆成灰燼宗廟懷匪安之慮社稷急不測之憂大丞相太原王榮道鏡域中德光區外神昭藏徃思實知來義踵先勳忠資曩烈遂能大建義謀收集忠勇熊羆競逐虎豹爭先軒翥南溟搏風北極氣震林原勢動山岳弔民伐罪殲此鯨鯢戮卒多於長平積器髙於熊耳秦晉聞聲而喪膽齊莒側聽而讋息中興之業是乎再隆太平之基兹焉更始雖復伊霍宣翼之功桓文崇贊之道何足以髣髴鴻蹤比勳盛烈道格普天仁沾率土振古以來未有其比若不廣錫山河大開土宇何以表大義之崇髙摽盛德之廣逺可以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽等七郡各萬户通前滿十萬户為太原國邑又進位太師餘如故建義初北海王元顥南奔蕭衍衍乃立為魏主資以兵将時邢杲宼亂三齊與顥應接朝廷以顥孤弱不以為慮永安三年春詔大将軍元穆先平齊地然後回師征顥顥以大軍未還乘虛征進既䧟梁國鼓行而西滎陽虎牢並皆不守五月車駕出幸河北事出不虞天下改望榮聞之即時馳傳朝行宫於上黨之長子行其部分輿駕於是南轅榮為前驅旬日之間兵馬大集資糧器仗繼踵而至天穆既平邢杲亦渡河以㑹車駕顥都督宗正珍孫河内太守元襲固守不降榮攻而剋之斬珍孫元襲以狥帝幸河内城榮與顥相持於河上顥令都督安豊王延明緣河據守榮既未有舟船不得即渡議欲還北更圖後舉黄門郎楊侃髙道穆等並謂大軍若還失天下之望固執以為不可語在侃等傳屬馬渚諸楊云有小船數艘求為鄉導榮乃令都督尒朱兆等率精騎夜濟登岸奮擊顥子領軍将軍冠受率馬歩五千拒戰兆大破之臨陳擒冠受延明聞冠受見擒遂自逃散顥便率麾下南奔事在其傳車駕渡河入居華林園詔曰周武奉時藉十亂以纂厯漢祖先天資三傑以除暴理民濟治斯道未爽使持節柱國大将軍大丞相太原王榮蘊伏風煙抱含日月總奇正以成術兼文武而為資昔處亂朝韜光戢翼秣馬冀北厲兵晉陽佇龍顔而振腕想日角以歎息忠勇奮發虎士如林義功始立所向風靡故能芟夷羣惡振此頽綱俾朕寡昧獲承鴻緖雖大位克正而衆盜未息葛榮跋扈仍亂中原建旗伐罪授首殲馘元顥凶頑構成巨釁阻弄呉楚虧汙宗社朕徙御北徂劬勞鞍甲王聞難星奔一舉大定下洽民和上匡王室鴻勳巨績書契所未紀飲至䇿勳事絶於比況非常之功必有非常之賞可天柱大将軍此官雖訪古無聞今員未有太祖已前増置此號式遵典故用錫殊禮又宜開土宇可増封十萬通前二十萬加前後部羽葆鼓吹餘如故榮㝷還晉陽先是葛榮枝黨韓婁仍據幽平二州榮遣都督侯淵討斬之時賊帥万俟醜奴蕭寶夤擁衆豳涇兇勢日盛榮遣其從子天光為雍州刺史令率都督賀㧞岳侯莫陳悦等總衆入闗討之天光既至雍州以衆少不敵逡廵未集榮大怒遣其騎兵參軍劉貴馳驛詣軍加天光杖罰天光等大懼乃進討連破之擒醜奴寳夤並檻車送闕天光又擒王慶雲万俟道樂闗西悉平於是天下大難便以盡矣榮性好獵不舍寒暑至於列圍而進必須齊一雖遇阻險不得回避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勳濟天下四方無事惟宜調政飬民順時蒐狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海内何宜今日便言勳也如聞朝士猶自寛縱今秋欲共兄戒勒士馬校獵嵩原令貪汚朝貴入圍搏虎仍出魯陽歴三荆悉擁生蠻北填六鎮回軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬户侯如其不降徑渡數千騎便徃縛取待六合寧一八表無塵然後共兄奉天子廵四方觀風俗布政教如此乃可稱勳耳今若止獵兵士懈怠安可復用也榮身雖居外恒遥制朝廷廣布親戚列為左右伺察動静大小必知或有僥倖求官者皆詣榮承候得其啓請無不遂之曽闗補定州曲陽縣令吏部尚書李神儁以階懸不奉别更擬人榮聞大怒即遣其所補者徃奪其任榮使入京雖復微蔑朝貴見之莫不傾靡及至闕下未得通奏恃榮威勢至乃忿怒榮曽啓北人為河南諸州荘帝未許天穆入見面啓曰天柱既有大功若請普代天下官屬恐陛下亦不得違之如何啓數人為州便停不用帝正色曰天柱若不為人臣朕亦須代如其猶存臣節無代天下百官理此事復何足論榮聞所啓不允大為恚恨曰天子由誰得立今乃不用我語荘帝外廹於榮恒怏怏不悦兼懲榮河隂之事恐終難保又城陽王徽侍中李彧等欲擅威權懼榮害之復相閒構日月滋甚於是荘帝密有圖榮之意三年九月榮啓将入朝朝士慮其有變荘帝又畏惡之榮從弟世隆與榮書勸其不來榮妻北鄉郡長公主亦勸不行榮並不從帝既圖榮榮至入見即欲害之以天穆在并恐為後患故隠忍未發榮之入洛有人告榮云帝欲圖之榮即具奏帝曰外人告云亦言王欲害我我豈信之於是榮不自疑每入謁帝從人不過數十又皆挺身不持兵仗及天穆至帝伏兵於明光殿東廊引榮及榮長子菩提天穆等俱入坐定光祿少卿魯安典御李侃晞等抽刀而至榮窘廹起投御坐帝先横刀膝下遂手刃之安等亂斫榮與天穆菩提同時俱死榮時年三十八於是内外喜呌聲滿京城既而大赦前廢帝初世隆等得志乃詔曰故使持節侍中都督河北諸軍事天柱大将軍大丞相太師領左右兼錄尚書北道大行臺太原王榮功濟區夏誠貫幽明天不憗遺奄從物化追終襃績列代通謨紀德銘勳前王令範可贈假黃鉞相國錄尚書事司州牧使持節侍中将軍王如故又詔曰故假黄鉞持節侍中相國錄尚書都督中外諸軍事天柱大将軍司州牧太原王榮惟岳降靈應期作輔功侔伊霍德契桓文方籍棟梁永康國命道長運短震悼兼深前已襃贈用彰厥美然禮數弗窮文物有闕逺近之望猶或未盡宜循舊典更加殊錫可追號為晉王加九錫給九旒鑾輅虎賁班劔三百人轀輬車凖晉太宰安平獻王故事諡曰武詔曰武泰之末乾樞中圯丕基寳命有若綴旒晉王榮固天所縱世秉忠誠一匡邦國再造區夏俾我頽綱於斯復振雖勳銘王府德被管絃而從祀之禮於兹尚闕非所以酬懋賞於當時騰殊績於不朽宜遵舊典配享髙祖廟庭菩提肅宗末拜羽林監㝷轉直閤将軍孝荘初以榮翼戴之勳超授散騎常侍平北将軍中書令轉太常卿遷驃騎大将軍開府儀同三司加侍中特進死時年十四前廢帝初贈侍中驃騎大将軍司徒公冀州刺史諡曰惠菩提弟义羅孝荘初除散騎常侍武衛将軍初襲爵梁郡公又進爵為王㝷卒贈侍中車騎将軍司空公雍州刺史义羅弟文殊建義初封平昌郡開國公進爵為王孝靜初轉襲榮爵太原王薨於晉陽時年九嵗文殊弟文暢初封昌樂郡開國公食邑二千户以榮破葛賊之勳進爵為王増邑千户超授散騎常侍撫軍将軍後除肆州刺史仍本将軍加開府儀同三司武定三年春坐與前東郡太守任曹等謀反伏誅時年十八文暢弟文略襲爵梁郡王武定末撫軍将軍光祿大夫史臣曰太祖撫運乘時奄開王業世祖以武功一海内髙祖以文德革天下世宗之後政道頗虧及明皇幼沖女主南面始則于忠專恣繼以元义權重握賞罰之柄擅生殺之威榮悴在親疎貴賤由離合附㑹者結之以子女進趨者要之以金帛且佞諛用事功勤不賞居官肆其聚斂乘勢極其陵暴於是四海囂然已有羣飛之漸矣逮於靈后反政宣滛於朝鄭儼手運天機口吐王制李軌徐紇刺促以求先元略元徽喔咿以競入私利畢舉公道盡亡遐邇怨憤天下鼎沸傾覆之徵於此至矣尒朱榮緣将帥之列藉部衆之用屬肅宗暴崩民怨神怒遂有匡頽拯敝之志援主逐惡之圖蓋天啓之也於是上下離心文武解體咸企忠義之聲俱聽桓文之舉勞不汗馬朝野靡然扶翼懿親宗祏有主祀魏配天不殞舊物及夫擒葛榮誅元顥戮邢杲剪韓婁醜奴寳夤咸裊馬市此諸魁者或據象魏或僭號令人謂秉皇符身各謀帝業非徒鼠竊狗盜一城一聚而已茍非榮之致力剋夷大難則不知幾人稱帝幾人稱王也然則榮之功烈亦已茂乎而始則希覬非望睥睨宸極終乃靈后少帝沉流不反河隂之下衣冠塗地此其所以得罪人神而終於夷戮也向使榮無姦忍之失修德義之風則彭韋伊霍夫何足數至於末迹見猜地逼貽斃斯則蒯通致説於韓王也魏書卷七十四魏書卷七十四考證尒朱榮傳三厯與日月惟休金鼎共乾坤俱永三應作玉干寳搜神記虞舜耕于歴山得玉厯于河際之巖舜知天命在已體道不倦魏書卷七十四考證
