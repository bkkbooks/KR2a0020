body:
  text: 魏書卷五十五齊魏收撰列傳第四十三㳺明根劉芳㳺明根字志遠廣平任人也祖鱓慕容熙樂浪太守父幼馮䟦假廣平太守和龍平明根乃得歸鄉里游雅稱薦之世祖擢為中書學生性貞慎寡欲綜習經典及恭宗監國與公孫叡俱為主書高祖踐祚遷都曹主書賜爵安樂男寧逺將軍高祖以其小心敬慎每嗟美之假員外散騎常侍冠軍將軍安樂侯使於劉駿直使明僧暠相對前後三返駿稱其長者迎送之禮有加常使顯祖初以本將軍出為東青州刺史加員外常侍遷散騎常侍平東將軍都督兗州諸軍事瑕丘鎮將尋就拜東兗州刺史改爵新泰侯為政清平新民樂附高祖初入為給事中遷儀曹長加散騎常侍清約恭謹號為稱職後王師南討詔假安南將軍儀曹尚書廣平公與梁郡王嘉參謀軍計後兗州民叛詔明根慰喻敕南征沔西仇城連口三道諸軍禀明根節度還都正尚書仍加散騎常侍詔以與蕭賾絶使多年今宜通否羣臣㑹議尚書陸叡曰先以三吴不靖荆梁有難故權停之將觀釁而動今彼方既靖宜還通使明根曰中絶行人是朝廷之事深築醴陽侵彼境土二三之理直在蕭賾我今遣使於理為長高祖從之文明太后崩羣臣固請公除高祖與明根徃復事在禮志遷大鴻臚卿河南王幹師尚書如故隨例降侯為伯又參定律令屢進讜言明根以年踰七十表求致仕詔不許頻表固請乃詔曰明根風度清幹志尚貞敏温恭静密乞言是寄故抑其高蹈之操至于再三表請殷勤不容違奪便已許其告辨可出前後表付外依禮施行引明根入見高祖曰卿年耆徳茂服勤累朝歴職内外並著顯績逮于耆年履道不渝是以釐革之始委以禮任遲能迂徳匡贊於朕然高尚悠邈便爾言歸君臣之禮於斯而畢眷徳思仁情何可已夫七十致仕典禮所稱位隆固辭賢者達節但季俗陵遲斯道弗繼卿獨秉冲操居今行古有魏以來首振頽俗進可以光我朝化退可以榮慰私門明根對曰臣桑榆之年鍾鳴漏盡蒙陛下之澤首領獲全待盡私庭下奉先帝陛下大恩臣之願也但犬馬之戀不勝悲塞因泣不自勝高祖命之令進言别殷勤仍為流涕賜青紗單衣委貎冠被褥錦袍等物其年以司徒尉元為三老明根為五更行禮辟雍語在元傳賜步挽一乘給上卿之祿供食之味太官就第月送之以定律令之勤賜布帛一千匹穀一千斛後明根歸廣平賜絹五百匹安車一乘馬二匹幄帳被褥車駕幸鄴明根朝于行宫詔曰游五更光素蓬簷歸終衡里可謂朝之舊徳國之老成可賜帛五百匹穀五百斛敕太官備送珍羞後車駕幸鄴又朝行宫賜榖帛如前為造甲第國有大事恒璽書訪之舊疹發動手詔問疾太醫送藥太和二十三年卒於家年八十一世宗遣使弔祭賻錢一十萬絹三百匹布二百匹贈光祿大夫加金章紫綬諡靖侯明根歴官内外五十餘年處身以仁和接物以禮讓時論貴之高祖初明根與高閭以儒老學業特被禮遇公私出入每相追隨而閭以才筆時侮明根世號高游焉子肇襲爵肇字伯始高祖賜名焉幼為中書學生博通經史及蒼雅林說高祖初為内祕書侍御中散司州初建為都官從事轉通直郎祕閣令遷散騎侍郎典命中大夫車駕南伐肇上表諫止高祖不納尋遷太子中庶子肇謙素敦重文雅見任以父老求解官扶侍高祖欲令遂祿養乃出為本州南安王禎鎮北府長史帶魏郡太守王薨復為高陽王雍鎮北府長史太守如故為政清簡加以匡贊歴佐二王甚有聲迹數年以父憂解任景明末徴為廷尉少卿固辭乃授黄門侍郎遷散騎常侍黄門如故兼侍中為畿内大使黜陟善惡賞罰分明轉太府卿徙廷尉卿兼御史中尉黃門如故肇儒者動存名敎直繩所舉莫非傷風敗俗持法仁平斷獄務於矜恕尚書令高肇世宗之舅為百竂懾憚以肇名與已同欲令改易肇以高祖所賜秉志不許高肇甚䘖之世宗嘉其剛梗盧昶之在朐山也肇諌曰朐山蕞爾僻在海濱山湖下墊民無居者於我非急於賊為利為利故必致死而争之非急故不得已而戰以不得已之衆擊必死之師恐稽延歲月所費遂甚假令必得朐山徒致交争終難全守所謂無益之田也知賊將屢以宿豫求易朐山臣愚謂此言可許朐山久捍危敝宜速審之若必如此宿豫不征而自伏持此無用之地復彼舊有之疆兵役時解其利為大世宗將從之尋而昶敗遷侍中蕭衍軍主徐元明斬其青冀二州刺史張稷首以郁洲内附朝議遣兵赴援肇表曰元明之欵雖奔救是當然事有損益或憚舉而功多或因小而生患不可必也今六里朐山地實接海陂湖下濕人不可居郁洲又在海中所謂雖獲石田終無所用若不待連兵六里雖剋尚不可守況方事連兵而争非要也且六里於賊逾要去此閑逺若以閑逺之兵攻逼近之衆其勢既殊不可敵也災儉之年百姓飢敝餓死者亦復不少何以得宜静之辰興干戈之役軍糧資運取濟無所唯見其損未覩其益且新附之民服化猶近特須安帖不宜勞之勞則怨生怨生則思叛思叛則不自安不安則擾動脫爾則連兵難解事不可輕宜損兹小利不使大損世宗並不納大將軍高肇伐蜀肇諫曰臣聞逺人不服則修文徳以來之兵者凶器不得已而後用當今治雖太平論征未可何者山東關右殘傷未復頻年水旱百姓空虚宜在安静不宜勞役然往昔開拓皆因城主歸欵故有征無戰今之據者雖假官號真偽難分或有怨於彼不可全信且蜀地險隘稱之自古鎮戍晏然更無異趣豈得虚承浮說而動大軍舉不慎始悔將何及討蜀之略願俟後圖世宗又不納肅宗即位遷中書令光祿大夫加金章紫綬相州大中正出為使持節加散騎常侍鎮東將軍相州刺史有惠政徴為太常卿遷尚書右僕射固辭詔不許肇於吏事斷決不速主者諮呈反覆論叙有時不曉至於再三必窮其理然後下筆雖寵勢干請終無回撓方正之操時人服之及領軍元义之廢靈太后將害太傅清河王懌乃集公卿會議其事於時羣官莫不失色順㫖肇獨抗言以為不可終不下署正光元年八月卒年六十九詔給東園祕器朝服一襲賜帛七百匹肅宗舉哀於朝堂贈使持節散騎常侍驃騎大將軍儀同三司冀州刺史諡文貞公肇外寛柔内剛直躭好經傳手不釋書治周易毛詩尤精三禮為易集解撰冠婚儀白珪論詩賦表啟凡七十五篇皆傳於世謙亷不競曾撰儒碁以表其志焉清貧寡欲資仰俸祿而已肇之為廷尉也世宗甞私敕肇有所降恕肇執而不從曰陛下自能恕之豈足令臣曲筆也其執意如此及肅宗初近侍羣官豫在奉迎者自侍中崔光已下並加封邑時封肇文安縣開國侯邑八百户肇獨曰子襲父位今古之常因此獲封何以自處固辭不應論者高之子祥字宗良頗有學歴祕書郎襲爵新泰伯遷通直郎國子博士領尚書郎中肅宗以肇昔辭文安之封復欲封祥祥守其父意卒亦不受又追論肇前議清河守正不屈乃封祥高邑縣開國侯邑七百户孝昌元年卒年三十六贈征虜將軍給事黃門侍郎幽州刺史諡曰文子皓字賔多襲侍御史早卒皓弟安居襲爵新泰伯武定中司空墨曹參軍齊受禪爵例降明根叔父矯中書博士濮陽鉅鹿二郡太守卒贈冠軍將軍相洲刺史矯孫馥國子博士馥弟思進尚書郎中劉芳字伯文彭城人也漢楚元王之後也六世祖訥晉司𨽻校尉祖該劉義隆征虜將軍青徐二州刺史父邕劉駿兗州長史芳出後伯父遜之遜之劉駿東平太守也邕同劉義宣之事身死彭城芳隨伯母房逃竄青州㑹赦免舅元慶為劉子業青州刺史沈文秀建威府司馬為文秀所殺芳母子入梁鄒城慕容白曜南討青齊梁鄒降芳北徙為平齊民時年十六南部尚書李敷妻司徒崔浩之弟女芳祖母浩之姑也芳至京師詣敷門崔恥芳流播拒不見之芳雖處窮窘之中而業尚貞固聰敏過人篤志墳典晝則傭書以自資給夜則讀誦終夕不寢至有易衣併日之敝而澹然自守不汲汲於榮利不慼慼於賤貧乃著窮通論以自慰焉芳常為諸僧傭寫經論筆迹稱善卷直以一縑歲中能入百餘匹如此數十年頼以頗振由是與徳學大僧多有還往時有南方沙門恵度以事被責未㡬暴亡芳因緣聞知文明太后召入禁中鞭之一百時中官李豐主其始末知芳篤學有志行言之於太后太后微愧於心㑹蕭賾使劉纘至芳之族兄也擢芳兼主客郎與纘相接尋拜中書博士後與崔光宋弁邢産等俱為中書侍郎俄而詔芳與産入授皇太子經遷太子庶子兼員外散騎常侍從駕洛陽自在路及旋京師恒侍坐講讀芳才思深敏特精經義博聞强記兼覽蒼雅尤長音訓辨析無疑於是禮遇日隆賞賚豐渥正除員外散騎常侍俄兼通直常侍從駕南廵撰述行事尋而除正王肅之來奔也高祖雅相器重朝野屬目芳未及相見高祖宴羣臣於華林肅語次云古者唯婦人有笄男子則無芳曰推經禮正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此專謂凶事也禮初遭䘮男子免時則婦人髽男子冠時則婦人笄言俱時變而男子婦人免髽冠笄之不同也又冠尊故奪其笄稱且互言也非謂男子無笄又禮内則稱子事父母雞初鳴櫛纚笄總以兹而言男子有笄明矣高祖稱善者久之肅亦以芳言為然曰此非劉石經邪昔漢世造三字石經於太學學者文字不正多往質焉芳音義明辨疑者皆往詢訪故時人號為劉石經酒闌芳與肅俱出肅執芳手曰吾少來留意三禮在南諸儒亟共討論皆謂此義如吾向言今聞往釋頓祛平生之惑芳理義精通類皆如是高祖遷洛路由朝歌見殷比干墓愴然悼懐為文以弔之芳為注解表上之詔曰覧卿注殊為富博但文非屈宋理慙張賈既有雅致便可付之集書詔以芳經學精洽超遷國子祭酒以母憂去官高祖南征宛鄧起為輔國將軍太尉長史從太尉咸陽王禧攻南陽蕭鸞將裴叔業入冦徐州疆場之民頗懐去就高祖憂之以芳為散騎常侍國子祭酒徐州大中正行徐州事後兼侍中從征馬圈高祖崩於行宫及世宗即位芳手加衮冕高祖自襲歛暨于啟祖山陵練除始末喪事皆芳撰定咸陽王禧等奉申遺㫖令芳入授世宗經及南徐州刺史沈陵外叛徐州大水遣芳撫慰賑恤之尋正侍中祭酒中正並如故芳表曰夫為國家者罔不崇儒尊道學斆為先誠復政有質文兹範不易諒由萬端資始衆務禀法故也唐虞已往典籍無據隆周以降任居虎門周禮大司樂云師氏掌以媺詔王居虎門之左司王朝掌國中之事以教國子弟蔡氏勸學篇云周之師氏居虎門左敷陳六藝以教國子今之祭酒即周師氏洛陽記國子學宫與天子宫對太學在開陽門外案學記云古之王者建國親民教學為先鄭氏注云内則設師保以教使國子學焉外則有太學庠序之官由斯而言國學在内太學在外明矣案如洛陽記猶有仿像臣愚謂今既徙縣崧瀍皇居伊洛宫闕府寺僉復故趾至於國學豈可舛替校量舊事應在宫門之左至如太學基所炳在仍舊營構又云太和二十年發敕立四門博士於四門置學臣案自周已上學惟以二或尚西或尚東或貴在國或貴在郊爰暨周室學蓋有六師氏居内太學在國四小在郊禮記云周人養庶老於虞庠虞庠在國之西郊禮又云天子設四學當入學而太子齒注云四學周四郊之虞庠也案大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴徳帝入北學尚貴而尊爵帝入太學承師而問道周之五學於此彌彰案鄭注學記周則六學所以然者注云内則設師保以教使國子學焉外則有太學庠序之官此其證也漢魏已降無復四郊謹尋先㫖宜在四門案王肅注云天子四郊有學去王都五十里考之鄭氏不云逺近今太學故坊基趾寛曠四郊别置相去遼濶檢督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌且今時制置多循中代未審四學應從古不求集名儒禮官議其定所從之遷中書令祭酒如故出除安東將軍青州刺史為政儒緩不能禁止姦盜廉清寡欲無犯公私還朝議定律令芳斟酌古今為大議之主其中損益多芳意也世宗以朝儀多闕其一切諸議悉委芳修正於是朝廷吉凶大事皆就諮訪焉轉太常卿芳以所置五郊及日月之位去城里數於禮有違又靈星周公之祀不應𨽻太常乃上疏曰臣聞國之大事莫先郊祀郊祀之本寔在審位是以列聖格言彪炳綿籍先儒正論昭著經史臣學謝全經業乖通古豈可輕薦瞽言妄陳管說竊見所置壇祠逺近之宜考之典制或未允𠂻既曰職司請陳膚淺孟春令云其數八又云迎春於東郊盧植云東郊八里之郊也賈逵云東郊木帝太昊八里許慎云東郊八里郊也鄭元孟春令注云王居明堂禮曰王出十五里迎歲蓋殷禮也周禮近郊五十里鄭元别注云東郊去都城八里高誘云迎春氣於東方八里郊也王肅云東郊八里因木數也此皆同謂春郊八里之明據也孟夏令云其數七又云迎夏於南郊盧植云南郊七里郊也賈逵云南郊火帝炎帝七里許慎云南郊七里郊也鄭元云南郊去都城七里高誘云南郊七里之郊也王肅云南郊七里因火數也此又南郊七里之審據也中央令云其數五盧植云中郊五里之郊也賈逵云中央黃帝之位并南郊之季故云兆五帝於四郊也鄭元云中郊西南未地去都城五里此又中郊五里之審據也孟秋令云其數九又曰迎秋於西郊盧植云西郊九里郊賈逵云西郊金帝少皥九里許慎云西郊九里郊也鄭元云西郊去都城九里高誘云西郊九里之郊也王肅云西郊九里因金數也此又西郊九里之審據也孟冬令云其數六又云迎冬於北郊盧植云北郊六里郊也賈逵云北郊水帝顓頊六里許慎云北郊六里郊也鄭𤣥云北郊去都城六里高誘云北郊六里之郊也王肅云北郊六里因水數也此又北郊六里之審據也宋氏含文嘉注云周禮王畿千里二十分其一以為近郊近郊五十里倍之為逺郊迎王氣蓋於近郊漢不設王畿則以其方數為郊處故東郊八里南郊七里西郊九里北郊六里中郊在西南未地五里祭祀志云建武二年正月初制郊兆於雒陽城南七里依採元始中故事北郊在雒陽城北四里此又漢世南北郊之明據也今地祇準此至如三十里之郊進乖鄭元所引殷周二代之據退違漢魏所行故事凡邑外曰郊今計四郊各以郭門為限里數依上禮朝拜日月皆於東西門外今日月之位去城東西路各三十竊又未審禮又云祭日於壇祭月於坎今計造如上禮儀志云立高禖祠于城南不云里數故今仍舊靈星本非禮事兆自漢初專為祈田恒隷郡縣郊祀志云高祖五年制詔御史其令天下立靈星祠牲用太牢縣邑令長得祠晉祠令云郡縣國祠稷社先農縣又祠靈星此靈星在天下諸縣之明據也周公廟所以别在洛陽者蓋姬旦創成洛邑故傳世洛陽崇祠不絶以彰厥庸夷齊廟者亦世為洛陽界内神祠今並移太常恐乖其本天下此類甚衆皆當部郡縣修理公私施之禱請竊惟太常所司郊廟神祗自有常限無宜臨時斟酌以意若遂爾妄營則不免淫祀二祠在太常在洛陽於國一也然貴在審本臣以庸蔽謬忝今職考括墳籍博採羣議既無異端謂粗可依據今元冬務隙野罄人閑遷易郊壇二三為便詔曰所上乃有明據但先朝置立已久且可從舊先是高祖於代都詔中書監高閭太常少卿陸琇并公孫崇等十餘人修理金石及八音之器後崇為太樂令乃上請尚書僕射高肇更共營理世宗詔芳共主之芳表以禮樂事大不容輒決自非博延公卿廣集儒彦討論得失研窮是非則無以垂之萬葉為不朽之式被報聼許數旬之間頻煩三議于時朝士頗以崇專綜既久不應乖謬各嘿然無發論者芳乃探引經誥搜括舊文共相難質皆有明據以為盈縮有差不合典式崇雖示相酬答而不㑹問意卒無以自通尚書述奏仍詔委芳别更考制於是學者彌歸宗焉芳以社稷無樹又上疏曰依合朔儀注日有變以朱絲為繩以繞係社樹三匝而今無樹又周禮司徒職云設其社稷之壝而樹之田主各以其社之所宜木鄭𤣥注云所宜木謂若松栢栗也此其一證也又小司徒封人職云掌設王之社壝為畿封而樹之鄭𤣥注云不言稷者王主於社稷社之細也此其二證也又論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗是乃土地之所宜也此其三證也又白虎通云社稷所以有樹何也尊而識之也使民望見即敬之又所以表功也案此正解所以有樹之義了不論有之與無也此其四證也此云社稷所以有樹何然則稷亦有樹明矣又五經通義云天子太社王社諸侯國社侯社制度柰何曰社皆有垣無屋樹其中以木有木者土主生萬物萬物莫善於木故樹木也此其五證也此最其丁寧備解有樹之意也又五經要義云社必樹之以木周禮司徒職曰班社而樹之各以土地所生尚書逸篇曰太社惟松東社惟栢南社惟梓西社惟栗北社惟槐此其六證也此又太社及四方皆有樹别之明據也又見諸家禮圖社稷圖皆畫為樹唯誡社誡稷無樹此其七證也雖辨有樹之據猶未正所植之木按論語稱夏后氏以松殷人以栢周人以栗便是世代不同而尚書逸篇則云太社惟松東社惟栢南社惟梓西社惟栗北社惟槐如此便以一代之中而五社各異也愚以為宜植以松何以言之逸書云太社惟松今者植松不慮失禮惟稷無成證乃社之細蓋亦不離松也世祖從之芳沉雅方正槩尚甚高經傳多通高祖尤器敬之動相顧訪太子恂之在東宫高祖欲為納芳女芳辭以年貌非宜高祖歎其謙慎更敕芳舉其宗女芳乃稱其族子長文之女高祖乃為恂聘之與鄭懿女對為左右孺子焉崔光於芳有中表之敬每事詢仰芳撰鄭元所注周官儀禮音干寶所注周官音王肅所注尚書音何休所注公羊音范寗所注穀梁音韋昭所注國語音范瞱後漢書音各一卷辨類三卷徐州人地錄二十卷急就篇續注音義證三卷毛詩箋音義證十卷禮記義證十卷周官儀禮儀證各五卷崔光表求以中書監讓芳世宗不許延昌二年卒年六十一詔賜帛四百匹贈鎮東將軍徐州刺史諡文貞長子懌字祖欣雅有父風頗好文翰歴徐州别駕兖州左軍府長史司空諮議參軍屢為行臺出使所歴皆有當官之稱轉通直散騎常侍徐州大中正行郢州事尋遷安南将軍大司農卿卒贈鎮東将軍徐州刺史諡曰簡無子弟廞以第三子㻐為後㻐天平中走江南武定末歸國賜爵臨潁縣子懌弟廞字景興好學彊立善事當世高肇之盛及清河王懌為宰輔廞皆與其子姪交逰往來靈太后臨朝又與太后兄弟往還相好太后令廞以詩賦授弟元吉歴尚書郎太尉屬中書侍郎冠軍將軍行南青州事尋徵安南将軍光祿大夫孝莊初除國子祭酒復以本官行徐州事前廢帝時除驃騎将軍左光祿大夫出帝初除散騎常侍遷驃騎大将軍復領國子祭酒出帝於顯陽殿講孝經廞為執經雖訓答論難未能精盡而風采音制足有可觀尋兼都官尚書又兼殿中尚書及出帝入關齊獻武王至洛責廞而誅之時年五十二子騭字子昇少有風氣頗涉文史弱冠州辟主簿奉使詣闕見莊帝於顯陽殿問以邊事騭應對閑敏帝善之遂敕除員外散騎侍郎出補徐州開府從事中郎父廞之死騭率勒鄉部赴兗州與刺史樊子鵠抗禦王師每戰流涕突陳城陷擒送晉陽齊獻武王矜而赦之文襄王之為儀同開府以騭為屬本州大中正武定初轉中書舍人加安東将軍於時與蕭衍和通騭前後受敕接對其使十六人出為司徒右長史未幾遷左長史六年受使兗州行逹東郡暴疾卒時人嗟惜之追贈本將軍南青州刺史廞弟悅永安中開府記室悅弟戫武定中鎮南将軍金紫光祿大夫戫弟粹徐州别駕朱衣直閤粹少尚氣俠兄廞死粹招合部曲就兗州刺史樊子鵠謀應關西大將軍攻討城陷殺之芳叔撫之孫思祖勇健有將略高祖末入朝歴羽林監梁沛二郡太守員外常侍屢為統軍南征累著功㨗任城王之圍鍾離也蕭衍遣其冠軍将軍張惠紹及彭瓮張豹子等率衆一萬送糧鍾離時思祖為平逺将軍領兵數千邀衍餉軍於邵陽遣其長史元少騎一千於鍾離之北遏其前鋒錄事參軍繆琰掩其後思祖身率精銳橫衝其陳三軍合擊大破之擒惠紹及衍驍騎將軍祁陽縣開國男趙景悅悅弟寧逺将軍景脩寧逺将軍梅世和屯騎校尉任景攸長水校尉邊欣越騎校尉賈慶真龍驤将軍徐敞等俘斬數千人尚書論功擬封千户侯思祖有二婢羙􅐾容善歌舞侍中元暉求之不得事遂停寢後除揚烈将軍遼西太守思祖於路叛奔蕭衍衍以思祖為輔國将軍北徐州刺史領冦淮北數年而死纘子晰歴蕭衍琅邪東莞二郡太守戍朐山朐山人王萬夀斬晰送首以朐山内附并晰子翐於京師數年後以翐為給事中汝陽太守正光初自郡南叛芳從子懋字仲華祖泰之父承伯仕於劉彧並有名位懋聰敏好學博綜經史善草𨽻書多識奇字世宗初入朝拜員外郎遷尚書外兵郎中加輕車將軍芳甚重之凡所撰制朝廷軌儀皆與參量尚書博議懋與殿中郎袁翻常為議主達於從政臺中疑事咸所訪決受詔參議新令性沉雅厚重善與人交器宇淵曠風流甚羙時論高之尚書李平與之結莫逆之友遷步兵校尉領郎中兼東宫中舍人轉員外常侍鎮逺将軍領考功郎中立考課之科明黜陟之法甚有條貫肅宗初大軍攻硤石懋為李平行臺郎中城拔懋頗有大功太傅清河王懌愛其風雅常目而送之曰劉生堂堂搢紳領袖若天假之年必為魏朝宰輔詔懋與諸才學之士撰成儀令懌為宰相積年禮懋尤重令諸子師之遷太尉司馬熙平二年冬暴病卒家甚清貧亡之日徒四壁而已太傅懌及當時才儁莫不痛惜之贈持節前將軍南秦州刺史諡曰宣簡懋詩誄賦頌及諸文筆見稱於時又撰諸品物造作之始十五卷名曰物祖子筠字士貞司員外散騎侍郎歴河南郡丞中散大夫徐州大中正祕書丞天平初卒贈前將軍徐州刺史子規早卒筠弟筟字士文少而聰惠年十二詣尚書王衍衍與語大竒之遂與太傅李延寔祕書李凱上疏薦之拜祕書郎筟亦善士興和元年卒年二十八無子兄子矩繼懋從叔元孫養志丘園不求聞逹高祖幸彭城起家拜蘭陵太守治以清白為名卒官子長文高祖擢為南兗州冠軍府長史帶譙郡太守被圍糧竭固節全城以功賜爵下邑子遷魯郡太守高祖為太子恂納其女為孺子卒子敬先襲爵敬先弟徽奉朝請徐州治中長文弟永字履南頗有将略累著征戰之勤歴位中散大夫龍驤將軍神龜中兼大鴻臚卿持䇿拜高麗王安還除范陽太守芳族兄僧利輕財通俠甚得鄉情高祖幸徐州引見善之拜徐州别駕遷沛郡太守後遂從容鄉里不樂臺官積十餘年朝議慮其有二志徵拜輕車将軍羽林監卒官長子世雄至太山太守世雄弟世明字伯楚頗涉書傳自奉朝請稍遷蘭陵太守彭城内史屬刺史元法僧以城外叛遂送蕭衍衍欲加封爵世明固辭不受頻請衍乞還衍聼之肅宗時徵為諫議大夫孝莊末除征虜將軍南兗州刺史時尒朱世龍等威權自已四方怨叛城民王乞得逼劫世明據州歸蕭衍衍封世明開國縣侯食邑千戸征西大将軍郢州刺史又加儀同三司世明復辭不受固請北歸衍不奪其意乃躬餞之於樂逰苑世明既還奉送所持節身歸鄉里自是不復入朝常以射獵為適興和三年卒於家贈驃騎大將軍儀同三司徐州刺史子褘字彦英武定末冠軍將軍中散大夫初蘭陵繆儼靈竒與彭城劉氏才望略等及彭城内附靈奇弟子承先隨薛安都至京師賜爵襄賁子尋還徐州數十年間了無從宦者世宗末承先子彦植襲爵見叙稍遷伏波将軍羽林監彦植恭慎長厚為時所稱時滎陽鄭演仕劉彧為琅邪太守屬徐州刺史薛安都将謀内附演贊成其事顯祖初入朝以功除冠軍将軍彭城太守洛陽侯後拜太中大夫改爵雲陽伯卒贈幽州刺史諡曰懿其子孫因此遂家彭泗子長猷以父勲起家拜寧逺将軍東平太守尋轉沛郡入為南主客郎中太尉屬襲爵雲陽伯車駕南伐既剋宛城拜長猷南陽太守及鑾輿将反詔長猷曰昔曹公剋荆州留滿寵於後朕今委卿此郡兼統戎馬非直綏初附以扞城相託特賜縑二百疋高祖崩於南陽歛於其郡尋徵䕶軍長史世宗初夀春歸欵兼給事黃門侍郎持節宣慰及任城王為揚州刺史詔長猷為諮議參軍帶安豐太守轉徐州武昌王府長史帶彭城内史徵拜諌議大夫轉司徒諮議遷通直散騎常侍永平五年卒諡曰貞侯子廓襲卒子元休襲興和中雎州刺史齊受禪爵例降元休弟憑字元祐武定中司徒從事中郎史臣曰游明根雅道儒風終受非常之遇以太和之盛當乞言之重抑亦曠世一時肇既聿修克隆堂構正情梗氣顛沛不渝辭爵主幼之年亢節臣權之日顧視羣公其風固以逺矣劉芳矯然特立沉深好古博通洽識為世儒宗亦當年之師表也懋才流識學有名士之風見重於世不虚然矣魏書卷五十五魏書卷五十五考證游明根傳游明根字志逺廣平任人也臣人龍按本書游雅傳雅字伯度小名黄頭廣平任人也北史游明根即附雅傳後謂為雅從祖弟竊疑本書五十四五兩卷亦必有一非魏收之舊者否則此處應如北史稱雅從祖弟不應複云廣平任人矣劉芳傳遣其長史元少騎一千於鍾離之北元字下汲古閣本有一龜字魏書卷五十五考證
