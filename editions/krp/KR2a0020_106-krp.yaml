body:
  text: 魏書卷一百六上齊魏收撰志第五地形二上夏書禹貢周氏職方中畫九州外薄四海析其物土制其疆域此蓋王者之規摹也戰國分幷秦吞海内割裂都邑混一華夷漢興即其郡縣因而増廣班固考地理馬彪志郡國魏世三分晉又一統地道所載又其次也自劉淵石勒傾覆神州僭逆相仍五方淆亂随所跨擅闕長更相侵食彼此不恒犬牙未足論繡錯莫能比魏定燕趙遂荒九服夷翦逋偽一國一家遺之度外吳蜀而已正光已前時惟全盛戸口之數比夫晉之太康倍而已矣孝昌之際亂離尤甚恒代而北盡為邱墟崤潼已西煙火斷絶齊方全趙死於亂麻於是生民耗減且將大半永安末年胡賊入洛官司文簿散棄者多往時編户全無追訪今錄武定之世以為志焉州郡剏改随而注之不知則闕内史及相仍代相汾魏自明莊宼難紛糾攻伐既廣啓土逾衆王公錫社一地累封不可備舉故總以為郡其淪陷諸州户據永熙綰籍無者不錄焉司州治鄴城魏武帝國於此太祖天興四年置相州天平元年遷都改領郡十二縣六十五戸三十七萬一千六百七十五口一百四十五萬九千八百三十五魏尹故魏郡漢高祖置二漢屬冀州晉屬司州天興中屬相州天平初改為尹領縣十三戸一十二萬二千六百一十三口四十三萬八千二十四鄴二漢晉屬天平初併蕩隂安陽屬之蕩隂太和中置關今罷有西門豹祠武城牖里城蕩城石竇堰有南部右部西部天平中決漳水為萬金渠今世號天平渠臨漳天平初分鄴併内黄斥邱肥鄉置有鼓山肥鄉城邯鄲城斥邱城列人城鸕鷀陂林臺澤有左部東部北部尉繁陽二漢屬晉屬頓邱真君六年併頓邱太和十九年復天平二年屬治繁陽城列人前漢屬廣平後漢屬晉屬廣平天平初屬昌樂太和二十一年分魏置永安元年置郡天平中罷郡復有昌城武安二漢屬晉屬廣平天平初屬臨水晉屬廣平真君六年併鄴太和二十一年復屬魏二漢晉屬平邑天平二年分元城置易陽二漢屬趙國晉屬廣平天平初屬有易陽城元城二漢屬晉屬陽平天平初屬有沙鹿山斥章前漢屬廣平後漢屬鉅鹿晉屬廣平真君三年併列人太和二十年復天平初屬貴鄉天平二年分館陶置治趙城有東中郎將治有空陵城關城陽平郡魏文帝黄初二年分魏置治館陶城領縣八戸四萬七千四百四十四口十六萬二千七十五館陶二漢屬魏郡晉屬有館陶城清淵二漢屬郡晉屬有清淵城樂平二漢屬東郡晉屬前漢清縣後漢章帝更名治樂平城發干二漢屬東郡晉屬有發干城臨清太和二十一年置武城永安中置天平元年罷二年復有武城武陽二漢晉屬東郡曰東武陽後改屬陽平二漢屬東郡晉屬永嘉後併樂平太和二十一年復屬有陽平城崗城趙簡子陵武溝水白馬淵廣平郡漢武帝為平于國宣帝改為廣平國後漢建武中省屬鉅鹿魏文帝黄初二年復改治曲梁城領縣六戸二萬三千七百五十口十萬三千四百三平恩二漢屬魏郡晉屬治平恩城有康臺澤曲安景明中分平恩置治曲安城邯戰二漢屬趙國晉屬後屬魏真君六年屬有紫山廣平前漢屬後漢屬鉅鹿晉屬後罷太和二十年復治廣平城曲梁前漢屬後漢屬魏晉屬廣年前漢屬後漢屬鉅鹿晉屬永嘉後廢太和二十年復治廣年城汲郡晉武帝置治城頭領縣六戸二萬九千八百八十三口十萬二千九百九十七北修武孝昌中分南修武置治清陽城有清陽泉馬泉丁公神育河陶河熨斗泉覆釡山五里泉七里熨馬鳴泉重泉郡戒安陽城南修武二漢屬河内晉屬有黄家吳城宜陽城汲二漢屬河内晉屬後罷太和十二年復治汲城有比干墓太公廟陳城興和二年恒農人率戸歸國仍置義州於城中朝歌二漢屬河内晉屬有朝歌城崔方城大方山淇水白溝水天井溝苑城新城伏羲祠山陽二漢晉屬河内後屬有沁陽城南北二武陽城孝景二年置郡初治其城後移治山陽城尋罷獲嘉二漢屬河内晉屬後省太和二十三年復治新洛城有獲嘉城廣宗郡太和十一年立尋罷孝昌中復領縣三戸一萬三千二百六十二口五萬五千八百九十七廣宗後漢屬鉅鹿晉屬安平中興中立南北廣宗尋罷後屬有廣宗城建始城建徳城武強真君三年併信都太和二十一年復有武城經後漢晉屬安平真君二年併南宮後復屬東郡秦置治滑臺城晉改為濮陽後復天興中置兗州太和十八年改領縣七戸三萬五百二十一口十萬七千七百一十七東燕二漢屬晉屬濮陽後屬有燕城堯祠伍子胥祠平昌孝昌二年分白馬置治平昌城白馬二漢屬晉屬濮陽後屬有朝溝白馬樊城凡豪城涼城有源城南中城西王母祠酸棗二漢晉屬陳留後屬有酸棗城肺山白涉淵望氣臺五馬淵長垣二漢晉屬陳留後屬真君八年併外黄景明三年復有平邱城匡城蒲城子路祠長垣城衛靈公祠龍城長樂武泰初分涼城置有盤北廣平郡永安中分廣平置領縣三戸一萬六千六百九十一口九萬一千一百四十八南和前漢屬廣平後漢屬鉅鹿晉屬後併任太和二十年復有左陽亭沙陵南和城一名嘉和城安豐城任前漢屬廣平後漢屬鉅鹿晉屬有廣平鄉城宛鄉城豐城張相祠襄國秦為信都項羽更名二漢屬趙國晉屬後併任太和二十年復有襄國城林慮郡永安元年置領縣四戸一萬三千八百二十一口五萬二千三百七十二林慮二漢屬河内晉屬汲郡前漢名隆慮後漢避殤帝名改焉真君六年併鄴太和二十一年復有陵陽河東流為垣臨淇天平初分朝歌林慮共縣置有王莾嶺源河東流為淇有黎川祜柏嶺黎城淇城共二漢屬河内晉屬汲天平中屬有星城几城卓水陂栢門山桓門水南流名大清水有檐山白鹿山魏徳天平二年分朝歌置有累山冷泉頓邱郡晉武帝置領縣四戸一萬七千一十二口八萬七千六十三頓丘太和中