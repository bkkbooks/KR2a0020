body:
  text: 魏書卷三十七齊魏收撰列傳第二十五司馬休之司馬楚之司馬景之司馬叔璠司馬天助司馬休之字季豫本河内溫人晉宣帝季弟譙王進之後也司馬叡僣立江南又以進子孫襲封至休之父恬為司馬昌明鎮北將軍青兖二州刺史天興五年休之為司馬德宗平西將軍荆州刺史為桓元逼逐遂奔慕容德劉裕誅元後還建鄴裕復以休之為荆州刺史休之頗得江漢人心劉裕疑其有異志而休之子文思繼休之兄尚之為譙王謀圖裕裕執送休之令自為其所休之表廢文思并與裕書陳謝神瑞中裕收休之子文寳兄子文祖並殺之乃率衆討休之休之上表自陳於德宗與德宗鎮北將軍魯宗之宗之子竟陵太守軌等起兵討裕裕軍至江陵休之不能敵遂與軌奔襄陽裕復進軍討之太宗遣長孫嵩屯河東將為之援時姚興征虜將軍姚成王冠軍將軍司馬國璠亦將兵救之不及而還休之遂與子文思及宗之等奔於姚興裕滅姚泓休之與文思及德宗河間王子道賜輔國將軍溫楷竟陵内史魯軌荆州治中韓延之殷約平西參軍桓謐桓璲及桓溫孫道度道子渤海刁雍陳郡袁式等數百人皆將妻子詣嵩降月餘休之卒于嵩軍詔曰司馬休之率其同義萬里歸誠雅操不遂中年殞䘮朕甚愍焉其追贈征西大將軍右光祿大夫諡始平聲公文思與淮南公國璠池陽子道賜不平而偽親之引與飲宴國璠性疏直因酒醉遂語文思言已將與溫楷及三城胡酋王珍曹栗等外叛因説京師豪彊可與為謀數十人文思告之皆坐誅以文思為廷尉卿賜爵鬱林公善於其職聼訟斷獄百姓不復匿其情劉義隆遣将裴方明擊楊難當於仇池世祖以文思為假節征南大將軍進爵譙王督洛豫諸軍南趣襄陽邀其歸路還京為懐朔鎮將興安初薨子彌陁襲爵以選尚臨涇公主而辭以先取毗陵公竇瑾女與瑾竝坐祝詛伏誅司馬楚之字徳秀晉宣帝弟太常馗之八世孫父榮期司馬徳宗梁益二州刺史為其參軍楊承祖所殺楚之時年十七送父䘮還丹陽值劉裕誅夷司馬戚屬叔父宣期兄貞之竝為所殺楚之乃亡匿諸沙門中濟江自歴陽西入義陽竟陵蠻中及從祖荆州刺史休之為裕所敗乃亡於汝頴之間楚之少有英氣能折節待士與司馬順眀道㳟等所在聚黨及劉裕自立楚之規欲報復收衆據長社歸之者常萬餘人劉裕深憚之遣刺客沐謙害楚之楚之待謙甚厚謙夜詐疾知楚之必自來因欲殺之楚之聞謙病果自齎湯藥往省之謙感其意乃出匕首於席下以状告之曰將軍為裕所忌憚願不輕率以保全為先楚之歎曰若如來言雖有所防恐有所失謙遂委身以事之其推誠信物得士之心皆此類也太宗末山陽公奚斤略地河南楚之遣使請降因表曰江淮以北聞王師南首無不抃舞思奉徳化而逼於宼逆無由自致臣因民之欲請率慕義為國前驅今皆白衣無以制服人望若䝉偏裨之號假王威以唱義則莫不率從於是假楚之使持節征南將軍荆州刺史奚斤既平河南以楚之所率戸民分置汝南南陽南頓新蔡四郡以益豫州世祖初楚之遣妻子内居於鄴尋徴入朝時南藩諸將表劉義隆欲入為宼以楚之為使持節安南大將軍封琅邪王屯潁川以距之其長史臨邑子歩還表曰楚之渡河百姓思舊義衆雲集汝潁以南望風翕然回首革面斯誠陛下應天順民聖徳廣被之所致也世祖大悦璽書勞勉賜前後部鼓吹義隆將到彦之泝河而西列守南岸至於潼闗及彦之等退走楚之破其别軍於長社又與冠軍將軍安頡攻滑臺拔之擒義隆將朱脩之李元徳及東郡太守申謨俘萬餘人上疏曰臣奉命南伐受任一方而智力淺短誠節未効所以夙夜憂惶忘寝與食臣屢遣人至荆揚所在陳説具論天朝盛化之美莫不忻承聖德傾首北望而義隆兄弟知人情搖動遣臣私讐順為司州刺史統淮北七郡代垣苗守懸瓠自鞏洛滑臺敗散以來義隆恥其敗北多加罪罰到彦之削位退同卒伍殺姚縱夫於夀春斬竺靈秀於彭城王休元託疾檀道濟斥放凡在腹心悉懐疑阻民怨臣猜可謂今日臣聞平殄宼逆必乘戰勝之威建立功勲亦因離貳之勢伏惟陛下聖徳膺符道光四海神旌所指莫不摧服其未賔者義隆而已今天網遐舉殊方仰徳固宜掃清東南齊一區宇使濟濟之風被於江漢世祖以兵久勞不從以散騎常侍徴還從征涼州以功賜𨽻戸一百義隆遣將裴方明胡崇之宼仇池以楚之為假節與淮陽公皮豹子等督關中諸軍從散闗西入擊走方明擒崇之仇池平而還車駕伐蠕蠕詔楚之與濟隂公廬中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕說令擊楚之等以絶糧運蠕蠕乃遣奸覘入楚之軍截驢耳而去有告失驢耳者諸將莫能察楚之曰必是覘賊截之以為驗耳賊將至矣即使軍人伐柳為城水灌之令凍城立而賊至冰峻城固不可攻逼賊乃走散世祖聞而嘉之尋拜假節侍中鎮西大將軍開府儀同三司雲中鎮大將朔州刺史王如故在邊二十餘年以清儉著聞和平五年薨時年七十五髙宗悼惜之贈都督梁益秦寧四州諸軍事征南大將軍領䕶西戎校尉揚州刺史諡貞王陪𦵏金陵長子寳𦙍與楚之同入國拜中書博士鴈門太守卒楚之後尚諸王女河内公主生子金龍字榮則少有父風初為中書學生入為中散顯祖在東宫擢為太子侍講後襲爵拜侍中鎮西大將軍開府雲中鎮大將朔州刺史徴為吏部尚書太和八年薨贈大將軍司空公冀州刺史諡康王贈絹一千疋金龍初納太尉隴西王源賀女生子延宗次纂次悦後娶沮渠氏生徽亮即河南王沮渠牧犍女世祖妹武威公主所生也有寵於文明太后故以徽亮襲例降為公坐連穆泰罪失爵延宗父亡後數年卒子裔字承業世宗時悦等為裔理嫡還襲祖爵位至後軍將軍卒贈征虜將軍洛州刺史子蔵襲齊受禪例降纂字茂宗中書博士厯司州治中别駕河内邑中正永平元年卒贈鎮逺將軍南青州刺史諡曰肅子澄字元鏡司州秀才司空功曹參軍給事中卒贈龍驤將軍夏州刺史澄弟仲粲武定中尚書左丞悦字慶宗自司空司馬出為立節將軍建興太守轉寜朔將軍司州别駕遷太子左衛率河北太守世宗初除鎮逺將軍豫州刺史時有汝南上蔡董毛奴者齎錢五千死在道路郡縣疑民張堤為刦又於堤家得錢五千堤懼拷掠自誣言殺獄既至州悦觀色察言疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺此賊竟遺何物靈之云唯得一刀鞘而已悦取鞘視之曰此非里卷所為也乃召州城刀匠示之有郭門者前曰此刀鞘門手所作去嵗賣與郭民董及祖悦收及祖詰之曰汝何故殺人取錢而遺刀鞘及祖欵引靈之又於及祖身上得毛奴所著皂襦及祖伏法悦之察獄多此類也豫州于今稱之悦與鎮南將軍元英攻義陽克之詔改蕭衍司州為郢州以悦為征虜將軍郢州刺史蕭衍遣其豫州刺史馬仙琕左軍將軍永陽戍主陳可等率衆一萬於三闗南六十里因山起城名為竹墩遣其輔國將軍濟隂太守薊沛精卒二千以戌之後於闗南四十里麻陽舊柵起城仙琕輕騎東南為之節度闗南之民多懐兩望悦令西闗統軍諸靈鳯掩擊敗之盡燔其城樓儲積擒薊沛及其輔國將軍軍主劉靈秀詔曰司馬悦首謀義陽征略有㨗且違京既久屢請入朝可遂此志聼其赴闕尋詔以本將軍為豫州刺史論義陽之勲封漁陽縣開國子食邑三百户永元元年城人白早生謀為叛逆遂斬悦首送蕭衍既而邢巒復懸瓠詔曰司馬悦暴罹横酷身首異所國戚舊勲特可悼念主書董紹銜命公行囚漂殊域事可矜愍尚書可量賊將齊茍兒等四人之中分遣二人勑揚州為移以易悦首及紹迎接還本用慰亡存贈平東將軍青州刺史賜帛三百疋諡曰荘子朏襲爵朏尚世宗妹華陽公主拜駙馬都尉特除員外散騎常侍加鎮逺將軍正光五年公主薨月餘朏卒贈左將軍滄州刺史子鴻字慶雲性麤武襲爵位至都水使者坐與西賊交通賜死子孝政襲齊受禪爵例降金龍弟躍字寳龍尚趙郡公主拜駙馬都尉代兄為雲中鎮將朔州刺史假安北將軍河内公躍表罷河西苑封與民墾殖有司執奏此麋鹿所聚太官取給今若與民至於奉獻時禽懼有所闕詔曰此地若任稼穡雖有獸利事湏廢封若是山澗虞禁何損尋先朝置此豈茍藉斯禽亮亦以俟軍行薪蒸之用其更論之躍固請宜以與民髙祖從之還為祠部尚書大鴻臚卿頴川王師以疾表求解任太和十九年卒贈金紫光禄大夫賜朝服一具衣一襲絹一千匹楚之父子相繼鎮雲中朔土服其威徳司馬景之字洪略晉汝南王亮之後太宗時歸闕爵蒼梧公加征南大將軍清直有節操太宗甚重之卒贈汝南王子師子襲爵景之兄準字巨之以泰常末率三千餘家歸國時太宗在虎牢授寧逺將軍新蔡公假相州刺史隨駕至京出除廣寗太守悦近來逺清儉有稱世祖嘉之賜布六百疋後降號為平逺將軍改為密陵侯興光初卒子安國襲爵司馬叔璠晉安平獻王孚之後也父曇之司馬徳宗河間王桓元劉裕之際叔璠與兄國璠北奔慕容超後西投姚興劉裕滅姚泓北奔屈丐世祖平統萬兄弟俱入國國璠賜爵淮南公卒無子爵除叔璠安逺將軍丹楊侯卒長子靈夀神䴥中與弟道夀俱來歸國靈夀冠軍將軍温縣侯道夀寜朔將軍宜陽子靈夀出除陳郡太守劉義隆侵境詔靈夀招引義士得二千餘人從西平公安頡破虎牢滑臺洛陽三城徙五百餘家入河内又從討蠕蠕西征涼州所在著功出為遼西太守治有清儉之稱太和九年卒贈懐州刺史諡曰靖靈夀娶太宰頓丘王李峻女與婦父雅不相善每見抑退故位不大至子恵安髙祖時襲爵厯恒州别駕桑乾太守太尉諮議參軍事卒子祖珍年十五舉司州秀才解褐員外散騎侍郎年十八先父卒祖珍弟宗龎世宗時父恵安以久病啓以爵轉授解褐安定王府騎兵參軍洛州龍驤府司馬善射未曽自伐性閑淡少所交遊識者云其淳至永安中卒子嵩亮襲恵安弟直安歴位尚書郎濟北濟南二郡太守員外散騎常侍蕭寳夤征鍾離引為長史坐軍退免官加刑以疾得免尋除東平原太守還京為中散大夫加征虜將軍太中大夫遷左將軍正光四年卒贈大將軍濟州刺史子龍泉滄州開府長史道夀長子元興襲父爵子景和給事中稍遷揚州驃騎府長史清河内史正光元年卒贈左將軍平州刺史元興弟仲明侍御史中書舍人以謹敏著稱稍遷衛尉少卿仍領舍人出為征虜將軍涼州刺史坐貪殘為御史所彈遇赦免積年不敘後娶靈太后從姊為繼室除武衛將軍征虜將軍轉光祿大夫武衛如故遷大司農卿加安東將軍散騎常侍出為安北將軍恒州刺史常侍如故正光五年卒子彦邕有風望正員郎稍遷相州刺史驃騎大將軍左光禄大夫天平四年卒贈散騎常侍都督懐洛二州諸軍事驃騎大将軍儀同三司懐州刺史司馬天助自云司馬徳宗驃騎將軍元顯之子劉裕自立乃來歸闕除平東將軍青徐二州刺史東海公天助招率義士欲襲裕東平濟北二郡及城戌又破裕將閭萬齡軍前後多所虜獲拜侍中都督青徐兖三州諸軍事征東將軍青兖二州刺史公如故真君三年與司馬文思等南討還又從駕北征在陣殁子元伯字歸都襲爵後降温縣子太和中為建威將軍泰山太守史臣曰諸司馬以亂亡歸命楚之風槩器略最可稱乎其餘未足論也而以往代遺緒竝當位遇可謂幸矣魏書卷三十七魏書卷三十七考證司馬叔璠傳丹楊侯楊一本作陽晉書地理志丹陽郡有丹楊縣注丹陽山多赤柳在西也今人槩改楊為陽誤矣魏書巻三十七考證
