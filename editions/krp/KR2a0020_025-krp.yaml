body:
  text: 魏書卷二十五齊魏收撰列傳第十三長孫嵩長孫道生長孫嵩代人也太祖賜名焉父仁昭成時為南部大人嵩寛雅有器度年十四代父統軍昭成末年諸部乖亂苻堅使劉庫仁攝國事嵩與元他等率部衆歸之劉顯之謀難也嵩率舊人及鄉邑七百餘家叛顯走將至五原時寔君之子亦聚衆自立嵩欲歸之見于烏渥稱逆父之子勸嵩歸太祖嵩未决烏渥回其牛首嵩僶俛從之見太祖于三漢亭太祖承大統復以為南部大人累著軍功後從征中山除冀州刺史賜爵鉅鹿公歴侍中司徒相州刺史封南平公所在著稱太宗即位與山陽侯奚斤北新侯安同白馬侯崔宏等八人坐止車門右聴理萬幾故世號八公晉將劉裕之伐姚泓太宗假嵩節督山東諸軍事𫝊詣平原縁河北岸列軍次於畔城軍頗失利詔假裕道裕於舟中望嵩麾蓋遺以酃酒及江南食物嵩皆送京師詔嵩厚答之又𠡠簡精兵為戰備若裕西過者便率精銳南出彭沛如不時過但引軍隨之彼至崤陜間必與姚泓相持一死一傷衆力疲敝比及秋月徐乃乗之則裕首可不戰而懸於是叔孫建等尋河趣洛遂入關嵩與建等自成臯南濟晉諸屯戍皆望塵奔潰裕剋長安嵩乃班師太宗寢疾問後事於嵩嵩曰立長則順以徳則人服今長皇子賢而世嫡天所命也請立乃定䇿禁中於是詔世祖臨朝監國嵩為左輔世祖即位進爵北平王司州中正詔問公卿赫連蠕蠕征討何先嵩與平陽王長孫翰司空奚斤等曰赫連居上未能為患蠕蠕世為邊害宜先討大檀及則收其畜産足以富國不及則校獵隂山多殺禽獸皮肉筋角以充軍實亦愈於破一小國太常崔浩曰大檀遷徙鳥逝疾追則不足經久大衆則不能及之赫連屈丐土宇不過千里其刑政殘虐人神所弃宜先討之尚書劉潔武京侯安原請先平馮䟦帝黙然遂西廵狩後聞屈丐死關中大亂議欲征之嵩等曰彼若城守以逸代勞大檀聞之乗虚而寇危道也帝乃問幽微於天師寇謙之謙之勸行杜超之贊成之崔浩又言西伐利嵩等固諫不可帝大怒責嵩在官貪汚使武士頓辱尋遷太尉久之加柱國大將軍自是輿駕征伐嵩以元老多留鎮京師坐朝堂平斷刑獄薨年八十諡曰宣王後髙祖追録先朝功臣以嵩配饗朝庭子頽善騎射彎弓三百斤襲爵加侍中征南大將軍有罪黜為戍兵後復爵薨諡曰安王子敦字孝友位北鎮都將坐黷貨降為公髙祖時自頌先世勲重復其王爵薨諡簡王子道字念僧襲爵久之隨例降為公位右衛將軍卒諡慎子悦襲爵建義初復本王爵尋降為公位光禄少卿卒贈司空長孫道生嵩從子也忠厚廉謹太祖愛其慎重使掌幾密與賀毗等四人内侍左右出入詔命太宗即位除南統將軍冀州刺史後取人美女以獻太宗切責之以舊臣不加罪黜世祖即位進爵汝隂公遷廷尉卿從征蠕蠕與尉眷等率衆出白黑兩漠間大㨗而還世祖征赫連昌道生與司徒長孫翰宗正娥清為前驅遂平其國昌弟定走保平凉劉義隆遣將到彦之王仲徳寇河南以救定詔道生與丹陽王太之屯河上以禦之遂誘義隆將檀道濟邀其前後追至歴城而還除司空加侍中進封上黨王薨年八十二贈太尉諡曰靖道生廉約身為三司而衣不華飾食不兼味一熊皮鄣泥數十年不易時人比之晏嬰第宅卑陋出鎮後其子弟頗更修繕起堂廡道生還歎曰昔霍去病以匈奴未滅無用家為今彊寇尚遊魂漠北吾豈可安坐華美也乃切責子弟令毁宅其恭慎如此世祖世所在著績毎建大議多合時機為將有權略善待士衆帝命歌工歴頌羣臣曰智如崔浩廉如道生及年老頗惑其妻孟氏以此見譏與從父嵩俱為三公當世以為榮子抗位少卿早卒抗子觀少以壯勇知名後襲祖爵上黨王時異姓諸王襲爵多降為公帝以其祖道生佐命先朝故特不降以征西大將軍假司空督河西七鎮諸軍討吐谷渾部帥拾寅遁蔵焚其所居城邑而還髙祖初拜殿中尚書侍中吐谷渾又侵逼復假觀司空討降之後為征南大將軍薨諡曰定𦵏禮依其祖靖王故事陪𦵏雲中金陵子冀歸六嵗襲爵降為公髙祖以其㓜承家業賜名稚字承業稚聰敏有才藝虚心愛士為前將軍從髙祖南討授七兵尚書太常卿右將軍世宗時侯剛子淵稚之女壻剛為元义所厚故稚驟得轉進出為撫軍大將軍領揚州刺史假鎮南大將軍都督淮南諸軍事蕭衍將裴邃虞鴻襲據夀春稚諸子驍果邃頗難之號曰鐵小兒詔河間王琛總衆援之琛欲決戰稚以雨久更須持重琛弗從遂戰為賊所乗稚後殿初稚既總彊兵久不決戰議者疑有異圖朝廷重遣河間王琛及臨淮王彧尚書李憲等三都督外聲助稚内實防之會鮮于脩禮反於中山以稚為大都督北討尋以本使達鄴城詔稚解行臺罷大使遣河間王琛為大都督酈道元為行臺稚遣子子裕奉表稱與琛同在淮南俱當國難琛敗臣全遂生私隙且臨機奪帥非算所長書奏不納琛與稚前到呼沱稚未欲戰而琛不從行達五鹿為脩禮邀繫琛不赴之賊總至遂大敗稚與琛竝除名尋而正平郡蜀反復假稚鎮西將軍討蜀都督頻戰有功除平東將軍復本爵後除尚書右僕射未幾雍州刺史蕭寳夤據州反復以稚為行臺討之稚時背疽未愈靈太后勞之曰卿疹源如此朕欲相停更無可寄如何稚答曰死而後已敢不自力時子彦亦患脚痺扶杖入辭尚書僕射元順顧相謂曰吾等備位大臣各居寵位危難之日病者先行無乃不可乎莫有對者時薛鳳賢反於正平薛脩義屯聚河東分據鹽池攻圍蒲坂東西連結以應寳夤稚乃據河東時有詔廢鹽池税稚上表曰鹽池天資賄貨密邇京畿唯須寳而護之均贍以理今四境多虞府蔵罄竭然冀定二州且亡且亂常調之絹不復可收仰惟府庫有出無入必須經綸出入相補略論鹽稅一年之中凖絹而言猶不應減三十萬匹也便是移冀定二州置於畿甸今若廢之事同再失臣前仰違嚴㫖不先討關賊而解河東者非是閑長安而急蒲坂蒲坂一陷沒失鹽池三軍口命濟贍理絶天助大魏兹計不爽昔髙祖昇平之年無所乏少猶創置鹽官而加典護非為物而競利恐由利而亂俗也况今王公素餐百官尸禄租徵六年之粟調折來嵗之資此皆出人私財奪人膂力豈是願言事不獲已臣輙符司堅將尉還率所部依常收稅更聴後𠡠稚克寳夤將侯終徳寳夤出走雍州平除雍州刺史莊帝初封上黨王尋改馮翊王後降為郡公遷司徒公加侍中兼尚書令大行臺仍鎮長安前廢帝立遷大尉公録尚書事及韓陵之敗斛斯椿先據河橋謀誅尒朱使稚八洛啟帝誅世隆兄弟之意出帝初轉太傅録尚書事以定䇿功更封開國子稚表請回授其姨兄廷尉卿元洪超次子惲初稚生而母亡為洪超母所撫養是以求讓許之出帝入關稚時鎮虎牢亦隨赴長安稚妻張氏生二子子彦子裕後與羅氏私通遂殺其夫棄張納羅羅年大稚十餘嵗妬忌防限稚雅相愛敬旁無姻妾僮侍之中嫌疑致死者乃有數四羅生三子紹逺士亮季亮兄弟皆廉武稚少輕俠闘鷄走馬力争殺人因亡抵龍門將陳興徳家㑹赦乃免因以後妻羅前夫女吕氏妻興徳兄興恩以報之子彦本名儁有膂力以累從父征討功封槐里縣子出帝與齊獻武王構隙加子彦中軍大都督行臺僕射鎮𢎞農以為心膂後從帝入關子彦少常墜馬折臂肘上骨起寸餘乃命開肉鋸骨流血數升言戲自若時以為踰於關羽子裕位衛尉少卿魏書卷二十五魏書卷二十五考證列𫝊第十三魏收書闕後人所補長孫嵩𫝊見太祖於三漢亭三北史作二長孫道生𫝊子抗抗北史作瓬魏書卷二十五考證
