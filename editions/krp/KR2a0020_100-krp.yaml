body:
  text: 魏書卷一百齊魏收撰列傳第八十八髙句麗百濟勿吉失韋豆莫婁地豆干厙莫奚契丹烏洛侯髙句麗者出於夫餘自言先祖朱蒙朱蒙母河伯女為夫餘王閉於室中為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與犬犬不食棄之與豕豕又不食棄之於路牛馬避之後棄之野衆鳥以毛茹之夫餘王割剖之不能破遂還其母其母以物裹之置於暖處有一男破殻而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘人以朱蒙非人所生将有異志請除之王不聽命之飬馬朱蒙毎私試知有善惡駿者减食令痩駑者善飬令肥夫餘王以肥者自乘以痩者給朱蒙後狩于田以朱蒙善射限之一矢朱蒙雖矢少殪獸甚多夫餘之臣又謀殺之朱蒙母隂知告朱蒙曰國将害汝以汝才略宜逺適四方朱蒙乃與烏引烏違等二人棄夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鼈並浮為之成橋朱蒙得渡魚鼈乃解追騎不得渡朱蒙遂至普述水遇見三人其一人著麻衣一人著衲衣一人著水藻衣與朱蒙至紇升骨城遂居焉號曰髙句麗因以為氏焉初朱蒙在夫餘時妻懐孕朱蒙逃後生一子字始閭諧及長知朱蒙為國主即與母亡而歸之名之曰閭逹委之國事朱蒙死閭達代立閭達死子如栗代立如栗死子莫來代立乃征夫餘夫餘大敗遂綂屬焉莫來子孫相𫝊至裔孫宫生而開目能視國人惡之及長凶虐國以殘破宫曾孫位宫亦生而視人以其似曾祖宫故名為位宫髙句麗呼相似為位位宫亦有勇力便弓馬魏正始中入冦遼西安平為幽州刺史母丘儉所破其𤣥孫乙弗利利子釗烈帝時與慕容氏相攻擊建國四年慕容元真率衆伐之入自南陕戰於木底大破釗軍乘勝長驅遂入丸都釗單馬奔竄元真掘釗父墓載其屍并掠其母妻珍寳男女五萬餘口焚其宫室毁丸都城而還自後釗遣使來朝阻隔冦讎不能自達釗後為百濟所殺世祖時釗曾孫璉始遣使者安東奉表貢方物并請國諱世祖嘉其誠欵詔下帝系名諱於其國遣員外散騎侍郎李敖拜璉為都督遼海諸軍事征東将軍領䕶東夷中郎将遼東郡開國公髙句麗王敖至其所居平壤城訪其方事云遼東南一千餘里東至柵城南至小海北至舊夫餘民户参倍於前魏時其地東西二千里南北一千餘里民皆土著随山谷而居衣布帛及皮土田薄塉蠶農不足以自供故其人節飲食其俗媱好歌舞夜則男女羣聚而戯無貴賤之節然潔浄自喜其王好治宫室其官名有謁奢太奢大兄小兄之號頭著折風其形如弁旁揷鳥羽貴賤有差立則反拱跪拜曵一脚行歩如走常以十月祭天國中大會其公會衣服皆錦繡金銀以為飾好蹲踞食用俎几出三尺馬云本朱蒙所乘馬種即果下也後貢使相尋歲致黄金二百斤白銀四百斤時馮文通率衆奔之世祖遣散騎常侍封撥詔璉令送文通璉上書稱當與文通俱奉王化竟不送世祖怒欲往討之樂平王丕等議待後舉世祖乃止而文通亦尋為璉所殺後文明太后以顕祖六宫未備勅璉令薦其女璉奉表云女已出嫁求以弟女應㫖朝廷許焉乃遣安樂王真尚書李敷等至境送幣璉惑其左右之説云朝廷昔與馮氏婚姻未幾而㓕其國殷鑒不逺宜以方便辭之璉遂上書妄稱女死朝廷疑其矯詐又遣假散騎常侍程駿切責之若女審死者聽更選宗淑璉云若天子恕其前愆謹當奉詔會顯祖崩乃止至髙祖時璉貢獻倍前其報賜亦稍加焉時光州於海中得璉所遣詣蕭道成使餘奴等髙祖詔責璉曰道成親殺其君竊號江左朕方欲興㓕國於舊邦繼絶世於劉氏而卿越境外交逺通簒賊豈是藩臣守節之義今不以一過掩卿舊欵即送還藩其感恕思愆祗承明憲輯寕所部動静以聞太和十五年璉死年百餘歲髙祖舉哀於東郊遣謁者僕射李安上䇿贈車騎大将軍太傅遼東郡開國公髙句麗王諡曰康又遣大鴻臚拜璉孫雲使持節都督遼海諸軍事征東将軍領䕶東夷中郎将遼東郡開國公髙句麗王賜衣冠服物車旗之飾又詔雲遣世子入朝令及郊丘之禮雲上書辭疾惟遣其從叔升于随使詣闕嚴責之自此歲常貢獻正始中世祖於東堂引見其使芮悉弗悉弗進曰髙麗係誠天極累葉純誠地産土毛無愆王貢但黄金出自夫餘珂則渉羅所産今夫餘為勿吉所逐渉羅為百濟所并國王臣雲惟繼絶之義悉遷于境内二品所以不登王府實两賊是為世宗曰髙麗世荷上将專制海外九夷黠虜實得征之瓶罄罍恥誰之咎也昔方貢之愆責在連率卿宜宣朕㫖於卿主務盡威懐之略揃披害羣輯寧東裔使二邑還復舊墟土毛無失常貢也神龜中雲死靈太后為舉哀於東堂遣使䇿贈車騎大将軍領䕶東夷校尉遼東郡開國公髙句麗王又拜其世子安為安東将軍領䕶東夷校尉遼東郡開國公髙句麗王正光初光州又於海中執得蕭衍所授安寕東将軍衣冠劍佩及使人江法盛等送於京師安死子延立出帝初詔加延使持節散騎常侍車騎大将軍領䕶東夷校尉遼東郡開國公髙句麗王賜衣冠服物車旗之飾天平中詔加延侍中驃騎大将軍餘悉如故延死子成立訖於武定末其貢使無歲不至百濟國其先出自夫餘其國北去髙句麗千餘里處小海之南其民土著地多下濕率皆山居有五榖其衣服飲食與髙句麗同延興二年其王餘慶始遣使上表曰臣建國東極豺狼隔路雖世承靈化莫由奉藩瞻望雲闕馳情罔極凉風微應伏惟皇帝陛下協和天休不勝係仰之情謹遣私署冠軍将軍駙馬都尉弗斯侯長史餘禮龍􅋮将軍帶方太守司馬張茂等投舫波阻搜徑𤣥津託命自然之運遣進萬一之誠冀神祗垂感皇靈洪覆克達天庭宣暢臣志雖旦聞夕没永無餘恨又云臣與髙句麗源出夫餘先世之時篤崇舊欵其祖釗輕廢隣好親率士衆陵踐臣境臣祖湏整旅電邁應機馳擊矢石暫交梟斬釗首自爾已來莫敢南顧自馮氏數終餘燼奔竄醜類漸盛遂見陵逼構怨連禍三十餘載財殚力竭轉自孱踧若天慈曲矜逺及無外速遣一将來救臣國當奉送鄙女執埽後宫并遣子弟牧圉外廐尺壌匹夫不敢自有又云今璉有罪國自魚肉大臣彊族戮殺無已罪盈惡積民庶崩離是㓕亡之期假手之秋也且馮族士馬有鳥畜之戀樂浪諸郡懐首丘之心天威一舉有征無戰臣雖不敏志效畢力當率所綂承風響應且髙麗不義逆詐非一外慕隗囂藩卑之辭内懐兇禍豕突之行或南通劉氏或北約蠕蠕共相脣齒謀陵王略昔唐堯至聖致罰丹水孟嘗稱仁不捨塗詈涓流之水宜早壅塞今若不取将貽後悔去庚辰年後臣西界小石山北國海中見屍十餘并得衣噐鞍勒視之非髙麗之物後聞乃是王人來降臣國長蛇隔路以沉於海雖未委當深懐僨恚昔宋戮申舟楚荘徒跣鷂撮放鳩信陵不食充敵建名美隆無已夫以區區偏鄙猶慕萬代之信况陛下合氣天地勢傾山海豈令小豎跨塞天逵今上所得鞍一以為實騐顕祖以其僻逺冒險朝獻禮遇優厚遣使者邵安與其使俱還詔曰得表聞之無恙甚喜卿在東隅處五服之外不逺山海歸誠魏闕欣嘉至意用戢于懐朕承萬世之業君臨四海綂御羣生今宇内清一八表歸義襁負而至者不可稱數風俗之和士馬之盛皆餘禮等親所聞見卿與髙麗不穆屢致陵犯茍能順義守之以仁亦何憂於冦讎也前所遣使浮海以撫荒外之國從來積年往而不返存亡達否未能審悉卿所送鞍比校舊乗非中國之物不可以疑似之事以生必然之過經略權要已具别㫖又詔曰知髙麗阻疆侵軼卿土修先君之舊怨棄息民之大徳兵交累載難結荒邉使兼申胥之誠國有楚越之急乃應展義扶微乗機電舉但以髙麗稱藩先朝供職日久於彼雖有自昔之釁於國未有犯令之愆卿使命始通便求致伐尋討事會理亦未周故往年遣禮等至平壌欲騐其由状然髙麗奏請頻煩辭理俱詣行人不能抑其請司法無以成其責故聽其所啟詔禮等還若今復違㫖則過咎益露後雖自陳無所逃罪然後興師討之於義為得九夷之國世居海外道暢則奉藩惠戢則保境故羈縻著於前典楛貢曠於歳時卿備陳彊弱之形具列往代之迹俗殊事異擬貺乖衷洪規大略其致猶在今中夏平一宇内無虞毎欲陵威東極懸旌域表拯荒黎於偏方舒皇風於逺服身由髙麗即叙未及卜征今若不從詔㫖則卿之來謀載協朕意元戎啟行将不云逺便可豫率同興具以待事時遣報使速究彼情師舉之日卿為鄉導之首大㨗之後又受元功之賞不亦善乎所獻錦布海物雖不悉達明卿至心今賜雜物如别又詔璉䕶送安等安等至髙句麗璉稱昔與餘慶有讎不令東過安等於是皆還乃下詔切責之五年使安等從東萊浮海賜餘慶璽書褒其誠節安等至海濱遇風飄蕩竟不達而還勿吉國在髙句麗北舊肅慎國也邑落各自有長不相總一其人勁悍於東夷最彊言語獨異常輕豆莫婁等國諸國亦患之去洛五千里自和龍北二百餘里有善玉山山北行十三日至祁黎山又北行七日至如洛瓌水水廣里餘又北行十五日至太魯水又東北行十八日到其國國有大水濶三里餘名速末水其地下濕築城穴居屋形似塜開口於上以梯出入其國無牛有車馬佃則偶耕車則歩推有粟及麥穄菜則有葵水氣醎凝鹽生樹上亦有鹽池多䐗無羊嚼米醖酒飲能至醉婦人則布裙男子䐗犬皮裘初婚之夕男就女家執女乳而罷便以為定仍為夫婦俗以人溺洗手面頭揷虎豹尾善射獵弓長三尺箭長尺二寸以石為鏃其父母春夏死立埋之冢上作屋不令雨濕若秋冬以其屍捕貂貂食其肉多得之常七八月造毒藥傅箭鏃射禽獸中者便死煑藥毒氣亦能殺人國南有徒太山魏言太皇有虎豹羆狼不害人人不得山上溲汙行逕山者皆以物盛去延興中遣使乙力支朝獻太和初又貢馬五百匹乙力支稱初發其國乘船泝難河西上至太􅀈河沉船於水南出陸行渡洛孤水從契丹西界達和龍自云其國先破髙句麗十落宻共百濟謀從水道并力取髙句麗遣乙力支奉使大國請其可否詔勑三國同是藩附宜共和順勿相侵優乙力支乃還從其來道取得本船汎達其國九年復遣使侯尼支朝獻明年復入貢其傍有大莫盧國覆鍾國莫多囘國庫婁國素和國具弗伏國匹黎尒國拔大何國郁羽陵國庫伏真國魯婁國羽真侯國前後各遣使朝獻太和十二年勿吉復遣使貢楛矢方物於京師十七年又遣使人婆非等五百餘人朝獻景明四年復遣使侯力歸等朝貢自此迄于正光貢使相尋爾後中國紛優頗或不至興和二年六月遣使石久云等貢方物至於武定不絶失韋國在勿吉北千里去洛六千里路出和龍北千餘里入契丹國又北行十日至啜水又北行三日有蓋水又北行三日有犢了山其山髙大周囘三百餘里又北行三日有大水名屈利又北行三日至刃水叉北行五日到其國有大水從北而來廣四里餘名捺水國土下濕語與厙莫奚契丹豆莫婁國同頗有粟麥及穄唯食猪魚飬牛馬俗又無羊夏則城居冬逐水草亦多貂皮丈夫索髪用角弓其箭尤長女婦束髪作义手髻其國少竊盗盗一徴三殺人者責馬三百匹男女悉衣白鹿皮襦袴有麴釀酒俗愛赤珠為婦人飾穿挂於頸以多為貴女不得此乃至不嫁父母死男女聚哭三年屍則置於林樹之上武定二年四月始遣使張焉豆伐等獻其方物迄武定末貢使相尋豆莫婁國在勿吉國北千里去洛六千里舊北扶餘也在失韋之東東至於海方二千里其人土著有宫室倉庫多山陵廣澤於東夷之域最為平敞地宜五榖不生五果其人長大性彊勇謹厚不冦抄其君長皆以六畜名官邑落有豪帥飲食亦用俎豆有麻布衣制類髙麗而幅大其國大人以金銀飾之用刑嚴急殺人者死没其家人為奴婢俗婬尤惡妬婦妬者殺之尸其國南山上至腐女家欲得輸牛馬乃與之或言本穢貊之地也地豆干國在失韋西千餘里多牛羊出名馬皮為衣服無五榖惟食肉酪延興二年八月遣使朝貢至于太和六年貢使不絶十四年頻來犯塞髙祖詔征西大将軍陽平王頤擊走之自後時朝京師迄武定末貢使不絶厙莫奚國之先東部宇文之别種也初為慕容元真所破遺落者竄匿松漠之間其民不絜浄而善射獵好為冦鈔登國三年太祖親自出討至弱洛水南大破之獲其四部落馬牛羊豕十餘萬帝曰此羣狄諸種不識徳義互相侵盗有犯王略故往征之且䑕竊狗盗何足為患今中州大亂吾先平之然後張其威懐則無所不服矣既而車駕南還雲中懐服燕趙十數年間諸種與庫莫奚亦皆滋盛乃開遼海置戍和龍諸夷震懼各獻方物髙宗顯祖世厙莫奚歳致名馬文皮髙祖初遣使朝貢太和四年輙入塞内辭以畏地豆干鈔掠詔書切責之二十二年入冦安州營燕幽三州兵數千人擊走之後復欵附毎求入塞與交易詔曰厙莫奚去太和二十一年以前與安營二州邉民参居交易往來並無疑貳至二十二年叛逆以來遂爾逺竄今雖欵附猶在塞表毎請入塞與民交易若抑而不許乖其歸向之心聽而不虞或有萬一之警不容依先任其交易事宜限節交市之日州遣上佐監之自是已後歳常朝獻至於武定末不絶契丹國在厙莫奚東異種同類俱竄於松漠之間登國中國軍大破之遂逃迸與厙莫奚分背經數十年稍滋蔓有部落於和龍之北數百里多為冦盗真君以來求朝獻歳貢名馬顯祖時使莫弗紇何辰奉獻得班饗於諸國之末歸而相謂言國家之美心皆忻慕於是東北羣狄聞之莫不思服悉萬丹部何大何部伏弗郁部羽陵部日連部匹絜部黎部吐六于部等各以其名馬文皮入獻天府遂求為常皆得交市於和龍宻雲之間貢獻不絶太和三年髙句麗竊與蠕蠕謀欲取地豆干以分之契丹懼其侵軼其莫弗賀勿干率其部落車三千乘衆萬餘口驅徒雜畜求入内附止於白狼水東自此歳常朝貢後告饑髙祖矜之聽其入闗市糴及世宗肅宗時恒遣使貢方物熈平中契丹使人祖真等三十人還靈太后以其俗嫁娶之際以青氊為上服人給青氊两匹賞其誠欵之心餘依舊式朝貢至齊受禪常不絶烏洛侯國在地豆干之北去代都四千五百餘里其土下濕多霧氣而寒民冬則穿地為室夏則随原阜畜牧多豕有榖麥無大君長部落莫弗皆世為之其俗䋲髪皮服以珠為飾民尚勇不為姦竊故慢藏野積而無冦盗好獵射樂有箜篌木槽革面而施九弦其國西北有完水東北流合于難水其地小水皆注於難東入于海又西北二十日行有于已尼大水所謂北海也世祖真君四年來朝稱其國西北有國家先帝舊墟石室南北九十歩東西四十步髙七十尺室有神靈民多祈請世祖遣中書侍郎李敞告祭焉刋祝文於室之壁而還史臣曰夷狄之於中國羈縻而已髙麗歳修貢職東藩之冠榮哀之禮致自天朝亦為優矣其他碌碌咸知欵貢豈牛馬内向東風入律者也魏書卷一百魏書卷一百考證厙莫奚𫝊二十二年入冦安州冦監本誤作塞今改正又二十二年北史作二十年烏洛侯𫝊無大君長部落莫弗皆世為之臣人龍按北史室韋國𫝊云南室韋分為二十五部毎部有餘莫弗瞞咄猶酋長也北室韋分為九部落其部落渠帥號乞引莫賀咄毎部有莫何弗三人以貳之則此云莫弗亦酋長名也魏書卷一百考證
