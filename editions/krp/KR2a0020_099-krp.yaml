body:
  text: 魏書卷九十九齊魏收撰列傳第八十七私署凉州牧張寔鮮卑乞伏國仁鮮卑秃髮烏孤私署凉王李暠盧水胡沮渠蒙遜張寔字安遜安定烏氏人父軌字士彦散騎常侍以晋室多難隂圖保據河西求為凉州乃除持節䕶羌校尉凉州刺史桓帝西略也軌遣使貢其方物晋加號安西將軍封安樂鄉侯邑一千戸永嘉五年晋以軌為鎮西将軍都督隴右諸軍事封霸城侯尋進車騎大将軍開府儀同三司愍帝即位進拜司空封西平公邑三千户後拜侍中太尉凉州牧軌年老多疾拜寔撫軍大将軍副凉州刺史未幾軌風病積年三子代行州事閉絶音問莫能知者軌頗識天文毎州内有賊輿疾仰觀曰無能為害終如其言寔代綂任愍帝拜為使持節都督凉州諸軍事西中郎将凉州刺史領䕶羌校尉西平公劉曜䧟長安寔自稱侍中司空大都督凉州牧承制行事于時天下䘮亂秦雍之民死者十八九唯凉州獨全寔自恃衆彊轉為驕恣平文皇帝四年寔為左右閻沙等所殺先是謡曰蛇利砲蛇利砲公頭墜地而不覺寔所住室梁間有人象而無頭久之乃㓕寔惡之未幾見殺寔弟茂綂任茂字成遜私署使持節都督凉州諸軍事平西将軍䕶羌校尉凉州牧西平公誅閻沙等百餘人遣使朝貢茂妻弟賈模兄弟謀害茂茂殺之劉曜上隴茂懼而降曜以為太師凉王茂卒無子寔子駿綂任駿字公庭自稱使持節大将軍䕶羌校尉凉州牧西平公遣使朝貢煬帝時隴西人辛晏以枹罕降之駿遂有河南之地至於狄道與石勒分境駿築南城起謙光殿於其中窮珍極巧又四面各起一殿東曰宜陽青殿南曰朱陽赤殿面曰正徳白殿北曰𤣥武黒殿服章噐物皆依色隨四時居之其旁有直省寺署一依方色其奢僣如此民以勞怨駿議治石田参軍索孚諌曰凡為治者動不逆天機作不破地徳昔后稷之播百榖不墾磐石禹决江河不逆流勢今欲徙石為田運土殖榖計所損用畝盈百石所收不過三石而已竊所未安駿怒出孚為伊吾都尉有石隕於破胡燋而碎聲如擊鼓聞七百里其處氣上黒如煙煙首如赤飊駿少而淫佚常夜出微行姦亂邑里少年皆化之性又貪惏有圖秦隴意以榖帛付民歲收倍利利不充者簿賣田宅分武威武興西平張掖酒泉建康西海西郡湟河晋興廣武十一郡為凉州以長子重華為刺史金興晋城武始南安永晋大夏武城漢中八郡為河州以其寧戎校尉張瓘為刺史敦煌晋昌髙昌西域都䕶戊巳校尉玉門大䕶軍三郡三營為沙州以西胡校尉楊宣為刺史駿私署大都督大将軍假凉王督攝三州始置諸祭酒郎中大夫舍人謁者之官官號皆擬天朝而微辨其名舞六佾建豹尾車服旌旗一如王者軌保凉州隂澹之力駿以隂氏門宗彊盛忌之乃逼澹弟鑒令自殺由是大失人情駿既病見鑒為祟遂死時建國九年也子重華綂任重華字太林私署使持節大都督太尉公䕶羌校尉凉州牧平西公假凉王石虎遣麻秋率衆渡河城於長最凉州震動司馬張耽薦主簿謝艾於重華重華任之艾擊斬秋將纂母安等俘斬萬五千人重華遣使朝貢自署丞相凉王領秦雍凉三州牧重華死子曜靈綂任曜靈年十歲自稱大司馬凉州牧以重華兄祚為撫軍將軍輔政祚先蒸重華母馬氏宻説馬氏以曜靈㓜弱湏立長君馬從之遂廢曜靈而立祚曜靈尋為祚所殺祚字太伯既綂任自稱大将軍凉州牧凉公專為姦虐駿及重華子女未嫁者皆媱之凉州人士咸賦牆茨初重華末年有螽斯蟲集安昌門外緣壁逆行都尉常據諌曰螽斯是祚小字今乃逆行災之大者願出之重華曰子孫繁昌之徴何為災也吾昨夢祚攝位方委以周公之事輔翼世子而祚終殺曜靈焉自署凉王立宗廟置百官號和平元年遣使朝貢又追加軌以下王號濫殺謝艾於酒泉郎中丁琪諌祚僣竊祚斬琪於闕下廢諸神祀山川枯竭置五都尉司人姦過禁四品以下不得衣繒帛庶人不得畜奴婢乘車馬百姓怨憤有光状如車盖聲如雷震動城邑仲夏降霜有神降自稱𤣥冥與人交語祚日夜祈之神言與其福利祚信焉衆知祚必敗而祚暴虐彌甚明年祚河州刺史張瓘起兵討祚驍騎将軍宋混率衆應瓘混進攻姑臧祚遣侍中索孚伐瓘有王鸞者云師出必敗并陳祚三不道祚以妖言惑衆斬之鸞臨刑曰我死之後軍敗於外王死於内祚族之宋混至姑臧領軍趙長等開宫門應之入殿稱萬歲祚以長等破混也出勞之長以槊刺祚中額祚奔入為厨士徐黒所殺暴尸道左城内咸稱萬歲瓘等立重華少子元靖綂任元靖字元安自署使持節大都督大将軍凉王以瓘為尚書令凉州牧秉政宋混為尚書僕射瓘性猜惡賞罰皆以愛憎無復綱紀郎中殷郇陳損益諌瓘瓘曰虎生三日能食肉不湏人教由是莫有言者瓘與元靖参乘出城城北大橋三梁俱折瓘惡之乃日日散錢帛樹私惠而都街殺人朝朝不絶思為亂者十室而九東苑大冢上忽有池水城東大澤地忽火然廣數里乃殺宿嫌牛旋等以應水火之變瓘謀誅諸宋廢元靖自立先是太白守輿鬼占者以為州分當有暴兵故瓘欲猒之於是宋混率衆誅瓘瓘先殺妻子三十口乃自殺元靖以混為驃騎大将軍尚書令混病死弟元安代輔政以旱祈帶石山元安欲登之弟名犯世宗諱曰世人云登此山者破家身亡元安曰安有此也䇿馬登之馬倒傷足御史房屋柱自燃燋折或曰柱之為字也左木右主宋字含木木燋宋破而主存灾之大也宜防之又所乘馬五匹一夜中髭尾秃人曰尾之為字也尸下毛毛去尸絶㓕之徴元安曰吉凶在天知可如何未幾元安司馬張邕起兵殺元安盡誅宋氏先是謡曰㓕宋者田土子邕一名野邕刑殺過差内外復思為亂駿少子天錫因民心起兵殺邕以冠軍大将軍輔政元靖庶母郭氏以天錫擅權與張氏疎宗謀誅之事發天錫殺元靖而自立天錫字純嘏一名公純私署使持節大都督大将軍䕶羌校尉凉州牧凉王有火然於泥中天錫驕恣媱昬不恤民務元日與嬖人褻飲既闕二字羣臣朝賀又不省其母從事中郎張慮輿襯切諌且求大覲天錫不納昭成末苻堅遣将茍萇伐凉州破之天錫降於萇初駿時謡曰劉新婦簸米石新婦炊羖羝蕩滌簸張兒張兒食之口正披是時姑臧及諸郡國童兒皆歌之謂劉曜石虎並伐凉州不充至堅而降之也天錫至長安堅拜為尚書堅敗於夀春天錫奔建康鮮卑乞伏國仁出於隴西其先如弗自漠北南出五代祖祐隣并兼諸部部衆漸盛父司繁擁部落降於苻堅以為南單于又拜鎮西将軍鎮勇士川司繁死國仁代綂任苻堅之伐司馬昌明以國仁為前将軍領騎先鋒及堅之敗國仁叔歩頽叛於隴右堅令國仁討之歩頽大悦迎而推之招集部落衆十餘萬太祖時私署大都督大将軍大單于秦州河州牧號年建義署置官屬分部内為十一郡築勇士城以都之國仁死弟乾歸綂事自署大都督大将軍大單于河南王改年為太初置百官登國中遷於金城南門自壊乾歸惡之遷於苑川尋為姚興所破又奔枹罕遂降姚興興拜為河州刺史封歸義侯尋還苑川乾歸乃背姚興私稱秦王置百官年號更始遣使請援太宗許之後乾歸田於五谿梟集其手尋為兄子公府所殺子熾磐殺公府代綂位熾磐自稱大将軍河南王改年為永康後襲秃髪傉檀於樂都㓕之乃私署秦王置百官改年為建洪後遣其尚書郎莫胡積射将軍乞伏又寅等貢黄金二百斤請伐赫連昌世祖許之及世祖平綂萬熾磐乃遣其叔平逺将軍泥頭弟安逺将軍度質於京師又使其中書侍郎王愷丞相從事中郎烏訥闐奉表貢其方物熾磐死子暮末綂任暮末字安石跋既立改年為永洪其尚書隴西辛進曾隨熾磐遊於後園進弹鳥丸誤傷暮末母面至是殺進五族二十七人暮末弟殊羅蒸熾磐左夫人秃髪氏暮末知而禁之殊羅懼與叔父什夤謀殺暮末秃髮氏盗門鑰於内鑰誤門者告暮末收其黨與盡殺之欲鞭什夤什夤曰我負汝死不負汝鞕暮末怒刳其腹投屍於河什夤母弟白飬及去列頗有怒言又殺之政刑酷濫内外崩離部民多叛人思亂矣後為赫連定所逼遣王愷烏訥闐請迎於世祖世祖許以安定以西平凉以東封之暮末乃焚城邑毁寳噐率户萬五千至髙田谷為赫連定所拒遂保南安世祖遣使迎之暮末衛将軍吉毗固諌以為不宜内徙暮末從之赫連定遣其北平公韋代率衆一萬攻南安城内大飢人相食神麚四年暮末及宗族五百餘人出降送於上邽鮮卑秃髮烏孤八世祖匹孤自塞北遷於河西其地東至麥田牽屯西至濕羅南至澆河北接大漠匹孤死子夀闐綂任初母孕夀闐因寝産於被中乃名秃髮其俗為被覆之義五世祖樹機能壮果多謀略晋泰始中殺秦州刺史胡烈於髙斛堆敗凉州刺史蘇愉于金山咸寧中又斬凉州刺史楊欣於丹嶺盡有凉州之地後為部民没骨所殺從弟務丸綂任務丸曾孫思復犍部衆稍盛即烏孤父也思復犍死烏孤綂任皇始初吕光拜烏孤益州牧左賢王烏孤私署大都督大将軍大單于西平王年號太初天興初烏孤又稱武威王徙治樂都置車騎将軍已下分立郡縣烏孤因酒走馬馬倒傷脇笑曰幾為吕光父子所喜既而遂死弟凉州牧西平公利鹿孤綂任徙治西平改年建和使使朝貢遣弟車騎将軍傉檀拒吕纂纂士馬精鋭軍人大懼傉檀下馬據胡牀以安衆情乃貫甲交戰破纂軍二千餘級利鹿孤私署百官自丞相以下利鹿孤死傉檀綂任私署凉王還居樂都年號洪昌遣使朝貢天賜中傉檀詐降姚興興以傉檀為凉州刺史遂據姑臧與沮渠蒙遜戰於均石為蒙遜所敗傉檀又為赫連屈丐所破於陽武以數千騎奔南山幾為追騎所得懼東西冦至乃徙三百里内民於姑臧姚興乗釁遣将姚弼等至於城下傉檀驅牛羊於野弼衆採掠傉檀因分擊大破之弼乃退還傉檀又自署凉王署百官改號嘉平永興中盡衆伐沮渠蒙遜為蒙遜所敗於窮泉單馬歸姑臧懼蒙遜所㓕乃遷于樂都蒙遜以兵圍之築室反耕為持久之計傉檀以子保周為質於蒙遜蒙遜乃還神瑞初傉檀率騎擊乙弗虜大有擒獲而乞伏熾磐乗虚襲樂都充之執傉檀子虎臺以下傉檀聞之曰若歸熾磐便為奴僕豈忍見妻子在他懐中也引衆而西衆皆離散傉檀曰蒙遜熾磐昔皆委質於吾今而歸之不亦鄙哉四海之廣無所容身何其痛乎既乃歎曰吾老矣寕見妻子而死遂降熾磐熾磐待以上賓之禮用為驃騎大将軍封左南公歲餘鴆殺之傉檀少子賀後來奔自有𫝊李暠字元盛小字長生隴西狄道人也漢前将軍廣之後曾祖柔晉相國從事中郎北地太守祖太張祚武衞将軍父昶早卒暠遺腹子也皇始中吕光建康太守段業自稱凉州牧以敦煌太守孟敏為沙州刺史暠為效榖令敏死敦煌䕶軍郭謙等推暠為寕朔将軍敦煌太守業私稱凉王暠詐臣於業業以暠為鎮西将軍天興中暠私署大都督大将軍䕶羌校尉秦凉二州牧凉公年號庚子居敦煌遣使朝貢天賜中改年建初遷於酒泉歲修職貢暠死子歆綂任歆字士業自稱大都督大将軍䕶羌校尉凉州牧凉公號年嘉興元年大破沮渠蒙遜於解支澗獲七千餘級遣使朝貢歆聞蒙遜南伐乞伏乃起兵攻張掖其母尹氏謂歆曰汝新造之國地狹民希蒙遜驍武汝非其敵吾觀其數年以來經謀規略有兼并之志且天時人事似欲歸之度徳量力春秋之義先王遺令深慎兵戰保境寕民俟時而動言猶在耳奈何忘之汝必行也非唯師敗國亦亡矣歆不從遂率歩騎三萬東伐次於都瀆澗蒙遜自浩舋拒歆戰于懐城為蒙遜所敗左右勸歆還酒泉歆曰吾違太后明敕逺取敗辱不殺此胡復何面目見吾母也勒衆復戰敗於蓼泉為蒙遜所殺蒙遜遂充酒泉歆之未敗有一大蛇從南門而入至歆恭徳殿前有雙雉飛出宫内通街大樹上有烏鵲争巢鵲為烏所殺敦煌父老令狐熾夢一白頭公帢衣而謂曰南風動吹長木胡桐椎不中轂言訖忽然不見歆小字桐椎至是而亡歆弟敦煌太守恂復自立于敦煌稱冠軍将軍凉州刺史蒙遜攻恂于敦煌三面起堤以水灌城恂請降不許城陷恂自殺蒙遜充敦煌恂兄飜子寳後入國自有𫝊胡沮渠蒙遜本出臨松盧水其先為匈奴左沮渠遂以官為氏蒙遜􅉸稽有權變頗曉天文為諸胡所歸吕光殺其伯父西平太守羅仇蒙遜聚衆萬餘屯於金山與從兄晋昌太守男成共推建康太守段業為使持節大都督龍驤大将軍凉州牧建康公稱神璽元年業以蒙遜為張掖太守封臨池侯男成為輔國将軍委以軍國之任業自稱凉王以蒙遜為尚書左丞忌蒙遜威名微疎逺之天興四年蒙遜内不自安請為安西太守蒙遜欲激怒其衆乃宻誣告男成叛逆業殺之蒙遜泣告衆陳欲復讎之意男成素有恩信衆情怨憤泣而從之蒙遜因舉兵攻殺業私署使持節大都督大将軍凉州牧張掖公號年永安居張掖永興中蒙遜克姑臧遷居之改號元始元年自稱河西王置百官丞郎以下頻遣使朝貢蒙遜寝於新臺閹人王懐祖斫蒙遜傷足蒙遜妻孟氏擒懐祖斬之蒙遜聞劉裕㓕姚泓怒甚有校書郎言事於蒙遜蒙遜曰汝聞劉裕入闗敢妍妍然也遂殺之其峻暴如此泰常中蒙遜充李歆尋㓕敦煌後改年承𤣥神䴥中遣尚書郎宗舒左常侍髙猛朝貢上表曰伏惟陛下天縱叡聖徳超百王陶育齊於二儀洪基隆於三代然鍾運多雖九服紛優神旗暫擁車書未同上靈降祐祚歸有道純風一鼔殊方革面羣生幸甚率土齊欣臣誠弱才效無可錄幸遇重光思竭力命自欣投老得覩盛化冀終餘年慿倚皇極前後奉表貢使相望去者杳然寂無旋返未審津塗冦險竟不仰逹為天朝髙逺未蒙齒錄屏營戰灼無地自措往年侍郎郭祗等還奉被詔書三接之恩始隆萬里之心有賴今極難之餘開泰唯始誘勸既加引納彌篤老臣見存遐外無棄仰荷愷悌之仁俯蹈康哉之詠然商胡後至奉公卿書援引歴數安危之機厲以竇融知命之美顧惟情願實深悚惕何者臣不自揆逺託大䕃庶微誠上宣天鑒下降若萬國來庭百辟陛賀髙蹈先至之端獨步知機之首但世難尚殷情願未遂章表頻修滯懐不暢許身於國欵誠莫表致惑羣后貽慮公卿辭旨紛紜抑引重沓不在同奨之例未逹拱辰之心延首一隅低回四極臣歴觀符瑞候察天時未有過於皇魏踰於陛下加以靈啟聖姿㓜登天位美詠侔於成康道化踰於文景方将振神綱以掩六合灑𤣥澤以潤八荒况在秦隴荼炭之餘直是老臣盡效之㑹後蒙遜遣子安周内侍世祖遣兼太常李順持節拜蒙遜為假節加侍中都督凉州西域羌戎諸軍事太傅行征西大将軍凉州牧凉王冊曰昔我皇祖胄自黄軒總御羣才攝服戎夏疊曜重光不殞其舊逮于太祖應期協運大業唯新奄有區宇受命作魏降及太宗廣闢崇基政和民阜朕承天緒思廓宇縣然時運或否雰霧四張赫連跋扈於闗西大檀陸梁於漠北戎夷負阻江淮未賓是用自東徂西戎軒屢駕賴宗廟靈長将士宣力充翦兇渠震服彊獷四方漸泰表裏無塵王先識機運經略深逺與朕協同厥功洪茂當今運鍾時季僣逆慿陵有土者莫不跨峙一隅有民者莫不榮其私號不遵衆星拱極之道不慕細流歸海之義而王深悟大體率由典章任土貢珍愛子入侍勲義著焉道業存焉惟王乃祖乃父有土有民論功徳則無二於當時言氏族則始因於世爵古先帝王褒賢賞徳莫不胙土分民建為藩輔是以周成命太公以表東海㐮王錫晋文大啟南陽是用割凉州之武威張掖敦煌酒泉西海金城西平七郡封王為凉王受兹素土苴以白茅用建冢社為魏室藩輔盛衰存亡與魏升降夫功髙則爵尊徳厚則任重又加命王入贊百揆謀謨幃幄出征不懐登攝侯伯其以太傅行征西大将軍仗鉞秉旄鷹揚河右逺祛王略懐柔荒隅北盡于窮髪南極於庸岷西被于崐嶺東至于河曲王實征之以夾輔皇室又命王建國署将相羣卿百官承制假授除文官刺史以還武官撫軍以下建天子旌旗出入警蹕如漢初諸侯王故事欽哉惟時往踐乃職祗服朕命協亮天工俾九徳咸事無忝庶官用終爾顯徳對揚我皇祖之休烈崔浩之辭也蒙遜又改稱義和元年延和二年四月蒙遜死遣使監䕶䘮事諡曰武宣王蒙遜性媱忌忍於刑戮閨庭之中略無風禮第三子牧犍綂任自稱河西王遣使請朝命先是世祖遣李順迎蒙遜女為夫人㑹蒙遜死牧犍受蒙遜遺意送妹於京師拜右昭儀改稱承和元年世祖又遣李順拜牧犍使持節侍中都督凉沙河三州西域羌戎諸軍事車騎将軍開府儀同三司領䕶西戎校尉凉州刺史河西王牧犍以無功授賞乃留順上表乞安平一號優詔不許牧犍尚世祖妹武威公主遣其相宋繇表謝獻馬五百匹黄金五百斤繇又表請公主及牧犍母妃后定號朝議謂禮母以子貴妻從夫爵牧犍母宜稱河西國太后公主於其國内可稱王后於京師則稱公主詔從之牧犍遣其将軍沮渠旁周朝京師世祖遣侍中古弼尚書李順賜其侍臣衣服有差并徴世子封壇入侍牧犍乃遣封壇朝於京師太延五年世祖遣尚書賀多羅使凉州且觀虚實以牧犍雖稱蕃致貢而内多乖悖於是親征之詔公卿為書讓之曰王外從正朔内不捨僣罪一也民籍地圖不登公府任土作貢不入司農罪二也既荷王爵又授偽官取两端之榮邀不二之寵罪三也知朝廷志在懐逺固違聖略切税商胡以斷行旅罪四也揚言西戎髙自驕大罪五也坐自封殖不欲入朝罪六也北託叛虜南引仇地慿援谷軍提挈為姦罪七也承勅過限輙假征鎮罪八也欣敵之全幸我之敗侮慢王人供不以禮罪九也既㛰帝室寵踰功舊方恣慾情蒸媱其嫂罪十也既違伉儷之體不篤婚姻之義公行酖毒規害公主罪十一也備防王人候守闗要有如冦讎罪十二也為臣如是其可恕乎先令後誅王者之典也若親率羣臣委贄郊迎謁拜馬首上䇿也六軍既臨面縛輿襯又其次也如其守迷窮城不時悛悟身死族㓕為世大戮宜思厥中自求多福也官軍濟河牧犍曰何故爾也用其左丞姚定國計不肯出迎求救於蠕蠕又遣弟董來率兵萬餘人拒官軍於城南戰退車駕至姑臧遣使喻牧犍令出牧犍聞蠕蠕内侵於善無幸車駕返斾遂嬰城自守牧犍兄子祖踰城出降具知其情世祖乃引諸軍進攻牧犍兄子萬年率麾下又來降城拔牧犍與左右文武面縛請罪詔釋其縛徙凉州民三萬餘家于京師初太延中有一父老投書於敦煌城東門忽然不見其書一紙八字文曰凉王三十年若七年又於震電之所得石丹書曰河西河西三十年破帶石樂七年帶石山名在姑臧南山祀傍泥䧟不通牧犍征南大将軍董來曰祀豈有知乎遂毁祀伐木通道而行牧犍立果七年而㓕如其言牧犍媱嫂李氏兄弟三人𫝊嬖之李與牧犍姊共毒公主上遣解毒醫乘𫝊救公主得愈上徴李氏牧犍不遣厚送居於酒泉上大怒既充猶以妹壻待之其母死以王太妃禮𦵏焉又為蒙遜置守墓三十家改授牧犍征西大将軍王如故初官軍未入之間牧犍使人斫開府庫取金銀珠玉及珍竒噐物不更封閉小民因之入盗巨細蕩盡有司求賊不得真君八年其所親人及守藏者告之上乃窮竟其事搜其家中悉得所藏噐物又告牧犍父子多畜毒藥前後隐竊殺人乃有百數姊妹皆為左道朋行媱佚曾無愧顔始罽賓沙門曰曇無讖東入鄯善自云能使鬼治病令婦人多子與鄯善王妹曼頭陁林私通發覺亡奔凉州蒙遜寵之號曰聖人曇無讖以男女交接之術教授婦人蒙遜諸女子婦皆往受法世祖聞諸行人言曇無讖之術乃召曇無讖蒙遜不遣遂發露其事拷訊殺之至此帝知之於是賜昭儀沮渠氏死誅其宗族唯萬年及祖以前先降得免是年人又告牧犍猶與故臣民交通謀反詔司徒崔浩就公主第賜牧犍死牧犍與主訣良久乃自裁葬以王禮諡曰哀王及公主薨詔與牧犍合葬公主無男有女以國甥親寵得襲母爵為武威公主蒙遜子秉字季義世祖以其父故拜東雍州刺史險詖多端真君中遂與河東蜀薛安都謀逆至京師付其兄弟扼而殺之萬年祖並以先降萬年拜安西将軍張掖王祖為廣武公萬年後為冀定二州刺史復坐謀逆與祖俱死初牧犍之敗也弟樂都太守安周南奔吐谷渾世祖遣鎮南将軍奚眷討之牧犍弟酒泉太守無諱奔晋昌乃使弋陽公元絜守酒泉真君初無諱圍酒泉絜輕之出城與語為無諱所執絜所部相率固守無諱仍圍之糧盡為無諱所䧟無諱又圍張掖不能克退保臨松遂還世祖下詔喻之時永昌王健鎮凉州無諱使其中尉梁偉詣健求奉酒泉又送絜及綂帥兵士于健軍二年春世祖遣兼鴻臚持節䇿拜無諱為征西大将軍凉州牧酒泉王尋以無諱復規叛逆復遣鎮南将軍南陽公奚眷討酒泉克之無諱遂謀渡流沙遣安周西擊鄯善鄯善王怨懼欲降㑹魏使者勸令拒守安周遂與連戰不能充退保東城三年春鄯善王比龍西奔且末其世子乃從安周鄯善大亂無諱遂渡流沙士卒渇死者大半仍據鄯善先是髙昌太守闞爽為李寳舅唐契所攻聞無諱至鄯善遣使詐降欲令無諱與唐契相擊無諱留安周住鄯善從焉耆東北趣髙昌會蠕蠕殺唐契爽拒無諱無諱將衛興奴詐誘爽遂屠其城爽奔蠕蠕無諱因留髙昌五年夏無諱病死安周代立後為蠕蠕國所并史臣曰周徳之衰七雄競跱咸分割神州睥睨尊極至是張寔等介在人外地實戎墟大争鵄張潜懐不遜其不知量固為甚矣蛇虺相噬終為擒㓕宜哉魏書卷九十九魏書卷九十九考證張寔傳茂妻弟賈模臣人龍按晋書張茂傳云凉州大姓賈摹寔之妻弟也此以為茂之妻弟與晋書異又按茂傳有手莫頭圖凉州之謡則字當從手上莫軌保凉州隂澹之力臣人龍按本傳不載隂澹事晋書張軌傳云治中楊澹馳詣長安訴軌被誣此云隂澹又云駿以隂氏門宗強盛忌之未知孰誤秃髪烏孤傳殺秦州刺史胡烈於髙斛堆髙斛堆晋書載記作萬斛堆李暠𫝊祖太張祚武衛将軍晋書載記李暠祖弇仕張軌為武衛将軍後追尊為凉景公義熈元年奉表稱亡祖武衛守将軍天水太守安世亭侯弇則此太字乃弇字之訛也魏書卷九十九考證
