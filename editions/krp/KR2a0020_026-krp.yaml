body:
  text: 魏書卷二十六齊魏收撰列傳第十四長孫肥尉古真長孫肥代人也昭成時年十三以選内侍少有雅度果毅少言太祖之在獨孤及賀蘭部肥常侍從禦侮左右太祖深信仗之登國初與莫題等俱為大将從征劉顯自濡源擊厙莫奚討賀蘭部竝有戰功太祖征蠕蠕大破之肥降其主匹候䟦事具蠕蠕𫝊又從征衛辰及薛于部破滅之蠕蠕别主緼紇提子曷多汗等率部落棄父西走肥以輕騎追至上郡斬之後從征中山拜中領軍将軍車駕次晉陽慕容寳并州刺史遼西王農棄城宵遁肥追之至蒲泉獲其妻子太祖将圍中山慕容寳棄城奔和龍肥與左将軍李栗三千騎追之至范陽不及而還遂破其研城戍俘千餘人中山城内人立慕容普鄰為主太祖圍之普鄰乃出步卒千餘人欲伺間犯圍太祖命肥挑戰偽退普鄰衆追肥太祖截其後盡擒斬之時以士馬少糧遂罷中山之圍就穀河間慕容賀驎殺普鄰而自立車駕次魯口遣肥帥七千騎襲中山入其郛而還賀驎以步騎四千追肥至泒水肥自魏昌擊之獲鎧騎二百肥中流矢瘡重乃還中山平以功賜爵琅邪公遷衛尉卿改爵盧鄉時中山太守仇儒不樂内徙亡匿趙郡推羣盗趙凖為主妄造妖言云燕東傾趙當續欲知其名准水不足凖喜而從之自號使持節征西大将軍青冀二州牧鉅鹿公儒為長史聚黨二千餘人據關城連引丁零殺害長吏扇動常山鉅鹿廣平諸郡遣肥率三千騎討之破凖於九門斬仇儒生擒凖詔以儒肉食凖𫝊送京師轘之於市夷其族除肥鎮逺将軍兖州刺史給步騎二萬南徇許昌略地至彭城司馬徳宗将劉該遣使詣肥請降貢其方物姚平之寇平陽太祖将討之選諸将無加肥者乃徵還京師遣肥與毗陵王順等六萬騎為前鋒車駕次永安平募遣勇将率精騎二百闚軍肥逆擊擒之匹馬不返平退保柴壁太祖進攻屠之遣肥還鎮兖州肥撫慰河南得吏民心威信著於淮泗善䇿謀勇冠諸将每戰常為士卒先前後征討未嘗失敗故毎有大難令肥當之南平中原西摧羌寇肥功居多賞賜奴婢數百口畜物以千計後降爵為藍田侯天賜五年卒諡曰武陪𦵏金陵子翰襲爵翰少有父風太祖時以善騎射為獵郎太宗之在外翰與元磨渾等潛謀奉迎太宗即位遷散騎常侍與磨渾等拾遺左右以功遷平南将軍率衆鎮北境威名甚著蠕蠕憚之後為都督北部諸軍事平北将軍真定侯給殿中細拾隊加旌旗鼓吹蠕蠕每犯塞翰拒擊有功進爵為公世祖即位徵還京師進封平陽王加安集将軍蠕蠕大檀之入宼雲中世祖親征之遣翰率北部諸将尉眷自參合以北擊大檀别帥阿伏干於柞山斬首數千級獲馬萬餘匹又與東平公娥清出長川以討大檀大檀衆北遁追擊克獲而還尋遷司徒襲赫連昌破之世祖復征昌翰與廷尉道生宗正娥清率騎三萬為前驅昌戰敗奔上邽翰以八千騎追之至髙平不及而還從襲蠕蠕車駕度漠大檀奔走其弟匹黎率衆赴之遇翰交戰匹黎衆潰走斬其渠帥數百人翰清正嚴明善撫将士太祖甚重之神䴥三年薨深見悼惜為之流涕親臨其䘮禮依安城王叔孫俊故事賻賜有加諡曰威陪𦵏金陵子平成襲爵降為公平成少以父任為中散累遷南部尚書卒陪𦵏金陵子渾襲爵渾初為中散久之為彭城鎮将太和中卒子盛襲爵翰弟受興世祖時從征平凉以功賜爵長進子除河間太守卒子安都襲爵顯祖時為典馬令受興弟陳世祖時為羽林郎征和龍賊自西門出将犯外圍陳擊退之追斬至長城下以功賜爵五等男以從征凉州為都将領入官遷殿中給事中進爵為子遷駕部尚書復出為北鎮都将陳性寛厚好學愛士所歴輙為人追思之髙祖即位進爵吳郡公加安東将軍興光二年卒贈散騎常侍呉郡王諡曰恭陪𦵏金陵子頭襲爵髙宗時為中散遷内行長典龍收曹天安初卒子㧞襲爵陳弟蘭世祖初為中散常從征伐典御兵器賞賜甚厚後以破平涼功賜爵雎陽子加奮武将軍遷散騎常侍北部尚書後除豫州刺史卒子烏孤襲爵髙祖初出為武都鎮将入為散令子樂孝静時金紫光祿大夫肥弟亦于太祖初為羽林郎從平中原除廣平太守卒子石洛世祖初為羽林郎稍遷散騎常侍從征赫連昌為都将以功拜樂部尚書賜爵臨淮公加寧西将軍神䴥中卒諡曰簡子真少以父任為中散從征平涼以功賜爵臨城子拜員外散騎侍郎廣武将軍襲父爵降為建義将軍臨淮侯遷司衛監征蓋吳遷殿中尚書加散騎常侍從駕征劉義隆至江進爵南康公加冠軍将軍卒於軍子吳兒襲爵髙祖初為中散武川鎮将太和初卒贈恒州刺史子長樂襲坐事爵除後歴陵江将軍羽林監子榮族武定中征西将軍繁昌男吳兒弟突朔州長史子元慶平州倉曹參軍尉古真代人也太祖之在賀蘭部賀染干遣侯引乙突等詣行宫将肆逆古真知之密以馳告侯引等不敢發染干疑古真泄其謀乃執栲之以兩車軸押其頭傷一目不伏乃免之登國初從征庫莫奚及叱突鄰竝有功又從救賀蘭破衛辰子直力鞮復擊慕容寳於參合陂又從平中原以功賜爵束州侯加建節将軍太宗初為鴻飛将軍率衆五千鎮大洛城太宗西廵古真與奚斤等率前軍討越勒部大破之獲馬五萬匹牛羊二十萬頭掠二萬餘家西還泰常三年除定州刺史卒子億萬襲卒子盛襲古真弟太真太宗初為平南将軍相州刺史太真弟諾少侍太祖以忠謹著稱從圍中山諾先登傷一目太祖歎曰諾兄弟竝毁其目以建功效誠可嘉也寵侍遂隆除平東将軍賜爵安樂子從討姚平還拜國部大人太宗初為幽州刺史加東統将軍進爵為侯長孫道生之討馮䟦也諾與驍騎将軍延普率師次遼西轉寧東将軍進爵武陵公諾之在州有恵政民吏追思之世祖時薊人張廣達等二百餘人詣闕請之復除安東将軍幽州刺史改邑遼西公兄弟竝為方伯當世榮之燕土亂久民戸凋敝散諾在州前後十數年還業者萬餘家延和中卒第八子觀襲爵卒子崘襲諾長子眷忠謹有父風太宗時執事左右為大官令時侍臣受斤亡入蠕蠕詔眷追之遂至虜庭大檀問其故眷曰受斤負罪天子逃刑在此不時執送是以來取眷遂擒受斤於大檀前左右救之乃免由是以驍烈聞遷司衛監太宗幸幽州詔眷輔世祖居守後征河南督髙車騎臨陣衝突所向無前賊憚之世祖即位命眷與散騎常侍劉庫仁等八人分典四部綰奏機要賜爵山桑侯加陳兵将軍又為安北将軍出鎮北境與平陽王長孫翰擊蠕蠕别帥阿伏干於祚山率師至歌刪山擊蠕蠕别帥便度弟庫仁直引師而北蠕蠕部帥莫孤率髙車騎五千乗來逆眷擊破之斬首千餘級又從征蠕蠕眷出白黑兩漠之間擊其東部大獲而還又從征赫連昌眷出南道擊昌於上邽士衆之糧臨淮公丘堆等督租於郡縣為昌所敗昌乗勝抄掠諸将患之眷與侍御史安頡隂謀設伏邀擊擒昌以功拜寧北将軍加散騎常侍進爵源陽公後從征和龍眷督萬騎前驅慰喻降二千餘戸尋為假節加侍中都督豫洛二州及河内諸軍事安南将軍開府鎮虎牢張掖王秃髮保周之反也徵眷與永昌王健等率師討之破保周於畨禾保周遁走眷率騎追之保周窮廹自殺詔眷留鎮涼州加都督涼沙河三州諸軍事安西将軍領䕶羌戎校尉轉敦煌鎮将又擊破吐谷渾俘三千餘口眷歴鎮四蕃威名竝著髙宗時率師北擊伊吾剋其城大獲而還尋拜侍中太尉進爵為王與太宰常英等評尚書事髙宗北廵狩以寒雪方降議還眷諫曰今動大衆以威北敵去都不逺而便旋駕虜必疑我有内難雖方寒雪兵人勞苦以經略大體宜便前進髙宗從之遂渡漠而還以眷元老賜杖履上殿和平四年薨髙宗悼惜之贈大将軍諡曰莊子多侯襲爵多侯少有武幹顯祖時為假節征西将軍領䕶羌戎校尉敦煌鎮将至鎮上表求率輕騎五千西入于闐兼平諸國因敵取資平定為效弗許髙祖初蠕蠕部帥旡盧真率三萬騎入塞圍鎮多侯擊走之以功進號征西大将軍後多侯獵于南山蠕蠕遣部帥度㧞入圍敦煌斷其還路多侯且前且戰遂衝圍而入率衆出戰大破之追北數十里斬首千餘級因上疏求北取伊吾斷蠕蠕通西域之路髙祖善其計以東作方興難之太和元年為妻元氏所害子建襲爵歴位給事中卒無子建弟那襲爵卒子範襲範弟顯業散騎常侍與太原公主姦通生子彦武定中衛将軍南營州刺史多侯弟子慶賔善騎射有将略髙祖時釋褐員外散騎侍郎稍遷左将軍太中大夫肅宗時議欲送蠕蠕主阿那瓌還國慶賔上表固爭不從後蠕蠕遂執行臺元孚大掠北境詔尚書令李崇討之慶賔别将隸崇出塞而返元法僧之外叛蕭衍遣其豫章王蕭綜鎮徐州又詔慶賔為别将隸安豐王延明討之尋除後将軍肆州刺史時尒朱榮兵威漸盛曾經肆州慶賔畏惡之據城不出榮恨慶賔舉兵襲之慶賔别駕姚和内應榮遂害慶賔僚屬拘慶賔還秀容呼為假父後以母憂還都尋起為平東将軍光禄大夫都督鎮汝隂還朝永安二年卒贈車騎将軍雍州刺史又追加侍中司空公慶賔子豹起家員外郎肅宗時行潁州事與蕭衍将裴之禮戰殁豹弟瑾武定中東平太守眷弟地干機悟有才藝馳馬立射五的時人莫能及太宗時為左機令世祖少而善之即位擢為庫部尚書加散騎常侍左光禄大夫領侍輦郎地干奉上忠謹尤善嘲笑世祖見其效人舉措忻悦不能自勝甚見親愛參軍國大謀世祖将征平凉試衝車以攻冡地干為索所罥折脅而卒世祖親往臨撫哭之甚慟贈中領軍将軍燕郡公諡曰惠贈賜豐厚子長夀㓜拜散騎常侍遷殿中右曹尚書仍加散騎常侍從征劉義隆至江賜爵㑹稽公加冠軍将軍髙宗時除涇州刺史和平五年卒子彌真襲爵彌真卒無子弟狀徳襲爵地干弟侯頭襲地干職為庫部尚書侯頭弟力斤亦以忠謹聞歴位御史中尉并州刺史有政績加冠軍将軍賜爵晉陽侯卒贈平南将軍力斤弟焉陳尚書安樂侯古真族𤣥孫聿字成興性耿介肅宗時為武衛将軍是時領軍元义秉權百寮莫不致敬而聿獨長揖不拜尋出為平西将軍東涼州刺史涼州緋色天下之最义送白綾二千匹令聿染拒而不許义諷御史劾之驛徵至京覆驗無状還復任尋卒於州時年五十贈安北将軍朔州刺史子儉武定中開府祭酒史臣曰長孫肥結髮内侍雄烈知名軍鋒所指罔不奔散關張萬人之敵未足多也翰有父風不隕先構臨䘮加禮抑有由哉尉真兄弟忠勇奮發義以忘生眷威略著時增隆家業青紫麾旄亦其宜矣魏書卷二十六魏書卷二十六考證尉古真𫝊擊蠕蠕别帥阿伏干於祚山本卷上文世祖遣長孫翰率北部諸将尉眷自參合以北擊大檀别帥阿干于柞山此作祚亦小異魏書卷二十六考證
