body:
  text: 魏書卷十二齊魏收撰帝紀第十二孝静紀孝静皇帝諱善見清河文宣王亶之世子也母曰胡妃永熙三年拜通直散騎侍郎八月為驃騎大將軍開府儀同三司出帝既入闗齊獻武王奉迎不克乃與百寮㑹議推帝以奉肅宗之後時年十一冬十月丙寅即位於城東北大赦天下改永熙三年為天平元年庚午以太師趙郡王諶為大司馬以司空咸陽王坦為太尉以開府儀同三司髙盛為司徒以開府儀同三司髙昻為司空壬申有事於太廟詔曰安安能遷自古之明典所居靡定往昔之成規是以殷遷八城周卜三地吉凶有數隆替無恒事由於變通理出於不得已故也髙祖孝文皇帝式觀乾象俯協人謀發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國歩孔棘喪亂不已宼賊交侵俾我生民無所措手今逺遵古式深驗時事考龜襲吉遷宅漳滏庶克隆洪基再昌寳厯主者明為條格及時發邁丙子車駕北遷於鄴詔齊獻武王留後部分改司州為洛州以衛大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽詔從遷之戸百官給復三年安居人五年十有一月兗州刺史樊子鵠南青州刺史大野㧞據瑕丘反庚寅車駕至鄴居北城相州之廨改相州刺史為司州牧魏郡太守為魏尹徙鄴舊人西徑百里以居新遷之人分鄴置臨漳縣以魏郡林慮廣平陽丘汲郡黎陽東濮陽清河廣宗等郡為皇畿十有二月丁夘燕郡王賀㧞允薨庚午詔内外觧嚴百司悉依舊章從容雅服不得以矛釤從事丙子遣侍中封隆之等五人為大使巡諭天下丁丑赦畿内閏月蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉宇文黒獺既害出帝乃以南陽王寳炬僣尊號初置四中郎將於礓石橋置東中蒲泉置西中濟北置南中洺水置北中二年春正月寳炬渭州刺史可朱渾道元擁部來降齊獻武王迎納之賑其廪食己巳詔以齊獻武王為相國假黄鉞劔履上殿入朝不趨餘悉如故王固讓不受乙亥兼尚書右僕射東南道行臺元晏討元慶和破走之二月壬午以太尉咸陽王坦為太𫝊以司州牧西河王悰為太尉己丑前南青州刺史大野拔斬樊子鵠以降兗州平戊戌蕭衍司州刺史陳慶之宼豫州刺史堯雄撃走之三月辛酉以司徒髙盛為太尉以司空髙昻為司徒濟隂王暉業為司空齊獻武王討平山胡劉蠡升斬之其子南海王復僣帝號獻武王進撃破擒之及其弟西海王皇后夫人已下四百人并逋逃之人二萬餘戸辛未以旱故詔京邑及諸州郡縣收瘞骸骨是春髙麗契丹並遣使朝貢夏四月前青州刺史侯梁反攻掠青齊癸未濟州刺史蔡儁討平之壬辰降京師見囚五月大旱勒城門殿門及省府寺署坊門澆人不簡王公無限日得雨乃止六月元慶和宼南頓豫州刺史堯雄大破之秋七月甲戍封汝南王悦孫綽為琅邪王八月辛夘司空濟隂王暉業坐事免甲午發衆七萬六千人營新宫九月齊獻武王以治民之官多不奉法請選朝士清正者州别遣一人問疾苦丁巳以開府儀同三司襄城王旭為司空冬十有一月丁未蕭衍將栁仲禮宼荆州刺史王元撃破之癸丑祀圜丘甲寅閶闔門災龍見并州人家井中丙寅詔齊文襄王起家為散騎常侍驃騎大將軍左光禄大夫儀同三司太原郡開國公食邑三千戸十有二月壬午車駕狩於鄴東甲午文武百官量事各給禄三年春正月癸夘朔饗羣臣於前殿戊申詔百官舉士舉不稱才者兩免之齊獻武王襲寳炬西夏州克之詔加齊獻武王九錫之禮侍中元子思敦諭固讓乃止二月丁未蕭衍光州刺史郝樹以州内附丁酉詔加齊文襄王使持節尚書令大行臺大都督以鮮卑髙車酋庶皆𨽻之三月甲寅以開府儀同三司華山王鷙為大司馬丁夘陽夏太守盧公纂據郡南叛大都督元整破之夏四月丁酉昌樂王誕薨五月癸夘賜鰥寡孤獨貧窮者衣物各有差丙辰以録尚書事西河王悰為司州牧戊辰太尉髙盛薨六月辛巳趙郡王諶薨秋七月庚子大赦天下蕭衍夏州刺史田獨鞞頴川防城都督劉鸞慶並以州内附八月并肆涿建四州隕霜大饑九月壬寅以定州刺史侯景兼尚書右僕射南道行臺節度諸軍南討丙辰陽平人路季禮聚衆反辛酉御史中尉竇泰討平之冬十有一月戊申詔尚書可遣使廵檢河北流移飢人邢陘滏口所經之處若有死屍即為藏掩勿使靈臺枯骨有感於通夢廣漢露骸時聞於夜哭侯景攻克蕭衍楚州獲刺史桓和十有二月以并州刺史尉景為太保辛未遣使者板假老人官百嵗已下各有差壬申大司馬清河王亶薨丁丑齊獻武王自晋陽西討次於蒲津司徒公大都督髙敖曹趨上洛車騎大將軍竇泰入自潼闗癸未以太傅咸陽王坦為太師乙酉勿吉國遣使朝貢是嵗髙麗國遣使朝貢四年春正月禁十五日相偷戲竇泰失利自殺丁巳髙敖曹攻上洛克之擒寳炬驃騎大將軍洛州刺史梁企以汝陽王暹為録尚書事夏四月辛未遷七帝神主入新廟大赦天下内外百官普進一階先是滎陽人張儉等聚衆反於大醜山通寳炬壬辰武衛將軍髙元盛討破之六月己巳幸華林園理訟辛未詔尚書掩骼埋胾推録囚徒壬午閶闔門災先是蕭衍因益州刺史傅和請通好秋七月甲辰遣兼散騎常侍李楷兼吏部郎中盧元明兼通直散騎常侍李鄴使於蕭衍八月寳炬宇文黒獺宼陜州城䧟刺史李徽伯為黒獺所殺九月侍中元子思與其弟子華謀西入並賜死閏月乙丑衛將軍右光禄大夫蒋天樂謀反伏誅禁京酤酒冬十月以咸陽王坦為録尚書事壬辰齊獻武王西討至沙苑不克而還己酉寳炬行臺宫景壽都督楊白駒宼洛州大都督韓延大破之寳炬又遣其子大行臺元季海大都督獨孤如願逼洛州刺史廣陽王湛棄城退還季海如願遂據金墉潁州長史賀若㣲執刺史田迅西叛引寳炬都督梁回據城寳炬又遣其都督趙繼宗右丞韋孝寛等攻䧟豫州十有一月丙子以驃騎大將軍儀同三司万俟普為太尉十有二月甲寅蕭衍遣使朝貢河間人邢摩納范陽人盧仲禮等各聚衆反是嵗髙麗蠕蠕國並遣使朝貢元象元年春正月有巨象自至碭郡陂中南兗州獲送於鄴丁夘大赦改元大都督賀㧞仁攻寳炬南汾州己夘拔之擒其刺史韋子粲行臺任祥率豫州刺史堯雄等與大行臺侯景司徒髙敖曹大都督万俟受洛于等於北豫相㑹俱討潁州梁回等棄城遁走潁州平二月豫州刺史堯雄攻揚州㧞之擒寳炬義州刺史韓顯揚州長史丘岳送京師丙辰遣兼散騎常侍鄭伯猷使於蕭衍三月齊獻武王固請觧大丞相詔從之夏四月庚寅曲赦畿内壬辰齊獻武王還晋陽請開酒禁六月壬辰帝幸華林都堂聼訟是夏山東大水蝦蟇鳴於樹上秋七月己亥髙麗國遣使朝貢行臺侯景司徒公髙敖曹圍寳炬將獨孤如願於金墉寳炬宇文黒獺並來赴救大都督厙狄干率諸將前驅齊獻武王總衆繼進八月辛夘戰於河隂大破之斬其大都督儀同三司宼洛生等二十餘人俘獲數萬司徒公髙敖曹大都督李猛宋顯並戰沒寳炬留其將長孫子彦守金墉壬辰齊獻武王濟河子彦棄城走九月大都督賀㧞仁撃邢摩納盧仲禮等破平之冬十月蕭衍遣使朝貢十有一月庚寅遣陸操使於蕭衍齊獻武王來朝十有二月甲辰還晋陽興和元年春正月辛酉以尚書令孫騰為司徒三月甲寅朔封常山郡王劭第二子曜為陳郡王夏五月齊文襄王來朝甲戌立皇后髙氏乙亥大赦天下是月髙麗國遣使朝貢六月乙酉以尚書左僕射司馬子如為山東黜陟大使尋為東北道大行臺差選勇士庚寅前潁州刺史奚思業為河南大使簡發勇士丁酉蕭衍遣使朝貢戊申開府儀同三司汝陽王暹薨秋七月丁丑詔以齊獻武王為相國録尚書事大行臺固辭相國八月壬辰兼散騎常侍王元景兼通直散騎常侍魏收使於蕭衍九月甲子發畿内民夫十萬人城鄴城四十日罷辛未曲赦畿内死罪以下各有差冬十有一月癸亥以新宫成大赦天下改元八十以上賜綾帽及杖七十以上賜帛及有疾廢者賜粟帛築城之夫給復一年二年春正月壬申以太保尉景為太傅以驃騎大將軍開府儀同三司厙狄干為太保丁丑徙御新宫大赦内外百官普進一階營構主將别優一階三月己夘蕭衍遣使朝貢夏五月己酉西魏行臺宫延和陜州刺史宫元慶率戸内屬置之河北新附賑廪各有差壬子遣兼散騎常侍李象使於蕭衍閏月己丑封皇子景植為宜陽王皇弟威為清河王謙為潁川王六月壬子大司馬華山王鷙薨冬十月丁未蕭衍遣使朝貢十有二月乙夘遣兼散騎常侍崔長謙使於蕭衍是嵗蠕蠕髙麗勿吉國並遣使朝貢三年春二月甲辰阿至羅出吐㧞那渾大率部來降三月己酉梁州人公孫貴賔聚衆反自號天王陽夏鎮將討擒之夏四月戊申阿至羅國主副伏羅越居子去賔來降封為髙車王六月乙丑蕭衍遣使朝貢秋七月齊文襄王如晋陽己夘宜陽王景植薨八月甲子遣兼散騎常侍李騫使於蕭衍冬十月癸夘齊文襄王自晋陽來朝先是詔文襄王與羣臣於麟趾閣議定新制甲寅班於天下己巳發夫五萬人築漳濵堰三十五日罷癸亥車駕狩於西山十有一月戊寅還宫丙戌以開府儀同三司彭城王韶為太尉以度支尚書胡僧敬為司空是嵗蠕蠕髙麗勿吉國並遣使朝貢四年春正月丙辰蕭衍遣使朝貢夏四月丙寅遣兼散騎常侍李繪使於蕭衍乙酉以侍中廣陽王湛為太尉以尚書右僕射髙隆之為司徒以太尉彭城王韶為録尚書事丁亥太傅尉景坐事降為驃騎大將軍開府儀同三司辛夘以太保厙狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射五月辛巳齊獻武王來朝請令百官月一面敷政事明揚仄陋納諫屏邪親理獄訟褒黜勤怠牧守有愆節級相坐椒掖之内進御以序後園鷹犬悉皆放棄六月還晋陽丙申復前侍中樂浪王忠爵丁酉復陳留王景皓常山王紹宗髙宻王永業爵秋八月庚戍以開府儀同三司吏部尚書侯景為兼尚書僕射河南行臺随機討防冬十月甲寅蕭衍遣使朝貢齊獻武王圍寳炬玉壁十有一月壬午班師驃騎大將軍開府儀同三司青州刺史西河王悰薨十有二月辛亥遣兼散騎常侍楊斐使於蕭衍是嵗蠕蠕髙麗吐谷渾國並遣使朝貢武定元年春正月壬戌朔大赦天下改元己巳車駕蒐於邯鄲之西山癸酉還宫二月壬申北豫州刺史髙仲宻據虎牢西叛三月寳炬遣其子突與宇文黒獺率衆來援仲宻庚子圍河橋南城丙午帝親納訟戊申齊獻武王討黒獺戰於邙山大破之擒寳炬兄子臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮驃騎大將軍儀同三司太子詹事趙善督將參寮等四百餘人俘斬六萬餘甲仗牛馬不可勝數豫洛二州平齊獻武王追奔至恒農而還夏四月封彭城王韶弟襲為武安王五月壬辰以克復虎牢降天下死罪以下囚乙未以吏部尚書侯景為司空六月乙亥蕭衍遣使朝貢戊寅封前員外散騎侍郎元長春為南郡王秋八月乙丑以汾州刺史斛律金為大司馬壬午遣兼散騎常侍李渾使於蕭衍是月齊獻武王召夫五萬於肆州北山築城西自馬陵戍東至土隥四十日罷冬十有一月甲午車駕狩於西山乙巳還宫是嵗吐谷渾髙麗蠕蠕國並遣使朝貢二年春正月地豆干國遣使朝貢二月丁夘徐州人劉烏黒聚衆反遣行臺慕容紹宗討平之三月蕭衍遣使朝貢以旱故宥死罪以下囚丙午以開府儀同三司孫騰為太保壬子以齊文襄王為大將軍領侍中其文武職事賞罰衆典詢禀之中書監元弼為録尚書左僕射司馬子如為尚書令以今上為左僕射夏四月室韋國遣使朝貢五月甲午遣散騎常侍魏季景使於蕭衍丁酉太尉廣陽王湛薨秋八月癸酉尚書令司馬子如坐事免九月甲申以開府儀同三司濟隂王暉業為太尉太師咸陽王坦坐事免以王還第冬十月丁巳太保孫騰大司馬髙隆之各為括戸大使凡獲逃戸六十餘萬十有一月西河地陷有火出甲申以司徒髙隆之為尚書令以前大司馬婁昭為司徒齊文襄王如晋陽庚子車駕有事於圜丘辛五蕭衍遣使朝貢壬寅齊文襄王從獻武王討山胡破之俘獲一萬餘戸分配諸州是嵗吐谷渾髙麗蠕蠕勿吉國並遣使朝貢三年春正月丙申遣兼散騎常侍李奨使於蕭衍丁未齊獻武王請於并州置晋陽宫以處配沒之口二月庚申吐谷渾國奉其從妹以備後庭納為容華嬪夏五月甲辰大赦天下秋七月庚子蕭衍遣使朝貢冬十月遣中書舎人尉瑾使於蕭衍乙未齊獻武王請邙山之俘釋其桎梏配以人間寡婦十有二月以司空侯景為司徒以中書令韓軌為司空戊子以太保孫騰為録尚書事是嵗髙麗吐谷渾蠕蠕國並遣使朝貢四年夏五月壬寅蕭衍遣使朝貢六月庚子以司徒侯景為河南大行臺應機討防秋七月壬寅遣兼散騎常侍元廓使於蕭衍八月移洛陽漢魏石經於鄴齊獻武王自鄴帥衆西伐文襄王㑹於晋州九月圍玉壁以挑之寳炬黒獺不敢應冬十有一月齊獻武王有疾班師文襄王如晋陽是嵗室韋勿吉地豆干髙麗蠕蠕國並遣使朝貢五年春正月丙午齊獻武王薨於晋陽秘不發䘮辛亥司徒侯景反潁州刺史司馬世雲以城應之景入據潁城誘執豫州刺史髙元成襄州刺史李宻廣州刺史暴顯等遣司空韓軌驃騎大將軍儀同三司賀拔勝可朱渾道元左衛將軍劉豐等帥衆討之景乃遣使降於寳炬請師救援寳炬遣其將李景和王思政帥騎赴之思政等入據潁州景乃出走豫州乙五蕭衍遣使朝貢二月侯景復背寳炬歸於蕭衍衍署景河南大將軍承制夏四月壬申大將軍齊文襄王來朝甲午遣兼散騎常侍李緯使於蕭衍五月丁酉朔大赦天下戊戌以尚書右僕射襄城王旭為太尉甲辰以太原公今上為尚書令領中書監餘如故詢以政事以青州刺史尉景為大司馬以開府儀同三司厙狄干為太師以録尚書事孫騰為太傅以汾州刺史賀仁為太保以司空韓軌為司徒以領軍將軍可朱渾道元為司空以司徒髙隆之録尚書事以徐州刺史慕容紹宗為尚書左僕射髙陽王斌為右僕射戊午大司馬尉景薨六月司徒韓軌司空可朱渾道元等自潁州班師乙酉帝為齊獻武王舉哀於東堂服緦縗詔尚書右僕射髙陽王斌兼大鴻臚卿赴晋陽監護喪事太尉襄城王旭兼尚書令奉詔宣慰秋七月戊戌詔贈王假黄鉞使持節相國都督中外諸軍事齊王璽綬輼輬車黄屋左纛前後羽葆鼓吹輕車介士兼備九錫之禮謚曰獻武王以齊文襄王為使持節大丞相都督中外諸軍事録尚書事大行臺渤海王壬寅詔王攝理軍國遣中使敦諭八月齊文襄王入朝固辭丞相詔復授大将軍餘如故甲申塟齊獻武王於鄴城西北車駕祖於漳濵九月齊文襄王還晋陽辛酉蕭衍遣其兄子貞陽侯淵明帥衆寇徐州堰泗水於寒山灌彭城以應侯景冬十月乙酉以尚書左僕射慕容紹宗為東南道行臺與驃騎大将軍儀同三司大都督髙岳潘相樂討淵明十有一月大破之擒淵明及其二子瑀道将帥二百餘人俘斬五萬級凍乏赴水死者不可勝數十有二月乙亥蕭淵明至關帝御閶闔門讓而宥之岳等回師討侯景是嵗髙麗勿吉國並遣使朝貢六年春正月己亥大都督髙岳等於渦陽大破侯景俘斬五萬餘人其餘溺死於渦水水為之不流景走淮南己未齊文襄王來朝請以寒山獲士賜百官及督将等各有差二月己夘蕭衍遣使款闕乞和并修書弔齊文襄王文襄王還晋陽三月癸巳以大尉襄城王旭為大司馬以開府儀同三司髙岳為太尉辛亥以冬春亢旱赦罪人各有差夏四月甲子吏部令史張永和青州人崔闊等偽假人官事覺糺檢首者六萬餘人秋八月甲戍以尚書左僕射慕容紹宗為大行臺與太尉髙岳司徒韓軌大都督劉豐等討王思政於潁川引洧水灌其城九月乙酉蕭衍遣使朝貢冬十月戊申侯景濟江推蕭衍弟子臨賀王正徳為主以攻建業是嵗髙麗室韋蠕蠕吐谷渾國並遣使朝貢七年春正月戊辰蕭衍弟子北徐州刺史中山侯蕭正表以鍾離内屬封蘭陵郡開國公呉郡王三月丁夘侯景尅建業還以蕭衍為主衍弟子北兗州刺史定襄侯蕭祗相譚侯蕭退來降衍江北郡國皆内屬夏四月大行臺慕容紹宗大都督劉豐遇暴風溺水死甲辰詔以齊文襄王為相國齊王緑綟綬讃拜不名入朝不趨劒履上殿食冀州之渤海長樂安徳武邑瀛州之河間五郡邑十五萬戸餘如故王固辭是月侯景殺蕭衍立子綱為主五月齊文襄王帥衆自鄴赴潁川六月丙申克潁州擒寳炬大将軍尚書左僕射東道大行臺太原郡開國公王思政潁州刺史皇甫僧顯等及戰士一萬餘人男女數萬口齊文襄王遂如洛州秋七月齊文襄王至自南討請宥思政之罪八月辛夘詔立皇子長仁為皇太子齊文襄王薨於第祕不發喪癸巳大赦天下内外百官並加二級甲午齊王如晋陽冬十月癸未以開府儀同三司咸陽王坦為太傅甲午以開府儀同三司潘相樂為司空十有二月甲辰呉郡王蕭正表薨己酉以并州刺史彭樂為司徒是嵗蠕蠕地豆干室韋髙麗吐谷渾國並遣使朝貢八年春正月辛酉帝為齊文襄王舉哀於東堂丁夘詔贈齊文襄王假黄鉞使持節相國都督中外諸軍事齊王璽綬輼輬車黄屋左纛前後部羽葆鼓吹輕車介士備九錫之禮諡曰文襄王戊辰詔齊王為使持節丞相都督中外諸軍事録尚書事大行臺齊郡王食邑一萬戸甲戌地豆干契丹國並遣使朝貢二月甲申葬齊文襄王車駕祖於漳濵庚寅以尚書令髙隆之為太保三月庚申進齊郡王爵為齊王夏四月乙巳蠕蠕遣使朝貢五月甲寅詔齊王為相國總百揆封冀州之渤海長樂安徳武邑瀛州之河間髙陽章武定州之中山常山博陵十郡二十萬戸備九錫之禮以齊國太妃為王太后王妃為王后丙辰詔歸帝位於齊國即日遜於别宫齊天保元年五月己未封帝為中山王邑一萬戸上書不稱臣答不稱詔載天子旌旗行魏正朔乗五時副車封王諸子為縣公邑各一千戸奉絹三萬匹錢一千萬粟二萬石奴婢三百人水碾一具田百頃園一所於中山國立魏宗廟二年十二月己酉中山王殂時年二十八三年二月奉諡曰孝静皇帝葬於漳西山崗其後發之陵崩死者六十人帝好文學美容儀力能挾石師子以踰牆射無不中嘉辰宴㑹多命羣臣賦詩從容沉雅有孝文風齊文襄王嗣事甚忌焉以大将軍中兵參軍崔季舒為中書黄門侍郎令監察動静小大皆令季舒知文襄與季舒書曰癡人復何似癡勢小差未帝甞與獵於鄴東馳逐如飛監衛都督烏那羅受工伐從後呼帝曰天子莫走馬大将軍怒文襄嘗侍飲大舉觴曰臣澄勸陛下酒帝不悦曰自古無不亡之國朕亦何用此活文襄怒曰朕朕狗脚朕文襄使季舒毆帝三拳奮衣而出明日文襄使季舒勞帝帝亦謝焉賜絹季舒未敢受以啓文襄文襄使取一段帝束百匹以與之曰亦一段耳帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連恥本自江海人忠義動君子常侍侍講荀濟知帝意乃與華山王大器元瑾宻謀於宫内為山而作地道向北城至千秋門門者覺地下響動以告文襄文襄勒兵入宫曰陛下何意反邪臣父子功存社稷何負陛下邪將殺諸妃嬪帝正色曰王自欲反何關於我我尚不惜身何况妃嬪文襄下牀叩頭大啼謝罪於是酣飲夜久乃出居三日幽帝於含草堂大器瑾等皆見烹於市及將禪位於文宣襄城王旭及司徒潘相樂侍中張亮黄門郎趙彦琛等求入奏事帝在昭陽殿見之旭曰五行遞運有始有終齊王聖徳欽明萬姓歸仰臣等昧死聞奏願陛下則堯禪舜帝便斂容答曰此事推挹已久謹當遜避又云若爾湏作詔書侍郎崔劭裴讓之奏云詔已作訖即付楊愔進於帝凡十條書訖帝曰將安朕何所復若為而去楊愔對曰在北城别有館宇還備法駕依常仗衛而去帝乃下御座歩就東廊口詠范蔚宗後漢書賛云獻生不辰身播國屯終我四百永作虞賔所司奏請發帝曰古人念遺簮敝履欲與六宫别可乎髙隆之曰今天下猶陛下之天下况在後宫乃與夫人妃嬪以下訣莫不欷歔掩涕嬪趙國李氏誦陳思王詩云王其愛玉體俱享黄髪期皇后已下皆哭直長趙徳以故犢車一乗候於東上閤帝上車徳超上車持帝帝肘之曰朕畏天順人授位相國何物奴敢逼人趙徳尚不下及岀雲龍門王公百寮衣冠拜辭帝曰今日不減常道鄉公漢獻帝衆皆悲愴髙隆之泣灑遂入北城下司馬子如南宅及文宣行幸常以帝自隨帝后封太原公主常為帝嘗食以䕶視焉竟遇酖而崩魏書卷十二魏書卷十二考證帝紀第十二魏收書孝静紀亡後人所補孝静帝紀車駕北遷於鄴北史曰髙歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分為二矣寳炬渭州刺史本書以齊得統於東魏故直稱西魏文帝為寳炬春正月壬戍朔大赦天下改元臣人龍按朔日為壬戌則下文己巳車駕蒐於邯鄲之西山乃初八日癸酉還宫乃十二日直湏至三月初十日乃有壬申不知二月内何以又有壬申也北史亦同以今上為左僕射北史以太原公髙洋為左僕射齊天保二年詔魏收修魏史故稱今上也移洛陽漢魏石經于鄴綱目漢靈帝熹平四年立石經四部本碑凡四十六枚齊王如晋陽齊王亦謂髙洋也前稱今上未有封號莫可稱也稱太原公今上嫌公爵亦人臣也此稱齊王則雖臣而近於君矣收之書法云爾魏書卷十二考證
