body:
  text: 魏書卷七十二齊魏收撰列傳第六十陽尼賈思伯李叔虎路恃慶房亮曹世表潘永基朱元旭陽尼字景文北平無終人少好學博通羣籍與上谷侯天護頓丘李彪同志齊名幽州刺史胡泥以尼學藝文雅乃表薦之徴拜祕書著作郎奏佛道宜在史録後改中書學為國子學時中書監髙閭侍中李沖等以尼碩學博識舉為國子祭酒髙祖嘗親在苑堂講諸經典詔尼侍聽賜帛百匹尼後兼幽州中正出為幽州平北府長史帶漁陽太守未拜坐為中正時受鄉人財貨免官尼每自傷曰吾昔未仕不曽羡人今日失官與本何異然非吾宿志命也如何既而還鄉遂卒於冀州年六十一有書數千卷所造字釋數十篇未就而卒其從孫太學博士承慶遂撰為字統二十卷行於世子介字天佐奉朝請冀州黙曹參軍早卒尼從子鳴鵠鳴鵠弟季智俱有名於時前後並為幽州司馬季智子璠通直散騎常侍季智從弟荆范陽太守有吏能卒贈平西將軍東益州刺史季智從子伯慶汝南太守伯慶從父弟藻字景德少孤有雅志涉獵經史太和初舉秀才射策髙第以母疾還徴拜中書博士詔兼禮官拜燕宣王廟於長安還授寧遠將軍賜爵魏昌男選為廷尉正轉考功郎中除建德太守以清貧賜帛六十匹尋假寜逺將軍領統軍外防内撫甚得居邊之稱解任還家乆之除兗州左將軍府長史又拜瀛州安東府長史加揚烈將軍藻以年老歸家闔門不關世事孝昌中在鄉為賊帥杜洛周所囚發病卒永熙中贈征虜將軍幽州刺史子貞字世幹早卒貞弟弼字世輔長於吏事本州别駕加輕車將軍屬洛周陷城弼遂率宗親南渡河居於青州値邢杲起逆青州城民疑河北人為杲内應遂害弼時年四十八子撝襲祖爵弼弟斐武定末尚書右丞藻從弟令鮮京兆王愉郎中令坐同愉反逃竄免㑹赦除名子世和武定末齊州驃騎司馬藻從弟延興南豳州刺史延興從弟固字敬安性俶儻不拘小節少任俠好劒客弗事生産年二十六始折節好學遂博覽篇籍有文才太和中從大將軍宋王劉昶征義陽板府法曹行參軍假陵江將軍昶嚴暴治軍甚急三軍戰慄無敢言者固啓諫幷面陳事宜昶大怒欲斬之使監當攻道固在軍勇決志意閑雅了無懼色昶甚竒之軍還言之髙祖年三十餘始辟大將軍府參軍事署城局仍從昶鎭彭城板兼長史俄以憂去任裴叔業以淮南内附世宗詔平南將軍廣陵侯元衎與司徒彭城王勰同鎭壽春勑固為衎司馬還除太尉西閤祭酒兼廷尉評上改定律令議除給事中出為試守平北太守甚有惠政乆之以公事免後除給事中領侍御史轉治書劾奏廣平王懷汝南王悦南陽長公主及使懷荒鎭將萬貳望風逃走劾恒農太守裴粲免官時世宗廣訪得失固上讜言表曰臣聞為治不在多方在於力行而已當今之務宜早正東儲立師傅以保護立官司以防衛以係蒼生之心攬權衡親宗室彊幹弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素餐孜孜萬幾躬勤庶務使民無謗讟之響省徭役薄賦歛修學官遵舊章貴農桑賤工賈絶談虛窮微之論簡桑門無用之費以存元元之民以救飢寒之苦上合昊天之心下悦億兆之望然後備器械修甲兵習水戰滅吳㑹撰封禪之禮襲軒唐之軌同彼七十二君之徽號協定鼎嵩河之心副髙祖殷勤之寄上與三皇比隆下與五帝齊美豈不茂哉臣位卑識昧言不及義屬聖明廣訪敢獻瞽言伏願陛下留神少垂究察初世宗委任羣下不甚親覽好桑門之法尚書令髙肇以外戚權寵專決朝事又咸陽王禧等並有釁故宗室大臣相見疎薄而王畿民庶勞敝益甚固乃作南北二都賦稱恒代田漁聲樂侈靡之事節以中京禮儀之式因以諷諌辭多不載世宗末中尉王顯起宅既成集寮屬饗宴酒酣問固曰此宅何如固對曰晏嬰湫隘流稱于今豐屋生災著於周易此葢同傳舍耳唯有德能卒願公勉之顯嘿然他日又謂固曰吾作太府卿庫藏充實卿以為何如固對曰公收百官之祿四分之一州郡贓贖悉入京藏以此充府未足為多且有聚斂之臣寧有盗臣豈不戒哉顯大不悦以此銜固又有人間固於顯顯因奏固剩請米麥免固官既無事役遂闔門自守著演賾賦以明幽微通塞之事其詞曰紹有周之遐軌兮初錫世於河陽建甸侯而列爵兮與王室而並昌遭季葉之紛亂兮仍矯迹於良鄉棄衛侯之楨弼兮乃植根於幽方自祖考而輝烈兮逮余躬而翳微懼堂構之頽撓兮恐崩毁其洪基心惴惴而慄慄兮若臨深而履薄登喬木而長吟兮抗幽谷而靡託何身輕而任重兮懼顛墜於峻壑慿神明之扶助兮雖幽微而獲存頼先后之醇德兮乃保護其遺孫伊日月之屢遷兮何四時之相逼知年命之有期兮慨斡流之不息傷難躓之相承兮悲屯蹇而日臻心惻愴而不懌兮乃有懷於古人或垂綸於渭濵兮有胥靡於傅巖既應繇而赴兆兮作殷周之元鑒孔栖栖而不息兮終見黜於庶邦墨馳騁而不已兮亦舉世而不容有鸞孤而爭國兮有讓位而採薇有躍馬而赴㑹兮有棲遲以俟時曹納辛而袁亡兮袁戮田而曹盛鮑授州而得時兮韓棄牧而失性趙堯門而誕聖兮終夭隠而不繁衛泯軀於世難兮啓洪業於宣元釋臯繇之法憲兮見蓼六之先亡練疑枉於怨獄兮寧于公之獨昌明禍福之同門兮知休咎之異塗尋倚伏之無源兮或先詘而後舒賜慿軒而策駟兮撫清琴而自娛憲服敝於陋巷兮藴六藝於蓬廬勃計行而致位兮錯謀合而身傾蕭功成而福集兮韓勲立而禍并紛回平而綿結兮亮未識其幽情有積毁而恩昵兮有積譽而寵衰或形乖而意合兮或身密而志離情與貌而紛競兮體與識而交馳旦流言而見疑先緣謗而益信樂食子而中疎兮巴放麑而日進或舉世而稱賢兮偶不合於主心或居鄉而三黜兮獨為時之所欽或負鼎而干主兮或杖䇿於幽林或望旗而色阻兮或臨危而撫琴道有大而由小兮義有顯而必微理貴在於得要兮事終成於㑹機每一日而三省兮亦有念而九思孰有是而可是兮孰有非而可非石育子而啓夏兮鳦遺卵而孕殷鳥藉冰而存棄兮虎乳孩以字文發昇舟而魚躍兮季潛軀而覆雲或揮戈而爭帝兮或洗耳而辭君道曲成而不一兮神參差而異兆兹聖達之未明兮豈前修之克了迷白日之近遙兮方有闚於天表且臨海而觀瀾兮何津源之杳杳文遷繹而身徂兮景守節而災移湯改祝而革命兮靈投策而詬龜圉據胎而為巨兮友發文而自相風吹鶂而襄墜兮神壓紐而平王彼嬴縮之由人兮信吉凶之在已或勤憂以減齡兮亦安樂而獲祉弟成師而害兄兮父純臣而烹子識同命於三君兮兆先見於矞姒始樓桑而發輝兮終龍變於巴庸繞閶門而結慶兮鬱蟬蜕於三江水浩浩而襄陵兮竊息壤而瘠之鮌殛死於羽山兮禹宣力而營之鑿龍門以通河兮疎九江而入海總九州以攸同兮甄五都之所在雖父子之同氣兮乃業行之丕改以患蹇為福兮痛比干之殘軀以佞諛為獲安兮哂宰嚭之見屠以舉士而受賞兮悼史遷之腐刑以進為無益兮見鄂秋之專城以仁義為桎梏兮信揖讓之勞疲以放曠為解懸兮傷六親之乖離哀越種之被戮兮嘉范蠡之脱羈欽四皓之髙尚兮歎伊周之涉危望仗鉞而先鋒兮光安車而勿顧求封賞於寸心兮夢台袞於遠慮或忌賢而獨立或簒君以自樹既思匿而名揚兮亦求清而反汙見衆兆之紛錯兮覩變化之無方心營營而擾擾兮乃探𠂻而凖常儼端坐於敝筵兮始拂龜而整策冀靈鑒之祐余兮願告余以忠益龜發兆以施靈兮利去華而守約蓍布列而成卦兮保龍潛而勿躍踵嘉遯之𤣥蹤兮追考盤於巖壑登名山以恬澹兮辭朝市之紛若奉貞吉於占繇兮翻夕警而晨裝揖許公於箕嶺兮諮夷齊於首陽膽嵩華之嵁崿兮眺恒碣之䃐磄陵江湖之駭浪兮昇醫閭之尚羊乘𤣥虬之奕奕兮鳴玉鑾之瑲瑲浮滄波而濯足兮入三山而解裳謁伯禹於塗山兮詰三苗於三危登蒼梧而遐眺兮訪二妃於有媯追祝融於荆芉兮問洛宓於馮夷陵囘飈而上驤兮窮深谷而下馳㳂扶水而遠矚兮見虞淵之威微乘閬風之峻岅兮覿王母於崦嵫昇瑤臺而奏歌兮坐瓊室而賦詩託赤水以寄命兮附光風以𫝊辭出琨岫之崢嶸兮入汜林之杳鬱採鍾山之玉瑛兮收珠澤之珂珬攜羽民而逺遊兮探長生之妙術騰雲霧而窈㝠兮變域中之穢質望𤣥闕之寂寥兮過寒門而懷悲揖若士於霄際兮求霧塵於海湄憑帝臺而肆眺兮歴層冰而風馳越弱水之渟濙兮躡不周之嶮巇屑瓊蘂以為糧兮斟玉液以為漿結秋蘭以為珮兮攬白蜺以為裳聳景雲而上征兮撫閭闔而啓扉肅百神而警策兮奏中皇於紫微聆鈞天而九變兮耽廣樂而忘歸忽心移而志駭兮戀舊京而依依握招摇以為斾兮巡天漢而下遊建雲旗之逶迤兮御囘風之瀏瀏策王良以斂轡兮命風伯以挾輈符屏翳以清路兮告河鼓以具舟聊右次於析木兮遹囘駕於靑邱訪古人以首陽兮亦問道於鷞鳩覩三韓之累累兮見卉服之悠悠瞻雒常之鬱鬱兮貢楛矢之啾啾心怊怊而惕惕兮志憫憫而綿綿伊五嶽之塠塠兮何四海之涓涓瞻九河其如帶兮觀三江其沉然夫五都之揔揔兮尚何足以遊盤彼八方之局促兮殊無可以達觀方吞霞而棄粒兮亦屑玉而鍊丹潄醴泉以養氣兮吸沆瀣以當餐䕃建木之長柯兮援木禾之修莖咀玉髓而充渴兮嚼正陽以長生參松喬而撫翰兮侣浮邱而上征嗟域中之黙黙兮詎攄寫其深情情盤桓而猶豫兮志狐疑而未決久放蕩而不還兮心惆悵而不悦憶慈親於故鄉兮戀先君於邱墓囘遊駕而改轅兮縱歸轡而緩御僕眷眷於短銜兮馬依依於跬步還故園而解羈兮入茅宇而返素耕東臯之沃壤兮釣北湖之深潭養慈顔於婦子兮競獻壽而薦甘朝樂酣於濁酒兮夕寄忻於素琴誦風雅以導志兮藴六藉於胸襟敦儒墨之大教兮崇逸民之逺心播仁聲於終古兮流不朽之徽音進不求於聞達兮退不營於榮利泛若不繫之舟兮湛若不用之器不潔其身兮不屑於位不拘小節兮不求曲備資靈運以託已兮任性命之遭隨既聽天而委化兮無形志之兩疲除紛競而靖黙兮守沖寂以無為寄後賢以籍賞兮寧怨時之弗知亂曰稟元承命人冣靈兮夭壽否泰本天成兮體源究道歸聖哲兮隨化委遇能達節兮顯親揚名德之上兮保家全身亦厚量兮趣世浮動違性命兮鑒始究終同水鏡兮志願不合思逺遊兮陵虛騁志從所求兮周歴四極騰人表兮形勞志沮未衷道兮反我遊駕養慈親兮躬耕練藝齊至人兮固又作刺讒疾嬖幸詩二首曰巧巧佞佞讒言興兮營營習習似青蠅兮以白為黒在汝口兮汝非蝮蠆毒何厚兮巧佞巧佞一何工矣司閒司忿言必從矣朋黨噂􅊱自相同矣浸潤之譖傾人墉矣成人之美君子貴焉攻人之惡君子恥焉汝何人斯譖毁日繁予實無罪騁汝詭言番番緝緝讒言側入君子好讒如或弗及天疾讒説汝其至矣無妄之禍行將及矣泛泛遊鳬弗制弗拘行藏之徒或智或愚維予小人未明兹理毁與行俱言與釁起我其懲矣我其悔矣豈求人兮忠恕在已彼諂諛兮人之蠧兮刺促昔粟罔顧恥辱以求媚兮邪干側入如恐弗及以自容兮志行𥚹小好習不道朝挾其車夕承其輿或騎或徒載奔載趨或言或笑曲事親要正路不由邪徑是蹈不識大猷不知話言其朋其黨其徒實繁有詭其行有佞其音蘧蒢戚施邪媚是欽既詭且妬以逞其心是信是任敗其以多不始不愼末如之何習習宰嚭營營無極梁丘寡智王鮒淺識伊戾息夫異世同力江充趙髙甘言似直豎刁上官擅生羽翼乃如之人僭爽其德豈徒喪邦又亦覆國嗟爾中下其親其昵不謂其非不覺其失好之有年寵之有日我思古人心焉若疾凡百君子宜其慎矣覆車之鑒近可信矣言既備矣事既至矣反是不思維塵及矣肅宗即位除尚書考功郎奏諸秀孝中第者聽叙自固始大軍征硤石勑為僕射李平行臺七兵郎中平竒固勇敢軍中大事悉與謀之又命固節度水軍固設竒計先期乘賊獲其外城軍罷太傅清河王懌舉固除步兵校尉領汝南王悦即中令尋加寧逺將軍時悦年少行多不法屑近小人固上疏切諫幷面陳徃代諸王賢愚之分以感動悦悦甚敬憚之懌大悦以為舉得其人熙平二年除洛陽令將軍如故在縣甚有威風丁母憂號慕毁病杖而能起練禫之後猶酒肉不進時固年踰五十而喪過於哀鄉黨親族咸歎服焉神龜末清河王懌領太尉辟固從事中郎屬懌被害元义秉政朝野震悚懌諸子及門生吏寮莫不慮禍隠避不出素為懌所厚者彌不自安固以嘗被辟命遂獨詣喪所盡哀慟哭良久乃還僕射游肇聞而歎曰雖欒布王脩何以尚也君子哉若人及汝南王悦為太尉選舉多非其人又輕肆檛撻固以前為元卿雖離國猶上疏切諫事在悦傳悦辟固為從事中郎不就正光二年京兆王繼為司徒髙選官竂辟固從事中郎加鎭逺將軍府解除前軍將軍鎭逺如故又典科揚州勲賞初硤石之役固有先登之功而朝賞未及至是與尚書令李崇訟勲更表崇雖貴盛固據理不撓談者稱焉四年九月卒時年五十七贈輔國將軍太常少卿諡曰文固剛直雅正不畏彊禦居官清潔家無餘財終殁之日室徒四壁無以供喪親故為其棺歛焉初固著緒制一篇務從儉約臨終又勑諸子一遵先制固有三子長休之武定末黄門郎休之弟詮之字子衡少著才名辟司徒行參軍早為門生所害時人悼惜之賈思伯字士休齊郡益都人也世父元壽髙祖時中書侍郎有學行見稱於時思伯釋褐奉朝請太子步兵校尉中書舎人轉中書侍郎頗為髙祖所知常從征伐及世宗即位以時從之勤轉輔國將軍任城王澄之圍鍾離也以思伯持節為其軍司及澄失利思伯為後殿澄以思伯儒者謂之必死及至大喜曰仁者必有勇常謂虛談今於軍司見之矣思伯託以失道不伐其功時論稱其長者後為河内太守不拜尋除鴻臚少卿以母憂免服闋徵為滎陽太守有政績遷征虜將軍南青州刺史初思伯與弟思同師事北海陰鳯授業無資酬之鳯遂質其衣物及思伯之部送縑百匹遺鳯因具車馬迎之鳯慙不徃時人稱歎焉尋以父憂免後除征虜將軍光禄少卿仍拜左將軍兖州刺史肅宗時徵為給事黄門侍郎因請拜掃還鄉里未拜以風聞免尋除右將軍涼州刺史思伯以州邊逺不樂外出辭以男女未㛰靈太后不許舎人徐紇言之得改授太尉長史又除安東將軍廷尉卿思伯自以儒素為業不好法律希言事俄轉衛尉卿于時議建明堂多有同異思伯上議曰按周禮考工記云夏后氏世室殷重屋周明堂皆五室鄭注云此三者或舉宗廟或舉王寢或舉明堂互言之以明其制同也若然則殷夏之世已有明堂矣唐虞以前其事未聞戴德禮記云明堂凡九室十二堂蔡邕云明堂者天子太廟饗功養老教學選士皆於其中九室十二堂按戴德撰記世所不行且九室十二堂其於規制恐難得厥衷周禮營國左祖右社明堂在國之陽則非天子太廟明矣然則禮記月令四堂及太室皆謂之廟者當以天子暫配享五帝故耳又王制云周人養國老於東膠鄭注云東膠即辟雍在王宮之東又詩大雅云邕邕在宮肅肅在廟鄭注云宮謂辟雍宮也所以助王養老則尚和助祭則尚敬又不在明堂之驗矣按孟子云齊宣王謂孟子曰吾欲毁明堂若明堂是廟則不應有毁之問且蔡邕論明堂之制云堂方一百四十尺象坤之策屋圓徑二百一十六尺象乾之策方六丈徑九丈象陰陽九六之數九室以象九州屋髙八十一尺象黄鍾九九之數二十八柱以象宿外廣二十四丈以象氣按此皆以天地陰陽氣數為法而室獨象九州何也若立五室以象五行豈不快也如此蔡氏之論非為通典九室之言或未可從竊尋考工記雖是補闕之書相承已久諸儒注述無言非者方之後作不亦優乎且孝經援神契五經要義舊禮圖皆作五室及徐劉之論同考工者多矣朝廷若獨絶今古自為一代制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極於三王後來疑議難可準信鄭元云周人明堂五室是帝各有一室也合於五行之數周禮依數以為之室施行于今雖有不同時説然耳尋鄭此論非為無當按月令亦無九室之文原其制置不乖五室其青陽右个即明堂左个明堂右个即總章左个總章右个即𤣥堂左个𤣥堂右个即青陽左个如此則室猶是五而布政十二五室之理謂為可按其方圓髙廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之説裴逸一屋之論及諸家紛紜並無取焉學者善其議又遷太常卿兼度支尚書轉正都官時太保崔光疾甚表薦思伯為侍講中書舎人馮元興為侍讀思伯遂入授肅宗杜氏春秋思伯少雖明經從官廢業至是更延儒生夜講晝授性謙和輕身禮士雖在街途停車下馬接誘恂恂曽無倦色客有謂思伯曰公今貴重寧能不驕思伯曰衰至便驕何常之有當世以為雅談為元义所寵論者譏其趣勢孝昌元年卒贈鎭東將軍青州刺史又贈尚書右僕射諡曰文貞子彦始武定中淮陽太守思伯弟思同字士明少厲志行雅好經史釋褐彭城王國侍郎五遷尚書考功郎青州别駕久之遷鎭逺將軍中散大夫試守滎陽太守尋即真後除平南將軍襄州刺史雖無明察之譽百姓安之及元顥之亂也思同與廣州刺史鄭光護並不降莊帝還宮封營陵縣開國男邑二百户除撫軍將軍給事黄門侍郎青州大中正又為鎭東金紫光禄大夫仍兼黄門尋加車騎大將軍左光禄大夫遷鄴後除黄門侍郎兼侍中河南慰勞大使仍與國子祭酒韓子熙並為侍講授静帝杜氏春秋又加散騎常侍兼七兵尚書尋拜侍中興和二年卒贈使持節都督青徐光三州諸軍事驃騎大將軍尚書右僕射司徒公青州刺史諡曰文獻初思同之為别駕也清河崔光韶先為治中自恃資地恥居其下聞思同還鄉遂便去職州里人物為思同恨之及光韶之亡遺誡子姪不聽求贈思同遂上表訟光韶操業登時蒙贈諡論者歎尚焉思同之侍講也國子博士遼西衛冀隆為服氏之學上書難杜氏春秋六十三事思同復駮冀隆乖錯者十一條互相是非積成十卷詔下國學集諸儒考之事未竟而思同卒卒後魏郡姚文安樂陵秦道静復述思同意冀隆亦尋物故浮陽劉休和又持冀隆説至今未能裁正焉李叔虎渤海脩人也從祖金世祖神䴥中與髙允俱被徵位至征南從事中郎叔虎好學博聞有識度為鄉閭所稱太和中拜中書博士與清河崔光河間邢巒並相親友轉議郎久之遷太尉從事中郎轉國子博士本國中正攝樂陵中正性清直甚有公平之稱後兼散騎侍郎太極都將事訖除高陽太守固辭不拜尋除顯武將軍太尉髙陽王雍諮議參軍事雍以其器操重之尋除假節行華州事為吏民所稱永平四年卒年五十四贈冠軍將軍南青州刺史諡曰穆兄叔寳州舉秀才拜頓丘公國郎中令遷太常丞延昌末叔寳為弟臺戸及從弟歸伯同沙門法慶反陷破郡縣叔寳當坐遇病死於洛陽獄子伯胄光禄大夫叔寳從弟鳯歴尚書郎中國子博士坐弟同京兆王愉逆除名鳯從子長仁字景安頗有學涉舉秀才射策髙第拜中書博士轉中書侍郎累遷平南將軍沛郡太守仍為彭城太守又從尉元討定南境賜爵延陵男徵拜員外散騎常侍使於劉準行還以疾除北海内史詔賜醫藥凡在三郡吏民安之尋卒武定中贈安南將軍七兵尚書冀州刺史男如故長仁從弟述字道興有學識州舉秀才拜太常博士使詣長安冊祭燕宣王廟還除尚書儀曹郎賜爵蓨縣男稍遷建興太守卒子象字孟則清簡有風槩博涉羣書初襲爵為徐州平東府功曹參軍遷冀州治中有勤績久之拜散騎侍郎加寧朔將軍尋轉中書侍郎出為青州太傅開府諮議參軍行北徐州事本將軍光禄大夫齊文襄王引為開府諮議參軍加征東將軍興和二年兼散騎常侍使於蕭衍三年卒贈驃騎大將軍儀同三司冀州刺史諡曰文簡以子子貞預義之勤也子貞歴司空長史武邑太守司徒右長史陽平太守入為吏部郎中出為驃騎將軍兗州刺史坐貪汙賜死路恃慶字伯瑞陽平清淵人也祖綽陽平太守恃慶有幹用與廣平宋飜俱知名為鄉閭所稱相州刺史李安世並表薦之太和中除奉朝請恃慶以從兄文舉有才望因推讓之髙祖遂並拜焉稍遷尚書儀曹郎轉左民郎行潁州郡出為華州安定王征虜府長史尋以母憂去職仍轉定州河間王琛長史琛貪暴肆意恃慶每進苦言年四十八卒贈左將軍安州刺史諡曰襄子祖璧給事中恃慶弟仲信亦好學為太尉參軍稍遷奉車都尉開府掾章武王融之討葛榮也仲信為其都督府長史融敗殁仲信遂亦免棄仲信弟思略字叔約有識尚冀州安東府騎軍參軍子祖遺武定末太學博士思畧弟思令字季儁初為廣陽王司空參軍轉司空城局參軍司徒記室威逺將軍尚書左民郎轉右民時天下多事思令乃上疏曰臣聞國之大事唯祀與戎戎之有功在於將帥三代不必别民取治不等五霸不必異兵各能剋定有湯武之賢猶須伊望之佐堯舜之聖尚有稷契之輔得其人也六合唾掌可清失其人也三河方為戰地何者動之甚易靖之至難竊以比年以來將帥多是寵貴子孫軍幢統領亦皆故義託附貴戚子弟未經戎役至於衘杯躍馬志逸氣浮軒眉攘腕便以攻戰自許及臨大敵怖懼交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當鋭彊壯居後以安身兼復器械不精進止不集任羊質之將驅不練之兵當負險之衆敵數戰之虜欲令不敗豈有得哉是以兵知必敗始集而先逃將又怖敵遷延而不進國家便謂官號未滿重爵屢加復疑賞賚之輕金帛日賜帑藏空虛民財殫盡致使賊徒更増膽氣益盛生民損耗荼毒無聊主歎臣哀何心寢食臣雖位微竊不遑舎臣聞孝行出於忠貞節義率多果決德可感義夫恩可勸死士今若捨上所輕求下所重黜陟幽明賞罰善惡搜徒簡卒練兵習武甲密弩彊弓調矢勁謀夫既設辯士先陳曉以安危示其禍福如其不悛以我義順之師討兹悖逆之豎豈異厲蕭斧而伐朝菌鼓洪爐而燎毛髮雖愚者知其不旋踵矣敢以愚短昩死陳誠尋拜假節征虜將軍陽平太守又割冀州之平清河相州之陽平齊州之原以為南冀州仍以思令為左將軍南冀州刺史假平東將軍都督時葛榮遣其清河太守據季虎髙唐城以招叛民思令乃命麾下幷率鄉曲潛軍夜徃出其不意遂大破之徐乃收衆南還又詔思令幷領冀州流民及葛榮滅還鎭平原後除征東將軍金紫光禄大夫轉衛將軍右光禄大夫天平三年三月卒時年五十一贈驃騎將軍定州刺史恃慶從叔景略起家中書博士太和中尚書郎本郡中正出為齊州魏郡平原二郡太守卒景略弟雄字仲略容貌偉異以軍功為給事中髙祖曽對羣臣云路仲略好尚書郎才僕射李沖云其人宜為武職遂停轉太尉咸陽王録事參軍遷伏波將軍奉車都尉卒贈頓邱太守景略從祖弟法常幼而修立為郡功曹早卒儀同李神儁與之有舊每云諸路前輩中有路法常足為名士謂必逺至而竟無年天下事誠難知也房亮字景髙清河人也父法延譙郡太守亮好學有節操太和中舉秀才為奉朝請拜祕書郎又兼員外散騎侍郎副中書侍郎宋弁使於蕭賾還除尚書二千石郎中濟州中正兼員外常侍使髙麗髙麗王託疾不拜以亮辱命坐白衣守郎中後除濟北太守轉平原太守以清嚴稱時冀州刺史京兆王愉據州反平原界在河北與愉接境愉乃遣人説亮啖以榮利亮即斬其使人發兵防捍愉怒遣其大將張靈和率衆攻亮亮督厲兵民喩以逆順出城拒擊大破之尋遭憂解任服終除左將軍汲郡太守遷前將軍東荆州刺史亮留心撫納夷夏安之時邊州刺史例得一子出身亮不言其子而啓弟子超為奉朝請議者稱之轉平東將軍滄州刺史入為光禄大夫加安東將軍永安二年卒年七十一贈撫軍將軍齊州刺史子柬字元約卒於光禄大夫亮弟詮字鳯舉尚書郎本州中正卒贈撫軍將軍齊州刺史詮弟悦字季欣解褐廣平王懷國常侍轉青州平東府中兵參軍加宣威將軍遷髙陽太守轉廣川太守加鎭逺將軍普泰中濟州刺史張瓊表所部置南清河郡仍請悦為太守朝廷從之凡歴三郡民吏安之遷平東將軍太中大夫興和二年卒年七十贈征東將軍濟州刺史長子超字伯頴武定末司徒録事參軍濟州大中正超弟昭淮州驃騎大將軍府長史曹世表字景昇東魏郡魏人也魏大司馬休九世孫祖謨父慶並有學名世表少䘮父舉止有禮度性雅正工尺牘涉獵羣書太和二十三年尚書僕射任城王澄奏世表為國子助敎頗失意後轉司徒記室與武威賈思伯范陽盧同隴西辛雄等並相友善侍中崔光鄉里貴達毎稱美之遇患歸鄉永平中除兗州左將軍府司馬非其所願復以病解延昌中除清河太守治官省約百姓安之正光中拜前將軍通直散騎常侍大將軍京兆王繼西征以為從事中郎攝中水兵事自當煩劇論者皆稱其能還都拜司空長史孝昌中青齊頻年反亂詔世表持節慰喩還都轉尚書右丞後加征虜將軍出行豫州刺史値蕭衍將湛僧珍陷東豫州州民劉獲鄭辯反於州界為之内應朝廷以源子恭代世表為州以世表為東南道行臺率元安平元顯伯皇甫鄧林等討之於時賊衆彊斷小殷關驛使不通諸將以士馬單少皆敗散之餘不敢復戰咸欲保城自固世表時患背腫乃輿病出外呼統軍是云寳謂之曰湛僧珍所以敢深入為寇者以獲辯皆州民之望為之内應向有驛至知劉獲移軍欲迎僧珍去此八十里今出其不意一戰可破獲破則僧珍自走東南清服卿之功也乃簡選兵馬付寳討之促令發軍自暮出城比曉兵合賊不意官軍卒至一戰破獲諸賊悉平湛僧珍退走唯鄭辯與子恭親舊亡匿子恭所世表召諸將吏衆責子恭收辯斬之傳首京師勑遣中使宣㫖慰喩賜馬二匹衣服被褥復以世表行豫州事行臺如故還朝加左將軍兼尚書東道行臺㳂河分立鎭戍以傋葛榮行達青州遇患卒時年五十四永熙中贈平東將軍齊州刺史潘永基字紹業長樂廣宗人也父靈虬中書侍郎永基性通率輕財好施為冀州鎭東府法曹行參軍遷威烈將軍揚州曲陽戍主轉西硤石戍主治陳留南梁二郡事頗有威惠轉揚州車騎府主簿累遷虎賁中郎將直寢前將軍出為持節平北將軍冀州防城都督長樂太守于時葛榮攻信都長圍遏水以灌州城永基與刺史元孚同心戮力晝夜防拒外無軍援内乏糧儲從春至冬力窮乃陷榮欲害孚永基請以身代孚死永安二年除潁川太守遷鎭東將軍東除州刺史時蕭衍將曹世宗馬洪武等率衆來寇永基出討破之永熙中為征東將軍金紫光禄大夫遷車騎將軍左光禄大夫尋加衛大將軍復除東徐州刺史前後在州為吏民所樂代還京師元象初卒年五十六贈散騎常侍都督冀瀛洲三州諸軍事驃騎大將軍尚書右僕射司徒公冀州刺史長子子禮州主簿子禮弟子智武定中太尉士曹參軍朱元旭字君昇本樂陵人也祖霸眞君末南叛投劉義隆遂居青州之樂陵元旭頗涉子史開解几案起家清河王國常侍太學博士員外散騎侍郎頻使髙麗除尚書度支郎中神龜末以郎選不精大加沙汰元旭與隴西辛雄范陽祖瑩泰山羊深西平源子恭並以才用見留㝷加鎭逺將軍兼尚書右丞仍郎中本州中正時闗西都督蕭寶夤啓云所統十萬食唯一月於是肅宗大怒召問所由録令以下皆推罪於元旭元旭入見於御座前屈指校計寶夤兵糧乃踰一年事乃得釋除通直散騎常侍永安初加平東將軍尚書左丞光禄大夫後轉司農少卿遷衛將軍左光禄大夫天平中復拜尚書左丞既無風操俛仰隨俗性多機數自容而已於時朝廷分汲郡河内二界挾河之地以立義州安置闗西歸款之戸除元旭使持節驃騎將軍義州刺史武定三年夏卒於州年六十七贈本將軍幽州刺史子敬道武定中司徒長流參軍史臣曰陽尼學義之迹世不乏人固逺氣正情文學兼致賈思伯門有舊業經明行修唯兄及弟並摽儒素李路器尚所及俱可觀者象風采詞涉亦當年之俊民房亮曹世表潘永基朱元旭拔萃從宦咸享名器各有由也魏書卷七十二魏書卷七十二考證陽尼傳兆先見於矞姒姒應作似臣人龍按左傳文十年楚范巫矞似注矞似人名范邑之巫也朱元旭傳於時朝廷分汲郡河内二界挾河之地以立義州臣人龍按本書地形志義州興和二年置寄治汲郡陳城當即其事也挾河即夾河古字通北史作扶風誤魏書卷七十二考證
