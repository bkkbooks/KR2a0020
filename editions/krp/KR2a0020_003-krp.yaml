body:
  text: 魏書卷三齊魏收撰帝紀第三太宗紀太宗明元皇帝諱嗣太祖長子也母曰劉貴人登國七年生於雲中宮太祖晚有子聞而大悦乃大赦天下帝明叡寛毅非禮不動太祖甚竒之天興六年封齊王拜相國加車騎大將軍初帝母劉貴人賜死太祖告帝曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家為亂汝當繼統故吾逺同漢武為長乆之計帝素純孝哀泣不能自勝太祖怒之帝還宮哀不自止日夜號泣太祖知而又召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待怒解而進不晚也帝懼從之乃遊行逃於外天賜六年冬十月清河王紹作逆太祖崩帝入誅紹壬申即皇帝位大赦改年為永興元年追尊皇妣為宣穆皇后公卿大臣先罷歸第不與朝政者悉復登用之詔南平公長孫嵩北新侯安同對理民訟簡賢任能彛倫攸敘閏十月丁亥朱提王悦謀反賜死詔都兵將軍山陽侯奚斤廵行諸州問民疾苦撫恤窮乏十有二月戊戍封衞王儀子良為南陽王隂平公元烈進爵為王高涼王樂真改封平陽王己亥帝始居西宮御天文殿蠕蠕犯塞是嵗乞伏乾歸據金城自稱泰王高雲為海夷馮跋所滅跋僭號自稱大燕天王二年春正月甲寅朔詔南平公長孫嵩等北伐蠕蠕平陽民黄苗等依汾自固受姚興官號并州刺史元六頭討平之二月癸未朔詔將軍于栗磾領歩騎一萬鎮平陽夏五月長孫嵩等自大漠還蠕蠕追圍之於牛川壬申帝北伐蠕蠕聞而遁走車駕還幸參合陂秋七月丁巳立馬射臺於陂西仍講武教戰乙丑車駕至自北伐八月章武民劉牙聚衆反山陽侯奚斤討平之九月甲寅𦵏太祖宣武皇帝於盛樂金陵冬十有二月辛巳詔將軍周觀率衆詣西河離石鎮撫山胡是歳司馬徳宗將劉裕滅慕容超於廣固三年春二月戊戌詔曰衣食足知榮辱夫人饑寒切已唯恐朝夕不濟所急者溫飽而已何暇及於仁義之事乎王教之多違蓋由於此也非夫耕婦織内外相成何以家給人足矣其簡宮人非所當御及執作伎巧自餘悉出以配鰥民己亥詔北新侯安同等持節循行并定二州及諸山居雜胡丁零問其疾苦察舉守宰不法其寃窮失職彊弱相陵孤寒不能自存者各以事聞昌黎遼東民二千餘家内屬三月己未詔侍臣常帶劒夏四月戊寅河東蜀民黄思郭綜等率營部七百餘家内屬五月丁夘車駕謁金陵於盛樂己巳昌黎王慕容伯兒謀反伏誅六月姚興遣使來聘西河胡張賢等率營部内附秋七月戊申賜衞士酺三日布帛各有差辛酉賜附國大人錦罽衣服各有差八月戊寅詔將軍束州侯尉古真統兵五千鎮西境太洛城冬十二月甲戍蠕蠕斛律宗黨吐觝于等百餘人内屬甲午詔南平公長孫嵩任城公嵇拔白馬侯崔元伯等坐朝堂錄決囚徒務在平當四年春二月癸未登虎圈射虎賜南平公長孫嵩等布帛各有差夏四月乙未宴羣臣於西宮使各獻直言秋七月己巳朔東廵置四廂大將又放十二時置十二小將以山陽侯奚斤元城侯元屈行左右丞相己夘大獮于石會山戊子臨去畿陂觀漁庚寅至于濡源西廵幸北部諸落賜以繒帛八月庚戍車駕還宮壬子幸西宮臨板殿大饗羣臣將吏以田獵所獲賜之命民大酺三日乙夘賜王公以下至宿衛將士布帛各有差冬十有一月乙丑賜宗室近屬南陽王良已下至於緦麻之親布帛各有差十有二月丁巳車駕北廵至長城而還是年乞伏乾歸為兄子公府所殺子熾磐立沮渠蒙遜自稱河西王五年春正月己巳大閲畿内男子十二以上悉集己夘幸西宮頞拔大渠帥四十餘人詣闕奉貢賜以繒帛錦罽各有差乙酉詔諸州六十户出戎馬一匹庚寅大閲於東郊部署將帥以山陽侯奚斤為前軍衆三萬陽平王熙等十二將各一萬騎帝臨白登躬自校覽焉二月戊申賜陽平王熙及諸王公侯將士布帛各有差庚戍幸高栁川甲寅車駕還宮癸丑穿魚池於北苑庚午姚興遣使來聘詔分遣使者廵求儁逸其豪門彊族為州閭所推者及有文武才幹臨疑能決或有先賢世胄徳行清美學優義博可為人師者各令詣京師當隨才敘用以贊庶政夏四月河東民薛相率部内屬乙巳上黨民勞聰士臻羣聚為盜殺太守令長相率外奔乙夘車駕西巡詔前軍奚斤等先行討越勒部於跋那山夏五月乙亥行幸雲中舊宮之大室丙子大赦天下西河張外建興王紹自以所犯罪重不敢解散庚戍遣元城侯元屈等率衆三千鎮并州乙夘詔㑹稽公劉潔永安侯魏勤等率衆三千鎮西河六月西幸五原校獵于骨羅山獲獸十萬濩澤劉逸自號征東將軍三巴王王紹為署置官屬攻逼建興郡元屈等討平之秋七月己巳還幸薄山帝登觀太祖遊幸刻石頌徳之䖏乃於其旁起石壇而薦饗焉賜從者大酺於山下奚斤等破越勒倍泥部落於跋那山西獲馬五萬匹牛二十萬頭徙二萬餘家於大寗計口受田河西胡曹龍張大頭等各領部擁衆二萬人來入蒲子逼脇張外於研子壘外懼給以牛酒殺馬盟誓推龍為大單于奉美女良馬於龍丙戍車駕自大室西南廵諸部落賜其渠帥繒帛各有差遂南次定襄大落城東踰七嶺山田於善無川八月癸夘車駕還宮癸丑奚斤等班師甲寅帝臨白登觀降民數軍實曹龍降執送張外斬之辛未賜征還將士牛馬奴婢各有差置新民於大寗川給農器計口受田丁丑幸犲山宮癸未車駕還宮冬十月丁巳將軍元屈㑹稽公劉潔永安侯魏勤等擊吐京叛胡失利潔被傷勤死之十一月癸酉大饗于西宮姚興遣使朝貢來諸進女帝許之神瑞元年春正月辛酉以禎瑞頻集大赦改元辛巳幸繁畤賜王公已下至於士卒百工布帛各有差二月戊戌車駕還宮是月赫連屈孑入寇河東蒲子殺掠吏民三城䕶軍張昌等要擊走之庚戍幸犲山宮西河胡曹成吐京民劉初原攻殺屈孑所置吐京䕶軍及其守三百餘人乙夘起豐宮於平城東北夏五月辛酉車駕還宫六月司馬徳宗冠軍將軍太山太守劉研弟輔國將軍領東平太守陽平趙鸞廣威將軍平昌太守羅卓斗城屠各帥張文興等率流民七千餘家内屬河西胡酋劉遮劉退孤率部落等萬餘家渡河内屬戊申幸犲山宮丁亥車駕還宮秋八月戊子詔馬邑侯元陋孫使於姚興辛丑遣謁者悦力延撫慰蠕蠕于什門招諭馮跋詔平南將軍相州刺史尉古真與司馬徳宗太尉劉裕相聞使博士王諒假平南參軍將命焉姚興遣使來聘冬十一月壬午詔使者巡行諸州校閲守宰資財非自家所齎悉簿為贓詔守宰不如法聽民詣闕告言之十二月丙戌朔蠕蠕犯塞丙申帝北伐蠕蠕河内人司馬順宰自號晉王太守討捕不獲是嵗秃髮傉檀為乞伏熾磐所滅二年春正月丙辰車駕至自北伐賜從征將士布帛各有差二月丁亥大饗于西宮賜附國大渠帥朝嵗首者繒帛金罽各有差司馬徳宗琅邪太守劉朗率二千餘家内屬庚子河西胡劉雲等率數萬户内附甲辰立太祖廟於白登之西三月詔曰刺史守宰率多逋慢前後怠惰數加督罰猶不悛改今年貲調懸違者讁出家財充之不聽徴發於民河西饑胡屯聚上黨推白亞栗斯為盟主號大將軍反於上黨自號單于稱建平元年以司馬順宰為之謀主夏四月詔將軍公孫表等五將討之河南流民二千餘家内屬衆廢栗斯而立劉虎號率善王司馬徳宗遣使朝貢己夘車駕北廵五月丁亥次於參合東幸大寗丁未田于四岬山六月戊午幸去畿陂觀漁辛酉次于濡源築立蜯臺射白熊於頺牛山獲之丁夘幸赤城親見長老問民疾苦復租一年南次石亭幸上谷問百年訪賢俊復田租之半壬申幸涿鹿登橋山觀溫泉使使者以太牢祠黄帝廟至廣寗登厯山祭舜廟秋七月還宮復所過田租之半九月闕有差河南流民前後三千餘家内屬京師民饑聽出山東就食冬十月壬子姚興使散騎常侍東武侯姚敞尚書姚泰送其西平公主來帝以后禮納之辛酉行幸沮洳城癸亥車駕還宮丙寅詔曰古人有言百姓足則君有餘未有民富而國貧者也頃者以來頻遇霜旱年榖不登百姓饑寒不能自存者甚衆其出布帛倉榖以賑貧窮十有一月丁亥幸材山宮庚子車駕還宮泰常元年春正月甲申行幸犲山宮戊子車駕還宮三月己丑長樂王處文薨常山民霍季自言名載圖讖持一黑石以為天賜玉印誑惑聚黨入山為盜州郡捕斬之夏四月壬子大赦改元庚申河間王脩薨六月丁巳車駕北廵秋七月甲申帝自白鹿陂西行大獮于牛川登釡山臨殷繁水而南觀于九十九泉戊戍車駕還宮九月戊午前并州刺史叔孫建等大破山胡劉虎渡河東走至陳留為從人所殺司馬順宰等皆死司馬徳宗相劉裕泝河伐姚泓遣其部將王仲徳為前鋒從陸道至梁城兖州刺史尉建畏懦棄州北渡王仲徳遂入滑臺詔將軍叔孫建等渡河曜威滑臺斬尉建於城下冬十月壬戌幸犲山宮徒何部落庫傉官斌先降後復叛歸馮跋驍騎將軍延普渡濡水討擊大破之斬斌及馮跋幽州刺史漁陽公庫傉官昌征北將軍關内侯庫傉官提等首生擒庫傉官女生縛送京師幽州平十一月甲戌車駕還宮築蓬臺於北苑十二月南陽王良薨是嵗姚興卒子泓立二年春二月丙午詔曰九州之民隔逺京邑時有壅滯守宰至不以聞今東作方興或有貧窮失農務者其遣使者廵行天下省諸州觀民風俗問民疾苦察守宰治行諸有不能自申皆因以聞辛酉司馬徳宗滎陽守將傅洪遣使詣叔孫建請以虎牢降求軍赴接徳宗譙王司馬文思遣使王良詣闕上書請軍討劉裕詔司徒長孫嵩率諸軍邀擊劉裕戰於畔城更有負㨗帝詔止諸軍不克夏四月丁未榆山丁零翟蜀率營部遣使通劉裕馮跋使人王特兒等通於司馬徳宗章武太守捕特兒等囚送京師丁巳幸髙栁壬戍車駕還宮五月汝南民胡譁等萬餘家相率内屬乙未司馬徳宗齊郡太守王懿來降車駕西巡至于雲中遂濟河田于大漠秋七月作白臺於城南髙二十丈司馬順之入常山流言惑衆稱受天帝命年二十五應為人君遂聚黨於封龍山趙郡大盜趙徳執送京師斬之八月劉裕滅姚泓九月癸酉司馬徳宗平西將軍荆州刺史司馬休之息譙王文思章武王子司馬國璠司馬道賜輔國將軍溫楷竟陵内史魯軌荆州治中韓延之殷約平西參軍桓謐桓璲及桓溫孫道子渤海刁雍陳郡袁式等數百人來降姚泓匈奴鎮將姚成都與弟和都舉鎮來降冬十月己酉詔司徒長孫嵩等還京師遣叔孫建鎮鄴癸丑豫章王夔薨十有一月司徒長孫嵩等諸軍至樂平詔嵩遣娥清周㡬等與叔孫建討西山丁零翟蜀洛支等悉滅餘黨而還復諸州租税十有二月己酉詔河東河内有姚泓子弟播越民間能有送致京師者賞之庚申田于西山癸亥車駕還宮氐豪徐騃奴齊元子等擁部落三萬於雍遣使内附詔將軍王洛生及河内太守楊聲等西行以應之壬申幸大寗長川姚泓尚書東武侯姚敞敞弟鎮逺將軍僧光右將軍姚定世自洛來奔是年李暠卒子歆立遣使朝貢三年春正月丁酉朔帝自長川詔䕶髙車中郎將薛繁率髙車丁零十二部大人衆北略至弱水降者二千餘人獲牛馬二萬餘頭河東胡蜀五千餘家相率内屬三月司馬徳宗遣使來貢庚戍幸西宮以范陽去年水復其租税夏四月己巳徙冀定幽三州徒何於京師五月丙午詔叔孫建鎮廣阿壬子車駕東廵至于濡源及丼松遣征東將軍長孫道生給事黄門侍郎奚觀率精騎二萬襲馮跋又命驍騎將軍延普自幽州北趨遼西為聲勢帝自突門嶺待之道生至龍城徙其民萬餘家而還六月乙酉車駕西返秋七月戊午至於京師八月鴈門河内大雨水復其租税九月甲寅詔諸州調民租户五十石積於定相冀三州冬十月戊辰築宮於西苑是嵗司馬徳宗卒弟徳文僭立赫連屈丐僭稱皇帝四年正月壬辰朔車駕臨河大蒐于犢渚癸夘車駕還宮三月癸丑築宫於蓬臺北司馬徳文寧朔將軍平陽太守匈奴䕶軍薛辯及司馬楚之司馬順明司馬道恭竝遣使請降夏四月庚辰車駕有事於東廟逺藩助祭者數百國辛巳南廵幸鴈門賜所過無出今年租賦五月庚寅朔觀漁于灅水己亥車駕還宫復所過一年租賦六月司馬徳文建威將軍河西太守馮翊羌酋党道子遣使内屬秋八月辛未東廵遣使祭恒岳甲申車駕還宮所過復一年田租九月築宮於白登山冬十有二月癸亥西廵至雲中踰白道北獵野馬於辱孤山至于黄河從君子津西渡大狩於薛林山五年春正月丙戍朔自薛林東還至于屋竇城饗勞將士大酺二日班禽獸以賜之己亥車駕還宮三月丙戍南陽王意文薨夏四月河西屠各帥黄大虎羌酋不蒙娥等遣使内附丙寅起灅南宮五月乙酉詔曰宣武皇帝體道得一天縱自然大行大名未盡美非所以光揚洪烈垂之無窮也今因啓緯圖始覩尊號天人之意煥然著明其改宣曰道更上尊諡曰道武皇帝以彰靈命之先啓聖徳之元同告祀郊廟宣于八表庚戍淮南侯司馬國璠池陽侯司馬道賜等謀反伏誅六月丙寅行幸翳犢山秋七月丁酉西至于五原丁未幸雲中大室賜從者大酺八月癸亥車駕還宮閏月甲午隂平王烈薨冬十有一月詔驍騎將軍延普城乾城十有二月丁亥杏城羌酋狄溫子率三千餘家内附是嵗劉裕廢殺其主司馬徳文僭自稱皇帝號宋李歆為沮渠蒙遜所滅歆弟恂自立於敦煌六年春正月辛未行幸公陽二月調民二十户輸戎馬一匹大牛一頭三月甲子陽平王熙薨乙亥制六部民羊滿百口輸戎馬一匹發京師六千人築苑起自舊苑東包白登周回四十餘里夏六月乙酉北廵至蟠羊山秋七月西廵獵于祚山親射虎獲之遂至于河八月庚子大獮于犢渚九月庚戍車駕還宮壬申劉裕遣使朝貢冬十月己亥行幸代十有二月丙申西廵狩至于雲中是歳沮渠蒙遜滅李恂七年春正月甲辰朔自雲中西行幸屋竇城賜從者大酺三日蕃渠帥繒帛各有差二月丙戍車駕還宫賜從者布帛各有差大饗于西宮三月乙五河南王曜薨夏四月甲戌封皇子燾為泰平王燾字佛釐拜相國加大將軍丕為樂平王加車騎大將軍彌為安定王加衞大將軍範為樂安王加中軍大將軍健為永昌王加撫軍大將軍崇為建寧王加輔國大將軍俊為新興王加鎮軍大將軍獻懷長公主子嵇敬封長樂王拜大司馬大將軍初帝素服寒食散頻年動發不堪萬機五月詔皇太子臨朝聽政是月泰平王攝政劉裕卒子義符僭立秋九月詔假司空奚斤節都督前鋒諸軍事為晉兵大將軍行揚州刺史交阯侯周㡬為宋兵將軍交州刺史安固子公孫表為呉兵將軍廣州刺史前鋒伐劉義符乙巳幸灅南宮遂如廣寗己酉詔泰平王率百官以法駕田于東苑車乗服物皆以乗輿之副辛亥築平城外郭周回三十二里辛酉幸橋山遣使者祠黄帝唐堯廟因東幸幽州見耆年問其所苦賜爵號分遣使者循行州郡觀察風俗冬十月甲戍車駕還宮復所過田租之半奚斤伐滑臺不克帝怒議親南討為其聲援壬辰車駕南廵出自天門關踰恒嶺四方蕃附大人各率所部從者五萬餘人十有一月泰平王親統六軍出鎮塞上安定王彌與北新公安同居守丙午曲赦司州殊死已下劉義符東郡太守王景度棄滑臺走詔成臯侯元茍兒為兖州刺史鎮滑臺十有二月遣夀光侯叔孫建等率衆自平原東渡徇下青兖諸郡劉義符兖州刺史徐琰聞渡河棄守走叔孫建遂東入青州司馬愛之秀之先聚黨濟東皆率衆來降八年正月丙辰行幸鄴存恤民俗司空奚斤既平兖豫還圍虎牢劉義符守將毛徳祖距守不下河東蜀薛定薛輔率五千餘家内屬蠕蠕犯塞二月戊辰築長城於長川之南起自赤城西至五原延袤二千餘里備置戍衞三月乙巳帝田於鄴南韓陵山幸汲郡至于枋頭乙夘濟自靈昌津幸陳留東郡乙丑濟河而北西之河内造浮橋於冶坂津夏四月丁夘幸成臯城觀虎牢而城内乏水懸綆汲河帝令連艦上施轒轀絶其汲路又穿地道以奪其井遂至洛陽觀石經蠻王梅安率渠帥數千人來貢方物閏月己未還幸河内北登太行幸髙都虎牢潰獲劉義符冠軍將軍司州刺史觀陽伯毛徳祖冠軍司馬滎陽太守翟廣建威將軍竇霸振武將軍姚勇錯振威將軍吳寶之司州别駕姜元興治中竇溫士衆大疫死者十二三辛酉帝還至晉陽班賜從官王公已下逮於厮賤無不霑給五月丙寅還次鴈門皇太子率留臺王公迎于句注之北庚寅車駕至自北巡六月己亥太尉宜都公穆觀薨丙辰北廵至於參合陂遊于蟠羊山秋七月幸三會屋侯泉詔皇太子率百官以從八月幸馬邑觀于灅源九月乙亥車駕還宮詔司空奚斤還京師昌平侯娥清交阯侯周㡬等鎮枋頭劉義符潁川太守李元徳竊入許昌詔周㡬擊之元徳遁闕三字許昌還軍枋頭冬十月癸夘廣西宮起外垣牆周回二十里十有一月己巳帝崩於西宮時年三十二遺詔以司空奚斤所獲軍實賜大臣自司徒長孫嵩已下至士卒各有差十有二月庚子上諡曰明元皇帝𦵏于雲中金陵廟稱太宗帝禮愛儒生好覽史傳以劉向所撰新序説苑於經典正義多有所闕乃撰新集三十篇採諸經史該洽古義兼資文武焉史臣曰太祖英雄北驅朔漢末年内多釁隙明元抱純孝之心逢梟鏡之禍權以濟事危而獲安隆基固本内和外輯以徳見宗良無愧也魏書卷三魏書卷三考證帝紀第三魏收書此紀闕後人補以北史又取髙氏小史脩文殿御覽附益之太宗紀司馬休之息譙王文思章武王子司馬國璠司馬道賜輔國將軍溫楷竟陵内史魯軌荆州治中韓延之殷約平西參軍桓謐桓璲及桓溫孫道子渤海刁雍陳郡袁式等數百人來降臣人龍按晉書宗室傳安帝反正追贈尚之衞將軍以休之長子文思為嗣襲封譙郡王後文思怨望稱兵為裕所敗而死不言降魏與此異魏書卷三考證
