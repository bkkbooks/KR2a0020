body:
  text: 魏書卷四上齊魏收撰帝紀第四世祖紀上世祖太武皇帝諱燾太宗明元皇帝之長子也母曰杜貴嬪天賜五年生於東宮體貎瓌異太祖竒而悦之曰成吾業者必此子也泰常七年四月封泰平王五月為監國太宗有疾命帝總攝百揆聰明大度意豁如也八年十月壬申即皇帝位大赦天下十有二月追尊皇妣為密皇太后進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普增爵位各有差於是除禁錮釋嫌怨開倉庫賑窮乏河南流民相率内屬者甚衆始光元年春正月丙寅安定王彌薨夏四月甲辰東廵幸大寗秋七月車駕還宮八月蠕蠕率六萬騎入雲中殺掠吏民攻陷盛樂宮赭陽子尉普文率輕騎討之虜乃退走詔平陽王長孫翰等繫蠕蠕别帥破之殺數千人獲馬萬餘匹語在蠕蠕傳九月大簡輿徒治兵於東郊部分諸軍五萬騎將北討冬十有二月遣平陽王長孫翰等討蠕蠕車駕次祚山蠕蠕北遁諸軍追之大獲而還是年劉義符為其臣徐羡之等所廢殺立義符弟義隆二年春正月己夘車駕至自北伐以其雜畜班賜將士各有差二月慕容渇悉隣反於北平攻破郡治太守與守將擊敗之三月丙辰尊保母竇氏曰保太后丁巳以北平王長孫嵩為太尉平陽王長孫翰為司徒宜城王奚斤為司空庚申營故東宮為萬夀宮起永安安樂二殿臨望觀九華堂初造新字千餘詔曰昔在帝軒剏制造物乃命倉頡因鳥獸之跡以立文字自兹以降隨時改作故篆𨽻草楷並行於世然經厯乆逺傳習多失其真故令文體錯謬㑹義不惬非所以示軌則於來世也孔子曰名不正則事不成此之謂矣今制定文字世所用者頒下逺近永為楷式夏四月詔龍驤將軍歩堆謁者僕射胡覲使於劉義隆五月詔天下十家發大牛一頭運粟塞上秋九月永安安樂二殿成丁夘大饗以落之冬十月治兵於西郊癸夘車駕北伐平陽王長孫翰等絶漠追之蠕蠕北走事具蠕蠕傳是年赫連屈丐死子昌僭立三年春正月壬申車駕至自北伐班軍實以賜將士行留各有差乞伏熾磐遣使朝貢請討赫連昌二月起大學於城東祀孔子以顔淵配夏五月辛夘中山公元纂進爵為王南安公元素復先爵常山王六月幸雲中舊宮謁陵廟西至五原田於隂山東至和兠山秋七月築馬射臺于長川帝親登臺觀走馬王公諸國君長馳射中者賜金錦繒絮各有差八月車駕還宮劉義隆遣使朝貢帝以屈丐既死諸子相攻九月遣司空奚斤率義兵將軍封禮雍州刺史延普襲蒲坂宋兵將軍周㡬率洛州刺史于栗磾襲陕城冬十月丁巳車駕西伐幸雲中臨君子津㑹天暴寒數日氷結十有一月戊寅帝率輕騎二萬襲赫連昌壬午至其城下徙萬餘家而還語在昌傳至祚山班所虜獲以賜將士各有差奚斤未至蒲坂昌守將赫連乙升棄城西走昌弟助興守長安乙升復與助興自長安西走安定奚斤遂入蒲坂十有二月詔斤西據長安秦雍氐羌皆叛昌詣斤降武都氐王楊元及沮渠蒙遜等皆遣使内附四年春正月乙酉車駕至自西伐賜留臺文武生口繒帛馬牛各有差從人在道多死其能到都者纔十六七己亥行幸幽州赫連昌遣其弟平原公定率衆二萬向長安帝聞之乃遣就隂山伐木大造攻具二月車駕還宫三月丙子遣髙涼王禮鎮長安詔執金吾桓貸造橋於君子津丁丑廣平王連薨夏四月丁未詔員外散騎常侍歩堆謁者僕射胡覲等使於劉義隆是月治兵講武分諸軍司徒長孫翰廷尉長孫道生宗正娥清三萬騎為前驅常山王素太僕邱堆將軍元太毗歩兵三萬為後繼南陽王伏真執金吾桓貸將軍姚黄眉歩兵三萬部攻城器械將軍賀多羅精騎三千為前候五月車駕西討赫連昌辛巳濟君子津三城胡酋鵲子相率内附帝次拔隣山築城舍輜重以輕騎三萬先行戊戍至于黑水帝親祈天告祖宗之靈而誓衆焉六月甲辰昌引衆出城大破之事在昌傳昌將麾下數百騎西南走奔上邽諸軍乗勝追至城北死者萬餘人臨陣殺昌弟河南公滿及其兄子蒙遜會日暮昌尚書僕射問至拔城夜將昌母出走乙巳車駕入城虜昌羣弟及其諸母姊妹妻妾宮人萬數府庫珍寶車旗器物不可勝計擒昌尚書王買薛超等及司馬徳宗將毛脩之秦雍人士數千人獲馬三十餘萬匹牛羊數千萬以昌宮人及生口金銀珍翫布帛班賚將士各有差昌弟平原公定拒司空奚斤於長安城娥清率騎五千討之西走上邽辛酉班師留常山王素執金吾桓貸鎮統萬秋七月己邜築壇於祚嶺戲馬馳射賜射中者金錦繒絮各有差蠕蠕寇雲中聞破赫連昌懼而還走八月壬子車駕至自西伐飲至策勲告於宗廟班軍實以賜留臺百寮各有差九月丁酉安定民舉城歸降冬十有一月以氐王楊元為都督荆梁益寧四州諸軍事假征南大將軍梁州刺史南秦王十有二月行幸中山守宰貪汚免者十數人癸夘車駕還宮復所過田租之半神䴥元年春正月以天下守令多行非法精選忠良悉代之辛未京兆王黎薨二月改元赫連昌退屯平涼司空奚斤進軍安定將軍邱堆為昌所敗監軍侍御史安頡出戰擒昌昌餘衆立昌弟定為王走還平凉三月癸酉詔侍中古弼迎赫連昌辛巳弼等以昌至于京師司空奚斤追定於平涼馬髦嶺為定所擒邱堆先守輜重在安定聞斤敗棄甲東走蒲坂帝聞大怒詔安頡斬堆夏四月赫連定遣使朝貢帝詔諭之壬子西廵戊午田于河西大赦天下南秦王楊元遣使朝貢六月丁酉并州胡酋卜田謀反伏誅餘衆不安詔淮南公王倍斤鎮慮虒撫慰之甲寅行幸長川秋七月車駕還宮八月東幸廣寗臨觀溫泉以太牢祭黃帝堯舜廟蠕蠕大檀遣子將萬餘騎入塞事具蠕蠕傳上郡休屠胡酋金崖率部内屬九月車駕還宮上洛巴渠泉午觸等萬餘家内附冬十月甲辰北廵王子田于牛川劉義隆淮北鎮將王仲徳遣歩騎二千餘入寇濟陽陳留是月車駕還宮閏月辛巳義隆又遣將王元謨兖州刺史竺靈秀歩騎二千人寇滎陽將襲虎牢豫州遣軍逆擊走之上郡屠各隗詰歸率萬餘家内屬定州丁零鮮于臺陽翟喬等二千餘家叛入西山刼掠郡縣州軍討之失利詔鎮南將軍壽光侯叔孫建擊之十有一月行幸河西大校獵十有二月甲申車駕還宫是嵗皇子晃生乞伏熾磐死子暮末僭立沮渠蒙遜遣使朝貢二年春正月赫連定弟酒泉公儁自平涼來奔丁零鮮于臺陽等歸罪詔赦之二月上黨李禹聚衆殺太守自稱無上王署置將帥河内守將擊破之禹亡走入山為人執送斬之夏四月治兵于南郊劉義隆遣使朝貢庚寅車駕北伐以太尉北平王長孫嵩衞尉廣陵公樓伏連留守京師從東道與長孫翰等期會於賊庭五月丁未次于沙漠舍輜重輕騎兼馬至栗水蠕蠕震怖焚燒廬舍絶跡西走事具蠕蠕傳是月赫連定來侵統萬東至侯尼城而還秋七月車駕東轅至黑山校數軍實班賜王公將士各有差八月帝以東部髙車屯已尼陂詔左僕射安原率騎萬餘討之事具蠕蠕傳冬十月振旅凱旋于京師告於宗廟列置新民於漠南東至濡源西暨五原隂山竟三千里詔司徒平陽王長孫翰尚書令劉潔左僕射安原侍中古弼鎮撫之十有一月西廵狩田于河西至祚山而還三年春正月庚子車駕還宮壬寅大赦天下癸夘行幸廣寗臨溫泉作溫泉之歌二月丁夘司徒平陽王長孫翰薨戊辰車駕還宮三月壬寅進會稽公赫連昌為秦王癸夘雲中河西勑勒千餘家叛尚書令劉潔追滅之帝聞劉義隆將寇邊乃詔冀定相三州造船三千艘簡幽州以南戍兵集于河上以備之夏四月甲子行幸雲中勑勒萬餘落叛夫詔尚書封鐡追討滅之五月戊戍詔曰夫士之為行在家必孝處朝必忠然後身榮於時名揚後世矣近遣尚書封鐵翦除亡命其所部將士有盡忠竭節以殞軀命者今皆追贈爵號或有蹈鋒履難以自效者以功次進位或有故違軍法私離幢校者以軍法行戮夫有功蒙賞有罪受誅國之常典不可暫廢自今以後不善者可以自改其宣勑内外咸使聞知六月詔平南大將軍假丹陽王太毗屯于河上以司馬楚之為安南大將軍琅邪王屯潁川秋七月己亥詔曰昔太祖撥亂制度草剙太宗因循未遑改作軍國官屬至乃闕然今諸征鎮將軍王公仗節邊逺者聽開府辟召其次增置吏員庚子詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎮鄴為諸軍節度八月清河羣盜殺太守劉義隆將到彦之自清水入河泝流西行帝以河南兵少詔攝四鎮乃治兵將西討丙寅到彦之遣將渡河攻冶坂冠軍將軍安頡督諸軍擊破之斬首五千餘級投水死者甚衆甲戍行幸南宮獵于南山戊寅詔征西大將軍長孫道生屯于河上九月己丑赫連定遣弟謂以代寇鄜城平西將軍始平公隗歸等率諸軍討之擒賊將王卑殺萬餘人謂以代遁走癸夘立密皇太后廟于鄴甲辰行幸統萬遂征平涼冬十月庚申到彦之王仲徳沿河置守還保東平乙亥冠軍將軍安頡濟河攻洛陽丙子拔之擒義隆將二十人斬首五千級時河北諸軍會于七女津彦之恐軍南度遣將王蟠龍泝流欲盜官船征南大將軍杜超等擊破斬之辛巳安頡平虎牢義隆司州刺史尹沖墜城死十有一月乙酉車駕至平涼先是赫連定將數萬人東禦於鄜城留其弟上谷公社于廣陽公度洛孤城守帝至平涼登北原使赫連昌招諭之社于不降詔安西將軍古弼等擊安定攻平涼定聞之棄鄜城入于安定自率步騎三萬從鶉觚原將救平涼與弼相遇弼擊之殺數千人乃還走詔諸軍四面圍之甲午夀光侯叔孫建汝隂公長孫道生濟河到彦之王仲徳從清入濟東走青州義隆兖州刺史竺靈秀棄須昌南奔湖陸丁酉定之水引衆下原詔武衞將軍丘眷擊之定衆大潰死者萬餘人定中重創單騎遁走獲定弟丹陽公烏視拔武陵公秃骨及公侯百餘人是日諸將乗勝進軍遂取安定定從兄東平公乙升棄城奔長安刼掠數千家西奔上邽戊戍叔孫建大破竺靈秀於湖陸殺獲五千餘人己亥帝幸安定獲乞伏熾磐質子及定車旗簿其生口財畜班賜將士各有差庚子帝自安定還臨平涼遂掘塹圍守之行幸紐城安慰初附赦秦雍之民賜復七年定隴西守及將士數千人來降辛丑冠軍將軍安頡率諸軍攻滑臺琅邪王司馬楚之破劉義隆將於長社沮渠蒙遜遣使朝貢壬寅封夀光侯叔孫建為丹陽王十有二月丁夘定弟社于度洛孤面縛出降平涼平收其珍寶定長安臨晉武功守將皆奔走關中平壬申車駕東還留巴東公延普等鎮安定是嵗馮跋死弟文通僭立四年春正月壬午車駕次于木根山大饗羣臣賜布帛各有差丙申劉義隆將檀道濟王仲徳從清水救滑臺丹陽王叔孫建汝隂公長孫道生拒之道濟等不敢進是月乞伏暮末為赫連定所滅二月辛酉安頡司馬楚之平滑臺擒義隆將朱脩之李元徳及東郡太守申謨癸酉車駕還宮飲至策勲告於宗廟賜留臺百官各有差戰士賜復十年丁丑行幸南宮定州民饑詔啟倉以賑之義隆將檀道濟王仲徳東走諸將追之至厯城而還三月庚戍冠軍將軍安頡獻義隆俘萬餘人甲兵三萬夏五月庚寅行幸雲中六月赫連定北襲沮渠蒙遜為吐谷渾慕璝所執閏月乙未蠕蠕國遣使朝獻詔散騎侍郎周紹使于劉義隆秋七月己酉行幸河西起承華宮八月乙酉沮渠蒙遜遣子安周入侍吐谷渾慕璝遣使奉表請送赫連定己丑以慕璝為大將軍西秦王九月癸丑車駕還宮庚申加太尉長孫嵩柱國大將軍特進左光禄大夫崔浩為司徒征西大將軍長孫道生為司空癸亥詔兼太常李順持節拜河西王沮渠蒙遜為假節加侍中都督涼州及西域羌戎諸軍事行征西大將軍太傅涼州牧涼王壬申詔曰頃逆命縱逸方夏未寧戎車屢駕不遑休息今二寇摧殄士馬無為方將偃武脩文遵太平之化理廢職舉逸民拔起幽窮延登儁乂昧旦思求想遇師輔雖殷宗之夢板築罔以加也訪諸有司咸稱范陽盧元博陵崔綽趙郡李靈河間邢潁勃海高允廣平游雅太原張偉等皆賢儁之胄冠冕州邦有羽儀之用詩不云乎鶴鳴九臯聲聞于天庶得其人任之政事共臻邕熙之美易曰我有好爵吾與爾縻之如元之比隐跡衡門不耀名譽者盡勑州郡以禮發遣遂徵元等及州郡所遣至者數百人皆差次叙用冬十月戊寅詔司徒崔浩改定律令行幸漠南十一月丙辰北部勑勒莫弗庫若于率其部數萬騎驅鹿數百萬詣行在所帝因而大狩以賜從者勒石漠南以記功徳宜城王奚斤坐事降爵為公十二月丁丑車駕還宮延和元年春正月丙午尊保太后為皇太后立皇后赫連氏立皇子晃為皇太子謁于太廟大赦改年己巳詔曰朕以𦕈身獲奉宗廟思闡洪基廓清九服遭値季運天下分崩是用屢征罔或寜息自始光至今九年之間戎車十舉羣帥文武荷戈被甲櫛風沐雨蹈履鋒刄與朕均勞賴神祗之助將士宣力用能摧折彊豎克翦大憝兵不極武而二寇俱滅師不違律而遐方以寧加以時氣和洽嘉瑞並降遍於郡國不可勝紀豈朕一人獨應此祜斯亦羣后協同之所致也公卿因兹稽諸天人之會請建副貳夫慶賞之行所以褒崇勲舊旌顯賢能以永無疆之休其王公將軍以下普增爵秩啟國承家脩廢官舉儁逸蠲除煩苛更定科制務從輕約除故革新以正一統羣司當深思效績直道正身立功立事無或懈怠稱朕意焉二月丙子行幸南宮三月丁未追贈夫人賀氏為皇后壬申西秦王吐谷渾慕璝送赫連定於京師夏五月大簡輿徒于南郊將討馮文通劉義隆遣使朝貢六月庚寅車駕伐和龍詔尚書左僕射安原等屯于漠南以備蠕蠕辛夘兼散騎常侍鄧穎使於劉義隆秋七月己未車駕至濡水庚申遣安東將軍宜城公奚斤發幽州民及密雲丁零萬餘人運攻具出南道俱會和龍帝至遼西文通遣其侍御史崔聘奉獻牛酒己巳車駕至和龍臨其城文通石城太守李崇建徳太守王融十餘郡來降發其民三萬人穿圍壍以守之是月築東宮八月甲戌文通使數萬人出城挑戰昌黎公元邱與河間公元齊擊破之死者萬餘人文通尚書髙紹率萬餘家保羌胡固己夘車駕討紹辛巳斬之詔平東將軍賀多羅攻文通帶方太守慕容元於猴固撫軍大將軍永昌王健攻建徳驃騎大將軍樂平王丕攻冀陽皆拔之虜獲生口班賜將士各有差九月乙夘車駕西還徙營邱成周遼東樂浪帶方元菟六郡民三萬家于幽州開倉以賑之冬十月癸酉車駕至濡水吐谷渾慕璝遣使朝貢十有一月乙巳車駕至自伐和龍十有二月己丑馮文通長樂公崇及其母弟朗朗弟邈以遼西内屬文通遣將封羽圍遼西先是辟召賢良而州郡多逼遣之詔曰朕除偽平暴征討累年思得英賢緝熙治道故詔州郡搜揚隱逸進舉賢俊古之君子飬志衡門徳成業就才為世使或雍容雅歩三命而後至或棲棲遑遑負鼎而自逹雖徇尚不同濟時一也諸召人皆當以禮申諭任其進退何逼遣之有也此刺史守宰宣揚失旨豈復光益乃所以彰朕不徳自今以後各令鄉閭推舉守宰但宣朕虚心求賢之意既至當待以不次之舉隨才文武任之政事其明宣勑咸使聞知是年秃髪傉檀子保周棄沮渠蒙遜來奔以保周為張掖公二年春正月乙夘撫軍大將軍永昌王健督諸軍救遼西丙寅以樂安王範為假節加侍中都督秦雍涇梁益五州諸軍事衞大將軍儀同三司鎮長安二月庚午詔兼鴻臚卿李繼持節假馮崇車騎大將軍遼西王承制聽置尚書已下賜崇功臣爵秩各有差征西將軍金崖與安定鎮將延普及涇州刺史狄子玉爭權構隙舉兵攻普不克退保胡空谷驅掠平民據險自固詔散騎常侍平西將軍安定鎮將陸俟討獲之壬午行幸河西詔兼散騎常侍宋宣使於劉義隆丙申馮崇母弟朗來朝三月司馬徳宗驃騎將軍司馬元顯子天助來降壬子車駕還宮夏五月己亥行幸山北六月遣撫軍大將軍永昌王健尚書左僕射安原督諸軍討和龍將軍樓勃别將五千騎圍瓦城文通守將封羽以城降收其民三千餘家辛巳詔樂安王範發秦雍兵萬人築小城於長安城内秋八月遼西王馮崇上表求説降其父帝不聽九月劉義隆遣使朝貢奉馴象一戊午詔兼大鴻臚卿崔賾持節拜征虜將軍楊難當為征南大將軍儀同三司封南秦王冬十月南秦王楊難當率衆圍漢中十有一月甲寅車駕自山北還宮十有二月己巳大赦天下辛未幸隂山之北隴西休屠王宏祖率衆内屬金崖既死部人立崖從弟當川領其衆詔兼散騎常侍盧元使於劉義隆是嵗沮渠蒙遜死以其子牧犍為車騎將軍改封河西王三年春正月乙未車駕次于女水大饗羣臣班賜各有差戊戌馮文通遣其給事黄門侍郎伊臣乞和帝不許丙辰金當川反楊難當克漢中送雍州流民七千家于長安二月丁夘蠕蠕呉提奉其妹并遣其異母兄秃鹿傀及左右數百人朝貢獻馬二千匹戊寅詔曰朕承統之始羣凶縱逸四方未賓所在逆僭蠕蠕陸梁於漠北鐵弗肆虐於三秦是以旰食忘寢抵掌扼腕期在掃清逋殘寧濟萬㝢故頻年屢征有事西北運輸之役百姓勤勞廢失農業遭離水旱致使生民貧富不均未得家給人足或有寒窮不能自贍者朕甚愍焉今四方順軌兵革漸寧宜寛徭賦與民休息其令州郡縣隱括貧富以為三級其富者租賦如常中者復二年下窮者復三年刺史守宰當務盡平當不得阿容以罔政治明相宣約咸使聞知辛夘車駕還宮三月甲寅行幸河西閏月甲戍秦王赫連昌叛走丙子河西候將格殺之驗其謀反羣弟皆伏誅己夘車駕還宮彭城公元栗進爵為王辛巳馮文通遣尚書髙顒上表稱藩詔徴其侍子戊子金當川率其衆圍西川侯彭文暉於隂密夏四月乙未詔征西大將軍常山王素討當川丁未行幸河西壬戍獲當川斬之于長安以徇六月甲辰車駕還宮辛亥撫軍大將軍永昌王健司空汝隂公長孫道生侍中古弼督諸軍討和龍芟其禾稼徙民而還秋七月辛巳東宮成備置屯衞三分西宮之一壬午行幸美稷遂至隰城命諸軍討山胡白龍于西河九月戊子克之斬白龍及其將帥屠其城冬十月癸巳蠕蠕國遣使朝貢甲午破白龍餘黨于五原詔山胡為白龍所逼及歸降者聽為平民諸與白龍同惡斬數千人虜其妻子班賜將士各有差十有一月車駕還宮十有二月甲辰行幸雲中太延元年春正月壬午降死刑已下各一等癸未出太祖太宗宮人令得嫁甲申大赦改年二月庚子蠕蠕焉耆車師諸國各遣使朝獻詔長安及平涼民徙在京師其孤老不能自存者聽還鄉里丁未車駕還宮三月癸亥馮文通遣大將渴燭通朝獻辭以子疾夏五月庚申進宜都公穆夀為宜都王汝隂公長孫道生為上黨王宜城公奚斤為恒農王廣陵公樓伏連為廣陵王本官各如故遣使者二十軰使西域甲戍行幸雲中六月甲午詔曰頃者宼逆消除方表漸晏思崇政化敷洪治道是以屢詔有司班宣恩惠綏理百揆羣公卿士師尹牧守或未盡導揚之美致令隂陽失序和氣不平去春小旱東作不茂憂勤克已祈請靈祇上下咸秩豈朕精誠有感何報應之速雲雨震灑流澤霑渥有鄙婦人持方寸玉印詣潞縣侯孫家既而亡去莫知所在玉色鮮白光照内映印有三字為龍鳥之形要妙竒巧不類人迹文曰旱疫平推尋其理蓋神靈之報應也朕用嘉焉比者已來禎瑞仍臻所在甘露流液降於殿内嘉𤓰合蔕生于中山野木連理殖於魏郡在先后載誕之鄉白鷰集于盛樂舊都元鳥隨之蓋有千數嘉禾頻嵗合秀於恒農白雉白兔並見於渤海白雉三隻又集於平陽太祖之廟天降嘉貺將何徳以酬之所以内省驚震欣懼交懐其令天下大酺五日禮報百神守宰祭界内名山大川上答天意以求福禄丙午髙麗鄯善國並遣使朝獻戊申詔驃騎大將軍樂平王丕等五將率騎四萬東伐文通秋七月田於棝陽己夘丕等至於和龍徙男女六千口而還八月丙戍遂幸河西粟特國遣使朝獻九月甲戌車駕還宮冬十月癸夘尚書左僕射安原謀反伏誅甲辰行幸定州次于新城宮十有一月乙丑行幸冀州己巳校獵于廣川丙子行幸鄴祀密太后廟諸所過對問髙年褒禮賢俊十有二月甲申詔曰操持六柄王者所以統攝平政理訟公卿之所司存勸農平賦宰民之所專急盡力三時黔首之所克濟各修其分謂之有序今更不然何以為治越職侵局有紊綱紀上無定令民知何從自今以後亡匿避難羈旅他鄉皆當歸還舊居不問前罪民相殺害牧守依法平決不聽私輙報者誅及宗族隣伍相助與同罪州郡縣不得妄遣吏卒煩擾民庶若有發調縣宰集鄉邑三老計貲定課裒多益寡九品混通不得縱富督貧避彊侵弱太守覆檢能否覈其殿最列言屬州刺史明考優劣抑退姦吏升進貞良歳盡舉課上臺牧守荷治民之任當宣揚恩化奉順憲典與國同憂直道正身肅居官次不亦善乎癸夘遣使者以太牢祀北岳二年春正月甲寅車駕還宮二月戊子馮文通遣使朝貢求送侍子帝不許壬辰遣使者十餘軰詣髙麗東夷諸國詔諭之三月丙辰劉義隆遣使朝貢辛未平東將軍娥清安西將軍古弼率精騎一萬討馮文通平州刺史元嬰又率遼西將軍會之文通廹急求救於髙麗髙麗使其大將葛蔓盧以步騎二萬人迎文通甲戌以闕鎮虎牢夏四月甲申皇子小兒苗兒並薨五月乙夘馮文通奔髙麗戊午詔散騎常侍封撥使髙麗徴送文通丁夘行幸河西赫連定之西也楊難當竊據上邽秋七月庚戌詔驃騎大將軍樂平王丕等督河西髙平諸軍討之詔散騎侍郎廣平子游雅等使於劉義隆八月丁亥遣使六輩使西域帝校獵于河西詔廣平公張黎發定州七郡一萬二千人通沙泉道甲辰髙車國遣使朝獻九月庚戍驃騎大將軍樂平王丕等至略陽難當奉詔攝上邽守髙麗不送文通遣使奉表稱當與文通俱奉王化帝以髙麗違詔議將擊之納樂平王丕計而止冬十有一月己酉行幸棝陽驅野馬於雲中置野馬苑閏月壬子車駕還宮乙丑穎川王提改封武昌王河西王沮渠牧犍遣使朝貢是嵗吐谷渾慕璝死三年春正月癸未征東大將軍中山王纂薨戊子太尉北平王長孫嵩薨乙巳鎮南大將軍丹陽王叔孫建薨二月乙夘行幸幽州存恤孤老問民疾苦還幸上谷遂至代所過復田租之半髙麗契丹國並遣使朝獻三月丁丑以南平王渾為鎮東大將軍儀同三司鎮和龍己夘車駕還宮癸已龜兹悦般焉耆車師粟特疏勒烏孫渴槃陁鄯善諸國各遣使朝獻丁酉劉義隆遣使朝貢夏五月己丑詔曰方今寇逆消殄天下漸晏比年以來屢詔有司班宣惠政與民寧息而内外羣官及牧守令長不能憂勤所司糾察非法廢公帶私更相隱置濁貨為官政存茍且夫法之不用自上犯之其令天下吏民得舉告守令不如法者丙申行幸雲中秋七月戊子使橅軍大將軍永昌王健司空上黨王長孫道生討山胡白龍餘黨於西河滅之八月甲辰行幸河西九月甲申車駕還宮丁酉遣使者拜西秦王慕璝弟慕利延為鎮西大將軍儀同三司改封西平王冬十月癸夘行幸雲中十有一月壬申車駕還宮甲申破洛那者舌國各遣使朝獻奉汗血馬是嵗河西王沮渠牧犍世子封壇來朝四年春三月庚辰鄯善王弟素延耆來朝癸未罷沙門年五十已下江陽王根薨是月髙麗殺馮文通夏五月戊寅大赦天下丙申行幸五原秋七月壬午車駕北伐事具蠕蠕傳冬十月乙丑大饗六軍十二月丁巳車駕至自北伐上洛巴泉蕇等相率内附詔兼散騎常侍髙雅使劉義隆五年春正月庚寅行幸定州三月丁夘詔衛大將軍樂安王範遣雍州刺史葛那取上洛劉義隆上洛太守鐔長生棄郡走辛未車駕還宮庚寅以故南秦王世子楊保宗為征南大將軍秦州牧武都王鎮上邽夏四月丁酉鄯善龜兹疏勒焉耆諸國遣使朝獻五月丁丑治兵於西郊癸未遮逸國獻汗血馬六月甲辰車駕西討沮渠牧犍侍中宜都王穆夀輔皇太子決留臺事大將軍長樂王嵇敬輔國大將軍建寧王崇二萬人屯漠南以備蠕蠕秋七月己巳車駕至上都屬國城大饗羣臣講武馬射壬午留輜重分部諸軍撫軍大將軍永昌王健尚書令鉅鹿公劉潔諸軍與常山王素二道並進為前鋒驃騎大將軍樂平王丕太宰陽平王杜超督平涼鄜城諸軍為後繼八月甲午永昌王健獲牧犍牛馬畜産二十餘萬牧犍遣弟董來率萬餘人拒戰於城南望塵退走丙申車駕至姑臧牧犍兄子祖踰城來降乃分軍圍之九月丙戌牧犍兄子萬年率麾下來降是日牧犍與左右文武五千人面縛軍門帝解其縳待以藩臣之禮收其城内户口二十餘萬倉庫珍寳不可稱計進張掖公秃髮保周爵為王與龍驤將軍穆羆安逺將軍源賀分略諸郡雜人降者亦數十萬牧犍弟張掖太守宜得燒倉庫西奔酒泉樂都太守安周南奔吐谷渾遣鎮南將軍奚眷討張掖遂至酒泉牧犍弟酒泉太守無諱及宜得復奔晉昌使弋陽公元潔守酒泉鎮北將軍封沓討樂都掠數千家而還班賜將士各有差戊子蠕蠕犯塞遂至七介山京師大駭皇太子命上黨王長孫道生等拒之事具蠕蠕傳冬十月辛酉車駕東還徙涼州民三萬餘家于京師留驃騎大將軍樂平王丕征西將軍賀多羅鎮涼州癸亥遣張掖王秃髮保周諭諸部鮮卑保周因率諸部叛於張掖十有一月乙巳劉義隆遣使朝獻并獻馴象一是月髙麗及粟特渴盤陁破洛那悉居半諸國各遣使朝獻十有二月壬午車駕至自西伐飲至策勲告於宗廟楊難當宼上邽鎮將元勿頭擊走之是嵗鄯善龜兹疏勒焉耆髙麗粟特渴盤陁破洛那悉居半等國並遣使朝貢魏書卷四上魏書卷四上考證世祖紀初造新字千餘臣人龍按本書太祖紀天興四年比衆經文字凡四萬餘字此則初造新字頒之逺近蓋天興所集者經傳所有也始光所造者時俗所行而衆經文所不及收者也金石文字記謂説文所無而後人續添之字大都出此然三國志云有山隂朱育依體像類造作異字千名以上則知别撰之字自漢有之矣馮文通長樂公崇及其母弟朗朗弟邈北史作馮文通子長樂公崇考列傳崇朗邈皆文通子也加一子字義較明魏書卷四上考證欽定四庫全書魏書卷四下齊魏收撰帝紀第四下世祖紀下恭宗紀太平真君元年春正月己酉沮渠無諱圍酒泉辛亥分遣侍臣廵行州郡觀察風俗問民疾苦壬子無諱誘執弋陽公元潔二月己巳詔假通直常侍邢穎使於劉義隆發長安五千人浚昆明池三月酒泉陷夏四月庚辰無諱寇張掖秃髪保周屯于刪丹丙戍詔撫軍大將軍永昌王健等督諸軍討保周五月辛夘行幸北部乙巳無諱復圍張掖不克退還丙辰車駕還宮六月丁丑皇孫濬生大赦改年秋七月行幸隂山己丑永昌王健至番禾破保周保周遁走丙申皇太后竇氏崩于行宮癸丑保周自殺傳首京師八月甲申無諱降送弋陽公元潔及諸將士九月壬寅車駕還宮冬十有一月丁亥行幸山北十二月車駕還宮是嵗州鎮十五民饑開倉賑恤以河南王曜子羯兒為河間王後改封畧陽王二年春正月癸夘拜沮渠無諱為征西大將軍涼州牧酒泉王甲辰行幸溫泉二月壬戍車駕還宮三月辛夘葬惠太后於崞山庚戌新興王俊畧陽王羯兒有罪並黜為公辛亥封蠕蠕郁乆閭乞列歸為朔方王沮渠萬年為張掖王夏四月丁巳劉義隆遣使朝貢庚辰詔鎮南將軍南陽公奚眷征酒泉五月辛夘行幸山北秋八月辛亥詔散騎侍郎張偉等使劉義隆行幸河西九月戊戍撫軍大將軍永昌王健薨冬十有一月庚子鎮南將軍奚眷平酒泉獲沮渠天周臧嗟屈徳男女四千口十有二月甲戍車駕還宮丙子劉義隆遣使朝貢三年春正月甲申帝至道壇親受符籙備法駕旗幟盡青語在釋老志三月壬寅北平王長孫頽有罪削爵為侯夏四月無諱走渡流沙據鄯善李暠孫寶據敦煌遣使内附三月行幸隂山之北閏月劉義隆龍驤將軍裴方明梁州刺史劉康祖寇南秦南秦王楊難當敗奔於上邽六月丙戍難當朝於行宮先是起殿於隂山之北殿始成而難當至因名曰廣徳焉秋七月丙寅詔安西將軍建興公古弼督隴右諸軍及殿中虎賁與武都王楊保宗等從祁山南入征西將軍淮陽公皮豹子與琅邪王司馬楚之等督關中諸軍從散關西入俱會仇池鬱林公司馬文思為征南大將軍進爵譙王督洛豫諸軍事南趣襄陽征南將軍東安公刁雍東趣廣陵邀方明歸路冬十月己夘封皇子伏羅為晉王翰為秦王譚為燕王建為楚王余為吳王十有二月辛巳侍中太保襄城公盧魯元薨丁酉車駕還宮李寶遣使朝貢以寶為鎮西大將軍開府儀同三司沙州牧封敦煌公四年春正月己巳征西將軍皮豹子等大破劉義隆將於樂鄉擒其將王奐之王長卿等强元明辛伯奮棄下辨遁走追斬之盡虜其衆庚午行幸中山二月丙子車駕至于恒山之陽詔有司刋石勒銘是月克仇池三月庚申車駕還宮壬戌烏洛侯國遣使朝貢夏四月武都王楊保宗謀反諸將擒送京師諸氐羌復推保宗弟文徳為主圍仇池丁酉大赦天下己亥行幸隂山五月將軍古弼大破諸氐解仇池圍六月庚寅詔曰朕承天子民憂理萬國欲令百姓家給人足興於禮義而牧守令宰不能助朕宣揚恩徳勤恤民隱至乃侵奪其産加以殘虐非所以為治也今復民貲賦三年其田租嵗輸如常牧守之徒各厲精為治勸課農桑不得妄有徴發有司彈糾勿有所縱癸巳大閲于西郊秋九月辛丑行幸漠南甲辰捨輜重以輕騎襲蠕蠕分軍為四道事具蠕蠕𫝊鎮北將軍封沓亡入蠕蠕冬十一月將軍皮豹子等追破劉義隆將於濁水甲子車駕至於朔方詔曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除亂埽清不順二十年矣夫隂陽有往復四時有代謝授子任賢所以休息優隆功臣式圖長乆蓋古今不易之令典也其令皇太子副理萬幾總統百揆諸朕功臣勤勞日乆皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩以劇職更舉賢俊以備百官主者明為科制以稱朕心十二月辛夘車駕至自北伐五年春正月壬寅皇太子始總百揆侍中中書監宜都王穆夀司徒東郡公崔浩侍中廣平公張黎侍中建興公古弼輔太子以決庶政諸上書者皆稱臣上疏儀與表同戊申詔曰愚民無識信惑妖邪私飬師巫挾藏䜟記隂陽圖緯方伎之書又沙門之徒假西戎虚誕生致妖孽非所以壹齊政化布淳徳於天下也自王公已下至於庶人有私飬沙門師巫及金銀工巧之人在其家者皆遣詣官曹不得容匿限今年二月十五日過期不出師巫沙門身死主人門誅明相宣告咸使聞知庚戍詔曰自頃以來軍國多事未宣文教非所以整齊風俗示軌則於天下也今制自王公已下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅二月辛未中山王辰等八將以北伐後期斬于都南癸酉驃騎大將軍樂平王丕薨庚辰行幸廬闕三月戊戌大會于那南池遣使者四輩使西域甲辰車駕還宮癸丑詔征西大將軍司空上黨王長孫道生鎮統萬夏四月乙亥侍中太宰陽平王杜超為帳下所殺五月丁酉行幸隂山之北六月北部民殺立義將軍衡陽公莫孤率五千餘落北走追擊于漠南殺其渠帥餘徙居冀相定三州為營户西平王吐谷渾慕利延殺其兄子緯代是月緯代弟叱力延等來奔乞師以叱力延為歸義王秋七月癸夘東雍州刺史沮渠秉謀叛伏誅八月乙丑田于河西壬午詔員外散騎常侍髙濟使於劉義隆晉王伏羅督髙平涼州諸軍討吐谷渾慕利延九月帝自河西至馬邑觀于崞川己亥車駕還宮丁未行幸漠南冬十月癸未晉王伏羅大破慕利延慕利延走奔白蘭慕利延從弟伏念長史鵴鳩黎部大崇娥等率其部一萬三千落内附十一月劉義隆遣使朝貢十二月粟特國遣使朝貢丙戍車駕還宮六年春正月辛亥車駕行幸定州引見長老存問之詔兼員外散騎常侍宋愔使劉義隆二月遂西幸上黨觀連理樹於泫氏西至吐京討徙叛胡出配郡縣三月庚申車駕還宮詔諸有疑獄皆付中書以經義量決是月酒泉公郝溫反於杏城殺守將王幡縣吏蓋鮮率宗族討溫溫棄城走自殺家屬伏誅夏四月庚戌征西大將軍高涼王那等討吐谷渾慕利延於隂平白蘭詔秦州刺史天水公封勑文擊慕利延兄子什歸於枹罕散騎常侍成周公萬度歸乗傳發涼州以西兵襲鄯善六月壬辰車駕北廵什歸聞軍將至棄城夜遁秋八月丁亥封勅文入枹罕分徙千家還上邽壬辰度歸以輕騎至鄯善執其王真逹以詣京師帝大悦厚待之車駕幸隂山之北次于廣徳宮詔發天下兵三分取一各當戒嚴以須後命徙諸種雜人五千餘家於北邊令民北徙畜牧至廣漠以餌蠕蠕壬寅髙涼王那軍到曼頭城慕利延驅其部落西渡流沙那急追故西秦王慕璝世子被囊逆軍拒戰那擊破之被囊輕騎遁走中山公杜豐精騎追之度三危至雪山生擒被囊什歸及熾磐子成龍送于京師慕利延遂西入于闐國九月盧水胡蓋吳聚衆反於杏城冬十月戊子長安鎮副將元紇率衆討之為吳所殺吳黨遂盛民皆渡渭奔南山於是詔發髙平勑勒騎赴長安詔將軍叔孫㧞乗傳領攝并秦雍兵屯渭北十有一月髙涼王那振旅還京師己未遣那及殿中尚書安定公韓茂率騎屯相州之陽平郡發冀州民造浮橋於碻磝津蓋吳遣其部落帥白廣平西掠新平安定諸夷酋皆聚衆應之殺汧城守將呉遂進軍李閠堡分兵掠臨晉已東將軍章直與戰大敗之兵溺死於河者三萬餘人吳又遣兵西掠至長安將軍叔孫技與戰於渭北大破之斬首三萬餘級庚申遼東王竇漏頭薨河東蜀薛永宗聚黨盜官馬數千匹驅三千餘人入汾曲西通蓋吳受其位號秦州刺史金城公周鹿觀率衆討之不克而還庚午詔殿中尚書扶風公元處真尚書平陽公慕容嵩二萬騎討薛永宗詔殿中尚書乙㧞率五將三萬騎討蓋吳西平公寇提三將一萬騎討吳黨白廣平蓋吳自號天台王署置百官辛未車駕還宮選六州兵勇猛者二萬人使永昌王仁髙涼王那分領為二道各一萬騎南畧淮泗以北徙青徐之民以實河北癸未車駕西征七年春正月戊辰車駕次東雍州庚午圍薛永宗營壘永宗出戰大敗六軍乗之永宗衆潰永宗男女無少長赴汾水死辛未車駕南幸汾隂庚辰帝臨戲水蓋吳退走北地二月丙戍幸長安存問父老丁亥幸昆明池丙申幸盩厔誅叛民耿青孫溫二壘與蓋吳通謀者軍次陳倉誅散關氐害守將者還幸雍城田於岐山之陽北道諸軍乙㧞等大破蓋吳於杏城吳棄馬遁走永昌王仁至髙平擒劉義隆將王章略金鄉方與遷其民五千家於河北髙涼王那至濟南東平陵遷其民六千餘家於河北三月詔諸州坑沙門毁諸佛像徙長安城工巧二千家於京師車駕旋軫幸洛水分軍誅李閏叛羌是月金城邊冏天水梁會反據上邽東城秦州刺史封勑文擊之斬冏衆復推㑹為帥夏四月甲申車駕至自長安戊子鄴城毁五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽五月癸亥安豐公閭根率騎詣上邽與勑文討梁會會走漢中蓋吳復聚杏城自號秦地王假署山民衆旅復振於是遣永昌王仁髙涼王那督北道諸軍同討之六月甲申發定冀相三州兵二萬人屯長安南山諸谷以防越逸丙戍發司幽定冀四州十萬人築畿上塞圍起上谷西至于河廣袤皆千里秋八月蓋吳為其下人所殺傳首京師永昌王仁平其遺燼髙涼王那破蓋吳黨白廣平生擒屠各路那羅於安定斬于京師復略陽公羯兒王爵八年春正月吐京胡阻險為盜詔征東將軍武昌王提征南將軍淮南王他討之不下山胡曹僕渾等渡河西保山以自固招引朔方諸胡提等引軍討僕渾二月己夘髙涼王那等自安定討平朔方胡因與提等合軍共攻僕渾斬之其衆赴險死者以萬數癸未行幸中山頒賜從官文武各有差髙陽易縣民不從官命討平之徙其餘燼於北地三月河西王沮渠牧犍謀反伏誅徙安州丁零三千家於京師夏五月車駕還宮六月西征諸將扶風公元處真等八將坐盜没軍資所在虜掠贓各千萬計並斬之八月衞大將軍樂安王範薨冬十月侍中中書監宜都王穆夀薨十二月鄯善遮逸國並遣子朝獻晉王伏羅薨九年春正月劉義隆遣使朝貢氐楊文徳受義隆官號守葭蘆城招誘武都隂平五部氐民詔仇池鎮將皮豹子討之文徳棄城南走擒其妻子寮屬義隆白水太守郎啓元率衆救文徳豹子逆擊大破之啓元文徳走還漢中宕昌羌酋梁瑾慈遣使内附并貢方物二月癸夘行幸定州山東民饑啓倉賑之罷塞圍作遂西幸上黨誅潞叛民二千餘家徙西河離石民五千餘家于京師詔於壺關東北大王山累石為三封又斬其北鳯皇山南足以斷之三月車駕還宮夏五月甲戌以交趾公韓㧞為假節征西將軍領䕶西戎校尉鄯善王鎮鄯善賦役其民比之郡縣六月辛酉行幸廣徳宮丁夘悦般國遣使求與王師俱討蠕蠕帝許之秋八月詔中外諸軍戒嚴九月乙酉治兵于西郊丙戍上幸隂山是月成周公萬度歸千里驛上大破焉耆國其王鳩尸卑那奔龜兹冬十月辛丑恒農王奚斤薨癸夘以婚姻奢靡喪𦵏過度詔有司更為科限癸亥大赦天下十有二月詔成周公萬度歸自焉耆西討龜兹皇太子朝于行宮遂從北討至于受降城不見蠕蠕因積糧城内留守而還北平王長孫敦坐事降爵為公十年春正月戊辰朔帝在漠南大饗百寮班賜有差甲戍北伐二月蠕蠕渠帥爾綿他㧞等率其部落千餘家來降蠕蠕吐賀真恐懼逺遁事具蠕蠕傳三月遂蒐于河西庚寅車駕還宫夏五月庚寅行幸隂山秋七月浮圖沙國遣使貢獻九月閲武磧上遂北伐事具蠕蠕傳冬十月庚子皇太子及羣官奉迎於行宮壬午大饗班賜所獲及布帛各有差十有一月龜兹疏勒破落那員闊諸國各遣使朝獻十有二月戊申車駕至自北伐己酉以平昌公元託真為中山王十一年春正月乙酉行幸洛陽所過郡國皆親對髙年存恤孤寡以髙涼王那為儀同三司二月甲午大蒐於梁川皇子真薨是月大治宮室皇太子居于北宮車駕遂征懸瓠益遣使者安慰境外之民其不服者誅之永昌王仁大破劉義隆將劉坦之程天祚於汝東斬坦之擒天祚夏四月癸夘輿駕還宮賜從者及留臺郎吏已上生口各有差六月己亥誅司徒崔浩辛丑北廵隂山秋七月義隆遣其輔國將軍蕭斌之率衆六萬寇濟州刺史王買得棄州走斌之遂入城仍使寧朔將軍王元謨西攻滑臺詔枋頭鎮將平南將軍南康公杜道􅖡助守兗州八月癸亥田於河西癸未治兵於西郊九月辛夘輿駕南伐癸巳皇太子北伐屯於漠南吳王余留守京都庚子曲赦定冀相三州死罪已下發州郡兵五萬分給諸軍冬十月癸亥車駕止枋頭詔殿中尚書長孫真率騎五千自石濟渡備元謨遁走乙丑車駕濟河元謨大懼棄軍而走衆各潰散追躡斬首萬餘級器械山積帝遂至東平蕭斌之棄濟州退保厯城乃命諸將分道並進使征西大將軍永昌王仁自洛陽出壽春尚書長孫真趨馬頭楚王建趨鍾離髙涼王那自青州趨下邳車駕自卭道十有一月辛夘至于鄒山劉義隆魯郡太守崔邪利率屬城降使使者以太牢祀孔子壬子次于彭城遂趨盱眙頞盾國獻師子一十有二月丁夘車駕至淮詔刈萑葦作筏數萬而濟義隆盱眙守將臧質閉門拒守將軍胡崇之等率衆二萬援盱眙燕王譚大破之梟崇之等斬首萬餘級淮南皆降是月永昌王仁攻懸瓠㧞之獲義隆守將趙淮送京師斬之過定項城及淮西大破義隆將劉康祖斬之并虜將軍胡盛之王羅漢等傳致行宮癸未車駕臨江起行宮於𤓰歩山永昌王仁自厯陽至於江西髙涼王那自山陽至於廣陵諸軍皆同日臨江所過城邑莫不望塵奔潰其降者不可勝數甲申義隆使獻百牢貢其方物又請進女於皇孫以求和好帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之詔皇孫為書致馬通問焉正平元年春正月丙戍朔大會羣臣於江上班賞各有差文武受爵者二百餘人丁亥輿駕北旋是月破洛那罽賔迷密諸國各遣使朝獻二月戊寅車駕濟河癸未次于魯口皇太子朝於行宮三月己亥車駕至自南伐飲至策勲告於宗廟以降民五萬餘家分置近畿賜留臺文武所獲軍資生口各有差夏五月壬寅大赦六月壬戌改年車師國王遣子入侍詔曰夫刑網太密犯者更衆朕甚愍之有司其案律令務求厥中自餘有不便於民者依比增損詔太子少傅游雅中書侍郎胡方囘等改定律制略陽王羯兒儀同三司髙涼王那有罪賜死戊辰皇太子薨壬申𦵏景穆太子於金陵秋七月丁亥行幸隂山省諸曹吏員三分之一九月癸巳車駕還宮冬十月庚申行幸隂山劉義隆遣使朝貢詔殿中將軍郎法祐使於義隆己巳司空上黨王長孫道生薨十有二月丁丑車駕還宮封皇孫濬為髙陽王尋以皇孫世嫡不宜在藩乃止封秦王翰為東平王燕王譚為臨淮王楚王建為廣陽王呉王余為南安王二年春正月庚辰朔南來降民五千餘家於中山謀叛州軍討平之冀州刺史張掖王沮渠萬年與降民通謀賜死三月甲寅帝崩於永安宮時年四十五祕不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元為承平尊皇后赫連氏為皇太后三月辛夘上尊諡曰太武皇帝𦵏於雲中金陵廟號世祖夏六月劉義隆將檀和之寇濟州梁坦及魯安生軍于京索龎萌薛安都寇宏農秋七月征南將軍安定公韓元興討之和之退梁坦安生亦走八月冠軍將軍封禮率騎二千從浢津南渡赴宏農九月司空髙平公兒烏干屯潼關平南將軍昌黎公元遼屯河内冬十月丙午朔余為宗愛所賊殿中尚書長孫渇侯與尚書陸麗迎立皇孫是為髙宗焉帝生不逮密太后及有所識言則悲慟哀感傍人太宗聞而嘉歎暨太宗不豫衣不釋帶性清儉率素服御飲膳取給而已不好珍麗食不二味所幸昭儀貴人衣無兼綵羣臣白帝更峻京邑坁隍以從周易設險之義又陳蕭何壯麗之説帝曰古人有言在徳不在險屈丐蒸土築城而朕滅之豈在城也今天下未平方須民力土功之事朕所朱為蕭何之對非雅言也毎以財者軍國之本無所輕費至賞賜皆是死事勲績之家親戚愛寵未曾横有所及臨敵常與士卒同在矢石之間左右死傷者相繼而帝神色自若是以人思効命所向無前命將出師指授節度從命者無不制勝違爽者率多敗失性又知人㧞士於卒伍之中惟其才效所長不論本末兼甚嚴斷明於刑賞功者賞不遺賤罪者刑不避親雖寵愛之終不虧法常曰法者朕與天下共之何敢輕也故大臣犯法無所寛假雅長聽察瞬息之間下人無以措其姦隱然果於誅戮後多悔之司徒崔浩既死之後帝北伐時宣城公李孝伯疾篤𫝊者以為卒也帝聞而悼之謂左右曰李宣城可惜又曰朕向失言崔司徒可惜李宣城可哀褒貶雅意皆此類也恭宗景穆皇帝諱晃太武皇帝之長子也母賀夫人延和元年春正月丙午立為皇太子時年五歳明慧彊識聞則不忘及長好讀經史皆通大義世祖甚竒之世祖東征和龍詔恭宗錄尚書事西征涼州詔恭宗監國初世祖之伐河西也李順等咸言姑臧無水草不可行師恭宗有疑色及車駕至姑臧乃詔恭宗曰姑臧城東西門外流泉合於城北其大如河自餘溝渠流入澤中其間乃無燥地澤草茂盛可供大軍數年人之多言亦可惡也故有此勑以釋汝疑恭宗謂宮臣曰為人臣不實若此豈是忠乎吾初聞有疑但帝決行耳㡬誤人大事言者復何面見帝也真君四年恭宗從世祖討蠕蠕至鹿渾谷與賊相遇虜惶怖部落擾亂恭宗言於世祖曰今大軍卒至宜速進擊掩其不備破之必矣尚書令劉潔固諫以為塵盛賊多出至平地恐為所圍須軍大集然後擊之可也恭宗謂潔曰此塵之盛由賊恇擾軍人亂故何有營上而有此塵世祖疑之遂不急擊蠕蠕逺遁既而獲虜候騎世祖問之對曰蠕蠕不覺官軍卒至上下惶懼引衆北走經六七日知無追者始乃徐行世祖深恨之自是恭宗所言軍國大事多見納用遂知萬機初恭宗監國曾令曰周書言任農以耕事貢九榖任圃以樹事貢草木任工以餘材貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其材任虞以澤事貢其物其制有司課畿内之民使無牛家以人牛力相貿墾殖鋤耨其有牛家與無牛家一人種田二十二畆償以私鋤功七畆如是為差至與小老無牛家種田七畆小老者償以鋤功二畝皆以五口下貧家為率各列家别口數所勸種頃畝明立簿目所種者於地首標題姓名以辨種殖之功又禁飲酒雜戲棄本沽販者墾田大為增闢正平元年六月戊辰薨於東宮時年二十四庚午冊曰嗚呼惟爾誕資明叡岐嶷夙成正位少陽克荷基構賔于四門百揆時叙允釐庶績風雨不迷宜享無疆隆我皇祚如何不幸奄焉殂殞朕用悲慟于厥心今使使持節兼太尉張黎兼司徒竇瑾奉策即柩賜諡曰景穆以顯昭令徳魂而有靈其尚嘉之髙宗即位追尊為景穆皇帝廟號恭宗史臣曰世祖聰明雄斷威靈傑立藉二世之資奮征伐之氣遂戎軒四出周旋險夷掃統萬平秦隴翦遼海盪河源南夷荷擔北蠕削跡廓定四表混一戎華其為功也大矣遂使有魏之業光邁百王豈非神叡經綸事當命世至於初則東儲不终末乃釁成所忽固本貽防殆弗思乎恭宗明徳令聞夙世殂夭其戾園之悼歟魏書卷四下魏書卷四下考證世祖紀明於刑賞功者賞不遺賤罪者刑不避親賤監本誤賊今改正魏書卷四下考證
