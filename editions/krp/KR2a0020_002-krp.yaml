body:
  text: 魏書卷二齊魏收撰帝紀第二太祖紀太祖道武皇帝諱珪昭成皇帝之嫡孫獻明皇帝之子也母曰獻明賀皇后初因遷徙遊于雲澤既而寢息夢日出室内寤而見光自牖屬天歘然有感以建國三十四年七月七日生太祖於參合陂北其夜復有光明昭成大悦羣臣稱慶大赦告於祖宗保者以帝體重倍於常兒竊獨竒恠明年有榆生於埋胞之坎後遂成林弱而能言目有光曜廣顙大耳衆咸異之年六嵗昭成崩苻堅遣將内侮將遷帝於長安既而獲免語在燕鳳傳堅軍既還國衆離散堅使劉庫仁劉衞辰分攝國事南部大人長孫嵩及元他等盡將故民南依庫仁帝於是轉幸獨孤部元年𦵏昭成皇帝於金陵營梓宮木柹盡生成林帝雖沖㓜而嶷然不羣庫仁常謂其子曰帝有髙天下之志興復洪業光揚祖宗者必此主也二年冬十月苻堅敗于淮南是月慕容文等殺庫仁庫仁弟眷攝國部八年慕容暐弟沖僭立姚萇自稱大單于萬年秦王幕容垂僭稱燕王九年庫仁子顯殺眷而代之乃將謀逆商人王霸知之履帝足於衆中帝乃馳還是時故大人梁蓋盆子六眷為顯謀主盡知其計密使部人穆崇馳告帝乃隂結舊臣長孫犍元他等秋八月乃幸賀蘭部其日顯果使人求帝不及語在獻明太后傳是嵗鮮卑乞伏國仁私署大單于苻堅為姚萇所殺子丕僭立登國元年春正月戊申帝即代王位郊天建元大會於牛川復以長孫嵩為南部大人以叔孫普洛為北部大人班爵敘勲各有差二月幸定襄之盛樂息衆課農三月劉顯自善無南走馬邑其族奴真率所部來降夏四月改稱魏王五月車駕東幸陵石䕶佛侯部帥侯辰乙弗部帥代題叛走諸將追之帝曰侯辰等世脩職役雖有小愆宜且忍之當今草剙人情未一愚近者固應趦趄不足追也秋七月己酉車駕還盛樂代題復以部落來降旬有數日亡奔劉顯帝使其孫倍斤代領部落是月劉顯弟亢埿率騎掠奴真部落既而率以來降初帝叔父窟咄為苻堅徙于長安因隨慕容永永以為新興太守八月劉顯遣弟亢泥迎窟咄以兵隨之來逼南境於是諸部騷動人心顧望帝左右于植等與諸部人謀為逆以應之事泄誅造謀者五人餘悉不問帝慮内難乃北踰隂山幸賀蘭部阻山為固遣行人安同長孫賀使于慕容垂以徴師垂遣使朝貢并令其子賀驎帥歩騎以隨同等冬十月賀驎軍未至而寇已前逼於是北部大人叔孫普洛等十三人及諸烏丸亡奔衞辰帝自弩山遷幸牛川屯于延水南出代谷會賀驎於髙栁大破窟咄窟咄奔衞辰衞辰殺之帝悉收其衆十二月慕容垂遣使朝貢奉帝西單于印綬封上谷王帝不納是嵗慕容垂僭稱皇帝於中山自號大燕苻丕死苻登自立於隴東姚萇稱皇帝於長安自號大秦慕容沖為部下所殺慕容永僭立二年春正月班賜功臣長孫嵩等七十三人各有差二月帝幸寗川夏五月遣行人安同徵兵於慕容垂垂使子賀驎率衆來會六月帝親征劉顯於馬邑南追至彌澤大破之顯南奔慕容永盡收其部落秋八月帝至自伐顯冬十月癸卯幸濡源遣外朝大人王建使於慕容垂十一月遂幸赤城十有二月廵松漠還幸牛川三年春二月帝東廵夏四月幸東赤城五月癸亥北征厙莫奚六月大破之獲其四部雜畜十餘萬渡弱落水班賞將士各有差秋七月庚申厙莫部帥鳩集遺散夜犯行宮縱騎撲討盡殺之其月帝還赤城八月使九原公元儀使於慕容垂冬十月慕容垂遣使朝貢十有二月辛夘車駕西征至女水討解如部大破之獲男女雜畜十數萬是嵗乞伏國仁死弟乾歸立私署河南王四年春正月甲寅襲髙車諸部落大破之二月癸巳至女水討叱突鄰部大破之戊戍賀染干兄弟率諸部來救與大軍相遇逆擊走之夏四月行還赤城五月陳留公元䖍使於慕容垂冬十月垂遣使朝貢是嵗氐吕光自稱三河王遣使朝貢五年春三月甲申帝西征次鹿渾海襲髙車袁紇部大破之虜獲生口馬牛羊二十餘萬慕容垂遣子賀驎率衆來會夏四月丙寅行幸意辛山與賀驎討賀蘭紇突鄰訖奚諸部落大破之六月還幸牛川衞辰遣子直力鞮寇賀蘭部圍之賀納等請降告困秋七月丙子帝引兵救之至羊山直力鞮退走八月還幸牛川遣秦王觚使於慕容垂九月壬申討叱奴部於囊曲河大破之冬十月遷雲中討髙車豆陳部於狼山破之十有二月紇奚部大人庫寒舉部内屬十有二月紇突鄰大人屈地鞬舉部内屬帝還次白漠六年春二月幸紐垤川三月遣九原公元儀陳留公元䖍等西討黜弗部大破之夏四月祠天六月慕容賀驎破賀訥於赤城帝引兵救之驎退走秋七月壬申講武於牛川行還紐垤川慕容垂止元觚而求名馬帝絶之乃遣使於慕容永永使其大鴻臚慕容鈞奉表勸進尊號其月衞辰遣子直力鞮出棝陽塞侵及黑城九月帝襲五原屠之收其積榖還紐垤川於棝陽塞北樹碑記功冬十月戊戌北征蠕蠕追之及於大磧南牀山下大破之班賜從臣各有差其東西二部主匹候跋及縕紇提斬别帥屋擊于事具蠕蠕傳十有一月戊辰還幸紐垤川戊寅衞辰遣子直力鞮宼南部己夘車駕出討壬午大破直力鞮軍於鐵岐山南獲其器械輜重牛羊二十餘萬戊子自五原金津南渡河辛夘次其所居悦跋城衞辰父子奔遁壬辰詔諸將追之擒直力鞮十有二月獲衞辰尸斬以狥遂滅之語在衞辰傳衞辰少子屈丐亡奔薛于部車駕次于鹽池自河以南諸部悉平簿其珍寶畜産名馬三十餘萬匹牛羊四百餘萬頭班賜大臣各有差收衞辰子弟宗黨無少長五千餘人盡殺之山胡酋大幡頽業易于等率三千餘家降附出居于馬邑是嵗起河南宮七年春正月幸木根山遂次黑鹽池饗宴羣臣覲諸國貢使北之美水三月甲子宴羣臣於水濵還幸河南宮西部泣黎大人茂鮮叛走遣南部大人長孫嵩追討大破之夏五月班賜諸官馬牛羊各有差秋八月行幸漠南仍築廵臺冬十有二月慕容永遣使朝貢是嵗皇子嗣生八年春正月帝南廵二月幸羖羊原赴白樓三月車駕西征侯呂鄰部夏四月至苦水大破之五月還幸白樓慕容垂討慕容永於長子六月車駕北廵永來告急遣陳留公元䖍將軍庾岳率騎五萬東度河救之破類拔部帥劉曜等徙其部落元䖍等因屯秀容慕容垂遂圍長子秋七月車駕臨幸新壇庚寅宴羣臣仍講武先是衞辰子屈丐奔薛于部徵之不送八月帝南征薛于部帥太悉佛於三城會其先出擊曹覆帝乗虚屠其城獲太悉佛子珍寶徙其民而還太悉佛聞之來赴不及遂奔姚興九月還幸河南宮是嵗姚萇死九年春三月帝北廵使東平公元儀屯田於河北五原至於棝陽塞外夏五月田於河東秋七月還幸河南宮冬十月蠕蠕社崘等率部落西走事具蠕蠕傳是嵗姚萇子興僭立殺苻登慕容垂滅永十年春正月太悉佛自長安還嶺北上郡以西皆應之夏五月幸鹽池六月還幸河南宮秋七月慕容垂遣其子寶來寇五原造舟收榖帝遣右司馬許謙徵兵於姚興東平公元儀徙據朔方八月帝親治兵於河南九月進師臨河築臺告津連旌沿河東西千里有餘是時陳留公元䖍五萬騎在東以絶其左元儀五萬騎在河北以承其後畧陽公元遵七萬騎塞其中山之路冬十月辛未寶燒船夜遁十一月己夘帝進軍濟河乙酉夕至參合陂丙戍大破之語在寶𫝊生擒其陳留王紹魯陽王倭奴桂林王道成濟隂公尹國北地王世子鍾葵安定王世子羊兒以下文武將吏數千人器甲輜重軍資雜財十餘萬計於俘虜之中擢其才識者賈彝賈閏晁崇等與參謀議憲章故實班賞大臣將校各有差十有二月還幸雲中之盛樂皇始元年春正月大蒐于定襄之虎山因東幸善無北陂三月慕容垂來寇桑乾川陳留公元䖍先鎮平城時徴兵未集䖍率麾下邀擊失利死之垂遂至平城西北踰山結營聞帝將至乃築城自守疾甚遂遁走死於上谷子寶匿喪而還至中山乃僭立夏六月癸酉遣將軍王建等三軍討寶廣寗太守劉亢泥斬之徙其部落寶上谷太守慕容普鄰捐郡奔走丁亥皇太后賀氏崩是月𦵏獻明太后秋七月右司馬許謙上書勸進尊號帝始建天子旌旗出入警蹕於是改元八月庚寅治兵于東郊己亥大舉討慕容寶帝親勒六軍四十餘萬南出馬邑踰于句注旌旗駱驛二千餘里鼓行而前民屋皆震别詔將軍封真等三軍從東道出襲幽州圍薊九月戊午次陽曲乗西山臨觀晉陽命諸將引騎圍脇已而罷還寶并州牧遼西王農大懼將妻子棄城夜出東遁并州平初建臺省置百官封公侯將軍刺史太守尚書郎已下悉用文人帝初拓中原留心慰納諸士大夫詣軍門者無少長皆引入賜見存問周悉人得自盡茍有微能咸蒙敘用己未詔輔國將軍奚牧畧地晉川獲慕容寶丹陽王買得等於平陶城冬十月乙酉車駕出井陘使冠軍將軍王建左軍將軍李栗五萬騎先驅啓行十有一月庚子朔帝至真定自常山以東守宰或捐城奔竄或稽顙軍門唯中山鄴信都三城不下别詔征東大將軍東平公儀五萬騎南攻鄴冠軍將軍王建左軍將軍李栗等攻信都軍之所行不得傷民桑棗戊午進軍中山己未引騎圍之帝謂諸將曰朕量寶不能出戰必當憑城自守偷延日月急攻則傷士乆守則費糧不如先平鄴信都然後還取中山於計為便若移軍逺去寶必散衆求食民間如此則人心離阻攻之易克諸將稱善丁夘車駕幸魯口城是嵗司馬昌明死子徳宗僭立遣使朝貢呂光僭稱天王號大涼遣使朝貢二年春正月己亥朔大饗羣臣於魯口慕容寶遣其左衞將軍慕容騰宼博陵殺中山太守及髙陽諸縣令長抄掠租運是時信都未下庚申乃進軍壬戍引騎圍之其夜寶冀州刺史宜都王慕容鳳踰城奔走歸于中山癸亥寶輔國將軍張驤䕶軍將軍徐超率將吏已下舉城降寶聞帝幸信都乃趣博陵之深澤屯滹沲水遣弟賀驎寇楊城殺常山守兵三百餘人寶悉出珍寶及宮人招募郡縣羣盜無賴者多應之二月己巳帝進幸楊城丁丑軍于鉅鹿之柏肆塢臨滹沲水其夜寶悉衆犯營燎及行宮兵人駭散帝驚起不及衣冠跣出擊鼓俄而左右及中軍將士稍稍來集帝設竒陳列烽營外縱騎衝之寶衆大敗斬首萬餘級擒其將軍髙長等四千餘人戊寅寶走中山獲其器仗輜重數十萬計寶尚書閔亮祕書監崔逞太常孫沂殿中侍御史孟輔等並降降者相屬賜拜職爵各有差平原徐超聚衆反於畔城詔將軍奚辱捕斬之并州守將封真率其種族與徒何為逆將攻刺史元延延討平之是時柏肆之役逺近流言賀蘭部帥附力眷紇突鄰部帥匿物尼紇奚部帥叱奴根聚黨反於隂館南安公元順率軍討之不克死者數千詔安逺將軍庾岳總萬騎還討叱奴根等滅之三月己酉車駕次于盧奴寶遣使求和請送元觚割常山以西奉國乞守中山以東帝許之已而寶背約辛亥車駕次中山命諸將圍之是夜寶弟賀驎將妻子出走西山寶見賀驎走恐先據和龍壬子夜遂將其妻子及兄弟宗族數千騎北遁寶將李沈王次多張超賈歸等來降遣將軍長孫肥追之至范陽不及受還城内共立慕容普鄰為主夏四月帝以軍糧未繼乃詔征東大將軍東平公元儀罷鄴圍徙屯鉅鹿積租楊城普鄰出歩卒六千餘人伺間犯諸屯兵詔將軍長孫肥等輕騎挑之帝以虎隊五千横截其後斬首五千生虜七百人宥而遣之夏五月庚子大賞功臣帝以中山城内為普鄰所脇而大軍廹之欲降無路乃密招喻之甲辰曜兵揚威以示城内命諸軍罷圍南徙以待其變甲寅以東平公元儀為驃騎大將軍都督中外諸軍事兖豫雍荆徐揚六州牧左丞相封衞王襄城公元題進封為王秋七月普鄰遣烏丸張驤率五千餘人出城求食宼常山之靈夀殺害吏民賀驎自丁零中入于驤軍因其衆復入中山殺普鄰而自立帝還幸魯口遣將軍長孫肥一千騎襲中山入其郛而還八月丙寅朔帝自魯口進軍常山之九門時大疫人馬牛多死帝問疫於諸將對曰在者纔十四五是時中山猶拒守而饑疫並臻羣下咸思還北帝知其意因謂之曰斯固天命將若之何四海之人皆可與為國在吾所以撫之耳何恤乎無民羣臣乃不敢復言遣撫軍大將軍畧陽公元遵襲中山芟其禾菜入郛而還九月賀驎饑窮率三萬餘人出寇新市甲子晦帝進軍討之太史令晁崇奏曰不吉帝曰其義云何對曰昔紂以甲子亡兵家忌之帝曰紂以甲子亡周武不以甲子勝乎崇無以對冬十月丙寅帝進軍新市賀驎退阻泒水依漸洳澤以自固甲戍帝臨其營戰於義臺塢大破之斬首九千餘級賀驎單馬走西山遂奔鄴慕容徳殺之甲申其所署公卿尚書將吏士卒降者二萬餘人其將張驤李沈慕容文等先來降尋皆亡還是日復獲之皆赦而不問獲其所傳皇帝璽綬圖書府庫珍寶簿列數萬班賜功臣及將士各有差中山平乙酉襄城王題薨丁亥遣三萬騎赴衞王儀將以攻鄴是嵗鮮卑秃髮烏孤私署大單于西平王天興元年春正月慕容徳走保滑臺儀克鄴收其倉庫詔賞將士各有差儀追徳至於河不及而還庚子車駕自中山行幸常山之真定次趙郡之髙邑遂幸于鄴民有老不能自存者詔郡縣賑恤之帝至鄴廵登臺榭遍覽宮城將有定都之意乃置行臺以龍驤將軍日南公和跋為尚書與左丞賈彝率郎吏及兵五千人鎮鄴車駕自鄴還中山所過存問百姓詔大軍所經州郡復貲租一年除山東民租賦之半車駕將北還發卒萬人治直道自望都鐵關鑿恒嶺至代五百餘里帝慮還後山東有變乃置行臺於中山詔左丞相守尚書令衞王儀鎮中山撫軍大將軍畧陽公元遵鎮渤海之合口右軍將軍尹國先督租于冀州聞帝將還謀反欲襲信都安南將軍長孫嵩執送斬之辛酉車駕發自中山至于望都堯山徙山東六州民吏及徒何髙麗雜夷三十六萬百工伎巧十萬餘口以充京師車駕次于恒山之陽博陵渤海章武羣盜並起畧陽公元遵等討平之廣川太守賀盧殺冀州刺史王輔驅勒守兵抄掠陽平頓丘諸郡遂南渡河奔慕容徳二月車駕自中山幸繁畤宮更選屯衞詔給内徙新民耕牛計口受田三月離石胡帥呼延䥫西河胡帥張崇等聚黨數千人叛詔安逺將軍庾岳討平之漁陽羣盜庫傉官韜聚衆反詔中堅將軍伊謂討之徴左丞相衞王儀還京師詔畧陽公遵代鎮中山夏四月壬戌進遵封常山王南安公元順進封毗陵王征虜將軍厯陽公穆崇為太尉安南將軍鉅鹿公長孫嵩為司徒帝祠天於西郊旗幟有加焉廣平太守遼西公元意烈謀反於郡賜死原其妻子鄜城屠各董羌杏城盧水郝奴河東蜀薛榆氐帥符興各率其種内附六月丙子詔有司議定國號羣臣曰昔周秦以前世居所生之土有國有家及王天下即承為號自漢以來罷侯置守時無世繼其應運而起者皆不由尺土之資今國家萬世相承啓基雲代臣等以為若取長逺應以代為號詔曰昔朕逺祖總御幽都控制遐國雖踐王位未定九州逮于朕躬處百代之季天下分裂諸華乏主民俗雖殊撫之在徳故躬率六軍掃平中土凶逆蕩除遐邇率服宜仍先號以為魏焉布告天下咸知朕意秋七月遷都平城始營宮室建宗廟立社稷漁陽羣盜庫傉官韜復聚黨為宼詔冠軍將軍王建討平之八月詔有司正封畿制郊甸端徑術標道里平五權較五量定五度遣使循行郡國舉奏守宰不法者親覽察黜陟之九月烏丸張驤子超收合亡命聚黨二千餘家據勃海之南皮自號征東大將軍烏丸王抄掠諸郡詔將軍庾岳討之冬十月起天文殿十有一月辛亥詔尚書吏部郎中鄧淵典官制立爵品定律呂協音樂儀曹郎中董謐撰郊廟社稷朝覲饗宴之儀三公郎中王徳定律令申科禁太史令晁崇造渾儀考天象吏部尚書崔元伯總而裁之閏月左丞相驃騎大將軍衞王儀及諸王公卿士詣闕上書曰臣等聞宸極居中則列宿齊其晷帝王順天則羣后仰其度伏惟陛下徳協二儀道隆三五仁風被於四海盛化塞于大區澤及昆蟲恩霑行葦謳歌所屬八表歸心軍威所及如風靡草萬姓顒顒咸思係命而躬履謙虚退身後已宸儀未彰衮服未御非所以上允皇天之意下副樂推之心宜光崇聖烈示軌憲於萬世臣等謹昧死以聞帝三讓乃許之十有二月己丑帝臨天文殿太尉司徒進璽綬百官咸稱萬嵗大赦改年追尊成帝已下及后號諡樂用皇始之舞詔百司議定行次尚書崔元伯等奏從土徳服色尚黄數用五未祖辰臘犧牲用白五郊立氣宣贊時令敬授民時行夏之正徙六州二十二郡守宰豪傑吏民二千家于代都是嵗蘭汗殺慕容寶而自立寶子盛殺汗僭立慕容徳自稱燕王二年春正月甲子初祠上帝于南郊以始祖神元皇帝配降壇視燎成禮而反乙丑曲赦京師始制三駕之法庚午車駕北廵分命諸將大襲髙車大將軍常山王遵等三軍從東道出長川鎮北將軍髙涼王樂真等七軍從西道出牛川車駕親勒六軍從中道自駮髯水西北二月丁亥朔諸軍同㑹破髙車雜種三十餘部獲七萬餘口馬三十餘萬匹牛羊百四十餘萬驃騎大將軍衞王儀督三萬騎别從西北絶漠千餘里破其遺迸七部獲二萬餘口馬五萬餘匹牛羊二十餘萬頭髙車二十餘萬乗并服玩諸物還次牛山及薄山並刻石記功班賜從臣各有差庚戍征虜將軍庾岳破張超於勃海超走平原為其黨所殺以所獲髙車衆起鹿苑於南臺隂北距長城東包白登屬之西山廣輪數十里鑿渠引武川水注之苑中疏為三溝分流宮城内外又穿鴻鴈池三月己未車駕至自北伐甲子初令五經羣書各置博士增國子太學生員三千人是月氐人李辯叛慕容徳求援於鄴行臺尚書和跋跋輕騎往應之克滑臺收徳宮人府藏又破徳桂林王鎮及郎吏將士千餘人丙子遣建義將軍庾真越騎校尉奚斤討庫狄部帥葉亦干宥連部帥竇羽泥於太渾川破之庫狄􅮆支子沓亦干率其部落内附真等進破侯莫陳部獲馬牛羊十餘萬頭追殄遺迸入大峨谷中山太守仇儒亡匿趙郡推羣盜趙准為主號使持節征西大將軍冀青二州牧鉅鹿公仇儒為准長史聚黨扇惑詔中領軍長孫肥討平之夏四月前清河太守傅世聚黨千餘家自號撫軍將軍五月癸亥征虜將軍庾岳討破之秋七月起天華殿辛酉大閲于鹿苑饗賜各有差陳郡河南流民萬餘口内徙遣使者存勞之姚興遣衆圍洛陽司馬徳宗將辛恭靖請救八月遣太尉穆崇率騎六千往赴之增啓京師十二門作西武庫除州郡民租賦之半辛亥詔禮官備撰衆儀著于新令范陽人盧溥聚衆海濵稱使持節征北大將軍幽州刺史攻掠郡縣殺幽州刺史封沓干慕容盛遼西太守李朗舉郡内屬西河胡帥䕶諾于丁零帥翟同蜀帥韓礱並相率内附冬十月太廟成遷神元平文昭成獻明皇帝神主于太廟十有二月甲午慕容盛征虜將軍燕郡太守髙湖率户三千内屬辛亥詔材官將軍和突討盧溥天華殿成是嵗呂光立其子紹為天王自稱太上皇光死庶子纂殺紹僭立秃髪烏孤死弟鹿孤代立遣使朝貢三年春正月戊午和突破盧溥於遼西生獲溥及其子煥傳送京師轘之癸亥有事於北郊分命諸官循行州郡觀民風俗察舉不法賜羣臣布帛各有差二月丁亥詔有司祀日于東郊始耕籍田壬寅皇子聰薨三月戊午立皇后慕容氏是月穿城南渠通於城内作東西魚池夏四月姚興遣使朝貢五月戊辰詔謁者僕射張濟使於姚興己巳車駕東廵遂幸涿鹿遣使者以太牢祠帝堯帝舜廟西幸馬邑觀灅源秋七月壬子車駕還宮起中天殿及雲母堂金華室十有一月髙車别帥勑力犍率九百餘落内屬十有二月乙未詔曰世俗謂漢髙起於布衣而有天下此未達其故也夫劉承堯統曠世繼徳有蛇龍之徵致雲彩之應五緯上聚天人俱協明革命之主大運所鍾不可以非望求也然狂狡之徒所以顛蹶而不已者誠惑於逐鹿之説而迷於天命也故有踵覆車之軌蹈釁逆之蹤毒甚者傾州郡害微者敗邑里至乃身死名頽殃及九族從亂隨流死而不悔豈不痛㦲春秋之義大一統之美吳楚僭號乆加誅絶君子賤其偽名比之塵垢自非繼聖載徳天人合會帝王之業夫豈虚應厯觀古今不義而求非望者徒喪其保家之道而伏刀鋸之誅有國有家者誠能推廢興之有期審天命之不易察徴應之潛授杜競逐之雅言絶姦雄之僭肆思多福於止足則㡬於神智矣如此則可以保榮禄於天年流餘慶於後世夫然故禍悖無縁而生兵甲何因而起凡厥來世勗㦲戒之可不慎歟時太史屢奏天文錯亂帝親覽經占多云改王易政故數革官號一欲防塞凶狡二欲消災應變已而慮羣下疑惑心謗腹非丙申復詔曰上古之治尚徳下名有任而無爵易治而事序故邪謀息而不起姦慝絶而不作周姬之末下凌上替以號自定以位制禄卿世其官大夫遂事陽徳不暢議發家倍故釁由此起兵由此作秦漢之弊捨徳崇侈能否混雜賢愚相亂庶官失序任非其人於是忠義之道寢亷恥之節廢退讓之風絶毁譽之議興莫不由乎貴尚名位而禍敗及之矣古置三公職大憂重故曰待罪宰相將委任責成非虚寵禄也而今世俗僉以台輔為榮貴企慕而求之夫此職司在人主之所任耳用之則重捨之則輕然則官無常名而任有定分是則所貴者至矣何取於鼎司之虚稱也夫桀紂之南面雖髙而可薄姬旦之為下雖卑而可尊一官可以效智蓽門可以垂範茍以道徳為實賢於覆餗蔀家矣故量己者令終而義全昧利者身陷而名滅利之與名毁譽之疵競道之與徳神識之家寶是故道義治之本名爵治之末名不本於道不可以為宜爵無補於時不可以為用用而不禁為病深矣能通其變不失其正者其惟聖人乎來者誠思成敗之理察治亂之由鑒殷周之失革秦漢之弊則㡬於治矣是嵗乞伏乾歸為姚興所破李暠私署涼州牧涼公四年春正月髙車别帥率其部三十餘落内附二月丁亥命樂師入學習舞釋菜于先聖先師丁酉分命使者循行州郡聽察辭訟糾劾不法三月帝親漁薦于寢廟夏四月辛夘罷鄴行臺詔有司明揚隱逸五月起紫極殿元武樓涼風觀石池鹿苑臺秋七月詔鎮逺將軍兖州刺史長孫肥步騎二萬南狥許昌彭城詔賜天下鎮戍將士布帛各有差冬十二月辛亥詔征西大將軍常山王遵等率衆五萬討破多蘭部帥木易干材官將軍和突率騎六千襲黜弗素古延等諸部集博士儒生比衆經文字義類相從凡四萬餘字號曰衆文經是嵗慕容盛死寶弟熙僭立吕光弟子隆殺纂自立盧水胡沮渠蒙遜私署涼州牧張掖公蒙遜及李暠並遣使朝貢五年春正月丁丑慕容熙遣將寇遼西虎威將軍宿沓干等拒戰不利棄令支而還帝聞姚興將寇邊庚寅大簡輿徒詔并州諸軍積榖于平陽之乾壁戊子材官將軍和突破黜弗素古延等諸部獲馬三千餘匹牛羊七萬餘頭辛夘蠕蠕社崘遣騎救素古延等和突逆擊破之于山南河曲獲鎧馬二千餘匹班師賞賜將士各有差二月癸丑征西大將軍常山王遵等至安定之髙平木易干率數千騎與衞辰屈丐棄國遁走追至隴西瓦亭不及而還獲其輜重庫藏馬四萬餘匹駱駞氂牛三千餘頭牛羊九萬餘口班賜將士各有差徙其民於京師沙門張翹自號無上王與丁零鮮于次保聚黨常山之行唐夏四月太守樓伏連討斬之五月姚興遣其弟安北將軍義陽公平率衆四萬来侵平陽乾壁為平所陷六月治兵于東郊部分衆軍詔鎮西大將軍毗陵王順長孫肥等三將六萬騎為前鋒秋七月戊辰朔車駕西討八月乙巳至於柴壁平固守進軍圍之姚興悉舉其衆来救甲子帝渡蒙坑逆擊興軍大破之冬十月平赴水而死俘其餘衆三萬餘人語在興傳獲興征虜將軍尚書右僕射狄伯支越騎校尉唐小方積弩將軍姚梁國建忠將軍雷星康官北中郎將康猥平從弟伯禽已下四品將軍已上四十餘人獲先亡臣王次多靳懃並斬以狥興頻使請和帝不許羣臣勸進平蒲坂帝慮蠕蠕為難戊申班師十有一月車駕次晉陽徵相州刺史庾岳為司空遣左將軍莫題討上黨羣盜秦頗丁零翟都於壺關丁丑上黨太守捕頗斬之都走林慮十有二月辛亥至自西征蠕蠕社崘犯塞詔常山王遵追之不及而還越勤莫弗率其部萬餘家内屬居五原之北是嵗秃髮鹿孤病死弟傉檀統任遣使朝貢六年春正月辛未朔方尉遲部别帥率萬餘家内屬入居雲中夏五月大簡輿徒將畧江淮平荆揚之亂秋七月鎮西大將軍司隸校尉毗陵王順有罪以王還第戊子車駕北廵築離宮于犲山縱士校獵東北踰罽嶺出參合代谷九月行幸南平城規度灅南面夏屋山背黄𤓰堆將建新邑辛未車駕還宮冬十月起西昭陽殿乙夘立皇子嗣為齊王加車騎大將軍位相國紹為清河王加征南大將軍熙為陽平王曜為河南王封故秦愍王子夔為豫章王陳留王子右將軍悦為朱提王丁巳詔將軍伊謂率騎二萬北襲髙車司馬徳宗遣使朝貢十有一月庚午伊謂大破髙車是年島夷桓元廢其主司馬徳宗而自立僭稱大楚天賜元年春正月遣離石䕶軍劉託率騎三千襲蒲子三月丙寅擒姚興寧北將軍泰平太守衡譚獲三千餘口初限縣户不滿百罷之夏四月詔尚書郎中公孫表使於江南以觀桓𤣥之釁也值𤣥敗而還蠕蠕社崘從弟悦伐大那等謀殺社崘而立大那發覺來奔五月置山東諸冶發州郡徒讁造兵甲秋九月帝臨昭陽殿分置衆職引朝臣文武親自簡擇量能敘用制爵四等曰王公侯子除伯男之號追錄舊臣加以封爵各有差是秋江南大亂流民繦負而奔淮北行道相尋冬十月辛巳大赦改元築西宮十有一月上幸西宮大選朝臣令各辨宗黨保舉才行諸部子孫失業賜爵者二千餘人十有二月戊辰車駕幸犲山宮是嵗島夷劉裕起兵誅桓元二年春二月癸亥車駕還宮夏四月車駕有事于西郊車旗盡黑是嵗司馬徳宗復僭立慕容徳死兄子超僭立三年春正月甲申車駕北巡幸材山宮校獵至屋孤山二月乙亥幸代園山建五石亭三月庚子車駕還宮夏四月庚申復幸犲山宮占授著作郎王宜弟造兵法孤虚立成圖三百六十時遂登定襄角史山又幸馬城甲戌車駕還宮是月蠕蠕寇邊夜召兵將旦賊走乃罷六月發八部五百里内男丁築灅南宮門闕髙十餘丈引溝穿池廣苑囿規立外城方二十里分置市里經塗洞達三十日罷秋七月太尉穆崇薨八月甲辰行幸材山宮遂至青牛山丙辰西登武要北原觀九十九泉造石亭遂之石漠九月甲戍朔幸漠南鹽池壬午至漠中觀天鹽池度漠北之吐鹽池癸巳南還長川丙申臨觀長陂冬十月庚申車駕還宮四年春二月封皇子脩為河間玊處文為長樂王連為廣平王黎為京兆王夏五月北巡自參合陂東過蟠羊山大雨暴水流輜重數百乗殺百餘人遂東北踰石漠至長川幸濡源常山王遵有罪賜死秋七月車駕自濡源西幸參合陂築北宮垣三旬而罷乃還宮八月幸材山宮是月誅司空庾岳冬十有一月車駕還宮是嵗慕容寶養子髙雲殺熙自立赫連屈丐自稱大單于大夏天王五年春正月行幸犲山宮遂如參合陂觀漁於延水至寗川三月姚興遣使朝貢是嵗皇孫燾生六年夏帝不豫初帝服寒食散自太醫令隂羌死後藥數動發至此逾甚而災變屢見憂懣不安或數日不食或不寢達旦歸咎羣下喜怒乖常謂百寮左右人不可信慮如天文之占或有肘腋之虞追思既往成敗得失終日竟夜獨語不止若傍有鬼物對揚者朝臣至前追其舊惡皆見殺害其餘或以顔色變動或以喘息不調或以行歩乖節或以言辭失措帝皆以為懷惡在心變見於外乃手自毆擊死者皆陳天安殿前於是朝野人情各懷危懼有司懈怠莫相督攝百工偷劫盜賊公行巷里之間人為希少帝亦聞之曰朕縱之使然待過災年當更清治之爾秋七月慕容支屬百餘家謀欲外奔發覺伏誅死者三百餘人八月衞王儀謀叛賜死冬十月戊辰帝崩於天安殿時年三十九永興二年九月甲寅上諡宣武皇帝𦵏於盛樂金陵廟號太祖泰常五年改諡曰道武史臣曰晉氏崩離戎羯乗釁僭偽紛糺材狼競馳太祖顯晦安危之中屈申潛躍之際驅率遺黎奮其靈武克剪方難遂啓中原朝拱人神顯登皇極雖冠履不暇栖遑外土而制作經謨咸存長世所謂大人利見百姓與能抑不世之神武也而屯厄有期禍生非慮將人事不足豈天實為之嗚呼魏書卷二魏書卷二考證太祖紀帝左右于植等與諸部人謀為逆以應之事泄植北史作桓太書列傳同穆崇傳亦作于植遣秦王觚使于慕容垂綱目書于晉太元十六年是為魏登國六年此書作五年魏書卷二考證
