body:
  text: 魏書卷一百四齊魏收撰列傳第九十二自序漢初魏無知封髙良侯子均均子恢恢子彦彦子歆字子胡幼孤有志操博洽經史成帝世位終鉅鹿太守仍家焉歆子恱字處德性沉厚有度量宣城公趙國李孝伯見而重之以女妻焉位濟陰太守以善政稱恱子子建字敬忠釋褐奉朝請累遷太尉從事中郎初世祖時平氐遂於武興立鎮尋改為東益州其後鎭將刺史乖失人和羣氐作梗遂為邊患乃除子建為東益州刺史子建布以恩信風化大行遠近清静正光五年南北二秦城人莫折念生韓祖香張長命相繼構逆僉以州城之人莫不勁勇同類悉反宜先收其器械子建以為城人數當行陳盡皆驍果安之足以為用急之腹背為憂乃悉召居城老壯曉示之并上言諸城人本非罪坐而來者悉求聽免肅宗優詔從之子建漸分其父兄子弟外居郡戍内外相顧終獲保全及秦賊乗勝屯營黒水子建乃潛使掩襲前後斬獲甚衆威名赫然先反者及此悉降乃間使上聞肅宗甚嘉之詔子建兼尚書為行臺刺史如故於是威震蜀土其梁巴二益两秦之事皆所節度梁州刺史傅豎眼子敬和中心以為愧在洛大行貨賄以圖行臺先是子建亦屢求歸京師至此乃遣刺史唐永代焉豎眼因為行臺子建將還羣氐慕戀相率斷道主簿楊僧覆先行曉喻諸氐忿曰我留刺史爾送出也斫之數創㡬死子建徐加慰譬旬日方得前行吏人贈遺一無所受而東益氐蜀尋反攻逼唐永永棄城而走乃喪一藩矣初永之走子建客有沙門曇璨及鉅鹿人耿顯皆没落氐手及知子建之客垂泣追衣物還之送出白馬遺愛所被如此自國家開華陽等郡梁州邢巒益州傅豎眼及子建為最初子建為前軍將軍十年不徙在洛閑暇與吏部尚書李韶韶從弟延寔頗為奕棊時人謂為耽好子建每曰棊於機權㢘勇之際得之深矣且吾未為時用博奕可也及一臨邊事凡經五年未曽對局還洛後俄拜常侍衛尉卿初元顥内逼莊帝北幸子建謂所親盧義僖曰北海自絶社稷稱藩蕭衍吾老矣豈能為陪臣遂擕家口居洛南顥平乃歸先苦風痺及此遂甚以卿任有務屢上書乞身特除右光祿大夫邢杲之平太傅李延寔子侍中彧為大使撫慰東土時外戚貴盛送客填門子建亦往候别延寔曰小兒今行何以相朂子建曰益以盈滿為誡延寔悵然久之及莊帝殺尒朱榮遇禍於河陰者其家率相弔賀太尉李䖍第二子仁曜子建之女壻往亦見害子建謂姨弟盧道䖍曰朝廷誅翦權彊凶徒尚梗未聞有竒謀異略恐不可濟此乃李門禍始弔賀無乃怱怱及永安之後李氏宗族流離或遇誅夷如其所慮後歴左光禄大夫加散騎常侍驃騎大將軍子建自出為藩牧董司山南居脂膏之中遇天下多事正身潔已不以財利經懐及歸京師家人衣食常不周贍清素之迹著於終始性存重慎不雜交逰唯與尚書盧義僖姨弟涇州刺史盧道裕雅相親昵及疾篤顧勑二子曰死生大分含氣所同世有厚葬吾平生不取籧篨祼身又非吾意氣絶之後歛以時服吾生年契闊前後三娶合葬之事抑又非古且汝二母先在舊塋墳地久固已有定别唯汝次母墓在外耳可遷入兆域依班而定行於吾墓之後如此足矣不須祔合當順吾心勿令吾有遺恨永熙二年春卒於洛陽孝義里舍時年六十三贈儀同三司定州刺史諡曰文静二子收祚收字伯起小字佛助年十五頗已屬文及隨父赴邊值四方多難好習騎射欲以武藝自逹滎陽鄭伯調之曰魏郎弄㦸多少收慙遂折節讀書夏月坐板牀隨樹陰諷誦積年牀板為之鋭減而精力不輟以文華顯初以父功除太學博士及尒朱榮於河陰濫害朝士收亦在圍中以日晏獲免吏部尚書李神儁重收才學奏授司徒記室參軍永安三年除北主客即中前廢帝立妙簡近侍詔試收為封禪書收下筆便就不立草藁文將千言所改無㡬時黄門郎賈思同侍立深竒之帝曰雖七步之才無以過此遷散騎侍郎尋勑典起居注并修國史俄兼中書侍郎年二十六出帝初又詔收攝本職文誥填積事咸稱㫖黄門郎崔㥄從齊獻武王入朝薰灼於世收初不詣門㥄為帝登祚赦云朕託體孝文收嗤其率直正員郎李慎以告之㥄深忿忌時前廢帝殂令收為詔㥄乃宣言收普泰世出入幃幄一日造詔優為詞㫖然則義旗之士盡為逆人又收父老合解官歸侍南䑓將加弹劾頼尚書辛雄為言於中尉綦儁乃觧收有賤生弟仲同先未齒錄因此怖懼上籍遣還鄉扶侍出帝嘗大發士卒狩於嵩少之南旬有六日時既寒苦朝野嗟怨帝與從官皆胡服而騎宮人及諸妃主雜其間竒伎異飾多非禮度收欲言則畏懼欲默不能已乃上南狩賦以諷焉年二十七雖富言淫麗而終歸雅正帝手詔報焉甚見褒美鄭伯謂曰卿不遇老夫猶應逐兎初齊獻武王固讓天柱大將軍帝勑收為詔令遂所請欲加相國問收相國品秩收以實對帝遂止收既未測主相之意以前事不安求解詔許焉久之除帝兄子廣平王贊開府從事中郎收不敢辭乃為庭竹賦以致已意尋兼中書舍人與濟陰温子昇河間邢子才齊譽世號三才時出帝猜忌獻武内有間隙收遂以疾固辭而免其舅崔孝芬怪而問之收曰懼有晉陽之甲尋而獻武南上帝西入關收兼通直散騎常侍副王昕聘蕭衍昕風流文辯收辭藻富逸衍及其羣臣咸加敬異先是南北初和李諧盧元明首通使命二人才器並為隣國所重至此衍稱曰盧李命世王魏中興未知後來復何如耳文襄啓收兼散騎常侍修國史武定二年除正常侍領兼中書侍郎仍修史帝宴百寮問何故名人日皆莫能知收對曰晉議郎董勛答問稱俗云正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人時邢邵亦在側甚恧焉自南北和好書下紙每云想彼境内寧静此率土安和蕭衍後使其書乃去彼字自稱猶著此欲示無外之意收定報書云想境内清晏今萬國安和南人復書依以為體後獻武入朝靜帝授相國固讓令收為啓啓成呈上文襄時侍側獻武指收曰此人當復為崔光四年獻武於西門豹祠宴集謂司馬子如曰魏收為史官書吾善惡聞北伐時諸貴常餉史官飲食司馬僕射頗曽餉不因共大笑仍謂收曰卿勿見元康等在吾目下趨走謂吾以為勤勞我後世身名在卿手勿謂我不知尋加兼著作郎静帝曽季秋大射普令賦詩收詩末云尺書徴建鄴折簡召長安文襄壯之顧謂人曰在朝今有魏收便是國之光采雅俗文墨通逹縱横我亦使子才子昇時有所作至於詞氣並不及之吾或意有所懐忘而不語語而不盡意有未及及收呈草皆以周悉此亦難有又勑兼主客郎接蕭衍使謝珽徐陵侯景既䧟臺城衍鄱陽王範時為合州刺史文襄勑收以書喻之範得書乃率部伍西上闕州刺史崔聖念入據其城文襄謂收曰今定一州卿有其力猶恨尺書徴建業未效耳文襄崩文宣如晉陽令與黄門郎崔季舒髙德正吏部郎中尉瑾於北第參掌機密轉祕書監兼著作郎又除定州大中正時齊将受禪楊愔奏收置之别館令撰禪代詔冊諸文遣徐之才守門不聽出天保元年除中書令仍兼著作郎封富平縣子二年授詔撰魏史除魏尹故優以祿力專在史閣不知郡事初帝令羣臣各言志收曰臣願得直筆東觀早出魏書故帝使收專其任又詔平原王髙隆之總監之隆之署名而已帝勑収曰好直筆我終不作魏太武誅史官始魏初鄧淵撰代記十餘卷其後崔浩典史游雅髙允程駿李彪崔光李琰之世修其業浩為編年體彪始分作紀表志𫝊書猶未出世宗時命邢巒追撰髙祖起居注書至太和十四年又命崔鴻王遵業補續焉下訖肅宗事甚委悉濟陰王暉業撰辨宗室錄三十卷收於是與通直常侍房延祐司空司馬辛元植國子博士刁柔裴昂之尚書郎髙孝幹專總斟酌以成魏書辨定名稱隨條甄舉又搜採亡遺綴續後事備一代史籍表而上聞勒成一代大典凡十二紀九十二列傳合一百一十卷五年三月奏上之秋除梁州刺史收以志未成奏請終業許之十一月復奏十志天象四卷地形三卷律厯二卷禮樂四卷食貨一卷刑罰一卷靈徴二卷官氏二卷釋老一卷凡二十卷續於紀傳合一百三十卷分為十二帙其史三十五例二十五序九十四論前後二表一啓焉魏書卷一百四魏書卷一百四考證自序專總斟酌專監本誤𫝊今改從北史魏書卷一百四考證
