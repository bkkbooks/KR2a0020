body:
  text: 魏書卷一百七上齊魏收撰志第八律厯三上大聖通天地之至理極生民之能事體妙繫於神機作範留於器象然則制物成法故冥賾可尋推變有因而化生以驗昔黄帝採竹昆崘之隂聽鳳岐陽之下斷自然之物寫自然之音音既協矣黄鍾以立數既生矣氣亦徴之於是乎備數和聲審度嘉量權衡之用皆出於兹矣三古所共行百王不能易漢孝武置協律之官元帝時京房明六十律事為宻矣王莽世徴天下通鍾律之士劉歆總而條奏之最為該博故班固取以為志後漢待詔嚴崇頗為知律至其子宣不𫝊遂罷魏世杜夔亦以通樂制律晉中書監荀朂持夔律校練八音以謂後漢至魏尺長古尺四分有餘又得古玉律朂以新律命之謂其應合遂改晉調而散騎侍郎阮咸譏其聲髙永嘉以後中原䘮亂考正鍾律所未聞焉其存於夷裔聲器而已魏氏平諸僣偽頗獲古樂髙祖慮其永爽太和中詔中書監髙閭修正音律久未能定閭出為相州刺史十八年閭表曰書稱同律度量衡論語謹權量審法度此四者乃是王者之要務生民之所由四者何先以律為首豈不以取法之始求天地之氣故也孔子曰移風易俗莫尚於樂然則樂之所感其致遠矣今調音制樂非律無以克和然則律者樂之本也臣前被敇理樂與皇宗博士孫惠蔚大樂祭酒公孫崇等考周官國語及後漢律厯志案京房法作凖以定律吹律以調絲案律寸以孔竹八音之别事以粗舉書既三奏備在前文臣年垂七十日就衰頺恐一朝先犬馬竟無絲髪之益使律法長絶遺恨沒世是以慺悽惓惓不敢忘怠近在鄴見崇臣先以其聰敏精勤有挈瓶之智雖非經國之才頗長推考之術故臣舉以敎樂令依臣先共所論樂事自作鐘磬志議二卷器數為備可謂世不乏賢今崇徒敎樂童書學而已不恭樂事臣恐音律一曠精賞實難習業差怠轉乖本意今請使崇參知律吕鐘磬之事觸類而長之成益必深求持臣先所奏三表勘後漢律厯志陛下親覽以求厥衷俱然易了又著作郎韓顯宗博聞彊識頗有史才粗解音律亦求令時往參知臣雖在外官竊慕古人舉善之義愚意所及不能自己雖則越分志在補益願不以言廢人詔許之景明四年并州獲古銅權詔付崇以為鍾律之凖永平中崇更造新尺以一黍之長累為寸法尋太常卿劉芳受詔修樂以秬黍中者一黍之廣即為一分而中尉元匡以一黍之廣度黍二縫以取一分三家紛競久不能決太和十九年髙祖詔以一黍之廣用成分體九十黍之長以定銅尺有司奏從前詔而芳尺同髙祖所制故遂典修金石迄武定末未有諳律者厯者數之用探靈測化窮微極幽之術也所以上齊七政下授萬方自軒轅以還迄於三代推元革統厥事不一也秦世漢興厯同顓頊百有餘年始行三統後漢孝章世改從四分光和中易以乾象魏文時用韓翊所定至明帝行楊偉景初終於晉朝無所改作司天測象今古共情啓端歸餘為法不等協日正時俱有得失太祖天興初命太史令晁崇修渾儀以觀星象仍用景初厯歳年積久頗以為疎世祖平涼土得趙􅱿所修𤣥始厯後謂為宻以代景初真君中司徒崔浩爲五寅元厯未及施行浩誅遂寝髙祖太和中詔秘書鍾律郎上谷張明豫為太史令修綜厯事未成明豫物故遷洛仍歳南討而宫車宴駕世宗景明中詔太樂令公孫崇太樂令趙樊生等同共考驗正始四年冬崇表曰臣頃自太樂詳理金石及在秘省考步三光稽覽古今詳其得失然四序遷流五行變易帝王相踵必奉初元改正朔殊徽號服色觀于時變以應天道故易湯武革命治厯明時是以三五迭隆厯數各異伏惟皇魏紹天明命家有率土戎軒仍動未遑厯事因前魏景初厯術數差違不協晷度世祖應期輯寧諸夏仍命故司徒東郡公崔浩錯綜其數浩博渉淵通更修厯術兼著五行論是時故司空咸陽公髙允該覽羣籍賛明五緯并述洪範然浩等考察未及周宻髙宗踐阼乃用敦煌趙􅱿甲寅之厯然其星度稍為差逺臣輒鳩集異同研其損益更造新厯以甲寅為元考其盈縮晷象周宻又從約省起自景明因名景明厯然天道盈虚豈曰必協要須參候是非乃可施用太史令辛寶貴職司𤣥象頗閑秘數秘書監鄭道昭才學優贍識覽該宻長兼國子博士髙僧裕乃故司空允之孫世綜文業尚書祠部郎中宗景博涉經史前兼尚書郎中崔彬微曉法術請此數人在祕省參候而伺察晷度要在冬夏二至前後各五日然後乃可取驗臣區區之誠冀效萬分之一詔曰測度晷象考歩宜審可令太常卿芳率太學四門博士等依所啓者悉集詳察延昌四年冬侍中國子祭酒領著作郎崔光表曰易稱君子以治厯明時書云厯象日月星辰乃同律度量衡孔子陳後王之法曰謹權量審法度春秋舉先王之正時也履端於始又言天子有日官是以昔在軒轅容成作厯逮乎帝唐羲和察影皆所以審農時而重民事也太和十一年臣自博士遷著作忝司載述時舊鍾律郎張明豫推步厯法治己丑元草剙未備及遷中京轉為太史令未幾䘮亡所造致廢臣中修史景明初奏求奉車都尉領太史令趙樊生著作佐郎張洪給事中領太樂令公孫崇等造厯功未及訖而樊生又䘮洪出除涇州長史唯崇獨專其任暨永平初亦已略舉時洪府解停京又奏令重修前事更取太史令趙勝太廟令龎靈扶明豫子龍祥共集祕書與崇等詳驗推建宻厯然天道幽逺測步理深候觀遷延歳月滋久而崇及勝前後並䘮洪所造厯為甲午甲戍二元又除豫州司馬靈扶亦除蒲隂令洪至豫州續造甲子己亥二元唯龍祥在京獨修前事以皇魏運水徳為甲子元兼校書郎李業興本雖不預亦和造厯為戊子元三家之術並未申用故貞靜處士李謐私立厯法言合紀次求就其兄瑒追取與洪等所造遞相參考以知精麤臣以仰測晷度實難審正又求更取諸能算術兼解經義者前司徒司徒髙綽駙馬都尉盧道䖍前冀州鎮東長史祖瑩前并州秀才王延業謁者僕射常景等日集祕書與史官同檢疏宻并朝貴十五日一臨推驗得失擇其善者奏聞施用限至歳終但世代推移軌憲時改上元今古考凖或異故三代課步始卒各别臣職預其事而朽墮已甚既謝運籌之能彌愧意算之藝由是多歴年世兹業弗成公私負責俯仰慙􅌤靈太后令曰可如所請延昌四年冬太傅清河王懌司空尚書令任城王澄散騎常侍尚書僕射元暉侍中領軍江陽王繼奏天道至逺非人情可量厯數幽微豈以意輒度而議者紛紜競起端緒争指虚逺難可求衷自非建標凖影無以驗其真偽頃永平中雖有考察之利而不累歳窮究遂不知影之至否差失少多臣等參詳謂宜今年至日更立表木明伺晷度三載之中足知當否令是非有歸争者息競然後採其長者更議所從神龜初光復表曰春秋載天子有日官諸侯有日御又曰履端于始歸餘于終皆所以推二氣考五運成六位定七曜審八卦立三才正四序以授百官于朝萬民于野隂陽剛柔仁義之道罔不畢備繇是先代重之垂於典籍及史遷班固司馬彪著立書志所論備矣謹案厯之作也始自黄帝辛夘為元迄于大魏甲寅歴數千有餘代歴祀數千軌憲不等逺近殊術其消息盈虚覘歩疏宻莫得而識焉去延昌四年冬中堅将軍屯騎校尉張洪故太史令張明豫息盪寇將軍龍祥校書郎李業興等三家並上新厯各求申用臣學缺章程藝謝籌運而竊職觀閣謬忝厥司奏請廣訪諸儒更取通數兼通經義者及太史並集祕書與史官同驗疏宻并請宰輔羣官臨檢得失至於歳終宻者施用奉詔聽可時太傅太尉公清河王臣懌等以天道至逺非卒可量請立表候影期之三載乃採其長者更議所從又蒙敇許於是洪等與前鎮東府長史祖瑩等研窮其事爾來三年再厯寒暑積勤構思大功獲成謹案洪等三人前上之厯并駙馬都尉盧道虔前太極採材軍主衛洪顯殄寇将軍太史令胡榮及雍州沙門統道融司州河南人樊仲遵定州鉅鹿人張僧豫所上總合九家共成一厯元起壬子律始黄鍾考古合今謂為最宻昔漢武帝元封中治厯改年為太初即名太初厯魏文帝景初中治厯即名景初厯伏惟陛下道唯先天功邈稽古休符告徴靈蔡炳瑞壬子北方水之正位龜為水畜實符魏徳修母子應義當麟趾請定名為神龜厯今封以上呈乞付有司重加考議事可施用并藏祕府附於典志肅宗以厯就大赦改元因名正光厯班於天下其九家共修以龍祥業興為主壬子元以來至魯隱公元年歳在己未積十六萬六千五百七算外入甲申紀來至隱公元年己未積四萬五千三百七算外壬子元以來至今大魏正光三年歳在壬寅積十六萬七千七百五十算外壬子歳入甲申紀以來至今孝昌二年歳在丙午積四萬六千五百五十四算外從壬子元以來至今大魏孝昌三年歳次丁未積十六萬七千七百五十六算上壬子歳入甲寅紀以來至今大魏孝昌三年歳次丁未積四萬六千五百五十六算上章歳五百五古十九年七閏閏餘盡為章積至多年月盡之日月見東方日蝕先晦輒復變厯以同天象二百年多一日三百年多一日半晦朔失故先儒及緯文皆言二百年斗厯改憲候天減閏五百五年減閏餘一九千五百九十五年減一閏月則從僖公五年至今日蝕不失晦與二日合朔者多閏餘成月餘盡為章章閏一百八十六五百五年閏月之數其中減舊十九分之一章月六千二百四十六五百五年所有月之數并閏月蔀法六千六十十二章為一蔀至此年小餘成日為度法斗分一千四百七十七四分度法得一千五百一十五為古法今減三十八者從僖公五年以來減七日有竒謂為最近一百二十三歳減闕日減之太深是以三十餘年改徙四子也紀法六萬六百十蔀成紀大餘十也統法十二萬一千二百二紀成統大餘二十元法三十六萬三千六百三統成元大餘盡日法七萬四千九百五十二十二乗章月為日法章月一年之閏分周天分二百二十一萬三千三百七十七以度法通三百六十五度内斗分氣法二十四歳中十三年一十二次次有初中分二十四經月大餘二十九小餘三萬九千七百六十九日法除周天分得之日法者一蔀之月數周天分者一蔀之日數以用月除衆日得一月二十九及餘是周天分即為月通㑹數百七十三餘二萬三千二百八五月二十三分月之二十為一會以二十三乗五月内二十得一百三十五以乗周天分以二十三乗日法除之得一百七十三及餘㑹通一千二百九十八萬九千九百四以日法乗㑹數内㑹餘周日二十七餘四萬一千五百六十二以月一日行除周天得二十七日及餘通周二百六萬五千二百六十六日法乗周日二十七内周餘小周六千七百五十一月一日行十三度乗章歳内章閏也月周八萬一千一十二以十二乗小周即得與度同推月朔術第一推積月術曰置入紀年算外以章月乗之如章歳為積月不盡為閏餘閏餘滿三百一十九以上其歳有閏推朔積日術曰以通數乗積月為朔積分分滿日法為積日不盡為小餘六旬去積日不盡為大餘命以紀算外則所求年天正十一月朔日推上下弦望術曰加朔大餘七小餘二萬八千六百八十小分一小分滿四從小餘小餘滿日法從大餘一大餘滿六十去之即上弦日又加得望又加得下弦又加得後月朔推二十四氣術第二推二十四氣術曰置入紀年以來算外以餘數乗之為實以蔀法除之所得為積沒不盡為小餘以六旬去積沒不盡為大餘命以紀算外所求年天正十一月冬至日求次氣加大餘十五小餘一千三百二十四小分一小分滿氣法二十四從小餘一小餘滿蔀法從大餘一大餘滿六十去之命如上即次氣日推閏術曰以閏餘減章歳五百五