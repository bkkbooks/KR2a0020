不成度之分虚分九萬七千八百八十三經月二十九日外少此不滿三十日小分法二十四二十四氣除周天分之數也歳中十二十二月之中氣㑹數一百七十三月一出一入黄道之日數周髀六二十三分月之二十也㑹餘六萬七千一百一十七百七十二日外不成日之分㑹通三千六百一十四萬二千八百七以日法通百七十二内㑹餘之數㑹虚十四萬一千四百一十三㑹餘之外不成度之數周日二十七周天用日月行數周餘十一萬五千六百三十一周天用日外及本處周通五百七十四萬五千九百四十一日法通内十七内分周虚九萬二千八百九十九用餘外不成日之數小周七千五百一十三月一日行之數月周二十二萬五千三百九十通小周内度數朔望合數十四半經月日數度餘十五萬九千五百八十八半半經月日餘入交限數一百五十八度月出入黄道減半月之數度餘十一萬六千五十八半減半月小餘之外推月朔弦望術第一推積月術曰置入紀以來盡所求年减一以章月乗之章歳如一所得為積月不盡為閏餘閏餘三百五十五以上其年有閏餘五百一十五以上進退在天正十一月前後以冬至定之推積日術曰以通數乘積月為朔積分日法如一為積日不盡為小餘以六旬去積日不盡為大餘命大餘以紀今命以甲成紀算外即所求年天正十一月朔日求次月朔術曰加大餘二十九小餘十一萬六百四十七滿除如上命以紀算外即次月朔日其小餘滿虚分九萬七千八百八十三者其月大減者其月小求上下弦望術曰加朔大餘七小餘七萬九千七百九十四小分一小分滿四從小餘小餘滿日法從大餘大餘滿六十去之命以紀算即上弦日又加得望下弦後月朔推二十四氣閏術第二推二十四氣術曰置入紀以來盡所求年減一以餘數乗之蔀法如一為積沒不盡為小餘以六旬去積沒不盡為大餘命以紀算外即所求年天正十一月冬至日求次氣術術曰加大餘十五小餘三千六百八十四小分一小分滿小分法二十四從小餘小餘滿蔀法從大餘一命如止算外即次氣日推閏術曰以閏餘減章歳餘以歳中十二乗之滿章閏二百七得一月餘半法以上亦得一月數起天正十一月算外即閏月閏月有進即以無中氣定之推閏又法術曰以歳中乗閏餘加章閏得一盈章中六千七百四十四數起冬至算外中氣終閏月也盈中氣在朔若二日即前月閏冬至十一月中小寒十二月節大寒十二月中立春正月節雨水正月中驚蟄二月節春分二月中清明三月節穀雨三月中立夏四月節小滿四月中芒種五月節夏至五月中小暑六月節大暑六月中立秋七月節處暑七月中白露八月節秋分八月中寒露九月節霜降九月中立冬十月節小雪十月中大雪十一月節推合朔却去度表裏術第三推合朔却去交度術曰置入紀以來朔積分又以所入紀交㑹差分并之甲戍紀交㑹差分二千六百五十二萬二千六百四十九以㑹通去之所得為積交不盡者以日法約之為度不盡者為度餘即所求年天正十一月朔却去交度及餘度甲子紀紀首合朔日月合璧交中甲戍紀紀首合朔月在日道表交㑹差一百二十七度度餘三萬九千三百四十九甲申紀紀首合朔月在日道裏交㑹差八十一度度餘一萬一千五百六十一甲午紀紀首合朔月在日道裏度餘十九萬二千三百一十三甲辰紀紀首合朔月在日道表交㑹差一百六十二度度餘二萬三千一百二十二甲寅紀紀首合朔月在日道表交㑹差一百一十五度度餘二十萬三千八百七十四求次月却去交度術曰加度二十九度餘十萬六百四十七度餘滿日法從度度滿㑹數去之亦降其㑹餘即次月朔却去交度及度餘求望却去交度術曰加度十四度餘十五萬九千五百八十八半滿除如上即望却去交度及度餘推月在日道表裏術曰置入紀以來朔積分又以紀交㑹差分并之倍㑹通去之餘以㑹通減之得一減者為月在日道裏無所得者為月在日道表求次月表裏術曰加次月度及度餘加表滿㑹數及㑹數餘則在裏加裏滿㑹數及㑹餘則在表推交道所在日術曰以十一月朔却去交度及餘減㑹數及㑹餘㑹餘若不足減者減一度加日法乃減之又以十一月朔小餘加之滿日法從度餘為度餘即是天正十一月朔前去交度及餘如厯月大小除之起天正月十一月不滿月者為入月算外交道所在日又以歳中乗入月小餘日法除之所得命以子算即交道所在辰其交在望前者其月朔則交道望則月蝕交在望後者其月月蝕後朔交㑹交正在望者其月月蝕既前後朔交㑹交正朔者日蝕既前後月望皆月蝕求後交月及日術曰以㑹數及㑹餘加前入月算及餘餘滿日法從日日如厯月大小除之起前交月算外即後交月及日以次放之推交㑹起角術曰其月在外道先㑹後交者虧從東南角起先交後㑹者虧從西南角起其月在内道先㑹後交者虧從西北角起合交中者蝕之既其月蝕在日之衝起角亦如之推蝕分多少術曰其朔望去交度及度餘如入交限數一百五十八度度餘十一萬六千五十八半以上者以減㑹數及㑹數餘餘為不蝕度若朔望去交度如朔望合數十四度度餘十五萬九千五百八十八半以下者即是不餘度皆以減十五餘為餘蝕分朔望去交度盡者蝕之既推合朔月蝕入遲疾厯盈縮術第四推合朔入遲疾厯術曰置入紀以來朔積分又以所入紀遲疾差分并之甲戍紀遲差分二日三十五萬三千一百九十一以通周去之所得日餘周不盡者以日法約之為日不盡者為日餘命日算外即所求年天正月十一月合朔入厯日求次月入厯日術曰加一日日餘二十萬三千五百四十六日蝕滿日從日法日滿周日及周餘去之命如上算外即次月入厯日求望入厯術曰加日十四日餘十五萬九千五百八十八