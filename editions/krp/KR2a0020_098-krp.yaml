body:
  text: 魏書卷九十八齊魏收撰列傳第八十六島夷蕭道成島夷蕭衍島夷蕭道成字紹伯晋陵武進楚也僣晋時以武進之東城為蘭陵郡縣遂為蘭陵人父承之常隨宗人蕭思話征伐久乃得為其横野司馬以軍功仕劉義隆位至右軍将軍道成少好武事初從散冗毎充征役前後為討蠻小帥以堪勤劇見知思話之鎮襄陽啟之自隨任以綂戍稍遷左軍中兵參軍毎在疆場擾動邉民曾至談堤大敗而走劉駿時間闗偽職至建業令駿死子業以為後軍将軍直閤子業死劉彧除右軍将軍時子業江州刺史晋安王子勛會稽太守尋陽王子房等並舉兵彧加道成輔國将軍東討平定諸縣晋陵太守袁摽吳郡太守顧琛吳興太守王雲生皆棄郡奔走時徐州刺史薛安都遣從子索兒率鋭衆渡淮徴道成拒焉以功封西陽縣開國侯食邑六百户子勛遣臨川内史張淹自東嶠入規欲擾動三吳劉彧遣道成率三千人綂軍主沈思仁拒淹淹便奔走張永沈攸之大敗於彭城劉彧以道成為冠軍将軍督諸軍事假節戍淮隂彧死子昱以道成為右衛将軍領衛尉加兵五百人與尚書令袁粲䕶軍褚淵領軍劉勔參掌朝事尋解衛尉加侍中戍石頭城劉休範舉兵以討王道隆等為名治嚴數日便率大衆席卷而下道成等率衆拒戰事平以道成為散騎常侍中領軍都督南兗兗徐青冀五州鎮軍将軍南兗州刺史持節侯如故後進爵為公增邑二千户劉昱凶虐日甚道成與直閤王敬則昱左右楊玉夫同謀殺昱迎弟凖立之改年為昇明時太和元年也道成移鎮東城以甲仗五十人入殿進位侍中司空錄尚書事驃騎大将軍持節都督刺史如故封竟陵郡公五千户給班劍三十人又進督豫司二州荆州刺史沈攸之舉兵討道成道成率衆入鎮朝堂司徒袁粲先鎮石頭據城與尚書令劉秉前湘州刺史王藴謀討道成宻信要攸之速下將為内應不充粲與子最俱死秉父子踰城走於額檐湖王藴走向鬭場並見擒攸之至于夏口敗走與第三子中書郎太和单騎南奔華容縣俱自縊死道成又為太尉增封三千户班劔四十人甲仗百人入殿道成将有大志凖侍中王儉請閒勸之道成曰卿言何我今當依事相啟言辭雖厲而意色甚悦儉諷動在位乃加道成黃鉞都督中外諸軍事太傅領揚州牧劔履上殿入朝不趨賛拜不名置左右長史司馬從事中郎掾屬各四人使持節侍中太尉驃騎大将軍錄尚書南徐州刺史如故道成詐辭殊禮重申前命劔履上殿入朝不趨賛拜不名進位相國總百揆封十郡為齊公備九錫之禮加璽紱逺遊冠位至諸王上加相國緣綟綬其驃騎大将軍揚州牧南徐州刺史如故於是建齊臺置百官以東府為齊宫又增封十郡進公為王尋僣大號封其主劉凖為汝隂王未幾而死於是髙祖詔梁郡王嘉督二将出淮隂隴西公元操三将出廣陵河東公薛虎子三将出壽春以討之元操等攻其馬頭戍剋之道成遣其徐州刺史崔文仲攻䧟茬眉戍詔遣尚書游明根討之又遣平南将軍郎大檀三将出昫城將軍白吐頭二将出海西将軍元泰二将出漣口将軍封延三将出角城鎮南将軍賀羅出下蔡道成梁州刺史崔慧景遣長史裴叔保率衆冦武興闗城氐帥楊鼠擊破之叔保還南鄭梁郡王嘉破道成将盧紹之𤣥元度於昫山下蔡戍主棄城遁走又詔昌黎王馮熈為西道都督與征南将軍桓誕出義陽鎮南将軍賀羅自下蔡東出鍾離道成游擊将軍桓康於淮陽破之道成豫州刺史垣崇祖冦下蔡昌黎王馮熈擊破之梁郡王嘉大破道成将俘獲二萬餘口送京師道成遣後軍参軍車僧朗朝貢先是劉凖遣使殷靈誕茍昭先未反而道成僣立及僧朗至朝廷處之靈誕之下僧朗與靈誕競前後降人解奉君遂於朝會刄僧朗詔加殯斂送喪令還道成死子賾僣立改年為永明賾遣其驍騎将軍劉纘前将軍張謨朝貢八年又遣兼員外散騎常侍司馬憲兼員外散騎侍郎庾習朝獻九年遣輔國将軍劉纘通直郎裴昭明朝貢十年又遣昭明與冠軍参軍司馬廸之朝貢賾初為太子時特奢侈道成毎欲廢之賴王敬則和諧賾性貪惏常謂人曰唯崔慧景知我貧賾嘗至其益州刺史劉悛宅晝卧覺悛自捧金澡盤面廣三尺愛姬執金澡灌受四升以充沃盥因以奉獻賾納之其好利若此賾逰獵無度其殿中将軍邯郸起上表諌賾殺之十三年遣平南参軍顔幼明冗從僕射劉思效朝貢十四年賾巴東王子響殺長史劉寅司馬席恭穆謀殺賾賾遣丹陽尹蕭順之討殺之十五年二月遣員外散騎常侍裴昭明員外散騎侍郎謝竣朝貢九月又遣司徒参軍蕭琛范縝朝貢十六年復遣琛與司徒参軍范雲朝貢又遣車騎功曹庾蓽南豫州别駕何憲朝貢十七年賾雍州刺史王奐與南蠻長史劉興祖論衆罪賾以興祖付獄令送還建業奐輙於獄殺之而云自死賾怒遣其直閤将軍曹道剛梁州刺史曹虎等收奐奐閉門拒戰司馬黄瑶起於城内起兵攻奐殺之奐子祕書丞肅肅弟秉來降賾子長懋死立其孫南郡王昭業為太孫賾遇疾暫絶其子竟陵王子良在殿内昭業未入中書郎王融戎服於中書省閤口斷東宫仗不得進欲立子良賾既蘇昭業入殿融知子良不得立乃釋服還省賾死昭業立十數日收融付廷尉殺之昭業生而為其叔子良所養而矯情飾詐隂懐鄙慝與左右無賴羣小二十許人共衣食同卧起妻何氏擇其中美貌者與交通宻就富商大賈取錢無數既與子良同居未得肆意子良移西邸昭業獨住西州毎至昬夜輙開後閤與諸小人共至諸營署恣淫宴凡諸不逞皆迭加爵位許以南面之日便即施行皆疏官位名號於黃牋紙與之各各囊盛帶之肘後昭業師史仁祖侍書胡天翼聞之相與謀曰若言之二宫則其事未易若於營署為異人所毆打及為犬物所傷殘豈直罪止一身亦當盡室及禍年各已七十餘生寕足吝也數日仁祖天翼皆自殺昭業父長懋自患及死昭業侍奉憂哀號毁過禮及還私室與所親愛欣笑酣飲備諸甘滋葬畢立為皇太孫截壁為閤於母房内往何氏閒毎入輙彌時不出賾至東宫昭業迎拜號慟絶而後蘇賾自下輿抱持之寵愛隆重初昭業在西州令女巫楊氏禱祝速求天位及其父死謂由楊氏之力加倍敬信楊氏子珉亦有美貌何氏尤愛悦之昭業呼楊氏為婆劉氏以來民間亦作楊婆兒歌蓋為此也及在東宫賾有疾令楊氏日夕祈禱令賾早死與何氏書於紙中作一大喜字作小喜三十六字遶之賾謂其必能負荷大業謂曰五年已來一委宰相汝多厝意五年已後勿復委人臨死執昭業手曰阿奴若憶翁當好作如此者再而死子良時在中書省昭業疑畏使虎賁中郎将潘淑領百人屯太極殿西階以防之大斂之始呼賾伎人備舉衆樂諸伎雖畏威從事莫不哽咽流涕及成服悉遣諸王還第子良固乞留過賾葬不許昭業素好狗馬立未十日便毁賾所起招婉殿以殿材乞閹人徐龍駒造宅於其處為馬埓馳走墜馬面額並傷稱疾不出者數日多聚名鷹快犬以粱肉奉之賾将葬喪車未出端門昭業便稱疾還内裁入閤便於内奏胡伎鞞鐸之聲震響内外時司空王敬則問射聲校尉蕭坦之曰便如此不當忽忽邪坦之曰此政當是内人哭聲響徹耳自賾葬後昭業微服而出遊走里市又多往其父母陵隧中與羣小共作鄙藝擲塗賭跳放鷹走狗諸雜狡獪日日輙往以此為常朝事大小皆斷於尚書令蕭鸞初蕭賾聚錢上庫至五億萬齋庫亦出三億萬金銀布帛絲綿不可稱計至此歲末所用過半皆賜與左右厮卒之徒及至廢黜府庫空盡昭業在内常著紫綿紅繡雜衣或錦帽改年為隆昌以黄門郎周奉叔為冠軍将軍青州刺史奉叔諂䛕為事昭業甚悦之而專恣跋扈無所忌惮常從單刀二十口出入禁闥門衛莫敢訶止毎語人云周郎刀不識君徐龍駒自東宫齋師以便佞見寵搆造姦邪以取容媚凡諸鄙黷雜事皆龍駒所勸誘也昭業為龍駒置美女伎樂常住含章殿著黄綸帽被貂裘南面向案代昭業畫勑左右侍直與昭業不異蕭鸞固請誅之楊珉及母亦並下獄死珉及母為昭業所寵恩情特隆賞賜傾府藏珉為何氏所幸常居中内侍蕭鸞初令衛尉蕭諶征北諮議蕭坦之請誅珉何氏與昭業同席坐流涕覆面謂坦之曰楊郎好年少無罪何可枉殺坦之乃耳語於昭業曰此事别有一意不可令人聞昭業呼何氏曰阿奴暫起去坦之乃曰外間並云楊珉與皇后有情聞彰遐邇此事自古所無恐必誤官事昭業不得已乃許之俄勑原之已行刑矣益州刺史劉悛罷任還昭業以其饋奉不豐收付廷尉将加大辟悛弟中書郎繒乞以身代得不死禁錮終身昭業與其父寵姬霍氏淫通納之後宫蕭鸞謀廢之率衆而入時昭業裸身與霍氏相對聞兵至拔劍起拒鸞鸞自殺之左右死者十餘人鸞立其弟昭文自為使持節都督揚南徐二州驃騎大将軍開府錄尚書事揚州刺史加班劍三十人封宣城郡公二千户以兵五千人出鎮東城殺其鄱陽王鏘隨王子隆遣中䕶軍王元邈殺昭文南兗州刺史安陸王子敬豫州刺史王廣之殺江州刺史晋安王子懋又殺湘州刺史南平王鋭郢州刺史晋熈王銶南豫州刺史宣都王鑑鸞加黄鉞進授都督中外諸軍太傅領大将軍揚州牧增班劍四十人前後部羽葆鼓吹劍履上殿入朝不趨贊拜不名封宣城郡王食邑五千户使持節中書監錄尚書並如故又殺昭文桂陽王鑠衡陽王鈞江夏王鋒廬陵王子卿建安王子真巴陵王子倫乃廢昭文為海陵王尋死鸞僣立焉鸞字景栖其叔父道成寵愛之過於諸子蕭賾末為尚書左僕射甚親委之賾死遂秉朝政既殺昭業專權酷暴屠㓕賾等子孫既而自立時太和十八年也號年建武其宣徳太僕劉朗之游擊将軍劉璩之坐不贍給兄子致使隨母他嫁免官禁錮時論者謂薄義之由實自鸞始鸞雍州刺史曹虎據襄陽請降髙祖詔行征南将軍薛真度督四将出襄陽大将軍劉昶出義陽徐州刺史元衍出鍾離平南将軍劉藻出南鄭車駕南伐十九年鸞龍陽縣開國侯王朗自渦陽來降左将軍元麗大破鸞将擒其寧州刺史董蠻車駕濟淮幸八公山巡淮而東發鍾離将臨江水司徒馮誕薨乃詔班師遣使臨江數鸞罪惡鸞殺其西陽王子明南海王子罕邵陵王子真二十一年車駕討鸞鸞前将軍韓李萬弋陽太守王嗣之後将軍趙祖悦等十五将來降大破鸞軍於江北獲其将軍王伏保等車駕遂巡沔東而還鸞将王曇紛等萬餘人冦南青州黄郭戍主崔僧淵擊破之悉虜其衆又剋新野城斬鸞輔國将軍新野太守劉忌鸞湖陽戍主蔡道福赭陽戍主成公期及軍主胡松舞隂戍主輔國将軍西汝南北義陽二郡太守黄瑶起及直閤将軍軍主鮑舉南鄉太守席謙並委戍走擒瑶起鮑舉鸞又殺其河東王鉉臨賀王子岳西陽王子文衡陽王子珉湘東王子建南郡王子夏巴陵王昭秀桂陽王昭粲車駕幸南陽進攻宛北城拔之冠軍将軍南陽太守房伯玉以城降又大敗鸞平北将軍崔慧景黄門郎蕭衍於鄧城斬獲首虜二萬有餘鸞憂怖遂疾甚乃大赦改年為永泰其大司馬王敬則於會稽舉兵將以誅鸞鎮北諮議謝朓敬則女夫也告之敬則敗而死鸞死子寳卷僣立二十三年春寳卷改元為永元遣其太尉陳顯達率崔慧景攻馬圈城詔前将軍元英討之寳卷遣将寇順陽詔振威将軍慕容平城率騎討之顯達攻䧟馬圈城車駕南伐詔鎮南大將軍廣陽王嘉斷均口顯達戰敗潰圍夜走斬其左軍将軍張子順賊将蔡道福成公期等數萬人棄順陽遁走寳卷昬狂政出羣豎其始安王遥光據東府反不充見殺並殺其右僕射蕭坦之左衛將軍曹虎領軍将軍劉暄尋殺司空徐孝嗣左僕射沈文季前撫軍長史沈昭略其太尉江州刺史陳顯達舉兵襲建業不果而死景明初寳卷豫州刺史裴叔業以壽陽降寳卷遣其衛尉蕭懿為征虜将軍豫州刺史歩道伐壽陽頓軍小峴詔遣軍司李煥及綂軍奚康生楊大眼等率衆入壽陽驃騎大将軍彭城王勰車騎将軍王肅率歩騎十萬赴之寳卷遣将胡松李居士率衆萬餘屯死虎陳伯之水軍泝淮而上以逼壽春勰肅大破之斬首萬數陳伯之又冦淮南勰破之肥口豫州刺史田益宗破寳卷将呉子陽劉元超於長風寳卷遣侍中崔慧景率諸軍自廣陵水路欲赴壽陽慧景見寳卷狂虐不復自保及得專征欣然即路慧景子覺時為直閤與之宻期慧景至廣陵覺遂出奔慧景過廣陵數十里便回軍還時廣陵闕鎮司馬崔恭納之因率衆濟江遂攻建業寳卷嬰城自守寳卷豫州刺史蕭懿擊破慧景擒殺之慧景既死寳卷便自得志無所忌惮日日出遊愛幸茹法珍梅虫兒等及左右應勑捉御刀之徒並專國命民間謂之刀勑寳卷毎常輕騎戎服往此諸家與之讌飲此等毎有吉凶寳卷輙往弔慶不欲令人見之驅斥百姓惟置空宅而已所往之處既無定所官司常慮得罪東行驅西面人南出驅北面人旦或應出夜便驅遣吏司奔馳呌呼盈路老少震驚啼號塞路處處禁斷不知所適疾患困篤者悉輿去之其有無人輿者匍匐道側主司又加捶打絶命者相繼還宫之時常至半夜左右輙入富室取物蕩盡前魏興太守王敬賓新死未斂家人被驅不得守視及家人還䑕食敬賓两眼都盡如此者非一寳卷酷亂逾甚其尚書令蕭懿雖有大勲忌而殺之並殺其弟衛尉卿蕭暢世宗詔冠軍将軍南豫州刺史席法友三萬人圍寳卷輔國将軍北新安豐二郡太守胡景略於建安城剋之擒景略寳卷雍州刺史蕭衍據㐮陽舉兵伐之荆州行事蕭頴胄應衍三月頴胄叛寳卷以南康王寳融為天子於是寳融僣即帝位頴胄為侍中尚書令衍為左僕射都督征討諸軍征東大将軍使持節如故頴胄請封寳卷為虞陽縣侯寳融不許又封涪陵王頴胄監八州諸軍事行荆州刺史假衍黄鉞蕭衍軍至沔口郢州嬰城自守寳卷又殺巴陵王昭胄永新侯昭秀黃門郎蕭寅寳卷昬暴日甚内外不堪其前南譙太守王靈秀等於石頭迎寳卷弟寳夤率城内文武向其臺城百姓空手隨從者萬數會日暮城門閉不剋衍兵至建業所在棄寳卷降之衍兵入宫寳卷在含徳殿吹笙歌作女兒子卧未及睡聞兵入趨出北户欲還後宫清曜閣已閉閹人禁防黄泰平刀傷其膝仆地顧曰奴反也直後張齊斬首送衍衍追封東昏侯廢其皇后太子為庶人衍殺寳卷弟湘東王寳晊衍又殺邵陵王寳攸晋熈王寳松桂陽王寳貞其建安王寳夤來奔尋逼寳融禪位於已封為巴陵王宫于姑孰寳融尋暴死島夷蕭衍字叔達亦晋陵武進楚也父順之蕭賾光祿大夫衍少輕薄有口辯歴王儉衛軍府戸曹屬累遷為蕭鸞黄門侍郎太子中庶子太和二十二年髙祖南伐詔諸軍圍㐮陽衍時率衆來援為武衛將軍宇文福所破单騎走免蕭鸞末出為輔國将軍雍州刺史鸞死子寳卷立殺衍兄懿遣巴西梓潼二郡太守劉山陽西上聲云之郡實令襲衍山陽至荆州為蕭頴胄所殺景明二年衍乃與頴胄推寳卷弟荆州刺史寳融為主號年中興舉兵伐寳卷其年十二月剋建業殺寳卷及其妻子衍為大司馬錄尚書事揚州刺史建安郡公邑萬户三年又自為相國揚州牧封十郡為梁王衍尋僣立自稱曰梁號年天監五月揚州小峴戍主党法宗襲衍大峴戍破之擒其龍􅋮将軍邾菩薩送京師衍又遣将張囂冦揚州州軍擊破之斬二千餘級四年三月揚州刺史任城王澄遣長風戍主竒道顯攻衍隂山戍破之斬其龍驤将軍都亭侯梅興祖仍攻白藳戍又破之斬其寧朔将軍呉道爽等獲數千級衍又遣其徐州長史潘伯憐屯軍淮陵徐州刺史司馬明素又據九山澄遣軍並擊破之斬伯憐擒明素衍将吳子陽冦白沙中山王英大破之擒斬千數衍梁州刺史平陽縣開國侯翟逺徐州刺史永昌縣開國侯陳虎牙來降正始元年正月衍将趙祖悦屯據東闗江州刺史陳伯之擊破之二月衍将姜慶真襲䧟壽春外郭州軍擊走之中山王英圍衍鍾離衍遣冠軍張惠紹率衆軍送糧於鍾離任城王澄遣綂軍王足劉思祖邀擊於邵陽大破之生擒惠紹並其驍騎将軍祁陽縣開國男趙景悦等十将斬獲數千級惠紹衍舅子也衍乃移書求之朝議欲示威懐遂聽惠紹等還三月元英破衍将王僧炳於樊城八月英又攻衍義陽充之破衍将馬仙琕擒其冠軍将軍蔡靈恩等十餘将九月衍霍州刺史田道隆義州刺史張宗之遣使内附十二月衍梁秦二州行事夏侯道遷據漢中内附詔尚書邢巒率衆赴之二年四月巒頻破衍軍遂入劍閣執其輔國将軍范始男送京師巒又遣綂軍王足破衍諸将斬其輔國将軍馮文豪等六月衍遣将王超宗冦邉揚州刺史薛真度大破之俘斬三千級七月王足又大破衍衆斬其秦梁二州刺史魯方達王明達等三十餘将俘虜二千五百人九月衍湘州刺史揚公則率衆冦壽春揚州刺史元嵩擊破之斬獲數千級三年正月衍徐州刺史昌義之冦梁城江州刺史王茂先冦荆州屯河南城平南將軍陳伯之擊義之平南將軍楊大眼擊茂先並大破之斬其輔國将軍王花俘斬二千茂先逃潰追奔至於漢水拔其五城将軍宇文福略衍司州俘獲千餘口而還五月衍将蕭昞冦淮陽張惠紹冦宿豫蕭宻冦梁城韋叡冦合肥平南将軍奚康生破惠紹斬其徐州刺史宋黒七月衍徐州刺史王伯敖入冦隂陵中山王英大破之斬将二十五人首虜五千衍又遣将桓和屯孤山冠軍将軍桓方慶屯固城龍􅋮将軍矯道儀屯蒙山八月安東将軍邢巒擊桓和破之将軍元常攻克固城綂軍畢祖朽攻克蒙山斬獲及赴沂水死者四千有餘衍又遣張惠紹屯宿豫蕭昞屯淮陽九月都督邢巒大破之斬其大将藍懐恭等三十餘人惠紹蕭昞並棄戍南去追斬數萬級衍中軍大將軍臨川王蕭宻右僕射桞惔徐州刺史昌義之等屯據梁城中山王英大破之宻等棄城㳂淮東走追奔至於馬頭衍冠軍將軍馬頭戍主朱思逺棄城走擒衍將三十餘人斬獲五萬有餘十月衍征虜将軍馬仙琕率衆三萬冦義陽郢州刺史婁悦以州軍擊走之永平元年十月懸瓠城民白早生據州反叛衍遣将齊茍仁等四將以助之詔尚書邢巒率騎討之巒攻克懸瓠斬早生擒茍仁俘衍衆三千餘人初早生之反也世宗遣主書董紹銜詔宣慰紹為早生所執送之於衍衍乃厚資遣紹令奉書朝廷請割宿豫内屬以求和好時朝議或有異同世宗以衍辭雖欵順而不稱藩詔有司不許十二月衍寧朔將軍張凝等率衆冦楚城中山王英破擒之衍将馬仙琕據金山郢州刺史婁悦擊走之二年正月中山王英攻克衍長薄戍殺傷數萬仍攻拔武陽闗擒衍雲騎将軍松滋縣開國侯馬廣冠軍将軍遷陵縣開國子彭瓮驍騎将軍當陽縣開國伯徐元秀等二十六将俘獲七千餘人又進攻黄峴西闗衍将軍馬仙琕棄西闗李元履棄黃峴遁走四年春三月衍琅邪郡民王萬壽等斬衍輔國将軍琅邪東莞二郡太守帶朐山戍主劉晣並将士四十餘人以城内屬徐州刺史盧昶遣兼郯城戍副張天惠率衆赴之而衍郁洲已遣二軍以拒天惠天惠與萬壽等内外齊擊俘斬數百昶仍遣琅邪戍主𫝊文驥入城據守衍又遣将張稷馬仙琕等攻圍文驥詔昶率衆赴之而文驥以糧盡降衍昶遂失利而還延昌二年二月郁洲徐元明斬送衍鎮北将軍青冀二州刺史張稷首以州内附三年六月衍遣衆冦九山荆州刺史桓叔興大破之斬其虎旅将軍蔡令孫冠軍将軍席世興貞義將軍藍次孫四年二月衍寧州刺史任太洪率衆冦闗城益州長史成興孫擊破之熈平元年正月衍遣其恒農太守王定世等冦邉都督元志破之斬定世悉俘其衆衍豫州刺史趙祖悦率衆數萬偷據硤石詔鎮南将軍崔亮鎮軍将軍李平討充之斬祖悦𫝊首京師衍衡州刺史張齊冦益州刺史傅豎眼討之斬其將任太洪齊遁走初衍每欲稱兵境上闚伺邉隙常為諸將摧破雖懐進趣之計而勢力不從遂於浮山堰淮規為壽春之害肅宗詔征南蕭寳夤率諸将討之大破衍衆於淮北秋九月堰自潰决漂其緣淮城戍居民村落十餘萬口流入於海正光元年衍改稱普通至三年其弟子西豐侯正徳棄衍來奔尋復亡歸衍初忿之改其姓為背氏既而復焉封為臨賀王五年九月衍将裴邃虞鴻襲據壽春外郭刺史長孫稚擊走之孝昌元年正月徐州刺史元法僧據城南叛衍遣豫章王綜鎮彭城綜蕭寳卷之遺腹子也初衍平建業因納其母吳氏吳氏先有孕後生綜衍謂為已子甚寵愛之綜既長母宻告綜綜遂潜圖叛衍既鎮彭城及大軍往討綜乃拔身來奔餘将退走國軍追躡所獲萬計衍初聞之慟哭氣絶甚為慙惋猶云其子言其病風所致時人咸笑之三月衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入冦直城梁州刺史傅豎眼遣息敬紹率衆大敗之擒斬三千人休儒等遁走四月衍益州刺史蕭潤猷遣将樊文熾等率衆圍小劍戍益州刺史邴虬遣子子達行臺魏子建遣别将淳于誕拒擊之五月誕等大破文熾俘斬二萬擒其次将蕭世隆等十二人文熾走免是歲衍又改年為大通二年七月衍将元樹湛僧珍等冦壽春又攻逼新野詔都督魏承祖討破之三年二月衍将成景儁冦彭城行臺崔孝芬率諸将擊走之建義元年衍遣其将曹義宗冦荆州大都督費穆大破之生擒義宗檻送京師初爾朱榮入洛北海王顥奔於衍衍以顥為魏主資顥士馬令其大将陳慶之部率送顥永安二年夏遂入洛陽車駕還討破走之唯慶之一身走免自餘部衆皆見俘執閏月巴州刺史嚴始欣據州入衍衍遣将蕭玩張鴻等率衆赴援都督元景夏率益梁二州軍討之三年正月斬始欣衍衆敗走又斬蕭玩等首俘獲萬餘人普泰元年春南青州刺史茹懐朗遣部将何寳率歩騎三千擊衍守将於琅邪擒其雲麾将軍徐兗二州刺史沈預斬其宣猛将軍齊州刺史劉相如永熈元年夏衍遣其鄴王元樹及譙州刺史朱文開入據譙城東南道行臺樊子鵠率諸軍攻克之擒元樹文開等送於京師天平元年十月衍雄信将軍紀耕率衆入冦􅀈嵣都督曹仲尼破走之斬其軍主沈達閔荘等二年正月衍将湛僧珍冦南兗州州軍擊破之行臺元晏又破湛僧珍等於項城虜其闕二字刺史楊㬓二月衍司州刺史陳慶之郢州刺史田朴特等冦邉豫州刺史堯雄擊走之五月衍仁州刺史黄道始冦北濟隂徐州刺史任祥討破之十月衍将梁秉儁冦單父祥又大敗之俘斬萬餘人十一月衍雍州刺史蕭恭遣将栁仲禮冦荆州刺史王元軌破之於牛飲斬其将張殖王世興是年衍又改號為中大通三年五月豫州刺史堯雄攻衍白茍堆鎮克之擒其北平太守茍元曠十月行臺侯景攻䧟衍楚城獲其楚州刺史桓和兄弟四年九月衍青冀二州刺史徐子彦冦圉城南青州刺史陸景元擊走之先是益州刺史傅和以城降衍衍資送和令申意於齊獻武王求通交好王志綏邉逺乃請許之四年冬衍遣其散騎常侍張臯通直常侍劉孝儀通直常侍崔曉朝貢二年夏又遣散騎常侍沈山卿通直常侍劉研朝貢興和二年春又遣散騎常侍桞豹通直常侍劉景彦朝貢其年冬又遣散騎常侍陸晏子通直常侍沈景徽朝貢是年衍改號大同三年夏又遣散騎常侍明少遐通直郎謝藻朝貢四年春又遣散騎常侍袁狎通直常侍賀文發朝貢其年冬又遣散騎常侍劉孝勝通直常侍謝景朝貢武定元年夏又遣散騎常侍沈衆通直常侍殷徳卿朝貢其年冬又遣散騎常侍蕭確通直常侍陸𬗟朝貢三年秋又遣散騎常侍徐君房通直常侍庾信朝貢四年夏又遣散騎常侍蕭瑳通直常侍賀徳瑒朝貢五年春又遣散騎常侍謝蘭通直常侍鮑至朝貢朝廷亦遣使報之十餘年間南境寧息六年衍又改號為中大同其年又改為太清是歲司徒侯景反遣使通衍請其拯援衍惑景遊説遂絶貢使衍子綱及朝臣並切諌以為不可衍不從乃遣其兄子豫州刺史貞陽侯淵明北兗州刺史胡貴孫等冦逼徐州與侯景為聲援仍堰泗水以灌彭城齊文㐮王遣行臺慕容紹宗儀同三司髙岳潘相樂等率衆討之紹宗檄衍境内曰夫乾坤交泰明聖興作有冥運行之力俱盡變化之途抱識含靈融然並至呈形賦命混而同往所以𤣥功潜運至徳旁通百姓日用而不知萬國受賜而無迹豈徒鑿其耳目易其心慮悟以風雲一其文軌使夫日月之照不私雨露之施均洽運諸仁壽之域納於福祿之林自晋政多僻金衍淪蕩中原作戰鬬之塲生民為鳥獸之餌則我皇魏握𤣥帝之圖納水靈之祉駕雲車而自北䇿龍御以圖南致符上帝援溺下土怪物殛死淫水不作運神噐於顧眄定寳命於踟蹰恢之以武功振之以文徳字内反可封之俗員首識堯舜之心沙海荒忽之外瀚漠羈縻之表方志所不𫝊荒經所不綴莫不䋲谷釣山依風託水共仰中國之聖同欣大道之行唯夫三吳百越獨阻聲教匪民之咎責有由焉自偽晋之後劉蕭作慝擅僣一隅號令自已惟我祖宗馭宇爱民重戰未極謀臣之畫不窮節将之兵聊遣行人降以尺一圓臺已築黄屋輙去賜其几杖置之度外蕭衍輕險有素士操蔑聞睥睨君親自少而長好亂樂禍惡直醜正巧用其短以少為多詃惑愚淺大言以驚俗驅扇邪僻口兵以作威曲體脅肩摇脣鼓舌候當朝之顧指邀在位之餘論遂汙辱冠帶偷竊藩維及寳卷昬狂下不堪命曾無北面有犯之節遽㓕人倫在三之禮憑妖假怪鬼語神言稱兵指闕傾朝鴆主陵虐孤寡聾愚士民天不悔禍姦醜得志内恣彫靡外逞殘賊驅羸國之兵迫糊口之衆南出五嶺北防九江屯戍不解役無寧歲死亡矢刃之下夭折霧露之中哭泣者無已傷痍者不絶託身人上忽下如草遂使頑嚚子弟肆行淫虐狡猾羣小縱極貪惏剝割蒼生肌肉略盡刳剔黔首骨髓俱罄猛虎未方其害餓狼詎侔其禍惵惵周餘救死無地至於矯情飾詐事非一緒毒螫滿懐妄敦戒業躁競盈胸謬治清静至乃大興寺塔廣繕臺堂昭陽到景垂珠銜璧峥嶸刻削千門萬户鞭撻疲民盡其筋骨延壌運石悲歌掩途死而可祈甘同仙化智淺謀疎曾不自揆遏桐栢之流翻為已害子亡齊之𦙍忽為戌首書契迄兹罕聞其事至於廢捐冡嫡崇樹愚子明黨路開彼我側目疾視扼腕十室而九翹足有待良亦多人二紀於兹王家多故始則車馳之警終有驚墜之哀神祗痛憤寓縣崩震於是故相國齊獻武髙王感天壌之惨黷激雲雷以慨然仗髙義而率民奮大節以成務爰有匡國定霸之圖非直討賊雪恥之舉於是叡略紛紜靈武冠世盪滌逋孽尊主康邦皇上秉歴受圖天臨日鏡道隨𤣥運徳與神行既而元首懐舞戚之風上宰薄兵車之㑹遂解縶南冠喻以好睦舟車遵溯川陸光華亭徼相望欣然自泰反肉還童不待羊陸雖嘉謀長算爰自我始罷戰息民兩獲其泰王者之信明如四時豈或為人君父二三其徳書而不法可不惜哉侯景一介役夫出自凡賤身名淪没無或可紀直以趨馳便習見爱尒朱小人叨竊遂忝名位及中興之際義旗四指元惡不赦實在羣胡景荷人成拔籍其股肱主人有丹頸之期所天蹈族㓕之釁雖不能蔽捍左右以命酬恩猶當惨顔後至義形於色而趣利改圖速如覆手投身麾下甘為僕𨽻獻武王棄其瑕穢錄其小誠得厠五命之末預在一隊之後参跡驅馳庶其來効長鞭利鎩術以制之既闗隴逋誅毎事經略以河南空虚之地非兵戰之衝薄存掎角聊示旗鼔豈資實效寄以遊聲軍機催勒盖唯景任總兵綂旅别有司存而愚褊有積憍愎遂甚犯違軍紀仍自猜貳禍心潜搆翻為亂階負恩棄徳罔恤天討不義不昵厚而必顛委慈母如脱屣棄少弟如遺土羣子陸陸妻姪成行慕姜兒之爽言蔑伯春之宛轉跳梁猖蹶夫欲誰欺比之梟獍異類同醜欲擬虵䑕顧匪其倫及逺託闗右委命冦逆寳炬定君臣之分黑獺結兄弟之親授以名噐之尊救其重圍之死憑人繫援假人鼻息俄而忘恩背惠親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流禦之地甘辭卑體進熟圖身詭言浮説抑可知矣叛豎救命豈将擇音偽朝大夫幸災忘義主耄於上臣蔽於下逐雀去草曾不是圖竊寳叛邑椒蘭比好人而無禮其能國乎夫安危有大勢成敗有恒兆不假離朱之目不藉子野之聽聊陳刺心之説且吐伐謀之言今帝道休明皇猷允塞四民樂業百靈效祉雖上相云亡而伊陟繼事秉文經武虎視龍驤驅日下之俊雄收一世之英鋭擊刺猶雷電合戰如風雨控弦躍馬固敵是求蠕蠕昔遭離亂輻分瓦裂匹馬孤征告困於我國家深敦隣附愍其入懐盡憂人之禮極繼絶之義保衛出於故地資給唯其多少存其已亡之業成其莫大之基深仁厚徳鏤其骨髓引領思報義如手足吐谷渾深執忠孝膠漆不渝萬里仰徳奏款屬路並申以婚好行李如歸蠕蠕境斜界黄河望通豳夏飛雪千里層氷洞積北風轉勁實䈥角之時沍寒方猛正氈裘之利吐谷渾疾彼凶逆彊兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方侯隙企其移踵加以獨孤如願擁衆秦中治兵劫愶黒獺北備西擬内營腹心救首救尾疲於奔命豈暇稱兵東指出師函谷且秋風揚塵國有恒防闗河形勝之際山川襟帶之所猛将精兵基跱岳立又寳炬河隂之北黒獺亡山之走衆無一旅僅以身歸就其不顧根本輕懐進趣斯則一勞永逸天賛我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虚誕夫景䋲樞席牖之子阡陌鄙俚之夫遭風塵之會逄馳騖之日遂位在三吏邑啟千社揣身量分久當止足而乃周章去就離跂不已夫豈徒爾事可㩁揚度其衆叛親離守死不暇乃聞将棄懸瓠逺赴彭城老賊姦謀復将作矣固揚聲赴助計在圖襲吞淵明之衆招厭虐之民舉長淮以為斷仍鵄張歲月南面假名死而後已此盖蜯鷸之禍我承其弊且偽主昬悖不惟善隣賊忍之心老而彌篤納逋叛之詭譎蔑信義以猖狂天喪其神人重其怨将踐𤓰圃之蹤且追兒侯之轍今徴發犬羊侵軼徐部築壘擁川覬覦小利此而可忍孰不可懐兵凶戰危出不得已謬奉朝規肅兹九伐扛鼎拔樹之衆超乗投石之旅練甲爭途波聚霧合虎班龍文之逸蘭池蒲梢之駔嘘天陸野躡影追風振旅南轅長驅討䠞非直三吳䑕面一麾魚駭乗此而往青蓋将歸且衍虐網蚩兵權在外持險躁之風俗兼輕薄之子孫蕭綸兇狡之魁豈無商臣之佷蕭譽失志之憤當召專諸之客外崩中潰今也其時幕府師行以禮兵動以義弔民伐罪理有存焉其有知機審變翻然鵲起立功立事去危就安賞典未忘事必加等若軍威所至敢有拒違尺兒已上咸從梟戮今三禮四義之将豹虎熊羆之士深銜逋偽信納叛亡違卜愎諌實興伐役莫不含怒作色如赴私讐茹肝渉血義不旋踵攻戰之日事若有神莾積麻亂匪旦伊夕以彼曲師危卒望我軍鋒何異蛣蜣被甲蝍蛆舉尾正恐旗鼓一接芝藋俱摧先事喻懐備知翰墨王侯無種禍福由人斯盖丈夫肉食之秋壮士封侯之㑹冬氷可折時不再來凡百君子勉求多福檄之所到咸共申省知我國行師之意冬十二月紹宗髙岳等大破衍衆寒山擒淵明貴孫等俘斬五萬其凍溺燒之而死不可勝數衍既慙悔六年復遣使羊珍孫欵闗乞和並修弔書於齊文襄王文㐮王欲以威徳懐之許其通而不復其書衍於是遣其散騎常侍謝班通直常侍徐陵詣闕朝貢班等未及還而侯景舉兵襲衍宻與衍弟子臨賀王正徳交通許推為主景至横江衍令正徳率軍拒景正徳因而迎之景濟江立以為主以趣建業衍好人佞己末年尤甚或有云國家彊盛者即便忿怒有云朝廷衰弱者因致喜悦是以其朝臣左右皆承其風㫖莫敢正言初景之将渡江也衍沿道軍戍皆有啟列而中領軍朱异恐忤衍意且謂景不能渡遂不為聞景至嵫湖方大驚駭乃令其太子綱守中書省軍事悉以委之又逼居民入城百姓因相剝掠不可禁止衍令直從監俞景茂赦二冶尚方錢署罪人及建康廷尉諸囚欲押令入城以充防捍諸徒囚放火燒冶一時散走衍憂懣無計唯令其王公已下分屯諸門攝諸寺藏錢皆入聚徳陽堂以充軍實景既至便圍其城縱火燒爇掘長圍築土山以攻衍衍亦於城内起山以應之衍令文武運土人責二十石於是其王侯朝貢皆自負檐蕭綱亦欲自負僉議以為太示迫屈乃止衍毎募人出戰素無號令初或蹔勝後必奔背景宣言曰城中非無菜但無醬耳以戲侮之衍太官及軍人無柴乃𤼵取尚書省武庫左右藏以充用衍州鎮外援雖有至者而景圍柵深固内外斷絶衍數募人出戰常為景所執獲有一小兒請以飛鵄𫝊致消息綱乃作數千丈䋲綴紙鵄於䋲端縛書其背又題鵄口若有得鵄送援軍者賞銀百两綱出太極殿因西北風而颺之頻放數鵄景令走馬射取之竟不能達也衍城内大饑人相食米一斗八十萬皆以人肉雜牛馬而賣之軍人共於徳陽堂前立市屠一牛得絹三千匹賣一狗得錢二十萬皆燻䑕捕雀而食之至是雀䑕皆盡死者相枕初有盗取其池魚者衍猶大怒勑付廷尉既而宿昔都盡其不識事宜如此景久攻未拔而衍外援雖多各各乖張無有總制更相妬忌不肯奮擊唯衍子邵陵王綸再於鍾山决戰戰敗而走景糧既少遂譎衍求和衍信之乃割江西四州授景封為夀陽王遣其朝貢與部下歃血盟訖景詐引軍還石頭衍乃勑援軍令下諸軍初不受詔後重勑乃從衍又令援軍以船三百艘給景景猶嫌其少又勅付二百衍永安侯蕭確直閤将軍趙威方頗有勇略為景所憚景乃謂衍曰確與威方頻隔岓見罵云天子自與汝和我終不置汝我今便不敢去若召此二人入城者吾當解圍衍復遣使徴確等確等不從衍又為手書與諸軍云確若不入者宜以軍法送之確等不得已乃赴衍景復謂衍曰始有西信至北軍已克夀春鍾離我今便無委足處求權借廣陵譙州待征復两城還以此州相歸衍又許之景外云欲和伺其懈怠衍君臣上下信景欺詐所有戰具悉皆收去後知非實更狼狽設備有甚於初城轉危急衍等計窮乃復遣使詣景景又詭云今時既熱便不能得去正當乞留京師為朝廷立效耳而悉力大攻七年三月遂拔之景自至建業縱軍士前後虜掠倉庫所有皆掃地盡矣景乃從數百騎見衍􅒣欷流涕因請香火為作義兒還以衍為主令正徳通啟云前為景所擒使攝四海辭不獲免權總萬機今景既入輔乞解僣濫以王還邸自景圍建業城中多有腫病死者相繼無復板木乃刳柱為棺自雲龍神虎門外横屍重沓血汁漂流無復行路及景入城悉聚尸焚之煙氣張天臭聞數十里初城中男女十餘萬人及䧟存者纔二三千人又皆帶疾病盖天亡之也衍尋為景所餓殺自衍為景攻圍歴百餘日衍子荆州刺史湘東王繹益州刺史武陵王紀各擁兵自守坐看衍之懸危竟不奔赴始景渡江至䧟城之後江南之民及衍王侯妃主世胄子弟為景軍人所掠或自相賣鬻漂流入國者盖以數十萬口加以饑饉死亡所在塗地江左遂為丘墟矣初衍崇信佛道於建業起同泰寺又於故宅立光宅寺於鍾山立大愛敬寺兼營長干二寺皆窮工極巧殚竭財力百姓苦之曾設齋㑹自以身施同泰寺為奴其朝臣三表不許於是内外百官共斂珍寳而贖之衍毎禮佛捨其法服著乾陁袈裟令其王侯子弟皆受佛誡有事佛精苦者輙加以菩薩之號其臣下奏表上書亦稱衍為皇帝菩薩衍所部刺史郡守初至官者皆責其上禮獻物多者便云稱職所貢微少言為弱惰故其牧守在官皆競事聚歛劫剝細民以自封殖多妓妾粱肉金綺百姓怨苦咸不聊生又發召兵士皆湏鏁械不爾便即逃散其王侯貴人奢媱無度弟兄子姪侍妾或及千數至乃回相贈遺其風俗頽䘮綱維不舉若此衍自以持戒乃至祭其祖禰不設牢牲時人皆竊云雖僣司王者然其宗廟實不血食矣衍未敗前災其同泰寺衍祖父墓前石麟一旦亡失識者咸知其将㓕也景又立衍子綱尋復殺之親屬並見屠害矣史臣曰二蕭競塗泥之中同蝸角之戰或年纔三紀或身不獲終而偷名江徼自擬王者考之邃古所未前聞昔句踐致貢而延世夫差争長而後死两冦方之呉越不乃劣乎魏書卷九十八魏書卷九十八考證蕭衍傳是歲衍又改年為大通歴代甲子圖梁大通元年即魏孝昌三年此書于孝昌元年之下謂是歲改年大通互異是年衍又改號為中大通歴代甲子圖歲在丁未梁改普通為大通己酉又改中大通乙夘又改為大同即東魏孝静帝之天平二年也此書則于天平二年之下謂為中大通二年夏二年上脱年號臣人龍按本書孝静帝紀號天平者凡四年至次年正月即改元為元象又次年十一月即改元興和今上文云四年冬下文云興和二年春則此年當稱元象元年是年衍改號大同歴代甲子圖東魏興和二年為梁大同六年與書互異六年衍又改號為中大同其年又改為太清歴代甲子圖梁中大同元年即東魏武定四年又梁太清元年即東魏武定五年與此互異魏書卷九十八考證
