  text: 魏書目錄正史類齊魏收撰帝紀一十二十四卷列傳九十二九十六卷志十二十卷共一百三十卷帝紀魏書卷一帝紀第一成帝毛節帝貸莊帝觀明帝樓安帝越宣帝推寅景帝利元帝俟和帝肆定帝機僖帝蓋威帝僧獻帝隣聖武帝詰汾始祖神元帝力微文帝沙漢汗章帝悉鹿平帝綽思帝弗昭帝祿官桓帝猗㐌穆帝猗盧太祖平文帝鬱律惠帝賀傉煬帝紇那烈帝翳槐昭成帝什翼犍魏書卷二帝紀第二太祖道武帝珪魏書卷三闕帝紀第三太宗明元帝嗣魏書卷四上帝紀第四上世祖太武帝燾魏書卷四下帝紀第四下世祖太武帝恭宗景穆皇帝晃附魏書卷五帝紀第五高宗文成帝濬魏書卷六帝紀第六顯祖獻文帝𢎞魏書卷七上帝紀第七上髙祖孝文帝宏魏書卷七下帝紀第七下高祖孝文帝魏書卷八帝紀第八世宗宣武帝恪魏書卷九帝紀第九肅宗孝明帝詡魏書卷十帝紀第十敬宗孝莊帝子攸魏書卷十一帝紀第十一前廢帝廣陵王恭後廢帝安定王朗出帝平陽王修魏書卷十二闕帝紀第十二孝静帝善見列傳魏書卷十三闕后妃第一神元皇后竇氏文帝皇后封氏次妃蘭氏桓帝皇后祁氏平文皇后王氏昭成皇后慕容氏獻明皇后賀氏道武皇后慕容氏道武宣穆皇后劉氏明元昭哀皇后姚氏明元密皇后杜氏太武惠太后竇氏太武皇后赫連氏太武敬哀皇后賀氏景穆恭皇后郁久閭氏文成昭太后常氏文成文明皇后馮氏文成元皇后李氏獻文思皇后李氏孝文貞皇后林氏孝文廢皇后馮氏孝文幽皇后馮氏孝文昭皇后高氏宣武順皇后于氏宣武皇后高氏宣武靈皇后胡氏孝明皇后胡氏孝靜皇后高氏魏書卷十四闕列傳第二神元平文諸帝子孫上谷公紇羅子襄城王題建徳公嬰文真定侯陸曾孫軌武陵侯因長樂王壽樂望都公頽曲陽侯素延順陽公郁宜都王目辰穆帝長子六修吉陽男比干江夏公吕高涼王孤六世孫華山王鷙六萇孫萇子子華穆子華弟子思孤世上黨王天西河公敦司徒石武衞將軍謂子烏真東烏真子興都興都子陽王丕淮陵侯大頭河間公齊孫志扶風公處真文安公泥子屈磨渾屈子魏書卷十五闕列傳第三昭成子孫寔君秦王翰子衞王儀王纂儀子中山幹弟幹子禎烈禎子端觚儀隂平王秦王常山王遵子素元素子可悉陵悉可悉陵弟子昭昭子弟紹可陵弟忠忠子夀興忠子暉忠弟孫嶷陳留王䖍子朱提王悦子崇䖍兄顗顗崘毗陵王順遼西公意烈子拔干洪㧞干曾孫超意烈弟子栗渾子庫汗渾窟咄魏書卷十六列傳第四道武七王清河王紹陽平王熙子臨淮王他他曾孫世遵世遵弟子忻之僧世遵弟禹他孫法壽法河南王曜子潁川王提和提子平原平原子鑒河間王修略陽王羯兒長樂王處文廣平王連南平王渾冏渾子霄霄曾孫仲京兆王黎江陽王繼繼繼子义羅爽弟羅侯魏書卷十七闕列傳第五明元六王樂平王丕安定王彌樂安王範子良永昌王健子仁建寧王崇新興王俊魏書卷十八闕列傳第六太武五王晉王伏羅東平王翰臨淮王譚子提孝友提子昌昌弟孚昌子彧廣陽王建閭子嘉湛嘉子深深子南安王余魏書卷十九上闕列傳第七上景穆十二王上陽平王新成子頤欽衍欽衍子融衍弟子子孝京兆王子推子太興太太興孫悰恒太興子仲景暹興弟遥濟隂王小新成孫弼子弼子暉業麗昭業子顯和鬰弟誕鬱弟麗汝隂王天賜孫慶和修義天賜子況樂浪王萬壽曾孫忠廣平王洛侯濟南王匡魏書卷十九中列傳第七中景穆十二王中任城王雲子澄嵩澄子彜世順澄弟嵩子雋順子朗嵩弟瞻魏書卷十九下列傳第七下景穆十二王下南安王楨子中山王英略略弟纂英子熙興熙弟東平王熙弟義英弟怡怡子魯郡王肅東海王曄城陽王長壽子鸞徽鸞子章武王太洛嗣王彬凝彬子融東安王樂陵王胡兒嗣王思譽安定王休子夑貴平願平魏書卷二十闕列傳第八文成五王安樂王長樂子詮斌之詮子鑒廣川王略子諧齊郡王簡子祐河間王若嗣王琛安豐王猛子延明魏書卷二十一上列傳第九上獻文六王上咸陽王禧子翼曄樹趙郡王幹子謐譚諶廣陵王羽子欣高陽王雍子端王叡昌樂誕北海王詳子顥瑱魏書卷二十一下列傳第九下獻文六王下彭城王勰子劭子正子直魏書卷二十二闕列傳第十孝文五王廢太子恂京兆王愉子寶炬清河王懌廣平王懷汝南王悦魏書卷二十三列傳第十一衞操衞雄姬澹莫含孫題雲劉庫仁弟眷奴庫仁子顯兄犍族人真奴真魏書卷二十四列傳第十二燕鳳許謙子洛陽張袞孫誕孫袞子度白澤子倫度曽白澤崔𤣥伯弟徽鍾崔寛敞朏寛父剖高寛子衡道衡子崔模陵崔固道固兄子僧祐弟僧淵和僧淵子伯鳯祖虬僧淵從和子軌重謐祖螭京謐父鄧淵子穎孫穎孫述子頴子宗慶穎弟羨羡躋魏書卷二十五闕列傳第十三長孫嵩子頽敦頽子長孫道生孫觀子觀子稚稚子彦魏書卷二十六列傳第十四長孫肥子翰孫陳蘭肥弟真尉古真弟諾多諾子眷眷子侯多侯弟子慶賓古真族𤣥孫瑾眷弟地干魏書卷二十七列傳第十五穆崇孫真羆真子泰羆崇子觀亮觀子夀夀夀孫羆子建弟亮子紹弟多侯善觀弟曾孫弼子觀弟顗醜孫鑖鑖孫琳良崇宗人醜善魏書卷二十八列傳第十六和跋子歸奚牧莫題庾業延賀狄干李栗劉潔古弼張黎魏書卷二十九列傳第十七奚斤子他觀兠孫買奴斤弟孫叔孫建子俊隣魏書卷三十列傳第十八王建子斤孫孫度建曾樹安同子原子頡同弟難樓伏連兄曽孫毅丘堆娥清劉尼奚眷車伊洛宿石來大千周㡬豆代田周觀閭大肥尉撥陸真子延呂洛拔子文祖魏書卷三十一列傳第十九于栗磾子洛拔弟洛抜子烈弟烈子祚景烈子昕烈果忠魏書卷三十二列傳第二十高湖子謐子謐子樹生弟謐兄真子拔弟䐗