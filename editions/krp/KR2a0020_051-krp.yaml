body:
  text: 魏書卷五十一齊魏收撰列傳第三十九韓茂皮豹子封勑文呂羅漢孔伯恭韓茂字元興安定武安人也父耆字黄老永興中自赫連屈丐來降拜綏逺將軍遷龍驤將軍常山太守假安武侯仍居常山之九門卒贈涇州刺史諡曰成侯茂年十七膂力過人尤善騎射太宗曾親征丁零翟猛茂為中軍執幢時有風諸軍旌旗皆偃仆茂於馬上持幢初不傾倒太宗異而問之徵茂所屬具以狀對太宗謂左右曰記之尋徵詣行在所試以騎射太宗深竒之以茂為虎賁中郎將後從世祖討赫連昌大破之世祖謂諸將曰今若窮兵極武非弔民之道明年當共卿等取之徙其民而還以軍功賜茂爵蒲陰子加彊將軍軍遷侍輦郎又從征統萬大破之從平平涼當茂所衝莫不應弦而殪由是世祖壯之拜内侍長進爵九門侯加冠軍將軍後從征蠕蠕頻戰大捷與樂平王丕等伐和龍徙其居民從平涼州茂為前鋒都將戰功居多遷司衞監錄前後功拜散騎常侍殿中尚書進爵安定公加平南將軍從破薛永宗伐蓋吳轉都官尚書從征懸瓠頻破賊軍車駕南征分為六道茂與高涼王那出青州諸軍渡淮降者相繼拜茂徐州刺史以撫之車駕還以茂為侍中尚書左僕射加征南將軍世祖崩劉義隆遣將檀和之寇濟州南安王余令茂討之至濟州和之遁走髙宗踐祚拜尚書令加侍中征南大將軍茂沉毅篤實雖無文學每議論合理為將善於撫衆勇冠當世為朝廷所稱太安二年夏領太子少師冬卒贈涇州刺史安定王諡曰桓王長子備字延徳初為中散賜爵江陽男加揚烈將軍又進爵行唐侯拜冠軍將軍太子庶子遷寧西將軍典遊獵曹加散騎常侍襲爵安定公征南大將軍卒贈雍州刺史諡曰簡公備弟均字天德少而善射有將略初為中散賜爵范陽子加寧朔將軍遷金部尚書加散騎常侍兄備卒無子均襲爵安定公征南大將軍出為使持節散騎常侍本將軍定州刺史轉青冀二州刺史餘如故恤民亷謹甚有治稱廣阿澤在定冀伯三州之界土廣民稀多有寇盜乃置鎮以靜之以均在冀州劫盜止息除本將軍廣阿鎮大將加都督三州諸軍事均清身率下明為耳目廣設方略禁斷奸邪於是趙郡屠各西山丁零聚黨山澤以劫害為業者均皆誘慰追捕逺近震跼先是河外未賔民多去就故權立東青州為招懷之本新附之民咸受優復然舊人奸逃者多往投焉均表陳非便朝議罷之後均所統劫盜頗起顯祖詔書誚讓之又以五州民户殷多編籍不實以均忠直不阿詔均檢括出十餘萬户復授定州刺史輕徭寛賦百姓安之延興五年卒諡曰康公子寳石襲爵均弟天生為内廐令後典龍牧曹出為持節平北將軍沃野鎮將皮豹子漁陽人少有武略泰常中為中散稍遷内侍左右世祖時為散騎常侍賜爵新安侯加冠軍將軍又拜選部尚書餘如故出除使持節侍中都督秦雍荆梁四州諸軍事安西將軍開府儀同三司進爵淮陽公鎮長安尋加征西將軍後坐盜官財徙於統萬真君三年劉義隆遣將裴方明等侵南秦王楊難當遂陷仇池世祖徵豹子復其爵位尋拜使持節仇池鎮將督關中諸軍與建興公古弼等分命諸將十道並進四年正月豹子進擊樂鄉大破之擒義隆將王奐之王長卿等六人斬首二千餘級俘獲一千人豹子進軍下辨義隆將强元明辛伯奮棄城遁走追斬之悉獲其衆義隆使其秦州刺史胡崇之鎮仇池至漢中聞官軍已西懼不敢進方明益其兵而遣之豹子與司馬楚之至於濁水擊擒崇之盡虜其衆進至髙平義隆將姜道祖降仇池平未幾諸氐復反推楊文徳為主以圍仇池古弼率諸軍討平之時豹子次於下辨聞圍解欲還弼遣使謂豹子曰賊耻其負敗必求報復後舉為難不如陳兵以待之豹子以為然尋除都督秦雍荆梁益五州諸軍事進號征西大將軍開府仇池鎮將持節公如故十一月義隆復遣楊文徳姜道盛率衆二萬人寇濁水別遣將青陽顯伯守斧山以拒豹子濁水城兵射殺道盛豹子至斧山斬顯伯悉俘其衆豹子又與河間公元齊俱會於濁水賊衆震恐棄其兵甲夜遁初南秦王楊難當歸命詔送楊氏子弟詣京師文徳以行賂得留亡奔漢中義隆以文徳為武都王給兵二千人守葭蘆城招誘氐羌於是武都陰平五部氐民叛應文徳詔豹子率諸軍討之文徳阻兵固險拒豹子文徳將楊髙來䧏引諸軍向其城文徳棄城南走收其妻子寮屬軍資及故武都王保宗妻公主送京師義隆白水太守郭啓元率衆救文徳豹子分軍逆擊大破之啓元文徳走還漢中興安二年正月義隆遣其將蕭道成王虬馬光等入漢中別令楊文徳楊頭等率諸氐羌圍武都城中拒之殺賊二百餘人豹子分兵將救之至女磊聞賊停軍豹子遣人於祁山取馬欲往赴援文徳謂豹子欲斷其糧運回軍還入覆津據險自固義隆恐其輙回又增兵益將令晉壽白水送糧覆津漢川武興運粟甘泉皆置倉儲豹子表曰義隆增兵運糧剋必送死臣所領之衆本自不多唯仰民兵專恃防固其統萬安定二鎮之衆從戎以來經三四歲長安之兵役過期月未有代期衣糧俱盡形顔枯悴窘切戀家逃亡不已既臨寇難不任攻戰士民奸通知臣兵弱南引文徳共為脣齒計文徳去年八月與義隆梁州刺史劉秀之同征長安聞臺遣大軍勢援雲集長安地平用馬為便畏國騎軍不敢北出但承仇池局本或作句或作勾皆疑人稱臺軍不多戍兵尠少諸州雜人各有還思軍勢若及必自奔逃進軍取城有易反掌承信其語回趣長安之兵遣文徳蕭道成王虬等將領來攻武都仇池望連秦隴進圍武都已經積日畏臣截後斷其糧路關鎮少兵未有大損今外寇兵彊臣力寡弱拒賊備敵非兵不擬乞選壯兵增戍武都牢城自守可以無患今事已切急若不馳聞損失城鎮恐招深責願遣髙平突騎二千賫糧一月速赴仇池且可抑折逆民支對賊虜須長闕上邽安定戍兵至可得自全糧者民之命也雖有金城湯池無糧不守仇池本無儲積今歲不收苦髙平騎至不知云何以得供援請遣秦州之民送軍祁山臣隨迎致詔髙平鎮將茍莫于率突騎二千以赴之道成等乃退徵豹子為尚書出為内都大官劉駿遣其將殷孝祖脩兩當城於清東以逼南境天水公封勑文擊之不剋詔豹子與給事中周邱等助擊之豹子以南寇城守攻圍費日遂略地至髙平劉駿瑕邱鎮遣歩卒五千助戍兩當去城八里與豹子前鋒候騎相遇即便交戰豹子軍繼至大破之縱騎追擊殺之至於城下其免者十餘人而已城内恐懼不敢出救既而班師先是河西諸胡亡匿避命豹子及前涇州刺史封阿君督河西諸軍南趣石樓與衞大將軍樂安王良以討羣胡豹子等與賊相對不覺胡走無捷而還又坐免官尋以前後戰功復擢為内都大官和平五年六月卒髙宗追惜之贈淮陽王諡曰襄賜命服一襲子道明襲爵道明第八弟喜髙宗以其名臣子擢為侍御中散遷侍御長髙祖初吐谷渾拾寅部落飢窘侵涼澆一為洮河大為民患詔假喜平西將軍廣川公領涼州枹罕髙平諸軍與上黨王長孫觀討拾寅又拜為使持節侍中都督秦雍荆梁益五州諸軍事本將軍開府仇池鎮將假公如故以其父豹子昔鎮仇池有威信故也喜至申恩布惠夷民大悅酋帥强奴子等各率户歸附於是置廣業固道二郡以居之徵為南部尚書賜爵南康侯加左將軍太和元年劉準葭蘆戍主楊文度遣弟鼠竊據仇池喜率衆四萬討鼠軍到建安鼠棄城南走進次濁水遣平西將軍楊靈珍擊文度所置仇池太守楊真真衆潰僅而得免喜遂軍於覆津文度將强大黑固守津道懸崖險絶偏閣單行喜部分將士攀崖渉水衝擊大黑大黑潰走追奔西入攻葭蘆城㧞之斬文度傳首京師殺一千餘人詔曰夫忠臣生於徳義之門智勇出於將相之族往年氐羌放命侵竊邊戍都將皮喜梁醜奴等或資父舊勲或身建殊效威名著於庸漢公義列於天府故授以節鉞委閫外之任並罄力盡銳克荷所司霜戈始動蟻賊奔散仇池旋復民夷晏安及討葭蘆又梟凶醜元惡俱殲闚𨵦永息朕甚嘉之其所陳計略商校利害料其應否寧邊益國專之可也今軍威既振羣愚懾服革弊崇新有易因之勢寛猛之宜任其量處應立郡縣者亦聽銓置其楊文度楊鼠親屬家累部送赴臺仇池南秦之根本守禦資儲特須豐積險阻之要尤宜守防令奸覘之徒絶其僥倖勉勤戎務綏靜新俗懷民安士稱朕意焉又詔喜等曰卿受命專征薄伐邊宼軍威所及即皆平蕩復仇池之舊鎮破葭蘆之新邦梟擒首逆剋剪凶黨勲庸之美朕無間然仇池國之要蕃防守事宜尤須完實從前以來駱谷置鎮是以奸賊息闚𨵦之心邊城無危敗之禍近由徙就建安致有往年之役前勑卿等部率兵將駱谷築城雖有一時之勤終致永延之固而卿等不祗詔命至于今日徒使兵人稽頓無事閑停方復曲辭表求罷下豈是良將忘身憂國盡忠之謂也諸州之兵已復一歲宜暫戮力成此要功卿等表求來年築城豈不更勞兵將孰若因今之勢即令就之一勞永逸事不再舉也今更給軍糧一月速於駱谷築城使四月盡必令成就訖若不時營築乃築而不成成而不固以軍法從事南天水郡民柳旃據險不順喜率衆討滅之轉散騎常侍安南將軍豫州刺史詔讓其在州寛怠以飲酒廢事威不禁下遣使者就州決以杖罰七年卒贈以本官諡曰恭公子承宗襲爵喜弟雙仁冠軍將軍仇池鎮將封勑文代人也祖豆皇始初領衆三萬東征幽州平定三郡拜幽州刺史後為使持節都督冀青二州諸軍事前將軍開府冀青二州刺史關内侯父湼太宗時為侍御長卒贈龍驤將軍定州刺史章武侯諡曰隱勑文始光初為中散稍遷西部尚書出為使持節散騎常侍鎮西將軍開府領䕶西夷校尉秦益二州刺史賜爵天水公鎮上邽詔勑文率歩騎七千征吐谷渾慕利延兄子拾歸於枹罕衆少不能制詔遣安逺將軍廣川公乙烏頭等二軍與勑文會隴右軍次武始拾歸夜遁勑文引軍入枹罕虜拾歸妻子及其民户分徙千家於上邽留烏頭守枹罕金城邊冏天水梁會謀反扇動秦益二州雜人萬餘户據上邽東城攻逼西城勑文先已設備殺賊百餘人被傷者衆賊乃引退冏會復率衆四千攻城氐羌一萬屯於南嶺休官屠各及諸雜户二萬餘人屯於北嶺為冏等形援勑文遣二將領騎二百設備門内別令騎出擊之既而偽退冏率衆騰逐勑文輕騎横衝大破之斬冏而北嶺之賊從髙射勑文軍人飛矢如雨梁會得奔北嶺騎乃引還復推會為主勑文分兵二百人突入南城燒其門樓賊見火起衆皆驚亂又遣歩卒攻門剋之便率騎士馳入賊餘衆開門出走奔入東城乘背追擊殺千餘人安豐公閭根率軍助勑文勑文表曰安定逆賊帥路那羅遣使齎書與逆帥梁會會以那羅書射於城中那羅稱纂集衆旅剋期助會又仇池城民李洪自稱應王天授玉璽擅作符書誑惑百姓梁會遣使招引楊文徳而文徳遣權壽胡將兵二十人來到會間扇動州土云李洪自稱應王兩雄不並若欲須我先殺李洪我當自往梁會欲引致文徳誘說李洪來入東城即斬洪首送與文徳仇池鎮將淮陽公臣豹子遣使濳行以今月二十四日來達臣鎮稱楊文徳受劉義隆職爵領兵聚衆在仇池境中沮動民人規竊城鎮且梁會反逆以來南勾文徳援勢相連武都氐羌盡相脣齒為文徳起軍所在屯結兵衆已集剋來不逺臣備邊鎮與賊相持賊在東城隔墻而已但以腹背有敵攻城有疑討度文徳剋來助會若文徳既至百姓響應賊黨遂甚用功益難今文徳未到會復未熟事宜速擊於時為便伏願天鑒特遣大軍助臣誅翦表未及報梁會謀欲逃遁先是勑文掘重壍於東城之外斷賊走路夜中會乃車陳飛梯騰壍而走勑文先嚴兵於壍外拒鬭從夜至旦勑文謀於衆曰困獸猶鬬而況於人賊衆知無生路人自致死必傷士衆未易可平若開其生路賊必上下離心剋之易矣衆咸以為然初勑文以白虎幡宣告賊衆曰若能歸降原其生命應時降者六百餘人會知人心沮壞於是分遁勑文縱騎躡之死者大半俘獲四千五百餘口略陽王元達因梁會之亂聚衆攻城招引休官屠各之衆推天水休官王宦興為秦地王勑文與臨淮公莫真討之軍次略陽勑文遣使慰諭而元達等三千餘人屯於松多川乃部分諸軍三道並攻賊出營拒戰大破之俘三千人髙宗時與新平公周盆擊劉駿將殷孝祖于清東不剋天安元年五月卒長子萬䕶讓爵於弟翰於時讓者惟萬䕶及元氏侯趙辟惡子元伯讓其弟次興朝廷議而許之翰族孫靜世宗時歴位征虜將軍武衞將軍太子左衞率以幹用稱延昌中遷平北將軍恒州刺史臨朐都䕶坐事免卒子熙奉朝請遷員外散騎侍郎給事中與薛曇尚迎蠕蠕主婆羅門於涼州又除鎮逺將軍河陰令卒贈輔國將軍朔州刺史子纘武定末潁川太守呂羅漢本東平壽張人其先石勒時徙居幽州祖顯字子明少好學性廉直鄉人有分爭者皆就而質焉慕容垂以為河間太守皇始初以郡來降太祖嘉之賜爵魏昌男拜鉅鹿太守清身奉公務存贍恤妻子不免飢寒民頌之曰時惟府君克己清明緝我荒土民胥樂生願壽無疆以享長齡卒官父溫字晞陽善書好施有文武才略世祖伐赫連昌以溫為幢將先登䧟陳每戰必捷以功拜宣威將軍奉車都尉出為秦州司馬遷上黨太守善勸課有治名卒贈平逺將軍豫州刺史野王侯諡曰敬羅漢仁篤慎密弱冠以武幹知名父溫之佐秦州羅漢隨侍隴右氐楊難當率衆數萬寇上邽秦民多應之鎮將元意頭知羅漢善射共登西城樓令羅漢射難當隊將及兵二十三人應弦而殪賊衆轉盛羅漢進計曰今若不出戰示敵以弱衆情攜貳大事去矣意頭善之即簡千餘騎令羅漢出戰羅漢與諸騎策馬大呼直衝難當軍衆皆披靡殺難當左右隊騎八人難當大驚會世祖賜難當璽書責其䟦扈難當乃引還仇池意頭具以狀聞世祖嘉之徵為羽林中郎上邽休官呂豐屠各王飛亷等八千餘家據險為逆詔羅漢率騎一千討擒之從征懸瓠羅漢與瑯邪王司馬楚之駕前招慰降者九千餘户比至盱眙頻破賊軍擒其將顧儼李觀之等以功遷羽林中郎幢將賜爵烏程子加建威將軍及南安王余立羅漢猶典宿衞髙宗之立羅漢有功焉遷少卿仍幢將進爵野王侯加龍驤將軍拜司衞監遷散騎常侍殿中尚書進爵山陽公加鎮西將軍及蠕蠕犯塞顯祖討之羅漢與右僕射南平公元目振都督中外軍事出為鎮西將軍秦益二州刺史時仇池氐羌反攻逼駱谷鎮將吳保元走登百頃請援於羅漢羅漢帥歩騎隨長孫觀掩擊氐羌大破之斬其渠帥賊衆退散詔羅漢曰卿以勞勤獲叙才能致用内總禁旅外臨方岳襃寵之隆可謂備矣自非盡節竭誠將何以垂名竹帛仇池接近邊境兵革屢興既勞士卒亦動民庶皆由鎮將不明綏禁不理之所致也卿應機赴擊殄此兇醜隴右土險民亦剛悍若不導之以徳齊之以刑宼賊莫由可息百姓無以得靜朕垂心治道欲使逺近清穆卿可召集豪右擇其事宜以利民為先益國為本隨其風俗以施威惠其有安土樂業奉公勤私者善加勸督無奪時利明相宣告稱朕意焉涇州民張羌郎扇惑隴東聚衆千餘人州軍討之不能制羅漢率歩騎一千擊羌郎擒之仇池氐羌叛逆遂甚所在鋒起道路斷絶其賊帥蛩廉符祈等皆受劉昱官爵鐵券略陽公伏阿奴為都將與羅漢赴討所在破之生擒廉祈等秦益阻逺南連仇池西接赤水諸羌恃險數為叛逆自羅漢蒞州撫以威惠西戎懐徳土境怗然髙祖詔羅漢曰朕總攝萬幾統臨四海思隆古道光顯風教故内委羣司外任方牧正是志士建節之秋忠臣立功之會然赤水諸羌居邊土非卿善誘何以招輯卿所得口馬表求貢奉朕嘉乃誠便勑領納其馬印付都牧口以賜卿徴拜内都大官聴訟察獄多得其情太和六年卒於官髙祖深悼惜之賜命服一襲贈以本官諡曰莊公長子興祖襲爵山陽公後例降為侯景明元年卒興祖弟伯慶為中散咸陽王禧郎中令伯慶弟世興校書郎羅漢弟大檀為中散恒農太守大檀弟豹子東萊鎮將後改鎮為州行光州事豹子弟七寳侍御中散遷少卿出為假節龍驤將軍東雍州刺史孔伯恭魏郡鄴人也父昭始光初以宻皇后親賜爵汝陰侯加安東將軍徙爵魏縣侯遷安南將軍昭性柔曠有才用出為趙郡太守治有能名徵拜光祿大夫轉中都大官善察獄訟明於政刑遷侍中鎮東將軍幽州刺史進爵魯郡公和平二年卒諡曰康公長子羅漢東宫洗馬次伯恭以父任拜給事中後賜爵濟陽男加鷹揚將軍出為安南將軍濟州刺史進爵成陽公入為散騎常侍顯祖初劉彧徐州刺史薛安都以彭城内附彧遣將張永沈攸之等擊安都安都上表請援顯祖進伯恭號鎮東將軍副尚書尉元救之軍次于秺賊將周凱聞伯恭等軍至棄衆遁走張永仍屯下磕永輜重在武原伯恭等攻而剋之永計無所出引師而退時皇興元年正月天大寒雪泗水冰合永與攸之棄船而走伯恭等進擊首虜及凍死甚衆八月伯恭以書喻下邳宿豫城内曰劉彧肆逆滔天弗鑒靈命猶謂絶而復興長江可恃敢遣張永周凱等率此蟻衆送死彭城大軍未臨逆首奔潰今乘機電舉當屠此城遂平吳會弔民代罪幸時歸欵自求多福時攸之吳憘公等率衆數萬來援下邳屯軍焦墟曲去下邳五十餘里伯恭遣子都將侯汾等率騎五百在水南奚升等五百餘騎在水北南北邀之伯恭宻造火車攻具欲水陸俱進攸之等既聞將戰引軍退保樊階城伯恭又令子都將孫天慶等歩騎六千向零中峽斫木斷清水路劉彧寧朔將軍陳顯達領衆二千溯清而上以迎攸之屯於睢清合口伯恭率衆渡水大破顯達軍俘斬十九攸之聞顯達軍敗順流退下伯恭部分諸將俠清南北尋攸之軍後伯恭從睢陵城東向零中峽分軍為二道遣司馬范師子等在清南伯恭從清西與攸之合戰遂大破之斬其將姜産之髙遵世及邱幼弼邱隆先沈榮宗陸道景等首攸之憘公等輕騎遁走乘勝追奔八十餘里軍資器械虜獲萬計進攻宿豫劉彧戍將魯僧遵棄城夜遁又遣將孔太恒等領募騎一千南討淮陽彧太守崔武仲焚城南走遂據淮陽二年以伯恭為散騎常侍都督徐南兗州諸軍事鎮東將軍彭城鎮將東海公三年十月卒贈鎮東大將軍東海王諡曰桓伯恭弟伯遜為中書博士襲父爵魯郡公拜鎮東將軍東萊鎮將轉本將軍東徐州刺史先事免官卒于家史臣曰韓茂皮豹子封勑文吕羅漢孔伯恭之為將也皆以沉勇篤實仁厚撫衆功成事立不徒然矣與夫茍要一戰之利僥倖蹔勝之名豈同年而語也魏書卷五十一魏書卷五十一考證韓茂傳韓茂字元興安定武安人也武安北史作安武下文云假安武侯似以北史為正封勑文傳討度文徳剋來助會若文徳既至百姓響應賊黨遂甚用功益難討度討字應是計字之訛魏書卷五十一考證
