羊社本書世宗紀景明四年梁州氐楊㑹反詔行梁州事楊椿左將軍羊祉討之此社字乃祉字之訛也魏書卷一百五之二考證欽定四庫全書魏書卷一百五之三齊魏收撰志第三天象一之三太祖皇始元年夏六月有星彗于髦頭彗所以去穢布新也皇天以黜無道建有德故或馮之以昌或繇之以亡自五胡蹂躪生人力正諸夏百有餘年莫能建經始之謀而底定其命是秋太祖啓冀方之地實始芟夷滌除之有德教之音人倫之象焉終以錫類長代修復中朝之舊物故將建元立號而天街彗之盖其祥也先是有大黄星出於昴畢之分五十餘日慕容氏太史丞王先曰當有真人起於燕代之間大兵鏘鏘其鋒不可當冬十一月黄星又見天下莫敵是歳六月木犯哭星木人君也君有哭泣之事是月太后賀氏崩至秋晉帝殂二年六月庚戍月掩金於端門之外戰祥也變及南宮是謂朝廷有兵時燕王慕容寶已走和龍秋九月其弟賀麟復紏合三萬衆寇新市上自撃之大敗燕師于義臺悉定河北而晉桓元等連衡内侮其朝廷日夕戒嚴是嵗正月火犯哭星占有死喪哭泣事秋八月又守井鉞占曰大臣誅十月襄城王題薨明年正月右軍將軍尹國於冀州謀反被誅天興元年八月戊辰木晝見胃胃趙代墟也闕天之事嵗為有國之君晝見者並明而干陽也天象若曰且有負海君實能自濟其德而行帝王事是月始正封畿定權量肆禮樂頒官秩十二月羣臣上尊號正元日遂禋上帝于南郊由是魏為北帝而晉氏為南帝元年十月至二年五月月再掩東蕃上相相所以蕃輔王室而定君臣位天象若曰今下凌上替而莫之或振將焉用之哉且曰中坐成刑貴人奪勢是嵗桓元專殺殷仲堪等制上流之衆晉室由是遂卑是嵗五月辰星犯軒轅大星占曰女主當之三年三月至七月月再犯鎮星于牽牛又犯哭星為兵喪女憂或曰月為彊大之臣鎮所以正綱紀也是為彊臣有干犯者在吳越既而晉太后李氏殂桓元擅命江南仍有艱故云三年三月有星孛于奎厯閣道至紫微西蕃入北斗魁犯太陽守循下台轥南宮履帝坐遂由端門以出奎是封豨剝氣所由生也又殷徐州之次桓𤣥國焉劉裕興焉天象若曰君德之不建人之無援且有權其列蕃盗其名器之守而荐食之者矣又將由其天步席其帝庭而出號施令焉至四年二月甲寅有大流星衆多西行厯牛虚危絶漢津貫太微紫微虚危主靜人牽牛主農政皆負海之陽國也天象若曰黎元喪其所食失其所係命卒至流亡矣上不能恤又將播遷以從之其後晉人有孫恩之難而桓元踵之三吳連兵荐饑西奔死亡者萬計竟簒晉主而流之尋陽既又刼之以奔江陵是嵗三月甲子月生齒占曰有賊臣七月丁卯月犯天關關所以制畿封國也月犯之是為兵起于郊甸十月甲子月又犯東蕃上相占同二年既而桓元戡金陵殺司馬元顯太𫝊道子是嵗秀容胡師亦聚衆反伏誅五年四月辛丑月掩辰星在東井月為陰國之兵辰象戰鬭占曰所直野軍大起戰不勝亡地家臣死冬十月帝伐秦師于蒙坑大敗之遂舉乾壁關中大震其上將姚平赴水死是月戊申月暈左角太史令晁崇奏角蟲將死上慮牛疫乃命諸將併重焚車丙戍車駕北引牛大疫死者十有八九官車所御巨犗數百同日斃於路側首尾相屬麋鹿亦多死者五年三月戊子太白犯五諸侯晝見經天九月己未又犯進賢太白為彊侯之誡犯五諸侯所以興霸形也是時桓𤣥擅征伐之柄專殺諸侯以弱其本朝卒以干君之明而代奪之故皇天著誡焉若曰夫進賢興功大司馬之官守也而今自殘之君於何有焉是冬十月客星白若粉絮出自南宮之西十二月入太微亂氣所由也以距之之氣而乘粹陽之天庭適足以驅除焉爾明年竟篡晉室得諸侯而不終是嵗五月丙申月犯太微十月乙卯又如之月者太陰臣象太微正陽之庭不當横行其中是謂朝庭間隙彊臣不制亦桓𤣥之誡也又占曰貴人有坐之者明年七月鎮西大將軍毘陵王順以罪還第亦是也五年七月己亥月犯嵗星在鶉火鳥帑南國之墟也至天賜元年二月甲辰又掩之在角角為外朝而嵗星君也天象若曰有彊大之臣干君之庭以挾其主而播遷于外是嵗桓𤣥之師敗績于劉裕𤣥劫晉帝以奔江陵至五月𤣥死桓氏之黨復攻江陵陷之凡再劫天子云先是六年六月甲辰月掩斗魁第四星至天賜元年五月壬申又掩斗魁第三星二年八月丁巳又犯斗第一星斗為吳分大人憂將相戮宮中有自賊者及桓𤣥伏誅貴臣多戮死者江南兵革十餘嵗乃定故謫見于斗天賜二年四月己卯月犯鎮星在東壁七月己未又如之十月丁巳又掩之在室夫室星所以造宮廟而鎮司空也占曰土功之事興明年六月發八部人自五百里内繕修都城魏於是始有邑居之制度或曰北宮後庭人主所以庇衛其身也鎮主后妃之位存亡之基而是時堅氷之漸著矣故犯又掩再三焉占曰臣賊君邦大喪是嵗三月丁酉月犯心前星三年二月月犯心後星四年二月又如之心主嫡庶之禮占曰亂臣犯主儲君失位庶子惡之先是天興六年冬十月至元年四月月再掩軒轅占曰有亂易政后妃執其咎三年五月壬寅熒惑犯氐氐宿宮也天戒若曰是時蠱惑人主而興内亂之萌矣亦自我天視而修省焉及六年七月宣穆后以彊死太子微行人間既而有清河萬人之難二年八月火犯斗丁亥又犯建斗為大人之事建為經綸之始此天所以建創業君時劉裕且傾晉祚而清河之釁方作矣帝猶不悟至是嵗九月火犯哭星其象若曰將以内亂至于哭泣之事焉由是言之皇天所以訓劫殺之主熟矣而罕能敦復以自悟悲夫二年八月甲子熒惑犯少微庚寅犯右執法癸未犯左執法十一月丙戍太白掩鈎鈐皆南邦之謫也火象方伯金為彊侯少微以官賢材而輔南宮之化執法者威令所由行也天象若曰夫祿去公室所由來漸矣始則奮其賢材以為其本朝終以干其鈐鎋而席其威令焉至三年十二月丙午月掩太白于危危齊分也占曰其國以戰亡丁未金火皆入羽林四年正月太白晝見奎是謂或稱王師而干君明者占曰天下兵起魯邦受之二月癸亥金火土水聚于奎婁徐魯之分也四神聚謀所以革衰替之政定霸王之命五月己丑金晝見于參天意若曰是將自植攻伐以震其主而代奪之云爾八月辛丑熒惑犯執法九月遂犯進賢與桓氏同占是南燕慕容氏兼有齊魯之墟不務修德而驟侵晉淮泗六年四月劉裕以晉師伐之大敗燕師于臨朐進克廣固執慕容超以歸戕諸建康於是專其兵威荐食藩輔簒奪之形由此而著云二年三月月掩左執法三年四月又犯西蕃上將己未犯房次相六月火犯房次將三年七月太尉穆崇薨四年誅定陵公和跋殺司空庾岳又四年六月火犯水左翼八月金掩火犯左執法占曰大兵在楚執法當之至五年火犯天江占曰水賊作亂六月金犯上將又犯左執法其後盧循作亂於上流晉將何無忌戰死左僕射孟昶仰藥卒劉裕自伐齊奔命僅乃克之六年六月金火再入太微犯帝座蓬孛客星及他不可勝紀太史上言且有骨肉之禍更政立君語在帝紀冬十月太祖崩夫前事之感大即後事之災深故帝之季年妖怪特甚是嵗二月至九月月三犯昴昴為白衣㑹宮車晏駕之徴也十二月辛丑金犯木於奎占曰其君有兵死者既而慕容超戮于晉是嵗四月火犯水于東井其冬赫連氏攻安定秦主興自將救之自是侵伐不息或曰水火之合内亂之形也時朱提王悦謀反賜死太宗永興二年五月己亥月掩昴昴為髦頭之兵虜君憂之是月蠕蠕社崘圍長孫嵩于牛川上自將撃之社崘遁走道死六月甲午太白晝見占曰為不臣七月月犯鬼占曰亂臣在内明年五月昌黎王慕容伯兒謀反誅之是嵗三月至秋八月月三掩南斗第五星斗吳分也且曰彊大之臣有干天祿者大人憂之是月乙未太白犯少微晝見九月甲寅進犯左執法占曰且有杖其霸刑以戮社稷之衛而專威令者徴在南朔先是三月丁卯月掩房次將六月己丑又如之八月甲申犯心前星占曰服軛者當之君失馭徴在豫州時劉裕謀弱晉室四年九月專殺僕射謝混因襲荆州刺史劉毅于江陵夷之明年三月又誅晉豫州刺史諸葛長人其君託食而已是嵗八月壬子太白犯軒轅大星占曰有亂易政女君憂三年十一月丙午金犯哭星午秦地四年八月戊申月犯哭星申晉地是月晉后王氏死其後姚主薨三年六月庚子月犯嵗星在畢八月乙未又犯之在參四年正月又蝕在畢直徼垣之陽參在山河之右嵗星所以阜農事安萬人也占曰月仍犯之邊萌阻兵而荐饑是嵗六月癸巳金木合于東井七月甲申金犯土于井占曰其國内兵有白衣之㑹十一月土犯井十二月癸卯土犯鉞土主疆理之政存亡之機也是為土地分裂有戮死之君徴在秦邦至五年二月丙午火土皆犯井占曰國有兵喪之禍主出走是月壬辰嵗填熒惑太白聚于井將以建霸國之命也其地君子憂小人流又自三年四月至五年三月熒惑三干鬼主命者將夭而國徙焉是時雍州假王霸之號者六國而赫連氏據朔方之地尤為彊暴荐食關中秦人奔命者殆路間嵗姚興薨而難作于内明年劉裕以晉師伐之秦師連戰敗績執姚泓以歸戕諸建康既而遺守内攜長安淪覆焉或曰自上黨並河山之北皆鬼星參畢之郊也五年四月上黨羣盗外叛六月濩澤人劉逸自稱三巴王七月河西胡曹龍八蒲子號大單于十月將軍劉潔魏勤撃吐京叛胡失利勤力戰死潔為所虜明年赫連屈孑寇蒲子三城諸將撃走之其餘災波及晉魏仍其兵革之禍二年九月土犯畢為疆場之兵三年七月木犯土于參占曰戰敗亡地國君死四年十月月掩天關其災同上參外主巴蜀其後晉師伐蜀戮其主譙縱先是四年閏月月犯熒惑在昴七月又蝕之五年將軍奚斤討越勤大破之明年秃髪氏降于西秦其君傉檀戮死神瑞元年二月填入東井犯天尊旱祥也天象若曰土失其性水源將壅焉施于天尊所以福矜寡之萌也先是去年九月至於五月嵗再犯軒轅大星八月庚寅至二年三月填再犯鬼積尸嵗星主農事軒轅主雪霜風雨之神返覆由之所以告黄祗也土爰稼穡鬼為物之精氣是謂稼穡潛耗人將以饉而死焉一曰大旱是後京師比嵗霜旱五穀不登詔人就食山東以粟帛賑乏語在崔浩𫝊先是月犯嵗于畢占曰饑在晉代亦其徴又鬼主秦旱在秦邦至二年太史奏熒惑在匏𤓰中一夜忽亡失之後出東井語在崔浩傳既而關中大旱昆明枯涸是嵗四月癸丑流星晝見中天西行占曰營頭所首野有覆軍流血西行讁在秦邦而魏人覿之亦王師之戒也天若戒魏師曰是擁衆而西固欲干君之明而代奪之爾姑息人以觀變無庸禦焉先是五年三月月犯太白于參八月庚申又犯之參魏分野占曰彊侯作難國戰不勝九月己丑月犯左角是嵗三月壬申又蝕之是謂以剛晉之兵合戰而偏將戮徴在兖州二年四月太白入畢月犯畢而再入之占曰大戰不勝邊將憂魏邦受之六月己巳有星孛于昴南天象若曰且有驅除之雄勿用距之于朔方矣明年七月劉裕以舟師泝河九月裕陷我滑臺兖州刺史尉建以畏懦斬時崔浩欲勿戰上難違衆議詔司徒嵩率師迓之及晉人戰于畔城魏師敗績語在崔浩𫝊裕既定關中遽歸受禪既而赫連氏并之遂竊尊號云自元年正月至泰常元年十月月三犯畢再入之再犯畢陽星占曰邊兵起貴人有死者元年十二月蠕蠕犯塞上自將大破之二年上黨胡反詔五將討平之泰常元年長樂河間南陽王皆薨二年豫章王又薨常山霍季聚衆反伏誅二年四月辛巳有星孛于天市五月甲申彗星出天市掃帝座在房心北市所以建國均人心宋分也國且殊號人將更主其革而為宋乎先是往嵗七月月犯鈎鈐十一月月食房上相至元年二月又如之天象若曰尚尸鈐鍵之位君憑而尊之者又將及矣是嵗八月金木合于翼占曰且有内兵楚邦受之至泰常二年正月晉荆州刺史司馬休之雍州刺史魯宗之為劉裕所襲皆出奔走是嵗十月鎮星守太微七十餘日占曰易代立王其三年三月癸丑太白犯五諸侯如桓氏之占七月有流星孛于少微以入太微自劉氏之霸三變少微以加南宮矣始以方伯專之中則霸形干之又今孛政除之馴而三積堅氷至焉是月辰星見東方在翼甚明大翼楚邦也是為冢臣干明賊人其昌先是五年十一月壬子辰星出而明盛非常至泰常二年十二月庚戍辰星過時而見光色明盛是為彊臣有不還令者至是又如之亦三至焉或曰辰星以負北海亦魏將大興之兆九月長彗星孛于北斗轢紫微辛酉入南宮凡八十餘日十二月彗星出自天津入太微逕北斗干紫宮犯天棓八十餘日及天漢乃滅語在崔浩𫝊是嵗晉安帝殂後年而宋簒之夫晉室雖微泰始之遺俗也盖皇天有以原始篤終以哀王道之淪喪故猶著二微之戒焉神瑞二年四月木入南宮加右執法五月火又如之八月金入自掖門掩左執法泰常元年六月又由掖門入太微五月火犯執法是冬土守天尊而月掩之三年八月土又入太微犯執法因留二百餘日九月金又犯右執法十月火犯上將因留左掖門内二十日乃逆行四年三月出西蕃又還入之繞填星成句巳四月丙午行端門出皆晉氏之謫也自晉滅之後太微有變多應魏國也泰常三年十月辛巳有大流星出昴厯天津乃分為三須臾有聲占曰車騎滿野非喪即㑹明年四月帝有事于東廟蕃服之君以其職來祭者盖數百國也是嵗正月巳酉月犯軒轅四月壬申又犯填星在張四年五月辰星又犯軒轅占曰國有喪女君受之明年五月貴人姚氏薨是為昭哀皇后六月貴嬪杜氏薨是為密后先是二年九月火犯軒轅三年八月金又犯之占同也四年自正月至秋七月月行四犯太微天象若曰太微粹陽之天庭月者臣也今横行轥之不已甚乎先是元年五月月犯嵗星在角是嵗七月月又犯嵗星明年宋始建國後年而晉主殂裕鴆之也昔桓氏之難月再干嵗星再劫其主至是亦再犯之而再勦其君極其幽逼之患而濟以簒殺之禍斯謂之甚矣先是三年九月月犯火于鶉尾十二月又犯火于太微是嵗五月月犯太白在井十月又犯之在斗且再犯井星皆有兵水大喪諸侯有死者七月鴈門河内大水五年三月南陽王意文死十一月西涼李歆為沮渠所滅晉君亦殂秦吳亡之應五年十一月乙卯熒惑犯填星在角角外朝也土為紀綱火主内亂㑹于天門王綱將紊焉占曰有死君逐主后妃憂之十二月月蝕熒惑在亢亢内庭也占曰君薨而亂作于内貴臣以兵死是月客星見于翼翼楚邦也占曰國更服邊有急將軍或謀反者六年二月月食南斗杓星十月乙酉金土鬬于亢占曰内兵且喪更立王公又兖州陳鄭之墟也有攻城野戰之象焉至十年正月犯南斗三月壬戍又犯之斗為人君受命又吳分是嵗五月宋武殂秋九月魏師侵宋北鄙十一月攻滑臺克之明年拔虎牢陷金墉屠許昌遂啓河南之地八年宋太后蕭氏死既大臣專權遷殺其主卒皆伏誅自五年八月至七年十二年熒惑一守軒轅再犯進賢再犯房星一犯軒轅及房皆女君大臣之戒是時陽平河南王太尉穆觀相次薨而宋氏廷臣乗釁以侮其主竟以誅死云或曰火犯土亢為饑疾時官軍陷武牢會軍大疫死者十二三是冬詔稟饑人六年六月壬午有大流星出紫宮占曰上且行幸若有大君之使明年駕幸橋山祠黄帝東過幽州命使者觀省風俗十月上南征八年春步自鄴宮遂絶靈昌至東郡觀兵成臯反自河内登太行山幸髙都飲至晉陽焉七年二月辛巳有星孛于虚危向河津占曰𤣥枵所以飾喪紀也宗廟並起司人疑更謀有易政之象十一月甲寅彗星出室掃北斗及于闕門占曰内宫幾室主命將易塞垣有土功之事其地又齊衛也八年正月彗星出奎南長三丈東南掃河奎為荐食之兵徐方之地占曰西北之兵伐之君絶嗣天下饑七年十二月帝命夀光侯叔孫建徇定齊地八年春築長城距五原二千餘里置守卒以備蠕蠕冬十月大饑十一月己巳上崩于西宮明年宋廢其主由是南邦日蹙齊衛之地盡為兵衝及世祖即政遂荒淮沂以負東海云八年二月丙寅火守斗亦南邦之謫也十一月彗星孛于土司空司空主疆理邦域且曰有土功哭泣事後年赫連屈子薨太武征之取新秦之地由是征伐四克提封萬里云世祖始光元年正月壬午月犯心大星心為宋分中星者君也月為大臣主刑事是嵗五月宋權臣徐羡之謝晦傅亮放殺其主而立其弟宜都王是為宋文帝至十月火犯心天戒若曰是復作亂以干其君矣十月壬寅大流星出天將軍西南行殷殷有聲占曰有禁暴之兵上將督戰以所首名之三年正月嵗星食月在張張南國之分嵗之於月少君之象今反食之且誅彊大之臣是月羡之等戮死謝晦興江陵之甲以伐其君宋將檀道濟帥師禦之晦又奔潰伏誅或曰是嵗上伐赫連氏入其郛夏都直代西南亦奔星應也二年五月太白晝見經天占曰時謂亂紀革人更王六月己丑火入羽林守六十餘日占曰禁兵大起且有反臣之戒三年十月有流星出西南而東北行光明燭地有聲如雷鳥獸盡駭占曰所發之野有破國遷君西南直夏而首于代都焉著而有聲盛怒也四年五月辛酉金水合于西方占曰兵起大戰先是三年正月宋人有謝氏之難王卒盡出冬十一月上代赫連昌入其郛徙萬餘家以歸是嵗復攻之六月大敗昌于城下昌奔上邽遂抜統萬盡收夏器用虜其母弟妻子由是威加四隣北夷讋焉神䴥元年五月癸未太白犯天街占曰六夷髦頭滅二年五月太白晝見占曰大兵且興彊國有弱者是月上北征蠕蠕大破之虜獲以鉅萬計遂降髙車以實漠南闢地數千里云三年六月火犯井鬼入軒轅占曰秦憂兵亂有死君又旱饑之應丙子有大流星出危南入羽林占曰兵起負海國與王師合戰是嵗自三月至十月太白再犯嵗星月又犯之占曰有國之君或罹兵刑之難者且嵗饉十二月丙戍流星首如甕長二十餘丈大如數十斛船色正赤光燭人面自天舩及河抵奎大星及于壁占曰天舩以濟兵車奎為徐方東壁衛也是為宋師之祥昭盛者事大也是嵗六月宋將到彦之等侵魏自南鄙清水入河泝流而西列屯二千餘里九月帝用崔浩䇿行幸統萬遂撃赫連定扵平凉十二月克之悉定三秦地明年大師涉河攻滑臺屠之宋人宵遁是時赫連定轉攻西秦戮其君乞伏慕末吐谷渾慕容璝又襲撃定虜之以彊死者再君焉是嵗二月定州大饉詔開倉賑乏或曰奎星羽獵理兵象也流星抵之而著大是為大人之事冬十月上大閱于漠南甲騎五十萬旌旗二千餘里又明盛之徴四年金火入東井火又犯天戸明年五月又犯鬼占曰秦有兵喪而至秦夏出夷威沮渠蒙遜又死氐主楊難當陷宋之漢中地云四年三月有大流星東南行光燭地長六七丈食頃乃滅後有聲占曰大兵從之是時諸將方逐宋師至厯城不及有聲駿犇之象也四月辛未太白晝見于胃胃為趙分五月太白犯天關十月丙辰又掩之天關外主勃碣山河之險窮焉占曰兵革起九月丙寅有流星大如斗赤色發太微至北斗而滅太微禮樂之庭且有昭德之舉而述宣王命是以帝車受之是月壬申有詔徴范陽盧𤣥等三十六人郡國察秀孝數百人且命以禮宣喻申其出處之節明年六月上伐北燕舉燕十餘郡進圍和龍徙豪傑三萬餘家以歸四年八月金入太微亦君自將兵象明年正月庚午火入鬼占曰秦有死君四月己丑太白晝見為不臣其後秦王赫連昌叛走伏誅之應也延和元年七月有大流星出參左肩東北入河乃滅參主兵政晉魏墟也山河所首推之大兵將發于魏以加燕國八月癸未太白犯心前星乙酉又犯心明堂占曰有亡國近期二年十二月有流星大如甕尾長二十餘丈奔君之象比嵗連兵東討至太延二年三月燕後主馮文通去國奔髙麗元年四月犯左角五月月掩斗七月月食左角皆占曰兵大起其後征西將軍金崖安定鎮將延普涇州刺史狄子玉争權崔及子玉舉兵攻普不克據胡空谷反平西將軍陸俟討獲之三年三月丙辰金晝見在參魏邦戒也閏月戊寅金犯五諸侯占曰四滑起官兵起亂疑己丑月入井犯太白占曰兵起合戰秦邦受之七月上幸隰城詔諸軍討山胡白龍入西河九月克之伏誅者數千人而宋大將軍彭城王義康方擅威福後竟幽廢是嵗二月庚午月犯畢而出因暈昴及五車占曰貴人死五月甲子陰平王求薨太延元年五月月犯右執法九月火犯太㣲上將又犯左執法十月丙午月犯右執法二年二月月犯東蕃上相三月月及太白俱犯右執法及上相三年八月火犯左執法及上將五年二月木逆行犯執法皆大臣謫也元年十月左僕射安原謀反誅三年正月征東大將軍中山王纂太尉北平王長孫嵩鎮南大將軍丹陽王叔孫建皆薨其後宋大將軍義康坐徙豫章誅其黨與僕射殷景仁亦尋卒焉元年五月彗出軒轅二年正月月犯火月后妃也三年七月木犯軒轅至五年七月月掩填星並女主謫也真君元年太后竇氏殂宋氏皇后亦終或曰彗出軒轅女主有為冦者其後沮渠氏失國實公主潛啓魏師二年五月壬申有星孛於房占曰名山崩有亡國八月丁亥木入鬼守積尸十一月辛亥又犯鬼鬼秦分天戒若曰涼君淫奢無度財力窮矣將喪國身為戮焉二年正月四年十一月月皆犯井亦為秦有兵刑三年正月壬午有星晡前晝見東北在井左右色黄大如橘魏師之應也黄星出於燕墟而慕容氏滅今復見東井涼室亡乎四年四月己酉華山崩華山西鎮也天又若曰星孛于房既有徴矣鎮傾而國從之先是元年十二月金犯羽林二年十二月至四年十一月火再入之五年五月太白晝見胃昴入羽林遂犯畢畢又邊兵也六月上自將西征秋八月進圍姑臧九月丙戍沮渠牧犍帥文武將吏五千餘人面縛來降明年悉定涼地或曰星孛于房為大臣之事又饉祥也火入鬼犯軒轅又稼穡不成自元年已來將相薨尤衆至真君元年州鎮十五盡饑四年十月壬戍大流星出文昌入紫宮聲如雷天象若曰將相或以全師禦衛帝宮者其事密近有震驚之象焉明年六月帝西征詔大將軍黎敬等帥衆二萬屯漠南以備暴寇九月蠕蠕乘虚犯塞遂至七介山京師大駭司空長孫道生等并力拒之虜乃退走是月壬午有大流星出紫微入貫索長六丈餘占曰有大君之命貫索賤人牢也明年帝命侍臣行郡國觀風俗問其所疾苦云真君二年七月壬寅填星犯鉞鎮者國家所安危而為之綱紀者也其嬰鈇鉞之戮而君及焉自元年十一月至此月嵗星三犯房上相嵗星為人君今反覆由之循省鈎鈐之備也天若戒輔臣曰涼邦卒滅敵國殫矣而猶狹震主之威負百勝之計盍思盈亢之戒乎是時司徒崔浩方持國鈞且有寵於上明年安西李順備五刑之誅而由浩鍜成之後八年竟族滅無後夫天哀賢良而示以明訓夙矣罕能省躬以先覺豈不悲哉浩誅之明年卒有景穆之禍後年而亂作三年三月癸未月犯太白占曰大兵起合戰九月乙丑有星孛于天牢入文昌五車經昴畢之間至天苑百餘日與宿俱入西方天象若曰且有王者之兵彗除髦頭之域矣貴臣預有戮焉明年正月征西將軍皮豹子大敗宋師于樂鄉九月上北伐樂平王丕綂十五將為左軍中山王辰統十五將為右軍上自將中軍蠕蠕可汙不敢戰亡追至頓根河虜二萬餘騎而還中山王辰等八將軍坐後期皆斬或曰彗由昴畢貴人多死十一月太保盧魯元薨五年二月樂平王丕薨六年二月太白熒惑嵗星聚于東井占曰三星合是為驚立絶行其國内外有兵與喪改立王公九月盧水胡蓋吳據杏城反僭署百官諸虜皆響從關内大震十一月將軍叔孫拔敗吳師于渭北至七年正月太白犯熒惑占曰兵起有大戰時上討吳黨扵河東屠之遂幸長安三月吳軍敗績于杏城棄馬遁去復收合餘燼八月乃夷之五年五月月犯心六年四月又如之占曰兵犯宋邦是月太白入軒轅占曰有反臣是冬宋太子詹事范曄謀反誅詔髙涼王那狥淮泗徙其人河北焉九年正月火水皆入羽林占曰禁兵大起四月太白晝見經天十年五月彗星出于昴北此天所以滌除天街而禍髦頭之國也時閒嵗討蠕蠕是秋九月上復自將征之所捕虜凡百餘萬矣是嵗七月太白犯哭星占曰天子有哭泣事明年春皇子真薨十年十月辛巳彗星見于太微占曰兵喪並興國亂易政臣賊主至十一年正月甲子太白晝見經天四月又如之占曰中嵗而再干明兵事尤大且革人更王之應也是嵗十月甲辰熒惑入太微十二月辛未又犯之癸卯又如之占曰臣將戮主君將惡之仍犯事荐也先是八年正月庚午月犯心大星九年正月犯嵗星是嵗九月太白又犯嵗星至正平元年五月彗星見卷舌入太微卷舌讒言之戒六月辛酉彗星進逼帝座七月乙酉犯上相拂屏出端門滅于翼軫辛酉直陰國疑翼軫為楚邦于屏者蕭牆之亂也天象若曰夫膚受之譖實為亂階卒至芟夷主相而專其大號雖南國之君由遷及焉先是去年十月上南征絶河十二月六師渉淮登𤓰步山觀兵騎士六十萬列屯三千餘里宋人兇懼饋百牢焉是年正月盡舉淮南地俘之以歸所夷滅甚衆六月帝納宗愛之言皇太子以疆死明年二月愛殺帝于永安宫左僕射蘭延等以建議不同見殺愛立吳王余為主尋又賊之荐災之驗也閒嵗宋太子劭坐蠱事泄亦殺其君而僭立劭弟武陵王駿以上流之師討平之滅於翼軫之徴也先是七年八月月犯熒惑八月至十一月又犯軒轅是嵗正月太白經天九月火犯太微十月宗愛等伏誅髙宗踐阼至十一月錄尚書元夀尚書令長孫渴侯以争權賜死太尉黎司徒弼又忤㫖左遷孛于屏相之應又明年五月太后崩髙宗興安二年二月有星孛于西方占曰凡孛者非常惡氣所生也内不有大亂外且有大兵至興光元年二月有流星大如月西行占曰奔星所墜其野有兵光盛者事大先是京兆王杜元寶建康王崇濟南王麗濮陽王閭文若永昌王仁相次謀反伏誅是嵗宋南郡王義宣及魯爽臧質以荆豫之師搆逆大將王元謨等西討盡夷之或曰彗加太微翼軫之餘禍也春秋星之大變或災連三國之君其流炎之所及二十餘年而後弭至是彗干天庭二太子首亂三君為戮侯王辜死者㡬數十人由此言之皇天疾威之誡不可不惕也太安元年六月辛酉有星起河鼓東流有尾跡光明燭地河鼔為履險之兵負海之象也昭盛為人君之事星之所往君且從之間二嵗帝幸遼西登碣石以臨滄海復所過郡國一年又尾迹之徴是嵗五月火入斗斗主形命之養其後三吳荐饑仍嵗疾疫二年夏四月熒惑犯太白占曰是謂相鑠不可舉事用兵成師以出而禍其雄之象也明年宋將殷孝祖侵魏南鄙詔征南將軍皮豹子撃之宋軍大敗或曰金火合主喪事明年十月金又犯哭星十二月征東將軍中山王託真薨三年十一月熒惑犯房鈎鈐星是謂疆臣不御王者憂之至四年正月月入太微犯西蕃三月又犯五諸侯占曰諸侯大臣有謀反伏誅者是月太白犯房月入南斗皆宋分占曰國有變臣為亂十一月長星出於奎色白蛇行有尾跡既滅變為白雲奎為徐方又魯分也占曰下有流血積骨明年宋兖州刺史竟陵王誕據廣陵作亂宋主親戎自夏涉秋無日不戰及城陷悉屠之四年八月熒惑守畢直徼垣之南占曰嵗饉至五年二月又入東井占曰旱兵饑疫大臣當之六月太白犯鉞占曰兵起更正朔是嵗二月司空伊馛薨十二月六鎮雲中髙平雍秦饑旱明年改年為和平至六月諸將討吐谷渾什寅遂絶河窮躡之㑹軍大疫乃還是嵗三月流星數萬西行占曰小流星百數四面行者庶人遷之象既而吐谷渾舉國西遁大軍又隨躡之四年九月月犯軒轅十二月犯氐至五年正月月掩軒轅又掩氐東南星皆后妃之府也和平元年正月丁未嵗犯鬼鬼為死喪嵗星人君也是為君有喪事三月月掩軒轅四月戊戌皇太后崩於夀安宮宋志云人間宣言人主帷箔不修故謫見軒轅又五年十一月月犯左執法明年十一月又犯之占曰大臣有憂和平二年征東將軍河東王閭毘薨十月廣平王洛侯薨和平元年十月有長星出於天倉長丈餘饉祥也二年三月熒惑入鬼是謂稼穡不成且曰萬人相食其後定相阻饑宥其田租時三呉亦仍嵗凶旱死者十二三先是元年四月太白犯東井井鬼皆秦分雍州有兵亂自元年六月月犯心大星三犯前後于房心宋分時宋君虐其諸弟後宮多喪子女繼夭哭泣之聲相再是嵗詔諸將討雍州叛氐大破之宋雍州刺史海陵王休茂亦稱兵作亂間嵗而宋主殂嗣子淫昏政刑紊焉先是元年十月太白入氐占曰兵起後宮有白衣㑹三年五月嵗星犯上將占曰上將憂之三年八月月犯哭星皆宋祥也是嵗樂良王萬夀及征東大將軍常山王素並薨二年三月辛巳有長星出天津色赤長匹餘滅而復出大小百數天津帝之都船所以渡神通四方光大且衆為人君之事天象若曰是將有千乘萬騎之舉而絶逾大川矣是月發卒五千餘通河西獵道後年八月帝校獵于河西宋主亦大閱舟師廵狩江右云二年九月太白犯南斗斗吳分占曰君死更政大臣有誅者十一月太白犯填填女君也且曰有内兵白衣㑹至三年九月火犯積尸占曰貴人憂之斧鉞用十月太白犯嵗星嵗為人君而以兵喪干之且有死君簒殺之禍是月熒惑守軒轅占曰女主憂之宮中兵亂十一月嵗入氐氐為正寢嵗為有國之君占曰諸侯王有來入宮者五年二月月入南斗魁中犯第四星占曰大人憂太子傷宮中有自賊者又大赦既而宋孝武及宋后相繼崩殂少主荐誅輔臣釁連戚屬羣下相與殺之而立宋明帝江南大饑且仍有肆眚之令焉先是三年六月太白犯東井七月火入井四年五月金火皆犯上相五年六月火又入井占曰大臣憂斧鉞用六年七月月犯心前星是月宋殺少主其後有乙渾之難五年七月丁未嵗星守心心為明堂嵗為諸侯為長子入而守之立君之象占曰凡五星守心皆為宮中亂賊羣下有謀立天子者七月己酉有流星長丈餘入紫微經北辰第三星而滅占曰有大喪九月丁酉火入軒轅十一月長星出織女色正白彗之象也女主專制將由此始是以天視由之長星彗之著易政之漸焉冬熒惑入太微犯上將十二月遂守之占曰公侯謀上且有斬臣六年正月乙未有流星長丈餘自五車抵紫宮西蕃乃滅天象若曰羣臣或修霸刑而干蕃輔之任矣且占曰政亂有竒令四月太白犯五諸侯占曰有專殺諸侯者五月癸卯上崩于太華殿車騎大將軍乙渾矯詔殺尚書楊寶年等于禁中戊申又害司徒平原王陸麗明年皇太后定䇿誅之太后臨朝自馮氏始也或曰心為宋分是嵗六月嵗星晝見于南斗斗為天祿吳分也天象若曰或以諸侯干君而代奪之是冬宋明帝以皇弟踐阼孝武諸子舉兵攻之四方響應尋皆伏誅有太白之刑與嵗星之祐焉是嵗三月有流星西行不可勝數至明乃止至六月己卯又有流星多西南行星衆而小庶人象也星之所首人將從之及宋討孝武諸子大兵首自尋陽進平荆雍其後張永之師敗績于呂梁魏師盡舉淮右俘其人又西南行之效也顯祖天安元年正月戊子太白犯嵗星嵗農事也肅殺干之是為稼穡不登六月熒惑犯鬼占曰旱饑疾疫金革用八月丁亥太白犯房占曰霜雨失節馬牛多死九月甲寅熒惑犯上將太白犯南斗第二星占曰貴人將相有誅者十一月己酉太白又犯嵗星或曰嵗為諸侯太白主兵刑之政再干之事洊也是嵗九月州鎮十一旱饑十月宋氏六王皆戮死明年宋師敗于呂梁江南阻饑牛且大疫其後東平王道符擅殺副將及雍州刺史據長安反詔司空和其奴討滅之九月詔賜六鎮孤貧布帛宋主以後宮服御賜征北將士後嵗夏旱河决州鎮二十七皆饑尋又天下大疫元年六月太白犯左執法十月火又犯之占曰大臣有憂霸者之刑用是嵗六月月犯井十月又掩之皇興元年正月月犯井北轅第二星八月又蝕之占曰貴人當之有將死水旱祥也道符作亂之明年司空和其奴太宰李峻皆薨皇興元年四月太白犯嵗星占曰有攻城略地之事六月壬寅太白犯鬼秦分也二年正月太白犯熒惑占曰大兵起是時鎮南大將軍尉元征南大將軍慕容白曜畧定淮泗明年徐州羣盗作亂元又討平之後嵗正月上黨王觀西征吐谷渾又大破之二年九月癸卯火犯太微上將占曰上將誅先是元年六月熒惑犯氐是嵗十一月太白又犯之是為内宮有憂逼之象占曰天子失其宮四年十月誅濟南王慕容白曜明年上迫於太后𫝊位太子是為孝文帝宋志以為先是比年月頻犯左角占曰天子惡之及上遜位而宋明帝亦殂髙祖延興元年十月庚子月入畢口畢魏分占曰小人罔上大人易位國有拘主反臣十二月辛卯火犯鈎鈐鈎鈐以綂天駟火為内亂天象若曰人君失馭或以亂政乘之矣乙巳鎮星犯井天井者天下之平也而女君以干之是為后竊刑柄占曰天下無主大人憂之有過賞之事焉二年正月月犯畢丙子月犯東井庚子又如之占曰天下有變令貴人多死者三年八月月犯太微又羣陰不制之象也是時馮太后宣淫于朝昵近小人而附益之所費以鉅萬億計天子徒尸位而已二年九月河間王閭虎皮以貪殘賜死其後司空東平郡王陸麗坐事廢為兵既而宫車晏駕或曰月入畢口為赦令二年正月曲赦京師及秦梁諸鎮星及月犯井皆為水災且旱祥也是嵗九月州鎮十一水旱詔免其田租開倉賑乏四年九月己卯月犯畢七月丙申太白犯嵗星在角丁卯太白又入氐太白有母后之幾主兵喪之政以干君於外朝而及其宿宮是將有劫殺之虞矣二月癸丑月犯軒轅甲寅又犯嵗星月為彊大之臣為主女之象始由后妃之府而干少陽之君示人主以戒敬之備也五年三月甲戍月掩填星天象若曰是又僻行不制而棄其紀綱矣且占曰貴人彊死天下亂三月癸未金火皆入羽林占曰臣欲賊主諸侯之兵盡發八月乙亥月掩畢十一月月入軒轅食第二星至承明元年四月月食尾五月己亥金火皆入軒轅庚子相逼同光皆后妃之謫也天若言曰母后之釁㡬貫盈矣人君忘祖考之業慕匹夫之孝其如宗祀何是時獻文不悟至六月暴崩實有酖毒之禍焉由是言之皇天有以覩履霜之萌而為之成象久矣其後文明皇太后崩孝文皇帝方修諒陰之儀篤孺子之慕竟未能述宣春秋之義而懲供人之黨是以胡氏循之卒傾魏室豈不哀哉或曰太白犯嵗於天門以臣伐君之象金火同光又兵亂之徴時宋主昬狂公侯近戚寃死相繼既而桂陽建平王並稱兵内侮矢及宫闕僅乃戡之尋為左右楊玉夫等所殺或曰月犯嵗鎮金火入軒轅皆饉祥也月掩畢主邊兵四年州鎮十三饑又比嵗蝗旱太和元年雲中又饑開倉賑之先是四年四月丙午有大星西流殷殷有聲十一月辛未又如之是嵗五月宋桂陽王反于江州間嵗沈攸之反于江陵皆為大兵西伐時以江南内攜又詔五將伐蜀太和元年五月庚子太白犯熒惑在張南國之次也占曰其國兵喪並興有軍大戰人主死壬申水土合于翼皆入太微主令不行之象也占曰女主持政大夫執綱國且内亂羣臣相殺九月丁亥太白晝見經天光色尤盛更姓之祥也二年九月火犯鬼占曰主以淫泆失政相死之三年三月月犯心心為天王又宋分三月填星逆行入太微留左掖門内占曰土守南宫必有破國易代逆行者事逆也自元年三月至二年六月月行五犯太微與劉氏簒晋同占又自元年八月至三年五月月行六犯南斗入魁中斗為大人夀命且呉分是時馮太后專政而宋將蕭道成亦擅威福之權方圖劉氏宋司徒袁粲起兵石頭沈攸之起兵江陵將誅之不尅皆為所殺三年四月竟簒其君而自立是為齊帝是年五月又害宋君于丹陽宫又元年十月月犯昴為刑獄事二年六月月犯房占曰貴人有誅者或曰月犯斗亦大臣之謫也其後李惠伏誅宜都長樂王並賜死又元年二月壬戍月在井暈參畢两河五車占曰大赦至八月大赦天下三年正月壬子又暈觜參昴畢五車東井至十月大赦天下三年自五月至十二月月三入斗魁中四年五月庚戍七月己巳又如之六年二月又犯斗魁第二星占曰其國大人憂不出三年七月丁未十月丙申月再犯心大星自四年正月至六年二月又五干之斗為爵祿之柄心為布政之宮月行干而轥之亦以荐矣其占曰月犯心亂臣在側有亡君之戒人主以善事除殃是時馮太后將危少主者數矣帝春秋方富而承事孝敬動無違禮故竟得无咎至六年三月而齊王殂焉或曰月犯斗其國兵憂心又豫州也時比嵗連兵南討五年二月大破齊師于淮陽又撃齊下蔡軍大敗之先是三年八月金犯軒轅四年二月又犯軒轅第二星六年正月又犯軒轅大星八月又犯軒轅左角左角后宗也是時太后淫亂而幽后之姪娣又將薄德天若言曰是無周南之風不足訓也故月太白驟干之三年九月庚子太白犯左執法十一月丙戍月犯之四年二月辛巳月又犯之九月壬戌太白又犯之五年二月癸卯月犯太微西蕃上將至六年十月乙酉熒惑又犯之夫南宮執法所以糾淫忒成肅雍而上將朝廷之輔也天象若曰王化將弛淫風㡬興固不足以令天下矣而廷臣莫之糾弼安用之文明太后雖獨厚幸臣而公卿坐受榮賜者費亦巨億盖近乎素餐焉其三年九月安樂王長樂下獄死隴西王源賀薨四年正月廣川王畧薨襄城王韓頺徙邊七月頓丘王李鍾葵賜死其後任城王雲中山王叡又薨比年死黜相繼盖天謫存焉四年春月又掩火亦大臣死黜之祥也又比年月再犯昴亦為獄事與白衣之會也五年九月辛巳塡犯辰星于軫占曰為饑為内亂且有壅川溢水之變是嵗京師大霖雨州鎮十二饑至六年七月丙申又大流星起東壁光明燭地尾長二丈餘東壁土功之政也是月發卒五萬通靈丘道十月己酉有流星入翼尾長五丈餘七星中州之羽儀翼南國也天象若曰將擇文明之士使于楚邦焉明年員外散騎常侍李彪使齊始通二國之好焉四年正月丁未月在畢暈參井五車赦祥也四月幸廷尉獄錄囚徒明年二月大赦是月月在翼有偏日暈侵五車東井軒轅北河鬼至北斗紫垣攝提六年正月癸亥月在畢暈參両肩五車胃昴畢至甲戍天下大赦江南嗣君即位亦大赦改元七年六月庚午辰時東北有流星一大如太白北流破為三叚十月己亥星隕如虹是時太后專朝且多外嬖雖天子由倚附之故有干明之謫焉破而為三席勢者衆也昔春秋星隕如雨而羣隂起霸其後漢成帝時旰日晦冥衆星行隕燿燿如雨而王氏之禍萌至是天妖復見又與元后同符矣十年八月辰時有星落如流火三道戊寅又有流星出日西南一丈所西北流大如太白至午西破為二叚尾長五尺復分為二入雲間仍見者事荐也後代其踵而行之以至於分崩離析乎先是七年十月有客星大如斗在參東似孛占曰大臣有執主之命者且嵗旱糴貴十年九月熒惑犯嵗星嵗主農事火星以亂氣干之五稼旱傷之象也占曰元陽以饉人不安自八年至十一年黎人阻饑且仍嵗災旱八年正月辛巳月在畢暈井嵗星觜參五車占曰有赦糴貴其年六月大赦冬州鎮十五水旱人饑九年正月月在參暈觜參両肩五車為大赦為水戊申月犯井為水祥也是嵗冀定數州大水人有鬻男女者京師及州鎮十三水旱傷稼明年大赦十一年三月丁亥火土合于南斗填為履霜之漸斗為經始之謀而天視由之所以為大人之戒也占曰其國内亂不可舉事用兵是時齊主持諸侯王酷甚雖酒食之饋猶裁之有司故天若言曰非所以保根固本以貽長代之謀也内亂由是興焉五月丁酉太白經天晝見庚子遂犯畢畢又邊兵也是時蠕蠕宼邊明年齊將陳逹伐我南鄙陷澧陽間嵗而齊君子子響為有司所御遂憤怒而反伏誅及齊王殂而西昌侯簒之髙武子孫所在棊布皆拱手就戮亦齊君自為之焉十一年六月乙丑月犯斗丙寅遂犯建星亦圗始之謀也十二年七月月犯牛十三年六月又掩之明年八月又犯之牛主吳分占曰國有憂大將戮亦江南兵饉之徴也七月癸丑太白犯軒轅大星八月甲寅又犯之皆女君之謫也天象若曰軒轅以母萬物由后妃之母兆人也是固多穢復將安用之其物類之感又稼穡之不滋候也是嵗年榖不登聽人出關就食明年州鎮十五皆大饑詔開倉賑乏間嵗太后崩是嵗月三入井金又犯之占曰陰陽不和不為水患且大旱其後連年亢陽而吳中比嵗霖雨傷稼也十二年三月甲申嵗星逆行入氐甲申皆齊分也占曰諸侯王而升為天子者逆行者其事逆也先是去年十月嵗辰太白合于氐是謂驚亡絶行改入王公是嵗四月月犯氐與嵗同舎六月丁巳月又入氐犯嵗星月為彊大之臣嵗為少君也與嵗同心内宮而干犯之彊宗擅命逼奪其君之象也再干之其事荐至十三年三月庚申月犯嵗十五年六月又犯之嵗星不在宿宮是為彊侯之譴江南太子賢王相次薨殁既而齊武帝殂太孫幼沖西昌輔政竟殺二君而簒之月再犯于氐及逆行之效也或曰月犯木饑祥也時比嵗稼穡不登又十二年正月戊戍月犯左角十一月丙寅又如之七月金又犯左角角為外朝且兵政也占曰不出三年天下有兵主子死大君惡之至十四年有子響誅間嵗而齊室亂十二年四月癸丑月火金㑹于井辛酉金犯火甲戍火水又俱入井皆雨暘失節萬物不成候也且曰王業將易諸侯貴人多死是嵗月行四入氐十月辰星入之閏月丁丑火犯氐乙卯又入之占曰大旱嵗荒人且相食國易政君失宮遠期五年氐又女君之府也是嵗兩雍及豫州旱饑明年州鎮十五大饉至十四年太后崩時江南北連嵗災雨至十七年有刧殺之禍誅死相踵焉是嵗月三犯房十三年四月又犯之七月至十月再犯鍵閉占曰有亂臣不出三年伐其主自十二年六月至十四年八月再犯牛又再掩之凡六犯牛且掩之牛為吳越饉祥也畢魏分且曰貴人多死免者十二年九月司徒淮南王佗薨十三年光州人王泰反章武汝陰南安三王皆坐贓廢安豐王猛司空荀頽並薨十四年地豆干及庫莫奚頻犯塞京兆王廢為庶人魏書卷一百五之三魏書卷一百五之三考證志第三魏収書天象志第一卷載天及日變第二卷載月變第三卷四卷應載星變今此二卷天日月星變編年總繋魏及南朝禍咎蓋魏収志第三第四卷亡後人取他人所撰志補足之魏澹書世已無本据目錄作西魏帝紀而元善見司馬昌明劉裕蕭道成皆入列傳此志主東魏而晉宋齊梁君皆稱帝號亦非魏澹書明矣唐書經籍志有張太素魏書一百卷故世人疑此二卷為太素書志崇文總目有張太素魏書天文志二卷今亦亡矣唯昭文館有史館舊本魏書志第三卷前題朝議郎行著作郎修國史張太素撰太素唐人故諱世民等字太宗神瑞四年月犯嵗星在角月字下北監本脫犯字今從南監本増入世祖始光元年大流星出天將軍天當作大世祖神䴥三年又明盛之徴注秦有兵喪而至秦夏出夷威此十一字不可讀疑有脱訛世祖真君三年追至頓根河頓根河本書蠕蠕𫝊作頞根河髙祖太和十年占曰元陽以饉人不安元應作亢魏書卷一百五之三考證欽定四庫全書魏書卷一百五之四齊魏收撰志第四天象一之四太和十二年十一月戊午太白犯嵗又犯火喪疾之祥占曰國無兵憂則君有白衣之㑹景寅火又犯木占曰内無亂政則主有喪戚之故十二月壬寅太白犯塡占曰金爲喪祥后妃受之十三年二月熒惑犯填占曰火主凶亂女君應之皆文明太后之謫也先是十一年六月甲子嵗星晝見十二月甲戌又晝見是嵗六月又如之歳而麗于大明少君象也是時孝文有仁聖之表而太后分權以干冒之及帝春秋方壯始將經緯禮俗財成國風故比年女君之謫屢見而嵗星􅐛盛至于不可掩奪矣且占曰木晝見主有白衣之㑹是嵗九月丙午有大流星自五車北入紫宮抵天極有聲如雷占曰天下大凶國有喪宮且空夫五車君之車府也天象若曰是將以喪事有千乘萬騎而舉者大有聲其事昭盛至十四年三月填星守哭泣占曰將以女君有哭泣之事四月丙申火犯鬼喪祥也六月有大流星從紫宮出西行天象又曰人主將以喪事而出其宮八月月太白皆犯軒轅九月癸丑而太皇太后崩帝哭三日不絶聲勺飲不入口者七日納菅屨徒行至陵其反亦如之哀毁骨立杖而後起雖殊俗之萌矯然知感焉自九月至于歳終凡四謁陵又荐出紫宮之驗也十四年十一月月犯填星十二月月犯軒轅十五年十月月犯填又犯軒轅八月又犯之九月月掩填星十七年正月月又犯軒轅皆女君之象也是時林貴人以故事薨及馮貴人為后而其姉譖之至二十年竟坐廢黜以憂死幽后繼立又以淫亂不終十三年十二月戊戌填星辰星合于須女女齊吳分占曰是爲雍沮主令不行且有陰親者至十四年三月庚申歳星守牛占曰其君不愛親戚貴人多喪又饉祥也是嵗太白三犯熒惑十月太白入氐十一月有大流星從南行入氐甲申齊邦之物也金火相鑠為兵喪為大人之讁天象若曰宿宮有兵喪之故盛大者循而殘之處其寢廟之中矣至十五年三月壬子歳犯填在虗三月癸巳木火土三星合宿于虛甲午火土相犯虛齊也占曰其國亂專政内外兵喪故立侯王九月乙丑太白犯斗第四星戊子有大流星起少微入南宮至帝坐主有盛大之臣乘賢以侮其君者且占曰大人易政至十七年正月戊辰金木合于危危亦齊也是爲人君且罹兵喪之變四月戊子太白犯五諸侯占曰有擅刑以殘賊諸侯者至七月齊武帝殂西昌侯以從子干政竟殺二君而自立是爲齊明帝於是高武諸子王侯數十人相次誅夷殆無遺育矣雖繼體相循實有凖命之禍故天讁仍見云自十五年至十七年月行七犯建星建星為忠臣之輔經代之謀又吳之分也十五年再犯牽牛十六年至十七年又四犯南斗是謂臣干天祿且曰大人多死者又十五年七月金入太微十七年火入太微宮反臣之戒是嵗月行四入太微十七年六入太微比嵗凡十干之而齊君夷其宗室亦積忍酷甚也十五年四月癸亥熒惑入羽林十六年二月壬子太白入羽林占曰天下兵起三月己卯四月丙午五月甲戌十月辛卯月行皆入羽林十七年四月壬寅八月辛卯十二月辛巳又如之先是陽平王頤綂十二將軍騎士七萬北討蠕蠕是嵗八月上勒兵三十餘萬自將擊齊由是比嵗皆有事于南方十五年三月月掩畢十一月又犯之十六年五月及七月月再入畢八月十一月又再犯之十七年八月又入畢畢為邉兵占曰貴人多死十五年六月濟陰王鬱賜死十七年南平王霄三老尉元皆死十八年安定王休死十九年司徒馮誕太師馮熙廣川王諧皆死十七年二月庚戌火土合于室室星先王所以制宮廟也熒惑天視填為司空聚而謀之其相宅之兆也且緯曰人君不失善政則火土相扶卜洛之業庶㡬興矣是歳九月上罷擊齊始大議遷都冬十月詔司空穆亮將作董邇繕洛陽宮室明年而徙都之於是更服色殊徽號文物大備得南宮之應焉凡五星分野熒惑綂朱鳥之宿而填以軒鼓寓之皆周鶉火之分室又并州之分是為歩自并州而經始洛邑之祥也十七年二月丁丑太白犯井辛丑又犯鬼五月戊午晝見九月又如之是謂兵祥雍州也是月火木合于婁婁爲徐州占曰其地有亂萬人不安八月辛巳熒惑入井占曰兵革起明年二月詔征南將軍薛眞度督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉薛出南鄭皆兩雍徐方之分後年正月平南王肅大敗齊師于義陽降者萬餘己亥上絶淮登八公山並淮而東及鍾離乃還至十九年六月庚申金木合于井七月火犯井三十一年十一月大敗齊師于沔北明年春復大破之下二十餘城於是悉定沔漢諸郡時江南偽立雍州於襄陽以總牧西土遺黎故與東井同候十八年四月甲寅熒惑入軒轅后妃之戒也是時左昭儀得幸方譖訴馮后上蠱而惑之故天若言曰夫膚受之微不可不察亦自我天視而降鑒焉至十九年三月月犯軒轅二十年七月辛巳又掩填星是月馮后竟廢尋以憂死而立左昭儀是爲幽后明年追廢林貞后爲庶人二十二年正月月又掩軒轅十一月又彗星起軒轅歴鬼南及天漢天又若曰是固多穢徳宜其彗除矣行歴鬼又疆死之徴明年幽后賜死也十九年六月壬寅熒惑出于端門占曰邦有大獄君子惡之又更紀立王之戒也明年皇太子恂坐不軌黜爲庶人至二十一年十月壬午熒惑歳星合于端門之内歳爲人君火主死喪之禮而陳于門庭大喪之象也二十二年二月乙丑木火合于掖門内是夕月行逮之三月丙午木火俱出掖門外再合一相犯月行逮之后妃預有咎焉明年四月宮車晏駕夫太微禮樂之庭也時帝方修禮儀正喪服以經人倫之化竟未就而崩少君嗣立其事復寢縉紳先生咸哀慟焉故天視奉而修之是以徘徊南宮蓋皇天有以著慎終歸厚之情或曰合于天庭南方有反臣之戒是時齊明帝殂比及三年而亂兵四交宮掖既而蕭衍戡之竟覆齊室云二十二年十一月有流星照地至天津而滅占曰將有樓船之攻人君以大衆行二十二年而上南伐是嵗之正月有流星大如三斗瓶起貫索東北流光燭地經天棓乃滅有聲如雷天棓天子先驅也占曰國中貴人有死者且大赦至三月上南征不豫詔武衛元嵩詣洛陽賜皇后死世宗景明元年四月壬辰有大流星起軒轅左角東南流色黄赤破為三段狀如連珠相隨至翼左角后宗也占曰流星起軒轅女主後宮多讒死者翼爲天庭之羽儀王室之蕃衛彭城國焉又占曰流星于翼貴人有憂繫是時彭城王忠賢且以懿親輔政借使世宗諒陰恭已而修成王之業則高祖之道庶㡬興焉而阿倚母族納高肇之譖明年彭城王竟廢後數年高氏又鴆于后而以貴嬪代之由是小人道長讒亂之風作矣夫天之風戒肇于履端之始而沒身不悟以傷魏道豈不哀哉或曰軒轅主后土之養氣而庇祐下人也故左角謂之少人焉天象若曰人將喪其所以致養幾至流亡離析矣是歳北鎮及十七州大饉人多就食云是嵗十二月癸未月暈太微既而有白氣長一丈許南抵七星俄而月復暈北斗大角為君以兵自衛又赦祥也且為立君之戒時蕭衍立少主於江陵改元大赦尋伐金陵以長圍逼之又二年正月月暈井參觜昴五車占曰貴人死大赦是嵗廣陵王羽薨二月至秋再大赦二年正月己未金火俱在奎光芒相掩為兵喪爲逆謀大人憂之野有破軍殺將奎徐方也三月丁巳有流星起五諸侯入五車至天潢散絶為三光明燭地五車所以輔衰替之君也流星自五諸侯干之諸侯且霸而修兵車之㑹分而為二距乏疑之君幾將並立焉魏收以為流星出五車諸侯有反者至五月咸陽王禧謀反賜死戊午填星在井犯鉞相去二寸占曰人君有戮死者時蕭衍起兵襄陽將討東昏之亂是月推南康王寳融為帝踐阼于江陵於是齊有二君矣至八月戊午金火又合于翼楚分也十一月甲寅金水俱出西方占曰東方國大敗時蕭衍已舉夏口平尋陽遂沿流而東東主之師連戰敗績於是長圍守之十二月齊將張稷斬東昏以降又戮主之徵至三年正月火犯房北星光芒相接癸巳填星逆行守井北轅西星皆大臣賊主更政立君之戒也三月金水合於須女女齊分金水合為兵誅二月丁酉有流星起東井流入紫宮至北極而滅東井雍州之分衍慿之以興且西君之分使星由之以抵辰極是為禪受之命且為大喪是月齊諸侯相次伏誅既而西君錫命衍受禪于建康是為梁武帝戊辰而少主殂自二年至三年月六掩犯斗魁七月火犯斗皆呉分也時江南北嵗大饉又連兵北鄙負敗相迹又二年七月暈婁内青外黄轢昴畢天船大陵卷舌奎船為徐魯又赦祥也且曰多死喪三月青齊徐兗餓死萬餘人七月大赦三年八月月暈外青内黄轢昴畢婁胃五車占曰貴人多死十二月月犯昴環月太傅平陽王丕薨後年正月大赦三年八月丙戌有大流星起天中北流大如二斗器占曰有天子之使出自中京以臨北方至四年九月壬戌有大流星起五車東北流占曰有兵將首于東北是嵗二月辛亥三月丁未月再掩太白皆大戰之象也庚辰揚州諸將大破梁師于陰陵十一月左僕射源懐以便宜安撫北邉明年二月又大破梁師于邵陵九月蠕蠕犯邉復詔源懐撃之是嵗七月月暈昴畢觜參井五車占曰旱大赦又再暈軒轅太微明年正月月暈五車東井兩河鬼填星是月大赦改元六月以亢陽詔撤樂減膳正始元年正月戊辰流星如斗起相星入紫宮抵北極而滅夫紫宮后妃之内政而由輔相干之其道悖矣且占曰其象著大有非常之變至二年六月癸丑有流星如五斗器起織女抵室而滅占曰王后憂之有女子白衣之㑹往反營室釁歸後庭焉三年正月己亥有大流星起天市垣西貫紫蕃入北極市垣之西又公卿外朝之理也占曰以臣犯主天下大凶明年高肇欲其家擅寵乃鴆殺于后及皇子昌而立高嬪為后先是景明四年七月太白犯軒轅大星至二年六月木犯昴占曰人君有白衣之㑹同上三年六月丙辰太白晝見占曰陰國之兵彊八月梁師宼邉攻陷城邑秋九月安東將軍邢巒大破之宿豫斬將三十餘人捕虜數萬十月甲寅月犯太白又大戰之象明年中山王英敗績于淮南士卒死者十八九又元年正月月暈胃昴畢五車戊午又暈五車東井两河鬼填星二月甲申又暈昴畢觜參三年正月月暈太微軒轅皆為兵赦是月皇子生大赦天下四年七月己卯有星孛于東北占曰是謂天讒大臣貴人有戮死者凡孛出東方必以晨乘日而見亂氣蔽君明之象也昔魯哀公十三年十一月有星孛于東方明年春秋之事終是謂諸夏微弱蠻夷遞霸田氏專齊三族擅晉卒以干其君明而代奪之陵夷遂為戰國天下横流矣今孛星又見與春秋之象同天戒若曰是居太陽之側而干其明者固多穢徳可彗除矣而君不悟衰替之萌將繇此始乎是嵗高肇鴆后及皇子明年又譖殺諸王天下寃之肇故東夷之俘而驟更先帝之法累構不測之禍干明孰甚焉魏氏之悖亂自此始也永平元年三月戊申熒惑在東壁月行抵之相距七寸光芒相及室壁四輔君之内宮人主所以庇衛其身也天象若曰且有重大之臣屏藩王室者將以讒賊之亂死於内宮又曰諸侯相謀三月癸未填星逆行太微在左執法西是為后黨持政大夫執綱而逆行侮法以啓蕭牆之内是月月犯畢六月又掩之占曰貴人有死者庚辰太白嵗星合于栁柳為周分且占曰有内兵以賊諸侯八月京兆王愉出為冀州刺史恐不見容遂舉兵反以誅尚書令高肇為名與安樂王詮相攻于定州九月太師彭城王斃于禁中愉亦死之或曰栁豫州分所合之野謀兵有戰野拔邑事至十一月丙子流星起羽林南大如椀色赤有黒雲東南引如一匹布横北轢星占曰禁兵起所首召之是嵗豫州人白早生殺刺史司馬悦以城降梁遣尚書邢巒撃之十二月巒拔懸瓠斬早生二年三月丁未有流星徑數寸起自天紀孛于市垣光芒燭地有尾跡長丈餘凝著天天象若曰政失其紀而亂加乎人浸以萌矣是將以地震為徴地震者下土不安之應也是月火入鬼距積尸五寸積尸人之精爽而炎氣加之疫祥也四月乙丑金入鬼去積尸一寸又以兵氣干之彊死之祥也踰逼者事甚鬼主驕亢之戒故金火荐災其人以警而懼之五月太白犯嵗光芒相觸占曰兵大亂嵗饑不出三年七月庚辰有流星起騰虵入紫宮抵北極而滅天戒若曰彼光後王道者疑以馭陰陽之變矣將有水旱之沴地震之祥而後災加皇極焉明年夏四月平陽郡大疫死者㡬三千人平陽鬼星之分也秋州郡二十大水冀定旱饑四年朐山之役喪師殆盡其後繁畤桑乾靈丘秀容鴈門地震陷裂山崩泉涌殺八千餘人延昌三年詔曰比嵗山鳴地震于今不已朕甚懼焉至正月宮車晏駕七年十一月丙戌月掩畢火星至三年八月火犯積尸占曰貴人死又饑疫祥也比年水旱災疫是月中山王略薨明年春司徒廣陽王嘉薨二年九月甲申嵗星入太微距右執法五寸光明相及十二月乙酉逆行入太微掩左執法三年閏月壬申又順行犯之相去一寸保乾圖曰臣擅命嵗星犯執法是時高肇方為尚書令故嵗星反復由之所以示人主也天若言曰政刑之命亂矣彼居重華之位者盍將反復而觀省焉今雖厚而席之適所以為禍資耳且占曰中坐成刑遠期五年間五嵗而肇誅四年四月庚午熒惑犯軒轅大星至五月入太微距右執法三寸光芒相接熒惑天視也始由軒轅而省執法之位其象若曰是居后黨而擅南宮之命君其降監焉其應與嵗星同也四年正月戊戌有流星起張西南行殷殷有聲入參而滅張河南之分參為兵事占曰流星自東方來至代而止有來兵大敗吾軍有聲者怒也先是去年十一月月犯太白是嵗又犯之在胃八月辛酉又犯之胃為徐方大戰之象也十月戊寅有大流星孛于羽林南流色赤珠落下入濁氣孛然而流王師潰亂之兆先是梁朐山鎮殺其將來降詔徐州刺史盧昶援之十二月昶軍大敗於淮南淪覆十有餘萬是嵗七月乙巳有流星起北斗魁前西北流入紫宮至北極而滅占曰不出期年兵起且亡君戒是嵗有胊山之役間嵗而帝崩四年十二月己巳嵗星犯房上相相距一寸光芒相及至延昌元年三月丙申嵗星在鈎餘東五寸距鍵閉三寸丙午又掩房上相天象若曰夫鈐鍵之轡君上所宜獨操非驂服所當共也先是高肇為尚書令而嵗星三省執法是嵗至升為司徒猶怏怏不悦而嵗星又再循之所以示人主審矣閒二嵗而上崩肇亦誅滅或曰木與房合主喪水又元年二月月暈井鬼軒轅十月又暈井五車參畢皆水旱饑赦之祥自元年二月不雨至六月雨大水二年四月庚子出絹十五萬匹賑河南飢人是夏州郡十二大水八月減天下殊死二年四月庚午熒惑犯軒轅大星十月壬申月失行犯軒轅大星至延昌元年三月填星在氐守之九十餘日占曰有徳令拜太子女主不居宮至十月立皇太子賜為父後者爵旌孝友之家至二年三月乙丑填星守房占曰女主有黜者以地震為徴地震者陰盈而失其性也四月丙申月掩填星七月戊午又如之是為后妃有相遷奪者且曰女主死之時比嵗地震至三年八月太白又犯軒轅十二月月掩熒惑皆小君之譴也時高后席寵凶悍雖人主猶畏之莫敢動搖故世宗𦙍嗣㡬絶明年上崩后廢為尼降居瑤光寺尋為胡氏所害以厭天變也延昌元年八月己未有流星起五車西南流入畢畢邉兵也占曰有兵車之事以所直名之至二年十一月戊午又有流星起五車西南流殷殷有聲慿怒者事盛也十二月己卯有流星西南流分而為二又偏師之象也至三年六月辛巳太白晝見占曰西兵大起有王者之喪十一月大將軍高肇伐蜀益州刺史傅豎眼出北巴平南羊祉出涪安西奚康生出綿竹撫軍甄琛出劍閣㑹帝崩旋師先是元年三月己酉木土相犯占曰人君有失地者將死之又曰先作事者敗兵起必受其殃三年九月太白掩右執法是為大將軍有罹刑辟者先是二年二月梁郁洲人徐𤣥明斬大將張稷來降及肇出征還亦就戮元年二月乙未有流星起太陽守歴北斗入紫宮抵北極至華蓋而滅太陽守所以弼承帝車大臣之象今使星由之以語天極之位臣執國命將由此始乎且占曰天下大凶主室其空先是去年八月至十月月再入太微是嵗三月又如之十二月甲戌月犯火于太微占曰君死不出三年貴人奪權失勢二年三月辛酉熒惑又犯太微占曰天下不安有立君之戒九月丁卯入太微犯屏星明年正月而世宗崩於是王室遂卑政在公輔三年二月月暈畢昴五車太白東井占主赦是月太白失行在天闗北占有關梁之兵道不通明年正月肅宗立大赦天下二月梁將任大洪帥衆寇關城四年五月庚戌九月乙丑十月癸巳月皆犯太微中嵗而驟干之彊臣不御執法多門之象也閏月戊午月犯軒轅又女主之讁十一月庚寅木火㑹于室相距一尺至甲午火徙居東北亦相距一尺室為後宮火與木合曰内亂環而營之或淫事干逼諸侯之象占曰姦臣謀大將戮若有夷族之害以赦令除之先是三年九月太白犯執法是嵗八月領軍于忠擅戮僕射郭祚九月太后臨朝淫放日甚至逼幸清河王懌其後羽林千餘人焚征西將軍張彜宅事死者百數朝廷不能討於是大赦原羽林亦營室之故也魏收以為月犯太微大臣有死者其後安定王薨月犯軒轅女主憂之其後皇太后高尼崩于瑤光寺營室又主土功也胡太后害高氏以厭天變乃以后禮𦵏之四年十月太白犯南斗斗為吳分占曰大兵起先是三年四月有流星起天津東南流轢虗危天津主水事且曰有大衆之行其後梁造浮山堰以害淮泗諸將攻之是嵗閏月有大犇星起七星南流色正赤光明燭地尾長丈餘歴南河至東井七星河南之分也流星出之有兵起施及東井將以水禍終之又占曰所與城等疑是時鎮南崔亮攻梁師于硤石明年二月鎮東蕭寳夤大破梁淮北軍九月淮堰決梁人十餘萬口皆漂入海肅宗熙平元年三月丙子太白犯嵗星十二月甲辰月犯嵗星是謂彊盛之陰而陵少陽之君嵗又諸侯也天象若曰始由内亂干之終以威刑及之是嵗正月熒惑犯房四月庚子又逆行犯之癸卯月又犯房占曰天下有喪諸侯起覇將相戮十一月大流星起織女東南流長且三丈光明照地占曰王后憂之有女子白衣之會間嵗高太后殂司徒國珍薨中宮再有喪事其後僕射于忠司徒任城王澄薨既而太后幽逼清河中山王戮死或曰月太白犯嵗星饉祥也火犯房陳兵滿野有饑國且大赦又元年十二月月暈井觜參五車占曰水旱有赦至二年正月大赦十月幽冀滄瀛大饑是月月再暈畢參五車占曰饑赦明年幽州大饑死者數千人自正月不雨至六月是嵗四夷反叛兵大出又赦改元二年六月癸丑有大流星出河鼔東南流至牛十一月流星起河鼔色黄赤西南流長且三丈有光照地至神龜元年四月壬子有流星起河鼔西北流至北斗散滅河鼔鼔旗之應也故流星出之兵出入之兵入昔宋泰始初大流星出自河鼔西南行竟夜有小星百數從之既而諸侯同時作亂至是三出河鼔秦州屬國羌及南秦東益氐皆反七月河洲人却䥫怱與羣盜又起自稱水池王詔行臺源子恭及諸將四出征之朝廷多事故天應屢見云神龜二年四月甲戌大流星起天市垣西東南流轢尾光明燭地天象若曰將作大衆而從后妃之事矣以所首名之是嵗九月太后幸崧高或曰市垣所以均國風尾幽州也明年詔尚書長孫稚撫廵北蕃觀省風俗二月丙辰月在參暈井觜參嵗星五車占曰冇死相且赦明年諸王多伏辜又大赦二年八月己亥太白犯軒轅是月月又犯之至正光元年正月月又犯軒轅大星四月庚戌金火合于井相去一尺占曰王業易君失政大臣首亂將相戮死以用師大敗五月丙午太白犯月相距三寸占曰將相相攻秦國有戰七月太白犯角角天門也是為兵及朝廷占曰有謀不成破軍斬將是月侍中元义矯詔幽太后于北宮殺太傅清河王懌八月中山王熙起兵誅元义不克遇害明春衛將軍奚康生謀討义于禁中事泄又死是冬諸將伐氐官軍敗績正光元年九月辛巳有彗星光爛如火出于東方陰動爭明之異也感精符曰天下以兵相威以勢相乘至威疑亂起布衣從衡禍未庸息帝宮其空昔正始中天讒孛于東北是嵗而攝提復周故天象若曰夫讒之亂萌有自來矣彗除之象今則著矣戰國之禍將由此作乎間三年而北鎮肇亂關中迹之自是姦雄鼎沸覆軍相踵其災之所及且二十餘年而猶未弭焉梁志曰九月乙亥有星晨見東方光如火占曰國皇見有内難急兵明年義州反乙亥去辛巳凡六日而北方覿之其氣蓋同矣始干其明以妖南國既又彗而布之以除魏邦二年四月甲辰火土相犯於危十一月辛亥金土又相犯于危危存亡之機太白司兵熒惑司亂而𤣥枵司人土下之所係命也三精洊聚羣臣叶謀以濟屯復之運焉占曰天下方亂甲兵大起王后專制有虗國徙王至四年四月己未火土又相犯于室是謂後宮内亂且占曰欲殺主天子不以夀終或曰魏氏軒轅之裔填星之物也赤靈為母白靈為子經綸建國之命所以傳撥亂之君也其受之者將在并州與有齊之國乎其後太后滛昏天下大壊上春秋方壯誅諸佞臣由是鄭儼等竦懼遂說太后鴆帝既而尒朱氏興于并州終啓齊室之運卜洛之業遂邱墟矣二年十月月掩心大星至三年正月月掩心距星四月丁丑又如之占曰亂臣在側闕四字五年間三嵗而肅宗崩三年七月庚申有大流星如五斗器起王良東北流長一丈許王良主車騎且曰有軍渉河昭盛者事大是日月在昴北三寸十一月乙卯又如之是謂兵加匈奴且胡王之讁也先是蠕蠕阿那瓌失國詔北鎮師納之是嵗八月蠕蠕後主來奔懐朔鎮閒嵗阿那瓌背約犯塞詔尚書令李崇率騎十萬討之出塞三千餘里不及而還三年九月庚戌月暈胃昴畢五車辛亥又暈之占曰闕二字有赦至三年九月月在畢暈昴畢觜參五車是嵗夏大旱十二月大赦三年二月丁卯月掩太白京師不見涼州以聞占曰天下大兵起涼州獨見災在秦也三月癸卯有大流星起西北角流入紫宮破為三段光明照地角星主外朝兵政流星由之將大出師之象若曰將以兵革之故王室分崩入抵紫宮天下大凶有虛國之象四月癸酉有大奔星歴紫微入北斗東北首光明燭地殷然如雷盛怒之象也皆以所直名之至四年八月乙亥月在畢掩熒惑又邉城兵亂之戒也十月乙卯太白入斗口距第四星三寸光芒相掩占曰大兵起將戮辱又吳分也五年正月沃野鎮人破落汗拔陵反臨淮王彧征之敗績于五原六月莫折大提反於秦雍州刺史元志討之又大敗於隴東明年南方諸將頻破梁師至八月杜落周起上谷其後鮮于修禮反定州王師比嵗北征冀方大震既而葛榮承之竟陷河北五年二月月在參暈觜參五車東井熒惑八月又暈之閏月月在張翼再暈軒轅太微占曰兵起士卒多遁走一曰士卒大聚又皆赦祥也是時徴調驟起兵相蹈籍又有詔内外戒嚴將親征自二月至六月再大赦天下十月月在畢暈昴畢觜參後年春又大赦先是二年九月嵗星犯左執法至三年正月癸丑又逆行犯之相去四寸光芒相及五月丙辰嵗星又掩左執法是時宦者劉騰與元义叶謀遂總百揆之任故嵗星反復由之與高肇同占至四年二月騰死义由是失援其年十一月庚戌嵗星犯房上相相距二寸光芒相掩五年四月己丑嵗星又逆行犯之明年皇太后反政义遂廢黜昔高肇為尚書令而嵗星三省之及升于上相嵗星亦再循之至是三犯執法而騰死再干上相而义敗曠官之譴異代同符矣孝昌元年五月太白犯軒轅八月在張角盛大占曰有暴酷之兵張河南也十二月火入鬼又犯之占曰大賊在大人之側后以滛泆失政又秦分也二年正月癸卯金木相犯於牛十一月戊申又相犯于女嵗所以建國均人女為蠶妾牛為農夫天象若曰是將罹以宼戎而喪其耕織之務矣且曰有亂兵大戰而波及齊吳是嵗八月甲申月在胃掩鎮星閏月癸酉又掩之三年正月戊辰又掩之是為女君有罹兵刑之禍者洊干之事甚而衆也又占曰天下大喪无主貴人兵死國以滅亡又二年三月奔星大如斗出紫微東北流光照地占曰王師大出邦去其君六月有奔星如斗起大角入紫宮而滅棟星以肆覲羣后而敷威令于四方也今大號由之以詔天極不以逆乎且有空國徙王之戒焉十月有星入月中而滅占曰入而無光其國卒滅星反出者亡國復立是嵗四月至三年九月熒惑再犯軒轅大星武泰元年正月又逆行復犯之占曰主命將失女君之象亂逆之災三月庚申月掩畢大星占曰邉兵起貴人多死者是時滛風滋甚王政盡㢮自大河而北極關而西覆軍屠邑不可勝計既而蕭寳夤叛于雍州梁師驟伐淮泗連兵青土萬姓嗷嗷喪其樂生之志矣是嵗二月帝竟以暴崩四月尒朱榮以大兵濟河執太后及㓜主沉諸中流害王公以下二干遂專權晉陽以令天下焉三年正月癸酉月在井暈觜參兩河五車七月大赦明年少主立又大赦莊帝永安元年七月癸亥太白犯左角相距四寸光芒相掩兵及朝廷之象占曰大戰不勝貴人有來者其謀不成至二年閏月熒惑入鬼犯積尸占曰兵起西北有鈇鉞之誅是嵗北海王顥以梁師陷考城執濟陽王暉業乘虚逐勝遂入洛陽至七月王師大敗之顥竟戮死有謀不成之驗明年尒朱天光擊反虜万俟醜奴及蕭寳夤于安定克之咸伏誅二年十一月熒惑自鬼入太微西掖門犯上將出東掖門犯上相東行累日句已去來復逆行而西十二月乙丑月又掩之至三年正月癸未逆行入東掖門己丑月入太微襲熒惑辛卯月行太微中又暈之三月己卯在右執法北一尺五寸留十四日至壬辰月又掩之復順行而東四月戊午月又干太微而暈己未熒惑出端門在左執法南尺餘而東自魏興以來未有循環反復若此之荐也是時孝莊將誅權臣有興復魏室之志是以誠發於中而熒惑咨謀於上焉其占曰有權臣之戮有大兵之亂貴人以彊死而天下滅亡至五月己亥太白在參晝見參為晉陽之墟天意若曰干明之釁於是乎在矣七月甲午有彗星晨見東北方在中台東一丈長六尺色正白東北行西南指丁酉距下台上星西北一尺而晨伏庚子夕見西北方長尺東南指漸移入氐至八月己未漸見癸亥滅占曰彗出太階有陰謀姦宄興凡天事為之徴形以戒告人主始滌公輔之穢而彗除之權臣將滅之象再干太陽之明而後陵奪之逆亂復興之象也三月而見者變近亟也究于内宮者反仇其上也近期在衝遠期一年先是二月壬申有大流星相随西北尾迹不絶以千計西北直晉陽之墟而㣲星庶人所以載皇極也人徙而君從之是月戊戌有大奔星自極東貫紫宮而出影迹随之遷君之應至九月上誅太原王榮上黨王天穆于明光殿是夕尒朱氏黨攻西陽門不克退屯河陰十二月洛陽失守帝崩于晉陽自是南宮板蕩劫殺之禍相踵先是永安元年七月丙子十一月丙寅十二月癸巳月皆掩畢大星至二年三月乙卯月入畢口八月乙丑又距畢左股二寸光芒相掩須臾入畢口十二月丙辰掩畢右股大星三年六月乙巳又犯畢大星八月庚申入畢口犯左股大星是月辛丑太白犯軒轅明年五月月又犯畢右股遂入之畢星所以建魏國之命也占曰天下有變其君大憂邉兵起上將戮月洊干之事甚而衆及爾朱兆作亂奉長廣王為主號年建明明年二月又廢之而立節閔六月高歡又推安定王為帝於信都復黜之後更立武帝於是三少王相次崩殂又洛陽再陷六宮汗辱有兵及軒轅之效焉永安二年十月辛亥十二月丁巳月皆在畢暈昴畢填星觜參五車普泰元年正月己丑月在角暈軫角五車亢連環暈北斗大角織女十月又暈昴畢觜參井五車是時肄赦之令嵗月相踵節閔普泰元年五月辛未太白出西方與月並間容一指戰祥也先是去年十一月辛丑月在太白北不容一指占曰有破軍殺將主人不勝既而尒朱氏南侵王師敗績至是又與月合㡬將復之乎十月甲寅金火嵗土聚于觜參甚明大晉魏之墟也且曰兵喪並起霸君興焉是時渤海王歡起兵信都改元中興至十一月己卯奔星如斗起太㣲東北流光明燭地有聲如雷占曰大臣有外事以所首事命之或曰中國失君有立王遷主著而有聲者盛怒也是時尒朱氏成師北伐明年三月癸巳火逆行犯氐占曰天子失其宮閏月庚申嵗星入鬼犯天尸占曰有戮死之君既而尒朱兆等大敗于韓陵覆師十餘萬四月武帝即位比及嵗終凡殺三廢帝孝武永熙元年九月太白經天十一月辛丑有大流星出昴北東南流轢畢貫參光明照地有聲如雷天象若曰將有髦頭之兵慿陵塞垣與大司馬合戰明年正月丁酉渤海王歡追撃兆等于赤洪嶺大破之尒朱氏殲焉二年四月太白晝見九月丁酉火木合于翼相去一寸光芒相掩占曰是謂内亂姦臣謀人主憂甲寅金火合于軫相去七寸光芒相及占曰是謂相鑠不可舉事用兵翼軫南宮之蕃又荆州也至三年三月癸巳有奔星如三斛甕起匏𤓰西流入市垣有光燭地迸流如珠尾跡數丈廣且三尺凝著天狀如蒼白雲須臾屈曲蛇行匏𤓰為陰謀星大如甕為發謀舉事光盛且大人貴而衆也以所首名之且為天飾王者更均封疆是時斛斯椿等方說上伐高歡荆州刺史賀拔岳預謀焉高歡知之亦以晉陽之甲來赴七月上自將十餘萬次河橋望歡軍憚之不敢戰遂西幸長安至十月渤海王更奉孝静為主改元天平由是分為二國更均封疆之應也是月歡命侯景攻荆州拔之勝南奔是年三月庚子木逆行在左執法北一寸光芒相掩五月甲申又在執法西半寸乍見乍不見占曰強臣擅命改政更元十二月上崩由是高歡宇文泰擅權兩國又二年十一月乙丑三年八月庚午十二月庚申月皆在畢暈畢昴參五車自三年二月至明年正月東西魏凡四大赦三年五月己亥熒惑逆行掩南斗魁第二星遂入斗口先是元年十一月熒惑入斗十餘日出而逆行復入之六十日乃去斗大人之事也占曰中國大亂道路不通天下皆更元易政吳越之君絶嗣是嵗東西帝割據山河遂為戰國比十月至正月梁魏三帝皆大赦改元或曰斗為夀命之養而火以亂氣干之耄荒之戒也是時梁武帝年已七十矣怠於聽政專以講學為業故皇天殷勤著戒又若言曰經遠之謀替矣將以逆亂終之而勦其天祿焉夫天懸而示之且猶不悟其後攝提復周卒有侯景之亂云三年十二月梁人立元慶和為魏王屯平瀬明年正月東南行臺元晏大破之六月豫州刺史堯雄又大破梁師於南頓十月梁攻單父徐州刺史任祥又大破之斬虜萬餘級十一月栁仲禮宼荆州諸將又大敗之時梁軍政益㢮故累有負敗之應東魏孝静天平二年有星孛于太微歴下台及室壁而滅南宮成周之墟孝文之餘烈也孛星由之易政徙王之戒天象若曰王城為墟夏聲㡬變而台階持政有代奪之漸乎且抵于營室更都之象也是後兩霸專權皆以北俗從事河南新邑遂為戰爭之郊間三嵗至興和元年九月發司州卒十萬營鄴都十月新宮成天平元年閏月月掩心大星二年八月又犯之相去七寸十一月又掩心小星相臣逼主之象且占曰人臣伐主應以善事除殃時兩雄王業已定特以人臣取容而已至興和二年八月月又犯心大星後數年而禪代元象二年七月壬戌金土合于七星癸亥遂犯七星七星河南之分金而犯土將有封畿之戰且占曰其分亡地先是去年十二月癸丑太白食月是嵗三月壬申太白又與月合相距一寸大戰之祥也月象彊大之國而金合之秦師將勝焉十二月有流星從天市垣西流長且一丈有尾迹三年正月渤海王歡攻夏州克之十月丁丑月犯火占曰大將有鬭死者十二月大都督竇泰入潼關明年宇文泰距撃斬之十月遂及渤海王歡戰于沙苑歡軍敗績捕虜萬餘是月獨孤信拔洛陽三年十二月熒惑犯嵗星占曰有内亂臣謀王至四年正月客星出于紫宮占曰國有大變二月壬申八月癸未月再掩五車東南星占曰兵起道不通十一月太白晝見占曰軍興為不臣五年二月庚戌三月甲子填星逆順行再犯上相上相司徒也六月太白入東井占曰秦有兵大臣當之至元象元年七月太白在柳晝見桞河南也八月辛卯有大流星出房心北東南行長且三尺尾迹分為三段軍破為三之象也先是行臺侯景司徒高昴圍金墉西帝及宇文泰自將救之是月陳于河陰泰以中軍合戰大克司徒高昴死之既而左右軍不利西師由是敗績斬將二十餘人降卒六萬是月西帝大傅梁景叡據長安反關中大震尋皆伏誅天平三年正月元象元年三月月再掩軒轅大星是年西帝廢皇后乙氏立蠕蠕女為后明年五月火犯軒轅大星既而乙氏遇害其後蠕蠕后又死而乙氏為祟焉元象元年十月月犯昴暈畢胃丁未在翼暈大星軒轅左角十一月在井暈五車兩年東西主凡三大赦興和元年二月壬子火犯井占曰秦有兵亂貴人當之四月又入鬼亦兵喪之祥也又土地之分也至二年十一月甲戌太白在氐與填星相犯氐鄭地也至四年七月壬午火木合于井相去一尺占同天平明年北豫州刺史高仲密據武牢西叛宇文泰帥衆援之戊申及渤海王戰于邙山西軍大敗虜王侯將校四百餘人獲六萬餘級元年八月月在畢暈昴畢觜五車二年正月大赦三年正月至八月又再暈之嵗星在焉四年十一月月暈軒轅太㣲壬申又暈胃昴畢五車皆兵饑赦祥也明年東西王皆大赦後年三月高歡入朝以春冬亢旱請賑窮乏死罪已下皆宥之先是元年十月辛丑有彗星出于南斗長丈餘至十一月丙戌距太白三尺長丈餘東南指二月乙卯至婁始滅占曰彗出南斗之土皆誅其上疑又吳分始自㣲末終成著大而與兵星合焉天戒若曰夫劫殺之萌其事由來漸矣而人君辨之不早終以兵亂横流不可撲滅焉婁又徐方之次亂之所自招也至二年四月己丑金木相犯于奎丙午火木又相犯于奎奎為徐方所以虞蹶防之宼也嵗主建國之令而省人君之差敗火主亂金主兵三精洊而聚謀所以哀矜下土而示驅除之戒也是時梁主衰老太子賢明而不能授之以政焉由是領軍朱异等浸侵明福之權至武定五年侯景竊河南六州而叛又與連衡而附益之是嵗十二月梁師敗績于彭城捕虜五萬餘級江淮之間始蕭然愁歎矣明年師大敗陷溺以十萬數景遂舉而濟江三吳大荒道殣流離者大半淮表二十六州咸内屬焉昔三精聚謀於危九年而高氏霸至是聚謀於奎而蕭氏亡亦天之大數云爾武定二年四月丁巳熒惑犯南宮上將戊寅又犯右執法占曰中坐成刑金火尤甚四年四月庚午金晝見六月癸巳月入畢九月壬寅太白在左執法東南三寸許是為執法事五年正月月犯畢大星貴人之謫也先是九月大丞相歡圍玉璧不克是月歡薨于晉陽辛亥侯景反僕射慕容紹宗撃之八月淮南三王謀反誅明年紹宗攻王思政于潁川竟溺四年九月月在翼暈軒轅太微帝坐五年二月暈昴畢參井五車五月在張又暈軒轅太微時兵革屢動東西帝皆比嵗大赦七年九月戊午月掩嵗星在斗斗為天廟帝王夀命之期月由之以干嵗星是為大人有簒殺死亡之禍是嵗梁武帝以憂逼殂明年而齊帝後年西主文帝及梁簡文又終天下皆有大故而江表尤甚八年三月甲午嵗鎮太白在虛虛齊分是為驚立絶行改立王公熒惑又從而入之四星聚焉五月丙寅帝禪位于齊是嵗西主大統十六年也是時兩主立而東帝得全魏之墟為天官為正昔宋武北伐四星聚奎及西伐秦四星聚井四星聚參而渤海始霸四星聚危而文宣受終由是言之帝王之業其有徴矣其後六年西帝禪于周室天文史失其傳也魏書卷一百五之四魏書卷一百五之四考證志第四此卷亦闕後人所補高祖太和十二年景寅唐人諱丙故南北史俱作景此亦作景者志為唐人所著故也若卷内或有仍作丙者則又後人間有改易耳高祖太和十五年注十五年三月月掩畢三月下北監夲脱月字今從南監夲増入又注司徒馮誕馮監夲誤作馬今改正肅宗正光二年注間三嵗三監本訛作五今以上文推之則以三為是魏書卷一百五之四考證
