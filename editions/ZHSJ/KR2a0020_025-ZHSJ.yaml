body:
  text: 魏書卷二十一上獻文六王列傳第九上咸陽王趙郡王廣陵王高陽王北海王獻文皇帝七男李思皇后生孝文皇帝封昭儀生咸陽王禧韓貴人生趙郡靈王幹高陽文穆王雍孟椒房生廣陵惠王羽潘貴人生彭城武宣王勰高椒房生北海平王詳勰別有傳咸陽王禧字永壽太和九年封加侍中驃騎大將軍中都大官文明太后令曰自非生知皆由學誨皇子皇孫訓教不立溫故求新蓋有闕矣可於閒靜之所別置學舘選忠信博聞之士為之師傅以匠成之高祖以諸弟典三都誡禧等曰汝等國之至親皆幼年任重三都折獄特宜用心夫未能操刀而使割錦非傷錦之尤實授刀之責皆可修身慎行勿有乖爽文明太后亦誡禧等曰汝兄繼承先業統御萬機戰戰兢兢恐不稱汝所治雖小亦宜克念高祖又曰周文王小心翼翼聿懷多福如有周公之才使驕且吝其餘不足觀汝等宜小心畏慎勿自驕怠出為使持節開府冀州刺史高祖餞於南郊又以濟陰王鬱枉法賜死之事遣使告禧因而誡之後禧朝京師高祖謂王公曰皇太后平日以朝儀闕然遂命百官更欲撰緝今將畢修遺志卿等謂可行不當各盡對無以面從禧對曰儀制之事用捨各隨其時而民可使由之不可使知之臣謂宜述元志備行朝式高祖然之詔曰仲尼在鄉黨猶尚恂恂周文王為世子卑躬求道禧等雖連艹口咢宸暉得不尊尚師傅也故為置之以加令德廷尉卿李沖可咸陽王師禧將還州高祖親餞之賦詩叙意加禧都督冀相兗東兗南豫東荊六州諸軍事於時王國舍人應取八族及清修之門禧取任城王隸戶為之深為高祖所責詔曰夫婚姻之義曩葉攸崇求賢擇偶緜代斯慎故剛柔著於易經鵲巢載于詩典所以重夫婦之道美尸鳩之德作配君子流芳後昆者也然則婚者合二姓之好結他族之親上以事宗廟下以繼後世必敬慎重正而後親之夫婦既親然後父子君臣禮義忠孝於斯備矣太祖龍飛九五始稽遠則而撥亂創業日昃不暇至於諸王娉合之儀宗室婚姻之戒或得賢淑或乖好逑自茲以後其風漸缺皆人乏窈窕族非百兩擬匹卑濫舅氏輕微違典滯俗深用為歎以皇子茂年宜簡令正前者所納可為妾媵將以此年為六弟娉室長弟咸陽王禧可娉故潁川太守隴西李輔女次弟河南王幹可娉故中散代郡穆明樂女次弟廣陵王羽可娉驃騎諮議參軍滎陽鄭平城女次弟潁川王雍可娉故中書博士范陽盧神寶女次弟始平王勰可娉廷尉卿隴西李沖女季弟北海王詳可娉吏部郎中滎陽鄭懿女有司奏冀州人蘇僧瓘等三千人稱禧清明有惠政請世胙冀州詔曰利建雖古未必今宜經野由君理非下請邑采之封自有別式入除司州牧都督司豫荊郢洛東荊六州諸軍事開府如故賜帛二千匹粟五千斛詔以禧元弟之重食邑三千戶自餘五王皆食邑二千戶高祖引見朝臣詔之曰卿等欲令魏朝齊美於殷周為令漢晉獨擅於上代禧曰陛下聖明御運實願邁迹前王高祖曰若然將以何事致之為欲修身改俗為欲仍染前事禧對曰宜應改舊以成日新之美高祖曰為欲止在一身為欲傳之子孫禧對曰既卜世靈長願欲傳之來葉高祖曰若然必須改作卿等當各從之不得違也禧對曰上命下從如風靡草高祖曰自上古以來及諸經籍焉有不先正名而得行禮乎今欲斷諸北語一從正音年三十以上習性已久容或不可卒革三十以下見在朝廷之人語音不聽仍舊若有故為當降爵黜官各宜深戒如此漸習風化可新若仍舊俗恐數世之後伊洛之下復成被髮之人王公卿士咸以然不禧對曰實如聖旨宜應改易高祖曰朕嘗與李沖論此沖言四方之語竟知誰是帝者言之即為正矣何必改舊從新沖之此言應合死罪乃謂沖曰卿實負社稷合令御史牽下沖免冠陳謝又引見王公卿士責留京之官曰昨望見婦女之服仍為夾領小袖我徂東山雖不三年既離寒暑卿等何為而違前詔禧對曰陛下聖過堯舜光化中原臣雖仰禀明規每事乖互將何以宣布皇經敷贊帝則舛違之罪實合刑憲高祖曰若朕言非卿等當須庭論如何入則順旨退有不從昔舜語禹汝無面從退有後言其卿等之謂乎尋以禧長兼太尉公後高祖幸禧第謂司空穆亮僕射李沖曰既有天地又有君臣太尉位居台鉉在冢宰之上三槐九棘不可久空元弟禧雖在事不長而戚連皇極且長兼太尉以和鼎朕常恐君有空授之名臣貽彼己之刺今幸其宅徒屈二賓良以為愧高祖有事於方澤質明羣臣問起居高祖曰昨日方澤殊自大暑遇天雲蔭密行人差得無弊禧對曰陛下德感天地故雲物凝彩雖復雨師灑掃風伯清塵豈過於此高祖曰伊洛南北之中此乃天地氤氳陰陽風雨之所交會自然之應非寡德所能致此高祖篤於兄弟以禧次長禮遇優隆然亦知其性貪每加切誡雖當時遵奉而終不改操禧表曰國朝偃武崇文偏捨來久州鎮兵人或有雄勇不閑武藝今取歲暮之暇番上之日訓其兵法弓矢干矟三分並教使人閑其能臨事無闕詔曰雖云教武未練其方既逼北行卒聞教武脫生羣惑且可停之後從平漢陽以克南陽之勳加侍中正太尉及高祖崩禧受遺輔政雖為宰輔之首而從容推委無所是非而潛受賄賂陰為威惠者禧特甚焉是年八座奏增邑千戶世宗從之固辭不受禧性驕奢貪淫財色姬妾數十意尚不已衣被繡綺車乘鮮麗猶遠有簡娉以恣其情由是昧求貨賄奴婢千數田業鹽鐵徧於遠近臣吏僮隸相繼經營世宗頗惡之景明二年春禧等為將礿祭入齋世宗詔領軍于烈率左右召禧等入於光極殿詔曰恪雖寡昧忝承寶曆比疹實憑諸父苟延視息奄涉三齡父等歸遜殷勤今便親攝百揆且還府司當別處分尋詔曰朕以寡昧夙罹閔凶憂煢在疚罔知攸濟實賴先帝聖德遺澤所覃宰輔忠賢劬勞王室用能撫和上下肅清內外乃式遵復子歸政告遜辭理懇至邈然難奪便當勵茲空乏親覽機務王尊惟元叔道性淵凝可進位太保領太尉司空北海王季父英明聲略茂舉可大將軍錄尚書事世宗既覽政禧意不安而其國齋帥劉小苟每稱左右言欲誅禧禧聞而歎曰我不負心天家豈應如此由是常懷憂懼加以趙脩專寵王公罕得進見禧遂與其妃兄兼給事黃門侍郎李伯尚謀反時世宗幸小平津禧在城西小宅初欲勒兵直入金墉衆懷沮異禧心因緩自旦達晡計不能決遂約不洩而散武興王楊集始出便馳告而禧意不疑乃與臣妾向洪池別墅遣小苟奉啟云檢行田牧小苟至邙嶺已逢軍人怪小苟赤衣將欲殺害小苟困迫言欲告反乃緩之禧是夜宿於洪池大風暴雨拔樹折木禧不知事露其夜或說禧曰殿下集衆圖事見意而停恐必漏洩今夕何宜自寬恐危禍將至禧曰有此軀命應知自惜豈待人言又說曰殿下兒婦已渡河兩頭不相知今俛眉自安不其危乎禧曰初遣去日令如行人渡河聽我動靜我久已遣人追之計今應還而尹仵期與禧長子通已入河內郡列兵仗放囚徒而將士所在追禧禧自洪池東南走僮僕不過數人左右從禧者唯兼防閤尹龍虎禧憂迫不知所為謂龍虎曰吾憒憒不能堪試作一謎當思解之以釋毒悶龍虎欻憶舊謎云眠則俱眠起則俱起貪如豺狼贓不入己都不有心於規刺也禧亦不以為諷己因解之曰此是眼也而龍虎謂之是箸渡洛水至栢谷塢從者唯禧二舅及龍虎而已顧謂龍虎曰凡夫尚有節義相為取死汝可勉心作與太尉公同死計龍虎曰龍虎東野常人遭殿下寬明接處左右今屬危難恨無遠計匡濟聖躬若與殿下同命雖死猶生俄而禧被擒獲送華林都亭世宗親問事源著千斤鎖格龍虎羽林掌衞之初高祖閑宴從容言於禧等我後子孫邂逅不逮汝等觀望輔取之理無令他人有也禧臨盡雖言不次第猶尚泣涕追述先旨然畏迫喪志不能慷慨有所感激也及與諸妹公主等訣言及一二愛妾公主哭且罵之云坐多取此婢輩貪逐財物畏罪作反致今日之事何復囑問此等禧愧而無言遂賜死私第其宮人歌曰可憐咸陽王奈何作事誤金床玉几不能眠夜蹋霜與露洛水湛湛彌岸長行人那得渡其歌遂流至江表北人在南者雖富貴絃管奏之莫不灑泣同謀誅斬者數十人潛瘞禧於北邙絕其諸子屬籍禧之諸女微給資產奴婢自餘家財悉以分賚高肇趙脩二家其餘賜內外百官逮于流外多者百餘匹下至十匹於後禧諸子每乏衣食獨彭城王勰歲中再三賑給之禧有子八人長子通字曇和竊入河內太守陸琇初與通情既聞禧敗乃殺之通弟翼字仲和後會赦詣闕上書求葬其父頻年泣請世宗不許翼乃與弟昌曄奔於蕭衍翼與昌申屠氏出曄李妃所生也翼容貌魁壯風制可觀衍甚重之封為咸陽王翼讓其嫡弟曄衍不許後以為信武將軍青冀二州刺史鎮郁州翼謀舉州入國為衍所移昌為衍直閤將軍翼弟顯和昌弟樹後亦奔於衍顯和卒於江南樹字秀和美姿貌善吐納兼有將略衍尤器之封為魏郡王後改封鄴王數為將領窺覦邊服時揚州降衍兵武既衆衍將湛僧珍慮其翻異盡欲殺之樹以家國遂皆聽還衍以樹為鎮西將軍郢州刺史尒朱榮之害百官也樹聞之乃請衍討榮衍乃資其士馬侵擾境上前廢帝時竊據譙城出帝初詔御史中尉樊子鵠為行臺率徐州刺史大都督杜德以討之樹城守不下子鵠使金紫光祿大夫張安期往說之樹乃請委城還南子鵠許之樹恃誓約不為戰備杜德襲擊之擒樹送京師禁於永寧佛寺未幾賜死孝靜時其子貞自建業赴鄴啟求葬樹許之詔贈樹侍中都督青徐兗揚豫五州諸軍事太師司徒公尚書令揚州刺史貞既葬還於江南曄字世茂衍封為桑乾王拜散騎常侍卒於秣陵初正光中詔曰周德崇厚蔡仲享國漢道仁恕淮南畢王皆所以申恩懿戚蠲盪舊釁義彰曩葉詠流前史頃者咸陽京兆王自貽禍敗事由間惑猶有可矜兩門諸子並可聽附屬籍後復禧王爵葬以王禮詔曄弟坦襲改封敷城王邑八百戶坦傲佷兇粗從叔安豐王延明責之曰汝兇悖性與身而長昔有宋東海王禕志性凡劣時人號曰驢王我熟觀汝所作亦恐不免驢號莊帝初還復本封武定中為太師齊受禪爵例降坦弟昶起家通直散騎常侍琅邪縣開國公邑五百戶莊帝初特封太原王累遷鴻臚卿超拜車騎大將軍儀同三司天平二年薨贈太尉公子善慧襲齊受禪爵例降趙郡王幹字思直太和九年封河南王加衞大將軍除侍中中都大官尋授車騎將軍左光祿大夫領吏部尚書所生母薨高祖詔曰太妃韓氏薨逝情以傷慟太妃先朝之世位擬九嬪豫班上族誕我同氣念此孤稚但用感惻明當暫往臨哭可勅外備辦遣侍御史假節監護喪事贈綵八百匹詔曰季世多務情緣理奪幹既居要任銓衡是荷豈容遂其私志致曠所司可遣黃門郎敦諭令勉從王事朕尋當與之相見拜使持節都督南豫郢東荊三州諸軍事征南大將軍開府豫州刺史及車駕南伐以幹為使持節車騎大將軍都督關右諸軍事給銅虎符十別賜詩書高祖篤愛諸弟以幹總戎別道誡之曰司空穆亮年器可師散騎常侍盧淵才堪詢訪汝其師之尋以蕭賾死班師遷洛改封趙郡王除都督冀定瀛三州諸軍事征東大將軍冀州刺史開府如故賜雜物五百段又密賜黃金十斤高祖親餞於近郊詔幹曰夫刑獄之理先哲所難然既有邦國得不自勵也汝我之懿弟當聿修厥德光崇有魏深思遠圖如臨深履薄若恃親重不務世政國有常憲方增悲感高祖詔以李憑為長史唐茂為司馬盧尚之為諮議參軍以匡弼之而憑等諫諍幹殊不納州表斬盜馬人於律過重而尚書以幹初臨縱而不劾詔曰夫刑以節人罪必無濫故刑罰不中民無措足若必以威殺為良則應汎通衆牧苟須有禁何得不稽之正典又律令條憲無聽新君加戮之文典禮舊章不著始臨專威之美尚書曲阿朕意實傷皇度幹闇於治理律外重刑並可推聞後轉特進司州牧車駕南討詔幹都督中外諸軍事給鼓吹一部甲士三百人出入殿門幹貪淫不遵典法御史中尉李彪將糾劾之會遇幹於尚書下舍因屏左右而謂幹曰殿下比有風聞即欲起彈恐損聖明委託之旨若改往修來彪當不言脫不悛改夕聞旦發而幹悠然不以為意彪乃表彈之高祖省之忿惋詔幹與北海王詳俱隨太子詣行在所既至詳獨得朝見幹不蒙引接密令左右察其意色知無憂悔乃親數其過杖之一百免所居官以王還第二十三年薨年三十一給東園祕器斂服十五稱賵帛三千匹諡曰靈王陪葬長陵子謐世宗初襲封幹妃穆氏表謐母趙等悖禮愆常不遜日甚尊卑義阻母子道絕詔曰妾之於女君猶婦人事舅姑君臣之禮義無乖二妾子之於君母禮加如子之恭何得黷我風政可付宗正依禮治罪謐在母喪聽音聲飲戲為御史中尉李平所彈遇赦復封除通直散騎常侍加龍驤將軍遷太子中庶子出為冠軍將軍岐州刺史謐性嚴暴虐下人肅宗初臺使元延到其州界以驛邏無兵攝帥檢覈隊主高保願列言所有之兵王皆私役謐聞而大怒鞭保願等五人各二百數日之間謐召近州夫閉城四門內外嚴固搜掩城中楚掠備至又無事而斬六人合城兇懼衆遂大呼屯門謐怖登樓毀梯以自固土人散走城人分守四門靈太后遣游擊將軍王靖馳驛諭之城人既見靖至開門謝罪奉送管籥乃罷謐州還除大司農卿又除散騎尚侍平北將軍幽州刺史謐妃胡氏靈太后從女也未發坐毆其妃免官後除都官尚書加安南將軍正光四年薨給東園祕器朝服一具衣一襲賵帛五百匹高陽王雍幹之母弟啟論謐故超贈假侍中征南將軍司州牧諡曰貞景子毓字子春襲莊帝初河陰遇害贈衞大將軍儀同三司青州刺史諡曰宣恭無子詔以謐弟讞子寘字景融為後襲爵及寘伯諶復封趙郡改封平昌王齊受禪爵例降謐兄諶字興伯性平和自通直正員郎遷太子庶子司空司馬鴻臚少卿遷後將軍肆州刺史固辭不拜改授平南將軍光祿少卿轉黃門侍郎進號安南將軍光祿大夫出為散騎常侍中軍將軍相州刺史罷州除宗正卿都官尚書以親例封上蔡縣開國公食邑四百戶讓而不受莊帝初拜車騎將軍儀同三司尚書左僕射封魏郡王食邑一千戶又加侍中諶本年長應襲王封其父靈王寵愛其弟謐以為世子莊帝詔復諶封趙郡王進號驃騎大將軍加開府遷司空公出帝時轉太保司州牧太尉公又遷太師錄尚書事孝靜初為大司馬三年薨贈假黃鉞侍中都督冀州刺史諡曰孝懿諶無他才識歷位雖重時人忽之子煒襲齊受禪爵例降謐弟譚頗強立少為宗室所推敬自羽林監出為高陽太守為政嚴斷豪右畏之肅宗初入為直閤將軍歷太僕宗正少卿加冠軍將軍元法僧外叛詔譚為持節假左將軍別將以討之徐州平遷光祿少卿行南兗州事征虜將軍涇州刺史入為武衞將軍尋詔譚為都督以討杜洛周次於軍都為洛周所敗還除安西將軍秦州刺史卒贈撫軍將軍儀同三司青州刺史諶弟讞為人貪暴無禮自羽林監遷司徒主簿肅宗時除正員郎稍遷左將軍太中大夫封平鄉縣開國男邑二百戶莊帝初河陰遇害贈車騎大將軍儀同三司定州刺史子景暄直閤將軍從出帝沒於關西讞弟譿羽林監直閤將軍早卒賵帛五百匹贈鎮遠將軍州刺史廣陵王羽字叔翻太和九年封加侍中征東大將軍為外都大官羽少而聰慧有斷獄之稱後罷三都羽為大理加衞將軍典決京師獄訟微有聲譽遷特進尚書左僕射又為太子太保錄尚書事高祖將南討遣羽持節安撫六鎮發其突騎夷人寧悅還領廷尉卿車駕既發羽與太尉丕留守加使持節語在丕傳高祖友愛諸弟及將別不忍早分詔羽從至雁門乃令羽歸望其稱効故賜如意以表心遷都議定詔羽兼太尉告于廟社遷京之後北蕃人夷多有未悟羽鎮撫代京內外肅然高祖嘉之十八年春羽表辭廷尉不許羽奏外考令文每歲終州鎮列牧守治狀及至再考隨其品第以彰黜陟去十五年中在京百僚盡已經考為三等此年便是三載雖外有成令而內令未班內外考察理應同等臣輒推準外考以定京官治行詔曰雖內考未宣績已久著故明堂月令載公卿大夫論考屬官之治職區分著三公疑尚書三載殿最之義此之考內已為明矣但論考之事理在不輕問績之方應關朕聽輒爾輕發殊為躁也每考之義應在年終既云此年何得春初也今始維夏且待至秋後高祖臨朝堂議政事謂羽曰遷都洛陽事格天地但汝之迷徒未開沉鄣耳朕家有四海往來何難朕初發洛陽教示永壽皆謂分別比自來後諸處分之事已差前敕今舉大功寧為虛費且朕無周召之弟豈容晏安日逸今便北巡遷留之事當稱朕懷後高祖臨朝堂謂羣臣曰兩儀既闢人生其間故上天不言樹君以代是以書稱三考之績禮云考成之章自皇王以降斯道靡易朕以寡德猥荷洪基思與百辟允釐庶務然朕識乏知人不能使朝絕素餐之譏野無考盤之刺夙宵寤寐載懷怵惕卿等皆是朝賢國彥匡弼是寄各率乃心以旌考績之義如乖忠正國有常刑賢者雖疏必進不肖者雖親必黜顧謂羽曰上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髮之美中等守本事可大通羽先呈廷尉五局司直高祖曰夫刑獄之難實惟自古必也斷訟夫子所稱然五局所司專主刑獄比聞諸風聽多論五局不精知人之難朕豈獨決當與羣臣同之卿等各陳所聞高祖謂羽及少卿鄧述曰五局司直卿等以何為品羽對曰諸司直並簡聖心往者百官初置擢為獄官聽訟察辭無大差越所以為二等者或以視事甫爾或以見機遲速朝廷既有九品之制故計其絲髮之差以為品第統論所得大得相似高祖曰朕頃年以其人識見可取故簡司獄官小優劣不足為差然廷尉所司人命之本事須心平性正抑強哀弱不避貴勢直情折獄者可為上等今正欲聽採風謠虛實難悉正欲不採事無所據然人言惡者未必是惡言善者不必是善所以然者或斷訟不避豪貴故人以為惡或將勢抑賤貴人以為好然關朕之聽皆貴者言是以遲迴三復良由於此局事須冰清玉潔明揚褒貶卿等既是親典邪正得失悉所具之可精辨以聞鄧述對曰陛下行賞得人餘者甘心若賞不盡能無以勸勵如臣愚見願不行賞高祖曰朕昔置此官許三年考績必行賞罰既經今考若無黜陟恐正直者莫肯用心邪曲者無以改肅自非釋之于公何能盡其至理雖不可精其微致且望粗有殿最諸尚書更與羣官善量所以高祖謂尚書等曰朕仰纂乾構君臨萬宇往者稽古典章樹茲百職然尚書之任樞機是司豈惟總括百揆緝和人務而已朕之得失實在於斯自卿等在任年垂二周未嘗言朕之一失獻可否之片規又不嘗進一賢而退一不肖此二事罪之大者高祖又謂羽曰汝之淺薄固不足以況晉之巨源考之今世民斯下矣汝始為廷尉及初作尚書內外瞻望以吾有弟自往秋南斾之後近小人遠君子在公阿黨虧我皇憲出入無章動乖禮則計汝所行應在下下之第高祖又謂羽曰汝既是宸極之弟而居樞端之任汝自在職以來功勤之績不聞於朝阿黨之音頻干朕聽汝之過失已備積於前不復能別叙今黜汝錄尚書廷尉但居特進太保又謂尚書令陸叡曰叔翻在省之初甚有善稱自近以來偏頗懈怠豈不由卿等隨其邪偽之心不能相導以義雖不成大責已致小罰今奪卿尚書令祿一周謂左僕射元贊曰卿夙德老成久居機要不能光贊物務奬勵同僚賊人之謂豈不在卿計叔翻之黜卿應大辟但以咎歸一人不復相罪又為少師未允所授今解卿少師之任削祿一周詔吏部尚書澄曰叔父既非端右又非座元豈宜濫歸衆過也然觀叔父神志驕傲少保之任似不能存意可解少保謂長兼尚書于果曰卿履歷卑淺超昇名任不能勤謹夙夜數辭以疾長兼之職位亞正員今解卿長兼可光祿大夫守尚書削祿一周又謂守尚書尉羽曰卿在集書殊無憂存左史之事今降為長兼常侍亦削祿一周又謂守尚書盧淵曰卿始為守尚書未合考績然卿在集書雖非高功為一省文學之士嘗不以左史在意如此之咎罪無所歸今降卿長兼王師守常侍尚書如故奪常侍祿一周謂左丞公孫良右丞乞伏義受曰二丞之任所以協贊尚書光宣出納而卿等不能正心直言規佐尚書論卿之罪進合大辟但以尚書之失事鍾叔翻故不能別致貶責二丞可以白衣守本官冠服祿恤盡皆削奪若三年有成還復本任如其無成則永歸南畝又謂散騎常侍元景曰卿等自任集書合省逋墮致使王言遺滯起居不修如此之咎責在於卿今降為中大夫守常侍奪祿一周謂諫議大夫李彥曰卿雖處諫議之官實人不稱職可去諫議退為元士又謂中庶子游肇等曰自建承華已經一稔然東宮之官無直言之士雖未經三載事須考黜肇及中舍人李平識學可觀可為中安樂王詮可為下中解東華之任退為員外散騎常侍馮夙可為下下免中庶子免爵兩任員外常侍如故中舍人閭賢保可為下下退為武騎常侍又謂公孫良曰頃年用人多乖觀才之授實是武人而授以文官黜同大例於理未均諸如此比黜官如初高祖引陸叡元贊等於前曰北人每言北人何用知書朕聞此深用憮然今知書者甚衆豈皆聖人朕自行禮九年置官三載正欲開導兆人致之禮教朕為天子何假中原欲令卿等子孫博見多知若永居北值不好文主卿等子孫不免面牆也陸叡對曰實如明詔金氏若不入仕漢朝七世知名亦不可得也高祖大悅及五等開建羽食勃海之東光二千戶車駕南伐羽進號衞將軍除使持節都督青齊光南青四州諸軍事征東大將軍開府青州刺史以留守代京之功增邑五百戶高祖幸羽第與諸弟言曰朕昨親受人訟始知廣陵之明了咸陽王禧對曰臣年為廣陵兄明為廣陵弟高祖曰我為汝兄汝為羽昆汝復何恨又曰叔翻沉疴緜惙遂有辰歲我每為深憂恐其不振今得痊愈晚成婚媾且喜其吉慶故命駕耳高祖親餞之華林園後詔羽曰吾因天歷運乘時樹功開荊拓沔威振楚越時暨三炎息駕汝潁勢臨荊徐聲遏江外未容解甲凱入三川纂兵修律俟秋方舉海服之寄故惟宗良善開經策寧我東夏敬慎汝儀勿墜嘉問唯酒唯田可不戒歟加散騎常侍進號車騎大將軍餘如故世宗即位遷司州牧常侍如故羽頻表辭牧至于三四詔不許世宗覽政引羽入內面授司徒羽辭曰彥和本自不願而陛下強與今新去此官而以臣代之必招物議季豫既轉取之無嫌請為司空世宗猶強焉固辭乃許之羽先淫員外郎馮俊興妻夜因私遊為俊興所擊積日祕匿薨於府年三十二世宗親臨哀慟詔給東園溫明祕器朝服一具衣一襲錢六十萬布一千匹蠟三百斤大鴻臚護喪事大殮帝親臨之舉哀都亭贈使持節侍中驃騎大將軍司徒公冀州刺史給羽葆鼓吹班劍四十人諡曰惠及葬帝親臨送子恭襲語在紀恭兄欣字慶樂性粗率好鷹犬肅宗初除通直散騎常侍北中郎將出為冠軍將軍荊州刺史轉征虜將軍齊州刺史欣在二州頗得人和又為征東將軍太僕卿孝莊初封沛郡王邑一千戶後改封淮陽王出帝時加太師開府復封廣陵王除太傅司州牧尋除大司馬隨出帝沒於關中欣弟永業普泰元年特封高密郡王食邑二千戶武定末金紫光祿大夫齊受禪爵例降高陽王雍字思穆少而倜儻不高祖曰吾亦未能測此兒之深淺然觀其任真率素或年器晚成也太和九年封潁川王加侍中征南大將軍或說雍曰諸王皆待士以營聲譽王何以獨否雍曰吾天子之子位為諸王用聲名何為久之拜中護軍領鎮北大將軍改封高陽奉遷七廟神主於洛陽五等開建食邑二千戶車駕南伐雍行鎮軍大將軍總攝留事遷衞尉加散騎常侍除使持節鎮北將軍相州刺史常侍如故高祖誡雍曰相州乃是舊都自非朝賢德望無由居此是以使汝作牧為牧之道亦難亦易其身正不令而行故便是易其身不正雖令不從故便是難又當愛賢士存信約無用人言而輕與奪也進號征北將軍世宗初遷使持節都督冀相瀛三州諸軍事征北大將軍開府冀州刺史常侍如故雍在二州微有聲稱入拜驃騎大將軍司州牧世宗時幸雍第皆盡家人之禮遷司空公議定律令雍常入參大議轉太尉公加侍中時雍以旱故再表遜位優詔不許除太保領太尉侍中如故世宗行考陟之法雍表曰竊惟三載考績百王通典今任事上中者三年昇一階散官上第者四載登一級閑冗之官本非虛置或以賢能而進或因累勤而舉如其無能不應忝茲高選既其以能進之朝伍或任官外戍遠使絕域催督逋懸察檢州鎮皆是散官以充劇使及於考陟排同閑伍檢散官之人非才皆劣稱事之輩未必悉賢而考閑以多年課煩以少歲上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明參差之考非聖慈之心改典易常乃有司之意又尋考級之奏委於任事之手涉議科勤絕於散官之筆遂使在事者得展自勤之能散輩者獨絕披衿之所抑以上下之閑限以旨格之判致使近侍禁職抱槃屈之辭禁衞武夫懷不申之恨欲克平四海何以獲諸又散官在直一玷成尤銜使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以祿微加賞罪殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啟處又曰豈不懷歸畏此簡書依依楊柳以叙治兵之役霏霏雨雪又申振旅之勤若折往來日月便是採薇之詩廢杕杜之歌罷又任事之官吉凶請假定省掃拜動歷十旬或因患重請動輒經歲征役在途勤泰百倍苦樂之勢非任事之倫在家私閑非理務之日論優語劇先宜折之武人本挽上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不涉或帶甲連年負重千里或經戰損傷或年老衰竭今試以本格責其如初有爽於先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彥或歷嶮千餘或履危萬里登有死亡之憂咸懷不返之戚魂骨奉忠以尸將命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以奬勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年昇一階檢無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上陟上第之士由汎而退臣又見部尉資品本居流外刊諸明令行之已久然近為里巷多盜以其威輕不肅欲進品清流以壓姦宄甄琛啟云為法者施而觀之不便則改竊謂斯言有可採用聖慈昭覽更高宰尉之秩今考格始宣懷怨者衆臣竊觀之亦謂不可有光國典改之何難世宗乃引雍共論時務肅宗初詔雍入居太極西栢堂諮決大政給親信二十人又詔雍為宗師進太傅侍中領太尉公王如故別敕將作營國子學寺給雍居之領軍于忠擅權專恣僕射郭祚勸雍出之忠怒矯詔殺祚及尚書裴植廢雍以王歸第朝有大事使黃門郎就諮訪之忠尋復矯詔將欲殺雍以問侍中崔光光拒之乃止未幾靈太后臨朝出忠為冀州刺史雍表曰臣初入栢堂見詔旨之行一由門下而臣出君行不以悛意每覽傷矜視之慘目深知不可不能禁制臣之罪一也臣近忝內樞兼尸師傅宜保護聖躬溫凊晨夕而于忠身居武司禁勒自在限以內外朝謁簡絕皇居寢食所在不知社稷安危又亦不預出入栢堂尸立而已臣之罪二也忠規欲殺臣賴在事執拒又令僕卿相任情進黜遷官授職多不經旬斥退賢良專納心腹威振百僚勢傾朝野臣見其如此欲出忠為雍州刺史鎮撫關右在心未行反為忠廢忝官尸祿孤負恩私臣之罪三也先帝昇遐儲宮纂統斯乃君父之謨臣子之永則加賞之義自古無之忠既人臣受恩先帝喪禍之際竭節是常迎陛下於東宮臣下之事如其不爾更欲何為而忠意氣凌雲坐要封爵爾日抑之交恐為禍臣以權臣所欲不敢輒違即集王公卿士議其多少清河王臣懌先帝懿弟識度寬明臨衆唱議非以勤而賞之憚違權臣之旨望顏而授臣知不可因而從之臣之罪四也忠秉權門下且居宰執又總禁旅為崇訓衞尉身兼內外橫干宮掖臣之罪五也古者重罪必令三公會期至旬日所以重死刑也先帝登極十有七年細人犯刑猶寬憲墨朝廷貴仕不戮一人今陛下踐阼年未半周殺僕射尚書如夭一草是忠秉權矯旨擅行誅戮臣知不能救臣之罪六也臣位荷師相年未及終難恕之罪顯露非一何情以處何顏以生雖經恩宥猶有餘責謹反私門伏聽司敗靈太后感忠保護之勳不問其罪增雍封一千戶除侍中太師又加使持節以本官領司州牧雍表請王公以下賤妾悉不聽用織成錦繡金玉珠璣違者以違旨論奴婢悉不得衣綾綺纈止於縵繒而已奴則布服並不得以金銀為釵帶犯者鞭一百太后從之而不能久行也詔雍乘步挽出入掖門又以本官錄尚書事雍頻表辭遜優答不許詔侍中敦諭詔雍朝夕侍講肅宗覽政除使持節司州牧侍中太師錄尚書如故肅宗加元服雍兼太保與兼太尉崔光攝行冠禮詔雍乘車出入大司馬門進位丞相給羽葆鼓吹倍加班劍餘悉如故又賜帛八百匹與一千人供具催令速拜詔雍依齊郡順王簡太和故事朝訖引坐特優拜伏之禮總攝內外與元叉同決庶政歲祿萬餘粟至四萬伎侍盈房諸子璫冕榮貴之盛昆弟莫及焉元妃盧氏薨後更納博陵崔顯妹甚有色寵欲以為妃世宗初以崔氏世號東崔地寒望劣難之久乃聽許延昌已後多幸妓侍近百許人而疏棄崔氏別房幽禁不得關豫內政僅給衣食而已至乃左右無復婢使子女欲省其母必啟聞許乃得見未幾崔暴薨多云雍毆殺之也靈太后許賜其女妓未及送之雍遣其閹竪丁鵝自至宮內料簡四口冒以還第太后責其專擅追停之孝昌初詔曰比相府弗開陰陽未變王秉哲居宗勳望隆重道庇蒼生威被華裔體國猶家匪躬在節可開府置佐史尋罷司徒以為丞相府孝莊初尒朱榮欲害朝士遂云雍將謀逆於河陰遇害贈假黃鉞相國諡文穆王雍識懷短淺又無學業雖位居朝首不為時情所推既以親尊地當宰輔自熙平以後朝政褫落不能守正匡弼唯唯而已及清河王懌之死元叉專政天下大責歸焉嫡子泰字昌頗有時譽為中書侍郎尋遷通直散騎常侍鎮東將軍太常卿與雍同時遇害追贈侍中特進驃騎大將軍太尉公武州刺史高陽王諡曰文孝子斌襲武定中官至尚書右僕射齊受禪爵例降泰兄端字宣雅美容貌頗涉書史起家散騎侍郎累遷通直常侍鴻臚太常少卿散騎常侍出為安東將軍青州刺史是時蕭衍遣將寇逼徐揚除端撫軍將軍金紫光祿大夫使持節東南道大使處分軍機賊平拜鎮軍將軍兗州刺史俄而衍將復寇徐兗圍逼州城端率在州文武拒守得全以功封安德縣開國公食邑五百戶還除都官尚書與雍俱遇害贈車騎大將軍儀同三司相州刺史子峻襲爵齊受禪例降泰弟叡字子哲輕忽榮利愛玩琴書起家拜通直散騎侍郎遷衞尉少卿轉光祿少卿封濟北郡王與雍俱遇害贈車騎大將軍司空公雍州刺史子徽普泰中襲爵起家通直郎武定五年坐與元瑾等謀反伏法叡弟誕字文發少聰惠有風儀起家通直郎遷中書侍郎通直散騎常侍封新陽縣開國伯食邑三百戶加龍驤將軍進封昌樂王食邑七百戶遷平南將軍散騎常侍黃門侍郎孝靜初拜侍中車騎大將軍儀同三司司州牧天平三年薨贈使持節侍中太保司徒公尚書令將軍牧如故諡曰文獻無子以斌第二子子亮為後誕弟勒叉勒叉弟亘亘弟伏陀伏陀弟彌陀彌陀弟僧育僧育弟居羅出帝初勒叉封陽平縣亘封濮陽縣伏陀封武陽縣彌陀封新陽縣僧育封頓丘縣居羅封衞縣並開國伯食邑四百戶天平中並除鎮遠將軍散騎侍郎僧育走關西國除其餘齊受禪爵例降北海王詳字季豫美姿容善舉止太和九年封加侍中征北大將軍後拜光祿大夫解侍中將軍又兼侍中從高祖南伐為散騎常侍高祖自洛北巡詳常與侍中彭城王勰並在輿輦陪侍左右至高宗射銘之所高祖停駕詔諸弟及侍臣皆試射遠近唯詳箭不及高宗箭所十餘步高祖嘉之拊掌欣笑遂詔勒銘親自為制五等開建食邑二千戶遷侍中轉祕書監車駕南伐詳行中領軍留守給鼓吹一部甲仗三百人兼督營構之務高祖賜詳璽書曰比遊神何業也丘墳六籍何事非娛善正風猷肅是禁旅詳後朝於行宮高祖引見之詳慶平沔北高祖曰朕以畿南未清神麾暫動沔北數城並皆柔服此乃將士之効非朕之功詳對曰陛下德邁唐虞功微周漢自南之風於是乎始詳還洛高祖餞之詔詳曰昔者淮夷叛命故有三年之舉鬼方不令乃致淹載之師況江吳竊命于今十紀朕必欲蕩滌南海然後言歸今夏停此故與汝相見善守京邑副我所懷趙郡王幹薨以詳行司州牧除護軍將軍兼尚書左僕射高祖臨崩顧命詳為司空輔政世宗即位以詳有營構之勤增邑一千戶詳以帝居諒闇不受世宗覽政遷侍中大將軍錄尚書事咸陽王禧之謀反也詳表求解任詔曰一人之身愆不累德形乖性別忠逆固殊是以父殛子興義高唐世弟戮兄登迹顯周魯禧之與國異體同氣既肆無君之逆安顧弟友之親叔父忠顯二朝誠貫廟社實勗贊沖昧保鴻猷豈容以微介之慮忘阿衡之重貂章即已敕還願不再述祚屬眇躬言及斯事臨紙慚恨惋慨兼深詳重表陳解詔復不許除太傅領司徒侍中錄尚書事如故詳固辭詔遣敦勸乃受詳與八座奏曰竊惟姦劫難除為蠹日久羣盜作患有國攸病故五刑為用猶陷觸網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治本整網提目政之大要謹尋奪祿事條班已周歲然京邑尹令善惡易聞邊州遠守或難聽審皆上下同情迭相掩沒設有賊發隱而不言或以劫為偷或遏掠成盜更令賊發難知攘竊惟甚臣等參議若依制削奪則縣無期月之宰附條貶黜郡靡歲稔之守此制必行所謂法令滋章盜賊多有昔黃龔變風不由削祿張趙稱美豈憚貶退然綏導之體得失在人乃可重選慎官依律劾禁不宜輕改法令削黜羣司今請改制條還附律處其勵己公清賞有常典風謠黷賄案為考第世宗從之詳之拜命其夜暴風震電拔其庭中桐樹大十圍倒立本處初世宗之覽政也詳聞彭城王勰有震主之慮而欲奪其司徒大懼物議故為大將軍至是乃居之天威如此識者知其不終世宗講武於鄴詳與右僕射高肇領軍于勁留守京師初太和末詳以少弟延愛景明初復以季父崇寵位望兼極百僚憚之而貪冒無厭多所取納公私營販侵剝遠近嬖狎羣小所在請託珍麗充盈聲色侈縱建飾第宇開起山池所費巨萬矣又於東掖門外大路之南驅逼細人規占第宅至有喪柩在堂請延至葬而不見許乃令輿櫬巷次行路哀嗟詳母高太妃頗亦助為威虐親命毆擊怨響嗷嗷妃宋王劉昶女不見答禮寵妾范氏愛等伉儷及其死也痛不自勝乃至葬訖猶毀要視之表請贈平昌縣君詳又蒸於安定王爕妃高氏高氏即茹皓妻姊嚴禁左右閉密始末詳既素附於皓又緣淫好往來綢密皓之取妻也詳親至其家忻飲極醉詳雖貪侈聚斂朝野所聞而世宗禮敬尚隆憑寄無替軍國大事總而裁決每所敷奏事皆協允詳常別住華林園之西隅與都亭宮館密邇相接亦通後門世宗每潛幸其所肆飲終日其寵如此又詳拜受因其私慶啟請世宗世宗頻幸南第御其後堂與高太妃相見呼為阿母伏而上酒禮若家人臨出高每拜送舉囇祝言願官家千萬歲壽歲歲一至妾母子舍也初世宗之親政也詳與咸陽王禧彭城王勰並被召入共乘犢車防衞嚴固高時惶迫以為詳必死亦乘車傍路哭而送至金墉及詳得免高云自今而後不願富貴但令母子相保共汝掃市作活也至此貴寵崇盛不復言有禍敗之理後為高肇所譖云詳與皓等謀為逆亂于時詳在南第世宗召中尉崔亮入禁敕糾詳貪淫及茹皓劉冑常季賢陳掃靜等專恣之狀亮乃奏詳貪害公私淫亂典禮朝廷比以軍國費廣禁斷諸蕃雜獻而詳擅作威令命寺署酬直驅奪人業崇侈私第蒸穢無道失尊卑之節塵敗憲章虧風教之紀請以見事免所居官爵付鴻臚削奪輒下禁止付廷尉治罪并劾皓等夜即收禁南臺又虎賁百人圍守詳第慮其驚懼奔越遣左右郭翼開金墉門馳出諭之示以中尉彈狀詳母高見翼頓首號泣不自勝詳言審如中尉所糾何憂也正恐更有大罪橫至耳人奉我珍異貨物我實愛之果為取受吾何憂乎私以自寬至明皓等皆賜死引高陽王雍等五王入議詳罪單車防守還華林之館母妻相與哭入所居小奴弱婢數人隨從官防甚嚴終夜擊柝列坐圍守外內不通世宗為此不幸園十餘日徙詳就太府寺圍禁彌切詔曰王位兼台輔親懿莫二朝野屬賴具瞻所歸不能勵德存道宣融軌訓方乃肆茲貪靦穢暴顯聞遠負先朝友愛之寄近乖家國推敬所期理官執憲實合刑典天下為公豈容私抑但朕諸父傾落存者無幾便極逮坐情有未安可免為庶人別營坊館如法禁衞限以終身邦家不造言尋感慨遂別營館於洛陽縣東北隅二旬而成將徙詳居之會其家奴數人陰結黨輩欲以劫出詳密抄名字潛託侍婢通於詳詳始得執省而門防主司遙見突入就詳手中攬得呈奏至夜守者以聞詳哭數聲而暴死詳自至太府令其母妻還居南宅五日一來與其相見此夜母妻不在死於婢手中至明告其凶問詔曰北海叔奄至傾背痛慕抽慟情不自任明便舉哀可敕備辦喪還南宅諸王皇宗悉令奔赴給東園祕器賵物之數一依廣陵故事詳之初禁也乃以蒸高事告母母大怒詈之苦切曰汝自有妻妾侍婢少盛如花何忽共許高麗婢姦通令致此罪我得高麗當噉其肉乃杖詳背及兩脚百餘下自行杖力疲乃令奴代高氏素嚴詳每有微罪常加責罰以絮裹杖至是去絮皆至瘡膿詳苦杖十餘日乃能立又杖其妃劉氏數十云新婦大家女門戶匹敵何所畏也而不檢校夫婿婦人皆妬獨不妬也劉笑而受罰卒無所言詳貪淫之失雖聞遠近而死之日罪無定名遠近歎怪之停殯五載永平元年十月詔曰故太傅北海王體自先皇特鍾友愛受遺訓輔沖昧攸記不圖暮節晦德終缺哀榮便可追復王封克日營厝少慰幽魂以旌陰疑戚諡曰平王子顥字子明襲少慷慨有壯氣除龍驤將軍通直散騎常侍轉宗正卿光祿大夫長兼宗正卿散騎常侍平東將軍轉都官尚書加安南將軍出除散騎常侍撫軍將軍徐州刺史尋為御史彈劾除名其後賊帥宿勤明達叱干騏驎等寇亂豳華諸州乃復顥王爵以本將軍加使持節假征西將軍都督華豳東秦諸軍事兼左僕射西道行臺以討明達顥轉戰而前頻破賊衆解豳華之圍以功增封八百戶進號征西將軍又除尚書右僕射持節行臺都督如故尋遷車騎大將軍儀同三司餘如故值蕭寶夤等大敗於平涼顥亦奔還京師於時葛榮南進稍逼鄴城武泰初以顥為侍中驃騎大將軍開府儀同三司相州刺史以禦榮顥至汲郡屬尒朱榮入洛推奉莊帝詔授顥太傅開府侍中刺史王並如故顥以葛榮南侵尒朱縱害遂盤桓顧望圖自安之策先是顥啟其舅范遵為殷州刺史遵以葛榮充逼未得行顥令遵權停於鄴顥既懷異謀乃遣遵行相州事代前刺史李神為己表𩹉之援相州行臺甄密先受朝旨委其守鄴知顥異圖恐遵為變遂相率廢遵還推李神攝理州事然後遣軍候顥逆順之勢顥以事意不諧遂與子冠受率左右奔於蕭衍顥見衍泣涕自陳言辭壯烈衍奇之遂以顥為魏主假之兵將令其北入永安二年四月於梁國城南登壇燔燎號孝基元年莊帝詔濟陰王暉業為都督於考城拒之為顥所擒又克行臺楊昱於滎陽尒朱世隆自虎牢走退莊帝北幸顥遂入洛改稱建武元年顥以數千之衆轉戰輒克據有都邑號令自己天下人情想其風政而自謂天之所授頗懷驕怠宿昔賓客近習之徒咸見寵待干擾政事又日夜縱酒不恤軍國所統南兵凌竊市里朝野莫不失望時又酷斂公私不安莊帝與尒朱榮還師討顥自於河梁拒戰王師渡於馬渚冠受戰敗被擒因相繼而敗顥率帳下數百騎及南兵勇健者自轘轅而出至臨潁顥部騎分散為臨潁縣卒所斬出帝初贈使持節侍中都督冀定相殷四州諸軍事驃騎大將軍大司馬冀州刺史武定中子娑羅襲齊受禪爵例降顥弟頊字寶意起家為通直郎轉中書郎歷武衞將軍光祿少卿黃門郎出除平北將軍相州刺史為大宗正卿封平樂縣開國公食邑八百戶莊帝初拜侍中車騎將軍封東海王食邑千戶俄遷中書監左光祿大夫兼尚書右僕射又拜車騎大將軍加侍中頊無他才幹以親屬早居重任兄顥入洛成敗未分便以意氣自得為時人所笑顥敗潛竄為人執送斬於都市出帝初贈侍中都督雍華岐三州諸軍事驃騎大將軍太尉公尚書令雍州刺史子衍襲爵武定中通直散騎侍郎齊受禪爵例降史臣曰顯祖諸子俱聞道於太和之日咸陽望重位隆自猜謀亂趙郡愆於王度終諡曰靈廣陵夙稱明察不幸中夭惜矣高陽器術缺然終荷棟幹孝昌之叛蓋不足以責之北海義昧鶺鴒奢淫自喪雖禍由間言亦自貽伊戚顥取若拾遺亡不旋踵豈守之無術其天將覆之
