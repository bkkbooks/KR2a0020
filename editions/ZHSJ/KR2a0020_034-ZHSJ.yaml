body:
  text: 魏書卷二十九列傳第十七奚斤叔孫建奚斤代人也世典馬牧父簞有寵於昭成皇帝時國有良馬曰騧騮一夜忽失求之不得後知南部大人劉庫仁所盜養於窟室簞聞而馳往取馬庫仁以國甥恃寵慚而逆擊簞簞捽其髮落傷其一乳及苻堅使庫仁與衞辰分領國部簞懼將家竄於民間庫仁求之急簞遂西奔衞辰及太祖滅衞辰簞晚乃得歸故名位後於舊臣斤機敏有識度登國初與長孫肥等俱統禁兵後以斤為侍郎親近左右從破慕容寶於參合皇始初從征中原以斤為征東長史拜越騎校尉典宿衞禁旅車駕還京師博陵勃海章武諸郡羣盜並起所在屯聚拒害長吏斤與略陽公元遵等率山東諸軍討平之從征高車諸部大破之又破厙狄宥連部徙其別部諸落於塞南又進擊侯莫陳部俘虜獲雜畜十餘萬至大峨谷置戍而還遷都水使者出為晉兵將軍幽州刺史賜爵山陽侯太宗即位為鄭兵將軍循行州郡問民疾苦章武民劉牙聚黨為亂斤討平之詔以斤世忠孝贈其父簞為長寧子太宗幸雲中斤留守京師昌黎王慕容伯兒收合輕俠失志之徒李沈等三百餘人謀反斤聞而召伯兒入天文殿東廡下窮問款引悉收其黨誅之詔與南平公長孫嵩等俱坐朝堂錄決囚徒太宗大閱于東郊治兵講武以斤行左丞相大蒐於石會山車駕西巡詔斤為先驅討越勒部於鹿那山大破之獲馬五萬匹牛羊二十萬頭徙二萬餘家而還又詔斤與長孫嵩等八人坐止車門右聽理萬機蠕蠕犯塞令斤等追之事具蠕蠕傳拜天部大人進爵為公命斤出入乘軺軒備威儀導從世祖之為皇太子臨朝聽政以斤為左輔劉義符立其大臣不附國內離阻乃遣斤收劉裕前侵河南地假斤節都督前鋒諸軍事司空公晉兵大將軍行揚州刺史率吳兵將軍公孫表等南征用表計攻滑臺不拔求濟師太宗怒其不先略地切責之乃親南巡次中山義符東郡太守王景度捐城遁走司馬楚之等並遣使詣斤降斤自滑臺趣洛陽義符虎牢守將毛德祖遣其司馬翟廣將軍姚勇錯竇霸等率五千人據土樓以拒斤斤進擊破之廣等單馬走免盡殪其衆斤長驅至虎牢軍於汜東留表守輜重自率輕兵徇下河南穎川陳郡以南百姓無不歸附義符陳留太守嚴稜以郡降斤遂平兗豫諸郡還圍虎牢德祖拒守不下及虎牢潰斤置守宰以撫之自魏初大將行師唯長孫嵩拒劉裕斤征河南獨給漏刻及十二牙旗太宗崩斤乃班師世祖即位進爵宜城王仍為司空世祖征赫連昌遣斤率義兵將軍封禮等督四萬五千人襲蒲坂昌守將赫連乙升聞斤將至遣使告昌使至統萬見大軍已圍其城還告乙升曰昌已敗矣乙升懼棄蒲坂西走斤追敗之乙升遂奔長安斤入蒲坂收其資器百姓安業昌弟助興先守長安乙升至復與助興棄長安西走安定斤又西據長安於是秦雍氐羌皆來歸附與赫連定相持累戰破定定聞昌敗遂走上邽斤追之至雍不及而還詔斤班師斤上疏曰赫連昌亡保上邽鳩合餘燼未有盤據之資今因其危滅之為易請益鎧馬平昌而還世祖曰昌亡國叛夫擊之勞傷將士且可息兵取之不晚斤抗表固執乃許之給斤萬人遣將軍劉拔送馬三千匹與斤斤進討安定昌退保平涼斤屯軍安定以糧竭馬死遂深壘自固監軍侍御史安頡擊昌擒之語在頡傳昌衆復立昌弟定為主守平涼斤自以元帥而擒昌之功更不在己深之乃舍輜重輕齎三日糧追定於平涼娥清欲尋水而往斤不從自北道邀其走路定衆將出會一小將有罪亡入賊具告其實定知斤軍無糧乏水乃邀斤前後斤衆大潰斤及娥清劉拔為定所擒士卒死者六七千人後世祖克平涼斤等得歸免為宰人使負酒食從駕還京師以辱之尋拜安東將軍降爵為公車駕將討馮文通詔斤發幽州民及密雲丁零萬餘人運攻具出南道太延初為衞尉改為弘農王加征南大將軍後為萬騎大將軍世祖大集羣臣於西堂議伐涼州斤等三十餘人議曰河西王牧犍西垂下國雖內不純臣而外修職貢宜加寬宥恕其微愆去歲新征士馬疲弊未可大舉宜且覊縻其地鹵薄略無水草大軍既到不得久停彼聞軍來必嬰城固守攻則難拔野無所掠終無克獲世祖不從征之涼州平以戰功賜僮隸七十戶以斤元老賜安車平決刑獄諮訪朝政斤聰辯強識善於談論遠說先朝故事雖未皆是時有所得聽者歎美之每議大政多見從用朝廷稱焉真君九年薨時年八十世祖親臨哀慟諡曰昭王斤有數十婦子男二十餘人長子他觀襲爵世祖曰斤關西之敗國有常刑以其佐命先朝故復其爵秩將收孟明之效今斤終其天年君臣之分全矣於是降他觀爵為公除廣平太守後為都將征懸瓠卒於軍子延襲爵出為瓦城鎮將卒子緒襲爵初為散令後為太中大夫加左將軍開建五等封弘農郡開國侯食邑三百戶後例降為縣改封澄城縣開國侯增邑九百戶卒子遵襲封卒贈鎮遠將軍洛州刺史諡曰哀侯無子國除太和中高祖追錄先朝功臣以斤配食廟庭世宗繼絕世詔以緒弟子鑒特紹其後以承封邑鑒卒於中堅將軍司徒從事中郎贈龍驤將軍肆州刺史子紹宗武定中開府田曹參軍他觀弟和觀太祖時內侍左右太宗以其世典戎御遂拜典御都尉賜爵廣興子建威將軍尋進為宜陽侯加龍驤將軍領牧官中郎將出為冀青二州刺史卒子冀州襲爵冀州弟受真為中散高宗即位拜龍驤將軍賜爵成都侯遷給事中出為離石鎮將和觀弟拔太宗時內侍左右世祖即位稍遷侍中選部尚書鎮南將軍賜爵樂陵公後以罪徙邊徵為散騎常侍從征蠕蠕戰沒子買奴有寵於顯祖官至神部長與安成王萬安國不平安國矯詔殺買奴於苑內高祖賜安國死追贈買奴為并州刺史新興公斤弟普回陽曲護軍普回子烏侯世祖時拜治書御史建義將軍賜爵夷餘侯從征蠕蠕及赫連昌以功進爵城陽公加員外散騎常侍出為虎牢鎮將興光中卒喪禮依其伯父弘農王故事陪葬金陵烏侯子兠世祖時親侍左右隨從征討常持御劍後以罪徙龍城尋徵為知臣監出為薄骨律鎮將假鎮遠將軍賜爵富城侯時高車叛圍鎮城兠擊破之斬首千餘級延興中卒叔孫建代人也父骨為昭成母王太后所養與皇子同列建少以智勇著稱太祖之幸賀蘭部建常從左右登國初以建為外朝大人與安同等十三人迭典庶事參軍國之謀隨秦王觚使慕容垂歷六載乃還拜後將軍頃之為都水使者中領軍賜爵安平公加龍驤將軍出為并州刺史後以公事免守鄴城園太宗即位念建前功乃以建為正直將軍相州刺史飢胡劉虎等聚黨反叛公孫表等為虎所敗太宗假建前號安平公督表等以討虎斬首萬餘級餘衆奔走投沁而死水為不流虜其衆十萬餘口司馬德宗將劉裕伐姚泓令其部將王仲德為前鋒將逼滑臺兗州刺史尉建率所部棄城濟河仲德遂入滑臺乃宣言曰晉本意欲以布帛七萬匹假道於魏不謂魏之守將便爾棄城太宗聞之詔建自河內向枋頭以觀其勢仲德入滑臺月餘又詔建渡河曜威斬尉建投其屍於河呼仲德軍人與語詰其侵境之意仲德遣司馬竺和之建命公孫表與言和之曰王征虜為劉太尉所遣入河西行將取洛城掃山陵之寇非敢侵犯魏境太尉自遣使請魏帝陳將假道而魏兗州刺史不相體解望風捐去因空城而入非戰攻相逼也魏晉和好之義不廢於前表曰尉建失守之罪自有常刑將更遣良牧彼軍宜西不然將以小致大乖和好之體和之曰王征虜權住於此以待衆軍之集比當西過滑臺還為魏有何必建旗鼓以耀威武乎仲德卑辭常自言不敢與大魏抗衡建不能制之太宗令建與劉裕相聞以觀其意裕答言洛是晉之舊京而羌姚據之晉欲修復山陵之計久矣而內難屢興不暇經營司馬休之魯宗之父子司馬國璠兄弟諸桓宗屬皆晉之蠹也而姚氏收集此等欲以圖晉是以伐之道由於魏軍之初舉將以重幣假途會彼邊鎮棄守而去故晉前軍得以西進非敢憑陵魏境裕以官軍在河南恐斷其前路乃命引軍北寇及班師乃止語在帝紀建與南平公長孫嵩各簡精兵二千觀劉裕事勢語在嵩傳遷廣阿鎮將羣盜斂跡威名甚震久之除使持節都督前鋒諸軍事楚兵將軍徐州刺史率衆自平原濟河徇下青兗諸郡建濟河劉裕兗州刺史徐琰奔彭城建遂東入青州司馬受之秀之先聚黨於濟東皆率衆降建入臨淄劉義符前東牟太守清河張幸先匿孤山聞建至率二千人迎建於女水遂圍義符青州刺史竺夔於東陽城義符遣將檀道濟王仲德救夔建不克而還建以功賜爵壽光侯加鎮南將軍建表曰臣前遣沙門僧護詣彭城僧護還稱賊發軍向北前鋒將徐卓之已至彭城大將軍到彥之軍在泗口發馬戒嚴必有舉斧之志臣聞為國之道存不忘亡宜繕甲兵增益屯戍先為之備以待其來若不豫設卒難擒殄且吳越之衆便於舟檝今至北土舍其所長逆順既殊勞逸不等平寇定功在於此日臣雖衰弊謀略寡淺過蒙殊寵忝荷重任討除寇暴臣之志也是以秣馬枕戈思效微節願陛下不以南境為憂世祖優詔答之賜以衣馬建與汝陰公長孫道生濟河而南彥之仲德等自清入濟東走青州劉義隆兗州刺史竺靈秀棄須昌南奔湖陸建追擊大破之斬首五千餘級遂至鄒魯還屯范城世祖以建威名南震為義隆所憚除平原鎮大將封丹陽王加征南大將軍都督冀青徐濟四州諸軍事先是簡幽州以南戍兵集于河上一道討洛陽一道攻滑臺義隆將檀道濟王仲德救滑臺建與汝陰公道生拒擊之建分軍挾戰縱輕騎邀其前後焚燒穀草以絕其糧道道濟兵飢叛者相繼由是安頡等得拔滑臺建沉敏多智東西征伐常為謀主治軍清整號令嚴明又雅尚人倫禮賢愛士在平原十餘年綏懷內外甚得邊稱魏初名將尠有及之南方憚其威略青兗輒不為寇太延三年薨時年七十三世祖悼惜之諡曰襄王賜葬金陵長子俊字醜歸少聰敏年十五內侍左右性謹密初無過行以便弓馬轉為獵郎太祖崩清河王紹閉宮門太宗在外紹逼俊以為己援俊外雖從紹內實忠款仍與元磨渾等說紹得歸太宗事在磨渾傳是時太宗左右唯車路頭王洛兒等及得俊等大悅以為爪牙太宗即位命俊與磨渾等拾遺左右遷衞將軍賜爵安城公朱提王悅懷刃入禁中將為大逆俊覺悅舉動有異便引手掣之乃於悅懷中得兩刃匕首遂殺之太宗以俊前後功重軍國大計一以委之群官上事先由俊銓校然後奏聞性平正柔和未嘗有喜怒之色忠篤愛厚不諂上抑下每奉詔宣外必告示殷勤受事者皆飽之而退事密者倍至蒸仍是以上下嘉歎泰常元年卒時年二十八太宗甚痛悼之親臨哀慟朝野無不追惜贈侍中司空安城王諡孝元賜溫明祕器載以轀輬車衞士導從陪葬金陵子蒲襲爵後有大功及寵幸貴臣薨賻送終禮皆依俊故事無得踰之者初俊既卒太宗命其妻桓氏曰夫生既共榮沒宜同穴能殉葬者可任意桓氏乃縊而死遂合葬焉俊既為安城王俊弟隣襲公爵降為丹陽公少聰慧知名稍遷北部尚書有當官之稱轉尚書令出為涼州鎮大將加鎮西將軍隣與鎮副將奚牧並以貴戚子弟競貪財貨專作威福遂相糾發坐伏誅史臣曰奚斤世稱忠孝征伐有克平涼之役師殲身虜雖敗崤之責已赦封尸之效靡立而恩禮隆渥沒祀廟庭叔孫建少展誠勤終著庸伐治邊有術威震夷楚俊委節太宗義彰顛沛察朱提之變有日磾之風加以柔而有正見美朝野可謂世不乏賢矣
