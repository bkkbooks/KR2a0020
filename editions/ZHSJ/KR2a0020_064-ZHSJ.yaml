body:
  text: 魏書卷五十九列傳第四十七劉昶蕭夤蕭正表劉昶字休道義隆第九子也義隆時封義陽王兄駿以為征北將軍徐州刺史開府及駿子子業立昏狂肆暴害其親屬疑昶有異志昶聞甚懼遣典籤虞法生表求入朝以觀其意子業曰義陽與太宰謀反我欲討之今知求還甚善又屢詰法生義陽謀事汝何故不啟法生懼禍走歸彭城昶欲襲建康諸郡並不受命和平六年遂委母妻攜妾吳氏作丈夫服結義從六十餘人間行來降在路多叛隨昶至者二十許人昶雖學不淵洽略覽子史前後表啟皆其自製朝廷嘉重之尚武邑公主拜侍中征南將軍駙馬都尉封丹陽王歲餘而公主薨更尚建興長公主皇興中劉彧遣其員外郎李豐來朝顯祖詔昶與彧書為兄弟之戒彧不答責昶以母為其國妾宜如春秋荀罃對楚稱外臣之禮尋敕昶更與彧書昶表曰臣殖根南偽託體不殊秉旄作牧職班台位天厭子業夷戮同體背本歸朝事捨簪笏臣弟彧廢姪自立彰于遐邇孔懷之義難奪為臣之典靡經棠棣之詠可修越敬之事未允臣若改書事為二敬猶修往文彼所不納伏願聖慈停臣今答朝廷從之拜外都坐大官公主復薨更尚平陽長公主昶好犬馬愛武事入國歷紀猶布衣皂冠同凶素之服然呵詈童僕音雜夷夏雖在公坐諸王每侮弄之或戾手齧臂至於痛傷笑呼之聲聞于御聽高祖每優假之不以怪問至於陳奏本國事故語及征役則能斂容涕泗悲動左右而天性褊躁喜怒不每至威忿楚朴特苦引待南士禮多不足緣此人懷畏避太和初轉內都坐大官及蕭道成殺劉準時遣諸將南伐詔昶曰卿識機體運先覺而來卿宗廟不復血食朕聞斯問矜忿兼懷今遣大將軍率南州甲卒以伐逆竪克蕩兇醜翦除民害氛穢既清即胙卿江南之土以興蕃業乃以本將軍與諸將同行路經徐州哭拜其母舊堂哀感從者乃遍循故居處處隕涕左右亦莫不辛酸及至軍所將欲臨陳四面拜諸將士自陳家國滅亡蒙朝廷慈覆辭理切至聲氣激揚涕泗橫流三軍咸為感歎後昶恐雨水方降表請還師從之又加儀同三司領儀曹尚書於時改革朝儀詔昶與蔣少遊專主其事昶條上舊式略不遺忘高祖引見於宣文堂昶啟曰臣本國不造私有虐政不能廢昏立德扶定傾危萬里奔波投蔭皇闕仰賴天慈以存首領然大未雪痛愧纏心屬逢陛下釐校之始願垂曲恩處臣邊戍招集遺人以雪私雖死之日猶若生年悲泣良久高祖曰卿投誠累紀本邦湮滅王者未能恤難矜災良以為愧出蕃之日請別當處分後以昶女為鄉君高祖臨宣文堂見武興王楊集始既而引集始入宴詔昶曰集始邊方之酋不足以當諸侯之禮但王者不遺小國之臣況此蕃垂之主故勞公卿於此昶對曰陛下道化光被自北而南故巴漢之雄遠覲天闕臣猥瞻盛禮實忻嘉遇高祖曰武興宕昌於禮容並不閑備向見集始觀其舉動有賢於彌承昶對曰陛下惠洽普天澤流無外武興蕞爾豈不食椹懷音又為中書監開建五等封昶齊郡開國公加宋王之號十七年春高祖臨經武殿大議南伐語及劉蕭篡奪之事昶每悲泣不已因奏曰臣本朝淪喪艱毒備罹冀恃國靈釋臣私頓首拜謝高祖亦為之流涕禮之彌崇蕭賾雍州刺史曹虎之詐降也詔昶以兵出義陽無功而還十八年除使持節都督吳越楚彭城諸軍事大將軍固辭詔不許又賜布千匹及發高祖親餞之命百僚賦詩贈昶又以其文集一部賜昶高祖因以所製文筆示之謂昶曰時契勝殘事鍾文業雖則不學欲罷不能脫思一見故以相示雖無足味聊復為笑耳其重昶如是自昶之背彭城至是久矣其昔齋宇山池並尚存立昶更修繕還處其中不能綏邊懷物撫接義故而閨門喧猥內外姦雜前民舊吏莫不慨歎焉豫營墓於彭城西南與三公主同塋而異穴發石累之墳崩壓殺十餘人後復移改為公私費害高祖南討昶候駕於行宮高祖遣侍中迎勞之昶討蕭昭業司州雖屢破賊軍而義陽拒守不克昶乃班師十九年高祖在彭城昶至入見昶曰臣奉敕專征剋殄兇醜徒勞士馬久淹歲時有損威靈伏聽斧鉞高祖曰朕之此行本無攻守之意正欲伐罪弔民宣威布德二事既暢不失本圖朕亦無克而還豈但卿也十月昶朝于京師高祖臨光極堂大選高祖曰朝因月旦欲評魏典夫典者為國大綱治民之柄君能好典則國治不能則國亂我國家昔在代隨時制作非通世之長典故自夏及秋親議條制或言唯能是寄不必拘門朕以為不爾何者當今之世仰祖質朴清濁同流混齊一等君子小人名品無別此殊為不可我今八族以上士人品第有九九品之外小人之官復有七等若苟有其人可起家為三公正恐賢才難得不可止為一人渾我典制故令班鏡九流清一朝軌使千載之後我得髣像唐虞卿等依俙元凱昶對曰陛下光宅中區惟新朝典刊正九流為不朽之法豈唯髣像唐虞固以有高三代高祖曰國家本來有一事可慨可慨者何無公言得失今卿等各盡其心人君患不能納羣下之諫為臣患不能盡忠於主朕今舉一人如有不可卿等盡言其失若有才能而朕所不識者宜各舉所知朕當虛己延納若能如此能舉則受賞不言則有罪及論大將軍高祖曰劉昶即其人也後給班劍二十人二十一年四月薨於彭城年六十二高祖為之舉哀給溫明祕器錢百萬布五百匹蠟三百斤朝服一具衣一襲贈假黃鉞太傅領揚州刺史加以殊禮備九錫給前後部羽葆鼓吹依晉琅邪武王伷故事諡曰明昶適子承緒主所生也少而疾尚高祖妹彭城長公主為駙馬都尉先昶卒贈員外常侍長子文遠次輝字重昌並皆疏狂昶深慮不能守其爵封然輝猶小未多罪過乃以為世子襲封正始初尚蘭陵長公主世宗第二姊也拜員外常侍公主頗嚴妬輝嘗私幸主侍婢有身主笞殺之剖其孕子節解以草裝實婢腹裸以示輝輝遂忿憾疏薄公主公主姊因入聽講言其故於靈太后太后敕清河王懌窮其事懌與高陽王雍廣平王懷奏其不和之狀無可為夫婦之理請離婚削除封位太后從之公主在宮周歲高陽王及劉騰等皆為言於太后太后慮其不改未許之雍等屢請不已聽復舊義太后流涕送公主誡令謹護正光初輝又私淫張陳二氏女公主更不檢惡主姑陳留公主共相扇奬遂與輝復致忿爭輝推主墮床手脚毆蹈主遂傷胎輝懼罪逃逸靈太后召清河王懌決其事二家女髠笞付宮兄弟皆坐鞭刑徙配敦煌為兵公主因傷致薨太后親臨慟哭舉哀太極東堂出葬城西太后親送數里盡哀而還謂侍中崔光曰向哭所以過哀者追念公主為輝頓辱非一乃不關言能為隱忍古今寧有此此所以痛之後執輝於河內之溫縣幽于司州將加死刑會赦得免三年復其官爵遷征虜將軍中散大夫四年輝卒家遂衰頓無復可紀文遠歷步兵校尉前將軍景明初為統軍在壽春坐謀殺刺史王肅以壽春叛事發伏法有通直郎劉武英者太和十九年從淮南內附自云劉裕弟長沙景王道憐之曾孫賜爵建寧子司徒外兵參軍稍轉步兵校尉游擊將軍卒于河內太守而昶不以為族親也蕭寶夤字智亮蕭鸞第六子寶卷母弟也鸞之竊位封寶夤建安王寶卷立以為車騎將軍開府領石頭戍軍事寶卷昏狂其直後劉靈運等謀奉寶夤密遣報寶夤寶夤許之遂迎寶夤率石頭文武向其臺城稱警蹕百姓隨從者數百人會日暮城門閉乃燒三尚及建業城城上射殺數人衆乃奔散寶夤棄車步走部尉執送之自列為人所逼寶卷亦不罪責也寶卷弟寶融僭立以寶夤為衞將軍南徐州刺史改封鄱陽王蕭衍既克建業殺其兄弟將害寶夤以兵守之未至嚴急其家閹人顏文智與左右麻拱黃神密計穿牆夜出寶夤具小船於江岸脫本衣服著烏布襦腰繫千許錢潛赴江畔躡屩徒步脚無全皮防守者至明追之寶夤假為釣者隨流上下十餘里追者不疑待散乃度西岸遂委命投華文榮文榮與其從子天龍惠連等三人棄家將寶夤遁匿山澗賃驢乘之晝伏宵行景明二年至壽春之東城戍戍主杜元倫推檢知實蕭氏子也以禮延待馳告揚州刺史任城王澄澄以車馬侍衞迎之時年十六徒步憔悴見者以為掠賣生口也澄待以客禮乃請喪居斬衰之服澄遣人曉示情禮以喪兄之制給其齊衰寶夤從命澄率官僚赴弔寶夤居處有禮不飲酒食肉輟笑簡言一同極哀之節壽春多其故義皆受慰唁唯不見夏侯一族以夏侯同蕭衍故也改日造澄澄深器重之景明三年閏四月詔曰蕭寶夤深識機運歸誠有道冒險履屯投命絳闕微子陳韓亦曷以過也可遣羽林監領主書劉桃符詣彼迎接其資生所須之物及衣冠車馬在京邸館付尚書悉令豫備及至京師世宗禮之甚重伏訴闕下請兵南伐雖遇暴風大雨終不暫移是年冬蕭衍江州刺史陳伯之與其長史褚冑等自壽春歸降請軍立效世宗以寶夤誠懇及伯之所陳時不可失四年二月乃引八座門下入議部分之方四月除使持節都督東揚南徐兗三州諸軍事鎮東將軍東揚州刺史丹陽郡開國公齊王配兵一萬令且據東城待秋冬大舉寶夤明當拜命其夜慟哭至晨備禮策授賜車馬什物給虎賁五百人事從豐厚猶不及劉昶之優隆也又任其募天下壯勇得數千人以文智三人等為積弩將軍文榮等三人為強弩將軍並為軍主寶夤雖少羇流而志性雅重過期猶絕酒肉慘形悴色蔬食粗衣未嘗嬉笑及被命當南伐貴要多相憑託門庭賓客若市書記相尋寶夤接對報復不失其理正始元年三月寶夤行達汝陰東城已陷遂停壽春之栖賢寺值賊將姜慶真內侵士民響附圍逼壽春遂據外郭寶夤躬貫甲冑率下擊之自四更交戰至明日申時賊旅彌盛寶夤以衆寡無援退入金城又出相國東門率衆力戰始破走之當寶夤壽春之戰勇冠諸軍聞見者莫不壯之七月還京師改封梁郡開國公食邑八百戶及中山王英南伐寶夤又表求征乃為使持節鎮東將軍別將以繼英配羽林虎賁五百人與英頻破衍軍乘勝遂攻鍾離淮水汎溢寶夤與英狼狽引退士卒死沒者十四五有司奏寶夤守東橋不固軍敗由之處以極法詔曰寶夤因難投誠宜加矜貸可恕死免官削爵還第尋尚南陽長公主賜帛一千匹幷給禮具公主有婦德事寶夤盡肅雍之禮雖好合積年而敬事不替寶夤每入室公主必立以待之相遇如賓自非太妃疾篤未曾歸休寶夤器性溫順自處以禮奉敬公主內外諧穆清河王懌親而重之永平四年盧昶克蕭衍朐山戍以琅邪戍主傅文驥守之衍遣師攻文驥盧昶督衆軍救之詔寶夤為使持節假安南將軍別將長驅往赴受盧昶節度賜帛三百匹世宗於東堂餞之詔曰蕭衍送死連兵再離寒暑卿忠規內挺孝誠外亮必欲鞭尸吳墓戮衍江陰故授卿以總統之任仗卿以克捷之規宜其勉歟寶夤對曰讎未復枕戈俟旦雖無申包之志敢忘伍胥之心今仰仗神謀俯厲將帥誓必拉彼姦勁以清王略聖澤下臨不勝悲荷因泣涕橫流哽咽良久於後盧昶軍敗唯寶夤全師而歸延昌初除安東將軍瀛州刺史復其齊王四年遷撫軍將軍冀州刺史及大乘賊起寶夤遣軍討之頻為賊破臺軍至乃滅之靈太后臨朝還京師蕭衍遣其將康絢於浮山堰淮以灌揚徐除寶夤使持節都督東討諸軍事鎮東將軍以討之尋復封梁郡開國公寄食濟州之濮陽熙平初賊堰既成淮水濫溢將為揚徐之患寶夤於堰上流更鑿新渠引注淮澤水乃小減乃遣輕車將軍劉智文虎威將軍劉延宗率壯士千餘夜渡淮燒其竹木營聚破賊三壘殺獲數千人斬其直閤將軍王升明而還火數日不滅衍將垣孟孫張僧副等水軍三千渡淮北攻統軍呂叵寶夤遣府司馬元達統軍魏續年等赴擊破之孟孫等奔退乃授左光祿大夫殿中尚書寶夤又遣軍主周恭叔率壯士數百夜渡淮南焚賊徐州刺史張豹子等十一營賊衆驚擾自殺害者甚衆寶夤還京師又除使持節散騎常侍都督荊東洛三州諸軍事衞將軍荊州刺史不行復為殿中尚書寶夤之在淮堰蕭衍手書與寶夤曰謝齊建安王寶夤亡兄長沙宣武王昔投漢中值北寇華陽地絕一隅內無素畜外絕繼援守危疏勒計踰田單卒能全土破敵以弱為強使至之日君臣動色左右相賀齊明帝每念此功未嘗不輟箸咨嗟及至張永崔慧景事大將覆軍於外小將懷貳於內事危累卵勢過綴旒亡兄忠勇奮發旋師大峴重圍累日一鼓魚潰克定慧景功踰桓文亡弟衞尉兄弟勠力盡心內外大勳不報翻罹荼酷百口幽執禍害相尋朕於齊明帝外有龕敵之力內盡帷幄之誠日自三省曾無寸咎遠身邊外亦復不免遂遣劉山陽輕舟西上來見掩襲時危事迫勢不得已所以誓衆樊鄧會踰孟津本欲翦除梅虫兒茹法珍等以雪寃酷拔濟親屬反身素里屬張稷王珍國已建大事寶晊子晉屢動危機迫樂推之心應上天之命事不獲已豈其始願所以自有天下絕棄房室斷除滋味正欲使四海見其本心耳勿謂今日之位是為可重朕之視此曾不如一芥雖復崆峒之蹤難追汾陽之志何遠而今立此堰卿當未達本意朕於昆蟲猶不欲殺亦何急爭無用之地戰蒼生之命也正為李繼伯在壽陽侵犯邊境歲月滋甚或攻小城小戍或掠一村一里若小相酬答終無寧日邊邑爭桑吳楚連禍所以每抑鎮戍不與校計繼伯既得如此濫竊彌多今修此堰止欲以報繼伯侵盜之役既非大舉所以不復文移北土卿幼有倜儻之心早懷縱橫之氣往日卿於石頭舉事雖不克捷亦丈夫也今止河洛真其時矣雖然為卿計者莫若行率此衆襲據彭城別當遣軍以相影援得捷之後便遣卿兄子屏侍送卿國廟幷卿室家及諸姪從若方欲還北更設奇計恐機事一差難重復集勿為韓信受困野鷄寶夤表送其書陳其忿毒之意朝廷為之報答寶夤志存雪復屢請居邊神龜中出為都督徐南兗二州諸軍事車騎將軍徐州刺史乃起學館於清東朔望引見土姓子弟接以恩顏與論經義勤於政治吏民愛之凡在三州皆著名稱正光二年徵為車騎大將軍尚書左僕射善於吏職甚有聲名四年上表曰臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可知矣大較在于官人用才審於所莅練迹校名驗於虛實豈不以臧否得之餘論優劣著於歷試者乎既聲窮於月旦品定於黃紙用效於名輩事彰於臺閤則賞罰之途差有商準用捨之宜非無依據雖復勇進忘退之儔奔競於市里過分亡涯之請馳騖於多門猶且顧其聲第慎其與奪器分定於下爵位懸於上不可妄叨故也今竊見考功之典所懷未喻敢竭無隱試陳萬一何者竊惟文武之名在人之極地德行之稱為生之最首忠貞之美立朝之譽仁義之號處身之端自非職惟九官任當四岳授曰爾諧讓稱俞往將何以克厭大名允茲令問自比已來官罔高卑人無貴賤皆飾辭假說用相褒舉涇渭同波薰猶共器求者不能量其多少與者不復覈其是非遂使冠履相貿名與實爽謂之考功事同汎陟紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身名廢絕或具僚離索或同事凋零雖當時文簿記其殿最日久月深駁落都盡人有去留誰復掌其勤墮或停休積稔或分隔數千累年之後方求追訪聲迹立其考第無不苟相悅附共為脣齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢達君子未免斯患中庸已降夫復何論官以求成身以請立上下相蒙莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程既而限滿代還復經六年而是則歲周十二始得一階於東西兩省文武閑職公府散佐無事冗官或數旬方應一直或朔望止於暫朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虛名而升陟之方甚易何內外之相懸令厚薄之如是又聞之聖人大寶曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古之人修其天爵而人爵從之故雖文質異時污隆殊世莫不寶茲名器不以假人是以賞罰之柄自持也至乃周之藹藹五叔無官漢之察察館陶徒請豈不重骨肉私親親誠以賞罰一差則無以懲勸至公暫替則覬覦相欺故至慎至惜殷勤若此況乎親非胏腑才乖秀逸或充單介之使始無汗馬之勞或說興利之規終慚十一之潤皆虛張無功妄指贏益坐獲數階之官藉成通顯之貴於是巧詐萌生偽辯鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其若斯但抑之則其流已注引之則有何紀極夫琴瑟在於必和更張求其適調去者既不可追來者猶或宜改按周官太宰之職歲終則令官府各正所司受其會計聽其致事而詔於王三歲則大計羣吏之治而誅賞之愚謂今可粗依其準見居官者每歲終本曹皆明辨在官日月具覈才行能否審其實用而注其上下游辭宕說無一取焉列上尚書覆其合否如有紕謬即正而罰之不得方復推詰委否容其進退既定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞總而奏之經奏之後考功曹別書於黃紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黃門印署掌在尚書嚴加緘密不得開視考績之日然後對共裁量如此則少存實錄薄止姦回其內外考格裁非庸管乞求博議以為畫一若殊謀異策事關廢興遐邇所談物無異議者自可臨時斟酌匪拘例至如援流引比之訴貪榮求級之請如不限以關鍵肆其傍通則蔓草難除涓流遂積穢我彝章撓茲大典謂宜明加禁斷以全至治開返本之路杜澆弊之門如斯則吉士盈朝薪槱載煥矣詔付外博議以為永式竟無所定時蕭衍弟子西豐侯正德來降寶夤表曰伏見揚州表蕭正德自云避禍遠投宸掖背父叛君駭議衆口深心指趣厥情難測臣聞立身行道始於事親終於事君故君親盡之以敬嚴父兼之以博愛斯人倫之所先王教之盛典三千之罪莫大於不孝毀則藏姦常刑靡赦所以晉恭獲謗無所逃死衞伋受誣二子繼沒親命匪棄國孰無父況今封豕尚存長蛇未滅偷生江表自安毒酖而正德居猶子之親竊通侯之貴父榮於國子爵於家履霜弗聞去就先結隔絕山淮溫凊永盡定省長違報復何日以此為心心可知矣皇朝綿基累葉恩均四海自北徂南要荒仰澤能言革化無思不韙賁玉帛於丘園標忠孝以納賞築䤝街于伊洛集華裔其歸心被髮鐻身之酋屈膝而請吏交趾文身之渠款關而効質至如正德宜甄義以致貶昔越栖會稽賴宰嚭以獲立漢困彭宋實丁公而獲免吳項已平二臣即法豈不錄其情哉欲明責以示後況遺君忽父狼子是心既不親親安能親人中間變詐或有萬等伏惟陛下聖敬自天欽光纂歷昭德塞違以臨羣后脫苞此凶醜置之列位百官是象其何誅焉臣釁結禍深痛纏肝髓日暮途遙復報無日豈區區於一豎哉但才雖庸近職居獻替愚衷寸抱敢不申陳伏願聖慈少垂察覽訪議槐棘論其是非使秋霜春露施之有在相鼠攸刺遄死有歸無令申伋受笑於苟存曾閔淪名於盛世正德既至京師朝廷待之尤薄歲餘還叛五年蕭衍遣其將裴邃虞鴻等率衆寇揚州詔寶夤為使持節散騎常侍車騎大將軍都督徐州東道諸軍事率諸將討之既而揚州刺史長孫稚大破邃軍斬鴻賊遂奔退初秦州城人薛珍劉慶杜遷等反執刺史李彥推莫折大提為首自稱秦王大提尋死其第四子念生竊號天子改年曰天建置立官僚以息阿胡為太子其兄阿倪為西河王弟天生為高陽王伯珍為東郡王安保為平陽王遣天生率衆出隴東攻沒汧城仍陷岐州執元志裴芬之等遂寇雍州屯於黑水朝廷甚憂之乃除寶夤開府西道行臺率所部東行將統為大都督西征肅宗幸明堂因以餞之寶夤與大都督崔延伯擊天生大破之斬獲十餘萬追奔至于小隴軍人採掠遂致稽留不速追討隴路復塞仍進討高平賊帥万俟醜奴於安定更有負捷時有天水人呂伯度兄弟始共念生同逆後與兄衆保於顯親聚衆討念生戰敗降於胡琛琛以伯度為大都督秦王資其士馬還征秦州大敗念生將杜粲於成紀又破其金城王莫折普賢於水洛城遂至顯親念生率衆身自拒戰又大奔敗伯度乃背胡琛襲琛將劉拔破走之遣其兄子忻和率騎東引國軍念生事迫乃詐降於寶夤朝廷喜伯度立義之功授撫軍將軍涇州刺史平秦郡開國公食邑三千戶而大都督元脩義高聿停軍隴口久不西進念生復反伯度終為醜奴所殺故賊勢更甚寶夤不能制孝昌二年四月除寶夤侍中驃騎大將軍儀同三司假大將軍尚書令給後部鼓吹增封千戶寶夤初自黑水終至平涼與賊相對數年攻擊賊亦憚之關中保全寶夤之力矣三年正月除司空公出師既久兵將疲弊是月大敗還雍州仍停長安收聚離散有司處寶夤死罪詔恕為民四月除使持節都督雍涇岐南豳四州諸軍事征西將軍雍州刺史假車騎大將軍開府西討大都督自關以西皆受節度九年念生為其常山王杜粲所殺合門皆盡粲據州請降於寶夤十月除散騎常侍車騎將軍尚書令復其舊封是時山東關西寇賊充斥王師屢北人情沮喪寶夤自以出軍累年糜費尤廣一旦覆敗慮見猜責內不自安朝廷頗亦疑阻乃遣御史中尉酈道元為關中大使寶夤謂密欲取己彌以憂懼而長安輕薄之徒因相說動道元行達陰盤驛寶夤密遣其將郭子恢等攻而殺之詐收道元尸表言白賊所害又殺都督南平王仲冏是月遂反僭舉大號赦其部內稱隆緒元年立百官乃遣郭子恢東寇潼關行臺張始榮圍華州刺史崔襲詔尚書僕射行臺長孫稚討之時北地人毛鴻賓與其兄遐糾率鄉義將討寶夤寶夤遣其大將軍盧祖遷等擊遐為遐所殺又遣其將侯終德往攻遐會子恢為官軍所敗長孫稚又遣子子彥破始榮於華州終德因此勢挫還圖寶夤軍至白門寶夤始覺與終德交戰戰敗攜公主及其少子與部下百餘騎從後門出走渡渭橋投於寧夷巴張宕昌劉興周舍尋奔醜奴醜奴以寶夤為太傅永安三年都督尒朱天光遣賀拔岳等破醜奴於安定追擒醜奴寶夤並送京師詔置閶闔門外都街之中京師士女聚共觀視凡經三日吏部尚書李神儁黃門侍郎高道穆並與寶夤素舊二人相與左右言於莊帝云其逆亦事在前朝冀得赦免會應詔王道習時自外至莊帝問道習在外所聞道習曰唯聞陛下欲不殺蕭寶夤帝問其故道習曰人云李尚書高黃門與寶夤周款並居得言之地必能全之道習因曰若謂寶夤逆在前朝便將恕之寶夤敗於長安走為醜奴太傅豈非陛下御曆之日賊臣不翦法欲安施帝然其言乃於太僕牛署賜死寶夤之將死神儁攜酒就之以舊故因對之下泣而寶夤夷然自持了不憂懼唯稱推天委命恨不終臣節而已公主攜男女就寶夤訣別慟哭極哀寶夤死色貌不改寶夤有三子皆公主所生而並凡劣長子烈復尚肅宗妹建德公主拜駙馬都尉寶夤反伏法次子權與少子凱射戲凱矢激中之而死凱仕至司徒左長史凱妻長孫稚女也輕薄無禮公主數加罪責凱竊銜恨妻復惑說之天平中凱遂遣奴害公主乃轘凱於東巿妻梟首家遂殄滅寶夤兄寶卷子贊字德文本名綜入國寶夤改焉初蕭衍滅寶卷寶卷宮人吳氏始孕匿而不言衍仍納之生贊以為己子封豫章王及長學涉有才思其母告之以實贊晝則談謔如常夜則銜悲泣涕結客待士有來奔之志為衍諸子深所猜疾而衍甚愛寵之有濟陰芮文寵安定梁話贊曲加禮接乃割血自誓布以腹心寵話等既感其情義敬相然諾值元法僧以彭城叛入蕭衍衍命贊為南兗徐二州刺史都督江北諸軍事鎮彭城於時肅宗遣安豐王延明臨淮王彧討之贊便遣使密告誠款與寵話夜出步投彧軍孝昌元年秋屆于洛陽陛見之後就館舉哀追服三載寶夤于時在關西遣使觀察聞其形貌斂眉悲感朝廷賞賜豐渥禮遇隆厚授司空封高平郡開國公丹陽王食邑七千戶及寶夤反贊惶怖欲奔白鹿山至河橋為北中所執朝議明其不相干預仍蒙慰勉建義初隨尒朱榮赴晉陽莊帝徵贊還洛轉司徒遷太尉尚帝姊壽陽長公主出為都督齊濟西兗三州諸軍事驃騎大將軍開府儀同三司齊州刺史寶夤見擒贊拜表請寶夤命尒朱兆入洛為城民趙洛周所逐公主被錄還京尒朱世隆欲相陵逼公主守操被害贊既棄州為沙門潛詣長白山未幾趣白鹿山至陽平遇病而卒時年三十一贊機辯文義頗有可觀而輕薄俶儻猶見父之風尚普泰末敕迎其喪至洛遣黃門郎鹿悆護喪事以王禮與公主合葬嵩山至元象初吳人盜其喪還江東蕭衍猶以為子祔葬蕭氏墓焉贊江南有子在國無後蕭正表字公儀蕭衍弟臨川王宣達子也正表長七尺九寸眉目疏朗雖質貌豐美而性理短闇衍以為封山縣開國侯拜給事中歷東宮洗馬淮南晉安二郡太守轉輕車將軍北徐州刺史鎮鍾離初衍未有子以正表兄正德為子既而封為西豐侯正德私懷忿憾正光三年背衍奔洛朝廷以其人才庸劣不加禮待尋逃歸衍不之罪後封正德臨賀王衍末復為散騎常侍光祿大夫知丹陽尹事侯景之將濟江也知正德有恨於衍密與交通許推為主正德以船數十舫迎之景渡江衍召正表入援正表率衆次廣陵聞正德為侯景所推仍託舫糧未集磬桓不進景尋以正表為南兗州刺史封南郡王正表既受景署遂於歐陽立柵斷衍援軍又欲遣其妾兄龔子明進攻廣陵衍南兗州刺史南康王蕭會理遣前廣陵令劉瑗襲擊破之正表狼狽失據乃率輕騎走還鍾離武定七年正月仍送子為質據州內屬徐州刺史高歸彥遣長史劉士榮馳赴之事定正表入朝以勳封蘭陵郡開國公吳郡王食邑五千戶尋除侍中車騎將軍特進太子太保開府儀同三司賞賚豐厚其年冬薨年四十二贈侍中都督徐揚兗豫濟五州諸軍事驃騎大將軍司空公徐州刺史開國公王並如故諡曰昭烈子廣壽史臣曰劉昶猜疑懼禍蕭夤亡破之餘並潛骸竄影委命上國俱稱曉了咸當任遇雖有枕戈之志終無鞭墓之誠昶諸子疏喪其家業寶夤背恩忘義梟鏡其心此亦戎夷彯狡輕薄之常事也天重其罪鬼覆其門至於母子兄弟還相殲滅抑是積惡之義云蕭贊臨邊脫身晚去讎賊寵祿頓臻顛沛旋至信吉凶之相倚也正表歸命大享名族亦以優哉
