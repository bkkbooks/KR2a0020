body:
  text: 魏書卷八十八列傳良吏第七十六張恂鹿生張應宋世景路邕閻慶胤明亮杜纂裴佗竇瑗羊敦蘇淑罷侯置守歷年永久統以方牧仍世相循所以寬猛為用庇民調俗但廉平常迹聲問難高適時應務招響必速是故摶擊為侯起不旋踵儒弱貽咎錄用無時此則已然於前世矣後之為吏與世沉浮季叔澆漓姦巧多緒所以蒲密無為之化難見其人有魏初拓中州兼并疆域河南關右遺黎未純擁節分符多出豐沛政術治風未能咸允雖動貽大戮而貪虐未悛亦由網漏吞舟時挂一目高祖肅明綱紀賞罰必行肇革舊軌時多奉法世宗優遊而治寬政遂往太和之風頗以陵替肅宗馭運天下淆然其於移風革俗之美浮虎還珠之政九州百郡無所聞焉且書其為時所稱者以著良吏云爾張恂字洪讓上谷沮陽人也隨兄袞歸國參代王軍事恂言於太祖曰金運失御劉石紛紜慕容竊號山東苻姚盜器秦隴遂使三靈乏響九域曠君大王樹基玄朔重明積聖自北而南化被燕趙今中土遺民望雲冀潤宜因斯會以建大業太祖深器異厚加禮焉皇始初拜中書侍郎幃幄密謀頗預參議從將軍奚牧略地晉川拜鎮遠將軍賜爵平臯子出為廣平太守恂招集離散勸課農桑民歸之者千戶遷常山太守恂開建學校優顯儒士吏民歌詠之於時喪亂之後罕能克厲惟恂當官清白仁恕臨下百姓親愛之其治為當時第一太祖聞而嘉歎太宗即位賜帛三百匹徵拜太中大夫神瑞三年卒年六十九恂性清儉不營產業身死之日家無餘財太宗悼惜之贈征虜將軍并州刺史平臯侯諡曰宣子純字道尚襲爵鎮遠將軍平臯子坐事爵除純弟代字定燕陳留北平二郡太守卒贈冠軍將軍營州刺史諡曰惠侯代所歷著清稱有父之遺風代子長年中書博士出為寧遠將軍汝南太守有郡民劉崇之兄弟分析家貧惟有一牛爭之不決訟於郡庭長年見之然曰汝曹當以一牛故致此競脫有二牛各應得一豈有訟理即以家牛一頭賜之於是郡境之中各相誡約咸敦敬讓太和初卒於家子琛字寶貴少有孝行歷武騎常侍羽林監太子翊軍校尉卒子略武定中左光祿大夫鹿生濟陰乘氏人父壽興沮渠牧犍庫部郎生再為濟南太守有治稱顯祖嘉其能特徵赴季秋馬射賜以驄馬加以青服彰其廉潔前後在任十年時三齊始附人懷苟且蒲博終朝頗廢農業生立制斷之聞者嗟善後歷徐州任城王澄廣陵侯元衍征東安南二府長史帶淮陽太守郯城鎮將年七十四正始中卒追贈龍驤將軍兗州刺史張應不知何許人延興中為魯郡太守應履行貞素聲績著聞妻子樵采以自供高祖深嘉其能遷京兆太守所在清白得吏民之忻心焉宋世景廣平人河南尹翻之第三弟也少自修立事親以孝聞與弟道璵下帷誦讀博覽羣言尤精經義族兄弁甚重之舉秀才對策上第拜國子助教遷彭城王勰開府法曹行參軍勰愛其才學雅相器敬高祖亦嘉之遷司徒法曹行參軍世景明刑理著律令裁決疑獄剖判如流轉尚書祠部郎彭城王勰每稱之曰宋世景精識尚書僕射才也臺中疑事右僕射高肇常以委之世景既才長從政加之夙勤不怠兼領數曹深著稱績頻為左僕射源懷引為行臺郎巡察州鎮十有餘所黜陟賞罰莫不咸允遷徙七鎮別置諸戍明設亭候以備北虜懷大相委重還而薦之於世宗曰宋世景文武才略當今寡儔清平忠直亦少其比陛下若任之以機要終不減李沖也世宗曰朕亦聞之尚書令廣陽王嘉右僕射高肇吏部尚書中山王英共薦世景為國子博士尋薦為尚書右丞王顯與宋弁有隙毀之於世宗故事寢不報尋加伏波將軍行滎陽太守鄭氏豪橫號為難治濟州刺史鄭尚弟遠慶先為苑陵令多所受納百姓患之世景下車召而謂之曰與卿親宜假借吾未至之前一不相問今日之後終不相捨而遠慶行意自若世景繩之以法遠慶懼棄官亡走於是僚屬畏威莫不改肅終日坐於廳事未嘗寢息縣史三正及諸細民至即見之無早晚之節來者無不盡其情抱皆假之恩顏屏人密語民間之事巨細必知發姦摘伏有若神明嘗有一吏休滿還郡食人鷄䄡又有一幹受人一帽又食二鷄世景叱之曰汝何敢食甲乙鷄䄡取丙丁之帽吏幹叩頭伏罪於是上下震悚莫敢犯禁坐弟道璵事除名世景友于之性過絕於人及道璵死哭之哀切酸感行路形容毀悴見者莫不歎愍歲餘母喪遂不勝哀而卒世景嘗撰晉書竟未得就子季儒遺腹生弱冠太守崔楷辟為功曹起家太學博士明威將軍曾至譙宋之間為文弔嵇康甚有理致後夜寢室壞壓殞年二十五時人咸傷惜之路邕陽平清淵人世宗時積功勞除齊州東魏郡太守有惠政靈太后詔曰邕莅政清勤善綏民俗比經年儉郡內饑饉羣庶嗷嗷將就溝壑而邕自出家粟賑賜貧窘民以獲濟雖古之良守何以尚茲宜見霑錫以垂奬勸可賜龍竹罒戊馬一匹衣一襲被褥一具班宣州鎮咸使聞知邕以善治民稍遷至南青州刺史而卒閻慶胤不知何許人為東秦州敷城太守在政五年清勤厲俗頻年饑饉慶胤歲常以家粟千石賑恤貧窮民賴以濟其部民楊寶龍等一千餘人申訟美政有司奏曰案慶胤自莅此郡惠政有聞又能自以己粟贍恤饑饉乃有子愛百姓之義如不少加優賚無以厲彼貪殘又案齊州東魏郡太守路邕在郡治能與之相埒語其分贍又亦不殊而聖旨優隆賜以衣馬求情即理謂合同賞靈太后卒無褒賞焉明亮字文德平原人性方厚有識幹自給事中歷員外常侍延昌中世宗臨朝堂親自黜陟授亮勇武將軍亮進曰臣本官常侍是第三清今授臣勇武其號至濁且文武又殊請更改授世宗曰今依勞行賞不論清濁卿何得乃復以清濁為辭亮曰聖明在上清濁故分臣既屬聖明是以敢啟世宗曰九流之內人咸君子雖文武號殊佐治一也卿何得獨欲乖衆妄相清濁所請未可但依前授亮曰今江左未賓書軌宜一方為陛下授命前驅拓定吳會官爵陛下之所輕賤命微臣之所重陛下方收所重何惜所輕世宗笑曰卿欲為朕拓定江表揃平蕭衍揃平拓定非勇武莫可今之所授是副卿言辭勇及武自相矛盾亮曰臣欲仰禀聖規運籌而定何假勇武方乃成功世宗曰謀勇二事體本相須若勇而無謀則勇不獨舉若謀而無勇則謀不孤行必須兼兩乃能制勝何得云偏須運籌而不復假勇乎亮曰請改授平遠將軍世宗曰運籌用武然後遠人始平卿但用武平之何患不得平遠也亮乃陳謝而退後除陽平太守清白愛民甚有惠政聲績之美顯著當時朝廷嘉其風化轉汲郡太守為治如前譽宣遠近二郡民吏迄今追思之卒孝昌初贈左將軍南青州刺史初亮之在陽平屬相州刺史中山王熙起兵討元叉時并州刺史城陽王徽亦遣使詣亮密同熙謀熙敗亮詭其使辭由是徽音獲免二年詔追前效重贈平東將軍濟州刺史拜其子希遠奉朝請亮從弟遠儀同開府從事中郎杜纂字榮孫常山九門人也少以清苦自立時縣令齊羅喪亡無親屬收瘞纂以私財殯葬由是郡縣標其門閭後居父喪盡禮郡舉孝廉補豫州司士稍除積弩將軍領衆詣淮迎降民楊箱等修立楚鎮超納山蠻李天保等五百戶從征新野除騎都尉又從駕壽春敕纂緣淮慰勞豫州刺史田益宗率戶歸國使纂詣廣陵安慰初附賑給田廩從征新野及南陽平以功賜爵井陘男賞帛五百匹數日之中散之知友時人稱之又詣赭陽武陰二郡課種公田隨供軍費除南秦州武都太守正始中遷漢陽太守並以清白為名又隨都督楊椿等詣南秦軍前招慰逆氐還除虎賁中郎將領太倉令遭母憂去職久之除伏波將軍復為太倉令尋除寧遠將軍陰陵戍主延昌中京師儉敕纂監京倉賑給民廩肅宗初拜征虜將軍清河內史性儉約尤愛貧老至能問民疾苦對之泣涕勸督農桑親自檢視勤者賞以物帛惰者加以罪譴弔死問生甚有恩紀還以本將軍除東益州刺史無御邊威略羣氐反叛以失民和徵還遷太府少卿除平陽太守後將軍太中大夫正光末清河人房通等三百人頌纂德政乞重臨郡詔許之孝昌中為葛榮圍逼纂以郡降榮榮令纂入信都慰喻都督李瑾欲斬刺史元孚德纂還出又勸榮以水灌城榮遂以纂為常山太守至郡未幾榮滅定州刺史薛曇尚以纂老舊令護博陵鉅鹿二郡纂以疾辭少時卒於家纂所歷任好行小惠蔬食弊衣多涉誣矯而輕財潔己終無受納為百姓所思號為良守永熙中贈平北將軍殷州刺史天平四年重贈本將軍定州刺史裴佗字元化河東聞喜人其先因晉亂避地涼州苻堅平河西東歸桑梓因居解縣焉父景惠州別駕佗容貌魁偉隤然有器望少治春秋杜氏毛詩周易並舉其宗致舉秀才以高第除中書博士轉司徒參軍司空記室揚州任城王澄開府倉曹參軍入為尚書倉部郎中行河東郡事所在有稱績還拜尚書考功郎中河東邑中正世宗親臨朝堂拜員外散騎常侍中正如故轉司州治中以風聞為御史所彈尋會赦免轉征虜將軍中散大夫為趙郡太守為治有方威惠甚著猾吏姦民莫不改肅所得俸祿分恤貧窮轉前將軍東荊州刺史郡民戀仰傾境餞送至今追思之尋加平南將軍蠻酋田盤石田敬宗等部落萬餘家恃衆阻險不賓王命前後牧守雖屢征討未能降款佗至州單使宣慰示以禍福敬宗等聞佗宿德相率歸附於是闔境清晏寇盜寢息邊民懷之襁負而至者千餘家尋加撫軍將軍又遷中軍將軍在州數載以疾乞還永安二年卒遺令不聽請贈不受賻襚諸子皆遵行之佗性剛直不好俗人交游其投分者必當時名勝清白任真不事家產宅不過三十步又無田園暑不張蓋寒不衣裘其貞儉若此六子讓之字士禮武定末中書侍郎讓之弟諏之字士正早有才學司徒記室參軍天平末入於關西竇瑗字世珍遼西遼陽人自言本扶風平陵人漢大將軍竇武之曾孫崇為遼西太守子孫遂家焉曾祖堪慕容氏漁陽太守祖表馮文通成周太守入國父冏舉秀才早卒普泰初瑗啟以身階級為父請贈詔贈征虜將軍平州刺史瑗年十七便荷帙從師遊學十載始為御史轉奉朝請兼太常博士拜大將軍太原王尒朱榮官因是為榮所知遂表留瑗為北道大行臺左丞以軍功賜爵陽洛男除員外散騎常侍瑗以拜榮官賞新昌男因從榮東討葛榮事平封容城縣開國伯食邑五百戶後除征虜將軍通直散騎常侍仍左丞瑗乞以容城伯讓兄叔珍詔聽以新昌男轉授之叔珍由是位至太山太守尒朱世隆等立長廣王曄為主南赴洛陽至東郭外世隆等遣瑗奏廢之瑗執鞭獨入禁內奏曰天人之望皆在廣陵願行堯舜之事曄遂禪焉由是除征南將軍金紫光祿大夫敷奏侃然前廢帝甚重之出帝時為廷尉卿及釋奠開講瑗與散騎常侍溫子昇給事黃門侍郎魏季景通直散騎常侍李業興並為摘句天平中除鎮東將軍金紫光祿大夫尋除廣宗太守治有清白之稱廣宗民情凶戾前後累政咸見告訟惟瑗一人終始全潔轉中山太守加征東將軍聲譽甚美為吏民所懷及齊獻武王班書州郡誡約牧守令長稱瑗政績以為勸厲焉後授使持節本將軍平州刺史在州政如治郡又為齊獻武王丞相府右長史瑗無軍府斷割之才不甚稱職又行晉州事既還京師上表曰臣在平州之日蒙班麟趾新制即依朝命宣示所部士庶忻仰有若三章臣聞法象巍巍乃大舜之事政道郁郁亦隆周之軌故元首股肱可否相濟聲教之聞於此為證伏惟陛下應圖臨宇握紀承天克構洪基會昌寶歷式張琴瑟且調宮羽去甚刪泰革弊遷澆俾高祖之德不墜於地畫一既歌萬國歡躍臣伏讀至三公曹第六十六條母殺其父子不得告告者死再三返覆之未得其門何者案律子孫告父母祖父母者死又漢宣云子匿父母孫匿大父母皆勿論蓋謂父母祖父母小者攘羊甚者殺害之類恩須相隱律抑不言法理如是足見其直未必指母殺父止子不言也若父殺母乃是夫殺妻母卑於父此子不告是也而母殺父不聽子告臣誠下愚輒以為惑昔楚康王欲殺令尹子南其子棄疾為王御士而上告焉對曰泄命重刑臣不為也王遂殺子南其徒曰行乎吾與殺吾父行將焉入曰臣乎曰殺父事讎吾不忍乃縊而死注云棄疾自謂不告父為與殺謂王為讎皆非禮春秋譏焉斯蓋門外之治以義斷恩知君殺父而子不告是也母之於父同在門內恩無可掩義無斷割知母將殺理應告父如其已殺宜聽告官今母殺父而子不告便是知母而不知父識比野人義近禽獸且母之於父作合移天既殺己之天復殺子之天二天頓毀豈容頓默此母之罪義在不赦下手之日母恩即離仍以母道不告鄙臣所以致惑今聖化淳洽穆如韶夏食椹懷音梟鏡猶變況承風禀教識善知惡之民哉脫下愚不移事在言外如或有之可臨時議罪何用豫制斯條用為訓誡誠恐千載之下談者諠譁以明明大朝有尊母卑父之論以臣管見實所不取如在淳風厚俗必欲行之且君父一也父者子之天被殺事重宜附父謀反大逆子得告之條父一而已至情可見竊惟聖主有作明賢贊成光國寧民厥用為大非下走頑蔽所能上測但受恩深重輒獻瞽言儻蒙收察乞付評議詔付尚書三公郎封君義立判云身體髮膚受之父母生我勞悴續莫大焉子於父母同氣異息終天靡報在情一也今忽欲論其尊卑辨其優劣推心未忍訪古無據母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將欲何之案春秋莊公元年不稱即位文姜出故服虔注云文姜通兄齊襄與殺公而不反父殺母出隱痛深諱期而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理且聖人設法所以防淫禁暴極言善惡使知而避之若臨事議刑則陷罪多矣惡之甚者殺父害君著之律令百王罔革此制何嫌獨求削去既於法無違於事非害宣布有年謂不宜改瑗復難云尋局判云子於父母同氣異息終天靡報在情一也今欲論其尊卑辨其優劣推心未忍訪古無據瑗以為易曰天尊地卑乾坤定矣又曰乾天也故稱父坤地也故稱母又曰乾為天為父坤為地為母禮喪服經曰為父斬衰三年為母齊衰期尊卑優劣顯在典章何言訪古無據局判云母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將欲何之瑗案典律未聞母殺其父而子有隱母之義既不告母便是與殺父天下豈有無父之國此子獨得有所之乎局判又云案春秋莊公元年不稱即位文姜出故服虔注云文姜通於兄齊襄與殺公而不反父殺母出隱痛深諱期而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理瑗尋注義隱痛深諱者以父為齊所殺而母與之隱痛父死深諱母出故不稱即位非為諱母與殺也是以下文以義絕其罪不為與殺明矣公羊傳曰君殺子不言即位隱之也期而中練父憂少衰始念於母略書夫人遜於齊是內諱出奔猶為罪文傳曰不稱姜氏絕不為親禮也注云夫人有與殺桓之罪絕不為親得尊父之義善莊公思大義絕有罪故曰禮也以大義絕有罪得禮之衷明有讎疾告列之理但春秋桓莊之際齊為大國通于文姜魯公謫之文姜以告齊襄使公子彭生殺之魯既弱小而懼於齊是時天子衰微又無賢霸故不敢讎之又不敢告列惟得告於齊曰無所歸咎惡於諸侯請以公子彭生除之齊人殺公子彭生案郎此斷雖有援引即以情推理尚未遣惑事遂停寢除大宗正卿尋加衞將軍宗室以其寒士相與輕之瑗案法推治無所顧避甚見讎疾官雖通顯貧窘如初清尚之操為時所重領本州大中正以本官兼廷尉卿卒官贈本將軍太僕卿濟州刺史諡曰明羊敦字元禮太山鉅平人梁州刺史祉弟子也性尚閑素學涉書史以父靈引死王事除給事中出為本州別駕公平正直見有非法敦終不判署後為尚書左侍郎徐州撫軍長史永安中轉廷尉司直不拜拜洛陽令後為鎮南將軍金紫光祿大夫遷太府少卿轉衞將軍廣平太守治有能名姦吏跼蹐秋毫無犯雅性清儉屬歲饑饉家餽未至使人外尋陂澤採藕根而食之遇有疾苦家人解衣質米以供之然其為治亦尚威嚴朝廷以其清白賜穀一千斛絹一百匹興和初卒年五十二吏民奔哭莫不悲慟贈都督徐兗二州諸軍事衞大將軍吏部尚書兗州刺史諡曰貞武定初齊獻武王以敦及中山太守蘇淑在官奉法清約自居宜見追褒以厲天下乃上言請加旌錄詔曰昔五袴興謠兩歧致詠皆由仁覃千里化洽一邦故廣平太守羊敦故中山太守蘇淑並器業和隱幹用貞濟善政聞國清譽在民方藉良才遂登高秩先後凋亡朝野傷悼追旌清德蓋惟舊章可各賞帛一百匹穀五百斛班下郡國咸使聞知子隱武定末開府行參軍蘇淑字仲和武邑人也立性敦謹頗涉經傳兄壽興坐事為閹官壽興後為河間太守賜爵晉陽男及壽興將卒遂冒養淑為子淑熙平中襲其爵除司空士曹參軍尋轉太學博士厲威將軍員外散騎侍郎轉奉車都尉領殿中侍御史因使於冀州會高乾邕執刺史元嶷據城起義淑贊成其事乾邕以淑行武邑郡未幾尒朱汝歸率兵將至淑於郡逃還京師後除左將軍太中大夫行河陰令出除樂陵內史淑在郡綏撫甚有民譽始逕二周謝病乞解有詔聽之民吏老幼訴乞淑者甚衆後歷滎陽太守亦有能名加中軍將軍司徒從事中郎興和二年拜中山太守三年卒於郡淑清心愛下所歷三郡皆為吏民所思當時稱為良二千石武定初贈衞大將軍都官尚書瀛州刺史諡曰懿齊獻武王追美清操與羊敦同見優賞子子且襲武定中齊獻武王廟丞史臣曰闕
