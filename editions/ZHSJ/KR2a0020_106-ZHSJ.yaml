body:
  text: 魏書卷一百列傳第八十八高句麗百濟勿吉失韋豆莫婁地豆于庫莫奚契丹烏洛侯高句麗者出於夫餘自言先祖朱蒙朱蒙母河伯女為夫餘王閉於室中為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與犬犬不食棄之與豕豕又不食棄之於路牛馬避之後棄之野衆鳥以毛茹之夫餘王割剖之不能破遂還其母其母以物裹之置於暖處有一男破殼而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘人以朱蒙非人所生將有異志請除之王不聽命之養馬朱蒙每私試知有善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乘以瘦者給朱蒙後狩于田以朱蒙善射限之一矢朱蒙雖矢少殪獸甚多夫餘之臣又謀殺之朱蒙母陰知告朱蒙曰國將害汝以汝才略宜遠適四方朱蒙乃與烏引烏違等二人棄夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鼈並浮為之成橋朱蒙得渡魚鼈乃解追騎不得渡朱蒙遂至普述水遇見三人其一人著麻衣一人著納衣一人著水藻衣與朱蒙至紇升骨城遂居焉號曰高句麗因以為氏焉初朱蒙在夫餘時妻懷孕朱蒙逃後生一子字始閭諧及長知朱蒙為國主即與母亡而歸之名之曰閭達委之國事朱蒙死閭達代立閭達死子如栗代立如栗死子莫來代立乃征夫餘夫餘大敗遂統屬焉莫來子孫相傳至裔孫宮生而開目能視國人惡之及長凶虐國以殘破宮曾孫位宮亦生而視人以其似曾祖宮故名為位宮高句麗呼相似為位位宮亦有勇力便弓馬魏正始中入寇遼西安平為幽州刺史毋丘儉所破其玄孫乙弗利利子釗烈帝時與慕容氏相攻擊建國四年慕容元真率衆伐之入自南陝戰於木底大破釗軍乘勝長驅遂入丸都釗單馬奔竄元真掘釗父墓載其屍并掠其母妻珍寶男女五萬餘口焚其宮室毀丸都城而還自後釗遣使來朝阻隔寇讎不能自達釗後為百濟所殺世祖時釗曾孫璉始遣使者安東奉表貢方物并請國諱世祖嘉其誠款詔下帝系名諱於其國遣員外散騎侍郎李敖拜璉為都督遼海諸軍事征東將軍領護東夷中郎將遼東郡開國公高句麗王敖至其所居平壤城訪其方事云遼東南一千餘里東至柵城南至小海北至舊夫餘民戶參倍於前魏時其地東西二千里南北一千餘里民皆土著隨山谷而居衣布帛及皮土田薄塉蠶農不足以自供故其人節飲食其俗淫好歌舞夜則男女羣聚而戲無貴賤之節然潔淨自喜其王好治宮室其官名有謁奢太奢大兄小兄之號頭著折風其形如弁旁插鳥羽貴賤有差立則反拱跪拜曳一脚行步如走常以十月祭天國中大會其公會衣服皆錦繡金銀以為飾好蹲踞食用俎几出三尺馬云本朱蒙所乘馬種即果下也後貢使相尋歲致黃金二百斤白銀四百斤時馮文通率衆奔之世祖遣散騎常侍封撥詔璉令送文通璉上書稱當與文通俱奉王化竟不送世祖怒欲往討之樂平王丕等議待後舉世祖乃止而文通亦尋為璉所殺後文明太后以顯祖六宮未備敕璉令薦其女璉奉表云女已出嫁求以弟女應旨朝廷許焉乃遣安樂王真尚書李敷等至境送幣璉惑其左右之說云朝廷昔與馮氏婚姻未幾而滅其國殷鑒不遠宜以方便辭之璉遂上書妄稱女死朝廷疑其矯詐又遣假散騎常侍程駿切責之若女審死者聽更選宗淑璉云若天子恕其前愆謹當奉詔會顯祖崩乃止至高祖時璉貢獻倍前其報賜亦稍加焉時光州於海中得璉所遣詣蕭道成使餘奴等送闕高祖詔責璉曰道成親殺其君竊號江左朕方欲興滅國於舊邦繼絕世於劉氏而卿越境外交遠通篡賊豈是藩臣守節之義今不以一過掩卿舊款即送還藩其感恕思愆祗承明憲輯寧所部動靜以聞太和十五年璉死年百餘歲高祖舉哀於東郊遣謁者僕射李安上策贈車騎大將軍太傅遼東郡開國公高句麗王諡曰康又遣大鴻臚拜璉孫雲使持節都督遼海諸軍事征東將軍領護東夷中郎將遼東郡開國公高句麗王賜衣冠服物車旗之飾又詔雲遣世子入朝令及郊丘之禮雲上書辭疾惟遣其從叔升于隨使詣闕嚴責之自此歲常貢獻正始中世宗於東堂引見其使芮悉弗悉弗進曰高麗係誠天極累葉純誠地產土毛無愆王貢但黃金出自夫餘珂則涉羅所產今夫餘為勿吉所逐涉羅為百濟所并國王臣雲惟繼絕之義悉遷于境內二品所以不登王府實兩賊是為世宗曰高麗世荷上將專制海外九夷黠虜實得征之瓶罄罍誰之咎也昔方貢之愆責在連率卿宜宣朕旨於卿主務盡威懷之略揃披害羣輯寧東裔使二邑還復舊墟土毛無失常貢也神龜中雲死靈太后為舉哀於東堂遣使策贈車騎大將軍領護東夷校尉遼東郡開國公高句麗王又拜其世子安為安東將軍領護東夷校尉遼東郡開國公高句麗王正光初光州又於海中執得蕭衍所授安寧東將軍衣冠劍佩及使人江法盛等送於京師安死子延立出帝初詔加延使持節散騎常侍車騎大將軍領護東夷校尉遼東郡開國公高句麗王賜衣冠服物車旗之飾天平中詔加延侍中驃騎大將軍餘悉如故延死子成立訖於武定末其貢使無歲不至百濟國其先出自夫餘其國北去高句麗千餘里處小海之南其民土著地多下濕率皆山居有五穀其衣服飲食與高句麗同延興二年其王餘慶始遣使上表曰臣建國東極豺狼隔路雖世承靈化莫由奉藩瞻望雲闕馳情罔極涼風微應伏惟皇帝陛下協和天休不勝係仰之情謹遣私署冠軍將軍駙馬都尉弗斯侯長史餘禮龍驤將軍帶方太守司馬張茂等投舫波阻搜徑玄津託命自然之運遣進萬一之誠冀神祇垂感皇靈洪覆克達天庭宣暢臣志雖旦聞夕沒永無餘恨又云臣與高句麗源出夫餘先世之時篤崇舊款其祖釗輕廢隣好親率士衆陵踐臣境臣祖須整旅電邁應機馳擊矢石暫交梟斬釗首自爾已來莫敢南顧自馮氏數終餘燼奔竄醜類漸盛遂見陵逼構怨連禍三十餘載財殫力竭轉自孱踧若天慈曲矜遠及無外速遣一將來救臣國當奉送鄙女執掃後宮并遣子弟牧圉外尺壤匹夫不敢自有又云今璉有罪國自魚肉大臣強族戮殺無已罪盈惡積民庶崩離是滅亡之期假手之秋也且馮族士馬有鳥畜之戀樂浪諸郡懷首丘之心天威一舉有征無戰臣雖不敏志效畢力當率所統承風響應且高麗不義逆詐非一外慕隗囂藩卑之辭內懷兇禍豕突之行或南通劉氏或北約蠕蠕共相脣齒謀陵王略昔唐堯至聖致罰丹水孟常稱仁不捨塗詈涓流之水宜早壅塞今若不取將貽後悔去庚辰年後臣西界小石山北國海中見屍十餘并得衣器鞍勒視之非高麗之物後聞乃是王人來降臣國長蛇隔路以沉于海雖未委當深懷憤恚昔宋戮申舟楚莊徒跣鷂撮放鳩信陵不食克敵建名美隆無已夫以區區偏鄙猶慕萬代之信況陛下合氣天地勢傾山海豈令小竪跨塞天逵今上所得鞍一以為實驗顯祖以其僻遠冒險朝獻禮遇優厚遣使者邵安與其使俱還詔曰得表聞之無恙甚善卿在東隅處五服之外不遠山海歸誠魏闕欣嘉至意用戢于懷朕承萬世之業君臨四海統御羣生今宇內清一八表歸義襁負而至者不可稱數風俗之和士馬之盛皆餘禮等親所聞見卿與高麗不穆屢致陵犯苟能順義守之以仁亦何憂於寇讎也前所遣使浮海以撫荒外之國從來積年往而不返存亡達否未能審悉卿所送鞍比校舊乘非中國之物不可以疑似之事以生必然之過經略權要已具別旨又詔曰知高麗阻強侵軼卿土修先君之舊怨棄息民之大德兵交累載難結荒邊使兼申胥之誠國有楚越之急乃應展義扶微乘機電舉但以高麗稱藩先朝供職日久於彼雖有自昔之釁於國未有犯令之愆卿使命始通便求致伐尋討事會理亦未周故往年遣禮等至平壤欲驗其由狀然高麗奏請頻煩辭理俱詣行人不能抑其請司法無以成其責故聽其所啟詔禮等還若今復違旨則過咎益露後雖自陳無所逃罪然後興師討之於義為得九夷之國世居海外道暢則奉藩惠戢則保境故羈縻著於前典楛貢曠於歲時卿備陳強弱之形具列往代之迹俗殊事異擬貺乖衷洪規大略其致猶在今中夏平一宇內無虞每欲陵威東極懸旌域表拯荒黎於偏方舒皇風於遠服良由高麗即未及卜征今若不從詔旨則卿之來謀載協朕意元戎啟行將不云遠便可豫率同興具以待事時遣報使速究彼情師舉之日卿為鄉導之首大捷之後又受元功之賞不亦善乎所獻錦布海物雖不悉達明卿至心今賜雜物如別又詔璉護送安等安等至高句麗璉稱昔與餘慶有讎不令東過安等於是皆還乃下詔切責之五年使安等從東萊浮海賜餘慶璽書褒其誠節安等至海濱遇風飄蕩竟不達而還勿吉國在高句麗北舊肅慎國也邑落各自有長不相總一其人勁悍於東夷最強言語獨異常輕豆莫婁等國諸國亦患之去洛五千里自和龍北二百餘里有善玉山山北行十三日至祁黎山又北行七日至如洛瓌水水廣里餘又北行十五日至太魯水又東北行十八日到其國國有大水闊三里餘名速末水其地下濕築城穴居屋形似開口於上以梯出入其國無牛有車馬佃則偶耕車則步推有粟及麥穄菜則有葵水氣醎凝鹽生樹上亦有鹽池多猪無羊嚼米醞酒飲能至醉婦人則布裙男子猪犬皮裘初婚之夕男就女家執女乳而罷便以為定仍為夫婦俗以人溺洗手面頭插虎豹尾善射獵弓長三尺箭長尺二寸以石為鏃其父母春夏死立埋之冢上作屋不令雨濕若秋冬以其屍捕貂貂食其肉多得之常七八月造毒藥傅箭鏃射禽獸中者便死煮藥毒氣亦能殺人國南有徒太山魏言大白有虎豹羆狼害人人不得山上溲汙行逕山者皆以物盛去延興中遣使乙力支朝獻太和初又貢馬五百匹乙力支稱初發其國乘船泝難河西上至太朤河沉船於水南出陸行渡洛孤水從契丹西界達和龍自云其國先破高句麗十落密共百濟謀從水道并力取高句麗遣乙力支奉使大國請其可否詔敕三國同是藩附宜共和順勿相侵擾乙力支乃還從其來道取得本船汎達其國九年復遣使侯尼支朝獻明年復入貢其傍有大莫盧國覆鍾國莫多回國庫婁國素和國具弗伏國匹黎尒國拔大何國郁羽陵國庫伏真國魯婁國羽真侯國前後各遣使朝獻太和十二年勿吉復遣使貢楛矢方物於京師十七年又遣使人婆非等五百餘人朝獻景明四年復遣使俟力歸等朝貢自此迄于正光貢使相尋爾後中國紛擾頗或不至興和二年六月遣使石久云等貢方物至於武定不絕失韋國在勿吉北千里去洛六千里路出和龍北千餘里入契丹國又北行十日至啜水又北行三日有蓋水又北行三日有犢了山其山高大周回三百餘里又北行三日有大水名屈利又北行三日至刃水又北行五日到其國有大水從北而來廣四里餘名水國土下濕語與庫莫奚契丹豆莫婁國同頗有粟麥及穄唯食猪魚養牛馬俗又無羊夏則城居冬逐水草亦多貂皮丈夫索髮用角弓其箭尤長女婦束髮作叉手髻其國少竊盜盜一徵三殺人者責馬三百匹男女悉衣白鹿皮襦袴有麴釀酒俗愛赤珠為婦人飾穿挂於頸以多為貴女不得此乃至不嫁父母死男女衆哭三年屍則置於林樹之上武定二年四月始遣使張焉豆伐等獻其方物迄武定末貢使相尋豆莫婁國在勿吉國北千里去洛六千里舊北扶餘也在失韋之東東至於海方二千里其人土著有宮室倉庫多山陵廣澤於東夷之域最為平敞地宜五穀不生五果其人長大性強勇謹厚不寇抄其君長皆以六畜名官邑落有豪帥飲食亦用俎豆有麻布衣制類高麗而幅大其國大人以金銀飾之用刑嚴急殺人者死沒其家人為奴婢俗淫尤惡妬婦妬者殺之尸其國南山上至腐女家欲得輸牛馬乃與之或言本穢貊之地也地豆于國在失韋西千餘里多牛羊出名馬皮為衣服無五穀惟食肉酪延興二年八月遣使朝貢至于太和六年貢使不絕十四年頻來犯塞高祖詔征西大將軍陽平王頤擊走之自後時朝京師迄武定末貢使不絕庫莫奚國之先東部宇文之別種也初為慕容元真所破遺落者竄匿松漠之間其民不潔淨而善射獵好為寇鈔登國三年太祖親自出討至弱洛水南大破之獲其四部落馬牛羊豕十餘萬帝曰此羣狄諸種不識德義互相侵盜有犯王略故往征之且鼠竊狗盜何足為患今中州大亂吾先平之然後張其威懷則無所不服矣既而車駕南還雲中懷服燕趙十數年間諸種與庫莫奚亦皆滋盛及開遼海置戍和龍諸夷震懼各獻方物高宗顯祖世庫莫奚歲致名馬文皮高祖初遣使朝貢太和四年輒入塞內辭以畏地豆于鈔掠詔書切責之二十二年入寇安州營燕幽三州兵數千人擊走之後復款附每求入塞與民交易世宗詔曰庫莫奚去太和二十一年以前與安營二州邊民參居交易往來並無疑貳至二十二年叛逆以來遂爾遠竄今雖款附猶在塞表每請入塞與民交易若抑而不許乖其歸向之心聽而不虞或有萬一之警不容依先任其交易事宜限節交市之日州遣上佐監之自是已後歲常朝獻至於武定末不絕契丹國在庫莫奚東異種同類俱竄於松漠之間登國中國軍大破之遂逃迸與庫莫奚分背經數十年稍滋蔓有部落於和龍之北數百里多為寇盜真君以來求朝獻歲貢名馬顯祖時使莫弗紇何辰奉獻得班饗於諸國之末歸而相謂言國家之美心皆忻慕於是東北羣狄聞之莫不思服悉萬丹部何大何部伏弗郁部羽陵部日連部匹絜部黎部吐六于部等各以其名馬文皮入獻天府遂求為常皆得交市於和龍密雲之間貢獻不絕太和三年高句麗竊與蠕蠕謀欲取地豆于以分之契丹懼其侵軼其莫弗賀勿于率其部落車三千乘衆萬餘口驅徙雜畜求入內附止於白狼水東自此歲常朝貢後告饑高祖矜之聽其入關市糴及世宗肅宗時遣使貢方物熙平中契丹使人祖真等三十人還靈太后以其俗嫁娶之際以青梹為上服人給青梹兩匹賞其誠款之心餘依舊式朝貢至齊受禪常不絕烏洛侯國在地豆于之北去代都四千五百餘里其土下濕多霧氣而寒民冬則穿地為室夏則隨原阜畜牧多豕有穀麥無大君長部落莫弗皆世為之其俗繩髮皮服以珠為飾民尚勇不為姦竊故慢藏野積而無寇盜好獵射樂有箜篌木槽革面而施九弦其國西北有完水東北流合于難水其地小水皆注於難東入于海又西北二十日行有于巳尼大水所謂北海也世祖真君四年來朝稱其國西北有國家先帝舊墟石室南北九十步東西四十步高七十尺室有神靈民多祈請世祖遣中書侍郎李敞告祭焉刊祝文於室之壁而還史臣曰夷狄之於中國羈縻而已高麗歲修貢職東藩之冠榮哀之禮致自天朝亦為優矣其他碌碌咸知款貢豈牛馬內向東風入律者也
