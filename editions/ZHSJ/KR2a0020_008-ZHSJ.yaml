body:
  text: 魏書卷七上高祖紀第七上高祖孝文皇帝諱宏顯祖獻文皇帝之長子母曰李夫人皇興元年八月戊申生於平城紫宮神光照於室內天地氛氳和氣充塞帝生而潔白有異姿襁褓岐嶷長而淵裕仁孝綽然有君人之表顯祖尤愛異之三年夏六月辛未立為皇太子五年秋八月丙午即皇帝位於太華前殿大赦改元延興元年丁未劉彧遣使朝貢九月壬戌詔在位及民庶直言極諫有利民益治損政傷化悉心以聞壬午青州高陽民封辯自號齊王聚黨千餘人州軍討滅之高麗民奴久等相率來降各賜田宅冬十月丁亥沃野統萬二鎮敕勒叛詔太尉隴西王源賀追擊至枹罕滅之斬首三萬餘級徙其遺迸於冀定相三州為營戶庚寅以征東大將軍南安王楨為假節都督涼州及西戎諸軍事領護西域校尉儀同三司鎮涼州朔方民曹平原招集不逞破石樓堡殺軍將劉彧將垣崇祖率衆二萬自郁洲寇東兗州屯于南城固十有一月刺史于洛侯討破之崇祖還郁洲妖賊司馬小君聚衆反於平陵齊州刺史武昌王平原討擒之十有二月乙酉以駙馬都尉穆亮為趙郡王壬辰詔訪舜後獲東萊郡民媯苟之復其家畢世以彰盛德之不朽復前濮陽王孔雀本封辛丑趙郡王穆亮徙封長樂王二年春正月乙卯統萬鎮胡民相率北叛詔寧南將軍交阯公韓拔等追滅之大陽蠻酋桓誕率戶內屬拜征南將軍封襄陽王曲赦京師及河西南至秦涇西至枹罕北至涼州諸鎮詔假員外散騎常侍邢祐使於劉彧二月乙巳詔曰尼父稟達聖之姿體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所致令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生鼓舞倡優媟狎豈所以尊明神敬聖道者也自今已後有祭孔子廟制用酒脯而已不聽婦女合雜以祈非望之福犯者以違制論其公家有事自如常禮犧牲粢盛務盡豐潔臨事致敬令肅如也牧司之官明糾不法使禁令必行蠕蠕犯塞太上皇帝次於北郊詔諸將討之虜遁走其別帥阿大干率千餘落來降東部敕勒叛奔蠕蠕太上皇帝追之至石磧不及而還壬子高麗國遣使朝貢三月太上皇帝至自北討戊辰以散騎常侍駙馬都尉萬安國為大司馬大將軍封安城王庚午車駕耕於藉田石城郡獲曹平原送京師斬之連川敕勒謀叛徙配青徐齊兗四州為營戶夏四月庚子詔工商雜伎盡聽赴農諸州郡課民益種菜果辛亥劉彧遣使朝貢癸酉詔沙門不得去寺浮遊民間行者仰以公文是月劉彧死子昱僭立五月丁巳詔軍警給璽印傳符次給馬印六月安州民遇水雹丐租賑恤丙申詔曰頃者州郡選貢多不以實碩人所以窮處幽仄鄙夫所以超分妄進豈所謂旌賢樹德者也今年貢舉尤為猥濫自今所遣皆門盡州郡之高才極鄉閭之選閏月壬子蠕蠕寇敦煌鎮將尉多侯擊走之又寇晉昌守將薛奴擊走之戊午行幸陰山秋七月光州民孫晏等聚黨千餘人叛通劉昱刺史叔孫璝討平之辛丑高麗國遣使朝貢壬寅詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗八月丙辰百濟國遣使奉表請師伐高麗辛酉地豆于庫莫奚國遣使朝貢昌亭國遣使獻蜀馬河西費也頭反薄骨律鎮將擊走之九月辛巳車駕還宮戊申統萬鎮將河間王閭虎皮坐貪殘賜死己酉詔以州鎮十一水丐民田租開倉賑恤又詔流迸之民皆令還本違者配徙邊鎮冬十月蠕蠕犯塞及於五原十有一月太上皇帝親討之將度漠襲擊蠕蠕聞軍至大懼北走數千里以窮寇遠遁不可追乃止丁亥封皇叔略為廣川王壬辰分遣使者巡省風俗問民疾苦帝每月一朝崇光宮十有二月庚戌詔曰書云三載一考三考黜陟幽明頃者已來官以勞升未久而代牧守無恤民之心競為聚斂送故迎新相屬於路非所以固民志隆治道也自今牧守溫仁清儉克己奉公者可久於其任歲積有成遷位一級其有貪殘非道侵削黎庶者雖在官甫爾必加黜罰著之於令永為彝準詔以代郡事同豐沛代民先配邊戍者皆免之三年春正月庚辰詔員外散騎常侍崔演使於劉昱丁亥改崇光宮為寧光宮戊戌太上皇帝還至雲中是月相州執送妖人榮永安於京師斬之詔赦其支黨二月戊申高麗契丹國並遣使朝貢癸丑詔牧守令長勤率百姓無令失時同部之內貧富相通家有兼牛通借無者若不從詔一門之內終身不仕守宰不督察免所居官戊午太上皇帝至自北討飲至策勳告於宗廟死王事者復其家詔畿內民從役死事者郡縣為迎喪給以葬費甲戌詔縣令能靜一縣劫盜者兼治二縣即食其祿能靜二縣者兼治三縣三年遷為郡守二千石能靜二郡上至三郡亦如之三年遷為刺史三月壬午詔諸倉囤穀麥充積者出賜貧民夏四月戊申詔假司空上黨王長孫觀等討吐谷渾拾寅壬子契丹國遣使朝貢詔以孔子二十八世孫魯郡孔乘為崇聖大夫給十戶以供洒掃六月甲子詔曰往年縣召民秀二人問以守宰治狀善惡具聞將加賞罰而賞者未幾罪者衆多肆法傷生情所未忍今特垂寬恕之恩申以解網之惠諸為民所列者特原其罪盡可貸之秋七月詔河南六州之民戶收絹一匹綿一斤租三十石乙亥行幸陰山蠕蠕寇敦煌鎮將樂洛生擊破之事具蠕蠕傳劉昱遣將寇緣淮諸鎮徐州刺史淮陽公尉元擊走之八月己酉高麗庫莫奚國並遣使朝獻庚申帝從太上皇帝幸河西拾寅謝罪請降許之九月辛巳車駕並還宮乙亥劉昱遣使朝貢己亥詔曰自今京師及天下之囚罪未分判在獄致死無近親者公給衣衾棺櫝葬埋之不得曝露辛丑詔遣使者十人循行州郡檢括戶口其有仍隱不出者州郡縣戶主並論如律庫莫奚國遣使朝獻冬十月太上皇帝親將南討詔州郡之民十丁取一以充行戶收租五十石以備軍糧悉萬斤國遣使朝獻武都王反攻仇池詔長孫觀仍回師討之十有一月戊寅詔以河南七州牧守多不奉法致新邦之民莫能上達遣使者觀風察獄黜陟幽明其有魚眾寡孤獨貧不自存者復其雜徭年八十已上一子不從役力田孝悌才器有益於時信義著於鄉閭者具以名聞癸巳太上皇帝南巡至於懷州所過問民疾苦賜高年孝悌力田布帛十有二月庚戌詔關外苑囿聽民樵採壬子蠕蠕犯邊柔玄鎮二部敕勒叛應之癸丑沙門慧隱謀反伏誅是歲州鎮十一水旱丐民田租開倉賑恤相州民餓死者二千八百四十五人吐谷渾部內羌民鍾豈渴干等二千三百戶內附是年妖人劉舉自稱天子齊州刺史武昌王平原捕斬之四年春正月丁丑侍中太尉隴西王源賀以病辭位辛巳粟特國遣使朝獻二月甲辰太上皇帝至自南巡辛亥吐谷渾拾寅遣子費斗斤入侍并獻方物辛未禁斷寒食三月丁亥詔員外散騎常侍許赤虎使於劉昱高麗吐谷渾曹利諸國各遣使朝貢夏五月甲戌蠕蠕國遣使朝貢六月乙卯詔曰朕應歷數開一之期屬千載光熙之運雖仰嚴誨猶懼德化不寬至有門房之誅然下民兇戾不顧親戚一人為惡殃及合門朕為民父母深所愍悼自今已後非謀反大逆干紀外奔罪止其身而已今德被殊方文軌將一宥刑寬禁不亦善乎闊悉國遣使朝貢秋七月庚午高麗國遣使朝獻己卯曲赦仇池癸巳蠕蠕寇敦煌鎮將尉多侯大破之八月庚子吐谷渾國遣使朝獻戊申大閱於北郊九月以劉昱內相攻戰詔將軍元蘭等五將三萬騎及假東陽王丕為後繼伐蜀漢丙子契丹庫莫奚地豆于諸國各遣使朝獻冬十月庚子劉昱遣使朝貢十有一月分遣侍臣循河南七州觀察風俗撫慰初附戊寅吐谷渾國遣使朝獻是歲州鎮十三大飢丐民田租開倉賑之十有二月詔西征吐谷渾兵在句律城初叛軍者斬次分配柔玄武川二鎮斬者千餘人五年春二月庚子高麗國遣使朝獻癸丑詔定考課明黜陟閏月戊午吐谷渾國遣使朝獻夏四月丁丑龜茲國遣使朝獻癸未詔天下賦調縣專督集牧守對檢送京師違者免所居官詔禁畜鷹鷂開相告之制五月丁酉契丹庫莫奚國各遣使獻名馬丙午詔員外散騎常侍許赤虎使於劉昱丁未幸武州山辛酉幸車輪山六月庚午禁殺牛馬壬申曲赦京師死罪遣備蠕蠕秋八月丁卯高麗吐谷渾地豆于諸國遣使朝獻九月癸卯洛州人賈伯奴豫州人田智度聚黨千餘人伯奴稱農王智度稱上洛王夜攻洛州州郡擊之斬伯奴於緱氏執智度送京師冬十月蠕蠕國遣使朝獻太上皇帝大閱於北郊十有二月丙寅建昌王長樂改封安樂王己丑城陽王長壽薨庚寅劉昱遣使朝貢承明元年春二月蠕蠕高麗庫莫奚波斯諸國並遣使朝貢是月司空東郡王陸定國坐事免官爵為兵夏五月冀州武邑民宋伏龍聚衆自稱南平王郡縣捕斬之蠕蠕國遣使朝貢六月甲子詔中外戒嚴分京師見兵為三等第一軍出遣第一兵二等兵亦如之辛未太上皇帝崩壬申大赦改年大司馬大將軍安城王萬安國坐矯詔殺神部長奚買奴於苑中賜死戊寅征西大將軍安樂王長樂為太尉尚書左僕射南平公目辰為司徒進封宜都王南部尚書李訢為司空尊皇太后為太皇太后臨朝稱制秋七月甲辰追尊皇妣李貴人為思皇后以汝陰王天賜為征西大將軍儀同三司高麗庫莫奚國並遣使朝貢濮陽王孔雀有罪賜死八月甲子詔曰朕猥承前緒纂戎洪烈思隆先志緝熙政道羣公卿士其各勉厥心匡朕不逮諸有便民利國者具狀以聞壬午蠕蠕國遣使朝貢甲申以長安二蠶多死丐民歲賦之半九月丁亥曲赦京師高麗庫莫奚契丹諸國並遣使朝獻癸丑宕昌悉萬斤國並遣使朝貢冬十月丁巳起七寶永安行殿乙丑進征西大將軍假東陽王元丕爵為正王己未詔曰朕纂承皇極照臨萬方思闡遐風光被兆庶使朝有不諱之音野無自蔽之響疇咨帝載詢及芻蕘自今已後羣官卿士下及吏民各聽上書直言極諫勿有所隱諸有便宜益治利民可以正風俗者有司以聞朕將親覽與三事大夫論其可否裁而用之辛未輿駕幸建明佛寺大宥罪人濟南公羅拔進爵為王十有一月蠕蠕國遣使朝貢戊子以太尉安樂王長樂為定州刺史京兆王子推為青州刺史司空李訢為徐州刺史並開府儀同三司太和元年春正月乙酉朔詔曰朕夙承寶業懼不堪荷而天貺具臻地瑞並應風和氣晼天人交協豈朕沖昧所能致哉實賴神祇七廟降福之助今三正告初祗感交切宜因陽始崙頁典革元其改今號為太和元年辛亥詔曰今牧民者與朕共治天下也宜簡以徭役先之勸奬相其水陸務盡地利使農夫外布桑婦內勤若輕有徵發致奪民時以侵擅論民有不從長教惰於農桑者加以罪刑起太和安昌二殿己酉秦州略陽民王元壽聚衆五千餘家自號為衝天王雲中飢開倉賑恤二月丙寅漢川民泉會譚酉等相率內屬處之并州辛未秦益二州刺史武都公尉洛侯討破元壽獲其妻子送京師癸未高麗契丹庫莫奚國各遣使朝獻三月庚子徵征西大將軍雍州刺史東陽王丕為司徒丙午詔曰朕政治多闕災眚屢興去年牛疫死傷太半耕墾之利當有虧損今東作既興人湏肄業其敕在所督課田農有牛者加勤於常歲無牛者倍庸於餘年一夫制治田四十畝中男二十畝無令人有餘力地有遺利庫莫奚契丹國各遣使朝獻夏四月丙寅蠕蠕國遣使朝貢丁卯幸白登山壬申幸崞山樂安王良薨詔復前東郡王陸定國官爵五月乙酉車駕祈雨於武州山俄而澍雨大洽蠕蠕國遣使朝貢秋七月壬辰侍中開府儀同三司青州刺史京兆王子推薨庚子定三等死刑己酉太和安昌二殿成起朱明思賢門是月劉昱死弟準僭立八月壬子大赦天下丙子詔曰工商皂隸各有厥分而有司縱濫或染清流自今戶內有工役者推上本部丞已下準次而授若階藉元勳以勞定國者不從此制戊寅劉準遣使朝貢九月癸未蠕蠕國遣使朝貢乙酉詔羣臣定律令於太華殿辛卯高麗國遣使朝貢庚子起永樂遊觀殿於北苑穿神淵池車多羅西天竺舍衞疊伏羅諸國各遣使朝貢冬十月癸酉宴京邑耆老年七十已上於太華殿賜以衣服是月庫莫奚契丹國各遣使朝獻又詔七十已上一子不從役龜茲國遣使朝獻劉準葭蘆戍主楊文度遣弟鼠襲陷仇池丙子誅徐州刺史李訢庫莫奚契丹國各遣使朝貢十有一月癸未詔征西將軍廣川公皮懽喜鎮西將軍梁醜奴平西將軍楊靈珍等率衆四萬討楊鼠乙酉吐谷渾國遣使朝獻丁亥懷州民伊祁苟初自稱堯後應王聚衆於重山洛州刺史馮熙討滅之閏月懽喜等軍到建安楊鼠棄城南走癸亥粟提婆國遣使朝獻庚子詔員外散騎常侍李長仁使於劉準十有二月壬寅懽喜攻陷葭蘆斬文度傳首京師甲辰員闊吐谷渾國並遣使朝貢丁未詔以州郡八水旱蝗民飢開倉賑恤以安定王休為儀同三司二年春正月丁巳封昌黎王馮熙第二子始興為北平王戊午吐谷渾遣使朝獻二月丁亥行幸代之湯泉所過問民疾苦以宮人賜貧民無妻者戊戌蠕蠕國遣使朝獻癸卯車駕還宮三月丙子以河南公梁彌機為宕昌王夏四月甲申幸崞山丁亥還宮己丑劉準遣使朝貢京師旱甲辰祈天災於北苑親自禮焉減膳避正殿丙午澍雨大洽曲赦京師五月詔曰婚娉過禮則嫁娶有失時之弊厚葬送終則生者有糜費之苦聖王知其如此故申之以禮數約之以法禁迺者民漸奢尚婚葬越軌致貧富相高貴賤無別又皇族貴戚及士民之家不惟氏族下與非類婚偶先帝親發明詔為之科禁而百姓習常仍不肅改朕今憲章舊典祗案先制著之律令永為定準犯者以違制論六月己丑幸鹿野苑庚子皇叔若薨秋七月戊辰龜茲國遣使獻名駝七十頭劉準遣將寇仇池陰平太守楊廣香擊走之八月分遣使者考察守宰問民疾苦丙戌詔罷諸州禽獸之貢丁亥勿吉國遣使朝獻九月丙辰曲赦京師龜茲國遣使獻大馬名駝珍寶甚衆冬十月壬辰詔員外散騎常侍鄭羲使於劉準十有一月庚戌詔曰懸爵於朝而有功者必縻其賞懸刑於市而有罪者必罹其辜斯乃古今之成典治道之實要諸州刺史牧民之官自頃以來遂各怠慢縱姦納賂背公緣私致令賊盜並興侵劫茲甚姦宄之聲屢聞朕聽朕承太平之運屬千載之期思光洪緒惟新庶績亦望蕃翰羣司敷德宣惠以助沖人共成斯美幸克己復禮思愆改過使寡昧無愧於祖宗百姓見德於當世有司明為條禁稱朕意焉十有二月癸巳誅南郡王李惠是歲州鎮二十餘水旱民飢開倉賑恤三年春正月癸丑坤德六合殿成庚申詔罷行察官二月辛巳帝太皇太后幸代郡溫泉問民疾苦魚眾貧者以宮女妻之己亥還宮壬寅乾象六合殿成三月甲辰曲赦京師戊午吐谷渾高麗國各遣使朝獻夏四月壬申劉準遣使朝獻癸未樂良王樂平薨辛卯蠕蠕國遣使朝獻丙申幸崞山己亥還宮庚子淮陽公尉元進爵為王吐谷渾國遣使獻氂牛五十頭雍州刺史宜都王目辰有罪賜死五月丁巳帝祈雨於北苑閉陽門是日澍雨大洽辛酉詔曰昔四代養老問道乞言朕雖沖昧每尚其美今賜國老各衣一襲綿五斤絹布各五匹六月辛未以雍州民飢開倉賑恤起文石室靈泉殿於方山秋七月壬寅詔宮人年老及疾病者免之八月壬申詔羣臣直言盡規靡有所隱乙亥幸方山起思遠佛寺丁丑還宮九月壬子以侍中司徒東陽王丕為太尉侍中尚書右僕射趙郡公陳建為司徒進爵魏郡王侍中尚書河南公苟頹為司空進爵河東王侍中尚書太原公王叡進爵中山王侍中尚書隴東公張祐進爵新平王己未定州刺史安樂王長樂有罪徵詣京師賜死庚申隴西王源賀薨高麗吐谷渾地豆于契丹庫莫奚龜茲諸國各遣使朝獻冬十月己巳朔大赦天下十有一月癸卯賜京師貧窮高年疾患不能自存者衣服布帛各有差癸丑進假梁郡公元嘉爵為假王督二將出淮陰隴西公元琛三將出廣陵河東公薛虎子三將出壽春蠕蠕率騎十餘萬南寇至塞而還十有二月粟特州逸河龔疊伏羅員闊悉萬斤諸國各遣使朝貢是年島夷蕭道成廢其主劉準而僭立自號曰齊四年春正月癸卯乾象六合殿成洮陽羌叛枹罕鎮將討平之隴西公元琛等攻克蕭道成馬頭戍乙卯廣川王略薨雍州氐齊男王反殺美陽令州郡捕斬之丁巳罷畜鷹鷂之所以其地為報德佛寺戊午襄城王韓頹有罪削爵徙邊蕭道成徐州刺史崔文仲寇淮北陷茬眉戍二月遣尚書游明根率騎二千南討癸巳詔曰朕承乾緒君臨海內夙興昧旦如履薄冰今東作方興庶類萌動品物資生膏雨不降歲一不登百姓飢乏朕甚懼焉其敕天下祀山川羣神及能興雲雨者修飾祠堂薦以牲璧民有疾苦所在存問三月丙午詔車騎大將軍馮熙督衆迎還假梁郡王嘉等諸軍乙卯蠕蠕國遣使朝貢四月己卯幸廷尉籍坊二獄引見諸囚詔曰廷尉者天下之平民命之所懸也朕得惟刑之恤者仗獄官之稱其任也一夫不耕將或受其餒一婦不織將或受其寒今農時要月百姓肆力之秋而愚民陷罪者甚衆宜隨輕重決遣以赴耕耘之業辛巳幸白登山甲申賜天下貧人一戶之內無雜財穀帛者廩一年五月丙申朔幸火山壬寅還宮六月丁卯以澍雨大洽曲赦京師以紬綾絹布百萬匹及南伐所俘賜王公已下秋七月辛亥行幸火山壬子改作東明觀詔會京師耆老賜錦綵衣服几杖稻米蜜麵復家人不徭役悉萬斤國遣使朝貢閏月丁亥幸虎圈親錄囚徒輕者皆免之壬辰頓丘王李鍾葵有罪賜死蕭道成角城戍主請舉城內屬八月丁酉詔徐州刺史假梁郡王嘉赴接之又遣平南將軍郎大檀三將出朐城將軍白吐頭二將出海西將軍元泰二將出連口將軍封匹三將出角城鎮南將軍賀羅出下蔡甲辰幸方山戊申幸武州山石窟寺庚戌還宮乙卯詔諸州置冰室蕭道成梁州刺史崔慧景遣長史裴叔保率衆寇武興關城氐帥楊鼠擊破之叔保還南鄭九月蕭道成汝南太守常元真龍驤將軍胡青苟率戶內屬乙亥思義殿成壬午東明觀成戊子詔曰隆寒雪降諸在徽纆及轉輸在都或有凍餒朕用愍焉可遣侍臣詣廷尉獄及有囚之所周巡省察飢寒者給以衣食桎梏者代以輕鎖假梁郡王嘉破蕭道成將盧紹之玄元度於朐山其下蔡戍主棄城遁走冬十月丁未詔昌黎王馮熙為西道都督與征南將軍桓誕出義陽鎮南將軍賀羅自下蔡東出鍾離蘭陵民桓富殺其縣令與昌慮桓和北連太山羣盜張和顏等聚黨保五固推司馬朗之為主詔淮陽王尉元等討之是歲詔以州鎮十八水旱民飢開倉賑恤五年春正月己卯車駕南巡丁亥至中山親見高年問民疾苦二月辛卯朔大赦天下賜孝悌力田孤貧不能自存者穀帛有差免宮人年老者還其所親丁酉車駕幸信都存問如中山癸卯還中山己酉講武于唐水之陽庚戌車駕還都沙門法秀謀反伏誅南征諸將擊破蕭道成游擊將軍桓康於淮陽道成豫州刺史垣崇祖寇下蔡昌黎王馮熙擊破之假梁郡王嘉大破道成將俘獲三萬餘口送京師三月辛酉朔車駕幸肆州癸亥講武于雲水之陽所經考察守宰加以黜陟己巳車駕還宮詔曰法秀妖詐亂常妄說符瑞蘭臺御史張求等一百餘人招結奴隸謀為大逆有司科以族誅誠合刑憲且矜愚重命猶所弗忍其五族者降止同祖三族止一門門誅止身夏四月己亥行幸方山建永固石室於山上立碑於石室之庭又銘太皇太后終制于金冊又起鑒玄殿壬子以南俘萬餘口班賜羣臣甲寅詔曰時雨不霑春苗萎悴諸有骸骨之處皆敕埋藏勿令露見有神祇之所悉可禱祈任城王雲薨五月庚申朔詔曰廼者邊兵屢動勞役未息百姓因之輕陷刑網獄訟煩興四民失業朕每念之用傷懷抱農時要月民須肆力其敕天下勿使有留獄久囚壬戌鄧至國遣使朝貢庚午青州主簿崔次恩聚衆謀叛州軍擊之次恩走郁洲六月甲辰中山王叡薨戊午封皇叔簡為齊郡王猛為安豐王秋七月甲子蕭道成遣使朝貢辛酉蠕蠕別帥他稽率衆內附甲戌班乞養雜戶及戶籍之制五條九月庚子閱武於南郊大饗羣臣蕭道成使車僧朗以班在劉準使殷靈誕之後辭不就席劉準降人解奉君刃僧朗於會中詔誅奉君等乙亥封昌黎王馮熙世子誕為南平王兗州斬司馬朗之傳首京師冬十月癸卯蠕蠕國遣使朝貢十有二月癸巳詔以州鎮十二民飢開倉賑恤六年春正月甲戌大赦天下二月辛卯詔曰靈丘郡土既褊塉又諸州路衝官私所經供費非一往年巡行見其勞瘁可復民租調十五年癸巳白蘭王吐谷渾翼世以誣罔伏誅乙未詔曰蕭道成逆亂江淮戎旗頻舉七州之民既有征運之勞深乖輕徭之義朕甚愍之其復常調三年戊申地豆于國遣使朝貢癸丑賜王公已下清勤著稱者穀帛有差三月庚辰行幸虎圈詔曰虎狼猛暴食肉殘生取捕之日每多傷害既無所益損費良多從今勿復捕貢辛巳幸武州山石窟寺賜貧老者衣服壬午幸方山是月蕭道成死子賾僭立夏四月甲辰賜畿內魚眾寡孤獨不能自存者粟帛有差六月蠕蠕國遣使朝貢秋七月發州郡五萬人治靈丘道八月癸未朔分遣大使巡行天下遭水之處丐民租賦貧儉不自存者賜以粟帛庚子罷山澤之禁九月辛酉以氐楊後起為武都王冬十有一月乙卯吐谷渾國遣使朝貢十有二月丁亥詔曰朕以寡薄政缺平和不能仰緝緯象蠲茲六沴去秋淫雨洪水為災百姓嗷然朕用嗟愍故遣使者循方賑恤而牧守不思利民之道期於取辦愛毛反裘甚無謂也今課督未入及將來租算一以丐之有司勉加勸課以要來穰稱朕意焉七年春正月庚申詔曰朕每思知百姓之所疾苦以增修寬政而明不燭遠實有缺焉故具問守宰苛虐之狀於州郡使者秀孝計掾而對多不實甚乖朕虛求之意宜案以大辟明罔上必誅然情猶未忍可恕罪聽歸申下天下使知後犯無恕丁卯詔青齊光東徐四州之民戶運倉粟二十石送瑕丘琅邪復租算一年三月甲戌以冀定二州民飢詔郡縣為粥於路以食之又弛關津之禁任其去來夏四月庚子幸崞山賜所過魚眾寡不能自存者衣服粟帛壬寅車駕還宮閏月癸丑皇子生大赦天下五月戊寅朔幸武州山石窟佛寺六月定州上言為粥給飢人所活九十四萬七千餘口秋七月丁丑帝太皇太后幸神淵池甲申幸方山詔假員外散騎常侍李彪員外郎蘭英使於蕭賾濟南王羅拔改封趙郡王九月壬寅詔曰朕承祖宗夙夜惟懼然聽政之際猶慮未周至於案文審獄思聞己過自今羣官奏事當獻可替否無或面從俾朕之過彰於遠近冀州上言為粥給飢民所活七十五萬一千七百餘口冬十月戊午皇信堂成十有一月辛丑蕭賾遣使朝貢十有二月癸丑詔曰淳風行於上古禮化用乎近葉是以夏殷不嫌一族之婚周世始絕同姓之娶斯皆教隨時設治因事改者也皇運初基中原未混撥亂經綸日不暇給古風遺樸未遑釐改後遂因循迄茲莫變朕屬百年之期當後仁之政思易質舊式昭惟新自今悉禁絕之有犯以不道論庚午開林慮山禁與民共之詔以州鎮十三民飢開倉賑恤八年春正月詔隴西公元琛尚書陸叡為東西二道大使褒善罰惡二月蠕蠕國遣使朝獻夏四月甲寅幸方山戊午車駕還宮庚申行幸旋鴻池遂幸崞山丁卯還宮五月己卯詔賑賜河南七州戍兵甲申詔員外散騎常侍李彪員外郎蘭英使於蕭賾六月丁卯詔曰置官班祿行之尚矣周禮有食祿之典二漢著受俸之秩逮于魏晉莫不聿稽往憲以經綸治道自中原喪亂茲制中絕先朝因循未遑釐改朕永鑒四方求民之瘼夙興昧旦至於憂勤故憲章舊典始班俸祿罷諸商人以簡民事戶增調三匹穀二斛九斗以為官司之祿均預調為二匹之賦即兼商用雖有一時之煩終克永逸之益祿行之後贓滿一匹者死變法改度宜為更始其大赦天下與之惟新戊辰武州水泛濫壞民居舍秋七月乙未行幸方山石窟寺八月甲辰詔曰帝業至重非廣詢無以致治王務至繁非博採無以興功先王知其如此故虛己以求過明恕以思咎是以諫鼓置於堯世謗木立於舜庭用能耳目四達庶類咸熙朕承累聖之洪基屬千載之昌運每布遐風景行前式承明之初班下內外聽人各盡規以補其闕中旨雖宣允稱者少故變時法遠遵古典班制俸祿改更刑書寬猛未允人或異議思言者莫由申情求諫者無因自達故令上明不周下情壅塞今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世事之要使言之者無罪聞之者足以為戒九月甲午蕭賾遣使朝貢戊戌詔曰俸制已立宜時班行其以十月為首每季一請於是內外百官受祿有差冬十月高麗國遣使朝貢蕭賾雙城戍主王繼宗內屬十有一月乙未詔員外散騎常侍李彪員外郎蘭英使於蕭賾十有二月詔以州鎮十五水旱民飢遣使者循行問所疾苦開倉賑恤九年春正月戊寅詔曰圖讖之興起於三季既非經國之典徒為妖邪所憑自今圖讖祕緯及名為孔子閉房記者一皆焚之留者以大辟論又諸巫覡假稱神鬼妄說吉凶及委巷諸卜非墳典所載者嚴加禁斷癸未大饗羣臣于太華殿班賜皇誥二月己亥制皇子封王者皇孫及曾孫紹封者皇女封者歲祿各有差以廣陽王建第二子嘉紹建後為廣陽王乙巳詔曰昔之哲王莫不博採下情勤求箴諫建設旌鼓詢納芻蕘朕班祿刪刑慮不周允虛懷讜直思顯洪猷百司卿士及工商吏民其各上書極諫靡有所隱三月丙申宕昌國遣使朝貢封皇弟禧為咸陽王幹為河南王羽為廣陵王雍為潁川王勰為始平王詳為北海王夏四月癸丑幸方山甲寅還宮五月高麗國及蕭賾並遣使朝貢六月辛亥幸方山遂幸靈泉池丁巳還宮秋七月丙寅朔新作諸門癸未遣使拜宕昌王梁彌機兄子彌承為其國王戊子幸魚池登青原岡甲午還宮八月己亥行幸彌澤甲寅登牛頭山庚申詔曰數州災水飢饉荐臻致有賣鬻男女者天之所譴在予一人而百姓無辜橫罹艱毒朕用殷憂夕惕忘食與寢今自太和六年已來買定冀幽相四州飢民良口者盡還所親雖娉為妻妾遇之非理情不樂者亦離之甲子還宮冬十月丁未詔曰朕承乾在位十有五年每覽先王之典經綸百氏儲畜既積黎元永安爰暨季葉斯道陵替富強者并兼山澤貧弱者望絕一致令地有遺利民無餘財或爭畝畔以亡身或因飢饉以棄業而欲天下太平百姓豐足安可得哉今遣使者循行州郡與牧守均給天下之田還受以生死為斷勸課農桑興富民之本戊申高麗吐谷渾國並遣使朝貢辛酉侍中司徒魏郡王陳建薨詔員外散騎常侍李彪尚書郎公孫阿六頭使蕭賾十有二月乙卯侍中淮南王他為司徒蠕蠕犯塞詔任城王澄率衆討之是年京師及州鎮十三水旱傷稼宕昌高麗吐谷渾等國並遣使朝貢
