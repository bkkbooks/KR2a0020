body:
  text: 魏書卷四十四列傳第三十二羅結伊戨乙瓌和其奴苟頹薛野月者宇文福費于孟威羅結代人也其先世領部落為國附臣劉顯之謀逆也太祖去之結翼衞鑾輿從幸賀蘭部後以功賜爵屈蛇侯太宗時除持節散騎常侍寧南將軍河內鎮將世祖初遷侍中外都大官總三十六曹事年一百七歲精爽不衰世祖以其忠売心甚見信待監典後宮出入臥內因除長信卿年一百一十詔聽歸老賜大寧東川以為居業并為築城即號曰羅侯城至今猶存朝廷每有大事驛馬詢訪焉年一百二十歲卒贈寧東將軍幽州刺史諡曰貞子斤太宗時為侍御中散後從世祖討赫連昌世祖追奔入城昌邀擊左右多死斤力戰有功世祖嘉之後錄勳除散騎常侍侍中四部尚書又加平西將軍後平涼州攻城野戰多有克捷以功賜爵帶方公除長安鎮都大將會蠕蠕侵境馳驛徵還除柔玄鎮都大將後以斤機辯敕與王俊使蠕蠕迎女備後宮又以本將軍開府為長安鎮都大將卒贈本將軍雍州刺史諡曰靜陪葬金陵子敦襲爵有姿貌善舉止自太子洗馬稍遷散騎常侍庫部尚書卒贈安東將軍幽州刺史諡曰恭子伊利高宗時襲爵除內行長以沉密小心恭勤不怠領御食羽獵諸曹事伊利曾病顯祖幸其宅自視醫藥其見待如此稍遷散騎常侍儀曹尚書出為安東將軍兗州刺史善撫導在州數年邊民歸之五千餘戶高祖時蠕蠕來寇詔伊利追擊之不及而反後依例降為侯除司農卿光祿大夫卒世宗初贈征北將軍燕州刺史諡曰靜子阿奴亦忠實寡言有智度以勳臣之子除侍御中散襲爵稍遷中散大夫卒子殺鬼襲爵武泰中驃騎將軍南青州刺史敦弟拔歷殿中尚書賜爵濟南公高祖時進爵為王除征西將軍吏部尚書改封趙郡王後例降為公卒贈寧東將軍定州刺史諡曰康陪葬金陵子道生肆州安北府外兵參軍卒子延天興中驃騎將軍左光祿大夫結從子渥渥子提並歷通顯提從世祖討赫連昌有功賜昌女為妻子雲早有名位顯祖時給事中西征敕勒為賊所襲殺子蓋世宗時右將軍直閤將軍轉龍驤將軍濟州刺史卒贈本將軍兗州刺史長子鑒累遷冠軍將軍岐州刺史入除散騎常侍金紫光祿大夫主衣都統卒贈侍中都督冀定瀛三州諸軍事尚書右僕射司空公衞將軍冀州刺史以孝靜外戚故也鑒弟衡累遷天水樂陵二郡太守輔國將軍光州刺史結宗人彌善射有膂力世祖時為軍將數從征伐有功官至范陽太守卒贈幽州刺史彌孫念字子懷武定中驃騎將軍膠州刺史伊戨代人也少而勇健走及奔馬善射多力曳牛却行神初擢為侍郎轉三郎賜爵汾陽子加振威將軍世祖之將討涼州也議者咸諫唯司徒崔浩勸世祖決行羣臣出後戨言於世祖曰若涼州無水草何得為國議者不可用也宜從浩言世祖善之既克涼州世祖大會於姑臧謂羣臣曰崔公智計有餘吾亦不復奇之吾正奇戨弓馬之士而所見能與崔同此深自可奇顧謂浩曰戨智力如此終至公相浩曰何必讀書然後為學衞青霍去病亦不讀書而能大建勳名致位公輔世祖笑曰誠如公言戨性忠謹世祖愛之親待日殊賞賜優厚真君初世祖欲拜戨為尚書封郡公戨辭曰尚書務殷公爵至重非臣年少愚近所宜荷任請收過恩世祖問其欲戨曰中祕二省多諸文士若恩矜不已請參其次世祖賢之遂拜為中護將軍祕書監以功賜爵魏安侯加冠軍將軍後出為東雍州刺史恩化大行百姓思之轉殿中尚書常典宿衞世祖親任之從幸瓜步頻有戰功進號鎮軍將軍興安二年遷征北大將軍都曹尚書加侍中進爵河南公興光元年拜司空及為三公清約自守為政舉大綱而已不為苛碎太安二年領太子太保三年與司徒陸麗等並平尚書事五年薨子蘭襲散騎常侍庫部書卒子盆生驍勇有膽氣初為統軍累有戰功遂為名將以勳賜爵平城子神龜二年自驍騎將軍直閤將軍為持節右將軍洛州刺史與荊州刺史淮南王世遵魯陽太守崔模俱討襄陽不克而還坐免官後除安西將軍光祿大夫又為撫軍將軍太僕卿假鎮西將軍西道別將每戰頻捷自崔延伯之後盆生為次焉進號征西將軍行岐州刺史復為西道都督戰歿贈車騎將軍雍州刺史永熙中重贈驃騎大將軍儀同三司定州刺史子武平司徒祭酒武平弟武榮直閤將軍戨族孫豹子武衞將軍豹子從子琳亦武衞將軍乙瓌代人也其先世統部落世祖時瓌父匹知慕國威化遣瓌入貢世祖因留之瓌便弓馬善射手格猛獸膂力過人數從征伐甚見信待尚上谷公主世祖之女也除鎮南將軍駙馬都尉賜爵西平公從駕南征除使持節都督前鋒諸軍事每戰身先士卒勇冠三軍後除侍中征東將軍儀同三司定州刺史進爵為王又為西道都將和平中薨時年二十九贈太尉公諡曰恭子乾歸襲爵年十二為侍御中散及長身長八尺有氣幹頗習書疏尤好兵法復尚恭宗女安樂公主除駙馬都尉侍中顯祖初除征西將軍秦州刺史有惠政高祖初即位為征西道都將又為中道都將延興五年卒時年三十一贈左光祿大夫開府儀同諡曰康子海字懷仁少歷侍御中散散騎侍郎卒時年四十一贈散騎常侍衞將軍濟州刺史諡曰孝子瑗字雅珍尚淮陽公主高祖之女也除駙馬都尉汝南王友固辭不拜歷濟南太守時為逆賊劉桃攻郡瑗踰城獲免後都督李叔仁討桃平之瑗乃還郡後除司農少卿銀青金紫左右光祿大夫中軍將軍西兗州刺史天平元年舉兵應樊子鵠與行臺左丞宋顯戰敗死時年四十六瑗弟諧字遵和武定中司馬諧弟琛字仲珍解褐司空參軍事稍遷東平濟陰二郡太守散騎常侍卒時年四十九和其奴代人也少有操行善射御初為三郎轉羽林中郎以恭勤致稱賜爵東陽子除奮武將軍高宗初遷尚書加散騎常侍進爵平昌公拜安南將軍遷尚書左僕射太安元年詔羣臣議立皇太子名其奴與司徒麗等以為宜以德命名帝從之又與河東王閭毗太宰常英等並平尚書事在官慎法不受私請時以西征吐谷渾諸將淹停不進久囚未決其奴與尚書毛法仁等窮問其狀連日具伏和平六年遷司空加侍中高宗崩乙渾與林金閭擅殺尚書楊保年等殿中尚書元郁率殿中宿衞士欲加兵於渾渾懼歸咎於金閭執金閭以付郁時其奴以金閭罪惡未分乃出之為定州刺史皇興元年長安鎮將東平王道符反詔其奴領征西大將軍率殿中精甲萬騎以討之未至而道符敗軍還三年薨內外咸歎惜之贈平昌王諡曰宣子天受襲爵初為內行令太和六年遷弩庫曹下大夫卒苟頹代人也曾祖烏提登國初有勳於太祖賜吳寧子父洛跋內行長頹性厚重少言嚴毅清直武力過人擢為中散小心謹敬世祖南討以頹為前鋒都將每臨敵對戰常先登陷陳世祖至江賜爵建德男加寧遠將軍還遷奏事中散典涼州作曹遷內行令轉給事中遷司衞監以本將軍拜洛州刺史為政剛嚴抑強扶弱山蠻畏威不敢為寇承明元年文明太后令百官舉才堪幹事人足委仗者於是公卿咸以頹應選徵拜散騎常侍殿中尚書進爵成德侯加後將軍太和元年加散騎常侍尋遷侍中安東將軍都曹尚書進爵河南公頹方正好直言雖文明太后生殺不允頹亦言至懇切未曾阿諛李訢李敷之誅也頹並致諫太后不從三年遷征北大將軍司空公進爵河東王以舊老聽乘步挽杖於朝大駕行幸三川頹留守京師沙門法秀謀反頹率禁衞收掩畢獲內外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗社獲安者實卿之功也七年詔曰頹為台鼎論道是寄歷奉四朝庸績彌遠宜加崇異以彰厥功自茲已後可永受復除十三年冬薨高祖痛悼者久之贈賵有加諡僖王長子愷累遷冠軍將軍柔玄懷荒武川鎮大將襲爵河東王例降為公正光二年卒贈平北將軍州刺史子寶武定中北梁太守愷弟養步兵校尉早卒養弟資武騎侍郎河間太守太僕少卿汲郡太守遷龍驤將軍肆州刺史還除武衞將軍加後將軍延昌末卒贈平北將軍并州刺史并給帛二百匹布一百匹諡曰愍子景蠻莊帝時撫軍將軍金紫光祿大夫頹弟若周散騎常侍尚書太和中安南將軍豫州刺史潁川侯卒贈光祿大夫若周弟壽樂太和中北部尚書安南將軍懷州刺史假山陽公未拜尋除散騎常侍殿中尚書晉安侯卒贈安東將軍冀州刺史頹從叔孤少以忠直稱太宗即位以定策功拜車騎將軍後除鎮軍大將軍并州刺史博陵公不治產業死之日家無餘財百姓追思之薛野月者代人也父達頭自姚萇時率部落歸國太祖嘉其忠款賜爵聊城侯散員大夫待以上客之禮賜妻鄭氏達頭閑雅恭慎太祖深器之卒贈平南將軍冀州刺史諡曰悼野月者少失父母養於宗人利家及長好學善射高宗初召補羽林遷給事中典民籍事校計戶口號為稱職賜爵順陽子野月者少孤父侯不襲至是錫爵和平中除平南將軍并州刺史進爵河東公轉太州刺史在治有聲卒年六十一贈散騎常侍大將軍并州刺史諡曰簡子虎子姿貌壯偉明斷有父風年十三入侍高宗太安中遷內行長典奏諸曹事當官正直內外憚之及文明太后臨朝出虎子為枋頭鎮將虎子素剛簡為近臣所疾因小過黜為鎮門士及顯祖南巡次於山陽虎子拜訴於路曰臣昔事先帝過霑重恩陛下在諒闇之日臣橫罹非罪自擯黜此蕃已經多載不悟今日得奉聖顏遂流涕嗚咽顯祖曰卿先帝舊臣久屈非所良用憮然詔虎子侍行訪以政事數十里中占對不絕時山東飢饉盜賊競起相州民孫誨等五百餘人稱虎子在鎮之日土境清晏訴乞虎子乃復除枋頭鎮將即日之任至鎮數州之地姦徒屏跡顯祖璽書慰喻後除平南將軍相州刺史顯祖崩不行太和二年襲爵三年詔虎子督三將出壽春與劉昶南討四年徐州民桓和等叛逆屯於五固詔虎子為南征都副將與尉元等討平之以本將軍為彭城鎮將至鎮雅得民和除開府徐州刺史時州鎮戍兵資絹自隨不入公庫任其私用常苦飢寒虎子上表曰臣聞金湯之固非粟不守韓白之勇非糧不戰故自用兵以來莫不先積聚然後圖兼并者也今江左未賓鯨鯢待戮自不委粟彭城以強豐沛將何以拓定江關掃一衡霍竊惟在鎮之兵不減數萬資糧之絹人十二匹即自隨身用度無準未及代下不免飢寒論之於公無毫釐之潤語其利私則橫費不足非所謂納民軌度公私相益也徐州左右水陸壤沃清汴通流足盈激灌其中良田十萬餘頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稻一歲之中且給官食半兵耘植餘兵尚衆且耕且守不妨捍邊一年之收過於十倍之絹暫時之耕足充數載之食於後兵資唯須內庫五稔之後穀帛俱溢匪直戍士有豐飽之資於國有吞敵之勢昔杜預田宛葉以平吳充國耕西零以強漢臣雖識謝古人任當邊守庶竭塵露有增山海高祖納之又上疏曰臣聞先王建不易之軌萬代承之聖主垂不刊之制千載共仰伏惟陛下道洽羣生恩齊造化仁德所覃迹超前哲遠崇古典留意治方革前王之弊法申當今之宜用定貢賦之輕重均品秩之厚薄庶令百辟足以代耕編戶享其餘畜巍乎煥焉不可量也臣竊尋居邊之民蒙化日淺戎馬之所資計素微小戶者一丁而已計其徵調之費終歲乃有七縑去年徵責不備或有貨易田宅質妻賣子呻吟道路不可忍聞今淮南之人思慕聖化延頸企足十室而九恐聞賦重更懷進退非惟損皇風之盛慮傷慕義之心且臣所居與南連接民情去就實所諳知特宜寬省以招未至其小郡太守數戶而已一請止六尺絹歲不滿匹既委邊捍取其必死邀之士重何吝君輕今班制已行布之天下不宜忤冒以亂朝章但猥藉恩私備位蕃岳憂責之地敢不盡言書奏文明太皇太后令曰俸制已行不可以小有不平便虧通式在州戍兵每歲交代虎子必親自勞送喪者給其斂帛州內遭水二麥不收上表請貸民粟民有車牛者求詣東兗給之並如所奏民得安堵高祖曾從容問祕書丞李彪曰卿頻使江南徐州刺史政績何如彪曰綏邊布化甚得其和高祖曰朕亦知之沛郡太守邵安下邳太守張攀咸以贓樜虎子案之於法安等遣子弟上書誣虎子南通賊虜高祖曰此其妄矣朕度虎子必不然也推案果虛乃下詔曰夫君臣體合則功業可興上下猜懼則治道替矣沛郡太守邵安下邳太守張攀咸以貪惏獲罪各遣子弟詣闕告刺史虎子縱民通賊妄稱無端安宜賜死攀及子僧保鞭一百配敦煌安息他生鞭一百可集州官兵民等宣告行決塞彼輕狡之源開此陳力之效在州十一載太和十五年卒年五十一贈散騎常侍鎮南將軍相州刺史諡曰文有六子長子世遵襲爵例降為侯景明中為秦州刺史稍遷左將軍卒年四十二長子忱字安民正光中襲爵稍遷鎮南將軍鉅鹿太守定州儀同開府諮議參軍齊獻武王大行臺左丞中外府司馬出為殷州驃騎府長史武定五年除鎮北將軍北廣平太守為治暴虐曾因公事一家之內併殺數人為民所訟將致之罪遇患卒於郡贈征西將軍西兗州刺史忱弟安顥武定末東豫州征西府長史世遵弟曇慶少有度量永平中員外散騎常侍遷尚書郎年五十一卒子衍字元孫輕財慕義熙平中為侍御史奉朝請永安中尚書駕部郎中行河陰縣事卒於正平太守贈征東將軍徐州刺史曇慶弟曇寶初補散騎高祖詔曇寶採遺書於天下歷侍御中散直閤將軍太子步兵校尉世宗時遣使巡行四方以曇寶持節兼散騎常侍龍驤將軍南道大使曇寶達豫州卒年二十九曇寶弟曇尚有容貌性寬和初辟御史加奉朝請熙平二年除徐州穀陽戍主行南陽平郡事母憂去職正光中詔以陽平隣接蕭衍綏捍須人仰尚書舉才而遣左僕射蕭寶夤舉曇尚應選馳驛之郡孝昌初徐州刺史元法僧叛入蕭衍曇尚斬其使人送首於都督安樂王鑒鑒不能援遂為蕭衍將王希聃所陷拘曇尚送蕭衍衍以禮遇之曇尚乞歸衍乃聽還肅宗復其本秩武泰初尒朱榮擅強并肆朝廷欲揣其情除曇尚員外常侍使於榮託以慰喻密以觀之建義初除司徒左長史兼吏部尚書授太原王尒朱榮官還賜爵永安侯尋除後將軍定州刺史尒朱榮之死授持節兼尚書北道行臺代魏蘭根後為鎮東將軍金紫光祿大夫太昌初加征東將軍行兗州事天平中除驃騎大將軍齊州刺史曇尚凡歷三州俱稱貪虐還除將作大匠卒於官年六十一贈都督瀛滄二州諸軍事本將軍儀同三司瀛州刺史子仲芬武定中齊文襄王中外府中兵參軍曇尚弟琡字曇珍武定末儀同三司尚書右僕射宇文福河南洛陽人其先南單于之遠屬世為擁部大人祖活撥仕慕容垂為唐郡內史遼東公太祖之平慕容寶活撥入國為第一客福少驍果有膂力太和初拜羽林郎將遷建節將軍賜爵新昌侯南征都將擊蕭賾有功授顯武將軍尋除恢武將軍北征都將特賜戎服破蠕蠕別部獲萬餘還除都牧給事十七年車駕南討假冠軍將軍後軍將軍時仍遷洛敕福檢行牧馬之所福規石濟以西河內以東拒黃河南北千里為牧地事尋施行今之馬場是也及從代移雜畜於牧所福善於將養並無損耗高祖嘉之尋補司衞監從駕豫州加冠軍將軍西道都將假節征虜將軍領精騎一千專殿駕後未幾轉驍騎將軍仍領太僕典牧令從駕征南陽兼武衞將軍二十二年車駕南討遣福與右衞將軍楊播為前軍至鄧城福選兵簡將為攻圍之勢高祖望福軍法齊整將士閑習大被褒歎蕭鸞遣其尚書崔慧景黃門郎蕭衍率衆十萬來救高祖指麾將士敕福領高車羽林五百騎出賊南面奪其橋道遏絕歸路賊衆大恐六道來戰福據鞍誓衆身先士卒賊不得前遂大奔潰賜爵昌黎伯正武衞加征虜將軍尋以高車叛命加征北將軍北征都將追討之軍敗被黜景明初乃起拜平遠將軍南征統軍進計於都督彭城王勰曰建安是淮南重鎮彼此要衝得之則義陽易圖不獲則壽春難保勰然之及勰為州遂令福攻建安建安降以勳封襄樂縣開國男邑二百戶除太僕少卿尋以衍將寇邊假節征虜將軍領兵出三關討之又詔福行豫州事與東豫州刺史田益宗共相影援綏遏蠻楚還為光祿大夫轉太僕卿延昌中以本官領左衞將軍除散騎常侍都官尚書加安東將軍營州大中正熙平初除鎮北將軍瀛州刺史福性忠清在公嚴毅以信御民甚得聲譽解任復除太僕卿又為金紫光祿大夫出除散騎常侍都督懷朔沃野武川三鎮諸軍事征北將軍懷朔鎮將至鎮遇病卒詔遣主書樂安嘉赴弔贈車騎大將軍定州刺史開國如故諡曰貞惠長子善字慶孫襲爵自司空掾稍遷平南將軍光祿大夫孝昌末北征戰歿贈車騎將軍冀州刺史善弟延字慶壽體貌魁岸眉目疎朗永平中釋褐奉朝請直後員外散騎常侍以父老詔聽隨侍在瀛州屬大乘妖黨突入州城延率奴客戰死者數人身被重創賊乃小退而縱火燒齋閣福時在內延突火而入抱福出外支體灼爛髮盡為燼於是勒衆與賊苦戰賊乃散走以此見稱孝昌中授假節建威將軍西道別將赴援關隴有戰功除員外散騎常侍轉直寢與万俟醜奴戰沒贈冠軍將軍豫州刺史子仲鸞武定末齊王丞相府長流參軍慶壽弟慶安歷給事中尚書殿中郎中後加平北將軍武衞將軍河陰遇害贈征東將軍兗州刺史長子仲融融弟仲衍費于代人也袓峻仕赫連昌為寧東將軍泰常末率衆來降拜龍驤將軍賜爵犍為公後遷征南將軍廣阿鎮大將徙爵下邳公父郁以隨父歸誠勳賜五等男除燕郡太守卒贈幽州刺史于少有節操起家內三郎世祖南伐從駕至江以宿衞之勤除寧遠將軍賜爵松楊男遷商賈部二曹令除平南將軍懷州刺史卒子萬襲太和初除平南將軍梁國鎮將後高祖南伐萬從駕渡淮戰歿贈鎮東將軍冀州刺史子穆字朗興性剛烈有壯氣頗涉書史好尚功名世宗初襲男爵後除夏州別駕尋加寧遠將軍轉涇州平西府長史時刺史皇甫集靈太后之元舅恃外戚之親多為非法穆正色匡諫集亦憚之轉安定太守仍為長史還朝拜左軍將軍轉河陰令有嚴明之稱時蠕蠕主婆羅門自涼州歸降其部衆因飢侵掠邊邑詔穆銜命宣慰便皆款附明年復叛入寇涼州除穆輔國將軍假征虜將軍兼尚書左丞西北道行臺仍為別將往討之穆至涼州蠕蠕遁走穆謂其所部曰夷狄獸心唯利是視見敵便走乘虛復出今王師來討雖畏威逃跡然軍還之後必來侵暴今欲羸師誘致冀獲一戰若不令其破膽終恐疲於奔命衆咸然之穆乃簡練精騎伏於山谷使羸步之衆為外營以誘之賊騎覘見謂為信弱俄而競至穆伏兵奔擊大破之斬其帥郁厥烏爾俟斤十代等獲生口雜畜甚衆及六鎮反叛詔穆為別將隸都督李崇北伐都督崔暹失利崇將班師會諸將議曰朔州是白道之衝賊之咽喉若此處不全則并肆危矣今欲選諸將一人留以鎮捍不知誰堪此任僉曰無過穆者崇乃請為朔州刺史仍本將軍尋改除雲州刺史穆招離聚散頗得人心時北境州鎮悉皆淪沒唯穆獨據一城四面抗拒久之援軍不至兼行路阻塞糧仗俱盡穆知勢窮乃棄城南走投尒朱榮於秀容既而詣闕請罪詔原之孝昌中二絳蜀反以穆為都督討平之拜前將軍散騎常侍遷平南將軍光祿大夫妖賊李洪於陽城起逆連結蠻左詔穆兼武衞將軍率衆討擊破於關口之南遷金紫光祿大夫正武衞將軍尒朱榮向洛靈太后徵穆令屯小平及榮推奉莊帝河梁不守穆遂棄衆先降穆素為榮所知見之甚悅穆潛說榮曰公士馬不出萬人今長驅向洛前無橫陳者正以推奉主上順民心故耳既無戰勝之威羣情素不厭伏今以京師之衆百官之盛一知公之虛實必有輕侮之心若不大行誅罰更樹親黨公還北之日恐不得度太行而內難作矣榮心然之於是遂有河陰之事天下聞之莫不切齒榮入洛穆遷中軍將軍吏部尚書魯縣開國侯食邑八百戶又領夏州大中正蕭衍遣將軍曹義宗逼荊州詔穆為使持節南征將軍都督南征諸軍事大都督以援之穆潛軍徑進出其不意至即大破之生擒義宗送闕以功遷衞將軍進封趙平郡開國公增邑一千戶遷使持節加侍中車騎將軍假儀同三司前鋒大都督與大將軍元天穆東討邢杲破平之時元顥內逼莊帝北幸顥入京師穆與天穆既平齊地回師將擊顥穆先驅圍虎牢盡銳攻之將拔屬天穆北渡既無後繼人情離沮穆遂降顥以河陰酷濫事起於穆引入詰讓出而殺之時年五十三莊帝還宮追贈侍中司徒公諡曰武宣長子慶遠永安中龍驤將軍青州開府司馬第二子孝遠襲天平中叛入關西孟威字能重河南洛陽人頗有氣尚尤曉北土風俗歷東宮齋帥羽林監時四鎮高車叛投蠕蠕高祖詔威曉喻禍福追還逃散分配為民後以明解北人之語敕在著作以備推訪永平中自鎮遠將軍前軍將軍左右直長加龍驤將軍出使高昌還遷城門校尉直閤將軍沃野鎮將正光初蠕蠕主阿那瓖歸國詔遣前郢州刺史陸希道兼侍中為使主以威兼散騎常侍為副遠畿迎接阿那瓖之還國也復以威為平北將軍光祿大夫假員外常侍為使主護送之前後頻使遠蕃粗皆稱旨復加撫軍將軍普泰中除大鴻臚卿尋加驃騎大將軍左光祿大夫天平三年卒贈使持節侍中本將軍都督冀瀛滄三州諸軍事司空公冀州刺史子恂嗣威弟季稍遷鎮遠將軍左中郎將廷尉監以本將軍除廣州刺史預尒朱榮義舉封鉅鹿縣開國公食邑一千戶除撫軍將軍廷尉卿轉司農卿出為平西將軍華州刺史卒贈車騎大將軍雍州刺史史臣曰羅結枝附葉從當舊之眷子孫顯祿俱至公王伊戨以勇力見擢而能贊伐姑臧之策請參中祕之官世祖嘉之於前良有以也乙瓌之驍猛和奴之貞正苟頹之剛直虎子之威強宇文之氣幹咸亦有用之士費穆出身致力遂有功名而末路一言禍被簪帶校之文和異世同咎其死也幸哉孟威致力荒裔其勤可錄矣
