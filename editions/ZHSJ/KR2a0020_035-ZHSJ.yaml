body:
  text: 魏書卷三十列傳第十八王建安同樓伏連丘堆娥清劉尼奚眷車伊洛宿石來大千周幾豆代田周觀閭大肥尉撥陸真呂洛拔王建廣寧人也祖姑為平文后生昭成皇帝伯祖豐以帝舅貴重豐子支尚昭成女甚見親待建少尚公主登國初為外朝大人與和跋等十三人迭典庶事參與計謀太祖幸濡源遣建使慕容垂辭色高亢垂壯之還為左大夫建兄回諸子多不順法建具以狀聞回父子伏誅其謹直如此從征伐諸國破二十餘部以功賜奴婢數十口雜畜數千從征衞辰破之賜僮隸五千戶為中部大人從破慕容寶於參合陂太祖乘勝將席卷南夏於是簡擇俘衆有才能者留之其餘欲悉給衣糧遣歸令中州之民咸知恩德乃召羣臣議之建曰慕容寶覆敗於此國內虛空圖之為易今獲而歸之無乃不可乎且縱敵生患不如殺之太祖謂諸將曰若從建言吾恐後南人創乂絕其向化之心非伐罪弔民之義諸將咸以建言為然建又固執乃坑之太祖既而悔焉後從征慕容寶拜冠軍將軍并州既平車駕東出井陘命建率五萬騎先驅啟路車駕次常山諸郡皆降惟中山鄴信都三城不下乃遣衞王儀南攻鄴建攻信都衆各五萬建等攻城六十餘日不能克士卒多傷太祖乃自中山幸信都慕容寶冀州刺史慕容鳳夜踰城走信都降車駕幸鉅鹿破慕容寶於栢肆塢遂進圍中山寶棄城走和龍城內無主百姓惶惑東門不閉太祖將夜入乘城據守其門建貪而無謀意在虜獲恐士卒肆掠盜亂府庫請俟天明太祖乃止是夜徒河人共立慕容普驎為主遂閉門固守太祖乃悉衆攻之連日不拔使人登巢車臨城招其衆曰慕容寶捐城奔走汝曹百姓將為誰守何不識天命取死亡也皆曰羣小無知但復恐如參合之衆故求全月日之命耳太祖聞之顧視建而唾其面中山平賜建爵濮陽公烏丸庫官鳴聚黨為寇詔建討平之遷太僕徙為真定公加散騎常侍冀青二州刺史卒陪葬金陵初建兄豆居以建功賜爵即丘侯無子建以子斤襲兄爵太宗初給事中任職用事轉大長秋世祖征赫連昌遣斤部造攻具進爵淮南公加平北將軍時并州胡酋田卜謀反誅餘衆不安遣斤鎮慮虒以撫慰之斤綏靜胡魏甚收聲稱劉義隆遣將到彥之寇河南世祖西征赫連定以斤為衞兵將軍鎮蒲坂關隴平斤徙鎮長安假節鎮西將軍斤遂驕矜不順法度信用左右調役百姓民不堪之南奔漢川者數千家而委罪於雍州刺史陽文祖秦州刺史任延明世祖召問二人各以狀對世祖知為斤所誣遣宜陽公伏樹覆按虛實得數十事遂斬斤以徇建孫度太宗時為虎牢鎮監軍世祖即位徵拜殿中給事遷尚書從征赫連昌討蠕蠕並有功賜爵濟陽公加散騎常侍平南將軍詔度率五千騎與叔孫建合擊劉義隆兗州刺史竺靈秀於湖陸大破之後出鎮長安假節都督秦涇梁益雍五州諸軍事開府卒諡曰莊子安都襲降爵為侯世祖拜為太子庶子出為鄯善鎮將高宗時為內都大官卒子買得襲建曾孫樹以善射有寵於顯祖為內侍長稍遷尚書賜爵歷陽侯加龍驤將軍員外常侍出為平西將軍涇州刺史卒安同遼東胡人也其先祖曰世高漢時以安息王侍子入洛歷魏至晉避亂遼東遂家焉父屈仕慕容暐為殿中郎將苻堅滅暐屈友人公孫眷之妹沒入苻氏宮出賜劉庫仁為妻庫仁貴寵之同因隨眷商販見太祖有濟世之才遂留奉侍性端嚴明惠好長者之言登國初太祖徵兵於慕容垂事在窟咄傳同頻使稱旨遂見寵異以為外朝大人與和跋等出入禁中迭典庶事太祖班賜功臣同以使功居多賜以妻妾及隸戶三十馬二匹羊五十口加廣武將軍從征姚平於柴壁姚興悉衆救平太祖乃增築重圍以拒興同進計曰臣受遣詣絳督租見汾東有蒙坑東西三百餘里徑路不通姚興來必從汾西乘高臨下直至柴壁如此則寇內外勢接重圍難固不可制也宜截汾曲為南北浮橋乘西岸築圍西圍既固賊至無所施其智力矣從之興果視平屠滅而不能救以謀功賜爵北新侯加安遠將軍詔同送姚興將越騎校尉唐小方等於長安清河王紹之亂太宗在外使夜告同令收合百工伎巧衆皆響應奉迎太宗即位命同與南平公長孫嵩並理民訟又詔與肥如侯賀護持節循察并定二州及諸山居雜胡丁零宣詔撫慰問其疾苦糾舉守宰不法同至并州表曰竊見并州所部守宰多不奉法又刺史擅用御府鍼工古彤為晉陽令交通財賄共為姦利請案律治罪太宗從之於是郡國肅然同東出井陘至鉅鹿發衆四戶一人欲治大嶺山通天門關又築塢於宋子以鎮靜郡縣護疾同得衆心因此使人告同築城聚衆欲圖大事太宗以同擅徵發於外檻車徵還召羣官議其罪皆曰同擅興事役勞擾百姓宜應窮治以肅來犯太宗以同雖專命而本在為公意無不善釋之世祖監國臨朝聽政以同為左輔太宗征河南拜同右光祿大夫世祖出鎮北境同與安定王彌留鎮京師世祖即位進爵高陽公拜光祿勳尋除征東大將軍冀青二州刺史同長子屈太宗時典太倉事盜官粳米數石欲以養親同大怒奏求戮屈自劾不能訓子請罪太宗嘉而恕之遂詔長給同粳米其公清奉法皆此類也同在官明察長於校練家法修整為世所稱及在冀州年老頗殖財貨大興寺塔為百姓所苦神二年卒追贈高陽王諡曰恭惠屈子陽烈散騎侍郎賜爵北新子屈弟原雅性矜嚴沉勇多智略太宗時為獵郎出監雲中軍事時赫連屈丐犯河西原以數十騎擊之殺十餘人太宗以原輕敵違節度加其罪責然知原驍勇遂任以為將鎮守雲中寬和愛下甚得衆心蠕蠕屢犯塞原輒摧破之以功賜爵武原侯加魯兵將軍世祖即位徵拜駕部尚書車駕征蠕蠕大檀分軍五道並進大檀驚駭北遁遷尚書左僕射河間公加侍中征南大將軍從征赫連昌入其城而還車駕北伐蠕蠕遁走世祖聞東部高車在巳尼陂人畜甚衆將遣襲之諸將皆以為難世祖不從遣原與侍中古弼率萬騎討之大獲而還車駕征昌黎原與建寧王崇屯于漠南以備蠕蠕原在朝無所比周然恃寵驕恣多所排抑為子求襄城公盧魯元女魯元不許原告其罪狀事相連逮歷時不決原懼不勝遂謀為逆事洩伏誅臨刑上疏曰臣聞聖不獨明而治鼎不單足而立是以熒火之光猶增日月之曜先臣同往因聖運歸身太祖竭誠勠力立効於險難之中臣以頑闇忝備股肱陛下恩育委以朝政思展微誠仰報恩澤而魯元姦佞構成貝錦天威遂加合門俱戮此乃命也非臣之枉但魯元外類忠貞內懷姦詐而陛下任以腹心恐釁發肘腋臣與魯元生為怨人死為讎鬼非以私故謗毀魯元不復眷眷披露誠款原弟頡頡弟聰為內侍聰弟䎱為龍驤將軍給事黃門侍郎賜爵廣宗侯原兄弟外節儉而內實積聚及誅後籍其財至數萬頡辯慧多策略最有父風太宗初為內侍長令察舉百僚糾刺姦慝無所回避嘗告其父陰事太宗以為忠特親寵之宜城王奚斤自長安追擊赫連昌至于安定頡為監軍侍御史斤以馬多疫死士衆乏糧乃深壘自固遣太僕丘堆等督租於民間為昌所敗昌遂驕矜日來侵掠芻牧者不得出士卒患之頡進計曰本奉詔誅賊今乃退守窮城若不為賊殺當以法誅進退安有生路而王公諸將晏然無謀將何以報恩塞責斤曰今若出戰則馬力不足以步擊騎終無捷理當須京師救騎至然後步陳擊於內騎兵襲其外所謂萬全之計也頡曰今猛寇遊逸於外而吾等兵疲力屈士有飢色不一決戰則死在旦夕何救兵之可待也等死當戰死寧可坐受困乎斤猶以馬為辭頡曰今兵雖無馬但將帥所乘足得二百騎頡請募壯勇出擊之就不能破可以折其銳且昌狷而無謀每好挑戰衆皆識之若伏兵奄擊昌可擒也斤猶難之頡乃陰與尉眷等謀選騎待焉昌來攻壘頡出應之昌於陳前自接戰軍士識昌爭往赴之會天大風揚塵晝昏衆亂昌退頡等追擊昌馬蹶而墜頡擒昌送於京師世祖大悅拜頡建節將軍賜爵西平公代堆統攝諸軍斤功不在己輕追昌弟定於平涼敗績定將復入長安詔頡鎮蒲坂以拒之劉義隆遣將到彥之率衆寇河南以援赫連定世祖以兵少乃攝河南三鎮北渡彥之遂列守南岸至于衡關世祖西征赫連定以頡為冠軍將軍督諸軍擊彥之彥之遣將姚縱夫渡河攻冶坂頡督諸軍擊之斬首三千餘級投水者甚衆遂濟河攻洛陽拔之擒義隆將二十餘人斬首五千級進攻虎牢虎牢潰義隆司州刺史尹沖墜城死又與琅邪王司馬楚之平滑臺擒義隆將朱脩之李元德及東郡太守申謨俘獲萬餘人乃振旅還京師神四年卒贈征南大將軍儀同三司進爵為王諡曰襄頡為將善綏士衆及卒義隆士卒降者無不歎惜同弟月者太宗時為樂陵太守卒長子國位至冠軍將軍賜爵北平侯杏城鎮將國弟難有巧思陽平王杜超督諸將擊劉義隆難參征南軍事以功表為清河太守世祖時諸將頻征和龍皆以難為長史鑿山堙谷省力兼功遷給事中從駕南征造浮橋於河以功賜爵清河子卒子平城襲爵官至虞曹令為乙渾所殺樓伏連代人也世為酋帥伏連忠厚有器量年十三襲父位領部落太祖初從破賀蘭部又從平中山為太守斬逆賊張翹從征姚平於柴壁以功賜爵安邑侯太祖時為晉兵將軍并州刺史伏連招誘西河胡曹成等七十餘人襲殺赫連屈孑吐京護軍及其守士三百餘人并擒叛胡阿度支等二百餘家太宗嘉之拜成等將軍賜爵列侯徵伏連為內都大官世祖即位進為廣陵公轉衞尉徙光祿勳世祖征蠕蠕伏連留鎮京師進爵為王加平南大將軍又除假節督河西諸軍鎮西大將軍出鎮統萬真君十年薨諡曰恭王子真襲降爵為公從世祖征伐有功官至散騎常侍尚書安北將軍徙為湘東公從征涼州還卒於路諡曰莊公子干襲降爵為侯真次弟大拔歷位尚書散騎常侍征西將軍賜爵永平侯高祖初為中都大官卒贈平東將軍定州刺史諡曰康子禀字法生襲拜太子宮門大夫稍遷趙郡太守更滿還京除冠軍將軍城門校尉出為征虜將軍平城鎮將遷朔州刺史仍本將軍入為衞尉少卿卒年五十八贈撫軍將軍州刺史子貴宗武定中伏波將軍開府水曹參軍伏連兄孫安文從征平涼有功賜爵覇城男加虎威將軍後遷三郎幢將卒高祖初以其子毅貴追贈安東將軍冀州刺史陽平公諡曰定毅歷位內外稍遷殿中尚書散騎常侍賜爵常山公加安南將軍遷尚書右僕射以擒反人梁衆保加侍中本官如故後例降為侯出除使持節鎮東將軍定州刺史時太極殿成將行考室之禮引集羣臣而雪不克饗高祖曰朕經始正殿功構初成將集百僚考行大禮然同雲仍結霏雪驟零將由寡昧未能仰答天心此之不德咎竟焉在卿等宜各陳所懷以匡不逮毅稽首對曰雪霜風雨天地之常夏霂冬霰四時節今隆冬雪降固是其時又禮云雨沾服失容則廢禮自古而然不足為異高祖曰昔劉秀將濟呼沱為之冰合但朕德謝古人不能仰感天意故也後轉都督涼河二州鄯善鎮諸軍事涼州刺史車駕南伐毅表諫曰伏承六軍雲動問罪荊揚弔民淮表一同甌越但臣愚見私竊未安何者京邑新遷百姓易業公私草創生途索然兼往歲弗稔民多飢饉二三之際嗟惋易興天道悠長宜遵養時晦願抑赫斯以待後日詔曰時不自來因人則合今年人事殊非昔歲守株之唱便可停也陽九利涉豈卿所知也太和二十一年卒賜錢二十萬布二百匹丘堆代人也美容儀以忠謹親侍太宗即位拾遺左右稍遷散騎常侍與叔孫建等討滅山胡劉裕泝河西伐詔堆與建自河內次枋頭以備寇盜姚泓既滅堆留鎮并州赫連屈孑遣三千騎寇河西堆自并州與游擊將軍王洛生擊走之以功賜爵為侯世祖監國臨朝堆與太尉穆觀等為右弼世祖即位進爵臨淮公加鎮西將軍徙為太僕世祖征赫連昌堆與常山王素督步兵三萬人為後繼昌戰敗南奔世祖遣堆與宗正娥清率五千騎略地關右昌貳城守將堅守不下堆與清攻拔之詔堆班師宜城王奚斤表留堆等進平昌許之堆斤合軍與昌相拒擊士馬乏糧堆與義兵將軍封禮督租於民間士卒暴掠為昌所襲敗績堆將數百騎還城斤追擊赫連定留堆守輜重斤為定所擒堆聞而棄甲走長安復將高涼王禮棄守東走蒲坂世祖大怒遣西平公安頡斬堆延和初詔曰堆國之肺腑勳著先朝西征喪師遂從軍法國除祀絕朕甚愍之可賜其子跋爵淮陵侯加安遠將軍後征蓋吳戰沒子麟襲爵歷位駕部令出為瑕丘鎮將假平南將軍東海公遷東兗州刺史卒官娥清代人也少有將略累著戰功稍遷振威將軍劉裕遣將朱超石寇平原至畔城遁還清與長孫道生追之至河獲其將楊豐還拜給事黃門侍郎先是徒河民散居三州頗為民害詔清徙之平城清善綏撫徙者如歸太宗南巡幸鄴以清為中領軍將軍與宋兵將軍周幾等渡河略地至湖陸高平民屯聚林藪拒射官軍清等因誅數千家虜獲萬餘口賜爵須昌侯清與幾等遂鎮枋頭世祖初清自枋頭還京師假征南將軍進為東平公蠕蠕大檀徙居漠南清與平陽王長孫翰從東道出長川討之大獲而還轉宗正卿尋從征蠕蠕又從平統萬遂與奚斤追赫連昌至安定與昌相持及安頡擒昌昌弟定西走斤追之清欲尋水而往斤不從遂與斤俱為定所擒世祖克平涼乃得還後詔清鎮并州討山胡白龍於西河斬白龍父及其將帥遂屠其城遷平東將軍與古弼等東討馮文通以不急戰文通奔高麗檻車徵黜為門卒遂卒於家子延官至員外散騎常侍賜爵南平公劉尼代人也本姓獨孤氏曾祖敦有功於太祖為方面大人父婁冠軍將軍卒贈并州刺史尼少壯健有膂力勇果善射世祖見而善之拜羽林中郎賜爵昌國子加振威將軍宗愛既殺南安王余於東廟祕之惟尼知狀尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今欲立誰愛曰待還宮擢諸王子賢者而立之尼懼其有變密以狀告殿中尚書源賀賀時與尼俱典兵宿衞仍共南部尚書陸麗謀曰宗愛既立南安還復殺之今不能奉戴皇孫以順民望社稷危矣將欲如何麗曰唯有密奉皇孫耳於是賀與尚書長孫渴侯嚴兵守衞尼與麗迎高宗於苑中麗抱高宗於馬上入京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衞之士皆可還宮衆咸唱萬歲賀及渴侯登執宗愛賈周等勒兵而入奉高宗於宮門外入登永安殿以尼為內行長進爵建昌侯遷散騎常侍安南將軍又進爵東安公尋遷尚書右僕射加侍中進封為王出為征南將軍定州刺史在州清慎然率多酒醉治日甚少徵為殿中尚書加侍中特進高宗末遷司徒顯祖即位以尼有大功於先朝彌加尊重賜別戶三十皇興四年車駕北征帝親誓衆而尼昏醉兵陳不整顯祖以其功重特恕之免官而已延興四年薨子社生襲爵世宗時寧朔將軍步兵校尉熙平初卒贈龍驤將軍朔州刺史諡曰克奚眷代人也少有將略太祖時有戰功太宗時為尚書假安南將軍虎牢鎮將為寇所憚世祖初為中軍都曹尚書復鎮虎牢賜爵南陽公加使持節侍中都督豫洛二州河內諸軍事鎮南將軍開府尋徙鎮長安世祖幸美稷眷受詔督諸軍共討山胡白龍于西河破之屠其城斬首數千級虜其妻子而還世祖平姑臧遣眷討沮渠牧犍弟私署張掖太守宜得宜得奔酒泉酒泉太守無諱與宜得奔高昌獲其二城後沮渠天周復據酒泉眷討平之虜男女四千餘人世祖征蠕蠕以眷為尚書督偏將出別道詔會鹿渾海眷與中山王辰等諸大將俱後期斬于都南爵除車伊洛焉耆胡也世為東境部落帥修職貢世祖錄其誠款延和中授伊洛平西將軍封前部王賜絹一百匹綿一百斤繡衣一具金帶靴帽伊洛大悅規欲歸闕沮渠無諱斷路伊洛與無諱連戰破之時無諱卒其弟天周奪無諱子乾壽兵規領部曲伊洛前後遣使招喻乾壽等率戶五百餘家來奔伊洛送之京師又招喻李寶弟欽等五十餘人送詣敦煌伊洛又率部衆二千餘人伐高昌討破焉耆東關七城虜獲男女二百人駝千頭馬千匹以金一百斤奉獻先是伊洛征焉耆留其子歇守城而安周乘虛引蠕蠕三道圍歇并遣使謂歇曰爾父已投大魏爾速歸首當賜爾爵號歇固守連戰久之外無救援為安周所陷走奔伊洛伊洛收集遺散一千餘家歸焉耆鎮世祖嘉之正平元年詔伊洛曰歇年尚幼能固守城邑忠節顯著朕甚嘉之可遣歇詣闕伊洛令歇將弟波利等十餘人赴都正平二年伊洛朝京師賜以妻妾奴婢田宅牛羊拜上將軍王如故興安二年卒贈鎮西大將軍秦州刺史諡曰康王賜綿絹雜綵五百匹衣二十七襲葬禮依盧魯元故事歇襲爵皇興末拜使持節平西將軍豫州刺史延興三年卒子伯主襲爵波利天安二年拜立節將軍樂官侯皇興三年卒兄子洛都襲爵宿石朔方人也赫連屈孑弟文陳之曾孫也天興二年文陳父子歸闕太祖嘉之以宗女妻焉賜奴婢數十口拜為上將軍祖若豆根太宗時賜姓宿氏襲上將軍父沓干世祖時虎賁幢將從征平涼有功拜虎威將軍侍御郎賜爵漢安男轉中散遷給事兼領工曹從駕討和龍以功賜奴婢十七戶真君四年從駕討蠕蠕戰沒世祖悼惜之詔求沓干子時石年甫十一引見以幼聽歸年十三襲爵擢為中散從駕至江拜宣威將軍興光中遷侍御史拜中壘將軍進爵蔡陽子典宜官曹遷內行令從幸苑內遊獵石於高宗前走馬道峻馬倒殞絕久之乃蘇由是御馬得制高宗嘉之賜綿一百斤帛五十匹駿馬一匹改爵義陽子嘗從獵高宗親欲射虎石叩馬而諫引高宗至高原上後虎騰躍殺人詔曰石為忠臣鞚馬切諫免虎之害後有犯罪宥而勿坐賜駿馬一匹尚上谷公主拜駙馬都尉天安初遷散騎常侍吏部尚書進爵太山公為北中道都大將延興元年卒追贈太原王諡曰康葬禮依盧魯元故事太和初子倪襲爵比部侍御來大千代人也父初真從太祖避難叱候山參創業之功官至後將軍武原侯與在八議大千驍果善騎射為騎都尉永興初襲爵遷中散至於朝賀之日大千常著御鎧盤馬殿前朝臣莫不嗟歎遷內幢將典宿衞禁旅大千用法嚴明上下齊肅嘗從太宗校獵見虎在高巖上大千持矟直前刺之應手而死太宗嘉其勇壯又為殿中給事世祖踐祚與襄城公盧魯元等七人俱為常侍持仗侍衞晝夜不離左右從討赫連昌共長孫道生與賊交戰道生馬倒為賊所擊大千馳救賊衆散走大千扶道生上馬遂得免從討蠕蠕戰功居多遷征北大將軍賜爵廬陵公鎮雲中兼統白道軍事闕賊北叛大千前後追擊莫不平殄延和初車駕北伐大千為前鋒大破虜軍世祖以其壯勇數有戰功兼悉北境險要詔大千巡撫六鎮以防寇虜經略布置甚得事宜後吐京胡反以大千為都將討平之在吐京卒喪還停於平城南世祖出還見而問之左右以對世祖悼歎者良久詔曰大千忠勇盡節功在可嘉今聽喪入殯城內贈司空諡曰莊公子丘頹襲爵降為晉興侯拜安遠將軍從駕到江進右將軍和平中遷中散轉相曹都典奉事皇興四年卒贈寧南將軍陳留公諡曰簡子蕇襲爵丘頹弟提官至監御曹給事冠軍將軍兗州刺史濮陽侯太和十年卒周幾代人也父千有功太祖之世賜爵順陽侯坐事死幾少以善騎射為獵郎太宗即位為殿中侍御史掌宿衞禁兵斷決稱職遷左民尚書神瑞中并州飢民遊食山東詔幾領衆鎮博陵之魯口以安集之泰常初白澗行唐民數千家負嶮不供輸稅幾與安康子長孫道生宣示禍福逃民遂還于時郡縣斬叛胡翟猛雀於林慮山猛雀遺種竄於行唐及襄國幾追討盡誅之後為寧朔將軍拒司馬德宗將劉裕於南破毛德祖於土樓以功賜爵交阯侯世祖以幾有智勇遣鎮河南威信著于外境幾常嫌奚斤等綏撫關中失和百姓不附每至言論形於聲色斤等憚焉進號宋兵將軍率洛州刺史于栗磾以萬人襲陝城卒于軍軍人無不歎惜之歸葬京師追贈交阯公諡曰桓子步襲爵卒子安國襲爵太和中討蠕蠕失利伏法爵除豆代田代人也太宗時以善騎射為內細射從攻虎牢詔代田登樓射賊矢不虛發與奚斤前鋒先入擒劉義隆將毛德祖并長史司馬三人以功遷內三郎從討赫連昌乘勝追賊入其宮門門閉代田踰宮而出世祖壯之拜勇武將軍後從駕平昌以戰功賜奴婢十五口黃金百斤銀百斤神中討蠕蠕賜爵關中侯從討平涼擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田敕斤曰全爾身命者代田功也改爵井陘侯加散騎常侍右衞將軍領內都幢將從討和龍戰功居多遷殿中尚書賜奴婢六十口以前後軍功進爵長廣公加平東將軍從駕南討轉太子太保出為統萬鎮大將興安中卒贈侍中安東大將軍長廣王諡曰恭子求周為內三郎從駕到江賜爵五等子又進爵為侯後襲父爵為吏部尚書皇興二年卒贈征北大將軍長廣王諡曰簡子多侯襲爵周觀代人也驍勇有膂力每在軍陳必應募先登以功進為軍將長史尋轉軍將擊赫連屈丐有功賜爵安川子遷北鎮軍將世祖即位從討蠕蠕以軍功進為都副將鎮雲中神中又討蠕蠕大獲增爵為侯從征平涼進爵金城公遷為都將從破離石胡加散騎常侍轉高平鎮將觀善撫士卒號有威名真君初詔觀統五軍西討禿髮保周於張掖徙其民數百家將置於京師至武威輙與諸將私分之世祖大怒黜觀為金城侯改授內都大官出除平南將軍秦州刺史復爵金城公撫馭失和民薛永宗聚衆於汾曲以叛觀討永宗為流矢所中世祖幸蒲坂觀聞帝至驚怖而起瘡重遂卒世祖怒絕其爵子豆初為三郎遷軍將卒于長樂太守閭大肥蠕蠕人也太祖時與其弟大碸倍頤率宗族歸國太祖善之尚華陰公主賜爵其思子與其弟並為上賓入八議太宗即位進大肥為內都大官增爵為侯神瑞中為都將討越勒部於跋那山大破之泰常初復為都將領禁兵討蠕蠕獲其大將莫孤渾宜城王奚斤之攻虎牢也大肥與娥清領十二軍出中道略地高平金鄉東至泰山假大肥使持節安陽公鎮撫陳汝世祖初復與奚斤出雲中白道討大檀破之還為內都大官出除使持節冀青二州刺史假滎陽公尋徵還位特進復出為冀青二州刺史尋入為內都大官從討赫連昌以功授滎陽公公主薨復尚濩澤公主又為都將擊大檀大破之還至渴侯山遂討東部高車於巳尼陂又征平涼並有功世祖將拜大肥為王遇疾卒追贈中山王子賀早卒大肥弟驎襲爵出為仇池鎮將卒無子弟鳳襲爵高宗時為內都大官出為鎮南將軍肆州刺史卒無子爵除尉撥代人也父那濮陽太守撥為太學生募從兗州刺史羅忸擊賊於陳汝有功賜爵介休男從討和龍遷虎賁帥轉千人軍將又從樂平王丕討和龍除涼州軍將擊吐谷渾獲其人一千餘落後吐谷渾小將率三百餘落來降尋復亡叛撥率騎追之盡獲而還以功進爵為子遷晉昌鎮將綏懷邊民甚著稱績入為知臣監出為杏城鎮將在任九年大收民和山民一千餘家上郡徒各盧水胡八百餘落盡附為民高宗以撥清平有惠績賜以衣服顯祖即位為北征都將復為都將南攻懸瓠破劉彧將朱湛之水軍三千人拜懸瓠鎮將加員外散騎常侍進爵安城侯顯祖嘉其聲效復賜衣服轉平南將軍北豫州刺史後洛州民田智度聚黨謀逆詔撥乘傳發豫州兵與洛州刺史丘頓擊之獲智度送京師撥卒贈冠軍將軍諡敬侯陸真代人也父洛侯秦州長史真少善騎射世祖初以真膂力過人拜內三郎數從征伐所在摧鋒陷陳前後以功屢受賞賜真君中從討蠕蠕以功賜爵關內侯後攻懸瓠登樓臨射城中弦不虛發劉義隆將王玄謨衆數萬人寇滑臺真從祖討之夜與數人乘小船突玄謨軍入城撫慰登城巡行賊營中乃還渡河至明玄謨敗走從駕至江真再破賊軍拜建武將軍石城子還攻盱眙真功居多遷給事中典太倉事高宗即位拜冠軍將軍進爵都昌侯遷散騎常侍選部尚書時丁零數千家寇竊并定真與并州刺史乞伏成龍自樂平東入與定州刺史許崇之併力討滅從駕巡東海以真為寧西將軍尋遷安西將軍長安鎮將假建平公胡賊帥賀略孫聚衆千餘人叛于石樓真擊破之殺五百餘人是時初置長蛇鎮真率衆築城未訖而氐豪仇檀等反叛氐民咸應其衆甚盛真擊平之殺四千餘人卒城長蛇而還東平王道符反于長安殺雍州刺史魚玄明關中草草以真為長安鎮將賜爵河南公長安兵民素伏威信真到撫慰之皆怡然安靜咸陽民趙昌受劉彧署龍驤將軍扇動鄠厔二縣聚黨數百人據赤谷以叛真與雍州刺史劉邈討平之昌單騎走免後鄠縣民王稚兄弟聚二千餘人招引趙昌始平石安池陽靈武四縣人皆應之衆至五千據治谷堡時詔南郡王李惠等領步騎六千討昌真以大軍未至慮昌滋蔓與雍州刺史劉邈討昌昌出營拒戰真擊破之斬昌及賊首三千餘級傳首京師并誅其黨與七百餘人獲男女一千餘口雍州民夷莫不震伏在鎮數年甚著威稱延興二年卒歸葬京師諡曰烈子延字契胡提頗有氣幹襲爵河南公累遷歷長安鎮將拜安南將軍濟州刺史例降改封汝陽侯京兆王愉為徐州刺史以延為愉府司馬帶彭城內史正始初除武川鎮將入除太僕卿都督沃野武川懷朔三鎮諸軍事安北將軍懷朔鎮大將加散騎常侍正光初拜金紫光祿大夫復除太僕卿受使綏慰秀容為牧子所害弟什夤太府卿平東將軍光祿大夫建義初拜都官尚書卒於平南將軍光祿大夫呂洛拔代人也曾祖渴侯昭成時率戶五千歸國祖肥濮陽太守父匹知世祖時為西部長滎陽公洛拔以壯勇知名高宗末為平原鎮都將劉彧徐州刺史薛安都歸誠請援詔遣尉元率衆救之洛拔隨元入彭城彧將張永遣將王茂之領兵五千向武原援其運車元遣洛拔率騎詣武原擊之格戰二日手殺九人奪賊運車二百餘乘牛二百五十頭仍共擊張永大敗之賜爵成武侯加建義將軍年五十六卒長子文祖顯祖以其勳臣子補龍牧曹奏事中散以牧產不滋坐徙於武川鎮後文祖以舊語譯注皇誥辭義通辯超授陽平太守未拜轉為外都曹奏事中散後坐事伏法史臣曰仁人之言必有博利參合之役威罰實行蓋王建之罪歟安同異類之人智識入用任等時俊當有由哉頡擒赫連昌摧義隆衆遂為名將未易輕也樓伏連丘堆娥清俱以壯勇征伐四克劉尼忠國翼主豈徒驍猛之用乎奚眷將略致位不能以功名自終車伊洛自遠宅心異凡戎矣宿石等並忠勤勇略有將帥之才自致青雲豈徒然也
