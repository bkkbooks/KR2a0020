body:
  text: 魏書卷二十文成五王列傳第八安樂王廣川王齊郡王河間王安豐王文成皇帝七男孝元皇后生獻文皇帝李夫人生安樂厲王長樂曹夫人生廣川莊王略沮渠夫人生齊郡順王簡乙夫人生河間孝王若悅夫人生安豐匡王猛玄夫人生韓哀王安平王早薨無傳安樂王長樂皇興四年封建昌王後改封安樂王長樂性凝重顯祖器愛之承明元年拜太尉出為定州刺史鞭撻豪右頓辱衣冠多不奉法為人所患百姓詣闕訟其過高祖罰杖三十貪暴彌甚以罪徵詣京師後與內行長乙肆虎謀為不軌事發賜死於家葬以王禮諡曰厲子詮字搜賢襲世宗初為涼州刺史在州貪穢政以賄成後除定州刺史及京兆王愉之反詐言國變在北州鎮咸疑朝廷有釁遣使觀詮動靜詮具以狀告州鎮帖然愉奔信都詮與李平高殖等四面攻燒愉突門而出尋除侍中兼以首告之功除尚書左僕射薨諡曰武康子鑒字長文襲後除相州刺史北討大都督討葛榮仍兼尚書右僕射北道行臺尚書令與都督裴衍共救信都鑒既庸才諸弟粗暴見天下多事遂謀反降附葛榮都督源子邕與裴衍合圍鑒斬首傳洛詔改其元氏莊帝初許復本族又特復鑒王爵贈司空鑒弟斌之字子爽性險無行及與鑒反敗遂奔葛榮榮滅得還出帝時封潁川郡王委以腹心之任帝入關斌之奔蕭衍後還長安廣川王略延興二年封位中都大官性明敏鞫獄稱平太和四年薨諡曰莊子諧字仲和襲十九年薨詔曰朕宗室多故從弟諧喪逝悲痛摧割不能已已古者大臣之喪有三臨之禮此蓋三公已上至於卿司已下故應闕自漢已降多無此禮朕欲遵古典哀感從情雖以尊降伏私痛寧爽欲令諸王有期親者為之三臨大功之親者為之再臨小功緦麻為之一臨廣川王於朕大功必欲再臨再臨者欲於大殮之日親臨盡哀成服之後緦衰而弔既殯之緦麻理在無疑大殮之臨當否如何為須撫柩於始喪為應盡哀於闔棺早晚之宜擇其厥中黃門侍郎崔光宋弁通直常侍劉芳典命下大夫李元凱中書侍郎高聰等議曰三臨之事乃自古禮爰及漢魏行之者稀陛下至聖慈仁方遵前軌志必哀喪慮同寧戚臣等以為若期親三臨大功宜再始喪之初哀之至極既以情降宜從始喪大殮之臨伏如聖旨詔曰魏晉已來親臨多闕至於戚臣必於東堂哭之頃大司馬安定王薨朕既臨之後復更受慰於東堂今日之事應更哭否光等議曰東堂之哭蓋以不臨之故今陛下躬親撫視羣臣從駕臣等參議以為不宜復哭詔曰若大司馬戚尊位重必哭於東堂而廣川既是諸王之子又年位尚幼卿等議之朕無異焉諧將大殮高祖素服深衣哭之入室哀慟撫尸而出有司奏廣川王妃薨於代京未審以新尊從於卑舊為宜卑舊來就新尊詔曰遷洛之人自茲厥後悉可歸骸邙嶺皆不得就塋代其有夫先葬在北婦今喪在南婦人從夫宜還代葬若欲移父就母亦得任之其有妻墳於代夫死於洛不得以尊就卑欲移母就父宜亦從之若異葬亦從之若不在葬限身在代喪葬之彼此皆得任之其戶屬燕身官京洛去留之宜亦從所擇其屬諸州者各得任意詔贈諧武衞將軍諡曰剛及葬高祖親臨送之子靈道襲卒諡悼王齊郡王簡字叔亮太和五年封位中都大官簡母沮渠牧犍女也簡性貌特類外祖後為內都大官高祖嘗與簡俱朝文明太后於皇信堂簡居帝之右行家人禮遷太保高祖仁孝以諸父零落存者唯簡每見立以待之俟坐致敬問起居停簡拜伏簡性好酒不能理公私之事妻常氏燕郡公常喜女也文明太后以賜簡性幹綜家事頗節斷簡酒乃至盜竊求乞婢侍卒不能禁二十三年薨時高祖不豫詔曰叔父薨背痛慕摧絕不自勝任但虛頓床枕未堪奉赴當力疾發哀諡曰靈王世宗時改諡曰順子祐字伯授襲母常氏高祖以納不以禮不許其為妃世宗以母從子貴詔特拜為齊國太妃祐位涇州刺史薨諡曰敬河間王若字叔儒年十六未封而薨追封河間諡曰孝詔京兆康王子太安為後太安於若為從弟非相後之義廢之以齊郡王子琛繼琛字曇寶幼而敏慧高祖愛之世宗時拜定州刺史琛妃世宗舅女高皇后妹琛憑恃內外多所受納貪惏之極及還朝靈太后詔曰琛在定州惟不將中山宮來自餘無所不致何可更復用由是遂廢于家琛以肅宗始學獻金字孝經又無方自達乃與劉騰為養息賂騰金寶巨萬計騰屢為之言乃得兼都官尚書出為秦州刺史在州聚斂百姓吁嗟屬東益南秦二州氐反詔琛為行臺仍充都督還攝州事琛性貪暴既總軍省求欲無厭百姓患害有甚狼虎進討氐羌大被摧破士卒死者千數率衆走還內恃劉騰無所畏憚為中尉糾彈會赦除名為民尋復王爵後討鮮于脩禮敗免官爵後討汾晉胡蜀卒於軍追復王爵安豐王猛字季烈太和五年封加侍中出為和龍鎮都大將營州刺史猛寬仁雄毅甚有威略戎夷畏愛之薨于州贈太尉諡曰匡子延明襲世宗時授太中大夫延昌初歲大飢延明乃減家財以拯賓客數十人并贍其家至肅宗初為豫州刺史甚有政績累遷給事黃門侍郎延明既博極羣書兼有文藻鳩集圖籍萬有餘卷性清儉不營產業與中山王熙及弟臨淮王彧等並以才學令望有名於世雖風流造次不及熙彧而稽古淳篤過之尋遷侍中詔與侍中崔光撰定服制後兼尚書右僕射以延明博識多聞敕監金石事及元法僧反詔為東道行臺徐州大都督節度諸軍事與都督臨淮王彧尚書李憲等討法僧蕭衍遣其豫章王綜鎮徐州延明先牧徐方甚得民譽招懷舊土遠近歸之綜既降延明因以軍乘之復東南之境至宿豫而還遷都督徐州刺史頻經師旅人物凋弊延明招攜新故人悉安業百姓咸附莊帝時兼尚書令大司馬及元顥入洛延明受顥委寄率衆守河橋顥敗遂將妻子奔蕭衍死於江南莊帝末喪還出帝初贈太保王如故諡曰文宣所著詩賦讚頌銘誄三百餘篇又撰五經宗略詩禮別義注帝王世紀及列仙傳又以河間人信都芳工算術引之在館其撰古今樂事九章十二圖又集器準九篇芳別為之注皆行於世
