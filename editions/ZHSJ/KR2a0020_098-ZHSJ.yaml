body:
  text: 魏書卷九十二列傳列女第八十崔覽妻封氏封卓妻劉氏魏溥妻房氏胡長命妻張氏平原女子孫氏房愛親妻崔氏涇州貞女兕先氏姚氏婦楊氏張洪初妻劉氏董景起妻張氏陽尼妻高氏史映周妻耿氏任城國太妃孟氏苟金龍妻劉氏盧元禮妻李氏河東孝女姚氏刁思遵妻魯氏夫婦人之事存於織組紃酒漿醯醢而已至如嫫訓軒宮娥成舜業塗山三母克昌二邦殆非匹婦之謂也若乃明識列操文辯兼該聲自閨庭號顯列國子政集之於前元凱編之於後隨時綴錄代不乏人今書魏世可知者為列女傳中書侍郎清河崔覽妻封氏勃海人散騎常侍愷女也有才識聰辯強記多所究知於時婦人莫能及李敷公孫文叔雖已貴重近世故事有所不達皆就而諮請焉勃海封卓妻彭城劉氏女也成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣不輟諸嫂喻之不止經旬凶問果至遂憤歎而死時人比之秦嘉妻中書令高允念其義高而名不著為之詩曰兩儀正位人倫肇甄爰制夫婦統業承先雖曰異族氣猶自然生則同室終契黃泉其一封生令達卓為時彥內協黃中外兼三變誰能作配克應其選實有華宗挺生淑媛其二京野勢殊山川乖互乃奉王命載馳在路公務既弘私義獲著因媒致幣遘止一暮其三率我初冠眷彼弱笄形由禮比情以趣諧忻願難常影跡易乖悠悠言邁戚戚長懷其四時值險屯橫離塵網伏鑕就刑身分土壤千里雖遐應如影響良嬪洞感發於夢想其五仰惟親命俯尋嘉好誰謂會淺義深情到畢志守窮誓不二醮何以驗之殞身是効其六人之處世孰不厚生必存於義所重則輕結忿鍾心甘就幽冥永捐堂宇長辭母兄其七茫茫中野翳翳孤丘葛虆冥蒙荊棘四周理苟不昧神必俱游異哉貞婦曠世靡疇其八鉅鹿魏溥妻常山房氏女也父堪慕容垂貴鄉太守房氏婉順高明幼有烈操年十六而溥遇病且卒顧謂之曰人生如白駒過隙死不足恨但夙心往志不聞於沒世矣良痛母老家貧供奉無寄赤子矇眇血祀孤危所以抱怨於黃墟耳房垂泣而對曰幸承先人餘訓出事君子義在自畢有志不從命也夫人在堂稚子襁褓顧當以身少相感長往之恨俄而溥卒及大斂房氏操刀割左耳投之棺中仍曰鬼神有知相期泉壤流血滂然助喪者咸皆哀懼姑劉氏輟哭而謂曰新婦何至於此房對曰新婦少年不幸實慮父母未量至情覬持此自誓耳聞知者莫不感愴於時子緝生未十旬鞠育於後房之內未曾出門遂終身不聽絲竹不預座席緝年十二房父母仍存於是歸寧父兄尚有異議緝竊聞之以啟母房命駕紿云他行因而遂歸其家弗知之也行數十里方覺兄弟來追房哀歎而不反其執意如此訓導一子有母儀法度緝所交游有名勝者則身具酒飯有不及己者輒屏臥不餐須其悔謝乃食善誘嚴訓類皆如是年六十五而終緝事在序傳緝子悅為濟陰太守吏民立碑頌德金紫光祿大夫高閭為其文序云祖母房年在弱笄艱貞守志秉恭妻之操著自毀之誠又頌曰爰及處士遘疾夙凋伉儷秉志識茂行高殘形顯操誓敦久要誕茲令胤幽感乃昭溥未仕而卒故云處士焉樂部郎胡長命妻張氏事姑王氏甚謹太安中京師禁酒張以姑老且患私為醞之為有司所糾王氏詣曹自告曰老病須酒在家私釀王所為也張氏曰姑老抱患張主家事姑不知釀其罪在張主司疑其罪不知所處平原王陸麗以狀奏高宗義而赦之平原鄃縣女子孫氏男玉者夫為靈縣民所殺追執讎人男玉欲自殺之其弟止而不聽男玉曰女人出適以夫為天當親自復雪云何假人之手遂以杖毆殺之有司處死以聞顯祖詔曰男玉重節輕身以義犯法緣情定罪理在可原其特恕之清河房愛親妻崔氏者同郡崔元孫之女性嚴明高尚歷覽書傳多所聞知子景伯景先崔氏親授經義學行修明並為當世名士景伯為清河太守每有疑獄常先請焉貝丘民列子不孝吏欲案之景伯為之悲傷入白其母母曰吾聞聞不如見山民未見禮教何足責哉但呼其母來吾與之同居其子置汝左右令其見汝事吾或應自改景伯遂召其母崔氏處之於榻與之共食景伯之溫凊其子侍立堂下未及旬日悔過求還崔氏曰此雖顏慚未知心愧且可置之凡經二十餘日其子叩頭流血其母涕泣乞還然後聽之終以孝聞其識度厲物如此竟以壽終涇州貞女兕先氏許嫁彭老生為妻娉幣既畢未及成禮兕先率行貞淑居貧常自舂汲以養父母老生輒往逼之女曰與君禮命雖畢二門多故未及相見何由不禀父母擅見陵辱若苟行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死謂老生曰生身何罪與君相遇我所以執節自固者寧更有所邀正欲奉給君耳今反為君所殺若魂靈有知自當相報言終而絕老生持女珠瓔至其叔宅以告叔叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑原其強暴便可戮之而女守禮履節沒身不改雖處草萊行合古跡宜賜美名以顯風操其標墓旌善號曰貞女姚氏婦楊氏者閹人苻承祖姨也家貧無產業及承祖為文明太后所寵貴親姻皆求利潤唯楊獨不欲常謂其姊曰姊雖有一時之榮不若妹有無憂之樂姊每遺其衣服多不受強與之則云我夫家世貧好衣美服則使人不安與之奴婢則云我家無食不能供給終不肯受著破衣自執勞事時受其衣服多不著密埋之設有著者污之而後服承祖每見其寒悴深恨其母謂不供給之乃啟其母曰今承祖一身何所乏少而使姨如是母具以語之承祖乃遣人乘車往迎之則厲志不起遣人強舁於車上則大哭言爾欲殺我也由是苻家內外皆號為癡姨及承祖敗有司執其二姨至殿庭一姨致法以姚氏婦衣裳弊陋特免其罪其識機雖呂嬃亦不過也滎陽京縣人張洪初妻劉氏年十七夫亡遺腹生子三歲又沒其舅姑年老朝夕奉養率禮無違兄矜其少寡欲奪而嫁之劉氏自誓弗許以終其身陳留董景起妻張氏景起早亡張時年十六痛夫少喪哀傷過禮形容毀頓永不沐浴蔬食長齋又無兒息獨守貞操期以闔棺鄉曲高之終見標異漁陽太守陽尼妻高氏勃海人學識有文才高祖敕令入侍後宮幽后表啟悉其辭也滎陽史映周妻同郡耿氏女年十七適於映周太和二十三年映周卒耿氏恐父母奪其志因葬映周哀哭而殯見者莫不悲歎屬大使觀風以狀具上詔標牓門閭任城國太妃孟氏鉅鹿人尚書令任城王澄之母澄為揚州之日率衆出討於後賊帥姜慶真陰結逆黨襲陷羅城長史韋纘倉卒失圖計無所出孟乃勒兵登陴先守要便激厲文武安慰新舊勸以賞罰喻之逆順於是咸有奮志親自巡守不避矢石賊不能克卒以全城澄以狀表聞屬世宗崩事寢靈太后後令曰鴻功盛美實宜垂之永年乃敕有司樹碑旌美苟金龍妻劉氏平原人也廷尉少卿劉叔宗之姊世宗時金龍為梓潼太守郡帶關城戍主蕭衍遣衆攻圍值金龍疾病不堪部分衆甚危懼劉遂率厲城民修理戰具一夜悉成拒戰百有餘日兵士死傷過半戍副高景陰圖叛逆劉斬之及其黨與數十人自餘將士分衣減食勞逸必同莫不畏而懷之井在外城尋為賊陷城中絕水渴死者多劉乃集諸長幼喻以忠節遂相率告訴於天俱時號叫俄而澍雨劉命出公私布絹及至衣服懸之城中絞而取水所有雜器悉儲之於是人心益固會益州刺史傅豎眼將至賊乃退散豎眼歎異具狀奏聞世宗嘉之正光中賞平昌縣開國子邑二百戶授子慶珍又得二子出身慶珍卒子純陀襲齊受禪爵例降慶珍弟孚武定末儀同開府司馬貞孝女宗者趙郡栢仁人趙郡太守李叔胤之女范陽盧元禮之妻性至孝聞於州里父卒號慟幾絕者數四賴母崔氏慰勉之得全三年之中形骸銷瘠非人扶不起及歸夫氏與母分隔便飲食日損涕泣不絕日就羸篤盧氏合家慰喻不解乃遣歸寧還家乃復故如此者八九焉後元禮卒李追亡撫存禮無違者事姑以孝謹著母崔以神龜元年終於洛陽凶問初到舉聲慟絕一宿乃蘇水漿不入口者六日其姑慮其不濟親送奔喪而氣力危殆自范陽向洛八旬方達攀櫬號踴遂卒有司以狀聞詔曰孔子稱毀不滅性蓋為其廢養絕類也李既非嫡子而孝不勝哀雖乖俯就而志厲義遠若不加旌異則無以勸引澆浮可追號曰貞孝女宗易其里為孝德里標李盧二門以惇風俗河東姚氏女字女勝少喪父無兄弟母憐而守養年六七歲便有孝性人言其父者聞輒垂泣隣伍異之正光中母死女勝年十五哭泣不絕聲水漿不入口者數日不勝哀遂死太守崔游申請為營墓立碑自為製文表其門閭比之曹娥改其里曰上虞里墓在郡城東六里大道北至今名為孝女冢滎陽刁思遵妻魯氏女也始笄為思遵所娉未踰月而思遵亡其家矜其少寡許嫁已定魯聞之以死自誓父母不達其志遂經郡訴稱刁氏吝護寡女不使歸寧魯乃與老姑徒步詣司徒府自告情狀普泰初有司聞奏廢帝詔曰貞夫節婦古今同尚可令本司依式標牓史臣曰闕
