body:
  text: 魏書卷四十九列傳第三十七李靈崔鑒李靈字虎符趙郡人高平公順從父兄也父勰字小同恬靜好學有聲趙魏太祖平中原聞勰已亡哀惜之贈宣威將軍蘭陵太守神中世祖徵天下才儁靈至拜中書博士轉侍郎從駕臨江除淮陽太守靈以學優溫謹選授高宗經後加建威將軍中散內博士賜爵高邑子高宗踐受除平南將軍洛州刺史而卒時年六十三帝追悼之贈散騎常侍平東將軍定州刺史鉅鹿公諡曰簡子恢襲子爵高宗以恢師傅之子拜員外散騎常侍安西將軍長安鎮副將進爵為侯假鉅鹿公皇興元年鎮軍大將軍東平王道符謀反殺恢及雍州刺史魚玄明雍州別駕李允等恢時年四十八顯祖愍之追贈恢散騎常侍鎮西將軍定州刺史鉅鹿公諡曰貞恢長子悅祖襲爵高邑侯例降為伯卒子瑾字伯瓊太和中拜奉朝請後襲爵轉司徒廣陽王嘉集曹參軍太尉高陽王雍長流參軍太尉清河王懌記室參軍後除中堅將軍步兵校尉葛榮反於河北所在殘害詔瑾持節兼吏部郎中東北道弔慰大使至冀州值葛榮圍逼敕授瑾防城都督時瑾以二子自隨次子戰死瑾恐動人情忍哀輟哭城陷沒賊既而走免永安初拜左將軍太中大夫殷州大中正累遷衞將軍右光祿大夫太尉諮議參軍天平初除車騎將軍大司農卿中正如故瑾淳謹好學老而不倦元象元年秋卒年六十五贈使持節都督定瀛殷三州諸軍事驃騎大將軍司徒公定州刺史子景威襲武定末西汝陰太守齊受禪爵例降悅祖弟顯甫本州別駕遷步兵校尉從駕南討以功賜爵平棘子行并州事尋除河北太守卒贈顯武將軍安州刺史諡曰威子元忠武定中驃騎大將軍儀同三司晉陽縣開國伯子搔武定末河內太守顯甫次弟華字寧夏初為羽林中郎武騎侍郎步兵校尉轉直閤將軍武衞將軍華膂力過人頗有將略每從征伐頻著軍功賜爵欒城子定州驃騎長史輔國將軍中山太守卒贈前將軍幽州刺史有八子長子構襲爵至通直散騎常侍卒贈殷州刺史次敬義司徒長流參軍兼光祿少卿平北將軍光祿大夫卒贈本將軍殷州刺史次叔向為徐州鎧曹參軍帶郭浦戍主值刺史元法僧叛逼入蕭衍次幼緒早亡次季脩博陵常山二郡太守次世幹次稚明兄弟並不修名行險暴無禮為時所賤華弟憑字青龍祕書主文中散累遷冀州征東長史太子中舍人阿附趙脩超遷司空長史給事黃門侍郎武衞將軍定州大中正坐脩黨免官後除趙郡太守卒子道嘉字同吉豫州外兵參軍汝陽太守同吉弟文衡開府行參軍恢弟綜行河間郡早卒綜子遵字良軌有業尚初拜奉朝請尚書度支郎遷洛為營構將高祖南伐為行臺郎車駕還拜太子步兵校尉世宗初轉步兵校尉兼散騎侍郎副盧昶東北道使拜司空諮議加中壘將軍京兆王愉以征東將軍為冀州刺史遵為愉府司馬愉反召集州府以告之遵不從為愉所害時年四十四事平詔賜帛二百匹贈征虜將軍幽州刺史諡曰簡拜子渾給事中渾字季初武定末大司農卿渾弟繪字敬文齊王丞相府司馬繪弟系字乾經少聰惠有才學與舅子河間邢昕少相倫輩晚不逮之初為征東法曹參軍後除奉車都尉加寧遠將軍尋拜大司馬廣陵王錄事參軍府解還鄉里徵拜冠軍將軍中散大夫齊獻武王從子永樂為濟州刺史聞而請與相見待以賓交之禮及永樂薨系送葬還都蕭衍遣使朝貢侍中李神儁舉系為尚書南主客郎系前後接對凡十八人頗為稱職齊文襄王攝選以系為司徒諮議參軍因謂之曰自郎署至此所謂不次以卿人才故有此舉耳尋加征虜將軍武定五年兼散騎常侍使蕭衍與其二兄前後將命時人稱之太尉高岳出討以系為大都督司馬師還拜太子家令七年八月卒時年四十六時人傷惜之齊初贈平東將軍北徐州刺史諡曰文靈弟均趙郡太守均子璨字世顯身長八尺五寸衣貌魁偉受學於梁祚興安中為祕書中散本州別駕轉趙郡常山二郡太守遷中書郎雅為高允所知天安初劉彧徐州刺史薛安都舉彭城降詔鎮南大將軍博陵公尉元鎮東將軍城陽公孔伯恭等率衆迎之顯祖復以璨參二府軍事軍達九里山安都率文武出迎元不加禮接安都還城使遂不至時劉彧將張永沈攸之等率衆先屯下元令璨與中書郎高閭入彭城說安都安都即與俱載赴軍元等入城收管籥其夜永攻南門不克退還時永輜重在武原璨勸元乘永之失據攻永米船大破之斬首數千級時大雪寒永軍凍死者萬計於是遂定淮北加璨寧朔將軍與張讜對為兗州刺史綏安初附以參定徐州之功賜爵始豐侯加建武將軍延興元年年四十卒諡曰懿子元茂太和八年襲爵加建武將軍以寬雅著稱闕又例降拜司徒司馬尋除振威將軍南征別將彭城鎮副將民吏安之賞帛百匹穀二百斛太和二十年年四十四卒贈顯武將軍徐州刺史諡曰順子秀之字鳳起初除京兆王參軍轉員外散騎侍郎襲爵拜尚書都官郎秀之弟子雲字鳳昇司空參軍轉外兵參軍本州治中子雲弟子羽字鳳降征南法曹參軍子羽弟子岳字鳳跱員外郎大司馬祭酒秀之等早孤事母孝謹兄弟並容貌魁偉風度審正而皆早卒鳳昇子道宗武定末直閤將軍道宗弟道林司徒中兵參軍元茂弟宣茂太和初拜中書博士稍遷司空諮議轉司馬監營構事出除寧朔將軍試守正平郡不拜兼定州大中正坐受鄉人財貨為御史所劾除名為民從駕征新野又從討樊鄧持節兼散騎常侍東南二道使景明中除平陽太守以罪左遷步兵校尉正始初除太中大夫遷光祿大夫宣茂議明堂之制以五室為長與游肇往復肇善之遷平東將軍幽州刺史延昌二年卒年五十九遺言薄葬贈本將軍齊州刺史諡曰惠子藉之字脩遠性謹正粗涉書史歷員外郎給事中司徒諮議參軍前將軍太中大夫著忠誥一篇文多不載永熙初卒年五十四贈中軍將軍定州刺史子徹字伯倫武定末司空主簿藉之弟志字敬遠有氣尚州主簿子長瑜郡功曹敬遠弟幼遠性粗暴每為劫盜刺史錄殺之宣茂弟叔胤舉秀才著作佐郎歷廣陵王諮議南趙郡太守在位九載有政績景明三年卒年三十六諡曰惠子弼字延軌位至相州錄事參軍弼弟翼字景業初為盪寇將軍齋帥又除員外郎遷尚書郎仍齋帥建義初遇害河陰贈平北將軍定州刺史叔胤弟仲胤自中書學生歷公府主簿從事中郎諫議大夫尚書左丞卒賜帛一百匹布五十匹綿五十斤贈鎮遠將軍光州刺史諡曰恭少子子仁尚書主客郎崔鑒字神具博陵安平人父綽少孤學行修明有名於世與盧玄高允李靈等俱被徵語在允傳尋以母老固辭後為郡功曹而卒鑒頗有文學自中書博士轉侍郎延興中受詔使齊州觀省風俗行兗州事以功賜爵桐廬縣子出為奮威將軍東徐州刺史鑒欲安悅新附民有年老者表求假以守令詔從之又於州內冶銅以為農具兵民獲利卒贈冠軍將軍青州刺史安平侯諡曰康子合字貴和少有時譽襲爵桐廬子為中書學生主文中散太尉諮議參軍本州大中正出為常山太守卒於郡時年二十七長子脩義有風望襲爵自司徒默曹參軍再遷寧遠將軍新野太守還除太尉掾出為冀州征東府長史卒年四十五長子放寬襲爵齊受禪例降合弟秉少有志氣太和中為中書學生拜奉朝請轉徐州安東府錄事參軍陽平王頤之為定州秉復為衞軍府錄事參軍帶毋極令時甄琛為長史因公事言競之間秉以拳擊琛墜於牀下琛以本縣長笑而不論其豪率若此彭城王勰征壽春秉從行招致壯俠以為部卒勰目之謂左右曰吾當寄膽氣於此人後為司空主簿轉掾城門校尉長兼司空司馬遷長史加輔國將軍出除左將軍廣平內史大納財貨為清論所鄙入為司徒左長史未幾除平東將軍光祿大夫尋加安西將軍出除燕州刺史時天下多事遂為杜洛周攻圍秉堅守歷年朝庭遣都督元譚與秉第二子仲哲赴救譚敗仲哲死之秉遂率城民奔定州坐免官尋除撫軍將軍行相州事轉征東將軍金紫光祿大夫孝昌末冀州流民聚於河外因立東冀州除秉為刺史加征東將軍不之任永安二年遷衞將軍右光祿大夫秉年老被疾上表辭事詔不許元顥入洛秉避居陽武二年除散騎常侍車騎將軍左光祿大夫太昌中除驃騎大將軍儀同三司常侍左光祿如故頻以老病乞解永熙三年去職天平四年薨年七十八贈使持節侍中都督定瀛滄三州諸軍事本將軍尚書令司徒公定州刺史諡曰靖穆長子忻字伯悅有世幹為荊州平南府外兵參軍北道行臺常景引為行臺郎又啟除員外郎復為安遠將軍尚書左中兵郎中以鄭儼之甥兼尚書左丞莊帝初遇害於河陰年四十二贈鎮軍將軍殿中尚書冀州刺史忻弟仲哲生為祖母宋氏所養早有知識六歲宋亡啼慕不止見者悲之性恢達常以將略自許辟司徒行參軍假寧朔將軍統軍從廣陽王淵北討擊柔玄賊破之賜爵安平縣男及父秉於燕州被圍泣訴朝庭遂除別將與都督元譚赴援到下口遇賊仲哲戰歿時年三十五長子長瑜武定中儀同開府中兵參軍長瑜弟叔瓚司徒田曹參軍仲哲弟叔彥撫軍將軍叔彥弟季通武定中兼司農少卿季通小弟季良風望閑雅自太學博士從都督李神軌征討有功賜爵蒲陰縣男尋除著作佐郎通直散騎侍郎轉征虜將軍員外散騎常侍太尉長史及秉還鄉季良亦去職歸養後除中軍將軍光祿大夫先秉卒於家時年三十六贈車騎將軍尚書右僕射定州刺史諡曰簡秉弟習字貴禮有世譽歷司徒主簿彭城王勰開府屬遷幽州長史博陵太守吏民愛敬之在郡九年轉河東太守卒於郡年五十一贈中山太守孝昌三年重贈後將軍并州刺史長子世儒字希業卒於大司馬從事中郎世儒第三弟叔業武定中南兗州別駕秉從父弟廣字仲慶有議幹初為中書學生高祖時殿中郎中歷通直散騎侍郎太子步兵校尉詔守尚書左丞父憂去職後任城王澄為揚州引廣為鎮南府長史以母老辭景明末卒於家贈安遠將軍光州刺史子元獻字世儁頗有學識舉秀才不行後卒於鄉里廣弟文業為中書博士轉司徒主簿城陽王鸞為定州刺史引為治中年四十九卒子伯謙武定末司空諮議參軍史臣曰李以儒俊之風當旌帛之舉崔以文雅之烈應利用之科世家有業餘慶不已人位繼軌亦為盛哉
