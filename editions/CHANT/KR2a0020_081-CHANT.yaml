body:
  text: 卷七十六列傳第六十四盧同張烈盧同字叔倫范陽涿人盧玄之族孫父輔字顯元本州別駕同身長八尺容貌魁偉善於處世太和中起家北海王詳國常侍稍遷司空祭酒昌黎太守尋為營州長史仍帶郡入除河南尹丞遷太尉屬會豫州城民白早生反都督中山王英尚書邢巒等討之詔同為軍司事平除冀州鎮東府長史遭父憂解任後除司空諮議參軍兼司馬為營構東宮都將延昌中秦州民反詔同兼通直常侍持節慰諭之多所降下還轉尚書右丞進號輔國將軍以父諱不拜改授龍驤熙平初轉左丞加征虜將軍時相州刺史奚康生徵民歲調皆七八十尺以邀奉公之譽部內患之同於歲祿官給長絹同乃舉按康生度外徵調書奏詔科康生之罪兼褒同在公之績肅宗世朝政稍衰人多竊冒軍功同閱吏部勳書因加檢覆覈得竊階者三百餘人同乃表言竊見吏部勳簿多皆改換乃校中兵奏按並復乖舛臣聊爾揀練已得三百餘人明知隱而未露者動有千數愚謂罪雖恩免猶須刊定請遣一都令史與令僕省事各一人總集吏部中兵二局勳簿對勾奏按若名級相應者即於黃素楷書大字具件階級數令本曹尚書以朱印印之明造兩通一關吏部一留兵局與奏按對掌進則防揩洗之偽退則無改易之理從前以來勳書上省唯列姓名不載本屬致令竊濫之徒輕為苟且今請征職白民具列本州郡縣三長之所其實官正職者亦列名貫別錄歷階仰本軍印記其上然後印縫各上所司統將都督並皆印記然後列上行臺行臺關太尉太尉檢練精實乃始關刺省重究括然後奏申奏出之日黃素朱印關付吏部頃來非但偷階冒名改換勳簿而已或一階再取或易名受級凡如此者其人不少良由吏部無簿防塞失方何者吏部加階之後簿不注記緣此之故易生僥倖自今敘階之後名簿具注加補日月尚書印記然後付曹郎中別作抄目印記一如尚書郎中自掌遞代相付此制一行差止姦罔詔從之同又奏曰臣頃奏以黃素為勳簿具注官名戶屬及吏部換勳之法事目三條已蒙旨許臣伏思黃素勳簿政可粗止姦偽然在軍虛詐猶未可盡請自今在軍閱簿之日行臺軍司監軍都督各明立文按處處記之斬首成一階已上即令給券一紙之上當中大書起行臺統軍位號勳人甲乙斬三賊及被傷成階已上亦具書於券各盡一行當行豎裂其券前後皆起年號日月破某處陳某官某勳印記為驗一支付勳人一支付行臺記至京即送門下別函守錄又自遷都以來戎車屢捷所以征勳轉多敘不可盡者良由歲久生姦積年長偽巧吏階緣偷增遂甚請自今為始諸有勳簿已經奏賞者即廣下遠近云某處勳判咸令知聞立格酬敘以三年為斷其職人及出身限內悉令銓除實官及外號隨才加授庶使酬勤者速申立功者勸事不經久僥倖易息或遭窮難州無中正者不在此限又勳簿之法征還之日即應申送頃來行臺督將至京始造或一年二歲方上勳書姦偽之原實自由此於今以後軍還之日便通勳簿不聽隔月詔復依行元叉之廢靈太后也相州刺史中山王熙起兵於鄴熙敗以同為持節兼黃門侍郎慰勞使乃就州刑熙還授平東將軍正黃門營明堂副將尋加撫軍將軍光祿大夫本州大中正同善事在位為叉所親戮熙之日深窮黨與以希叉旨論者非之又給同羽林二十人以自防衛同兄琇少多大言常云公侯可致至此始為都水使者同啟求回身二階以加琇琇遂除安州刺史論者稱之營州城民就德興謀反除同度支尚書黃門如故持節使營州慰勞聽以便宜從事同頻遣使人皆為賊害乃遣賊家口三十人并免家奴為良齎書諭德興德興乃降安輯其民而還德興復反詔同以本將軍為幽州刺史兼尚書行臺慰勞之同慮德興難信勒眾而往為德興所擊大敗而還靈太后反政以同叉黨除名孝昌三年除左將軍太中大夫兼左丞為齊兗二州行臺節度大都督李叔仁莊帝踐祚詔復本秩除都官尚書復兼七兵以同前慰勞德興之功封章武縣開國伯邑四百戶正除七兵尋轉殿中加征南將軍普泰初除侍中進號驃騎將軍左光祿大夫同時久病彊牽從務啟乞儀同初同之為黃門也與前廢帝俱在門下同異其為人素相款託廢帝以恩舊許之除儀同三司餘官如故永熙初薨年五十六贈侍中都督冀滄瀛三州諸軍事驃騎大將軍司空公冀州刺史開國伯如故賜帛四百匹諡曰孝穆三年復加贈尚書右僕射有四子長子斐武定中文襄王大將軍府掾斐弟筠青州治中同兄靜太常丞靜子景裕在儒林傳張烈字徽仙清河東武城人也高祖賜名曰烈仍以本名為字焉高祖悕為慕容俊尚書右僕射曾祖恂散騎常侍隨慕容德南渡因居齊郡之臨淄烈少孤貧涉獵經史有氣概時青州有崔徽伯房徽叔與烈並有令譽時人號曰三徽高祖時入官代都歷侍御主文中散遷洛除尚書儀曹郎彭城王功曹史太子步兵校尉蕭寶卷將陳顯達治兵漢南謀將入寇時順陽太守王青石世官江南荊州刺史廣陽王嘉慮其有異表請代之高祖詔侍臣各舉所知互有申薦者高祖曰此郡今當必爭之地須得堪濟之才何容汎舉也太子步兵張烈每論軍國之事時有會人意處朕欲用之何如彭城王勰稱贊之遂敕除陵江將軍順陽太守烈到郡二日便為寶卷將崔慧景攻圍七十餘日烈撫厲將士甚得軍人之和會車駕南討慧景遁走高祖親勞烈曰卿定可遂能不負所寄烈拜謝曰若不值鑾輿親駕臣將不免困於犬羊自是陛下不負臣非臣能不負陛下高祖善其對世宗即位追錄先勳封清河縣開國子邑二百戶尋以母老歸養積十餘年頻值凶儉烈為粥以食飢人蒙濟者甚眾鄉黨以此稱之肅宗初除龍驤將軍司徒右長史又轉征虜將軍司空長史先是元叉父江陽王繼曾為青州刺史及叉當權烈託故義之懷遂相諂附除前將軍給事黃門侍郎尋加平南將軍光祿大夫後靈太后反政以烈叉黨出為鎮東將軍青州刺史于時議者以烈家產畜殖僮客甚多慮其怨望不宜出為本州改授安北將軍瀛州刺史為政清靜吏民安之更滿還朝因辭老還鄉里兄弟同居怡怡然為親類所慕元象元年卒於家時年七十七烈先為家誡千餘言并自敘志行及所歷之官臨終敕子姪不聽求贈但勒家誡立碣而已其子質奉行焉質博學多才藝解褐奉朝請員外郎龍驤將軍諫議大夫未襲爵興和中卒於家質弟登州主簿烈弟僧皓字山客歷涉群書工於談說有名於當世熙平初徵為諫議大夫正光五年以國子博士徵之孝昌二年徵為散騎侍郎並不赴世號為徵君焉好營產業孜孜不已藏鏹巨萬他資亦稱是兄弟自供儉約車馬瘦敝身服布裳而婢妾紈綺僧皓尤好蒲弈戲不擇人是以獲譏於世前廢帝時崔祖螭舉兵攻東陽城僧皓與同事敗死於獄籍沒家產出帝初訴復業子軌州主簿史臣曰盧同質器洪厚卷舒兼濟張烈早摽名輩氣尚見知趨捨深沉俱至顯達雅道正路其殆病諸
