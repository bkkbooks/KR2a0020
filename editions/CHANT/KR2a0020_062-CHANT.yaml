body:
  text: 卷五十七列傳第四十五高祐崔挺高祐字子集小名次奴勃海人也本名禧以與咸陽王同名高祖賜名祐司空允從祖弟也祖展慕容寶黃門郎太祖平中山內徙京師卒於三都大官父讜從世祖滅赫連昌以功拜游擊將軍賜爵南皮子與崔浩共參著作遷中書侍郎轉給事中冀青二州中正假散騎常侍平東將軍蓨縣侯使高麗卒贈安南將軍冀州刺史假滄水公諡曰康祐兄祚襲爵東青州刺史祐博涉書史好文字雜說材性通放不拘小節初拜中書學生轉博士侍郎以祐招下邵郡群賊之功賜爵建康子高宗末兗州東郡吏獲一異獸獻之京師時人咸無識者詔以問祐祐曰此是三吳所出厥名鯪鯉餘域率無今我獲之吳楚之地其有歸國者乎又有人於零丘得玉印一以獻詔以示祐祐曰印上有籀書二字文曰宋壽壽者命也我獲其命亦是歸我之徵顯祖初劉義隆子義陽王昶來奔薛安都等以五州降附時謂祐言有驗高祖拜祕書令後與丞李彪等奏曰臣等聞典謨興話言所以光著載籍作成事所以昭揚然則尚書者記言之體春秋者錄事之辭尋覽前志斯皆言動之實錄也夏殷以前其文弗具自周以降典章備舉史官之體文質不同立書之旨隨時有異至若左氏屬詞比事兩致並書可謂存史意而非全史體逮司馬遷班固皆博識大才論敘今古曲有條章雖周達未兼斯寔前史之可言者也至於後漢魏晉咸以放焉惟聖朝創制上古開基長發自始均以後至於成帝其間世數久遠是以史弗能傳臣等疏陋忝當史職披覽國記竊有志焉愚謂自王業始基庶事草創皇始以降光宅中土宜依遷固大體令事類相從紀傳區別表志殊貫如此修綴事可備盡伏惟陛下先天開物洪宣帝命太皇太后淳曜二儀惠和王度聲教之所漸洽風譯之所覃加固已義振前王矣加太和以降年未一紀然嘉符禎瑞備臻於往時洪功茂德事萃於曩世會稽佇玉牒之章岱宗想石記之列而祕府策勳述美未盡將令皇風大猷或闕而不載功臣懿績或遺而弗傳著作郎已下請取有才用者參造國書如得其人三年有成矣然後大明之德功光于帝篇聖后之勳業顯于皇策佐命忠貞之倫納言司直之士咸以備著載籍矣高祖從之高祖從容問祐曰比水旱不調五穀不熟何以止災而致豐稔祐對曰昔堯湯之運不能去陽九之會陛下道同前聖其如小旱何但當旌賢佐政敬授民時則災消穰至矣又問止盜之方祐曰昔宋均樹德害獸不過其鄉卓茂善教蝗蟲不入其境彼盜賊者人也苟訓之有方寧不易息當須宰守貞良則盜止矣祐又上疏云今之選舉不採職治之優劣專簡年勞之多少斯非盡才之謂宜停此薄藝棄彼朽勞唯才是舉則官方斯穆又勳舊之臣雖年勤可錄而才非撫人者則可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也高祖皆善之加給事中冀州大中正餘如故時李彪專統著作祐為令時相關豫而已出為持節輔國將軍西兗州刺史假東光侯鎮滑臺祐以郡國雖有太學縣黨宜有黌序乃縣立講學黨立小學又令一家之中自立一碓五家之外共造一井以供行客不聽婦人寄舂取水又設禁賊之方令五五相保若盜發則連其坐初雖似煩碎後風化大行寇盜止息轉宋王劉昶傅以昔參定律令之勤賜帛五百疋粟五百石馬一匹昶以其官舊年耆雅相祗重妓妾之屬多以遺之拜光祿大夫傅如故昶薨後徵為宗正卿而祐留連彭城久而不赴於是尚書僕射李沖奏祐散逸淮徐無事稽命處刑三歲以贖論詔免卿任還復光祿太和二十三年卒太常議諡曰煬侯詔曰不遵上命曰靈可諡為靈子和璧字僧壽有學問中書博士早卒和璧子顥字門賢學涉有時譽自司空參軍轉員外郎襲爵建康子遷符璽郎中出為冀州別駕未之任屬刺史元愉據州反世宗遣尚書李平為都督率眾討之平以顥彼州領袖乃引為錄事參軍仍領統軍軍機取捨多與參決擒愉之後別黨千餘人皆將伏法顥以為擁逼之徒前許原免宜為表陳請平從之於是咸蒙全濟事定顥仍述職時軍旅之後因之饑饉顥為綱紀務存寬靜甚收時譽尋加陵江將軍坐事免久之除鎮遠將軍遷輔國將軍中散大夫轉征虜將軍仍中散卒時年四十九贈平東將軍滄州刺史諡曰惠子德正襲武定中黃門侍郎顥弟雅字興賢有風度自給事中稍遷司徒府錄事參軍定州撫軍府長史卒年三十四天平中追贈散騎常侍平北將軍冀州刺史子德乾早有令問任城太守卒雅弟諒字修賢少好學多識強記居喪以孝聞太和末京兆王愉開府辟召高祖妙簡行佐諒與隴西李仲尚趙郡李鳳起等同時應選稍遷太尉主簿國子博士正光中加驍騎將軍為徐州行臺至彭城屬元法僧反叛逼諒同之諒不許為法僧所害時年四十一朝廷痛惜之贈左將軍滄州刺史又下詔以諒臨危授命誠節可重復贈使持節平北將軍幽州刺史贈帛二百匹優一子出身諡曰忠侯三子長惠勝武定中司徒外兵參軍諒造親表譜錄四十許卷自五世已下內外曲盡覽者服其博記祐弟欽幼隨從叔濟使於劉義隆還為中書學生遷祕書中散年四十餘卒子法永諸王從事中郎亦早亡祐從父弟次同永安末撫軍將軍定州刺史子乾邕永熙中司空公長樂郡開國公乾邕弟敖曹天平中司徒公京兆郡開國公崔挺字雙根博陵安平人也六世祖贊魏尚書僕射五世祖洪晉吏部尚書父鬱濮陽太守挺幼居喪盡禮少敦學業多所覽究推人愛士州閭親附焉每四時與鄉人父老書相存慰辭旨款備得者榮之三世同居門有禮讓於後頻值饑年家始分析挺與弟振推讓田宅舊資惟守墓田而已家徒壁立兄弟怡然手不釋卷時穀糴踊貴鄉人或有贍者遺挺辭讓而受仍亦散之貧困不為畜積故鄉邑更欽歎焉舉秀才射策高第拜中書博士轉中書侍郎以工書受敕於長安書文明太后父燕宣王碑賜爵泰昌子轉登聞令遷典屬國下大夫以參議律令賜布帛八百匹穀八百石馬牛各二尚書李沖甚重之高祖以挺女為嬪太和十八年大將軍宋王劉昶南鎮彭城詔假立義將軍為昶府長史以疾辭免乃以王肅為長史其被寄遇如此後除昭武將軍光州刺史威恩並著風化大行十九年車駕幸兗州召挺赴行在所及見引諭優厚又問挺治邊之略因及文章高祖甚悅謂挺曰別卿已來倏焉二載吾所綴文已成一集今當給卿副本時可觀之又顧謂侍臣曰擁旄者悉皆如此吾何憂哉復還州及散騎常侍張彝兼侍中巡行風俗見挺政化之美謂挺曰彝受使省方採察謠訟入境觀政實愧清使之名州治舊掖城西北數里有斧山峰嶺高峻北臨滄海南望岱嶽一邦遊觀之地也挺於頂上欲營觀宇故老曰此嶺秋夏之際常有暴雨迅風巖石盡落相傳云是龍道恐此觀不可久立挺曰人神相去何遠之有虯龍倏忽豈唯一路乎遂營之數年間果無風雨之異挺既代即為風雹所毀於後作復尋壞遂莫能立眾以為善化所感時以犯罪配邊者多有逃越遂立重制一人犯罪逋亡合門充役挺上書以為周書父子罪不相及天下善人少惡人多以一人犯罪延及合門司馬牛受桓魋之罰柳下惠嬰盜跖之誅豈不哀哉辭甚雅切高祖納之先是州內少鐵器用皆求之他境挺表復鐵官公私有賴諸州中正本在論人高祖將辨天下氏族仍亦訪定乃遙授挺本州大中正掖縣有人年踰九十板輿造州自稱少曾充使林邑得一美玉方尺四寸甚有光彩藏之海島垂六十歲忻逢明治今願奉之挺曰吾雖德謝古人未能以玉為寶遣船隨取光潤果然竟不肯受仍表送京都世宗即位累表乞還景明初見代老幼泣涕追隨縑帛贈送挺悉不納散騎常侍趙脩得幸世宗挺雖同州壤未嘗詣門北海王詳為司徒錄尚書事以挺為司馬挺固辭不免世人皆歎其屈而挺處之夷然於後詳攝選眾人競稱考第以求遷敘挺終獨無言詳曰崔光州考級並未加授宜投一牒當為申請蘧伯玉恥獨為君子亦何故默然挺對曰階級是聖朝大例考課亦國之恒典下官雖慚古賢不伐之美至於自衒求進竊以羞之詳大相稱歎自為司馬詳未曾呼名常稱州號以示優禮四年卒時年五十九其年冬贈輔國將軍幽州刺史諡曰景光州故吏聞凶問莫不悲感共鑄八尺銅像於城東廣因寺起八關齋追奉冥福其遺愛若此初崔光之在貧賤也挺贍遺衣食常親敬焉又識邢巒宋弁於童稚之中並謂終當遠致世稱其知人歷官二十餘年家資不益食不重味室無綺羅閨門之內雍雍如也舊故多有贈賵諸子推挺素心一無所受有子六人長子孝芬字恭梓早有才識博學好文章高祖召見甚嗟賞之李彪謂挺曰比見賢子謁帝旨諭殊優今當為群拜紀挺曰卿自欲善處人父子之間然斯言吾所不敢聞也司徒彭城王勰板為行參軍後除著作郎襲父爵尚書令高肇親寵權盛子植除青州刺史啟孝芬為司馬後除司徒記室參軍司空屬定州大中正長於剖判甚有能名府主任城王澄雅重之熙平中澄奏地制八條孝芬所參定也在府久之除龍驤將軍廷尉少卿孝昌初蕭衍遣將裴邃等寇淮南詔行臺酈道元都督河間王琛討之停師城父累月不進敕孝芬持節齎齊庫刀催令赴接賊退而還荊州刺史李神俊為蕭衍遣將攻圍詔加孝芬通直散騎常侍以將軍為荊州刺史兼尚書南道行臺領軍司率諸將以援神俊因代焉於時州郡內戍悉已陷沒且路由三鴉賊已先據孝芬所統既少不得徑進遂從弘農堰渠山道南入遣弟孝直輕兵在前出賊不意賊便奔散人還安堵肅宗嘉勞之并賚馬及綿絹等物後以元叉之黨與盧同李獎等並除名徵還又孝芬為廷尉之日章武王融以贓貨被劾孝芬按以重法及融為都督北討鮮于脩禮於時孝芬弟孝演率勒宗從避賊於博陵郡城為賊攻陷尋為賊所害融乃密啟云孝演入賊為王遂見收捕合家逃竄遇赦乃出孝昌三年蕭衍將成景俊率眾逼彭城除孝芬寧朔將軍員外常侍兼尚書右丞為徐州行臺孝芬將發入辭靈太后謂孝芬曰卿女今事我兒與卿便是親舊曾何相負而內頭元叉車中稱此老嫗會須卻之孝芬曰臣蒙國厚恩義無斯語假實有此誰能得聞若有聞知此於元叉親密過臣遠矣乞對言者足辨虛實靈太后悵然意解乃有愧色景俊築柵造堰謀斷泗水以灌彭城孝芬率大都督李叔仁柴集等赴戰景俊等力屈退走除孝芬安南將軍光祿大夫兼尚書為徐兗行臺建義初太山太守羊侃據郡反遠引南賊圍逼兗州除孝芬散騎常侍鎮東將軍金紫光祿大夫仍兼尚書東道行臺與大都督刁宣馳往救援與行臺于暉接至便圍之侃突圍奔蕭衍餘悉平定永安二年莊帝聞元顥有內侵之計敕孝芬南赴徐州顥遂潛師向考城擒大都督濟陰王暉業乘勝徑進遣其後軍都督侯暄守梁國城以為後援孝芬勒諸將馳往圍暄恐顥遣援乃急攻之晝夜不息五日暄遂突出擒斬之俘其卒三千餘人莊帝還宮授西兗州刺史將軍如故孝芬久倦外役固辭不行乃除太常卿普泰元年南陽太守趙脩延襲據荊州城囚刺史李琰之招引南寇除孝芬衛將軍荊州刺史兼尚書南道行臺又除都督三荊諸軍事車騎將軍假驃騎將軍孝芬已出次改授散騎常侍驃騎將軍西兗州刺史太昌初兼殿中尚書尋除車騎大將軍左光祿大夫仍尚書後加儀同三司兼吏部尚書出帝入關齊獻武王至洛與尚書辛雄劉廞等並誅時年五十沒其家口天平中乃免之孝芬博文口辯善談論愛好後進終日忻然商確古今間以嘲謔聽者忘疲所著文章數十篇有子八人長子勉字宣祖頗涉史傳有几案才正光初除太學博士莊帝之為御史中尉啟除侍御史永安初除建節將軍尚書右中兵郎中後太尉豫章王蕭贊啟為諮議參軍郎中如故以舉人失衷為中尉高道穆奏免其官普泰中兼尚書左丞勉善附會世論以浮競譏之為尚書令爾朱世隆所親待而尚書郎魏季景尤為世隆知任勉與季景內頗不穆季景陰求右丞奪勉所兼世隆啟用季景勉遂悵怏自失尋除安南將軍光祿大夫兼國子祭酒典儀注太昌初除散騎常侍征東將軍金紫光祿大夫定州大中正敕左右廂出入其家被收之際在外逃免於後乃出見齊獻武王於晉陽王勞撫之天平末王遣勉送勳貴妻子赴定州因得還家屬母李氏喪亡勉哀號過性遇病卒時年四十七無子弟宣度以子龍後之勉弟宣猷司徒中郎走於關西宣猷弟宣度齊王儀同開府司馬宣度弟宣軌頗有才學尚書考功郎中與弟宣質宣靜宣略並死於晉陽孝芬弟孝暐字敬業少寬雅早著長者之風彭城王勰之臨定州辟為主簿釋褐冀州安東府外兵參軍歷員外散騎侍郎寧朔將軍員外散騎常侍武泰初蠻首李洪扇動諸蠻詔孝暐持節為別將隸都督李神軌討平之爾朱榮之害朝士孝暐與弟孝直攜家避難定陶孝莊初徵拜通直散騎常侍加征虜將軍尋除趙郡太守郡經葛榮離亂之後民戶喪亡六畜無遺斗粟乃至數縑民皆賣鬻兒女夏椹大熟孝暐勸民多收之郡內無牛教其人種招撫遺散先恩後威一周之後流民大至興立學校親加勸篤百姓賴之卒於郡時年四十九贈通直散騎常侍平東將軍瀛州刺史諡曰簡朝議謂為未申復贈安北將軍定州刺史子昂武定中尚書左丞兼度支尚書孝暐弟孝演字則伯出繼伯父性通率美鬚髯姿貌魁傑少無宦情沉浮鄉里河間王琛為定州刺史以為治中晚除瀛州安西府外兵參軍因罷歸及鮮于脩禮起逆孝演率宗屬保郡城為賊攻陷賊以孝演民望恐移眾心乃害之時年四十無子弟孝直以子士遊為後士遊儀同開府倉曹參軍孝演弟孝直字叔廉身八尺眉目疏朗早有志尚起家司空行參軍尋為員外散騎侍郎宣威將軍仍以本官入領直後轉寧遠將軍汝南王開府掾領直寢兄孝芬除荊州詔孝直假征虜將軍別將總羽林二千騎與孝芬俱行孝直潛師徑進賊遂破走孝芬入城後蕭衍將曹義宗仍在馬圈鼓動順陽蠻夷緣邊寇竊孝直率眾禦之賊皆退散還轉直閣將軍通直散騎常侍爾朱兆入洛孝直以天下未寧去職歸鄉里勸督宗人務行禮義後除安東將軍光祿大夫太昌中又除衛將軍右光祿大夫並辭不赴宗親勸孝直曰榮華人之所願何故陸沉孝直不答年五十八卒於鄉里顧命諸子曰吾才疏效薄於國無功若朝廷復加贈諡宜循吾意不得祗受若致干求則非吾子斂以時服祭勿殺生其子皆遵行之有四子長子士順儀同開府行參軍孝直弟孝政字季讓十歲挺亡號哭不絕見者為之悲傷操尚貞立博洽經史雅好辭賦喪紀之禮特所留情衣服制度手能執造太尉汝南王悅辟行參軍年四十九卒子巖武定中員外常侍孝芬兄弟孝義慈厚弟孝演孝政先亡孝芬等哭泣哀慟絕內蔬食容貌損瘠見者傷之孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也雞鳴而起旦參顏色一錢尺帛不入私房吉凶有須聚對分給諸婦亦相親愛有無共之始挺兄弟同居孝芬叔振既亡之後孝芬等奉承叔母李氏若事所生旦夕溫凊出入啟覲家事巨細一以諮決每兄弟出行有獲財物尺寸已上皆內李氏之庫四時分賚李自裁之如此者二十餘歲撫從弟宣伯子朗如同氣焉挺弟振字延根少有學行居家孝友為宗族所稱自中書學生為祕書中散在內謹敕為高祖所知出為冀州咸陽王禧驃騎府司馬在任久之太和二十年遷建威將軍平陽太守不拜轉高陽內史高祖南討徵兼尚書左丞留京振既才幹被擢當世以為榮後改定職令振本資惟擬五品詔曰振在郡著績宜有褒升除太子庶子景明初除長兼廷尉少卿振有公斷以明察稱河內太守陸琇與咸陽王禧同謀為逆禧敗事發振窮治之時琇內外親黨及當朝貴要咸為之言振研覈切至終無縱緩遂斃之於獄其奉法如此正始初除龍驤將軍肆州刺史在任有政績還朝除河東太守永平中卒於郡時年五十九贈本將軍南兗州刺史諡曰定振歷官四十餘載考課恒為稱職議者善之長子宣伯早喪子勁字仲括驃騎參軍宣伯弟子朗美容貌涉獵經史少溫厚有風尚以軍功起家襄威將軍員外散騎侍郎普泰中從兄孝芬為荊州請為車騎府司馬孝芬轉西兗州為驃騎府司馬太昌初冠軍將軍北徐州撫軍府長史固辭不獲免興和二年中尉高仲密引為侍御史尋加平西將軍武定中卒子道綱挺從父弟元珍釋褐司徒行參軍稍遷司徒主簿趙郡王幹開府屬景明中荊州長史久之為司徒從事中郎有公平稱後遷中散大夫加征虜將軍正光末山胡作逆除平陽太守假右將軍為別將以討之頻破胡賊郡內以安武泰初改郡為唐州仍除元珍為刺史加右將軍以破胡勳賜爵涼城侯爾朱榮之趣洛也遣其都督樊子鵠取唐州元珍與行臺酈惲拒守不從為子鵠所陷被害世咸痛之子叔恭挺從父弟瑜之字仲璉少孤有學業太和中釋褐奉朝請廣陵王羽常侍累歷蕃佐入為司空功曹參軍事太尉主簿遷冀州撫軍府長史後為揚州平東府長史帶南梁太守蕭衍義州刺史文僧明來降瑜之迎接有勳賜爵高邑男孝昌初除鴻臚少卿三年卒年五十六贈平北將軍瀛州刺史有三子長子孟舒字長才襲父爵累遷平東將軍太中大夫興和中除廣平太守卒贈中軍將軍殷州刺史贈鎮東將軍諡曰康孟舒弟仲舒武定末鄴縣令仲舒弟季舒給事黃門侍郎挺從祖弟修和州主簿子儉字元恭雅有器度歷太學博士終於符璽郎中儉弟緒字仲穆定州撫軍府法曹參軍緒小弟孝忠侍御史祕書郎並有容貌無他才識緒子子謙尚書郎子謙弟子讓與侯景同反子謙坐以囚執遇病死於晉陽子讓弟子廉等並伏法修和弟敬邕性長者有幹用高祖時自司徒主簿轉尚書都官郎中所在稱職遷太子步兵校尉景明初母憂去職後中山王英南討引為都督府長史加左中郎將以功賜爵臨淄男遷龍驤將軍太府少卿以本將軍出除營州刺史庫莫奚國有馬百匹因風入境敬邕悉令送還於是夷人感附熙平二年拜征虜將軍太中大夫神龜中卒年五十七贈左將軍濟州刺史諡曰恭子子盛襲爵除奉朝請修和從弟接字顯賓容貌魁偉放邁自高不拘常檢為中書博士樂陵內史雅為任城王澄所禮待及澄為定州刺史接了無民敬王忻然容下之後為冀州安東府司馬轉樂陵太守還鄉而卒挺族子纂字叔則博學有文才景明中太學博士轉員外散騎侍郎襄威將軍既不為時知乃著無談子論後為給事中延昌中除梁州征虜府長史熙平初為寧遠將軍廷尉正每於大獄多所據明有當官之譽時太原王靜自廷尉監遷少卿纂恥居其下乃與靜書辭氣抑揚無上下之體又啟求解任乃除左中郎將領尚書三公郎中未幾以公事免後為洛陽令正光中卒年四十五贈司徒左長史凡所製文多行於世長子史武定末儀同府長流參軍纂兄穆寬雅有度量州辟主簿卒子暹武定末度支尚書兼右僕射纂弟融字脩業奉朝請尚書令高肇出討巴蜀引為統軍還除員外散騎侍郎正光中定州別駕年四十二卒子鴻翻郡功曹纂從祖弟遊字延叔少有風概釋褐奉朝請稍遷太尉主簿江州刺史陳伯之啟為司馬還除奉車都尉大都督中山王英征義陽引為錄事參軍尋轉司馬及英敗於鍾離遊坐徙秦州久而得還大將軍高肇西征引為統軍除步兵校尉遷豫州征虜府長史未幾除征虜將軍北趙郡太守並有政績熙平末轉河東太守郡有鹽戶常供州郡為兵子孫見丁從役遊矜其勞苦乃表聞請聽更代郡內感之太學舊在城內遊乃移置城南閑敞之處親自說經當時學者莫不勸慕號為良守以本將軍遷涼州刺史以母憂解任正光中起除右將軍南秦州刺史固辭不免先是州人楊松柏楊洛德兄弟數為反叛遊至州深加招慰松柏歸款引為主簿稍以辭色誘之兄弟俱至松柏既州之豪帥感遊恩遇獎諭群氐咸來歸款且以過在前政不復自疑遊乃因宴會一時俱斬於是外人以其不信合境皆反正光五年夏秦州城人殺刺史李彥據州為逆數日之後遊知必不安謀欲出外尋為城人韓祖香孫燎攻於州館遊事窘登樓慷慨悲歎乃推下小女而殺之義不為群小所辱也尋為祖香等所執害時年五十二永安中贈散騎侍郎鎮北將軍定州刺史子伏護開府參軍史臣曰高祐學業優通知名前世儒俊之風門舊不隕諸子經傳之器加有捨生之節崔挺兄弟風操高亮懷文抱質歷事著稱見重於朝野繼世承家門族並著蓋所謂彼有人焉
