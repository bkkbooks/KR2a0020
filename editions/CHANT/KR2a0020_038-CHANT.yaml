body:
  text: 卷三十三補列傳第二十一宋隱王憲屈遵張蒲谷渾公孫表張濟李先賈彝薛提宋隱字處默西河介休人也曾祖奭晉昌黎太守後為慕容廆長史祖活中書監父恭尚書徐州刺史慕容俊徙鄴恭始家於廣平列人焉隱性至孝年十三便有成人之志專精好學不以兵難易操仕慕容垂歷尚書郎太子中舍人本州別駕太祖平中山拜隱尚書吏部郎車駕還北詔隱以本官輔衛王儀鎮中山尋轉行臺右丞領選如故屢以老病乞骸骨太祖不許尋以母喪歸列人既葬被徵固辭以病而州郡切以期會隱乃棄妻子間行避焉後匿於長樂之經縣數年而卒臨終謂其子姪等曰苟能入順父兄出悌鄉黨仕郡幸而至功曹史以忠清奉之則足矣不勞遠詣臺閣恐汝不能富貴而徒延門戶之累耳若忘吾言是為無若父也使鬼而有知吾不歸食矣有五子第三子溫世祖時徵拜中書博士卒追贈建威將軍豫州刺史列人定侯溫弟演顯祖初從征彭城有功拜明威將軍濟北太守演子鮒字伯魚州別駕隱弟輔字處仁少慷慨有大操博覽群書州辟別駕早卒隱叔父洽為慕容垂尚書太祖之圍中山也洽率所領專守北圍當洽所統官軍多被傷殺太祖特深忿恨及城平遂殺之子順訓並下腐刑洽第四子宣字道茂時年數歲親人竊逃以免後與范陽盧玄勃海高允及從子愔俱被徵拜中書博士尋兼散騎常侍使劉義隆加冠軍將軍賜爵中都侯領中書侍郎行司隸校尉真君七年卒贈司隸諡簡侯子謨字乾仁襲爵卒於遼西太守子鸞字珍和襲爵東莞太守鸞弟瓊字普賢少以孝行稱母曾病季秋之月思瓜不已瓊夢想見之求而遂獲時人稱異母終州郡屢辟皆不就卒於家子仲美武定末尚書水部郎王憲字顯則北海劇人也祖猛苻堅丞相父休河東太守憲幼孤隨伯父永在鄴苻丕稱尊號復以永為丞相永為慕容永所殺憲奔清河匿於民家皇始中輿駕次趙郡之高邑憲乃歸誠太祖見之曰此王猛孫也厚禮待之以為本州中正領選曹事兼掌門下世祖即位行廷尉卿出為上谷太守加中壘將軍賜爵高唐子清身率下風化大行尋拜外都大官後為中都歷任二曹斷獄稱旨進爵劇縣侯加龍驤將軍出為并州刺史加安南將軍進爵北海公境內清肅及還京師以憲元老特賜錦繡布帛綿綵珍羞禮膳天安初卒年八十九贈鎮南將軍青州刺史諡曰康子崇襲早卒子仲智襲歷中書侍郎安西將軍幽州刺史有清平之稱崇弟嶷字道長少以父任為中書學生稍遷南部大夫高祖初出使巡察青徐兗豫撫慰新附觀省風俗還遷南部尚書在任十四年時南州多事文奏盈几訟者填門嶷性儒緩委隨不斷終日在坐昏睡而已李訢鄧宗慶等號為明察勤理時務而二人終見誅戮餘十數人或黜或免唯嶷卒得自保時人為之語曰實癡實昏終得保存加散騎常侍右將軍賜爵東平侯未幾拜安東將軍進爵樂安公出為持節鎮西將軍秦州刺史改為華山公散騎常侍如故後入為內都大官卒子祖念襲爵官至東平太守例降爵為侯卒贈寧朔將軍光州刺史子慶鍾襲爵給事中貪穢無行坐事爵除祖念弟雲字羅漢頗有風尚自尚書郎入為中書舍人轉司州別駕光祿少卿改授衛尉少卿出為冠軍將軍尚書兗州刺史尋進號征虜將軍在州坐受所部荊山戍主杜虞財貨又取官絹因染割易御史糾劾付廷尉遇赦免熙平二年卒官贈平南將軍豫州刺史諡曰文昭有九子長子昕字元景武定末太子詹事昕弟暉字元旭早稱機悟歷尚書儀曹郎中書舍人贈散騎常侍鎮軍將軍兗州刺史暉弟旰字仲明祕書郎司徒主簿天平中為盜所害屈遵字子皮昌黎徒河人也博學多藝名著當時為慕容永尚書僕射武垣公永滅垂以為博陵令太祖南伐車駕幸魯口博陵太守申永南奔河外高陽太守崔玄伯東走海濱屬城長吏率多逃竄遵獨告其吏民曰往年寶師大敗今茲垂征不還天之棄燕人弗支也魏帝神武命世寬仁善納御眾百萬號令若一此湯武之師吾欲歸命爾等勉之勿遇嘉運而為禍先遂歸太祖太祖素聞其名厚加禮焉拜中書令出納王言兼總文誥中原既平賜爵下蔡子從駕還京師卒時年七十子須襲除長樂太守加鎮遠將軍進爵信都侯卒贈寧北將軍昌黎公諡曰恭少子處珍襲爵處珍卒子車渠襲爵高祖初出為東陽鎮將卒贈青州刺史諡曰莊須長子垣字長生沉深有局量少纂家業尤善書計太祖初給事諸曹太宗世遷將作監統京師諸署世祖即位稍遷尚書右僕射加侍中以破平涼功賜爵濟北公加平南將軍後轉中領軍恭宗在東宮垣領太子少傅後督諸軍東伐進號鎮東大將軍師次和龍馮文通致牛酒以犒軍獻甲三千垣責其不送侍子數之以王命遂掠男女六千口而還垣在宮公正內外稱其平當世祖信任之委以大政車駕出征常居中留鎮與襄城公盧魯元俱賜甲第世祖數臨幸賞賜隆厚真君四年墜馬卒時年五十五時世祖幸陰山恭宗遣使乘傳奏狀世祖甚悼惜之謂使人曰汝等殺朕良臣何用乘馬遂令步歸贈征西大將軍諡曰成公長子觀早卒世祖愍之賜其子男爵觀弟道賜襲爵道賜少以父任內侍左右稍遷主客進為尚書加散騎常侍善騎射機辯有辭氣世祖甚器之從征蓋吳遷尚書右僕射加侍中還至雁門暴疾卒諡曰哀公子拔襲爵拔少好陰陽學世祖追思其父祖年十四以為南部大夫時世祖南伐擒劉義隆將胡盛之以付拔拔酒醉不覺盛之逃去世祖大怒命斬之將伏鑕世祖愴然曰若鬼而有知長生問其子孫朕何以應之乃赦拔免為散大夫後顯祖以其功臣子拜營州刺史卒子永興襲爵張蒲字玄則河內脩武人本名謨後改為蒲漢太尉延之後父攀慕容垂御史中丞兵部尚書以清方稱蒲少有父風頗涉文史以端謹見知為慕容寶陽平河間二郡太守尚書左丞太祖定中山寶之官司敘用者多降品秩既素聞蒲名仍拜為尚書左丞天興中以蒲清謹方正遷東部大人後拜太中大夫太宗即位為內都大官賜爵泰昌子參決庶獄私謁不行號為公正泰常初丁零翟猛雀驅逼吏民入白澗山謀為大逆詔蒲與冀州刺史長孫道生等往討道生等欲徑以大兵擊之蒲曰良民所以從猛雀者非樂亂而為皆逼凶威強服之耳今若直以大軍臨之吏民雖欲返善其道無由又懼誅夷必并勢而距官軍然後入山恃阻誑惑愚民其變未易圖也不如先遣使喻之使民不與猛雀同謀者無坐則民必喜而俱降矣道生甚以為然具以奏聞太宗詔蒲軍前慰喻乃下數千家還其本屬蒲皆安集之猛雀與親黨百餘人奔逃蒲與道生等追斬猛雀首送京師後劉裕寇竊河表以蒲為南中郎將南蠻校尉隸平南大將軍長孫嵩往禦之裕入長安乃還後改為壽張子與安平公叔孫建將兵自平原東渡徇下劉義符青兗諸郡詔加陳兵將軍濟州刺史又與建攻青州不克而還世祖即位以蒲清貧妻子衣食不給乃出為相州刺史扶弱抑強進善黜惡教化大行始光三年卒於州年七十二吏民痛惜之蒲在謀臣之列屢出為將朝廷清論常為稱首贈平東將軍廣平公諡曰文恭子昭有志操天興中以功臣子為太學生太宗即位為內主書後襲父爵神麚中從征蠕蠕以功進爵脩武侯加平遠將軍延和二年出為幽州刺史開府加寧東將軍時幽州年穀不登州廩虛罄民多菜色昭謂民吏曰何我之不德而遇其時乎乃使富人通濟貧乏車馬之家糴運外境貧弱者勸以農桑歲乃大熟士女稱頌之在任三年卒子昶襲爵早卒昶弟靈符真君八年補中書博士和平中咸陽郡民趙昌聚黨作逆百姓騷動詔靈符宣旨慰喻民乃復業天安初遷中書侍郎賜爵昌國子延興中使南豫州觀察風俗太和四年除建威將軍廣平太守還為尚書左丞司州大中正後除鎮遠將軍齊州刺史十六年轉光州刺史加立忠將軍卒谷渾字元沖昌黎人也父袞膂力兼人彎弓三百斤勇冠一時仕慕容垂至廣武將軍渾少有父風任俠好氣以父母在常自退抑晚乃折節受經業遂覽群籍被服類儒者太祖時以善隸書為內侍左右太宗世遷前鋒將軍從幸河南還以選給事東宮世祖即位為中書侍郎加振威將軍從征赫連昌為驍騎將軍遷侍中安南將軍領儀曹尚書賜爵濮陽公渾正直有操行性不苟合趣舍不與己同者視之蔑如也然愛重舊故不以富貴驕人時人以此稱之在官廉直為世祖所器重詔以渾子孫十五以上悉補中書學生延和二年春卒世祖悼惜之親臨其喪贈賜豐厚諡曰文宣子闡字崇基小字長命襲爵少侍東宮稍遷平南將軍相州刺史入為外都大官延興四年卒諡曰簡公闡弟季孫襲爵中書學生入為祕書中散遷中部大夫出為吐京鎮將闡子洪字元孫少受學中書世祖以洪機敏有祖風令入授高宗經高宗即位以舊恩為散騎常侍南部長遷尚書賜爵滎陽公洪性貪奢僕妾衣服錦綺貲累千金而求欲滋劇時顯祖舅李峻等初至京師官給衣服洪輒截沒為有司所糾并窮其前後贓罪坐以伏法子穎青州征東大將軍廣陵王羽田曹參軍員外散騎侍郎給事中尚書郎加威遠將軍除員外散騎常侍尋轉中散大夫大軍伐蜀時益州刺史傅豎眼出為別將以穎權行州事後除假節鎮遠將軍涼州刺史不行改授太府少卿又加前將軍神龜二年卒贈平東將軍營州刺史諡曰貞長子纂字靈紹頗有學涉解褐太學博士領侍御史稍遷著作郎司州治中黃門郎散騎常侍又為侍中兼殿中尚書遷驃騎大將軍左光祿大夫營州大中正纂前為著作又監國史不能有所緝綴纂弟士恢字紹達少好琴書初為世宗挽郎除奉朝請正光中入侍甚為肅宗寵待元叉之出靈太后反政紹達預有力焉遷諫議大夫俄轉通直散騎常侍直閤將軍鴻臚少卿封元城縣開國侯邑七百戶太后嬖幸鄭儼懼紹達間構於帝每因言次導紹達為州紹達耽寵不願出外太后誣其罪而殺之公孫表字玄元燕郡廣陽人也遊學為諸生慕容沖以為尚書郎慕容垂破長子從入中山慕容寶走乃歸闕以使江南稱旨拜尚書郎後為博士初太祖以慕容垂諸子分據勢要權柄推移遂至亡滅且國俗敦樸嗜欲寡少不可啟其機心而導其巧利深非之表承指上韓非書二十卷太祖稱善太宗初表參功勞將軍元屈軍事討吐京叛胡為胡所敗表以先諫止屈太宗善之賜爵固安子河西飢胡劉虎聚結流民反於上黨南寇河內詔表討虎又令表與姚興洛陽戍將結期使備河南岸然後進軍討之時胡內自疑阻更相殺害表以其有解散之勢遂不與戍將相聞率眾討之法令不整為胡所敗軍人大被傷殺太宗深銜之及劉裕征姚興兗州刺史尉建聞寇至棄滑臺北走詔表隨壽光侯叔孫建屯枋頭泰常七年劉裕死議取河南侵地太宗以為掠地至淮滑臺等三城自然面縛表固執宜先攻城太宗從之於是以奚斤為都督以表為吳兵將軍廣州刺史斤等濟河表攻滑臺歷時不拔太宗乃南巡為之聲援表等既剋滑臺引師西伐大破劉義隆將翟廣等於土樓遂圍虎牢車駕次汲郡始昌子蘇坦太史令王亮奏表置軍虎牢東不得利便之地故令賊不時滅太宗雅好術數又積前忿及攻虎牢士卒多傷乃使人夜就帳中縊而殺之時年六十四太宗以賊未退祕而不宣初表與勃海封愷友善後為子求愷從女愷不許表甚銜之及封氏為司馬國璠所逮太宗以舊族欲原之表固證其罪乃誅封氏表為人外和內忌時人以此薄之表本與王亮同營署及其出也輕侮亮故至於死第二子軌字元慶少以文學知名太宗時為中書郎出從征討補諸軍司馬世祖平赫連昌引諸將帥入其府藏各令任意取金玉諸將取之盈懷軌獨不探把世祖乃親探金賜之謂軌曰卿可謂臨財不苟得朕所以增賜者欲顯廉於眾人後兼大鴻臚持節拜氐王楊玄為南秦王及境玄不郊迎軌數玄曰昔尉他跨據及陸賈至匍匐奉順故能垂名竹帛今君王無肅恭之禮非蕃臣也玄使其屬趙客子對曰天子以六合為家孰非王庭是以敢請入國然後受謁軌答曰大夫入境尚有郊勞而況王命者乎請奉策以還玄懼詣郊受命軌使還稱旨拜尚書賜爵燕郡公加平南將軍及劉義隆將到彥之遣其部將姚縱夫濟河攻冶阪世祖慮更北入遣軌屯壺關會上黨丁零叛軌討平之出為虎牢鎮將初世祖將北征發民驢以運糧使軌部詣雍州軌令驢主皆加絹一匹乃與受之百姓為之語曰驢無彊弱輔脊自壯眾共嗤之坐徵還真君二年卒時年五十一軌既死世祖謂崔浩曰吾行過上黨父老皆曰公孫軌為受貨縱賊使至今餘姦不除軌之咎也其初來單馬執鞭返去從車百兩載物而南丁零渠帥乘山罵軌軌怒取罵者之母以矛刺其陰而殺之曰何以生此逆子從下到擘分磔四支於山樹上以肆其忿是忍行不忍之事軌幸而早死至今在者吾必族而誅之軌終得娶于封氏生二子斌叡斌襲爵拜內都大官興光二年卒贈幽州刺史叡字文叔初為東宮吏稍遷儀曹長賜爵陽平公時顯祖於苑內立殿敕中秘群官制名叡曰臣聞至尊至貴莫崇於帝王天人挹損莫大於謙光伏惟陛下躬唐虞之德存道頤神逍遙物外宮居之名當協叡旨臣愚以為宜曰崇光奏可後卒於南部尚書贈安東將軍幽州刺史諡曰宣叡妻崔浩弟女也生子良字遵伯聰明好學為尚書左丞雅有幹用為高祖所知遇良弟衡字道津良推爵讓之仕至司直良以別功賜爵昌平子子崇基襲軌弟質字元直有經義頗屬文初為中書學生稍遷博士世祖征涼州留宜都王穆壽輔恭宗時蠕蠕乘虛犯塞候騎至於京師京師大震壽雅信任質以為謀主質性好卜筮卜筮者咸云寇必不來故不謀備由質幾致敗國後深自督厲屢進讜言超遷尚書真君九年卒追贈中護軍將軍光祿勳幽州刺史廣陽侯諡曰恭第二子邃字文慶初為選部吏以積勤稍遷南部長敷奏有稱遷南部尚書賜爵范陽侯加左將軍高祖詔邃與內都幢將上谷公張儵率眾討蕭賾舞陰戍後高祖與文明太后引見王公以下高祖曰比年方割畿內及京城三部於百姓頗有益否邃對曰先者人民離散主司猥多至於督察實難齊整自方割以來眾賦易辦實有大益太后曰諸人多言無益卿言可謂識治機矣詔醴陽被掠之兵有得還者賜絹二十匹邃奏為貴賤等級高祖稱善依例降侯改為襄平伯出為使持節安東將軍青州刺史以邃在公遺迹可紀下詔褒述加鎮東將軍領東夷校尉刺史如故太和十九年卒於官高祖在鄴宮為之舉哀時百度唯新青州佐吏疑為所服詔曰今古時殊禮或隆殺專古也理與今違專今也大乖曩義當斟酌兩途商量得失吏民之情亦不可苟順也主簿近代相承服斬過葬便除可如故事自餘無服大成寥落可準諸境內之民為齊衰三月子同始襲爵卒於給事中同始弟同慶篤厚廉慎為司徒田曹參軍李崇驃騎府外兵參軍隨崇北征有方直之稱邃叡為從父兄弟而叡才器小優又封氏之生崔氏之婿邃母雁門李氏地望縣隔鉅鹿太守祖季真多識北方人物每云士大夫當須好婚親二公孫同堂兄弟耳吉凶會集便有士庶之異張濟字士度西河人也父千秋慕容永驍騎將軍永滅來奔太祖善之拜建節將軍賜爵成紀侯隨從征伐累著功績登國末卒濟涉獵書傳清辯美儀容太祖愛之引侍左右與公孫表等俱為行人拜散騎侍郎襲爵先是姚興遣將攻洛陽司馬德宗雍州刺史楊佺期遣使乞師於常山王遵遵以狀聞太祖遣濟為遵從事中郎報之濟自襄陽還太祖問濟江南之事濟對曰司馬昌明死子德宗代立所部州鎮迭相攻擊今雖小定君弱臣強全無綱紀臣等既至襄陽佺期問臣魏初伐中山幾十萬眾臣答三十餘萬佺期曰魏國被甲戎馬可有幾匹臣答中軍精騎十有餘萬外軍無數佺期曰以此討羌豈足滅也又曰魏定中山徙幾戶於北臣答七萬餘家佺期曰治在何城臣答定都平城佺期曰有如許大眾亦何用城為又曰魏帝為欲久都平城將復遷乎臣答非所知也佺期聞朝廷不都山東貌有喜色曰晉魏通和乃在往昔非唯今日羌寇狡猾頻侵河洛夙夜憂危今此寡弱倉庫空竭與君便為一家義所無諱洛城救援仰恃於魏若獲保全當必厚報如其為羌所乘寧使魏取臣等欲分向揚州佺期曰蠻賊互起水行甚難魏之軍馬已據滑臺於此而還從北道東下乃更便直晉之法制有異於魏今都督襄陽委以外事有欲征討輒便興發然後表聞今朝廷知之而已如其事勢不舉亦不承臺命太祖嘉其辭順乃厚賞其使許救洛陽後遷謁者僕射報使姚興以累使稱旨拜勝兵將軍頻從軍駕北伐濟謀功居多賞賜奴婢百口馬牛數百羊二十餘口天賜五年卒子多羅襲爵坐事除李先字容仁中山盧奴人也本字犯高祖廟諱少好學善占相之術師事清河張御御奇之仕苻堅尚書郎後慕容永聞其名迎為謀主先勸永據長子城永遂稱制以先為黃門郎祕書監垂滅永徙於中山皇始初先於井陘歸順太祖問先曰卿何國人先曰臣本趙郡平棘人太祖曰朕聞中山土廣民殷信爾以不先曰臣少官長安仍事長子後乃還鄉觀望民士實自殷廣又問先曰朕聞長子中有李先者卿其是乎先曰小臣是也太祖曰卿識朕不先曰陛下聖德膺符澤被八表龍顏挺特臣安敢不識太祖又問曰卿祖父及身官悉歷何官先對曰臣大父重晉平陽太守大將軍右司馬父樊石虎樂安太守左中郎將臣苻丕尚書右主客郎慕容永祕書監高密侯太祖曰卿既宿士屢歷名官經學所通何典為長先對曰臣才識愚闇少習經史年荒廢忘十猶通六又問兵法風角卿悉通不先曰亦會習讀不能明解太祖曰慕容永時卿用兵不先曰臣時蒙顯任實參兵事太祖後以先為丞相衛王府左長史從儀平鄴到義臺破慕容驎軍回定中山先每一進策所向克平車駕還代以先為尚書右中兵郎太祖謂先曰今蠕蠕屢來犯塞朕欲討之卿以為何如先曰蠕蠕不識天命竄伏荒朔屢來偷竊驚動邊民陛下神武威德遐振舉兵征之必將摧殄車駕於是北伐大破蠕蠕賞先奴婢三口馬牛羊五十頭轉七兵郎遷博士定州大中正太祖問先曰天下何書最善可以益人神智先對曰唯有經書三皇五帝治化之典可以補王者神智又問曰天下書籍凡有幾何朕欲集之如何可備對曰伏羲創制帝王相承以至於今世傳國記天文祕緯不可計數陛下誠欲集之嚴制天下諸州郡縣搜索備送主之所好集亦不難太祖於是班制天下經籍稍集太祖之討姚興於柴壁也問先曰興屯天渡平據柴壁相為表裏今欲殄之計將安出先對曰臣聞兵以正合戰以奇勝如聞姚興欲屯兵天渡利其糧道及其未到之前遣奇兵先邀天渡柴壁左右嚴設伏兵備其表裏以陛下神策觀時而動興欲進不得退又乏糧夫高者為敵所棲深者為敵所囚兵法所忌而興居之可不戰而取太祖從其計興果敗歸太宗即位問左右舊臣之中為先帝所親信者有誰時新息公王洛兒對曰有李先者最為先帝所知太宗召先引見問曰卿有何功行而蒙先帝所識先對曰臣愚細才行無聞適以忠直奉上更無異能太宗曰卿試言舊事先對曰臣聞堯舜之教化民如子三王任賢天下懷服今陛下躬秉勞謙六合歸德士女能言莫不慶抃俄而召先讀韓子連珠二十二篇太公兵法十一事詔有司曰先所知者皆軍國大事自今常宿於內賜先絹五十匹絲五十斤雜綵五十匹御馬一匹拜安東將軍壽春侯賜隸戶二十二詔先與上黨王長孫道生率師襲馮跋乙連城克之悉虜其眾乃進討和龍先言於道生曰宜密使兵人人備青草一束各五尺圍用填城塹攻其西南絕其外援勒兵急攻賊必可擒道生不從遂掠民而還後出為武邑太守有治名世祖即位徵為內都大官神麚二年卒年九十五詔賜金縷命服一襲贈定州刺史中山公諡曰文懿子冏襲爵為京兆濟陰二郡太守卒子鍾葵襲爵降為子鍾葵弟鳳子鳳子弟虯子並中書博士鳳子子預字元愷少為中書學生聰敏強識涉獵經史太和初歷祕書令齊郡王友出為征西大將軍長史帶馮翊太守積數年府解罷郡遂居長安每羨古人餐玉之法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘稍得粗黑者亦篋盛以還而至家觀之皆光潤可玩預乃椎七十枚為屑日服食之餘多惠人後預及聞者更求於故處皆無所見馮翊公源懷等得其玉琢為器佩皆鮮明可寶預服經年云有效驗而世事寢食不禁節又加之好酒損志及疾篤謂妻子曰服玉屏居山林排棄嗜欲或當大有神力而吾酒色不絕自致於死非藥過也然吾尸體必當有異勿便速殯令後人知餐服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云餐玉有神驗何故不受唅也言訖齒啟納珠因噓屬其口都無穢氣舉斂於棺堅直不傾委死時猶有遺玉屑數升橐盛納諸棺中初天興中先子密問於先曰子孫永為魏臣將復事他主也先告曰未也國家政化長遠不可卒窮自皇始至齊受禪實百五十餘歲矣賈彝字彥倫本武威姑臧人也六世祖敷魏幽州刺史廣川都亭侯子孫因家焉父為苻堅鉅鹿太守坐訕謗繫獄彝年十歲詣長安訟父獲申遠近歎之僉曰此子英俊賈誼之後莫之與京弱冠為慕容垂驃騎大將軍遼西王農記室參軍太祖先聞其名嘗遣使者求彝於垂垂彌增器敬更加寵秩遷驃騎長史帶昌黎太守垂遣其太子寶來寇大敗於參合陂執彝及其從兄代郡太守潤等太祖即位拜尚書左丞參預國政加給事中於鄴置行臺與尚書和跋鎮鄴招攜初附久乃召還天賜末彝請詣溫湯療病為叛胡所拘執送於姚興積數年遁歸又為屈丐所執與語悅之拜祕書監年六十一卒世祖平赫連昌子秀迎其尸柩葬于代南秀歷中書博士遷中書侍郎太子中庶子揚烈將軍賜爵陽都男本州大中正恭宗崩以爵還第既而掌吏曹事高宗以秀東宮舊臣進爵陽都子加振威將軍時丞相乙渾擅作威福多所殺害渾妻庶姓而求公主之號屢言於秀秀默然渾曰公事無所不從我請公主不應何意秀慷慨大言對曰公主之稱王姬之號尊寵之極非庶族所宜若假竊此號當必自咎秀寧死於今朝不取笑於後日渾左右莫不失色為之震懼而秀神色自若渾夫妻默然含忿他日乃書太醫給事楊惠富臂作老奴官慳字令以示秀渾每欲伺隙陷之會渾伏誅遂得免難秀執正守志皆此類也時秀與中書令勃海高允俱以儒舊見重於時皆選擬方岳以詢訪見留各聽長子出為郡守秀辭曰爰自愚微承乏累紀少而受恩老無成效恐先草露無報殊私豈直無功之子超齊先達雖仰感聖慈而俯深驚懼乞收成命以安微臣遂固讓不受自始及終歷奉五帝雖不至大官常掌機要而廉清儉約不營資產年七十三遇疾給醫藥賜几杖時朝廷舉動及大事不決每遣尚書高平公李敷就第訪決皇興三年卒贈本將軍冀州刺史武邑公諡曰簡子俊字異鄰襲爵拜祕書中散軍曹令出為顯武將軍荊州刺史依例降爵為伯先是上洛置荊州後改為洛州在重山中民不知學俊乃表置學官選聰悟者以教之在州五載清靖寡事吏民亦安遷洛後俊朝京師賞以素帛景明初卒贈本將軍光州刺史子叔休襲爵除給事中卒子興襲爵興弟賓歷尚書郎以清素稱出為黎陽太守卒官潤曾孫禎字叔願學涉經史居喪以孝聞太和中為中書博士副中書侍郎高聰使於江左還以母老患輒過家定省坐免官久之徵為京兆王愉郎中令行洛陽令轉治書侍御史國子博士加威遠將軍行魯陽太守清素善撫接得百姓情稍遷司徒諮議參軍通直散騎常侍加冠軍將軍正光中卒贈平北將軍齊州刺史子子儒司空田曹參軍禎兄子景俊亦以學識知名奉朝請遷京兆王愉府外兵參軍愉起逆於冀州將授其官景俊不受愉殺之永平中贈東清河太守諡曰貞景俊弟景興清峻鯁正少為州主簿遂栖遲不仕後葛榮陷冀州為榮所虜稱疾不拜景興每捫膝而言曰吾不負汝以不拜葛榮故也薛提太原人也皇始中補太學生拜侍御史累遷散騎常侍太子太保賜爵歷陽侯加晉兵將軍出為鎮東大將軍冀州刺史進爵太原公所在有聲績徵為侍中治都曹事世祖崩秘不發喪尚書左僕射蘭延侍中和匹等議以為皇孫幼沖宜立長君徵秦王翰置之祕室提曰皇孫有世嫡之重民望所係春秋雖少令問聞於天下成王孝昭所以隆周漢廢所宜立而更求君必不可延等猶豫未決中常侍宗愛知其謀矯皇后令徵提等入遂殺之提弟浮子高宗即位以提有謀立之誠詔襲兄爵太原公有司奏降為侯皇興元年卒提孫令保太和中襲爵歷陽侯史臣曰宋隱操行貞白遺略榮利王憲名祖之孫老見優禮屈遵學藝知機垣乃局量受遇張蒲谷渾文武為用人世仍顯公孫表初則一介見知終以輕薄致戾軌始受授金之賞末陷財利之徵鮮克有終固不虛也張濟使於四方有延譽之美李先學術嘉謀荷遇三世賈彝早播時譽秀則不畏強禦薛提正議忠謀見害姦閹悲夫
