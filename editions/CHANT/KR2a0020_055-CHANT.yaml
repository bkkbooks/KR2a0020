body:
  text: 卷五十列傳第三十八尉元慕容白曜尉元字苟仁代人也世為豪宗父目斤勇略聞於當時泰常中為前將軍從平虎牢頗有軍功拜中山太守元年十九以善射稱神麚中為虎賁中郎將轉羽林中郎小心恭肅以匪懈見知世祖嘉其寬雅有風貌稍遷駕部給事中從幸海隅賜爵富城男加寧遠將軍和平中遷北部尚書加散騎常侍進爵太昌侯拜冠軍將軍天安元年薛安都以徐州內附請師救援顯祖以元為使持節都督東道諸軍事鎮南大將軍博陵公與城陽公孔伯恭赴之劉彧東平太守無鹽戍主申纂詐降元知非誠款外示容納而密備焉劉彧兗州刺史畢眾敬遣東平太守章仇檦詣軍歸款元並納之遂長驅而進賊將周凱望聲遁走彧遣將張永沈攸之等率眾討安都屯于下磕永乃分遣羽林監王穆之領卒五千守輜重於武原龍驤將軍謝善居領卒二千據呂梁散騎侍郎張引領卒二千守茱萸督上租糧供其軍實安都出城見元元依朝旨授其徐州刺史遣中書侍郎高閭李璨等與安都俱還入城別令孔伯恭精甲二千撫安內外然後元入彭城元以張永仍據險要攻守勢倍懼傷士卒乃命安都與璨等固守身率精銳揚兵於外分擊呂梁絕其糧運善居遁奔茱萸仍與張引東走武原馳騎追擊斬首八百餘級武原窮寇八千餘人拒戰不下元親擐甲冑四面攻之破穆之外營殺傷太半獲其輜重五百餘乘以給彭城諸軍然後收師緩戰開其走路穆之率餘燼奔于永軍永勢挫力屈元乘勝圍之攻其南門永遂捐城夜遁伯恭安都乘勢追擊時大雨雪泗水冰合永棄船而走元豫測永必將奔亡身率眾軍邀其走路南北奮擊大破於呂梁之東斬首數萬級追北六十餘里死者相枕手足凍斷者十八九生擒劉彧使持節都督梁南北秦三州諸軍事梁秦二州刺史寧朔將軍益陽縣開國侯垣恭祖龍驤將軍羽林監沈承伯等永攸之輕騎走免收其船車軍資器械不可勝數劉彧東徐州刺史張讜據團城徐州刺史王玄載守下邳輔國將軍兗州刺史樊昌侯王整龍驤將軍蘭陵太守桓忻驅掠近民保險自固元遣慰喻張讜及青州刺史沈文秀等皆遣使通誠王整桓忻相與歸命元表曰彭城倉廩虛罄人有飢色求運冀相濟兗四州粟取張永所棄船九百艘沿清運致可以濟救新民顯祖從之又表分兵置戍進定青冀復表曰彭城賊之要蕃不有積粟強守不可以固若儲糧廣戍雖劉彧師徒悉動不敢窺𨵦淮北之地此自然之勢也詔曰待後軍到量宜守防其青冀已遣軍援須待克定更運軍糧元又表曰臣受命出疆再離寒暑進無鄧艾一舉之功退無羊祜保境之略雖淮岱獲振而民情未安臣以愚智屬當偏任苟事宜宣徹敢不以聞臣前表以下邳水陸所湊先規殄滅遣兵屢討猶未擒定然彭城下邳信命未斷而此城之人元居賊界心尚戀土輒相誑惑希幸非望南來息耗壅塞不達雖至窮迫仍不肯降彭城民任玄朗從淮南到鎮稱劉彧將任農夫陳顯達領兵三千來循宿豫臣即以其日密遣覘使驗其虛實如朗所言臣欲自出擊之以運糧未接又恐新民生變遣子都將于沓千劉龍駒等步騎五千將往赴擊但征人淹久逃亡者多迭相扇動莫有固志器仗敗毀無一可用臣聞伐國事重古人所難功雖可立必須經略而舉若賊向彭城必由清泗過宿豫歷下邳趨青州路亦由下邳入沂水經東安即為賊用師之要今若先定下邳平宿豫鎮淮陽戍東安則青冀諸鎮可不攻而克若四處不服青冀雖拔百姓狼顧猶懷僥倖之心臣愚以為宜釋青冀之師先定東南之地斷劉彧北顧之意絕愚民南望之心夏水雖盛無津途可因冬路雖通無高城可固如此則淮北自舉暫勞永逸今雖向熱猶可行師兵尚神速久則生變若天雨既降或因水通運糧益眾規為進取恐近淮民庶翻然改圖青冀二州卒未可拔臣輒與僚佐共議咸謂可然若隱而不陳懼有損敗之責陳而無驗恐成誣罔之罪惟天鑒懸量照臣愚款彧復遣沈攸之吳憘公領卒數萬從沂清而進欲援下邳元遣孔伯恭率步騎一萬以拒之并以攸之前敗軍人傷殘手足瘃尢膝行者盡送令還以沮其眾又表求濟師詔遣征南大將軍慕容白曜赴之白曜到瑕丘遇患會泗水暴竭賊軍不得前進白曜遂不行伯恭大破賊軍攸之憘公等輕騎遁走元書與劉彧徐州刺史王玄載示其禍福玄載狼狽夜走宿豫淮陽皆棄城而遁於是遣南中郎將中書侍郎高閭領騎一千與張讜對為東徐州刺史中書侍郎李璨與畢眾敬對為東兗州刺史以安初附拜元都督徐南北兗州諸軍事鎮東大將軍開府徐州刺史淮陽公持節散騎常侍尚書如故詔元曰賊將沈攸之吳憘公等驅率蟻眾進寇下邳卿戎昭果毅智勇奮發水陸邀絕應時摧殄自淮以北蕩然清定皆是元帥經略將士效力之所致也朕用嘉焉所獲諸城要害之處分兵置戍以帖民情今方欲清蕩吳會懸旌秣陵至於用兵所宜形勢進止善加量度動靜以聞是時徐州妖人假姓司馬字休符自稱晉王扇惑百姓元遣將追斬之四年詔徵元還京赴西郊尋還所鎮延興元年五月假元淮陽王三年劉昱將蕭順之王敕懃等領眾三萬入寇淮北諸城元分遣諸將逆擊走之元表淮陽郡上黨令韓念祖始臨之初舊民南叛全無一人令撫綏招集愛民如子南來民費係先等前後歸附戶至二百有餘南濟陰郡雎陵縣人趙憐等辭稱念祖善於綏撫清身潔己請乞念祖為雎陵令若得其人必能招集離叛成立一縣顯祖詔曰樹君為民民情如此可聽如請元好申下人之善皆此類也太和初徵為內都大官既而出為使持節鎮西大將軍開府統萬鎮都將甚得夷民之心三年進爵淮陽王以舊老見禮聽乘步挽杖於朝蕭道成既自立多遣間諜扇動新民不逞之徒所在蜂起以元威名夙振徵為使持節侍中都督南征諸軍事征西大將軍大都將餘官如故總率諸軍以討之元討五固賊桓和等皆平之東南清晏遠近帖然入為侍中都曹尚書遷尚書令十三年進位司徒十六年例降庶姓王爵封山陽郡開國公食邑六百戶元表曰臣以天安之初奉律總戎廓寧淮右海岱既平仍忝徐岳素餐尸祿積有年歲彼土安危竊所具悉每惟彭城水陸之要江南用兵莫不因之威陵諸夏夫國之大計豫備為先且臣初克徐方青齊未定從河以南猶懷彼此時劉彧遣張永沈攸之陳顯達蕭順之等前後數度規取彭城勢連青兗唯以彭城既固而永等摧屈今計彼戍兵多是胡人臣前鎮徐州之日胡人子都將呼延籠達因於負罪便爾叛亂鳩引胡類一時扇動賴威靈遐被罪人斯戮又團城子都將胡人王敕懃負釁南叛每懼姦圖狡誘同黨愚誠所見宜以彭城胡軍換取南豫州徙民之兵轉戍彭城又以中州鮮卑增實兵數於事為宜詔曰公之所陳甚合事機其年頻表以老乞身八月詔曰元年尊識遠屢表告退朕以公秉德清挹體懷平隱仁雅淵廣謀猷是仗方委之民政用康億兆故頻文累札仍違沖志而謙光逾固三請彌切若不屈從高謨復何以成其美德也已許其致仕主者可出表付外如禮申遂元詣闕謝老引見於庭命昇殿勞宴賜玄冠素服又詔曰夫大道凝虛至德沖挹故后王法玄猷以御世聖人崇謙光而降美是以天子父事三老兄事五更所以明孝悌於萬國垂教本于天下自非道高識博孰能處之是故五帝憲德三王乞言若求備一人同之古哲叔世之老孰能克堪師上聖則難為其舉傅中庸則易為其選朕既虛寡德謝曩哲更老之選差可有之前司徒山陽郡開國公尉元前大鴻臚卿新泰伯游明根並元亨利貞明允誠素少著英風老敷雅迹位顯台宿歸終私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選於是養三老五更於明堂國老庶老於階下高祖再拜三老親袒割牲執爵而饋於五更行肅拜之禮賜國老庶老衣服有差既而元言曰自天地分判五行施則人之所崇莫重於孝順然五孝六順天下之所先願陛下重之以化四方臣既衰老不究遠趣心耳所及敢不盡誠高祖曰孝順之道天地之經今承三老明言銘之于懷明根言曰夫至孝通靈至順感幽故詩云孝悌之至通於神明光於四海如此則孝順之道無所不格願陛下念之以濟黎庶臣年志朽弊識見昧然在於心慮不敢不盡高祖曰五更助三老以言至範敷展德音當克己復禮以行來授禮畢乃賜步挽一乘詔曰夫尊老尚更列聖同致欽年敬德綿哲齊軌朕雖道謝玄風識昧叡則仰稟先誨企遵猷旨故推老以德立更以元父焉斯彰兄焉斯顯矣前司徒公元前鴻臚卿明根並以沖德懸車懿量歸老故尊老以三事更以五雖更老非官耄耋罔祿然況事既高宜加殊養三老可給上公之祿五更可食元卿之俸供食之味亦同其例十七年七月元疾篤高祖親幸省疾八月元薨時年八十一詔曰元至行寬純仁風美富內秉越群之武外挺溫懿之容自少暨長勳勤備至歷奉五朝美隆四葉南曜河淮之功北光燕然之效魯宋懷仁中鉉載德所謂立身備於本末行道著於終始勳書玉牒惠結民志者也爰及五福攸集懸車歸老謙損既彰遠近流詠陟茲父事儀我萬方謂極眉壽彌贊王業天不遺老奄爾薨逝念功惟善抽怛于懷但戎事致奪恨不盡禮耳可賜布帛綵物二千匹溫明祕器朝衣一襲并為營造墳域諡曰景桓公葬以殊禮給羽葆鼓吹假黃鉞班劍四十人賜帛一千匹子羽名犯肅宗廟諱頗有器望起家祕書中散駕部令轉主客給事加通直散騎常侍守殿中尚書兼侍中以父憂去職又起復本官詔襲爵加平南將軍高祖親考百司以羽怠惰降常侍為長兼仍守尚書奪祿一周遷洛以山陽在畿內改為博陵郡開國公後為征虜將軍恒州刺史卒仍以為贈諡曰順子景興襲正始元年卒贈兗州刺史無子景興弟景俊襲爵員外散騎常侍延昌中坐杖國吏死降封深澤縣開國公子伯永襲無子爵除羽弟靜寬雅有才識世宗時為尚書左民郎中卒贈博陵太守重贈鎮軍將軍洛州刺史諡曰敬子祐之通直散騎常侍護軍長史卒慕容白曜慕容元真之玄孫父琚歷官以廉清著稱賜爵高都侯卒於冠軍將軍尚書左丞贈安南將軍并州刺史高都公諡曰簡白曜少為中書吏以敦直給事東宮高宗即位拜北部下大夫襲爵遷北部尚書在職執法無所阿縱高宗厚待之高宗崩與乙渾共秉朝政遷尚書右僕射進爵南鄉公加安南將軍劉彧徐州刺史薛安都兗州刺史畢眾敬並以城內附詔鎮南大將軍尉元鎮東將軍孔伯恭率師赴之而彧東平太守申纂屯無鹽并州刺史房崇吉屯升城遏絕王使皇興初加白曜使持節都督諸軍事征南大將軍上黨公屯於碻磝以為諸軍後繼白曜攻纂於無鹽城拔其東郭其夜纂遁遣兵追執之獲其男女數千口先是劉彧青州刺史沈文秀冀州刺史崔道固並遣使內附既而彧遣招慰復歸於彧白曜既拔無鹽回攻升城肥城戍主聞軍至棄城遁走獲粟三十萬斛既至升城垣苗麋溝二戍拒守不下白曜以千餘騎襲麋溝麋溝潰自投濟水死者千餘人擊垣苗又破之得粟十餘萬斛由是軍糧充足先是淮陽公皮豹子等再征垣苗不克白曜以一旬之內頻拔四城威震齊土顯祖嘉焉詔曰卿總率戎旅討除不賓霜戈所向無不摧靡旬日之內克拔四城韓白之功何以加此雖升城戍將房崇吉守遠不順危亡已形潰在旦夕宜勉崇威略務存長轡不必窮兵極武以為勞頓且伐罪弔民國之令典當招懷以德使來蘇之澤加於百姓升城不降白曜忿之縱兵陵城殺數百人崇吉夜遁白曜撫慰其民無所殺戮百姓懷之獲崇吉母妻待之以禮劉彧遣其將吳憘公率眾數萬欲寇彭城鎮南大將軍尉元表請濟師顯祖詔白曜赴之白曜到瑕丘遇患時泗水暴竭船不得進憘公退白曜因停瑕丘會崇吉與從弟法壽盜彧盤陽城以贖母妻白曜自瑕丘遣將軍長孫觀等率騎入自馬耳關赴之觀至盤陽諸縣悉降平東將軍長孫陵寧東將軍尉眷東討青州白曜自瑕丘進攻歷城白曜乃為書以喻之曰天棄劉彧禍難滋興骨肉兄弟自相誅戮君臣上下靡復紀綱徐州刺史薛安都豫州刺史常珍奇兗州刺史畢眾敬等深睹存亡翻然歸義故朝廷納其誠款委以南蕃皆目前之見事東西所備聞也彼無鹽戍主申纂敢縱姦慝劫奪行人官軍始臨一時授首房崇吉固守升城尋即潰散自襄陽以東至于淮海莫不風靡服從正化謂東陽歷城有識之士上思安都之榮顯下念申纂之死亡追悔前惑改圖後悟然執守愚迷不能自革猥總戎旅掃定北方濟黃河知十二之虛說臨齊境想一變之清風踟躕周覽依然何極故先馳書以喻成敗夫見機而動周易所稱去危就安人事常理若以一介為高不悛為美則微子負嫌於時紀季受譏於世我皇魏重光累葉德懷無外軍威所拂無不披靡固非三吳弱卒所能擬抗況於今者勢已土崩劉彧威不制秣陵政不出閫外豈復能浮江越海赴危救急恃此為援何異於蹄涔之魚冀拯江海夫蝮蛇螫手則斷手螫足則斷足誠忍肌體以救性命若推義而行之無割身之痛也而可以保家寧宗長守安樂此智士所宜深思重慮自求多福道固固守不降白曜築長圍以攻之長孫陵等既至青州沈文秀遣使請降軍人入其西郛頗有採掠文秀悔之遂嬰城拒守二年崔道固及兗州刺史梁鄒守將劉休賓並面縛而降白曜皆釋而禮之送道固休賓及其僚屬于京師後乃徙二城民望於下館朝廷置平齊郡懷寧歸安二縣以居之自餘悉為奴婢分賜百官白曜雖在軍旅而接待人物寬和有禮獲崇吉母妻申纂婦女皆別營安置不令士卒諠雜乃進討東陽冬入其西郭三年春克東陽擒沈文秀凡獲倉粟八十五萬斛米三千斛弓九千張箭十八萬八千刀二萬二千四百甲冑各三千三百銅五千斤錢十五萬城內戶八千六百口四萬一千吳蠻戶三百餘始末三年築圍攻擊日日交兵雖士卒死傷無多怨叛督上土人租絹以為軍資不至侵苦三齊欣然安堵樂業克城之日以沈文秀抗倨不為之拜忿而箠撻唯以此見譏以功拜使持節都督青齊東徐州諸軍事開府儀同三司青州刺史濟南王將軍如故四年冬見誅初乙渾專權白曜頗所俠附緣此追以為責及將誅也云謀反叛時論冤之白曜少子真安年十一聞父被執將自殺家人止之曰輕重未可知真安曰王位高功重若有小罪終不至此我何忍見父之死遂自縊焉白曜弟如意亦從白曜平歷下與白曜同誅太和中著作佐郎成淹上表理白曜曰臣聞經疆啟宇實良將之功褒德酬庸乃聖王之務昔姜公杖鉞開隆周之基韓生秉旄興鴻漢之業故能賞超當時名垂前史若閫外功成而流言內作人主猜疑良將懷懼樂毅所以背燕章邯所以奔楚至如鄧艾懷忠矯命寧國赤心皎然幽顯同見而橫受屠戮良可悲哀及士治伐吳奮不顧命萬里浮江應機直指使孫皓君臣輿櫬入洛大功亦舉讒書驟至內外唱和貝錦將成微晉武之鑒亦幾於顛沛矣每覽其事常為痛心聖主明王固宜深察臣伏見故征南大將軍開府儀同三司青州刺史濟南王慕容白曜祖父相資世酋東裔值皇運廓被委節臣妾白曜生長王國飲服道教爵列上階位登帝伯去天安初江陰夷楚敢拒王命三方阻兵連城岳峙海岱蒼生翹首拯援聖朝乃眷南顧思救荒黎大議廟堂顯舉元將百僚同音僉曰惟允遂推轂委誠授以專征之任握兵十萬杖鉞一方威陵河濟則淮徐震懼師出無鹽而申纂授首濟北太原同時消潰麋溝垣苗相尋奔走及回麾東掃道固銜璧盤陽梁鄒肉袒請命于時東陽未平人懷去就沈文靜高崇仁擁眾不朝扇擾邊服崔僧祐蓋次陽陳顯達連兵淮海水陸鋒起揚旌而至規援青齊士民洶洶莫不南顧時兵役既久咸有歸心而白曜外宣皇風內盡方略身擐甲冑與士卒同安撫初附示以恩厚三軍懷挾纊之溫新民欣來蘇之澤遂使僧祐擁徒弭旆效順軍門文靜崇仁棄城竄海次陽顯達望塵南奔聲震江吳風偃荊漢及青州克平文秀面縛海波清靜三齊克定逖彼東南永為國有使天府納六州之貢濟泗息烽警之虞開岱宗封禪之略辟山川望秩之序斯誠宗廟之靈神算所授然抑亦白曜與有力矣及氛翳既靜爵命亦隆榮燭當時聲譽日遠而民惡其上妄生尤隙因其功高流言惑聽巧偽亂真朱紫難辨傷夷未瘳合門屠戮鴻勳盛德蔑爾無聞有識之徒能不悽愴臣謂白曜策名王庭累荷榮授歷司出內世載忠美秉鉞啟蕃折衝敵國開疆千里拔城十二辛勤於戎旅之際契闊於矢石之間登鋒履危志存靜亂及方難既夷身膺高賞受胙河山與國昇降六十之年寵靈已極觀其立功足明機運豈容僥倖更邀非望者乎且於時國家士馬屯積京南跨州連鎮勢侔雲岳主將驍雄按鉀在所莫不殉忠死難效節奉時此之不可生心白曜足知之矣況潛逆阻兵營岱厭亂加以王師仍舉州郡屠裂齊民勞止神膽俱喪亡燼之眾不可與圖存離敗之民不可與語勇哉白曜果毅習戎體閑兵勢寧不知士民之不可藉將士之不同己據強兵之勢因塗炭之民而欲立非常之事此愚夫之所弗為也料此推之事可知矣伏惟陛下聖鑒自天仁孝宰世風冠宇宙道超百王開國以來諸有罪犯極刑不得骸骨者悉聽收葬大造之恩振古未有而白曜人舊功高嬰禍淪覆名滅國除爵命無紹天下眾庶咸共哀憐方之餘流應有差異願陛下揚日月之光明勳臣之績垂天地之施慰僵屍之魂使合棺定諡歿有餘稱選其宗近才堪驅策錫以微爵繼其絕世進可以獎勸將來退可以顯國恩澤使存者荷莫大之恩死者受骨肉之惠豈不美哉仰惟聖明霈然昭覽狂瞽之言伏待刑憲高祖覽表嘉愍之白曜弟子契輕薄無檢太和初以名家子擢為中散遷宰官南安王楨有貪暴之響遣中散閭文祖詣長安察之文祖受楨金寶之賂為楨隱而不言事發坐之文明太后引見群臣謂之曰前論貪清皆云克修文祖時亦在中後竟犯法以此言之人心信不可知高祖曰古有待放之臣亦有離俗之士卿等自審不勝貪心者聽辭位歸第契進曰臣卑微小人聞識不遠過蒙曲照虛忝令職小人之心無定帝王之法有常以無恒之心奉有常之法非所克堪乞垂退免高祖曰昔鄭相嗜魚人有獻魚者相曰若取此魚恐削名祿遂不肯受契若知心不可常即知貪之惡矣何為求退遷宰官令微好碎事頗曉工作主司廚宰稍以見知及營洛陽基構征新野南陽起諸攻具契皆參典太和末以功遷太中大夫光祿少卿營州大中正賜爵定陶男正始初除征虜將軍營州刺史徙都督沃野薄骨律二鎮諸軍事沃野鎮將轉都督禦夷懷荒二鎮諸軍事平城鎮將將軍並如故轉都督朔州沃野懷朔武川三鎮三道諸軍事後將軍朔州刺史熙平元年卒贈鎮北將軍并州刺史諡曰克初慕容破後種族仍繁天賜末頗忌而誅之時有遺免不敢復姓皆以輿為氏延昌末詔復舊姓而其子女先入掖庭者猶號慕容特多於他族契長子昇字僧度建興太守遷鎮遠將軍沃野鎮將進號征虜將軍甚得邊民情和第二子僧濟自奉朝請稍轉至五校耽淫酒色不事名行契弟暉歷涇州長史新平太守有惠政景明中大使于忠賞粟二百石卒贈幽州刺史孫善儀同開府主簿史臣曰魏之諸將罕立方面之功尉元以寬雅之風受將帥之任取瑕丘如覆掌克彭城猶拾遺擒將馘醜威名遠被位極公老聖主乞言無乃近世之一人歟白曜有敦正之風出當薄伐席卷三齊如風靡草接物有禮海垂欣慰其勞固不細矣功名難處追猜嬰戮宥賢議勤未聞於斯日也
