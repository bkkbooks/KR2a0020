body:
  text: 卷九十八列傳第八十六島夷蕭道成島夷蕭衍島夷蕭道成字紹伯晉陵武進楚也僭晉時以武進之東城為蘭陵郡縣遂為蘭陵人父承之常隨宗人蕭思話征伐久乃得為其橫野司馬以軍功仕劉義隆位至右軍將軍道成少好武事初從散冗每充征役前後為討蠻小帥以堪勤劇見知思話之鎮襄陽啟之自隨任以統戍稍遷左軍中兵參軍每在疆場擾動邊民曾至談堤大敗而走劉駿時閒關偽職至建業令駿死子業以為後軍將軍直閤子業死劉彧除右軍將軍時子業江州刺史晉安王子勛會稽太守尋陽王子房等並舉兵彧加道成輔國將軍東討平定諸縣晉陵太守袁摽吳郡太守顧琛吳興太守王雲生皆棄郡奔走時徐州刺史薛安都遣從子索兒率銳眾渡淮徵道成拒焉以功封西陽縣開國侯食邑六百戶子勛遣臨川內史張淹自東嶠入規欲擾動三吳劉彧遣道成率三千人統軍主沈思仁拒淹淹便奔走張永沈攸之大敗於彭城劉彧以道成為冠軍將軍督諸軍事假節戍淮陰彧死子昱以道成為右衛將軍領衛尉加兵五百人與尚書令袁粲護軍褚淵領軍劉勔參掌朝事尋解衛尉加侍中戍石頭城劉休範舉兵以討王道隆等為名治嚴數日便率大眾席卷而下道成等率眾拒戰事平以道成為散騎常侍中領軍都督南兗兗徐青冀五州鎮軍將軍南兗州刺史持節侯如故後進爵為公增邑二千戶劉昱凶虐日甚道成與直閤王敬則昱左右楊玉夫同謀殺昱迎弟準立之改年為昇明時太和元年也道成移鎮東城以甲仗五十人入殿進位侍中司空錄尚書事驃騎大將軍持節都督刺史加故封竟陵郡公五千戶給班劍三十人又進督豫司二州荊州刺史沈攸之舉兵討道成道成率眾入鎮朝堂司徒袁粲先鎮石頭據城與尚書令劉秉前湘州刺史王蘊謀討道成密信要攸之速下將為內應不克粲與子最俱死秉父子踰城走於頟檐湖王蘊走向鬭場並見擒攸之至于夏口敗走與第三子中書郎太和單騎南奔華容縣俱自縊死道成又為太尉增封三千戶班劍四十人甲仗百人入殿道成將有大志準侍中王儉請閒勸之道成曰卿言何我今當依事相啟言辭雖厲而意色甚悅儉諷動在位乃加道成黃鉞都督中外諸軍事太傅領揚州牧劍履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人使持節侍中太尉驃騎大將軍錄尚書南徐州刺史如故道成詐辭殊禮重申前命劍履上殿入朝不趨贊拜不名進位相國總百揆封十郡為齊公備九錫之禮加璽紱遠遊冠位在諸王上加相國綠綟綬其驃騎大將軍揚州牧南徐州刺史如故於是建齊臺置百官以東府為齊宮又增封十郡進公為王尋僭大號封其主劉準為汝陰王未幾而死於是高祖詔梁郡王嘉督二將出淮陰隴西公元琛三將出廣陵河東公薛虎子三將出壽春以討之元琛等攻其馬頭戍剋之道成遣其徐州刺史崔文仲攻陷茬眉戍詔遣尚書游明根討之又遣平南將軍郎大檀三將出胊城將軍白吐頭二將出海西將軍元泰二將出漣口將軍封延三將出角城鎮南將軍賀羅出下蔡道成梁州刺史崔慧景遣長史裴叔保率眾寇武興關城氐帥楊鼠擊破之叔保還南鄭梁郡王嘉破道成將盧紹之玄元度於昫山下蔡戍主棄城遁走又詔昌黎王馮熙為西道都督與征南將軍桓誕出義陽鎮南將軍賀羅自下蔡東出鍾離擊道成游擊將軍桓康於淮陽破之道成豫州刺史垣崇祖寇下蔡昌黎王馮熙擊破之梁郡王嘉大破道成將俘獲二萬餘口送京師道成遣後軍參軍車僧朗朝貢先是劉準遣使殷靈誕苟昭先未反而道成僭立及僧朗至朝廷處之靈誕之下僧朗與靈誕競前後降人解奉君遂於朝會刃僧朗詔加殯斂送喪令還道成死子賾僭立改年為永明賾遣其驍騎將軍劉纘前將軍張謨朝貢八年又遣兼員外散騎常侍司馬憲兼員外散騎侍郎庾習朝獻九年遣輔國將軍劉纘通直郎裴昭明朝貢十年又遣昭明與冠軍參軍司馬迪之朝貢賾初為太子時特奢侈道成每欲廢之賴王敬則和諧賾性貪惏常謂人曰唯崔慧景知我貧賾嘗至其益州刺史劉悛宅晝臥覺悛自捧金澡盤面廣三尺愛姬執金澡灌受四升以充沃盥因以奉獻賾納之其好利若此賾遊獵無度其殿中將軍邯鄲超上表諫賾殺之十三年遣平南參軍顏幼明冗從僕射劉思效朝貢十四年賾巴東王子響殺長史劉寅司馬席恭穆謀殺賾賾遣丹陽尹蕭順之討殺之十五年二月遣員外散騎常侍裴昭明員外散騎侍郎謝竣朝貢九月又遣司徒參軍蕭琛范縝朝貢十六年復遣琛與司徒參軍范雲朝貢又遣車騎功曹庾蓽南豫州別駕何憲朝貢十七年賾雍州刺史王奐與南蠻長史劉興祖論眾罪賾以興祖付獄令送還建業奐輒於獄殺之而云自死賾怒遣其直閤將軍曹道剛梁州刺史曹虎等收奐奐閉門拒戰司馬黃瑤起於城內起兵攻奐殺之奐子祕書丞肅肅弟秉來降賾子長懋死立其孫南郡王昭業為太孫賾遇疾暫絕其子竟陵王子良在殿內昭業未入中書郎王融戎服於中書省閤口斷東宮仗不得進欲立子良賾既蘇昭業入殿融知子良不得立乃釋服還省賾死昭業立十數日收融付廷尉殺之昭業生而為其叔子良所養而矯情飾詐陰懷鄙慝與左右無賴群小二十許人共衣食同臥起妻何氏擇其中美貌者與交通密就富商大賈取錢無數既與子良同居未得肆意子良移西邸昭業獨住西州每至昏夜輒開後閤與諸小人共至諸營署恣淫宴凡諸不逞皆迭加爵位許以南面之日便即施行皆疏官位名號於黃牋紙與之各各囊盛帶之肘後昭業師史仁祖侍書胡天翼聞之相與謀曰若言之二宮則其事未易若於營署為異人所毆打及為大物所傷殘豈直罪止一身亦當盡室及禍年各已七十餘生寧足吝也數日仁祖天翼皆自殺昭業父長懋自患及死昭業侍奉憂哀號毀過禮及還私室與所親愛欣笑酣飲備諸甘滋葬畢立為皇太孫截壁為閤於母房內往何氏閒每入輒彌時不出賾至東宮昭業迎拜號慟絕而後蘇賾自下輿抱持之寵愛隆重初昭業在西州令女巫楊氏禱祝速求天位及其父死謂由楊氏之力倍加敬信楊氏子珉亦有美貌何氏尤愛悅之昭業呼楊氏為婆劉氏已來民間亦作楊婆兒歌蓋為此也及在東宮賾有疾令楊氏日夕祈禱令賾早死與何氏書於紙中作一大喜字作小喜三十六字遶之賾謂其必能負荷大業謂曰五年已來一委宰相汝多厝意五年以後勿復委人臨死執昭業手曰阿奴若憶翁當好作如此者再而死子良時在中書省昭業疑畏使虎賁中郎將潘敞領百人屯太極殿西階以防之大斂之始呼賾伎人備舉眾樂諸伎雖畏威從事莫不哽咽流涕及成服悉遣諸王還第子良固乞留過賾葬不許昭業素好狗馬立未十日便毀賾所起招婉殿以殿材乞閹人徐龍駒造宅於其處為馬埒馳走墜馬面額並傷稱疾不出者數日多聚名鷹快犬以梁肉奉之賾將葬喪車未出端門昭業便稱疾還內裁入閤便於內奏胡伎鞞鐸之聲震響內外時司空王敬則問射聲校尉蕭坦之曰便如此不當怱怱邪坦之曰此政當是內人哭聲響徹耳自賾葬後昭業微服而出遊走里市又多往其父母陵隧中與群小共作鄙藝擲塗賭跳放鷹走狗諸雜狡獪日日輒往以此為常朝事大小皆斷於尚書令蕭鸞初蕭賾聚錢上庫至五億萬齋庫亦出三億萬金銀布帛絲綿不可稱計至此歲末所用過半皆賜與左右廝卒之徒及至廢黜府庫空盡昭業在內常著紫錦紅繡雜衣或錦帽改年為隆昌以黃門郎周奉叔為冠軍將軍青州刺史奉叔諂諛為事昭業甚悅之而專恣跋扈無所忌憚常從單刀二十口出入禁闥門衛莫敢訶止每語人云周郎刀不識君徐龍駒自東宮齋師以便佞見寵搆造姦邪以取容媚凡諸鄙黷雜事皆龍駒所勸誘也昭業為龍駒置美女伎樂常住含章殿著黃綸帽被貂裘南面向案代昭業畫敕左右侍直與昭業不異蕭鸞固請誅之楊珉及母亦並下獄死珉及母為昭業所寵恩情特隆賞賜傾府藏珉為何氏所幸常居中內侍蕭鸞初令衛尉蕭諶征北諮議蕭坦之請誅珉何氏與昭業同席坐流涕覆面謂坦之曰楊郎好年少無罪何可枉殺坦之乃耳語於昭業曰此事別有一意不可令人聞昭業呼何氏曰阿奴暫起去坦之乃曰外間並云楊珉與皇后有情聞彰遐邇此事自古所無恐必誤官事昭業不得已乃許之俄敕原之已行刑矣益州刺史劉悛罷任還昭業以其饋奉不豐收付廷尉將加大辟悛弟中書郎繪乞以身代得不死禁錮終身昭業與其父寵姬霍氏淫通納之後宮蕭鸞謀廢之率眾而入時昭業裸身與霍氏相對聞兵至拔劍起拒鸞鸞自殺之左右死者十餘人鸞立其弟昭文自為使持節都督揚南徐二州驃騎大將軍開府錄尚書事揚州刺史加班劍三十人封宣城郡公二千戶以兵五千人出鎮東城殺其鄱陽王鏘隨王子隆遣中護軍王玄邈殺昭文南兗州刺史安陸王子敬豫州刺史王廣之殺江州刺史晉安王子懋又殺湘州刺史南平王銳郢州刺史晉熙王銶南豫州刺史宣都王監鸞加黃鉞進授都督中外諸軍太傅領大將軍揚州牧增班劍四十人前後部羽葆鼓吹劍履上殿入朝不趨贊拜不名封宣城郡王食邑五千戶使持節中書監錄尚書並如故又殺昭文桂陽王鑠衡陽王鈞江夏王鋒廬陵王子卿建安王子真巴陵王子倫乃廢昭文為海陵王尋死鸞僭立焉鸞字景栖其叔父道成寵愛之過於諸子蕭賾末為尚書左僕射甚親委之賾死遂秉朝政既殺昭業專權酷暴屠滅賾等子孫既而自立時太和十八年也號年建武其宣德太僕劉朗之游擊將軍劉璩之坐不贍給兄子致使隨母他嫁免官禁錮時論者謂薄義之由實自鸞始鸞雍州刺史曹虎據襄陽請降高祖詔行征南將軍薛真度督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉藻出南鄭車駕南伐十九年鸞龍陽縣開國侯王朗自渦陽來降左將軍元麗大破鸞將擒其寧州刺史董蠻車駕濟淮幸八公山巡淮而東發鍾離將臨江水司徒馮誕薨乃詔班師遣使臨江數鸞罪惡鸞殺其西陽王子明南海王子罕邵陵王子真二十一年車駕討鸞鸞前將軍韓李萬弋陽太守王嗣之後將軍趙祖悅等十五將來降大破鸞軍於江北獲其將軍王伏保等車駕遂巡沔東而還鸞將王曇紛等萬餘人寇南青州黃郭戍主崔僧淵擊破之悉虜其眾又剋新野城斬鸞輔國將軍新野太守劉忌鸞湖陽戍主蔡道福赭陽戍主成公期及軍主胡松舞陰戍主輔國將軍西汝南北義陽二郡太守黃瑤起及直閤將軍軍主鮑舉南鄉太守席謙並委戍走擒瑤起鮑舉鸞又殺其河東王鉉臨賀王子岳西陽王子文衡陽王子珉湘東王子建南郡王子夏巴陵王昭秀桂陽王昭粲車駕幸南陽進攻宛北城拔之冠軍將軍南陽太守房伯玉以城降又大敗鸞平北將軍崔慧景黃門郎蕭衍於鄧城斬獲首虜二萬有餘鸞憂怖遂疾甚乃大赦改年為永泰其大司馬王敬則於會稽舉兵將以誅鸞鎮北諮議謝眺敬則女夫也告之敬則敗而死鸞死子寶卷僭立二十三年春寶卷改元為永元遣其太尉陳顯達率崔慧景攻馬圈城詔前將軍元英討之寶卷遣將寇順陽詔振威將軍慕容平城率騎討之顯達攻陷馬圈城車駕南伐詔鎮南大將軍廣陽王嘉斷均口顯達戰敗潰圍夜走斬其左軍將軍張千達賊將蔡道福成公期等數萬人棄順陽遁走寶卷昏狂政出群豎其始安王遙光據東府反不克見殺并殺其右僕射蕭坦之左衛將軍曹虎領軍將軍劉暄尋殺司空徐孝嗣左僕射沈文季前撫軍長史沈昭略其太尉江州刺史陳顯達舉兵襲建業不果而死景明初寶卷豫州刺史裴叔業以壽陽降寶卷遣其衛尉蕭懿為征虜將軍豫州刺史步道伐壽陽頓軍小峴詔遣軍司李煥及統軍奚康生楊大眼等率眾入壽陽驃騎大將軍彭城王勰車騎將軍王肅率步騎十萬赴之寶卷遣將胡松李居士率眾萬餘屯死虎陳伯之水軍泝淮而上以逼壽春勰肅大破之斬首萬數陳伯之又寇淮南勰破之肥口豫州刺史田益宗破寶卷將吳子陽鄧元起於長風寶卷遣侍中崔慧景率諸軍自廣陵水路欲赴壽陽慧景見寶卷狂虐不復自保及得專征欣然即路慧景子覺時為直閤與之密期慧景至廣陵覺遂出奔慧景過廣陵數十里便回軍還時廣陵闕鎮司馬崔恭納之因率眾濟江遂攻建業寶卷嬰城自守寶卷豫州刺史蕭懿擊破慧景擒殺之慧景既死寶卷便自得志無所忌憚日日出遊愛幸茹法珍梅虫兒等及左右應敕捉御刀之徒並專國命民間謂之刀敕寶卷每常輕騎戎服往此諸家與之讌飲此等每有吉凶寶卷輒往弔慶不欲令人見之驅斥百姓惟置空宅而已所往之處既無定所官司常慮得罪東行驅西面人南出驅北面人旦或應出夜便驅遣吏司奔馳叫呼盈路老少震驚啼號塞路處處禁斷不知所適疾患困篤者悉輿去之其有無人輿者匍匐道側主司又加捶打絕命者相繼還宮之時常至半夜左右輒入富室取物蕩盡前魏興太守王敬賓新死未斂家人被驅不得守視及家人還鼠食敬賓兩眼都盡如此者非一寶卷酷亂逾甚其尚書令蕭懿雖有大勳忌而殺之并殺其弟衛尉卿蕭暢世宗詔冠軍將軍南豫州刺史席法友三萬人圍寶卷輔國將軍北新蔡安豐二郡太守胡景略於建安城剋之擒景略寶卷雍州刺史蕭衍據襄陽舉兵伐之荊州行事蕭穎冑應衍三月穎冑叛寶卷以南康王寶融為天子於是寶融僭即帝位穎冑為侍中尚書令衍為左僕射都督征討諸軍征東大將軍使持節如故穎冑請封寶卷為虞陽縣侯寶融不許又封涪陵王穎冑監八州諸軍事行荊州刺史假衍黃鉞蕭衍軍至沔口郢州嬰城自守寶卷又殺巴陵王昭冑永新侯昭秀黃門郎蕭寅寶卷昏暴日甚內外不堪其前南譙太守王靈秀等於石頭迎寶卷弟寶夤率城內文武向其臺城百姓空手隨從者萬數會日暮城門閉不剋衍兵至建業所在棄寶卷降之衍兵入宮寶卷在含德殿吹笙歌作女兒子臥未及睡聞兵入趨出北戶欲還後宮清曜閤已閉閹人禁防黃泰平刀傷其膝仆地顧曰奴反也直後張齊斬首送衍衍追封東昏侯廢其皇后太子為庶人衍殺寶卷弟湘東王寶晊衍又殺邵陵王寶攸晉熙王寶松桂陽王寶貞其建安王寶夤來奔尋逼寶融禪位於己封為巴陵王宮于姑熟寶融尋暴死島夷蕭衍字叔達亦晉陵武進楚也父順之蕭賾光祿大夫衍少輕薄有口辯歷王儉衛軍府戶曹屬累遷為蕭鸞黃門侍郎太子中庶子太和二十二年高祖南伐詔諸軍圍襄陽衍時率眾來援為武衛將軍宇文福所破單騎走免蕭鸞末出為輔國將軍雍州刺史鸞死子寶卷立殺衍兄懿遣巴西梓潼二郡太守劉山陽西上聲云之郡實令襲衍山陽至荊州為蕭穎冑所殺景明二年衍乃與穎冑推寶卷弟荊州刺史寶融為主號年中興舉兵伐寶卷其年十二月剋建業殺寶卷及其妻子衍為大司馬錄尚書事揚州刺史建安郡公邑萬戶三年又自為相國揚州牧封十郡為梁王衍尋僭立自稱曰梁號年天監五月揚州小峴戍主黨法宗襲衍大峴戍破之擒其龍驤將軍邾菩薩送京師衍又遣將張囂寇揚州州軍擊破之斬二千餘級四年三月揚州刺史任城王澄遣長風戍主奇道顯攻衍陰山戍破之斬其龍驤將軍都亭侯梅興祖仍攻白藁戍又破之斬其寧朔將軍吳道爽等獲數千級衍又遣其徐州長史潘伯憐屯軍淮陵徐州刺史司馬明素又據九山澄遣軍並擊破之斬伯憐擒明素衍將吳子陽寇白沙中山王英大破之擒斬千數衍梁州刺史平陽縣開國侯翟遠徐州刺史永昌縣開國侯陳虎牙來降正始元年正月衍將趙祖悅屯據東關江州刺史陳伯之擊破之二月衍將姜慶真襲陷壽春外郭州軍擊走之中山王英圍衍鍾離衍遣冠軍張惠紹率眾軍送糧於鍾離任城王澄遣統軍王足劉思祖邀擊於邵陽大破之生擒惠紹并其驍騎將軍祁陽縣開國男趙景悅等十將斬獲數千級惠紹衍舅子也衍乃移書求之朝議欲示威懷遂聽惠紹等還三月元英破衍將王僧炳於樊城八月英又攻衍義陽克之破衍將馬仙琕擒其冠軍將軍蔡靈恩等十餘將九月衍霍州刺史田道龍義州刺史張宗之遣使內附十二月衍梁秦二州行事夏侯道遷據漢中內附詔尚書邢巒率眾赴之二年四月巒頻破衍軍遂入劍閣執其輔國將軍范始男送京師巒又遣統軍王足破衍諸將斬其輔國將軍馮文豪等六月衍遣將王超宗寇邊揚州刺史薛真度大破之俘斬三千級七月王足又大破衍眾斬其秦梁二州刺史魯方達王明達等三十餘將俘虜二千五百人九月衍湘州刺史揚公則率眾寇壽春揚州刺史元嵩擊破之斬獲數千級三年正月衍徐州刺史昌義之寇梁城江州刺史王茂先寇荊州屯河南城平南將軍陳伯之擊義之平南將軍楊大眼擊茂先並大破之斬其輔國將軍王花俘斬二千茂先逃潰追奔至於漢水拔其五城將軍宇文福略衍司州俘獲千餘口而還五月衍將蕭昞寇淮陽張惠紹寇宿豫蕭密寇梁城韋叡寇合肥平南將軍奚康生破惠紹斬其徐州刺史宋黑七月衍徐州刺史王伯敖入寇陰陵中山王英大破之斬將二十五人首虜五千衍又遣將桓和屯孤山冠軍將軍桓方慶屯固城龍驤將軍矯道儀屯蒙山八月安東將軍邢巒擊桓和破之將軍元恆攻克固城統軍畢祖朽攻克蒙山斬獲及赴沂水死者四千有餘衍又遣張惠紹屯宿豫蕭昞屯淮陽九月都督邢巒大破之斬其大將藍懷恭等三十餘人惠紹蕭昞並棄戍南去追斬數萬級衍中軍大將軍臨川王蕭密右僕射柳惔徐州刺史昌義之等屯據梁城中山王英大破之密等棄城沿淮東走追奔至於馬頭衍冠軍將軍馬頭戍主朱思遠棄城走擒衍將三十餘人斬獲五萬有餘十月衍征虜將軍馬仙琕率眾三萬寇義陽郢州刺史婁悅以州軍擊走之永平元年十月懸瓠城民白早生據州反叛衍遣將齊苟仁等四將以助之詔尚書邢巒率騎討之巒攻克懸瓠斬早生擒苟仁俘衍眾三千餘人初早生之反也世宗遣主書董紹銜詔宣慰紹為早生所執送之於衍衍乃厚資遣紹令奉書朝廷請割宿豫內屬以求和好時朝議或有異同世宗以衍辭雖款順而不稱藩詔有司不許十二月衍寧朔將軍張凝等率眾寇楚城中山王英破擒之衍將馬仙琕據金山郢州刺史婁悅擊走之二年正月中山王英攻克衍長薄戍殺傷數千仍攻拔武陽關擒衍雲騎將軍松滋縣開國侯馬廣冠軍將軍遷陵縣開國子彭盆驍騎將軍當陽縣開國伯徐元秀等二十六將俘獲七千餘人又進攻黃峴西關衍將軍馬仙琕棄西關李元履棄黃峴遁走四年春三月衍琅邪郡民王萬壽等斬衍輔國將軍琅邪東莞二郡太守帶朐山戍主劉晢并將士四十餘人以城內屬徐州刺史盧昶遣兼郯城戍副張天惠率眾赴之而衍郁洲已遣二軍以拒天惠天惠與萬壽等內外齊擊俘斬數百昶仍遣琅邪戍主傅文驥入城據守衍又遣將張稷馬仙琕等攻圍文驥詔昶率眾赴之而文驥以糧盡降衍昶遂失利而還延昌二年二月郁洲徐玄明斬送衍鎮北將軍青冀二州刺史張稷首以州內附三年六月衍遣眾寇九山南荊州刺史桓叔興大破之斬其虎旅將軍蔡令孫冠軍將軍席世興貞義將軍藍次孫四年二月衍寧州刺史任太洪率眾寇關城益州長史成興孫擊破之熙平元年正月衍遣其恒農太守王定世等寇邊都督元志破之斬定世悉俘其眾衍豫州刺史趙祖悅率眾數萬偷據硤石詔鎮南將軍崔亮鎮軍將軍李平討克之斬祖悅傳首京師衍衡州刺史張齊寇益州刺史傅豎眼討之斬其將任太洪齊遁走初衍每欲稱兵境上闚伺邊隙常為諸將摧破雖懷進趣之計而勢力不從遂於浮山堰淮規為壽春之害肅宗詔征南蕭寶夤率諸將討之大破衍眾於淮北秋九月堰自潰決漂其緣淮城戍居民村落十餘萬口流入於海正光元年衍改稱普通至三年其弟子西豐侯正德棄衍來奔尋復亡歸衍初忿之改其姓為背氏既而復焉封為臨賀王五年九月衍將裴邃虞鴻襲據壽春外郭刺史長孫稚擊走之孝昌元年正月徐州刺史元法僧據城南叛衍遣豫章王綜鎮彭城綜蕭寶卷之遺腹子也初衍平建業因納其母吳氏吳氏先有孕後生綜衍謂為己子甚寵愛之綜既長母密告綜綜遂潛圖叛衍既鎮彭城及大軍往討綜乃拔身來奔餘將退走國軍追躡所獲萬計衍初聞之慟哭氣絕甚為慚惋猶云其子言其病風所致時人咸笑之三月衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入寇直城梁州刺史傅豎眼遣息敬紹率眾大敗之擒斬三千人休儒等遁走四月衍益州刺史蕭淵猷遣將樊文熾等率眾圍小劍戍益州刺史邴虯遣子子達行臺魏子建遣別將淳于誕拒擊之五月誕等大破文熾俘斬二萬擒其次將蕭世澄等十二人文熾走免是歲衍又改年為大通二年七月衍將元樹湛僧珍等寇壽春又攻逼新野詔都督魏承祖討破之三年二月衍將成景俊寇彭城行臺崔孝芬率諸將擊走之建義元年衍遣其將曹義宗寇荊州大都督費穆大破之生擒義宗檻送京師初爾朱榮入洛北海王顥奔於衍衍以顥為魏主資顥士馬令其大將陳慶之部率送顥永安二年夏遂入洛陽車駕還討破走之唯慶之一身走免自餘部眾皆見俘執閏月巴州刺史嚴始欣據州入衍衍遣將蕭玩張鴻等率眾赴援都督元景夏率益梁二州軍討之三年正月斬始欣衍眾敗走又斬蕭玩等首俘獲萬餘人普泰元年春南青州刺史茹懷朗遣部將何寶率步騎三千擊衍守將於琅邪擒其雲麾將軍徐兗二州刺史沈預斬其宣猛將軍齊州刺史劉相如永熙元年夏衍遣其鄴王元樹及譙州刺史朱文開入據譙城東南道行臺樊子鵠率諸軍攻克之擒元樹文開等送於京師天平元年十月衍雄信將軍紀耕率眾入寇嵣都督曹仲尼破走之斬其軍主沈達閔莊等二年正月衍將湛僧珍寇南兗州州軍擊破之行臺元晏又破湛僧珍等於項城虜其刺史楊㬓二月衍司州刺史陳慶之郢州刺史田朴特等寇邊豫州刺史堯雄擊走之五月衍仁州刺史黃道始寇北濟陰徐州刺史任祥討破之十月衍將梁秉俊寇單父祥又大敗之俘斬萬餘人十一月衍雍州刺史蕭恭遣將柳仲禮寇荊州刺史王元軌破之於牛飲斬其將張殖王世興是年衍又改號為中大通三年五月豫州刺史堯雄攻衍白苟堆鎮克之擒其北平太守苟元曠十月行臺侯景攻陷衍楚城獲其楚州刺史桓和兄弟四年九月衍青冀二州刺史徐子彥寇圉城南青州刺史陸景元擊走之先是益州刺史傅和以城降衍衍資送和令申意於齊獻武王求通交好王志綏邊遠乃請許之四年冬衍遣其散騎常侍張皋通直常侍劉孝儀通直常侍崔曉朝貢元象二年夏又遣散騎常侍沈山卿通直常侍劉研朝貢興和二年春又遣散騎常侍柳豹通直常侍劉景彥朝貢其年冬又遣散騎常侍陸晏子通直常侍沈景徽朝貢是年衍改號大同三年夏又遣散騎常侍明少遐通直郎謝藻朝貢四年春又遣散騎常侍袁狎通直常侍賀文發朝貢其年冬又遣散騎常侍劉孝勝通直常侍謝景朝貢武定元年夏又遣散騎常侍沈眾通直常侍殷德卿朝貢其年冬又遣散騎常侍蕭確通直常侍陸緬朝貢三年秋又遣散騎常侍徐君房通直常侍庾信朝貢四年夏又遣散騎常侍蕭瑳通直常侍賀德瑒朝貢五年春又遣散騎常侍謝藺通直常侍鮑至朝貢朝廷亦遣使報之十餘年間南境寧息六年衍又改號為中大同其年又改為太清是歲司徒侯景反遣使通衍請其拯援衍惑景遊說遂絕貢使衍子綱及朝臣並切諫以為不可衍不從乃遣其兄子豫州刺史貞陽侯淵明北兗州刺史胡貴孫等寇逼徐州與侯景為聲援仍堰泗水以灌彭城齊文襄王遣行臺慕容紹宗儀同三司高岳潘相樂等率眾討之紹宗檄衍境內曰夫乾坤交泰明聖興作有冥運行之力俱盡變化之途抱識含靈融然並至呈形賦命混而同往所以玄功潛運至德旁通百姓日用而不知萬國受賜而無迹豈徒鑿其耳目易其心慮悟以風雲一其文軌使夫日月之照不私雨露之施均洽運諸仁壽之域納於福祿之林自晉政多僻金行淪蕩中原作戰鬭之場生民為鳥獸之餌則我皇魏握玄帝之圖納水靈之祉駕雲車而自北策龍御以圖南致符上帝援溺下土怪物殛死淫水不作運神器於顧眄定寶命於踟躕恢之以武功振之以文德宇內反可封之俗員首識堯舜之心沙海荒忽之外瀚漠羈縻之表方志所不傳荒經所不綴莫不繩谷釣山依風託水共仰中國之聖同欣大道之行唯夫三吳百越獨阻聲教匪民之咎責有由焉自偽晉之後劉蕭作慝擅僭一隅號令自己惟我祖宗馭宇愛民重戰未極謀臣之畫不窮節將之兵聊遣行人降以尺一圓臺已築黃屋輒去賜其几杖置之度外蕭衍輕險有素士操蔑聞睥睨君親自少而長好亂樂禍惡直醜正巧用其短以少為多詃惑愚淺大言以驚俗驅扇邪僻口兵以作威曲體脅肩搖脣鼓舌候當朝之顧指邀在位之餘論遂汙辱冠帶偷竊藩維及寶卷昏狂下不堪命曾無北面有犯之節遽滅人倫在三之禮憑妖假怪鬼語神言稱兵指闕傾朝鴆主陵虐孤寡聾愚士民天不悔禍姦醜得志內恣彫靡外逞殘賊驅羸國之兵迫糊口之眾南出五嶺北防九江屯戍不解役無寧歲死亡矢刃之下夭折霧露之中哭泣者無已傷痍者不絕託身人上忽下如草遂使頑嚚子弟肆行淫虐狡猾群小縱極貪惏剝割蒼生肌肉略盡刳剔黔首骨髓俱罄猛虎未方其害餓狼詎侔其禍惵惵周餘救死無地至於矯情飾詐事非一緒毒螫滿懷妄敦戒業躁競盈胸謬治清靜至乃大興寺塔廣繕臺堂昭陽到景垂珠銜璧崢嶸刻削千門萬戶鞭撻疲民盡其筋骨延壤運石悲歌掩途死而可祈甘同仙化智淺謀疏曾不自揆遏桐柏之流翻為己害子亡齊之胤忽為戎首書契迄茲罕聞其事至於廢捐冢嫡崇樹愚子朋黨路開彼我側目疾視扼腕十室而九趐足有待良亦多人二紀於茲王家多故始則車馳之警終有驚墜之哀神祗痛憤㝢縣崩震於是故相國齊獻武高王感天壤之慘黷激雲雷以慨然仗高義而率民奮大節以成務爰有匡國定霸之圖非直討賊雪恥之舉於是叡略紛紜靈武冠世盪滌逋孽尊主康邦皇上秉歷受圖天臨日鏡道隨玄運德與神行既而元首懷舞戚之風上宰薄兵車之會遂解縶南冠喻以好睦舟車遵溯川陸光華亭徼相望欣然自泰反肉還童不待羊陸雖嘉謀長算爰自我始罷戰息民兩獲其泰王者之信明如四時豈或為人君父二三其德書而不法可不惜哉侯景一介役夫出自凡賤身名淪沒無或可紀直以趨馳便習見愛爾朱小人叨竊遂忝名位及中興之際義旗四指元惡不赦實在群胡景荷人成拔藉其股肱主人有丹頸之期所天蹈族滅之釁雖不能蔽捍左右以命酬恩猶當慘顏後至義形於色而趣利改圖速如覆手投身麾下甘為僕隸獻武王棄其瑕穢錄其小誠得廁五命之末預在一隊之後參跡驅馳庶其來效長鞭利鎩術以制之既關隴逋誅每事經略以河南空虛之地非兵戰之衝薄存掎角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋唯景任總兵統旅別有司存而愚褊有積憍愎遂甚犯違軍紀仍自猜貳禍心潛搆翻為亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母如脫屣棄少弟如遺土群子陸陸妻姪成行慕姜兒之爽言蔑伯春之宛轉跳梁猖蹶夫欲誰欺比之梟鏡異類同醜欲擬蛇鼠顧匪其倫及遠託關右委命寇逆寶炬定君臣之分黑獺結兄弟之親授以名器之尊救其重圍之死憑人繫援假人鼻息俄而忘恩背惠親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流禦之地甘辭卑體進熟圖身詭言浮說抑可知矣叛豎救命豈將擇音偽朝大夫幸災忘義主耄於上臣蔽於下逐雀去草曾不是圖竊寶叛邑椒蘭比好人而無禮其能國乎夫安危有大勢成敗有恒兆不假離朱之目不藉子野之聽聊陳刺心之說且吐伐謀之言今帝道休明皇猷允塞四民樂業百靈效祉雖上相云亡而伊陟繼事秉文經武虎視龍驤驅日下之俊雄收一世之英銳擊刺猶雷電合戰如風雨控弦躍馬固敵是求蠕蠕昔遭離亂輻分瓦裂匹馬孤征告困於我國家深敦鄰附愍其入懷盡憂人之禮極繼絕之義保衛出於故地資給唯其多少存其已亡之業成其莫大之基深仁厚德鏤其骨髓引領思報義如手足吐谷渾深執忠孝膠漆不渝萬里仰德奏款屬路並申以婚好行李如歸蠕蠕境斜界黃河望通豳夏飛雪千里層冰洞積北風轉勁實筋角之時沍寒方猛正氈裘之利吐谷渾疾彼凶逆強兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方候隙企其移踵加以獨孤如願擁眾秦中治兵劫愶黑獺北備西擬內營腹心救首救尾疲於奔命豈暇稱兵東指出師函谷且秋風揚塵國有恒防關河形勝之際山川襟帶之所猛將精兵棋跱岳立又寶炬河陰之北黑獺芒山之走眾無一旅僅以身歸就其不顧根本輕懷進趣斯則一勞永逸天贊我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虛誕夫景繩樞席牖之子阡陌鄙俚之夫遭風塵之會逢馳騖之日遂位在三吏邑啟千社揣身量分久當止足而乃周章去就離跂不已夫豈徒爾事可搉揚度其眾叛親離守死不暇乃聞將棄懸瓠遠赴彭城老賊姦謀復將作矣固揚聲赴助計在圖襲吞淵明之眾招厭虐之民舉長淮以為斷仍鴟張歲月南面假名死而後已此蓋蚌鷸之禍我承其弊且偽主昏悖不惟善鄰賊忍之心老而彌篤納逋叛之詭譎蔑信義以猖狂天喪其神人重其怨將踐瓜圃之蹤且追兒侯之轍今徵發犬羊侵軼徐部築壘擁川覬覦小利此而可忍孰不可懷兵凶戰危出不得已謬奉朝規肅茲九伐扛鼎拔樹之眾超乘投石之旅練甲爭途波聚霧合虎班龍文之逸蘭池蒲梢之駔噓天陸野躡影追風振旅南轅長驅討蹙非直三吳鼠面一麾魚駭乘此而往青蓋將歸且衍虐網蚩兵權在外持險躁之風俗兼輕薄之子孫蕭綸兇狡之魁豈無商臣之佷蕭譽失志之憤當召專諸之客外崩中潰今也其時幕府師行以禮兵動以義弔民伐罪理有存焉其有知機審變翻然鵲起立功立事去危就安賞典未忘事必加等若軍威所至敢有拒違尺兒已上咸從梟戮今三禮四義之將豹虎熊羆之士深銜逋偽信納叛亡違卜愎諫實興伐役莫不含怒作色如赴私讎茹肝涉血義不旋踵攻戰之日事若有神莽積麻亂匪旦伊夕以彼曲師危卒望我軍鋒何異蛣蜣被甲螂蛆舉尾正恐旗鼓一接芝藋俱摧先事喻懷備知翰墨王侯無種禍福由人斯蓋丈夫肉食之秋壯士封侯之會冬冰可折時不再來凡百君子勉求多福檄之所到咸共申省知我國行師之意冬十二月紹宗高岳等大破衍眾寒山擒淵明貴孫等俘斬五萬其凍溺燒之而死不可勝數衍既慚悔六年復遣使羊珍孫款關乞和并修弔書於齊文襄王文襄王欲以威德懷之許其通而不復其書衍於是遣其散騎常侍謝珽通直常侍徐陵詣闕朝貢珽等未及還而侯景舉兵襲衍密與衍弟子臨賀王正德交通許推為主景至橫江衍令正德率軍拒景正德因而迎之景濟江立以為主以趣建業衍好人佞己末年尤甚或有云國家彊盛者即便忿怒有云朝廷衰弱者因致喜悅是以其朝臣左右皆承其風旨莫敢正言初景之將渡江也衍沿道軍戍皆有啟列而中領軍朱异恐忤衍意且謂景不能渡遂不為聞景至嵫湖方大驚駭乃令其太子綱守中書省軍事悉以委之又逼居民入城百姓因相剝掠不可禁止衍令直從監俞景茂赦二冶尚方錢署罪人及建康廷尉諸囚欲押令入城以充防捍諸徒囚放火燒冶一時散走衍憂懣無計唯令其王公已下分屯諸門攝諸寺藏錢皆入聚德陽堂以充軍實景既至便圍其城縱火燒爇掘長圍築土山以攻衍衍亦於城內起山以應之衍令文武運土人責二十石於是其王侯朝貴皆自負檐蕭綱亦欲自負僉議以為太示迫屈乃止衍每募人出戰素無號令初或蹔勝後必奔背景宣言曰城中非無菜但無醬耳以戲侮之衍太官及軍人無柴乃發取尚書省武庫左右藏以充用衍州鎮外援雖有至者而景圍柵深固內外斷絕衍數募人出戰常為景所執獲有一小兒請以飛鴟傳致消息綱乃作數千丈繩綴紙鴟於繩端縛書其背又題鴟口若有得鴟送援軍者賞銀百兩綱出太極殿因西北風而颺之頻放數鴟景令走馬射取之竟不能達也衍城內大飢人相食米一斗八十萬皆以人肉雜牛馬而賣之軍人共於德陽堂前立市屠一牛得絹三千匹賣一狗得錢二十萬皆熏鼠捕雀而食之至是雀鼠皆盡死者相枕初有盜取其池魚者衍猶大怒敕付廷尉既而宿昔都盡其不識事宜如此景久攻未拔而衍外援雖多各各乖張無有總制更相妒忌不肯奮擊唯衍子邵陵王綸再於鍾山決戰戰敗而走景糧既少遂譎衍求和衍信之乃割江西四州授景封為壽陽王遣其朝貢與部下歃血盟訖景詐引軍還石頭衍乃敕援軍令下諸軍初不受詔後重敕乃從衍又令援軍以船三百艘給景景猶嫌其少又敕付二百衍永安侯蕭確直閤將軍趙威方頗有勇略為景所憚景乃謂衍曰確與威方頻隔岸見罵云天子自與汝和我終不置汝我今便不敢去若召此二人入城者吾當解圍衍復遣使徵確等確等不從衍又為手書與諸軍云確若不入者宜以軍法送之確等不得已乃赴衍景復謂衍曰始有西信至北軍已克壽春鍾離我今便無委足處求權借廣陵譙州待征復兩城還以此州相歸衍又許之景外云欲和伺其懈怠衍君臣上下信景欺詐所有戰具悉皆收去後知非實更狼狽設備有甚於初城轉危急衍等計窮乃復遣使詣景景又詭云今時既熱便不能得去正當乞留京師為朝廷立效耳而悉力大攻七年三月遂拔之景自至建業縱軍士前後虜掠倉庫所有皆掃地盡矣景乃從數百騎見衍覷欷流涕因請香火為作義兒還以衍為主令正德通啟云前為景所擒使攝四海辭不獲免權總萬機今景既入輔乞解僭濫以王還邸自景圍建業城中多有腫病死者相繼無復板木乃刳柱為棺自雲龍神虎門外橫屍重沓血汁漂流無復行路及景入城悉聚尸焚之煙氣張天臭聞數十里初城中男女十餘萬人及陷存者纔二三千人又皆帶疾病蓋天亡之也衍尋為景所餓殺自衍為景攻圍歷百餘日衍子荊州刺史湘東王繹益州刺史武陵王紀各擁兵自守坐看衍之懸危竟不奔赴始景渡江至陷城之後江南之民及衍王侯妃主世冑子弟為景軍人所掠或自相賣鬻漂流入國者蓋以數十萬口加以饑饉死亡所在塗地江左遂為丘墟矣初衍崇信佛道於建業起同泰寺又於故宅立光宅寺於鍾山立大愛敬寺兼營長干二寺皆窮工極巧殫竭財力百姓苦之曾設齋會自以身施同泰寺為奴其朝臣三表不許於是內外百官共斂珍寶而贖之衍每禮佛捨其法服著乾陀袈裟令其王侯子弟皆受佛誡有事佛精苦者輒加以菩薩之號其臣下奏表上書亦稱衍為皇帝菩薩衍所部刺史郡守初至官者皆責其上禮獻物多者便云稱職所貢微少言為弱惰故其牧守在官皆競事聚斂劫剝細民以自封殖多妓妾梁肉金綺百姓怨苦咸不聊生又發召兵士皆須鎖械不爾便即逃散其王侯貴人奢淫無度弟兄子姪侍妾或及千數至乃回相贈遺其風俗頹喪綱維不舉若此衍自以持戒乃至祭其祖禰不設牢牲時人皆竊云雖僭司王者然其宗廟實不血食矣衍未敗前災其同泰寺衍祖父墓前石麟一旦亡失識者咸知其將滅也景又立衍子綱尋復殺之衍之親屬並見屠害矣史臣曰二蕭競塗泥之中同蝸角之戰或年纔三紀或身不獲終而偷名江徼自擬王者考之遂古所未前聞昔句踐致貢而延世夫差爭長而後死兩寇方之吳越不乃劣乎
