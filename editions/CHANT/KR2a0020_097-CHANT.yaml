body:
  text: 卷九十一不全列傳第七十九晁崇張淵殷紹王早耿玄劉靈助江式周澹李修徐謇王顯崔彧蔣少游蓋小道必有可觀況往聖摽歷數之術先王垂卜筮之典論察有法占候相傳觸類長之其流遂廣工藝紛綸理非抑止今列於篇亦所以廣聞見也晁崇字子業遼東襄平人也家世史官崇善天文術數知名於時為慕容垂太史郎從慕容寶敗於參合獲崇後乃赦之太祖愛其伎術甚見親待從平中原拜太史令詔崇造渾儀歷象日月星辰遷中書侍郎令如故天興五年月暈左角蝕將盡崇奏曰占為角蟲將死時太祖既剋姚平於柴壁以崇言之徵遂命諸軍焚車而反牛果大疫輿駕所乘巨犗數百頭亦同日斃於路側自餘首尾相繼是歲天下之牛死者十七八麋鹿亦多死崇弟懿明辯而才不及崇也以善北人語內侍左右為黃門侍郎兄弟並顯懿好矜容儀被服僭度言音類太祖左右每聞其聲莫不驚竦太祖知而惡之後其家奴告崇與懿叛又與臣王次多潛通招引姚興太祖銜之及興寇平陽車駕擊破之太祖以奴言為實還次晉陽執崇兄弟並賜死崇兄子暉太祖時給事諸曹稍遷給事中賜爵長平侯征虜將軍濟州刺史假寧東將軍潁川公劉駿鎮東平郡徙戍近境暉上表求擊之高宗不許暉乃為書以大義責之卒子林襲爵林卒子清襲事在節義傳暉從弟繼太祖時稍遷中書侍郎給事中中堅將軍賜爵襄平子除魏郡太守卒子世宗襲爵卒子元和襲卒張淵不知何許人明占候曉內外星分自云嘗事苻堅堅欲南征司馬昌明淵勸不行堅不從果敗又仕姚興父子為靈臺令姚泓滅入赫連昌昌復以淵及徐辯對為太史令世祖平統萬淵與辯俱見獲世祖以淵為太史令數見訪問神麚二年世祖將討蠕蠕淵與徐辯皆謂不宜行與崔浩爭於世祖前語在浩傳淵專守常占而不能鉤深致遠故不及浩後為驃騎軍謀祭酒嘗著觀象賦曰易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下然則三極雖殊妙本同一顯昧雖遐契齊影響尋其應感之符測乎冥通之數天人之際可見明矣夫機象冥緬至理幽玄豈伊管智所能究暢然歌詠之來偶同風人目閱群宿能不歌吟是時也歲次析木之津日在翼星之分閶闔晨鼓而蕭瑟流火夕暵以摧頹游氣眇其高搴辰宿煥焉華布睹時逝懷川上之感步秋林同宋生之戚歎巨艱之未終抱殷憂而不寐遂彷徨於窮谷之裏杖策陟神巖之側乃仰觀太虛縱目遠覽吟嘯之頃懍然增懷不覽至理拔自近情常韻發於宵夜不任詠歌之末遂援管而為賦其辭曰陟秀峰以遐眺望靈象於九霄睹紫宮之環周嘉帝坐之獨標瞻華蓋之蔭藹何虛中之迢迢觀閣道之穹隆想靈駕之電飄爾乃縱目遠覽傍極四維北鑒機衡南睹太微三台皦皦以雙列皇座冏冏以垂暉虎賁執銳於前階常陳屯聚於後闈遂回情旋首次目文昌仰見造父爰及王良傅說登天而乘尾奚仲託精於津陽織女朗列於河湄牽牛煥然而舒光五車亭柱於畢陰兩河俠井而相望灼灼群位落落幽紀設官分職罔不悉置儲貳副天庭延三吏論道納言各有攸司將相次序以衛守九卿珠連而內侍天街分中外之境四七列九土之異左則天紀槍棓攝提大角二咸防奢七公理獄庫樓炯炯以灼明騎官騰驤而奮足天市建肆於房心帝座磥落而電燭於前則老人天社清廟所居明堂配帝靈臺考符丈人極陽而慌忽子孫嘒嘒於參嵎天狗接狼以吠守野雞伺晨於參墟右則少微軒轅皇后之位嬪御相次尊卑有秩御宮典儀女史執筆內平秉禮以伺邪天牢禁愆而察失於後則有車府傳舍匏瓜天津扶匡照曜麗珠佩珍人星麗玄以閑逸哭泣連屬而趨墳河鼓震雷以𥔀磕騰蛇蟠縈而輪菌於是周章高眄還旋辰極既覿鉤陳中禁復睹天帝休息漸臺可昇離宮可即酒旗建醇醪之旌女床列窈窕之色輦道屈曲以微煥附路立于雲閣之側其列星之表五車之間乃有咸池鴻沼玉井天淵建樹百果竹林在焉江河炳著於上穹素氣霏霏其帶天神龜曜甲於清冷龍魚摛光以映連又有南門鼓吹器府之官奏彼絲竹為帝娛歡熊羆綿絡於天際虎豹儵煜而暉爛弧精引弓以持滿狼星搖動於霄端其外則有燕秦齊趙列國之名雷電霹靂雨落雲征陳車策駕於氐南天駟騁步於太清園苑周回以曲列倉廩區別而殊形內則尚書大理太一天一之宮柱下著術傳示無窮六甲候大帝之所須內廚進御膳於皇躬天船橫漢以普濟積水候災于其中陰德播洪施以恤不足四輔翼皇極而闡玄風恢恢太虛寥寥帝庭五座並設爰集神靈乃命熒惑伺彼驕盈執法刺舉於南端五侯議疑於水衡金火時出以成緯七宿匡衛而為經暐曄昱其並曜粲若三春之榮睹夫天官之羅布故作則於華京及其災異之興出無常所歸邪繽紛飛流電舉妖星起則殃及晉平蛇乘龍則禍連周楚或取證於逢公或推變於衝午乃有欽明光被填逆水府洪波滔天功隆大禹此則冥數之大運非治綱之失緒蓋象外之妙不可以粗理尋重玄之內難以熒燎睹至於精靈所感迅踰駭嚮荊軻慕丹則白虹貫日而不徹衛生畫策則太白食昴而摛朗魯陽指麾而曜靈為之回駕嚴陵來游而客氣著於乾象斯皆至感動於神祗誠應效於既往爾乃四氣鱗次斗建辰移雖無聲言三光是知星中定於昏明影度以之不差測水旱於未然占方來之安危陰精乘箕則大飆暮鼓西南入畢則淫雨滂沱譬猶晉鍾之應銅山風雲之從班螭若夫冥車潛駕時乘六虯大儀回運萬象俱流北斗俄其西傾群星忽以匿幽望舒縱轡以騁度靈輪浹旦而過周爾乃凝神遠矚矖目八荒察之無象視之眇茫狀若渾元之未判別又似浮海而睹滄浪幽遐迥以希夷寸眸焉能究其傍於是乎夜對山水栖心高鏡遠尋終古攸然獨詠美景星之繼晝大唐堯之德盛嘉黃星之靡鋒明虞舜之不競疇呂尚之宵夢善登輔而翼聖欽管仲之察微見虛危而知命歎熒惑之舍心高宋景之守政壯漢祖之入秦奇五緯之聚映爾乃歷象既周相佯巖際尋圖籍之所記著星變乎書契覽前代之將淪咸譴告於昏世桀斬諫以星孛紂酖荒而致彗恒不見以周衰枉蛇行而秦滅諒人事之有由豈妖災之虛設誠庸王之難悛故明君之所察堯無為猶觀象而況德非乎先哲先是太祖太宗時太史令王亮蘇坦世祖後破和龍得馮文通太史令閔盛高祖時太史令趙樊生並知天文後太史趙勝趙翼趙洪慶胡世榮胡法通等二族世業天官者又有容城令徐路善占候世宗時坐事繫冀州獄別駕崔隆宗就禁慰問路曰昨夜驛馬星流計赦即時應至隆宗先信之遂遣人試出城候焉俄而赦至時人重之永安中詔以恒州民高崇祖善天文每占吉凶有驗特除中散大夫永熙中詔通直散騎常侍孫僧化與太史令胡世榮張龍趙洪慶及中書舍人孫子良等在門下外省校比天文書集甘石二家星經及漢魏以來二十三家經占集為五十五卷後集諸家撮要前後所上雜占以類相從日月五星二十八宿中外官圖合為七十五卷僧化者東莞人識星分案天文占以言災異時有所中普泰中爾朱世隆惡其多言遂繫於廷尉免官永熙中出帝召僧化與中散大夫孫安都共撰兵法未就而帝入關遂罷元象中死於晉陽時有河間信都芳字王琳好學善天文算數甚為安豐王延明所知延明家有群書欲抄集五經算事為五經宗及古今樂事為樂書又聚渾天欹器地動銅烏漏刻候風諸巧事并圖畫為器準並令芳算之會延明南奔芳乃自撰注後隱於并州樂平之東山太守慕容保樂聞而召之芳不得已而見焉於是保樂弟紹宗薦之於齊獻武王以為中外府田曹參軍芳性清儉質樸不與物和紹宗給其騾馬不肯乘騎夜遣婢侍以試之芳忿呼毆擊不聽近己狷介自守無求於物後亦注重差勾股復撰史宗仍自注之合數十卷武定中卒殷紹長樂人也少聰敏好陰陽術數游學諸方達九章七曜世祖時為算生博士給事東宮西曹以藝術為恭宗所知太安四年夏上四序堪輿表曰臣以姚氏之世行學伊川時遇游遁大儒成公興從求九章要術興字廣明自云膠東人也山居隱跡希在人間興時將臣南到陽翟九崖巖沙門釋曇影間興即北還臣獨留住依止影所求請九章影復將臣向長廣東山見道人法穆法穆時共影為臣開述九章數家雜要披釋章次意況大旨又演隱審五藏六府心髓血脈商功大算端部變化玄象土圭周髀練精銳思蘊習四年從穆所聞粗皆髣髴穆等仁矜特垂憂閔復以先師和公所注黃帝四序經文三十六卷合有三百二十四章專說天地陰陽之本其第一孟序九卷八十一章說陰陽配合之原第二仲序九卷八十一章解四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交會相生為表裏第四季序九卷八十一章具釋六甲刑禍福德以此等文傳授於臣山神禁嚴不得齎出尋究經年粗舉綱要山居險難無以自供不堪窘迫心生懈怠以甲寅之年日維鶉火月呂林鍾景氣鬱盛感物懷歸奉辭影等自爾至今四十五載歷觀時俗堪輿八會逕世已久傳寫謬誤吉凶禁忌不能備悉或考良日而值惡會舉吉用凶多逢殃咎又史遷郝振中古大儒亦各撰注流行於世配會大小序述陰陽依如本經猶有所闕臣前在東宮以狀奏聞奉被景穆皇帝聖詔敕臣撰錄集其要最仰奉明旨謹審先所見四序經文抄撮要略當世所須吉凶舉動集成一卷上至天子下及庶人又貴賤階級尊卑差別吉凶所用罔不畢備未及內呈先帝晏駕臣時狼狽幾至不測停廢以來逕由八載思欲上聞莫能自徹加年夕齒頹餘齡旦暮每懼殂殞填仆溝壑先帝遺志不得宣行夙夜悲憤理難違匿依先撰錄奏謹以上聞請付中祕通儒達士定其得失事若可施乞即班用其四序堪輿遂大行於世王早勃海南皮人也明陰陽九宮及兵法尤善風角太宗時喪亂之後多相殺害有人詣早求問勝術早為設法令各無咎由是州里稱之時有東莞鄭氏因為同縣趙氏所殺其後鄭氏執得讎人趙氏又剋明晨會宗族當就墓所刑之趙氏求救於早早為占候并授以一符曰君今且還選壯士七人令一人為主者佩此符於雞鳴時伏在仇家宅東南二里許平旦當有十人相隨向西北行中有二人乘黑牛一黑牛最在前一黑牛應第七但捉取第七者將還事必無他趙氏從之果如其言乃是鄭氏五男父也諸子並為其族所宗敬故和解二家趙氏竟免後早與客清晨立於門內遇有卒風振樹早語客曰依法當有千里外急使日中將有兩匹馬一白一赤從西南來至即取我逼我不聽與妻子別語訖便入召家人鄰里辭別語訖浴帶書囊日中出門候使如期果有二馬一白一赤從涼州而至即捉早上馬遂詣行宮時世祖圍涼州未拔故許彥薦之早彥師也及至詔問何時當得此城早對曰陛下但移據西北角三日內必剋世祖從之如期而剋輿駕還都時久不雨世祖問早曰何時當雨早曰今日申時必大雨比至未時猶無片雲世祖召早詰之早曰願更少時至申時雲氣四合遂大雨滂沱世祖甚善之而早苦以疾辭乞歸鄉里詔許之遂終於家或言許彥以其術勝恐終妨己故譎令歸耳耿玄鉅鹿宋子人也善卜占坐於室內有客扣門玄已知其姓字并所齎持及來問之意其所卜筮十中八九別有林占世或傳之而性不和俗時有王公欲求其筮者玄則拒而不許每云今既貴矣更何所求而復卜也欲望意外乎代京法禁嚴切王公聞之莫不驚悚而退故玄多見憎忿不為貴勝所親官至鉅鹿太守顯祖高祖時有渤海高道埏清河趙法逞並有名於世世宗肅宗時奉車都尉清河魏道虔奉車都尉周恃魏郡太守章武高月光月光弟明月任玄智雍州人潘捺並長於陰陽卜筮故玄於日者之中最為優洽冠軍將軍濮陽賈元紹章武呂肫濟北馮道安河內馮懷海東郡李文殊並工於法術而道虔月光文殊為優其餘不及浮陽孟剛饒安王領郡善銓錄風角章武顏惡頭善卜筮亦用耿玄林占當時最知名范陽人劉弁亦有名於世劉靈助燕郡人師事劉弁好陰陽占卜而粗疏無賴常去來燕恒之界或時負販或復劫盜賣術於市後自代至秀容因事爾朱榮榮性信卜筮靈助所占屢中遂被親待為榮府功曹參軍建義初榮於河陰王公卿士悉見屠害時奉車都尉盧道虔兄弟亦相率朝於行宮靈助以其州里衛護之由是朝士與諸盧相隨免害者數十人榮入京師超拜光祿大夫封長子縣開國伯食邑七百戶尋進爵為公增邑通前千戶後從榮討擒葛榮特除散騎常侍撫軍將軍幽州刺史又從大將軍上黨王天穆討邢杲時幽州流民盧城人最為兇捍遂令靈助兼尚書軍前慰勞之事平而元顥入洛天穆渡河靈助先會爾朱榮於太行及將攻河內令靈助筮之靈助曰未時必剋時已尚中士眾疲怠靈助曰時至矣榮鼓之將士騰躍即便剋陷及至北中榮攻城不獲以時盛暑議欲且還以待秋涼莊帝詔靈助筮之靈助曰必當破賊詔曰何日靈助曰十八十九間果如其言車駕還宮領幽州大中正尋加征東將軍增邑五百戶進爵為燕郡公詔贈其父僧安為幽州刺史尋兼尚書左僕射慰勞幽州流民於濮陽頓丘因率民北還與都督侯淵等討葛榮餘黨韓婁滅之於薊仍釐州務加車騎將軍又為幽并營安四州行臺及爾朱榮死莊帝幽崩靈助本寒微一朝至此自謂方術堪能動眾又以爾朱有誅滅之兆靈助遂自號燕王車騎大將軍開府儀同三司大行臺為莊帝舉義兵靈助馴養大鳥稱為己瑞妄說圖讖言劉氏當王又云欲知避世入鳥村遂刻氈為人象畫桃木為符書作詭道厭祝之法民多信之於時河西人紇豆陵步藩舉兵逼晉陽爾朱兆頻戰不利故靈助唱言爾朱自然當滅不須我兵由是幽瀛滄冀之民悉從之從之者夜悉舉火為號不舉火者諸村共屠之以普泰元年三月率眾至博陵之安國城與叱列延慶侯淵爾朱羽生等戰戰敗被擒斬於定州傳首洛陽支分其體初靈助每云三月末我必入定州爾朱亦必滅及將戰靈助自筮之卦成不吉以手折蓍棄之於地云此何知也尋見擒果以三月入定州而齊獻武王以明年閏三月破四胡於韓陵山遂滅兆等永熙二年贈使持節散騎常侍都督幽瀛冀三州諸軍事驃騎大將軍尚書左僕射開府儀同三司幽州刺史諡曰恭子宗輝襲興和中開府屬齊受禪例降江式字法安陳留濟陽人六世祖瓊字孟琚晉馮翊太守善蟲篆詁訓永嘉大亂瓊棄官西投張軌子孫因居涼土世傳家業祖彊字文威太延五年涼州平內徙代京上書三十餘法各有體例又獻經史諸子千餘卷由是擢拜中書博士卒贈敦煌太守父紹興高允奏為祕書郎掌國史二十餘年以謹厚稱卒於趙郡太守式少專家學數年之中常夢兩人時相教授及寤每有記識初拜司徒長史兼行參軍檢校御史尋除殄寇將軍符節令以書文昭太后尊號諡冊特除奉朝請仍符節令式篆體尤工洛京宮殿諸門板題皆式書也延昌三年三月式上表曰臣聞庖羲氏作而八卦列其畫軒轅氏興而龜策彰其彩古史倉頡覽二象之爻觀鳥獸之跡別創文字以代結繩用書契以維事宣之王庭則百工以敘載之方冊則萬品以明迄于三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八歲入小學保氏教國子以六書一曰指事二曰象形三曰諧聲四曰會意五曰轉注六曰假借蓋是史頡之遺法也及宣王太史史籀著大篆十五篇與古文或同或異時人即謂之籀書至孔子定六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖別暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙高作爰歷篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附於小篆所作也以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復教以籀書又習八體試之課最以為尚書史吏民上書省字不正輒舉劾焉又有草書莫知誰始考其書形雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者獨張敞從之受涼州刺史杜鄴沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人說文字於未央宮中以禮為小學元士黃門侍郎楊雄採以作訓纂篇及亡新居攝自以應運制作使大司空甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰奇字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以幡信也壁中書者魯恭王壞孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好奇歎儒俗之穿鑿惋文毀於譽痛字敗於訾更詭任情變亂於世故撰說文解字十五篇首一終亥各有部屬包括六藝群書之詁評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物奇怪珍異王制禮儀世間人事莫不畢載可謂類聚群分雜而不越文質彬彬最可得而論也左中郎將陳留蔡邕採李斯曹喜之法為古今雜形詔於太學立石碑刊載五經題書楷法多是邕書也後開鴻都書畫奇能莫不雲集于時諸方獻篆無出邕者魏初博士清河張揖著埤倉廣雅古今字詁究諸埤廣綴拾遺漏增長事類抑亦於文為益者然其字詁方之許慎篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博聞古藝特善倉雅許氏字指八體六書精究閑理有名於揖以書教諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣校之說文篆隸大同而古字少異又有京兆韋誕河東衛覬二家並號能篆當時臺觀榜題寶器之銘悉是誕書咸傳之子孫世稱其妙晉世義陽王典祠令任城呂忱表上字林六卷尋其況趣附託許慎說文而按偶章句隱別古籀奇惑之字文得正隸不差篆意也忱弟靜別放故左校令李登聲類之法作韻集五卷宮商角徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯隸體失真俗學鄙習復加虛巧談辯之士又以意說炫惑於時難以釐改故傳曰以眾非非行正信哉得之於斯情矣乃曰追來為歸巧言為辯小兔為䨲神虫為蠶如斯甚眾皆不合孔氏古書史籀大篆許氏說文石經三字也凡所關古莫不惆悵焉嗟夫文字者六藝之宗王教之始前人所以垂今今人所以識古故曰本立而道生孔子曰必也正名乎又曰述而不作書曰予欲觀古人之象皆言遵修舊史而不敢穿鑿也臣六世祖瓊家世陳留往晉之初與從父兄應元俱受學於衛覬古篆之法倉雅方言說文之誼當時並收善譽而祖官至太子洗馬出為馮翊郡值洛陽之亂避地河西數世傳習斯業所以不墜也世祖太延中皇威西被牧犍內附臣亡祖文威杖策歸國奉獻五世傳掌之書古篆八體之法時蒙褒錄敘列於儒林官班文省家號世業暨臣闇短識學庸薄漸漬家風有忝無顯但逢時來恩出願外每承澤雲津廁霑漏潤驅馳文閣參預史官題篆宮禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎說文為主爰採孔氏尚書五經音注籀篇爾雅三倉凡將方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次類編聯文無復重糾為一部其古籀奇惑俗隸諸體咸使班於篆下各有區別詁訓假借之誼僉隨文而解音讀楚夏之聲並逐字而注其所不知者則闕如也脫蒙遂許冀省百氏之觀而同文字之域典書祕書所須之書乞垂敕給并學士五人嘗習文字者助臣披覽書生五人專令抄寫侍中黃門國子祭酒一月一監評議疑隱庶無紕繆所撰名目伏聽明旨詔曰可如所請并就太常冀兼教八書史也其有所須依請給之名目待書成重聞式於是撰集字書號曰古今文字凡四十卷大體依許氏說文為本上篆下隸又除宣威將軍符璽郎尋加輕車將軍正光中除驍騎將軍兼著作佐郎正史中字四年卒贈右將軍巴州刺史其書竟未能成式兄子征虜將軍順和亦工篆書先是太和中兗州人沈法會能隸書世宗之在東宮敕法會侍書已後隸迹見知於閭里者甚眾未有如崔浩之妙周澹京兆鄠人也為人多方術尤善醫藥為太醫令太宗嘗苦風頭眩澹治得愈由此見寵位至特進賜爵成德侯神瑞二年京師饑朝議將遷都於鄴澹與博士祭酒崔浩進計論不可之意太宗大然之曰唯此二人與朕意同也詔賜澹浩妾各一人御衣一襲絹五十匹綿五十斤泰常四年卒諡曰恭時有河南人陰貞家世為醫與澹並受封爵清河李潭亦以善鍼見知子驢駒襲傳術延興中位至散令李修字思祖本陽平館陶人父亮少學醫術未能精究世祖時奔劉義隆於彭城又就沙門僧坦研習眾方略盡其術針灸授藥莫不有效徐兗之間多所救恤四方疾苦不遠千里竟往從之亮大為廳事以舍病人停車輿於下時有死者則就而棺殯親往弔視其仁厚若此累遷府參軍督護本郡士門宿官咸相交昵車馬金帛酬賚無貲修兄元孫隨畢眾敬赴平城亦遵父業而不及以功賜爵義平子拜奉朝請修略與兄同晚入代京歷位中散令以功賜爵下蔡子遷給事中太和中常在禁內高祖文明太后時有不豫修侍鍼藥治多有效賞賜累加車服第宅號為鮮麗集諸學士及工書者百餘人在東宮撰諸藥方百餘卷皆行於世先是咸陽公高允雖年且百歲而氣力尚康高祖文明太后時令修診視之一旦奏言允脈竭氣微大命無遠未幾果亡遷洛為前軍將軍領太醫令後數年卒贈威遠將軍青州刺史子天授襲汶陽令醫術又不逮父徐謇字成伯丹陽人家本東莞與兄文伯等皆善醫藥謇因至青州慕容白曜平東陽獲之表送京師顯祖欲驗其所能乃置諸病人於幕中使謇隔而脈之深得病形兼知色候遂被寵遇為中散稍遷內侍長文明太后時問治方而不及李修之見任用也謇合和藥劑攻救之驗精妙於修而性甚祕忌承奉不得其意者雖貴為王公不為措療也高祖後知其能及遷洛稍加眷幸體小不平及所寵馮昭儀有疾皆令處治又除中散大夫轉右軍將軍侍御師謇欲為高祖合金丹致延年之法乃入居崧高採營其物歷歲無所成遂罷二十二年高祖幸懸瓠其疾大漸乃馳驛召謇令水路赴行所一日一夜行數百里至診省下治果有大驗高祖體少瘳內外稱慶九月車駕發豫州次于汝濱乃大為謇設太官珍膳因集百官特坐謇于上席遍陳餚觴于前命左右宣謇救攝危篤振濟之功宜加酬賚乃下詔曰夫神出無方形稟有礙憂喜乖適理必傷生朕覽萬機長鍾革運思芒芒而無怠身忽忽以興勞仲秋動痾心容頓竭氣體羸瘠玉几在慮侍御師右軍將軍徐成伯馳輪大室進療汝蕃方窮丹英藥盡芝石誠術兩輸忠妙俱至乃令沉勞勝愈篤瘵克痊論勤語效實宜褒錄昔晉武暴疾程和應增封辛疚數朝錢爵大墜況疾深於曩辰業難於疇日得不重加陟賞乎宜順群望錫以山河且其舊逕高秩中暫解退比雖銓用猶未準舊量今事合顯進可鴻臚卿金鄉縣開國伯食邑五百戶賜錢一萬貫又詔曰錢府未充須以雜物絹二千匹雜物一百匹四十匹出御府榖二千斛奴婢十口馬十匹一匹出驊騮牛十頭所賜雜物奴婢牛馬皆經內呈諸親王咸陽王禧等各有別賚並至千匹從行至鄴高祖猶自發動謇日夕左右明年從詣馬圈高祖疾勢遂甚戚戚不怡每加切誚又欲加之鞭捶幸而獲免高祖崩謇隨梓宮還洛謇常有藥餌及吞服道符年垂八十鬢髮不白力未多衰正始元年以老為光祿大夫加平北將軍卒延昌初贈安東將軍齊州刺史諡曰靖子踐字景升小名靈寶襲爵歷官兗州平東府長史右中郎將建興太守踐弟知遠給事中成伯孫之才孝昌初為蕭衍豫章王蕭綜北府主簿從綜鎮彭城綜降其下僚屬並奔散之才因入國武定中大將軍金紫光祿大夫昌安縣開國侯王顯字世榮陽平樂平人自言本東海郯人王朗之後也祖父延和中南奔居于魯郊又居彭城伯父安上劉義隆時板行館陶縣世祖南討安上棄縣歸命與父母俱徙平城例敘陽都子除廣寧太守顯父安道少與李亮同師俱學醫藥粗究其術而不及亮也安上還家樂平頗參士流顯少歷本州從事雖以醫術自通而明敏有決斷才用初文昭皇太后之懷世宗也夢為日所逐化而為龍而繞后后寤而驚悸遂成心疾文明太后敕召徐謇及顯等為后診脈謇云是微風入藏宜進湯加針顯云案三部脈非有心疾將是懷孕生男之象果如顯言久之召補侍御師尚書儀曹郎號稱幹事世宗自幼有微疾久未差愈顯攝療有效因是稍蒙眄識又罷六輔之初顯為領軍于烈問通規策頗有密功累遷游擊將軍拜廷尉少卿仍在侍御營進御藥出入禁內乞臨本州世宗曾許之積年未授因是聲問傳于遠近顯每語人言時旨已決必為刺史遂除平北將軍相州刺史尋詔馳驛還京復掌藥又遣還州元愉作逆顯討之不利入除太府卿御史中尉顯前後歷職所在著稱糾折庶獄究其姦回出內惜慎憂國如家及領憲臺多所彈劾百寮肅然又以中尉屬官不悉稱職諷求更換詔委改選務盡才能而顯所舉或有請屬未皆得人於是眾口諠譁聲望致損後世宗詔顯撰藥方三十五卷班布天下以療諸疾東宮既建以為太子詹事委任甚厚世宗每幸東宮顯常迎侍出入禁中仍奉醫藥賞賜累加為立館宇寵振當時延昌二年秋以營療之功封衛國縣伯四年正月世宗夜崩肅宗踐祚顯參奉璽策隨從臨哭微為憂懼顯既蒙任遇兼為法官恃勢使威為時所疾朝宰託以侍療無效執之禁中詔削爵位臨執呼冤直閤以刀鐶撞其腋下傷中吐血至右衛府一宿死始顯布衣為諸生有沙門相顯後當富貴誡其勿為吏官吏官必敗由是世宗時或欲令其遂攝吏部每殷勤避之及世宗崩肅宗夜即位受璽冊於儀須兼太尉及吏部倉卒百官不具以顯兼吏部行事矣崔彧字文若清河東武城人父勳之字寧國位大司馬外兵郎贈通直郎彧與兄相如俱自南入國相如以才學知名早卒彧少嘗詣青州逢隱逸沙門教以素問九卷及甲乙遂善醫術中山王英子略曾病王顯等不能療彧針之抽針即愈後位冀州別駕累遷寧遠將軍性仁恕見疾苦好與治之廣教門生令多救療其弟子清河趙約勃海郝文法之徒咸亦有名彧子景哲豪率亦以醫術知名為太中大夫司徒長史蔣少游樂安博昌人也慕容白曜之平東陽見俘入於平城充平齊戶後配雲中為兵性機巧頗能畫刻有文思吟詠之際時有短篇遂留寄平城以傭寫書為業而名猶在鎮後被召為中書寫書生與高聰俱依高允允愛其文用遂並薦之與聰俱補中書博士自在中書恒庇李沖兄弟子姪之門始北方不悉青州蔣族或謂少游本非人士又少游微因工藝自達是以公私人望不至相重唯高允李沖曲為體練由少游舅氏崔光與李沖從叔衍對門婚姻也高祖文明太后常因密宴謂百官曰本謂少游作師耳高允老公乃言其人士眷識如此然猶驟被引命屑屑禁闥以規矩刻繢為務因此大蒙恩錫超等備位而亦不遷陟也及詔尚書李沖與馮誕游明根高閭等議定衣冠於禁中少游巧思令主其事亦訪於劉昶二意相乖時致諍競積六載乃成始班賜百官冠服之成少游有效焉後於平城將營太廟太極殿遣少游乘傳詣洛量準魏晉基趾後為散騎侍郎副李彪使江南高祖修船乘以其多有思力除都水使者遷前將軍兼將作大匠仍領水池湖泛戲舟楫之具及華林殿沼修舊增新改作金墉門樓皆所措意號為妍美雖有文藻而不得伸其才用恒以剞劂繩尺碎劇怱怱徙倚園湖城殿之側識者為之歎慨而乃坦爾為己任不告疲恥又兼太常少卿都水如故景明二年卒贈龍驤將軍青州刺史諡曰質有文集十卷餘少游又為太極立模範與董爾王遇等參建之皆未成而卒初高宗時郭善明甚機巧北京宮殿多其製作高祖時青州刺史侯文和亦以巧聞為要舟水中立射滑稽多智辭說無端尤善淺俗委巷之語至可翫笑位樂陵濟南二郡太守世宗肅宗時豫州人柳儉殿中將軍關文備郭安興並機巧洛中製永寧寺九層佛圖安興為匠也高祖時有范寧兒者善圍碁曾與李彪使蕭賾賾令江南上品王抗與寧兒制勝而還又有浮陽高光宗善樗蒲趙國李幼序洛陽丘何奴並工握槊此蓋胡戲近入中國云胡王有弟一人遇罪將殺之弟從獄中為此戲以上之意言孤則易死也世宗以後大盛於時史臣曰陰陽卜祝之事聖哲之教存焉雖不可以專亦不可得而廢也徇於是者不能無非厚於利者必有其害詩書禮樂所失也鮮故先王重其德方術技巧所失也深故往哲輕其藝夫能通方術而不詭於俗習伎巧而必蹈於禮者幾于大雅君子故昔之通賢所以戒乎妄作晁崇張淵王早殷紹耿玄劉靈助皆術藝之士也觀其占候卜筮推步盈虛通幽洞微近知鬼神之情狀周澹李修徐謇王顯崔彧方藥特妙各一時之美也蔣少游以剞劂見知沒其學思藝成為下其近是乎
