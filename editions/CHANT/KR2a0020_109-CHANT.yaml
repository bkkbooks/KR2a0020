body:
  text: 卷一百三補列傳第九十一蠕蠕匈奴宇文莫槐徒何段就六眷高車蠕蠕東胡之苗裔也姓郁久閭氏始神元之末掠騎有得一奴髮始齊眉忘本姓名其主字之曰木骨閭木骨閭者首禿也木骨閭與郁久閭聲相近故後子孫因以為氏木骨閭既壯免奴為騎卒穆帝時坐後期當斬亡匿廣漠谿谷間收合逋逃得百餘人依紇突鄰部木骨閭死子車鹿會雄健始有部眾自號柔然而役屬於國後世祖以其無知狀類於蟲故改其號為蠕蠕車鹿會既為部帥歲貢馬畜貂豽皮冬則徙度漠南夏則還居漠北車鹿會死子吐奴傀立吐奴傀死子跋提立跋提死子地粟袁立地粟袁死其部分為二地粟袁長子匹候跋繼父居東邊次子縕紇提別居西邊及昭成崩縕紇提附衛辰而貳於我登國中討之蠕蠕移部遁走追之及於大磧南床山下大破之虜其半部匹候跋及部帥屋擊各收餘落遁走遣長孫嵩及長孫肥追之渡磧嵩至平望川大破屋擊禽之斬以徇肥至涿邪山及匹候跋跋舉落請降獲縕紇提子曷多汗及曷多汗兄詰歸之社崙斛律等并宗黨數百人分配諸部縕紇提西遁將歸衛辰太祖追之至跋那山縕紇提復降太祖撫慰如舊九年曷多汗與社崙率部眾棄其父西走長孫肥輕騎追之至上郡跋那山斬曷多汗盡殪其眾社崙與數百人奔匹候跋匹候跋處之南鄙去其庭五百里令其子四人監之既而社崙率其私屬執匹候跋四子而叛襲匹候跋諸子收餘眾亡依高車斛律部社崙兇狡有權變月餘乃釋匹候跋歸其諸子欲聚而殲之密舉兵襲匹候跋殺匹候跋子啟拔吳頡等十五人歸于太祖社崙既殺匹候跋懼王師討之乃掠五原以西諸部北度大漠太祖以拔頡為安遠將軍平棘侯社崙與姚興和親太祖遣材官將軍和突襲黜弗素古延諸部社崙遣騎救素古延突逆擊破之社崙遠遁漠北侵高車深入其地遂并諸部凶勢益振北徙弱洛水始立軍法千人為軍軍置將一人百人為幢幢置帥一人先登者賜以虜獲退懦者以石擊首殺之或臨時捶撻無文記將帥以羊屎粗計兵數後頗知刻木為記其西北有匈奴餘種國尤富彊部帥曰拔也稽舉兵擊社崙社崙逆戰於頞根河大破之後盡為社崙所并號為彊盛隨水草畜牧其西則焉耆之地東則朝鮮之地北則渡沙漠窮瀚海南則臨大磧其常所會庭則敦煌張掖之北小國皆苦其寇抄羈縻附之於是自號丘豆伐可汗丘豆伐猶魏言駕馭開張也可汗猶魏言皇帝也蠕蠕之俗君及大臣因其行能即為稱號若中國立諡既死之後不復追稱太祖謂尚書崔玄伯曰蠕蠕之人昔來號為頑嚚每來抄掠駕牸牛奔遁驅犍牛隨之牸牛伏不能前異部人有教其以犍牛易之者蠕蠕曰其母尚不能行而況其子終於不易遂為敵所虜今社崙學中國立法置戰陳卒成邊害道家言聖人生大盜起信矣天興五年社崙聞太祖征姚興遂犯塞入參合陂南至豺山及善無北澤時遣常山王遵以萬騎追之不及天賜中社崙從弟悅代大那等謀殺社崙而立大那發覺大那等來奔以大那為冠軍將軍西平侯悅代為越騎校尉易陽子三年夏社崙寇邊永興元年冬又犯塞二年太宗討之社崙遁走道死其子度拔年少未能御眾部落立社崙弟斛律號藹苦蓋可汗魏言姿質美好也斛律北并賀術也骨國東破譬曆辰部落三年斛律宗人悅侯咄觝干等數百人來降斛律畏威自守不敢南侵北邊安靜神瑞元年與馮跋和親跋聘斛律女為妻將為交婚斛律長兄子步鹿真謂斛律曰女小遠適憂思生疾可遣大臣樹黎勿地延等女為媵斛律不許步鹿真出謂樹黎等曰斛律欲令汝女為媵遠至他國黎遂共結謀令勇士夜就斛律穹廬候伺其出執之與女俱嬪于和龍乃立步鹿真步鹿真立委政樹黎初高車叱洛侯者叛其渠帥導社崙破諸部落社崙德之以為大人步鹿真與社崙子社拔共至叱洛侯家婬其少妻少妻告步鹿真叱洛侯欲舉大檀為主遺大檀金馬勒為信步鹿真聞之歸發八千騎往圍叱洛侯叱洛侯焚其珍寶自刎而死步鹿真遂掩大檀大檀發軍執步鹿真及社拔絞殺之乃自立大檀者社崙季父僕渾之子先統別部鎮於西界能得眾心國人推戴之號牟汗紇升蓋可汗魏言制勝也斛律父子既至和龍馮跋封為上谷侯大檀率眾南徙犯塞太宗親討之大檀懼而遁走遣山陽侯奚斤等追之遇寒雪士眾凍死墮指者十二三及太宗崩世祖即位大檀聞而大喜始光元年秋乃寇雲中世祖親討之三日二夜至雲中大檀騎圍世祖五十餘重騎逼馬首相次如堵焉士卒大懼世祖顏色自若眾情乃安先是大檀弟大那與社崙爭國敗而來奔大檀以大那子於陟斤為部帥軍士射於陟斤殺之大檀恐乃還二年世祖大舉征之東西五道並進平陽王長孫翰等從黑漠汝陰公長孫道生從白黑兩漠間車駕從中道東平公娥清次西從栗園宜城王奚斤將軍安原等西道從爾寒山諸軍至漠南舍輜重輕騎齎十五日糧絕漠討之大檀部落駭驚北走神麚元年八月大檀遣子將騎萬餘人入塞殺掠邊人而走附國高車追擊破之帝自廣寧還追之不及二年四月世祖練兵于南郊將襲大檀公卿大臣皆不願行術士張淵徐辯以天文說止世祖世祖從崔浩計而行會江南使還稱劉義隆欲犯河南謂行人曰汝疾還告魏主歸我河南地即當罷兵不然盡我將士之力世祖聞而大笑告公卿曰龜鱉小豎自救不暇何能為也就使能來若不先滅蠕蠕便是坐待寇至腹背受敵非上策也吾行決矣於是車駕出東道向黑山平陽王長孫翰從西道向大娥山同會賊庭五月次于沙漠南舍輜重輕襲之至栗水大檀眾西奔弟匹黎先典東落將赴大檀遇翰軍翰縱騎擊之殺其大人數百大檀聞之震怖將其族黨焚燒廬舍絕跡西走莫知所至於是國落四散竄伏山谷畜產布野無人收視世祖緣栗水西行過漢將竇憲故壘六月車駕次於兔園水去平城三千七百里分軍搜討東至瀚海西接張掖水北渡燕然山東西五千餘里南北三千里高車諸部殺大檀種類前後歸降三十餘萬俘獲首虜及戎馬百餘萬匹八月世祖聞東部高車屯巳尼陂人畜甚眾去官軍千餘里遂遣左僕射安原等往討之暨巳尼陂高車諸部望軍降者數十萬大檀部落衰弱因發疾而死子吳提立號敕連可汗魏言神聖也四年遣使朝獻先是北鄙候騎獲吳提南偏邏者二十餘人世祖賜之衣服遣歸吳提上下感德故朝貢焉世祖厚賓其使而遣之延和三年二月以吳提尚西海公主又遣使人納吳提妹為夫人又進為左昭儀吳提遣其兄禿鹿傀及左右數百人來朝獻馬二千匹世祖大悅班賜甚厚至太延二年乃絕和犯塞四年車駕幸五原遂征之樂平王丕河東公賀多羅督十五將出東道永昌王健宜都王穆壽督十五將出西道車駕出中道至浚稽山分中道復為二道陳留王崇從大澤向涿邪山車駕從浚稽北向天山西登白阜刻石記行不見蠕蠕而還時漠北大旱無水草軍馬多死五年車駕西伐沮渠牧犍宜都王穆壽輔景穆居守長樂王嵇敬建寧王崇二萬人鎮漠南以備蠕蠕吳提果犯塞壽素不設備賊至七介山京邑大駭爭奔中城司空長孫道生拒之於吐頹山吳提之寇也留其兄乞列歸與北鎮諸軍相守敬崇等破乞列歸於陰山之北獲之乞列歸歎曰沮渠陷我也獲其伯父他吾無鹿胡及其將帥五百人斬首萬餘級吳提聞而遁走道生追之至于漠南而還真君四年車駕幸漠南分四道樂安王範建寧王崇各統十五將出東道樂平王丕督十五將出西道車駕出中道中山王辰領十五將為中軍後繼車駕至鹿渾谷與賊將遇吳提遁走追至頞根河擊破之車駕至石水而還五年復幸漠南欲襲吳提吳提遠遁乃還吳提死子吐賀真立號處可汗魏言唯也十年正月車駕北伐高涼王那出東道略陽王羯兒出西道車駕與景穆自中道出涿邪山吐賀真別部帥爾綿他拔等率千餘家來降是時軍行數千里吐賀真新立恐懼遠遁九月車駕北伐高涼王那出東道略陽王羯兒出中道與諸軍期會於地弗池吐賀真悉國精銳軍資甚盛圍那數十重那掘長圍堅守相持數日吐賀真數挑戰輒不利以那眾少而固疑大軍將至解圍夜遁那引軍追之九日九夜吐賀真益懼棄輜重踰穹隆嶺遠遁那收其輜重引軍還與車駕會於廣澤略陽王羯兒盡收其人戶畜產百餘萬自是吐賀真遂單弱遠竄邊疆息警矣太安四年車駕北征騎十萬車十五萬兩旌旗千里遂渡大漠吐賀真遠遁其莫弗烏朱駕頹率眾數千落來降乃刊石記功而還世祖征伐之後意存休息蠕蠕亦怖威北竄不敢復南和平五年吐賀真死子予成立號受羅部真可汗魏言惠也自稱永康元年率部侵塞北鎮遊軍大破其眾皇興四年予成犯塞車駕北討京兆王子推東陽公元丕督諸軍出西道任城王雲等督軍出東道汝陰王賜濟南公羅烏拔督軍為前鋒隴西王源賀督諸軍為後繼諸將會車駕于女水之濱顯祖親誓眾詔諸將曰用兵在奇不在眾也卿等為朕力戰方略已在朕心乃選精兵五千人挑戰多設奇兵以惑之虜眾奔潰逐北三十餘里斬首五萬級降者萬餘人戎馬器械不可稱計旬有九日往返六千餘里改女水曰武川遂作北征頌刊石紀功延興五年予成求通婚娉有司以予成數犯邊塞請絕其使發兵討之顯祖曰蠕蠕譬若禽獸貪而亡義朕要當以信誠待物不可抑絕也予成知悔前非遣使請和求結姻援安可孤其款意乃詔報曰所論婚事今始一反尋覽事理未允厥中夫男而下女爻象所明初婚之吉敦崇禮娉君子所以重人倫之本不敬其初令終難矣予成每懷譎詐終顯祖世更不求婚太和元年四月遣莫河去汾比拔等來獻良馬貂裘比拔等稱伏承天朝珍寶華麗甚積求一觀之乃敕有司出御府珍玩金玉文繡器物御廄文馬奇禽異獸及人間所宜用者列之京肆令其歷觀焉比拔見之自相謂曰大國富麗一生所未見也二年二月又遣比拔等朝貢尋復請婚焉高祖志存招納許之予成雖歲貢不絕而款約不著婚事亦停九年予成死子豆崙立號伏名敦可汗魏言恒也自稱太平元年豆崙性殘暴好殺其臣侯醫垔石洛候數以忠言諫之又勸與國通和勿侵中國豆崙怒誣石洛候謀反殺之夷其三族十六年八月高祖遣陽平王頤左僕射陸叡並為都督領軍斛律桓等十二將七萬騎討豆崙部內高車阿伏至羅率眾十餘萬落西走自立為主豆崙與叔父那蓋為二道追之豆崙出自浚稽山北而西那蓋出自金山豆崙頻為阿伏至羅所敗那蓋累有勝捷國人咸以那蓋為天所助欲推那蓋為主那蓋不從眾彊之那蓋曰我為臣不可焉能為主眾乃殺豆崙母子以屍示那蓋那蓋乃襲位那蓋號候其伏代庫者可汗魏言悅樂也自稱太安元年那蓋死子伏圖立號他汗可汗魏言緒也自稱始平元年正始三年伏圖遣使紇奚勿六跋朝獻請求通和世宗不報其使詔有司敕勿六跋曰蠕蠕遠祖社崙是大魏叛臣往者包容暫時通使今蠕蠕衰微有損疇日大魏之德方隆周漢跨據中原指清八表正以江南未平權寬北掠通和之事未容相許若修藩禮款誠昭著者當不孤爾也永平元年伏圖又遣勿六跋奉函書一封并獻貂裘世宗不納依前喻遣伏圖西征高車為高車王彌俄突所殺子醜奴立號豆羅伏跋豆伐可汗魏言彰制也自稱建昌元年永平四年九月醜奴遣沙門洪宣奉獻珠像延昌三年冬世宗遣驍騎將軍馬義舒使於醜奴未發而崩事遂停寢醜奴壯健善用兵四年遣使俟斤尉比建朝貢熙平元年西征高車大破之禽其王彌俄突殺之盡并叛者國遂彊盛二年又遣俟斤尉比建紇奚勿六跋鞏顧禮等朝貢神龜元年二月肅宗臨顯陽殿引顧禮等二十人於殿下遣中書舍人徐紇宣詔讓以蠕蠕藩禮不備之意初豆崙之死也那蓋為主伏圖納豆崙之妻俟呂陵氏生醜奴阿那瓌等六人醜奴立後忽亡一子字祖惠求募不能得有尼引副升牟妻是豆渾地萬年二十許為醫巫假託神鬼先常為醜奴所信出入去來乃言此兒今在天上我能呼得醜奴母子欣悅後歲仲秋在大澤中施帳屋齋潔七日祈請天神經一宿祖惠忽在帳中自云恒在天上醜奴母子抱之悲喜大會國人號地萬為聖女納為可賀敦授夫副升牟爵位賜牛馬羊三千頭地萬既挾左道亦有姿色醜奴甚加重愛信用其言亂其國政如是積歲祖惠年長其母問之祖惠言我恒在地萬家不嘗上天上天者地萬教也其母具以狀告醜奴醜奴言地萬懸鑒遠事不可不信勿用讒言也既而地萬恐懼譖祖惠於醜奴醜奴陰殺之正光初醜奴母遣莫何去汾李具列等絞殺地萬醜奴怒欲誅具列等又阿至羅侵醜奴醜奴擊之軍敗還為母與其大臣所殺立醜奴弟阿那瓌立經十日其族兄俟力發示發率眾數萬以伐阿那瓌阿那瓌戰敗將弟乙居伐輕騎南走歸國阿那瓌母候呂陵氏及其二弟尋為示發所殺而阿那瓌未之知也九月阿那瓌將至肅宗遣兼侍中陸希道為使主兼散騎常侍孟威為使副迎勞近畿使司空公京兆王繼至北中侍中崔光黃門郎元纂在近郊並申宴勞引至門闕下十月肅宗臨顯陽殿引從五品以上清官皇宗藩國使客等列於殿庭王公以下及阿那瓌等入就庭中北面位定謁者引王公以下升殿阿那瓌位於藩王之下又引將命之官及阿那瓌弟并二叔位於群官之下遣中書舍人曹道宣詔勞問阿那瓌啟云陛下優隆命臣弟叔等升殿預會但臣有從兄在北之日官高於二叔乞命升殿詔聽之乃位於阿那瓌弟之下二叔之上宴將罷阿那瓌執啟立於座後詔遣舍人常景問所欲言阿那瓌求詣殿前詔引之阿那瓌再拜跽曰臣先世源由出於大魏詔曰朕已具之阿那瓌起而言曰臣之先逐草放牧遂居漠北詔曰卿言未盡可具陳之阿那瓌又言曰臣先祖以來世居北土雖復隔越山津而乃恭心慕化未能時宣者正以高車悖逆臣國擾攘不暇遣使以宣遠誠自頃年以前漸定高車及臣兄為主故遣鞏顧禮等使來大魏實欲虔修藩禮是以曹道芝北使之日臣與主兄即遣大臣五人拜受詔命臣兄弟本心未及上徹但高車從而侵暴中有姦臣因亂作逆殺臣兄立臣為主裁過旬日臣以陛下恩慈如天是故倉卒輕身投國歸命陛下詔曰具卿所陳理猶未盡可更言之阿那瓌再拜受詔起而言曰臣以家難輕來投闕老母在彼萬里分張本國臣民皆已迸散陛下隆恩有過天地求乞兵馬還向本國誅翦叛逆收集亡散陛下慈念賜借兵馬老母若在得生相見以申母子之恩如其死也即得報讎以雪大恥臣當統臨餘人奉事陛下四時之貢不敢闕絕陛下聖顏難睹敢有披陳但所欲言者口不能盡言別有辭啟謹以仰呈願垂昭覽仍以啟付舍人常景具以奏聞尋封阿那瓌朔方郡公蠕蠕主賜以衣冕加之軺蓋祿恤儀衛同于戚藩十二月肅宗以阿那瓌國無定主思還綏集啟請切至詔議之時朝臣意有同異或言聽還或言不可領軍元叉為宰相阿那瓌私以金百斤貨之遂歸北二年正月阿那瓌等五十四人請辭肅宗臨西堂引見阿那瓌及其伯叔兄弟五人升階賜坐遣中書舍人穆弼宣勞阿那瓌等拜辭詔賜阿那瓌細明光人馬鎧二具鐵人馬鎧六具露絲銀纏槊二張并白眊赤漆槊十張并白眊黑漆槊十張并幡露絲弓二張并箭朱漆柘弓六張并箭黑漆弓十張并箭赤漆楯六幡并刀黑漆楯六幡并刀赤漆鼓角二十具五色錦被二領黃綢被褥三十具私府繡袍一領并帽內者緋納襖一領緋袍二十領并帽內者雜綵千段緋納小口袴褶一具內中宛具紫納大口袴褶一具內中宛具百子帳十八具黃布幕六張新乾飯一百石麥麨八石榛麨五石銅烏錥四枚柔鐵烏錥二枚各受二斛黑漆竹榼四枚各受五升婢二口父草馬五百匹駝百二十頭牸牛一百頭羊五千口朱畫盤器十合粟二十萬石至鎮給之詔侍中崔光黃門元纂郭外勞遣阿那瓌來奔之後其從父兄俟力發婆羅門率數萬人入討示發破之示發走奔地豆于為其所殺推婆羅門為主號彌偶可社句可汗魏言安靜也時安北將軍懷朔鎮將楊鈞表傳聞彼人已立主是阿那瓌同堂兄弟夷人獸心已相君長恐未肯以殺兄之人郊迎其弟輕往虛反徒損國威自非廣加兵眾無以送其入北二月肅宗詔舊經蠕蠕使者牒云具仁往喻婆羅門迎阿那瓌復藩之意婆羅門殊自驕慢無遜避之心責具仁禮敬具仁執節不屈婆羅門遣大官莫何去汾俟斤丘升頭六人將兵一千隨具仁迎阿那瓌五月具仁還鎮論彼事勢阿那瓌慮不敢入表求還京會婆羅門為高車所逐率十部落詣涼州歸降於是蠕蠕數萬相率迎阿那瓌七月阿那瓌啟云投化蠕蠕元退社渾河旃等二人以今月二十六日到鎮云國土大亂姓姓別住迭相抄掠當今北人鵠望待拯今乞依前恩賜給精兵一萬還令督率送臣磧北撫定荒人脫蒙所請事必克濟詔付尚書門下博議八月詔兼散騎常侍王遵業馳驛宣旨慰阿那瓌并申賜賚九月蠕蠕後主俟匿伐來奔懷朔鎮阿那瓌兄也列稱規望乞軍并請阿那瓌十月錄尚書事高陽王雍尚書令李崇侍中侯剛尚書左僕射元欽侍中元叉侍中安豐王延明吏部尚書元修義尚書李彥給事黃門侍郎元纂給事黃門侍郎張烈給事黃門侍郎盧同等奏曰竊聞漢立南北單于晉有東西之稱皆所以相維禦難為國藩籬今臣等參議以為懷朔鎮北土名無結山吐若奚泉敦煌北西海郡即漢晉舊障二處寬平原野彌沃阿那瓌宜置吐若奚泉婆羅門宜置西海郡各令總率部落收離聚散其爵號及資給所須唯恩裁處彼臣下之官任其舊俗阿那瓌所居既是境外宜少優遣以示威刑請沃野懷朔武川鎮各差二百人令當鎮軍主監率給其糧仗送至前所仍於彼為其造構功就聽還諸於北來在婆羅門前投化者令州鎮上佐準程給糧送詣懷朔阿那瓌鎮與使人量給食稟在京館者任其去留阿那瓌草創先無儲積請給朔州麻子乾飯二千斛官駝運送婆羅門居於西海既是境內資衛不得同之阿那瓌等新造藩屏宜各遣使持節馳驛先詣慰喻并委經略肅宗從之十二月詔安西將軍廷尉元洪超兼尚書行臺詣敦煌安置婆羅門婆羅門尋與部眾謀叛投嚈噠嚈噠三妻皆婆羅門姊妹也仍為州軍所討禽之三年十二月阿那瓌上表乞粟以為田種詔給萬石四年阿那瓌眾大饑入塞寇抄肅宗詔尚書左丞元孚兼行臺尚書持節喻之孚見阿那瓌為其所執以孚自隨驅掠良口二千公私驛馬牛羊數十萬北遁謝孚放還詔驃騎大將軍尚書令李崇等率騎十萬討之出塞三千餘里至瀚海不及而還俟匿伐至洛陽肅宗臨西堂引見之五年婆羅門死於洛南之館詔贈使持節鎮西將軍秦州刺史廣牧公是歲沃野鎮人破六韓拔陵反諸鎮相應孝昌元年春阿那瓌率眾討之詔遣牒云具仁齎雜物勞賜阿那瓌阿那瓌拜受詔命勒眾十萬從武川鎮西向沃野頻戰克捷四月肅宗又遣兼通直散騎常侍中書舍人馮俊使阿那瓌宣勞班賜有差阿那瓌部落既和士馬稍盛乃號敕連頭兵豆伐可汗魏言把攬也十月阿那瓌復遣郁久閭彌娥等朝貢三年四月阿那瓌遣使人鞏鳳景等朝貢及還肅宗詔之曰北鎮群狄為逆不息蠕蠕主為國立忠助加誅討言念誠心無忘寢食今知停在朔垂與爾朱榮鄰接其嚴勒部曲勿相暴掠又近得蠕蠕主啟更欲為國東討但蠕蠕主世居北漠不宜炎夏今可且停聽待後敕蓋朝廷慮其反覆也此後頻使朝貢建義初孝莊詔曰夫勳高者賞重德厚者名隆蠕蠕主阿那瓌鎮衛北藩禦侮朔表遂使陰山息警弱水無塵刊跡狼山銘功瀚海至誠既篤勳緒莫酬故宜摽以殊禮何容格以常式自今以後讚拜不言名上書不稱臣太昌元年六月阿那瓌遣烏句蘭樹什伐等朝貢并為長子請尚公主永熙二年四月出帝詔以范陽王誨之長女琅邪公主許之未及婚帝入關齊獻武王遣使說之阿那瓌遣使朝貢求婚獻武王方招四遠以常山王妹樂安公主許之改為蘭陵公主瓌遣奉馬千匹為娉禮迎公主詔宗正元壽送公主往北自是朝貢相尋瓌以齊獻武王威德日盛請致愛女於王靜帝詔王納之自此塞外無塵矣匈奴宇文莫槐出於遼東塞外其先南單于遠屬也世為東部大人其語與鮮卑頗異人皆翦髮而留其頂上以為首飾長過數寸則截短之婦女披長襦及足而無裳焉秋收烏頭為毒藥以射禽獸莫槐虐用其民為部人所殺更立其弟普撥為大人普撥死子丘不勤立尚平文女丘不勤死子莫廆立本名犯太祖諱莫廆遣弟屈雲攻慕容廆廆擊破之又遣別部素延伐慕容廆於棘城復為慕容廆所破時莫廆部眾彊盛自稱單于塞外諸部咸畏憚之莫廆死子遜昵延立率眾攻慕容廆於棘城廆子翰先戍於外遜昵延謂其眾曰翰素果勇必為人患宜先取之城不足憂也乃分騎數千襲翰翰聞之使人詐為段末波使者逆謂遜昵延曰翰數為吾患久思除之今聞來討甚善戒嚴相待宜兼路早赴翰設伏待之遜昵延以為信然長驅不備至於伏所為翰所虜翰馳使告廆乘勝遂進及晨而至廆亦盡銳應之遜昵延見而方嚴率眾逆戰前鋒始交而翰已入其營縱火燎之眾乃大潰遜昵延單馬奔還悉俘其眾遜昵延父子世雄漠北又先得玉璽三紐自言為天所相每自夸大及此敗也乃卑辭厚幣遣使朝獻于昭帝帝嘉之以女妻焉遜昵延死子乞得龜立復伐慕容廆廆拒之惠帝三年乞得龜屯保澆水固壘不戰遣其兄悉跋堆襲廆子仁于柏林仁逆擊斬悉跋堆廆又攻乞得龜克之乞得龜單騎夜奔悉虜其眾乘勝長驅入其國城收資財億計徙部民數萬戶以歸先是海出大龜枯死於平郭至是而乞得龜敗別部人逸豆歸殺乞得龜而自立與慕容晃相攻擊遣其國相莫渾伐晃而莫渾荒酒縱獵為晃所破死者萬餘人建國八年晃伐逸豆歸逸豆歸拒之為晃所敗殺其驍將涉亦干逸豆歸遠遁漠北遂奔高麗晃徙其部眾五千餘落於昌黎自此散滅矣徒何段就六眷本出於遼西其伯祖日陸眷因亂被賣為漁陽烏丸太庫辱官家奴諸大人集會幽州皆持唾壺唯庫辱官獨無乃唾日陸眷口中日陸眷因咽之西向拜天曰願使主君之智慧祿相盡移入我腹中其後漁陽大饑庫辱官以日陸眷為健使將之詣遼西逐食招誘亡叛遂至彊盛日陸眷死弟乞珍代立乞珍死子務目塵代立即就六眷父也據有遼西之地而臣於晉其所統三萬餘家控絃上馬四五萬騎穆帝時幽州刺史王浚以段氏數為己用深德之乃表封務目塵為遼西公假大單于印綬浚使務目塵率萬餘騎伐石勒於常山封龍山下大破之務目塵死就陸眷立就陸眷與弟匹磾從弟末波等率五萬餘騎圍石勒於襄國勒登城望之見將士皆釋仗寢臥無警備之意勒因其懈怠選募勇健穿城突出直衝末波生禽之置之座上與飲宴盡歡約為父子盟誓而遣之末波既得免就陸眷等遂攝軍而還不復報浚歸于遼西自此以後末波常不敢南向溲焉人問其故末波曰吾父在南其感勒不害己也如此就陸眷死其子幼弱匹磾與劉琨世子群奔喪匹磾陰卷甲而往欲殺其從叔羽鱗及末波而奪其國末波等知之遣軍逆擊匹磾劉群為末波所獲匹磾走還薊懼琨禽己請琨宴會因執而害之匹磾既殺劉琨與羽鱗末波自相攻擊部眾乖離欲擁其眾徙保上谷阻軍都之險以拒末波等平文帝聞之陰嚴精騎將擊之匹磾恐懼南奔樂陵後石勒遣石虎擊段文鴦于樂陵破之生擒文鴦匹磾遂率其屬及諸塢壁降于石勒末波自稱幽州刺史屯遼西末波死國人立日陸眷孫護遼為主烈帝時假護遼驃騎大將軍幽州刺史大單于北平公弟鬱蘭撫軍將軍冀州刺史渤海公建國元年石虎征護遼於遼西護遼奔平岡山遂投慕容晃晃殺之鬱蘭奔石虎以所徙鮮卑五千人配之使屯令支鬱蘭死子龕代之及冉閔之亂龕率眾南移遂據齊地慕容俊使弟玄恭帥眾伐龕於廣固執龕送之薊俊毒其目而殺之坑其徒三千餘人高車蓋古赤狄之餘種也初號為狄歷北方以為敕勒諸夏以為高車丁零其語略與匈奴同而時有小異或云其先匈奴之甥也其種有狄氏袁紇氏斛律氏解批氏護骨氏異奇斤氏俗云匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國北無人之地築高臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間耳復一年乃有一老狼晝夜守臺嗥呼因穿臺下為空穴經時不去其小女曰吾父處我於此欲以與天而今狼來或是神物天使之然將下就之其姊大驚曰此是畜生無乃辱父母也妹不從下為狼妻而產子後遂滋繁成國故其人好引聲長歌又似狼嗥無都統大帥當種各有君長為性粗猛黨類同心至於寇難翕然相依鬭無行陳頭別衝突乍出乍入不能堅戰其俗蹲倨褻黷無所忌避婚姻用牛馬納聘以多為榮結言既定男黨營車闌馬令女黨恣取上馬袒乘出闌馬主立於闌外振手驚馬不墜者即取之墜則更取數滿乃止俗無穀不作酒迎婦之日男女相將持馬酪熟肉節解主人延賓亦無行位穹廬前叢坐飲宴終日復留其宿明日將婦歸既而將夫黨還入其家馬群極取良馬父母兄弟雖惜終無言者頗諱取寡婦而優憐之其畜產自有記識雖闌縱在野終無妄取俗不清潔喜致震霆每震則叫呼射天而棄之移去至來歲秋馬肥復相率候於震所埋羖羊燃火拔刀女巫祝說似如中國祓除而群隊馳馬旋繞百帀乃止人持一束柳桋回豎之以乳酪灌焉婦人則以皮裹羊骸戴之首上縈屈髮鬢而綴之有似軒冕其死亡葬送掘地作坎坐屍於中張臂引弓佩刀挾槊無異於生而露坎不掩時有震死及疫癘則為之祈福若安全無他則為報賽多殺雜畜燒骨以燎走馬遶旋多者數百帀男女無小大皆集會平吉之人則歌舞作樂死喪之家則悲吟哭泣其遷徙隨水草衣皮食肉牛羊畜產盡與蠕蠕同唯車輪高大輻數至多後徙於鹿渾海西北百餘里部落彊大常與蠕蠕為敵亦每侵盜于國家太祖親襲之大破其諸部後太祖復度弱洛水西行至鹿渾海停駕簡輕騎西北行百餘里襲破之虜獲生口馬牛羊二十餘萬復討其餘種於狼山大破之車駕巡幸分命諸將為東西二道太祖親勒六軍從中道自駁髯水西北徇略其部諸軍同時雲合破其雜種三十餘落衛王儀別督將從西北絕漠千餘里復破其遺迸七部於是高車大懼諸部震駭太祖自牛川南引大校獵以高車為圍騎徒遮列周七百餘里聚雜獸於其中因驅至平城即以高車眾起鹿苑南因臺陰北距長城東包白登屬之西山尋而高車姪利曷莫弗敕力犍率其九百餘落內附拜敕力犍為揚威將軍置司馬參軍賜穀二萬斛後高車解批莫弗幡豆建復率其部三十餘落內附亦拜為威遠將軍置司馬參軍賜衣服歲給廩食蠕蠕社崙破敗之後收拾部落轉徙廣漠之北侵入高車之地斛律部部帥倍侯利患之曰社崙新集兵貧馬少易與耳乃舉眾掩擊入其國落高車昧利不顧後患分其廬室妻其婦女安息寢臥不起社崙登高望見乃招集亡散得千人晨掩殺之走而脫者十二三倍侯利遂來奔賜爵孟都公倍侯利質直勇健過人奮戈陷陳有異於眾北方之人畏之嬰兒啼者語曰倍侯利來便止處女歌謠云求良夫當如倍侯其服眾如此善用五十蓍筮吉凶每中故得親幸賞賜豐厚命其少子曷堂內侍及倍侯利卒太祖悼惜葬以國禮諡曰忠壯王後詔將軍伊謂帥二萬騎北襲高車餘種袁紇烏頻破之太祖時分散諸部唯高車以類粗獷不任使役故得別為部落後世祖征蠕蠕破之而還至漠南聞高車東部在巳尼陂人畜甚眾去官軍千餘里將遣左僕射安原等討之司徒長孫翰尚書令劉潔等諫世祖不聽乃遣原等并發新附高車合萬騎至于巳尼陂高車諸部望軍而降者數十萬落獲馬牛羊亦百餘萬皆徙置漠南千里之地乘高車逐水草畜牧蕃息數年之後漸知粒食歲致獻貢由是國家馬及牛羊遂至于賤氈皮委積高宗時五部高車合聚祭天眾至數萬大會走馬殺牲遊遶歌吟忻忻其俗稱自前世以來無盛於此會車駕臨幸莫不忻悅後高祖召高車之眾隨車駕南討高車不願南行遂推袁紇樹者為主相率北叛遊踐金陵都督宇文福追討大敗而還又詔平北將軍江陽王繼為都督討之繼先遣人慰勞樹者樹者入蠕蠕尋悔相率而降高車之族又有十二姓一曰泣伏利氏二曰吐盧氏三曰乙旃氏四曰大連氏五曰窟賀氏六曰達薄干氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏先是副伏羅部為蠕蠕所役屬豆崙之世蠕蠕亂離國部分散副伏羅阿伏至羅與從弟窮奇俱統領高車之眾十餘萬落太和十一年豆崙犯塞阿伏至羅等固諫不從怒率所部之眾西叛至前部西北自立為王國人號之曰候婁匐勒猶魏言大天子也窮奇號候倍猶魏言儲主也二人和穆分部而立阿伏至羅居北窮奇在南豆崙追討之頻為阿伏至羅所敗乃引眾東徙十四年阿伏至羅遣商胡越者至京師以二箭奉貢云蠕蠕為天子之賊臣諫之不從遂叛來至此而自豎立當為天子討除蠕蠕高祖未之信也遣使者于提往觀虛實阿伏至羅與窮奇遣使者薄頡隨于提來朝貢其方物詔員外散騎侍郎可足渾長生復與于提使高車各賜繡袴褶一具雜綵百疋窮奇後為嚈噠所殺虜其子彌俄突等其眾分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人置之高平鎮阿伏至羅長子蒸阿伏至羅餘妻謀害阿伏至羅阿伏至羅殺之阿伏至羅又殘暴大失眾心眾共殺之立其宗人跋利延為主歲餘嚈噠伐高車將納彌俄突國人殺跋利延迎彌俄突而立之彌俄突既立復遣朝貢又奉表獻金方一銀方一金杖二馬七匹駝十頭詔使者慕容坦賜彌俄突雜綵六十匹世宗詔之曰卿遠據沙外頻申誠款覽揖忠志特所欽嘉蠕蠕嚈噠吐谷渾所以交通者皆路由高昌掎角相接今高昌內附遣使迎引蠕蠕往來路絕姦勢不得妄令群小敢有陵犯擁塞王人罪在不赦彌俄突尋與蠕蠕主伏圖戰於蒲類海北為伏圖所敗西走三百餘里伏圖次於伊吾北山先是高昌王麴嘉表求內徙世宗遣孟威迎之至伊吾蠕蠕見威軍怖而遁走彌俄突聞其離駭追擊大破之殺伏圖於蒲類海北割其髮送於孟威又遣使獻龍馬五匹金銀貂皮及諸方物詔東城子于亮報之賜樂器一部樂工八十人赤紬十匹雜綵六十匹彌俄突遣其莫何去汾屋引叱賀真貢其方物肅宗初彌俄突與蠕蠕主醜奴戰敗被禽醜奴繫其兩腳於駑馬之上頓曳殺之漆其頭為飲器其部眾悉入嚈噠經數年嚈噠聽彌俄突弟伊匐還國伊匐既復國遣使奉表於是詔遣使者谷楷等拜為鎮西將軍西海郡開國公高車王伊匐復大破蠕蠕蠕蠕王婆羅門走投涼州正光中伊匐遣使朝貢因乞朱畫步挽一乘并幔褥鞦䩛一副繖扇各一枚青曲蓋五枚赤漆扇五枚鼓角十枚詔給之伊匐後與蠕蠕戰敗歸其弟越居殺伊匐自立天平中越居復為蠕蠕所破伊匐子比適復殺越居而自立興和中比適又為蠕蠕所破越居子去賓自蠕蠕來奔齊獻武王欲招納遠人上言封去賓為高車王拜安北將軍肆州刺史既而病死初太祖時有叱突鄰部在女水上常與解如部相為脣齒不供職事登國三年太祖親西征度弱洛水復西行趣其國至女水上討解如部落破之明年春盡略徙其部落畜產而還又有紇突鄰與紇奚世同部落而各有大人長帥擁集種類常為寇於意辛山登國五年太祖勒眾親討焉慕容驎率師來會大破之紇突鄰大人屋地鞬紇奚大人庫寒等皆舉部歸降皇始二年車駕伐中山軍於柏肆慕容寶夜來攻營軍人驚走還於國路由并州遂反將攻晉陽并州刺史元延討平之紇突鄰部帥匿物尼紇奚部帥叱奴根等復聚黨反於陰館南安公元順討之不克死者數千人太祖聞之遣安遠將軍庾岳還討匿物尼等皆殄之又有侯呂鄰部眾萬餘口常依險畜牧登國中其大人叱伐為寇於苦水河八年夏太祖大破之并禽其別帥焉古延等薛干部常屯聚於三城之間及滅衛辰後其部帥太悉伏望軍歸順太祖撫安之車駕還衛辰子屈丐奔其部太祖聞之使使詔太悉伏執送之太悉伏出屈丐以示使者曰今窮而見投寧與俱亡何忍送之遂不遣太祖大怒車駕親討之會太悉伏先出擊曹覆寅官軍乘虛遂屠其城獲太悉伏妻子珍寶徙其人而還太悉伏來赴不及遂奔姚興未幾亡歸嶺北上郡以西諸鮮卑雜胡聞而皆應之天賜五年屈丐盡劫掠總服之及平統萬薛干種類皆得為編戶矣而率牽屯山鮮卑別種破多蘭部世傳主部落至木易于有武力壯勇劫掠左右西及金城東侵安定數年間諸種患之天興四年遣常山王遵討之於高平木易干將數千騎棄國遁走盡徙其人於京師餘種分迸其後為赫連屈丐所滅又黜弗素古延等諸部富而不恭天興五年材官將軍和突率六千騎襲而獲之又越勒勤倍泥部永興五年轉牧跋那山西七月遣奚斤討破之徙其人而還史臣曰周之獫狁漢之匈奴其作害中國固亦久矣魏晉之世種族瓜分去來沙漠之陲窺擾鄣塞之際猶皆東胡之餘緒冒頓之枝葉至如蠕蠕者匈奴之裔根本莫尋逃刑集醜自小為大風馳烏赴倏來忽往代京由之屢駭戎車所以不寧是故魏氏祖宗揚威曜武驅其畜產收其部落翦之窮髮之野逐之無人之鄉豈好肆兵極銳凶器不戢蓋亦急病除惡事不得已而然也
