body:
  text: 卷八十列傳第六十八朱瑞叱列延慶斛斯椿賈顯度樊子鵠賀拔勝侯莫陳悅侯淵朱瑞字元龍代郡桑乾人祖就字祖成卒於沛縣令父惠字僧生行太原太守卒永安中瑞貴達就贈平東將軍齊州刺史惠贈使持節冠軍將軍恒州刺史瑞長厚質直敬愛人士孝昌末爾朱榮引為其府戶曹參軍又為大行臺郎中甚為榮所親任建義初除黃門侍郎仍中書舍人榮恐朝廷事意有所不知故居之門下為腹心之寄錄前後勳封陽邑縣開國公食邑一千戶未幾又除散騎常侍安南將軍黃門如故丁父憂去官詔起復任除青州大中正及元顥內逼瑞啟勸北幸乃從駕於河陽除侍中征南將軍兼吏部尚書改封北海郡開國公增邑一千戶莊帝還洛加衛將軍左光祿大夫又改封樂陵郡開國公仍侍中瑞雖為爾朱榮所委而善處朝廷之間莊帝亦賞遇之曾謂侍臣曰為人臣當須忠實至如朱元龍者朕待之亦不異餘人瑞啟乞三從之內並屬滄州樂陵郡詔許之仍轉滄州大中正瑞始以青州樂陵有朱氏意欲歸之故求為青州中正又以滄州樂陵亦有朱氏而心好河北遂乞移屬焉尋加車騎將軍爾朱榮死瑞與世隆俱北走既而以莊帝待之素厚且見世隆等並無雄才終當敗喪於路乃還帝大悅執其手曰社稷忠臣當須如此爾朱天光擁眾關右帝欲招納之乃以瑞兼尚書左僕射為西道大行臺以慰勞焉既達長安會爾朱兆入洛復還京師都督斛斯椿先與瑞有隙數譖之於世隆世隆性多忌且以前日乖異忿恨更甚普泰元年七月遂誅之時年四十九太昌初贈使持節驃騎大將軍開府儀同三司青州刺史諡曰恭穆子孟胤襲封齊受禪例降瑞弟珍字多寶太尉上黨王天穆錄事參軍卒珍弟騰字神龍建義初為龍驤將軍大都督司馬又封涇陽縣開國男食邑二百戶累遷中軍將軍光祿大夫與瑞同遇害太昌初贈滄州刺史騰弟慶賓卒於光祿大夫子清武定末齊王開府中兵參軍叱列延慶代西部人也世為酋帥曾祖鍮石世祖末從駕至瓜步賜爵臨江伯父億彌襲祖爵高祖時越騎校尉延慶少便弓馬有膽力正光末除直後隸大都督李崇北伐後隨爾朱榮入洛仍從榮討葛榮於相州延慶世隆姊婿也榮親遇之葛榮既擒除使持節撫軍將軍光祿大夫假鎮東將軍都督西部第一領民酋長封永寧縣開國伯食邑五百戶永安二年以本將軍除恒州刺史普泰初世隆得志特見委重遷散騎常侍車騎將軍儀同三司又進驃騎大將軍開府餘如故尋除都督恒雲燕朔四州諸軍事大都督兼尚書左僕射山東行臺北海郡開國公邑五百戶時幽州刺史劉靈助以莊帝幽崩遂舉兵唱義諸州豪右咸相結附靈助進屯於定州之安固世隆白前廢帝以延慶與大都督侯淵於定州相會以討靈助淵謂延慶曰靈助善於卜占百姓信惑所在響應未易可圖若萬一戰有利鈍則大事去矣未若還師西入據關拒險以待其變延慶曰劉靈助庸人也天道深遠豈其所識大兵一臨彼皆恃其妖術坐看符厭寧肯戮力致死與吾爭勝負哉如吾計者政欲出營城外詭言西歸靈助聞之必信而自寬潛軍往襲可一往而擒淵從之乃出頓城西聲云將還簡精騎一千夜發詰朝造靈助壘戰於城北遂破擒之仍兼尚書左僕射為恒雲燕朔四州行臺又除使持節侍中都督恒雲燕朔定五州諸軍事定州刺史餘如故與爾朱兆等拒義旗於韓陵戰敗延慶與爾朱仲遠走渡石濟仲遠南竄延慶北降齊獻武王王與之入洛仍從王於并州後赴洛出帝以為中軍大都督延慶既爾朱親昵又黨於權佞出帝之西齊獻武王入洛以罪誅之延慶兄子平武定末儀同三司右衛將軍廮陶縣開國侯斛斯椿字法壽廣牧富昌人也父敦肅宗時為左牧令時河西賊起牧民不安椿乃將家投爾朱榮榮以椿兼其都督府鎧曹參軍從榮征伐有功表授厲威將軍稍遷中散大夫署外兵事椿性佞巧甚得榮心軍之密謀頗亦關預及肅宗崩椿從榮入洛莊帝初封陽曲縣開國公食邑千戶遷散騎常侍平北將軍司馬尋除爾朱榮大將軍府司馬從平葛榮以功除上黨太守及元顥入洛椿隨榮奉迎莊帝遂從攻顥顥敗遷安北將軍建州刺史改封深澤縣轉鎮東將軍徐州刺史又轉征東將軍東徐州刺史及爾朱榮死椿甚憂懼時蕭衍以汝南王悅為魏主資其士馬次於境上椿聞大喜遂率所部棄州歸悅悅授椿使持節侍中大將軍領軍將軍領左右尚書左僕射司空公封靈丘郡開國公邑萬戶又為大行臺前驅都督會爾朱兆入洛椿復率所部背悅歸兆爾朱世隆之立前廢帝也椿參其謀以定策功拜侍中驃騎大將軍儀同三司京畿北面大都督改封城陽郡開國公增邑五百戶并前一千五百戶尋加開府時椿父敦先在秀容忽有傳敦死問請減己階以贈之自襄威將軍超贈車騎將軍恒州刺史尋知其父猶在詔復椿官仍除其父為車騎將軍揚州刺史世隆之厚椿也如此椿與爾朱度律仲遠等北拒齊獻武王次陽平會爾朱兆與度律等相疑遁還語在兆傳椿後復與度律等同拒義旗敗於韓陵椿謂都督賈顯智等曰若不先執爾朱我等死無類矣遂與顯智等夜於桑下盟約倍道兼行椿入北中城收爾朱部曲盡殺之令長孫稚賈顯智等率數百騎襲爾朱世隆彥伯兄弟斬於閶闔門外椿入洛懸世隆兄弟首於其門樹椿父出見謂椿曰汝與爾朱約為兄弟今何忍懸其頭於家門寧不愧負天地乎椿乃傳世隆等首并囚度律天光送於齊獻武王出帝拜椿侍中儀同開府初獻武王之入洛頓於邙山爾朱仲遠帳下都督橋寧張子期自滑臺而至獻武王責寧等曰汝事仲遠擅其榮利盟契百重許同生死前仲遠自徐為逆汝為戎首今仲遠南走汝復背之於臣節則不忠論事人則無信犬馬尚識恩養汝今犬馬之不如遂斬之椿自以數為反覆見寧等之死意常不安遂密構間勸出帝置閤內都督部曲又增武直人數自直閤已下員別數百皆選天下輕剽者以充之又說帝數出遊幸號令部曲別為行陳椿自約勒指麾其間從此以後軍謀朝政一決於椿又勸帝徵兵詭稱南討將以伐齊獻武王帝從之遂陳兵城西北接邙山南至洛水帝詰旦戎服與椿臨閱焉獻武王以椿亂政欲誅之椿譖說既行因此遂相恐動出帝勒兵河橋令椿為前軍營於邙山北尋遣椿率步騎數千鎮虎牢椿弟豫州刺史元壽與都督賈顯智守滑臺獻武王令相州刺史竇泰擊破之椿懼己不免復啟出帝假說遊聲以劫愶帝信之遂入關椿亦西走長安椿狡猾多事好亂樂禍干時敗國朝野莫不讎疾之元壽尋為部下所殺賈顯度中山無極人父道監沃野鎮長史顯度形貌偉壯有志氣初為別將防守薄骨律鎮正光末北鎮擾亂為賊攻圍顯度拒守多時以賊勢轉熾不可久立乃率鎮民浮河而下既達秀容為爾朱榮所留尋表授直閣將軍左中郎將建義初除汲郡太守假平東將軍隨爾朱榮破葛榮又除撫軍將軍光祿大夫都督封石艾縣開國公邑一千戶從上黨王天穆破邢杲值元顥入洛仍與天穆渡河赴行宮於河內顥平以本將軍除廣州刺史假鎮南將軍轉南兗州刺史爾朱榮之死也顯度情不自安南奔蕭衍衍厚待之普泰初還朝授衛大將軍儀同三司左光祿大夫又行濟州事復隨爾朱度律等北拒義旗敗於韓陵與斛斯椿及弟顯智等率眾先據河橋誅爾朱氏出帝初除尚書左僕射尋加驃騎大將軍開府儀同三司定州大中正未幾以本官行徐州刺史東道大行臺永熙三年五月轉雍州刺史西道大行臺歿於關中弟智字顯智少有膽決孝昌中告毛謐等逆靈太后嘉之除伏波將軍冗從僕射領直齋蕭衍將夏侯夔攻郢州以智為龍驤將軍別將討之至則夔退智仍入城及刺史元願達以城降於蕭衍智勒城人不欲叛者與顯達交戰相率歸闕後為都督隸太宰上黨王天穆征邢杲臨陳流矢中胸仍戰不已元顥入洛仍隨天穆渡河朝莊帝於河內與爾朱兆同先渡河破顥軍以勳除持節征南將軍金紫光祿大夫封義陽縣開國伯邑五百戶假衛將軍與行臺樊子鵠討呂文欣於東徐州平之加侍中驃騎大將軍增邑三百戶尋行東中郎將加散騎常侍及爾朱仲遠為徐州刺史智隸仲遠赴彭城爾朱榮之死也仲遠舉兵向洛智不從之遂擁部下出清水東招勒州民與相拒擊莊帝聞而善之除右光祿大夫武衛將軍進爵為侯增邑二百戶通前一千因鎮徐州普泰初還洛仲遠忿其乖背議欲殺之智兄顯度先為世隆所厚世隆為解喻得全時趙脩延起逆荊州蕭衍遣兵接援世隆欲令智以功自效遣智討之除使持節散騎常侍車騎大將軍左光祿大夫假驃騎大將軍荊州大都督進爵為公將發會荊州斬送修延首不行又從爾朱度律北拒義旗合爾朱兆於陽平兆與度律自相疑阻退還除驃騎大將軍後隨度律等敗於韓陵智與兄顯度斛斯椿謀誅爾朱氏椿顯度據守北中令智等入京擒世隆兄弟出帝初除散騎常侍本將軍開府儀同三司滄州刺史在州貪縱甚為民害出帝徵還京師尋加授侍中以本將軍除濟州刺史率眾達東郡仍停不進於長壽津為相州刺史竇泰所破還洛天平初赴晉陽智去就多端後坐事死時年四十五子羅侯祕書郎樊子鵠代郡平城人其先荊州蠻酋被遷於代父興平城鎮長史歸義侯普泰中子鵠貴顯乃贈征虜將軍荊州刺史子鵠值北鎮擾亂南至并州爾朱榮引為都督府倉曹參軍孝昌三年冬榮使子鵠詣京師靈太后見之問榮兵勢子鵠應對稱旨太后嘉之除直齋封南和縣開國子邑三百戶令還赴榮榮以為行臺郎中行上黨郡及榮向洛以為假節假平南將軍都督河東正平軍事行唐州事刺史崔元珍閉門拒守子鵠攻剋之建義初拜平北將軍晉州刺史封永安縣開國伯食邑千戶又兼尚書行臺治有威信山胡率服元顥入洛薛脩義及降蜀陳雙熾等受顥處分率眾攻州城子鵠出與戰大破之又破脩義等於土門以功拜撫軍將軍尋徵授都官尚書西荊州大中正後兼右僕射為行臺督賈智等討呂文欣於東徐州平之還除車騎將軍左光祿大夫進封南陽郡開國公增戶六百尚書如故仍假驃騎大將軍率所部為都督時爾朱榮在晉陽京師之事子鵠頗預委寄故在臺閣征官不解後出除散騎常侍本將軍殷州刺史屬歲旱儉子鵠恐民流亡乃勒有粟之家分貸貧者并遣人牛易力多種二麥州內以此獲安及爾朱榮之死世隆等遣書招子鵠欲與同趣京師子鵠不從以母在晉陽啟求移鎮河南莊帝嘉之除車騎大將軍豫州刺史假驃騎大將軍都督二豫郢三州諸軍事兼尚書右僕射二豫郢潁四州行臺子鵠到相州又敕賚絹五百匹行達汲郡聞爾朱兆入洛乃渡河見仲遠仲遠遣鎮汲郡兆徵子鵠赴洛既見責以乖異之意奪其部眾將還晉陽及紇豆陵步藩起以子鵠為都督徵發糧仗元曄以為侍中御史中尉中軍大都督隨曄向洛普泰初仍除舊任及趙脩延叛於荊州詔子鵠通三鴉道而還遭母憂去職前廢帝聞其在洛無宅凶費不周賚絹四百疋粟五百石以本官起之太昌初兼尚書左僕射東南道大行臺總大都督杜德等追討爾朱仲遠仲遠已奔蕭衍收其兵馬甲仗時蕭衍遣元樹入寇陷據譙城詔子鵠與德討之樹屯兵梁國欲來逆戰見子鵠軍盛夜退還譙子鵠引兵追躡樹又背城為陳子鵠勒兵直趣城下縱騎衝突樹眾大敗奔入城門城門隘塞多自殺害於是斬千餘級獲馬數百匹大收鎧仗遂圍城加儀同三司樹勒兵出戰輒被摧衄遂不敢出自守而已子鵠恐蕭衍遣救乃分兵擊衍苞州然州宕州大澗蒙縣等五城並望風逃散樹既無外援計無所出子鵠又令人說之樹遂請率眾歸南以地還國子鵠等許之共結盟約及樹眾半出子鵠中擊破之擒樹及衍譙州刺史朱文開俘馘甚多班師出帝賚馬匹遷吏部尚書轉尚書右僕射尋加驃騎大將軍開府典選初青州人耿翔聚眾反亡奔蕭衍衍資其兵偷據膠州除子鵠使持節侍中青膠大使督濟州刺史蔡雋討之師達青州翔拔城奔走在軍遇病詔遣醫給藥仍除兗州刺史餘官如故便道之州子鵠先遣腹心緣歷民間採察得失及入境太山太守彭穆參候失儀子鵠責讓穆并數其罪狀穆皆引伏於是州內震悚及出帝入關子鵠據城為逆南青州刺史大野拔徐州人劉粹各率眾就子鵠天平初遣儀同三司婁昭等率眾討之子鵠先使前膠州刺史嚴思達鎮東平郡昭攻陷之仍引兵圍子鵠城久不拔昭以水灌城靜帝欲招慰下之遣散騎常侍陸琛兼黃門郎張景徵齎璽書勞子鵠而大野拔因與相見左右斬子鵠以降賀拔勝字破胡神武尖山人祖爾逗選充北防家於武川以窺覘蠕蠕兼有戰功顯祖賜爵龍城男為本鎮軍主父度拔襲爵正光末沃野人破落汗拔陵聚眾反度拔與三子鄉中豪勇援懷朔鎮殺賊王衛可瓌度拔尋為賊所害孝昌中追贈安遠將軍肆州刺史度拔之死也勝與兄弟俱奔恒州刺史廣陽王淵勝便弓馬有武幹淵厚待之表為彊弩將軍充帳內軍主恒州陷歸爾朱榮轉積射將軍為別將又兼都督及榮入洛以預義之勳封易陽縣開國伯邑四百戶除直閤將軍尋加通直散騎常侍平南將軍光祿大夫進號安南將軍尋除撫軍將軍為大都督出井陘鎮中山元顥入洛勝從東路率騎三百赴行宮於河梁榮命勝與爾朱兆先渡破擒顥息冠受及顥大都督陳思保莊帝還宮以功增邑六百戶復加通直散騎常侍征北將軍金紫光祿大夫武衛將軍改封真定縣開國公尋除衛將軍加散騎常侍爾朱榮之死也勝與田怙等奔走榮第於時宮殿之門未加嚴防怙等議即攻門勝止之曰天子既行大事必當更有奇謀吾等眾旅不多何可輕爾但得出城更為他計怙乃止及世隆夜走勝遂不從莊帝甚嘉之仲遠逼東郡詔勝以本官假驃騎大將軍為東征都督率眾會鄭先護以討之為先護所疑置之營外人馬未得休息俄而仲遠兵至勝與交戰不利乃降之普泰初除右衛將軍進號車騎大將軍右光祿大夫儀同三司共爾朱仲遠度律北拒義旗相與奔退事在爾朱兆傳後俱敗於韓陵勝因降齊獻武王太昌初拜領軍將軍餘官如故又除侍中出帝既納斛斯椿等讒間之說將謀齊獻武王以勝弟岳擁眾關西仍欲廣為勢援除勝使持節侍中都督三荊二郢南襄南雍七州諸軍事驃騎大將軍開府儀同三司荊州刺史勝將圖襄陽攻蕭衍下迮戍剋之擒其戍主尹道玩戍副庫峨又使人誘動蠻王問道期道期率種起義衍雍州刺史蕭續遣軍擊道期為道期所敗漢南大駭勝又遣軍攻均口擒衍將莊思延又攻馮翊安定沔酇陽城並平之續遣將柳仲禮於穀城拒守勝攻之不剋乃班師沔北盪為丘墟矣衍書敕續云賀拔勝北間驍將汝宜慎之勿與爭鋒其見憚如此進爵琅邪郡公出帝末詔勝統眾北赴京師軍次汝水出帝入關勝率所部欲從武關趣長安行至析陽聞齊獻武王平潼關擒毛鴻賓勝懼復走荊州城人閉門不納時獻武王已遣行臺侯景大都督高敖曹討之勝戰敗為流矢所中乃率左右五百餘騎奔蕭衍明年從間道投寶炬勝好行小數志大膽薄周章南北終無所成致歿於賊中勝兄可泥永熙中太尉公封燕郡王勝弟岳字阿斗泥初為太學生長以弓馬為事與父兄赴援懷朔賊王衛可瓌在城西二百餘步岳乘城射之箭中瓌臂賊眾大駭後歸恒州廣陽王淵以為帳內軍主表為彊弩將軍州陷投爾朱榮榮以為別將進為都督永安初除安北將軍光祿大夫武衛將軍賜爵樊城鄉男坐事失官爵二年詔並復之尋除使持節假衛將軍西道都督隸爾朱天光為左廂大都督討万俟醜奴天光先知岳喜得同行每事論訪尋加衛將軍假車騎將軍餘如故岳屆長安榮遣兵續至時万俟醜奴遣其大行臺尉遲菩薩向武功南渡渭水攻圍趣柵天光遣岳率騎一千馳往赴救菩薩攻柵已克還向岐州岳以輕騎八百北渡渭水擒賊令殺掠其民以挑菩薩菩薩果率步騎二萬餘人至渭水北岳以輕騎數十與菩薩隔水交言岳稱揚國威菩薩自言彊盛往復數返菩薩乃自驕令省事傳語岳怒曰我與菩薩言卿是何人與我對語省事恃水應答不遜岳舉弓射之應弦而倒時已逼暮於此各還岳密於渭南傍水分置精騎四十五十以為一所隨地形便駱驛置之明日自將百餘騎隔水與賊相見並且東行岳漸前進先所置騎隨岳而集騎既漸增賊不復測其多少行二十里許便至淺可濟岳便馳馬東出以示奔遁賊謂岳走乃棄步兵南渡渭水輕騎追岳岳東行十餘里依橫崗伏兵以待之賊以路險不得前進前後繼至半度崗東岳乃回戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂渡渭北降步兵萬餘收其輜重其有土民普皆勞遣醜奴尋棄岐州北走安定其後破侯伏侯元進降侯機長貴擒醜奴蕭寶夤王慶雲万俟道洛走宿勤明達事在爾朱天光傳天光雖為元帥而岳功效居多加車騎將軍增邑二千戶進封樊城縣開國伯尋詔岳都督涇北豳二夏四州諸軍事本將軍涇州刺史進爵為公改封清水郡公天光入洛使岳行雍州事元曄立除驃騎大將軍增邑五百戶餘如故普泰初都督二岐東秦三州諸軍事儀同三司岐州刺史尋加侍中給後部鼓吹仍詔開府俄兼尚書左僕射隴右行臺仍停高平後以隴中猶有土民不順岳助侯莫陳悅所在討平二年加岳都督三雍三秦二岐二華諸軍事雍州刺史關西行臺餘如故及爾朱天光率眾赴洛將抗齊獻武王岳與侯莫陳悅下隴赴雍以應義旗永熙初仍開府兼僕射大行臺雍州刺史增邑千戶二年詔岳都督雍華北華東雍二岐豳四梁二益巴二夏蔚寧南益涇二十州諸軍事大都督岳自詣北境安置邊防率部趣涇州平涼西界布營數十里使諸軍士田殖涇州身將壯勇託以牧馬於原州北招万俟受洛干等并遠近州鎮聚結者靈州刺史曹泥身詣岳軍請代岳以前洛州刺史元季海為州彼民不從擊破季海部下獨聽季海五年正月岳召侯莫陳悅會於高平將討之令悅前驅北趣靈州聞渴波隘中河水未解將往趣之岳既總大眾據制關右憑彊驕恣有不臣之心齊獻武王惡其專擅令悅圖之悅素服威略既承密旨便潛為計時岳遣悅先行悅乃通夜東進達明晦日岳行軍前與悅相見悅誘岳入營坐論兵事悅詐云腹痛起而徐行悅女夫元洪景抽刀斬岳後岳部下收岳尸葬於雍州北石安原六月贈大將軍太保錄尚書事都督刺史開國並如故侯莫陳悅代郡人也父婆羅門為駝牛都尉故悅長於河西好田獵便騎射會牧子逆亂遂歸爾朱榮榮引為都督府長流參軍稍遷大都督莊帝初除征西將軍金紫光祿大夫封柏人縣開國侯邑五百戶爾朱天光之討關西榮以悅為天光右廂大都督本官如故西伐剋獲皆與天光賀拔岳略同勞效以本將軍除鄯州刺史餘如故爾朱榮死後亦隨天光下隴元曄立除車騎大將軍渭州刺史進爵為公改封白水郡增邑五百戶及天光向洛使悅行華州事普泰中除驃騎大將軍儀同三司秦州刺史天光之東出將抗義旗悅與岳下隴以應齊獻武王至雍州會爾朱覆敗永熙初加開府都督隴右諸軍事仍秦州刺史永熙三年正月岳召悅共討靈州悅誘岳斬之岳左右奔散悅遣人安慰云我別稟意旨止在一人諸君勿怖眾皆畏服無敢拒違悅心猶豫不即撫納乃還入隴止水洛城岳之所部聚於平涼規還圖悅遣追夏州刺史宇文黑獺黑獺至遂總岳部眾并家口入高平城以自安固乃勒眾入隴征悅悅聞之棄城南據山水之險設陳候戰黑獺至遙望見悅欲待明日決鬭悅先召南秦州刺史李景和其夜景和遣人詣黑獺密許翻降至暮景和乃勒其所部使上驢駝云儀同有教欲還秦州守以拒賊令軍人嚴備景和復紿悅帳下云儀同欲還秦州汝等何不裝辦眾謂為實以次相驚人情惶惑不可復止皆散走而趣秦州景和先驅至城據門以慰輯之悅部眾離散猜畏傍人不聽左右近己與其二弟并兒及謀殺岳者八九人棄軍迸走數日之中盤回往來不知所趣左右勸向靈州而悅不決言下隴之後恐有人所見乃於山中令從者悉步自乘一騾欲向靈州中路追騎將及望見之遂縊死野中弟息部下悉見擒殺唯先謀殺岳者悅中兵參軍豆盧光走至靈州後奔晉陽悅自殺岳後神情恍惚不復如常恒言我僅睡即夢見岳語我兄欲何處去隨我不相置因此彌不自安而致敗滅侯淵神武尖山人也機警有膽略肅宗末年六鎮飢亂淵隨杜洛周南寇後與妻兄念賢背洛周歸爾朱榮路中遇寇身披苫褐榮賜其衣帽厚待之以淵為中軍副都督常從征伐屢有戰功孝莊即位除領左右封厭次縣開國子邑四百戶後從榮討葛榮於滏口戰功尤多榮啟淵為驃騎將軍燕州刺史時葛榮別帥韓樓郝長等有眾數萬屯據薊城爾朱榮令淵與賀拔勝討之會元顥入洛榮徵勝南赴大軍留淵獨鎮中山及莊帝還宮榮令淵進討韓樓配卒甚少或以為言榮曰侯淵臨機設變是其所長若總大眾未必能用今擊此賊故當不足定也止給騎七百淵遂廣張軍聲多設供具親率數百騎深入樓境欲執行人以問虛實去薊百餘里值賊帥陳周馬步萬餘淵遂潛伏以乘其背大破之虜其卒五千餘人尋還其馬仗縱令入城左右諫曰既獲賊眾何為復資遣之也淵曰我兵既少不可力戰事須為計以離隙之淵度其已至遂率騎夜集昧旦叩其城門韓樓果疑降卒為淵內應遂遁走追擒之以勳進爵為侯增邑八百戶尋詔淵以本將軍為平州刺史大都督仍鎮范陽及爾朱榮之死也范陽太守盧文偉誘淵出獵閉門拒之淵率部曲屯於郡南為榮舉哀勒兵南向莊帝使東萊王貴平為大使慰勞燕薊淵乃詐降貴平信之遂執貴平自隨進至中山行臺僕射魏蘭根邀擊之為淵所敗會元曄立淵欲歸之常山太守甄楷屯據井陘淵又擊破之曄乃授淵驃騎大將軍儀同三司定州刺史左軍大都督漁陽郡開國公邑一千戶前廢帝立仍加開府餘如故幽州刺史劉靈助舉義兵屯於安國城淵與叱列延慶等破擒之後隨爾朱兆拒義旗於廣阿兆既敗走淵降齊獻武王後從王破爾朱於韓陵永熙初除齊州刺史餘如故出帝末淵與兗州刺史樊子鵠青州刺史東萊王貴平密信往來以相連結又遣間使通誠於獻武王及出帝入關復懷顧望汝陽王暹既除齊州刺史次於城西淵擁部據城不時迎納民劉桃符等潛引暹入據西城淵爭門不剋率騎出奔妻兒部曲為暹所虜行達廣里會承制以淵行青州事齊獻武王又遺淵書曰卿勿以部曲輕少難於東邁齊人澆薄唯利是從齊州城民尚能迎汝陽王青州之人豈不能開門待卿也但當勉之淵乃復還暹始歸其部曲而貴平自以斛斯椿黨亦不受代淵進襲高陽郡剋之置部曲家累於城中身率輕騎遊掠於外貴平使其長子率眾攻高陽南青州刺史茹懷朗遣兵助之時青州城人餽糧者首尾相繼淵親率騎夜趣青州詐餽糧人曰臺軍已至殺戮都盡我是世子下人今已走還城汝何為復去也人信其言棄糧奔走比曉復謂行人曰臺軍昨夜已至高陽我是前鋒今始到此頗知侯公竟在何處城人兇懼遂執貴平出降淵自惟反覆慮不獲安遂斬貴平傳首京師欲明不同於斛斯椿也及子鵠平詔以封延之為青州刺史淵既不獲州任情又恐懼行達廣川遂劫光州庫兵反遣騎詣平原執前膠州刺史賈璐夜襲青州南郭劫前廷尉卿崔光韶以惑人情攻掠郡縣其部下督帥叛拒之淵率騎奔蕭衍途中亡散行達南青州南境為賣漿者斬之傳首京師家口配沒史臣曰朱瑞以背本向義責不見原延慶黨舊違順常刑所及斛斯椿姦佞為心讒忒自口取譬蒼蠅交亂四國投於豺虎天實棄之賈智侯淵反覆取斃破胡器小謀大終於顛蹶子鵠迷機寡算竟以殲殄岳負力無謀制以一劍悅果行慮淺死不旋足觀其亡滅自取之也
