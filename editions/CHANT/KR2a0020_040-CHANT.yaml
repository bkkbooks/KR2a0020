body:
  text: 卷三十五列傳第二十三崔浩崔浩字伯淵清河人也白馬公玄伯之長子少好文學博覽經史玄象陰陽百家之言無不關綜研精義理時人莫及弱冠為直郎天興中給事祕書轉著作郎太祖以其工書常置左右太祖季年威嚴頗峻宮省左右多以微過得罪莫不逃隱避目下之變浩獨恭勤不怠或終日不歸太祖知之輒命賜以御粥其砥直任時不為窮通改節皆此類也太宗初拜博士祭酒賜爵武城子常授太宗經書每至郊祠父子並乘軒軺時人榮之太宗好陰陽術數聞浩說易及洪範五行善之因命浩筮吉凶參觀天文考定疑惑浩綜覈天人之際舉其綱紀諸所處決多有應驗恒與軍國大謀甚為寵密是時有兔在後宮驗問門官無從得入太宗怪之命浩推其咎徵浩以為當有鄰國貢嬪嬙者善應也明年姚興果獻女神瑞二年秋穀不登太史令王亮蘇垣因華陰公主等言讖書國家當治鄴應大樂五十年勸太宗遷都浩與特進周澹言於太宗曰今國家遷都於鄴可救今年之飢非長久之策也東州之人常謂國家居廣漠之地民畜無算號稱牛毛之眾今留守舊都分家南徙恐不滿諸州之地參居郡縣處榛林之間不便水土疾疫死傷情見事露則百姓意沮四方聞之有輕侮之意屈丐蠕蠕必提挈而來雲中平城則有危殆之慮阻隔恒代千里之險雖欲救援赴之甚難如此則聲實俱損矣今居北方假令山東有變輕騎南出燿威桑梓之中誰知多少百姓見之望塵震服此是國家威制諸夏之長策也至春草生乳酪將出兼有菜果足接來秋若得中熟事則濟矣太宗深然之曰唯此二人與朕意同復使中貴人問浩澹曰今既糊口無以至來秋來秋或復不熟將如之何浩等對曰可簡窮下之戶諸州就穀若來秋無年願更圖也但不可遷都太宗從之於是分民詣山東三州食出倉穀以稟之來年遂大熟賜浩澹妾各一人御衣一襲絹五十匹綿五十斤初姚興死之前歲也太史奏熒惑在匏瓜星中一夜忽然亡失不知所在或謂下入危亡之國將為童謠妖言而後行其災禍太宗聞之大驚乃召諸碩儒十數人令與史官求其所詣浩對曰案春秋左氏傳說神降于莘其至之日各以其物祭也請以日辰推之庚午之夕辛未之朝天有陰雲熒惑之亡當在此二日之內庚之與未皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄說無徵之言浩笑而不應後八十餘日熒惑果出於東井留守盤遊秦中大旱赤地昆明池水竭童謠訛言國內諠擾明年姚興死二子交兵三年國滅於是諸人皆服曰非所及也泰常元年司馬德宗將劉裕伐姚泓舟師自淮泗入清欲泝河西上假道於國詔群臣議之外朝公卿咸曰函谷關號曰天險一人荷戈萬夫不得進裕舟船步兵何能西入脫我乘其後還路甚難若北上河岸其行為易揚言伐姚意或難測假其水道寇不可縱宜先發軍斷河上流勿令西過又議之內朝咸同外計太宗將從之浩曰此非上策司馬休之之徒擾其荊州劉裕切齒來久今興死子劣乘其危亡而伐之臣觀其意必欲入關勁躁之人不顧後患今若塞其西路裕必上岸北侵如此則姚無事而我受敵今蠕蠕內寇民食又乏不可發軍發軍赴南則北寇進擊若其救北則東州復危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞莊刺虎兩得之勢也使裕勝也必德我假道之惠令姚氏勝也亦不失救鄰之名縱使裕得關中縣遠難守彼不能守終為我物今不勞兵馬坐觀成敗鬭兩虎而收長久之利上策也夫為國之計擇利而為之豈顧婚姻酬一女子之惠哉假令國家棄恒山以南裕必不能發吳越之兵與官軍爭守河北也居然可知議者猶曰裕西入函谷則進退路窮腹背受敵北上岸則姚軍必不出關助我揚聲西行意在北進其勢然也太宗遂從群議遣長孫嵩發兵拒之戰於畔城為裕將朱超石所敗師人多傷太宗聞之恨不用浩計二年司馬德宗齊郡太守王懿來降上書陳計稱劉裕在洛勸國家以軍絕其後路則裕軍可不戰而克書奏太宗善之會浩在前進講書傳太宗問浩曰劉裕西伐前軍已至潼關其事如何以卿觀之事得濟不浩對曰昔姚興好養虛名而無實用子泓又病眾叛親離裕乘其危兵精將勇以臣觀之克之必矣太宗曰劉裕武能何如慕容垂浩曰裕勝太宗曰試言其狀浩曰慕容垂乘父祖世君之資生便尊貴同類歸之若夜蛾之赴火少加倚仗便足立功劉裕挺出寒微不階尺土之資不因一卒之用奮臂大呼而夷滅桓玄北擒慕容超南摧盧循等僭晉陵遲遂執國命裕若平姚而還必篡其主其勢然也秦地戎夷混并虎狼之國裕亦不能守之風俗不同人情難變欲行荊揚之化於三秦之地譬無翼而欲飛無足而欲走不可得也若留眾守之必資於寇孔子曰善人為邦百年可以勝殘去殺今以秦之難制一二年間豈裕所能哉且可治戎束甲息民備境以待其歸秦地亦當終為國有可坐而守也太宗曰裕已入關不能進退我遣精騎南襲彭城壽春裕亦何能自立浩曰今西北二寇未殄陛下不可親御六師兵眾雖盛而將無韓白長孫嵩有治國之用無進取之能非劉裕敵也臣謂待之不晚太宗笑曰卿量之已審矣浩曰臣嘗私論近世人物不敢不上聞若王猛之治國苻堅之管仲也慕容玄恭之輔少主慕容暐之霍光也劉裕之平逆亂司馬德宗之曹操也太宗曰卿謂先帝如何浩曰小人管窺懸象何能見玄穹之廣大雖然太祖用漠北醇樸之人南入中地變風易俗化洽四海自與羲農齊列臣豈能仰名太宗曰屈丐何如浩曰屈丐家國夷滅一身孤寄為姚氏封殖不思樹黨強鄰報讎雪恥乃結忿於蠕蠕背德於姚興撅豎小人無大經略正可殘暴終為人所滅耳太宗大悅語至中夜賜浩御縹醪酒十觚水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同其旨也三年彗星出天津入太微經北斗絡紫微犯天棓八十餘日至漢而滅太宗復召諸儒術士問之曰今天下未一四方岳峙災咎之應將在何國朕甚畏之盡情以言勿有所隱咸共推浩令對浩曰古人有言夫災異之生由人而起人無釁焉妖不自作故人失於下則變見於上天事恒象百代不易漢書載王莽篡位之前彗星出入正與今同國家主尊臣卑上下有序民無異望唯僭晉卑削主弱臣強累世陵遲故桓玄逼奪劉裕秉權彗孛者惡氣之所生是為僭晉將滅劉裕篡之之應也諸人莫能易浩言太宗深然之五年裕果廢其主司馬德文而自立南鎮上裕改元赦書時太宗幸東南潟鹵池射鳥聞之驛召浩謂之曰往年卿言彗星之占驗矣朕於今日始信天道初浩父疾篤浩乃剪爪截髮夜在庭中仰禱斗極為父請命求以身代叩頭流血歲餘不息家人罕有知者及父終居喪盡禮時人稱之襲爵白馬公朝廷禮儀優文策詔軍國書記盡關於浩浩能為雜說不長屬文而留心於制度科律及經術之言作家祭法次序五宗蒸嘗之禮豐儉之節義理可觀性不好老莊之書每讀不過數十行輒棄之曰此矯誣之說不近人情必非老子所作老聃習禮仲尼所師豈設敗法文書以亂先王之教袁生所謂家人筐篋中物不可揚於王庭也太宗恒有微疾怪異屢見乃使中貴人密問於浩曰春秋星孛北斗七國之君皆將有咎今茲日蝕於胃昂盡光趙代之分野朕疾彌年療治無損恐一旦奄忽諸子並少將如之何其為我設圖後之計浩曰陛下春秋富盛聖業方融德以除災幸就平愈且天道懸遠或消或應昔宋景見災修德熒惑退舍願陛下遣諸憂虞恬神保和納御嘉福無以闇昧之說致損聖思必不得已請陳瞽言自聖化龍興不崇儲貳是以永興之始社稷幾危今宜早建東宮選公卿忠賢陛下素所委仗者使為師傅左右信臣簡在聖心者以充賓友入總萬機出統戎政監國撫軍六柄在手若此則陛下可以優遊無為頤神養壽進御醫藥萬歲之後國有成主民有所歸則姦宄息望旁無覬覦此乃萬世之令典塞禍之大備也今長皇子燾年漸一周明叡溫和眾情所繫時登儲副則天下幸甚立子以長禮之大經若須並待成人而擇倒錯天倫則生履霜堅冰之禍自古以來載籍所記興衰存亡鮮不由此太宗納之於是使浩奉策告宗廟命世祖為國副主居正殿臨朝司徒長孫嵩山陽公奚斤北新公安同為左輔坐東廂西面浩與太尉穆觀散騎常侍丘堆為右弼坐西廂東面百僚總己以聽焉太宗避居西宮時隱而窺之聽其決斷大悅謂左右侍臣曰長孫嵩宿德舊臣歷事四世功存社稷奚斤辯捷智謀名聞遐邇安同曉解俗情明練於事穆觀達於政要識吾旨趣崔浩博聞強識精於天人之會丘堆雖無大用然在公專謹以此六人輔相吾與汝曹遊行四境伐叛柔服可得志於天下矣群臣時奏所疑太宗曰此非我所知當決之汝曹國主也會聞劉裕死太宗欲取洛陽虎牢滑臺浩曰陛下不以劉裕欻起納其使貢裕亦敬事陛下不幸今死乘喪伐之雖得之不令春秋晉士丐帥師侵齊聞齊侯卒乃還君子大其不伐喪以為恩足以感孝子義足以動諸侯今國家亦未能一舉而定江南宜遣人弔祭存其孤弱恤其凶災布義風於天下令德之事也若此則化被荊揚南金象齒羽毛之珍可不求而自至裕新死黨與未離兵臨其境必相率拒戰功不可必不如緩之待其惡稔如其強臣爭權變難必起然後命將揚威可不勞士卒而收淮北之地太宗銳意南伐詰浩曰劉裕因姚興死而滅其國裕死我伐之何為不可浩固執曰興死二子交爭裕乃伐之太宗大怒不從浩言遂遣奚斤南伐議於監國之前曰先攻城也先略地也斤曰請先攻城浩曰南人長於守城苻氏攻襄陽經年不拔今以大國之力攻其小城若不時克挫損軍勢敵得徐嚴而來我怠彼銳危道也不如分軍略地至淮為限列置守宰收斂租穀滑臺虎牢反在軍北絕望南救必沿河東走若或不然即是囿中之物公孫表請先圖其城斤等濟河先攻滑臺經時不拔表請濟師太宗怒乃親南巡拜浩相州刺史加左光祿大夫隨軍為謀主及車駕之還也浩從太宗幸西河太原登憩高陵之上下臨河流傍覽川域慨然有感遂與同僚論五等郡縣之是非考秦始皇漢武帝之違失好古識治時伏其言天師寇謙之每與浩言聞其論古治亂之迹常自夜達旦竦意斂容無有懈倦既而歎美之曰斯言也惠皆可底行亦當今之皋繇也但世人貴遠賤近不能深察之耳因謂浩曰吾行道隱居不營世務忽受神中之訣當兼修儒教輔助泰平真君繼千載之絕統而學不稽古臨事闇昧卿為吾撰列王者治典并論其大要浩乃著書二十餘篇上推太初下盡秦漢變弊之迹大旨先以復五等為本世祖即位左右忌浩正直共排毀之世祖雖知其能不免群議故出浩以公歸第及有疑議召而問焉浩纖妍潔白如美婦人而性敏達長於謀計常自比張良謂己稽古過之既得歸第因欲修服食養性之術而寇謙之有神中錄圖新經浩因師之始光中進爵東郡公拜太常卿時議討赫連昌群臣皆以為難唯浩曰往年以來熒惑再守羽林皆成鉤己其占秦亡又今年五星併出東方利以西伐天應人和時會並集不可失也世祖乃使奚斤等擊蒲阪而親率輕騎襲其都城大獲而還及世祖復討昌次其城下收眾偽退昌鼓譟而前舒陣為兩翼會有風雨從東南來揚沙昏冥宦者趙倪進曰今風雨從賊後來我向彼背天不助人又將士飢渴願陛下攝騎避之更待後日浩叱之曰是何言歟千里制勝一日之中豈得變易賊前行不止後已離絕宜分軍隱出奄擊不意風道在人豈有常也世祖曰善分騎奮擊昌軍大潰初太祖詔尚書郎鄧淵著國記十餘卷編年次事體例未成逮于太宗廢而不述神麚二年詔集諸文人撰錄國書浩及弟覽高讜鄧穎晁繼范亨黃輔等共參著作敘成國書三十卷是年議擊蠕蠕朝臣內外盡不欲行保太后固止世祖世祖皆不聽唯浩讚成策略尚書令劉潔左僕射安原等乃使黃門侍郎仇齊推赫連昌太史張淵徐辯說世祖曰今年己巳三陰之歲歲星襲月太白在西方不可舉兵北伐必敗雖克不利於上又群臣共贊和淵等云淵少時嘗諫苻堅不可南征堅不從而敗今天時人事都不和協何可舉動世祖意不決乃召浩令與淵等辯之浩難淵曰陽者德也陰者刑也故日蝕修德月蝕修刑夫王者之用刑大則陳諸原野小則肆之市朝戰伐者用刑之大者也以此言之三陰用兵蓋得其類修刑之義也歲星襲月年飢民流應在他國遠期十二年太白行倉龍宿於天文為東不妨北伐淵等俗生志意淺近牽於小數不達大體難與遠圖臣觀天文比年以來月行奄昴至今猶然其占三年天子大破旄頭之國蠕蠕高車旄頭之眾也夫聖明御時能行非常之事古人語曰非常之原黎民懼焉及其成功天下晏然願陛下勿疑也淵等慚而言曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而苦勞士馬也浩曰淵言天時是其所職若論形勢非彼所知斯乃漢世舊說常談施之於今不合事宜也何以言之夫蠕蠕者舊是國家北邊叛隸今誅其元惡收其善民令復舊役非無用也漠北高涼不生蚊蚋水草美善夏則北遷田牧其地非不可耕而食也蠕蠕子弟來降貴者尚公主賤者將軍大夫居滿朝列又高車號為名騎非不可臣而畜也夫以南人追之則患其輕疾於國兵則不然何者彼能遠走我亦能遠逐與之進退非難制也且蠕蠕往數入國民吏震驚今夏不乘虛掩進破滅其國至秋復來不得安臥自太宗之世迄於今日無歲不驚豈不汲汲乎哉世人皆謂淵辯通解數術明決成敗臣請試之問其西國未滅之前有何亡徵知而不言是其不忠若實不知是其無術時赫連昌在座淵等自以無先言慚赧而不能對世祖大悅謂公卿曰吾意決矣亡國之師不可與謀信矣哉而保太后猶難之復令群臣於保太后前評議世祖謂浩曰此等意猶不伏卿善曉之令悟既罷朝或有尤浩者曰今吳賊南寇而舍之北伐行師千里其誰不知若蠕蠕遠遁前無所獲後有南賊之患危之道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國以來南人恐懼揚聲動眾以衛淮北彼北我南彼勞我息其勢然矣比破蠕蠕往還之間故不見其至也何以言之劉裕得關中留其愛子精兵數萬良將勁卒猶不能固守舉軍盡沒號哭之聲至今未已如何正當國家休明之世士馬強盛之時而欲以駒犢齒虎口也設令國家與之河南彼必不能守之自量不能守是以必不來若或有眾備邊之軍耳夫見瓶水之凍知天下之寒嘗肉一臠識鑊中之味物有其類可推而得也且蠕蠕恃其絕遠謂國家力不能至自寬來久故夏則散眾放畜秋肥乃聚背寒向溫南來寇抄今出其慮表攻其不備大軍卒至必驚駭星分望塵奔走牡馬護群牝馬戀駒驅馳難制不得水草未過數日則聚而困敝可一舉而滅暫勞永逸長久之利時不可失也唯患上無此意今聖慮已決發曠世之謀如何止之陋矣哉公卿也諸軍遂行天師謂浩曰是行也如之何果可克乎浩對曰天時形勢必克無疑但恐諸將瑣瑣前後顧慮不能乘勝深入使不全舉耳及軍入其境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍搜討東西五千里南北三千里凡所俘虜及獲畜產車廬彌漫山澤蓋數百萬高車殺蠕蠕種類歸降者三十餘萬落虜遂散亂矣世祖沿弱水西行至涿邪山諸大將果疑深入有伏兵勸世祖停止不追天師以浩曩日之言固勸世祖窮討不聽後有降人言蠕蠕大檀先被疾不知所為乃焚燒穹廬科車自載將數百人入山南走民畜窘聚方六十里中無人領統相去百八十里追軍不至乃徐徐西遁唯此得免後聞涼州賈胡言若復前行二日則盡滅之矣世祖深恨之大軍既還南賊竟不能動如浩所量浩明識天文好觀星變常置金銀銅鋌於酢器中令青夜有所見即以鋌畫紙作字以記其異世祖每幸浩第多問以異事或倉卒不及束帶奉進蔬食不暇精美世祖為舉匕箸或立嘗而旋其見寵愛如此於是引浩出入臥內加侍中特進撫軍大將軍左光祿大夫賞謀謨之功世祖從容謂浩曰卿才智淵博事朕祖考忠著三世朕故延卿自近其思盡規諫匡予弼予勿有隱懷朕雖當時遷怒若或不用久久可不深思卿言也因令歌工歷頌群臣事在長孫道生傳又召新降高車渠帥數百人賜酒食於前世祖指浩以示之曰汝曹視此人尪纖懦弱手不能彎弓持矛其胸中所懷乃踰於甲兵朕始時雖有征討之意而慮不自決前後克捷皆此人導吾令至此也乃敕諸尚書曰凡軍國大計卿等所不能決皆先諮浩然後施行俄而南藩諸將表劉義隆大嚴欲犯河南請兵三萬先其未發逆擊之因誅河北流民在界上者絕其鄉導足以挫其銳氣使不敢深入詔公卿議之咸言宜許浩曰此不可從也往年國家大破蠕蠕馬力有餘南賊震懼常恐輕兵奄至臥不安席故先聲動眾以備不虞非敢先發又南土下濕夏月蒸暑水潦方多草木深邃疾疫必起非行師之時且彼先嚴有備必堅城固守屯軍攻之則糧食不給分兵肆討則無以應敵未見其利就使能來待其勞倦秋涼馬肥因敵取食徐往擊之萬全之計勝必可克在朝群臣及西北守將從陛下征討西滅赫連北破蠕蠕多獲美女珍寶馬畜成群南鎮諸將聞而生羨亦欲南抄以取資財是以披毛求瑕妄張賊勢冀得肆心既不獲聽故數稱賊動以恐朝廷背公存私為國生事非忠臣也世祖從浩議南鎮諸將復表賊至而自陳兵少簡幽州以南戍兵佐守就漳水造船嚴以為備公卿議者僉然欲遣騎五千并假署司馬楚之魯軌韓延之等令誘引邊民浩曰非上策也彼聞幽州已南精兵悉發大造舟船輕騎在後欲存立司馬誅除劉族必舉國駭擾懼於滅亡當悉發精銳來備北境後審知官軍有聲無實恃其先聚必喜而前行徑來至河肆其侵暴則我守將無以禦之若彼有見機之人善設權譎乘間深入虞我國虛生變不難非制敵之良計今公卿欲以威力攘賊乃所以招令速至也夫張虛聲而召實害此之謂矣不可不思後悔無及我使在彼期四月前還可待使至審而後發猶未晚也且楚之之徒是彼所忌將奪其國彼安得端坐視之故楚之往則彼來止則彼息其勢然也且楚之等瑣才能招合輕薄無賴而不能成就大功為國生事使兵連禍結必此之群矣臣嘗聞魯軌說姚興求入荊州至則散敗乃不免蠻賊掠賣為奴使禍及姚泓已然之效浩復陳天時不利於彼曰今茲害氣在揚州不宜先舉兵一也午歲自刑先發者傷二也日蝕滅光晝昏星見飛鳥墮落宿值斗牛憂在危亡三也熒惑伏匿於翼軫戒亂及喪四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉而萬全國安而身盛今義隆新國是人事未周也災變屢見是天時不協也舟行水涸是地利不盡也三事無一成自守猶或不安何得先發而攻人哉彼必聽我虛聲而嚴我亦承彼嚴而動兩推其咎皆自以為應敵兵法當分災迎受害氣未可舉動也世祖不能違眾乃從公卿議浩復固爭不從遂遣陽平王杜超鎮鄴琅邪王司馬楚之等屯潁川於是賊來遂疾到彥之自清水入河泝流西行分兵列守南岸西至潼關世祖聞赫連定與劉義隆懸分河北乃治兵欲先討赫連群臣曰義隆猶在河中舍之西行前寇未可必克而義隆乘虛則失東州矣世祖疑焉問計於浩浩曰義隆與赫連定同惡相招連結馮跋牽引蠕蠕規肆逆心虛相唱和義隆望定進定待義隆前皆莫敢先入以臣觀之有似連雞不得俱飛無能為害也臣始謂義隆軍來當屯住河中兩道北上東道向冀州西道衝鄴如此則陛下當自致討不得徐行今則不然東西列兵徑二千里一處不過數千形分勢弱以此觀之儜兒情見止望固河自守免死為幸無北渡意也赫連定殘根易摧擬之必仆克定之後東出潼關席卷而前則威震南極江淮以北無立草矣聖策獨發非愚近所及願陛下西行勿疑平涼既平其日宴會世祖執浩手以示蒙遜使曰所云崔公此是也才略之美當今無比朕行止必問成敗決焉若合符契初無失矣後冠軍將軍安頡軍還獻南俘因說南賊之言云義隆敕其諸將若北國兵動先其未至徑前入河若其不動住彭城勿進如浩所量世祖謂公卿曰卿輩前謂我用浩計為謬驚怖固諫常勝之家始皆自謂踰人遠矣至於歸終乃不能及遷浩司徒時方士祁纖奏立四王以日東西南北為名欲以致禎吉除災異詔浩與學士議之浩對曰先王建國以作蕃屏不應假名以為其福夫日月運轉周歷四方京都所居在於其內四王之稱實奄邦畿名之則逆不可承用先是纖奏改代為萬年浩曰昔太祖道武皇帝應天受命開拓洪業諸所制置無不循古以始封代土後稱為魏故代魏兼用猶彼殷商國家積德著在圖史當享萬億不待假名以為益也纖之所聞皆非正義世祖從之是時河西王沮渠牧犍內有貳意世祖將討焉先問于浩浩對曰牧犍惡心已露不可不誅官軍往年北伐雖不克獲實無所損于時行者內外軍馬三十萬匹計在道死傷不滿八千歲常羸死恒不減萬乃不少于此而遠方承虛便謂大損不能復振今出其不意不圖大軍卒至必驚駭騷擾不知所出擒之必矣且牧犍劣弱諸弟驕恣爭權從橫民心離解加比年以來天災地變都在秦涼成滅之國也世祖曰善吾意亦以為然命公卿議之弘農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父職貢朝廷接以蕃禮又王姬釐降罪未甚彰謂宜羈縻而已今士馬勞止宜可小息又其地鹵斥略無水草大軍既到不得久停彼聞軍來必完聚城守攻則難拔野無所掠於是尚書古弼李順之徒皆曰自溫圉河以西至於姑臧城南天梯山上冬有積雪深一丈餘至春夏消液下流成川引以溉灌彼聞軍至決此渠口水不通流則致渴乏去城百里之內赤地無草又不任久停軍馬斤等議是也世祖乃命浩以其前言與斤共相難抑諸人不復餘言唯曰彼無水草浩曰漢書地理志稱涼州之畜為天下饒若無水草何以畜牧又漢人為居終不於無水草之地築城郭立郡縣也又雪之消液才不斂塵何得通渠引漕溉灌數百萬頃乎此言大詆誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辨浩曰汝曹受人金錢欲為之辭謂我目不見便可欺也世祖隱聽聞之乃出親見斤等辭旨嚴厲形於神色群臣乃不敢復言唯唯而已於是遂討涼州而平之多饒水草如浩所言乃詔浩曰昔皇祚之興世隆北土積德累仁多歷年載澤流蒼生義聞四海我太祖道武皇帝協順天人以征不服應期撥亂奄有區夏太宗承統光隆前緒釐正刑典大業惟新然荒域之外猶未賓服此祖宗之遺志而貽功於後也朕以眇身獲奉宗廟戰戰兢兢如臨淵海懼不能負荷至重繼名丕烈故即位之初不遑寧處揚威朔裔掃定赫連逮於神麚始命史職注集前功以成一代之典自爾已來戎旗仍舉秦隴克定徐兗無塵平逋寇於龍川討孽豎於涼域豈朕一人獲濟於此賴宗廟之靈群公卿士宣力之效也而史闕其職篇籍不著每懼斯事之墜焉公德冠朝列言為世範小大之任望君存之命公留臺綜理史務述成此書務從實錄浩於是監祕書事以中書侍郎高允散騎侍郎張偉參著作續成前紀至於損益褒貶折中潤色浩所總焉及恭宗始總百揆浩復與宜都王穆壽輔政事時又將討蠕蠕劉潔復致異議世祖逾欲討之乃召問浩浩對曰往擊蠕蠕師不多日潔等各欲回還後獲其生口云軍還之時去賊三十里是潔等之計過矣夫北土多積雪至冬時常避寒南徙若因其時潛軍而出必與之遇則可擒獲世祖以為然乃分軍為四道詔諸將俱會鹿渾海期日有定而潔恨計不用沮誤諸將無功而還事在潔傳世祖西巡詔浩與尚書順陽公蘭延都督行臺中外諸軍事世祖至東雍親臨汾曲觀叛賊薛永宗壘進軍圍之永宗出兵欲戰世祖問浩曰今日可擊不浩曰永宗未知陛下自來人心安閑北風迅疾宜急擊之須臾必碎若待明日恐其見官軍盛大必夜遁走世祖從之永宗潰滅車駕濟河前驅告賊在渭北世祖至洛水橋賊已夜遁詔問浩曰蓋吳在長安北九十里渭北地空穀草不備欲渡渭南西行何如浩對曰蓋吳營去此六十里賊魁所在擊蛇之法當須破頭頭破則尾豈能復動宜乘勢先擊吳今軍往一日便到平吳之後回向長安亦一日而至一日之內未便損傷愚謂宜從北道若從南道則蓋吳徐入北山卒未可平世祖不從乃渡渭南吳聞世祖至盡散入北山果如浩言軍無所克世祖悔之後以浩輔東宮之勤賜繒絮布帛各千段著作令史太原閔湛趙郡郄標素諂事浩乃請立石銘刊載國書并勒所注五經浩贊成之恭宗善焉遂營於天郊東三里方百三十步用功三百萬乃訖世祖蒐于河西詔浩詣行在所議軍事浩表曰昔漢武帝患匈奴強盛故開涼州五郡通西域勸農積穀為滅賊之資東西迭擊故漢未疲而匈奴已弊後遂入朝昔平涼州臣愚以為北賊未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虛雖有鎮戍適可禦邊而已至於大舉軍資必乏陛下以此事闊遠竟不施用如臣愚意猶如前議募徒豪強大家充實涼土軍舉之日東西齊勢此計之得者浩又上五寅元曆表曰太宗即位元年敕臣解急就章孝經論語詩尚書春秋禮記周易三年成訖復詔臣學天文星曆易式九宮無不盡看至今三十九年晝夜無廢臣稟性弱劣力不及健婦人更無餘能是以專心思書忘寢與食至乃夢共鬼爭義遂得周公孔子之要術始知古人有虛有實妄語者多真正者少自秦始皇燒書之後經典絕滅漢高祖以來世人妄造曆術者有十餘家皆不得天道之正大誤四千小誤甚多不可言盡臣愍其如此今遭陛下太平之世除偽從真宜改誤曆以從天道是以臣前奏造曆今始成訖謹以奏呈唯恩省察以臣曆術宣示中書博士然後施用非但時人天地鬼神知臣得正可以益國家萬世之名過於三皇五帝矣事在律曆志真君十一年六月誅浩清河崔氏無遠近范陽盧氏太原郭氏河東柳氏皆浩之姻親盡夷其族初郄標等立石銘刊國記浩盡述國事備而不典而石銘顯在衢路往來行者咸以為言事遂聞發有司按驗浩取祕書郎吏及長曆生數百人意狀浩伏受賕其祕書郎吏已下盡死浩始弱冠太原郭逸以女妻之浩晚成不曜華采故時人未知逸妻王氏劉義隆鎮北將軍王仲德姊也每奇浩才能自以為得婿俄而女亡王深以傷恨復以少女繼婚逸及親屬以為不可王固執與之逸不能違遂重結好浩非毀佛法而妻郭氏敬好釋典時時讀誦浩怒取而焚之捐灰於廁中及浩幽執置之檻內送於城南使衛士數十人溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以為報應之驗也初浩構害李順基萌已成夜夢秉火爇順寢室火作而順死浩與室家群立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之悉投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虛事夫以火爇人暴之極也階亂兆禍復己招也商書曰惡之易也如火之燎於原不可向邇其猶可撲滅乎且兆始惡者有終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至是而族浩既工書人多託寫急就章從少至老初不憚勞所書蓋以百數必稱馮代強以示不敢犯國其謹也如此浩書體勢及其先人而妙巧不如也世寶其迹多裁割綴連以為模楷浩母盧氏諶孫也浩著食經敘曰余自少及長耳目聞見諸母諸姑所修婦功無不蘊習酒食朝夕養舅姑四時祭祀雖有功力不任僮使常手自親焉昔遭喪亂飢饉仍臻饘蔬餬口不能具其物用十餘年間不復備設先妣慮久廢忘後生無知見而少不習業書乃占授為九篇文辭約舉婉而成章聰辯強記皆此類也親沒之後值國龍興之會平暴除亂拓定四方余備位台鉉與參大謀賞獲豐厚牛羊蓋澤貲累巨萬衣則重錦食則粱肉遠惟平生思季路負米之時不可復得故序遺文垂示來世始浩與冀州刺史賾滎陽太守模等年皆相次浩為長次模次賾三人別祖而模賾為親浩恃其家世魏晉公卿常侮模賾模謂人曰桃簡正可欺我何合輕我家周兒也浩小名桃簡賾小名周兒世祖頗聞之故誅浩時二家獲免浩既不信佛道模深所歸向每雖糞土之中禮拜形像浩大笑之云持此頭顱不淨處跪是胡神也史臣曰崔浩才藝通博究覽天人政事籌策時莫之二此其所以自比於子房也屬太宗為政之秋值世祖經營之日言聽計從寧廓區夏遇既隆也勤亦茂哉謀雖蓋世威未震主末途邂逅遂不自全豈鳥盡弓藏民惡其上將器盈必概陰害貽禍何斯人而遭斯酷悲夫
