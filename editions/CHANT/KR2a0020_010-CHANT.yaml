body:
  text: 卷八帝紀第八世宗紀世宗宣武帝恪世宗宣武皇帝諱恪高祖孝文皇帝第二子母曰高夫人初夢為日所逐避於床下日化為龍繞己數匝寤而驚悸既而有娠太和七年閏四月生帝於平城宮二十一年正月丙申立為皇太子二十三年夏四月丁巳即皇帝位于魯陽大赦天下帝居諒闇委政宰輔五月丙子朔高麗國遣使朝貢六月乙卯分遣侍臣巡行郡國問民疾苦考察守令黜陟幽明文武應求道著丘園者皆加褒禮戊辰追尊皇妣曰文昭皇后秋八月戊申遵遺詔高祖三夫人已下悉歸家癸丑宮臣增位一級癸亥南徐州刺史沈陵南叛冬十月辛未鄧至國王像舒彭來朝丙戌車駕謁長陵丁酉有事於太廟十有一月幽州民王惠定聚眾反自稱明法皇帝刺史李肅捕斬之是歲州鎮十八水民飢分遣使者開倉賑恤高麗國遣使朝獻景明元年春正月壬寅車駕謁長陵乙巳大赦改年丁未蕭寶卷豫州刺史裴叔業以壽春內屬驃騎大將軍彭城王勰帥車騎十萬赴之二月戊戌復以彭城王勰為司徒寶卷將胡松李居士率眾萬餘屯宛陳伯之水軍泝淮而上以逼壽春夏四月丙申彭城王勰車騎將軍王肅大破之斬首萬數己亥皇弟恌薨五月甲寅以北鎮大饑遣兼侍中楊播巡撫賑恤六月丙子司徒彭城王勰進位大司馬車騎將軍王肅加開府儀同三司癸未大陽蠻酋田育丘等率戶內附秋七月寶卷又遣陳伯之寇淮南庚子吐谷渾國遣使朝獻八月乙酉彭城王勰破伯之於肥口乙未高麗國遣使朝貢九月乙丑東豫州刺史田益宗破寶卷將吳子陽鄧元起於長風齊州民柳世明聚眾反冬十月丁卯朔車駕謁長陵庚寅齊兗二州討世明平之丁亥改授彭城王勰為司徒錄尚書事甲午詔壽春置兵四萬人十有一月己亥荊州刺史桓道進攻寶卷下笮戍拔之降者二千餘戶丁巳陽平王頤薨是歲十七州大饑分遣使者開倉賑恤是冬島夷蕭衍起兵東下伐其主蕭寶卷二年春正月丙申朔車駕謁長陵庚戌帝始親政遵遺詔聽司徒彭城王勰以王歸第太尉咸陽王禧進位太保司空北海王詳為大將軍錄尚書事丁巳引見群臣於太極前殿告以覽政之意辛酉高麗國遣使朝獻壬戌以太保咸陽王禧領太尉大將軍廣陵王羽為司徒詔曰朕幼承寶曆艱憂在疚庶事不親風化未洽今始覽政務義協惟新思使四方風從率善可分遣大使黜陟幽明二月庚午宿衛之官進位一級甲戌大赦天下三月乙未朔詔曰比年以來連有軍旅役務既多百姓彫弊宜時矜量以拯民瘼正調之外諸妨害損民一時蠲罷辛亥詔曰諸州刺史不親民事緩於督察郡縣稽逋旬月之間纔一覽決淹獄久訟動延時序百姓怨嗟方成困敝尚書可明條制申下四方令日親庶事嚴勒守宰不得因循寬怠虧政壬戌詔曰治尚簡靜任貴應事州府佐史除板稍多方成損敝無益政道又京師百司寮局殷雜官有閑長者亦同此例苟非稱要悉從蠲省青齊徐兗四州大饑民死者萬餘口是月蕭衍立寶卷弟南康王寶融為主年號中興東赴建業夏五月壬子廣陵王羽薨壬戌太保咸陽王禧謀反賜死六月丁亥考諸州刺史加以黜陟秋七月乙巳蠕蠕犯塞乙未東豫州刺史田益宗破蕭寶卷將黃天賜於赤亭辛酉大赦天下壬戌車騎將軍儀同三司王肅薨九月丁酉發畿內夫五萬五千人築京師三百二十坊四旬而罷己亥立皇后于氏乙卯免壽春營戶為揚州民冬十月丁卯吐谷渾國遣使朝獻辛未蕭寶卷零陵戍主華候率戶內屬十有一月丙申以驃騎大將軍穆亮為司空丁酉大將軍北海王詳為太傅領司徒壬寅改築圜丘於伊水之陽乙卯仍有事焉十二月高麗國遣使朝貢是月寶卷直後張齊殺其主寶卷降蕭衍衍克建業三年春二月戊寅詔曰自比陽旱積時農民廢殖寤言增愧在予良多申下州郡有骸骨暴露者悉可埋瘞三月魯陽蠻反蕭寶卷弟建安王寶夤來降夏四月詔撫軍將軍李崇討魯陽反蠻是月蕭衍又廢其主寶融而僭立自稱曰梁閏月丁巳司空穆亮薨五月揚州小峴戍主党法宗襲蕭衍大峴戍破之擒其龍驤將軍邾菩薩送之京師秋七月癸酉于闐國遣使朝獻詔加文官從征顯達宿衛者二階閑散者一階八月癸卯蕭寶融鎮南大將軍江州刺史陳伯之遣使請降乙卯以前太傅平陽公丕為三老九月丁巳車駕行幸鄴丁卯詔使者弔殷比干墓戊寅閱武於鄴南庚辰武興國世子楊紹先遣使朝獻冬十月庚子帝親射遠及一里五十步群臣勒銘於射所甲辰車駕還宮十有一月己卯詔京洛兵蕪歲踰十紀先皇定鼎舊都惟新魏曆翦掃榛荒創茲雲構鴻功茂績規模長遠今廟社乃建宮極斯崇便當以來月中旬蠲吉徙御仰尋遺意感慶交衷既禮盛周宣斯干之制事高漢祖壯麗之儀可依典故備茲考告以稱遐邇人臣之望十有二月戊子詔曰民本農桑國重蠶籍粢盛所憑冕織攸寄比京邑初基耕桑暫缺遺規往旨宜必祗修今寢殿顯成移御維始春郊無遠拂羽有辰便可表營千畝開設宮壇秉耒援筐躬勸億兆壬寅饗群臣于太極前殿賜布帛有差以初成也甲辰揚州破蕭衍將張囂之斬級二千是歲疏勒罽賓婆羅捺烏萇阿喻陁羅婆不崙陁拔羅弗波女提斯羅噠舍伏耆奚那太羅槃烏稽悉萬斤朱居槃訶盤陁撥斤厭味朱沴洛南天竺持沙那斯頭諸國並遣使朝貢河州大饑死者二千餘口四年春正月乙亥車駕籍田於千畝梁州氐楊會反詔行梁州事楊椿左將軍羊祉討之三月己巳皇后先蠶於北郊庚辰揚州破蕭衍將於陰山斬其龍驤將軍吳道爽等數千級夏四月癸未朔以蕭寶夤為鎮東將軍東揚州刺史封丹陽郡開國公齊王庚寅南天竺國獻辟支佛牙戊戌詔曰酷吏為禍綿古同患孝婦淫刑東海燋壤今不雨十旬意者其有冤獄乎尚書鞫京師見囚務盡聽察之理己亥帝以旱減膳徹懸辛丑澍雨大洽五月甲戌楊椿羊祉大破反氐斬首數千級六月壬午朔封皇弟悅為汝南王丙戌發冀定瀛相并濟六州二萬人馬千疋增配壽春秋七月乙卯三老平陽公元丕薨庚午詔還收鹽池利以入公辛未以彭城王勰為太師八月庚子以吏部尚書元英假鎮南將軍攻蕭衍義陽勿吉國貢楛矢辛丑行幸河南城離宮冬十有一月壬子揚州大破蕭衍軍斬其徐州刺史潘佃憐擒司馬明素己未以武興國世子楊紹先為其國王癸亥詔尚書左僕射源懷撫勞代都北鎮隨方拯恤乙亥鎮南將軍元英大破蕭衍將吳子陽於白沙擒斬千數十有二月庚寅詔鎮南將軍李崇討東荊反蠻丙申詔曰先朝制立軌式庶事惟允但歲積人移物情乖惰比或擅有增損廢墜不行或守舊遺宜時有舛妨或職分錯亂互相推委其下百司列其疑闕速以奏聞癸卯蕭衍梁州刺史平陽縣開國侯翟遠徐州刺史永昌縣開國侯陳虎牙降正始元年春正月庚戌江州刺史曲江公陳伯之破蕭衍將趙祖悅於東闕丙辰東荊州刺史楊大眼大破群蠻樊季安等丙寅大赦改年二月戊子蕭衍將姜慶真襲陷壽春外郭州軍擊走之丁酉揚州統軍劉思祖大破衍眾於邵陽擒其冠軍將軍邵陽縣開國侯張惠紹驃騎將軍祁陽縣開國男趙景悅等十將斬獲數千級三月壬申元英破衍將王僧炳於樊城夏四月辛卯高麗國遣使朝獻五月丁未朔太傅北海王詳以罪廢為庶人六月以旱徹樂減膳癸巳詔曰朕以匪德政刑多舛陽旱歷旬京甸枯瘁在予之責夙宵疚懷有司可循案舊典祗行六事囹圄冤滯平處決之庶尹廢職重加脩舉鰥寡困窮在所存恤役賦殷煩咸加蠲省賢良讜直以禮進之貪殘佞諛時加屏黜男女怨曠務令媾會稱朕意焉甲午帝以旱親薦享於太廟戊戌詔立周旦夷齊廟於首陽山庚子以旱見公卿已下引咎責躬又錄京師見囚殊死已下皆減一等鞭杖之坐悉皆原之秋七月癸丑蕭衍角城戍主柴慶宗以城來降李崇大破諸蠻帥樊素安八月丙子元英破蕭衍將馬仙琕於義陽詔洛陽令有大事聽面敷奏乙酉元英攻義陽拔之擒送蕭衍冠軍將軍蔡靈恩等十餘將辛卯英又大破衍將仍清三關丁酉封元英為中山王戊戌西羌宋萬率戶四千內附九月丙午詔緣淮南北所在鎮戍皆令及秋播麥春種粟稻隨其土宜水陸兼用必使地無遺利兵無餘力比及來稔令公私俱濟也又詔諸州蠲停徭役不得橫有徵發甲子詔中山王英所執蕭衍冠軍將軍監司州事蔡靈恩等隨才擢敘乙丑蕭衍霍州刺史田道龍義州刺史張宗之遣使內附蠕蠕犯塞詔左僕射源懷討之冬十月乙未詔斷群官白衣募吏十有一月戊午詔曰古之哲王創業垂統安民立化莫不崇建膠序開訓國冑昭宣三禮崇明四術使道暢群邦風流萬宇自皇基徙構光宅中區軍國務殷未遑經建靖言思之有慚古烈可敕有司依漢魏舊章營繕國學十有二月丙子以苑牧公田分賜代遷之戶己卯詔群臣議定律令己亥行幸伊闕閏月癸卯朔蕭衍行梁州事夏侯道遷據漢中來降假尚書邢巒鎮西將軍率眾以赴之乙丑驃騎大將軍高陽王雍為司空尚書令廣陽王嘉加儀同三司二年春正月丙子以宕昌國世子梁彌博為其國王鄧至國遣使朝貢二月梁州氐反絕漢中運路刺史邢巒頻大破之夏四月己未城陽王鸞薨乙丑詔曰任賢明治自昔通規宣風贊務實惟多士而中正所銓但存門第吏部彝倫仍不才舉遂使英德罕昇司務多滯不精厥選將何考陟八座可審議往代貢士之方擢賢之體必令才學並申資望兼致丙寅以仇池氐叛詔光祿大夫楊椿假平西將軍率眾以討之邢巒遣統軍王足西伐頻破蕭衍諸軍遂入劍閣執衍輔國將軍范始男送京師五月辛巳氐賊虎率眾降六月己丑詔曰先朝勳臣或身罹譴黜子孫沉滯或宦途失次有替舊流因而弗採何以獎勸言念前績情有親疏宗及庶族祖曾功績可紀而無朝官有官而才堪優引者隨才銓授甲寅蕭衍冠軍將軍李畎等置營始平郡東涪水之北王足逆擊敗之斬衍冠軍將軍張湯輔國將軍馬市寧朔將軍李當姜見祖輔國將軍馮文豪龍驤將軍何營之等甲子詔尚書李崇太府卿于忠散騎常侍游肇諫議大夫鄧羨崇忠使持節並兼侍中羨兼黃門俱為大使糾斷外州畿內其守令之徒咎失彰露者即便施決州鎮重職聽為表聞乙丑蕭衍冠軍將軍王景胤輔國將軍魯方達等攻竹亭王足大破之斬其輔國將軍王明達龍驤將軍張方熾丁卯揚州刺史薛真度大破蕭衍將王超宗俘斬三千級戊辰蕭衍將魯方達屯戍新城足又遣統軍盧祖遷等擊敗之斬衍冠軍將軍楊伯仁寧朔將軍任安定秋七月甲戌詔曰朕纂馭寶曆於今七載德澤未敷鑒不燭遠人之冤瘼所在猶滋而糾察之獄未暢于下賢愚靡分皂白均貫非所以革民耳目使善惡勵心今分遣大使省方巡檢隨其愆負與風響相符者即加糾黜以明雷霆之威以申旄軒之舉因以觀風辨俗採訪功過褒賞賢者糾罰淫慝理窮恤弊以稱朕心戊子王足擊破蕭衍軍斬其龍驤將軍喻增暉寧朔將軍庫保壽輔國將軍魯天惠建武將軍王文標王足逼涪城壬辰蕭衍巴西太守庚域冠軍將軍統軍主李畋等逆戰足擊破之俘斬千數八月壬寅詔中山王英南討襄沔庚戌王足遣統軍紀洪雅盧祖遷等攻破衍軍斬其秦梁二州刺史魯方達等十五人壬子王足又遣統軍盧祖遷等擊破衍軍斬其都督冠軍將軍梓潼縣開國子王景胤劉達等二十四將軍甲寅揚州擊衍將姜慶真於羊石破之是月衍沔東太守田青喜率郡七縣三十一戶萬九十內附九月己巳揚州刺史元嵩擊破衍湘州刺史楊公則等斬獲數千冬十有一月戊辰朔武興國王楊紹先叔父集起謀反詔光祿大夫楊椿討之王足圍涪城益州諸郡戍降者十二三民送編籍者五萬餘戶既而足引軍而退十有二月庚申又詔驃騎大將軍源懷慎令討武興反氐三年春正月丁卯朔皇子生大赦天下壬申梁秦二州刺史邢巒連破氐賊克武興蕭衍冀州刺史桓和入寇南青州州軍擊走之秦州民王智等聚眾二千自號王公尋推秦州主簿呂苟兒為主年號建明己卯楊集起兄弟相率降二月丙辰詔曰昔虞戒面從昌言屢進周任諫輔王闕必箴朕仰纘鴻基伏膺寶曆思康庶績一日萬幾是以側望忠言虛求讜直而良策弗進規畫無聞豈所謂弼諧元首匡救不逮者乎可詔王公已下其有嘉謀深圖直言忠諫利國便民矯時萬俗者咸令指事陳奏無或依違戊午詔右衛將軍元麗等討呂苟兒乙丑平南將軍陳伯之破蕭衍徐州刺史昌義之於梁城是月衍將蕭昞率眾五萬寇淮陽三月己巳以戎旅大興詔罷諸作己卯詔荊州刺史趙怡平南將軍奚康生赴淮陽樂良王長命坐殺人賜死國除戊子名皇子曰昌庚寅平南將軍曲江縣開國公陳伯之自梁城南奔夏四月乙未詔罷鹽池禁甲辰詔遣使者巡慰北邊酋庶庚戌以中山王英為征南將軍都督揚徐二道諸軍事指授邊將蕭衍江州刺史王茂先寇荊州屯於河南城詔平南將軍楊大眼討之辛酉大破之斬其輔國將軍王花首虜二千餘進攻河南城茂先逃潰追奔至於漢水拔其五城將軍宇文福略衍司州俘獲千餘口而還五月乙丑朔詔尚書拯義陽初附之戶丙寅詔曰掩骼埋胔古之令典順辰修令朝之恒式今時澤未降春稼已旱或有孤老餒疾無人贍救因以致死暴露溝塹者洛陽部尉依法棺埋壬申蕭衍將張惠紹入寇陷宿豫乙亥衍將蕭容陷梁城辛巳衍將韋叡陷合肥城壬午詔尚書元遙率眾南討癸未以秦隴未平詔征西將軍于勁節度諸軍己丑衍將又陷羊石霍丘二城六月辛丑又陷小峴戍乙巳安西將軍元麗大破秦賊斬賊帥王智五人梟首六千丁未假平南將軍奚康生破蕭衍將張惠紹斬其徐州刺史宋黑丁巳詔尚書邢巒出討徐兗秋七月丙寅衍將桓和寇孤山陷固城庚辰元麗大破秦賊降呂苟兒及其王公三十餘人秦涇二州平戊子中山王英大破衍徐州刺史王伯敖於陰陵斬其將二十五人首虜五千有餘己丑詔發定冀瀛相并肆六州十萬人以濟南軍八月壬寅安東將軍邢巒破蕭衍將桓和於孤山斬首萬餘級將軍元恒別克固城斬衍冠軍將軍桓方慶統軍畢祖朽別克蒙山斬衍龍驤將軍矯道儀等斬賊及赴沂死者四千餘人兗州平己酉詔平南將軍安樂王詮督後發諸軍以赴淮南壬戌曲赦涇秦岐涼河五州九月癸酉邢巒大破衍軍於宿豫斬其大將藍懷恭等四十餘人張惠紹棄宿豫蕭昞棄淮陽南走追斬數萬級徐州平己丑中山王英大破衍軍於淮南衍中軍大將軍臨川王蕭宏尚書右僕射柳惔徐州刺史昌義之等棄梁城沿淮東走追奔次於馬頭衍冠軍將軍戍主朱思遠棄城宵遁擒送衍將四十餘人斬獲士卒五萬有餘英遂攻鍾離高麗國遣使朝貢蕭衍遣將士卒三萬寇義陽丁酉夜遁走郢州刺史婁悅追擊破之戊申蠕蠕國遣使朝貢己未征虜將軍趙遐大破衍眾於灙城桑坪十有一月甲子帝為京兆王愉清河王懌廣平王懷汝南王悅講孝經於式乾殿庚寅詔曰往歲隴右扇逆合境不民其中猶有卒能自守無豫釁亂疾風知勁良在可嘉尚書可甄量報賞以表誠義是月梁州再破反獠四年春二月丙午吐谷渾宕昌國並遣使朝獻己未勿吉國貢楛矢三月丙子疊伏羅國遣使朝貢夏四月戊戌鍾離大水中山王英敗績而還壬寅吐谷渾鳩磨羅阿拔磨拔切磨勒悉萬斤諸國並遣使朝獻夏六月己丑朔詔曰高祖德格兩儀明並日月播文教以懷遠人調禮學以旌俊造徙縣中區光宅天邑總霜露之所均一姬卜於洛涘戎繕兼興未遑儒教朕纂承鴻緒君臨寶曆思模聖規述遵先志今天平地寧方隅無事可敕有司準訪前式置國子立太學樹小學於四門丙午蕭衍龍驤將軍馮翊太守宇文子生等七郡相率內附丁未社蘭達那羅舍彌比羅直諸國並遣使朝獻秋八月辛卯契丹國遣使朝獻己亥中山王英齊王蕭寶夤坐鍾離敗退並除名為民庚子庫莫奚宕昌吐谷渾諸國遣使朝獻辛丑敦煌民飢開倉賑恤九月己未詔曰朕秉曆承天履年將紀徙正宮極歲浹歸餘台懿茂親祗勤已久列司英彥庸績未酬非所謂有功見知賞以時及其以司空高陽王雍為太尉尚書令廣陽王嘉為司空百官悉進位一級庚申夏州長史曹明謀反伏誅甲子開斜谷舊道疏勒車勒阿駒南天竺婆羅等諸國遣使朝獻丙戌司州民飢開倉賑恤閏月甲午禁大司馬門不得車馬出入冬十月丁巳高麗半社悉萬斤可流伽比沙疏勒于闐等諸國並遣使朝獻丁卯皇后于氏崩戊辰疏勒國遣使朝貢庚午淮陽太守安樂以城南叛辛未嚈噠波斯渴槃陁渴文提不那杖忸杖提等諸國並遣使朝獻乙酉葬順皇后於永泰陵十有一月丁未禁河南畜牝馬自碣石至於劍閣東西七千里置二十二都尉己酉阿與陁呵羅槃陁跋吐羅諸國並遣使朝獻十有二月戊午詔兵士鍾離沒落者復一房田租三年辛酉特那杖提莎缽離阿失勒摩致缽諸國遣使朝貢甲子蠕蠕高車民他莫孤率部來降丁丑缽崙波利伏佛冑善乾達諸國遣使朝貢永平元年春正月戊戌潁川太守王神念奔於蕭衍二月辛未勿吉南天竺國並遣使朝獻三月戊子皇子昌薨己亥斯羅阿陁比羅阿夷叉多婆那伽伽師達于闐諸國並遣使朝獻丙午以去年旱儉遣使者所在賙恤夏四月阿伏至羅國遣使朝貢五月癸未高麗國遣使朝獻辛卯帝以旱故減膳徹懸六月壬申詔曰慎獄重刑著於往誥朕御茲寶曆明鑒未遠斷決煩疑實有攸愧可依洛陽舊圖修聽訟觀農隙起功及冬令就當與王公卿士親臨錄問癸酉高車國遣使朝貢秋七月辛卯高車契丹汗畔罽賓諸國並遣使朝獻甲午以夫人高氏為皇后乙未詔曰察獄以情審之五聽枷杖小大各宜定準然比廷尉司州河南洛陽河陰及諸獄官鞫訊之理未盡矜恕掠拷之苦每多切酷非所以祗憲量衷慎刑重命者也推濫究枉良軫於懷可付尚書精檢枷杖違制之由斷罪聞奏八月癸亥冀州刺史京兆王愉據州反乙丑假尚書李平鎮北將軍行冀州事以討之丁卯大赦改年庚午吐谷渾庫莫奚國並遣使朝貢九月辛巳朔李平大破元愉於草橋丙戌復前中山王英本封壬辰蠕蠕國遣使朝貢定州刺史安樂王詮大破元愉於信都北戊戌殺侍中太師彭城王勰辛丑詔赦冀州民雜工役為元愉所詿誤者其能斬獲逆黨別加優賞癸卯李平克信都元愉北走斬其所署冀州牧韋超右衛將軍眭雅尚書僕射劉子直吏部尚書崔朏等統軍叔孫頭執愉送信都群臣請誅愉帝弗許詔送京師冀州平庚子郢州司馬彭珍治中督榮祖等謀叛潛引蕭衍眾入義陽郢州刺史婁悅擊走之詔將軍胡季智屈祖等南赴義陽三關戍主侯登陽鳳省等以城南叛婁悅嬰城固守遣中山王英督步騎三萬以赴之冬十月丁巳詔復故北海王詳本封葬以王禮豫州彭城人白早生殺刺史司馬悅據城南叛蕭衍遣將齊苟仁等四將以助之詔尚書邢巒行豫州事督將軍崔暹率騎討之丙子邢巒大破早生及苟仁軍於鮑口丁丑前宿豫戍主成安樂子景俊殺宿豫戍主嚴仲賢以城南叛十有一月庚寅詔安東將軍楊椿率眾四萬攻宿豫十有二月己未邢巒克懸瓠斬白早生擒齊苟仁等俘蕭衍卒三千餘人分賜王公已下癸亥中山王英破衍將於楚城擒衍寧朔將軍張疑等郢州刺史婁悅破衍將馬仙琕於金山壬申漢東蠻民一萬七千戶相率內附丙子高麗國遣使朝獻是歲高昌國王麴嘉遣其兄子私署左衛將軍孝亮奉表來朝因求內徙乞師迎接二年春正月蕭衍遣王神念寇南兗詔輔國將軍長孫稚假平南將軍為都督率統軍邴虯等五軍以討之丁亥胡密步就磨忸密槃是悉萬斤辛豆那越拔忸諸國並遣使朝獻壬辰嚈噠薄知國遣使來朝貢白象一乙未高昌國遣使朝貢丙申中山王英進逼蕭衍長薄戍戊戌宵潰殺傷千數丁酉拔武陽關擒衍雲騎將軍松滋縣開國侯馬廣冠軍將軍遷陵縣開國子彭盆生驍騎將軍當陽縣開國伯徐元季等二十六將俘獲七千餘人進攻黃峴西關衍將馬仙琕棄西關李元履棄黃峴遁走是月涇州沙門劉惠汪聚眾反詔華州刺史奚康生討之二月乙卯詔曰比軍役頻興仗多毀敗在庫戎器見有無幾安不忘危古人所戒五兵之器事須充積經造既殷非眾莫舉今可量造四萬人雜仗三月癸未磨豆羅阿曜社蘇突闍地伏羅諸國並遣使朝獻夏四月己酉詔以武川鎮饑開倉賑恤甲子詔曰聖人濟世隨物汙隆或正或權理無恒在先朝以雲駕甫遷嵩基始構河洛民庶徙舊未安代來新宅尚不能就伊闕西南群蠻填聚沔陽賊城連邑作戍蠢爾愚巴心未純款故暫抑造育之仁權緩肅姦之法今京師天固與昔不同揚郢荊益皆悉我有保險諸蠻罔不歸附商洛民情誠倍往日唯樊襄已南仁乖道政被拘隔化非民之咎而無賴之徒輕相劫掠屠害良善離人父兄衍之為酷實亦深矣便可放彼掠民示其大惠捨此殘賊未令之愆并敕緣邊州鎮自今已後不聽境外寇盜犯者罪同境內若州鎮主將知容不糾坐之如律五月高麗國遣使朝獻辛丑帝以旱故減膳徹懸禁斷屠殺甲辰幸華林都亭親錄囚徒犯死罪已下降一等六月高昌國遣使朝獻辛亥詔曰江海方同車書宜一諸州軌轍南北不等今可申敕四方使遠近無二秋七月癸未契丹國遣使朝獻八月丁未鄧至國遣使朝獻戊申以鄧至國世子像覽蹄為其國王高昌勿吉庫莫奚諸國並遣使朝獻九月辛巳封故北海王子顥為北海王壬午詔定諸門闥名冬十月癸丑以司空廣陽王嘉為司徒庚午郢州獻七寶床詔不納十有一月甲申詔禁屠殺含孕以為永制己丑帝於式乾殿為諸僧朝臣講維摩詰經十有二月詔曰五等諸侯比無選式其同姓者出身公正六下侯從六上伯從六下子正七上男正七下異族出身公從七上侯從七下伯正八上子正八下男從八上清脩出身公從八下侯正九上伯正九下子從九上男從九下可依此敘之疊伏羅弗菩提朝陁咤波羅諸國並遣使朝獻三年春二月丙午高昌鄧至國並遣使朝獻壬子秦州沙門劉光秀謀反州郡捕斬之癸亥秦州隴西羌殺鎮將趙俊阻兵反叛州軍討平之三月丙戌皇子生大赦天下高麗吐谷渾宕昌諸國並遣使朝獻夏四月平陽郡之禽昌襄陵二縣大疫自正月至此月死者二千七百三十人五月丁亥詔以冀定二州旱儉開倉賑恤六月壬寅詔重求遺書於天下丁卯名皇子曰詡閏月己亥吐谷渾高麗契丹諸國各遣使朝貢秋七月己未吐谷渾國遣使朝貢八月己卯勿吉國遣使朝貢九月壬寅烏萇伽秀沙尼諸國並遣使朝獻丙辰高車別帥可略汗等率眾一千七百內屬冬十月辛卯中山王英薨丙申詔曰朕乘乾御曆年周一紀而道謝擊壤教慚刑厝至於下民之煢鰥疾苦心常愍之此而不恤豈為民父母之意也可敕太常於閑敞之處別立一館使京畿內外疾病之徒咸令居處嚴敕醫署分師療治考其能否而行賞罰雖齡數有期脩短分定然六疾不同或賴針石庶秦扁之言理驗今日又經方浩博流傳處廣應病投藥卒難窮究更令有司集諸醫工尋篇推簡務存精要取三十餘卷以班九服郡縣備寫布下鄉邑使知救患之術耳戊戌高車龜茲難地那竭庫莫奚等諸國並遣使朝獻十有二月己卯高麗比沙杖國遣使朝獻辛巳江陽王繼坐事除名甲申詔於青州立高祖廟殿中侍御史王敞謀反伏誅四年春正月丁巳汾州劉龍駒聚眾反詔諫議大夫薛和率眾討之甲子阿悅陁不數羅國並遣使朝獻二月壬午青齊徐兗四州民飢甚遣使賑恤三月癸卯婆比幡彌烏萇比地乾達諸國並遣使朝獻壬戌司徒廣陽王嘉薨夏四月琅邪民王萬壽斬蕭衍輔國將軍琅邪東莞二郡太守劉晢首以胊山來降徐州刺史盧昶遣琅邪戍主傅文驥率眾據之甲戌薛和大破山胡蕭衍遣其鎮北將軍張稷及馬仙琕寇胊山詔盧昶率眾赴之五月己亥遷代京銅龍置天淵池西丙辰詔禁天文之學六月乙亥乾達阿婆羅達舍越伽使密不流沙諸國並遣使朝獻秋七月辛酉吐谷渾契丹國並遣使朝獻八月辛未阿婆羅達舍越伽使密不流沙等諸國並遣使朝獻癸巳勿吉國獻楛矢九月甲寅蕭衍九山戍主苟仁以戍來降嚈噠朱居槃波羅莫伽陁移婆僕羅俱薩羅舍彌羅樂陁等諸國並遣使朝獻冬十月丁丑婆比幡彌烏萇比地乾達等諸國並遣使朝獻十有一月甲午宕昌國遣使朝獻己亥詔李崇奚康生等治兵壽春以分胊山之寇戊申難地伏羅國並遣使朝獻胊城陷盧昶大敗而還十有二月壬申詔曰進善退惡治之通規三載考察政之明典正始二年以來于今未考功過難齊寧無昇降從景明二年至永平四年通考以聞戊子大羅汗婆來伽國遣使朝獻延昌元年春正月乙巳以頻水旱百姓飢敝分遣使者開倉賑恤戊申疏勒國遣使朝獻丙辰以車騎大將軍尚書令高肇為司徒公光祿大夫清河王懌為司空司州牧廣平王懷進號驃騎大將軍儀同三司三月辛卯朔渴槃陁國遣使朝獻甲午州郡十一大水詔開倉賑恤以京師穀貴出倉粟八十萬石以賑貧者己未安樂王詮薨夏四月詔以旱故食粟之畜皆斷之丁卯詔曰遷京嵩縣年將二紀虎闈闕唱演之音四門絕講誦之業博士端然虛祿歲祀貴遊之冑歎同子衿靖言念之有兼愧慨可嚴敕有司國子學孟冬使成太學四門明年暮春令就戊辰以旱詔尚書與群司鞫理獄訟詔河北民就穀燕恒二州辛未詔飢民就穀六鎮丁丑帝以旱故減膳徹懸癸未詔曰肆州地震陷裂死傷甚多言念毀沒有酸懷抱亡者不可復追生病之徒宜加療救可遣大醫折傷醫并給所須之藥就治之乙酉大赦改年詔立理訴殿申訟車以盡冤窮之理五月辛卯疏勒及高麗國並遣使朝獻丙午詔天下有粟之家供年之外悉貸飢民自二月不雨至於是晦六月壬申澍雨大洽戊寅通河南牝馬之禁己卯詔曰去歲水災今春炎旱百姓飢餒救命靡寄雖經蠶月不能養績今秋輸將及郡縣期於責辦尚書可嚴勒諸州量民資產明加檢校以救艱敝庚辰詔出太倉粟五十萬石以賑京師及州郡飢民秋七月吐谷渾契丹國並遣使朝獻八月壬戌吐谷渾國遣使朝貢丁亥勿吉國貢楛矢冬十月乙亥立皇子詡為皇太子是月嚈噠于闐高昌及庫莫奚諸國並遣使朝獻十有一月丙申詔曰朕運承天休統御宸宇太子體藉靈明肇建宮華明兩既孚三善方洽宜澤均率壤榮汎庶胤其賜天下為父後者爵一級孝子順孫廉夫節婦旌表門閭量給粟帛十有二月己巳詔守宰為御史所彈遇赦免者及考在中第皆代之二年春正月戊戌帝御申訟車親理冤訟高麗國遣使朝獻二月丙辰朔賑恤京師貧民甲戌以六鎮大饑開倉賑贍己卯太尉高陽王雍進位太保庚辰蕭衍郁州民徐玄明等斬送衍鎮北將軍青冀二州刺史張稷首以州內附詔前南兗州刺史樊魯率眾赴之閏二月辛丑以苑牧之地賜代遷民無田者癸卯定奴良之制以景明為斷三月丙寅高昌國遣使朝獻是春民飢餓死者數萬口夏四月庚子以絹十五萬匹賑恤河南郡飢民五月壽春大水遣平東將軍奚康生等步騎數千赴之高麗國遣使朝獻六月乙酉青州民飢詔使者開倉賑恤甲午曲赦揚州辛亥帝御申訟車親理冤訟是夏州郡十三大水秋八月辛卯詔曰頃水旱互侵頻年饑儉百姓窘弊多陷罪辜煩刑之愧朕用懼矣其殺人掠賣人群彊盜首及雖非首而殺傷財主曾經再犯公斷道路劫奪行人者依法行決自餘恕死徒流已下各準減降庚戌嚈噠于闐槃陁及契丹庫莫奚諸國並遣使朝獻九月丙辰以貴族豪門崇習奢侈詔尚書嚴立限級節其流宕是月勿吉吐谷渾鄧至國並遣使朝貢冬十月詔以恒肆地震民多死傷蠲兩河一年租賦十有二月丙戌丐洛陽河陰二縣租賦乙巳詔以恒肆地震民多離災其有課丁沒盡老幼單辛家無受復者各賜廩以接來稔高麗國遣使朝獻三年春二月乙未詔曰肆州秀容郡敷城縣鴈門郡原平縣並自去年四月以來山鳴地震于今不已告譴彰咎朕甚懼焉祗畏兢兢若臨淵谷可恤瘼寬刑以答災謫三月三關別將李世哲大破群蠻斬蕭衍龍驤將軍文思之文天生夏四月青州民飢辛巳開倉賑恤乙巳上御申訟車親理冤訟六月南荊州刺史桓叔興大破蕭衍軍於九山斬其虎旅將軍新豐縣開國子蔡令孫冠軍將軍席世興貞義將軍藍次孫秋七月丙子勿吉國遣使朝貢八月甲申帝臨朝堂考百司而加黜陟九月吐谷渾契丹勿吉諸國並遣使朝貢冬十月庚辰詔驍騎將軍馬義舒慰諭蠕蠕庫莫奚國遣使朝貢十有一月庚戌南天竺佐越費實諸國並遣使朝獻辛亥詔司徒高肇為大將軍平蜀大都督步騎十五萬西伐益州刺史傅豎眼出巴北平南將軍羊祉出涪城安西將軍奚康生出綿竹撫軍將軍甄琛出劍閣乙卯以中護軍元遙為征南將軍東道都督鎮遏梁楚丁巳幽州沙門劉僧紹聚眾反自號淨居國明法王州郡捕斬之甲戌高麗國遣使朝獻十有二月庚寅詔立明堂四年春正月甲寅帝不豫丁巳崩于式乾殿時年三十三二月甲戌朔上尊諡曰宣武皇帝廟號世宗甲午葬景陵帝幼有大度喜怒不形於色雅性儉素初高祖欲觀諸子志尚乃大陳寶物任其所取京兆王愉等皆競取珍玩帝唯取骨如意而已高祖大奇之庶人恂失德高祖謂彭城王勰曰吾固疑此兒有非常志相今果然矣乃立為儲貳雅愛經史尤長釋氏之義每至講論連夜忘疲善風儀美容貌臨朝淵嘿端嚴若神有人君之量矣史臣曰世宗承聖考德業天下想望風化垂拱無為邊徼稽服而寬以攝下從容不斷太和之風替矣比夫漢世元成安順之儔歟
