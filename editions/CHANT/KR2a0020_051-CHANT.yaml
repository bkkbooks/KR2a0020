body:
  text: 卷四十六列傳第三十四竇瑾許彥李訢竇瑾字道瑜頓丘衛國人也自云漢司空融之後高祖成為頓丘太守因家焉瑾少以文學知名自中書博士為中書侍郎賜爵繁陽子加寧遠將軍參與軍國之謀屢有軍功遷祕書監進爵衛國侯加冠軍將軍轉西部尚書初定三秦人猶去就拜使持節散騎常侍都督秦雍二州諸軍事寧西將軍長安鎮將毗陵公在鎮八年甚著威惠徵為殿中都官尚書仍散騎常侍世祖親待之賞賜甚厚從征蓋吳先驅慰諭因平巴西氐羌酋領降下數千家不下者誅之又降蠻酋仇天爾等三千家於五將山蓋吳平瑾留鎮長安還京復為殿中都官典左右執法世祖歎曰古者右賢左戚國之良翰毗陵公之謂矣恭宗薨於東宮瑾兼司徒奉詔冊諡出為鎮南將軍冀州刺史清約沖素憂勤王事著稱當時還為內都大官興光初瑾女婿鬱林公司馬彌陀以選尚臨涇公主瑾教彌陀辭託有誹謗呪詛之言與彌陀同誅瑾有四子秉持依並為中書學生與父同時伏法唯少子遵逃匿得免遵善楷篆北京諸碑及臺殿樓觀宮門題署多遵書也官至尚書郎濮陽太守多所受納其子僧演姦通民婦為民賈邈所告免官後以善書拜庫部令卒官許彥字道謨小字嘉屯高陽新城人也祖茂慕容氏高陽太守彥少孤貧好讀書後從沙門法叡受易世祖初被徵以卜筮頻驗遂在左右參與謀議拜散騎常侍賜爵博陵侯彥質厚慎密與人言不及內事世祖以此益親待之進爵武昌公拜安東將軍相州刺史在州受納多違法度詔書切讓之然以彥腹心近臣弗之罪也真君二年卒諡曰宣公子宗之初入為中散領內祕書世祖臨江賜爵高鄉侯高宗踐阼遷殿中尚書出為鎮東將軍定州刺史潁川公受敕討丁零丁零既平宗之因循郡縣求取不節深澤人馬超毀謗宗之宗之怒遂毆殺超懼超家人告狀上超謗訕朝政高宗聞之曰此必妄也朕為天下主何惡於超而超有此言必是宗之懼罪誣超按驗果然事下有司司空伊馛等以宗之腹心近臣出居方伯不能宣揚本朝盡心綏導而侵損齊民枉殺良善妄列無辜上塵朝廷誣詐不道理合極刑太安二年冬遂斬於都南宗之孫亮字元規正光中盪寇將軍稍遷冀州驃騎長史司徒諮議參軍年五十二卒宗之長兄熙字德融襲爵武昌公中書郎早卒子安仁襲除中書郎卒贈安東將軍冀州刺史諡曰簡子元康襲爵後降為侯拜冠軍將軍長安鎮副將遷監河州諸軍事河州刺史將軍如故入為廷尉少卿除魏郡太守固辭不拜尋卒贈征虜將軍營州刺史諡曰肅子廓字崇遠襲爵除奉朝請累遷頓丘東太原二郡太守卒年二十八子子躬襲子躬武定末中外府水曹參軍齊受禪爵例降子躬弟子憲太尉中兵參軍元康弟護州主簿子瑞字徵之亦州主簿卒瑞弟絢字伯禮頗有業尚閨門雍睦三世同居吏部尚書李神俊常稱其家風自侍御史累遷尚書左民郎司徒諮議參軍修起居注後拜太中大夫興和初卒年四十七贈使持節都督冀瀛二州諸軍事征東將軍吏部尚書冀州刺史絢弟遜武定末東陽平太守遜弟曄字叔明性開率州治中別駕西高陽太守太中大夫興和三年卒年四十一贈鎮東將軍瀛州刺史曄弟惇字季良武定末兼大司農卿熙弟龍官至趙郡太守孫琰字長琳有幹用初除太學博士累遷尚書南主客郎瀛州中正孝昌中卒年四十七贈平東將軍滄州刺史永熙中重贈散騎常侍衛將軍尚書右僕射瀛州刺史琰弟璣字仲衡有識尚廣平王常侍員外散騎侍郎諫議大夫遷通直散騎常侍瀛州大中正散騎常侍滎陽太守行南青州事卒年五十五琰兄弟並通率多與勝流交遊又有博陵許赤虎涉獵經史善嘲謔延興中著作佐郎與慕容白曜南討後使江南應對敏捷雖言不典故而南人頗稱機辯滑稽焉使還為東郡太守卒官子陀定州長史李訢字元盛小名真奴范陽人也曾祖產產子績二世知名於慕容氏父崇馮跋吏部尚書石城太守延和初車駕至和龍崇率十餘郡歸降世祖甚禮之呼曰李公以崇為平西將軍北幽州刺史固安侯卒年八十一諡曰襄侯訢母賤為諸兄所輕崇曰此子之生相者言貴吾每觀察或未可知遂使入都為中書學生世祖幸中書學見而異之指謂從者曰此小兒終效用於朕之子孫矣因識眄之世祖舅陽平王杜超有女將許貴戚世祖聞之謂超曰李訢後必宦達益人門戶可以女妻之勿許他貴也遂勸成婚南人李哲嘗言訢必當貴達杜超之死也世祖親哭三日訢以超婿得在喪位出入帝目而指之謂左右曰觀此人舉動豈不有異於眾必為朕家幹事之臣訢聰敏機辯強記明察初李靈為高宗博士詔崔浩選中書學生器業優者為助教浩舉其弟子箱子與盧度世李敷三人應之給事高讜子祐尚書段霸兒姪等以為浩阿其親戚言於恭宗恭宗以浩為不平聞之於世祖世祖意在於訢曰云何不取幽州刺史李崇老翁兒也浩對曰前亦言訢合選但以其先行在外故不取之世祖曰可待訢還箱子等罷之訢為世祖所識如此遂除中書助教博士稍見任用入授高宗經高宗即位訢以舊恩親寵遷儀曹尚書領中祕書賜爵扶風公加安東將軍贈其母孫氏為容城君高宗顧謂群臣曰朕始學之歲情未能專既總萬機溫習靡暇是故儒道實有闕焉豈惟予咎抑亦師傅之不勤所以爵賞仍隆者蓋不遺舊也訢免冠拜謝出為使持節安南將軍相州刺史為政清簡明於折獄姦盜止息百姓稱之訢上疏求立學校曰臣聞至治之隆非文德無以經綸王道太平之美非良才無以光贊皇化是以昔之明主建庠序於京畿立學官於郡邑教國子弟習其道藝然後選其俊異以為造士今聖治欽明道隆三五九服之民咸仰德化而所在州土學校未立臣雖不敏誠願備之使後生聞雅頌之音童幼睹經教之本臣昔蒙恩寵長管中祕時課修學有成立之人髦俊之士已蒙進用臣今重荷榮遇顯任方岳思闡帝猷光宣於外自到以來訪諸文學舊德已老後生未進歲首所貢雖依制遣對問之日懼不克堪臣愚欲仰依先典於州郡治所各立學官使士望之流冠冕之冑就而受業庶必有成其經藝通明者貢之王府則郁郁之文於是不墜書奏顯祖從之以訢治為諸州之最加賜衣服自是遂有驕矜自得之志乃受納民財及商胡珍寶兵民告言尚書李敷與訢少長相好每左右之或有勸以奏聞敷不許顯祖聞訢罪狀檻車徵訢拷劾抵罪時敷兄弟將見疏斥有司諷訢以中旨嫌敷兄弟之意令訢告列敷等隱罪可得自全訢深所不欲且弗之知也乃謂其女婿裴攸曰吾宗與李敷族世雖遠情如一家在事既有此勸竟如何也昨來每欲為此取死引簪自刺以帶自絞而不能致絕且亦不知其事攸曰何為為他死也敷兄弟事釁可知有馮闡者先為敷所敗其家切恨之但呼闡弟問之足知委曲訢從其言又趙郡范檦具條列敷兄弟事狀有司以聞敷坐得罪詔列訢貪冒罪應死以糾李敷兄弟故得降免百鞭髡刑配為廝役訢之廢也平壽侯張讜見訢與語奇之謂人曰此佳士也終不久屈未幾而復為太倉尚書攝南部事用范檦陳端等計令千里之外戶別轉運詣倉輸之所在委滯停延歲月百姓競以貨賂各求在前於是遠近大為困弊道路群議曰畜聚斂之臣未若盜臣訢弟左將軍璞謂訢曰范檦善能降人以色假人以辭未聞德義之言但有勢利之說聽其言也甘察其行也賊所謂諂諛讒慝貪冒姦佞不早絕之後悔無及訢不從彌信之腹心之事皆以告檦訢既寵於顯祖參決軍國大議兼典選舉權傾內外百僚莫不曲節以事之檦以無功起家拜盧奴令延興末詔曰尚書李訢著勳先朝弼諧皇極讜言嘉謀旬日屢進實國家之楨幹當今之老成也是以擢授南部綜理煩務自在厥位夙夜惟夤乃心匪懈克己復禮退食自公利上之事知無不為賞罰所加不避疏戚雖孝子之思慈母鷹鸇之逐鳥雀何以方之若鄭之子產魯之季文亦未加也然惡直醜正盜憎主人自往年以來群姦不息劫訢宗人李英等四家焚燒舍宅傷害良善此而可忍孰不可恕有司可明加購募必令擒殄六月顯祖崩訢遷司空進爵范陽公七月以訢為侍中鎮南大將軍開府儀同三司徐州刺史范檦知文明太后忿訢也又知內外疾之太和元年二月希旨告訢外叛文明太后徵訢至京師言其叛狀訢曰無之引檦證訢訢言爾妄云知我吾又何言雖然爾不顧余之厚德而忍為此不仁甚矣檦曰公德於檦何若李敷之德於公公昔忍於敷檦今敢不忍於公乎訢慨然曰吾不用璞言自貽伊戚萬悔於心何嗟及矣遂見誅訢有三子長子邃起家拜侍御中散東宮門大夫遷散騎常侍加平東將軍先訢卒子晴字誨明逃竄遇赦免晴子衡字伯琳武定中中堅將軍齊獻武王丞相府水曹參軍邃弟令和令度與訢同時死訢長兄恭字元順成周太守卒贈幽州刺史容成侯諡曰簡侯恭弟瓘字元衡營丘太守襲父爵固安侯平西將軍卒贈兗州刺史諡曰康侯子長生襲長生卒子元宗襲廣平郡丞陳郡太守璞字季真性惇厚多識人物歷中書博士侍郎漁陽王尉眷傅左將軍長安副將賜爵宜陽侯太常卿承明元年年五十一先訢卒贈安西將軍雍州刺史諡曰穆子暉中書議郎暉弟固太學博士高密太守固弟欽州主簿欽子奭字元熾武定末鎮西將軍南營州別駕奭弟盛字仲炎安東將軍開府諮議參軍盛弟叔樊平西將軍太中大夫欽弟蘊字宗令有器幹中書學生祕書中散侍御中散出為燕郡范陽二郡太守入為員外散騎常侍尚書右丞中堅將軍遷左丞延昌三年卒贈平遠將軍南青州刺史諡曰敬初崇之歸魏也與州里北平田彪俱降而彪子孫遂微劣焉史臣曰魏氏之有天下百餘年中任刑為治蹉跌之間便至夷滅竇瑾李訢器識既美時曰良幹瑾以片言疑似訢以夙故猜嫌而嬰合門之戮悲夫宗之不全自貽伊戚矣
