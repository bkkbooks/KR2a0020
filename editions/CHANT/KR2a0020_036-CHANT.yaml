body:
  text: 卷三十一列傳第十九于栗磾子洛拔于栗磾代人也能左右馳射武藝過人登國中拜冠軍將軍假新安子後與寧朔將軍公孫蘭領步騎二萬潛自太原從韓信故道開井陘路襲慕容寶於中山既而車駕後至見道路修理大悅即賜其名馬及趙魏平定太祖置酒高會謂栗磾曰卿即吾之黥彭大賜金帛進假新安公太祖田於白登山見熊將數子顧謂栗磾曰卿勇幹如此寧能搏之乎對曰天地之性人為貴若搏之不勝豈不虛斃一壯士自可驅致御前坐而制之尋皆擒獲太祖顧而謝之永興中關東群盜大起西河反叛栗磾受命征伐所向皆平即以本號留鎮平陽轉鎮遠將軍河內鎮將賜爵新城男栗磾撫導新邦甚有威惠劉裕之伐姚泓也栗磾慮其北擾遂築壘於河上親自守焉禁防嚴密斥候不通裕甚憚之不敢前進裕遺栗磾書遠引孫權求討關羽之事假道西上題書曰黑槊公麾下栗磾以狀表聞太宗許之因授黑槊將軍栗磾好持黑槊以自標裕望而異之故有是語奚斤之征虎牢也栗磾別率所部攻德宗河南太守王涓之於金墉涓之棄城遁走遷豫州刺史將軍如故進爵新安侯洛陽雖歷代所都久為邊裔城闕蕭條野無煙火栗磾刊闢榛荒勞來安集德刑既設甚得百姓之心太宗南幸盟津謂栗磾曰河可橋乎栗磾曰杜預造橋遺事可想乃編次大船構橋於冶阪六軍既濟太宗深歎美之世祖之征赫連昌敕栗磾與宋兵將軍交趾侯周幾襲陜城昌弘農太守曹達不戰而走乘勝長驅仍至三輔進爵為公加安南將軍平統萬遷蒲阪鎮將時弘農河內上黨三郡賊起栗磾討之轉虎牢鎮大將加督河內軍尋遷使持節都督兗相二州諸軍事鎮南將軍枋頭都將又為外都大官平刑折獄甚有聲稱卒年七十五賜東園祕器朝服一具衣一襲贈太尉公栗磾自少治戎迄于白首臨事善斷所向無前加以謙虛下士刑罰不濫世祖甚悼惜之子洛拔襲爵少以功臣子拜侍御中散有姿容善應對恭慎小心世祖甚加愛寵因賜名焉車駕征討恒在侍衛擢領監御曹事從征涼州既平賜奴婢四十口轉監御曹令恭宗之在東宮厚加禮遇洛拔以恭宗雖則儲君不宜逆自結納恒畏避屏退左轉領候宮曹事頃之襲爵出為使持節散騎常侍寧東將軍和龍鎮都大將營州刺史以治有能名進號安東將軍又為外都大官會隴西屠各王景文等恃險竊命私署王侯高宗詔洛拔與南陽王惠壽督四州之眾討平之徙其惡黨三千餘家於趙魏轉拜侍中殿中尚書遷尚書令侍中如故在朝祗肅百僚憚之太安四年卒時年四十四洛拔有六子洛拔子烈子祚長子烈善射少言有不可犯之色少拜羽林中郎遷羽林中郎將延興初敕領寧光宮宿衛事遷屯田給納太和初秦州刺史尉洛侯雍州刺史宜都王目辰長安鎮將陳提等貪殘不法烈受詔案驗咸獲贓罪洛侯目辰等皆致大辟提坐徙邊仍以本官行秦雍二州事遷司衛監總督禁旅從幸中山車駕還次肆州司空苟頹表沙門法秀詃惑百姓潛謀不軌詔烈與吏部尚書丞祖馳驛討之會秀已平轉左衛將軍賜爵昌國子遷殿中尚書賜帛三千匹于時高祖幼沖文明太后稱制烈與元丕陸叡李沖等各賜金策許以有罪不死加散騎常侍遷前將軍進爵洛陽侯尋轉衛尉卿從駕南征加鎮南將軍及遷洛陽人情戀本多有異議高祖問烈曰卿意云何烈曰陛下聖略淵遠非愚管所測若隱心而言樂遷之與戀舊唯中半耳高祖曰卿既不唱異即是同深感不言之益宜且還舊都以鎮代邑敕留臺庶政一相參委車駕幸代執烈手曰宗廟至重翼衛不輕卿當祗奉靈駕時遷洛邑朕以此事相託顧非不重也烈與高陽王雍奉遷神主於洛陽高祖嘉其勳誠遷光祿卿十九年大選百僚烈子登引例求進烈表曰臣上或近臣下不決引一人而恩出分外冀荷榮祿當今聖明之朝理應謙讓而臣子登引人求進是臣素無教訓請乞黜落高祖曰此乃有識之言不謂烈能辦此乃引見登詔曰朕今創禮新邑明揚天下卿父乃行謙讓之表而有直士之風故進卿為太子翊軍校尉又加烈散騎常侍封聊城縣開國子食邑二百戶及穆泰陸叡謀反舊京高祖幸代泰等伏法賜烈及李沖璽書述金策之意語在陸叡傳是逆也代鄉舊族同惡者多唯烈一宗無所染預高祖嘉其忠操益器重之歎曰元儼決斷威恩深自不惡然而為臣盡忠猛決不如烈也爾日烈在代都必即斬其五三元首耳烈之節概不謝金日磾也詔除領軍將軍以本官從征荊沔加鼓吹一部高祖謂彭城王勰曰烈先朝舊德智勇兼有軍之大計宜共參決宛鄧既平車駕還洛論功加散騎常侍金紫光祿大夫二十三年蕭寶卷遣其太尉陳顯達入寇馬圈高祖輿疾赴之執烈手曰都邑空虛維捍宜重可鎮衛二宮以輯遠近之望顯達破走高祖崩於行宮彭城王勰總一六軍祕諱而返稱詔召世宗會駕魯陽以烈留守之重密報凶問烈處分行留神色無變世宗即位寵任如前咸陽王禧為宰輔權重當時會遣家僮傳言於烈曰須舊羽林虎賁執仗出入領軍可為差遣烈曰天子諒闇事歸宰輔領軍但知典掌宿衛有詔不敢違理無私給奴惘然而返傳烈言報禧禧復遣謂烈曰我是天子兒天子叔元輔之命與詔何異烈厲色而答曰向者亦不道王非是天子兒叔若是詔應遣官人何由遣私奴索官家羽林烈頭可得羽林不可得禧惡烈剛直遂議出之乃授使持節散騎常侍征北將軍恒州刺史烈不願藩授頻表乞停輒優答弗許烈乃謂彭城王勰曰殿下忘先帝南陽之詔乎而逼老夫乃至於此遂以疾固辭世宗以禧等專擅潛謀廢之會二年正月礿祭三公並致齋於廟世宗夜召烈子忠謂曰卿父忠允貞固社稷之臣明可早入當有處分忠奉詔而出質明烈至世宗詔曰諸父慢怠漸不可任今欲使卿以兵召之卿其行乎烈對曰老臣歷奉累朝頗以幹勇賜識今日之事所不敢辭乃將直閣已下六十餘人宣旨召咸陽王禧彭城王勰北海王詳衛送至于帝前諸公各稽首歸政以烈為散騎常侍車騎大將軍領軍進爵為侯增邑三百戶并前五百戶自是長直禁中機密大事皆所參焉太尉咸陽王禧謀反也武興王楊集始馳於北邙以告時世宗從禽於野左右分散直衛無幾倉卒之際莫知計之所出乃敕烈子忠馳覘虛實烈時留守已處分有備因忠奏曰臣雖朽邁心力猶可此等猖狂不足為慮願緩蹕徐還以安物望世宗聞之甚以慰悅及駕還宮禧已遁逃詔烈遣直閤叔孫侯將虎賁三百人追執之順后既立以世父之重彌見優禮八月暴疾卒時年六十五世宗舉哀於朝堂給東園第一祕器朝服一具衣一襲賜錢二百萬布五百匹贈使持節侍中大將軍太尉公雍州刺史追封鉅鹿郡開國公增邑五百戶并前千戶烈有五子長子祚字萬年太和中為中散稍遷恒州別駕襲父爵除假節振威將軍沃野鎮將貪殘多所受納坐免官以公還第卒贈平州刺史祚子若襲爵多酒過為叔父景所撾殺子順襲卒子馥襲祚弟忠弟景烈從子昕烈弟果祚弟忠字思賢本字千年弱冠拜侍御中散文明太后臨朝刑政頗峻侍臣左右多以微譴得罪忠朴直少言終無過誤太和中授武騎侍郎因賜名登轉太子翊軍校尉世宗即位遷長水校尉尋除左中郎將領直寢元禧之謀亂也車駕在外變起倉卒未知所之忠進曰臣世蒙殊寵乃心王室臣父領軍付留守之重計防遏有在必無所慮世宗即遣忠馳騎觀之而烈分兵嚴備果如所量世宗還宮撫背曰卿差強人意賜帛五百匹又曰先帝賜卿名登誠為美稱朕嘉卿忠款今改卿名忠既表貞固之誠亦所以名實相副也父憂去職未幾起復本官遷司空長史于時太傅錄尚書北海王詳親尊權重將作大匠王遇多隨詳所欲而給之後因公事忠於詳前謂遇曰殿下國之周公阿衡王室所須材用自應關旨何至阿諛附勢損公惠私也遇既不寧詳亦慚謝遷征虜將軍餘如故以平元禧功封魏郡開國公食邑九百戶尋遷散騎常侍兼武衛將軍每以鯁氣正辭為北海王詳所忿面責忠曰我憂在前見爾死不憂爾見我死時也忠曰人生於世自有定分若應死於王手避亦不免若其不爾王不能殺詳因忠表讓之際密勸世宗以忠為列卿令解左右聽其讓爵於是詔停其封優進太府卿正始二年秋詔忠以本官使持節兼侍中為西道大使刺史鎮將贓罪顯暴者以狀申聞守令已下便即行決與撫軍將軍尚書李崇分使二道忠劾并州刺史高聰贓罪二百餘條論以大辟還除平西將軍華州刺史遭繼母憂不行服闋授安北將軍相州刺史又為衛尉卿河南邑中正詔忠與吏部尚書元暉度支尚書元匡河南尹元萇等推定代方姓族高肇忌其為人欲密出之乃言於世宗稱中山要鎮作捍須才以忠器能宜居其位於是出授安北將軍定州刺史世宗既而悔之復授衛尉卿領左衛將軍恒州大中正密遣中使詔曰自比股肱褫落心膂無寄方任雖重比此為輕故輟茲外任委以內務當勤夙無怠稱朕所寄也延昌初除都官尚書加平南將軍領左衛中正如故又加散騎常侍嘗因侍宴賜之劍杖舉酒屬忠曰卿世秉貞節故恒以禁衛相委昔以卿行忠賜名曰忠今以卿才堪禦侮以所御劍杖相賜循名取義意在不輕其出入周旋恒以自防也忠頓首陳謝遷侍中領軍將軍忠面陳讓云臣無學識不堪兼文武之任世宗曰當今學識有文者不少但心直不如卿欲使卿劬勞於下我當無憂於上及世宗崩夜中與侍中崔光遣右衛將軍侯剛迎肅宗於東宮而即位忠與門下議以肅宗幼年未親機政太尉高陽王雍屬尊望重宜入居西柏堂省決庶政任城王澄明德茂親可為尚書令總攝百揆奏中宮請即敕授御史中尉王顯欲逞姦計與中常侍給事中孫伏連等厲色不聽寢門下之奏宮侍中黃門但牒六輔姓字齎來孫伏連等密欲矯太后令以高肇錄尚書事顯與高猛為侍中忠即於殿中收顯殺之忠既居門下又總禁衛遂秉朝政權傾一時初太和中軍國多事高祖以用度不足百官之祿四分減一忠既擅權欲以惠澤自固乃悉歸所減之祿職人進位一級舊制天下之民絹布一匹之外各輸綿麻八兩忠悉以與之忠白高陽王雍自云世宗本許優轉雍憚忠威權便順其意加忠車騎大將軍忠自謂新故之際有安社稷之功諷動百僚令加己賞於是太尉雍清河王懌廣平王懷難違其意議封忠常山郡開國公食邑二千戶百僚咸以為然忠又難於獨受乃諷朝廷同在門下者皆加封邑尚書左僕射郭祚尚書裴植以忠權勢日盛勸雍出忠忠聞之逼有司誣奏其罪郭祚有師傅舊恩裴植擁地入國忠並矯詔殺之朝野憤怨莫不切齒王公已下畏之累跡又欲殺高陽王雍侍中崔光固執乃止遂免雍太尉以王還第自此之後詔命生殺皆出於忠既尊靈太后為皇太后居崇訓宮忠為儀同三司尚書令領崇訓衛尉侍中領軍如故靈太后臨朝解忠侍中領軍崇訓衛尉止為儀同尚書令加侍中忠為令旬餘靈太后引門下侍官于崇訓宮問曰忠在端右聲聽何如咸曰不稱厥位乃出忠使持節都督冀定瀛三州諸軍事征北大將軍冀州刺史太傅清河王等奏曰竊惟先帝升遐之初皇上登極之始四海謐然宇內晏清至於奉迎乘輿侍衛省闥斯乃臣子之常節職司之恒理不容以此為功妄開井邑臣等前議所以廣建茅土者正以畏迫威權苟免暴戾故也是以中議之際以十三日夜入為無勳唯以拒違矯令抑黜姦回微可褒敘以前侍中臣忠總攝文武侍中臣光久在樞密讚同其意故唯賞二人今尚書臣昭等無涯上訴奉敕重議案王顯陰結姦徒志為不逞高肇遠同凶逆遙搆禍端無將之罪事合洿戮而忠等徵罪唯以厥身不至孥戮又出罪人窮治不盡案律準憲事在不輕暨皇上纂曆聖后別宮母子隔異溫清道絕皆忠等之咎過方厥勳功微罪重又忠專權之後擅殺樞納輒廢宰輔令朝野駭心遠近怪愕功過相除悉不合賞請悉追奪靈太后從之熙平元年春御史中尉元匡奏曰臣聞事主不以幽貞革心奉上不以趣捨虧節是以倚秦宮而慟哭復楚之功已多陟盧龍而樹勤廣魏之勳不淺而申包避賞君子於是義之田疇拒命良史所以稱美竊唯宮車晏駕天人位易正是忠臣孝子致節之秋前領軍將軍臣忠不能砥礪名行自求多福方因矯制擅相除假清官顯職歲月隆崇臣等在蕃之時乃心家國書誚往來憤氣成疚傷禮敗德臣忠即主謹案臣忠世以鴻勳盛德受遇累朝出入承明左右機近幸國大災肆其愚戇專擅朝命無人臣之心裴郭受冤於既往宰輔黜辱於明世又自矯旨為儀同三司尚書令領崇訓衛尉原其此意便欲無上自處既事在恩後宜加顯戮請御史一人令史一人就州行決崔光與忠雖同受詔而謂光既儒望朝之禮宗攝心虛遠不關世務但忠以光意望崇重逼光光若不同又有危禍伏度二聖欽明深垂昭恕而自去歲正月十三日世宗晏駕以後八月一日皇太后未親覽以前諸有不由階級而權臣用命或發門下詔書或由中書宣敕擅相拜授者已經恩宥正可免其叨竊之罪既非時望朝野所知冒階而進者並求追奪靈太后令曰直繩所糾實允朝憲但忠事經肆宥又蒙特原無宜追罪餘如奏又詔曰忠以往年大諱之際開崇邑土然酬庸理乖有司執奪豈宜一謬棄其餘勳也但忠厥任禁要誠節皎然宜褒錫山河以安厥望可靈壽縣開國公邑五百戶初世宗崩後高太后將害靈太后劉騰以告侯剛剛以告忠忠請計於崔光光曰宜置胡嬪於別所嚴加守衛理必萬全計之上者忠等從之具以此意啟靈太后太后意乃安故太后深德騰等四人並有寵授忠以毀之者多懼不免禍願還京師欲自營救靈太后不許二年四月除尚書右僕射加侍中將軍如故神龜元年三月復儀同三司疾病未拜見裴郭為祟忠自知必死表曰先帝錄臣父子一介之誠昭臣家世奉公之節故申之以婚姻重之以爵祿至乃位亞三槐秩班九命自大明利見之始百官總己之初臣復得猥攝禁戎緝寧內外斯誠社稷之靈兆民之福臣何力之有焉但陛下以叡明御宇皇太后以聖善臨朝衽席不遺簪屨弗棄復乃寵窮出內榮遍宮闈外牧兩河入參百揆顧服知妖省躬識戾而臣將慎靡方致茲痾疚自去秋苦痢纏綿迄今藥石備嘗日增無損又今年已來力候轉惡微喘緒息振復良難鴻慈未酬伏枕涕咽臣薄福無男遺體莫嗣貪及餘生謹陳宿抱臣先養亡第四弟第二子司徒掾永超為子猶子之念實切於心乞立為嫡傳此山河靈太后令曰于忠表如此既誠勳宜錄又無子可矜臨危所祈不容致奪可特聽如請以彰殊效忠薨年五十七給東園祕器朝服一具衣一襲錢二十萬布七百匹蠟三百斤贈侍中司空公有司奏太常少卿元端議忠剛直猛暴專戇好殺案諡法剛強理直曰武怙威肆行曰醜宜諡武醜公太常卿元脩義議忠盡心奉上剪除凶逆依諡法除偽寧真曰武夙夜恭事曰敬諡武敬公二卿不同事奏靈太后令曰可依正卿議于氏自曾祖四世貴盛一皇后四贈公三領軍二尚書令三開國公忠性多猜忌不交勝己唯與直閤將軍章初瓌千牛備身楊保元為斷金之交李世哲求寵於忠私以金帛寶貨事初瓌保元初瓌保元談之遂被賞愛引為腹心忠擅權昧進為崇訓之由皆世哲計也忠後妻中山王尼須女微解詩書靈太后臨朝引為女侍中賜號范陽郡君永超名翻襲爵尋卒子世衡襲齊受禪例降忠弟景字百年自司州從事稍遷步兵校尉寧朔將軍高平鎮將坐貪殘受納為御史中尉王顯所彈會赦免忠薨後景為武衛將軍謀廢元叉叉黜為征虜將軍懷荒鎮將及蠕蠕主阿那瓌叛亂鎮民固請糧廩而景不給鎮民不勝其忿遂反叛執縛景及其妻拘守別室皆去其衣服令景著皮裘妻著故絳襖其被毀辱如此月餘乃殺之烈弟敦自中散遷驍騎將軍景明中假節行并州事除征虜將軍恒州刺史卒官贈使持節平北將軍恒州刺史子昕員外郎直後主衣都統揚烈將軍懷朔武川鎮將中散大夫孝昌中使蠕蠕與阿那瓌擒逆賊破洛汗聽明出六斤等轉輔國將軍北中郎將恒州大中正又遷撫軍將軍衛尉卿出為鎮東將軍殷恒州刺史還拜征東將軍領左右天平中卒贈都督冀定州諸軍事衛將軍尚書僕射儀同三司諡曰文恭長子揚仁武定中勃海太守揚仁弟叉羅字仲綱中軍將軍光州刺史叉羅弟子榮魯郡太守敦弟果嚴毅直亮有父兄之風自中散稍遷光祿大夫守尚書賜爵武城子太和中歷朔華并恒四州刺史子礫襲太子舍人通直散騎常侍卒贈右將軍洛州刺史諡曰哀子暉征東將軍金紫光祿大夫暉弟道揚儀同開府諮議參軍礫弟祇卒於司徒掾贈鎮遠將軍朔州刺史諡曰悼祇子元伯中散大夫果弟勁事在外戚傳勁弟須中散遷長水校尉稍遷武衛將軍太府卿鎮南將軍肆州刺史卒贈侍中車騎大將軍尚書右僕射儀同三司冀州長史卒贈征南將軍燕州刺史諡曰武子翊太尉從事中郎燕州刺史子長文字士端武定中尚書考功郎須弟文仁太中大夫史臣曰魏定中原于栗磾有武功於三世兼以虛己下物罰不濫加斯亦諸將所希矣拔任參內外以著能名烈氣概沉遠受任艱危之際有柱石之質殆禦侮之臣忠以骾朴見親乘非其據遂擅威權生殺自己苟非女主之世何以全其門族其不誅滅抑天幸也
