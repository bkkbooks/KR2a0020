body:
  text: 卷一百六上志第五地形二上夏書禹貢周氏職方中畫九州外薄四海析其物土制其疆域此蓋王者之規摹也戰國分并秦吞海內割裂都邑混一華夷漢興即其郡縣因而增廣班固考地理馬彪志郡國魏世三分晉又一統地道所載又其次也自劉淵石勒傾覆神州僭逆相仍五方淆亂隨所跨擅長更相侵食彼此不恒犬牙未足論繡錯莫能比魏定燕趙遂荒九服夷翦逋偽一國一家遺之度外吳蜀而已正光已前時惟全盛戶口之數比夫晉之太康倍而已矣孝昌之際亂離尤甚恒代而北盡為丘墟崤潼已西煙火斷絕齊方全趙死於亂麻於是生民耗減且將大半永安末年胡賊入洛官司文簿散棄者多往時編戶全無追訪今錄武定之世以為志焉州郡創改隨而注之不知則闕內史及相仍代相沿魏自明莊寇難紛糾攻伐既廣啟土逾眾王公錫社一地累封不可備舉故總以為郡其淪陷諸州戶據永熙綰籍無者不錄焉司州領郡十二縣六十五戶三十七萬一千六百七十五口一百四十五萬九千八百三十五魏尹領縣十三戶一十二萬二千六百一十三口四十三萬八千二十四鄴臨漳繁陽列人昌樂武安臨水魏平邑易陽元城斥章貴鄉陽平郡領縣八戶四萬七千四百四十四口一十六萬二千七十五館陶清淵樂平發干臨清武城武陽陽平廣平郡領縣六戶二萬三千七百五十口十萬三千四百三平恩曲安邯鄲廣平曲梁廣年汲郡領縣六戶二萬九千八百八十三口十萬二千九百九十七北修武南修武汲朝歌山陽獲嘉廣宗郡領縣三戶一萬三千二百六十二口五萬五千八百九十七廣宗武強經東郡領縣七戶三萬五百二十一口十萬七千七百一十七東燕平昌白馬涼城酸棗長垣長樂北廣平郡領縣三戶一萬六千六百九十一口九萬一千一百四十八南和任襄國林慮郡領縣四戶一萬三千八百二十一口五萬二千三百七十二林慮臨淇共魏德頓丘郡領縣四戶一萬七千一十二口八萬七千六十三頓丘衛國臨黃陰安濮陽郡領縣四戶一萬八千六百六十四口五萬五千五百一十二廩丘濮陽城陽鄄城黎陽郡領縣三戶一萬一千九百八十口五萬四百五十七黎陽東黎頓丘清河郡領縣四戶二萬六千三十三口十二萬三千六百七十清河貝丘侯城武城定州領郡五縣二十四戶一十七萬七千五百一口八十三萬四千二百七十四中山郡領縣七戶五萬二千五百九十二口二十五萬五千二百四十一盧奴上曲陽魏昌新市毋極安喜唐常山郡領縣七戶五萬六千八百九十口二十四萬八千六百二十二九門真定行唐蒲吾靈壽井陘石邑鉅鹿郡領縣三戶二萬七千一百七十二口一十三萬二百三十九曲陽稾城鄡博陵郡領縣四戶二萬七千八百一十二口一十三萬五千七饒陽安平深澤安國北平郡領縣三戶一萬三千三十四口六萬五千一百二蒲陰北平望都冀州領郡四縣二十一戶一十二萬五千六百四十六口四十六萬六千六百一長樂郡領縣八戶三萬五千六百八十三口十四萬三千一百四十五堂陽棗強扶柳索盧廣川南宮信都下博渤海郡領縣四戶三萬七千九百七十二口一十四萬四百八十二南皮東光修安陵武邑郡領縣五戶二萬九千七百七十五口一十四萬四千五百七十九武遂阜城灌津武邑武強安德郡領縣四戶二萬二千二百一十六口六萬八千三百九十六平原安德繹幕鬲并州領郡五縣二十六戶一十萬七千九百八十三口四十八萬二千一百四十太原郡領縣十戶四萬五千六口二十萬七千五百七十八晉陽祁榆次中都鄔平遙沾受陽長安陽邑上黨郡領縣五戶二萬五千九百三十七口一十萬四千四百七十五屯留長子壺關寄氏鄉郡領縣四戶一萬六千二百一十口五萬五千九百六十一陽城襄垣銅鞮樂平郡領縣三戶一萬八千二百六十七口六萬八千一百五十九遼陽樂平石艾襄垣郡領縣四戶七千五百一十三口三萬六千五百六十七襄垣五原建義刈陵瀛州領郡三縣十八戶十萬五千五百四十九口四十五萬一千五百四十二高陽郡瀛州領縣九戶三萬五百八十六口十四萬一百七高陽博野蠡吾易扶輿新城樂鄉永寧清苑章武郡領縣五戶三萬八千七百五十四口十六萬二千八百七十成平平舒束州文安西章武河間郡領縣四戶三萬五千八百九口十四萬八千五百六十五武垣樂城中水鄚殷州領郡三縣十五戶七萬七千九百四十三口三十五萬七千一十六趙郡領縣五戶三萬一千八百九十九口一十四萬八千三百一十四平棘房子元氏高邑欒城鉅鹿郡領縣四戶一萬三千九百九十七口五萬八千五百四十九廮陶宋子西經廮遙南趙郡領縣六戶三萬二千四十六口十五萬一百一十三平鄉南欒鉅鹿柏人廣阿中丘滄州領郡三縣十二戶七萬一千八百三口二十五萬一千八百七十九浮陽郡領縣四戶二萬六千八百八十口九萬八千四百五十八饒安浮陽高城章武樂陵郡領縣四戶二萬四千九百九十八口八萬五千二百八十四滄州樂陵陽信厭次濕沃安德郡領縣四戶一萬九千九百二十五口六萬八千一百三十七般重合重平平昌肆州領郡三縣十戶四萬五百八十二口一十八萬一千六百三十三永安郡領縣五戶二萬二千七百四十八口一十萬四千一百八十五定襄陽曲平寇蒲子驢夷秀容郡領縣四戶一萬一千五百六口四萬七千二十四秀容石城肆盧敷城鴈門郡領縣二戶六千三百二十八口三萬四百三十四原平廣武幽州領郡三縣十八戶三萬九千五百八十口一十四萬五百三十六燕郡領縣五戶五千七百四十八口二萬二千五百五十九薊廣陽良鄉軍都安城范陽郡領縣七戶二萬六千八百四十八口八萬八千七百七涿固安范陽萇鄉方城容城遒漁陽郡領縣六戶六千九百八十四口二萬九千六百七十雍奴潞無終漁陽土垠徐無晉州領郡十二縣三十一戶二萬八千三百四十九口一十萬三十九平陽郡領縣五戶一萬五千七百三十四口五萬八千五百七十二禽昌平陽襄陵臨汾泰平北絳郡領縣二戶一千七百四十口六千二百九十二新安北絳永安郡領縣二戶二千九百三十二口一萬五百四十永安楊北五城郡領縣三戶二百一十二口八百六十四平昌石城北平昌定陽郡領縣三戶四百九十八口一千九百四十一平昌西五城敷城郡領縣一戶九十口三百五十九敷城河西郡領縣一戶二百五十六口一千一百四十四夏陽五城郡領縣三戶四百一十一口一千六百一十八北棗南棗永安西河郡領縣三戶一千七百六十一口四千九百九十七永安隰城介休冀氏郡領縣二戶一千三百二口五千三百一十六冀氏合陽南絳郡領縣二戶八百三十六口二千九百九十一南絳小鄉義寧郡領縣四戶二千四百七十八口八千四百六十六團城義寧安澤沁源懷州領郡二縣八戶二萬一千七百四十口九萬八千三百一十五河內郡領縣四戶九千九百五口四萬二千六百一野王沁水河陽軹武德郡領縣四戶一萬一千八百三十五口五萬五千七百一十四平皋溫懷州建州領郡四縣十戶一萬八千九百四口七萬五千三百高都郡領縣二戶六千四百九十九口二萬七千六百三十五高都陽阿長平郡領縣二戶五千四百一十二口二萬二千七百七十八高平玄氏安平郡領縣二戶五千六百五十八口一萬九千五百五十七端氏濩澤泰寧郡領縣四戶一千三百三十五口五千三百三十東永安西河西濩澤高延汾州領郡四縣十戶六千八百二十六口三萬一千二百一十西河郡領縣三戶五千三百八十八口二萬五千三百八十八隰城介休永安吐京郡領縣二戶三百八十四口一千五百一十三新城吐京五城郡領縣三戶二百五十七口一千一百一五城平昌石城定陽郡領縣二戶七百九十七口三千二百八定陽昌寧東雍州領郡三縣八戶六千二百四十一口三萬四百邵郡領縣四戶五十二口一百五十八白水清廉萇平西太平高涼郡領縣二戶四千四百四十五口二萬一千八百五十三高涼龍門正平郡領縣二戶一千七百四十四口八千三百八十九聞喜曲沃安州領郡三縣八戶五千四百五口二萬三千一百四十九密雲郡領縣三戶二千二百三十一口九千一十一密雲要陽白檀廣陽郡領縣三戶二千八口八千九百一十九廣興燕樂方城安樂郡領縣二戶一千一百六十六口五千二百一十九土垠安市義州領郡七縣十九戶三千四百二十八口一萬六千七百六十四五城郡領縣三戶二千一百口一萬七千六十九隰城介休五城泰寧郡領縣三戶二百二十八口一千一百二十七泰寧義興郃陽新安郡領縣三戶三百九十四口一千五百九十五西垣新安東垣澠池郡領縣三戶一百六十六口八百二十八北澠池俱利西新安恒農郡領縣三戶九十三口五百四十三恒農北郟崤宜陽郡領縣三戶一百六十九口六百八十六宜陽南澠池金門金門郡領縣一戶二百七十八口一千二百一十七北陸南汾州領郡九縣十八戶一千九百三十二口七千六百四十八北吐京郡領縣四戶八十八口三百五十一平昌北平昌石城吐京西五城郡領縣三戶二百四十七口一千一百一十八西五城昌寧平昌南吐京郡領縣一戶三十二口七十三新城西定陽郡領縣一戶四十二口一百四十洛陵定陽郡領縣一戶五十四口一百九十永寧北鄉郡領縣二戶二百九口七百五十九龍門汾陰五城郡領縣二戶二百一十四口八百八十四五城平昌中陽郡領縣二戶四百六十八口一千六百三十七洛陵昌寧龍門郡領縣二戶五百七十八口二千四百九十六西太平汾陽南營州領郡五縣十一戶一千八百一十三口九千三十六昌黎郡領縣三戶五百九口二千六百五十八龍城廣興定荒遼東郡領縣二戶五百六十五口二千六百三十四太平新昌建德郡領縣二戶一百七十八口八百一十四石城廣都營丘郡領縣三戶五百一十二口二千七百二十七富平永安帶方樂良郡領縣一戶四十九口二百三永樂東燕州領郡三縣六戶一千七百六十六口六千三百一十七平昌郡領縣二戶四百五十口一千七百一十三萬言昌平上谷郡領縣二戶九百四十二口三千九十三平舒居庸徧城郡領縣二戶三百七十四口一千五百一十三廣武沃野營州領郡六縣十四戶一千二十一口四千六百六十四昌黎郡領縣三戶二百一口九百一十八龍城廣興定荒建德郡領縣三戶二百口七百九十三石城廣都陽武遼東郡領縣二戶一百三十一口八百五十五襄平新昌樂良郡領縣二戶二百一十九口一千八永洛帶方冀陽郡領縣二戶八十九口二百九十六平剛柳城營丘郡領縣二戶一百八十二口七百九十四富平永安平州領郡二縣五戶九百七十三口三千七百四十一遼西郡領縣三戶五百三十七口一千九百五肥如陽樂海陽北平郡領縣二戶四百三十口一千八百三十六朝鮮昌新恒州恒州領郡八縣十四代郡領縣四平城太平武周永固善無郡領縣二善無沃陽梁城郡領縣二參合裋鴻繁畤郡領縣二崞山繁畤高柳郡領縣二安陽高柳北靈丘郡領縣二靈丘莎泉內附郡靈丘郡朔州領郡五縣十三大安郡領縣二狄那捍殊廣寧郡領縣二石門中川神武郡領縣二尖山殊頹太平郡領縣三太平太清永寧附化郡領縣四附化息澤五原廣牧雲州領郡四縣九盛樂郡領縣二歸順還安雲中郡領縣二延民雲陽建安郡領縣二永定永樂真興郡領縣三真興建義南恩蔚州領郡三縣七始昌郡領縣二干門蘭泉忠義郡領縣二葦池楊柳附恩郡領縣三西涼利石化政顯州領郡四縣四定戎郡領縣二零山陽林建平郡領縣二昇原赤谷真君郡武昌郡廓州領郡三廣安郡永定郡建安郡武州領郡三縣四吐京郡領縣二吐京新城齊郡領縣二昌國安平新安郡西夏州領郡二太安郡神武郡寧州領郡四武康郡靈武郡初平郡武定郡靈州靈州前自恒州已下十州永安已後禁旅所出戶口之數並不得知
