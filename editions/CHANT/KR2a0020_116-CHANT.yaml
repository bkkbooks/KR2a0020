body:
  text: 地形二中兗州領郡六縣三十一戶八萬八千三十二口二十六萬六千七百九十一泰山郡領縣六戶二萬六千八百口九萬一千八百七十三鉅平奉高博平嬴牟梁父魯郡領縣六戶一萬五千一百六十口四萬七千三百二十九魯汶陽鄒陽平新陽高平郡領縣四戶一萬一千一百二十四口二萬五千八百九十六高平方與金鄉平陽任城郡領縣三戶八千五十口二萬一千七百八十九任城亢父鉅野東平郡領縣七戶二萬七百五十二口六萬一千八百一十無鹽范須昌壽張平陸富城剛東陽平郡領縣五戶六千一百四十六口一萬八千九十四元城樂平頓丘館陶平原青州領郡七縣三十七戶七萬九千七百五十三口三十萬六千五百八十五齊郡領縣九戶三萬八百四十八口八萬二千一百臨淄昌國益都盤陽平昌廣饒西安安平廣川北海郡領縣五戶一萬七千五百八十七口四萬六千五百四十九下密劇都昌平壽膠東樂安郡領縣四戶五千九百一十六口一萬三千二百三十九千乘博昌安德般渤海郡領縣三戶五千二百七十九口一萬三千七百五重合脩長樂高陽郡領縣五戶六千三百二十二口一萬七千六百六十七高陽新城鄴安次安平河間郡領縣六戶五千八百三十口一萬四千八百一十八阜城城平武垣樂城章武南皮樂陵郡領縣五戶七千九百七十一口一萬八千五百一十五陽信樂陵厭次新樂濕沃齊州領郡六縣三十五戶七萬七千三百七十八口二十六萬九千六百六十二東魏郡領縣九戶一萬九千一百三十口七萬三千五百七十蠡吾頓丘肥鄉聊城衛國博平安陽東魏臨邑東平原郡領縣六戶一萬三千九百二十九口四萬四百三平原鬲臨濟荏平廣宗高唐東清河郡領縣七戶六千八百一十口二萬二千五百七十四清河繹幕鄃零武城貝丘饒陽廣川郡領縣三戶三千九百四十五口一萬一千四百七十二武強索盧中水濟南郡領縣六戶二萬一十七口六萬八千八百二十歷城蓍平陵土鼓逢陵朝陽太原郡領縣四戶一萬三千五百六十口五萬八百二十三太原祝阿山荏盧鄭州領郡三縣九戶六萬二千一百七十三口二十七萬四千二百四十二許昌郡領縣四戶二萬五千三百二十七口一十萬四千四百六十三許昌扶溝鄢陵新汲潁川郡領縣三戶二萬二千四十四口一十萬五千九百九長社臨潁潁陰陽翟郡領縣二戶一萬四千八百二口六萬三千八百七十黃臺陽翟濟州領郡五縣十五戶五萬三千二百一十四口一十四萬五千二百八十四濟北郡領縣三戶九千四百六十七口二萬九千三百九十九臨邑東阿盧平原郡領縣四戶二萬二千二百五十口五萬九千四百三十七聊城博平茌平西聊東平郡領縣二戶八千八百九十六口二萬五千一百三范壽張南清河郡領縣三戶一萬一百三十五口一萬三千九百八十五鄃零高唐東濟北郡領縣三戶二千四百六十四口六千六百七十八肥城穀城蛇丘光州領郡三縣十四戶四萬五千七百七十六口一十六萬九百五十東萊郡領縣四戶一萬九千一百九十五口六萬二千四十四掖西曲城東曲城盧鄉長廣郡領縣六戶一萬五千八百三十三口五萬一千五百六十七昌陽長廣不其挺即墨當利東牟郡領縣四戶一萬七百四十八口四萬七千三百三十八牟平黃惤觀陽梁州領郡三縣七戶四萬三千八百一十九口一十八萬一千九百三陽夏郡領縣五戶一萬六千五百四十九口六萬三千五百五十九陽夏雍丘濟陽圉城襄邑開封郡領縣二戶八千二百七口三萬六千六百二開封尉氏陳留郡領縣三戶一萬九千六百一十二口八萬二千七百四十二浚儀封丘小黃豫州領郡九縣三十九戶四萬一千一百七十二口九萬六千九百一十六汝南郡領縣八戶一萬五千八百八十九口三萬七千六十一上蔡臨汝平輿安城西平瞿陽陽安保城潁川郡領縣三戶八千三百九十六口二萬六百四十邵陵臨潁曲陽汝陽郡領縣三戶七千二百五十四口一萬五千二百四十五汝陽武津征羌義陽郡領縣五戶一千七百九十口四千五百九十五義陽清丘平陽真陽安陽新蔡郡領縣三戶一千九百一十七口四千七百七十八新蔡鮦陽固始初安郡領縣四戶二千二十六口五千九百二十二新懷安昌懷德昭越襄城郡領縣三戶一千四百四十六口四千六十三義綏遂寧武陽城陽郡領縣五戶五百四十六口一千三百八十八安定淮陰真陽建興建寧廣陵郡領縣五戶一千九百六口三千二百二十四宋安光城安蠻新蔡汝南北豫州領郡三縣十二戶四萬七百二十八口一十八萬二千五百五十一廣武郡領縣五戶一萬五千五百九十六口七萬四千五百一十九曲梁原武陽武中牟苑陵滎陽郡領縣五戶二萬一千四百七十二口九萬二千三百一十滎陽成皋京密卷成皋郡領縣二戶三千六百六十口一萬五千七百四十西成皋鞏徐州領郡七縣二十四戶三萬七千八百一十二口一十萬八千七百八十七彭城郡領縣六戶六千三百三十九口二萬三千八百四十一彭城呂薛龍城留雎陵南陽平郡領縣三戶三千七十一口六千三百五十八襄邑陽平濮陽蕃郡領縣三戶四千三百九十二口一萬八千八百四十二蕃永興永福沛郡領縣三戶四千四百一十九口一萬二千二百七十八蕭沛相蘭陵郡領縣四戶七千四百二十四口一萬五千七百七十六昌慮承合鄉蘭陵北濟陰郡領縣三戶八千五百四十六口二萬一千九百八十八豐離狐城武碭郡領縣二戶三千六百二十一口八千七百五十四安陽碭西兗州領郡二縣七戶三萬七千四百七口一十萬三千八百九十四沛郡領縣三戶七千五百七十一口二萬三百一十四考己氏新安濟陰郡領縣四戶二萬九千八百三十六口八萬三千五