body:
  text: 卷一百五之三志第三天象一之三太祖皇始元年夏六月有星彗于髦頭彗所以去穢布新也皇天以黜無道建有德故或憑之以昌或繇之以亡自五胡蹂躪生人力正諸夏百有餘年莫能建經始之謀而底定其命是秋太祖啟冀方之地寔始芟夷滌除之有德教之音人倫之象焉終以錫類長代修復中朝之舊物故將建元立號而天街彗之蓋其祥也先是有大黃星出於昴畢之分五十餘日慕容氏太史丞王先曰當有真人起於燕代之閒大兵鏘鏘其鋒不可當冬十一月黃星又見天下莫敵二年六月庚戌月掩金于端門之外戰祥也變及南宮是謂朝庭有兵時燕王慕容寶已走和龍秋九月其弟賀麟復糾合三萬眾寇新市上自擊之大敗燕師于義臺悉定河北而晉桓玄等連衡內侮其朝庭日夕戒嚴天興元年八月戊辰木晝見胃胃趙代墟也天之事歲為有國之君晝見者並明而于陽也天象若曰且有負海君實能自濟其德而行帝王事是月始正封畿定權量肆禮樂頒官秩十二月群臣上尊號正元日遂禋上帝于南郊由是魏為北帝而晉氏為南帝元年十一月至二年五月月再掩東蕃上相相所以蕃輔王室而定君臣位天象若曰今下凌上替而莫之或振將焉用之哉且曰中坐成刑貴人奪勢是歲桓玄專殺殷仲堪等制上流之眾晉室由是遂卑三年三月有星孛于奎歷閣道至紫微西蕃入北斗魁犯太陽守循下台𨏼南宮履帝坐遂由端門以出奎是封豨剝氣所由生也又殷徐州之次桓玄國焉劉裕興焉天象若曰君德之不建人之無援且有權其列蕃盜其名器之守而荐食之者矣又將由其天步席其帝庭而出號施令焉至四年二月甲寅有大流星眾多西行歷牛虛危絕漢津貫太微紫微虛危主靜人牽牛主農政皆負海之陽國也天象若曰黎元喪其所食失其所係命卒至流亡矣上不能恤又將播遷以從之其後晉人有孫恩之難而桓玄踵之三吳連兵荐饑西奔死亡者萬計竟篡晉主而流之尋陽既又劫之以奔江陵五年四月辛丑月掩辰星在東井月為陰國之兵辰象戰鬭占曰所直野軍大起戰不勝亡地家臣死冬十月帝伐秦師于蒙坑大敗之遂舉乾壁關中大震其上將姚平赴水死五年三月戊子太白犯五諸侯晝見經天九月己未又犯進賢太白為彊侯之誡犯五諸侯所以興霸形也是時桓玄擅征伐之柄專殺諸侯以弱其本朝卒以干君之明而代奪之故皇天著誡焉若曰夫進賢興功大司馬之官守也而今自殘之君於何有焉是冬十月客星白若粉絮出自南宮之西十二月入太微亂氣所由也以距乏之氣而乘粹陽之天庭適足以驅除焉爾明年竟篡晉室得諸侯而不終五年七月己亥月犯歲星在鶉火鳥帑南國之墟也至天賜元年二月甲辰又掩之在角角為外朝而歲星君也天象若曰有彊大之臣干君之庭以挾其主而播遷于外是歲桓玄之師敗績于劉裕玄劫晉帝以奔江陵至五月玄死桓氏之黨復攻江陵陷之凡再劫天子云天賜二年四月己卯月犯鎮星在東壁七月己未又如之十月丁巳又掩之在室夫室星所以造宮廟而鎮司空也占曰土功之事興明年六月發八部人自五百里內繕修都城魏於是始有邑居之制度或曰北宮後庭人主所以庇衛其身也鎮主后妃之位存亡之基而是時堅冰之漸著矣故犯又掩再三焉占曰臣賊君邦大喪是歲三月丁酉月犯心前星三年二月月犯心後星四年二月又如之心主嫡庶之禮占曰亂臣犯主儲君失位庶子惡之先是天興六年冬十月至元年四月月再掩軒轅占曰有亂易政后妃執其咎三年五月壬寅熒惑犯氐氐宿宮也天戒若曰是時蠱惑人主而興內亂之萌矣亦自我天視而修省焉及六年七月宣穆后以彊死太子微行人間既而有清河萬人之難二年八月甲子熒惑犯少微庚寅犯右執法癸卯犯左執法十一月丙戌太白掩鉤鈐皆南邦之謫也火象方伯金為彊侯少微以官賢材而輔南宮之化執法者威令所由行也天象若曰夫祿去公室所由來漸矣始則奮其賢材以為其本朝終以干其鈐轄而席其威令焉至三年十二月丙午月掩太白于危危齊分也占曰其國以戰亡丁未金火皆入羽林四年正月太白晝見奎是謂或稱王師而干君明者占曰天下兵起魯邦受之二月癸亥金火土水聚于奎婁徐魯之分也四神聚謀所以革衰替之政定霸王之命五月己丑金晝見于參天意若曰是將自植攻伐以震其主而代奪之云爾八月辛丑熒惑犯執法九月遂犯進賢與桓氏同占是時南燕慕容氏兼有齊魯之墟不務修德而驟侵晉淮泗六年四月劉裕以晉師伐之大敗燕師于臨胊進克廣固執慕容超以歸戕諸建康於是專其兵威荐食藩輔篡奪之形由此而著云六年六月金火再入太微犯帝座蓬孛客星及他不可勝紀太史上言且有骨肉之禍更政立君語在帝紀冬十月太祖崩夫前事之感大即後事之災深故帝之季年妖怪特甚太宗永興二年五月己亥月掩昴昴為髦頭之兵虜君憂之是月蠕蠕社崙圍長孫嵩于牛川上自將擊之社崙遁走道死是歲三月至秋八月月三掩南斗第五星斗吳分也且曰彊大之臣有干天祿者大人憂之是月乙未太白犯少微晝見九月甲寅進犯左執法占曰且有杖其霸刑以戮社稷之衛而專威令者徵在南朔先是三月丁卯月掩房次將六月己丑又如之八月甲申犯心前星占曰服軛者當之君失馭徵在豫州時劉裕謀弱晉室四年九月專殺僕射謝混因襲荊州刺史劉毅于江陵夷之明年三月又誅晉豫州刺史諸葛長人其君託食而已三年六月庚子月犯歲星在畢八月乙未又犯之在參四年正月又蝕在畢直徼垣之陽參在山河之右歲星所以阜農事安萬人也占曰月仍犯之邊萌阻兵而荐饑是歲六月癸巳金木合于東井七月甲申金犯土于井占曰其國內兵有白衣之會十一月土犯井十二月癸卯土犯鉞土主疆理之政存亡之機也是為土地分裂有戮死之君徵在秦邦至五年二月丙午火土皆犯井占曰國有兵喪之禍主出走是月壬辰歲填熒惑太白聚于井將以建霸國之命也其地君子憂小人流又自三年四月至五年三月熒惑三干鬼主命者將夭而國徙焉是時雍州假王霸之號者六國而赫連氏據朔方之地尤為彊暴荐食關中秦人奔命者殆路間歲姚興薨而難作于內明年劉裕以晉師伐之秦師連戰敗績執姚泓以歸戕諸建康既而遺守內攜長安淪覆焉或曰自上黨並河山之北皆鬼星參畢之郊也五年四月上黨群盜外叛六月濩澤人劉逸自稱三巴王七月河西胡曹龍入蒲子號大單于十月將軍劉潔魏勤擊吐京叛胡失利勤力戰死潔為所虜明年赫連屈孑寇蒲子三城諸將擊走之其餘災波及晉魏仍其兵革之禍神瑞元年二月填入東井犯天尊旱祥也天象若曰土失其性水源將壅焉施于天尊所以福矜寡之萌也先是去年九月至于五月歲再犯軒轅大星八月庚寅至二年三月填再犯鬼積尸歲星主農事軒轅主雪霜風雨之神返覆由之所以告黃祗也土爰稼穡鬼為物之精氣是謂稼穡潛耗人將以饉而死焉一曰大旱是後京師比歲霜旱五穀不登詔人就食山東以粟帛賑乏語在崔浩傳是歲四月癸丑流星晝見中天西行占曰營頭所首野有覆軍流血西行謫在秦邦而魏人覿之亦王師之戒也天若戒魏師曰是擁眾而西固欲干君之明而代奪之爾姑息人以觀變無庸禦焉先是五年三月月犯太白于參八月庚申又犯之參魏分野占曰彊侯作難國戰不勝九月己丑月犯左角是歲三月壬申又蝕之是謂以剛晉之兵合戰而偏將戮徵在兗州二年四月太白入畢月犯畢而再入之占曰大戰不勝邊將憂魏邦受之六月己巳有星孛于昴南天象若曰且有驅除之雄勿用距之于朔方矣明年七月劉裕以舟師泝河九月裕陷我滑臺兗州刺史尉建以畏懦斬時崔浩欲勿戰上難違眾議詔司徒嵩率師迓之及晉人戰于畔城魏師敗績語在崔浩傳裕既定關中遽歸受禪既而赫連氏并之遂竊尊號云二年四月辛巳有星孛于天市五月甲申彗星出天市掃帝座在房心北市所以建國均人心宋分也國且殊號人將更主其革而為宋乎先是往歲七月月犯鉤鈐十一月月食房上相至元年二月又如之天象若曰尚尸鈐鍵之位君憑而尊之者又將及矣是歲八月金木合于翼占曰且有內兵楚邦受之至泰常二年正月晉荊州刺史司馬休之雍州刺史魯宗之為劉裕所襲皆出奔走是歲十月鎮星守太微七十餘日占曰易代立王其三年三月癸丑太白犯五諸侯如桓氏之占七月有流星孛于少微以入太微自劉氏之霸三變少微以加南宮矣始以方伯專之中則霸形干之又今孛政除之馴而三積堅冰至焉是月辰星見東方在翼甚明大翼楚邦也是為冢臣干明賊人其昌九月長彗星孛于北斗轢紫微辛酉入南宮凡八十餘日十二月彗星出自天津入太微逕北斗干紫宮犯天棓八十餘日及天漢乃滅語在崔浩傳是歲晉安帝殂後年而宋篡之夫晉室雖微泰始之遺俗也蓋皇天有以原始篤終以哀王道之淪喪故猶著二微之戒焉泰常三年十月辛巳有大流星出昴歷天津乃分為三須臾有聲占曰車騎滿野非喪即會明年四月帝有事于東廟蕃服之君以其職來祭者蓋數百國也是歲正月己酉月犯軒轅四月壬申又犯填星在張四年五月辰星又犯軒轅占曰國有喪女君受之明年五月貴人姚氏薨是為昭哀皇后六月貴嬪杜氏薨是為密后四年自正月至秋七月月行四犯太微天象若曰太微粹陽之天庭月者臣也今橫行𨏼之不已甚乎先是元年五月月犯歲星在角是歲七月月又犯歲星明年宋始建國後年而晉主殂裕鴆之也昔桓氏之難月再干歲星再劫其主至是亦再犯之而再勦其君極其幽逼之患而濟以篡殺之禍斯謂之甚矣五年十一月乙卯熒惑犯填星在角角外朝也土為紀綱火主內亂會于天門王綱將紊焉占曰有死君逐主后妃憂之十二月月蝕熒惑在亢亢內庭也占曰君薨而亂作于內貴臣以兵死是月客星見于翼翼楚邦也占曰國更服邊有急將軍或謀反者六年二月月食南斗杓星十月乙酉金土鬭于亢占曰內兵且喪更立王公又兗州陳鄭之墟也有攻城野戰之象焉至十年正月犯南斗三月壬戌又犯之斗為人君受命又吳分是歲五月宋武殂秋九月魏師侵宋北鄙十一月攻滑臺克之明年拔虎牢陷金墉屠許昌遂啟河南之地八年宋太后蕭氏死既大臣專權遷殺其主卒皆伏誅六年六月壬午有大流星出紫宮占曰上且行幸若有大君之使明年駕幸橋山祠黃帝東過幽州命使者觀省風俗十月上南征八年春步自鄴宮遂絕靈昌至東郡觀兵成皋反自河內登太行山幸高都飲至晉陽焉七年二月辛巳有星孛于虛危向河津占曰玄枵所以飾喪紀也宗廟並起司人更謀有易政之象十一月甲寅彗星出室掃北斗及于門占曰內宮幾室主命將易塞垣有土功之事其地又齊衛也八年正月彗星出奎南長三丈東南掃河奎為荐食之兵徐方之地占曰西北之兵伐之君絕嗣天下饑七年十二月帝命壽光侯叔孫建徇定齊地八年春築長城距五原二千餘里置守卒以備蠕蠕冬十月大饑十一月己巳上崩于西宮明年宋廢其主由是南邦日蹙齊衛之地盡為兵衝及世祖即政遂荒淮沂以負東海云世祖始光元年正月壬午月犯心大星心為宋分中星者君也月為大臣主刑事是歲五月宋權臣徐羨之謝晦傅亮放殺其主而立其弟宜都王是為宋文帝至十月火犯心天戒若曰是復作亂以干其君矣十月壬寅大流星出天將軍西南行殷殷有聲占曰有禁暴之兵上將督戰以所首名之三年正月歲星食月在張張南國之分歲之於月少君之象今反食之且誅彊大之臣是月羨之等戮死謝晦興江陵之甲以伐其君宋將檀道濟帥師禦之晦又奔潰伏誅二年五月太白晝見經天占曰時謂亂紀革人更王六月己丑火入羽林守六十餘日占曰禁兵大起且有反臣之戒三年十月有流星出西南而東北行光明燭地有聲如雷鳥獸盡駭占曰所發之野有破國遷君西南直夏而首于代都焉著而有聲盛怒也四年五月辛酉金水合于西方占曰兵起大戰先是三年正月宋人有謝氏之難王卒盡出冬十一月上伐赫連昌入其郛徙萬餘家以歸是歲復攻之六月大敗昌于城下昌奔上邽遂拔統萬盡收夏器用虜其母弟妻子由是威加四鄰北夷讋焉神麚元年五月癸未太白犯天街占曰六夷髦頭滅二年五月太白晝見占曰大兵且興彊國有弱者是月上北征蠕蠕大破之虜獲以鉅萬計遂降高車以實漠南闢地數千里云三年六月火犯井鬼入軒轅占曰秦憂兵亂有死君又旱饑之應丙子有大流星出危南入羽林占曰兵起負海國與王師合戰是歲自三月至十月太白再犯歲星月又犯之占曰有國之君或罹兵刑之難者且歲饉十二月丙戌流星首如甕長二十餘丈大如數十斛船色正赤光燭人面自天船及河抵奎大星及于壁占曰天船以濟兵車奎為徐方東壁衛也是為宋師之祥昭盛者事大也是歲六月宋將到彥之等侵魏自南鄙清水入河泝流而西列屯二千餘里九月帝用崔浩策行幸統萬遂擊赫連定於平涼十二月克之悉定三秦地明年大師涉河攻滑臺屠之宋人宵遁是時赫連定轉攻西秦戮其君乞伏慕末吐谷渾慕容璝又襲擊定虜之以彊死者再君焉是歲二月定州大饉詔開倉賑乏或曰奎星羽獵理兵象也流星抵之而著大是為大人之事冬十月上大閱于漠南甲騎五十萬旌旗二千餘里又明盛之徵四年三月有大流星東南行光燭地長六七丈食頃乃滅後有聲占曰大兵從之是時諸將方逐宋師至歷城不及有聲駿奔之象也四月辛未太白晝見于胃胃為趙分五月太白犯天關十月丙辰月又掩之天關外主勃碣山河之險窮焉占曰兵革起九月丙寅有流星大如斗赤色發太微至北斗而滅太微禮樂之庭且有昭德之舉而述宣王命是以帝車受之是月壬申有詔徵范陽盧玄等三十六人郡國察秀孝數百人且命以禮宣喻申其出處之節明年六月上伐北燕舉燕十餘郡進圍和龍徙豪傑三萬餘家以歸延和元年七月有大流星出參左肩東北入河乃滅參主兵政晉魏墟也山河所首推之大兵將發于魏以加燕國八月癸未太白犯心前星乙酉又犯心明堂占曰有亡國近期二年十二月有流星大如甕尾長二十餘丈奔君之象比歲連兵東討至太延二年三月燕後主馮文通去國奔高麗三年三月丙辰金晝見在參魏邦戒也閏月戊寅金犯五諸侯占曰四滑起官兵起亂己丑月入井犯太白占曰兵起合戰秦邦受之七月上幸隰城詔諸軍討山胡白龍入西河九月克之伏誅者數千人而宋大將軍彭城王義康方擅威福後竟幽廢太延元年五月月犯右執法九月火犯太微上將又犯左執法十月丙午月犯右執法二年二月月犯東蕃上相三月月及太白俱犯右執法及上相三年八月火犯左執法及上將五年二月木逆行犯執法皆大臣謫也元年十月左僕射安原謀反誅三年正月征東大將軍中山王纂太尉北平王長孫嵩鎮南大將軍丹陽王叔孫建皆薨其後宋大將軍義康坐徙豫章誅其黨與僕射殷景仁亦尋卒焉二年五月壬申有星孛于房占曰名山崩有亡國八月丁亥木入鬼守積尸十一月辛亥又犯鬼鬼秦分天戒若曰涼君淫奢無度財力窮矣將喪國身為戮焉三年正月壬午有星晡前晝見東北在井左右色黃大如橘魏師之應也黃星出于燕墟而慕容氏滅今復見東井涼室亡乎四年四月己酉華山崩華山西鎮也天又若曰星孛于房既有徵矣鎮傾而國從之先是元年十二月金犯羽林二年十二月至四年十一月火再入之五年五月太白晝見胃昴入羽林遂犯畢畢又邊兵也六月上自將西征秋八月進圍姑臧九月丙戌沮渠牧犍帥文武將吏五千餘人面縛來降明年悉定涼地四年十月壬戌大流星出文昌入紫宮聲如雷天象若曰將相或以全師禦衛帝宮者其事密近有震驚之象焉明年六月帝西征詔大將軍嵇敬等帥眾二萬屯漠南以備暴寇九月蠕蠕乘虛犯塞遂至七介山京師大駭司空長孫道生等并力拒之虜乃退走是月壬午有大流星出紫微入貫索長六丈餘占曰有大君之命貫索賤人牢也明年帝命侍臣行郡國觀風俗問其所疾苦云真君二年七月壬寅填星犯鉞鎮者國家所安危而為之綱紀者也其嬰鈇鉞之戮而君及焉自元年十一月至此月歲星三犯房上相歲星為人君今反覆由之循省鉤鈐之備也天若戒輔臣曰涼邦卒滅敵國殫矣而猶挾震主之威負百勝之計盍思盈亢之戒乎是時司徒崔浩方持國鈞且有寵於上明年安西李順備五刑之誅而由浩鍛成之後八年竟族滅無後夫天哀賢良而示以明訓夙矣罕能省躬以先覺豈不悲哉浩誅之明年卒有景穆之禍後年而亂作三年三月癸未月犯太白占曰大兵起合戰九月乙丑有星孛于天牢入文昌五車經昴畢之間至天苑百餘日與宿俱入西方天象若曰且有王者之兵彗除髦頭之域矣貴臣預有戮焉明年正月征西將軍皮豹子大敗宋師于樂鄉九月上北伐樂平王丕統十五將為左軍中山王辰統十五將為右軍上自將中軍蠕蠕可汗不敢戰亡追至頓根河虜二萬餘騎而還中山王辰等八將軍坐後期皆斬六年二月太白熒惑歲星聚于東井占曰三星合是為驚立絕行其國內外有兵與喪改立王公九月盧水胡蓋吳據杏城反僭署百官雜虜皆響從關內大震十一月將軍叔孫拔敗吳師于渭北至七年正月太白犯熒惑占曰兵起有大戰時上討吳黨於河東屠之遂幸長安三月吳軍敗績于杏城棄馬遁去復收合餘燼八月乃夷之九年正月火水皆入羽林占曰禁兵大起四月太白晝見經天十年五月彗星出于昴北此天所以滌除天街而禍髦頭之國也時閒歲討蠕蠕是秋九月上復自將征之所捕虜凡百餘萬矣十年十月辛巳彗星見于太微占曰兵喪並興國亂易政臣賊主至十一年正月甲子太白晝見經天四月又如之占曰中歲而再干明兵事尤大且革人更王之應也是歲十月甲辰熒惑入太微十二月辛未又犯之癸卯又如之占曰臣將戮主君將惡之仍犯事荐也先是八年正月庚午月犯心大星九年正月犯歲星是歲九月太白又犯歲星至正平元年五月彗星見卷舌入太微卷舌讒言之戒六月辛酉彗星進逼帝座七月乙酉犯上相拂屏出端門滅于翼軫辛酉直陰國翼軫為楚邦于屏者蕭牆之亂也天象若曰夫膚受之譖實為亂階卒至芟夷主相而專其大號雖南國之君由遷及焉先是去年十月上南征絕河十二月六師涉淮登瓜步山觀兵騎士六十萬列屯三千餘里宋人兇懼饋百牢焉是年正月盡舉淮南地俘之以歸所夷滅甚眾六月帝納宗愛之言皇太子以彊死明年二月愛殺帝于永安宮左僕射蘭延等以建議不同見殺愛立吳王余為主尋又賊之荐災之驗也閒歲宋太子劭坐蠱事泄亦殺其君而僭立劭弟武陵王駿以上流之師討平之滅於翼軫之徵也高宗興安二年二月有星孛于西方占曰凡孛者非常惡氣所生也內不有大亂外且有大兵至興光元年二月有流星大如月西行占曰奔星所墜其野有兵光盛者事大先是京兆王杜元寶建康王崇濟南王麗濮陽王閭文若永昌王仁相次謀反伏誅是歲宋南郡王義宣及魯爽臧質以荊豫之師構逆大將王玄謨等西討盡夷之或曰彗加太微翼軫之餘禍也春秋星之大變或災連三國之君其流炎之所及二十餘年而後弭至是彗干天庭二太子首亂三君為戮侯王辜死者幾數十人由此言之皇天疾威之誡不可不惕也太安元年六月辛酉有星起河鼓東流有尾跡光明燭地河鼓為履險之兵負海之象也昭盛為人君之事星之所往君且從之閒二歲帝幸遼西登碣石以臨滄海復所過郡國一年又尾迹之徵二年夏四月熒惑犯太白占曰是謂相鑠不可舉事用兵成師以出而禍其雄之象也明年宋將殷孝祖侵魏南鄙詔征南將軍皮豹子擊之宋軍大敗三年十一月熒惑犯房鉤鈐星是謂彊臣不御王者憂之至四年正月月入太微犯西蕃三月又犯五諸侯占曰諸侯大臣有謀反伏誅者是月太白犯房八月月入南斗皆宋分占曰國有變臣為亂十一月長星出於奎色白蛇行有尾跡既滅變為白雲奎為徐方又魯分也占曰下有流血積骨明年宋兗州刺史竟陵王誕據廣陵作亂宋主親戎自夏涉秋無日不戰及城陷悉屠之四年八月熒惑守畢直徼垣之南占曰歲饉至五年二月又入東井占曰旱兵饑疫大臣當之六月太白犯鉞占曰兵起更正朔是歲二月司空伊馛薨十二月六鎮雲中高平雍秦饑旱明年改年為和平至六月諸將討吐谷渾什寅遂絕河窮躡之會軍大疫乃還四年九月月犯軒轅十二月犯氐至五年正月月掩軒轅又掩氐東南星皆后妃之府也和平元年正月丁未歲犯鬼鬼為死喪歲星人君也是為君有喪事三月月掩軒轅四月戊戌皇太后崩於壽安宮和平元年十月有長星出於天倉長丈餘饉祥也二年三月熒惑入鬼是謂稼穡不成且曰萬人相食其後定相阻饑宥其田租時三吳亦仍歲凶旱死者十二三先是元年四月太白犯東井井鬼皆秦分雍州有兵亂自元年六月月犯心大星三犯前後于房心宋分時宋君虐其諸弟後宮多喪子女繼夭哭泣之聲相再是歲詔諸將討雍州叛氐大破之宋雍州刺史海陵王休茂亦稱兵作亂間歲而宋主殂嗣子淫昏政刑紊焉二年三月辛巳有長星出天津色赤長匹餘滅而復出大小百數天津帝之都船所以渡神通四方光大且眾為人君之事天象若曰是將有千乘萬騎之舉而絕逾大川矣是月發卒五千餘通河西獵道後年八月帝校獵于河西宋主亦大閱舟師巡狩江右云二年九月太白犯南斗斗吳分占曰君死更政大臣有誅者十一月太白犯填填女君也且曰有內兵白衣會至三年九月火犯積尸占曰貴人憂之斧鉞用十月太白犯歲星歲為人君而以兵喪干之且有死君篡殺之禍是月熒惑守軒轅占曰女主憂之宮中兵亂十一月歲入氐氐為正寢歲為有國之君占曰諸侯王有來入宮者五年二月月入南斗魁中犯第四星占曰大人憂太子傷宮中有自賊者又大赦既而宋孝武及宋后相繼崩殂少主荐誅輔臣釁連戚屬群下相與殺之而立宋明帝江南大饑且仍有肆眚之令焉五年七月丁未歲星守心心為明堂歲為諸侯為長子入而守之立君之象占曰凡五星守心皆為宮中亂賊群下有謀立天子者七月己酉有流星長丈餘入紫微經北辰第三星而滅占曰有大喪九月丁酉火入軒轅十一月長星出織女色正白彗之象也女主專制將由此始是以天視由之長星彗之著易政之漸焉冬熒惑入太微犯上將十二月遂守之占曰公侯謀上且有斬臣六年正月乙未有流星長丈餘自五車抵紫宮西蕃乃滅天象若曰群臣或修霸刑而干蕃輔之任矣且占曰政亂有奇令四月太白犯五諸侯占曰有專殺諸侯者五月癸卯上崩于太華殿車騎大將軍乙渾矯詔殺尚書楊寶年等于禁中戊申又害司徒平原王陸麗明年皇太后定策誅之太后臨朝自馮氏始也或曰心為宋分是歲六月歲星晝見于南斗斗為天祿吳分也天象若曰或以諸侯干君而代奪之是冬宋明帝以皇弟踐阼孝武諸子舉兵攻之四方響應尋皆伏誅有太白之刑與歲星之祐焉顯祖天安元年正月太白犯歲星歲農事也肅殺干之是為稼穡不登六月熒惑犯鬼占曰旱饑疾疫金革用八月丁亥太白犯房占曰霜雨失節馬牛多死九月甲寅熒惑犯上將太白犯南斗第二星占曰貴人將相有誅者十一月己酉太白又犯歲星或曰歲為諸侯太白主兵刑之政再干之事洊也是歲九月州鎮十一旱饑十月宋氏六王皆戮死明年宋師敗于呂梁江南阻饑牛且大疫其後東平王道符擅殺副將及雍州刺史據長安反詔司空和其奴討滅之九月詔賜六鎮孤貧布帛宋主以後宮服御賜征北將士後歲夏旱河決州鎮二十七皆饑尋又天下大疫皇興元年四月太白犯鎮星占曰有攻城略地之事六月壬寅太白犯鬼秦分也二年正月太白犯熒惑占曰大兵起是時鎮南大將軍尉元征南大將軍慕容白曜略定淮泗明年徐州群盜作亂元又討平之後歲正月上黨王觀西征吐谷渾又大破之二年九月癸卯火犯太微上將占曰上將誅先是元年六月熒惑犯氐是歲十一月太白又犯之是為內宮有憂逼之象占曰天子失其宮四年十月誅濟南王慕容白曜明年上迫於太后傳位太子是為孝文帝高祖延興元年十月庚子月入畢口畢魏分占曰小人罔上大人易位國有拘主反臣十二月辛卯火犯鉤鈐鉤鈐以統天駟火為內亂天象若曰人君失馭或以亂政乘之矣乙巳鎮星犯井夫井者天下之平也而女君以干之是為后竊刑柄占曰天下無主大人憂之有過賞之事焉二年正月月犯畢丙子月犯東井庚子又如之占曰天下有變令貴人多死者三年八月月犯太微又群陰不制之象也是時馮太后宣淫于朝昵近小人而附益之所費以鉅萬億計天子徒尸位而已二年九月河間王閭虎皮以貪殘賜死其後司空東平郡王陸麗坐事廢為兵既而宮車晏駕四年正月己卯月犯畢七月丙申太白犯歲星在角丁巳太白又入氐太白有母后之幾主兵喪之政以干君於外朝而及其宿宮是將有劫殺之虞矣二月癸丑月犯軒轅甲寅又犯歲星月為彊大之臣為女主之象始由后妃之府而干少陽之君示人主以戒敬之備也五年三月甲戌月掩填星天象若曰是又僻行不制而棄其紀綱矣且占曰貴人彊死天下亂三月癸未金火皆入羽林占曰臣欲賊主諸侯之兵盡發八月乙亥月掩畢十一月月入軒轅食第二星至承明元年四月月食尾五月己亥金火皆入軒轅庚子相逼同光皆后妃之謫也天若言曰母后之釁幾貫盈矣人君忘祖考之業慕匹夫之孝其如宗祀何是時獻文不悟至六月暴崩實有鴆毒之禍焉由是言之皇天有以睹履霜之萌而為之成象久矣其後文明皇太后崩孝文皇帝方修諒陰之儀篤孺子之慕竟未能述宣春秋之義而懲供人之黨是以胡氏循之卒傾魏室豈不哀哉或曰太白犯歲於天門以臣伐君之象金火同光又兵亂之徵時宋主昏狂公侯近戚冤死相繼既而桂陽建平王並稱兵內侮矢及宮闕僅乃戡之尋為左右楊玉夫等所殺太和元年五月庚子太白犯熒惑在張南國之次也占曰其國兵喪並興有軍大戰人主死壬申水土合于翼皆入太微主令不行之象也占曰女主持政大夫執綱國且內亂群臣相殺九月丁亥太白晝見經天光色尤盛更姓之祥也二年九月火犯鬼占曰主以淫泆失政相死之三年三月月犯心心為天王又宋分三月填星逆行入太微留左掖門內占曰土守南宮必有破國易代逆行者事逆也自元年三月至二年六月月行五犯太微與劉氏篡晉同占又自元年八月至三年五月月行六犯南斗入魁中斗為大人壽命且吳分是時馮太后專政而宋將蕭道成亦擅威福之權方圖劉氏宋司徒袁粲起兵石頭沈攸之起兵江陵將誅之不剋皆為所殺三年四月竟篡其君而自立是為齊帝是年五月又害宋君于丹陽宮三年自五月至十二月月三入斗魁中四年五月庚戌七月己巳又如之六年二月又犯斗魁第二星占曰其國大人憂不出三年七月丁未十月丙申月再犯心大星自四年正月至六年二月又五干之斗為爵祿之柄心為布政之宮月行干而𨏼之亦以荐矣其占曰月犯心亂臣在側有亡君之戒人主以善事除殃是時馮太后將危少主者數矣帝春秋方富而承事孝敬動無違禮故竟得無咎至六年三月而齊王殂焉或曰月犯斗其國兵憂心又豫州也時比歲連兵南討五年二月大破齊師于淮陽又擊齊下蔡軍大敗之三年九月庚子太白犯左執法十二月丙戌月犯之四年二月辛巳月又犯之九月壬戌太白又犯之五年二月癸卯月犯太微西蕃上將至六年十月乙酉熒惑又犯之夫南宮執法所以糾淫忒成肅雍而上將朝庭之輔也天象若曰王化將弛淫風幾興固不足以令天下矣而廷臣莫之糾弼安用之文明太后雖獨厚幸臣而公卿坐受榮賜者費亦巨億蓋近乎素餐焉其三年九月安樂王長樂下獄死隴西王源賀薨四年正月廣川王略薨襄城王韓頹徙邊七月頓丘王李鍾葵賜死其後任城王雲中山王叡又薨比年死黜相繼蓋天謫存焉五年九月辛巳填犯辰星于軫占曰為饑為內亂且有壅川溢水之變是歲京師大霖雨州鎮十二饑至六年七月丙申又大流星起東壁光明燭地尾長二丈餘東壁土功之政也是月發卒五萬通靈丘道十月己酉有流星入翼尾長五丈餘七星中州之羽儀翼南國也天象若曰將擇文明之士使于楚邦焉明年員外散騎常侍李彪使齊始通二國之好焉七年六月庚午辰時東北有流星一大如太白北流破為三段十月己亥星隕如虹是時太后專朝且多外嬖雖天子由倚附之故有干明之謫焉破而為三席勢者眾也昔春秋星隕如雨而群陰起霸其後漢成帝時旰日晦冥眾星行隕燿燿如雨而王氏之禍萌至是天妖復見又與元后同符矣十年八月辰時有星落如流火三道戊寅又有流星出日西南一丈所西北流大如太白至午西破為二段尾長五尺復分為二入雲間仍見者事荐也後代其踵而行之以至於分崩離析乎先是七年十月有客星大如斗在參東似孛占曰大臣有執主之命者且歲旱糴貴十年九月熒惑犯歲星歲主農事火星以亂氣干之五稼旱傷之象也占曰亢陽以饉人不安自八年至十一年黎人阻饑且仍歲災旱十一年三月丁亥火土合于南斗填為履霜之漸斗為經始之謀而天視由之所以為大人之戒也占曰其國內亂不可舉事用兵是時齊主持諸侯王酷甚雖酒食之饋猶裁之有司故天若言曰非所以保根固本以貽長代之謀也內亂由是興焉五月丁酉太白經天晝見庚子遂犯畢畢又邊兵也是歲蠕蠕寇邊明年齊將陳達伐我南鄙陷澧陽間歲而齊君子子響為有司所御遂憤怒而反伏誅及齊主殂而西昌侯篡之高武子孫所在棋布皆拱手就戮亦齊君自為之焉七月癸丑太白犯軒轅大星八月甲寅又犯之皆女君之謫也天象若曰軒轅以母萬物由后妃之母兆人也是固多穢復將安用之其物類之感又稼穡之不滋候也是歲年穀不登聽人出關就食明年州鎮十五皆大饑詔開倉賑乏間歲太后崩十二年三月甲申歲星逆行入氐甲申皆齊分也占曰諸侯王而升為天子者逆行者其事逆也先是去年十月歲辰太白合于氐是謂驚立絕行改立王公是歲四月月犯氐與歲同舍六月丁巳月又入氐犯歲星月為彊大之臣歲為少君也與歲同心內宮而干犯之彊宗擅命逼奪其君之象也再干之其事荐至十三年三月庚申月犯歲十五年六月又犯之歲星不在宿宮是為彊侯之譴江南太子賢王相次薨歿既而齊武帝殂太孫幼沖西昌輔政竟殺二君而篡之月再犯于氐及逆行之效也十二年四月癸丑月火金會于井辛酉金犯火甲戌火水又俱入井皆雨暘失節萬物不成候也且曰王業將易諸侯貴人多死是歲月行四入氐十月辰星入之閏月丁丑火犯氐乙卯又入之占曰大旱歲荒人且相食國易政君失宮遠期五年氐又女君之府也是歲兩雍及豫州旱饑明年州鎮十五大饉至十四年太后崩時江南北連歲災雨至十七年有劫殺之禍誅死相踵焉
