body:
  text: 地形二下雍州領郡五縣三十一京兆郡領縣八長安杜鄠山北新豐霸城陰槃藍田馮翊郡領縣六高陸頻陽萬年蓮芍廣陽鄣扶風郡領縣五好畤始平美陽槐里盩厔咸陽郡領縣五石安池陽靈武寧夷涇陽北地郡領縣七富平泥陽弋居雲陽銅官土門宜君岐州領郡三縣八平秦郡領縣三雍周城橫水武都郡領縣三平陽南由高車武功郡領縣二美陽漢西秦州領郡三縣十三天水郡領縣四上封顯新平泉當亭略陽郡領縣五安戎綿諸隴城清水阿陽漢陽郡領縣三黃瓜陽廉階陵南秦州領郡六縣十八天水郡領縣三水南平泉平原漢陽郡領縣二穀泉蘭倉武都郡領縣四石門白水東平孔提武階郡領縣三北部南五部赤萬修城郡領縣四平洛柏樹下辨廣長仇池郡領縣二階陵倉泉南岐州領郡三固道郡廣化郡廣業郡東益州領郡七縣十六武興郡領縣四景昌武興石門武安仇池郡領縣二西鄉西石門槃頭郡領縣二武世萇舉廣萇郡領縣二萇廣新巴廣業郡領縣二廣業廣化梓潼郡領縣二華陽興宋洛叢郡領縣二武都明水益州領郡五縣十東晉壽郡領縣四黃石亭晉安晉壽西晉壽郡領縣一陰平新巴郡領縣一新巴南白水郡領縣二始平京兆宋熙郡領縣二興樂元壽巴州梁州領郡五縣十四晉昌郡領縣三龍亭興勢南城褒中郡領縣三褒中武鄉廉水安康郡領縣二安康寧都漢中郡領縣三南鄭漢陰城固華陽郡領縣三華陽沔陽嶓冢南梁州東梁州領郡三縣四戶一千二百二十二金城郡領縣一戶二百八十六直城安康郡領縣一戶六百一十八安康魏明郡領縣二戶三百一十八漢陽寧都涇州領郡六縣十七安定郡領縣五安定臨涇朝那烏氏石堂隴東郡領縣三涇陽祖居撫夷新平郡領縣四白土爰得三水高平趙平郡領縣二鶉觚東陰槃平涼郡領縣二鶉陰陰密平原郡領縣一陰槃河州領郡四縣十四金城郡領縣二榆中大夏武始郡領縣三勇田狄道陽素洪和郡領縣三水池藍川蕈州臨洮郡領縣三龍城石門赤水渭州領郡三縣六隴西郡領縣二襄武首陽南安郡領縣二桓道中陶廣寧郡領縣二彰新興原州領郡二縣四高平郡領縣二高平里亭長城郡領縣二黃石白池涼州領郡十縣二十戶三千二百七十三武安郡領縣一戶三百七十三宜盛臨松郡領縣二戶三百八十九安平和平建昌郡領縣三戶六百五十七榆中治城蒙水番和郡領縣二戶一百三十九彰燕支泉城郡領縣一戶七十九新陽武興郡領縣三戶三百八十五晏然馬城休屠武威郡領縣二戶三百四林中襄城昌松郡領縣三戶三百九十七溫泉揟次莫口東涇郡領縣一戶一百九十一台城梁寧郡領縣二戶三百三十一園池貢澤鄯州瓜州華州領郡三縣十三華山郡領縣五華陰鄭夏陽敷西郃陽澄城郡領縣五澄城五泉三門宮城南五泉白水郡領縣三姚谷白水南白水北華州領郡一縣七戶一萬一千五百九十七中部郡領縣四戶八千九百二十四中部石保狄道長城敷城郡領縣三戶五千六百七十二敷城洛川定陽豳州領郡三縣十西北地郡領縣三彭陽富平安武趙興郡領縣五陽周獨樂定安趙安高望襄樂郡領縣二襄樂膚施夏州領郡四縣九化政郡領縣二革融巖綠闡熙郡領縣二山鹿新冏金明郡領縣三永豐啟寧廣洛代名郡領縣二呼酋渠搜東夏州領郡四縣九徧城郡領縣二廣武沃野朔方郡領縣三魏平政和朔方定陽郡領縣二臨戎臨真上郡領縣二石城因城秦泰州領郡二縣七河東郡領縣五安定蒲阪南解北解猗氏北鄉郡領縣二北猗氏汾陰陝州領郡五縣十一恒農郡領縣三陜中北陜崤西恒農郡領縣一恒農澠池郡領縣二俱利北澠池石城郡領縣一同堤河北郡領縣四北安邑南安邑河北大陽洛州領郡五縣七上洛郡領縣二上洛拒陽上庸郡領縣二商豐陽魏興郡領縣一陽亭始平郡領縣一上洛萇和郡領縣一南商荊州領郡八縣四十八南陽郡領縣十宛新城冠軍舞陰酈云陽西平涅陽上陌西鄂順陽郡領縣五南鄉丹水臨洮槐里順陽新野郡領縣三穰新野池陽東恒農郡領縣六西城北酈南鄉左南鄉上憶東石漢廣郡領縣二南棘陽西棘陽襄城郡領縣九方城郟城伏城舞陰清水翼陽鄭北平赭城北淯郡領縣二武川北雉恒農郡領縣四圉恒農南酈邯鄲襄州領郡六縣二十襄城郡領縣六方城郟城伏城舞陰翼陽赭城舞陰郡領縣二舞陰安陽南安郡領縣四安南南舞葉南定期城郡領縣四西舞陽東舞陽南陽新安北南陽郡領縣二北平白水建城郡領縣二赭陽北方城南襄州領郡三縣五西淮郡領縣二鍾離襄城襄城郡領縣二陳陽上馬北南陽郡領縣一南陽南廣州領郡五縣七襄城郡領縣一襄城魯陽郡領縣二冠軍繁昌高昌郡領縣一高陽南陽郡領縣一南陽襄城郡領縣二扶城南陽郢州領郡三縣八安陽郡領縣四真陽安陽清陰淮陰城陽郡領縣三平春義陽義興汝南郡領縣一上蔡南郢州領郡十二縣二十九北遂安郡領縣一新安馮翊郡領縣四山陽彭城城建安江夏郡領縣二屈陽郢陽子郡領縣四南新陽西新北新陽新興香山郡領縣二北新安鄖陽永安郡領縣二永安南新興新平郡領縣二城安城永安郡領縣二劉剛上城宕鄀郡領縣三西新化東平陽安城宜民郡領縣三西新安新安平陽南遂安郡領縣一安興郡領縣三東新市西新市長安析州領郡五縣十一修陽郡領縣二蓋陽修陽固郡領縣三懷裏南鄉固朱陽郡領縣二黃水朱陽南上洛郡領縣二單水南上洛析陽郡領縣二西析陽東析陽
