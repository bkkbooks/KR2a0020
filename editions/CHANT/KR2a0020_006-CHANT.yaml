body:
  text: 卷五帝紀第五高宗紀高宗文成皇帝濬諱濬恭宗景穆皇帝之長子也母曰閭氏真君元年六月生於東宮帝少聰達世祖愛之常置左右號世嫡皇孫年五歲世祖北巡帝從在後逢虜帥桎一奴欲加其罰帝謂之曰奴今遭我汝宜釋之帥奉命解縛世祖聞之曰此兒雖小欲以天子自處意奇之既長風格異常每有大政常參決可否正平二年十月戊申即皇帝位於永安前殿大赦改年興安元年冬十月以驃騎大將軍元壽樂為太宰都督中外諸軍事錄尚書事尚書長孫渴侯為尚書令加儀同三司十有一月丙子二人爭權並賜死癸未廣陽王建薨臨淮王譚薨甲申皇妣薨太尉張黎司徒古弼以議不合旨黜為外都大官平南將軍宋子侯周忸進爵樂陵王南部尚書章安子陸麗為平原王文武各加位一等壬寅追尊景穆太子為景穆皇帝皇妣為恭皇后尊保母常氏為保太后隴西屠各王景文叛詔統萬鎮將南陽王惠壽討平之十有二月戊申祔葬恭皇后於金陵乙卯初復佛法丁巳以樂陵王周忸為太尉平原王陸麗為司徒鎮西將軍杜元寶為司空保達沙獵國各遣使朝獻戊寅建業公陸俟進爵東平王廣平公杜遺進爵為王癸亥詔以營州蝗開倉賑恤甲子太尉樂陵王周忸有罪賜死濮陽公閭若文進爵為王二年春正月辛巳司空杜元寶進爵京兆王廣平王杜遺薨尚書僕射東安公劉尼進爵為王封建寧王崇子麗為濟南王癸未詔與民雜調十五丙戌尚書西平公源賀進爵為王二月己未司空京兆王杜元寶謀反伏誅建寧王崇崇子濟南王麗為元寶所引各賜死乙丑發京師五千人穿天淵池是月劉義隆子劭殺其父而自立三月壬午尊保太后為皇太后安豐公閭虎皮進爵為河間王乙未疏勒國遣使朝獻夏五月乙酉行幸崞山辛卯還宮是月劉劭弟駿殺劭而自立閏月乙亥太皇太后赫連氏崩秋七月辛亥行幸陰山濮陽王閭若文征西大將軍永昌王仁謀反乙丑賜仁死於長安若文伏誅己巳車駕還宮是月築馬射臺於南郊八月辛未渴槃陁國遣使朝貢戊戌詔曰朕以眇身纂承太業懼不能宣慈惠和寧濟方宇夙夜兢兢若臨淵谷然即位以來百姓晏安風雨順序邊方無事眾瑞兼呈不可稱數又於苑內獲方寸玉印其文曰子孫長壽群公卿士咸曰休哉豈朕一人克臻斯應實由天地祖宗降祐之所致也思與兆庶共茲嘉慶其令民大酺三日諸殊死已下各降罪一等九月壬子閱武於南郊冬十有一月辛酉行幸信都中山觀察風俗十有二月誅河間鄚民為賊盜者男年十五以下為生口班賜從臣各有差甲午車駕還宮庫莫奚契丹罽賓等十餘國各遣使朝貢復北平公長孫敦王爵興光元年春正月乙丑以侍中河南公伊馛為司空二月甲午帝至道壇登受圖籙禮畢曲赦京師班賞各有差夏六月丙寅行幸陰山秋七月庚子皇子弘生辛丑大赦改年八月甲戌趙王深薨乙亥車駕還宮己丑皇叔虎頭龍頭薨九月庚申庫莫奚國獻名馬有一角狀如麟是月閉都城門大索三日獲姦人亡命數百人冬十有一月北鎮將房杖擊蠕蠕虜其將豆渾與句等獲馬千餘匹戊戌行幸中山遂幸信都十有二月丙子還幸靈丘至溫泉宮庚辰車駕還宮出于叱萬單國各遣使朝獻太安元年春正月辛酉奉世祖恭宗神主于太廟車騎大將軍樂平王拔有罪賜死二月癸未武昌王提薨三月己亥詔曰今始奉世祖恭宗神主于太廟又於西苑遍秩群神朕以大慶饗賜百寮而犯罪之人獨即刑戮非所以子育群生矜及眾庶夫聖人之教自近及遠是以周文刑於寡妻至于兄弟以御家邦化苟從近恩亦宜然其曲赦京師死囚已下夏六月壬戌詔名皇子曰弘曲赦京城改年癸酉詔曰夫為治者因宜以設官舉賢以任職故上下和平民無怨謗若官非其人姦邪在位則政教陵遲至於凋薄思明黜陟以隆治道今遣尚書穆伏真等三十人巡行州郡觀察風俗入其境農不墾殖田畝多荒則徭役不時廢於力也耆老飯蔬食少壯無衣褐則聚斂煩數匱於財也閭里空虛民多流散則綏導無方疏於恩也盜賊公行劫奪不息則威禁不設失於刑也眾謗並興大小嗟怨善人隱伏佞邪當途則為法混淆昏於政也諸如此比黜而戮之善於政者褒而賞之其有阿枉不能自申聽詣使告狀使者檢治若信清能眾所稱美誣告以求直反其罪使者受財斷察不平聽詣公車上訴其不孝父母不順尊長為吏姦暴及為盜賊各具以名上其容隱者以所匿之罪罪之是月遮逸國遣使朝貢戊寅帝畋於犢倪山甲申還宮秋七月丙辰行幸河西八月丁亥車駕還宮冬十月波斯疏勒國並遣使朝貢庚午以遼西公常英為太宰進爵為王二年春正月乙卯立皇后馮氏二月丁巳立皇子弘為皇太子大赦天下丁零數千家亡匿井陘山聚為寇盜詔定州刺史許宗之并州刺史乞佛成龍討平之夏六月羽林郎于判元提等謀逆伏誅秋八月甲申畋於河西是月平西將軍漁陽公尉眷北擊伊吾克其城大獲而還九月辛巳河東公閭毗零陵公閭紇並進爵為王冬十月甲申車駕還宮甲午曲赦京師十有一月尚書西平王源賀改封隴西王嚈噠普嵐國並遣使朝獻劉駿濮陽太守姜龍駒新平太守楊伯倫各棄郡率吏民來降三年春正月壬戌畋於崞山戊辰還宮粟特于闐國各遣使朝貢徵漁陽公尉眷拜太尉進爵為王錄尚書事夏五月庚申畋於松山己巳還宮封皇弟新成為陽平王六月癸卯行幸陰山秋八月畋於陰山之北己亥還宮冬十月將東巡詔太宰常英起行宮於遼西黃山十有一月蠻王文虎龍率千餘家內附十有二月以州鎮五蝗民饑使使者開倉以賑之是月于闐扶餘等五十餘國各遣使朝獻四年春正月丙午朔初設酒禁乙卯行幸廣寧溫泉宮遂東巡平州庚午至於遼西黃山宮遊宴數日親對高年勞問疾苦二月丙子登碣石山觀滄海大饗群臣於山下班賞進爵各有差改碣石山為樂遊山築壇記行於海濱戊寅南幸信都畋遊於廣川三月丁未觀馬射於中山所過郡國賜復一年丙辰車駕還宮起太華殿乙丑東平王陸俟薨夏五月壬戌詔曰朕即阼至今屢下寬大之旨蠲除煩苛去諸不急欲令物獲其所人安其業而牧守百里不能宣揚恩意求欲無厭斷截官物以入於己使課調懸少而深文極墨委罪於民苟求免咎曾不改懼國家之制賦役乃輕比年已來雜調減省而所在州郡咸有逋懸非在職之官綏導失所貪穢過度誰使之然自今常調不充民不安業宰民之徒加以死罪申告天下稱朕意焉六月丙申畋於松山秋七月庚午行幸河西九月乙巳還宮辛亥太華殿成丙寅饗群臣大赦天下冬十月甲戌北巡至陰山有故塚毀廢詔曰昔姬文葬枯骨天下歸仁自今有穿毀墳隴者斬之劉駿將殷孝祖脩兩城於清水東詔鎮西將軍天水公封敕文等擊之辛卯車駕次于車輪山累石記行十一月詔征西將軍皮豹子等三將三萬騎助擊孝祖車駕度漠蠕蠕絕跡遠遁其別部烏朱賀頹庫世頹率眾來降十有二月征東將軍中山王託真薨五年春正月己巳朔征西將軍皮豹子略地至高平大破孝祖斬獲五千餘級二月己酉侍中司空河南公伊馛薨三月庚寅曲赦京師死罪已下夏四月乙巳封皇弟子推為京兆王五月居常國遣使朝獻六月戊申行幸陰山秋八月庚戌遂幸雲中壬戌還宮九月戊辰詔曰夫褒賞必於有功刑罰審於有罪此古今之所同由來之常式牧守莅民侵食百姓以營家業王賦不充雖歲滿去職應計前逋正其刑罪而主者失於督察不加彈正使有罪者優游獲免無罪者妄受其辜是啟姦邪之路長貪暴之心豈所謂原情處罪以正天下自今諸遷代者仰列在職殿最案制治罪克舉者加之爵寵有愆者肆之刑戮使能否殊貫刑賞不差主者明為條制以為常楷儀同三司敦煌公李寶薨冬十有二月戊申詔曰朕承洪業統御群有思恢政化以濟兆民故薄賦斂以實其財輕徭役以紓其力欲令百姓脩業人不匱乏而六鎮雲中高平二雍秦州徧遇災旱年穀不收其遣開倉廩以賑之有流徙者諭還桑梓欲市糴他界為關傍郡通其交易之路若典司之官分職不均使上恩不達於下下民不贍於時加以重罪無有攸縱和平元年春正月甲子朔大赦改元庚午詔散騎常侍馮闡使於劉駿二月衛將軍樂安王良督東雍吐京六壁諸軍西趣河西征西將軍皮豹子等督河西諸軍南趨石樓以討河西叛胡夏四月戊戌皇太后常氏崩於壽安宮五月癸酉葬昭太后於廣寧鳴雞山六月甲午詔征西大將軍陽平王新成等督統萬高平諸軍出南道南郡公李惠等督涼州諸軍出北道討吐谷渾什寅崔浩之誅也史官遂廢至是復置河西叛胡詣長安首罪遣使者安慰之秋七月乙丑劉駿遣使朝貢壬午行幸河西八月西征諸軍至西平什寅走保南山九月諸軍濟河追之遇瘴氣多有疫疾乃引軍還獲畜二十餘萬庚午輿駕還宮冬十月居常王獻馴象三十有一月詔散騎侍郎盧度世員外郎朱安興使於劉駿二年春正月乙酉詔曰刺史牧民為萬里之表自頃每因發調逼民假貸大商富賈要射時利旬日之間增贏十倍上下通同分以潤屋故編戶之家困於凍餒豪富之門日有兼積為政之弊莫過於此其一切禁絕犯者十疋以上皆死布告天下咸令知禁二月辛卯行幸中山丙午至於鄴遂幸信都三月劉駿遣使朝貢輿駕所過皆親對高年問民疾苦詔民年八十以上一子不從役靈丘南有山高四百餘丈乃詔群官仰射山峰無能踰者帝彎弧發矢出山三十餘丈過山南二百二十步遂刊石勒銘是月發并肆州五千人治河西獵道辛巳輿駕還宮夏四月乙未侍中征東大將軍河東王閭毗薨五月癸未詔南部尚書黃盧頭李敷等考課諸州秋七月戊寅封皇弟小新成為濟陰王加征東大將軍鎮平原天賜為汝陰王加征南大將軍鎮虎牢萬壽為樂浪王加征北大將軍鎮和龍洛侯為廣平王壬午行巡山北八月戊辰波斯國遣使朝獻丁丑輿駕還宮冬十月詔假員外散騎常侍游明根員外郎昌邑侯和天德使于劉駿博陵之深澤章武之束州盜殺縣令州軍討平之廣平王洛侯薨三年春正月壬午以車騎大將軍東郡公乙渾為太原王癸未樂浪王萬壽薨二月癸酉畋于崞山遂觀漁于旋鴻池三月甲申劉駿遣使朝貢高麗蓰王契嚙思厭於師疏勒石那悉居半渴槃陁諸國各遣使朝獻夏六月庚申行幸陰山詔將軍陸真討雍州叛氐仇傉檀等平之秋七月壬寅幸河西九月壬辰征西大將軍常山王素薨冬十月丙辰詔曰朕承洪緒統御萬國垂拱南面委政群司欲緝熙治道以致寧一夫三代之隆莫不崇尚年齒今選舉之官多不以次令班白處後晚進居先豈所謂彝倫攸敘者也諸曹選補宜各先盡勞舊才能是月詔員外散騎常侍游明根員外郎昌邑侯和天德使于劉駿十有一月壬寅輿駕還宮十有二月乙卯制戰陳之法十有餘條因大儺耀兵有飛龍騰蛇魚麗之變以示威武戊午零陵王閭紇薨四年春三月乙未賜京師民年七十以上太官廚食以終其年皇弟胡仁薨追封樂陵王乙巳詔曰朕憲章舊典分職設官欲令敷揚治化緝熙庶績然在職之人皆蒙顯擢委以事任當厲己竭誠務省徭役使兵民優逸家給人贍今內外諸司州鎮守宰侵使兵民勞役非一自今擅有召役逼雇不程皆論同枉法夏四月癸亥上幸西苑親射虎三頭五月壬辰侍中漁陽王尉眷薨壬寅行幸陰山秋七月壬午詔曰朕每歲以秋日閑月命群官講武平壤所幸之處必立宮壇糜費之功勞損非一宜仍舊貫何必改作也八月丙寅遂畋于河西詔曰朕順時畋獵而從官殺獲過度既殫禽獸乖不合圍之義其敕從官及典圍將校自今已後不聽濫殺其畋獲皮肉別自頒賚壬申詔曰前以民遭饑寒不自存濟有賣鬻男女者盡仰還其家或因緣勢力或私行請託共相通容不時檢校令良家子息仍為奴婢今仰精究不聽取贖有犯加罪若仍不檢還聽其父兄上訴以掠人論九月辛巳車駕還宮冬十月以定相二州霣霜殺稼免民田租是月詔員外散騎常侍游明根驍騎將軍昌邑子婁內近寧朔將軍襄平子李五鱗使于劉駿十有二月辛丑詔曰名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可為之條格使貴賤有章上下咸序著之于令壬寅詔曰夫婚姻者人道之始是以夫婦之義三綱之首禮之重者莫過於斯尊卑高下宜令區別然中代以來貴族之門多不率法或貪利財賄或因緣私好在於苟合無所選擇令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓為婚犯者加罪五年春正月丁亥封皇弟雲為任城王二月詔以州鎮十四去歲蟲水開倉賑恤夏四月癸卯頓丘公李峻進爵為王閏月戊子帝以旱故減膳責躬是夜澍雨大降五月庚申劉駿死子子業僭立六月丁亥行幸陰山秋七月辛丑北鎮游軍大破蠕蠕壬寅行幸河西九月辛丑車駕還宮冬十月琅邪王司馬楚之薨十有二月南秦王楊難當薨吐呼羅國遣使朝獻六年春正月丙申大赦天下三月丁丑行幸樓煩宮高麗蓰王對曼諸國各遣使朝獻三月戊戌相州刺史西平郡王吐谷渾權薨乙巳車駕還宮夏四月破洛那國獻汗血馬普嵐國獻寶劍五月癸卯帝崩于太華殿時年二十六六月丙寅上尊諡曰文成皇帝廟號高宗八月葬雲中之金陵史臣曰世祖經略四方內頗虛耗既而國釁時艱朝野楚楚高宗與時消息靜以鎮之養威布德懷緝中外自非機悟深裕矜濟為心亦何能若此可謂有君人之度矣
