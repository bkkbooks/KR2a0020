body:
  text: 卷九十五列傳第八十三匈奴劉聰羯胡石勒鐵弗劉虎徒何慕容廆臨渭氐苻健羌姚萇略陽氐呂光夫帝皇者配德兩儀家有四海所謂天無二日土無二王者也三代以往守在海外秦吞列國漢并天下逮桓靈失政九州瓦裂曹武削平寇難魏文奄有中原於是偽孫假命於江吳僭劉盜名於岷蜀何則戎方椎髻之帥夷俗斷髮之魁世崇凶德罕聞王道扇以跋扈忻從放命加以中州避地華士違讎思託號令之聲念邀風塵之際因虞候隙仍相君長偷名竊位脅息一隅至乃指言井絡假上帝之祉妄說黃旗云人君之氣論土不出江漢語地僅接褒斜而謂握皇符秉帝籍三分鼎立比蹤王者溺人必笑其在茲乎若是鱉靈可擬於周王夫差容比於漢祖尉他定黃屋之尊子陽成綰璽之貴豈其然哉及鍾會一將之威士治偏師之勢而使騾車西至侯蓋北首天人弗許斷可知焉晉年不永時逢喪亂異類群飛姦凶角逐內難興於戚屬外禍結於藩維劉淵一唱石勒繼響二帝沉淪兩都傾覆徒何仍釁氐羌襲梗夷楚喧聒於江淮胡虜叛換於瓜涼兼有張赫山河之間顧恃遼海之曲各言應曆數人謂遷圖鼎或更相吞噬迭為驅除或狼戾未馴俟我斧鉞太祖奮風霜於參合鼓雷電於中山黃河以北靡然歸順矣世祖叡略潛舉靈武獨斷以夫僭偽未夷九域尚阻慨然有混一之志既而戎車歲駕神兵四出全國克敵伐罪弔民遂使專制令擅威福者西自流沙東極滄海莫不授館於東門懸首於北闕矣唯夫窮髮遺虜未拔根株徼垂殘狡尚餘栽蘗而北踰翰漠折其肩髀南極江湖抽其腸胃雖骸骨僅存脂膏咸盡視息纔舉魂魄久遊高祖聖敬時乘遷居改作日轉雲移風行電掃辮髮之渠非逃則附卉服之長琛賮繼入猶以侍子不至取亂乘機五牛一指六師騁路馘其武臣驍帥傾其湯池石城向使時無穀塘之禍民無鼎湖之思北可焚穹廬收服匿削引弓之左衽苑龍荒以牧馬南則罺鼃黽暴鯨鯢變水處之文身化鳥言於人俗矣尋以壽春內款華陽稽服蕞彼江陰憂於繫頸肅宗以沖年踐祚俄則母后當陽務崇寬政取和朝野置荒遐於度外譬蠻夷於雞肋而黠狄淪胥種落離貳虜帥飄然窮而歸我矜其眼目愍厥顛亡反之於故庭復之以保塞魏道將虧禍出權幸事僻於中民驚於外疆場崩騰藩籬傾駭陰朔委命之倫雲蒸霧合上失其道下極其難政亂如風草師亡猶彈丸十數年間中區殄悴而江湄巨狡窺覦上國蛇虺肆毒竊我邊鄙氈裘相率馬首南向白山灅水狐鼠群遊魏德雖衰天命未改援墜扶危齊武電發屈身宰世大濟橫流和戎略遠用謀急病輶軒四指喻以德音爾乃舟車接次駝驢銜尾烽柝不警尉候空設而水鄉大猾好利忘信納我逋叛共為舉斧遂有寒山之戰渦陽糾合傖楚覆其巢穴衍以餧卒綱實鴆死獯虜那瓌尋亦殲殪自二百許年僭盜多矣天道人事卒有歸焉猶眾星環於斗極百川之赴溟海今總其僭偽列於國籍俾後之好事知僭盜之終始焉匈奴劉聰字玄明一名載冒頓之後也漢高祖以宗女妻冒頓故其子孫以母姓為氏祖豹為左賢王及魏分匈奴之眾為五部以豹為左部帥豹雖分屬五部然皆家于晉陽汾澗之濱父淵形容偉壯膂力過人晉初為任子在洛陽豹卒淵代之後改帥為都尉以淵為北部都尉楊駿輔政以淵為建威將軍五部大都督封漢光鄉侯後坐部民叛出塞免官永寧初成都王穎表淵行寧朔將軍監五部軍事及齊王冏長沙王乂與穎等自相誅滅北部都督劉宣等竊議反叛謀推淵為大單于時淵在鄴乃使呼延攸以此謀告之淵請歸會葬穎不許穎為皇太弟以淵為太弟屯騎校尉晉惠帝之伐穎也以淵為輔國將軍都督北城守事及惠帝敗以淵為冠軍將軍封盧奴伯既而并州刺史司馬騰幽州刺史王浚起兵伐穎穎師戰敗淵謂穎曰今二鎮跋扈眾踰十萬恐非宿衛及近郡士民所能禦之淵當為殿下還說五部鳩合義眾以赴國難穎悅拜淵為北單于參丞相軍事淵至左國城劉宣等上大單于之號二旬之間眾便五萬都於離石淵謂宣等曰帝王豈有常哉當上為漢高下為魏武然晉人未必同我漢有天下世長恩德結於民心吾又漢氏之甥約為兄弟兄亡弟紹不亦可乎今且可稱漢追尊後主以懷民望乃遷於左國城自稱漢王置百官年號元熙追尊劉禪為孝懷皇帝攻擊郡縣桓帝十一年晉并州刺史司馬騰來乞師桓帝親率萬騎救騰斬淵將綦母豚淵南走蒲子語在序紀晉光熙元年淵進據河東剋平陽蒲阪遂都平陽晉永嘉二年淵稱帝年號永鳳後汾水中得玉璽文曰有新保之蓋王莽之璽也得者因增淵海光三字而獻之淵以為己瑞號年為河瑞以聰為大司馬大單于錄尚書事置單于臺於平陽西淵死子和僭立聰即和第四弟也殺和而自立聰猿臂善射彎弓三百斤晉新興太守郭頤辟為主簿任以郡事舉良將為驍騎別部司馬齊王冏以為國中尉出為左部司馬尋遷右部尉太宰河間王顒表為赤沙中郎將以淵在鄴懼為成都王穎所害亡奔穎穎甚悅拜右積弩將軍參前鋒戰事隨還左國淵稱大號拜大司馬封楚王及僭位年號光興聰遣王彌劉曜攻陷洛陽執晉懷帝改年為嘉平聰於是驕奢淫暴殺戮無已誅翦公卿旬日相繼納其太保劉殷二女為左右貴嬪又納殷孫女四人為貴人六劉之寵傾於後宮聰希復出外事皆中黃門納奏左貴嬪決之其都水使者襄陵王攄以魚蟹不供將作大匠望都公靳陵以營作遲晚並斬於東市聰遊獵無度晨出暮歸觀魚於汾以燭繼晝其弟乂及子粲輿櫬切諫聰怒曰吾豈桀紂幽厲乎而汝等生來哭人也先是劉琨來告難穆帝親率大眾令長子六修擊粲等大破之語在序紀聰與群臣飲讌逼晉帝行酒晉光祿大夫庾珉等謀以平陽應劉琨於是害晉帝誅珉等改嘉平為建元平陽地震聰崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形委蛇其光照地落於平陽北十里視之則肉長二十步廣二十七步臭達於平陽肉旁常有哭聲晝夜不止聰惡之劉后產一蛇一虎各害人而走尋之不得頃之見在隕肉之旁聰遣劉曜攻陷長安執晉愍帝改建元為麟嘉其武庫陷入地一丈五尺聰自去冬至是遂不受朝賀立市於後庭與宮人讌戲積日不醒立上皇后樊氏樊氏是聰張后之侍婢也時稱后者四人佩皇后璽綬者七人阿諛日進貨賄公行後宮賞賜動至千萬有豕著進賢冠犬冠武弁帶綬並昇聰座俄而鬭死宿衛之人無見入者平文二年聰死子粲襲位號年漢昌粲荒耽酒色遊蕩後庭軍國之事決於大將軍靳準準勒兵誅粲劉氏男女無少長皆殺之準自號漢王置百官尋為靳明所殺眾降淵族子曜曜字永明少孤見養於淵頗知書計志性不恒拳勇有膂力鐵厚一寸射而洞之坐事當誅亡匿朝鮮客為縣卒會赦得還聰之末年位至相國鎮長安靳準之誅粲也曜來赴之次於赤壁遂僭尊號改年光初靳明既降於曜曜還都長安自稱大趙曜西通張駿南服仇池窮兵極武無復寧歲又發六百萬功營其父及妻二塚下洞三泉上崇百尺積石為基周回二里發掘古塚以千百數迫督役徒繼以脂燭百姓嗥哭盈於道路又更增九十尺塚前石人有聲言慎封其子胤為南陽王以漢陽十三郡為國立單于臺拜大單于於渭城置左右賢王已下皆以雜種為之曜得黑兔改年為太和石虎伐曜曜擊破之遂攻石生於洛陽曜不撫士眾專與嬖臣飲博左右或諫曜怒斬之石勒進據石門曜甫知之解金墉之圍陳于洛西將與勒戰至西陽門麾軍就平師遂大潰曜墜于冰為石勒將石堪所擒勒囚之襄國尋殺之烈帝元年曜子毗率百官棄長安西走秦州尋為石勒所滅羯胡石勒字世龍小字匐勒其先匈奴別部分散居於上黨武鄉羯室因號羯胡祖邪弈于父周曷朱一字乞翼加並為部落小帥周曷朱性凶粗不為群胡所附勒壯健有膽略好騎射周曷朱每使代己督攝部胡部胡愛信之并州刺史司馬騰執諸胡於山東賣充軍實兩胡一枷勒亦在中至平原賣與師氏為奴師家鄰於馬牧勒與牧帥汲桑往來相託遂招集王陽夔安支雄冀保吳豫劉膺桃豹逯明郭敖劉徵劉寶張曀僕呼延莫郭黑略張越孔豚趙鹿支屈六等東如赤龍騄驥諸苑乘苑馬還掠繒寶以賂汲桑成都王穎之廢也穎故將陽平人公師藩等自稱將軍起兵趙魏眾至數萬勒與汲桑率牧人乘苑馬數百騎以赴之於是桑始命勒以石為姓以勒為名藩拜為前隊督藩戰敗身死勒與汲桑亡潛苑中穎之將如河北也汲桑以勒為伏夜牙門率牧人劫掠郡縣繫囚合軍以應之屯于平石桑自號大將軍進軍攻鄴以勒為前鋒都尉攻鄴剋之尋為晉將苟晞所敗勒往從劉淵拜為輔漢將軍平晉王劉聰立以勒為征東大將軍并州刺史汲郡公劉粲攻洛陽勒留長史刁膺統步卒九萬徙輜重于重門率輕騎二萬會粲於太陽大敗晉監軍裴邈于澠池遂至洛川勒出成皋圍晉陳留太守王讚於倉垣為讚所敗屯文石津將北攻晉幽州刺史王浚會浚將王甲始率遼西鮮卑萬餘騎敗劉聰安北大將軍趙固于津北勒乃燒船棄營引軍向柏門迎重門輜重合于石門而濟南攻晉豫州刺史馮嵩于陳郡不剋進攻襄城太守崔廣於繁昌斬之先是雍州流民王如侯脫嚴嶷等起兵江淮間受劉淵官位聞勒之來也懼遣眾一萬拒於襄城勒擊敗之盡俘其眾勒至南陽屯于宛之北山王如遣使通好勒進攻宛剋之斬侯脫降嚴嶷盡并其眾南至襄陽攻剋江西三十餘壘有據江漢之志勒右長史張賓以為不可引軍而北晉太傅東海王越率洛陽之眾二十餘萬討勒越薨於軍軍人推太尉王衍為主率眾而東勒追擊破之於苦縣勒分騎圍而射之相登如山殺王衍及晉襄陽王範等十餘萬人越世子毗聞越薨出自洛陽從者傾城勒逆毗於洧倉破之執毗及晉宗室二十六王并諸卿士皆殺之與王彌劉曜攻陷洛陽歸功彌曜遂出轘轅執晉大將軍苟晞於蒙城以為左司馬劉聰授勒鎮軍大將軍幽州牧領并州刺史用張賓之計自汝南葛陂北都襄國襲幽州擒王浚殺之劉聰加勒陜東伯得專征伐封拜刺史將軍守宰列侯歲盡集上及劉粲為靳準所殺勒率眾赴平陽曜稱尊號授勒大司馬大將軍加九錫增封十郡并前十三郡進為趙公勒至平陽靳明出與勒戰勒大破之遣兼左長史王脩主簿劉茂獻捷於曜明率平陽之眾奔曜曜西如粟邑勒焚平陽宮室置戍而歸徙渾儀樂器於襄國曜遣使授勒太宰領大將軍進爵趙王增封七郡并前二十郡出入警蹕冕十有二旒乘金根車駕六馬如魏武輔漢故事王修舍人曹平樂留仕曜朝言於曜曰大司馬遣修等來外表至虔內覘彊弱曜實殘敝懼修宣之大怒追還策命而斬王修劉茂逃歸言修死狀勒大怒誅曹平樂父兄夷其三族又知追停太宰趙王之授怒曰帝王之起復何常也趙王趙帝孤自取之名號大小豈爾所節乎勒乃自稱大都督大將軍大單于趙王以二十四郡為趙國號為趙王元年平文三年也勒遣使求和請為兄弟斬其使以絕之自是朝會常僭天子禮樂以饗群臣烈帝元年勒又遣使求和帝許之二年勒僭稱皇帝置百官年號建平雖都襄國又營鄴宮作者數十萬人兼以晝夜五年勒死子大雅僭立大雅名犯顯祖廟諱大雅立號年延熙石虎廢大雅為海陽王而僭立尋殺之虎字季龍勒之從子也祖曰匐邪父曰寇覓寇覓有七子虎第四勒父幼而子之故或謂之為勒弟也晉永興中與勒相失永嘉五年劉琨送勒母王氏及虎於葛陂時年十七矣性殘忍遊獵無度能左右射好以彈彈人軍中甚患之勒白母曰此兒凶暴無賴使軍人殺之聲名可惜宜自除也王曰快牛為犢子時多能破車為復小忍勿卻之至年十八身長七尺五寸弓馬迅捷勇冠當時將佐親戚莫不敬憚勒深嘉之而酷害過差軍中有壯健與己齊者因獵戲謔輒殺之至於降城陷壘不復斷別善惡坑斬士女鮮有遺類御眾嚴整莫敢犯者指授攻討所向無前故勒寵信彌隆仗以專征之任劉聰以虎為魏郡太守鎮鄴三臺又封繁陽侯食邑三千戶勒為趙王以虎為車騎將軍加侍中開府進封中山公勒稱尊號為太尉守尚書令封中山王食邑萬戶勒死虎擅誅右光祿大夫程遐中書令徐光遣子邃率兵入大雅宮直衛文武皆奔散大雅大懼自陳弱劣讓位于虎虎曰若其不堪天下自當有大義何足豫論遂逼立之虎自為丞相魏王虎以勒文武舊臣皆補丞相閑任其府寮舊昵悉居臺省禁要改勒太子宮曰崇訓宮徙勒妻劉氏已下居之簡其美淑及車馬服御皆歸虎第劉氏謂其彭城王石堪曰丞相便相凌蹈恐國祚之滅不復久矣真可謂養虎自殘者也王將何以圖之堪曰先帝舊臣皆以斥外眾旅不復由人宮殿之中亡所厝計臣請出奔兗州據廩丘扶南陽王恢為盟主宣太后詔於諸牧守征鎮令各率義兵同討惡逆蔑不濟也劉氏然之既而堪計不果虎炙而殺之又殺劉氏石生先鎮長安石朗鎮洛陽並起兵討虎為虎所滅虎遂自立為大趙王號年建武自襄國徙居於鄴乃殺大雅及其母程氏并大雅諸弟初虎衣袞冕將祀南郊照鏡無首大恐怖不敢稱皇帝乃自貶為王使其太子邃省可尚書奏事唯選牧守祀郊廟征伐刑斷乃親覽之虎又改稱大趙天王邃以事呈之恚曰此小事何足呈也時有所問復怒曰何以不呈誚責杖捶月至再三邃甚慍恨私謂中庶子李顏等曰官家難稱吾欲行冒頓之事卿從我乎顏等伏不敢對虎聞而大怒殺邃及其男女二十六人一棺埋之誅其宮臣支黨二百餘人立次子宣為太子虎於鄴起臺觀四十餘所營長安洛陽二宮作者四十餘萬人又欲自鄴起閣道至于襄國敕河南四州具南師之備并朔秦雍嚴西討之資青冀幽州三五發卒諸州造甲者五十萬人擾役黎元民庶失業得農桑者十室而三船夫十七萬人為水所沒為虎所害三分而一課責征士五人車一乘牛二頭米各十五斛絹十匹諸役調有不辦者皆以斬論窮民率多鬻子以充軍制而猶不足者乃自經于道路死者相望猶求發無已太武殿成圖畫忠臣孝子烈士貞女皆變為胡狀頭縮入肩虎大惡之遣司虞中郎將賈霸率工匠四千於東平岡山造獵車千乘轅長三丈高一丈八尺罝高一丈七尺格虎車四十乘立行樓二層於其上南至滎陽東極陽都使御史監司其中禽獸民有犯者罪至大辟御史因之擅作威福民有美女好牛馬求之不得便誣以犯獸論民死者相繼海岱河濟之間民無寧志矣又發民牛二萬餘頭配朔州牧官增女官二十四等東宮十二等諸公侯七十餘國皆為置女官九等先是大發民女二十已下十三已上三萬餘人為三等之第以分配之郡縣有希旨務於美淑奪人婦者九千餘人民妻有美色豪勢因而脅之率多自殺太子諸公私令採發者亦垂一萬建國九年虎遣使朝貢虎使其太子宣及宣弟秦公韜遞日省可尚書奏事宣惡韜侔己謂嬖人楊杯牟成等曰汝等殺韜吾入西宮當以韜之國邑分封汝等韜既死上必親臨因行大事亡不濟矣柯等許諾乃夜入韜第而殺之虎將出臨韜喪其司空李農諫乃止翌日有人告之虎大怒以鐵鐶穿宣頷而鎖之作數斗木槽和以羹飯以豬狗法食之取害韜刀仗舐其上血號叫之聲震動宮殿積柴城北樹標其上標末置鹿盧穿之以繩送宣於標所使韜所親宦者郝雅劉靈拔其髮抽其舌以繩貫其頷鹿盧絞上之劉霸斷其手足斫眼潰腹如韜之傷四面縱火煙焰際天虎從昭儀已下數千人登中臺以觀之火滅取灰分置諸門交道中殺其妻子二十九人誅其四率已下三百人宦者五十人皆車裂節解棄之漳水洿其東宮以養豬牛十二年虎自稱皇帝號年太寧虎死少子世僭立虎養孫閔殺世以世兄遵為主遵以閔為大將軍輔政遵立七日大風雷震晝昏火水俱下災其太武殿延及宮內府庫至于閶闔門火月餘乃滅遵兄鑒又殺遵而自立號年青龍鑒弟苞與胡張才孫伏都等謀殺閔不剋而死自鳳陽門至琨華殿積屍如丘流血成池閔知胡人不為己用乃閉鄴城四門盡殺諸胡晉人貌似胡者多亦濫死閔乃殺鑒而自立盡滅石氏閔本姓冉乃復其姓自稱大魏號年永興尋為慕容俊所擒鐵弗劉虎南單于之苗裔左賢王去卑之孫北部帥劉猛之從子居於新興慮虒之北北人謂胡父鮮卑母為鐵弗因以為號猛死子副崙來奔虎父誥升爰代領部落誥升爰一名訓兜誥升爰死虎代焉虎一名烏路孤始臣附於國自以眾落稍多舉兵外叛平文與晉并州刺史劉琨共討之虎走據朔方歸附劉聰聰以虎宗室拜安北將軍監鮮卑諸軍事丁零中郎將復渡河侵西部平文逆擊大破之虎退走出塞昭成初虎又寇西部帝遣軍逆討又大破之虎死子務桓代領部落遣使歸順務桓一名豹子招集種落為諸部雄潛通石虎虎拜為平北將軍左賢王務桓死弟閼陋頭代立密謀反叛語在序紀後務桓子悉勿祈逐閼陋頭而自立悉勿祈死弟衛辰代立衛辰務桓之第三子也既立之後遣子朝獻昭成以女妻衛辰衛辰潛通苻堅堅以為左賢王遣使請堅求田內地春來秋去堅許之後掠堅邊民五十餘口為奴婢以獻於堅堅讓歸之乃背堅專心歸國舉兵伐堅堅遣其建節將軍鄧羌討擒之堅自至朔方以衛辰為夏陽公統其部落衛辰以堅還復其國復附於堅雖於國貢使不絕而誠敬有乖帝討衛辰大破之收其部落十六七焉衛辰奔苻堅堅送還朔方遣兵戍之昭成末衛辰導苻堅來寇南境王師敗績堅遂分國民為二部自河以西屬之衛辰自河以東屬之劉庫仁語在燕鳳傳堅後以衛辰為西單于督攝河西雜類屯代來城慕容永之據長子拜衛辰使持節都督河西諸軍事大將軍朔州牧居朔方姚萇亦遣使結好拜衛辰使持節都督北朔雜夷諸軍事大將軍大單于河西王幽州牧累為寇害登國中衛辰遣子直力鞮寇南部其眾八九萬太祖軍五六千人為其所圍太祖乃以車為方營並戰並前大破之於鐵岐山南直力鞮單騎而走獲牛羊二十餘萬乘勝追之自五原金津南渡逕入其國居民駭亂部落奔潰遂至衛辰所居悅跋城衛辰父子驚遁乃分遣諸將輕騎追之陳留公元虔南至白鹽池虜衛辰家屬將軍伊謂至木根山禽直力鞮盡并其眾衛辰單騎遁走為其部下所殺傳首行宮獲馬牛羊四百餘萬頭先是河水赤如血衛辰惡之及衛辰之亡誅其族類並投之於河衛辰第三子屈孑亡奔薛干部帥太悉伏屈孑本名勃勃太宗改其名曰屈孑屈孑者卑下也太悉伏送之姚興興高平公破多羅沒弈于妻之以女屈孑身長八尺五寸興見而奇之拜驍騎將軍加奉車都尉常參軍國大議寵遇踰於勳舊興弟濟南公邕言於興曰屈孑天性不仁難以親育寵之太甚臣竊惑之興曰屈孑有濟世之才吾方收其藝用與之共平天下有何不可乃以屈孑為安遠將軍封陽川侯使助沒弈于鎮高平議以義城朔方雜夷及衛辰部眾三萬配之以候邊隙邕固諫以為不可興曰卿何以知其氣性邕曰屈孑奉上慢御眾殘貪暴無親輕為去就寵之踰分終為邊害興乃止以屈孑為持節安北將軍五原公配以三交五部鮮卑二萬餘落鎮朔方太祖末屈孑襲殺沒弈于而并其眾僭稱大夏天王號年龍昇置百官興乃悔之屈孑恥姓鐵弗遂改為赫連氏自云徽赫與天連又號其支庶為鐵伐氏云其宗族剛銳如鐵皆堪伐人劉裕攻長安屈孑聞而喜曰姚泓豈能拒裕裕必滅之待裕去後吾取之如拾遺耳於是秣馬厲兵休養士卒及裕擒泓留子義真守長安屈孑伐之大破義真積人頭為京觀號曰髑髏臺遂僭稱皇帝於灞上號年為昌武定都統萬勒銘城南頌其功德以長安為南都性憍虐視民如草芥蒸土以築都城鐵錐刺入一寸即殺作人而并築之所造兵器匠呈必死射甲不入即斬弓人如其入也便斬鎧匠凡殺工匠數千人常居城上置弓劍於側有所嫌忿手自殺之群臣忤視者鑿其目笑者決其唇諫者謂之誹謗先截其舌而後斬之議廢其長子璝璝自長安起兵攻屈孑屈孑中子太原公昌破璝殺之屈孑以昌為太子始光二年屈孑死昌僭立昌字還國一名折屈孑之第三子也既僭位改年永光世祖聞屈孑死諸子相攻關中大亂於是西伐乃以輕騎一萬八千濟河襲昌時冬至之日昌方宴饗王師奄到上下驚擾車駕次於黑水去城三十餘里昌乃出戰世祖馳往擊之昌退走入城未及閉門軍士乘勝入其西宮焚其西門夜宿城北明日分軍四出略居民殺獲數萬生口牛馬十數萬徙萬餘家而還後昌遣弟定與司空奚斤相持於長安世祖乘虛西伐濟君子津輕騎三萬倍道兼行群臣咸諫曰統萬城堅非十日可拔今輕軍討之進不可克退無所資不若步軍攻具一時俱往世祖曰夫用兵之術攻城最下不得已而用之如其攻具一時俱往賊必懼而堅守若攻不時拔則食盡兵疲外無所掠非上策也朕以輕騎至其城下彼先聞有步軍而徒見騎至必當心閑朕且羸師以誘之若得一戰擒之必矣所以然者軍士去家二千里復有黃河之難所謂置之死地而後生也以是決戰則有餘攻城則不足遂行次于黑水分軍伏於深谷而以少眾至其城下昌將狄子玉來降說昌使人追其弟定定曰城既堅峻未可攻拔待擒斤等然後徐往內外擊之何有不濟昌以為然世祖惡之退軍城北示昌以弱遣永昌王健及娥清等分騎五千西掠居民會軍士負罪亡入昌城言官軍糧盡士卒食菜輜重在後步兵未至擊之為便昌信其言引眾出城步騎三萬司徒長孫翰等言昌步陳難陷宜避其鋒且待步兵一時奮擊世祖曰不然遠來求賊恐其不出今避而不擊彼奮我弱非計也遂收軍偽北引而疲之昌以為退鼓譟而前舒陳為翼行五六里世祖衝之賊陳不動稍復前行會有風起方術宦者趙倪勸世祖更待後日崔浩叱之世祖乃分騎為左右以掎之世祖墜馬賊已逼接世祖騰馬刺殺其尚書斛黎文又殺騎賊十餘人流矢中掌奮擊不輟昌軍大潰不及入城奔於上邽遂克其城初屈孑性奢好治宮室城高十仞基厚三十步上廣十步宮牆五仞其堅可以礪刀斧臺榭高大飛閣相連皆彫鏤圖畫被以綺繡飾以丹青窮極文采世祖顧謂左右曰蕞爾小國而用民如此雖欲不亡其可得乎後侍御史安頡擒昌世祖使侍中古弼迎昌至京師舍之西宮門內給以乘輿之副又詔昌尚始平公主假常忠將軍會稽公封為秦王坐謀反伏誅昌弟定小字直獖屈孑之第五子凶暴無賴昌敗定奔於平涼自稱尊號改年勝光定登陰槃山望其本國泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與諸卿建季興之業俄而有群狐百數鳴於其側定命射之無所獲定惡之曰此亦大不臧咄咄天道復何言哉與劉義隆連和遙分河北自恒山以東屬義隆恒山以西屬定遣其將寇鄜城始平公隗歸討破之定又將數萬人東擊歸世祖親率輕騎襲平涼定救平涼方陳自固世祖四面圍之斷其水草定不得水引眾下原詔武衛將軍丘眷擊之眾潰定被創單騎遁走收其餘眾乃西保上邽神麚四年為吐谷渾慕璝所襲擒定送京師伏誅徒何慕容廆字弈洛瓌其本出於昌黎曾祖莫護跋魏初率諸部落入居遼西從司馬宣王討平公孫淵拜率義王始建國於棘城之北祖木延從毋丘儉征高麗有功加號左賢王父涉歸以勳進拜鮮卑單于遷邑遼東涉歸死廆代領部落以遼東僻遠徙於徒何之青山穆帝之世頗為東部之患左賢王普根擊走之乃修和親晉愍帝拜廆鎮軍將軍昌黎遼東二國公平文之末廆復侵東部擊破之王浚稱制以廆為散騎常侍冠軍將軍前鋒大都督大單于廆以非王命所授拒之廆死子元真代立元真小字萬年名犯恭宗廟諱元真既襲弟仁叛於遼東之平郭與元真相攻元真討斬之乃號年為元年自稱燕王置官如魏武輔漢故事石虎率眾伐元真元真擊走之建國二年帝納元真女為后元真襲石虎至於高陽掠徙幽冀二州三萬戶而還四年元真遣使朝貢城和龍城而都焉元真征高麗大破之遂入丸都掘高麗王釗父利墓載其屍并其母妻珍寶掠男女五萬餘口焚其宮室毀丸都而歸釗單馬遁走後稱臣於元真乃歸其父屍又大破宇文開地千里徙其部民五萬餘家於昌黎元真死子俊統任俊字宣英既襲位號年為元年聞石氏亂乃礪甲嚴兵將為進取之計鑿山除道入自盧龍剋薊城而都之進剋中山常山大破冉閔於魏昌廉臺擒之閔太子叡固守鄴城進師攻鄴剋之建國十五年俊僭稱皇帝置百官號年元璽國稱大燕郊祀天地十六年遣使朝貢俊自薊遷都於鄴號年為光壽俊死子暐統任暐字景茂俊之第三子也既僭立號年建熙暐政無綱紀時人知其將滅有神降於鄴自稱湘女有聲與人相接數日而去僭晉將桓溫率眾伐暐至於枋頭暐叔父垂擊走之垂有大功暐不能賞方欲殺之垂怒奔苻堅堅遣將王猛伐鄴擒暐封新興侯後拜尚書太祖之七年苻堅敗於淮南垂叛攻苻丕於鄴暐弟濟北王泓先為北地長史聞垂攻鄴亡奔關東收諸馬牧鮮卑眾至數千還屯華陰暐乃潛使諸弟及宗人起兵於外堅遣將軍張永步騎五千擊之為泓所敗泓眾遂盛自稱使持節大都督陜西諸軍事大將軍雍州牧濟北王推垂為丞相都督陜東諸軍事領大司馬冀州牧吳王堅遣子鉅鹿公叡伐泓泓弟中山王沖先為平陽太守亦起兵河東有眾二萬泓大破叡軍斬叡沖為堅將竇衝所破棄其步眾率鮮卑騎八千奔於泓軍泓眾至十餘萬遣使謂堅曰秦為無道滅我社稷今天誘其衷秦師傾敗將欲興復大燕吳王已定關東可速資備大駕奉送乘輿并宗室功臣之家泓當率關中燕人翼衛皇帝還返鄴都與秦以虎牢為界分王天下永為鄰好不復為秦之患也堅怒責暐曰卿雖曰破滅其實若歸奈何因王師小敗猖悖若是泓書如此卿欲去者朕當相資暐叩頭流血涕泣陳謝堅久之曰此自三豎之罪非卿之過復其位待之如初命暐以書招喻垂及泓沖使息兵還長安恕其反叛之咎而暐密遣使謂泓曰今秦數已終社稷不輕勉建大業可以吳王為大將軍領司徒承制封拜聽吾死問汝便即尊位泓於是進向長安年號燕興泓謀臣高蓋宿勤崇等以泓德望後沖且持法苛峻乃殺泓立沖為皇太弟承制行事置百官沖去長安二百里堅遣子平原公暉拒之沖大破暉軍進據阿房初堅之滅燕沖姊清河公主年十四有殊色納之寵冠後庭沖年十二亦有龍陽之姿堅又幸之姊弟專寵宮人莫進長安歌之曰一雌復一雄雙飛入紫宮咸懼為亂王猛切諫堅乃出沖及其母卒葬之以燕后之禮長安又謠曰鳳皇鳳皇止阿房堅以鳳皇非梧桐不棲非竹實不食乃蒔梧竹數十萬株于阿房城以待鳳皇之至沖小字鳳皇至是終為堅賊入止阿城焉暐入見堅稽首謝曰弟沖不識義方孤背國恩臣罪應萬死陛下垂天地之容臣蒙更生之惠臣二子昨婚明當三日愚欲暫屈鑾駕幸臣私第堅許之暐出術士王嘉曰椎蘆作籧篨不成文章會天大雨不得殺羊言暐將殺堅而不果也堅與群臣莫之能解是夜大雨晨不果出初暐之遣諸弟起兵於外也謀欲伏兵請堅殺之時鮮卑在城者猶有千餘人暐令其帥悉羅騰屈突鐵侯等潛告之曰官今使吾外鎮聽舊人悉隨可於某日會集某處鮮卑信之北部人突賢之妹為堅左將軍竇衝小妻賢與妹別妹請衝留其兄衝馳入白堅堅大驚召騰問之騰具首服乃誅暐父子及其宗族城內鮮卑無少長男女皆殺之廆弟運運孫永永字叔明暐既為苻堅所并永徙於長安家貧夫妻常賣靴於市及暐為堅所殺也沖乃自稱尊號以永為小將沖與左將軍苟池大戰於驪山永力戰有功斬池等數千級堅大怒復遣領軍將軍楊定率左右精騎二千五百擊沖大敗之俘掠鮮卑萬餘而還堅悉坑之又敗沖右僕射慕容憲於灞滻之間定果勇善戰沖深憚之納永計穿馬埳以自固遷永黃門郎沖毒暴關中人民流散道路斷絕千里無煙及堅出如五將山沖入長安縱兵大掠死者不可勝計初堅之未亂也關中土然無火而煙氣大起方數十里月餘不滅堅每臨聽訟觀令民有怨者舉煙於城北觀而錄之長安為之語曰欲得必存當舉煙關中謠曰長鞘馬鞭擊左股太歲南行當復虜西人呼徒何為白虜沖果據長安樂之忘歸且以慕容垂威名夙著跨據山東憚不敢進課農築室為久安之計眾咸怨之登國元年沖左將軍韓延因民之怨殺沖立沖將段隨為燕王改年昌平沖之入長安王嘉謂之曰鳳皇鳳皇何不高飛還故鄉無故在此取滅亡沖敗其左僕射慕容恒與永潛謀襲殺段隨立宜都王子覬為燕王號年建明率鮮卑男女三十餘萬口乘輿服御禮樂器物去長安而東以永為武衛將軍恒弟護軍將軍韜陰有貳志誘覬殺之于臨晉恒怒去之永與武衛將軍刁雲率眾攻韜韜遣司馬宿勤黎逆戰永執而戮之韜懼出奔恒營恒立慕容沖子望為帝號年建平眾悉去望奔永永執望殺之立慕容泓之子忠為帝改年建武忠以永為太尉守尚書令封河東公至聞喜知慕容垂稱尊號託以農要弗集築燕熙城以自固刁雲等又殺忠推永為大都督大將軍大單于雍秦梁涼四州牧河東王稱藩於垂永以苻丕至平陽恐不能自固乃遣使求丕假道還東丕不許率眾討永永擊走之進據長子永僭稱帝號年中興垂攻丁零翟釗於滑臺釗請救於永永謀於眾尚書郎渤海鮑遵曰徐觀其敝卞莊之舉也中書侍郎太原張騰曰彊弱勢殊何敝之有不如救之成鼎峙之勢可引兵趣中山晝多疑兵夜倍其火彼必懼而還師我衝其前釗躡其後此天授之機不可失也永不從釗敗降永永以釗為車騎大將軍東郡王歲餘謀殺永永誅之垂遣其龍驤將軍張崇攻永弟武鄉公友於晉陽永遣其尚書令刁雲率眾五萬屯潞川垂停鄴月餘不進永乘詭道伐之乃攝諸軍還於太行軹關垂進師入自木井關攻永從子征東將軍小逸豆歸鎮東將軍王次多於臺壁永遣其從兄太尉大逸豆歸救次多等垂將平規擊破之永率眾五萬與垂戰於臺壁南為垂所敗奔還長子嬰城固守大逸豆歸部將潛為內應垂勒兵密進永奔北門為前驅所獲垂數而戮之并斬永公卿已下刁雲大逸豆歸等三十餘人永所統新舊民戶及服御圖書器樂珍寶垂盡獲之垂字道明元真第五子也甚見寵愛常目而謂諸弟曰此兒闊達好奇終能破人家或能成人家故名霸字道業恩遇踰於俊故俊不能平之及即王位以垂墜馬傷齒改名為缺外以慕卻缺為名內實惡之尋以讖記之文乃去夬以垂為名焉年十三為偏將所在征伐勇冠三軍俊平中原垂為前鋒累戰有大功及僭尊號拜黃門郎出為安東冀州牧封吳王以侍中右禁將軍錄留臺事鎮龍城大收東北之和歷位鎮東平州征南大將軍荊兗二州牧司隸校尉以車騎大將軍敗桓溫於枋頭威名大震不容於暐西奔苻堅堅甚重之拜冠軍將軍封賓都侯堅敗於淮南入於垂軍子寶勸垂殺之垂以堅遇之厚也不聽行至洛陽請求拜墓許之遂起兵攻苻丕於鄴乃引漳水以灌之不沒者尺餘丁零翟斌怨垂使人夜往決堰水潰故鄴不拔垂稱燕王置百官年號燕元引師去鄴開苻丕西歸之路丕固守鄴城請援於司馬昌明垂怒曰苻丕吾縱之不能去方引南賊規固鄴都不可置也乃復進師丕乃棄鄴奔并州垂以兄子魯陽王和為南中郎將鎮鄴垂定都中山登國元年垂僭稱大位號年為建興建宗廟社稷於中山盡有幽冀平州之地垂遣使朝貢三年太祖遣九原公儀使於垂垂又遣使朝貢四年太祖遣陳留公虔使於垂又遣使朝貢五年又遣秦王觚使於垂垂留觚不遣遂絕行人垂議討慕容永太史令靳安言於垂曰彗星經尾國之分燕當有野死之王不出五年其國必亡歲在鶉火必克長子垂乃止安出而謂人曰此眾既并終不能久安意蓋知太祖之興也而不敢言先是丁零翟遼叛垂後遣使謝罪垂不許遼怒遂自號大魏天王有眾數萬屯於滑臺與垂相擊遼死子釗代之及垂征剋滑臺釗奔長子垂議征長子諸將咸諫以永國未有釁連歲征役士卒疲怠請待他年垂將從之垂弟司徒范陽王德固勸垂征垂曰司徒議與吾同二人同心其利斷金吾計決矣且吾投老叩囊底智足以克之不復留逆賊以累子孫垂率步騎七萬伐永剋之十年垂遣其太子寶來寇時太祖幸河南宮乃進師臨河築臺告津奮揚威武連旌沿河東西千有餘里是時陳留公虔五萬騎在河東要山截谷六百餘里以絕其左太原公儀十萬騎在河北以承其後略陽公遵七萬騎塞其南路太祖遣捕寶中山行人一二盡擒馬步無脫寶乃引船列兵亦欲南渡中流大風卒起漂寶船數十艘泊南岸擒其將士三百餘人太祖悉賜衣服遣還始寶之來垂已有疾自到五原太祖斷其行路父子問絕太祖乃詭其行人之辭令臨河告之曰汝父已死何不遽還兄弟聞之憂怖以為信然於是士卒駭動往往間言皆欲為變初寶至幽州其所乘車軸無故自折占工靳安以為大凶固勸令還寶怒不從至是問安安對曰今天變人事咎徵已集速去可免寶逾大恐安退而告人曰今皆將死於他鄉尸骸委於草野為烏鳥螻蟻所食不復見家矣冬十月寶燒船夜遁是時河冰未成寶謂太祖不能度故不設斥候十一月天暴風寒冰合太祖進軍濟河留輜重簡精銳二萬餘騎急追之晨夜兼行暮至參合陂西寶在陂東營於蟠羊山南水上靳安言於寶曰今日西北風勁是追軍將至之應宜設警備兼行速去不然必危寶乃使人防後先不撫循軍無節度將士莫為盡心行十餘里便皆解鞍寢臥不覺大軍在近前驅斥候見寶軍營還告其夜太祖部分眾軍相援諸將羅落東西為掎角之勢約勒士卒束馬口銜枚無聲昧爽眾軍齊進日出登山下臨其營寶眾晨將東引顧見軍至遂驚擾奔走太祖縱騎騰躡大破之有馬者皆蹶倒冰上自相鎮壓死傷者萬數寶及諸父兄弟單馬迸散僅以身免於是寶軍四五萬人一時放仗斂手就羈矣其遺迸去者不過千餘人生擒其王公文武將吏數千獲寶寵妻及宮人器甲輜重軍資雜財十餘萬計垂復欲來寇太史曰太白夕沒西方數日後見東方此為躁兵先舉者亡垂不從鑿山開道至寶前敗所見積骸如丘設祭弔之死者父兄子弟遂皆嗥哭聲震山川垂慚忿嘔血發病而還死於上谷寶僭立寶字道祐小字庫勾垂之第四子也少而輕果無志操好人佞己及為太子砥礪自修朝士翕然稱之垂亦以為克保家業垂妻段氏謂垂曰寶資質雍容柔而不斷承平則為仁明之主處難則非濟世之雄今託之以大業未見克昌之美遼西高陽兒之賢者宜擇一以樹之趙王麟姦詐負氣常有輕寶之心恐必難作此自家事宜深圖之垂弗納寶聞之深以為恨寶既僭立年號永康遣麟逼其母段氏曰后常謂主上不能繼守大統今竟能不宜早自裁以全段氏段氏怒曰汝兄弟尚逼殺母安能保社稷吾豈惜死念國滅不久耳遂自殺寶議以后諫廢嫡統無母后之道不宜成喪群臣咸以為然寶中書令眭邃執意抗言寶從而止皇始元年太祖南伐及克信都寶大懼太祖軍於柏肆寶夜來犯營太祖擊破之寶走還中山率萬餘騎奔薊寶子清河王會先守龍城聞寶被圍率眾赴難逢寶於路寶分奪其軍以授弟遼西王農等會怒襲農傷之農弟高陽王隆勸寶收會不獲會勒兵攻寶寶走龍城會追圍之侍御郎高雲襲敗會會奔中山寶命雲為子封夕陽公會至中山為慕容普鄰所殺寶率眾自龍城而南將攻中山眾憚征逃潰寶還龍城垂舅蘭汗拒之寶南走奔薊汗遣使誘迎寶寶殺之將南奔叔父范陽王德聞德稱制退潛辟陽汗復遣迎寶寶以汗垂之季舅子盛又汗之婿也必謂無二乃還龍城汗殺之及子弟等百餘人汗自稱大都督大單于昌黎王號年青龍以盛子婿哀而宥之盛字道運寶之長子也垂封為長樂公歷位散騎常侍左將軍寶既僭立進爵為王拜征北大將軍司隸校尉尚書左僕射蘭汗之殺寶也以盛為侍中左光祿大夫盛乃間汗兄弟使相疑害李旱衛雙劉志張真等皆盛之舊昵汗太子穆並引為腹心盛要結旱等因汗穆等酒醉夜襲殺之僭尊號改年為建平又號年為長樂盛改稱庶民大王盛以寶闇而不斷遂峻極威刑纖介嫌忌莫不裁之於未萌防之於未兆於是上下震局人不自安雖忠誠親戚亦僉懷離貳前將軍段璣等夜潛禁中鼓譟攻盛盛聞變起率左右出戰眾皆披潰俄有一賊闇中擊盛傷之遂輦昇殿申約禁衛召叔父河間公熙屬之未至而盛死熙字道文小字長生垂之少子也群臣與盛伯母丁氏議以其家多難宜立長君遂廢盛子定迎熙而立之熙立殺定年號光始築龍騰苑廣袤十餘里役徒二萬人起景雲山於苑內基廣五百步高十七丈又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為妻苻氏鑿曲光海清涼池季夏盛暑不得休息暍死者太半熙遊于城南止大柳樹下若有人呼曰大王且止熙惡之伐其樹下有蛇長丈餘熙盡殺寶諸子改年為建始又為其妻起承華殿負土於北門土與穀同價典軍杜靜載棺詣闕上書極諫熙大怒斬之熙妻當季夏思凍魚鱠仲冬須生地黃皆下有司切責不得加之以大辟其虐也如此及苻氏死熙擁其屍而撫之曰體已就冷命遂斷矣於是僵仆絕息久而乃蘇悲號擗踴斬衰食粥大斂之後復啟而交接制百官哭臨沙門素服令有司案檢有淚者為忠孝無淚者罪之於是群臣震懼莫不含辛以為淚焉及葬熙被髮徒跣步從輀車高大毀城門而出長老相謂曰慕容氏自毀其門將不入矣中衛將軍馮跋兄弟閉門拒熙執而殺之立夕陽公雲為主雲寶之養子復姓高氏年號正始跋又殺雲自立雲之立也熙幽州刺史上庸公慕容懿以遼西歸降太祖以懿為征東將軍平州牧昌黎王後坐反伏誅元真少子德德字玄明雅為兄垂所重桓溫之至枋頭也德與垂擊走之苻堅滅暐以德為張掖太守垂稱尊號封為范陽王拜車騎大將軍司隸校尉尋遷司徒寶既即位以德鎮鄴後拜丞相寶既東走群寮勸德稱尊號德不從皇始二年既拔中山太祖遣衛王儀攻鄴德率戶四萬南走滑臺自稱燕王號年為燕元置百官德冠軍將軍苻廣叛於乞活壘德留兄子和守滑臺率眾攻廣斬之而和長史李辯殺和以城來降德無所據乃謀於眾其給事黃門侍郎張華勸德取彭城而據之其尚書潘聰曰青齊沃壤號曰東秦土方二千里戶餘十萬四塞之固負海之饒可謂用武之國宜攻取據之以為關中河內也德從之引師克薛城徐兗之民盡附之以其南海王法為兗州刺史鎮梁父進克莒城以潘聰為徐州刺史鎮莒城北伐廣固司馬德宗幽州刺史辟閭渾聞德將至徙民八千餘戶入廣固遣司馬崔誕率千餘人戍薄荀固平原太守張豁屯柳泉誕豁皆承檄遣子降德渾懼攜妻子北走德追騎斬之渾少子道秀自歸請與父俱死德曰渾雖不忠而子能孝其特赦之德入都廣固僭稱尊號號年建平女水竭德聞而惡之因而寢疾兄子超請祈女水德曰人君之命豈女水所知超固請終不許立超為太子德死超僭立超字祖明德兄北海王納之子也既僭位號年太上超青州刺史北地王鍾兗州刺史南海王法等起兵叛超超悉平之超南郊柴燎爓起而煙不出靈臺令張光告人曰今火盛而煙滅國其亡乎天賜五年司馬德宗將劉裕伐超超將公孫五樓勸超拒之於大峴超曰但令度峴我以鐵騎踐之此成擒也太尉桂林王鎮曰若如聖旨必須平原用馬便宜出峴逆戰戰而不勝猶可退守不宜縱敵自貽寇逼臣以為天時不如地利拒之大峴策之上也超不從出而告人曰主上酷似劉璋今年國滅吾必死之超收鎮下獄裕入大峴超拒之於臨胊乃赦鎮而謝之超戰於臨胊為裕所敗退還廣固裕遂圍之廣固鬼夜哭有流星長十餘丈隕于廣固城潰裕執超送建康市斬之臨渭氐苻健字建業本出略陽臨渭祖懷歸為部落小帥父洪字廣世洪之生也隴右霖雨百姓苦之時有謠曰雨若不止洪水必起故名之曰洪年十二而父死為部帥群氐推以為盟主劉曜拜洪為寧西將軍率義侯徙之高陸進為氐王石虎平秦隴表石勒拜冠軍將軍涇陽伯又徙之枋頭遷光烈將軍進爵為侯稍遷冠軍大將軍進封西平公討平梁犢進位車騎大將軍開府儀同三司略陽公冉閔之亂秦雍徙民西歸憑洪為主眾至十餘萬自稱大將軍大單于三秦王既而為其將麻秋所鴆臨死謂健曰關中周漢舊都形勝之國進可以一同天下退不失保全秦雍吾死之後便可鼓行而西健從之健初名羆字世建又避石虎外祖張羆之名故改焉健便弓馬善於事人石虎深愛之歷位翼軍校尉鎮軍將軍時京兆杜洪竊據長安關中雄俊皆應之健密圖關中懼洪之知也乃繕宮室於枋頭課民種麥示無西意既而自稱征西大將軍雍州刺史盡眾西行至盟津起浮橋以濟遣弟輔國將軍雄率步騎五千入自潼關兄子揚武將軍菁率眾七千自軹關入河東執菁手曰若事不捷汝死河北我死河南不及黃泉無相見也濟訖焚橋自統大眾繼雄而進杜洪遣將軍張光逆健于潼關雄擊破之洪盡召關中之眾以拒健健聞而筮之遇泰之臨健曰小往大來吉亨昔往東而小今還西而大吉孰大焉諸君知不此則漢祖屠秦之機也健長驅至長安杜洪奔司竹健遂入都建國十四年乃僭稱天王號年皇始國號大秦置百官健尋自稱皇帝桓溫率眾伐長安次于灞上健弟雄擊溫破之溫乃引眾東走健遣其太子萇追溫比至潼關克敗之萇亦為流矢所中死關中大饑蝗虫生於華澤西至隴山百草皆盡牛馬至相噉毛虎狼食人行路斷絕十八年健死子生僭立生字長生健之第三子也幼而粗暴昏酒無賴祖洪甚惡之生無一目年七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也洪懼跣而掩其口謂健曰此兒狂悖宜早除之不然長大必破人家欲殺之雄止之曰兒長成自當修改何至便如此健乃止及長力舉千鈞雄勇好殺手格猛獸走及奔馬擊刺騎射冠絕一時初健之長子死生母彊氏意在少子柳健以讖有三羊五眼之言故立之生既僭立號年壽光雖在諒闇遊飲自若彎弓露刃以見朝臣錘鉗鋸鑿備置左右在位未幾后妃公卿下至僕隸殺五百餘人朝饗群臣酣飲奏樂生親歌以和之命其尚書令辛牢行酒既而生怒曰何不彊酒猶有坐者引弓射牢而殺之於是百僚大懼無不引滿汙服失冠生以為樂長安大風或稱賊至宮門晝閉五日乃止生推告賊者刳出心胃生舅彊平切諫生鑿其頂而殺之虎狼大暴從潼關至于長安晝則斷道夜則發屋不食六畜專以害人自其元年秋至于二年夏虎殺七百餘人民廢農桑內外忷懼其臣奏請禳災生曰野獸飢則食人飽當自止終不累年為患也天將助吾行誅以施刑教但勿犯罪何為怨天生如阿房遇人共妹行者逼令為淫固執弗從生怒殺之其尚書僕射賈玄石形貌美偉生與妻樓上望見玄石在庭中妻曰此何人也生曰汝欲得也乃誅玄石生嘗夜食棗過多至旦病使太醫程延診脈延曰陛下食棗多無他疾也生曰嘻汝非聖人焉知吾食棗乃殺之常從輿上溲便輦者謂之天雨生既眇其目所諱者不足不具少無缺傷殘毀偏隻之言皆不得道左右忤旨而死者不可勝紀太白犯東井其臣奏曰東井秦也太白罰星必有暴兵起於京師生曰星入井者必將渴耳何所怪乎初生夢大魚食蒲又長安謠曰東海大魚化為龍男便為王女為公問在何所洛門東是月生以謠夢之故誅太師魚遵父子一十八人東海苻堅封也時為龍驤將軍宅在洛門之東又謠曰百里望空城鬱鬱何青青瞎人不知法仰不見天星於是悉壞諸空城以禳之法是苻法也生耽湎於酒無復晝夜其臣朝謁漏盡請見生曰日知盡乎須待飲訖因醉問左右曰吾統天下已來汝等何所聞乎或對曰聖明宰世子育百姓罰必有罪賞必有功天下唯歌太平未聞有怨生曰汝媚吾也引而斬之他日又問或對曰陛下刑罰微過生曰汝謗吾也亦殺之使宮人與男女裸交於殿前引群臣臨而觀之或生剝牛羊驢馬活燖雞豚鵝鴨數十為群放之殿下剝人面皮令其歌舞勳舊親戚殺害略盡王公在者以疾告歸得度一日如過十年至於截脛刳胎拉脅鋸頸者動有千數生夜對侍婢曰阿法兄弟亦不可信明當除之旦而侍婢以告法與弟堅率壯士數百人入雲龍門宿衛者皆捨仗歸堅廢生為越王俄而殺之堅字永固一字文玉雄第二子也既殺苻生以位讓其兄清河王法法固以推堅於是去皇帝之號僭稱天王號年永興以法為丞相東海公尋以疑忌殺之改年為甘露時建國二十二年也堅從弟晉公柳反於蒲阪魏公庾反於陜燕公武反於安定堅弟趙公雙反於上邽皆討平之慕容垂奔於堅王猛勸堅殺之堅不從三十八年改為建元堅遣使牛恬朝貢使尚書令王猛伐鄴堅親率大眾以繼之克鄴擒慕容暐堅使其右將軍楊安攻克漢中仍平蜀又遣其武衛將軍苟萇西伐涼州降張天錫遣其子長樂公丕攻克襄陽堅觀其史書見母苟氏通李威之事慚怒乃焚其書堅南伐司馬昌明戎卒六十萬騎二十七萬前後千里旗鼓相望堅至項城涼州兵始達咸陽蜀漢之軍順流而下幽冀之眾至于彭城東西萬里水陸齊進運漕萬艘自河入石門達于汝潁堅弟陽平公融攻壽春克之融馳使白堅曰賊少易俘但懼越逸宜速進軍堅大悅捨大軍于項城輕騎八千兼道赴之堅與融登城望昌明將謝石軍又望八公山上草木皆類人形顧謂融曰此亦勍敵也何謂少乎憮然有懼色謝石欲戰苻融陳逼肥水石遣使謂融曰君若小退師令將士周旋僕與君公緩轡而觀之不亦美也融於是麾軍卻陳欲因其濟覆而取之軍遂奔退制之不可止融馬倒見殺軍遂大敗謝石乘勝追擊至于青岡死者相枕堅單騎遁還淮北初謠言曰堅不出項群臣勸堅停項為六軍聲鎮堅不從諸軍悉潰唯其冠軍慕容垂一軍獨全堅以千餘騎赴之收集離散比至洛陽眾十餘萬行未及關垂有貳志說堅請巡撫燕代并求拜墓許之垂遂殺堅驍騎將軍石越鎮軍將軍毛當引丁零之眾攻堅子長樂公丕於鄴慕容泓沖起兵華澤堅遣子叡暉前後擊泓為泓所敗長安鬼夜哭三旬沖又擊殺堅將姜宇於灞上遂屯阿房進逼長安堅登城觀之歎曰此虜何從而出其彊若斯大言責沖曰爾輩群奴正可牧牛羊何為送死沖曰奴則奴矣既厭奴苦取爾見代堅遣使送錦袍一領遺沖使者稱有詔古人兵交使在其間卿遠來草創得無勞乎今送一袍以明本懷朕於卿恩分如何而於一朝忽為此變沖命詹事答之亦稱皇太弟有令孤今心在天下豈顧一袍小惠苟能知命便可君臣束手早送皇帝自當寬貸苻氏以酬曩好終不使既往之事獨美於前堅大怒曰朕不用王景略陽平公之言使白虜敢至於此長安大饑人民相食姚萇叛於北地與沖連和合攻長安有群烏數萬鳴於長安城上其聲甚悲占者以為不終年有甲兵入城之象每夜有人周城大呼曰楊定健兒應屬我宮殿臺觀應坐我父子同出不共汝旦遣尋求不見人跡先是又謠曰堅入五將山長得堅大信之告其太子永道曰天或導余脫如謠言留汝兼總戎政勿與賊爭利吾當出隴收兵運糧以給汝天其或者正訓予也遣其衛將軍楊定擊沖於城西為沖所擒堅彌懼付永道以後事率騎數百出如五將宣告州郡期救長安月餘永道尋將母妻宗室男女數千騎出奔武都遂假道入司馬昌明慕容沖入據長安堅至五將山姚萇遣其將吳忠圍之堅眾奔散獨左右十數人神色自若坐而待之召宰人進食俄而兵至執堅及其夫人張氏與少女寶錦送詣姚萇萇囚之將害焉堅自以平生遇萇厚忿之厲聲大罵謂張氏曰豈令羌奴辱吾兒於是殺寶錦姚萇乃縊堅於新平佛寺永道既奔昌明處之江州桓玄以為梁州刺史後為劉裕所誅永道名犯高祖廟諱堅子丕字永敘堅以為征東將軍冀州牧封長樂公鎮鄴為慕容垂圍逼丕乃去鄴率男女六萬餘口進如潞川堅驃騎將軍張蚝并州刺史王騰迎丕入據晉陽堅既為姚萇所殺太祖九年丕乃僭稱尊號改年太安先是王猛子幽州刺史永亦率眾赴之丕以永為司徒錄尚書事張蚝為司空王騰為司隸傳檄遠近率多應之丕留王騰守晉陽楊輔守壺關率眾四萬進據平陽將討姚萇而慕容永請假道東歸丕弗許怒曰永乃我之馬將首亂京畿禍傾社稷承凶繼逆方請逃歸是而可忍孰不可恕使其丞相王永討之戰于襄陵永大敗死之丕眾離散率騎數千南奔東垣為司馬昌明將馮該所殺丕族子登字文高粗險不修細行故堅弗之奇也長而折節頗覽書傳堅以為長安令坐事黜為狄道長及關中起兵奔於枹罕群氐殺河州牧毛興推衛平為安西將軍河州刺史平以登為長史既而枹罕諸氐以衛平年老議欲廢之而憚其宗彊連日不決氐有啖青者謂諸將曰大事宜定東討姚萇不可猶豫一旦事發返為人害諸君但請衛公會集眾將青為諸君決之眾咸以為然因大饗青抽劍而前曰衛公朽耄不足以成大事狄道長苻登雖王室疏屬請共立之於是推登為使持節都督隴右征羌諸軍事撫軍大將軍雍河二州牧略陽公率眾五萬東下隴據南安馳使請命丕以登為征西大將軍開府儀同三司南安王餘因其所稱而授之後與姚萇戰于胡奴阜大破之丕死登國元年登僭稱尊號於隴東號年太初置百官立堅神主於軍中載以輜軿羽葆青蓋建黃旗虎賁之士三百人以衛之每戰必告繕甲治兵引師而東皆刻鉾鎧為死休字示以戰死為志每戰以長矛鉤刃為方圓大陳知有厚薄從中分配故人自為戰所向無前登每圍萇營四面大哭哀聲動人大呼曰殺君賊姚萇出來吾與爾決何為枉害無辜萇憚而不應登進攻安定萇襲其輜重獲登妻毛氏將妻之毛氏哭罵萇殺之登聞姚萇死喜曰姚興小兒吾將折杖以笞之乃盡眾而東以趣廢橋興將尹緯據橋待之爭水不得為緯所敗奔於平涼入馬毛山姚興攻之登戰死子崇奔於湟中僭稱尊號改年延初尋為乞伏乾歸所殺羌姚萇字景茂出於南安赤亭燒當之後也祖柯回助魏將絆姜維於沓中以功假綏戎校尉西羌都督父弋仲晉永嘉之亂東徙榆眉劉曜以弋仲為平西將軍平襄公烈帝之五年弋仲率部眾隨石虎遷于清河之灄頭勒以弋仲為奮武將軍封襄平公昭成時弋仲死子襄代屯於譙城慕容後以襄為豫州刺史丹陽公進屯淮南自稱大將軍大單于為司馬聃將桓溫所敗奔於河東後為苻眉所殺弋仲有子四十二人萇第二十四隨兄襄征伐襄甚奇之襄之敗也萇率子弟降於苻堅從堅征伐頻有戰功歷寧幽兗三州刺史封益都侯邑五百戶苻堅伐司馬昌明以萇為龍驤將軍督益梁州諸軍事謂萇曰朕本以龍驤建業龍驤之號初未假人今特以相授山南之事一以委卿堅左將軍竇衝進曰王者無戲言此將不臧之徵也惟陛下察之堅默然及慕容泓起兵華澤堅遣子衛大將軍叡討之戰敗為泓所殺時萇為叡司馬懼罪奔馬牧聚眾萬餘自稱大將軍大單于萬年秦王號年白雀數月之間眾至十餘萬與慕容沖連和進屯北地苻堅出至五將山萇執而殺之登國元年僭稱皇帝置百官國號大秦年曰建初改長安曰常安以其太子興鎮長安自擊苻登安定敗之萇病夢苻堅將天官使者鬼兵數百突入營中萇懼走後宮宮人迎萇刺鬼誤中萇陰鬼相謂曰正中死處拔矛出血石餘寤而驚悸遂患陰腫醫刺之出血如夢萇乃狂言或稱臣或稱萇殺陛下者兄襄非臣之罪願不枉臣萇死子興襲位祕不發喪興字子略萇長子也既滅苻登乃發喪行服僭稱皇帝於槐里號年皇初天興元年興去皇帝之號降稱天王號年洪始興克洛陽以其弟東平公紹鎮之三年興遣使朝貢太祖遣謁者僕射張濟使於興興又大破乞伏乾歸遂入枹罕獲鎧馬六萬匹乾歸降於興太祖遣軍襲興高平公沒弈于于棄部眾率數千騎與赫連屈孑奔於秦州追至於瓦亭長安震懼興大議為寇其臣咸以為不可興不從天興五年夏興遣其弟義陽公平率眾四萬侵平陽攻乾壁六十餘日壁中眾少失井乃陷之六月太祖將討平遣毗陵王順等三軍六萬騎為先鋒七月車駕親征八月次於永安平募遣勇將率精騎二百闚軍為太祖前鋒將長孫肥所擒匹馬不返平遂退走太祖急追及於柴壁平因守固太祖圍之興乃悉舉其眾救平太祖聞興將至增築重圍內以防平之出外以拒興之入又截汾曲為南北浮橋乘西岸築圍太祖以步騎三萬餘人渡蒙坑南四十里逆擊興興晨行北引未及安營太祖軍卒至興眾怖擾太祖詔毗陵王順以精騎衝擊獲興甲騎數百斬首千餘級興退南走四十餘里太祖引還平竟不敢出但使人燒圍數百步而已太祖知興氣挫乃南絕蒙坑之口東杜新阪之隘守天度屯賈山令平水陸路絕將坐甲而擒之太祖又緣汾帶岡樹柵數十里以衛芻牧者九月興從汾西北下憑壑為壘以自固興又將數千騎乘西岸闚視太祖營束柏材從汾上流下之欲以毀橋官軍鉤取以為薪蒸興還壘太祖度其必攻西圍乃命修塹增廣之至夜興果來攻梯短不及棄之塹中而還又分其眾臨汾為壘叩逼水門興平相望太祖因截水中興內外隔絕士眾喪氣於是平糧盡窘急夜悉眾將突西南而出興列兵汾西舉烽鼓譟為平接援太祖簡諸軍精銳屯汾西固守南橋絕塞水口興夜聞聲望平力戰突免平聞外鼓望興攻圍引接故但叫呼虛相應和莫敢逼圍平引不得出窮迫乃將二妾赴水而死興安遠將軍不蒙世揚武將軍雷重等將士四千餘人隨平投水太祖令泅水鉤捕無得免者平眾三萬餘人皆斂手受執擒興尚書右僕射狄伯支越騎校尉唐小方積弩將軍姚梁國建忠將軍雷星康宦北中郎將康猥興從子伯禽已下四品將軍已上四十餘人興遠來赴救自觀其窮力不能免舉軍悲號震動山谷數日不止頻遣使請和太祖不許乃班師興還長安有雀數萬頭鬭於興廟毛羽折落多有死者月餘乃止識者曰今雀鬭廟上子孫當有爭亂者乎又興殿有聲如牛吼有二狐入長安一登興殿屋走入宮一入于市求之不得先是譙縱略有益寧之地僭稱尊號遣使稱蕃於興興以縱為蜀王加九錫永興三年興遣周寶朝貢五年興遣使朝貢并請進女太宗許之興中子廣平公弼有寵委之朝政興疾篤長子泓侍疾於中弼集黨數千人候興死欲殺泓自立興諸子姪外鎮者聞之皆起兵討弼興疾瘳不忍誅弼免官而已神瑞元年興遣兼散騎常侍尚書吏部郎嚴康朝貢二年興遣散騎常侍東武侯姚敞尚書姚泰奉其西平公主於太宗帝以后禮納之興復以弼為中軍大將軍配兵三萬屯於渭北興又疾甚弼遣其黨姚武伯等率眾攻端門泓時侍疾遣兵拒之興力疾臨前殿殺弼弼黨乃散泰常元年興死泓僭立泓字元子興之長子也既僭位號年永和赫連屈孑攻泓秦州又剋安定遂據雍城司馬德宗將劉裕伐泓裕遣將檀道濟至洛陽泓弟陳留公洸以城降泓弟太原公懿反於蒲阪泓從弟齊公恢反於嶺北皆舉兵伐長安泓既有內難裕遂長驅入關泓戰敗請降送於建康市斬之略陽氐呂光字世明本出略陽父婆樓苻堅太尉光年十歲遊戲好戰陳之法為諸兒所推身長八尺四寸肘有肉印從王猛征討稍遷破虜將軍堅以光為驍騎將軍率眾七千討西域所經諸國莫不降附光至龜茲王帛純拒之西域諸胡救帛純者七十餘萬人光乃結陳為勾鎖之法戰於城西大破之斬級萬餘帛純逃走降者三十餘國光以駝二千餘頭致外國珍寶及奇伎異戲殊禽怪獸千有餘品駿馬萬餘匹而還苻堅涼州刺史梁熙遣兵拒之光擊破熙軍遂入姑臧斬熙自署護羌校尉涼州刺史登國初又自稱使持節大都督大將軍涼州牧酒泉公主簿尉祐奸佞淺薄光寵任之譖誅姚皓尹景等名士十餘人於是遠近失望人懷離貳四年光私稱三河王遣使朝貢置官自丞郎已下猶攝州事號麟嘉元年皇始初光僭稱天王置百官改號龍飛立子紹為太子遣使朝貢光疾甚立紹為天王自號太上皇帝光死長子纂殺紹僭立纂字永緒既自立號咸寧元年纂弟大司馬洪名犯顯祖諱以猜忌不容起兵攻纂纂殺之縱兵大掠纂笑謂左右曰今日之戰何如纂侍中房晷對曰先帝始崩太子以幽逼致殂山陵甫訖大司馬疑懼肆逆京邑交兵友于接刃雖洪自取夷滅亦由陛下無棠棣之義且洪妻陛下弟婦也洪女陛下之姪女也奈何使小人汙辱為婢妾天地神明豈忍見此因歔欷流涕纂謝之乃收洪妻子纂昏虐任情遊田無度耽荒酒色與左右因醉馳獵於坑澗之間或有諫者纂皆不納又性多猜忌忍於殺戮纂從弟超殺纂纂弟緯單馬入城超殺之而立其兄隆隆字永基光弟寶之子也初超讓位於隆隆難之超曰今猶乘龍上天豈得中下乃僭位改神鼎元年超使纂妻楊氏及侍婢數人殯纂於城西超慮楊持珍寶出使人搜之楊氏責超曰郎君兄弟手刃相圖新婦旦夕死人用金寶何為超慚而退楊氏國色超將妻焉謂其父桓曰后若自殺禍及卿宗桓以告之楊氏曰大人本賣女與氐以圖富貴一之以甚復可使女辱於二氐乎乃自殺沮渠蒙遜禿髮傉檀頻來攻擊河西之民不得農植穀價湧貴斗直錢五千文人相食餓死者千餘口姑臧城門晝閉樵採路斷民請出城乞為夷虜奴婢者日有數百隆恐沮動人情盡坑之於是積屍盈于衢路戶絕者十有九焉屢為蒙遜攻逼乃請迎於姚興遣齊難率眾迎之隆遂降焉至長安尋復為興所誅史臣曰夷狄不恭作害中國帝王之世未曾無也劉淵等假竊名目狼戾為梗汙辱神器毒螫黎元喪亂鴻多一至於此怨積禍盈死傾巢穴天意其俟大人乎
