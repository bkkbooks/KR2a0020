body:
  text: 卷九帝紀第九肅宗紀肅宗孝明帝詡肅宗孝明皇帝諱詡世宗宣武皇帝之第二子母曰胡充華永平三年三月丙戌帝生于宣光殿之東北有光照于庭中延昌元年十月乙亥立為皇太子四年春正月丁巳夜即皇帝位戊午大赦天下己未徵下西討東防諸軍庚申詔太保高陽王雍入居西柏堂決庶政又詔任城王澄為尚書令百官總己以聽於二王己巳勿吉達槃地豆和尼步伽拔但佐越費實等諸國遣使朝獻二月庚辰尊皇后高氏為皇太后辛巳司徒高肇至京師以罪賜死蕭衍寧州刺史任太洪率眾寇關城益州長史成興孫擊破之癸未太保高陽王雍進位太傅領太尉司空清河王懌為司徒驃騎大將軍廣平王懷為司空己亥尊胡充華為皇太妃宕昌國遣使朝獻三月甲辰朔皇太后出俗為尼徙御金墉丙辰詔進宮臣位一級先是蕭衍於浮山堰淮規為揚徐之害詔平南將軍楊大眼討之乙丑進文武群官位一級夏四月梁州刺史薛懷古破反氐於沮水五月甲寅南秦州刺史崔暹擊破氐賊解武興圍六月沙門法慶聚眾反於冀州殺阜城令自稱大乘秋七月癸卯蠕蠕國遣使朝獻丁未詔假右光祿大夫元遙征北大將軍攻討法慶宕昌國遣使朝獻八月乙亥領軍于忠矯詔殺左僕射郭祚尚書裴植免太傅領太尉高陽王雍官以王還第丙子尊皇太妃為皇太后己卯吐谷渾國遣使朝獻庚辰蕭衍定州刺史田超秀率眾三千請降戊子帝朝皇太后於宣光殿大赦天下己丑司徒清河王懌進位太傅領太尉司空廣平王懷為太保領司徒驃騎大將軍任城王澄為司空庚寅車騎大將軍于忠為尚書令特進崔光為車騎大將軍並儀同三司壬辰復前江陽王繼本國以濟南王彧復先封為臨淮王群臣奏請皇太后臨朝稱制九月乙巳皇太后親覽萬機詔曰高祖革禮成治遺澤在民世宗纂承丕業聖德昭遠朕以沖孺屬當寶圖洪基至重若履冰薄王公百辟群牧庶官皆受遇先朝寵榮自昔宜各勉崇共康世道勠力竭誠以匡輔不逮其有懷道丘園昧跡板築山栖谷飲舒卷從時者宜廣戔帛緝和鼎飪有能讜言直諫濟世益時者在所以聞當待以不次之位孝子順孫義夫節婦表其門閭以彰厥美高年孤獨不能自存者贍以粟帛若因饑失業天屬流離或賣鬻男女以為僕隸者各聽歸還比冀方未肅徐城寇擾將統久勞士卒疲敝並遣撫慰賜以衣馬緣邊州鎮固捍之勞朔方酋庶北面所委亦令勞賚以副其心其有先朝舊事寢而不舉頃來便習不依軌式者並可疏聞當加覽裁若益時利治不拘常制者自依別例其明相申約稱朕意焉甲寅征北元遙破斬法慶及渠帥百餘人傳首京師安定王燮薨庚申高昌庫莫奚契丹諸國並遣使朝獻蕭衍將趙祖悅襲據硤石癸亥詔定州刺史崔亮假鎮南將軍率諸將討之冀州刺史蕭寶夤為鎮東將軍次淮堰戊辰鄧至國遣使朝貢冬十月庚午朔勿吉國貢楛矢壬午高麗吐谷渾國並遣使朝獻乙酉以安定公胡國珍為中書監儀同三司甲午蕭衍弘化太守杜桂舉郡內屬十有二月辛丑以高陽王雍為太師己酉鎮南崔亮破祖悅遂圍硤石丁卯帝皇太后謁景陵高車國遣使朝獻熙平元年春正月戊辰朔大赦改年荊沔都督元志大破蕭衍軍斬其恒農太守王世定等以吏部尚書李平為鎮軍大將軍兼尚書右僕射為行臺節度討硤石諸軍二月乙巳鎮東蕭寶夤大破衍將於淮北癸亥初聽秀才對策第居中上已上敘之乙丑鎮南崔亮鎮軍李平等克硤石斬衍豫州刺史趙祖悅傳首京師盡俘其眾是月吐谷渾宕昌鄧至諸國並遣使朝貢三月辛未以揚州刺史李崇為驃騎將軍儀同三司壬辰以硤石俘虜分賜百寮夏四月戊戌以瀛州民飢開倉賑恤高昌陰平國並遣使朝獻五月丁卯朔詔曰炎旱積辰苗稼萎悴比雖微澍猶未霑洽晚種不納企望憂勞在予之責思自兢厲尚書可釐恤獄犴察其淹枉簡量輕重隨事以聞無使一人怨嗟增傷和氣土木作役權皆休罷勸農省務肆力田疇庶嘉澤近降豐年可必蕭衍衡州刺史張齊寇益州復以傅豎眼為刺史以討之頻破賊軍斬其將任太洪首庚午詔放華林野獸於山澤丙戌吐谷渾遣使朝獻秋七月庚午重申殺牛之禁丙子詔兵士征硤石者復租賦一年傅豎眼大破張齊齊遁走乙酉高昌國遣使朝獻八月乙巳以侍中中書監儀同三司安定郡開國公胡國珍為都督雍涇岐華東秦豳六州諸軍事驃騎大將軍開府儀同三司雍州刺史丙午詔曰先賢列聖道冠生民仁風盛德煥乎圖史暨曆數永終迹隨物變陵隧沓藹鞠為茂草古帝諸陵多見踐藉可明敕所在諸有帝王墳陵四面各五十步勿聽耕稼宕昌國遣使朝貢九月丁丑淮堰破蕭衍緣淮城戍村落十餘萬口皆漂入于海十有二月癸巳詔洛陽河陰及諸曹雜人年七十已上鰥寡貧困不能自存及年雖少而痼疾長廢窮苦不濟者研實具列以聞二年春正月大乘餘賊復相聚結攻瀛州刺史宇文福討平之甲戌大赦天下戊子勿吉國遣使朝貢庚寅詔遣大使巡行四方問疾苦恤孤寡黜陟幽明又詔選曹用人務在得才廣求栖遁共康治道州鎮城隍各令嚴固齋會聚集糾執妖諠囹圄皆令造屋桎梏務存輕小工巧浮迸不得隱藏絹布繒綵長短合式偷竊軍階亦悉沙汰籍貫不實普使糾案聽自歸首逋違加罪詔中尉元匡考定權衡癸丑地伏羅罽賓國並遣使朝獻二月庚子契丹鄧至宕昌諸國並遣使朝獻丁未封御史中尉元匡為東平王三月甲戌吐谷渾國遣使朝獻丁亥太保領司徒廣平王懷薨夏四月甲午高麗波斯疏勒嚈噠諸國並遣使朝獻丁酉詔京尹所統百年以上賜大郡板九十以上賜小郡板戊申以中書監開府儀同三司胡國珍為司徒公特進汝南王悅為中書監儀同三司乙卯皇太后幸伊闕石窟寺即日還宮安定王超改封北平王五月辛酉詔曰揚州硤石荊山新淮酇城兵士戰沒者追給斂財復一房五年若無妻子復其家一人二年身被三瘡賞一階雖一瘡而四體廢落者亦同此賞庚辰重申天文之禁犯者以大辟論乙酉鄧至國遣使朝貢秋七月乙丑地伏羅罽賓國並遣使朝獻乙亥中書監儀同三司汝南王悅坐殺人免官以王還第己巳車駕有事於太廟八月戊戌宴太祖以來宗室年十五以上於顯陽殿申家人之禮己亥詔庶族子弟年未十五不聽入仕詔曰皇魏開基道邁周漢蟬連二都德盛百祀雖帝胤蕃衍親賢並茂而猶沉屈素履巾褐衡門非所謂廣命戚族翼屏王室者也今可依世近遠敘之列位庚子詔咸陽京兆二王子女還附屬籍壬寅吐谷渾國遣使朝獻丁未詔侍中太師高陽王雍入居門下參決尚書奏事己酉契丹國遣使朝貢九月辛酉吐谷渾國遣使朝貢丙寅詔曰察訟理冤實維政首躬親聽覽民信所由比日諒闇之中治綱未振獄犴繁廣嗟訴驟聞雖曰司存每多誣壅曾是寡德實深矜慨自今月望當蹔出城闉親納滯枉主者可宣諸近遠咸使聞知是月城青齊兗涇平營肆七州所治東陽歷城瑕丘平涼肥如和龍九原七城冬十月庚寅以幽冀滄瀛四州大饑遣尚書長孫稚兼尚書鄧羨元纂等巡撫百姓開倉賑恤丁酉勿吉國貢楛矢戊戌以光州饑敝遣使賑恤乙卯詔曰北京根舊帝業所基南遷二紀猶有留住懷本樂故未能自遣若未遷者悉可聽其仍停安堵永業門才術藝應於時求者自別徵引不在斯例周之子孫漢之劉族遍於海內咸致蕃衍豈拘南北千里而已哉十有一月甲子蕭衍平西將軍巴州刺史牟漢寵遣使請降十有二月丁未蠕蠕國遣使朝貢神龜元年春正月甲子詔以氐酋楊定為陰平王丙寅以特進江陽王繼為驃騎大將軍儀同三司壬申詔曰朕沖昧撫運政道未康民之疾苦弗遑紀恤夙宵矜慨鑒寐深懷眷彼百齡悼茲六極京畿百年以上給大郡板九十以上給小郡板八十以上給大縣板七十以上給小縣板諸州百姓百歲以上給小郡板九十以上給上縣板八十以上給中縣板鰥寡孤獨不能自存者賜粟五斛帛二匹庚辰詔以雜役之戶或冒入清流所在職人皆五人相保無人任保者奪官還役乙酉加特進汝南王悅儀同三司秦州羌反幽州大饑民死者三千七百九十九人詔刺史趙邕開倉賑恤二月戊申嚈噠高麗勿吉吐谷渾宕昌疏勒久末陁末久半諸國並遣使朝獻己酉詔以神龜表瑞大赦改年東益州氐反蠕蠕國遣使朝貢三月辛酉以尚書右僕射于忠為儀同三司辛巳儀同三司尚書右僕射于忠薨南秦州氐反遣龍驤將軍崔襲持節喻之吐谷渾國遣使朝貢夏四月丁酉司徒胡國珍薨甲辰江陽王繼改封京兆王辛亥舍摩國遣使朝獻五月高麗高車高昌諸國並遣使朝貢自正月不雨至于六月辛卯澍雨乃降秋七月河州民卻鐵怱聚眾反自稱水池王詔行臺源子恭討之閏月戊戌吐谷渾國遣使朝貢甲辰開恒州銀山之禁與民共之丁未波斯疏勒烏萇龜茲諸國並遣使朝獻八月癸丑朔詔曰朕沖昧纂曆未閑政道皇太后殷憂在疚始覽萬幾故獄犴淹枉百姓冤敝言念繁刑思存降省京師見囚殊死以下可悉減一等丁巳詔曰頃年以來戎車頻動服制未終奪哀從役罔極之痛弗申鞠育之恩靡報非所謂敦崇至道者也自今雖金革之事皆不得請起居喪甲子勿吉國遣使朝貢鐵怱相率降於行臺源子恭九月癸未朔以右光祿大夫劉騰為衛將軍儀同三司戊申皇太后高氏崩于瑤光寺冬十月丁卯以尼禮葬於北邙十月二月辛未詔曰民生有終下歸兆域京邑隱賑口盈億萬貴賤攸憑未有定所為民父母尤宜存恤今制乾脯山以西擬為九原二年春正月丁亥詔曰朕以沖眇纂承寶位夙夜惟寅若涉淵海賴皇太后慈仁被以夙訓自臨朝踐極歲將半紀天平地成四海寧乂天道高遠巍巍難名猶以撝挹自居稱號弗備非所以崇奉坤元允協億兆者也宜遵舊典稱詔宇內以副黎蒸元元之望是月改葬文昭皇太后高氏二月乙丑齊郡王祐薨庚午羽林千餘人焚征西將軍張彝第毆傷彝燒殺其子始均吐谷渾宕昌國並遣使朝貢乙亥大赦天下丁丑詔求直言諸有上書者聽密封通奏壬寅詔曰農要之月時澤弗應嘉穀未納二麥枯悴德之無感歎懼兼懷可敕內外依舊雩祈率從祀典察獄理冤掩胔埋骼冀瀛之境往經寇暴死者既多白骨橫道可遣專令收葬賑窮恤寡救疾存老準訪前式務令周備三月甲辰澍雨大洽夏四月乙丑嚈噠國遣使朝貢五月戊戌以司空任城王澄為司徒驃騎大將軍儀同三司京兆王繼為司空秋八月己未御史中尉東平王匡坐事削除官爵辛未以左光祿大夫皇甫集為征西將軍儀同三司九月庚寅皇太后幸崧高山癸巳還宮瀛州民劉宣明謀反事覺伏誅冬十有一月乙酉蠕蠕莫緣梁賀侯豆率男女七百人來降十有二月癸丑司徒任城王澄薨庚申大赦天下詔除淫祀焚諸雜神是歲高麗王雲死以世子安為其國王正光元年春正月乙酉詔曰建國緯民立教為本尊師崇道茲典自昔來歲仲陽節和氣潤釋奠孔顏乃其時也有司可豫繕國學圖飾聖賢置官簡牲擇吉備禮夏四月丙辰詔尚書長孫稚巡撫北藩觀察風俗五月辛巳詔曰朕以寡薄運膺寶圖雖未明求衣惕懼終日而闇昧多闕炎旱為災在予之愧無忘寢食今刑獄繁多囹圄尚積宜敷仁惠以濟斯民八座可推鞫見囚務申枉濫癸未詔曰攘災招應修政為本民乃神主實宜率先刺史守令與朕共治天下宜哀矜勿喜視民如傷況今炎旱歷時萬姓彫敝而不撫恤窮冤理決庶獄可嚴敕州郡善加綏隱務盡聰明加之祗肅必使事允人神時致靈應其賦役不便於民者具以狀聞便當蠲罷秋七月丙子侍中元叉中侍中劉騰奉帝幸前殿矯皇太后詔曰魏有天下奕葉重光高祖孝文皇帝以英聖馭天徙京定鼎世宗宣武皇帝以睿明承業廓寧區夏而鴻勳未半早已登遐乃令車書弗同鯨寇尚熾幼主稚弱夙纂寶曆曾是宗祏莫克祗奉朕所以敬順群請臨朝總政帝年以長久思退身所以往歲殷勤具陳情旨百官內外已照此懷而僉爾眾意苦見勤奪僶俛從事以迄于茲自此春來先疾屢發藥石攝療莫能善瘳夏首及今數加動劇便不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫緝萬邦諧決百揆朕當率前志敬遜別宮遠惟復子明辟之義以自綏養實望群公逮于黎庶深鑒斯理如此則上下休嘉天地清晏魏道熙隆人神慶悅不其善歟乃幽皇太后於北宮殺太傅領太尉清河王懌總勒禁旅決事殿中辛卯帝加元服大赦改年內外百官進位一等八月甲寅相州刺史中山王熙舉兵欲誅叉騰不果見殺九月壬辰蠕蠕主阿那瓌來奔戊戌以太師高陽王雍為丞相加後部羽葆鼓吹班劍四十人冬十月乙卯以驃騎大將軍儀同三司汝南王悅為太尉公十有一月己亥詔曰蠕蠕世雄朔方擅制漠裔鄰通上國百有餘載自神鼎南底累紀于茲虔貢雖違邊燧靜息憑心象魏潛款彌純今其主阿那瓌屬離時難邦分親析萬里遠馳庇命有道悲同申伍忠孝足矜方存興滅之師以隆繼絕之舉宜且優以賓禮期之立功疏爵胙土大啟河岳可封朔方郡開國公蠕蠕王食邑一千戶錫以衣冕加以軺車祿恤儀衛同乎戚蕃十有二月壬子詔曰蠕蠕王阿那瓌遭離寇禍遠來投庇邦分眾析猶無定主而永懷北風思還綏集啟訴情切良用愍然夫存亡恤敗自古通典可差國使及彼前後三介與阿那瓌相隨并敕懷朔都督簡銳騎二千躬自率護送達境首令觀機招納若彼候迎宜錫筐篚車馬之屬務使優隆禮餞而返如不容受任聽還闕其行裝資遣付尚書量給辛酉以司空京兆王繼為司徒公二年春正月南秦州氐反二月庚戌假光祿大夫邴虯撫軍將軍以討之癸亥車駕幸國子學講孝經三月庚午帝幸國子學祠孔子以顏淵配甲午右衛將軍奚康生於禁內將殺元叉不果為叉矯害以儀同三司劉騰為司空公夏四月庚子司徒京兆王繼進位太保壬寅車騎大將軍儀同三司崔光為司徒公蕭衍義州刺史文僧明率眾內屬五月辛巳南荊州刺史桓叔興自安昌南叛乙酉烏萇國遣使朝貢閏月丁巳居密波斯國並遣使朝貢六月己巳高昌國遣使朝貢癸巳勿吉國遣使朝貢秋七月癸丑詔曰時澤弗降禾稼形損在予之責夙宵震懼雖克躬撤降仍無招感有司可修案舊典祗行六事圄犴淹枉隨速鞫決庶尹廢職量加脩厲鰥獨困窮在所存恤役賦煩民咸加蠲省賢良讜直以時升進貪殘邪佞即就屏黜男女怨曠務令會偶庶革止懲違有弭災沴八月己巳伏羅國遣使朝貢蠕蠕後主郁久閭侯匿伐來奔懷朔鎮十有一月乙未朔高昌國遣使朝貢戊申衛大將軍儀同三司皇甫集薨癸丑侍中車騎大將軍侯剛加儀同三司十有二月甲戌詔司徒崔光安豐王延明等議定服章庚辰以東益南秦氐反詔中軍將軍河間王琛討之失利三年春正月辛亥帝耕籍田夏四月庚辰以高車國主覆羅伊匐為鎮西將軍西海郡開國公高車王六月己巳詔曰朕以沖昧夙纂寶歷不能祗奉上靈感延和氣致令炎旱頻歲嘉雨弗洽百稼燋萎晚種未下將成災年秋稔莫覬在予之責憂懼震懷今可依舊分遣有司馳祈嶽瀆及諸山川百神能興雲雨者盡其虔肅必令感降玉帛牲牢隨應薦享上下群官側躬自厲理冤獄止土功滅膳撤懸禁止屠殺秋七月壬子波斯不漢龜茲諸國遣使朝貢冬十月己巳吐谷渾國遣使朝貢十有一月乙巳車駕有事於圓丘丙午詔曰治歷明時前王茂軌考辰正律弈代通規是以北平革定於漢年楊偉草算於魏世自皇運肇基典章猶缺推步晷曜未盡厥理先朝仍世每所慨然至神龜中始命儒官改創疏蹐回度易憲始會琁衡今天正斯始陽煦將開品物初萌宜變耳目所謂魏雖舊邦其歷維新者也便可班宣內外號曰正光歷又首節嘉辰獲展丘禘神人交和理契幽顯思與億兆共此維新可大赦天下十有二月癸酉以左光祿大夫皇甫度為儀同三司乙酉以車騎大將軍尚書右僕射元欽為儀同三司太保京兆王繼為太傅司徒崔光為太保丁亥以牧守妄立碑頌輒興寺塔第宅豐侈店肆商販詔中尉端衡肅厲威風以見事糾劾七品六品祿足代耕亦不聽錮貼店肆爭利城市四年春二月壬申追封故咸陽王禧為敷城王京兆王愉為臨洮王清河王懌為范陽王以禮加葬丁丑河間王琛章武王融並以貪汙削爵除名己卯以蠕蠕主阿那瓌率眾犯塞遣尚書左丞元孚兼尚書為北道行臺持節喻之蠕蠕後主侯匿伐來朝京師宕昌國遣使朝貢司空劉騰薨夏四月阿那瓌執元孚驅掠畜牧北遁甲申詔驃騎大將軍尚書令李崇中軍將軍兼尚書右僕射元纂率騎十萬討蠕蠕出塞三千餘里不及而還秋七月辛亥詔曰達尊斯在齒預一焉崇敬黃耇先代通訓故方叔以元老處位充國緣自彊見留雖七十致仕明乎典故然以德尚壯許其縶維今庶僚之中或年迫懸車循禮宜退但少收其力老棄其身言念勤舊睠然未忍或戴白在朝未當外任或停私歷紀甫受考級如此之徒雖滿七十聽其莅民以終常限或新解郡縣或外佐始停已滿七十方求更敘者吏部可依令不奏其有高名俊德老成髦士灼然顯達為時所知者不拘斯例若才非秀異見在朝官依令合解者可給本官半祿以終其身使辭朝之叟不恨歸於閭巷矣八月己巳詔曰狂蠢肆暴陵竊北垂雖軍威時接賊徒懾遁然獯虐所過多離其禍言念斯敝有軫深懷可敕北道行臺遣使巡檢遭寇之處饑餒不粒者厚加賑恤務令存濟戊寅詔曰朕以眇闇忝承鴻緒因祖宗之基託王公之上每鑒寐屬慮思康億兆比雨旱愆時星運舛錯政理闕和靈祗表異永尋夕惕載恧于懷宜詔百司各勤厥職諸有鰥寡窮疾冤滯不申者並加釐恤若孝子順孫廉貞義節才學超異獨行高時者具以言上朕將親覽加以旌命癸未追復故范陽王懌為清河王九月丁酉庫莫奚國遣使朝獻詔侍中太尉汝南王悅入居門下與丞相高陽王雍參決尚書奏事冬十有一月丙申趙郡王謐薨丁酉太保崔光薨十有二月蕭衍遣將寇邊詔假征南將軍崔延伯討之以太尉汝南王悅為太保徐州刺史北海王顥坐貪汙削除官爵五年春正月辛丑車駕有事於南郊閏二月癸巳嚈噠國遣使朝貢三月沃野鎮人破落汗拔陵聚眾反殺鎮將號真王元年詔臨淮王彧為鎮軍將軍假征北將軍都督北征諸軍事以討之夏四月高平酋長胡琛反自稱高平王攻鎮以應拔陵別將盧祖遷擊破之琛北遁五月臨淮王彧敗於五原削除官爵壬申詔尚書令李崇為大都督率廣陽王淵等北討六月秦州城人莫折太提據城反自稱秦王殺刺史李彥詔雍州刺史元志討之南秦州城人孫掩張長命韓祖香據城反殺刺史崔遊以應太提太提遣城人卜朝襲克高平殺鎮將赫連略行臺高元榮太提尋死子念生代立僭稱天子號年天建置立百官丁酉大赦秋七月甲寅詔吏部尚書元脩義兼尚書僕射為西道行臺率諸將西討戊午復河間王琛臨淮王彧本封都督崔暹失利于白道大都督李崇率眾還平城坐長史祖瑩截沒軍資免除官爵丁丑念生遣其都督楊伯年樊元張朗等攻仇鳩河池二戍東益州刺史魏子建遣將尹祥黎叔和擊破之斬樊元首殺賊千餘人是月涼州幢帥于菩提呼延雄執刺史宋穎據州反念生遣其兄高陽王天生下隴東寇八月甲午元志大敗於隴東退守岐州丙申詔曰賞貴宿勞明主恒德恩沾舊績哲后常範太祖道武皇帝應期撥亂大造區夏世祖太武皇帝纂戎丕緒光闡王業躬率六師掃清逋穢諸州鎮城人本充牙爪服勤征旅契闊行間備嘗勞劇逮顯祖獻文皇帝自北被南淮海思乂便差割彊族分衛方鎮高祖孝文皇帝遠遵盤庚將遷嵩洛規遏北疆蕩辟南境選良家酋帥增戍朔垂戎捍所寄實惟斯等先帝以其誠效既亮方加酬錫會宛郢馳烽胊泗告警軍旗頻動兵連積歲茲恩仍寢用迄于今怨叛之興頗由於此朕叨承乾歷撫馭宇宙調風布政思廣惠液宜追述前恩敷茲後施諸州鎮軍貫元非犯配者悉免為民鎮改為州依舊立稱此等世習干戈率多勁勇今既甄拔應思報效可三五簡發討彼沙隴當使人齊其力奮擊先驅妖黨狂醜必可蕩滌衝鋒斬級自依恒賞丁酉南秀容牧子于乞真反殺太僕卿陸延別將爾朱榮討平之戊戌莫折念生遣都督竇雙攻盤頭郡東益州刺史魏子建遣將竇念祖討之斬雙擒斬千餘人九月壬申詔尚書左僕射齊王蕭寶夤為西道行臺大都督率征西將軍都督崔延伯又詔復撫軍將軍北海王顥官爵為都督並率諸將西討乙亥帝幸明堂餞寶夤等是月蕭衍遣將裴邃虞鴻襲據壽春外城刺史長孫稚擊走之邃退屯黎漿詔河間王琛總眾援之衍又遣將寇淮陽詔祕書監安樂王鑒率眾討之吐谷渾主伏連籌遣兵討涼州于菩提棄城走追斬之城民趙天安復推宋穎為刺史冬十月營州城人劉安定就德興據城反執刺史李仲遵城人王惡兒斬安定以降德興東走自號燕王胡琛遣其將宿勤明達寇豳夏北華三州壬午詔都督北海王顥率諸將討之十有一月戊申莫折天生攻陷岐州執都督元志及刺史裴芬之高平人攻殺卜朝共迎胡琛十有二月壬辰詔太傅京兆王繼為太師大將軍率諸將討之嚈噠契丹地豆于庫莫奚諸國並遣使朝貢汾州正平平陽山胡叛逆詔復征東將軍章武王融封爵為大都督率眾討之山南行臺東益州刺史魏子建招降南秦氐民復六郡十二戍又斬賊王韓祖香南秦賊王張長命畏逼乃告降於蕭寶夤是月莫折念生遣兵攻涼州城人趙天安復執刺史以應之孝昌元年春正月庚申徐州刺史元法僧據城反害行臺高諒自稱宋王號年天啟遣其子景仲歸於蕭衍衍遣其將胡龍牙成景雋元略等率眾赴彭城詔祕書監安樂王鑒回師以討之鑒於彭城南擊元略大破之盡俘其眾既而不備為法僧所敗衍遣其豫章王綜入守彭城法僧擁其寮屬守令兵戍及郭邑士女萬餘口南入詔鎮軍將軍臨淮王彧尚書李憲為都督衛將軍國子祭酒安豐王延明為東道行臺復儀同三司李崇官爵為東道大都督俱討徐州崇以疾不行癸亥蕭寶夤崔延伯大破秦賊於黑水斬獲數萬天生退走入隴西涇岐及隴東悉平以太師大將軍京兆王繼為太尉餘官如故二月以領軍將軍元叉為驃騎大將軍儀同三司詔追復樂良王長命本爵以其子忠紹之侍中特進衛大將軍穆紹為儀同三司戊戌大赦壬辰莫折念生遣都督楊鮓梁下辯姜齊等攻仇池郡城行臺東益州刺史魏子建遣將盛遷擊破之斬下辯齊等首壬寅詔曰勸善黜惡經國茂典其令每歲一終郡守列令長刺史列守相以定考課辯其能否若有濫謬以考功失衷論是月齊州魏郡民房伯和聚眾反會赦乃散三月己巳詔太尉西道都督京兆王繼班師壬申詔曰丞相高陽王道德淵廣明允篤誠儀型太階垂風下國實所以予違汝弼致治責成宜班新制宣之遐邇其州郡先上司徒公文悉可改上相府施行符告皆亦如之甲戌詔曰選眾而舉其來自昔朕纘承大業綜理萬幾求賢致治心焉若渴知人則哲振古所難宜博訪公卿採茲聲實可令第一品以下五品以上人各薦其所知不限素身居職必使精辯器藝具注所能然後依牒簡擢隨才收敘庶濟濟之美無替往時謇謇之直有申茲歲蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等入寇直城梁州刺史傅豎眼遣息敬紹率眾拒擊大破之擒斬三千餘人休儒等走還魏興是月齊州清河民崔畜殺太守董遵廣川民傅堆執太守劉莽反青州刺史安樂王鑒討平之是月破落汗拔陵別帥王也不盧等攻陷懷朔鎮夏四月蕭衍益州刺史蕭淵猷遣將樊文熾蕭世澄等率眾圍小劍戍益州刺史邴虯遣子子達行臺魏子建遣別將淳于誕拒擊之辛卯皇太后復臨朝攝政引群臣面陳得失詔曰朕以寡昧夙承天歷茫若涉海罔知所濟實憑宗社降祐之靈庶勉幼志以康世道而神龜之末權臣擅命元叉劉騰陰相影響遂使皇太后幽隔後宮太傅清河王無辜致害相州刺史中山王熙橫被夷滅右衛將軍奚康生仍見誅翦從此已後無所畏忌恣諸侵求任所與奪無君之心積習稍久不臣之迹緣事彌彰蔽耳目之明專生殺之柄天下為之不康四郊由茲多壘此而可忍孰不可懷雖屢經赦宥未容致之于法猶宜辨正以謝朝野騰身既往可追削爵位叉之罪狀誠合徽纆但以宗枝舅戚特加全貸可除名為民壬辰征西將軍都督崔延伯大敗於涇川戰歿五月戊辰淳于誕等大破蕭衍軍俘斬萬計擒蕭世澄等十一將文熾僅以身免走成都戊子驃騎大將軍儀同三司李崇薨六月癸未大赦改年詔文武之官從軍二百日文官優一級武官優二級蠕蠕主阿那瓌率眾大破拔陵斬其將孔雀等諸將逼彭城蕭綜夜潛出降蕭衍諸將奔退眾軍追躡免者十一二秋八月癸酉詔斷遠近貢獻珍麗違者免官柔玄鎮人杜洛周率眾反於上谷號年真王攻沒郡縣南圍燕州戊子莫折念生遣都督杜黑兒杜光等攻仇池郡行臺魏子建遣將成遷擊破之斬杜光首九月乙卯詔減天下諸調之半丙辰詔左將軍幽州刺史常景為行臺征虜將軍元譚為都督以討洛周辛酉詔曰追功表德為善者勸祖宗功臣勒銘王府而子孫廢替淪於凡民爵位無聞遷流有失潁川名守重泉令宰惠風美政結於民心而猶同常品未蒙褒陟非所謂愛及甘棠彝倫攸敘者也其功臣名將為先朝所知子孫屈塞不見齒敘牧守令長聲稱卓然者皆仰有司具以名聞朕將振彼幽滯用闡治風壬戌詔百官五品已上各舉所知辛未曲赦南北兩秦州冬十月蠕蠕國主阿那瓌遣使朝貢是月吐谷渾國復討趙天安降之河州長史元永平治中孟賓等推嚈噠使主高徽行州事而前刺史梁釗子景進攻殺之景進又自行州事冬十有一月辛亥詔曰大孝榮親著之昔典故安平耄耋諸子滿朝自今諸有父母年八十以上者皆聽居官祿養溫凊朝夕時四方多事諸蠻復反十有二月壬午詔曰高祖以大明定功世宗以下武寧亂聲溢朔南化清中宇業盛隆周祚延七百朕幼齡纂歷夙馭鴻基戰戰兢兢若臨淵谷闇於治道政刑未孚權臣擅命亂我朝式致使西秦跋扈朔漠搆妖蠢爾荊蠻氛埃不息孔熾甚於涇陽出軍切於細柳而師旅盤桓留滯不進北淯懸危南陽告急將虧荊沔之地以致蹙國之憂今茅轂扼腕爪牙歎憤並欲摧挫封豕剿截長蛇使人神兩泰幽明獻吉朕將躬馭六師掃蕩逋穢其配衣六軍分隸熊虎前驅後隊左翼右師必令將帥雄果軍吏明濟糧仗車馬速度時須其有失律亡軍兵戍逃叛盜賊劫掠伏竄山澤者免其往咎錄其後效別立募格聽其自新廣下州郡令赴軍所今先討荊蠻疆理南服戈旗東指掃平淮外然後奮七萃於西戎騰五牛於北狄躬撫亂離之苦面恤饑寒之患爾乃還蹕嵩宇飲至廟庭沉璧河洛告成泰岱豈不盛歟百官內外牧守軍宰宜各肅勤用明爾職山胡劉蠡升反自稱天子置官僚是月以臨淮王彧為征南大將軍率眾討魯陽蠻二年春正月庚戌封廣平王懷庶長子太常少卿誨為范陽王壬子以太保汝南王悅領太尉是月都督元譚次於軍都為洛周所敗五原降戶鮮于脩禮反於定州號魯興元年詔左光祿大夫長孫稚為使持節假驃騎將軍大都督北討諸軍事與都督河間王琛率將討之二月甲申帝皇太后臨大夏門親覽冤訟是月疊伏羅國遣使朝貢三月庚子以驃騎大將軍徐州刺史安豐王延明為儀同三司追復中山王熙本爵子叔仁紹之甲寅西部敕勒斛律洛陽反於桑乾西與河西牧子通連別將爾朱榮擊破之夏四月大赦天下癸巳以侍中車騎大將軍城陽王徽為儀同三司朔州城人鮮于阿胡庫狄豐樂據城反丁未都督李琚次於薊城之北又為洛周所敗琚戰歿戊申以驃騎大將軍開府齊王寶夤為儀同三司北討都督河間王琛長孫稚失利奔還詔免琛稚官爵庫莫奚國遣使朝貢五月丁未車駕將北討內外戒嚴前給事黃門侍郎元略自蕭衍還朝封義陽王以丞相高陽王雍為大司馬吏部尚書廣陽王淵為驃騎大將軍儀同三司尋為大都督率都督章武王融北討脩禮戊申燕州刺史崔秉率眾棄城南走中山乙丑以安西將軍光祿大夫宗正珍孫為都督討汾州反胡六月己巳曲赦齊州絳蜀陳雙熾聚眾反自號始建王曲赦平陽建興正平三郡詔假鎮西將軍都督長孫稚討雙熾平之丙子義陽王略改封東平王衛大將軍西道都督元恒芝為車騎大將軍儀同三司戊寅詔復京兆王繼本封江陽王戊子詔曰自運屬艱棘歷載於茲烽驛交馳旌鼓不息祖宗盛業危若綴旒社稷鴻基殆將淪墜朕威德不能遐被經略無以及遠俾令蒼生罹此塗炭何以苟安黃屋無愧黔黎今便避居正殿蔬餐素服當親自招募收集忠勇其有直言正諫之士敢決徇義之夫二十五日悉集華林東門人別引見共論得失班告內外咸使聞知乙未以衛將軍東平王略為左光祿大夫儀同三司秋七月丙午杜洛周遣其別帥曹紇真寇掠幽州行臺常景遣都督于榮邀于粟園大破之斬紇真獲三十餘級牛驢二萬餘頭戊申恒州陷行臺元纂奔冀州甲子蕭衍將元樹湛僧珍等寇壽春八月丙子進封廣川縣開國公元昭為常山王以驃騎大將軍東道行臺臨淮王彧為儀同三司戊寅帝幸南石窟寺即日還宮戊子進散騎常侍御史中尉武城縣開國公子攸為長樂王都督伊盆生討巴失利戰歿癸巳賊帥元洪業斬鮮于修禮請降為賊黨葛榮所殺都督爾朱榮於肆州執刺史尉慶賓令其從叔羽生統州事九月辛亥葛榮敗都督廣陽王淵章武王融於博野白牛邏融歿於陣榮自稱天子號曰齊國年稱廣安甲申常景又破洛周斬其武川王賀拔文興別帥侯莫陳升生擒男女四百口牛驢五千餘頭就德興攻陷平州殺刺史王買奴是月莫折天生請降蕭寶夤使行臺左丞崔士和入據秦州天生復叛送士和於胡琛殺之冬十有一月戊戌杜洛周攻陷幽州執刺史王延年及行臺常景丙午稅京師田租畝五升借賃公田者畝一斗閏月稅市人出入者各一錢店舍為五等齊州平原民劉樹劉蒼生聚眾反州軍破走之劉樹奔蕭衍衍將元樹逼壽春揚州刺史李憲力屈以城降之初留州郡縣及長史司馬戍主副質子於京師衍又遣將攻逼新野詔都督魏承祖討之詔曰頃舊京淪覆中原喪亂宗室子女屬籍在七廟之內為雜戶濫門所拘辱者悉聽離絕三年春正月甲戌以司空公皇甫度為司徒儀同三司蕭寶夤為司空車騎將軍北海王顥為車騎大將軍儀同三司徐州民任道棱聚眾反襲據蕭城以叛州軍討平之辛巳葛榮陷殷州刺史崔楷固節死之遂東圍冀州甲申詔峻鑄錢之制蕭寶夤元恒芝大敗于涇州大隴都督南平王仲冏小隴都督高聿並相尋退散東秦州刺史潘義淵以汧城降賊高平虜賊逼岐州城人執刺史魏蘭根以城應之豳州刺史畢祖暉行臺羊深並奔退祖暉於陣歿北海王顥尋亦敗走賊帥胡引祖據北華州以應之賊帥叱干騏麟入據豳州曲赦關西及正平平陽建興戊子以司徒皇甫度為太尉己丑以四方未平詔內外戒嚴將親出討辛卯蕭衍將湛僧珍圍東豫州詔散騎常侍元暐為都督以討之是月衍又遣將彭群王辯等率眾數萬逼琅邪詔青州南青二州討之二月丁酉詔曰關隴遭罹寇難燕趙賊逆憑陵蒼生波流耕農靡業加諸轉運勞役已甚州倉儲實無宜懸匱自非開輸賞之格何以息漕運之煩凡有能輸粟入瀛定岐雍四州者官斗二百斛賞一階入二華州者五百石賞一階不限多少粟畢授官虜賊據潼關丁未追復故東平王匡爵改封濟南王庚申東郡民趙顯德反殺太守裴煙自號都督立其兄子為太守詔都督李叔仁討之是月蕭衍將成景俊寇彭城詔員外常侍崔孝芬為行臺率將擊走之三月甲子詔將西討中外戒嚴虜賊走復潼關戊辰詔將回駕北討詔金紫光祿大夫源子邕為大都督討葛榮辛未齊州廣川民劉鈞執清河太守邵懷聚眾反自署大行臺清河民房須自署大都督屯據昌國城夏四月別將元斌之討東郡斬顯德己酉蠕蠕國遣使朝貢六月蠕蠕國遣使朝貢是月詔都督李叔仁討劉鈞平之秋七月陳郡民劉獲鄭辯反於西華號年天授州軍討平之相州刺史安樂王鑒據州反己丑大赦天下是月青州刺史彭城王劭南青州刺史胡平遣將斬蕭衍將彭群首俘獲二千餘人八月都督源子邕李軌裴衍攻鄴丁未斬鑒相州平仍令子邕等討葛榮九月辛卯東豫州刺史元慶和以城南叛戊子蠕蠕國遣使朝貢秦州城民杜粲殺莫折念生自行州事南秦州城民辛琛自行州事遣使歸罪冬十月戊申曲赦恒農巴西河北正平平陽邵郡及關西諸州辛亥以衛將軍討虜大都督爾朱榮為車騎將軍儀同三司甲寅雍州刺史蕭寶夤據州反自號曰齊年稱隆緒詔尚書右僕射長孫稚討之十有一月己丑葛榮攻陷冀州執刺史元孚逐出居民凍死者十六七十有二月戊申都督源子邕裴衍與葛榮戰敗於陽平東北漳水曲並戰歿是月杜粲為駱超所殺超遣使歸罪武泰元年春正月癸亥以北海王顥為驃騎大將軍開府儀同三司相州刺史乙丑定州為杜洛周所陷執刺史楊津瀛州刺史元寧以城降於洛周皇女生祕言皇子丙寅大赦改元丙子長孫稚平潼關丁丑雍州城人侯終德相率攻寶夤寶夤攜南陽公主及子與百餘騎渡渭而走雍州平二月以長孫稚為車騎大將軍開府儀同三司雍州刺史兼尚書僕射西道行臺群盜燒劫鞏縣以西關口以東公路澗以南詔武衛將軍李神軌為都督討平之癸丑帝崩於顯陽殿時年十九甲寅皇子即位大赦天下皇太后詔曰皇家握歷受圖年將二百祖宗累聖社稷載安高祖以文思先天世宗以下武經世股肱惟良元首穆穆及大行在御重以寬仁奉養率由溫明恭順朕以寡昧親臨萬國識謝塗山德慚文母屬妖逆遞興四郊多故實望穹靈降祐麟趾眾繁自潘充華有孕椒宮冀誕儲兩而熊羆無兆維虺遂彰于時直以國步未康假稱統胤欲以底定物情係仰宸極何圖一旦弓劍莫追國道中微大行絕祀皇曾孫故臨洮王寶暉世子釗體自高祖天表卓異大行平日養愛特深義齊若子事符當璧及翊日弗愈大漸彌留乃延入青蒲受命玉几暨陳衣在庭登策靡及允膺大寶即日踐阼朕是用惶懼忸怩心焉靡洎今喪君有君宗祏惟固宜崇賞卿士爰及百辟凡厥在位並加陟敘內外百官文武督將征人遭艱解府普加軍功二階其禁衛武官直閤以下直從以上及主帥可軍功三階其亡官失爵聽復封位謀反大逆削除者不在斯限清議禁錮亦悉蠲除若二品以上不能自受者任授兒弟可班宣遠邇咸使知之乙卯幼主即位儀同三司大都督爾朱榮抗表請入奔赴勒兵而南是月杜洛周為葛榮所并三月癸未葛榮攻陷滄州執刺史薛慶之居民死者十八九甲申上尊諡曰孝明皇帝乙酉葬於定陵廟號肅宗夏四月戊戌爾朱榮濟河庚子皇太后幼主崩史臣曰魏自宣武已後政綱不張肅宗沖齡統業靈后婦人專制委用非人賞罰乖舛於是釁起四方禍延畿甸卒於享國不長抑亦淪胥之始也嗚呼
