body:
  text: 魏書卷五十二齊魏收撰列傳第四十趙逸胡方囬胡叟宋繇張湛宗欽叚承根闞駰劉昞趙柔索敞隂仲達趙逸字思羣天水人也十世祖融漢光祿大夫父昌石勒黄門郎逸好學夙成仕姚興歴中書侍郎為興將齊難軍司征赫連屈丐難敗為屈丐所虜拜著作郎世祖平統萬見逸所著曰此豎無道安得為此言乎作者誰也其速推之司徒崔浩進曰彼之謬述亦猶子雲之羙新皇王之道固宜容之世祖乃止拜中書侍郎神䴥二年三月上已帝幸白虎殿命百寮賦詩逸製詩序時稱為善久之拜寧朔將軍赤城鎮將綏和荒服十有餘年百姓安之頻表乞免久乃見許性好墳典白首彌勤年踰七十手不釋卷凡所著述詩賦銘頌五十餘篇逸兄温字思恭博學有髙名姚泓天水太守劉裕滅泓遂没於氐氐王楊盛盛子難當既有漢中以溫為輔國將軍秦梁二州刺史及難當稱蕃世祖以溫為難當府司馬卒于仇池長子廣夏中書博士第三子琰語在孝感傳初姚萇以逸伯父遷為尚書左僕射卒于長安劉裕滅姚泓徙遷子孫於建業遷𤣥孫翼翼從子超宗令勝遐叔隆穆等太和景明中相尋歸降翼粗涉書傳通率有器藝初為平昌太守甚有治稱入歴軍校加鎮逺將軍長史深為領軍元义所知待遷光祿大夫卒贈左將軍齊州刺史超宗身長八尺頗有將略太和末為豫州平南府長史帶汝南太守加建威將軍賜爵尋陽伯入為驍騎將軍超宗在汝南多所受納貨賂太傅北海王詳詳言之於世宗除持節征虜將軍岐州刺史徙河東太守卒官超宗在河東更自修厲清靖愛民百姓追思之贈本將軍華州刺史諡曰成伯子懿襲爵歴員外常侍尚書郎超宗弟令勝亦長八尺疎狂有膂力歴河北恒農二郡太守並坐貪暴為御史所弹遇赦免神龜末自後將軍太中大夫出為恒農太守卒官令勝寵惑妾潘離棄其妻羊氏夫妻相訟迭發隂私醜穢之事彰於朝野遐初為軍主從髙祖征南陽景眀初為梁城戍主被蕭衍將攻圍以固守及戰功封牟平縣開國子食邑二百户後以左軍將軍假征虜將軍督巴東諸軍事鎮南鄭時蕭衍冠軍將軍軍主姜脩衆二萬屯羊口輔國將軍姜白龍據南城龍驤將軍泉建率土民北入桑坯姜脩又分軍據興勢龍驤將軍譚思文據夾石司州刺史王僧炳頓南安並扇動夷獠規翻南鄭遐率甲士九千所在衝擊數百里中莫不摧靡前後斬首五千餘級還以輔國將軍出為滎陽太守時蕭衍將馬仙琕率衆攻圍朐城戌主傅文驥嬰城固守以遐持節假平東將軍為别將與劉思祖等救之次於鮑口去朐城五十里夏雨頻降厲渉長驅將至朐城仙琕見遐營壘未就逕來逆戰思祖率彭沛之衆望陳奔退遐孤軍奮擊獨破仙琕斬其直閤將軍軍主李魯生直後軍主葛景羽等仙琕先分軍於朐城之西阻水列柵以圍固城遐身自潛行觀水深淺結草為筏銜枚夜進破其六柵遂解固城之圍進救朐城都督盧昶率大軍繼之未㡬而文驥力竭以城降賊衆軍大崩昶棄其節𫝊輕騎而走惟遐獨握節而還時仲冬寒盛兵士凍死者朐山至於郯城二百里間僵尸相屬昶儀衛失盡於郯城借假節以為軍威遐坐失利免官延昌中起為光禄大夫使持節假前將軍為别將防捍西荆又為别將𨽻蕭寶夤東征淮堰熙平初出為平西將軍汾州刺史在州貪濁聞於逺近卒贈安南將軍豫州刺史諡曰襄子子獻襲爵子獻第四弟子素司空長流叅軍叔隆步兵校尉永平初同懸瓠城民白早生之逆鎮南邢蠻平豫州獲而宥之後以貨自通得為秦州闕西府長史加鎮逺將軍秦州殷富去京懸逺叔隆與敕使元脩義同心聚歛納貨巨萬拜冠軍將軍中散大夫尋遷左軍將軍太中大夫賂司空劉騰出為中山内史在郡無徳政專以貨賄為事叔隆姦詐無行忘背恩義懸瓠之免是其族人前軍將軍趙文相之力後無報徳之意更與文相斷絶文相長者不以為恨及文相為汝南内史猶經紀其家後文相卒叔隆了不恤其子弟時論賤薄之穆善書記有刀筆之用為汾州平西府司馬翼臨亡以穆託領軍元义以穆為汝南刺史胡方回安定臨涇人父義周姚泓黄門侍郎方回赫連屈丐中書侍郎渉獵史籍辭彩可觀為屈丐統萬城銘虵祠碑諸文頗行於世世祖破赫連昌方回入國雅有才尚未為時所知也後為北鎮司馬為鎮修表有所稱慶世祖覽之嗟羙問誰所作既知方回召為中書博士賜爵臨涇子遷侍郎與太子少傅游雅等改定律制司徒崔浩及當時朝賢並愛重之清貧守道以夀終子始昌亦長者有父風歴位南部主書子醜孫中書學生祕書郎中散世不治産業家甚貧約兄弟並早亡胡叟字倫許安定臨涇人也世有冠冕為西夏著姓叟少聰敏年十三辨疑釋理知名鄉國其意之所悟與成人交論尠有屈焉學不師受友人勸之叟曰先聖之言精義入神者其唯易乎猶謂可思而過半末世腐儒粗别剛柔之位寧有探頥未兆者哉就道之義非在今矣及披讀羣籍再閲於目皆誦於口好屬文既善為典雅之詞又工為鄙俗之句以姚政將衰遂入長安觀風化隐匿名行懼人見知時京兆韋祖思少閲典墳多蔑時輩知叟至召而見之祖思習常待叟不足叟聊與叙溫涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡久矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八矣其述前載無違舊羙敘中世有協時事而末及鄙黷人皆奇其才畏其筆世猶傳誦之以為笑狎叟孤飄坎􅇄未有仕路遂入漢中劉義隆梁秦二州刺史馮翊吉翰以叟才士頗相禮接授叟末佐不稱其懐未㡬翰遷益州叟隨入蜀多為豪㒞所尚時蜀沙門法成鳩率僧旅㡬于千人鑄丈六金像劉義隆惡其聚衆將加大辟叟聞之即赴丹陽啟申其羙遂得免焉復還於蜀法成感之遺其珍物價直千餘匹叟謂法成曰緯蕭何人能棄明珠吾為徳請財何為也一無所受在益土五六載北至楊難當乃西入沮渠牧犍遇之不重叟亦本無附之之誠乃為詩示所知廣平程伯達其略曰羣犬吠新客佞闇排疎賔直途既以塞曲路非所遵望衛惋祝鮀眄楚悼靈均何用宣憂懐託翰寄輔仁伯達見詩謂叟曰凉州雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝鮀之有也叟曰古人有言君子聞鞞鼓之聲則思戰争之士貴主奉正朔而弗淳慕仁義而未允地陋僻而僭徽號居小事大寧若兹乎徐偃之轍故不旋踵矣吾之擇木夙在大魏與子暫違非久濶也嵗餘牧犍破降叟既先歸國朝廷以其識機拜虎威將軍賜爵始復男家於密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所栖謝其髙矣後叟被徴至謝恩并獻詩一篇髙宗時召叟及舒並使作檄劉駿蠕蠕文舒文劣於叟舒尋歸家叟不治産業常苦飢貧然不以為恥養子字螟蛉以自給養每至貴勝之門恒乗一牸牛敝韋袴褶而已作布囊容三四斗飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華者視之蔑如也尚書李敷嘗遺之以財都無所取初叟一見髙允曰吳鄭之交以紵縞為羙談吾之於子以弦韋為幽贄以此言之彼可無愧也於允館見中書侍郎趙郡李璨璨被服華靡叟貧老衣褐璨頗忽之叟謂之曰老子今若相許脱體上袴褶衣帽君欲作何計也譏其惟假盛服璨􅅥然失色叟少孤每言及父母則淚下若孺子之號春秋當祭之前則先求旨酒美膳將具所知廣寗常順陽馮翊田文宗上谷侯法儶擕壺執榼至郭外空静處設坐奠拜盡孝思之敬時敦煌汜潛家善釀酒每節送一壺與叟著作佐郎博陵許赤虎河東裴定宗等謂潛曰再三之恵以為過厚子恵於叟何其恒也潛曰我恒給祭者以其恒於孝思也論者以潜為君子矣順陽等數子禀叟奬示頗渉文流髙閭曽造其家值叟短褐曵柴從田歸舍為閭設濁酒䔫食皆手自辦集其館宇卑陋園疇褊局而飯菜精潔醯醬調羙見其二妾並年衰跛𦕈衣布穿敝閭見其貧約以物直十餘匹贈之亦無辭愧閭作宣命賦叟為之序密雲左右皆祗仰其徳嵗時奉以麻布榖麥叟隨分散之家無餘財年八十而卒叟元妻敦煌宋氏先亡無子後庶養者亦皆早夭竟以絶後叟死無有家人營主凶事胡始昌迎而殯之于家𦵏於墓次即令一弟繼之襲其爵始復男虎威將軍叟與始昌雖為宗室而性氣殊詭不相好附於其存也往來乃簡及亡而收恤至厚議者以為非必敦哀疎宗或緣求利品秩也宋繇字體業敦煌人也曽祖配祖悌世仕張軌子孫父僚張𤣥靚龍驤將軍武興太守繇生而僚為張邕所誅五嵗䘮母事伯母張氏以孝聞八嵗而張氏卒居䘮過禮繇少而有志尚喟然謂妹夫張彦曰門戸傾覆負荷在繇不銜膽自厲何以繼承先業遂隨彦至酒泉追師就學閉室誦書晝夜不倦博通經史諸子羣言靡不覽綜吕光時舉秀才除郎中後奔叚業業拜繇中散常侍繇以業無經濟逺略西奔李暠歴位通顯家無餘財雅好儒學雖在兵難之間講誦不廢每聞儒士在門常倒屣出迎停寝政事引談經籍尤眀斷决時事亦無滯也沮渠蒙遜平酒泉於繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜剋李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任蒙遜之將死也以子牧犍委託之牧犍以繇為左丞送其妹興平公主於京師世祖拜繇為河西王右丞相賜爵清水公加安逺將軍世祖并凉州從牧犍至京師卒諡曰恭長子巖襲爵改為西平侯巖子蔭中書議郎樂安王範從事中郎卒贈輔國將軍咸陽太守子超尚書度支郎超弟稚字季預師事安邑李紹伯受諸經傳性清嚴治家如官府太和中拜司徒屬又以例降除西中府户曹參軍轉并州城陽王鸞城局參軍景明二年拜白水縣令在縣十一年頗得民和遷青州渤海太守正光三年卒子遊道武定末太尉長史張湛字子然一字仲元敦煌人魏執金吾恭九世孫也湛弱冠知名凉土好學能屬文冲素有大志仕沮渠蒙遜黄門侍郎兵部尚書凉州平入國年五十餘矣賜爵南浦男加寧逺將軍司徒崔浩識而禮之浩注易敘曰國家西平河右敦煌張湛金城宗欽武威叚承根三人皆儒者並有儁才見稱於西州每與余論易余以左氏傳卦解之遂相勸為注故因退朝之餘暇而為之解焉其見稱如此湛至京師家貧不粒操尚無虧浩常給其衣食每嵗贈浩詩頌浩常報答及浩被誅湛懼悉燒之兄懐義閑粹有才幹遭母憂哀毁過人服制雖除而䔫糲弗改卒于征西參軍長子廣平髙平令宗欽字景若金城人也父夑字文友吕光太常卿欽少而好學有儒者之風博綜羣言聲著河右仕沮渠蒙遜為中書郎世子洗馬欽上東宫侍臣箴曰恢恢𤣥古悠悠生民五才迭用經叙彛倫匡父維子弼君伊臣顛而能扶屈而能申昔在上聖妙鑒厥趣不曰我明而乖其度不曰我新而忽其故如彼在泉臨深是懼如彼覆車望途改歩是以令問宣流英風逺布及於三季道喪純遷桀起瓊臺紂醊糟山周滅妖姒羿䘮以田險詖蔽其耳目鄭衛陳於其前怙才肆虐異端是纒豈伊害身厥𦙍殱焉茫茫禹跡畫為九區昆蟲鳥獸各有巢居雲歌唐后垂横羙虞疎綱改祝殷道攸敷龍盤應徳隋地銜珠勿謂無心識命不殊勿謂理絶千載同符爰在子桓靈數攸臻儀形徐阮左右劉陳披文採友叩典問津用能重離襲曜魏鼎維新於昭儲后運應𤣥籙夕惕乾乾虚衿逺屬外撫幽荒内懐焭獨猶懼思不逮逺明不遐燭君有諍臣庭立謗木本枝克昌永符天禄微臣作箴敢告在僕世祖平凉州入國賜爵臥樹男加鷹揚將軍拜著作郎欽與髙允書曰昔皇綱未振華裔殊風九服分隔金蘭莫遂希懐寄契延想積久天遂其願爰遘京師才非季札而眷深孫喬徳乖程子而義均傾盖曠齡罕遇㑹之一朝比公私理異訓諮路塞端拱蓬宇歎慨如何不量鄙拙貢詩數韻若夫泉江相忘之談遺言存意之羙雖莊生之所尚非淺識所宜循愛敬既深情期往返思遲徳意以祛鄙吝若能紆鳯彩以燿榛薈廻連城以映瓦礫者是所望也詩曰嵬峩恒嶺滉瀁滄溟山挺其和水燿其精啟兹令族應期誕生華冠衆彦偉邁羣英其一於穆吾子含貞藉茂如彼松竹陵霜擢秀味老思冲翫易體復戢翼九臯聲溢宇宙其二我皇龍興重離疊映剛徳外彰柔明内鏡乾象奄氣坤厚山競風無殊音俗無異徑其三經緯曰文著述曰史斟酌九流錯綜幽㫖帝用詶諮明發虚擬廣闢四門披延髦士其四爾應其求翰飛東觀口吐瓊音手揮霄翰弹毫珠零落紙錦粲墳無疑割典無滯泮其五山降則謙含柔為信林崇日漸明升斯進有邈夫子兼兹四慎弱而難勝通而不峻其六南董邈矣史功不申固傾佞竇雄穢羙新遷以陵腐邕由卓泯時無逸勒路盈摧輪其七尹佚謨周孔明述魯抑揚羣致憲章三五昻昻髙生纂我遐武勿謂古今建規易矩其八自昔索居沉淪西藩風馬既殊標榜莫緣開通有運闇遇當年披衿暫面定交一言其九諮疑祕省訪滯京都水鏡叔度洗吝田蘇望儀神婉即象心虚悟言禮樂採研詩書其十履霜悼遷撫節感變嗟我年邁迅踰激電進乏由賜退非回憲素髪掩𤣥枯顔落蒨其十一文以㑹友友由知已詩以明言言以通理盻坎迷流覿良闇止伊爾虬光四鱗曲水其十二允答書曰頃因行李承足下髙問延佇之勞為日久矣王途一啟得叙其懐欣於相遇情無有已足下兼愛為心每能存顧養之以風味恵之以徳音執翫反覆銘於心抱吾少之尋常之操長無老成之致憑頼賢勝以自克勉而來喻襃飾有過其分既承雅贈即應有答但唱髙則難和理深則難詶所以留連日月以至於今今往詩一扃誠不足標明來㫖且表以心幸恕其鄙滯領其至意詩曰湯湯流漢藹藹南都載稱多士載耀靈珠邈矣髙族世記丹圖啟基郢城振彩凉區其一吾生朗到誕發英風紹熈前緒奕世克隆方圓備體淑徳斯融望傾羣儁響駭華戎其二響駭伊何金聲允著匡贊西藩拯厥時務肅志琴書恬心初素潛思淵渟秀藻雲布其三上天降命祚鍾有代協燿紫宸與乾作配仁邁春陽功隆覆載招延隐叟永貽大賚其四伊余櫟散才至庸㣲遭緣幸㑹忝與樞機竊名華省厠足丹墀愧無螢燭少益天暉其五明升非諭信漸難兼體卑處下豈曰能謙進不𢎞道退失淵潛既慙朱闕亦愧閭閻其六史班稱逹楊蔡致深負荷典䇿載蹈於心四轍同軌覆車相尋敬承嘉誨永佩明箴其七逺思古賢内尋諸已仰謝丘明長揖南史遐武雖存髙蹤難擬夙興夕惕豈獲恬止其八世之圯矣靈運未通風馬殊隔區域異封有懐西望路險莫從王澤逺灑九服來同其九在昔平吴二陸稱寳今也尅凉吾生獨矯道映儒林義為羣表我思與之均於紵縞其十仁乏田蘇量非叔度韓生屬降林宗仍顧千載曠遊遘兹一遇藻詠風流鄙心已悟其十一年時迅邁物我俱逝任之斯通擁之則滯結駟貽塵屢空亦敝兩間可守安有回賜其十二詩以言志志以表丹慨哉刎頸義已中殘雖曰不敏請事金蘭爾其勵之無忘嵗寒崔浩之誅也欽亦賜死欽在河西撰蒙遜記十卷無足可稱弟舒字景太䝉遜庫部郎中與兄同歸國賜爵句町男加威逺將軍名亞於兄子孫皆衰替叚承根武威姑臧人自云漢太尉熲九世孫也父暉字長祚身長八尺餘師事歐陽湯湯甚器愛之有一童子與暉同志後二年童子辭歸從暉請馬暉戲作木馬與之童子甚悦謝暉曰吾太山府君子奉勑遊學今將欲歸煩子厚贈無以報徳子後位至常伯封侯非報也且以為好言終乘木馬騰空而去暉乃自知必將貴也乞伏熾磐以暉為輔國大將軍凉州刺史御史大夫西海侯磐子暮末襲位國政衰亂暉父子奔吐谷渾暮璝暮璝内附暉與承根歸國世祖素聞其名頗重之以為上客後暉従世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市曝尸數日時有儒生京兆林白奴欽暉徳音夜竊其尸置之枯井女為敦煌張氏婦久而聞之乃向長安收𦵏承根好學機辯有文思而性行疎薄有始無終司徒崔浩見而竒之以為才堪注述言之世祖請為著作郎引與同事世咸重其文而薄其行甚為敦煌公李寳所敬待承根贈寳詩曰世道衰陵淳風殆緬衢交問鼎路盈訪瓕狥競爭馳天機莫踐不有真宰榛棘誰揃其一於皇我后重明襲煥文以息煩武以静亂剖蜯求珍搜巖采幹野無投綸朝盈逸翰其二自昔凉季林焚淵涸矯矯公子鱗羽靡託靈慧雖奮袄氛未廓鳯戢崐丘龍潛𤣥漠其三數不常擾艱極則夷奮翼幽裔翰飛京師珥蝉紫闥杖節方畿弼我王度庶績緝熈其四自余幽淪眷參舊契庶庇餘光優游卒嵗忻路未淹離轡已際顧難分岐載張載繼其五聞諸交舊累聖疊曜淳源雖漓民懐餘劭思樂哲人静以鎮躁藹彼繁音和此清調其六詢下曰文辨訐曰明化由禮治政以寛成勉崇仁敎播徳簡刑傾首景風遲聞休聲其七浩誅承根與宗欽等俱死承根外孫長水校尉南陽張令言羙鬚髯言談舉止有異武人李琰之李神儁一時名士並稱羙之闞駰字元隂敦煌人也祖倞有名於西土父玖為一時秀士官至㑹稽令駰博通經傳聰敏過人三史羣言經目則誦時人謂之宿讀注王朗易傳學者藉以通經撰十三州志行於世䝉遜甚重之常侍左右訪以政治損益拜秘書考課郎中給文吏三十人典校經籍刋定諸子三千餘卷加奉車都尉牧犍待之彌重拜大行遷尚書姑臧平樂平王丕鎮凉州引為從事中郎王薨之後還京師家甚貧敝不免飢寒性能多食一飯至三升乃飽卒無後劉昞字延明敦煌人也父寶字子玉以儒學稱昞年十四就博士郭瑀學時瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心於昞遂别設一席於坐前謂諸弟子曰吾有一女年向成長欲覔一快女壻誰坐此席者吾當婚焉昞遂奮衣來坐神志肅然曰向聞先生欲求快女壻昞其人也瑀遂以女妻之昞後隐居酒泉不應州郡之命弟子受業者五百餘人李暠私署徴為儒林祭酒從事中郎暠好尚文典書史穿落者親自補治昞時侍側前請代暠暠曰躬自執者欲人重此典籍吾與卿相值何異孔明之㑹元徳遷撫夷護軍雖有政務手不釋卷暠曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將至孔聖稱焉昞何人斯敢不如此昞以三史文繁著略記百三十篇八十四卷凉書十卷敦煌實録二十卷方言三卷靖恭堂銘一卷注周易韓子人物志黄石公三略並行於世䝉遜平酒泉拜祕書郎専管注記築陸沉觀於西苑躬往禮焉號元處先生學徒數百月致羊酒牧犍尊為國師親自致拜命官屬以下皆北面受業焉時同郡索敞隂興為助敎並以文學見舉每巾衣而入世祖平凉州士民東遷夙聞其名拜樂平王從事中郎世祖詔諸年七十以上聽留本鄉一子扶養昞時老矣在姑臧嵗餘思鄉而返至凉州西四百里韭本或作悲亦作匪谷窟遇疾而卒昞六子長子僧衍早亡次仲禮留鄉里次字仲次貳歸少歸仁並遷代京後分屬諸州為城民歸仁有二子長買奴次顯宗太和十四年尚書李冲奏昞河右碩儒今子孫沉屈未有禄潤賢者子孫宜䝉顯異於是除其一子為郢州雲陽令正光三年太保崔光奏曰臣聞太上立徳其次立功立言死而不朽前哲所尚思人愛樹自古稱羙故樂平王從事中郎敦煌劉昞著業凉城遺文兹在篇籍之羙頗足可觀如或愆釁當䝉數世之宥况乃維祖逮孫相去未逺而令久淪皂𨽻不獲收異儒學之士所為竊歎臣忝職史敢冐以聞奏乞敕尚書推檢所屬甄免碎役用廣聖朝旌善繼絶敦化厲俗於是乎在四年六月詔曰昞徳冠前世蔚為儒宗太保啟陳深合勸善其孫等三家特可聼免河西人以為榮趙柔字元順金城人也少以徳行才學知名河右沮渠牧犍時為金部郎世祖平凉州内徙京師髙宗踐祚拜為著作郎後以歴効有績出為河内太守甚著仁恵柔嘗在路得人所遺金珠一貫價直數百縑柔呼主還之後有人與柔鏵數百枚者柔與子善明鬻之於市有從柔買索絹二十匹有商人知其賤與柔三十匹善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之搢紳之流聞而敬服焉其推誠秉信皆此類也隴西王源賀採佛經幽㫖作祗洹精舍圖偈六卷柔為之注解咸得理衷為當時儁僧所欽味焉又憑立銘讚頗行于世子黙字冲明武威太守索敞字巨振敦煌人為劉昞助敎専心經籍盡能傳昞之業凉州平入國以儒學見拔為中書博士篤勤訓授肅而有禮京師大族貴遊之子皆敬憚威嚴多所成益前後顯逹位至尚書牧守者數十人皆授業於敞敞遂講授十餘年敞以喪服散在衆篇遂撰比為䘮服要記其名字論文多不載後出補扶風太守在位清貧未㡬卒官時舊同學生等為請詔贈平南將軍凉州刺史諡曰獻敞子僧養中書議郎京兆太守僧養子演貴征東府參軍演貴子懐真字公道武定末侍御史初敞在州之日與鄉人陰世隆文才相友世隆至京師被罪徙和龍屆上谷困不前逹土人徐能抑掠為奴五年敞因行至上谷遇見世隆語其由状對泣而别敞為訴理得免世隆子孟貴性至孝每向田耘耨早朝拜父來亦如之鄉人欽其篤於事親隂仲逹武威姑臧人祖訓字處道仕李暠為武威太守父華字季文姑臧令仲逹少以文學知名世祖平凉州内徙代都司徒崔浩啟仲逹與叚承根云二人俱凉土才華同修國史除祕書著作即卒華次子周逹徐州平南司馬太山太守周逹子遵和小名虎頭好音律尚武事初為髙祖挽郎拜奉朝請後廣平王懐取為國常侍遵和便辟善事人深為懐所親愛轉司空法曹太尉中兵參軍又為汝南王悦郎中令復被愛信稍遷龍驤將軍驍騎將軍豫州都督鎮懸瓠孝莊末除左將軍行豫州刺史時前行州事元崇禮被徴將還既聞爾朱兆入洛遂矯殺遵和擅攝州任後追贈平南將軍凉州刺史遵和兄子道方性和雅頗渉書傳深為李神儁所知賞神儁為前將軍荆州刺史請道方為其府長流參軍神儁曽使道方詣蕭衍雍州刺史蕭綱論邊事道方風神沉正為綱所稱正光末蕭綱遣其軍主曹義宗等擾動邊蠻神儁令道方馳傳向新野處分軍事於路為土因村蠻所掠送於義宗義宗又傳致襄陽仍送於蕭衍囚之尚方孝昌中始得還國既至拜奉朝請轉員外散騎侍郎孝莊初遷尚書左民郎中修起居注永安二年詔道方與儀曹郎中王元旭使於蕭衍至南兖州有詔追還轉安東將軍光禄大夫領右民郎中太昌初卒年四十二人士咸嗟惜之贈撫軍將軍荆州刺史史臣曰趙逸等皆通渉經史才志不羣價重西州有聞東國故於流播之中拔泥滓之上人之不可以無能信也胡叟顯晦之間優遊無悶亦一世之異人乎魏書卷五十二魏書卷五十二考證宗欽傳宗欽宗監本訛作宋今改正無忘嵗寒詩凡十三章此句下應如前注其十三三字魏書卷五十二考證
