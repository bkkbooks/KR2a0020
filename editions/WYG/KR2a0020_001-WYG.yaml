body:
  text: 魏書卷一齊魏收撰帝紀第一序紀昔黄帝有子二十五人或内列諸華或外分荒服昌意少子受封北土國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳樸為俗簡易為化不為文字刻木紀契而已世事逺近人相傳授如史官之紀録焉黄帝以土徳王北俗謂土為托謂后為跋故以為氏其裔始均入仕堯世逐女魃於弱水之北民賴其勤帝舜嘉之命為田祖爰厯三代以及秦漢獯鬻獫狁山戎匈奴之屬累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七世至成皇帝諱毛立聰明武略逺近所推統國三十六大姓九十九威振北方莫不率服崩節皇帝諱貸立崩莊皇帝諱觀立崩明皇帝諱樓立崩安皇帝諱越立崩宣皇帝諱推寅立南遷大澤方千餘里厥土昬冥沮洳謀更南徙未行而崩景皇帝諱利立崩元皇帝諱俟立崩和皇帝諱肆立崩定皇帝諱機立崩僖皇帝諱蓋立崩威皇帝諱儈立崩獻皇帝諱隣立時有神人言於國曰此土荒遐未足以建都邑宜復徙居帝時年衰老乃以位授子聖武皇帝諱詰汾獻帝命南移山谷高深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引厯年乃出始居匈奴之故地其遷徙策略多出宣獻二帝故人竝號曰推寅蓋俗云鑽研之義初聖武帝嘗率數萬騎田於山澤歘見輜軿自天而下既至見美婦人侍衞甚盛帝異而問之對曰我天女也受命相偶遂同寢宿旦請還曰明年周時復會此處言終而别去如風雨及期帝至先所田處果復相見天女以所生男授帝曰此君之子也善養視之子孫相承當世為帝王語訖而去子即始祖也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩始祖神元皇帝諱力微立生而英叡元年嵗在庚子先是西部内侵國民離散依於没鹿回部大人竇賓始祖有雄傑之度時人莫測後與賓攻西部軍敗失馬歩走始祖使人以所乗駿馬給之賓歸令其部内求與馬之人當加重賞始祖隱而不言久之賓乃知大驚將分國之半以奉始祖始祖不受乃進其愛女賓猶思報恩固問所欲始祖請率所部北居長川賓乃敬從積十數嵗徳化大洽諸舊部民咸來歸附二十九年賓臨终戒其二子使謹奉始祖其子不從乃隂謀為逆始祖召殺之盡并其衆諸部大人悉皆欵服控弦上馬二十餘萬三十九年遷於定襄之盛樂夏四月祭天諸部君長皆來助祭唯白部大人觀望不至於是徴而戮之逺近肅然莫不震懾始祖乃告諸大人曰我厯觀前世匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而其死傷不足相補更招宼讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土魏景元二年也文皇帝諱沙漠汗以國太子留洛陽為魏賓之冠聘問交市往來不絶魏人奉遺金帛繒絮嵗以萬計始祖與隣國交接篤信推誠不為倚伏以要一時之利寛恕任真而遐邇歸仰魏晉禪代和好仍密始祖春秋已邁帝以父老求歸晉武帝具禮䕶送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦􅄢繒綵綿絹諸物咸出豐厚車牛百乘行逹并州晉征北將軍衞瓘以帝為人雄異恐為後患乃密啓晉帝請留不遣晉帝難於失信不許瓘復請以金錦賂國之大人令致間隙使相危害晉帝從之遂留帝於是國之執事及外部大人皆受瓘貨五十八年方遣帝始祖聞帝歸大悅使諸部大人詣隂館迎之酒酣帝仰視飛鳥請諸大人曰我為汝曹取之援彈飛丸應弦而落時國俗無彈衆咸大驚乃相謂曰太子風采被服同於南夏兼竒術絶世若繼國統變易舊俗吾等必不得志不若在國諸子習本淳樸咸以為然且離間素行乃謀危害竝先馳還始祖問曰我子既厯他國進徳何如皆對曰太子才藝非常引空弓而落飛鳥是似得晉人異法怪術亂國害民之兆惟願察之自帝在晉之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人之語意乃有疑因曰不可容者便當除之於是諸大人乃馳詣塞南矯害帝既而始祖甚悔之帝身長八尺英姿瓌偉在晉之日朝士英俊多與親善雅為人物歸仰後乃追諡焉其年始祖不豫烏丸王庫賢親近任勢先受衞瓘之貨故欲沮動諸部因在庭中礪鉞斧諸大人問欲何為答曰上恨汝曹讒殺太子今欲盡收諸大人長子殺之大人皆信各各散走始祖尋崩凡饗國五十八年年一百四嵗太祖即位尊為始祖章皇帝諱悉鹿立始祖之子也諸部離叛國内紛擾饗國九年而崩平皇帝諱綽立章帝之少弟也雄武有智略威徳復舉七年匈奴宇文部大人莫槐為其下所殺更立莫槐弟普撥為大人帝以女妻撥子丘不懃帝饗國七年而崩思皇帝諱弗立文帝之少子也聰哲有大度為諸父兄所重政崇寛簡百姓懷服饗國一年而崩昭皇帝諱禄官立始祖之子也分國為三部帝自以一部居東在上谷北濡源之西東接宇文部以文帝之長子桓皇帝諱猗㐌統一部居代郡之參合陂北以桓帝之弟穆皇帝諱猗盧統一部居定襄之盛樂故城自始祖以來與晉和好百姓乂安財畜富實控弦騎士四十餘萬是嵗穆帝始出并州遷雜胡北徙雲中五原朔方又西渡河擊匈奴烏桓諸部自杏城以北八十里迄長城原夾道立碣與晉分界二年葬文帝及皇后封氏初思帝欲改葬未果而崩至是述成前意焉晉成都王司馬穎遣從事中郎田思河間王司馬顒遣司馬靳利并州刺史司馬騰遣主簿梁天竝來會葬逺近赴者二十萬人三年桓帝度漠北巡因西略諸國四年東部未耐婁大人倍斤入居遼東五年宇文莫廆之子遜昵延朝貢帝嘉其誠欵以長女妻焉七年桓帝至自西略諸降附者二十餘國凡積五嵗今始東還十年晉惠帝為成都王穎逼留在鄴匈奴别種劉淵反於離石自號漢王并州刺史司馬騰來乞師桓帝率十餘萬騎帝亦同時大舉以助之大破淵衆於西河上黨會惠帝還洛騰乃辭師桓帝與騰盟於汾東而還乃使輔相衞雄段繁於參合陂西累石為亭樹碑以記行焉十一年劉淵攻司馬騰騰復乞師桓帝以輕騎數千救之斬淵將綦毋腞淵南走蒲子晉假桓帝大單于金印紫綬是嵗桓帝崩帝英傑魁岸馬不能勝常乘安車駕大牛牛角容一石帝曾中蠱嘔吐之地仍生榆木參合陂土無榆樹故世人異之至今傳記帝統部凡十一年後定襄侯衛操樹碑於大䢴城以頌功徳子普根代立十二年賨人李雄僭帝號於蜀自稱大成十三年昭帝崩徒何大單于慕容廆遣使朝貢是嵗羯胡石勒與晉馬牧帥汲桑反穆皇帝天姿英特勇略過人昭帝崩後遂總攝三部以為一統元年劉淵僭帝號自稱大漢三年晉并州刺史劉琨遣使以子遵為質帝嘉其意厚報饋之白部大人叛入西河鐵弗劉虎舉衆於鴈門以應之攻琨新興鴈門二郡琨來乞師帝使弟子平文皇帝將騎二萬助琨擊之大破白部次攻劉虎屠其營落虎收其餘燼西走度河竄居朔方晉懷帝進帝大單于封代公帝以封邑去國懸逺民不相接乃從琨求句注陘北之地琨自以託附聞之大喜乃徙馬邑隂館樓煩繁畤崞五縣之民於陘南更立城邑盡獻其地東接代郡西連西河朔方方數百里帝乃徙十萬家以充之劉琨又遣使乞師救洛陽帝遣歩騎二萬助之晉太傅東海王司馬越辭以洛中饑饉師乃還是年劉淵死子聰僭立四年劉琨牙門將邪延據新興叛招引劉聰帝遣軍討之聰退走五年劉琨遣使乞師以討劉聰石勒帝以琨忠義矜而許之會聰遣其子粲襲晉陽害琨父母而據其城琨來告難帝大怒遣長子六脩桓帝子普根及衞雄范班姬澹等為前鋒帝躬統大衆二十萬為後繼粲懼焚輜重突圍遁走縱騎追之斬其將劉儒劉豐簡令張平邢延伏尸數百里琨來拜謝帝以禮待之琨固請進軍帝曰吾不早來致卿父母見害誠以相愧今卿已復州境然吾逺來士馬疲弊且待終舉賊矣可盡乎饋琨馬牛羊各千餘車令百乘又面動鋭戍之而還是年晉雍州刺史賈疋京兆太守閻鼎以晉懷帝為劉聰所執共立懷帝兄子秦王業為太子於長安稱行臺帝復戒嚴與琨更剋大舉命琨自列晉行臺部分諸軍帝將遣十萬騎從西河鑒谷南出晉軍從蒲坂東度會於平陽就食聰粟迎復晉帝事不果待六年城盛樂以為北都脩故平城以為南都帝登平城西山觀望地勢乃更南百里於灅水之陽黄𤓰堆築新平城晉人謂之小平城使長子六脩鎮之統領南部七年帝復與劉琨約期會於平陽會石勒擒王浚國有匈奴雜胡萬餘家多勒種類聞勒破幽州乃謀為亂欲以應勒發覺伏誅討聰之計於是中止八年晉愍帝進帝為代王置官屬食代常山二郡帝忿聰勒之亂志欲平之先是國俗寛簡民未知禁至是明刑峻法諸部民多以違命得罪凡後期者皆舉部戮之或有室家相擕而赴死所人問何之答曰當往就誅其威嚴伏物皆此類也九年帝召六脩六脩不至帝怒討之失利乃微服民間遂崩普根先守外境聞難來赴攻六脩滅之衞雄姬澹率晉人及烏丸三百餘家隨劉遵南奔并州普根立月餘而薨普根子始生桓帝后立之其冬普根子又薨是年李雄遣使朝貢平文皇帝諱鬱律立思帝之子也姿質雄壯甚有威略元年嵗在丁丑二年劉虎據朔方來侵西部帝逆擊大破之虎單騎迸走其從弟路孤率部落内附帝以女妻之西兼烏孫故地東吞勿吉以西控弦上馬將有百萬劉聰死子粲僭立為其將靳準所殺淵族子曜僭立帝聞晉愍帝為曜所害顧謂大臣曰今中原無主天其資我乎劉曜遣使請和帝不納是年司馬叡僭稱大位於江南三年石勒自稱趙王遣使乞和請為兄弟帝斬其使以絶之四年私署涼州刺史張茂遣使朝貢五年僭晉司馬叡遣使韓暢加崇爵服帝絶之治兵講武有平南夏之意桓帝后以帝得衆心恐不利於己子害帝遂崩大人死者數十人天興初尊曰太祖惠皇帝諱賀傉立桓帝之中子也以五年為元年未親政事太后臨朝遣使與石勒通和時人謂之女國使二年司馬叡死子紹僭立四年帝始臨朝以諸部人情未悉欵順乃築城於東木根山徙都之是年張茂死兄寔子駿立遣使朝貢五年帝崩是年司馬紹死子衍僭立煬皇帝諱紇那立惠帝之弟也以五年為元年三年石勒遣石虎率騎五千來宼邉部帝禦之於句注陘北不利遷於大寗時烈帝居於舅賀蘭部帝遣使求之賀蘭部帥藹頭擁䕶不遣帝怒召宇文部并勢擊藹頭宇文衆敗帝還大甯四年石勒擒劉曜五年帝出居於宇文部賀蘭及諸部大人共立烈帝烈皇帝諱翳槐立平文之長子也以五年為元年石勒遣使求和帝遣弟昭成皇帝如襄國從者五千餘家二年石勒僭立自稱大趙王五年勒死子大雅僭立慕容廆死子元真代立六年石虎廢大雅僭立李雄死兄子班立雄子期殺班自立七年藹頭不脩臣職召而戮之國人復貳煬帝自宇文部還入諸部大人復奉之煬皇帝復立以七年為後元年烈帝出居於鄴石虎奉第宅伎妾奴婢什物三年石虎遣將李穆率騎五千納烈帝於大寗國人六千餘落叛煬帝煬帝出居於慕容部烈皇帝復立以三年為後元年城新盛樂城在故城東南十里一年而崩昭成皇帝諱什翼犍立平文之次子也生而竒偉寛仁大度喜怒不形于色身長八尺隆準龍顔立髮委地臥則乳垂至席烈帝臨崩顧命曰必迎立什翼犍社稷可安烈帝崩帝弟孤乃自詣鄴奉迎與帝俱還事在孤傳十一月帝即位於繁畤之北時年十九稱建國元年是嵗李雄從弟壽殺期僭立自號曰漢二年春始置百官分掌衆職東自濊貊西及破洛那莫不欵附夏五月朝諸大人於參合陂議欲定都灅源川連日不決乃從太后計而止語在皇后傳娉慕容元真妹為皇后三年春移都於雲中之盛樂宮四年秋九月築盛樂城於故城南八里皇后慕容氏崩冬十月劉虎寇西境帝遣軍逆討大破之虎僅以身免虎死子務桓立始來歸順帝以女妻之十二月慕容元真遣使朝貢并薦其宗女五年夏五月幸參合陂秋七月七日諸部畢集設壇埒講武馳射因以為常八月還雲中是年秋司馬衍死弟岳僭立六年秋八月慕容元真遣使請薦女是年李壽死子勢僭立遣使朝貢七年春二月遣大人長孫秩迎后慕容氏元真之女於境夏六月皇后至自和龍秋七月慕容元真遣使奉聘求交㛰帝許之九月以烈帝女妻之其年司馬岳死子聃僭立八年慕容元真遣使朝貢是年張駿私署假涼王九年石虎遣使朝貢是年張駿死子重華代立十年遣使詣鄴觀釁是年司馬聃擒李勢張重華遣使朝貢十一年慕容元真死子儁代立十二年西廵至河而還是年石虎死子世立世兄遵殺世自立遵兄鑒殺遵自立十三年魏郡人冉閔殺石鑒僭立十四年帝曰石胡衰滅冉閔肆禍中州紛梗莫有匡救吾將親率六軍廓定四海乃勑諸部各率所統以俟大期諸大人諫曰今中州大亂誠宜進取如聞豪彊竝起不可一舉而定若或留連經厯嵗稔恐無永逸之利或有虧損之憂帝乃止是嵗氐苻健僭稱大位自號大秦十五年慕容儁滅冉閔僭尊號十六年慕容儁遣使朝貢是年張重華死子曜靈立重華庶兄祚殺曜靈而自立稱涼公十七年遣使於慕容儁張祚復稱涼王置百官遣使朝貢十八年太后王氏崩是年苻健死子生僭立羌姚襄自稱大將軍大單于張瓘宋混殺張祚立重華少子𤣥靖稱涼王十九年春正月劉務桓死其弟閼頭立潛謀反叛二月帝西廵因而臨河使人招喻閼頭從命冬慕容儁來請㛰許之二十年夏五月慕容儁奉納禮幣是年苻堅殺苻生而僭立姚襄為苻眉所殺二十一年閼頭部民多叛懼而東走渡河半濟而氷陷後衆盡歸閼頭兄子悉勿祈初閼頭之叛悉勿祈兄弟十二人在帝左右盡遣歸欲其自相猜離至是悉勿祈奪其衆閼頭窮而歸命帝待之如初二十二年春帝東廵至於桑乾川三月慕容儁遣使朝貢夏四月帝還雲中悉勿祈死弟衞辰立秋八月衛辰遣子朝貢二十三年夏六月皇后慕容氏崩秋七月衞辰來會𦵏因而求婚許之是嵗慕容儁死子暐立遣使致賻二十四年春衛辰遣使朝聘是年司馬聃死衍子千齡僭立二十五年帝南廵至君子津冬十月行幸代十一月慕容暐薦女備後宮二十六年冬十月帝討高車大破之獲萬口馬牛羊百餘萬頭是年張重華弟天錫殺元靖而自立二十七年春車駕還雲中冬十一月討没歌部破之獲牛馬羊數百萬頭二十八年春正月衛辰謀反東渡河帝討之衞辰懼而遁走冬十二月苻堅遣使朝貢是嵗司馬千齡死弟奕僭立二十九年夏五月遣燕鳳使苻堅三十年冬十月帝征衞辰時河冰未成帝乃以葦絙約澌俄然冰合猶未能堅乃散葦於上冰草相結如浮橋焉衆軍利渉出其不意衛辰與宗族西走收其部落而還俘獲生口及馬牛羊數十萬頭三十一年春帝至自西伐班賞各有差三十二年正月帝南幸君子津冬十月幸代三十三年冬十一月征髙車大破之是年苻堅擒慕容暐三十四年春長孫斤謀反伏誅斤之反也拔刃向御座太子獻明皇帝諱寔格之傷脇夏五月薨後追諡焉秋七月皇孫珪生大赦是年司馬奕臣桓溫廢奕為海西公立叡子昱三十五年司馬昱死子昌明僭立三十六年夏五月遣燕鳳使苻堅三十七年帝征衞辰衞辰南走三十八年衞辰求援於苻堅三十九年苻堅遣其大司馬苻洛率衆二十萬及朱彤張蚝鄧羌等諸道來冦侵逼南境冬十一月白部獨孤部禦之敗績南部大人劉庫仁走雲中帝復遣庫仁率騎十萬逆戰於石子嶺王師不利帝時不豫羣臣莫可任者乃率國人避於隂山之北髙車雜種盡叛四面寇鈔不得芻牧復度漠南堅軍稍退乃還十二月至雲中旬有二日帝崩時年五十七太祖即位尊曰髙祖帝雅性寛厚智勇仁恕時國中少繒帛代人許謙盜絹二匹守者以告帝匿之謂燕鳳曰吾不忍視謙之面卿勿泄言謙或慙而自殺為財辱士非也帝嘗擊西部叛賊流矢中目賊破之後諸大臣執射者各持錐刀欲屠割之帝曰彼各為其主何罪也乃釋之是嵗苻堅滅張天錫史臣曰帝王之興也必有積徳累功博利道協幽顯方契神祇之心有魏奄迹幽方世居君長淳化育民與時無競神元生自天女桓穆勤於晉室靈心人事夫豈徒然昭成以雄傑之姿包君子之量征伐四克威被荒遐乃立號改都恢隆大業终於百六十載光宅區中其原固有由矣魏書卷一魏書卷一考證序紀始均之裔不交南夏是以載籍無聞焉積六十七世至成皇帝諱毛立臣照按北史作六七十代蓋李延夀意謂始均自堯時以迄兩漢豈能確數為六十七世故約略其文耳顧外域傳習舊聞龎固專壹魏收必非無據而定為六十七者不可以彼議此也昭帝紀帝英傑魁㟁北史帝字上有桓字蓋上文稱桓帝率十餘萬騎帝亦同時大舉以助之帝謂昭帝也則此帝字及下帝統部凡十一年句皆指桓帝北史文較明顯徒何大單于慕容廆綱目集覽何作河徒河漢縣名屬平州故城在遼東廣寧中屯衞境北史慕容氏與叚氏俱稱徒河本書或作河或作何前後互異穆帝紀乃從琨求句注陘北之地注監本訛作主句注山名在今代州地本卷帝禦之于句注陘北亦作注今改正然吾逺來士馬疲弊且待终舉賊矣可盡乎臣照按文義疑應作且待终舉矣賊可盡乎終舉猶言後舉也賊可盡乎即左傳盡敵而返敵可盡乎之義盡音儘晉雍州刺史賈疋疋監本訛匹疋即雅字古文也从一从與疋字或作匹者不同今改正昭成帝紀娉慕容元真妹為皇后元真北史作晃又一本娉作聘晉書載記晃字元真今不稱晃蓋避景穆諱也說文娉同聘與娉婷字作平聲者别魏書卷一考證
