body:
  text: 魏書卷七十三齊魏收撰列傳第六十一奚康生楊大眼崔延伯奚康生河南洛陽人其先代人也世為部落大夫祖直平逺将軍柔𤣥鎮将入為鎮北大将軍内外三都大官賜爵長進侯卒贈幽州刺史謚曰簡父普憐不仕而卒太和十一年蠕蠕頻來寇邊柔𤣥鎮都将李兠討擊之康生性驍勇有武藝弓力十石矢異常箭為當時所服從兠為前驅軍主頻戰陷陳壮氣有聞由是為宗子隊主從駕征鍾離駕旋濟淮五将未渡蕭鸞遣将率衆據渚邀斷津路髙祖勅曰能破中渚賊者以為直閤将軍康生時為軍主謂友人曰如其剋也得暢名績脫若不㨗命也在天丈夫今日何為不决遂便應募縛筏積柴因風放火燒其船艦依烟直進飛刀亂斫投河溺死者甚衆乃假康生直閤将軍後以勲除中堅将軍太子三校西臺直後吐京胡反自號辛支王康生為軍主從章武王彬討之胡遣精騎一千邀路斷截康生率五百人拒戰破之追至石羊城斬首三十級彬甲卒七千與胡對戰分為五軍四軍俱敗康生軍獨全遷為統軍率精騎一千追胡至車突谷詐為墜馬胡皆謂死争欲取之康生騰騎奮矛殺傷數十人胡遂奔北辛支輕騎退走去康生百餘歩彎弓射之應弦而死因俘其牛羊駝馬以萬數蕭鸞置義陽招誘邊民康生復為統軍從王肅討之進圍其城鸞将張伏䕶自昇城樓言辭不遜肅令康生射之以彊弓大箭望樓射窻扉開即入應箭而斃彼民見箭皆云狂弩以殺伏護賞帛一千匹又頻戰再退其軍賞三階帛五百匹蕭寳卷将裴叔業率衆圍渦陽欲觧義陽之急詔遣高聰等四軍徃援之後遣都督廣陵侯元衍並皆敗退時刺史孟表頻啟告高祖勅肅遣康生馳徃赴援一戰大破之賞二階帛一千匹及夀春來降也遣康生領羽林一千人給龍廐馬兩匹馳赴夀春既入其城命集城内舊老宣詔撫賚俄而蕭寳卷将桓和頓軍梁城陳伯之據硤石民心駭動頗有異謀康生乃防禦内外音信不通固城一月援軍乃至康生出擊桓和伯之等二軍並破走之㧞梁城合肥洛口三戍以功遷征虜将軍封安武縣開國男食邑二百户出為南青州刺史後蕭衍郁洲遣軍主徐濟宼邊康生率将出討破之生擒濟賞帛千匹時蕭衍聞康生能引彊弓力至十餘石故特作大弓兩張送與康生康生得弓便㑹集文武乃用平射猶有餘力其弓長八尺把中圍尺二寸箭麤殆如今之長笛觀者以為希世絶倫弓即表送置之武庫又蕭衍遣将宋黒率衆宼擾彭城時康生遭母憂詔起為别将持節假平南将軍領南青州諸軍擊走之後衍復遣都督臨川王蕭宏副将張恵紹勒甲十萬規宼徐州又假宋黑徐州刺史領衆二萬水陸俱進徑圍髙塜戍詔授康生武衞将軍持節假平南将軍為別将領羽林三千人騎歩甲士隨便割配康生一戰敗之還京召見宴㑹賞帛千匹賜驊騮御胡馬一匹出為平西将軍華州刺史頗有聲績轉涇州刺史仍本将軍以輙用官炭瓦為御史所劾削除官爵㝷㫖復之蕭衍直閤将軍徐元明戍於郁州殺其刺史張稷以城内附詔遣康生迎接賜細御銀纒槊一張并棗奈果靣勅曰果者果如朕心棗者早遂朕意未發之間郁州復叛時揚州別駕裴絢謀反除康生平東将軍為别将領羽林四千討之㑹事平不行遭父憂起為平西将軍西中郎将是嵗大舉征蜀假康生安西将軍領歩騎三萬邪趣綿竹至隴右世宗崩班師除衛尉卿出為撫軍将軍相州刺史在州以天旱令人鞭石虎畫像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴䘮身亦遇疾巫以為虎豹之祟徴拜光禄卿領右衞将軍與元义同謀廢靈太后遷撫軍大将軍河南尹仍右衞領左右與子難娶左衞将軍侯剛女即元义妹夫也义以其通姻深相委託三人率多俱宿禁内時或迭出义以康生子難為千牛偹身康生性麤武言氣髙下义稍憚之見于顔色康生亦㣲懼不安正光二年三月肅宗朝靈太后于西林園文武侍坐酒酣迭舞次至康生康生乃為力士舞及扵折旋每顧視太后舉手蹈足瞋目頷首為殺縳之勢太后解其意而不敢言日暮太后欲携肅宗宿宣光殿侯剛曰至尊已朝訖嬪御在南何勞留宿康生曰至尊陛下兒隨陛下将東西更復訪問誰羣臣莫敢應靈太后自起援肅宗臂下堂而去康生大呼唱萬嵗扵後近侍皆唱萬嵗肅宗引前入閤左右競相排閤不得閉康生奪其子難千牛刀斫直後元思輔乃得定肅宗既上殿康生時有酒勢将出處分遂為义所執鏁於門下至曉义不出令侍中黄門僕射尚書等十餘人就康生所訊其事處康生斬刑難處絞刑义與剛並在内矯詔决之康生如奏難恕死從流難哭拜辭父康生忻子免死又亦慷慨了不悲泣語其子云我不反死汝何為哭也有司驅逼奔走赴市時已昏闇行刑人注刀數下不死於地刻截咸言禀义意㫖過至苦痛嘗食典御奚混與康生同執刀入内亦就市絞刑康生乆為将及臨州尹多所殺戮而乃信向佛道數捨其居宅以立寺塔凡歴四州皆有建置死時五十四子難年十八以侯剛子婿得停百日竟徙安州後尚書盧同為行臺义令殺之康生於南山立佛圖三層先死忽夢崩壞沙門有為解云檀越當不吉利無人供飬佛圖故崩耳康生稱然竟及禍靈太后反政贈都督冀瀛滄三州諸軍事驃騎大将軍司空公冀州刺史又追封夀張縣開國侯食邑一千户子剛襲武定中青州開府主簿齊受禪爵例降剛弟定國襲康生安武縣開國男楊大眼武都氐難當之孫也少有膽氣跳走如飛然側出不為其宗親顧待頗有飢寒之切太和中起家奉朝請時高祖自代将南伐令尚書李沖典選征官大眼徃求焉沖弗許大眼曰尚書不見知聽下官出一技便出長繩三丈許繫髻而走繩直如矢馬馳不及見者莫不驚歎沖曰自千載以來未有逸材若此者也遂用為軍主大眼顧謂同竂曰吾之今日所謂蛟龍得水之秋自此一舉終不復與諸君齊列矣未幾遷為統軍從高祖征宛葉穰鄧九江鍾離之間所經戰陳莫不勇冠六軍世宗初裴叔業以夀春内附大眼與奚康生等率衆先入以功封安成縣開國子食邑三百戸除直閤将軍㝷加輔國将軍㳺擊将軍出為征虜将軍東荆州刺史時蠻酋樊秀安等反詔大眼為別将𨽻都督李崇討平之大眼妻潘氏善騎射自詣軍省大眼至於攻陳逰獵之際大眼令妻潘戎裝或齊鑣戰場或並驅林壑及至還營同坐幕下對諸寮佐言笑自得時指之謂人曰此潘将軍也蕭衍遣其前江州刺史王茂先率衆數萬次于樊雍招誘蠻夏規立宛州又令其所署宛州刺史雷豹狼軍主曹仲宗等領衆二萬偷據河南城世宗以大眼為武衞将軍假平南将軍持節都督統軍曹敬邴虬樊魯等諸軍討茂先等大破之斬衍輔國将軍王花龍驤將軍申天化俘馘七千有餘衍又遣其舅張惠紹總率衆軍竊據宿豫又假大眼平東将軍為别将與都督邢巒討破之遂乘勝長驅與中山王英同圍鍾離大眼軍城東守淮橋東西二道屬水汛長大眼所綰統軍劉神符公孫祉兩軍夜中争橋奔退大眼不能禁相㝷而走坐徙為營州兵永平中世宗追其前勳起為試守中山内史時高肇征蜀世宗慮蕭衍侵軼徐揚乃徴大眼為太尉長史持節假平南将軍東征别将𨽻都督元遥遏禦淮肥大眼至京師時人思其雄勇喜其更用臺省閭卷觀者如市大眼次譙南世宗崩時蕭衍遣将康絢扵浮山遏淮規浸夀春詔加大眼光禄大夫率諸軍鎮荆山復其封邑後與蕭寳夤俱徃淮堰不能剋遂扵堰上流鑿渠决水而還加平東将軍大眼善騎乘装束雄竦擐甲折旋見稱當世撫廵士卒呼為兒子及見傷痍為之流泣自為將帥恒身先兵士衝突堅陳出入不疑當其鋒者莫不摧拉南賊前後所遣督将軍未渡江預皆畏懾𫝊言淮泗荆沔之間有童兒啼者恐之云楊大眼至無不即止王肅弟子秉之初歸國也謂大眼曰在南聞君之名以為眼如車輪及見乃不異人大眼曰旗鼓相望瞋眸奮發足使君目不能視何必大如車輪當世推其驍果皆以為闗張弗之過也然征淮堰之役喜怒無常捶撻過度軍士頗憾焉識者以為性侈所致又以本將軍出為荆州刺史常縛蒿為人衣以青布而射之召諸蠻渠指示之曰卿等若作賊吾政如此相殺也又北淯郡嘗有虎害大眼搏而獲之斬其頭懸於穰市自是荆蠻相謂曰楊公惡人常作我蠻形以射之又深山之虎尚所不免遂不敢復為宼盗在州二年而卒大眼雖不學恒遣人讀書坐而聽之悉皆記識令作露布皆口授之而竟不多識字也有三子長甑生次領軍次征南皆潘氏所生氣幹咸有父風初大眼徙營州潘在洛陽頗有失行及為中山大眼側生女夫趙延寳言之於大眼大眼怒幽潘而殺之後娶繼室元氏大眼之死也甑生等問印綬所在時元始懐孕自指其腹謂甑生等曰開國當我兒襲之汝等婢子勿有所望甑生深以為恨及大眼䘮将還京出城東七里營車而宿夜二更甑生等開大眼棺延寳怪而問之征南射殺之元怖走入水征南又彎弓射之甑生曰天下豈有害母之人乃止遂取大眼屍令人馬上抱之左右扶挾以叛荆人畏甑生等驍勇不敢苦追奔於襄陽遂歸蕭衍崔延伯博陵人也祖夀扵彭城䧟入江南延伯有氣力少以勇壮聞仕蕭賾為縁淮逰軍帶濠口戍主太和中入國高祖深嘉之常為統帥膽氣絶人兼有謀略所在征討咸立戰功積勞稍進除征虜将軍荆州刺史賜爵定陵男荆州土險蠻左為宼每有聚結延伯輙自討之莫不摧殄由是穰土怗然無敢為患永平中轉後将軍幽州刺史蕭衍遣其左遊擊将軍趙祖恱率衆偷據峽石詔延伯為别將與都督崔亮討之亮令延伯守下蔡延伯與别将伊瓫生挾淮為營延伯遂取車輪去輞削銳其輻兩兩接對揉竹為桓貫連相屬並十餘道横水為橋兩頭施大轆轤出没任情不可燒斫既斷祖悅等走路又令舟舸不通由是衍軍不能赴救祖悅合軍咸見俘虜於軍拜平南将軍光禄大夫延伯與楊大眼等至自淮陽靈太后幸西林園引見延伯等太后曰卿等志尚雄猛皆國之名将比平峽石公私慶快此乃卿等之功也但淮堰仍在宜湏豫謀故引卿等親共量算各出一圖以為後計大眼對曰臣輙謂水陸二道一時俱下徃無不尅延伯曰臣今輙難大眼既對聖顔荅㫖宜實水南水北各有溝瀆陸地之計如何可前愚臣短見願聖心愍水兵之勤苦給復一年専習水戰脫有不虞召便可用徃無不獲靈太后曰卿之所言深是宜要當勅如請二年除安北将軍并州刺史在州貪汚聞扵逺近還為金紫光禄大夫出為鎮南将軍行岐州刺史假征西将軍賜驊騮馬一匹正光五年秋以徃在揚州建淮橋之勳封當利縣開國男食邑二百戸㝷増邑一百户改封新豐進爵為子時莫折念生兄天生下隴東宼征西将軍元志為天生所擒賊衆甚盛進屯黑水詔延伯為使持節征西将軍西道都督與行臺蕭寳夤討之寳夤與延伯結壘馬嵬南北相去百餘歩寳夤日集督将論討賊方略延伯每云賊新制勝難與争鋒寳夤正色責之曰君荷國寵靈總戎出討便是安危所繫每云賊不可討以示怯懦損威挫氣乃君之罪延伯明晨詣寳夤自謝仍云今當仰為明公參賊勇怯延伯選精兵數千下渡黒水列陳西進以向賊營寳夤率衆扵水東㝷原西北以示後繼於時賊衆大盛水西一里營營連接延伯徑至賊壘揚威愶之徐而還退賊以延伯衆少開營競追衆過十倍臨水逼蹙寳夤親觀之懼有虧損延伯不與其戰身自殿後抽衆東渡轉運如神湏臾濟盡徐乃自渡賊徒奪氣相率還營寳夤大悅謂官屬曰崔公古之關張也今年何患不制賊延伯馳見寳夤曰此賊非老奴敵公但坐看後日延伯勒衆而出寳夤為後拒天生悉衆來戰延伯申令将士身先士卒䧟其前鋒扵是勇銳競進大破之俘斬十餘萬追奔及扵小隴秦賊勁彊諸将所憚朝廷初議遣将咸云非延伯無以定之果能剋敵授右衞将軍於時万俟醜奴宿勤明逹等宼掠涇州先是盧祖遷伊瓫生數将等皆以元志前行之始同時發雍從六陌道将取高平志敗仍停涇部延伯既破秦賊乃與寳夤率衆㑹扵安定甲卒十二萬鐡馬八千匹軍威甚盛醜奴置營涇州西北七十里當原城時或輕騎暫來挑戰大兵未交便示奔北延伯矜功負勝遂唱議先驅伐木别造大排内為鏁柱敎習彊兵負而趨走號為排城戰士在外輜重居中自涇州縁原北上衆軍将出討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師寳夤延伯謂其事實逡廵未閱俄而宿勤明達率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯上馬突陳賊勢摧挫便爾逐北徑造其營賊本輕騎延伯軍兼歩卒兵力疲怠賊乃乗間得入排城延伯軍遂大敗死傷者将有二萬寳夤歛軍退保涇州延伯修繕器械購募驍勇復從涇州西進去賊彭阬谷柵七里結營延伯恥前挫辱不報寳夤獨出襲賊大破之俄頃間平其數柵賊皆逃遁見兵人採掠散亂不整還來衝突遂大奔敗延伯中流矢為賊所害士卒死者萬餘人延伯善将撫能得衆心與康生大眼為諸将之冠延伯末路功名尤重時大宼未平而延伯死朝野嘆懼焉贈使持節車騎大将軍儀同三司定州刺史謚曰武烈又有王足者驍果多䇿略𨽻邢巒伐蜀所在剋㨗詔行益州刺史遂圍涪城蜀人大震世宗復以羊祉為益州足聞而引退後遂奔蕭衍次有王神念足之流也後自潁川太守奔江南又冀州李叔仁叔仁弟龍瓌以勇壮為将統叔仁位至車騎大将軍儀同三司陳郡開國公後為梁州刺史殁扵關西龍瓌正光中北征戰死白道其平州刺史王買奴南秦州刺史曹敬南兗州刺史樊魯益州刺史邴虬𤣥州刺史邢豹及屈祖嚴思達吕叵崔襲柴慶宗宗正珍孫盧祖遷高智方俱為将帥並有攻討之名而事迹不存無以編録然未若康生大眼延伯尤著也史臣曰人主聞鞞鼓之響則思将帥之臣何則夷難平暴折衝禦侮為國之所繫也康生等俱以熊虎之姿奮征伐之氣亦一時之驍猛壮士之功名也魏書卷七十三魏書卷七十三考證崔延伯傳賊徒奪氣相率還營奪監本譌作奮今改正魏書卷七十三考證
