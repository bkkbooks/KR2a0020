body:
  text: 編修臣孫人龍謹言魏書一百三十卷國子監舊板歴久漫漶奉勅校刋臣謹與同事臣陳浩臣齊召南等各就聞見共錄為考證如干條魏收書貽譏穢史宋以前亡逸不完者三十餘卷後之人取北史等書以補之明所刻二十一史中此書又最為刓敝宋劉恕明馮夢禎等論之綦詳今欲摘謬辯譌不留遺憾此實難矣惟參校各本悉心檢覈信則徵信疑則𫝊疑云爾臣人龍謹識
