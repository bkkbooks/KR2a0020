body:
  text: 魏書卷八十七齊魏收撰列𫝊節義第七十五于什門段進石文徳汲固王元威婁提劉渴侯朱長生于提馬八龍門文愛晁清劉侯仁石祖興邵洪哲王榮世胡小虎孫道登李几張安祖王閭大義重於至聞自日人慕之者葢希行之者實寡至於輕生蹈節臨難如歸殺身成仁死而無悔自非耿介苦心之人鬱怏激氣之士亦何能若斯僉列之𫝊名節義云于簡字什門代人也太宗時為謁者使喻馮跋及至和龍住外舎不入使人謂跋曰大魏皇帝有詔須馮主出受然後敢入跋使人牽逼令入見跋不拜跋令人按其項什門曰馮主拜受詔吾自以賔主致敬何須苦見逼也與跋往復聲氣厲然初不撓屈既而跋止什門什門於羣衆之中回身背跋被袴後襠以辱之既見拘畱隨身衣裳敗壊略盡蟣虱被體跋遺以衣服什門拒而不受和龍人皆歎曰雖古烈士無以過也歴二十四年後馮文通上表稱臣乃送什門歸拜治書侍御史世祖下詔曰什門奉使和龍值狂豎肆虐勇志壯厲不為屈節雖昔蘇武何以加之賜羊千口帛千匹進為上大夫策告宗廟頒示天下咸使聞也段進不知何許人也世祖初為白道守将蠕蠕大檀入塞圍之力屈被執進抗聲大罵遂為賊殺世祖愍之追贈安北將軍賜爵顯美侯諡曰莊石文徳河中蒲坂人也有行義真君初縣令黄宣在任喪亡宣單貧無期親文徳祖父苖以家財殯葬持服三年奉養宣妻二十餘載及亡又衰絰斂袝率禮無闕自苖逮文徳刺史守令卒官者制服送之五世同居閨門雍睦又梁州上言天水白石縣人趙令安孟蘭彊等四世同居行著州里詔並標牓門閭汲固東郡梁城人也為兗州從事刺史李式坐事被收吏民皆送至河上時式子憲生始滿月式大言於衆曰程嬰杵臼何如人也固曰今古豈殊遂便潛還不復回顧徑来入城於式婦閨抱憲歸蔵之及捕者收憲屬有一婢産男母以婢兒授之事尋泄固乃攜憲逃遁遇赦始歸憲即為固長育至十餘歳恒呼固夫婦為郎婆後高祐為兗州刺史嘉固節義以為主簿王元威恒農北陜人也顯祖崩𤣥威立草廬於州城門外衰裳蔬粥哭踴無時刺史茍頽以事表聞詔令問狀元威稱先帝綂御萬國慈澤被於蒼生含氣之類莫不仰頼元威不勝悲慕中心如此不知禮式詔問元威欲有所訴聽為表列元威云聞諱悲號竊謂臣子同例無所求謁及至百日乃自竭家財設四百人齋會忌日又設百僧供至大除日詔送白紬袴褶一具與元威釋服下州令表異焉婁提代人也顯祖時為内三郎顯祖暴崩提謂人曰聖主升遐安用活為遂引佩刀自刺幾至於死文明太后詔賜帛二百匹時有勑勒部人蛭拔寅兄地干坐盗食官馬依制命死拔寅自誣己殺兄又云實非弟殺兄弟爭死辭不能定高祖詔原之劉渴侯不知何許人也稟性剛烈太和中為徐州後軍以力死戰衆寡不敵遂禽瞋目大罵終不降屈為賊所殺高祖贈立忠將軍平州刺史上庸侯賜絹千匹榖千斛有嚴季者亦為軍校尉與渴侯同殿勢窮被執終不降屈後得逃還除立節将軍賜爵五等男朱長生及于提並代人也高祖時以長生為員外散騎常侍與提俱使高車至其庭高車主阿伏至羅責長生等拜長生拒之曰我天子使安肯拜下土諸侯阿伏至羅乃不以禮待長生以金銀寳器奉之至羅既受獻長生曰為臣内附宜盡臣禮何得口云再拜而實不拜呼出帳命衆中拜阿伏至羅慙其臣下大怒曰帳中何不教我拜而辱我於大衆奪長生等獻物内之叢石之中兵脇之曰汝能為我臣則活如其不降殺汝長生與于提瞋目厲聲責之曰豈有天子使人拜汝夷我寧為魏鬼不為汝臣至羅彌怒絶其飲食從行者三十人皆降至羅乃給以肉酪惟長生與提不從乃各分徙之積三歳乃得還高祖以長生等守節逺同蘇武甚嘉之拜長生河内太守于提隴西太守並賜爵五等男從者皆為令長馬八龍武邑武强人也輕財重義友人武遂縣尹靈哲在軍喪亡八龍聞即奔赴負屍而歸以家財殯葬為制緦服撫其孤遺恩如所生州郡表列詔表門閭門文愛汲郡山陽人也早孤供養伯父母以孝謹聞伯父亡服未終伯母又亡文愛居喪持服六年哀毁骨立鄉人魏仲賢等相與標其孝義晁清遼東人也祖暉濟州刺史潁川公清襲祖爵例降為伯為梁城戍將蕭衍攻圍糧盡城䧟清抗節不屈為賊所殺世宗褒美贈樂陵太守諡曰忠子榮賔襲劉侯仁豫州人也城人白早生殺刺史司馬悦據城南叛悦息朏走投侯仁賊雖重加購募又嚴其捶撻侯仁終無漏泄朏遂免禍事寧有司奏其操行請免府籍叙一小縣詔可石祖興常山九門人也太守田文彪縣令和真等喪亡祖興自出家絹二百餘匹營䕶喪事州郡表列高祖嘉之賜爵二級為上造後拜寧陵令卒吏部尚書李韶奏其節義請加贈諡以奬来者靈太后令如所奏有司諡曰恭邵洪哲上谷沮陽人也縣令范道榮先自眴城歸欵以除縣令道榮鄉人徐孔明妄經公府訟道榮非勲道榮坐除名羇旅孤貧不能自理洪哲不勝義憤遂代道榮詣京師明申曲直經歴寒暑不憚劬勞道榮卒得復雪又北鎮反亂道榮孤單無所歸附洪哲兄伯川復率鄉人来相迎接送達幽州道榮感其誠節訴省申聞詔下州郡標其里閭王榮世陽平館陶人也為三城戍主方城縣子蕭衍攻圍力窮知不可全乃先焚府庫後殺妻妾及賊陷城與戍副鄧元興等俱以不屈被害肅宗下詔褒美忠節進榮世爵為伯贈齊州刺史元興開國子贈洛州刺史胡小虎河南河隂人也少有武氣正光末為綂軍於晉夀孝昌中蕭衍將樊文熾等寇邊益州刺史邴虯遣長史和安固守小劒文熾圍之虯命小虎與綂軍崔珍寳同往防拒文熾掩襲小虎珍寳並擒之文熾攻小劔未陷乃将珍寳至城下使謂和安曰南軍彊盛北救不来豈若歸欵取其富貴和安命射之乃退復逼小虎與和安交言小虎乃慷慨謂安曰我柵不防為賊所虜觀其兵士勢不足言努力堅守魏行臺𫝊梁州遣将已至賊以刀毆擊言不得終遂害之三軍無不歎其壯節哀其死亡賊尋奔敗禽其次將蕭世澄陳文緒等一十一人行臺魏子建壯其氣槩啓以世澄購其屍柩乃獲骸骨歸葬孫道登彭城呂縣人也永安初為蕭衍將韋休等所虜面縳臨刃廵逺村塢令其招降鄉曲道登厲聲唱呼但當努力賊無所能賊遂屠戮之又荆州被圍行臺宗靈恩遣使宗女等四人入城曉喻為賊將所獲執女等廵城令其改辭女等大言天軍垂至堅守莫降賊忿各刳其腹然後斬首二州表其節義道登等並賜五品郡五等子爵聽子弟承襲遣使詣所在弔祭李几博陵安平人也七世共居同財家有二十二房一百九十八口長幼濟濟風禮著聞至於作役卑幼競進鄉里嗟美標其門閭張安祖河陽人也襲世爵山北侯時有元承貴曾為河陽令家貧且赴尚書求選逢天寒甚遂凍死路側一子年幼停屍門巷棺歛無託安祖悲哭盡禮買木為棺手自營作斂殯周給朝野嘉歎尚書聞奏標其門閭王閭北海密人也數世同居有百口又太山劉業興四世同居魯郡蓋儁六世同居並共財産家門雍睦鄉里敬異有司申奏皆標其門閭史臣曰于什門等或臨危不撓視死如歸或赴險如夷惟義所在其大則光國隆家其小則損已利物故其盛烈所著與河海而爭流峻節所標共松柏而俱茂並蹈履之所致身殁名立豈徒然哉魏書卷八十七魏書卷八十七考證列𫝊第七十五魏收書亡後人所補于什門等𫝊叙大義重於至聞自日人慕之者葢希行之者實寡首九字訛舛不可推尋魏書卷八十七考證
