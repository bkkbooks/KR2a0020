body:
  text: 魏書卷七上齊魏収撰帝紀第七髙祖紀上髙祖孝文皇帝諱宏顯祖獻文皇帝之長子母曰李夫人皇興元年八月戊申生於平城紫宫神光照於室内天地氛氲和氣充塞帝生而潔白有異姿襁褓岐嶷長而淵裕仁孝綽然有君人之表顯祖尤愛異之三年夏六月辛未立爲皇太子五年秋八月丙午卽皇帝位於太華前殿大赦改元延興元年丁未劉彧遣使朝貢九月壬戌詔在位及民庶直言極諫有利民益治損政傷化悉心以聞壬午青州髙陽民封辯自號齊王聚黨千餘人州軍討滅之髙麗民奴久等相率來降各賜田宅冬十月丁亥沃野統萬二鎮勅勒叛詔太尉隴西王源賀追擊至枹罕滅之斬首三萬餘級徙其遺迸於冀定相三州爲營戸庚寅以征東大將軍南安王楨爲假節都督涼州及西戎諸軍事領護西域校尉儀同三司鎮涼州朔方民曹平原招集不逞破石樓堡殺軍將劉彧將垣崇祖率衆二萬自郁洲宼東兗州屯于南城固十有一月刺史于洛侯討破之崇祖還郁洲妖賊司馬小君聚衆反於平陵齊州刺史武昌王平原討擒之十有二月乙酉以駙馬都尉穆亮爲趙郡王壬辰詔訪舜後獲東萊郡民嬀茍之復其家畢世以彰盛德之不朽復前濮陽王孔雀本封辛丑趙郡王穆亮徙封長樂王二年春正月乙卯統萬鎮胡民相率北叛詔寧南將軍交阯公韓㧞等追滅之大陽蠻酋桓誕率戸内屬拜征南將軍封襄陽王曲赦京師及河西南至秦涇西至枹罕北至涼州諸鎮詔假員外散騎常侍邢祐使於劉彧二月乙巳詔曰尼父禀達聖之姿體生知之量窮理盡性道光四海頃者淮徐未賔廟隔非所致令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生鼓舞倡優媟狎豈所以尊明神敬聖道者也自今已後有祭孔子廟制用酒脯而已不聼婦女合雜以祈非望之福犯者以違制論其公家有事自如常禮犧牲粢盛務盡豐潔臨事致敬令肅如也牧司之官明糾不法使禁令必行蠕蠕犯塞太上皇帝次於北郊詔諸將討之虜遁走其别帥阿大千率千餘落來降東部勅勒叛奔蠕蠕太上皇帝追之至石磧不及而還壬子髙麗國遣使朝貢三月太上皇帝至自北討戊辰以散騎常侍駙馬都尉萬安國爲大司馬大將軍封安城王庚午車駕耕於籍田石城郡獲曹平原送京師斬之連川敕勒謀叛徙配青徐齊兗四州爲營戸夏四月庚子詔工商雜伎盡聼赴農諸州郡課民益種菜果辛亥劉彧遣使朝貢癸酉詔沙門不得去寺浮遊民間行者仰以公文是月劉彧死子昱僭立五月丁巳詔軍警給璽印傳符次給馬印六月安州民遇水雹丐租賑恤丙申詔曰頃者州郡選貢多不以實碩人所以窮處幽仄鄙夫所以超分妄進豈所謂旌賢樹德者也今年貢舉尤爲猥濫自今所遣皆門盡州郡之髙才極鄉閭之選閏月壬子蠕蠕宼敦煌鎮將尉多侯擊走之又宼晉昌守將薛奴擊走之戊午行幸隂山秋七月光州民孫晏等聚黨千餘人叛通劉昱刺史叔孫璝討平之辛丑髙麗國遣使朝貢壬寅詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗八月丙辰百濟國遣使奉表請師伐髙麗辛酉地豆干厙莫奚國遣使朝貢昌亭國遣使獻蜀馬河西費也頭反薄骨律鎮將擊走之九月辛巳車駕還宫戊申統萬鎮將河間王閭虎皮坐貪殘賜死己酉詔以州鎮十一水丐民田租開倉賑恤又詔流迸之民皆令還本違者配徙邉鎮冬十月蠕蠕犯塞及於五原十有一月太上皇帝親討之將度漠襲擊蠕蠕聞軍至大懼北走數千里以窮宼逺遁不可追乃止丁亥封皇叔略爲廣川王壬辰分遣使者廵省風俗問民疾苦帝每月一朝崇光宫十有二月庚戌詔曰書云三載一考三考黜陟幽明頃者已來官以勞升未久而代牧守無恤民之心競爲聚斂送故迎新相屬於路非所以固民志隆治道也自今牧守溫仁清儉克己奉公者可久於其任歳積有成遷位一級其有貪殘非道侵削黎庶者雖在官甫爾必加黜罰著之於令永爲彛凖詔以代郡事同豐沛代民先配邉戍者皆免之三年春正月庚辰詔員外散騎常侍崔演使於劉昱丁亥改崇光宫爲寧光宫戊戌太上皇帝還至雲中是月相州執送妖人榮永安於京師斬之詔赦其支黨二月戊申髙麗契丹國並遣使朝貢癸丑詔牧守令長勤率百姓無令失時同部之内貧富相通家有兼牛通借無者若不從詔一門之内終身不仕守宰不督察免所居官戊午太上皇帝至自北討飲至䇿勲告於宗廟死王事者復其家詔畿内民從役死事者郡縣爲迎喪給以葬費甲戌詔縣令能靜一縣劫盜者兼治二縣卽食其祿能靜二縣者兼治三縣三年遷爲郡守二千石能靜二郡上至三郡亦如之三年遷爲刺史三月壬午詔諸倉囤穀麥充積者出賜貧民夏四月戊申詔假司空上黨王長孫觀等討吐谷渾拾寅壬子契丹國遣使朝貢詔以孔子二十八世孫魯郡孔乗爲崇聖大夫給十戸以供洒埽六月甲子詔曰往年縣召民秀二人問以守宰治狀善惡具聞將加賞罰而賞者未幾罪者衆多肆法傷生情所未忍今特垂寛恕之恩申以解網之惠諸爲民所列者特原其罪盡可代之秋七月詔河南六州之民戸収絹一匹綿一斤租三十石乙亥行幸隂山蠕蠕宼敦煌鎭將樂洛生擊破之事具蠕蠕傳劉昱遣將宼緣淮諸鎮徐州刺史淮陽公尉元擊走之八月己酉髙麗厙莫奚國並遣使朝獻庚申帝從太上皇帝幸河西拾寅謝罪請降許之九月辛巳車駕並還宫乙亥劉昱遣使朝貢己亥詔曰自今京師及天下之囚罪未分判在獄致死無近親者公給衣衾棺櫝葬埋之不得曝露辛丑詔遣使者十人循行州郡檢括戸口其有仍隱不出者州郡縣戸主並論如律庫莫奚國遣使朝獻冬十月太上皇帝親將南討詔州郡之民十丁取一以充行戸収租五十石以備軍糧悉萬斤國遣使朝獻武都王反攻仇池詔長孫觀仍回師討之十有一月戊寅詔以河南七州牧守多不奉法致新邦之民莫能上逹遣使者觀風察獄黜陟幽明其有鰥寡孤獨貧不自存者復其雜徭年八十已上一子不從役力田孝悌才器有益於時信義著於鄉閭者具以名聞癸巳太上皇帝南廵至於懐州所過問民疾苦賜髙年孝悌力田布帛十有二月庚戌詔關外苑囿聼民樵採壬子蠕蠕犯邉柔𤣥鎭二部勅勒叛應之癸丑沙門慧隱謀反伏誅是歲州鎮十一水旱丐民田租開倉賑恤相州民餓死者二千八百四十五人吐谷渾部内羌民鍾豈渴干等二千三百戸内附是年妖人劉舉自稱天子齊州刺史武昌王平原捕斬之四年春正月丁丑侍中太尉隴西王源賀以病辭位辛巳粟特國遣使朝獻二月甲辰太上皇帝至自南廵辛亥吐谷渾拾寅遣子費斗斤入侍并獻方物辛未禁斷寒食三月丁亥詔員外散騎常侍許赤虎使於劉昱髙麗吐谷渾曹利諸國各遣使朝貢夏五月甲戌蠕蠕國遣使朝貢六月乙卯詔曰朕應歴數開一之期屬千載光熙之運雖仰嚴誨猶懼德化不寛至有門房之誅然下民兇戾不顧親戚一人爲惡殃及合門朕爲民父母深所愍悼自今以後非謀反大逆干紀外奔罪止其身而已今徳被殊方文軌將一宥刑寛禁不亦善乎闊悉國遣使朝貢秋七月庚午髙麗國遣使朝獻己卯曲赦仇池癸巳蠕蠕宼敦煌鎮將尉多侯大破之八月庚子吐谷渾國遣使朝獻戊申大閲於北郊九月以劉昱内相攻戰詔將軍元蘭等五將三萬騎及假東陽王丕爲後繼伐蜀漢丙子契丹厙莫奚地豆干諸國各遣使朝獻冬十月庚子劉昱遣使朝貢十有一月分遣侍臣循河南七州觀察風俗撫慰初附戊寅吐谷渾國遣使朝獻是歲州鎮十三大饑丐民田租開倉賑之十有二月詔西征吐谷渾兵在句律城初叛軍者斬次分配柔𤣥武川二鎮斬者千餘人五年春二月庚子髙麗國遣使朝獻癸丑詔定考課明黜陟閏月戊午吐谷渾國遣使朝獻夏四月丁丑龜兹國遣使朝獻癸未詔天下賦調縣專督集牧守對檢送京師違者免所居官詔禁畜鷹鷂開相告之制五月丁酉契丹厙莫奚國各遣使獻名馬丙午詔員外散騎常侍許赤虎使於劉昱丁未幸武州山辛酉幸車輪山六月庚午禁殺牛馬壬申曲赦京師死罪遣備蠕蠕秋八月丁卯髙麗吐谷渾地豆干諸國遣使朝獻九月癸卯洛州人賈伯奴豫州人田智度聚黨千餘人伯奴稱恒農王智度稱上洛王夜攻洛州州郡擊之斬伯奴於緱氏執智度送京師冬十月蠕蠕國遣使朝獻太上皇帝大閲於北郊十有二月丙寅建昌王長樂改封安樂王己丑城陽王長夀薨庚寅劉昱遣使朝貢承明元年春二月蠕蠕髙麗厙莫奚波斯諸國並遣使朝貢是月司空東郡王陸定國坐事免官爵爲兵夏五月冀州武邑民宋伏龍聚衆自稱南平王郡縣捕斬之蠕蠕國遣使朝貢六月甲子詔中外戒嚴分京師見兵爲三等第一軍出遣第一兵二等兵亦如之辛未太上皇帝崩壬申大赦改年大司馬大將軍安城王萬安國坐矯詔殺神部長奚買奴於苑中賜死戊寅征西大將軍安樂王長樂爲太尉尚書左僕射南平公目辰爲司徒進封宜都王南部尚書李訢爲司空尊皇太后爲太皇太后臨朝稱制秋七月甲辰追尊皇妣李貴人爲思皇后以汝隂王天賜爲征西大將軍儀同三司髙麗厙莫奚國並遣使朝貢濮陽王孔雀有罪賜死八月甲子詔曰朕猥承前緖纂戎洪烈思隆先志緝熙政道羣公卿士其各勉厥心匡朕不逮諸有便民利國者具狀以聞壬午蠕蠕國遣使朝貢甲申以長安二蠶多死丐民歲賦之半九月丁亥曲赦京師髙麗庫莫奚契丹諸國並遣使朝獻癸丑宕昌悉萬斤國並遣使朝貢冬十月丁巳起七寳永安行殿乙丑進征西大將軍假東陽王元丕爵爲正王己未詔曰朕纂承皇極照臨萬方思闡遐風光被兆庶使朝有不諱之音野無自蔽之響疇咨帝載詢及芻蕘自今已後羣官卿士下及吏民各聼上書直言極諫勿有所隱諸有便宜益治利民可以正風俗者有司以聞朕將親覽與三事大夫論其可否裁而用之辛未輿駕幸建明佛寺大宥罪人濟南公羅㧞進爵爲王十有一月蠕蠕國遣使朝貢戊子以太尉安樂王長樂爲定州刺史京兆王子推爲青州刺史司空李訢爲徐州刺史並開府儀同三司太和元年春正月乙酉朔詔曰朕夙承寳業懼不堪荷而天貺具臻地瑞並應風和氣晼天人交協豈朕沖昧所能致哉實頼神祗七廟降福之助今三正告初祇感交切宜因陽始協典革元其改今號爲太和元年辛亥詔曰今牧民者與朕共治天下也宜簡以徭役先之勸獎相其水陸務盡地利使農夫外布桑婦内勤若輕有徵發致奪民時以侵擅論民有不從長教惰於農桑者加以罪刑起太和安昌二殿己酉秦州略陽民王元夀聚衆五千餘家自號爲衝天王雲中饑開倉賑恤二月丙寅漢川民泉㑹譚酉等相率内屬處之并州辛未秦益二州刺史武都公尉洛侯討破元壽獲其妻子送京師癸未髙麗契丹厙莫奚國各遣使朝獻三月庚子徵征西大將軍雍州刺史東陽王丕爲司徒丙午詔曰朕政治多闕災𤯝屢興去年牛疫死傷大半耕墾之利當有虧損今東作既興人須肄業其勅在所督課田農有牛者加勤於常歲無牛者倍庸於餘年一夫制治田四十畝中男二十畝無令人有餘力地有遺利厙莫奚契丹國各遣使朝獻夏四月丙寅蠕蠕國遣使朝貢丁卯幸白登山壬申幸崞山樂安王良薨詔復前東郡王陸定國官爵五月乙酉車駕祈雨於武州山俄而澍雨大洽蠕蠕國遣使朝貢秋七月壬辰侍中開府儀同三司青州刺史京兆王子推薨庚子定三等死刑己酉太和安昌二殿成起朱明思賢門是月劉昱死弟準僭立八月壬子大赦天下丙子詔曰工商皂隸各有厥分而有司縱濫或染清流自今戸内有工役者唯止本部丞已下準次而授若階藉元勲以勞定國者不從此制戊寅劉準遣使朝貢九月癸未蠕蠕國遣使朝貢乙酉詔羣臣定律令於太華殿辛卯髙麗國遣使朝貢庚子起永樂遊觀殿於北苑穿神淵池車多羅西天竺舍衛疊伏羅諸國各遣使朝貢冬十月癸酉宴京邑耆老年七十已上於太華殿賜以衣服是月厙莫奚契丹國各遣使朝獻又詔七十已上一子不從役龜兹國遣使朝獻劉準葭蘆戍主楊文度遣弟鼠襲陷仇池丙子誅徐州刺史李訢厙莫奚契丹國各遣使朝貢十有二月癸未詔征西將軍廣川公皮懽喜鎮西將軍梁醜奴平西將軍楊靈珍等率衆四萬討楊鼠乙酉吐谷渾國遣使朝獻丁亥懷州民伊祈茍初自稱堯後應王聚衆於重山洛州刺史馮熙討滅之閏月懽喜等軍到建安楊鼠棄城南走癸亥粟提婆國遣使朝獻庚子詔員外散騎常侍李長仁使於劉準十有二月壬寅懽喜攻陷葭蘆斬文度傳首京師甲辰員闊吐谷渾國並遣使朝貢丁未詔以州郡八水旱蝗民饑開倉賑恤以安定王休爲儀同三司二年春正月丁巳封昌黎王馮熙第二子始興爲北平王戊午吐谷渾遣使朝獻二月丁亥行幸代之湯泉所過問民疾苦以宮人賜貧民無妻者戊戌蠕蠕國遣使朝獻癸卯車駕還宫三月丙子以河南公梁彌機爲宕昌王夏四月甲申幸崞山丁亥還宫己丑劉準遣使朝貢京師蝗甲辰祈天災於北苑親自禮焉減膳避正殿丙午㴻雨大洽曲赦京師五月詔曰㛰娉過禮則嫁娶有失時之弊厚葬送終則生者有糜費之苦聖王知其如此故申之以禮數約之以法禁廼者民漸奢尚㛰葬越軌致貧富相高貴賤無别又皇族貴戚及士民之家不惟氏族髙下與非類婚偶先帝親發明詔爲之科禁而百姓習常仍不肅改朕今憲章舊典祗案先制著之律令永爲定準犯者以違制論六月己丑幸鹿野苑庚子皇叔若薨秋七月戊辰龜兹國遣使獻名駞七十頭劉準遣將宼仇池隂平太守楊廣香擊走之八月分遣使者考察守宰問民疾苦丙戌詔罷諸州禽獸之貢丁亥勿吉國遣使朝獻九月丙辰曲赦京師龜兹國遣使獻大馬名駞珍寳甚衆冬十月壬辰詔員外散騎常侍鄭羲使於劉準十有一月庚戌詔曰懸爵於朝而有功者必縻其賞懸刑於市而有罪者必罹其辜斯乃古今之成典治道之實要諸州刺史牧民之官自頃以來遂各怠慢縱姦納賂背公緣私致令賊盜並興侵劫滋甚姦宄之聲屢聞朕聼朕承太平之運屬千載之期思光洪緒惟新庶績亦望蕃翰羣司敷德宣惠以助沖人共成斯美幸克己復禮思愆改過使寡昧無愧於祖宗百姓見德於當世有司明爲條禁稱朕意焉十有二月癸巳誅南郡王李恵是嵗州鎮二十餘水旱民飢開倉賑恤三年春正月癸丑坤徳六合殿成庚申詔罷行察官二月辛巳帝太皇太后幸代郡溫泉問民疾苦鰥貧者以宫女妻之己亥還宫壬寅乾象六合殿成三月甲辰曲赦京師戊午吐谷渾髙麗國各遣使朝獻夏四月壬申劉準遣使朝獻癸未樂浪王樂平薨辛卯蠕蠕國遣使朝獻丙申幸崞山己亥還宫庚子淮陽公尉元進爵爲王吐谷渾國遣使獻氂牛五十頭雍州刺史宜都王目辰有罪賜死五月丁巳帝祈雨於北苑閉陽門是日㴻雨大洽辛酉詔曰昔四代養老問道乞言朕雖冲昧每尚其美今賜國老各衣一襲綿五斤絹布各五疋六月辛未以雍州民饑開倉賑恤起文石室靈泉殿於方山秋七月壬寅詔宫人年老及疾病者免之八月壬申詔羣臣直言盡規靡有所隱乙亥幸方山起思逺佛寺丁丑還宫九月壬子以侍中司徒東陽王丕爲太尉侍中尚書右僕射趙郡公陳建爲司徒進爵魏郡王侍中尚書河南公茍頽爲司空進爵河東王侍中尚書太原公王叡進爵中山王侍中尚書隴東公張祐進爵新平王己未定州刺史安樂王長樂有罪徵詣京師賜死庚申隴西王源賀薨髙麗吐谷渾地豆干契丹厙莫奚龜兹諸國各遣使朝獻冬十月己巳朔大赦天下十有一月癸卯賜京師貧窮髙年疾患不能自存者衣服布帛各有差癸丑進假梁郡公元嘉爵爲假王督二將出淮隂隴西公元琛三將出廣陵河東公薛虎子三將出壽春蠕蠕率騎十餘萬南宼至塞而還十有二月粟特州逸河龔疊伏羅員濶悉萬斤諸國各遣使朝貢是年島夷蕭道成廢其主劉準而僭立自號曰齊四年春正月癸卯乾象六合殿成洮陽羌叛枹罕鎮將討平之隴西公元琛等攻剋蕭道成馬頭戍乙卯廣川王略薨雍州氐齊男王反殺美陽令州郡捕斬之丁巳罷畜鷹鷂之所以其地爲報德佛寺戊午襄城王韓頽有罪削爵徙邉蕭道成徐州刺史崔文仲宼淮北陷茬眉戍二月遣尚書游明根率騎二千南討癸巳詔曰朕承乾緒君臨海内夙興昧旦如履薄氷今東作方興庶類萌動品物資生膏雨不降歲一不登百姓饑之朕甚懼焉其敕天下祀山川羣神及能興雲雨者修飾祠堂薦以牲璧民有疾苦所在存問三月丙午詔車騎大將軍馮熙督衆迎還假梁郡王嘉等諸軍乙卯蠕蠕國遣使朝貢四月乙卯幸廷尉籍坊二獄引見諸囚詔曰廷尉者天下之平民命之所懸也朕得惟刑之恤者仗獄官之稱其任也一夫不耕將或受其餒一婦不織將或受其寒今農時要月百姓肆力之秋而愚民陷罪者甚衆宜隨輕重決遣以赴耕耘之業辛巳幸白登山甲申賜天下貧人一戸之内無雜財穀帛者廩一年五月丙申朔幸火山壬寅還宫六月丁卯以澍雨大洽曲赦京師以紬綾絹布百萬疋及南伐所俘賜王公已下秋七月辛亥行幸火山壬子改作東明觀詔會京師耆老賜錦綵衣服几杖稻米蜜麵復家人不徭役悉萬斤國遣使朝貢閏月丁亥幸虎圈親錄囚徒輕者皆免之壬辰頓丘王李鍾葵有罪賜死蕭道成角城戍主請舉城内屬八月丁酉詔徐州刺史假梁郡王嘉赴接之又遣平南將軍郎大檀三將出朐城將軍白吐頭二將出海西將軍元泰二將出連口將軍封匹三將出角城鎮南將軍賀羅出下蔡甲辰幸方山戊申幸武州山石窟寺庚戌還宫乙卯詔諸州置氷室蕭道成梁州刺史崔慧景遣長史裴叔保率衆宼武興關城氐帥楊鼠擊破之叔保還南鄭九月蕭道成汝南太守常元真龍驤將軍胡青茍率戸内屬乙亥思義殿成壬午東明觀成戊子詔曰隆寒雪降諸在徽纆及轉輸在都或有凍餒朕用愍焉可遣侍臣詣廷尉獄及有囚之所周廵省察饑寒者給以衣食桎梏者代以輕鏁假梁郡王嘉破蕭道成將盧紹之𤣥元度於朐山其下蔡戍主棄城遁走冬十月丁未詔昌黎王馮熙爲西道都督與征南將軍桓誕出義陽鎮南將軍賀羅自下蔡東出鍾離蘭陵民桓富殺其縣令與昌慮桓和北連太山羣盜張和顔等聚黨保五固推司馬朗之爲主詔淮陽王尉元等討之是歲詔以州鎮十八水旱民饑開倉賑恤五年春正月己卯車駕南廵丁亥至中山親見髙年問民疾苦二月辛卯朔大赦天下賜孝悌力田孤貧不能自存者穀帛有差免宫人年老者還其所親丁酉車駕幸信都存問如中山癸卯還中山己酉講武于唐水之陽庚戌車駕還都沙門法秀謀反伏誅南征諸將擊破蕭道成游擊將軍桓康於淮陽道成豫州刺史垣崇祖宼下蔡昌黎王馮熙撃破之假梁郡王嘉大破道成將俘獲三萬餘口送京師三月辛酉朔車駕幸肆州癸亥講武于雲水之陽所經考察守宰加以黜陟己巳車駕還宫詔曰法秀妖詐亂常妄說符瑞蘭臺御史張求等一百餘人招結奴𨽻謀爲大逆有司科以族誅誠合刑憲且矜愚重命猶所弗忍其五族者降止同祖三族止一門門誅止身夏四月己亥行幸方山建永固石室於山上立碑於石室之庭又銘太皇太后終制于金冊又起鑒𤣥殿壬子以南俘萬餘口班賜羣臣甲寅詔曰時雨不霑春苗萎悴諸有骸骨之處皆敕埋藏勿令露見有神祇之所悉可禱祈任城王雲薨五月庚申朔詔曰廼者邉兵屢動勞役未息百姓因之輕陷刑綱獄訟煩興四民失業朕毎念之用傷懐抱農時要月民須肆力其敕天下勿使有留獄久囚壬戌鄧至國遣使朝貢庚午青州主簿崔次恩聚衆謀叛州軍擊之次恩走郁洲六月甲辰中山王叡薨戊午封皇叔簡爲齊郡王猛爲安豐王秋七月甲子蕭道成遣使朝貢辛酉蠕蠕别帥他稽率衆内附甲戌班乞養雜戸及戸籍之制五條九月庚午閲武於南郊大饗羣臣蕭道成使車僧朗以班在劉準使殷靈誕之後辭不就席劉準降人解奉君刃僧朗於會中詔誅奉君等乙亥封昌黎王馮熙世子誕爲南平王兗州斬司馬朗之傳首京師冬十月癸卯蠕蠕國遣使朝貢十有二月癸巳詔以州鎮十二民饑開倉賑恤六年春正月甲戌大赦天下二月辛卯詔曰靈丘郡土旣褊塉又諸州路衝官私所經供費非一往年廵行見其勞瘁可復民租調十五年癸巳白蘭王吐谷渾翼世以誣罔伏誅乙未詔曰蕭道成逆亂江淮戎旗頻舉七州之民既有征運之勞深乖輕徭之義朕甚愍之其復常調三年戊申地豆于國遣使朝貢癸丑賜王公巳下清勤著稱者穀帛有差三月庚辰行幸虎圈詔曰虎狼猛暴食肉殘生取捕之日毎多傷害既無所益損費良多從今勿復捕貢辛巳幸武州山石窟寺賜貧老者衣服壬午幸方山是月蕭道成死子賾僭立夏四月甲辰賜畿内鰥寡孤獨不能自存者粟帛有差六月蠕蠕國遣使朝貢秋七月發州郡五萬人治靈丘道八月癸未朔分遣大使廵行天下遭水之處丐民租賦貧儉不自存者賜以粟帛庚子罷山澤之禁九月辛酉以氐楊後起爲武都王冬十有一月乙卯吐谷渾國遣使朝貢十有二月丁亥詔曰朕以寡薄政缺平和不能仰緝緯象蠲兹六沴去秋淫雨洪水爲災百姓嗷然朕用嗟愍故遣使者循方賑恤而牧守不思利民之道期於取辦愛毛反裘甚無謂也今課督未入及將來租筭一以丐之有司勉加勸課以要來穰稱朕意焉七年春正月庚申詔曰朕每思知百姓之所疾苦以增修寛政而明不燭逺寔有缺焉故具問守宰苛虐之狀於州郡使者秀孝計掾而對多不實甚乖朕虗求之意宜案以大辟明罔上必誅然情猶未忍可恕罪聼歸申下天下使知後犯無恕丁卯詔青齊光東徐四州之民戸運倉粟二十萬石送瑕丘琅邪復租筭一年三月甲戌以冀定二州民饑詔郡縣爲粥於路以食之又㢮闗津之禁任其去來夏四月庚子幸崞山賜所過鰥寡不能自存者衣服粟帛壬寅車駕還宫閏月癸丑皇子生大赦天下五月戊寅朔幸武州山石窟佛寺六月定州上言爲粥給饑人所活九十四萬七千餘口秋七月丁丑帝太皇太后幸神淵池甲申幸方山詔假員外散騎常侍李彪員外郎蘭英使於蕭賾濟南王羅㧞改封趙郡王九月壬寅詔曰朕承祖宗夙夜惟懼然聼政之際猶慮未周至於案文審獄思聞已過自今羣官奏事當獻可替否無或面從俾朕之過彰於逺近冀州上言爲粥給饑民所活七十五萬一千七百餘口冬十月戊午皇信堂成十有一月辛丑蕭賾遣使朝貢十有二月癸丑詔曰淳風行於上古禮化用乎近葉是以夏殷不嫌一族之婚周世始絶同姓之娶斯皆教隨時設治因事改者也皇運初基中原未混撥亂經綸日不暇給古風遺樸未遑釐改後遂因循迄茲莫變朕屬百年之期當後仁之政思易質舊式昭惟新自今悉禁絶之有犯以不道論庚午開林慮山禁與民共之詔以州鎮十三民饑開倉賑恤八年春正月詔隴西公元琛尚書陸叡爲東西二道大使襃善罰惡二月蠕蠕國遣使朝獻夏四月甲寅幸方山戊午車駕還宫庚申行幸旋鴻池遂幸崞山丁卯還宫五月己卯詔賑賜河南七州戍兵甲申詔員外散騎常侍李彪員外郎蘭英使於蕭賾六月丁卯詔曰置官班祿行之尚矣周禮有食祿之典二漢著受俸之秩逮于魏晉莫不聿稽往憲以經綸治道自中原喪亂兹制中絶先朝因循未遑釐改朕永鑒四方求民之瘼夙興昧旦至於憂勤故憲章舊典始班俸祿罷諸商人以簡民事戸增調三匹穀二斛九斗以爲官司之祿均預調爲二匹之賦即兼商用雖有一時之煩終克永逸之益祿行之後贓滿一匹者死變法改度宜爲更始其大赦天下與之惟新戊辰武州水泛濫壊民居舎秋七月乙未行幸方山石窟寺八月甲辰詔曰帝業至重非廣詢無以致治王務至繁非博採無以興功先王知其如此故虚己以求過明恕以思咎是以諫鼓置於堯世謗木立於舜庭用能耳目四逹庶類咸熙朕承累聖之洪基屬千載之昌運每布遐風景行前式承明之初班下内外聽人各盡規以補其闕中㫖雖宣允稱者少故變時法逺遵古典班制俸祿改更刑書寛猛未允人或異議思言者莫由申情求諫者無因自逹故令上明不周下情壅塞今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世事之要使言之者無罪聞之者足以爲戒九月甲午蕭賾遣使朝貢戊戌詔曰俸制已立宜時班行其以十月爲首每季一請於是内外百官受祿有差冬十月髙麗國遣使朝貢蕭賾雙城戍主王繼宗内屬十有一月乙未詔員外散騎常侍李彪員外郎蘭英使於蕭賾十有二月詔以州鎮十五水旱民饑遣使者循行問所疾苦開倉賑恤九年春正月戊寅詔曰圖讖之興起於三季既非經國之典徒爲妖邪所憑自今圖讖祕緯及名爲孔子閉房記者一皆焚之留者以大辟論又諸巫覡假稱神鬼妄說吉凶及委巷諸卜非墳典所載者嚴加禁斷癸未大饗羣臣于太華殿班賜皇誥二月己亥制皇子封王者皇孫及曾孫紹封者皇女封者歳祿各有差以廣陽王建第二子嘉紹建後爲廣陽王乙巳詔曰昔之哲王莫不博採下情勤求箴諫建設旌鼓詢納芻蕘朕班祿刪刑慮不周允虗懐讜直思顯洪猷百司卿士及工商吏民其各上書極諫靡有所隱三月丙申宕昌國遣使朝貢封皇弟禧爲咸陽王幹爲河南王羽爲廣陵王雍爲潁川王勰爲始平王詳爲北海王夏四月癸丑幸方山甲寅還宫五月髙麗國及蕭賾並遣使朝貢六月辛亥幸方山遂幸靈泉池丁巳還宫秋七月丙寅朔新作諸門癸未遣使拜宕昌王梁彌機兄子彌承爲其國王戊子幸魚池登青原岡甲午還宫八月己亥行幸彌澤甲寅登牛頭山庚申詔曰數州災水饑饉荐臻致有賣鬻男女者天之所譴在予一人而百姓無辜横罹艱毒朕用殷憂夕惕忘食與寢今自太和六年巳來買定冀幽相四州饑民良口者盡還所親雖娉爲妻妾遇之非理情不樂者亦離之甲子還宫冬十月丁未詔曰朕承乾在位十有五年毎覽先王之典經綸百氏儲畜既積黎元永安爰暨季葉斯道陵替富强者并兼山澤貧弱者望絶一廛致令地有遺利民無餘財或爭畝畔以亡身或因饑饉以棄業而欲天下太平百姓豐足安可得哉今遣使者循行州郡與牧守均給天下之田還受以生死爲斷勸課農桑興富民之本戊申髙麗吐谷渾國並遣使朝貢辛酉侍中司徒魏郡王陳建薨詔員外散騎常侍李彪尚書郎公孫阿六頭使蕭賾十有二月乙卯侍中淮南王他爲司徒蠕蠕犯塞詔任城王澄率衆討之是年京師及州鎮十三水旱傷稼宕昌髙麗吐谷渾等國並遣使朝貢魏書卷七上魏書卷七上考證髙祖紀武都王反攻仇池綱目癸丑冬十月武都王楊僧嗣卒弟文度立降魏卽延興三年事也本卷後云劉準葭蘆戍主楊文度遣弟鼠襲陷仇池不稱武都王此云武都王反攻仇池又不稱姓名莫可詳也唯止本部丞已下準次而授唯止二字監本作推上今依北史改乾象六合殿成臣人龍按本卷前云太和三年二月壬寅訖象六合殿成此處又云四年正月癸卯乾象六合殿成何句爲正何句爲重不可考矣魏書卷七上考證欽定四庫全書魏書卷七下齊魏収撰帝紀第七髙祖紀下十年春正月癸亥朔帝始服衮冕朝饗萬國壬午蠕蠕犯塞二月甲戌初立黨里隣三長定民戸籍三月丙申蠕蠕國遣使朝貢庚申蕭賾遣使朝貢夏四月辛酉朔始制五等公服甲子帝初以法服御輦祀於西郊癸酉幸靈泉池戊寅車駕還宫是月髙麗吐谷渾國並遣使朝貢六月辛酉幸方山己卯名皇子曰恂大赦天下秋七月戊戌幸方山八月乙亥給尚書五等品爵已上朱衣玉珮大小組綬九月辛卯詔起明堂辟雍冬十月癸酉有司議依故事配始祖於南郊十有一月議定州郡縣官依戸給俸十有二月壬申蠕蠕犯塞癸未勿吉國遣使朝貢乙酉詔以汝南潁川大饑丐民田租開倉賑恤十有一年春正月丁亥朔詔定樂章非雅者除之二月甲子詔以肆州之鴈門及代郡民饑開倉賑恤夏四月己未吐谷渾國遣使朝貢五月壬辰幸靈泉池遂幸方山癸巳南平王渾薨甲午車駕還宫詔復七廟子孫及外戚緦服已上賦役無所與詔南部尚書公孫文慶上谷張伏干率衆南討舞隂山闕髙麗吐谷渾國遣使朝貢六月辛巳秦州民饑開倉賑恤癸未詔曰春旱至今野無青草上天致譴寔由匪德百姓無辜將罹饑饉寤寐思求罔知所益公卿内外股肱之臣謀猷所寄其極言無隱以救民瘼秋七月己丑詔曰今年穀不登聼民出關就食遣使者造籍分遣去留所在開倉賑恤八月壬申蠕蠕犯塞遣平原王陸叡討之事具蠕蠕傳庚辰大議北伐進策者百有餘人辛巳罷山北苑以其地賜貧民悉萬斤國遣使朝獻九月庚戌詔曰去夏以歲旱民饑須遣就食舊籍雜亂難可分簡故依局割民閲戸造籍欲令去留得實賑貸平均然廼者以來猶有餓死衢路無人収識良由本部不明籍貫未實廩恤不周以至於此朕猥居民上聞用慨然可重遣精檢勿令遺漏冬十月辛未詔罷起部無益之作出宫人不執機杼者甲戌詔曰鄉飲禮廢則長幼之叙亂孟冬十月民閑歲隙宜於此時導以徳義可下諸州黨里之内推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞十有一月丁未詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡太官雜器太僕乗具内庫弓矢出其大半班賚百官及京師士庶下至工商皂隸逮於六鎮戍士各有差戊申詔曰朕惟上政不明令民䧟身罪戾今寒氣勁切杖捶難任自今月至來年孟夏不聽拷問罪人又歲旣不登民多饑窘輕繫之囚宜速決了無令薄罪久留獄犴十有二月詔祕書丞李彪著作郎崔光改析國記依紀傳之體是歲大饑詔所在開倉賑恤十有二年春正月辛巳朔初建五牛旌旗乙未詔曰鎭戍流徙之人年滿七十孤單窮獨雖有妻妾而無子孫諸如此等聽解名還本諸犯死刑者父母祖父母年老更無成人子孫旁無朞親者具狀以聞二月壬戌髙麗國遣使朝貢三月丁亥宕昌國遣使朝獻中散梁衆保等謀反伏誅夏四月髙麗吐谷渾國並遣使朝貢蕭賾將陳顯達等宼邉甲寅詔豫州刺史元斤率衆禦之甲子大赦天下乙丑幸靈泉池下卯遂幸方山己巳還宫陳顯達攻陷醴陽左僕射長樂王穆亮率騎一萬討之五月丁酉詔六鎮雲中河西及闗内六郡各修水田通渠漑灌壬寅增置彜器於太廟六月甲寅宕昌國遣使朝貢秋七月己丑幸靈泉池遂幸方山己亥還宫八月甲子勿吉國貢楛矢石砮九月吐谷渾宕昌國遣使朝貢甲午詔曰日月薄蝕隂陽之恒度耳聖人懼人君之放怠因之以設誡故稱日蝕修德月蝕修刑廼癸巳夜月蝕盡公卿已下宜愼刑罰以答天意丁酉起宣文堂經武殿癸卯侍中司徒淮南王他薨吐谷渾宕昌武興諸國各遣使朝貢閏月甲子帝觀築圜丘於南郊乙丑髙麗國遣使朝貢辛未幸靈泉池癸酉還宫十有一月詔以二雍豫三州民饑開倉賑恤梁州刺史臨淮王提坐貪縱徙配北鎮十有二月蠕蠕伊吾戍主髙羔子率衆三千以城内附以侍中安豐王猛爲開府儀同三司十有三年春正月辛亥車駕有事於圜丘於是初備大駕乙丑兗州民王伯恭聚衆勞山自稱齊王東萊鎭將孔伯孫討斬之戊辰蕭賾遣衆宼邊淮陽太守王僧儁擊走之二月壬午髙麗國遣使朝獻庚子引羣臣訪政道得失損益之宜三月甲子吐谷渾國遣使朝獻夏州刺史章武王彬以貪賕削封夏四月丁丑詔曰昇樓散物以賚百姓至使人馬騰踐多有毁傷今可斷之以本所費之物賜窮老貧獨者丁亥幸靈泉池遂幸方山己丑還宫吐谷渾國遣使朝貢州鎭十五大饑詔所在開倉賑恤五月庚戌車駕有事於方澤六月汝隂王天賜南安王楨並坐贓賄免爲庶人髙麗國遣使朝貢秋七月甲辰隂平國遣使朝貢丙寅幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師八月乙亥詔兼員外散騎常侍邢產兼員外散騎侍郎侯靈紹使於蕭賾戊子詔諸州鎭有水田之處各通漑灌遣匠者所在指授中尺國遣使朝貢九月丁未吐谷渾武興宕昌諸國各遣使朝獻出宫人以賜北鎮人貧鰥無妻者冬十月甲申髙麗國遣使朝貢十有一月己未安豐王猛薨十有二月丙子侍中司空河東王茍頽薨甲午蕭賾遣使朝貢己亥以尚書令尉元爲司徒左僕射穆亮爲司空是歲蠕蠕别帥叱吕勤率衆内附十有四年春正月乙丑行幸方山二月辛未行幸靈泉池壬申還宫戊寅初詔定起居注制己卯詔遣侍臣循行州郡問民疾苦三月壬申吐谷渾宕昌武興隂平諸國並遣使朝貢夏四月地豆千頻犯塞甲戌征西大將軍陽平王熙擊走之甲午詔兼員外散騎常侍邢產兼員外散騎侍郎蘇季連使於蕭賾五月己酉厙莫奚犯塞安州都將樓龍兒擊走之沙門司馬惠御自言聖王謀破平原郡擒獲伏誅秋七月甲辰詔罷都牧雜制丙午行幸方山丙辰遂幸靈泉池髙麗國遣使朝貢八月丙寅朔車駕還宫辛卯宕昌國遣使朝貢詔議國之行次九月癸丑太皇太后馮氏崩壬戌髙麗國遣使朝貢詔聽蕃鎭曾經内侍者前後奔赴冬十月戊辰詔曰自丁荼苦奄踰晦朔仰遵遺㫖祖奠有期朕將親侍龍輿奉訣陵隧諸常從之具悉可停之其武衞之官防侍如法癸酉葬文明太皇太后於永固陵甲戌車駕謁永固陵羣臣固請公除帝不許己卯車駕謁永固陵庚辰帝居廬引見羣寮於太和殿太尉東陽王丕等據權制固請帝引古禮往復羣臣乃止詔在禮志京兆王太興有罪免官削爵詔曰公卿屢依金冊遺㫖中代權式請過葬卽吉朕思遵逺古終三年之制依禮旣虞卒哭此月二十一日授服以葛易麻旣衰服在上公卿不得獨釋於下故於朕之授服變從練禮已下復爲節降斟酌今古以制厥𠂻且取遺㫖速除之一端粗申臣子罔極之巨痛癸未詔曰朕逺遵古式欲終三年之禮百辟羣官據金冊顧命將奪朕心從先朝之制朕仰惟金冊俯自推省取諸二𠂻不許衆議以衰服過朞終四節之慕又奉聖訓聿修誥㫖不敢闇嘿自居以曠機政庶不愆遺令之意差展哀慕之情普下州鎭長至三元絶告慶之禮甲申車駕謁永固陵辛卯詔曰羣官以萬幾事重請求聽政朕仰祗遺命亦思無怠但哀慕纒綿心神迷塞未堪自力以親政事近侍先掌機衡者皆謀猷所寄且可任之如有疑事當時與論決十有一月甲寅詔曰垂及至節感慕崩摧凡在臣列誰不哽切内外職人先朝班次及諸方雜客冬至之日盡聽入臨三品以上衰服者至夕復臨其餘唯旦臨而已其拜哭之節一依别儀丁巳蕭賾遣使朝貢十有二月壬午詔依凖邱井之式遣使與州郡宣行條制隱口漏丁卽聽附實若朋附豪勢陵抑孤弱罪有常刑十五年春正月丁卯帝始聽政於皇信東室初分置左右史官吐谷渾國遣使朝貢二月乙亥枹罕鎭將長孫百年請討吐谷渾所置洮陽泥和二戍許之己丑蕭賾遣使朝貢三月甲辰車駕謁永固陵己酉悉萬斤等五國遣使朝貢夏四月癸亥帝始進蔬食乙丑謁永固陵自正月不雨至于癸酉有司奏祈百神詔曰昔成湯遇旱齊景逄災並不由祈山川而致雨皆至誠發中㴻潤千里萬方有罪在予一人今普天喪恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便欲祀事唯當考躬責己以待天譴甲戌詔員外散騎常侍李彪尚書郎公孫阿六頭使於蕭賾己卯經始明堂改太廟五月己亥議改律令於東明觀折疑獄乙卯百年攻洮陽泥和二戍克之俘獲三千餘人詔悉免歸髙麗國遣使朝獻丙辰詔造五輅六月丁未濟隂王鬱以貪殘賜死秋七月乙丑謁永固陵規建夀陵戊寅吐谷渾國遣使朝貢己卯詔議祖宗以道武爲太祖乙酉車駕廵省京邑聽訟而還八月壬辰議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之戊戌移道壇於桑乾之隂改曰崇虚寺己亥詔諸州舉秀才先盡才學乙巳親定禘祫之禮丁巳議律令事仍省雜祀九月辛巳蕭賾遣使朝貢壬午吐谷渾髙麗宕昌鄧至諸國並遣使朝獻冬十月庚寅車駕謁永固陵是月明堂太廟成十有一月丁卯遷七廟神主於新廟乙亥大定官品戊寅考諸牧守詔假通直散騎常侍李彪假散騎侍郎蔣少遊使蕭賾丙戌初罷小歲賀丁亥詔二千石考在上上者假四品將軍賜乗黄馬一匹上中者五品將軍上下者賜衣一襲十有二月壬辰遷社於内城之西癸巳班賜刺史已下衣冠以安定王休爲太傅齊郡王簡爲太保帝爲髙麗王璉舉哀於城東行宫己酉車駕迎春於東郊辛亥詔簡選樂官十有六年春正月戊午朔饗羣臣於太華殿帝始爲王公興懸而不樂己未宗祀顯祖獻文皇帝於明堂以配上帝遂升靈臺以觀雲物降居青陽左个布政事毎朔依以爲常辛酉始以太祖配南郊壬戌詔定行次以水承金甲子詔罷祖祼疑乙丑制諸逺屬非太祖子孫及異姓爲王皆降爲公公爲侯侯爲伯子男仍舊皆除將軍之號戊辰帝臨思義殿策問秀孝丙子始以孟月祭廟二月戊子帝移御永樂宫庚寅壊太華殿經始太極殿辛卯罷寒食饗壬辰幸北部曹歴觀諸省廵省京邑聽理寃訟甲午初朝日于東郊遂以爲常丁酉詔祀唐堯於平陽虞舜於廣寗夏禹於安邑周文於洛陽丁未改諡宣尼曰文聖尼父告諡孔廟三月丁卯廵省京邑癸酉省西郊郊天雜事乙亥車駕初迎氣南郊自此爲常辛巳以髙麗王璉孫雲爲其國王蕭賾遣使朝貢是月髙麗鄧至國並遣使朝貢四月丁亥朔班新律令大赦天下癸巳契齧國遣使朝貢甲寅幸皇宗學親問博士經義五月癸未詔羣臣於皇信堂更定律條流徒限制帝親臨決之六月己丑髙麗國遣使朝貢甲辰詔曰務農重穀王政所先勸率田疇君人常事今四氣休序時澤滂潤宜用天分地悉力東畝然京師之民遊食者衆不加督勸或芸耨失時可遣明使撿察勤惰以聞秋七月庚申吐谷渾世子賀虜頭來朝壬戌詔曰王者設官分職垂拱責成振網舉綱衆目斯理朕德謝知人豈能一見鑒識徒乖爲君委授之義自今選舉每以季月本曹與吏部銓簡甲戌詔兼員外散騎常侍宋弁兼員外散騎侍郎房亮使於蕭賾八月庚寅車駕初夕月於西郊遂以爲常辛卯髙麗國遣使朝貢乙未詔陽平王賾左僕射陸叡督十二將七萬騎北討蠕蠕丙午宕昌王梁彌承來朝司徒尉元以老遜位己酉以尉元爲三老游明根爲五更又養國老庶老將行大射之禮雨不克成癸丑詔曰文武之道自古並行威福之施必也相藉故三五至仁尚有征伐之事夏殷明叡未捨兵甲之行然則天下雖平忘戰者殆不教民戰可謂棄之是以周立司馬之官漢置將軍之職皆所以輔文强武威肅四方者矣國家雖崇文以懐九服修武以寧八荒然於習武之方猶爲未盡今則訓文有典敎武闕然將於馬射之前先行講武之式可勑有司豫修塲埓其列陣之儀五戎之數别俟後勑九月甲寅朔大序昭穆於明堂祀文明太皇太后於𤣥室辛未帝以文明太皇太后再周忌日哭於陵左絶膳三日哭不輟聲辛巳武興王楊集始來朝冬十月乙酉鄧至國遣使朝獻己亥以太傅安定王休爲大司馬特進馮誕爲司徒甲辰詔以功臣配饗太廟丙午髙麗國遣使朝獻庚戌太極殿成大饗羣臣十有一月乙卯依古六寢權制三室以安昌殿爲内寢皇信堂爲中寢四下疑爲外寢十有二月賜京邑老人鳩杖是月蕭賾遣使朝貢十有七年春正月壬子朔帝饗百寮於太極殿乙丑詔曰夫駿奔入覲臣下之常式錫馬賜車君人之恒惠今諸邊君蕃𦙍皆䖍集象魏趨鏘紫庭貢饗旣畢言旋無逺各可依秩賜車旗衣馬務令優厚其武興宕昌各賜錦繒纊一千吐谷渾世子八百鄧至世子雖因緣至都亦宜賚及可賜三百命數之差皆依别牒詔兼員外散騎侍郎劉承叔使於蕭賾乙亥勿吉國遣使朝獻丙子以吐谷渾伏連籌爲其國王庚辰蠲大司馬安定王休太保齊郡王簡朔望之朝二月乙酉詔賜議律令之官各有差己酉車駕始籍田於都南三月戊辰改作後宫帝幸永興園徙御宣文堂吐谷渾國遣使朝獻夏四月戊戌立皇后馮氏是月蕭賾征虜將軍直閤將軍蠻酋田益宗率部落四千餘戸内屬五月乙卯宕昌隂平契丹厙莫奚諸國並遣使朝獻壬戌宴四廟子孫於宣文堂帝親與之齒行家人之禮甲子帝臨朝堂引見公卿已下決疑政錄囚徒丁丑以旱撤膳襄陽蠻酋雷婆思等率一千三百餘戸内徙居於太和川六月丙戌帝將南伐詔造河橋己丑詔免徐南豫陜岐東徐洛豫七州軍糧乙未講武乙巳詔曰六職備于周經九列炳於漢晉務必有恒人守其職比百秩雖陳事典未叙自八元樹位躬加省覽逺依往籍近採時宜作職員令二十一卷事廹戎期未善周悉雖不足綱範萬度永垂不朽且可釋滯目前釐整時務須待軍回更論所闕權可付外施行其有當局所疑而令文不載者隨事以聞當更附之立皇子恂爲皇太子戊申髙麗國遣使朝獻秋七月癸丑以皇太子立詔賜民爲人後者爵一級爲公士曾爲吏屬者爵二級爲上造鰥寡孤獨不能自存者人粟五斛戊午中外戒嚴是月蕭賾死孫昭業僭立八月乙酉三老山陽郡公尉元薨丙戌車駕類於上帝遂臨尉元喪丁亥帝辭永固陵己丑車駕發京師南伐步騎百餘萬太尉丕奏請以宫人從詔曰臨戎不語内事宜停來請壬寅車駕至肆州民年七十已上賜爵一級路見眇跛者停駕親問賜衣食終身戊申幸并州親見髙年問所疾苦九月壬子詔兼員外散騎常侍髙聰兼員外散騎侍郎賈禎使於蕭昭業丁巳詔以車駕所經傷民秋稼者畝給榖五斛戊辰濟河詔洛懐并肆所過四州之民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡孤獨不能自存者粟人五斛帛二匹孝悌廉義文武應求者皆以名聞又詔厮養之戸不得與士民㛰有文武之才積勞應進者同庶族例聽之庚午幸洛陽周廵故宫基址帝顧謂侍臣曰晉德不修早傾宗祀荒毁至此用傷朕懐遂詠黍離之詩爲之流涕壬申觀河橋幸太學觀石經乙亥鄧至王像舒彭遣子舊詣闕朝貢并奉表求以位授舊詔許之丙子詔六軍發軫丁丑戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月戊寅朔幸金墉城詔徵司空穆亮與尚書李沖將作大匠董爵經始洛京己卯幸河南城乙酉幸豫州癸巳次於石濟乙未解嚴設壇於滑臺城東告行廟以遷都之意大赦天下起滑臺宫又詔京師及諸州從戎者賜爵一級應募者加二級主將加三級癸卯幸鄴城乙巳詔安定王休率從官迎家於代京車駕送於漳水上初帝之南伐也起宫殿於鄴西十有一月癸亥宫成徙御焉十有二月戊寅廵省六軍庚寅隂平國遣使朝貢乙未詔隱恤軍士死亡疾病務令優給十有八年春正月丁未朔朝羣臣於鄴宫澄鸞殿丁巳髙麗國遣使朝獻癸亥車駕南廵詔相兗豫三州百年以上假縣令九十以上賜爵二級七十以上賜爵一級孤老鰥寡不能自存者賜粟五石帛二疋孝悌廉義文武應求者皆以名聞戊辰經殷比干之墓祭以太牢乙亥幸洛陽西宫二月己丑行幸河隂規建方澤之所丙申河南王幹徙封趙郡潁川王雍徙封髙陽壬寅車駕北廵癸卯濟河蕭昭業遣使朝貢甲辰詔天下喻以遷都之意閏月癸亥次句注陘南皇太子朝于蒲池壬申至平城宫癸酉臨朝堂部分遷留甲戌謁永固陵三月庚辰罷西郊祭天壬辰帝臨太極殿諭在代羣臣以遷移之略夏五月乙亥詔罷五月五日七月七日饗六月己巳詔兼員外散騎常侍盧昶兼員外散騎侍郎王清石使於蕭昭業秋七月乙亥以宋王劉昶爲大將軍壬午侍中大司馬安定王休薨辛卯髙麗國遣使朝貢壬辰車駕北廵戊戌謁金陵辛丑幸朔州是月島夷蕭鸞殺其主蕭昭業立昭業弟昭文八月癸卯皇太子朝於行宫甲辰行幸隂山觀雲川丁未幸閲武臺臨觀講武癸丑幸懐朔鎭己未幸武川鎭辛酉幸撫冥鎮甲子幸柔𤣥鎭乙丑南還所過皆親見髙年問民疾苦貧窘孤老賜以粟帛丙寅詔六鎮及禦夷城人年八十以上而無子孫兄弟終身給其廩粟七十以上家貧者各賜粟十斛又詔諸北城人年滿七十以上及廢疾之徒校其元犯以凖新律事當從坐者聽一身還鄉又令一子扶養終命之後乃遣歸邊自餘之處如此之犯年八十以上皆聽還戊辰車駕次旋鴻池庚午謁永固陵辛未還平城宫九月壬申朔詔曰三載考績自古通經三考黜陟以彰能否今若待三考然後黜陟可黜者不足爲遲可進者大成賖緩是以朕今三載一考考卽黜陟欲令愚滯無妨於賢者才能不壅於下位各令當曹考其優劣爲三等六品以下尚書重問五品以上朕將親與公卿論其善惡上上者遷之下下者黜之中中者守其本任壬午帝臨朝堂親加黜陟壬辰隂平王楊炅來朝冬十月甲辰以太尉東陽王丕爲太傅戊申親告太廟奉遷神主辛亥車駕發平城宫壬戌次於中山之唐湖乙丑分遣侍臣廵問民所疾苦己巳幸信都庚午詔曰比聞緣邊之蠻多有竊掠致有父子乖離室家分絶旣虧和氣有傷仁厚方一區宇子育萬姓若茍如此南人豈知朝徳哉可詔荆郢東荆三州勒勑蠻民勿有侵暴是月蕭鸞廢殺其主蕭昭文而僭立十有一月辛未朔詔冀定二州民百年以上假以縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡孤獨不能自存者賜以穀帛孝義廉貞文武應求者具以名聞丁丑車駕幸鄴甲申經比干之墓傷其忠而獲戾親爲弔文樹碑而刋之己丑車駕至洛陽蕭鸞雍州刺史曹虎據襄陽請降十有二月辛丑朔遣行征南將軍薛真度督四將出襄陽大將軍劉昶出義陽徐州刺史元衍出鍾離平南將軍劉藻出南鄭壬寅革衣服之制癸卯詔中外戒嚴戊申優復代遷之戸租賦三歲己酉詔王公侯伯子男開國食邑者王食半公三分食一侯伯四分食一子男五分食一辛亥車駕南伐丁卯詔郢豫二州之民百齡以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡鰥老不能自存者賜以穀帛緣路之民復田租一歲孝悌廉義文武應求具以名聞戊辰車駕至懸瓠己巳詔夀陽鍾離馬頭之師所獲男女之口皆放還南十有九年春正月辛未朔朝饗羣臣於懸瓠癸酉詔禁淮北之民不得侵掠犯者以大辟論甲戌檄喻蕭鸞丙子鸞龍陽縣開國侯王朗自渦陽來降壬午講武於汝水之西大賚六軍丙申平南將軍王肅頻破蕭鸞將擒其寧州刺史董巒己亥車駕濟淮二月甲辰幸八公山路中雨甚詔去蓋見軍士病者親隱恤之戊申車駕廵淮而東民皆安堵租運屬路壬子髙麗國遣使朝獻丙辰車駕至鍾離戊午軍士擒蕭鸞三千卒帝曰在君爲君其民何罪於是免歸辛酉車駕發鍾離將臨江水司徒馮誕薨壬戌乃詔班師丁卯遣使臨江數蕭鸞殺主自立之罪惡三月戊寅幸邵陽戊子太師馮熙薨乙未幸下邳鄧至國遣使朝貢夏四月庚子車駕幸彭城辛丑帝爲太師馮熙舉哀於行在所丁未曲赦徐豫二州其運漕之士復租賦三年辛亥詔賜百歲以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤寡老疾不能自存者賜以榖帛德著邱園者具以名聞蕭鸞民降者給復十五年癸丑幸小沛遣使以太牢祭漢髙祖廟己未行幸瑕邱遣使以太牢祠岱岳詔宿衞武官增位一級庚申行幸魯城親祠孔子廟辛酉詔拜孔氏四人顔氏二人爲官詔兗州刺史舉部内士人才堪軍國及守宰治行具以名聞又詔賜兗州民爵及粟帛如徐州又詔選諸孔宗子一人封崇聖侯邑一百戸以奉孔子之祀又詔兗州爲孔子起園柏修飾墳壠更建碑銘襃揚聖德戊辰行幸碻磝太和廟成五月己巳城陽王鸞赭陽失利降爲定襄縣王廣川王諧薨庚午遷文成皇后馮氏神主于太和廟甲戌行幸滑臺丙子次于石濟庚辰皇太子朝於平桃城髙麗吐谷渾國並遣使朝貢癸未車駕至自南伐告于太廟甲申減閑官祿以禆軍國之用乙酉行飲至之禮班賜有差甲午皇太子冠於廟六月己亥詔不得以北俗之語言於朝廷若有違者免所居官辛丑詔復軍士從駕渡淮者租賦三年癸卯詔皇太子赴平城宫壬子詔濟州東郡滎陽及河南諸縣車駕所經者百年以上賜假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤老鰥寡不能自存賜以穀帛孝悌廉義文武應求者具以名聞癸丑詔求天下遺書祕閣所無有禆益時用者加以優賞乙卯曲赦梁州復民田租三歲丙辰詔遷洛之民死葬河南不得還北於是代人南遷者悉爲河南洛陽人戊午詔改長尺大斗依周禮制度班之天下八月甲辰幸西宫路見壞冢露棺駐輦殣之乙巳詔選天下武勇之士十五萬人爲羽林虎賁以充宿衞丁巳詔諸從兵從征被傷者皆聽還本金墉宫成甲子引羣臣歴宴殿堂九月庚午六宮及文武盡遷洛陽丙戌行幸鄴丁亥詔曰諸有舊墓銘記見存昭然爲時人所知者三公及位從公者去墓三十步尚書令僕九列十五步黄門五校十步各不聽墾殖壬辰遣黄門郎以太牢祭比干之墓乙未車駕還宮冬十月甲辰曲赦相州民百年以上假郡守九十以上假縣令八十以上賜爵三級七十以上賜爵二級孤老痼疾不能自存者賜以穀帛丙辰車駕至自鄴辛酉詔州郡諸有士庶經行脩敏文思遒逸才長吏治堪幹政事者以時發遣壬戌詔諸州牧精品屬官考其得失爲三等之科以聞將親覽而升降焉詔徐兗光南青荆洛六州纂嚴戎備應須赴集十有二月行幸委粟山議定圜丘甲申有事於圜丘丙戌大赦天下十有二月乙未朔引見羣臣於光極堂宣示品令爲大選之始辛酉驃騎大將軍司州牧咸陽王禧爲長兼太尉前南安王楨復本封以特進廣陵王羽爲征東大將軍開府儀同三司青州刺史甲子引見羣臣於光極堂班賜冠服二十年春正月丁卯詔改姓爲元氏壬辰改封始平王勰爲彭城王以定襄縣王鸞復封城陽王二月辛丑帝幸華林聽訟於都亭壬寅詔自非金革聽終三年喪丙午詔畿内七十以上暮春赴京師將行養老之禮庚戌幸華林聽訟於都亭癸丑詔介山之邑聽爲寒食自餘禁斷三月丙寅宴羣臣及國老庶老於華林園詔國老黄耉以上假中散大夫郡守耆年以上假給事中縣令庶老直假郡縣各賜鳩杖衣裳丁丑詔諸州中正各舉其鄉之民望年五十以上守素衡門者授以令長夏四月甲辰廣州刺史薛法護南叛五月丙子詔曰農惟政首稷實民先澍雨豐洽所宜敦勵其令畿内嚴加課督墮業者申以楚撻力田者具以名聞丙戌初營方澤於河隂遣使者以太牢祭漢光武及明章三帝陵又詔漢魏晉諸帝陵各禁方百步不得樵蘇踐蹋丁亥車駕有事於方澤七月廢皇后馮氏戊寅帝以久旱咸秩羣神自癸未不食至於乙酉是夜澍雨大洽丁亥詔曰炎陽爽節秋零卷澍在予之責實深悚慄故輟膳三晨以命上訴靈鑒誠欵曲流雲液雖休勿休寧敢愆怠將有賢人湛德髙士凝棲雖加銓採未能招致其精訪幽谷舉兹賢彥直言極諫匡予不及又邪佞毁朝固唯治蠧貪夫竊位大政以虧主者彈劾不肖明黜盜祿又法爲治要民命尤重在京之囚悉命條奏朕將親案以時議決又疾苦六極人神所矜宜時訪恤以拯窮廢鰥寡困乏不能自存者明加矜恤令得存濟又輕徭薄賦君人常理歲中恒役具以狀聞又夫婦之道生民所先仲春奔會禮有逹式男女失時者以禮會之又京民始業農桑爲本田稼多少課督不具以狀言八月壬辰朔幸華林園親錄囚徒咸降本罪二等決遣之戊戌車駕幸嵩髙甲寅還宮丁巳南安王楨薨幸華林園聽訟九月戊辰車駕閲武於小平津癸酉還宫丁亥將通洛水入穀帝親臨觀冬十月戊戌以代遷之士皆爲羽林虎賁司州之民十二夫調一吏爲四年更卒歲開番假以供公私力役己酉曲赦京師十有一月乙酉復封前汝隂王天賜孫景和爲汝隂王前京兆王太興爲西河王閏月丙辰右將軍元隆大破汾州叛胡十有二月甲子以西北州郡旱儉遣侍臣循察開倉賑恤乙丑開鹽池之禁與民共之丙寅廢皇太子恂爲庶人丁卯告太廟戊辰置常平倉恒州刺史穆泰等在州謀反遣行吏部尚書任城王澄案治之樂陵王思譽坐知泰隂謀不告削爵爲庶人二十有一年春正月丙申立皇子恪爲皇太子賜天下爲父後者爵一級己亥遣兼侍中張彜崔光兼散騎常侍劉藻廵方省察問民疾苦黜陟守宰宣揚風化乙巳車駕北廵二月壬戌次於太原親見髙年問所不便乙丑詔并州士人年六十已上假以郡守先是定州民王金鈎訛言惑衆自稱應王丙寅州郡捕斬之癸酉車駕至平城甲戌謁永固陵癸未行幸雲中三月庚寅車駕至自雲中辛卯謁金陵乙未車駕南廵己酉次離石叛胡歸罪宥之甲寅詔汾州民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級丙辰車駕次平陽遣使者以太牢祭唐堯夏四月庚申幸龍門遣使者以太牢祭夏禹癸亥行幸蒲坂遣使者以太牢祭虞舜戊辰詔脩堯舜夏禹廟辛未行幸長安壬申武興王楊集始來朝乙亥親見髙年問所疾苦丙子遣侍臣分省縣邑賑賜穀帛戊寅幸未央殿阿房宫遂幸昆明池癸未大將軍宋王劉昶薨丙戌遣使者以太牢祀漢帝諸陵五月丁亥朔衞大國遣使朝貢己丑車駕東旋汎渭入河庚寅詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣令七十以上假荒縣庶老以年各減一等七十以上賜爵三級其營船之夫賜爵一級孤寡鰥貧窮痾廢疾各賜帛二匹穀五斛其孝友德義文學才幹悉仰貢舉壬辰遣使者以太牢祭周文王於酆祭武王於鎬癸卯遣使祭華嶽六月庚申車駕至自長安壬戌詔冀定瀛相濟五州發卒二十萬將以南討癸亥司空穆亮遜位丁卯部分六師以定行留秋七月甲午立昭儀馮氏爲皇后戊辰以前司空穆亮爲征北大將軍開府儀同三司冀州刺史甲寅帝親爲羣臣講喪服於清徽堂八月丙辰詔中外戒嚴壬戌立皇子愉爲京兆王懌爲清和王懐爲廣平王壬中行幸河南城甲戌講武於華林園庚辰車駕南討九月丙申詔曰哀貧恤老王者所先鰥寡六疾尤宜矜愍可勑司州洛陽之民年七十已上無子孫六十以上無朞親貧不自存者給以衣食及不滿六十而有廢痼之疾無大功之親窮困無以自療者皆於别坊遣醫救護給醫師四人豫請藥物以療之丁酉詔河南尹李崇討梁州叛𦍑受征西源懐節度辛丑帝留諸將攻赭陽引師而南癸卯至宛城夜襲其郛克之丁未車駕發南陽留太尉咸陽王禧前將軍元英攻之己酉車駕至新野冬十月丁巳四面進攻不克詔左右軍築長圍以守之乙亥追廢貞皇后林氏爲庶人十有一月甲午蕭鸞前軍將軍韓秀方弋陽太守王副之後軍將軍趙祖悅等十五將來降丁酉大破賊軍於沔北獲其將軍王伏保等於是民皆復業九十以上假以郡守六十五以上假以縣令新野民張暏柵萬餘家拒守不下十有二月庚申破之俘斬萬餘丁卯詔流徒之囚皆勿決遣有登城之際令其先鋒自效庚午車駕臨沔遂廵沔東還戊寅車駕還新野己卯親行營壘隱恤六軍蕭鸞將王曇紛等萬餘人宼南青州黄郭戍戍主崔僧淵擊破之悉虜其衆以齊郡王子琛紹河間王若後髙昌國遣使朝貢二十有二年春正月癸未朔朝饗羣臣於新野行宫丁亥拔新野獲蕭鸞輔國將軍新野太守劉忌斬之於宛戊子鸞湖陽戍主蔡道福棄城遁走辛卯鸞赭陽戍主成公期軍主胡松棄城遁走壬辰鸞輔國將軍舞隂戍主黄瑤起及直閤將軍臺軍主鮑舉南鄉太守席謙相尋遁走瑤起鮑舉爲軍人所獲送庚戌行幸南陽二月乙卯進攻宛北城甲子㧞之鸞冠軍將軍南陽太守房伯玉面縛出降庚午車駕幸新野辛未詔以穰民首歸大順終始若一者給復三十年標其所居曰歸義鄉次降者給復十五年三月壬午朔大破鸞平北將軍崔惠景黄門郎蕭衍軍於鄧城斬獲首虜二萬有餘庚寅行幸樊城觀兵襄沔耀武而還曲赦二荆魯陽郡鎮南將軍王肅攻鸞義陽鸞遣將裴叔業宼渦陽乙未詔將軍鄭思明嚴虗敬宇文福等三軍繼援辛丑行幸湖陽乙未次比陽戊申詔荆州諸郡之民初降次附復同穰縣辛亥行幸懸瓠夏四月甲寅從征武直之官進位三階文官二級外官一階庚午發州郡兵二十萬人限八月中旬集懸瓠趙郡王幹薨五月丙午詔在征身喪者四品已下及卑兼之職給帛有差六月庚申詔諸王將士戰没皆加優贈秋七月壬午詔曰朕以寡德屬兹靖亂實頼羣英凱清南夏宜約躬賞效以勸茂績后之私府便可損半六宮嬪御五服男女常恤恒供亦令減半在戎之親三分省一是月蕭鸞死子寳卷僭立八月辛亥皇太子自京師來朝壬子蕭寳卷奉朝請鄧學擁其齊興郡内屬勑勒樹者相率反叛詔平北將軍江陽王繼都督北討諸軍事以討之壬戌髙麗國遣使朝獻九月己亥帝以蕭鸞死禮不伐喪乃詔反斾庚子仍將北伐叛虜丙午車駕發懸瓠冬十月己酉朔曲赦二豫殊死已下復民田租一歲十有一月辛巳幸鄴十有二月甲寅以江陽王繼定勑勒乃詔班師二十有三年春正月戊寅朔朝羣臣以帝疾瘳上夀大饗於澄鸞殿壬午幸西門豹祠遂歴漳水而還蕭寳卷遣太尉陳顯逹宼荆州癸未詔前將軍元英討之乙酉車駕發鄴戊戌至自鄴庚子告於廟社癸卯行飲至策勲之禮甲辰大赦天下太保齊郡王簡薨二月辛亥以長兼太尉咸陽王禧爲正太尉癸亥以中軍大將軍彭城王勰爲司徒復樂陵王思譽本封癸酉顯達攻陷馬圈戍三月庚辰車駕南伐癸未次梁城甲申以順陽被圍危急詔振武將軍慕容平城率騎五千赴之丙戌帝不豫司徒彭城王勰侍疾禁中且攝百揆丁酉車駕至馬圈詔鎮南大將軍廣陽王嘉斷均口邀顯逹歸路戊戌頻戰破之其夜顯達及崔惠景曹虎等宵遁己亥収其戎資億計班賜六軍諸將追奔及於漢水斬獲及赴水而死者十八九斬寳卷左軍將軍張于逹等賊將蔡道福成公期率數萬人棄順陽遁走庚子帝疾甚車駕北次穀塘原甲辰詔賜皇后馮氏死詔司徒勰徴太子於魯陽踐阼詔以侍中護軍將軍北海王詳爲司空公鎮南將軍王肅爲尚書令鎮南大將軍廣陽王嘉爲尚書左僕射尚書宋弁爲吏部尚書與侍中太尉公禧尚書右僕射任城王澄等六人輔政顧命宰輔曰粤爾太尉司空尚書令左右僕射吏部尚書惟我太祖丕丕之業與四象齊茂累聖重明屬鴻厯於寡昧兢兢業業思纂乃聖之遺蹤遷都嵩極定鼎河瀍庶南蕩甌吳復禮萬國以仰光七廟俯濟蒼生困窮早滅不永乃志公卿其善毗繼子隆我魏室不亦善歟可不勉之夏四月丙午朔帝崩於穀塘原之行宫時年三十三祕諱至魯陽發哀還京師上諡曰孝文皇帝廟曰髙祖五月丙申葬長陵帝幼有至性年四歲顯祖曾患癰帝親自吮膿五歲受禪悲泣不能自勝顯祖問帝帝曰代親之感内切於心顯祖甚歎異之文明太后以帝聰聖後或不利於馮氏將謀廢帝乃於寒月單衣閉室絶食三朝召咸陽王禧將立之元丕穆泰李沖固諫乃止帝初不有憾唯深德丕等撫念諸弟始終曾無纖介惇睦九族禮敬俱深雖於大臣持法不縱然性寛慈每垂矜捨進食者曾以熱羮傷帝手又曾於食中得蟲穢之物並笑而恕之宦者先有譖帝於太后太后大怒杖帝數十帝默然而受不自申明太后崩後亦不以介意聽覽政事莫不從善如流哀矜百姓恒思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑爲倦尚書奏案多自尋省百官大小無不留心務於周洽每言凡爲人君患於不均不能推誠御物茍能均誠胡越之人亦可親如兄弟常從容謂史官曰直書時事無諱國惡人君威福自己史復不書將何所懼南北征廵有司奏請治道帝曰粗脩橋梁通輿馬便止不須去草剗令平也凡所脩造不得已而爲之不爲不急之事損民力也廵幸淮南如在内地軍事須伐民樹者必留絹以酬其直民稻粟無所傷踐諸有禁忌禳厭之方非典籍所載者一皆除罷雅好讀書手不釋卷五經之義覽之便講學不師受探其精奥史傳百家無不該涉善談莊老尤精釋義才藻富贍好爲文章詩賦銘頌任興而作有大文筆馬上口授及其成也不改一字自太和十年已後詔冊皆帝之文也自餘文章百有餘篇愛竒好士情如饑渴待納朝賢隨才輕重常寄以布素之意悠然𤣥邁不以世務嬰心又少而善射有膂力年十餘歲能以指彈碎羊髆骨及射禽獸莫不隨所志斃之至年十五便不復殺生射獵之事悉止性儉素常服澣濯之衣鞌勒鐡木而已帝之雅志皆此類也史臣曰有魏始基代朔廓平南夏闢壤經世咸以威武爲業文教之事所未遑也髙祖幼承洪緒早著叡聖之風時以文明攝事優游恭己𤣥覽獨得著自不言神契所標固以符於冥化及躬總大政一日萬幾十許年間曾不暇給殊途同歸百慮一致至夫生民所難行人倫之髙迹雖尊居黄屋盡蹈之矣若乃欽明稽古協御天人帝王制作朝野軌度斟酌用舎煥乎其有文章海内生民咸受耳目之賜加以雄才大略愛竒好士視下如傷役己利物亦無得而稱之其經緯天地豈虗諡也魏書卷七下魏書卷七下考證髙祖紀征西大將軍陽平王熙擊走之臣人龍按熙本傳泰常六年薨距太和十四年薨已五六十年矣考天象志地豆干頻犯塞詔征西大將軍陽平王頣擊走之蓋熙與頤俱稱陽平王音復相近是以訛也詔罷祖祼疑臣照按詔罷祖祼句無上下文舊本旁注一疑字北史則作詔罷袒祼但果禁民袒裸則當云禁不當云罷􅃝裸字亦復可疑或是拓跋國語有音無字當時則其文自明而今不可考耶魏書卷七下考證
