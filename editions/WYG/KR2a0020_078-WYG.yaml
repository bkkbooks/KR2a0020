body:
  text: 魏書卷七十八齊魏收撰列傳第六十六孫紹張普惠孫紹字世慶昌黎人世仕慕容氏祖志入國卒於濟陽太守乆恊字文和上黨太守紹少好學通渉經史頗有文才隂陽術數多所貫渉初爲校書郎稍遷給事中自長兼羽林監爲門下録事朝廷大事好言得失遂爲世知曾著釋典論雖不具美時有可存與常景等共修律令延昌中紹表曰臣聞建國有計雖危必安施化能和雖寡必盛治乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也伏惟大魏應天明命兆啓無窮必世後仁祚隆七百今二虢京門了無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領護分事之式徵兵儲粟之要舟車水陸之資山河要害之權緩急去來之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懐怨中正賣望於下里主案舞筆於上臺真僞混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭奄殊類應同役而苦樂懸異士人居職不以爲榮兵士役苦心不忘亂故有競棄本生飄藏他土或詭名託飬散在人間或亡命山藪漁獵爲命或投仗彊豪寄命衣食又應遷之戸逐樂諸州應留之徒避寒歸暖兼職人子弟隨逐浮遊南北東西卜居莫定闗禁不修任意取適如此之徒不可勝數爪牙不復爲用百工爭棄其業混一之計事實闕如考課之方責辦無日流浪之徒決湏精校今彊敵窺時邊黎伺隙内民不平乆戍懐怨戰國之勢竊謂危矣必造祸源者北邊鎮戍之人也若夫一統之年持平用之者大道之計也亂離之期縱横作之者行權之勢也故道不可乆湏文質以換情權不可恒隨洿隆以牧物文質應世道形自安洿隆獲𠂻權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令竝議律尋施行令獨不出十餘年矣臣以令之爲體即帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要乃是有爲之樞機世法之大本也然修令之人亦皆博古依古撰置大體可觀比之前令精麤有在但主議之家太用古制若令依古高祖之法復湏昇降誰敢措意有是非哉以是爭故乆廢不理然律令相湏不可偏用今律班令止於事甚滯若令不班是無典法臣下執事何依而行臣等修律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懐於悒未幾出除濟隂太守還歴司徒功曹參軍歩兵長水校尉正光初兼中書侍郎使髙麗還爲鎮逺將軍右軍將軍乆之爲徐兖和糴使還朝大陳軍國利害不報紹又表曰臣聞文質互用治道以之緝熙洿隆得時人物以之通濟故能事恢三靈仁洽九服伏惟陛下應靈踐阼沖明照物宰輔忠純伊霍均美既致昇平之基應成無爲之業而漠北叛命隴右構逆中州驚擾民庶竊議其故何哉皆由上法不通下情怨塞故也臣雖愚短具鑒始末往在代都武質而治安中京以來文華而政亂故臣昔於太和極陳得失具論四方華夷心態高祖垂納文應可尋延昌正光奏疏頻上主者收録不䝉報問即日事勢乃至於此盡微臣豫陳之驗今東南有竊號之豎西北有逆命之寇豈得怨天實尤人矣臣今不憂荒外正慮中畿急湏改張以寧其意若仍持疑變亂尋作肘腋一乖大事去矣然臣奉國四世欣戚是同但職在冗散不關樞密寧濟之計欲陳無所可謂經緯甚多無機可織夫天下者大器也一正難傾一傾難正當今之危躡足之急臣備肉食痛心無已泣血上陳願垂採察若得言參執事獻可替否宼逆獲除社稷稱慶雖死如生犬馬情畢紹性抗直每上封事常至懇切不憚犯忤但天性踈脱言乍髙下時人輕之不見採納紹兄世元早卒世元善彈箏紹後聞箏聲便涕泗嗚咽捨之而去世以此尚之除驍騎將軍使吐谷渾還爲太府少卿曾因朝見靈太后謂曰卿年稍老矣紹曰臣年雖老臣節乃少太后笑之遷右將軍太中大夫紹曾與百寮赴朝東掖未開守門候旦紹於衆中引史部郎中辛雄於衆外竊謂之曰此中諸人尋當死盡唯吾與卿猶享富貴雄甚駭愕不測所以未幾有河隂之難紹善推禄命事驗甚多知者異之建義初除衞尉少卿將軍如故轉金紫光禄大夫永安中拜太府卿以前參議正光壬子厯賜爵新昌子太昌初遷左衞將軍右光禄大夫永熙二年卒時年六十九贈都督冀瀛滄三州諸軍事驃騎大將軍尚書左僕射冀州刺史諡曰宣子伯元襲齊受禪例降伯元弟叔利右將軍太中大夫紹從父弟瑜濟州長史瑜弟彛字鳳倫太和中舉秀才稍遷歩兵校尉卒於武邑太守贈征虜將軍營州刺史子伯融出繼瑜後武定末闕二字太守伯融嫡弟子寛開府田曹參軍張普惠字洪賑常山九門人身長八尺容貌魁偉父曄爲齊州中水縣令隨父之縣受業齊土專心墳典剋厲不息及還鄉里就程元講習精於三禮兼善春秋百家之説多所窺覽諸儒稱之太和十九年爲主書帶制局監與劉桃符石榮劉道斌同員共直頗爲髙祖所知轉尚書都令史任城王澄重其學業爲其聲價僕射李沖曾至澄處見普惠言論亦善之世宗初轉積射將軍澄爲安西將軍雍州刺史啓普惠爲府録事參軍尋行馮翊郡事澄功衰在身欲於七月七日集會文武北園馬射普惠奏記於澄曰竊聞三殺九親别踈昵之叙五服六術等衰麻之心皆因事飾情不易之道者也然則莫大之痛深於終身之外書䇿之哀除於喪紀之内外者不可無節故斷之以三年内者不可遂除故敦之以日月禮太練之日鼓素琴蓋推以即吉也小功以上非虞祔練除不沐浴此拘之以制也曽子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人祭既不與疑無宴食之道又曰廢喪服可以與於饋奠之事乎子曰脱衰與奠非禮也注云爲其忘哀疾愚謂除喪之始不與饋奠小功之内其可觀射乎雜記云大功以下既葬適人人食之其黨也食之非黨也不食食猶擇人於射爲惑伏見明敎立射會之限將以二七令辰集城中文武肄武藝於北園行揖讓於中否時非大閲之秋景涉妨農之節國家縞禫甫除殿下功衰仍襲釋而爲樂以訓百姓便是易先王之典敎忘哀戚之情恐非所以昭令德視子孫者也按射儀射者以禮樂爲本忘而從事不可謂禮鍾鼓弗設不可謂樂捨此二者何用射爲又七日之戲令制無之班勞所施慮違事體庫府空虛宜待新調二三之趣停之爲便乞至九月備飾盡行然後奏狸首之章宣矍相之令聲軒懸建雲鉦神民忻暢於斯時也伏惟慈明逺被萬民是望舉動所書發言唯則願更廣訪賜垂曲採昭其管見之心恕其讜言之責則芻蕘無遺歌輿人有獻誦矣澄意納其言託辭自罷乃荅曰文武之道自昔成規明耻敎戰振古常軌今雖非公制而此州承前已有斯式既不勞民損公任其私射復何失也且纂文習武人之常藝豈可於常藝之間要湏令制乎比適欲依前州府相率王務之暇肄藝良辰亦未言費用庫物也禮兄弟内除明哀已殺小功客至主不絶樂聴樂則可觀武豈傷直自事縁湏罷先以令停方獲此請深具來意澄轉揚州啓普惠以羽林監領鎮南大將軍開府主簿尋加威逺將軍普惠既爲澄所知歴佐二藩甚有聲譽旋京之日装束藍縷澄賚絹二十匹以充行資還朝仍羽林監又澄遭太妃憂臣寮爲立碑頌題碑欲云康王元妃之碑澄訪於普惠荅曰謹尋朝典但有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌竊謂不假元字以别名位且以氏配姓愚以爲在生之稱故春秋夫人姜氏至自齊既葬以諡配姓故經書葬我小君文姜氏又曰來歸夫人成風之禭皆以諡配姓古者婦人從夫諡今烈懿太妃德冠一世故特䝉褒錫乃萬代之高事豈容於定名之重而不稱烈懿乎澄從之及王師大舉重征鍾離普惠爲安樂王詮别將長史班師除揚烈將軍相州安北府司馬遷步兵校尉後以本官領河南尹丞世宗崩坐與甄楷等飲酒遊從免官驍騎將軍刁整家有舊訓將營儉葬普惠以爲矯時太甚與整書論之事在刁雍𫝊故事免官者三載之後降一階而叙若才優擢授不拘此限熙平中吏部尚書李韶奏普惠有文學依才優之例宜特顯叙勑除寧逺將軍司空倉曹參軍朝議以不降階爲榮時任城王澄爲司空表議書記多出普惠廣陵王恭北海王顥疑爲所生祖母服朞與三年博士執意不同詔羣寮㑹議普惠議曰謹按二王祖母皆受命先朝爲二國太妃可謂受命於天子爲始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾子父在爲母大功則士之妾子爲母朞父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命爲之三年況天子命其子爲列國王命其所生母爲國太妃反自同公子爲母練冠之與大功乎輕重顛倒不可之甚者也𫝊曰始封之君不臣諸父昆弟則當服其親服若魯衞列國相爲服朞判無疑矣何以明之喪服君爲姑姉妹女子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相爲服不可還凖公子逺厭天王故降有四品君大夫以尊降公子大夫之子以厭降名例不同何可亂也禮大夫之妾子以父命慈己申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之高據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻爲其皇姑公子雖厭妻尚獲申況廣陵北海論封則封君之子語妃則命妃之孫承妃纂重逺别先皇更以先后之正統厭其所生之祖嫡方之皇姑不以遥乎今既許其申服而復限之以朞比之慈母不亦爽歟經曰爲君之祖父母父母妻長子傳曰何以朞父母長子君服斬妻則小君父卒然後爲祖後者服斬今祖乃獻文皇帝諸侯不得祖之母爲太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或逺且天子尊則配天莫非臣妾何爲命之爲國母而不聼子服其親乎記曰從服者所從亡則已又曰不爲君母之黨服則爲其母之黨服今所從既亡不以親服服其所生則屬從之服於何所施若以諸王入爲公卿便同大夫者則當今之議皆不湏以國爲言也今之諸王自同列國雖不之國别置臣寮玉食一方不得以諸侯言之敢據周禮輙同三年當時議者亦有同異國子博士李郁於議罷之後書難普惠普惠據禮還荅鄭重三返郁議遂屈轉諌議大夫澄謂普惠曰不喜君得諌議唯喜諌議得君時靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號詣闕上疏陳其不可左右畏懼莫敢爲通會聞胡家穿壙下墳有磐石乃密表曰臣聞優名寶位王者之所光錫尊君愛親臣子所以慎終必使勲績相侔號秩相可然後能顯揚當時𫝊徽萬代者矣竊見故侍中司徒胡公懐道含靈實誕聖后載育至尊母儀四海近樞克惟允之寄居槐體論道之明故以功餘九錫褒假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未𠂻何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可竝大禮記曰天無二日土無二王嘗禘郊社尊無二上明君臣不可竝上伏見詔書以司徒爲太上秦公夫人爲太上秦君夫人䝉號於前司徒繫之於後尊光之美盛矣竊惟高祖受禪於獻文皇帝故仰尊爲太上皇此因上上而生名也皇太后稱令以繫勑下蓋取三從之道逺同文母列於十亂則司徒之爲太上恐乖繫勑之意春秋傳曰葬稱公臣子辭明不可復加上也書曰兹予大饗于先王爾祖其從與饗之司徒位尊屬重必當配饗先朝稱太上以爲臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晉有小子侯尚曰僭之於天子司徒三公也其可同號於帝乎孔子曰必也正名名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又曰困於上者必反於下故受之以井比剋吉定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啓聖情伏願聖后回日月之明察㣲臣之請停司徒逼同之號從卑下不踰之稱畏困上之鑒邀謙光之福則天下幸甚臣聞見災修德災變成善此太戊所以興殷桑穀以之自滅況今卜遷方始當修革之會愚以爲無上之名不可假之脱譏於千載恐貽不言之咎且君之於臣比葬三臨之禮也司徒誠爲后父實人臣也雖子尊不加於父乃天下母以義斷恩不可遂在室之意故曰女子有行逺父母兄弟況乃應坤之載承天之重而朔望於司徒之殯晨昬於郊墓之間雖聖思蒸蒸其不虞宜戒離宸極之嚴居疲雲蹕於道路此亦億兆蒼生瞻仰失圖伏願尋載馳之不歸存静方之光大則草木可繁人靈斯穆臣職忝諌司敢獻狂瞽謹冒上聞不敢宣露乞垂省覽昭臣微款脱得奉謁聖顔曲盡愚𠂻者死且不朽太后覽表親至國珍宅召集王公入座卿尹及五品已上博議其事遣使召普惠與相問荅又令侍中元义中常侍賈璨監觀得失任城王澄問普惠曰漢高作帝尊父爲太上皇今聖母臨朝贈父太上公求之故實非爲無凖且君舉作則何必循舊對曰天子稱詔太后稱令故周臣十亂文母預焉仰思所難竊謂非匹澄曰前代太后亦有稱詔聖母自欲存謙光之義故不稱耳何得以詔令之别而廢嚴父之孝對曰后父太上自昔未有前代母后豈不欲尊崇其親王何以不逺謨古義而近順今㫖未審太后何故謙於稱詔而不謙於太上竊願聖后終其謙光太傅清河王懌曰昔在僭晉禇氏臨朝殷浩遺禇裒書曰足下今之太上皇也況太上公而致疑對曰禇裒以女輔政辭不入朝淵源譏其不恭故有太上之刺本稱其非不記其是不謂殿下以此賜難侍中崔光曰張生表中引晉有小子侯出自鄭注非爲正經對曰雖非正經之文然述正經之㫖公好古習禮復固斯難御史中尉元匡因謂崔光曰張表云晉之小子侯以號同稱僭今者太上公名同太上皇比晉小子義似相類但不學不敢辨其是非普惠對曰中丞既疑其是不正其非豈所望於三獨尚書崔亮曰諌議所見正以太上之號不應施於人臣然周有太公尚父亦兼二名人臣尊重之稱固知非始今日普惠對曰尚父者有德可稱太上者上中之上名同義異此亦非竝亮又曰古有文王武王亦有文子武子然則太上皇太上公亦何嫌于同也普惠對曰文武者徳行之迹故迹同則諡同太上者尊極之位豈得通施於臣下廷尉少卿袁飜曰周官上公九命上大夫四命命數雖殊同名爲上何必上者皆是極尊普惠厲聲訶飜曰禮有下卿上士何止大夫與公但今所行以太加上二名雙舉不得非極雕蟲小藝微或相許至於此處豈卿所及飜甚有慙色黙不復言任城王澄曰諫諍之體各言所見至於用捨固在應時卿向荅袁氏聲何太厲普惠對曰所言若是宜見採用所言若非懼有罪及是非湏辨非爲茍競澄曰朝廷方開不諱之門以廣忠言之路卿今意在向義何云乃慮罪罰議者咸以太后當朝志相黨順遂奏曰張普惠辭雖不屈然非臣等所同渙汗已流請依前詔太后復遣元义賈璨宣令謂普惠曰朕向召卿與羣臣對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道羣公已有成議卿不得苦奪朕懐後有所見勿得難言普惠於是拜令辭還初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖涕泣普惠謂曰我當休明之朝掌諌議之職若不言所難言諫所難諌便是唯唯曠官尸禄人生有死死得其所夫復何恨然朝廷有道汝軰勿憂及議罷㫖勞還宅親故賀其幸甚時中山莊弼遺書普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使羣后逡廵庶竂拱黙雖不見用於一時固已傳美於百代聞風快然敬裁此白普惠美其此書每爲口實普惠以天下民調幅度長廣尚書計奏復徵綿麻恐其勞民不堪命上疏曰伏聞尚書奏復綿麻之調尊先皇之軌夙宵惟度忻戰交集何者聞復髙祖舊典所以忻惟新俱可復而不復所以戰違法仰惟髙祖廢大斗去長尺改重秤所以愛萬姓從薄賦知軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上税綿八兩布上税麻十五斤萬姓得廢大斗去長尺改重秤荷輕賦之饒不適於綿麻而已故歌舞以供其職奔走以役其勤天子信於上億兆樂於下故易曰悦以使民民忘其勞此之謂也自兹以降漸漸長闊百姓嗟􅀢聞於朝野伏惟皇太后未臨朝之前陛下居諒闇之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長秤重斗大革其所獘存其可存而特放綿麻之調以悦天下之心此所謂悦之不以道愚臣所以未悦者也尚書既知國少綿麻不惟法度之闕字易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而羣官共竊之愚臣以爲於理未盡何者今宫人請調度造衣物必度忖秤量絹布疋有尺丈之盈一猶不計其廣絲綿斤兼百銖之剰未聞依律罪州郡若一疋之濫一斤之惡則鞕户主連三長此所以敎民以貪者也今百官請俸人樂長闊并欲厚重無復凖極得長闊厚重者便云其州能調絹布精闊且長横發美譽以亂視聴不聞嫌長惡廣求計還官者此百司所以仰負聖明也今若必復綿麻者謂宜先令四海知其所由明立嚴禁復本幅度新綿麻之典依太和之税其在庫絹布并及絲綿不依典制者請遣一尚書與太府卿左右藏令依今官度官秤計其斤兩廣長折給請俸之人總常俸之數千俸所出以布綿麻亦應其一歳之用使天下知二聖之心愛民惜法如此則高祖之軌中興於神龜明明慈信照布於無窮則孰不幸甚伏願亮臣悾悾之至下慰蒼生之心普惠又表乞朝直之日時聴奉見自此之後月一陛見又以肅宗不親視朝過崇佛法郊廟之事多委有司上疏曰臣聞明德卹祀成湯光六百之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故宜敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊社多委於有司觀射遊苑躍馬騁中危而非典豈清蹕之意殖不思之㝠業捐巨費於生民減禄削力近供無事之僧崇飾雲殿逺邀未然之報昧爽之臣稽首於外𤣥寂之衆遨遊於内愆禮忤時人靈未穆愚謂從朝夕之因求秖刼之果未若先萬國之忻心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之䖍親紆朔望之禮釋奠成均竭心千畆明發不寐潔誠禋祼孝悌可以通神明德敎可以光四海則一人有喜兆民頼之然後精進三寶信心如來道由化深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官乆折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經逺言多孟浪忝職其憂不敢黙爾尋别勑付外議釋奠之禮時史官剋日蝕豫勑罷朝普惠以逆廢非禮上疏陳之又表論時政得失一曰審法度平斗尺調租務輕賦役務省二曰聴輿言察怨訟先皇舊事有不便於政者請悉追改三曰進忠謇退不肖任賢勿貳去邪勿疑四曰興滅國繼絶世勲親之𦙍所宜收敘書奏肅宗靈太后引普惠於宣光殿隨事難詰延對移時令曰寧有先皇之詔一一飜改普惠僶俛不言令曰卿似欲致諌故以左右有人不肯苦言朕爲卿屏左右卿其盡陳之對曰聖人之飬庶物愛之如傷況今二聖纂承洪緒妻承夫子承父夫父之不可安然仍行豈先帝𫝊委之本意仰惟先帝行事或有司之謬或權時所行在後以爲不可者皆追而正之聖上忘先帝之自新不問理之伸屈一皆抑之豈蒼生黎庶所仰望於聖德太后曰小小細務一一飜動更成煩擾普惠曰聖上之飬庶物若慈母之飬赤子今赤子幾臨危壑將赴水火以煩勞而不救豈赤子所望於慈母太后曰天下蒼生寧有如此苦事普惠曰天下之親懿莫重於太師彭城王然遂不免枉死微細之苦何可得無太后曰彭城之苦吾已封其三子何足復言普惠曰聖后封彭城之三子天下莫不忻至徳知慈母之在上臣所以重陳者凢如此枉乞垂聖察太后曰卿云興滅國繼絶世滅國絶世竟復誰是普惠曰昔淮南逆終漢文封其四子蓋骨肉之不可棄親親故也竊見故太尉咸陽王冀州刺史京兆王乃皇子皇孫一德之虧自貽悔戾沉淪幽壤􅃡焉弗收豈是興滅繼絶之意乞收葬二王封其子孫愚臣之願太后曰卿言有理朕深戢之當命公卿博議此事及任城王澄薨普惠以吏民之義又荷其恩待朔望奔赴至於禪除雖寒暑風雨無不必至初澄嘉賞普惠臨薨啓爲尚書右丞靈太后既深悼澄覽啓從之詔行之後尚書諸郎以普惠地寒不應便居管轄相與爲約竝欲不放上省紛紜多日乃息正光二年詔遣楊鈞送蠕蠕主阿那瓌還國普惠謂遣之將貽後患上疏曰臣聞乾元以利貞爲大非義則不動皇王以博施爲功非類則不從故能始萬物而化天下者也伏惟陛下叡哲欽明道光虞舜八表宅心九服清晏蠕蠕相害於朔垂妖師扇亂於江外此乃封豕長虵不識王度天將悔其罪所以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以悦其志恭已以懐其心而先自勞擾艱難下民興師郊甸之内逺投荒塞之外救累世之勍敵可謂無名之師諺曰唯亂門之無過愚情未見其可當是邊將窺竊一時之功不思兵爲凶器不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆横行匈奴中季布以爲不可請斬之千載以爲美況今旱酷異常聖慈降膳乃以萬五千人使楊鈞爲將而欲定蠕蠕忤時而動其可濟乎阿那瓌投命皇朝撫之可也豈容困疲我兆民以資天喪之虜昔莊公納子糾以致乾時之敗魯僖以邾國而有懸胄之耻今蠕蠕時亂後主繼立雖云散亡姦虞難抑脱有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年饑饉相仍湏其自弊小亡大傷然後一舉而并之此卞氏之高略所以獲兩虎不可不圖之今土山告難簡書相續蓋亦無能爲也正與今舉相會天其或者欲以告戒人不欲使南北兩疆竝興大衆脱狂狡搆閒於其間而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此㣲臣所以寒心者也那瓌之不還負何信義此機之際北師宜停臣言不及義文書所經過不敢不陳兵猶火也不戢將自焚二虜自滅之形可以爲殷鑒伏願輯和萬國以静四疆混一之期坐而自至矣臣愚昧多違必無可採匹夫之智願以呈獻表奏詔答曰夫窮鳥歸人尚或興惻況那瓌嬰禍流離逺來依庇在情在國何容弗矜且納亡興喪有國大義皇魏堂堂寧廢斯德後主亂亡似當非謬此送彼迎想無拒戰國義宜表朝筭已決卿深誠厚慮朕用嘉戢但此叚機略不獲相從脱後不逮勿憚匡言時蕭衍義州刺史文僧明舉城歸順揚州刺史長孫稚遣别駕封夀入城固守衍將裴邃湛僧率衆攻逼詔普惠爲持節東道行臺攝軍司赴援之軍始度淮而封夀已棄城單馬而退軍罷還朝蕭衍弟子西豐侯正德詐稱降欵朝廷頗事當迎普惠上疏請赴揚州移還蕭氏不從俄而正德果逃還涼州刺史石士基行臺元洪超竝贓貨被繩以普惠爲右將軍涼州刺史即爲西行臺以病辭免除光禄大夫右丞如故先是仇池武興羣氐數反西垂郡戍租運乆絶詔普惠以本官爲持節西道行臺給秦歧涇華雍豳東秦七州兵武三萬人任其召發送南秦東益二州兵租分付諸戍其所部將統聴於關西牧守之中隨機召遣軍資板印之屬悉以自隨普惠至南秦停歧涇華雍豳東秦六州兵武召秦州兵武四千人分配四統令送租兵連營接柵相繼而進運租車驢隨機輸轉别遣中散大夫封答慰喻南秦員外常侍楊公熙宜勞東益氐民於時南秦氐豪呉富聚合兇類所在邀劫公熙既至東益州刺史魏子建密與普惠書言公熙舊是蕃國之𦙍而諸氐與相見者必有隂私言宜加圖防普惠乃符攝公熙令赴南秦公熙果已密遣其從兄山虎與呉富同逆又妄自説鄉里紛動羣氐託云與崔南秦有隙拒而不赴租達平落呉富等果愶車營實公熙所潛遣也後呉富雖爲左右所殺而後黨猶盛秦闕所綰武都武階租頗得達東益羣氐先欵順故廣業仇鳩河池三城粟便得入其應入東益十萬石租皆稽留費盡升斗不至鎮戍兵武遂致飢虛咸恨普惠經略不廣事訖普惠拜表按劾公熙還朝賜絹布一百叚時詔訪寃屈普惠上疏曰詩稱文王孫子本枝百世易曰大君有命開國承家皆所以明德睦親維城作翰漢祖封爵之誓曰使黄河如帶太山如礪國以永存爰及苗裔又申之以丹書之信重之以白馬之盟其以彊大分王罪犯蹙邑者蓋有之矣未聞父基子搆世載忠賢一死一削用爲恒典者也故尚書令臣肇未能逺稽古義近究成㫖以初封之詔有親王二千户始蕃一千户二蕃五百户三蕃三百户謂是親踈世減之法又以開國五等有所減之言以爲世減之趣遂立格奏奪稱是高祖本意仍彼㫖可差謬之來亦已甚矣遂使勲親懐屈幽顯同寃紛訟彌年莫之能息臣輙逺研㫖格深窮其事世變減奪今古無據又尋詔書稱昔未可采今始列璧疑豈得混一内分乆近也故樂良樂安同蕃異封廣陽安豐屬則户等安定之嫡邑齊親王河間戚近更從蕃食是乃太和降㫖初封之倫級勲親兼樹非世減之大驗者也博陵襲爵亦在太和之年時不世減以父嘗全食足户充本同之始封減從今式如此則減者減其所足之外足者足其所減之内減足之㫖乃爲所貢所食耳欲使諸王開國弗專其民賦役之差貴賤有等蓋凖擬周禮公侯伯子男貢税之法王食其半公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減户故始封承襲俱稱所減謂減之以貢食謂食之於國斯實高祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差㫖又判之以開訓所減之㫖可以不疑於世減矣而臣肇弗稽往事曰五等有所減之格用爲世減之法以王封有親踈之等謂是代削之條妄解成㫖雷同世奪以此毒天下民其從乎故太傅任城文宣王臣澄樞弼累朝識洞今古爲尚書之日殷勤執請孜孜於重議被㫖不許於此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曽𤣥不治未恤嫡封則爵禄無窮枝庶則屬内貶絶儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其寃七廟之孫竝訟其切陳訴之案盈於省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦九族之義也臣偎忝今任於兹五年推尋㫖格謂無世減之理請近遵高祖減食之謨逺循百代象賢之誥退由九伐進從九儀則刑罰有倫封不虚黜斯乃文王所以克慎不敢侮於鰥寡而況於公侯伯子男乎今㫖訪寃滯愚以此爲大者求尋光錫之詔并諸條格所奪所請事事窮審諸王開國非犯罪削奪者竝求還復其昔嘗全食足户充本減從令式者從前則力多於親懿全奪則減足之格不行愚謂禄力竝應依所之食而食之若是則力少蕃王粟帛仍本户邑雖盈之減兩秦既有全食足户之異故不得同於新封之力耳親恤所裒請依律斷伏惟親親尊賢位必功立尊賢以司民可不慎乎親親以牧族其可棄乎如脱䝉允求以㫖判爲始其前來吏秩悉年乆不追臣又聞明德慎罰文王所以造周咸有一德殷湯所以革夏故能上令下從風動草偃畏之如雷電敬之如明神是以天子家天下綏萬國若天之無不覆地之無不載遷都之構庶方子來汎澤所沾降及陪皂寜有岳牧二千石縣令丞尉治中别駕及諸軍幢受命於朝廷而可不預乎此之班駮雲雨之不平謂是當時有司出納之未允何以明之仰尋世宗詔書百官普進一級中有朝臣刺史登時褒授則内外貴賤莫不同澤又覆奏稱爰及陪皂明無不逮自後人率其心紛綸盈庭嫌少誤惑視聴限以汎前更爲年斷六年三年之考以意折之汎前汎後之歳隔而絶之遂使如綸之㫖頓於一朝汎前六年上第者全不得汎三年上第者蒙半階而已汎前汎後合考者隔絶而不得無考者無折而全汎前汎後有考無考竝䝉全汎與否乖違勤舊彌屈差若毫釐謬以千里其此之謂乎易曰言行君子之所以動天下可不慎歟言之不從無以抑之遂奏奪牧守外禄全不與汎散官改爲四年之考汎前者八年一階政令不一寃訟惟甚與而復奪其本在兹致使邀駕擊鼓者無理以加其罪誹謗公聴者無辭以抑其言噂􅊱所由生慢悖所由起夫琴瑟不調澆而更張善人國之本也其可棄乎詩云樂只君子邦家之基堯典曰克明俊德呂刑曰何擇非人周官曰官弗必備惟其人咎繇曰無曠庶官天工人其代之詩云人之云亡邦國殄悴又曰雨我公田遂及我私孔子曰不患貧而患不均如此則官必擇人汎則宜溥請逺遵正始元㫖近凖聖明二汎内外百官悉同一階不以汎前折考不以散任增年則同雲共澍四海均洽如謂未可宜以權理折之易曰聖人之大寶曰位何以守位曰仁春秋傳曰一曰擇人如此則乃可無汎不可無考守宰之汎既以追奪則百官之汎不應獨霑溥澤既收復誰敢怨夫三載之考興於太和再周之陟通於景明閑劇禄力自有加減陪臣以事省降而考則三年朝官既禄等平曹更四周乃陟考禄參差各稱其枉且一日從軍征戍苦於煩任終年專使決斷重於陪臣恒上若通爲三載之考無汎隔折則各盈其分亦足以近塞羣口逺綏四方日昳求賢猶有所失況不遵擇人之訓唯以停乆而進乎自今已後考黜願以三宅革心選進願以三儁居德書曰舉能其官惟爾之能稱非其人惟爾弗任斯周道所以佑辟康民敢不敬守臣忝官樞副毗察寃訟寤寐惟省謂宜追正愚固所陳萬無可採出除左將軍東豫州刺史淮南九戍十三郡猶因蕭衍前弊别郡異縣之民錯雜居止普惠乃依次括比省減郡縣上表陳狀詔許之宰守因此綰攝有方姦盜不起民以爲便蕭衍遣將胡廣來寇安陽軍主陳明祖等恊白沙鹿城二戍衍又遣定州刺史田超秀由僧達等竊䧟石頭戍徑據安陂城郢州新塘之賊近在州西數十里普惠前後命將拒戰竝破之普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與其遊學早終其子長瑜普惠毎於四時請禄無不減贍給其衣食及爲豫州啓長瑜解褐􅂝其合門拯給之孝昌元年三月在州卒時年五十八贈平北將軍幽州刺史諡曰宣恭長子榮儁武定末齊王相府屬榮儁弟龍子揚州驃騎府長史史臣曰孫紹闗右之士又能指論世務亦其志也張普惠明達典故彊直從官侃然不撓其有王臣之風矣魏書卷七十八魏書卷七十八考證張普惠𫝊何以不逺謨古義謨應作模魏書卷七十八考證
