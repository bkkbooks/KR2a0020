body:
  text: 魏書卷十三齊魏收撰烈傳第一皇后列傳漢因秦制帝之祖母曰太皇太后母曰皇太后妃曰皇后餘則多稱夫人隨世增損非如周禮有夫人嬪婦御妻之定數焉魏晉相因時有昇降前史言之具矣魏氏王業之兆雖始於神元至於昭成之前世崇儉質妃牆嬪御率多闕焉惟以次第為稱而章平思昭穆恵煬烈八帝妃后無聞太祖追尊祖妣皆從帝諡為皇后始立中宫餘妾或稱夫人多少無限然皆有品次世祖稍增左右昭儀及貴人椒房中式數等後庭漸已多矣又魏故事将立皇后必令手鑄金人以成者為吉不成則不得立也又世祖髙宗縁保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁髙祖改定内官左右昭儀位視大司馬三夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典内事内司視尚書令僕作司大監女侍中三官視二品監女尚書美人女史女賢人書史書女小書女五官視三品中才人供人中使女生才人恭使宫人視四品春衣女酒女饗女食奚官女奴視五官神元皇后竇氏沒鹿回部大人賔之女也賔臨終誡其二子速侯回題令善事帝及賔卒速侯等欲因帝㑹䘮為變語頗漏泄帝聞之知其終不奉順乃先圖之於是伏勇士於宫中晨起以佩刀殺后馳使告速侯等言后暴崩速侯等驚走來赴因執而殺之文帝皇后封氏生桓穆二帝早崩昭帝立乃葬焉髙宗初穿天淵池獲一石銘稱桓帝葬母封氏逺近赴會二十餘萬人有司以聞命藏之太廟次妃蘭氏生二子長子曰藍早卒次子思帝也桓帝皇后祁氏生三子長曰普根次恵帝次煬帝平文崩后攝國事時人謂之女國后性猛忌平文之崩后所為也平文皇后王氏廣寗人也年十三因事入宫得幸於平文生昭成帝平文崩昭成在襁褓時國有内難将害諸皇子后匿帝於袴中懼人知呪曰若天祚未終者汝便無聲遂良久不啼得免於難昭成初欲定都於灅源川築城郭起宫室議不決后聞之曰國自上世遷徙為業今事難之後基業未固若城郭而居一旦寇來難卒遷動乃止烈帝之崩國祚殆危興復大業后之力也十八年崩𦵏雲中金陵太祖即位配饗太廟昭成皇后慕容氏元真之女也初帝納元真妹為妃未幾而崩元真復請繼好遣大人長孫秩逆后元真送于境上后至有寵生獻明帝及秦明王后性聰敏多知沉厚善決斷専理内事每事多從初昭成遣衛辰兄悉勿祈還部落也后戒之曰汝還必深防衛辰辰姦猾終當滅汝悉勿祈死其子果為衛辰所殺卒如后言建國二十三年崩太祖即位配饗太廟獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖苻洛之内侮也后與太祖及故臣吏避難北徙俄而髙車奄來抄掠后乗車與太祖避賊而南中路失轄后懼仰天而告曰國家𦙍胄豈止爾絶滅也惟神靈扶助遂馳輪正不傾行百餘里至七介山南而得免難後劉顯使人将害太祖帝姑為顯弟亢埿妻知之密以告后梁眷亦來告難后乃令太祖去之后夜飲顯使醉向晨故驚廐中羣馬顯使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之故顯不使急追太祖得至賀蘭部羣情未甚歸附后從弟外朝大人悅舉部隨從供奉盡禮顯怒将害后后夜奔亢埿家匿神車中三日亢埿舉室請救乃得免會劉顯部亂始得亡歸後后弟染干忌太祖之得人心舉兵圍逼行宫后出謂染干曰汝等今安所置我而欲殺吾子也染干慙而去後后少子秦王觚使于燕慕容垂止之后以觚不返憂念寢疾皇始元年崩時年四十六祔𦵏于盛樂金陵後追加尊諡配饗焉道武皇后慕容氏寶之季女也中山平入充掖庭得幸左丞相衛王儀等奏請立皇后帝從羣臣議令后鑄金人成乃立之告於郊廟封后母孟為溧陽君後崩道武宣穆皇后劉氏劉眷女也登國初納為夫人生華隂公主後生太宗后専理内事寵待有加以鑄金人不成故不得登后位魏故事後宫産子将為儲貳其母皆賜死太祖未年后以舊法薨太宗即位追尊諡號配饗太廟自此後宫人為帝母皆正位配饗焉明元昭哀皇后姚氏姚興女也興封西平長公主太宗以后禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸之出入居處禮秩如后焉是後猶欲正位而后謙讓不當泰常五年薨帝追恨之贈皇后璽綬而後加諡焉葬雲中金陵明元密皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宫有寵生世祖及太宗即位拜貴嬪泰常五年薨諡曰密貴嬪𦵏雲中金陵世祖即位追尊號諡配饗太廟又立后廟于鄴刺史四時薦祀以魏郡太后所生之邑復其調役後甘露降于廟庭髙宗時相州刺史髙閭表修后廟詔曰婦人外成理無獨祀隂必配陽以成天地未聞有萃之國立太姒之饗此乃先皇所立一時之至感非經世之逺制便可罷祀先是世祖保母竇氏初以夫家坐事誅與二女俱入宫操行純備進退以禮太宗命為世祖保母性仁慈勤撫導世祖感其恩訓奉養不異所生及即位尊為保太后後尊為皇太后封其弟漏頭為遼東王太后訓釐内外甚有聲稱性恬素寡欲喜怒不形於色好揚人之善隐人之過世祖征凉州蠕蠕呉提入宼太后命諸将擊走之真君元年崩時年六十三詔天下大臨三日太保盧魯元監護䘮事諡曰恵𦵏崞山從后意也初后嘗登崞山顧謂左右曰吾母養帝躬敬神而愛人若死而不滅必不為賤鬼然於先朝本無位次不可違禮以從園陵此山之上可以終託故葬焉别立后寢廟於崞山建碑頌徳太武皇后赫連氏赫連屈丐女也世祖平統萬納后及二妹俱為貴人後立為皇后髙宗初崩袝𦵏金陵太武敬哀皇后賀氏代人也初為夫人生恭宗神䴥元年薨追贈貴嬪葬雲中金陵後追加號諡配饗太廟景穆恭皇后郁久閭氏河東王毗妹也少以選入東宫有寵真君元年生髙宗世祖末年薨髙宗即位追尊號諡𦵏雲中金陵配饗太廟髙宗乳母常氏本遼西人太延中以事入宫世祖選乳髙宗慈和履順有劬勞保護之功髙宗即位尊為保太后尋為皇太后謁於郊廟和平元年崩詔天下大臨三日諡曰昭𦵏於廣甯磨笄山俗謂之鳴鷄山太后遺志也依恵太后故事别立寢廟置守陵二百家樹碑頌徳文成文明皇后馮氏長樂信都人也父朗秦雍二州刺史西城郡公母樂浪王氏后生於長安有神光之異朗坐事誅后遂入宫世祖左昭儀后之姑也雅有母徳撫養教訓年十四髙宗踐極以選為貴人後立為皇后髙宗崩故事國有大䘮三日之後御服器物一以燒焚百官及中宫皆號泣而臨之后悲呌自投火中左右救之良久乃蘇顯祖即位尊為皇太后丞相乙渾謀逆顯祖年十三居于諒闇太后密定大策誅渾遂臨朝聴政及髙祖生太后躬親撫養是後罷令不聴政事太后行不正内寵李奕顯祖因事誅之太后不得意顯祖暴崩時言太后為之也承明元年尊曰太皇太后復臨朝聴政太后性聰達自入宫掖粗學書計及登尊極省決萬幾髙祖詔曰朕以虚寡㓜纂寶歴仰恃慈明緝寧四海欲報之徳正覺是憑諸鷙鳥傷生之類宜放之山林其以此地為太皇太后經始靈塔於是罷鷹師曹以其地為報徳佛寺太后與髙祖遊于方山顧瞻川阜有終焉之志因謂羣臣曰舜𦵏蒼梧二妃不從豈必逺祔山陵然後為貴哉吾百年之後神其安此髙祖乃詔有司營建夀陵於方山又起永固石室将終為清廟焉太和五年起作八年而成刋石立碑頌太后功徳太后以髙祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇文多不載太后立文宣王廟於長安又立思燕佛圖於龍城皆刋石立碑太后又制内屬五廟之孫外戚六親緦麻皆受復除性儉素不好華飾躬御縵繒而已宰人上膳案裁徑尺羞膳滋味減於故事十分之八太后嘗以體不安服菴䕡子宰人昏而進粥有蝘蜒在焉后舉匕得之髙祖侍側大怒将加極罰太后笑而釋之自太后臨朝専政髙祖雅性孝謹不欲參決事無巨細一禀於太后太后多智略猜忍能行大事生殺賞罰決之俄頃多有不關髙祖者是以威福兼作震動内外故把道徳王遇張祐苻承祖等拔自微閹嵗中而至王公王叡出入卧内數年便為宰輔賞賚財帛以千萬億計金書鐵券許以不死之詔李冲雖以器能受任亦由見寵帷幄密加錫賚不可勝數后性嚴明假有寵待亦無所縱左右纎介之愆動加捶楚多至百餘少亦數十然性不宿憾尋亦待之如初或因此更加富貴是以人人懐於利欲至死而不思退太后曾與髙祖幸靈泉池燕羣臣及藩國使人諸方渠帥各令為其方舞髙祖帥羣臣上夀太后忻然作歌帝亦和歌遂命羣臣各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至襃美叡等皆引丕等參之以示無私又自以過失懼人議已小有疑忌便見誅戮迄后之崩髙祖不知所生至如李訢李恵之徒猜嫌覆滅者十餘家死者數百人率多枉濫天下寃之十四年崩於太和殿時年四十九其日有雄雉集于太華殿髙祖酌飲不入口五日毁慕過禮諡曰文明太皇太后葬於永固陵日中而反虞於鑒𤣥殿詔曰尊旨從儉不申罔極之痛稱情允禮仰損儉訓之徳進退思惟倍用崩感又山陵之節亦有成命内則方丈外裁揜坎脱於孝子之心有所不盡者室中可二丈墳不得過三十餘步今以山陵萬世所仰復廣為六十歩辜負遺㫖益以痛絶其幽房大小棺槨質約不設明器至於素帳縵茵瓷瓦之物亦皆不置此則遵先志從册令俱奉遺事而有從有違未達者或以致怪梓宫之裏𤣥堂之内聖靈所憑是以一一奉遵仰昭儉徳其餘外事有所不從以盡痛慕之情其宣示逺近著告羣司上明儉誨之善下彰違命之失及卒哭孝文服衰近臣從服三司已下外臣衰服者變服就練七品已下盡除即吉設祔祭於太和殿公卿已下始親公事髙祖毁瘠絶酒肉不内御者三年初髙祖孝於太后乃於永固陵東北里餘豫營夀宫有終焉瞻望之志及遷洛陽乃自表瀍西以為山園之所而方山虚宫至今猶存號曰萬年堂云文成元皇后李氏梁國蒙縣人母頓丘王峻之妹也后之生也有異於常父方叔恒言此女當大貴及長姿質美麗世祖南征永昌王仁出夀春軍至后宅因得后及仁鎮長安遇事誅后與其家人送平城宫髙宗登白樓望見美之謂左右曰此婦人佳乎左右咸曰然乃下臺后得幸於齋庫中遂有娠常太后後問后后云為帝所幸仍有娠時守庫者亦私書壁記之别加驗問皆相符同及生顯祖拜貴人太安二年太后令依故事令后具條記在南兄弟及引所結宗兄洪之悉以付託臨訣每一稱兄弟輙拊胷慟泣遂薨後諡曰元皇后𦵏金陵配饗太廟獻文思皇后李氏中山安喜人南郡王恵之女也姿徳婉淑年十八以選入東宫顯祖即位為夫人生髙祖皇興三年薨上下莫不悼惜𦵏金陵承明元年追崇號諡配饗太廟孝文貞皇后林氏平原人也叔父金閭起自閹官有寵於常太后官至尚書平涼公金閭兄勝為平涼太守金閭顯祖初為定州刺史未幾為乙渾所誅兄弟皆死勝無子有二女入掖庭后容色美麗得幸於髙祖生皇子恂以恂将為儲貳太和七年后依舊制薨髙祖仁恕不欲襲前事而禀文明太后意故不果行諡曰貞皇后𦵏金陵及恂以罪賜死有司奏追廢后為庻人孝文廢皇后馮氏太師熙之女也太和十七年髙祖既終䘮太尉元丕等表以長秋未建六宫無主請正内位髙祖從之立后為皇后髙祖每遵典禮后及夫嬪以下妾御皆以次進車駕南伐后留京師髙祖又南征后率六宫遷洛陽及后父熙兄誕薨髙祖為書慰以敘哀情及車駕還洛恩遇甚厚髙祖後重引后姊昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規為内主譖構百端尋廢后為庻人后貞謹有徳操遂為練行尼後終於瑶光佛寺孝文幽皇后亦馮熙女母曰常氏本微賤得幸於熙熙元妃公主薨後遂主家事生后與北平公夙文明太皇太后欲家世貴寵乃簡熙二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未幾疾病文明太后乃遣還家為尼髙祖猶留念焉嵗餘而太后崩髙祖服終頗存訪之又聞后素疹痊除遣閹官雙三念璽書勞問遂迎赴洛陽及至寵愛過初専寢當夕宫人稀復進見拜為左昭儀後立為皇后始以疾歸頗有失徳之聞髙祖頻嵗南征后遂與中官髙菩薩私亂及髙祖在汝南不豫后便公然醜恣中常侍雙蒙等為其心腹中常侍劇鵬諫而不從憤懼致死是時彭城公主宋王劉昶子婦也年少婺居北平公馮夙后之同母弟也后求婚於髙祖髙祖許之公主志不願后欲强之婚有日矣公主密與侍婢及家僮十餘人乗輕車冒霖雨赴懸瓠奉謁髙祖自陳本意因言后與菩薩亂狀髙祖聞而駭愕未之全信而祕匿之惟彭城王侍疾左右具知其事此後后漸憂懼與母常氏求託女巫禱厭無所不至願髙祖疾不起一旦得如文明太后輔少主稱命者賞報不貲又取三牲宫中妖祠假言祈福専為左道母常或自詣宫中或遣侍婢與相報答髙祖自豫州北幸鄴后慮還見治檢彌懐危怖驟令閹人託參起居皆賜之衣裳殷勤託寄勿使漏洩亦令雙蒙充行省其信不然惟小黄門蘇興夀密陳委曲髙祖問其本末勅以勿洩至洛執問菩薩雙蒙等六人迭相證舉具得情狀髙祖以疾卧含温室夜引后并列菩薩等於戸外后臨入令閹人搜衣中稍有寸刃便斬后頓首泣謝乃賜坐東楹去御筵二丈餘髙祖令菩薩等陳狀又讓后曰汝母有妖術可具言之后乞屏左右有所密啓髙祖勅中侍悉出唯令長秋卿白整在側取衛直刀拄之后猶不言髙祖乃以綿堅塞整耳自小語呼整再三無所應乃令后言事隐人莫知之髙祖乃喚彭城北海二王令入坐言昔是汝嫂今乃他人但入勿避二王固辭不獲命及入髙祖云此老嫗乃欲白刃揷我肋上可窮問本末勿有所難髙祖深自引過致愧二王又云馮家女不能復相廢逐且使在宫中空坐有心乃能自死汝等勿謂吾猶有情也髙祖素至孝猶以文明太后故未便行廢良久二王出乃賜后辭死訣再拜稽首涕泣歔欷令入東房及入宫後帝命閹人有所問於后后罵曰天子婦親面對豈令汝𫝊也髙祖怒勅后母常入示與后狀常撻之百餘乃止髙祖尋南伐后留京師雖以罪失寵而夫人嬪妾奉之如法惟令世宗在東宫無朝謁之事髙祖疾甚謂彭城王勰曰後宫久乖隂徳自絶於天若不早為之所恐成漢末故事吾死之後可賜自盡别宫𦵏以后禮庶掩馮門之大過髙祖崩梓宫達魯陽乃行遺詔北海王詳奉宣遺㫖長秋卿白整等入授后藥后走呼不肯引決曰官豈有此也是諸王輩殺我耳整等執持强之乃含椒而盡殯以后禮梓宫次洛南咸陽王禧等知審死相視曰若無遺詔我兄弟亦當作計去之豈可令失行婦人宰制天下殺我輩也諡曰幽皇后𦵏長陵塋内孝文昭皇后髙氏司徒公肇之妹也父颺母蓋氏凡四男三女皆生於東裔髙祖初乃舉室西歸近龍城鎮鎮表后徳色婉豔任充宫掖及至文明太后親幸北部曹見后姿貌竒之遂入掖庭時年十三初后幼曾夢在堂内立而日光自窓中照之灼灼而熱后東西避之光猶斜照不已如是數夕后自怪之以白其父颺颺以問遼東人閔宗宗曰此竒徵也貴不可言颺曰何以知之宗曰夫日者君人之徳帝王之象也光照女身必有恩命及之女避猶照者主上來求女不獲已也昔有夢月入懐猶生天子况日照之徵此女必将被帝命誕育人君之象也遂生世宗後生廣平王懐次長樂公主及馮昭儀寵盛密有母養世宗之意后自代如洛陽暴薨於汲郡之共縣或云昭儀遣人賊后也世宗之為皇太子三日一朝幽后后拊念慈愛有加髙祖出征世宗入朝必久留后宫親視櫛沐母道隆備其後有司奏請加昭儀號諡曰文昭貴人髙祖從之世宗踐阼追尊配饗后先葬城西長陵東南陵制卑局因就起山陵號終寧陵置邑户五百家肅宗詔曰文昭皇太后徳協坤儀美符文姒作合髙祖實誕英聖而夙世淪暉孤塋弗祔先帝孝感自𠂻遷奉未遂永言哀恨義結幽明廢吕尊薄禮伸漢代又詔曰文昭皇太后尊配髙祖祔廟定號促令遷奉自終及始太后當主可更上尊號稱太皇太后以同漢晉之典正姑婦之禮廟號如舊文昭遷靈櫬於長陵兆西北六十步初開終寧陵數丈於梓宫上獲大虵長丈餘黑色頭有王字蟄而不動靈櫬既遷置虵舊處宣武順皇后于氏太尉烈弟勁之女也世宗始親政事烈時為領軍總心膂之任以嬪御未備因左右諷諭稱后有容徳世宗乃迎入為貴人時年十四甚見寵愛立為皇后謁于太廟后静黙寛容性不妬忌生皇子昌三嵗夭殁其後暴崩宫禁事祕莫能知悉而世議歸咎于髙夫人𦵏永泰陵諡曰順皇后宣武皇后髙氏文昭皇后弟偃之女也世宗納為貴人生皇子早夭又生建徳公主後拜為皇后甚見禮重性妬忌宫人希得進御及肅宗即位上尊號曰皇太后尋為尼居瑶光寺非大節慶不入宫中建徳公主始五六嵗靈太后恒置左右撫愛之神龜元年太后出覲母武邑君時天文有變靈太后欲以后當禍是夜暴崩天下寃之䘮還瑶光佛寺殯𦵏皆以尼禮初髙祖幽后之寵也欲専其愛後宫接御多見阻遏髙祖時言于近臣稱婦人妬防雖王者亦不能免况士庶乎世宗暮年髙后悍忌夫人嬪御有至帝崩不蒙侍接者由是在洛二十餘年皇子全育者惟肅宗而已宣武靈皇后胡氏安定臨涇人司徒國珍女也母皇甫氏産后之日赤光四照京兆山北縣有趙胡者善於卜相國珍問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也后姑為尼頗能講道世宗初入講禁中積數嵗諷左右稱后姿行世宗聞之乃召入掖庭為承華世婦而椒掖之中以國舊制相與祈祝皆願生諸王公主不願生太子唯后每謂夫人等言天子豈可獨無兒子何縁畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后固意確然幽夜獨誓云但使所懐是男次第當長子子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻䘮皇子自以春秋長矣深加慎護為擇乳保皆取良家宜子者養於别宫皇后及充華嬪皆莫得而撫視焉及肅宗踐阼尊后為皇太妃後尊為皇太后臨朝聴政猶稱殿下下令行事後改令稱詔羣臣上書曰陛下自稱曰朕太后以肅宗冲幼未堪親祭欲傍周禮夫人與君交獻之義代行祭禮訪尋故式門下召禮官博士議以為不可而太后欲以幃幔自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后薦祭故事太后大悅遂攝行初祀太后性聰悟多才藝姑既為尼幼相依託畧得佛經大義親覽萬幾手筆斷決幸西林園法流堂命侍臣射不能者罰之又自射針孔中之大悅賜左右布帛有差先是太后勅造申訟車時御焉出自雲龍大司馬門從宫西北入自千秋門以納寃訟又親策孝秀州郡計吏於朝堂太后與肅宗幸華林園宴羣臣于都亭曲水令王公已下各賦七言詩太后詩曰化光造物含氣貞帝詩曰恭已無為賴慈英王公已下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺親建刹於九級之基僧尼士女赴者數萬人及改𦵏文昭髙后太后不欲令肅宗主事乃自為䘮主出至終寧陵親奠遣事還哭於太極殿至於訖事皆自主焉後幸嵩髙山夫人九嬪公主已下從者數百人昇于頂中廢諸淫祀而胡天神不在其列後幸左蔵王公嬪主已下從者百餘人皆令任力負布絹即以賜之多者過二百匹少者百餘匹唯長樂公主手持絹二十匹而出示不異衆而無勞也世稱其廉儀同陳留公李崇章武王融並以所負過多顛仆於地崇乃傷腰融至損脚時人為之語曰陳留章武傷腰折股貪人敗類穢我明主尋幸闕口温水登鷄頭山自射象牙簮一發中之敕示文武時太后得志逼幸清河王懌淫亂肆情為天下所惡領軍元义長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宫於禁中殺懌其後太后從子都統僧敬與備身左右張車渠等數十人謀殺义復奉太后臨朝事不克僧敬坐徙邊車渠等死胡氏多免黜後肅宗朝太后於西林園讌文武侍臣飲至日夕义乃起至太后前自陳外云太后欲害已及騰太后答云無此語遂至于極昏太后乃起執肅宗手下堂言母子不聚久今暮共一宿諸大臣送我入太后與肅宗向東北小閤左衛将軍奚康生謀欲殺义不果自劉騰死义又寛怠太后與肅宗及髙陽王雍為計解义領軍太后復臨朝大赦改元自是朝政疎緩威恩不立天下牧守所在貪惏鄭儼汙亂宫掖勢傾海内李神軌徐紇並見親侍一二年中位總禁要手握王爵輕重在心宣淫於朝為四方之所厭穢文武解體所在亂逆土崩魚爛由於此矣僧敬又因聚集親族遂涕泣諫曰陛下母儀海内豈宜輕脫如此后大怒自是不召僧敬太后自以行不修懼宗室所嫌於是内為朋黨防蔽耳目肅宗所親幸者太后多以事害焉有蜜多道人能胡語肅宗置於左右太后慮其𫝊致消息三月三日於城南大巷中殺之方懸賞募賊又於禁中殺領左右鴻臚少卿谷㑹紹達並帝所親也母子之間嫌隙屢起鄭儼慮禍乃與太后計因潘充華生女太后詐以為男便大赦改年肅宗之崩事出倉卒時論咸言鄭儼徐紇之計於是朝野憤歎太后乃奉潘嬪女言太子即位經數日見人心已安始言潘嬪本實生女今宜更擇嗣君遂立臨洮王子釗為主年始三嵗天下愕然及武泰元年尒朱榮稱兵渡河太后盡召肅宗六宫皆令入道太后亦自落髪榮遣騎拘送太后及幼主於河隂太后對榮多所陳說榮拂衣而起太后及幼主並沉於河太后妹馮翊君收瘞於雙靈佛寺出帝時始葬以后禮而追加諡孝明皇后胡氏靈太后從兄冀州刺史盛之女靈太后欲榮重門族故立為皇后肅宗頗有酒徳専嬖充華潘氏后及嬪御並無過寵太后為肅宗選納抑屈人流時博陵崔孝芬范陽盧道約隴西李瓚等女但為世婦諸人訴訟咸見忿責武泰初后既入道遂居於瑶光寺孝静皇后髙氏齊獻武王之第二女也天平四年詔聘以為皇后王前後固辭帝不許興和初詔侍中司徒公孫騰司空公襄城王旭兼尚書令司州牧西河王悰兼太常卿及宗正卿元孝友等奉詔致禮并備宫官侍衛以后駕迎於晉陽之丞相第五月立為皇后大赦天下齊受禪降為中山王妃後降于尚書左僕射楊遵彦史臣曰始祖生自天女克昌後葉靈后婬恣卒亡天下傾城之戒其在兹乎鈎弋年稚子幼漢武所以行權魏世遂為常制子貴母死矯枉之義不亦過哉髙祖終革其失良有以也魏書卷十三魏書卷十三考證皇后列𫝊魏收書亡後人所補桓帝皇后𫝊祁氏祁北史作惟綱目亦作惟孝文昭皇后𫝊近龍城鎮近監本誤逵今從北史改魏書卷十三考證
