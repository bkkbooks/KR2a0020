  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0020_WYG_085-1a, image: WYG0262/WYG0262-0246c.png}
body:
  text: 魏書卷八十五齊魏收撰列𫝊文苑第七十三袁躍裴敬憲盧觀封肅邢臧裴伯茂邢昕溫子昇夫文之為用其来日久自昔聖達之作賢喆之書莫不統理成章蘊氣標致其流廣變諸非一貫文質推移與時俱化淳于出齊有雕龍之目靈均逐楚著嘉禍之章漢之西京馬揚為首稱東都之下班張為雄伯曹植信魏世之英陸機則晉朝之秀雖同時並列分途爭逺永嘉之後天下分崩夷狄交馳文章殄滅昭成太祖之世南收燕趙網羅俊乂逮高祖馭天鋭情文學葢以頡頏漢徹掩踔曹丕氣韻高豔才藻獨構衣冠仰止咸慕新風肅宗歴位文雅大盛學者如牛毛成者如麟角孔子曰才難不其然乎袁躍字景騰陳郡人尚書飜弟也博學儁才性不矯俗篤於交友飜每謂人曰躍可謂我家千里駒也釋褐司空行參軍歴位尚書都兵郎中加員外散騎常侍將立明堂躍乃上議當時稱其博洽蠕蠕主阿那􅅛亡破來奔朝廷矜之送復其國既而每使朝貢辭旨頗不盡禮躍為朝臣書與􅅛陳以禍福言辭甚美後遷車騎將軍太傅清河王懌文學雅為懌所愛賞懌之文表多出於躍卒贈冠軍將軍吏部郎中所制文集行於世無子兄飜以子聿脩繼聿脩字叔徳七歳遭喪居處禮若成人九歳州辟主簿性深沉有鑒識清靖寡欲與物無競姨夫尚書崔休深所知賞年十八領夲州中正兼尚書度支郎中齊受禪除太子庶子以夲官行博陵太守裴敬憲字孝虞河東聞喜人也益州刺史宣第二子少有志行學博才清撫訓諸弟專以讀誦為業澹於榮利風氣俊逺郡徵功曹不就諸府辟命先進其弟世人嘆美之司州牧高陽王雍舉秀才射策高第除太學博士性和雅未嘗失色於人工隸草解音律五言之作獨擅於時名聲甚重後進共宗慕之中山闕將之部朝賢送於河梁賦詩言别皆以敬憲為最其文不能贍逸而有清麗之美少有氣病年三十三卒人物甚悼之敬憲世有仁義於鄉里孝昌中蜀賊陳雙熾所過殘暴至敬憲宅輙相約束不得焚燒為物所伏如此永興三年贈中書侍郎諡曰文盧觀字伯舉范陽涿人也少好學有儁才舉秀才射策甲科除太學博士著作佐郎與太常少卿李神儶光祿大夫王誦等在尚書上省撰定朝儀拜尚書儀曹郎中孝昌元年卒封肅字元邕渤海人尚書回之兄子也早有文思博渉經史太傅崔光見而賞焉位太學博士修起居注兼廷尉監為還園賦其辭甚美正光中京兆王西征引為大行臺郎中委以書記還除尚書左中兵郎中卒肅性恭儉不妄交遊唯與崔勵勵從兄鴻尤相親善所製文章多亡失存者十餘卷邢臧字子良河間人光祿少卿虬長孫也㓜孤早立操尚博學有藻思年二十一神龜中舉秀才問策五條考上第為太學博士正光中議立明堂臧為裴頠一室之議事雖不行當時稱其理博出為本州中從事雅為鄉情所附永安初徴為金部郎中以疾不赴轉除東牟太守時天下多事在職少能廉白臧獨清慎奉法吏民愛之隴西李延寔莊帝之舅以太傅出除青州啓臧為屬領樂安内史有惠政後除濮陽太守尋加安東將軍臧和雅信厚有長者之風為時人所愛敬為特進甄琛行狀世稱其工與裴敬憲盧觀兄弟並結交分曾共讀回文集臧獨先通之撰古來文章幷叙作者氏族號曰文譜未就病卒時賢悼惜之其文筆凡百餘篇贈鎮北將軍定州刺史諡曰文子恕渉學有識悟裴伯茂河東人司空中郎叔義第二子少有風望學渉羣書文藻富贍釋褐奉朝請大將軍京兆王繼西討引為鎧曹參軍南討絳蜀陳雙熾為行臺長孫承業行臺郎中承業還京師留伯茂仍知行臺事以平薛鳯賢等賞平陽伯再遷散騎常侍典起居注太昌初為中書侍郎永熈中出帝兄子廣平王贊盛選賔僚以伯茂為文學後加中軍大將軍伯茂好飲酒頗渉疎傲久不徙官曾為豁情賦其序略曰余攝養舛和服餌寡術自春徂夏三嬰湊疾雖桐君上藥有時致効而草木下性實縈衿抱故復究覽莊生具體齊物物我兩忘是非俱遣斯人之達吾所師焉故作是賦所以托名豁情寄之風謠矣天平初遷鄴又為遷都賦文多不載二年因内宴伯茂侮慢殿中尚書章武王景哲景哲遂申啓稱伯茂棄其本列與監同行以梨撃桉傍汙冠服禁庭之内令人挈衣詔付所司後竟無坐伯茂先出後其伯仲規與兄景融别居景融貧窘伯茂了無賑恤殆同行路世以此貶薄之卒年三十九知舊歎惜焉伯茂永年劇飲不已乃至傷性多有愆失未亡前數日忽云吾得密信将被收掩乃與婦乘車西逃避後因顧指壁中言有官人追逐其妻方知其病卒後殯於家園友人常景李渾王元景盧元明魏季景李騫等十許人於墓傍置酒設祭哀哭涕泣一飲一酹曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏収亦與之友寄以示收收時在晉陽乃同其作論叙伯茂其十字云臨風想𤣥度對酒思公榮時人以伯茂性侮傲謂收詩頗得事實贈散騎常侍衛將軍度支尚書雍州刺史重贈吏部尚書諡曰文伯茂曾撰晉書竟未能成無子兄景融以第二子孝才繼邢昕字子明河間人尚書巒弟偉之子㓜孤見愛於祖母李氏好學早有才情蕭寳夤以車騎大將軍開府討闗中以子明為東閤祭酒委以文翰在軍解褐盪寇將軍累遷太尉記室參軍吏部尚書李神儁奏昕修起居注太昌初除中書侍郎加平東將軍光祿大夫時言冐竊官級為中尉所劾免官乃為述躬賦未幾受詔與祕書監常景典儀注事出帝行釋奠禮昕與校書郎裴伯茂等俱為錄義永熈末昕入為侍讀與溫子昇魏收參掌文詔遷鄴乃歸河間天平初與侍中從叔子才魏季景魏収同徴赴都尋還鄉里既而復徴時蕭衍使兼散騎常侍劉孝儀等來朝貢詔昕兼正員郎迎於境上司徒孫騰引為中郎尋除通直常侍加中軍將軍既有才藻兼長几案自孝昌之後天下多務世人競以吏工取達文學大衰司州中從事宋遊道以公斷見知時與昕嘲謔昕謂之曰世事同知文學外遊道有慙色興和中以本官副李象使於蕭衍昕好忤物人謂之牛是行也談者謂之牛象鬬於江南齊文襄王攝選擬昕為司徒右長史未奏遇疾卒士友悲之贈車騎將軍都官尚書冀州刺史謚曰文所著文章自有集錄溫子昇字鵬舉自云太原人晉大將軍嶠之後也世居江左祖恭之劉義隆彭城王義康户曹避難歸國家于濟陰寃句因為其郡縣人焉家世寒素父暉兗州左將軍府長史行濟陰郡事子昇初受學於崔靈恩劉蘭精勤以夜繼晝晝夜不倦長乃博覽百家文章清婉為廣陽王淵賤客在馬坊教諸奴子書作侯山祠堂碑文常景見而善之故詣淵謝之景曰頃見溫生淵怪問之景曰溫生是大才士淵由是稍知之熈平初中尉東平王匡博召辭人以充御史同時射策者八百餘人子昇與盧仲宣孫搴等二十四人為高第於是預選者爭相引決匡使子昇當之皆受屈而去搴謂人曰朝來靡旗亂轍者皆子昇逐北遂補御史時年二十二臺中文筆皆子昇為之以憂去任服闋還為朝請後李神儁行荆州事引兼錄事參軍被徴赴省神儁表畱不遣吏部郎中李奬退表不許曰昔伯瑜之不應留王朗所以發歎宜速遣赴無踵彦雲前失於是還員正光末廣陽王淵為東北道行臺召為郎中軍國文翰皆出其手於是才名轉盛黄門郎徐紇受四方表啓答之敏速於淵獨沉思曰彼有溫郎中才藻可畏高車破走珍寳盈滿子昇取絹四十疋及淵為葛榮所害子昇亦見覊執榮下都督和洛興與子昇舊識以數十騎濳送子昇得達冀州還京李楷執其手曰卿今得免足使夷甫慙徳自是無復宦情閉門讀書厲精不已建義初為南主客郎中修起居注曾一日不直上黨王天穆時錄尚書事将加捶撻子昇遂逃遁天穆甚怒奏人代之莊帝曰當世才子不過數人豈容為此便相放黜乃寢其奏及天穆将討邢杲召子昇同行子昇未敢應天穆謂人曰吾欲収其才用豈懐前忿也今復不來便須南走越北走胡耳子昇不得已而見之加伏波将軍為行臺郎中天穆深加賞之元顥入洛天穆召子昇問曰即欲向京師為隨我北渡對曰主上以虎牢失守致此狼狽元顥新入人情未安今往討之必有征無戰王若剋復京師奉迎大駕桓文之舉也捨此北渡竊為大王惜之天穆善之而不能用遣子昇還洛顥以為中書舎人莊帝還宮為顥任使者多被廢黜而子昇復為舎人天穆每謂子昇曰恨不用卿前計除正員郎仍舎人及帝殺尒朱榮也子昇預謀當時赦詔子昇詞也榮入内遇子昇把詔書問是何文書子昇顔色不變曰勅榮不視之尒朱兆入洛子昇懼禍逃匿永熈中為侍讀兼舎人鎮南將軍金紫光禄大夫遷散騎常侍中軍大將軍後領本州大中正蕭衍使張臯寫子昇文筆𫝊於江外衍稱之曰曹植陸機復生於北土恨我辭人數窮百六陽夏太守傅標使吐谷渾見其國主牀頭有書數卷乃是子昇文也濟隂王暉業嘗云江左文人宋有顔延之謝靈運梁有沈約任昉我子昇足以陵顔轢謝含任吐沈揚遵彦作文徳論以為古今辭人皆負才遺行澆薄險忌唯邢子才王元景溫子昇彬彬有徳素齊文襄王引子昇為大將軍府諮議參軍子昇前為中書郎嘗詣蕭衍客舘受國書自以不修容止謂人曰詩章易作逋峭難為文襄舘客元僅曰諸人當賀推子昇合陳辭子昇久忸怩乃推陸操焉及元僅劉思逸荀濟等作亂文襄疑子昇知其謀方使之作獻武王碑文既成乃餓諸晉陽獄食敝襦而死棄尸路隅没其家口太尉長史宋遊道収葬之又為集其文筆為三十五卷子昇外恬靜與物無競言有凖的不妄毁譽而内深險事故之際好預其間所以終致禍敗又撰永安記三卷無子史臣曰古之人所貴名不朽者葢重言之尚存又加之以才名其為貴顯固其宜也自餘或位下人微居常亦何能自達及其靈虵可握天網俱頓並編緗素咸貫儒林雖其位可下其身可殺千載之後貴賤一焉非此道也孰云能致凡百士子可不務乎魏書卷八十五魏書卷八十五考證列傳第七十三魏收書闕後所補封肅傳肅性恭儉不妄交遊唯與崔勵勵北史作勱魏書卷八十五考證
