body:
  text: 魏書卷六十九齊魏收撰列傳第五十七崔休裴延儁袁飜崔休字惠盛清河人御史中丞逞之𤣥孫也祖靈和仕劉義隆為員外散騎侍郎父宗伯世宗初追贈清河太守休少孤貧矯然自立舉秀才入京師與中書郎宋弁通直郎邢巒雅相知友尚書王嶷欽其人望為長子娉休姊贍以貨財由是少振髙祖納休妹為嬪以為尚書主客郎轉通直正員郎兼給事黄門侍郎休好學渉獵書史公事軍旅之隙手不釋卷崇尚先達愛接後來常參髙祖侍席禮遇次于宋郭之輩髙祖南伐以北海王為尚書僕射統留臺事以休為尚書左丞髙祖詔休曰北海年少未閑政績百揆之務便以相委轉長史兼給事黄門侍郎後從駕南行及車駕還幸彭城汎舟泗水詔在侍筵觀者榮之世祖初休以弟亡祖父未葬固求渤海於是除之性嚴明雅長治體下車先戮豪猾數人廣布耳目所在姦盜莫不擒翦百姓畏之寇盜止息清身率下渤海大治時大儒張吾貴有盛名於山東西方學士咸相宗慕弟子自逺而至者恒千餘人生徒既衆所在多不見容休乃為設爼豆招延禮接使肄業而還儒者稱為口實入為吏部郎中遷散騎常侍權兼選任休愛才好士多所拔擢廣平王懷數引談宴世宗責其與諸王交遊免官後除龍驤將軍洛州刺史在州數年以母老辭州許之尋行幽州事徵拜司徒右長史休聰明彊濟雅善斷決幙府多事辭訟盈几剖判若流殊無疑滯加之公平清潔甚得時談復除吏部郎中加征虜將軍冀州大中正遷光禄大夫行河南尹肅宗初即真加平東將軍尋除平北將軍幽州刺史進號安北將軍遷安東將軍青州刺史青州九郡民單􅋆李伯徽劉通等一千人上書訟休德政靈太后善之休在幽青州五六年皆清白愛民甚著聲績二州懷其德澤百姓追思之徵為安南將軍度支尚書尋進號撫軍將軍七兵尚書又轉殿中尚書休乆在臺閣明習典禮毎朝廷疑議咸取正焉諸公咸相謂曰崔尚書下意處我不能異也正光四年卒年五十二賵帛五百匹贈車騎將軍尚書僕射冀州刺史諡文貞侯休少而謙退事母孝謹及為尚書子仲文納丞相雍苐二女女妻領軍元义長庻子秘書郎稚舒挾恃二家志氣㣲改内有自得之心外則陵藉同列尚書令李崇左僕射蕭寶夤右僕射元欽皆以雍义之故毎憚下之始休母房氏欲以休女妻其外孫邢氏休不欲乃違其母情以妻义子議者非之休有九子長子㥄字長儒武定中七兵尚書武城縣開國公㥄弟仲文散騎常侍仲文弟叔仁性輕俠重衿期歴通直散騎侍郎司徒司馬散騎常侍出為驃騎將軍潁州刺史以貪汙為御史所劾興和中賜死於宅臨刑賦詩與諸弟訣别而不及其兄以其不甚營救故也叔仁弟叔義孝莊時為尚書庫部郎坐兄㥄鑄錢事發合家逃逸數日叔義遂見執獲時城陽王徽為司州牧臨淮王彧以非其身罪驟為致言徽不從乃殺之叔義弟子侃以竊級為中書郎為尚書左丞和子岳彈糾失官後兼通直常侍使於蕭衍還路病卒子侃弟子聿武定末東莞太守卒子聿弟子約開府祭酒休弟夤字敬禮太子舎人早卒贈樂安太守妻安樂王長樂女晉寧主也貞烈有德行子長謙好學修立少有令名仕歴給事中仍還鄉里乆之刺史尉景取為開府諮議參軍事晚頗以酒為損天平中被徵兼主客郎接蕭衍使張臯等後兼散騎常侍使蕭衍還卒於宿豫時人歎惜之以死王事贈驃騎將軍南青州刺史裴延儁字平子河東聞喜人魏冀州刺史徽之八世孫曾祖天明諮議參軍并州别駕祖雙虎河東太守卒贈平逺將軍雍州刺史諡曰順父崧州主簿行平陽郡事以平蜀賊丁蟲功贈東雍州刺史延儁少偏孤事後母以孝聞渉獵墳史頗有才筆舉秀才射策髙第除著作佐郎遷尚書儀曹郎轉殿中郎太子洗馬又領本邑中正及太子友太子恂廢以宫官例免頃之除太尉掾兼太子中舎人世宗初為散騎侍郎尋除雍州平西府長史加建威將軍入為中書侍郎時世宗專心釋典不事墳籍延儁上疏諌曰臣聞有堯文思欽明稽古媯舜體道慎典作聖漢光神叡軍中讀書魏武英規馬上翫籍先帝天縱多能克文克武營遷謀伐手不釋卷良以經史義深補益處廣雖則劬勞不可暫輟斯乃前王之美實後王之水鏡善足以遵惡足以誡也陛下道悟自深淵鑒獨得昇法座於宸闈釋覺善於日宇凡在聼矚塵蔽俱開然五經治世之模六籍軌俗之本蓋以訓物有漸應時匪妙必須先麤後精乗近即逺伏願經書互覽孔釋兼存則内外俱周真俗斯暢後除司州别駕加鎮逺將軍及詔立明堂羣官博議延儁獨著一堂之論太傅清河王懌時典衆議讀而笑曰子故欲逺符僕射也兼太子中庻子尋即正别駕如故加冠軍將軍肅宗初還散騎常侍監起居注加前將軍又加平西將軍除廷尉卿轉平北將軍幽州刺史范陽郡有舊督亢渠徑五十里漁陽燕郡有故戾陵諸堰廣袤三十里皆廢毁多時莫能修復時水旱不調民多飢餒延儁謂疏通舊跡勢必可成乃表求營造遂躬自履行相度水形隨力分督未幾而就溉田百萬餘畝為利十倍百姓至今頼之又命主簿酈惲修起學校禮敎大行民歌謡之在州五年考績為天下最廷儁繼母隨延儁在薊時遇重患延儁啓求侍母還京療治至都未幾拜太常卿時汾州山胡恃險冦竊正平平陽二郡尤被其害以延儁兼尚書為西北道行臺節度討胡諸軍尋遇疾勑還三鵶羣蠻寇掠不已車駕欲親征之延儁乃於病中上疏諌諍尋除七兵尚書安南將軍徙殿中尚書加中軍將軍轉散騎常侍中書令御史中尉又以本官兼侍中吏部尚書延儁在臺閣守職而已不能有所裁斷直繩也莊帝初於河隂遇害贈都督雍岐豳三州諸軍事儀同三司本將軍雍州刺史子元直尚書郎中元直弟敬猷員外常侍兄弟並有學尚與父同時遇害元直贈光州刺史敬猷妻丞相髙陽王雍外孫超贈尚書僕射延儁從叔桃弓亦見稱於鄉里子夙字買興沉雅有器識儀望甚偉髙祖見而異之自司空主簿轉尚書左主客郎中時吏部尚書任城王澄有知人鑒毎歎美夙以逺大許之髙祖南伐為行臺吏部郎仍除征北大將軍穆亮從事中郎轉為河北太守以忠恕接下百姓感之卒於郡年四十三長子範字宗模早卒範子凝字長儒卒於武平鎮將範弟昇之鑒武定末昇之太尉掾鑒司徒右長史延儁從祖弟良字元賔起家今朝請轉北中府功曹參軍世宗初南絳縣令稍遷并州安北府長史入為中散大夫領尚書考功郎中時汾州吐京羣胡薛羽等作逆以良兼尚書左丞為西北道行臺値别將李德龍為羽所破良入汾州與刺史汝隂王景和及德龍率兵數千憑城自守賊併力攻逼詔遣行臺裴延儁大都督章武王融都督宗正珍孫等赴援時有五城郡山胡馮宜都賀悅回成等以妖妄惑衆假稱帝號服素衣持白傘白幡率諸逆衆於雲臺郊抗拒王師融等與戰敗績賊乗勝圍城良率將士出戰大破之於陣斬回成復誘導諸胡令斬送宜都首又山胡劉蠡升自云聖術胡人信之咸相影附旬日之間逆徒還振德龍議欲拔城良不許徳龍等乃止景和薨以良為汾州刺史加輔國將軍行臺如故都督髙防來援復敗於百里候先是官粟貸民未及收聚仍値寇亂至是城民大飢人相食賊知倉庫空虛攻圍日甚死者十三四良以飢窘因與城人奔赴西河汾州之治西河自良始也時南絳蜀陳雙熾等聚衆反自號建始王與大都督長孫雅宗正珍孫等相持不下詔良觧州為慰勞使轉太中大夫本部中正孝莊末除光禄大夫尒朱榮死榮從子天光擁衆闗西乃詔良持節假安西將軍潼關都督又兼尚書為河東恒農河北宜陽行臺以備之前廢帝時除征東將軍金紫光禄大夫尋轉衛將軍又加散騎常侍車騎將軍右光禄大夫轉驃騎將軍左光禄大夫出帝末除汲郡太守孝静初衛大將軍太府卿天平二年秋卒時年六十一贈使持節都督雍華二州諸軍事吏部尚書本將軍雍州刺史諡曰貞又重贈侍中驃騎大將軍尚書僕射餘如故子叔祉武定末太子洗馬良從父兄子慶孫字紹逺少孤性倜儻重然諾釋褐員外散騎侍郎正光末汾州吐京羣胡薛悉公馬牒騰並自立為王聚黨作逆衆至數萬詔慶孫為募人别將招率鄉豪得戰士數千人以討之胡賊屢來逆戰慶孫身先士卒毎摧其鋒遂深入至雲臺郊諸賊更相連結大戰郊西自旦及夕慶孫身自突陳賊王闕郭康兒賊衆大潰勑徵赴都除直後於後賊復鳩集北連蠡升南通絳蜀凶徒轉盛復以慶孫為别將從軹關入討至齊子嶺東賊帥范多范安族等率衆來拒慶孫與戰復斬多首乃深入二百餘里至陽胡城朝廷以此地被山帶河衿要之所肅宗末遂立邵郡因以慶孫為太守假節輔國將軍當郡都督民經賊亂之後率多逃竄慶孫務安緝之咸來歸業永安中還朝除太中大夫尒朱榮之死也世隆擁衆北渡詔慶孫為大都督與行臺源子恭率衆追擊軍次太行而慶孫與世隆宻通事泄追還河内而斬之時年三十六慶孫任俠有氣鄉曲壯士及好事者多相依附撫養咸有恩紀在郡之日值歳饑凶四方遊客常有百餘慶孫自以家糧贍之性雖麤武愛好文流與諸才學之士咸相交結輕財重義座客常滿是以為時所稱子子瑩永安中太尉行參軍延儁從祖弟仲規少好經史頗有志節起家奉朝請領侍御咸陽王禧為司州牧辟為主簿仍表行建興郡事車駕自代還洛次於郡境仲規備供帳朝於路側髙祖詔仲規曰朕開置神畿郡望闕一字重卿既首應司隸美舉復督我名邦何能自致也仲規對曰陛下窮神盡聖應天順民棄彼𤣥壤來宅紫縣臣方罄心力躍馬呉會冀功銘帝籍勲書王府豈一郡而已髙祖笑曰冀卿必副此言車駕達河梁見咸陽王謂曰昨得汝主簿為南道主人六軍豐贍元弟之寄殊副所望尋除司徒主簿仲規父在鄉疾病棄官奔赴以違制免乆之中山王英征義陽引為統軍奏復本資於陳戰殁時年四十八贈河東太守諡曰貞無子弟叔義以第二子伯茂為之後伯茂在文苑𫝊叔義亦有學行髙祖末除兗州安東府外兵參軍累遷太山太守為政清静吏民安之遷司空從事中郎正光五年夏卒時年五十七贈征虜將軍東秦州刺史諡曰宣子景融字孔明篤學好屬文正光初舉秀才射策髙第除太學博士永安中秘書監李凱以景融才學啓除著作佐郎稍遷輔國將軍諌議大夫仍領著作出帝時議孝莊諡事遂施行時詔撰四部要畧令景融専典竟無所成元象中儀同髙岳以為録事參軍弟景顔被劾廷尉獄景融入選吏部擬郡為御史中丞崔暹所彈云其貪昩茍進遂坐免官武定四年冬病卒年五十景融卑退亷謹無競於時雖才不稱學而緝綴無倦文詞汎濫理㑹處寡所作文章别有集録又造鄴都晉都賦云景顔頗有學尚起家汝南王開府行參軍孝莊初為廣州防蠻别將行廣漢郡事元顥入洛與刺史鄭先護據州起義事寧賜爵保城子以軍功稍遷太尉從事中郎轉諮議參軍孝静初徙司空長史在官貪穢武定二年為中尉崔暹所劾事下廷尉遇疾死於獄年四十五仲規弟子伯珍歴襄威將軍員外散騎郎西河太守孝静初為平東將軍滎陽太守卒官時年三十二贈本將軍雍州刺史延儁族子禮和觧褐員外散騎侍郎遷謁者僕射身長九尺腰帶十圍於羣衆之中魁然有異出為陳留太守卒於金紫光禄大夫延儁族兄聿字外興以操尚貞立為髙祖所知自著作佐郎出為北中府長史時髙祖以聿與中書侍郎崔亮並清貧欲以幹禄優之乃以亮帶野王縣聿帶温縣時人榮之轉尚書郎遷太尉諮議參軍出為平秦太守卒贈冠軍將軍洛州刺史子子袖殁關西延儁族人瑗字珍寶太和中析屬河北郡少孤貧而清苦自立太守司馬悅召為中正悅為别將軍征義陽引為中兵參軍瑗夙夜恭勤為悅所知軍還除奉朝請轉給事中汝南王悅郎中令悅散費無常毎國俸初入一日之中分賜極意瑗毎隨例恒辭多受少伺悅虛竭還來奉貢悅雖性理不恒然亦相賞愛悅遷太尉請為從事中郎轉驍騎將軍肅宗末出為汝南太守不行轉太原太守屬肅宗崩尒朱榮初謀赴洛瑗預其事封五原縣開國子邑三百户尋行并州事轉平北將軍殷州刺史孝静初除衛將軍東雍州刺史興和元年卒年七十三子夷吾武定末徐州驃騎府長流參軍袁飜字景翔陳郡項人也父宣有才筆為劉彧青州刺史沈文秀府主簿皇興中東陽州平隨文秀入國而大將軍劉昶毎提引之言是其外祖淑之近親令與其府諮議參軍袁濟為宗宣時孤寒甚相依附及飜兄弟官顯與濟子洸演遂各凌競洸等乃經公府以相排斥飜少以才學擅美一時初為奉朝請景明初李彪在東觀飜為徐紇所薦彪引兼著作佐郎以參史事及紇被徙尋觧後遷司徒祭酒揚烈將軍尚書殿中郎正始初詔尚書門下於金墉中書外省考論律令飜與門下録事常景孫紹廷尉監張虎律博士侯堅固治書侍御史髙綽前軍將軍邢苗奉車都尉程靈虬羽林監王元龜尚書郎祖瑩宋世景員外郎李琰之太樂令公孫崇等並在議限又詔太師彭城王勰司州牧髙陽王雍中書監京兆王愉前青州刺史劉芳左衛將軍元麗兼將作大匠李韶國子祭酒鄭道昭廷尉少卿王顯等入預其事後除豫州中正是時修明堂辟雍飜議曰謹案明堂之義古今諸儒論之備矣異端競構莫適所歸故不復逺引經傳傍採紀籍以為之證且論意之所同以訓詔闕字耳蓋唐虞已上事難該悉夏殷已降校可知之謂典章之極莫如三代郁郁之盛從周斯美制禮作樂典刑在焉遺風餘烈垂之不朽案周官考工所記皆記其時事具論夏殷名制豈其紕繆是知明堂五室三代同焉配帝象行義則明矣及淮南呂氏與月令同文雖布政班時有堂个之别然推其體例則無九室之證既而世衰禮壞法度淆弛正義殘隠妄說斐然明堂九室著自戴禮探緒求源罔知所出而漢氏因之自欲為一代之法故鄭𤣥云周人明堂五室是帝一室也合於五行之數周禮依數以為之室德行疑於今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也於今不同是漢異周也漢為九室畧可知矣但就其此制猶竊有懵焉何者張衡東京賦云乃營三宮布敎班常複廟重屋八達九房此乃明堂之文也而薛綜注云房室也謂堂後有九室堂後九室之制非巨異乎裴頠又云漢氏作四維之个不能令各據其辰就使其像可圖莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘於載籍且鄭𤣥之詁訓三禮及釋五經異義並盡思窮神故得之逺矣覽其明堂圖義皆有悟人意察察著明確乎難奪諒足以扶㣲闡幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易𤣥之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可準觀夫今之基址猶或髣髴髙卑廣狹頗與戴禮不同何得以意抑心便謂九室可明且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難明故有一屋之論並非經典正義皆以意妄作兹為不典學家常談不足以範時軌世皇代既乗乾統厯得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏放篇之浮說徒損經紀雅誥之遺訓而欲以支離横議指畫妄圖儀刑宇宙而貽來葉者也又北京制置未皆允怗繕修草創以意良多事移禮變所存者無幾理苟宜革何必仍舊且遷都之始日不遑給先朝規度毎事循古是以數年之中悛換非一良以永法為難數改為易何為宮室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言明堂五室請同周制郊建三雍求依故所庻有會經誥無失典刑識偏學疎退慙謬浪後議選邊戍事飜議曰臣聞兩漢警於西北魏晉備在東南是以鎮邊守塞必寄威重伐叛柔服寔頼温良故田叔魏尚聲髙於沙漠當陽鉅平績流於江漢紀籍用為美談今古以為盛德自皇上以叡明纂御風凝化逺威厲秋霜惠霑春露故能使淮海輸誠華陽即序連城請面北屋歸仁懸車劒閣豈伊曩載鼓譟金陵復在兹日然荆揚之牧宜盡一時才望梁郢之君无須當今秀異自比縁邊州郡官至便登壃場統戍階當即用或值穢德凡人或遇貪家惡子不識字民温恤之方唯知重役殘忍之法廣開戍邏多置帥領或用其左右姻親或受人財貨請屬皆無防寇禦賊之心唯有通商聚斂之意其勇力之兵驅令抄掠若値彊敵即為奴虜如有執獲奪為已富其羸弱老小之輩㣲觧金鐵之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或耘草平陸販貿往還相望道路此等禄既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬歴夏加之疾苦死於溝瀆者常十七八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乗擾故驅率犬羊屢犯壃場頻年以來甲胄生蟣十萬在郊千金日費為弊之深一至於此皆由邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本既失之在始庸可止乎愚謂自今以後荆揚徐豫梁益諸蕃及所統郡縣府佐統軍至於戍主皆令朝臣王公已下各舉所知必選其才不拘階級若能統御有方清髙獨著威足臨戎信能懷逺撫循將士得其忻心不營私潤専修公利者則就加爵賞使乆於其任以時襃賚厲其忠欵所舉之人亦垂優異奬其得士嘉其誠節若不能一心奉公才非捍禦貪惏日富經畧無聞人不見德兵厭其勞者即加顯戮用彰其罪所舉之人隨事免降責其謬薦罸其偽薄如此則舉人不得挾其私受任不得孤其舉善惡既審沮勸亦明庻邊患永消譏議攸息矣遭母憂去職熙平初除冠軍將軍廷尉少卿尋加征虜將軍後出為平陽太守飜為廷尉頗有不平之論及之郡甚不自得遂作思歸賦曰日色黯兮髙山之岑月逄霞而未晈霞值月而成隂望他鄉之阡陌非舊國之池林山有木而蔽月川無梁而復深悵浮雲之弗限何此恨之難禁於是雜石為峯諸烟共色秀出無窮烟起不極錯飜花而似繡網遊絲其如織蝶兩戲以相追燕雙飛而鼓翼怨驅馬之悠悠歎征夫之未息爾乃臨峻壑坐層阿北眺羊膓詰屈南望龍門嵯峨疊千重以聳翠横萬里而揚波逺􅏈鼯與麏麝走鰩鼈及龜鼉彼暧然兮鞏洛此邈矣兮關河心鬱鬱兮徒傷思摇摇兮空滿思故人兮不見神翻覆兮魂斷斷魂兮如亂憂來兮不散俯鏡兮白水水流兮漫漫異色兮縱横奇光兮爛爛下對兮碧沙上覩兮青岸岸上兮氤氲駮霞兮絳氛風摇枝而為弄日照水以成文行復行兮川之畔望復望兮望夫君君之門兮九重門余之别兮千里分願一見兮導我意我不見兮君不聞魄惝怳兮知何語氣繚戾兮獨縈緼彼鳥馬之無知尚有情於南北雖吾人之固鄙豈忘懐於上國去上國之美人對下邦之鬼蜮形既同於魍魎心匪殊於蝥賊欲修之而難化何不殘之云剋知進退之非可徒終朝以黙黙願生還於洛濵荷天地之厚德神龜末遷冠軍將軍涼州刺史時蠕蠕主阿那瓌後主婆羅門並以國亂來降朝廷問飜安置之所飜表曰謬以非才忝荷邊任偎垂訪逮安置蠕蠕主阿那瓌婆羅門等處所逺近利害之宜竊惟匈奴為患其來乆矣雖隆周盛漢莫能障服衰弱則降富彊則叛是以方叔召虎不遑自息衛青去病勤亦勞止或修文德以來之或興干戈以伐之而一得一失利害相侔故呼韓來朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆場自卜惟洛食定鼎伊瀍髙車蠕蠕迭相吞噬始則蠕蠕衰㣲髙車彊盛蠕蠕則自救靡暇髙車則僻逺西北及蠕蠕復振反破髙車王䘮民離不絶如綫而髙車今能終雪其恥復摧蠕蠕者正由種類繁多不可頓滅故也然鬬此兩敵即卞莊之算得使境上無塵數十年中者抑此之由也今蠕蠕為髙車所討滅外憑大國之威靈兩主投身一朞而至百姓歸誠萬里相屬進希朝廷哀矜剋復宗社退望庇身有道保其妻兒雖乃逺夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絶列聖同規撫降䘏附綿經共軌若棄而不受則虧我大德若納而禮待則損我資儲來者既多全徙内地非直其情不願迎送艱難然夷不亂華殷鑒無逺覆車在於劉石毁轍固不可尋且蠕蠕尚存則髙車猶有内顧之憂未暇窺窬上國若蠕蠕全滅則髙車跋扈之計豈易可知今蠕蠕雖主奔於上民散於下而餘黨實繁部落猶衆處處碁布以望今主耳髙車亦未能一時并兼盡令率附又髙車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦彊敵唯涼州敦煌而已涼州土廣民希糧仗素闕敦煌酒泉空虛尤甚若蠕蠕無復竪立令髙車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主皆宜存之居阿那瓌於東偏處婆羅門於西裔分其降民各有攸屬那瓌住所非所經見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡本屬涼州今在酒泉直抵張掖西北千二百里去髙車所住金山一千餘里正是北虜往來之衝要漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事為便即可永為重戍鎮防西北宜遣一良將加以配衣疑仍令監護婆羅門凡諸州鎮應徙之兵隨宜割配且田且戍雖外為置蠕蠕之舉内實防髙車之策一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙渡流沙即是我之外蕃髙車勍敵西北之虞可無過慮如其姦囬返覆孤恩背德者此不過為逋逃之冦於我何損今不早圖戎心一啓脫先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州燉煌及於西海躬行山谷要害之所親閱亭障逺近之宜商量士馬校練糧仗部分見定處置得所入春西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為羣正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度㣲似小損歳終大計其利實多髙車豺狼之心何可專信假令稱臣致欵正可外加優納而復内備彌深所謂先人有奪人之心者也管窺所陳懼多孟浪時朝議是之還拜吏部郎中加平南將軍光禄大夫以本將軍出為齊州刺史無多政績孝昌中除安南將軍中書令領給事黄門侍郎與徐紇俱在門下並掌文翰飜既才學名重又善附㑹亦為靈太后所信待是時蠻賊充斥六軍將親討之飜乃上表諌止後蕭寳夤大敗於關西飜上表請為西軍死亡將士舉哀存而還者并加賑賚後拜度支尚書尋轉都官飜表曰臣往忝門下翼侍帳幄同時流輩皆以出離左右蒙數階之陟唯臣奉辭非但直去黄門今為尚書後更在中書令下於臣庸朽誠為叨濫凖之倫匹或有未盡竊惟安南之與金紫雖是異品之隔實有半階之校加以尚書清要位遇通顯準秩論資似加少進語望比官人不願易臣自揆自顧力極求此伏願天地成造有始有終矜臣疲病乞臣骸骨願以安南尚書換一金紫時天下多事飜雖外請閑秩而内有求進之心識者怪之於是加撫軍將軍肅宗靈太后曾燕於華林園舉觴謂羣臣曰袁尚書朕之杜預欲以此杯敬屬元凱今為盡之侍座者莫不羡仰飜名位俱重當時賢達咸推與之然獨善其身無所奬拔排抑後進懼其凌已論者鄙之建義初遇害於河隂年五十三所著文筆百餘篇行於世贈使持節侍中車騎將軍儀同三司青州刺史嫡子寳首武定中司徒記室參軍寳首兄叔德武定末太子中舎人飜弟躍語在文苑𫝊躍弟颺本州治中别駕豫州冠軍府司馬而卒颺弟昇太學博士司徒記室尚書儀曹郎中正員郎通直常侍颺死後昇通其妻飜慙恚為之發病昇終不止時人鄙穢之亦於河隂見害贈左將軍齊州刺史史臣曰崔休立身有本當官著聞朝之良也裴儁器業位望有可稱乎袁飜文髙價重其當時之才秀歟魏書卷六十九魏書卷六十九考證崔林𫝊時大儒張吾貴有盛名於山東臣人龍按本書張吾貴𫝊吾貴辯能飾非好為詭說由是業不見𫝊此則稱為大儒有盛名矛盾如此魏書卷六十九考證
