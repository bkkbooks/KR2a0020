body:
  text: 魏書卷六十五齊魏收撰列傳第五十三邢巒李平邢巒字洪賓河間鄭人也五世祖嘏石勒頻徵不至嘏無子巒髙祖蓋自旁宗入後蓋孫頴字宗敬以才學知名世祖時與范陽盧𤣥渤海髙允等同時被徵後拜中書侍郎假通直常侍寧朔將軍平城子銜命使於劉義隆後以病還鄉里乆之世祖訪頴於羣臣曰往憶邢頴長者有學義宜侍講東宮今其人安在司徒崔浩對曰頴臥疾在家世祖遣太醫馳驛就療卒贈冠軍將軍定州刺史諡曰康子脩年即巒父也州主簿巒少而好學負帙尋師家貧厲節遂博覽書𫝊有文才幹略美鬚髯姿貌甚偉州郡表貢拜中書博士遷員外散騎侍郎為髙祖所知賞兼員外散騎常侍使於蕭賾還拜通直郎轉中書侍郎甚見顧遇常參座席髙祖因行藥至司空府南見巒宅遣使謂巒曰朝行藥至此見卿宅乃住東望徳館情有依然巒對曰陛下移構中京方建無窮之業臣意在與魏昇降寧容不務永年之宅髙祖謂司空穆亮僕射李沖曰巒之此言其意不小有司奏策秀孝詔曰秀孝殊問經權異策邢巒才清可令策秀後兼黄門郎從征漢北巒在新野後至髙祖曰伯玉天迷其心鬼惑其慮守危邦固逆主乃至如此巒曰新野既摧衆城悉潰唯有伯玉不識危機平殄之辰事在旦夕髙祖曰至此以來雖未擒滅城隍已崩想在不逺所以緩攻者正待中書為露布耳尋除正黄門兼御史中尉瀛州大中正遷散騎常侍兼尚書世宗初巒奏曰臣聞昔者明王之以德治天下莫不重粟帛輕金寶然粟帛安國育民之方金玉是虚華損徳之物故先皇深觀古今去諸奢侈服御尚質不貴雕鏤所珍在素不務奇綺至乃以紙絹為帳扆銅鐵為轡勒訓朝廷以節儉示百姓以憂務日夜孜孜小大必慎輕賤珠璣示其無設府藏之金裁給而已更不買積以費國資逮景明之初承升平之業四疆清晏遠邇來同於是蕃貢繼路商賈交入諸所獻貿倍多於常雖加以節約猶嵗損萬計珍貨常有餘國用恒不足若不裁其分限便恐無以支嵗自今非為要須者請皆不受世宗從之尋正尚書常侍如故蕭衍梁秦二州行事夏侯道遷以漢中内附詔加巒使持節都督征梁漢諸軍事假鎭西將軍進退徵攝得以便宜從事巒至漢中白馬以西猶未歸順巒遣寧遠將軍楊舉統軍楊衆愛氾洪雅等領卒六千討之軍鋒所臨賊皆款附唯補谷戍主何法靜據城拒守懸等進師討之法靜奔潰乗勝追奔至闗城之下蕭衍龍驤將軍闗城流雜疑李侍叔逆以城降蕭衍輔國將軍任僧幼等三十餘將率南安廣長東洛大寒武始除口平溪桶谷諸郡之民七千餘戸相繼而至蕭衍平西將軍李天賜晉壽太守王景允等擁衆七千屯據石亭統軍韓多寶等率衆擊之破天賜前軍趙䐗擒斬一千三百遣統軍李義珍討晉壽景允宵遁遂平之詔曰巒至彼須有板官以懷初附髙下品第可依征義陽都督之格也拜巒使持節安西將軍梁秦二州刺史蕭衍巴西太守龎景民恃遠不降巒遣巴州刺史嚴元思往攻之斬景民巴西悉平蕭衍遣其冠軍將軍孔陵等率衆二萬屯據深坑冠軍將軍曾方達固南安冠軍將軍任僧褒輔國將軍李畎戍石同巒統軍王足所在擊破之梟衍輔國將軍樂保明寧朔將軍李伯度龍驤將軍李思賢賊遂保囬車柵足又進擊衍輔國將軍范峻自餘斬獲殆將萬數孔陵等收集遺衆奔保梓潼足又破之斬衍輔國將軍符伯度其殺傷投溺者萬有餘人開地定民東西七百南北千里獲郡十四二部護軍及諸縣戍遂逼涪城巒表曰揚州成都相去萬里陸途既絶唯資水路蕭衍兄子淵藻去年四月十三日發揚州今嵗四月四日至蜀水軍西上非周年不達外無軍援一可圖也益州頃經劉季連反叛鄧元起攻圍資儲散盡倉庫空竭今猶未復兼民人喪膽無復固守之意二可圖也蕭淵藻是羣劇少年未洽治務及至益州便戮鄧元超曹亮宗臨戎斬將則是駕馭失方范國惠津渠退敗鏁執在獄今之所任並非宿將重名皆是左右少年而已既不厭民望多行殘暴民心離觧三可圖也蜀之所恃唯劒閣今既剋南安巳奪其險據彼界内三分已一從南安向涪方軌任意前軍累破後衆喪魂四可圖也昔劉禪據一國之地姜維為佐鄧艾既出綿竹彼即投降及符堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓温西征不旬月而平蜀地昔來恒多不守况淵藻是蕭衍兄子骨肉至親若其逃亡當無死理脫軍剋涪城淵藻復何宜城中坐而受困若其出鬬庸蜀之卒唯便刀矟弓箭至少假有遥射弗至傷人五可圖也臣聞乗機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在於今矣是以踐極之初壽春馳款先嵗命將義陽剋闢淮外謐以風清荆沔於焉肅晏方欲偃甲息兵候機而動而天贊休明時來斯速雖欲靖戎理不獲已至使道遷歸誠漢境佇㧞臣以不才屬當戎寄内省文吏不以軍謀自許指臨漢中惟規保疆守界事屬艱途東西宼竊上憑國威下仗將士邊帥用命頻有薄㨗藉勢乗威經度大劒既剋南安據彼要險前軍長邁已至梓潼新化之民飜然懷惠瞻望涪益旦夕可屠正以兵少糧匱未宜前出為爾稽緩懼失民心則更為宼今若不取後圖便難輒率愚管庶幾殄剋如其無功分受憲坐且益州殷實戸餘十萬比壽春義陽三倍非匹可乗可利實在于兹若朝廷志存保民未欲經略臣之在此便為無事乞歸侍養㣲展烏鳥詔曰若賊敢闚􅎿觀機翦撲如其無也則安民保境以悅邊心子蜀之舉更聼後勑方將席卷岷蜀電掃西南何得辭以戀親中途告退宜朂令圖務申髙略巒又表曰昔鄧艾鍾㑹率十八萬衆傾中國資給裁得平蜀所以然者鬬實力故也况臣才絶古人智勇又闕復何宜請二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可剋今王足前進已逼涪城脫得涪城則益州便是成擒之物但得之有早晚耳且梓潼已附民戸數萬朝廷豈得不守之也若守也直保境之兵則已一萬臣今請二萬五千所増無幾又劒閣天險古來所稱張載銘云世亂則逆世清斯順此之一言良可惜矣臣誠知征戎危事不易可為自軍度劒閣以來鬢髮中白憂慮戰懼寧可一日為心所以勉强者既得此地而自退不守恐辜先皇之恩遇負陛下之爵禄是以孜孜頻有陳請且臣之意算正欲先圖涪城以漸而進若剋涪城便是中分益州之地斷水陸之衝彼外無援軍孤城自守復何能持乆哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大剋不得則自全又巴西南鄭相離一千四百去州迢遞恒多生動昔在南之日以其統綰勢難故增立巴州鎮靜夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯五三族落雖在山居而多有豪右文學箋啟往往可觀冠帶風流亦為不少但以去州既遠不能仕進至於州綱無由厠迹巴境民豪便是無梁州之分是以鬱怏多生動靜比建議之始嚴𤣥思自號巴州刺史剋城以來仍使行事巴西廣袤一千戸餘四萬若彼立州鎮攝華獠則大帖民情從墊江已還不復勞征自為國有世宗不從又王足於涪城輒還遂不定蜀巒既剋巴西遣軍主李仲遷守之仲遷得蕭衍將張法養女有美色甚惑之散費兵儲専心酒色公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城降衍將譙希遠巴西遂没武興氐楊集起等反叛巒遣統軍傅豎眼討平之語在豎眼𫝊巒之初至漢中從容風雅接豪右以禮撫細民以惠嵗餘之後頗因百姓去就誅滅齊民籍為奴婢者二百餘口兼商販聚歛清論鄙之徵授度支尚書時蕭衍遣兵侵軼徐兖緣邊鎮戍相繼陷没朝廷憂之乃以巒為使持節都督東討諸軍事安東將軍尚書如故世宗勞遣巒於東堂曰蕭衍寇邊旬朔滋甚諸軍舛互規致連戍陷没宋魯之民尤罹湯炭誠知將軍旋京未久膝下難違然東南之寄非將軍莫可將軍其勉建殊績以稱朕懷自古忠臣亦非無孝也巒對曰賊雖送死連城犬羊衆盛然逆順理殊滅當無逺况臣仗陛下之神算奉律以摧之平殄之期可指辰而待願陛下勿以東南為慮世宗曰漢祖有云金吾擊郾吾無憂矣今將軍董戎朕何慮哉先是蕭衍輔國將軍蕭及先率衆二萬寇陷固城冠軍將軍魯顯文驍騎將軍相文玉等率衆一萬屯於孤山衍將角念等率衆一萬擾亂龜蒙土民從逆十室而五巒遣統軍樊魯討文玉别將元恒攻固城統軍畢祖朽討角念樊魯大破文玉等追奔八十餘里斬首四千餘級元桓又破固城畢祖朽復破念等兖州悉平巒破賊將藍懷恭於睢口進圍宿豫而懷恭等復於淮南造城規斷水陸之路巒身率諸軍自水南而進遣平南將軍楊大眼從北逼之統軍劉思祖等夾水造筏燒其舩舫衆軍齊進拔柵填塹登其城火起中流四面俱擊仍陷賊城俘斬數萬在陳别斬懷恭擒其列侯列將直閤直後三千餘人俘斬一萬宿豫既平蕭昞亦於淮陽退走二戍獲米四十餘萬石世宗賜巒璽書曰知大龕醜虜威振賊庭淮外霧披徐方卷濭王略逺恢混一維始公私慶泰何快如之賊衍此舉實為傾國比者宿豫陷殁淮陽嬰城凶狡侜張規抗王旅將軍忠規協著火烈霜摧電動岱隂風掃沂嶧遂令逋誅之寇一朝殱夷元鯨大憝千里折首殊勲茂㨗自古莫二但揚區未安餘燼宜盪乘勝掎角勢不可遺便可率厲三軍因時經略申威東南清彼江介忘此仍勞用圖永逸進退規度委之髙算又詔巒曰淮陽宿豫雖已清復梁城之賊猶敢聚結事宜乗勝并勢摧殄可率二萬之衆渡淮與征南掎角以圖進取之計及梁城賊走中山王英乗勝攻鍾離又詔巒帥衆㑹之巒表曰奉彼詔㫖令臣濟淮與征南掎角乗勝長驅實是其㑹但愚懷所量竊有未盡夫圖南因於積風伐國在於資給用兵治戎須先計校非可抑為必闕幸其無能若欲掠地誅民必應萬勝如欲攻城取邑未見其果得之則所益未幾不獲則虧損必大蕭衍傾竭江東為今嵗之舉疲兵喪衆大敗而還君臣失計取笑天下雖野戰非人敵守城足有餘今雖攻之未易可剋又廣陵懸逺去江四十里鍾離淮隂介在淮外假其歸順而來猶恐無糧艱守况加攻討勞兵士乎且征南軍士從戎二時疲敝死病量可知巳雖有乘勝之資懼無逺用之力若臣之愚見謂宜修復舊戍牢實邊方息養中州擬之後舉又江東之釁不患乆無畜力待機謂為勝計詔曰濟淮掎角事如前勑何容猶爾盤桓方有此請可速進軍經略之宜聼征南至要巒又表曰蕭衍侵境乆勞王師今者奔走實除邊患斯由靈贊皇魏天敗寇豎非臣等弱劣所能剋勝若臣之愚見今正宜修復邊鎭俟之後動且蕭衍尚在凶身未除螳蜋之志何能自息唯應廣備以待其來實不宜勞師逺入自取疲困今中山進軍鍾離實所未觧若能為得失之計不顧萬全直襲廣陵入其内地出其不備或未可知正欲屯兵蕭密餘軍猶自在彼欲言無糧運船復至而欲以八十日糧圖城者臣未之前聞且廣陵任城可為前戒豈容今者復欲同之今若往也彼牢城自守不與人戰城塹水深非可填塞空坐至春則士自敝苦遣臣赴彼糧何以致夏來之兵不齎冬服脫遇氷雪取濟何方臣寧荷怯儒不進之責不受敗損空行之罪鍾離天險朝貴所具若有内應則所不知如其無也必無剋状若其不復其辱如何若信臣言也願賜臣停若謂臣難行求囬臣所領兵統悉付中山任其處分臣求單騎隨逐東西且俗諺云耕則問田奴絹則問織婢臣雖不武忝備征將前宜可否頗實知之臣既謂難何容强遣詔曰安東頻請罷軍遲回未往阻異戎規殊乖至望士馬既殷無容停積宜務神速東西齊契乗勝掃殄以赴機㑹巒累表求還世宗許之英果敗退時人伏其識略初侍中盧昶與巒不平昶與元暉俱世宗所寵御史中尉崔亮昶之黨也昶暉令亮糾巒事成許言於世宗以亮為侍中亮於是奏劾巒在漢中掠良人為奴婢巒懼為昶等所陷乃以漢中所得巴西太守龎景民女化生等二十餘口與暉化生等數人奇色也暉大悅乃背昶為巒言於世宗云巒新有大功已經赦宥不宜方為此獄也世宗納之髙肇以巒有剋敵之效而為昶等所排助巒申釋故得不坐豫州城民白早生殺刺史司馬悅以城南入蕭衍遣其冠軍將軍齊茍仁率衆入據懸瓠詔巒持節率羽林精騎以討之封平舒縣開國伯食邑五百戸賞宿豫之功也世宗臨東堂勞遣巒曰司馬悅不慎重門之戒智不足以謀身匪直喪元隸賢乃大虧王略懸瓠密邇近畿東南藩捍兼云闕公在彼憂慮尤深早生理不獨立必逺引呉楚士民同惡勢或交兵卿文昭武烈朝之南仲故命卿星言電邁出其不意卿言早生走也守也何時可以平之巒對曰早生非有深謀大智能構成此也但因司馬悅虐於百姓乗衆怒而為之民為凶威所懾不得已而苟附假蕭衍軍入應水路不通糧運不繼亦成擒耳不能為害也早生得衍軍之接溺於利欲之情必守而不走今王師若臨士民必翻然歸順圍之窮城奔走路絶不度此年必𫝊首京師願陛下不足垂慮世宗笑曰卿言何其壯哉深㑹朕遣卿之意知卿親老頗勞於外然忠孝不俱才宜救世不得辭也於是巒率騎八百倍道兼行五日次於鮑口賊遣大將軍胡孝智率衆七千去城二百逆來拒戰巒擊破孝智乗勝長驅至於懸瓠賊出城逆戰又大破之因即渡汝既而大兵繼至遂長圍之詔加巒使持節假鎮南將軍都督南討諸軍事征南將軍中山王英南討三闗亦次於懸瓠以後軍未至前寇稍多憚不敢進乃與巒分兵掎角攻之衍將齊苟仁等二十一人開門出降即斬早生等同惡數十人豫州平巒振旅還京師世宗臨東堂勞之曰卿役不踰時剋清妖醜鴻勲碩美可謂無愧古人巒對曰此自陛下聖略威靈英等將士之力臣何功之有世宗笑曰卿匪直一月三㨗所足稱奇乃存士伯欲功成而不處巒自宿豫大㨗及平懸瓠志行修正不復以財賄為懷戎資軍實絲毫無犯遷殿中尚書加撫軍將軍延昌三年暴疾卒年五十一巒才兼文武朝野贍望上下悼惜之詔賻帛四百匹朝衣一襲贈車騎大將軍瀛州刺史初世宗欲贈冀州黄門甄琛以巒前曽劾己乃云瀛州巒之本邦人情所欲乃從之及琛為詔乃云優贈車騎將軍瀛州刺史議者笑琛淺薄諡曰文定子遜字子言貌雖陋短頗有風氣解褐司徒行參軍襲爵後遷國子愽士本州中正因謁靈太后自陳功名之子乆抱沉屈臣父屢為大將而臣身無軍功階級臣父唯為忠臣不為慈父靈太后慨然以遜為長兼吏部郎中出為安遠將軍平州刺史時北蕃多難稽留不進免孝莊初除輔國將軍通直散騎常侍東道軍司討逆賊劉舉於濮陽不尅還除散騎常侍加前將軍永安二年坐受任元顥除名尋除撫軍將軍金紫光禄大夫出帝時轉衛將軍右光禄大夫孝静初以本官領甞藥典御加車騎將軍乆之除大司農卿與少卿馬慶哲至相糾訟遜銳於財利議者鄙之武定四年卒年五十六贈本將軍光禄勲卿幽州刺史子祖㣲開府祭酒父喪未終謀反伏法巒弟儒瀛州鎮逺府長史給事中儒弟偉尚書郎中卒贈博陵太守子昕在文苑傳偉弟季彦季彦弟晏字幼平美風儀博渉經史善談釋老雅好文詠起家太學博士司徒東閤祭酒世宗初為與廣平王懷遊晏左遷鄚縣令未之官除給事中遷司空主簿本州中正汝南王文學稍遷輔國將軍司空長史兼吏部郎中以本將軍出為南兖州刺史徵為太中大夫兼丞相髙陽王右長史尋以本將軍除滄州刺史為政清静吏民安之孝昌中卒時年五十一贈征北將軍尚書左僕射瀛州刺史諡曰文貞晏篤於義讓初為南兖州刺史例得一子觧褐乃啟其孤弟子子慎年甫十二而其子已弱冠矣後為滄州復啟孤兄子昕為府主簿而其子並未從宦世人以此多之子測武定末太子洗馬測弟亢字子髙頗有文學釋褐司空行參軍遷廣平王開府從事中郎兼通直散騎常侍使於蕭衍時年二十八還除平東將軍齊文襄王大將軍府屬又轉中外府屬武定七年坐事死於晉陽年三十四巒叔祖祐字宗祐少有學尚知名於時徵除著作郎領樂良王傅後假員外散騎常侍使於劉彧以將命之勤除建威將軍平原太守賜爵城平男政清刑肅百姓安之卒年七十三子産字神寶好學善屬文少時作孤蓬賦為時所稱舉秀才除著作佐郎假員外常侍鄚縣子使於蕭賾產仍世將命時人美之後遷中書侍郎俄遷太子中庻子卒年四十六朝廷嗟惜焉贈建威將軍平州刺史樂城子諡曰定祐從子虬字神虎少為三禮鄭氏學明經有文思舉秀才上第為中書議郎尚書殿中郎髙祖因公事與語問朝覲宴饗之禮虬以禮對大合上㫖轉司徒屬國子博士髙祖崩尚書令王肅多用新儀虬徃徃折以五經正禮轉尚書右丞徙左丞多所糾正臺閣肅然時鴈門人有害母者八座奏轘之而瀦其室宥其二子虬駮奏云君親無將將而必誅今謀逆者戮及朞親害親者今不及子既逆甚梟獍禽獸之不若而使禋祀不絶遺育永𫝊非所以勸忠孝之道存三綱之義若聖教含容不加孥戮使父子罪不相及惡止於其身不則宜投之四裔勑所在不聼配匹盤庚言無令易種於新邑漢法五月食梟羹皆欲絶其類也奏入世宗從之尋除司徒右長史遷龍驤將軍光禄少卿虬母在鄉遇患請假歸值秋水暴長河梁破絶虬得一小舩而渡漏而不没時人異之母喪哀毁過禮為時所稱年四十九卒贈征虜將軍幽州刺史諡曰威虬善與人交清河崔亮頓丘李平並與親善所作碑頌雜筆三十餘篇有二子長子臧在文苑𫝊臧弟子才武定末太常卿虬從子策亦有才學卒於齊王儀同開府主簿李平字曇定頓丘人也彭城王嶷之長子少有大度及長渉獵羣書好禮易頗有文才太和初拜通直散騎侍郎髙祖禮之甚重頻經大憂居喪以孝稱後以例降襲爵彭城公拜太子中舍人遷散騎侍郎舍人如故遷太子中庻子平因侍從容請自效一郡髙祖曰卿復欲以吏事自試也拜長樂太守政務清静吏民懷之車駕南伐以平兼冀州儀同開府長史甚著聲稱仍除正長史太守如故未幾遂行河南尹豪右權貴憚之世宗即位除黄門郎遷司徒左長史行尹如故尋以稱職正尹長史如故車駕將幸鄴平上表諌曰伏見巳丑詔書雲軒鑾輅行幸有期鳳服龍驂剋駕近日將欲講武淇陽大習鄴魏馳驌騻於緑竹之區騁驎驥於漳􅇭之壤斯誠幽顯同忻人靈共悅臣之愚管竊有惑焉何者嵩京創構洛邑俶營雖年跨十稔根基未就代民至洛始欲向盡資產罄於遷移牛畜斃於輦運陵太行之險越長津之難辛勤備經得達京闕富者猶損大半貧者可以意知兼歴嵗從戎不遑啟處自景明已來差得休息事農者未積二丰之儲築室者裁有數間之屋莫不肆力伊瀍人急其務寔宜安静新人勸其稼穡令國有九年之糧家有水旱之備若乗之以羈紲則所廢多矣一夫從役舉家失業今復秋稼盈田禾菽遍野鑾駕所幸騰踐必殷未若端拱中天坐招四海耀武崧原禮射伊洛士馬無跋涉之勞兆民有康哉之詠可不美歟不從詔以本官行相州事世宗至鄴親幸平第見其諸子尋正刺史加征虜將軍平勸課農桑修飾太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二子於堂親為立讚前來臺使頗好侵取平乃畫履虎尾踐薄冰於客館注頌其下以示誡焉加平東將軍徵拜長兼度支尚書尋正尚書領御史中尉冀北刺史京兆王愉反於信都以平為使持節都督北討諸軍事鎮北將軍行冀州事以討之世宗臨式乾殿勞遣平曰愉朕之元弟居不疑之地豺狼之心不意而發欲上傾社稷下殘萬姓大義滅親夫豈獲止周公行之於古朕亦當行之於今委卿以専征之任必令應期摧殄務盡經略之規勿虧推轂之寄也何圖今日言及斯事因歔欷流涕平對曰臣愉天迷其心構此梟悖陛下不以臣不武委以總督之任今大宥既敷便應有征無戰脫守迷不悟者當仰憑天威抑厲將士譬猶太陽之消㣲露巨海之蕩熒燭天時人事滅在昭然如其稽顙軍門則送之大理若不悛待戮則鳴鼓釁鍾非陛下之事平進次經縣諸軍大集夜有蠻兵數千斫平前壘矢及平帳平堅臥不動俄而乃定遂至冀州城南十六里賊攻圍濟州軍拔柵填塹未滿者數尺諸將合戰無利而還憚於更進平親入行間勸以重賞士卒乃前大破逆衆愉時墜馬乃有一人下馬授愉止而鬬死乗勝逐北至於城門斬首數萬級遂圍城燒門愉與百餘騎突門出走遣統軍叔孫頭追之去信都八十里擒愉冀州平世宗遣兼給事黄門侍郎祕書丞元梵宣㫖慰勞徵還京師以本官領相州大中正平先為尚書令髙肇侍御史王顯所恨後顯代平為中尉平加散騎常侍顯効平在冀州隠截官口肇又扶成其狀奏除平名延昌初詔復官爵除其定冀之勲前來良賤之訟多有積年不决平奏不問真偽一以景明年前為限於是爭訟止息武川鎮民飢鎮將任款請貸未許擅開倉賑恤有司繩以費散之條免其官爵平奏款意在濟人心無不善世宗原之遷中書令尚書如故肅宗初轉吏部尚書加撫軍將軍平髙明彊濟所在有聲但以性急為累尚書命任城王澄奏理平定冀之勲請酬以山河之賞靈太后乃封武邑郡開國公食邑一千五百戸縑二千五百疋先是蕭衍遣其左游擊將軍趙祖悅偷據西硤石衆至數萬以逼壽春鎮南崔亮攻之未剋又與李崇乖貳詔平以本官使持節鎮軍大將軍兼尚書右僕射為行臺節度諸軍東西州將一以禀之如有乖異以軍法從事詔平長子奬以通直郎從賜平縑帛百叚紫納金裝衫甲一領賜奬縑布六十叚絳衲襖一領父子重列拜受家庭觀者榮之於是率歩騎二千以赴壽春平廵視硤石内外知其盈虚之所嚴勒崇亮令水陸兼備剋期齊舉崇亮憚之無敢乖互頻日交戰屢破賊軍安南將軍崔延伯立橋於下蔡以拒賊之援軍賊將王神念昌義之等不得進救祖悅守死窮城平乃部分攻之令崔亮督陸卒攻其城西李崇勒水軍擊其東面然後鼓噪南北俱上賊衆周章東西赴戰屠賊外城賊之將士相率歸附祖悅率其餘衆固保南城通夜攻守至明乃降斬祖悅送首於洛俘獲甚衆以功遷尚書右僕射加散騎常侍將軍如故平還京師靈太后見於宣光殿賜以金裝刀杖一口時南徐州表云蕭衍堰淮水為患詔公卿議之平以為不假兵力終自毁壞及淮堰破靈太后大悅引羣臣入宴勑平前鳴簫管肅宗手賜縑布百叚熙平元年冬卒遺命薄葬詔給東園祕器朝服一具衣一襲帛七百疋靈太后為舉哀於東堂贈侍中驃騎大將軍儀同三司冀州刺史諡文烈公平自在度支至於端副夙夜在公孜孜匪懈凡處機密十有餘年有獻替之稱所製詩賦箴諫詠頌别有集録平長子奬字遵穆襲容貌魁偉有當世才度自太尉參軍事稍遷通直郎中書侍郎直閤將軍吏部郎中征虜將軍遷安東將軍光禄大夫仍吏部郎中又以本官兼尚書出為撫軍將軍相州刺史初元义擅朝奬為其親待頻居顯要靈太后反政削除官爵孝莊初為散騎常侍鎮東將軍河南尹奬前後所歴皆以明濟著稱元顥入洛顥以奬兼尚書右僕射慰勞徐州羽林及城人不承顥㫖害奬𫝊首洛陽出帝時奬故吏通直散騎常侍宋游道上書理奬曰臣聞賞善罸惡謂之二機有道存焉所貴不濫是以子胥無罪呉人痛之郄宛不幸國言未息故河南尹李奬門居戚里世擅名家有此良才是兼周用自少及長忠孝為心入朝出牧清明流譽襟懷放暢風神爽發實廊廟之瑚璉社稷之楨幹往嵗北海竊據負扆當朝王公卿士俛眉從事而奬闔門百口同居京洛既被羈縶自拔無由託使東南情存避難當時物論謂其得所然北海未敗之日徐州刺史元孚為其純臣莫之敢距表啟相望遲速唯命及皇輿返正神器斯復輕薄之徒共生僥倖詭言要賞曲道求通濫及善人稱為己力若以奬受命賊朝語跡成罪便與天下共當此責于時朝㫖唯命免官亦既經恩方加酷濫伊昔具臣比肩賊所身臨河上日尋干戈時逢寛政任遇不改一介使人獨嬰斯戮凡在有心孰不嗟悼前朝所以論功者見其邊人且相慰悅其有郭黙生亂劉允懸首事乃權宜蓋非實録昔鄧艾下世叚灼理其寃馬援物故朱勃申其屈臣雖小人趣事君子有懷舊恩義兼人故見其若此乆欲陳辭含言未吐遂至今日幽泉已閉壟樹成行内手捫心顧懷愧慨幸逢興聖理運唯新雖日纂戎事同創革頻有大恩被於率土亡官失爵者悉蒙追復而奬雜木猶存牛車未改士感知已懷此無忘輕率瞽言干犯輦轂伏願天鑒賜垂矜覽加其贈秩慰此幽魂詔贈衛將軍冀州刺史子構襲武定末太子中舎人齊受禪爵例降構弟訓太尉黙曹叅軍奬弟諧字䖍和風流閑潤博學有文辯當時才俊咸相欽賞受父前爵彭城侯自太尉參軍歴尚書郎徐州北海王顥撫軍府司馬入為長兼中書侍郎崔光引為兼著作郎諧在史職無所歴意加輔國將軍相州大中正光禄大夫除金紫光禄大夫加衛將軍元顥入洛以為給事黄門侍郎顥敗除名乃為述身賦曰夫休咎相躡禍福相生龜筮迷其兆聖達蔽其萌覽成敗於前迹料趣舍於人情咸爭途以走利罕外已以逃名連從車以載禍多廐馬以取刑豈知夫一介獨往乃千乗所不能傾伊薄躬之悔吝無性命之淑靈藉休庸於祖武仰餘烈於家聲徒從師以下學之遊道於上京洎方年之四五實始筮之弱齡爰釋巾而從吏謬邀寵於時明彼闕一字闕一字之赫赫乃陋周而小漢帝文篤其成功我武治其未亂掩四奥而同軌穆三辰而貞觀威北暢而武戢鼎南遷而文煥異人相趨於絳闕鴻生接武於儒館總羣雅而同歸果方員而殊貫伊濫吹之所從初竊服於宰旅奉盛王之髙義遊兎園而容與綴鴻鷺之末行連英髦之茂序及伯舅之西伐赫靈旗之東舉復奉役於前轅仍執羈於後距廹𤣥冬之暮嵗歴闗山之遐阻風激沙而破石雪浮河而漫野樂在志其無端悲涉物而多緒俄宫車之晏駕改乗轅而歸予屬推恩之在今自傍枝而禔福既獻闕一字以命宗叨㣲躬於侯服禮空文於覜饗賦無征於湯沐思守位而匪懈每屏居而自肅忽忝命於建禮遊丹綺之重複信兹選之為難乃上應於列宿陽源猶且自免何稱仲治與太叔余生闕一字之蕭散本寓名而為仕好不存於吏法才實踈於政理竟火燭之不事徒博弈其賢已竊自託於諸生頗馳騁於文史通人假其餘論士林察於闕一字理乃妄涉於風流遂飾輩於士子且以自託闕四字雖邇傒塵滓而賞許雲霞棲閑虚以築館背城闕而為家帶二學之髙宇逺三市之狹邪事雖儉而未陋製有度而不奢山隠勢於複石水回流於激沙樹先春而動色草迎嵗而發花座有清談之客門交好事之車或林嬉於月夜或水宴於景斜肆雕章之腴㫖咀文藝之英華差緑芰與丹藕薦朱李及甘𤓰雖慙洛水之名致有類金谷之諠譁聊自足於所好豈留連於或號思烱戒而自反朂身名於所蹈奉哲后之淵猷讚崇麾於華奥豈千乗之乏使感一眄之相勞竟不留於三月因病滿而休告彼東觀之清華乃任隆於載筆蔡一去而貽恨張再選而有述忽牽短而濫官司惇史於藏室慙班子之繁麗㣲馬生之簡實復通籍而延寵陪帝扄之華密信儀鳯之所棲乃絲文之自出歴五載而徘徊猶官命之不改謝能飛於無翼故同滯於有待晚加秩於戎章乃闕一字號之斯在屬運道之將季諒冠屨之無碍奄昇御於鼎湖忽流哀於四海昔漢命之中㣲皇統於是三絶暨孝昌之陵陂亦繼闕一字而禍結將小雅之詩廢復三綱之道滅思跼蹐於時昏獨沉吟於運閉遂退處於窮里不外交於人世及數反於中興驅時雄而電逝既藉取亂之權方乗轉圓之勢俄隙開而守廢遂冠冕之毁裂彼膏原而塗野嗟衛肝與稽血何古今之一揆毎治少而亂多盧遁身於東掖荀窘迹於南羅時獲逃於闕一字阜仍竄宿於巖阿首丘急於明發東路長其如何遽登舟而鼓柂乃㳂洛而汎河騖寸隂於不測競征鳥於歸波時在所而放命連百萬於山東何信都之巨猾若封豕與大風肆吞噬於觜距咸邑燼而野空徑黎陽之寇聚廹崖壘之渢隆躁通川而鼎沸矢交射於舟中備百罹於兹日諒陳蔡之非窮乗虎口而獲濟陵陽侯而迅往得投憇於濮陽實陶衛之舊壤望鄉村而佇立曽不遥之河廣聞虜馬之夕嘶見胡塵之晝上王略恢而廟勝車徒發而雷響扇風師之猛氣張天罼之層網裁一鼓而冰銷俄氛祲之廓蕩昔蘧生之出奔覩亡徵於亂政及季子之來反乃君立而位定伊吾人之蕞爾本無傒於衰盛忻草茅而偃伏且優遊於宸慶復推斥於宦流延光華於璽命甫聞内侍之忝復奉優加之令何金紫之陸離鬱貂玉之相映時權定之云初尚民心之易擾何建武之明傑茂雄姿於天表忽靈命之有歸藉親均而爭紹師出楚而飈發斾陵江而雲矯闢閶闔之崢嶸端冕旒於億兆神駕逝以流越翠華飈而繚繞茍命舛而數違雖功深而祚夭時難忽然已及網羅周其四張非五三之親暱罕狥節於漢陽彼百寮之冠帶咸北面於西王矧恩疎而任逺固身存而義亡及宸居之反正振天網於頽綱甄大義以明罰虚半列於周行乃褫帶而來反驅下澤於故鄉探宿志以内求撫身途而自計不詭遇以邀合豈釣名以干世獨浩然而任已同虚舟之不繫既未識其所以來亦豈知其所以逝於是得喪同遣忘懷自深遇物栖息觸地山林雖因西浮之迹何異東都之心願自託於魚鳥永得性於飛沉庻保此以獲没不再罪於當今孝静初遭母憂還鄉里徵為魏尹將軍如故以禫制未終表辭朝議亦以為優仍許其讓蕭衍求通和好朝廷盛選行人以諧兼散騎常侍為聘使主諧至石頭蕭衍遣其主客郎范胥當接諧問胥曰主客在郎官幾時胥答曰我本訓胄虎門適復今任諧言國子博士不應左轉為郎胥答曰特為接應逺賓故權兼耳諧言屈已濟務誠得事宜由我一介行人令卿左轉胥答曰自顧菲薄不足對揚盛美豈敢言屈胥問曰今猶尚暖北間當小寒於此諧答曰地居隂陽之正寒暑適時不知多少胥曰所訪鄴下豈是測影之地諧答曰皆是皇居帝里相去不逺可得統而言之胥曰洛陽既稱盛羙何事還鄴諧答曰不常厥邑于兹五邦王者無外所在闗河復何所怪胥曰殷人否危故遷相耿貴朝何為而遷諧答聖人藏往知來相時而動何必俟於隆替胥曰金陵王氣兆於先代黄旗紫蓋本出東南君臨萬邦故宜在此諧答曰帝王符命豈得與中國比隆紫蓋黄旗終於入洛無乃自害也有口之說乃是俳諧亦何足道蕭衍親問諧曰魏朝人士德行四科之徒凡有幾人諧對曰本朝多士等如林文武賢才布在列位四科之美非無其人庸短造次無以備啓衍曰武王有亂臣十人魏雖人物之盛豈得頓如卿言諧曰愚謂周稱十人本無佐命至於濟濟多士實是文王之詩皇朝廊廟之才足與周人有競衍曰若爾文足摽異武有冠絶者便可指陳諧曰大丞相渤海王秉文經武左右皇極畫一九州懸衡四海録尚書汝陽王元叔昭尚書令元世儁宗室之秀綰政朝端左僕射司馬子如右僕射髙隆之並時譽民英戮力匡輔侍中髙岳侍中孫騰勲賢忠亮宣贊王猷自餘才美不可具悉衍曰故宜輔弼幼主永固基業深不可言江南稱其才辯使還除大司農卿加驃騎將軍轉祕書監遇偏風廢頓武定二年卒年四十九時人悼惜之贈驃騎大將軍衛尉卿齊州刺史所著文集别有集録行於世長子嶽武定末司徒祭酒嶽弟庶尚書南主客郎諧弟邕字修穆幼而儁爽有逸才著作佐郎髙陽王雍友凡所交遊皆倍年儁秀才藻之美為時所稱年二十五卒贈鎮逺將軍洛州刺史諡曰文史臣曰邢巒以文武才策當軍國之任内參機揆外寄折衝其緯世之器歟李平以髙明幹略効智於時出入當官功名克著蓋贊務之英也魏書卷六十五魏書卷六十五考證邢巒𫝊河間鄭人也鄭應作鄚史記趙世家注鄚屬涿郡觀本𫝊巒弟晏左遷鄚縣令巒叔祖祐子彦假員外常侍鄚縣子益可知其誤矣子蜀之舉更聼後勅子當作平魏書卷六十五考證
