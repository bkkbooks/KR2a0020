body:
  text: 魏書卷十一齊魏收撰帝紀第十一前廢帝廣陵王紀後廢帝安定王紀出帝平陽王紀前廢帝諱恭字修業廣陵恵王羽之子也母曰王氏少端謹有志度長而好學事祖母嫡母以孝聞正始中襲爵延昌中拜通直散騎常侍神龜中進兼散騎常侍正光二年正常侍領給事黄門侍郎帝以元义擅權遂稱疾不起久之因託瘖病五年執除金紫光祿大夫加散騎常侍建義元年除儀同三司王既絶言垂將一紀居於龍花寺無所交通永安末有白莊帝者言王不語將有異圖民間遊聲又云有天子之氣王懼禍逃匿上洛㝷見追躡執送京師拘禁多日以無狀獲免及莊帝崩尒朱世隆等以元曄疎逺又非人望所推以王潜嘿晦身有過人之量將謀廢立恐實不語乃令王所親申其意且兼廹脅王遂答曰天何言哉世隆等大悅春三月己巳曄進至邙南世隆等奉王東郭之外行禪讓之禮羣臣上表曰否泰㳂時殷憂啓聖故六飛在御三石興符伏惟陛下運屬千齡智用萬物獨昭繫象妙極天人寳歴有歸光宅攸屬而將安獨善不務兼濟靈命徘徊幽明載佇伏願時順謳謡念兹宗祏用捨勞疾允答人神王答曰自量𦕈身是以讓執然王公勤至不可拒違今敬承所陳惟愧弗堪負荷耳太尉公尒朱度律奉進璽綬衮冕之服乃就輅車百官侍衛入自建春雲龍門昇太極前殿羣臣拜賀禮畢登閶闔門詔曰朕以寡薄撫臨萬邦思與億兆同兹慶泰可大赦天下以魏為大魏改建明二年為普泰元年其稅市及稅鹽之官可悉廢之百雜之户貸賜民名官任仍舊天下調絹四百一疋内外文武普汎四階合叙未定第者亦沾級除名免官者特復本資品封依舊頴川王尒朱兆彭城王尒朱仲逺隴西王尒朱天光樂平王尒朱世隆常山王尒朱度律車騎大將軍儀同三司齊獻武王都督斛斯椿下軍士普汎六級庚午詔曰朕以眇身臨王公之上夕惕祗懐若履氷谷賴七廟之靈百辟忠誠之舉庶免墜殁夫三皇稱皇五帝云帝三代稱王迭沖挹也自秦之末競為皇帝忘負乗之深殃垂貪鄙於萬葉予今稱帝已為褒矣可普告令知是月鎮逺將軍清河崔祖螭聚青州七郡之衆十餘萬人圍東陽幽州刺史劉靈助起兵於薊撫軍將軍金紫光禄大夫兼侍中河北大使髙乾邕及弟平北將軍通直散騎常侍敖曹率衆夜襲冀州執刺史元嶷殺監軍孫白鷂共推前河内太守封隆之行州事三月癸酉封長廣王瞱為東海王詔太師驃騎大將軍青州刺史魯郡王肅還為太師特進車騎大將軍沛郡王欣為太傅司州牧改封淮陽王驃騎大將軍開府儀同三司徐州刺史彭城王尒朱仲逺驃騎大將軍儀同三司雍州刺史隴西王尒朱天光並為大將軍柱國大將軍并州刺史頴州王尒朱兆為天柱大將軍驃騎大將軍儀同三司左衛將軍大都督晋州刺史平陽郡開國公齊獻武王封渤海王増邑五百戸特進車騎大將軍清河王亶為儀同三司侍中太傅驃騎大將軍開府儀同三司尚書令樂平王尒朱世隆為太保開府前司徒公長孫稚為太尉公録尚書事侍中驃騎大將軍開府儀同三司趙郡王諶為司空公稚固辭㝷除驃騎大將軍開府儀同三司丙子帝引見尚書右僕射元羅及皇宗於顯陽殿勞勉之丁丑加驃騎大將軍北華州刺史公孫畧儀同三司己卯詔右衛將軍賀拔勝并尚書一人募伎作及雜戸從征者正入出身皆授實官私馬者優一大階庚辰以侍中衛將軍咸陽王坦衛將軍尚書左僕射南陽王寳炬侍中征東將軍平陽王修並儀同三司乙酉詔簡北來及在京二官員外剩置者己丑以持節驃騎將軍涇州刺史賀拔岳為儀同三司岐州刺史使持節車騎大將軍渭州刺史侯莫陳悅為儀同三司秦州刺史庚寅詔天下有徳孝仁賢忠義志信者可以禮召赴闕不應召者以不敬論丙申劉靈助率衆次於安國城定州刺史侯淵破斬之傳首京師戊戌以使持節侍中車騎大將軍斛斯椿侍中衛將軍元受並特進儀同三司詔曰頃官方失序仍令沙汰定員簡剩已有判決退下之徒微亦可愍諸在簡下可特優一級皆授將軍預參選限隨能補用是春冠軍將軍南青州刺史茹懐朗使其部將何寳率歩騎三千擊蕭衍守將於琅邪擒其尚書左僕射儀同三司雲麾將軍徐兖二州刺史劉相如夏四月癸卯幸華林都亭燕射班錫有差太樂奏伎有倡優為愚癡者帝以非雅戲詔罷之壬子有事於太廟癸丑詔以齊獻武王為使持節侍中都督冀州諸軍事驃騎大將軍開府儀同三司大都督東道大行臺冀州刺史驃騎大將軍安定王尒朱智虎為開府儀同三司肆州刺史乙卯以右衛將軍賀㧞勝武衛將軍大野拔並為儀同三司己未帝於顯陽殿簡試通直散騎常侍散騎侍郎通直郎剰員非才他轉之癸亥隴西王尒朱天光大破宿勤明達擒送京師斬之丙寅以侍中驃騎大將軍尒朱彦伯為司徒公詔有司不得復稱偽梁罷細作之條無禁鄰國往還詔員外諫議大夫歩兵校尉奉車都尉羽林監給事中積射將軍奉朝請殿中將軍宫門僕射殿中司馬督治禮郎十一官得俸而不給力老合外選者依常格其未老欲外選者聼解其七品以上朔望入朝若正員有闕随才進補前員外簡退優階者追之稱事簡下者仍優一級先是南陽太守趙修延執刺史李琰之五月丙子荆州城民斬修延送首還推琰之為刺史尒朱仲逺使其都督魏僧朂等討崔祖螭於東陽擒斬之六月庚申齊獻武王以尒朱逆亂始興義兵於信都西定殷州斬其刺史尒朱羽生命南趙郡太守李元忠為刺史鎮廣阿癸亥帝臨顯陽殿親理寃訟戊辰以使持節驃騎大將軍開府􅈛朱弼為儀同三司秋七月壬申􅈛朱世隆等害前太保楊椿前司空公楊津及其家丙戌司徒公尒朱彦伯以旱遜位戊子除彦伯侍中開府儀同三司庚寅以侍中太保開府尚書令樂平王尒朱世隆為儀同三司位次上公八月庚子詔隴西王尒朱天光下文武討宿勤明達者汎三級頴川王尒朱兆率歩騎二萬出井陘趨殷州李元忠棄城還信都丙午常山王尒朱度律彭城王尒朱仲逺等率衆出抗義旗九月丁丑以侍中驃騎將軍盧同驃騎大將軍杜徳車騎大將軍橋寜並為儀同三司己卯以使持節都督東道諸軍事兼尚書令東道大行臺彭城王尒朱仲逺為太宰庚辰加使持節大將軍都督闗中諸軍事兼尚書令西道大行臺隴西王尒朱天光為大司馬驃騎大將軍青州刺史開府儀同三司穆紹薨癸巳追尊皇考為先帝皇妣王氏為先太妃封皇弟永業為髙宻王皇子子恕為渤海王冬十月壬寅齊獻武王推渤海太守元朗即皇帝位於信都二年春三月齊獻武王敗尒朱天光等於韓陵夏四月辛巳齊獻武王與廢帝至邙山使魏蘭根慰諭洛邑且觀帝之為人蘭根忌帝雅徳還致毁謗竟從崔㥄議廢帝於崇訓佛寺而立平陽王修為帝帝既失位乃賦詩曰朱門久可患紫極非情翫顛覆立可待一年三易換時運正如此唯有脩真觀太昌初帝殂於門下外省時年三十五出帝詔百司赴㑹大鴻臚監護䘮事塟用王禮加以九旒鑾輅黄屋左纛班劍百二十人二衛羽林備儀衛後廢帝諱朗字仲哲章武王融第三子也母曰程氏少稱明悟永安二年為肆州魯郡王後軍府録事參軍儀同開府司馬元曄之建明二年正月戊子為冀州渤海太守及齊獻武王起義兵將誅暴逆乃推戴之冬十月壬寅即皇帝位於信都城西昇壇焚燎大赦稱中興元年文武百官普汎四級以齊獻武王為侍中丞相都督中外諸軍事大將軍録尚書事大行臺増邑三萬戸以兼侍中撫軍將軍河北大使髙乾邕為侍中司空公前平北將軍通直散騎常侍髙敖曹為驃騎大將軍儀同三司冀州刺史以终其身以前刺史元嶷為儀同三司己酉尒朱度律尒朱仲逺斛斯椿賀拔勝賈顯智次於陽平將抗義師齊獻武王縱反間構之遂與尒朱兆相疑敗散而還辛亥齊獻武王大破尒朱兆於廣阿虜其卒五千餘人詔將士汎五級留守者二級詔征東将軍吏部尚書封隆之為使持節北道大使随方處分十有一月己巳詔曰王度剏開彞倫方始所班官秩不改舊章而無識之徒因兹僥倖謬増軍級虚名顯位皆言前朝所授理難推抑自非嚴為條制無以防其偽竊諸有虚増官號為人發糺罪從軍法若入格檢覆無名者退為平民終身禁錮庚辰齊獻武王率師攻鄴城是年南兖城民王乞徳逼前刺史劉世明以州降蕭衍衍使其將元樹入據譙城二年春正月壬午拔鄴擒刺史劉誕詔諸將士汎四級封侯増邑九十七人各有差等癸未詔曰自中興草昧典制權輿郡縣之官率多行督假有正者風化未均眷彼周餘専為漁獵朕所以夙興夜寐有惕於懐有司明加紏罰稱朕意焉二月辛亥上孝莊皇帝諡曰武懐皇帝甲子以齊獻武王為大丞相柱國大將軍太師増封三萬户并前為六萬戸三月丙寅以齊文襄王起家為驃騎大將軍儀同三司丙子以侍中車騎大將軍尚書左僕射孫騰為驃騎大將軍儀同三司丁丑車駕幸鄴乙酉詔文武家屬自信都赴鄴城閏月乙未以安北將軍光祿大夫博野縣開國伯尉景為驃騎大將軍儀同三司丙申以衛將軍金紫光祿大夫厙狄干為車騎大將軍儀同三司壬寅尒朱天光兆度律仲逺等屯於洹水之南癸丑齊獻武王出頓紫陌庚申尒朱兆率輕騎三千夜襲鄴城叩西門不剋退走壬戌齊獻武王大破尒朱天光等四胡於韓陵前廢帝鎮軍將軍賀拔勝徐州刺史杜徳於陳降尒朱兆走趣并州仲逺奔東郡天光度律將赴洛陽大都督斛斯椿賈顯智倍道先還夏四月甲子朔椿等據河橋懼罪自劾㝷擒天光度律於河橋西北大行臺長孫稚都督賈顯智等率騎入京師執􅈛朱世隆彦伯斬於都街囚送天光度律於齊獻武王辛未前廢帝驃騎大將軍行濟州事侯景據城降仍除儀同三司兼尚書僕射南道大行臺濟州刺史甲戌以車騎將軍尚書右僕射魏蘭根為驃騎大將軍儀同三司乙亥以車騎大將軍儀同三司中軍大都督髙盛兼尚書僕射北道行臺随機處分尒朱仲逺奔蕭衍青州刺史尒朱弼為其部下馮紹隆所殺傳首京師丙子前廢帝安東將軍辛永右將軍建州大都督張悅舉城降辛巳車駕至河陽遜位於别邸太昌元年五月封安定郡王邑一萬户後以罪殂於門下外省時年二十永熙二年塟於鄴西南野馬岡出帝諱修字孝則廣平武穆王懐之第三子也母李氏性沉厚少言好武事始封汝陽縣開國公拜通直散騎侍郎轉中書侍郎建義初除散騎常侍尋遷平東將軍兼太常卿又為鎮東將軍宗正卿永安三年封平陽王普泰初轉侍中鎮東將軍儀同三司兼尚書右僕射又加侍中尚書左僕射中興二年夏四月安定王自以疎逺未允四海之心請遜大位齊獻武王與百寮㑹議僉謂髙祖不可無後乃共奉王戊子即帝位於東郭之外入自東陽雲龍門御太極前殿羣臣朝賀禮畢昇閶闔門詔曰否泰相沿廢興互有𤣥天無所隠精靈弗能諭大魏統乾徳漸區㝢牢籠九服旁礴三光而上天降禍運踵多難禮樂崩淪憲章漂没赫赫宗周翦為戎宼肅肅清廟將成茂草胡羯乗機肆其昬虐殺君害王刳剔海内競其吞噬之意不識醉飽之心自書契以來未有若斯者已大丞相渤海王忠存本朝精貫白日爰舉義旗志雪國恥故廣阿之軍貔虎奪氣鄴下之師金湯失險近者四胡相率實繁有徒驅天下之兵盡華戎之銳桴鼔暫交一朝盪滅元兇授首大憝斯擒揚斾濟河掃清伊洛士民安堵不失舊章社稷危而復安洪基毁而還構朕以託體宸極猥當樂推祗握寳圖承兹大業得以眇身託於王公之上若渉淵水罔識攸津思與兆民同兹嘉慶可大赦天下改中興二年為太昌元年詔前御史中尉樊子鵠起復本官兼尚書左僕射東南道大行臺都督儀同三司徐州史史杜徳討元樹齊獻武王上言建義之家枉為尒朱氏籍殁者悉皆蠲免帝以世易復除齊獻武王為大丞相天柱大將軍太師世襲定州刺史増封九萬并前十五萬戸庚寅加齊文襄王侍中開府儀同餘如故壬辰齊獻武王還鄴車駕餞别於乾脯山五月丙申前廢帝廣陵王殂以太傅淮陽王欣為太師封沛郡王司徒公趙郡王諶為太保侍中驃騎大將軍開府儀同三司清河王亶儀同三司使持節侍中驃騎大將軍開府儀同三司司州牧南陽王寳炬為太尉公侍中太保錄尚書事長孫稚為太傅侍中驃騎大将軍尚書左僕射元羅儀同三司尚書令驃騎大将軍吏部尚書元世儁儀同三司戊戌以齊獻武王固讓聼觧天柱大将軍减封五萬戸餘悉如故辛丑以前司空髙乾邕復為司空公乙巳帝幸華林都亭宴羣臣班賚有差羽林隊主唐猛突入稱慶帝以猛犯禁衛杖之猛辭色有忤斬之階下丁未詔曰無侮惸獨事炳前經恵此鰥寡聲留往册朕以薄徳作民父母乃眷元元寤言増歎今理運惟新哀矜伊始如有孤老疾病無所依歸者有司明加隠括依格賑贍又詔曰理有一凖則民無覬覦法啓二門則吏多威福前主為律後主為令歴世永乆實用滋章非所以凖的庶品隄防萬物可令執事之官四品以上集於都省取諸條格議定一途其不可施用者當局停記新定之格勿與舊制相連務在約通無致冗滯己酉以侍中驃騎大将軍儀同三司清河王亶為司徒公庚戌詔曰頃西土年饑百姓流徙或身倚溝渠或命懸道路皆見棄草土取厭烏鳶言念於此有警夜寐掩骼之禮誠所庶㡬行墐之義冀亦可勉其諸有露屍令所在埋覆可宣告天下乙夘詔外内觧嚴六月癸亥朔帝於華林園納訟丙寅蠕蠕嚈噠髙麗契丹厙莫奚國並遣使朝貢丁夘太尉公司州牧南陽王寳炬坐事降為驃騎大将軍開府王如故歸第令羽林衛守改謚武懐皇帝曰孝荘癸百蠕蠕嚈噠國遣使朝貢戊寅詔内外百司普汎六級在京百竂加中興四級義師将士並加軍汎六級在鄴百官三級河北同義之州兩級河橋建義者加五級闗西二級諸受建明普泰封爵汎級優特之階悉追己夘帝臨顯陽殿納訟乙酉髙麗契丹厙莫奚國遣使朝貢丙戌以前驃騎大将軍開府儀同三司斛斯椿還為前官詔曰間者凶權誕恣法令變常遂立夷貊輕賦冀收天下之意随以箕斂之重終納十倍之征掩目捕雀何能過此朕屬念蒸黎無忘寝食加田桑始事生業未滋若頓依常格或不周展今嵗租調且兩收一丐來年復舊辛夘以使持節衛大将軍儀同三司尚書左僕射賈顯度為驃騎大将軍開府儀同三司秋七月乙未詔曰頃永安馭運載育皇儲遂錫汎階以申國慶近經普泰便爾中追今罪人既殄舊章斯復宜述往㫖用卒前恩皇子汎二級悉可還授文穆廟汎故宜停寝若已受者依例追之庚子以驃騎大将軍開府南陽玊寳炬為太尉公壬寅齊獻武王率衆入自滏口大都督厙狄干入自井陘討尒朱兆乙巳齊獻武王以尒朱天光尒朱度律送之京師斬於都市己酉以兼尚書左僕射東南道大行臺樊子鵠為儀同三司庚戌詔侍中驃騎将軍左光禄大夫髙隆之為使持節驃騎大将軍儀同三司兼尚書左僕射北道行臺率歩騎十萬趨大行㑹齊獻武王隆之觧行臺仍為大丞相軍司齊獻武王次於武鄉尒朱兆大掠晉陽北走秀容并州平乙夘帝臨顯陽殿親理寃獄丙辰以宗師東萊王貴平為車騎大将軍儀同三司是月夏州徙民郭遷據宥州反刺史元嶷棄城走詔行臺侯景率齊州刺史尉景濟州刺史蔡儁等攻討之城䧟遷奔蕭衍東南道大行臺樊子鵠大破蕭衍軍於譙城擒其鄴王元樹及譙州刺史朱文開八月壬戌朔齊文襄王來朝燕射班賚部下各有差丁夘以西中郎将元寜為髙平王甲戌以車騎大将軍左光禄大夫李琰之為儀同三司庚寅以車騎将軍左光禄大夫崔秉為驃騎大将軍儀同三司辛夘以車騎将軍右光禄大夫髙岳為驃騎大将軍儀同三司九月癸未以侍中驃騎大将軍左光禄大夫封津為儀同三司庚子帝幸華林都亭引見元樹及公卿百寮蕃使督将等宴射班賚各有差癸夘燕郡開國公賀拔允進爵為王乙巳帝幸都水南過洛汭遂至瀍澗己酉復田於北原癸丑以太師沛王欣為廣陵王前廢帝子渤海王子恕改封沛郡王甲寅以侍中驃騎大将軍封隂之任祥並為儀同三司以車騎大将軍河南尹元仲景為驃騎大将軍儀同三司乙夘車駕謁山陵丙辰蠕蠕髙昌國遣使朝貢庚申以衛将軍前吏部尚書李神儁撫軍将軍右衛将軍婁昭並為驃騎大将軍儀同三司冬十月甲子以使持節衛將軍光州刺史髙仲宻為車騎大将軍儀同三司丁夘以車騎大将軍左光禄大夫潘蠻為儀同三司己夘以車騎大将軍左光禄大夫髙琛為特進驃騎開府儀同三司庚寅以使持節驃騎将軍肆州刺史劉貴為驃騎大将軍儀同三司十有一月甲午以車騎将軍揚州刺史斛斯敦為驃騎大将軍儀同三司丁酉日南至車駕有事於圜丘戊戌朝㑹百官於太極前殿甲辰安定王朗及東海王曄坐事死乙巳蠕蠕國遣使朝貢己酉以前太尉公汝南王悦為侍中大司馬開府葬靈太后胡氏十有二月丙寅以驃騎大将軍領御史中尉綦雋為儀同三司乙亥以侍中廣平王贊為驃騎大将軍開府儀同三司丁亥殺大司馬汝南王悦大赦天下改太昌為永興以太宗號㝷改為永熙元年二年春正月庚寅朔朝饗羣臣於太極前殿甲午齊獻武王自晉陽出討尒朱兆丁酉大破之於赤洪嶺兆遁走自殺己亥車駕幸崧髙石窟靈巖寺庚子又幸散施各有差庚戌儀同三司李琰之薨丁巳追尊皇考為武穆帝皇太妃馮氏為武穆后皇妣李氏為皇太妃以驃騎将軍前滄州刺史髙聿為驃騎大将軍儀同三司蕭衍勞州刺史曹鳯東荆州刺史雷能勝等舉城内屬二月庚申以使持節鎮東将軍行汾州事張瓊為驃騎大将軍儀同三司辛酉以司空公髙乾邕為使持節驃騎大将軍開府儀同三司咸陽王坦為司空公三月己丑朔加驃騎大将軍滄州刺史賈顯智開府儀同三司辛夘詔以前普觧諸行臺今阿至羅相率降欵復以齊獻武王為大行臺随機裁處甲午以車騎将軍蔚州刺史竇泰為使持節車騎大将軍開府儀同三司相州刺史使持節驃騎大将軍開府儀同三司徐州刺史髙乾邕坐事賜死太師魯郡王肅薨戊申以使持節都督河渭部三州諸軍事驃騎大将軍世襲河州刺史梁景叡為儀同三司丁巳以侍中太保司州牧趙郡王諶為太尉公加羽葆鼔吹侍中太尉公南陽王寳炬為太尉開府尚書令夏四月戊辰詔諸參佐自三府以下爰及外州皆不得復加常侍及兼兩員雖已搜者亦悉追之是月青州人耿翔襲據膠州殺刺史裴粲通於蕭衍五月庚寅詔諸幽枉未申事經一周已上悉集華林将親覽察脱事已經年有司不列者聼其人各自陳訴若事連州郡由縁淹嵗者亦仰尚書總集以聞壬寅以使持節驃騎大将軍儀同三司齊州刺史侯淵復為開府儀同三司乙巳詔曰大夫之職位秩貴顯員外之官亦為匪賤而下及胥吏帶領非一髙卑渾雜有損彛章自今已後京官樂為稱事小職者直加散號将軍願罷卑官者聼為大夫及員外之職不宜仍前散實叅領其中㫖特加者不在此例東徐州城民王早簡實等殺刺史崔庠據州入蕭衍六月壬申以驃騎大将軍開府儀同三司尚書右僕射樊子鵠為青膠刺使督濟州刺史大都督蔡儁討耿翔丁丑以驃騎大将軍前行南兖州事念賢為儀同三司秋七月辛夘以使持節鎮北将軍大都督泰州刺史万俟普撥為驃騎大将軍儀同三司壬辰以太師司州牧廣陵王欣為大司馬侍中以太尉公趙郡王諶為太師並開府庚戌以前司徒公燕郡王賀拔允為太尉公八月乙丑齊文襄王來朝帝燕於華林都亭班賚部下各有差以驃騎大将軍前南岐州刺史司馬子如為儀同三司戊辰軍駕餞文襄王於河梁仍濟河而返癸酉齊獻武王上表固讓王爵不許請分邑十萬戸節降為品回授勲義從之九月壬子以散騎常侍車騎大将軍左光禄大夫崔孝芬為儀同三司冬十月癸未以衛将軍𤓰州刺史泰臨縣開國伯髙昌王麴子堅為儀同三司進爵郡王十有一月癸巳持節征北将軍殷州刺史邸珍為徐州大都督東道行臺僕射率将討東徐州十有二月丁巳車駕狩於嵩陽己巳遂幸温湯丁丑車駕還宫三年春正月壬辰齊獻武王討費也頭於河西苦洩河大破之獲其帥紇豆陵伊利遷其部落於内地二月東梁州為夷民侵逼詔使持節車騎大将軍行東雍州事泉企為東梁州行臺都督以討之己未蕭衍假節豫州刺史南昌王毛香舉城内附授以持節安南将軍信州刺史義昌王壬戌大赦天下丙子帝親釋奠禮先師辛巳幸洪池陂遂遊田壬午以衛将軍前徐州刺史元祐為衛大将軍儀同三司以驃騎将軍左衛将軍元斌之為頴昌王三月壬寅以前侍中車騎大将軍李彧為驃騎大将軍儀同三司夏四月戊午契丹國遣使朝貢辛未髙平王寜坐事降爵為公丙子髙麗國遣使朝貢五月丙戌増置勲府庶子廂别六百人又増騎官廂别二百人依第出身騎官秩比直齋辛夘詔曰大魏得一居宸乗六馭㝢考風雲之所㑹宅日月之所中自北而南東征西怨后來其蘇無思不偃而勾吳負險久遺度外世祖太武皇帝握金鏡以照耀撃玉鼓以鏗鏘神武之所牢籠威風之所轥轢莫不雲徹霧卷瓦觧氷消長江已北盡為魏土頃天歩中圯國綱時屯凶豎因機牙窺上國疆場侵噬州郡淪胥乃眷東顧無忘寝食自非五牛警斾七萃按部何以復文武之舊業拯塗炭於遺黎朕将親總六軍經臨彭汴一勞永逸庶保無疆内外百竂便可嚴備出頓之期更聼後勑時帝為斛斯椿元毗王思政魏光等謟佞間阻貳於齊獻武王託討蕭衍盛暑徴發河南諸州之兵天下怪惡之語在斛斯椿傳丙申以使持節侍中大司馬開府司州牧廣陵王欣為左軍大都督太傅録尚書事長孫稚為中軍四面大都督丁酉帝幸華林都亭集京畿都督及軍士三千餘人慰勉之庚子又幸華林都亭納訟壬寅又以長孫稚為後軍大都督六月丁夘大都督源子恭鎮胡陽汝陽王暹守石濟儀同三司賈顯智率豫州刺史斛斯夀東趨濟州庚午吐谷渾國遣使朝貢丙子詔曰頃年以來天歩時阻干戈不戢荆棘斯生或徇節感恩奮不顧命或臨戎對敵赴難如歸身首横分骸骨不斂勲誠靡録榮贈莫加寤寐矜之良有嗟悼可普告内外所在言列若無親近聼故友陳之尚書檢實随状科贈庶粗慰寃魂少申惻隠庚辰以使持節車騎大将軍中軍大都督斛律沙門為開府儀同三司秋七月辛巳朔以鎮東将軍前大鴻臚卿太原王昶特為車騎大将軍儀同三司己丑帝親總六軍十餘萬衆次於河橋以斛斯椿為前軍大都督㝷詔椿鎮虎牢又詔荆州刺史賀㧞勝赴於行所勝率所部次於汝水庚子以使持節征西将軍岐州刺史越肱特為儀同三司丁未帝為椿等廹脅遂出於長安己酉齊獻武王入洛賀拔勝走還荆州八月甲寅推司徒公清河王亶為大司馬承制總萬㡬居尚書省辛酉齊獻武王西迎車駕戊辰制曰晦為明始亂實治基爰著天道又符人事故姬祚中㣲踐土有勤王之役劉氏将傾北軍致左祖之舉用能隆此逺年克兹卜世永熙之季權佞擅朝羣小是崇勲賢見害官縁價以貴賤獄因貨而死生宗祏飄若綴旒民命棄如草莽大丞相位居晉鄭任屬桓文興甲汾川問罪伊洛羣姦畏威擁廹人主以自蔽衛逺出秦方雖車駕流移未即返御然權佞将除天下延頸魏邦雖舊其化惟新思與兆民同兹更始可大赦天下行臺侯景討荆州賀㧞勝戰敗走奔蕭衍九月癸巳以衛大将軍河南尹元子思為使持節行臺僕射使持節驃騎大将軍開府儀同三司領軍将軍婁昭為西道大都督幷率左右侍官西迎車駕己酉椿黨毛鴻賔守潼闗齊獻武王破擒之是日齊獻武王東遷於洛是月東清河人傅皛殺太守韓子捷據郡反㑹赦乃降冬十月戊辰使持節驃騎大将軍開府儀同三司行青州事侯淵克東揚州斬刺史東萊王貴平𫝊首京師閏十二月癸巳帝為宇文黒獺所害時年二十五史臣曰廣陵廢於前中興廢於後平陽猜惑自絶宗廟普泰雅道居多永熙悖徳為甚是俱亡㓕天下所棄歟魏書卷十一魏書卷十一考證前廢帝紀詔隴西王尒朱天光下文武討宿勤明逹勤一本作勒北史亦作勒本書尒朱天光𫝊初賊帥夏州人宿勤明逹降天光于平凉亦作勤臣照按人名之字互異無憑可定但既係夏州人宿勒明逹與番語近恐當是勒字紫極非情翫情一本作倩北史亦作倩後廢帝紀旁礴三光旁一本作磅出帝紀齊獻武王次於武郷鄉監本誤卿今改正魏書卷十一考證
