body:
  text: 魏書卷三十四齊魏收撰列傳第二十二王洛兒車路頭盧魯元陳建萬安國王洛兒京兆人也少善騎射太宗在東宫給事帳下侍從遊獵夙夜無怠性謹愿未嘗有過太宗嘗獵于灅南乘冰而濟冰䧟没馬洛兒投水奉太宗出岸水沒洛兒殆將凍死太宗解衣以賜之自是恩寵日隆天賜末太宗出居于外洛兒晨夜侍衛無湏臾違離恭勤發於至誠元紹之逆太宗左右唯洛兒與車路頭而已晝居山嶺夜還洛皃家洛兒隣人李道潛相奉給晨昬往復衆庶頗知喜而相告紹聞收道斬之洛兒猶冐難往返京都通問於大臣大臣遂出奉迎百姓奔赴太宗還宫社稷穫全洛兒有功焉太宗即位拜散騎常侍詔曰士處家必以孝敬為本在朝則以忠節為先不然何以立身於當世揚名於後代也散騎常侍王洛兒車路頭等服勤左右十有餘年忠謹恭肅久而彌至未嘗湏臾之頃有廢替之心及在艱難人皆易志而洛兒等授命不移貞操踰懇雖漢之樊灌魏之許典無以加焉勤而不賞何以奨勸將來為臣之節其賜洛兒爵新息公加直意將軍又追贈其父為列侯賜僮隷五十户永興五年卒贈太尉建平王賜温眀祕器載以輼輬車使殿中衛士為之導從太宗親臨哀慟者數四焉乃鴆其妻周氏與洛兒合葬子長成襲爵卒無子弟徳成襲爵徙為建城公加鎮逺將軍官至散騎常侍典作長安真君十一年卒子定州襲爵降為建陽侯安逺將軍後定州弟升為侍御中散有寵於顯祖以祖父洛兒著勲先朝詔復定州爵為公髙祖初為長安鎮將卒子陵襲升爵承明初遷監御長賜爵始新子加寧朔將軍員外散騎常侍卒車路頭代人也少以忠厚選給東宫為太宗帳下帥善自修立謹慎無過天賜末太宗出於外路頭隨侍竭力及太宗即位拜為散騎常侍賜爵金鄉公加忠意將軍後改為宣城公太宗性明察羣臣多以職事遇遣至有杖罰故路頭優游不任事侍宿左右從容談笑而已路頭性無害毎至評獄處理常獻寛恕之議以此見重於朝太宗亦敬納之寵待隆厚賞賜無數當時功臣親幸莫及泰常六年卒太宗親臨哀慟贈侍中左衛大將軍太師宣城王諡曰忠貞喪禮一依安成王叔孫俊故事陪葬金陵子眷襲爵盧魯元昌黎徒河人也曾祖副鳩仕慕容垂為尚書令臨澤公祖父並至大官魯元敏而好學寛和有雅度太宗時選為通直郎以忠謹給侍東宫恭勤盡節世祖親愛之及即位以為中書侍郎拾遺左右寵待彌深而魯元益加謹肅世祖逾親信之内外大臣莫不敬憚焉性多容納善與人交好掩人之過揚人之美由是公卿咸親附之魯元以工書有文才累遷中書監領秘書事賜爵襄城公加散騎常侍右將軍贈其父為信都侯從征赫連昌世祖親追擊之入其城門魯元隨世祖出入是日微魯元㡬至危殆從征平凉以功拜征北大將軍加侍中後遷太保錄尚書事世祖貴異之常從征伐出入臥内每有平殄輒以功賞賜僮𨽻前後數百人布帛以萬計世祖臨幸其第不出旬日欲其居近易於往來乃賜甲第於宫門南衣食車馬皆乘輿之副真君三年冬車駕幸隂山魯元以疾不從侍臣問疾送醫藥傳驛相屬於路及薨世祖甚悼惜之還臨其喪哭之哀慟東西二宫命太官日送奠晨昏哭臨訖則備奏鐘鼓伎樂輿駕比𦵏三臨之喪禮依安成王故事而賵送有加贈襄城王諡曰孝𦵏於崞山為建碑闕自魏興貴臣恩寵無與為比子統襲爵少子内給侍東宫恭宗深昵之常與臥起同衣食父子有寵兩宫勢傾天下内性寛厚有父風而恭順不及正平初宫臣伏誅世祖以魯元故唯殺内而厚撫其兄弟統以父任侍東宫世祖以元舅陽平王杜超女南安長公主所生妻之車駕親自臨送太官設供具賜賚以千計髙宗即位典選部主客二曹興安二年卒贈襄城王諡曰景無子弟彌娥襲爵拜北鎮都將卒贈襄城王諡曰恭子興仁襲爵陳建代人也祖渾太祖末為右衛將軍父陽尚書建以善騎射擢為三郎稍遷下大夫内行長世祖討山胡白龍意甚輕之單將數十騎登山臨嶮每日如此白龍乃伏壮士十餘處出於不意世祖墮馬㡬至不測建以身捍賊大呼奮擊殺賊數人身被十餘創世祖壮之賜户二十髙宗初賜爵阜城侯加冠軍將軍出為幽州刺史假秦郡公髙宗以建貪暴懦弱遣使就州罰杖五十髙祖初徴為尚書右僕射加侍中進爵趙郡公建與侍中尚書晉陽侯元仙徳殿中尚書長樂王穆亮比部尚書平原王陸叡密表曰皇天輔徳命集大魏臣等祖父翼贊初興勤過蜀漢誓固山河享兹景福寵辱休戚與國均焉臣以凡近識無逺逹階藉先寵遂荷今任彼已之譏播於羣口仰感生成俯自䇿厲顧省駑鈍終於無益然飲冰驚寐實懐慙負至於願天髙地厚何日忘之自永嘉之末封豕橫噬馬叡南據奄有荆楚及桓劉跋扈禍難相繼岱宗隔望秩之敬青徐限見徳之風獻文皇帝髫齔龍飛道光率土干戚暫舞淮海從風車書既同華裔將一昊天不弔奄背萬邦竊聞劉昱天亡權臣殺害思正之民翹想罔極愚謂時不再來機宜易失毫分之差致悔千里天與不取反受其咎所謂見而不作過在介石者也宜簡雄將號令八方義陽王臣昶深悟存亡逺同孫氏茍歴運響從則呉㑹可定脫事有難成則振旅而返進可以揚義聲於四海退可以通徳信於遐裔宜乘之㑹運鍾今日如合聖聼乞速施行脱忤天心願存臣表徐觀後驗賞罰隨焉髙祖嘉之遷司徒征西大將軍進爵魏郡王髙祖與文明太后頻幸建第賜建妻宴於後庭太和九年薨子念襲爵為中山守坐掠良人為御史中尉王顯所彈遇赦免爵除萬安國代人也祖真世為酋帥恒率部民從世祖征伐以功除平西將軍敦煌公轉驃騎大將軍儀同三司父振尚髙陽長公主拜駙馬都尉遷散騎常侍寧西將軍長安鎮將賜爵馮翊公安國少明敏有姿貌以國甥復尚河南公主拜駙馬都尉遷散騎常侍顯祖特親寵之與同臥起為立第宅賞賜至巨萬超拜大司馬大將軍封安城王安國先與神部長奚買奴不平承眀初矯詔殺買奴於苑中髙祖聞之大怒遂賜安國死年二十三子翼襲王爵太和十五年薨髙祖以其父受寵先朝特贈并州刺史子纂字輔興襲依例降為公世宗時起家司徒倉曹參軍遷南秦平西府司馬䕶軍長史加右軍將軍正光二年卒贈假節征虜將軍荆州刺史子金剛襲武定末開府祭酒齊受禪爵例降有奚拔者世為紇奚部帥其父根皇始初率衆歸魏太祖嘉之尚昭成女生子㧞卒於尚書令拔尚華隂公主生子敬元紹之逆也主有功超授敬大司馬大將軍封長樂王薨子䕶襲爵拜外都大官太和中詔以䕶年邁既未致仕令依舊養老之例卒子彦嗣根事迹遺落故略附云史臣曰王洛兒車路頭盧魯元陳建咸以誠至發衷竭節危難茍非志烈過人亦何能以若此宜其生受恩遇殁盡哀榮至如安國貴寵異於數子哉魏書卷三十四魏書卷三十四考證列傳第二十二魏收書闕後人所補陳建傳晉陽侯元仙徳仙北史作􅿻魏書卷三十四考證
