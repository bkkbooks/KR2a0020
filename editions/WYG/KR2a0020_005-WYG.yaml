body:
  text: 魏書卷五齊魏収撰帝紀第五高宗紀高宗文成皇帝諱濬恭宗景穆皇帝之長子也母曰閭氏眞君元年六月生於東宮帝少聰逹世祖愛之常置左右號世嫡皇孫年五歳世祖北廵帝從在後逢虜帥桎一奴欲加其罰帝謂之曰奴今遭我汝宜釋之帥奉命解縛世祖聞之曰此兒雖小欲以天子自處意竒之既長風格異常每有大政常參決可否正平二年十月戊申卽皇帝位於永安前殿大赦改年興安元年冬十月以驃騎大將軍元夀樂爲太宰都督中外諸軍事錄尚書事尚書長孫渴侯爲尚書令加儀同三司十有一月丙子二人爭權並賜死癸未廣陽王建薨臨淮王譚薨甲申皇妣薨太尉張黎司徒古弼以議不合旨黜爲外都大官平南將軍宋子侯周忸進爵樂陵王南部尚書章安子陸麗爲平原王文武各加位一等壬寅追尊景穆太子爲景穆皇帝皇妣爲恭皇后尊保母常氏爲保太后隴西屠各王景文叛詔統萬鎭將南陽王惠夀討平之十有二月戊申祔葬恭皇后於金陵乙卯初復佛法丁巳以樂陵王周忸爲太尉平原王陸麗爲司徒鎭西將軍杜元寳爲司空保達沙獵國各遣使朝獻戊寅建業公陸俟進爵東平王廣平公杜遺進爵爲王癸亥詔以營州蝗開倉賑恤甲子太尉樂陵王周忸有罪賜死濮陽公閭若文進爵爲王二年春正月辛巳司空杜元寳進爵京兆王廣平王杜遺薨尚書僕射東安公劉尼進爵爲王封建寧王崇子麗爲濟南王癸未詔與民雜調十五丙戌尚書西平公源賀進爵爲王二月己未司空京兆王杜元寳謀反伏誅建寧王崇崇子濟南王麗爲元寳所引各賜死乙丑發京師五千人穿天淵池是月劉義隆子劭殺其父而自立三月壬午尊保太后爲皇太后安豐公閭虎皮進爵爲河間王乙未疏勒國遣使朝獻夏五月乙酉行幸崞山辛卯還宫是月劉劭弟駿殺劭而自立閏月乙亥太皇太后赫連氏崩秋七月辛亥行幸隂山濮陽王閭若文征西大將軍永昌王仁謀反乙丑賜仁死於長安若文伏誅己巳車駕還宫是月築馬射臺於南郊八月辛未渴槃陁國遣使朝貢戊戌詔曰朕以眇身纂承大業懼不能宣慈恵和寧濟方㝢夙夜兢兢若臨淵谷然卽位以來百姓晏安風雨順序邉方無事衆瑞兼呈不可稱數又於苑内獲方寸玉印其文曰子孫長夀羣公􅀸士咸曰休哉豈朕一人克臻斯應實由天地祖宗降祐之所致也思與兆庶共兹嘉慶其令民大酺三日諸殊死已下各降罪一等九月壬子閲武於南郊冬十有一月辛酉行幸信都中山觀察風俗十有二月誅河間鄚民爲賊盜者男年十五以下爲生口班賜從臣各有差甲午車駕還宫厙莫奚契丹􅄢賔等十餘國各遣使朝貢復北平公長孫敷王爵興光元年春正月乙丑以侍中河南公伊馛爲司空二月甲午帝至道壇登受圖籙禮畢曲赦京師班賞各有差夏六月丙寅行幸隂山秋七月庚子皇子𢎞生辛丑大赦改年八月甲戌趙王深薨乙亥車駕還宫己丑皇叔虎頭龍頭薨九月庚申庫莫奚國獻名馬有一角狀如麟是月閉都城門大索三日獲姦人亡命數百人冬十有一月北鎭將房杖擊蠕蠕虜其將豆渾與句等獲馬千餘匹戊戌行幸中山遂幸信都十有二月丙子還幸靈丘至溫泉宫庚辰車駕還宫出于叱萬單國各遣使朝獻太安元年春正月辛酉奉世祖恭宗神主于太廟車騎大將軍樂平王拔有罪賜死二月癸未武昌王提薨三月己亥詔曰今始奉世祖恭宗神主于太廟又於西苑遍秩羣神朕以大慶饗賜百寮而犯罪之人獨卽刑戮非所以子育羣生矜及衆庶夫聖人之教自近及逺是以周文刑於寡妻至于兄弟以御家邦化茍從近恩亦宜然其曲赦京師死囚已下夏六月壬戌詔名皇子曰宏曲赦京城改年癸酉詔曰夫爲治者因宜以設官舉賢以任職故上下和平民無怨謗若官非其人姦邪在位則政教陵遲至於凋薄思明黜陟以隆治道今遣尚書穆真等三十人廵行州郡觀察風俗入其境農不墾殖田畝多荒則徭役不時廢於力也耆老飯蔬食少壯無衣褐則聚斂煩數匱於財也閭里空虗民多流散則綏導無方疎於恩也盜賊公行劫奪不息則威禁不設失於刑也衆謗並興大小嗟怨善人隱伏佞邪當途則爲法混淆昏於政也諸如此比黜而戮之善於政者褒而賞之其有阿枉不能自申聽詣使告狀使者檢治若信清能衆所稱美誣告以求直反其罪使者受財斷察不平聽詣公車上訴其不孝父母不順尊長爲吏姦暴及爲盜賊各具以名上其容隱者以所匿之罪罪之是月遮逸國遣使朝貢戊寅帝畋於犢倪山甲申還宫秋七月丙辰行幸河西八月丁亥車駕還宫冬十月波斯疏勒國並遣使朝貢庚午以遼西公常英爲太宰進爵爲王二年春正月乙卯立皇后馮氏二月丁巳立皇子𢎞爲皇太子大赦天下丁零數千家亡匿井陘山聚爲寇盜詔定州刺史許宗之并州刺史乞佛成龍討平之夏六月羽林郎于判元提等謀逆伏誅秋八月甲申畋於河西是月平西將軍漁陽公尉眷北擊伊吾克其城大獲而還九月辛巳河東公閭毗零陵公閭紇並進爵爲王冬十月甲申車駕還宫甲午曲赦京師十有一月尚書西平王源賀改封隴西王嚈噠普嵐國並遣使朝獻劉駿濮陽太守姜龍駒新平太守楊伯倫各棄郡率吏民來降三年春正月壬戌畋於崞山戊辰還宮粟特于闐國各遣使朝貢徵漁陽公尉眷拜太尉進爵爲王錄尚書事夏五月庚申畋於松山己巳還宫封皇弟新成爲陽平王六月癸卯行幸隂山秋八月畋於隂山之北己亥還宫冬十月將東廵詔太宰常英起行宮於遼西黄山十有一月蠻王文虎龍率千餘家内附十有二月以州鎭五蝗民饑使使者開倉以賑之是月于闐扶餘等五十餘國各遣使朝獻四年春正月丙午朔初設酒禁乙卯行幸廣寗溫泉宮遂東廵平州庚午至於遼西黄山宫遊宴數日親對高年勞問疾苦二月丙子登碣石山觀滄海大饗羣臣於山下班賞進爵各有差改碣石山爲樂遊山築壇記行於海濵戊寅南幸信都畋遊於廣川三月丁未觀馬射於中山所過郡國賜復一年丙辰車駕還宫起太華殿乙丑東平王陸俟薨夏五月壬戌詔曰朕卽阼至今屢下寛大之㫖蠲除煩苛去諸不急欲令物獲其所人安其業而牧守百里不能宣揚恩意求欲無厭斷截官物以入於已使課調懸少而深文極墨委罪於民茍求免咎曾不改懼國家之制賦役乃輕比年已來雜調減省而所在州郡咸有逋懸非在職之官綏導失所貪穢過度誰使之然自今常調不充民不安業宰民之徒加以死罪申告天下稱朕意焉六月丙申畋於松山秋七月庚午行幸河西九月乙巳還宫辛亥太華殿成丙寅饗羣臣大赦天下冬十月甲戌北廵至隂山有故塚毁廢詔曰昔姬文葬枯骨天下歸仁自今有穿毁墳壠者斬之劉駿將殷孝祖脩兩城於清水東詔鎮西將軍天水公封勑文等擊之辛卯車駕次于車輪山累石記行征西將軍皮豹子等三將三萬騎助擊孝祖車駕度漠蠕蠕絶跡逺遁其别部烏朱賀頽庫世頽率衆來降十有二月征東將軍中山王託眞薨五年春正月己巳朔征西將軍皮豹子略地至髙平大破孝祖斬獲五千餘級二月己酉侍中司空河南公伊馛薨三月庚寅曲赦京師死罪已下夏四月乙巳封皇弟子推爲京兆王五月居常國遣使朝獻六月戊申行幸隂山秋八月庚戌遂幸雲中壬戌還宫九月戊辰詔曰夫褒賞必於有功刑罰審於有罪此古今之所同由來之常式牧守莅民侵食百姓以營家業王賦不充雖歲滿去職應計前逋正其刑罪而主者失於督察不加弹正使有罪者優游獲免無罪者妄受其􅇳是啓姦邪之路長貪暴之心豈所謂原情處罪以正天下自今諸遷代者仰列在職殿最案制治罪克舉者加之爵寵有愆者肆之刑戮使能否殊貫刑賞不差主者明爲條制以爲常楷儀同三司敦煌公李寳薨冬十有二月戊申詔曰朕承洪業統御羣有思恢政化以濟兆民故薄賦斂以實其財輕徭役以紓其力欲令百姓脩業人不匱乏而六鎮雲中髙平二雍秦州徧遇災旱年穀不収其遣開倉廪以賑之有流徙者諭還桑梓欲市糴他界爲關傍郡通其交易之路若典司之官分職不均使上恩不逹於下下民不贍於時加以重罪無有攸縱和平元年春正月甲子朔大赦改元庚午詔散騎常侍馮闡使於劉駿二月衛將軍樂安王良督東雍吐京六壁諸軍西趣河西征西將軍皮豹子等督河西諸軍南趨石樓以討河西叛胡夏四月戊戌皇太后常氏崩於壽安宫五月癸酉葬昭太后於廣寗鳴鷄山六月甲午詔征西大將軍陽平王新成等督統萬髙平諸軍出南道南郡公李惠等督涼州諸軍出北道討吐谷渾什寅崔浩之誅也史官遂廢至是復置河西叛胡詣長安首罪遣使者安慰之秋七月乙丑劉駿遣使朝貢壬午行幸河西八月西征諸軍至西平什寅走保南山九月諸軍濟河追之遇瘴氣多有疫疾乃引軍還獲畜二十餘萬庚午輿駕還宫冬十月居常王獻馴象三十有一月詔散騎侍郎盧度世員外郎朱安興使於劉駿二年春正月乙酉詔曰刺史牧民爲萬里之表自頃每因發調逼民假貸大商富賈要射時利旬日之間增贏十倍上下通同分以潤屋故編戸之家困於凍餒豪富之門日有兼積爲政之弊莫過於此其一切禁絶犯者十疋以上皆死布告天下咸令知禁二月辛卯行幸中山丙午至於鄴遂幸信都三月劉駿遣使朝貢輿駕所過皆親對髙年問民疾苦詔民年八十以上一子不從役靈丘南有山髙四百餘丈乃詔羣官仰射山峰無能踰者帝彎弧發矢出山三十餘丈過山南二百二十步遂刋石勒銘是月發幷肆州五千人治河西獵道辛巳輿駕還宮夏四月乙未侍中征東大將軍河東王閭毗薨五月癸未詔南部尚書黄盧頭李敷等考課諸州秋七月戊寅封皇弟小新成爲濟隂王加征東大將軍鎭平原天賜爲汝隂王加征南大將軍鎭虎牢萬夀爲樂浪王加征北大將軍鎭和龍洛侯爲廣平王壬午行廵山北八月戊辰波斯國遣使朝獻丁丑輿駕還宫冬十月詔假員外散騎常侍游明根員外郎昌邑侯和天徳使于劉駿博陵之深澤章武之束州盜殺縣令州軍討平之廣平王洛侯薨三年春正月壬午以車騎大將軍東郡公乙渾爲太原王癸未樂浪王萬夀薨二月癸酉畋于崞山遂觀漁于旋鴻池三月甲申劉駿遣使朝貢髙麗蓰王契嚙思厭於師疏勒石那悉居半渴槃陁諸國各遣使朝獻夏六月庚申行幸隂山詔將軍陸真討雍州叛氐仇傉檀等平之秋七月壬寅幸河西九月壬辰征西大將軍常山王素薨冬十月丙辰詔曰朕承洪緒統御萬國垂拱南靣委政羣司欲緝熈治道以致寧一夫三代之隆莫不崇尚年齒今選舉之官多不以次令班白處後晚進居先豈所謂彛倫攸叙者也諸曹選補宜各先盡勞舊才能是月詔員外散騎常侍游明根員外郎昌邑侯和天徳使于劉駿十有一月壬寅輿駕還宮十有二月乙卯制戰陳之法十有餘條因大儺耀兵有飛龍騰虵魚麗之變以示威武戊午零陵王閭㧞薨四年春三月乙未賜京師民年七十以上太官厨食以終其年皇子胡仁薨追封樂陵王乙巳詔曰朕憲章舊典分職設官欲令敷揚治化緝熙庶績然在職之人皆蒙顯擢委以事任當厲已竭誠務省徭役使兵民優逸家給人贍今内外諸司州鎭守宰侵使兵民勞役非一自今擅有召役逼雇不程皆論同枉法夏四月癸亥上幸西苑親射虎三頭五月壬辰侍中漁陽王尉眷薨壬寅行幸隂山秋七月壬午詔曰朕每歲以秋日閑月命羣官講武平壤所幸之處必立宫壇糜費之功勞損非一宜仍舊貫何必改作也八月丙寅遂畋于河西詔曰朕順時畋獵而從官殺獲過度旣殫禽獸乖不合圍之義其勑從官及典圍將校自今已後不聽濫殺其畋獲皮肉别自頒賚壬申詔曰前以民遭饑寒不自存濟有賣鬻男女者盡仰還其家或因縁勢力或私行請託共相通容不時檢校令良家子息仍爲奴婢今仰精究不聽取贖有犯加罪若仍不檢還聽其父兄上訴以掠人論九月辛巳車駕還宮冬十月以定相二州霣霜殺稼免民田租是月詔員外散騎常侍游明根驍騎將軍昌邑子婁内近寧朔將軍襄平子李五鱗使于劉駿十有二月辛丑詔曰名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可爲之條格使貴賤有章上下咸序著之于令壬寅詔曰夫㛰姻者人道之始是以夫婦之義三綱之首禮之重者莫過於斯尊卑髙下宜令區别然中代以來貴族之門多不率法或貪利財賄或因緣私好在於茍合無所選擇令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂之來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓爲㛰犯者加罪五年春正月丁亥封皇弟雲爲任城王二月詔以州鎮十四去歲蟲水開倉賑恤夏四月癸卯頓丘公李峻進爵爲王閏月戊子帝以旱故減膳責躬是夜㴻雨大降五月庚申劉駿死子子業僭立六月丁亥行幸隂山秋七月辛丑北鎭游軍大破蠕蠕壬寅行幸河西九月辛丑車駕還宫冬十月琅邪王司馬楚之薨十有二月南秦王楊難當薨吐呼羅國遣使朝獻六年春正月丙申大赦天下三月丁丑行幸樓煩宫髙麗蓰王對曼諸國各遣使朝獻三月戊戌相州刺史西平郡王吐谷渾權薨乙巳車駕還宫夏四月破洛那國獻汗血馬普嵐國獻寳劒五月癸卯帝崩于太華殿時年二十六六月丙寅上尊諡曰文成皇帝廟號髙宗八月葬雲中之金陵史臣曰世祖經略四方内頗虗耗旣而國釁時艱朝野楚楚髙宗與時消息靜以鎮之養威布德懷緝中外自非機悟深裕矜濟爲心亦何能若此可謂有君人之度矣魏書卷五魏書卷五考證高宗紀李敷等考課諸州等北史作業魏書卷五考證
