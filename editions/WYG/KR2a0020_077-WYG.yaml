body:
  text: 魏書卷七十七齊魏收撰列傳第六十五宋飜辛雄羊深楊機高崇宋飜字飛烏廣平列人人也吏部尚書弁族弟少有操尚世人以剛斷許之世宗初起家奉朝請本州治中廣平王即中令尋拜河隂令飜弟道璵先爲冀州京兆王愉法曹行參軍愉反逼道璵爲官飜與弟世景俱囚廷尉道璵後棄愉歸罪京師猶坐身死飜世景除名乆之拜飜治書侍御史洛陽令中散大夫相州大中正猶領治書又遷左將軍南兖州刺史時蕭衍遣將先據荆山規將宼竊屬夀春淪䧟賊遂乘勢徑趨項城飜遣將成僧達潛軍討襲頻戰破之自是州境怗然孝莊時除司徒左長史撫軍將軍河南尹初飜爲河隂令順陽公主家奴爲刼攝而不送飜將兵圍主宅執主壻馮穆歩驅向縣時正炎暑立之日中流汗霑地縣舊有大枷時人號曰彌尾青及飜爲縣主吏請焚之飜曰且置南牆下以待豪家未㡬有内監楊小駒詣縣請事辭色不遜命取尾青以鎮之既免入訴於世宗世宗大怒勑河南尹推治其罪飜具自陳状詔曰卿故違朝法豈不欲作威以買名飜對造者非臣買名者亦宜非臣所以留者非敢施於百姓欲待兇曓之徒如小駒者耳於是威振京師及爲洛陽迄於爲尹畏憚權勢更相承接故當世之名大致減損永安三年卒於位贈侍中衛將軍相州刺史出帝初重贈驃騎大將軍儀同三司尚書左僕射雍州刺史諡曰貞烈子思逺卒於司空從事中即飜弟毓字道和敦篤有志行平西將軍太中大夫子世軌齊文襄王大將軍府祭酒毓弟世景在良吏傳世景弟叔集亦有學行征東裴衍之討葛榮也表爲員外散騎侍即引同戎役及衍敗同時遇害叔集弟道璵少而敏儁世宗初以才學被召與祕書丞孫惠蔚典校羣書考正同異自太學博士轉京兆王愉法曹行參軍臨死作詩及挽歌詞寄之親朋以見怨痛道璵又曽贈著作佐即張始均詩其末章云子深懐璧憂余有當門病道璵既不免難始均亦遇世禍時咸怪之無子兄毓以第三子子叔繼辛雄字世賓隴西狄道人父暢字㓜達大將軍諮議參軍汝南鄉郡二郡太守太和中本郡中正雄有孝性頗渉書史好刑名廉謹雅素不妄交友喜怒不形於色釋褐奉朝請父於郡遇患雄自免歸晨夜扶抱及父喪居憂殆不可識爲世所稱正始初除給事中十年不遷職乃以病免清河王懌爲司空辟户曹參軍攝田曹事懌遷司徒仍隨授户曹參軍竝當煩劇諍訟填委雄用心平直加以閑明政事經其斷割莫不悦服懌重之每謂人曰必也無訟乎辛雄其有焉由是名顯懌遷太尉又爲記室參軍神龜中除尚書駕部郎中轉三公即其年沙汰即官唯雄與羊深等八人見留餘悉罷遣更授李琰等先是御史中尉東平王元匡復欲輿棺諫諍尚書令任城王澄劾匡大不敬詔恕死爲民雄奏理匡日竊惟白衣元匡歴奉三朝每䝉寵遇謇諤之性簡自帝心鷹鸇之志形於在昔故高祖錫之以匡名陛下任之以彈糾至若茹皓升輦匡斥宜下之言高肈當政匡陳擅權之表剛毅忠款羣臣莫及骨鯁之跡朝野共知當高肈之時匡造棺致諫主聖臣直卒以無咎假欲重造先帝已容之於前陛下亦宜寛之於後況其元列由緒與罪按不同也脱終貶黜不在朝廷恐杜忠臣之口塞諫者之心乖琴瑟之至和違鹽梅之相濟祈奚云叔向之賢可及十世而匡不免其身實可嗟惜未幾匡除龍驤將軍平州刺史右僕射元欽謂左僕射蕭寶夤曰至如辛即中才用省中諸人莫出其右寶夤曰吾聞游僕射云得如雄者四五人共治省事足矣今日之賞何其晚哉初廷尉少卿袁飜以犯罪之人經恩競訴枉直難明遂奏曽染風聞者不問曲直推爲獄成悉不斷理詔令門下尚書廷尉議之雄議曰春秋之義不幸而失寜僣不濫僣則失罪人濫乃害善人今議者不忍罪姦吏使出入縱情令君子小人薰蕕不别豈所謂賞善罰惡殷勤隠恤者也仰尋周公不減流言之愆俯惟釋之不加驚馬之辟所以小大用情貴在得所失之千里差在毫釐雄乆執案牘數見疑訟職掌三千願言者六一曰御史所糾有注其逃走者及其出訴或爲公使本曹給過所有指如不推檢文案灼然者雪之二曰御史赦前注獲見贓不辨行賕主名檢無賂以置直之主宜應洗復三曰經拷不引傍無三證比以獄案既成因即除削或有據令奏復者與奪不同未獲爲通例又須定何如得爲證人若必湏三人對見受財然後成證則於理太寛若傳聞即爲證則於理太急令請以行賕後三人俱見物及證狀顯著凖以爲驗四曰赦前斷事或引律乖錯使除復失𠂻雖案成經赦宜追從律五曰經赦除名之後或邀駕訴枉被㫖重究或訴省稱寃爲奏更檢事付有司未被研判遂遇恩宥如此之徒謂不得異於常格依前案爲定若不合拷究已復之流請不追奪六曰或受辭下檢反覆使鞫獄證占分明理合清雪未及告案忽逄恩赦若從證占而雪則違正格如除其名罪濫潔士以爲罪須案成雪以占定若拷未畢格及要證一人未集者不得爲占定古人雖患察獄之不精未聞知寃而不理今之所陳實士師之深疑朝夕之急務願垂察焉詔從雄議自後每有疑議雄與公卿駮難事多見從於是公能之名甚盛又爲禄飬論稱仲尼陳五孝自天子至庶人無致仕之文禮記八十一子不從政九十家不從政鄭元注云復除之然則止復庶民非公卿大夫士之謂以爲宜聴禄飬不約其年書奏肅宗納之以母憂去任卒哭右僕射元欽奏雄起復爲即俄兼司州别駕加前軍將軍孝昌元年徐州刺史元法僧以城南叛蕭衍遣蕭綜來據彭城時遣大都督安豐王延明督臨淮王或討之磐桓不進乃詔雄副太常少卿元晦爲使給齊庫刀持節乘驛催軍有違即令斬決肅宗謂雄曰誨朕家諸子摽以親懿籌策機計仗卿取勝耳到軍勒令竝進徐州綜送降欵冀州刺史侯剛啓爲長史肅宗以雄長於世務惜不許之更除司空長史於時諸公皆慕其名欲屈爲佐莫能得也時諸方賊盛而南宼侵境山蠻作逆肅宗欲親討以荆州爲先詔雄爲行臺左丞與前軍臨淮王彧東趨葉城别將裴衍西通鵶路衍稽留未進或師已次汝濱北溝求救或以處分道别不欲應之雄曰今裴衍未至王士衆已集蠻左唐突撓亂近畿梁汝之間民不安業若不時撲滅更爲深害王秉麾閫外唯利是從見可而進何必守道茍安社稷理可專裁所謂臣率義而行不待命者也或恐後有得失之責要雄符下雄以駕將親伐蠻夷必懐震動乗彼離心無往不破遂符或軍令速赴繫賊聞之果自走散在軍上疏曰凢人所以臨堅陳而忘身觸白刄而不憚者一則求榮名二則貪重賞三則畏刑罰四則避禍難非此數事雖聖王不能勸其臣慈父不能厲其子明主深知其情故賞必行罰必信使親疎貴賤勇怯賢愚聞鐘鼓之聲見旌旗之列莫不奮激競赴敵塲豈厭乆生而樂早死也利害懸於前欲罷不能耳自秦隴逆節將歴數年蠻左亂常稍已多載凢在戎役數十萬人三方師衆敗多勝少跡其所由不明賞罰故也陛下欲天下之早平愍征夫之勤悴乃降明詔賞不移時然兵將之勲歴稔不決亡軍之卒晏然在家致令節士無所勸慕庸人無所畏懾進而擊賊死交而賞賖退而逃散身全而無罪此其所以望敵奔沮不肯進力者矣若重發明詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯須廢也賞罰陛下之所易尚不能全而行之攻敵士之所難欲其必死寧可得也臣既庸弱忝當戎使職司所見輙敢上聞惟陛下審其可否會右丞闕肅宗詔僕射城陽王徽舉人徽遥舉雄仍除輔國將軍尚書右丞尋轉吏部即中遷平東將軍光禄大夫郎中如故上疏曰帝王之道莫尚於安民安民之本莫加於禮律禮律既設擇賢而行之天下雍熙無非任賢之功也故虞舜之盛穆穆標羙文王受命濟濟以康髙祖孝文皇帝天縱大聖開復典謨選三代之異禮採二漢之典法端拱而四方安刑措而兆民治世宗重光繼軌每念聿修官人有道萬里清謐陛下劬勞日昃躬親庶政求瘼恤民無時暫憩而黔首紛然兵車不息以臣愚見可得而言自神龜末來專以停年爲選士無善惡歳乆先叙職無劇易名到授官執按之吏以差次日月爲功能銓衡之人以簡用老舊爲平直且庸劣之人莫不貪鄙委斗筲以共治之重託碩鼠以百里之命皆貨賄是求肆心縱意禁制雖煩不勝其欲致令徭役不均發調違謬箕斂盈門囚執满道二聖明詔寢而不遵畫一之法懸而不用自此夷夏之民相將爲亂豈有餘憾哉蓋由官授不得其人百姓不堪其命故也當今天下黔黎乆經宼賊父死兄亡子弟淪陷流離艱危十室而九白骨不收孤煢靡恤財殫力盡無以卒歳宜及此時早加慰撫蓋助陛下治天下者惟在守令最湏簡置以康國道但郡縣選舉由來共輕貴遊儁才莫肯居此宜改其獘以定官方請上等郡縣爲第一清中等爲第二清下等爲第三清選補之法妙盡才望如不可竝後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不歴郡縣不得爲内職則人思自勉上下同心枉屈可申彊暴自息刑政日平民俗奉化矣復何憂於不治何恤於逆徒也竊見今之守令清慎奉治則政平訟理有非其才則綱維荒穢伏願陛下蹔留天心校其利害則臣言可驗不待終朝昔杜畿寛惠河東無警蘓則分糧金城剋復略觀今古風俗遷訛罔不任賢以相化革朝任夕治功可立待若遵常習故不明選典欲以静民便恐無日書奏會肅宗崩初蕭寶夤在雍州起逆城人侯衆德等討逐之多䝉爵賞武泰中詔雄兼尚書爲闗西賞勲大使未行之間會尒朱榮入洛及河隂之難人情未安雄潛竄不出莊帝欲以雄爲尚書門下奏曰辛雄不出存亡未分莊帝曰寧失亡而用之不可失存而不用也遂除度支尚書加安南將軍元顥入洛也北中郎將楊侃從駕北出莊帝以侃爲度支尚書及乘輿反洛復召雄上雄靣辭曰臣不能死事俛眉從賊乃是朝廷罪人縱陛下不賜誅罰而北來尚書勲髙義重臣宜避賢路莊帝曰卿且還本司朕當别有處分遂解侃尚書未㡬詔雄以本官兼侍中闗西慰勞大使將發請事五條一言逋懸租調宜悉不徵二言簡罷非時徭役以紓民命三言課調之際使豐儉有殊令州郡量檢不得均一四言兵起歴年死亡者衆或父或子辛酸未歇見存耆老請假板職悦生者之意慰死者之魂五言喪亂既乆禮儀罕習如有閨門和穆孝悌卓然者宜表其門閭仍啟曰臣聞王者愛民之道有六一曰利之二曰成之三曰生之四曰與之五曰樂之六曰喜之使民不失其時則成之也省刑罰則生之也薄賦斂則與之也無多徭役則樂之也吏静不苛則喜之也伏惟陛下道邁前王功超往代敷春風而鼓俗旌至德以調民生之養之正當兹日悦近來逺亦是今時臣既忝將命宣揚聖澤前件六事謂所宜行若不除煩收疾惠孤恤寡便是徒乘官驛虛號王人往還有費於郵亭皇恩無逮於民俗謹率愚管敢以陳聞乞垂覽許莊帝從之因詔民年七十者授縣八十者授郡九十加四品將軍百歳從三品將軍三年遷鎮南將軍都官尚書行河南尹普泰時爲鎮軍將軍殿中尚書又加衞將軍右光禄大夫秦州大中正太昌中又除殿中尚書兼吏部尚書尋除車騎大將軍左光禄大夫仍尚書永熙二年三月又兼吏部尚書於時近習專恣請託不已雄懼其讒慝不能確然守正論者頗譏之出帝南狩雄兼左僕射留守京師永熙末兼侍中帝入闗右齊獻武王至洛於永寧寺集朝士責讓雄及尚書崔孝芬劉廞楊機等曰爲臣奉主扶危救亂若處不諫諍出不陪隨緩則耽寵急便竄避臣節安在諸人黙然不能對雄對曰當主上信狎近臣雄等不與謀議及乗輿西邁若即奔隨便恐跡同佞黨留待大王便以不從䝉責雄等進退如此不能自委溝壑實爲慙負王復責曰卿等備位納言當以身報國不能盡忠依附諂佞未聞卿等諫諍一言使國家之事忽至於此罪欲何歸也乃誅之時年五十没其家口二子士璨士貞逃入關中雄從父兄纂字伯將學渉文史温良雅正初爲兖州安東府主簿與祕書丞同郡李伯尚有舊伯尚與咸陽王禧同逆逃竄投纂事覺坐免官積十餘年除奉朝請稍轉太尉騎兵參軍每爲府主清河王懌所賞及欲定考懌曰辛騎兵有學有才宜爲上第轉越騎校尉尚書令李崇北伐蠕蠕引爲録事參軍臨淮王彧北征以纂隨崇有稱啓爲長史及廣陽王淵北伐又引爲長史尋拜諫議大夫雅爲彧所稱歎屢在朝廷薦舉之蕭衍遣將曹義宗攻新野詔纂持節兼尚書左丞南道行臺率衆赴接至便破之義宗等以其勁速不敢復進於時海内多虞京師更無繼援惟以二千餘兵捍禦疆場又詔爲荆州軍司除驍騎將軍加輔國將軍纂善撫將士人多用命賊甚憚之會肅宗崩諱至咸以對敵欲祕凶問纂曰安危在人豈闗是也遂發喪號哭三軍縞素還入州城申以盟約尋爲義宗所圍相率固守莊帝即位除通直散騎常侍征虜將軍兼尚書仍行臺後大都督費穆擊義宗擒之入城因舉酒屬纂曰微辛行臺之在斯吾亦無由建此功也入朝言於莊帝稱纂固節危城宜蒙爵賞以勸將來帝乃下詔慰勉之尋除持節平東將軍中郎將賜絹五十匹金装刀一口永安二年元顥乗勝卒至城下尒朱世隆狼狽退還城内空虛遂爲顥擒及莊帝還宫纂謝不守之罪帝曰於時朕亦北廵東軍不守豈卿之過還鎮虎牢俄轉中軍將軍榮陽太守民有姜洛生康乞得者舊是太守鄭仲明左右豪猾偷竊境内爲患纂伺捕擒獲梟於郡市百姓忻然加鎮東將軍太昌中除左光禄大夫纂僑寓洛陽乃爲河南邑中正永熙三年除使持節河内太守齊獻武王赴洛兵集城下纂出城謁王曰纂受詔於此本有禦防大王忠貞王室扶奨顛危纂敢不匍匐王曰吾志去姦佞以康國道河内此言深得王臣之節因命前侍中司馬子如曰吾行途疲敝宜代吾執河内手也便入洛九月行西荆州事兼尚書南道行臺尋正刺史時蠻酋樊五能破析陽郡應宇文黑獺纂議欲出軍討之纂行臺郎中李廣諫曰析陽四面無民唯一城之地耳山路深險表裏羣蠻今若少遣軍則力不能制賊多遣則減徹防衞根本虛弱脱不如意便大挫威名人情一去州城難保纂曰豈得縱賊不討令其爲患日深廣曰今日之事唯湏萬全且慮在心腹何暇疥癬聞臺軍已破洪威計不乆應至公但約勒屬城使各修完壘壁善撫百姓以待救兵雖失析陽如棄雞肋纂曰卿言自是一途我意以爲不爾遂遣兵攻之不剋而敗諸將因亡不返城人又密招西賊黑獺遣都督獨孤如願率軍潛至突入州城遂至廰閤纂左右惟五六人短兵接戰爲賊所擒遂害之贈都督定殷二州諸軍事驃騎大將軍尚書左僕射司徒公定州刺史子子炎武定中博陵太守雄從祖曇䕶以謹厚見稱卒於并州州都子熾武定中衞將軍右光禄大夫雄族祖琛字僧貴父敬宗延興中代郡太守琛少孤曾過友人見其父母兄弟悉無恙垂涕乆之釋褐奉朝請滎陽郡丞太守元麗性頗使酒琛每諫之麗後醉輙令閉閤曰勿使丞入也髙祖南征麗從輿駕詔琛曰委卿郡事如太守也景明中爲伏波將軍濟州輔國府長史轉奉車都尉出爲揚州征南府長史刺史李崇多事産業琛每諍折崇不從遂相糾舉詔竝不問後加龍驤將軍帶南梁太守崇因置酒謂琛曰長史後必爲刺史但不知得上佐何如人耳琛對曰若萬一叨忝得一方正長史朝夕聞過是所願也崇有慙色卒於官琛寛雅有度量渉獵經史喜愠不形於色當官奉法在所有稱長子悠字元壽早有器業爲侍御史監揚州軍賊平録勲書時崇猶爲刺史欲寄人名悠不許崇曰我昔值其父今復逄其子早卒悠弟俊字叔義有文才東益州征虜府外兵參軍府主魏子建爲山南行臺以爲即中有軍國機斷還京於滎陽爲人劫害贈征虜將軍東秦州刺史俊弟術武定末散騎常侍術弟休字季令休弟修字季緒俱有學尚亦早卒時人傷惜之琛族子珍之少有氣力太尉鎧曹行參軍稍遷中堅將軍司徒録事參軍廣州大中正丁憂去任尋起爲汝北太守永安中司空諮議參軍通直常侍永熙中襄城太守天平初洛州以南人情駭懼勑爲大使持節慰諭廣洛二州三年除征東將軍行陽平郡事郡民路黑奴起逆攻郡爲黑奴所執諸賊勸殺之黑奴曰成敗未可知何爲先殺太守也乃將珍之自隨待遇以禮右衞將軍郭瓊討平黑奴乃得免興和中爲衞將軍司徒司馬武定三年除驃騎將軍北海太守還爲儀同開府長史兼光禄少卿未幾詔珍之持節爲廣洛北荆揚雍襄六州慰勞大使北荆鎮城行廣州事招納有稱齊文襄王遣書慰勉賜以衣帛尋勑行平州卒於官贈驃騎大將軍洛州刺史諡曰恭子懿武定末開府鎧曹參軍羊深字文淵太山平陽人梁州刺史祉第二子也早有風尚學渉經史好文章兼長几案少與隴西李神儁同志相友自司空府記室參軍轉輕車將軍尚書騎兵即尋轉駕部加右軍將軍于時沙汰郎官務精才實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之肅宗行釋奠之禮講孝經儕軰之中獨䝉引聴時論美之正光末北地人車金雀等帥羌胡反叛高平賊宿勤明達宼豳夏諸州北海王顥爲都督行臺討之以深爲持節通直散騎常侍行臺左丞軍司仍領即中顥敗還京頃之遷尚書左丞加平東將軍光禄大夫蕭寶夤反攻圍華州王平薛鳳賢等聚衆作逆勑深兼給事黄門侍郎與大行臺僕射長孫稚共會潼關規模進止事平以功賜爵新泰男靈太后曾幸邙山集僧尼齋會公卿盡在座會事將終太后引見深欣然勞問之深謝曰臣䝉國厚恩世荷榮遇寇難未平是臣憂責而隆私忽被犬馬知歸太后顧謂左右曰羊深真忠臣也舉坐傾心孝昌末徐方多事以深爲東道慰勞使即爲二徐行臺莊帝踐祚除安東將軍太府卿又爲二兖行臺深處分軍國損益隨機亦有時譽初尒朱榮殺害朝士深第七弟侃爲太山太守性麤武遂率鄉人外託蕭衍深在彭城忽得侃書招深同逆深慨然流涕斬侃使人并書表聞莊帝乃下詔曰羊侃作逆霧起瑕邱擁集不逞扇擾疆場傾宗之禍侃乃自貽累世之節一朝毁汙羊深血誠奉國秉操罔貳聞弟猖勃自劾請罪此之丹款實戢于懐且叔向復位春秋稱羙深之慷慨氣同古人忠烈逺彰赤心已著可令還朝面受委勑乃歸京師除名乆之除撫軍將軍金紫光禄大夫元顥入洛以深兼黄門即顥平免官後拜大鴻臚卿普泰初遷散騎常侍衞將軍右光禄大夫監起居注自天下多事東西二省官員委積前廢帝勑深與常侍盧道䖍元晏元法壽選人補定自奉朝請以上各有沙汰尋兼侍中廢帝甚親待之是時膠序廢替名敎陵遲深乃上疏曰臣聞崇禮建學列代之所修尊經重道百王所不易是以均塾洞啓昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乗乾統物欽若奉時模唐軌虞率由前訓重以髙祖繼聖垂衣儒風載蔚得才之盛如彼薪楢固以追隆周而竝驅駕炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自兹已降世極道消風猷稍逺澆薄方競退讓寂寥馳競靡節進必吏能升非學藝是使刀筆小用計日而期榮專經大才甘心於陋巷然治之爲本所貴得賢茍值其人豈拘常檢三代兩漢異世間出或釋褐中林鬱登卿尹或投竿釣渚徑升公相事炳丹青義在往䇿彼哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠時盛徳見徵不過四門登庸不越九品以此取士求之濟治譬猶却行以及前之燕而向楚積習之不可者其所由來漸矣昔魯興泮官頌聲爰發鄭廢學校國風以譏將以納民軌物莫始於經禮菁莪育才義光於篇什自兵亂以來垂將十載干戈日陳爼豆斯闕四海荒凉民物凋敝名敎頓虧風流殆盡世之陵夷可爲歎息陛下中興纂歴理運惟新方隅稍康實惟文德但禮賢崇讓之科沿世未備還淳反樸之化起言斯繆夫先黄老而退六經史遷終其成蠧貴𤣥虛而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼確論造次必儒臣愚以爲宜重修國學廣延胄子使函丈之敎日聞釋奠之禮不闕并詔天下郡國興立儒敎考課之程咸依舊典茍經明行修宜擢以不次抑斗筲喋喋之才進大雅汪汪之德博收鴻生以光顧問縶維竒異共精得失使區寰之内競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠闇短敢慕前訓用稽古義上塵聴覽伏願陛下垂就日之監齊非煙之化儻以臣言可採乞特施行廢帝善之出帝初拜中書令頃之轉車騎大將軍左光禄大夫永熙三年六月以深兼御史中尉東道軍司及出帝入關深與樊子鵠等同逆於兖州子鵠暑深爲齊州刺史於太山博縣商王村結壘招引山齊之民天平二年正月大軍討破之於陳斬深子肅武定末儀同開府東閤祭酒楊機字顯略天水冀人祖伏恩郡功曹赫連屈丐時將家奔洛陽因以家焉機少有志節爲士流所稱河南尹李平元暉竝召署功曹暉尤委以郡事或謂暉曰弗躬弗親庶人弗信何得委事於機髙卧而已暉曰吾聞君子勞於求士逸於任賢故前代有坐嘯之人主諾之守吾既委得其才何爲不可由是聲名更著解褐奉朝請於時皇子國官多非其人詔選清直之士機見舉爲京兆王愉國中尉愉甚敬憚之遷給事中伏波將軍廷尉評延昌中行河隂縣事機當官正色不避權勢明達政事斷獄以情甚有聲譽平東將軍荆州刺史楊大眼啓爲其府長史熙平中爲涇州平西府長史尋授河隂令轉洛陽令京輦伏其威風希有干犯凢訴訟者一經其前後皆識其名姓并記事理世咸異之遷鎮軍將軍司州治中轉别駕荆州蠻叛兼尚書左丞南道行臺討之還除中散大夫復爲别駕州牧髙陽王雍事多委機出除清河内史轉左將軍河北太守竝有能名建義初拜平南將軍光禄大夫兼廷尉卿又除安南將軍司州别駕未幾行河南尹轉廷尉卿徙衞尉卿出除安西將軍華州刺史永熙中衞將軍右光禄大夫尋除度支尚書機方直之心乆而彌厲奉公正已爲時所稱家貧無馬多乗小犢車時論許其清白與辛雄等竝誅年五十九子毗羅解開府參軍事卒於鎮逺將軍機兄順字元信梁郡太守順子僧静武定中太中大夫機兄子虬少有公幹頻爲司州記室户曹從事早卒高崇字積善渤海蓨人四世祖撫晉永嘉中與兄顧避難奔於髙麗父潛顯祖初歸國賜爵開陽男居遼東詔以沮渠牧犍女賜潛爲妻封武威公主拜駙馬都尉加寧逺將軍卒崇少聰敏以端謹見稱徵爲中散稍遷尚書三公即家資富厚僮僕千餘而崇志尚儉素車馬器服充事而已自修潔與物無競初崇舅氏坐事誅公主痛本生絶𦙍遂以崇繼牧犍後改姓沮渠景明中啓復本姓襲爵遷領軍長史伏波將軍洛陽令爲政清斷吏民畏其威風每有發擿不避彊禦縣内肅然朝廷方有遷授會病卒年三十七贈漁陽太守永安二年復贈征虜將軍滄州刺史諡曰成初崇謂友人曰仲尼四科德行爲首人能立身約已不忘典訓斯亦足矣故吾諸子闕子謙之字道讓少事後母李以孝聞李亦撫育過於已生人莫能辨其兄弟所出同異論者兩重之及長屏絶人事專意經史天文算歴圖緯之書多所該渉日誦數千言好文章留意老易襲爵釋褐奉朝請加宣威將軍轉奉車都尉廷尉丞正光中尚書左丞元孚慰勞蠕蠕反被拘留及蠕蠕大掠而還置孚歸國事下廷尉卿及監以下謂孚無坐惟謙之以孚辱命闕以流罪尚書同卿執詔可謙之奏孝昌初行河隂縣令先是有人囊盛瓦礫指作錢物詐市人馬因逃去詔令追捕必得以聞謙之乃僞枷一囚立於馬市宣言是前詐市馬賊今欲刑之密遣腹心察市中私議者有二人相見忻然曰無復憂矣執送按問具伏盗馬徒黨悉獲并出前後盗竊之處資貨甚多逺年失物之家各來得其本物具以狀奏尋詔除寧逺將軍正河隂令在縣二年損益治體多爲故事弟道穆爲御史在公亦有能名世美其父子兄弟並著當官之稱舊制二縣令得靣陳得失時佞幸之軰惡其有所發聞遂共奏罷謙之乃上疏曰臣以無庸謬宰神邑實思奉法不撓稱是官方酬朝廷無貲之恩盡人臣守器之節但豪家支屬戚里親媾縲紲所及舉目多是皆有盗憎之色咸起怨上之心縣令輕弱何能克濟先帝昔發明詔得使面陳所懐臣亡父先臣崇之爲洛陽令常得入奏是非所以朝貴斂手無敢干政近日以來此制遂寢致使神宰威輕下情不達今二聖逺遵堯舜憲章髙祖愚臣望䇿其駑蹇少立功名乞新舊典更明往制庶姦豪知禁頗自屏心詔曰此啓深會朕意付外量聞謙之又上疏曰臣聞夏德中微少康成克復之主周道將廢宣王立中興之功則知國無常安世無恒敝唯在明主所以變之有方化之有道耳自正光已來邊城屢擾命將出師相繼於路軍費戎資委輸不絶至如弓格賞募咸有出身槊刺斬首又䝉階級故四方壯士願征者多各各爲己公私兩利若使軍帥必得其人賞勲不失其實則何賊不平何征不㨗也諸守帥或非其才多遣親者妄稱入募别倩他人引弓格虛受征官身不赴陳惟遣奴客充數而已對宼臨敵曾不彎弓則是王爵虛加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曹擅作威福如有清貞奉法不爲回者咸共譖毁横受罪罰在朝顧望誰肯申聞蔽上擁下虧風壊政使讒諂甘心忠讜息義况且頻年以來多有徵發民不堪命動致流離茍保妻子競逃王役不復顧其桑井憚比刑書正由還有必困之理歸無自安之路若聴歸其本業徭役㣲甄則還者必衆墾田増闢數年之後大獲課民今不務以理還之但欲嚴符切勒恐數年之後走者更多安業無幾故有國有家者不患民不我歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一致且琴瑟不韻知音改弦更張騑驂未調善御執轡成組諺云迷而知反得道不逺此言雖小可以諭大陛下一日萬幾事難周覽元凱結舌莫肯明言臣雖庸短世受榮禄竊慕前賢匪躬之義不避斧鉞之誅以希一言之益伏願少垂覽察略加推採使朝章重舉軍威更振海内起惟新之歌天下見復禹之績則臣奏之後笑入下泉靈太后得其疏以責左右近侍諸寵要者由是疾之乃啓太后云謙之有學藝宜在國學以訓胄子詔從之除國子博士謙之與袁飜常景酈道元温子昇之徒咸申欵舊好於贍恤言諾無虧居家僮隷對其兒不撻其父母生三子便免其一世無髠黥奴婢常稱俱禀人體如何殘害以父舅氏沮渠蒙遜曾據涼土國書漏闕謙之乃修涼書十卷行於世涼國盛事佛道爲論貶之因稱佛是九流之一家當世名士競以佛理來難謙之還以佛義對之竟不能屈以時所行厯多未盡善乃更改元修撰爲一家之法雖未行於世議者歎其多能於時朝議鑄錢以謙之爲鑄錢都將長史乃上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公爲周置九府圜法至景王時更鑄大錢秦兼海内錢重半兩漢興以秦錢重改鑄榆莢錢至文帝五年復爲四銖孝武時悉復銷壊更鑄三銖至元狩中變爲五銖又造赤仄之錢以一當五王莾攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不隨時而變竊以食貨之要八政爲首聚財之貴詒訓典文是以昔之帝王乗天地之饒御海内之富莫不腐紅粟於太倉藏朽貫於泉府儲畜既盈民無困敝可以寧謐四極如身使臂者矣昔漢之孝武地廣財豐外事四戎遂虛國用於是草萊之臣出財助國興利之計納税廟堂市列𣙜酒之官邑有告緡之令鹽鐵既興錢幣屢改少府遂豐上林饒積外闢百蠻内不增賦者皆計利之由也今羣妖未息四郊多壘徵税既煩千金日費資儲漸耗財用將竭誠楊氏獻税之秋桑兒言利之日夫以西京之盛錢猶屢改竝行小大子母相權况今宼難未除州郡淪敗民物凋零軍國用少别鑄小錢可以富益何損於政何妨於人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之於古亦宜效之於今矣昔禹遭大水以歴山之金鑄錢救民之困湯遭大旱以莊山之金鑄錢贖民之賣子者今百姓窮悴甚於曩日欽明之主豈得垂拱而觀之哉臣今此鑄以濟交乏五銖之錢任使竝用行之無損國得其益穆公之言於斯驗矣臣雖術愧計然識非心筭暫充錢官頗覩其理茍有所益不得不言脱以爲疑求下公卿博議如謂爲允即乞施行詔將從之事未就會卒初謙之弟道穆正光中爲御史紏相州刺史李世哲事大相挫辱其家恒以爲憾至是世哲弟神軌爲靈太后深所寵任直謙之家僮訴良神軌左右之入諷尚書判禁謙之於廷尉時將赦神軌乃啓靈太后發詔於獄賜死時年四十二朝士莫不哀之所著文章百餘篇别有集録永安中贈征虜將軍營州刺史諡曰康又除一子出身以明寃屈謙之妻中山張氏明識婦人也敎勸諸子從師受業常誡之曰自我爲汝家婦未見汝父一日不讀書汝等宜各修勤勿替先業謙之長子子儒字孝禮元顥入洛其叔道穆從駕北廵子儒後踰河至行宫莊帝見之具訪洛中事意子儒備陳元顥敗在旦夕帝謂道穆曰卿初來日何故不與子儒俱行對曰臣家百口在洛湏其經營且欲其今日之來知京師後事帝曰子儒非直合卿本懐亦大慰朕意仍授祕書郎中轉通直即後除安東將軍光禄大夫司徒中兵參軍兼祭酒襲爵興和初除兼殿中侍御史時四方多有流民子儒爲梁州北豫西兖三州檢户使所獲甚多後以公事去官武定六年卒時年四十一子儒弟緒字叔宗明悟好學謙之常謂人曰興吾門者當是此兒及長渉獵書𫝊好文詠司空行參軍轉長流參軍除鎮逺將軍冀州儀同府中兵參軍爲府主封隆之所賞隆之行梁州濟州引自隨恒令總攝數郡武定三年卒年三十二緒弟孝貞武定中司徒士曹參軍孝貞弟孝幹司空東閣祭酒謙之弟恭之字道穆行字於世學涉經史非名流儁士不與交結幼孤事兄如父母每謂人曰人生厲心立行貴於見知當使夕脱羊裘朝佩珠玉者若時不我知便湏退迹江海自求其志御史中尉元匡髙選御史道穆奏記於匡曰道穆生自蓬簷長於陋巷頗獵羣書無純碩之德尚好章詠乏彫掞之工雖欲厠影髦徒班名俊伍其可得哉然凝明獨斷之主雄才不世之君無藉朽株之資求人屠釣之下不牽闇投之誚取士商歌之中是以聞英風而慷慨望雲路而低回者天下皆是也若得身𨽻繡衣名充直指雖謝周生騎上之敏實有茅氏就鑊之心匡大喜曰吾乆知其人適欲召之遂引爲御史其所糾擿不避權豪臺中事物多爲匡所顧問道穆曾進説於匡曰古人有言罰一人當取千萬人懼豺狼當道不問狐狸明公荷國重寄宜使天下知法匡深然之正光中出使相州刺史李世哲即尚書令崇之子貴盛一時多有非法逼買民宅廣興屋宇皆置鴟尾又於馬埓堠上爲木人執節道穆繩糾悉毁去之并發其贓貨具以表聞又尒朱榮討蠕蠕道穆監其軍事榮甚憚之還除奉朝請俄除太尉鎧曹參軍蕭寶夤西征以道穆爲行臺郎中軍機之事多以委之大都督崔延伯敗後賊勢轉彊屢請益兵朝廷不許寶夤謂道穆曰非卿一行兵無益理遂令乗傳赴洛靈太后親問賊勢道穆具以狀對太后怒曰比來使人皆言賊弱卿何獨云其彊也道穆曰前使不實者當是冀陛下恩顔望霑爵賞臣既忝使人不敢虛妄願令近臣親檢足知虚實事訖當反遇病不行後屬兄謙之被害情不自安遂託身於莊帝帝時爲侍中特相欽重引居第中深相保䕶俄而帝以兄事見出道穆懼祸乃擕家趣濟隂變易姓名往來於東平畢氏以避時難莊帝即位徵爲尚書三公即中加寧朔將軍尋兼吏部即中與薛曇尚書使晉陽授爾朱榮職賜爵龍城侯九月除太尉長史領中書舍人遭母憂去職帝令中書舍人温子昇就宅弔慰詔攝本任表辭不許三年加前軍將軍及元顥逼虎牢城或勸帝赴關西者帝以問道穆道穆對曰關中今日殘荒何由可往臣謂元顥兵衆不多乗虛深入者由國家將帥征提不得其人耳陛下若親率宿衞髙募重賞背城一戰臣等竭其股肱之力破顥孤軍必不疑矣如恐成敗難測非萬乗所履便宜車駕北渡循河東下徵大將軍天穆合於滎陽向虎牢别徵尒朱王軍令赴河内以掎角之旬月之間何往不剋臣竊謂萬全之計不過於此帝曰髙舍人語是其夜到河内郡北未有城守可依帝命道穆秉燭作詔書數十紙布告逺近於是四方知乗輿所在除中軍將軍給事黄門侍郎安喜縣開國公食邑千户於時尒朱榮欲回師待秋道穆謂榮曰元顥以蕞爾輕兵奄據京洛使乗輿飄露人神恨憤主憂臣辱良在於今大王擁百萬之衆輔天子而令諸侯自可分兵河畔縛筏造船處處遣渡徑擒羣賊復主宫闕此桓文之舉也且一日縱敵數世之患今若還師令顥重完守具徵兵天下所謂飬虺成蛇悔無及矣榮深然之曰楊黄門侃已陳此計當更議決耳及莊帝反政因宴次謂尒朱榮曰前若不用髙黄門計則社稷不安可爲朕勸其酒令醉榮對曰臣本北征蠕蠕髙黄門與臣作監軍臨事能決實可任用除征南將軍金紫光禄大夫兼御史中尉尋即真仍兼黄門道穆外秉直繩内參機密凢是益國利民之事必以奏聞諫諍極言無所顧憚選用御史皆當世名軰李希宗李繪陽休之陽斐封君義邢子明蘇淑宋世良等四十人於時用錢稍薄道穆表曰四民之業錢貨爲本救獘改鑄王政所先自頃以私鑄薄濫官司糾繩挂網非一在市銅價八十一文得銅一斤私造薄錢斤餘二百既示之以深利又隨之以重刑罹罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷之愆彼復何罪昔漢文帝以五分錢小故鑄四銖至武帝復改三銖爲半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鈆沙縱復私營不能自潤直置無利自應息心況復嚴刑廣設也以臣測之必當錢貨永通公私獲允後遂用楊侃計鑄永安五銖錢僕射尒朱世隆當朝權盛因内見衣冠失儀道穆便即彈糾帝姊夀陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以爲恨泣以訴帝帝謂公主曰髙中尉清直之人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯極以爲愧道穆免冠謝曰臣䝉陛下恩守陛下法不敢獨於公主虧朝廷典章以此負陛下帝曰朕以愧卿卿反謝朕尋勑監儀注又詔曰祕書圖籍所在内典書又加繕冩緗素委積蓋有年載出内繁蕪多致零落可令御史中尉兼給事黄門侍即道穆惣集帳目并牒儒學之士編比次第道穆又上疏曰臣聞舜命臯陶姦宄是託禹泣辜人堯心爲念所以舉直錯枉事切曩賢明徳慎罰議存先典髙祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要所謂禮樂互興不相㳂襲者矣臣以無庸忝當今任所思報效未忘寢興但識謝知今業慙稽古未能進一言以利國説一䇿以興邦索米長安豈不知耻至於職司其憂猶望僶俛竊見御史出使悉受風聞雖時獲罪人亦不無枉濫何者得堯之罰不能不怨守令爲政容有愛憎姦猾之徒恒思報惡多有妄造無名共相誣謗御史一經檢究耻於不成杖木之下以虛爲實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指冀以清肅若仍踵前失或傷善人則尸禄之責無所逃罪所以夙夜爲憂思有悛革如臣鄙見請依太和故事還置司直十人名𨽻廷尉秩以五品選歴官有稱心平性正者爲之御史若出紏劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居别館御史檢了移付司直覆問事訖與御史俱還中尉彈聞廷尉科按一如舊式庶使獄成罪定無復稽寛爲惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聴以所檢迭相紏發如二使阿曲有不盡理聴罪家詣門下通訴别加按檢如此則肺石之傍怨訟可息叢棘之下受罪吞聲者矣詔從之復置司直及尒朱榮之死也帝召道穆付赦書令宣於外因謂之曰自今日後常得精選御史矣先是榮等常欲以其親黨爲御史故有此詔及尒朱世隆等率其部類戰於大夏門北道穆受詔督戰又贊成太府卿李苖斷橋之計世隆等於是北遁加衞將軍假車騎將軍大都督兼尚書右僕射南道大行臺又除車騎將軍餘官如故時雖外託征蠻而帝恐北軍不利欲爲南廵之計未發會尒朱兆入洛道穆慮禍及已託病去官世隆以道穆忠於前朝遂害之時年四十二泰昌中贈使持節都督雍秦二州諸軍事車騎大將軍儀同三司雍州刺史子士鏡襲爵爲北豫州刺史髙仲密擁入關道穆弟謹之繼沮渠氏後卒於滄州平東府主簿年三十五贈通直郎無子謹之弟慎之字道密好學有諸兄風年二十三卒無子以兄謙之第二子緒繼焉史臣曰宋飜剛鯁自立猛而斷務辛雄以吏能歴職任智效官羊深以才幹從事聲迹可紀楊機清斷在公髙崇明濟爲用謙之兄弟咸政事之敏飾學有聞列于朝廷豈徒然也深失之晚節至于顛覆惜乎魏書卷七十七魏書卷七十七考證羊深傳羊深字文淵太山平陽人梁州刺史祉第二子也臣人龍按北史羊祉傳祉太山鉅平人本書地形志泰山郡有鉅平若平陽則屬髙平郡又有陽平則屬魯郡當以鉅平爲是魏書卷七十七考證
