body:
  text: 魏書卷七十齊魏收撰列傳第五十八劉藻𫝊永傅豎眼李神劉藻字彦先廣平易陽人也六世祖遐從司馬叡南渡父宗之劉裕廬江太守藻渉獵羣籍羙談笑善與人交飲酒至一石不亂永安中與姊夫李嶷俱來歸國賜爵易陽子擢拜南部主書號為稱職時北地諸羌數萬家恃險作亂前後牧守不能制姦暴之徒並無名實朝廷患之以藻為北地太守藻推誠布信諸羌咸來歸附藻書其名籍收其賦稅朝廷嘉之遷龍驤将軍雍城鎮将先是氐豪徐成楊黑等驅逐鎮将故以藻代之至鎮擒獲成黒等斬之以狥羣氐震慴雍州人王叔保等三百人表乞藻為騃奴戍主詔曰選曹已用人藻有惠政自宜他敘在任八年遷離城鎮将太和中改鎮為岐州以藻為岐州刺史轉秦州刺史秦人恃嶮率多麤暴或拒課輸或害長吏自前守宰率皆依州遙領不入郡縣藻開示恩信誅戮豪横羌氐憚之守宰於是始得居其舊所遇車駕南伐以藻為東道都督秦人紛擾詔藻還州人情乃定仍與安南將軍元英征漢中頻破賊軍長驅至南鄭垂平梁州奉詔還軍乃不果克後車駕南伐以藻為征虜將軍督統軍髙聰等四軍為東道别將辭於洛水之南髙祖曰與卿石頭相見藻對曰臣雖才非古人庶亦不留賊虜而遺陛下輒當釃曲阿之酒以待百官髙祖大笑曰今未至曲阿且以河東數石賜卿後與高聰等戰敗俱徙平州景明初世宗追錄舊功以藻為太尉司馬是年六月卒年六十七贈錢六萬子紹珍無他才用善附㑹好飲酒結託劉騰騰啓為其國郎中令襲子爵稍遷本州别駕司空屬以事免官建義初詔復尋除太中大夫永安二年除安西將軍河北太守還朝久之拜車騎將軍左光祿大夫出為黎陽太守所在無政績天平中坐子尚書郎洪業入於關中率衆侵擾伏法傅永字修期清河人也幼随叔父洪仲與張幸自青州入國尋復南奔有氣幹拳勇過人能手執鞍橋倒立馳騁年二十餘有友人與之書而不能答請於洪仲洪仲深讓之而不為報永乃發憤讀書涉獵經史兼有才華自東陽禁防為崔道固城局參軍與道固俱降入為平齊民父母並老飢寒十數年賴其彊於人事戮力傭丐得以存立晚乃被召兼治禮郎詣長安拜文明太后父燕宣王廟令賜爵貝邱男加伏波將軍未幾除中書博士又改為議郎轉尚書考功郎中為大司馬從事中郎尋轉都督任城王澄長史兼尚書左丞王肅之為豫州以永為建武将軍平南長史咸陽王禧慮肅難信言於高祖高祖曰已選傅修期為其長史雖威儀不足而文武有餘矣肅以永宿士禮之甚厚永亦以肅為髙祖眷遇盡心事之情義至穆蕭鸞遣將魯康祚趙公政衆號一萬侵豫州之太倉口肅令永勒甲士三千擊之時康祚等軍於淮南永舎淮北十有餘里永量呉楚之兵好以斫營為事即夜分兵二部出於營外又以賊若夜来必應於渡淮之所以火記其淺處永既設伏乃密令人以瓠盛火渡淮南岸當深處置之敎之云若有火起即亦然之其夜康祚公政等果親率領來斫永營東西二伏夾擊之康祚等奔趨淮水火既競起不能記其本濟遂望永所置之火而争渡焉水深溺死斬首者數千級生擒公政康祚人馬墜淮曉而獲其屍斬首并公政送京師公政岐州刺史超宗之從兄也時裴叔業率王茂先李定等来侵楚王戍永適還州肅復令大討之永將心腹一人馳詣楚王戍至即令填塞外塹夜伏戰士一千人於城外曉而叔業等至江於城東列陳将置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陳自率精甲數千救之永上門樓觀叔業南行五六里許更開門奮擊遂摧破之叔業進退失圗於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虛實足䘮其膽存此足矣何假逐之獲叔業傘扇鼓幕甲仗萬餘兩月之中遂獻再㨗髙祖嘉之遣謁者就豫州䇿拜永安逺将軍鎮南府長史汝南太守貝丘縣開國男食邑二百户髙祖每歎曰上馬能擊賊下馬作露布唯傅脩期耳裴叔業又圍渦陽時高祖在豫州遣永為統軍與髙聰劉藻成道益任莫問等徃救之軍将逼賊永曰先深溝固壘然後圖之聰等不從裁營輜重便擊之一戰而敗聰等棄甲徑奔懸瓠永獨收散卒徐還賊追至又設伏擊之挫其鋒銳四軍之兵多賴之以免永至懸瓠高祖俱鎖之聰藻徙為邊民永免官爵而已不經旬日詔曰修期在後少有擒殺可揚武將軍汝隂鎮將帶汝隂太守景明初裴叔業將以夀春歸國密通於永永具表聞及將迎納詔永為統軍與楊大眼奚康生等諸軍俱入夀春同日而永在後故康生大眼二人並賞列土永唯清河男蕭寳卷將陳伯之侵逼夀春㳂淮為寇時司徒彭城王勰廣陵侯元衍同鎮夀春以九江初附人情未洽兼臺援不至深以為憂詔遣永為統軍領汝隂之兵三千人先援之永總勒士卒水陸俱下而淮水口伯之防之甚固永去二十餘里牽船上汝南岸以水牛挽之直南趨淮下船便渡適上南岸賊軍亦及㑹時已夜永乃潛進曉逹夀春城下勰衍聞外有軍共上門樓觀望然不意永至永免胄乃信之遂引永上勰謂永曰北望以久恐洛陽難復可見不意卿能至也勰令永引軍入城永曰執兵被甲固敵是求若如教㫖便共殿下同被圍守豈是救援之意遂孤軍城外與勰并勢以擊伯之頻有剋捷中山王英之征義陽永為寧朔將軍統軍當長圍遏其南門蕭衍將馬仙琕連營稍進規解城圍永謂英曰凶豎豕突意在決戰雅山形要宜早據之英沉吟未決永曰機者如神難遇易失今日不徃明朝必為賊有雖悔無及英乃分兵通夜築城於山上遣統軍張懐等列陳於山下以防之至曉仙琕果至懐等戰敗築城者悉皆奔退仙琕乘勝直趨長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將馬歩千人南逆仙琕擐甲揮戈單騎先入唯有軍主蔡三虎副之餘人無有及者突陳横過賊射永洞其左股永㧞箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陳謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖㣲國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而返時年七十餘矣三軍莫不壮之義陽既平英使司馬陸希道為露板意謂不可令永改之永亦不増文彩直與之改陳列軍儀處置形要而已而英深賞之歎曰觀此經算雖有金城湯池亦不能守矣還京復封永先有男爵至是以品不累加賜帛二千疋除太中大夫行秦梁二州事代邢巒鎮漢中後還京師於路除恒農太守非心所樂時英東征鍾離連表請永求以為將朝廷不聼永每言曰文淵充國竟何人哉吾獨白首見拘此郡深用扼腕然於治民非其所長故在任無多聲稱未幾解郡還為太中大夫行南青州事遷左将軍南兖州刺史猶能馳射盤馬奮矟時年踰八十常諱言老每自稱六十九還京拜平東將軍光祿大夫熙平元年卒年八十三贈安東将軍齊州刺史永甞登北邙於平坦處奮矟躍馬盤旋瞻望有終焉之志遠慕杜預近好李沖王肅欲葬附其墓遂買左右地數頃遺勅子叔偉曰此吾之永宅也永妻賈氏留於本鄉永至代都娶妾馮氏生叔偉及數女賈後歸平城無男唯一女馮恃子事賈無禮叔偉亦奉賈不順賈常忿之馮先永亡及永之卒叔偉稱父命欲葬北邙賈疑叔偉将以馮合葬賈遂求歸葬永於所封貝丘縣事經司徒司徒胡國珍本與永同經征役感其所慕許叔偉葬焉賈乃邀訴靈太后靈太后遂從賈意事經朝堂國珍理不能得乃葬於東清河又永昔營宅兆葬父母於舊鄉賈於此彊徙之與永同處永宗親不能抑葬已數十年矣棺為桑棗根所遶束去地尺餘甚為周固以斧斬斫出之於坎時人咸怪未三年而叔偉亡叔偉九歳為州主簿及長膂力過人彎弓三百斤左右馳射又能立馬上與人角騁見者以為得永之武而不得永之文也正光中叔偉子豊生襲封傅豎眼本清河人七世祖伷伷子遘石虎太常祖父融南徙渡河家于磐陽為鄉閭所重性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乗者人曰何由得人乗之有一人對曰唯有傅靈慶堪乗此馬又有弓一張亦無人堪引人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解人曰唯𫝊靈越可解此文融意謂其三子文武才幹堪以駕馭當世常宻謂鄉人曰汝聞之不鬲蟲之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附劉駿將蕭斌王元謨寇碻磝時融始死元謨彊引靈慶為軍主將攻城攻車為城内所燒靈慶懼軍法詐云傷重令左右輿之還營遂與壮士數十騎遁還斌元謨命追之左右諫曰靈慶兄弟並有雄才兼其部曲多是壮勇如彭超户生之徒皆一當數十人援不虛發不可逼也不如緩之元謨乃止靈慶至家遂與二弟匿於山澤之間時靈慶從叔乾愛為斌法曹參軍斌遣乾愛誘呼之以腰刀為信宻令壮健者隨之而乾愛不知斌之欲圖靈慶也既至靈慶間對坐未久斌所遣壮士執靈慶殺之靈慶將死與母崔訣言法曹殺人不可忘也靈根靈越奔河北靈越至京師髙宗見而竒之靈越因說齊民慕化青州可平髙宗大悅拜靈越鎮逺將軍青州刺史貝丘子鎮羊蘭城靈根為臨齊副將鎮明潛壘靈越北入之後母崔氏遇赦免劉駿恐靈越在邊􅅰動三齊乃以靈越叔父琰為兾州治中乾愛為樂陵太守樂陵與羊蘭隔河相對命琰遣其門生與靈越婢詐為夫婦投化以招之靈越與母分離思積遂與靈根相要南走靈越與羊蘭奮兵相擊乾愛遣船迎之得免靈根差期不得俱渡臨齊人覺知剉斬殺之乾愛出郡迎靈越問靈根愆期之狀而靈越殊不應答但言不知而已乾愛不以為惡勑左右出匣中烏皮袴褶令靈越代所常服靈越言不須乾愛云汝豈可著體上衣服見垣公也時垣護之為刺史靈越奮聲言垣公垣公著此當見南方國主豈垣公也竟不肻著及至丹陽劉駿見而禮之拜員外郎兖州司馬帶魯郡而乾愛亦遷青兾司馬帶魏郡後二人俱還建康靈越意恒欲為兄復讐而乾愛初不疑防知乾愛嗜雞肉葵菜食乃為作之下以毒藥乾愛飯還而卒後數年而靈越為太原太守戍升城後舉兵同劉駿子子勛子勛以靈越為前軍将軍子勛敗靈越軍衆散亡為劉彧將王廣之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺廣之生送詣彧輔國府司馬劉勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加以大恩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末備皆參預人生歸於一死實無面求活勔壮其意送詣建康劉彧欲加原宥靈越辭對如一終不回改乃殺之豎眼即靈越子也沉毅壮烈少有父風入國鎮南王肅見而異之且竒其父節傾心禮敬表為參軍從肅征伐累有戰功稍遷給事中歩兵校尉左中郎将常為統軍東西征伐世宗時為建武将軍討揚州賊破之仍鎮於合肥蕭衍民歸之者數千户後武興氐楊集義反叛推其兄子紹先為主攻圍關城梁州刺史邢巒遣豎眼討之集義衆逆戰頻破走之乗勝追北仍剋武興還洛詔假節行南兖州事豎眼善於綏撫南人多歸之轉昭武将軍益州刺史以州初置境逼巴獠給羽林虎賁三百人進號冠軍将軍及髙肇伐蜀假豎眼征虜將軍持節領歩兵三萬先討北巴蕭衍聞大軍西伐遣其寧州刺史任太洪從隂平偷路入益州北境欲擾動氐蜀以絶運路乗國諱班師遂扇誘土民奄破東洛除口二戍因此詐言南軍繼至氐蜀信之翕然從逆太洪率氐蜀數千圍逼關城豎眼遣寜朔将軍成興孫討之軍次白護太洪遣其輔國將軍任碩北等率衆一千邀險拒戰在虎徑南山連置三營興孫分遣諸統隨便掩擊皆破之太洪又遣軍主邊昭等率氐蜀三千攻逼興孫柵興孫力戰為流矢所中死豎眼又遣統軍姜喜季元度從東嵠潛入回出西崗邀賊之後表裏合擊大破之斬邊昭及太洪前部王隆護首於是太洪及關城五柵一時逃散豎眼性既清素不營産業衣食之外俸祿粟帛皆以饗賜夷首賑恤士卒撫蜀人以恩信為本保境安民不以小利侵竊有掠蜀民入境者皆移送還本土撿勒部下守宰肅然逺近雜夷相率欵謁仰其徳化思為魏民矣是以蜀民請軍者旬月相繼世宗甚嘉之肅宗初屢請解州乃以元法僧代之益州民追隨戀泣者數百里至洛拜征虜將軍太中大夫蕭衍遣將趙祖悦入屯硤石以逼夀春鎮南將軍崔亮討之以豎眼為持節鎮南軍司法僧既至大失民和蕭衍遣其信武将軍衡州刺史張齊因民心之怨入寇晉夀頻陷葮萌小劒諸戍進圍州城朝廷以西南為憂乃驛徴豎眼於淮南既至以為右將軍益州刺史尋加散騎常侍平西將軍假安西將軍西征都督率歩騎三千以討張齊給銅印千餘湏有假職者聼六品以下板之豎眼既出梁州衍冠軍将軍勾道侍梁州刺史王太洪等十餘將所在拒塞豎眼三日之中轉戰二百餘里甲不去身頻致九㨗土民統軍席廣度等處處邀擊斬太洪及衍征虜將軍楊伏錫等首張齊引兵西退遂奔葮萌蜀民聞豎眼復為刺史人人喜悦迎於路者日有百數豎眼至州白水以東民皆寜業先是蕭衍信義將軍都統白水諸軍事楊興起征虜將軍李光宗襲據白水舊城豎眼遣虎威将軍强虬與隂平王楊太赤率衆千餘夜渡白水旦而交戰大敗賊軍斬興起首剋復舊城又遣統軍傅曇表等大破衍寜朔將軍王光昭於隂平張齊仍阻白水屯寇葮萌豎眼分遣諸将水陸討之齊遣其寧朔将軍費忻督歩騎二千逆來拒戰軍主陳洪起力戰破之乗勝追奔遂臨夾谷三柵統軍胡小虎四面攻之三柵俱潰張齊親率驍勇二萬餘人與諸軍交戰豎眼命諸統帥同時奮擊軍主許暢斬衍雄信將軍牟興祖軍主孔領周射齊中足於是大破賊軍斬獲甚衆齊乃柵於虎頭山下賊帥任令崇屯據西郡豎眼復遣討之令崇棄衆夜遁乃進討齊破其二柵斬首萬餘齊被重創奔􅇡而退小劒大劒賊亦捐城西走益州平靈太后璽書慰勞賜驊騮馬一匹寶劒一口豎眼表求解州不許復轉安西將軍岐州刺史常侍如故仍轉梁州刺史常侍將軍如故梁州之人既得豎眼為牧人咸自賀而豎眼至州遇患不堪綜理其子敬紹險暴不仁聚貨耽色甚為民害逺近怨望焉尋假鎮軍將軍都督梁西益巴三州諸軍事蕭衍遣其北梁州長史錫休儒司馬魚和上庸太守姜平洛等十軍率衆三萬入寇直城豎眼遣敬紹總衆赴之倍道而進至直城而賊襲據直口敬紹以賊斷歸路督兼統軍高徹吴和等與賊決戰大破之擒斬三千餘人休儒等走還魏興敬紹頗覽書傳微有膽力而奢淫倜儻輕為殘害又見天下多事隂懷異圖欲杜絶四方擅據南鄭令其妾兄唐崐崘扇攪於外聚衆圍城敬紹謀為内應賊圍既合其事泄露在城兵武執敬紹白豎眼而殺之豎眼耻恚發疾遂卒永安中贈征東將軍吏部尚書齊州刺史出帝初重贈散騎常侍車騎将軍司徒三公相州刺史開國如故長子敬和敬和弟敬仲並好酒薄行傾側勢家敬和歴青州鎮逺長史孝莊時復為益州刺史朝廷以其父有遺恵故也至州聚斂無已好酒嗜色逺近失望仍為蕭衍將樊文熾攻圍敬和以城降送於江南後衍以齊獻武王威徳日廣令敬和還國以申和通之意久之除北徐州刺史復以耽酒為土賊掩襲棄城走徴詣廷尉遇恩免遂廢棄卒於家乾愛子三寶與房法夀等同効疑盤陽賜爵貝丘子三寶弟法獻髙祖初南叛為蕭鸞右中郎将直閤将軍從崔慧景至鄧城為官軍所殺琰曽孫文驥勇果有将領之才随豎眼征伐累有軍功自彊弩將軍出為琅邪戍主朐山内附徐州刺史盧昶遣文驥守朐山樵米既竭而昶軍不進文驥遂棄母妻以城降蕭衍後大以南貨賂光州刺史羅衡衡為渡其母妻李神恒農人父洪之秦益二州刺史神少有膽畧以氣尚為名早從征役其從兄崇深所知賞累遷威逺将軍新蔡太守領建安戍主轉寧逺将軍陳留太守領狄邱戍主頻有軍功封長樂縣開國男食邑二百户遷征虜将軍驍騎将軍直閤将軍蕭衍将趙祖悅率衆據硤石神為别将率揚州水軍受刺史李崇節度與都督崔亮行臺僕射李平等攻硖石剋之進平北将軍太中大夫孝昌中行相州事尋正加撫軍将軍假鎮東將軍大都督建義初除衛将軍時葛榮充斥民多逃散先是州将元鑒反叛引賊後都督源子邕裴衍戰敗被害朝野憂惶人不自保而神志氣自若撫勞兵民小大用命既而葛榮盡銳攻之久不能剋㑹尒朱榮擒葛榮於鄴西事平除車騎将軍以功進爵為公増邑八百通前一千户元顥入洛荘帝北廵以神為侍中又除殿中尚書仍行相州事車駕還宮改封安康郡開國公加封五百户普泰元年進驃騎大将軍儀同三司相州大中正永熙中薨天平元年賜使持節侍中驃騎大将軍司徒公兾州刺史子士約襲齊受禪爵例降史臣曰劉藻傅永豎眼文武器幹知名於時豎眼加以撫邊導俗風化尤羙方之二子固以優乎抑又魏世之良牧李神據危城當大難其氣概亦足稱焉魏書卷七十魏書卷七十考證傅豎眼傳在城兵武執敬紹北史無武字魏書卷七十考證
