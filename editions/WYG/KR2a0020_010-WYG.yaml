body:
  text: 魏書卷十齊魏收撰帝紀第十孝莊紀孝荘皇帝諱子攸彭城王勰之第三子母曰李妃肅宗初以勰有魯陽翼衛之勲封武城縣開國公㓜侍肅宗書於禁内及長風神秀慧姿貌甚美拜中書侍郎城門校尉兼給事黄門侍郎雅為肅宗所親待長直禁中遷散騎常侍御史中尉孝昌二年八月進封長樂王轉侍中中軍將軍三年十月以兄彭城王劭事轉為衛将軍左光禄大夫中書監實見出也及武泰元年春二月肅宗崩大都督尒朱榮將向京師謀欲廢立以帝家有忠勲且兼民望隂與帝通榮乃率衆來赴夏四月丙申帝與兄弟夜北渡河丁酉會榮於河陽戊戍南濟河即帝位以兄彭城王劭為無上王弟覇城公子正為始平王以榮為使持節侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王己亥百寮相率有司奉璽紱備法駕奉迎於河梁庚子車駕廵河西至陶渚榮以兵權在己遂有異志乃害靈太后及㓜主次害無上王劭始平王子正又害丞相髙陽王雍司空公元欽儀同三司元恒芝儀同三司東平王略廣平王悌常山王邵北平王超任城王彛趙郡王敏中山王叔仁齊郡王温公卿已下二千餘人列騎衛帝遷於便幕既而榮悔稽顙謝罪語在榮傳辛丑車駕入宫御太極殿詔曰太祖誕命應期龍飛燕代累世重光載隆帝緒冀欲闡兹洪業永在無窮豈圗多難遘兹百六致使妖悖四起内外競侵朝無恤政之臣野多怨酷之士實由女主專朝致兹顛覆孝明皇帝大情沖順深存隐忍奄棄萬國衆用疑焉茍求胡出入守神器凡厥有心莫不觧體太原王榮世抱忠孝功格古今赴義晉陽大㑹河洛乃推翼朕躬應兹大命徳謝少康道愧前緒猥以𦕈身君臨萬國如渉淵海罔知所濟可大赦天下改武泰為建義元年從太原王督将軍士普加五階在京文官兩階武官三級復天下租役三年壬寅太原王尒朱榮上表請追諡無上王為皇帝餘死於河隂者諸王刺史贈三司三品者令僕五品者刺史七品以下及民郡鎮諸死者子孫聼立後授封爵詔從之癸夘以前太尉公江陽王繼為太師司州牧驃騎大將軍開府儀同三司相州刺史北海王顥為太傅開府仍刺史平東將軍光禄大夫清淵縣開國侯李延寔為太保進封陽平王㝷轉太傅安南将軍并州刺史元天穆為太尉公封上黨王侍中車騎大将軍儀同三司楊椿為司徒公車騎大將軍儀同三司頓丘郡開國公穆紹為司空公領尚書令進爵為王使持節車騎大将軍雍州刺史上黨公長孫稚為驃騎大将軍開府儀同三司進爵為王㝷改封馮翊王中軍将軍殿中尚書元諶為儀同三司尚書左僕射封魏郡王中軍将軍給事黄門侍郎元瑱為東海王金紫光禄大夫廣陵王恭為儀同三司甲辰追復故廣陽王淵故樂安王鑒爵通直散騎常侍敷城王坦為咸陽王諫議大夫元貴平為東萊王直閣将軍元肅為魯郡王秘書郎中元曄為長廣王馮翊郡開國公源紹景復先爵隴西王扶風郡開國公馮冏東郡公陸子彰北平公長孫悦並復其先王爵以北平王超還復為安定王丁未詔内外觧嚴庚戍封大将軍尒朱榮次子义羅為梁郡王詔蠕蠕主阿那瓌賛拜不名上書不稱臣是月汝南王悦北海王顥臨淮王彧前後奔蕭衍郢州刺史元願逹據城南叛五月丁巳朔加大将軍尒朱榮北道大行臺以尚書右僕射元羅為東道大使征東将軍光禄勲元欣副之廵方黜陟先行後聞辛酉大将軍尒朱榮還晋陽帝餞於邙隂丙寅詔曰自孝昌之季法令昏冺懐忠守素擁隔莫申深怨宿憾控告靡所其有事在通途横被疑異名例無爽枉見排抑或選舉不平或賦役煩苛諸如此者不可具説其有訴人經公車注不合者悉集華林東門朕當親理寃獄以申積滯己巳齊州郡民賈結聚衆反夜襲州城㑹明退走乙亥晉州刺史樊子鵠克唐州斬刺史崔元珍行臺酈惲傳首京師壬午詔求徳行文藝政事強直者縣令太守刺史皆敘其志業具以表聞得三人以上縣令太守刺史賞一階舉非其人亦黜一階又以舊敘軍勲不過征虜自今以後宜依前式以上餘階積而為品其從輿駕北來之徒不在此例悉不聼破品受階破階請帛先是蕭衍遣其将曹義宗宼荆州癸未以中軍将軍吏部尚書費穆為使持節都督南征諸軍事節度荆州刺史王羆以討之六月丁亥朔追封兄真定縣開國公子直為陳留王庚寅以鎮軍将軍金紫光禄大夫李虔為車騎大將軍儀同三司特進辛夘南荆州刺史李志據城南叛通直散騎常侍髙乾邕及弟等率合流民起兵於齊州之平原頻破州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒率車三萬餘乗南宼至沁水癸夘以髙昌王世子光為平西将軍𤓰州刺史襲爵泰臨縣開國伯髙昌王太尉公上黨王天穆為大都督東北道諸軍事率都督宗正珍孫奚毅賀㧞勝尒朱陽都等討任褒帝以宼難未夷避正殿責躬徹膳又班募格收集忠勇其有直言正諌之士敢決徇義之夫陳國家利害之謀赴君親危難之節者集華林園面諭事幽州平北府主簿河間邢杲率河北流民十餘萬戸反於青州之北海自署漢王號年天統戊申以征東将軍金紫光禄大夫李叔仁為車騎大将軍儀同三司率衆討之詔直寝紀業持節募新免牧戸有投名効力者授九品官己酉詔諸有私馬仗從戎者職人優兩大階亦授實官白民出身外優兩階亦授實官若武藝超倫者雖無私馬亦依前條雖不超倫但射槊翹關一藝而膽略有施者依第出身外特優一大階授實官若無姓第者從八品出身階依前加特授實官辛亥詔曰朕當親御六戎埽静燕代大将軍太原王尒朱榮率精甲十萬為左軍上黨王天穆總衆八萬為前軍司徒公楊椿勒兵十萬為右軍司空公穆紹統卒八萬為後軍是夜葛榮衆退屯相州之北秋七月丁巳詔從四品以上從征者不得優階正四品者優一階軍級從三品以上從征四品者優一大階正五品以下還依前格若有征階十餘計入四品三品限授五階己未詔前試守東郡太守唐景宣為持節都督於東郡召募僑居流民二千人渡河随便為栅凖望臺軍是月齊獻武王於鄴西北慰喻葛榮别帥稱王者七人衆萬餘降之乙丑加大将軍爾朱榮柱國大将軍録尚書事辛巳尚書奏㫁百官公給衣冠劔佩綬舄壬子光州人劉舉聚衆數千反於濮陽自稱皇武大将軍是月髙平鎮人万俟醜奴僣稱大位署置百官是月臨淮王彧自江南還朝八月太山太守羊偘據郡引蕭衍將軍王僧辯攻兗州甲辰詔大都督宗正珍孫率南廣州刺史都督鄭先護討劉舉於濮陽破平之以侍中驃騎大将軍臨淮王彧為儀同三司是月葛榮率衆圍相州九月己丑詔太尉公上黨王天穆討葛榮次於朝歌之南己巳以征東将軍齊州刺史元欣為沛郡王壬申柱國大将軍尒朱榮率騎七千討葛榮於滏口破擒之餘衆悉降冀定滄瀛殷五州平乙亥以平葛榮大赦天下改為永安元年辛巳以柱國大將軍太原王尒朱榮為大丞相都督河北畿外諸軍事以榮子平昌郡開國公文殊昌樂郡公文暢並進爵為王以司徒公楊椿為太保城陽王徽為司徒冬十月丁亥尒朱榮檻送葛榮於京師帝臨閶闔門榮稽顙謝罪斬於都市丙申以撫軍将軍太常卿太原王世子菩提為使持節驃騎大将軍開府儀同三司丁酉以冀州之長樂相州之南趙定州之博陵滄州之浮陽平州之遼西燕州之上谷幽州之漁陽七郡各萬戸増封太原王尒朱榮為太原國戊戍又加榮太師庚戍以侍中鎮南將軍太原郡開國公于暉兼尚書左僕射為行臺與齊獻武王討羊偘壬子太師江陽王繼薨癸丑以膠東縣開國侯李偘希復其祖爵南郡王是月車騎大將軍儀同三司李叔仁討邢杲於濰水失利而還大都督費穆大破蕭衍軍擒其将曹義宗檻送京師蕭衍以北海王顥為魏王號年孝基入據南兗之銍城十有一月戊午以無上王世子韶為彭城王陳留王子寛為陳留王寛弟剛為浮陽王剛弟質為林慮王癸亥齊獻武王行臺于暉與徐兗行臺崔孝芬大都督刁宣大破羊偘於瑕丘偘奔蕭衍兗州平戊寅以上黨王天穆為大将軍開府世襲并州刺史封前將軍太中大夫元凝為東安王十有二月庚子詔行臺于暉回師討邢杲次於歴下是嵗葛榮餘黨韓樓復據幽州反二年春正月甲寅于暉所部都督彭樂率二千餘騎北走於韓樓乃班師二月癸未朔詔諸禁衛之官從戎有功及傷夷者赴選先敘甲午尊皇考為文穆皇帝廟號肅祖皇妣為文穆皇后燕州民王慶祖聚衆於上黨自稱為王柱國大将軍尒朱榮討擒之壬寅詔散騎常侍濟隂王暉業兼行臺尚書督都督李徳龍丘大千鎮梁國三月壬戍詔大將軍上黨王天穆與齊獻武王討邢杲夏四月癸未遷肅祖文穆皇帝及文穆皇后神主于太廟内外百寮普汎加一級曲赦畿内死罪至流人減一等徒刑以下悉免庚子詔太原王尒朱榮下将士並汎加二級辛丑上黨王天穆齊獻武王大破邢杲於齊州之濟南杲降送京師斬於都市元顥攻䧟考城執行臺元暉業都督丘大千五月壬子朔元顥克梁國丁巳以撫軍将軍前徐州刺史楊昱為使持節鎮東将軍東南道大都督率衆鎮榮陽尚書僕射尒朱世隆鎮虎牢侍中尒朱世承鎮崿岅辛酉詔私馬仗從戎優階授官壬戍又詔募士一依征葛榮甲子又詔職人及民出馬優階各有差乙丑内外戒嚴癸酉元顥䧟滎陽執楊昱􅈛朱世隆棄虎牢遁還甲戍車駕北廵乙亥幸河内丙子元顥入洛丁丑進封城陽縣開國公元祉為平原王安昌縣開國侯元鷙為華山王並加儀同三司戊寅行臺崔孝芬大都督刁宣破元顥後軍都督侯暄於梁國斬之擒其卒三千人以侍中車騎将軍尚書右僕射尒朱世隆為使持節行臺僕射本将軍相州刺史鎮鄴城以便宜從事又詔上黨百年以下九十以上板三品郡八十以上四品郡七十以上五品郡太原王尒朱榮會車駕於長子即日反斾上黨王天穆北渡會車駕於河内六月己丑儀同三司費穆為顥所害壬寅克河内斬太守元襲都督宗正珍孫秋七月戊辰都督尒朱兆賀㧞勝從硤石夜濟破顥子冠受及安豐王延明軍元顥敗走庚午車駕入居華林園昇大夏門大赦天下以使持節車騎将軍都督頴川郡開國公尒朱兆為車騎大将軍儀同三司詔以前朝勲書多竊冒宜一切焚棄之若立效灼然為時所知者别加科賞蕃客及邉首翻城降有勲未敘者不在焚斷之限北來軍士及隨駕文武諸立義加汎五級河北執事之官二級河南立義及迎駕之官并中途扈從亦二級壬申以柱國大将軍太原王尒朱榮為天柱大将軍加前後部羽葆鼓吹癸酉臨潁縣卒江豐斬元顥傳首京師甲戍以大将軍上黨王天穆為太宰司徒公城陽王徽為大司馬太尉公乙亥宴勞天柱大将軍尒朱榮上黨王天穆及北來督将於都亭出宫人三百繒錦雜綵數萬匹班賜有差又諸州郡遣使奉表行宫者並加一大階丁丑獲元顥弟瑱斬於都市詔受元顥爵賞階級悉追奪之己夘以鎮東将軍南青州刺史元旭為襄城王平南将軍南兗州刺史元暹為汝陽王閏月辛巳帝始居宫内辛夘以車騎将軍兼吏部尚書楊津為司空巴州刺史嚴始欣據州南叛蕭衍遣其将蕭玩張鴻江茂逹等率衆赴援八月庚戍朔詔諸有公私債負一錢以上巨萬以還悉皆禁斷不得徴責己未以侍中太𫝊李延寔為司徒公丁夘封𤓰州刺史元太榮為東陽王甲戍侍中太保楊椿致仕乙亥詔車騎将軍右光禄大夫奚毅板授天柱大将軍尒朱榮太宰天穆下勲及祖父叔伯耆年者牧守有差九月大都督侯淵討韓樓於薊破斬之幽州平万俟醜奴攻東秦城䧟之殺刺史髙子朗冬十月丁丑以前司空公丹陽王蕭賛為司徒公十有一月己夘就徳興自營州遣使請降丁亥詔羣官休停在外者皆令赴闕程㑹有差丙午以大司馬太尉公城陽王徽為太保司徒公丹陽王蕭替為太尉公開府儀同三司雍州刺史長孫稚為司徒公十有二月辛亥蕭衍兗州刺史張景邕荆州刺史李靈起雄信将軍蕭進明來降三年春正月己丑益州刺史長孫壽梁州刺史元雋等遣将與征巴州都督元景夏討嚴始欣斬之蕭衍都督蕭玩何難尉陳愁敗走斬玩首俘獲萬餘人辛丑東徐州城民呂文欣王赦等殺刺史元太賔據城反以撫軍将軍都官尚書樊子鵠兼右僕射為行臺督征南將軍都督賈顯智征東将軍徐州刺史嚴思達以討之二月甲寅克之東徐平三月醜奴大行臺尉遲菩薩宼岐州大都督賀㧞岳可朱渾道元大破之夏四月丁巳以侍中太尉公丹陽王蕭贊為使持節都督齊濟兗三州諸軍事驃騎大将軍開府儀同三司齊州刺史丁夘雍州刺史尒朱天光討醜奴蕭寳夤於安定破擒之囚送京師甲戍以關中平大赦天下醜奴斬於都市寳夤賜死於駞牛署六月戊午詔胡民親屬受爵於朝者黜附編民嚈噠國獻師子一是月白馬龍涸胡王慶雲僭稱大位於永洛城署置百官秋七月丙子天光平永洛城擒慶雲坑其城民一萬七千癸巳蕭衍民革虬卜湯世率堡聚内附庚子車騎大将軍儀同三司李叔仁坐事除名為民九月辛夘天柱大将軍尒朱榮上黨王天穆自晉陽來朝戊戌帝殺榮天穆於明光殿及榮子儀同三司菩提乃昇閶闔門詔曰蓋天道忌盈人倫嫉惡疎而不漏刑之無捨是以呂霍之門禍譴所伏梁董之家咎徴斯在頃孝昌之末天歩孔艱女主亂政監國無主􅈛朱榮爰自晉陽同憂王室義旗之建大會盟津與世樂推共成鴻業論其始圖非無勞效但致逺恐泥終之實難曾未崇朝豺聲已露河隂之役安忍無親王公卿士一朝塗地宗戚靡遺内外俱盡假弄天威殆危神器時事倉卒未遑問罪尋以葛賊横行馬首南向捨過責成用平醜虜及元顥問鼎大駕北廵復致勤王展力行所以此論功且可補過既位極宰衡地踰齊魯容飬之至豈復是過但心如猛火山林無以供其暴意等漏巵江河無以充其溢既見金革稍寜方隅漸泰不推天功專為己力與奪任情臧否肆意無君之跡日月以甚㧞髪數罪盖不足稱斬竹書愆豈云能盡方復托名朝宗隂圖釁逆睥睨天居窺覦聖厯乃有裂冠毁冕之心将為㧞本塞源之事天既厭亂人亦悔禍同惡之臣宻來投告将而必誅罪無容捨又元天穆宗室末屬名望素㣲遭逢際㑹頗參義舉不能竭其忠誠以奉家國乃復棄本逐末背同即異為之謀主成彼禍心是而可忍孰不可恕並以伏辜自貽伊慼元惡既除人神慶泰便可大赦天下遣武衛将軍奚毅前燕州刺史崔淵率兵鎮北中是夜僕射爾朱世隆榮妻郷郡長公主率榮部曲焚西陽門出屯河隂己亥攻河橋擒毅等於途害之據北中城南逼京邑詔以驃騎大將軍雍州刺史廣宗郡開國公尒朱天光為侍中儀同三司以侍中司空公楊津為使持節督并肆燕恒雲朔顯汾蔚九州諸軍事驃騎大将軍并州刺史兼尚書令北道大行臺經略并肆庚子詔諸舊代人赴華林園帝将親簡敘以撫軍将軍金紫光禄大夫髙乾邕為侍中河北大使招集驍勇冬十月癸夘朔封安南将軍大鴻臚卿元寳炬為南陽王大宗正卿汝陽縣開國公元修為平陽王通直散騎常侍龍驤将軍新陽縣開國伯元誕為昌樂王復通直散騎常侍琅邪縣開國公李叔仁官爵仍為使持節大都督以討世隆甲辰以魏郡王諶徙封趙郡王諶弟子趙郡王寘改封平昌王儀同三司李虔薨丁未班募攻河橋格賞帛授官各有差戊申皇子生大赦天下文武百寮汎二級以平南将軍中書令魏蘭根兼尚書左僕射為河北行臺定相殷三州禀蘭根節度乙夘通直散騎常侍假平西将軍都督李苖以火舩焚河橋尒朱世隆退走丙辰詔大都督兼尚書僕射行臺源子恭率步騎一萬出自西道行臺楊昱領都督李偘希等部募勇士八千往從東路防守之子恭仍鎮太行丹谷世隆至建州刺史陸希質拒守城䧟盡屠之唯希質獲免以中軍将軍前東荆州刺史元顯恭為使持節都督晉建南汾三州諸軍事鎮西将軍晉州刺史兼尚書左僕射為征西道行臺節度都督薛善樂薛修義裴元雋薛崇禮薛憘族等丁夘詔以世隆北叛河内固守其在城督将文武普加二級兵士給復三年壬申尒朱世隆停建興之髙都尒朱兆自晉陽來㑹之共推太原太守行并州刺史長廣王曄為主大赦所部號年建明普汎四級徐州刺史爾朱仲逺反率衆向京師十有一月癸酉朔詔車騎将軍左衛将軍鄭先護為使持節大将軍大都督與都督李偘希赴行臺楊昱以討之乙亥以使持節兼尚書令西道大行臺司徒公長孫稚為太尉公侍中尚書令驃騎大将軍開府儀同三司臨淮王彧為司徒公丙子以驃騎大将軍儀同三司雍州刺史廣宗郡開國公尒朱天光開府進爵為王丁丑尒朱仲逺䧟西兗州執刺史王衍癸未以右衛将軍賀拔勝為東征都督壬辰又以左衛将軍大都督鄭先護兼尚書左僕射為行臺與勝並討仲逺戊戍詔罷魏蘭根行臺以後将軍定州刺史薛曇尚為使持節兼尚書為北道行臺隨機召發行豫州刺史元崇禮殺後行州事隂導和擅攝豫州庚子賀拔勝與仲逺戰於滑臺東失利仍奔之十有二月壬寅朔尒朱兆宼丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆大都督源子恭奔退甲辰尒朱兆尒朱度律自富平津上率騎渉渡以襲京城事出倉卒禁衛不守帝出雲龍門兆逼帝幸永寜佛寺殺皇子并殺司徒公臨淮王彧左僕射范陽王誨戊申元曄大赦天下爾朱度律自鎮京師甲寅尒朱兆遷帝於晉陽甲子崩於城内三級佛寺時年二十四并害陳留王寛是月河西人紇豆陵歩蕃破落韓常大敗尒朱兆於秀容齊州城人趙洛周據西城反應尒朱兆刺史丹陽王蕭贊棄城走南陽太守趙脩延執荆州刺史李琰之自行州事中興二年諡為武懐皇帝太昌元年又諡孝莊皇帝廟號敬宗十一月葬於静陵史臣曰魏自孝昌之末天下淆然外侮内亂神器固将無主莊帝潜思變化招納勤王雖時事孔棘而卒有四海猾逆既翦權強擅命抑是兆謀運智之秋勞謙夕惕之日也未聞長轡之筴遽深負刺之恐謀謨罕術授任乖方猜嫌行戮禍不旋踵嗚呼胡醜之為釁也豈周衰晉末而已哉至於髙祖不祀武宣享廟三后降鑒福禄固不永矣魏書卷十魏書卷十考證孝莊帝紀以髙昌王世子光為平西将軍𤓰州刺史襲爵泰臨縣開國伯泰監本訛作秦今从本傳改正魏書卷十考證
