body:
  text: 魏書卷九十六齊魏收撰列傳第八十四僣晉司馬叡賨李雄僣晉司馬叡字景文晋將牛金子也初晋宣帝生大将軍琅邪武王伷伷生冗從僕射琅邪恭王覲覲妃譙國夏侯氏字銅環與金姦通遂生叡因冒姓司馬仍為覲子由是自言河内温人初為王世子又襲爵拜散騎常侍頻遷射聲越騎校尉左右軍将軍從晋恵帝幸臨漳其叔繇為成都王潁所殺叡懼禍遂走至洛迎其母俱歸陳國東海王越收兵下邳假叡輔國将軍越謀迎恵帝於長安復假叡平東将軍監徐州諸軍事使鎮下邳尋加安東将軍都督揚州諸軍事假節當鎮夀陽且留下邳及越西迎恵帝留叡鎮後平東府事當遷鎮江東屬陳敏作亂叡以兵少因留下邳永嘉元年春敏死秋叡始到建業五年進鎮東将軍開府儀同三司又以㑹稽戸二萬増封加督揚江湘交廣五州諸軍事六月王彌劉曜宼洛陽懐帝幸平陽晋司空荀蕃司隷校尉荀組推叡為盟主於是輙改易郡縣假置名號江州刺史華軼北中郎将裴憲並不從之憲自稱鎮東将軍都督江北五郡軍事與軼連和叡遣左将軍王敦将軍甘卓周訪等擊軼斬之憲奔于石勒六年叡檄四方稱與穆帝俱討劉淵大㑹平陽建興元年晋愍帝以叡為侍中左丞相大都督陜東諸軍事持節王如故叡改建業為建康七月叡以晋室将滅潜有他志乃自大赦為大都督都督中外諸軍事又為丞相叡號令不行政刑滛虐殺督運令史淳于伯行刑者以刀拭柱血流上柱二丈三尺俓頭流下四尺五寸其直如弦時人怨之平文帝初叡自稱晋王改元建武立宗廟社稷置百官立子紹為太子叡以晋王而祀南郊其年叡僣即大位改為大興元年其朝廷之儀都邑之制皆凖模王者擬議中國遂都於丹陽因孫權之舊所即禹貢揚州之地去洛二千七百里地多山水陽鳥攸居厥土為塗泥厥田惟下下所謂島夷卉服者也周禮職方氏掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害東南曰揚州其山鎮曰㑹稽其藪澤曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻春秋時為吳越之地吳越僭號稱王僻逺一隅不聞華土楚申公巫臣竊妻以奔教其軍陣然後乃知戰伐由是晚與中國交通俗氣輕急不識禮教盛飾子女以招逰客此其土風也戰國時則并於椘故地逺恃險世亂則先叛世治則後服秦末項羽起江南故衡山王吳芮從百越之兵越王無諸身率閩中之衆以從滅秦漢初封芮為長沙王無諸為閩越王又封吳王濞於朱方逆亂相尋亟見夷滅漢末大亂孫權遂與劉備分據吳蜀權阻長江殆天地所以限内外也叡因擾亂跨而有之中原冠帶呼江東之人皆為貉子若狐貉類云巴蜀蠻獠谿俚椘越鳥聲禽呼言語不同猴虵魚鼈嗜慾皆異江山遼闊将數千里叡羈縻而已未能制服其民有水田少陸種以罟網為業機巧趨利恩義寡薄家無藏蓄常守飢寒地既暑濕多有腫泄之病瘴氣毒霧射工沙蝨虵虺之害無所不有叡割有揚荆梁三州之土因其故地分置十數州及諸郡縣郡縣户口至有不滿百者遣使韓暢浮海來請通和平文皇帝以其僣立江表拒不納之是時叡大将軍王敦宗族擅勢權重於叡迭為上下了無君臣之分叡侍中劉隗言於叡曰王氏彊大宜漸抑損敦聞而惡之恵帝時叡改年曰永昌王敦先鎮武昌乃表於叡曰劉隗前在門下遂秉權寵今趣進軍指討姦孽宜速斬隗首以謝逺近朝梟隗首諸軍夕退昔太甲不能遵明湯典顛覆厥度幸納伊尹之訓殷道復昌賢智故有先失後得者矣敦又移告州郡以沈充為大都督䕶東吳諸軍叡乃下書曰王敦恃寵敢肆狂逆方朕於太甲欲見囚于桐宫是可忍也孰不可忍也今當親帥六軍以誅大逆叡光禄勲王含率其子瑜以輕舟棄叡歸于武昌叡以其司空王導為前鋒大都督尚書陸曄為軍司以廣州刺史陶侃為江州梁州刺史甘卓為荆州使其率衆掎躡敦後以太子右率周莚率中軍三千人討沈充敦至洌州表尚書令刁協黨附宜加誅戮叡遣右将軍周札戍于石頭札潛與敦書許軍至為應敦使司馬楊㓪等入于石頭札見敦㓪等既據石頭叡征西将軍戴淵鎮北将軍劉隗率衆攻之戴淵親率士鼓衆陵城俄而鼓止息㓪等乘之叡軍敗績隗協入見叡叡遣其避禍二人泣而出隗還淮隂後奔石勒協奔江乘為敦追兵所害叡師敗敦自為丞相武昌郡公邑萬户朝事大小皆關諮之敦收戴淵及叡尚書左僕射周顗並斬于石頭皆叡朝之望也於是改易百官及諸州鎮其餘轉徙黜免者過百數或朝行暮改或百日半年敦所寵沈充錢鳯等所言必用所譛必死敦将還武昌其長史謝鯤曰公不朝懼天下私議敦曰君能保無變乎對曰鯤近入覲主上側席待公遲得相見宫省穆然必無不虞之慮公若入朝鯤請侍從敦曰正復殺君等數百何損朝廷遂不朝而去敦召安南将軍甘卓轉譙王承為軍司並不從敦遣從母弟南蠻校尉魏乂率江夏太守李恒攻承於臨湘旬日城䧟執承送于武昌敦從弟王廙使賊迎之害于車中先是王敦表䟽言㫖不遜叡以示承曰敦言如此豈有厭哉對曰陛下不早裁之難将作矣敦惡之襄陽太守周慮襲殺甘卓叡畏廹於敦居常憂慼發病而死子紹僣立改年曰太寧王敦将篡諷紹徴已乃為書曰孤子紹頓首天下事大紹以眇身弗克負荷哀憂孔疚如臨于谷實賴家宰以濟艱難公邁徳樹勲遐邇歸懐任社稷之託居總已之統然道里長逺江川阻深動有介石之機而回旋之間固以有所喪矣謂公宜入輔朝政得旦夕詶諮朝士亦僉以為然以公髙亮忠肅至心憂國茍其宜然便當以至公處之期於静國寧民要之括囊無咎伏想闇同此志願便速剋近期以副翹企之懐紹恭憚於敦若此復使兼太常應詹拜敦丞相武昌郡公奏事不名入朝不趨劒履上殿敦於是屯於蕪湖敦乃轉王導為司徒自領揚州刺史以兄含子應為武衛将軍以自副貳敦無子養應為後敦疾踰年故召含還欲屬以後事是時敦令紹宿衞之兵三番休二紹密欲襲敦微行察敦營壘及敦疾紹屢遣大臣訊問起居遷含驃騎大将軍儀同三司敦疾甚紹召其司徒王導中書監庾亮丹陽尹温嶠尚書卞壼密謀討之導嶠及右将軍卞敦共據石頭光禄勲應詹都督朱雀桁南諸軍事尚書令郗鑒都督從駕諸軍事紹出次于中堂敦聞兵起怒欲自将困不能坐召其黨錢鳯鄧岳周撫等率衆三萬指造建業含謂敦曰此事吾便當行於是以含為元帥鳯等問敦曰事剋之日天子云何敦曰尚未南郊何為天子便盡卿兵勢唯保護東海王及裴妃而已初紹謂敦已死故敢發兵及下詔數日敦猶能與王導書後自手筆曰太真别来㡬日作如此事太真温嶠字也紹朝見之咸共駭懼含等兵至温嶠輙燒朱雀桁以挫其鋒紹使中軍司馬曹渾左衛參軍陳嵩段匹磾弟秃率壮士千人逆含等戰于江寧斬其前鋒将何康殺數百人敦聞康死軍不獲濟怒曰我兄老婢耳門户衰微羣從中才兼文武者皆早死今年事去矣語參軍吕寳曰我當力行因作勢而起困乏乃復卧使術士郭璞筮之卦成對曰不能佳敦既疑璞勸亮嶠等舉事又聞卦惡於是殺璞敦疾轉困語其舅羊鑒及子應曰我亡後應便即位先立朝廷百官然後營葬初敦敗叡之後夢白犬自天而下噬之及疾甚見刁協甘卓為􅑂遂死王應祕不發喪裹屍以席埋於齋中與其将諸葛瑶等縱酒滛逸沈充将萬餘人来㑹含等充臨行顧謂其妻曰男兒不建豹尾不能歸也紹平西軍祖約率衆至于淮南逐敦所置淮南太守任台紹将劉遐蘇峻濟自滿洲含相率渡兵應詹逆擊大破之周撫斬錢鳯沈充将吳儒斬充紹遣御史劉彛發敦瘞斬屍梟首朱雀桁紹死子衍僣立號年曰咸和衍歴陽太守蘇峻不順於衍衍䕶軍庾亮曰蘇峻豺狼終為禍亂晁錯所謂削之亦反不削亦反削之反速而禍小不削反遲而禍大乃以大司農徴之令峻弟逸領峻部曲徴書至峻怒曰庾亮專擅欲誘殺我也阜陵令匡術樂安人任讓並為峻謀主勸峻誅亮乃使使推崇祖約共討亮約大喜於是約命兄逖子沛國内史渙女壻淮南太守許栁将兵㑹峻峻使其黨韓光光名犯恭宗廟諱入姑孰殺于湖令陶馥殘掠而還衍假庾亮節為征討都督使其右衛将軍趙𦙍左将軍司馬流率衆次于慈湖韓光晨襲流殺之衍以其驍騎将軍鍾雅為前鋒監軍假節率舟軍拒峻宣城内史桓彛統吏士次于蕪湖韓光敗之大掠宣城諸縣而還江州刺史温嶠使督䕶王愆期西陽太守鄧岱鄱陽太守紀睦等以舟軍赴于建業愆期岱次直凟峻督衆二萬濟自横江登牛渚山愆期等邀擊不制峻至于蒋山衍假領軍卞壼節率諸将陳兵衍之将怯兵弱為峻所敗卞壼及其二子丹陽尹羊曼黄門侍郎周導廬江太守陶瞻散騎侍郎任台等皆死死者三千餘人庾亮兵敗與三弟奔于柴桑峻遂焚衍宫群賊突掠百寮奔散唯有米數石而已無以自供峻逼衍大赦庾亮兄弟不在赦限峻以祖約為太尉尚書令加侍中自為驃騎将軍領軍將軍録尚書事於是建業荒毁奔投吳㑹者十八九温嶠聞之移告征鎮州郡庾亮至盆口嶠分兵配給又招衍荆州刺史陶侃欲共討峻侃不從曰吾疆場外將本非顧命大臣今日之事所不敢當時侃子為峻所害嶠復喻侃曰蘇峻遂得志四海雖廣公寧有容足地乎賢子越騎酷沒天下為公痛心况慈父之情哉侃乃許之蘇峻屯於于湖衍母庾氏憂怖而死蘇峻聞兵起自姑孰還建業屯于石頭使其黨張瑾管商率衆拒諸軍逼遷衍於石頭衍哀泣升車宫人盡哭随從衍者莫不流涕峻以倉屋為宫使鄉人許方為司馬督将兵守衛陶侃庾亮温嶠率舟軍二萬至于石頭俄引還次于蔡州沙門浦庾亮守白石壘詰朝峻将萬餘人攻之亮等逆撃峻退吳國内史庾冰率三吳之衆驟戰不勝瑾商等破庾冰前軍於無錫焚掠肆意韓光攻宣城内史桓彛彛率吏民力戰不勝為光所殺祖約為潁川人陳光率其屬攻之約乃奔於歴陽長樂人賈寧勸峻殺王導盡誅諸大臣峻不從乃改計叛峻王導使袁耽潜誘納之謀奉衍出奔温嶠嶠食盡貸于陶侃侃怒曰使君前云不憂無士衆及糧食也唯欲得老民為主耳今比戰皆北良将安在今若無食民便欲西歸先是嶠慮侃不赴故以甘言招侃嶠乃卑辭謝之且曰今者騎虎之勢可得下乎賊垂滅願公留思侃怒少止其将李陽說曰今事若不㨗雖有粟焉得而食之公宜割見儲以卒大事乃以米五萬石供軍祖渙襲湓口欲以沮温嶠之兵渙過皖攻譙國内史桓雲不剋乃還蘇峻并兵攻大業大業水竭皆飲糞汁諸将謀救之慮不能當且欲水陸攻峻陶侃以舟師攻石頭温嶠庾亮陳于白石峻子碩以數十騎出戰峻見碩騎乃捨其衆自以四馬北下突陳陳堅乃還軍士彭世李千投之以矛峻墜馬遂梟首臠割之焚其骸骨任讓及諸賊帥復立峻弟逸求峻屍弗獲乃發衍父母冢剖棺焚屍匡術率其徒據苑城以降韓光蘇碩等率衆攻苑苑中飢榖石四萬諸将攻石頭蘇碩及章武王世子休率勁賊孔盧張偏等數十人撃李陽於柤浦退走碩等追之庾冰司馬滕含以鋭卒自後撃之碩逸等震潰奔于曲阿含入抱衍始得出奔温嶠之舟是時兵破之後宫室灰燼議欲遷移王導不從乃止衍改年咸康建國中衍死中書監庾氷廢衍子千齡立其弟岳改年曰建元初岳之立當改元庾冰立號而晋初已有改作又如之乃為建元頃之或告冰曰子作年號乃不視䜟也䜟曰建元之末丘山崩丘山岳也冰瞿然久而歎曰如有吉凶豈改易所能救乎遂不復改岳死庾冰欲立司馬昱驃騎将軍何充立岳子聃號年曰永和聃安西将軍桓温率所綂七千餘人伐蜀拜表輙行聃威力微弱不能控制也及石虎死聃征北将軍褚裒以舟軍至下邳西中郎將陳逵進據淮南石遵聞裒至下邳使其司空李農領萬餘騎逆圍督䕶王龕於薛執龕送于鄴又殺李邁龕裒之驍将三軍喪氣乃引還陳逵聞之震懼焚淮南而走桓温表廢聃揚州刺史殷浩聃憚温乃除其名温遂率所綂諸軍步騎四萬自郢越關中至灞上苻健與五千餘人守長安小城是嵗大儉温軍人懸磬健深溝堅壁清野待温温軍食盡乃退苻健遣子萇頻撃敗之初温次灞上其部将振武将軍順陽太守薛珍勸温徑進逼城温弗從珍以偏師獨濟頗有所獲温退珍乃還放言於衆且矜其鋭而咎温之持重温慙忿殺之聃又改年曰升平聃死無子立衍子丕號年隆和時謡曰升平不滿斗隆和那得久改為興寧又謡曰雖復改興寧亦自無聊生丕死弟奕立號年曰太和桓温率衆北討慕容暐至金鄉鑿鉅野三百餘里以通舟軍自清水入河慕容垂逆撃破之獲其資仗温之北引也先命西中郎将袁真及趙悦開石門而袁真等停於梁宋石門不通糧竭温自枋頭回軍垂以步騎數萬追及襄邑大敗温軍温遂歸罪袁真除名削爵收節傳真子雙之等殺梁國内史朱憲真據夀陽以叛真諸子兄弟阻兵自守招誘陸城戍将陳郡太守朱輔數千人遣參軍爨亮通慕容暐又遣使西降苻堅真病死輔立其嫡子瑾為使持節建威将軍豫州刺史瑾弟四五人皆領兵暐令陳文報爨亮且以觀變桓温遣督護竺瑶以軍泝淮伐瑾瑶次于肥口屢戰慕容暐假瑾征南将軍揚州刺史宣城公瑾弟泓等皆郡守四品将軍朱輔亦如之温乃伐瑾瑾等拒戰於是築長圍守之城中震潰遂平瑾初温任兼将相其不臣之心形于音氣曽卧對親寮撫枕而起曰為爾寂寂将為文景所笑衆莫敢對後􅊖衆北討冀成陵奪之勢及枋頭奔敗知民望之去已既平瑾問中書郎郗超曰足以雪枋頭之恥乎超曰此未厭有識之情也公六十之年敗於大舉不建不世之勲不足以鎮惬民望因説温以廢立之事温既宿有此謀深納超言温自廣陵將旋鎮姑孰至于白石乃言其主奕少同閹人之疾初在東海琅邪國親近嬖人相龍朱靈寳等並侍卧内而美人田氏孟氏遂生三男衆致疑惑然莫能審其虚實至是將建儲立王温因之以定廢立之計遂率百寮並還朝堂温率衆入屯兵宫門進坐殿庭使督護竺瑶散騎侍郎劉亨取奕璽綬奕著白袷單衣步下西堂登犢車羣臣拜辭皆殞涕侍御史將百餘人送出神虎門入東海第於是迎司馬昱而立之昱叡子也昱東向流涕拜受璽綬昱既僣立改年曰咸安以温依諸葛亮故事甲仗入殿進丞相其大司馬等皆如故留鎮建業以奕為海西縣公温常有大志昱心不自安謂中書郎郗超曰命之修短本所不計故當無復近日事邪超父愔為㑹稽太守超假還東昱謂之曰致意尊公家國之事遂至於此由吾不能以道匡衛思患豫防愧歎之深言何能喻又誦庾闡詩云志士痛朝危忠臣哀主辱因泣下昱疾與温書曰吾遂委篤足下便入冀得相見不謂疾患遂至於此今者惙然勢不復久且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼沖眇然非阿衡輔導之訓當何以寧濟也國事家計一託於公昱死子昌明僣立徐州小吏盧悚與其妖衆男女二百向晨攻廣莫門詐言海西公還由萬春雲龍門入殿畧取三廂及武庫甲仗時門下軍校並假兼在直吏士駭愕不知所為游撃將軍毛安之先入雲龍門討悚中領軍桓祕將軍殷康止車門入㑹兵攻之斬五十六級捕獲餘黨死者數百人前殿中監許龍與悚皆遣人至吳詐迎奕奕不從昌明改年曰寧康徴温入朝又詔温無拜尚書謝安等於新亭見温皆敬温拜昱墓得病還姑孰温自歸寢疾諷求備物九錫謝安已令吏部郎袁彦伯撰䇿文文成安輙勾㸃令更治改既屢引日乃謀於尚書僕射王彪之彪之云聞彼病日増亦當不復支久自可小遲回其事安從之温死苻堅遣苻雅率將王統朱彤楊安姚萇步騎五萬向駱谷伐昌明秦州刺史楊纂纂請救於梁州刺史楊亮亮遣參軍卜靖赴之敗走朱彤至梁州亮望風奔散於是堅遂有梁益二州昌明上下莫不憂怖建國三十九年昌明改年曰太元元年太祖七年苻堅大舉討昌明令其國曰東南平定指日當以司馬昌明為尚書僕射可速為起第堅前後擒張天錫等皆豫築甲宅至而居之堅至淮南大敗奔退是時昌明年長嗜酒好内而昌明弟㑹稽王道子任居宰相昏醟尤甚狎昵諂邪于時尼娼構扇内外風俗頽薄人無廉恥左僕射王珣兒婚門客車數百乗㑹聞王雅為太子少傅回以詣雅者半焉雅素有寵人情去就若此皇始元年昌明死子徳宗僣立初昌明耽於酒色末年殆為長夜之飲醒治既少外人罕得接見故多居内殿流連於樽俎之間以嬖姬張氏為貴人寵冠後宫威行閫内於時年㡬三十昌明妙列妓樂陪侍嬪少乃笑而戱之云汝以年當廢吾已屬諸妷少矣張氏潜怒昌明不覺而戱逾甚向夕昌明稍醉張氏乃多潜飲宦者内侍而分遣焉至暮昌明沉醉卧張氏遂令其婢䝉之以被既絶而懼貨左右云以魘死時道子昬廢子元顯專政遂不窮張氏之罪徳宗既立改年為隆安以道子為太傅揚州牧中書監加殊禮黄鉞羽葆鼔吹又増甲仗百人入殿既而内外衆事必先關於道子尚書僕射王國寳輕薄無行為道子所親權震建業擅取東宫兵以配已府道子以王緒為輔國將軍琅邪内史又輙并石頭之兵屯于建業緒猶領其從事中郎居中用事寵幸當政徳宗兗州刺史王恭惡國寳王緒之亂政也乃要荆州刺史殷仲堪剋期同舉王恭表徳宗曰國寳身負莫大之罪謹陳其狀前荆州刺史王悦國寳同産弟也受任西藩不幸致喪國寳求假奔彼遂不即路慮臺糾察懼於黜免乃毁冠改服變為婦人與婢同載入請相王又先帝暴崩莫不驚號而國寳靦然了無哀容方犯閤叩扉求行姦計欲詐為遺詔矯弄神器彰暴于外莫不聞知讒疾二昆過於讐敵樹立私黨遍於府朝兵食資儲歛為私積販官鬻爵威恣百城收聚不逞招集亡命輔國將軍王緒頑凶狂狡人理不齒同惡相成共竊名器自知禍惡已盈怨集人鬼規為大逆蕩覆天下昔趙鞅興晉陽之甲夷君側之惡臣雖駑劣敢忘斯義恭表至道子宻欲討恭以元顯為征虜將軍内外諸軍潜加嚴備而國寳惶懼不知所為乃遣數百人戍竹里夜遇風雨各散而歸緒勸國寳殺王珣然後南征北伐弗聴反問計於珣既而懼懾遂上表觧職尋復悔懼詐稱徳宗復其本官道子既不能拒恭等之兵亦欲因以委罪乃收國寳付廷尉殺之斬王緒於市以悦恭等司徒左長史王廞遭母喪居吳恭板行吳國内史廞乃徴發吳興諸郡兵國寳既死王恭使廞反於喪廞謂因縁事際可大得志乃據吳郡遣子弟率衆撃恭以女為真烈將軍亦置官屬領兵自衛恭遣司馬劉牢之討平之徳宗譙王尚之兄弟復説道子以為藩伯彊盛宰相權弱宜密樹置以自藩衛道子然之分遣腹心跨據形要由是内外騷動王恭深慮禍難復密要殷仲堪西中郎將庾楷廣州刺史桓𤣥同㑹建業𤣥等響應恭抗表傳檄以江州刺史王愉司馬尚之為事端仲堪遣龍􅋮將軍南郡相楊佺期舟師五千發江陵桓𤣥借兵於仲堪亦給五千人於是徳宗戒嚴加道子黄鉞遣右將軍謝琰拒恭等元顯為征討都督衆軍繼進前軍王珣領中軍府衆次于北郊以尚之為豫州刺史率弟恢之允之西討楷等皆執白虎幡居前王恭遣劉牢之為前鋒次于竹里初道子之謀恭也啗牢之以重賞牢之斬恭别帥顔延延弟彊送二級於謝琰琰與牢之俱進襲恭恭奔于曲阿為湖浦尉所執送建業尚之與庾楷子鴻戰于牛渚斬鴻前鋒將殷萬鴻遁還歴陽尚之猶不敢濟桓𤣥佺期奄至横江尚之等退恢之所領外軍皆沒𤣥等徑造石頭仲堪繼在蕪湖建業震駭道子殺恭於倪塘桓𤣥等於是走還尋陽是年冬徳宗遣使朝貢并乞師請討姚興二年夏徳宗又遣使朝貢以元顯為揚州刺史道子有疾元顯懼已弗得襲位故矯以自授而道子弗知既瘳乃大怒以元顯已拜故弗復改於是内外政事一决元顯道子少而耽酒治日甚希至是無事俾晝作夜時謂道子為東録元顯為西録西府千兩輻凑東第門設雀羅矣元顯年少頓居權重憍奢滛暴於是逺近譏之初徳宗新安太守孫泰以左道惑衆被戮其兄子㤙竄于海嶼妖黨從之至是轉衆攻上虞殺縣令衆百許人徑向山隂會稽内史王凝之事五斗米道㤙之来也弗先遣軍乃稽顙于道室跪而呪説指麾空中若有處分者官屬勸其討㤙凝之曰我已請大道出兵凡諸津要各有數萬人矣㤙漸近乃聴遣軍比兵出㤙已至矣戰敗凝之奔走再宿執之旬日㤙衆數萬自號平東將軍逼人士為官屬於是諸郡妖惑並殺守令而應之衆皆雲集吳國内史桓謙出奔吳興太守謝邈被害自徳宗以来内外乖貳石頭之外皆專之於荆江自江以西則受命於豫州京口暨于江北皆兗州刺史劉牢之等所制徳宗政令所行唯三吳而已㤙既作亂八郡盡為賊場及丹陽諸縣處處蜂起建業轉成蹙弱且妖惑之徒多潜都邑人情危懼恒慮大兵竊發於是衆軍戒嚴劉牢之共衛將軍謝琰討之賊等禁令不行肆意殺戮士庶死者不可勝計或醢諸縣令以食其妻子不肯者輙支觧之其虐如此驃騎長史王平之死未葬㤙剖棺焚屍以其頭為穢器牢之率軍討破之琰將至吳興賊徒遁走驅逼士庶奔于山隂諸妖亂之家婦女尤甚未得去者皆盛飾嬰兒投之于水而告之曰賀汝先登仙堂我尋復就汝也賊既走散邑屋焚毁郛郭之中時見人跡經月乃漸有歸者謝琰留屯烏程遣其將髙素助牢之牢之率衆軍濟江初孫恩聞八郡響應也告諸官屬曰天下無復事矣當與諸君朝服而至建業既聞牢之臨江復曰我割據浙江不失作勾踐也尋知牢之已濟乃曰孤不恥走於是乃走縁道多遺珍寳牢之將士爭取之不得窮追恩復入於海初三吳困於虐亂皆企望牢之髙素等既至放肆抄暴百姓咸怨毒失望焉孫㤙在海妖衆轉復從之既破永嘉臨海復入山隂謝琰戰殁於是建業大震遣冠軍將軍東海太守桓不才輔國將軍孫無終廣陵相髙雅之等東討㤙吳興太守庾恒慮妖黨復發大行誅戮殺男女數千人孫㤙復破高雅之於餘姚雅之走還山隂元顯自為後將軍開府儀同三司都督十六州本官悉如故封子彦章為東海王食吳興四萬餘户清選文學臣寮吏兵一同宗國孫恩浮海奄至京口戰士十萬劉牢之隔在山隂衆軍懼不敢旋㤙遂徑向建業徳宗惶駭遽召豫州刺史司馬尚之于時中外驚擾而元顯置酒髙㑹道子唯日祈于鍾山恩来漸近百姓忷懼尚之率精鋭馳至徑屯積弩堂恩時泝風不得疾行數日乃至白石恩本以諸軍分散欲掩不備知尚之尚在建業復聞牢之不還不敢上乃走向郁洲恩别帥盧循攻沒廣陵虜掠而去桓𤣥聞孫㤙之逼也乃建牙戒嚴表求征討時㤙去未逺𤣥表復至元顯等大懼急遣止𤣥庾楷密使自結於元顯説𤣥大失人情衆不為用若朝廷遣軍已當内應元顯得書大喜遣張法順謀于劉牢之牢之同許焉於是徴兵裝艦將謀西討徳宗改年曰元興以元顯為大都督討𤣥𤣥軍至元顯不戰而敗父子並為𤣥所殺後改年為大亨天興六年十月徳宗遣使朝京師徳宗封桓𤣥為楚王𤣥尋逼徳宗手詔禪位徳宗出居永安宫𤣥既受禪封徳宗為南康平固縣王居之尋陽天賜元年徳宗在姑孰二月至尋陽其彭城内史劉裕殺𤣥徐州刺史桓修與劉毅等舉兵討𤣥𤣥敗走尋陽擕徳宗兄弟至於江陵又走荆州荆州别駕王康産南郡相王騰之迎徳宗入南郡府桓𤣥死𤣥將桓振復襲江陵斬王康産及騰之將殺徳宗𤣥揚州刺史新安王桓謙苦禁之乃止時盧循執徳宗廣州刺史吳隠之自號平南將軍廣州刺史令其黨徐道覆據始興餘郡皆以親黨居之徳宗復僣立於江陵改年義熙尚書陶夔迎徳宗達于板橋大風暴起龍舟沉沒死者十餘人徳宗發江陵至尋陽其益州刺史毛璩參軍譙縱反攻涪城剋之遂以益州叛徳宗徳宗發姑孰還建業六月太祖遣軍攻徳宗鉅鹿太守賀申申舉城降永興二年盧循復起於嶺南殺徳宗江州刺史何無忌於石城咸欲以徳宗北走知循未下乃止裕令撫軍劉毅討循敗於桑落洲步走而還裕黨孟昶諸葛長民等勸裕擁徳宗過江裕不從神瑞二年徳宗遣廣武將軍𤣥文石齊朝貢太宗初劉裕征姚泓三年太宗遣長孫道生娥清破其將朱超石於石河擒騎將楊豐斬首千七百餘級三年徳宗死弟徳文僣立四年改年曰元熙五年徳文禪位於裕裕封徳文為零陵王徳文后河南褚氏兄季之弟淡之雖徳文姻戚而盡心於裕徳文每生男輙令方便殺焉或誘内人密加毒害前後非一及徳文被廢囚於秣陵宫常懼見禍與褚氏共止一室慮有鴆毒自煮食於前六年劉裕將殺之不欲遣人入内令淡之兄弟視褚氏褚氏出别宫於是兵乃踰垣而入進藥於徳文徳文不肯飲曰佛教自殺者不復人身乃以被掩殺之自叡之僣江南至於徳文之死君弱臣彊不相羈制賞罰號令皆出權寵危亡廢奪釁故相尋所謂夷狄之有君不若諸夏之亡也賨李雄字仲儁蓋廩君之苗裔也其先居於巴西宕渠秦并天下為黔中郡薄賦其民口出錢三十巴人謂賦為賨因為名焉後徙櫟陽祖慕魏東羌獵將慕有五子輔特庠流驤晉恵時關西擾亂頻嵗大饑特兄弟率流民數萬家就榖漢中遂入巴蜀時晉益州刺史趙廞反叛特兄弟起兵誅之晋拜特宣威將軍長樂鄉侯流奮威將軍武陽侯流民閻式等推特行鎮北大將軍承制封拜流行鎮東將軍後與晋益州刺史羅尚相攻昭帝七年特自稱大將軍大都督號年建初戰敗為尚所殺流代統兵事流字元通自號大都督大將軍流病將死以後事屬雄雄特少子也雄自稱大都督大將軍十年僣稱成都王號年建興置百官時涪陵人范長生頗有術數雄篤信之勸雄即真十二年僣稱皇帝號大成改年為晏平拜長生為天地太師領丞相西山王又改年為玉衡雄以中原喪亂乃頻遣使朝貢與穆帝請分天下雄捨其子而立兄盪第四子班為太子烈帝六年雄死班代統任雄子期殺班而自立期字世運雄第四子也改年為玉恒驤子壽自涪城襲剋成都廢期為卭都公期自殺夀字武考初為雄大將軍封建寧王以南中十二郡為建寧國至期徙封漢王既廢期自立改年為漢興又改號曰漢時建國元年也夀廣漢太守李乾與大臣謀欲廢夀夀懼令子廣與大臣盟於殿前夀聞鄴中殷實宫觀美麗石虎以殺罰御下控制邦域城鎮深用欣慕吏民有小過輙殺之以立威名又以郊甸未實城邑空虚工匠器械事用不足乃徙民三丁巳上於成都興尚方御府發州都工巧以充之廣修宫室引水入城務於奢侈百姓疲於使役民多嗟怨思亂者十室而九其尚書左僕射蔡興直言切諌夀以為謗訕誅之其臣龔壮作詩七首託言應璩以諷夀夀報曰省詩知意若今人所作賢哲之話言古人所作死鬼之常辭耳動慕漢武魏明政法恥聞父兄時事上書者不得言先世政化自以勝之也及夀疾病見李期蔡興為祟遂死子勢綂任勢字子仁既立改年為太和遣使朝貢又改為嘉寧勢弟漢王廣以勢無子請為太弟勢不許廣欲襲勢勢使其太保李奕擊廣於涪城剋之貶為臨卭侯廣尋自殺勢既驕吝荒於酒色至殺人而取其妻又納李奕女為后耽於滛樂不恤國事夷獠叛亂境土減削累年荒儉性多忌害誅殘大臣刑罰酷濫斥外父祖舊臣親任近習左右小人因行威福修飾室宇羣臣諌諍一無所納又常居内少見公卿史官屢陳災譴乃加相國董皎大都督以名位優之實望與分災眚建國十年司馬聃將桓温伐之勢降於温先是頻有怪異成都北鄉有人望見女子避入草中徃視見物如人有身形頭目無手足能動摇不能言廣漢馬生角各長寸半有馬駒一頭二身六耳無目二隂一牝一牡又有驢無皮毛飲食數日而死江南雨血地生毛江源又生草髙七八尺華葉皆赤子青如牛角涪陵民藥氏婦頭上生角長三寸凡三截之李漢家舂米米自臼中跳出斂舉箕中又跳出冩置簟中童謡曰江橋頭闕下市成都北門十八子又曰有客有客来侵門陌其氣欲索譙周云我死後三十年當有異人入蜀由之而亡蜀亡之嵗去周亡三十二年周又著讖曰廣漢城北有大賊曰流特攻難得嵗在𤣥宫自相剋卒如其言史臣曰司馬叡之竄江表竊魁帥之名無君長之實跼天蹐地畏首畏尾對之李雄各一方小盗其孫皓之不若矣魏書卷九十六魏書卷九十六考證司馬叡傳昌明改年曰寧康寧康各本訛康寧晋書孝武帝紀寧康元年春正月乙丑朔改元今改正魏書卷九十六考證
