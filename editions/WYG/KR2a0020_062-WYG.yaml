body:
  text: 魏書卷六十二齊魏收撰列傳第五十李彪高道悦李彪字道固頓丘衛國人高祖賜名焉家世寒微少孤貧有大志篤學不倦初受業於長樂監伯陽伯陽稱美之晚與漁陽高悦北平陽尼等將隱名於山不果而罷悦兄閭博學高才家富典籍彪遂於悦家手抄口誦不暇寢食既而還鄉里平原王叡年將弱冠雅有志業娶東徐州刺史博陵崔鑒女路由冀相聞彪名而詣之修師友之禮稱之於郡遂舉孝亷至京師館而受業焉高閭稱之于朝貴李沖禮之甚厚彪深宗附高祖初為中書教學博士後假員外散騎常侍建威將軍衛國子使於蕭賾遷祕書丞參著作事自成帝以來至于太和崔浩高允著述國書編年序録為春秋之體遺落時事三無一存彪與祕書令高祐始奏從遷固之體創為紀傳表志之目焉彪又表曰臣聞昔之哲王莫不亹亹孜孜思納讜言以康黎庶是以訪童問師不避淵澤詢謀諮善不棄芻蕘用能光茂實於竹素播徽聲於金石臣屬生有道遇無諱之朝敢脩往式竊揆時宜謹冒死上封事七條狂瞽之言伏待刑戮其一曰自太和建號踰于一紀典刑徳政可得而言也立圜丘以昭孝則百神不乏饗矣舉賢才以酬諮則多士盈朝矣開至誠以軌物則朝無侫人矣敦六順以教人則四門無凶人矣制冠服以明秩則典式復彰矣作雅樂以協人倫則人神交慶矣深慎罰以明刑則庶獄得𠂻矣薄服味以示約則儉徳光昭矣單宫女以配鰥則人無怨曠矣傾府藏以賑錫則大賚周渥矣省賦役以育人則編户巷歌矣宣徳澤以懐遠邇則華荒忭舞矣垂至徳以暢幽顯則禎瑞效質矣生生得所事事惟新巍巍乎猶造物之曲成也然臣愚以為行儉之道猶自闕何者今士人豪富之家習華既深敦樸情淺夫識儉素之易長而行奢靡之難久壯制第宅美飾車馬僕妾衣綾綺土木被文繡僭度違衷者衆矣古先哲王之為制也自天子以至公卿下及抱關擊柝其宫室車服各有差品小不得踰大賤不得踰貴夫然故上下序而人志定今時浮華相競情無常守大為消功之物巨制費力之事豈不謬哉消功者錦繡彫文是也費力者廣宅高宇壯制麗飾是也其妨男業害女工者焉可勝言哉漢文時賈誼上疏云今之王政可為長太息者六此即是其一也夫上之所好下必從之故越王好勇而士多輕死楚靈好瘠而國有飢人今二聖躬行儉素詔令殷勤而百姓之奢猶未革者豈楚越之人易變如彼大魏之士難化如此蓋朝制弗宣人未見徳使之然耳臣愚以為第宅車服自百官以至于庶人宜為其等制使貴不逼賤卑不僭高不可以稱其侈意用違經典今或者以為習俗日久不可卒革臣謹言古人革之之漸昔子産為政一年百姓歌之曰我有田疇子産伍之我有衣冠子産禇之孰殺子産吾其與之及三年乃改歌曰我有田疇子産殖之我有子弟子産誨之子産若死其誰繼之然則鄭人之智豈前昬而後明哉且從政者湏漸受化者難頓故也今若為制以差品之始末之情魏士與鄭人同矣既同鄭人是為卒有善歌豈可憚其初怨而不為終善哉夫尚儉者開福之源好奢者起貧之兆然則儉約易以教行華靡難以財滿是以聖人留意焉賢人希凖焉故夏禹卑宫室而惡衣服殷湯寢黄屋而乘輅輿此示儉於後王後王所宜觀其意而取折衷也孔子為魯司冦乘柴車而駕駑馬晏嬰為齊正卿冠濯冠而衣故裘此示儉於後臣後臣所宜識其情而消息之也前志云作法於涼其弊猶貪此言雖略有達治道臣之瞽言儻或可採比及三年可以有成有成則人務本人務本則奢費除奢費除則榖帛豐穀帛豐則人逸樂人逸樂則皇基固矣其二曰易稱主器者莫若長子傳曰太子奉冢嫡之粢盛然則祭亡主則宗廟無所饗冡嫡廢則神器無所傳聖賢知其如此故垂誥以為長世之法昔姬王得斯道也故恢崇儒術以訓世嫡世嫡於是乎習成懿徳用大協於黎蒸是以世統生人載祀八百逮嬴氏之君於秦也殆棄徳政坑焚儒典弗以義方教厥冡子於是習成凶徳肆虐以臨黔首是以饗年不永二世而亡亡之與興其道在於師傅師傅之損益可得而言益者周公傅成王教以孝仁禮義逐去邪人不使見惡人選天下之端士孝悌博聞有道術者以為衛翼衛翼良成王正周道之所以長久也損者趙高傅胡亥教以刑戮斬劓及夷人族逐去正人不得見善士諂侫䜛賊者為其左右左右邪胡亥僻秦祚之所以短促也夫皇天輔徳者也豈私周而踈秦哉由所行之道殊故禍福之途異耳昔光武議為太子置傅以問其羣臣羣臣望意皆言太子舅執金吾新陽侯隂就可博士張佚正色曰今立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才光武稱善曰置傅以正太子也今博士不難正朕况太子乎即拜佚為太子太傅漢明卒為賢主然則佚之傅漢明非廼生之漸也尚或有稱而況廼生訓之以正道其為益也固以大矣故禮曰太子生因舉以禮使士負之有司齊肅端冕見于南郊明冢嫡之重見乎天也過闕則下過廟則趨明孝敬之道也然古之太子自為赤子而教固以行矣此則遠世之鏡也高祖文成皇帝慨少時師不勤教嘗謂羣臣曰朕始學之日年尚幼沖情未能專既臨萬幾不遑温習今而思之豈唯予咎抑亦師傅之不勤尚書李訢免冠而謝此則近日之可鑒也伏惟太皇太后翼贊高宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬之躋及儲宫誕育復親撫誥日省月課實勞神慮今誠宜準古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈畜倉廩故堯湯水旱人無菜色者蓋由備之有漸積之有素暨于漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畝不實罪及牧守聖人之憂世重穀殷勤如彼明君之恤人勸農相切若此頃年山東饑去嵗京師儉内外人庶出入就豐既廢營産疲而乃達又於國體實有虚損若先多積榖安而給之豈有驅督老弱餬口千里之外以今況古誠可懼也臣以為宜析州郡常調九分之二京都度支嵗用之餘各立官司年豐糴積於倉時儉則加私之二糶之於人如此民必力田以買官絹又務貯財以取官粟年登則常積嵗凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃畝之數以贓贖雜物餘財市牛科給令其肆力一夫之田嵗責六十斛蠲其正課并征戍雜役行此二事數年之中則榖積而人足雖災不為害臣又聞前代明主皆務懐遠人禮賢引滯故漢髙過趙求樂毅之胄晉武廓定旌吳蜀之彦臣謂宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義二可以懐江漢歸有道之情其四曰昔帝舜命咎繇惟刑之恤周公誥成王勿誤于庶獄斯皆君臣相誡重刑之至也今二聖哀矜罪辜小大二情讞決之日多從降恕時不得已必垂惻隱雖前王之勤聽肆赦亦如斯而已至若行刑犯時愚臣竊所未安漢制舊斷獄報重常盡季冬至孝章時改盡十月以育三微後嵗旱論者以十月斷獄隂氣微陽氣泄以故致旱事下公卿尚書陳寵議冬至陽氣始萌故十一月有射干芸荔之應周以為春十二月陽氣上通雉雊雞乳殷以為春十三月陽氣已至蟄蟲皆震夏以為春三微成著以通三統三統之月斷獄流血是不稽天意也月令仲冬之月身欲寜事欲静以起隆怒不可謂寧以行大刑不可謂静章帝善其言卒以十月斷今京都及四方斷獄報重常竟季冬不推三正以育三微寛宥之情每過於昔遵時之憲猶或闕然豈所謂助陽發生垂奉微之仁也誠宜遠稽周典近採漢制天下斷獄起自初秋盡於孟冬不於三統之春行斬絞之刑如此則道協幽顯仁垂後昆矣其五曰古者大臣有坐不亷而廢者不謂之不亷乃曰簠簋不飾此君之所以禮貴臣不明言其過也臣有大譴則白冠㲠纓盤水加劔造室而請死此臣之所以知罪而不敢逃刑也聖朝賔遇大臣禮同古典自太和以降有負罪當陷大辟者多得歸第自盡遣之日深垂隱愍言發悽淚百官莫不見四海莫不聞誠足以感將死之心慰戚屬之情然恩發至𠂻未著永制此愚臣所以敢陳末見昔漢文時人有告丞相周勃謀反者逮繫長安獄頓辱之與皁𨽻同賈誼乃上書極陳君臣之義不宜如是夫貴臣者天子為其改容而體貌之吏人為其俯伏而敬貴之其有罪過廢之可也賜之死可也若束縛之輸之司冦榜笞之小吏詈罵之殆非所以令衆庶見也及將刑也臣則北面再拜跪而自裁天子曰子大夫自有過耳吾遇子有禮矣上不使人抑而刑之也孝文深納其言是後大臣有罪皆自殺不受刑至孝武時稍復入獄良由孝文行之當時不為永制故耳伏惟聖徳慈惠豈與漢文比隆哉今天下有道庶人不議之時臣安可陳瞽言於朝但恐萬世之後繼體之主有若漢武之事焉夫道貴長久所以樹之風聲也法尚不虧所以貽厥孫謀也焉得行恩當時而不著長世之制乎其六曰孝經稱父子之道天性書云孝乎惟孝友于兄弟二經之㫖蓋明一體而同氣可共而不可離者也及其有罪罪不相及者乃君上之厚恩也至若有懼懼應相連者固自然之恒理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色宴安榮位遊從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也昔秦伯以楚人圍江素服而示懼宋仲子以失舉桓譚免冠而謝罪然則子弟之於父兄父兄之於子弟惟其情至豈與結盟相知者同年語其深淺哉二聖清簡風俗孝慈是先臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦厲凡薄使人知有所恥矣其七曰禮云臣有大喪君三年不呼其門此聖人縁情制禮以終孝子之情者也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮于虐秦殆皆泯矣漢初軍旅屢興未能遵古至宣帝時民當從軍屯者遭大父母父母死未满三月皆弗徭役其朝臣喪制未有定聞至後漢元初中大臣有重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢而不行晉時鴻臚鄭黙喪親固請終服武帝感其孝誠遂著令以為常聖魏之初撥亂返正未遑建終喪之制今四方無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懷竊有未盡伏見朝臣丁父憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂緌同節慶之醼傷人子之道虧天地之經愚謂如有遭大父母父母喪者皆聽終服若無其人有曠庶官者則優㫖慰喻起令視事但綜司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆於禮事所宜行也如臣之言少有可採願付有司别為條制高祖覽而善之尋皆施行彪稍見禮遇加中壘將軍及文明太后崩羣臣請高祖公除高祖不許與彪往復語在禮志高祖詔曰歴觀古事求能非一或承藉微䕃著徳當時或見拔幽陋流名後葉故毛遂起賤奮抗楚之辯茍有才能何必拘族也彪雖宿非清第本闕華資然識性嚴聰學博墳籍剛辯之才頗堪時用兼憂吏若家載宣朝美若不賞庸叙績將何以勸奬勤能可特遷秘書令以酬厥款以參議律令之勤賜帛五百匹馬一匹牛二頭其年加員外散騎常侍使於蕭賾賾遣其主客郎劉繪接對并設讌樂彪辭樂及坐彪曰齊主既賜讌樂以勞行人向辭樂者卿或未相體自喪禮廢替於兹以久我皇孝性自天追慕罔極故有今者喪除之議去三月晦朝臣始除衰裳猶以素服從事裴謝在此固應具此我今辭樂想卿無怪繪答言辭樂之事向以不異請問魏朝喪禮竟何所依彪曰高宗三年孝文踰月今聖上追鞠育之深恩感慈訓之厚徳執於殷漢之間可謂得禮之變繪復問若欲遵古何為不終三年彪曰萬幾不可久曠故割至慕俯從羣議服變不異三年而限同一期可謂亡禮之禮繪言汰哉叔氏專以禮許人彪曰聖朝自為曠代之制何關許人繪言百官總已聽於冡宰萬幾何慮於曠彪曰我聞載籍五帝之臣臣不若君故君親攬其事三王君臣智等故共理機務五覇臣過於君故事决於下我朝官司皆五帝之臣主上親攬蓋逺軌軒唐彪將還賾親謂曰卿前使還日賦阮詩云但願長閑暇後嵗復來遊果如今日卿此還也復有來理否彪答曰使臣請重賦阮詩曰宴衍清都中一去永矣哉賾惘然曰清都可爾一去何事觀卿此言似成長濶朕當以殊禮相送賾遂親至琅邪城登山臨水命羣臣賦詩以送别其見重如此彪前後六度銜命南人竒其謇諤後車駕南征假彪冠軍將軍東道副將尋假征虜將軍車駕還京遷御史中尉領著作郎彪既為高祖所寵性又剛直遂多所劾糺逺近畏之豪右屏氣高祖常呼彪為李生於是從容謂羣臣曰吾之有李生猶漢之有汲黯汾州胡叛詔彪持節綏慰事寜還京除散騎常侍仍領御史中尉解著作事高祖宴羣臣於流化池謂僕射李沖曰崔光之博李彪之直是我國家得賢之基車駕南伐彪兼度支尚書與僕射李沖任城王等參理留臺事彪素性剛豪與沖等意議乖異遂形於聲色殊無降下之心自謂身為法官莫能糾劾己者遂多專恣沖積其前後罪過乃於尚書省禁止彪上表曰臣聞範國匡人光化昇治輿服典章理無暫失故晉文功建九合猶見抑於請隧季氏藉政三世尚受譏於璵璠固知名器之重不可以妄假先王既憲章於古陛下又經綸於今用能車服有叙禮物無墜案臣彪昔於凡品特以才㧞等望清華司文東觀綢繆恩眷繩直憲臺左加金璫右珥蟬冕闕東省宜感恩厲節忠以報徳而竊名忝職身為違傲矜勢高亢公行僭逸坐與禁省冒取官材輙駕乘黄無所憚懾肆志傲然愚聾視聽此而可忍誰不可懐臣輙集尚書以下令史以上并治書侍御史臣酈道元等於尚書都座以彪所犯罪狀告彪訊其虚實若或不知湏訊部下彪答臣言事見在目實如所劾皆彪所知何湏復召部下臣今請以見事免彪所居職付廷尉治獄沖又表曰臣與彪相識以來垂二十載彪始南使之時見其色厲辭辯才優學博臣之愚識謂是拔萃之一人及彪位宦升達參與言燕聞彪評章古今商略人物興言於侍筵之次啓論於衆英之中賞忠識正發言懇惻惟直是語辭無隱避雖復諸王之尊近侍之要至有是非多面抗折酷疾矯詐毒諐非違厲色正辭如鷹鸇之逐鳥雀懔懔然實似公清之操臣雖下才輙亦尚其梗槩欽其正直微識其褊急之性而不以為瑕及其初登憲臺始居司直首復騶唱之儀肇正直繩之體當時識者僉以為難而彪秉志信行不避豪勢其所彈劾應弦而倒赫赫之威振於下國肅肅之稱著自京師天下改目貪暴歛手臣時見其所行信謂言行相符忠清内發然時有私於臣云其威暴者臣以直䋲之官人所忌疾風謗之際易生音謡心不承信往年以河陽事曽與彪在領軍府共太尉司空及領軍諸卿等集閲廷尉所問囚徒時有人訴枉者二公及臣少欲聽採語理未盡彪便振怒東坐攘袂揮赫口稱賊奴叱吒左右髙聲大呼云南臺中取我木手去搭奴肋折雖有此言終竟不取即言南臺所問唯恐枉活終無枉死但可依此時諸人以所枉至重有首實者多又心難彪遂各嘿爾因縁此事臣遂心疑有濫審加情察知其威虐猶未體其採訪之由訊檢之狀商略而言酷急小罪肅禁為大㑹而言之猶謂益多損少故懷寢所疑不以申徹實失為臣知無不聞之義及去年大駕南行以來彪兼尚書日夕共事始乃知其言與行舛是己非人專恣無忌尊身忽物安以身作之過深劾他人己方事人好人佞已聽其言同振古忠恕之賢校其行是天下佞暴之賊臣與任城卑躬曲己若順弟之奉暴兄其所欲者事雖非理無不屈從依事求實悉有成驗如臣列得實宜殛彪於有北以除姦矯之亂政如臣無證宜投臣於四裔以息青蠅之白黒高祖在懸瓠覽表歎愕曰何意留京如此也有司處彪大辟高祖恕之除名而已彪尋歸本鄉高祖自懸瓠北幸鄴彪拜迎於鄴南高祖曰朕之期卿每以貞松為志嵗寒為心卿應報國盡身為用而近見彈文殊乖所以卿罹此䜛為朕與卿為宰事與卿為卿自取彪對曰臣愆由已至罪自身招實非陛下横與臣罪又非宰事無辜濫臣臣罪既如此宜伏東臯之下不應遠點屬車之塵但伏承聖躬不豫臣肝膽塗地是以敢至非謝罪而來高祖納宋弁言將復採用㑹留臺表言彪與御史賈尚往窮庶人恂事理有誣抑奏請收彪彪自言事枉高祖明彪無此遣左右慰勉之聽以牛車散載送之洛陽㑹赦得免高祖崩世宗踐祚彪自託於王肅又與邢巒詩書往來迭相稱重因論求復舊職修史官之事肅等許為左右彪乃表曰臣聞龍圖出而皇道明龜書見而帝徳昶斯實㝠中之書契也自瑞官文而卑高陳民師建而賤貴序此乃人間之繩式也是以唐典篆欽明之册虞書銘眘徽之篇傳著夏氏之箴詩錄商家之頌斯皆國史明乎得失之迹也逮于周姬鑒乎二代文王開之以兩經公旦申之以六聯郁乎其文典章大略也故觀雅頌識文武之丕烈察歌音辨周公之至孝是以季札聽風而知始基聽頌而識盛徳至若尼父之别魯籍丘明之辨孔志可謂婉而成章盡而不汚者矣自餘乘志之比其亦有趣焉暨史班之錄乃文窮於秦漢事盡於哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類三代炎闕崇道冠來事降及華馬陳于咸有放焉四敷贊弗遠不可力致豈虚也哉其餘率見而書覩事而作者多矣尋其本末可往來焉唯我皇魏之奄有中華也嵗越百齡年幾十紀太祖以弗違開基武皇以奉時拓業虎嘯域中龍飛宇外小往大來品物咸亨自兹以降世濟其光史官叙録未充其盛加以東觀中圯册勲有闕美隨日落善因月稀故諺曰一日不書百事荒蕪至于太和之十一年先帝先后遠惟景業綿綿休烈若不恢史闡錄懼上業茂功始有缺矣於是召名儒之士充麟閣之選于時忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓高祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢制作於此者恐閨門既異出入生疑弦柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢簡牘弗張其於書功録美不其闕歟伏惟孝文皇帝承天地之寳崇祖宗之業景功未就奄焉崩殞凡百黎萌若無天地賴遇陛下體明叡之眞應保合之量恢大明以燭物履靜恭以安邦天清其氣地樂其静不愆不忘率由舊章可謂重明疊聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理於有象盡性於衆變可謂日月出矣無幽不燭也記曰善流者欲人繼其行善歌者欲人繼其聲故傳曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖達今王之懿美洞鑒準之前代其徳靡悔也時哉時哉可不光昭哉合徳二儀者先皇之陶鈞也齊明日月者先皇之洞照也慮周四時者先皇之茂功也合契神鬼者先皇之𤣥燭也遷都改邑者先皇之達也變是協和者先皇之鑒也思同書軌者先皇之遠也守在四夷者先皇之略也海外有截者先皇之威也禮田岐陽者先皇之義也張樂岱郊者先皇之仁也鑾幸幽漠者先皇之智也燮伐南荆者先皇之禮也升中告成者先皇之肅也親䖍宗社者先皇之敬也袞實無闕者先皇之徳也開物成務者先皇之貞也觀乎人文者先皇之藴也革弊創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功二十加以謙尊而光為而弗有可謂四三皇而六五帝矣誠宜功書於竹素聲播於金石臣竊謂史官之達者大則與日月齊明小則與四時並茂其大者孔子左丘是也小者史遷班固是也故能聲流於無窮義昭於來裔是以金石可滅而流風不泯者其唯載籍乎諺曰相門有相將門有將斯不唯其性蓋言習之所得也竊謂天文之官太史之職如有其人宜其世矣故尚書稱羲和世掌天地之官張衡賦曰學乎舊史氏斯蓋世傳之義也若夫良冶之子善知為裘良弓之子善知為箕物豈有定習貫則知耳所以言及此者史職不修事多淪曠天人之際不可湏臾闕載也是以談遷世事而功立彪固世事而名成道爭乃前鑒之軌轍後鏡之蓍龜也然前代史官之不終業者有之皆陵遲之世不能容善是以平子去史而成賦伯喈違閣而就志近僭晉之世有佐郎王隱為著作虞預所毁亡官在家晝則樵薪供爨夜則觀文屬綴集成晉書存一代之事司馬紹勅尚書唯給筆札而已國之大籍成於私家末世之弊乃至如此史官之不遇時也今大魏之史職則身貴禄則親榮優哉游哉式榖爾休矣而典謨弗恢者其有以也而故著作漁陽傅毗北平陽尼河間邢産廣平宋弁昌黎韓顯宗等並以文才見舉注述是同皆登年不永弗終茂績前著作程靈虬同時應舉共掌此務今從他職官非所司唯崔光一人雖不移任然侍官兩兼故載述致闕臣聞載籍之興由於大業雅頌垂薦起於徳美雖時有文質史有備略然歴世相仍不改此度也昔史談誡其子遷曰當世有美而不書汝之罪也是以久而見美孔明在蜀不以史官留意是以久而受譏取之深衷史談之志賢亮遠矣書稱無曠庶官詩有職思其憂臣雖今非所司然昔忝斯任故不以草茅自疏敢言及於此語曰患為之者不必知知之者不得為臣誠不知彊欲為之耳竊尋先朝賜臣名彪者遠則擬漢史之叔皮近則凖晉史之紹統推名求義欲罷不能荷恩佩澤死而後已今求都下乞一靜處綜理國籍以終前志官給事力以充所湏雖不能光啓大録庶不為飽食終日耳近則期月可就遠則三年有成正本藴之麟閣副貳藏之名山時司空北海王詳尚書令王肅以其無禄頗相賑餉遂在祕書省同王隱故事白衣修史世宗親政崔光表曰伏見前御史中尉臣李彪夙懐美意創刋魏典臣昔為彪所致與之同業積年其志力貞彊考述無倦督勸羣竂注綴略舉雖頃來契濶多所廢離近蒙収起還綜厥事老而彌厲史才日新若克復舊職專功不殆必能昭明春秋闡成皇籍既先帝厚委宿厯高班纖負微愆應從滌洗愚謂宜申以常伯正綰者作停其外役展其内思研積歳月紀册必就鴻聲巨迹蔚乎有章盛軌懋詠鑠焉無泯矣世宗不許詔彪兼通直散騎常侍行汾州事非彪好也固請不行有司切遣之㑹遘疾累旬景明二年秋卒於洛陽年五十八始彪為中尉號為嚴酷以姦款難得乃為木手擊其脇腋氣絶而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪之病也體上往往瘡潰痛毒備極詔賜帛一百五十匹贈鎮逺將軍汾州刺史諡曰剛憲彪在祕書嵗餘史業竟未及就然區分書體皆彪之功述春秋三傳合成十卷其所著詩頌賦誄章奏雜筆百餘篇别有集彪雖與宋弁結管鮑之交弁為大中正與高祖私議猶以寒地處之殊不欲微相優假彪亦知之不以為恨及弁卒彪痛之無已為之哀誄備盡辛酸郭祚為吏部彪為子志求官祚仍以舊第處之彪以位經常伯又兼尚書謂祚應以貴遊拔之深用忿怨形於言色時論以此譏祚祚每曰爾與義和至交豈能饒爾而怨我乎任城王澄與彪先亦不穆及為雍州彪詣澄為志求其府寮澄釋然為啓得列曹行参軍時稱美之志字鴻道博學有才幹年十餘嵗便能屬文彪甚竒之謂崔鴻曰子宜與鴻道為二鴻於洛陽鴻遂與志交款往來彪有女幼而聰令彪每竒之教之書學讀誦經傳嘗竊謂所親曰此當興我家卿曹容得其力彪亡後世宗聞其名召為媫妤以禮迎引媫妤在宫常教帝妹書誦授經史志後稍遷符璽郎中徐州平東府司馬以軍功累轉後軍將軍中散大夫輔國將軍永寜寺典作副將始彪竒志及媫妤特加器愛公私坐集必自稱詠由是為高祖所責及彪亡後媫妤果入掖庭後宫咸師宗之世宗崩為比丘尼通習經義法座講説諸僧歎重之志所在著績桓叔興外叛南荆荒毁領軍元义舉其才任撫導擢為南荆州刺史加征虜將軍建義初叛入蕭衍高道悦字文欣遼東新昌人也曽祖䇿馮跋散騎常侍新昌侯祖育馮文通建徳令値世祖東討率其所部五百餘家歸命軍門世祖授以建忠將軍齊郡建徳二郡太守賜爵肥如子父元起武邑太守遂居渤海蓚縣道悦少為中書學士侍御主文中散久之轉治書侍御史加諫議大夫正色當官不憚彊禦車駕南征徴兵秦雍大期秋季閲集洛陽道悦以使者治書御史薛聰侍御主文中散元志等稽違期㑹奏舉其罪又奏兼左僕射吏部尚書任城王澄位總朝右任屬戎機兵使㑹否曽不檢奏尚書左丞公孫良職維樞轄蒙冐莫舉請以見事免良等所居官時道悦兄觀為外兵郎中而澄奏道悦有黨兄之負高祖詔責然以事經恩宥遂寢而不論詔曰道悦資性忠篤稟操貞亮居法樹平肅之規處諫著必犯之節三公憚其風鯁朕實嘉其一至謇諤之誠何愧黯鮑也其以為主爵下大夫諌議如故車駕將幸鄴又兼御史中尉留守洛京時宫極初基廟庫未構車駕將水路幸鄴已詔都水回營構之材以造舟檝道悅表諌曰臣聞博納輿言君上之崇務規箴匡正臣下之誠節是以置鼓設謗爰自曩日虚襟博聽義屬今辰臣既踈魯濫蒙榮貴司兼獻弼職當然否佩遇恩華願陳聞見竊以都作營構之材部别科擬素有定所工治已訖回付都水用造舟艫闕永固居宇之功作暫時遊嬉之用損耗殊倍終為棄物且子來之誠本期營起今乃倄繕舟檝更為非務公私回惶僉深怪愕又欲御泛龍舟經由石濟其㳂河挽道久以荒蕪舟檝之人素不便習若欲委棹正流深薄之危古今共慎若欲挽牽取進授衣之月躶形水陸恐乖視人若子之義且鄴洛相望陸路平直時乘沃若往來匪難更乃捨周道之安即渉川之殆此乃愚智等慮朝野俱惑進退伏思不見其可又從駕羣寮聽將妻累舟檝之間更無限隔士女雜亂内外不分當今景御休明惟新式度裁禮調風軌物寰宇竊惟斯舉或損洪猷深失溥天順則之望又氐胡犯順未恭西道偏戎旗胄仍襲南宼對接迎畿蠻民踈戾每造不軌闚覦間隙或生慮外愚謂應妙選懿親撫寜後事令姦回息覬覦之望邊宼絶闚疆之心臣稟性愚直知而無隱區區丹志冒昧以聞詔曰省所上事深具乃心但卿之立言半非矣當湏陳非以示謬稱是以彰得然後明所以而不用有由而為之不爾則未相體耳回材都水暫營嬉遊終為棄物修繕非務舟檝無彰士女雜亂此則卿之失辭矣深薄之危撫後之重斯則卿之得言也於是髙祖遂從陸路轉道悦太子中庶子正色立朝儼然難犯宫官上下咸畏憚之太和二十年秋車駕幸中岳詔太子恂入居金墉而恂潛謀還代忿道悦前後規諌遂於禁中殺之高祖甚加悲惜贈散騎常侍帶管州刺史賜帛五百匹并遣王人慰其妻子又詔使者監䕶喪事葬于舊塋諡曰貞侯世宗又追録忠槩拜長子顯族給事中顯族亦以忠厚見稱卒於右軍將軍顯族弟敬猷有風度員外散騎侍郎殿中侍御史進給事中輕車將軍奉車都尉蕭寳夤西征引為驃騎司馬及寶寅謀逆敬猷與行臺郎中封偉伯等潛圖義舉謀泄見殺贈冠軍將軍滄州刺史聽一子出身道悦長兄嵩字崐崘魏郡太守子良賢長水校尉良賢弟侯險薄為劫盗冀郡患之嵩弟雙清河太守濁貨將刑在市遇赦免時北海王詳為錄尚書雙多納金寳除司空長史未幾遷太尉長史俄出為征虜將軍涼州刺史専肆貪暴以罪免後貨高肇復起為幽州刺史又以貪穢被劾罪未判遇赦復任未幾而卒子景飜幽州司馬雙弟觀尚書左外兵郎中城陽王鸞司馬西征赭陽先驅而殁贈通直散騎侍郎諡曰閔史臣曰李彪生自微族才志確然業藝夙成見擢太和之世輶軒驟指聲駭江南秉筆立言足為良史逮於直繩在手厲氣明目持堅無術末路蹉跎行百里者半於九十豈彪之謂也高道悦匡直之風見憚於世醜正貽禍有可悲乎魏書卷六十二魏書卷六十二考證李彪傳談遷世事而功立彪固世事而名成道爭乃前鑒之軌轍後鏡之著龜也道爭二字不可曉疑衍文魏書卷六十二考證
