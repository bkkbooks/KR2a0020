body:
  text: 魏書卷二十七齊魏收撰列傳第十五穆崇穆崇代人也其先世效節於神元桓穆之時崇機捷便辟少以盗竊為事太祖之居獨孤部崇常往來奉給時人無及者後劉顯之謀逆也平文皇帝外孫梁眷知之宻遣崇告太祖眷謂崇曰顯若知之問汝者丈夫當死節雖刀劔刳割勿泄也因以寵妻及所乗良馬付崇曰事覺吾當以此自明崇來告難太祖馳如賀蘭部顯果疑眷泄其謀將囚之崇乃唱言曰梁眷不顧恩義奬顯為逆今我掠得其妻馬足以雪忿顯聞而信之窟咄之難崇外甥于植等謀執太祖以應之告崇曰今窟咄己立衆咸歸附富貴不可失願舅圗之崇乃夜告太祖太祖誅植等北踰隂山復幸賀蘭部崇甚見寵待太祖為魏王拜崇征虜將軍從平中原賜爵歴陽公散騎常侍後遷太尉加侍中徙為安邑公又從征髙車大勝而還姚興圍洛陽司馬徳宗將辛恭靖請救太祖遣崇六千騎赴之未至恭靖敗詔崇即鎭野王除豫州刺史仍本將軍徵為太尉又徙冝都公天賜三年薨先是衛王儀謀逆崇豫焉太祖惜其功而祕之及有司奏諡太祖親覽諡法至述義不克曰丁太祖曰此當矣乃諡曰丁公初太祖避窟咄之難遣崇還察人心崇夜至民中留馬與從者乃㣲服入其營㑹有火光為舂妾所識賊皆驚起崇求從者不得因匿於坑中徐乃竊馬奔走宿於大澤有白狼向崇而號崇乃覺悟馳馬随狼而走適去賊黨追者已至遂得免難太祖異之命崇立祀子孫世奉焉太和中追録功臣以崇配饗崇長子遂留歴顯官討蠕蠕有功賜爵零陵侯後以罪廢子乙九内行長者以功賜爵富城公加建忠將軍遷散騎常侍内乗黄令侍中卒諡曰静子真起家中散轉侍東宫尚長城公主拜駙馬都尉後勑離㛰納文明太后姊尋除南部尚書侍中卒諡曰宣髙祖追思崇勲令著作郎韓顯宗與真撰定碑文建於白登山真子泰本名石洛髙祖賜名焉以功臣子孫尚章武長公主拜駙馬都尉典羽獵四曹事賜爵馮翊侯遷殿中尚書加散騎常侍安西將軍進爵為公出為鎭南將軍洛州刺史例降為侯尋徵為右光禄大夫尚書右僕射又出為使持節鎮北將軍定州刺史改封馮翊縣開國侯食邑五百戸進征北將軍初文明太后幽髙祖於别室將謀黜廢泰切諫乃止髙祖徳之錫以山河寵待隆至泰自陳病乆乞為恒州遂轉陸叡為定州以泰代焉泰不願遷都叡未及發而泰己至遂潛相扇誘圖為叛乃與叡及安樂侯元隆撫冥鎭將魯郡侯元業驍騎將軍元超陽平侯賀頭射聲校尉元樂平前彭城鎭將元拔代郡太守元珍鎭北將軍樂陵王思譽等謀推朔州刺史陽平王頤為主頤不從偽許以安之宻表其事髙祖乃遣任城王澄率并肆兵以討之澄先遣治書侍御史李煥單車入代出其不意泰等驚駭計無所出煥曉諭逆徒示以禍福於是凶黨離心莫為之用泰自度必敗乃率麾下數百人攻煥郭門兾以一捷不克單馬走出城西為人擒送澄亦尋到窮治黨與髙祖幸代親見罪人問其反狀泰等伏誅子伯智八歲侍學東宫十歲拜太子洗馬散騎侍郎尚饒陽公主拜駙馬都尉早卒子階伯智弟士儒字叔賢徙涼州後乃得還為太尉參軍事子容武定中汲郡太守乙九弟忸頭侍中北部尚書卒贈司空公諡曰敬子蒲坂虞曹尚書征虜將軍涇州刺史贈征西將軍雍州刺史諡曰昭子韶字伏興員外散騎侍郎代郡太守征東將軍金紫光禄大夫卒贈使持節都督冀相殷三州諸軍事驃騎大將軍冀州刺史諡曰文子遵伯幽州司馬遂留弟觀字闥拔襲崇爵少以文藝知名選充内侍太祖器之太宗即位為左衞將軍綰門下中書出納詔命及訪舊事未嘗有所遺漏太宗竒之尚冝陽公主拜駙馬都尉稍遷太尉世祖之監國觀為右弼出則統攝朝政入則應對左右事無巨細皆關決焉終日怡怡無愠喜之色勞謙善誘不以富貴驕人泰常八年暴疾薨於苑内時年三十五太宗親臨其䘮悲動左右賜以通身隠起金飾棺䘮禮一依安城王叔孫俊故事贈宜都王諡曰文成世祖即位每與羣臣談宴未嘗不歎惜慇懃以為自泰常以來佐命勲臣文武兼濟無及之者見稱如此子夀襲爵少以父任選侍東宫尚樂陵公主拜駙馬都尉明敏有父風世祖愛重之擢為下大夫敷奏機辨有聲内外遷侍中中書監領南部尚書進爵宜都王加征東大將軍夀辭曰臣祖崇先皇之世屬值艱危幸天贊梁眷誠心宻告故得效功前朝流福於後昔陳平受賞歸功無知今眷元勲未録而臣獨奕世受榮豈惟仰愧古賢抑亦有虧國典世祖嘉之乃求眷後得其孫賜爵郡公輿駕征涼州命夀輔恭宗總録要機内外聽焉行次雲中將濟河宴諸將於宫世祖别御静室召夀及司徒崔浩尚書李順世祖謂夀曰蠕蠕吳提與牧犍連和今聞朕征涼州必來犯塞若伏兵漠南殄之為易朕故留壯兵肥馬使卿輔佐太子收田既訖便可分伏要害以待虜至引使深入然後擊之擒之必矣涼州路遠朕不得救卿若違朕指授為虜侵害朕還斬卿崔浩李順為證非虛言也夀頓首受詔壽信卜筮之言謂賊不來竟不設備而吳提果至侵及善無京師大駭壽不知所為欲築西郭門請恭宗避保南山惠太后不聽乃止遣司空長孫道生等擊走之世祖還以無大損傷故不追咎恭宗監國夀與崔浩等輔政人皆敬浩夀獨凌之又自恃位任以為人莫已及謂其子師曰但令吾兒及我亦足勝人不須苦教之遇諸父兄弟有如僕𨽻夫妻並坐共食而令諸父餕餘其自矜無禮如此為時人所鄙笑真君八年薨贈太尉諡曰文宣子平國襲爵尚城陽長公主拜駙馬都尉侍中中書監為太子四輔正平元年卒子伏干襲爵尚濟北公主拜駙馬都尉和平二年卒諡曰康無子伏干弟羆襲爵尚新平長公主拜駙馬都尉又除虎牢鎮將頻以不法致罪髙祖以其勲徳之胄讓而赦之轉征東將軍吐京鎭將羆賞善罰惡深自克厲時西河胡叛羆欲討之而離石都將郭洛頭拒違不從羆遂上表自劾以威不攝下請就刑戮髙祖乃免洛頭官山胡劉什婆寇掠郡縣羆討滅之自是部内肅然莫不敬憚後改吐京鎭為汾州仍以羆為刺史前吐京太守劉升在郡甚有威惠限滿還都胡民八百餘人詣羆請之前定陽令吳平仁亦有恩信戸増數倍羆以吏民懐之並為表請髙祖皆從焉羆既頻薦升等所部守令咸自砥礪威化大行百姓安之州民李軌郭及祖等七百餘人詣闕頌羆恩徳髙祖以羆政和民悦増秩延限後徵為光禄勲随例降王為魏郡開國公邑五百戸又除鎮北將軍燕州刺史鎭廣寗尋遷都督夏州髙平鎮諸軍事本將軍夏州刺史鎭統萬又除侍中中書監穆泰之反羆與濳通赦後事發削封為民卒于家世宗時追贈鎮北將軍恒州刺史子建字晚興性通率頗好文史起家祕書郎稍遷直閤將軍兼武衞建妻尒朱榮之妹建常依附榮榮入洛之後除鎮東將軍金紫光禄大夫征北將軍封濟北郡開國公後遷散騎常侍車騎大將軍左光禄大夫兼尚書北道行䑓并州事元曄之立建兼尚書右僕射俄轉侍中驃騎大將軍出帝末本將軍儀同三司洛州刺史天平中坐事自殺於五原城北子千牙武定中開府祭酒建弟衍字進興解褐員外郎封新興縣開國子稍遷通直常侍行雲州事羆弟亮字幼輔初字老生早有風度顯祖時起家為侍御中散尚中山長公主拜駙馬都尉封趙郡王加侍中征南大將軍徙封長樂王髙祖初除使持節秦州刺史在州未期大著聲稱徵為殿中尚書又遷使持節征西大將軍西戎校尉敦煌鎮都大將政尚寛簡賑恤窮乏被徵還朝百姓追思之除都督秦梁益三州諸軍事征南大將軍領䕶西戎校尉仇池鎮將時宕昌王梁彌機死子彌博立為吐谷渾所逼來奔仇池亮以彌機蕃教素著矜其亡滅彌博凶悖氐羌所棄彌機兄子彌承戎民歸樂表請納之髙祖從焉於是率騎三萬次於龍鵠擊走吐谷渾立彌承而還是時階陵比谷羌董耕奴斯卑等率衆數千人寇仇池屯於陽遐嶺亮副將楊靈珍率騎擊走之氐豪楊卜自延興以來從軍征伐二十一戰前來鎮將抑而不聞亮表卜為廣業太守豪右咸悦境内大安徵為侍中尚書右僕射于時復置司州髙祖曰司州始立未有寮吏須立中正以定選舉然中正之任必須徳望兼資者世祖時崔浩為冀州中正長孫嵩為司州中正可謂得人公卿等宜自相推舉必令稱允尚書陸叡舉亮為司州大中正時蕭頤遣將陳顯逹攻䧟醴陽加亮使持節征南大將軍都督懐洛南北豫徐兗六州諸軍事以討之顯逹遁走乃還尋遷司空參議律令例降爵為公時文明太后崩己過期月髙祖毁瘠猶甚亮表曰王者居極至尊至重父天母地懐柔百靈是以古先喆王制禮成務施政立治必順天而後動宣憲垂範必依典而後行用能四時不忒隂陽和暢若有過舉咎徵必集故大舜至慕事在納麓之前孔子至聖䘮無過瘠之紀堯書稽古之羙不録在服之痛禮備諸侯之䘮而無天子之式雖有上逹之言未見居䘮之典然則位重者為世以屈己居聖者逹命以忘情伏惟陛下至徳參二儀惠澤覃河海宣禮明刑動遵古式以至孝之痛服期年之䘮練事既闋號慕如始綂重極之尊同衆庶之制廢越紼之大敬闕宗祀之舊軌誠由文明太皇太后聖略超古惠訓深至欲報之徳昊天罔極比之前代慼為過甚豈所謂順帝之則約躬随衆者也陛下既為天地所子又為萬民父母子過哀父則為之慘悴父過慼子則為之憂傷近蒙接見咫尺旒冕聖容哀毁駭感無止況神祗至靈而不乆虧和氣㣲致風旱者哉書稱一人有慶兆民頼之今一人過哀黎元焉繫羣官所以顛殞震懼率土所以危惶悚慄百姓何仰而不憂嘉禾何由而播殖願陛下上承金冊遺訓下稱億兆之心時襲輕服數御常膳修崇郊祠垂惠咸秩輿駕時動以釋憂煩博採廣諮以導性氣息無益之戀行利見之徳則休徵可致嘉應必臻禮教並宣孝慈兼備普天蒙頼含生幸甚詔曰茍孝悌之至無所不通今飄風亢旱時雨不降實由誠慕未濃幽顯無感也所言過哀之咎諒為未𠂻省啓以増悲愧尋領太子太傅時將建太極殿引見羣臣於太華殿髙祖曰朕仰遵先意將營殿宇役夫既至興功有日今欲徙居永樂以避囂埃土木雖復無心毁之能不悽愴今故臨對卿等與之取别此殿乃髙宗所制爰歴顯祖逮朕沖年受位於此但事來奪情將有改制仰惟疇昔惟深悲感亮稽首對曰臣聞稽之卜筮載自典經占以決疑古今攸尚興建之功事在不易願陛下訊之蓍龜以定可否又去歳役作為功甚多太廟明堂一年便就若仍歳頻興恐民力凋弊且材幹新伐為功不固願得逾年小康百姓髙祖曰若終不為可如卿言後必為之逾年何益朕遠覽前王無不興造故有周創業經建靈䑓洪漢受終未央是作草創之初猶尚若此況朕承累聖之運屬太平之基且今八表清晏年榖又登爰及此時以就大功人生定分修短命也蓍蔡雖智其如之何當委之大分豈假卜筮遂移御永樂宫後髙祖臨朝堂謂亮曰三代之禮日出視朝自漢魏以降禮儀漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共議可否遂命讀奏案髙祖親自次之又謂亮曰徐州表給歸化人稟王者民之父母誠冝許之但今荆揚不賓書軌未一方欲親御六師問罪江介計萬戸投化歳食百萬若聽其給也則蕃儲虛竭雖得戸千萬猶未成一同且欲随貧賑恤卿意何如亮對曰所存逺大實如聖㫖及車駕南遷遷武衞大將軍以本官董攝中軍事髙祖南伐以亮録尚書事留鎮洛陽後髙祖將自小平汎舟幸石濟亮諫曰臣聞垂堂之誨振古成規於安思危著於周易是以憑險弗防沒而不弔匹夫之賤猶不自輕况萬乗之尊含生所仰而可忽乎是故處則深宫廣厦行則萬騎千乗昔漢帝欲乗舟渡渭廣徳將以首血汗車輪帝乃感而就橋夫一渡小水猶尚若斯况洪河浩汗有不測之慮且車乗由人猶有奔逸致敗之害况水之緩急非人所制脱難出慮表其如宗廟何髙祖曰司空言是也及亮兄羆預穆泰反事亮以府事付司馬慕容契上表自劾髙祖優詔不許還令攝事亮頻煩固請乆乃許之尋除使持節征北大將軍開府儀同三司冀州刺史徙封頓邱郡開國公食邑五百戸以紹崇爵世宗即位遷定州刺史尋除驃騎大將軍尚書令俄轉司空公景明三年薨時年五十二給東園温明祕器朝服一具衣一襲錢四十萬布七百匹蠟二百斤世宗親臨小斂贈太尉公領司州牧諡曰匡子紹字永業髙祖以其貴臣世胄顧念之九歳除員外郎侍學東宫轉太子舎人十一尚琅邪長公主拜駙馬都尉散騎侍郎領京兆王愉文學世宗初通直散騎常侍高陽王雍友遭父憂詔起襲爵散騎常侍領主衣都統遷祕書監侍中金紫光禄大夫光禄卿又遷衞將軍太常卿尋除使持節都督冀瀛二州諸軍事本將軍冀州刺史以母老固辭忤㫖免官除中書令轉七兵尚書徙殿中尚書遭所生憂免居䘮以孝聞又除衞大將軍左光禄大夫中書監復為侍中領本邑中正紹無他才能而資性方重罕接賔客希造人門領軍元义當權熏灼曽往候紹紹迎送下階而己時人歎尚之及皇太后欲黜义猶豫未決紹贊成之以功加特進又拜其次子巖為給事中尋加儀同三司領左右時侍中元順與紹同直順嘗因醉入其寢所紹擁被而起正色讓順曰老身二十年侍中與卿先君亟連職事縱卿後進何宜相排突也遂謝事還家詔喻乆乃起除車騎大將軍開府定州刺史固辭不拜又除侍中託疾未起河隂之役故得免害莊帝立尒朱榮遣人徵之紹以為必死哭辭家廟及往見榮於邙山捧手不拜榮亦矯意禮之顧謂人曰穆紹不虛大家兒車駕入宫尋授尚書令司空公進爵為王給班劔四十人仍如侍中時河南尹李奬往詣紹奬以紹郡民謂必加敬紹又恃封邑是奬國主待之不為動膝奬憚其位望致拜而還議者兩譏焉尒朱榮之討葛榮也詔上黨王天穆為前鋒次於懐縣司徒公楊椿為右軍紹為後繼未發㑹擒葛榮乃止未幾降王復本爵元顥入洛以紹為兗州刺史行逹東郡顥敗而反普泰元年除都督青齊兗光四州諸軍事驃騎大將軍開府青州刺史未行其年九月薨時年五十二贈侍中都督冀相殷三州諸軍事大將軍尚書令太保冀州刺史諡曰文獻子長嵩字子岳起家通直郎再遷散騎常侍襲爵轉鎭東將軍光禄少卿興和中卒贈都督冀滄二州諸軍事征東將軍冀州刺史子巖武定中司徒諮議參軍平國弟相國官至安東將軍濟州刺史上洛公相國弟正國尚長樂公主拜駙馬都尉子平城早卒髙祖時始平公主薨於宫追贈平城駙馬都尉與公主合葬平城弟長城司徒左長史子世恭武定中朱衣直閤長城弟彧符璽郎中卒子永延尚書騎兵郎青州征東司馬正國弟應國征西將軍張掖公子度孤襲爵平南將軍梁城鎭將子清休頗有將畧司農少卿武衞將軍左光禄大夫出為驃騎大將軍夏州刺史子鐵槌祕書郎應國弟安國歴金部長殿中尚書加右衞將軍賜爵新平子為乙渾所殺追贈征虜將軍子吐萬襲爵襄城鎭將子金寶祕書郎壽弟伏真高宗世稍遷尚書賜爵任城侯出為兗州刺史假寧東將軍濮陽公子常貴南陽太守伏真弟多侯歴位殿中給事左將軍賜爵長寧子遷可衞監髙宗崩乙渾專權時司徒陸麗在代郡溫湯療病渾忌之遣多侯追麗多侯謂麗曰渾有無君之心大王衆所望也去必危宜徐歸而圖之麗不從遂為渾所害多侯亦見殺諡曰烈子胡兒襲爵觀弟翰平原鎭將西海王薨子龍仁襲爵降為公卒子豐國襲爵豐國弟子弼有風格善自位置渉獵經史與長孫稚陸希道等齊名於世矜己陵物頗以損焉高祖初定氏族欲以弼為國子助教弼辭曰先臣以來蒙恩累世比校徒流實用慙屈髙祖曰朕欲敦厲胄子故屈卿先之白玉投泥豈能相汚弼曰既遇明時耻沉泥滓㑹司州牧咸陽王禧入髙祖謂禧曰朕與卿作州都舉一主簿即命弼謁之因為髙祖所知輿駕南征特勑随從世宗初除尚書郎以選為高平王懐國郎中令數有匡諫之益世宗善之除中書舎人轉司州治中别駕歴任有稱肅宗時河州羌却鐵忽反勑兼黃門慰喻忽以功加前將軍賜以錢帛尋以本將軍行揚州事追拜平西將軍華州刺史卒於州時年五十一贈使持節征北將軍定州刺史諡曰懿子季齊釋褐司徒參軍事開府騎兵參軍翰弟顗忠謹有材力太宗時為中散轉侍御郎從世祖征赫連昌勇冠一時世祖嘉之遷侍輦郎殿中將軍賜爵泥陽子從征和龍功超諸將拜司衞監加龍驤將軍進爵長樂侯曽從世祖田於崞山有虎突出顗摶而獲之世祖歎曰詩所謂有力如虎顗乃過之後從駕西征白龍北討蠕蠕以功加散騎常侍鎭北將軍進爵建安公出為北鎭都將徵拜殿中尚書出鎭涼州所在著稱還加散騎常侍領太倉尚書髙宗時為征西大將軍督諸軍事西征吐谷渾出南道坐擊賊不進免官爵徙邊高祖又以顗著勲前朝徵為内都大官天安元年卒贈征西大將軍建安王諡曰康子寄生襲寄生弟栗涼州鎭將安南公子祁字願徳通直常侍上谷河内二郡太守司州治中太子右衞率卒贈齊州刺史子景相字覇都中書舎人上黨太守栗弟泥乾為羽林中郎賜爵臨安男後稍歴顯職除冀州刺史假安南將軍鉅鹿公卒子渾襲爵祕書中散子令宣通直常侍崇宗人醜善太祖初率部歸附與崇同心勠力禦侮左右從征窟咄劉顯破平之又從擊賀蘭部平厙莫奚拜天部大人居於東蕃卒子莫提從平中原為中山太守除寧南將軍相州刺史假陽陵侯卒子吐太宗世散騎常侍卒於侍中鎭東將軍子敦輔國將軍西部都將賜爵富平子卒子純襲爵歴散騎常侍光禄勲高祖時右衞將軍尋除右將軍河州刺史卒贈鎭北將軍并州刺史子盛襲爵直閤將軍盛弟裕輔國將軍中散大夫裕子禮東牟太守禮弟畧武定末魏尹丞純弟鑖歴東宫庶子汲郡太守世宗時為懐朔鎭將東北中郎將豳幽涼三州刺史肅宗世除平北將軍并州刺史金紫光禄大夫在公以威猛見稱卒時年七十四贈散騎常侍征東將軍相州刺史諡曰安子顯壽長水校尉顯壽弟顯業卒於散騎侍郎子子琳舉秀才為安戎令頗有吏幹随長孫稚征蜀有功除尚書屯田郎中出帝即位以攝儀曹事封高唐縣開國男邑二百戸孝静初鎭東將軍司州别駕以占奪民田免官爵乆之何至羅國主副羅越居為蠕蠕所破其子去賔來奔齊獻武王奏去賔為安北將軍肆州刺史封高車王招慰夷虜表子琳為去賔長史復其前封尋遷儀同開府長史齊獻武王丞相司馬卒時年五十三贈驃騎大將軍都官尚書瀛州刺史子伯昱弟朏武定中開府中兵參軍子琳弟良字先徳司空行參軍將作丞司徒祭酒安東將軍南鉅鹿太守頗有民譽入為司徒司馬大將軍從事中郎中書舎人武定六年卒贈征東將軍徐州刺史史臣曰穆崇夙奉龍顔早著誠節遂膺寵眷位極台鼎至乃身豫逆謀卒蒙全䕶明主之於勞臣不亦厚矣從享廟庭抑亦尚功之義觀少當公輔之任業器其優乎顗壯烈顯逹亮寛厚致位紹立虛簡之操弼有風格之名世載不隕青紫兼列盛矣至於壽以貴終羆止削廢人之無禮為幸葢多醜之子孫不乏名位亦有人哉魏書卷二十七魏書卷二十七考證穆崇傳領軍元义當權熏灼監本义誤文當誤官今改正魏書卷二十七考證
