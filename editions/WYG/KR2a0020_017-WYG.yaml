body:
  text: 魏書卷十七齊魏收撰列傳第五眀元六王樂平王安定王樂安王永昌王建寧王新興王眀元皇帝七男杜密皇后生世祖太武皇帝大慕容夫人生樂平戾王丕安定殤王彌闕母氏慕容夫人生樂安宣王範尹夫人生永昌荘王健建寧王崇新興王俊二王並闕母氏樂平王丕少有才幹為世所稱太宗以丕長愛其噐度特優異之泰常七年封拜車騎大将軍後督河西高平諸軍討南秦王楊難當軍至略陽禁令齊肅所過無私百姓争致牛酒難當懼還仇池而諸将議曰若不誅豪帥軍還之後必聚而為寇又以大衆逺出不有所掠則無以充軍實賞将士将從之時中書侍郎高允參丕軍事諌曰今若誅之是傷其向化之心恐大軍一還為亂必速丕以為然於是綏懐初附秋毫無犯初馮𢎞之奔高麗世祖詔遣送之高麗不遣世祖怒將討之丕上疏以為和龍新定宜優復之使廣修農殖以饒軍實然後進圖可一舉而滅帝納之乃止後坐劉潔事以憂薨事在潔𫝊諡曰戾王子拔襲爵後坐事賜死國除丕之薨及日者董道秀之死也高允遂著筮論曰昔眀元末起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王黙而有喜色後事發王遂憂死而道秀棄市道秀若推六爻以對王曰易稱亢龍有悔窮高曰亢高而無民不為善也夫如是則上寧於王下保於已福祿方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎安定王彌泰常七年封太宗討滑臺留守京師薨諡殤王無子國除樂安王範泰常七年封雅性沉厚寛和仁恕世祖以長安形勝之地非範莫可任者乃拜範都督五州諸軍事衞大將軍開府儀同三司長安鎮都大将高選才能以為僚佐範謙恭惠下推心撫納百姓稱之時秦土新罹寇賊流亡者相繼範請崇易簡之治帝納之於是遂寛傜與人休息後劉潔之謀範聞而不告事發因疾暴薨長子良世祖未有子嘗曰兄弟之子猶子也親撫養之長而壮勇多知常參軍國大計高宗時襲王拜長安鎮都大將雍州刺史為内都大官薨諡曰簡王永昌王健泰常七年封健姿貌魁壮善弓馬達兵法所在征戰常有大功才藝比陳留桓王而智略過之從世祖破赫連昌遂西略至木根山討和龍健别攻拔建徳後平叛胡白龍餘黨于西河世祖襲蠕蠕越涿邪山車駕還詔健殿後蠕蠕萬騎追之健與數十騎擊之矢不虚發所中皆應弦而斃遂退威震漠北尋從平涼州健功居多又討破秃髪保周自殺傳首京師復降沮渠無諱無疾薨諡曰荘王子仁襲仁亦驍勇有父風世祖奇之後與濮陽王閭若文謀為不軌發覺賜死國除建寧王崇泰常七年封拜輔國将軍從討北虜有功高宗時封崇子麗濟南王後與京兆王杜元寳謀逆父子並賜死新興王俊泰常七年封拜鎮東大將軍少善騎射多才藝坐法削爵為公俊好酒色多越法度又以母先遇罪死而已被貶削恒懐怨望頗有悖心後事發賜死國除魏書卷十七魏書卷十七考證眀元六王列傳魏收書亡後人所補永昌王列傳後與濮陽王閭若文北史若作著魏書卷十七考證
