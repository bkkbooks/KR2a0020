body:
  text: 魏書卷七十六齊魏收撰列傳第六十四盧同張烈盧同字叔倫范陽涿人盧元之族孫父輔字顯元本州别駕同身長八尺容貌魁偉善於處世太和中起家北海王詳國常侍稍遷司空祭酒昌黎太守尋爲營州長史仍帶郡入除河南尹丞遷太尉屬會豫州城民白早生反都督中山王英尚書邢巒等討之詔同爲軍司事平除冀州鎮東府長史遭父憂解任後除司空諮議叅軍兼司馬爲營構東宫都將延昌中秦州民反詔同兼通直常侍持節慰諭之多所降下還轉尚書右丞進號輔國將軍以父諱不拜改授龍驤熙平初轉左丞加征虜將軍時相州刺史奚康生徵民歳調皆七八十尺以邀奉公之譽部内患之同於歳禄官給長絹同乃舉按康生度外徵調書奏詔科康生之罪兼襃同在公之績肅宗世朝政稍衰人多竊冐軍功同閲吏部勳書因加檢覆覈得竊階者三百餘人同乃表言竊見吏部勳簿多皆改換乃校中兵奏按竝復乖舛臣聊爾揀練已得三百餘人明知隠而未露者動有千數愚謂罪雖恩免猶湏刋定請遣一都令史與令僕省事各一人總集吏部中兵二局勳簿對勾奏按若名級相應者即於黄素楷書大字具件階級數令本曹尚書以朱印印之明造兩通一關吏部一留兵局與奏按對掌進則防揩洗之僞退則無改易之理從前以來勳書上省唯列姓名不載本屬致令竊濫之徒輕爲茍且今請征職白民具列本州郡縣三長之所其實官正職者亦列名貫别録歴階仰本軍印記其上然後印縫各上所司統將都督竝皆印記然後列上行臺行臺關太尉太尉檢練精實乃始關刺省重究括然後奏申奏出之日黄素朱印關付吏部頃來非但偷階冐名改換勳簿而已或一階再取或易名受級凡如此者其人不少良由吏部無簿防塞失方何者吏部加階之後簿不注記縁此之故易生僥倖自今叙階之後名簿具注加補日月尚書印記然後付曹即中别作抄自印記一如尚書郎中自掌遞代相付此制一行差止姦罔詔從之同又奏曰臣頃奏以黄素爲勳具注官名户屬及吏部換勳之法事目三條已䝉㫖許臣伏思黄素勳簿政可麤止姦僞然在軍虛詐猶未可盡請自今在軍閲簿之日行臺軍司監軍都督各明立文按處處記之斬首成一階已上即令給劵一紙之上當中大書起行臺統軍位號勳人甲乙斬三賊及被傷成階已上亦具書於劵各盡一行當行豎裂其劵前後皆起年號日月破某處陳某官某勳印記爲驗一支付勳人一支付行臺記至京即送門下别函守録又自遷都以來戎車屢㨗所以征勳轉多叙不可盡者良由嵗乆生姦積年長僞巧吏階縁偷增遂甚請自今爲始諸有勳簿已經奏賞者即廣下逺近云某處勳判咸令知聞立格酬叙以三年爲斷其職人及出身限内悉令銓除實官及外號隨才加授庶使酬勤者速申立功者勸事不經乆僥倖易息或遭窮難州無中正者不在此限又勳簿之法征還之日即應申送頃來行臺督將至京始造或一年二歳方上勳書姦僞之原實自由此於今以後軍還之日便通勳簿不聴隔月詔復依行元义之廢靈太后也相州刺史中山王熙起兵於鄴熙敗以同爲持節兼黄門侍郎慰勞使乃就州刑熙還授平東將軍正黄門營明堂副將㝷加撫軍將軍光禄大夫本州大中正同善事在位爲义所親戮熙之日深窮黨與以希义㫖論者非之又給同羽林二十人以自防衞同兄琇少多大言常云公侯可致至此始爲都水使者同啓求回身二階以加琇琇遂除安州刺史論者稱之營州城民就徳興謀反除同度支尚書黄門如故持節使營州慰勞聼以便宜從事同頻遣使人皆爲賊害乃遣賊家口三十人并免家奴爲良齎書諭徳興徳興乃降安輯其民而還徳興復反詔同以本將軍爲幽州刺史兼尚書行臺慰勞之同慮徳興難信勒衆而往爲徳興所繫大敗而還靈太后反政以同义黨除名孝昌三年除左將軍太中大夫兼左丞爲齊兖二州行臺節度大都督李叔仁闕莊帝踐祚詔復本秩除都官尚書復兼七兵以同前慰勞徳興之功封章武縣開國伯邑四百户正除七兵尋轉殿中加征南將軍普泰初除侍中進號驃騎將軍左光禄大夫同時乆病彊牽從務啓乞儀同初同之爲黄門也與前廢帝俱在門下同異其爲人素相欵託廢帝以恩舊許之除儀同三司餘官如故永熙初薨年五十六贈侍中都督冀滄瀛三州諸軍事驃騎大將軍司空公冀州刺史開國伯如故賜帛四百匹諡曰孝穆三年復加贈尚書右僕射有四子長子斐武定中文襄王大將軍府掾斐弟筠青州治中同兄静太常丞静子景裕在儒林傳張烈字徽仙清河東武城人也髙祖賜名曰烈仍以本名爲字焉髙祖悕爲慕容儁尚書右僕射曽祖恂散騎常侍隨慕容徳南渡因居齊郡之臨淄烈少孤貧渉獵經史有氣槩時青州有崔徽伯房徽叔與烈竝有令譽時人號曰三徽髙祖時入官代都歴侍御主又中散遷洛除尚書儀曹即彭城王功曹史太子歩兵校尉蕭寶卷將陳顯達治兵漢南謀將入宼時順陽太守王青石世官江南荆州刺史廣陽王嘉慮其有異表請代之高祖詔侍臣各舉所知互有申薦者髙祖曰此郡今當必爭之地湏得堪濟之才何容汎舉也太子歩兵張烈每論軍國之事時有會人意處朕欲用之何如彭城王勰稱贊之遂勅除陵江將軍順陽大守烈到郡二日便爲寶卷將崔慧景攻圍七十餘日烈撫厲將士甚得軍人之和會車駕南討慧景遁走髙祖親勞烈曰卿定可遂能不負所寄烈拜謝曰若不值鑾輿親駕臣將不免困於犬羊自是陛下不負臣非臣能不負陛下髙祖善其對世宗即位追録先勲封清河縣開國子邑二百户尋以母老歸飬積十餘年頻值凶儉烈爲粥以食飢人䝉濟者甚衆鄉黨以此稱之肅宗初除龍驤將軍司徒右長史又轉征虜將軍司空長史先是元义父江陽王繼曾爲青州刺史及义當權烈託故義之懐遂相謟附除前將軍給事黄門侍即尋加平南將軍光禄大夫後靈太后反政以烈义黨出爲鎮東將軍青州刺史于時議者以烈家産畜殖僮客甚多慮其怨望不宜出爲本州改授安北將軍瀛州刺史爲政清静吏民安之更滿還朝因辭老還鄉里兄弟同居怡怡然爲親類所慕元象元年卒於家時年七十七烈先爲家誡千餘言并自叙志行及所歴之官臨終勅子姪不聴求贈但勒家誡立碣而已其子質奉行焉質博學多才藝解褐奉朝請員外即龍驤將軍諫議大夫未襲爵興和中卒於家質弟登州主簿烈弟僧皓字山客歴渉羣書工於談説有名於當世熙平初徵爲諫議大夫正光五年以國子博士徵之孝昌二年徵爲散騎侍即竝不赴世號爲徵君焉好營産業孜孜不已藏鏹巨萬他資亦稱是兄弟自供儉約車馬瘐敝身服布裳而婢妾紈綺僧晧尤好蒲奕戲不擇人是以獲譏於世前廢帝時崔祖螭舉兵攻東陽城僧晧與同事敗死於獄籍没家産出帝初訴復業子軌州主簿史臣曰盧同質器洪厚卷舒兼濟張烈早摽名輩氣尚見知趨捨深沉俱至顯達雅道正路其殆病諸魏書卷七十六魏書卷七十六考證盧同𫝊父輔字顯元元北史作光張烈傳張烈字徽仙仙北史作之魏書卷七十六考證
