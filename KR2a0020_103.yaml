body:
  text: 魏書卷九十七列傳第八十五島夷桓玄海夷馮跋島夷劉裕島夷桓玄字敬道本譙國龍亢楚也僭晉大司馬溫之子溫愛之臨終命以為後年七歲襲封南郡公登國五年為司馬昌明太子洗馬玄志氣不倫欲以雄豪自許朝議以溫有陵虐之迹故抑玄兄弟出為義興太守不得志少時去職皇始初司馬德宗立其會稽王道子擅權信任尚書僕射王國寶為時所疾玄說荊州刺史殷仲堪令推德宗兗州刺史王恭為盟主以討國寶仲堪從之會恭使亦上相逢於中路約同大舉並抗表起兵尋平王國寶等天興初德宗以玄為使持節督交廣二州諸軍事建威將軍平越中郎將廣州刺史後王恭復與德宗豫州刺史庾楷共起兵以討其江州刺史王愈司馬尚之兄弟玄及龍驤將軍揚佺期荊州刺史殷仲堪等率軍應恭玄等造於石頭於時德宗征虜將軍司馬元顯一軍仍守石頭列舟艦斷淮口道子出軍將屯中堂忽有馬驚軍中擾亂人馬赴江者甚衆良久乃定玄等不知建業危弱且王恭尋敗玄甚惶懼乃回軍于蔡洲王恭司馬劉牢之率北府軍來次新亭於是德宗以桓修為荊州仲堪為廣州玄為江州佺期為雍州刺史郗恢為尚書仲堪回師南旋乃使人徇于玄等軍曰若不各散歸大軍至江陵當悉戮餘口仲堪偏將劉系先領兵二千隸于佺期輒率衆而歸玄等大懼乃狼狽而走庾楷亦棄衆奔于南軍玄並趣輕舟追仲堪至尋陽而推玄為盟主鎮於夏口德宗加玄都督荊州四郡以玄兄西昌公偉為輔國將軍南蠻校尉寵玄兄弟欲以侵削荊雍先是荊州大水仲堪倉廩空竭玄乘其虛而伐之先遣軍襲巴陵梁州刺史郭銓當之鎮路逢玄玄遣銓為前驅玄發夏口與仲堪書云今當入沔討除佺期頓兵江口若相與無二可殺楊廣若其不爾便當率軍入江別與桓偉書令剋期為內應偉惶遽以書示仲堪仲堪慰喻遣歸夜乃執之仲堪遣龍驤將軍殷邁振威將軍劉山民等統衆七千至西江口玄聞邁至復與其黨苻永道領帳下擊之邁等敗走玄頓巴陵收其兵而館其穀復破楊廣於夏口仲堪既失巴陵之積又諸將皆敗江陵駭震城內大飢皆以胡麻為廩初仲堪之得玄書也急召佺期佺期曰江陵無食何以待敵可來見就共守襄陽仲堪猶以全軍無緣棄城迸走甚憂佺期弗來乃紿之曰比來收集已有儲矣可有數萬人百日糧佺期信之乃率步騎八千既至仲堪惟以飯餉其軍佺期大怒曰今茲敗矣不過見仲堪使人於艦上橫射玄玄軍亦射之佺期乃退玄乃渡軍於馬頭命其諸軍進破殺仲堪殺楊廣佺期殷道護及仲堪參軍羅企生等德宗以玄為持節都督荊司雍秦梁益寧江八州及揚豫并八郡諸軍事後將軍荊江二州刺史玄大論功賞以長史卞範之領南郡相委以心膂之任乃斷上流禁商旅德宗下書曰豎子桓玄故大司馬不腆之息少懷狡惡長而不悛遂與王恭協同姦謀阻兵內侮三方雲集志在問鼎窺擬神器賴祖宗威靈宰傅神略忠義奮發罪人斯殞玄等猖狂失圖回舟鳥逝便宜乘會殲除姦源于時同異之論用惑廟策遂使王憲廢撓寵授非所猶冀玄當洗濯胸腑小懲大誡而狼心弗革悖慢愈甚割據江湘擅威荊郢矯命稱制與奪在手又對侍中王謐放肆醜言欲縱凶毒陵陷上京無君之心形於音翰不臣之迹日月彌著是可忍也孰不可懷宜明九伐以寧西夏尚書令後將軍元顯可為征討大都督督十八州諸軍事驃騎大將軍儀同三司以劉牢之為前鋒行征西將軍權領江州命司馬尚之入沔水玄聞元顯處分甚駭懼欲保江陵長史卞範之說玄東下玄甚狐疑範之苦勸玄乃留桓偉守江陵率軍東下至夏口乃建牙傳檄曰案揚州刺史元顯凶暴之性自幼加長犯禮毀教發蒙如備居喪無一日之哀衰絰為宵征之服絃觴於殷憂之時窮色於罔極之日劫略王國寶妓妾一朝空房此基惡之始駭愕視聽者矣相王有疾情無悚懼幸災擅命揚州篡授遂乃父子同録比肩連案既專權重多行險暴恐相王知之杜絶視聽惡聲無聞佞譽日至萬機之重委之厮孽國典朝政紛紜淆亂又諷旨尚書使普敬録公録公之位非盡敬之所苟自尊貴遂悖朝禮又妖賊陵縱破軍殄民之後己為都督親則刺史於宜降之日輒加崇進弱冠之年古今莫比宰相懲惡己獨解録推禍委罰歸之有在自古僭逆未有若斯之甚者取妾之僭殆同六禮及使尚書僕射為媒人長史為迎客嬖媵叨餮賀同長秋所謂無君之心觸事而發八日觀佛略人子女至人家宿唐突婦妾慶封迄今甫見易室之飲晉靈以來忽有支解之刑喜怒輕戮人士割裂治城之暴一睡而斬又以四歲孽子興東海之封吳興殘暴之後橫復若斯之調妖賊之興實由此竪居喪極味孫泰供其膳在夜思遊亦孫泰延其駕泰承其勢得行威福雖加誅戮所染既多加之以苦發樂屬枉濫者衆驅逐徙撥死叛殆盡改號元興以為己瑞莽之符命於斯尤著否極必亨天盈其毒不義不昵勢必崩喪取亂侮亡實在斯會三軍文武憤踊即路玄亦失荊楚人情而師出不順其兵雖強慮弗為用有回師之計既過尋陽不見東軍玄意乃定於是遂鼓行而進徑至姑熟又克歷陽劉牢之遣子敬宣詣玄請降玄大喜與敬宣置酒宴集玄至新亭元顯棄船退入國子堂列陳宣陽門前元顯欲挾德宗出戰而軍中相驚言玄已及南桁乃回軍赴宮既至中堂一時崩散元顯奔東府惟張法順一騎隨之玄乃為侍中都督中外諸軍丞相録尚書事揚州牧領徐州刺史持節荊江二州公如故假黃鉞羽葆鼓吹班劍二十人置左右長史從事中郎四人甲仗二百人入殿於是收道子付廷尉免為庶人徙于安城郡殺元顯并其子及豫州刺史司馬尚之吏部郎袁遵張法順等又滅庾楷於豫章徙尚之弟丹楊尹恢之輔國將軍允之及國寶王緒諸子于交廣州以劉牢之為會稽內史將欲解其兵也初敬宣既降隨入東府至是求歸玄冀牢之受命乃遣之敬宣既至牢之知將不免欲襲玄衆皆離散乃於班瀆北走縊於新洲傳首建鄴敬宣奔於江北玄白德宗大赦改年為大亨玄讓丞相荊江徐三州及録尚書事乃改授太尉都督中外揚州牧領平西將軍豫州刺史緑綟綬加袞冕之服劍履之禮入朝不趨讚拜不名增班劍六十人甲仗二百人入殿玄乃鎮姑熟既而大築府第田遊無度政令屢改驕侈肆欲朋黨翕習沮亂內外朝政皆咨焉小事則決於左僕射桓謙及丹陽尹卞範之玄大賦三吳富室以賑飢民猶不能濟也東郡既由兵掠因以飢饉死者甚衆三吳戶口減半會稽則十三四臨海永嘉死散殆盡諸舊富室皆衣羅縠佩金玉相守閉門而死玄自封豫章郡公食安成七千五百戶後封桂陽郡公邑二千五百戶本封南郡如故既而鴆殺道子玄削奪德宗供奉之具務盡約陋殆至飢寒雖殺逆未至君臣之體盡矣進位大將軍加前後部羽葆鼓吹奏事不名又表請自率諸軍命諸蕃方兵掃平關洛德宗不許之玄本無資力但好為大言既不辦行乃云奉詔故止玄既無他處分先作征行服玩并制裝書畫之具或諫曰今日之行必有征無戰輜重自足相運不煩復有制造玄曰書畫服玩宜在左右且兵凶戰危脫有意外當使輕而易運衆咸笑之玄所親仗惟桓偉而已先欲徵還以自副二偉既死玄甚恇懼初玄常以其父王業垂成以己弱年不昌前構常懷恨憤及昌明死便有四方之計既克建業無復居下之心及偉死慮一己單危益欲速成大業卞範之之徒既慮事變且幸其利咸共催促於是殷仲文等並已撰集策命矣德宗加玄相國總百揆封南郡南平宜都天門零陵桂陽營陽衡陽義陽建平十郡為楚王備九錫之禮揚州牧領平西將軍豫州刺史如故遣司徒王謐授相國印綬光祿大夫武陵王司馬遵授楚王璽策德宗先遣百僚固請又云當親幸敦喻十二月德宗禪位於玄大赦所部稱永始元年初欲改年為建始左丞王納之曰建始者晉趙王倫之號也於是易為永始復同王莽始貴之年玄入建鄴宮逆風迅激旌旗服章儀飾一皆傾偃是月酷寒此日尤甚多行苛政而時施小惠迎溫神主進于太廟玄遊行無度至此不出殿上施金額流蘇絳帳頗類車王莽仙蓋太廟郊齊皆二日而已又其廟祭不及於祖以玄曾祖已上名位不顯故不列序且以王莽立九廟見譏前史遂以一廟矯之又毀僭晉小廟以崇臺榭其庶母蒸嘗未有定所慢祖忘親時人知其不永是月玄出遊水南飄風飛其儀蓋又欲造大輦使容三十人坐以二百人輿之玄驕逸荒縱不恤時事奏案停積了不省覽或親細事手注直官自用令史制度亂出主司奉答不暇晨夜遊獵文武因乏直侍之官皆繫馬省中休下之吏留供土木之役朝士勞瘁百姓力盡民之思亂十室而八德宗彭城內史劉裕因是斬徐州刺史桓修於京口與沛國劉毅東海何無忌收衆濟江玄加桓謙征討都督召侍官皆入止省中玄移還上宮百僚步從赦揚豫徐兗青冀六州遣頓丘太守吳甫之右衛將軍皇甫敷北拒劉裕於江乘裕斬甫之進至羅落橋又梟敷首玄外粗猛內恇怯及聞二將已沒志慮荒窘計無所出日與巫術道士為厭勝之法乃謂衆曰朕其敗乎黃門郎曹靖對曰神怒民怨臣實憂懼玄曰民怨可然神何為怒對曰移晉宗廟飄泊無所大楚之祭不及於祖此其所以怒也玄曰卿何不諫對曰輦上諸君子皆以為堯舜之世臣何敢諫玄使桓謙何淡之屯于東掖門卞範之屯覆舟山西衆合二萬又遣武衛庾賾之配以精卒利器援助謙等謙等大敗玄聲云赴戰將子姪出南掖門西至石頭先使殷仲文具船於津遂相與南走經日不得食左右進以粗粥咽不能下玄子升五六歲抱玄胸而撫之玄悲不自勝玄挾德宗發尋陽至江陵西中郎將桓石康納之張幔屋止城南署置百官以卞範之為尚書僕射殷仲文為徐州其餘各顯用玄謂諸侍臣曰卿等並升清塗翼從朕躬都下竊位者方應謝罪軍門其見卿等入石頭無異雲霄中人也玄以奔敗之後懼法令不肅遂輕怒妄殺逾甚暴虐殷仲文諫之玄大怒曰漢高魏武幾遇敗但諸將失利耳以天文惡故還都舊楚而羣小愚惑妄生是非方當糾之以猛未宜施之以恩也荊江郡守以玄播越咸遣使通表有匪寧之辭玄悉不受乃更令所在表賀遷都玄在道自作起居注其拒劉裕事自謂算略無失諸將違節度以至於敗不暇謀議軍事惟誦述寫傳之劉裕遣其冠軍將軍劉毅發建鄴追之玄軍屢敗玄常裝輕舸於舫側故其兵人莫有鬬志玄乃棄衆而走餘軍以次崩散遂與德宗還江陵初玄留德宗妻子巴陵殷仲文與玄同舟乃說玄求別舫收集散軍遂以德宗妻歸于建鄴玄入江陵城南平太守馮該勸玄更戰玄欲出漢中投梁州刺史桓希夜中處分將發城內已亂禁令不行將親近腹心百許人出城北至城門左右即於暗中斫玄面前後相殺交橫盈路玄僅得至船德宗入南郡府玄既下船猶欲走漢中玄屯騎校尉毛修之誘以入蜀遂與石康等泝江而上達枚回洲為益州參軍費恬等迎射之箭如雨下玄中流矢子升輒拔之益州督護馮遷抽刃而登玄艦玄曰是何人也敢殺天子遷曰我自欲殺天子之賊耳遂斬玄首并石康等斬升于江陵市傳送玄首梟于朱雀門玄既敗桓謙匿於沮中桓振逃于華容之浦陰聚黨數千人晨襲江陵克之桓謙亦聚衆而出振既至問玄子升所在知升已死欲殺德宗謙苦禁之於是為玄舉哀諡為武悼皇帝謙率羣官復立德宗振自為都督八州鎮軍將軍荊州刺史謙復本職又加江豫二州刺史後德宗益州刺史毛璩殺桓希漢中桓振寇江陵為唐興所斬其餘親從或當時擒獲或奔散外境數年之間並敗滅之海夷馮跋字文起小名乞直伐本出長樂信都慕容永僭號長子以跋父安為將永為垂所滅安東徙昌黎家于長谷跋飲酒至一石不亂母弟素弗次丕次洪皆任俠放逸不修行業跋恭慎勤稼穡既家昌黎遂同夷俗後慕容熙僭號以跋為殿中左監稍遷衛中郎將後坐事逃亡既而熙政殘虐民不堪命跋乃與從兄萬泥等二十三人結謀跋與二弟乘車使婦人御潛入龍城匿於孫護之室以誅熙乃立夕陽公高雲為主以跋為侍中征北大將軍開府儀同三司封武邑公事皆決跋兄弟太宗初雲為左右所殺跋乃自立為燕王置百官號年太平于時永興元年也跋撫納契丹等諸落頗來附之太宗遣謁者于什門喻之為跋所留語在什門傳泰常三年和龍城有赤氣蔽日自寅至申跋太史令張穆以為兵氣言於跋曰大魏威制六合而聘使隔絶自古鄰國未有不通之理違義致忿取敗之道恐大軍卒至必致吞滅宜還魏使奉修職貢跋不從太宗詔征東大將軍長孫道生率衆二萬討之跋嬰城固守不克而還神二年跋有疾其長子永先死立次子翼為世子攝國事勒兵以備非常跋妾宋氏規立其子受居深忌翼謂之曰主上疾將瘳奈何代父臨國乎翼遂還宋氏矯絶內外遣閹人傳問翼及跋諸子大臣並不得省疾惟中給事胡福獨得出入專掌禁衛跋疾甚福慮宋氏將成其計乃言於跋弟文通勒兵而入跋驚怖而死文通襲位翼勒兵出戰不利遂死跋有男百餘人悉為文通所殺文通跋之少弟也本名犯顯祖廟諱高雲僭號以為征東大將軍領中領軍封汲郡公跋立為尚書左僕射改封中山仍為領軍內掌禁衛外總朝政歷位司徒及自立乃與劉義隆交通延和元年世祖親討之文通嬰城固守文通營丘遼東成周樂浪帶方玄菟六郡皆降世祖徙其三萬餘戶于幽州文通尚書郭淵勸其歸誠進女乞為附庸保守宗廟文通曰負釁在前忿形已露降附取死不如守志更圖所適也先是文通廢其元妻王氏黜世子崇令鎮肥如以後妻慕容氏子王仁為世子崇母弟廣平公朗樂陵公邈相謂曰大運有在家國已亡又慕容之譖禍將至矣於是遂出奔遼西勸崇來降崇納之會世祖使給事中王德陳示成敗崇遣邈入朝世祖遣兼鴻臚李繼持節拜崇假節侍中都督幽平二州東夷諸軍事車騎大將軍領護東夷校尉幽平二州牧封遼西王録其國尚書事食遼西十郡承制假授文官尚書刺史武官征虜已下文通遣其將封羽率衆圍崇世祖詔永昌王健督諸軍救之封羽又以凡城降徙其三千餘家而還文通遣其尚書高顒請罪乞以季女充掖庭世祖許之徵其子王仁入朝文通不遣其散騎常侍劉訓言於文通曰雖結婚和通而未遣侍子魏若大舉將有危亡之慮夫以重山之隘劉禪銜璧長江之難孫皓歸命況魏強於晉氏燕弱于吳蜀願時遣世子以恭大國之命然後收離集散厚布恩澤分賑倉廩以濟民乏勸督農桑以邀秋稔庶大業危而更安社稷可以永保文通大怒殺之世祖又詔樂平王丕等討之日就蹙削上下危懼文通太常陽復勸文通請罪乞降速令王仁入侍文通曰吾未忍為此若事不幸且欲東次高麗以圖後舉曰魏以天下之衆擊一隅之地以臣愚見勢必土崩且高麗夷狄難以信期始雖相親終恐為變若不早裁悔無及也文通不聽乃密求迎於高麗太延二年高麗遣將葛盧等率衆迎之入和龍城脫其弊褐取文通精仗以賦其衆文通乃擁其城內士女入于高麗先是其國有狼夜繞城羣嘷如是終歲又有鼠集於城西闐滿數里西行至水則在前者銜馬矢迭相齧尾而渡宿軍地燃一旬而滅觸地生蛆月餘乃止和龍城生白毛長一尺二寸文通至遼東高麗遣使勞之曰龍城王馮君爰適野次士馬勞乎文通慚怒稱制答讓之高麗乃處之於平郭尋徙北豐文通素侮高麗政刑賞罰猶如其國高麗乃奪其侍人質任王仁文通忿怨之謀將南奔世祖又徵文通於高麗高麗乃殺之於北豐子孫同時死者十餘人文通子朗邈朗子熙在外戚傳島夷劉裕字德輿晉陵丹徒人也其先不知所出自云本彭城彭城人或云本姓項改為劉氏然亦莫可尋也故其與叢亭安上諸劉了無宗次裕家本寒微住在京口以賣履為業意氣楚剌僅識文字樗蒲傾産為時賤薄嘗負驃騎咨議刁逵社錢三萬經時不還逵以其無行録而徵責驃騎長史王謐以錢代還事方得了落魄不修廉隅天興二年僭晉司馬德宗遣其輔國將軍劉牢之東討孫恩裕應募始為牢之參軍恩北寇海鹽裕追勝之以功稍遷建武將軍下邳太守劉牢之討桓玄裕參其軍事牢之降裕為玄從兄桓修中兵參軍孫恩死餘衆推恩妹夫盧循為主玄遣裕征之裕破循于東陽永嘉循浮海奔逸加裕彭城內史及桓玄廢德宗而自立裕與弟道規劉毅何無忌潛謀舉兵桓修弟思祖鎮廣陵道規劉毅先為之佐天賜初裕與何無忌等旦候城門開率衆斬玄徐州刺史桓修於京口其日劉毅道規等亦斬思祖因收衆濟江河內太守辛扈興農太守王元德振威將軍童厚之亦與裕剋是日取玄毅兄邁時在建業毅遣周安要之邁懼而告玄玄遣頓丘太守吳甫之右衛將軍皇甫敷北拒裕率衆宿于竹里遇甫之於江乘裕執長刀直入其陳斬甫之進至羅落橋又斬敷首玄使桓謙屯東陵卞範之屯覆舟山西裕又破之玄大懼乃攜子姪浮江南走裕入鎮石頭以德宗司徒王謐為録尚書領揚州刺史立留臺總百官裕為使持節都督揚徐兗豫青冀幽并八州鎮軍將軍徐州刺史令道規等率衆追玄裕因是相署名位遣尚書王嘏等迎德宗燔桓溫神主于宣陽門外尋殺尚書左僕射王愈及其子綏納等裕以司馬遵為大將軍承制入居東宮公卿以下莫不畢拜乃大赦惟玄等不在例是夜司徒王謐逃走劉毅以其手解德宗璽綬宜誅之裕以其償錢之惠固請免之乃遣丹楊尹孟昶迎焉無忌道規至于桑落洲破桓玄諸將進據尋陽加裕都督江州劉毅復敗桓玄於崢嶸洲玄乃棄衆單舸奔走挾德宗奔于江陵裕領青州刺史甲仗百人入殿毅等平巴陵德宗復位於江陵改年曰義熙及還建業裕進侍中車騎將軍都督中外諸軍事飾讓不受加録尚書事又詐不受乃出鎮丹徒改授都督十六州餘如故又領兗州乃解青州盧循破廣州裕仍以循為廣州刺史其黨琅邪人徐道覆為始興相裕又都督交廣二州又封裕豫章郡公邑萬戶絹三萬匹加侍中進號驃騎將軍儀同三司又進裕揚州刺史録尚書事居於東府裕遣劉敬宣伐蜀為譙道福所敗乃免敬宣官裕自降為中軍將軍開府如故永興初慕容超大掠淮北執德宗陽平太守劉千載濟南太守趙元驅掠千餘家而歸裕乃伐超遂屠廣固執超斬其王公以下三千人納口萬餘馬二千匹夷其城隍送超于建業斬之裕是行也徐道覆勸盧循令乘虛而出循從之於是南康廬陵豫章諸郡守皆奔走江州刺史何無忌率軍至豫章戰歿于時羣議欲令德宗北徙渡江循遂寇湘中破劉道規於長沙敗劉毅於桑落洲席卷而下裕將孟昶諸葛長民勸裕擁德宗過江裕不從昶謂事必不濟乃自殺裕發居人治石頭城道覆等至即欲於新亭白石渚焚舟而上盧循曰大軍未至孟昶便逆自殺以此而推建業尋應有變但按甲守之不憂不濟也乃屯軍於蔡洲循乃率衆數萬上南岸至于丹陽郡遂遣焚京口金城姑熟寇掠塗中及江寧蕪湖循以阮賜為豫州刺史裕中軍參軍尚靖宣城內史毛修之破賜於姑熟獲其輜重賜乃退又加裕太尉中書監黃鉞裕受黃鉞盧循既不戰乃告道覆曰師老矣可還據尋陽并力取荊州徐以三分有二之勢與下流爭衡猶可以濟也乃自蔡洲南退裕遣輔國將軍王仲德等追之裕又遣建威將軍孫季高率衆自海道襲番禺裕自以舟師南伐季高乘海兼行奄至番禺循不以海道為防既至而覺衆乃大驚季高悉力而上四面攻之仍屠其城盧循父嘏及長史孫建之並以輕舟奔始興循與道覆率衆而下裕衆軍擊之循等還尋陽循欲遁於豫章乃悉力柵斷左里裕諸軍乘勝而擊之循單舸徑還廣州道覆還始興裕還為大將軍揚州牧班劍二十人本官如故徐道覆至始興猶據山澗劉蕃等攻之道覆先鴆妻子然後自殺盧循至番禺收衆攻季高劉蕃遣沈田子討之循奔走餘衆從嶺道襲合浦克之進攻交址交州刺史杜惠度屢戰克捷循投水而死裕自為太尉中書監裕殺尚書左僕射謝混兗州刺史劉蕃裕既權重便懷異志以荊州刺史劉毅頗有勇略又據上流之所心畏惡之遂自討毅遣參軍王鎮惡等襲江陵鎮惡至豫章口焚毅舟艦毅兵逆戰不能抗鎮惡馳入外城于時毅病乃阻內城鎮惡焚諸門攻之其徒乃潰毅自北門出走縊于道側斬尸於市誅其子姪裕至江陵誅南蠻校尉郗僧施衛軍咨議謝邵等裕本寒微不參士伍及擅時政便肆意殺戮以威懼下初以刁逵縛之之怨誅其兄弟又以王愈謝混郗僧施之徒並皆時望遂悉害之分荊州為湘州裕自總督裕還於東府召諸葛長民屏人間語密令壯士丁旿等出自幔後於座拉之長民墜地死於牀側亦以才雄見忌也荊州刺史司馬休之頗得衆心裕內懷忌憚神二年率衆討之遣龍驤將軍蒯恩等為前軍裕進領荊州刺史加黃鉞雍州刺史魯宗之率其子軌會休之于江陵軌等軍敗乃與休之俱奔襄陽裕自領南蠻校尉休之等奔姚興裕為太傅揚州牧劍履上殿入朝不趨讚拜不名置左右長史司馬從事中郎四人餘如故裕又領平北將軍徐兗二州刺史增督南秦州尋督中外諸軍事裕志傾僭晉若不外立功名恐人望不許乃西伐姚泓自領征西將軍司豫二州刺史尋領北雍州刺史加前後部羽葆鼓吹增班劍為四十人子義符為中軍將軍監太尉留府事給鼓吹一部右僕射劉穆之為左僕射領軍中軍二府軍司入居東府總攝內外穆之謂龍驤將軍王鎮惡曰公今委卿以關中卿其勉之鎮惡曰吾今不克咸陽誓不濟江而公九錫不至者亦卿之責矣裕率衆軍至彭城加鎮北將軍徐州刺史遣中兵參軍沈林子自汴入河冠軍檀道濟與王鎮惡步出淮肥裕將王仲德泛濟入河德宗封裕十郡為宋公加相國九錫僭擬魏晉故事王鎮惡進至宜陽獨取潼關沈林子自襄邑屯于陝城姚泓諸將不能抗始裕入河西上太宗遣將軍娥清長孫嵩等屯於河畔裕遣朱超石劉榮祖等渡河長孫道生破之擒斬其將楊豐等裕遣將軍王仲德趙倫之率沈田子等入武關屯軍青泥沈林子由秦嶺會田子於堯柳城姚泓率衆數萬不戰而還裕至關頭鎮惡至渭橋破泓軍於橫門裕至長安執姚泓以歸斬于建業市裕以其子義真為雍州刺史鎮咸陽進裕為宋王增十郡置百官一擬舊制裕還彭城赫連屈丐掠渭陽義真遣沈田子率軍討之田子退軍陘上鎮惡往就田子議之田子斬鎮惡於幕下又殺其兄弟羣從七人田子馳還云鎮惡有異志義真長史王修執而斬之義真與左右多為不法王修每裁割之左右咸怨白義真曰王修以關中阻險兵食又足欲謀反叛宜早圖之義真遂遣左右殺修裕聞之以朱齡石為雍州刺史義真發自長安將走江東諸將競收財貨次於灞上赫連昌率衆追之既至青泥義真大敗蒯恩與安西司馬毛修之並被擒獲參軍段橫名犯高祖廟諱單馬負義真走歸朱齡石亦棄長安奔就龍驤將軍王敬先于曹公故壘既而城陷被執見殺德宗死裕立德宗弟德文裕又自增十郡裕遣司馬傅亮赴建業令徵己入輔德文禪其位遂自號為宋改年為永初時泰常五年也裕既僭立頻請和通太宗許之六年裕遣其中軍將軍沈範索季孫等朝貢七年五月裕死子義符僭立太宗以其禮敬不足遣山陽公奚斤等率步騎二萬於滑臺渡河南討義符司州刺史毛德祖遣司馬翟廣領步騎三千來拒司空奚斤以千餘騎徇陳留太守嚴稜率衆降仍攻滑臺其東郡太守王景度奔走斬其司馬陽瓚德祖又遣其將竇應明攻輜重于石濟奚斤於土樓大破廣等乘勝徑至虎牢義符遣其將杜垣等與徐州刺史王仲德次湖陸太宗詔安平公叔孫建等軍於泗瀆口義符兗州刺史徐琰委尹卯城奔退於是泰山諸郡悉棄戍而走太宗詔蒼梧子公孫表等復攻虎牢義符遣將檀道濟率師赴救八年義符改年為景平奚斤進攻金墉義符河南太守王涓之出奔太宗南巡至鄴奚斤自金墉還圍虎牢太宗又詔安平公叔孫建等東擊青州其刺史竺夔守東陽城濟南太守垣苗自梁鄒奔夔奚斤分軍攻潁川太守李元德奔還項城斤又遣騎破高平郡所統五縣略居人二千餘家叔孫建以時暑班師檀道濟王仲德向青州遂不敢進太宗至虎牢因幸洛陽乃北渡河斤克虎牢擒德祖及其滎陽太守翟廣廣武將軍竇霸等義符豫州刺史劉粹屯項城不敢進斤遣步騎至許昌潁川太守索元德奔項城遂圍汝陽太守王公度突圍而出仍破邵陵掠萬餘口而還始光初義符司空徐羡之尚書令傅亮領軍謝晦等專其朝政收其廬陵王義真徙于新安郡殺之義符昏暴失德羡之等勒兵入殿時義符在華林舟中兵士競進殺其侍者扶義符出東閣廢為營陽王遂徙于吳郡於金昌亭殺之亮等立義符弟荊州刺史義隆號年元嘉遣使趙道生朝貢二年徐羡之傅亮等歸政於義隆不許三年義隆信其侍中王華之言誅羡之傅亮遣其將檀道濟等討荊州刺史謝晦晦率衆東下謀廢義隆以討王華為辭破義隆將到彥之及聞道濟將至晦衆崩散晦走江陵乃攜其弟遁等北走至安陸延頭為戍主光順之所執斬于建業八月義隆使其殿中將軍吉朝貢神二年又遣殿中將軍孫橫之朝貢三年又遣殿中將軍田奇朝貢尋遣其右將軍到彥之安北將軍王仲德兗州刺史竺靈秀舟師入河驍騎將軍段橫寇虎牢又遣其豫州刺史劉德武後將軍長沙王義欣至彭城為後繼到彥之寇碻磝分軍向虎牢及洛陽世祖詔河南諸軍收衆北渡以驕之尋詔冠軍將軍安頡等率衆自盟津渡攻金墉義隆建武將軍杜驥出奔遂乘勝進攻虎牢陷之斬其司州刺史尹沖叔孫建大破竺靈秀追至湖陸四年頡攻滑臺彥之與王仲德等焚舟棄甲走歸彭城義隆又遣檀道濟救滑臺叔孫建長孫道生擊之道濟至高梁山頡等攻克滑臺擒其司徒從事中郎朱修之等道濟走奔歷城夜乃遁還義隆青州刺史蕭思話亦棄鎮奔于平昌其東陽積粟為百姓所焚延和元年五月義隆又遣趙道生朝貢二年二月詔兼散騎常侍宋宣使於義隆且為皇太子結親九月義隆遣趙道生貢馴象一太延二年三月義隆遣使會元紹朝貢義隆忌其司空檀道濟遂誅之道濟臨死脫幘投地曰乃復壞汝萬里長城三年三月義隆遣其散騎常侍劉熙伯朝貢且論納幣六月義隆女死不果為婚五年十一月義隆遣黃延年獻馴象真君初義隆徙其弟大將軍義康於豫章二年其龍驤參軍巴東扶令育詣義隆理義康義隆大怒收育殺之四月義隆遣使黃延年朝貢十二月義隆又遣黃延年朝貢是歲義隆梁州刺史劉真道將裴方明攻擊楊難當難當捨仇池將妻子來奔三年世祖詔琅邪王司馬楚之等討之安西將軍古弼平西將軍元濟等邀義隆秦州刺史胡崇之於濁水破擒之餘衆奔漢中義隆立難當兄子文德為秦州刺史武都王戍茄蘆弼等討平之義隆遂殺真道方明五年義隆復遣使朝貢六年其員外散騎侍郎孔熙先以才學而不見用太子詹事范曄以家門淫汙為世所薄與熙先及外生謝綜謀殺義隆立其弟前大將軍義康丹陽尹徐湛之告之乃誅曄等徙義康於安成郡御史監守七年詔諸軍掠濟陰金鄉等七縣并驅其青冀二州民戶而還北地人蓋吳聚衆反義隆以吳為安西將軍雍州刺史封北地公規亂雍州詔諸軍討平之義隆好行小計扇動邊民內起山苑窮侈極麗役使百姓江南苦之九年正月義隆遣使獻孔雀十一年二月世祖欲獵於雲夢發使告義隆勿相猜阻義隆請奉詔世祖南巡義隆邊城閉門拒守世祖忿之乃攻懸瓠分遣使者安慰降民其不服者誅戮之義隆汝南南頓汝陽潁川太守並棄城奔走義隆安北將軍武陵王駿遣參軍劉泰之臧肇之殿中將軍尹懷義程天祚等以千餘騎至汝陽永昌王仁擊破之斬泰之肇之執天祚等義隆又遣寧朔將軍王玄謨率其太子步兵校尉沈慶之鎮軍咨議參軍申坦等入河青冀二州刺史蕭斌及駿水陸並進太子左衛率臧質統驍騎將軍王方回安蠻司馬劉康祖右軍參軍梁坦造許洛右將軍豫州刺史南平王鑠太尉江夏王義恭為諸軍節度梁南秦二州刺史劉秀之統輔國將軍楊文德宣威將軍劉洪宗向汧隴護軍將軍蕭思話部龍驤將軍杜坦竟陵太守劉德願向武關義隆令王公妃主及其朝士牧守下逮富人通出私財以助軍費士庶怨之南兗及青冀兗豫三五簡發以配戎行揚南徐兗江州富民並四分之一建威司馬申元吉趣泗瀆蕭斌至碻磝王玄謨遣軍主王寶惠攻滑臺右軍蕭鑠遣中兵參軍梁坦等進軍小索世祖詔諸軍援滑臺大敗王寶惠等王玄謨走還碻磝蕭斌遣申坦與梁坦垣護之據兩當城斌退還歷下及車駕渡河梁坦退走棄甲山積車駕發滑臺過碻磝義隆又遣雍州刺史竟陵王誕率其將薛安都柳元景等入盧氏進攻弘農詔洛州刺史張提率衆度崤蒲城鎮將何難於風陵堆濟河秦州刺史杜道生至閿鄉元景退走十一月車駕從東安山出下邳義隆鄒山戍主魯陽陽平二郡太守崔邪利降楚王建南康侯杜道俊進軍清西至留城義隆鎮軍劉駿參軍馬文恭至蕭城軍主嵇玄敬至留城並為覘候見官軍俱時退走永昌王仁攻懸瓠拔之獲義隆守將趙淮過定項城破尉武戍執其戍主進攻壽陽屯兵於孫叔敖冢掠馬頭鍾離二郡義隆遣左軍將軍劉康祖赴壽陽與仁相遇仁大破之盡坑其衆斬康祖傳首示壽春獲其將胡盛之王羅漢等以所斬首使軍士曳之繞城三匝積之城西高與城齊劉鑠乃焚四郭廬舍嬰城固守車駕至盱眙淮泗義隆遣輔國將軍臧質率師至盱眙頓軍城北六軍於上流濟淮質遣司馬胡崇之等率所領於山上立營建威將軍毛熙祚據城前大浦詔攻二軍斬崇之熙祚等及他首數千級衆悉赴水死淮南之民皆詣軍降高梁王那出山陽永昌王仁於壽陽出橫江凡所經過莫不風靡車駕登於瓜步伐葦結筏示欲渡江義隆大懼欲走吳會建業士女咸荷擔而立義隆遣黃延年朝於行宮獻百牢貢其方物并請和求進女於皇孫世祖以師婚非禮許和而不許婚初義隆欲遣軍侵境其臣江湛徐湛之贊成其事而義隆太子劭與蕭思話沈慶之謂義隆曰昔檀道濟到彥之無利而反今將帥士衆不及於前不可輕動兵甲時湛等在坐義隆使與慶之謀議慶之曰治國如治家耕當問奴織當問婢今欲伐國而與白面書生輩謀之事何由濟義隆大笑遂不納慶之言至是登石頭城樓而望甚有憂色歎曰若檀道濟在豈應至此邵乃委罪於江徐義隆曰此自吾意不關二人也正平元年正月世祖饗會於瓜步既許和好詔班師其江北之民歸降者數十萬計凡克南兗豫徐兗青冀六州其軍鋒殺掠不可勝算時義隆江北蕭條境內搔擾義隆慮義康為亂遣使殺之葬以侯禮義隆慚恚歸罪於下降義恭為儀同三司蕭斌王玄謨並免所居職十月義隆遣其將軍孫蓋等朝貢興安元年義隆遣撫軍將軍蕭思話率其將張永等攻碻磝詔諸軍擊破之永等退走思話遣建武將軍垣護之至梁山逆軍尚書韓茂率騎逆擊之思話退還麋溝義隆又遣雍州刺史臧質向崤陝梁州刺史劉秀之輔國將軍楊文德出子午豫州刺史長孫蘭遣騎破之秀之等僅以身免臧質柳元景薛安都等至關城並相繼敗走是年義隆太子劭及始興王休明令女巫嚴道育呪詛義隆事發義隆憤愧自失廢於政事乃議黜劭殺休明屢召尚書僕射徐湛之吏部尚書江湛侍中王僧綽等謀議僧綽曰當斷不斷反受其亂惟願以義割恩略小不忍不爾便應坦懷如初無煩疑論不可使難生慮表取笑千載義隆曰卿可謂能斷大事此不可不殷勤三思義康始死人謂我無復慈愛之道僧綽又云臣恐千載之後言陛下易於裁弟難於廢子義隆默然休明母潘有寵於義隆義隆以廢立之謀告之潘請赦弗許遂告休明休明馳報劭劭知己當廢遂夜召左右隊主陳叔兒詹叔兒齊帥張超之任建之等總二千餘人被甲自衛又召左衛率袁淑中舍人殷仲素左積弩將軍王正見又呼左軍長史蕭斌劭曰朝廷信讒當見罪廢內省無過不能受枉明當入殿卿等必不得異乃遍拜告哀衆皆驚不得答袁淑良久曰自古無此類願加善思劭怒變色於左右咸云伏聽令旨明晨斬淑劭守萬春門乃告門者曰我受敕入有所收可助我督後隊令速劭又詐義隆敕云魯秀謀反汝明可守關將兵入討也故士卒信之超之等率十餘人走入雲龍門拔刃徑登含章殿義隆夜與徐湛之屏人間語時猶未訖門戶並無侍衛義隆迫急以几自鄣兵刃交下五指俱落超之斬義隆徐湛之為亂兵所害劭分遣掩江湛之斬之休明時在西州來屯中堂劭又使兵殺休明母是日劭登殿受璽綬下書曰徐湛之江湛殺逆無狀吾勒兵入殿已無所及號惋崩衄心肝破裂今罪人斯得元凶克殄卜世靈祚永享無窮思與億兆覃茲更始可大赦天下改元嘉三十年為太初元年劭弟駿時為江州刺史先以西陽蠻反義隆令東宮步兵校尉沈慶之襄陽太守柳元景司空中兵參軍宗賣心並討之駿出次五洲斬劭使於軍門司徒義宣雍州刺史臧質司州刺史魯爽同舉兵駿以沈慶之柳元景宗賣心為前軍駿咨議參軍顏竣專主軍謀劭葬義隆託疾不出臧質子敦逃走劭乃悉聚諸王及大臣徙入城內移南岸百姓渡淮貴賤皆被驅逼建業淆亂駿等發尋陽檄至劭乃移駿數子於侍中省義宣諸男於大倉屋以兵守之使其將魯秀王羅漢等為水陸之備休明及蕭斌為之謀主焚除淮中船舫駿至南洲頓漂洲令柳元景等擊劭劭衆崩潰奔走還宮義恭單馬奔駿勸即位劭大怒遣休明就西省殺義恭子南豐王朗等十二人駿乃僭即大位于新亭於是擒劭休明並梟首大桁暴尸於市經日壞爛投之水中男女妃妾一皆從戮時人為之語曰遙望建康城小江逆流縈前見子殺父後見弟殺兄興光元年駿改年曰孝建其中軍府録事參軍周朗啓駿曰今士大夫父母在而兄弟異計十家而七庶人父子殊産八家而五凡甚者乃危亡不相知飢寒不相恤又疾讒害其間不可稱數宜明其禁以易其風俗弊如此駿不能革臧質遣使說荊州刺史南郡王義宣曰有大負大功挾震主威自古鮮有全者宜在人前早有處分義宣使要豫州刺史魯爽兗州刺史徐遺寶司州刺史魯秀等剋秋起兵爽時昏醉即日便戴黃標稱建平元年板義宣為天子遣信至建業迎弟瑜由是駿知爽反惶懼欲遣迎義宣其竟陵王誕執議不許乃遣左衛將軍王玄謨率衆討爽領軍將軍柳元景鎮軍將軍沈慶之討義宣臧質下戍大雷馳報義宣抗表以誅元景為名遣軍就質使爽與質會于江上玄謨屯兵梁山義宣率衆至尋陽與質俱下雍州刺史朱修之不從義宣臧質進計曰今萬人取南州則梁山中絶萬人守梁山玄謨必不敢動下官浮舟外江直向石頭此上策也義宣將從之其咨議劉諶之曰質不求前驅凶志難測不如盡鋭攻梁山事克然後長驅萬安之計也義宣乃止義宣遣劉諶之就質步攻東壘義宣進自蕪湖赴梁山屯兵西岸玄謨拒質駿將軍垣護之薛安都又摧破之義宣衆潰因風放火焚其舟艦義宣閉船大泣因而迸逸走至江陵荊州司馬竺超民具儀服迎之左右相率潰叛超民送付刺姦朱修之於獄殺之太安二年駿改年為大明駿於新亭造中興佛寺設齊忽有一僧形貌有異衆皆愕然問其名答云名惠明從天安寺來言竟然而滅乃改為天安寺至天安初而彭城歸國四年駿遣其將殷孝祖寇濟州高宗遣清水公封敕文等擊走之又詔征西將軍皮豹子擊孝祖於清東五年豹子還遂掠地至高平大獲而還駿以其南兗州刺史竟陵王誕得士庶之心內畏忌之誕不自安乃治城多聚糧仗駿大怒貶誕爵為侯遣兗州刺史垣閬給事中戴明寶討之誕遣衆出戰斬垣閬誕表駿曰往年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相構難臧魯協從朝野恍忽咸懷憂懼陛下欲建百官羽儀星馳推奉臣前後固執末方賜從社稷獲全是誰之力陛下接遇殷勤屢加崇寵驃騎揚州旬月移授恩秩頻煩復賜徐兗仰屈皇輿遠相餞送臣一遇之感此何以忘庶希偕老永相娛慰豈謂陛下信用讒言遂令小人來相掩襲不任枉酷即加誅揃雀鼠貪生仰違詔敕今親勒部曲鎮扞徐兗昔緣何福同生皇家今有何罪便成胡越陵鋒奮戈萬沒豈顧定蕩之期冀在旦夕右軍宣簡爰及武昌皆以無罪並遇枉酷臣有何過復致於此陛下宮闈之醜豈可一二臨紙悲塞不止所言駿以沈慶之前軍討之親勞軍人賜以金帛慶之軍敗退傷者十四五駿大怒將自往久乃拔之斬誕傳首誕母殷妻徐並自殺城內誅者數千人或先鞭殺而行戮並移首於石頭南岸以為京觀至於風晨雨夜輒聞哀號之響駿淫亂無度蒸其母路氏穢汙之聲布於甌越東揚州刺史顏竣恃舊每戲弄之駿慚怒殺竣和平元年七月駿使其散騎常侍明僧皓朝貢二年三月又使其散騎常侍尹顯朝貢駿雍州刺史海陵王休茂謀將除駿參軍尹玄慶斬休茂是歲凡諸郡士族婚官點雜者悉黜為將吏而人情驚怨並不服役逃竄山湖聚為寇盜侍中沈懷文苦諫不納三年三月駿使其散騎常侍嚴靈護朝貢以沈懷文數直諫付廷尉殺之駿寵姬殷死贈貴妃諡曰宣及葬龍山給鑾輅九旒黃屋左纛羽葆鼓吹班劍虎賁龍之麗功妙萬端山池雲鳳之屬皆裝以衆寶繡帷珠帶重鈴疊眊儀服之盛古今鮮有駿自殷死常懷悲惻神情罔罔廢棄政事或親至殷靈牀酌奠酒飲之既而慟哭流連不能自反其耽昏若此四年獵于烏江之榜口又游湖縣之滿山並與母同行宣淫肆意五年三吳大飢人食草木皮葉親屬互相販鬻劫掠蜂起死者不可勝數是年駿死子子業立性尤凶悖其母疾篤遣呼子業子業曰病人間多鬼那可往其母怒語侍者曰將刀來破我腹那得生如馨兒六年改為永光以奄人華願兒為散騎常侍遊止必同越騎校尉戴法興屢相裁割願兒深以為隙或謂法興為真天子子業為天子願兒具以聞子業乃殺法興驃騎將軍柳元景尚書左僕射顏師伯欲廢子業立太宰義恭以告沈慶之慶之告子業子業出兵誅義恭遂刳剔支體抽裂心藏挑其眼睛投之蜜中謂之鬼目粽又殺柳元景顏師伯並諸子及弟姪乃改年為景和子業除去喪禮服錦縠之衣以石頭城為長樂宮東城為未央宮北邸為建章宮南宅為長楊宮子業自以昔在東宮不為駿所愛及即位常欲毀其墓乃遣發駿所寵殷氏冢殷死駿為之造新安寺於是壞之復欲誅諸遠近尼僧遣使殺其新安王子鸞臨死歎曰惟願後身不復生天王家義恭既誅徐州刺史義陽王昶大懼遣典籤蘧法生啓求還建業子業謂法生曰義陽謀反我正欲誅之法生懼禍走還彭城子業遣沈慶之率師伐昶法生至彭城昶便繕甲諸郡不從昶知事不捷遂來奔子業淫其姑稱為謝氏為貴嬪夫人加以殊禮虎賁劍戟出警入蹕鑾輅龍旗在貴妃之上即義隆第十女其新蔡長公主也子業矯云主喪空設喪事而實納之時其姊山陰主大見愛狎淫恣過度謂子業曰妾與陛下男女雖殊俱託體先帝陛下六宮百數而妾惟一駙馬事不均平乃可如此子業為主置面首左右三十人進爵會稽郡長公主秩同郡王食湯沐邑二千戶給鼓吹一部加班劍二十人每出遊與羣臣陪乘吏部褚淵以有風貌子業使淵侍主子業皆令廟別畫其祖父形像曾入裕廟指裕像曰此渠大英雄生擒數天子次入義隆廟指義隆像曰此渠亦不惡但暮年中不免兒斫去頭次入其父駿廟指駿像曰此渠大好色不擇尊卑顧謂左右曰渠大鼻如何不之即令畫工駿像鼻其父子淫悖書契所無也子業又殺沈慶之撫軍咨議參軍何邁即其新蔡主壻其湘東王彧及建安王休仁山陽王休祐常被猜忌並欲誅之休仁每以調謔悅之故得推遷不死彧休祐形體肥大遂以籠盛稱之彧尤肥號曰猪王廷尉劉矇妾懷孕子業迎入宮冀其生男立為太子及其生子遂為大赦子業召其南平王鑠妃江氏偶諸左右江不從子業曰若不從當殺汝三子江猶不從乃鞭一百殺其子敬猷等巫覡云湘州有天子氣子業將南行以厭之未行前欲悉誅諸叔時彧被拘祕書省與子業左右阮佃夫等謀廢子業子業出華林園共巫竹林堂前射鬼佃夫時為內監乃以告外監典事朱幼主衣壽寂之細鎧主姜産之等寂之抽刃而前産之繼進子業引弓射寂之不中寂之乃斬其首彧既誅子業憂遽不知所為休仁推立彧彧時失履徒跣登西堂備天子儀服呼諸大臣入見事無巨細稱令施行彧以豫章王子尚及山陰主為子業所狎殺之十二月僭即帝位改年為泰始先是子業敕其弟子勛曰聞汝與何邁謀共廢我汝自量體氣何如孝武尋當遣使送藥與汝子勛長史鄧琬與録事參軍陶亮等起兵遣其黨俞伯奇出頓大雷巴東太守孫仲之至于平石與陶亮並統前軍始彧未知子勛起兵加子勛車騎將軍儀同三司符至尋陽鄧琬乃投於地攘袂而起曰殿下當開端門何黃閣之有與陶亮等徵兵馳檄建牙於桑厄時雍州刺史袁顗便勸子勛即位琬乃立宗廟設壇場造乘輿法服立子勛為天子即位江州號義嘉元年子勛以袁顗為尚書左僕射鄧琬為尚書右僕射左司馬張悅為領軍將軍吏部尚書州郡並加爵號彧乃遣領軍將軍王玄謨討之復遣其將沈攸之劉靈出據虎檻初彧聞四方反亂憂遽不知所為休仁請前鋒決勝於是始有防禦之軍攸之軍至江州斬子勛彧慮子勛弟松滋侯子房等年大終不相服休仁遂勸除之因誅駿舅子路休之等以陷子房兄弟於是殺駿子安陸王子綏及子房臨海王子頊永嘉王子仁始安王子真邵陵王子元淮南王子孟臨賀王子産晉熙王子輿及子起子期子悅子頓初駿二十八男其餘先早夭及子業殺子鸞等至是盡殪之矣其骨肉相殘若此之甚彧南新蔡太守常珍奇奉啓請降顯祖詔遣西河公元石京兆侯張窮奇率軍援之皇興元年正月彧遣其散騎常侍貝思散騎侍郎崔小白朝貢初彧遣其鎮軍張永領軍沈攸之以大衆迎其徐州刺史薛安都安都聞永將發乃遣信請降顯祖詔博陵公尉元城陽公孔伯恭率騎二萬救之永等前後奮擊斬首凍沒死者不可勝數又其兗州刺史畢衆敬亦來降款至是徐兗及淮西諸郡青齊二州相尋歸附彧又遣其中領軍沈攸之太子左衛率劉勔寇彭城兗州刺史申纂守無鹽時薛安都略有廣平順陽義成扶風諸郡沈攸之至下邳與元等戰敗而走初彧青州刺史沈文秀冀州刺史崔道固並請歸順詔遣征南大將軍慕容白曜率衆援之文秀等復叛歸彧白曜進軍圍城二年克歷城獲道固彧遣其員外散騎常侍李豐朝貢彧遣沈文秀弟文靜海道救青州文靜至東萊之不期城白曜遣軍克之尋獲東陽城彧遣其員外散騎常侍王希涓朝貢四年六月彧又遣員外散騎常侍劉航朝貢延興元年彧於巖山射雉休祐從在後與其左右相失彧遣壽寂之率諸壯士追躡休祐蹴令墜馬拉而殺之乃揚聲曰驃騎墮馬死召司徒休仁宿尚書下省鴆而殺之自彧立之後民庶凋弊而宮殿器服多更興造初其即位軍人多被超越或有不與戎勤寄名受賞阮佃夫等並被信委凡所談笑言無不行抽進阿黨咸受不次之位故佃夫左右乃有四軍五校羽林給事等官皆市井傭販之人諂附而獲至綱紀不立風政頽弊境內多難民庶嗷然遂廣募義勇置為部曲於是官品淪褫士人渾亂民衆顒顒咸願來奔矣彧遣其司州刺史垣叔通為益州刺史叔通極為聚斂蜀還之貨過數千金知彧好財先送家資之半彧猶嫌少及叔通至建業遣詣廷尉彧先令獄官留之於訊堂彌旬不得出叔通於是悉送其財然後原遣凡蠻夷不受鞭罰輸財贖罪謂之賧時人謂叔通被賧刺史彧嘗宮內大集而裸婦人觀之以為欣笑其妻王氏以扇鄣面獨無所言彧怒曰外舍家寒乞今共為笑樂何獨不視王曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以此為樂外舍之為欣適與此不同彧大怒遣王起去彧末年好事鬼神多所忌諱言語文書有禍敗凶喪及疑似之言應回避者數百千品有犯必加罪戮改騧馬字為馬邊瓜以騧似禍字故也嘗以南苑借張永言且給三百年期訖更申其事皆如此又以宣陽門之名不善甚諱之其太后停尸漆牀移出東宮見之怒甚免中庶子官職局以下坐死者數十人內外常慮犯誤人不自保移牀治壁必祭土神文士為辭祝事如大祭又更忍虐好殺左右失旨忤意往往有刳斫斷截者時遣窺覘淮泗軍旅不息荒弊積久府藏空虛內外百官普斷祿俸而彧奢費過度務為雕侈每所造制必為正御三十副御三十次副三十須一物輒造九十枚境內騷然人不堪命彧又以壽寂之有膽決乃殺之又追降休仁休祐為庶人絶其屬籍諸子徙遠郡休祐母邢妻江付廷尉殺之遣員外散騎侍郎田廉員外散騎侍郎祖德朝貢又殺其巴陵王休若改年為泰豫又遣田廉及員外散騎侍郎劉惠秀朝貢彧又殺太子太傅王景文畏其族盛故也彧死子昱僭立改為元徽昱遣員外散騎常侍田惠紹員外散騎侍郎劉惠秀朝貢其司空桂陽王休範奔尋陽舉兵右衛將軍蕭道成率衆軍出頓新亭越騎校尉張苟兒斬休範首其左右皆散道成遣送其首塗中遇賊遂棄於水中休範之徒乃詐曰殿下猶在新亭於是士庶奔馳候迎是夜休範將杜墨騾等又攻新亭東廂休範參軍江珉等破二縣六署竊掠金帛放諸徒隸由是徒衆復盛燒東宮津陽門乃領軍右府昱將陳顯達率所領至杜姥宅破墨騾軍主全景淵進平白壁宣陽津陽二門斬墨騾等昱遣其員外散騎常侍明曇徽員外散騎侍郎江山圖朝貢五年又遣員外散騎常侍李祖員外散騎侍郎魚長耀朝貢承明初昱建平王景素據京口叛昱昱遣蕭道成前軍將軍周盤龍殿中將軍張倪奴討之攻陷京口斬景素太和初昱以其母數諫責之遂使太醫煮藥欲鴆之左右止之曰若行此事官便應作孝豈復得出入狡獪昱曰汝語大有理乃止初昱母陳氏本李道兒妾彧納之生昱故世中皆呼昱為李氏子昱每自稱李將軍或自名為李統昱直閣將軍申伯宗步兵校尉朱幼司徒左長史沈勃等欲廢昱昱親率羽林兵掩之乃躬運矛鋋手殺勃等闔門嬰稚莫不臠截昱狂走逸遊不捨晝夜腹心所寄數十許人並執兵刃為人之牙爪路行逢人便加斫刺或入人家劫略財賄往來忽狀若鬼魅建業惶振並重關自守又捶拍針鑿錐鋸之屬常以自隨或有忤意輒加酷暴捶陰刺心剖腹之誅日有十數常見臥尸流血然後為樂無所誅害則憂思草草於耀靈殿上養驢數十頭造露車以銀為校具或乘以出入著小袴衫帶挾刀劍與營署女子通好自齎私服贈之常入壚肆飲酒輒與左右歌唱略民雞犬躬自屠割內外畏惡人不自保昱往新安寺夕乃還殿寢於氈幄昱左右楊玉夫楊萬年等見其醉眠乃於幄斬之左右陳奉伯稱敕開承明門出送首於直閣王敬則夜送昱首與中領軍蕭道成道成率左右數十人稱昱行還開承明門入殿云其皇太后令廢昱為蒼梧王立昱弟揚州刺史安成王準初彧晚年痿疾不能內御諸弟姬人有懷孕者輒取以入宮及生男皆殺其母而與其宮人所愛者養之準即桂陽王休範子也荊州刺史沈攸之興兵討道成準改年為升明遣其員外散騎常侍李祖員外散騎侍郎陶貞寶赴國訃并貢方物準司徒袁粲丹陽尹劉秉中領軍劉韞前湘州刺史王蘊等以道成專恣潛謀圖之共推粲為主要引沈攸之以為外援丹陽丞王遜告道成並斬之準遣員外散騎常侍何僴員外散騎侍郎孔逖朝貢三年正月準遣其員外散騎常侍殷靈誕員外散騎侍郎苟昭先朝貢準尋禪位於道成居于東邸道成僭立封準汝陰郡王尋死於丹陽史臣曰桓玄侏張馮劉乃厥疑窮凶極迷為天下笑其夷楚之常性乎
