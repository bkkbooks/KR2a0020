body:
  text: 魏書卷二十六列傳第十四長孫肥尉古真長孫肥代人也昭成時年十三以選內侍少有雅度果毅少言太祖之在獨孤及賀蘭部肥常侍從禦侮左右太祖深信仗之登國初與莫題等俱為大將從征劉顯自濡源擊庫莫奚討賀蘭部並有戰功太祖征蠕蠕大破之肥降其主匹候跋事具蠕蠕傳又從征衛辰及薛干部破滅之蠕蠕別主縕紇提子曷多汗等率部落棄父西走肥以輕騎追至上郡斬之後從征中山拜中領軍將軍車駕次晉陽慕容寶并州刺史遼西王農棄城宵遁肥追之至蒲泉獲其妻子太祖將圍中山慕容寶棄城奔和龍肥與左將軍李栗三千騎追之至范陽不及而還遂破其研城戍俘千餘人中山城內人立慕容普鄰為主太祖圍之普鄰乃出步卒千餘人欲伺間犯圍太祖命肥挑戰僞退普鄰衆追肥太祖截其後盡擒斬之時以士馬少糧遂罷中山之圍就穀河間慕容賀鄰殺普鄰而自立車駕次魯口遣肥帥七千騎襲中山入其郛而還賀鄰以步騎四千追肥至泒水肥自魏昌擊之獲鎧騎二百肥中流矢瘡重乃還中山平以功賜爵琅邪公遷衛尉卿改爵盧鄉時中山太守仇儒不樂內徙亡匿趙郡推羣盜趙准為主妄造妖言云燕東傾趙當續欲知其名淮水不足准喜而從之自號使持節征西大將軍青冀二州牧巨鹿公儒為長史聚黨二千餘人據關城連引丁零殺害長吏扇動常山巨鹿廣平諸郡遣肥率三千騎討之破准於九門斬仇儒生擒准詔以儒肉食准傳送京師轘之於市夷其族除肥鎮遠將軍兗州刺史給步騎二萬南徇許昌略地至彭城司馬德宗將劉該遣使詣肥請降貢其方物姚平之寇平陽太祖將討之選諸將無加肥者乃徵還京師遣肥與毗陵王順等六萬騎為前鋒車駕次永安平募遣勇將率精騎二百窺軍肥逆擊擒之匹馬不返平退保柴壁太祖進攻屠之遣肥還鎮兗州肥撫慰河南得吏民心威信著於淮泗善策謀勇冠諸將每戰常為士卒先前後征討未嘗失敗故每有大難令肥當之南平中原西摧羌寇肥功居多賞賜奴婢數百口畜物以千計後降爵為藍田侯天賜五年卒諡曰武陪葬金陵子翰襲爵翰少有父風太祖時以善騎射為獵郎太宗之在外翰與元磨渾等潛謀奉迎太宗即位遷散騎常侍與磨渾等拾遺左右以功遷平南將軍率衆鎮北境威名甚著蠕蠕憚之後為都督北部諸軍事平北將軍真定侯給殿中細拾隊加旌旗鼓吹蠕蠕每犯塞翰拒擊有功進爵為公世祖即位徵還京師進封平陽王加安集將軍蠕蠕大檀之入寇雲中世祖親征之遣翰率北部諸將尉眷自參合以北擊大檀別帥阿伏干於柞山斬首數千級獲馬萬餘匹又與東平公娥青出長川以討大檀大檀衆北遁追擊克獲而還尋遷司徒襲赫連昌破之世祖復征昌翰與廷尉道生宗正娥清率騎三萬為前驅昌戰敗奔上邽翰以八千騎追之至高平不及而還從襲蠕蠕車駕度漠大檀奔走其弟匹黎率衆赴之遇翰交戰匹黎衆潰走斬其渠帥數百人翰清正嚴明善撫將士太祖甚重之神三年薨深見悼惜為之流涕親臨其喪禮依安城王叔孫俊故事賻賜有加諡曰威陪葬金陵子平成襲爵降為公平成少以父任為中散纍遷南部尚書卒陪葬金陵子渾襲爵渾初為中散久之為彭城鎮將太和中卒子盛襲爵翰弟受興世祖時從征平涼以功賜爵長進子除河間太守卒子安都襲爵顯祖時為典馬令受興弟陳世祖時為羽林郎征和龍賊自西門出將犯外圍陳擊退之追斬至長城下以功賜爵五等男又從征涼州為都將領入官遷殿中給事中進爵為子遷駕部尚書復出為北鎮都將陳性寬厚好學愛士所歷輒為人追思之高宗即位進爵吳郡公加安東將軍興光二年卒贈散騎常侍吳郡王諡曰恭陪葬金陵子頭襲爵高宗時為中散遷內行長典龍牧曹天安初卒子拔襲爵陳弟蘭世祖初為中散常從征伐典御兵器賞賜甚厚後以破平涼功賜爵睢陽子加奮武將軍遷散騎常侍北部尚書後除豫州刺史卒子烏孤襲爵高祖初出為武都鎮將入為散令子樂孝靜時金紫光祿大夫肥弟亦干太祖初為羽林郎從平中原除廣平太守卒子石洛世祖初為羽林郎稍遷散騎常侍從征赫連昌為都將以功拜樂部尚書賜爵臨淮公加寧西將軍神中卒諡曰簡子真少以父任為中散從征平涼以功賜爵臨城子拜員外散騎侍郎廣武將軍襲父爵降為建義將軍臨淮侯遷司衛監征蓋吳遷殿中尚書加散騎常侍從駕征劉義隆至江進爵南康公加冠軍將軍卒於軍子吳兒襲爵高祖初為中散武川鎮將太和初卒贈州刺史子長樂襲坐事爵除後歷陵江將軍羽林監子榮族武定中征西將軍繁昌男吳兒弟突朔州長史子元慶平州倉曹參軍尉古真代人也太祖之在賀蘭部賀染干遣侯引乙突等詣行宮將肆逆古真知之密以馳告侯引等不敢發染干疑古真泄其謀乃執栲之以兩車軸押其頭傷一目不伏乃免之登國初從征庫莫奚及叱突鄰並有功又從救賀蘭破衛辰子直力鞮復擊慕容寶於參合陂又從平中原以功賜爵束州侯加建節將軍太宗初為鴻飛將軍率衆五千鎮大洛城太宗西巡古真與奚斤等率前軍討越勒部大破之獲馬五萬匹牛羊二十萬頭掠二萬餘家西還泰常三年除定州刺史卒子億萬襲卒子盛襲古真弟太真太宗初為平南將軍相州刺史太真弟諾少侍太祖以忠謹著稱從圍中山諾先登傷一目太祖歎曰諾兄弟並毀其目以建功效誠可嘉也寵待遂隆除平東將軍賜爵安樂子從討姚平還拜國部大人太宗初為幽州刺史加東統將軍進爵為侯長孫道生之討馮跋也諾與驍騎將軍延普率師次遼西轉寧東將軍進爵武陵公諾之在州有惠政民吏追思之世祖時薊人張廣達等二百餘人詣闕請之復除安東將軍幽州刺史改邑遼西公兄弟並為方伯當世榮之燕土亂久民戶凋散諾在州前後十數年還業者萬餘家延和中卒第八子觀襲爵卒子崘襲諾長子眷忠謹有父風太宗時執事左右為大官令時侍臣受斤亡入蠕蠕詔眷追之遂至虜庭大檀問其故眷曰受斤負罪天子逃刑在此不時執送是以來取眷遂擒受斤於大檀前左右救之乃免由是以驍烈聞遷司衛監太宗幸幽州詔眷輔世祖居守後征河南督高車騎臨陳衝突所向無前賊憚之世祖即位命眷與散騎常侍劉庫仁等八人分典四部綰奏機要賜爵山桑侯加陳兵將軍又為安北將軍出鎮北境與平陽王長孫翰擊蠕蠕別帥阿伏干於祚山率師至歌刪山擊蠕蠕別帥便度弟庫仁直引師而北蠕蠕部帥莫孤率高車騎五千乘來逆眷擊破之斬首千餘級又從征蠕蠕眷出白黑兩漠之間擊其東部大獲而還又從征赫連昌眷出南道擊昌於上邽士衆乏糧臨淮公丘堆等督租於郡縣為昌所敗昌乘勝抄掠諸將患之眷與侍御史安頡陰謀設伏邀擊擒昌以功拜寧北將軍加散騎常侍進爵漁陽公後從征和龍眷督萬騎前驅慰喻降二千餘戶尋為假節加侍中都督豫洛二州及河內諸軍事安南將軍開府鎮虎牢張掖王禿髮保周之反也徵眷與永昌王健等率師討之破保周於番禾保周遁走眷率騎追之保周窮迫自殺詔眷留鎮涼州加都督涼沙河三州諸軍事安西將軍領護羌戎校尉轉敦煌鎮將又擊破吐谷渾俘三千餘口眷歷鎮四蕃威名並著高宗時率師北擊伊吾克其城大獲而還尋拜侍中太尉進爵為王與太宰常英等評尚書事高宗北巡狩以寒雪方降議還眷諫曰今動大衆以威北敵去都不遠而便旋駕虜必疑我有內難雖方寒雪兵人勞苦以經略大體宜便前進高宗從之遂渡漠而還以眷元老賜杖履上殿和平四年薨高宗悼惜之贈大將軍諡曰莊子多侯襲爵多侯少有武幹顯祖時為假節征西將軍領護羌戎校尉敦煌鎮將至鎮上表求率輕騎五千西入于闐兼平諸國因敵取資平定為效弗許高祖初蠕蠕部帥旡盧真率三萬騎入塞圍鎮多侯擊之走以功進號征西大將軍後多侯獵于南山蠕蠕遣部帥度拔入圍敦煌斷其還路多侯且前且戰遂衝圍而入率衆出戰大破之追北數十里斬首千餘級因上疏求北取伊吾斷蠕蠕通西域之路高祖善其計以東作方興難之太和元年為妻元氏所害子建襲爵歷位給事中卒無子建弟那襲爵卒子範襲範弟顯業散騎常侍與太原公主姦通生子彥武定中衛將軍南營州刺史多侯弟子慶賓善騎射有將略高祖時釋褐員外散騎侍郎稍遷左將軍太中大夫肅宗時議欲送蠕蠕主阿那瓌還國慶賓上表固爭不從後蠕蠕遂執行臺元孚大掠北境詔尚書令李崇討之慶賓別將隸崇出塞而返元法僧之外叛蕭衍遣其豫章王蕭綜鎮徐州又詔慶賓為別將隸安豐王延明討之尋除後將軍肆州刺史時爾朱榮兵威漸盛曾經肆州慶賓畏惡之據城不出榮恨慶賓舉兵襲之慶賓別駕姚和內應榮遂害慶賓僚屬拘慶賓還秀容呼為假父後以母憂還都尋起為平東將軍光祿大夫都督鎮汝陰還朝永安二年卒贈車騎將軍雍州刺史又追加侍中司空公慶賓子豹起家員外郎肅宗時行潁州事與蕭衍將裴之禮戰歿豹弟瑾武定中東平太守眷弟地干機悟有才藝馳馬立射五的時人莫能及太宗時為左機令世祖少而善之即位擢為庫部尚書加散騎常侍左光祿大夫領侍輦郎地干奉上忠謹尤善嘲笑世祖見其效人舉措欣悅不能自勝甚見親愛參軍國大謀世祖將征平涼試衝車以攻冢地干為索所罥折脅而卒世祖親往臨撫哭之甚慟贈中領軍將軍燕郡公諡曰惠贈賜豐厚子長壽幼拜散騎常侍遷殿中右曹尚書仍加散騎常侍從征劉義隆至江賜爵會稽公加冠軍將軍高宗時除涇州刺史和平五年卒子彌真襲爵彌真卒無子弟狀德襲爵地干弟侯頭襲地干職為庫部尚書侯頭弟力斤亦以忠謹聞歷位御史中尉并州刺史有政績加冠軍將軍賜爵晉陽侯卒贈平南將軍力斤弟焉陳尚書安樂侯古真族玄孫聿字成興性耿介肅宗時為武衛將軍是時領軍元叉秉權百僚莫不致敬而聿獨長揖不拜尋出為平西將軍東涼州刺史涼州緋色天下之最叉送白綾二千匹令聿染拒而不許叉諷御史劾之驛徵至京覆驗無狀還復任尋卒於州時年五十贈安北將軍朔州刺史子儉武定中開府祭酒史臣曰長孫肥結髮內侍雄烈知名軍鋒所指罔不奔散關張萬人之敵未足多也翰有父風不隕先構臨喪加禮抑有由哉尉真兄弟忠勇奮發義以忘生眷威略著時增隆家業青紫麾旄亦其宜矣
