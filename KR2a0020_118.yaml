body:
  text: 魏書卷一百六下地形志二下第七雍州漢改曰涼治漢陽郡隴縣後治長安領郡五縣三十一京兆郡秦為內史漢高帝為渭南郡武帝為京兆尹後漢因之屬司隸魏改屬領縣八長安漢高帝置二漢晉屬有昆明池周靈臺鎬池彪池水杜二漢晉屬二漢曰杜陵晉曰杜城後改鄠二漢屬右扶風晉屬始平真君七年分屬豐水出焉山北有風涼原有苦谷滻水出焉有杜城新豐漢高帝置二漢晉屬有驪山戲亭首谷水霸城郡治二漢曰霸陵晉改屬有軹道亭長門亭灞水溫泉安昌陂陰槃二漢屬安定晉屬真君七年併新豐太和十一年復有鴻門亭靈谷水戲水藍田二漢晉屬真君七年併霸城太和十一年復有白鹿原馮翊郡故秦內史漢高帝二年更名河上郡九年復為內史武帝為左內史後為左馮翊後改領縣六高陸郡治二漢曰高陵屬晉屬京兆魏明帝改屬有薄水頻陽秦置二漢晉屬有廣武城南鹵原鹽池萬年漢高帝置二漢晉屬京兆後屬有漆沮水蓮祙二漢晉屬有據城下封城廣陽景明元年置鄣太和二十二年置扶風郡故秦內史漢高帝二年更名為中地郡九年復為內史武帝為右內史太初中更名主爵都尉為右扶風後改世祖真君年中併始平郡屬焉領縣五好畤郡治前漢屬後漢晉罷後復有武都城始平魏置晉屬始平有溫泉新市城美陽槐里二漢晉屬始平周曰犬丘秦更名廢丘漢高帝改有板橋泉厔漢武帝置屬後漢晉罷後復真君七年併武功屬焉咸陽郡領縣五石安石勒置秦孝公築渭城名咸陽宮有四皓祠安陵城杜鄠亭竇氏泉周文王祠池陽郡治二漢屬左馮翊晉屬扶風後屬有鄭白渠靈武前漢屬北地後漢罷晉復真君七年分屬焉寧夷有甘泉九山涇陽真君七年併石安景明二年復屬北地郡魏文帝分馮翊之祋祤置領縣七富平真君八年罷泥陽弋居屬焉有北地城漢武帝祠泥陽二漢晉屬真君七年併富平景明元年復有慈城山弋居二漢屬晉罷後復真君七年併富平後復雲陽二漢屬左馮翊晉罷後復屬有蒲池水雲陽宮銅官真君七年置有關山石槃山土門景明元年置有土門山宜君真君七年置有宜君水岐州太和十一年置治雍城鎮領郡三縣八平秦郡太延二年置領縣三雍二漢晉屬右扶風後屬有周城周城真君六年置橫水真君十年分周城置武都郡太延年置領縣三平陽真君六年置有新谷五丈原郿塢南由高車武功郡太和十一年分扶風置領縣二美陽二漢晉屬扶風真君七年罷郡屬焉後屬有岐山太白山美原廟駱谷邵亭莫西太和十一年分好畤置有梁山武都城秦州治上封城領郡三縣十二天水郡漢武帝置後漢明帝改為漢陽郡晉復領縣四上封前漢屬隴西後漢屬漢陽晉屬犯太祖諱改有席水顯新後漢屬漢陽晉屬真君八年併安夷後屬平泉當亭真君八年置略陽郡晉武帝分天水置領縣五安戎前漢曰戎邑屬天水後漢晉罷後改屬有董城綿諸前漢屬天水後漢晉罷後復屬有榆亭隴城前漢屬天水後漢屬漢陽晉罷後復屬有隴城略陽城清水前漢屬天水後漢罷晉復屬阿陽前漢屬天水後屬漢陽晉罷太和十一年復屬漢陽郡真君七年分天水置領縣三黃瓜真君八年置有始昌城陽廉有鄧松山階陵南秦州真君七年置仇池鎮太和十二年為渠州正始初置治洛谷城領郡六縣十八天水郡真君七年置領縣三水南郡治真君二年置平泉真君三年置平原漢陽郡真君五年置領縣二穀泉蘭倉郡治真君三年置有雷牛山黃帝洞武都郡漢武帝置領縣四石門郡治真君九年置有羌道城白水真君九年置郡後改東平真君九年置孔提武階郡領縣三北部南五部太和四年置郡後改赤萬太和四年置郡後改脩城郡領縣四平洛太和四年置柏樹太和八年置下辨二漢晉屬武都郡太和四年分屬焉廣長郡治太和四年置仇池郡領縣二階陵真君四年置有牛頭山倉泉太和四年置南岐州領郡三固道郡延興四年置廣化郡廣業郡東益州治武興領郡七縣十六武興郡領縣四景昌武興州郡治石門武安仇池郡領縣二西鄉西石門槃頭郡領縣二武世萇舉廣萇郡領縣二萇廣新巴廣業郡領縣二廣業廣化梓潼郡領縣二華陽興宋洛叢郡領縣二武都明水益州正始中置領郡五縣十東晉壽郡司馬德宗置魏因之領縣四黃石亭晉安司馬德宗置魏因之晉壽晉惠帝置屬梓潼後屬西晉壽郡領縣一陰平新巴郡司馬德宗置魏因之領縣一新巴司馬德宗置魏因之南白水郡領縣二始平京兆宋熙郡領縣二興樂元壽巴州郡縣闕梁州蕭衍梁秦二州正始初改置領郡五縣十四晉昌郡領縣三龍亭有安國城鎮勢山𡉚攵水興勢延昌三年置南城褒中郡領縣三褒中二漢晉屬漢中後罷永平四年復屬武鄉延昌元年置有牛頭山廉水安康郡劉準置魏因之領縣二安康二漢曰安陽屬漢中漢末省魏復武帝更名屬魏興郡後屬有直水寧都漢中郡秦置領縣三南鄭二漢晉屬漢陰有胡城城固二漢晉屬華陽郡領縣三華陽有黃牛山廉水蕭何城沔陽二漢晉屬漢中後屬有白馬城黃沙城諸葛亮廟嶓冢有嶓冢山漢水出焉南梁州郡縣闕東梁州領郡三縣四戶一千二百二十二金城郡領縣一戶二百八十六直城安康郡領縣一戶六百一十八安康魏明郡領縣二戶三百一十八漢陽寧都涇州治臨涇城領郡六縣十七安定郡漢武帝置太和十一年罷石堂郡以其縣屬領縣五安定前漢屬後漢晉罷後復有銅城臨涇二漢晉屬有洪城朝那二漢晉漢有當原城胡城烏氏二漢晉屬有岐山涇鄉城陽邑城撫夷城石堂有自度山隴東郡領縣三涇陽前漢屬安定後漢晉罷屬後復有薄落山涇水出焉白城方石淵隴山祖居前漢屬罷後復屬武威晉罷後復屬撫夷前漢屬安定後漢晉罷後復屬新平郡後漢獻帝建安中置領縣四白土二漢屬上郡晉屬金城後屬有歧亭嶺爰得前漢屬安定後漢晉罷後復屬有邑成東魏城三水二漢屬安定晉罷後復屬有隨意城高平二漢屬安定晉罷後復屬有石門山趙平郡領縣二鶉觚前漢屬北地後漢晉屬安定後屬有孤原亭臺山東槃平涼郡領縣二鶉陰郡治前漢屬安定後漢屬武威晉罷後復屬有瓦亭涇陽平涼城陰密前漢屬安定後漢罷晉復後屬平原郡領縣一陰槃二漢屬安定晉屬京兆後屬有安城安武城河州有伏乾闕二字真君六年置鎮後改治枹罕領郡四縣十四金城郡漢昭帝置後漢建武十三年囗隴西孝明復領縣二榆中二漢晉屬大夏二漢屬隴西晉屬晉興皇興三年改為郡後復屬有白水金柳城武始郡晉分隴西置領縣三勇田真君八年置郡後改狄道二漢屬隴西晉屬陽素洪和郡領縣三水池真君四年置郡後改藍川真君八年置郡後改蕈州延興四年置臨洮郡二漢晉縣屬隴西真君六年改置領縣三龍城太和十年置石門太和九年置赤水渭州領郡三縣六隴西郡秦置領縣二襄武首陽南安陽郡領縣二桓道中陶廣寧郡領縣二彰新興真君八年罷中陶祿部襄武屬焉原州太延二年置鎮正光五年改置并置郡縣治高平城領郡二縣四高平郡領縣二高平里亭長城郡領縣二黃石白池涼州漢置治隴神中為鎮太和中復領郡十縣二十戶三千二百七十三武安郡領縣一戶三百七十三宜盛臨杜郡領縣二戶三百八十九安平和平建昌郡領縣三戶六百五十七榆中治城蒙水番和郡領縣二戶一百三十九彰燕支泉城郡領縣一戶七十二新陽武興郡領縣三戶三百八十五晏然馬城休屠武威郡漢武帝置領縣二戶三百四十林中襄城有休屠城武始澤昌松郡領縣三戶三百九十七溫泉揟次莫口東涇郡領縣一戶一百九十一台城梁寧郡領縣二戶三百三十一園池貢澤鄯州郡縣闕瓜州郡縣闕華州太和十一年分秦州之華山澄城白水置領郡三縣十三華山郡領縣五華陰前漢屬京兆後漢晉屬農後屬有華山集仙館巨靈原潼關北鄉城重泉城鄭二漢晉屬京兆後屬有廣鄉原鄭城赤城夏陽二漢晉屬馮翊後屬故少梁秦惠文王更名有梁山龍門山黑水城敷西太和十一年分夏陽置有武平城高平城郃陽二漢晉屬馮翊後罷太和二十年復屬澄城郡真君七年置領縣五澄城真君七年置有杏城五泉真君七年置有五泉水濕水石谷城三門真君七年置有陽苑城衙城宮城真君七年置南五泉太和十一年置白水郡太和二年分澄城置領縣三姚谷太和二年置有黃崖山白水太和二年置有五龍山粟邑城南白水太和十一年分白水置有闕五字北華州太和十五年置東秦州後改治杏城領郡二縣七戶一萬四千五百九十六中部郡領縣四戶八千九百二十四中部姚興置魏因之石保有回女山狄道有狄兔城淺石山長城有五郊城敷城郡領縣三戶五千六百七十二敷城有女陰山洛川真君中置定陽豳州皇興二年為華州延興二年為三縣鎮太和十一年改為班州十四年為邠州二十年改焉領郡三縣十西北地郡秦昭王置領縣三彭陽二漢屬安定晉罷後復屬富平二漢晉屬北地後屬有神泉靈州城彰獵山安武前漢屬安定後漢晉罷後復屬趙興郡真君二年置領縣五陽周前漢屬上郡後漢晉罷後復屬有橋山黃帝冢泥陽城高平城秋水獨樂前漢屬上郡後漢晉罷後復屬定安真君二年置趙安真君二年置高望真君二年置有高望山襄樂郡太和十一年置領縣二襄樂前漢屬上郡後漢晉罷後復屬膚施二漢屬上郡晉罷後復屬有五龍山黃帝祠夏州赫連屈孑所都始光四年平為統萬鎮太和十一年改置治大夏領郡四縣九化政郡太和十二年置領縣二革融巖綠闡熙郡太和十二年置領縣二山鹿新獆金明郡真君十二年置領縣三永豐真君十三年置啟寧廣洛真君十年置代名郡太安二年置領縣二呼酋太安二年置有橫水渠搜太和二年置東夏州延昌二年置領郡四縣九徧城郡太和元年置領縣二廣武前漢屬太原後漢晉屬雁門後屬有三城徧城沃野二漢屬朔方晉罷後復屬朔方郡漢武帝置領縣三魏平政和朔方二漢屬晉罷後復有貴堛澤定陽郡二漢縣屬上郡太安中改置領縣二臨戎二漢屬朔方晉罷後復屬臨真有丹陽山白泉上郡秦置領縣二石城因城泰州神元年置雍州延和元年改太和中罷天平初復後陷領郡三縣七河東郡秦置治蒲坂領縣五安定太和元年置蒲坂二漢晉屬有華陽城雷首山南解二漢晉曰解屬後改有桑泉城北解太和十一年置有張楊城猗氏二漢晉屬河東後復屬有介山塘北鄉郡領縣二北猗氏太和十一年置有解城汾陰二漢晉屬河東後屬有北鄉城后土祠陝州太和十一年置治陝城八年罷天平初復後陷領郡五縣十一農郡前漢置以顯祖諱改曰領縣三陝中北陝二漢晉曰陝屬有曲沃城鄧芝祠崤太和十一年置有三崤山白楊谷西農郡領縣一農二漢晉屬農後屬有桃林澠池郡領縣二俱利北澠池太和十一年置有馬頭山俱利城生耳山石城郡正始二年置縣後改領縣一同堤河北郡領縣四北安邑二漢晉曰安邑屬河東後改太和十一年置為郡十八年復屬南安邑太和十一年置有中條山河北二漢晉屬河東後屬有芮城立城媯水首陽山伯夷叔齊墓太陽二漢晉屬河東後屬有虞城夏陽城洛州太延五年置荊州太和十一年改治上洛城領郡五縣七上洛郡晉武帝置領縣二上洛前漢屬農後漢屬京兆晉屬有丹水南秦水漢高祖祠四皓祠高東祠拒陽上庸郡皇興四年置東上洛永平四年改領縣二商前漢屬農後漢屬京兆晉屬上洛後屬有京城豐陽郡治太安二年置有圈地魏興郡太延五年置領縣一陽亭太和五年置始平郡景明元年置領縣一上洛萇和郡景明元年置